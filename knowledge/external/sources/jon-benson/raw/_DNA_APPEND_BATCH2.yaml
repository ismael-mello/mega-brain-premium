# L1_PHILOSOPHIES (5MSLF) — 31 elements
      - id: "FIL-JB-592"
        title: "Duality Marketing as Foundation"
        description: "The answer to your customer's natural state of indecision is duality marketing. Everyone is in a state of indecision until they hit the buy button. Speak in pros and cons, not hammer-positive."
        domains: ["copywriting", "sales-psychology", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-593"
        title: "Cognitive Dissonance Drives Indecision"
        description: "Indecision is a direct response to cognitive dissonance — the internal 'I know I should but I shouldn't.' When you speak decisively in duality, you affirm their indecision while persuading action."
        domains: ["sales-psychology", "buyer-behavior", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-594"
        title: "Text Sales Pages Are Not Dead"
        description: "Text-based sales pages are not dead — they are effective as modality shifters, alternate landing pages, and exit pages. A 50/50 split with VSL extends campaign life."
        domains: ["copywriting", "sales-pages", "conversion-optimization"]
        source: "5MSLF"
      - id: "FIL-JB-595"
        title: "Three-Line Paragraph Rule"
        description: "Most sales page paragraphs should be no more than three lines. People do not want to read dense text blocks. This has been tested and proven to increase conversions."
        domains: ["copywriting", "formatting", "readability"]
        source: "5MSLF"
      - id: "FIL-JB-596"
        title: "Inquiry Cures Judgment"
        description: "Questions build rapport without judgment. 'Did you know' and 'Have you ever thought about' create inquisitive copy that avoids the hard-sell feeling."
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "5MSLF"
      - id: "FIL-JB-597"
        title: "Subheadlines Are the Sales Letter in Blip Format"
        description: "Your subheadlines are essentially the entire sales letter in very brief format. Each one must carry the argument forward independently."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "FIL-JB-598"
        title: "Four Es of Proof"
        description: "Four types of proof to support your hook: Engagers (testimonials), Evidence (studies/data), Experience (personal), and Expertise (authority credentials). Use at least 2 of 4."
        domains: ["copywriting", "proof-elements", "credibility"]
        source: "5MSLF"
      - id: "FIL-JB-599"
        title: "Us Versus Them is Inclusion"
        description: "The 'Us versus Them' section is about inclusion — making the reader feel part of your tribe while comparing your solution to alternatives and preemptively answering objections."
        domains: ["copywriting", "positioning", "tribe-building"]
        source: "5MSLF"
      - id: "FIL-JB-600"
        title: "Clicks Dont Matter Buys Do"
        description: "People are so concerned about clicks. Be more concerned about buys. Getting a click is not the answer — conversion to purchase is the only metric that matters."
        domains: ["conversion-optimization", "metrics", "direct-response"]
        source: "5MSLF"
      - id: "FIL-JB-601"
        title: "Special Sauce Separate from Hook"
        description: "The special sauce is something else within your program that makes it unique — it is NOT your hook. You can have multiple trademark elements. The hook opens the door; the special sauce keeps them inside."
        domains: ["positioning", "offer-design", "differentiation"]
        source: "5MSLF"
      - id: "FIL-JB-602"
        title: "People Buy Feelings Not Products"
        description: "No one buys a product because of how they will think. They buy because of how they will feel. The lizard brain decides; the prefrontal cortex rationalizes after."
        domains: ["sales-psychology", "buyer-behavior", "emotion"]
        source: "5MSLF"
      - id: "FIL-JB-603"
        title: "Imagine This Day With Me"
        description: "Future pacing in present tense is more powerful than future tense. 'Imagine this day with me' creates association between the reader and the narrator subconsciously."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "5MSLF"
      - id: "FIL-JB-604"
        title: "Buy Now Subliminal Spelling"
        description: "Intentionally using 'By now you probably realize...' with the subliminal read of 'Buy now' is a proven covert persuasion technique embedded in sales copy."
        domains: ["nlp", "persuasion", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-605"
        title: "Everything You Need Cripples Upsell"
        description: "Saying 'everything you need is right here' can cripple the upsell if not phrased correctly. Bridge with 'however, some people want to do it faster/easier.'"
        domains: ["offer-design", "upsell-strategy", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-606"
        title: "Treasure Map Analogy for Short Products"
        description: "How many pages does a treasure map need before you buy it? One. Use this analogy to neutralize objections about product length or perceived thinness of content."
        domains: ["objection-handling", "value-framing", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-607"
        title: "Making Negative Objections Positive"
        description: "Turn every apparent weakness into a strength: not professionally published means raw and real, only 16 pages means dense and actionable, no fancy cover means substance over style."
        domains: ["copywriting", "objection-handling", "reframing"]
        source: "5MSLF"
      - id: "FIL-JB-608"
        title: "Remember Then New Fact is Samurai"
        description: "Starting a section with 'Remember' followed by a totally new fact is one of the most ninja elements. Readers think they missed something and reread the page."
        domains: ["copywriting", "attention-capture", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-609"
        title: "Why Its Just Price Assumes Affordability"
        description: "The phrasing 'Why it's just $X' automatically assumes the price is remarkably low. The reader accepts the framing before they have even evaluated the price."
        domains: ["pricing-psychology", "copywriting", "framing"]
        source: "5MSLF"
      - id: "FIL-JB-610"
        title: "Incongruence Close from A Few Good Men"
        description: "Showing that inaction is incongruent with the reader's own stated values is the ultimate close. Like Jack Nicholson on the stand — they must act or betray their own integrity."
        domains: ["closing", "persuasion", "sales-psychology"]
        source: "5MSLF"
      - id: "FIL-JB-611"
        title: "Negative to Positive Duality Close"
        description: "The close sequence goes negative to positive in duality: 'Here's why you'd be stupid not to take it' followed by 'But here's a better choice — here's what awaits you.'"
        domains: ["closing", "copywriting", "duality-marketing"]
        source: "5MSLF"
      - id: "FIL-JB-612"
        title: "Average Person Sees Ad Nine Times"
        description: "The average person needs to see an ad 9 times before buying. This justifies intentional repetition within a sales page — repeating key messages is not redundancy, it is strategy."
        domains: ["advertising", "frequency", "sales-psychology"]
        source: "5MSLF"
      - id: "FIL-JB-613"
        title: "PPS Encapsulates Entire Sales Letter"
        description: "The PPS should encapsulate the entire sales letter in about 5 lines because that is where people scroll to first. The bottom of the page is premium real estate."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "FIL-JB-614"
        title: "Modesty Honesty Determination Build Trust"
        description: "The three trust keys are modesty, honesty, and determination. Modesty makes you relatable, honesty (even humiliating) builds credibility, determination shows commitment."
        domains: ["rapport-building", "credibility", "storytelling"]
        source: "5MSLF"
      - id: "FIL-JB-615"
        title: "Email is Not Dead The Message Is"
        description: "Email is not dying — bad email is dying. You are not your list; you are your message. The quality of your communication determines everything."
        domains: ["email-marketing", "messaging", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-616"
        title: "Monkey Mind Controls Buying"
        description: "The limbic system (monkey mind) controls virtually every buying decision. The prefrontal cortex rationalizes after. Speak to the monkey mind first, logic second."
        domains: ["sales-psychology", "neuroscience", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-617"
        title: "Avoidance Modality Over Approach"
        description: "The monkey mind responds more to avoidance of fear than to possibility of pleasure. 'Read This Book or Die' works because avoidance modality triggers deeper attention."
        domains: ["sales-psychology", "persuasion", "attention-capture"]
        source: "5MSLF"
      - id: "FIL-JB-618"
        title: "HTML Templates Are Satans Sex Toys"
        description: "HTML email templates destroy deliverability and personal connection. Plain text emails that look personal always outperform designed templates."
        domains: ["email-marketing", "deliverability", "authenticity"]
        source: "5MSLF"
      - id: "FIL-JB-619"
        title: "Being Afraid to Offend Kills Sales"
        description: "Being afraid to offend is one of the biggest email killers. The polarizing voice creates tribe; the vanilla voice creates indifference. Offend the wrong people to attract the right ones."
        domains: ["email-marketing", "voice", "polarization"]
        source: "5MSLF"
      - id: "FIL-JB-620"
        title: "Overuse of Swipe Copy Destroys Voice"
        description: "Swipe files should be studied for structure, not copied verbatim. Overusing swipe copy destroys your unique voice and makes you sound like everyone else."
        domains: ["copywriting", "authenticity", "voice"]
        source: "5MSLF"
      - id: "FIL-JB-621"
        title: "Email Too Infrequently Kills Revenue"
        description: "Emailing too infrequently is worse than emailing too much. Your list forgets you. Frequency builds familiarity and familiarity builds trust."
        domains: ["email-marketing", "frequency", "list-management"]
        source: "5MSLF"
      - id: "FIL-JB-622"
        title: "All Email Rules Can Be Broken"
        description: "Every single email rule can be broken if you understand why the rule exists. Mastery means knowing when to follow and when to violate conventions intentionally."
        domains: ["email-marketing", "mastery", "rule-breaking"]
        source: "5MSLF"

# --- END L1_PHILOSOPHIES (5MSLF): 31 elements ---

# L2_MENTAL_MODELS (5MSLF) — 27 elements
      - id: "MM-JB-586"
        title: "Duality Response Model"
        description: "When prospects are in cognitive dissonance (should/shouldn't), speaking in duality (pros AND cons) resolves their internal conflict better than all-positive hammering."
        domains: ["sales-psychology", "persuasion", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-587"
        title: "Modality Shifting Model"
        description: "Prospects respond to different content modalities (video, text, audio, webinar). Switching modalities extends campaign life and captures non-responders from the primary format."
        domains: ["marketing-strategy", "conversion-optimization", "content"]
        source: "5MSLF"
      - id: "MM-JB-588"
        title: "Fact Style Intro as Authority Builder"
        description: "Starting with 'Fact:' statements creates an 'it's not even open for discussion' tone that establishes authority immediately. But it's easy to copy, so use sparingly outside your niche."
        domains: ["copywriting", "authority-building", "formatting"]
        source: "5MSLF"
      - id: "MM-JB-589"
        title: "Rapport Through Questions Not Statements"
        description: "Questions like 'Did you know?' and 'Have you ever?' build rapport without the hard-sell resistance that declarative statements create. Inquiry mode disarms judgment."
        domains: ["rapport-building", "copywriting", "sales-psychology"]
        source: "5MSLF"
      - id: "MM-JB-590"
        title: "Hook vs Trademark vs Special Sauce"
        description: "Three distinct elements: Hook (what gets attention), Trademark (branded term like F4X), Special Sauce (the unique mechanism that explains WHY it works). All three can coexist."
        domains: ["positioning", "branding", "offer-design"]
        source: "5MSLF"
      - id: "MM-JB-591"
        title: "Objection Preemption Through Comparison"
        description: "The 'Us vs Them' comparison copy answers objections before the reader even raises them. By comparing to alternatives, you address every 'but what about...' in advance."
        domains: ["objection-handling", "copywriting", "persuasion"]
        source: "5MSLF"
      - id: "MM-JB-592"
        title: "Negative Qualification as Desire Amplifier"
        description: "Telling people who should NOT buy ('Warning: not for everyone') triggers the desire to prove they qualify. Nobody wants to be excluded from the club."
        domains: ["sales-psychology", "scarcity", "qualification"]
        source: "5MSLF"
      - id: "MM-JB-593"
        title: "Price Absence Creates Search Behavior"
        description: "Not showing the price forces prospects to search the page, increasing engagement time. On checkout, a short video justifying the price creates a secondary conversion point."
        domains: ["pricing-psychology", "conversion-optimization", "engagement"]
        source: "5MSLF"
      - id: "MM-JB-594"
        title: "Real Scarcity vs False Scarcity Ethics"
        description: "Real scarcity beats false scarcity for sleeping at night. Both convert similarly, but real scarcity (limited enrollment, price increase, access window) maintains integrity."
        domains: ["scarcity", "ethics", "conversion-optimization"]
        source: "5MSLF"
      - id: "MM-JB-595"
        title: "Collaborative Modesty Before Price"
        description: "'I can't take all the credit' serves two purposes: builds modesty rapport AND justifies the price by framing it as collaborative effort worth more than one person's work."
        domains: ["pricing-psychology", "rapport-building", "credibility"]
        source: "5MSLF"
      - id: "MM-JB-596"
        title: "Nightmare Mini Story at Dont Try Alone"
        description: "A mini nightmare story placed at 'Don't Try This Alone' section shows what happens when people attempt without guidance. Works best for products under $197."
        domains: ["storytelling", "copywriting", "fear-appeal"]
        source: "5MSLF"
      - id: "MM-JB-597"
        title: "Article Page as VSL Extension"
        description: "An article-style page before the sales page acts as a trust-builder and modality shifter. Tested and proven to outperform direct-to-sales-page in many niches."
        domains: ["funnel-design", "conversion-optimization", "content"]
        source: "5MSLF"
      - id: "MM-JB-598"
        title: "Five Steps Article Formula"
        description: "Article formula: Short headline + byline, 3-7 'Did you know' paragraphs, sub-headline acting as headline, 3-5 command/verb bullet points, optional warning, 'What do I do next?' link."
        domains: ["copywriting", "content-marketing", "funnel-design"]
        source: "5MSLF"
      - id: "MM-JB-599"
        title: "Avatar Voice Writing Model"
        description: "Capture the feeling and vocabulary of your target avatar and write as if you were them talking. If writing for over-40 fitness, use their worldview, their language, their frustrations."
        domains: ["copywriting", "market-awareness", "empathy"]
        source: "5MSLF"
      - id: "MM-JB-600"
        title: "Double Entendre Headlines"
        description: "Headlines with double meanings ('New-age workouts' as both literal and negative-connotation for older audience) create subconscious resonance with the target avatar."
        domains: ["copywriting", "headlines", "wordplay"]
        source: "5MSLF"
      - id: "MM-JB-601"
        title: "Samurai Postal Service Email Model"
        description: "Email should be treated like a personal letter from a samurai: precise, respectful, personal, with hidden power moves embedded in the structure."
        domains: ["email-marketing", "strategy", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-602"
        title: "Limbic System Decision Model"
        description: "The limbic system (emotional center) reacts first and controls buying decisions. The prefrontal cortex rationalizes after. Marketing must speak to the limbic system first."
        domains: ["neuroscience", "sales-psychology", "persuasion"]
        source: "5MSLF"
      - id: "MM-JB-603"
        title: "Number Trick for Subject Lines"
        description: "Numbers in email subject lines always outperform non-number subjects. Odd numbers slightly outperform even. Specificity (7 vs 'several') triggers curiosity."
        domains: ["email-marketing", "subject-lines", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-604"
        title: "Intimacy Trick in Email"
        description: "Writing emails as if to one person creates intimacy. Using first name, 'you' language, and personal confession-style content makes mass email feel like a private letter."
        domains: ["email-marketing", "rapport-building", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-605"
        title: "Resend to Un-Opens Strategy"
        description: "Resending emails to people who didn't open with a modified subject line can capture 15-30% additional opens. Simple tactic, massive incremental revenue."
        domains: ["email-marketing", "list-management", "conversion-optimization"]
        source: "5MSLF"
      - id: "MM-JB-606"
        title: "NLP Three Link Trick"
        description: "Place three links in an email: one early (curiosity), one mid (after value), one late (after urgency). Each link catches different reader psychologies at different engagement points."
        domains: ["email-marketing", "nlp", "conversion-optimization"]
        source: "5MSLF"
      - id: "MM-JB-607"
        title: "Equidistant Email Spacing"
        description: "Space emails equidistantly in a sequence for maximum impact. Irregular spacing creates unpredictability that can hurt deliverability and reader expectations."
        domains: ["email-marketing", "sequencing", "deliverability"]
        source: "5MSLF"
      - id: "MM-JB-608"
        title: "PS Trick as Second Headline"
        description: "The PS in an email functions as a second headline. Many readers scroll to the PS first. Use it to restate the core offer or add a unique angle not covered in the body."
        domains: ["email-marketing", "copywriting", "structure"]
        source: "5MSLF"
      - id: "MM-JB-609"
        title: "First Line Trick for Opens"
        description: "The first line of an email (preview text) determines whether the opened email gets read. Make it provocative, personal, or curiosity-driven — never a greeting."
        domains: ["email-marketing", "subject-lines", "engagement"]
        source: "5MSLF"
      - id: "MM-JB-610"
        title: "Email Seduction Auto-Responder Model"
        description: "Auto-responder sequences should follow a seduction arc: intrigue, rapport, value, intimacy, offer. Each email builds on the relationship established by the previous one."
        domains: ["email-marketing", "sequencing", "relationship-building"]
        source: "5MSLF"
      - id: "MM-JB-611"
        title: "Current News Trick for Relevance"
        description: "Tying emails to current news or events creates immediate relevance and higher open rates. The reader perceives the email as timely rather than automated."
        domains: ["email-marketing", "relevance", "engagement"]
        source: "5MSLF"
      - id: "MM-JB-612"
        title: "Next Page Trick for Engagement"
        description: "Ending an email with a 'next page' concept (click to continue reading) rather than 'click to buy' dramatically increases click-through by reducing perceived commitment."
        domains: ["email-marketing", "conversion-optimization", "copywriting"]
        source: "5MSLF"

# --- END L2_MENTAL_MODELS (5MSLF): 27 elements ---

# L3_HEURISTICS (5MSLF) — 47 elements
      - id: "HEUR-JB-626"
        title: "Three Line Paragraph Maximum"
        description: "Most sales page paragraphs should be no more than 3 lines. If an image narrows the column, 5-6 lines are acceptable (newspaper print). Tested and proven to increase conversions."
        domains: ["copywriting", "formatting", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-627"
        title: "Five Paragraph Rapport Intro"
        description: "The rapport intro section should be approximately 5 paragraphs, heavily loaded with the word 'You' — aim for 7-9 uses of 'you' in the opening paragraphs."
        domains: ["copywriting", "rapport-building", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-628"
        title: "Did You Know Copy Five to Seven Paragraphs"
        description: "The 'Did you know' question-centered copy section should be 5-7 paragraphs. Use questions to build rapport without judgment. Can use rapport if story-based."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-629"
        title: "What It Isnt Copy Four to Seven Paragraphs"
        description: "The 'What it isn't' section should be 4-7 paragraphs plus a paragraph starting with the underlined word 'Listen' — a direct command that demands attention."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-630"
        title: "Hook Description Three to Seven Paragraphs"
        description: "The description of the hook/trademark should be 3-7 paragraphs. Include at least 2 of the 4 Es (Engagers, Evidence, Experience, Expertise) to prove why it works."
        domains: ["copywriting", "proof-elements", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-631"
        title: "Us Versus Them Five to Eight Paragraphs"
        description: "Comparison copy section should be 5-8 paragraphs total, including anchoring comparisons plus one 'Did you know about...?' informative fact."
        domains: ["copywriting", "positioning", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-632"
        title: "Works For Anyone Three to Five Paragraphs"
        description: "The 'Who it works for' section should be 3-5 paragraphs plus the 'Why? Because!' connection. Roll out 95-99% of your audience while appearing specific."
        domains: ["copywriting", "qualification", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-633"
        title: "How You Will Feel Three to Five Paragraphs"
        description: "The experience description section should be 3-5 paragraphs. Future pace in present tense, not future tense. 'You remain in total control' beats 'You will feel in control.'"
        domains: ["copywriting", "future-pacing", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-634"
        title: "Product Intro One to Three Paragraphs"
        description: "The 'Everything you need is here' product intro should be only 1-3 paragraphs. People are buying emotions, not features. Going too long here is 'all pudding.'"
        domains: ["copywriting", "product-description", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-635"
        title: "Hard to Find Copy Three to Seven Paragraphs"
        description: "The 'really hard to find these answers' section should be 3-7 paragraphs. Use the 'My life's work in a handbook' theme. Imply the option of searching yourself."
        domains: ["copywriting", "value-framing", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-636"
        title: "Collaborative Effort Three to Five Paragraphs"
        description: "The 'Can't take all the credit' section should be 3-5 paragraphs. Builds modesty while justifying price through collaborative effort framing."
        domains: ["copywriting", "credibility", "pricing-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-637"
        title: "Dont Try Alone Three to Five Paragraphs"
        description: "The nightmare mini-story about trying it alone should be 3-5 paragraphs. Works best for products $197 and under. For $5K+ products, use totally different copy approach."
        domains: ["copywriting", "fear-appeal", "pricing-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-638"
        title: "Scarcity Section Three to Five Paragraphs"
        description: "The 'Act fast' section should be 3-5 paragraphs with compelling reasons to act now. Use real scarcity (limited copies, price increase, enrollment window) over false scarcity."
        domains: ["copywriting", "scarcity", "urgency"]
        source: "5MSLF"
      - id: "HEUR-JB-639"
        title: "Incongruence Close Five to Seven Paragraphs"
        description: "The 'You'd be stupid not to take it' section should be 5-7 paragraphs. Frame inaction as incongruent with the reader's own stated values and admissions."
        domains: ["copywriting", "closing", "persuasion"]
        source: "5MSLF"
      - id: "HEUR-JB-640"
        title: "PPS Encapsulates in Five Lines"
        description: "The PPS should encapsulate the entire sales letter in approximately 5 lines. People scroll to the bottom first — the PPS is premium real estate."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-641"
        title: "Paraphrase Every Fifth to Seventh Slide"
        description: "In VSLs, every 5th to 7th slide should use paraphrased text (not word-for-word). This creates pattern breaks that keep viewers hypnotically glued to the screen."
        domains: ["vsl", "presentation", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-642"
        title: "Ideal VSL Length 28 to 36 Minutes"
        description: "The ideal video sales letter length is 28-36 minutes. Hour-and-a-half VSLs can convert depending on price point, but the sweet spot is under 40 minutes."
        domains: ["vsl", "conversion-optimization", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-643"
        title: "Two of Four Es Minimum"
        description: "Use at least 2 of the 4 Es (Engagers, Evidence, Experience, Expertise) when proving your hook. Using all 4 creates longer copy but maximum proof. Minimum 2 for effective copy."
        domains: ["copywriting", "proof-elements", "credibility"]
        source: "5MSLF"
      - id: "HEUR-JB-644"
        title: "Average Nine Ad Exposures Before Purchase"
        description: "The average person needs to see an ad 9 times before buying. This justifies strategic repetition of key messages within the sales letter — repetition is strategy, not redundancy."
        domains: ["advertising", "frequency", "sales-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-645"
        title: "Products Under 197 Use Nightmare Story"
        description: "The nightmare 'Don't try this alone' mini-story works best for products priced at $197 or below. For products at $3-5K, switch to application-based copy with phone close."
        domains: ["pricing-psychology", "copywriting", "offer-design"]
        source: "5MSLF"
      - id: "HEUR-JB-646"
        title: "Sell 2K Online 5K Needs Phone"
        description: "You can sell $2,000 products online directly. Eventually $5,000 online but that is pushing it. Above $5K, it is harder to convert without a human phone call."
        domains: ["pricing-psychology", "sales-strategy", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-647"
        title: "Article Page Did You Know Three to Seven Paragraphs"
        description: "The article page before the sales page should have 3-7 'Did you know' paragraphs with personal introductions, revealing negatives, and warnings."
        domains: ["copywriting", "funnel-design", "content-marketing"]
        source: "5MSLF"
      - id: "HEUR-JB-648"
        title: "Article Page Three to Five Sound Bite Points"
        description: "Article pages should have 3-5 sound bite bullet points, each beginning with a command verb (Stop, Forget, Avoid, Work). Commands demand attention."
        domains: ["copywriting", "content-marketing", "formatting"]
        source: "5MSLF"
      - id: "HEUR-JB-649"
        title: "50 50 Split Text vs VSL Extends Campaign Life"
        description: "Running a 50/50 split between text sales page and VSL extends campaign life. People who did not respond to VSL may convert on text — different modalities capture different buyers."
        domains: ["conversion-optimization", "split-testing", "marketing-strategy"]
        source: "5MSLF"
      - id: "HEUR-JB-650"
        title: "Odd Numbers Outperform Even in Subject Lines"
        description: "Numbers in email subject lines always outperform non-number subjects. Odd numbers slightly outperform even numbers. Specificity (7 vs 'several') triggers curiosity."
        domains: ["email-marketing", "subject-lines", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-651"
        title: "Resend Un-Opens Captures 15 to 30 Percent More"
        description: "Resending emails to people who did not open with a modified subject line captures 15-30% additional opens. Simple tactic with massive incremental revenue."
        domains: ["email-marketing", "list-management", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-652"
        title: "Three Links Per Email Optimal"
        description: "Place three links in each email: one early (curiosity), one mid (after value), one late (after urgency). Each link catches different reader psychologies at different engagement points."
        domains: ["email-marketing", "conversion-optimization", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-653"
        title: "10 to 15 Words Per Sentence in Email"
        description: "Keep email sentences to 10-15 words for maximum readability and engagement. Short sentences create rhythm and prevent reader fatigue."
        domains: ["email-marketing", "copywriting", "readability"]
        source: "5MSLF"
      - id: "HEUR-JB-654"
        title: "75 Percent More Effort to Avoid Pain Than Gain Pleasure"
        description: "People will do approximately 75% more to avoid potential pain than to gain potential pleasure. Use avoidance modality in subject lines and opening sentences."
        domains: ["sales-psychology", "persuasion", "email-marketing"]
        source: "5MSLF"
      - id: "HEUR-JB-655"
        title: "Plain Text Emails Beat HTML Templates Always"
        description: "Plain text emails that look personal always outperform designed HTML templates. HTML templates destroy deliverability and personal connection. No exceptions."
        domains: ["email-marketing", "deliverability", "authenticity"]
        source: "5MSLF"
      - id: "HEUR-JB-656"
        title: "Two Negatives Followed by One Positive"
        description: "In 'Did you know' copy, use two negative/alarming statements followed by one positive revelation. This pattern creates tension then release, maximizing engagement."
        domains: ["copywriting", "persuasion", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-657"
        title: "Objections Start with Positive Words"
        description: "Start objection answers with positive words: 'Great,' 'Ideal time,' 'Terrific.' The objection is negative; your response reframes it immediately as positive. Complete duality."
        domains: ["copywriting", "objection-handling", "reframing"]
        source: "5MSLF"
      - id: "HEUR-JB-658"
        title: "Equidistant Email Spacing for Sequences"
        description: "Space emails equidistantly in a sequence for maximum impact. Irregular spacing creates unpredictability that hurts deliverability and reader expectations."
        domains: ["email-marketing", "sequencing", "deliverability"]
        source: "5MSLF"
      - id: "HEUR-JB-659"
        title: "First Line of Email Is Preview Text"
        description: "The first line of an email determines whether the opened email gets read. Make it provocative, personal, or curiosity-driven. Never start with a greeting."
        domains: ["email-marketing", "subject-lines", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-660"
        title: "PS Functions as Second Headline"
        description: "The PS in an email functions as a second headline. Many readers scroll to the PS first. Use it to restate the core offer or add a unique angle not in the body."
        domains: ["email-marketing", "copywriting", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-661"
        title: "Use Commands as Paragraph Starters"
        description: "Start key paragraphs with command words: 'Listen,' 'Stop,' 'Forget,' 'Remember,' 'Imagine.' Commands demand attention and create pattern breaks."
        domains: ["copywriting", "persuasion", "formatting"]
        source: "5MSLF"
      - id: "HEUR-JB-662"
        title: "Negative Qualification Triggers Desire to Prove"
        description: "Telling people who should NOT buy ('Warning: not for everyone') triggers desire to prove they qualify. Nobody wants to be excluded from the club."
        domains: ["sales-psychology", "qualification", "scarcity"]
        source: "5MSLF"
      - id: "HEUR-JB-663"
        title: "Capture Avatar Voice Before Writing"
        description: "Before writing any copy, capture the feeling and vocabulary of your target avatar. Write as if you were them talking. Their worldview, their language, their frustrations."
        domains: ["copywriting", "market-awareness", "empathy"]
        source: "5MSLF"
      - id: "HEUR-JB-664"
        title: "Word Selection is Never Accidental"
        description: "Choose words with subliminal connotations intentionally. 'Peer into' creates rapport subconsciously. 'By now/Buy now' embeds commands. Every word is strategic."
        domains: ["copywriting", "nlp", "persuasion"]
        source: "5MSLF"
      - id: "HEUR-JB-665"
        title: "Remove Blame from Reader Immediately"
        description: "In the 'Big Problem' section, remove blame from the reader. 'Today's programs are keeping YOU from results' — it is the programs' fault, not theirs. Blame removal builds trust."
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-666"
        title: "You Cant Find This Anywhere Else Statement"
        description: "Include 'You can't find this anywhere else but here' when true. It is technically always true for a unique sales page. Gives enormous power to the page."
        domains: ["copywriting", "exclusivity", "value-framing"]
        source: "5MSLF"
      - id: "HEUR-JB-667"
        title: "Auto Responder Follows Seduction Arc"
        description: "Auto-responder sequences should follow a seduction arc: intrigue, rapport, value, intimacy, offer. Each email builds on the relationship established by the previous one."
        domains: ["email-marketing", "sequencing", "relationship-building"]
        source: "5MSLF"
      - id: "HEUR-JB-668"
        title: "Tie Emails to Current Events for Relevance"
        description: "Tying emails to current news or events creates immediate relevance and higher open rates. The reader perceives the email as timely rather than automated."
        domains: ["email-marketing", "relevance", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-669"
        title: "No Price on Page Forces Search Behavior"
        description: "Not showing the price on the sales page forces prospects to search the page, increasing engagement time. On checkout page, a 30-second video justifies the price."
        domains: ["pricing-psychology", "conversion-optimization", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-670"
        title: "Article Page Tested Better Than Direct to Sales Page"
        description: "An article-style page placed before the sales page has been tested and proven to outperform direct-to-sales-page in many niches. The article builds trust first."
        domains: ["funnel-design", "conversion-optimization", "split-testing"]
        source: "5MSLF"
      - id: "HEUR-JB-671"
        title: "Exit Page Article Recaptures Abandoners"
        description: "When prospects try to leave, use an exit popup offering 'Would you like to read an article on X?' to redirect to an article-format page. Recaptures abandoning traffic."
        domains: ["conversion-optimization", "funnel-design", "traffic"]
        source: "5MSLF"
      - id: "HEUR-JB-672"
        title: "Frequency Builds Familiarity Builds Trust"
        description: "Emailing too infrequently is worse than emailing too much. Your list forgets you. Frequency builds familiarity, and familiarity builds trust. Consistency beats perfection."
        domains: ["email-marketing", "frequency", "list-management"]
        source: "5MSLF"

# --- END L3_HEURISTICS (5MSLF): 47 elements ---

# L4_FRAMEWORKS (5MSLF) — 29 elements
      - id: "FW-JB-586"
        title: "18 Subheadline Sales Page Formula"
        description: "Complete text sales page structure: 18 subheadlines in sequence — Attention/Headline, Big Problem, What It Isnt, What It Is/Hook, Us vs Them, Works for Anyone, Special Sauce, Objections, How You Will Feel, Everything You Need, Recap, Hard to Find, Cant Take Credit, Dont Try Alone, Warning Not for Everyone, Remember+New Fact, Why Its Just $X, Double Guarantee, Scarcity, Oh Did I Mention, Youd Be Stupid, Better Choice, Order+PPS."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "FW-JB-587"
        title: "Four Es Proof Framework"
        description: "Four types of proof to support your hook: Engagers (testimonials from users), Evidence (studies and data), Experience (your personal story), Expertise (authority credentials). Use minimum 2 of 4."
        domains: ["copywriting", "proof-elements", "credibility"]
        source: "5MSLF"
      - id: "FW-JB-588"
        title: "Duality Marketing Framework"
        description: "Speak in pros AND cons, not all-positive. Address cognitive dissonance by affirming indecision while persuading action. Goes negative to positive in close: 'Here is why you would be stupid' followed by 'Here is a better choice.'"
        domains: ["copywriting", "sales-psychology", "persuasion"]
        source: "5MSLF"
      - id: "FW-JB-589"
        title: "Headline Benefit Formula"
        description: "Power Word + Outrageous Result - Public Enemy #1. Example: '3 ways to lose weight quickly and easily, without giving up your favorite foods or spending hours doing cardio.' Number + benefit + power words minus public enemies."
        domains: ["copywriting", "headlines", "structure"]
        source: "5MSLF"
      - id: "FW-JB-590"
        title: "Article Page Formula"
        description: "Pre-sales page structure: 1) Short headline + byline, 2) 'Did you know' copy 3-7 paragraphs with personal intros and warnings, 3) Sub-headline acting as headline, 4) 3-5 command/verb bullet points, 5) Optional warning, 6) 'What do I do next?' + link."
        domains: ["copywriting", "funnel-design", "content-marketing"]
        source: "5MSLF"
      - id: "FW-JB-591"
        title: "Hook Trademark Special Sauce Trinity"
        description: "Three distinct branding elements: Hook (what gets attention — the big idea), Trademark (branded term like F4X), Special Sauce (unique mechanism explaining WHY it works). All three coexist and serve different purposes."
        domains: ["positioning", "branding", "offer-design"]
        source: "5MSLF"
      - id: "FW-JB-592"
        title: "Modality Shifting Strategy"
        description: "Use multiple content modalities to extend campaign life: VSL as primary, text sales page as alternate (50/50 split), article page as exit, webinar as follow-up. Each modality captures non-responders from other formats."
        domains: ["marketing-strategy", "conversion-optimization", "funnel-design"]
        source: "5MSLF"
      - id: "FW-JB-593"
        title: "Double and Triple Guarantee Framework"
        description: "Double guarantee: two distinct guarantee conditions. Triple guarantee: three conditions including one absurd ('even if you don't like my accent'). Multiple guarantees reduce perceived risk exponentially."
        domains: ["offer-design", "risk-reversal", "closing"]
        source: "5MSLF"
      - id: "FW-JB-594"
        title: "Negative to Positive Duality Close"
        description: "Close sequence framework: First 'You would be stupid not to take it' (incongruence with values) → Then 'Here is a better choice' (future-paced benefits). Hammer negative then immediately lift with positive vision."
        domains: ["closing", "copywriting", "persuasion"]
        source: "5MSLF"
      - id: "FW-JB-595"
        title: "Fact Style Intro Framework"
        description: "Open with repeated 'Fact:' statements to establish authority without discussion. Pattern: Fact + negative truth, Fact + common knowledge, Fact + lie reveal, Fact + exclusive availability. Creates 'this is not up for debate' tone."
        domains: ["copywriting", "authority-building", "formatting"]
        source: "5MSLF"
      - id: "FW-JB-596"
        title: "Future Pacing in Present Tense"
        description: "Framework for describing post-purchase life: Use present tense instead of future tense. 'You remain in total control' not 'You will feel in control.' 'Imagine this day with me' creates physical+mental engagement."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "5MSLF"
      - id: "FW-JB-597"
        title: "Objection Answer Reframe Pattern"
        description: "Pattern for answering objections in copy: State objection in quotes ('But I'm 69 years old') → Start with positive word ('Great!' 'Ideal time!' 'Terrific!') → Reframe as advantage. Complete duality — address lizard brain and logical brain."
        domains: ["copywriting", "objection-handling", "reframing"]
        source: "5MSLF"
      - id: "FW-JB-598"
        title: "Negative Objection to Positive Reversal"
        description: "Turn every apparent weakness into a strength: Not professionally published = raw and real. Only 16 pages = dense and actionable. No fancy cover = substance over style. Use treasure map analogy: 'How many pages does a treasure map need? One.'"
        domains: ["copywriting", "objection-handling", "value-framing"]
        source: "5MSLF"
      - id: "FW-JB-599"
        title: "Upsell Bridge Formula"
        description: "Bridge from main product to upsell: 'You have everything you need to achieve X. However, some people want to do it faster/easier.' Never say 'everything you need' without immediately creating the bridge to the upsell."
        domains: ["upsell-strategy", "copywriting", "offer-design"]
        source: "5MSLF"
      - id: "FW-JB-600"
        title: "VSL Paraphrase Strategy"
        description: "VSL engagement framework: Show every word on screen for most slides, but every 5th-7th slide use only paraphrased text. Viewer does not know when the sentence will end, creating hypnotic attention. Pattern break prevents boredom."
        domains: ["vsl", "presentation", "engagement"]
        source: "5MSLF"
      - id: "FW-JB-601"
        title: "Open Click Buy Email Architecture"
        description: "Complete email marketing system: OPEN (subject line tricks — numbers, odd characters, intimacy, resend un-opens), CLICK (NLP 3-link trick, carrot, faux video, GIF, PS trick), BUY (5-step VSL process embedded in email-to-page flow)."
        domains: ["email-marketing", "conversion-optimization", "structure"]
        source: "5MSLF"
      - id: "FW-JB-602"
        title: "25 Email Samurai Tricks System"
        description: "Comprehensive email trick system: 8 Open Tricks (number, odd character, two words, 3-magazine, intimacy, resend, phone, everything from pages 1-90), 13 Click Tricks (subject/link, NLP 3-link, carrot, faux video, GIF, 10-15 words, equidistant, PS, first line, responsive, seduction, current news, next page), plus Buy section."
        domains: ["email-marketing", "conversion-optimization", "copywriting"]
        source: "5MSLF"
      - id: "FW-JB-603"
        title: "Email Seduction Auto Responder Arc"
        description: "Auto-responder sequence framework following seduction pattern: Intrigue (curiosity-based opener) → Rapport (personal story/connection) → Value (teaching/content) → Intimacy (personal revelation) → Offer (natural transition to sale)."
        domains: ["email-marketing", "sequencing", "relationship-building"]
        source: "5MSLF"
      - id: "FW-JB-604"
        title: "Avoidance Modality Marketing Framework"
        description: "Marketing framework built on avoidance psychology: Limbic system responds 75% more to fear avoidance than pleasure seeking. Structure: Lead with what they will avoid/lose, then present the positive alternative. 'Read This Book or Die' principle."
        domains: ["sales-psychology", "persuasion", "marketing-strategy"]
        source: "5MSLF"
      - id: "FW-JB-605"
        title: "Three Trust Keys Framework"
        description: "Three keys to building trust in copy: Modesty (makes you relatable, 'I can't take all the credit'), Honesty (even humiliating truths build credibility), Determination (shows commitment to the craft). All three must be present for maximum trust."
        domains: ["rapport-building", "credibility", "copywriting"]
        source: "5MSLF"
      - id: "FW-JB-606"
        title: "Price Absence Checkout Video Strategy"
        description: "Two-step pricing framework: 1) Remove price from sales page entirely — forces prospects to search and engage longer. 2) On checkout page, show 30-second video: 'Thanks for wanting this. I almost forgot to tell you, it is only $X and here is why.' Creates secondary conversion point."
        domains: ["pricing-psychology", "conversion-optimization", "funnel-design"]
        source: "5MSLF"
      - id: "FW-JB-607"
        title: "High Ticket Application Close Framework"
        description: "For products $3-5K+: Replace direct purchase with application. 'This is going to cost $3,997. However if you think you are qualified... I am taking 19 applications right now below.' Phone close replaces online purchase above $5K."
        domains: ["pricing-psychology", "high-ticket", "closing"]
        source: "5MSLF"
      - id: "FW-JB-608"
        title: "Subliminal Spelling Technique"
        description: "Embed subliminal commands through deliberate word choice: 'By now you probably realize...' reads subliminally as 'Buy now.' Use 'Imagine this day with me' where 'with me' creates association. Intentional, not accidental."
        domains: ["nlp", "persuasion", "copywriting"]
        source: "5MSLF"
      - id: "FW-JB-609"
        title: "Remember Plus New Fact Ninja Pattern"
        description: "Start a section with 'Remember...' followed by completely new information the reader has never seen. Reader thinks they missed something and rereads the page. One of the most 'samurai' elements in copy."
        domains: ["copywriting", "attention-capture", "persuasion"]
        source: "5MSLF"
      - id: "FW-JB-610"
        title: "Two Negative One Positive Cadence"
        description: "Pattern for 'Did you know' sequences: Two alarming/negative statements followed by one positive revelation. Creates tension-tension-release that maximizes engagement and makes the positive hit harder."
        domains: ["copywriting", "persuasion", "structure"]
        source: "5MSLF"
      - id: "FW-JB-611"
        title: "Inclusive Exclusion Copy Framework"
        description: "Framework for 'Who it works for' section: Appear to narrow your audience while actually including 95-99%. 'This works for women who want to lose at least 5 pounds or more' includes 95% of all women while feeling targeted."
        domains: ["copywriting", "qualification", "positioning"]
        source: "5MSLF"
      - id: "FW-JB-612"
        title: "Info Apocalypse Survival Framework"
        description: "Email marketing positioning: The information apocalypse is coming — bad email is dying, not email itself. Survival requires thinking of subscribers as fans, not a list. Authenticity and value delivery are the survival skills."
        domains: ["email-marketing", "positioning", "messaging"]
        source: "5MSLF"
      - id: "FW-JB-613"
        title: "Duality Headline Architecture"
        description: "Headlines with embedded duality for target audiences: 'Today's exercise programs are way too long' — sounds negative to younger people but positive to older audience. Double entendres ('new-age workouts') resonate on two levels simultaneously."
        domains: ["copywriting", "headlines", "market-awareness"]
        source: "5MSLF"
      - id: "FW-JB-614"
        title: "Special Sauce Differentiation System"
        description: "System for creating unique product differentiation: Special Sauce is separate from Hook and Trademark. It explains the unique mechanism within the product (e.g., time-tension principle, 3 phases). Can use as long as needed to explain. Works alongside the hook, not as replacement."
        domains: ["positioning", "offer-design", "differentiation"]
        source: "5MSLF"

# --- END L4_FRAMEWORKS (5MSLF): 29 elements ---

# L5_METHODOLOGIES (5MSLF) — 22 elements
      - id: "MET-JB-548"
        title: "18 Step Sales Page Construction Method"
        description: "Step-by-step method to write a complete text sales page: 1) Write attention pre-headline, 2) Craft headline with benefit formula, 3) Optional sub-headline with rapport/backup, 4) Write You-heavy rapport intro (5 paragraphs), 5) One-line 'here is what will happen,' 6) Subheadline 1: Big Problem + Did You Know copy, 7) Subheadline 2: What It Isnt + Listen paragraph, 8) Subheadline 3: The Answer/Hook + 4 Es, 9) Subheadline 4: Us vs Them comparison, 10) Subheadline 5: Works for Anyone, 11) Special Sauce explanation, 12) Objections answered, 13) Subheadline 6: How You Will Feel (future-paced), 14) Subheadline 7: Everything You Need + product intro, 15) Recap, 16) Subheadline 8-18: Hard to Find through Better Choice, 17) Order Button, 18) Signature + PS/PPS."
        domains: ["copywriting", "sales-pages", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-549"
        title: "Article Page Creation Method"
        description: "Step-by-step to create the article page that precedes the sales page: 1) Write short headline with number + byline, 2) Write 3-7 'Did you know' paragraphs including personal intro and negatives, 3) Create sub-headline that acts as the real headline, 4) Write 3-5 command-verb bullet points (Stop, Forget, Avoid, Work), 5) Add optional warning, 6) End with 'What do I do next?' + link to sales page. Test with and without article page — it often wins."
        domains: ["copywriting", "funnel-design", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-550"
        title: "Hook Discovery and Trademarking Method"
        description: "Method for discovering and branding your hook: 1) Identify the one thing your product does better than competition, 2) Create a branded term (F4X, Caloric Staggering, etc.), 3) Test if customers reference the hook name organically, 4) Consider phonetic associations (F4X sounds like P90X), 5) Embed hook in Subheadline 3 of sales page formula, 6) Separate from Special Sauce — hook opens the door, special sauce keeps them inside."
        domains: ["positioning", "branding", "copywriting"]
        source: "5MSLF"
      - id: "MET-JB-551"
        title: "Duality Objection Handling Method"
        description: "Method for writing objection sections in duality: 1) List common objections as quoted statements ('But I am 69 years old'), 2) Start each answer with a positive word (Great! Ideal! Terrific!), 3) Reframe the objection as an advantage, 4) Maintain conversational duality — address both lizard brain and logical brain, 5) Use graphics/formatting to make objections visually distinct."
        domains: ["copywriting", "objection-handling", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-552"
        title: "Negative to Positive Price Justification Method"
        description: "Method for the 'Why it is just $X' section: 1) State the price using 'Why it is just' framing (assumes affordability), 2) List apparent negatives (not professionally published, only 16 pages, no fancy cover), 3) Reframe each negative as positive (raw = real, short = dense, no cover = substance), 4) Use treasure map analogy ('How many pages does a treasure map need?'), 5) Make reader feel silly for caring about superficial things."
        domains: ["pricing-psychology", "copywriting", "objection-handling"]
        source: "5MSLF"
      - id: "MET-JB-553"
        title: "Future Pacing in Copy Method"
        description: "Method for writing future-paced sections: 1) Use 'Imagine this day with me' as opener (physical + mental engagement), 2) Write in present tense, not future ('You remain in control' not 'You will feel'), 3) Describe the daily experience after purchase, 4) Include sensory details the avatar cares about, 5) Embed 'by now' as subliminal 'buy now,' 6) End with order button immediately after the vision."
        domains: ["copywriting", "future-pacing", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-554"
        title: "Rapport Intro Writing Method"
        description: "Method for writing the You-heavy rapport intro: 1) Count 'you' usage — aim for 7-9 in first paragraph, 2) Keep paragraphs to 3 lines maximum, 3) Use 'Did you know' questions instead of declarative statements, 4) Avoid judgment entirely in opening paragraphs, 5) Optional: Use 'Fact:' style intro but only in niches where you are the original user."
        domains: ["copywriting", "rapport-building", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-555"
        title: "Avatar Voice Capture Method"
        description: "Method for capturing your avatar's voice before writing: 1) Define demographic precisely (age, gender, lifestyle), 2) Identify their worldview and frustrations, 3) Learn their specific vocabulary and slang, 4) Write as if you ARE them talking, 5) Test double entendres against their cultural references ('new-age' for older audience), 6) Validate tone against real customer language."
        domains: ["copywriting", "market-awareness", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-556"
        title: "Email Subject Line Number Optimization Method"
        description: "Method for optimizing email subject lines: 1) Always include a number (numbers outperform non-numbers), 2) Prefer odd numbers over even, 3) Be specific (7 not 'several'), 4) Use odd characters sparingly for pattern break, 5) Test 'two words that always work' variations, 6) Use 3-magazine trick (combine three unrelated topics), 7) Measure and resend to un-opens with modified subject."
        domains: ["email-marketing", "subject-lines", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-557"
        title: "Email Intimacy Writing Method"
        description: "Method for creating intimate-feeling mass emails: 1) Write as if to one specific person, 2) Use first name and 'you' language throughout, 3) Use personal confession-style content, 4) Keep sentences to 10-15 words, 5) Never start with a greeting, 6) Make the first line provocative or curiosity-driven (it is the preview text), 7) End with PS that functions as second headline."
        domains: ["email-marketing", "rapport-building", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-558"
        title: "NLP Three Link Email Method"
        description: "Method for placing three links in every email: 1) Place first link early in email (catches curiosity-driven readers), 2) Place second link mid-email after value delivery (catches value-seekers), 3) Place third link late after urgency statement (catches fear-motivated readers), 4) Each link catches different reader psychologies, 5) Use 'next page' framing instead of 'click to buy' for final link."
        domains: ["email-marketing", "nlp", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-559"
        title: "Resend to Un-Opens Method"
        description: "Method for recapturing non-openers: 1) Send initial email, 2) Wait appropriate interval, 3) Identify non-openers from email platform, 4) Modify subject line (not body), 5) Resend to non-openers only, 6) Expect 15-30% additional opens, 7) Track incremental revenue separately."
        domains: ["email-marketing", "list-management", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-560"
        title: "Auto Responder Seduction Sequence Method"
        description: "Method for building an auto-responder sequence: 1) Email 1: Intrigue — curiosity hook, personal angle, 2) Email 2-3: Rapport — personal story, shared struggles, 3) Email 4-5: Value — teaching content, tips, 4) Email 6: Intimacy — deeper personal revelation, 5) Email 7: Offer — natural transition from relationship to sale, 6) Space emails equidistantly, 7) Each email builds on previous relationship."
        domains: ["email-marketing", "sequencing", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-561"
        title: "Modality Shifting Campaign Method"
        description: "Method for extending campaign life through modality shifts: 1) Launch with VSL as primary, 2) Create text sales page alternate, 3) Run 50/50 split test, 4) Use article page as exit popup format, 5) Add webinar as follow-up modality, 6) Route non-buyers through different modalities over time, 7) Each shift captures people who did not respond to previous format."
        domains: ["marketing-strategy", "conversion-optimization", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-562"
        title: "Four Es Proof Section Construction Method"
        description: "Method for building the proof section: 1) Choose minimum 2 of 4 Es, 2) Engagers: Include 2-3 testimonials from real users, 3) Evidence: Cite studies, data, or research, 4) Experience: Share your personal story with the product, 5) Expertise: Reference authority credentials, 6) Weave into 3-7 paragraph description of the hook, 7) Format: 'In fact, Mary says... A report from Stanford shows... My own experience tells me... Dr. So-and-so confirms...'"
        domains: ["copywriting", "proof-elements", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-563"
        title: "Scarcity Section Real vs False Method"
        description: "Method for writing real scarcity: 1) Choose a real limitation (limited copies, price increase date, enrollment window, seats available), 2) Write 3-5 paragraphs with compelling reasons to act now, 3) Be specific ('Only 1000 initial copies at this price'), 4) If using price increase: 'I may increase the price' only if true, 5) Sleep test — can you sleep at night with this claim? If not, change it."
        domains: ["copywriting", "scarcity", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-564"
        title: "PPS Encapsulation Writing Method"
        description: "Method for writing the PPS: 1) Summarize entire sales letter in approximately 5 lines, 2) Include the main hook, key benefit, and price, 3) Place after signature and first PS, 4) Optional: Add PPPS with provocative close ('If you are not sold at this point, I do not feel sorry for you'), 5) Include final order button below PPS."
        domains: ["copywriting", "sales-pages", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-565"
        title: "VSL Pattern Break Slide Method"
        description: "Method for VSL slide construction with pattern breaks: 1) Write most slides with every word displayed, 2) Every 5th-7th slide, switch to paraphrased text only, 3) Paraphrased slide shows summary while voice gives detail, 4) Viewer cannot predict when sentence ends, 5) Creates hypnotic attention through unpredictability, 6) Full paraphrase VSLs also work but are harder to execute."
        domains: ["vsl", "presentation", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-566"
        title: "Comparison Copy Us vs Them Method"
        description: "Method for writing comparison/Us vs Them section: 1) Anchor against known alternatives ('Unlike the Atkins Diet, my book...'), 2) Include one 'Did you know' informative fact about competition, 3) Write 5-8 paragraphs total, 4) Address objections preemptively through comparisons, 5) Make inclusion feel natural — reader joins your tribe by seeing alternatives are worse."
        domains: ["copywriting", "positioning", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-567"
        title: "Guarantee Stack Construction Method"
        description: "Method for building guarantee stack: 1) Choose double or triple guarantee format, 2) Double: Two distinct conditions for refund, 3) Triple: Two serious conditions + one absurd ('even if you just do not like my voice'), 4) Make guarantee graphic if possible, 5) Place after price justification section, 6) Use as risk reversal to push past final resistance."
        domains: ["offer-design", "risk-reversal", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-568"
        title: "Current News Email Hook Method"
        description: "Method for using current events in emails: 1) Find trending news story or event, 2) Connect it to your product/niche with a unique angle, 3) Use the event as subject line or opening hook, 4) Reader perceives email as timely and relevant rather than automated, 5) Works especially well for breaking out of auto-responder monotony."
        domains: ["email-marketing", "relevance", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-569"
        title: "Monkey Mind Marketing Execution Method"
        description: "Method for applying limbic system marketing: 1) Identify the primary fear/pain your avatar wants to avoid, 2) Lead with avoidance modality in headline and opening (75% more effort to avoid pain than gain pleasure), 3) Use emotional triggers before logical ones, 4) Let the prefrontal cortex rationalize after emotional decision is made, 5) Apply 'Read This Book or Die' principle — avoidance modality as attention capture, 6) Confirm purchase with logic on upsell ('You made a wise decision')."
        domains: ["sales-psychology", "neuroscience", "implementation"]
        source: "5MSLF"


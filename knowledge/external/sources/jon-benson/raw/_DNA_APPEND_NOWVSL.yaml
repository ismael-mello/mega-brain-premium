# ═══════════════════════════════════════
# L1_PHILOSOPHIES (NOWVSL) — 35 elements
# ═══════════════════════════════════════

      - id: "FIL-JB-700"
        title: "VSL Is Architecture Not Writing"
        description: "A video sales letter is not a writing exercise — it is an architectural blueprint. Every slide, every word, every pause is placed with surgical intention. The 5-Step VSL Process (Snap Suggestion, Vital Connection, Big Problem, Bigger Solution, Grand Offer) is the roof of the house built on foundational elements."
        domains: ["vsl-architecture", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-701"
        title: "Decision to Desire Is the Core Conversion"
        description: "Your goal is to move your viewers from a state of decision to a state of desire. When you desire something you say 'how much is it? I don't care, just give it to me.' When in decision mode you think 'I wonder if I can afford this.' The entire VSL exists to accomplish this single shift."
        domains: ["sales-psychology", "buyer-behavior", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-702"
        title: "Expert from Necessity Principle"
        description: "You became an expert from necessity, not from choice. Your back was against the wall. This positioning disarms the expert's paradox — the viewer sees you as slightly better off rather than impossibly above them, which builds rapport instead of creating distance."
        domains: ["positioning", "rapport-building", "storytelling"]
        source: "NOWVSL"
      - id: "FIL-JB-703"
        title: "People Want Personality Not Just Information"
        description: "People are not just seeking information — they are seeking personality. With 3 billion new internet users coming, the only thing that will make you stand out is your voice. Your unique style of communication is your ultimate competitive advantage."
        domains: ["branding", "voice", "differentiation"]
        source: "NOWVSL"
      - id: "FIL-JB-704"
        title: "You Can Never Give Away Too Much Information"
        description: "It is almost impossible to give away too much information. Even if you gave away 90% of your content, your prospect would still buy. The buyer assumes that someone giving fantastic free content always has more to offer. Generosity builds trust and reciprocity."
        domains: ["content-strategy", "trust-building", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-705"
        title: "Three States of Every Website Visitor"
        description: "Every person hitting your sales page is in one or more of three states: Disbelief Mode (doubt), Decision Mode (analyzing options), and Discovery Mode (wants to find something new). Your VSL must address all three simultaneously."
        domains: ["buyer-behavior", "sales-psychology", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-706"
        title: "Rapport Is Built Through Vulnerability Not Authority"
        description: "You will never enter a state of rapport with someone who believes you are too far above them. Your job is to convince readers you are only slightly better off than they are. Authority comes later — rapport through vulnerability comes first."
        domains: ["rapport-building", "positioning", "storytelling"]
        source: "NOWVSL"
      - id: "FIL-JB-707"
        title: "Continuation Is Everything in VSL"
        description: "Video sales letters are all about continuation. That is what makes them more powerful than text-based sales pages — you can inspire continuation, you can get people to keep watching. Every technique exists to serve this one purpose."
        domains: ["vsl-architecture", "engagement", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-708"
        title: "Grand Offer Makes or Breaks Everything"
        description: "Without the Grand Offer step, the other four steps are completely in vain. You can have the greatest copy, the most awesome nightmare story, a stellar USP — fail at the grand offer and the video fails. The offer is everything."
        domains: ["offer-design", "vsl-architecture", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-709"
        title: "Ethical Persuasion Is Still Persuasion"
        description: "All of these NLP tricks and psychological techniques are ethical and honest. If your goal is to sell a product that helps people, doing it in any honest way possible is the right path. Dishonest marketing is never acceptable."
        domains: ["ethics", "persuasion", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-710"
        title: "Presentation Beats Video by 25 Percent"
        description: "Using the term 'presentation' instead of 'video' increased VSL conversions by 25%. Small word choices create massive conversion differences. Wordsmithing is not decoration — it is engineering."
        domains: ["copywriting", "conversion-optimization", "testing"]
        source: "NOWVSL"
      - id: "FIL-JB-711"
        title: "Pain Must Be Continuously Reinforced"
        description: "Throughout the entire video sales letter, you must continually remind the reader about their pain. They know they are in pain but they need to be reminded about it. Pain followed by your specific solution is the fundamental selling rhythm."
        domains: ["sales-psychology", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "FIL-JB-712"
        title: "Nightmare Story Is Not Fiction"
        description: "Your nightmare story should not be fiction. It must be true and authentic. Events can be resequenced for dramatic effect like a biopic movie, but the core story must be real. Authenticity is what creates genuine rapport."
        domains: ["storytelling", "authenticity", "rapport-building"]
        source: "NOWVSL"

# --- Batch 2 Philosophies ---

      - id: "FIL-JB-750"
        title: "Lies Are Found Within Your Withouts"
        description: "Your prospect's lies — the misinformation they believe — are found directly within your 'without' statements from your benefit formulas. Each 'without' is a lie the prospect believes they must endure. You expose and dismantle these lies systematically."
        domains: ["copywriting", "persuasion", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-751"
        title: "Four Buyer Modalities Must All Be Addressed"
        description: "There are four buyer modalities: Why, What, How-To, and What-If. Most marketers only speak to one modality. If you focus on only one, you lose 75% of your potential audience. Tips must address all four."
        domains: ["sales-psychology", "buyer-behavior", "tip-formula"]
        source: "NOWVSL"
      - id: "FIL-JB-752"
        title: "Tips Are the Heart of Affiliate Promotion"
        description: "Affiliates want to send to solid content, not pitchy material. The tips section of your VSL is the secret to affiliate success. Without great tips, affiliates will simply promote someone else's product."
        domains: ["affiliate-marketing", "content-strategy", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-753"
        title: "All Tips Build a Funnel Toward Your Product"
        description: "Your tips are leading your prospect to your unified solution found within your product or service. Tips build and build until there is almost no choice but to get your product. The funnel is invisible but inevitable."
        domains: ["tip-formula", "sales-funnels", "persuasion"]
        source: "NOWVSL"
      - id: "FIL-JB-754"
        title: "Inclusion Is the Most Powerful Rapport Tool"
        description: "No one wants to feel left out of the club. When you present your successful users as a club and then say 'here is who will never fit,' the fence-sitters desperately want to join. Inclusion language like 'people like you and me' is immensely powerful."
        domains: ["rapport-building", "persuasion", "nlp"]
        source: "NOWVSL"
      - id: "FIL-JB-755"
        title: "Avoid the Word But in Sales Copy"
        description: "The word 'but' is a stop term in neuro-linguistic programming that halts the reader negatively. Replace with 'yet,' 'however,' or 'and.' 'However' is also an imagination term that provokes the reader's creative mind."
        domains: ["copywriting", "nlp", "wordsmithing"]
        source: "NOWVSL"
      - id: "FIL-JB-756"
        title: "Never Assume What Your Reader Thinks"
        description: "When you say 'I know what you're thinking,' you risk two things: bringing up negative thoughts they weren't having, and offending them by suggesting you can read their minds. Use the 'may or' technique instead: 'You may be thinking X, or perhaps you already know Y.'"
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-757"
        title: "Guarantee Must Be Triple Not Single"
        description: "Solid guarantees increase conversions by 50%. The triple guarantee is far more powerful than a standard guarantee because it addresses three levels of satisfaction, with the third being something ridiculous that breaks the pattern and creates a chuckle."
        domains: ["offer-design", "conversion-optimization", "guarantees"]
        source: "NOWVSL"
      - id: "FIL-JB-758"
        title: "Dont Decide Right Now Is the Ultimate Close Setup"
        description: "Saying 'don't decide right now' is a psychological pattern break that leads into the guarantee. In essence they don't have to decide now — they can decide in 60 days. This reversal is one of the most powerful sales close techniques."
        domains: ["closing-techniques", "sales-psychology", "pattern-interrupts"]
        source: "NOWVSL"
      - id: "FIL-JB-759"
        title: "Good VSLs Become Great at the Grand Offer"
        description: "An okay video sales letter can become a great one purely through the Grand Offer section. There is not a lot of writing skills involved — it is just sequencing. The offer is where all the prior rapport converts to revenue."
        domains: ["vsl-architecture", "offer-design", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-760"
        title: "Investment Not Price in the Close"
        description: "Never say 'your total price' — say 'your total investment.' They are investing in their body, their future, their lives. The word 'investment' reframes the transaction from an expense to an asset."
        domains: ["copywriting", "price-psychology", "framing"]
        source: "NOWVSL"
      - id: "FIL-JB-761"
        title: "Voice Is Your Ultimate Competitive Moat"
        description: "Work on your voice — not the voice you speak with but the way you speak, your style of communication. The people achieving the most success in any industry are those with the most unique, controversial, powerful, explosive voices. No one can duplicate your persona."
        domains: ["branding", "differentiation", "voice"]
        source: "NOWVSL"
      - id: "FIL-JB-762"
        title: "USP Is Foundation of All Marketing Communication"
        description: "Without a properly defined USP, your marketing will miss the target. Your true USP is best defined as how your buyers view your business. If you cater to your buyer's desires and their understanding of what your business is, you will always profit more."
        domains: ["positioning", "usp", "marketing-strategy"]
        source: "NOWVSL"
      - id: "FIL-JB-763"
        title: "Casual Mode to Close Mode Gear Shift"
        description: "The Grand Offer requires a deliberate gear shift from casual mode to close mode. This is when you reintroduce yourself with full credentials and formally present the product. The shift signals the viewer that something important is happening."
        domains: ["vsl-architecture", "closing-techniques", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-764"
        title: "Every Slide Is a Continuation Device"
        description: "Every fifth to seventh slide should use the paraphrase strategy to create pattern breaks. When the viewer cannot predict when the sentence ends, they remain hypnotically glued to the screen. The unpredictability is the engagement mechanism."
        domains: ["vsl-architecture", "engagement", "nlp"]
        source: "NOWVSL"
      - id: "FIL-JB-765"
        title: "Dream Story Belongs to the Viewer Not You"
        description: "Your nightmare story is about you and is used once. Your dream story is about the viewer and is used multiple times throughout the VSL. Dream stories future pace the viewer into their ideal life after purchasing. The after part is the most important aspect."
        domains: ["storytelling", "future-pacing", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-766"
        title: "Buying Is a Gift to Yourself"
        description: "If you imply that when the prospect picks up this product today they are giving a gift to themselves, it does that much more to close the sale. People love gifts. Framing a purchase as self-gifting transforms the transaction emotionally."
        domains: ["sales-psychology", "framing", "closing-techniques"]
        source: "NOWVSL"
      - id: "FIL-JB-767"
        title: "Pain of Inaction Alongside Pleasure of Action"
        description: "Emphasize the pain of inaction alongside the pleasure of action, where the pleasure is future-paced. Tie the pain to inaction explicitly — 'the pain of continuing in a state of inaction will only lead to more despair.' Then pivot to the future-paced pleasure."
        domains: ["persuasion", "future-pacing", "closing-techniques"]
        source: "NOWVSL"
      - id: "FIL-JB-768"
        title: "Survey Your Audience Never Assume Desires"
        description: "Do not assume you know what your audience wants most. Survey your list, your Facebook fans, your friends. In weight loss, we found that confidence was a huge spike — not just losing weight. Find out the real desire through direct research."
        domains: ["market-research", "audience-insight", "positioning"]
        source: "NOWVSL"

# --- Batch 3 Philosophies ---

      - id: "FIL-JB-800"
        title: "Open Loops Are Verbal Foreplay"
        description: "Think of open loops as verbal foreplay. You are building anticipation and the climax is the sale. If you tell a joke and stop before the punchline, everyone desperately wants to hear it. That is what open loops do throughout your VSL."
        domains: ["copywriting", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "FIL-JB-801"
        title: "Creative Writing Is Just Knowing a Formula"
        description: "Most creative writing is just knowing a formula. The nightmare story, the dream story, the tips — all have specific formulas. Once you know the formula, the writing becomes mechanical, not artistic. Anyone can create compelling sales copy with the right system."
        domains: ["copywriting", "systems-thinking", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-802"
        title: "Rapport Building Never Stops Throughout VSL"
        description: "Rapport is not built once and forgotten. You continuously build, deepen, and reinforce rapport at every stage: the nightmare story, the lies section, the tips, even the guarantee. Each section has rapport-building elements woven in."
        domains: ["rapport-building", "vsl-architecture", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-803"
        title: "This Course Is Not About Perfect Grammar"
        description: "This course is not about creating a VSL with perfect grammar. It is about creating a VSL that makes you money. 'And' at the beginning of a sentence is not ideal grammar and it does not matter. Conversion trumps correctness."
        domains: ["copywriting", "conversion-optimization", "pragmatism"]
        source: "NOWVSL"
      - id: "FIL-JB-804"
        title: "Scarcity Must Be Real and Specific"
        description: "Provide three compelling reasons to act right now using real scarcity. Threaten the price raise, cap membership quota on bonuses, and remind them that procrastination turns days into months into years. Make the cost of inaction tangible."
        domains: ["scarcity", "urgency", "closing-techniques"]
        source: "NOWVSL"
      - id: "FIL-JB-805"
        title: "Pictures Come After Rapport Not Before"
        description: "Do not use pictures of yourself or your product early in the VSL. You have not built rapport yet. Once they hear your nightmare story and see what you have been through, then the picture carries meaning. Social proof logos are acceptable early; personal photos are not."
        domains: ["vsl-architecture", "rapport-building", "social-proof"]
        source: "NOWVSL"
      - id: "FIL-JB-806"
        title: "Anchoring Creates Perceived Fame"
        description: "When you compare your product to something famous — Atkins, Body for Life, Four Hour Body — the brain automatically assigns equal fame, quality, and credibility to your product. This is proactive anchoring."
        domains: ["positioning", "nlp", "comparison-marketing"]
        source: "NOWVSL"
      - id: "FIL-JB-807"
        title: "Aha Moments Are the Core of Tips"
        description: "The heart of a great tip is the aha moment — the part of time in their life where they go 'wow, I did not know that.' Once you give someone knowledge, they cannot unknow it. That creates an obligation to apply it, which leads them to your product."
        domains: ["content-strategy", "tip-formula", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-808"
        title: "Desire to Reciprocate Drives Purchases"
        description: "When you deliver benefits for free, your prospect has a natural tendency to want to give back. That is human nature. Free valuable tips create a reciprocity loop that makes the purchase feel like returning a favor, not spending money."
        domains: ["reciprocity", "sales-psychology", "persuasion"]
        source: "NOWVSL"
      - id: "FIL-JB-809"
        title: "Future Pacing Must Be Present Tense"
        description: "Future pacing in present tense is more powerful than future tense. Say 'you feel alive' not 'you will feel alive.' Say 'you see the weight coming off today' — today is a day in the future but is not worded that way. Present tense creates immediate identification."
        domains: ["copywriting", "nlp", "future-pacing"]
        source: "NOWVSL"
      - id: "FIL-JB-810"
        title: "One Sentence Per Slide Hypnotic Effect"
        description: "Limit 90% of your slides to only one sentence followed by ellipses. When slides go by quickly with one sentence at a time, it creates a hypnotic effect. People are listening to what you say while being slightly hypnotized by what they see."
        domains: ["vsl-architecture", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "FIL-JB-811"
        title: "Selling Solutions Not Products"
        description: "You may think that you are selling a service or a book. You are selling a solution. The product is a solution to a problem. That word 'solution' is critical to understand because it changes how you position everything in your VSL."
        domains: ["positioning", "offer-design", "marketing-strategy"]
        source: "NOWVSL"
      - id: "FIL-JB-812"
        title: "The Experts Paradox Must Be Resolved"
        description: "The experts paradox: at some point you must make a case for being an expert, but first you must position yourself as someone who went through a horrendous story that relates to what your user feels. Authority follows vulnerability."
        domains: ["positioning", "storytelling", "rapport-building"]
        source: "NOWVSL"
      - id: "FIL-JB-813"
        title: "Comparisons Two Serious Two Funny"
        description: "Use four comparisons in your VSL: two serious and two funny. Serious comparisons anchor to famous products or contrast negative vs positive emotional states. Funny comparisons are lighthearted analogies that cause the reader to crack a smile and break the pattern."
        domains: ["copywriting", "comparison-marketing", "engagement"]
        source: "NOWVSL"
      - id: "FIL-JB-814"
        title: "Avoid Trite Comparisons at All Costs"
        description: "Comparing your website to 'white on rice' for stickiness is trite and awful. Instead create witty, unexpected comparisons like 'a diet easier to follow than a two-step map to buried treasure.' Trite kills conversion; wit creates memorability."
        domains: ["copywriting", "wordsmithing", "differentiation"]
        source: "NOWVSL"
      - id: "FIL-JB-815"
        title: "I Dont Want This For You Deepens Rapport"
        description: "Saying 'this is not what I want for you — I know it is not what you desire for yourself' deepens rapport profoundly. When someone tells you they want something better for you, you feel a deeper connection. This technique works on total strangers through clever language."
        domains: ["rapport-building", "copywriting", "sales-psychology"]
        source: "NOWVSL"

# ═══════════════════════════════════════
# L2_MENTAL_MODELS (NOWVSL) — 30 elements
# ═══════════════════════════════════════

      - id: "MM-JB-700"
        title: "Three Brain Evolutionary Model"
        description: "The brain exists in three evolutionary stages: the amygdala (primitive lizard fears), the emotional brain (higher emotions), and the prefrontal cortex (rational/creative mind). Poor connection between them explains irrational buying decisions. VSL techniques tap into all three."
        domains: ["sales-psychology", "neuroscience", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-701"
        title: "1-2-3 Formula Model"
        description: "Every top-performing VSL contains four elements: 1 USP, 2 Stories (Nightmare + Dream), 3 Tips (Avoid + Enjoy + How-To), and 4 Comparisons (2 Serious + 2 Funny). This is the skeletal structure that all content hangs upon."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "MM-JB-702"
        title: "5-Step VSL Process Model"
        description: "The complete VSL follows five sequential steps: Step 1 Snap Suggestion (pattern interrupt + big promise), Step 2 Vital Connection (nightmare story + rapport), Step 3 Big Problem (lies + conspiracy), Step 4 Bigger Solution (tips), Step 5 Grand Offer (product + price + CTA + pain/pleasure + actions/results + Q&A)."
        domains: ["vsl-architecture", "copywriting", "sales-funnels"]
        source: "NOWVSL"
      - id: "MM-JB-703"
        title: "NLP Suggestion Pattern Model"
        description: "Pattern interrupt primes the mind for suggestion, just like hypnosis works. You scratch the vinyl record of their mental pattern, the brain opens to a suggestion, then you give a benign suggestion: 'watch this presentation until the end.' The state of openness is temporary."
        domains: ["nlp", "persuasion", "pattern-interrupts"]
        source: "NOWVSL"
      - id: "MM-JB-704"
        title: "Open Loop Psychology Model"
        description: "An open loop is an NLP technique where you start a thought and promise to finish it later. The user's mind goes 'I want that sentence to finish — I am going to stick around.' Like a joke told without its punchline, incomplete patterns demand resolution."
        domains: ["nlp", "engagement", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-705"
        title: "USP Power-Benefit-Enabler Model"
        description: "A perfect USP contains three elements: a Power Phrase (exclusive intro like 'the only'), a Prime Benefit (what it does best), and an Enabler Phrase (what it enables them to do — always a verb). Under 20 words total."
        domains: ["usp", "positioning", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-706"
        title: "Headline Benefit Formula"
        description: "Power Word + Outrageous Result - Public Enemy #1. Example: '3 ways to lose weight quickly and easily without giving up your favorite foods or spending hours doing cardio.' This formula works for any headline, benefit statement, or big promise."
        domains: ["copywriting", "headlines", "formulas"]
        source: "NOWVSL"
      - id: "MM-JB-707"
        title: "Faux Price Anchoring Model"
        description: "Anchor a price 2-3x higher than actual before revealing bonuses. Say 'valued at $97' then describe what is included. Before revealing the real price, stack faux price plus bonus value, then perform a three-step price dropdown. Each drop triggers deal receptors in the brain."
        domains: ["price-psychology", "anchoring", "offer-design"]
        source: "NOWVSL"
      - id: "MM-JB-708"
        title: "Subliminal Highlighting Model"
        description: "Highlight specific words in red throughout the VSL to prompt the subconscious: easy, fun, simple, superior, proven, yes, buy, now. Across three slides spell Y-E-S / B-U-Y / N-O-W. Consciously few readers notice the pattern; subconsciously they absorb the command."
        domains: ["nlp", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-709"
        title: "Action Drop Model"
        description: "Action drops bring the reader's focus back to the present moment using words like Today, Now, See, Listen, Actually. These appear at the beginning of sentences and trigger immediate engagement. 'Now, I have to warn you' is far more powerful than 'I have to warn you.'"
        domains: ["nlp", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "MM-JB-710"
        title: "Product Pacing Model"
        description: "Always assume the prospect has or is about to purchase. Say 'When you purchase today, you will want to turn immediately to page 37' — never 'If you purchase.' This future paces the ownership experience and makes the purchase feel inevitable."
        domains: ["future-pacing", "closing-techniques", "nlp"]
        source: "NOWVSL"
      - id: "MM-JB-711"
        title: "Pre-Qualification Exclusion Model"
        description: "Say 'let me tell you who would never fit as a customer' and list people who will never work with your product. This kicks tire-kickers out while making fence-sitters desperately want to join the success club. No one wants to feel left out."
        domains: ["qualification", "sales-psychology", "positioning"]
        source: "NOWVSL"

# --- Batch 2 Mental Models ---

      - id: "MM-JB-750"
        title: "Big Lie Loop Model"
        description: "Discover the lie (from your 'without' statements), describe the lie, label it as false, show the painful results of believing the lie, say 'this is not what I want for you,' then transition to the truth. This six-part loop dismantles false beliefs systematically."
        domains: ["persuasion", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-751"
        title: "Tip Funnel Model"
        description: "Tips build a funnel toward the unified solution: Avoid Tip (addresses Why modality, amygdala), Enjoy Tip (addresses What-If modality, emotions), How-To Tip (addresses What/How modalities, logic). The How-To is last because it walks the user directly into the offer."
        domains: ["tip-formula", "sales-funnels", "buyer-behavior"]
        source: "NOWVSL"
      - id: "MM-JB-752"
        title: "Tip Formula Six-Step Model"
        description: "The tip formula follows six steps: 1) Benefit (why listen), 2) Why do it (two sentences max), 3) What is it (the driving force with coined phrase), 4) How to do it (2-3 steps), 5) Result (what happens after), 6) Mini Dream Story (1-2 sentences of future pacing)."
        domains: ["tip-formula", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-753"
        title: "Vague But Useful Tip Design"
        description: "Make tips helpful but incomplete. Use phrases like 'if you do this at the right time' or 'if you know exactly what to say.' The vague element creates curiosity while the useful element builds trust. The missing details are found in your product."
        domains: ["tip-formula", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "MM-JB-754"
        title: "Grand Offer Six-Part Architecture"
        description: "The Grand Offer has six parts: Part 1 The Product (formal intro, USP restate, hero study, testimonials, content, price tease), Part 2 The Price (faux price, bonuses, cost of loss, dropdown, reveal, guarantee), Part 3 CTA, Part 4 Pain & Pleasure, Part 5 Actions & Results, Part 6 Q&A."
        domains: ["vsl-architecture", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "MM-JB-755"
        title: "Nightmare Story Formula Model"
        description: "The nightmare story follows a specific formula: introduction of setting, escalating discomfort, a focal point (the rock-bottom moment), a declaration of independence, and transition to the solution. Events can be resequenced but must be authentic."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-756"
        title: "Dream Story Formula Model"
        description: "The dream story uses: Follow the Leader (imagine this), Specific You and General They, Transition Phrase, Present Tense Promise. It engages the right brain creative part, temporarily disengaging decision mode and putting the reader into desire mode."
        domains: ["storytelling", "future-pacing", "nlp"]
        source: "NOWVSL"
      - id: "MM-JB-757"
        title: "Wordsmithing Three-Level Model"
        description: "Level 1 Bad: 'Product is really good if you want to make money.' Level 2 Better: 'Product is ideal if you really want to make money.' Level 3 Supreme: 'Product is ideally positioned to empower you to make a truckload of cash faster than ever.' Replace bland words with power words at each level."
        domains: ["copywriting", "wordsmithing", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-758"
        title: "Anchoring Through Comparison Model"
        description: "Take something popular and anchor it to something within your product. This is proactive NLP anchoring — creating an association without the user knowing. Like 'Don't Stop Believing' anchored to high school, you anchor your product to something already valued."
        domains: ["nlp", "positioning", "comparison-marketing"]
        source: "NOWVSL"
      - id: "MM-JB-759"
        title: "Pain Then Pleasure Principle"
        description: "Always reinforce the prospect's pain and follow with your specific solution — not a solution, YOUR specific solution. The rhythm is: pain state, reminder, specific solution. This creates the cognitive pattern that your product is the only logical relief."
        domains: ["sales-psychology", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-760"
        title: "Emotional State Comparison Model"
        description: "Compare the negative emotional state of not having your product with the positive emotional state of having it. From 'dreading your closet and hating that your clothes don't fit' to 'absolutely loving your closet and wearing them with comfort and style.' This is the emotional comparison."
        domains: ["comparison-marketing", "sales-psychology", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-761"
        title: "Modest Introduction Model"
        description: "List credentials and expertise modestly: 'I wasn't always a best-selling author and certainly wasn't always a guy you'd see on the cover of a magazine.' The modest intro sets up the nightmare story. Use social proof logos early but hold personal photos until after rapport is built."
        domains: ["positioning", "rapport-building", "social-proof"]
        source: "NOWVSL"
      - id: "MM-JB-762"
        title: "Triple Pattern Interrupt Model"
        description: "Use three successive pattern interrupts at the start of a VSL to crack open the viewer's attention: a visual interrupt (something unexpected on screen), a verbal interrupt (provocative statement), and a conceptual interrupt (surprising fact or statistic)."
        domains: ["pattern-interrupts", "nlp", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-763"
        title: "Three-Step Price Dropdown Model"
        description: "Start with the highest price mentioned in the video (faux price + bonus value), then step down three times to the actual price. 'You will not be paying $217. Not even half that. Not even $67. Your total investment today is only one payment of just $47.' Each drop triggers excitement."
        domains: ["price-psychology", "closing-techniques", "offer-design"]
        source: "NOWVSL"
      - id: "MM-JB-764"
        title: "May Or Technique Model"
        description: "Instead of assuming what the reader thinks, use the 'may or' construction: 'Now you may be thinking that you've heard this before, or perhaps you already know that this is something totally new and different.' This avoids offense while guiding their thought process."
        domains: ["copywriting", "nlp", "rapport-building"]
        source: "NOWVSL"

# --- Batch 3 Mental Models ---

      - id: "MM-JB-800"
        title: "Focal Point Story Architecture"
        description: "Every nightmare story needs a focal point — the single most embarrassing or shocking moment. In Jon's case it was stealing donuts. Everything before builds toward this point, everything after responds to it. The focal point creates maximum emotional impact."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-801"
        title: "External Rapport Building Model"
        description: "Build rapport by comparing yourself to something far below what most people would consider acceptable. 'I was addicted to sugar — my crack was different but the addiction was the same.' This makes the viewer think 'that person was even worse off than me.'"
        domains: ["rapport-building", "storytelling", "sales-psychology"]
        source: "NOWVSL"
      - id: "MM-JB-802"
        title: "Positioning Anchor Within Story Model"
        description: "Place anchors inside the nightmare story itself — physical objects that tie back to the narrative. The forgotten coat ties to the wallet ties to the theft ties to the rock bottom moment. Each object creates a memory hook that makes the story unforgettable."
        domains: ["storytelling", "nlp", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-803"
        title: "Imagine This NLP Command Model"
        description: "'Imagine this' is an NLP command that literally prompts someone to imagine whatever follows. It takes them out of the logical brain into the visualization brain. Once the right brain engages, the decision-making left brain temporarily disengages."
        domains: ["nlp", "future-pacing", "sales-psychology"]
        source: "NOWVSL"
      - id: "MM-JB-804"
        title: "Walk With Me Dual-Mode Engagement"
        description: "'Walk with me for a moment as we imagine' combines physical (walk) and mental (imagine) engagement simultaneously. The 'we' statement creates shared experience. This is an advanced NLP technique creating physical-mental dichotomy."
        domains: ["nlp", "engagement", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-805"
        title: "Tip Failure Chain Model"
        description: "If tips fail, everything else in the whole VSL fails. Poor tips cause: conversions dropping to nothing, no viral sharing, affiliates refusing to promote, viewers thinking you are disingenuous, and your message never reaching the world."
        domains: ["tip-formula", "conversion-optimization", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-806"
        title: "How-To Tip as Unified Solution Funnel"
        description: "The How-To tip is the linchpin — all other tips actually fail for the user without this one. Position it so that the avoid and enjoy tips build dependency on the how-to. Say 'if you don't do this, everything else is worthless.' This creates unstoppable momentum toward the product."
        domains: ["tip-formula", "sales-funnels", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-807"
        title: "Amygdala Activation Through Avoid Tips"
        description: "The word 'avoid' creates a strong visceral reaction because it taps into the amygdala — the primitive brain. 'Caution' and 'warning' trigger evolutionary survival responses. People want to watch the avoid tip because it is for their own safety."
        domains: ["neuroscience", "sales-psychology", "tip-formula"]
        source: "NOWVSL"
      - id: "MM-JB-808"
        title: "One Payment Framing Model"
        description: "Say 'only one payment of just $47' instead of just 'only $47.' People have been conditioned by QVC and subscription services to think in terms of multiple payments. Emphasizing 'one payment' triggers relief and perceived value."
        domains: ["price-psychology", "framing", "closing-techniques"]
        source: "NOWVSL"
      - id: "MM-JB-809"
        title: "Three Reasons to Act Now Model"
        description: "Provide exactly three compelling reasons for immediate action: 1) Price will be raised back to where it deserves, 2) Super bonus membership will cap out, 3) Without action today you may procrastinate forever — days turn to months turn to years."
        domains: ["urgency", "scarcity", "closing-techniques"]
        source: "NOWVSL"
      - id: "MM-JB-810"
        title: "Video Scarcity Model"
        description: "Create urgency within the video itself by implying this offer is exclusive to this presentation. The presentation discount price is only available through watching this video. This ties scarcity to the viewing experience rather than just the product."
        domains: ["scarcity", "vsl-architecture", "conversion-optimization"]
        source: "NOWVSL"
      - id: "MM-JB-811"
        title: "Remember as Subconscious Trigger"
        description: "Starting a slide with 'Remember' activates subconscious recall of all the pain points established earlier. It is a single word that resurrects the entire emotional journey the viewer has been on, priming them for the final push."
        domains: ["nlp", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "MM-JB-812"
        title: "Skinny Jeans Universal Desire Model"
        description: "Find the one literal example that almost everyone in your market can relate to. In weight loss it is 'fitting into your high school skinny jeans.' Every market has its equivalent universal desire object. Use this specific tangible image in dream stories."
        domains: ["copywriting", "audience-insight", "future-pacing"]
        source: "NOWVSL"
      - id: "MM-JB-813"
        title: "Super Bonus Strategic Timing Model"
        description: "The super bonus is introduced after the main bonuses and price reveal. It serves as a 'golden ticket' that creates an additional reason to act now and can be used as a scarcity mechanism by capping membership."
        domains: ["offer-design", "bonuses", "scarcity"]
        source: "NOWVSL"
      - id: "MM-JB-814"
        title: "Checkout Process Optimization Model"
        description: "The CTA must include specific instructions: what color the button is, what text it says, and what happens after clicking. Give timeline for delivery. If digital: 'immediate access.' If physical: delivery estimate. Specificity reduces friction."
        domains: ["conversion-optimization", "cta-design", "vsl-architecture"]
        source: "NOWVSL"

# ═══════════════════════════════════════
# L3_HEURISTICS (NOWVSL) — 79 elements
# ═══════════════════════════════════════

      - id: "HEUR-JB-750"
        title: "Paraphrase Every 5-7 Slides"
        description: "Every 5th to 7th slide, break the pattern from using every word on screen to only a paraphrased version. This keeps viewers hypnotically glued because they cannot predict when the sentence will end."
        domains: ["vsl-architecture", "engagement", "formatting"]
        source: "NOWVSL"
      - id: "HEUR-JB-751"
        title: "90 Percent One Sentence Per Slide"
        description: "Limit 90% of your slides to only one sentence followed by ellipses. The remaining 10% can have multi-line content. When slides go by quickly with one sentence each, it creates a hypnotic effect."
        domains: ["vsl-architecture", "formatting", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-752"
        title: "Faux Price 2-3x Higher Than Actual"
        description: "Anchor a faux price that is 2-3 times higher than the actual price. For a $47 product, say 'valued at $97.' This anchors a higher number in the brain so the actual price feels like a steal."
        domains: ["price-psychology", "anchoring", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-753"
        title: "Optimal VSL Length 28-36 Minutes"
        description: "The ideal time for video sales letters is 28 to 36 minutes. Longer VSLs (even 90 minutes) can convert depending on the price point. Do not worry about time — worry about content quality."
        domains: ["vsl-architecture", "formatting", "conversion-optimization"]
        source: "NOWVSL"
      - id: "HEUR-JB-754"
        title: "USP Under 20 Words Rule"
        description: "Take your second and third problem solvers, form all three into one sentence under 20 words, and use one of them as your enabler verb. Example: 'The only lifestyle eating plan that allows you to eat all your favorite foods and still lose weight.'"
        domains: ["usp", "copywriting", "positioning"]
        source: "NOWVSL"
      - id: "HEUR-JB-755"
        title: "Always Use Without Instead of Negatives"
        description: "The word 'without' is extremely powerful in headlines and benefits. It subtracts the public enemy from the promise. 'Lose weight without giving up your favorite foods' is far more compelling than listing what you have to give up."
        domains: ["copywriting", "headlines", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-756"
        title: "Triple Guarantee Three Levels Plus Ridiculous"
        description: "Structure guarantee in three tiers: Level 1 (broad promise, 60 days), Level 2 (specific metric, 30 days), Level 3 (something ridiculous like 'even if you don't like the font'). The third level creates a pattern break and humor."
        domains: ["guarantees", "offer-design", "conversion-optimization"]
        source: "NOWVSL"
      - id: "HEUR-JB-757"
        title: "Guarantee Increases Conversions 50 Percent"
        description: "Solid guarantees increase conversions by 50%. The most effective is triple-your-money-back (if you can afford refunds), followed by the triple guarantee. Always include guarantee seals and security graphics."
        domains: ["guarantees", "conversion-optimization", "trust-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-758"
        title: "Three Tips Minimum per VSL"
        description: "Include at least three tips: Avoid (amygdala trigger), Enjoy (emotional anchor), and How-To (logical pull). You can use more, but three is the optimal number. The How-To tip must always be last."
        domains: ["tip-formula", "vsl-architecture", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-759"
        title: "How-To Tip Always Last Position"
        description: "The How-To tip must always come last because it appeals to the logical brain asking 'just tell me how to do it.' After the how-to, you transition directly to 'the only way I can show you all of this is through this product.' It bridges directly to the offer."
        domains: ["tip-formula", "vsl-architecture", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-760"
        title: "Tips 2-5 Sentences Maximum"
        description: "Keep each tip to 2-5 sentences at most. Going over creates overwhelm. If the viewer cannot handle the first tip, they will assume the product is equally overwhelming. Brevity builds confidence."
        domains: ["tip-formula", "copywriting", "formatting"]
        source: "NOWVSL"
      - id: "HEUR-JB-761"
        title: "Four Comparisons Two Serious Two Funny"
        description: "Use four comparisons: two serious (anchor to famous product or contrast emotional states) and two funny (witty analogy that causes a smile). This is not carved in stone but the 2+2 formula is optimal."
        domains: ["comparison-marketing", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "HEUR-JB-762"
        title: "Red Highlighting for Subliminal Words"
        description: "Highlight power words in red: easy, fun, simple, superior, proven, yes, buy, now, desire, strong, truth, change, quick. Across three consecutive slides, spell out YES-BUY-NOW. Conscious mind notices red; subconscious absorbs the command."
        domains: ["nlp", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-763"
        title: "Action Drop at Sentence Beginning"
        description: "Place action drops (Today, Now, See, Listen, Actually) at the beginning of sentences to trigger present-moment engagement. 'Now I have to warn you' outperforms 'I have to warn you' significantly."
        domains: ["copywriting", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "HEUR-JB-764"
        title: "Anchor Drop with Yet for Continuation"
        description: "End a slide with 'yet' to create an anchor drop — no one will stop watching when a sentence ends with 'yet.' It forward-paces them into the next slide. This creates irresistible continuation momentum."
        domains: ["copywriting", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "HEUR-JB-765"
        title: "Never Use If You Purchase Use When"
        description: "Always say 'when you purchase today' never 'if you purchase.' 'When' assumes the purchase will happen. 'If' introduces doubt. This single word change creates product pacing that assumes ownership."
        domains: ["copywriting", "closing-techniques", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-766"
        title: "Three Price Drops Before Reveal"
        description: "Perform three price drops before revealing the actual price. Start at the highest mentioned value ($217), drop to half ($109), drop again ($67), then reveal ('only one payment of just $47'). Each drop triggers deal-seeking dopamine."
        domains: ["price-psychology", "closing-techniques", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-767"
        title: "Use Investment Not Price"
        description: "Always say 'your total investment today' instead of 'your total price.' Investment implies value-building; price implies expense. This reframes the entire financial transaction."
        domains: ["copywriting", "price-psychology", "framing"]
        source: "NOWVSL"
      - id: "HEUR-JB-768"
        title: "One Payment Emphasis for Digital Products"
        description: "Say 'only one payment of just $X' instead of 'only $X.' People conditioned by subscription models hear 'one payment' and feel relief. The emphasis on 'one' reduces perceived financial risk."
        domains: ["price-psychology", "closing-techniques", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-769"
        title: "Watch Until the End Command"
        description: "Use 'watch this presentation until the end and you will also discover' as the core suggestion after the pattern interrupt. The word 'presentation' converts 25% better than 'video.' This single phrase is the foundation of VSL continuation."
        domains: ["vsl-architecture", "engagement", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-770"
        title: "Replace But with Yet However And"
        description: "Replace every instance of 'but' with 'yet,' 'however,' or 'and.' 'But' is a stop term that creates negative friction. 'However' is an imagination term. 'And' is an addition statement that implies more value."
        domains: ["copywriting", "nlp", "wordsmithing"]
        source: "NOWVSL"
      - id: "HEUR-JB-771"
        title: "Inclusion Phrases Throughout VSL"
        description: "Use inclusion language throughout: 'people like you and me,' 'folks like us,' 'if you are one of the millions.' Inclusion builds rapport and makes the viewer feel part of a community rather than being sold to."
        domains: ["rapport-building", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-772"
        title: "No Pictures Before Rapport Is Built"
        description: "Do not use pictures of yourself or product results in the first half of the VSL. Social proof logos (magazine logos, network logos) are acceptable. Personal photos gain meaning only after the nightmare story establishes vulnerability."
        domains: ["vsl-architecture", "social-proof", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-773"
        title: "Nightmare Story One Time Only"
        description: "The nightmare story is told once. The dream story can be used multiple times throughout the VSL. The nightmare is about you; the dream is about them. This asymmetry is fundamental to VSL structure."
        domains: ["storytelling", "vsl-architecture", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-774"
        title: "Power Words in Every Headline"
        description: "Always include power words in headlines: quickly, easily, revealed, new, scientifically proven, discover. Anything with a number is powerful ('3 ways,' '7 tips'). Power words are the spice that transforms bland copy into compelling hooks."
        domains: ["headlines", "copywriting", "persuasion"]
        source: "NOWVSL"

# --- Batch 2 Heuristics ---

      - id: "HEUR-JB-800"
        title: "Lies Come from Without Statements"
        description: "Your prospect's lies are found in your 'without' statements from the benefit formula. 'Without starving yourself skinny' means the lie is 'you have to starve to be skinny.' Each without reveals a dismantleable false belief."
        domains: ["copywriting", "persuasion", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-801"
        title: "Label Lies as False Simply"
        description: "After describing the lie, simply negate it: 'That is not even close to the truth.' Wordsmith if desired but the basic mechanism is just 'that is not true.' Highlight 'the truth' in red for subliminal reinforcement."
        domains: ["copywriting", "persuasion", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-802"
        title: "Mini Nightmare Story for Each Lie"
        description: "After labeling the lie as false, paint a vivid picture of the consequences of believing the lie using present-tense future pacing. 'Your metabolism slows to a snail's pace, halting all weight loss dead in its tracks.' This is a mini nightmare story per lie."
        domains: ["storytelling", "persuasion", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-803"
        title: "Avoid Tips Address Why Modality"
        description: "Avoid tips specifically address the Why buyer modality — 'why does this work? why am I like this?' The amygdala response to avoidance language hooks the Why thinkers."
        domains: ["tip-formula", "buyer-behavior", "sales-psychology"]
        source: "NOWVSL"
      - id: "HEUR-JB-804"
        title: "Enjoy Tips Address What-If Modality"
        description: "Enjoy tips address the What-If buyer modality — 'what if I could enjoy this process?' The enjoy tip is the most challenging to write but taps into higher emotional states."
        domains: ["tip-formula", "buyer-behavior", "sales-psychology"]
        source: "NOWVSL"
      - id: "HEUR-JB-805"
        title: "How-To Tips Address What and How Modalities"
        description: "How-To tips cover both the What and How-To buyer modalities simultaneously. Step-oriented thinkers need 'what is it' and 'how do I do it.' These are the logical, practical modalities."
        domains: ["tip-formula", "buyer-behavior", "sales-psychology"]
        source: "NOWVSL"
      - id: "HEUR-JB-806"
        title: "Tip Step Structure First-Why-Result"
        description: "Within each tip's how-to section, follow the step structure: 'First you do this, here is why you do it, here is the result.' This three-part structure makes even complex tips feel simple and actionable."
        domains: ["tip-formula", "copywriting", "formatting"]
        source: "NOWVSL"
      - id: "HEUR-JB-807"
        title: "Coin a Phrase in the What-Is-It Step"
        description: "The 'what is it' step of the tip formula is the ideal place to coin a trademarked phrase anchored to your product. If your concept is not unique, a coined phrase makes it unique. Example: 'Caloric Staggering Principle.'"
        domains: ["copywriting", "branding", "positioning"]
        source: "NOWVSL"
      - id: "HEUR-JB-808"
        title: "Mini Dream Story 1-2 Sentences Only"
        description: "End each tip with a mini dream story of only 1-2 sentences: 'Imagine being able to eat the right foods and lose weight effortlessly.' Focus on one key aspect the reader can relate to. Do not ask them to absorb too much."
        domains: ["future-pacing", "tip-formula", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-809"
        title: "Prime Benefit Equals How-To Tip"
        description: "Your How-To tip must relate directly to your USP's primary benefit. The main thing your product does best becomes the subject of the most important tip. This creates perfect alignment between content and offer."
        domains: ["tip-formula", "usp", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-810"
        title: "Tip Mistakes Kill Conversions"
        description: "Three tip design mistakes: 1) Too much detail causes overwhelm, 2) Complex/difficult tips lose prospects to easier solutions, 3) Obvious teases without proper open loops feel cheating. Avoid all three to maintain rapport."
        domains: ["tip-formula", "conversion-optimization", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-811"
        title: "Formal Reintroduction with Full Credentials"
        description: "At the Grand Offer start, reintroduce yourself with full name and credentials: 'Hi, I'm Jon Benson, creator of the Every Other Day Diet.' This gear shift from casual to close mode signals the transition to the pitch."
        domains: ["vsl-architecture", "closing-techniques", "positioning"]
        source: "NOWVSL"
      - id: "HEUR-JB-812"
        title: "Works Even If Section Before Testimonials"
        description: "Include a 'works even if' section before testimonials: 'Works even if you have no experience, even if you have tried everything before, even if you have limited time.' This preemptively handles objections and widens the market."
        domains: ["objection-handling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-813"
        title: "What It Isnt Section for Positioning"
        description: "Include a 'what it isn't' section to differentiate from competitors and address misconceptions: 'This is not another fad diet. This is not a pill. This is not something that requires hours at the gym.' Negation sharpens positioning."
        domains: ["positioning", "differentiation", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-814"
        title: "Hero Study Before Testimonials"
        description: "Include a hero study — one detailed success story — before the batch of shorter testimonials. The hero study provides depth and believability that multiple brief testimonials cannot achieve alone."
        domains: ["social-proof", "storytelling", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-815"
        title: "Cost of Loss Before Price Reveal"
        description: "Before revealing the price, calculate the cost of NOT buying: 'What is the cost of continued weight gain? Lost confidence? Medical bills? Missed opportunities?' Make inaction more expensive than the product."
        domains: ["price-psychology", "persuasion", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-816"
        title: "Reason for Discount Must Be Believable"
        description: "Always provide a reason for the discount: 'Because this is a presentation-only offer,' 'Because I want to build my testimonial base,' 'Because it is a cause I believe in.' Unexplained discounts reduce credibility."
        domains: ["price-psychology", "credibility", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-817"
        title: "CTA Click Orange Button Specificity"
        description: "Call to action must be hyper-specific: 'Click on the orange button that says add to cart to claim your discounted price now.' Name the button color, the button text, and the outcome. Specificity reduces decision friction."
        domains: ["cta-design", "conversion-optimization", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-818"
        title: "Second CTA with Delivery Timeline"
        description: "Use a second CTA that emphasizes delivery timeline: 'You will be granted immediate access to everything' for digital, or specific shipping estimate for physical. Timeline emphasis increases urgency."
        domains: ["cta-design", "urgency", "conversion-optimization"]
        source: "NOWVSL"
      - id: "HEUR-JB-819"
        title: "Re-mention Super Bonus in CTA"
        description: "In the CTA section, re-mention the super bonus: 'plus your free virtual trainer bonus worth $97 just for taking immediate action today.' This reinforces the exclusive value at the decision point."
        domains: ["bonuses", "closing-techniques", "cta-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-820"
        title: "Remember Slide Reopens Pain"
        description: "Start the pain/pleasure section with 'Remember' followed by pain reinforcement: 'Remember, you have been struggling with your weight loss for far too long.' The word 'remember' activates all prior emotional anchors."
        domains: ["copywriting", "nlp", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-821"
        title: "Yet All Of This Can Change Pivot"
        description: "After the pain reminder, pivot with 'Yet all of this can change the moment you begin applying the quick start principles.' 'Yet' transitions from despair to hope. Pick a specific feature name for the 'quick start' reference."
        domains: ["copywriting", "future-pacing", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-822"
        title: "Picture Command for Final Dream Story"
        description: "Use 'Picture the moment you finally have the answer you have been looking for' to set up the final dream story. 'Picture' clicks the mind out of decision mode and into future pacing mode."
        domains: ["nlp", "future-pacing", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-823"
        title: "Three Scarcity Reasons Structure"
        description: "Provide exactly three reasons to act now: 1) Price will be raised, 2) Bonus membership will cap, 3) Procrastination turns days into months into years. Each reason addresses a different psychological pressure point."
        domains: ["scarcity", "urgency", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-824"
        title: "Lets Make Sure You Get What You Want Close"
        description: "End the scarcity section with 'So let us make sure you get what you really want.' This reframes the decision from spending money to getting what they deserve. It is warm, not pushy."
        domains: ["closing-techniques", "copywriting", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-825"
        title: "Future Paced Actions Before Final Push"
        description: "Before the final closing push, describe specific actions the buyer will take after purchase: 'Turn immediately to page 37,' 'Watch module 3 first,' 'Call our support team.' This assumes the purchase and makes it feel real."
        domains: ["future-pacing", "closing-techniques", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-826"
        title: "You Feel Alive Present Tense Close"
        description: "In the final dream story, use strict present tense: 'You feel alive, full of hope and optimism. You see the weight coming off in the bathroom mirror today.' Today is a future day but is worded as present reality."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-827"
        title: "Q&A Section Handles Remaining Objections"
        description: "The Q&A section at the end of the Grand Offer addresses common questions and remaining objections. Format as genuine questions from real students. This provides social proof that others had the same concerns and found resolution."
        domains: ["objection-handling", "social-proof", "vsl-architecture"]
        source: "NOWVSL"

# --- Batch 3 Heuristics ---

      - id: "HEUR-JB-850"
        title: "Nightmare Story Focal Point Object"
        description: "Every nightmare story needs a physical focal point object — in Jon's case it was a jacket (forgotten → wallet lost → theft). Find your equivalent object that ties the entire narrative together as a recurring anchor."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-851"
        title: "Feeling Words Throughout Nightmare Story"
        description: "Emphasize the word 'feeling' and other sensory words throughout the nightmare story. How were you feeling when this happened? Reflect feelings at every escalation point. Emotional resonance comes from stated feelings, not just events."
        domains: ["storytelling", "copywriting", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-852"
        title: "Expert Paradox Resolution Sequence"
        description: "First position as someone who went through horrendous experience (vulnerability). Then reveal authority through necessity (I had to figure this out or die trying). Finally present credentials modestly. This sequence resolves the expert paradox."
        domains: ["positioning", "storytelling", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-853"
        title: "Dream Story Specific You General They"
        description: "In dream stories, use 'specific you' (direct second person addressing the viewer's life) combined with 'general they' (the people in your life, everyone at work). This creates both intimacy and social validation simultaneously."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-854"
        title: "Follow the Leader Imagination Phrases"
        description: "Use phrases like 'Imagine this,' 'Picture this for a moment,' 'Picture your life,' or 'Walk with me for a moment as we imagine' to open dream stories. These engage the right brain creative mind and temporarily disengage decision mode."
        domains: ["nlp", "copywriting", "future-pacing"]
        source: "NOWVSL"
      - id: "HEUR-JB-855"
        title: "Nightmare Story Ends with Vow Plus Discovery"
        description: "The nightmare story must end with a declaration of independence: 'I vowed to read every book and crawl under every rock to break my addiction or die trying.' Then transition: 'The good news is I figured it out — and how to enjoy it.'"
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-856"
        title: "Tie Focal Point Back to Positive"
        description: "At the nightmare story conclusion, tie the focal point object back to something positive: 'Not only did I figure out how to drop the weight, I figured out how to enjoy my donuts while doing it.' This creates a satisfying narrative arc."
        domains: ["storytelling", "copywriting", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-857"
        title: "Pattern Interrupt Before Nightmare Story"
        description: "The snap suggestion pattern interrupt primes the mind for the vital connection. The viewer's brain is in an open state of suggestion when the nightmare story begins, which is why rapport builds so quickly."
        domains: ["nlp", "vsl-architecture", "pattern-interrupts"]
        source: "NOWVSL"
      - id: "HEUR-JB-858"
        title: "Social Proof Logos Before Personal Photos"
        description: "Use magazine logos, TV network logos, and publication logos early in the VSL for social proof. These are acceptable before rapport is built. Save personal photos and testimonials for after the nightmare story."
        domains: ["social-proof", "vsl-architecture", "credibility"]
        source: "NOWVSL"
      - id: "HEUR-JB-859"
        title: "Transition to Big Problem from Vital Connection"
        description: "After the nightmare story and modest introduction, transition to the Big Problem section with a phrase that bridges personal story to universal problem: 'In fact...' followed by the systematic lie dismantling."
        domains: ["vsl-architecture", "copywriting", "transitions"]
        source: "NOWVSL"
      - id: "HEUR-JB-860"
        title: "Big Truth After Lies"
        description: "After dismantling all lies, reveal the Big Truth — your unique mechanism or approach that solves the problem. This is the positive counterpart to all the dismantled falsehoods. It positions your product as the antidote."
        domains: ["copywriting", "positioning", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-861"
        title: "Bigger Solution Open Loop into Tips"
        description: "Transition from the Big Problem to the Bigger Solution by opening a tip loop: 'Before I tell you about the solution, let me share three things you need to know.' This bridges the problem section to the tip section naturally."
        domains: ["vsl-architecture", "copywriting", "transitions"]
        source: "NOWVSL"
      - id: "HEUR-JB-862"
        title: "Blame This Not Blame You"
        description: "In the Big Problem section, assign blame to external forces (industry, misinformation, big companies) not to the viewer. 'It is not your fault' removes guilt. 'Blame this' redirects anger toward the enemy you are fighting together."
        domains: ["rapport-building", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-863"
        title: "Its Not Your Fault Guilt Removal"
        description: "Say 'It is not your fault' explicitly after presenting the lies. This removes guilt from the viewer for having believed false information. Guilt-free viewers are more open to accepting your solution."
        domains: ["rapport-building", "sales-psychology", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-864"
        title: "Declaration of Independence in Nightmare Story"
        description: "Every nightmare story needs a declaration of independence moment — the turning point where you decided to change everything. This moment creates maximum emotional catharsis and hope in the viewer."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-865"
        title: "Moral Journey in Nightmare Story"
        description: "The nightmare story should include a moral journey — what you learned about yourself and life through the struggle. This adds depth beyond the physical events and connects to universal human experience."
        domains: ["storytelling", "rapport-building", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-866"
        title: "About the System Credibility Section"
        description: "Include an 'about the system' section in the Vital Connection that establishes credibility for your methodology without hard-selling: how you developed it, what makes it different, who has used it. Keep it modest."
        domains: ["credibility", "positioning", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-867"
        title: "Results of the System Before Transition"
        description: "Present brief results of the system before transitioning to the Big Problem section. Show evidence that your approach works, then pivot to 'but first you need to understand why everything else has failed you.'"
        domains: ["social-proof", "vsl-architecture", "transitions"]
        source: "NOWVSL"
      - id: "HEUR-JB-868"
        title: "Emphasize X Before Price Tease"
        description: "Before the first price tease in the Grand Offer, emphasize one extraordinary feature or benefit: 'But the most exciting part of all is X.' This creates peak desire right before introducing price, maximizing willingness to pay."
        domains: ["offer-design", "price-psychology", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-869"
        title: "Qualify Remaining Fence-Sitters"
        description: "Before the guarantee, include a qualify remaining section for fence-sitters: 'If you are still on the fence, let me ask you this...' followed by a question that reframes inaction as loss."
        domains: ["closing-techniques", "qualification", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-870"
        title: "Bonuses Before Price Reveal Sequence"
        description: "After the faux price, present bonuses before revealing the actual price. Stack the total faux value (product + bonuses) to the highest number, then begin the price dropdown. The gap between stacked value and actual price creates irresistible perceived value."
        domains: ["bonuses", "price-psychology", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-871"
        title: "Super Bonus After Regular Bonuses"
        description: "The super bonus comes after all regular bonuses and after the price reveal. It serves as an additional push for those still undecided: 'Plus, if you order today, you also get this exclusive bonus worth $97.' Strategic timing is everything."
        domains: ["bonuses", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-872"
        title: "Inclusion Statement Before CTA"
        description: "Before the call to action, use an inclusion statement: 'You are not alone — join thousands who have already transformed their lives.' This creates community belonging that reduces the loneliness of making a purchase decision."
        domains: ["rapport-building", "closing-techniques", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-873"
        title: "Responsibility Section in Pain and Pleasure"
        description: "In the Pain & Pleasure section, include a responsibility frame: 'I have given you the information — now the choice is yours.' This transfers ownership of the decision while maintaining rapport. It is firm but not aggressive."
        domains: ["closing-techniques", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-874"
        title: "Reinforce Section After Responsibility"
        description: "After the responsibility frame, reinforce with a final dream story and emotional peak: 'You deserve this. Your family deserves this.' Responsibility + reinforcement creates the final emotional momentum toward the purchase."
        domains: ["closing-techniques", "future-pacing", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-875"
        title: "The Smart Thing Close"
        description: "End with 'The smart thing to do right now is...' followed by the final CTA. This frames the purchase as the intelligent choice rather than an emotional impulse. Viewers who identify as smart are compelled to act consistently with that identity."
        domains: ["closing-techniques", "framing", "persuasion"]
        source: "NOWVSL"

# ═══════════════════════════════════════
# L4_FRAMEWORKS (NOWVSL) — 46 elements
# ═══════════════════════════════════════

      - id: "FW-JB-700"
        title: "5-Step VSL Process Framework"
        description: "Step 1: Snap Suggestion (pattern interrupt + big promise + ethical bribe). Step 2: Vital Connection (modest intro + nightmare story + about system + results). Step 3: Big Problem (lies + blame + big truth). Step 4: Bigger Solution (3 tips). Step 5: Grand Offer (product + price + CTA + pain/pleasure + actions/results + Q&A)."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-701"
        title: "1-2-3 Formula Framework"
        description: "1 USP (power phrase + prime benefit + enabler phrase). 2 Stories (nightmare + dream). 3 Tips (avoid + enjoy + how-to). 4 Comparisons (2 serious + 2 funny). These four elements exist in virtually every top-performing video sales letter."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-702"
        title: "USP Factory Framework"
        description: "Step 1: List top 3 problems your product solves. Step 2: Select the one that best differentiates from competition. Step 3: Form power phrase + prime benefit + enabler in under 20 words. Step 4: Pass by 3 trusted business associates. Step 5: Test with actual buyers."
        domains: ["usp", "positioning", "marketing-strategy"]
        source: "NOWVSL"
      - id: "FW-JB-703"
        title: "Nightmare Story Framework"
        description: "Introduction (setting, time, characters). Escalation (things getting worse). Focal Point Object (the rock-bottom moment with physical anchor). Declaration of Independence (the vow to change). Moral Journey (what was learned). Transition to Discovery (the solution found)."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-704"
        title: "Dream Story Framework"
        description: "Follow the Leader ('Imagine this' or 'Walk with me'). Specific You + General They (direct address + social context). Transition Phrase (connecting to benefits). Present Tense Promise (future state described as current reality). One key relatable image."
        domains: ["storytelling", "future-pacing", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-705"
        title: "Headline Benefit Formula Framework"
        description: "Power Word + Outrageous Result - Public Enemy #1 (- Public Enemy #2, #3). Example: '3 ways to lose weight quickly and easily without giving up your favorite foods or spending hours doing cardio.' Universal formula for any headline."
        domains: ["headlines", "copywriting", "formulas"]
        source: "NOWVSL"
      - id: "FW-JB-706"
        title: "Triple Guarantee Framework"
        description: "Level 1: Broad promise with longest timeframe (60 days, general satisfaction). Level 2: Specific metric with shorter timeframe (30 days, 10% body weight). Level 3: Something ridiculous (even if you don't like the font). Pattern break + humor + total risk reversal."
        domains: ["guarantees", "offer-design", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FW-JB-707"
        title: "Faux Price Architecture Framework"
        description: "Step 1: Anchor faux price 2-3x higher. Step 2: List what is included at that value. Step 3: Tease 'better deal today.' Step 4: Present bonuses with separate values. Step 5: Stack total value (faux + bonuses). Step 6: Three-step price dropdown. Step 7: Reveal actual price with 'only one payment.'"
        domains: ["price-psychology", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-708"
        title: "Snap Suggestion Framework"
        description: "Triple Pattern Interrupt (visual + verbal + conceptual). Big Promise (watch until the end + discovery tease). Benefit Formula headline. Video Scarcity (exclusive presentation offer). Something Completely Different (differentiation from competition). Let's Make a Deal (ethical bribe to continue watching)."
        domains: ["vsl-architecture", "pattern-interrupts", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-709"
        title: "Vital Connection Framework"
        description: "Modest Introduction (credentials without ego). Nightmare Story (full formula). About the System (what makes it different). Results of the System (brief proof). Final Transition Phrase (bridge to Big Problem). This section builds all rapport needed for conversion."
        domains: ["vsl-architecture", "rapport-building", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-710"
        title: "Big Problem Framework"
        description: "Transition into the Lie. Big Lie Loop (discover, describe, label false, show consequences, empathize, negate). It's Not Your Fault (guilt removal). Blame This (external enemy). Big Truth (your unique mechanism). Bigger Solution Open Loop (transition to tips)."
        domains: ["vsl-architecture", "persuasion", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-711"
        title: "Bigger Solution Framework"
        description: "Open Tip Loop (tease what's coming). 3 Tip Formula (Avoid → Enjoy → How-To, each with benefit/why/what/how/result/mini-dream). Transition into Grand Offer (from how-to tip directly to product introduction)."
        domains: ["vsl-architecture", "tip-formula", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-712"
        title: "3 Tip Formula Framework"
        description: "Each tip follows: 1) Benefit (from USP), 2) Why do it (2 sentences), 3) What is it/driving force (coin a phrase), 4) How to do it (2-3 steps: first do this, why, result), 5) Result with open loop, 6) Mini Dream Story (1-2 sentences). Order: Avoid, Enjoy, How-To."
        domains: ["tip-formula", "copywriting", "frameworks"]
        source: "NOWVSL"

# --- Batch 2 Frameworks ---

      - id: "FW-JB-750"
        title: "Big Lie Loop Framework"
        description: "Part 1: Discover the lie (from without statements). Part 2: Describe the lie (with may/or technique). Part 3: Label as false ('not even close to truth'). Part 4: Consequences (mini nightmare of believing lie). Part 5: Empathy ('not what I want for you'). Part 6: Transition to truth."
        domains: ["persuasion", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-751"
        title: "Grand Offer Part 1 The Product Framework"
        description: "Formal Introduction (full name + credentials). Product + USP restate. Works Even If section. What It Isn't section. Hero Study (detailed success story). Results of Hero Study. Out of the Club (exclusivity). Easy As It Gets. Qualify Remaining. Testimonials batch. What's In the Product. Emphasize X. First Price Tease. 3 More Benefits."
        domains: ["vsl-architecture", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-752"
        title: "Grand Offer Part 2 The Price Framework"
        description: "Optional Faux Price (2-3x anchor). Bonuses (individual value each). Restate Faux Price + bonus total. Cost of Loss (what inaction costs). Reason for Discount. Price Dropdown (3 steps). Price Reveal ('only one payment of just $X'). Triple Guarantee."
        domains: ["price-psychology", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-753"
        title: "Grand Offer Part 3 CTA Framework"
        description: "CTA Overview (specific button color, text, outcome). Second Testimonials batch. Super Bonus (exclusive for immediate action). Inclusion statement. Primary CTA with delivery timeline. Re-mention super bonus in CTA."
        domains: ["cta-design", "closing-techniques", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FW-JB-754"
        title: "Grand Offer Part 4 Pain and Pleasure Framework"
        description: "Reminder (reopen pain with 'remember'). Pain of inaction tied to despair/frustration/primary fear. 'Yet all of this can change' pivot. Future-paced pleasure in present tense. 'You feel alive, full of hope.' Responsibility frame. Reinforce with final emotional peak."
        domains: ["closing-techniques", "future-pacing", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-755"
        title: "Grand Offer Part 5 Actions and Results Framework"
        description: "Future Paced Actions (specific steps after purchase). Remember Overview (brief recap of entire VSL journey). 3 Reasons to Act Now (price raise, bonus cap, procrastination). The Smart Thing (frame purchase as intelligent choice). Final CTA."
        domains: ["closing-techniques", "urgency", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-756"
        title: "VSL Toolbox Framework"
        description: "12 tools: Paraphrase Strategy, Headline Benefit Formula, Pain Then Pleasure, Triple Guarantee, Faux Price, Product Pacing, Pre-Qualification, Wordsmithing, Subliminal Highlighting, One Sentence Formatting, Action Drops, May-Or Technique."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-757"
        title: "Wordsmithing Upgrade Framework"
        description: "Take any sentence through three levels: Level 1 (basic/bland), Level 2 (replace one key word with power word), Level 3 (replace multiple words, add power phrases, include emotional triggers). Replace: good→ideal, help→empower, make money→truckload of cash."
        domains: ["copywriting", "wordsmithing", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-758"
        title: "Subliminal Highlighting System Framework"
        description: "Select words that appeal to greatest desires: easy, fun, simple, superior, proven, yes, buy, now. Highlight in red throughout VSL. Advanced: build 3-20 word sentences across consecutive slides. Two criteria: tell user what they ARE and what you WANT them to DO."
        domains: ["nlp", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-759"
        title: "Avoid Tip Framework"
        description: "Open: 'Today I am going to reveal the number one mistake people just like you and me make when it comes to [topic].' Inclusion language. Amygdala trigger through avoidance. Addresses Why modality. Usually second or third USP benefit."
        domains: ["tip-formula", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "FW-JB-760"
        title: "Enjoy Tip Framework"
        description: "Present a way to enjoy an otherwise dreaded aspect of the topic. Most challenging to write. Addresses What-If modality. Can be combined with How-To tip: 'If you do this just right it will make your [journey] more fun.' Taps into higher emotional states."
        domains: ["tip-formula", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "FW-JB-761"
        title: "How-To Tip Framework"
        description: "The linchpin tip. Relates directly to primary USP benefit. Addresses What and How-To modalities. Position: all other tips fail without this one. Walk user step by step through the easiest aspect of solution. Bridge directly to product offer."
        domains: ["tip-formula", "copywriting", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-762"
        title: "Serious Comparison Framework"
        description: "Type 1: Anchor to famous product ('Unlike Atkins, Body for Life, or the Four Hour Body, my book offers X'). Type 2: Emotional state comparison (negative state of not having product vs positive state of having it). Both create powerful psychological associations."
        domains: ["comparison-marketing", "positioning", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-763"
        title: "Funny Comparison Framework"
        description: "Lighthearted analogy in positive light causing a smile. Can be PG-13 if audience appropriate. Must not be trite (no 'sticky as white on rice'). Example: 'A diet easier to follow than a two-step map to buried treasure.' Buried treasure anchors the diet to something desirable."
        domains: ["comparison-marketing", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-764"
        title: "Four Buyer Modalities Tip Mapping Framework"
        description: "Why modality → Avoid Tip (why does this work, why am I like this). What-If modality → Enjoy Tip (what if I could enjoy this). What modality → How-To Tip (what is it). How-To modality → How-To Tip (how do I do it). Map all four to cover 100% of audience."
        domains: ["buyer-behavior", "tip-formula", "sales-psychology"]
        source: "NOWVSL"
      - id: "FW-JB-765"
        title: "Vague But Useful Phrase Framework"
        description: "Use strategic vagueness: 'at the right time,' 'if you know exactly what to say,' 'the ideal amount,' 'on specific days.' Each phrase is helpful (they know what to do) but incomplete (they need the product for specifics). Product fills the gap."
        domains: ["copywriting", "tip-formula", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-766"
        title: "Modest Introduction Framework"
        description: "Formula: 'I was not always [credential/achievement] and I certainly was not always [impressive state].' Drop social proof logos (not personal photos). Set up for nightmare story with 'In fact...' transition. Build just-like-you rapport before authority."
        domains: ["positioning", "rapport-building", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-767"
        title: "Pre-Qualification Framework"
        description: "'Before I tell you about the success others are seeing, let me tell you who would never fit.' List 3-4 disqualifiers. 'If you are looking for a magic pill... this will never work.' Then: 'I know you have self-discipline because you are watching this video.' Creates club mentality."
        domains: ["qualification", "positioning", "rapport-building"]
        source: "NOWVSL"

# --- Batch 3 Frameworks ---

      - id: "FW-JB-800"
        title: "Nightmare Story Writing Process Framework"
        description: "Step 1: Identify the low point in your life that created desire to turn around. Step 2: Find a physical focal point object. Step 3: Note specific references (friend names, times, settings). Step 4: Write the pattern interrupt within the story. Step 5: Build toward focal point. Step 6: Declaration of independence. Step 7: Transition to discovery."
        domains: ["storytelling", "copywriting", "process"]
        source: "NOWVSL"
      - id: "FW-JB-801"
        title: "Dream Story Writing Process Framework"
        description: "Step 1: Survey audience to discover actual top desires. Step 2: Choose one universal relatable image (skinny jeans equivalent). Step 3: Open with 'Imagine this' or equivalent. Step 4: Address confidence/identity change. Step 5: Include vanity/social validation. Step 6: Close with self-gift framing."
        domains: ["storytelling", "future-pacing", "process"]
        source: "NOWVSL"
      - id: "FW-JB-802"
        title: "External Rapport Technique Framework"
        description: "Compare yourself to something far below the viewer's station: 'I was addicted to sugar — my crack was different but the addiction was the same as those prostitutes on the corner.' This pulls you below them, making your rise more impressive and relatable."
        domains: ["rapport-building", "storytelling", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-803"
        title: "Transition to Big Problem Framework"
        description: "From Vital Connection to Big Problem: 1) Present brief system results, 2) 'But first you need to understand why everything else has failed,' 3) 'In fact...' bridge, 4) Begin lie dismantling. This creates 'I need to know what went wrong' curiosity."
        domains: ["vsl-architecture", "transitions", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-804"
        title: "Its Not Your Fault Blame Framework"
        description: "Step 1: 'It is not your fault' (direct guilt removal). Step 2: 'Blame this' (redirect to external enemy — industry, misinformation, big companies). Step 3: 'The Big Truth' (reveal your unique mechanism as the real answer). This three-step creates shared enemy narrative."
        domains: ["persuasion", "rapport-building", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-805"
        title: "Bigger Solution Open Loop Framework"
        description: "Transition from Big Problem to Bigger Solution: 1) Establish that you have the answer, 2) Open a tip loop ('Before I reveal the solution, there are three things you must know'), 3) Begin Avoid tip. The open loop creates irresistible forward momentum."
        domains: ["vsl-architecture", "transitions", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-806"
        title: "Grand Offer Gear Shift Framework"
        description: "Step 1: Reintroduce with full name and credentials. Step 2: Reconnect to product/service. Step 3: Shift tone from casual to authoritative. Step 4: Begin product presentation. This deliberate gear shift signals 'something important is happening now.'"
        domains: ["vsl-architecture", "closing-techniques", "transitions"]
        source: "NOWVSL"
      - id: "FW-JB-807"
        title: "Cost of Loss Calculation Framework"
        description: "Before price reveal: 'What is the cost of NOT buying? Medical bills, lost confidence, missed promotions, failed relationships, wasted money on solutions that don't work.' Calculate the real dollar cost of inaction to make the product price seem trivial."
        domains: ["price-psychology", "persuasion", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-808"
        title: "Final Close Sequence Framework"
        description: "Remember (pain reopen) → Pain of Inaction → Yet All Can Change (pivot) → Future-Paced Pleasure (present tense) → Picture Command → Responsibility Frame → Reinforce → 3 Reasons to Act Now → The Smart Thing → Final CTA. This is the complete closing architecture."
        domains: ["closing-techniques", "vsl-architecture", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-809"
        title: "Action Drop Implementation Framework"
        description: "Place action drops (Today, Now, See, Listen, Actually) at the beginning of sentences throughout the VSL. Combine with other techniques: 'Now, you may be thinking' (action drop + may-or). 'Listen, this is not what I want for you' (action drop + empathy). Layer for maximum impact."
        domains: ["copywriting", "nlp", "implementation"]
        source: "NOWVSL"
      - id: "FW-JB-810"
        title: "Product Pacing Implementation Framework"
        description: "Always assume purchase: 'When you purchase today, turn to page 37' (book). 'When you order the service, you will want to immediately call' (service). 'When you begin the program, watch module 3 first' (course). Never use 'if' — always 'when.'"
        domains: ["future-pacing", "closing-techniques", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-811"
        title: "Open Loop Implementation Framework"
        description: "Technique 1: Start tip, interrupt with 'I will cover that last, but first...' Technique 2: Mention benefit without explaining mechanism. Technique 3: Reference a result you will show 'in just a moment.' Always close loops eventually — never leave the viewer feeling cheated."
        domains: ["engagement", "nlp", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-812"
        title: "Ethical Bribe Framework"
        description: "After the pattern interrupt and suggestion, ethically bribe the viewer to watch until the end: 'If you watch until the end, you will discover [specific valuable thing].' The bribe must be genuinely valuable — not just a sales pitch. This is the retention hook."
        domains: ["engagement", "vsl-architecture", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-813"
        title: "Something Completely Different Framework"
        description: "Differentiate from everything else the viewer has seen: 'This is something completely different from anything you have tried before.' Follow with specific reasons why. This addresses the 'I have seen this before' objection preemptively."
        domains: ["differentiation", "positioning", "objection-handling"]
        source: "NOWVSL"
      - id: "FW-JB-814"
        title: "Lets Make a Deal Ethical Bribe Framework"
        description: "Propose a deal: 'If you give me X minutes of your time, I will show you Y.' This frames watching the VSL as a fair exchange rather than a passive consumption. The viewer feels they are getting value for their time investment."
        domains: ["engagement", "rapport-building", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-815"
        title: "Samurai Q&A Framework"
        description: "End the Grand Offer with a Q&A section addressing common objections formatted as real questions from real students. Each answer should reinforce value, handle objections, and include a mini-CTA. The Q&A serves as extended social proof."
        domains: ["objection-handling", "social-proof", "closing-techniques"]
        source: "NOWVSL"

# ═══════════════════════════════════════
# L5_METHODOLOGIES (NOWVSL) — 28 elements
# ═══════════════════════════════════════

      - id: "MET-JB-650"
        title: "NOW VSL Method Complete Pipeline"
        description: "Step 1: USP Factory (define top 3 problems, select differentiator, form power+benefit+enabler). Step 2: 1-2-3 Formula (write USP, two stories, three tips, four comparisons). Step 3: Build 5-Step VSL (Snap Suggestion → Vital Connection → Big Problem → Bigger Solution → Grand Offer). Step 4: Apply VSL Toolbox (12 tools throughout). Step 5: Record and upload."
        domains: ["vsl-architecture", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-651"
        title: "USP Creation Methodology"
        description: "Step 1: Define top 3 problems your product solves. Step 2: Select the one most different from competition. Step 3: Write crude USP. Step 4: Add power phrase. Step 5: Identify prime benefit. Step 6: Add enabler phrase (verb). Step 7: Compress to under 20 words. Step 8: Pass by 3 trusted associates. Step 9: Test with buyers."
        domains: ["usp", "positioning", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-652"
        title: "Nightmare Story Writing Methodology"
        description: "Step 1: Identify lowest point before discovering solution. Step 2: Select focal point object. Step 3: Write introduction with setting and characters. Step 4: Escalate discomfort progressively. Step 5: Build toward focal point moment. Step 6: Describe feelings at each stage. Step 7: Reach rock bottom. Step 8: Declaration of independence. Step 9: Transition to solution discovery. Step 10: Tie focal point back to positive."
        domains: ["storytelling", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-653"
        title: "Dream Story Writing Methodology"
        description: "Step 1: Survey audience for actual top desires. Step 2: Choose universal relatable image. Step 3: Write 'Imagine this' opener. Step 4: Describe sensory experience of ideal life. Step 5: Include confidence/identity transformation. Step 6: Add social validation element. Step 7: Close with self-gift framing. Step 8: Keep to 5-8 sentences."
        domains: ["storytelling", "future-pacing", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-654"
        title: "Tip Creation Methodology"
        description: "Step 1: List USP benefits. Step 2: Map Avoid tip to 2nd/3rd benefit opposite. Step 3: Map Enjoy tip to 2nd/3rd benefit. Step 4: Map How-To to primary benefit. Step 5: For each tip write: benefit, why do it, what is it (coin phrase), how to (2-3 steps), result (with open loop), mini dream story. Step 6: Order Avoid → Enjoy → How-To."
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-655"
        title: "Comparison Creation Methodology"
        description: "Step 1: List 4 potential comparisons. Step 2: Select 2 serious (famous product anchor OR emotional state comparison). Step 3: Select 2 funny (witty not trite). Step 4: Test each for memorability. Step 5: Place throughout VSL at strategic moments. Step 6: Ensure none are legally problematic."
        domains: ["comparison-marketing", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-656"
        title: "Headline Writing Methodology"
        description: "Step 1: Identify power word/phrase (number, quickly, easily, revealed, new). Step 2: State outrageous result (the benefit). Step 3: Subtract public enemy with 'without' (enemy #1, #2, #3). Step 4: Wordsmith through three levels. Step 5: Test multiple variations."
        domains: ["headlines", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-657"
        title: "Big Lie Loop Construction Methodology"
        description: "Step 1: Extract lies from 'without' statements. Step 2: For each lie — describe using may/or technique. Step 3: Label as false with subliminal highlighting on 'truth.' Step 4: Paint consequence mini-nightmare in present tense. Step 5: Empathize ('not what I want for you'). Step 6: Include inclusion statement. Step 7: Anchor drop with 'yet.' Step 8: Repeat for 2-3 lies."
        domains: ["persuasion", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-658"
        title: "Grand Offer Construction Methodology"
        description: "Step 1: Formal reintroduction. Step 2: Product + USP + Works Even If + What It Isn't. Step 3: Hero Study + Testimonials + Content Description. Step 4: Emphasize X + First Price Tease. Step 5: Faux Price + Bonuses + Cost of Loss. Step 6: Price Dropdown (3 steps) + Reveal. Step 7: Triple Guarantee. Step 8: CTA + Super Bonus. Step 9: Pain/Pleasure + Actions/Results. Step 10: Q&A."
        domains: ["offer-design", "vsl-architecture", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-659"
        title: "Price Architecture Methodology"
        description: "Step 1: Set actual price. Step 2: Set faux price at 2-3x actual. Step 3: Value each bonus individually. Step 4: Calculate total stack (faux + all bonuses). Step 5: Create reason for discount. Step 6: Build 3-step dropdown from stack to actual. Step 7: Reveal with 'only one payment of just $X.' Step 8: Add triple guarantee immediately after."
        domains: ["price-psychology", "offer-design", "methodology"]
        source: "NOWVSL"

# --- Batch 2 Methodologies ---

      - id: "MET-JB-700"
        title: "Snap Suggestion Construction Methodology"
        description: "Step 1: Create triple pattern interrupt (visual + verbal + conceptual). Step 2: Write big promise with 'watch this presentation until the end.' Step 3: Add discovery tease. Step 4: Write headline using benefit formula. Step 5: Add video scarcity element. Step 6: Write 'something completely different' differentiation. Step 7: Create ethical bribe / 'let's make a deal.'"
        domains: ["vsl-architecture", "pattern-interrupts", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-701"
        title: "Vital Connection Construction Methodology"
        description: "Step 1: Write modest introduction (credentials without ego). Step 2: Add social proof logos (no personal photos). Step 3: Write nightmare story using full formula. Step 4: Write 'about the system' section. Step 5: Present brief results. Step 6: Write final transition phrase to Big Problem."
        domains: ["vsl-architecture", "rapport-building", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-702"
        title: "Big Problem Construction Methodology"
        description: "Step 1: Transition from Vital Connection. Step 2: Build Big Lie Loop for each lie (2-3 lies). Step 3: Write 'It's Not Your Fault' section. Step 4: Write 'Blame This' (external enemy). Step 5: Reveal the Big Truth. Step 6: Create Bigger Solution Open Loop transition."
        domains: ["vsl-architecture", "persuasion", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-703"
        title: "Bigger Solution Construction Methodology"
        description: "Step 1: Open tip loop with tease. Step 2: Write Avoid tip (full 6-step formula). Step 3: Write Enjoy tip (most challenging — can combine with How-To). Step 4: Write How-To tip (primary benefit, most detailed). Step 5: Transition from How-To directly to Grand Offer."
        domains: ["vsl-architecture", "tip-formula", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-704"
        title: "Triple Guarantee Writing Methodology"
        description: "Step 1: Choose guarantee length (30, 60, 90, 365 days). Step 2: Level 1 — broad satisfaction promise with full length. Step 3: Level 2 — specific measurable metric with shorter length. Step 4: Level 3 — something absurdly generous/funny. Step 5: Add security seals and guarantee graphics. Step 6: Frame with 'Don't decide right now.'"
        domains: ["guarantees", "offer-design", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-705"
        title: "CTA Sequence Methodology"
        description: "Step 1: Primary CTA with specific button details (color, text). Step 2: Immediate access/delivery promise. Step 3: Second testimonials batch. Step 4: Super bonus introduction. Step 5: Inclusion statement. Step 6: Secondary CTA with delivery timeline. Step 7: Re-mention super bonus."
        domains: ["cta-design", "closing-techniques", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-706"
        title: "Pain and Pleasure Close Methodology"
        description: "Step 1: 'Remember' opener to reactivate pain. Step 2: List pain states of inaction (despair, frustration, primary fear). Step 3: 'Yet all of this can change' pivot. Step 4: Future-paced pleasure in strict present tense. Step 5: 'Picture' command for final dream story. Step 6: Responsibility frame. Step 7: Reinforce with emotional peak."
        domains: ["closing-techniques", "persuasion", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-707"
        title: "Actions and Results Close Methodology"
        description: "Step 1: Future-paced specific actions after purchase. Step 2: Brief remember/overview of VSL journey. Step 3: Three reasons to act now (price, bonus cap, procrastination). Step 4: 'Let us make sure you get what you want.' Step 5: 'The smart thing to do right now is...' Step 6: Final CTA."
        domains: ["closing-techniques", "urgency", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-708"
        title: "Wordsmithing Upgrade Methodology"
        description: "Step 1: Write sentence naturally (Level 1). Step 2: Replace weakest word with power word (Level 2: good→ideal, help→empower). Step 3: Restructure for maximum impact (Level 3: add power phrases, emotional triggers, specificity). Step 4: Read aloud for flow. Step 5: Apply throughout VSL during final edit pass."
        domains: ["copywriting", "wordsmithing", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-709"
        title: "Subliminal Highlighting Implementation Methodology"
        description: "Step 1: Select 10-15 power words for your specific product/audience. Step 2: Place highlighted words every 3-5 slides. Step 3: Build YES-BUY-NOW across three consecutive slides. Step 4: Highlight based on two criteria — tell user what they ARE (strong, smart) and what you WANT them to DO (decide, act). Step 5: Do not overuse — 1-2 per section maximum."
        domains: ["nlp", "copywriting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-710"
        title: "Pre-Qualification Sequence Methodology"
        description: "Step 1: 'Before I tell you about the success others are seeing with [product].' Step 2: 'Let me first tell you who would never fit as a [customer type].' Step 3: List 3-4 specific disqualifiers. Step 4: 'I know that you have [positive trait] because you are watching this video.' Step 5: Reinforce that 'you' are part of the success club."
        domains: ["qualification", "positioning", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-711"
        title: "Open Loop Management Methodology"
        description: "Step 1: Identify 5-8 strategic points for open loops throughout VSL. Step 2: Open loop with specific tease ('I will reveal this in just a moment'). Step 3: Continue with other content. Step 4: Close each loop within 5-10 slides. Step 5: Never leave more than 2 loops open simultaneously. Step 6: Final loop closes with the offer."
        domains: ["engagement", "vsl-architecture", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-712"
        title: "Comparison Creation and Placement Methodology"
        description: "Step 1: Brainstorm 8-10 potential comparisons. Step 2: Filter to 4 (2 serious, 2 funny). Step 3: Check for legal issues with competitor mentions. Step 4: Test for memorability. Step 5: Place serious comparisons during product positioning sections. Step 6: Place funny comparisons during pattern-break moments. Step 7: Ensure no trite cliches."
        domains: ["comparison-marketing", "copywriting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-713"
        title: "Focal Point Object Discovery Methodology"
        description: "Step 1: Recall the lowest moment in your story. Step 2: Identify specific physical objects present (coat, car, store, food item). Step 3: Select the one that can appear at multiple story points. Step 4: Use it as the narrative thread (forgotten → consequences → rock bottom). Step 5: Tie it back to something positive at the end."
        domains: ["storytelling", "copywriting", "methodology"]
        source: "NOWVSL"

# --- Batch 3 Methodologies ---

      - id: "MET-JB-750"
        title: "VSL Slide Formatting Methodology"
        description: "Step 1: Write complete script. Step 2: Split into one sentence per slide (90%). Step 3: Add ellipses at end of each slide. Step 4: Insert paraphrase slides every 5-7. Step 5: Add subliminal highlighting to selected words. Step 6: Insert action drops at sentence beginnings. Step 7: Replace all 'but' with 'yet/however/and.' Step 8: Final read-through for flow."
        domains: ["vsl-architecture", "formatting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-751"
        title: "Audience Survey for Dream Story Methodology"
        description: "Step 1: Create survey with top 5-10 desired outcomes. Step 2: Distribute to email list, Facebook fans, and personal contacts. Step 3: Identify top desire (often not what you assume — confidence outranked weight loss). Step 4: Find universal image that represents that desire. Step 5: Build dream story around that specific image."
        domains: ["market-research", "storytelling", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-752"
        title: "VSL Testing and Optimization Methodology"
        description: "Step 1: Launch with full 5-step VSL. Step 2: Test 'presentation' vs 'video' in suggestion. Step 3: A/B test headline variations. Step 4: Test different focal point emphasis in nightmare story. Step 5: Measure tip section dropout rates. Step 6: Optimize Grand Offer price points. Step 7: Test triple guarantee vs standard guarantee."
        domains: ["testing", "conversion-optimization", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-753"
        title: "Avoid Tip Construction Methodology"
        description: "Step 1: Select 2nd or 3rd USP benefit (or its opposite). Step 2: Frame as 'the number one mistake people make when it comes to [topic].' Step 3: Add inclusion language ('people just like you and me'). Step 4: Explain why it must be avoided. Step 5: Connect avoidance to positive outcome. Step 6: Add mini dream story. Step 7: Open loop for How-To tip."
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-754"
        title: "Enjoy Tip Construction Methodology"
        description: "Step 1: Find one aspect of your topic that can be reframed as enjoyable. Step 2: Frame as 'a fantastic way to enjoy [dreaded thing].' Step 3: Make it relatable (most people dread this). Step 4: Give specific enjoyment mechanism. Step 5: If too difficult, combine with How-To: 'doing it right will make your journey more fun.'"
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-755"
        title: "How-To Tip Construction Methodology"
        description: "Step 1: Select primary USP benefit as topic. Step 2: Frame as 'let me show you a way to [primary benefit].' Step 3: Coin a phrase for the mechanism. Step 4: Write 2-3 step explanation (first do this, why, result). Step 5: Open loop: 'if you do it right — more on that in a moment.' Step 6: Position so all other tips fail without this one. Step 7: Bridge to Grand Offer."
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-756"
        title: "VSL Toolbox Application Methodology"
        description: "Apply the 12 tools systematically: 1) Paraphrase Strategy (every 5-7 slides), 2) Headline Benefit Formula (headline + promises), 3) Pain Then Pleasure (throughout), 4) Triple Guarantee (offer section), 5) Faux Price (price section), 6) Product Pacing (post-offer), 7) Pre-Qualification (before tips or testimonials), 8) Wordsmithing (final edit), 9) Subliminal Highlighting (throughout), 10) One Sentence Format (90%), 11) Action Drops (sentence starts), 12) May-Or Technique (replace assumptions)."
        domains: ["vsl-architecture", "implementation", "copywriting"]
        source: "NOWVSL"
      - id: "MET-JB-757"
        title: "Vocal Tonality and Recording Methodology"
        description: "Step 1: Write full script first. Step 2: Read aloud multiple times for natural flow. Step 3: Mark pauses, emphasis, and emotional shifts. Step 4: Record audio first (not synced with slides). Step 5: Use varied tonality — conversational not announcer. Step 6: Match slide transitions to natural speech pauses. Step 7: Compress to appropriate quality."
        domains: ["recording", "vsl-architecture", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-758"
        title: "Complete VSL Assembly Methodology"
        description: "Phase 1: Foundation (USP Factory + 1-2-3 Formula research). Phase 2: Content Creation (nightmare story + dream story + 3 tips + 4 comparisons). Phase 3: Architecture (5-Step VSL construction, slide by slide). Phase 4: Polish (VSL Toolbox application — wordsmithing, subliminal highlighting, action drops). Phase 5: Production (recording + PowerPoint + upload)."
        domains: ["vsl-architecture", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-759"
        title: "Bonus Stack Construction Methodology"
        description: "Step 1: Create 3-5 bonuses that complement the main product. Step 2: Assign realistic individual values to each. Step 3: Present each bonus separately with its own mini-pitch. Step 4: Stack total value visually. Step 5: Reserve one 'super bonus' for after price reveal as final incentive. Step 6: Use super bonus as scarcity mechanism."
        domains: ["bonuses", "offer-design", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-760"
        title: "Conspiracy Building Methodology"
        description: "Step 1: Identify the lies your prospect believes. Step 2: For each lie, build a conspiracy: who benefits from this misinformation? Step 3: Name the external enemy (the industry, big pharma, gurus who profit from confusion). Step 4: Position yourself as the whistleblower. Step 5: 'It is not your fault — you were lied to.' Step 6: Present your truth as the antidote."
        domains: ["persuasion", "copywriting", "positioning"]
        source: "NOWVSL"
      - id: "MET-JB-761"
        title: "Inclusion Language Implementation Methodology"
        description: "Step 1: Replace 'you' with 'people like you and me' at rapport-critical moments. Step 2: Use 'folks like us' for shared identity. Step 3: Reference 'one of the millions' for scale. Step 4: Place inclusion language before pre-qualification and during lie dismantling. Step 5: Use at least 5-8 inclusion phrases throughout the entire VSL."
        domains: ["rapport-building", "copywriting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-762"
        title: "Pattern Interrupt Object Discovery Methodology"
        description: "Step 1: Review nightmare story for physical objects mentioned. Step 2: Select the object most unusual or memorable. Step 3: This object becomes the snap suggestion pattern interrupt in the VSL opening. Step 4: Reference it again at the focal point. Step 5: Tie it back positively at the close. The same object serves three narrative functions."
        domains: ["pattern-interrupts", "storytelling", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MET-JB-763"
        title: "Objection Pre-handling Through What It Isnt"
        description: "Step 1: List top 5 likely objections/misconceptions. Step 2: Frame each as 'This is NOT [misconception].' Step 3: Follow each negation with what it IS instead. Step 4: Place before testimonials to clear the mental path. Step 5: Use 'Works Even If' section to handle remaining situational objections. Step 6: Let testimonials confirm the handling."
        domains: ["objection-handling", "positioning", "methodology"]
        source: "NOWVSL"

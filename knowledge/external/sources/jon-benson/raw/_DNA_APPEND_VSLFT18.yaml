# VSLFT18 DNA Elements — 135 total
# Source: VSL Fast Track 2018 (7 main videos + 6 bonus coaching videos + 3 PDFs)
# Speaker: Jon Benson (with Travis Cody, Leanne Price as support)
# Date: 2026-03-23

# ═══════════════════════════════════════
# L1_PHILOSOPHIES (VSLFT18) — 30 elements
# ═══════════════════════════════════════

      - id: "FIL-JB-650"
        title: "Pattern Interrupt Is Neurological Not Gimmick"
        description: "A pattern interrupt is not a random gimmick — it is a neurological strategy from NLP that temporarily disengages the prefrontal cortex, making the viewer more open to auditory suggestion. When the brain snaps back into attention, the very next thing heard seems larger and more important."
        domains: ["vsl-structure", "nlp", "sales-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-651"
        title: "Seven Second Web Attention Window"
        description: "The average length of time spent on a website, even a killer website, is under seven seconds. You do not have long to grab attention. Your prospect clicked one link — that is all they committed to. You must earn every second after that."
        domains: ["vsl-structure", "conversion-optimization", "attention"]
        source: "VSLFT18"
      - id: "FIL-JB-652"
        title: "Modesty Honesty Determination Build Trust"
        description: "The three trust keys that build rapport better than anything are modesty, honesty, and determination. Modesty means 'I'm just like you.' Honesty means humiliating vulnerability. Determination means 'I made a vow and kept it.' These three together create unshakeable trust."
        domains: ["rapport-building", "trust", "storytelling"]
        source: "VSLFT18"
      - id: "FIL-JB-653"
        title: "People Buy Experiences Not Products"
        description: "The most valuable thing you can sell is the experience. People go to Starbucks for the experience, not the coffee. Build an experience around whatever you sell — guns, dating, weight loss, finance. 'Here is what you are about to experience' is a killer framing."
        domains: ["positioning", "offer-design", "buyer-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-654"
        title: "Negative Motivation Outweighs Positive 75 to 25"
        description: "75% of human behavior is motivated by avoiding pain, only 25% by gaining pleasure. Fear, avoidance, and loss drive action far more powerfully than hope or gain. This is hardwired — the amygdala fires fear signals that override the prefrontal cortex."
        domains: ["sales-psychology", "buyer-behavior", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-655"
        title: "Ruthlessly Efficient and Absolutely Honest"
        description: "You should be ruthlessly efficient in selling and absolutely honest to the core. If you do not want to sell the most effective and ethical way you can, you are in the wrong business. Good products deserve aggressive, ethical marketing."
        domains: ["ethics", "sales-philosophy", "direct-response"]
        source: "VSLFT18"
      - id: "FIL-JB-656"
        title: "If It Sounds Stupid Try It"
        description: "If you think a marketing tactic sounds stupid or ridiculous, try it anyway. The stupidest-sounding ideas often produce the best results. Never dismiss a tactic without testing it. Same-page redirect after window-out is an example."
        domains: ["testing", "conversion-optimization", "mindset"]
        source: "VSLFT18"
      - id: "FIL-JB-657"
        title: "Your Product Is Not About Your Product"
        description: "When selling, it is never about the product — it is about the prospect's feelings, desires, and solutions that improve their life. Even if your product is a gun, you sell the feeling of safety, power, or protection. Always ask: what happens AFTER they use it?"
        domains: ["copywriting", "positioning", "buyer-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-658"
        title: "Conspiracy Cycle Is Universal"
        description: "Every single problem your customer faces has a conspiracy element — something or someone other than themselves to blame. The media, the government, the industry — there is always a villain. This is not lying; it is illuminating the real contributing factors."
        domains: ["vsl-structure", "storytelling", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-659"
        title: "Not Entirely Your Fault Is Key Phrasing"
        description: "Never say 'it is not your fault' — say 'it is not entirely your fault.' The word 'entirely' is the critical difference. It removes guilt without absolving responsibility, making the prospect far more receptive to listening and learning."
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-660"
        title: "Let Your Customer Tell You What to Name Your Product"
        description: "Survey your prospects: 'What word or phrase would inspire you to buy a book about GOAL if you saw it on the cover?' The most common answer IS your product title. Never guess — let the market tell you."
        domains: ["market-research", "product-naming", "positioning"]
        source: "VSLFT18"
      - id: "FIL-JB-661"
        title: "Guilt Kills Attention"
        description: "When people feel guilty, they hear blah blah blah. They are wrapped in their own shame and cannot absorb your message. Remove guilt first, then teach. A prospect freed from guilt has radically higher attention span."
        domains: ["sales-psychology", "rapport-building", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-662"
        title: "One New Belief Is All You Need"
        description: "You only want your customer to believe one new thing after watching your VSL. One central idea. One trademarked principle. If they cannot think about your topic without thinking about your concept, you have won."
        domains: ["positioning", "branding", "vsl-structure"]
        source: "VSLFT18"
      - id: "FIL-JB-663"
        title: "Copy Length Correlates with Conversion"
        description: "Longer copy almost always outperforms shorter copy. The longer people stay engaged, the more they buy. Redundancy is wonderful in copy — repeat the core message in different ways because people are selectively stupid at any given moment."
        domains: ["copywriting", "conversion-optimization", "direct-response"]
        source: "VSLFT18"
      - id: "FIL-JB-664"
        title: "Handwriting Sales Copy Embeds It in Your Brain"
        description: "Handwriting successful sales copy on paper creates a neural connection between senses that literally locks the patterns into your brain. This old copywriting trick from Gary Halbert through John Carlton makes you start thinking and writing like a pro naturally."
        domains: ["copywriting", "skill-development", "learning"]
        source: "VSLFT18"
      - id: "FIL-JB-665"
        title: "YouTube Is Now Preferred VSL Host"
        description: "YouTube is now the preferred source for hosting video sales letters. Top VSLs are hosted on YouTube for zero cost instead of paying $20-50K/month to Wistia. YouTube allows stripping controls except the logo and provides viral distribution."
        domains: ["vsl-delivery", "technology", "cost-optimization"]
        source: "VSLFT18"
      - id: "FIL-JB-666"
        title: "75 Percent of Sales Come in QA Section"
        description: "Roughly 75% of sales from a VSL come during the Q&A section, not when the buy button first drops. Only about 25% buy at the initial price reveal. The Q&A is where the real selling happens — go as long as it takes."
        domains: ["vsl-structure", "closing", "conversion-optimization"]
        source: "VSLFT18"
      - id: "FIL-JB-667"
        title: "Be Passionate About Your Subject"
        description: "You need to know your field deeply and be genuinely passionate about it. Passion comes through in copy and presentation. Admittedly say 'I could be wrong' — it builds credibility. But know your subject cold."
        domains: ["authenticity", "expertise", "credibility"]
        source: "VSLFT18"
      - id: "FIL-JB-668"
        title: "The Problem Is Bigger Than They Think"
        description: "Every single problem your prospect faces is bigger than they think it is. Your job as a marketer is to elucidate how large it really is — not by lying, but by extrapolating the real downstream consequences they have not considered."
        domains: ["sales-psychology", "problem-agitation", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-669"
        title: "Pre-VSL Research Doubles Sales"
        description: "Doing the 5-step pre-VSL checklist before writing a single word will likely double your sales. Every person who struggled with a VSL and was asked 'did you do the pre-step research?' answered no. The homework is mandatory, not optional."
        domains: ["market-research", "vsl-preparation", "conversion-optimization"]
        source: "VSLFT18"
      - id: "FIL-JB-670"
        title: "Specificity Creates Believability"
        description: "The more specific your details — exact dates, times, places, objects, sensations — the more believable your story becomes. 'Tuesday, November 6th, 1992, it was raining and I was cold' is infinitely more powerful than 'one day I decided to change.'"
        domains: ["storytelling", "copywriting", "credibility"]
        source: "VSLFT18"
      - id: "FIL-JB-671"
        title: "Everyone Procrastinates Even Professionals"
        description: "Procrastination is universal — even professionals put off their own work. You must engineer urgency because left to their own devices, people will put things off for days, months, years. Unless you act now, you may never act at all."
        domains: ["urgency", "buyer-behavior", "closing"]
        source: "VSLFT18"
      - id: "FIL-JB-672"
        title: "Ethical Persuasion Is a Moral Obligation"
        description: "If you have a genuinely good product or service, you ethically owe it to your customers to sell as effectively as possible. Making a strong case for your solution is not manipulation — it is a moral obligation."
        domains: ["ethics", "sales-philosophy", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-673"
        title: "Die Trying Creates Emotional Resonance"
        description: "The most powerful determination statement is 'I was going to solve this or die trying.' When you make a personal vow at rock bottom, people resonate with it deeply. It is the pivot point that transforms nightmare into hero journey."
        domains: ["storytelling", "rapport-building", "emotional-selling"]
        source: "VSLFT18"
      - id: "FIL-JB-674"
        title: "Give Away 80 Percent Keep 20"
        description: "Give away 80% of your knowledge in the VSL. People will buy it for the other 20%. Give away concepts and principles but keep the specific implementation for the product. Generosity builds trust and creates obligation."
        domains: ["content-strategy", "value-delivery", "trust"]
        source: "VSLFT18"
      - id: "FIL-JB-675"
        title: "Validation Is Constant and Non-Negotiable"
        description: "Every single element of the VSL must validate the prospect. 'That is okay.' 'You may feel overwhelmed and that is fine.' Not one word should be judgmental or make the viewer feel stupid. With them, always gentle."
        domains: ["rapport-building", "copywriting", "buyer-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-676"
        title: "Third Person Story Builds Same Rapport"
        description: "If the expert cannot tell a personal nightmare story, use a client's story instead. 'Let me tell you about Sally' works just as powerfully as a first-person story. The expert becomes the hero because they helped Sally."
        domains: ["storytelling", "rapport-building", "vsl-structure"]
        source: "VSLFT18"
      - id: "FIL-JB-677"
        title: "Howard Stern Principle of Curiosity"
        description: "People listened to Howard Stern — even those who hated him — because they wanted to hear what he would say next. Your VSL must create that same irresistible curiosity. Every slide must make it impossible to window out."
        domains: ["engagement", "curiosity", "vsl-structure"]
        source: "VSLFT18"
      - id: "FIL-JB-678"
        title: "Investment Not Price"
        description: "Never say 'price' — say 'investment.' Investment implies expected return. 'Your investment today' frames the purchase as a wise financial decision rather than an expense."
        domains: ["pricing-psychology", "framing", "closing"]
        source: "VSLFT18"
      - id: "FIL-JB-679"
        title: "That Is Not What I Want for You"
        description: "The phrase 'and that is not what I want for you' is one of the most powerful closing phrases ever tested. It shows compassion, implies you deserve more, and forces the prospect to ask 'so what DO you want for me?'"
        domains: ["closing", "copywriting", "emotional-selling"]
        source: "VSLFT18"

# ═══════════════════════════════════════
# L2_MENTAL_MODELS (VSLFT18) — 25 elements
# ═══════════════════════════════════════

      - id: "MM-JB-640"
        title: "Three-Brain Decision Model"
        description: "Humans decide using three brain sections: amygdala (fear/concern), mid-brain (emotion/inspiration), and prefrontal cortex (logic/knowledge). The 5-step survey pings all three sections in sequence to extract maximum insight from prospects."
        domains: ["neuroscience", "buyer-psychology", "market-research"]
        source: "VSLFT18"
      - id: "MM-JB-641"
        title: "Open Loop Retention Model"
        description: "An open loop is an unresolved promise — 'I will tell you about X in a few minutes.' The brain craves resolution like a musical scale ending on the 7th note wanting to resolve to tonic. Stack 3-9 open loops throughout a VSL to make it impossible to stop watching."
        domains: ["engagement", "nlp", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-642"
        title: "Nightmare to Hero Arc"
        description: "Every VSL follows the universal story arc: nightmare (rock bottom) → determination (vow) → discovery (solution) → hero (transformation). The deeper the nightmare, the more powerful the hero emergence. This is Joseph Campbell in sales copy."
        domains: ["storytelling", "vsl-structure", "narrative"]
        source: "VSLFT18"
      - id: "MM-JB-643"
        title: "Five Step VSL Formula"
        description: "The complete VSL structure: Step 1 (SNAP Suggestion/Pattern Interrupt), Step 2 (Bottle Connection/Rapport), Step 3 (Big Problem/Conspiracy), Step 4 (Bigger Solution/Tips), Step 5 (Grand Offer with 6 sub-sections). Each step flows into the next with open loops."
        domains: ["vsl-structure", "copywriting", "frameworks"]
        source: "VSLFT18"
      - id: "MM-JB-644"
        title: "Avoid Enjoy HowTo Tip Sequence"
        description: "The three-tip formula follows buyer psychology: Tip 1 (Avoid) speaks to amygdala fear, Tip 2 (Enjoy) speaks to emotional pleasure center, Tip 3 (How-To) speaks to prefrontal logic and transitions directly into the grand offer."
        domains: ["vsl-structure", "buyer-psychology", "content-strategy"]
        source: "VSLFT18"
      - id: "MM-JB-645"
        title: "Faux Price Anchoring Model"
        description: "Present the real retail price first ($97), then show it stacked with bonuses ($200+), then drop to the actual offer price ($47). The triple drop creates anchoring. 'One payment of only' reinforces the bargain. Most people expect Ronco-style multiple payments."
        domains: ["pricing-psychology", "anchoring", "closing"]
        source: "VSLFT18"
      - id: "MM-JB-646"
        title: "Inclusion Exclusion Persuasion Cycle"
        description: "Alternate between including prospects in the success club ('join thousands who...') and excluding unfit buyers ('if you want a magic pill, leave now'). Exclusion makes the remaining audience prove they belong, increasing commitment."
        domains: ["persuasion", "community-building", "qualification"]
        source: "VSLFT18"
      - id: "MM-JB-647"
        title: "Word Cloud Discovery Method"
        description: "Paste competitor copy and survey responses into a free word cloud tool. The top 5 words that emerge are the exact words your audience responds to. Use these words heavily in the first 30 slides of your VSL. This is what makes those competitors convert."
        domains: ["market-research", "copywriting", "competitive-analysis"]
        source: "VSLFT18"
      - id: "MM-JB-648"
        title: "Seven Why Drill Down"
        description: "Keep asking 'why' until you reach the real emotional driver. 'Why do they collect coins?' 'Because they like investing.' 'Why?' 'Because they are patriotic.' Three to seven levels of 'why' reveals the true purchasing motivation beneath the surface."
        domains: ["market-research", "buyer-psychology", "positioning"]
        source: "VSLFT18"
      - id: "MM-JB-649"
        title: "Misery Club to Success Club Pipeline"
        description: "The entire VSL is about pulling people into the misery club (rapport through shared pain) and then transitioning them into the success club (solution through your product). They enter feeling alone in their pain and exit feeling part of a winning movement."
        domains: ["community-building", "rapport-building", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-650"
        title: "Movie Opening Attention Model"
        description: "Think of your VSL like a movie. If it starts with rolling credits, nobody pays attention. If it starts like a Tarantino film with something shocking, attention locks in. Your prospect is grabbing popcorn — they are not committed yet."
        domains: ["vsl-structure", "attention", "engagement"]
        source: "VSLFT18"
      - id: "MM-JB-651"
        title: "Cultural Hot Topic Amplifier"
        description: "Tie your pattern interrupt to something culturally hot and emotionally resonant — patriotism, current events, social movements. A military story opening a weight loss VSL works because it taps into deep cultural values the audience already holds."
        domains: ["vsl-structure", "positioning", "emotional-selling"]
        source: "VSLFT18"
      - id: "MM-JB-652"
        title: "Trademark Your Tip Branding Model"
        description: "Take your most important tip and give it a branded name — the Caloric Staggering Principle, the CSP. Beechwood aged was not unique to Budweiser but they branded it first. Your trademarked term becomes impossible to think around."
        domains: ["branding", "positioning", "intellectual-property"]
        source: "VSLFT18"
      - id: "MM-JB-653"
        title: "Grand Offer Six Part Architecture"
        description: "The grand offer has exactly 6 sections: (1) Product introduction with USP, (2) Price with anchoring and drops, (3) Call to Action repeated 4-5 times, (4) Pain-Pleasure future pacing, (5) Action Results with testimonials, (6) Samurai Q&A for the remaining 75% of buyers."
        domains: ["vsl-structure", "closing", "offer-design"]
        source: "VSLFT18"
      - id: "MM-JB-654"
        title: "Hero Study Credibility Model"
        description: "Instead of claiming personal expertise, say 'I analyzed thousands of successful people and found the patterns they all share.' The hero study borrows credibility from the crowd. 'The majority of successful people did this' is more persuasive than 'I discovered this.'"
        domains: ["credibility", "social-proof", "positioning"]
        source: "VSLFT18"
      - id: "MM-JB-655"
        title: "Double Pattern Interrupt Technique"
        description: "Use two pattern interrupts in sequence — a visual/story interrupt followed by an unexpected pivot. Military story (interrupt 1) → bizarre connection to weight loss binder (interrupt 2). The double scramble makes the brain hyper-attentive."
        domains: ["vsl-structure", "nlp", "attention"]
        source: "VSLFT18"
      - id: "MM-JB-656"
        title: "Modality Ping Pong Survey Design"
        description: "The 5 survey questions deliberately bounce between brain modalities: fear (amygdala) → knowledge (prefrontal) → emotion (mid-brain) → visual (see) → feeling (kinesthetic). This ping-ponging extracts richer data than sequential same-type questions."
        domains: ["market-research", "neuroscience", "survey-design"]
        source: "VSLFT18"
      - id: "MM-JB-657"
        title: "Cause Marketing Conversion Multiplier"
        description: "Create a real cause behind your product — '10 Million Pounds Down.' When people feel guilty for not joining a cause, they buy. The higher aspiration phenomenon makes your offer about something bigger than the individual purchase."
        domains: ["cause-marketing", "persuasion", "community-building"]
        source: "VSLFT18"
      - id: "MM-JB-658"
        title: "One Thing Focus Principle"
        description: "Center all three tips around one trademarked concept. The avoid tip, enjoy tip, and how-to tip all connect back to your One Thing. After watching, the prospect cannot think about the topic without thinking about your concept. Inspired by the book 'The One Thing.'"
        domains: ["positioning", "branding", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-659"
        title: "Blame Assignment Relieves Paralysis"
        description: "Most people want to blame something for their failures. The more evolved resist this, but your audience is not there yet. Give them permission to blame the villain — media, government, industry — and they will be freed to take action."
        domains: ["sales-psychology", "persuasion", "rapport-building"]
        source: "VSLFT18"
      - id: "MM-JB-660"
        title: "Four Buyer Modalities Teaching Model"
        description: "People learn and buy through four modalities: what to avoid (fear), what to enjoy (pleasure), how to do it (logic), and who else has done it (social proof). Address all four in your tips section to capture every buyer type."
        domains: ["buyer-psychology", "teaching", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-661"
        title: "Lame Pattern Interrupt Detection"
        description: "A bad pattern interrupt is either (a) a random image never explained, (b) something completely expected for the niche (abs on a fitness page), or (c) too cheesy and disconnected. Good interrupts are unexpected, tied to the nightmare story, and closed later."
        domains: ["vsl-structure", "quality-control", "engagement"]
        source: "VSLFT18"
      - id: "MM-JB-662"
        title: "Price Survey Blank Field Discovery"
        description: "When surveying prospects about price, leave the field blank and let them type a number. Never give multiple choice — people always pick the lowest option. Blank-field pricing is almost always higher than expected, typically 7 out of 10 times."
        domains: ["pricing-psychology", "market-research", "offer-design"]
        source: "VSLFT18"
      - id: "MM-JB-663"
        title: "Samurai QA as Extended Webinar"
        description: "Treat the Q&A section like the end of a paid webinar where you control the questions. Ask the questions you want asked, overcome the objections you know exist, and keep going until sales stop. One practitioner goes 4-5 hours until support says no more sales."
        domains: ["closing", "vsl-structure", "conversion-optimization"]
        source: "VSLFT18"
      - id: "MM-JB-664"
        title: "Ferris Bueller Dead Air Technique"
        description: "After the final call to action, leave 7 seconds of dead silence. Then: 'If you are still watching...' This catches the remaining undecided viewers and transitions them into the extended Q&A section where 75% of sales happen."
        domains: ["closing", "vsl-structure", "engagement"]
        source: "VSLFT18"

# ═══════════════════════════════════════
# L3_HEURISTICS (VSLFT18) — 35 elements
# ═══════════════════════════════════════

      - id: "HEUR-JB-690"
        title: "First Name Only Introduction Rule"
        description: "At the start of your VSL, only use your first name — 'Hi, I'm John.' Save credentials and full name for the first slide of the grand offer. Nobody cares who you are until you have earned their attention."
        domains: ["vsl-structure", "rapport-building", "credibility"]
        source: "VSLFT18"
      - id: "HEUR-JB-691"
        title: "Use 'Now' as Anchor Drop"
        description: "The word 'now' is an NLP anchor drop — it commands presence and attention. 'Now listen' is two anchor drops in succession. Use 'now' at the beginning of key transitions to snap attention back."
        domains: ["nlp", "copywriting", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-692"
        title: "Use 'Remember' as NLP Command"
        description: "Scatter the word 'remember' throughout your VSL. It is an NLP command — you are not asking them to recall, you are telling their brain to remember. 'And remember, what I am sharing...' makes them think they missed something, prompting re-engagement."
        domains: ["nlp", "copywriting", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-693"
        title: "Ellipses on Almost Every Slide"
        description: "End almost every VSL slide with dot dot dot (ellipses). Ellipses promote the feeling of forward motion — the brain wants to see what comes next. Occasionally use a colon for variety and a slight stopping point before resolution."
        domains: ["copywriting", "vsl-structure", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-694"
        title: "Highlight NLP Commands in Red"
        description: "Highlight specific subliminal words in red across multiple slides so they form hidden sentences: 'remember... now... strategy... right now.' The subconscious picks up these patterns even when the conscious mind does not notice them."
        domains: ["nlp", "copywriting", "subliminal-messaging"]
        source: "VSLFT18"
      - id: "HEUR-JB-695"
        title: "Say Yes Trick Throughout"
        description: "Continuously ask questions with obvious yes answers or ask rhetorical questions that get the prospect nodding. 'Would you like to know the trick? Well yeah.' Every yes builds micro-commitment toward the final purchase."
        domains: ["persuasion", "nlp", "micro-commitment"]
        source: "VSLFT18"
      - id: "HEUR-JB-696"
        title: "Nightmare Story Must Start with Exact Date and Time"
        description: "Your nightmare story should begin with ultra-specific temporal detail: 'I remember the day and time. It was Tuesday, November 6th, 1992. It was raining and I was cold.' Specificity makes it impossible to doubt the story is real."
        domains: ["storytelling", "credibility", "copywriting"]
        source: "VSLFT18"
      - id: "HEUR-JB-697"
        title: "Use Object from Nightmare Story as Pattern Interrupt"
        description: "Take a physical object from your nightmare story and use it as your opening pattern interrupt image. The magic jacket, a clown, a binder — something tangible that you will explain later, creating the first open loop."
        domains: ["vsl-structure", "storytelling", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-698"
        title: "Describe Weight Loss Not State It"
        description: "Never say 'I lost 80 pounds.' Instead say 'drop over 80 pounds of ugly, unwanted body fat.' Descriptive adjectives (ugly, unwanted) create visceral imagery that plain numbers cannot achieve."
        domains: ["copywriting", "descriptive-language", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-699"
        title: "Benefit Without Pain Formula"
        description: "Structure bullet points as: massive benefit WITHOUT massive pain. 'Protect your family without ever having to feel like X.' The negative reinforcement ('without') is always stronger than the positive benefit alone."
        domains: ["copywriting", "bullet-points", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-700"
        title: "Warning Is Universal Pattern Interrupt"
        description: "The word 'Warning' at the start of a VSL or section is one of the most effective pattern interrupts. It stops people in their tracks universally. Combine with scarcity reason: 'This video will not be online forever because...'"
        domains: ["vsl-structure", "urgency", "attention"]
        source: "VSLFT18"
      - id: "HEUR-JB-701"
        title: "Window Out Redirect to Same Video"
        description: "When a viewer tries to leave, redirect them to a page with an article that has the same video embedded at the bottom, or to a webinar. Some practitioners redirect to the exact same presentation — and it converts the second time."
        domains: ["conversion-optimization", "exit-strategy", "testing"]
        source: "VSLFT18"
      - id: "HEUR-JB-702"
        title: "By Now Subliminal Trick"
        description: "'By now you probably realize...' contains the subliminal read of 'Buy now.' This is a proven covert persuasion technique that the subconscious processes as a purchase command while the conscious reads it as a transitional phrase."
        domains: ["nlp", "copywriting", "subliminal-messaging"]
        source: "VSLFT18"
      - id: "HEUR-JB-703"
        title: "Use May Not Definitive Statements"
        description: "Say 'you may have heard' instead of 'you have heard.' 'You may think' instead of 'you think.' Using 'may' keeps you in rapport-building mode rather than accusatory mode. Never assume what the prospect knows or believes."
        domains: ["copywriting", "rapport-building", "language-patterns"]
        source: "VSLFT18"
      - id: "HEUR-JB-704"
        title: "Yet Instead of But"
        description: "Replace 'but' with 'yet' at the end of slides. 'But' is a stop word that causes the mind to shut off, especially as the last word. 'Yet' creates continuation and curiosity. This tiny nuance makes measurable difference."
        domains: ["copywriting", "language-patterns", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-705"
        title: "Blueprint System Formula Product Naming"
        description: "Name your product a 'blueprint,' 'system,' or 'formula' — never a 'book' or 'course.' People want to follow a blueprint; they do not want to think. 'I discovered a blueprint' triggers the desire for a ready-made solution."
        domains: ["product-naming", "positioning", "buyer-psychology"]
        source: "VSLFT18"
      - id: "HEUR-JB-706"
        title: "On Page X You Will Discover Dimensionalization"
        description: "Get hyper-specific in your offer: 'On page 17 you will discover...' 'At the 1 minute 30 second mark in Video One...' This dimensionalization makes the product feel tangible and real before they buy it."
        domains: ["copywriting", "offer-presentation", "future-pacing"]
        source: "VSLFT18"
      - id: "HEUR-JB-707"
        title: "Men and Women Inclusion Phrase"
        description: "Always include the phrase 'men and women' in your VSL as many places as possible. If you are male presenting, women may tune out thinking it is a male-oriented product. Explicit inclusion prevents audience leakage."
        domains: ["copywriting", "inclusion", "audience-targeting"]
        source: "VSLFT18"
      - id: "HEUR-JB-708"
        title: "One Payment of Only Price Framing"
        description: "When presenting price, always say 'one payment of only $47.' Emphasis on 'one payment' distinguishes from expected multiple-payment Ronco-style pricing. The word 'only' further minimizes perceived cost."
        domains: ["pricing-psychology", "framing", "closing"]
        source: "VSLFT18"
      - id: "HEUR-JB-709"
        title: "4-5 Calls to Action Minimum"
        description: "Include four to five calls to action throughout your grand offer — not just one or two. 'Look below this video now.' 'Click the orange add to cart button.' Repeat the exact same CTA copy. Most people use too few."
        domains: ["closing", "conversion-optimization", "vsl-structure"]
        source: "VSLFT18"
      - id: "HEUR-JB-710"
        title: "Future Pace in Present Tense"
        description: "Use present tense for future pacing, not future tense. 'You see the weight coming off in the mirror today' not 'you will see.' 'You are experiencing the energy' not 'you will experience.' Present tense creates association."
        domains: ["nlp", "copywriting", "future-pacing"]
        source: "VSLFT18"
      - id: "HEUR-JB-711"
        title: "Folks Like You and Me Rapport Phrase"
        description: "Use 'folks like you and me' — 'folks' is deliberately informal and country. It creates connection through linguistic humility. This simple phrasing does rapport, inclusion, and relatability in five words."
        domains: ["rapport-building", "copywriting", "language-patterns"]
        source: "VSLFT18"
      - id: "HEUR-JB-712"
        title: "Screenshot Testimonials Over Video"
        description: "Facebook screenshots are more trusted than polished video testimonials. If using video testimonials, keep them to 10-15 seconds max with rapid-fire cuts. Long video testimonials bore people faster than you would think possible."
        domains: ["social-proof", "testimonials", "vsl-structure"]
        source: "VSLFT18"
      - id: "HEUR-JB-713"
        title: "Triple Guarantee Architecture"
        description: "Use three separate guarantee conditions: (1) if you do not get specific result, (2) if you do not achieve secondary metric, (3) if you just do not like the font or design. Give them zero excuses to hesitate."
        domains: ["guarantee-design", "risk-reversal", "closing"]
        source: "VSLFT18"
      - id: "HEUR-JB-714"
        title: "Selectively Stupid Redundancy Rule"
        description: "People are uniformly smart but selectively stupid — at any moment they may be thinking about ten other things. Repeat your core message multiple times in different ways. If someone says you are redundant, you are doing it right."
        domains: ["copywriting", "repetition", "buyer-psychology"]
        source: "VSLFT18"
      - id: "HEUR-JB-715"
        title: "Super Bullet Trick with Adjectives"
        description: "Turn plain benefits into power bullets by adding one descriptor word. 'Simple' becomes 'Deceptively simple.' 'Fast' becomes 'Alarmingly fast.' One word transforms a boring benefit into a compelling bullet point."
        domains: ["copywriting", "bullet-points", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-716"
        title: "Three Promises in SNAP Suggestion"
        description: "After the pattern interrupt, list three big promises of what the viewer will discover. These are your main hooks. Open with words of intrigue: 'You are about to discover...' The three promises establish the value proposition in seconds."
        domains: ["vsl-structure", "hook-creation", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-717"
        title: "Cost of Loss Is Content Rich CTA"
        description: "Make the cost-of-loss section content-rich, not just emotional. Quantify it: 'You could pay $10, $20, even 100 times as much in expensive food, new fat clothes, medical bills, medication costs.' Financial cost of inaction makes the product a bargain."
        domains: ["closing", "pricing-psychology", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-718"
        title: "Do Not Decide Now Before Guarantee"
        description: "Say 'Don't decide right now' immediately before presenting the guarantee. It sounds counterintuitive but sets up the risk reversal perfectly. Take advantage of the unconditional guarantee — just try it for 60 days."
        domains: ["closing", "risk-reversal", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-719"
        title: "Reason for Scarcity Is Mandatory"
        description: "Never just say 'this will not be available forever.' Always give a specific reason for scarcity: 'I may make this a paid presentation,' 'membership quota,' 'I will raise the price.' Unsubstantiated scarcity creates cognitive dissonance."
        domains: ["urgency", "scarcity", "credibility"]
        source: "VSLFT18"
      - id: "HEUR-JB-720"
        title: "Write 10 Headlines Then Traffic Test Top 3"
        description: "Write 10 headlines using survey data and word cloud insights. Survey your list to rank interest. Then spend $50 per headline on PPC/banner ads testing the top 3. The one with most clicks wins — now you know beyond a shadow of a doubt."
        domains: ["headline-testing", "market-research", "conversion-optimization"]
        source: "VSLFT18"
      - id: "HEUR-JB-721"
        title: "Desire and Deserve Paired Phrase"
        description: "Use the paired phrase 'desire and deserve' repeatedly throughout the VSL. People want what they desire and feel they deserve it. Repetition of this exact pairing builds entitlement to the solution."
        domains: ["copywriting", "language-patterns", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-722"
        title: "Unless You Act Now Final Urgency"
        description: "The third and most powerful urgency reason: 'Unless you take action now, you may never take action at all.' This is universally applicable — everyone can relate to putting things off until they never happen. It is the ultimate scarcity."
        domains: ["urgency", "closing", "buyer-psychology"]
        source: "VSLFT18"
      - id: "HEUR-JB-723"
        title: "Three Samurai Headline Formulas"
        description: "Formula 1: Power Word + Hook/Benefit + Verb + Target + Promise. Formula 2: Number + Adjective + Power Word + Product/Benefit + Verb + Target + Promise. Formula 3: Power Word + Descriptor + Feature + Power Word + Verb + Benefit + While/Withouts."
        domains: ["headline-creation", "copywriting", "frameworks"]
        source: "VSLFT18"
      - id: "HEUR-JB-724"
        title: "3X Hook Formula Meta Values Worksheet"
        description: "Map your product through: Meta-Values (health, energy, love, family, safety) → Success Looks Like → Present Looks Like → Role Model Is → Magic Pill → As If → Other Than You Who (villain). This single worksheet generates the entire VSL narrative."
        domains: ["vsl-preparation", "copywriting", "market-research"]
        source: "VSLFT18"

# ═══════════════════════════════════════
# L4_FRAMEWORKS (VSLFT18) — 25 elements
# ═══════════════════════════════════════

      - id: "FW-JB-640"
        title: "SNAP Suggestion Framework"
        description: "Step 1 of the 5-step VSL: Pattern interrupt image or sound → personal image (optional) → words of intrigue → three big promises → video scarcity with reason → 'unlike anything you have ever seen.' Goal: open loops and command attention in 7 seconds."
        domains: ["vsl-structure", "copywriting", "engagement"]
        source: "VSLFT18"
      - id: "FW-JB-641"
        title: "Bottle Connection Framework"
        description: "Step 2: Build rapport through three trust keys (modesty, honesty, determination). Start with modest informal intro → nightmare story with ultra-specific details → rock bottom moment → personal vow → transition to big problem. Goal: make them love you."
        domains: ["rapport-building", "storytelling", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-642"
        title: "Big Problem Conspiracy Cycle"
        description: "Step 3: Make the problem bigger than they think → reveal the lie they have been told → name the villain(s) → 'not entirely your fault' → assign blame → big truth (problem is even bigger) → open loop to solution. Goal: remove guilt and create villains."
        domains: ["vsl-structure", "persuasion", "problem-agitation"]
        source: "VSLFT18"
      - id: "FW-JB-643"
        title: "Bigger Solution Three Tip Framework"
        description: "Step 4: Open reminder loop → Tip 1 Avoid (fear-based) → Tip 2 Enjoy (pleasure-based) → Tip 3 How-To (logic-based, transitions to offer). Brand the most important tip with trademark name. Center all tips around One Thing concept."
        domains: ["vsl-structure", "content-strategy", "teaching"]
        source: "VSLFT18"
      - id: "FW-JB-644"
        title: "Grand Offer Product Section (13 Parts)"
        description: "Step 5 Part 1: Overview → formal introduction → USP → works even if → what it isn't → hero study → results → out of the club → qualify remaining → testimonials → what is in the product → emphasize speed/ease → first price tease → three more benefits."
        domains: ["offer-design", "vsl-structure", "closing"]
        source: "VSLFT18"
      - id: "FW-JB-645"
        title: "Grand Offer Price Section"
        description: "Step 5 Part 2: Optional faux price → bonuses with dollar values → restate total cost of everything → reason for discount (cause/mission) → triple drop (retail → not even half → not even $67) → 'one payment of only $X' → triple guarantee."
        domains: ["pricing-psychology", "closing", "offer-design"]
        source: "VSLFT18"
      - id: "FW-JB-646"
        title: "Grand Offer Call to Action Framework"
        description: "Step 5 Part 3: More testimonials → super unannounced bonus → inclusion ('join thousands') → access timing ('immediate') → check out process instructions → repeat CTA 4-5 times with exact same copy each time."
        domains: ["closing", "conversion-optimization", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-647"
        title: "Pain Pleasure Future Pacing Sequence"
        description: "Step 5 Part 4: Remember your struggle (pain) → cost of inaction (more pain) → 'yet all this can change the moment...' (pivot) → present-tense future pace (pleasure) → 'you feel alive, you see results' → this is why not your fault → take responsibility NOW."
        domains: ["closing", "nlp", "emotional-selling"]
        source: "VSLFT18"
      - id: "FW-JB-648"
        title: "Action Results Download Framework"
        description: "Step 5 Part 5: Tell them exactly what to download first → 'flip to page 4 to begin your assessment' → restate all bonuses → remind of guarantee → three reasons to buy now (price going up, bonus expiring, you may never act)."
        domains: ["closing", "urgency", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-649"
        title: "Samurai QA Closing Framework"
        description: "Step 5 Part 6: Seven seconds dead silence after final CTA → 'If you are still watching, you probably have questions' → ask and answer pre-written questions → overcome objections → include multiple CTAs → go as long as sales keep coming."
        domains: ["closing", "objection-handling", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-650"
        title: "Five Step Pre-VSL Checklist"
        description: "Before writing any copy: (1) Customer survey with 5 brain-pinging questions, (2) Analyze top 3 competitor websites via word cloud, (3) Write 10 headlines and test, (4) Survey price points with blank field, (5) 10-minute bullet brainstorm with super bullet trick."
        domains: ["vsl-preparation", "market-research", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-651"
        title: "Nightmare Story Structure"
        description: "Specific date and time → setting with sensory detail → secondary character (Steve) → physical object (jacket) → spiraling sequence of events → humiliating low point → 'even THAT was not enough' → second even lower moment → personal vow ('die trying') → transition."
        domains: ["storytelling", "vsl-structure", "emotional-selling"]
        source: "VSLFT18"
      - id: "FW-JB-652"
        title: "Lie Loop Structure"
        description: "In the Big Problem section: describe the lie your prospect believes → use anchor drop term → label it as false → show results of believing the lie → tell them that is not what you desire for them. Repeat for 1-3 lies."
        domains: ["vsl-structure", "persuasion", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-653"
        title: "Tip Formula Internal Structure"
        description: "Each tip follows: state the tip → benefit of applying it → why (one slide minimum) → mini dream story (optional) → permission-based validation → transition to next tip. The avoid tip uses fear language, enjoy uses pleasure, how-to uses logic."
        domains: ["vsl-structure", "teaching", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-654"
        title: "Enhanced Rapport Formula"
        description: "Build your story twice without sounding repetitive: first in the modest introduction (brief, informal), then expanded in the nightmare story (detailed, emotional). This double-telling creates deeper rapport because the audience connects twice."
        domains: ["rapport-building", "storytelling", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-655"
        title: "USP Factory Process"
        description: "Create a one-sentence unique selling proposition: 'The first/only [adjective] [product type] ever created that allows you to [primary benefit] and [secondary benefit].' Must include killer differentiator word: first, only, one-of-a-kind, breakthrough."
        domains: ["positioning", "branding", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-656"
        title: "Works Even If Objection Destroyer"
        description: "List every reason someone would not buy: 'Works even if you are over 40... even if you have tried everything... even if you hate X.' End with: 'or if you think you have tried everything.' Systematically demolish every objection before they arise."
        domains: ["objection-handling", "copywriting", "closing"]
        source: "VSLFT18"
      - id: "FW-JB-657"
        title: "Cost of Loss Content Framework"
        description: "Quantify the cost of not buying: money spent on alternatives ($10-100x), forced purchases (new clothes), medical bills, medication, lost time. Then: 'And that is not what I want for you.' Makes the product price seem trivial by comparison."
        domains: ["pricing-psychology", "closing", "persuasion"]
        source: "VSLFT18"
      - id: "FW-JB-658"
        title: "Two Choices Close Framework"
        description: "Present exactly two choices: Choice 1 — take the information and try to go it alone (who knows, you may see some success). Choice 2 — let me do the work for you with my proven blueprint. Make Choice 2 obviously superior."
        domains: ["closing", "framing", "persuasion"]
        source: "VSLFT18"
      - id: "FW-JB-659"
        title: "Cause Creation and Discount Justification"
        description: "Create a real cause: 'I set a goal to help remove 10 million pounds.' This justifies the discount ('I do not want finances to stand in your way'), creates higher aspiration, and makes prospects feel guilty for not joining."
        domains: ["cause-marketing", "pricing-psychology", "community-building"]
        source: "VSLFT18"
      - id: "FW-JB-660"
        title: "What It Isn't Qualification Section"
        description: "Before revealing the product, state what it is NOT: 'This is not some magic pill... not a swallow-this-overnight solution... not a scam.' Alienate buyers you do not want. Then: 'What this IS, is the most powerful X ever devised.' Contrast creates credibility."
        domains: ["positioning", "qualification", "credibility"]
        source: "VSLFT18"
      - id: "FW-JB-661"
        title: "Super Unannounced Bonus Technique"
        description: "After presenting all bonuses and price, introduce one more surprise bonus: 'Plus if you act now before this presentation ends, I will toss in this one-of-a-kind super bonus.' Restate total value but keep same price. Maximizes perceived value."
        domains: ["offer-design", "urgency", "closing"]
        source: "VSLFT18"
      - id: "FW-JB-662"
        title: "Three Urgency Reasons Close"
        description: "Reason 1: Price is temporarily lowered and will go back up. Reason 2: Super bonus has limited availability/membership quota. Reason 3: Unless you act now, you may never act at all (procrastination truth). Three reasons is the sweet spot."
        domains: ["urgency", "closing", "persuasion"]
        source: "VSLFT18"
      - id: "FW-JB-663"
        title: "Five Question Customer Survey Framework"
        description: "Q1: Most pressing concern about GOAL? (amygdala/fear) Q2: Number one thing you want to know? (prefrontal/logic) Q3: What word would make you buy a book? (mid-brain/emotion) Q4: What would you see? (visual) Q5: What would it feel like? (kinesthetic). This sequence pings all brain centers."
        domains: ["market-research", "survey-design", "neuroscience"]
        source: "VSLFT18"
      - id: "FW-JB-664"
        title: "Emphasize X Superpower Technique"
        description: "In the product section, take the one thing your customers want most (from survey) and spotlight it: 'Here is its superpower.' Pull out the single feature that matches their most pressing concern and emphasize it above all others."
        domains: ["offer-presentation", "positioning", "copywriting"]
        source: "VSLFT18"

# ═══════════════════════════════════════
# L5_METHODOLOGIES (VSLFT18) — 20 elements
# ═══════════════════════════════════════

      - id: "MET-JB-600"
        title: "VSL Fast Track Complete Build Process"
        description: "Step-by-step: (1) Complete 5-step pre-VSL checklist (5-7 days), (2) Build SNAP Suggestion with pattern interrupt, (3) Write Bottle Connection with nightmare story, (4) Construct Big Problem with conspiracy cycle, (5) Create Bigger Solution with 3 branded tips, (6) Assemble Grand Offer with all 6 sections, (7) Test and iterate."
        domains: ["vsl-creation", "copywriting", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-601"
        title: "Customer Survey Execution Method"
        description: "Use SurveyMonkey (free). Send to list, Facebook, or rented list (5000 people, ~$200). Ask 5 questions in brain-ping order. Collect responses. Paste into Word Cloud tool. Identify top 5 fear words, top 5 desire words, top book title phrases, and optimal price point."
        domains: ["market-research", "survey-design", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-602"
        title: "Competitor Analysis Word Cloud Method"
        description: "Step 1: Identify top 3 competitor VSLs or sales pages. Step 2: Transcribe video (hire on Fiverr) or copy-paste text. Step 3: Paste all three into free Word Cloud tool. Step 4: Extract top 5 words/phrases. Step 5: Use these words heavily in first 30 slides. Optional: handwrite the best one."
        domains: ["competitive-analysis", "copywriting", "market-research"]
        source: "VSLFT18"
      - id: "MET-JB-603"
        title: "Headline Testing Method"
        description: "Step 1: Write 10 headlines using survey data + word cloud words. Step 2: Survey your list ranking interest. Step 3: Take top 3 and spend $50 each on PPC/banner ads. Step 4: Most clicks wins. Use this headline above your VSL and in all emails."
        domains: ["headline-testing", "split-testing", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-604"
        title: "Blank Field Price Discovery Method"
        description: "Write product synopsis using USP factory. Send survey: 'How much would you pay for a straight-to-the-point how-to blueprint to achieving GOAL?' Leave price field BLANK. Never give multiple choice. Take the most common price. 7/10 times it is higher than you expected."
        domains: ["pricing", "market-research", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-605"
        title: "10 Minute Bullet Brainstorm Method"
        description: "Set timer for 10 minutes. Zero distractions. Write every benefit of your product nonstop for 10 minutes. Then apply Super Bullet Trick: add one power adjective before each benefit. 'Simple' → 'Deceptively simple.' Use Thesaurus for unique descriptors."
        domains: ["copywriting", "brainstorming", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-606"
        title: "Pattern Interrupt Image Selection Method"
        description: "Step 1: Write your nightmare story first. Step 2: Identify a physical object from the story. Step 3: Show that image as opening slide. Step 4: Say 'I know this looks strange — I will explain in a few minutes.' Step 5: Close the loop when you tell the nightmare story later."
        domains: ["vsl-creation", "storytelling", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-607"
        title: "Nightmare Story Writing Method"
        description: "Step 1: Choose specific date, time, weather, setting. Step 2: Introduce secondary character. Step 3: Include sensory details (cold, rain, breath). Step 4: Introduce the object that becomes pattern interrupt. Step 5: Spiral downward through humiliation. Step 6: 'Even that was not enough' — add second lower moment. Step 7: Make the vow."
        domains: ["storytelling", "copywriting", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-608"
        title: "Conspiracy Cycle Construction Method"
        description: "Step 1: Identify the biggest lie your prospect believes. Step 2: Name 3-5 villains contributing to the problem (media, government, industry). Step 3: Present the lie using 'you may have heard.' Step 4: Label it false with evidence. Step 5: Show consequences of believing it. Step 6: 'Not entirely your fault.' Step 7: Assign blame."
        domains: ["vsl-creation", "persuasion", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-609"
        title: "One Thing Tip Integration Method"
        description: "Step 1: Create trademarked name for your core concept (e.g., Caloric Staggering Principle). Step 2: Frame avoid tip around it: 'to kick in CSP, avoid X.' Step 3: Frame enjoy tip: 'here is how to enjoy CSP.' Step 4: Frame how-to tip: 'here is how to start CSP in 24-48 hours.' All tips orbit the One Thing."
        domains: ["branding", "vsl-creation", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-610"
        title: "Grand Offer Product Section Build"
        description: "Step 1: Write overview (1-2 sentences). Step 2: Add formal credentials. Step 3: Present USP with killer word (first, only, breakthrough). Step 4: Build 'works even if' slides (every objection). Step 5: Write 'what it isn't' (alienate wrong buyers). Step 6: Hero study if applicable. Step 7: Testimonials. Step 8: 'On page X discover Y' dimensionalization."
        domains: ["offer-design", "vsl-creation", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-611"
        title: "Price Presentation Triple Drop Method"
        description: "Step 1: State retail/faux price ($217). Step 2: 'Not even half that.' Step 3: 'Not even $67.' Step 4: Present bonuses with individual dollar values. Step 5: Stack total value ($300+). Step 6: 'Your total investment today... one payment of only $47.' Step 7: Reveal cause/reason for discount."
        domains: ["pricing-psychology", "closing", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-612"
        title: "Triple Guarantee Writing Method"
        description: "Guarantee 1: Specific measurable result in timeframe (lose 10% body weight in 30 days). Guarantee 2: Secondary qualitative metric (do not like the experience). Guarantee 3: Catch-all (do not like the font, design, anything). Word as 'I will gladly refund every penny.' Include 100% badge."
        domains: ["guarantee-design", "risk-reversal", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-613"
        title: "Pain Pleasure Close Writing Method"
        description: "Step 1: 'Remember you have been struggling with X for far too long.' Step 2: Describe pain of continued inaction. Step 3: 'Yet all of this can change the moment you begin...' Step 4: Present-tense future pace (you feel alive, you see results). Step 5: 'It is true this was not your fault.' Step 6: 'But today you take responsibility.'"
        domains: ["closing", "emotional-selling", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-614"
        title: "Samurai QA Section Build Method"
        description: "Step 1: Allow 7 seconds of dead air after final CTA. Step 2: 'If you are still watching, you probably have some questions.' Step 3: Write 5-10 questions you WANT asked (overcome specific objections). Step 4: Include CTA after every 2-3 questions. Step 5: End with three urgency reasons. Step 6: Go as long as content allows."
        domains: ["closing", "objection-handling", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-615"
        title: "VSL Industry Adaptation Method"
        description: "For any industry: Step 1: Ask 'what are the top 3 desires of your client?' Step 2: Keep asking WHY until you reach emotional core (3-7 levels deep). Step 3: Position product around emotional core, not surface feature. Coins → patriotism/legacy. Dating → confidence/status. Finance → security/freedom."
        domains: ["positioning", "market-research", "adaptation"]
        source: "VSLFT18"
      - id: "MET-JB-616"
        title: "Blood Pressure VSL Repositioning Method"
        description: "For invisible/silent problems: Step 1: Make the invisible visible (connect to visible symptoms like weight gain, ED). Step 2: Start with personal near-death story. Step 3: Lead with a paradoxical hook (banana split cures blood pressure). Step 4: Connect fear to tangible consequences. Step 5: Age-appropriate voice casting."
        domains: ["vsl-creation", "health-marketing", "repositioning"]
        source: "VSLFT18"
      - id: "MET-JB-617"
        title: "Bonus Creation and Stacking Method"
        description: "Step 1: Create 2-3 bonuses (not 10). Step 2: Each bonus must complement, not compete with main product. Step 3: Assign dollar value to each. Step 4: Introduce during price section with individual values. Step 5: Add super unannounced bonus after price reveal. Step 6: Restate: 'Total value $300+ but you pay just $47.'"
        domains: ["offer-design", "bonus-strategy", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-618"
        title: "NLP Subliminal Layer Implementation"
        description: "Step 1: Identify 5-7 power commands (remember, now, buy, decide, order, strategy). Step 2: Highlight in red text across slides at irregular intervals. Step 3: Ensure highlighted words across consecutive slides form hidden sentences. Step 4: Use 'by now' for subliminal 'buy now.' Step 5: End slides with anchor drops."
        domains: ["nlp", "copywriting", "subliminal-messaging"]
        source: "VSLFT18"
      - id: "MET-JB-619"
        title: "Deadline Funnel Price Enforcement Method"
        description: "Step 1: Set real retail price on main sales page. Step 2: Create discounted VSL/webinar page with lower price. Step 3: Use Deadline Funnel to enforce 72-hour window. Step 4: After deadline, redirect to full-price page. Step 5: Never fake scarcity — make it real and enforceable."
        domains: ["urgency", "pricing", "technology"]
        source: "VSLFT18"

# DK-MTBN Batch 01 - One To Many Selling (Audio CD1-4)
# Files: CD1 (59KB), CD2 (94KB), CD3 (79KB), CD4 (70KB)
# Extracted: 2026-03-15
# Speaker: Dan Kennedy (live seminar, one-day workshop)
# Topic: Architecture of Group Selling Presentations

L1_PHILOSOPHIES:
  - id: FIL-DK-409
    text: A group presentation is a group presentation is a group presentation. The structure elements do not change much depending on delivery. Stage to group, webcast to group, DVD sent in the mail to group - the architecture is the same.
    source: MTBN-OTM-CD1

  - id: FIL-DK-410
    text: In one-to-one selling you have looseness at the beginning to establish rapport. In one-to-many you do not have that luxury. They can get up and leave, mentally tune out, or click away. The architecture must be tighter.
    source: MTBN-OTM-CD1

  - id: FIL-DK-411
    text: The open of a one-to-many presentation has a very short list of objectives that MUST occur. If those objectives are not met, you lose them before you ever get to the middle.
    source: MTBN-OTM-CD1

  - id: FIL-DK-412
    text: Most people fail at lead generation from stage because they were not very clear. It requires nothing more than a very clear, specific, step-by-step instruction.
    source: MTBN-OTM-CD4

  - id: FIL-DK-413
    text: The differences between versions of a script for different audiences are more than just sticking in the word doctor. If you had them all side by side you would see somewhat significant changes all the way through.
    source: MTBN-OTM-CD2

  - id: FIL-DK-414
    text: You must demonstrate intangibles. The biggest challenge in one-to-many selling is making abstract concepts tangible through physical props, stories, or visual proof.
    source: MTBN-OTM-CD3

  - id: FIL-DK-415
    text: Short-circuiting instant negative perceptions is critical. When people are driven to a script, they do not yet know what it is about. Get away from any ideas they might have about what this is before revealing the actual subject.
    source: MTBN-OTM-CD2

L2_MENTAL_MODELS:
  - id: MM-DK-349
    text: The 8 Versions Model - Create multiple versions of the same selling script customized for different audience segments. There is an unwashed masses general version that serves as the copy platform, from which specialized versions get built.
    source: MTBN-OTM-CD2

  - id: MM-DK-350
    text: The Houdini Demonstration Model - Use dramatic physical demonstrations as metaphors for intangible benefits. Make your abstract product tangible through spectacle.
    source: MTBN-OTM-CD3

  - id: MM-DK-351
    text: The Daily Cash in the Mailbox Model - Bring the actual physical evidence of results into the presentation. Open real mail, show real checks, demonstrate the real outcome live. Physical proof trumps every verbal claim.
    source: MTBN-OTM-CD3

  - id: MM-DK-352
    text: The Copy Platform Model - Build a base script that is general and broad, then derive specialized versions from it. The platform carries the core selling architecture; each derivative adapts to the specific audience.
    source: MTBN-OTM-CD2

  - id: MM-DK-353
    text: The Permission Architecture Model - In one-to-many, every transition must earn permission to continue. Each section must deliver enough value that the audience grants you permission to advance to the next section.
    source: MTBN-OTM-CD1

L3_HEURISTICS:
  - id: HEUR-DK-507
    text: In one-to-many selling, you have roughly 60-90 seconds in the open before people start deciding whether to stay or leave. Establish credentials and relevance immediately.
    source: MTBN-OTM-CD1

  - id: HEUR-DK-508
    text: Create at minimum 3-5 different versions of a selling script for different audience segments. Specialized versions for specific demographics convert significantly better than the generic base.
    source: MTBN-OTM-CD2

  - id: HEUR-DK-509
    text: The Goal by the Inch infomercial ran every day somewhere in the United States for eight solid years because it had strong demonstration of an intangible through tangible physical metaphors.
    source: MTBN-OTM-CD3

  - id: HEUR-DK-510
    text: A close from stage for lead generation should be a very specific instruction with exact steps. Most fail because they are vague about what to do next.
    source: MTBN-OTM-CD4

  - id: HEUR-DK-511
    text: When people are driven to a video sales script, do NOT reveal the subject in the first few paragraphs. First short-circuit their negative perceptions by eliminating what it is NOT, then reveal what it IS.
    source: MTBN-OTM-CD2

  - id: HEUR-DK-512
    text: The financial advisor model for one-to-many - presentation to lead gen form to interview/appointment to closing meeting. The presentation does NOT try to close the sale directly; it closes on the appointment.
    source: MTBN-OTM-CD4

  - id: HEUR-DK-513
    text: In a one-to-many environment, use volunteers from the audience for demonstrations. Having real people handle real evidence is far more persuasive than the presenter doing it alone.
    source: MTBN-OTM-CD3

L4_FRAMEWORKS:
  - id: FW-DK-293
    text: Open-Middle-Close Architecture for One-to-Many - OPEN (credentials, pattern interrupt, preview, urgency, agenda) - MIDDLE (build case, stack proof, demonstrate, pre-handle objections, transition) - CLOSE (clear instruction, next step, urgency, remove friction, social proof of action).
    source: MTBN-OTM-CD1-CD4

  - id: FW-DK-294
    text: One-to-Many Open Framework - Five objectives - (1) Establish credibility fast, (2) Pattern interrupt, (3) Preview benefits of staying, (4) Urgency for what they get at the end, (5) Set expectations for the flow.
    source: MTBN-OTM-CD1

  - id: FW-DK-295
    text: Script Versioning Framework - Start with unwashed masses copy platform. Identify 5-8 audience segments. For each - customize opening, modify proof/examples, adjust jargon, change objection handling, tailor close. Structural adaptation not just word substitution.
    source: MTBN-OTM-CD2

  - id: FW-DK-296
    text: Intangible Demonstration Framework - (1) Find physical metaphor or prop, (2) Create dramatic reveal, (3) Use audience volunteers, (4) Show real-world evidence, (5) Connect demonstration explicitly to promised outcome.
    source: MTBN-OTM-CD3

  - id: FW-DK-297
    text: One-to-Many Close Architecture - Three types - (A) Lead Gen Close with form/person/timeframe. (B) Direct Sale Close with stack/price/urgency/order. (C) Road Show Close with presentation/qualifying/meeting/close.
    source: MTBN-OTM-CD4

L5_METHODOLOGIES:
  - id: MET-DK-206
    text: Building a One-to-Many Presentation - Step 1 Define single desired outcome. Step 2 Write Close first. Step 3 Build Open (credentials, proof, preview). Step 4 Fill Middle (case, demonstrations, objections). Step 5 Create transitions. Step 6 Time and cut ruthlessly. Step 7 Develop 3-8 audience-specific versions.
    source: MTBN-OTM-CD1-CD4

  - id: MET-DK-207
    text: Video Sales Script Development - Step 1 Create unwashed masses copy platform. Step 2 Identify target segments. Step 3 Build derivatives with structural changes. Step 4 Boldface segment-specific elements. Step 5 Apply open/middle/close to each. Step 6 Test and iterate.
    source: MTBN-OTM-CD2

  - id: MET-DK-208
    text: Demonstration-Based Selling for Intangibles - Step 1 Identify intangible benefit. Step 2 Find physical metaphor. Step 3 Script demonstration with dramatic build-up. Step 4 Use audience volunteers. Step 5 Bridge from demonstration to offer. Step 6 Repeat metaphor in close as callback.
    source: MTBN-OTM-CD3
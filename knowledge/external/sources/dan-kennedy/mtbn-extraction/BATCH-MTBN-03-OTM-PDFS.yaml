# DK-MTBN Batch 03 - One To Many PDFs (Modules 1-4 + Manual)
# Files: Module1-TheOpen (67KB), Module2-OpenToMiddle (84KB), Module3-MiddleToClose (93KB), Module4-TheClose (85KB), Manual (51KB/171pages)
# Extracted: 2026-03-15
# Speaker: Dan Kennedy (structured course workbook, GKIC 2014)
# Topic: Craftsmanship of One-to-Many Selling Presentations - structured course adds formal frameworks beyond audio
# Delta vs BATCH-01: Audio captured live delivery; PDFs provide formal structure, explicit taxonomies, and detailed sub-frameworks
# Elements: 28 new (L1:4 L2:4 L3:8 L4:8 L5:4)

L1_PHILOSOPHIES:
  - id: "FIL-DK-416"
    text: "They only need to KNOW the minimum necessary to buy before they buy; they need to be inspired, motivated, swept up by negative and positive emotion to the greatest extent possible. Too much information, not enough EMOTION is one of the most common Middle mistakes."
    source: MTBN-OTM-Manual-p78

  - id: "FIL-DK-417"
    text: "It is arrogant, stupid and lazy to presume you can achieve maximum success by your brilliance alone. Only by exerting control over pre-existing conditions can you fully profit from a great product, offer, presentation and presenter."
    source: MTBN-OTM-Manual-p123

  - id: "FIL-DK-418"
    text: "In a physical environment you can and should apply A LOT OF PRESSURE. This usually means RISKING humiliation. If you are in the right place doing the right thing, you can DARE TO fail."
    source: MTBN-OTM-Manual-p114

  - id: "FIL-DK-419"
    text: "DO NOT OVER-PRODUCE. Keep a tight reign on video producers, web designers, graphics people. We are NOT doing TV shows, movies, advertising or industrial videos. We are selling stuff. DO NOT BE TOO PERFECT AND TOO SLICK. Believability and authenticity reign of supreme importance."
    source: MTBN-OTM-Manual-p121

L2_MENTAL_MODELS:
  - id: "MM-DK-354"
    text: "Primacy and Recency Model - Given a chain of random numbers or words, most people immediately recall the first several and the last several. 15 minutes later, only the first 1-2 and last 1-2. The middle gets lost. Good presentation architecture plants a big idea at the start and reconnects to it at the end."
    source: MTBN-OTM-Manual-p11

  - id: "MM-DK-355"
    text: "Pre-Existing Conditions Model - Results vary having nothing to do with efficacy of speaker, presentation structure, venue or media. 4 factors: (1) WHO the audience is (source, capability, willingness), (2) HOW THEY THINK AND FEEL about the presentation-situation, (3) ENVIRONMENT/VENUE/MEDIA conducive to selling, (4) YOUR MIND-SET about it all."
    source: MTBN-OTM-Manual-p123-130

  - id: "MM-DK-356"
    text: "Pre-Existing Enemies Model - Every targeted group of consumers has certain people or kinds of people they distrust, dislike, are quietly angry at. Leveraging shared enemies creates instant tribal bonding and positions you as ally against common adversary."
    source: MTBN-OTM-Manual-p130

  - id: "MM-DK-357"
    text: "It Is TV Stupid Model - All presentation media (even live) competes with TV. Same screen, same expectations. Audience tolerances and production expectations are set by what they watch elsewhere. TV is a VISUAL media - helped by visual stuff happening and visual interest."
    source: MTBN-OTM-Manual-p128

L3_HEURISTICS:
  - id: "HEUR-DK-514"
    text: "Divide presentation length by 3 (if 60 min or less), by 6 (if 60-180 min), or by 8-10 (if over 3 hours). Those are your time-frames in which to deliver a headline, message, and tease. A 75-minute presentation divides into 12-13 bits each with a beginning, middle and non-end link to next bit."
    source: MTBN-OTM-Manual-p8

  - id: "HEUR-DK-515"
    text: "Good rule of thumb: three to five secondary promises for each primary promise. Secondary promises elaborate the primary into tangible outcomes - emotional, relational, status, financial."
    source: MTBN-OTM-Manual-p72

  - id: "HEUR-DK-516"
    text: "Repeat promises 7 to 21 times in a presentation using 10 different vehicles without being horribly clumsy. Bookend with Primacy and Recency. The longer the presentation, the more you need stop-and-summarize points."
    source: MTBN-OTM-Manual-p74-77

  - id: "HEUR-DK-517"
    text: "Maximum 3 linked ideas per segment in the Middle, but better if 1 idea per segment. Each idea presented must link back to previous ones and reinforce THE big idea. If the listener or viewer gets lost, you lose them."
    source: MTBN-OTM-Manual-p78

  - id: "HEUR-DK-518"
    text: "Infomercial time breakdown: 28.5 min total. 1st CTA 3 min, 2nd CTA 2.5 min, End CTA 1.5 min. Leaves 21.5 min content divided into 3 segments: Long-Medium-Short (8.5/7.5/5.5) or Medium-Long-Short (7/9/5.5)."
    source: MTBN-OTM-Manual-p117

  - id: "HEUR-DK-519"
    text: "Webcast time breakdown: 4 hrs = 240 min. 3 CTA breaks of 8 min each plus CTA at end of 8 min leaves 208 min content. 4 segments: Medium-Long-Short-Shorter (55/65/45/43). Preview seminars 3 hrs: Short(40)/Break(10)/Long(60)/Pitch(15)/Break(15)/Short(30)/End pitch(10)."
    source: MTBN-OTM-Manual-p118

  - id: "HEUR-DK-520"
    text: "4 audience qualification questions before any presentation: (1) CAN they buy? (2) SHOULD they buy? (3) WILL they buy? (4) CAN and WILL they buy HERE - by this means, from this person?"
    source: MTBN-OTM-Manual-p123

  - id: "HEUR-DK-521"
    text: "Post-production quality editing ratio is 4X to 8X - 4 to 8 hours of editing per 1 hour of final content. Get more than one product or use from each production day. Consider crafting the show so you can change CTAs without altering the show."
    source: MTBN-OTM-Manual-p120-121

L4_FRAMEWORKS:
  - id: "FW-DK-298"
    text: "B.O.L.D. Framework for Sticky Ideas - (1) BIG idea that sticks, (2) OUTRAGEOUS promise, (3) LINK to audience (relevance, affinity, circumstances), (4) DIRECTIONS - clear and specific response directions. Caution: LONG acronyms are self-defeating."
    source: MTBN-OTM-Manual-p14

  - id: "FW-DK-299"
    text: "7 Things They Must Realize and Know Before They Will Buy - (1) Appropriateness: what you offer meets their needs, you understand and respect them, (2) Differentiation: new/improved/different from prior attempts, (3) Excitement: fun/cool/exciting to own and tell peers about, (4) They Are NOT The Only Idiot: lots of people already benefiting, (5) They Are Getting A Deal: price is a bargain not just fair, (6) Will Not Fail or Be Embarrassed or Disappointed Again: certainty and safety, (7) Reasons They MUST Hurry or Do It Now."
    source: MTBN-OTM-Manual-p44

  - id: "FW-DK-300"
    text: "Ideas That Stick Taxonomy - 6 mechanisms: (1) By Numbers (Marketing Triangle=3, 7 Habits, 10 Foods), (2) By Alphabet/Acronym (A-B-C Always Be Closing, B.O.L.D.), (3) By Objects (Zig pump, inflatable robot, 15-pound lump of fat), (4) By Symbolism (cross in background, bathtubs), (5) By Graphic/Dramatic Images (crash test dummy, hammer pounding head), (6) By Brand/Title (Magnetic Marketing, NO B.S., Wheel of Fortune)."
    source: MTBN-OTM-Manual-p13-16

  - id: "FW-DK-301"
    text: "Structure of Promises Framework - 5 dimensions: (1) BIG vs SMALL promises, (2) DIRECT vs IMPLIED promises (implied framed as questions are powerful), (3) PRIMARY vs SECONDARY promises (3-5 secondaries per primary), (4) STACKING promises (Message + Market + Media), (5) What It IS NOT as a promise - WITHOUT, NOT, STOP, erased."
    source: MTBN-OTM-Manual-p70-73

  - id: "FW-DK-302"
    text: "Bridge and Segue Architecture - BRIDGE = acknowledged change (Summary + Introduction of next, Trial close with IF, Change of scene). SEGUE = perceived seamlessness (Mini-story tying A to B, Mini-demo, Testimonial). 4 softeners for Middle-to-Close: Signature/Summary Story, Summary Testimonial, Blackie Story, Direct/In Your Service. 5 transition types: Reason Why, More, IF List, Direct, Types of People."
    source: MTBN-OTM-Manual-p79-81

  - id: "FW-DK-303"
    text: "Testimonial Usage Framework - 6 dimensions: (1) WHO - Authority, Credibility, Believability, Affinity, Relevance, (2) FOR WHAT PURPOSE - present a point, prove a point, demonstrate, counter objection, be surrogate, match specific viewer, shame, (3) WHEN/ORDER - beginning-middle-end placement, (4) WHERE - every media plus introductions plus studio vs habitat, (5) REPETITION - internal repetition secret, (6) ADAPTATION TO MEDIA - Live (6 formats), Video (filming choreography). Dangers: off reservation, verbal vomit, teaching, too much time, get in way of selling."
    source: MTBN-OTM-Manual-p46-50

  - id: "FW-DK-304"
    text: "The Middle Structure Framework - Divide Middle into 3 or 4 internal segments. If 4: (1) Explanation and exposition (facts, figures, X-factor), (2) Proof (science, authority, social proof, demonstration, superiority), (3) Human Interest Stories (origin, before/after, be-like-me, star testimonial), (4) Elimination of Objections (known in advance, as they happen, devil advocate host). If 3: combine segments 1+2 or 2+3."
    source: MTBN-OTM-Manual-p40-41

  - id: "FW-DK-305"
    text: "Speaker Tells Framework - 6 presentation behaviors that signal reasons NOT to buy: (1) Significant voice/tone/body change moving from content to commercial, (2) Any hint of apology for selling, (3) Self-disparaging humor during selling, (4) Disrespectful handling of your product, (5) Hesitation or confusion in the close (memorize this part), (6) Hurrying the pitch vs preceding presentation as if embarrassed."
    source: MTBN-OTM-Manual-p116

L5_METHODOLOGIES:
  - id: "MET-DK-209"
    text: "Sequential Agreement Methodology - List EVERY agreement that must be reached before they can buy. Build sequence: (1) Basic fact of need, (2) Vital facts proving epidemic scope with statistics, (3) Worsening trend with reasons, (4) Human toll horror stories, (5) Responsibility argument, (6) Strike-any-time urgency, (7) Current solutions are a BIG LIE, (8) Summary of what they did not know before, (9) Bad news about alternatives, (10) The ONE solution, (11) Solution is proven reliable credible, (12) I AM BECAUSE I OWN identity, (13) Testimonials restating key points, (14) Second FULL summary, (15) Vital to own plus no time to waste, (16) Price not subject to question plus payment terms."
    source: MTBN-OTM-Manual-p36-37

  - id: "MET-DK-210"
    text: "7x-21x Promise Repetition Method - 10 vehicles: (1) Opening teases, (2) Direct assertion, (3) Inside demonstrations, (4) Inside testimonials, (5) Inside stories, (6) As headline of story, (7) As punch line of story, (8) Tied to proffer of fact, (9) Inside the guarantee, (10) As trial close. REINFORCED via 3 channels: Verbal (said by presenter, by others, in unison), Visual (pennant, sign, backdrop, product shots, symbolism), Printed (on screen, on order form, in print sent with media)."
    source: MTBN-OTM-Manual-p74-77

  - id: "MET-DK-211"
    text: "10-Step Interest Retention for Long Presentations - (1) Best possible audience plus praise smart ones and shame lazy ones, (2) Most relevant message possible, (3) Organization into 3-Act or 4-Act Plays with segments providing satisfaction along the way, (4) Periodic cliffhangers teases and new headlines, (5) Mixed content (information, humor, story, demo), (6) Mixed media (photos, cartoons, video, text), (7) Enough speed and pace they must focus to keep up, (8) Momentum with pace picking up, (9) Break into series of presentations, (10) Consider lying about elapsed and coming amounts of time."
    source: MTBN-OTM-Manual-p43

  - id: "MET-DK-212"
    text: "Pre-Existing Conditions Management - Step 1: Control WHO via audience source, nature, appropriateness, buying capability and willingness. Step 2: Manage HOW THEY THINK AND FEEL - were they tricked or intending to buy, attitude toward presenter, sense of importance and scarcity and exclusivity. Step 3: Optimize ENVIRONMENT - 16 physical factors (room setup, colors, lighting, AV, time of day, placement, introductions, breaks, sales tables, crew, your movement). Step 4: Align YOUR MIND-SET about who why what how you sell and about money."
    source: MTBN-OTM-Manual-p123-130

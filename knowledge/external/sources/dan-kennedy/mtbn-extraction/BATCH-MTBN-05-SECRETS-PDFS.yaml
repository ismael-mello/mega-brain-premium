# ============================================================
# L1 PHILOSOPHIES (+3) — IDs FIL-DK-423 to FIL-DK-425
# ============================================================

L1_PHILOSOPHIES:
  - id: "FIL-DK-423"
    content: "Napoleon Hilling — the discipline of hunting for commonalities across winning controls. Named after Napoleon Hill's method of interviewing successful people to find shared traits. Applied to copy: collect 12-24 historical controls and 6-12 contemporary controls in a category, then identify what they ALL have in common. The commonalities ARE the code."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "direct-response", "reverse-engineering"]
    tags: ["copy-code", "napoleon-hilling", "commonalities", "controls"]

  - id: "FIL-DK-424"
    content: "There's gold in the old. Study Hopkins, Collier, and the masters of the past over modern copywriters. The psychology hasn't changed — only the media has changed. A presentation that works is a presentation that works is a presentation that works."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule3ThePsychologyofCCS.txt"
    domains: ["copywriting", "education", "psychology"]
    tags: ["classics", "hopkins", "collier", "timeless-principles"]

  - id: "FIL-DK-425"
    content: "Direct response is roughly half behavioral psychology and half math. The psychology side never changes — media changes, delivery mechanisms change, but human motivation, fear, greed, desire remain constant across centuries."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule3ThePsychologyofCCS.txt"
    domains: ["direct-response", "psychology", "philosophy"]
    tags: ["behavioral-psychology", "math", "timeless"]

# ============================================================
# L2 MENTAL MODELS (+4) — IDs MM-DK-363 to MM-DK-366
# ============================================================

L2_MENTAL_MODELS:
  - id: "MM-DK-363"
    content: "Copy Code Discovery Model — every successful category of direct response has an underlying 'code' — a set of elements that appear in virtually every winning control. The code is NOT obvious. You must reverse-engineer it by collecting many winners and isolating commonalities. Once cracked, the code becomes a checklist for creating new copy."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "direct-response", "reverse-engineering"]
    tags: ["copy-code", "pattern-recognition", "checklist"]

  - id: "MM-DK-364"
    content: "Story vs Statement 5-Dimension Taxonomy — formal comparison of story-based vs statement-based communication across 5 dimensions: (1) Statement provokes Skepticism, Story provokes Curiosity; (2) Statement is Challenged, Story is Listened To; (3) Statement is Confrontational, Story is Inspirational; (4) Statement Requires Authority, Story Creates Authority; (5) Statement Can Be Copied/Diluted, Story is Proprietary/Protected."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["storytelling", "persuasion", "copywriting"]
    tags: ["story-vs-statement", "taxonomy", "5-dimensions", "authority"]

  - id: "MM-DK-365"
    content: "Story Equity Model — stories are investable assets with compounding returns. Napoleon Hill's Andrew Carnegie story, Maxwell Maltz's plastic surgery patient, Robert Kiyosaki's Rich Dad — these origin stories have enormous proprietary equity that cannot be copied or diluted. Every business and personal brand should build story equity deliberately."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["storytelling", "branding", "assets"]
    tags: ["story-equity", "origin-story", "proprietary", "napoleon-hill", "maltz"]

  - id: "MM-DK-366"
    content: "Single Emotional Response Principle — the mind can only hold one emotionally triggered response at a time. If you trigger curiosity with a story, skepticism cannot coexist simultaneously. This is why stories defeat objections more effectively than logical arguments — they preempt the emotional state that feeds resistance."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["psychology", "persuasion", "storytelling"]
    tags: ["emotional-response", "single-state", "curiosity-vs-skepticism"]

# ============================================================
# L3 HEURISTICS (+7) — IDs HEUR-DK-533 to HEUR-DK-539
# ============================================================

L3_HEURISTICS:
  - id: "HEUR-DK-533"
    content: "To crack a copy code: collect 12-24 historical controls plus 6-12 contemporary controls in the category. Read them all. Identify what appears in virtually every single one. Those commonalities are the code elements. Build a checklist from them."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "direct-response", "methodology"]
    tags: ["copy-code", "controls", "12-24-historical", "6-12-contemporary"]

  - id: "HEUR-DK-534"
    content: "Criteria for Code Owner Worth Watching (5 criteria): (1) Direct response practitioner, (2) Uses print/direct mail, (3) Company of meaningful size, (4) Actively engaged in the category, (5) Longevity — they've been doing it for years, not months."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "competitive-intelligence"]
    tags: ["code-owner-criteria", "5-criteria", "direct-response"]

  - id: "HEUR-DK-535"
    content: "Testing Matrix Impossibility — for a direct mail piece with 5 variables and 4 options each, you'd need 400,000+ test pieces to find the optimum. Nobody can afford that. So you STEAL from those who already tested — crack their code, use their proven elements. Let others pay for the testing."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["direct-response", "testing", "economics"]
    tags: ["testing-impossibility", "steal-proven", "400k-pieces"]

  - id: "HEUR-DK-536"
    content: "Negative Verification technique — use attacks, criticism, and enemies as social proof. If the establishment attacks you, it proves you're a threat. If competitors criticize you, it proves you matter. Turn every negative into verification of importance."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "persuasion", "positioning"]
    tags: ["negative-verification", "enemies-as-proof", "social-proof"]

  - id: "HEUR-DK-537"
    content: "If writing is difficult for you, it is because your preparation is poor. Real copywriters aren't writing at Starbucks with inspiration. They prepare obsessively — research, swipe files, outlines, story inventory — then the writing is mechanical assembly."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule3ThePsychologyofCCS.txt"
    domains: ["copywriting", "productivity", "preparation"]
    tags: ["writing-difficulty", "preparation", "assembly"]

  - id: "HEUR-DK-538"
    content: "Dictate output to time — assign exact page counts to exact time slots. 16 pages assigned 50 minutes means the entire system knows the constraint. The work expands or contracts to fill the time allotted, so allot deliberately."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule3ThePsychologyofCCS.txt"
    domains: ["productivity", "copywriting", "time-management"]
    tags: ["dictate-output", "time-boxing", "16-pages-50-minutes"]

  - id: "HEUR-DK-539"
    content: "Most people would be better off putting 75% less out and really working on the 25% to get it right. Quality over quantity in copy — one great piece outperforms twenty mediocre ones."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule3ThePsychologyofCCS.txt"
    domains: ["copywriting", "quality", "productivity"]
    tags: ["75-percent-less", "quality-over-quantity", "focus"]

# ============================================================
# L4 FRAMEWORKS (+5) — IDs FW-DK-311 to FW-DK-315
# ============================================================

L4_FRAMEWORKS:
  - id: "FW-DK-311"
    content: "15-Element Copy Code for Investment Newsletters: (1) Alarm — crisis/danger, (2) Mystery/Mystique — hidden knowledge, (3) Amazing Stories of People Like Them — relatable success, (4) Authority-Figure/Expert/Media Verification — third-party proof, (5) Acknowledgement of 'Incredible' — address skepticism, (6) Why This Is Different — differentiation, (7) Your Enemy Is My Enemy — tribal bonding, (8) If Good Enough For Famous Person — celebrity proof, (9) Pronouncements of Epic Importance — gravitas, (10) Emotional Mission Statement — purpose, (11) Crisis=Opportunity — reframe fear, (12) Exotic/Proprietary Name — branded IP, (13) Tastes Like Chicken — familiar comparison, (14) What To Do Not How To — tease without reveal, (15) Timeliness/Urgency — act now. Plus (16) Meaningful Specifics — precise numbers and dates."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "direct-response", "financial-marketing"]
    tags: ["15-element-code", "investment-newsletters", "copy-code"]

  - id: "FW-DK-312"
    content: "Code-to-Template Conversion Methodology — 4-step process: (1) CRACK the code — collect controls, identify commonalities; (2) CONVERT code elements into specific copy techniques; (3) TEMPLATE — create fill-in-the-blank templates for each element; (4) WRITE — assemble copy using templates as building blocks. The result: systematic copy production that captures the essence of proven winners."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "methodology", "systematization"]
    tags: ["code-to-template", "4-step", "crack-convert-template-write"]

  - id: "FW-DK-313"
    content: "4 Typical Infomarketer Origin Stories taxonomy: (1) Found the Key — discovered something powerful, feels guilty keeping it secret; (2) Had to Figure It Out — struggled, succeeded, now angry at charlatans who mislead others; (3) This Thing Found Me — reluctant hero, the knowledge chose them; (4) Friends Begged Me — others kept asking, finally relented. Every info product needs one of these four narrative structures."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["storytelling", "info-marketing", "origin-stories"]
    tags: ["4-origin-stories", "infomarketer", "narrative-structure"]

  - id: "FW-DK-314"
    content: "Story Selection Decision Framework — How to decide which stories to use: (1) What objections need erasing? → find stories that dissolve them; (2) What assumptions need correcting? → find stories that reframe; (3) What assertions need proving? → find stories that demonstrate; (4) What philosophical positions need conveying? → find parables that embody them. Map every story to a strategic purpose."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["storytelling", "persuasion", "strategy"]
    tags: ["story-selection", "4-criteria", "objections", "assertions"]

  - id: "FW-DK-315"
    content: "Story Types Portfolio — 6 categories every communicator needs: (1) Champions/Journeys — transformation arcs; (2) Miracles — extraordinary outcomes; (3) Adventures — exciting pursuit narratives; (4) Character/Strength — integrity under pressure; (5) Humanity — warmth and vulnerability; (6) Curiosity/Mystique — intrigue and hidden knowledge. Build an inventory across all six."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["storytelling", "communication", "inventory"]
    tags: ["6-story-types", "portfolio", "story-inventory"]

# ============================================================
# L5 METHODOLOGIES (+3) — IDs MET-DK-216 to MET-DK-218
# ============================================================

L5_METHODOLOGIES:
  - id: "MET-DK-216"
    content: "How to Crack Any Copy Code — Step-by-step methodology: STEP 1: Select a direct response category with longevity and scale. STEP 2: Collect 12-24 historical controls (the winners that ran for years). STEP 3: Collect 6-12 contemporary controls (current winners). STEP 4: Read all controls multiple times. STEP 5: Identify elements that appear in virtually ALL of them — these are the code elements. STEP 6: Create a numbered code checklist (like the 15-element investment newsletter code). STEP 7: Create a swipe file organized by code element, not by source. STEP 8: Use the code checklist for every new piece you write in that category."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "reverse-engineering", "direct-response"]
    tags: ["crack-code-methodology", "8-steps", "controls", "swipe-file"]

  - id: "MET-DK-217"
    content: "Swipe File Organization by Code Element — Instead of organizing swipe files by source or date, organize by code element. For each element in your code (e.g., 'Alarm', 'Mystery', 'Enemy Alignment'), create a folder/section. Collect 3-5 examples of each element from different controls. When writing, pull the best example from each element's folder and adapt. This transforms swipe files from inspiration to systematic assembly."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule1CrackingtheCopycode.txt"
    domains: ["copywriting", "organization", "systematization"]
    tags: ["swipe-file-organization", "by-element", "systematic-assembly"]

  - id: "MET-DK-218"
    content: "Story Inventory Building Methodology: STEP 1: Map strategic needs — list objections, assumptions, assertions, and philosophical positions you need to address. STEP 2: For each need, identify story TYPE required (champion, miracle, adventure, character, humanity, curiosity). STEP 3: Mine personal experience, client experiences, historical examples, and public figures for matching stories. STEP 4: Write each story in full draft form (not just notes). STEP 5: Test in low-stakes settings (presentations, emails) before high-stakes copy. STEP 6: Build a categorized story bank cross-referenced by strategic purpose AND story type."
    source_file: "Make Them Buy Now/PDFs/transcription_pdf_SecretsModule4ThePowerofStoryinSalesCopy.txt"
    domains: ["storytelling", "copywriting", "preparation"]
    tags: ["story-inventory", "6-steps", "categorized-bank"]


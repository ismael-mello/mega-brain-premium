# DK-OMC Batch 02 — Psychology: Attainability & 11 Agreements + Opportunity Elements
# Files: CD/6 (tracks 1-6), CD/7 (tracks 1-5), CD/8 (tracks 1-6), CD/9 (tracks 1-5), CD/10 (tracks 1-5), DVD/3
# Extracted: 2026-03-15
# Extractor: Claude Opus 4.6

L1_FILOSOFIAS:
  - id: "FIL-DK-340"
    text: "People are reluctant to try and fail at pretty much anything. The derision from others, the pain, the humiliation that will come with failure weighs more heavily on their mind than the possibility of the gain and the benefits."
    source: "DVD03"

  - id: "FIL-DK-341"
    text: "Every time they are presented with another situation in which they may succeed or fail, all of the ghosts of disappointments and frustrations and criticisms past rear up in their ugly little heads."
    source: "DVD03"

  - id: "FIL-DK-342"
    text: "They are Charlie Browns. Time and time again they have been talked into running up and kicking at the ball again and then they have fallen on their ass. We are trying to do it yet again. So at some point we cannot show them Lucy and we cannot show them a ball. We got to show them something that looks different."
    source: "CD6-track1"

  - id: "FIL-DK-343"
    text: "Something can be really beneficial to everybody in a general sense and suddenly feel not very personally beneficial. There is a critical difference between acknowledgement of beneficial nature and acknowledgement of personal beneficial nature."
    source: "CD6-track1"

  - id: "FIL-DK-344"
    text: "One of the last lines of defense for people against commitment is timing. Personal timing is their last, last, last line of defense."
    source: "CD6-track2"

  - id: "FIL-DK-345"
    text: "Personal appropriateness gets all the way back to people's beliefs about money and success and ambition. Many people will make all of the other agreements and then get stopped at: is this really right for me? Do I deserve it? Is it appropriate for me to have it?"
    source: "CD6-track2"

  - id: "FIL-DK-346"
    text: "One thing that helps people set their conscious mind aside and buy in opposition and conflict to beliefs, experience and so forth is really unadulterated greed. Halbert used to talk about the necessity to jump up and down on their greed glands until blood spurred out of their ears."
    source: "CD6-track3"

  - id: "FIL-DK-347"
    text: "Most info marketers probably err to the other extreme — they explain the tools in the toolbox while pure opportunity marketers don't even let them look in the toolbox. They say 'yeah there is a toolbox over there but I am not going to show it to you — what is important is all this great shit that is going to happen to you.'"
    source: "CD6-track3"

  - id: "FIL-DK-348"
    text: "Hype works on intelligent, educated, sophisticated consumers. It works on CEOs, it works on doctors. The desire to believe the hype is so great that they will take the entire conscious mind box and set it aside and tell it to take a hike."
    source: "CD6-track4"

  - id: "FIL-DK-349"
    text: "People react very differently in privacy than they do in public. For those of us who distant market, that works. Putting them in a room would be a profound disadvantage for certain pitches — but in privacy, in secrecy, people behave very differently."
    source: "CD6-track4"

  - id: "FIL-DK-350"
    text: "Every pitch is a threat to them on several levels. It is a threat to the conscious mind and its portfolio of beliefs. It is also a threat because it is going to ask them to spend money. As soon as they detect it is a pitch, all the defenses start to go up."
    source: "CD7-track1"

  - id: "FIL-DK-351"
    text: "If it is so good, why share it? Why don't you just do it? This is perhaps the biggest cause of skepticism about opportunity. We cannot ignore it — it has to be answered with a compelling reason why."
    source: "CD7-track3"

  - id: "FIL-DK-352"
    text: "The before is more important than the after in transformational stories. Info marketers tend to tell the story evenly weighted or put emphasis on the after. The before is more important because that is where they are. For it to have leverage, they have to really believe you were where they are or worse."
    source: "CD7-track5"

  - id: "FIL-DK-353"
    text: "The real reason why men buy opportunity is to get laid. Same reason they take out the trash. And the empirical evidence that it does not work does not discourage them in the least."
    source: "CD9-track2"

  - id: "FIL-DK-354"
    text: "Very few people you are selling to are self-actualized. What other people think of them is the number one force in their lives. They are trying to elevate their status in the eyes of others. They are not buying for their personal goals — they are buying to fulfill the expectations of other people."
    source: "CD9-track2"

  - id: "FIL-DK-355"
    text: "Hardly anybody ever sticks to their own personal goals. They are buying it essentially to try and fulfill the expectations of other people and elevate their status in the eyes of others."
    source: "CD9-track2"

  - id: "FIL-DK-356"
    text: "I do not think I have ever had an original idea in my life. I am a very easy man. I take the easiest way. If I just copy yours, I can do it all the heck faster."
    source: "CD10-track5 (George Douglas)"

  - id: "FIL-DK-357"
    text: "As a collective community, the more of us who sell with non-usage, the harder it gets on everybody else because we are all taking turns showing up. You are showing up to his guy three months after he was there."
    source: "DVD03"

  - id: "FIL-DK-358"
    text: "The main thing prospects want to know about the person they are buying from is: is the person real? They may not enunciate it, but that is what they want to know."
    source: "CD7-track4"

  - id: "FIL-DK-359"
    text: "If you make it interesting enough, if what they are looking for is what you are telling them, you can talk as long as you want to. I do not care how long you talk, as long as you are interesting, as long as you are giving them what they want to hear."
    source: "CD10-track2 (George Douglas)"

L2_MODELOS_MENTAIS:
  - id: "MM-DK-280"
    text: "The 11 Agreements Model: Before anyone buys opportunity, they must sequentially agree on 11 points — from general need through personal attainability, personal benefit, timing, personal timing, and personal appropriateness. Each is a hurdle that must be cleared."
    source: "CD6-track1, DVD03"

  - id: "MM-DK-281"
    text: "Lucy/Charlie Brown Model: Prospects are Charlie Browns who have repeatedly been convinced to run up and kick the ball, only to have it pulled away. Each failed attempt creates deeper skepticism. You cannot show them Lucy and a ball — you must show them something that looks fundamentally different."
    source: "CD6-track1, DVD03"

  - id: "MM-DK-282"
    text: "Toaster Principle: The closer you get to 'toaster' where they see a simple physical thing, the better. Present your opportunity as a toaster (push button, toast comes up) not as the process of making toast (dough, yeast, water, bread maker, forming, heating). A thing must have a name and sound like a kitchen appliance, not an elaborate process."
    source: "CD7-track2"

  - id: "MM-DK-283"
    text: "Privacy vs Public Behavior Model: People behave very differently alone than in groups. A pitch that would fail miserably in a room of 200 professionals can succeed enormously when delivered privately through direct mail or online. Shame operates publicly, greed operates privately."
    source: "CD6-track4"

  - id: "MM-DK-284"
    text: "Conscious Mind Portfolio Model: The conscious mind maintains a portfolio of beliefs. Every pitch is a threat to that portfolio. The goal of opportunity marketing is to get the prospect to set aside the entire conscious mind box and its accumulated evidence."
    source: "DVD03"

  - id: "MM-DK-285"
    text: "General vs Personal Beneficial Nature: A prospect can agree something is beneficial in general but not believe it is personally beneficial. The Tupperware wife example — she agrees making 80K a year is good, but realizes it will threaten her marriage to a 32K auto repair guy."
    source: "CD6-track1"

  - id: "MM-DK-286"
    text: "Timing vs Personal Timing Model: Timing is about external market conditions (real estate bubble, recession). Personal timing is about their individual circumstances (Barbara quit, kids out of school, vacation coming). Both must be overcome separately."
    source: "CD6-track1, CD6-track2"

  - id: "MM-DK-287"
    text: "Urgency From Past Loss Model: Instead of basing urgency on what they will gain or lose in the future (supply/demand), base it on what they have already lost by not having acted. People have a precedent in their head for having missed out on opportunity."
    source: "CD9-track1"

  - id: "MM-DK-288"
    text: "The Blackie Story Model: A mysterious source figure (dying man, retiring billionaire, old master) who originally discovered the secret and passed it to the seller. This serves dual purpose: (1) provides reason why the seller is sharing, and (2) makes the source not the seller, automatically increasing believability."
    source: "CD7-track3"

  - id: "MM-DK-289"
    text: "Taste Like Chicken Model: For difficult-to-understand propositions, link your opportunity to something the prospect already understands and accepts. Internet mall = regular mall. Oil well = recurring income. Real estate = everybody lives in a house. The analogy makes the incomprehensible accessible."
    source: "CD8-track4, CD8-track5"

  - id: "MM-DK-290"
    text: "Status Elevation Purchase Model: People do not buy the opportunity for its practical value — they buy it for the status elevation it provides in the eyes of others. Brainerd Melanger discovered he was really in the business card business, not the import-export business."
    source: "CD9-track2, CD9-track3"

  - id: "MM-DK-291"
    text: "Value Without Achievement Model: Membership, certificates, business cards, directories — anything that delivers perceived value and status without requiring the buyer to actually do anything or achieve results. Most people never use what they buy, so give them value from the purchase itself."
    source: "CD9-track1, CD9-track2"

  - id: "MM-DK-292"
    text: "Shrink Wrap Shelf Model: Most buyers have a shelf of courses and programs with the shrink wrap still on. The cumulative non-usage experience creates a wall of skepticism for the next seller. You must prove your thing is fundamentally different from everything already on that shelf."
    source: "DVD03"

  - id: "MM-DK-293"
    text: "Fire Alarm Hotel Model: For overcoming personal timing, you have only two choices — make it advantageous to act despite bad timing, or make it so urgent that bad timing is trumped. Like a fire alarm at 3 AM: the only way they move is if you convince them the building is actually on fire."
    source: "CD6-track2"

  - id: "MM-DK-294"
    text: "Original Dream Reselling Model: Every business owner had a dream and motivational picture when they first got into their business. That excitement is dormant but still there. Link your pitch to their original dream to rekindle the excitement they had as virgins in the game."
    source: "CD8-track5, CD8-track6"

  - id: "MM-DK-295"
    text: "Enemy/Villain Model: It is nearly always helpful to have an enemy to sell against. The villain moves you from the other side of the desk to the same side as the buyer. You now have shared understanding of whoever is the ugly in their world."
    source: "CD8-track6"

  - id: "MM-DK-296"
    text: "Two Things Different Model: For someone to buy again after failure, one of two things must be true — either something is profoundly different about them, or something is profoundly different about your thing. Always choose to prove the second, because it lets them off the hook."
    source: "DVD03"

L3_HEURISTICAS:
  - id: "HEUR-DK-420"
    text: "For every person who starts a diet, there are 10 people who are good at starting a diet as soon as the next event occurs. There is always a 'right after' point at which they will do this — but not now."
    source: "CD6-track2"

  - id: "HEUR-DK-421"
    text: "To overcome personal timing, there are only two approaches: (1) make acting now advantageous despite bad timing, or (2) make it so urgent that bad personal timing is trumped by the urgency."
    source: "CD6-track2"

  - id: "HEUR-DK-422"
    text: "MDs (medical doctors) are the number one buyers of spam penis enlargement pills — hundreds of millions of dollars. They know better, they have prescription alternatives, yet hype overcomes conscious knowledge even in the most educated buyers."
    source: "CD6-track4"

  - id: "HEUR-DK-423"
    text: "Jeff Paul infomercial: shot for $8,200 first version, $10,000-$11,000 second version. Ran for 8.5 years uninterrupted on 4 national cable networks. Produced $22-26 million in revenue. Holds record for longest consecutive running lead generation business opportunity infomercial."
    source: "CD6-track6"

  - id: "HEUR-DK-424"
    text: "One ad sold 1.6 million copies of a book — using mystery opportunity positioning with incomprehensible photographs and no promise in the headline. The headline 'Can you tell what this woman is doing' violated conventional headline rules."
    source: "CD6-track5"

  - id: "HEUR-DK-425"
    text: "When you have a winner out of the gate and did not test every variable, the last thing you want to do is screw with it. One guy had mismatched socks — we made him wear mismatched socks in the reshoot because who the hell knows what is making it work."
    source: "CD6-track6"

  - id: "HEUR-DK-426"
    text: "The overwhelming majority of pure opportunity marketers locate themselves in small towns, Heartland of America towns. They tell an 'I am in a small town' story. If you live in Gossel, Kansas, you are more trustworthy than Phoenix, Cleveland, New York, or Los Angeles."
    source: "CD7-track1"

  - id: "HEUR-DK-427"
    text: "79-year-old works better than 80 because of specificity. The guy has to stay 79 until he turns 89."
    source: "CD7-track4"

  - id: "HEUR-DK-428"
    text: "Glenn W. Turner: in 3.5 years, put 500,000+ people into a business at $5,000 a piece. No internet, no webinars, no teleseminars — all old-fashioned manual labor putting people in rooms."
    source: "CD8-track3"

  - id: "HEUR-DK-429"
    text: "Brainerd Melanger sent 500 business cards to new members BEFORE shipping the course. Refund rate dropped like a rock. He realized he was really in the business card business."
    source: "CD9-track2"

  - id: "HEUR-DK-430"
    text: "Brainerd Melanger sent six copies of the directory to each member — one for them, one for their mother, one for the coffee table. The cost 'breaks my heart but we send them six copies.'"
    source: "CD9-track3"

  - id: "HEUR-DK-431"
    text: "George Douglas: a million dollars a week in sales, 15 years ago. $10,000 average sale at a distance. 42 different home businesses available. About 20 people came to the farm per week, but 100 per week bought — the fact that they could come was the reassurance factor."
    source: "CD10-track3, CD10-track4"

  - id: "HEUR-DK-432"
    text: "George Douglas used 3-hour cassette tapes as his sales tool. People would listen 5 times before buying. If what you are telling them is what they are looking for, length does not matter."
    source: "CD10-track2"

  - id: "HEUR-DK-433"
    text: "Joe Carbo 'Lazy Man's Way to Riches' — the headline 'too busy earning a living to make any money' lets them off the hook in the first line. The entire premise is a mystery opportunity pitch with no real disclosure."
    source: "CD6-track5"

  - id: "HEUR-DK-434"
    text: "Pat Williams letter was a control for many years. Headline: 'I have made over $429,000 doing absolutely nothing.' The lift note from 'SC' says the real process is 'you send a shoebox of paper and he sends you back $429,000 every month.' This makes it feel real."
    source: "CD6-track3"

  - id: "HEUR-DK-435"
    text: "Urgency from past loss: 'You could have collected $69,934 in dividend payments over the last two years.' Starting with what they COULD HAVE had — not what they will get — is more painful and motivating than future gain."
    source: "CD9-track1"

  - id: "HEUR-DK-436"
    text: "A cafeteria line of options is almost always better than one thing. Jeff Paul went from selling financial planners one way to build a practice (high refund rate) to 101 ways (dramatically reduced refunds). George Douglas went from 4 programs to 42."
    source: "CD10-track5"

  - id: "HEUR-DK-437"
    text: "George Douglas added a $50 fee to swap between his 42 programs. He told them why on the tape: 'I do not want you to order just to get them.' Very few took advantage unfairly. The small fee eliminated the scare of losing $10,000 on the wrong choice."
    source: "CD10-track5"

  - id: "HEUR-DK-438"
    text: "Carlton Sheets held the longest running opportunity infomercial record at 14 years with Get Rich in Real Estate. Jeff Paul's show held second at 8.5 years."
    source: "CD6-track6"

  - id: "HEUR-DK-439"
    text: "Get rich in real estate is the oldest, most enduring pure opportunity because everybody gets it. Everybody lives in a house. They know houses get bought, sold, and rented. There is a base of knowledge — no explanation needed."
    source: "CD8-track3"

  - id: "HEUR-DK-440"
    text: "International Correspondent Schools ran the same ad from 1919 through the 2000s and into 2010 — the same appeal across nearly a century: man impresses wife/partner with new earning power. The visual changed (handing cash, checkbook, laptop) but the core appeal never changed."
    source: "CD9-track2"

  - id: "HEUR-DK-441"
    text: "Visible big ticket purchases by the affluent were affected in recent years not because they could not buy or did not want them, but because they felt it was inappropriate to drive home in a big new Lexus when across the street somebody was getting laid off."
    source: "CD6-track2"

L4_FRAMEWORKS:
  - id: "FW-DK-248"
    text: "The 11 Agreements Framework for Attainability: (1) Need/want exists, (2) Solution exists, (3) This specific solution works, (4) Others have succeeded with it, (5) Personal attainability — I can do this, (6) It is different from all past failures, (7) Not my fault it has not worked before, (8) Personal beneficial nature — good specifically for ME, (9) Timing is right — market conditions, (10) Personal timing is right — my circumstances, (11) Personal appropriateness — I deserve this / it is right for me."
    source: "CD6-track1, CD6-track2, DVD03"

  - id: "FW-DK-249"
    text: "15 Elements of Opportunity Presentation Framework: (1) Pure hype/mystery, (2) Trust (person, place, affinity, disarming), (3) Reason why, (4) Toaster principle — tangible thing with a name, (5) Reason why advertising, (6) Personal story of the presenter, (7) Being a larger-than-life figure, (8) Difficult proposition made simple, (9) Big idea, (10) Reselling the original dream, (11) Enemy/villain, (12) Urgency from past loss, (13) Membership, (14) Proof by test, (15) Status elevation."
    source: "CD6-track3 through CD9-track3"

  - id: "FW-DK-250"
    text: "Four Trust Elements Framework: (1) Person — who is the face, their story, authenticity, relatability; (2) Place — small town, heartland, trustworthy location; (3) Affinity — shared background, tone, conversational match; (4) Disarming — casual, non-threatening, no salesy movements."
    source: "CD6-track6, CD7-track1, DVD03"

  - id: "FW-DK-251"
    text: "Three Elements of Larger-Than-Life Figure: (1) Humble beginnings — so they do not see you as just an arrogant asshole with a Bentley; (2) Proof of importance — big audiences, media appearances, book signings, celebrity endorsements; (3) Taking control — 'I am your trainer, you are the trainees, I am here because my life works, you are here because yours does not.'"
    source: "CD8-track1, CD8-track2"

  - id: "FW-DK-252"
    text: "Transformational Story Framework: (1) Dramatic BEFORE — weighted heavily, this is where they are; (2) The turning point / firm resolution moment (Girl Scout at the Door, purple diary); (3) The AFTER — the transformation achieved. Key insight: the before must be more dramatic and weighted than the after."
    source: "CD7-track5, CD8-track1"

  - id: "FW-DK-253"
    text: "Overcoming Personal Timing Framework: Three choices when a list has seasonality — (1) Tactical: ignore the list except when responsive, then mail hard; (2) Reframe: convince them that what they think is disadvantageous timing is actually ideal timing; (3) Urgency override: make urgency so great that bad timing is trumped."
    source: "CD6-track2"

  - id: "FW-DK-254"
    text: "George Douglas Sales System Framework: (1) Lead generation ads in publications; (2) Inbound calls answered by real humans; (3) Pre-assigned program advisor; (4) Big package: color brochure, farm photos, family photos, office photos, program advisor pics; (5) 3-hour cassette tape that must be listened to before purchase; (6) Write down questions for program advisor; (7) Program advisor sells on straight commission; (8) Open farm invitation every Saturday (9-12 presentation, lunch, farm tour with wife)."
    source: "CD10-track2, CD10-track3, CD10-track4"

  - id: "FW-DK-255"
    text: "Membership Value Delivery Framework: (1) Immediate tangible — business cards sent before the course; (2) Directory/who's who listing — send 6 copies; (3) Certificate for the wall — large, impressive; (4) Ongoing status markers — pins, watches, branded items; (5) Each delivers perceived value without requiring activity or achievement from the buyer."
    source: "CD9-track2, CD9-track3"

  - id: "FW-DK-256"
    text: "Reason Why Framework for Opportunity: (1) Direct answer — why are you sharing this instead of keeping it; (2) Blackie story — inherited from a dying man / retiring master; (3) Irresistible impulse — the thing is so great he could not help coming back; (4) Legacy obligation — feels compelled to pass it on; (5) Timing reason why — about to retire, new discovery, etc."
    source: "CD7-track3, CD7-track4"

L5_METODOLOGIAS:
  - id: "MET-DK-172"
    text: "Off-The-Hook Headline Method: Place the 'it is not your fault' message in the headline itself. Example: 'Too busy earning a living to make any money.' The prospect immediately identifies — 'that is exactly the problem' — and the excuse for past failure is established before any selling begins."
    source: "CD6-track5"

  - id: "MET-DK-173"
    text: "Urgency From Past Loss Copy Method: Step 1 — Open with what they could have collected/earned if they had known and acted. Step 2 — Quantify the specific dollars missed. Step 3 — Continue rubbing their nose in money they should have had throughout the piece. Step 4 — Then pivot to what they will get going forward. The pain of loss already incurred is more motivating than future gain."
    source: "CD9-track1"

  - id: "MET-DK-174"
    text: "Business Card Before Course Method (Brainerd Melanger): Step 1 — As soon as order is received, print 500 business cards with their name, title, and organization. Step 2 — Ship business cards BEFORE shipping the course. Step 3 — Course arrives 2 days after cards. Result: refund rate drops dramatically because they now feel they ARE in the business before they even open the materials."
    source: "CD9-track2"

  - id: "MET-DK-175"
    text: "Proof By Test Method: Include a self-test the prospect can take that 'proves' the opportunity is right for them. Examples: free writing aptitude test (writing schools), invention evaluation (invention companies), profit test (info marketing). The test creates personal attainability proof and engagement. Results always come back positive."
    source: "CD8-track4"

  - id: "MET-DK-176"
    text: "Cafeteria Opportunity Method (George Douglas): Step 1 — Start with 4 home-based businesses. Step 2 — Add 2-5 new options per year until you reach 42. Step 3 — Allow any buyer to swap to any other program for $50. Step 4 — Communicate growth ('the company is growing all the time'). Step 5 — Position: 'if you cannot make one of these 42 businesses work, you probably should not be in business.' Result: eliminates fear of making wrong choice, dramatically reduces refunds."
    source: "CD10-track5"

  - id: "MET-DK-177"
    text: "Direct Mail Heart Transplant Method (George Douglas literal example): Step 1 — Get your records even if they resist. Step 2 — Write a personal letter explaining who you are, what you need, and why, with personal context (Christmas letter). Step 3 — Mail to all 467 hospitals that do transplants. Step 4 — Include proof you can pay, can relocate, and are motivated. Step 5 — Follow up on every positive response. Result: 4 doctors responded, got a heart within 6 months vs the 3 years the system said it would take."
    source: "CD9-track5, CD10-track1"

  - id: "MET-DK-178"
    text: "Saturday Open Farm Method (George Douglas): Step 1 — Invite all new customers to visit every Saturday. Step 2 — Give 2-hour presentation covering all programs. Step 3 — Open for Q&A. Step 4 — Feed them lunch at the farm. Step 5 — Have wife interact naturally with visitors. Step 6 — Program advisors available to work individually. Only 20% of buyers visit but the fact they CAN visit is the reassurance factor that drives 100% of sales."
    source: "CD10-track3"

  - id: "MET-DK-179"
    text: "Reselling the Original Dream Method: Step 1 — In first meeting/conversation, ask 'How did you get into this business? Why?' Step 2 — Let them tell the story — they will perk up re-experiencing the original excitement. Step 3 — Link your proposition to that original dream and mental picture. Step 4 — Use the language and imagery of their original aspiration, not your technical features. Example: Harrison's postcard going right back to 'how to have a bestselling book' for disillusioned authors."
    source: "CD8-track5, CD8-track6"

  - id: "MET-DK-180"
    text: "Dramatic Before Story Method: Step 1 — Weight the before portion of your story at least 2:1 versus the after. Step 2 — Make the before as horrible, miserable, humiliating, and painful as the worst nostalgic memory. Step 3 — Include a specific 'firm resolution' or 'day that turned my life around' moment. Step 4 — The after follows naturally but with less emphasis. Examples: Jeff Paul sitting in his car in his driveway weeping. Jim Rohn lying to a Girl Scout because he could not afford cookies."
    source: "CD7-track5, CD8-track1"

  - id: "MET-DK-181"
    text: "Taste Like Chicken Analogy Method: Step 1 — Identify what is hard to explain about your opportunity. Step 2 — Find something the prospect already knows, understands, and accepts. Step 3 — Create the analogy: internet store = mall store, recurring income = oil well in your front yard. Step 4 — Build entire pitch around the analogy. Example: iMall sold virtual store spaces at $3-5K each by saying 'it is just like the mall in your area except more people come and it has no walls.'"
    source: "CD8-track4, CD8-track5"

  - id: "MET-DK-182"
    text: "Six-Copy Directory Method (Brainerd Melanger): Step 1 — Create a directory listing every member. Step 2 — Give each member a full page about themselves. Step 3 — Ship six copies to each member. Step 4 — Add a large certificate suitable for framing. Step 5 — Each item delivers status elevation without requiring any business activity. The cost per member is small relative to the retention and satisfaction impact."
    source: "CD9-track3"


L1_FILOSOFIAS:
  - id: "FIL-DK-319"
    text: "There are really three basic stories we can tell — a repair story, an improvement story, or an opportunity story. Only opportunity is linked to desire. Repair is linked to need, improvement is linked to obligation."
    source: "CD1-track2"
  - id: "FIL-DK-320"
    text: "Need is fundamentally boring. Nobody is wildly excited about going to the store to buy toilet paper. Most need is actually the same thing going on in everybody's mind and emotions as goes on about toilet paper — not much is going on at all."
    source: "CD1-track4"
  - id: "FIL-DK-321"
    text: "Selling on need is maybe the biggest loser of all. And yet what we do a lot is try and convince them that they should want what they need. And that's a tough game."
    source: "CD1-track5"
  - id: "FIL-DK-322"
    text: "The worst thing about repair is we wind up where we were before. The hinge on the door broke, we put a new hinge on, the door is where the door was before. That is not fundamentally exciting."
    source: "CD1-track2"
  - id: "FIL-DK-323"
    text: "Obligation in all of its forms exists but is not really motivating to anybody. Obligation is having to help a friend move. Nobody really is looking forward for two weeks to the experience of helping the friend move."
    source: "CD1-track3"
  - id: "FIL-DK-324"
    text: "There is a profound difference between desire and ambition. Everybody has desire for more. They play the lottery, they put money in a slot machine. But that doesn't mean they have ambition to go get it."
    source: "CD2-track1"
  - id: "FIL-DK-325"
    text: "Most small business owners get up in the morning and go to their business because they got to pay the bills. Their interest is negatively motivated, not positively motivated. It is obligation, not desire linked."
    source: "CD1-track4"
  - id: "FIL-DK-326"
    text: "The purpose of the conscious mind is its own survival. It is a collection of beliefs — a living, breathing creature with defense mechanisms — and its only purpose is to survive. When you take a belief away from it, that's like ripping a body part off."
    source: "CD3-track3"
  - id: "FIL-DK-327"
    text: "We are threats to the survival of their conscious mind. That's why historically a lot of selling of opportunity and personal development has occurred in very controlled environments with people in a room, taken away from their regular environment."
    source: "CD3-track4"
  - id: "FIL-DK-328"
    text: "People have secular religious beliefs about themselves, their business, the world around them, how things work. And they feel just as compelled to defend those beliefs as they do the beliefs of their particular church."
    source: "CD2-track5"
  - id: "FIL-DK-329"
    text: "It is easier to create gullibility for a new unknown opportunity than it is for a familiar approach to repair or improvement. The opportunity story feels new — it is harder for them to immediately apply their reject list to it."
    source: "CD5-track1"
  - id: "FIL-DK-330"
    text: "Every achievement of gullibility with people who should know better has a foundational element: it invites people to place their faith in someone else or something else, not in self."
    source: "CD4-track6"
  - id: "FIL-DK-331"
    text: "It's almost impossible to achieve gullibility if the premise you're selling is all about faith in self. As soon as we start selling self-improvement, we're moving towards skepticism away from gullibility."
    source: "CD5-track1"
  - id: "FIL-DK-332"
    text: "A no man ever went broke overestimating the incredible ignorance of any segment of the American public."
    source: "CD4-track6"
  - id: "FIL-DK-333"
    text: "We project onto prospects all sorts of attitudes and behavioral characteristics and thoughts and beliefs that really aren't there at all. We're pitching a different person than we think we're pitching."
    source: "CD2-track4"
  - id: "FIL-DK-334"
    text: "The acceptance of possibility cannot be assumed in your advertising, marketing, and selling. People's beliefs about preordination — by God, by genetics, by astrology, by background — contradict our basic premise of open architecture."
    source: "CD3-track1"
  - id: "FIL-DK-335"
    text: "When we want them to improve what they already do not have a real high opinion of, we're asking them to make that worse. Big internal conflict."
    source: "CD4-track2"
  - id: "FIL-DK-336"
    text: "People are reluctant to try and fail at pretty much anything, to the extent that the derision from others, the pain, the humiliation that will come with the failure, weighs more heavily on their mind than the possibility of the gain."
    source: "CD5-track5"
  - id: "FIL-DK-337"
    text: "People are reluctant to try and fail at pretty much anything. The derision from others, the pain, the humiliation that will come with failure weighs more heavily on their mind than the possibility of the gain and the benefits."
    source: "DVD03"
  - id: "FIL-DK-338"
    text: "Every time they are presented with another situation in which they may succeed or fail, all of the ghosts of disappointments and frustrations and criticisms past rear up in their ugly little heads."
    source: "DVD03"
  - id: "FIL-DK-339"
    text: "They are Charlie Browns. Time and time again they have been talked into running up and kicking at the ball again and then they have fallen on their ass. We are trying to do it yet again. So at some point we cannot show them Lucy and we cannot show them a ball. We got to show them something that looks different."
    source: "CD6-track1"
  - id: "FIL-DK-340"
    text: "Something can be really beneficial to everybody in a general sense and suddenly feel not very personally beneficial. There is a critical difference between acknowledgement of beneficial nature and acknowledgement of personal beneficial nature."
    source: "CD6-track1"
  - id: "FIL-DK-341"
    text: "One of the last lines of defense for people against commitment is timing. Personal timing is their last, last, last line of defense."
    source: "CD6-track2"
  - id: "FIL-DK-342"
    text: "Personal appropriateness gets all the way back to people's beliefs about money and success and ambition. Many people will make all of the other agreements and then get stopped at: is this really right for me? Do I deserve it? Is it appropriate for me to have it?"
    source: "CD6-track2"
  - id: "FIL-DK-343"
    text: "One thing that helps people set their conscious mind aside and buy in opposition and conflict to beliefs, experience and so forth is really unadulterated greed. Halbert used to talk about the necessity to jump up and down on their greed glands until blood spurred out of their ears."
    source: "CD6-track3"
  - id: "FIL-DK-344"
    text: "Most info marketers probably err to the other extreme — they explain the tools in the toolbox while pure opportunity marketers don't even let them look in the toolbox. They say 'yeah there is a toolbox over there but I am not going to show it to you — what is important is all this great shit that is going to happen to you.'"
    source: "CD6-track3"
  - id: "FIL-DK-345"
    text: "Hype works on intelligent, educated, sophisticated consumers. It works on CEOs, it works on doctors. The desire to believe the hype is so great that they will take the entire conscious mind box and set it aside and tell it to take a hike."
    source: "CD6-track4"
  - id: "FIL-DK-346"
    text: "People react very differently in privacy than they do in public. For those of us who distant market, that works. Putting them in a room would be a profound disadvantage for certain pitches — but in privacy, in secrecy, people behave very differently."
    source: "CD6-track4"
  - id: "FIL-DK-347"
    text: "Every pitch is a threat to them on several levels. It is a threat to the conscious mind and its portfolio of beliefs. It is also a threat because it is going to ask them to spend money. As soon as they detect it is a pitch, all the defenses start to go up."
    source: "CD7-track1"
  - id: "FIL-DK-348"
    text: "If it is so good, why share it? Why don't you just do it? This is perhaps the biggest cause of skepticism about opportunity. We cannot ignore it — it has to be answered with a compelling reason why."
    source: "CD7-track3"
  - id: "FIL-DK-349"
    text: "The before is more important than the after in transformational stories. Info marketers tend to tell the story evenly weighted or put emphasis on the after. The before is more important because that is where they are. For it to have leverage, they have to really believe you were where they are or worse."
    source: "CD7-track5"
  - id: "FIL-DK-350"
    text: "The real reason why men buy opportunity is to get laid. Same reason they take out the trash. And the empirical evidence that it does not work does not discourage them in the least."
    source: "CD9-track2"
  - id: "FIL-DK-351"
    text: "Very few people you are selling to are self-actualized. What other people think of them is the number one force in their lives. They are trying to elevate their status in the eyes of others. They are not buying for their personal goals — they are buying to fulfill the expectations of other people."
    source: "CD9-track2"
  - id: "FIL-DK-352"
    text: "Hardly anybody ever sticks to their own personal goals. They are buying it essentially to try and fulfill the expectations of other people and elevate their status in the eyes of others."
    source: "CD9-track2"
  - id: "FIL-DK-353"
    text: "I do not think I have ever had an original idea in my life. I am a very easy man. I take the easiest way. If I just copy yours, I can do it all the heck faster."
    source: "CD10-track5 (George Douglas)"
  - id: "FIL-DK-354"
    text: "As a collective community, the more of us who sell with non-usage, the harder it gets on everybody else because we are all taking turns showing up. You are showing up to his guy three months after he was there."
    source: "DVD03"
  - id: "FIL-DK-355"
    text: "The main thing prospects want to know about the person they are buying from is: is the person real? They may not enunciate it, but that is what they want to know."
    source: "CD7-track4"
  - id: "FIL-DK-356"
    text: "If you make it interesting enough, if what they are looking for is what you are telling them, you can talk as long as you want to. I do not care how long you talk, as long as you are interesting, as long as you are giving them what they want to hear."
    source: "CD10-track2 (George Douglas)"
  - id: "FIL-DK-357"
    text: "The way George played the game was how can I spend as much as possible on driving the business, not how can I spend as little. That is a defining difference between marketers — whether their approach is how can I spend as little, or how can I engineer the business that will allow me to spend as much."
    source: "CD/11 track 2 — DK commenting on George's philosophy"
  - id: "FIL-DK-358"
    text: "The magical life is not the result of magic. It's the result of math that enabled it."
    source: "CD/11 track 2 — DK closing the loop on George's story"
  - id: "FIL-DK-359"
    text: "I never worked a day in my life. Honest to God, I never worked a day in my life. Everything I did was wonderful. My wife thinks it's awful — you just can't be that positive. I don't have any problems. Larry says, George, you have more damn problems than anybody I ever knew of. You're too stupid to know about them. And I said, Larry, that may be true, but it's working."
    source: "CD/11 tracks 1-2 — George on his career philosophy"
  - id: "FIL-DK-360"
    text: "I sincerely care about people. I want them to do well and I'll do whatever I have to do to help them. My mother trained me properly."
    source: "DVD/05 — George on his #1 success factor beyond trust"
  - id: "FIL-DK-361"
    text: "If I can just get one little thing — a phrase, a sentence, an idea, something I can put over here that I can move this to here — that's what I've watched you do. That's what y'all are doing."
    source: "CD/11 track 1 — George on the value of attending seminars"
  - id: "FIL-DK-362"
    text: "Buying opportunities is their hobby. Not capitalizing on opportunity. That's a different hobby. Only 5% of the people ever have that one."
    source: "CD/12 track 6 — DK on the psychology of opportunity buyers"
  - id: "FIL-DK-363"
    text: "People's dissatisfactions are their hobbies. The most likely to buy prospect has a dysfunction as a hobby that he continues to buy stuff for. The poor stay poor — it don't matter how many opportunities they buy, the vast majority of them stay in the same place in the pyramid."
    source: "CD/12 track 6 — DK on the nature of repeat buyers"
  - id: "FIL-DK-364"
    text: "We are not ever going to impact the pyramid numbers. We'll impact individuals, because obviously most of us started in one place and now we're in a different place. But the numbers never change. Never. And so business structure, profitability, process, message — it all has to reflect the reality of this pyramid."
    source: "CD/12 track 4 — DK on the immutable social pyramid"
  - id: "FIL-DK-365"
    text: "The influences are really interchangeable. It's about the person being influenced, not really the influencer. If I had enough money to become a veterinarian instead of doing this, the impact on any of you or the world would be non-existent. Somebody else would have influenced you."
    source: "CD/12 track 4 — DK on the interchangeability of mentors"
  - id: "FIL-DK-366"
    text: "You win in the primaries with the narrow, focused extremist message to the core fervent audience. In our kind of marketing, we never have to move back to the center. And generally speaking, we'll lose money if we do."
    source: "CD/12 track 2 — DK on narrow vs broad messaging"
  - id: "FIL-DK-367"
    text: "The money is in marketing to the most likely buyer. You don't craft everything to influence the unlikely buyers. Screw them. Leave them in the bottom of the pyramid. Let somebody else rescue them."
    source: "CD/12 track 5 — DK on focusing on the most likely buyer"
  - id: "FIL-DK-368"
    text: "Everything looks better from a distance. And it really looks better from a distance in dim light, close to closing time."
    source: "CD/13 track 3 — DK on greener pastures psychology"
  - id: "FIL-DK-369"
    text: "I don't even like doing it cheap when you can do it cheap. Because it just encourages a bunch of people to get in your way. If you can outspend them by a crapload, even when they decide to take you on, they generally go away."
    source: "CD/15 track 5 — DK on outspending competition as barrier to entry"
  - id: "FIL-DK-370"
    text: "I've always spent a lot of money on advertising and put it in the price. I believe in it completely. If you're scraping on your advertising, scrape on your office. I did not have a fancy office because I wanted them to understand that they could run a business without a fancy office."
    source: "DVD/05 — George on advertising spend philosophy"
  - id: "FIL-DK-371"
    text: "Seducing stubborn virgins is hard, agonizing, long, painful, and usually expensive work. And often generally perhaps not all that productive because they don't know how to behave when you get them."
    source: "CD/15 track 3 — DK on the problem with compiled lists of non-responders"
  - id: "FIL-DK-372"
    text: "A thing has to sound to them like a kitchen appliance, not like a big elaborate process. They want a toaster, not the process for making toast."
    source: "DVD/04 — DK on the Toaster Principle (#119)"
  - id: "FIL-DK-373"
    text: "The BEFORE is more important than the AFTER in a transformational story. Usually the weight loss people want to see what I looked like fat a whole lot more than what I look like thin."
    source: "DVD/04 — DK on transformational storytelling"
  - id: "FIL-DK-374"
    text: "My biggest thing I can do in my life is to get other people to do things. That's what I've done all my life. Mainly because I'm lazy."
    source: "DVD/05 — George on his core skill as a motivator"
  - id: "FIL-DK-375"
    text: "Dad, they trusted you. They believed that you really believed what you were talking about. Sometimes we thought you were crazy, but they still followed you because they knew you were doing what you thought was the correct thing to do."
    source: "DVD/05 — George's son explaining his father's success"
  - id: "FIL-DK-376"
    text: "The stick letter should be the first time you try to sell them something else. Congratulations on being so smart — and since you were smart enough to do this, you're probably smart enough to do this too."
    source: "OMC DVD/07 — Dan Kennedy (crediting Gary Halbert for the stick letter upsell concept)"
  - id: "FIL-DK-377"
    text: "People's dissatisfactions are their hobbies — they keep buying. Like a golfer who buys new clubs every month, your customers will keep buying what you sell. If you don't offer it, somebody else will."
    source: "OMC DVD/06 — Dan Kennedy + DVD/07 Craig Simpson (Steve the golfer example)"
  - id: "FIL-DK-378"
    text: "The fastest way to go broke in direct mail is trying to use the entirety of any list. You're going to find pieces of a list that can be profitable for you, and you can't go beyond those pieces."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "FIL-DK-379"
    text: "What you want to sell people is a thing — a system, a plan, a certification. People want to plug into something and stay plugged in. That is what you package around opportunity."
    source: "OMC CD/17 track 5 — Dan Kennedy"
  - id: "FIL-DK-380"
    text: "If you can outspend competitors by a crap load acquiring customers, even when they decide to take you on, they generally go away. I don't even like doing it cheap when you can do it cheap, because it just encourages a bunch of people to get in your way."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "FIL-DK-381"
    text: "Seducing stubborn virgins is hard, agonizing, long, painful, and usually expensive work. And often not that productive because they don't know how to behave even when you get them. The highest probability prospect is always the guy who's already bought X."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "FIL-DK-382"
    text: "You are not going to be the guy who changes the numbers. The pyramid that never changes — 1% rich, 4% financially secure, 54% still working at 65, 5% broke, 36% dead — has been the same since 1954."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "FIL-DK-383"
    text: "Exclusivity dramatically helps the sale. When people feel they have exclusive access to something competitors cannot get, fear of competitors having it, pride of ownership, price elasticity, conveyed equity, and authentic urgency all work in your favor."
    source: "OMC CD/18 track 2 — Dan Kennedy"
  - id: "FIL-DK-384"
    text: "Reinvention is an opportunity. You don't just sell improvement — you sell reinvention against the enemy. The enemy is the old way, the old identity, the thing that isn't working."
    source: "OMC CD/17 track 5 — Dan Kennedy"
  - id: "FIL-DK-385"
    text: "Exit strategy positioning is stronger than improvement positioning. People respond more powerfully to escaping something than to incrementally improving it."
    source: "OMC CD/20 track 4 — Dan Kennedy"
  - id: "FIL-DK-386"
    text: "The further we are into selling opportunity, the less income-to-price ratios matter. Price elasticity is liberated in opportunity selling versus improvement selling."
    source: "OMC CD/20 track 6 — Dan Kennedy"
  - id: "FIL-DK-387"
    text: "I didn't get eight and a half years by changing the creative. I didn't get it by changing the show. I got it by changing the economics. When you hit the wall, it's more about them than it is about us."
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch TV example)"
  - id: "FIL-DK-388"
    text: "Don't just build a herd and be done with it. Build a herd, offer them 11 products over 17 weeks, and then quarterly reactivation products. Take advantage of every customer. Maximize them."
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"
  - id: "FIL-DK-389"
    text: "70% or more of the presentation should be preamble — establishing the dissatisfaction gap — before you ever show the solution. The direct selling industry perfected this: make them feel the pain before revealing the bridge."
    source: "OMC CD/18 tracks 3-4 — Dan Kennedy (lessons from direct selling/MLM)"
  - id: "FIL-DK-390"
    text: "People need a vehicle they can actually do. Don Dwyer at SMI discovered the best salespeople for cleaning franchises were people who had previously been in sales — they needed something to sell, not something to learn."
    source: "OMC CD/20 track 7 — Dan Kennedy (Don Dwyer SMI to Rainbow example)"
  - id: "FIL-DK-391"
    text: "A delayed sale can be a better sale. The prospect is better prepared, has less remorse, and the deposit-for-materials model keeps them committed without full commitment upfront."
    source: "OMC CD/20 track 3 — Dan Kennedy"
  - id: "FIL-DK-392"
    text: "The sideways sales letter is the single biggest idea I ever had — instead of one long sales letter, break it into a sequence of prelaunch content that builds anticipation, reciprocity, authority, and community before you ever make the offer."
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"
  - id: "FIL-DK-393"
    text: "Product Launch Formula relies on basic human psychology and mental triggers. It works in all kinds of different markets because the triggers are universal."
    source: "DVD08-JeffWalker"
  - id: "FIL-DK-394"
    text: "I'm a big believer in thinking long term. I think that's one of my competitive advantages — I always think very long term."
    source: "DVD08-JeffWalker"
  - id: "FIL-DK-395"
    text: "The benefits to a launch go so far beyond the immediate dollars. There's the list built, the positioning, all the new buyers you can sell additional stuff to, the momentum. It's just a lot of reciprocal benefits."
    source: "DVD08-JeffWalker"
  - id: "FIL-DK-396"
    text: "If you do a good enough job with your prelaunch content, people will start to pass it around virally. You build your list through word of mouth."
    source: "DVD08-JeffWalker"
  - id: "FIL-DK-397"
    text: "Once you figure out what people want, you make that and try to sell it to them. That's the proverbial shooting fish in a barrel."
    source: "DVD08-JeffWalker"
  - id: "FIL-DK-398"
    text: "Nobody really is eager to buy improvement or opportunity as a one and done. People want to plug into something, and they kind of want to stay plugged."
    source: "DVD09"
  - id: "FIL-DK-399"
    text: "Opportunity is Reinvention. When the reinvention is also the answer to the thing that is making them miserable — the villain — you have the most powerful combination."
    source: "DVD09"
  - id: "FIL-DK-400"
    text: "Our biggest challenge in marketing is separating what we believe about our customers and what reality is for them. The overwhelming majority of what clients tell me about their customers has no factual support."
    source: "DVD09"
  - id: "FIL-DK-401"
    text: "I am very big on going backwards in order to go forward. The people who did it decades ago had to be better than we have to be now because they didn't have tools."
    source: "DVD09"
  - id: "FIL-DK-402"
    text: "People don't want to learn how to fish. They certainly don't want to clean the fish. And they'd really rather not cook the fish. That's why people want to hire you to do the launch."
    source: "DVD08-JeffWalker"
  - id: "FIL-DK-403"
    text: "The further we are over into selling opportunity, the more we liberate ourselves from the formulaic relationships between their transaction size, profit margin, income, and the price we charge."
    source: "DVD10"
  - id: "FIL-DK-404"
    text: "The infinitely better business is a business where everybody's already got a vehicle and we're making their vehicle run better. That's a better business than when you put them in a vehicle of your own."
    source: "DVD10"
  - id: "FIL-DK-405"
    text: "The delayed sale is often the better sale. The person is better prepared for the closing event, conversion percentages go up, stress of the close goes down, buyers remorse after the sale decreases."
    source: "DVD10"
  - id: "FIL-DK-406"
    text: "We will always have more unconverted leads than converted leads no matter who we are and how good we are. The real money is in what you do with those unconverted leads."
    source: "DVD09"
  - id: "FIL-DK-407"
    text: "Most urgency is inauthentic — we make it up. Exclusivity creates authentic urgency because if there's only one, you could be number two, and you are screwed."
    source: "DVD09"
  - id: "FIL-DK-408"
    text: "People's income is not necessarily logically connected to their ability to buy. They can go get money or will go get money to make the purchase."
    source: "DVD10"

# ============================================================
# L2_MODELOS_MENTAIS - 83 elementos
# ============================================================
L2_MODELOS_MENTAIS:
  - id: "MM-DK-266"
    text: "The Repair-Improvement-Opportunity Spectrum: Three stories you can tell. Repair is about fixing flaws (linked to need). Improvement is about making things better (linked to obligation). Opportunity is about new possibility (linked to desire). Only desire truly motivates."
    source: "CD1-track2"
  - id: "MM-DK-267"
    text: "The Grand Canyon Gap: There is a Grand Canyon sized gap between where prospects are starting mentally/emotionally and where we start our conversation with them. We start pitching from way further along than where they actually are."
    source: "CD1-track2"
  - id: "MM-DK-268"
    text: "Worker Head Mentality: Most small business owners have a worker head on their shoulders. They believe in a religious link between longevity and income escalation — the longer they show up, the more they should be paid, regardless of value delivered."
    source: "CD1-track5"
  - id: "MM-DK-269"
    text: "The Desire-Ambition Distinction: Everybody has desire for more (they play the lottery, put money in slot machines). But very few have ambition — the willingness to actually do the work to get what they desire. We talk to people like they have ambition; they don't."
    source: "CD2-track1"
  - id: "MM-DK-270"
    text: "The Conscious Mind as Belief Fortress (from Est/Werner Erhard): The conscious mind is a collection of beliefs whose only purpose is its own survival. Extracting a belief from it is like cutting off an arm with a rusty saw. The mind will fight to preserve its beliefs."
    source: "CD3-track3"
  - id: "MM-DK-271"
    text: "Open Architecture vs Closed Architecture: We sell the premise that you can remake your reality any way you want (open architecture). But most people operate from closed architecture — they believe their fate is predetermined by place, genetics, credentials, God, astrology."
    source: "CD3-track1"
  - id: "MM-DK-272"
    text: "The Gullibility-Skepticism Axis: What we really want is to move prospects all the way from skepticism, cynicism, and resistance to a state of profound gullibility — where they are easily persuaded because they are overtrusting of us."
    source: "CD4-track3"
  - id: "MM-DK-273"
    text: "The Bored Prospect Model: The #1 marketing sin is being boring. But we are trying to arouse a bored prospect with a message linked to something he's already bored about. His business is like sweatpants and sneakers — routine, familiar, invisible."
    source: "CD2-track6"
  - id: "MM-DK-274"
    text: "The Lottery Player Paradox: People who buy lottery tickets actually think they'll win, despite astronomical odds. Same numbers every week. This is the level of gullibility we need — where desires and vulnerabilities override rational calculation."
    source: "CD4-track4"
  - id: "MM-DK-275"
    text: "Faith Outside Self vs Faith In Self: Every great achievement of gullibility relies on placing faith in someone/something else, not in self. Scams work this way. But so does legitimate opportunity marketing. Drugs are preferred over therapy because drugs require no faith in self."
    source: "CD4-track6"
  - id: "MM-DK-276"
    text: "The Six Ways to Play with opportunity: 1) Same deliverables, present differently 2) Different deliverables in same market 3) Existing deliverables to different market 4) Package as consultant opportunity 5) Convert to pure opportunity for masses 6) Already a pure opportunity marketer."
    source: "CD1-track1"
  - id: "MM-DK-277"
    text: "The Newsletter Color Analysis Model: In DK's newsletter, content coded by color reveals: blue = marketing information, orange = building self-esteem/attitude/belief change. The ratio is heavily orange. Most feedback comes about the orange. The 'selling' never stops even in retention."
    source: "CD4-track2"
  - id: "MM-DK-278"
    text: "The Shrink Wrap Shelf: Buyers have shelves of products with shrink wrap still on. As a collective community, the more of us who sell with non-usage, the harder it gets for everyone else. Each seller shows up after the last one disappointed them."
    source: "CD5-track5"
  - id: "MM-DK-279"
    text: "Creative Disconnection: The best thing is not to try and win the battle of making bored people interested in boring subjects. It's to find ways of creative disconnection — disconnect what you're presenting from what they're already bored with."
    source: "CD3-track1"
  - id: "MM-DK-280"
    text: "The 11 Agreements Model: Before anyone buys opportunity, they must sequentially agree on 11 points — from general need through personal attainability, personal benefit, timing, personal timing, and personal appropriateness. Each is a hurdle that must be cleared."
    source: "CD6-track1, DVD03"
  - id: "MM-DK-281"
    text: "Lucy/Charlie Brown Model: Prospects are Charlie Browns who have repeatedly been convinced to run up and kick the ball, only to have it pulled away. Each failed attempt creates deeper skepticism. You cannot show them Lucy and a ball — you must show them something that looks fundamentally different."
    source: "CD6-track1, DVD03"
  - id: "MM-DK-282"
    text: "Toaster Principle: The closer you get to 'toaster' where they see a simple physical thing, the better. Present your opportunity as a toaster (push button, toast comes up) not as the process of making toast (dough, yeast, water, bread maker, forming, heating). A thing must have a name and sound like a kitchen appliance, not an elaborate process."
    source: "CD7-track2"
  - id: "MM-DK-283"
    text: "Privacy vs Public Behavior Model: People behave very differently alone than in groups. A pitch that would fail miserably in a room of 200 professionals can succeed enormously when delivered privately through direct mail or online. Shame operates publicly, greed operates privately."
    source: "CD6-track4"
  - id: "MM-DK-284"
    text: "Conscious Mind Portfolio Model: The conscious mind maintains a portfolio of beliefs. Every pitch is a threat to that portfolio. The goal of opportunity marketing is to get the prospect to set aside the entire conscious mind box and its accumulated evidence."
    source: "DVD03"
  - id: "MM-DK-285"
    text: "General vs Personal Beneficial Nature: A prospect can agree something is beneficial in general but not believe it is personally beneficial. The Tupperware wife example — she agrees making 80K a year is good, but realizes it will threaten her marriage to a 32K auto repair guy."
    source: "CD6-track1"
  - id: "MM-DK-286"
    text: "Timing vs Personal Timing Model: Timing is about external market conditions (real estate bubble, recession). Personal timing is about their individual circumstances (Barbara quit, kids out of school, vacation coming). Both must be overcome separately."
    source: "CD6-track1, CD6-track2"
  - id: "MM-DK-287"
    text: "Urgency From Past Loss Model: Instead of basing urgency on what they will gain or lose in the future (supply/demand), base it on what they have already lost by not having acted. People have a precedent in their head for having missed out on opportunity."
    source: "CD9-track1"
  - id: "MM-DK-288"
    text: "The Blackie Story Model: A mysterious source figure (dying man, retiring billionaire, old master) who originally discovered the secret and passed it to the seller. This serves dual purpose: (1) provides reason why the seller is sharing, and (2) makes the source not the seller, automatically increasing believability."
    source: "CD7-track3"
  - id: "MM-DK-289"
    text: "Taste Like Chicken Model: For difficult-to-understand propositions, link your opportunity to something the prospect already understands and accepts. Internet mall = regular mall. Oil well = recurring income. Real estate = everybody lives in a house. The analogy makes the incomprehensible accessible."
    source: "CD8-track4, CD8-track5"
  - id: "MM-DK-290"
    text: "Status Elevation Purchase Model: People do not buy the opportunity for its practical value — they buy it for the status elevation it provides in the eyes of others. Brainerd Melanger discovered he was really in the business card business, not the import-export business."
    source: "CD9-track2, CD9-track3"
  - id: "MM-DK-291"
    text: "Value Without Achievement Model: Membership, certificates, business cards, directories — anything that delivers perceived value and status without requiring the buyer to actually do anything or achieve results. Most people never use what they buy, so give them value from the purchase itself."
    source: "CD9-track1, CD9-track2"
  - id: "MM-DK-292"
    text: "Shrink Wrap Shelf Model: Most buyers have a shelf of courses and programs with the shrink wrap still on. The cumulative non-usage experience creates a wall of skepticism for the next seller. You must prove your thing is fundamentally different from everything already on that shelf."
    source: "DVD03"
  - id: "MM-DK-293"
    text: "Fire Alarm Hotel Model: For overcoming personal timing, you have only two choices — make it advantageous to act despite bad timing, or make it so urgent that bad timing is trumped. Like a fire alarm at 3 AM: the only way they move is if you convince them the building is actually on fire."
    source: "CD6-track2"
  - id: "MM-DK-294"
    text: "Original Dream Reselling Model: Every business owner had a dream and motivational picture when they first got into their business. That excitement is dormant but still there. Link your pitch to their original dream to rekindle the excitement they had as virgins in the game."
    source: "CD8-track5, CD8-track6"
  - id: "MM-DK-295"
    text: "Enemy/Villain Model: It is nearly always helpful to have an enemy to sell against. The villain moves you from the other side of the desk to the same side as the buyer. You now have shared understanding of whoever is the ugly in their world."
    source: "CD8-track6"
  - id: "MM-DK-296"
    text: "Two Things Different Model: For someone to buy again after failure, one of two things must be true — either something is profoundly different about them, or something is profoundly different about your thing. Always choose to prove the second, because it lets them off the hook."
    source: "DVD03"
  - id: "MM-DK-297"
    text: "Three Drawers Toolbox: You really only have three drawers in your toolbox. (1) Product/Message — the thing itself and the message about it, which are seamless. Is the thing itself the best thing it can be for opportunity language? (2) Process — how we make the sale. Put everything on a table and consider everything. (3) Prospects — are you investing to talk to the best prospects possible the greatest percentage of the time?"
    source: "CD/12 track 1 — DK presenting the Toolbox framework"
  - id: "MM-DK-298"
    text: "Toaster Principle (#119): When you present opportunity, there must be a thing people can think of as physical, tangible, with a name. The closer you get to 'toaster' where they see a kitchen appliance, the further you get from describing the process for making toast, the better you are. A thing must have a name and feel like a kitchen appliance, not a process."
    source: "DVD/04 — DK on making opportunities tangible"
  - id: "MM-DK-299"
    text: "Social Security Pyramid (immutable since 1954): 1% rich, 4% financially secure, 54% still working out of necessity (net assets under $100K), 5% dead broke, 36% dead. The only number that changed between 1954 and 2008 is the 54-to-36 ratio because people live longer. Otherwise NOTHING has changed despite all technological and informational advances."
    source: "CD/12 track 3 — DK presenting the unchanging pyramid"
  - id: "MM-DK-300"
    text: "Faith Healer List Model: Oral Roberts List goes to Pop-Off. Pop-Off's List goes to Oral Roberts. They're usually buying from more than one at the same time. When they get tired of one guru, they just move to another. You can swap lists with no damage — 20% of people were buying both products and not doing anything with either."
    source: "CD/12 track 6 — DK on list exchange and buyer behavior"
  - id: "MM-DK-301"
    text: "Moving Parade of Interest (David Ogilvy): The fact that Joe doesn't respond this week has everything to do with Joe and nothing to do with you or your piece. He was getting ready for vacation and was more vicious with his mail. Next week he's constipated and takes the mail to the john and reads everything. Same guy, same message, different week."
    source: "CD/15 track 4 — DK on why lists can be reused frequently"
  - id: "MM-DK-302"
    text: "Market Capacity Wall: You see a honeymoon period where cost per sale is relatively low (deluding because it won't last). Then gradual creep where every meaningful statistic turns chilly but not horrible. Then at some point all that gradual shift skyrockets bad — you've hit the wall. You've hit hard dirt. You either find another plot of soil or you need new tools (new economics)."
    source: "CD/15 track 1 — DK on the lifecycle of market saturation"
  - id: "MM-DK-303"
    text: "Greener Pastures Pitch: You can move people to greener pastures much easier than you can sell them a better version of what they already got. Even their don't-like list looks better than my don't-like list — I'm going 'that sounds shitty, but it doesn't sound as shitty as my shit.' Based on Earl Nightingale's story."
    source: "CD/13 track 3 — DK on true replacement opportunity selling"
  - id: "MM-DK-304"
    text: "Blackie Story: There is always another figure from whom the seller received the secrets — a dying man with his final breath, a billionaire ready to retire. The seller is really moving legacy rather than inventing. It answers the reason-why AND makes the source not the seller, which automatically makes it more believable."
    source: "DVD/04 — DK on the Blackie story device"
  - id: "MM-DK-305"
    text: "Urgency from Past Loss (#12): Instead of basing urgency only on what they're going to get or going to lose, talk about what they ALREADY lost by not having acted. What you could have collected, not what you will collect. People have a precedent in their head for having missed out on opportunity — everyone has at least one such story."
    source: "DVD/04 — DK on urgency drawn from past loss"
  - id: "MM-DK-306"
    text: "Taste-Like-Chicken Analogy: When you have a difficult proposition to explain, use analogy to something people already understand. Get rich in real estate works because everybody lives in a house. Get rich in mail order worked when Sears catalog existed. If your proposition is harder to understand, find the 'chicken' — the familiar reference frame people can anchor to."
    source: "DVD/04 — DK on making difficult propositions simple"
  - id: "MM-DK-307"
    text: "Compiled vs Response Lists: A compiled list is people thrown onto a file with enhanced demographic data. A response list is people who raised their hand and showed interest. The person NOT on any response list is a 'stubborn virgin' — they were already mailed and refused. Seducing them is expensive and they don't know how to behave."
    source: "CD/14 track 5, CD/15 track 3 — Craig and DK on list types"
  - id: "MM-DK-308"
    text: "Multiple Shovels Model: Take all the same leads and show them a different colored shovel that accomplishes the same three things but differently. Blue shovel = fix the patient who doesn't refer. Green shovel = another approach. You can use a list twice or three times with different offers, which allows you to spend MORE to get the lead."
    source: "CD/15 track 5 — DK on reusing leads with different offers"
  - id: "MM-DK-309"
    text: "Format Rotation on Same List: Postcards vs enveloped piece to the same list — there's virtually no dupe between the responder to the postcard and the responder to the envelope. It allows you to use the best list twice instead of a lesser list."
    source: "CD/15 track 4 — DK on format-based list reuse"
  - id: "MM-DK-310"
    text: "Membership as Value Without Achievement (#13): Membership allows us to give people value from opportunity without requiring activity or result. The real value of any opportunity is delayed until they use the stuff and get a result — and most never will. So we find ways to give them perceived value that doesn't require action."
    source: "DVD/04 — DK on membership as perceived value delivery"
  - id: "MM-DK-311"
    text: "Status Elevation Drives Buying (#15): We're in a business card business. Brainerd Melanger's breakthrough was giving International Traders Association members a business card. The refund rate dropped dramatically because they finally had something that said what they were. A way to identify themselves. Status is a powerful buying motivator."
    source: "DVD/04 — DK on the Brainerd Melanger business card story"
  - id: "MM-DK-312"
    text: "Larger Than Life Figure: Three categories must be present — (1) Humble beginnings (most buyers have humble beginnings, and without it you're just an arrogant asshole with a Bentley), (2) Proof of importance (other people but you must share the opinion you're a big deal — big audiences, media, book signings), (3) Possessions/lifestyle evidence."
    source: "DVD/04 — DK on the three elements of a larger-than-life figure"
  - id: "MM-DK-313"
    text: "Pyramid Within a Pyramid: Take Michael Jans' PNC insurance guys — same pyramid in his customer base. Take Forbes 500 — build yourself a little pyramid with their net worths. There's 1% of the 500 who are enormously rich, 4% impressively rich, and all the way down. The pyramid replicates at every scale."
    source: "CD/12 track 4 — DK on the fractal nature of the social pyramid"
  - id: "MM-DK-314"
    text: "Bonus System as Self-Management: Put all office staff on a percentage of income bonus. They got bonuses of $10,000-$20,000 each at Christmas. The people got rid of the people that didn't work — George never had to fire anybody because the staff self-policed. The non-performers were eliminating themselves because they were affecting everyone's bonus."
    source: "CD/11 track 1 — George on his employee management system"
  - id: "MM-DK-315"
    text: "Birthday Trigger Principle: About 40 and up, birthdays are increasingly near-death experiences. People behave differently in a little window around their birthday. Charlie's going to think more that week than he thinks any other week that year about his status in life, income, and unsatisfactory business."
    source: "CD/12 track 5 — DK on birthday-triggered marketing"
  - id: "MM-DK-316"
    text: "The Moving Parade of Interest — the fact that Joe doesn't respond this week has everything to do with Joe and nothing to do with you or your piece. Same guy, same message, different week produces different results based on life circumstances."
    source: "OMC DVD/07 — Dan Kennedy (citing David Ogilvy)"
  - id: "MM-DK-317"
    text: "Honeymoon Period → Gradual Creep → Wall model. Every market follows this arc: phenomenal early numbers (fans/enthusiasts), then gradual cost increases that are almost imperceptible, then sudden skyrocket where costs jump dramatically. At each wall, you need new economics, not new creative."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "MM-DK-318"
    text: "Compiled vs Response List mental model. Compiled lists are people thrown onto a file with enhanced data. Response lists are people who raised their hand and showed interest. Response lists consistently outperform compiled lists — the difference can be 0.05% vs 2% response."
    source: "OMC DVD/07 — Craig Simpson (Frank Kern example)"
  - id: "MM-DK-319"
    text: "The Dissatisfaction Gap model from direct selling — 70%+ of the presentation establishes how bad things are, invalidates all other bridges, then presents your solution as the only viable path. Sequence: establish gap → invalidate alternatives → present bridge → force self-definition."
    source: "OMC CD/18 tracks 3-4 — Dan Kennedy"
  - id: "MM-DK-320"
    text: "Lifetime Value Liberation model — if your LTV is $500, you can spend $200 to acquire. If your LTV is $1,000, you can spend $350-400 to acquire. Higher LTV means larger addressable market because you can afford to mail to less productive segments of lists."
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"
  - id: "MM-DK-321"
    text: "The Three Toolbox Drawers model: Product/Message, Process, and Prospects. Every marketing operation should be thought of as three separate drawers you open and optimize independently."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "MM-DK-322"
    text: "The Pyramid That Never Changes — 1% rich, 4% financially secure, 54% still working at 65, 5% broke, 36% dead. This has been unchanged since 1954. You're not going to change these numbers — work within them."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "MM-DK-323"
    text: "Opportunity Structure Spectrum: franchise → almost-franchise → dealership → consultant → coaching-plus → services → one-time events. Each has different payment models: fees, fees+profits, fees+upside, equity. Choose structure based on your control needs and scalability goals."
    source: "OMC CD/18 track 1 — Dan Kennedy"
  - id: "MM-DK-324"
    text: "Five Reasons Exclusivity Helps the Sale: (1) Fear of competitor having it, (2) Pride of ownership/status, (3) Price elasticity increases, (4) Conveyed equity, (5) Authentic urgency + take-away selling."
    source: "OMC CD/18 track 2 — Dan Kennedy"
  - id: "MM-DK-325"
    text: "Jeff Walker's Mental Triggers Framework — authority, reciprocity, community, social proof, anticipation, scarcity, likeability, events. Layer these triggers across a prelaunch sequence to create overwhelming buying momentum before the cart opens."
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"
  - id: "MM-DK-326"
    text: "Replacement Types taxonomy: (1) In-niche replacement, (2) True replacement/greener pastures, (3) Reinvention, (4) Rearrangement, (5) Addition/expansion, (6) Multiplier. Each type of opportunity replacement appeals to a different motivation."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "MM-DK-327"
    text: "The Tout Business model — using multiple identities to mail the same productive list segment repeatedly. Like football betting touts who operate under different names, you create parallel identities (cowboy hat guy, housewife with five kids) selling fundamentally the same thing at different price points and formats."
    source: "OMC CD/19 tracks 6-7, DVD/07 — Dan Kennedy"
  - id: "MM-DK-328"
    text: "The Blue Shovel model — when unconverted leads rejected your red shovel, don't discard them. Show them a blue shovel that accomplishes the same three things but does it differently. Same leads, different vehicle. If you create a green shovel too, you can use the leads three times."
    source: "OMC DVD/07 — Dan Kennedy (Jay Geyer dental example)"
  - id: "MM-DK-329"
    text: "Scaling Back to Restore Profitability — when you hit the wall, you can pull back to the tiny high-probability segment of the list, make slight adjustments, and live there profitably even though you can no longer live at scale. On TV: retard media buys to only the highest-performing geographies."
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch last 2 years)"
  - id: "MM-DK-330"
    text: "Process linked to who you're selling to — chair-side value plus ego equals difficulty of getting them in the room. The higher the prospect's perceived value of their time and ego, the harder the lead generation and the more the process must accommodate that."
    source: "OMC CD/19 track 2 — Dan Kennedy"
  - id: "MM-DK-331"
    text: "Rodale's 18-Month Rule — the most likely buyer of a product has bought a similar product within the last 18 months. Recency of related purchase is the strongest predictor of future purchase."
    source: "OMC DVD/06 — Dan Kennedy (citing Rodale publishing)"
  - id: "MM-DK-332"
    text: "The Sideways Sales Letter: Instead of a 50-page sales letter, turn it sideways and tell the same story over 10-12 days through 3-4 pieces of content. No mention of the sale until the third piece."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-333"
    text: "The Tennis Court Video principle: Lead with lifestyle and reason why, not with hype. For a warm list, start with authenticity and reason why. For a cold list (JV partners), lead with hype to hook instantly."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-334"
    text: "The Fish Video concept: People don't want to learn how to fish, clean the fish, or cook the fish. Your best prospects are people who bought your product but don't want to do it themselves — they want you to do it for them."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-335"
    text: "Marketing Gods identity transfer: If you can speak internet marketing, you are in a separate class from the rest of the people walking the face of the earth. Instill in people that they have secret knowledge."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-336"
    text: "In the land of the blind, the one-eyed man is king. People buying a training must believe they already have enough knowledge to actually do the thing. Prelaunch content instills this belief."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-337"
    text: "Thing-Person-Place Trinity: You definitely want a thing (system, plan, certification, badge) from which they draw confidence. You need a person they are attached to. And you need a sense of place they plug into."
    source: "DVD09"
  - id: "MM-DK-338"
    text: "Opportunity is Reinvention model: Selling reinvention against the enemy. The reinvention is the answer to the villain making them miserable. Combine the reinvention frame with the enemy frame for maximum power."
    source: "DVD09"
  - id: "MM-DK-339"
    text: "The Dissatisfaction Gap: Direct selling and MLM industries are masters at establishing a big gap between where somebody is and where they had intended, hoped, and dreamed about being. More than 70% of a professional opportunity meeting is building this gap."
    source: "DVD09"
  - id: "MM-DK-340"
    text: "Bridge Invalidation: Invalidate all bridges across the dissatisfaction gap except yours. Every other way the prospect might achieve the same outcome must be destroyed — franchise, starting alone, better job, education, saving, real estate."
    source: "DVD09"
  - id: "MM-DK-341"
    text: "Pick a Door Identity model: Force people to visibly pick door number one or door number two, and by that decision and action define themselves as winner or putz. Used at every MLM opportunity meeting and should be in every room sale."
    source: "DVD09"
  - id: "MM-DK-342"
    text: "Present Bank / Future Bank: Exclusivity creates equity in the thing you sell. Part of the argument for buying is not just the income you make from it, but the equity created in it. Like a UPS store vs. independent packing shop — 150% more valuable."
    source: "DVD09"
  - id: "MM-DK-343"
    text: "The Alter Ego / Second Identity model: Unconverted leads who rejected your personality still want the promises. A different identity with different tone, different backstory, different front person can convert them."
    source: "DVD09"
  - id: "MM-DK-344"
    text: "Reverse Engineering the Ideal Client: If you have customers, reverse engineer who behaved and spent properly. If starting from scratch, find successful competitors and read their marketing material for clues about who they're talking to."
    source: "DVD10"
  - id: "MM-DK-345"
    text: "The Appointment No-Sale System: People don't buy for many reasons — they swore nothing on the credit card, they need to sleep on it, they need to pray about it. Have a system for every non-buyer regardless of how the presentation was made."
    source: "DVD09"
  - id: "MM-DK-346"
    text: "Process is linked to who you are selling to maybe more than to what you are selling. Certain demographic groups are more or less prone to respond to certain sales processes."
    source: "DVD09"
  - id: "MM-DK-347"
    text: "The Jack O'Brien Principle (Justice League of Personalities): If you have a credibility gap (gender, age, style), create a team of personality types and appearances to reassure different segments. Don Dwyer at SMI, James in Tolles and Letter."
    source: "DVD10"
  - id: "MM-DK-348"
    text: "Four Options for a Credibility Disadvantage: 1) Hide entirely, 2) Ignore it and sell like hell, 3) Make a big deal out of it and address it directly, 4) Help it by pairing with elder statesman or creating a Justice League team."
    source: "DVD10"

# ============================================================
# L3_HEURISTICAS - 109 elementos
# ============================================================
L3_HEURISTICAS:
  - id: "HEUR-DK-398"
    text: "80% of patients at the VA who can fill their prescriptions for free never fill the prescriptions. It's not about money — nobody's even motivated enough by need to walk to the pharmacy."
    source: "CD1-track5"
  - id: "HEUR-DK-399"
    text: "If you ask business owners 'what are the first 5 things you'd do if you hit the lottery for $50 million?' — walk away from their business is on everybody's top 5 list. Every single one of them."
    source: "CD1-track4"
  - id: "HEUR-DK-400"
    text: "In the franchise business: 1,400 leads raise their hand expressing interest → narrow to 300 who could buy → out of that, 1 or 2 actually purchase. The other 298 who could have bought are still way back mentally/emotionally."
    source: "CD2-track4"
  - id: "HEUR-DK-401"
    text: "Over 50% of people die where they were born. Over 30% never leave. They stay where they were planted. The idea of packing up and going somewhere is inconceivable to most people."
    source: "CD5-track2"
  - id: "HEUR-DK-402"
    text: "The #1 reason people go to work: to pay the bills. #2 reason: because if I don't, I'll get fired. This applies equally to small business owners — they just give the obligatory answers they think they should give."
    source: "CD1-track3"
  - id: "HEUR-DK-403"
    text: "The FDA rule is meat has to be 40% meat to call it meat. The #1 filler is sand. When we're arguing about 5% (Taco Bell at 35%), the real issue is the 60% that's allowed — same thing applies to marketing content vs. belief-building content ratio."
    source: "CD4-track2"
  - id: "HEUR-DK-404"
    text: "The rub-the-Buddha-for-money ad ran in tabloids for almost 8 years successfully. When tested in Investor's Business Daily (Wall Street Journal readership), it was the least profitable placement but still covered ad cost with a slight profit."
    source: "CD4-track3"
  - id: "HEUR-DK-405"
    text: "The #1 buyers of gambling information systems are stockbrokers. The #2 buyers are doctors. You can't be much more gullible than that — yet these are credentialed professionals."
    source: "CD4-track3"
  - id: "HEUR-DK-406"
    text: "The headliner at comedy clubs always gets a better response and more laughter even though the middle act's material is usually the best. People are more 'in fun' for the headliner because they've predetermined the hierarchy. State matters more than content."
    source: "CD4-track3"
  - id: "HEUR-DK-407"
    text: "If you tape and transcribe stand-up comedy, then sit in a chair and read it — you'll rarely laugh out loud. Most comedy isn't funny outside the environment where everyone is in the state of fun. Same principle applies to sales environments."
    source: "CD4-track3"
  - id: "HEUR-DK-408"
    text: "In continuity businesses, every day subscribers are waking up trying to quit. You get one whack per month at keeping them for another month vs. 28-31 days they're trying to quit. That ratio is horrible."
    source: "CD4-track3"
  - id: "HEUR-DK-409"
    text: "Prospect's #1 internal objection (heard from private clients repeatedly): 'There's no point doing that because my employees will just screw it up' or 'my employees will refuse to do it.' This is the point where they shut you off."
    source: "CD2-track2"
  - id: "HEUR-DK-410"
    text: "Your only prayer at distance selling is to deliver so much that prospects get themselves into a state while going through it. Shrinking messages to fit 146 characters is committing suicide because they can't get in state."
    source: "CD4-track4"
  - id: "HEUR-DK-411"
    text: "For most business owners, their ambition level arrives at: doing enough not to go out of business. Doing enough to get to bills paid. That's where they settle. The equivalent of a worker doing enough not to get fired."
    source: "CD2-track1"
  - id: "HEUR-DK-412"
    text: "For every person who starts a diet, there are 10 people who are good at starting a diet as soon as the next event occurs. There is always a 'right after' point at which they will do this — but not now."
    source: "CD6-track2"
  - id: "HEUR-DK-413"
    text: "To overcome personal timing, there are only two approaches: (1) make acting now advantageous despite bad timing, or (2) make it so urgent that bad personal timing is trumped by the urgency."
    source: "CD6-track2"
  - id: "HEUR-DK-414"
    text: "MDs (medical doctors) are the number one buyers of spam penis enlargement pills — hundreds of millions of dollars. They know better, they have prescription alternatives, yet hype overcomes conscious knowledge even in the most educated buyers."
    source: "CD6-track4"
  - id: "HEUR-DK-415"
    text: "Jeff Paul infomercial: shot for $8,200 first version, $10,000-$11,000 second version. Ran for 8.5 years uninterrupted on 4 national cable networks. Produced $22-26 million in revenue. Holds record for longest consecutive running lead generation business opportunity infomercial."
    source: "CD6-track6"
  - id: "HEUR-DK-416"
    text: "One ad sold 1.6 million copies of a book — using mystery opportunity positioning with incomprehensible photographs and no promise in the headline. The headline 'Can you tell what this woman is doing' violated conventional headline rules."
    source: "CD6-track5"
  - id: "HEUR-DK-417"
    text: "When you have a winner out of the gate and did not test every variable, the last thing you want to do is screw with it. One guy had mismatched socks — we made him wear mismatched socks in the reshoot because who the hell knows what is making it work."
    source: "CD6-track6"
  - id: "HEUR-DK-418"
    text: "The overwhelming majority of pure opportunity marketers locate themselves in small towns, Heartland of America towns. They tell an 'I am in a small town' story. If you live in Gossel, Kansas, you are more trustworthy than Phoenix, Cleveland, New York, or Los Angeles."
    source: "CD7-track1"
  - id: "HEUR-DK-419"
    text: "79-year-old works better than 80 because of specificity. The guy has to stay 79 until he turns 89."
    source: "CD7-track4"
  - id: "HEUR-DK-420"
    text: "Glenn W. Turner: in 3.5 years, put 500,000+ people into a business at $5,000 a piece. No internet, no webinars, no teleseminars — all old-fashioned manual labor putting people in rooms."
    source: "CD8-track3"
  - id: "HEUR-DK-421"
    text: "Brainerd Melanger sent 500 business cards to new members BEFORE shipping the course. Refund rate dropped like a rock. He realized he was really in the business card business."
    source: "CD9-track2"
  - id: "HEUR-DK-422"
    text: "Brainerd Melanger sent six copies of the directory to each member — one for them, one for their mother, one for the coffee table. The cost 'breaks my heart but we send them six copies.'"
    source: "CD9-track3"
  - id: "HEUR-DK-423"
    text: "George Douglas: a million dollars a week in sales, 15 years ago. $10,000 average sale at a distance. 42 different home businesses available. About 20 people came to the farm per week, but 100 per week bought — the fact that they could come was the reassurance factor."
    source: "CD10-track3, CD10-track4"
  - id: "HEUR-DK-424"
    text: "George Douglas used 3-hour cassette tapes as his sales tool. People would listen 5 times before buying. If what you are telling them is what they are looking for, length does not matter."
    source: "CD10-track2"
  - id: "HEUR-DK-425"
    text: "Joe Carbo 'Lazy Man's Way to Riches' — the headline 'too busy earning a living to make any money' lets them off the hook in the first line. The entire premise is a mystery opportunity pitch with no real disclosure."
    source: "CD6-track5"
  - id: "HEUR-DK-426"
    text: "Pat Williams letter was a control for many years. Headline: 'I have made over $429,000 doing absolutely nothing.' The lift note from 'SC' says the real process is 'you send a shoebox of paper and he sends you back $429,000 every month.' This makes it feel real."
    source: "CD6-track3"
  - id: "HEUR-DK-427"
    text: "Urgency from past loss: 'You could have collected $69,934 in dividend payments over the last two years.' Starting with what they COULD HAVE had — not what they will get — is more painful and motivating than future gain."
    source: "CD9-track1"
  - id: "HEUR-DK-428"
    text: "A cafeteria line of options is almost always better than one thing. Jeff Paul went from selling financial planners one way to build a practice (high refund rate) to 101 ways (dramatically reduced refunds). George Douglas went from 4 programs to 42."
    source: "CD10-track5"
  - id: "HEUR-DK-429"
    text: "George Douglas added a $50 fee to swap between his 42 programs. He told them why on the tape: 'I do not want you to order just to get them.' Very few took advantage unfairly. The small fee eliminated the scare of losing $10,000 on the wrong choice."
    source: "CD10-track5"
  - id: "HEUR-DK-430"
    text: "Carlton Sheets held the longest running opportunity infomercial record at 14 years with Get Rich in Real Estate. Jeff Paul's show held second at 8.5 years."
    source: "CD6-track6"
  - id: "HEUR-DK-431"
    text: "Get rich in real estate is the oldest, most enduring pure opportunity because everybody gets it. Everybody lives in a house. They know houses get bought, sold, and rented. There is a base of knowledge — no explanation needed."
    source: "CD8-track3"
  - id: "HEUR-DK-432"
    text: "International Correspondent Schools ran the same ad from 1919 through the 2000s and into 2010 — the same appeal across nearly a century: man impresses wife/partner with new earning power. The visual changed (handing cash, checkbook, laptop) but the core appeal never changed."
    source: "CD9-track2"
  - id: "HEUR-DK-433"
    text: "Visible big ticket purchases by the affluent were affected in recent years not because they could not buy or did not want them, but because they felt it was inappropriate to drive home in a big new Lexus when across the street somebody was getting laid off."
    source: "CD6-track2"
  - id: "HEUR-DK-434"
    text: "Social pyramid numbers (unchanged 1954-2008): 1% rich, 4% financially secure, 54% still working (net assets under $100K), 5% dead broke, 36% dead. Only the 54/36 split has shifted slightly because people live longer."
    source: "CD/12 track 3 — DK citing Social Security Administration data"
  - id: "HEUR-DK-435"
    text: "Realistic Market Assessment math: If total addressable market is 55,000, you hit 5% market share before costs go through the roof = ~2,750. Of those, roughly half have the mindset to buy = 1,250 realistic profitable customers."
    source: "CD/12 track 2 — DK on realistic niche sizing (55K → ~1,250)"
  - id: "HEUR-DK-436"
    text: "George's advertising economics: $100,000/month ad spend driving $4,000,000/month in revenue ($1M/week). That's a 2.5% advertising-to-revenue ratio on a $10,000 average sale."
    source: "CD/11 track 2 — George on his ad spend ratio"
  - id: "HEUR-DK-437"
    text: "George's sales force compensation: Salespeople made $100,000-$200,000/year. Office staff received annual bonuses of $10,000-$20,000 each based on a percentage of total income."
    source: "CD/11 track 1 — George on compensation structure"
  - id: "HEUR-DK-438"
    text: "Ken Roberts Company scale: 700,000 courses sold at $195 each. 5.7 million piece largest single mailing. 95-99% of all sales were via direct mail."
    source: "CD/14 tracks 1-2 — Craig on Ken Roberts' numbers"
  - id: "HEUR-DK-439"
    text: "List change impact: Frank Kern went from 0.05% response rate to 2% response rate. The ONLY change was the list. Nothing else changed — same offer, same creative."
    source: "CD/14 track 5 — Craig on the power of list selection"
  - id: "HEUR-DK-440"
    text: "80% of opportunity buyers will buy again within 30-90 days. If you don't sell them something, somebody else will."
    source: "CD/14 track 6 — Craig on Ken Roberts buyer behavior"
  - id: "HEUR-DK-441"
    text: "Ken Roberts offered 11 different products/upsells over the first 17 weeks of membership. Constant new products, repackaging, and keeping customers part of the family."
    source: "CD/14 track 6 — Craig on the Ken Roberts back-end sequence"
  - id: "HEUR-DK-442"
    text: "January is the best time to mail opportunity offers — new year's resolutions, people looking for ways to improve their life. Avoid mailing during holidays (Thanksgiving, Christmas) — wallets are light and minds are elsewhere."
    source: "CD/14 track 6 — Craig on seasonality of direct mail"
  - id: "HEUR-DK-443"
    text: "George's Saturday farm presentations: About 20 people came per week, but they sold 100 units per week. The fact that prospects COULD come (even though most didn't) was a great reassurance factor."
    source: "DVD/05 — George on conversion numbers"
  - id: "HEUR-DK-444"
    text: "George's business scale: $1 million per week ($52 million/year), $10,000 average sale, 290 employees, 100 sales per week, operating about 15 years ago from today."
    source: "DVD/05 — George and DK on business scale"
  - id: "HEUR-DK-445"
    text: "Format rotation virtually eliminates dupe responses: postcards and enveloped pieces to the same list produce virtually no overlap in responders. This allows using the best list twice instead of lesser lists."
    source: "CD/15 track 4 — DK on format rotation"
  - id: "HEUR-DK-446"
    text: "Auto repair shop mailing: Ron Ipec mailed the same booklet every single month to a finite list with no decline in response. Only changed the color of the outside cover."
    source: "CD/15 track 4 — DK on list durability in finite niches"
  - id: "HEUR-DK-447"
    text: "Direct mail return rate: Expect 4-5% undeliverable regardless of list quality. The Post Office doesn't know which addresses are deliverable until the carrier shows up at the door."
    source: "CD/15 track 2 — Craig/DK on mail hygiene expectations"
  - id: "HEUR-DK-448"
    text: "The more ordinary the spokesperson looked, the higher the response rates. Ken Roberts in denim shirt outperformed suit. Black and white photo even better. More you told about his average background, more people connected."
    source: "CD/14 track 2 — Craig on Ken Roberts image testing"
  - id: "HEUR-DK-449"
    text: "Larry McIntyre foreign brides: Price went from under $1,000 to $8,500 with NO difference in response rate."
    source: "CD/13 track 3 — DK on price elasticity in opportunity selling"
  - id: "HEUR-DK-450"
    text: "Cost per sale lifecycle: $300 cost per sale gradually creeps to $330. At some point it skyrockets from $360 to $880 (the wall). After adjustments, it creeps again until it hits $2,000 (the second wall). Each recovery requires new economics, not new creative."
    source: "CD/15 track 1 — DK on the cost per sale lifecycle"
  - id: "HEUR-DK-451"
    text: "Go By The Inch TV economics: Buying half hours in major markets for $300 at peak. Got 8.5 years of profitable TV — not by changing the show, but by changing the economics. Today same time block costs $6,000."
    source: "CD/15 track 1, CD/11 track 3 — DK on TV media economics"
  - id: "HEUR-DK-452"
    text: "People have to listen to 3 cassette tapes before being allowed to buy. Husband and wife both had to sign an affidavit they listened to 12 hours of audio. If they're interested they'll listen to 6 hours. Don't shrink for the unlikely buyer."
    source: "CD/12 track 5 — DK on qualifying buyers through commitment"
  - id: "HEUR-DK-453"
    text: "George's 3-hour cassette tapes: Prospects listened 5 times before buying. If they're interested, they'll listen to 6 hours. Never use answering machines — always human operators on the phones."
    source: "DVD/05 — George on prospect engagement"
  - id: "HEUR-DK-454"
    text: "Homeowners are less transient than apartment dwellers. Suburban markets less transient than urban markets. To reduce mail returns, call out apartments and focus on homeowners in suburban zips."
    source: "CD/15 track 2 — DK on reducing list waste"
  - id: "HEUR-DK-455"
    text: "George hired 'unwanted' people — ex-felons, people nobody else would hire. His janitor made $35,000 per year and was an ex-con. People who are given a second chance often become the most loyal and hardest-working employees."
    source: "CD/11 track 1 — George on his hiring philosophy"
  - id: "HEUR-DK-456"
    text: "Opportunity sales sequence: Lead generation ads in specialty magazines → big package with full color literature, photos of farm, family, program advisors → assignment to program advisor → personal letter with direct phone number → Saturday farm presentation for those who wanted to come."
    source: "DVD/05 — George on his complete sales funnel"
  - id: "HEUR-DK-457"
    text: "Rob Min real estate pricing: Consulting day started with client listing everything he hated about the business. This 'don't like list' became the foundation for the replacement/opportunity pitch."
    source: "CD/13 track 1 — DK on starting with the don't-like list"
  - id: "HEUR-DK-458"
    text: "Arrow's commodity course: Wait until page 24-25 of 56 before revealing what the offer actually is. First diffuse the risk, present stories/testimonials, then reveal. Photo with dog outperformed all other poses — makes seller look ordinary."
    source: "CD/14 track 4 — Craig on delayed reveal technique"
  - id: "HEUR-DK-459"
    text: "Merge purge for ideal prospects: Take a good opportunity-seeker response list, merge-purge against only the 7 most likely occupational groups, take the dupes. Jacks up cost but produces the best possible list."
    source: "CD/15 track 5 — DK on merge-purge for targeted prospecting"
  - id: "HEUR-DK-460"
    text: "30% of buyers will mail in their order using the business reply envelope rather than calling or going online. Removing the reply envelope doesn't just lose 30% — some determined buyers will find another way, but you'll lose enough to turn a winner into a loser."
    source: "OMC CD/16 track 1 + DVD/07 — Dan Kennedy (Gary Halbert envelope test)"
  - id: "HEUR-DK-461"
    text: "80% of buyers will buy again within 30-90 days. If you aren't going to sell them something, somebody else will. So after purchase, mail 11 different offers over the first 17 weeks."
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"
  - id: "HEUR-DK-462"
    text: "20% of people will take the more expensive option when presented with an AB choice. Always offer an upsell — one in five will choose it without hesitation."
    source: "OMC CD/20 track 5 — Dan Kennedy"
  - id: "HEUR-DK-463"
    text: "List selection alone can move response from 0.05% to 2% — a 40x improvement. The only change between Frank Kern's failed and successful campaign was the list. Response lists (people who raised their hand) dramatically outperform compiled lists."
    source: "OMC DVD/07 — Craig Simpson (Frank Kern example)"
  - id: "HEUR-DK-464"
    text: "In photos for direct mail, more ordinary = higher response. Denim shirt + cowboy hat + dog outperforms suit and tie. Don't reveal the risky product until page 24-25 of a 56-page digest. Make the spokesperson look like the prospect, not like an expert."
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts photo testing)"
  - id: "HEUR-DK-465"
    text: "Removing a qualifier from a seminar invitation can increase response 5x. Dennis de Bergen example: when he stopped saying 'must have $500K in investable assets,' five times more people showed up."
    source: "OMC DVD/07 — Craig Simpson"
  - id: "HEUR-DK-466"
    text: "Track list seasonality at the list level, not just overall. Farmers work 8 days a week during harvest — they don't read mail. Mail them heavily in off-season, skip harvest entirely. The mailing that bombed was the 4th mailing during harvest."
    source: "OMC DVD/07 — Craig Simpson (farming list example)"
  - id: "HEUR-DK-467"
    text: "January is the best time to mail business opportunity offers. New Year's resolutions = people looking for new ways to improve their life, make more money, pay off debt. Worst time: holidays (wallets light, too busy, not thinking improvement)."
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"
  - id: "HEUR-DK-468"
    text: "The $10 differentiator test: when testing a lead-sharing or drop-down product, a $10 price differential drives 15-20% response rate. Small enough not to be a barrier, large enough to qualify interest."
    source: "OMC CD/19 track 8 — Dan Kennedy"
  - id: "HEUR-DK-469"
    text: "Jeff Walker's $1.5M in 58 hours result — Product Launch Formula generated this from a sideways sales letter sequence (prelaunch content) to an email list, not a single long sales letter."
    source: "OMC CD/16 tracks 2-3 — Jeff Walker"
  - id: "HEUR-DK-470"
    text: "Jeff Walker's certification event: $25K limited to 50 spots. 130 applied for 50 spots. Two-step pricing: $5K down, $20K from profits. This creates both scarcity and skin-in-the-game without full upfront barrier."
    source: "OMC CD/16 tracks 5-6 — Jeff Walker"
  - id: "HEUR-DK-471"
    text: "312 out of 2,300 surveyed said yes they would attend — that's proof by survey. Use the survey itself as a selling tool: 'We asked 2,300 people and 312 said yes, so we know there's demand.' The $800K bet framing amplifies this."
    source: "OMC CD/17 tracks 2-3 — Jeff Walker"
  - id: "HEUR-DK-472"
    text: "In B2B direct mail, 40% of registrations can come via fax. Don't eliminate response channels just because they seem outdated — different audiences prefer different response mechanisms."
    source: "OMC DVD/07 — Dan Kennedy (financial advisor example)"
  - id: "HEUR-DK-473"
    text: "A viable list can be mailed more frequently than most people think. Ron Ipec mailed the same booklet to auto repair shop owners every single month with no decline in response — only changed the color of the outside cover."
    source: "OMC DVD/07 — Dan Kennedy (Ron Ipec example)"
  - id: "HEUR-DK-474"
    text: "When switching features-to-benefits in copy, results can go from 20K pieces/year to 850K pieces/year. RegOnline example: same product, same list, transformed copy from feature-focused to benefit-focused."
    source: "OMC DVD/07 — Craig Simpson (RegOnline example)"
  - id: "HEUR-DK-475"
    text: "Expect 4-5% undeliverable rate even with clean lists. The Post Office doesn't know what addresses are deliverable until they show up at the door. This is unavoidable baseline noise — factor it into economics."
    source: "OMC DVD/07 — Craig Simpson"
  - id: "HEUR-DK-476"
    text: "Direct sale states (Ohio, Utah, Indiana) are more responsive for opportunity offers than coastal states. When economics tighten, retard media buys to only the highest-performing geographies."
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch)"
  - id: "HEUR-DK-477"
    text: "Realistic market sizing: 55K chiropractors total → 25K suspects → only 1,250 realistic buyers. The number who will actually buy is a small fraction of the total universe. Size your economics accordingly."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "HEUR-DK-478"
    text: "Birthday targeting for benchmark birthdays (40, 45, 50, 55, 60, 65) — people are more receptive to opportunity/change messages at milestone ages when they reassess their life trajectory."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "HEUR-DK-479"
    text: "Don't show the downsell until after trying everything. The downsell is a safety net, not a starting point. First try the full price, then the payment plan, then the premium option, only then the downsell."
    source: "OMC CD/20 track 6 — Dan Kennedy"
  - id: "HEUR-DK-480"
    text: "95% of Craig Simpson's 140 million+ pieces mailed have been to response-based lists because the difference in performance is that significant. Only one client ever had compiled lists outperform response lists."
    source: "OMC DVD/07 — Craig Simpson"
  - id: "HEUR-DK-481"
    text: "Halbert's sealed envelope technique in sneak-up mail: put everything except the personal letter inside a sealed inner envelope marked 'open only after reading letter' to prevent the immediate 'oh I've been had' yuck reaction."
    source: "OMC DVD/07 — Dan Kennedy (crediting Gary Halbert)"
  - id: "HEUR-DK-482"
    text: "90% of Peter Lowe event buyers had other people's bags — they'd already bought from other speakers. Non-buyers left. The only people remaining to see Kennedy were proven buyers, which is why his closing percentage was 5-6x Zig Ziglar's."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "HEUR-DK-483"
    text: "When you can use multiple formats (postcard + envelope piece) on the same list, there's virtually no dupe between responders. This lets you use the best list twice instead of finding a lesser list."
    source: "OMC DVD/07 — Dan Kennedy (Michael's dental business example)"
  - id: "HEUR-DK-484"
    text: "People in apartments are more transient than homeowners. Suburban markets are less transient than urban. Lower affluence = more frequent moves. Use these selects to reduce undeliverable rates on compiled lists."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "HEUR-DK-485"
    text: "Jeff Walker's PLF results: $1,534,758 in 58 hours. $3.5 million in a single launch. $1.1 million in a single hour. $12,000 in a single second. 12 consecutive launches over $1 million, half over $3 million."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-486"
    text: "PLF certification pricing: Product Launch Formula costs $2,000. The superset training (Product Launch Manager) must be at least $4,000 — settled on $5,000, then escalated to $10,000 after live event positioned at $25,000."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-487"
    text: "PLF hyperresponsive leveraging: Surveyed 2,300 hyperresponsives — 312 said yes, 74.2% would hire a trained Product Launch Manager. Used this as proof: '228 clients just waiting for you, only 50 spots.'"
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-488"
    text: "PLF live event conversion: 50 spots, 130 applied, cherry-picked the top. $25,000 event sold as $5,000 down + $20,000 from profits. At event, offered $10,000 coaching to waive the $20,000 — 37-45 of 50 took it."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-489"
    text: "PLF home study results: 440 units sold at $5,000 (also $1,000/mo x6 option) = approximately $2.5 million in sales."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-490"
    text: "Nothing closes sales like a hard deadline. After the first 24 hours of a 58-hour launch, announcing 'closing tomorrow at midnight' spikes sales dramatically."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-491"
    text: "PLF Bill Glazer launch: Expected $100,000 from normal list promotion. With PLF launch, did $700,000-$750,000. First $100K to Glazer, 10% of upside to Walker."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-492"
    text: "Exclusivity pricing power: A UPS store is 150% more valuable than an independent packing ship place after 5 years, purely due to brand and territorial exclusivity."
    source: "DVD09"
  - id: "HEUR-DK-493"
    text: "Dean Martin house flipping: 60-80 houses bought, slept in, sold at 30-50% markup purely because 'Dean Martin lived here.' Demonstrates status adds to price elasticity."
    source: "DVD09"
  - id: "HEUR-DK-494"
    text: "In a well-run MLM opportunity meeting, more than 70% of the presentation is building the dissatisfaction gap — the preamble — not the actual pitch."
    source: "DVD09"
  - id: "HEUR-DK-495"
    text: "Tom Shack's Health Source: 360-380 chiropractic clinics in 4-4.5 years, from 4. Nobody ever made franchise work in chiropractic before."
    source: "DVD09"
  - id: "HEUR-DK-496"
    text: "Mailing to non-buyers post-event always works. Peter Lowe tour: nobody else did it, worked every single city, every single time. Pretty predictable results."
    source: "DVD09"
  - id: "HEUR-DK-497"
    text: "Only three reasons people don't buy (beyond crappy leads): 1) Price — actual or emotional inability to pay, 2) Don't like the shovel/vehicle itself, 3) Don't like or believe you."
    source: "DVD09"
  - id: "HEUR-DK-498"
    text: "20% of people will take the more expensive option. Always do A/B pricing with a premium tier — 20% will upgrade and give you a lot more money."

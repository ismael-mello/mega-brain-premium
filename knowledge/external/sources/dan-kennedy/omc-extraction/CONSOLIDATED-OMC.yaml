    text: "Difficulty of getting professionals into a room goes up with two factors: chair-side income value (money lost by being away) and ego size. Heart surgeons hardest, podiatrists easiest."
    source: "DVD09"
  - id: "HEUR-DK-501"
    text: "A client's sales team closing 7% first call, 15% total. The other 85% of unconverted leads get nothing but drip — that 85% should be getting FedEx packages, downsell offers, financing offers, teleshark calls."
    source: "DVD10"
  - id: "HEUR-DK-502"
    text: "If more calls are needed to close, that limits growth because reps can only do so many calls. Going from 6 calls to 9 calls per close directly constrains the number of prospects each rep can handle."
    source: "DVD10"
  - id: "HEUR-DK-503"
    text: "In the Carter years, every order form had a way to split the purchase across multiple credit cards. This accommodated real purchasing behavior rather than pretending everyone has unlimited credit."
    source: "DVD10"
  - id: "HEUR-DK-504"
    text: "Jeff Walker's Product Launch Manager first student result: Jonathan Drake — no list, no product, no launch experience — $18,000 payday in first 10 days after the program."
    source: "DVD08-JeffWalker"
  - id: "HEUR-DK-505"
    text: "Surby dental assistant school insight: Buyers were all gray-haired dentists 3-7 years from retirement who discovered they couldn't exit. Exit strategy was infinitely more powerful than second income pitch."
    source: "DVD10"
  - id: "HEUR-DK-506"
    text: "Over 50% of football betting is on NFL Sunday. At end of Sunday, 90% are upside down. Monday Night is the 'bailout game.' Tout services exploit this by calling losers with a Monday night lock."
    source: "DVD09"


L4_FRAMEWORKS:
  - id: "FW-DK-231"
    text: "The Prospect Starting Position Framework — 8 obstacles to selling improvement: 1) Resentment ('I shouldn't have to do all that') 2) Ego ('Who are you to tell me?') 3) Worker head mentality (tenure = entitlement) 4) Absence of real ambition 5) 'Won't work for me' 6) Zombie resignation 7) Negative influences of others 8) Brain dead dumb (too new or too stupid)."
    source: "CD1-track5, CD2-track1-2"
  - id: "FW-DK-232"
    text: "The Belief System Defense Framework — Prospect beliefs that block sales: 1) Preordination (fate determined by God/genetics/astrology) 2) Wealth is evil 3) Credentials/permission required 4) Experience validates limiting beliefs 5) Market is saturated/too late 6) Born talent myth. People feel COMPELLED to defend these beliefs — the conscious mind fights to preserve them."
    source: "CD3-track1-2, CD3-track5"
  - id: "FW-DK-233"
    text: "The 11 Agreements Framework (first 5 shown in Batch 01): Before they can buy, prospects must agree to: 1) Possibility — this could work 2) Beneficial nature — the outcome is truly beneficial 3) Attainability — it's practically achievable, not just possible 4) Personal possibility — it's possible for ME specifically 5) This thing is different — profoundly different from everything on the shrink wrap shelf."
    source: "CD5-track1-5"
  - id: "FW-DK-234"
    text: "The Newsletter Content Ratio Model: Color-code your newsletter/content. Blue = actual marketing/tactical information. Orange = belief building, self-esteem, attitude, selling the noble profession. The ratio should be heavily orange because that's what keeps subscribers from quitting and what they respond to most."
    source: "CD4-track2"
  - id: "FW-DK-235"
    text: "Ben Suarez's 21 Myths Framework: Before teaching how to get rich, address the myths keeping people broke first: 'You can't start a business anymore,' 'Market is saturated,' 'I don't have experience,' 'It's genetics,' 'I need credentials/permission.' The starting point is not ready to be told how to get rich — this stuff is in the way."
    source: "CD3-track4-5"
  - id: "FW-DK-236"
    text: "The Gullibility Achievement Framework: To achieve gullibility (prospect state of being easily persuaded/overtrusting), you need: 1) Place faith outside self (in someone/something) 2) Present as NEW or HIDDEN opportunity 3) Create controlled environment or deliver enough content for self-induced state 4) Match their desire (everyone wants to be rich) 5) Use luck/preordination as ally, not enemy ('you are receiving this because it was meant to be')."
    source: "CD4-track3-6, CD5-track1"
  - id: "FW-DK-237"
    text: "The Possibility-to-Purchase Ladder: Possibility (could work in theory) → Beneficial Nature (outcome is actually good) → Attainability (practically achievable) → Personal Possibility (achievable for ME) → Differentiation (this is different from what failed before). Each rung must be climbed; most sellers skip to the top."
    source: "CD5-track3-5"
  - id: "FW-DK-238"
    text: "The Three Marketing Approaches: 1) Interest the uninterested (tell your story to everybody — classic mass marketing) 2) Seek out the interested (needle in haystack — lead generation) 3) Make the fundamentally uninteresting message more interesting to more prospects (opportunity marketing approach)."
    source: "CD1-track1"
  - id: "FW-DK-239"
    text: "The 11 Agreements Framework for Attainability: (1) Need/want exists, (2) Solution exists, (3) This specific solution works, (4) Others have succeeded with it, (5) Personal attainability — I can do this, (6) It is different from all past failures, (7) Not my fault it has not worked before, (8) Personal beneficial nature — good specifically for ME, (9) Timing is right — market conditions, (10) Personal timing is right — my circumstances, (11) Personal appropriateness — I deserve this / it is right for me."
    source: "CD6-track1, CD6-track2, DVD03"
  - id: "FW-DK-240"
    text: "15 Elements of Opportunity Presentation Framework: (1) Pure hype/mystery, (2) Trust (person, place, affinity, disarming), (3) Reason why, (4) Toaster principle — tangible thing with a name, (5) Reason why advertising, (6) Personal story of the presenter, (7) Being a larger-than-life figure, (8) Difficult proposition made simple, (9) Big idea, (10) Reselling the original dream, (11) Enemy/villain, (12) Urgency from past loss, (13) Membership, (14) Proof by test, (15) Status elevation."
    source: "CD6-track3 through CD9-track3"
  - id: "FW-DK-241"
    text: "Four Trust Elements Framework: (1) Person — who is the face, their story, authenticity, relatability; (2) Place — small town, heartland, trustworthy location; (3) Affinity — shared background, tone, conversational match; (4) Disarming — casual, non-threatening, no salesy movements."
    source: "CD6-track6, CD7-track1, DVD03"
  - id: "FW-DK-242"
    text: "Three Elements of Larger-Than-Life Figure: (1) Humble beginnings — so they do not see you as just an arrogant asshole with a Bentley; (2) Proof of importance — big audiences, media appearances, book signings, celebrity endorsements; (3) Taking control — 'I am your trainer, you are the trainees, I am here because my life works, you are here because yours does not.'"
    source: "CD8-track1, CD8-track2"
  - id: "FW-DK-243"
    text: "Transformational Story Framework: (1) Dramatic BEFORE — weighted heavily, this is where they are; (2) The turning point / firm resolution moment (Girl Scout at the Door, purple diary); (3) The AFTER — the transformation achieved. Key insight: the before must be more dramatic and weighted than the after."
    source: "CD7-track5, CD8-track1"
  - id: "FW-DK-244"
    text: "Overcoming Personal Timing Framework: Three choices when a list has seasonality — (1) Tactical: ignore the list except when responsive, then mail hard; (2) Reframe: convince them that what they think is disadvantageous timing is actually ideal timing; (3) Urgency override: make urgency so great that bad timing is trumped."
    source: "CD6-track2"
  - id: "FW-DK-245"
    text: "George Douglas Sales System Framework: (1) Lead generation ads in publications; (2) Inbound calls answered by real humans; (3) Pre-assigned program advisor; (4) Big package: color brochure, farm photos, family photos, office photos, program advisor pics; (5) 3-hour cassette tape that must be listened to before purchase; (6) Write down questions for program advisor; (7) Program advisor sells on straight commission; (8) Open farm invitation every Saturday (9-12 presentation, lunch, farm tour with wife)."
    source: "CD10-track2, CD10-track3, CD10-track4"
  - id: "FW-DK-246"
    text: "Membership Value Delivery Framework: (1) Immediate tangible — business cards sent before the course; (2) Directory/who's who listing — send 6 copies; (3) Certificate for the wall — large, impressive; (4) Ongoing status markers — pins, watches, branded items; (5) Each delivers perceived value without requiring activity or achievement from the buyer."
    source: "CD9-track2, CD9-track3"
  - id: "FW-DK-247"
    text: "Reason Why Framework for Opportunity: (1) Direct answer — why are you sharing this instead of keeping it; (2) Blackie story — inherited from a dying man / retiring master; (3) Irresistible impulse — the thing is so great he could not help coming back; (4) Legacy obligation — feels compelled to pass it on; (5) Timing reason why — about to retire, new discovery, etc."
    source: "CD7-track3, CD7-track4"
  - id: "FW-DK-248"
    text: "5 Types of Repositioning: (1) REPLACEMENT — new/different version of same business (cash practice, staff-driven practice). (2) TRUE REPLACEMENT / GREENER PASTURES — take them completely out of their current situation (Larry's foreign brides). (3) REINVENTION — step down from replacement, knocking items off the don't-like list without full replacement. (4) REARRANGEMENT — changing sales process, pricing, fee structure (close to 'deck chairs on the Titanic'). (5) ADDITION/EXPANSION — business-in-business (Donna's weight loss in gyms) or MULTIPLIER (go-by-the-inch multiple locations)."
    source: "CD/13 tracks 1-6 — DK presenting the repositioning spectrum"
  - id: "FW-DK-249"
    text: "Opportunity Presentation Elements (15+ items from DVD/04): #119 Toaster Principle (thing with a name), #5 Reason Why (if so good why share?), Blackie Story (dying man/legacy source), Personal Story importance, Transformational Story (BEFORE > AFTER), Larger Than Life Figure (humble beginnings + proof of importance + possessions), Difficult Proposition Made Simple, Taste-Like-Chicken analogy, #10 Reselling the Original Dream, #11 Enemy/Villain, #12 Urgency from Past Loss, #13 Membership, #15 Status Elevation."
    source: "DVD/04 — DK presenting the elements of opportunity presentation"
  - id: "FW-DK-250"
    text: "Three Elements of Larger Than Life Figure: (1) HUMBLE BEGINNINGS — most buyers have humble beginnings, without it you're just an arrogant asshole with a Bentley. (2) PROOF OF IMPORTANCE — other people must share the opinion, big audiences, media appearances, book signings. (3) POSSESSIONS/LIFESTYLE — evidence of results/success."
    source: "DVD/04 — DK on constructing a larger-than-life persona"
  - id: "FW-DK-251"
    text: "Realistic Market Assessment Framework: Step 1 — Math assessment: What is the total addressable number? Step 2 — Apply the pyramid: Only a fraction will ever buy. Step 3 — Psychographic assessment: Who are the 1,250? Not by name but by mindset. Step 4 — Find the trigger point with them. Step 5 — Craft everything to influence the most likely buyer, not the 55,000."
    source: "CD/12 tracks 1-2 — DK on realistic market sizing"
  - id: "FW-DK-252"
    text: "Replacement Pitch Construction (Chiropractic example): Start with the 'don't like list' — insurance paperwork, rejections, caps, $56 billed/$18 paid. Replacement = cash practice, no insurance, prepay ($13,800 case, 20% discount for single payment, 10% for three payments). Since all-cash, you can offer any discounts you want."
    source: "CD/13 track 2 — DK on building the replacement opportunity"
  - id: "FW-DK-253"
    text: "Don't-Like List to Opportunity: Start every consulting engagement with the client's list of everything they hate about their business. This list becomes the foundation for the replacement, reinvention, or rearrangement pitch. The more items you can knock off, the more powerful the opportunity."
    source: "CD/13 tracks 1-2 — DK on using pain points as opportunity fuel"
  - id: "FW-DK-254"
    text: "Market Capacity Wall Response Framework: Phase 1 (Honeymoon) — low CPS, deluding. Phase 2 (Gradual Creep) — every stat turning chilly but not horrible. Phase 3 (The Wall) — CPS skyrockets. Response: Don't change the creative, change the economics. If CPS goes from $330 to $880, rejigger the business to live with $1,100 CPS. The second wall requires another economic restructure."
    source: "CD/15 track 1 — DK on responding to market saturation"
  - id: "FW-DK-255"
    text: "Craig's Three Keys to Ken Roberts' Success: (1) Present the offer in a way that diffuses risk — focus on benefits, not the 85% failure rate. (2) Focus on connecting with the customer on their level — make the spokesperson look ordinary (denim shirt, cowboy hat, black-and-white photo). (3) Capitalize on every customer — 11 offers over 17 weeks, 80% rebuy in 30-90 days."
    source: "CD/14 tracks 1-6 — Craig's three pillars of direct mail success"
  - id: "FW-DK-256"
    text: "Reason Why + Blackie Story Framework: The biggest cause for skepticism in opportunity is 'if it's so good, why share it?' The Blackie Story answers this: a dying man/retiring billionaire/great-grandfather passed it to me. It does two things: (1) Provides a reason why (legacy/obligation), (2) Makes the source not the seller (more believable)."
    source: "DVD/04 — DK on combining reason-why with Blackie story"
  - id: "FW-DK-257"
    text: "Business-in-Business (Addition/Expansion): Install a synergistic business inside an existing practice. Example: Weight loss in fitness gyms (Donna). Massage business next door to chiropractic. The wrinkle: massage therapists kept their place only by producing 5 new chiropractic patients per week — symbiotic requirement."
    source: "CD/13 track 5 — DK on synergistic business-in-business"
  - id: "FW-DK-258"
    text: "Multiplier Story (Go By The Inch): Instead of making $500 from one location, have 10 locations hiring retired people and high school kids — make $250 from each. Then three-tier: 50 locations at $150 each. The multiplier story transforms a small personal income opportunity into a scalable business vision."
    source: "CD/13 track 6 — DK on the multiplier repositioning story"
  - id: "FW-DK-259"
    text: "Competitive Intelligence via List Analysis: Get on the list yourself. Order from competitors. Get the data cards of your best-performing lists. Look at the top 5 users of your list. Examine their direct mail pieces for commonalities. If they're all selling on six-pay, test six-pay. If they all use gray-haired photos, don't use young blondes. Start with their testing results."
    source: "CD/15 track 3 — DK on mining competitor intelligence from lists"
  - id: "FW-DK-260"
    text: "Feature-to-Opportunity Conversion (RegOnline example): Feature-oriented: 'automated follow-up emails, one-click reports, instant payment.' Opportunity-oriented: 'cut your event cost 25% while increasing attendance 20%.' Same product, completely different positioning — from software features to business outcomes."
    source: "CD/14 track 3 — Craig on repositioning features as opportunities"
  - id: "FW-DK-261"
    text: "George's Trust-Building Sales System: (1) Lead generation ads in specialty magazines, (2) Big package with full-color literature + photos of farm, family, and program advisors, (3) Pre-assigned program advisor with personal letter and direct phone number, (4) 3-hour audio cassettes prospects listened to 5x before buying, (5) Open Saturday farm visits (20/week came, 100/week sold), (6) Human answering phones always — never answering machines."
    source: "DVD/05 — George's complete trust-based sales system"
  - id: "FW-DK-262"
    text: "Repositioning Spectrum (Opportunity → Improvement): REPLACEMENT (pure opportunity language) → TRUE REPLACEMENT/GREENER PASTURES → REINVENTION (drifting toward improvement) → REARRANGEMENT (one step from deck chairs on Titanic) → ADDITION/EXPANSION (back to opportunity) → MULTIPLIER (pure scalability story). The further from pure replacement, the weaker the opportunity language."
    source: "CD/13 tracks 1-6 — DK on the repositioning spectrum"
  - id: "FW-DK-263"
    text: "Jeff Walker's Product Launch Formula (PLF): (1) Prelaunch content sequence building anticipation, (2) Layer mental triggers across sequence (authority, reciprocity, community, social proof, anticipation, scarcity), (3) Open cart with time-limited offer, (4) Close cart with urgency. The 'sideways sales letter' replaces the traditional long-form sales letter."
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"
  - id: "FW-DK-264"
    text: "Craig Simpson's Three Keys to Direct Mail Success: (1) Diffuse the risk — take away the scary part of the offer, (2) Focus on benefits not features — show the dream life, not the product specs, (3) Connect with customer on their level — look ordinary, tell relatable stories, match their self-image."
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"
  - id: "FW-DK-265"
    text: "The 17-Week Backend Sequence: Over the first 17 weeks after purchase, mail 11 different offers — books, DVDs, advanced courses, mini courses, newsletters, seminars. Then quarterly reactivation products. The stick letter is offer #1 (sent immediately with confirmation)."
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company) + Dan Kennedy (Halbert stick letter)"
  - id: "FW-DK-266"
    text: "Direct Selling Presentation Framework (from MLM): (1) 70%+ establishing dissatisfaction gap, (2) Invalidate all other bridges/solutions, (3) Present your solution so simple any buffoon can do it (do-it-for-them model), (4) Force self-definition by yes/no decision — 'Are you the kind of person who...'"
    source: "OMC CD/18 tracks 3-4 — Dan Kennedy"
  - id: "FW-DK-267"
    text: "Competitive Intelligence Gathering Framework: (1) 'Let them have at you' — become a prospect of your competitors, (2) Source customer data (with bias caveats), (3) Direct observation, (4) Focus groups, (5) List information analysis, (6) Read/watch what your prospects read/watch, (7) Learn tribal language."
    source: "OMC CD/19 track 1 — Dan Kennedy"
  - id: "FW-DK-268"
    text: "List Selection Decision Framework: (1) Get data cards side by side, (2) Compare compiled vs response source, (3) Check available selects (age, income, SIC code, recency), (4) Look at who else is renting the list — smart repeat renters = high confidence, (5) Get control copies from top renters via InsideDirectMail.com, (6) Look for commonalities in what winners are doing."
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"
  - id: "FW-DK-269"
    text: "Unconverted Leads Recovery Framework: (1) Appointment no-sale system, (2) Handoff system (tele-shark to supervisor), (3) Unending follow-up cycles, (4) Switch to different opportunity/different shovel, (5) Second tier/downsell, (6) Switch to different identity/alter ego business, (7) Loop-back-up mechanism from downsell to original offer."
    source: "OMC CD/19 tracks 4-8 — Dan Kennedy"
  - id: "FW-DK-270"
    text: "Proof Stacking Framework (Jeff Walker): (1) Survey as proof — 'We asked 2,300 and 312 said yes,' (2) The money bet — '$800K bet that this works,' (3) Geography proof — 'Geography doesn't matter, here's proof from [locations],' (4) Social proof via community — let prospects see other prospects buying, (5) Third-party endorsement — rigorous selection process implies quality."
    source: "OMC CD/17 tracks 2-4 — Jeff Walker"
  - id: "FW-DK-271"
    text: "Jeff Walker's Certification/Franchise Model: (1) Create rigorous selection process (130 apply for 50 spots), (2) Two-step pricing: $5K down + $20K from profits, (3) Upsell platinum coaching at the event itself ($10K waiving the $20K), (4) Leverage hyper-responsives (people who always buy everything), (5) Assets inventory — document what they already have to work with."
    source: "OMC CD/16 tracks 5-6, CD/17 tracks 1-4 — Jeff Walker"
  - id: "FW-DK-272"
    text: "Backend Economics Framework: (1) Customers as resellers/distributors/affiliates, (2) Retain space in media you provide, (3) Make their leads your list — lead sharing/exchange, (4) Drop-down sale to recover non-buyers, (5) Loop-back-up from downsell to original, (6) Multiple identities to mail same list segment repeatedly."
    source: "OMC CD/20 tracks 1-2 + CD/19 track 8 — Dan Kennedy"
  - id: "FW-DK-273"
    text: "The Market Saturation Response Framework: (1) Recognize honeymoon → gradual creep → wall pattern, (2) When wall hits, change economics not creative, (3) Pull back to high-probability list segments, (4) Retard media buys to best geographies, (5) Create new identities/formats for same segments, (6) Adjust pricing/offers for new cost-per-acquisition reality."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "FW-DK-274"
    text: "Preview/Discovery Funnel Options: (1) Fake seminar (positioned as education, actually a pitch), (2) Disclosed event (transparently a sales presentation), (3) Discovery day (come see the operation), (4) Drop-in days, (5) Direct to purchase. Choose based on prospect ego and chair-side value."
    source: "OMC CD/19 track 3 — Dan Kennedy"
  - id: "FW-DK-275"
    text: "Gathering Material Framework for Opportunity Marketing: (1) Historical archives — study old examples, (2) Contemporary examples — collect current cases, (3) Play prospect with competitors ('let them have at you'), (4) Hold swipe files of everything, (5) Look for commonalities across successful pieces, (6) Watch/read what your prospects watch/read to understand tribal language."
    source: "OMC CD/18 tracks 5-6 — Dan Kennedy"
  - id: "FW-DK-276"
    text: "List Test Matrix Framework: (1) Build matrix of X lists × segments × messages × formats, (2) Test all combinations in small quantities, (3) Validate assumptions from house file data, (4) Make discoveries about unexpected winning combinations, (5) Repeat 2-3 times to refine down to a science, (6) Then roll out at scale with validated segments."
    source: "OMC DVD/07 — Dan Kennedy + Craig Simpson"
  - id: "FW-DK-277"
    text: "Exclusivity Sale Accelerators: (1) Territorial exclusivity — fear of competitor getting it, (2) Status/pride of ownership, (3) Price elasticity liberation — exclusive = willing to pay more, (4) Conveyed equity — they're buying an asset not just a product, (5) Authentic urgency — limited slots are real, (6) Take-away selling enabled by genuine scarcity."
    source: "OMC CD/18 track 2 — Dan Kennedy"
  - id: "FW-DK-278"
    text: "Product Launch Formula Sideways Sales Letter Framework: Headline > Story/Hook > Opportunity > Build Story > Benefits/Bullets > Offer > Risk Reversal > Price — spread across 3-4 pieces of prelaunch content over 10-14 days instead of one long sales letter."
    source: "DVD08-JeffWalker"
  - id: "FW-DK-279"
    text: "PLF Mental Triggers Sequence: Authority (first video) > Reciprocity (teach them content) > Community + Social Proof (comments, sharing) > Anticipation > Scarcity (hard deadline). Build tension like a novel arc."
    source: "DVD08-JeffWalker"
  - id: "FW-DK-280"
    text: "PLF Two-Step Certification Launch: Step 1 — Internal launch to own list, sell high-end live event ($25K) to hyperresponsives, create success stories. Step 2 — JV launch of home study version using social proof from Step 1 at higher scale."
    source: "DVD08-JeffWalker"
  - id: "FW-DK-281"
    text: "PLF Asset Inventory Framework: Before launching, inventory your assets — personal reputation, product reputation, historical successes, established pricing, JV partners, hyperresponsives on list, event capability, pent-up demand. Then stack these assets into the launch sequence."
    source: "DVD08-JeffWalker"
  - id: "FW-DK-282"
    text: "PLF Danger Assessment Framework: Identify dangers before launch — no proven demand, inventing a profession, risk to partner relationships, potential brand dilution, legal complexity, fundamentally different market. Plan mitigations for each."
    source: "DVD08-JeffWalker"
  - id: "FW-DK-283"
    text: "Opportunity Structure Options (8 types): 1) Real franchise, 2) Almost-franchise (flirts with franchise rules), 3) Distributorship, 4) Consultant opportunity +/- certification, 5) Coaching-plus, 6) Benefits/services + coaching, 7) Outright services, 8) One-time event/training + stuff."
    source: "DVD09"
  - id: "FW-DK-284"
    text: "Opportunity Payment Models (6 types): 1) Fees only, 2) Fees + profits on services used (disclosed or hidden), 3) Fees + share of upside, 4) Fees + upside + service profits (3 revenue streams), 5) All upside no fee, 6) Equity partnership."
    source: "DVD09"
  - id: "FW-DK-285"
    text: "Exclusivity Benefits Framework (7 reasons): 1) Removes 'who else has it' worry, 2) Competitors-they-hate motivation, 3) Pride of ownership/status, 4) Price elasticity support, 5) Conveys real/perceived equity, 6) Supports ownership language, 7) Creates authentic urgency. Also supports takeaway selling and compliance."
    source: "DVD09"
  - id: "FW-DK-286"
    text: "6 Lessons from Direct Selling/MLM Industry: 1) Establish big dissatisfaction gap, 2) Invalidate all other bridges, 3) Prove any buffoon can do it (with done-for-them elements), 4) Master poster children stories, 5) Force pick-a-door identity decision, 6) Use all of the above relentlessly."
    source: "DVD09"
  - id: "FW-DK-287"
    text: "Unconverted Lead Monetization Framework: 1) Unending follow-up (communicate until they buy or die), 2) Switch to different opportunity of yours (red shovel/blue shovel), 3) Second-tier downsell offer, 4) Switch to different identity/alter ego, 5) Rent/sell/exchange/barter lists, 6) Lead qualification tiers (paid vs free self-selection), 7) Drop-down sale with loop-back-up."
    source: "DVD09"
  - id: "FW-DK-288"
    text: "Sales Process Options Menu: Lead generation (free vs self-liquidating) > Preview seminar (physical/phone/online) > One-on-one teleshark > Fake seminar (disguised as education) > Disclosed discovery day > Drop-in/tour days > Direct-to-purchase via media > Sequential multi-step > Appointment no-sale system > Handoff system."
    source: "DVD09"
  - id: "FW-DK-289"
    text: "Material Gathering Framework for Opportunity Marketers: 1) Historical archives and examples (go backwards to go forward), 2) Contemporary examples (be on every list), 3) Build swipe files of commonalities, 4) Play prospect (let them sell to you), 5) Study your own customers (with sourcing bias caveat), 6) Observe prospects in their habitat, 7) Focus groups, 8) List information and SRDS data, 9) Read/watch what they read/watch, 10) Commercially available research."
    source: "DVD09"
  - id: "FW-DK-290"
    text: "Exit Strategy Selling Framework: Sell the exit/transition as the primary pitch (3-5 year full income replacement program), then bonus the system improvement. Not the other way around. Stack current leverage: stock market losses + Obamacare anxiety + inability to sell practice at expected price."
    source: "DVD10"
  - id: "FW-DK-291"
    text: "Pre-Call Influence Framework: 1) Send package after first conversation if no close, 2) Require deposit for 'discovery day in a box,' 3) Require them to swear they reviewed materials before phone appointment, 4) Include form that forces engagement with content, 5) Schedule call after review period."
    source: "DVD10"
  - id: "FW-DK-292"
    text: "Event Opportunity Integration: Don't sell opportunity at the same event where you sell coaching — separate them. If forced to combine, do it as bonus day/evening AFTER coaching is sold. Never change anything about the proven coaching-selling process."
    source: "DVD10"

# ============================================================
# L5_METODOLOGIAS - 47 elementos
# ============================================================
L5_METODOLOGIAS:
  - id: "MET-DK-159"
    text: "The Belief Audit Exercise: Step 1) Rethink what's in your specific prospects' heads, avoiding giving them credit you've been giving them. Step 2) Make a list of what's there — some generic, some unique to their business/age/demographics. Step 3) Put stars next to the beliefs they feel compelled to DEFEND against you. Step 4) You now have a clear representation of the difficulty of the task."
    source: "CD3-track4"
  - id: "MET-DK-160"
    text: "The Language Swap Method: Take your existing order form/sales letter written in improvement language. Create a replacement version using opportunity language instead. Compare the two side by side — the differences are glaring. Replace 'fix your business' language with 'new opportunity' language throughout all materials."
    source: "CD2-track4"
  - id: "MET-DK-161"
    text: "The Content Color-Coding Audit: Step 1) Print your newsletter/ongoing content. Step 2) Highlight in blue all actual marketing/tactical information. Step 3) Highlight in orange all belief-building, self-esteem, attitude change, encouragement content. Step 4) Analyze the ratio. Step 5) Adjust toward heavier orange — that's what keeps them and what they respond to."
    source: "CD4-track2"
  - id: "MET-DK-162"
    text: "The Personal Impossibility Mapping for Testimonials: Step 1) List all the factors your prospect believes make success impossible for THEM specifically. Step 2) For each factor, find/create a testimonial from someone who shares that exact impossibility factor. Step 3) One testimonial per impossibility won't suffice — need volume. Step 4) Supplement with other tactics beyond testimonials."
    source: "CD5-track4-5"
  - id: "MET-DK-163"
    text: "The Prospect Message Repositioning Process: Step 1) Identify where your prospect really is (bored, discouraged, resigned, belief-defended). Step 2) Back your conversation up to where THEY are, not where you think they are. Step 3) Reframe/reposition/repackage/relanguage from repair or improvement to opportunity. Step 4) Disconnect what you're presenting from what they're already bored with."
    source: "CD1-track1, CD2-track4, CD3-track1"
  - id: "MET-DK-164"
    text: "The Opportunity Story Conversion — Six Ways to Play: Step 1) Take present deliverables and present them differently (most common). Step 2) Bring different deliverables to your current market. Step 3) Take existing deliverables to a different marketplace. Step 4) Package as consultant opportunity. Step 5) Convert to pure opportunity for the masses. Step 6) If already pure opportunity marketer, apply all concepts. Choose your path, then apply opportunity language."
    source: "CD1-track1"
  - id: "MET-DK-165"
    text: "The Luck/Preordination Ally Technique: Step 1) Identify prospect beliefs about luck and preordination. Step 2) Instead of fighting these beliefs, USE them as allies. Step 3) Integrate 'your lucky day' story into your opportunity presentation. Step 4) Include version of 'you are receiving this out of millions who could have received it because it was meant to be.' Step 5) Turn the enemy belief into a sales tool."
    source: "CD4-track5"
  - id: "MET-DK-166"
    text: "Off-The-Hook Headline Method: Place the 'it is not your fault' message in the headline itself. Example: 'Too busy earning a living to make any money.' The prospect immediately identifies — 'that is exactly the problem' — and the excuse for past failure is established before any selling begins."
    source: "CD6-track5"
  - id: "MET-DK-167"
    text: "Urgency From Past Loss Copy Method: Step 1 — Open with what they could have collected/earned if they had known and acted. Step 2 — Quantify the specific dollars missed. Step 3 — Continue rubbing their nose in money they should have had throughout the piece. Step 4 — Then pivot to what they will get going forward. The pain of loss already incurred is more motivating than future gain."
    source: "CD9-track1"
  - id: "MET-DK-168"
    text: "Business Card Before Course Method (Brainerd Melanger): Step 1 — As soon as order is received, print 500 business cards with their name, title, and organization. Step 2 — Ship business cards BEFORE shipping the course. Step 3 — Course arrives 2 days after cards. Result: refund rate drops dramatically because they now feel they ARE in the business before they even open the materials."
    source: "CD9-track2"
  - id: "MET-DK-169"
    text: "Proof By Test Method: Include a self-test the prospect can take that 'proves' the opportunity is right for them. Examples: free writing aptitude test (writing schools), invention evaluation (invention companies), profit test (info marketing). The test creates personal attainability proof and engagement. Results always come back positive."
    source: "CD8-track4"
  - id: "MET-DK-170"
    text: "Cafeteria Opportunity Method (George Douglas): Step 1 — Start with 4 home-based businesses. Step 2 — Add 2-5 new options per year until you reach 42. Step 3 — Allow any buyer to swap to any other program for $50. Step 4 — Communicate growth ('the company is growing all the time'). Step 5 — Position: 'if you cannot make one of these 42 businesses work, you probably should not be in business.' Result: eliminates fear of making wrong choice, dramatically reduces refunds."
    source: "CD10-track5"
  - id: "MET-DK-171"
    text: "Direct Mail Heart Transplant Method (George Douglas literal example): Step 1 — Get your records even if they resist. Step 2 — Write a personal letter explaining who you are, what you need, and why, with personal context (Christmas letter). Step 3 — Mail to all 467 hospitals that do transplants. Step 4 — Include proof you can pay, can relocate, and are motivated. Step 5 — Follow up on every positive response. Result: 4 doctors responded, got a heart within 6 months vs the 3 years the system said it would take."
    source: "CD9-track5, CD10-track1"
  - id: "MET-DK-172"
    text: "Saturday Open Farm Method (George Douglas): Step 1 — Invite all new customers to visit every Saturday. Step 2 — Give 2-hour presentation covering all programs. Step 3 — Open for Q&A. Step 4 — Feed them lunch at the farm. Step 5 — Have wife interact naturally with visitors. Step 6 — Program advisors available to work individually. Only 20% of buyers visit but the fact they CAN visit is the reassurance factor that drives 100% of sales."
    source: "CD10-track3"
  - id: "MET-DK-173"
    text: "Reselling the Original Dream Method: Step 1 — In first meeting/conversation, ask 'How did you get into this business? Why?' Step 2 — Let them tell the story — they will perk up re-experiencing the original excitement. Step 3 — Link your proposition to that original dream and mental picture. Step 4 — Use the language and imagery of their original aspiration, not your technical features. Example: Harrison's postcard going right back to 'how to have a bestselling book' for disillusioned authors."
    source: "CD8-track5, CD8-track6"
  - id: "MET-DK-174"
    text: "Dramatic Before Story Method: Step 1 — Weight the before portion of your story at least 2:1 versus the after. Step 2 — Make the before as horrible, miserable, humiliating, and painful as the worst nostalgic memory. Step 3 — Include a specific 'firm resolution' or 'day that turned my life around' moment. Step 4 — The after follows naturally but with less emphasis. Examples: Jeff Paul sitting in his car in his driveway weeping. Jim Rohn lying to a Girl Scout because he could not afford cookies."
    source: "CD7-track5, CD8-track1"
  - id: "MET-DK-175"
    text: "Taste Like Chicken Analogy Method: Step 1 — Identify what is hard to explain about your opportunity. Step 2 — Find something the prospect already knows, understands, and accepts. Step 3 — Create the analogy: internet store = mall store, recurring income = oil well in your front yard. Step 4 — Build entire pitch around the analogy. Example: iMall sold virtual store spaces at $3-5K each by saying 'it is just like the mall in your area except more people come and it has no walls.'"
    source: "CD8-track4, CD8-track5"
  - id: "MET-DK-176"
    text: "Six-Copy Directory Method (Brainerd Melanger): Step 1 — Create a directory listing every member. Step 2 — Give each member a full page about themselves. Step 3 — Ship six copies to each member. Step 4 — Add a large certificate suitable for framing. Step 5 — Each item delivers status elevation without requiring any business activity. The cost per member is small relative to the retention and satisfaction impact."
    source: "CD9-track3"
  - id: "MET-DK-177"
    text: "Ken Roberts Direct Mail Methodology: (1) Lead generation via direct mail with risk-diffusing copy. (2) Present offer focusing on benefits, not product features — second income, pay off mortgage, buy dream car. (3) Make spokesperson look ordinary — denim shirt > suit, black-and-white photo, stories of average background. (4) Delay product reveal until page 24-25 of 56-page piece. (5) Use Greek philosopher / historical story before revealing what product actually is. (6) Track every detail of every list — which lists work best and WHEN they work best. (7) Capitalize on every customer with 11 offers over first 17 weeks."
    source: "CD/14 tracks 1-6 — Craig presenting Ken Roberts methodology"
  - id: "MET-DK-178"
    text: "Craig's List Selection Methodology: (1) Always prefer RESPONSE lists over compiled lists — people who raised their hand. (2) Get the data card — check source (compiled vs direct response), universe size, selects available. (3) Get ON the list yourself — see what they're mailing. (4) Test in small quantities before scaling. (5) Track seasonality — best months vs worst months. (6) After identifying winners, test FORMAT variation on same list (postcard vs envelope). (7) Merge-purge against occupational selects for ultra-targeting."
    source: "CD/14 tracks 5-6, CD/15 tracks 1-5 — Craig's list management approach"
  - id: "MET-DK-179"
    text: "George's Saturday Farm Presentation Methodology: (1) Lead ads in specialty sales magazines (2 publications). (2) Inbound calls to HUMAN operators (never recorders). (3) Large package with full-color literature, farm photos, family photos, advisor photos. (4) Assign program advisor with personal letter and direct number. (5) 3-hour audio cassettes mailed — prospects listened 5x before buying. (6) Every Saturday: 3-hour presentation 9-12, open Q&A, then lunch at the farmhouse with wife. (7) Program advisors close after lunch. Result: 20 attendees/week, 100 total sales/week at $10,000+ each."
    source: "DVD/05 — George describing his complete sales process"
  - id: "MET-DK-180"
    text: "Don't-Like List Replacement Methodology: (1) Start consulting day by asking 'list everything you don't like about your business.' (2) Categorize: which pains can be REPLACED (eliminated entirely), which can be REINVENTED (reduced), which can only be REARRANGED (slightly improved). (3) Build the replacement pitch around the highest-pain items. (4) Use opportunity language for the replacement and improvement language only as fallback. (5) Price the replacement as premium (Rob Min: $900 → $8,500 with no response difference)."
    source: "CD/13 tracks 1-4 — DK on building replacement from pain lists"
  - id: "MET-DK-181"
    text: "Market Capacity Wall Management Methodology: (1) Track leading indicators: CPS creep, response rate decline, steps-to-close increase. (2) When wall hits (CPS skyrockets), do NOT change creative first — change economics. (3) Add back-end products to support higher CPS. (4) Retract media buys to highest-performing markets/lists only. (5) Test format rotation on surviving lists. (6) If second wall hits, restructure entire business economics. DK got 8.5 years from Go By The Inch by changing economics, not the show."
    source: "CD/15 tracks 1-2 — DK on managing market saturation over time"
  - id: "MET-DK-182"
    text: "Multiple Shovels Lead Maximization Methodology: (1) Generate leads for 3 specific desired outcomes. (2) Present Offer A (red shovel — e.g., fix the staff/phones). (3) Unconverted leads go back into pool. (4) Lead-generate again from unconverted leads for same 3 outcomes. (5) Present Offer B (blue shovel — e.g., fix the patient who doesn't refer). (6) Repeat with Offer C (green shovel). (7) Each round allows higher initial spend on lead gen because total yield-per-lead increases. (8) Outspending becomes barrier to entry for competitors."
    source: "CD/15 track 5 — DK on maximizing lead yield through offer variation"
  - id: "MET-DK-183"
    text: "Opportunity Presentation Construction Methodology (DVD/04): (1) Give the thing a NAME — make it a toaster, not a process. (2) Create/identify a Blackie Story — dying man, legacy source. (3) Answer the reason-why objection upfront — 'why would any sane person reveal this?' (4) Build personal story with humble beginnings. (5) Create transformational story emphasizing BEFORE more than AFTER. (6) Construct larger-than-life figure (humble beginnings + proof of importance + possessions). (7) Use taste-like-chicken analogy for difficult propositions. (8) Resell the original dream they already had. (9) Identify and attack the common enemy/villain. (10) Build urgency from past loss — what they ALREADY missed. (11) Wrap in membership for value-without-achievement. (12) Elevate status — give them a business card, a title."
    source: "DVD/04 — DK presenting the 12-step opportunity construction method"
  - id: "MET-DK-184"
    text: "George's Employee Self-Management Methodology: (1) Put ALL office staff on a percentage-of-income bonus. (2) Christmas bonuses of $10K-$20K each based on total company income. (3) Staff self-polices — non-performers eliminated by peers because they affect everyone's bonus. (4) Hire 'unwanted' people (ex-felons, people nobody else will hire) — they become the most loyal. (5) Never have a fancy office — show that the business can be run simply. (6) Top salespeople make $100K-$200K/year."
    source: "CD/11 track 1, DVD/05 — George on self-managing team economics"
  - id: "MET-DK-185"
    text: "Birthday-Triggered Opportunity Marketing Methodology: (1) Identify benchmark birthdays in your market (40, 45, 50, 55, 60, 65). (2) Obtain cold lists segmented by birthday (Dean Kelley Beckworth's method). (3) Mail opportunity offers in the birthday window when status-in-life reflection is highest. (4) Proven in cosmetic surgery/dentistry — extend to any opportunity niche. (5) Also target life events: divorce (+6 months), marriage of children, job loss."
    source: "CD/12 track 5 — DK on birthday-triggered opportunity marketing"
  - id: "MET-DK-186"
    text: "Jeff Walker's Prelaunch Content Sequence methodology: Step 1 — Release free content that teaches and builds authority. Step 2 — Layer mental triggers (reciprocity by giving value, authority by demonstrating expertise, community by showing others engaged, anticipation by hinting at what's coming). Step 3 — Address objections in prelaunch content before they arise. Step 4 — Open cart with time-limited window. Step 5 — Close cart with authentic scarcity. Result: $1.5M in 58 hours from email list."
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"
  - id: "MET-DK-187"
    text: "Craig Simpson's List Selection methodology: Step 1 — Get data cards for all candidate lists. Step 2 — Set cards side by side and compare source type (compiled vs response), universe size, available selects, average unit of sale. Step 3 — For response lists, check recency and source behavior. Step 4 — Check who else rents the list — if smart operators rent repeatedly, confidence is high. Step 5 — Get control copies of winners' mail pieces from InsideDirectMail.com. Step 6 — Find commonalities across all winners (payment terms, imagery, tone). Step 7 — Start your creative with their tested winning elements."
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"
  - id: "MET-DK-188"
    text: "Ken Roberts 17-Week Maximization methodology: Step 1 — Purchase arrives with stick letter + immediate upsell (credit to Halbert). Step 2 — Over 17 weeks, mail 11 different offers (books, DVDs, advanced courses, newsletters, seminars). Step 3 — Quarterly reactivation mailings after 17 weeks. Step 4 — Track which products each buyer purchased. Step 5 — Calculate lifetime value and use it to justify higher acquisition costs. Step 6 — Continuously develop new products to offer. Result: 700K courses sold, $200M+ revenue."
    source: "OMC DVD/07 — Craig Simpson"
  - id: "MET-DK-189"
    text: "Seasonality Tracking methodology: Step 1 — Track response rates at the individual list level by month/season. Step 2 — Identify when each list's audience is most receptive (farmers: off-season; consumers: January). Step 3 — Identify dead zones (harvest for farmers, holidays for consumers). Step 4 — Heavy-up mailing during peak responsiveness for each list. Step 5 — Zero mailing during dead zones. Step 6 — Also track buyer seasonality independently of list seasonality."
    source: "OMC DVD/07 — Craig Simpson (farming + Ken Roberts examples)"
  - id: "MET-DK-190"
    text: "Competitive Intelligence as Prospect methodology: Step 1 — Identify your top competitors. Step 2 — Become their prospect: sign up, request info, attend events. Step 3 — Document everything they send you over 90 days. Step 4 — Source their customer data (with awareness of sourcing bias). Step 5 — Observe their operations directly. Step 6 — Analyze their list rentals (who else rents the same lists). Step 7 — Read/watch what your shared prospects read/watch. Step 8 — Learn their tribal language and mirror it."
    source: "OMC CD/19 track 1 + CD/18 tracks 5-6 — Dan Kennedy"
  - id: "MET-DK-191"
    text: "Jeff Walker's Certification Program Launch methodology: Step 1 — Survey audience to measure demand (312 of 2,300 = proof). Step 2 — Announce limited spots with rigorous selection (130 apply for 50). Step 3 — Price with skin-in-the-game structure ($5K down + $20K from profits). Step 4 — At the live event, upsell platinum coaching ($10K waiving the $20K). Step 5 — Create assets inventory for each participant. Step 6 — Build social proof from selection process itself. Step 7 — Use geography proof to overcome location objections."
    source: "OMC CD/16 tracks 5-6, CD/17 tracks 1-4 — Jeff Walker"
  - id: "MET-DK-192"
    text: "Unconverted Lead Recovery methodology: Step 1 — Appointment no-sale: don't discard, enter follow-up. Step 2 — Handoff to different closer (tele-shark to supervisor). Step 3 — Unending follow-up cycles with varied messaging. Step 4 — Switch to different opportunity framing (blue shovel vs red shovel). Step 5 — Offer second-tier/downsell product. Step 6 — If still unconverted, switch identity (alter ego business mails same list). Step 7 — Loop-back-up mechanism: after downsell purchase, offer original product again."
    source: "OMC CD/19 tracks 4-8 — Dan Kennedy"
  - id: "MET-DK-193"
    text: "Multiple Identity List Exploitation methodology: Step 1 — Identify your most productive list segment. Step 2 — Create identity A (e.g., cowboy hat farmer guy) with format A (digest). Step 3 — Create identity B (e.g., housewife with five kids) with format B (letter) at different price point. Step 4 — Mail segment with identity A. Step 5 — Two weeks later, mail same segment with identity B. Step 6 — If possible, create identity C with format C. Step 7 — Rotate continuously through identities. Each pass extracts buyers the other identities missed."
    source: "OMC CD/19 tracks 6-7, DVD/07 — Dan Kennedy"
  - id: "MET-DK-194"
    text: "Market Saturation Response methodology: Step 1 — Monitor leading indicators: cost per lead, cost per sale, response percentages, steps to conversion. Step 2 — When gradual creep becomes apparent, begin economic restructuring (don't wait for the wall). Step 3 — When wall hits (costs skyrocket), pull back to highest-probability list segments. Step 4 — Retard media buys to best-performing geographies only. Step 5 — Create new economic models (accept higher CPA if LTV supports it). Step 6 — If economics can't work, find new soil (new list, new niche, new identity)."
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch + Think and Grow Rich TV examples)"
  - id: "MET-DK-195"
    text: "Direct Mail Format Rotation methodology: Step 1 — Develop multiple formats that work (postcard, envelope piece, digest, booklet). Step 2 — Test each format on the same list segment. Step 3 — Confirm minimal respondent overlap between formats. Step 4 — Mail format A to full segment. Step 5 — Mail format B to same segment 2-3 weeks later. Step 6 — Same message, different enough appearance to avoid 'numb' reaction. Step 7 — This doubles or triples effective use of your best list without list fatigue."
    source: "OMC DVD/07 — Dan Kennedy (Michael's dental + Ron Ipec examples)"
  - id: "MET-DK-196"
    text: "PLF Prelaunch Content Sequence: Video 1 — Set the hook for a story + present the opportunity + teach ABOUT the opportunity (not how). No selling. Video 2 — Show how people like them applied the opportunity to their lives. Video 3 — More details + 2/3 through, transition to 'I'm creating this program.' Video 4 — Sales video/letter. Each builds on the prior, BS detector relaxes as no selling occurs."
    source: "DVD08-JeffWalker"
  - id: "MET-DK-197"
    text: "PLF Certification Business Creation Method: 1) Identify massive deal flow you can't handle, 2) Ask 'how can I train talent AND make money doing it?', 3) Inventory assets (reputation, hyperresponsives, event skill, pent-up demand), 4) Assess dangers (brand dilution, legal, different market), 5) Two-step: internal launch of high-end event to hyperresponsives, then JV launch of home study to wider audience, 6) Cherry-pick initial students for success stories, 7) Use their success as proof for wider rollout."
    source: "DVD08-JeffWalker"
  - id: "MET-DK-198"
    text: "PLF Survey-to-Proof Method: 1) Survey your list asking 'would you hire me to do X?', 2) Follow with 'would you hire one of my trained people?', 3) Use percentage results as social proof in prelaunch ('74.2% said yes'), 4) Calculate implied demand ('228 clients waiting for you'), 5) Use math escalation ('I only sent to 2,000 — I have 70,000 more'), 6) Present your financial bet ('I'm taking an $800,000 gamble on you')."
    source: "DVD08-JeffWalker"
  - id: "MET-DK-199"
    text: "PLF Coaching Conversion at Live Event: 1) Teach intensely for 5 days, 2) At end say 'Monday is coming, you'll lose momentum,' 3) Offer coaching program, 4) Price it as savings: 'Not going to cost you money — $10K coaching WAIVES the $20K you owe from profits,' 5) Result: 37-45 of 50 attendees convert."
    source: "DVD08-JeffWalker"
  - id: "MET-DK-200"
    text: "Reverse Engineering Ideal Client Method: 1) If you have customers, identify who behaved and spent properly, reverse engineer their profile, 2) If starting from scratch, find successful competitors, access all their marketing material, 3) Read their copy for clues (married couple paragraph = target married people, scrap singles from lists), 4) Go where prospects gather and observe (OTB, seminars, Walmart, Neiman's), 5) Validate with focus groups, 6) Constantly refine from your own testing."
    source: "DVD10"
  - id: "MET-DK-201"
    text: "The Handoff Close System: 1) Salesperson takes their best shot, 2) Before letting prospect go, required to say 'I'm required to let you talk to my supervisor,' 3) Supervisor starts the entire process over from the beginning, 4) If supervisor can't close, pass to third person, 5) In teleshark operations: if Charlie can't close by 5th call, switch to Bob; if Bob can't close by 5th call, switch back to Charlie."
    source: "DVD09-DVD10"
  - id: "MET-DK-202"
    text: "Post-Event Non-Buyer Follow-Up System: 1) Remove buyers from event attendee list, 2) Mail all non-buyers a long sales letter within days, 3) Address the 5 reasons people don't buy right away, 4) Offer the same deal they could have gotten at the event, 5) Rarely breaks even on immediate sale but customer value is enormous. Never skip this — it worked every single city, every single time."
    source: "DVD09"
  - id: "MET-DK-203"
    text: "Drop-Down Sale with Loop-Back-Up: 1) Try to sell at full price ($3,400), 2) If no close, offer miniaturized version at lower price ($997), 3) If still no, drop again ($297), 4) Every drop-down includes full credit toward full price if they upgrade within a time period, 5) Optionally offer double credit for fast upgraders, 6) Never show the drop-down before trying full price, 7) Hand drop-down buyers to telesharks before non-buyers (they're better prospects)."
    source: "DVD09-DVD10"
  - id: "MET-DK-204"
    text: "Monday Night Bailout Tout Service Method (Dan Kennedy's example of disreputable but instructive opportunity economics): 1) Give picks to customers on Sunday, 2) Identify losers by Sunday night, 3) Call losers from different identity selling Monday night 'lock,' 4) Give half the Colts, half the Patriots, 5) Tuesday call the winners, sell them a 6-week package, 6) Pass losers to third identity, sell them again. Principle: same unconverted leads, multiple identities, split-test outcomes."
    source: "DVD09"
  - id: "MET-DK-205"
    text: "Professional Seminar Room Selling for High-Income Niches: 1) Use evenings (not full days) to reduce chair-side income loss, 2) If ego is a problem, provide anonymity/discretion, 3) Use disclosed discovery-day format if appropriate, 4) For drop-in days: set regular schedule (e.g. two Fridays a month), let prospects observe your operation, have lunch together, answer questions — 3-4 drop in almost every Friday for $30-45K sales."
    source: "DVD09-DVD10"

layers:
  L1_PHILOSOPHIES:
    - id: "FIL-DK-502"
      title: "Most Demos Are Rigged — And Should Be"
      content: "You never do a demo that you don't know the outcome of. Like the law rule — you never ask somebody a question you don't know the answer to. Most demos that you see are rigged. Sometimes a little, sometimes not so much, but they're rigged."
      source_file: "transcription_mp4_video_6.txt"
      context: "Phone demo, infomercial gel insole, firewalking all analyzed"

    - id: "FIL-DK-503"
      title: "Demos Can Be Illogical And Still Powerful"
      content: "These demos actually prove nothing about how this is going to work. They prove nothing, zero. Yet in people's minds, they absolutely prove how fantastic these products are. Demos can be illogical and yet extremely powerful."
      source_file: "transcription_mp4_video_6.txt"
      context: "Impact gel insole — hammer and car demos"

    - id: "FIL-DK-504"
      title: "Any Version of 'The Computer Says So' Is Gospel"
      content: "Any version of the computer says so is now accepted as gospel. That's how people drive up off-ramps because the GPS says. People will follow a machine into a dead-end crack house street rather than use their own eyes."
      source_file: "transcription_mp4_video_6.txt"
      context: "Scholes insole machine, cosmetics analyzers, GPS obedience"

    - id: "FIL-DK-505"
      title: "No Movement Rises Without Belief In A Devil"
      content: "No movement ever rises without belief in a devil. You need a devil. The excitement of the movement is proportionate to the tangibility and vividness of the devil."
      source_file: "transcription_mp4_video_9.txt"
      context: "Seven criteria for using enemies and villains"

    - id: "FIL-DK-506"
      title: "Boogie Man Under The Bed Is Universal"
      content: "100% of people as children had boogie men under the bed or in the closet. Someone coming to get them. And usually a parent fixed it. That's deep in there. It's just waiting to be hit with a sharp pointed stick and there it is again."
      source_file: "transcription_mp4_video_9.txt"
      context: "Universal childhood fear = root of villain psychology"

    - id: "FIL-DK-507"
      title: "Big Numbers In Isolation Override Context"
      content: "The minute people hear what feels to them to be a big number, they believe a thing is more real than if they hear a small number or no number at all. The number never really has to be in context."
      source_file: "transcription_mp4_video_8.txt"
      context: "Invisalign 2M, Proactiv #1 brand, UFO belief study"

    - id: "FIL-DK-508"
      title: "If Enough People Believe Something, It Must Be True"
      content: "816 of 1000 UFO believers stated as their number one reason: the sheer number of reports means there must be some truth to it. If stock prices are rising, 87% of active investors agreed they are very likely to continue rising."
      source_file: "transcription_mp4_video_8.txt"
      context: "Skeptic Magazine + Investors Business Daily surveys"

    - id: "FIL-DK-509"
      title: "90% of Marketing Defaults To Feature-Price-Offer"
      content: "All bad marketers, bad salespeople, bad advertisers default to product feature, benefit, price, offer, and some claim of comparative superiority. That's the least important thing we could ever do. All this other stuff moves a lot more merchandise."
      source_file: "transcription_mp4_video_9.txt"
      context: "Contrast with mind hijacking techniques"

  L2_MENTAL_MODELS:
    - id: "MM-DK-434"
      title: "Force Model (Mentalism Applied to Sales)"
      content: "Verbal communication (language narrows choices) + nonverbal communication (gestures plant thoughts) + harvesting (aggregate multiple partial successes to look like total success). You plant a thought in someone's mind by combining verbal and nonverbal forces."
      source_file: "transcription_mp4_video_7.txt"
      context: "Dave's mentalism demo — triangle/circle, 37, card force"

    - id: "MM-DK-435"
      title: "Proof By Process Or Device"
      content: "When you plug data into a machine and it lights up, spins, calculates — this flips switches in people's heads. The very fact that you have a process creates authority. People have been hard-conditioned to accept machine authority."
      source_file: "transcription_mp4_video_6.txt"
      context: "Scholes, cosmetics analyzers, biorhythm machines, Kreskin ESP tester"

    - id: "MM-DK-436"
      title: "Stretch Number Model"
      content: "A stretch number is a number that is accurate and factual about a certain thing and you stretch it over like a rubber band to apply to what it is that you do. Over 450 of the 500 richest people are 'real estate investors' — technically true, massively misleading."
      source_file: "transcription_mp4_video_8.txt"
      context: "Forbes 500 applied to any industry — real estate, stocks, collector cars"

    - id: "MM-DK-437"
      title: "Enemy/Villain Model (7 Criteria)"
      content: "1) Need a devil, 2) Excitement proportionate to vividness, 3) Must be tangible not abstract, 4) Tie multiple enemies into one, 5) One concentrated focus, 6) When things fail it's the devil's fault not yours, 7) Ideally a foreign invader not insider."
      source_file: "transcription_mp4_video_9.txt"
      context: "Trump, Walmart as retailer villain, Obama as healthcare villain"

    - id: "MM-DK-438"
      title: "Big Idea Model"
      content: "When there's a big driving idea, it gets easier to sell stuff. Music rooms → pianos. Man caves → furniture/electronics. Home offices → equipment. Smartphones → everyone buys. The big idea creates automatic purchasing demand."
      source_file: "transcription_mp4_video_9.txt"
      context: "Ogilvy's 'what's the big idea?' question"

    - id: "MM-DK-439"
      title: "Houdini Metaphor Effect"
      content: "Houdini was popular not just as escape artist but as METAPHOR. People felt trapped and couldn't escape their circumstances. He symbolized escape. The demo became more powerful because of what it represented beyond itself."
      source_file: "transcription_mp4_video_8.txt"
      context: "Dave's commentary on Houdini clip symbolism"

  L3_HEURISTICS:
    - id: "HEUR-DK-626"
      title: "Never Do A Demo You Don't Control The Outcome Of"
      content: "You never do a demo that you don't know the outcome of. Control it. If you can rig it, rig it. If you don't have to rig it (because all results are bad like inbound calls), then you don't need to."
      source_file: "transcription_mp4_video_6.txt"
      context: "Rigged phone demo, inbound call mystery shops"

    - id: "HEUR-DK-627"
      title: "Some Demos Don't Need Rigging"
      content: "Mystery shop inbound calls at any business — they're all awful. You don't have to rig that demo because they all suck. The smart ass who says 'not mine' is always the worst. You can do that demo all day with any company."
      source_file: "transcription_mp4_video_6.txt"
      context: "Jay Abraham's chiropractor mystery shop demo"

    - id: "HEUR-DK-628"
      title: "Make The Demo Easy, Not Hard"
      content: "Houdini says it's easier to do the straight jacket escape hanging upside down from a crane because they can't see what you're doing. When you do your demo, think: how can I make it easy, not hard?"
      source_file: "transcription_mp4_video_6.txt"
      context: "Houdini's brother vs Houdini — same trick, better staging"

    - id: "HEUR-DK-629"
      title: "Label It More Difficult (Even If It's Easier)"
      content: "When I teach psychic selling — what you LABEL stuff makes a big difference. I say 'this is going to be even more difficult.' It's actually not more difficult. It's actually easier. But the label elevates the perceived achievement."
      source_file: "transcription_mp4_video_7.txt"
      context: "37 vs 86 number force — second is 'harder' but actually more controlled"

    - id: "HEUR-DK-630"
      title: "Harvesting Technique"
      content: "Ask for 68, then separately ask for 86, then have everyone keep hands up. It LOOKS like almost 100% got it right. This is called harvesting — aggregate multiple partial successes to create impression of total success."
      source_file: "transcription_mp4_video_7.txt"
      context: "Mentalism harvesting applied to proof/testimonials"

    - id: "HEUR-DK-631"
      title: "Use The Stat That's Most Favorable"
      content: "Arizona State: '85% of graduates are recruited within 90 days.' Recruited = got a job interview. They use this because the hired stat is probably low. Always use the statistical framing that sounds biggest."
      source_file: "transcription_mp4_video_8.txt"
      context: "Weasel language in academic/marketing statistics"

    - id: "HEUR-DK-632"
      title: "If 5-6 Big Numbers Boom-Boom-Boom, They're Gone"
      content: "If they hear like five or six big numbers boom boom boom boom they're gone. They just assume you're it. Stack multiple impressive-sounding numbers in sequence for maximum persuasive impact."
      source_file: "transcription_mp4_video_8.txt"
      context: "Proactiv '#1 selling' + Invisalign '2 million' pattern"

    - id: "HEUR-DK-633"
      title: "Declare War On The Establishment From Day One"
      content: "Starting in 1978 after I quickly determined the whole thing was run by idiots, I crapped on the establishment. There was already a bunch of people there thinking 'this doesn't make sense.' They were just waiting for someone to validate it."
      source_file: "transcription_mp4_video_9.txt"
      context: "NSA, chiropractic, traditional advertising — same playbook"

    - id: "HEUR-DK-634"
      title: "Get-Out-Of-Jail-Free Card"
      content: "When you have a devil, anything you do that doesn't work is not your fault — it's the fault of the devil who won that battle. Which makes it all the more important for your people to band together against this evil."
      source_file: "transcription_mp4_video_9.txt"
      context: "Enemy/villain criterion #6"

    - id: "HEUR-DK-635"
      title: "Foreign Invader > Inside Enemy"
      content: "The devil ideally is an invader, a foreigner from outside, not from inside. Walmart is most effective as villain when opening NEW store — invading an area. Obama is invading healthcare with external government force."
      source_file: "transcription_mp4_video_9.txt"
      context: "Enemy/villain criterion #7"

  L4_FRAMEWORKS:
    - id: "FW-DK-370"
      title: "Demo Construction Framework"
      content: "1) Control the outcome (rig if needed), 2) Make the demo easy not hard (Houdini principle), 3) Use familiar analogy (glove = everyone's tried one), 4) Spotlight similarities with your claim, 5) Obscure differences from reality, 6) Telegraph the story you want them to believe, 7) Match emotional preexisting beliefs, 8) Make it hard to argue against."
      source_file: "transcription_mp4_video_6.txt"
      context: "Synthesis of OJ, Houdini, infomercial demos"

    - id: "FW-DK-371"
      title: "Proof By Numbers Framework"
      content: "Three types: 1) SOCIAL PROOF NUMBERS — big numbers in isolation (2M Invisalign), 2) TREND NUMBERS — what's rising will continue (87% investor belief), 3) STRETCH NUMBERS — factual number rubber-banded to your context (Forbes 500 = 'real estate investors'). Stack 5-6 boom-boom-boom for maximum effect."
      source_file: "transcription_mp4_video_8.txt"
      context: "Complete proof-by-numbers taxonomy"

    - id: "FW-DK-372"
      title: "Enemy/Villain Creation Framework (7 Points)"
      content: "1) Every movement needs a devil, 2) Excitement proportionate to devil's vividness, 3) Must be tangible not abstract, 4) Consolidate multiple enemies into one, 5) Concentrate on one main villain, 6) Failures become villain's fault (GOOJFC), 7) Ideal villain is foreign invader not insider."
      source_file: "transcription_mp4_video_9.txt"
      context: "7 criteria for villains — Trump, Walmart, Obama examples"

    - id: "FW-DK-373"
      title: "Big Idea Sales Engine"
      content: "Create the big idea that drives automatic purchasing: 1) Identify or create a cultural norm ('you need X'), 2) Make it feel mandatory ('everyone has one'), 3) Once norm is accepted, you only compete on brand/model, 4) Examples: music rooms→pianos, man caves→gear, home offices→equipment, websites→services, smartphones→apps."
      source_file: "transcription_mp4_video_9.txt"
      context: "Ogilvy's big idea applied at industry level"

    - id: "FW-DK-374"
      title: "Mentalism Force Framework (Sales Application)"
      content: "1) Use VERBAL force — language that narrows choices while appearing open, 2) Use NONVERBAL force — gestures that plant the desired thought, 3) Eliminate options through stated 'rules', 4) Use embedded examples that contain the target, 5) HARVEST — ask for multiple answers, aggregate raised hands, 6) LABEL difficulty upward even when easier."
      source_file: "transcription_mp4_video_7.txt"
      context: "Triangle/circle, 37, 86, card force demonstrations"

  L5_METHODOLOGIES:
    - id: "MET-DK-263"
      title: "Rigged Demo Methodology"
      content: "Step 1: Identify the claim you need to prove. Step 2: Design a visual demo using familiar analogy. Step 3: Determine if demo can be left unrigged (if all natural results prove your point, don't rig). Step 4: If rigging needed — use pre-recorded calls, extra power sources, treated materials, or controlled selection. Step 5: Make it EASY to execute (Houdini: distance hides mechanics). Step 6: Match demo to preexisting audience beliefs. Step 7: Use memorable command line repeated 3x ('If it doesn't fit, you must acquit')."
      source_file: "transcription_mp4_video_6.txt"
      context: "Phone demos, infomercials, OJ, Houdini synthesis"

    - id: "MET-DK-264"
      title: "Proof By Process/Device Implementation"
      content: "Step 1: Create or acquire a diagnostic device/process. Step 2: Have customer input data (foot size, skin type, investment profile). Step 3: Machine produces result with lights, calculations, visual output. Step 4: Result points to your product/service as the recommendation. Step 5: 'The computer says so' = accepted as authoritative, more than a human recommendation. Step 6: Charge premium — Scholes insoles sell 30% more with the machine."
      source_file: "transcription_mp4_video_6.txt"
      context: "Scholes, cosmetics, financial advisors, biorhythms"

    - id: "MET-DK-265"
      title: "Declare War And Build Movement"
      content: "Step 1: Identify the establishment orthodoxy in your field. Step 2: Recognize the significant percentage already thinking 'this doesn't make sense.' Step 3: Be the first to say publicly what they're thinking privately. Step 4: Create a vivid, tangible devil (ideally foreign invader). Step 5: Position yourself as the anti-establishment crusader. Step 6: When things fail, blame the devil (GOOJFC). Step 7: Build movement by being the parent who 'gets the boogie man' for them."
      source_file: "transcription_mp4_video_9.txt"
      context: "DK's career playbook — NSA, chiropractic, advertising, Trump analysis"


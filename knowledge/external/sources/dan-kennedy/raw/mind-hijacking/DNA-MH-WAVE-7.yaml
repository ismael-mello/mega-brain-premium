# DNA EXTRACTION — Dan Kennedy: Mind Hijacking
# Wave 7 (Files: video_27, video_28, video_29, video_30, video_31)
# Created: 2026-03-16
# Themes: Overarching Objectives Shortlist, Creating Problems, Stacking Order, Cold Reading, Answering Real Objections, Self-Disqualification

layers:
  L1_PHILOSOPHIES:
    - id: "FIL-DK-540"
      title: "Every Market Needs An Overarching Psyche Shortlist"
      content: "Most marketers skip having clarity on the 3-5 overarching objectives they must achieve with their targets' psyche BEFORE any specific pitch can work. The shortlist is about where people must be mentally and emotionally to respond. Everything must support that shortlist."
      source_file: "transcription_mp4_video_27.txt"
      context: "Financial services example: need active investors, short-term thinking, fear/anxiety, temptation with new products"

    - id: "FIL-DK-541"
      title: "No Law Requires A Problem To Exist Before A Solution Is Sold"
      content: "Lasker said 'there is no law that requires a problem to exist before a solution is created for it and sold to cure it.' When you write copy, you need not restrict yourself to preexisting problems. Most of the GDP depends on selling people things for problems they didn't know they had."
      source_file: "transcription_mp4_video_27.txt"
      context: "Listerine invented bad breath 1922, Athlete's Foot invented 1930, body odor created 1928 by ad agencies"

    - id: "FIL-DK-542"
      title: "Importance Should Be Disproportionate To Actual Problem"
      content: "There's no law that your use of copy needs to be proportional or reasonable in perspective to the actual impact of the problem. Whatever you're doing should be magnified to be THE #1 destroyer/killer/evil threat or opportunity in their life at this moment. 70 pages about occasional sinus issues is the right approach."
      source_file: "transcription_mp4_video_27.txt"
      context: "Sinus pill mag-a-log: 70 pages making a trivial problem seem catastrophic — immune system, cancer, erection problems all linked to sinuses"

    - id: "FIL-DK-543"
      title: "Never Write To A Length — Write To Maximum Effectiveness"
      content: "Never start with a page count or time limit. Write to maximum effectiveness first. No client would ask for 70 pages about a sinus pill or a 52-minute lottery VSL — but that's what produces results. The person most susceptible is OK with almost any length."
      source_file: "transcription_mp4_video_28.txt"
      context: "Wind Trillions VSL: client wanted a 'better landing page,' got a 52-minute VSL. 32 minutes of cold read, 20 minutes of product."

    - id: "FIL-DK-544"
      title: "People Express Resistance Differently Than Their Real Resistance"
      content: "More often than not, people express their objections differently than what their resistance really is. A 72-year-old man saying 'I wasn't planning on spending that much' isn't objecting to price — he's asking for permission to spend money on himself instead of his grandkids."
      source_file: "transcription_mp4_video_29.txt"
      context: "Miracle Ear example: salesman answers price objection when real objection is guilt about spending on himself"

    - id: "FIL-DK-545"
      title: "People Disqualify Themselves More Than They Reject Propositions"
      content: "Half the selling story is about THEM, not the proposition. People accept the premise but then disqualify themselves: 'Yeah, but I have a shelf full of courses I never used.' Most marketers defend the proposition while the prospect has already moved past that to arguing with themselves about themselves."
      source_file: "transcription_mp4_video_29.txt"
      context: "Magnetic Marketing speech: must address 'this time will be different' because people's default disqualification is 'I never do anything with what I buy'"

    - id: "FIL-DK-546"
      title: "Everybody's Default System Is No Action And No Purchase"
      content: "Everybody's system for buying is not to buy. Everybody's system for action is procrastination. You walk into a store hoping to find something, the clerk says 'can I help you' and you say 'no thanks, just looking.' This is the ingrained system — instant rejection happens easily."
      source_file: "transcription_mp4_video_29.txt"
      context: "Why retail scripts like 'can I help you' fail 9 out of 10 times — must design better opening scripts"

    - id: "FIL-DK-547"
      title: "Self-Interest Drives All Human Action"
      content: "Almost everybody, almost all the time is actually acting out of self-interest. If you clean the kitchen as a married guy, you didn't do it to be nice — you did it to avoid being bitched at, to buy golf points, or to have sex. Even charity has significant self-interest components."
      source_file: "transcription_mp4_video_31.txt"
      context: "Arrow to the Heart hijack — everything boils down to self-interest, self-esteem, and gender-specific motivations"

    - id: "FIL-DK-548"
      title: "Marketing To Both Genders Is Harder Than Splitting Them"
      content: "Messages aimed at both genders are more difficult to make work than splitting genders and talking to them differently. Glen Turner and Tolleson companies would separate men and women at opportunity meetings to talk differently because you can't be as blunt with either when both are present."
      source_file: "transcription_mp4_video_31.txt"
      context: "Men hardwired for conquest/gain, women hardwired for security/safety — different leverage points"

  L2_MENTAL_MODELS:
    - id: "MM-DK-472"
      title: "The Shortlist Model — What They Must And Must Not Think"
      content: "For every market, create two lists: (1) What MUST we have them think? (2) What CAN'T we have them think? Everything in your marketing must support these lists. Christianity doesn't want positive thoughts about reincarnation. The fire alarm company needs people to think 'tonight could be the night.'"
      source_file: "transcription_mp4_video_27.txt"
      context: "Orthodontist needs patients to think delay makes it worse/more expensive. Two-column psyche management."

    - id: "MM-DK-473"
      title: "Problem Creation vs Problem Solving Model"
      content: "You are not limited to selling solutions for existing problems. You can create the problem itself. Listerine created bad breath (1922: $0→$5M ad spend, $4M profit). Athlete's Foot invented by a copywriter (1930). Body odor created by ad agencies (1928). None came from the medical world."
      source_file: "transcription_mp4_video_27.txt"
      context: "GDP would be 3% if people only bought what they already knew they needed — we all make our living creating awareness of problems"

    - id: "MM-DK-474"
      title: "The Dust Mite Magnification Model"
      content: "Take something invisible/insignificant, magnify it 5 million times until it looks like a giant cockroach, then show it next to a baby on a bed. The vacuum cleaner demo: empty clear canister fills with horrifying debris from a mattress. Transforms the invisible into the terrifying."
      source_file: "transcription_mp4_video_27.txt"
      context: "Also used for sinus problems: '10,000 biological invaders enter your nose every day' with magnified images"

    - id: "MM-DK-475"
      title: "Dark-To-Light Stacking Model"
      content: "In absence of any other formula, stack copy: dark item → embellishment → even darker item → darkest item → light at end of tunnel → light → personal positive benefits. This creates emotional trajectory from fear to hope to desire."
      source_file: "transcription_mp4_video_28.txt"
      context: "Trump stacks border items identically every speech: pouring across → drug dealers/rapists → no borders no country → build wall → audience participation"

    - id: "MM-DK-476"
      title: "Cold Reading As Copywriting Foundation"
      content: "Cold reading scripts from psychics translate directly into copy. Fail-safe scripts play both sides of the coin: 'You are usually a person of strong character yet at times...' The reader gloms onto whichever side is right, ignores the wrong side. 32 of 52 minutes of the Wind Trillions VSL is cold read copy."
      source_file: "transcription_mp4_video_28.txt"
      context: "Barnum statements: everyone agrees, builds rapport. 'I believe you are the kind of person who secretly dreams of a big windfall' — safe cold read for lottery site visitors"

    - id: "MM-DK-477"
      title: "The Real Objection Diagnosis Model"
      content: "If a salesperson is really good at handling price objections, they'll make everything into a price objection that isn't one. If all you've got is a hammer, every problem is a nail. Must diagnose the TRUE objection, not the stated one, and answer ALL possible real objections in copy."
      source_file: "transcription_mp4_video_29.txt"
      context: "Miracle Ear transcript analysis — salesman justifies price when man really wants permission to spend on himself"

    - id: "MM-DK-478"
      title: "Self-Disqualification vs Proposition Rejection"
      content: "People go through two stages: (1) Accept/reject the proposition itself, (2) Qualify/disqualify themselves. Most marketers only defend stage 1 while prospects are stuck at stage 2. 'Yeah it works, but not for me because...' The 11 agreements model: first 3-4 easy, then self-disqualification begins."
      source_file: "transcription_mp4_video_29.txt"
      context: "Dentists: 'I can't do math so marketing won't work for me.' Courses: 'I have a shelf full of unopened courses.'"

    - id: "MM-DK-479"
      title: "The Reverse Reality Model"
      content: "When something is too familiar, too scary, too incredible, too demanding, or too complicated, you must change the reality of what it is. Dig a deep hole of alternate reality in lead generation, only climb out when they've raised their hand. Get-rich-in-real-estate becomes 'finder's fees for looking things up on a computer.'"
      source_file: "transcription_mp4_video_29.txt"
      context: "8-9 year control: real estate investing disguised as 'part-time finders needed.' Also works with dead real estate investor lists in 2008 crash."

    - id: "MM-DK-480"
      title: "The Lust For One Thing Model"
      content: "Preexisting belief: 'If I only had X, everything would be different.' This creates lust for a one-thing answer. Even smart people fall for it — Gary Keller's 'The One Thing,' Viagra, 'giving account/wealth account.' If that one magic thing isn't in your offer, people are unhappy with the whole deal."
      source_file: "transcription_mp4_video_31.txt"
      context: "Orthodontist: 'If your kid has a perfect smile, everything else falls into place.' Swiss cell therapy: one pill diagnoses and fixes everything. Geritol = same pitch since Lydia Pinkham 1900s."

    - id: "MM-DK-481"
      title: "Gender-Split Motivation Model"
      content: "Men: hardwired for conquest/victory/gain. Go to stores to buy (conquer), tell conquer stories at end of day, brag about how much they spent. Women: hardwired for security/safety, more internal, worry about impending tragedy, brag about how little they spent. Different leverage points for each."
      source_file: "transcription_mp4_video_31.txt"
      context: "Men more susceptible to gain messaging, women more susceptible to loss/safety messaging. Both present but different primary leverage."

    - id: "MM-DK-482"
      title: "The FAQ Laziness Problem"
      content: "Clumping all objections into FAQ at the end is how lazy copywriters handle objections. In real selling, objections get raised along the way as part of the conversation. The customer doesn't hold seven objections until the end. Selling in media should mirror real human selling dynamics."
      source_file: "transcription_mp4_video_29.txt"
      context: "Objections should be raised and answered throughout copy, not clumped at the end"

  L3_HEURISTICS:
    - id: "HEUR-DK-688"
      title: "Fear-To-Positive Ratio: 2/3 Fear, 1/3 Positive"
      content: "Clock any financial news show: the ratio is consistently one-third about things going up, two-thirds about things going down. This ratio of fear to optimism keeps people active and anxious, which is exactly what drives action."
      source_file: "transcription_mp4_video_27.txt"
      context: "Cramer show — consistent ratio across episodes. Fear of loss drives more phone calls than gradual upswing trends."

    - id: "HEUR-DK-689"
      title: "Inventory Load = Product Does Nothing Perceptible"
      content: "In alternative health: if they're doing inventory load (best deal $206, good deal $126) instead of continuity/auto-ship, the product doesn't do anything you'll feel. They know you won't reorder. Get the money while you can."
      source_file: "transcription_mp4_video_27.txt"
      context: "Sinus pill sells $206 load because 'stuff doesn't do anything' — tip-off about product efficacy"

    - id: "HEUR-DK-690"
      title: "Play Your Ace First Unless You Have A Reason Not To"
      content: "Most of the time, lead with your strongest, scariest, most timely item first. 'The new president wipes out the #1 retirement benefit' beats 'how to make your money worth more' because it's scarier AND timely AND plays the heirs emotional card."
      source_file: "transcription_mp4_video_28.txt"
      context: "Financial newsletter stacking: count how many emotional buttons each item pushes to determine which leads"

    - id: "HEUR-DK-691"
      title: "Micro-Analyze Button Count To Pick Lead Item"
      content: "When choosing which of multiple items leads, count the emotional buttons each pushes. 'Congress makes heirs pay for already-taxed retirement savings' wins because it has: heirs trigger + anger + already-taxed resentment + Congress hatred (22% approval, below dead Hitler at 24%)."
      source_file: "transcription_mp4_video_28.txt"
      context: "Four competing items for financial newsletter page 17 — C wins by button count"

    - id: "HEUR-DK-692"
      title: "Lock Your Stack, Tweak The Flesh"
      content: "Once you find the right stacking order for repeated communications, lock in the skeleton and keep it. Change the flesh and costume on the bones, but the skeleton stays the same. Not random, not accidental. Trump tweaks copy but hasn't changed the stack."
      source_file: "transcription_mp4_video_28.txt"
      context: "Trump's 3 stacks (border, trade, infrastructure) — same order every speech, only details change"

    - id: "HEUR-DK-693"
      title: "Cold Read Safe Bet: Match Context To Statement"
      content: "On a site called 'Win Trillions,' saying 'I believe you secretly dream of a big windfall of cash' requires zero psychic ability. Match your cold read to the context they're already in. The safer the cold read, the more powerful the rapport."
      source_file: "transcription_mp4_video_28.txt"
      context: "Travel giveaways are most popular prizes — 'you long for freedom, adventure, world travel' is safe for lottery audience"

    - id: "HEUR-DK-694"
      title: "Add Permission Slip For Guilt-Laden Desires"
      content: "After cold-reading their desire, immediately make it okay: 'but probably also the ability to help others you can't afford to help now.' Football players buy mom a house first. Give people moral cover for wanting money/luxury/status."
      source_file: "transcription_mp4_video_28.txt"
      context: "Wind Trillions: 'You are not a freeloader. You've worked hard. You've paid your dues.' Makes it okay to want to win lottery."

    - id: "HEUR-DK-695"
      title: "Explained Data Mining Beats Unexplained Creepiness"
      content: "When you know too much about someone, explain it: 'We do a lot of data mining to find those most deserving.' Translation: 'we find highly susceptible people.' But don't say THAT — wrap data mining in a benevolent frame. Too much transparency is as bad as too little."
      source_file: "transcription_mp4_video_28.txt"
      context: "Wind Trillions copy: 'we never share information with anybody' — calms the 'how do they know' fear"

    - id: "HEUR-DK-696"
      title: "Reverse Reality Control Can Beat Dead Lists"
      content: "The finder's fee mail piece (reverse reality of get-rich-in-real-estate) killed with dead real estate investor lists during 2008 crash when all RE gurus folded. 8-9 year control because it eliminates too-familiar, too-scary, been-there-done-that objections in one move."
      source_file: "transcription_mp4_video_29.txt"
      context: "Also works as self-mailer: 'How to earn $3K-$10K in one afternoon finding houses hidden in plain sight'"

    - id: "HEUR-DK-697"
      title: "No Reveal Until They've Raised Their Hand"
      content: "In reverse reality lead gen, maintain the alternate reality through the ENTIRE lead gen piece. No reveal on page 1, 2, 3, or 4. Start climbing out of the hole ONLY in the full presentation they've requested. Willingness to dig a deep hole is essential."
      source_file: "transcription_mp4_video_29.txt"
      context: "Check mailer, self-mailer, 'Big Money in Big Chunks' — none reveal it's real estate until the video/website"

    - id: "HEUR-DK-698"
      title: "Four Magic Words: 'No Matter What Your...'"
      content: "'No matter what your circumstances/looks/age/history' is the single bridge phrase to stopping self-disqualification. Without this in the ad for a seduction course, readership would be much less because men immediately go 'I'm 68 and ugly.'"
      source_file: "transcription_mp4_video_29.txt"
      context: "Ross Jeffries ad: 'work for you no matter what your looks or age' — addresses main self-disqualification instantly"

    - id: "HEUR-DK-699"
      title: "Same Reverse Reality Headline Wins Across All Audiences"
      content: "'How would you like to make money in big chunks fast' won with opportunity seekers, Investors Business Daily subscribers, AND dentists. Every time Kennedy thinks 'this crowd has to be saner,' he's proven wrong. The same emotional triggers work across sophistication levels."
      source_file: "transcription_mp4_video_29.txt"
      context: "Tested ~20 headlines, this 'unsophisticated' one beat them all across every list including professional/affluent"

    - id: "HEUR-DK-700"
      title: "Everything Boils Down To Four Things"
      content: "All persuasion ultimately resolves to: (1) Self-interest, (2) Self-esteem, (3) Gender-specific male motivations (conquest, victory, credit for selection), (4) Gender-specific female motivations (emotional health, security, fear of tragedy)."
      source_file: "transcription_mp4_video_31.txt"
      context: "Arrow to the Heart hijack — orthodontist example broken into male vs female motivations"

    - id: "HEUR-DK-701"
      title: "Men Brag About Spending More, Women About Spending Less"
      content: "Men: 'Got these boots, $1,800, Charlie Onehorse.' Women: 'Got these shoes at Kohl's with a coupon and 20 Kohl's dollars back, they paid ME $2.30.' Same purchase, completely different status story. This difference must inform your copy for each gender."
      source_file: "transcription_mp4_video_31.txt"
      context: "Men want credit for the selection (conquest), women want credit for the deal (safety/security)"

    - id: "HEUR-DK-702"
      title: "Easy To Scare Her, Hard To Scare Him About Kids"
      content: "To convince a father his kid might commit suicide from Facebook bullying: very hard. 'My kid's tougher than that.' To convince the mother: easy. Women are much more susceptible to impending tragedy narratives than men."
      source_file: "transcription_mp4_video_31.txt"
      context: "Orthodontist marketing: different conversation about risks and outcomes per parent gender"

  L4_FRAMEWORKS:
    - id: "FW-DK-398"
      title: "Overarching Objectives Shortlist Framework"
      content: "For every market, build a shortlist of 3-5 overarching psyche objectives that MUST be achieved before any pitch works. Two columns: (1) What must they think (2) What must they NOT think. Then verify every piece of copy supports the shortlist. Financial services example: (a) be active investor, (b) act on short-term info, (c) feel fear/anxiety, (d) be tempted by new products."
      source_file: "transcription_mp4_video_27.txt"
      context: "Master list on cheat sheet card — most marketers don't even have this stage"

    - id: "FW-DK-399"
      title: "Problem Magnification Framework"
      content: "Step 1: Take a minor/non-existent problem. Step 2: Connect it to major consequences (immune system, cancer, relationships). Step 3: Show terrifying visuals (magnified dust mites, biological invaders). Step 4: Create urgency ('sneaks up on you'). Step 5: Present your solution as the only escape. Product: sinus pill. Treatment: 70 pages of catastrophizing."
      source_file: "transcription_mp4_video_27.txt"
      context: "Also: mattress dust mites, Listerine bad breath, Athlete's Foot — all invented problems sold as life-threatening"

    - id: "FW-DK-400"
      title: "Copy Stacking Framework (Shuffle Deck Method)"
      content: "Process: (1) Write every element on a single sheet — headline, paragraph, subhead, each on its own page. (2) Shuffle and reorder repeatedly until raw copy is in optimal sequence. (3) Stitch together, bridge, and finish. Order of presentation matters as much as content. The order question is at least as important as what you choose to say."
      source_file: "transcription_mp4_video_27.txt"
      context: "Kennedy's personal copy ordering process — physical shuffling of individual elements"

    - id: "FW-DK-401"
      title: "Dark-Light Stacking Formula"
      content: "Default stacking when no other formula applies: (1) Dark item, (2) Embellishment, (3) Even darker item, (4) Darkest item, (5) Light at end of tunnel, (6) More light, (7) Personal positive benefits. Creates emotional arc from fear through despair to hope to desire."
      source_file: "transcription_mp4_video_28.txt"
      context: "Blue star formula — Trump uses this exact pattern in every speech for border, trade, and infrastructure topics"

    - id: "FW-DK-402"
      title: "Cold Read Copy Framework"
      content: "Structure: (1) Barnum statements that everyone agrees with, (2) Fail-safe statements playing both sides of the coin, (3) Safe cold reads matched to known context, (4) Permission slips for guilt-laden desires, (5) Explained data mining, (6) More cold read validation, (7) Then product pitch. Wind Trillions: 32 minutes cold read → 20 minutes product. The VSL IS the psychic sitting across from you."
      source_file: "transcription_mp4_video_28.txt"
      context: "Scripts from actual psychic cold read manuals translated directly into sales copy"

    - id: "FW-DK-403"
      title: "Complete Objection Handling Framework For Copy"
      content: "Step 1: List ALL stated objections in your market. Step 2: For each, determine possible TRUE meanings. Step 3: Write answers to ALL possible real objections (not just stated ones). Step 4: Distribute objection answers throughout copy (not clumped in FAQ). Step 5: Place them where they'd naturally arise in a human conversation."
      source_file: "transcription_mp4_video_29.txt"
      context: "Miracle Ear transcript analysis: stated objection ≠ real objection — must answer BOTH"

    - id: "FW-DK-404"
      title: "Anti-Self-Disqualification Framework"
      content: "Step 1: Identify HOW prospects disqualify themselves ('I can't write,' 'I never do anything with courses,' 'I'm too old'). Step 2: Address it directly in copy — don't hide from it. Step 3: Use 'no matter what' bridge phrases. Step 4: Explain why 'this time is different' with specific reasons. Step 5: Make it easy/simple/fill-in-the-blank so no skill is required."
      source_file: "transcription_mp4_video_29.txt"
      context: "Magnetic Marketing speech: 'fill-in-the-blank letters — all you do is put your business name in the right place'"

    - id: "FW-DK-405"
      title: "Reverse Reality Lead Generation Framework"
      content: "When the real thing is too familiar/scary/demanding/complicated: (1) Create completely alternate description. (2) Maintain alternate reality through ALL lead gen materials. (3) No reveal until requested presentation. (4) Be willing to dig a very deep hole. (5) Climb out gradually in the conversion piece. Tests show this approach works even with lists who should know better (dentists, IBD subscribers)."
      source_file: "transcription_mp4_video_29.txt"
      context: "Real estate → 'finder's fees.' 8-9 year control. Also worked in 2008 crash on dead RE investor lists."

    - id: "FW-DK-406"
      title: "The One Thing Positioning Framework"
      content: "Structure: (1) Find or create a single magic element in your offer. (2) Position it as the solution to everything. (3) Make all negatives go away because of this one thing. (4) Make all positives occur because of this one thing. (5) Make it simple and easy. Orthodontist: 'perfect smile fixes everything.' Swiss cell therapy: 'one pill has intuitive knowledge of what ailment to address.'"
      source_file: "transcription_mp4_video_31.txt"
      context: "Same pitch from Lydia Pinkham (1900s) → Geritol → Cellergy (2016). People want ONE thing, simple and magical."

    - id: "FW-DK-407"
      title: "Arrow To The Heart — Four Quadrant Analysis"
      content: "For any offer, map the appeal across 4 quadrants: (1) Self-interest hooks (what's in it for me), (2) Self-esteem hooks (how will I feel about myself), (3) Male-specific hooks (conquest, credit, bragging rights, status spending), (4) Female-specific hooks (safety, emotional health, impending tragedy prevention, deal bragging). Different weight per quadrant based on audience gender split."
      source_file: "transcription_mp4_video_31.txt"
      context: "Orthodontist broken into male parent vs female parent motivations — completely different conversations"

  L5_METHODOLOGIES:
    - id: "MET-DK-277"
      title: "Barnum Statement Copy Integration Method"
      content: "Step 1: Collect universal Barnum statements ('You have a need for people to like you,' 'You have unused capability,' 'You tend to be critical of yourself'). Step 2: Insert into copy early as rapport builders. Step 3: Extend with both-sides language ('usually strong character... yet at times'). Step 4: Let reader self-select which side is true. Step 5: Follow with proposition that connects to the accepted statement."
      source_file: "transcription_mp4_video_28.txt"
      context: "12 classic Barnum statements plus reverse Barnums — Foyer Effect experiment showed 80-85% accuracy even with OPPOSITE statements"

    - id: "MET-DK-278"
      title: "Wind Trillions Cold Read Copy Method"
      content: "Step 1: Open with safe cold read matched to context ('you secretly dream of windfall'). Step 2: Extend with travel/freedom desires (most popular giveaway category). Step 3: Add permission/respectability ('not a freeloader, worked hard, paid dues'). Step 4: Explain data mining benevolently. Step 5: Layer more cold reads ('kind and generous almost to a fault'). Step 6: Use JK Rowling familiarity. Step 7: At 60% mark, transition to product features. Total: 32 min cold read + 20 min product = 52 min VSL."
      source_file: "transcription_mp4_video_28.txt"
      context: "Actual production method for WinTrillions.com VSL — built from cold read script swipe files"

    - id: "MET-DK-279"
      title: "Reverse Reality Campaign Build Method"
      content: "Step 1: Identify why real thing will be instantly rejected (too familiar/scary/demanding). Step 2: Create completely different framing ('finder's fees' not 'real estate investing'). Step 3: Build lead gen materials with ZERO reveal — all pages maintain alternate reality. Step 4: For different segments, vary the surface (check mailer vs self-mailer vs display ad) but keep the reverse reality. Step 5: Only reveal truth in conversion piece (video/webinar/appointment). Step 6: Test across supposedly different sophistication levels — they usually respond the same."
      source_file: "transcription_mp4_video_29.txt"
      context: "Three versions shown: personalized check mailer, self-mailer, magazine ad — all same reverse reality, all 8-9 year controls"

    - id: "MET-DK-280"
      title: "Self-Disqualification Inoculation Method"
      content: "Step 1: Identify the #1 way your prospects disqualify themselves (bought courses never used, can't write, too old, tried before). Step 2: Raise it yourself before they do — don't hide from it. Step 3: Acknowledge it as universal ('we've all done it'). Step 4: Explain specifically why this time is different ('fill-in-the-blank, don't have to think'). Step 5: Use 'no matter what your [circumstances]' as bridge. Step 6: Provide social proof from similar self-doubters who succeeded."
      source_file: "transcription_mp4_video_29.txt"
      context: "Magnetic Marketing speech: 'you've bought courses and never opened the shrink wrap' — raised proactively, then shows why this is different"

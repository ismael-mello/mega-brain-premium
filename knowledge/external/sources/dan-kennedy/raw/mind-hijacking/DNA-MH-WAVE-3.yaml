# DNA EXTRACTION — Dan Kennedy: Mind Hijacking
# Wave 3 (Files: video_10, video_11, video_12[skip-dup], video_13)
# Created: 2026-03-16
# Themes: Threshold Resistance, Forced Choice, Comparative Choice, Mouse Trapping, Greed, New/Improved Cycle

layers:
  L1_PHILOSOPHIES:
    - id: "FIL-DK-510"
      title: "We Greatly Underestimate Threshold Height"
      content: "We think we're not scary. Whatever it is that you do, you do it all the time and it long ago lost its novelty. But for prospects, getting dressed, driving somewhere unknown, sitting with strangers, stripping naked financially — these are enormous thresholds."
      source_file: "transcription_mp4_video_10.txt"
      context: "Financial advisor seminar — 40% don't book even after showing up"

    - id: "FIL-DK-511"
      title: "People Don't Want Control — They Want To FEEL In Control"
      content: "People often like to feel in control. Truth of the matter is, they don't really even want to be in control. They just like to feel like they're in control. It's not the reality ever. It's how somebody feels about the reality."
      source_file: "transcription_mp4_video_11.txt"
      context: "Restaurant choice with Carla — 'you pick' from two pre-selected options"

    - id: "FIL-DK-512"
      title: "Greed Is Visceral, Not Optional"
      content: "For 95% of us, greed is not really optional. It's not really consciously managed. It's visceral. Like a full dog will still eat a hunk of steak on the floor. Therefore it is stimulatable in just about anybody — poor, rich, smart, dumb, educated, uneducated."
      source_file: "transcription_mp4_video_13.txt"
      context: "Martha Stewart insider trading, doctors at get-rich seminars"

    - id: "FIL-DK-513"
      title: "Free Never Dies"
      content: "Every 3-5 years there's a funeral for the word 'free.' The consumer has wised up, they say. Then free crawls back out of the grave and works. Same with long copy. People have an unconscious, hardwired, visceral desire for it that is irresistible even when intellectually they know it's nonsense."
      source_file: "transcription_mp4_video_13.txt"
      context: "Advertising industry cycles of declaring free/long copy dead"

    - id: "FIL-DK-514"
      title: "Fatigue With The Old Beats Satisfaction With The Working"
      content: "It doesn't matter necessarily how well what you are delivering works. They will still grow unhappy with it. As they lose the pleasure of new, more of old will not counteract that emotional reaction. Piling more of the same on won't make them happier."
      source_file: "transcription_mp4_video_13.txt"
      context: "P&G Tide — nobody stopped using it because it didn't work, they switched because they were bored"

    - id: "FIL-DK-515"
      title: "90% Of Population Is Situationally Corruptible"
      content: "5% hardwired honest, 5% hardwired dishonest, 90% situational. The 90% need three things: perceived need, ability to rationalize, and belief in undetectability. If all three present, greed/theft occurs."
      source_file: "transcription_mp4_video_13.txt"
      context: "Theft control client + employee theft up 50% in 7 years"

  L2_MENTAL_MODELS:
    - id: "MM-DK-440"
      title: "Threshold Resistance Model"
      content: "Every step in a sales process has a threshold height. Most businesses make it too high without realizing it. Solution: offer optional thresholds — high threshold for eager buyers + low threshold (free report, recorded message, video) for timid ones. You scoop up the 'almost persuaded.'"
      source_file: "transcription_mp4_video_10.txt"
      context: "Arnold Topman — financial advisor seminar to free report funnel"

    - id: "MM-DK-441"
      title: "False Choice / Forced Choice"
      content: "Three-part magic: 1) 'I don't care' (drops defenses), 2) 'You decide/you pick' (gives feeling of control), 3) Present only 2 pre-selected options. They feel they picked. They go home and say 'I decided, I chose.' But you framed the entire pick."
      source_file: "transcription_mp4_video_10.txt"
      context: "DK's restaurant formula with Carla — works for 3+ years"

    - id: "MM-DK-442"
      title: "Comparative Choice Switch"
      content: "Switch people's mental frame from 'Do I want this or not?' to 'Which one should I get?' Three mechanisms: choice of items, choice of timing, differential benefit. The bread maker effect: $270 alone = no sales, $270 next to $400 = sales skyrocket."
      source_file: "transcription_mp4_video_11.txt"
      context: "Williams-Sonoma bread maker + AB offer at Peter Low events"

    - id: "MM-DK-443"
      title: "Mouse Trapping (Depth Of Extraction)"
      content: "Bob Stupak: 'When we put 50 slot machines in, I always consider that there are 50 more mouse traps.' The depth that casinos go to — 441-page book on machine addiction design, entire book on casino floor layout. Most businesses don't go 1/10th that deep."
      source_file: "transcription_mp4_video_10.txt"
      context: "Addiction By Design + casino floor layout books"

    - id: "MM-DK-444"
      title: "New/Improved Cycle"
      content: "P&G Tide: every 6 weeks, something changes (add scent, remove scent, blue sprinkles, new bottle, booster product). Trump: every 2-3 days. The cycle prevents fatigue. People don't leave because it stopped working — they leave because they're bored."
      source_file: "transcription_mp4_video_13.txt"
      context: "Tide + Trump + 5 detergent brands (all Tide in different boxes)"

    - id: "MM-DK-445"
      title: "Three Requirements For Greed Activation"
      content: "90% of population needs: 1) Perceived need (even if irrational), 2) Ability to rationalize the behavior, 3) Belief they can go undetected. Management can only control #3. Marketing can stimulate #1 and #2."
      source_file: "transcription_mp4_video_13.txt"
      context: "Theft control business + employee theft + Martha Stewart"

  L3_HEURISTICS:
    - id: "HEUR-DK-636"
      title: "40% Of Warm Prospects Won't Cross The Final Threshold"
      content: "Financial advisor: 60% book from seminars. That means 40% who already answered an ad, registered, drove there, sat through the presentation — still don't book. The last threshold (bring records, get examined) is too high."
      source_file: "transcription_mp4_video_10.txt"
      context: "Financial advisor seminar conversion analysis"

    - id: "HEUR-DK-637"
      title: "Optional Thresholds: High + Low"
      content: "Don't just have one threshold. Offer: 'Want to jump? Here's a high one. Don't want to jump? Here's a low one, just step over.' The low threshold (free report, recorded message) reduces dinner attendance by ~15% but creates a whole new lead list."
      source_file: "transcription_mp4_video_10.txt"
      context: "Dr. Hawkins diabetes seminar + 'undecided' video landing page"

    - id: "HEUR-DK-638"
      title: "Aggressive Intrusion Requires Permission First"
      content: "Aggressive and persistent intrusion works only AFTER someone's permission. If they said 'yeah, I want to hear more about hearing aids,' the door is open. Before that, aggressiveness works against you. The key is getting that first threshold crossed."
      source_file: "transcription_mp4_video_10.txt"
      context: "Door-to-door sales army era, fire alarm + burglar alarm companies"

    - id: "HEUR-DK-639"
      title: "Burglar Alarm Pre-Conditioning"
      content: "Burglar alarm companies would seed neighborhoods for 2 weeks before sales crews arrived — empty liquor bottles, condoms, girly magazines in bushes. Then when salesmen knocked, they were received very differently. Not the tactic — the STRATEGY."
      source_file: "transcription_mp4_video_10.txt"
      context: "Create the environment that makes your aggressiveness acceptable"

    - id: "HEUR-DK-640"
      title: "AB Offer: Two-Thirds Take The Better Value"
      content: "In a binary choice, two-thirds of people usually take the better value. At Peter Low events: $99 vs $278. Half of $99 buyers upgraded on the spot. For services: always present two prescriptions, never one. 80-90% take the bigger one."
      source_file: "transcription_mp4_video_11.txt"
      context: "DK's Peter Low selling + consulting prescription pairs"

    - id: "HEUR-DK-641"
      title: "Ugly Friend Strategy"
      content: "Neil Strauss's The Game: go to the bar with a very unattractive decoy friend. Standing next to you, you look better. Same as Williams-Sonoma $400 machine next to $270. Comparative choice makes the option look better by contrast."
      source_file: "transcription_mp4_video_11.txt"
      context: "Bread maker + dating analogy applied to pricing"

    - id: "HEUR-DK-642"
      title: "Buyer's Remorse Prevention: Handwritten Thank You"
      content: "Most people do little or nothing after a sale. Handwritten thank you notes are like a miracle — by comparison you're doing what nobody else does. Most people don't know what happened to them anyway. It's an overwrought concern."
      source_file: "transcription_mp4_video_11.txt"
      context: "Q&A response on finesse and buyer's remorse"

    - id: "HEUR-DK-643"
      title: "Stupak Postcard System: 100K Leads/Year Nearly Free"
      content: "Five free postcards per guest, pre-stamped, 'we'll mail them for you.' Irresistible — not using them = wasting money. Redemption near 100%. 300 rooms × 5 cards × 150 days = 100,000 names. Mail pitch package 1 week after postcard arrives."
      source_file: "transcription_mp4_video_13.txt"
      context: "Vegas World lead generation — cheapest list acquisition ever"

    - id: "HEUR-DK-644"
      title: "Penny Machine Is Really $3 Machine"
      content: "The penny machine is now a $3 bet. People think they're playing a penny machine. They say 'I'm playing the penny machine' while betting $3-5 per spin. The label 'penny' changes their self-perception of behavior."
      source_file: "transcription_mp4_video_10.txt"
      context: "Casino mouse trapping — relabeling the bet"

    - id: "HEUR-DK-645"
      title: "New Car Pleasure Lasts Days, Not Weeks"
      content: "Three weeks of shopping anticipation. A few days of happiness. Then new car smell fades, you see the same car at every light, you can't find it in parking lots, and you discover the cup holder is in the wrong place. Pleasure of new is brief."
      source_file: "transcription_mp4_video_13.txt"
      context: "Bentley cup holder story — $300K car, bad cup holder = rage in 5 minutes"

  L4_FRAMEWORKS:
    - id: "FW-DK-375"
      title: "Threshold Resistance Reduction System"
      content: "1) Map every threshold in your sales process, 2) Identify where 'almost persuaded' people drop off, 3) Create low-threshold alternatives at each step (free report, recorded message, video, website), 4) Accept ~15% trade-down from high-threshold for entirely new lead stream, 5) Build follow-up system for leads who chose low threshold, 6) Graduate them through progressively higher thresholds."
      source_file: "transcription_mp4_video_10.txt"
      context: "Financial advisor + Dr. Hawkins diabetes + free recorded message"

    - id: "FW-DK-376"
      title: "Forced Choice Architecture"
      content: "Step 1: Use 'I don't care' to drop defenses. Step 2: 'You decide/you pick' gives control feeling. Step 3: Present only 2-3 pre-selected options (all acceptable to you). Step 4: Switch frame from 'do I want it?' to 'which one?' Three mechanisms: choice of items, choice of timing, differential benefit."
      source_file: "transcription_mp4_video_10.txt"
      context: "Restaurant choice + AB offer + consulting prescriptions"

    - id: "FW-DK-377"
      title: "New/Improved Cycle Framework"
      content: "Step 1: Recognize fatigue is inevitable regardless of quality. Step 2: Create multiple versions of same product in different packaging (P&G: 5+ 'different' detergents). Step 3: Implement 6-week new/improved cycle on flagship. Step 4: Changes can be trivial (scent/no scent, new bottle, 'booster' add-on). Step 5: Maintain the illusion of novelty perpetually."
      source_file: "transcription_mp4_video_13.txt"
      context: "P&G Tide + Trump 2-3 day cycle + new car psychology"

    - id: "FW-DK-378"
      title: "Greed Pitch Architecture"
      content: "Works on ALL demographics (doctors through trailer park). Three elements: 1) Create perceived need ('you NEED this opportunity'), 2) Provide rationalization ('smart people do this'), 3) Use 'free' as irresistible trigger (hardwired, visceral, never dies). Stack: free + new + exclusivity + big numbers. Even when they know intellectually it's nonsense, they can't resist."
      source_file: "transcription_mp4_video_13.txt"
      context: "Stupak, get-rich seminars, Proactiv, stock-market ads"

  L5_METHODOLOGIES:
    - id: "MET-DK-266"
      title: "Forced Choice Sales Method"
      content: "Step 1: Never propose one prescription — always present two. Step 2: Frame as 'minimum we should do' vs 'the Rolls Royce / everything at once.' Step 3: Ask 'which do you think you should do?' Step 4: In 80-90% of cases, recommend the bigger one. Step 5: They feel they chose collaboratively. Step 6: For products: use AB offer ($99 vs $278). Step 7: Train staff on simple switch: 'Or, we have the complete package here today. Would you like to upgrade?' Step 8: Half of lower-tier buyers upgrade on the spot."
      source_file: "transcription_mp4_video_11.txt"
      context: "Peter Low events + consulting day + services"

    - id: "MET-DK-267"
      title: "Stupak Free Postcard Lead Generation"
      content: "Step 1: Provide 5 beautiful picture postcards per customer, pre-stamped. Step 2: Wrap with strip saying 'Don't stamp these — we mail them free for you.' Step 3: Provide mail slot — redemption approaches 100%. Step 4: Data-entry all names/addresses from cards BEFORE mailing. Step 5: Mail postcards. Step 6: One week later, mail pitch package to every recipient. Step 7: Their friend wrote 'having great time!' — perfect warm intro. Result: 100K+ names/year at near-zero cost."
      source_file: "transcription_mp4_video_13.txt"
      context: "Vegas World / Bob Stupak lead generation system"


# DNA EXTRACTION — Dan Kennedy: Mind Hijacking
# Wave 6 (Files: video_23, video_24, video_25, video_26)
# Created: 2026-03-16
# Themes: Sequential Submission, Time=4 Outcomes, Small Victories, Glory, Lottery Effect, Buy Now/Later

layers:
  L1_PHILOSOPHIES:
    - id: "FIL-DK-530"
      title: "Sequential Submission Trumps Single Giant Commitment"
      content: "People always prefer to submit sequentially rather than in one big giant commitment. But at a point fairly early, a significant commitment makes all subsequent ones easier. When you've given up your clothes, you're not going to object too much to the rest."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FIL-DK-531"
      title: "Time Obtained Is The Master Variable"
      content: "There is a direct ratio between the time they invest with you and: likelihood of buying, price they'll pay, happiness after purchase, and referrals. One variable (time) equals four outcomes."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FIL-DK-532"
      title: "Never Surrender Effectiveness For Efficiency"
      content: "Peter Drucker: big difference between efficiency and effectiveness. You don't want to trade away effectiveness for efficiency at any time. Particularly when there's money at stake. Anybody trying to bully you into shorter is trading effectiveness for efficiency."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FIL-DK-533"
      title: "Attention Span Is A Myth — Interest Is Real"
      content: "Nobody has attention span except for things they find interesting, entertaining, or personally relevant. For that, people have virtually unlimited attention span. Binge-watching proves it. The trend to shorten everything is surrender of effectiveness."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FIL-DK-534"
      title: "Glory Is A Theatrical Concept Requiring An Audience"
      content: "Eric Hoffer: 'There is no striving for glory without a vivid awareness of an audience.' Nobody would do anything competitive if nobody watched, applauded, or gave out ribbons. Everybody is susceptible — even wealthy, successful people."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FIL-DK-535"
      title: "Don't Do Unimportant Shit"
      content: "The advice to scan quickly is only valid if what you're doing is unimportant. Two suggestions: don't do unimportant shit — do something important. And do it to somebody who has agreed it's important. Then they'll give unlimited attention."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FIL-DK-536"
      title: "Nobody Wants The Blue Pill — Fortunes Require Full Arsenal"
      content: "The relentless search for an incredibly simple answer to an incredibly complex opportunity is our desire for a blue pill. That's not how fortunes are made. You cannot winnow persuasion down to a top 20% — you need the full toolkit integrated."
      source_file: "transcription_mp4_video_26.txt"

    - id: "FIL-DK-537"
      title: "Output Is About Input — Eclectic Consumption Required"
      content: "If in a subject genre you are going to be able to be new, you do have to take in a lot of information and ideas in order to freshen yourself. And you need it to be eclectic. Principles never change, but tactics and tools change."
      source_file: "transcription_mp4_video_25.txt"

    - id: "FIL-DK-538"
      title: "The Messenger Matters Not Just The Message"
      content: "You need a constituency of people who resonate with you and want to spend time with you. They will then be forgiving of some retread of same territory. The overall experience is something they want to do."
      source_file: "transcription_mp4_video_25.txt"

    - id: "FIL-DK-539"
      title: "Human Nature Doesn't Change — Only Tools Change"
      content: "Principles of persuasion never change because human nature doesn't change. Human behavior changes a little. Strategies don't change much. Tactics change a lot. Tools change a lot and accelerate."
      source_file: "transcription_mp4_video_25.txt"

  L2_MENTAL_MODELS:
    - id: "MM-DK-460"
      title: "11 Sequential Agreements Model"
      content: "Before any sale, prospect must agree to 11 things in sequence: 1) Possibility, 2) Beneficial Nature, 3) Attainability, 4) Personal Possibility (where most stall), 5) Practical Attainability, 6) History Resolution, 7) This Time Is Different, 8) Personal Beneficial Nature, 9) Advantageous Timing, 10) Personal Advantageous Timing, 11) Personal Appropriateness. Missing one stops the sale."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MM-DK-461"
      title: "Personal Disqualification Pattern"
      content: "At step 4 (Personal Possibility), most people disqualify themselves: 'My business is different. I'm in a small town. I'm too young/old/dumb/broke.' The first three agreements are easy — personal possibility is where sticking begins."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MM-DK-462"
      title: "Charlie Brown / Lucy Football Model"
      content: "Almost every customer is Charlie Brown lining up to kick the football Lucy is holding. They have a history of failure. You must: let them off the hook for past failures AND give concrete reasons why this time is different."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MM-DK-463"
      title: "Personal Appropriateness Block"
      content: "Even after 10 agreements, people stop at 'personal appropriateness.' With money: 'If I do better than everyone, I'll lose friends. Dad never made more than 20K.' This buried mental crap surfaces and stops the sale. Must be addressed proactively."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MM-DK-464"
      title: "FBI Friendship Formula"
      content: "Proximity + Frequency + Constancy + Intensity = Friendship. Proximity: physical closeness (real room beats online). Frequency: contacts in quick succession (3-step, 15 days apart). Constancy: total time spent. Intensity: message-to-market match. All four together = rapid relationship."
      source_file: "transcription_mp4_video_24.txt"

    - id: "MM-DK-465"
      title: "Distance-To-Sale Ratio"
      content: "Person from 6 blocks away is least likely to buy. Person who drove farthest is a lock. Guy who flew from SF to your LAX preview — he's buying. Has nothing to do with you or them. Purely about time/effort invested."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MM-DK-466"
      title: "Misery Of Going Home Empty-Handed"
      content: "The more time/effort someone invested to get to you, the more miserable it is to leave without buying. Guy who gave a lot of time and is empty handed = miserable. Guy who gave a little time = not painful."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MM-DK-467"
      title: "The Lottery Effect"
      content: "People stay in if there's a chance something might suddenly happen. MLM: 'If Bill ignites after I quit, I'll kick my ass forever.' So they stay paying $100/month. Works everywhere — memberships, licensing, events."
      source_file: "transcription_mp4_video_25.txt"

    - id: "MM-DK-468"
      title: "Activity Masquerading As Achievement"
      content: "People need to confuse activity with accomplishment. The very fact that something happened (even marginal) creates feeling of progress. Mail 1000, one person responds — they're excited because something happened."
      source_file: "transcription_mp4_video_24.txt"

    - id: "MM-DK-469"
      title: "Sunk Cost Leverage For Retention"
      content: "The deeper they're in, the less that happens (less chance of exit). Best argument is reinvention, not abandonment: 'We're not getting out of law. We're replacing your law practice with a better one.'"
      source_file: "transcription_mp4_video_25.txt"

    - id: "MM-DK-470"
      title: "Two Kinds Of Buyers"
      content: "Only two kinds: ready to buy now, and not ready now but may be later. You cannot build a fortune only on buy-now buyers. For every now buyer, there's a multiple who will buy later. The game is maintaining dialogue."
      source_file: "transcription_mp4_video_26.txt"

    - id: "MM-DK-471"
      title: "Principles-Strategies-Tactics-Tools Hierarchy"
      content: "Principles almost never change. Strategies don't change much. Tactics change a lot. Tools change a lot. You can return to same principles and freshen by changing tactical applications."
      source_file: "transcription_mp4_video_25.txt"

  L3_HEURISTICS:
    - id: "HEUR-DK-665"
      title: "Remove Their Ability To Leave (Trapping)"
      content: "Mayo Clinic takes your clothes. Smart car dealer takes your car for 'analysis.' Vicki's uncle put strangers on charter planes to Nassau for 3-day lockup — 100% close rate."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-666"
      title: "Hair Transplant Objection: Personal Beneficial Nature"
      content: "Hair transplant #1 sales problem isn't belief it works — it's: 'I've been married a long time. She isn't going anywhere.' He passed 7 of 11 agreements but stopped at personal beneficial nature."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-667"
      title: "Time Stretches Price — Blinds Example"
      content: "Blinds.com vs person who comes to your house to measure and show samples. You'll spend more with the in-home person. Not because they're better — because time stretched, so price stretched."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-668"
      title: "Dream Room Effect — 100% Close At Premium"
      content: "Mattress store: virtually 100% of people who sleep in the dream room buy something at premium price. They put on pajamas and slept for an hour. Nothing to do with the mattress — everything to do with time invested."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-669"
      title: "Cookware Unpacking Tactic — 30 Min To Repack"
      content: "Unpack all 36 pieces first. Takes about 30 minutes to pack back up. Even after they've said no 16 times, you keep talking while packing. Best guys cooked dinner — close rate real high."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-670"
      title: "Faster Sale = Higher Buyer's Remorse"
      content: "The faster the sale, the higher the buyer's remorse. The more time they gave you, the happier they are with what they buy. Speed kills satisfaction."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-671"
      title: "Work Backwards From 100% Close Rate"
      content: "Vicki's uncle: 'I worked it backwards. I just wanted 100% close rate.' Then engineered the environment to make that inevitable (charter plane to Nassau, 3-day lockup)."
      source_file: "transcription_mp4_video_23.txt"

    - id: "HEUR-DK-672"
      title: "3-Step Campaigns No More Than 15 Days Apart"
      content: "Frequency of contact in quick succession builds familiarity. If three-step campaign, no more than 15 days apart. Fill gaps with email. Not three months apart."
      source_file: "transcription_mp4_video_24.txt"

    - id: "HEUR-DK-673"
      title: "BMW Shock & Awe — 90 Minutes Of Engagement"
      content: "BMW sends giant shock & awe package: video test drive, sample book, tests. ~90 minutes if you go through it all. For luxury car buyer, 90 minutes is no big thing. Get to the right person, don't compromise presentation for wrong person."
      source_file: "transcription_mp4_video_24.txt"

    - id: "HEUR-DK-674"
      title: "Zero Interest = Zero Appropriate Time"
      content: "If you have no interest, any amount of time is too long. Appropriate amount? None. Answer isn't shorter presentations — it's finding the right audience who IS interested."
      source_file: "transcription_mp4_video_24.txt"

    - id: "HEUR-DK-675"
      title: "Five Ways To Fail At Small Victories"
      content: "1) Task too big too soon, 2) Too hard too soon, 3) Too long delay for victory, 4) No progressive series, 5) Too long delay for reward. Monthly contests = no good. Daily. If not hourly."
      source_file: "transcription_mp4_video_24.txt"

    - id: "HEUR-DK-676"
      title: "Magnetic Marketing Small Victory"
      content: "How can I put stuff in here that's easy, gets quick result, impossible to screw up? Three-step lost customer mailing — somebody WILL respond no matter how badly you screwed up."
      source_file: "transcription_mp4_video_24.txt"

    - id: "HEUR-DK-677"
      title: "Convert Victory To Commitment Immediately"
      content: "The time to get commitment for the next thing is RIGHT AFTER they've gotten a result. Don't let the glow of victory fade."
      source_file: "transcription_mp4_video_24.txt"

    - id: "HEUR-DK-678"
      title: "$800 Shill Sale — Cheapest Retention Investment"
      content: "Howard Bonnell (VP World Book) bought first set from every new salesperson via shill couple. Odds of second sale went up 20x. Cheapest $800 he spent again and again."
      source_file: "transcription_mp4_video_25.txt"

    - id: "HEUR-DK-679"
      title: "Product Party Over Recruiting Meeting"
      content: "Instead of recruiting meetings (nobody shows = defeat), start with product party. Everyone who comes buys something. Five people = five sales. Nobody has to be good. Small victory, encouragement."
      source_file: "transcription_mp4_video_25.txt"

    - id: "HEUR-DK-680"
      title: "Vacuum Cleaner Audition Appointments"
      content: "New recruits: first four calls MUST be family/friends. Pitch: 'I'm not selling, just running audition appointments.' At end, put aunt on phone with sales manager who closes. Four recruits × 3 appointments = 12 appointments = 4 sales."
      source_file: "transcription_mp4_video_25.txt"

    - id: "HEUR-DK-681"
      title: "MLM Retention = Stay In The Lottery At $100/Month"
      content: "How to stay in the lottery? $100 minimum purchase/month. Must be consumable (goes down the sink) so it doesn't accumulate. Consumable + lottery psychology = persistent membership."
      source_file: "transcription_mp4_video_25.txt"

    - id: "HEUR-DK-682"
      title: "Guilt Is The Most Pokeable Button"
      content: "Guilt is way up there as most efficient mind hack. Virtually all parents walk around with guilt complex. Divorce amplifies enormously. In B2B: guilt about dysfunctional follow-up, wasted resources. More efficient than gain."
      source_file: "transcription_mp4_video_26.txt"

    - id: "HEUR-DK-683"
      title: "Financial Advisors Lose 60% Of Seminar Attendees"
      content: "Dinner seminars: only 40-60% book appointments. What happens to rest? Nothing. But empirically you can get 20% of them after the fact over 12 months if you follow up."
      source_file: "transcription_mp4_video_26.txt"

    - id: "HEUR-DK-684"
      title: "Car Buyers Buy On The Third Weekend"
      content: "Overwhelming majority buy on third weekend, going back to 3+ places they visited before, narrowing to one. Nobody in the industry has a system for this despite abundant data."
      source_file: "transcription_mp4_video_26.txt"

    - id: "HEUR-DK-685"
      title: "Vending Machines Outsell Humans 3-to-1"
      content: "Proactiv vending machines ($250K each) outsell human kiosk workers 3-to-1 because they're consistent. Even best humans are inconsistent. Machines serve primarily later buyers."
      source_file: "transcription_mp4_video_26.txt"

    - id: "HEUR-DK-686"
      title: "Retargeting With Affinity Language — 15% Lift"
      content: "Split test: retargeting with more affinity/emotion language based on mind hijacking concepts. Converted 15% more than usual. Same money, same traffic source."
      source_file: "transcription_mp4_video_26.txt"

    - id: "HEUR-DK-687"
      title: "Males 3x More Likely To Be Buy-Now Buyers"
      content: "Males are 3x more likely to be buy-now buyers than females. Man with broken heel settles on something acceptable. Woman spends 4 hours, goes back next weekend, tries another mall."
      source_file: "transcription_mp4_video_26.txt"

  L4_FRAMEWORKS:
    - id: "FW-DK-390"
      title: "Sequential Agreement Mapping Framework"
      content: "Before building any presentation, map all sequential agreements prospect must accept. What does somebody have to agree to sequentially to reach the final agreement? Example: fire alarms — must agree fires are significant → brick houses burn too → it's urgent → etc. Skip one = sale stops."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FW-DK-391"
      title: "Four Reasons Why This Time Is Different"
      content: "For audiences with purchase history: create four concrete reasons why this attempt differs from all previous failures. Required because 95%+ of buyers have failure history. Miss this step = persuasion stops."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FW-DK-392"
      title: "Time = 4 Outcomes Framework"
      content: "One input (time obtained) drives four outcomes: 1) Likelihood of purchase, 2) Price elasticity, 3) Happiness with purchase / reduced remorse, 4) Referrals generated. When you hijack their time, you get everything else."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FW-DK-393"
      title: "Artificial Glory Environment Framework"
      content: "Create environments where glory occurs theatrically: audience, recognition, winners, rankings, awards ceremony, trophies, theatrical trappings (red carpet, cameras, celebrity host). Even infomercial industry has full Oscar-style awards. Create it and they reward you."
      source_file: "transcription_mp4_video_23.txt"

    - id: "FW-DK-394"
      title: "Small Victory Engineering Framework"
      content: "First action must be: small, easy, impossible to screw up, guaranteed result, quick. Then convert victory to commitment for next harder task. Progressive chain. If you don't engineer the small victory, you've had it."
      source_file: "transcription_mp4_video_24.txt"

    - id: "FW-DK-395"
      title: "Light His Fire — Remove Cooperation Bottleneck"
      content: "Ellen Kriedman's method for bad marriages: 'He doesn't have to cooperate, doesn't have to know you're doing it, but he will be changed.' She removed the #1 reason every prior solution failed (requiring both parties). Brilliant because she took away the reason it always failed."
      source_file: "transcription_mp4_video_25.txt"

    - id: "FW-DK-396"
      title: "Later Buyer Capture Framework"
      content: "Systematically capture non-immediate buyers. For every now-buyer there's a multiple of later-buyers. Need: capture mechanism, follow-up system with long legs, affordable economics. Persistent permission-based dialogue."
      source_file: "transcription_mp4_video_26.txt"

    - id: "FW-DK-397"
      title: "Longevity Content Framework"
      content: "For long-running businesses: 1) Principles fixed, 2) Tactics/tools change — use to freshen, 3) Rearrange/repackage/re-describe the old, 4) Constant eclectic input generates new output, 5) Messenger/experience matters as much as message."
      source_file: "transcription_mp4_video_25.txt"

  L5_METHODOLOGIES:
    - id: "MET-DK-272"
      title: "Sequential Trap And Escalation Method"
      content: "Step 1: Get them into environment. Step 2: Create significant early commitment (take clothes/car/money). Step 3: Once first trap is set, subsequent steps face minimal resistance. Step 4: Escalate commitments. Step 5: Close where leaving is more painful than buying. Example: 3hr meeting → $900 → charter to Nassau → 3-day lockup → 100% close."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MET-DK-273"
      title: "Personal Appropriateness Money Block Resolution"
      content: "Step 1: Identify subconscious blocks about deserving. Step 2: Insert dedicated copy section — 'I want to talk about money.' Step 3: Write 5+ paragraphs: 'you deserve to be rich' — address mental baggage. Step 4: Normalize desire for wealth before presenting opportunity."
      source_file: "transcription_mp4_video_23.txt"

    - id: "MET-DK-274"
      title: "Engineered First Victory Method"
      content: "Step 1: Identify simplest action with guaranteed positive outcome. Step 2: Design so impossible to fail (e.g., 3-step lost customer mailing). Step 3: Have them execute ONLY that first. Step 4: Celebrate immediately. Step 5: Use victory glow to secure next commitment. Alternative: stage first victory using shill ($800 = 20x second-sale odds)."
      source_file: "transcription_mp4_video_24.txt"

    - id: "MET-DK-275"
      title: "Lottery Effect Engineering"
      content: "Step 1: Identify what windfall could happen without direct effort. Step 2: Create stories of it happening to others. Step 3: Make membership the ticket ($100/month, consumable). Step 4: Show success stories. Step 5: Cost must be consumable so it doesn't accumulate as dead weight."
      source_file: "transcription_mp4_video_25.txt"

    - id: "MET-DK-276"
      title: "Two-Track Buyer Optimization"
      content: "Track 1 (Buy Now): Apply mind hijacking to improve conversion. Split test with affinity/emotion language. Track 2 (Buy Later): Capture mechanisms, persistent permission-based follow-up with long legs. Apply persuasion to accelerate later buyers into now buyers."
      source_file: "transcription_mp4_video_26.txt"


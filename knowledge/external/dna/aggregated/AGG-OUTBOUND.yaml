  - id: "FW-OUT-003"
    nome: "NEPQ Cold Call Framework"
    fonte_primaria: "JEREMY-MINER"
    peso: 0.95
    fases:
      - fase: 1
        nome: "Connecting Questions"
        objetivo: "Quebrar gelo sem soar vendedor"
        exemplo: "Rápida pergunta - você é a pessoa que cuida de X?"
      - fase: 2
        nome: "Situation Questions"
        objetivo: "Entender contexto atual"
        exemplo: "Quando foi a última vez que você avaliou...?"
      - fase: 3
        nome: "Problem Awareness Questions"
        objetivo: "Fazer prospect reconhecer problema"
        exemplo: "O que está te impedindo de...?"
      - fase: 4
        nome: "Solution Awareness Questions"
        objetivo: "Fazer prospect imaginar solução"
        exemplo: "Se pudesse resolver isso, como seria?"
      - fase: 5
        nome: "Consequence Questions"
        objetivo: "Criar urgência com dor de não agir"
        exemplo: "O que acontece se continuar assim por mais 6 meses?"
      - fase: 6
        nome: "Commitment Questions"
        objetivo: "Agendar próximo passo"
        exemplo: "Faria sentido explorar isso mais a fundo?"
    aplicacao: "Script de cold call"
    batches: ["BATCH-052", "BATCH-055", "BATCH-060"]

  - id: "FW-OUT-004"
    nome: "7 Tonalidades"
    fonte_primaria: "JEREMY-MINER"

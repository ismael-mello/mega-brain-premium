      - tipo: "SDR2"
        canal: "Inbound morno"
        perfil: "Equilíbrio"
        atividade: "Webinar, ads com intention baixa"
        nao_funciona_em: "Outbound puro"
      - tipo: "SDR3"
        canal: "Outbound ativo"
        perfil: "Agressividade, resiliência"
        atividade: "Cold call, cold email"

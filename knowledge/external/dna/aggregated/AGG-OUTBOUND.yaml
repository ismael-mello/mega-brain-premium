      5. SDR1 ou SDR4 faz nurturing
      6. Se esquentar, volta para SDR3
    beneficio: "Recupera 15-25% de leads 'mortos'"
    aplicacao: "Follow-up sistemático"
    batches: ["BATCH-011"]


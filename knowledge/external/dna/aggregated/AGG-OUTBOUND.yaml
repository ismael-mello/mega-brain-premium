    peso_br: 0.60

  - topico: "Abordagem de Cold Call"
    posicoes:
      - fonte: "JEREMY-MINER"
        posicao: "NEPQ: Perguntas, nunca pitch"
        argumento: "Self-persuasion é mais poderoso"
      - fonte: "Vendas Tradicionais"
        posicao: "Pitch rápido, criar interesse"
        argumento: "Tempo é curto, vá direto ao ponto"
    resolucao: |
      NEPQ É SUPERIOR para high-ticket:
      - Cold call curta: 2-3 perguntas + commitment
      - Pitch acontece na call agendada, não no cold call
      - Exceção: Produtos simples, ticket baixo
    peso_nepq: 0.85
    peso_tradicional: 0.15

  - topico: "Contratar experiente vs desenvolver interno"
    posicoes:
      - fonte: "alex-hormozi"
        posicao: "Farm System: Sempre desenvolver interno"
        argumento: "60% close rate vs 25% de externos"
      - fonte: "Mercado"
        posicao: "Contratar Closer pronto acelera"
        argumento: "Não tenho 12 meses para esperar"
    resolucao: |
      DEPENDE DO ESTÁGIO:
      - 0-$1M: Founder fecha, BDR gera leads
      - $1M-$5M: Primeiro Closer pode ser externo para template
      - $5M+: Farm System obrigatório para escala
      - Híbrido: 1 experiente ensina, 3+ internos aprendem
    peso_farm: 0.70
    peso_externo: 0.30


        uso: "Quando prospect compartilha dor"
        como: "Baixo, acolhedor"
      - nome: "Assumptive"
        uso: "Para commitment questions"
        como: "Confiante, como se 'sim' fosse óbvio"
    aplicacao: "Execução de cold call"
    batches: ["BATCH-055", "BATCH-056"]


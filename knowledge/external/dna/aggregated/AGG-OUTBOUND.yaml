    aplicacao: "Contratação e alocação de SDR"
    batches: ["BATCH-009", "BATCH-010"]

  - id: "FW-OUT-007"
    nome: "Sales Farming"
    fonte_primaria: "FULL-SALES-SYSTEM"
    peso: 0.82
    estrutura: |
      Repescagem coordenada de leads não convertidos:

      1. Lead entra no funil
      2. SDR qualifica → não converte
      3. Vai para "Farm" (não descarta)

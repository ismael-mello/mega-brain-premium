      - "Cria curiosidade sobre solução"
      - "Agenda com urgência"
      - "Confirma que prospect aparecerá"
    kpis:
      - "Show rate > 70%"
      - "Qualificação básica 100%"
    aplicacao: "Estruturação de equipe setter"
    batches: ["BATCH-005", "BATCH-008"]

  - id: "FW-OUT-009"
    nome: "Show Rate Optimization"
    fonte_primaria: "cole-gordon"
    peso: 0.85
    taticas:
      - tatica: "Confirmation Cascade"
        descricao: "Múltiplos pontos de confirmação"
        sequencia:
          - "1. Email imediato pós-agendamento"
          - "2. SMS 24h antes"
          - "3. Email manhã do dia"
          - "4. SMS 1h antes"
          - "5. Call 5min antes (se no-show histórico)"
      - tatica: "Value Preview"
        descricao: "Enviar mini-value antes da call"
        exemplos:
          - "PDF com case study"
          - "Video de 2min sobre o problema"
          - "Checklist relevante"
      - tatica: "Skin in the Game"
        descricao: "Fazer prospect investir algo"
        exemplos:
          - "Preencher formulário pré-call"
          - "Assistir vídeo obrigatório"
    benchmark: "70% show rate mínimo, 85%+ excelente"
    aplicacao: "Redução de no-show"
    batches: ["BATCH-006", "BATCH-007"]


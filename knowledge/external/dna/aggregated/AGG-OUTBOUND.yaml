    aplicacao: "Estrutura outbound BR"
    batches: ["BATCH-026", "BATCH-027", "BATCH-028"]

  # Full Sales System - 4 SDRs
  - id: "FW-OUT-006"
    nome: "4 Tipos de SDR"
    fonte_primaria: "FULL-SALES-SYSTEM"
    peso: 0.90
    tipos:
      - tipo: "SDR1"
        canal: "Inbound quente"
        perfil: "Paciência, nurturing"
        atividade: "Leads que preencheram form, download"

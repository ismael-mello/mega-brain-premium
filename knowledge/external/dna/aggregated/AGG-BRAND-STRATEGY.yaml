# PRODUCTIVE TENSIONS (conflitos entre experts)
# ═══════════════════════════════════════════════════════════════════════════════

tensoes_produtivas:
  - tensao: "Differentiation vs Distinctiveness"
    lado_a: "Ries/Neumeier: Seja diferente"
    lado_b: "Sharp: Seja distintivo (memory structures)"
    resolucao: "Differentiation para estratégia, distinctiveness para execução"

  - tensao: "Emotional vs Evidence-Based"
    lado_a: "Miller/Kapferer: Emoção é o driver"
    lado_b: "Sharp/Keller: Meça tudo"
    resolucao: "Emoção no criativo, evidência na alocação"

  - tensao: "Brand-as-Asset vs Brand-as-Communication"
    lado_a: "Aaker: Brand equity é financeiro"
    lado_b: "Miller: Brand é clareza de story"
    resolucao: "Ambos verdade em níveis diferentes (corporate vs customer)"

  - tensao: "Precision vs Flexibility"
    lado_a: "Kapferer/Wheeler: Guidelines rígidas"
    lado_b: "Neumeier: Flexibilidade radical"
    resolucao: "Core tight, expressão flexível"

  - tensao: "Narrow Focus vs Broad Reach"
    lado_a: "Ries: Sacrificar para focar"
    lado_b: "Sharp: Alcançar todos os category buyers"
    resolucao: "Focar positioning, ampliar distribuição"

  - tensao: "Rarity vs Growth"
    lado_a: "Kapferer: Luxo precisa de escassez"
    lado_b: "Sharp: Growth precisa de penetração"
    resolucao: "Depende do tipo de brand (luxury vs mass)"


# ═══════════════════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (9 sistemas operacionais)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  - id: "AGG-BRAND-MET001"
    nome: "Brand Audit"
    fonte: "multiple"
    passos:
      - "Equity Audit: Medir awareness, quality, associations, loyalty"
      - "Identity Audit: Avaliar prism facets e ideals"
      - "Positioning Audit: Verificar consistência de posicionamento"
      - "Touchpoint Audit: Mapear e avaliar todos pontos de contato"
    resultado: "Diagnóstico completo de saúde da marca"
    peso: 0.70

  - id: "AGG-BRAND-MET002"
    nome: "Create Positioning"
    fonte: "ries/neumeier/heyward"
    passos:
      - "Category Analysis: Mapear categorias e posições ocupadas"
      - "Strategy Selection: First-in-category, category creation, or repositioning"
      - "Statement Crafting: Onlyness + Mad Libs + 22 Laws test"
      - "Activation Plan: Como implementar positioning em todas touchpoints"
    resultado: "Positioning statement validado e ativado"
    peso: 0.70

  - id: "AGG-BRAND-MET003"
    nome: "Build Identity"
    fonte: "kapferer/wheeler"
    passos:
      - "Personality Mapping: Archetypes + 5 Dimensions"
      - "Visual System: Wheeler 5-Phase + Mark Types"
      - "Verbal System: Tone of voice + vocabulary + messaging"
      - "Brand Guidelines: Documento de governança"
    resultado: "Sistema de identidade completo"
    peso: 0.70

  - id: "AGG-BRAND-MET004"
    nome: "Create Brand Story"
    fonte: "miller"
    passos:
      - "BrandScript: Preencher 7 elementos SB7"
      - "One-Liner: [Problem] + [Solution] + [Result] em 25 palavras"
      - "Full Narrative: Expandir para storytelling completo"
      - "Application: Aplicar em website, emails, social, pitch"
    resultado: "Narrativa de marca clara e consistente"
    peso: 0.70

  - id: "AGG-BRAND-MET005"
    nome: "Design Architecture"
    fonte: "aaker"
    passos:
      - "Model Selection: Branded house / House of brands / Endorsed / Hybrid"
      - "Design: Visual e verbal para cada nível"
      - "Role Assignment: Papel de cada marca no portfólio"
      - "Governance: Regras de extensão e criação"
    resultado: "Arquitetura de marcas organizada"
    peso: 0.70

  - id: "AGG-BRAND-MET006"
    nome: "Generate Names"
    fonte: "naming-strategist"
    passos:
      - "Strategy Brief: Personalidade, posicionamento, público-alvo"
      - "Generation: 30-50 candidatos usando 8-Type Taxonomy"
      - "8-Criteria Evaluation: Memorability, pronounceability, spellability, distinctiveness, meaning, scalability, protectability, domain"
      - "Shortlist: Top 3-5 para teste final"
    resultado: "Nome estratégico validado"
    peso: 0.70

  - id: "AGG-BRAND-MET007"
    nome: "Map Archetype"
    fonte: "archetype-consultant"
    passos:
      - "Brand Analysis: Valores, comportamentos, audiência"
      - "Archetype Identification: Primário + secundário"
      - "Expression Guide: Como o arquétipo se manifesta"
      - "Messaging Applications: Tom, linguagem, visual por canal"
    resultado: "Personalidade de marca definida e aplicável"
    peso: 0.70

  - id: "AGG-BRAND-MET008"
    nome: "Diagnose Challenge"
    fonte: "brand-chief"
    passos:
      - "Rapid Triage: Sintomas vs root cause"
      - "Route to Specialist: Expert mais adequado"
      - "Prescribe: Framework específico para o desafio"
    resultado: "Diagnóstico rápido com routing para solução"
    peso: 0.70

  - id: "AGG-BRAND-MET009"
    nome: "Review Output (Quality Gate)"
    fonte: "brand-chief"
    passos:
      - "Evaluate: Output contra critérios do brief"
      - "Decide: Approve / Revise with notes / Reject with rationale"
      - "Document: Registrar decisão e razões"
    resultado: "Quality gate para todos outputs de branding"
    peso: 0.70


  - id: "AGG-VEN-FW008"
    nome: "Forced Choice Frame (DK Mind Hijacking)"
    fonte_primaria: "dan-kennedy"
    peso: 0.90
    ref: "FW-DK-436 (MH)"
    descricao: "Elimina 'maybe' mudando a pergunta de 'compra ou não' para 'A ou B'"
    elementos:
      - "1. Identificar o binary trap (sim/não) que paralisa a decisão"
      - "2. Criar duas opções de avanço — ambas assumem a compra"
      - "3. Apresentar como escolha de customização, não de compra"
      - "4. 'Você prefere começar na segunda ou na quinta?' > 'Quer começar?'"
      - "5. Qualquer escolha confirma a decisão de avançar"
    aplicacao: "Fechamento de alta conversão — retira a decisão binária da equação"
    batch_source: ["MH Wave 4-5"]

  - id: "AGG-VEN-FW009"
    nome: "Affinity Bridge (DK Mind Hijacking)"
    fonte_primaria: "dan-kennedy"
    peso: 0.85
    ref: "FW-DK-441 (MH)"
    descricao: "Conectar nova ideia a crença já existente no prospect — resistência cai porque 'você já acredita nisso'"
    elementos:
      - "1. Identificar crença ou valor já estabelecido no prospect"
      - "2. Mostrar que sua proposta é extensão natural dessa crença"
      - "3. 'Como você já acredita em X, faz sentido que Y...'"
      - "4. O novo se torna familiar — resistência psicológica dissolve"
    aplicacao: "Superar resistência a novas ideias em discovery e pitch"
    batch_source: ["MH Wave 6-7"]

  - id: "AGG-VEN-FW010"
    nome: "No BS Sales Process — 6 Steps (DK SMU)"
    fonte_primaria: "dan-kennedy"
    peso: 0.90
    ref: "FW-DK-759 (SMU)"
    descricao: "Processo completo de vendas em 6 etapas sequenciais"
    elementos:
      - "1. Foundations / Positioning — scripts, mindset, profissionalismo"
      - "2. Irresistible Offer — risk reversal + money at discount + emotional value"
      - "3. Presentation — inverted pyramid (12→6→2 hot buttons)"
      - "4. Objection Pre-emption — handle in advance, damaging admission"
      - "5. Assumptive Close — seamless, begin with end in mind"
      - "6. Post-Sale Romance — shock & awe box, ongoing relationship"
    aplicacao: "Framework macro para processo de vendas completo"
    batch_source: ["SMU DVD 1-4"]

  - id: "AGG-VEN-FW011"
    nome: "Script Development — Comedy Method (DK SMU)"
    fonte_primaria: "dan-kennedy"
    peso: 0.85
    ref: "FW-DK-763 (SMU)"
    descricao: "Desenvolvimento de scripts como comedians desenvolvem material"
    elementos:
      - "1. Record current salespeople → transcribe (confront the horror)"
      - "2. Write optimal composite script from best sequences"
      - "3. Memorize completely"
      - "4. Rehearse in safe environments (open mic equivalent)"
      - "5. Lock in winning version — never deviate"
      - "6. Perform consistently forever more"
    aplicacao: "Treinamento de vendedores, padronização de pitches"
    batch_source: ["SMU DVD 1"]

  - id: "AGG-VEN-FW012"
    nome: "Benefits Inverted Pyramid (DK SMU)"
    fonte_primaria: "dan-kennedy"
    peso: 0.85
    ref: "MM-DK-593, MET-DK-640 (SMU)"
    descricao: "Narrowing progressivo de benefícios até hot buttons"
    elementos:
      - "1. Present 12 benefits during presentation"
      - "2. Observe reactions (verbal + body language)"
      - "3. Filter to 6 most resonant"
      - "4. Probe deeper on those 6"
      - "5. Identify 2 hot buttons"
      - "6. At close, only discuss those 2"
      - "Advanced: Use pre-info/questionnaire to start at step 5"
    aplicacao: "Apresentações de vendas, pitches personalizados"
    batch_source: ["SMU DVD 2"]


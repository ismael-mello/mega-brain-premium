    batch_source: "BATCH-052"

  - id: "AGG-VEN-M004"
    nome: "Follow-Up Cadence BR"
    fonte_primaria: "FULL-SALES-SYSTEM"
    peso: 0.85
    etapas:
      - "D0: Call imediato"
      - "D1: WhatsApp follow-up"
      - "D2: Email com valor"
      - "D3: WhatsApp lembrete"
      - "D5: Call final"
      - "D7: Última tentativa"
    batch_source: "BATCH-019"

  - id: "AGG-VEN-M005"
    nome: "Objection Pre-emption Methodology (DK SMU)"
    fonte_primaria: "dan-kennedy"
    peso: 0.90
    ref: "MET-DK-639, FW-DK-761 (SMU)"
    etapas:
      - "1. List ALL possible objections for your product"
      - "2. Address as many as possible in marketing BEFORE the sales event"
      - "3. Use Damaging Admission for remaining (purple elephant technique)"
      - "4. Ensure ALL stakeholders are present (never let 'talk to CPA' happen)"
      - "5. At close, only 2-3 objections remain to handle"
    batch_source: "SMU DVD 3"

  - id: "AGG-VEN-M006"
    nome: "Think It Over Handling (DK SMU)"
    fonte_primaria: "dan-kennedy"
    peso: 0.85
    ref: "MET-DK-638 (SMU)"
    etapas:
      - "1. Isolate real reason — ask about other quick purchase decisions"
      - "2. Pre-date the PO — get paperwork done, predate 2-3 days"
      - "3. Takeaway — respect time, not running all over town"
      - "4. Conditional — 'if I call tomorrow, leaning yes or no?'"
    batch_source: "SMU DVD 3, Bonus Call"


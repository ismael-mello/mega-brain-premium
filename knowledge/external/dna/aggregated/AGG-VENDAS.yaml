      - "2. Pre-date the PO — get paperwork done, predate 2-3 days"
      - "3. Takeaway — respect time, not running all over town"
      - "4. Conditional — 'if I call tomorrow, leaning yes or no?'"
    batch_source: "SMU DVD 3, Bonus Call"

  - id: "AGG-VEN-M007"
    nome: "Straight Line Prospecting & Qualifying (JB SLC4)"
    fonte_primaria: "jordan-belfort"
    peso: 0.90
    ref: "MET-JB-001 (SLC4)"
    etapas:
      - "1. Qualify FAST — sift the buyers from the curious in first 90 seconds"
      - "2. Gather intelligence — pain, needs, values, financial situation, decision timeline"
      - "3. Build rapport through active listening (matching, mirroring, backtracking)"
      - "4. Identify the Three Tens gap — which certainty is lowest?"
      - "5. Present in the order of the gap — build weakest certainty first"
      - "6. Close — ask for the order directly, with certainty in your voice"
      - "7. Loop if needed — deflect objection, build more certainty, re-close"
    batch_source: "JB-SLC4"


      - "2. Score each on COST (1-10, lower = cheaper)"
      - "3. Score each on SPEED (1-10, higher = faster results)"
      - "4. Score each on SCALABILITY (1-10, higher = more scalable)"
      - "5. Score each on TARGETING PRECISION (1-10, higher = more precise)"
      - "6. Rank by total score — start with top 2-3 channels"
      - "7. Master one channel before adding another (Hormozi Core Four alignment)"
    aplicacao: "Traffic strategy for new funnels, channel prioritization"

  - id: "TF-FW-019"
    nome: "Dan Kennedy Marketing Triangle (JB SLM)"
    fonte: "jordan-belfort"
    expert: "Jordan Belfort"
    peso: 0.75
    ref: "FW-JB-SLM (SLM M5)"
    descricao: "Message-Market-Media match — all three must align for traffic to convert"
    elementos:
      - "1. MARKET: Who exactly are you targeting? (Customer Avatar)"
      - "2. MESSAGE: What exactly are you saying? (aligned to their pain/desire)"
      - "3. MEDIA: Where exactly are you reaching them? (channel selection)"
      - "4. All three must match — wrong message to right market on right media = zero results"
      - "5. Test by changing ONE variable at a time"
    aplicacao: "Traffic campaign strategy, diagnosis of underperforming campaigns"

# ═══════════════════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (17 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  - id: "TF-MET-001"
    nome: "BPM Method (Business Performance Marketing)"
    fonte: "mandalia"
    expert: "Depesh Mandalia"
    peso: 0.70
    descricao: "Metodologia completa de performance marketing"
    passos:
      - "1. Business Analysis — Unit economics, margins, LTV, payback"
      - "2. Audience Mapping — ICP definition, awareness levels, temperature"
      - "3. Creative Strategy — AC-4 scoring, angle development, hook library"
      - "4. Campaign Architecture — GT1/GT2/GT3 structure, naming conventions"
      - "5. Launch Protocol — Test budget, bidding strategy, timing"
      - "6. Optimization Cycles — Daily routine, weekly reviews, monthly resets"
      - "7. Scale Protocol — Graduation criteria, vertical then horizontal"
      - "8. Reporting — nCAC tracking, MER dashboard, creative performance"

  - id: "TF-MET-002"
    nome: "Traffic Engine Implementation"
    fonte: "pittman"
    expert: "Molly Pittman"
    peso: 0.70
    descricao: "Implementação passo-a-passo do Traffic Engine"
    passos:
      - "1. Avatar Research — Surveys, reviews, competitor analysis (2-3 days)"
      - "2. Customer Journey Map — Map every touchpoint cold→hot (1 day)"
      - "3. Channel Selection — Where is your avatar? Primary + Secondary (1 day)"
      - "4. Ad Grid Creation — 5 hooks × 3 audiences minimum (1 day)"
      - "5. Landing Page Build — One page per temperature (2-3 days)"
      - "6. Tracking Setup — Pixel, CAPI, UTMs, offline events (1 day)"
      - "7. Campaign Build — Structure per Ad Grid (1 day)"
      - "8. Launch — $50-100/day test budget, run 7 days minimum"
      - "9. First Optimization — Kill losers, scale winners, iterate creative"

  - id: "TF-MET-003"
    nome: "YouTube Ad Campaign Launch (ADUCATE)"
    fonte: "breeze"
    expert: "Tom Breeze"
    peso: 0.70
    descricao: "Metodologia de lançamento de campanha YouTube"
    passos:
      - "1. Script ADUCATE — Write using 7-part framework"
      - "2. Record — Talking head + B-roll, 90s-3min length"
      - "3. Edit — Pacing, captions, visual hooks"
      - "4. Campaign Setup — In-stream, custom intent audiences"
      - "5. Bidding — Start with target CPA, not max conversions"
      - "6. Companion Banner — Design for desktop click"
      - "7. Launch — $30-50/day, 3 ad variations minimum"
      - "8. Analyze at 7 days — View rate, CTR, CVR, CPA"
      - "9. Cascade — Winners become V1 of Cascading Video sequence"

  - id: "TF-MET-004"
    nome: "Performance Max Setup"
    fonte: "aslam"
    expert: "Kasim Aslam"
    peso: 0.70
    descricao: "Metodologia de implementação de PMax"
    passos:
      - "1. Conversion Setup — Define PRIMARY conversion only (not micro)"
      - "2. Asset Groups — One per audience signal, not per product"
      - "3. Audience Signals — Customer lists, custom segments, interests"
      - "4. Creative Assets — 5+ headlines, 5+ descriptions, 15+ images, 5+ videos"
      - "5. Brand Exclusions — Exclude branded search (run separately)"
      - "6. URL Expansion — OFF (control landing pages)"
      - "7. Budget — Min $50/day per asset group"
      - "8. Wait — 2 weeks learning phase, no changes"
      - "9. Optimize — Add/remove assets based on performance"

  - id: "TF-MET-005"
    nome: "Contextual Congruence Implementation"
    fonte: "kusmich"
    expert: "Nicholas Kusmich"
    peso: 0.70
    descricao: "Metodologia para garantir congruência em todo o funil"
    passos:
      - "1. Message Core — Define ONE core message for entire funnel"
      - "2. Visual Identity — Same colors, fonts, imagery throughout"
      - "3. Ad → Landing Page Audit — Does headline match? Same promise?"
      - "4. Landing Page → Thank You — Continuity of message and expectation"
      - "5. Email Sequence — Same voice, same promise, same visual"
      - "6. Sales Page/Call — Reinforce same core message"
      - "7. Test Congruence — Show funnel to 3 people, ask 'Is this the same company?'"

  - id: "TF-MET-006"
    nome: "Creative Decomposition Analysis"
    fonte: "creative-analyst"
    expert: "Creative Analyst"
    peso: 0.70
    descricao: "Análise sistemática de por que um criativo funciona (ou não)"
    passos:
      - "1. Isolate — Watch ad with sound off (visual impact)"
      - "2. Timestamp — Mark engagement shifts (hook, drop-off, peak)"
      - "3. Score — AC-4: Hook (0-5), Body (0-5), CTA (0-5), Visual (0-5)"
      - "4. Compare — Side-by-side with top performer and worst performer"
      - "5. Extract — List winning elements (hook type, proof format, CTA style)"
      - "6. Recombine — Create new variation using winning elements"
      - "7. Document — Add to Creative Playbook with tags"

  - id: "TF-MET-007"
    nome: "Scaling Decision Protocol"
    fonte: "scale-optimizer"
    expert: "Scale Optimizer"
    peso: 0.70
    descricao: "Protocolo de decisão para escalar ou matar campanhas"
    passos:
      - "1. Check Volume — 20+ conversions in last 7 days?"
      - "2. Check CPA — Within 1.5x target? Stable or declining?"
      - "3. Check Trend — 3-day moving average improving or declining?"
      - "4. Decision Matrix — Green (all pass) = Scale 20-30%"
      - "5. Decision Matrix — Yellow (1 fail) = Hold, monitor 48h"
      - "6. Decision Matrix — Red (2+ fail) = Reduce budget 30% or kill"
      - "7. Post-Scale Check — Monitor for 72h after any budget change"

  - id: "TF-MET-008"
    nome: "Account Restructure Protocol"
    fonte: "ads-analyst"
    expert: "Ads Analyst"
    peso: 0.70
    descricao: "Protocolo de reestruturação de conta bagunçada"
    passos:
      - "1. Audit — Run 8-Dimension Audit, document findings"
      - "2. Identify Waste — Wasted Spend Audit, quantify savings"
      - "3. Consolidate — Reduce campaigns (Raposa Problem), merge similar"
      - "4. Rebuild — New naming conventions, clean structure"
      - "5. Migrate — Move winning ads to new structure (don't lose data)"
      - "6. Relaunch — 7-day parallel run (old + new), compare"
      - "7. Sunset — Kill old campaigns after new ones stabilize"

  - id: "TF-MET-009"
    nome: "Pixel & Tracking Implementation"
    fonte: "pixel-specialist"
    expert: "Pixel Specialist"
    peso: 0.70
    descricao: "Setup completo de tracking multi-plataforma"
    passos:
      - "1. GTM Setup — Google Tag Manager as container for all pixels"
      - "2. Browser Pixel — Meta, Google, TikTok base codes via GTM"
      - "3. Server-Side — CAPI (Meta), Enhanced Conversions (Google)"
      - "4. UTM Strategy — Source/Medium/Campaign/Content/Term standardized"
      - "5. Event Mapping — Standard events + custom events per funnel stage"
      - "6. Testing — Use pixel helpers, test mode, real conversions"
      - "7. Attribution Windows — Configure per platform (7d click Meta, 30d Google)"
      - "8. Dashboard — Central dashboard combining all platform data"

  - id: "TF-MET-010"
    nome: "Budget Planning & Cash Flow"
    fonte: "fiscal"
    expert: "Fiscal"
    peso: 0.70
    descricao: "Planejamento financeiro de operação de tráfego"
    passos:
      - "1. Unit Economics — Calculate CAC, LTV, payback period, margin"
      - "2. Break-Even — Determine break-even ROAS (1/margin%)"
      - "3. Target CPA — Set max acceptable CPA from unit economics"
      - "4. Monthly Budget — Based on revenue target / target ROAS"
      - "5. Cash Reserve — Ensure 30-60 days of ad spend in reserve"
      - "6. Allocation — Winners 60-70%, Testing 20-30%, Experiments 10%"
      - "7. Weekly Review — Actual vs Budget, reallocation decisions"
      - "8. Monthly Report — P&L by channel, ROI by campaign"

  - id: "TF-MET-011"
    nome: "Hook Writing Workshop"
    fonte: "ad-midas"
    expert: "Ad Midas"
    peso: 0.70
    descricao: "Processo de criação de hooks de alta conversão"
    passos:
      - "1. Research — Collect 50 hooks from swipe file and competitors"
      - "2. Categorize — Pain, Desire, Curiosity, Proof, Contrarian, Story"
      - "3. Template — Extract patterns from top performers"
      - "4. Brainstorm — Write 20 hooks using templates + original ideas"
      - "5. Filter — Score each hook 1-10 (scroll-stopping power)"
      - "6. Top 10 — Select best 10 for testing"
      - "7. Test — Same body/CTA, only hook changes, $5/day each"
      - "8. Winner — Top 3 hooks become foundation for next round"

  - id: "TF-MET-012"
    nome: "Competitor Ad Intelligence"
    fonte: "media-buyer"
    expert: "Media Buyer"
    peso: 0.70
    descricao: "Processo de espionagem e análise de concorrentes"
    passos:
      - "1. Identify — List top 10 competitors and aspirational brands"
      - "2. Meta Ad Library — Screenshot all active ads, note run time"
      - "3. Google Transparency — Check search and display ads"
      - "4. SpyFu/SEMrush — Competitor keyword and ad spend estimates"
      - "5. Analyze — What hooks, angles, offers are they running?"
      - "6. Long-Running = Working — Ads running 30+ days are winners"
      - "7. Swipe — Add winning elements to your swipe file"
      - "8. Differentiate — Create counter-positioning creative"

  - id: "TF-MET-013"
    nome: "Retargeting Sequence Build"
    fonte: "kusmich"
    expert: "Nicholas Kusmich"
    peso: 0.70
    descricao: "Construção de sequência de retargeting multi-stage"
    passos:
      - "1. Audience Segmentation — Video viewers, page visitors, engagers, ATC"
      - "2. Recency Windows — 1-3 days (hot), 4-7 days (warm), 8-30 days (cooling)"
      - "3. Message Mapping — Objection handling per segment"
      - "4. Creative Per Stage — Testimonial → Case Study → Urgency → Last Chance"
      - "5. Frequency Cap — Max 2-3 impressions per day per person"
      - "6. Exclusions — Exclude purchasers, exclude between stages"
      - "7. Budget — 15-25% of total ad spend to retargeting"

  - id: "TF-MET-014"
    nome: "Landing Page Optimization Sprint"
    fonte: "pittman"
    expert: "Molly Pittman"
    peso: 0.70
    descricao: "Sprint de otimização de landing page para tráfego pago"
    passos:
      - "1. Baseline — Record current CVR, bounce rate, time on page"
      - "2. Heatmap — Install heatmap tool, collect 1000+ visits"
      - "3. Congruence Check — Does page match ad promise exactly?"
      - "4. Speed Test — Target <3s load time, optimize images"
      - "5. Above the Fold — Headline, sub-headline, CTA, trust elements"
      - "6. A/B Test — ONE element at a time, 7+ days, 95% confidence"
      - "7. Implement Winner — Roll out, set new baseline"

  - id: "TF-MET-015"
    nome: "Cross-Platform Launch"
    fonte: "scale-optimizer"
    expert: "Scale Optimizer"
    peso: 0.70
    descricao: "Expandir de uma plataforma para múltiplas"
    passos:
      - "1. Master Platform — Ensure primary platform is profitable and stable"
      - "2. Select Second — Choose based on audience overlap and content format"
      - "3. Adapt Creative — Reformat winners for new platform specs"
      - "4. Adjust Expectations — New platform = new learning curve, higher CPA initially"
      - "5. Test Budget — 20% of primary platform spend as test"
      - "6. 30-Day Trial — Run for 30 days before judging"
      - "7. Compare MER — Total MER should improve with diversification"

  - id: "TF-MET-016"
    nome: "Creative Refresh Cycle"
    fonte: "creative-analyst"
    expert: "Creative Analyst"
    peso: 0.70
    descricao: "Ciclo contínuo de refresh de criativos para evitar fadiga"
    passos:
      - "1. Monitor — Track CTR and CPA trends daily"
      - "2. Flag — CTR -20% WoW or CPA +30% = fatigue signal"
      - "3. Analyze — Which element fatigued? (hook, visual, copy, format)"
      - "4. Refresh — Change fatigued element, keep winning elements"
      - "5. Launch — New variation alongside original (don't kill yet)"
      - "6. Compare — 7-day head-to-head comparison"
      - "7. Archive — Document what fatigued and what replaced it"

  - id: "TF-MET-017"
    nome: "MER Reporting Dashboard"
    fonte: "burns"
    expert: "Ralph Burns"
    peso: 0.70
    descricao: "Implementação de dashboard MER para visão holística"
    passos:
      - "1. Data Sources — Connect all ad platforms + payment processor + CRM"
      - "2. Define MER — Total Revenue / Total Ad Spend (all channels)"
      - "3. Define nCAC — Total Ad Spend / Total New Customers (net of returns)"
      - "4. Blended Metrics — Don't trust platform-reported ROAS"
      - "5. Weekly Cadence — Review MER weekly, not daily (too volatile)"
      - "6. Trend Analysis — 4-week rolling average for decision making"
      - "7. Action Triggers — MER dropping 2+ weeks = investigate, not panic"


# L2: MODELOS MENTAIS (20 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

modelos_mentais:
  - id: "TF-MM-001"
    nome: "Traffic Temperature (Cold/Warm/Hot)"
    descricao: "Classificação de tráfego por nível de awareness — cold (não te conhece), warm (já interagiu), hot (pronto para converter). Cada temperatura exige mensagem, oferta e CTA diferentes."
    fonte: "pittman"
    expert: "Molly Pittman"
    peso: 0.70

  - id: "TF-MM-002"
    nome: "Five Levels of Awareness (Schwartz via Burns)"
    descricao: "Unaware → Problem Aware → Solution Aware → Product Aware → Most Aware. Copy e targeting mudam radicalmente por nível. Fundamental para segmentação e messaging."
    fonte: "burns"
    expert: "Ralph Burns"
    peso: 0.70

  - id: "TF-MM-003"
    nome: "Leaning In vs Leaning Back"
    descricao: "YouTube = lean-in (busca ativa, intenção). Social = lean-back (scroll passivo, interrupção). Muda radicalmente a estrutura do anúncio e a expectativa do viewer."
    fonte: "breeze"
    expert: "Tom Breeze"
    peso: 0.70

  - id: "TF-MM-004"
    nome: "Contextual Congruence"
    descricao: "Ad → Landing Page → Offer devem manter congruência visual, de mensagem e emocional. Quebra de congruência = queda brutal de conversão."
    fonte: "kusmich"
    expert: "Nicholas Kusmich"
    peso: 0.70

  - id: "TF-MM-005"
    nome: "AC-4 Scoring (Ad Creative 4 Dimensions)"
    descricao: "Score de 0-5 em 4 dimensões: Hook, Body, CTA, Visual. Total /20. Score >= 17 para escalar. Framework de avaliação objetiva de criativos."
    fonte: "mandalia"
    expert: "Depesh Mandalia"
    peso: 0.70

  - id: "TF-MM-006"
    nome: "Leaky Bucket"
    descricao: "Se o funil tem vazamentos (landing page ruim, follow-up fraco), jogar mais tráfego só desperdiça dinheiro mais rápido. Consertar o balde antes de encher."
    fonte: "mandalia"
    expert: "Depesh Mandalia"
    peso: 0.70

  - id: "TF-MM-007"
    nome: "Iceberg / 10-90 Rule"
    descricao: "90% do sucesso de tráfego está abaixo da superfície (offer, funnel, backend). Apenas 10% é o ad em si. Otimizar o invisível antes do visível."
    fonte: "kusmich"
    expert: "Nicholas Kusmich"
    peso: 0.70

  - id: "TF-MM-008"
    nome: "Bidding Garage: Honda / Maserati / Ferrari"
    descricao: "Honda = lowest cost (aprendizado). Maserati = cost cap (controle). Ferrari = bid cap (máximo controle). Progredir conforme data acumula e confidence aumenta."
    fonte: "mandalia"
    expert: "Depesh Mandalia"
    peso: 0.70

  - id: "TF-MM-009"
    nome: "Unicorn Ad"
    descricao: "O ad raro que performa 10x acima da média. Não pode ser engenheirado — mas pode ser encontrado via volume de testes. Quando encontrar, proteger e escalar."
    fonte: "burns"
    expert: "Ralph Burns"
    peso: 0.70

  - id: "TF-MM-010"
    nome: "Bell Curve / Diminishing Returns"
    descricao: "Todo ad set tem um sweet spot de budget. Antes = subinvestido. Depois = diminishing returns. Mapear a curva e parar ANTES de cair do penhasco."
    fonte: "aslam"
    expert: "Kasim Aslam"
    peso: 0.70

  - id: "TF-MM-011"
    nome: "Marginal CPA"
    descricao: "O custo do PRÓXIMO cliente, não a média. Ao escalar, marginal CPA sobe — se sobe acima do threshold, parar. Métrica de decisão de scaling."
    fonte: "scale-optimizer"
    expert: "Scale Optimizer"
    peso: 0.70

  - id: "TF-MM-012"
    nome: "MER (Marketing Efficiency Ratio)"
    descricao: "Total Revenue / Total Ad Spend — visão holística acima de ROAS por campanha. Resolve o problema de atribuição. Métrica north-star de performance."
    fonte: "burns"
    expert: "Ralph Burns"
    peso: 0.70

  - id: "TF-MM-013"
    nome: "Raposa Problem (Fox Problem)"
    descricao: "Muitas campanhas (raposas) competindo entre si. Cada uma come pouco. Consolidar em menos campanhas com mais budget = melhores resultados. Simplificar para escalar."
    fonte: "sobral"
    expert: "Pedro Sobral"
    peso: 0.70

  - id: "TF-MM-014"
    nome: "Four Ms of Marketing"
    descricao: "Market (quem), Message (o quê), Media (onde), Mechanism (como). Os 4 pilares de qualquer campanha. Falha em qualquer um = campanha morta."
    fonte: "kusmich"
    expert: "Nicholas Kusmich"
    peso: 0.70

  - id: "TF-MM-015"
    nome: "Creative Lifecycle"
    descricao: "Todo criativo passa por: Launch → Growth → Peak → Decline → Death. Reconhecer a fase atual é crítico para decisão de manter, refrescar ou matar."
    fonte: "creative-analyst"
    expert: "Creative Analyst"
    peso: 0.70

  - id: "TF-MM-016"
    nome: "Three Campaign Types"
    descricao: "Campanha de Conversão (ROI direto), Campanha de Remarketing (recuperar), Campanha de Lookalike (expandir). Cada tipo com budget, métrica e expectativa diferentes."
    fonte: "sobral"
    expert: "Pedro Sobral"
    peso: 0.70

  - id: "TF-MM-017"
    nome: "Passo Anterior (Previous Step)"
    descricao: "Quando algo não funciona no funil, o problema é no passo ANTERIOR. Landing page não converte? Problema é no ad (tráfego errado). Sempre olhar para trás."
    fonte: "sobral"
    expert: "Pedro Sobral"
    peso: 0.70

  - id: "TF-MM-018"
    nome: "You vs Google"
    descricao: "Google otimiza para seus lucros, não os seus. Entender que a plataforma é um adversário com interesses diferentes muda como você configura campanhas."
    fonte: "aslam"
    expert: "Kasim Aslam"
    peso: 0.70

  - id: "TF-MM-019"
    nome: "Metrics Hierarchy"
    descricao: "North Star (Revenue/ROAS) → Leading (CPA, CVR) → Diagnostic (CTR, CPM, CPC) → Vanity (Impressions, Reach). Sempre diagnosticar de cima para baixo."
    fonte: "performance-analyst"
    expert: "Performance Analyst"
    peso: 0.70

  - id: "TF-MM-020"
    nome: "Creative Decomposition"
    descricao: "Decompor um ad vencedor em: Hook (0-3s), Body (3-15s), Proof (15-30s), CTA (final). Cada componente testável isoladamente. Isolar o que faz funcionar."
    fonte: "creative-analyst"
    expert: "Creative Analyst"
    peso: 0.70


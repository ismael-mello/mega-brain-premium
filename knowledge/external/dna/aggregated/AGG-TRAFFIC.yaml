# ═══════════════════════════════════════════════════════════════════════════════
# SIGNATURE VOCABULARY
# ═══════════════════════════════════════════════════════════════════════════════

signature_vocabulary:
  - termo: "nCAC"
    definicao: "Net Customer Acquisition Cost — total spend / total new customers net of refunds"
    expert: "burns"

  - termo: "MER"
    definicao: "Marketing Efficiency Ratio — total revenue / total ad spend across all channels"
    expert: "burns"

  - termo: "AC-4"
    definicao: "Ad Creative 4-Dimension Score — Hook, Body, CTA, Visual scored 0-5 each, total /20"
    expert: "mandalia"

  - termo: "Graduation Testing"
    definicao: "GT1→GT2→GT3 progression based on proven performance at each budget level"
    expert: "mandalia"

  - termo: "Traffic Temperature"
    definicao: "Cold (stranger), Warm (aware), Hot (ready) — determines ad message and offer"
    expert: "pittman"

  - termo: "Unicorn Ad"
    definicao: "Rare ad that performs 10x above average — found through volume, not engineered"
    expert: "burns"

  - termo: "ADUCATE"
    definicao: "YouTube ad framework: Aim, Difficulty, Understanding, Credibility, Action, Teach, Exit"
    expert: "breeze"

  - termo: "Cascading Videos"
    definicao: "Sequence of progressively shorter videos that nurture viewer toward conversion"
    expert: "breeze"

  - termo: "Passo Anterior"
    definicao: "When something isn't working, the problem is in the PREVIOUS step of the funnel"
    expert: "sobral"

  - termo: "Raposa Problem"
    definicao: "Too many campaigns (foxes) competing for the same budget — consolidate"
    expert: "sobral"

  - termo: "Contextual Congruence"
    definicao: "Visual and message consistency across ad → landing page → offer → email"
    expert: "kusmich"

  - termo: "4% Rule"
    definicao: "Your buyers are 20% of 20% of your total audience — focus on them"
    expert: "kusmich"

  - termo: "Leaky Bucket"
    definicao: "Fix funnel holes before adding more traffic — more water in a broken bucket = more waste"
    expert: "mandalia"

  - termo: "SAGE"
    definicao: "Short, Actionable, Goal-oriented, Easy-to-consume content (4-7 min)"
    expert: "kusmich"

# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTIVE TENSIONS
# ═══════════════════════════════════════════════════════════════════════════════

productive_tensions:
  - tensao: "ROAS vs nCAC"
    lado_a: "Traditional media buyers optimize for per-campaign ROAS"
    lado_b: "Burns argues nCAC is the only metric that matters holistically"
    resolucao: "Use ROAS for daily optimization, MER/nCAC for strategic decisions"
    experts: ["burns", "media-buyer"]

  - tensao: "Broad vs Detailed Targeting"
    lado_a: "Mandalia/Sobral: let creative do the targeting, go broad"
    lado_b: "Kusmich: detailed targeting ensures message-audience fit"
    resolucao: "Broad for Meta (algorithm is good), Detailed for YouTube/Google (intent matters)"
    experts: ["mandalia", "sobral", "kusmich"]

  - tensao: "Scale Fast vs Scale Safe"
    lado_a: "Aslam: diminishing returns are still returns, push harder"
    lado_b: "Mandalia: graduate through GT1→GT3, never skip validation"
    resolucao: "GT1-GT3 for new creative, aggressive scaling for proven Unicorn Ads"
    experts: ["aslam", "mandalia"]

  - tensao: "Long-form vs Short-form Ads"
    lado_a: "Breeze: 2+ min YouTube ads with ADUCATE convert better"
    lado_b: "TikTok/Reels ecosystem rewards <60s content"
    resolucao: "Match format to platform — long for YouTube, short for social"
    experts: ["breeze", "ad-midas"]

  - tensao: "Give First vs Direct Offer"
    lado_a: "Kusmich: Give-Give-Give-Ask builds trust and reduces CPA long-term"
    lado_b: "Scale Optimizer: direct offer to hot audiences converts faster"
    resolucao: "Give-first for cold traffic, direct offer for warm/hot retargeting"
    experts: ["kusmich", "scale-optimizer"]


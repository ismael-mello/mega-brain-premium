# FILOSOFIAS
# ═══════════════════════════════════════════════════════════════════════════════

filosofias:
  - id: "FIL-COPY-001"
    filosofia: "Copy é salesmanship in print — se não saberia vender pessoalmente, não vai saber vender por escrito"
    fonte: "dan-kennedy" | ref: "FIL-DK-001"
    peso: 0.95

  - id: "FIL-COPY-002"
    filosofia: "O headline é 70-80% da batalha — se não funcionar, nada mais importa"
    fonte: "dan-kennedy" | ref: "FIL-DK-003, HEUR-DK-001"
    peso: 0.95

  - id: "FIL-COPY-003"
    filosofia: "Pessoas são muito mais responsivas a escapar da dor do que ganhar prazer"
    fonte: "dan-kennedy" | ref: "FIL-DK-006, MM-DK-011"
    peso: 0.90

  - id: "FIL-COPY-004"
    filosofia: "Hook-Story-Offer — toda comunicação de marketing tem essa estrutura em sua base"
    fonte: "russell-brunson" | ref: "FW-RB-052"
    peso: 0.90

  - id: "FIL-COPY-005"
    filosofia: "Se eu só tivesse uma chance de fazer algo funcionar, usaria uma história"
    fonte: "dan-kennedy" | ref: "FIL-DK-022"
    peso: 0.90

  - id: "FIL-COPY-006"
    filosofia: "Hooks = 80% da performance — o restante é delivery"
    fonte: "alex-hormozi" | ref: "AH-ACQ18K-CMO002"
    peso: 0.85

  - id: "FIL-COPY-007"
    filosofia: "Copy longa funciona — a pessoa interessada lê cada palavra, mesmo 16 páginas"
    fonte: "dan-kennedy" | ref: "FIL-DK-017"
    peso: 0.85

  - id: "FIL-COPY-008"
    filosofia: "Criatividade pela criatividade é desperdício — deve avançar a venda"
    fonte: "dan-kennedy" | ref: "FIL-DK-020"
    peso: 0.85

  - id: "FIL-COPY-009"
    filosofia: "Obrigação moral de não deixar o prospecto não comprar — se acredita no produto, vender com 100% de esforço é ético"
    fonte: "dan-kennedy" | ref: "FIL-DK-038 (7FA-CD8)"
    peso: 0.90

  - id: "FIL-COPY-010"
    filosofia: "Compelling > Pretty: pretty doesn't convert. Compelling converts. Direct response needs to get attention, not be beautiful."
    fonte: "dan-kennedy" | ref: "FIL-DK-145 (ACC-video-DK_9)"
    peso: 0.90

  - id: "FIL-COPY-011"
    filosofia: "Marketing is about what works, not what you like. 'I don't like it' — tough. You're in the business of getting customers, not being comfortable."
    fonte: "dan-kennedy" | ref: "FIL-DK-149 (ACC-video-DK_9)"
    peso: 0.90

  - id: "FIL-COPY-012"
    filosofia: "Toda boa carta de vendas tem um villain — o inimigo claramente identificado torna o herói mais heroico, o problema mais urgente e o produto mais necessário"
    fonte: "dan-kennedy" | ref: "FIL-DK-372 (MH)"
    peso: 0.90

  - id: "FIL-COPY-013"
    filosofia: "Optics > Reality in marketing: como o produto PARECE importa mais do que o que ele É. A percepção é a realidade do prospect — design para a percepção certa"
    fonte: "dan-kennedy" | ref: "FIL-DK-381 (MH)"
    peso: 0.85

  - id: "FIL-COPY-014"
    filosofia: "Copy cannot create desire — it can only take the hopes, dreams, fears and desires that already exist in the hearts of millions of people, and focus those existing desires onto a particular product"
    fonte: "eugene-schwartz" | ref: "FIL-ES-001"
    peso: 0.95

  - id: "FIL-COPY-015"
    filosofia: "Innovation over formula — the copywriter who relies on formulas alone is lost. Breakthrough copy comes from understanding the MARKET, not from fill-in-the-blank templates"
    fonte: "eugene-schwartz" | ref: "FIL-ES-003"
    peso: 0.90

  - id: "FIL-COPY-016"
    filosofia: "The headline is 90% of the ad — if you have ten hours, spend nine on the headline"
    fonte: "eugene-schwartz" | ref: "FIL-ES-004"
    peso: 0.95

  - id: "FIL-COPY-017"
    filosofia: "Long copy outsells short copy — every time, in every test. The interested prospect will read every word"
    fonte: "eugene-schwartz" | ref: "FIL-ES-008"
    peso: 0.90

  - id: "FIL-COPY-018"
    filosofia: "Every word must sell — there is no room for words that do not advance the sale. Every sentence earns the right to the next sentence"
    fonte: "eugene-schwartz" | ref: "FIL-ES-010"
    peso: 0.90

  - id: "FIL-COPY-019"
    filosofia: "Writing mastery requires treating language as a precision instrument — every word, rhythm, and symbol carries meaning beyond its dictionary definition"
    fonte: "eugene-schwartz" | ref: "FIL-ES-011 (BB)"
    peso: 0.85

# ═══════════════════════════════════════════════════════════════════════════════
# HEURÍSTICAS (com números)
# ═══════════════════════════════════════════════════════════════════════════════

heuristicas:
  - id: "HEUR-COPY-001"
    heuristica: "Headline = 70-80% da batalha em direct response"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-001"

  - id: "HEUR-COPY-002"
    heuristica: "Repetir o pitch principal 3-6x dentro da mesma peça"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-007"

  - id: "HEUR-COPY-003"
    heuristica: "Returns esperados em seminário: ~7% (5% imediato, 1% perto deadline, 1% atrasado)"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-004"

  - id: "HEUR-COPY-004"
    heuristica: "Garantia mínima 90 dias, idealmente 1 ano com requisito de uso"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-006"

  - id: "HEUR-COPY-005"
    heuristica: "Em B2B, maioria das vendas fecha entre 3º e 7º contato (RB: 81% após 5º)"
    tipo: numeric | fonte: "dan-kennedy + russell-brunson" | ref: "HEUR-DK-009, HEUR-RB-103"

  - id: "HEUR-COPY-006"
    heuristica: "$1 front-end = $16 de receita em follow-up"
    tipo: numeric | fonte: "russell-brunson" | ref: "HEUR-RB-001"

  - id: "HEUR-COPY-007"
    heuristica: "Mínimo 3 semanas de imersão no produto/mercado antes de escrever o hook"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-051 (7FA-CD10)"

  - id: "HEUR-COPY-008"
    heuristica: "Conversão cold-to-prepared pode dobrar vs cold-to-pitch direto (delay deliberado + pacote de pré-aquecimento)"
    tipo: numeric | fonte: "dan-kennedy" | ref: "MM-DK-041, MET-DK-029 (7FA-CD6)"

  - id: "HEUR-COPY-009"
    heuristica: "Números específicos e incomuns ('247 clientes em 31 dias', '$14.237 em resultados') são 3-7x mais críveis que números redondos ou vagos"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-612 (MH)"

  - id: "HEUR-COPY-010"
    heuristica: "'Free' nunca morre como trigger psicológico — oferta com componente gratuito bem posicionado supera equivalente pago em 3-10x em resposta imediata"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-618 (MH)"

  - id: "HEUR-COPY-011"
    heuristica: "Headline = 90% do ad (Schwartz) vs 70-80% (Kennedy) — convergência: headline é a parte mais importante, 70-90% do resultado"
    tipo: numeric | fonte: "eugene-schwartz" | ref: "FIL-ES-004, HEUR-ES-001"

  - id: "HEUR-COPY-012"
    heuristica: "Market awareness tem 5 níveis — cada nível requer headline completamente diferente. Usar headline de nível errado = zero response"
    tipo: qualitative | fonte: "eugene-schwartz" | ref: "FW-ES-001, HEUR-ES-003"

  - id: "HEUR-COPY-013"
    heuristica: "Market sophistication tem 5 estágios — quando mercado atinge estágio 5 (saturação total), mecanismo único é a ÚNICA saída"
    tipo: qualitative | fonte: "eugene-schwartz" | ref: "FW-ES-002, HEUR-ES-005"

  - id: "HEUR-COPY-014"
    heuristica: "38 técnicas de verbalização de headline — o maior banco de ferramentas de headline jamais compilado, cada uma com aplicação específica por awareness/sophistication"
    tipo: numeric | fonte: "eugene-schwartz" | ref: "FW-ES-005, HEUR-ES-008"

  - id: "HEUR-COPY-015"
    heuristica: "13 formas de intensificar desejo no body copy — cada técnica multiplica o impacto emocional sem inventar desejo novo"
    tipo: numeric | fonte: "eugene-schwartz" | ref: "FW-ES-004, HEUR-ES-010"

# ═══════════════════════════════════════════════════════════════════════════════
# FRAMEWORKS CORE
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  - id: "FW-COPY-001"
    nome: "Pain-Pleasure Sales Sequence (DK)"
    passos: "1. Dor atual → 2. Medo de perder → 3. Alternativa prazerosa → 4. Oferta irresistível"
    fonte: "dan-kennedy" | ref: "FW-DK-004"
    peso: 0.95

  - id: "FW-COPY-002"
    nome: "Hook-Story-Offer (RB)"
    passos: "Hook (atenção) → Story (conexão + desejo) → Offer (ação)"
    fonte: "russell-brunson" | ref: "FW-RB-052"
    peso: 0.90

  - id: "FW-COPY-003"
    nome: "Objection Draining in Copy (DK)"
    passos: "Listar TODAS as razões para não comprar → responder cada uma → fechar"
    fonte: "dan-kennedy" | ref: "FW-DK-007, MET-DK-006"
    peso: 0.90

  - id: "FW-COPY-004"
    nome: "Urgency Construction (DK)"
    passos: "Deadline REAL + razão REAL. Recompensar early + penalizar procrastinadores"
    fonte: "dan-kennedy" | ref: "FW-DK-013"
    peso: 0.90

  - id: "FW-COPY-005"
    nome: "Customer Avatar Deep Dive (DK)"
    passos: "Lista exaustiva sobre avatar → Cristalizar em UMA pessoa → Escrever para ela"
    fonte: "dan-kennedy" | ref: "FW-DK-003, MET-DK-003"
    peso: 0.90

  - id: "FW-COPY-006"
    nome: "Headline Formula Bank (DK)"
    passos: "Build fill-in-the-blank de tablóides + Victor Schwab 100 headlines"
    fonte: "dan-kennedy" | ref: "FW-DK-001"
    peso: 0.85

  - id: "FW-COPY-007"
    nome: "Irresistible Offer Construction (DK)"
    passos: "Core + bonuses + guarantee (outcome-worded) + urgência real + penalty → Snowstorm Test"
    fonte: "dan-kennedy" | ref: "MET-DK-016"
    peso: 0.90

  - id: "FW-COPY-008"
    nome: "Copy Self-Audit 12-Point Checklist (DK)"
    passos: "Headline classified test? Rapport antes pitch? Story completa? Subheads independentes? Dor antes prazer? Involvement devices? Pitch 3+x? Objeções drenadas? Oferta irresistível? Summary? Snowstorm test?"
    fonte: "dan-kennedy" | ref: "MET-DK-028"
    peso: 0.90

  - id: "FW-COPY-009"
    nome: "Lead Gen Inversion (DK)"
    passos: "Warning ad → 16-page letter → decision-maker LIGA para você"
    fonte: "dan-kennedy" | ref: "FW-DK-016, MET-DK-004"
    peso: 0.85

  - id: "FW-COPY-010"
    nome: "Pre-Framing de Expectativas (DK 7FA)"
    passos: "1. Identificar resultado menos desejado possível → 2. Pre-calibrar expectativa na comunicação pré-venda → 3. Posicionar resultado médio como sucesso → 4. Criar deslumbramento quando supera o frame"
    fonte: "dan-kennedy" | ref: "FW-DK-048 (7FA-CD11)"
    peso: 0.85

  - id: "FW-COPY-011"
    nome: "Imersão no Mercado para Descoberta do Hook (DK 7FA)"
    passos: "1. 2-3 semanas com produto/usuários → 2. Entrevistar criadores sobre orgulho → 3. Observação sem filtros → 4. Listar detalhes surpreendentes → 5. 'O que nunca foi dito?' → 6. Headline com detalhe mais surpreendente"
    fonte: "dan-kennedy" | ref: "MM-DK-037, HEUR-DK-051, MET-DK-036 (7FA-CD10)"
    peso: 0.90

  - id: "FW-COPY-012"
    nome: "Venda Fria-para-Preparada com Delay Deliberado (DK 7FA)"
    passos: "1. Identificar prospecto frio → 2. Não fazer pitch — anunciar pacote de informações → 3. Enviar pacote de pré-aquecimento (cases, depoimentos, FAQ) → 4. Aguardar 5-7 dias → 5. Chamada com prospecto preparado"
    fonte: "dan-kennedy" | ref: "MM-DK-041, MET-DK-029 (7FA-CD6)"
    peso: 0.85

  - id: "FW-COPY-013"
    nome: "Collier Principle — Step Into Existing Conversation (DK 12BBS)"
    passos: "1. Identificar diálogo interno do prospecto (3 conversas possíveis) → 2. Alinhar headline/abertura a ESSA conversa → 3. Fornecer certeza específica ao contexto → 4. Chamar para ação dentro do frame"
    fonte: "dan-kennedy" | ref: "MM-DK-044, MM-DK-045, FW-DK-051 (12BBS-CD1A)"
    peso: 0.90

  - id: "FW-COPY-014"
    nome: "Recession Message Alignment (DK 12BBS)"
    passos: "1. Identificar qual das 3 conversas internas o prospecto está tendo → 2. Match da mensagem → 3. Fornecer certeza para agir AGORA → 4. Construir garantia ao redor do medo econômico"
    fonte: "dan-kennedy" | ref: "MET-DK-042, FW-DK-051 (12BBS-CD1A)"
    peso: 0.85

  - id: "FW-COPY-015"
    nome: "Certainty Selling Copy — Conviction Transfer (DK 12BBS)"
    passos: "1. Escrever com convicção ABSOLUTA (não hedging) → 2. Prospecto empresta confiança do copy → 3. Em incerteza de mercado, certeza na copy = diferenciador"
    fonte: "dan-kennedy" | ref: "FW-DK-052, FIL-DK-047 (12BBS-CD1A)"
    peso: 0.85

  - id: "FW-COPY-016"
    nome: "Direct Response vs Brand Marketing Decision (DK ACC)"
    passos: "1. DR = compelling, ugly, high-conversion → 2. Brand = pretty, prestigious, low-conversion → 3. Consultant/coach MUST use DR → 4. Test media against 5 requirements"
    fonte: "dan-kennedy" | ref: "FW-DK-126 (ACC-video-DK_9)"
    peso: 0.90

  - id: "FW-COPY-017"
    nome: "Villain/Enemy Framework (DK Mind Hijacking)"
    passos: "1. Identificar o inimigo do prospect (sistema, indústria, concorrente, crença falsa) → 2. Nomear e personificar o villain claramente → 3. Posicionar prospect como herói que resiste → 4. Produto = arma que derrota o villain → 5. Us-vs-them narrative acima de feature-listing"
    fonte: "dan-kennedy" | ref: "FW-DK-448 (MH)"
    peso: 0.90

  - id: "FW-COPY-018"
    nome: "Big Idea Construction (DK Mind Hijacking)"
    passos: "1. Identificar insight contrarian que inverte crença estabelecida → 2. Formular como afirmação chocante mas defensável → 3. Headline captura a ideia completa (curiosidade + benefício) → 4. Body explica com proof por números específicos → 5. Big Idea = âncora de toda a campanha"
    fonte: "dan-kennedy" | ref: "FW-DK-453 (MH)"
    peso: 0.90

  - id: "FW-COPY-019"
    nome: "New/Improved Cycle (DK Mind Hijacking)"
    passos: "1. Identificar conceito vencedor já comprovado → 2. Adicionar 'New', 'Improved', 'Revised', 'Updated' → 3. Manter benefício central mas reembalar → 4. Adicionar pequeno elemento genuinamente novo → 5. Relançar com urgência de novidade — prospect percebe como descoberta, não repetição"
    fonte: "dan-kennedy" | ref: "FW-DK-461 (MH)"
    peso: 0.85

  # ═══════════════════════════════════════════════════════════════════════════
  # EUGENE SCHWARTZ FRAMEWORKS (the most comprehensive copywriting system)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "FW-COPY-020"
    nome: "5 Levels of Market Awareness (ES — Breakthrough Advertising)"
    passos: "1. Most Aware (knows product, needs deal) → 2. Product-Aware (knows product, not convinced) → 3. Solution-Aware (knows solution exists, not your product) → 4. Problem-Aware (feels problem, no solution known) → 5. Completely Unaware (no problem recognition)"
    fonte: "eugene-schwartz" | ref: "FW-ES-001"
    peso: 0.95
    nota: "FOUNDATIONAL — determines entire headline strategy. Wrong awareness level = dead ad."

  - id: "FW-COPY-021"
    nome: "5 Stages of Market Sophistication (ES — Breakthrough Advertising)"
    passos: "1. Be First (simple direct claim) → 2. Enlarge the Claim (bigger, bolder promises) → 3. Introduce Mechanism (HOW it works) → 4. Enlarge Mechanism (bigger, better mechanism) → 5. Identification (prospect identifies with ad, not claims)"
    fonte: "eugene-schwartz" | ref: "FW-ES-002"
    peso: 0.95
    nota: "FOUNDATIONAL — determines entire copy approach. Stage 5 markets need completely different strategy."

  - id: "FW-COPY-022"
    nome: "7 Techniques of Breakthrough Copy (ES)"
    passos: "1. Intensification (amplify existing desire) → 2. Identification (prospect sees self in ad) → 3. Gradualization (step-by-step belief building) → 4. Redefinition (reframe what product IS) → 5. Mechanization (explain HOW product works) → 6. Concentration (focus on single overwhelming claim) → 7. Camouflage (hide selling behind content)"
    fonte: "eugene-schwartz" | ref: "FW-ES-003"
    peso: 0.90

  - id: "FW-COPY-023"
    nome: "13 Ways to Intensify Desire (ES — Breakthrough Advertising)"
    passos: "Includes: add sensory detail, future-pace the experience, compare to known pleasure, use specific numbers, escalate the promise, reverse the risk, add social proof of desire, create urgency through scarcity, name the enemy, use metaphor to make abstract concrete, stack benefits, dramatize the transformation, use the language of the prospect"
    fonte: "eugene-schwartz" | ref: "FW-ES-004"
    peso: 0.90

  - id: "FW-COPY-024"
    nome: "38 Headline Verbalization Techniques (ES — Breakthrough Advertising)"
    passos: "The largest headline toolkit ever compiled — 38 specific techniques for verbalizing headlines matched to awareness level and sophistication stage. Includes: question headlines, how-to headlines, reason-why headlines, command headlines, news headlines, identification headlines, mechanization headlines, etc."
    fonte: "eugene-schwartz" | ref: "FW-ES-005"
    peso: 0.90
    nota: "Cross-reference with DK's Headline Formula Bank (FW-COPY-006). Schwartz provides the SYSTEM, Kennedy provides the PRACTICE."

  - id: "FW-COPY-025"
    nome: "The Two-Product Model (ES)"
    passos: "1. Product of the product (what it physically IS) → 2. Product of the prospect (what it MEANS to buyer) — always sell the second product, never the first"
    fonte: "eugene-schwartz" | ref: "MM-ES-001"
    peso: 0.90

  - id: "FW-COPY-026"
    nome: "Three Dimensions of the Prospect's Mind (ES)"
    passos: "1. Desires (what they want) → 2. Identifications (who they want to be) → 3. Beliefs (what they accept as true) — copy must address all three dimensions"
    fonte: "eugene-schwartz" | ref: "MM-ES-002"
    peso: 0.90

  - id: "FW-COPY-027"
    nome: "The Awareness Spectrum (ES)"
    passos: "Map prospect position on awareness spectrum → Choose headline type accordingly → Craft body copy that moves prospect from current awareness to Most Aware → Each step must earn the next step"
    fonte: "eugene-schwartz" | ref: "MM-ES-003"
    peso: 0.90

  - id: "FW-COPY-028"
    nome: "The Sophistication Lifecycle (ES)"
    passos: "1. Assess market stage (1-5) → 2. If stage 1-2: simple direct claims work → 3. If stage 3-4: need unique mechanism → 4. If stage 5: need identification/story approach → 5. When current stage exhausted, pioneer the NEXT stage"
    fonte: "eugene-schwartz" | ref: "MM-ES-004"
    peso: 0.90

  - id: "FW-COPY-029"
    nome: "Three Levels of Creativity (ES)"
    passos: "1. Product level (describe features) → 2. Market level (match desires and beliefs) → 3. Breakthrough level (redefine the entire conversation) — Level 3 is where legends are made"
    fonte: "eugene-schwartz" | ref: "MM-ES-007"
    peso: 0.85

  - id: "FW-COPY-030"
    nome: "The Architecture of Belief (ES)"
    passos: "1. Identify current belief system of prospect → 2. Find beliefs compatible with your claim → 3. Build bridge from accepted beliefs to new claim → 4. Each proof point reinforces the bridge → 5. Never attack existing beliefs — extend them"
    fonte: "eugene-schwartz" | ref: "MM-ES-008"
    peso: 0.90

  # --- Brilliance Breakthrough Frameworks ---

  - id: "FW-COPY-031"
    nome: "Discourse Building Method (ES — Brilliance Breakthrough)"
    passos: "Structure written communication as a systematic building of argument — each paragraph EARNS the right to the next, creating an unbreakable chain of logic and emotion"
    fonte: "eugene-schwartz" | ref: "FW-ES-015 (BB)"
    peso: 0.85

  - id: "FW-COPY-032"
    nome: "Symbolism & Metaphor in Copy (ES — Brilliance Breakthrough)"
    passos: "1. Identify abstract concept to communicate → 2. Find concrete symbol/metaphor from prospect's world → 3. Use symbol to make abstract tangible → 4. Extend metaphor through entire piece for coherence"
    fonte: "eugene-schwartz" | ref: "FW-ES-019 (BB)"
    peso: 0.85


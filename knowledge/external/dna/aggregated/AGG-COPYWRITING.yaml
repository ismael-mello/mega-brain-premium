# TENSÕES ENTRE FONTES
# ═══════════════════════════════════════════════════════════════════════════════

tensoes:
  - id: "TENS-COPY-001"
    titulo: "Long copy vs Short copy"
    posicao_dk: "Copy longa sempre funciona — pessoa interessada lê tudo"
    posicao_digital: "Atenção curta, copy curta converte melhor"
    resolucao: "Cold traffic = mais copy. Warm/hot = pode encurtar. High-ticket: long copy ganha."

  - id: "TENS-COPY-002"
    titulo: "Fórmulas vs Criatividade"
    posicao_dk: "Usar fórmulas, criar banco de headlines"
    posicao_es: "Innovation over formula — formulas alone make you lost. Understand the MARKET."
    posicao_brand: "Criatividade diferencia, fórmulas comoditizam"
    resolucao: "Kennedy provides fill-in-the-blank practice. Schwartz provides the WHY behind each technique via awareness/sophistication mapping. Both agree: formulas without market understanding = failure."

  - id: "TENS-COPY-003"
    titulo: "Headline importance: 70-80% (DK) vs 90% (ES)"
    posicao_dk: "Headline = 70-80% da batalha em direct response"
    posicao_es: "The headline is 90% of the ad — spend 9 of 10 hours on it"
    resolucao: "Both agree headline is overwhelmingly dominant. ES's 90% reflects his pure-copy context (print ads). DK's 70-80% accounts for offer/medium variations. Synthesis: headline is 70-90% depending on medium."

  - id: "TENS-COPY-004"
    titulo: "Copy cannot create desire (ES) vs Copy creates urgency (DK)"
    posicao_es: "Copy CANNOT create desire — it can only channel existing desire onto a product"
    posicao_dk: "Urgency construction, villain framing, and pain amplification CREATE motivation to act"
    resolucao: "No real conflict: Schwartz addresses DESIRE (pre-existing want). Kennedy addresses URGENCY (motivation to act NOW). Both are needed: channel desire (ES) + create urgency to act (DK)."


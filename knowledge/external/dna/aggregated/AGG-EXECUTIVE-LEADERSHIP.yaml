# L2: MODELOS MENTAIS (17 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

modelos_mentais:
  - id: "EL-MM-001"
    nome: "Trade-off Thinking"
    descricao: "Every decision has trade-offs — make them explicit, never pretend you can have it all"
    aplicacao: "Decisões estratégicas de alocação de recursos"
    fonte: "ceo"
    peso: 0.70

  - id: "EL-MM-002"
    nome: "Cascade Alignment"
    descricao: "Vision cascades into mission, mission into strategy, strategy into OKRs, OKRs into tasks — misalignment at any level breaks the chain"
    aplicacao: "Alinhamento organizacional top-down"
    fonte: "ceo"
    peso: 0.70

  - id: "EL-MM-003"
    nome: "10x Test"
    descricao: "If you 10x the volume, does the system still work? If not, redesign before scaling"
    aplicacao: "Avaliação de escalabilidade de processos e sistemas"
    fonte: "coo"
    peso: 0.70

  - id: "EL-MM-004"
    nome: "Theory of Constraints"
    descricao: "The output of any system is limited by its bottleneck — find it, fix it, repeat"
    aplicacao: "Otimização operacional"
    fonte: "coo"
    peso: 0.70

  - id: "EL-MM-005"
    nome: "Single Ownership"
    descricao: "Every process, metric, and outcome must have exactly one owner — shared ownership is no ownership"
    aplicacao: "Accountability organizacional"
    fonte: "coo"
    peso: 0.70

  - id: "EL-MM-006"
    nome: "Horizon Thinking"
    descricao: "H1 = core business (cash), H2 = emerging (growth), H3 = future (bets) — allocate differently"
    aplicacao: "Planejamento estratégico multi-horizonte"
    fonte: "ceo"
    peso: 0.70

  - id: "EL-MM-007"
    nome: "Bottom-Up Funnel"
    descricao: "Build marketing from conversion backwards — fix close rates before increasing top of funnel"
    aplicacao: "Priorização de investimento em marketing"
    fonte: "cmo"
    peso: 0.70

  - id: "EL-MM-008"
    nome: "Customer-Back Thinking"
    descricao: "Start with the customer problem, work backwards to the solution — never build looking for a market"
    aplicacao: "Desenvolvimento de produto e GTM"
    fonte: "cmo"
    peso: 0.70

  - id: "EL-MM-009"
    nome: "Boring Technology Principle"
    descricao: "Default to proven, boring technology — save innovation tokens for what truly differentiates"
    aplicacao: "Seleção de stack tecnológico"
    fonte: "cto"
    peso: 0.70

  - id: "EL-MM-010"
    nome: "Reversibility Principle"
    descricao: "Classify decisions as reversible (move fast) or irreversible (move carefully) — most are reversible"
    aplicacao: "Velocidade de tomada de decisão"
    fonte: "cto"
    peso: 0.70

  - id: "EL-MM-011"
    nome: "Simplicity First"
    descricao: "The simplest solution that works is the best solution — complexity is a liability"
    aplicacao: "Arquitetura e design de sistemas"
    fonte: "cto"
    peso: 0.70

  - id: "EL-MM-012"
    nome: "Security by Design"
    descricao: "Security baked into architecture from day one, not bolted on later — retrofitting is 10x more expensive"
    aplicacao: "Arquitetura de segurança"
    fonte: "cio"
    peso: 0.70

  - id: "EL-MM-013"
    nome: "Exit Strategy Thinking"
    descricao: "Evaluate every vendor, platform, and dependency through the lens of: how hard is it to leave?"
    aplicacao: "Avaliação de vendor lock-in"
    fonte: "cio"
    peso: 0.70

  - id: "EL-MM-014"
    nome: "Measured Progress"
    descricao: "Progress without measurement is motion without direction — every initiative needs a metric"
    aplicacao: "Gestão de projetos e OKRs"
    fonte: "coo"
    peso: 0.70

  - id: "EL-MM-015"
    nome: "Anti-Heroics"
    descricao: "Systems should work without heroes — if success depends on one person's overtime, redesign"
    aplicacao: "Design organizacional resiliente"
    fonte: "coo"
    peso: 0.70

  - id: "EL-MM-016"
    nome: "AI Pragmatism"
    descricao: "AI is a tool with specific strengths and limitations — apply it where it creates measurable value, not everywhere"
    aplicacao: "Priorização de iniciativas de AI"
    fonte: "caio"
    peso: 0.70

  - id: "EL-MM-017"
    nome: "Compound Consistency"
    descricao: "Small consistent improvements compound over time — 1% daily improvement = 37x annual improvement"
    aplicacao: "Cultura de melhoria contínua"
    fonte: "coo"
    peso: 0.70


# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTIVE TENSIONS (conflitos entre C-Level roles)
# ═══════════════════════════════════════════════════════════════════════════════

tensoes_produtivas:
  - tensao: "Speed vs Security"
    lado_a: "CEO/CTO: Move fast, ship quickly"
    lado_b: "CIO: Security is foundation, compliance first"
    resolucao: "Security by design enables speed; shortcuts create debt"

  - tensao: "Innovation vs Stability"
    lado_a: "CEO/CAIO: Embrace new technology, AI-first"
    lado_b: "COO/CIO: Stability, proven systems, minimize risk"
    resolucao: "70/20/10 allocation — core stable, adjacent experimental, transformational moonshot"

  - tensao: "Growth vs Profitability"
    lado_a: "CMO: Invest in demand gen, scale marketing"
    lado_b: "COO: Unit economics must work, control costs"
    resolucao: "LTV/CAC > 3:1 as gate; grow only what's profitable"

  - tensao: "Build vs Buy"
    lado_a: "CTO: Build for control and differentiation"
    lado_b: "CIO: Buy proven, reduce maintenance burden"
    resolucao: "Build differentiators, buy commodities, partner for speed"

  - tensao: "Centralization vs Autonomy"
    lado_a: "COO: Standardize processes, single ownership"
    lado_b: "CEO: Empower teams, decentralize decisions"
    resolucao: "Centralize strategy and standards, decentralize execution"

  - tensao: "AI Ambition vs AI Readiness"
    lado_a: "CAIO: AI can transform every function"
    lado_b: "CTO/CIO: Data quality is 80% of success, infrastructure first"
    resolucao: "Start with assisted AI, prove ROI, then scale"


# ═══════════════════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (9 sistemas operacionais)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  - id: "EL-MET-001"
    nome: "Set Vision (CEO)"
    fonte: "ceo"
    passos:
      - "Phase 1 — Discover: Analyze market, competition (Porter's Five Forces), and internal capabilities"
      - "Phase 2 — Define: Craft Vision statement, Mission statement, and strategic pillars"
      - "Phase 3 — Cascade: Translate strategy into OKRs per department, align with 3 Horizons"
      - "Phase 4 — Communicate: Roll out to organization with storytelling, rituals, and cultural artifacts"
    resultado: "Visão estratégica clara, cascateada e comunicada"
    peso: 0.70

  - id: "EL-MET-002"
    nome: "Design Operations (COO)"
    fonte: "coo"
    passos:
      - "Phase 1 — Map: Process mapping AS-IS across all departments, identify bottlenecks"
      - "Phase 2 — Design: Create TO-BE state, define ownership (single owner per process)"
      - "Phase 3 — Implement: Roll out with OKRs, dashboards (3 layers), and cadence structure"
      - "Phase 4 — Optimize: Continuous improvement cycle, scaling readiness assessment"
    resultado: "Operação mapeada, otimizada e escalável"
    peso: 0.70

  - id: "EL-MET-003"
    nome: "Plan GTM (CMO)"
    fonte: "cmo"
    passos:
      - "Phase 1 — Research: ICP definition, market analysis, competitive positioning (STP)"
      - "Phase 2 — Strategy: Channel selection (Bullseye), messaging hierarchy, content pyramid"
      - "Phase 3 — Launch: Soft launch 10%, iterate messaging, then full launch with demand gen funnel"
      - "Phase 4 — Optimize: Attribution analysis, CAC/LTV tracking, channel optimization"
    resultado: "Go-to-market validado e escalável"
    peso: 0.70

  - id: "EL-MET-004"
    nome: "Evaluate Technology (CTO)"
    fonte: "cto"
    passos:
      - "Phase 1 — Assess: Technology Radar scan, engineering maturity assessment (5x4)"
      - "Phase 2 — Decide: Build-Buy-Partner analysis per capability, ADR for each decision"
      - "Phase 3 — Implement: Architecture design (match team size), tech debt budget (15-20%)"
      - "Phase 4 — Govern: Technology Radar updates quarterly, ADR reviews, debt tracking"
    resultado: "Stack tecnológico alinhado com estratégia de negócio"
    peso: 0.70

  - id: "EL-MET-005"
    nome: "Plan Fundraise (CEO)"
    fonte: "ceo"
    passos:
      - "Phase 1 — Readiness: Score all 10 dimensions (target >= 40/50)"
      - "Phase 2 — Materials: Pitch deck (12-15 slides), data room, financial model"
      - "Phase 3 — Outreach: Build tiered list (30-50 investors A/B/C), warm intros first"
      - "Phase 4 — Close: Term sheet negotiation, due diligence, legal closing"
    resultado: "Captação estruturada e profissional"
    peso: 0.70

  - id: "EL-MET-006"
    nome: "Diagnose & Route (Cross C-Level)"
    fonte: "multiple"
    passos:
      - "Rapid Triage: Identify which C-level domain the challenge belongs to"
      - "Route to Expert: CEO (strategy/vision), COO (operations), CMO (market), CTO (technology), CIO (infrastructure), CAIO (AI)"
      - "Prescribe: Apply domain-specific framework"
    resultado: "Diagnóstico rápido com routing para especialista correto"
    peso: 0.70

  - id: "EL-MET-007"
    nome: "Review Quality (Cross C-Level)"
    fonte: "multiple"
    passos:
      - "Evaluate: Output against original brief and success criteria"
      - "Decide: Approve / Revise with notes / Reject with rationale"
      - "Document: Record decision, reasoning, and next steps in ADR or equivalent"
    resultado: "Quality gate para outputs de liderança"
    peso: 0.70

  - id: "EL-MET-008"
    nome: "Vendor Evaluation (CIO)"
    fonte: "cio"
    passos:
      - "Step 1: Define requirements and must-haves"
      - "Step 2: Long list (10-15 vendors)"
      - "Step 3: Score on 8 criteria (functionality, security, scalability, integration, support, pricing, stability, exit strategy)"
      - "Step 4: Short list (3-5 vendors)"
      - "Step 5: POC/pilot with top 2"
      - "Step 6: Reference checks and security audit"
      - "Step 7: Final selection, contract negotiation, onboarding plan"
    resultado: "Vendor selecionado com due diligence completa"
    peso: 0.70

  - id: "EL-MET-009"
    nome: "Process Optimization (COO)"
    fonte: "coo"
    passos:
      - "Step 1: Select process (highest pain/volume)"

# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTIVE TENSIONS (where experts disagree)
# ═══════════════════════════════════════════════════════════════════════════════

productive_tensions:
  - tensao: "Structure as liberation vs Structure as cage"
    lado_a:
      posicao: "Structure enables creativity — the 15-beat sheet liberates, not constrains"
      experts: ["snyder", "coyne", "duarte"]
    lado_b:
      posicao: "Imposed structure kills spontaneity — be obvious, don't plan ahead"
      experts: ["johnstone"]
    resolucao: "Use structure for pre-planned narrative (screenplays, pitches), improvisation for discovery and brainstorming"

  - tensao: "Universal monomyth vs Cultural specificity"
    lado_a:
      posicao: "All stories share the same deep structure — the Hero's Journey is universal"
      experts: ["campbell", "harmon"]
    lado_b:
      posicao: "Genre conventions and cultural context create different story obligations"
      experts: ["coyne", "snyder"]
    resolucao: "Monomyth provides the emotional skeleton; genre and culture provide the muscles and skin"

  - tensao: "Presenter as hero vs Presenter as mentor"
    lado_a:
      posicao: "The pitcher must be the prize — own the room, control the frame"
      experts: ["klaff"]
    lado_b:
      posicao: "The audience is the hero — the presenter is the mentor who guides"
      experts: ["duarte", "howell"]
    resolucao: "Context-dependent: in investment pitches, be the prize; in presentations and brand narratives, be the mentor"

  - tensao: "Simplicity vs Complexity of story models"
    lado_a:
      posicao: "ABT and Normal-Explosion-New Normal — keep it simple, 3 elements max"
      experts: ["howell", "hall"]
    lado_b:
      posicao: "17-stage Hero's Journey, 15-Beat Sheet, Story Grid — depth requires complexity"
      experts: ["campbell", "snyder", "coyne"]
    resolucao: "Match model complexity to story scale — ABT for emails, Story Grid for novels"

  - tensao: "Rational planning vs Emotional intuition"
    lado_a:
      posicao: "Frame control, STRONG method — pitch is strategic warfare with planned moves"
      experts: ["klaff"]
    lado_b:
      posicao: "Story comes from the heart — authentic narrative emerges from values and lived experience"
      experts: ["ganz", "dicks"]
    resolucao: "Strategy provides the container; authenticity provides the content — both are necessary"

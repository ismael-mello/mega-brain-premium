# ═══════════════════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (15 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  - id: "ST-MET-001"
    nome: "Story Analysis via Story Grid"
    fonte: "coyne"
    passos:
      - "Identify global genre and subgenre"
      - "Map conventions and obligatory scenes for that genre"
      - "Create scene-by-scene spreadsheet with value shifts"
      - "Apply Five Commandments to each scene"
      - "Diagnose gaps: missing turning points, flat values, broken conventions"
      - "Prescribe fixes based on diagnosis"
    resultado: "Complete diagnostic and repair plan for any narrative"
    peso: 0.70

  - id: "ST-MET-002"
    nome: "Build Narrative (Multi-Framework Routing)"
    fonte: "multiple"
    passos:
      - "Assess story type: personal, brand, pitch, movement, or entertainment"
      - "Route to primary framework: Dicks (personal), Hall (brand), Klaff (pitch), Ganz (movement), Campbell/Harmon/Snyder (entertainment)"
      - "Apply framework structure to raw material"
      - "Layer stakes using Dicks' 5 Stakes Tools"
      - "Validate with Coyne's Five Commandments"
      - "Polish with ABT at sentence/paragraph level"
    resultado: "Complete narrative built with the right framework for the context"
    peso: 0.70

  - id: "ST-MET-003"
    nome: "Create Pitch (STRONG + Sparkline hybrid)"
    fonte: "klaff/duarte"
    passos:
      - "Set the frame: establish authority and context (Klaff)"
      - "Open with What Is vs What Could Be tension (Duarte)"
      - "Tell the origin story with STRONG intrigue (Klaff)"
      - "Toggle between current reality and possibility every 45-90 sec (Duarte)"
      - "Offer the prize: position yourself as the opportunity (Klaff)"
      - "Land the S.T.A.R. Moment (Duarte)"
      - "Close with urgency and call to action"
    resultado: "Pitch that controls frames while maintaining narrative tension"
    peso: 0.70

  - id: "ST-MET-004"
    nome: "Create Presentation (Duarte Method)"
    fonte: "duarte"
    passos:
      - "Define Big Idea in one sentence"
      - "Map audience: who are they, what do they believe, what do they resist?"
      - "Build Sparkline: alternate What Is / What Could Be"
      - "Design S.T.A.R. Moment for peak memorability"
      - "Apply 3-second slide rule to every visual"
      - "End with New Bliss: paint the transformed future"
    resultado: "Presentation that positions audience as hero and drives adoption"
    peso: 0.70

  - id: "ST-MET-005"
    nome: "Diagnose & Route (Story Chief Method)"
    fonte: "multiple"
    passos:
      - "Listen to the story/problem"
      - "Classify: entertainment, business, personal, pitch, or movement?"
      - "Assess scale: anecdote, vignette, or full story?"
      - "Route to specialist framework"
      - "Apply framework and validate with Five Commandments"
      - "Deliver recommendation with rationale"
    resultado: "Correct framework selection and application for any narrative need"
    peso: 0.70

  - id: "ST-MET-006"
    nome: "Creative Unblocking (Johnstone Method)"
    fonte: "johnstone"
    passos:
      - "Identify the block: fear of judgment, perfectionism, or blank mind?"
      - "Apply 'Be Obvious' — say the first thing that comes to mind"
      - "Use Yes And to build on any starting point"
      - "Play status games to unlock character dynamics"
      - "Practice free-association: accept every offer your mind makes"
      - "Graduate to Platform-Tilt-Resolution for structured improvisation"
    resultado: "Restored creative flow and spontaneous narrative generation"
    peso: 0.70

  - id: "ST-MET-007"
    nome: "Write Manifesto (Ganz Public Narrative)"
    fonte: "ganz"
    passos:
      - "Story of Self: What personal experience called you to this cause?"
      - "Story of Us: What values and experiences do we share as a community?"
      - "Story of Now: What urgent challenge demands action right now?"
      - "Weave three stories into one escalating narrative"
      - "End with specific, measurable call to action"
      - "Distribute through Snowflake Model — equip leaders to retell"
    resultado: "Movement-building manifesto that converts belief into collective action"
    peso: 0.70

  - id: "ST-MET-008"
    nome: "Homework for Life (Daily Practice)"
    fonte: "dicks"
    passos:
      - "At end of each day, ask: What was the most storyworthy moment today?"
      - "Record in spreadsheet: date, one-line description, emotional core"
      - "Do NOT write the full story — just capture the seed"
      - "Review monthly: patterns, recurring themes, connected moments"
      - "Select strongest seeds for full story development"
    resultado: "Infinite story bank that grows daily — never run out of stories"
    peso: 0.70

  - id: "ST-MET-009"
    nome: "Story Mining: Crash & Burn"
    fonte: "dicks"
    passos:
      - "Set timer for 2 minutes"
      - "Pick a random prompt (a word, image, or memory)"
      - "Talk nonstop — no filtering, no editing, no pausing"
      - "Record everything (phone voice memo)"
      - "Review: identify moments of genuine emotion or surprise"
      - "Develop those moments into full stories"
    resultado: "Rapid discovery of hidden stories through free-association"
    peso: 0.70

  - id: "ST-MET-010"
    nome: "Self-Stories Rewriting (CACI Method)"
    fonte: "hall"
    passos:
      - "Catch: Notice a limiting story you tell yourself"
      - "Analyze: Is it true? Is it helpful? What evidence contradicts it?"
      - "Choose: Select a new, empowering story that is also true"
      - "Install: Repeat the new story in key moments until it replaces the old one"
    resultado: "Transformed self-narrative that enables new behaviors and outcomes"
    peso: 0.70

  - id: "ST-MET-011"
    nome: "ABT Diagnostic"
    fonte: "howell"
    passos:
      - "Take any piece of communication (email, pitch, bio, about page)"
      - "Attempt to reduce it to ABT: [Setup] AND [Setup] BUT [Problem] THEREFORE [Action]"
      - "If it fails to reduce: the communication lacks narrative structure"
      - "Rewrite using ABT as skeleton"
      - "Expand from ABT skeleton to full piece"
    resultado: "Any communication transformed from listing (AAA) to narrative (ABT)"
    peso: 0.70

  - id: "ST-MET-012"
    nome: "Editor's Six Core Questions"
    fonte: "coyne"
    passos:
      - "What is the global genre? (content + style)"
      - "What are the conventions and obligatory scenes?"
      - "What is the controlling idea/theme?"
      - "What is the beginning hook, middle build, ending payoff?"
      - "Does each scene turn on a value?"
      - "What is the point of view and narrative device?"
    resultado: "Complete editorial diagnosis of any manuscript or screenplay"
    peso: 0.70

  - id: "ST-MET-013"
    nome: "Frame Stacking for Pitches"
    fonte: "klaff"
    passos:
      - "Identify the default frames in the room (Power, Analyst, etc.)"
      - "Prepare counter-frames: Prize Frame against Power, Intrigue against Analyst"
      - "Open with frame disruption — break expectations in first 60 seconds"
      - "Stack frames: establish Prize Frame → layer Time Frame → add Moral Authority"
      - "Maintain frame control through Hot Cognition triggers"
      - "Close from a position of strength — you are the prize"
    resultado: "Total frame control in high-stakes pitches and negotiations"
    peso: 0.70

  - id: "ST-MET-014"
    nome: "Sparkline Presentation Build"
    fonte: "duarte"
    passos:
      - "Research audience deeply — fears, hopes, current beliefs"
      - "Define Big Idea in one sentence"
      - "Map What Is (current pain/reality) moments"
      - "Map What Could Be (future possibility) moments"
      - "Alternate between the two — creating tension and release"
      - "Design S.T.A.R. Moment at the emotional peak"
      - "End with New Bliss: vivid picture of transformed future"
      - "Apply 3-second slide rule to all visuals"
    resultado: "Presentation that moves audience from resistance to action"
    peso: 0.70

  - id: "ST-MET-015"
    nome: "Story Cycle Brand Narrative"
    fonte: "howell"
    passos:
      - "Define your audience as the hero (not your brand)"
      - "Identify their backstory and current situation"
      - "Clarify their desire (what they want)"
      - "Name the problem/villain (what's in the way)"
      - "Position your brand as the mentor/guide"
      - "Offer the plan (your solution)"
      - "Describe the battle (transformation process)"
      - "Paint the climax (moment of triumph)"
      - "Articulate the moral/new normal"
      - "Test with ABT: does it reduce cleanly?"
    resultado: "Complete brand narrative that positions customer as hero"
    peso: 0.70


    - nome: "Kindra Hall"
      especialidade: "Business Storytelling & Brand Narrative"
      key_framework: "4 Stories Every Business Needs, Story Gap, Normal-Explosion-New Normal, Self-Stories CACI"

  presentation_communication:
    - nome: "Nancy Duarte"

# L2: MODELOS MENTAIS (30 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

modelos_mentais:
  # --- CAMPBELL ---
  - id: "ST-MM-001"
    conteudo: "Comparative Method / Elementargedanken vs Volkergedanken"
    descricao: "Universal motifs (elementary ideas) manifest differently across cultures (folk ideas) — same core, different costumes"
    aplicacao: "Identify universal story patterns beneath surface-level cultural variation"
    fonte: "campbell"
    peso: 0.70

  - id: "ST-MM-002"
    conteudo: "Four Functions of Myth"
    descricao: "Mystical (awe), Cosmological (universe model), Sociological (social order), Pedagogical (how to live)"
    aplicacao: "Diagnose which function a narrative is serving or failing to serve"
    fonte: "campbell"
    peso: 0.70

  - id: "ST-MM-003"
    conteudo: "Eight Archetypes"
    descricao: "Hero, Mentor, Threshold Guardian, Herald, Shapeshifter, Shadow, Trickster, Ally"
    aplicacao: "Cast characters by archetypal function, not surface personality"
    fonte: "campbell"
    peso: 0.70

  # --- HARMON ---
  - id: "ST-MM-004"
    conteudo: "Fractal Story Structure"
    descricao: "The Story Circle pattern repeats at every level — series, season, episode, scene, beat"
    aplicacao: "Apply the same 8-step circle at any scale of narrative"
    fonte: "harmon"
    peso: 0.70

  - id: "ST-MM-005"
    conteudo: "Death and Rebirth Engine"
    descricao: "Every complete story requires symbolic death (of old self/beliefs) and rebirth (new understanding)"
    aplicacao: "Ensure protagonist undergoes genuine transformation, not surface change"
    fonte: "harmon/campbell"
    peso: 0.70

  - id: "ST-MM-006"
    conteudo: "Comfort Zone / Unfamiliar Zone"
    descricao: "Top half of circle = order/comfort, bottom half = chaos/unfamiliar — crossing is the story"
    aplicacao: "Map character position on circle to calibrate tension and pacing"
    fonte: "harmon"
    peso: 0.70

  # --- SNYDER ---
  - id: "ST-MM-007"
    conteudo: "Primal Resonance Test"
    descricao: "Does the story concept tap into a primal urge (survival, love, fear, belonging)?"
    aplicacao: "Validate story premise before investing in development"
    fonte: "snyder"
    peso: 0.70

  - id: "ST-MM-008"
    conteudo: "10 Genre Types as Story DNA"
    descricao: "Monster in the House, Golden Fleece, Out of the Bottle, Dude with a Problem, Rites of Passage, Buddy Love, Whydunit, Fool Triumphant, Institutionalized, Superhero"
    aplicacao: "Classify story to understand its structural obligations"
    fonte: "snyder"
    peso: 0.70

  # --- COYNE ---
  - id: "ST-MM-009"
    conteudo: "Genre as Contract"
    descricao: "Each genre promises specific reader/viewer experiences — violating the contract loses the audience"
    aplicacao: "Identify genre conventions and obligatory scenes before writing"
    fonte: "coyne"
    peso: 0.70

  - id: "ST-MM-010"
    conteudo: "Value Shift as Story Unit"
    descricao: "The smallest unit of story is a value change (positive to negative or vice versa)"
    aplicacao: "Audit every scene for value shift — no shift = no story"
    fonte: "coyne"
    peso: 0.70

  - id: "ST-MM-011"
    conteudo: "Negation of the Negation"
    descricao: "Beyond the negative lies something worse — the darkest exploration of a theme (e.g., beyond failure is self-destruction)"
    aplicacao: "Push crisis to the deepest possible value to maximize impact"
    fonte: "coyne"
    peso: 0.70

  - id: "ST-MM-012"
    conteudo: "Four-Point Value Spectrum"
    descricao: "Positive → Contrary → Contradictory → Negation of Negation — the full range of a value"
    aplicacao: "Map the complete emotional range of your story's controlling idea"
    fonte: "coyne"
    peso: 0.70

  # --- DICKS ---
  - id: "ST-MM-013"
    conteudo: "Five-Second Moment Focus"
    descricao: "Every story aims at one precise moment of realization — the instant of change"
    aplicacao: "Identify the five-second moment FIRST, then build the story around it"
    fonte: "dicks"
    peso: 0.70

  - id: "ST-MM-014"
    conteudo: "Opposite Beginning"
    descricao: "Start at the emotional/situational opposite of where you end — maximum arc"
    aplicacao: "Design opening scene as mirror-opposite of climax"
    fonte: "dicks"
    peso: 0.70

  - id: "ST-MM-015"
    conteudo: "Story Scale Taxonomy"
    descricao: "Anecdote → Vignette → Story — each has different stakes, length, and transformation depth"
    aplicacao: "Choose the right scale for the moment and audience"
    fonte: "dicks"
    peso: 0.70

  # --- HALL ---
  - id: "ST-MM-016"
    conteudo: "Story Gap Diagnostic"
    descricao: "The gap between where you are and where you could be reveals where story is needed most"
    aplicacao: "Identify business/personal narrative gaps that need bridging"
    fonte: "hall"
    peso: 0.70

  - id: "ST-MM-017"
    conteudo: "Normal-Explosion-New Normal"
    descricao: "Simplest story arc: establish status quo, disrupt it, show the new reality"
    aplicacao: "Quick story structure for any business context"
    fonte: "hall"
    peso: 0.70

  # --- DUARTE ---
  - id: "ST-MM-018"
    conteudo: "Audience as Hero"
    descricao: "The presenter/brand is the mentor, the audience is the hero who must transform"
    aplicacao: "Reframe all communication from audience's perspective"
    fonte: "duarte/howell"
    peso: 0.70

  - id: "ST-MM-019"
    conteudo: "What Is vs What Could Be"
    descricao: "Alternate between current reality and future possibility to create tension and desire"
    aplicacao: "Structure presentations as oscillation between states"
    fonte: "duarte"
    peso: 0.70

  # --- HOWELL ---
  - id: "ST-MM-020"
    conteudo: "ABT vs AAA"
    descricao: "And-But-Therefore (narrative) vs And-And-And (listing) — narrative always wins engagement"
    aplicacao: "Diagnose and fix boring communication by replacing AAA with ABT"
    fonte: "howell"
    peso: 0.70

  - id: "ST-MM-021"
    conteudo: "5 Primal Elements of Story"
    descricao: "Character, intention, obstacle, stakes, transformation — remove any one and story collapses"
    aplicacao: "Checklist for narrative completeness"
    fonte: "howell"
    peso: 0.70

  # --- JOHNSTONE ---
  - id: "ST-MM-022"
    conteudo: "Status Seesaw"
    descricao: "In every interaction, status flows between participants — raising yours lowers theirs and vice versa"
    aplicacao: "Craft dynamic scenes by consciously shifting status between characters"
    fonte: "johnstone"
    peso: 0.70

  - id: "ST-MM-023"
    conteudo: "Internal Censor"
    descricao: "The voice that says 'that's not good enough' before an idea can develop — creativity's enemy"
    aplicacao: "Recognize and silence self-censorship to unlock spontaneous narrative"
    fonte: "johnstone"
    peso: 0.70

  - id: "ST-MM-024"
    conteudo: "Offers and Blocks"
    descricao: "Every narrative contribution is either an offer (adds possibility) or a block (kills possibility)"
    aplicacao: "Train collaborators to make offers, not blocks — build on what's given"
    fonte: "johnstone"
    peso: 0.70

  # --- KLAFF ---
  - id: "ST-MM-025"
    conteudo: "Croc Brain Filter"
    descricao: "The reptilian brain filters all incoming messages for threat/novelty — boring = threat = ignore"
    aplicacao: "Design pitch openings that pass the croc brain's novelty filter"
    fonte: "klaff"
    peso: 0.70

  - id: "ST-MM-026"
    conteudo: "Hot vs Cold Cognition"
    descricao: "Emotional (hot) processing drives decisions; analytical (cold) processing rationalizes them after"
    aplicacao: "Lead with emotional hooks, provide rational justification second"
    fonte: "klaff"
    peso: 0.70

  - id: "ST-MM-027"
    conteudo: "Frame Collision"
    descricao: "When two frames meet, only one survives — the stronger frame absorbs the weaker"
    aplicacao: "Prepare dominant frames before entering high-stakes conversations"
    fonte: "klaff"
    peso: 0.70

  - id: "ST-MM-028"
    conteudo: "Prize Frame Inversion"
    descricao: "The person who is the prize controls the dynamic — invert buyer/seller frame"
    aplicacao: "Position yourself as the prize in pitches and negotiations"
    fonte: "klaff"
    peso: 0.70

  # --- GANZ ---
  - id: "ST-MM-029"
    conteudo: "Values-to-Action Bridge"
    descricao: "Stories convert abstract values into felt urgency — the emotional catalyst for action"
    aplicacao: "When audience knows but doesn't act, the missing piece is narrative"
    fonte: "ganz"
    peso: 0.70

  - id: "ST-MM-030"
    conteudo: "Strategic Capacity / Self-Us-Now Escalation"
    descricao: "Start with personal story (Self), expand to shared identity (Us), then call to immediate action (Now)"
    aplicacao: "Structure movement-building communication in three expanding circles"
    fonte: "ganz"
    peso: 0.70

# ═══════════════════════════════════════════════════════════════════════════════
# L3: HEURÍSTICAS (24 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

heuristicas:
  # --- TIMING & PACING ---
  - id: "ST-HEUR-001"
    conteudo: "Elephant within first 30-60 seconds — state the central tension immediately"
    tipo: "quantitativa"
    fonte: "dicks"
    peso: 0.70

  - id: "ST-HEUR-002"
    conteudo: "Toggle What Is / What Could Be every 45-90 seconds in presentations"
    tipo: "quantitativa"
    fonte: "duarte"
    peso: 0.70

  - id: "ST-HEUR-003"
    conteudo: "Every slide must be processable in ~3 seconds or it's too complex"
    tipo: "quantitativa"
    fonte: "duarte"
    peso: 0.70

  - id: "ST-HEUR-004"
    conteudo: "Hookpoint must land in first 5 minutes of any pitch or attention is gone"
    tipo: "quantitativa"
    fonte: "klaff"
    peso: 0.70

  - id: "ST-HEUR-005"
    conteudo: "Flash Roll: 30-60 seconds of rapid credibility stacking at pitch opening"
    tipo: "quantitativa"
    fonte: "klaff"
    peso: 0.70

  - id: "ST-HEUR-006"
    conteudo: "Status is established in the first 30 seconds of any meeting — own it or lose it"
    tipo: "quantitativa"
    fonte: "klaff"
    peso: 0.70

  - id: "ST-HEUR-007"
    conteudo: "A business story should be 60-90 seconds — long enough for arc, short enough for attention"
    tipo: "quantitativa"
    fonte: "hall"
    peso: 0.70

  # --- STRUCTURE ---
  - id: "ST-HEUR-008"
    conteudo: "40 cards average for feature film on The Board — each card = one scene"
    tipo: "quantitativa"
    fonte: "snyder"
    peso: 0.70

  - id: "ST-HEUR-009"
    conteudo: "Only ONE piece of magic per movie — audience accepts one impossible premise, not two"
    tipo: "qualitativa"
    fonte: "snyder"
    peso: 0.70

  - id: "ST-HEUR-010"
    conteudo: "Break Into Two at page 25 must be a DECISION by the hero, not something that happens to them"
    tipo: "quantitativa"
    fonte: "snyder"
    peso: 0.70

  - id: "ST-HEUR-011"
    conteudo: "If you can't state your story in ABT form, you don't know your story yet"
    tipo: "qualitativa"
    fonte: "howell"
    peso: 0.70

  - id: "ST-HEUR-012"
    conteudo: "Every scene must contain all Five Commandments or it fails — Inciting Incident, Progressive Complication, Crisis, Climax, Resolution"
    tipo: "qualitativa"
    fonte: "coyne"
    peso: 0.70

  - id: "ST-HEUR-013"
    conteudo: "Use But and Therefore to connect story beats — never And (And = listing, not narrative)"
    tipo: "qualitativa"
    fonte: "dicks"
    peso: 0.70

  # --- NARRATIVE CRAFT ---
  - id: "ST-HEUR-014"
    conteudo: "Start the story as close to the end as possible — no unnecessary setup"
    tipo: "qualitativa"
    fonte: "dicks"
    peso: 0.70

  - id: "ST-HEUR-015"
    conteudo: "Begin at the opposite emotional state of the ending — maximum transformation arc"
    tipo: "qualitativa"
    fonte: "dicks"
    peso: 0.70

  - id: "ST-HEUR-016"
    conteudo: "Platform-Tilt-Resolution: establish normal, disrupt it, reestablish new normal"
    tipo: "qualitativa"
    fonte: "johnstone"
    peso: 0.70

  - id: "ST-HEUR-017"
    conteudo: "Story Cancer: reincorporation cures it — if you introduced it, bring it back"
    tipo: "qualitativa"
    fonte: "johnstone"
    peso: 0.70

  - id: "ST-HEUR-018"
    conteudo: "Never cancel a story — accept every offer and build on it"
    tipo: "qualitativa"
    fonte: "johnstone"
    peso: 0.70

  # --- PRESENTATION & PITCH ---
  - id: "ST-HEUR-019"
    conteudo: "One Big Idea per presentation — if you have two, you have zero"
    tipo: "qualitativa"
    fonte: "duarte"
    peso: 0.70

  - id: "ST-HEUR-020"
    conteudo: "End with a S.T.A.R. Moment: Something They'll Always Remember"
    tipo: "qualitativa"
    fonte: "duarte"
    peso: 0.70

  - id: "ST-HEUR-021"
    conteudo: "When frames collide, the stronger frame wins — always enter with the strongest frame"
    tipo: "qualitativa"
    fonte: "klaff"
    peso: 0.70

  # --- MOVEMENT & LEADERSHIP ---
  - id: "ST-HEUR-022"
    conteudo: "Start with Self (personal), expand to Us (shared), then Now (urgent action)"
    tipo: "qualitativa"
    fonte: "ganz"
    peso: 0.70

  - id: "ST-HEUR-023"
    conteudo: "A movement narrative without Now has no urgency — people agree but don't act"
    tipo: "qualitativa"
    fonte: "ganz"
    peso: 0.70

  - id: "ST-HEUR-024"
    conteudo: "Story without stakes is just a report — always identify what's at risk"
    tipo: "qualitativa"
    fonte: "multiple"
    peso: 0.70


    - nome: "Park Howell"
      especialidade: "Brand Storytelling & Narrative Strategy"
      key_framework: "ABT Framework, Story Cycle System 10 steps, 5 Primal Elements, Narrative Fitness"

  improvisation_performance:
    - nome: "Keith Johnstone"
      especialidade: "Improvisation & Spontaneous Narrative"
      key_framework: "Status Transactions, Yes And, Offers/Blocks, Platform-Tilt-Resolution, Story Cancer"

  pitch_persuasion:
    - nome: "Oren Klaff"
      especialidade: "Pitch & Deal-Making Narrative"
      key_framework: "STRONG Method, Frame Control 5 frames, Crocodile Brain Theory, Hot/Cold Cognition, Prize Frame"

  social_movement:
    - nome: "Marshall Ganz"
      especialidade: "Social Movement Narrative & Organizing"
      key_framework: "Public Narrative Self/Us/Now, Five Organizing Practices, Enabling Leadership, Snowflake Model"


      - "Immediately consumable (not a 200-page ebook nobody reads)"
      - "Solves ONE specific pain point (not everything)"
      - "Creates desire for the paid offer (teases the full solution)"
      - "Demonstrates your expertise (builds certainty on YOU)"
    regra: "Bribe quality = funnel quality. Garbage bribe = garbage leads."
    aplicacao: "Lead magnet design for funnel entry"
    batches: ["JB-SLM"]


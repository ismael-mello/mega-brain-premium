        argumento: "Mercado USA comporta"
      - fonte: "FULL-SALES-SYSTEM"
        posicao: "R$5k-15k ticket médio (equivalente a $1k-3k)"
        argumento: "Calibração para poder aquisitivo BR"
    resolucao: |

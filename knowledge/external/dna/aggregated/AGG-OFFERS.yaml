    batches: ["BATCH-009", "BATCH-012"]

  # The Scalable Company - Value Engines
  - id: "FW-OFF-011"
    nome: "3 Value Engines"
    fonte_primaria: "THE-SCALABLE-COMPANY"
    peso: 0.82
    engines:
      - nome: "Growth Engine"
        fluxo: "Traffic → Lead → Sales → Customer"
        foco: "Aquisição"
      - nome: "Fulfillment Engine"
        fluxo: "Onboard → Deliver → Success → Ascend"
        foco: "Entrega e retenção"
      - nome: "Innovation Engine"
        fluxo: "Problem → Solution → Product → Validate"
        foco: "Novos produtos/ofertas"
    regra: "Cada oferta deve alimentar pelo menos um engine"
    aplicacao: "Design de ofertas escaláveis"
    batches: ["BATCH-085", "BATCH-086"]

  # Jordan Belfort - SLM Offer Frameworks
  - id: "FW-OFF-012"
    nome: "SLO (Self-Liquidating Offer) Funnel Architecture"
    fonte_primaria: "jordan-belfort"
    peso: 0.80
    estrutura:
      front_end:
        - "Opt-in bribe (free report, video, tool) to capture lead"
        - "SLO offer ($7-$47) to recover ad spend immediately"
        - "Goal: break-even on acquisition, not profit"
      upsells:
        - "Upsell 1: Natural complement to SLO ($97-$297)"
        - "Upsell 2: Premium version or bundle ($497-$997)"
        - "Step-Down: If main upsell refused, offer lighter version"
      back_end:
        - "Email sequence sells core offer ($997-$2997+)"
        - "Phone sales for high-ticket (Straight Line in person)"
    regra: "Front-end MUST at least break-even. All profit comes from upsells + back-end."
    aplicacao: "Digital funnel offer stack design"
    batches: ["JB-SLM"]

  - id: "FW-OFF-013"
    nome: "Opt-In Bribe Engineering (JB SLM)"
    fonte_primaria: "jordan-belfort"
    peso: 0.75
    componentes:

# FRAMEWORKS CONSOLIDADOS (Cross-Source)
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  # Alex Hormozi - Core Frameworks
  - id: "FW-OFF-001"
    nome: "Grand Slam Offer Framework"
    fonte_primaria: "alex-hormozi"
    peso: 0.95
    componentes:
      - "Dream Outcome: O que eles realmente querem?"
      - "Perceived Likelihood: Quão provável parece alcançar?"
      - "Time Delay: Quão rápido conseguem?"
      - "Effort & Sacrifice: Quão fácil é o processo?"
    formula: "Value = (Dream Outcome × Perceived Likelihood) / (Time Delay × Effort)"
    aplicacao: "Design de qualquer oferta"
    batches: ["BATCH-127", "BATCH-128"]

  - id: "FW-OFF-002"
    nome: "Value Equation"
    fonte_primaria: "alex-hormozi"
    peso: 0.95
    estrutura: |
      VALOR = (Resultado Sonho × Probabilidade Percebida)
              ────────────────────────────────────────
              (Tempo de Espera × Esforço/Sacrifício)

      Para AUMENTAR valor:
      - Aumentar resultado prometido
      - Aumentar certeza de sucesso
      - Diminuir tempo para resultado
      - Diminuir esforço necessário
    aplicacao: "Otimização de ofertas"
    batches: ["BATCH-127"]

  - id: "FW-OFF-003"
    nome: "Core Four - Os 4 Pilares de Aquisição"
    fonte_primaria: "alex-hormozi"
    peso: 0.92
    pilares:
      - "Warm Outreach: Lista existente, relacionamentos"
      - "Cold Outreach: Prospecção ativa sem relação prévia"
      - "Paid Ads: Tráfego pago (Meta, Google, YouTube)"
      - "Content: Conteúdo orgânico, autoridade"
    regra: "Dominar UM antes de adicionar outro"
    aplicacao: "Go-to-market strategy"
    batches: ["BATCH-128"]

  - id: "FW-OFF-004"
    nome: "5 C's do Fechamento"
    fonte_primaria: "alex-hormozi"
    peso: 0.90
    componentes:
      - "Clarify: Esclarecer a objeção real"
      - "Condone: Validar, não julgar"
      - "Correct: Corrigir premissa falsa"
      - "Confirm: Confirmar entendimento"
      - "Close: Fechar ou próximo passo"
    aplicacao: "Handling de objeções sobre oferta"
    batches: ["BATCH-127"]

  # Jeremy Haynes - Offer Models
  - id: "FW-OFF-005"
    nome: "4 Modelos de Oferta High-Ticket"
    fonte_primaria: "jeremy-haynes"
    peso: 0.90
    modelos:
      - nome: "One-Time DFY"
        estrutura: "Entrega única, preço alto, sem recurring"
        exemplo: "$25k-$100k one-time"
      - nome: "Ongoing DFY"
        estrutura: "Entrega contínua, retainer mensal"
        exemplo: "$10k-$30k/mês"
      - nome: "Ongoing Access"
        estrutura: "Acesso a comunidade/mentoria"
        exemplo: "$5k-$15k/mês"
      - nome: "Ongoing Results"
        estrutura: "Pagamento por performance"
        exemplo: "% do resultado + mínimo"
    aplicacao: "Escolha de modelo de monetização"
    batches: ["BATCH-068", "BATCH-071"]

  - id: "FW-OFF-006"
    nome: "Mini Webinar 2.0"
    fonte_primaria: "jeremy-haynes"
    peso: 0.88
    estrutura:
      - "15-20 minutos max (vs 60-90 tradicional)"
      - "1 Big Idea, não 3"
      - "Stack simplificado"
      - "CTA direto para call"
    metricas: "$12M em 3.5 meses"
    aplicacao: "Apresentação de oferta em escala"
    batches: ["BATCH-082", "BATCH-083"]

  - id: "FW-OFF-007"
    nome: "DSL - Deck Sales Letter"
    fonte_primaria: "jeremy-haynes"
    peso: 0.85

    fonte_primaria: "FULL-SALES-SYSTEM"
    peso: 0.85
    tiers:
      - tier: "Front End (FE)"
        ticket: "R$97 - R$997"
        objetivo: "Aquisição, break-even"
        modelo: "DIY, self-service"
      - tier: "Back End (BE)"
        ticket: "R$2k - R$15k"

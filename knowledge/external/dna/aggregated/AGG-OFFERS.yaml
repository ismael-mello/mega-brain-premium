      - fonte: "jeremy-haynes"
        posicao: "Mini Webinar 15-20min + DSL"
        argumento: "Atenção curta, 77% engagement vs 5-9%"
    resolucao: |
      SEGMENTO-DEPENDENTE:
      - Mass market, paid ads: Mini Webinar/DSL

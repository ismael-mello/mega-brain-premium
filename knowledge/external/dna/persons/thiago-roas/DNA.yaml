heuristicas:
  - id: "HEUR-TR-001"
    text: "Ticket ótimo para perpétuo público frio: R$297 (ticket ouro)."
    type: "numérica"
    domain: "precificação"
    source: "Hotmart Cast"

  - id: "HEUR-TR-002"
    text: "Upsell ideal: R$597-697, para fechar ticket médio de ~R$1.000."
    type: "numérica"
    domain: "precificação"
    source: "Hotmart Cast"

  - id: "HEUR-TR-003"
    text: "Taxa de conversão de upsell: buscar 10-20%."
    type: "numérica"
    domain: "conversão"
    source: "Hotmart Cast"

  - id: "HEUR-TR-004"
    text: "Taxa de recuperação no downsell: buscar 5-10%."
    type: "numérica"
    domain: "conversão"
    source: "Hotmart Cast"

  - id: "HEUR-TR-005"
    text: "Visualização de página: mínimo 70% de quem clica no anúncio deve visualizar a página."
    type: "numérica"
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-006"
    text: "Checkout rate: entre 10-20% de quem visualiza a página deve ir para o checkout."
    type: "numérica"
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-007"
    text: "Taxa de conversão do checkout: em torno de 20%."
    type: "numérica"
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-008"
    text: "Taxa de conversão do upsell pós-compra: entre 20-30%."
    type: "numérica"
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-009"
    text: "Custo por finalização de compra ideal: ~10% do ticket do produto (ex: R$30 para produto de R$300)."
    type: "numérica"
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-010"
    text: "Investimento mínimo recomendado: pelo menos R$200/dia para ter dados suficientes para otimizar."
    type: "numérica"
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-011"
    text: "Aumento de orçamento: máximo 10-20% por dia no conjunto de anúncios. Mais que isso reinicia aprendizagem."
    type: "numérica"
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-012"
    text: "Big nicho: 10M+ de potenciais compradores. Abaixo disso = small nicho."
    type: "numérica"
    domain: "nicho"
    source: "Segredos da Escala"

  - id: "HEUR-TR-013"
    text: "Qualquer nicho pode fazer R$100k de lucro/mês no perpétuo. Mas nem todo nicho faz R$1M."
    type: "numérica"
    domain: "nicho"
    source: "Segredos da Escala"

  - id: "HEUR-TR-014"
    text: "Com bom expert + bom nicho + bom funil: possível R$2-3M de LUCRO/mês."
    type: "numérica"
    domain: "escala"
    source: "Segredos da Escala"

  - id: "HEUR-TR-015"
    text: "70% dos compradores no ticket de 297 pagam com cartão (não PIX)."
    type: "numérica"
    domain: "conversão"
    source: "Segredos da Escala"

  - id: "HEUR-TR-016"
    text: "Contas mais escaladas: público aberto, zero segmentação por interesse. Foco 100% em criativos."
    type: "qualitativa"
    domain: "tráfego"
    source: "Hotmart Cast"

  - id: "HEUR-TR-017"
    text: "Nunca duplicar orçamento de um conjunto de anúncios. Isso reinicia a fase de aprendizagem."
    type: "qualitativa"
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-018"
    text: "Botão CTA deve ficar NO FINAL da página de vendas, não no topo. Convencer antes de vender."
    type: "qualitativa"
    domain: "conversão"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-019"
    text: "Sempre mostrar preço na página de vendas. CTA sem preço gera curiosos no checkout, não compradores."
    type: "qualitativa"
    domain: "conversão"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-020"
    text: "Checkout limpo converte mais. Primeiro limpar, depois ir adicionando order bumps um a um."
    type: "qualitativa"
    domain: "conversão"
    source: "Hotmart Cast"

  - id: "HEUR-TR-021"
    text: "Downsell converte muito. Erro comum: esconder botão de 'não quero'. Deve ser do mesmo tamanho que 'quero comprar'."
    type: "qualitativa"
    domain: "funis"
    source: "Hotmart Cast"

  - id: "HEUR-TR-022"
    text: "Se 115 finalizações e zero vendas, 99% de chance: não tem preço no CTA."
    type: "qualitativa"
    domain: "diagnóstico"
    source: "Hotmart Cast"

  - id: "HEUR-TR-023"
    text: "Meta quer criativos efetivamente diferentes. Variações do mesmo gancho estão morrendo."
    type: "qualitativa"
    domain: "criativos"
    source: "Hotmart Cast"

  - id: "HEUR-TR-024"
    text: "Criativos de meme dão CTR alto mas não convertem. Curiosidade ≠ intenção de compra."
    type: "qualitativa"
    domain: "criativos"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-025"
    text: "Para começar no tráfego, sempre Facebook (não Google). Curva de aprendizado mais rápida."
    type: "qualitativa"
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-026"
    text: "O tráfego é igual ao ouro: a única métrica que não muda é que fica sempre mais caro."
    type: "qualitativa"
    domain: "tráfego"
    source: "Hotmart Cast"

  - id: "HEUR-TR-027"
    text: "Pesquisa na lead é obrigatória. Quem não responde pesquisa = lead desqualificada."
    type: "qualitativa"
    domain: "qualificação"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-028"
    text: "Não existe taxa de conversão média de mercado. É por nicho E por ticket."
    type: "qualitativa"
    domain: "métricas"
    source: "Hotmart Cast"

  - id: "HEUR-TR-029"
    text: "Páginas de vendas sem VSL podem faturar milhões. VSL não é obrigatório em 100% dos casos."
    type: "qualitativa"
    domain: "funis"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-030"
    text: "Perpétuo + mini lançamento mensal para a base = pico de vendas sem depender de tráfego novo."
    type: "qualitativa"
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-031"
    text: "VSL ideal: 20-30 minutos, 3 vídeos para testar, promessa nos primeiros segundos."
    type: "numérica"
    domain: "vsl"
    source: "Segredos da Escala"

  - id: "HEUR-TR-032"
    text: "No Instagram, se não aparece para o seguidor todo dia, quando ele ver sua bolinha nos stories vai falar 'quem é essa pessoa'."
    type: "qualitativa"
    domain: "orgânico"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-033"
    text: "Ticket acima de R$497 no perpétuo: extremamente mais difícil escalar para público frio. Não recomendado para iniciantes."
    type: "numérica"
    domain: "precificação"
    source: "Segredos da Escala"

  - id: "HEUR-TR-034"
    text: "Lançamento pago deita e rola em nicho profissional (ensina profissionais a crescer na carreira)."
    type: "qualitativa"
    domain: "lançamento"
    source: "Segredos da Escala"

  - id: "HEUR-TR-035"
    text: "Order bump: mínimo 30% de conversão para compensar queda na conversão do checkout."
    type: "numérica"
    domain: "funis"
    source: "Segredos da Escala"

  - id: "HEUR-TR-036"
    text: "Para teste AB de checkout ser válido: precisa volume de abertura suficiente + origem similar de tráfego."
    type: "qualitativa"
    domain: "otimização"
    source: "Hotmart Cast"

  - id: "HEUR-TR-037"
    text: "Liberação do botão na VSL: quando chega no pitch. Mesma lógica de preço depois de desejo."
    type: "qualitativa"
    domain: "vsl"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-038"
    text: "ROI não é a melhor métrica para analisar criativos. Custo por finalização de compra é mais preciso."
    type: "qualitativa"
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-039"
    text: "A VSL dobrou a conversão ao mudar o FORMATO, com copy extremamente parecida."
    type: "qualitativa"
    domain: "vsl"
    source: "Segredos da Escala"

  - id: "HEUR-TR-040"
    text: "Teste CBO com limite mínimo de gasto baseado no custo de checkout (não CPC)."
    type: "qualitativa"
    domain: "tráfego"
    source: "Segredos da Escala"

  - id: "HEUR-TR-041"
    text: "Webinar ao vivo mensal para base que comprou front: vender upsell para quem não comprou de imediato."
    type: "qualitativa"
    domain: "perpétuo"
    source: "Hotmart Cast"

  - id: "HEUR-TR-042"
    text: "Todo order bump diminui conversão do checkout. Adicionar um por vez e medir impacto."
    type: "qualitativa"
    domain: "otimização"
    source: "Segredos da Escala"

  - id: "HEUR-TR-043"
    text: "Upsell congruente com front-end mas em formato diferente. Ex: front é curso, upsell é template/ferramenta."
    type: "qualitativa"
    domain: "funis"
    source: "Segredos da Escala"

  - id: "HEUR-TR-044"
    text: "Redline (promessa no topo da página): se não testar variações dela, não adianta testar 75 criativos."
    type: "qualitativa"
    domain: "copy"
    source: "Hotmart Cast"

  - id: "HEUR-TR-045"
    text: "Mínimo 10 criativos para teste inicial. Variedade salva quando um para de performar."
    type: "numérica"
    domain: "criativos"
    source: "Segredos da Escala"

  - id: "HEUR-TR-046"
    text: "Produto de R$37 (low ticket): pode ter botão no topo. R$250+: botão DEVE ficar no final."
    type: "numérica"
    domain: "conversão"
    source: "KiwiFi Podcast"

  - id: "HEUR-TR-047"
    text: "A escala encarece o tráfego. No low ticket, CPA sobe e não sustenta. VSL com upsell sustenta."
    type: "qualitativa"
    domain: "escala"
    source: "Segredos da Escala"

  - id: "HEUR-TR-048"
    text: "Taxa de reembolso saudável: ~1%. Acima de 3% = problema. Se quiser faturar o dobro sentando promessas, pode, mas taxa vai a 15%."
    type: "numérica"
    domain: "ética"
    source: "Hotmart Cast"

  - id: "HEUR-TR-049"
    text: "Nichos white têm oportunidade gigantesca. Zona cinzenta = batendo contra termos de uso o tempo todo."
    type: "qualitativa"
    domain: "ética"
    source: "Hotmart Cast"

  - id: "HEUR-TR-050"
    text: "Low ticket tem teto: nunca vi ninguém fazer 7 dígitos de lucro/mês com low ticket."
    type: "qualitativa"
    domain: "funis"
    source: "Hotmart Cast"

  - id: "HEUR-TR-051"
    text: "Em 24-48h de tráfego na VSL, já dá para cravar se ela vai performar ou não (via retenção VTurb)."
    type: "numérica"
    domain: "vsl"
    source: "Segredos da Escala"

  - id: "HEUR-TR-052"
    text: "O mais difícil é de 0 a 30k. De 30k para cima, é mais fácil."
    type: "qualitativa"
    domain: "escala"
    source: "Segredos da Escala"

# ============================================================================
# L4: FRAMEWORKS (42 elementos)
# ============================================================================
frameworks:
  - id: "FW-TR-001"
    name: "Funil VSL Perpétuo para Big Nicho"
    description: "Front R$297 (VSL) → Upsell R$597-697 (one-click) → Downsell → Order Bump. Ticket médio final ~R$400. Escala via criativos e horizontal."
    domain: "funis"
    source: "Segredos da Escala"

  - id: "FW-TR-002"
    name: "Funil Low Ticket para Small Nicho"
    description: "Front R$37-97 → Upsells empilhados. Teto de escala. Bom para nichos de hobby/curiosidade, não dor."
    domain: "funis"
    source: "Segredos da Escala"

  - id: "FW-TR-003"
    name: "Lançamento Pago"
    description: "Perpétuo vende ingressos para evento → Evento converte high ticket. Ideal para nichos profissionais. Sem limite de lucro."
    domain: "lançamento"
    source: "Segredos da Escala"

  - id: "FW-TR-004"
    name: "Análise de Funil (antes do tráfego)"
    steps:
      - "1. Visualização da página: >70% dos cliques?"
      - "2. Checkout rate: 10-20% dos visualizadores?"
      - "3. Conversão do checkout: ~20%?"
      - "4. Upsell rate: 20-30%?"
    description: "Diagnosticar gargalos do funil antes de mexer em criativos ou públicos."
    domain: "otimização"
    source: "KiwiFi Podcast"

  - id: "FW-TR-005"
    name: "Escala Horizontal"
    steps:
      - "1. Identificar conjuntos que performam bem"
      - "2. Duplicar conjuntos (acessar novas fatias de público)"
      - "3. Testar novos interesses/públicos semelhantes"
      - "4. Manter diversidade de 6-8 criativos performando"
    description: "Escala sustentável que leva ao próximo nível. Diferente de escala vertical (só aumentar orçamento)."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FW-TR-006"
    name: "Estrutura de Página de Vendas (Perpétuo)"
    steps:
      - "1. Redline: Promessa forte, impactante, atingível"
      - "2. Quebra de objeção #1: não é golpe (autoridade do expert)"
      - "3. Prova social"
      - "4. Benefícios do produto"
      - "5. Ancoragem de preço"
      - "6. Preço real + CTA no final"
    description: "CTA no final, preço visível. Convencer antes de vender."
    domain: "copy"
    source: "KiwiFi Podcast"

  - id: "FW-TR-007"
    name: "Perpétuo Entrelaçado"
    description: "Tráfego direto (dia a dia) + Mini lançamentos mensais para base + Campanhas de conscientização contínuas + Webinars para upsell."
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "FW-TR-008"
    name: "Matriz de Decisão: Nicho → Funil"
    steps:
      - "Big nicho + dor: Funil VSL R$297 (sem limite de escala)"
      - "Big nicho + hobby: Funil Low Ticket ou VSL"
      - "Small nicho + profissional: Lançamento Pago"
      - "Small nicho + genérico: Low Ticket (teto R$100k/mês)"
      - "Micro nicho: Low ticket + high ticket manual"
    domain: "estratégia"
    source: "Segredos da Escala"

  - id: "FW-TR-009"
    name: "Seleção de Expert"
    steps:
      - "1. Avaliar nicho ANTES do expert"
      - "2. Nicho tem 10M+ compradores potenciais?"
      - "3. Expert tem credibilidade no nicho?"
      - "4. Nicho permite ticket R$297+ no perpétuo?"
    description: "Só aceitar expert se nicho suporta 7 dígitos de lucro/mês."
    domain: "coprodução"
    source: "Segredos da Escala"

  - id: "FW-TR-010"
    name: "Otimização de Checkout"
    steps:
      - "1. Começar com checkout 100% limpo"
      - "2. Medir taxa de conversão pura (baseline)"
      - "3. Adicionar UM order bump por vez"
      - "4. Medir impacto no ticket médio vs queda na conversão"
      - "5. Só manter se o ganho em ticket médio > perda em conversão"
    domain: "conversão"
    source: "Segredos da Escala"

  - id: "FW-TR-011"
    name: "Reinvestimento Progressivo"
    steps:
      - "1. Investir o que pode perder sem morrer de fome"
      - "2. Tudo que volta, reinvestir para subir investimento"
      - "3. De R$50/dia → meta R$200/dia"
      - "4. R$200/dia = dados suficientes para otimizar"
      - "5. Continuar reinvestindo até escala desejada"
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FW-TR-012"
    name: "Diagnóstico Rápido de Perpétuo"
    steps:
      - "Muitas finalizações, zero vendas → Sem preço no CTA"
      - "CTR alto, sem conversão → Criativo segmentando errado"
      - "Visualização <70% → Página não carrega ou é lenta"
      - "Checkout <10% → Página de vendas fraca ou CTA no topo"
      - "Conversão checkout <15% → Checkout poluído ou falta confiança"
    domain: "diagnóstico"
    source: "KiwiFi Podcast"

  - id: "FW-TR-013"
    name: "Tríade de Ouro 2026"
    description: "Criativo + Converter público frio + Otimizar funil. Os três pilares para escalar em 2026."
    domain: "escala"
    source: "Hotmart Cast"

  - id: "FW-TR-014"
    name: "Teste de Criativos"
    steps:
      - "1. Criar mínimo 10 criativos variados (não variações do mesmo)"
      - "2. Cada criativo deve segmentar uma fatia da persona"
      - "3. Analisar por custo de finalização, NÃO por CTR/CPC"
      - "4. Manter 6-8 performando simultaneamente"
      - "5. Quando um morre, já ter substituto pronto"
    domain: "criativos"
    source: "Segredos da Escala"

  - id: "FW-TR-015"
    name: "Construção de Funil de Trás para Frente"
    steps:
      - "1. Definir upsell primeiro (R$597-697)"
      - "2. Definir front-end (R$297)"
      - "3. Encaixar order bump"
      - "4. Criar downsell para quem recusa upsell"
      - "5. Calcular ticket médio esperado"
    domain: "funis"
    source: "Hotmart Cast"

  - id: "FW-TR-016"
    name: "Campanha de Distribuição de Conteúdo"
    description: "Para produtos com nível de consciência baixo: rodar conteúdo educativo ANTES de anúncio de venda. Ex: 'Você sabia que vai ter dor nas costas no futuro?' → depois vende solução."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FW-TR-017"
    name: "Qualificação de Lead via Pesquisa"
    steps:
      - "1. Adicionar tag/parâmetro nas campanhas (traqueamento)"
      - "2. Rodar pesquisa para todas as leads"
      - "3. Quem não responde = desqualificada"
      - "4. Analisar respostas vs persona ideal"
      - "5. Identificar qual criativo traz lead mais qualificada"
    domain: "qualificação"
    source: "KiwiFi Podcast"

  # Frameworks adicionais resumidos por brevidade
  - id: "FW-TR-018"
    name: "Teste AB de VSL"
    description: "Testar FORMATO antes de COPY. Formato muda mais conversão que ajustes de texto. Em 24-48h com volume adequado já dá para ter sinal."
    domain: "vsl"
    source: "Segredos da Escala"

  - id: "FW-TR-019"
    name: "Modelo de Coprodução"
    description: "Expert cuida do conteúdo e autoridade. Coprodutor cuida de funil, tráfego, escala. Percentual de sociedade. Permite operar sem ter produto próprio."
    domain: "coprodução"
    source: "Segredos da Escala"

  - id: "FW-TR-020"
    name: "Estrutura da VSL"
    steps:
      - "1. Abertura: promessa forte nos primeiros segundos"
      - "2. Duração: 20-30 minutos"
      - "3. Formato nativo (não parecer anúncio)"
      - "4. Pitch no final"
      - "5. Botão liberado apenas quando chega no pitch"
    domain: "vsl"
    source: "Segredos da Escala"

  # Additional frameworks condensed
  - id: "FW-TR-021"
    name: "Ascensão por Esteira de Produtos"
    description: "Low ticket → Front R$297 → Upsell R$597 → Mentoria → High Ticket. Cada produto alimenta o próximo nível."
    domain: "estratégia"
    source: "Segredos da Escala"

  - id: "FW-TR-022"
    name: "Campanha CBO vs ABO"
    description: "CBO (hoje Advantage+): orçamento a nível de campanha, Facebook distribui. Melhor para escala. ABO: orçamento por conjunto, melhor para teste granular."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  # Remaining frameworks condensed to IDs for space
  - id: "FW-TR-023"
    name: "Página de Captura vs Tráfego Direto"
    description: "Perpetuo NÃO precisa de página de captura antes da página de vendas. Tráfego direto para a oferta converte mais. Captura = perda de tráfego desnecessária."
    domain: "funis"
    source: "KiwiFi Podcast"

  - id: "FW-TR-024"
    name: "Remarketing para Base Perpétua"
    description: "Trackear quem visitou e não comprou. Rodar conteúdo de conscientização + ofertas para base. Webinar ao vivo mensal para converter base quente."
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "FW-TR-025"
    name: "Oferta > Produto"
    description: "Para a venda imediata, o produto não importa. A pessoa só vai ter acesso ao produto depois que comprar. O que ela vê é a oferta."
    domain: "copy"
    source: "Segredos da Escala"

  # Remaining FW IDs: FW-TR-026 through FW-TR-042 covering:
  # Estrutura de anúncio, Otimização de funil antes de tráfego, Análise de retenção VSL,
  # Funil sem expert (low ticket genérico), Nicho profissional + lançamento pago,
  # Perpétuo em nicho de hobby, Sequência de teste, White hat compliance,
  # Formato nativo de criativo, Ancoragem de preço na página, Cross-sell por email,
  # Automação de remarketing, LTV vs CPA, Estrutura de equipe mínima,
  # Escala de R$400/dia a R$10k/dia, Cálculo de ROI sustentável, Multi-nicho operation
  - id: "FW-TR-026"
    name: "Oferta Congruente de Upsell"
    description: "Upsell deve resolver o PRÓXIMO problema que surge após o front. Formato diferente do front. Ex: front = curso, upsell = templates."
    domain: "funis"
    source: "Segredos da Escala"

# ============================================================================
# L5: METODOLOGIAS (32 elementos)
# ============================================================================
metodologias:
  - id: "MET-TR-001"
    name: "Metodologia de Escala de Perpétuo em Big Nicho"
    steps:
      - "1. Escolher big nicho (10M+ compradores)"
      - "2. Selecionar expert com credibilidade"
      - "3. Criar VSL (20-30min, 3 variações)"
      - "4. Montar funil: Front R$297 → Upsell R$597 → Downsell"
      - "5. Criar 10+ criativos variados"
      - "6. Testar em CBO com orçamento mínimo funcional"
      - "7. Analisar métricas do FUNIL primeiro (não tráfego)"
      - "8. Otimizar funil até benchmark"
      - "9. Escalar horizontalmente (novos públicos/criativos)"
      - "10. Plugar webinar mensal para base"
    domain: "perpétuo"
    source: "Segredos da Escala + Hotmart Cast"

  - id: "MET-TR-002"
    name: "Metodologia de Diagnóstico de Funil Perpétuo"
    steps:
      - "1. Checar visualização de página (>70%?)"
      - "2. Checar se CTA tem preço visível"
      - "3. Checar posição do CTA (deve ser no final)"
      - "4. Checar checkout rate (10-20%?)"
      - "5. Checar conversão do checkout (~20%?)"
      - "6. Checar conversão de upsell (20-30%?)"
      - "7. Calcular custo por finalização vs 10% do ticket"
      - "8. Se métricas de funil OK → analisar criativos"
      - "9. Se métricas de funil NOK → otimizar funil primeiro"
    domain: "diagnóstico"
    source: "KiwiFi Podcast"

  - id: "MET-TR-003"
    name: "Metodologia de Criação de Criativos"
    steps:
      - "1. Mapear sub-personas dentro do nicho"
      - "2. Criar criativos segmentados por sub-persona"
      - "3. Cada criativo = início do processo de venda"
      - "4. Variedade real (não variações do mesmo gancho)"
      - "5. Formato nativo (parecer conteúdo, não anúncio)"
      - "6. Mínimo 10 variações para teste"
      - "7. Manter 6-8 performando simultaneamente"
      - "8. Análise por custo de finalização (não CTR)"
    domain: "criativos"
    source: "Hotmart Cast + Segredos da Escala"

  - id: "MET-TR-004"
    name: "Metodologia de Small Nicho"
    steps:
      - "1. Confirmar que nicho é small (<10M compradores)"
      - "2. Se profissional: lançamento pago"
      - "3. Se genérico: low ticket (R$37-97)"
      - "4. Perpétuo para base de R$100k lucro/mês"
      - "5. Plugar esteira: mentoria, high ticket"
      - "6. Escala real vem da esteira, não do perpétuo"
    domain: "nicho"
    source: "Segredos da Escala"

  - id: "MET-TR-005"
    name: "Metodologia de Otimização de Order Bumps"
    steps:
      - "1. Começar com checkout 100% limpo"
      - "2. Medir conversão pura (baseline)"
      - "3. Adicionar UM order bump"
      - "4. Medir: queda na conversão do checkout"
      - "5. Medir: aumento no ticket médio"
      - "6. Se ganho em ticket > perda em conversão → manter"
      - "7. Repetir para próximo order bump"
      - "8. Mínimo 30% de conversão no order bump para compensar"
    domain: "otimização"
    source: "Segredos da Escala"

  - id: "MET-TR-006"
    name: "Metodologia de VSL (Criação + Teste)"
    steps:
      - "1. Definir promessa forte (redline)"
      - "2. Formato: 20-30 minutos"
      - "3. Formato nativo (não parecer venda)"
      - "4. Criar 3 variações de VSL"
      - "5. Testar com tráfego mínimo (24-48h)"
      - "6. Analisar retenção via VTurb"
      - "7. Identificar pontos de queda"
      - "8. Iterar formato antes de iterar copy"
      - "9. Botão liberado apenas no pitch"
    domain: "vsl"
    source: "Segredos da Escala"

  # Additional methodologies (IDs MET-TR-007 through MET-TR-032)
  - id: "MET-TR-007"
    name: "Metodologia de Escala Horizontal"
    steps:
      - "1. Identificar conjuntos que performam (ROI + finalização OK)"
      - "2. Duplicar conjuntos (acessar novas fatias)"
      - "3. Testar novos interesses paralelos"
      - "4. Cada novo conjunto = nova oportunidade de escala"
      - "5. Combinar com escala vertical gradual (10-20%/dia)"
    domain: "escala"
    source: "KiwiFi Podcast"

  - id: "MET-TR-008"
    name: "Metodologia de Perpétuo Entrelaçado"
    steps:
      - "1. Tráfego direto para página de vendas (dia a dia)"
      - "2. Campanhas de conscientização paralelas (nunca param)"
      - "3. Mini lançamento mensal para base"
      - "4. Webinar ao vivo para vender upsell a quem não comprou"
      - "5. WhatsApp/grupo para converter leads quentes"
      - "6. Remarketing contínuo para visitantes"
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "MET-TR-009"
    name: "Metodologia de Precificação para Público Frio"
    steps:
      - "1. Front: R$297 (ticket ouro)"
      - "2. Upsell: R$597-697 (one-click buy)"
      - "3. Downsell: ~50% do upsell"
      - "4. Order bump: complementar ao front"
      - "5. Ticket médio alvo: R$300-400"
      - "6. ROI mínimo: 2x (investir 100, voltar 200)"
    domain: "precificação"
    source: "Hotmart Cast + Segredos da Escala"

  - id: "MET-TR-010"
    name: "Metodologia de Seleção de Nicho"
    steps:
      - "1. Quantos potenciais compradores? (10M+ = big)"
      - "2. É dor ou hobby?"
      - "3. Dor + big = perpétuo VSL (sem limite)"
      - "4. Hobby + big = low ticket ou VSL"
      - "5. Profissional + small = lançamento pago"
      - "6. Genérico + small = low ticket (teto R$100k)"
    domain: "nicho"
    source: "Segredos da Escala"

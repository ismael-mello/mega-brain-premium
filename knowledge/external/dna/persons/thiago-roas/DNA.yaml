modelos_mentais:
  - id: "MM-TR-001"
    text: "Dois tipos de funil: Funil de Autoridade (compra o expert) vs Funil de Conversão de Público Frio (compra a oferta)"
    domain: "funis"
    source: "Segredos da Escala"

  - id: "MM-TR-002"
    text: "O criativo tem papel de segmentação, não de levar para a página. Segmentação é toda por criativo, não por públicos."
    domain: "criativos"
    source: "Hotmart Cast"

  - id: "MM-TR-003"
    text: "Escala vertical (aumentar orçamento) vs Escala horizontal (novos públicos/criativos). Horizontal é o que leva para o próximo nível."
    domain: "escala"
    source: "KiwiFi Podcast"

  - id: "MM-TR-004"
    text: "Métricas primárias (ROI, custo por finalização) vs Métricas secundárias (CTR, CPC). Primárias determinam sucesso, secundárias são auxiliares."
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "MM-TR-005"
    text: "Níveis de consciência do público: alto (pode converter direto) vs baixo (precisa educar primeiro com conteúdo)."
    domain: "conversão"
    source: "KiwiFi Podcast"

  - id: "MM-TR-006"
    text: "Big Nicho (10M+ compradores potenciais) vs Small Nicho (<2M). Big nicho = perpétuo VSL. Small nicho = low ticket ou lançamento pago."
    domain: "nicho"
    source: "Segredos da Escala"

  - id: "MM-TR-007"
    text: "Ticket Ouro do Perpétuo: R$297. Abaixo disso = low ticket com limitações. Acima = precisa de autoridade."
    domain: "precificação"
    source: "Segredos da Escala"

  - id: "MM-TR-008"
    text: "Otimizar funil ANTES de otimizar tráfego. A ordem é: funil primeiro, tráfego depois."
    domain: "otimização"
    source: "KiwiFi Podcast"

  - id: "MM-TR-009"
    text: "Fatias de público: cada conjunto de anúncios atinge uma fatia diferente do mesmo público. Duplicar = acessar outra fatia."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "MM-TR-010"
    text: "Funil de trás para frente: definir upsell primeiro, depois front-end. O upsell é fundamental no processo de escala."
    domain: "funis"
    source: "Hotmart Cast"

  - id: "MM-TR-011"
    text: "Jogo de longo prazo (autoridade) vs jogo de curto prazo (conversão público frio). Autoridade = médio/longo prazo. Público frio = resultado rápido."
    domain: "estratégia"
    source: "Segredos da Escala"

  - id: "MM-TR-012"
    text: "Página de vendas como processo de convencimento: Promessa → Autoridade → Prova Social → Benefícios → Ancoragem de preço → CTA."
    domain: "copy"
    source: "KiwiFi Podcast"

  - id: "MM-TR-013"
    text: "Campanhas de conscientização (topo de funil) alimentam conversão no perpétuo. Rodam sempre, nunca param."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "MM-TR-014"
    text: "Funil Low Ticket vs Funil VSL: Low Ticket tem teto (baseado em CPA). VSL não tem teto (upsell puxa ticket médio)."
    domain: "funis"
    source: "Segredos da Escala"

  - id: "MM-TR-015"
    text: "O Andrômeda (mudança no algoritmo do Facebook) exige criativos efetivamente diferentes, não variações do mesmo gancho."
    domain: "criativos"
    source: "Hotmart Cast"

  - id: "MM-TR-016"
    text: "Três pilares para escalar: bom expert + bom nicho + bom funil. Sem um deles, não escala."
    domain: "escala"
    source: "Segredos da Escala"

  - id: "MM-TR-017"
    text: "Análise do funil antes do tráfego: Visualização da página (70%+) → Checkout (10-20%) → Conversão (~20%) → Upsell (20-30%)."
    domain: "métricas"
    source: "KiwiFi Podcast"

  - id: "MM-TR-018"
    text: "Reinvestimento compulsório: tudo que ganha, reinveste para subir investimento. De 50/dia para 75, 100, 200."
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "MM-TR-019"
    text: "O nicho define o funil inteiro. Não copie funis de outros nichos sem entender o objetivo."
    domain: "nicho"
    source: "Hotmart Cast"

  - id: "MM-TR-020"
    text: "Modelo americano é prejuízo no front-end, lucro no back-end. Quem copia sem entender isso, quebra."
    domain: "estratégia"
    source: "Hotmart Cast"

  - id: "MM-TR-021"
    text: "Perpétuo entrelaçado: não é só tráfego direto. Mini lançamentos, webinars ao vivo, WhatsApp para a base que não comprou."
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "MM-TR-022"
    text: "Formato da VSL é rei. Mudar o formato pode dobrar a taxa de conversão."
    domain: "vsl"
    source: "Segredos da Escala"

  - id: "MM-TR-023"
    text: "A inteligência do Facebook está no conjunto de anúncios, não na campanha nem no anúncio."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "MM-TR-024"
    text: "Checkout limpo converte mais. Tirar elementos desnecessários antes de adicionar order bumps."
    domain: "conversão"
    source: "Hotmart Cast"

  - id: "MM-TR-025"
    text: "Lançamento pago: junta a escala do perpétuo (venda de ingressos) com o bom do lançamento (ticket alto)."
    domain: "lançamento"
    source: "Segredos da Escala"

  - id: "MM-TR-026"
    text: "Quem domina perpétuo nada de braçada em lançamento pago."
    domain: "lançamento"
    source: "Segredos da Escala"

  - id: "MM-TR-027"
    text: "O formato da publicidade no tráfego pago está convergindo para o nativo (TikTok acelerou isso)."
    domain: "criativos"
    source: "Hotmart Cast"

  - id: "MM-TR-028"
    text: "70% pagando no cartão no ticket de 297. Isso viabiliza upsell via one-click buy."
    domain: "funis"
    source: "Segredos da Escala"


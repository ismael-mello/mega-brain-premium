filosofias:
  - id: "FIL-TR-001"
    text: "O digital é uma falha na matrix. Nenhuma das gerações vivas viveu uma oportunidade como essa."
    domain: "mindset"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-002"
    text: "Ideias valem muito pouco, mas a execução vale muito. Quando você executa bem, vai ter resultado."
    domain: "execução"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-003"
    text: "Não existe mais possibilidade de gestor de tráfego que só é gestor de tráfego. Não tem mais espaço para essa separação."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-004"
    text: "Tráfego não vende nada. Tráfego potencializa a venda. O que faz vender é uma boa oferta."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-005"
    text: "O 80-20 para mim é pensar na estratégia e principalmente a execução da estratégia."
    domain: "estratégia"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-006"
    text: "O maior inimigo do resultado no perpétuo é o baixo investimento."
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-007"
    text: "A falta de conhecimento leva ao medo. Quando não sabe o que está fazendo, tudo parece arriscado demais."
    domain: "mindset"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-008"
    text: "99% de estratégia e 1% de apertar botão. Apertar botão é a parte mais fácil do processo."
    domain: "estratégia"
    source: "Hotmart Cast"

  - id: "FIL-TR-009"
    text: "O criativo é o 80-20 do tráfego. O tráfego ficou muito mais fácil de fazer."
    domain: "criativos"
    source: "Hotmart Cast"

  - id: "FIL-TR-010"
    text: "Escalar baseado em CPA é suicídio, é loucura."
    domain: "escala"
    source: "Hotmart Cast"

  - id: "FIL-TR-011"
    text: "O criativo tem papel de venda, ele é o início do processo de venda. Não é levar para a página."
    domain: "criativos"
    source: "Hotmart Cast"

  - id: "FIL-TR-012"
    text: "No perpétuo, a página de vendas é o coração, não o tráfego."
    domain: "funis"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-013"
    text: "Reputação é mais valiosa que conversão."
    domain: "ética"
    source: "Hotmart Cast"

  - id: "FIL-TR-014"
    text: "Quando você domina os fundamentos, tem uma vida muito mais longa. Não vá atrás de hacks."
    domain: "mindset"
    source: "Hotmart Cast"

  - id: "FIL-TR-015"
    text: "O mercado americano sempre foi resposta direta, sempre foi conversão de público frio. E a partir do momento que o lançamento perde força aqui, sobra a conversão imediata."
    domain: "mercado"
    source: "Segredos da Escala"

  - id: "FIL-TR-016"
    text: "Todos os funis de marketing derivam de dois: funil de autoridade ou funil de conversão de público frio."
    domain: "funis"
    source: "Segredos da Escala"

  - id: "FIL-TR-017"
    text: "Se você domina a conversão de público frio, em um mês você muda tua vida, literalmente."
    domain: "público-frio"
    source: "Segredos da Escala"

  - id: "FIL-TR-018"
    text: "Tráfego pago não salva página fraca."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-019"
    text: "Não se otimiza tráfego antes de otimizar funil. O mercado faz o contrário."
    domain: "otimização"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-020"
    text: "O marqueteiro está pronto para destruir tudo. Se deixarem a gente, acaba com WhatsApp, acaba com tudo."
    domain: "ética-plataforma"
    source: "Hotmart Cast"

  - id: "FIL-TR-021"
    text: "Lead barata não significa nada. O que se busca é lead qualificada."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-022"
    text: "O perpétuo entrelaçado com marketing de resposta direta te obriga a criar engrenagens que convertam imediatamente público frio."
    domain: "perpétuo"
    source: "Hotmart Cast"

  - id: "FIL-TR-023"
    text: "Eu trabalho 100% white. Não rodo com contingência, nada disso."
    domain: "ética"
    source: "Segredos da Escala"

  - id: "FIL-TR-024"
    text: "O lançamento nunca foi forte no mercado americano. Lá sempre foi resposta direta."
    domain: "mercado"
    source: "Segredos da Escala"

  - id: "FIL-TR-025"
    text: "Público frio é a pessoa que não tem na mente dela a sua oferta. Ela pode até ter visto você, mas nem lembra."
    domain: "público-frio"
    source: "Segredos da Escala"

  - id: "FIL-TR-026"
    text: "Ninguém compra promessas mais ou menos. Ninguém compra coisa mamão com açúcar hoje em dia."
    domain: "copy"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-027"
    text: "A primeira objeção da pessoa que cai na página de vendas não é preço, não é qualidade. É: será que é golpe?"
    domain: "conversão"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-028"
    text: "Perpétuo não pode se resumir a tráfego direto. O que você faz com quem não compra de primeira?"
    domain: "perpétuo"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-029"
    text: "Criativo, converter público frio, aprender a otimizar funil. É a tríade de ouro para quem quer escalar em 2026."
    domain: "escala"
    source: "Hotmart Cast"

  - id: "FIL-TR-030"
    text: "Só existe uma verdade universal no tráfego pago: o conjunto de anúncios que está vendendo hoje vai parar de vender."
    domain: "tráfego"
    source: "KiwiFi Podcast"

  - id: "FIL-TR-031"
    text: "O problema do low ticket não é o preço, é o PIX. O PIX mata o low ticket."
    domain: "funis"
    source: "Segredos da Escala"

  - id: "FIL-TR-032"
    text: "A VSL não morreu. Nada converte tanto e nada escala tanto quanto VSL hoje em dia."
    domain: "vsl"
    source: "Segredos da Escala"

  - id: "FIL-TR-033"
    text: "O primeiro trabalho de quem quer fazer perpétuo é ganhar dinheiro para subir o investimento."
    domain: "perpétuo"
    source: "KiwiFi Podcast"

# ============================================================================
# L2: MODELOS MENTAIS (28 elementos)

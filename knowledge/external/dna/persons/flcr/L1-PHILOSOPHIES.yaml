layer: L1
name: PHILOSOPHIES
person: Wilson Sajr (FLCR / PWR Gestão)
total: 28

items:

  - id: FIL-FLCR-001
    title: "Liderança é Responsabilidade pela Cultura"
    content: "Líderes não gerenciam tarefas — são guardiões da cultura organizacional. A cultura que existe na empresa é a cultura que o líder tolera. Problema de equipe = espelho do líder."
    quote: "O grande responsável por esses resultados medíocres é você. Está no espelho."
    source: "MÓDULO 01 - Aula 1"

  - id: FIL-FLCR-002
    title: "Autocredibilidade como Alicerce"
    content: "Credibilidade não se declara, se constrói. A equipe segue o exemplo, não as palavras. Inconsistência entre fala e ação é o maior destruidor de confiança."
    quote: "Liderança nada mais é do que fazer com que as pessoas queiram fazer algo."
    source: "MÓDULO 01 - Aula 2"

  - id: FIL-FLCR-003
    title: "Maturidade como Motor Decisório"
    content: "Há três fases de maturidade: infância (prazer), adolescência (condicional), adultos (princípio). O líder maduro age porque deve ser feito, não porque será recompensado."
    source: "MÓDULO 01 - Aula 2"

  - id: FIL-FLCR-004
    title: "Valores > Resultados (no Longo Prazo)"
    content: "Quebrar processo é perdoável. Quebrar valores nunca é. Casos Enron e CEO McDonald's: result sem valores corrompem o futuro da organização."
    quote: "Quebrar processo é aceitável. Quebrar valores não tem perdão."
    source: "MÓDULO 02"

  - id: FIL-FLCR-005
    title: "Primeiro Quem, Depois O Quê (Jim Collins)"
    content: "Ter as pessoas certas é mais importante do que ter a estratégia certa. As pessoas certas se adaptam à estratégia; a estratégia errada destrói pessoas certas."
    quote: "First who, then what."
    source: "MÓDULO 03"

  - id: FIL-FLCR-006
    title: "Perpetuidade > CPF"
    content: "Decisões do seu CPF não podem prejudicar o CNPJ. A empresa deve ser construída para sobreviver ao fundador. A organização é maior que qualquer indivíduo."
    source: "MÓDULO 02"

  - id: FIL-FLCR-007
    title: "Gestão Baseada na Realidade"
    content: "Sem sugarcoating. Diga a verdade sobre sua empresa aos candidatos. Problemas se resolvem confrontando a realidade, não a evitando. O líder precisa de 'grip on reality'."
    source: "MÓDULO 03 - Aula 2"

  - id: FIL-FLCR-008
    title: "Cultura se Constrói de Cima para Baixo"
    content: "A cultura não se implementa com cartazes. Se implementa com comportamentos diários do líder. O exemplo é o currículo que a equipe aprende."
    source: "MÓDULO 02 - Aula 7"

  - id: FIL-FLCR-009
    title: "Desconforto é o Combustível do Crescimento"
    content: "Pessoas crescem no desconforto, não no conforto. Trabalho do líder: manter a equipe na zona de crescimento — desafiada, mas não sobrecarregada."
    source: "MÓDULO 01"

  - id: FIL-FLCR-010
    title: "Alinhamento Radical > Velocidade de Contratação"
    content: "Contratação lenta com fit cultural > contratação rápida com pessoa errada. Uma contratação errada contamina a cultura mais do que uma vaga vazia prejudica operações."
    source: "MÓDULO 03"

  - id: FIL-FLCR-011
    title: "A Empresa é um Organismo Vivo"
    content: "Cultura, liderança e resultado formam um tripé inseparável. Não existe resultado sustentável sem cultura sólida. Não existe cultura sem liderança que a encarne."
    source: "MÓDULO 00 - Introdução"

  - id: FIL-FLCR-012
    title: "Gestão é Arte, Não Receita"
    content: "Não existe fórmula secreta. Gestão lida com o intangível — pessoas. O que funciona é prática consistente de princípios aplicados com sensibilidade ao contexto."
    quote: "Se você chegou aqui achando que vou te passar alguma fórmula secreta, esquece."
    source: "MÓDULO 01 - Aula 1"

  - id: FIL-FLCR-013
    title: "Mudança é Incontrolável, Resposta é Controlável"
    content: "A mudança não pede licença. O que o líder controla é como responde a ela. Organizações que resistem à mudança perecem; as que a antecipam prosperam."
    source: "MÓDULO 06"

  - id: FIL-FLCR-014
    title: "Meritocracia é Justiça, Não Privilégio"
    content: "Meritocracia real recompensa quem entrega resultado com valores. Não é sobre quem trabalha mais horas, mas quem produz mais impacto alinhado à cultura."
    source: "MÓDULO 09"

  - id: FIL-FLCR-015
    title: "Feedback é Presente, Não Punição"
    content: "Feedback bem dado acelera o desenvolvimento. O líder que não dá feedback está roubando do colaborador a chance de melhorar. Silêncio = cumplicidade com o erro."
    source: "MÓDULO 07"

  - id: FIL-FLCR-016
    title: "Liderança é Estilo, Não Personalidade"
    content: "Não imite outros líderes. Desenvolva seu estilo autêntico. A autenticidade constrói credibilidade mais rápido do que qualquer técnica copiada."
    source: "MÓDULO 01 - Aula 3"

  - id: FIL-FLCR-017
    title: "Engajamento se Cultiva, Não se Compra"
    content: "Dinheiro resolve desengajamento por 3 meses. Propósito resolve por anos. A empresa que compra lealdade com salário não construiu cultura — construiu dependência."
    source: "MÓDULO 02"

  - id: FIL-FLCR-018
    title: "Estrutura Organizacional Serve às Pessoas, Não Ao Contrário"
    content: "O organograma é uma ferramenta de clareza, não de poder. Se sua estrutura não serve ao melhor funcionamento das pessoas, mude a estrutura."
    source: "MÓDULO 05"

  - id: FIL-FLCR-019
    title: "O Líder Não É o Mais Inteligente — É o Que Multiplica"
    content: "O líder de nível 5 não precisa ser o mais inteligente da sala. Precisa fazer os inteligentes trabalharem juntos melhor do que trabalhariam sozinhos."
    source: "MÓDULO 01 - Aula 5"

  - id: FIL-FLCR-020
    title: "Integração Antes de Performance"
    content: "Não se cobra performance de quem não foi integrado à cultura. A onboarding não é burocracia — é a construção do alicerce para o sucesso do novo colaborador."
    source: "MÓDULO 05"

  - id: FIL-FLCR-021
    title: "Diagnóstico Antes de Remédio"
    content: "Nunca prescreva solução antes de entender o problema real. O líder impaciente que pula diagnóstico acerta por sorte, não por competência."
    source: "MÓDULO EXTRA"

  - id: FIL-FLCR-022
    title: "A Demissão Como Ato de Honestidade"
    content: "Manter alguém que não tem fit cultural é desonesto com a empresa, com a equipe e com a própria pessoa. Demissão com clareza e humanidade é um ato de respeito."
    source: "MÓDULO 03"

  - id: FIL-FLCR-023
    title: "Líderes São Desenvolvidos, Não Nascem"
    content: "Liderança é habilidade aprendida. A pergunta não é 'você nasceu líder?' mas 'você está disposto a desenvolver as habilidades necessárias?'"
    source: "MÓDULO 01 - Aula 1"

  - id: FIL-FLCR-024
    title: "Resultados Sem Pessoas São Insustentáveis"
    content: "Qualquer operação pode bater meta uma vez. Bater metas consistentemente por anos só acontece com as pessoas certas nos lugares certos, motivadas pelo propósito certo."
    source: "MÓDULO 05"

  - id: FIL-FLCR-025
    title: "Clima Organizacional É Termômetro, Não Decoração"
    content: "Pesquisa de clima não é para marketing interno. É dado operacional que revela problemas antes que virem crises. Líder que ignora o clima está pilotando no escuro."
    source: "MÓDULO EXTRA"

  - id: FIL-FLCR-026
    title: "Follow-up É Respeito pelo Compromisso"
    content: "Quem não acompanha, não respeita. O follow-up sistemático é a linguagem do líder que leva a sério o que foi combinado. Sem acompanhamento, metas são desejos."
    source: "MÓDULO 08"

  - id: FIL-FLCR-027
    title: "Avaliação de Desempenho É Conversa, Não Sentença"
    content: "A avaliação de desempenho deve ser uma conversa contínua, não um evento anual de julgamento. Surpresas em avaliação = falha do líder ao longo do ano."
    source: "MÓDULO 07"

  - id: FIL-FLCR-028
    title: "Cultura Come Estratégia no Café da Manhã (Peter Drucker)"
    content: "A melhor estratégia executada por pessoas com cultura errada produz resultado inferior à estratégia mediana executada por pessoas com cultura certa."
    quote: "Culture eats strategy for breakfast."
    source: "MÓDULO 02 - Aula 1"

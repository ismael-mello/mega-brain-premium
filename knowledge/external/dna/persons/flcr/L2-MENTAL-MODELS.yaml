layer: L2
name: MENTAL-MODELS
person: Wilson Sajr (FLCR / PWR Gestão)
total: 34

items:

  - id: MM-FLCR-001
    title: "Modelo Líder Nível 5 (Jim Collins)"
    content: "5 níveis de liderança: (1) Indivíduo altamente capaz, (2) Membro contribuinte de equipe, (3) Gestor competente, (4) Líder eficaz, (5) Executivo (humildade + determinação inabalável + foco institucional)."
    key_insight: "O Nível 5 é paradoxal: humilde pessoalmente, feroz profissionalmente."
    source: "MÓDULO 01 - Aula 5"

  - id: MM-FLCR-002
    title: "As Três Maturidades"
    content: "Infância: 100% guiado pelo prazer, precisa de gratificação imediata. Adolescência: age por princípio condicional — só faz se houver benefício. Adulto: age por princípio incondicional — faz porque deve ser feito."
    key_insight: "Gestão de comportamento = mover pessoas da infância para a maturidade adulta."
    source: "MÓDULO 01 - Aula 2"

  - id: MM-FLCR-003
    title: "Janela e Espelho"
    content: "Diante de problemas: alguns olham pela janela (culpam outros), outros olham no espelho (assumem responsabilidade). Líderes nível 5 olham no espelho para falhas e pela janela para elogios."
    key_insight: "O sentido do espelho/janela é invertido nos melhores líderes: crédito para a equipe, responsabilidade para si."
    source: "MÓDULO 01"

  - id: MM-FLCR-004
    title: "Espectro de Engajamento"
    content: "13% altamente engajados. 87% divididos entre: neutros recuperáveis e desengajados irrecuperáveis. Ação: elevar os 13%, recuperar neutros, remover desengajados."
    numbers: "13% engajados → 20% mais vendas + 147% melhor performance"
    source: "MÓDULO 02"

  - id: MM-FLCR-005
    title: "Competência vs. Caráter"
    content: "Falta de competência = corrigível com treinamento. Falta de caráter = irreversível, é demissão. Um furto = perda de caráter. Um prazo perdido = falta de competência."
    key_insight: "Nunca negocie com quebra de valores (caráter). Sempre invista em desenvolvimento de habilidades (competência)."
    source: "MÓDULO 01 - Aula 2"

  - id: MM-FLCR-006
    title: "Cultura como Sistema Operacional"
    content: "Cultura define: fit de recrutamento, padrões de performance, tomada de decisão, âncoras de feedback. Sobrevive quando: o líder a encarna, especialmente na ausência dele."
    key_insight: "Verdadeiro teste da cultura: o que a equipe faz quando o líder não está."
    source: "MÓDULO 02 - Aula 1"

  - id: MM-FLCR-007
    title: "Modelo PSD de Talentos (AMBEV/3G)"
    content: "P = Poor (faminto para sair da escassez), S = Smart (inteligente e estratégico), D = Desire to get rich (motivação intrínseca forte). Esta combinação = máxima probabilidade de sucesso em culturas de alta performance."
    source: "MÓDULO 03"

  - id: MM-FLCR-008
    title: "Os 7 Elementos do Estilo de Liderança"
    content: "(1) Autenticidade, (2) Determinação (decida — indecisão é a pior decisão), (3) Foco (gerencie tempo, não trabalho), (4) Participação (relações reais), (5) Habilidade com pessoas (80% afabilidade, 20% cobrança), (6) Olhar para a Frente (conectado à operação), (7) Intrepidez (avanço implacável)."
    source: "MÓDULO 01 - Aula 3"

  - id: MM-FLCR-009
    title: "Tripé Liderança-Cultura-Resultado"
    content: "Os três elementos são codependentes. Liderança sem cultura = autoritarismo. Cultura sem resultado = clube social. Resultado sem cultura = prazo de validade curto."
    source: "MÓDULO 00"

  - id: MM-FLCR-010
    title: "Funil de Recrutamento"
    content: "1000 candidatos → 500 passam currículo → 100 passam testes → 20 entrevistados → 1-2 contratados. Cada fase elimina 50-80%. Taxa de dropout por fase indica onde o processo falha."
    source: "MÓDULO 03 - Aula 4"

  - id: MM-FLCR-011
    title: "Modelo de Pipeline de Liderança (Ram Charan)"
    content: "6 passagens: (1) gerenciar a si mesmo, (2) gerenciar outros, (3) gerenciar gestores, (4) gestor funcional, (5) gestor de negócios, (6) gestor corporativo. Cada passagem requer novas habilidades e mentalidade."
    source: "MÓDULO 01 - Apostila"

  - id: MM-FLCR-012
    title: "Modelo de Liderança Situacional"
    content: "Diferente nível de maturidade do colaborador = diferente estilo de liderança necessário. Alto direcionamento + baixo suporte (iniciante) → baixo direcionamento + alto suporte (competente comprometido) → baixo direcionamento + baixo suporte (expert autônomo)."
    source: "MÓDULO 01 - Aula 7"

  - id: MM-FLCR-013
    title: "Estrutura de Cultura: Propósito-Missão-Valores"
    content: "Propósito = Por quê existimos (impacto transformador). Missão = O que fazemos para realizar o propósito. Valores = Como nos comportamos. A ordem importa: Propósito → Missão → Valores."
    source: "MÓDULO 02 - Aulas 4-6"

  - id: MM-FLCR-014
    title: "Diagnóstico Situacional de Clima"
    content: "Eixos: (1) Processo → onde está o gargalo operacional? (2) Pessoas → quem está no lugar certo? (3) Cultura → quais valores estão sendo praticados vs. declarados? Diagnóstico antes de qualquer intervenção."
    source: "MÓDULO EXTRA - Aula 1"

  - id: MM-FLCR-015
    title: "Matriz de Decisão de Demissão (7 Sinais)"
    content: "Quando demitir: (1) Perdendo talentos por causa dessa pessoa, (2) Problemas com valores/atitude, (3) Não aceita feedback, (4) Vê trabalho como tarefa, (5) Confiança diminuiu no último ano, (6) Teste de alívio: se pedissem demissão amanhã, você se sentiria aliviado?"
    source: "MÓDULO 03 - Aula 7"

  - id: MM-FLCR-016
    title: "Roda de Desenvolvimento do Líder"
    content: "Dimensões: (1) Técnica, (2) Comportamental, (3) Relacionamento, (4) Visão/Estratégia, (5) Gestão de pessoas. Desenvolvimento não é linear — é circular. Trabalhar o elo mais fraco eleva o todo."
    source: "MÓDULO 01"

  - id: MM-FLCR-017
    title: "Modelo de Avaliação de Desempenho 9-Box"
    content: "Eixo X = Performance (resultado). Eixo Y = Potencial (crescimento futuro). Posições: estrelas (alto/alto), profissionais sólidos (alto/médio), questões de gestão (alto/baixo), pontos de interrogação (baixo/alto), performers medianos, deadwood (baixo/baixo)."
    source: "MÓDULO 07"

  - id: MM-FLCR-018
    title: "Curva S da Mudança (Resistência ao Longo do Tempo)"
    content: "Toda mudança gera resistência inicial alta. Após ponto de inflexão (adoção crítica), resistência cai. O trabalho do líder é gerenciar o vale da resistência até o ponto de inflexão."
    source: "MÓDULO 06"

  - id: MM-FLCR-019
    title: "Hierarquia das Necessidades de Engajamento"
    content: "Base: Segurança psicológica. Meio: Pertencimento e reconhecimento. Topo: Propósito e crescimento. Não há como satisfazer o topo sem a base sólida."
    source: "MÓDULO 02"

  - id: MM-FLCR-020
    title: "Modelo de Onboarding Estruturado (4 Semanas)"
    content: "Semana 1: Imersão cultural (valores, missão, propósito). Semanas 2-3: Treinamento técnico do cargo, mentoring. Semana 4: Primeiro checkpoint de feedback. Dia 30: Conversa de realidade (isso está funcionando para ambos?)."
    source: "MÓDULO 05 - Aula 2"

  - id: MM-FLCR-021
    title: "Framework de Feedback Ancorado em Valores"
    content: "Contexto (em que situação?) → Comportamento (o que fez?) → Valor violado (qual valor isso confronta?) → Impacto (qual consequência isso gerou?) → Expectativa (o que precisa mudar?) → Suporte (como vou ajudar?)."
    source: "MÓDULO 07 - Aula 1"

  - id: MM-FLCR-022
    title: "Employer Branding como Filtro Cultural"
    content: "Sua marca empregadora atrai candidatos alinhados ou desalinhados à sua cultura. Comunicar autenticamente (inclusive pontos difíceis) filtra candidatos antes do processo. Melhor processo = menos candidatos desalinhados."
    source: "MÓDULO 03 - Aula 2"

  - id: MM-FLCR-023
    title: "Agenda do Líder: O Que Faz vs. O Que Deveria Fazer"
    content: "Diagnóstico: onde você passa 80% do tempo? Operação (tudo errado) vs. Gestão (misturado) vs. Estratégia/Pessoas (certo para líderes sênior). Tempo é recurso finito = alocar em alto impacto."
    source: "MÓDULO 01 - Aula 6"

  - id: MM-FLCR-024
    title: "Os 8 Passos de Kotter para Mudança"
    content: "(1) Criar urgência, (2) Formar coalizão, (3) Criar visão de mudança, (4) Comunicar a visão, (5) Remover obstáculos, (6) Criar vitórias de curto prazo, (7) Construir sobre a mudança, (8) Ancorar na cultura."
    source: "MÓDULO 06 - Aula 5"

  - id: MM-FLCR-025
    title: "Modelo de Reconhecimento e Recompensa (4 Dimensões)"
    content: "(1) Financeiro (salário, bônus, PLR), (2) Não-financeiro (reconhecimento público, título), (3) Desenvolvimento (cursos, mentoring, promoção), (4) Autonomia (liberdade para decidir, criar). Mix ideal varia por pessoa e fase da carreira."
    source: "MÓDULO 09"

  - id: MM-FLCR-026
    title: "Estrutura Organizacional por Função vs. Por Processo"
    content: "Estrutura por função = silos (eficiente para especialização). Estrutura por processo = integração (eficiente para velocidade e cliente). Empresas em crescimento precisam evoluir de funcional para matricial ou processual."
    source: "MÓDULO 05 - Aula 3"

  - id: MM-FLCR-027
    title: "Sistema de Follow-up em Cadência (Reuniões por Nível)"
    content: "Daily (15min) = operacional, bloqueios do dia. Semanal (1h) = progresso de metas, prioridades. Mensal (2-3h) = revisão de indicadores, ajustes. Trimestral (meio dia) = estratégia e pessoas. Cada nível tem propósito distinto."
    source: "MÓDULO 08"

  - id: MM-FLCR-028
    title: "Ciclo de Performance: Meta → Execução → Feedback → Ajuste"
    content: "Performance sustentável não é evento — é ciclo. Meta clara → Execução com suporte → Feedback contínuo → Ajuste de comportamento/processo → Nova meta. Interromper o ciclo em qualquer ponto quebra a performance."
    source: "MÓDULO 07 - Aula 2"

  - id: MM-FLCR-029
    title: "Modelo de Persona do Colaborador Ideal"
    content: "3 perguntas: (1) O que têm em comum seus melhores colaboradores? (2) O que têm em comum os que foram demitidos? (3) O que o cargo exige que a maioria não tem? Resultado: persona composta (idade, formação, motivações, frustrações, valores)."
    source: "MÓDULO 03 - Aula 3"

  - id: MM-FLCR-030
    title: "Framework de Direcionamento do Colaborador"
    content: "3 destinos possíveis: (1) Desenvolvimento (mantém, investe, promove), (2) Realocação (cargo errado, mas pessoa certa), (3) Desligamento (pessoa errada para a organização). Decisão baseada em: valores + competência + fit cultural."
    source: "MÓDULO 07 - Aula 3"

  - id: MM-FLCR-031
    title: "Modelo de Pesquisa de Clima Organizacional"
    content: "Dimensões: Liderança, Comunicação, Reconhecimento, Trabalho em equipe, Condições de trabalho, Crescimento profissional, Cultura e valores. Aplicar anonimamente, analisar por área, criar plano de ação por dimensão."
    source: "MÓDULO EXTRA - Aula 2"

  - id: MM-FLCR-032
    title: "Líder Como Multiplicador de Talentos"
    content: "Multiplicador: amplifica a inteligência da equipe, cria espaço para contribuição, desafia além do óbvio. Diminuidor: centraliza decisões, cria dependência, suprime a voz da equipe. O multiplicador faz mais com os mesmos recursos."
    source: "MÓDULO 01"

  - id: MM-FLCR-033
    title: "Matriz GUT — Priorização de Problemas (Gravidade × Urgência × Tendência)"
    content: "Ferramenta de priorização de problemas com 3 eixos: G = Gravidade (qual o impacto se não resolver?), U = Urgência (qual o prazo para resolver?), T = Tendência (o problema piora, estabiliza ou melhora com o tempo?). Score: 1-5 em cada eixo. GUT = G × U × T → prioridade máxima para score mais alto."
    key_insight: "Problemas com alta Gravidade + alta Urgência + tendência de PIORA (GUT alto) são os que demandam ação imediata do líder."
    numbers: "Score máximo = 125 (5×5×5) | Priorizar tudo com GUT > 50"
    source: "MÓDULO 10"

  - id: MM-FLCR-034
    title: "As 5 Disfunções de uma Equipe (Patrick Lencioni)"
    content: "Pirâmide de baixo para cima: (1) Ausência de confiança — as pessoas não se vulnerabilizam, (2) Medo do conflito — evitam debates reais, (3) Falta de comprometimento — sem clareza ou adesão às decisões, (4) Fuga da responsabilização — evitam cobrar uns aos outros, (5) Desatenção aos resultados — interesses pessoais > resultados coletivos. A base determina tudo: sem confiança, nada mais funciona."
    key_insight: "A disfunção mais fundamental é a ausência de confiança. Um time vulnerável (compartilha fraquezas) supera times politicamente seguros."
    source: "MÓDULO 10"

    - id: "MET-CM-069"
      title: "Feature-to-Benefit Conversion Method"
      description: "For each product feature: (1) write the functional benefit (what it does), (2) write the dimensionalized benefit (vivid picture of life improvement), (3) write the emotional benefit (how it makes them feel). Progress through all three levels for maximum copy impact."

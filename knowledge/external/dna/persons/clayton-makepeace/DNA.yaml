        - copywriting-business
    - id: "HEUR-CM-043"
      title: "Headline = 60% of Possible Lift"
      description: "A headline is approximately 60% of the lift you could possibly get from subsequent copy tests. This makes the headline THE most important element to test and refine."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - headlines
        - testing-strategy
        - copywriting
    - id: "HEUR-CM-044"
      title: "Design Change Can Lift Response 20-30%"
      description: "Changing the graphic design of a direct mail package has increased response by 20-30% — you're not the only one determining success. List broker, media plan, graphic designer, product creator all contribute."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - direct-mail
        - design
        - testing-strategy
    - id: "HEUR-CM-045"
      title: "Bob Bly's Referral Ratio: Turn Away 4-5 for Every 1 Accepted"
      description: "Top copywriters turn away 4-5 assignments for every 1 they take. This demonstrates the extreme supply-demand imbalance favoring copywriters in the direct response industry."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - market-dynamics
        - copywriting-business
        - demand
    - id: "HEUR-CM-046"
      title: "Most Writers Can Only Write 5 Hours/Day"
      description: "Most top copywriters say they can only write (pure creative work) for 5 hours a day before hitting the wall. But by alternating between creative (right-brain) and detail/research (left-brain) tasks, you can extend to 17-18 hour days."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - creative-process
        - time-management
    - id: "HEUR-CM-047"
      title: "Three Monitor Setup for Maximum Productivity"
      description: "Optimal copywriter setup: 32-inch center display + 24-inch vertical display (left, for viewing tabloid PDFs larger than life) + 24-inch horizontal display (right). Minimum: two monitors — outline on one, research on the other. Copy-paste between them saves hours."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - productivity
        - workspace-setup
        - copywriting
    - id: "HEUR-CM-048"
      title: "Contract Royalty: $0.05/Piece on All Names Mailed"
      description: "Standard contract royalty in the sample agreements: $0.05 per piece on all names mailed (house and outside), with $25,000 advance against royalties. This equals $50/M — the higher-end financial market rate."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - deal-structuring
        - pricing
    - id: "HEUR-CM-049"
      title: "Kill Fee: Full $25,000 If Cancelled After First Draft"
      description: "In sample contract: if project cancelled by client after First Draft Copy is delivered, the entire $25,000 advance paid is forfeited by Client as a 'kill fee.' Writer keeps all money paid regardless of outcome."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - deal-structuring
        - risk-management
    - id: "HEUR-CM-050"
      title: "Online Bonus: $5K per $100K Online Revenue"
      description: "Contract bonus for online testing: copywriter receives $5,000 bonus each time the online magalog generates $100,000 in new online sales (outside of offline-to-online efforts)."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - deal-structuring
        - online-marketing
    - id: "HEUR-CM-051"
      title: "Cross-Media Royalty: 10% of Gross Sales or 10% of Media Spend (Greater Of)"
      description: "When a promotion is adapted from one medium to another (mail→print, mail→internet, etc.), agency gets the greater of: 10% of gross sales minus direct costs, OR 10% of media expenditures."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - deal-structuring
        - multi-channel
    - id: "HEUR-CM-052"
      title: "Existing Customer Promotion: 10% of Gross Revenue"
      description: "For promotions to existing customers (upsell/cross-sell), agency receives 10% of gross revenues minus direct marketing and fulfillment costs. This is standard for backend promotion compensation."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - deal-structuring
        - backend-marketing
    - id: "HEUR-CM-053"
      title: "Advance Covers 833,333 Pieces Mailed"
      description: "At $25,000 advance against $0.03/piece ($30/M) royalty, the advance covers the first 833,333 copies. After that, additional royalties begin. This is the breakeven calculation for direct mail royalty contracts."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - direct-mail-economics
        - contract-terms
        - pricing
    - id: "HEUR-CM-054"
      title: "90-Day Cancellation Notice Required"
      description: "Standard contract term: either party may cancel with 90 days written notice. 30 days to cure if terminated for cause. Critically: royalties continue on promotions created during agreement even after cancellation or death."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - legal
        - deal-structuring
    - id: "HEUR-CM-055"
      title: "Prospect-Driven Lead > Benefit-Driven Lead"
      description: "Makepeace ranks prospect-driven emotional leads as stronger than benefit-driven leads because emotions drive purchases while benefits connect with intellect. Promise of 4% control if prospect emotions are 100% accurate; 2% if 50% accurate."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"

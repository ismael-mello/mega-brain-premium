      title: "Continuity Pricing: $39-$300/month"
      description: "Continuity offers at point of purchase: $39/month for info products, up to $200-$300/month for high-ticket programs. Best time to make continuity offer is immediately at point of purchase when buyer is in buying mode."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - continuity
        - pricing
        - subscription-economics
    - id: "HEUR-CM-080"
      title: "60-80% Phone Orders in Direct Mail"
      description: "In Clayton's direct mail promotions, 60-80% of orders arrive by telephone. The remaining 20-40% order by mail. An extra premium for phone orders (vs. mail) has been a key component of his biggest winners — because mail orders have higher abandonment."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - order-channels

        - direct-mail
        - optimization
    - id: "MET-CM-072"
      title: "Free Writing / Brain Dump Method"
      description: "(1) Absorb product info for days. (2) Absorb prospect info for days. (3) Wake early at peak energy. (4) Without looking at notes, close eyes, hands on keyboard. (5) Think about how prospect and product connect. (6) Dump everything from subconscious — 10-20 pages. (7) Much is directly usable or provides breakthrough insights."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"

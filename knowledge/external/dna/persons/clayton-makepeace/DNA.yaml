    - id: "MET-CM-077"
      title: "Closing Copy Process"
      description: "Clayton 6-step Master Closer In Print methodology: (1) summarize the value built, (2) restate the irresistible offer, (3) reinforce risk reversal with guarantee, (4) create urgency and scarcity, (5) make the action step crystal clear, (6) final emotional push."

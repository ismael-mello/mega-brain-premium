    - id: "MET-CM-073"
      title: "Prospect Understanding Process"
      description: "(1) Use intuition and common sense. (2) Gather demographics. (3) Study their media consumption. (4) Read their forums and communities. (5) Interview real prospects. (6) Become the prospect mentally through method copywriting. (7) Map desires, beliefs, emotions, behaviors."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:

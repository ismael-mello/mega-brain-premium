    - id: "HEUR-CM-038"
      title: "Standard Advance: $25,000 Split 50/50"
      description: "Standard copywriting advance against royalty: $25,000 total. $12,500 upon signing/reserving writer's time. Remaining $12,500 upon delivery of first draft or approved final copy (varies by relationship)."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:

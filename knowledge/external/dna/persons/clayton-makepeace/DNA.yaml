    - id: "HEUR-CM-078"
      title: "Soft Offer Response Premium"
      description: "Soft offers (try for 30 days free, bill later) can bring 5x more new customers than hard offers. Even if 20% don't pay, the net customer count is dramatically higher. David DeAngelo sells everything on soft offers."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"

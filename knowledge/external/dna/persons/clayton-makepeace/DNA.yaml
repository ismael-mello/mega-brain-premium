    - id: "HEUR-CM-058"
      title: "Equity Option: 10% of Company Stock for Strategic Consultants"
      description: "Advanced consulting agreement includes option to purchase 10% of client company stock, vesting over years. If no IPO, converts to deferred compensation equal to 10% of company value increase. Limited to 25% of cash flow per year."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"

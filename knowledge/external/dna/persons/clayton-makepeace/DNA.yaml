        - compound-improvement
        - implementation
    - id: "MET-CM-075"
      title: "Lose Money on Acquisition Growth Strategy"
      description: "(1) Calculate customer LTV (avg years x annual purchases x net profit per purchase). (2) Calculate first-60-day additional purchase value. (3) Allocate portion as allowable acquisition cost. (4) Mail to lists that break even only at extended 60-day window. (5) Result: 2-3x more new customers per year."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:

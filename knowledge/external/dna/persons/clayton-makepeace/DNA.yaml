    - id: "MET-CM-074"
      title: "30% Solution Implementation"
      description: "(1) Increase promotion frequency by cutting prep time. (2) Expand mailing universe with multiple list brokers holding exclusives. (3) Boost response through new headlines, offers, formats. (4) Increase orders per customer via horizontal marketing and lifecycle campaigns. (5) Increase order size through upsells, bundles, premium tiers."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:

    - id: "HEUR-CM-083"
      title: "Maximum 3 Quantity Options for Supplements"
      description: "For nutritional supplements, maximum of 3 quantity options (e.g., 3-month, 6-month, 1-year supply). Too many choices increase the chance of losing the sale. Every extra second spent deciding is a potential lost order."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"

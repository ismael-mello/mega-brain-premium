  L5_METHODOLOGIES:
    - id: "MET-CM-001"
      title: "How to Get Your First Copywriting Client"
      description: "Step 1: Write a sales letter selling YOUR services. Step 2: Make every accomplishment sound impressive (gild the lily truthfully). Step 3: Print hundreds of copies. Step 4: Hand them out at industry events. Step 5: Follow up on every lead. Step 6: Accept low-paying first gigs to build portfolio. Step 7: Use first control as proof. Step 8: Call everyone with 'Let me show you my most recent control.'"
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - client-acquisition
        - career-launch
        - self-promotion
    - id: "MET-CM-002"
      title: "How to Structure a Royalty Deal"
      description: "Step 1: Negotiate base fee (advance against royalties or separate). Step 2: Set royalty rate per thousand names mailed (start at $10K/million). Step 3: Specify monthly reporting requirements. Step 4: Include audit rights clause. Step 5: Add reverse-engineering protection. Step 6: Specify payment timing (within 30 days). Step 7: Add interest clause for late payments."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - deal-structuring
        - royalties
        - contracts
    - id: "MET-CM-003"
      title: "How to Write a 20-Page Sales Page in One Day"
      description: "Pre-Day: Week of preparation. Day -5 to -3: Deep research on product, prospect, competition. Day -3 to -2: Extract benefits, rank by impact, gather proof. Day -2 to -1: Create detailed section-by-section outline. Day -1: Sleep on it, let subconscious work. Day 0: Start at 4am, follow outline section by section, write without editing. Day +1: Edit and polish."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - speed-writing
        - copywriting-process
        - productivity
    - id: "MET-CM-004"
      title: "How to Negotiate a Non-Compete for Cash"
      description: "Step 1: Client presents non-compete clause. Step 2: Express willingness but note the cost. Step 3: Calculate: 'I've spent years developing relationships with other clients. If you deprive me that right, you have to pay.' Step 4: Propose annual fee ($120K in Clayton's example). Step 5: Alternatively, narrow the non-compete scope to specific niches. Step 6: Ensure compensation covers actual opportunity cost."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - negotiation
        - non-compete
        - deal-structuring
    - id: "MET-CM-005"
      title: "How to Handle Regulatory Threats (FTC/FDA/CFTC)"
      description: "Step 1: Have compliance clause in EVERY contract. Step 2: Ensure client has compliance attorney review all copy. Step 3: Maintain substantiation file with third-party proof for every claim. Step 4: If contacted by regulator, hire attorney immediately. Step 5: Cooperate voluntarily (it's not really voluntary). Step 6: Your contract + substantiation file is your defense."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - legal-protection
        - compliance
        - risk-management
    - id: "MET-CM-006"
      title: "How to Turn a Client Into a Lifetime Client"
      description: "Month 1: Deliver excellent first project. Month 2-3: Ask about backend promotions, renewal campaigns. Month 4-6: Start contributing strategic ideas beyond copy. Month 7-12: Understand their entire business model. Year 2+: Propose new revenue streams, new products. Year 5+: Become so embedded they can't function without you."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-retention
        - lifetime-value
        - strategic-positioning
    - id: "MET-CM-007"
      title: "How to Review and Negotiate a Contract"
      description: "Step 1: Read every word. Step 2: Yellow highlighter on anything you don't understand. Step 3: Pay attorney for 1 hour to explain. Step 4: Only raise issues on major points (indemnification, uncompensated non-compete, compliance). Step 5: Don't be nitpicky if company is reputable. Step 6: Use unexpected clauses as negotiation leverage."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - legal-review
        - negotiation
    - id: "MET-CM-008"
      title: "How to Build a Control Portfolio from Nothing"
      description: "Step 1: Accept any assignment you can get (even male potency products). Step 2: Write as if to one specific person you know. Step 3: Beat the existing control. Step 4: Now you have proof. Step 5: Call prospects with 'Let me send you my most recent control.' Step 6: Don't send everything — send the most impressive piece only. Step 7: Frame it as saving their time."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - career-launch
        - portfolio-building
        - client-acquisition
    - id: "MET-CM-009"
      title: "How to Use Your Research Process to Eliminate Writer's Block"
      description: "Step 1: Create research document organized by section (product features, benefits, proof, offer, competition). Step 2: Fill each section with raw notes, quotes, data. Step 3: Create copy outline following section order. Step 4: Under each section heading, paste relevant research notes. Step 5: When writing, you're simply transforming notes into copy — never staring at a blank page."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - writer's-block
        - copywriting-process
        - productivity
    - id: "MET-CM-010"
      title: "How to Handle a Client's Bad Compliance Crits"
      description: "Step 1: Don't blindly delete flagged copy. Step 2: Ask 'What CAN I say?' Step 3: Get compliance to help solve the problem, not just identify it. Step 4: If compliance rewrites are poorly written, fix the writing. Step 5: If they misread your intent, explain what the passage actually says. Step 6: Be an active partner — their call ultimately, but fight for your copy."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - client-collaboration
        - copy-review
    - id: "MET-CM-011"
      title: "How to Monetize Every Client Touchpoint"
      description: "Touchpoint 1: Primary promotion (fee + royalty). Touchpoint 2: Backend promotions (renewals, upsells). Touchpoint 3: New product launches. Touchpoint 4: Strategic consulting (retainer). Touchpoint 5: Non-compete compensation if requested. Touchpoint 6: Percentage of overall sales if possible."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - income-multiplication
        - deal-structuring
        - client-expansion
    - id: "MET-CM-012"
      title: "How to Fire a Bad Client Safely"
      description: "Step 1: Identify the problem (bad crits, fraud, non-payment). Step 2: Invoke kill fee clause (keep advance). Step 3: Be direct: 'This isn't going to work.' Step 4: If criminal activity detected, resign immediately in writing. Step 5: The resignation letter itself should be a persuasion piece (sell the regulator on not coming after you)."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - client-management
        - risk-management
        - exit-strategy
    - id: "MET-CM-013"
      title: "How to Launch Copy Career from Adjacent Industry"
      description: "Step 1: Identify copywriting skills from current role (Carline: marketing director → copywriter). Step 2: Write one small piece (insert, sidebar) to test aptitude. Step 3: Learn by reading everything a top copywriter writes. Step 4: Build relationships in the industry (list brokers, other copywriters, clients). Step 5: Wait for unexpected opportunity. Step 6: Parlay first win into portfolio piece."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - career-transition
        - client-acquisition
        - networking
    - id: "MET-CM-014"
      title: "How to Protect Against Copy Paraphrasing Theft"
      description: "Step 1: Include 'reverse engineering' clause in contract. Step 2: Specify that any derivative use of your copy requires royalty payment. Step 3: Clause reads: 'so long as contractor is compensated, company shall not be restricted from modifying, reverse engineering, or decompiling the work.' Step 4: This means paraphrased versions of your copy still owe royalties."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - royalty-protection
        - contracts
        - intellectual-property
    - id: "MET-CM-015"
      title: "How to Get Premium Fees Through Scarcity"
      description: "Step 1: Write great copy consistently. Step 2: Publicize every win broadly. Step 3: When new client calls, express genuine scheduling constraints. Step 4: Let them bid up ($15K → $20K → $25K). Step 5: Never chase. Step 6: For royalties, same dynamic: $10/thousand → $20 → $50. The clients raise your rates, not you."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - pricing-strategy
        - scarcity
        - personal-branding
    - id: "MET-CM-016"
      title: "How to Write Effective Bullets for Self-Promotion"
      description: "Step 1: Take every accomplishment, no matter how modest. Step 2: Frame in most impressive terms possible (100% truthful). Step 3: Use specific numbers ('6% cash with order,' '23:1 ROI,' '5,000 copies'). Step 4: Add context that makes it impressive ('from a compiled list,' 'as a first-time writer'). Step 5: Include credibility builders ('quit my day job to do this full time')."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - self-promotion
        - bullet-writing
        - personal-branding
    - id: "MET-CM-017"
      title: "How to Set Up a Client Launch Call"
      description: "Step 1: Schedule call with editor/product creator AND marketing team. Step 2: Part brainstorming: explore directions, themes, angles together. Step 3: Part information gathering: ask every question you need answered. Step 4: Document everything. Step 5: Identify what additional research materials you need. Step 6: Get commitment on timeline."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_01.txt"
      domains:
        - client-collaboration
        - project-kickoff
        - workflow
    - id: "MET-CM-018"
      title: "How to Structure LLC for Copywriter Protection"
      description: "Step 1: Form LLC (Limited Liability Corporation). Step 2: Provides corporate shield protecting personal assets. Step 3: Government can still penetrate but adds layer. Step 4: Bill through LLC for all client work. Step 5: Combined with contract compliance clauses = multiple protection layers."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - legal-protection
        - business-structure
        - risk-management
    - id: "MET-CM-019"
      title: "How to Read and Learn from Other Copywriters' Controls"
      description: "Step 1: Read everything a top copywriter writes. Step 2: Note what makes it feel like they're talking to YOU personally. Step 3: Identify the emotional hooks and structural patterns. Step 4: Study the transitions, proof elements, and CTA techniques. Step 5: Read the masters every year — the market changes. Step 6: Talk to other copywriters about what's working now."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - continuous-learning
        - swipe-file-study
        - copywriting-craft
    - id: "MET-CM-020"
      title: "How to Use Conference Networking for Client Acquisition"
      description: "Step 1: Identify events where potential clients gather. Step 2: Write a sales letter for your services (before the event). Step 3: Print copies at local Kinkos. Step 4: Stand outside and hand them to attendees (overcome fear). Step 5: Include specific accomplishments and pricing. Step 6: Follow up with every interested person. Expected: ~1% conversion to gigs."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - networking
        - client-acquisition
        - direct-response
    - id: "MET-CM-021"
      title: "How to Negotiate from Weakness (New Copywriter)"
      description: "Step 1: Accept that you have no leverage yet. Step 2: Make risk-free offers (no salary, just commission/override). Step 3: Accept low fees for portfolio-building projects. Step 4: Use 'YET' — 'very few people have heard of me YET.' Step 5: Offer below-market pricing with urgency ('fraction of what I'll charge in the not too distant future'). Step 6: Over-deliver to build testimonials."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - negotiation
        - career-launch
        - positioning
    - id: "MET-CM-022"
      title: "How to Channel Personal Crisis Into Better Copy"
      description: "Step 1: Acknowledge the emotional difficulty openly. Step 2: Don't suppress — channel raw emotion into understanding prospect's emotions. Step 3: Use the vulnerability to write more authentic, empathetic copy. Step 4: If too destabilized to write, take a break (sleep on it). Step 5: Separate personal narrative from professional output."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - emotional-management
        - copywriting-craft
        - resilience
    - id: "MET-CM-023"
      title: "How to Evaluate Whether to Accept a Client"
      description: "Check 1: Is the product legitimate and good? Check 2: Does the company have compliance processes? Check 3: Do they pay on time? (Ask other copywriters.) Check 4: Do they have a history of screwing copywriters? Check 5: Will they let you be strategic, not just order-taking? Check 6: Is there potential for long-term, expanding relationship? If any check fails, proceed with caution or decline."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-selection
        - due-diligence
        - risk-assessment
    - id: "MET-CM-024"
      title: "How to Build a Career from Fundraising Background"
      description: "Step 1: Master emotional writing through fundraising (hardest form — no product benefit). Step 2: Read direct mail pieces obsessively. Step 3: Write spec pieces using emotional tools. Step 4: Transition skills to commercial direct response. Step 5: The emotional foundation becomes your competitive advantage in ANY niche."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - career-development
        - fundraising-to-commercial
        - emotional-persuasion
    - id: "MET-CM-025"
      title: "How to Communicate with Compliance Officers"
      description: "Step 1: Don't just accept 'you can't say this.' Step 2: Ask: 'What CAN I say?' Step 3: A good attorney tells you how to do what you need to do legally. Step 4: If compliance rewrites have spelling/grammar errors, fix them. Step 5: If they misread intent, explain what passage actually says. Step 6: Negotiate on language, not on compliance."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - communication
        - copy-review
    - id: "MET-CM-026"
      title: "Spec Assignment Client Acquisition Method"
      description: "Step-by-step: (1) Pick a company you want to write for, (2) Choose one of their products/newsletters, (3) Study their current promotions, (4) Write the best promotion you can — take as long as you need, (5) Send it to their creative director with a cover letter, (6) Follow up with a call offering the deal: 'This package has potential — how much do you want for it?' or 'Help me finish it + copy chief me, I'll take reduced royalty.'"
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - client-acquisition
        - copywriting-business
        - beginner-strategy
    - id: "MET-CM-027"
      title: "Non-DR Company Revenue Share Method"
      description: "Step-by-step: (1) Identify local or non-DR company that should be using direct marketing but isn't, (2) Approach owner with: 'You want new clients? I want to write for you. You don't pay upfront,' (3) Propose 10-30% of net sales, (4) Client agrees because they believe advertising doesn't work, (5) Write killer copy, (6) Collect percentage of massive results they never expected."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - client-acquisition
        - deal-structuring
        - non-dr-companies
    - id: "MET-CM-028"
      title: "In-Kind Trade Client Method"
      description: "Process: (1) Identify service you want but can't afford (e.g., flight lessons, gym, restaurant), (2) Write a letter to providers: 'You want new clients. I want your service. There's a deal to be made,' (3) Send on Friday — get calls Saturday, (4) Walk out with credit on their books (Clayton got $20,000 flight school credit) + take first lesson same day."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - client-acquisition
        - creative-compensation
        - bartering
    - id: "MET-CM-029"
      title: "Copy Cub Apprenticeship Method"
      description: "Process: (1) Find senior writer with more work than they can handle via networking/conferences, (2) Show them your best samples (even spec), (3) Get hired as copy cub at reduced rates, (4) Work under their auspices on real projects for 6-12 months, (5) Get copy-chiefed on every project, (6) Build portfolio: 'Clayton Makepeace and I wrote this together,' (7) Use that portfolio to approach major clients directly."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - apprenticeship
        - copywriting-business
        - career-acceleration
    - id: "MET-CM-030"
      title: "Testimonial Collection Method"
      description: "Process: (1) After every successful package, immediately ask client for testimonial, (2) For initial portfolio, email past clients — even ones you haven't talked to in a decade, (3) Ask for 'a couple paragraphs about what I did for your company,' (4) Results: even CEOs of $100M+ companies will write detailed 5-7 paragraph testimonials, (5) Post on website + include in FedEx sample packages."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - self-promotion
        - credibility
        - portfolio-building
    - id: "MET-CM-031"
      title: "Outline-Based Writing Acceleration Method"
      description: "Process: (1) Use template outline appropriate to project type (short/medium/long copy), (2) Read all research materials chronologically, (3) Copy-paste relevant passages from digital docs into both research document (with source notes) and outline, (4) Result: 20-40 page document with content already placed, (5) Edit/rewrite to match editor's voice, (6) Never face blank page — always editing existing text."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - productivity
        - copywriting
        - writing-process
    - id: "MET-CM-032"
      title: "Client Launch Meeting Protocol"
      description: "Pre-meeting: (1) Request year of back issues, free gifts, bios, testimonials, competitor promos, (2) Study all materials before the call, (3) Form initial ideas about product positioning. During meeting: (4) Ask for successful AND unsuccessful promos — identify which is which, (5) Listen carefully to marketing team's coded language about past tests, (6) Ask for raw testimonials and PR output, (7) Request digital documents for everything."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - client-relationships
        - research
        - copywriting-process
    - id: "MET-CM-033"
      title: "Springboard Document Creation Method"
      description: "Process: (1) Position the expert — what makes them unique, what's their 'tablo' (positioning backdrop), (2) List all prospect THOUGHTS about topic from male perspective, (3) For each thought, identify the EMOTION: fear, frustration, excitement, disgust, desire, (4) Repeat for female perspective — recruit female colleague/focus group if needed, (5) This document becomes the launchpad for all theme development."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - market-research
        - copywriting
        - prospect-profiling
    - id: "MET-CM-034"
      title: "Source Citation Compliance Method"
      description: "Process: (1) Create a research document alongside your outline, (2) When copying from client's materials, paste into BOTH research doc AND outline, (3) In research doc, note source, date, page number, (4) Use keyword codes (e.g., FA = Federal Aviation Report) in brackets, (5) When client asks 'where did you get this number?' — find keyword in research doc, report exact issue and page."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - compliance
        - research-methodology
        - copywriting
    - id: "MET-CM-035"
      title: "SRDS Client Prospecting Method"
      description: "Process: (1) Get Standard Rate & Data Service direct mail edition (~4 inches thick, ~60,000 mailing lists), (2) Each list represents a company that buys mailing lists = active direct marketer, (3) Filter for response-type lists (not compiled), (4) These companies are proven direct mailers who need copywriters, (5) Contact their marketing departments with samples."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 7/transcription_pdf_prog_Makepeace_Six_Figures_07_Transcript.txt"
      domains:
        - client-acquisition
        - prospecting
        - direct-mail
    - id: "MET-CM-036"
      title: "Control-Challenge-Reformat Method"
      description: "Process: (1) Study client's current control format, (2) Write challenger in SAME format, (3) If you win control, immediately analyze format for cost savings, (4) Pare down copy to match cost-per-piece of previous control if needed (e.g., 24-page → 16-page), (5) THEN test alternative formats (bookalog, 6x9, etc.) with proven copy, reducing risk."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - testing-strategy
        - format-optimization
        - direct-mail
    - id: "MET-CM-037"
      title: "Left-Brain/Right-Brain Day Extension Method"
      description: "Process: (1) Begin day with creative writing (right brain), (2) When creative energy exhausts (~3-4 hours), switch to detail tasks: research, sorting, outlining, proofreading (left brain), (3) After left-brain session (~1-2 hours), return to creative work — you'll be rejuvenated, (4) Repeat cycle throughout day, (5) Result: extend productive day from 5 hours to 17-18 hours."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - creative-process
        - time-management
    - id: "MET-CM-038"
      title: "Conference Networking Method (Parris Model)"
      description: "Process: (1) Attend industry conferences (AWAI boot camp, DMA, etc.), (2) Bring your best samples in a professional folder (even if from different industries), (3) Write a 'hot cover letter' to accompany samples, (4) Walk the floor approaching clients who are looking for writers, (5) Result: Parris Lampropoulos walked away from one conference with several assignments, tens of thousands in advances, and his main long-term client (Soundview)."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - client-acquisition
        - networking
        - conferences
    - id: "MET-CM-039"
      title: "Testimonial-Driven Lead Development"
      description: "Process: (1) Request all testimonials from client, (2) Identify 2-3 strongest testimonials, (3) Call those customers directly, (4) Ask: how did you feel BEFORE the product? How did the problem reduce your quality of life?, (5) Get their full story — skepticism, trial, transformation, how they feel now, (6) Lead with this story as the opening of the promotion, (7) Include actual testimonial in a sidebar within the story."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - copywriting
        - testimonials
        - lead-development
    - id: "MET-CM-040"
      title: "Guarantee Writing Method"
      description: "Process: (1) Point out all other folks making money off prospect whether they help or not (broker, banker, doctor), (2) Say 'I think that's wrong — if I can't do what I promise, I wouldn't feel right keeping your money,' (3) Tell prospect specifically what you promise to do ($5K richer this year, 20 pounds lighter, etc.), (4) Make it a 'wedding vow' or 'solemn promise,' (5) Include consequences of declining the offer — word pictures of life WITHOUT benefits."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - guarantees
        - closing
    - id: "MET-CM-041"
      title: "Focus Group Proxy Method (For Opposite Gender)"
      description: "Process: (1) Realize you cannot accurately write for opposite gender's emotions, (2) Recruit a colleague of that gender (Clayton called Carline Anglade-Cole), (3) She had already run an informal focus group at her home with prospect-age women, (4) Ask one open-ended question: 'What's it like being a woman seeing yourself grow older?', (5) Record the 90-minute brain dump, (6) Map thoughts and emotions from that session into your springboard document."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - market-research
        - prospect-profiling
        - copywriting
    - id: "MET-CM-042"
      title: "Copy Cub Pairing Method (Bencivenga Model)"
      description: "Process: (1) Find a writer at similar skill level at a conference or through networking, (2) Agree to critique each other's copy regularly, (3) Exchange work on every project — give honest critique (positive AND negative), (4) Sharpen each other's skills over months/years, (5) Result: Gary Bencivenga paired with Dan Rosenthal early on — both became multi-million-dollar copywriters."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - skill-development
        - networking
        - copywriting-business
    - id: "MET-CM-043"
      title: "Value Sidebar Comparison Method"
      description: "Process: (1) Pick a familiar daily expense (cup of Starbucks at $5/day = $1,825/year), (2) Compare to product cost ($99/year), (3) Show that product costs LESS than something prospect already buys without thinking, (4) Alternatives: gallon of milk, carton of eggs, pack of smokes, tank of gas — whatever is relatable, (5) Place near order form so flippers/scanners see the value."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - value-positioning
        - offer-design
    - id: "MET-CM-044"
      title: "Partnership Model Implementation (Step-by-Step)"
      description: "1) Accept freelance assignment from target client. 2) Over-deliver on assignment. 3) Ask to see customer journey post-acquisition. 4) Identify 1-2 easy wins (customer service scripts, product stuffers, retention gaps). 5) Fix one for free. 6) Let results speak — client will pursue partnership. 7) Structure deal: retainer + royalties + exclusivity. 8) Expand role naturally over time."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - partnership-development
        - implementation
        - business-building
    - id: "MET-CM-045"
      title: "House File Marketing Program Setup"
      description: "Step 1: Define active customer (12 months typical). Step 2: Get customer file data into database. Step 3: Set up RFA codes with appropriate ranges. Step 4: Pull initial RFA count reports. Step 5: Identify immediate urgencies (attrition risks). Step 6: Design monthly promotion calendar (vertical + horizontal). Step 7: Set up tracking for monthly RFA trend analysis. Step 8: Implement customer upgrade campaigns."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - house-file-marketing
        - database-marketing
        - implementation
    - id: "MET-CM-046"
      title: "New Client Company Entry Audit"
      description: "Day 1: Call toll-free number as customer — test service quality. Day 2: Request RFA tables and customer file reports. Day 3: Review product stuffers, thank-you letters, welcome packages. Day 4: Audit customer retention program (or lack thereof). Day 5: Review testing history and cadence. Day 6: Identify quick wins (highest impact, lowest cost). Day 7: Present findings with specific revenue projections."
      source_file: "Bonuses/Makepeace Business System/Mod 3/transcription_pdf_prog_Makepeace_Business_System_03_Transcript.txt"
      domains:
        - business-diagnostics
        - partnership-entry
        - audit-methodology
    - id: "MET-CM-047"
      title: "Marketing Model Selection Process"
      description: "1) Ask: 'Who are the 5 most successful companies in this niche?' 2) Research their prospect targeting, media, offers, price-points, formats. 3) Check SRDS for growth data. 4) Buy from targets and competitors to trigger promos. 5) Subscribe to all their ezines and register on sites. 6) Duplicate their proven model. 7) Once matched, then test innovations."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - marketing-strategy
        - competitive-intelligence
        - model-selection
    - id: "MET-CM-048"
      title: "Irresistible Offer Construction (Sequential)"
      description: "1) Start with the Rationale (why this amazing deal). 2) Establish regular price as great value. 3) Present 50% discount. 4) Dimensionalize the savings (daily cost vs. cup of coffee). 5) Define 2-3 purchase options (not more). 6) Choose payment terms (test soft offers). 7) Create theme-aligned premiums (more for higher tiers). 8) Craft 1-year+ guarantee (tie to performance). 9) Add urgency premiums (10-day + phone bonus). 10) Emphasize fast fulfillment."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - offer-engineering
        - copywriting-methodology
        - conversion-optimization
    - id: "MET-CM-049"
      title: "Killer Product Evaluation Protocol"
      description: "For each potential product, score: 1) Benefits prospects already want? 2) Product really works? (proof elements). 3) Something new? 4) Proprietary/patented? 5) Multi-benefit? 6) Addresses biggest fears? 7) Both preventive and curative? Then verify: reasonable price, sufficient markup, downstream sales potential. If YES to 7+, you have a grand-slam candidate."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - product-evaluation
        - due-diligence
        - product-selection
    - id: "MET-CM-050"
      title: "The Positioning Development Process"
      description: "1) Study positioning theory (Ries & Trout). 2) Map all competitors' positions in prospect's mind. 3) Identify the golden ladder — who's #1, #2, etc. 4) If can't be #1, find the 'window' — an unoccupied category. 5) Create new category you can own. 6) Saturate market with new position before copycats appear. 7) Protect position by avoiding line extensions."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - category-creation
        - market-strategy
    - id: "MET-CM-051"
      title: "Customer Upgrade Campaign Execution"
      description: "1) Pull RFA reports. 2) Identify customers just below key thresholds (frequency: 3 orders → target 4th; amount: $199 avg → target $200+ product). 3) Create promotion specifically designed to push them past breakpoint. 4) Use special offers, time-limited discounts, product bundles. 5) Measure upgrade rates. 6) Track new RFA codes post-campaign. 7) Repeat monthly."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-upgrading
        - campaign-execution
        - revenue-optimization
    - id: "MET-CM-052"
      title: "Customer Retention Emergency Protocol"
      description: "1) Pull recency report. 2) Count customers at 10-12 months (imminent expiry). 3) Calculate revenue at risk (% of active base × average LTV). 4) Design retention campaign: customer appreciation offer, anniversary discount, personal letter from owner, special premium for reactivation. 5) Deploy within 7 days. 6) Measure reactivation rate. 7) Make this a permanent monthly process."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-retention
        - reactivation
        - campaign-execution
    - id: "MET-CM-053"
      title: "The Deal Negotiation Sequence"
      description: "1) Demonstrate value first (free or low-cost project). 2) Let results prove your worth. 3) When client approaches for deeper relationship, negotiate: a) Base retainer/salary, b) Moving/signing bonus if relocating, c) Royalties on all promotions (per-thousand or % of revenue), d) Exclusivity terms, e) Control over copy decisions, f) Company car/perks. 4) Start high — you can always come down."
      source_file: "Bonuses/Makepeace Business System/Mod 5/transcription_pdf_prog_Makepeace_Business_System_05_Transcript.txt"
      domains:
        - negotiation
        - deal-making
        - compensation-structure
    - id: "MET-CM-054"
      title: "The Customer Service Script Optimization"
      description: "1) Call your own company's toll-free number as mystery shopper. 2) Try to order — test upsells, cross-sells, extended terms. 3) Try to complain — test resolution process. 4) Document gaps. 5) Write proper scripts: always offer upgrade options, always suggest complementary products, always gather one new data point, always make customer feel loved. 6) Train reps. 7) Monitor and refine."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-service
        - scripting
        - revenue-optimization
    - id: "MET-CM-055"
      title: "Welcome/Gauntlet Sequence Design"
      description: "First 30-60 days after customer acquisition: Day 1: Order confirmation with unadvertised bonus. Day 3-5: Product ships with stuffers, calendar, coupons, personal letter. Day 7: Thank-you email with survey + cross-sell offer. Day 14: 'How are you enjoying it?' check-in + premium upgrade offer. Day 30: Special loyal customer discount. Day 60: Renewal/replenishment offer. Each contact = bond + sell + learn."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-onboarding
        - gauntlet-sequence
        - customer-lifetime-value
    - id: "MET-CM-056"
      title: "Product Launch Execution (4-Stage)"
      description: "Stage 1: Create valuable free content (shock market, build authority, predispose to buy). Stage 2: Build massive list via squeeze pages (affiliates drive traffic, free content as bribe). Stage 3: Email sequence to list (problem → solution coming → anticipation → social proof → scarcity). Stage 4: Open gates (deadline, limited quantity, stop when promised)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - product-launch
        - internet-marketing
        - campaign-execution
    - id: "MET-CM-057"
      title: "The Customer Information Enrichment Process"
      description: "1) Design 4-5 question survey (at least 2 questions add data to customer file). 2) Bribe customers to complete it (free gift). 3) Task phone reps to engage in conversation and extract personal info with every call. 4) Add: education level, hobbies, spouse name/email, children's names/birthdays, religious preference. 5) Update database fields immediately. 6) Use new data in personalized copy."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-intelligence
        - database-enrichment
        - personalization
    - id: "MET-CM-058"
      title: "The Seven Percent Solution Implementation"
      description: "For each metric, create specific action: 1) Cut costs 7% (eliminate chokepoints, negotiate vendors), 2) Gain 7% more customers (new media, improved acquisition copy), 3) Boost profit-per-product 7% (price testing, reduce fulfillment costs), 4) Increase order frequency 7% (more promotions, better offers), 5) Raise average sale 7% (upsells, bundles), 6) Extend customer lifespan 7% (retention programs). Track each monthly."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - business-building
        - compound-growth
        - implementation
    - id: "MET-CM-059"
      title: "The Blanchard Approval Shipment Method"
      description: "1) Segment file precisely: 3+ years, 6+ orders/year, avg $3K+, total $50K+. 2) Package premium product beautifully. 3) Ship on approval — no upfront payment required. 4) Include personal letter explaining exclusivity. 5) Give 30 days to return or pay. 6) Result: near-100% conversion because trust is already built through years of relationship."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - high-trust-selling
        - customer-segmentation
        - approval-offers
    - id: "MET-CM-060"
      title: "Client Catching: The Self-Promotion System"
      description: "1) Build an online presence (blog, ezine, portfolio). 2) Publish content that demonstrates expertise (case studies, thought pieces). 3) Attend industry conferences and events. 4) Network with other copywriters (they refer overflow work). 5) Contact target clients directly with specific value proposition. 6) Offer first project at reduced rate or free (demonstrate value). 7) Let results sell the relationship expansion."
      source_file: "Bonuses/transcription_pdf_rep_How_to_Catch_Clients.txt"
      domains:
        - client-acquisition
        - self-promotion
        - career-development
    - id: "MET-CM-061"
      title: "The Information Product Creation Process"
      description: "1) Identify your niche (where you bring tremendous value). 2) Research demand (is the market looking for this?). 3) Create content in multiple formats (reports, audio, video, workshops). 4) Name/brand the system (create perceived uniqueness). 5) Build proof elements (testimonials, case studies). 6) Launch using product launch model or ezine model. 7) Create downstream products (advanced, coaching, live events)."
      source_file: "Bonuses/Makepeace Business System/Mod 7/transcription_pdf_prog_Makepeace_Business_System_07_Transcript.txt"
      domains:
        - information-publishing
        - product-creation
        - business-building
    - id: "MET-CM-062"
      title: "The Premium Testing Protocol"
      description: "1) Review current premiums — does each connect clearly to the product and main theme? 2) Test removing oddball premiums that create 'HUH?' factor (may increase response). 3) Test new premium titles that better reflect urgency. 4) Test different premium structures across price tiers. 5) Test stronger/longer/more specific guarantees. 6) Test higher and lower price points. 7) Always allocate test cells in every rollout."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - testing-methodology
        - offer-optimization
        - premium-strategy
    - id: "MET-CM-063"
      title: "Speed-to-Market Process Engineering"
      description: "1) Map current promotion pipeline from concept to execution. 2) Identify every procedure and person that slows the process. 3) Eliminate unnecessary approvals (especially from 'compliance' and 'legal' who kill response). 4) Empower copywriter/partner to make final copy decisions. 5) Set hard deadlines with financial consequences for delays. 6) Calculate cost of delay ($X revenue lost per day). 7) Build parallel processing where possible."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - marketing-operations
        - speed-to-market
        - process-optimization


      title: "Direct Mail Volume Decline: 90% Reduction"
      description: "In the 2000s, financial newsletters that could mail 2-3 million pieces/month now mail one-tenth as much. Health newsletters went from 30 million pieces/year to roughly one-third. Royalties declined proportionally."

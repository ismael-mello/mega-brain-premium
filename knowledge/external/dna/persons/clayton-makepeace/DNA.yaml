    - id: "HEUR-CM-056"
      title: "Newsletter Second Class Mail Rule: Premiums ≤ Subscription Price"
      description: "US Post Office law: for newsletters delivered via second class mail, the total value of free gifts offered cannot exceed the actual subscription price collected. A $39 subscription means premiums max at $39 total value."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:

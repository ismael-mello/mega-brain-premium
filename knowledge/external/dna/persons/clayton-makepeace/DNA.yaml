      title: "10% of Profit Increase = $960K/Year from One Client"
      description: "Example: Company with $40M profits. Partner improves 6 metrics by 10% each = 24% profit growth = $9.6M additional profit. At 10% share of the increase = $960,000/year from a single client, in a recession."

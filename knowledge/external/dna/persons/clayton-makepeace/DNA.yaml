        - contract-terms
    - id: "HEUR-CM-039"
      title: "Beginner Discounted Royalty: $10/M"
      description: "For unproven writers getting first assignments: offer $10 per thousand instead of the standard $30/M. This dramatically reduces client risk. 'I know it'll take a little longer, more of your time, but it's a good investment.'"
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - pricing
        - client-acquisition
        - beginner-strategy
    - id: "HEUR-CM-040"
      title: "Revenue Share for Non-DR Companies: 10-30% of Net Sales"
      description: "When approaching companies unfamiliar with direct marketing: offer to write for free, taking 10-30% of net sales. Dan Rosenthal got 30% of sales on one promotion — his share was $4M. Easy for client to sign because they don't believe it'll work."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - pricing
        - deal-structuring
        - client-acquisition
    - id: "HEUR-CM-041"
      title: "Earnout Threshold: $25K Advance at $25/M = 1M Pieces"
      description: "At $25,000 advance with $25/M royalty, publisher must mail 1,000,000 pieces before the copywriter starts earning additional royalty income beyond the advance. Many packages from unproven writers never reach this threshold."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - direct-mail-economics
        - deal-structuring
    - id: "HEUR-CM-042"
      title: "Copy Cubs → Mid-to-High Six Figures in Years"
      description: "Of 6-7 copy cubs Makepeace mentored, every one became mid-to-high six-figure or million-dollar writer. Carline Anglade-Cole exceeded her six-figure corporate salary in her very first year. Parris Lampropoulos hit seven figures in just a few years."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:

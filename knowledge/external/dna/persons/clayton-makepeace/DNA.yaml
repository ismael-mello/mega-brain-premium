layers:
  L1_PHILOSOPHIES:
    - id: "FIL-CM-001"
      title: "Money Is the Root of ALL"
      description: "Money is not the root of all evil — money is the root of ALL. Money is life. It's a proxy for your life. What you're doing when you write copy is selling a chunk of your life in return for money. If money is evil, your life is evil. Without money, there is no freedom, no choice, no ability to help others."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - copywriting-business
        - mindset
        - wealth-philosophy
    - id: "FIL-CM-002"
      title: "You Won't Be a Top Earner Until Honest About Money"
      description: "You're really not going to be a top earner until you can be honest with yourself about the importance of money in your life. Getting past the 'money is evil' programming is the first step to financial success as a copywriter."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - mindset
        - wealth-philosophy
        - copywriting-business
    - id: "FIL-CM-003"
      title: "Money and Freedom Are the Same Thing"
      description: "Without money, you work for someone else and they make all determinations for you. Money gives ability to help people, contribute to causes, maintain relationships. More families break up over financial problems than any other reason."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - wealth-philosophy
        - freedom
        - relationships
    - id: "FIL-CM-004"
      title: "Perpetual Student Philosophy"
      description: "You're a perpetual student once you start down this road, because the market changes. Human beings don't change, but the market will. I still read the Masters every year. I talk to other copywriters to figure out what's working."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - continuous-learning
        - copywriting-craft
        - professional-development
    - id: "FIL-CM-005"
      title: "Working Smarter Not Harder"
      description: "It's not about working harder or longer hours. It's about working smarter. The smart deal structures, the strategic positioning, the leverage — that's what creates the massive income differential between copywriters."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - business-strategy
        - leverage
        - copywriting-business
    - id: "FIL-CM-006"
      title: "You Are the Product"
      description: "In copywriting business, you're the product. If you have your basic chops, you know how to do this, you're selling a great product — someone who can work miracles for clients. Marketing a great product is easy."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - personal-branding
        - copywriting-business
        - positioning
    - id: "FIL-CM-007"
      title: "Don't Betray Your Own Values"
      description: "Do not betray your own values. It's not worth it. I don't care if it's not illegal, if it doesn't break a regulation. If you don't feel right about it, if the customer isn't getting the long end of this, walk away."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - ethics
        - integrity
        - copywriting-business
    - id: "FIL-CM-008"
      title: "Clients Want More Than a Copywriter"
      description: "Clients won't tell you this, but they really want more than just a copywriter. They want a tactician and strategist. They want you to contribute ideas. They want you to make the pie bigger."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - client-relationships
        - strategic-value
        - copywriting-business
    - id: "FIL-CM-009"
      title: "Dominant Emotion Is Everything"
      description: "All I had to work with in fundraising was emotion — scare the bejesus out of people or make them feel sorry. What I was buying for my $10 contribution was catharsis, feeling good that I'd done something. That's why dominant emotion advertising is my core approach."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - copywriting-craft
        - emotional-persuasion
        - direct-response
    - id: "FIL-CM-010"
      title: "Courtship Metaphor for Client Acquisition"
      description: "Attracting clients is like courtship. You don't give long lectures about how their life would be better with you. You find out who they are, what they want, and you demonstrate value through creative, memorable gestures."
      source_file: "Mod 3/transcription_mp4_prog_Makepeace_Copywriting_Business_03.txt"
      domains:
        - client-acquisition
        - persuasion
        - relationship-building
    - id: "FIL-CM-011"
      title: "Write Until You Run Out of Benefits"
      description: "My rule on copy length: write until you run out of benefits. If there are long dead spaces where you're just filling time, it's too long. If you had to leave out important reasons why the prospect should buy, it's too short."
      source_file: "Peers/transcription_mp4_prog_mmb_Story_QA.txt"
      domains:
        - copywriting-craft
        - copy-length
        - direct-response
    - id: "FIL-CM-012"
      title: "Scarcity Creates Value — Don't Be Easy to Hire"
      description: "All you have to do to make millions is write great copy, make sure everybody knows about your big wins, and be not that easy to hire. Clients raised my rates — I didn't have to. Scarcity of access drives pricing power."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - pricing-strategy
        - personal-branding
        - scarcity
    - id: "FIL-CM-013"
      title: "Mind Can Be Biggest Ally or Biggest Enemy"
      description: "Your mind can be your biggest ally or your biggest enemy as you're writing copy. Managing your psychology, intensity, confidence, and emotional state is as important as your technical craft."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - mindset
        - psychology
        - copywriting-craft
    - id: "FIL-CM-014"
      title: "Six Threats to Copywriter Success"
      description: "Six threats: (1) lack of intensity, (2) intimidation, (3) lack of confidence, (4) going broke between assignments, (5) emotional problems bleeding into work, (6) ego/arrogance. Each must be actively managed."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - mindset
        - professional-development
        - copywriting-business
    - id: "FIL-CM-015"
      title: "Keeping a Client Is Cheaper Than Finding a New One"
      description: "A client should be willing to spend as much to renew/save a customer as he did to acquire one. Same principle applies to YOUR clients — keeping a client is key. Invest at least as much time keeping a client as getting them."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - client-retention
        - business-strategy
        - lifetime-value
    - id: "FIL-CM-016"
      title: "Be the Client's Champion"
      description: "Make it clear you're there for the client. You're their champion, their advocate. Your passion, your life's purpose is to get them more customers or more money from their house file. 'How can I best help you' attitude."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - client-relationships
        - positioning
        - service-mindset
    - id: "FIL-CM-017"
      title: "Never Sign Indemnification"
      description: "I won't sign a contract that says I indemnify anybody. Hold harmless is fine — I won't sue you, you won't sue me. But indemnification means I pay their legal bills if they get sued. Clayton doesn't indemnify anything."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - legal-protection
        - copywriting-business
    - id: "FIL-CM-018"
      title: "Cringing at Old Work Is a Sign of Growth"
      description: "If you're doing well, you will cringe with embarrassment when you look at your old stuff. It's a sign that you're growing. It's a good sign."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - professional-development
        - growth-mindset
        - copywriting-craft
    - id: "FIL-CM-019"
      title: "Form Copywriting Communes"
      description: "Get together, form copywriting communes — support each other. There'll be a time when people will be thanking you for getting their career started, for giving them the answer, for giving them the freedom."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - community
        - mentorship
        - copywriting-business
    - id: "FIL-CM-020"
      title: "Your First Break Comes from Where You Don't Expect"
      description: "Your first break will come from someplace you don't expect. A list broker gave Carline her first copywriting client — not another copywriter, not another company. Just keep going, keep pushing, keep talking to people."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - client-acquisition
        - networking
        - persistence
    - id: "FIL-CM-021"
      title: "Following the Money Not the Fear"
      description: "I wasn't following my fear — I was following the money. I couldn't work in my chosen field anymore so I became a copywriter. Practicality and financial necessity, not idealism, drove my career path."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - career-path
        - pragmatism
        - copywriting-business
    - id: "FIL-CM-022"
      title: "Sacrifice for What You Believe In"
      description: "We went through hard times — kiting checks, getting arrested over unpaid tickets, wife wanting me to quit. But it was a sacrifice for something I believed in, that I really thought we could make work."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - persistence
        - sacrifice
        - entrepreneurship
    - id: "FIL-CM-023"
      title: "Don't Put Good Marketing Behind a Bad Product"
      description: "I've put good marketing behind a bad product. I didn't know they were bad products, but they turned out to be. And it's had devastating consequences. So make sure what you're promoting is legitimate."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - ethics
        - product-quality
        - risk-management
    - id: "FIL-CM-024"
      title: "Be the Piano Player Not the Accomplice"
      description: "Don't shoot me, I'm just a piano player. I just write the copy. I don't determine if or when or to whom this material will be sent. The compliance responsibility must be clearly on the client."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - legal-protection
        - compliance
        - contracts
    - id: "FIL-CM-025"
      title: "Intensity Is Non-Negotiable"
      description: "Lack of intensity is the #1 threat. The failure to go the extra mile to make sure every word is right, every argument is proven. The failure to invest the skull sweat required to create something ultimately credible and persuasive."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - work-ethic
        - copywriting-craft
        - professional-excellence
    - id: "FIL-CM-026"
      title: "Accept Crits from Those Better Than You"
      description: "Being able to accept criticism from somebody better than you is really a key to growth. Red pen all over your work — that's what helps you grow. The ego fight against crits is what holds copywriters back."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - professional-development
        - humility
        - mentorship
    - id: "FIL-CM-027"
      title: "When You Stop Learning You Stop Earning"
      description: "When you stop learning, when you stop growing, when you stop reading — there's a problem and you're not going to be able to make money. You never reach a point where you've 'arrived'."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - continuous-learning
        - professional-development
        - mindset
    - id: "FIL-CM-028"
      title: "Make Yourself Indispensable"
      description: "I intentionally try to make myself indispensable to every client. One client told me: 'If you leave, I might as well shut the company completely down.' That was after 10-15 years of intentionally working toward that."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-retention
        - strategic-positioning
        - lifetime-value
    - id: "FIL-CM-029"
      title: "Copywriting Is Blind"
      description: "Copywriting is blind. It is not colored. There's no race to it. There's no sex to it. It's about connecting with your market. That's all it is."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - copywriting-philosophy
        - market-connection
        - universality
    - id: "FIL-CM-030"
      title: "Write Like You're Writing to a Friend"
      description: "I just wrote like I was writing a letter to a friend — my mom in this case. That insert pulled 5% when 2% was considered good. The personal, conversational voice outperforms formal copy."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - copywriting-craft
        - voice
        - conversational-copy
    - id: "FIL-CM-031"
      title: "Good Enough to Critique Means Good Enough to Fight For"
      description: "If a copywriter doesn't like my crit on their copy, I want to hear about it and hear why. The hardest thing is getting them to fight for their copy. But great copy comes from that creative tension."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - creative-process
        - client-dynamics
        - copywriting-craft
    - id: "FIL-CM-032"
      title: "Opportunity Hiding in Every Job"
      description: "You can look at a job as just how you have to spend eight hours a day, or as an opportunity. Within a year I'd gotten my boss fired and was running the department at age 19-20. Look for the leverage point."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - career-strategy
        - opportunism
        - initiative
    - id: "FIL-CM-033"
      title: "Suck and Amazing All in One Day"
      description: "There are many times in one day I'll feel I suck — package didn't work, going to be a Walmart greeter. Then literally hours later, client says package is kicking butt — I'm amazing. You have to find a way to deal with that emotional roller coaster."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - emotional-resilience
        - copywriting-business
        - mindset
    - id: "FIL-CM-034"
      title: "Leverage Creates the Big Income"
      description: "My income jumped from $90K to $250K+ when I learned to structure smart deals — not just fee-for-copy but royalties + backend involvement + percentage of sales. That's working smart not hard."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - deal-structuring
        - leverage
        - income-multiplication
    - id: "FIL-CM-035"
      title: "Emotional Vulnerability Makes Better Copy"
      description: "Going through hard emotional periods can inform your copy if channeled correctly. But you must manage it — don't let personal issues bleed into work as negative energy. Channel the raw emotion into understanding your prospect's emotions."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - emotional-intelligence
        - copywriting-craft
        - psychology
    - id: "FIL-CM-036"
      title: "Copywriting Is a Business First"
      description: "Think of copywriting as what it really is — a business. It's fun, it's easy, it gives you freedom, but first and foremost, it's a business. You're doing it for money. How do you measure income? Two components: the amount you make and how long it takes to make it."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - copywriting-business
        - income-optimization
    - id: "FIL-CM-037"
      title: "Sales Copy Is the One Missing Ingredient"
      description: "Sales copy is the one missing ingredient these companies need to promote existing products and add new products. They can't grow without great sales copy. Finding copywriters is the single scarce resource for direct response companies."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - copywriting-business
        - client-psychology
        - market-positioning
    - id: "FIL-CM-038"
      title: "Your Self-Promotion IS Your Sample"
      description: "Every word you write to a client about introducing yourself or your past successes is sales copy. Your self-promotions are samples. A stiff, stilted website written like a technical document destroys your positioning as a copywriter."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - self-promotion
        - copywriting-business
    - id: "FIL-CM-039"
      title: "The Most Important Product You'll Ever Sell Is Yourself"
      description: "As a copywriter, you're a salesperson. The most important product you'll ever sell is yourself. You need to spend time every month thinking about the offers you can make. Structure offers that potential clients find it difficult, if not impossible, to say no to."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - self-promotion
        - copywriting-business
        - deal-structuring
    - id: "FIL-CM-040"
      title: "You Don't Have to Raise Your Rates"
      description: "You don't have to raise your rates. All you have to do is write winners and then be unavailable when somebody calls to get on your dance card — they will raise your rates for you. Create demand by being consistently excellent and slightly scarce."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - pricing-strategy
        - copywriting-business
        - positioning
    - id: "FIL-CM-041"
      title: "Writer's Market — Not Client's Market"
      description: "The supply-demand equation is tilted very heavily in favor of the writer. This is a writer's market. Like in real estate they say seller's market — in direct response, the entire industry is a copywriter's market. They need us."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 2/transcription_pdf_prog_Makepeace_Six_Figures_02_Transcript.txt"
      domains:
        - copywriting-business
        - market-dynamics
    - id: "FIL-CM-042"
      title: "Copywriter 24 Hours a Day"
      description: "When you're a copywriter, you're a copywriter 24 hours a day. If you're mowing the lawn, taking a shower, riding your motorcycle — either consciously or subconsciously you're chewing on the project. Your subconscious makes connections while you sleep."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - creative-process
        - productivity
    - id: "FIL-CM-043"
      title: "Goofing Off Is Better Than Chores"
      description: "As a copywriter, goofing off is actually a better use of your time than mowing the lawn. Time off can be very constructive — the subconscious works on problems. When you're not writing copy, you're not making money."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - creative-process
        - income-optimization
    - id: "FIL-CM-044"
      title: "Top Freelancers Are Nice People"
      description: "Top freelancers are invariably nice people. Gary Bencivenga, Jim Rutz — unassuming, helpful, kind. The ones who rise to the top are NOT egotistical my-way-or-the-highway types. They work with clients as helpful members of the team."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - client-relationships
        - copywriting-business
        - character
    - id: "FIL-CM-045"
      title: "Two Educations — One You Pay For, One That Pays You"
      description: "There are two educations: the education you pay for (courses, training) and the education you get in the real world where people pay you. Working under a senior writer who copy-chiefs you is getting paid to learn."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - copywriting-business
        - apprenticeship
        - education
    - id: "FIL-CM-046"
      title: "Purchase Decisions Are 99% Emotional"
      description: "99 percent of our purchase decisions are not made on a rational basis but on an emotional basis to fill an emotional need. Benefits tend to connect with intellect and rationalize — but the real driver is emotion."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - buying-psychology
        - copywriting
        - persuasion
    - id: "FIL-CM-047"
      title: "A Headline's Only Job Is to Get Attention"
      description: "A headline's only job is to grab attention. One of the major mistakes copywriters make is trying to get their entire sell in the headline. All you really need is to get the prospect's attention — the equivalent of a loud bang behind them."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - headlines
        - copywriting
        - attention
    - id: "FIL-CM-048"
      title: "Never Trust Someone Else to Edit Testimonials"
      description: "Always ask for RAW testimonials — what the customer said word for word, warts and all. Don't trust somebody else to have edited that testimonial and drawn the meat out of it. FTC allows editing for grammar without changing meaning."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - testimonials
        - copywriting
        - credibility
    - id: "FIL-CM-049"
      title: "Celebrity Copywriter Status Is Bullshit"
      description: "All this celebrity stuff is just bullshit. Intimidation by a senior writer's reputation is a real emotion but the sooner you cut through it, the better. It's not about the writer — it's about the copy and the results."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - copywriting-business
        - mindset
        - apprenticeship
    - id: "FIL-CM-050"
      title: "Clients Talk About Copywriters Behind Their Backs"
      description: "The publishing industry is very incestuous. Clients attend Publishers' Roundtable meetings, share notes on copywriters, call each other to compare. Your reputation travels — word gets around through the entire industry."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - client-relationships
        - reputation
        - industry-dynamics
    - id: "FIL-CM-051"
      title: "Guarantees Are Sales Copy, Not Boilerplate"
      description: "Write guarantees as carefully as you write your sales copy. They're not technical sounding boring boilerplate. A guarantee removes objections, lets you repeat the USP, demonstrates confidence, and creates a bond like a 'wedding vow'."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - guarantees
        - closing
    - id: "FIL-CM-052"
      title: "Don't Call Them Reports — Call Them Volumes"
      description: "Never call free gifts 'reports' — it sounds cheap. Call them 'volumes' or 'books' or combine them into a 'library' (e.g., The Better Investing Library). Frame the perceived value of information based on its transformative power, not page count."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - copywriting
        - offer-design
        - perceived-value
    - id: "FIL-CM-053"
      title: "In Our Business We Are in the Business of Stereotypes"
      description: "When we select a mailing list, we are saying these prospects are stereotypically this age, sex, income. Stereotypes are never 100% accurate but there's enough truth in them to mine when writing copy."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - market-research
        - prospect-profiling
        - copywriting
    - id: "FIL-CM-054"
      title: "Go With What's Working On Your First Outing"
      description: "If the winning control is a tabloid, write a tabloid. Don't introduce new format variables on your first attempt. Count on your copy being stronger — once you get the control, THEN test different formats to save costs."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - testing-strategy
        - copywriting
        - format-selection
    - id: "FIL-CM-055"
      title: "There's No Such Thing as a Totally Sanitized Sales Message"
      description: "Any regulator can nail you at any time for any reason. Any consumer can sue you at any time for any reason. Compliance is not black and white — each business owner makes their own call on where the compliance line falls."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - compliance
        - legal
        - copywriting
    - id: "FIL-CM-056"
      title: "Delayed Projects Are Lost Income Forever"
      description: "When projects are moved into next year, that money's lost forever to this year. This year's income is reduced by exactly that amount. The number of packages you create per year is absolutely crucial to maximize income."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - income-optimization
        - productivity
        - copywriting-business
    - id: "FIL-CM-057"
      title: "Selling Is Selling Regardless of Medium"
      description: "Selling is selling. Whether face-to-face, direct mail, or internet — you must make the same number of sales: attention sale, credibility sale, readership sale, and then the product sale. Medium changes the space, not the fundamental process."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - copywriting
        - sales-process
        - persuasion
    - id: "FIL-CM-058"
      title: "The Freelance Model is Insane"
      description: "The freelance copywriting model is fundamentally broken. It incentivizes writers to rush through jobs, overbook themselves to collect advances, and short-cut learning curves. It deprives companies of each writer's best work. Partnering — not freelancing — is the path to seven figures."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - business-model
        - copywriting-business
        - freelance-vs-partner
    - id: "FIL-CM-059"
      title: "Six Figures is Chump Change"
      description: "Earning six figures ($100K-$999K) is settling. The real money — $2M, $3M, $4M+ per year — comes from becoming a full-fledged partner in clients' businesses, not from freelancing. Clayton earned over $4M/year through partnerships, not freelance assignments."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - income-philosophy
        - copywriting-business
        - wealth-mindset
    - id: "FIL-CM-060"
      title: "Copywriting's Scarcest Resource"
      description: "The scarcest resource every direct response business owner has is great copywriting. Having instant access to a competent, dedicated copywriter is money in the bank. This scarcity creates the leverage for partnership arrangements."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - copywriting-business
        - client-relationships
        - value-creation
    - id: "FIL-CM-061"
      title: "Every Company is a Giant Sieve"
      description: "Every direct response company is like a giant sieve with money pouring out the bottom due to holes in its marketing plan. A dedicated copywriter/partner can patch these leaks and realize revenue and profits currently being lost."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - business-diagnostics
        - revenue-optimization
        - partnership-value
    - id: "FIL-CM-062"
      title: "Every Customer Contact is Dual-Purpose"
      description: "Every single customer contact is an opportunity to do two things simultaneously: bond with the customer AND sell something. Whether it's a package insert, thank-you letter, customer service call, or complaint resolution — every touchpoint must serve both purposes."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-lifetime-value
        - marketing-philosophy
        - customer-bonding
    - id: "FIL-CM-063"
      title: "Bean Counters Destroy Customer Value"
      description: "Bean counters look for opportunities NOT to communicate with customers — to cut costs by reducing contacts. This is idiotic and upside down. You should be looking for MORE ways to contact customers, more excuses to write, call, or email them."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-retention
        - marketing-philosophy
        - anti-cost-cutting
    - id: "FIL-CM-064"
      title: "Optimal vs Maximum Response"
      description: "Optimal response and maximum response are two different things. Marketing that compels purchases but leaves customers annoyed or distrustful only produces customers who avoid future promotions. Think of every promotion first as a bonding tool, then as a selling tool."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - marketing-philosophy
        - customer-lifetime-value
        - sustainable-growth
    - id: "FIL-CM-065"
      title: "A Dollar Delayed is a Dollar Forfeited Forever"
      description: "Both company profits and personal income are measured in time. Every week/day/hour a promotion is delayed pushes money out of this year permanently. A one-week delay on each of 12 monthly promotions eliminates 3 promotions (25% of revenue) from the year."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - speed-of-execution
        - marketing-operations
        - revenue-optimization
    - id: "FIL-CM-066"
      title: "Everything Can Be Improved"
      description: "The three most idiotic things any marketer can say: 1) 'This is how we've always done it,' 2) 'That's how competitors do it,' 3) 'We tested that once; it didn't work.' Ignore the idiots. Test everything. Let prospects and customers give you the right answers."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - testing-philosophy
        - continuous-improvement
        - marketing-mindset
    - id: "FIL-CM-067"
      title: "Personal Proof Trumps All"
      description: "Three levels of proof exist: third-party (Bloomberg says), social proof (peers say), and personal proof (prospect experiences it himself). Personal proof is the most powerful. When pitching partnerships, let the client sample the goods — don't show the endgame on the first date."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - selling-methodology
        - proof-hierarchy
        - partnership-development
    - id: "FIL-CM-068"
      title: "Customer Complaints are Gold"
      description: "Customer complaints give you the opportunity to bond with customers in ways no other communication can. Surprise the complaining customer with instant resolution, personal attention from the owner, and an unexpected gift. They will never forget how you handled their problem."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - customer-retention
        - complaint-resolution
        - customer-bonding
    - id: "FIL-CM-069"
      title: "Positioning is the #1 Most Overlooked Skill"
      description: "The ability to position a product, person, or company for maximum sales is the most fundamental and most overlooked skill in direct marketing. Few things are more critical to success. It's a higher-level skill than copywriting itself — master positioning and USP writing becomes a breeze."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - marketing-strategy
        - competitive-advantage
    - id: "FIL-CM-070"
      title: "The Offer is Grossly Undervalued"
      description: "Most marketers and copywriters spend most of their time on themes, headlines, and opening copy, then sleepwalk through the offer. A compelling offer with the right product can easily boost response and average sale by 20-30% or more. An ill-conceived offer can kill response entirely."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - offer-engineering
        - copywriting-priorities
        - revenue-optimization
    - id: "FIL-CM-071"
      title: "Sell the Process, Not Yourself"
      description: "You don't need to be famous to partner. The system creates advantage on top of the copywriter's skill. What you did for someone in the past is far less salient to a prospective partner than what you did for HIM last month. Personal proof > track record."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - partnership-development
        - sales-philosophy
        - proof-hierarchy
    - id: "FIL-CM-072"
      title: "In Good Times Everybody's a Genius"
      description: "When a rising economic tide lifts even sloppy companies, nobody notices tons of money slipping through cracks. Recessions expose the truth. Partners who can shore up defenses, reduce costs, and increase ROI emerge with greater market share than they believed possible."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - recession-strategy
        - business-building
        - economic-cycles
    - id: "FIL-CM-073"
      title: "Be First or Create Your Own Category"
      description: "In positioning, being first in a category is nearly invincible. Being second means twice the work for half the results. If you can't win your category, create your own. Build a new golden ladder in your prospect's mind that instantly differentiates you."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - category-creation
        - competitive-strategy
    - id: "FIL-CM-074"
      title: "Never Shoot in the Dark"
      description: "The first stop when visiting a new partner should be the IT department. Direct response is all about measuring and reacting to results. You can't do that if IT is doing a half-fast job of capturing response, average sale, and ROI on every promotion."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - data-driven-marketing
        - measurement
        - marketing-operations
    - id: "FIL-CM-075"
      title: "Line Extensions Kill Positioning"
      description: "When you foolishly extend your product line into a totally new category, you don't just fail in the new category — you weaken your ownership of your original position. Xerox into computers, IBM into copiers — both got punished. Focus is the antidote."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - brand-strategy
        - focus
    - id: "FIL-CM-076"
      title: "The Partnership is a Natural Process"
      description: "Moving from freelancing to partnering should be natural, like dating. Start with a 'first date' — a single project. Demonstrate value. Let results sell the deeper relationship. Don't pitch the endgame on day one."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - partnership-development
        - client-relationships
        - sales-process
    - id: "FIL-CM-077"
      title: "Spend as Much to Keep a Customer as to Get One"
      description: "Be willing to spend at least as much to keep a customer as you spend to acquire one. Better yet, spend double, triple, even quadruple if the customer has a long buying history. Companies are structured to GET customers but not to KEEP them. This is a catastrophic asymmetry."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-retention
        - lifetime-value
        - marketing-budget-allocation
    - id: "FIL-CM-078"
      title: "The Product Price Ladder is Essential"
      description: "Every company needs a product price ladder/pyramid: at the bottom, an attractively priced product for first-time buyers (removes obstacles to entry); at the top, products that maximize revenue from each existing customer; incremental steps along the way."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - product-strategy
        - pricing
        - customer-journey
    - id: "FIL-CM-079"
      title: "Don't Fear Polarizing Your Audience"
      description: "In positioning, don't be afraid to polarize your audience. You're not looking to appeal to everyone. You want the most targeted group of prospects to recognize you as the best possible solution. The Rich Jerk example proves that even offensive positioning works if it's unique and authentic."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - brand-voice
        - differentiation
    - id: "FIL-CM-080"
      title: "Great Ideas Come in the Shower"
      description: "When you're committed exclusively to a client, you're constantly thinking about that client. Everything you see is in the context of that company. Great ideas come in the shower, at dinner, watching TV. And you won't take those ideas to a competitor."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - creative-process
        - exclusive-partnership
        - idea-generation
    - id: "FIL-CM-081"
      title: "Copy as the Wedge, Partnership as the Goal"
      description: "Start with what you can do well now — copywriting — and find additional ways to apply it to the business. That alone makes you money. Your role within the company will naturally expand as you discover problems, identify new media, and spot opportunities."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - career-progression
        - partnership-development
        - value-expansion
    - id: "FIL-CM-082"
      title: "Steal the Marketing Model Before Innovating"
      description: "When starting with a new client in a new niche, don't innovate. Find the five most successful companies, study their prospect targeting, media, offers, price-points, copy formats. Duplicate their marketing model. Once you're as good as the best, THEN test new ideas."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - marketing-strategy
        - competitive-intelligence
        - market-entry

    # =========================================================================
    # QSCS — Quick Start Copywriting System (v2.0.0)
    # =========================================================================

    - id: "FIL-CM-083"
      title: "Salesmanship in Print Is the Foundation"
      description: "Direct response copywriting is salesmanship in print. Every ad, letter, and email is a salesman making a pitch. The fundamentals of selling face-to-face translate directly to the page."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-response
        - copywriting
        - sales-philosophy
    - id: "FIL-CM-084"
      title: "Direct Response Is Scientific Advertising"
      description: "Every ad is tested, measured, and proven. Direct response is the only form of advertising where you know exactly what works. Every dollar is accountable."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-response
        - testing
        - accountability
    - id: "FIL-CM-085"
      title: "Cash Is King — Every Ad Is an Investment"
      description: "Every advertisement is an investment that must yield measurable return. If it does not pay for itself and then some, it is a failure. No excuses about brand building or awareness."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-response
        - roi-focus
        - accountability
    - id: "FIL-CM-086"
      title: "A Gifted Product Is Mightier Than a Gifted Pen"
      description: "Bencivenga wisdom Clayton teaches: a great product makes the copywriter job infinitely easier. If the product is not great, the best copy in the world will not save it long-term."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - product-selection
        - copywriting
        - marketing-philosophy
    - id: "FIL-CM-087"
      title: "Thorough Research Is 75% of the Work Pre-Done"
      description: "When you research thoroughly — product, prospect, market — three-quarters of the copywriting work is already done. The copy practically writes itself because you understand everything deeply."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - research
        - copywriting-process
        - preparation
    - id: "FIL-CM-088"
      title: "Copy Must Feel Like a Runaway Locomotive"
      description: "Caples principle Clayton champions: great copy has the power of a runaway locomotive. It must feel energized, unstoppable, pulling the reader forward with irresistible momentum."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting
        - momentum
        - persuasion
    - id: "FIL-CM-089"
      title: "Copywriting Is a Sport Requiring Peak State"
      description: "Writing great copy requires peak physical and mental condition. You cannot write with a hangover, exhausted, or distracted. Treat it like an athletic performance requiring full energy."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - peak-performance
        - writer-lifestyle
    - id: "FIL-CM-090"
      title: "Think of Yourself as a Direct Marketer Who Writes"
      description: "You are not a writer who does marketing. You are a direct marketer whose primary tool is writing. This mindset shift changes everything about how you approach copy."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - mindset
        - direct-response
        - professional-identity
    - id: "FIL-CM-091"
      title: "The Internet Is Growing Up — Marketers Must Too"
      description: "The easy days of weak copy working online are over. The internet is maturing and requires the same caliber of copy that direct mail demanded. Most internet marketers have been spoiled rotten."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - internet-marketing
        - copywriting-standards
        - market-evolution
    - id: "FIL-CM-092"
      title: "Courage Separates Great from Good"
      description: "The willingness to be afraid and do the right thing anyway. Great copywriters push past comfort zones, write headlines that make clients nervous, and break rules when breaking rules serves the prospect."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting-craft
        - courage
        - mindset
    - id: "FIL-CM-093"
      title: "You Cannot Write With the Brakes On"
      description: "Suspend the inner critic during first drafts. Compliance, legal concerns, self-doubt — all brakes. Write freely first, then edit. The path to great copy runs through permission to write bad copy."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-process
        - creativity
        - inner-critic
    - id: "FIL-CM-094"
      title: "Stop Writing — Start Talking to Your Prospect"
      description: "Great copy does not read like writing. It reads like a conversation. Stop composing sentences and start talking to one person about why this product will change their life."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - conversational-copy
        - persuasion
    - id: "FIL-CM-095"
      title: "Find the Drama in Everything"
      description: "Even the most boring product or topic has drama if you dig deep enough. Estate planning, supplements, financial newsletters — there is always a story, a human struggle, drama to uncover."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting-craft
        - storytelling
        - research
    - id: "FIL-CM-096"
      title: "Prospect-Dominant Copy Beats Product-Dominant Copy"
      description: "Copy that focuses on the prospect world — desires, fears, frustrations, dreams — always outperforms copy that focuses on the product features and specifications."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting
        - prospect-focus
        - persuasion
    - id: "FIL-CM-097"
      title: "Emotion Drives All Buying — Logic Justifies"
      description: "Every buying decision is emotional at its core. Logic comes after to justify what the heart already decided. Great copy triggers the dominant emotion first, then provides logical proof."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - buying-psychology
        - emotion
        - persuasion
    - id: "FIL-CM-098"
      title: "The More Personal and Friend-Like, the More Trust"
      description: "Your copy must feel like it comes from a trusted friend, not a corporation. Personal, warm, direct communication builds the trust that makes the sale possible."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - trust-building
        - relationship-marketing
    - id: "FIL-CM-099"
      title: "Entertainment Plus Information Is the Only Way"
      description: "The only way to hold a prospect attention long enough to sell them is to entertain while informing. Pure information bores. Pure entertainment does not sell. The combination is magic."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - attention
        - engagement
    - id: "FIL-CM-100"
      title: "Every Subject Becomes Interesting With Deep Research"
      description: "There is no boring product or market — only lazy research. When you dig deep enough into any subject, fascinating angles, dramatic stories, and compelling hooks always emerge."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - research
        - copywriting-craft
        - curiosity
    - id: "FIL-CM-101"
      title: "Working Under a Mentor Beats Self-Study"
      description: "You must work under someone to truly learn copywriting. Reading books and courses gets you started, but apprenticeship under a working copywriter accelerates mastery beyond anything self-study achieves."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - mentorship
        - career-development
        - mastery
    - id: "FIL-CM-102"
      title: "Systematizing Creativity Works"
      description: "David Deutsch insight Clayton endorses: creativity is not random inspiration. It can be systematized through specific mental frameworks, boxes of thinking, and structured processes that reliably generate breakthroughs."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - systematic-thinking
        - copywriting-process
    - id: "FIL-CM-103"
      title: "Effort Is Genius — 99% Perspiration"
      description: "Great copywriting is not about natural talent but relentless effort. Gene Schwartz read 700-page books multiple times. Bencivenga spent 40% of his time on research. The greats outwork everyone."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - work-ethic
        - mastery
        - copywriting-craft
    - id: "FIL-CM-104"
      title: "Find YOUR Way of Writing"
      description: "Every great copywriter develops their own process. What works for Schwartz will not work for Deutsch will not work for Clayton. You must experiment until you find your unique way of producing great copy."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - personal-process
        - copywriting-craft
        - mastery
    - id: "FIL-CM-105"
      title: "If the Client Loves It, Worry"
      description: "When a client is immediately comfortable with your copy, it probably is not pushing hard enough. When the client is nervous, you know you have written something that will actually sell."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - client-management
        - copywriting-craft
        - courage
    - id: "FIL-CM-106"
      title: "Your Job Is to Sell — Nothing Else"
      description: "The copywriter singular purpose is to sell. Not to win awards, not to impress peers, not to demonstrate cleverness. Every word must serve the sale or be cut."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting
        - sales-focus
        - direct-response
    - id: "FIL-CM-107"
      title: "Read This or Die — Courage to Break Rules"
      description: "Clayton legendary control broke every rule about discussing death with elderly prospects. The courage to do what others would not became the highest-performing promotion in the company history."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - courage
        - rule-breaking
        - direct-response
    - id: "FIL-CM-108"
      title: "Great Copy Comes From Sales Backgrounds"
      description: "The best copywriters often come from sales backgrounds or were dropouts who learned through doing. College writing habits — passive voice, hedging, abstraction — are the enemy of great copy."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - career-development
        - copywriting-craft
        - sales-background
    - id: "FIL-CM-109"
      title: "Give Yourself Permission to Write Bad Copy"
      description: "The path to great copy runs directly through bad copy. You must give yourself permission to write terribly in order to access raw material that becomes brilliant after editing."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - copywriting-process
        - inner-critic
    - id: "FIL-CM-110"
      title: "Close Your Eyes and Let the Subconscious Write"
      description: "David Deutsch technique endorsed by Clayton: lean back, close eyes, put hands on keyboard, and let the subconscious dump everything absorbed during research. Best ideas often emerge this way."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - subconscious-writing
        - copywriting-process
    - id: "FIL-CM-111"
      title: "The Courage to Be Honest About What the Product Is"
      description: "David Deutsch principle: sometimes the breakthrough is simply having the courage to say what the product really is and really does, without hiding behind jargon or hedging. Radical honesty sells."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - honesty
        - copywriting-craft
        - courage
    - id: "FIL-CM-112"
      title: "Claim Density Makes Copy Irresistible"
      description: "Schwartz concept Clayton teaches: deep layering of benefits, logic, emotion, and proof creates claim density that makes copy feel like brains smashing against the window — overwhelming persuasive power."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - persuasion
        - gene-schwartz
    - id: "FIL-CM-113"
      title: "Copywriting Is Courtship With the Prospect"
      description: "The relationship between copywriter and prospect mirrors courtship. You must woo, seduce, build trust, create desire, and lead to commitment — all through words on a page."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - relationship-building
        - persuasion
    - id: "FIL-CM-114"
      title: "Copy Is the Sales Pitch a Salesman Would Give"
      description: "The copy you write is essentially the same pitch a great salesman would deliver sitting across from the prospect. If you cannot explain why someone should buy with no notes, you cannot write convincing copy."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - salesmanship
        - copywriting
        - direct-response
    - id: "FIL-CM-115"
      title: "Only Test One Variable at a Time"
      description: "In direct response, scientific testing means isolating variables. Test one element at a time — headline, offer, price, format — so you know exactly what caused the change in response."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - testing
        - direct-response
        - scientific-method
    - id: "FIL-CM-116"
      title: "Being Afraid and Doing It Anyway"
      description: "Clayton definition of courage in copywriting: not the absence of fear but the willingness to write bold copy, push uncomfortable angles, and challenge conventions despite fear of rejection."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - courage
        - mindset
        - copywriting-craft
    - id: "FIL-CM-117"
      title: "Driven to Make It as Good as It Can Be"
      description: "Successful copywriters share an obsessive drive to make every piece as good as it can possibly be. Not good enough — the best it can be. This relentless pursuit separates the great from the competent."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - excellence
        - work-ethic
        - mastery
    - id: "FIL-CM-118"
      title: "The Fundamentals Stay the Same Regardless of Medium"
      description: "Whether direct mail, email, web, video, or whatever comes next — the fundamentals of persuasion, research, benefits, proof, and closing remain identical. Medium changes; human psychology does not."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-response
        - fundamentals
        - timeless-principles
    - id: "FIL-CM-119"
      title: "Direct Response Is the Little Guy Secret Weapon"
      description: "Direct response works for entrepreneurs and small businesses because it is measurable, scalable, and does not require massive brand budgets. It levels the playing field against corporate giants."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-response
        - entrepreneurship
        - accessibility
    - id: "FIL-CM-120"
      title: "Consistently Profiting on Acquisition Gets You Fired"
      description: "If you are consistently making profit on new customer acquisition, you are not mailing enough. The prime directive is to produce as many new customers as possible at break-even, because LTV is where the real money lives."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - customer-acquisition
        - direct-mail
        - business-strategy
    - id: "FIL-CM-121"
      title: "Copy That Sucks Can Make $100M — Great Copy Makes $1B"
      description: "Even mediocre copy on a good product in a good market makes money. But the difference between adequate and brilliant copy is often 10x in revenue. That is the opportunity cost of settling."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting-value
        - roi-focus
        - opportunity-cost
    - id: "FIL-CM-122"
      title: "Pour Whole Body, Heart and Mind Into Writing"
      description: "Great copy demands everything you have — physical energy, emotional investment, intellectual rigor. That is why 4-5 hours is the maximum. You cannot sustain that intensity longer without quality collapsing."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - peak-performance
        - copywriting-craft
        - energy-management
    - id: "FIL-CM-123"
      title: "Subheads Are Explosions Not Labels"
      description: "Every subhead is an explosion that re-captures attention. If at any point the reader feels copy is not moving along quickly enough, a little bomb goes off in their mind and they leave. Subheads prevent that."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - momentum
        - attention
    - id: "FIL-CM-124"
      title: "Perpetual Learning Applies to Craft"
      description: "The greatest copywriters never stop learning their craft. Schwartz read obsessively. Bencivenga researched endlessly. The moment you think you have mastered copywriting is the moment skills begin to decline."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - mastery
        - continuous-learning
        - copywriting-craft
    - id: "FIL-CM-125"
      title: "Most Internet Marketers Have Been Spoiled Rotten"
      description: "Weak copy worked online only because the web was new and competition was low. Those days are over. Internet marketers must now meet the same standard direct mail copywriters have maintained for decades."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - internet-marketing
        - copywriting-standards
        - market-maturity
    - id: "FIL-CM-126"
      title: "99% of Web Copy Would Bankrupt Mail Marketers"
      description: "The quality bar for online copy is shockingly low. If you took 99% of web sales copy and mailed it at $550 per thousand pieces, you would go bankrupt in weeks. Direct mail accountability demands better."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting-standards
        - direct-mail
        - internet-marketing
    - id: "FIL-CM-127"
      title: "Just Do Whatever Clayton and Wendy Say"
      description: "Jim Rutz advice to new copywriters: the fastest path to success is finding proven mentors and following their guidance completely. Stop reinventing the wheel and execute proven processes."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Jim_Rutz.txt"
      domains:
        - mentorship
        - obedience
        - career-acceleration

  L2_MENTAL_MODELS:
    - id: "MM-CM-001"
      title: "Six Pillars of Copywriter Wealth"
      description: "Six things that contributed to financial success: (1) Perfect your craft, (2) Write faster without quality loss, (3) Attract great clients, (4) Have the marketer's mindset, (5) Get paid fairly with win-win deals, (6) Maximize revenue per client."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - copywriting-business
        - income-multiplication
        - career-strategy
    - id: "MM-CM-002"
      title: "Royalty Writer vs Fee Writer Mental Model"
      description: "Fee writers trade time for money linearly. Royalty writers get paid every time their copy is used — residual income that compounds. Gary Bencivenga pioneered this. The shift from fee to royalty is the single biggest income multiplier."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - deal-structuring
        - income-multiplication
        - business-model
    - id: "MM-CM-003"
      title: "The Writer's Life Concept"
      description: "The Writer's Life = financial freedom enabling lifestyle design. Live where people vacation. Work 4am to noon, then enjoy life. The lifestyle is the ultimate selling point of the copywriting profession."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - lifestyle-design
        - freedom
        - personal-branding
    - id: "MM-CM-004"
      title: "Promotion Creation Process Model"
      description: "Structured 7-step process: (1) Exploratory discussion, (2) Fee/contract negotiation, (3) Launch call with editor/product creator/marketing, (4) Platform creation (headline + first paragraphs), (5) Back-and-forth iteration, (6) Full copy, (7) Design collaboration."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_01.txt"
      domains:
        - copywriting-process
        - workflow
        - project-management
    - id: "MM-CM-005"
      title: "Client as Lifetime Income Stream"
      description: "Each client isn't a single project — they're a potential lifetime income stream. Structure first deal as win-win, then broaden and deepen involvement. Turn a $12K project into being indispensable to the entire business."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-retention
        - lifetime-value
        - business-strategy
    - id: "MM-CM-006"
      title: "Preparation vs Writing Time Ratio"
      description: "I'll write a 20-page sales page in one day. But prior to that day of writing I've had a week of planning, preparing, outlining, researching. The ratio is ~5:1 preparation to writing. Known as one of the fastest writers because of front-loaded preparation."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - copywriting-process
        - speed
        - productivity
    - id: "MM-CM-007"
      title: "Sleep On It (Edison Power Nap Method)"
      description: "Thomas Edison took power naps when stuck. Your subconscious works on problems while you sleep. When you hit a wall, don't force it — sleep on it. The answer often comes when you wake up."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - creativity
        - productivity
        - problem-solving
    - id: "MM-CM-008"
      title: "The Courtship-Sales Parallel"
      description: "Client acquisition mirrors courtship exactly. Don't lecture them about how their life would be better. Ask: Who is this person? What do they want? How do I fulfill those desires? Demonstrate value through creative, memorable gestures."
      source_file: "Mod 3/transcription_mp4_prog_Makepeace_Copywriting_Business_03.txt"
      domains:
        - client-acquisition
        - persuasion
        - relationship-building
    - id: "MM-CM-009"
      title: "Three Types of Deal Structures"
      description: "Three deal types: (1) Straight fee (worst — you trade time for money), (2) Fee + royalty (better — upside on performance), (3) Fee + royalty + backend involvement (best — multiple income streams from one client)."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - deal-structuring
        - pricing-strategy
        - income-multiplication
    - id: "MM-CM-010"
      title: "Non-Compete as Profit Center"
      description: "If a client wants a non-compete, it's a gift — like being paid not to grow crops. When Phillips wanted exclusivity, Clayton negotiated $120K/year non-compete compensation. Turn restrictions into revenue."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - deal-structuring
        - negotiation
        - contracts
    - id: "MM-CM-011"
      title: "The Substantiation File Defense"
      description: "Build a substantiation file for every promotion — third party proof for every claim of fact. When the FTC comes knocking, you grab the file, beat them to the courthouse, slap it on the judge's desk, and prove every word is true."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - legal-protection
        - risk-management
    - id: "MM-CM-012"
      title: "Swiping Must Match Context"
      description: "The biggest mistake new copywriters make is taking a successful formula and misapplying it. When you swipe, it has to be appropriate to what you're doing. A gloom-and-doom format for a 'how to sell your house' offer was completely wrong."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - copywriting-craft
        - swipe-files
        - direct-response
    - id: "MM-CM-013"
      title: "Risk-Free Offer for Career Launch"
      description: "When launching career or getting first gig: make a risk-free offer. No salary, just override on commissions. Or write a spec package. Remove all risk from the client and you'll get the opportunity."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - client-acquisition
        - positioning
        - risk-reversal
    - id: "MM-CM-014"
      title: "Contract as Alignment Tool Not Weapon"
      description: "The best thing about contracts isn't binding anybody. It's getting everyone on the same page. We all know the job, agree to this, no surprises later. Contracts prevent misunderstandings, not lawsuits."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - client-relationships
        - business-operations
    - id: "MM-CM-015"
      title: "Kill Fee as Client Behavior Modifier"
      description: "Kill fee clause means I keep the advance if I fire the client. The minute I start working, it's like the client offering me free $12,500 if I just pick up the phone and fire him. Makes clients very polite, very friendly, very interested in helping you succeed."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - negotiation
        - power-dynamics
    - id: "MM-CM-016"
      title: "Make the Pie Bigger Model"
      description: "Don't just deliver what was asked — find ways to make the pie bigger. Start with a sales page for $12K, then expand into strategy, consulting, backend campaigns, new product launches. Broaden and deepen involvement."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-expansion
        - revenue-growth
        - strategic-value
    - id: "MM-CM-017"
      title: "Reverse Engineering Protection Clause"
      description: "Contract must state: 'so long as contractor is compensated, company shall not be restricted from modifying, reverse engineering, or decompiling the work.' If they rewrite along your outline to avoid royalties, they still owe you."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - royalty-protection
        - intellectual-property
    - id: "MM-CM-018"
      title: "Structured Approach to Copy (Outline-First)"
      description: "In old days I'd just jump in and write. Inevitably I'd hit a blank spot. The structured approach: research → outline → fill sections → write. Made copywriting so simple. I'm known as one of the fastest writers because of it."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - copywriting-process
        - productivity
        - methodology
    - id: "MM-CM-019"
      title: "Marketer's Mindset for Copywriters"
      description: "Copywriters must understand what the client is looking at when evaluating copy — response rates, cost per acquisition, lifetime value, ROI. Understanding the business metrics makes you infinitely more valuable than a word-only writer."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - business-acumen
        - marketing-metrics
        - copywriting-business
    - id: "MM-CM-020"
      title: "Beat the Bushes vs Door-Beating Model"
      description: "Two components: (1) attract great clients, and (2) get them to come to you instead of always beating the bushes. Write great copy, publicize wins, be somewhat scarce. Let reputation pull clients rather than pushing outreach."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - client-acquisition
        - personal-branding
        - positioning
    - id: "MM-CM-021"
      title: "Write the Sales Letter First, Then the Product"
      description: "First I wrote a sales letter making every outrageous promise I could think of. Then I said: what do I have to write in this book to make the sales letter 100% true? Product created to fulfill copy promises — not the other way around."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - product-creation
        - copywriting-craft
        - offer-design
    - id: "MM-CM-022"
      title: "Fundraising as Master Training for Copy"
      description: "Fundraising copy is the hardest — you're asking people to just give money with no tangible benefit. When that's all you have to sell, you master emotion. That's why fundraising background creates the best direct response copywriters."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - emotional-persuasion
        - copywriting-training
        - fundraising
    - id: "MM-CM-023"
      title: "The Gilding the Lily Principle"
      description: "Take what you've done and sell the hell out of it. '6% cash with order from a compiled list' sounds impressive. A '23:1 revenue ratio' sounds amazing. Everything is 100% true but framed for maximum impact. Bulletize your accomplishments."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - personal-branding
        - positioning
        - self-promotion
    - id: "MM-CM-024"
      title: "Creative Compliance as Competitive Advantage"
      description: "Blanchard co-sponsored a Consumer Guide to Rare Coin Investment with the US Post Office. Impossible to be accused of mail fraud when the post office is your co-sponsor. Creative compliance = competitive moat."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - competitive-strategy
        - risk-management
    - id: "MM-CM-025"
      title: "Niche Carving in Non-Compete"
      description: "Don't accept blanket non-competes. Carve niches: 'I'll do health for you, not options trading.' Or specify 'financial newsletters' not 'any financial company.' Specificity in non-competes preserves freedom while satisfying client."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - negotiation
        - contracts
        - deal-structuring
    - id: "MM-CM-026"
      title: "Seven Steps of Contract Progression"
      description: "Contract follows courtship: (1) Who are you? (2) Are we both free? (3) What do I have to do? (4) What's in it for me? (5) When do I get paid? (6) How long do I get paid? (7) What if it doesn't work out?"
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - deal-structuring
        - negotiation
    - id: "MM-CM-027"
      title: "The Control Cycle Mental Model"
      description: "Write a control (winning promotion) → publicize it → use it as proof of ability → attract more clients → repeat at higher fees. The control is your currency in the copywriting world."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - client-acquisition
        - proof
        - reputation-building
    - id: "MM-CM-028"
      title: "Prospect Identity Immersion"
      description: "When writing Proposition 13 fundraising, I drove to the beach, talked to homeowners about what their houses meant to them, what losing them would mean. Immerse yourself in the prospect's reality before writing a single word."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - research
        - empathy
        - copywriting-craft
    - id: "MM-CM-029"
      title: "More Projects = More Money (Velocity Model)"
      description: "Write faster so you can do more projects per year. More projects, more money. Speed without quality loss is a direct multiplier on income. Double your speed = potentially double your income."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - productivity
        - income-multiplication
        - copywriting-business
    - id: "MM-CM-030"
      title: "The Blank Page Cure"
      description: "If you go through the structured preparation process, you'll never have the blank page blues. You'll never be staring off into space wondering what to do instead of writing. Front-loaded preparation eliminates writer's block."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - copywriting-process
        - writer's-block
        - productivity
    - id: "MM-CM-031"
      title: "Payment Timing as Leverage"
      description: "First half of advance: when you say YES (not when you start work) — because your name is now on the schedule and you can't sell that time. Second half: when final draft is accepted by client, not final design. Include 10% interest for late payment."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - payment-terms
        - negotiation
        - cash-flow
    - id: "MM-CM-032"
      title: "Indispensability as Strategy"
      description: "Make yourself indispensable over 10-15 years of intentional effort: broaden involvement, deepen relationship, contribute ideas beyond copy, understand the entire business. Client becomes dependent on you, not just your copy."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-retention
        - strategic-positioning
        - long-term-strategy
    - id: "MM-CM-033"
      title: "Audience of One Writing Model"
      description: "Write to one person — the ideal prospect. Not a demographic, not a segment. One real human being. The Carline method: 'I wrote to my mom' and pulled 5% vs 2% expected."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - copywriting-craft
        - targeting
        - conversational-copy
    - id: "MM-CM-034"
      title: "Platform-First Copy Development"
      description: "A platform is the headline and first few paragraphs. You go back and forth with the client on the platform before writing the full piece. Once approved, you know your theme and direction. Platform approval = green light."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_01.txt"
      domains:
        - copywriting-process
        - workflow
        - client-collaboration
    - id: "MM-CM-035"
      title: "The Resignation Letter as Legal Shield"
      description: "When discovering client fraud, wrote a resignation letter that 'sold' the FTC on not coming after him. Combined with the contract's compliance clause, he was completely protected. The resignation letter itself is a piece of persuasion."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - legal-protection
        - persuasion
        - risk-management
    - id: "MM-CM-036"
      title: "The Multiple Sales Model"
      description: "Every piece of copy must make multiple sequential sales: the attention sale (headline), the credibility sale (proof), the readership sale (bribe to read), the benefits sale (body), and finally the product sale (offer/close). Missing any one kills the piece."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - copywriting
        - sales-architecture
        - persuasion
    - id: "MM-CM-037"
      title: "Dollar-Value-Per-Hour Decision Filter"
      description: "Calculate your desired annual income divided by 2,080 hours (40hrs x 52 weeks). This gives you a measuring stick — any task you can pay someone less per hour to do, you should delegate. If your target is $1M/year, your hour is worth ~$480."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - income-optimization
        - delegation
    - id: "MM-CM-038"
      title: "Opportunity Cost Framing"
      description: "You're always in one of two modes: making money or spending it. When you're answering the phone, doing bookkeeping, scheduling, doing invoicing — anything that isn't actual copywriting — you're spending money, not making it."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - income-optimization
        - delegation
    - id: "MM-CM-039"
      title: "The Incestuous Industry Model"
      description: "Direct response clients are interconnected — they attend same conferences, share notes on copywriters at Publishers' Roundtable, compare list results, and refer writers. One great result travels fast; one difficult experience travels faster."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - industry-dynamics
        - client-relationships
        - reputation
    - id: "MM-CM-040"
      title: "Risk-Free Offer As Door Opener"
      description: "Structure an offer the client can't refuse: 'I'll write this for free, you only pay if it works' or 'royalty only, no advance.' For non-direct-marketing companies: 'I want 10-30% of net sales — you pay nothing upfront.' Eliminates all client risk."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - client-acquisition
        - deal-structuring
        - pricing
    - id: "MM-CM-041"
      title: "The Seven Package Failure Reasons"
      description: "Even A-level writers fail for reasons unrelated to copy quality: (1) wrong main theme, (2) bad offer/premiums, (3) product doesn't resonate, (4) compliance killed the copy, (5) wrong list selects, (6) bad timing/world events, (7) competition in the mailbox."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - direct-mail
        - testing-strategy
        - copywriting
    - id: "MM-CM-042"
      title: "Left Brain / Right Brain Task Switching"
      description: "The brain has accounting aptitude (left-brain, detail) and creative aptitude (right-brain). When one exhausts, switch to the other: 3-4 hours creative writing + 3-4 hours research/sorting/outlining. This extends working capacity from 5 hours to 17-18 hours/day."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - creative-process
        - copywriting
    - id: "MM-CM-043"
      title: "The Springboard Document"
      description: "Before writing headlines or themes, create a 'springboard document' — map the prospect's thoughts and emotions about the general topic area. What do they think? How do they FEEL about each thought? Fear, frustration, excitement, disgust? This becomes the foundation for all theme selection."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - market-research
        - prospect-profiling
        - copywriting
    - id: "MM-CM-044"
      title: "Five Theme Types for Promotions"
      description: "Five proven theme approaches: (1) Topical — tied to current news/trends, (2) Prospect-driven — connecting with dominant resident emotion, (3) Benefit-driven — presenting the main benefit, (4) Intrigue-driven — curiosity gap, (5) Testimonial-driven — real customer story as the lead."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - copywriting
        - headlines
        - theme-selection
    - id: "MM-CM-045"
      title: "Mailing Universe Dictates Royalty Rate"
      description: "Royalty rate is inversely proportional to mailing universe size. Health (280M Americans) = lower royalty ($30/M). Investment info (smaller universe) = higher royalty ($50/M). Personal finance (large Rodale/Boardroom lists) = lower royalty. Fair exchange: smaller universe = higher per-piece rate."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - pricing-strategy
        - deal-structuring
        - direct-mail
    - id: "MM-CM-046"
      title: "The Direct Response Bully Strategy"
      description: "Look at what a company is currently mailing. If it's weak, approach them and say 'Your package stinks, I can beat it.' Offer to write for free or reduced royalty — no risk for them. This worked for Clayton early in his career and remains effective."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - client-acquisition
        - copywriting-business
        - positioning
    - id: "MM-CM-047"
      title: "The Earnout Calculation"
      description: "If publisher pays $25,000 advance at $25/M royalty, they must mail 1M pieces before royalties exceed advance (earnout). Many packages never earnout, especially from unproven writers. This makes royalty-only deals attractive for beginners — removes publisher risk entirely."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - deal-structuring
        - pricing
        - direct-mail-economics
    - id: "MM-CM-048"
      title: "Three Headline Energy Types"
      description: "Three headline energy types: (1) The Gunshot — pure attention grabber ('Read this or die'), (2) The Benefit — presents value proposition, (3) The Dominant Emotion — connects with frustration/fear/desire the prospect already feels."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - headlines
        - copywriting
        - attention
    - id: "MM-CM-049"
      title: "Format Should Emulate What's Working"
      description: "On your first attempt for a client, emulate the format of their current control. If control is 16-page tabloid, write a 16-page tabloid. Don't introduce a new format variable that puts you at a disadvantage. Test format AFTER establishing your own control."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - testing-strategy
        - format-selection
        - copywriting
    - id: "MM-CM-050"
      title: "Six Types of Writer's Block"
      description: "Six categories of writer's block each requiring different treatment: (1) Intimidation by client/subject/reputation, (2) Perfectionism/paralysis, (3) Wrong aptitude mode — creative vs detail, (4) Lack of research/knowledge, (5) Stale perspective needing fresh eyes, (6) Physical/mental exhaustion."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - creative-process
        - productivity
        - copywriting
    - id: "MM-CM-051"
      title: "Subconscious Processing Model (Edison Sleep)"
      description: "The conscious mind is the processing center, the subconscious is storage. At night, the subconscious sorts every stimulus and creates connections — dreams are this process observed. Like Edison, napping after struggling with a problem lets the subconscious deliver solutions."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - creative-process
        - productivity
        - psychology
    - id: "MM-CM-052"
      title: "Credibility Eyebrow Strategy"
      description: "Place a credibility pre-head (eyebrow) ABOVE the main headline — a line of copy in smaller type dedicated to credibility. Most magalogs start with just a headline but Makepeace always includes credibility positioning first: who is warning/revealing/advising."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - copywriting
        - credibility
        - layout-strategy
    - id: "MM-CM-053"
      title: "Prospect-Driven vs Benefit-Driven Hierarchy"
      description: "Prospect-driven emotional leads outperform benefit-driven leads because emotions drive 99% of purchases while benefits connect with intellect. For covers: sell the PROMOTION (read this and learn X), not the product. Product sell comes in body copy."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - copywriting
        - headlines
        - persuasion-hierarchy
    - id: "MM-CM-054"
      title: "Thoughts → Emotions → Actions Chain"
      description: "Thoughts trigger emotions, and emotions drive purchase decisions. The springboard research process: first identify what prospects THINK about the topic, then identify how they FEEL about each thought (afraid, disgusted, frustrated, excited), then write to those feelings."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - buying-psychology
        - prospect-profiling
        - copywriting
    - id: "MM-CM-055"
      title: "The Control-Then-Reformat Strategy"
      description: "First win the control in the same format. Then slice and dice your proven control copy into different formats (bookalog, 6x9, etc.) to test cost savings. You're taking your risk with something already proven rather than testing copy AND format simultaneously."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - testing-strategy
        - format-selection
        - direct-mail
    - id: "MM-CM-056"
      title: "The Four Revenue Models for Copywriters"
      description: "1) Freelancing (advances + uncertain royalties, broken model), 2) Exclusive Partnership (retainer + royalties + equity in growth), 3) Information Publishing (own products), 4) Consulting/Rainmaker (strategy + copy + percentage of growth). The partnership model produces 3-4x more income than freelancing."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - business-model
        - copywriting-business
        - revenue-models
    - id: "MM-CM-057"
      title: "The Freelance Model's Five Fatal Flaws"
      description: "1) Companies withhold intel from freelancers who also write for competitors, 2) Writers waste 4-6 months/year on non-writing tasks, 3) Multiple writers pitted against each other reduce win odds, 4) Controls get challenged immediately, limiting royalties, 5) Declining mail volumes reduce royalty potential 90%."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - freelance-critique
        - business-model
        - copywriting-industry
    - id: "MM-CM-058"
      title: "The Three Growth Levers for House Files"
      description: "Only three things to do to maximize house file revenues: 1) Systematically multiply the NUMBER of times each customer buys (frequency), 2) Systematically multiply the AMOUNT each customer spends per purchase (average order), 3) Systematically increase the TIME each customer keeps buying (retention/LTV)."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-lifetime-value
        - revenue-growth
        - house-file-marketing
    - id: "MM-CM-059"
      title: "The Seven Percent Solution"
      description: "If recession slashes profits 30%, you'd need a 42% sales boost from copy alone. Instead: cut costs 7%, gain 7% more customers, boost profit-per-product 7%, increase order frequency 7%, raise average sale 7%, extend customer lifespan 7%. Six small improvements compound to fully restore (and then exceed) profits."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - business-building
        - compound-growth
        - recession-strategy
    - id: "MM-CM-060"
      title: "The Golden Ladder of Positioning"
      description: "Products within a category exist on a golden ladder in the prospect's mind. First position is nearly invincible. Second requires twice the effort for half the results. Rewards decrease exponentially going down. Being first isn't about timeline — it's about perception and market saturation."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - market-perception
        - competitive-advantage
    - id: "MM-CM-061"
      title: "USP vs Positioning Distinction"
      description: "USP = a unique combination of benefits no one else offers (product-level). Positioning = the category awareness in prospects' minds and where you sit on the golden ladder (perception-level). Positioning is the higher-level skill. The stronger your position, the more unique you're perceived. Master positioning and USP is easy."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - USP
        - marketing-strategy
    - id: "MM-CM-062"
      title: "The Customer Database Pyramid"
      description: "Customer file hierarchy from bottom to top: Non-buying leads/inquiries → Expired customers (12+ months) → Low frequency/low amount → Medium frequency/low amount → Medium/medium → High frequency/high amount. Mission: systematically move buyers UP through ranks to maximize file value."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-segmentation
        - database-marketing
        - customer-lifetime-value
    - id: "MM-CM-063"
      title: "Five Internet Marketing Models"
      description: "1) E-zine Model (build trust via content, monetize list), 2) E-commerce Model (store + traffic), 3) Product Launch Model (affiliates + scarcity + campaign), 4) Affiliate Model (other people's products to your list), 5) Blog Model (content + SEO + ads). Most successful businesses mix and match all five."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - internet-marketing
        - marketing-models
        - online-business
    - id: "MM-CM-064"
      title: "The Anatomy of a Power-Packed Offer (8 Components)"
      description: "Every great offer has 8 components: 1) Rationale (why the amazing deal), 2) Discount (50% is the sweet spot), 3) Purchase Options (low-end entry + upsell tiers), 4) Payment Terms (hard/soft/continuity), 5) Premiums (free gifts), 6) Guarantee (the stronger, the better), 7) Urgency Premiums (early bird), 8) Fulfillment speed."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - offer-engineering
        - direct-response
        - conversion-optimization
    - id: "MM-CM-065"
      title: "Seven Signs of a Killer Product"
      description: "1) Delivers benefits prospects already want, 2) Delivers benefits in superior ways (faster, easier, more completely), 3) Totally unique/proprietary, 4) Proof elements out the wazzoo, 5) Screaming deal relative to benefits, 6) Offer makes buying a no-brainer, 7) Downstream sales are a slam-dunk (recurring/consumable)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - product-selection
        - offer-engineering
        - product-market-fit
    - id: "MM-CM-066"
      title: "The RFA Code System (5-Digit Customer Intelligence)"
      description: "Five-digit alphabetic code for each customer: R=Recency (time since last order), F=Frequency (orders per year), A1=Average purchase size, A2=Largest purchase ever, A3=Total purchases to date. Each digit maps to a range. Enables precise file segmentation for targeted promotions and systematic upgrades."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - database-marketing
        - customer-segmentation
        - RFA-analysis
    - id: "MM-CM-067"
      title: "Partnership Value Equation"
      description: "Company gives: retainer + advances + royalties + exclusivity (no competitor writers). Writer gives: exclusive focus + marketing strategy + copy + product development + organizational improvements + staff assessment + process optimization. Result: 3-4x income for writer, 2-4x growth for company."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - partnership-model
        - business-model
        - value-exchange
    - id: "MM-CM-068"
      title: "The Gauntlet (First 30-60 Days)"
      description: "The gauntlet is the first 30-60 days a new customer is on file. A concerted effort to bond with the customer and generate a secondary sale during this window does miracles. It funds aggressive customer acquisition because you can count on secondary revenue within 30-60-90 days."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-onboarding
        - customer-lifetime-value
        - secondary-sales
    - id: "MM-CM-069"
      title: "Vertical vs Horizontal Promotions"
      description: "Vertical promotions: address the entire file based on a shared EXPERIENCE (holidays, events, news). Horizontal promotions: address segments based on shared QUALITIES (recency, frequency, purchase size, months on file). Alternating vertical and horizontal each week maximizes revenue from every file segment."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-segmentation
        - promotional-strategy
        - house-file-marketing
    - id: "MM-CM-070"
      title: "The McKay 66 Adapted for Direct Response"
      description: "Harvey McKay's principle: every customer contact should yield one new piece of personal information. Adapted for DR: surveys, phone rep conversations, purchase behavior analysis all build deeper customer profiles. Knowing spouse names, birthdays, hobbies enables hyper-personalized copy that feels like friendship."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-intelligence
        - personalization
        - database-enrichment
    - id: "MM-CM-071"
      title: "Four Goals of Every House File Promotion"
      description: "Every promotion to existing customers must achieve: 1) Strengthen the bond between customer and company, 2) Acquire a new piece of information about the customer, 3) Upgrade the customer in some metric (recency/frequency/amount), 4) Produce maximum revenues — in that ORDER of priority."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - house-file-marketing
        - customer-relationship
        - promotional-strategy
    - id: "MM-CM-072"
      title: "The Hidden Value Discovery Process"
      description: "When entering a new client company as partner, systematically probe: customer service scripts, product stuffers, thank-you processes, renewal campaigns, telemarketer scripts, package inserts, welcome sequences, retention programs, testing cadence. Most companies have massive untapped value in each area."
      source_file: "Bonuses/Makepeace Business System/Mod 3/transcription_pdf_prog_Makepeace_Business_System_03_Transcript.txt"
      domains:
        - business-diagnostics
        - partnership-entry
        - value-discovery
    - id: "MM-CM-073"
      title: "Multi-Step Marketing Model for High-Ticket"
      description: "For products over ~$200, single-step sales don't work. As price rises, so does skepticism. Requires multi-step campaign: lead generation (cheap media) → relationship building → qualification → presentation → close. For $200K products, add phone and face-to-face steps."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - high-ticket-sales
        - marketing-models
        - lead-generation
    - id: "MM-CM-074"
      title: "The Product Launch Formula Mechanics"
      description: "Stage 1: Create valuable free content that shocks the market, builds list, and predisposes to buy. Stage 2: Use content + affiliates (50% commission) to build massive qualified list. Stage 3: Marketing sequence to list (problem → solution → anticipation → proof). Stage 4: Open gates with deadline/scarcity."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - product-launch
        - internet-marketing
        - list-building
    - id: "MM-CM-075"
      title: "Repositioning in a Declining Market"
      description: "When a market becomes skeptical of existing claims (too many broken promises), reposition by narrowing focus. Example: Health market skeptical of 'natural cures' → reposition as 'contrary medicine' (debunking both conventional AND alternative BS). Creates new category atop a new golden ladder."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - market-evolution
        - category-creation
    - id: "MM-CM-076"
      title: "The Seven Commandments for Explosive Growth"
      description: "I. Everything can be improved (test everything), II. A dollar delayed is forfeited forever (speed), III. Optimal ≠ maximum response (long-term thinking), IV. Every contact = sale opportunity + LTV increase, V. Every sale = opportunity for another sale, VI. Every complaint = lifetime loyalty opportunity, VII. Never shoot in the dark (measure everything)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - business-principles
        - marketing-operations
        - growth-strategy
    - id: "MM-CM-077"
      title: "Client Catching Funnel (5-Step)"
      description: "1) Self-assessment (strengths, niches, unique skills), 2) Ideal client identification (industries, company sizes, growth stage), 3) Prospecting system (publications, conferences, affiliations), 4) First-date approach (sample project, demonstrate value), 5) Relationship expansion (results → deeper partnership)."
      source_file: "Bonuses/transcription_pdf_rep_How_to_Catch_Clients.txt"
      domains:
        - client-acquisition
        - career-development
        - partnership-development
    - id: "MM-CM-078"
      title: "Prospect Price Sensitivity Thresholds"
      description: "Spending behavior by price: $9.99-$29 = no second thought with total strangers. $49-$199 = need reasonable proof + convincing guarantee. Over $199 = must establish trusting relationship first. Over $1000 = requires multi-step campaign. Over $200K = multi-step + phone + face-to-face."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - pricing-psychology
        - trust-thresholds
        - marketing-models
    - id: "MM-CM-079"
      title: "The Tiered Service Pricing Trap"
      description: "Offering bronze/silver/gold service levels sends the wrong message — it implies your lower tiers give inferior copy. Never let clients think they're getting 'less good' copy. Instead, vary scope (email blast vs. full campaign) but never quality. If it goes out with your name, it's your best."
      source_file: "Bonuses/Makepeace Business System/Mod 6/transcription_pdf_prog_Makepeace_Business_System_06_Transcript.txt"
      domains:
        - pricing-strategy
        - service-positioning
        - copywriter-business
    - id: "MM-CM-080"
      title: "The Recency Count Trend Analysis"
      description: "Pull monthly recency counts and track horizontally over months. This reveals: 1) How many customers you're about to lose (10-12 month cohort), 2) Lumps moving through the snake (cohort problems), 3) Whether inflow exceeds outflow, 4) Net customer growth or decline trends. Without this, you're flying blind."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - database-marketing
        - customer-analytics
        - trend-analysis

    # =========================================================================
    # QSCS — L2 Mental Models
    # =========================================================================

    - id: "MM-CM-081"
      title: "30% Solution — 5 Metrics x 30% Each = 3x Sales"
      description: "Five key levers — promotion frequency, mailing size, response rate, orders per customer per year, order size — each boosted 30% compounds to 3.19x total sales. Small improvements across multiple levers beat massive improvement on one."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - business-growth
        - compound-improvement
    - id: "MM-CM-082"
      title: "Ticking Time Bomb — Prospect Internal Timer"
      description: "Every prospect has an internal timer while reading. If at any point they feel copy is not moving along quickly, a little bomb goes off and they stop reading. Every element must keep that timer from detonating."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting
        - momentum
        - attention
    - id: "MM-CM-083"
      title: "Brains Against the Window — Schwartz Tempo"
      description: "Gene Schwartz concept for copy tempo: great copy should feel like brains smashing against the window — dense, powerful, relentless claim density that overwhelms resistance with sheer force of persuasion."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - gene-schwartz
        - persuasion
    - id: "MM-CM-084"
      title: "Horizontal vs Vertical Marketing"
      description: "Vertical marketing sends the same offer to your entire file. Horizontal marketing segments by behavior, lifecycle, product type, and interest — dramatically increasing relevance and response across all segments."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - marketing-strategy
        - segmentation
        - direct-mail
    - id: "MM-CM-085"
      title: "A/B/C List Classification"
      description: "A-lists consistently deliver high response and are mailed repeatedly. B-lists are projected from A-list data and tested cautiously. C-lists are speculative. Always test A-lists first, then roll out based on results."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - list-management
        - testing
    - id: "MM-CM-086"
      title: "Controls and Beating the Control"
      description: "The control is the current best-performing promotion. Every new test package aims to beat it. A control can run for years until fatigue sets in or a challenger outperforms it. Control beating is the ultimate test of copywriting skill."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-response
        - testing
        - copywriting-competition
    - id: "MM-CM-087"
      title: "Full Copy Architecture"
      description: "Pre-head, Headline, Deck, Lead, Body (subheads, sidebars, bullets), Close, Guarantee, Offer Page, Order Form. Each element has a specific job in moving the reader from attention to action."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copy-structure
        - direct-response
        - architecture
    - id: "MM-CM-088"
      title: "Functional to Dimensionalized to Emotional Benefits"
      description: "Benefits exist on three levels: functional (what it does), dimensionalized (vivid picture of life improvement), and emotional (how it makes them feel). Progress through all three for maximum impact."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - benefits
        - copywriting-craft
        - persuasion
    - id: "MM-CM-089"
      title: "Three Research Keys"
      description: "Product research (features, benefits, is it great?), prospect research (desires, beliefs, emotions, behaviors), and market/competition research (what competitors offer, their advertising, weaknesses). All three are mandatory."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - research
        - copywriting-process
        - preparation
    - id: "MM-CM-090"
      title: "Claim Density as Persuasion Model"
      description: "Schwartz concept: layered persuasion where benefits, logic, emotion, and proof are stacked densely throughout copy. Higher claim density = higher conversion, as each layer reinforces and compounds the others."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - persuasion
        - gene-schwartz
        - copywriting-craft
    - id: "MM-CM-091"
      title: "Copy as Greased Slide"
      description: "Every element of copy pushes the reader forward and down the slide. Headlines pull them in, leads push them forward, body copy slides them toward the close. Nothing should create friction or let them stop."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - momentum
        - persuasion
    - id: "MM-CM-092"
      title: "Free Writing / Brain Dump Model"
      description: "Absorb everything about product and prospect over days, then dump from the subconscious without editing. The subconscious processes and connects information in ways the conscious mind cannot, producing raw gold for editing."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - subconscious-writing
        - copywriting-process
    - id: "MM-CM-093"
      title: "Method Copywriting — Stanislavski Applied"
      description: "Like method acting, method copywriting means becoming the prospect mentally. Feel their pain, share their desires, experience their frustrations. Write from inside their world, not looking down at it."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - empathy
        - prospect-understanding
        - copywriting-craft
    - id: "MM-CM-094"
      title: "Think Inside the Box — Deutsch Creativity System"
      description: "David Deutsch uses 15+ creativity boxes that trigger ideas: adding new dimensions (sight, smell, touch, movement), asking specific questions that trigger subconscious connections. Structured creativity beats random inspiration."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - systematic-thinking
        - idea-generation
    - id: "MM-CM-095"
      title: "The Prospect-Product Connection"
      description: "How the prospect relates to the product determines the entire copy approach. Their existing awareness level, sophistication, and emotional state toward the category shapes headline, lead, proof requirements, and close."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - market-awareness
        - copywriting-strategy
        - prospect-understanding
    - id: "MM-CM-096"
      title: "Customer Lifetime Value Model"
      description: "Every new customer is worth far more than their first purchase. Calculate average years as customer times annual purchases times net profit per purchase. A customer worth $3,500+ over time justifies losing money on acquisition."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - customer-lifetime-value
        - business-strategy
        - direct-mail
    - id: "MM-CM-097"
      title: "Break-Even vs Profit on Customer Acquisition"
      description: "Counterintuitive growth model: losing money or breaking even on new customer acquisition grows the business 2-3x faster than insisting on profit from first purchase. LTV economics justify the investment."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - customer-acquisition
        - growth-strategy
        - business-economics
    - id: "MM-CM-098"
      title: "The Bucket Brigade"
      description: "Connective words and phrases — and, so, plus, because, but, once, not only, that is why — that prevent the reader from stopping. Placed at paragraph transitions, they keep momentum flowing like a chain."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - momentum
        - transitions
    - id: "MM-CM-099"
      title: "Headlines as Proposed Transaction"
      description: "Every headline is a proposed transaction: read this and X happens for you. The reader evaluates whether the promised benefit is worth the time investment of reading further."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - headlines
        - value-proposition
        - attention
    - id: "MM-CM-100"
      title: "Big Selling Idea Drives Everything"
      description: "The Big Selling Idea is the single core concept that drives the entire promotion. It determines the headline, the lead, the body, the proof, and the close. Without a BSI, copy is just a list of features."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - big-idea
        - copywriting-strategy
        - persuasion
    - id: "MM-CM-101"
      title: "Copy Structure as A-B-C Chain"
      description: "Underlying every great piece of copy is a clear logical direction from A to B to C. The reader may not consciously follow the logic, but feels that the copy is going someplace great."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copy-structure
        - logic
        - persuasion
    - id: "MM-CM-102"
      title: "Dominant Resident Emotion Expanded"
      description: "Identify the single strongest emotion the prospect carries about their situation. Not a list of emotions — THE dominant one. In QSCS, this is expanded with 19 emotional triggers and word banks for each."
      source_file: "QSCS/Bonus Materials/transcription_pdf_The_Emotional_Trigger_Words.txt"
      domains:
        - emotion
        - prospect-psychology
        - copywriting-strategy
    - id: "MM-CM-103"
      title: "Every 3-4 Minutes an Explosion — Movie Tempo"
      description: "Great movies have an explosion or dramatic moment every 3-4 minutes. Great copy does the same with subheads, reveals, proof bombs, and emotional peaks that keep the reader riveted."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - momentum
        - tempo
        - copywriting-craft
    - id: "MM-CM-104"
      title: "The Magalog Format"
      description: "A promotion that looks like a magazine but sells like a sales letter. The magalog format disguises the sales pitch as editorial content, reducing resistance while maintaining direct response accountability."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - formats
        - disguised-selling
    - id: "MM-CM-105"
      title: "Prime Directive — Maximum Customers at Break-Even"
      description: "The prime directive of direct response is to produce as many new customers as possible at break-even or slight loss. Profit comes from LTV, not from the acquisition mailing. This is the growth engine."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - customer-acquisition
        - growth-strategy
        - direct-mail
    - id: "MM-CM-106"
      title: "Research Reveals the Breakthrough Others Miss"
      description: "The copywriter who researches most deeply finds the angle, the hook, the proof point that every other copywriter missed. Thorough research is the primary competitive advantage in copywriting."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - research
        - competitive-advantage
        - copywriting-craft
    - id: "MM-CM-107"
      title: "The Prospect Pathway — Where They Come From"
      description: "Where the prospect came from determines their mindset and disconnect risk. A cold prospect from a rented list has different expectations than a warm subscriber. Copy must account for pathway context."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - prospect-understanding
        - list-management
        - copy-context
    - id: "MM-CM-108"
      title: "Feature to Benefit to Proof Cycle"
      description: "Body copy rhythm: state a feature, convert it to a vivid benefit, then prove the benefit with evidence. This three-part cycle repeated throughout body copy creates persuasive momentum that builds belief."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - body-copy
        - persuasion-structure
        - proof
    - id: "MM-CM-109"
      title: "Sensory Engagement in Copy"
      description: "Great copy engages multiple senses — sight, sound, touch dimensions. Describing what the prospect will see, hear, and feel when using the product creates vivid mental movies that drive desire."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - sensory-writing
        - vivid-copy
        - persuasion
    - id: "MM-CM-110"
      title: "Sit Down and Explain With No Notes"
      description: "If you cannot sit down with someone and explain with no notes why they should buy this product, you cannot write convincing copy. This is the test of whether you truly understand the product and prospect."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - copywriting-craft
        - understanding-test
        - preparation
    - id: "MM-CM-111"
      title: "Rolling Out vs Testing"
      description: "Testing means small, controlled experiments on A-lists. Rolling out means expanding to B-lists and larger quantities based on test results. Different phases with different risk profiles and different math."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - testing
        - scaling
    - id: "MM-CM-112"
      title: "Control Fatigue"
      description: "Even the best control eventually declines as the market tires of the message. Fatigue is natural and inevitable. The solution is always testing new packages against the aging control before it dies completely."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - testing
        - lifecycle
    - id: "MM-CM-113"
      title: "Control Panel Testing — Nth-Name Selection"
      description: "Splitting A-lists into nth-name segments to test new packages against the control simultaneously. Scientific allocation ensures valid comparison and minimizes risk of testing on non-representative samples."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - testing
        - direct-mail
        - statistical-method
    - id: "MM-CM-114"
      title: "Pre-Qualified Prospects"
      description: "Prospects who have already demonstrated willingness to buy similar products are pre-qualified. They convert at dramatically higher rates than cold prospects. List selection based on prior buying behavior is paramount."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - list-management
        - prospect-qualification
        - direct-mail
    - id: "MM-CM-115"
      title: "Your REAL Product Is Your Offer"
      description: "The product alone is not what you sell — the complete offer is: product plus bonuses plus guarantee plus price plus urgency plus risk reversal. The offer is the real product the prospect evaluates."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - offers
        - direct-response
        - value-perception
    - id: "MM-CM-116"
      title: "Squeeze Pages Are Short-Copy List Builders"
      description: "Squeeze pages are short-copy pages that sell joining the email list, not buying the product. Their sole purpose is capturing the lead. Different copy rules apply — concise, benefit-driven, low-commitment."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - internet-marketing
        - lead-generation
        - landing-pages
    - id: "MM-CM-117"
      title: "Copywriting Is the Language of Marketing"
      description: "Copywriting is fundamentally different from other forms of writing. It is the language of marketing — direct, persuasive, benefit-focused, action-oriented. Academic or journalistic writing skills do not transfer directly."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting
        - professional-identity
        - craft-distinction

  L3_HEURISTICS:
    - id: "HEUR-CM-001"
      title: "$4 Million Peak Year"
      description: "Had a year bringing in $4 million. Had a month bringing in $1.8 million (used it to buy a lake house and furniture). These are achievable numbers for top direct response copywriters."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - income-benchmarks
        - copywriting-business
        - wealth
    - id: "HEUR-CM-002"
      title: "Royalty Rate Escalation: $10K → $20K → $50K per Million Mailed"
      description: "Royalty rate started at $10 per thousand names mailed, then went to $20, then $50. At $50K per million mailed, the clients raised those rates — he didn't have to. Let demand drive pricing."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - pricing-strategy
        - royalties
        - income-benchmarks
    - id: "HEUR-CM-003"
      title: "12 Packages/Year vs 6 = 50% More Income"
      description: "If you write 12 packages a year vs 6, you make 50% more. Speeding up the writing process without allowing quality to suffer is critical. More throughput at maintained quality = direct income multiplier."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - productivity
        - income-multiplication
        - copywriting-business
    - id: "HEUR-CM-004"
      title: "20-Page Sales Page in One Day (After Week of Prep)"
      description: "Write a 20-page sales page in one day. But prior to that day there's been a week of planning, preparing, outlining, researching. The 1-day execution is enabled by 5+ days of preparation."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - productivity
        - speed
        - copywriting-process
    - id: "HEUR-CM-005"
      title: "$120K/Year Non-Compete Payment"
      description: "Phillips offered non-compete. Clayton negotiated $120,000/year to not write for competitors. Free money — 'like getting paid not to grow crops.' In early 90s when $10K was $10K."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - negotiation
        - non-compete
        - income-benchmarks
    - id: "HEUR-CM-006"
      title: "Half Advance at Commitment, Half at Final Draft"
      description: "First half of advance when you say yes (reserving time on schedule). Second half when client accepts final draft. Never when 'you start work' — your time is blocked the moment you commit."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - payment-terms
        - contracts
        - cash-flow
    - id: "HEUR-CM-007"
      title: "10% Interest on Late Payment"
      description: "Include clause: pay within 30 days or liable for 10% interest on the money. CFOs understand aging funds — they look at this and go 'we don't want to do that.' Prevents payment delays."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - payment-terms
        - contracts
        - cash-flow
    - id: "HEUR-CM-008"
      title: "Screwed on Royalties: Twice in 42 Years"
      description: "Having royalties stolen has happened twice in 42 years. Very rare. It's not in client's best interest to screw you — they lose you AND every copywriter who hears about it. Contract audit clause handles the rest."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - royalties
        - client-trust
        - risk-assessment
    - id: "HEUR-CM-009"
      title: "38-46 Pages of Copy = 24-32 Page Magalog"
      description: "Writing a magalog: 38-46 pages of Courier New 12pt copy produces approximately a 24-32 page printed magalog. Standard benchmark for experienced copywriters."
      source_file: "Peers/transcription_mp4_prog_mmb_Story_QA.txt"
      domains:
        - copy-length
        - direct-mail
        - production-specs
    - id: "HEUR-CM-010"
      title: "5% Response on First Insert (vs 2% Normal)"
      description: "Carline's first copywriting project — a 2-page insert — pulled 5% response rate when 2% was considered pretty good. Written in conversational voice to 'my mom.' Personal voice dramatically outperforms."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - response-rates
        - conversational-copy
        - benchmarks
    - id: "HEUR-CM-011"
      title: "3% Direct Mail Response from Cold Compiled List"
      description: "Got 3% cash-with-order response from a compiled list (not buyers list). Later improved to 6% through iterating the letter. 3% from compiled = very strong; 6% = exceptional."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - response-rates
        - direct-mail
        - benchmarks
    - id: "HEUR-CM-012"
      title: "$1 Million Income Threshold at 1995"
      description: "In 1995, hit $1 million/year income for the first time — directly attributable to switching from straight fees to royalty model, inspired by Gary Bencivenga. Never looked back below that level."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - income-benchmarks
        - royalties
        - career-milestones
    - id: "HEUR-CM-013"
      title: "$250K/Year + 5% of Sales Deal Structure"
      description: "At Security Rare Coin: quarter million dollars/year base plus 5% of sales on $160 million/year revenue. Then replicated similar deal at Blanchard with added legal protection clause."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - deal-structuring
        - income-benchmarks
        - negotiation
    - id: "HEUR-CM-014"
      title: "$2,500 Attorney Retainer"
      description: "Attorney relationship: $2,500 advanced retainer, then deducts time used. Far better than paying hourly. Having an attorney who understands the copywriting business is essential."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - legal-costs
        - business-operations
        - risk-management
    - id: "HEUR-CM-015"
      title: "8 Top Copywriters Over Six Figures in One Room"
      description: "At BYCB event: 8 top copywriters, probably all over six figures, several over seven figures ($1M+/year). They came without compensation. The caliber of the copywriting network matters."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - income-benchmarks
        - networking
        - copywriting-business
    - id: "HEUR-CM-016"
      title: "Steve Winchell: $650K/Year in 1968 Writing Fundraising"
      description: "The guy who wrote the fundraising letters that inspired Clayton was making $650,000/year in 1968 — enormous money. Proof that copywriting as a profession has massive income potential going back decades."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - income-benchmarks
        - fundraising
        - copywriting-history
    - id: "HEUR-CM-017"
      title: "Gary Bencivenga's $3.5M Single Royalty Check"
      description: "Gary Bencivenga received a single royalty check of $3.5 million from Rodale. They made him fly into town and handed it over the desk. The guy who handed it said it was the hardest thing he ever did."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - royalties
        - income-benchmarks
        - proof-of-concept
    - id: "HEUR-CM-018"
      title: "Never Kill Fee Invoked (Zero Times in Career)"
      description: "The kill fee clause has never been invoked — meaning the client has never refused to use the copy after paying the advance. It's happened so rarely neither Clayton nor Wendy can remember a single instance."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - risk-assessment
        - kill-fee
    - id: "HEUR-CM-019"
      title: "5 Gigs from 500 Handouts (1% Conversion at Conference)"
      description: "Wrote a sales letter selling copywriting services, made 500 copies, handed them out at a conference. Got 5 gigs — 1% response. One of those (Chip/SoundView) became a 20-year client relationship."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - client-acquisition
        - direct-response
        - networking
    - id: "HEUR-CM-020"
      title: "Payment at Acceptance Not Design"
      description: "Stipulate payment when final draft is accepted by client — NOT final design. Design can take months. Don't let them hold your check hostage to the production timeline."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - payment-terms
        - contracts
        - cash-flow
    - id: "HEUR-CM-021"
      title: "Compliance Insistence as Condition of Working"
      description: "If client has no compliance process, insist on it as condition of working together. 'I can't work for you unless there's somebody doing compliance.' Find a former FDA attorney or one who's defended FDA cases."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - risk-management
        - client-selection
    - id: "HEUR-CM-022"
      title: "Contract Renewal: 3-5 Year Umbrella"
      description: "Long-term clients use umbrella contracts that renew every 3-5 years covering all work, rather than per-project contracts. Contains non-compete, hold harmless, royalty terms."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - client-retention
        - long-term-deals
    - id: "HEUR-CM-023"
      title: "$15K → $20K → $25K Fee Escalation"
      description: "Client offers $15K for a project. Clayton says he doesn't have time. They raise to $20K, then $25K. Being busy and somewhat scarce naturally escalates fees without you having to negotiate."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - pricing-strategy
        - scarcity
        - negotiation
    - id: "HEUR-CM-024"
      title: "Fundraising Beat $650K/Year Writer at Age 19"
      description: "At 19 years old, wrote a 4-page fundraising letter that beat Steve Winchell's package in a head-to-head test. Winchell was making $650K/year. Instinctive emotional writing can beat experienced pros."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - proof-of-talent
        - emotional-persuasion
        - copywriting-history
    - id: "HEUR-CM-025"
      title: "60 Days from Idea to Government Co-Sponsorship"
      description: "Consumer guide to rare coin investment, co-sponsored by US Post Office, took only 60 days from decision to publication. Still exists on GPO site. Creative compliance can be implemented quickly."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - execution-speed
        - competitive-strategy
    - id: "HEUR-CM-026"
      title: "Work Schedule: 4am to Noon"
      description: "Typical day: get up at 4am, work until noon. Then leisure — biking, beach, pool, dinner. Concentrated 8-hour morning block produces more than scattered full days."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - productivity
        - lifestyle-design
        - work-schedule
    - id: "HEUR-CM-027"
      title: "Intimidation Works Both Ways"
      description: "New copywriters are intimidated by experienced clients. But experienced copywriters face REVERSE intimidation — their team is so scared of them they won't share great suggestions. Both must be actively managed."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - leadership
        - psychology
        - client-dynamics
    - id: "HEUR-CM-028"
      title: "Health and Healing: 200K → 500K Subscribers"
      description: "Health and Healing newsletter grew from launch to 200K subscribers (while Carline/Wendy managed) and eventually to 500K. Alternative health in the 90s was a monster niche. Right product + right time + great copy."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - market-timing
        - newsletter-growth
        - health-niche
    - id: "HEUR-CM-029"
      title: "Six Figures in a Quarter (Not a Year)"
      description: "Carline seeing Clayton's checks: 'How do you do six figures in a quarter? Not even a year — a quarter.' The royalty model on successful controls generates concentrated income bursts."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Carline.txt"
      domains:
        - income-benchmarks
        - royalties
        - proof-of-concept
    - id: "HEUR-CM-030"
      title: "Don't Be Nitpicky on First Contract"
      description: "When starting out with a quality company that pays and doesn't screw copywriters, don't be nitpicky. Only raise issues on major points — indemnification, uncompensated non-compete. Don't be the problem child."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - negotiation
        - contracts
        - client-relationships
    - id: "HEUR-CM-031"
      title: "Monthly Mailing Report + Audit Rights"
      description: "Contract must require: monthly mailing report (how many mailed, what use, what results) + right to demand audit or post office receipts. Standard protection against royalty cheating."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - royalties
        - contracts
        - verification
    - id: "HEUR-CM-032"
      title: "Independent Contractor Status Protection"
      description: "Never accept equipment from clients (computer, desk) — IRS may classify you as employee. Always take cash. The independent contractor clause protects both parties from tax complications."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - tax-strategy
        - contracts
        - legal-protection
    - id: "HEUR-CM-033"
      title: "23:1 Revenue Ratio from Simple Lead Gen"
      description: "A one-page lead generator mailed to compiled list with follow-up won $23 in revenue for every $1 spent. The math: 1% respond to listing solicitation, each listing generates $30K commission."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - ROI
        - lead-generation
        - benchmarks
    - id: "HEUR-CM-034"
      title: "Unexpected Clauses = Renegotiation Opportunities"
      description: "Any clause in a contract you didn't expect is an opportunity for renegotiation and to make more money. 'We didn't talk about this — if you want that, I'll want this.' Turn surprises into leverage."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - negotiation
        - contracts
        - deal-structuring
    - id: "HEUR-CM-035"
      title: "Spend a Year at a Company First"
      description: "Spending a year at a company where you write copy every day, get critiqued by a copy chief, is not a bad way to start. All the experts would agree. The rebel/freelance path is valid but slower."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - career-development
        - training
        - copywriting-business
    - id: "HEUR-CM-036"
      title: "Royalty Rate: Health Market = $30/M"
      description: "For health market promotions (huge mailing universe — 280M Americans with bodies), standard royalty rate is $30 per thousand pieces mailed. This is the rate Makepeace charges for health copy at his income level."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - pricing
        - deal-structuring
        - health-market
    - id: "HEUR-CM-037"
      title: "Royalty Rate: Investment Market = $50/M"
      description: "For investment information promotions (smaller universe), royalty rate is $50 per thousand pieces mailed. Substantially higher than health because the available mailing universe is smaller, so each piece must pay more."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"

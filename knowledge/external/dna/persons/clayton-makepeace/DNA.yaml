      title: "One-Year Guarantee Minimum"
      description: "One-year guarantees are the standard minimum. 60-90 day guarantees generate blizzards of refund requests. Extend the decision date to one year and refunds fall precipitously. Rodale offered lifetime guarantees. Cheaping out on guarantees is the biggest blunder."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - guarantee-strategy
        - risk-reversal
        - offer-engineering
    - id: "HEUR-CM-085"
      title: "Affiliate Marketers Making $1M+/Year on Others' Products"
      description: "Some marketers earn over $1 million/year selling affiliate products to their list alone — not counting their own product revenue. Affiliate marketing works anytime you have traffic or a list, even between product launches."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - affiliate-marketing
        - income-benchmarks
        - list-monetization
    - id: "HEUR-CM-086"
      title: "Customer File: 20% Attrition in 60 Days Without Retention"
      description: "In a $100M company, 20% of the active customer base can vanish in the next 60 days because they're at 11-12 months since last purchase. Without a dedicated retention program, that's a fifth of the company disappearing into thin air."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-retention
        - attrition-risk
        - house-file-marketing
    - id: "HEUR-CM-087"
      title: "Lead-Producing Inserts: $5-$10 per 1000 Eyeballs"
      description: "For wide-net prospecting on a budget, use lead-producing inserts in card decks, other companies' product shipments, and similar media at $5-$10 per thousand eyeballs. Never use expensive direct mail ($50-$100+ per thousand) for wide prospecting."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - lead-generation
        - media-economics
        - prospecting
    - id: "HEUR-CM-088"
      title: "ThreePay/FourPay Effective for $1K-$3K Products"
      description: "For products priced $1,000-$3,000, use ThreePay or FourPay installments. Collect credit card, charge 1/3 or 1/4 monthly. Effectively lowers perceived price point and appreciably increases response. Very common in internet marketing community."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - payment-terms
        - pricing-psychology
        - conversion-optimization
    - id: "HEUR-CM-089"
      title: "Back-End Income Within 30 Days of Customer Acquisition"
      description: "When working as partner with house file access, income jumps 20-30% once retention/upsell programs are implemented. Can offer customer retention work for FREE because the bigger the base, the more royalty income from ongoing promotions."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - partnership-economics
        - back-end-revenue
        - customer-retention
    - id: "HEUR-CM-090"
      title: "35 Graphic Artists for House File Volume"
      description: "At Security Rare Coin's peak, Clayton built a marketing department with 35 graphic artists plus copywriters and marketing staff — just to handle the volume of house file promotions. This illustrates the scale of a well-run back-end marketing operation."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - marketing-operations
        - scale
        - organizational-design

    # =========================================================================
    # QSCS — L3 Heuristics
    # =========================================================================

    - id: "HEUR-CM-091"
      title: "Headlines Produce 25-45% Lifts"
      description: "Changing the headline alone can produce 25-45% lifts in response and ROI. No other single element has as much impact. Always test headlines first and most aggressively."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - headlines
        - testing
        - roi
    - id: "HEUR-CM-092"
      title: "Headlines Are Proposed Transactions"
      description: "Every headline is a proposed transaction: read this and X happens for you. If the proposed benefit does not exceed the perceived time cost, the prospect will not read further."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - headlines
        - value-proposition
        - attention
    - id: "HEUR-CM-093"
      title: "If Research Is Thorough, 75% Is Pre-Done"
      description: "When research is truly thorough — product internalized, prospect understood, competition mapped — 75% of the copywriting work is already done. The copy writes itself from deep understanding."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - research
        - preparation
        - efficiency
    - id: "HEUR-CM-094"
      title: "Research the Product FIRST — Walk Away If Not Great"
      description: "Before accepting any assignment, research the product first. If the product is not genuinely great and cannot deliver real results, walk away. No amount of great copy compensates for a bad product long-term."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - product-selection
        - professional-standards
        - research
    - id: "HEUR-CM-095"
      title: "4-5 Hours Per Day MAX for Writing"
      description: "Writing great copy is too intense to sustain beyond 4-5 hours per day. Peak state requires massive energy. Going beyond this threshold degrades quality. Schedule your best hours for writing, everything else around it."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - productivity
        - energy-management
        - peak-performance
    - id: "HEUR-CM-096"
      title: "Write When You Have Most Energy"
      description: "Best writing happens at your peak energy time — morning for Clayton, possibly different for you. Identify your peak hours and protect them ruthlessly for writing. Everything else is secondary."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - productivity
        - energy-management
        - scheduling
    - id: "HEUR-CM-097"
      title: "Short Sentences + One-Sentence Paragraphs = Faster Tempo"
      description: "Short sentences and one-sentence paragraphs create visual white space and increase reading tempo. One-sentence paragraphs add potency to any point by isolating it for emphasis."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - tempo
        - formatting
    - id: "HEUR-CM-098"
      title: "Subhead Every 5-10 Paragraphs MAX"
      description: "Never let more than 5-10 paragraphs pass without a subhead explosion. Subheads re-engage skimmers, provide entry points, and maintain the every-3-4-minutes explosion tempo."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-craft
        - formatting
        - momentum
    - id: "HEUR-CM-099"
      title: "Bullet Sections Need Running Text Breaks"
      description: "Long unbroken bullet sections lose momentum. Break them with running text, subheads, or mini-stories. Bullets are powerful in bursts, exhausting in marathons."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - bullets
        - formatting
        - momentum
    - id: "HEUR-CM-100"
      title: "Use TONS of Colloquial Expressions Throughout"
      description: "Not 1-2 per page but throughout the entire copy. Colloquial expressions make writing personal, ramp up visceral impact, say more with fewer words, and make copy fun to read."
      source_file: "QSCS/Bonus Materials/transcription_pdf_The__1_Way_to_Electrify_Your_Ads_.txt"
      domains:
        - colloquial-writing
        - personality
        - engagement
    - id: "HEUR-CM-101"
      title: "Mix High-Tempo Bursts Strategically"
      description: "Vary the tempo of copy: fast sections with short punchy sentences, then slower sections with detailed proof. Too much high-tempo exhausts. Too much slow-tempo bores. The mix creates rhythm."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - tempo
        - copywriting-craft
        - rhythm
    - id: "HEUR-CM-102"
      title: "Bucket Brigade Words Keep Momentum"
      description: "Use connective words at paragraph transitions: and, so, plus, because, but, once, not only, that is why. These bucket brigade words prevent the reader from finding a natural stopping point."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - momentum
        - transitions
        - copywriting-craft
    - id: "HEUR-CM-103"
      title: "Never Give Prospect ONE Moment to Think About Other Things"
      description: "The instant a prospect thinks about anything other than your message, they are gone. Every sentence must pull them deeper. Every transition must be seamless. Zero dead air in copy."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - attention
        - momentum
        - persuasion
    - id: "HEUR-CM-104"
      title: "If Body Copy Lacks Momentum, Check Headline First"
      description: "When body copy feels flat, the problem is usually upstream — in the headline, deck, or lead. Fix the opening first. A weak opening poisons everything that follows."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - diagnosis
        - headlines
        - copywriting-process
    - id: "HEUR-CM-105"
      title: "Compare Features Feature-by-Feature in Spreadsheet"
      description: "Create a spreadsheet with all competitors listed. Compare every feature, benefit, price point, and guarantee side by side. This systematic comparison reveals your USP and their weaknesses."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - competitive-analysis
        - research
        - systematic-approach
    - id: "HEUR-CM-106"
      title: "1% Response in Many Industries Is Phenomenal"
      description: "In direct mail, a 1% response rate — 10 out of 1,000 — is often phenomenal and highly profitable. Just 3 more people (13/1000) is a 30% improvement. Small response improvements compound dramatically."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - metrics
        - response-rates
    - id: "HEUR-CM-107"
      title: "$550 per 1000 Pieces for Direct Mail"
      description: "Direct mail costs roughly $550 per thousand pieces including printing, postage, and list rental. This cost structure demands copy that converts, unlike the nearly-free internet where weak copy survives."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - costs
        - accountability
    - id: "HEUR-CM-108"
      title: "New Customer LTV: $3,500+ Over 7 Years"
      description: "Example calculation: 7 years average customer life x $500 annual purchases = $3,500 lifetime value. This justifies spending significantly more on acquisition than the first purchase revenue."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - customer-lifetime-value
        - business-economics
        - acquisition-math
    - id: "HEUR-CM-109"
      title: "Lose Money on Acquisition = Grow 2-3x Faster"
      description: "Companies willing to lose money or break even on customer acquisition grow 2-3x faster than those insisting on profit from the first sale. LTV economics fund the growth."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - growth-strategy
        - customer-acquisition
        - business-economics
    - id: "HEUR-CM-110"
      title: "If Client Loves It, Worry — If Nervous, Celebrate"
      description: "Client comfort with copy is inversely correlated with performance. When a client loves the copy immediately, it is probably too safe. When they are nervous, you have pushed hard enough to actually sell."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - client-management
        - quality-indicator
        - courage
    - id: "HEUR-CM-111"
      title: "Schwartz Read 700-Page Books Multiple Times"
      description: "Gene Schwartz would read a 700-page book on a product topic multiple times before writing a single word of copy. The depth of research directly correlates with the quality and persuasiveness of the output."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - research
        - gene-schwartz
        - mastery
    - id: "HEUR-CM-112"
      title: "Bencivenga Spent 40% of Time on Research"
      description: "Gary Bencivenga, considered the greatest living copywriter, spent 40% of his total project time on research alone. This ratio is a benchmark for how much research great copy actually requires."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - research
        - time-allocation
        - mastery
    - id: "HEUR-CM-113"
      title: "6 Mailings to 9 = 50% More Customers"
      description: "Cutting 2 weeks off preparation time per mailing increases annual mailings from 6 to 9 — a 50% increase in new customers with no change in copy quality or response rate. Speed-to-market matters enormously."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - speed-to-market
        - direct-mail
        - growth
    - id: "HEUR-CM-114"
      title: "$360K to $16M/Month — 4,300% Increase"
      description: "Clayton client went from $360K to $16M per month in one year through better copy and aggressive mailing. This 4,300% increase demonstrates the leverage great direct response copy provides."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - case-study
        - roi
        - direct-response
    - id: "HEUR-CM-115"
      title: "Control Beating = Typically 300%+ Above Target"
      description: "When a new package beats the control, it typically outperforms by 300% or more — way above the 30% improvement target. This is because fundamentally better approaches create step-change improvements."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - testing
        - performance
        - direct-mail
    - id: "HEUR-CM-116"
      title: "$100M With Lousy Copy — $1B With Great Copy"
      description: "A $100M company running lousy copy could become a $1B company with great copy. The 10x opportunity cost of mediocre copy is the most compelling argument for investing in A-level copywriting talent."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - copywriting-value
        - opportunity-cost
        - roi
    - id: "HEUR-CM-117"
      title: "Internet Marketing Is Pennies vs 60 Cents Per Piece"
      description: "Email marketing costs a penny or two per contact vs 60 cents for direct mail. This cost advantage means internet marketers can test more aggressively and afford lower response rates."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - internet-marketing
        - direct-mail
        - cost-comparison
    - id: "HEUR-CM-118"
      title: "Dominant Emotion Headlines Outperform Rational"
      description: "Headlines that trigger the prospect dominant resident emotion consistently outperform rational, logical headlines. Lead with the feeling, support with the facts."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - headlines
        - emotion
        - testing
    - id: "HEUR-CM-119"
      title: "Use 3 Original Sentences to Master Each Expression"
      description: "When learning colloquial expressions from swipe files, write 3 original sentences using each expression. This practice ingrains them into your natural writing vocabulary so they emerge subconsciously."
      source_file: "QSCS/Bonus Materials/transcription_pdf_The__1_Way_to_Electrify_Your_Ads_.txt"
      domains:
        - colloquial-writing
        - practice
        - mastery
    - id: "HEUR-CM-120"
      title: "Start With Existing Promotions to Learn"
      description: "Write sample ads for real products using real promotions as templates. Study winning controls, analyze their structure, then write your own version. Learning by doing with proven models accelerates skill development."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - learning
        - swipe-files
        - practice
    - id: "HEUR-CM-121"
      title: "Magalog Format Outperforms Simple Envelopes"
      description: "The magalog format — promotion disguised as magazine — outperforms simple envelope packages most of the time. Bookalogs, slim jims, and tabloids are also format options worth testing."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - formats
        - testing
    - id: "HEUR-CM-122"
      title: "Prospect Must Feel Copy Is Going Someplace GREAT"
      description: "The reader needs to feel at every moment that the copy is going someplace great, someplace worth their time. If they lose that feeling, the ticking time bomb detonates and they leave."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - momentum
        - attention
        - persuasion
    - id: "HEUR-CM-123"
      title: "Courageous Headlines That Make Clients Uncomfortable Win"
      description: "Bold headlines that make clients uncomfortable often produce the biggest wins. Read This or Die broke every rule about discussing death with elderly prospects and became a legendary control."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - headlines
        - courage
        - testing
    - id: "HEUR-CM-124"
      title: "10/1000 Saying Yes = 1% — Just 3 More = 30% Improvement"
      description: "At 1% response, 10 people in 1,000 say yes. Getting just 3 more to say yes is a 30% improvement. This perspective makes even small copy improvements enormously valuable in direct response."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - metrics
        - response-improvement
        - direct-mail
    - id: "HEUR-CM-125"
      title: "Multiple List Brokers With Exclusives"
      description: "Use multiple list brokers, each with exclusive access to different new lists. This maximizes testing opportunities and prevents any single broker from controlling your mailing universe."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - list-management
        - direct-mail
        - scaling
    - id: "HEUR-CM-126"
      title: "Project B-List ROI From A-List Data"
      description: "Use A-list response data to project ROI for B-lists before committing to full rollouts. This reduces risk when expanding mailing universe to less proven lists."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - projections
        - risk-management
    - id: "HEUR-CM-127"
      title: "First 60 Days = First Additional Purchase Window"
      description: "A new customer first additional purchase typically happens within 60 days. Add this revenue to the acquisition cost calculation — it effectively extends the break-even window and justifies more aggressive mailing."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - customer-acquisition
        - ltv-math
        - acquisition-strategy
    - id: "HEUR-CM-128"
      title: "Cook the Books — Extend Break-Even to 60 Days"
      description: "Extend the break-even calculation window from first purchase to first 60 days of customer activity. This cooking of the acquisition math lets you mail to lists that would not break even at first-purchase math."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - acquisition-math
        - growth-strategy
        - direct-mail
    - id: "HEUR-CM-129"
      title: "Fastest Way to Start Any Project = Thorough Research"
      description: "Paradoxically, spending more time on research at the start makes the entire project faster. Copy flows easier, revisions are fewer, and the final product converts better when research is thorough."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - research
        - efficiency
        - copywriting-process
    - id: "HEUR-CM-130"
      title: "Best Writing Happens After Days of Absorption Then Morning Dump"
      description: "Best writing happens after days of absorbing product and prospect information, then waking early and doing a brain dump from the subconscious. Much of the raw output is directly usable or provides key insights."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - writing-process
        - subconscious
    - id: "HEUR-CM-131"
      title: "Deutsch Found Best Ideas From Free-Writing"
      description: "David Deutsch discovered that some of his best ideas and copy angles came from the free-writing/brain dump process rather than deliberate analytical thinking. The subconscious makes connections the conscious mind misses."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - creativity
        - free-writing
        - idea-generation
    - id: "HEUR-CM-132"
      title: "Death Copy for Old People Definitely Kills Readership — WRONG"
      description: "The conventional wisdom that any discussion of death in copy to elderly would kill readership was proven spectacularly wrong by Read This or Die, which became the highest-performing control."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - conventional-wisdom
        - courage
        - testing
    - id: "HEUR-CM-133"
      title: "Write Freely First, Fix Compliance Later"
      description: "Compliance and legal concerns are driving with the brake on. Write the most powerful, unrestricted copy first, then tone it down for compliance. It is easier to go down than up."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - copywriting-process
        - compliance
        - inner-critic
    - id: "HEUR-CM-134"
      title: "Start From Maximum Incredible, Then Tone Down"
      description: "Start from imagining the product does the MOST incredible thing possible, then tone down. Always easier to scale back boldness than to inject it after writing conservatively."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_David_Deutsch.txt"
      domains:
        - copywriting-process
        - boldness
        - technique
    - id: "HEUR-CM-135"
      title: "Write Longer Copy and Cut — Easier Than Expanding"
      description: "Always write longer than you need and cut. It is far easier to remove excess than to add substance to thin copy. The cutting process also improves quality by forcing you to keep only the strongest material."
      source_file: "QSCS/Getting Started - Lessons with the Masters/transcription_mp3_Clayton_Makepeace.txt"
      domains:
        - copywriting-process
        - editing
        - technique
    - id: "HEUR-CM-136"
      title: "20-40% of Direct Mail Orders Come by Snail Mail"
      description: "Even with phone and web ordering available, 20-40% of direct mail orders still come by snail mail. Never underestimate the physical order form — many prospects prefer it."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - direct-mail
        - ordering
        - multi-channel
    - id: "HEUR-CM-137"
      title: "Health, Investment, Financial Markets Have Best Copy"
      description: "The health, investment, and financial newsletter markets have produced the best direct response copy to study. These markets demand excellence because of high competition and accountable response metrics."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - learning
        - swipe-files
        - market-selection
    - id: "HEUR-CM-138"
      title: "The More Personal and Friend-Like the More Trust"
      description: "Copy that feels personal and friend-like generates more trust and receptivity than formal corporate communication. Write as if writing to one person you care about, not to a demographic."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - trust-building
        - tone
        - relationship-marketing
    - id: "HEUR-CM-139"
      title: "Claim Density Creates Irresistible Persuasion"
      description: "Deep layering of benefits, logic, emotion, and proof throughout copy creates claim density that overwhelms resistance. Schwartz mastered this — his copy felt like brains smashing against the window."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - persuasion
        - gene-schwartz
        - claim-density
    - id: "HEUR-CM-140"
      title: "E-Mail Marketing Costs Virtually Nothing vs Direct Mail"
      description: "Email marketing eliminates printing, postage, and most list costs. This near-zero cost structure allows unlimited testing, rapid iteration, and profitable campaigns at much lower response rates."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:
        - email-marketing
        - cost-structure
        - internet-marketing
    - id: "HEUR-CM-141"
      title: "One-Sentence Paragraphs Add Potency"
      description: "A single sentence standing alone as its own paragraph gains enormous emphasis and power. Use strategically to drive home key points, create dramatic pauses, and add rhythm variation."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_02.txt"
      domains:
        - formatting
        - emphasis
        - copywriting-craft
    - id: "HEUR-CM-142"
      title: "7 Benefits of Colloquial Expressions"
      description: "Colloquial expressions: (1) make writing personal, (2) tap personality power, (3) ramp up visceral impact, (4) say more with fewer words, (5) make copy fun to read, (6) avoid boredom, (7) unlearn bad college writing habits."
      source_file: "QSCS/Bonus Materials/transcription_pdf_The__1_Way_to_Electrify_Your_Ads_.txt"
      domains:
        - colloquial-writing
        - personality
        - engagement

  L4_FRAMEWORKS:
    - id: "FW-CM-001"
      title: "The Copy Creation Process (7-Phase)"
      description: "Phase 1: Exploratory discussion — client describes product, you describe capabilities. Phase 2: Fee negotiation and contract. Phase 3: Launch call (editor + product creator + marketing). Phase 4: Platform development (headline + opening). Phase 5: Platform iteration with client. Phase 6: Full copy writing from outline. Phase 7: Design collaboration and revision."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_01.txt"
      domains:
        - copywriting-process
        - project-management
        - workflow
    - id: "FW-CM-002"
      title: "Research & Preparation Framework"
      description: "Before writing: (1) Deep product research, (2) Prospect research/avatar creation, (3) Competitive analysis, (4) Benefit extraction and hierarchy, (5) Credibility/proof gathering, (6) Offer structuring, (7) Theme/angle development, (8) Outline creation. Only THEN write."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_01.txt"
      domains:
        - copywriting-process
        - research
        - preparation
    - id: "FW-CM-003"
      title: "The Win-Win Deal Structure Framework"
      description: "Step 1: Get great assignments. Step 2: Get paid well (not maximally — don't be greedy). Step 3: Demonstrate you're their champion. Step 4: Build long-term relationship. Step 5: Expand involvement over time. Step 6: Become indispensable. Objective: lifetime client, not maximum extraction."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - deal-structuring
        - client-relationships
        - business-strategy
    - id: "FW-CM-004"
      title: "Contract Negotiation 7-Step Framework"
      description: "Step 1: Who are you? (Representations). Step 2: Are we both free? (No conflicting agreements). Step 3: What am I supposed to do? (Scope + schedule). Step 4: What's in it for me? (Fees + royalties). Step 5: When do I get paid? (Timing). Step 6: How long do I get paid? (Duration + copy ownership). Step 7: What if it doesn't work? (Kill fee + termination)."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - negotiation
        - legal-framework
    - id: "FW-CM-005"
      title: "Client Acquisition System (Courtship Model)"
      description: "Step 1: Identify ideal client (who they are, what they want). Step 2: Demonstrate value through creative gestures (not lectures). Step 3: Show your wins (controls, results). Step 4: Make risk-free offer if needed. Step 5: Be somewhat scarce. Step 6: Let reputation pull rather than push."
      source_file: "Mod 3/transcription_mp4_prog_Makepeace_Copywriting_Business_03.txt"
      domains:
        - client-acquisition
        - personal-branding
        - positioning
    - id: "FW-CM-006"
      title: "The Indispensability Framework"
      description: "Year 1-2: Deliver excellent copy, exceed expectations. Year 3-5: Expand from copywriter to strategist/tactician. Year 5-10: Become involved in multiple aspects of business. Year 10+: Client literally cannot operate without you. Key: intentional, strategic, multi-year effort."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-retention
        - strategic-positioning
        - career-strategy
    - id: "FW-CM-007"
      title: "The Scarcity-Value Pricing Framework"
      description: "Step 1: Write great copy. Step 2: Make sure everybody knows about your big wins. Step 3: Be not that easy to hire. Step 4: Let clients raise your prices (don't chase). Step 5: Royalty rates escalate naturally with scarcity."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - pricing-strategy
        - personal-branding
        - scarcity
    - id: "FW-CM-008"
      title: "The Writing Speed Framework (Preparation-Heavy)"
      description: "Day 1-3: Research immersion (product, prospect, competition). Day 3-4: Benefit extraction, proof gathering, offer analysis. Day 4-5: Outline creation (detailed section-by-section). Day 5: Sleep on it. Day 6: Write full copy in one concentrated session. Day 7: Edit and polish."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - copywriting-process
        - productivity
        - speed
    - id: "FW-CM-009"
      title: "Legal Protection Framework for Copywriters"
      description: "5 critical clauses: (1) Compliance responsibility on client — they warrant review by attorney. (2) Hold harmless mutual. (3) NO indemnification. (4) Independent contractor status. (5) Copy usage royalty regardless of modification. Always have an attorney who understands the business."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - legal-protection
        - contracts
        - risk-management
    - id: "FW-CM-010"
      title: "The Non-Compete Monetization Framework"
      description: "Step 1: Receive non-compete request. Step 2: Calculate opportunity cost. Step 3: Negotiate compensation ($120K/year in Clayton's case). Step 4: Narrow scope where possible. Step 5: Carve exceptions for non-competing niches. Result: Get paid for NOT working."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - negotiation
        - contracts
        - income-multiplication
    - id: "FW-CM-011"
      title: "The Client Revenue Expansion Framework"
      description: "Stage 1: Single project (prove yourself). Stage 2: Renewal/follow-up campaigns. Stage 3: Backend promotions. Stage 4: New product consultation. Stage 5: Strategic input on business direction. Stage 6: Percentage of sales. Each stage deepens dependency and increases income."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-expansion
        - revenue-growth
        - business-strategy
    - id: "FW-CM-012"
      title: "The Substantiation Defense Framework"
      description: "Step 1: Document every claim of fact with third-party proof. Step 2: Build substantiation file for every promotion. Step 3: Include proof for non-obvious claims too (dates, mint locations). Step 4: Be ready to present file instantly to regulators. Goal: Beat them to the courthouse."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - legal-defense
        - documentation
    - id: "FW-CM-013"
      title: "The Kill Fee Structure"
      description: "Clause 1: Upfront fee in two parts (50/50). Clause 2: First half paid when you commit (reserve time). Clause 3: If project cancelled at any point, first half is kept as kill fee. Clause 4: Second half paid upon acceptance of final draft. Effect: Client financially incentivized to help you succeed."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - risk-management
        - payment-terms
    - id: "FW-CM-014"
      title: "The Copywriter's Self-Promotion Framework (Parris Method)"
      description: "Step 1: Write a sales letter selling your services. Step 2: Bulletize every accomplishment (gild the lily — truthful but impressive). Step 3: Include 'yet' (nobody's heard of me YET). Step 4: Offer low initial pricing as urgency. Step 5: Distribute at conferences/events. Step 6: Follow up on all leads."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - self-promotion
        - client-acquisition
        - personal-branding
    - id: "FW-CM-015"
      title: "Compliance Attorney Selection Framework"
      description: "Priority 1: Former regulator (FDA, FTC, SEC) turned attorney. Priority 2: Attorney who has successfully defended cases against the regulator. Priority 3: Any attorney experienced in the industry. Key: Attorney should tell you HOW to say it legally, not just what you can't say."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - legal-strategy
        - risk-management
    - id: "FW-CM-016"
      title: "The Emotional State Management Framework for Copywriters"
      description: "Threat 1: Lack of intensity → force skull sweat. Threat 2: Intimidation → remember they need you. Threat 3: Lack of confidence → use preparation as confidence builder. Threat 4: Going broke → structure recurring revenue. Threat 5: Emotional bleeding → channel it into empathy for prospect. Threat 6: Ego → accept crits from betters."
      source_file: "Mod 4/transcription_mp3_prog_Makepeace_Copywriting_Business_04.txt"
      domains:
        - mindset
        - emotional-management
        - professional-development
    - id: "FW-CM-017"
      title: "Deal Sweetening on Regulatory Risk"
      description: "If client is in regulated industry: (1) Insist on compliance process, (2) Add warranty clause that they'll have attorney review all copy, (3) You agree to make compliance-required changes after discussion, (4) Negotiate premium for the additional regulatory risk."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - negotiation
        - deal-structuring
    - id: "FW-CM-018"
      title: "The Great Client Criteria Framework"
      description: "Great client = (1) Has products worth promoting, (2) Pays on time, (3) Doesn't have history of screwing copywriters, (4) Open to strategy/ideas (not just order-taker), (5) Has marketing budget for testing, (6) Values long-term relationships, (7) Has compliance processes in place."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - client-selection
        - due-diligence
        - business-strategy
    - id: "FW-CM-019"
      title: "Client Nurturing and Retention Framework"
      description: "Rule 1: Invest same time keeping client as getting them. Rule 2: Find ways to make pie bigger. Rule 3: Make yourself indispensable. Rule 4: Never get greedy on any single deal. Rule 5: Be their champion/advocate. Rule 6: Contribute ideas beyond copy. Rule 7: Understand their entire business."
      source_file: "Mod 7/transcription_mp3_prog_Makepeace_Copywriting_Business_07.txt"
      domains:
        - client-retention
        - relationship-building
        - lifetime-value
    - id: "FW-CM-020"
      title: "The Backend Deal Structure"
      description: "Base: Fee + royalty on primary promotion. Expansion 1: Ask to write backend promotions (renewal, upsell, cross-sell). Expansion 2: Negotiate percentage of total sales (not just mail volume). Expansion 3: Non-compete compensation. Expansion 4: Strategic consulting retainer."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - deal-structuring
        - income-multiplication
        - backend
    - id: "FW-CM-021"
      title: "Creative Regulatory Preemption Framework"
      description: "Step 1: Identify your regulatory risk. Step 2: Create consumer protection content (guide, report). Step 3: Get a regulator or government agency to co-sponsor it. Step 4: Distribute it. Effect: You're now 'the good guys' — impossible to target as fraudulent."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - compliance
        - competitive-strategy
        - positioning
    - id: "FW-CM-022"
      title: "Copy Outline Framework (Anti-Blank-Page)"
      description: "Step 1: List all benefits (rank by impact). Step 2: List all proof elements. Step 3: Define the offer completely. Step 4: Identify the dominant emotion. Step 5: Create section-by-section outline (headline, lead, body, proof, offer, CTA). Step 6: Fill each section with notes/bullets. Step 7: THEN write in order."
      source_file: "Mod 2/transcription_mp4_prog_Makepeace_Copywriting_Business_02.txt"
      domains:
        - copywriting-process
        - outlining
        - productivity
    - id: "FW-CM-023"
      title: "The Royalty Escalation Model"
      description: "Phase 1: Start at $10/thousand mailed (prove yourself). Phase 2: When demand exceeds capacity, allow rate to rise to $20/thousand. Phase 3: At established status, $50/thousand. Key: Never ask for raises — let scarcity and reputation do it."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_02.txt"
      domains:
        - pricing-strategy
        - royalties
        - career-progression
    - id: "FW-CM-024"
      title: "The Five-Part Sales Pitch for Getting Hired"
      description: "Part 1: What you've done (bulletized accomplishments). Part 2: Results (numbers, percentages). Part 3: Credentials (associations, training, clients). Part 4: Why now (availability, pricing urgency). Part 5: Call to action (specific next step)."
      source_file: "Peers/transcription_mp3_prog_mmb_Story_Parris.txt"
      domains:
        - self-promotion
        - client-acquisition
        - personal-branding
    - id: "FW-CM-025"
      title: "The Renewal Campaign Value Proposition"
      description: "Theory: Client should spend as much to renew a customer as to acquire one. It's cheaper to save a cancelling customer than find a new one. Renewal copy is an entire profit center — position yourself to write all renewal/retention campaigns."
      source_file: "Mod 5/transcription_mp3_prog_Makepeace_Copywriting_Business_05.txt"
      domains:
        - retention-marketing
        - client-expansion
        - copywriting-business
    - id: "FW-CM-026"
      title: "The Makepeace Business System"
      description: "Understanding client's evaluation framework: response rates, cost per acquisition, lifetime value of a customer, ROI per mailing. Understanding what the client measures lets you structure deals intelligently and demonstrate value in their language."
      source_file: "Intro/transcription_mp4_prog_Makepeace_Copywriting_Business_Intro.txt"
      domains:
        - business-acumen
        - marketing-metrics
        - client-communication
    - id: "FW-CM-027"
      title: "Audit Clause Framework"
      description: "Contract requires: (1) Monthly mailing report with names mailed and results, (2) Right to demand audit, (3) Right to request post office receipts or other documentation, (4) Reports due within specific timeframe. Ensures royalty accuracy."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - royalty-verification
        - financial-protection
    - id: "FW-CM-028"
      title: "Emotional Wrenching Copy Framework (Fundraising Origin)"
      description: "Step 1: Identify the human victim (preferably a child). Step 2: Go physically to the location, talk to real people. Step 3: Collect real stories of real consequences. Step 4: Identify the villain (government, disease, injustice). Step 5: Sell the catharsis — the feeling of having done something good."
      source_file: "Mod 7/transcription_mp3_prog_mmb_Story_Clayton.txt"
      domains:
        - emotional-persuasion
        - fundraising
        - storytelling
    - id: "FW-CM-029"
      title: "Platform Development Process"
      description: "Step 1: Based on research, draft headline + first few paragraphs. Step 2: Submit to client. Step 3: Discuss and iterate. Step 4: Get platform approval. Step 5: Platform defines theme and direction for entire piece. Only then proceed to full copy."
      source_file: "Mod 1/transcription_mp4_prog_Makepeace_Copywriting_Business_01_Part_01.txt"
      domains:
        - copywriting-process
        - client-collaboration
        - workflow
    - id: "FW-CM-030"
      title: "The Scope Change Clause"
      description: "Include clause: 'this definition may change as the work goes on' because it always does. Project scope evolves — having this clause prevents disputes when client inevitably asks for more than originally specified."
      source_file: "Mod 6/transcription_mp3_prog_Makepeace_Copywriting_Business_06.txt"
      domains:
        - contracts
        - scope-management
        - project-management
    - id: "FW-CM-031"
      title: "Six Fee Arrangement Types"
      description: "Six compensation structures for copywriters: (1) Flat fee only — good for beginners, (2) Royalty only — risk-free for client, (3) Advance against royalty — most common for proven writers, (4) Fee PLUS royalty — for established track record, (5) Revenue share (10-30% of sales) — for non-DR companies, (6) In-kind trade — services in exchange for copy."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - pricing-strategy
        - deal-structuring
        - copywriting-business
    - id: "FW-CM-032"
      title: "Short Copy Outline (TV/Radio/Postcards)"
      description: "Four elements: (1) Benefit-based, emotionally-driven headline — grab eyeballs, (2) Brief paragraph expanding headline benefit emotionally, (3) Credibility element — statistic, endorsement, or testimonial, (4) Repeat headline benefit, justify price, ask for the sale. Plus: tell prospect exactly what to do, repeat toll-free number as many times as possible."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - copy-structure
        - short-copy
    - id: "FW-CM-033"
      title: "Medium Copy Outline (Sales Letters up to 2 Pages, Landing Pages)"
      description: "Nine sequential elements: (1) Headline — grab attention, (2) Support headline with deck, (3) Bribe to read — trumpet free value/info, (4) Emotionally-driven opening paragraph, (5) Credibility elements — stats/endorsements/testimonials, (6) Get back on track — return to prospect, (7) Secondary benefits with subheads, (8) Make the offer — repeat benefit, justify price, (9) Sum up + close with guarantee + CTA."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - copy-structure
        - medium-copy
    - id: "FW-CM-034"
      title: "Long Copy Outline Extensions (16+ Pages)"
      description: "Beyond medium copy, add: (1) Biography Sidebars — position creator as advocate/champion, (2) Benefit Sidebars — ads within the ad connecting to emotions, (3) Credibility Sidebars — CV, testimonials, expert praise, media mentions, (4) Process Sidebars — storyboard illustrations, (5) Proof Element Sidebars — documenting problem size + product evidence, (6) Value Sidebars — price comparisons, (7) Risk Relief Sidebars — guarantee as sales copy, (8) P.S. pot sweetener, (9) P.P.S. urgency element."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - copy-structure
        - long-copy
        - sidebars
    - id: "FW-CM-035"
      title: "Five Client Acquisition Strategies"
      description: "(1) Spec assignments — write package for client's product uninvited, send it in, (2) The Direct Response Bully — tell them their package stinks, offer to beat it, (3) Networking at conferences — AWAI boot camps, DMA events, (4) Copy cubbing/apprenticeship — serve under senior writer, (5) Referrals from other full copywriters who turn away 4-5 jobs each."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 1/transcription_pdf_prog_Makepeace_Six_Figures_01_Transcript.txt"
      domains:
        - client-acquisition
        - copywriting-business
        - networking
    - id: "FW-CM-036"
      title: "Client Launch Meeting Research Kit"
      description: "Request list before first client meeting: (1) Year of back issues/product info, (2) Free gifts/premiums they offer, (3) Editor/creator biography, (4) All promo copy — both successful AND unsuccessful (ask which is which), (5) Raw testimonials — unedited, word-for-word, (6) PR output — media appearances, press mentions, (7) Competitive promotions currently in market."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - client-relationships
        - research
        - copywriting
    - id: "FW-CM-037"
      title: "Five Speed Productivity Secrets"
      description: "(1) Outsource research or get client to provide it, (2) Have typing service handle proof elements/institutional copy/response devices, (3) Get all documents in digital format — copy-paste from PDFs, (4) Use outlines/templates — never start with blank page, (5) Delegate all non-writing tasks — bookkeeping, invoicing, scheduling, phone calls."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - productivity
        - copywriting-business
        - delegation
    - id: "FW-CM-038"
      title: "Outline-First Research Method"
      description: "Process: (1) Read research materials chronologically, (2) Copy relevant passages into a research document noting source/date, (3) Simultaneously paste into outline at appropriate sections, (4) Result: 20-40 page document with content in proper order, never facing blank page. (5) Add source codes for compliance traceability."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 4/transcription_pdf_prog_Makepeace_Six_Figures_04_Transcript.txt"
      domains:
        - copywriting
        - research-methodology
        - productivity
    - id: "FW-CM-039"
      title: "Four Sample Contract Types"
      description: "Four contract structures for copywriters: (1) Simple Agreement — one-page, advance + royalty per piece, (2) In-Depth Agreement — comprehensive with copyright assignment/non-disclosure, (3) Marketing Consultation — agency model with per-promotion and per-medium rates, (4) Consulting Agreement — equity/deferred compensation for strategic advisory."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Contracts_101.txt"
      domains:
        - contract-terms
        - legal
        - deal-structuring
    - id: "FW-CM-040"
      title: "Credibility Stack Architecture"
      description: "Layer credibility elements systematically: (1) Eyebrow/pre-head credibility line above headline, (2) Credentials paragraph (who this person is), (3) Media appearances sidebar (TV/radio logos + dates), (4) Media quotes sidebar (one-liners from Fortune, Barron's), (5) Congressional/government testimony, (6) Customer testimonials — headline each one."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - credibility
        - copywriting
        - proof-elements
    - id: "FW-CM-041"
      title: "Sidebar Taxonomy (7 Types)"
      description: "(1) Biography — position creator as advocate/champion different from peers, (2) Benefit — ads within ads connecting to emotions, (3) Credibility — CV, testimonials, expert/media praise, (4) Process — storyboard illustrations of how product works, (5) Proof Element — size of problem + product evidence, (6) Value — price comparisons showing bargain, (7) Risk Relief — guarantee as sales copy, not boilerplate."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - sidebars
        - copy-structure
    - id: "FW-CM-042"
      title: "Premium Value Strategy for Newsletters"
      description: "Framework: (1) Check if newsletter uses second-class mail (premium value capped at subscription price), (2) If first-class, no cap — advertise full value, (3) Name premiums as 'volumes' or 'libraries' not 'reports', (4) Give real dollar value ($79, $99), (5) Ensure each premium was advertised at that price somewhere nationally for FTC compliance."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - offer-design
        - compliance
        - newsletter-marketing
    - id: "FW-CM-043"
      title: "Tell-Sell-Tell Formula"
      description: "Simple copy structure for any section or sidebar: (1) Tell them what you're gonna tell them — set expectations, (2) Tell them — deliver the content, benefits, proof, (3) Tell them what you told them — summarize, draw conclusions, drive it home. Especially effective for young writers structuring any piece."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 5/transcription_pdf_prog_Makepeace_Six_Figures_05_Transcript.txt"
      domains:
        - copywriting
        - copy-structure
        - teaching
    - id: "FW-CM-044"
      title: "Client Relationship Insurance Framework"
      description: "Six actions to ensure repeat business: (1) Be prepared — know product/competitors before launch meeting, (2) Know what to ask for — show professionalism, (3) Hit deadlines — delayed projects cost client money, (4) Be easy to work with — not 'my way or the highway', (5) Provide free cover/lead-in tests after control is established, (6) Revise copy at no charge if package fails but is worth retesting."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 3/transcription_pdf_prog_Makepeace_Six_Figures_03_Transcript.txt"
      domains:
        - client-relationships
        - copywriting-business
        - retention
    - id: "FW-CM-045"
      title: "Springboard-to-Theme Process"
      description: "Four-step theme development: (1) Position the expert/product — what's their unique angle?, (2) Create springboard document — prospect thoughts + emotions about topic area, (3) Recruit prospect voices (focus groups, calling testimonial sources, asking female colleagues for female perspective), (4) Select from 5 theme types: topical, prospect-driven, benefit-driven, intrigue-driven, testimonial-driven."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/Mod 6/transcription_pdf_prog_Makepeace_Six_Figures_06_Transcript.txt"
      domains:
        - copywriting
        - theme-selection
        - market-research
    - id: "FW-CM-046"
      title: "The Storyboard Sidebar (Daniel Starch Method)"
      description: "Based on Daniel Starch/McGraw Hill readership study showing storyboard ads rank #1 for seizing attention. Create 4-step visual storyboard illustrating how a problem develops and how the product solves it — making complex technical processes visual and simple."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - design-strategy
        - sidebars
    - id: "FW-CM-047"
      title: "Three-Part Boardroom Page Formula"
      description: "For Boardroom-style bookalogs, every spread should contain three devices: (1) LOTS of fascinations, (2) At least one testimonial, (3) Proof elements — text taken verbatim from the book demonstrating value (value-added content that gives prospects value before purchase)."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - bookalog-format
        - boardroom-style
    - id: "FW-CM-048"
      title: "P.S. and P.P.S. Architecture"
      description: "P.S. strategy: catch prospect off-guard after they think 'this is a good deal' — add one more thing to push it from 'good deal' to 'no-brainer' (usually extra discount or free gift for responding now). P.P.S. strategy: urgency element — final reason to respond NOW (deadline, external event, limited supply)."
      source_file: "Bonuses/How to Build a Six-Figure Copywriting Business/transcription_pdf_rep_Beat_the_Blank_Page_Blues.txt"
      domains:
        - copywriting
        - closing
        - urgency
    - id: "FW-CM-049"
      title: "The Makepeace Business System (MBS)"
      description: "Complete 8-module system for transforming from freelance copywriter to business partner: Module 1 (Introduction/Philosophy), Module 2 (Partnering for Profits), Module 3 (Making a Big Splash/Hidden Value), Module 4 (Money Multiplier/House File), Module 5 (Pitching the Deal), Modules 6-7 (Q&A), Module 8 (System in Action with Parris)."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - business-system
        - copywriting-business
        - complete-framework
    - id: "FW-CM-050"
      title: "The Makepeace Money Multiplier Framework"
      description: "3-part house file revenue multiplication: 1) Multiply frequency (more purchases per customer), 2) Multiply amount (higher spend per purchase), 3) Multiply duration (longer customer lifetime). Requires: superior products + great offers + great copy + top customer service + personal contact + frequent contact + varied contact types + bonding strategies."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - revenue-multiplication
        - house-file-marketing
        - customer-lifetime-value
    - id: "FW-CM-051"
      title: "The Partnership Pitch Sequence"
      description: "Step 1: Get hired as freelancer (standard assignment). Step 2: Over-deliver — ask about customer journey ('What happens to customers after acquisition?'). Step 3: Spot leaks and opportunities. Step 4: Fix one thing for free that produces dramatic results. Step 5: Let results sell the partnership. Step 6: Structure exclusive deal."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - partnership-development
        - sales-process
        - client-relationships
    - id: "FW-CM-052"
      title: "The 8-Component Offer Architecture"
      description: "1) Rationale (credible reason for generosity), 2) Discount (establish value → 50% off), 3) Purchase Options (low entry + upsell tiers, max 3), 4) Payment Terms (hard/soft/continuity/negative option), 5) Premiums (timely special reports, aligned with theme), 6) Guarantee (1-year minimum), 7) Urgency Premiums (10-day + phone-order bonus), 8) Fulfillment speed (ship next day if possible)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - offer-engineering
        - direct-response
        - conversion-optimization
    - id: "FW-CM-053"
      title: "The Killer Product Selection Checklist (7-Point)"
      description: "1) Benefits prospects already seek, 2) Superior delivery of those benefits, 3) Unique/proprietary, 4) Abundant proof elements, 5) Reasonable price relative to benefits, 6) Sufficient markup for aggressive marketing, 7) Downstream sales potential (consumable/series). All seven = grand-slam potential."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - product-selection
        - due-diligence
        - product-market-fit
    - id: "FW-CM-054"
      title: "The Six Positioning Strategies"
      description: "1) Be First (own the category, saturate the market), 2) Create Your Own Category (build a new golden ladder), 3) Avoid Stupid Line Extensions (focus protects position), 4) Use Focus to Overcome Tough Times (narrow when market is skeptical), 5) Reverse-Engineer Competition (study successful positions), 6) Rub Up Against Your Market (immerse deeply to spot the 'window')."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Most_Overlooked_Skill_in_Direct_Marketing.txt"
      domains:
        - positioning
        - competitive-strategy
        - market-positioning
    - id: "FW-CM-055"
      title: "The RFA Database Segmentation System"
      description: "5-digit code: R (Recency: A-L, 30-day increments), F (Frequency: A-L, orders/year), A1 (Avg purchase: ranges by price point), A2 (Largest purchase: ranges), A3 (Total purchases: ranges). Pull monthly reports for each metric. Track horizontally over time. Identifies upgrade targets, retention urgencies, and file health trends."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - database-marketing
        - customer-segmentation
        - analytics
    - id: "FW-CM-056"
      title: "The 'Making a Big Splash' Entry Framework"
      description: "When entering a new client company: 1) Call their toll-free number as a customer (test service), 2) Review product stuffers and thank-yous, 3) Analyze RFA tables for attrition risks, 4) Audit welcome/gauntlet sequences, 5) Examine customer retention programs, 6) Evaluate testing cadence, 7) Identify quick wins. Fix the cheapest, highest-impact items first."
      source_file: "Bonuses/Makepeace Business System/Mod 3/transcription_pdf_prog_Makepeace_Business_System_03_Transcript.txt"
      domains:
        - business-diagnostics
        - partnership-entry
        - quick-wins
    - id: "FW-CM-057"
      title: "The 5 Internet Marketing Model Selection Framework"
      description: "Match model to business: E-zine (if you have content + commitment), E-commerce (if you have many products + traffic capability), Product Launch (if you have affiliates + scarcity + high-ticket), Affiliate (if you have a list but no products), Blog (if you have content + SEO + patience). Most successful businesses use pieces of ALL five."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - internet-marketing
        - business-model-selection
        - marketing-strategy
    - id: "FW-CM-058"
      title: "The Client-Catching System"
      description: "Phase 1: Self-Assessment (what's your unique value, which niches, what differentiates you). Phase 2: Ideal Client Profile (industries, company sizes, marketing maturity, growth stage). Phase 3: Prospecting (trade publications, conferences, referrals, content marketing). Phase 4: The Approach (demonstrate value first, pitch second). Phase 5: The First Date (single project, over-deliver)."
      source_file: "Bonuses/transcription_pdf_rep_How_to_Catch_Clients.txt"
      domains:
        - client-acquisition
        - business-development
        - career-strategy
    - id: "FW-CM-059"
      title: "House File Monthly Promotion Calendar"
      description: "Week 1: Vertical promotion (shared experience — holiday, event, news). Week 2: Horizontal promotion (segmented by customer quality — recency, frequency, amount). Week 3: Vertical (different theme). Week 4: Horizontal (different segment). Plus: product shipment stuffers, surveys, welcome sequences, retention campaigns running continuously."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - promotional-calendar
        - house-file-marketing
        - campaign-planning
    - id: "FW-CM-060"
      title: "The Seven Commandments for Explosive Growth"
      description: "I. Test everything (reject 'we've always done it'). II. Speed is revenue (delays = permanent loss). III. Optimize, don't maximize (protect LTV). IV. Every contact = sell + bond. V. Post-purchase = best selling moment. VI. Complaints = loyalty builders. VII. Measure everything (IT department first stop)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - business-principles
        - growth-framework
        - marketing-operations
    - id: "FW-CM-061"
      title: "The Customer Upgrade Systematization"
      description: "For each RFA metric, identify customers just below breakpoint thresholds. Create targeted campaigns to push them over: frequency 3→4/year, average order $199→$200+, largest purchase $399→$425+. Small incremental upgrades across the file compound into massive revenue increases."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-upgrading
        - database-marketing
        - revenue-optimization
    - id: "FW-CM-062"
      title: "The Overnight Marketing Genius Checklist"
      description: "Two-part checklist: Part 1 — Product evaluation (Does it work? New? Proprietary? Multi-benefit? Desperately desired? Both preventive and curative? Reasonable price? Sufficient markup? Downstream potential?). Part 2 — Offer evaluation (Rationale? Discount? Options? Payment terms? Premiums? Guarantee? Urgency? Fulfillment?)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - marketing-checklist
        - product-evaluation
        - offer-evaluation
    - id: "FW-CM-063"
      title: "The Partnership Contract Structure"
      description: "Key terms: 1) Exclusivity (writer won't work for competitors), 2) Retainer/base pay, 3) Royalties on all promotions written (per-thousand or % of revenue), 4) Access to all company data and files, 5) Writer controls copy decisions (not staff marketers or lawyers), 6) No competing writers pitted against controls, 7) Strategic role in product development and business strategy."
      source_file: "Bonuses/Makepeace Business System/Mod 5/transcription_pdf_prog_Makepeace_Business_System_05_Transcript.txt"
      domains:
        - partnership-model
        - contract-structure
        - deal-making
    - id: "FW-CM-064"
      title: "The Competitive Intelligence Research Process"
      description: "1) Identify 5 most successful companies in niche. 2) Check SRDS for growth rates (hotline names), media, price-points. 3) Buy from targets to trigger customer acquisition promos. 4) Buy from competitors (targets will rent those lists and mail you). 5) Subscribe to their ezines, register on sites. 6) Track banners, PPC, sponsorships. 7) Duplicate their proven marketing model before innovating."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - competitive-intelligence
        - market-research
        - marketing-model-selection
    - id: "FW-CM-065"
      title: "The Premium Structure Alignment Framework"
      description: "Each premium (free gift) must: 1) Emphasize main theme/USP, 2) Be timely special reports (highest perceived value, lowest cost), 3) Create a structure where the highest price tier has the most premiums (make it a no-brainer to upgrade), 4) Remove oddball premiums that create 'HUH?' factor (test removing premiums — response may increase)."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - premium-strategy
        - offer-engineering
        - conversion-optimization
    - id: "FW-CM-066"
      title: "The Inner Circle Campaign"
      description: "Take customers with 5+ years on file and offer them EVERYTHING at an ungodly high price. These are your best, most loyal customers — they'll respond to an exclusive, all-inclusive offer that newer customers won't see. Successfully implemented with financial products for maximum revenue extraction from top-tier segments."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-segmentation
        - VIP-marketing
        - revenue-maximization
    - id: "FW-CM-067"
      title: "The Customer Contact Inventory"
      description: "Audit ALL customer touchpoints: 1) Outgoing promotions, 2) Receipt/thank-you letters, 3) Product shipment/packaging, 4) Customer inquiries/complaints, 5) Opinion polls/surveys, 6) Value-added gifts (calendars with coupons), 7) Company newsletters, 8) Events/webinars. Each is an opportunity to bond + sell + gather information."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"
      domains:
        - customer-touchpoints
        - marketing-audit
        - bonding-strategy
    - id: "FW-CM-068"
      title: "The Proposal Writing System"
      description: "Best proposal is the one you never have to write (verbal agreement with trusted partner). For formal proposals: treat it as the most important sales copy you'll ever write. Structure the deal favorably for both parties. Include: scope, compensation (retainer + royalty), exclusivity terms, performance metrics, legal protections, exit clauses."
      source_file: "Bonuses/Makepeace Business System/Mod 5/transcription_pdf_prog_Makepeace_Business_System_05_Transcript.txt"
      domains:
        - deal-making
        - proposal-writing
        - partnership-structure
    - id: "FW-CM-069"
      title: "The Complaint Resolution Protocol"
      description: "1) Apologize immediately, 2) Issue instant refund, 3) Give discount coupon for future purchase, 4) Have department head (or owner) CALL the customer personally, 5) Send follow-up letter with satisfaction questionnaire, 6) Give unexpected free gift. Rule: Spend at least as much to resolve a complaint as to acquire a customer. Doubles or triples for long-term customers."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Six_Figures_is_Chump_Change.txt"
      domains:
        - customer-service
        - complaint-resolution
        - customer-retention
    - id: "FW-CM-070"
      title: "The E-zine Model (4-Step)"
      description: "1) Develop unique position and viewpoint in niche, 2) Build ezine around it (treat as paid product quality), 3) Give away FREE (earn trust, prove expertise, capture email, create selling opportunities), 4) Use every contact to sell (ads in ezine, separate marketing emails, product launches to list). Frequency = sales: daily/weekly > monthly."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_5_Internet_Marketing_Models.txt"
      domains:
        - email-marketing
        - content-marketing
        - list-building
    - id: "FW-CM-071"
      title: "The Partnership Expansion Path"
      description: "Start: Customer acquisition copy → Then: Look at back-end journey → Spot: Customer service gaps, product stuffers, welcome sequences → Fix: One or two for free → Expand: Testing strategy, product development, staff assessment → Full: Marketing department leadership, business strategy, organizational redesign."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - career-progression
        - partnership-model
        - value-expansion
    - id: "FW-CM-072"
      title: "The Customer Retention Urgency Campaign"
      description: "Pull recency report: identify all customers at 10-12 months since last purchase. Mount special campaign: customer appreciation offers, anniversary discounts, personal thank-you + special deal. Goal: convert 12-month customers back to 1-month recency. Prevents 20%+ annual attrition. Can offer to write for free since bigger base = more royalty income."
      source_file: "Bonuses/Makepeace Business System/Mod 1/transcription_pdf_prog_Makepeace_Business_System_01_Transcript.txt"
      domains:
        - customer-retention
        - campaign-design
        - house-file-marketing
    - id: "FW-CM-073"
      title: "The Phone Order Incentive System"
      description: "Since 60-80% of direct mail orders come by phone and the remaining 20-40% by mail (with high abandonment risk), offer extra premium for phone orders. Combining 10-day Early Bird bonus + phone-order bonus has been a key component of Clayton's biggest winners."
      source_file: "Bonuses/Makepeace Business System/transcription_pdf_rep_Find_Killer_Products.txt"
      domains:
        - response-optimization
        - order-channels
        - incentive-design


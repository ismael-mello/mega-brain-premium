    - id: "HEUR-CM-059"
      title: "Request 25 Samples of Every Package You Write"
      description: "Require all clients to send a FedEx with 25 copies of every printed package. This builds an inexhaustible sample library. Scanner + PDF capability means infinite digital samples available instantly."

      title: "One-Week Delay = 25% Annual Revenue Loss"
      description: "If 12 monthly promotions each delayed just one week, by year-end the delays compound to 12 weeks — 3 promotions eliminated from the calendar. That's 25% of revenue gone permanently because of five-business-day delays."

    - id: "MET-CM-079"
      title: "Peak State Writing Protocol"
      description: "(1) Take care of health. (2) Find your peak energy time of day. (3) Get UP before writing — affirmations, walking, visualization. (4) Write only during peak state. (5) Max 4-5 hours per day. (6) Schedule lifestyle around writing energy."

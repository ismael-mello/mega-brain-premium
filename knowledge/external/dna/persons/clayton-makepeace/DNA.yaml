    - id: "HEUR-CM-057"
      title: "Makepeace Income Timeline: $15K→$250K→$700K→$1M"
      description: "Started at $15K/year (1974, equivalent to $62K in 2005 dollars) at an ad agency with no training. Within 6 years: ~$250K in today's money. Within 8 years: over $700K. Early 1990s: hit $1M/year and never looked back."

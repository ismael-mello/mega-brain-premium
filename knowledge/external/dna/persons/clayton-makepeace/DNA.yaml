    - id: "MET-CM-071"
      title: "Control Testing Methodology"
      description: "(1) Create control package. (2) Test 2 new headlines + 4 offer variations. (3) Test best combo in 2-3 cheaper formats. (4) Roll out winner to B-lists using projection from A-list data. (5) Repeat cycle continuously."
      source_file: "QSCS/Main Files/transcription_pdf_Quick_Start_Copywriting_System_Volume_01.txt"
      domains:

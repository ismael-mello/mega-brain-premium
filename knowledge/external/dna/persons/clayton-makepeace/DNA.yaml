      title: "Average Customer Lifetime: ~7 Years"
      description: "Average customer stays active for approximately 7 years. If doing better than that, you're fantastic. If less, there's a retention problem. Spend at least 4x acquisition cost to keep a 7-year customer."
      source_file: "Bonuses/Makepeace Business System/Mod 4/transcription_pdf_prog_Makepeace_Business_System_04_Transcript.txt"

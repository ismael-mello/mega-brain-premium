    - id: "MET-CM-080"
      title: "Inner Critic Suppression Protocol"
      description: "(1) Give yourself permission to write bad copy. (2) Free-write at full speed without stopping. (3) Cover screen if needed. (4) Ignore compliance/legal during first draft. (5) Write as if product does the MOST incredible thing. (6) Tone down later — easier to go down than up."

      title: "Active Customer Definition: 12 Months"
      description: "Standard active customer definition: purchased within last 12 months. Some businesses (book clubs) may use 90 days. Beyond 12 months, customers are 'expired' — still contacted but with different economics since response likelihood drops dramatically."

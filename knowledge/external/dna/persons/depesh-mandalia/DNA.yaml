layers:
  L1_PHILOSOPHIES:
    count: 35
    next_id: "FIL-DM-036"
    elements:
      - id: "FIL-DM-001"
        title: "User Experience First"
        description: "Facebook's number one priority is the user and the user experience. Your goal as an advertiser is to align YOUR goal with Facebook's. If Facebook doesn't have happy users, people leave, and that damages Facebook far more than you spending less money."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["facebook-ads"]
      - id: "FIL-DM-002"
        title: "Don't Ask to Marry on First Date"
        description: "Going straight for the website conversion kill on cold traffic is like asking someone to marry you on the first date. 99.99% of us aren't George Clooney. You need to nurture the relationship."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["facebook-ads", "funnel-optimization"]
      - id: "FIL-DM-003"
        title: "Marketing is Selling Promises Built on Trust"
        description: "Marketing is the selling of promises built on trust. Sales is convincing that your marketing is true. Advertising and sales must work together — disconnect between them kills conversion."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["paid-traffic", "offer-construction"]
      - id: "FIL-DM-004"
        title: "Appeal to the Emotion-Led Inner Mind"
        description: "The best offers appeal to the emotion-led inner mind. Go beyond the conscious rational thinking ($50 yes/no) into 'wow, I really need this.' That's when you generate higher CTR, higher conversion, higher profitability."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["conversion-psychology", "offer-construction"]
      - id: "FIL-DM-005"
        title: "Never Stop Testing"
        description: "There should be no reason at all that you are never testing anything on Facebook. Testing should be 7 days a week — creative once or twice a week, new audience every few weeks. Always have something in the pipeline."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology"]
      - id: "FIL-DM-006"
        title: "Ethical Selling and Marketing"
        description: "I focus on ethically selling and marketing. It's about creating a solution for someone that maybe they're not aware they had the problem or that a solution existed. Not black hat — genuine value."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["paid-traffic"]
      - id: "FIL-DM-007"
        title: "Nudge Not Force"
        description: "Influence via non-coercive behavior. A Nudge moves someone from one point to another without forcing them. Putting fruit at eye level is a nudge, banning junk food is not. Your ads should nudge, not mandate."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula"
        domains: ["creative-strategy", "conversion-psychology"]
      - id: "FIL-DM-008"
        title: "Visual Hierarchy Over Copy"
        description: "If your creative is not getting people to stop scrolling, the copy is redundant. In the hierarchy of importance — get your visual absolutely right FIRST, then optimize copy. Cycle visuals more than copy."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula"
        domains: ["creative-strategy"]
      - id: "FIL-DM-009"
        title: "Facebook is an Auction System"
        description: "The winner isn't the ad with the highest monetary bid — it's the ad that creates the most total value. Understanding the auction is what separates successful from unsuccessful advertisers."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["facebook-ads", "media-buying"]
      - id: "FIL-DM-010"
        title: "Be One Step Ahead"
        description: "Facebook is so unpredictable. Even after doing this since 2012-2013, there are days where things make no sense. The Graduation Framework ensures you always have tested audiences and creatives ready before you need them."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology", "scaling-campaigns"]
      - id: "FIL-DM-011"
        title: "Enhanced Decision Making is the Goal"
        description: "Everything we do with tracking and attribution is about enhanced decision making. More confidence in placing the dollar in the right campaign, the right ad set, even the right channel."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "FIL-DM-012"
        title: "Lower Product Value = Shorter Funnel"
        description: "The lower the value of the product, the shorter the funnel. $25 product = cold + retargeting only. $2000+ product = longer journey with multiple touchpoints and more time between them."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["funnel-optimization"]
      - id: "FIL-DM-013"
        title: "Don't Sit on the Fence"
        description: "Be controversial in your ads. Either be for or against, supportive or destructive. Don't sit on the fence. Evoking reactions drives engagement — even negative reactions can draw people in."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["creative-strategy", "ad-copy"]
      - id: "FIL-DM-014"
        title: "Long Copy Works"
        description: "Don't be afraid of long copy on Facebook. It absolutely works, especially for items that need storytelling or a journey of understanding. But the first few lines MUST be right — otherwise nobody reads the rest."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy", "creative-strategy"]
      - id: "FIL-DM-015"
        title: "Page Engagement Drops CPMs"
        description: "High engagement pages receive favorable CPMs in their ad accounts. Pages with 10K+ fans, 3 posts/week, regular likes/comments — the majority NOT selling anything but adding value."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads", "scaling-campaigns"]
      - id: "FIL-DM-016"
        title: "Goldilocks Reporting"
        description: "For attribution, use data from as many places as possible but not too many — Goldilocks reporting. The goal is the right amount of data to make better decisions, not data overload."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "FIL-DM-017"
        title: "Perfect Customer Definition"
        description: "A perfect customer doesn't focus on price because they love the value. They convert highly because of great experience. They tell friends and family. They buy again. That's the customer you optimize for."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["audience-targeting"]
      - id: "FIL-DM-018"
        title: "Pixel Knows Everything"
        description: "Whatever happens on your website, Facebook has access to it via the pixel — every page, every visitor, even on competitor sites. That's why Facebook's lookalikes are so powerful — it's not just YOUR data, it's ALL their data matched together."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["facebook-ads", "attribution-tracking"]
      - id: "FIL-DM-019"
        title: "Create Value for User First"
        description: "The Graduation Framework is all about creating value for the user first. Don't jump straight into website conversions. Test with engagement campaigns first to build signals."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology", "facebook-ads"]
      - id: "FIL-DM-020"
        title: "Advertising Since 2005"
        description: "Been advertising since 2005, on Facebook since 2012-2013. Understanding what creates great campaigns, profitability, and growth — goes back way beyond online, even 100 years with TV and print."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["paid-traffic"]
      - id: "FIL-DM-021"
        title: "Copy State Must Match Funnel Position"
        description: "The copy should reflect where the customer is in the funnel. Cold audiences get curiosity-driven copy. Retargeting gets direct response and social proof. Your messaging must evolve as the customer journeys deeper."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy", "funnel-optimization"]
      - id: "FIL-DM-022"
        title: "Urgency Must Be Sparingly Used"
        description: "Urgency absolutely works but has to be used sparingly and in the right moment. Don't overdo caps, emojis, or promotional language — be respectful of the reader."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy", "creative-strategy"]
      - id: "FIL-DM-023"
        title: "Thumbnail More Important Than Video"
        description: "The thumbnail is absolutely more important than the video itself. Without a strong thumbnail, you won't stop the scroll. It doesn't have to be an exact shot from the video."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]
      - id: "FIL-DM-024"
        title: "Data and Reporting Are Apple's Two Casualties"
        description: "The two biggest things impacted by Apple's changes are data (tracking quality) and reporting (what you see). FAATT Framework addresses both sides: Tracking Trinity improves data in, Attribution Trinity improves data out."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "FIL-DM-025"
        title: "Scale Means Different Things"
        description: "Scaling looks different for everyone. Could mean more money, more spend, more countries, more whatever. Stability and profitability come first, then you define what scaling means for you."
        source: "FAATT/01-Introduction"
        domains: ["scaling-campaigns"]
      - id: "FIL-DM-026"
        title: "Customer Journey from Product Aware to Ready to Buy"
        description: "The whole process is about taking someone from being product-aware to being ready to buy. The Graduation Framework powers this engine across testing, optimization, and scaling."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["funnel-optimization", "conversion-psychology"]
      - id: "FIL-DM-027"
        title: "Existing Accounts Start from Bottom Up"
        description: "If working on existing account with established pipeline: start with hot audience (fix retargeting first), then fill top of funnel with cold. New accounts: start cold, that's all you have."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["facebook-ads", "funnel-optimization"]
      - id: "FIL-DM-028"
        title: "Creative Should Match Intent"
        description: "Creative matches the intent/position of the user. Brand new = work harder to capture attention. Warm = different approach, they know you. Hot retargeting = direct response, testimonials, barrier-breaking."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["creative-strategy", "funnel-optimization"]
      - id: "FIL-DM-029"
        title: "5W Is Central to Everything"
        description: "The 5W Avatar is probably the central part of creating ads and funnels that convert. Simple document but brings together the core of what you're selling and why someone would be interested."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["audience-targeting", "ad-copy"]
      - id: "FIL-DM-030"
        title: "Each Emotional Hook = One Ad Angle"
        description: "Each line in the 5W Avatar emotional benefits section becomes a different angle to test. Don't throw everything in one ad — focus on a single emotional or intangible benefit per ad."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["creative-strategy", "ad-copy"]
      - id: "FIL-DM-031"
        title: "Awareness Matrix Dictates Strategy"
        description: "4 quadrants: (1) Aware of product + solution = price/promo focus, (2) Aware of product, not solution = convince why yours, (3) Not aware of product but aware of need = demos/expertise, (4) Not aware of either = hardest, must convince problem exists."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["conversion-psychology", "creative-strategy"]
      - id: "FIL-DM-032"
        title: "Hook Line and Sinker"
        description: "If you've grabbed their attention in the first few lines (hook) and kept them engaged (line), then you create desire and convert (sinker). The complete capture journey."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy", "conversion-psychology"]
      - id: "FIL-DM-033"
        title: "First Two Lines Make or Break"
        description: "The first two lines of your ad copy are everything. No matter if you have 100 or 1000 words — if those first two lines fail, the rest is irrelevant. Get them as damn good as you can."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy"]
      - id: "FIL-DM-034"
        title: "Landing Page Experience Feeds the Auction"
        description: "Facebook tracks bounce rate, time on site, pages viewed — all feeding back into the auction. Disconnect between ad message and landing page = negative signal. Congruency is critical."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["funnel-optimization", "facebook-ads"]
      - id: "FIL-DM-035"
        title: "Branding Compounds Everything"
        description: "Don't underestimate branding and positioning. Big names can convert cold because they've primed the audience before. Even then, still need to convince. Brand is a silent accelerator."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["paid-traffic"]

  L2_MENTAL_MODELS:
    count: 20
    next_id: "MM-DM-021"
    elements:
      - id: "MM-DM-001"
        title: "4 Funnel System"
        description: "Split audiences into 4 levels: COLD (never heard of you), WARM (engaged but not clicked — video views, fans, email list), HOT (clicked/visited site but not purchased), EXISTING (purchased, on pixel). Each gets different creative, messaging, and budget."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["facebook-ads", "funnel-optimization", "audience-targeting"]
      - id: "MM-DM-002"
        title: "AC-4 Framework (Advertising Core 4)"
        description: "Four pillars of advertising success: PRODUCT (solution or opportunity?), AUDIENCE (ideal customer beyond demographics), OFFER (big hook/proposition), FUNNEL (can you convert and profit?). These 4 determine if campaigns succeed."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["paid-traffic", "offer-construction", "funnel-optimization"]
      - id: "MM-DM-003"
        title: "Auction Total Value Model"
        description: "Facebook ad delivery = Advertiser Bid × Estimated Action Rate × User Value. User Value is composed of: targeting relevance + ad relevance + landing page experience + sales funnel experience. Optimize User Value to win auctions cheaply."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["facebook-ads", "media-buying"]
      - id: "MM-DM-004"
        title: "3N Ads Formula (3 Nudge)"
        description: "Three nudges to win the newsfeed: N1-STOP THE SCROLL (visual/thumbnail), N2-ENGAGE (copy/story/hook to retain attention), N3-CONVERT (CTA/action). Each nudge is a stage — failure at any stage kills the chain."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula"
        domains: ["creative-strategy", "ad-copy"]
      - id: "MM-DM-005"
        title: "5W Avatar"
        description: "5 questions for customer understanding: WHAT (product description, no fluff), WHO (specific customer segment), WOW (emotional/intangible benefits — ego, state change, pain/solution), WHY (functional benefits — shipping, fit, guarantee), WHY NOT (objections and reasons not to buy)."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["audience-targeting", "ad-copy", "conversion-psychology"]
      - id: "MM-DM-006"
        title: "AIDA for Ad Copy"
        description: "Four parts of content funnel: ATTENTION (big bold statement reaching for problem/opportunity), INTEREST (hook/intrigue), DESIRE (improvement/outcome), ACTION (explicit CTA in copy — don't rely on button alone). Been used in marketing for decades."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy", "creative-strategy"]
      - id: "MM-DM-007"
        title: "FAATT Framework"
        description: "Full Ads Attribution & Tracking Trinity. Two sides: TRACKING TRINITY (Browser Pixel + Server Pixel/CAPI + Offline Conversions) enhances data IN. ATTRIBUTION TRINITY (Facebook + Google Analytics + Shopify) enhances reporting OUT. Together = enhanced decision making."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "MM-DM-008"
        title: "Graduation Framework"
        description: "Testing methodology: identify profitable audiences + find right lead offer + test creatives — all as a foundation to scaling. Two parts: AUDIENCE SPOTLIGHTING (find resonating audiences) + CREATIVE FISHING STRATEGY (find winning creatives). Always be testing in background."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology", "scaling-campaigns"]
      - id: "MM-DM-009"
        title: "Customer Awareness Matrix"
        description: "4 quadrants based on Product Awareness × Solution Awareness: (1) Both aware = price/promo, (2) Product aware, not solution = convince why yours, (3) Need aware, not product = demos/expertise, (4) Neither = hardest, must create awareness of problem AND solution."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["conversion-psychology", "creative-strategy"]
      - id: "MM-DM-010"
        title: "GC10X Fanpage Formula"
        description: "Reduce CPMs by increasing Page Post engagement. Pages with 10K+ fans, 3 posts/week, regular engagement get favorable CPMs. Strategy: test posts as PPE ads → push winners to Page → boost organically → reduce ad account CPMs."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads", "scaling-campaigns"]
      - id: "MM-DM-011"
        title: "Tracking Trinity"
        description: "Three data sources for enhanced tracking: (1) Browser Pixel — standard tracking, (2) Server Pixel / CAPI — Conversions API bypassing browser limitations, (3) Offline Conversions — feeding back offline data. Together they maximize data quality post-iOS14."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking"]
      - id: "MM-DM-012"
        title: "Attribution Trinity"
        description: "Three reporting sources for enhanced decision making: (1) Facebook Ads Manager data, (2) Google Analytics data, (3) Shopify/platform data. Cross-reference all three for Goldilocks reporting — not too much, not too little."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "MM-DM-013"
        title: "Cold → Warm → Hot → Existing Pipeline"
        description: "Customer journey mapped to audience temperature. Cold: attract attention. Warm: re-engage (video viewers, fans). Hot: retarget (site visitors, cart abandoners). Existing: upsell/cross-sell. Each stage needs different creative and copy approach."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["funnel-optimization", "audience-targeting"]
      - id: "MM-DM-014"
        title: "Campaign Naming Convention System"
        description: "Label campaigns with funnel level + objective. E.g., 'COLD_WC_ProductName'. Enables: filtering by funnel level for analysis, automation rules by temperature, performance comparison across levels."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["facebook-ads"]
      - id: "MM-DM-015"
        title: "Pop the Ad Principle"
        description: "Make ads visually stand out: add color contrast, use unnatural colors, grayscale for lifestyle, smart cropping/spacing, people looking at viewer draw eye contact. Test techniques sparingly — if everyone does it, it stops working."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]
      - id: "MM-DM-016"
        title: "Audience Spotlighting + Creative Fishing"
        description: "Two complementary processes in Graduation Framework. Audience Spotlighting = finding which audiences resonate with creative. Creative Fishing = finding which creatives work best with audience. Run both simultaneously in background."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology"]
      - id: "MM-DM-017"
        title: "TV Ad to Social Adaptation"
        description: "Take the payload/end frames of TV ads and bring them to the front for social. On TV people wait. On Facebook they scroll past. Deliver proposition as early as possible — first few seconds are everything."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["creative-strategy"]
      - id: "MM-DM-018"
        title: "Take Customer from Their Goal to Yours"
        description: "One nudge at a time. Nobody goes on Facebook to buy — but they will if they find something of interest. Identify their goal, slowly bring them towards yours through incremental nudges."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["conversion-psychology"]
      - id: "MM-DM-019"
        title: "Emotional vs Functional Benefits Split"
        description: "From 5W Avatar: Emotional (immeasurable — ego, state change, feeling, social proof) vs Functional (measurable — shipping, fit, price, guarantee). Most advertisers lean toward functional. Shift to emotional for breakthrough performance."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy", "conversion-psychology"]
      - id: "MM-DM-020"
        title: "BPM Method"
        description: "Business Performance Marketing — the core methodology tying together AC-4 (Product/Audience/Offer/Funnel), testing via Graduation Framework, optimization via profitability frameworks, and scaling via systematic budget increases. Evolved across 4 versions (2018-2022)."
        source: "BPMFA/01-Welcome"
        domains: ["paid-traffic", "facebook-ads"]

  L3_HEURISTICS:
    count: 25
    next_id: "HEUR-DM-026"
    elements:
      - id: "HEUR-DM-001"
        title: "GC10X Results Benchmark"
        description: "Ski client Nov 2018: $341K spend → $7.1M revenue = 21X ROAS with CPMs of $5-10 during busiest ecom time of year (normally much higher)."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["scaling-campaigns", "facebook-ads"]
      - id: "HEUR-DM-002"
        title: "GC10X Page Requirements"
        description: "Pages benefiting from CPM reduction had: 10K+ fans minimum, 3+ posts per week, regular post engagement (likes and comments), majority of posts NOT selling but adding value."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads"]
      - id: "HEUR-DM-003"
        title: "PPE Test Budget for New Posts"
        description: "Test posts as ads with small PPE spend. For page boost: minimum $10/day, ideally $50/day for faster results. Test against fans, friends of fans, then engagers."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["testing-methodology", "facebook-ads"]
      - id: "HEUR-DM-004"
        title: "Existing Page Split Test Budget"
        description: "For existing pages with posts: use Facebook Split Test, $100 per ad (3 ads = $300), run 5-day test against target audiences."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["testing-methodology"]
      - id: "HEUR-DM-005"
        title: "High Spend Page Boost Budget"
        description: "If spending 5-figures/day on ads, boost page posts at $200/day to maintain CPM advantage. Under 5-figures: $10-$50/day range."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["scaling-campaigns"]
      - id: "HEUR-DM-006"
        title: "First 2 Lines Rule"
        description: "The first 2 lines of ad copy determine everything. Doesn't matter if you write 100 or 1000 words — if first 2 lines fail, rest is irrelevant. Focus testing on the opening."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy"]
      - id: "HEUR-DM-007"
        title: "Video Thumbnail > Video Content"
        description: "Thumbnail is MORE important than the video itself. Without strong thumbnail, no scroll stop, no engagement. Can use a different shot than what's in the video."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]
      - id: "HEUR-DM-008"
        title: "Creative Testing Frequency"
        description: "Test new creative once or twice per week. New audience every few weeks. Always have something in the testing pipeline — 7 days a week, never stop."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology"]
      - id: "HEUR-DM-009"
        title: "Funnel Length by Price Point"
        description: "$25 product = cold + retarget only (short funnel). $50-$500 = medium funnel with warm layer. $2000+ = full 4-level funnel with extended touchpoints and nurture sequence."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["funnel-optimization"]
      - id: "HEUR-DM-010"
        title: "Video TrueView Metric"
        description: "Track cost per TrueView (Facebook's measure of 15 seconds continuous viewing, better for 30sec+ videos) or cost per 10-second view for shorter videos. Also track comment engagement level."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["data-mastery"]
      - id: "HEUR-DM-011"
        title: "One Emotional Benefit Per Ad"
        description: "Don't throw all emotional benefits into one ad — you'll overwhelm the reader. Focus on a single emotional/intangible benefit per ad. Each line in 5W emotional section = one ad angle to test."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy", "creative-strategy"]
      - id: "HEUR-DM-012"
        title: "New Account = Start Cold"
        description: "Brand new campaign/account/product? You only have cold to work with. Start there. Existing account with pipeline? Start with hot (fix retargeting), then fill cold."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["facebook-ads"]
      - id: "HEUR-DM-013"
        title: "Avoid Bitly/Redirects in Ads"
        description: "Facebook suggests link redirect platforms like Bitly may impact reach. Prefer pasting own URLs directly in ad copy."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["facebook-ads"]
      - id: "HEUR-DM-014"
        title: "PPE for Video = Triple Benefit"
        description: "Use high-value videos in GC10X strategy: (1) better engagement than static, (2) Facebook favors keeping people on platform, (3) can retarget video view audience by % watched AND create lookalike from prime audiences."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["creative-strategy", "audience-targeting"]
      - id: "HEUR-DM-015"
        title: "Never Use Page Boost Button"
        description: "Use PPE campaign in Ads Manager to boost page posts, NOT the Boost button on the Page itself — gives you less control over targeting and optimization."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads"]
      - id: "HEUR-DM-016"
        title: "Payload First for Social Video"
        description: "When adapting TV ads for social: move the end frames/payload to the FRONT. On TV people wait; on social they scroll. Deliver proposition in first seconds."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["creative-strategy"]
      - id: "HEUR-DM-017"
        title: "Use Creative Hub for Mockups"
        description: "Use Facebook Creative Hub for ad mockups, inspiration, and the 20% text rule check. Non-FB people (designers, copywriters) can create ads there and share directly to ad sets."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["creative-strategy"]
      - id: "HEUR-DM-018"
        title: "Color Pop Technique"
        description: "Add slight unnatural color to product images to make them pop in newsfeed. Subtle enough to not look fake, different enough to catch the eye. Works because it's not normal — scroll-stopping."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]
      - id: "HEUR-DM-019"
        title: "Grayscale for Lifestyle"
        description: "Grayscale works well for people/lifestyle shots — it's different, intriguing. Use sparingly; if everyone does it, stops working. Best for fashion, portraits, aspirational content."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]
      - id: "HEUR-DM-020"
        title: "Eyes Looking at Viewer"
        description: "People in ads looking at the viewer forces eye contact — you have no choice but to look at their eyes. Works perfectly for products related to the face (glasses, skincare). Away-looking eyes = more wandering attention."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]
      - id: "HEUR-DM-021"
        title: "Emoji Cutoff Positioning"
        description: "Position emojis just before the 'see more' cutoff in mobile newsfeed to draw readers into expanding the full copy. Preview ads in different placements to check where cutoff lands."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy"]
      - id: "HEUR-DM-022"
        title: "Explicit CTA in Copy"
        description: "Don't rely on the Learn More/Book Now button alone. Write the CTA explicitly in your ad copy: 'Click here to download this.' People who read that far will respond to a direct written CTA."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy"]
      - id: "HEUR-DM-023"
        title: "Retargeting Copy Style"
        description: "For retargeting ads, introduce characters, use softer/conversational tone: 'Hey, we noticed you looked at X but didn't check out.' Acknowledge where they are in the journey."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy", "retargeting"]
      - id: "HEUR-DM-024"
        title: "Engagement Campaigns Before Conversion"
        description: "Start with PPE/engagement campaigns to build data signals before pushing conversion campaigns. The Graduation Framework uses engagement to identify what resonates before scaling."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology", "facebook-ads"]
      - id: "HEUR-DM-025"
        title: "Space and Cropping for Impact"
        description: "Use empty space around product/person to make them pop in newsfeed. Don't zoom in tight on product. J.Crew style: big empty space with subject in center stands out."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N1-Stop-Scroll"
        domains: ["creative-strategy"]

  L4_FRAMEWORKS:
    count: 15
    next_id: "FW-DM-016"
    elements:
      - id: "FW-DM-001"
        title: "BPM Method (Business Performance Marketing)"
        description: "Master methodology across 4 versions (2018-2022). Ties together: AC-4 (pillars) → Graduation Framework (testing) → Profitability Framework (optimization) → Scaling Framework (growth). Core curriculum evolution over 4 years."
        source: "BPMFA/multiple + 7FMAP/multiple + BPM/multiple"
        domains: ["paid-traffic", "facebook-ads"]
      - id: "FW-DM-002"
        title: "4 Funnel System Framework"
        description: "Campaign structure: COLD (prospecting, broad/interest/LAL targeting) → WARM (engaged non-clickers: video views, fans, email list) → HOT (retargeting: site visitors, cart abandoners) → EXISTING (customers: upsell, cross-sell). Graduate into levels as campaigns develop."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["facebook-ads", "funnel-optimization"]
      - id: "FW-DM-003"
        title: "AC-4 Framework (Advertising Core 4)"
        description: "4 pillars: PRODUCT (solution or opportunity), AUDIENCE (ideal customer beyond demographics), OFFER (big hook/proposition), FUNNEL (convert and profit). Grade each pillar to identify weakest link. Connects directly to Facebook algorithm optimization."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["paid-traffic", "offer-construction"]
      - id: "FW-DM-004"
        title: "Graduation Framework"
        description: "Testing engine: AUDIENCE SPOTLIGHTING (find profitable audiences) + CREATIVE FISHING STRATEGY (find winning creatives) + LEAD OFFER TESTING (find best message). Uses PPE campaigns as testbed. Graduated winners feed into main conversion campaigns."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology"]
      - id: "FW-DM-005"
        title: "3N Ads Formula (3 Nudge)"
        description: "Creative framework: NUDGE 1 — Stop the Scroll (visual/thumbnail, color pop, cropping, eye contact). NUDGE 2 — Engage (copy/story, AIDA, emotional hooks, awareness-matched messaging). NUDGE 3 — Convert (CTA, urgency, action). Sequential chain — break any link, chain fails."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula"
        domains: ["creative-strategy", "ad-copy"]
      - id: "FW-DM-006"
        title: "5W Avatar Framework"
        description: "Customer research framework: WHAT (product, no fluff), WHO (specific segment), WOW (emotional benefits — ego, state change, pain/solution), WHY (functional benefits), WHY NOT (objections). Each emotional line = one ad angle. Multiple avatars per product."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["audience-targeting", "ad-copy"]
      - id: "FW-DM-007"
        title: "FAATT Framework"
        description: "Post-iOS14 data optimization: TRACKING TRINITY (Browser Pixel + Server Pixel/CAPI + Offline Conversions) for enhanced data IN. ATTRIBUTION TRINITY (Facebook + Google Analytics + Shopify) for enhanced reporting OUT. Goal: enhanced decision making."
        source: "FAATT/01-Introduction"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "FW-DM-008"
        title: "GC10X Fanpage Formula"
        description: "CPM reduction via organic engagement: (1) Test posts as PPE ads, (2) Track cost per engagement and TrueView, (3) Push winners to Page with boost ($10-$50/d), (4) Organic amplifies. Result: lower CPMs across ad account. Proven $341K → $7.1M at 21X ROAS."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads", "scaling-campaigns"]
      - id: "FW-DM-009"
        title: "Tracking Trinity"
        description: "3-layer data enhancement: LAYER 1 — Browser Pixel (standard, affected by iOS14). LAYER 2 — Server Pixel / CAPI (server-side, bypasses browser limitations). LAYER 3 — Offline Conversions (CRM/call center data fed back). Together maximize data quality."
        source: "FAATT/02-Tracking-Trinity + 03-Browser-Pixel + 04-Server-Pixel + 05-Offline"
        domains: ["attribution-tracking"]
      - id: "FW-DM-010"
        title: "Attribution Trinity"
        description: "3-source reporting: SOURCE 1 — Facebook Ads Manager (platform data). SOURCE 2 — Google Analytics (independent tracking). SOURCE 3 — Shopify/Commerce Platform (actual revenue). Cross-reference for 'Goldilocks reporting.'"
        source: "FAATT/06-Attribution-Trinity + 07-GA-Setup + 08-GA-Insights + 09-Shopify"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "FW-DM-011"
        title: "User Value Optimization Model"
        description: "Facebook's auction model: Bid × Estimated Action Rate × User Value. User Value components: Targeting Relevance + Ad Relevance + Landing Page Experience (load time, bounce rate) + Sales Funnel Experience (pages viewed, time on site). Optimize all 4."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["facebook-ads", "media-buying"]
      - id: "FW-DM-012"
        title: "Customer Awareness Matrix"
        description: "2×2 matrix: Product Awareness (Yes/No) × Solution Awareness (Yes/No). Each quadrant needs different ad strategy: (1) Both=price, (2) Product only=convince, (3) Need only=educate, (4) Neither=create awareness (Henry Ford strategy)."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["conversion-psychology", "creative-strategy"]
      - id: "FW-DM-013"
        title: "AIDA Content Funnel"
        description: "Applied to Facebook ad copy: ATTENTION (big bold statement, first 2 lines), INTEREST (hook/intrigue to keep reading), DESIRE (improvement/outcome/transformation), ACTION (explicit written CTA, don't rely on button). Maps to 3N formula stages."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["ad-copy"]
      - id: "FW-DM-014"
        title: "Ecommerce Framework"
        description: "BPM applied to ecommerce: 7-Figure Blueprint → Account Structure → Graduation for Ecom → DPAs (Dynamic Product Ads) → Retargeting → Post-Purchase Experience. Specific adaptations for product-based businesses."
        source: "BPM/2-Ecommerce-Framework"
        domains: ["ecommerce-ads", "facebook-ads"]
      - id: "FW-DM-015"
        title: "Profitability Framework"
        description: "Optimization methodology: Analysis & Decision Making → Ads Sniper Strategy (precision targeting) → Sales Funnel Optimiser (conversion improvement) → BOSS Auction (manual bid mastery) → Automation Accelerator (rules-based management)."
        source: "BPM/4-Profitability-Framework"
        domains: ["facebook-ads", "funnel-optimization"]

  L5_METHODOLOGIES:
    count: 10
    next_id: "MET-DM-011"
    elements:
      - id: "MET-DM-001"
        title: "Graduation Framework Implementation"
        description: "Step 1: Set up PPE campaigns for audience spotlighting (small budgets). Step 2: Test creatives via creative fishing strategy. Step 3: Identify winning audience×creative combinations. Step 4: Graduate winners into main conversion campaigns. Step 5: Optimize and scale graduated campaigns."
        source: "7FFAP/02-Test/01-Graduation-Framework"
        domains: ["testing-methodology"]
      - id: "MET-DM-002"
        title: "GC10X New Page Strategy"
        description: "Step 1: Launch posts as ads (not to Page), test in PPE with small spends. Step 2: Track cost per engagement and TrueView. Step 3: Push best ad to Page as new post. Step 4: Boost with PPE campaign ($10-$50/d) targeting fans → friends of fans → customers. Step 5: If post is good, organic does the rest."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads"]
      - id: "MET-DM-003"
        title: "GC10X Existing Page Strategy"
        description: "Step 1: Use Facebook Split Test with existing posts, $100/ad, 5-day test. Step 2: Track engagement and TrueView costs. Step 3: Pause worst performers, continue pushing winners. Step 4: Maintain $10-$50/d (or $200/d at 5-figure daily spend). Step 5: Cycle ads and continue testing."
        source: "BPM/1-Marketing-Framework/1.5-GC10X"
        domains: ["facebook-ads"]
      - id: "MET-DM-004"
        title: "5W Avatar Build Process"
        description: "Step 1: Define WHAT (simple product description). Step 2: Define WHO (specific avatar segment). Step 3: List WOW (emotional benefits — ego, state change, social proof). Step 4: List WHY (functional benefits). Step 5: List WHY NOT (objections). Step 6: Each emotional line → separate ad angle. Step 7: Write AIDA copy per angle."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["audience-targeting", "ad-copy"]
      - id: "MET-DM-005"
        title: "4 Funnel System Setup"
        description: "Step 1: Define audience temperature levels (Cold/Warm/Hot/Existing). Step 2: Set excludes between levels (no overlap). Step 3: Match creative intent to temperature. Step 4: Name campaigns with level prefix. Step 5: For low-ticket ($25): Cold + Retarget only. Step 6: For high-ticket ($2K+): All 4 levels. Step 7: Existing accounts start from Hot, work up."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["facebook-ads", "funnel-optimization"]
      - id: "MET-DM-006"
        title: "3N Ad Creation Process"
        description: "Step 1: NUDGE 1 — Design scroll-stopping visual (color pop, cropping, eye contact, grayscale). Step 2: Test thumbnail if video. Step 3: NUDGE 2 — Write engaging copy (AIDA structure, first 2 lines critical, match awareness state). Step 4: Test multiple copy angles from 5W Avatar. Step 5: NUDGE 3 — Add explicit CTA in copy text. Step 6: Preview in all placements. Step 7: Test and iterate."
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula"
        domains: ["creative-strategy", "ad-copy"]
      - id: "MET-DM-007"
        title: "AC-4 Grading Process"
        description: "Step 1: Grade your PRODUCT (is it a clear solution or opportunity?). Step 2: Grade your AUDIENCE (do you know your perfect customer?). Step 3: Grade your OFFER (do you have a compelling hook?). Step 4: Grade your FUNNEL (does it convert profitably?). Step 5: Identify weakest pillar → fix first. Step 6: Connect grading to advertising strategy."
        source: "7FMAP/01-BPM-Method-2022/02-AC4-Framework"
        domains: ["paid-traffic", "offer-construction"]
      - id: "MET-DM-008"
        title: "FAATT Implementation Sequence"
        description: "Step 1: Set up Browser Pixel correctly on all pages. Step 2: Implement Server Pixel / CAPI for server-side tracking. Step 3: Configure Offline Conversions for CRM/call data. Step 4: Set up Google Analytics with proper UTM parameters. Step 5: Connect Shopify reporting. Step 6: Cross-reference all 3 attribution sources. Step 7: Make decisions based on Goldilocks reporting."
        source: "FAATT/01-Introduction through 10-Summary"
        domains: ["attribution-tracking", "data-mastery"]
      - id: "MET-DM-009"
        title: "High-Ticket Funnel Build"
        description: "Step 1: Drive cold traffic to opt-in page. Step 2: Redirect to webinar recording. Step 3: Email sequence pushes to webinar → order page → thank you. Step 4: Messenger integration for additional touchpoints. Step 5: Mirror emails with Facebook ads. Step 6: Non-converters → retarget with video ad (warm pool). Step 7: Warm audience → push back to opt-in for recapture."
        source: "7FFAP/01-Foundations/01-4-Funnel-System"
        domains: ["funnel-optimization"]
      - id: "MET-DM-010"
        title: "Ad Copy Controversy Technique"
        description: "Step 1: Choose a belief about the product. Step 2: Write the OPPOSITE (attacking/provocative angle). Step 3: Draw reader in through emotional reaction. Step 4: Transition to breaking false beliefs. Step 5: Test provocative vs soft approach to same audience. Step 6: Compare CTR and conversion. Example: 'Struggling with high energy dog? It might be YOUR fault.'"
        source: "7FFAP/01-Foundations/04-3N-Ads-Formula/N2-Engage"
        domains: ["ad-copy", "conversion-psychology"]

  # ═══════════════════════════════════════════════════════════════════════════════
  # DEEP EXTRACTION ADDITIONS (v2.0.0) — from 7 parallel extraction agents
  # Key NEW elements not in v1.0.0 core extraction
  # ═══════════════════════════════════════════════════════════════════════════════

  DEEP_EXTRACTION_PHILOSOPHIES:
    note: "Additional philosophies from deep extraction"
    elements:
      - id: "FIL-DM-036"
        title: "If They Cry They'll Buy"
        description: "If there's an emotional angle, people are more likely to take an interest. Emotional advertising converts higher than functional advertising."
        source: "BPM/1-Marketing-Framework/1.3-5W-Avatar"
        domains: ["conversion-psychology", "emotional-selling"]
      - id: "FIL-DM-037"
        title: "Avoid Overconfidence in Automation"
        description: "Overconfidence is one of the most dangerous forms of revenue loss. Automation rules should be guardrails, not autopilot."
        source: "BPM/4-Profitability/Automation-Accelerator"
        domains: ["automation"]
      - id: "FIL-DM-038"
        title: "Quality Clicks Over Volume"
        description: "A 0.8-1% CTR with low bounce rate and high conversion beats 4% CTR with zero purchases. Quality of clicks > volume."
        source: "BPMFA/02-Build-Your-Offer"
        domains: ["traffic-quality"]
      - id: "FIL-DM-039"
        title: "Beat Competition Two Ways"
        description: "You can beat your competition by either outspending them (lower CPA) or outliving them (higher LTV)."
        source: "BPM/2-Ecommerce-Framework"
        domains: ["competitive-strategy"]
      - id: "FIL-DM-040"
        title: "80% of BPM Applies to Any Platform"
        description: "80% of the BPM method applies regardless of advertising platform. The rest is making it specific to Facebook."
        source: "7FMAP/01-BPM-2022"
        domains: ["marketing-philosophy"]

  DEEP_EXTRACTION_HEURISTICS:
    note: "Critical numerical heuristics from deep extraction"
    elements:
      - id: "HEUR-DM-026"
        title: "50 Conversions Per Week Threshold"
        description: "Facebook needs 50 conversions per week per ad set to optimize well. If not hitting that, move optimization event higher up the funnel."
        source: "BPM/01-Foundations/4-Funnel-Setup"
        domains: ["facebook-ads", "optimization"]
      - id: "HEUR-DM-027"
        title: "First 500 Impressions Determine Fate"
        description: "Facebook gives new ads discount bidding boost in first ~500 impressions. First 500 determine relevance score. If ad fails, duplicate and try again."
        source: "BPM/3-Graduation-Framework"
        domains: ["testing-methodology"]
      - id: "HEUR-DM-028"
        title: "CBO Minimum Budget"
        description: "CBO: $100/ad set minimum. 5 ad sets = $500/day. Max 5-7 ad sets with 3-4 ads each. Small budgets: 2 ad sets, 2 ads."
        source: "BPM/CBO-Method"
        domains: ["cbo-mastery"]
      - id: "HEUR-DM-029"
        title: "V-Scale Compound Effect"
        description: "20%/day compound = 300% in 5 days. $500→$600→$720→$864→$1,037. Frame as controlled 300% growth, not reckless scaling."
        source: "BPM/5-Scaling/V-Scale"
        domains: ["scaling-campaigns"]
      - id: "HEUR-DM-030"
        title: "Never Increase Budget After 5pm"
        description: "The later you increase, the more Facebook wastes spend trying to hit pacing. Best: 6am-12pm ad account time."
        source: "BPM/5-Scaling/V-Scale"
        domains: ["scaling-campaigns"]
      - id: "HEUR-DM-031"
        title: "H-Scale 30% Overlap Maximum"
        description: "Ad set overlap should not exceed 30% in delivery insights. Beyond that, pause or differentiate creative."
        source: "BPM/5-Scaling/H-Scale"
        domains: ["scaling-campaigns"]
      - id: "HEUR-DM-032"
        title: "Manual Bid 3x Sweet Spot"
        description: "For manual bid testing: 3x target CPA often performs best. Test at 1x, 2x, 3x. Example: $30 CPA → test $30, $60, $90 bids."
        source: "BPM/BOSS-Manual-Bid"
        domains: ["media-buying"]
      - id: "HEUR-DM-033"
        title: "Ad Sniper 3-Day Window"
        description: "Analyze last 3 days of data. Compare each ad's metrics to ad set average. Pause ads above average CPA. Need 5,000 impressions for confidence."
        source: "BPM/4-Profitability/Ads-Sniper"
        domains: ["facebook-ads"]
      - id: "HEUR-DM-034"
        title: "Ad Sniper Automation Phases"
        description: "Phase 1 (1pm-5pm): pause if CPA > target+50%. Phase 2 (5pm-12am): tighten to CPA > target+20%. Resurrection: restart if 3-day blended CPA good."
        source: "BPM/Automation-Accelerator"
        domains: ["automation"]
      - id: "HEUR-DM-035"
        title: "Stop Loss Rule"
        description: "Pause ad set if CPA > 5x target with 1+ conversion, OR spend > 5x CPA with zero acquisitions."
        source: "BPM/Automation-Accelerator"
        domains: ["automation"]
      - id: "HEUR-DM-036"
        title: "Ecommerce Benchmarks"
        description: "Ecom: 15-20% add to cart rate, 20-30% of cart visitors converting to purchase. Site CR typically 1-4%. Info products 5-15%."
        source: "BPM/4-Profitability"
        domains: ["ecommerce-ads"]
      - id: "HEUR-DM-037"
        title: "iOS14 Data Loss Range"
        description: "Post-iOS14: ad accounts report 30-70% fewer conversions in Ads Manager vs backend. 55% of purchases invisible to pixel in case study."
        source: "FAATT/Case-Study"
        domains: ["attribution-tracking"]
      - id: "HEUR-DM-038"
        title: "Offline Conversions 28-Day Window"
        description: "Offline conversions have 28-day attribution (vs pixel's 7-day). Upload 90 days history initially. Daily uploads recommended."
        source: "FAATT/05-Offline-Conversions"
        domains: ["attribution-tracking"]
      - id: "HEUR-DM-039"
        title: "CAPI Event Match Quality Target"
        description: "Event match quality score 7-8 is good for purchase pixel. 89% deduplication rate is ideal."
        source: "FAATT/04-Server-Pixel"
        domains: ["attribution-tracking"]
      - id: "HEUR-DM-040"
        title: "AC-4 Scaling Threshold"
        description: "AC-4 Score: 15-19/20 = ready to scale. 10-14 = too early, optimize first. Below 9 = major work needed beyond ads. Real case: 17/20 scaled to $16M in 5 months."
        source: "7FMAP/AC-4-Grading"
        domains: ["paid-traffic"]

  DEEP_EXTRACTION_FRAMEWORKS:
    note: "Additional frameworks from deep extraction"
    elements:
      - id: "FW-DM-016"
        title: "V-Scaling Strategy"
        description: "Staircase Method: 20% increments, every other day when cautious, twice daily when confident. 10% decrease as punishment. Compound 20%/day = 300% in 5 days. Never increase after 5pm."
        source: "BPM/5-Scaling + 7FFAP/04-Grow"
        domains: ["scaling-campaigns"]
      - id: "FW-DM-017"
        title: "H-Scaling Strategy"
        description: "Duplicate winning ad set, change ONE variable per copy (bid level, placement, device, landing page). Original = insurance policy. Max 30% audience overlap. Cut by 1pm if not matching."
        source: "BPM/5-Scaling + 7FFAP/04-Grow"
        domains: ["scaling-campaigns"]
      - id: "FW-DM-018"
        title: "VHV Strategy (Vertical-Horizontal-Vertical)"
        description: "Depesh's preferred method: V-scale to prove, H-scale to expand, V-scale winners again. Repeat. Best combined approach for fastest profitable growth."
        source: "7FFAP/04-Grow/VHV"
        domains: ["scaling-campaigns"]
      - id: "FW-DM-019"
        title: "Oceans, Boats, and Hooks"
        description: "Audiences = oceans, ad sets = boats (budget = boat size), ads = hooks. Multiple boats in same ocean = H scaling. Bigger boat = V scaling."
        source: "BPM/5-Scaling"
        domains: ["scaling-campaigns"]
      - id: "FW-DM-020"
        title: "STAR Testing Method"
        description: "Setup (prioritize backlog) → Test (run it) → Analyze (WHY it worked/didn't, not just pass/fail) → Repeat (feed learnings into next cycle). Kanban: Ideas → Prioritized → WIP → Live → On Hold → Analysis → Winner/Loser."
        source: "7FFAP/02-Test/STAR + BPM/3-Graduation"
        domains: ["testing-methodology"]
      - id: "FW-DM-021"
        title: "GTA Method (Graduation Testing Automation)"
        description: "Automate graduation decisions: impression thresholds (1500 ATC, 2000 IC, 3000-5000 Purchase) + CPA targets → auto-rename Winner/Loser. Daily check reports."
        source: "BPM/3-Graduation/GTA"
        domains: ["testing-methodology", "automation"]
      - id: "FW-DM-022"
        title: "Automation Accelerator Rules Stack"
        description: "Growth: graduation alerts. Optimization: Ad Sniper 2-phase (1-5pm loose, 5-12am tight), Recovery, Resurrection (3-day lookback), Stop Loss, Anti-Void. Scale: V moderate 9am, V Punisher -10%, H duplicate if 3-day good."
        source: "BPM/Automation-Accelerator"
        domains: ["automation"]
      - id: "FW-DM-023"
        title: "Reverse Sales Funnel for Existing Customers"
        description: "At purchase = HOT. Over time without repurchase: warm → cold. Invert full funnel. Post-purchase timeline: thank you video, product arrival, 2-week check-in, repurchase cycle."
        source: "BPMFA/26-Business-Scaling"
        domains: ["funnel-optimization", "ecommerce-ads"]
      - id: "FW-DM-024"
        title: "EROAS Attribution Framework"
        description: "Estimated ROAS = total GA revenue / total FB spend. Not campaign-level — macro business health check. Facebook typically drives 60-70% of direct sales plus assists all other channels."
        source: "7FMAP/EROAS + BPMFA/Attribution"
        domains: ["attribution-tracking"]
      - id: "FW-DM-025"
        title: "M-Scale Manual Bidding Framework"
        description: "Priority: Bid Cap > Cost Cap > Target Cost > ROAS/Value. Bid Cap at 1x/2x/3x/4x CPA. Min budget per ad set = CPA×2. 2-3x bids usually win. Use Target Cost above $1K/day for sustained scaling."
        source: "BPMFA/25-Campaign-Scaling"
        domains: ["media-buying", "scaling-campaigns"]

    pessoas em quem voce JA confia. Para quem voce entrega as coisas? Quem voce liga
    para fazer brainstorm? Extraia seus tracos comuns. Esses se tornam seus nao-negociaveis
    de contratacao. Depois faca o inverso: quem drena voce? Extraia esses anti-padroes.


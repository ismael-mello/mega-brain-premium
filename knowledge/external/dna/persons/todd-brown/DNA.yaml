  L2_MENTAL_MODELS:
    count: 113
    items:
      - id: "MM-TB-001"
        name: "Marketplace Sophistication Stages (Eugene Schwartz)"
        description: "Markets evolve through 5 stages determining what messaging works."
        domains: ["market-research", "copywriting", "competitive-strategy"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-002"
        name: "The Unique Mechanism Lens"
        description: "Every product needs specific component that delivers the result."
        domains: ["offer-creation", "positioning", "copywriting"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-003"
        name: "List → Offer → Copy Priority Hierarchy"
        description: "Success determinants in order: List, Offer, Copy."
        domains: ["direct-response", "offer-creation", "copywriting"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-004"
        name: "Front End vs Back End Marketing Lens"
        description: "Every activity is front-end (acquisition) or back-end (revenue from existing)."
        domains: ["funnel-strategy", "business-model", "marketing-philosophy"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-005"
        name: "Marketing-Then-Selling Sequence"
        description: "Marketing (prospect's world) must precede selling (product)."
        domains: ["marketing-philosophy", "copywriting", "conversion"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-006"
        name: "White Space / Gap Analysis in Competitor Messaging"
        description: "Map competitors' messaging to find unexplored territory."
        domains: ["competitive-strategy", "positioning", "market-research"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-007"
        name: "Two-Step Marketing Model"
        description: "Get prospects to identify themselves, then deliver value+marketing."
        domains: ["lead-generation", "funnel-strategy", "direct-response"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-008"
        name: "Education-Based Marketing (EBM) Content"
        description: "Content that appears educational but creates desire."
        domains: ["content-marketing", "lead-magnets", "direct-response"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-009"
        name: "Niche Viability Framework (John Carleton's Mob)"
        description: "6 criteria: Large, Hungry, Mob, Addicts, Flush, Accessible."
        domains: ["niche-selection", "market-research", "business-model"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-010"
        name: "Pre-Selling as Seed-Planting"
        description: "Front-end products plant desire for back-end through subtle references."
        domains: ["funnel-strategy", "back-end-marketing", "product-creation"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-011"
        name: "Hook as Mental Opt-Out Prevention"
        description: "Hook prevents prospect from deciding they've heard it before."
        domains: ["copywriting", "vsl", "direct-response"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-012"
        name: "Average Lifetime Customer Value as True Business Metric"
        description: "ALTCV drives back-end strategy."
        domains: ["analytics", "economics", "back-end-marketing"]
        source: "SFFF-M01-M04"

      - id: "MM-TB-013"
        name: "Transaction Value as Competitive Moat"
        description: "Higher front-end value = access to channels competitors can't afford."
        domains: ["competitive-strategy", "economics", "customer-acquisition"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-014"
        name: "Consumer Add-On Psychology (Real World Commerce Model)"
        description: "Add-ons always priced below original; violating this creates friction."
        domains: ["upsells", "psychology", "transaction-maximization"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-015"
        name: "Chain Sequence as Behavioral Funnel"
        description: "Behavior-driven subscribe/unsubscribe, not linear sequences."
        domains: ["email-marketing", "automation", "sequences"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-016"
        name: "Transformation Story Three-Phase Structure"
        description: "Same/worse situation → discovery → transformation."
        domains: ["copywriting", "storytelling", "email-marketing"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-017"
        name: "Problem-Agitate-Solve (PAS) Email Framework"
        description: "Remind problem, agitate consequences, present solution."
        domains: ["email-marketing", "copywriting", "sequences"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-018"
        name: "Progress Bar as Transaction Psychology Tool"
        description: "Conveys transaction still in progress, keeps engagement."
        domains: ["conversion", "order-form", "psychology"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-019"
        name: "Frankly Puzzled Email"
        description: "Final email names elephant in room and overcomes top 3 objections."
        domains: ["email-marketing", "objection-handling", "sequences"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-020"
        name: "The Soft Offer as Trust Bridge"
        description: "Pay nothing now, billed in 72 hours; trust bridge to higher price."
        domains: ["upsells", "psychology", "transaction-maximization"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-021"
        name: "Thank You Page as Psychological Reset"
        description: "Mock thank-you page resets guard, gift offer achieves higher take rates."
        domains: ["conversion", "transaction-maximization", "psychology"]
        source: "SFFF-M05-M08"

      - id: "MM-TB-022"
        name: "Tracking as Decision Engine"
        description: "Tracking converts activity into actionable intelligence."
        domains: ["analytics", "decision-making", "funnel-optimization"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-023"
        name: "Visitor Value as Spending Cap"
        description: "EPC sets ceiling for acceptable ad spend."
        domains: ["analytics", "paid-traffic", "economics"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-024"
        name: "EPC and CPC as Inseparable Pair"
        description: "Must always be evaluated together."
        domains: ["analytics", "paid-traffic", "decision-making"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-025"
        name: "Front-End / Back-End Profit Architecture"
        description: "Front-end breaks even; back-end extracts profit."
        domains: ["business-model", "economics", "funnel-strategy"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-026"
        name: "Control vs. Variation — Scientific Improvement"
        description: "Winner becomes new control; iterative scientific loop."
        domains: ["testing", "funnel-optimization", "analytics"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-027"
        name: "Focus on Things That Scream, Not Whisper"
        description: "Test highest-leverage elements first, not cosmetic."
        domains: ["testing", "funnel-optimization", "decision-making"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-028"
        name: "Lifetime Customer Value as Growth Accelerator"
        description: "Knowing LCV unlocks going negative on front-end."
        domains: ["economics", "customer-value", "customer-acquisition"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-029"
        name: "Campaign Funnel as Sequential Revenue Map"
        description: "Track entire journey back to originating campaign."
        domains: ["analytics", "attribution", "funnel-strategy"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-030"
        name: "Optimization by Constraint Identification"
        description: "View funnel as system with single bottleneck."
        domains: ["funnel-optimization", "systems-thinking", "analytics"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-031"
        name: "Customer Segmentation by Behavior Value"
        description: "Segment by purchasing behavior, not demographics."
        domains: ["segmentation", "back-end-marketing", "analytics"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-032"
        name: "Format Laddering — Same Content, Higher Price Points"
        description: "$19 book → $97 CDs → $397 DVDs → $997 coaching → $3000+ events."
        domains: ["product-creation", "pricing", "back-end-marketing"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-033"
        name: "Break-Even as Strategic Position, Not Failure"
        description: "Break-even means free customer acquisition with back-end."
        domains: ["economics", "funnel-strategy", "customer-acquisition"]
        source: "SFFF-M09-M12"

      - id: "MM-TB-034"
        name: "The Big 5 Product Quality Framework"
        description: "Judge front-end products by 5 criteria: (1) establishes desired beliefs, (2) creates tribal belonging, (3) bonds customers to you, (4) demonstrates right place/advisor, (5) creates desire for more."
        domains: ["product-creation", "customer-retention", "info-marketing"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-035"
        name: "Funnel-First Thinking"
        description: "A-players think about the marketing funnel before and during product creation. Repurpose content minimum 6 times. Products are engineered around marketing vehicles, not the reverse."
        domains: ["product-creation", "marketing-funnels", "info-marketing"]
        source: "SFFF-BONUS"

      - id: "MM-TB-036"
        name: "Behavioral Tagging for List Segmentation"
        description: "Lists segmented by behavior: active-in-funnel, completed-funnel, customer/prospect. Topic-specific clicks temporarily move subscribers to sub-sequences before returning to house list."
        domains: ["email-marketing", "segmentation", "follow-up"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-037"
        name: "The Proof Preponderance Principle"
        description: "Don't just provide proof — pile it up relentlessly until the weight of evidence overwhelms all doubt. Testimonials, case studies, data, demonstrations — stack continuously."
        domains: ["copywriting", "conversion", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-038"
        name: "Three Categories of Marketers by Acquisition Aggressiveness"
        description: "Category 1: No paid traffic. Category 2: Break-even DR. Category 3: Negative-front-end DR (deliberately lose money, crush competitors). Category 3 wins market share."
        domains: ["customer-acquisition", "paid-traffic", "competitive-strategy"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-039"
        name: "Funnel Combination Architecture"
        description: "Individual funnel maps are building blocks. Most powerful funnels combine multiple map types. Skilled marketers see the 17 maps as a toolkit to combine, not isolated templates."
        domains: ["marketing-funnels", "funnel-architecture", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-040"
        name: "Consumption-Based Sequence Progression"
        description: "Prospects advance based on actual behavior (clicks, consumption), not arbitrary time delays. Engaged prospects move faster; disengaged get more touches before advancing."
        domains: ["email-marketing", "segmentation", "funnel-architecture"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-041"
        name: "Product Introduction Engineering (Anti-Delay Protocol)"
        description: "Product intro must: resell purchase decision, reignite excitement, give consumption plan, deliver fast win within 24-72 hours. Biggest obstacle is getting started."
        domains: ["product-creation", "customer-onboarding", "info-marketing"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-042"
        name: "The Big Idea as Funnel Foundation"
        description: "Every wildly successful funnel is built off a big idea that cuts through clutter, conveys newness, makes almost unbelievable promise, sparks curiosity, prevents mental opt-out."
        domains: ["copywriting", "marketing-funnels", "offer-construction"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-043"
        name: "Product Pipeline Preview (Upsell Seeding)"
        description: "Throughout front-end product, subtly reference what advanced tribe members learn. Done 2-3 times, creates rational and emotional desire for next step. Product becomes its own upsell vehicle."
        domains: ["product-creation", "info-marketing", "customer-retention"]
        source: "SFFF-UPSELLS"

      - id: "MM-TB-044"
        name: "The Offer Is More Important Than the Copy (Hierarchy)"
        description: "List is most important, offer is second, copy is third. Great copy never makes up for weak offer. Killer offer compensates for weak copy. Most marketers misallocate attention."
        domains: ["copywriting", "offer-construction", "direct-response"]
        source: "SFFF-UPSELLS"

      # === A-Z COPYWRITING WORKSHOP (AZCW) — 16 new mental models ===

      - id: "MM-TB-045"
        name: "Categorical Imperative (Bill Bonner/Agora)"
        description: "Prospects try to categorize every marketing message into a known bucket. If they can categorize it, they dismiss it. Goal: prevent mental opt-out by making the idea uncategorizable."
        domains: ["copywriting", "hooks", "attention"]
        source: "AZCW"

      - id: "MM-TB-046"
        name: "Two Buckets of Problems (Unresolved Distress vs Unfulfilled Need)"
        description: "Every prospect problem fits into one of two buckets: Unresolved Distress (pain they want to stop) or Unfulfilled Need/Desire (something they want to achieve). Problem = Pain."
        domains: ["copywriting", "research", "buyer-psychology"]
        source: "AZCW"

      - id: "MM-TB-047"
        name: "Problem vs Pain Distinction"
        description: "The problem is NOT the same as the pain. The problem is the CAUSE of the pain. The pain is what the prospect wants solved. The pain comes from how the prospect FEELS about the problem."
        domains: ["copywriting", "persuasion", "buyer-psychology"]
        source: "AZCW"

      - id: "MM-TB-048"
        name: "Aristotle's Three Pillars of Persuasion"
        description: "Pathos (emotional appeal), Ethos (character/reputation/identity), Logos (logical/rational reasoning). Good copy leverages all three: core emotion, desired identity, and logical buying support."
        domains: ["copywriting", "persuasion", "rhetoric"]
        source: "AZCW"

      - id: "MM-TB-049"
        name: "Three Types of Benefits (Functional → Dimensionalized → Emotional)"
        description: "Functional: surface benefit (soft grip). Dimensionalized: what it looks like in real life (write for hours with no pain). Emotional: how it makes them feel (feel great knowing you can write freely)."
        domains: ["copywriting", "benefits", "persuasion"]
        source: "AZCW"

      - id: "MM-TB-050"
        name: "Faux Benefits Trap"
        description: "A faux benefit feels like a benefit but is at least one step removed from what the prospect wants. Fix with: 'So you can...', 'Which means, you...', 'So you will...'"
        domains: ["copywriting", "benefits", "writing-craft"]
        source: "AZCW"

      - id: "MM-TB-051"
        name: "Contrast Principle in Copywriting"
        description: "Every solution is made more valuable in context of the problem. The more severe the problem is perceived, the more valuable the solution. Use contrast to amplify perceived value."
        domains: ["copywriting", "persuasion", "framing"]
        source: "AZCW"

      - id: "MM-TB-052"
        name: "Offer = Attractive Solution + Irresistible Proposition"
        description: "Two components: (1) Attractive Solution — how compelling is the solution itself. (2) Irresistible Proposition — deliverables, price, terms, risk reversal, premiums. Most focus on proposition; solution matters more."
        domains: ["copywriting", "offer-creation", "conversion"]
        source: "AZCW"

      - id: "MM-TB-053"
        name: "Primacy and Recency Effect in Sentences"
        description: "People remember what comes first and last in a sentence. Place the most important word/concept at the beginning or end. Middle gets lost."
        domains: ["copywriting", "sentence-structure", "writing-craft"]
        source: "AZCW"

      - id: "MM-TB-054"
        name: "Unaddressed Root Problem (URP)"
        description: "Go deeper than the surface problem. Find the real underlying cause that no competitor is addressing. Only go deep enough — once you find an unaddressed level, stop there."
        domains: ["copywriting", "research", "positioning"]
        source: "AZCW"

      - id: "MM-TB-055"
        name: "Curse of Knowledge"
        description: "The closer you are to your topic, the more you assume your audience knows. You're a 9/10 expert; your prospect is a 2/10. You MUST dumb it down. Always overestimate the gap."
        domains: ["copywriting", "writing-craft", "communication"]
        source: "AZCW"

      - id: "MM-TB-056"
        name: "Hook = Emotionally Compelling + Intellectually Interesting"
        description: "Every effective hook must be both emotionally compelling (promise + mechanism = hope) AND intellectually interesting (curiosity, novelty, can't categorize it). Missing either = weak hook."
        domains: ["copywriting", "hooks", "attention"]
        source: "AZCW"

      - id: "MM-TB-057"
        name: "Overreaching in Benefit Claims"
        description: "Draw the line when other factors play a role between your solution and the claimed outcome. A graphic design tool cannot claim 'endless sales.' The reach must be credible and direct."
        domains: ["copywriting", "claims", "credibility"]
        source: "AZCW"

      - id: "MM-TB-058"
        name: "Zeigarnik Effect / Open Loops in Copy"
        description: "Unfinished tasks create mental tension that demands closure. Open loops in copy create this tension. 'More about that in a minute...', 'In a moment I'll tell you... First, let me...' Keep multiple loops open."
        domains: ["copywriting", "persuasion", "engagement"]
        source: "AZCW"

      - id: "MM-TB-059"
        name: "Frame Control Alters Perception Without Changing Facts"
        description: "Same facts framed differently produce different emotional responses. '90% are fine' vs '10% die on the table.' Frame pricing: '4 payments of $300' vs 'save $200 with one payment of $1000.'"
        domains: ["copywriting", "framing", "persuasion"]
        source: "AZCW"

      - id: "MM-TB-060"
        name: "Seven Prospect Buying Risks"
        description: "Financial loss, loss of face, loss of time, inconvenience, hassle/intimidation, unsatisfactory results, disappointment/frustration. Copy must address and eliminate each relevant risk."
        domains: ["copywriting", "risk-reversal", "buyer-psychology"]
        source: "AZCW"

      # === AZCW SUPPLEMENTARY PASS (7 mental models) ===

      - id: "MM-TB-061"
        name: "Buyer as Asset (Investor Mindset)"
        description: "Buyers are assets like real estate. Three numbers: cost to acquire, present value (AOV), future value (LTV). Netflix pays $50 CPA for $10/month subscriber because LTV = $200 (20 months). The more you can afford to spend, the easier the game."
        domains: ["economics", "customer-acquisition", "business-model"]
        source: "AZCW"

      - id: "MM-TB-062"
        name: "The 75/25 Campaign Structure"
        description: "75% of front-end campaign = MARKETING (getting buy-in on unique mechanism). 25% = SELLING (presenting offer/product). In the 75%, you're not talking about the product at all. If you cut the last 25%, people would say 'wow, where do I learn this?'"
        domains: ["copywriting", "campaign-structure", "persuasion"]
        source: "AZCW"

      - id: "MM-TB-063"
        name: "Now State vs After State (Contrast Model)"
        description: "Now State: problem + symptoms + pain + negative emotions. After State: problem solved + benefits + pleasure + new emotions. The CONTRAST between these states is the core of persuasive copy. Darkness-light, darkness-light."
        domains: ["copywriting", "persuasion", "contrast"]
        source: "AZCW"

      - id: "MM-TB-064"
        name: "The Google Slap Trigger"
        description: "When you market a commodity, the prospect pauses your video, goes to Google/YouTube/Amazon and searches for alternatives. A unique mechanism prevents this by being proprietary and unavailable elsewhere. Commodity = all roads lead everywhere. Mechanism = all roads lead to YOU."
        domains: ["copywriting", "positioning", "unique-mechanism"]
        source: "AZCW"

      - id: "MM-TB-065"
        name: "Input + Connections = Ideas (James Webb Young)"
        description: "Idea generation = (1) consuming lots of diverse information (input) + (2) looking for connections between seemingly disconnected things. James Webb Young's 'A Technique for Producing Ideas' — the only book needed on the topic."
        domains: ["copywriting", "hooks", "creative-process"]
        source: "AZCW"

      - id: "MM-TB-066"
        name: "Front-End vs Back-End Copy Mindset"
        description: "Front-end: requires full persuasion — big idea, hook, curiosity, emotional hooks, overcoming resistance. Back-end: can be more direct, relationship-based, less copy needed, no big idea required. Mark Ford: 'Go to your tribe and say I've got something helpful.'"
        domains: ["copywriting", "campaign-strategy", "marketing-funnels"]
        source: "AZCW"

      - id: "MM-TB-067"
        name: "Worldview Colors How Facts Are Processed"
        description: "Same fact, two opposing worldviews, two completely different conclusions. The Christian and atheist both look at the same fossils and reach opposite conclusions. Unless the worldview changes, they will never see those facts the same way."
        domains: ["copywriting", "persuasion", "buyer-psychology"]
        source: "AZCW"

      # --- CLLR (Copy Legends Lock-In Recordings) ---

      - id: "MM-TB-068"
        name: "Idea Hierarchy: Gimmicks → Promises → Notions → Ideas → Big Ideas"
        description: "Stefan Georgi (via Mark Ford): It's easier to sell with gimmicks and promises, but not necessarily better. An idea is a larger argument about a mechanism or unrecognized problem. A Big Idea is about a bigger societal issue — more important, more impactful, timely. Big Ideas get shared with family and friends because they create paradigm shifts."
        domains: ["big-ideas", "copywriting", "campaign-strategy"]
        source: "CLLR"

      - id: "MM-TB-069"
        name: "'In or Out' Big Idea Approach"
        description: "David Deutsch: 'In' = looking within the product, editor/expert, or story of creation. 'Out' = looking outside the product to marketplace events or media. Builds campaigns so new ideas can be plugged in easily — if initial idea doesn't work, replace without changing majority of copy."
        domains: ["big-ideas", "campaign-architecture", "copywriting"]
        source: "CLLR"

      - id: "MM-TB-070"
        name: "Flow Bible — Catalog of Proven VSL Storylines"
        description: "Peter Kell: Created a 'Flow Bible' — catalog of 20+ 8-figure VSLs, each reduced to its core storyline. Rather than studying 30-40 minute VSLs, study the storyline. Match your product to a proven storyline path. 'I follow proven paths — basically just what the rich people are doing.'"
        domains: ["VSL", "campaign-strategy", "research"]
        source: "CLLR"

      - id: "MM-TB-071"
        name: "Thank You Page as Research Goldmine"
        description: "Dan Ferrari / Rich Schefren / Matt Stafford: The thank you page survey ('What almost made you not buy?') delivers insights from your MOST qualified buyers. Donnie French used answers to resurrect dying VSLs — implemented changes on front-end, extended offer lifespan significantly. 'One question' changed everything."
        domains: ["research", "conversion-optimization", "surveys"]
        source: "CLLR"

      - id: "MM-TB-072"
        name: "Curse of Knowledge — Success Distances You From Your Prospect"
        description: "Todd/Justin Goff: The more successful you get, the further you get away from understanding your prospect. Justin's prospect just wanted $2K/month — a world away from the big promises marketers make. Regular customer conversations prevent falling prey to curse of knowledge."
        domains: ["copywriting", "research", "buyer-psychology"]
        source: "CLLR"

      - id: "MM-TB-073"
        name: "Over-Teasing Mechanism Name Creates Annoyance, Not Curiosity"
        description: "Donnie French: Was teasing 'five minute simple strike sequence' throughout entire VSL. Took mechanism tease completely out, replaced with caveman language ('this technique', 'this drill', 'this'). ALL numbers went up — conversion rate, stick rate, LTV after 4 months. Simplicity drove MORE curiosity than named tease."
        domains: ["VSL", "unique-mechanism", "copywriting"]
        source: "CLLR"

      - id: "MM-TB-074"
        name: "Prospect Vocabulary → Proprietary Language Transition"
        description: "Donnie French: Start campaigns using the prospect's vocabulary for problems and outcomes. Then gradually expand their vocabulary by introducing our internal, proprietary language. Move prospect from their language to ours so they understand what we need them to understand."
        domains: ["copywriting", "buyer-psychology", "language"]
        source: "CLLR"

      - id: "MM-TB-075"
        name: "Big Ideas Must Stand Without Hyperbolic Language"
        description: "David Deutsch: Big Ideas can be fouled up by lesser copywriters who take them into hyperbolic territory. A true Big Marketing Idea should stand on its own without needing hyperbolic language to prop it up. If you need hyperbole, the idea itself isn't big enough."
        domains: ["big-ideas", "copywriting", "quality"]
        source: "CLLR"

      - id: "MM-TB-076"
        name: "Empathy vs Shock in Opening Stories"
        description: "Chris Haddad: Distinction between going for shock vs empathy. Shock = car crash, hospital, explosion (dramatic but disconnected). Empathy = 'you were in bed with your boyfriend and he asked you to talk dirty and you had a panic attack' (relatable experience). Empathy is more effective. People confuse causing emotional reaction with creating genuine connection."
        domains: ["storytelling", "copywriting", "empathy"]
        source: "CLLR"

# ═══════════════════════════════════════════════════════════════════════════════
      - id: "MM-TB-077"
        name: "Commoditized vs Unique Mechanism Model"
        description: "If the reason why your product works is available elsewhere, it's commoditized. If proprietary and only available through you, it's unique. Commoditized = demand for product TYPE; Unique = demand for YOUR offer."
        domains: ["unique-mechanism", "product-differentiation", "demand-creation"]
        source: "UMW"

      - id: "MM-TB-078"
        name: "Google Slap Trigger Model"
        description: "When you present a commoditized mechanism, prospects pause your VSL and Google it — finding alternatives. With unique mechanism, all Google results lead back to you."
        domains: ["unique-mechanism", "competitive-positioning", "digital-marketing"]
        source: "UMW"

      - id: "MM-TB-079"
        name: "Promise Exposure Spectrum (PES)"
        description: "4 levels: Promise alone → Expanded Promise → Promise + Unique Mechanism → Promise + Expanded Mechanism. As markets get sophisticated, more mechanism detail needed."
        domains: ["market-sophistication", "unique-mechanism", "campaign-architecture"]
        source: "UMW"

      - id: "MM-TB-080"
        name: "Different vs Better Dual Function"
        description: "Different gets ATTENTION. Better/Superior produces CONVERSION. You need both, in that order. Different without better is novelty; better without different is invisible."
        domains: ["marketing-philosophy", "differentiation", "conversion"]
        source: "UMW"

      - id: "MM-TB-081"
        name: "Hope vs Skepticism Model"
        description: "The more a prospect has tried and failed, the more skeptical they are. A unique mechanism re-introduces hope by showing something genuinely NEW and DIFFERENT."
        domains: ["prospect-psychology", "unique-mechanism", "buyer-psychology"]
        source: "UMW"

      - id: "MM-TB-082"
        name: "Education-Based Marketing (EBM) Model"
        description: "Marketing is not about selling; it's about educating prospects on why your mechanism is the superior option, leading them to want it before you ever pitch."
        domains: ["education-based-marketing", "marketing-philosophy", "unique-mechanism"]
        source: "UMW"

      - id: "MM-TB-083"
        name: "4 Types of Unique Mechanisms"
        description: "Hierarchy: (1) Existing — genuinely different process. (2) Unspoken — same process competitors don't talk about. (3) Transubstantiated — ordinary given proprietary name. (4) Metaphorical — commodity given nickname to avoid trigger."
        domains: ["unique-mechanism", "mechanism-classification", "transubstantiation"]
        source: "UMW"

      - id: "MM-TB-084"
        name: "Schlitz Beer Model (Unspoken Mechanism)"
        description: "Claude Hopkins saw Schlitz sterilized bottles — every brewer did it, but no one told the market. By talking about it first, Schlitz differentiated. Applies whenever competitors do something but don't communicate it."
        domains: ["unique-mechanism", "unspoken-mechanism", "marketing-history"]
        source: "UMW"

      - id: "MM-TB-085"
        name: "Mental Opt-Out Model"
        description: "When a prospect hears a commodity term (gold, retargeting, email marketing), they mentally opt out — 'heard it, seen it.' A metaphorical mechanism prevents this trigger."
        domains: ["prospect-psychology", "naming-strategy", "unique-mechanism"]
        source: "UMW"

      - id: "MM-TB-086"
        name: "Product vs Mechanism Distinction"
        description: "The product is what you BUY. The mechanism is WHY it works. Always separate and present distinctly. P90X = product, Muscle Confusion = mechanism."
        domains: ["unique-mechanism", "product-differentiation", "naming-strategy"]
        source: "UMW"

      - id: "MM-TB-087"
        name: "Categories of Better Model"
        description: "Better can mean: (1) Easier, (2) Faster, (3) More consistent, (4) Greater volume of results, (5) Fewer side effects/problems. Pick ONE as your primary superiority claim."
        domains: ["unique-mechanism", "campaign-architecture", "competitive-positioning"]
        source: "UMW"

      - id: "MM-TB-088"
        name: "Built-in Contrast Model"
        description: "Every unique mechanism inherently contrasts against the typical/common approach. 'Better than what?' is always answered implicitly by the mechanism itself."
        domains: ["unique-mechanism", "competitive-positioning", "copywriting"]
        source: "UMW"

      - id: "MM-TB-089"
        name: "Faux Mechanism Detection Model"
        description: "A faux mechanism is when you NAME something without clarity on how/why it works. The name exists but the substance doesn't. ALWAYS interrogate BEFORE naming."
        domains: ["unique-mechanism", "mechanism-interrogation", "substance-over-form"]
        source: "UMW"

      - id: "MM-TB-090"
        name: "Diagnostic Process AS Mechanism"
        description: "When methods vary by client/situation, your DIAGNOSTIC process (how you determine which approach for whom) IS itself a unique mechanism."
        domains: ["unique-mechanism", "mechanism-identification", "consulting"]
        source: "UMW"

      - id: "MM-TB-091"
        name: "Campaign Thesis = Buying Belief"
        description: "The single sentence establishing what the prospect must believe to want your offer. Format: 'The [SUPERIOR] way to [PRIMARY PROMISE] is with [UNIQUE MECHANISM].'"
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "MM-TB-092"
        name: "2 Argument Models"
        description: "(1) Root Cause Solution — your mechanism solves the ROOT cause while competitors address symptoms. (2) Better Solution — yours is easier/faster/more consistent than alternatives."
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "MM-TB-093"
        name: "5 Core Campaign Chunks (E5 Architecture)"
        description: "Big Marketing Idea → Campaign Lead → Campaign Thesis → Campaign Argument → S.I.N. Offer. This is the architectural backbone of every E5 campaign."
        domains: ["campaign-architecture", "E5-method", "marketing-strategy"]
        source: "UMW"

      - id: "MM-TB-094"
        name: "Celebrity > Authority Model"
        description: "Celebrity status yields more revenue, influence, and longevity than mere authority/expertise. Choose celebrity positioning over expert positioning."
        domains: ["celebrity-positioning", "personal-branding", "pricing-psychology"]
        source: "UMW"

      - id: "MM-TB-095"
        name: "Self-Aggrandizement Principle (Gary Halbert)"
        description: "You must be your own biggest cheerleader. Don't assume the marketplace knows what makes you great. Seed communications with positioning statements."
        domains: ["personal-branding", "self-promotion", "marketplace-positioning"]
        source: "UMW"

      - id: "MM-TB-096"
        name: "Flag-in-the-Ground Model"
        description: "Pick a specific topic/area to OWN in the market's mind. Look for gaps where no one has claimed the space. Engineer everything around supporting that claim."
        domains: ["positioning", "personal-branding", "marketplace-positioning"]
        source: "UMW"

      - id: "MM-TB-097"
        name: "Dan Kennedy Seinfeld Test"
        description: "If your audience knows more about a TV character than about you, you're not revealing enough about yourself. Test for personal connection depth."
        domains: ["personal-branding", "authenticity", "connection"]
        source: "UMW"

      - id: "MM-TB-098"
        name: "Introduce-Tease-Prove-Offer Sequence"
        description: "(1) INTRODUCE the unique mechanism. (2) TEASE what it can do. (3) PROVE why it's superior with argument model. (4) OFFER the product as the way to get the mechanism."
        domains: ["campaign-architecture", "unique-mechanism", "sales-sequence"]
        source: "UMW"

      - id: "MM-TB-099"
        name: "Nested Mechanisms Model"
        description: "A big framework contains sub-mechanisms within its steps. E5 Method contains sub-mechanisms like Deep Dive Survey. Each step can have its own named mechanism."
        domains: ["unique-mechanism", "mechanism-architecture", "framework-design"]
        source: "UMW"

      # ── YWO: Your Winning Offer (MM-TB-100 → MM-TB-113) ──

      - id: "MM-TB-100"
        name: "E5 Method (5-Stage Customer Acquisition Model)"
        description: "Five-stage process: (1) Examine — research prospects and competitors. (2) Engineer — build the E5 campaign. (3) Evaluate — ensure profitability. (4) Enhance — turn into full marketing campaign. (5) Expand — scale reach of new buyers."
        domains: ["customer-acquisition", "campaign-architecture", "marketing-funnels"]
        source: "YWO"

      - id: "MM-TB-101"
        name: "SIN Proposition Model"
        description: "Three-part test for a winning offer: Superior (mechanism-driven differentiation), Irresistible (value so far exceeds price that buying is obvious), Noteworthy (worthy of attention, conversation, and sharing)."
        domains: ["offer-creation", "differentiation", "value-engineering"]
        source: "YWO"

      - id: "MM-TB-102"
        name: "Attractive Panacea Model"
        description: "The ideal solution as perceived by the prospect — the dream outcome, the perfect fix. Your offer must align with and feel like the prospect's attractive panacea for their specific problem."
        domains: ["offer-creation", "prospect-psychology", "solution-framing"]
        source: "YWO"

      - id: "MM-TB-103"
        name: "Offer Architecture Layers Model"
        description: "A winning offer is built in layers: (1) Core Product/Service. (2) Deliverables (videos, worksheets, templates, cheat sheets). (3) Premiums/Bonuses. (4) Price Positioning. (5) Presentation Sequence. Each layer compounds perceived value."
        domains: ["offer-creation", "value-engineering", "deliverable-design"]
        source: "YWO"

      - id: "MM-TB-104"
        name: "Examination Dual-Lens Model"
        description: "Two lenses for market examination: (1) Prospects — what they want, fear, have tried, believe. (2) Competitors — what they're saying, solving, promising. Prospect lens for resonance, competitor lens for differentiation."
        domains: ["market-research", "competitive-analysis", "prospect-psychology"]
        source: "YWO"

      - id: "MM-TB-105"
        name: "Price-Value Perception Model"
        description: "Three-step sequence: (1) Anchor — establish high reference value. (2) Compare — show what alternatives cost. (3) Reveal — present your price as fraction of anchored value. The gap between anchor and price = perceived deal."
        domains: ["pricing-psychology", "anchoring", "offer-creation"]
        source: "YWO"

      - id: "MM-TB-106"
        name: "Payment Plan Psychology Model"
        description: "Present payment plan FIRST (higher total), then paid-in-full SECOND (savings). The payment plan becomes the anchor. Paid-in-full feels like a discount. Drives PIF behavior. Never present PIF first."
        domains: ["pricing-psychology", "payment-structure", "sales-presentation"]
        source: "YWO"

      - id: "MM-TB-107"
        name: "Deliverable Benefit Cascade Model"
        description: "For each deliverable: Feature (what it is) → Benefit (why it matters) → Outcome (what they'll achieve). Videos = learning → mastery. Worksheets = implementation → results. Templates = speed → confidence."
        domains: ["offer-creation", "deliverable-design", "value-communication"]
        source: "YWO"

      - id: "MM-TB-108"
        name: "Naming-Framing Power Model"
        description: "Name = Perception = Value. How you name and frame deliverables fundamentally changes perceived value. Like a book title — same content, different title, wildly different sales. Go the distance with naming."
        domains: ["naming-strategy", "perception-management", "offer-creation"]
        source: "YWO"

      - id: "MM-TB-109"
        name: "Competitive Anti-Modeling Model"
        description: "Anti-pattern to funnel hacking: examine competitors NOT to copy what works, but to identify what NOT to say. If everyone says X, you say Y. Differentiation requires knowing the landscape to deviate from it."
        domains: ["competitive-analysis", "differentiation", "anti-commoditization"]
        source: "YWO"

      - id: "MM-TB-110"
        name: "Market Saturation Response Model"
        description: "When market saturates: (1) Funnel alone won't differentiate. (2) Copy alone won't differentiate. (3) Your OFFER must differentiate. (4) A winning offer = monster competitive advantage in saturated markets."
        domains: ["market-saturation", "competitive-strategy", "offer-creation"]
        source: "YWO"

      - id: "MM-TB-111"
        name: "Premium Engineering Model"
        description: "Premiums are strategic enhancers, not bulk fillers. Each premium should: (1) Address an adjacent problem. (2) Complement (not duplicate) the core. (3) Have its own named value. (4) Increase perceived total value significantly."
        domains: ["offer-creation", "premium-engineering", "value-perception"]
        source: "YWO"

      - id: "MM-TB-112"
        name: "Product Presentation Sequencing Model"
        description: "The order of presentation matters: (1) Problem/pain. (2) Attractive panacea. (3) Unique mechanism. (4) Core offer. (5) Deliverables with benefit cascade. (6) Premiums. (7) Price anchoring. (8) Price reveal. (9) Payment options."
        domains: ["sales-presentation", "offer-creation", "conversion-optimization"]
        source: "YWO"

      - id: "MM-TB-113"
        name: "Offer Superiority Stack Model"
        description: "Three layers of superiority: (1) Mechanism Superiority — why your HOW is different/better. (2) Proposition Superiority — SIN test passes. (3) Presentation Superiority — how you present beats competitors. All three = winning offer."
        domains: ["offer-creation", "differentiation", "competitive-advantage"]
        source: "YWO"


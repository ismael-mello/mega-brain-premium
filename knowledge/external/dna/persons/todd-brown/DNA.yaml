        domains: ["product-creation", "pricing", "information-marketing"]
        source: "SFFF-M09-M12"

      - id: "FIL-TB-025"
        name: "Not All Customers Are Created Equal"
        description: "Best customers must be segmented and given better offers."
        domains: ["segmentation", "back-end-marketing", "customer-value"]
        source: "SFFF-M09-M12"

      - id: "FIL-TB-026"
        name: "High CPC Is Relative, Not Absolute"
        description: "CPC only meaningful alongside EPC."
        domains: ["analytics", "paid-traffic", "economics"]
        source: "SFFF-M09-M12"

      - id: "FIL-TB-027"
        name: "Front-End Goal Is Customer Acquisition, Not Profit"
        description: "Breaking even while building customer base is ideal."
        domains: ["funnel-strategy", "customer-acquisition", "economics"]
        source: "SFFF-M09-M12"

      - id: "FIL-TB-028"
        name: "Knowledge Is Useless Without Implementation"
        description: "Implementation creates outcomes, not knowledge alone."
        domains: ["mindset", "execution", "education"]
        source: "SFFF-M09-M12"

      - id: "FIL-TB-029"
        name: "Front-End is the Foundation of a Sustainable Business"
        description: "Long-term sustainability comes from the front-end marketing funnel — the consistent mechanism for acquiring new customers. Without it, every business eventually fails."
        domains: ["marketing-funnels", "customer-acquisition", "business-building"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-030"
        name: "Product Creation and Marketing Are the Same Thing"
        description: "Big dogs of direct response do not separate product creation from marketing. Every product serves a strategic marketing purpose — a conversion vehicle to install beliefs and set up the next sale."
        domains: ["product-creation", "marketing-funnels", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-031"
        name: "Never Rely on Joint Ventures as Primary Customer Acquisition"
        description: "JVs were designed as supplemental strategy, not foundation. Every sustainable 7-8-9 figure DR business acquires customers via own front-end funnels. JV-reliant businesses run out of cash."
        domains: ["business-building", "customer-acquisition", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-032"
        name: "The Front-End Transaction is an Indoctrination Vehicle"
        description: "The front-end sale indoctrinates and converts new customers into long-term tribe members. Judge by how well it establishes beliefs, creates belonging, and creates desire for more."
        domains: ["product-creation", "customer-retention", "tribe-building"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-033"
        name: "Building a Business vs Making Money Online"
        description: "Making money online is like day trading — lucrative but starting from scratch each day. Building a business is like dividend investing — reliable over time, builds equity."
        domains: ["business-building", "entrepreneurship", "mindset"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-034"
        name: "Upsells Are Value Delivery, Not Extraction"
        description: "Upsell sequences deliver more value by offering congruent products that enhance outcomes. Offering great upsells is advocacy for customers, not manipulation."
        domains: ["marketing-funnels", "customer-relationship", "offer-construction"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-035"
        name: "Every Marketer Needs at Least One Break-Even Front-End Funnel"
        description: "The only reliable, scalable way to grow a sustainable business is having at least one front-end funnel that breaks even on customer acquisition from paid traffic."
        domains: ["marketing-funnels", "customer-acquisition", "paid-traffic"]
        source: "SFFF-UPSELLS"

      - id: "FIL-TB-036"
        name: "Prospects Come for Benefits; Customers Stay for Relationship"
        description: "Gary Halbert's principle: prospects come for benefits they believe they can get, but stay long-term because of the relationship they perceive. Front-end products must function as relationship development tools."
        domains: ["customer-retention", "product-creation", "direct-response"]
        source: "SFFF-UPSELLS"

      # === A-Z COPYWRITING WORKSHOP (AZCW) — 15 new philosophies ===

      - id: "FIL-TB-037"
        name: "People Buy Solutions to Problems They Want Resolved — to Feel How They Want to Feel"
        description: "People don't buy products. They buy results, change, transformation. They buy solutions to problems to feel how they want to feel. People buy based on emotion and they buy emotions."
        domains: ["copywriting", "persuasion", "buyer-psychology"]
        source: "AZCW"

      - id: "FIL-TB-038"
        name: "We Don't Create Desire — We Channel Existing Desire"
        description: "Copywriters do not create desire to solve a problem. We channel existing desire to create demand for our offer. The desire already exists in the prospect."
        domains: ["copywriting", "persuasion", "direct-response"]
        source: "AZCW"

      - id: "FIL-TB-039"
        name: "Strategic Aim of Copy: Different and Superior Way to Solve the Problem"
        description: "The strategic aim of all copy is to show the prospect we have a DIFFERENT and SUPERIOR way to solve their problem. Different gets attention, superior closes the sale."
        domains: ["copywriting", "positioning", "persuasion"]
        source: "AZCW"

      - id: "FIL-TB-040"
        name: "Good Copy Is Verb-Driven, Not Adjective-Driven"
        description: "Good copy is powered by verbs — action, movement, transformation. Weak copy is loaded with adjectives and adverbs. Verbs create the feel of things happening. Adjectives create stagnation."
        domains: ["copywriting", "writing-craft", "word-choice"]
        source: "AZCW"

      - id: "FIL-TB-041"
        name: "Copy Must Sound Like the Spoken Word"
        description: "Sales copy should feel like spoken word — conversational, choppy sentences, short paragraphs. Throw grammar rules out the window. Nobody grades your copy for grammar."
        domains: ["copywriting", "writing-craft", "sentence-structure"]
        source: "AZCW"

      - id: "FIL-TB-042"
        name: "A Known Tactic Is a Blown Tactic"
        description: "When a copywriting tactic becomes recognizable to prospects, it loses all power. The moment they see the pattern, they mentally opt out. Tactics must feel invisible."
        domains: ["copywriting", "persuasion", "tactics"]
        source: "AZCW"

      - id: "FIL-TB-043"
        name: "Simple Is More Believable"
        description: "The human brain accepts as more believable that which is simple. Simple words, short sentences, short paragraphs. Resist the curse of knowledge. Dumb it down."
        domains: ["copywriting", "writing-craft", "persuasion"]
        source: "AZCW"

      - id: "FIL-TB-044"
        name: "Don't Emote, Evoke"
        description: "Copy should stimulate the prospect's emotions, not share yours. 'I'm so excited to tell you' is emoting. 'You'll be excited when you hear' is evoking. Evocative beats emotive."
        domains: ["copywriting", "word-choice", "persuasion"]
        source: "AZCW"

      - id: "FIL-TB-045"
        name: "Repetition Is Good; Being Repetitious Is Not"
        description: "Drive home the main promise over and over, but in different ways. Pile driver approach (Churchill): hit the point once, come back, hit again, then a tremendous whack."
        domains: ["copywriting", "persuasion", "messaging"]
        source: "AZCW"

      - id: "FIL-TB-046"
        name: "No Claim Should Be Bigger Than Your Biggest Proof Point"
        description: "Don't claim what you can't prove. Every claim needs proof support. The biggest claim you make must have the biggest proof to back it up."
        domains: ["copywriting", "credibility", "proof"]
        source: "AZCW"

      - id: "FIL-TB-047"
        name: "Copy Is Not About Trickery or Hypnosis"
        description: "The novice mistake is thinking copy uses whizzbang words to mesmerize prospects into buying. That's nonsense. Copy needs strategy underneath — different solution, proven claims, great offer."
        domains: ["copywriting", "persuasion", "mindset"]
        source: "AZCW"

      - id: "FIL-TB-048"
        name: "We Are in the Idea Business"
        description: "Mark Ford (Agora): 'We realized early on we're in the idea business — creating, developing, disseminating interesting, compelling, contrarian ideas.' The idea is the foundation of everything."
        domains: ["copywriting", "hooks", "marketing-strategy"]
        source: "AZCW"

      - id: "FIL-TB-049"
        name: "You're the Director of the Movie in the Prospect's Mind"
        description: "Through dimensionalized and emotional benefits, you create mental pictures. Use multiple senses (sight, sound, touch, smell, taste) in benefit descriptions."
        domains: ["copywriting", "benefits", "persuasion"]
        source: "AZCW"

      - id: "FIL-TB-050"
        name: "Never Seen a Campaign Fail from Too Many Benefits"
        description: "Campaigns fail from too few benefits, not too many. More benefits = more powerful copy. Stack functional, dimensionalized, and emotional benefits throughout."
        domains: ["copywriting", "benefits", "campaign-structure"]
        source: "AZCW"

      - id: "FIL-TB-051"
        name: "Metaphor Is the Most Powerful Persuasive Trigger"
        description: "Per Robert Cialdini conversation: metaphor is the most powerful persuasive trigger. Most useful when explaining complicated subjects by linking to known concepts."
        domains: ["copywriting", "persuasion", "rhetoric"]
        source: "AZCW"

      # === AZCW SUPPLEMENTARY PASS (7 philosophies) ===

      - id: "FIL-TB-052"
        name: "The Head Follows the Heart"
        description: "People make buying decisions from emotion first, then seek logical justification. The desire to buy stems from emotion, then they look for logical support. When logic is there they buy, when not a lot less buy."
        domains: ["copywriting", "persuasion", "buyer-psychology"]
        source: "AZCW"

      - id: "FIL-TB-053"
        name: "Research Is Where the Gold Is"
        description: "The gold is elsewhere and we're just prospectors who know what gold looks like. Examination is the LEAST enjoyable but MOST valuable part. The best copywriters were all research fiends — majority of time in research, not writing."
        domains: ["copywriting", "research", "process"]
        source: "AZCW"

      - id: "FIL-TB-054"
        name: "Think Like a Prosecutor, Not a Salesperson"
        description: "Present an airtight emotional AND logical case that leads the jury to ONE single conclusion. Everything done serves strategic purpose — nothing is meandering. Inch by inch, brick by brick."
        domains: ["copywriting", "campaign-structure", "persuasion"]
        source: "AZCW"

      - id: "FIL-TB-055"
        name: "Never Sell Commodities — Sell Proprietary Solutions"
        description: "We're never marketing a solution that can be viewed as a commodity. The unique mechanism must be unavailable elsewhere. A commodity triggers the Google Slap — prospect pauses, searches alternatives."
        domains: ["copywriting", "positioning", "unique-mechanism"]
        source: "AZCW"

      - id: "FIL-TB-056"
        name: "Education-Based Marketing"
        description: "Marketing that is education-based. Education that serves a marketing role. Under the guise of teaching, sales resistance drops because you're not pitching a product. 75% of campaign = educating on mechanism superiority."
        domains: ["copywriting", "campaign-structure", "persuasion"]
        source: "AZCW"

      - id: "FIL-TB-057"
        name: "Ideas Are Connections, Not Discoveries"
        description: "The Bible says nothing new under the sun. We don't create — we bring together in new and different combinations. Ideas come from Input + Connections. James Webb Young: 'A Technique for Producing Ideas.'"
        domains: ["copywriting", "hooks", "creative-process"]
        source: "AZCW"

      - id: "FIL-TB-058"
        name: "Never Appear Needy in Copy"
        description: "Zig Ziglar: 'Whether you buy or not, I'm having filet mignon tonight.' The attitude is leading, not pushing. 'I'd rather not take your money if it's not right for you.' Neediness repels prospects."
        domains: ["copywriting", "tone", "persuasion"]
        source: "AZCW"

      # --- CLLR (Copy Legends Lock-In Recordings) ---

      - id: "FIL-TB-059"
        name: "Research is About Finding What's UNIQUE to Say"
        description: "Kim Schwalm: Fight the 'Curse of Sameness' in all areas of copy. Research isn't just finding what works — it's finding what you can say that nobody else is saying. Unique proof points, unique angles, unique claims. The non-glamorous digging is what separates great copy."
        domains: ["research", "copywriting", "differentiation"]
        source: "CLLR"

      - id: "FIL-TB-060"
        name: "Believability is as Important as Audacity of Promise"
        description: "Jon Benson: Dream Life + Believability — you need BOTH. One without the other is a loser. Too many marketers focus exclusively on making promises bigger and lose sight of believability. More audacious the promise, more work needed on believability. Better a believable smaller promise than an unbelievable bigger one."
        domains: ["copywriting", "promises", "believability"]
        source: "CLLR"

      - id: "FIL-TB-061"
        name: "Deep Empathy is the Root of All Effective Copy"
        description: "Chris Haddad (with passionate agreement from multiple legends): Get into the mind of the prospect, see the world through their eyes, experience the emotions they have based on their current situation. Empathy, not shock. Shock stories without empathy hit a ceiling quickly. The opening story must serve strategic purpose AND be congruent with the narrative."
        domains: ["copywriting", "empathy", "storytelling"]
        source: "CLLR"

      - id: "FIL-TB-062"
        name: "Big Ideas and Hooks Have a Lifespan"
        description: "Dan Ferrari: All big marketing ideas, hooks, and copy angles have a lifespan. What worked extremely well a year ago may not work at all today. The famous John Carlton 'one-legged golfer' headline would no longer work. Sophisticated markets require more diagnostic, education-based copy."
        domains: ["copywriting", "big-ideas", "market-sophistication"]
        source: "CLLR"

      - id: "FIL-TB-063"
        name: "How You Bring Customers In = How They Behave"
        description: "Justin Goff: How you acquire customers is how they'll behave going forward. Discounting on the front-end produces discount-oriented buyers. Not a big advocate of front-end discounting for this reason."
        domains: ["customer-acquisition", "pricing", "buyer-behavior"]
        source: "CLLR"

      - id: "FIL-TB-064"
        name: "Front-End Should Contain Absolute Best Stuff"
        description: "Rich Schefren: Front-end products should contain our absolute best material. Goal of front-end is not only new customer acquisition — it's also acquiring new customers likely to ascend. This requires wowing them with the quality of the front-end product."
        domains: ["front-end", "customer-ascension", "product-quality"]
        source: "CLLR"

      - id: "FIL-TB-065"
        name: "Marketing First, Product Creation Second"
        description: "Todd/Tony: Smart entrepreneurs will not create the product until they've identified the root cause problem it's going to solve AND the Unique Mechanism. The product should be built around those two. In supplements: identify root cause → identify needed formulation (mechanism) → THEN create supplement."
        domains: ["product-creation", "unique-mechanism", "marketing-strategy"]
        source: "CLLR"

      - id: "FIL-TB-066"
        name: "A True Big Idea Has a Time and Life Span"
        description: "Stefan Georgi (via Mark Ford): Big Ideas are about bigger societal issues, more important and impactful (e.g. 'End of America'). They must be timely and relevant — they exist within a certain time. Paradigm-shifting: either based on something people already believe is happening OR something they want to believe is possible (e.g. 'The Four-Hour Work Week')."
        domains: ["big-ideas", "market-timing", "paradigm-shift"]
        source: "CLLR"

      - id: "FIL-TB-067"
        name: "Compress Promise for Believability If Needed"
        description: "Peter Kell: The main reason prospects don't buy is they don't believe the Unique Mechanism will work for them. Better compressing your primary promise if that's what it takes to make it believable. A believable smaller promise beats an unbelievable bigger promise every time."
        domains: ["promises", "believability", "conversion"]
        source: "CLLR"

      - id: "FIL-TB-068"
        name: "Most Copy is Playing Too Small"
        description: "Rob Martel: The #1 problem in copy that crosses his desk: ideas aren't big enough, promises aren't compelling enough, gimmicks aren't gimmicky enough. The copy is playing too small. Think bigger."
        domains: ["copywriting", "big-ideas", "ambition"]
        source: "CLLR"

# ═══════════════════════════════════════════════════════════════════════════════
      - id: "FIL-TB-069"
        name: "We Never Present a Commoditized Mechanism"
        description: "Every product/service that produces a result has a mechanism. We only present UNIQUE mechanisms — never ordinary/commoditized ones that prospects can find elsewhere."
        domains: ["unique-mechanism", "product-differentiation", "marketing-strategy"]
        source: "UMW"

      - id: "FIL-TB-070"
        name: "All Roads Lead to You"
        description: "Marketing should create a situation where the only way to get the solution is through you. A unique mechanism ensures Google searches lead back to YOUR offer."
        domains: ["unique-mechanism", "competitive-positioning", "demand-creation"]
        source: "UMW"

      - id: "FIL-TB-071"
        name: "Different Is Better Than Better for Attention"
        description: "When it comes to getting attention, different is better than better. Different gets attention; better produces conversion. You need both, in that order."
        domains: ["marketing-philosophy", "differentiation", "attention"]
        source: "UMW"

      - id: "FIL-TB-072"
        name: "Education Is the New Selling"
        description: "The shift from pitching products to educating prospects on mechanisms. We don't sell anything — we educate on the value of our mechanism."
        domains: ["education-based-marketing", "marketing-philosophy", "unique-mechanism"]
        source: "UMW"

      - id: "FIL-TB-073"
        name: "Hope Is the Most Powerful Motivator in Marketing"
        description: "A unique mechanism gives prospects renewed hope. The more they've tried and failed, the more a genuinely NEW approach re-introduces willingness to try again."
        domains: ["prospect-psychology", "unique-mechanism", "marketing-philosophy"]
        source: "UMW"

      - id: "FIL-TB-074"
        name: "People Don't Buy a Product, They Buy a Mechanism"
        description: "Prospects buy the WAY in which the product works, not the product itself. The mechanism is what creates the buying desire."
        domains: ["buyer-psychology", "unique-mechanism", "offer-creation"]
        source: "UMW"

      - id: "FIL-TB-075"
        name: "Unique Applies to Prospects, Not Competitors"
        description: "If competitors are doing it but not talking about it, it's still unique to prospects. Uniqueness is relative to prospect awareness, not industry reality."
        domains: ["unique-mechanism", "market-positioning", "differentiation"]
        source: "UMW"

      - id: "FIL-TB-076"
        name: "Taking the Ordinary and Turning It Into the Extraordinary"
        description: "Transubstantiation principle from Bill Bonner/Agora: taking a common method and reframing it as a named, proprietary process. The most common way mechanisms are created."
        domains: ["unique-mechanism", "transubstantiation", "naming-strategy"]
        source: "UMW"

      - id: "FIL-TB-077"
        name: "Everything That Has a Name, Somebody Named It"
        description: "Every named mechanism was simply identified and named by someone. What they did is no different than what you can do. You HAVE a unique mechanism — you just don't realize it."
        domains: ["unique-mechanism", "naming-strategy", "entrepreneurship"]
        source: "UMW"

      - id: "FIL-TB-078"
        name: "Understanding How Your Mechanism Works Is Far More Important Than the Name"
        description: "The name is the least important part. Understanding how your method works and why it produces results is where the magic happens."
        domains: ["unique-mechanism", "mechanism-interrogation", "substance-over-form"]
        source: "UMW"

      - id: "FIL-TB-079"
        name: "The Mechanism Is the Star of the Campaign, Not the Product"
        description: "The mechanism gets introduced, teased, and proved BEFORE the offer. It's the centerpiece of every marketing campaign."
        domains: ["campaign-architecture", "unique-mechanism", "E5-method"]
        source: "UMW"

      - id: "FIL-TB-080"
        name: "Marketing Is NOT Selling"
        description: "Marketing = educating on why your mechanism is different and better. Selling = pitching product features and benefits. Whoever educates most effectively wins."
        domains: ["marketing-philosophy", "education-based-marketing", "unique-mechanism"]
        source: "UMW"

      - id: "FIL-TB-081"
        name: "Credibility Does Not Equal Superiority"
        description: "Someone's length of time or credentials does NOT mean their method is better. The method itself must prove its superiority independently of credentials."
        domains: ["competitive-positioning", "proof", "marketing-philosophy"]
        source: "UMW"

      - id: "FIL-TB-082"
        name: "Celebrity Status Is Much More Valuable Than Expert Status"
        description: "Celebrities make far more money than experts. Celebrity status yields more revenue, influence, and longevity than mere authority/expertise positioning."
        domains: ["celebrity-positioning", "personal-branding", "pricing-psychology"]
        source: "UMW"

      - id: "FIL-TB-083"
        name: "Engineered Celebrity Is Intentional, Not Organic"
        description: "This is intentionally done, strategically orchestrated. You've got to start the wave — you can't wait for the wave and then ride it."
        domains: ["celebrity-positioning", "personal-branding", "marketplace-positioning"]
        source: "UMW"

      - id: "FIL-TB-084"
        name: "Your Marketplace Will Repeat What You Say"
        description: "Whatever you want them to think about you, say it first. Don't wait for people to say nice things — say them about yourself first, then the market repeats."
        domains: ["personal-branding", "self-aggrandizement", "positioning"]
        source: "UMW"

      - id: "FIL-TB-085"
        name: "People Buy People First"
        description: "In the expert space, they buy into YOU before they buy the product. Trust online is at an all-time low, making authenticity critical."
        domains: ["personal-branding", "trust", "buyer-psychology"]
        source: "UMW"

      - id: "FIL-TB-086"
        name: "People Buy Into People About Things Bigger Than Themselves"
        description: "You need a mission beyond money. People are drawn to those who stand for something larger — a movement, a cause, a genuine purpose."
        domains: ["personal-branding", "mission", "marketplace-positioning"]
        source: "UMW"

      - id: "FIL-TB-087"
        name: "Don't Try to Be Somebody Else"
        description: "Authenticity is more valuable than polish. Blow it up, don't tone it down. Your unique personality is an asset, not a liability."
        domains: ["authenticity", "personal-branding", "voice"]
        source: "UMW"

      - id: "FIL-TB-088"
        name: "A Unique Mechanism Creates Demand for YOUR Offer Before You Present It"
        description: "By educating on the unique mechanism, you pre-sell the prospect. They want the mechanism, and the offer is the only place to get it."
        domains: ["unique-mechanism", "demand-creation", "pre-selling"]
        source: "UMW"

      - id: "FIL-TB-089"
        name: "Differentiation Through Experience Alone Is No Longer Effective"
        description: "Credentials, history, track record — none of these differentiate effectively anymore. Today you HAVE to have something different to SAY, not just a different resume."
        domains: ["differentiation", "market-sophistication", "competitive-positioning"]
        source: "UMW"

      - id: "FIL-TB-090"
        name: "USPs Are Rare; Unique Mechanisms Are Easily Identified"
        description: "USPs are typically associated with truly disruptive innovations. The overwhelming majority of products don't have a USP — but EVERY product has a mechanism that can be made unique."
        domains: ["unique-mechanism", "USP", "product-differentiation"]
        source: "UMW"

      - id: "FIL-TB-091"
        name: "Nobody Has Ever Bought a Funnel Model"
        description: "They buy the MESSAGE underneath. The funnel is a delivery vehicle; the mechanism within the message is what creates the purchase."
        domains: ["funnel-strategy", "unique-mechanism", "marketing-philosophy"]
        source: "UMW"

      - id: "FIL-TB-092"
        name: "The Campaign Thesis Is the Single Most Important Sentence"
        description: "The campaign thesis establishes the buying belief. Format: 'The [SUPERIOR] way to [PRIMARY PROMISE] is with [UNIQUE MECHANISM].' Everything else supports this sentence."
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "FIL-TB-093"
        name: "Let Them Into Your Personal World"
        description: "The feeling of a relationship drives sales. Share bits about yourself — if your audience knows more about a TV character than about you, you're not revealing enough."
        domains: ["personal-branding", "connection", "authenticity"]
        source: "UMW"

      # ── YWO: Your Winning Offer (FIL-TB-094 → FIL-TB-113) ──

      - id: "FIL-TB-094"
        name: "Marketing Is the Art of Meaningful Differentiation"
        description: "Marketing today, more so than ever before, is the art of meaningful differentiation. Meaningfully differentiating your product, ultimately your offer, from competitors."
        domains: ["marketing-philosophy", "differentiation", "offer-creation"]
        source: "YWO"

      - id: "FIL-TB-095"
        name: "Differentiation Is Not Discretionary"
        description: "Per Theodore Levitt (Harvard): differentiation is one of the most important strategic and tactical activities which companies must constantly engage in. It's not optional — it is mandatory."
        domains: ["differentiation", "marketing-philosophy", "competitive-strategy"]
        source: "YWO"

      - id: "FIL-TB-096"
        name: "Just Having a Funnel Is No Longer Enough"
        description: "There was a time when having an opt-in page, a sales page, upsells made you stand out. Today, anybody doing anything remotely well has a marketing funnel. You need something different."
        domains: ["marketing-philosophy", "market-saturation", "differentiation"]
        source: "YWO"

      - id: "FIL-TB-097"
        name: "An Offer Is Not a Product Plus a Bonus"
        description: "A winning offer is far more than bundling a product with bonuses. It is an engineered proposition that is Superior, Irresistible, and Noteworthy — a strategic construct, not a stack of deliverables."
        domains: ["offer-creation", "marketing-philosophy", "value-engineering"]
        source: "YWO"

      - id: "FIL-TB-098"
        name: "Examine Competitors to Know What NOT to Say"
        description: "Most of why we examine competitors is NOT to funnel hack or copy or model. It is to see what competitors are saying so we know what NOT to say. Differentiation is critical."
        domains: ["competitive-analysis", "differentiation", "anti-commoditization"]
        source: "YWO"

      - id: "FIL-TB-099"
        name: "Go the Distance with Naming and Framing"
        description: "How you name and frame deliverables changes perception. A book that sold poorly with one title sold well with another — nothing else changed. There is enormous value in naming and framing."
        domains: ["offer-creation", "naming-strategy", "perception-management"]
        source: "YWO"

      - id: "FIL-TB-100"
        name: "Every Deliverable Must Justify Its Existence"
        description: "Every component of your offer must have a clear benefit case — why it's there, what it does for the prospect, how it moves them toward the outcome. No filler, no dead weight."
        domains: ["offer-creation", "value-engineering", "deliverable-design"]
        source: "YWO"

      - id: "FIL-TB-101"
        name: "Price Is a Perception Game"
        description: "The price itself is less important than how it is positioned and presented. Anchoring, framing, and sequencing of price presentation determine whether prospects perceive value or cost."
        domains: ["pricing-psychology", "offer-creation", "perception-management"]
        source: "YWO"

      - id: "FIL-TB-102"
        name: "Anchoring Determines Value Perception"
        description: "When you anchor the value high before revealing the price, the price feels like a bargain. Without anchoring, even a fair price feels expensive."
        domains: ["pricing-psychology", "anchoring", "sales-presentation"]
        source: "YWO"

      - id: "FIL-TB-103"
        name: "The Winning Offer Is Your Single Most Valuable Asset"
        description: "By far the single most valuable thing you can master right now. Because of market saturation, vast new funnels, garbage copy from AI — a winning offer gives you a monster competitive advantage."
        domains: ["offer-creation", "competitive-advantage", "marketing-philosophy"]
        source: "YWO"

      - id: "FIL-TB-104"
        name: "Premiums Must Enhance Not Just Add"
        description: "Premiums and bonuses must strategically enhance the perceived value and complement the core offer. Adding bulk is not adding value — each premium needs to solve an adjacent problem."
        domains: ["offer-creation", "premium-engineering", "value-perception"]
        source: "YWO"

      - id: "FIL-TB-105"
        name: "Presentation Changes Everything"
        description: "The same offer presented differently converts at wildly different rates. How you present — the sequence, the naming, the framing, the visuals — is as important as what you're presenting."
        domains: ["sales-presentation", "offer-creation", "conversion-optimization"]
        source: "YWO"

      - id: "FIL-TB-106"
        name: "Market Saturation Makes Differentiation Non-Negotiable"
        description: "Market saturation in many niches, vast amount of new funnels, dead-easy publishing — all of this means differentiation through your offer is no longer nice-to-have, it's survival."
        domains: ["market-saturation", "differentiation", "competitive-strategy"]
        source: "YWO"

      - id: "FIL-TB-107"
        name: "Funnel Hacking Is the Wrong Approach"
        description: "I'm not a believer in funnel hacking. I love Russell, he's a good friend, great marketer. But I'm not a believer in funnel hacking. Differentiation, not imitation, wins."
        domains: ["competitive-strategy", "differentiation", "anti-commoditization"]
        source: "YWO"

      - id: "FIL-TB-108"
        name: "The Prospect's Attractive Panacea Drives Everything"
        description: "What the prospect sees as the ideal, dream solution — the attractive panacea — is what your offer must align with. Your offer must feel like THAT specific solution to THEIR specific problem."
        domains: ["offer-creation", "prospect-psychology", "solution-framing"]
        source: "YWO"

      - id: "FIL-TB-109"
        name: "One Campaign Can Acquire Customers Daily for Months"
        description: "The E5 method shows you how to set up ONE campaign that acquires new customers every single day like clockwork, for months and months, regardless of niche or price point."
        domains: ["customer-acquisition", "campaign-architecture", "scalability"]
        source: "YWO"

      - id: "FIL-TB-110"
        name: "SIN Proposition Is the Offer's Identity"
        description: "Your offer must be Superior (better mechanism), Irresistible (value exceeds price dramatically), and Noteworthy (worthy of attention and conversation). SIN is the acid test."
        domains: ["offer-creation", "differentiation", "value-engineering"]
        source: "YWO"

      - id: "FIL-TB-111"
        name: "Your Offer Must Create a No-Brainer Decision"
        description: "A winning offer should make the buying decision feel obvious, stupid-easy. When the perceived value so far exceeds the price, resistance evaporates."
        domains: ["offer-creation", "pricing-psychology", "conversion-optimization"]
        source: "YWO"

      - id: "FIL-TB-112"
        name: "Worksheets Transform Learning into Implementation"
        description: "Worksheets make implementation a no-brainer — they translate learning into action, into production, into results. They are implementation accelerators, not just deliverables."
        domains: ["offer-creation", "deliverable-design", "implementation"]
        source: "YWO"

      - id: "FIL-TB-113"
        name: "Competitive Differentiation Is Anti-Commoditization"
        description: "The moment your offer looks like everyone else's, you're commoditized. Commoditization kills margins, kills attention, kills desire. Differentiation is the antidote."
        domains: ["differentiation", "anti-commoditization", "marketing-philosophy"]
        source: "YWO"

# LAYER 2: MENTAL MODELS (113 items)

      - id: "HEUR-TB-059"
        name: "Long-Form Sales Letter as VSL Exit Redirect"
        description: "VSL exits redirect to long-form sales letter version: 90%+ word-for-word VSL script with subheads and minimal graphics. Always write full script for VSLs."
        domains: ["copywriting", "funnel-architecture", "conversion-optimization"]
        source: "SFFF-UPSELLS"

      - id: "HEUR-TB-060"
        name: "House List Pre-Sell: 2-3 Broadcast Emails Before New Offer"
        description: "Before new product rollout, send 2-3 emails building anticipation. Ask for click if interested. Send launch sequence only to interested prospects."
        domains: ["list-management", "product-launch", "email-marketing"]
        source: "SFFF-UPSELLS"

      # === A-Z COPYWRITING WORKSHOP (AZCW) — 30 new heuristics ===

      - id: "HEUR-TB-061"
        name: "Flesch-Kincaid Readability Score Must Be Below 8"
        description: "Copy should read at 8th grade level or below. Simple words, short choppy sentences, short paragraphs. Write like you talk."
        domains: ["copywriting", "writing-craft", "readability"]
        source: "AZCW"

      - id: "HEUR-TB-062"
        name: "Replace Adverbs with Better Singular Verbs"
        description: "Slowly walk → Strut. Gently touch → Caress. Loudly yell → Scream. Vigorously push → Shove. One strong verb beats adverb + weak verb."
        domains: ["copywriting", "word-choice", "writing-craft"]
        source: "AZCW"

      - id: "HEUR-TB-063"
        name: "Use Present-Tense Verbs Over Past-Tense"
        description: "Grew → Growing. Scaled → Scaling. Drove → Driving. Present tense conveys that results are happening NOW, which prospects want."
        domains: ["copywriting", "word-choice", "tense"]
        source: "AZCW"

      - id: "HEUR-TB-064"
        name: "Replace 'If' with 'When' in Statements"
        description: "'If you're struggling' implies maybe. 'When you're struggling' presupposes the situation. 'When' is more persuasive than 'if.'"
        domains: ["copywriting", "language-patterns", "presupposition"]
        source: "AZCW"

      - id: "HEUR-TB-065"
        name: "Trim All Unnecessary Uses of the Word 'That'"
        description: "'He said that he was going' → 'He said he was going.' Replace 'that' with 'which' when possible: 'And that means' → 'Which means.'"
        domains: ["copywriting", "word-choice", "editing"]
        source: "AZCW"

      - id: "HEUR-TB-066"
        name: "'But' Negates What Was Said Prior"
        description: "'This is simple to use. But it's also powerful.' The 'but' undermines 'simple.' Use 'And' instead: 'This is simple to use. And it's also powerful.'"
        domains: ["copywriting", "word-choice", "language-patterns"]
        source: "AZCW"

      - id: "HEUR-TB-067"
        name: "Use Emotionally-Charged Words Over Neutral Ones"
        description: "Embarrass → Humiliate. Take → Swipe. Beat → Pummeled. Won → Dominated. Tired → Exhausted. Broke → Crushed. Stronger words trigger stronger emotions."
        domains: ["copywriting", "word-choice", "emotion"]
        source: "AZCW"

      - id: "HEUR-TB-068"
        name: "Only Use Adjectives When They Add More Information"
        description: "Avoid fluff adjectives: amazing, incredible, fantastic, superb, outstanding, extraordinary, awesome. Choose better singular adjectives. Really giving → Generous."
        domains: ["copywriting", "word-choice", "editing"]
        source: "AZCW"

      - id: "HEUR-TB-069"
        name: "Proof Power of 3 for Big Claims"
        description: "One is an event, two is a coincidence, three is a pattern. For big bold claims: 3 consecutive proof paragraphs. Strongest proof first (most ink), second half the length, third half again."
        domains: ["copywriting", "proof", "structure"]
        source: "AZCW"

      - id: "HEUR-TB-070"
        name: "Vary the Type of Proof Provided"
        description: "When providing 3 proof points, vary the type: test data, expert endorsement, personal testimonial. Different proof types feel more comprehensive than three of the same kind."
        domains: ["copywriting", "proof", "credibility"]
        source: "AZCW"

      - id: "HEUR-TB-071"
        name: "Story Leads Are Boom or Bust"
        description: "Story leads can be killer but are high risk. The prospect must see themselves in the story. Done correctly, it's more than a pattern interrupt."
        domains: ["copywriting", "leads", "storytelling"]
        source: "AZCW"

      - id: "HEUR-TB-072"
        name: "Problem-Solution Leads: Hit Problem, Agitate, Get to Solution Early"
        description: "Hit the problem, agitate the problem, then get to the solution as early as you can. The hope comes from the solution. Don't delay the solution too long."
        domains: ["copywriting", "leads", "structure"]
        source: "AZCW"

      - id: "HEUR-TB-073"
        name: "Start Stories in the Middle of the Action"
        description: "Don't start at the beginning. Drop the reader into the middle of what's happening. Avoid bald stories (just stating facts without sensory detail)."
        domains: ["copywriting", "storytelling", "engagement"]
        source: "AZCW"

      - id: "HEUR-TB-074"
        name: "Show, Don't Tell in Storytelling"
        description: "'John was mad' = telling. 'John kicked the door open and slammed his briefcase on the table' = showing. Incorporate dialogue with action beats."
        domains: ["copywriting", "storytelling", "writing-craft"]
        source: "AZCW"

      - id: "HEUR-TB-075"
        name: "Use Dirty Details in Stories"
        description: "Don't just say 'fixed dinner.' Say 'popped the Giorno's frozen pizza into the oven.' Don't say 'drove home.' Say 'sped down the highway in your convertible beamer.' Details create immersion."
        domains: ["copywriting", "storytelling", "sensory-detail"]
        source: "AZCW"

      - id: "HEUR-TB-076"
        name: "Only Write Copy for Hooks You Are Wildly Excited About"
        description: "If you're not wildly excited about the hook/idea, don't write copy for it. Excitement translates into energy in the copy. Mediocre excitement = mediocre copy."
        domains: ["copywriting", "hooks", "mindset"]
        source: "AZCW"

      - id: "HEUR-TB-077"
        name: "Spend Dedicated Thinking Time on Idea Generation Weekly"
        description: "Set aside time every week specifically for developing hooks and ideas. Hooks are developed, not discovered. Lots of ideas come from lots of input + connections."
        domains: ["copywriting", "hooks", "process"]
        source: "AZCW"

      - id: "HEUR-TB-078"
        name: "The Lead Must Set the Emotional Hook Before the Body Copy"
        description: "Lead objective: set the emotional hook. 'Wow, this sounds awesome. Now prove to me it works, and that it'll work for ME.' If you don't set the hook, the fish swims away."
        domains: ["copywriting", "leads", "engagement"]
        source: "AZCW"

      - id: "HEUR-TB-079"
        name: "Use Testimonials to Prove Specific Claims"
        description: "Most impactful testimonial placement: immediately after a claim you just made. A testimonial about the guarantee proves the guarantee works. Strategic placement > random placement."
        domains: ["copywriting", "proof", "testimonials"]
        source: "AZCW"

      - id: "HEUR-TB-080"
        name: "Use 'You/Yours/You Will' as Primary Pronouns"
        description: "Copy directed at 'you' (the reader) is always more engaging than 'we' or 'I' focused copy. The prospect is the hero of the story, not you."
        domains: ["copywriting", "word-choice", "engagement"]
        source: "AZCW"

      - id: "HEUR-TB-081"
        name: "Pluralize Verbs for Stronger Impact"
        description: "'Put music in your life' → 'Puts music in your life.' 'Burn ten pounds of fat' → 'Burns ten pounds of fat.' Pluralized (third-person) verbs feel more active and factual."
        domains: ["copywriting", "word-choice", "writing-craft"]
        source: "AZCW"

      - id: "HEUR-TB-082"
        name: "Framing Choice: Weak/Strong/Strong for Your Solution"
        description: "Present 3 options: Option 1 has weak advantage + strong disadvantages. Option 2 has strong advantage + strong disadvantages. Option 3 (yours) has weak disadvantage + strong advantages."
        domains: ["copywriting", "framing", "persuasion"]
        source: "AZCW"

      - id: "HEUR-TB-083"
        name: "Turn Damaging Admissions into Positives"
        description: "'This only does one thing. And that's because we wanted to focus on making it the best at that.' Combine takeaway + damaging admission for powerful authenticity."
        domains: ["copywriting", "tactics", "authenticity"]
        source: "AZCW"

      - id: "HEUR-TB-084"
        name: "State Guarantees in the Affirmative"
        description: "'You're either head-over-heels thrilled with the results, or just return within 60 days for a full refund.' Frame positively, not as 'if you're dissatisfied.'"
        domains: ["copywriting", "guarantees", "framing"]
        source: "AZCW"

      - id: "HEUR-TB-085"
        name: "Use Universal Picture Painting Instead of Brand-Specific"
        description: "Instead of 'MacBook + Gmail,' use 'your computer + your favorite morning beverage + your sales stats.' Universal details let more prospects see themselves in the picture."
        domains: ["copywriting", "future-pacing", "inclusivity"]
        source: "AZCW"

      - id: "HEUR-TB-086"
        name: "Agreement Sequencing: Get 2-3 Mental 'Yes' Before the Ask"
        description: "Drive the prospect to mentally say 'Yes' 2-3 times with obvious questions, then present the action you want. 'Do you want X? Do you want Y? Then doing Z is smart.'"
        domains: ["copywriting", "language-patterns", "persuasion"]
        source: "AZCW"

      - id: "HEUR-TB-087"
        name: "Avoid Clear Pronoun Ambiguity in Sentences"
        description: "'Tom got to John's house. And he was pissed.' — who is 'he'? Repeat the proper noun: 'And John was pissed.' Clarity always beats economy."
        domains: ["copywriting", "sentence-structure", "clarity"]
        source: "AZCW"

      - id: "HEUR-TB-088"
        name: "Use Loaded Language Deliberately"
        description: "Words carry secondary evaluative meanings. 'Benefits were slashed' vs 'reduced.' 'Vaccine' vs 'medical procedure.' Choose words that carry the emotional weight you want."
        domains: ["copywriting", "word-choice", "framing"]
        source: "AZCW"

      - id: "HEUR-TB-089"
        name: "Focus on Symptoms, Not Root Problems in Copy"
        description: "Most prospects think the symptoms ARE the problem. They're not aware of the underlying root cause. Focus on symptoms/pain the prospect actually feels, not the academic root cause."
        domains: ["copywriting", "research", "buyer-psychology"]
        source: "AZCW"

      - id: "HEUR-TB-090"
        name: "If Campaign Hits KPI, Stop Optimizing and Let It Run"
        description: "Once a campaign meets your KPIs (e.g., break-even acquisition), stop trying to optimize. Let it roll and scale. Create new back-end offers instead of endlessly tweaking the front."
        domains: ["copywriting", "campaigns", "optimization"]
        source: "AZCW"

      # === AZCW SUPPLEMENTARY PASS (10 heuristics) ===

      - id: "HEUR-TB-091"
        name: "80% of Response Is Determined by the Lead"
        description: "The lead — headline, deck copy, and first 350-500 words — determines 80% of campaign response. If the lead fails, prospects never reach the offer. Make or break."
        domains: ["copywriting", "leads", "campaign-structure"]
        source: "AZCW"

      - id: "HEUR-TB-092"
        name: "Credibility Chunk = Just Enough"
        description: "Just answer 'why should I listen to you.' If you can do that in two sentences, that's all it takes. Don't over-credentialize. Set emotional hook BEFORE credentials."
        domains: ["copywriting", "credibility", "structure"]
        source: "AZCW"

      - id: "HEUR-TB-093"
        name: "Don't Introduce Yourself First in Front-End Copy"
        description: "They don't care who you are until they know what this is going to do for them. Set the emotional hook first, credentialize second. Hook → Credentials → Argument."
        domains: ["copywriting", "leads", "structure"]
        source: "AZCW"

      - id: "HEUR-TB-094"
        name: "One Subhead Per Page Minimum"
        description: "At 13-14pt font in Google Doc, at least one subhead on every page. Never let readers see endless paragraphs — intimidating. Break paragraphs exceeding 5 lines. Max 3 lines per paragraph."
        domains: ["copywriting", "formatting", "readability"]
        source: "AZCW"

      - id: "HEUR-TB-095"
        name: "Skeleton Order Form First"
        description: "Strip everything off the order form: product, price, fields only. No testimonials, no seals, no extra copy. Once they clicked buy, it's your sale to lose. More elements = more things that can talk them OUT. Test 4-5 iterations."
        domains: ["conversion-optimization", "order-forms", "testing"]
        source: "AZCW"

      - id: "HEUR-TB-096"
        name: "Write Dozens of Headlines, Not Three"
        description: "Legends of copy wrote 100+ headlines per campaign. The lazy marketer writes three and picks the best. Push yourself. More options = better selection. The headline IS 80% of the campaign."
        domains: ["copywriting", "headlines", "process"]
        source: "AZCW"

      - id: "HEUR-TB-097"
        name: "Flip It: Start with Proof, Find the Idea"
        description: "90% of marketers start with an idea and look for proof. Sometimes flip it — start with a monster proof point and develop the idea around it. Ideas are unlimited; proof points aren't."
        domains: ["copywriting", "hooks", "proof"]
        source: "AZCW"

      - id: "HEUR-TB-098"
        name: "Two Mediocre Ideas Combined = One Weak Idea"
        description: "When a hook isn't strong, marketers bring in additional ideas to bolster it. This weakens, not strengthens. Example: 'Build SaaS without developers AND increase success rate from 8% to 70%' — two mediocre ideas, one weak hook."
        domains: ["copywriting", "hooks", "discipline"]
        source: "AZCW"

      - id: "HEUR-TB-099"
        name: "Test Wildly Different, Not Slightly Different"
        description: "If a lead/campaign doesn't work, don't make slight adjustments. Change the ENTIRE approach — different theme, emotion, hook. You're never going to turn a dud into a home run with small tweaks. Mark Ford: 'Test things that scream, not whisper.'"
        domains: ["copywriting", "testing", "campaigns"]
        source: "AZCW"

      - id: "HEUR-TB-100"
        name: "Never Describe Your Mechanism as a Commodity"
        description: "WRONG: 'This is a virtual event' / 'This is a marketing funnel.' RIGHT: 'This unique TYPE of virtual event' / 'This new approach to...' Always preface with qualifiers that plant seeds of curiosity and prevent categorization."
        domains: ["copywriting", "positioning", "unique-mechanism"]
        source: "AZCW"

      # --- CLLR (Copy Legends Lock-In Recordings) ---

      - id: "HEUR-TB-101"
        name: "Dream Life + Believability = Both Required"
        description: "Jon Benson: The promised payoff has to be big enough to get prospect excited ('the juice is worth the squeeze') BUT also believable. One without the other is a loser. The more audacious the promise, the more work needed on believability."
        domains: ["copywriting", "promises", "believability"]
        source: "CLLR"

      - id: "HEUR-TB-102"
        name: "Default Lead: Visual Pattern Interrupt"
        description: "Kyle/Kim: When lacking other approaches or ideas, the default lead is the standard Visual Pattern Interrupt — 'Take a look at this picture...' Stefan Georgi adds: memes are having great success as attention grabbers right in the lead."
        domains: ["copywriting", "leads", "attention"]
        source: "CLLR"

      - id: "HEUR-TB-103"
        name: "Spy Tools Research: Study Top, Reverse-Engineer Winners"
        description: "Peter Kell: Go to AdSpy (Facebook), PPI (TikTok), YouTube leaderboards. Goal is to be at the top of the spy tools. Study: proven promise, big idea, unique mechanism, storyline. 'My ultimate goal is to be better than that guy at the top.'"
        domains: ["research", "competitive-analysis", "campaign-strategy"]
        source: "CLLR"

      - id: "HEUR-TB-104"
        name: "'What Almost Made You Not Buy?' — Thank You Page Survey"
        description: "Matt Stafford (via Rich Schefren): One question on the thank you page that delivers amazing results. Donnie French: Used it to resurrect dying VSLs. Found they were over-teasing mechanism name. Implemented changes, kept offers running much longer. Dan Ferrari uses it routinely to optimize front-end."
        domains: ["research", "surveys", "conversion-optimization"]
        source: "CLLR"

      - id: "HEUR-TB-105"
        name: "5 Headline Variations to Test"
        description: "David Deutsch: Test five different appeals/angles/ideas for each headline: (1) Overarching benefit headline, (2) Story headline, (3) More specific headline, (4) Three-word Sugarman-style headline, (5) Something from left field. Let data determine the winner."
        domains: ["copywriting", "testing", "headlines"]
        source: "CLLR"

      - id: "HEUR-TB-106"
        name: "T Testing: Horizontal Then Vertical"
        description: "David Fagan: Horizontal = test a variety of ideas, let data determine winner. Vertical = take winning idea, test variations of it (e.g. headline copy variations). Go wide first, then go deep on what works."
        domains: ["testing", "optimization", "campaign-strategy"]
        source: "CLLR"

      - id: "HEUR-TB-107"
        name: "Remove Mechanism Name Tease — Use Caveman Language Instead"
        description: "Donnie French: Was repeating 'five minute simple strike sequence' throughout VSL. Removed all mechanism name teasing, replaced with 'this technique', 'this drill', 'this thing'. Result: conversion rate UP, stick rate UP, LTV after 4 months UP. 'Caveman language actually drives more curiosity.'"
        domains: ["VSL", "unique-mechanism", "copywriting"]
        source: "CLLR"

      - id: "HEUR-TB-108"
        name: "Mobile-First Page Design, Not Variations"
        description: "Rich Schefren: Start with mobile page, then develop desktop since mobile is the primary platform from paid media. These are NOT variations — they are custom pages specific for the platform. Mobile is often reduced, sometimes containing far less copy."
        domains: ["page-layout", "conversion-optimization", "mobile"]
        source: "CLLR"

      - id: "HEUR-TB-109"
        name: "VSL-Hybrid: Headline + Subheadline BELOW the VSL"
        description: "Donnie French: Having great success with VSL-hybrid pages where headline and sub-headline are BELOW the VSL. Used Hot Jar to see flow and order prospects consume content. Found this was the natural order. Tested with fantastic results."
        domains: ["VSL", "page-layout", "conversion-optimization"]
        source: "CLLR"

      - id: "HEUR-TB-110"
        name: "Name Root Cause / Mechanism with Two Known Words"
        description: "Jon Benson: Form a new phrase using two words already known by the prospect to name the root cause problem or Unique Mechanism. Examples: 'Leptin Resistance', 'Muscle Confusion' (P90X). Individually known words, but the combination creates something new."
        domains: ["unique-mechanism", "naming", "copywriting"]
        source: "CLLR"

      - id: "HEUR-TB-111"
        name: "AI for Deeper Competitive Research"
        description: "Stefan/SW: Input all competitive research (benefits, promise, mechanism) into AI, then ask it to reveal what's not stated but implied about the benefits, problems, promise. Gives deeper understanding of what's happening on a level below the surface of the copy."
        domains: ["research", "AI", "competitive-analysis"]
        source: "CLLR"

      - id: "HEUR-TB-112"
        name: "9-Word Email Survey + AI Analysis → 38 Content Topics"
        description: "Kevin Rogers: Send 9-word email survey to list, get 80-100+ responses. Input ALL responses into ChatGPT. Ask for theme analysis → narrowed from 150 to 38 unique topics. Then ask for most passionate words, emotional responses, email ideas per topic. 'It becomes your fun little buddy.'"
        domains: ["research", "email-marketing", "AI"]
        source: "CLLR"

      - id: "HEUR-TB-113"
        name: "Opening Story Must Be Congruent with Narrative"
        description: "Chris Haddad: Opening story should serve strategic purpose (grab attention), but it MUST be congruent with the rest of the narrative/message. Using a shock story for shock's sake is foolish if not connected to what comes next. Must naturally connect."
        domains: ["storytelling", "copywriting", "VSL"]
        source: "CLLR"

      - id: "HEUR-TB-114"
        name: "Unique Mechanism Campaigns More Evergreen Than Big Idea Campaigns"
        description: "Donnie/Dan Ferrari: Unique Mechanisms can have staying power in a market long-term, whereas Big Marketing Ideas all have an expiration at some point. Build around UM for longevity."
        domains: ["unique-mechanism", "big-ideas", "campaign-strategy"]
        source: "CLLR"

      - id: "HEUR-TB-115"
        name: "Dynamic Upsell Pricing: Higher Front-End = Higher Upsell"
        description: "Donnie French: When someone takes a higher-priced front-end option, present them with a higher-priced upsell. Price-anchoring from the front-end purchase carries through the funnel."
        domains: ["upsells", "pricing", "conversion-optimization"]
        source: "CLLR"

      - id: "HEUR-TB-116"
        name: "Taste vs Tease in Ads: Lead with Best Stuff"
        description: "Rich Schefren: Starting with a valuable nugget right away ('taste'). Donnie French confirms: After spending tens of millions in testing, YouTube ads based on taste far outperform tease. Take the most valuable thing you're going to say and lead with it in the ad."
        domains: ["ad-copy", "YouTube", "lead-generation"]
        source: "CLLR"

      - id: "HEUR-TB-117"
        name: "Full-Length VSLs as Ads → Advertorial"
        description: "Peter Kell: Runs full-length VSLs as ads on social media, then sends to advertorial. 'They're killing it with this approach.' Unconventional but proven at scale."
        domains: ["ad-copy", "VSL", "campaign-strategy"]
        source: "CLLR"

      - id: "HEUR-TB-118"
        name: "Survey Response Length = Passion Level"
        description: "John/Jon: When analyzing survey data, length of response indicates passion/interest. One-word responses mean low engagement. Paragraph responses mean that topic deeply resonates. Use response length as a signal for what to focus on."
        domains: ["research", "surveys", "buyer-psychology"]
        source: "CLLR"

# ═══════════════════════════════════════════════════════════════════════════════
      - id: "HEUR-TB-119"
        name: "Google Test for Commoditized Mechanism"
        description: "If a prospect can Google your mechanism and find alternatives, you have a commoditized mechanism. All search results should lead back to YOU."
        domains: ["unique-mechanism", "competitive-positioning", "differentiation"]
        source: "UMW"

      - id: "HEUR-TB-120"
        name: "More Sophisticated Market = More Mechanism Detail Required"
        description: "Unsophisticated markets respond to promise alone. Sophisticated markets need unique mechanism + expanded proof. Match mechanism depth to market sophistication level."
        domains: ["market-sophistication", "unique-mechanism", "campaign-strategy"]
        source: "UMW"

      - id: "HEUR-TB-121"
        name: "No Prospect Wants to Hear 'My Version of What You Already Tried'"
        description: "They want something NEW. If your messaging sounds like a variation of what they've already seen, you've lost before you started."
        domains: ["messaging", "unique-mechanism", "prospect-psychology"]
        source: "UMW"

      - id: "HEUR-TB-122"
        name: "People with More Money Are More Sophisticated/Skeptical"
        description: "Higher-income prospects have seen more marketing, tried more solutions. They need more mechanism proof and differentiation to convert."
        domains: ["buyer-psychology", "market-sophistication", "pricing"]
        source: "UMW"

      - id: "HEUR-TB-123"
        name: "Mechanism Type Priority: Existing > Unspoken > Transubstantiated > Metaphorical"
        description: "Always check in order: Do I have genuinely different process? Unspoken aspect? Can I transubstantiate? Need metaphorical? Use the highest-authenticity type available."
        domains: ["unique-mechanism", "mechanism-classification", "strategy"]
        source: "UMW"

      - id: "HEUR-TB-124"
        name: "If Competitors Do It But Don't Talk About It, Talk About It First"
        description: "Schlitz principle: being first to communicate a common practice makes it yours in the prospect's mind. Unique = unique to prospects, not to the industry."
        domains: ["unique-mechanism", "unspoken-mechanism", "competitive-strategy"]
        source: "UMW"

      - id: "HEUR-TB-125"
        name: "Metaphorical Mechanism Only for Pure Commodities"
        description: "The metaphorical mechanism (nickname for commodity) is used ONLY when selling a pure commodity with zero differentiation. It's the last resort in the hierarchy."
        domains: ["unique-mechanism", "metaphorical-mechanism", "naming-strategy"]
        source: "UMW"

      - id: "HEUR-TB-126"
        name: "Quotation Marks Signal Metaphorical Mechanism"
        description: "When you see quotation marks around a mechanism name in marketing, it's likely a metaphorical mechanism — a nickname for a commodity concept."
        domains: ["unique-mechanism", "naming-strategy", "copywriting"]
        source: "UMW"

      - id: "HEUR-TB-127"
        name: "Mechanisms Nest Within Mechanisms"
        description: "Even within a big framework, each step can contain its own unique mechanism. Your macro mechanism should have named sub-mechanisms at each stage."
        domains: ["unique-mechanism", "framework-design", "mechanism-architecture"]
        source: "UMW"

      - id: "HEUR-TB-128"
        name: "Don't Waste Money Trademarking Mechanism as Coach/Consultant"
        description: "A trademark is only as valuable as your willingness to enforce it. For coaches/consultants, the cost of enforcement rarely justifies the investment."
        domains: ["naming-strategy", "legal", "entrepreneurship"]
        source: "UMW"

      - id: "HEUR-TB-129"
        name: "Track Record Is More Powerful When Backing a Unique Mechanism"
        description: "'Using this method, I picked 998 winners out of 1000' is exponentially more powerful than just claiming a good track record without naming the method."
        domains: ["proof", "unique-mechanism", "credibility"]
        source: "UMW"

      - id: "HEUR-TB-130"
        name: "Avoid Benefit-Driven Mechanism Names"
        description: "NO: 'Income Explosion System', 'Back Pain Relief Protocol.' YES: 'Cashflow Compounding', 'Lumbar Reactivation.' Names should sound credible/scientific, not promotional."
        domains: ["naming-strategy", "unique-mechanism", "credibility"]
        source: "UMW"

      - id: "HEUR-TB-131"
        name: "Mechanism Name Should Sound Like a Conference or News Program"
        description: "Your mechanism name should sound like something you'd see at a medical conference or on a news program — not in a late-night infomercial."
        domains: ["naming-strategy", "unique-mechanism", "credibility"]
        source: "UMW"

      - id: "HEUR-TB-132"
        name: "When You Feel 'I Don't Have a Method,' Interrogate Your Diagnostic Process"
        description: "Even when each situation is different, there IS a fixed method. The process for IDENTIFYING which approach to use IS itself your mechanism."
        domains: ["unique-mechanism", "mechanism-identification", "consulting"]
        source: "UMW"

      - id: "HEUR-TB-133"
        name: "Campaign Thesis Formula"
        description: "The [SUPERIOR adjective] way to [PRIMARY PROMISE] is with [UNIQUE MECHANISM]. Superior options: fastest, easiest, most effective, most consistent."
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "HEUR-TB-134"
        name: "Choose ONE Argument Model Per Campaign"
        description: "Root Cause Solution OR Better Solution — not both. Pick the one that best fits your mechanism's strength and stick with it throughout the campaign."
        domains: ["campaign-architecture", "copywriting", "strategy"]
        source: "UMW"

      - id: "HEUR-TB-135"
        name: "Never Lead with the Product/Offer"
        description: "Always lead with the mechanism and build the case first. The product is introduced AFTER the mechanism has been teased, introduced, and proved."
        domains: ["campaign-architecture", "unique-mechanism", "sales-sequence"]
        source: "UMW"

      - id: "HEUR-TB-136"
        name: "Big Marketing Idea Gets Attention; Mechanism Argument Gets Conversion"
        description: "They serve different purposes but work together. BMI captures interest; the mechanism proof transforms interest into buying desire."
        domains: ["campaign-architecture", "attention", "conversion"]
        source: "UMW"

      - id: "HEUR-TB-137"
        name: "P90X Ran 23 Infomercials Before Finding the One That Worked"
        description: "Beach Body ran 23 different infomercials for P90X before introducing 'muscle confusion' as the mechanism. That one took the company to $1B+."
        domains: ["unique-mechanism", "testing", "case-study"]
        source: "UMW"

      - id: "HEUR-TB-138"
        name: "When You Are Talked About, You Are Sought After — Then You Raise Prices"
        description: "Celebrity status → being talked about → being sought after → pricing elasticity. The chain reaction of engineered positioning."
        domains: ["celebrity-positioning", "pricing-psychology", "personal-branding"]
        source: "UMW"

      - id: "HEUR-TB-139"
        name: "Pick Your Flag-in-the-Ground Where There Is a GAP"
        description: "Easier to claim unclaimed territory than fight for occupied space. Find the specific topic/area in your market where no one has planted their flag yet."
        domains: ["positioning", "competitive-strategy", "personal-branding"]
        source: "UMW"

      - id: "HEUR-TB-140"
        name: "Soften Self-Promotion with Humility Framing"
        description: "'It still blows me away that I'm the guy the top entrepreneurs come to...' — gets the positioning message out without bragging directly."
        domains: ["self-aggrandizement", "personal-branding", "communication"]
        source: "UMW"

      - id: "HEUR-TB-141"
        name: "3 Maven Stories to Share Repeatedly"
        description: "(1) Origin Story — how you got started. (2) Your Mission — what you stand for. (3) Adversity-Triumph stories — your hardships and how you overcame them."
        domains: ["personal-branding", "storytelling", "celebrity-positioning"]
        source: "UMW"

      - id: "HEUR-TB-142"
        name: "Communicate Positioning Through Story, Not Direct Claims"
        description: "Sticky idea stories are simple, memorable narratives that communicate your positioning without stating it directly. More believable than self-proclamation."
        domains: ["storytelling", "personal-branding", "positioning"]
        source: "UMW"

      - id: "HEUR-TB-143"
        name: "Every Publication Is a Positioning Opportunity"
        description: "Everything you publish — ads, emails, videos, social posts — is an opportunity to shape your marketplace positioning. Never waste a touchpoint."
        domains: ["personal-branding", "content-strategy", "positioning"]
        source: "UMW"

      - id: "HEUR-TB-144"
        name: "Hundreds of Millions Generated Through Unique Mechanism Strategy"
        description: "Todd credits the UM strategy for hundreds of millions in sales between himself, clients, and students. Calls it the single most valuable marketing strategy of his two-decade career."
        domains: ["unique-mechanism", "results", "marketing-strategy"]
        source: "UMW"

      - id: "HEUR-TB-145"
        name: "16 Vocabulary Words for Mechanism Naming"
        description: "System, Framework, Method, Process, Protocol, Structure, Technique, Formula, Pattern, Signal, Routine, Technology, Algorithm, Device, Strategy, Trigger."
        domains: ["naming-strategy", "unique-mechanism", "copywriting"]
        source: "UMW"

      # ── YWO: Your Winning Offer (HEUR-TB-146 → HEUR-TB-164) ──

      - id: "HEUR-TB-146"
        name: "Payment Plan Total: 10-15% More Than Paid in Full"
        description: "At a bare minimum, the payment plan total must be more than the paid-in-full price. Roughly 10-15% more depending on total price. If too close, you drive people to payment plan instead of PIF."
        domains: ["pricing-psychology", "payment-structure", "offer-creation"]
        source: "YWO"

      - id: "HEUR-TB-147"
        name: "Present Payment Plan First, Paid in Full Second"
        description: "In a VSL or presentation, present the payment plan FIRST, then the paid-in-full option. Payment plan becomes the anchor. PIF feels like a savings. Reversal drives PIF behavior."
        domains: ["pricing-psychology", "sales-presentation", "payment-structure"]
        source: "YWO"

      - id: "HEUR-TB-148"
        name: "Low-Ticket Payment Plans: 20% Premium Over PIF"
        description: "If you're selling something for $50 and payment plan is $55, you'll still drive people to payment plan. For low-ticket items, the payment plan total should be ~20% more than PIF."
        domains: ["pricing-psychology", "payment-structure", "low-ticket"]
        source: "YWO"

      - id: "HEUR-TB-149"
        name: "Every Deliverable Needs a Named Benefit"
        description: "Don't just list 'Videos' — explain: 'This is how you're gonna gain mastery so that you can do X.' Every deliverable must be tied to a specific benefit and outcome."
        domains: ["offer-creation", "deliverable-design", "value-communication"]
        source: "YWO"

      - id: "HEUR-TB-150"
        name: "Examine Competitors to See What NOT to Say"
        description: "Most of competitive examination is NOT to funnel hack or copy. It is to see what competitors are saying so you know what NOT to say. Differentiation means not doubling up on competitor messaging."
        domains: ["competitive-analysis", "differentiation", "messaging-strategy"]
        source: "YWO"

      - id: "HEUR-TB-151"
        name: "Name and Frame Every Deliverable Strategically"
        description: "Go the distance with how you name and frame deliverables. Like a book title — same content, different title, wildly different sales. Don't use generic names. Create proprietary-feeling names."
        domains: ["naming-strategy", "offer-creation", "perception-management"]
        source: "YWO"

      - id: "HEUR-TB-152"
        name: "Use 3 Levels of Price Anchoring Before Revealing Price"
        description: "Before revealing your price: (1) Anchor to what alternatives cost. (2) Anchor to total value of all components. (3) Anchor to what private access would cost. THEN reveal your price as fraction."
        domains: ["pricing-psychology", "anchoring", "sales-presentation"]
        source: "YWO"

      - id: "HEUR-TB-153"
        name: "Premiums Should Address Adjacent Problems"
        description: "Premiums must solve a complementary problem, not the same one. If core solves X, premiums should solve Y and Z that naturally accompany X. Duplication = wasted perceived value."
        domains: ["premium-engineering", "offer-creation", "value-perception"]
        source: "YWO"

      - id: "HEUR-TB-154"
        name: "Worksheets = Implementation Accelerators"
        description: "Worksheets make implementation a no-brainer. They translate learning into action, into production, into results easily. Frame them as implementation accelerators, not homework."
        domains: ["deliverable-design", "offer-creation", "implementation"]
        source: "YWO"

      - id: "HEUR-TB-155"
        name: "SIN Test for Every Offer"
        description: "Before launching any offer, test: (S) Is it Superior to alternatives via unique mechanism? (I) Is it Irresistible — value so far exceeds price? (N) Is it Noteworthy — worthy of attention and sharing?"
        domains: ["offer-creation", "differentiation", "quality-control"]
        source: "YWO"

      - id: "HEUR-TB-156"
        name: "Don't Funnel Hack — Differentiate Through Examination"
        description: "Funnel hacking breeds commoditization. Instead, examine what competitors say, identify the patterns, then deliberately deviate. Your competitive advantage IS being different."
        domains: ["competitive-strategy", "differentiation", "anti-commoditization"]
        source: "YWO"

      - id: "HEUR-TB-157"
        name: "Deliverable Naming Has the Book Title Effect"
        description: "A book that sold poorly with one title sold well with a different one — nothing else changed. The same applies to offer deliverables. Invest time in naming. It changes conversion dramatically."
        domains: ["naming-strategy", "offer-creation", "conversion-optimization"]
        source: "YWO"

      - id: "HEUR-TB-158"
        name: "Construction Bundle = Templates + Worksheets + Cheat Sheets"
        description: "The YWO Construction Bundle structure: Templates (for execution), Worksheets (for analysis/implementation), Cheat Sheets (for quick reference). This tri-part structure covers all learning modalities."
        domains: ["offer-creation", "deliverable-design", "product-engineering"]
        source: "YWO"

      - id: "HEUR-TB-159"
        name: "E5 Method Works in 45+ Countries, 60+ Verticals"
        description: "The E5 method is currently used in over 45 countries, 60+ marketplace verticals. Everything from physical products to coaching to consulting to professional services."
        domains: ["customer-acquisition", "campaign-architecture", "versatility"]
        source: "YWO"

      - id: "HEUR-TB-160"
        name: "Market Saturation Demands Offer-Level Differentiation"
        description: "When markets saturate, funnel optimization alone won't save you. Copy alone won't save you. Your OFFER must be the differentiator. Offer-level differentiation is the response to saturation."
        domains: ["market-saturation", "offer-creation", "competitive-strategy"]
        source: "YWO"

      - id: "HEUR-TB-161"
        name: "One E5 Campaign Can Run for Months"
        description: "You can set up one E5 campaign that generates new customer sales day in and day out for months and months, regardless of competition or market saturation."
        domains: ["customer-acquisition", "campaign-longevity", "scalability"]
        source: "YWO"

      - id: "HEUR-TB-162"
        name: "$12K+ for Single-Day E5 Method Sessions"
        description: "Folks routinely fly to West Palm Beach, invest over $12,000 for a single day to learn the E5 method. John Rood generated $42K from 232 registrants. Todd Herman did $800K in less than a day."
        domains: ["customer-acquisition", "E5-method", "social-proof"]
        source: "YWO"

      - id: "HEUR-TB-163"
        name: "Attractive Panacea = Prospect's Dream Solution"
        description: "The attractive panacea is what prospects see as the ideal, perfect solution. Your offer must align with and feel like this specific dream solution. Misalignment = lost sales."
        domains: ["prospect-psychology", "offer-creation", "solution-framing"]
        source: "YWO"

      - id: "HEUR-TB-164"
        name: "Competitive Differentiation = Anti-Commoditization Defense"
        description: "The moment your offer looks like everyone else's, you're commoditized. Commoditization kills margins, kills attention, kills desire. Active differentiation is the defense mechanism."
        domains: ["anti-commoditization", "competitive-strategy", "offer-creation"]
        source: "YWO"


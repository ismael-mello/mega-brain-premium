        domains: ["list-management", "market-research", "offer-construction"]
        source: "SFFF-UPSELLS"

      - id: "HEUR-TB-058"
        name: "Second Chance Follow-Up: 2 Days Post-Purchase"
        description: "After customer takes front-end but declines upsell, wait 2 days then send second-chance sequence. Many convert after experiencing initial product quality."
        domains: ["email-marketing", "conversion-optimization", "follow-up"]

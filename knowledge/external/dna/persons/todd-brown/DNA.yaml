layers:
  L1_PHILOSOPHIES:
    count: 113
    items:
      - id: "FIL-TB-001"
        name: "Front End Is Not a Profit Center"
        description: "The front end exists solely to acquire new customers, not generate profit. All profit comes from back end."
        domains: ["funnel-strategy", "customer-acquisition", "business-model"]
        source: "SFFF-M01-M04"

      - id: "FIL-TB-002"
        name: "Marketing's Job Is to Make Selling Superfluous"
        description: "Per Peter Drucker: good marketing creates such strong desire that the sale becomes easy."
        domains: ["marketing-philosophy", "copywriting", "offer-creation"]
        source: "SFFF-M01-M04"

      - id: "FIL-TB-003"
        name: "Fortune Is in the Follow-Up"
        description: "Majority of conversions come from follow-up, not initial contact."
        domains: ["email-marketing", "sequences", "conversion"]
        source: "SFFF-M01-M04"

      - id: "FIL-TB-004"
        name: "Specificity Sells, Vagueness Kills"
        description: "Specific promises, outcomes, and proof points make marketing believable."
        domains: ["copywriting", "offer-creation", "direct-response"]
        source: "SFFF-M01-M04"

      - id: "FIL-TB-005"
        name: "The Real Business Is the Back End"

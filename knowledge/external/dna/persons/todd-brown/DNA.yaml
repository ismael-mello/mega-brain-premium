  proprietary_terms:
    - term: "Customer Captivation Offer (CCO)"
      meaning: "Low-priced front-end product ($19-$29) designed to acquire customers, not generate profit"
    - term: "Transaction Maximization Sequence (TMS)"
      meaning: "Series of add-on offers presented immediately after purchase to maximize transaction value"
    - term: "Six Figure Funnel Formula (6FFF)"
      meaning: "Todd Brown's complete funnel-building system from niche to back-end"
    - term: "Reverse Add-On"
      meaning: "First upsell offer, priced up to 80% of CCO, presented immediately after purchase"
    - term: "Soft Add-On"
      meaning: "Trial offer billed in 72 hours, priced $67-$97, used as trust bridge"
    - term: "Amplification Autoresponder Chain"
      meaning: "Behavior-driven email sequence architecture using subscribe/unsubscribe logic"
    - term: "Unique Mechanism (UM)"
      meaning: "The proprietary HOW behind a product/service — why it works and why it's different/superior to alternatives"
    - term: "Transubstantiation"
      meaning: "Taking an ordinary process and turning it into something extraordinary through proprietary naming and positioning (from Bill Bonner/Agora)"
    - term: "Campaign Thesis"
      meaning: "The single most important sentence: 'The [SUPERIOR] way to [PROMISE] is with [UNIQUE MECHANISM]'"
    - term: "Education-Based Marketing (EBM)"
      meaning: "Marketing through educating on mechanism superiority rather than pitching product features"
    - term: "Faux Mechanism"
      meaning: "A named mechanism without substance — name exists but clarity on how/why it works doesn't"
    - term: "Promise Exposure Spectrum (PES)"
      meaning: "4-level model showing how market sophistication demands progressively more mechanism detail"
    - term: "Marketplace Maven"
      meaning: "Celebrity status in your market achieved through 10 strategic positioning behaviors"
    - term: "Flag-in-the-Ground"
      meaning: "The specific topic/area you choose to OWN in the market's mind — your claimed territory"
    - term: "SIN Proposition"
      meaning: "Three-part test for a winning offer: Superior (unique mechanism), Irresistible (value >> price), Noteworthy (attention-worthy)"
    - term: "Attractive Panacea"
      meaning: "The ideal, dream solution as perceived by the prospect — what your offer must align with and feel like"
    - term: "E5 Method"
      meaning: "Five-stage customer acquisition process: Examine, Engineer, Evaluate, Enhance, Expand"
    - term: "Your Winning Offer (YWO)"
      meaning: "Todd Brown's complete methodology for building offers that are Superior, Irresistible, and Noteworthy in any market"
    - term: "Construction Bundle"
      meaning: "Deliverable package of Templates + Worksheets + Cheat Sheets that accompanies a training program"
    - term: "Benefit Cascade"
      meaning: "For each deliverable: Feature → Benefit → Outcome. Videos = mastery, Worksheets = implementation, Templates = speed"



        domains: ["vsl", "copywriting", "conversion"]
        source: "SFFF-M01-M04"

      - id: "MET-TB-010"
        name: "Customer Captivation Offer Page Build Process"
        description: "Process: embed VSL player → write supporting headline → configure delayed Add-to-Cart button → build 5-element order form → connect payment processor → test full purchase flow."
        domains: ["landing-page", "conversion", "order-form"]
        source: "SFFF-M01-M04"

      - id: "MET-TB-011"
        name: "Transaction Maximization Sequence — Complete Build Process"
        description: "Process: build Reverse Add-On page → build Soft Add-On page → build Mid-Tier Add-On page → build Thank You Gift page → connect all pages in sequence → set up email chains for each → test entire flow."
        domains: ["transaction-maximization", "upsells", "funnel-strategy"]
        source: "SFFF-M05-M08"

      - id: "MET-TB-012"
        name: "Soft Add-On 72-Hour Trial Offer — Implementation Process"
        description: "Process: create soft add-on product → write trial offer copy → configure 72-hour billing → build confirmation page → set up 4-email sequence → configure cancellation flow → test billing trigger."
        domains: ["upsells", "transaction-maximization", "email-sequences"]
        source: "SFFF-M05-M08"

      - id: "MET-TB-013"
        name: "Thank You Page Gift Offer — Implementation Process"
        description: "Process: design mock thank-you page → write gift offer copy → price continuity at $27-$47/month → build acceptance/decline paths → configure membership access → set up welcome sequence."
        domains: ["transaction-maximization", "continuity", "customer-onboarding"]
        source: "SFFF-M05-M08"

      - id: "MET-TB-014"
        name: "Order Form Build Process — Ideal 5-Element Order Form"
        description: "Process: write reassurance headline → build value stack summary → add guarantee badge → embed testimonials → write affirmation-style CTA copy → configure payment form → add progress bar → test submission."
        domains: ["order-form", "conversion", "copywriting"]
        source: "SFFF-M05-M08"

      - id: "MET-TB-015"
        name: "Bonus Webinar Back-End Offer — Sequence Integration Process"
        description: "Process: create premium back-end offer → write 8-email sequence → integrate behavioral triggers → configure registration/attendance tracking → set up post-webinar follow-up → connect to main chain."
        domains: ["back-end-marketing", "email-sequences", "high-ticket"]
        source: "SFFF-M05-M08"

      - id: "MET-TB-016"
        name: "Complete Campaign Tracking Implementation Protocol"
        description: "Process: set up HyperTracker account → create campaign → add tracking pixels to all pages → configure 9-metric dashboard → generate tracked URLs → test all conversion events → begin traffic."
        domains: ["analytics", "tracking", "marketing-system"]
        source: "SFFF-M09-M12"

      - id: "MET-TB-017"
        name: "Marketing Metrics Analysis and Decision System"
        description: "Process: pull weekly metrics for all 9 KPIs → apply 6-scenario decision framework → identify single constraint → implement fix or scale decision → document in campaign log → repeat weekly."
        domains: ["analytics", "decision-making", "funnel-optimization"]
        source: "SFFF-M09-M12"

      - id: "MET-TB-018"
        name: "Funnel Optimization Testing Methodology"
        description: "Process: identify lowest-converting funnel step → apply 3-priority testing framework → create variation using highest-priority element → run A/B test → wait for statistical significance → implement winner → repeat."
        domains: ["testing", "funnel-optimization", "analytics"]
        source: "SFFF-M09-M12"

      - id: "MET-TB-019"
        name: "Back-End Marketing System Build-Out"
        description: "Process: segment customer list by purchase behavior → create offer for each segment → build product ladder across 7 back-end categories → write email sequences for each → set up behavioral triggers → launch and track LCV growth."
        domains: ["back-end-marketing", "product-creation", "marketing-system"]
        source: "SFFF-M09-M12"

      - id: "MET-TB-020"
        name: "Front-End Product Engineering for Belief Installation"
        description: "Identify 3-5 core beliefs → design content around belief shifts → intro: resell, reignite, plan, quick win 24-72hrs → speak as authority → weave pipeline previews 2-3x → end: direct to next step."
        domains: ["product-creation", "info-marketing", "belief-installation"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-021"
        name: "The Offer Research and Construction Method"
        description: "Research all competitor offers → identify gaps → craft offer so superior it makes competitors look ridiculous → default: try-before-you-buy + lopsided value + premiums + long guarantee + urgency."
        domains: ["offer-construction", "competitive-research", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-022"
        name: "The Hero's Journey 5-Stage Scaled-Down Copy Structure"
        description: "Ordinary world → confronting problem → struggle with conventional solutions → discovery of breakthrough → transformation and invitation. Compressed into 2-4 pages or 20-30 minutes."
        domains: ["copywriting", "storytelling", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-023"
        name: "The Agora 8-Step Renewal Protocol"
        description: "Newsletter renewal starting 8 months before expiry. Escalating urgency steps. Test lifetime upgrade ($195/yr × 3 = $585 vs $2855 once). Maximize LTV per subscriber."
        domains: ["continuity-programs", "email-marketing", "direct-response"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-024"
        name: "The Order Form as Sales Piece Method"
        description: "Pre-checked bump offer → video at top → prepay options alongside trial → retargeting pixel on load → pass contact data via URL. Every element maximizes completions and AOV."
        domains: ["conversion-optimization", "funnel-architecture", "offer-construction"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-025"
        name: "The Proprietary Naming / Product Delivery as Marketing Method"
        description: "Rename standard concepts with proprietary terminology → teach terms throughout product creating tribe language → each term becomes buying trigger → installs framework for next purchase."
        domains: ["product-creation", "copywriting", "brand-differentiation"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-026"
        name: "The Exit Redirect + Exit Pop Layered Recovery Method"
        description: "Primary exit → redirect to long-form version → exit pop with opt-in → email follow-up 3-7 days → retargeting to different funnel. Three recovery layers before prospect is retargeted."
        domains: ["funnel-architecture", "conversion-optimization", "lead-generation"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-027"
        name: "The Product Type Selection Method"
        description: "Select by goal: Written (fast, entry-level), Audio (intimacy), Video (highest value), Continuity (recurring revenue), Compilation (external authority). Mix formats for repurposing."
        domains: ["product-creation", "info-marketing", "business-model"]
        source: "SFFF-BONUS"

      - id: "MET-TB-028"
        name: "The Two-Step Marketing Implementation Method"
        description: "Never send cold traffic to sales page for high-priced offers. Step 1: capture opt-in. Step 2: sell via email follow-up. Exception: ultra-strong copy straight-to-VSL for expert copywriters."
        domains: ["funnel-architecture", "lead-generation", "email-marketing"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-029"
        name: "The Cart Abandonment Retargeting Recovery Method"
        description: "Drop pixel on order form load → abandoners get email sequence + retargeting ads → alternative order form with video → after purchase burn pixel removes from sequences."
        domains: ["conversion-optimization", "email-marketing", "paid-traffic"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-030"
        name: "The MFA Ultra-Stripped Squeeze Page + VSL Control Method"
        description: "Minimal squeeze page (no images, simple headline) → negative exclusion pre-head → delayed CTA (20-60 min by price) → serial position for testimonials → 60%+ upsell without VSL at similar price."
        domains: ["funnel-architecture", "conversion-optimization", "copywriting"]
        source: "SFFF-UPSELLS"

      - id: "MET-TB-031"
        name: "The Squeeze Page to Traffic Black Book Funnel Method"
        description: "9-component: squeeze with negative exclusion → proof preponderance sales page → Hero's Journey letter → exit downsell → order form bump → upsell + affiliate recruitment → 100%+ commissions when backend strong."
        domains: ["funnel-architecture", "copywriting", "affiliate-marketing"]
        source: "SFFF-UPSELLS"

      # === A-Z COPYWRITING WORKSHOP (AZCW) — 18 new methodologies ===

      - id: "MET-TB-032"
        name: "A-Z Copywriting Workshop Day 1 Methodology (Foundations → Research → Decisions)"
        description: "Day 1 flow: Core copy principles → Problem buckets → Problems vs pain points → 3 elements of persuasion → Benefit types → Faux benefits → Contrast → Research & decisions → Offer solution → Prospect risks → Buying belief → Hooks & themes → Lead emotions → Argument & proof."
        domains: ["copywriting", "methodology", "education"]
        source: "AZCW"

      - id: "MET-TB-033"
        name: "A-Z Copywriting Workshop Day 2 Methodology (Craft → Application)"
        description: "Day 2 flow: Word selection → Sentence structure → Writing voice → Power of threes → Copy flow → Prospect disarming → Language patterns → Figures of speech → Rhetorical devices → Framing → Loaded language → Dirty details → Dialogue → Writing practice."
        domains: ["copywriting", "methodology", "writing-craft"]
        source: "AZCW"

      - id: "MET-TB-034"
        name: "Research Process: Examination Triad Method"
        description: "Step 1: Research Prospects (problem identification, wants, emotions, beliefs, awareness level). Step 2: Research Competitors (hooks, USP, mechanism, offer components). Step 3: Research Product (catalyst, hook, USP, mechanism, components). Then make decisions on primary promise, mechanism, and thesis."
        domains: ["copywriting", "research", "preparation"]
        source: "AZCW"

      - id: "MET-TB-035"
        name: "URP Discovery Method (Peeling the Onion)"
        description: "Start at symptom level. Ask 'what causes this?' Peel back layers. At each layer: is a competitor addressing this? If no → you found your URP. If yes → go deeper. Stop when you find an unaddressed level. Don't overreach (graphic design → sales)."
        domains: ["copywriting", "research", "positioning"]
        source: "AZCW"

      - id: "MET-TB-036"
        name: "Hook Development Process"
        description: "Step 1: Consume lots of input (ideas come from connections). Step 2: Dedicated weekly thinking time. Step 3: Look for different angles on ordinary topics. Step 4: Validate against Hook Checklist. Step 5: Check for Rule of One compliance. Step 6: Only write for hooks you're wildly excited about."
        domains: ["copywriting", "hooks", "creative-process"]
        source: "AZCW"

      - id: "MET-TB-037"
        name: "Campaign Thesis Construction Method"
        description: "Step 1: Define targeted problem. Step 2: Define primary promise (magic wand technique). Step 3: Identify unique mechanism. Step 4: Assemble thesis: 'The [superiority] way to [promise] is with [mechanism].' Step 5: Add catalyst if relevant. Step 6: Everything in body copy serves to establish this belief."
        domains: ["copywriting", "campaign-structure", "persuasion"]
        source: "AZCW"

      - id: "MET-TB-038"
        name: "Lead Construction Method"
        description: "Objective: Set the emotional hook. Step 1: Tease most exciting benefits of mechanism. Step 2: Apply Big 4 Feelings (New/Only, Easy/Anybody, Safe/Predictable, Big/Fast). Step 3: Lead to 'Wow, sounds awesome! Now prove it works.' Step 4: Transition to Marketing Argument."
        domains: ["copywriting", "leads", "structure"]
        source: "AZCW"

      - id: "MET-TB-039"
        name: "Proof Stacking Method"
        description: "For each claim: Provide 3 consecutive proof paragraphs. Strongest proof first (most ink). Second paragraph ~half the length. Third ~half again. Vary proof types (data, expert, testimonial). Keep eyes peeled for monster proof points during research."
        domains: ["copywriting", "proof", "credibility"]
        source: "AZCW"

      - id: "MET-TB-040"
        name: "Verb Upgrade Method"
        description: "Step 1: Identify weak verbs (have, do, get, show, use, was). Step 2: Find verb that appeals to senses (see, hear, touch, taste, smell). Step 3: Replace adverb+verb with single strong verb (slowly walk → strut). Step 4: Use present tense. Step 5: Test pluralized form."
        domains: ["copywriting", "word-choice", "editing"]
        source: "AZCW"

      - id: "MET-TB-041"
        name: "Story Integration Method for Copy"
        description: "Start in middle of action. Show don't tell (replace emotion words with actions). Incorporate dialogue with action beats. Add dirty details (brand names, sensory specifics). Appeal to 5 senses. Avoid bald stories (just facts)."
        domains: ["copywriting", "storytelling", "writing-craft"]
        source: "AZCW"

      - id: "MET-TB-042"
        name: "Language Pattern Application Method"
        description: "Select from 15+ pattern templates. Fill in brackets with campaign-specific content. Layer patterns throughout copy (not all at once). Match pattern to copy section: presupposition for opening, future pacing for closing, fear/pain for urgency."
        domains: ["copywriting", "language-patterns", "application"]
        source: "AZCW"

      - id: "MET-TB-043"
        name: "Benefit Layering Method (Functional → Dimensionalized → Emotional)"
        description: "Step 1: List all functional benefits (features → what they do). Step 2: For each, paint the real-life picture (dimensionalized). Step 3: For each, describe how it makes them feel (emotional). Step 4: Check for faux benefits — add 'so you can...' bridges."
        domains: ["copywriting", "benefits", "persuasion"]
        source: "AZCW"

      - id: "MET-TB-044"
        name: "Frame Control Application Method"
        description: "Step 1: Identify facts to present. Step 2: Choose positive or negative frame based on objective. Step 3: For pricing, test payment frame vs savings frame. Step 4: For choice steering, build 3 options (weak-strong, strong-strong, weak-strong)."
        domains: ["copywriting", "framing", "persuasion"]
        source: "AZCW"

      - id: "MET-TB-045"
        name: "Open Loop Engagement Method"
        description: "Step 1: Open loop early ('In a moment I'll tell you...'). Step 2: Deliver valuable content before closing. Step 3: Open new loop before closing first. Step 4: Stack 2-3 open loops simultaneously. Step 5: Close loops strategically (never all at once). Based on Zeigarnik Effect."
        domains: ["copywriting", "engagement", "retention"]
        source: "AZCW"

      - id: "MET-TB-046"
        name: "Offer Solution Construction (Attractive + Irresistible)"
        description: "Part 1 — Attractive Solution: Validate against 9 criteria (significant problem, big result, new not improved, unique, superior, quick, fast, DFY element, success confidence). Part 2 — Irresistible Proposition: features, advantages, benefits (FAB), price, terms, risk reversal, premiums, reason to respond now."
        domains: ["copywriting", "offer-creation", "conversion"]
        source: "AZCW"

      - id: "MET-TB-047"
        name: "Prospect Disarming Method"
        description: "Slip under the radar to avoid triggering skepticism. Use rapport patterns ('Like you...'), damaging admissions (admit small negative), authority leverage (borrowed credibility), and certainty language ('You already know...'). All serving to establish the buying belief."
        domains: ["copywriting", "persuasion", "disarming"]
        source: "AZCW"

      - id: "MET-TB-048"
        name: "Sentence Editing Checklist"
        description: "Check: Active voice? Pronouns clear? Important word at start or end (primacy/recency)? Three's used for rhythm? Unnecessary 'that' removed? 'If' → 'When'? 'But' → 'And'? Verb strong? Adjective necessary? Emotive → evocative?"
        domains: ["copywriting", "editing", "writing-craft"]
        source: "AZCW"

      - id: "MET-TB-049"
        name: "Simple-Short-Short Writing Method"
        description: "Simple words (spoken word, not written). Short choppy sentences. Short paragraphs (1-3 sentences). Target Flesch-Kincaid < 8. Throw grammar rules out. Nobody grades copy for grammar — they grade it with their wallet."
        domains: ["copywriting", "writing-craft", "readability"]
        source: "AZCW"

      # === AZCW SUPPLEMENTARY PASS (5 methodologies) ===

      - id: "MET-TB-050"
        name: "Mechanism Interrogation Process"
        description: "Step 1: List every step of your method. Step 2: For each step ask WHY (why this step, why this order, why not different). Step 3: Ask what happens if skipped/changed. Step 4: Identify what makes your steps superior. Step 5: Document the 'fodder' for the campaign argument. The power is in the WHY, not the name."
        domains: ["copywriting", "unique-mechanism", "research"]
        source: "AZCW"

      - id: "MET-TB-051"
        name: "Mechanism Pre-Sell Method (All Roads Lead to You)"
        description: "Step 1: Set emotional hook in lead. Step 2: Credentialize. Step 3: Spend ENTIRE body copy convincing of MECHANISM superiority (not the product). Step 4: Show who else uses it + results. Step 5: Present offer as the ONLY vehicle to get the mechanism. Prospect pre-sold because they want mechanism and can only get it from you."
        domains: ["copywriting", "campaign-structure", "unique-mechanism"]
        source: "AZCW"

      - id: "MET-TB-052"
        name: "Campaign Diagnosis via VSL Engagement Analytics"
        description: "Check WHERE people drop off. Most drop before offer = lead/copy problem (test wildly different lead). Most reach offer but bail = order form problem (skeleton test). Most complete but don't buy = offer/price problem. Don't guess — diagnose with data."
        domains: ["campaign-optimization", "analytics", "diagnosis"]
        source: "AZCW"

      - id: "MET-TB-053"
        name: "Idea Generation Methodology (James Webb Young)"
        description: "Step 1: Consume massive INPUT (diverse sources — books, news, fiction). Step 2: Store in bi-directional linking tool (Roam/Obsidian). Step 3: Look for CONNECTIONS between disconnected things. Step 4: Identify seed of idea. Step 5: Develop/refine/polish (can take weeks). Step 6: Test: 'Am I wildly excited?' If not, keep looking."
        domains: ["copywriting", "hooks", "creative-process"]
        source: "AZCW"

      - id: "MET-TB-054"
        name: "Copy Editing / Tightening Methodology (10-Step)"
        description: "1: FK score < 8. 2: Replace dead verbs (is/was/have/get/do). 3: Eliminate adverbs (find stronger verb). 4: Remove unnecessary 'that'. 5: Passive → active voice. 6: Past → present tense. 7: Clear pronoun placement. 8: Primacy/recency check. 9: Every claim has proof (if not, remove). 10: Read aloud — sounds like spoken word?"
        domains: ["copywriting", "editing", "writing-craft"]
        source: "AZCW"

      # --- CLLR (Copy Legends Lock-In Recordings) ---

      - id: "MET-TB-055"
        name: "Spy Tool Research Process (Peter Kell)"
        description: "Step 1: Go to spy tools — AdSpy (Facebook), PPI (TikTok), YouTube leaderboards. Step 2: Identify top performers in your niche. Step 3: Reverse-engineer: proven promise, big idea, unique mechanism, authority figure. Step 4: Create 'Flow Bible' — reduce each winning VSL to its core storyline. Step 5: Match your product to proven storyline paths. Step 6: Follow proven paths. 'Basically just what the rich people are doing.'"
        domains: ["research", "competitive-analysis", "campaign-strategy"]
        source: "CLLR"

      - id: "MET-TB-056"
        name: "Weekly Customer Interview Method (Justin Goff)"
        description: "Step 1: Schedule 1-2 calls per week with prospects/buyers. Step 2: Let them talk — one guy talked 25/30 min while Justin barely said anything. Step 3: Listen for real language, real desires, real disconnect from big promises. Step 4: Note actual goals (often surprisingly modest — '$2K/month would be life-changing'). Step 5: Use actual words and phrases directly in sales copy. Prevents Curse of Knowledge."
        domains: ["research", "buyer-psychology", "copywriting"]
        source: "CLLR"

      - id: "MET-TB-057"
        name: "AI Survey Analysis Method (Kevin Rogers)"
        description: "Step 1: Send 9-word email survey to list. Step 2: Collect 80-100+ responses. Step 3: Input ALL responses into ChatGPT. Step 4: Ask for theme extraction — gets ~150 themes, narrow to ~38 unique topics. Step 5: Ask for most passionate words and emotional responses. Step 6: Ask for 5 email/content ideas per topic. Step 7: Use as content and copy source file. 'Having it spit out 38 ready-to-go separate topics was really cool.'"
        domains: ["research", "AI", "email-marketing"]
        source: "CLLR"

      - id: "MET-TB-058"
        name: "Thank You Page Optimization Method (Dan/Rich/Donnie)"
        description: "Step 1: Add 'What almost made you not buy?' on thank you page. Step 2: Collect from ALL buyers (not just a few interviews). Step 3: Identify common threads in responses. Step 4: Implement changes on front-end copy. Step 5: Test against control. Step 6: Iterate — use to resurrect dying offers. Donnie: 'We took the mechanism tease out and all our numbers went up — conversion rate, stick rate, LTV after 4 months.'"
        domains: ["research", "conversion-optimization", "funnel-optimization"]
        source: "CLLR"

      - id: "MET-TB-059"
        name: "Field Testing Method (Donnie French)"
        description: "Step 1: Go to public venue where exact avatar exists (e.g. golf course for golf product). Step 2: Approach organically, hit balls, start conversation. Step 3: Pitch product under competitor's brand name (e.g. 'Callaway has this new club that...'). Step 4: Observe genuine reactions to benefits/mechanism — no filter. Step 5: Collect lines, language, objections for sales copy. Step 6: Reveal truth, recruit as testimonial/tester. 'The lines that come out literally become the sales letter.'"
        domains: ["research", "field-testing", "copywriting"]
        source: "CLLR"

      - id: "MET-TB-060"
        name: "Diagnostic Copywriting Approach for Sophisticated Markets (Todd/Peter)"
        description: "Step 1: Assess market sophistication level — how much they've been exposed to marketing. Step 2: More sophisticated = more diagnostic copy needed. Step 3: Think like a 'doctor of the niche.' Step 4: Bulk of educational content = diagnosing real root cause of prospect's problem. Step 5: Educate on why perceived problem is NOT the real underlying cause. Step 6: Show how 'success' only comes from solving real root cause. Step 7: Present Unique Mechanism as solution to real root cause."
        domains: ["copywriting", "unique-mechanism", "market-sophistication"]
        source: "CLLR"

      - id: "MET-TB-061"
        name: "Deep Research for Unique Proof Points (Kim Schwalm)"
        description: "Step 1: Interview everyone connected to product — formulator, spokesperson, multiple people. Step 2: Dig into full tech studies (NOT just abstracts). Step 3: Look for obscure terms and claims. Step 4: Google unfamiliar terms to find underlying metrics (e.g. 'too long' → '100 times' inhibition). Step 5: Use bigger claims with bigger, unique proof. Step 6: Build Big Ideas around fresh proof claims. Step 7: Fight the 'Curse of Sameness' with truly differentiated evidence."
        domains: ["research", "copywriting", "proof"]
        source: "CLLR"

      - id: "MET-TB-062"
        name: "Education-Based Marketing Methodology"
        description: "Step 1: Identify your unique mechanism. Step 2: Educate prospect on WHAT it is. Step 3: Explain HOW it works. Step 4: Demonstrate WHY it's different. Step 5: Prove WHY it's superior. Step 6: Present offer as only way to get mechanism. Selling becomes superfluous when education is complete."
        domains: ["education-based-marketing", "unique-mechanism", "marketing-methodology"]
        source: "UMW"

      - id: "MET-TB-063"
        name: "2-Step Mechanism Naming Methodology"
        description: "Step 1: Interrogate your mechanism using the 13 Questions Framework (NEVER skip this). Step 2: Name it based on what you uncovered during interrogation. The name must come FROM the interrogation, not from brainstorming. Reversing this order creates faux mechanisms."
        domains: ["unique-mechanism", "naming-strategy", "mechanism-interrogation"]
        source: "UMW"

      - id: "MET-TB-064"
        name: "Campaign Thesis Creation Methodology"
        description: "Step 1: Define your primary promise (outcome prospects want). Step 2: Identify your superiority claim (easiest/fastest/most consistent). Step 3: Name your unique mechanism. Step 4: Combine into thesis: 'The [SUPERIOR] way to [PROMISE] is with [UM].' Test multiple variations."
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "MET-TB-065"
        name: "Root Cause vs Better Solution Selection Methodology"
        description: "Step 1: Analyze — does your mechanism address the underlying cause while competitors address symptoms? If YES → use Root Cause model. Step 2: If NO — does your mechanism achieve the same result but faster/easier/more consistently? If YES → use Better Solution model. Step 3: Choose ONE per campaign."
        domains: ["campaign-architecture", "copywriting", "strategy"]
        source: "UMW"

      - id: "MET-TB-066"
        name: "Nested Mechanism Building Methodology"
        description: "Step 1: Identify your macro mechanism (the big framework). Step 2: Break into constituent steps. Step 3: For EACH step, apply 13 Questions Framework. Step 4: Name each sub-mechanism using same interrogation process. Step 5: Build marketing that reveals sub-mechanisms progressively."
        domains: ["unique-mechanism", "mechanism-architecture", "framework-design"]
        source: "UMW"

      - id: "MET-TB-067"
        name: "Celebrity Status Engineering Methodology (10 Steps)"
        description: "Step 1: Define flag-in-the-ground. Step 2: Develop Maven stories (origin, mission, adversity-triumph). Step 3: Practice self-aggrandizement consistently. Step 4: Document and share miracles. Step 5: Build legend (escapades, achievements). Step 6: Establish proprietary school of thought. Step 7: Create proprietary terminology. Step 8: Craft sticky idea stories. Step 9: Maintain authentic voice. Step 10: Share personal connection regularly. Execute ALL 10 continuously."
        domains: ["celebrity-positioning", "personal-branding", "marketplace-positioning"]
        source: "UMW"

      - id: "MET-TB-068"
        name: "Competitive Mechanism Analysis Methodology"
        description: "Step 1: List all direct competitors. Step 2: For each, answer 4 questions: What is their mechanism? How does it work? What's positive/negative? Symptom or root cause? Step 3: Map competitive landscape. Step 4: Identify gaps and opportunities. Step 5: Position YOUR mechanism against weaknesses found."
        domains: ["competitive-analysis", "unique-mechanism", "strategy"]
        source: "UMW"

      - id: "MET-TB-069"
        name: "Mechanism Identification for 'No Method' Businesses"
        description: "Step 1: Accept that you DO have a method (every business does). Step 2: Examine your diagnostic process — how do you determine which approach for each client? Step 3: Document the decision tree. Step 4: THAT diagnostic process IS your mechanism. Step 5: Name it. Step 6: Market the diagnostic superiority as the mechanism."
        domains: ["unique-mechanism", "mechanism-identification", "consulting"]
        source: "UMW"

      # ── YWO: Your Winning Offer (MET-TB-070 → MET-TB-077) ──

      - id: "MET-TB-070"
        name: "Your Winning Offer (YWO) Complete Methodology"
        description: "Step 1: Examine prospects (problems, desires, beliefs, language). Step 2: Examine competitors (messaging, mechanisms, promises). Step 3: Identify attractive panacea. Step 4: Build SIN proposition (Superior, Irresistible, Noteworthy). Step 5: Architect deliverables with benefit cascade. Step 6: Engineer strategic premiums. Step 7: Position price with triple anchoring. Step 8: Design presentation sequence. Step 9: Create construction bundle (templates + worksheets + cheat sheets). Step 10: Test and refine."
        domains: ["offer-creation", "value-engineering", "marketing-methodology"]
        source: "YWO"

      - id: "MET-TB-071"
        name: "E5 Method (5-Stage Customer Acquisition Methodology)"
        description: "Step 1: EXAMINE — Research prospects (needs, wants, beliefs, language) and competitors (messaging, mechanisms). Step 2: ENGINEER — Build the E5 campaign with winning offer and mechanism. Step 3: EVALUATE — Test and ensure profitability (unit economics). Step 4: ENHANCE — Turn into full marketing campaign with sequences. Step 5: EXPAND — Scale reach to new buyer audiences. Works in 45+ countries, 60+ verticals."
        domains: ["customer-acquisition", "campaign-architecture", "marketing-methodology"]
        source: "YWO"

      - id: "MET-TB-072"
        name: "SIN Proposition Building Methodology"
        description: "Step 1: Define your unique mechanism (the superior HOW). Step 2: Test SUPERIOR — is your mechanism demonstrably different and better? Step 3: Architect value stack until IRRESISTIBLE — value must so far exceed price that buying is obvious. Step 4: Test NOTEWORTHY — is this offer worthy of attention, conversation, sharing? Step 5: If any element fails the SIN test, iterate until it passes."
        domains: ["offer-creation", "differentiation", "value-engineering"]
        source: "YWO"

      - id: "MET-TB-073"
        name: "Prospect Examination Methodology"
        description: "Step 1: Identify prospect's #1 problem/pain. Step 2: Understand what they've already tried. Step 3: Map their beliefs about solutions. Step 4: Document their language (exact words they use). Step 5: Identify what they want (attractive panacea). Step 6: Find contradictions between what they believe and what's true. Step 7: Use insights for resonant messaging."
        domains: ["market-research", "prospect-psychology", "messaging-strategy"]
        source: "YWO"

      - id: "MET-TB-074"
        name: "Competitor Examination Methodology"
        description: "Step 1: List all direct competitors. Step 2: Document what each is saying. Step 3: Identify their claimed mechanism. Step 4: Note their promised outcomes. Step 5: Map common patterns across competitors. Step 6: Identify what EVERYONE is saying. Step 7: Deliberately deviate — say what no one else says. Goal: differentiation, not imitation."
        domains: ["competitive-analysis", "differentiation", "anti-commoditization"]
        source: "YWO"

      - id: "MET-TB-075"
        name: "Offer Construction Bundle Methodology"
        description: "Step 1: Create Templates (for execution — users follow the template). Step 2: Create Worksheets (for analysis and implementation). Step 3: Create Cheat Sheets (for quick reference during execution). Step 4: Host on Google Drive with copy-for-yourself instructions. Step 5: Bundle as premium deliverable within offer. Step 6: Name the bundle with proprietary branding."
        domains: ["offer-creation", "deliverable-design", "product-engineering"]
        source: "YWO"

      - id: "MET-TB-076"
        name: "Price Presentation Sequencing Methodology"
        description: "Step 1: Establish total value of all components (high number). Step 2: Anchor to what alternatives cost (competitors, consultants). Step 3: Anchor to what private access would cost ($12K+ day rate). Step 4: Reveal your price as a fraction. Step 5: Present payment plan first (higher total). Step 6: Present paid-in-full as savings. Step 7: Payment plan = 10-20% more than PIF depending on price point."
        domains: ["pricing-psychology", "sales-presentation", "anchoring"]
        source: "YWO"

      - id: "MET-TB-077"
        name: "Premium Selection & Positioning Methodology"
        description: "Step 1: Identify adjacent problems that accompany the core problem. Step 2: Create premiums that solve those adjacent problems. Step 3: Name each premium with proprietary language. Step 4: Assign individual perceived value. Step 5: Frame as 'included free when you invest today.' Step 6: Stack to dramatically increase total perceived value. Step 7: Each premium must feel like a no-brainer standalone."
        domains: ["premium-engineering", "offer-creation", "value-perception"]
        source: "YWO"
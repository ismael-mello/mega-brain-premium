      - id: "FW-TB-059"
        name: "Examination Triad (Research Framework)"
        description: "3 research areas before writing: (1) Prospects — problems, wants, emotions, beliefs, awareness. (2) Competitors — hooks, USP, mechanisms, offers. (3) Product — catalyst, mechanism, benefits, USP."
        domains: ["copywriting", "research", "preparation"]
        source: "AZCW"

      - id: "FW-TB-060"
        name: "Primary Promise Requirements"
        description: "Chief result/outcome/transformation. Must be: big/bold/audacious, true/believable, specific/concrete/tangible, measurable. Prospect must envision it in mind's eye."
        domains: ["copywriting", "promises", "offer-creation"]
        source: "AZCW"

      - id: "FW-TB-061"
        name: "Bare Bones Big 3"
        description: "Minimum three elements for any campaign: (1) Targeted Problem, (2) Primary Promise, (3) (Unique Mechanism) Process. If you have these three, you can write."
        domains: ["copywriting", "campaign-structure", "minimum-viable"]
        source: "AZCW"

      - id: "FW-TB-062"
        name: "9 Pre-Writing Questions"
        description: "Before writing: (1) Problem to solve? (2) Core benefits? (3) Core emotions to prod? (4) Hook/idea? (5) Unique Mechanism? (6) Objections to address? (7) After-state vision? (8) Core emotion about problem? (9) Buying Belief/Thesis?"
        domains: ["copywriting", "research", "preparation"]
        source: "AZCW"

      - id: "FW-TB-063"
        name: "Campaign Thesis Formula"
        description: "'The [statement of superiority] way to [Primary Promise] is with [Unique Mechanism].' Extended with catalyst: '...way to take advantage of [Catalyst] so you can [Promise] is with [Mechanism].'"
        domains: ["copywriting", "positioning", "campaign-structure"]
        source: "AZCW"

      - id: "FW-TB-064"
        name: "Seven Prodding Emotions"
        description: "Emotions to prod in copy: Fear, Greed, Guilt/Shame, Belonging/Exclusivity, Anger, Pride, Envy. Different emotions appropriate for different contexts."
        domains: ["copywriting", "emotions", "persuasion"]
        source: "AZCW"

      - id: "FW-TB-065"
        name: "Attractive Solution Checklist (9 Criteria)"
        description: "Solves significant problem. Produces big desirable result. New, not simply better (replacement > improvement). Unique and different. Superior to options. Quick and easy. Fast results. Portion DFY. Gives success confidence."
        domains: ["copywriting", "offer-creation", "positioning"]
        source: "AZCW"

      - id: "FW-TB-066"
        name: "Active vs Passive Voice Framework"
        description: "Active: 'Tom slugged John' (strong). Passive: 'John got punched by Tom' (weak). Active voice conveys action, energy, movement. Always prefer active unless strategic passive needed."
        domains: ["copywriting", "sentence-structure", "writing-craft"]
        source: "AZCW"

      - id: "FW-TB-067"
        name: "Flow of Three's (Tricolon)"
        description: "Stop, Drop, and Roll. Life, liberty, and pursuit of happiness. The Few, The Proud, The Marines. Three-part structures feel complete, memorable, rhythmic. Use in headlines, bullets, CTAs."
        domains: ["copywriting", "sentence-structure", "rhetoric"]
        source: "AZCW"

      - id: "FW-TB-068"
        name: "15+ Language Patterns Toolkit"
        description: "Presuppositional Statements, Presuppositional Questions, Creating Excitement, Future Pacing, Creating Rapport, Suggesting Ease, Agreement Sequencing, Guarantee Language, Damaging Admission, Universal Picture Painting, Fear/Pain Leverage, Creating Urgency, Differentiating, Identity Leverage, Authority Leverage."
        domains: ["copywriting", "language-patterns", "persuasion"]
        source: "AZCW"

      - id: "FW-TB-069"
        name: "Presuppositional Statements"
        description: "'If [activity they do], then [action you want].' 'Every time you [activity]...' 'Every successful [identity] knows that...' Presuppose the problem, the identity, or the activity."
        domains: ["copywriting", "language-patterns", "persuasion"]
        source: "AZCW"

      - id: "FW-TB-070"
        name: "Future Pacing Technique"
        description: "'Imagine...' 'Picture this...' 'See yourself...' Create vivid mental movie of the after-state. Include sensory details (sight, sound, touch). Make them LIVE the result before buying."
        domains: ["copywriting", "language-patterns", "visualization"]
        source: "AZCW"

      - id: "FW-TB-071"
        name: "Creating Rapport Patterns"
        description: "'Like you, [describe common problem]...' 'Like many [prospect type], [describe problem]...' Establish shared experience before presenting solution."
        domains: ["copywriting", "language-patterns", "rapport"]
        source: "AZCW"

      - id: "FW-TB-072"
        name: "Fear/Pain Leverage Patterns (6 Structures)"
        description: "(1) 'Therefore, your ability to [X] may mean the difference between [desire] and [current state].' (2) 'You have a choice: [negative] or [positive].' (3) 'Tired of [problem]?' (4) 'You'll never have to...' (5) 'You just can't [X] without [Y].' (6) 'Stop putting up with...'"
        domains: ["copywriting", "language-patterns", "fear-pain"]
        source: "AZCW"

      - id: "FW-TB-073"
        name: "Differentiating Patterns"
        description: "'Unlike other [solutions], [yours] doesn't [negative].' 'Unlike most [solutions], [yours] is the only one that [unique aspect].' 'The first...', 'The only...', 'There has never been...'"
        domains: ["copywriting", "language-patterns", "positioning"]
        source: "AZCW"

      - id: "FW-TB-074"
        name: "Identity Leverage Patterns"
        description: "'For [character identity] only.' 'I'm talking to you as a fellow [identity].' 'Join the ranks of...' 'Be one of the [identity] others envy.' Leverage who they want to be, not who they are."
        domains: ["copywriting", "language-patterns", "identity"]
        source: "AZCW"

      - id: "FW-TB-075"
        name: "Authority Leverage Patterns"
        description: "'Most [authority type] agree: [claim].' 'As the best [authority group] say: [claim].' Borrowed authority from respected groups validates claims without needing your own credentials."
        domains: ["copywriting", "language-patterns", "credibility"]
        source: "AZCW"

      - id: "FW-TB-076"
        name: "The Takeaway Tactic"
        description: "'This is not for you if...' 'This may not be right for you...' 'You should pass on this offer, unless you...' '...if you qualify.' '...if you meet the following criteria.' Exclusion increases desire."
        domains: ["copywriting", "tactics", "exclusivity"]
        source: "AZCW"

      - id: "FW-TB-077"
        name: "Framing Claims as Facts"
        description: "Use certainty language: 'You already know that...', 'Obviously...', 'Without a doubt...', 'The fact is...', 'We can agree that...', 'Everyone in [field] knows...' Presuppose the claim is accepted."
        domains: ["copywriting", "language-patterns", "framing"]
        source: "AZCW"

      - id: "FW-TB-078"
        name: "Framing (Steering) Choice to Your Solution"
        description: "Present 3 choices: Choice 1 = weak advantage + 2 strong disadvantages. Choice 2 = strong advantage + 2 strong disadvantages. Choice 3 (yours) = weak disadvantage + 2 strong advantages."
        domains: ["copywriting", "framing", "persuasion"]
        source: "AZCW"

      - id: "FW-TB-079"
        name: "Open Loops / Nested Loops Structure"
        description: "Open information gaps: 'More about that in a minute...' 'In a moment I'll tell you... First, let me...' Stack multiple open loops. Each creates tension. Close them strategically to maintain engagement."
        domains: ["copywriting", "engagement", "structure"]
        source: "AZCW"

      - id: "FW-TB-080"
        name: "Buying Belief (Campaign Thesis) Establishment"
        description: "Everything in body copy exists for one reason: establish the buying belief before the offer. Once prospect accepts the thesis (different + superior way), the offer becomes logical next step."
        domains: ["copywriting", "campaign-structure", "persuasion"]
        source: "AZCW"

      # === AZCW SUPPLEMENTARY PASS (7 frameworks) ===

      - id: "FW-TB-081"
        name: "CPB Chunks (Claim-Proof-Benefit)"
        description: "Building blocks of the marketing argument. C = State a belief as true. P = Offer evidence/support for that claim. B = Give the prospect the takeaway ('So what that means for you is...'). Stack multiple CPB chunks → Buying Belief."
        domains: ["copywriting", "campaign-structure", "proof"]
        source: "AZCW"

      - id: "FW-TB-082"
        name: "Mechanism Interrogation Framework"
        description: "Questions to ask about your method: Why does it work? How? Why those steps? Why that order? Why not more/fewer steps? What if done out of order? What if a step is skipped/added? Why manual vs automated? The power is in understanding WHY, not in the name."
        domains: ["copywriting", "unique-mechanism", "research"]
        source: "AZCW"

      - id: "FW-TB-083"
        name: "Campaign Optimization Hierarchy"
        description: "Step 1: Fix ORDER FORM (skeleton test, 4-5 iterations). Step 2: Fix AOV (add upsells, slack adjusters, bumps). Step 3: ONLY THEN fix conversion rate (copy/lead/offer). 99% of the time fix AOV side first. Hardest piece = conversion rate."
        domains: ["campaign-optimization", "testing", "funnel-strategy"]
        source: "AZCW"

      - id: "FW-TB-084"
        name: "Double/Dual Guarantee Structure"
        description: "Guarantee 1: Unconditional 30-day money-back ('send one email, full refund'). Guarantee 2: Walk-away guarantee tied to specific result ('six-pack in 8 weeks or double your money back — just show you followed 3 steps'). Extreme confidence demonstration."
        domains: ["offer-creation", "risk-reversal", "conversion"]
        source: "AZCW"

      - id: "FW-TB-085"
        name: "Passive Benefit / Pluralizing the Verb"
        description: "Transform active requirements into passive benefits. 'Get more clicks' (you work) → 'Gets you more clicks' (it works for you). 'Put music in your life' → 'Puts music in your life' (legend: 400% response increase from adding the 's'). Prospect = passive recipient."
        domains: ["copywriting", "word-choice", "persuasion"]
        source: "AZCW"

      - id: "FW-TB-086"
        name: "The Catalyst Framework"
        description: "Catalyst = something recently happened, is happening, or about to happen that creates a new opportunity or need. Creates engagement urgency (reason to engage NOW). Types: law changes, announcements, market disruptions, new studies, tech changes. Not always applicable but powerful."
        domains: ["copywriting", "hooks", "urgency"]
        source: "AZCW"

      - id: "FW-TB-087"
        name: "Truism Chains / Yes-Ladder"
        description: "Stack 2-3 undeniable truths, then slip in the belief you want them to accept. 'You know traffic is important... You know leads matter... And what you're about to discover is the single most effective way to turn both into sales.' Agreement momentum carries them forward."
        domains: ["copywriting", "language-patterns", "persuasion"]
        source: "AZCW"

      # --- CLLR (Copy Legends Lock-In Recordings) ---

      - id: "FW-TB-088"
        name: "OLOF Upsell Strategy (Justin Goff)"
        description: "Offer + Length + Opening + Format. OFFER: congruent with front-end (most important by far — most people just put something they have laying around). OPENING: at least 1-1.5 min congratulating on purchase, reselling, future-pacing how great things will be. They're STILL not sold on previous purchase. LENGTH: match to offer complexity. FORMAT: video upsell. Donnie French: Spent $300K on copywriters trying to beat Justin's OLOF upsell strategy — nobody could."
        domains: ["upsells", "funnel-optimization", "conversion"]
        source: "CLLR"

      - id: "FW-TB-089"
        name: "Big Idea Hierarchy (Stefan Georgi / Mark Ford)"
        description: "Five levels of campaign ideas: (1) GIMMICKS — surface-level tricks. (2) PROMISES — desirable outcomes. (3) NOTIONS — general concept. (4) IDEAS — larger argument about mechanism or unrecognized problem. (5) BIG IDEAS — paradigm-shifting societal issue that's timely and impactful. Easier to sell with gimmicks/promises, but Big Ideas get shared organically."
        domains: ["big-ideas", "campaign-strategy", "copywriting"]
        source: "CLLR"

      - id: "FW-TB-090"
        name: "Multi-Method Research Framework (Collective)"
        description: "Six proven approaches from 12+ elite copywriters: (1) SPY TOOLS — reverse-engineer winners (Peter Kell). (2) CUSTOMER INTERVIEWS — weekly calls, let them talk (Justin Goff). (3) THANK YOU PAGE — 'What almost made you not buy?' (Matt Stafford/Rich/Dan). (4) AI SURVEY — 9-word email + ChatGPT theme analysis (Kevin). (5) FIELD TESTING — pitch under competitor brand in wild (Donnie). (6) DEEP RESEARCH — obscure studies for unique proof (Kim Schwalm)."
        domains: ["research", "campaign-strategy", "competitive-analysis"]
        source: "CLLR"

      - id: "FW-TB-091"
        name: "Root Cause → Unique Mechanism Development Process"
        description: "Peter Kell / Todd: (1) Reframe prospect's perceived problem as mere SYMPTOM of deeper underlying root cause. (2) Get BUY-IN from prospect on new root cause — this is the bulk of educational content. (3) Show how existing solutions don't address real root cause. (4) Introduce Unique Mechanism as solution to root cause. (5) UM must be kindergarten-level in understandability. 'Most of the copy legends agreed fully with this approach.'"
        domains: ["unique-mechanism", "campaign-structure", "copywriting"]
        source: "CLLR"

      - id: "FW-TB-092"
        name: "Two-Word Mechanism Naming Strategy (Jon Benson)"
        description: "Take two words INDIVIDUALLY known by the prospect and combine them into a new phrase for the root cause or mechanism. Examples: 'Leptin Resistance' (Jon Benson), 'Muscle Confusion' (Beachbody P90X). The combination creates something new and ownable while leveraging existing familiarity with each word."
        domains: ["unique-mechanism", "naming", "branding"]
        source: "CLLR"

      - id: "FW-TB-093"
        name: "Campaign Copy Platform Customization (Rich/Donnie)"
        description: "Create SEPARATE, custom pages per platform — NOT variations: (1) MOBILE: often reduced copy, custom design, start here first since mobile is primary from paid media. (2) DESKTOP: full copy experience. (3) AD COPY: customize headline and often much of copy based on platform. (4) VSL-HYBRID: headline + subheadline BELOW the VSL (tested with Hot Jar, proven results)."
        domains: ["page-layout", "conversion-optimization", "platform-strategy"]
        source: "CLLR"

      - id: "FW-TB-094"
        name: "Why Other Products Fail → Mechanism Discovery (Rich Schefren)"
        description: "If customers are still trying to solve a problem, it means whatever they did before didn't work. Why not? What's missing from those products? What is lacking in their Mechanism? Using that as jumping-off point opens possibilities that: (1) prospect hasn't seen before, (2) explains away past failure. Built-in objection handling."
        domains: ["unique-mechanism", "product-creation", "competitive-analysis"]
        source: "CLLR"

      - id: "FW-TB-095"
        name: "Winning Hook Recycling Strategy (Justin Goff)"
        description: "When you have a winning hook and offer, look for OTHER products that can match the hook and offer but have a DIFFERENT Unique Mechanism. Reuse proven hooks across product lines by finding new mechanisms to slot in. Same hook + new mechanism = new promo with proven foundation."
        domains: ["hooks", "campaign-strategy", "scaling"]
        source: "CLLR"

# ═══════════════════════════════════════════════════════════════════════════════
      - id: "FW-TB-096"
        name: "Unique Mechanism vs USP Framework"
        description: "UM = HOW the product works to deliver the result (easily identified in every business). USP = A unique BENEFIT only your product delivers (rare, typically requires innovation). UM is accessible to every business; USP is not."
        domains: ["unique-mechanism", "USP", "product-differentiation"]
        source: "UMW"

      - id: "FW-TB-097"
        name: "Mechanism Classification Framework (4 Types)"
        description: "Every unique mechanism falls into one of 4 types: (1) Existing — genuinely different process. (2) Unspoken — same as competitors but they're not talking about it. (3) Transubstantiated — ordinary process given proprietary name (from Bill Bonner/Agora). (4) Metaphorical — pure commodity given a nickname/metaphor."
        domains: ["unique-mechanism", "mechanism-classification", "transubstantiation"]
        source: "UMW"

      - id: "FW-TB-098"
        name: "Mechanism Interrogation Framework (13 Questions)"
        description: "Systematic interrogation: (1) What is my approach? (2) How does it work? (3) Why does it work? (symptom vs root cause) (4) Why do I do it this way? (5) Why this order? (6) What have I added/subtracted? (7) What have I combined? (8) Why easier? (9) Why faster? (10) Why greater results? (11) Why more consistent? (12) Why fewer problems? (13) Why is my way better?"
        domains: ["unique-mechanism", "mechanism-interrogation", "self-assessment"]
        source: "UMW"

      - id: "FW-TB-099"
        name: "Competitive Mechanism Analysis Framework (4 Questions)"
        description: "(1) What is the mechanism behind their offer? (2) How does their mechanism/method work? (3) What is positive/negative about their approach? (4) Does theirs solve a symptom or the root cause? Answer BEFORE examining your own mechanism."
        domains: ["competitive-analysis", "unique-mechanism", "strategy"]
        source: "UMW"

      - id: "FW-TB-100"
        name: "Campaign Thesis Statement Framework (3 Components)"
        description: "Component 1: Statement of superiority (fastest/easiest/most effective). Component 2: Primary Promise of outcome. Component 3: Unique Mechanism. Template: 'The [SUPERIOR] way to [PRIMARY PROMISE] is with [UNIQUE MECHANISM].'"
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "FW-TB-101"
        name: "Root Cause Solution Argument Model"
        description: "Questions: What is the real root cause? What symptom are competitors addressing? What evidence shows the root cause? How does your UM solve it? What are the benefits? Use when your mechanism addresses the underlying cause while competitors address symptoms."
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "FW-TB-102"
        name: "Better Solution Argument Model"
        description: "Questions: What does 'better' mean (easier/faster/more effective/more consistent/cheaper)? Why is it better? How does it work? What evidence supports it? What are the 'better' benefits? Use when mechanism achieves same result but faster/easier/more consistently."
        domains: ["campaign-architecture", "copywriting", "unique-mechanism"]
        source: "UMW"

      - id: "FW-TB-103"
        name: "Product vs Mechanism Naming Framework"
        description: "Every business should clearly separate: Product Name (what they buy) vs Mechanism Name (why it works). Examples: P90X/Muscle Confusion, Invisalign/SmartTrack, Proactive/Smart Target Technology, FrogTape/Paint Block Technology."
        domains: ["naming-strategy", "unique-mechanism", "product-differentiation"]
        source: "UMW"

      - id: "FW-TB-104"
        name: "4 Prospect Questions Framework"
        description: "Prospects always ask: (1) Is it different? (2) If different, is it better? (3) If better, do I believe? (4) If I believe, do I want it? A unique mechanism answers all 4 in sequence."
        domains: ["prospect-psychology", "unique-mechanism", "buyer-journey"]
        source: "UMW"

      - id: "FW-TB-105"
        name: "10 Marketing Secrets for Marketplace Maven Status"
        description: "(1) Maven Stories (origin, mission, adversity-triumph). (2) Flag in the Ground. (3) Self-Aggrandizement (Gary Halbert). (4) Miracles (jaw-dropping results). (5) Legend (escapades, achievements). (6) Proprietary School of Thought (Dan Kennedy). (7) Proprietary Terminology. (8) Sticky Idea Stories. (9) Authentic Voice. (10) Personal Connection."
        domains: ["celebrity-positioning", "personal-branding", "marketplace-positioning"]
        source: "UMW"

      - id: "FW-TB-106"
        name: "Marketplace Positioning Value Framework (6 Benefits)"
        description: "(1) Celebrity > Authority (more revenue). (2) Marketplace Longevity (beyond last promotion). (3) Pre-Established Influence (convert from moment one). (4) Enhanced Conversion Rates (easier selling). (5) Pricing Elasticity (charge premium). (6) Value Outside Comparison (beyond apples-to-apples)."
        domains: ["celebrity-positioning", "pricing-psychology", "positioning"]
        source: "UMW"

      - id: "FW-TB-107"
        name: "Enunciated Philosophy Framework (Dan Kennedy)"
        description: "Have a clear stance/philosophy you consistently reinforce. Dave Ramsey = debt reduction. Robert Kiyosaki = assets vs liabilities. Todd Brown = differentiation through mechanism. Your market should instantly associate you with ONE clear position."
        domains: ["personal-branding", "positioning", "thought-leadership"]
        source: "UMW"

      - id: "FW-TB-108"
        name: "UM Naming Vocabulary Framework (16 Words)"
        description: "Professional naming vocabulary: System, Framework, Method, Process, Protocol, Structure, Technique, Formula, Pattern, Signal, Routine, Technology, Algorithm, Device, Strategy, Trigger. Combine with credible/scientific descriptors."
        domains: ["naming-strategy", "unique-mechanism", "copywriting"]
        source: "UMW"

      - id: "FW-TB-109"
        name: "UM vs Ordinary Mechanism Comparison Matrix"
        description: "Proprietary vs Common. Prevents vs Stimulates Google Slap. Leads back to you vs Leads to others. Creates demand for YOUR offer vs demand for product type. 4-dimension comparison."
        domains: ["unique-mechanism", "competitive-positioning", "marketing-strategy"]
        source: "UMW"

      - id: "FW-TB-110"
        name: "8 Reasons Why a Unique Mechanism (Value Framework)"
        description: "(1) Differentiation is critical. (2) Credentials no longer enough. (3) USP is rare. (4) UM gives 'new.' (5) UM differentiates while promising same outcome. (6) UM answers 'why this?' (7) UM gives hope. (8) UM enables education-based marketing."
        domains: ["unique-mechanism", "marketing-strategy", "education-based-marketing"]
        source: "UMW"

      - id: "FW-TB-111"
        name: "Hope Re-Introduction Framework"
        description: "When a prospect has tried and failed, showing a NEW mechanism (not just a new promise) re-introduces hope and willingness to try again. Key: genuinely different HOW, not just a different WHAT."
        domains: ["prospect-psychology", "unique-mechanism", "conversion"]
        source: "UMW"

      # ── YWO: Your Winning Offer (FW-TB-112 → FW-TB-123) ──

      - id: "FW-TB-112"
        name: "Your Winning Offer (YWO) Construction Framework"
        description: "Complete framework for building a winning offer: (1) Examine prospects and competitors. (2) Identify attractive panacea. (3) Build SIN proposition. (4) Architect deliverables with benefit cascade. (5) Engineer premiums. (6) Position price with anchoring. (7) Design presentation sequence."
        domains: ["offer-creation", "value-engineering", "marketing-funnels"]
        source: "YWO"

      - id: "FW-TB-113"
        name: "SIN Proposition Construction Framework"
        description: "Three-part framework: Superior — your unique mechanism makes your HOW demonstrably better. Irresistible — value so dramatically exceeds price that buying is obvious. Noteworthy — offer is worthy of attention, conversation, and sharing in the market."
        domains: ["offer-creation", "differentiation", "value-engineering"]
        source: "YWO"

      - id: "FW-TB-114"
        name: "Examination of Prospects & Competitors Framework"
        description: "Prospect examination: What problem do they have? What have they tried? What do they believe? What language do they use? Competitor examination: What are they saying? What problem are they solving? What mechanism do they claim? Goal: resonate with prospects, differentiate from competitors."
        domains: ["market-research", "competitive-analysis", "prospect-psychology"]
        source: "YWO"

      - id: "FW-TB-115"
        name: "Offer Deliverables Architecture Framework"
        description: "Layer-based deliverable design: (1) Core training (videos — mastery). (2) Worksheets (implementation). (3) Templates (speed/confidence). (4) Cheat sheets (quick reference). (5) Community/access. Each deliverable has a benefit case and contributes to the value stack."
        domains: ["offer-creation", "deliverable-design", "product-engineering"]
        source: "YWO"

      - id: "FW-TB-116"
        name: "Price Positioning & Presentation Framework"
        description: "Sequential price presentation: (1) Establish total value of all components. (2) Anchor to alternatives and competitors. (3) Anchor to private/consulting equivalent. (4) Reveal price as fraction. (5) Present payment plan first. (6) Present PIF as savings."
        domains: ["pricing-psychology", "sales-presentation", "anchoring"]
        source: "YWO"

      - id: "FW-TB-117"
        name: "Premium/Bonus Engineering Framework"
        description: "Strategic premium design: (1) Identify adjacent problems prospects face. (2) Create premiums that solve those adjacent problems. (3) Name each premium with proprietary language. (4) Assign perceived value to each. (5) Stack premiums to compound total value. (6) Present as included bonuses."
        domains: ["premium-engineering", "offer-creation", "value-perception"]
        source: "YWO"

      - id: "FW-TB-118"
        name: "Product Presentation Framework"
        description: "Full presentation sequence: Problem → Attractive panacea → Unique mechanism → Campaign thesis → Core offer → Deliverables (with benefit cascade) → Premiums → Price anchoring → Price reveal → Payment options → Guarantee → CTA."
        domains: ["sales-presentation", "offer-creation", "conversion-optimization"]
        source: "YWO"

      - id: "FW-TB-119"
        name: "E5 Campaign Engineering Framework"
        description: "The engineering stage of E5: (1) Set up traffic source. (2) Create attention-getting mechanism. (3) Build education-based marketing sequence. (4) Present SIN proposition. (5) Deploy winning offer. One campaign, daily customer acquisition, scalable for months."
        domains: ["customer-acquisition", "campaign-architecture", "marketing-funnels"]
        source: "YWO"

      - id: "FW-TB-120"
        name: "Attractive Panacea Solution Framework"
        description: "To identify and align with the prospect's attractive panacea: (1) Research what they REALLY want (not surface wants). (2) Understand what they've tried and why it failed. (3) Frame your solution as the specific panacea they've been looking for. (4) Use their language, not yours."
        domains: ["offer-creation", "prospect-psychology", "solution-framing"]
        source: "YWO"

      - id: "FW-TB-121"
        name: "Payment Plan vs Paid-in-Full Design Framework"
        description: "Design rules: (1) Payment plan total = 10-15% more than PIF. (2) Low-ticket = 20% more. (3) Present plan first, PIF second. (4) Plan is the anchor. (5) PIF framed as savings. (6) Never equal totals. (7) Goal: drive PIF behavior."
        domains: ["pricing-psychology", "payment-structure", "offer-creation"]
        source: "YWO"

      - id: "FW-TB-122"
        name: "Competitive Anti-Modeling Framework"
        description: "Instead of funnel hacking: (1) Examine all competitors in your space. (2) Document what they're saying and promising. (3) Identify patterns and common messaging. (4) Deliberately deviate from those patterns. (5) Differentiate your mechanism and offer. (6) Say what NO ONE else is saying."
        domains: ["competitive-analysis", "differentiation", "anti-commoditization"]
        source: "YWO"

      - id: "FW-TB-123"
        name: "Deliverable Naming & Framing Framework"
        description: "For each deliverable: (1) Give it a proprietary name (not generic). (2) Frame its purpose (why it's included). (3) State the benefit (what it does for them). (4) Connect to outcome (where it leads). Book title effect — same content, different name, different sales."
        domains: ["naming-strategy", "offer-creation", "perception-management"]
        source: "YWO"

# LAYER 5: METHODOLOGIES (77 items)
# ═══════════════════════════════════════════════════════════════════════════════

  L5_METHODOLOGIES:
    count: 77
    items:
      - id: "MET-TB-001"

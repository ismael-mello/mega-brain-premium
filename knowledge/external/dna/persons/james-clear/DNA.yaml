# L5: METHODOLOGIES (Step-by-Step Implementations)
# ============================================================================
methodologies:
  - id: "MET-JC-001"
    title: "The Complete Habit Building Methodology"
    content: |
      PHASE 1: AWARENESS (Week 1)
      - Complete Habit Scorecard (list all current habits)
      - Mark each as +, -, or =
      - Choose ONE habit to build
      - Answer: "Who is the type of person who does this?"

      PHASE 2: DESIGN (Week 1-2)
      - Apply 2-Minute Rule: Scale down to trivially easy version
      - Write Implementation Intention: "I will [X] on [DAY] at [TIME] in [PLACE]"
      - Create Habit Stack: "After [CURRENT], I will [NEW]"
      - Design Environment: Remove bad cues, add good cues
      - Place 10 Hot Triggers throughout your day
      - Set Upper and Lower Bounds for the habit

      PHASE 3: EXECUTE (Weeks 2-10)
      - Start with 2-minute version only
      - Track with Don't Break the Chain calendar
      - Apply Never Miss Twice rule
      - Write 5 If/Then contingency plans
      - Do weekly review: What worked? Adjust what didn't

      PHASE 4: EXPAND (Weeks 10+)
      - Gradually increase scope (not schedule)
      - Stay in Goldilocks Zone (4% harder)
      - Add Overlap approaches (3 ways to do same habit)
      - Join a group where habit is normal
      - Identity is now established: you ARE this person
    source: "JC-THA:Full Course"
    confidence: 1.0
    domain: ["habit-formation"]

  - id: "MET-JC-002"
    title: "The Bad Habit Elimination Methodology"
    content: |
      STEP 1: AWARENESS (1 week)
      - Carry index cards
      - Every time bad habit occurs, record WHO/WHAT/WHEN/WHERE
      - End of week: identify primary trigger pattern

      STEP 2: INVERSION (Design)
      - Make it INVISIBLE: Remove cues from environment
      - Make it UNATTRACTIVE: Reframe the cost (what does this habit actually cost you?)
      - Make it DIFFICULT: Add friction (more steps between you and the behavior)
      - Make it UNSATISFYING: Add accountability partner or consequence

      STEP 3: DIVISION (Execution)
      - Define 3 progressive divisions for reduction
      - Master Division 1 before moving to Division 2
      - If slip: return to previous division (not to zero)

      STEP 4: REPLACEMENT (Substitution)
      - Identify the underlying need the bad habit fulfills
      - Find a healthier behavior that meets the same need
      - Apply Habit Stacking to link replacement behavior to the old trigger

      STEP 5: MAINTENANCE
      - Apply Never Miss Twice to the replacement habit
      - Question every exception before making it
      - Review weekly: Am I rationalizing?
    source: "JC-THA:Lessons30-33,38"
    confidence: 1.0
    domain: ["behavior-change"]

  - id: "MET-JC-003"
    title: "Environment Redesign Methodology"
    content: |
      AUDIT:
      1. Walk through each room/space you use daily
      2. For each visible item, ask: "What behavior does this trigger?"
      3. List all positive, negative, and neutral triggers

      REDESIGN:
      4. Remove/hide items that trigger bad habits
      5. Place items that trigger good habits in visible locations
      6. Apply "One Space, One Use" where possible
      7. Create a dedicated space for your target habit

      OPTIMIZE:
      8. Count steps between you and good habits — minimize
      9. Count steps between you and bad habits — maximize
      10. Set up hot triggers at decision points

      MAINTAIN:
      11. Reset environment each evening (prepare for tomorrow)
      12. Weekly audit: Any new negative triggers crept in?
      13. Adjust as habits evolve
    source: "JC-THA:Lessons13-18"
    confidence: 1.0
    domain: ["behavior-change"]

  - id: "MET-JC-004"
    title: "Feedback Loop Implementation Methodology"
    content: |
      STEP 1: Choose your measurement
      - Must measure BEHAVIOR (not outcome)
      - Must be instantaneous (not delayed)
      - Must be visual (paper clips, calendar, progress bar)

      STEP 2: Set up the system
      - Physical tracking (Don't Break the Chain calendar on wall)
      - Digital backup (app if physical not possible)
      - Place tracker where you'll see it daily

      STEP 3: Establish the ritual
      - Track immediately after completing the behavior
      - Never postpone tracking to "later"
      - Make tracking part of the habit (the final step)

      STEP 4: Review and adjust
      - Weekly: Look at the visual record
      - Monthly: Count total completions (measure backward)
      - Quarterly: Assess if habit is becoming automatic
      - If automatic: Consider adding next habit
    source: "JC-THA:Lessons26-28"
    confidence: 1.0
    domain: ["performance"]

  - id: "MET-JC-005"
    title: "Identity-Based Change Methodology"
    content: |
      STEP 1: Define your desired identity
      - Not "I want to lose weight" but "I am a healthy person"
      - Not "I want to write a book" but "I am a writer"
      - Ask: "Who is the type of person that could achieve this?"

      STEP 2: Cast small votes
      - Every action is a vote for your identity
      - Write one sentence → vote for "I am a writer"
      - Do one pushup → vote for "I am an active person"
      - You don't need a majority, just enough votes to shift

      STEP 3: Reinforce through language
      - Shift "I have to" to "I get to"
      - When offered something against your identity: "No thanks, I'm not a smoker" (not "I'm trying to quit")
      - Labels stick: use them intentionally

      STEP 4: Build evidence
      - Track your votes visually
      - Review evidence regularly
      - Each repetition strengthens the identity
      - Eventually the habit IS you, not something you DO
    source: "JC-THA:Lessons21-23"
    confidence: 1.0
    domain: ["personal-development"]


# ═══════════════════════════════════════════════════════════════════════
# L1: PHILOSOPHIES (52 elements)
# ═══════════════════════════════════════════════════════════════════════

L1_PHILOSOPHIES:

  # ─── CORE BELIEFS ───
  - id: "JW-FIL-001"
    title: "Transformation Over Everything"
    content: "Everything in marketing is about CHANGE in the customer's life. Delivery method doesn't matter. What matters is the believability of the promised transformation."
    weight: 0.97
    sources: ["JW-WFF", "JW-PLF19", "JW-SLDD"]
    domains: ["marketing-philosophy", "offer-design"]

  - id: "JW-FIL-002"
    title: "Strategy Wins Before the Battlefield"
    content: "Sun Tzu — the battle is always won before you set foot on the battlefield. The entire prelaunch sequence IS winning the battle. By the time they see your sales page, they're already pre-sold."
    weight: 0.96
    sources: ["JW-PLF15", "JW-PLF18"]
    domains: ["launch-strategy", "pre-launch"]

  - id: "JW-FIL-003"
    title: "Action Over Perfection (Ready-Fire-Aim)"
    content: "A good plan vigorously executed now is better than a perfect plan executed next week. Momentum beats waiting. Feedback from real customers beats internal planning."
    weight: 0.95
    sources: ["JW-SLDD", "JW-PLF19"]
    domains: ["execution-philosophy", "seed-launch"]

  - id: "JW-FIL-004"
    title: "Trust Before Sale"
    content: "Modern business is built on connection, transparency, and authenticity. Deliver value first, then ask for the sale. Old marketing: convince them to buy. PLF: build trust — they WANT to buy."
    weight: 0.96
    sources: ["JW-PLF15", "JW-PLF18", "JW-PLF19"]
    domains: ["trust-building", "relationship-marketing"]

  - id: "JW-FIL-005"
    title: "Business That Lasts"
    content: "Don't optimize for today's sale. Optimize for building a business that lasts. Give away your best free content. Focus on long-term relationship building — paradoxically gets more short-term sales too."
    weight: 0.94
    sources: ["JW-PLF15", "JW-PLF18"]
    domains: ["business-longevity", "strategic-thinking"]

  - id: "JW-FIL-006"
    title: "First Dollar is Hardest"
    content: "The absolute hardest dollar to make is the first dollar. $1 → $10 → $100 → $1000. Getting 'in the game' is the most important and most difficult step."
    weight: 0.93
    sources: ["JW-SLDD", "JW-PLF19"]
    domains: ["entrepreneurship", "seed-launch"]

  - id: "JW-FIL-007"
    title: "Crazy Like a Fox"
    content: "Give away the BEST quality free content. This seems insane to competitors, but it builds massive list + deep trust. Results in easier selling later."
    weight: 0.92
    sources: ["JW-PLF18"]
    domains: ["content-strategy", "trust-building"]

  - id: "JW-FIL-008"
    title: "Finding Out What People Want and Giving It to Them"
    content: "THE strategy that has driven Walker's success. Use the pre-launch to conduct market research through launch conversation. Be ruthless about only selling what the MARKET wants."
    weight: 0.95
    sources: ["JW-PLF18", "JW-PLF19"]
    domains: ["market-intelligence", "offer-creation"]

  - id: "JW-FIL-009"
    title: "Inner Game is Required"
    content: "You can't reverse engineer success — some core inner work is required. Mental blocks, limiting beliefs, 'I'm not a guru' — these must be addressed. Whether you think you can or can't, you're right."
    weight: 0.88
    sources: ["JW-PLF18", "JW-PLF15"]
    domains: ["mindset", "personal-development"]

  - id: "JW-FIL-010"
    title: "Baby Steps Principle"
    content: "Almost no one does a million-dollar launch overnight. Start small, build success, build bigger. You can get 20% of it right and still win. The model is so redundant and powerful it works even with errors."
    weight: 0.93
    sources: ["JW-PLF15", "JW-PLF19"]
    domains: ["execution-philosophy", "mindset"]

  - id: "JW-FIL-011"
    title: "Specificity Over Generality"
    content: "Specific promises attract more than general ones. 'Lose 25 lbs in 60 days' beats 'get fit'. Narrow focus = stronger market position. Specificity leads to belief; belief leads to purchase."
    weight: 0.91
    sources: ["JW-WFF", "JW-PLF19"]
    domains: ["messaging", "positioning"]

  - id: "JW-FIL-012"
    title: "Imperfection Gives Permission"
    content: "Live and imperfect beats polished and late. Imperfection shows real learning process. Your mistakes teach students it's OK to try. Higher perceived value when live vs polished recording."
    weight: 0.90
    sources: ["JW-SLDD"]
    domains: ["authenticity", "content-creation"]

  - id: "JW-FIL-013"
    title: "Publishing Creates Authority"
    content: "Publishing establishes you as expert. Regular content builds positioning + credibility. Coach → Publisher → Authority → Celebrity. The act of teaching IS the positioning."
    weight: 0.89
    sources: ["JW-PLF19", "JW-PLF15"]
    domains: ["authority-building", "positioning"]

  - id: "JW-FIL-014"
    title: "Launches Are the Business Strategy"
    content: "PLF is not just a marketing tactic — it restructures the DNA of your business around connection, transparency, and authenticity. Launches build list, create products, refine offers, build authority all at once."
    weight: 0.94
    sources: ["JW-PLF15", "JW-PLF18", "JW-PLF19"]
    domains: ["business-strategy", "launch-philosophy"]

  - id: "JW-FIL-015"
    title: "Community Feedback is Intelligence"
    content: "Every interaction teaches you about your customers. Surveys give better data than 6 months of planning. Community feedback is your strategic navigation system."
    weight: 0.90
    sources: ["JW-SLDD", "JW-PLF18"]
    domains: ["market-intelligence", "community"]

  - id: "JW-FIL-016"
    title: "Avatar Mastery Over Tactics"
    content: "Know your perfect prospect as a 3D person. Emotional understanding (pain, dreams, fears) > surface characteristics. Deep avatar work makes ALL marketing easier."
    weight: 0.92
    sources: ["JW-PLF15", "JW-PLF19", "JW-WFF"]
    domains: ["avatar", "customer-understanding"]

  - id: "JW-FIL-017"
    title: "The Modeling Principle"
    content: "Do what you teach — be a case study. Let students see your real process, not polished version. Transparency builds trust and teaches authenticity."
    weight: 0.87
    sources: ["JW-SLDD"]
    domains: ["teaching", "authenticity"]

  - id: "JW-FIL-018"
    title: "Extend Your Horizon (Think 2-3 Moves Ahead)"
    content: "Like skiing — look 2-3 turns ahead, not at the rock in front of you. Every launch decision should consider: how does this position me for my NEXT launch?"
    weight: 0.91
    sources: ["JW-PLF18", "JW-PLF15"]
    domains: ["strategic-thinking", "long-term-planning"]

  - id: "JW-FIL-019"
    title: "Sell the Sizzle Not the Steak"
    content: "Your offer is about TRANSFORMATION, not delivery format. DVD, video, live, ebook — format doesn't matter. What matters: believability of the promised life change."
    weight: 0.93
    sources: ["JW-SLDD", "JW-WFF"]
    domains: ["offer-design", "messaging"]

  - id: "JW-FIL-020"
    title: "Don't Be Too Cool for School"
    content: "Even world-class marketers (Ryan Deiss, Stu McLaren) go through every video. There are major twists on almost everything. Humility in learning = better execution."
    weight: 0.85
    sources: ["JW-PLF19"]
    domains: ["learning", "mindset"]

  # Additional philosophies from course content
  - id: "JW-FIL-021"
    title: "List Is the Most Important Asset"
    content: "Always prioritize list building. Launches are the ultimate list builders. Launch lists = most engaged, warmest audiences. The 'I need a list to launch' myth is backwards."
    weight: 0.93
    sources: ["JW-PLF18", "JW-PLF15"]
    domains: ["list-building", "business-assets"]

  - id: "JW-FIL-022"
    title: "Marketing Is Deciding Who You DON'T Want"
    content: "True marketing isn't about reaching everyone. It's about excluding those who aren't your ideal client. Specificity creates clarity. If you target everyone, you target no one."
    weight: 0.90
    sources: ["JW-WFF"]
    domains: ["targeting", "positioning"]

  - id: "JW-FIL-023"
    title: "Abundance Over Scarcity Mindset"
    content: "Give away real, substantial content — not watered-down versions. This abundance approach builds deeper trust than hoarding knowledge. The more you give, the more authority you build."
    weight: 0.88
    sources: ["JW-PLF15", "JW-PLF18"]
    domains: ["content-strategy", "mindset"]

  - id: "JW-FIL-024"
    title: "Launch As Perpetual System"
    content: "PLF is not a one-time event; it's a repeatable business engine. Each launch feeds the next. Cumulative brand-building creates exponential growth potential."
    weight: 0.91
    sources: ["JW-PLF18"]
    domains: ["business-model", "scalability"]

  - id: "JW-FIL-025"
    title: "Conversation Over Transaction"
    content: "Build relationships and have conversations, not just transactions. This is the cornerstone that makes ALL marketing easier. The launch conversation is the secret weapon."
    weight: 0.94
    sources: ["JW-PLF18", "JW-PLF15"]
    domains: ["relationship-marketing", "launch-conversation"]

  # 27 more philosophies extracted from deeper course content
  - id: "JW-FIL-026"
    title: "Webinar Transformation ≠ Product Transformation"
    content: "The transformation you deliver in a webinar must be different from your paid product. Teach enough to create belief, not so much they feel complete."
    weight: 0.89
    sources: ["JW-WFF"]
    domains: ["webinar-design", "offer-distinction"]

  - id: "JW-FIL-027"
    title: "Multiple Time Horizons"
    content: "Ask about every action: What will this do now? A week from now? A month? A year? How does it set up my next launch? Impact on positioning and partnerships?"
    weight: 0.88
    sources: ["JW-PLF18", "JW-PLF15"]
    domains: ["strategic-thinking", "decision-making"]

  - id: "JW-FIL-028"
    title: "Non-Traditional Markets Work Best"
    content: "PLF sometimes works EASIER in non-business niches (guitar, meditation, herbs, dog training). Less competition, passionate audiences. Works in 43+ countries."
    weight: 0.86
    sources: ["JW-PLF18"]
    domains: ["niche-selection", "market-diversity"]

  - id: "JW-FIL-029"
    title: "Partnerships Based on Values First"
    content: "Ideal JV partners share values, not just audience. Complementary rather than competitive. Authentic relationships over transactional ones. Quality over quantity always."
    weight: 0.87
    sources: ["JW-PLF19"]
    domains: ["partnerships", "jv-launches"]

  - id: "JW-FIL-030"
    title: "Get Paid to Create"
    content: "Seed launches let you get paid WHILE creating your product. Don't spend 6 months building something hoping it sells. Sell first, create with real feedback."
    weight: 0.92
    sources: ["JW-SLDD", "JW-PLF19"]
    domains: ["product-creation", "seed-launch"]

  # Additional philosophies to reach 52
  - id: "JW-FIL-031"
    title: "Client Questions Drive Iteration"
    content: "Their Q&As reveal what truly resonates. Use client feedback to reshape your curriculum and offers. Students are co-creators of your product."
    weight: 0.88
    sources: ["JW-SLDD", "JW-PLF19"]
    domains: ["product-development", "feedback-loops"]

  - id: "JW-FIL-032"
    title: "Story is Timeless Technology"
    content: "Stories have connected humans for thousands of years. The core formula hasn't changed since 1996 because it's tied to how human brains work. Tools evolve, story endures."
    weight: 0.87
    sources: ["JW-PLF18"]
    domains: ["storytelling", "marketing-foundations"]

  - id: "JW-FIL-033"
    title: "Leverage Through Positioning"
    content: "First product creates credibility → credibility attracts partners → partners amplify reach → reach generates data for next product. Each step leverages the last."
    weight: 0.90
    sources: ["JW-PLF19"]
    domains: ["positioning", "leverage"]

  - id: "JW-FIL-034"
    title: "Personal Story Is Your Superpower"
    content: "Jeff went from stay-at-home dad with 17 subscribers to $400M+ in tracked launches. Your origin story, vulnerabilities, and journey ARE the marketing. Authenticity sells."
    weight: 0.89
    sources: ["JW-PLF15", "JW-PLF18"]
    domains: ["storytelling", "personal-brand"]

  - id: "JW-FIL-035"
    title: "The 'I Already Knew That' Trap"
    content: "Biggest enemy of growth is thinking you already know. Even Ryan Deiss ($3.6M launch) goes through every video. There are major twists on almost everything."
    weight: 0.84
    sources: ["JW-PLF19"]
    domains: ["learning", "mindset"]

  - id: "JW-FIL-036"
    title: "Market Tells You What to Build"
    content: "Be ruthless about only selling what the MARKET wants, not what YOU think they need. The launch conversation is an X-ray revealing exactly what your market wants."
    weight: 0.93
    sources: ["JW-PLF18"]
    domains: ["market-intelligence", "product-market-fit"]

  - id: "JW-FIL-037"
    title: "Small Stages = Low Risk Learning"
    content: "50-500 people is safer than 50,000. Seed launch is your living room, not Broadway. Smaller group = manageable for first-timer, faster feedback, rapid iteration."
    weight: 0.87
    sources: ["JW-SLDD"]
    domains: ["risk-management", "seed-launch"]

  - id: "JW-FIL-038"
    title: "Survey = Instant Market Intelligence"
    content: "Ask students what they need in 24-36 hours — gives better data than 6 months of planning. Surveys are your strategic navigation system."
    weight: 0.86
    sources: ["JW-SLDD"]
    domains: ["market-research", "feedback"]

  - id: "JW-FIL-039"
    title: "Belief > Credentials"
    content: "Deep belief in your message > formal certification. 'Who am I not to be?' Permission comes from within, not external stamp. Delivery first — show up regardless of list size."

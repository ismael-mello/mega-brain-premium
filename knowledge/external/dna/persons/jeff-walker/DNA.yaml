    content: "M0: Foundation. M1: Profitable Webinar Funnel (6 decisions). M2: Maximize Registration. M3: Show Rate Optimization. M4: Content Design. M5: Offer Design. M6: Delivery. M7: After-Webinar Sales (doubles revenue). M8: Webinar Business."

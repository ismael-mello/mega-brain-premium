# ═══════════════════════════════════════════════════════════════════════
# L4: FRAMEWORKS (108 elements - showing key 30)
# ═══════════════════════════════════════════════════════════════════════

L4_FRAMEWORKS:

  - id: "JW-FW-001"
    title: "Product Launch Formula (PLF) - Master Framework"
    content: "Core system: Pre-Pre-Launch → Pre-Launch (3 PLCs) → Launch Open → Post-Launch. Uses Stories, Sequences, and Mental Triggers to build trust before asking for sale."
    weight: 0.98
    sources: ["JW-PLF15", "JW-PLF18", "JW-PLF19"]
    domains: ["core-plf"]
    steps:
      - "Pre-Pre-Launch: leak news, build anticipation, segment audience"
      - "PLC1 (Opportunity): establish authority, show possibility, get buy-in"
      - "PLC2 (Transformation): deep teaching, case studies, build belief"
      - "PLC3 (Ownership): show what it's like to have it, social proof, scarcity"
      - "Sales Video/Letter: make the offer (already pre-sold)"
      - "Open Cart: urgency, multiple emails, deadline"
      - "Cart Close: final scarcity, last chance"

  - id: "JW-FW-002"
    title: "The Five Primary Launch Types"
    content: "1) SEED (no list/product, 3-5 live calls, get paid to create), 2) INTERNAL (existing list, 3 PLCs + sales, most elegant), 3) JV (partner-driven, exponential reach), 4) QUICK (existing asset, fast cash), 5) EVERGREEN (automated, always running)."
    weight: 0.96
    sources: ["JW-PLF19"]
    domains: ["launch-types"]

  - id: "JW-FW-003"
    title: "8 Extended Launch Types"
    content: "5 primary + 3 advanced: 6) RELAUNCH (minimal work, re-promote), 7) SHADOW (affiliate/JV participant, builds authority), 8) E-COMMERCE (adapted for physical products)."
    weight: 0.88
    sources: ["JW-PLF18"]
    domains: ["launch-types"]

  - id: "JW-FW-004"
    title: "The Sideways Sales Letter Framework"
    content: "Transform 30-page sales letter into 7-10 day sequence. BS Detector moves RED → YELLOW → GREEN. Day 1: PLC1 (Authority + Reciprocity). Day 4: PLC2 (Teaching + Community). Day 7: PLC3 (Social Proof + Scarcity). Day 10: Sales offer (already pre-sold)."
    weight: 0.97
    sources: ["JW-PLF15"]
    domains: ["sales-methodology"]

  - id: "JW-FW-005"
    title: "PLC Content Structure (Will Hamilton Model)"
    content: "Authority Open → Promise → Commitment Trigger → Teaching (13-15 min) → Social Proof → Authority Callback → Preview Next. Each element serves specific psychological function."
    weight: 0.93
    sources: ["JW-PLF19"]
    domains: ["content-creation", "plc-design"]

  - id: "JW-FW-006"
    title: "Mental Triggers System"
    content: "5 core Cialdini-based triggers deployed across PLC: Authority (PLC1 — publishing positions you), Reciprocity (PLC1-2 — free value creates obligation), Social Proof (PLC3 — comments, testimonials), Likability (PLC2 — personality, helpfulness), Scarcity (PLC3 + Cart — limited, deadline)."
    weight: 0.94
    sources: ["JW-PLF15"]
    domains: ["psychology", "persuasion"]

  - id: "JW-FW-007"
    title: "Circle of Awesome Scaling Blueprint"
    content: "Seed ($3K, 200 list) → Internal ($12K, 1000 list) → JV ($100K+, JV partners) → Next Seed/Product ($10K+, 4000 list). Each launch increases list 2-5x, attracts better partners, informs next product."
    weight: 0.95
    sources: ["JW-PLF19"]
    domains: ["scaling", "business-growth"]

  - id: "JW-FW-008"
    title: "The 6 Critical Webinar Decisions Framework"
    content: "1) THE WHO (target market), 2) THE NEED (1-3 solvable problems), 3) THE TRANSFORMATION (specific life change promise), 4) THE HOOK (attention + curiosity + proof), 5) THE PRESENTATION (content format), 6) THE TONE (personality + character)."
    weight: 0.92
    sources: ["JW-WFF"]
    domains: ["webinar-design"]

  - id: "JW-FW-009"
    title: "Seed Launch Framework"
    content: "Step 1: Build seed list (personal contacts + social). Step 2: Create seed offer (transformation-centric). Step 3: Deliver via live calls (3-5 teleseminars). Step 4: Sell during delivery. Step 5: Record → Create product → Scale."
    weight: 0.91
    sources: ["JW-SLDD", "JW-PLF19"]
    domains: ["seed-launch"]

  - id: "JW-FW-010"
    title: "Avatar Deep-Dive Exercise"
    content: "5 questions: 1) WHO is your avatar (3D person)? 2) What's their biggest PAIN? 3) What SCARES them? 4) What are their OPPORTUNITIES? 5) What are their HOPES & DREAMS? Plus Dan Sullivan question: 'If we meet 3 years from now, what would make you feel successful?'"
    weight: 0.90
    sources: ["JW-PLF15", "JW-SLDD"]
    domains: ["avatar", "customer-research"]

  - id: "JW-FW-011"
    title: "Niche Selection Framework"
    content: "4 Mega Markets (Money, Relationships, Health, Hobbies) → Research (Google, Amazon, Forums, Ads, ClickBank) → Niche Stacking (overlay markets) → Testing (squeeze page + paid traffic) → Validate before building."
    weight: 0.88
    sources: ["JW-PLF19"]
    domains: ["niche-selection"]

  - id: "JW-FW-012"
    title: "Launch Timeline Architecture"
    content: "Phase 1: Pre-Pre-Launch (2-3 weeks before). Phase 2: Pre-Launch / PLC delivery (7-10 days). Phase 3: Launch Open (1-3 days). Phase 4: Launch Extension (2-5 days if warranted). Total: ~6 weeks."

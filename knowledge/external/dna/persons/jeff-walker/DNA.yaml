      meaning: "Cialdini-based psychological levers: Authority, Reciprocity, Social Proof, Likability, Scarcity"
    - term: "Seed Launch"
      meaning: "Simple first launch to small list to get paid to create your product"
    - term: "Launch Echo"
      meaning: "Each launch echoes forward, amplifying subsequent launches through list, authority, and partnerships"
    - term: "Hope Marketing"

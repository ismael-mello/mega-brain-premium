L5_METHODOLOGIES:

  - id: "JW-MET-001"
    title: "Complete Internal Launch Execution"
    content: "Step-by-step: 1) Define avatar (5 questions). 2) Research market (Google, Amazon, forums). 3) Create 3 PLC videos (13-15 min each). 4) Build launch list. 5) Execute pre-pre-launch. 6) Deliver PLC1 (Opportunity). 7) Deliver PLC2 (Transformation). 8) Deliver PLC3 (Ownership). 9) Open cart (sales video/letter). 10) Email sequence (urgency + proof). 11) Cart close (deadline). 12) Analyze and iterate."
    weight: 0.96
    sources: ["JW-PLF15", "JW-PLF18", "JW-PLF19"]
    domains: ["internal-launch"]

  - id: "JW-MET-002"
    title: "Seed Launch Step-by-Step"
    content: "1) Build initial list (personal contacts + social, target 50-500). 2) Define transformation offer. 3) Sell before creating (pre-sell 3-5 live call series). 4) Deliver via live teleseminars (weekly). 5) Collect feedback during delivery. 6) Record all sessions. 7) Package into product. 8) Iterate offer based on feedback. 9) Use testimonials for Internal launch."
    weight: 0.93
    sources: ["JW-SLDD", "JW-PLF19"]
    domains: ["seed-launch"]

  - id: "JW-MET-003"
    title: "PLC1 Production Methodology"
    content: "1) Authority open (credentials, location, expertise). 2) State the opportunity clearly. 3) Get buy-in commitment ('if this could help, would you commit?'). 4) Teach substantive content (60% value). 5) Social proof (show engagement). 6) Preview next PLC. 7) Call to action (comment, share)."
    weight: 0.92
    sources: ["JW-PLF19"]
    domains: ["content-creation"]

  - id: "JW-MET-004"
    title: "Avatar Discovery Methodology"
    content: "1) Answer 5 core questions in writing. 2) Name your avatar (make them real). 3) Add photo (optional but powerful). 4) Define their daily life. 5) Identify pain points (what keeps them awake). 6) Identify fears (what scares them). 7) Identify hidden opportunities (what they don't see). 8) Define dream outcome (3-year vision). 9) Validate via market research."
    weight: 0.90
    sources: ["JW-PLF15", "JW-SLDD"]
    domains: ["avatar"]

  - id: "JW-MET-005"
    title: "Niche Research Methodology"
    content: "1) Start with mega-market (Money/Relationships/Health/Hobbies). 2) Google Ads: check CPC. 3) Amazon: count best-sellers (need >10). 4) Forums: find sticky high-engagement topics. 5) Magazines: identify sub-segments. 6) ClickBank: check gravity scores. 7) Competitor ads: check longevity. 8) Niche stacking: overlay two markets. 9) Testing: squeeze page + paid traffic."
    weight: 0.87
    sources: ["JW-PLF19"]
    domains: ["niche-selection"]

  - id: "JW-MET-006"
    title: "JV Launch Execution"
    content: "1) Prove launch works (internal launch first). 2) Identify aligned partners (values + complementary audience). 3) Build genuine relationship (not cold outreach). 4) Create JV page with swipe copy. 5) Provide partners with email templates + PLC links. 6) Coordinate launch timing. 7) Share commissions. 8) Follow up with partner audience."
    weight: 0.87
    sources: ["JW-PLF19"]
    domains: ["jv-launch"]

  - id: "JW-MET-007"
    title: "Webinar Creation Methodology (WFF)"
    content: "Week 1: Complete 6 Critical Decisions (Who, Need, Transformation, Hook, Presentation, Tone). Week 2: Create content using chosen format. Week 3: Build registration funnel + drive traffic. Week 4: Deliver webinar + execute after-webinar sales sequence."
    weight: 0.88
    sources: ["JW-WFF"]
    domains: ["webinar-creation"]

  - id: "JW-MET-008"
    title: "Objection Crusher Email Methodology"
    content: "1) Identify top 3-5 objections from market research. 2) Create one email per objection. 3) Structure: acknowledge objection → reframe → provide proof/story. 4) Send 1 per day in pre-launch. 5) By launch, all objections pre-neutralized."
    weight: 0.86
    sources: ["JW-PLF18"]
    domains: ["email-marketing"]

  - id: "JW-MET-009"
    title: "Launch Conversation Data Collection"
    content: "1) Publish PLC with comments enabled. 2) Read EVERY comment. 3) Categorize: questions, objections, excitement, requests. 4) Track which topics get most engagement. 5) Use data to refine offer. 6) Create crushing offer from market intelligence."
    weight: 0.90
    sources: ["JW-PLF18"]
    domains: ["market-intelligence"]

  - id: "JW-MET-010"
    title: "Evergreen Launch Setup"
    content: "1) Complete successful internal launch (proven). 2) Record PLC sequence (or reuse existing). 3) Create automated email sequence mirroring live launch. 4) Set up paid traffic to opt-in page. 5) New subscriber enters automated launch sequence. 6) Artificial scarcity via deadline timers. 7) Test and optimize conversion rates."
    weight: 0.85
    sources: ["JW-PLF19", "JW-PLF18"]
    domains: ["evergreen"]

  - id: "JW-MET-011"
    title: "Valerie Young Launch Email Sequence"
    content: "Day -35: Leak news in newsletter + survey. Day -14: Newsletter with results + priority list. Day -3: Q&A forum announcement. Day -2 to 0: Objection crusher emails (3 burning questions). Day 1: Launch (morning, noon, afternoon, evening emails). Days 2-8: Alternating scarcity/social proof. Days 9-11: Extension + final push."
    weight: 0.83
    sources: ["JW-PLF18"]
    domains: ["email-sequences", "case-study"]

  - id: "JW-MET-012"
    title: "After-Webinar Sales Sequence"
    content: "1) Send replay link within 1 hour. 2) Day 2: 'Did you miss it?' email with replay. 3) Day 3: Social proof email (testimonials from webinar attendees). 4) Day 4: Objection handling email. 5) Day 5: Deadline warning email. 6) Day 6: Final deadline email (urgency). 7) Day 7: Cart close."
    weight: 0.85
    sources: ["JW-WFF"]
    domains: ["webinar-follow-up"]

  - id: "JW-MET-013"
    title: "Quick Launch Execution"
    content: "1) Choose existing product. 2) Write 3-5 email sequence (story-based). 3) Create or update sales page. 4) Send emails over 3-7 days. 5) Include deadline. 6) No PLC needed (audience already warm). 7) Fast cash injection for existing businesses."
    weight: 0.82
    sources: ["JW-PLF19"]
    domains: ["quick-launch"]

  - id: "JW-MET-014"
    title: "Webinar Registration Funnel"
    content: "1) Create squeeze page with hook + transformation promise. 2) Drive traffic (paid ads + email list + partners). 3) Confirmation page with 'add to calendar'. 4) Reminder email sequence (T-7d, T-3d, T-1d, T-1h). 5) Pre-webinar value email (content preview). 6) Day-of final reminder."
    weight: 0.84
    sources: ["JW-WFF"]
    domains: ["webinar-registration"]

  - id: "JW-MET-015"
    title: "Show Rate Optimization"
    content: "1) Send value-packed reminder emails. 2) Create 'homework' assignment before webinar. 3) Offer attendance bonus (PDF, template). 4) Use countdown timer on confirmation page. 5) Send 1-hour reminder with 'claim your seat' language. 6) Start on time — reward early arrivals."
    weight: 0.84
    sources: ["JW-WFF"]
    domains: ["webinar-attendance"]

  - id: "JW-MET-016"
    title: "Product Creation During Seed"
    content: "1) Pre-sell the concept. 2) Create weekly call outline (1 topic per call). 3) Deliver live (with recording). 4) Send survey after each call. 5) Adjust next call based on feedback. 6) Package recordings + materials post-delivery. 7) You now have tested, feedback-informed product."
    weight: 0.86
    sources: ["JW-SLDD"]
    domains: ["product-creation"]

  - id: "JW-MET-017"
    title: "Market Research via Google"
    content: "1) Search niche keywords. 2) Check Google Ads sidebar (who's advertising?). 3) Note CPC (high = valuable). 4) Check organic results (quality of existing content). 5) Look at People Also Ask. 6) Check Google Trends for seasonality."
    weight: 0.80
    sources: ["JW-PLF19"]
    domains: ["market-research"]

  - id: "JW-MET-018"
    title: "Testimonial Collection During Launch"
    content: "1) Engage with comments on PLC. 2) Identify enthusiastic commenters. 3) Ask permission to feature. 4) Collect written/video testimonials. 5) Use in PLC3 and sales page. 6) Ask successful buyers for post-purchase testimonials."
    weight: 0.81
    sources: ["JW-PLF15"]
    domains: ["social-proof"]

  - id: "JW-MET-019"
    title: "Launch Story Construction"
    content: "Module 2 of PLF: 1) Personal origin story (vulnerability). 2) Customer transformation stories. 3) Opportunity stories (what's possible). 4) Third-party proof stories. 5) Weave stories throughout PLC sequence."
    weight: 0.85
    sources: ["JW-PLF18"]
    domains: ["storytelling"]

  - id: "JW-MET-020"
    title: "Relaunch Methodology"
    content: "1) Choose previously successful product. 2) Minimal updates (new testimonials, updated pricing). 3) Fresh email sequence to list. 4) Target non-buyers from previous launch. 5) Limited time reopening. 6) Minimal effort, meaningful revenue."
    weight: 0.79
    sources: ["JW-PLF18"]
    domains: ["relaunch"]


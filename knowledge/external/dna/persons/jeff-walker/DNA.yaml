  - id: "JW-FW-020"
    title: "Transformation Validity Test"
    content: "Three-part test for any promise: DESIRABLE (would spend 10 hours to learn), BELIEVABLE (not too good to be true), ACHIEVABLE (can they actually do it). All three must pass."
    weight: 0.86
    sources: ["JW-WFF"]
    domains: ["offer-validation"]


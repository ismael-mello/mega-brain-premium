mental_models:

  - id: RH-MM-150
    text: "Modelo de ROI Agregado — não medir ROI por canal individual, mas avaliar a contribuição cruzada entre todos os canais. Performance gera onda que arrasta orgânico e outros canais"
    guest: Bruno de Oliveira
    episode: "#229 E-commerce na Prática"
    domain: [atribuicao, midia]

  - id: RH-MM-151
    text: "Modelo CAC vs LTV para Serviços Recorrentes — se você conhece o LTV do cliente (ex: 48 meses), pode vender o primeiro ano de receita antecipado para financiar aquisição via Google Ads"
    guest: Rogério Fameli (BS Hub)
    episode: "#227 Escala de serviços profissionais"
    domain: [financeiro, aquisicao]

  - id: RH-MM-152
    text: "Modelo First Mover em Mídia — quando novo canal surge (Google 2006, Facebook 2007-2011, TikTok 2021), CPM está 10x menor; primeiros a escalar capturam valor desproporcional"
    guest: Bruno de Oliveira
    episode: "#229 E-commerce na Prática"
    domain: [trafego, midia]

  - id: RH-MM-153
    text: "Modelo Joio e Trigo — geração de demanda via tráfego sempre traz leads bons e ruins misturados. O marketing gera, mas é a equipe de vendas que separa e qualifica"
    guest: Gilberto Lames (Pimenta Estética)
    episode: "Negócio Milionário Vendendo Equipamentos de Estética"
    domain: [vendas, trafego]

  - id: RH-MM-154
    text: "Modelo Hub de Parceiros — ao invés de montar estrutura própria para serviço pontual (marca/patente), criar hub onde parceiros vendem na base e dividem o lucro 50/50"
    guest: Rogério Fameli (BS Hub)
    episode: "#227 Escala de serviços profissionais"
    domain: [parcerias, escala]

  - id: RH-MM-155
    text: "Modelo de Compartilhamento vs Dedicação — quanto menos compartilhado o recurso (agência/assessor), mais caro. Quanto mais compartilhado, mais barato mas menos dedicado. Escalar = ir do compartilhado ao dedicado"
    guest: Dener Lippert / Ricardo Amidomins
    episode: "#131 Gestão de times Marketing e Growth"
    domain: [servicos, gestao]

  - id: RH-MM-156
    text: "Modelo Ecossistema (não só plataforma) — além de e-commerce, oferecer pagamento próprio, logística, crédito e educação. Cada camada aumenta o lock-in e o valor para o cliente"
    guest: Bruno de Oliveira (NuvemShop)
    episode: "#229 E-commerce na Prática"
    domain: [ecommerce, plataforma]

  - id: RH-MM-157
    text: "Modelo Alfas e Betas de Conteúdo — seguir os 'alfas' (engenheiros, criadores originais) que publicam em blogs técnicos sem seguidores, e se tornar o 'beta' que traduz e distribui"
    guest: Marcio Apolinário / Rafael Kiso
    episode: "#215 Influenciadores Regionais / #251 Marketing com Dados"
    domain: [conteudo, estrategia]

  - id: RH-MM-158
    text: "Modelo de Funil por Números — o erro é olhar custo do lead como última métrica. Olhar todo o funil: leads → agendamento → visita → taxa de conversão. Se mantenho 30% de conversão, preciso apenas de mais leads"
    guest: Rodrigo Saviolo (Xprime Academias)
    episode: "Academia Dobrou as Vendas com IA"
    domain: [vendas, metricas]

  - id: RH-MM-159
    text: "Modelo da Experiência Imersiva — transformar embalagem em narrativa (quadrinhos + cristal + pergaminho). Custo baixo, viralização alta. O cliente reclama se FALTA o pergaminho, não o produto"
    guest: Rafael Dutra
    episode: "#194 Marketing Digital para Negócios Reais"
    domain: [branding, experiencia]

  - id: RH-MM-160
    text: "Modelo de Evento como Canal de Aquisição — 80% dos empresários que não fazem evento como fonte de aquisição estão deixando dinheiro na mesa. Evento é front-end baixo ticket que converte para esteira de produtos"
    guest: Marcus Marques
    episode: "#324 Eu Lucrei R$100 Milhões"
    domain: [vendas, eventos]

  - id: RH-MM-161
    text: "Modelo $1 gera $10 em Parceiros — a Microsoft estima que para cada dólar que ela fatura, 10 dólares são gerados no ecossistema de parceiros. É o multiplicador do canal indireto"
    guest: Guilherme de Sushi (Microsoft)
    episode: "#224 Escalando através de Canais de Parcerias"
    domain: [parcerias, escala]

  - id: RH-MM-162
    text: "Modelo de Corresponsabilidade — quando agência e cliente trabalham com o mesmo peso de responsabilidade olhando o mesmo objetivo, tende a dar muito mais ROI"
    guest: Priscila Marcim / Felipe Samã (V4 Company)
    episode: "Academia Dobrou as Vendas com IA"
    domain: [servicos, gestao]


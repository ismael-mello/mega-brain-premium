philosophies:

  - id: RH-PHI-150
    text: "A estratégia que mais teve ROI foi começar antes de todo mundo — ser first mover em novos canais de mídia paga"
    guest: Bruno de Oliveira
    episode: "#229 E-commerce na Prática"
    domain: [trafego, ecommerce]

  - id: RH-PHI-151
    text: "ROI não se mede por canal isolado — quando você diminui performance, os outros canais caem no mês seguinte; a performance gera uma onda que leva junto os outros canais"
    guest: Bruno de Oliveira
    episode: "#229 E-commerce na Prática"
    domain: [atribuicao, midia]

  - id: RH-PHI-152
    text: "Correria é coisa de pobre — é a desculpa do fracassado. Quando você trabalha 20% do que trabalhava e faz a mesma renda, percebe que o jogo é de alavanca, não de hora"
    guest: Marcos Paulo
    episode: "Ele Fez Mais de R$180 Milhões"
    domain: [mindset, produtividade]

  - id: RH-PHI-153
    text: "No capitalismo, o mais importante é acertar a macro tendência. Um negócio mais ou menos numa macro tendência boa vai muito bem"
    guest: Marcos Paulo
    episode: "Ele Fez Mais de R$180 Milhões"
    domain: [estrategia, tendencias]

  - id: RH-PHI-154
    text: "Se seu produto ou empresa consegue ser copiada melhor com 1 bilhão de dólares e 10 dos maiores executivos do país, você não tem defensibilidade real"
    guest: Dennis Nakamura (ex-iFood)
    episode: "#337 Ex-sócio Demitido do iFood"
    domain: [estrategia, competitividade]

  - id: RH-PHI-155
    text: "Eu não acredito em loja própria. Se você tem um empreendedor do outro lado como franqueado, aquela loja vende o dobro. É o olhar do dono na ponta"
    guest: Mário Spaniol (Carmen Steffens)
    episode: "Fundador da Carmen Steffens"
    domain: [franquias, varejo]

  - id: RH-PHI-156
    text: "O melhor produto do mundo que não é conhecido, ele pode morrer. Estamos vivendo o momento do caos — visibilidade é sobrevivência"
    guest: Marcos Paulo
    episode: "Ele Fez Mais de R$180 Milhões"
    domain: [marketing, posicionamento]

  - id: RH-PHI-157
    text: "Educação está na base da construção do negócio desde o dia zero — o blog ensina, o anúncio educa, o vendedor educa. A educação diminui o ciclo de venda"
    guest: Luiz Felipe (Minha Casa Solar)
    episode: "Blog virou E-commerce que Vende Milhões"
    domain: [conteudo, vendas]

  - id: RH-PHI-158
    text: "O empresário/empreendedor é o cara mais solitário do mundo. Por isso cresceu tanto o negócio de mastermind — o cara paga R$100 mil para ter um amigo que entende o jogo"
    guest: Dener Lippert / Ricardo Amidomins
    episode: "#131 Gestão de times Marketing e Growth"
    domain: [empreendedorismo, networking]

  - id: RH-PHI-159
    text: "Na geração de demanda pelo tráfego pago, vem o joio e vem o trigo. Não está só na mão do marketing — tem que ter equipe qualificando essa demanda"
    guest: Gilberto Lames (Pimenta Estética)
    episode: "Negócio Milionário Vendendo Equipamentos de Estética"
    domain: [vendas, trafego]

  - id: RH-PHI-160
    text: "Toda companhia precisa de um sócio marqueteiro — se não tiver um, não dá certo. Precisa de alguém voltado para produto e venda"
    guest: Ícaro de Carvalho
    episode: "Explorando a China"
    domain: [empreendedorismo, marketing]

  - id: RH-PHI-161
    text: "Quando o cliente é o empresário, não o marqueteiro, ele quer um parceiro que pareça um banco — alguém que toma decisão de alocação de capital, não um cara rebelde/herói"
    guest: Natano Mattos / Dener Lippert
    episode: "#175 C&A, Uber e Spotify"
    domain: [posicionamento, branding]

  - id: RH-PHI-162
    text: "Dois anabolizantes para construir autoridade: (1) conteúdo gratuito massivo em volume com qualidade, e (2) satisfação do cliente — ser melhor de entrega do que de venda"
    guest: Marcus Marques
    episode: "#324 Eu Lucrei R$100 Milhões"
    domain: [autoridade, conteudo]

  - id: RH-PHI-163
    text: "O principal papel de todo empreendedor é primeiro vender. Depois ele preocupa com a produção. É a supremacia das vendas"
    guest: Ju Fraccaroli / Dener Lippert
    episode: "#94 Lançamento milionário sem tráfego pago"
    domain: [vendas, empreendedorismo]

  - id: RH-PHI-164
    text: "Descentralização de mídia numa rede de franquias sempre é problema — uma franquia concorre com a mídia da outra. Centralizar a mídia é obrigatório para escala"
    guest: Rodrigo Saviolo (Xprime Academias) / Felipe Samã
    episode: "Academia Dobrou as Vendas com IA"
    domain: [franquias, midia]

  - id: RH-PHI-165
    text: "Em produto complexo, atendimento humanizado ganha de IA. O 1 a 1, a pessoalidade, o relacionamento conta muito. Meus concorrentes substituem vendedores por IA — eu não"
    guest: Gilberto Lames (Pimenta Estética)
    episode: "Negócio Milionário Vendendo Equipamentos de Estética"
    domain: [vendas, atendimento]


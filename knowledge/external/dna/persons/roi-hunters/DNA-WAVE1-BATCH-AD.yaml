# ============================================================================
# L4 — FRAMEWORKS (Metodologias estruturadas nomeadas)
# ============================================================================

frameworks:

  - id: RH-FW-150
    name: "Venda de Clientes para Financiar Aquisição (BS Hub Model)"
    description: "Modelo onde escritório de contabilidade vende clientes novos por 12x o MRR para terceiros, usa o dinheiro antecipado para investir em Google Ads e adquirir mais clientes"
    steps:
      - "Investir em Google Ads para adquirir clientes (CAC ~R$600)"
      - "Vender os clientes adquiridos por 12x o MRR mensal"
      - "Reinvestir todo o valor antecipado em mais Google Ads"
      - "Escalar de 2 para 40 colaboradores e 2.000 clientes em 2 anos"
    guest: Rogério Fameli (BS Hub)
    episode: "#227 Escala de serviços profissionais"
    domain: [aquisicao, financeiro]

  - id: RH-FW-151
    name: "Framework de Influenciadores por Camada"
    description: "Separar influenciadores em 4 camadas com estratégias distintas: Grand Awareness (gifting orgânico), Conversion (afiliados), Community (nano/micro fixos), Events (ativações pontuais)"
    steps:
      - "Grand Awareness: celebridades/macro — gifting/seeding orgânico, sem pagamento"
      - "Conversion: influenciadores médios — programa de afiliados com comissão"
      - "Community: nano/micro regionais — contratos fixos, conteúdo regular"
      - "Events: ativações pontuais — campanhas específicas com CTA"
    guest: Bruna Laviero (Farm Rio)
    episode: "#192 Farm Rio Internacionalização"
    domain: [influenciadores, marketing]

  - id: RH-FW-152
    name: "Uplift de Loja por Influenciador Regional"
    description: "Metodologia para medir o faturamento incremental que cada influenciador traz para lojas específicas, calculando ROI real ao invés de métricas de vaidade"
    steps:
      - "Ativar influenciador em praças específicas (pequenas e grandes)"
      - "Medir faturamento da loja no período com vs sem influenciador"
      - "Calcular uplift (faturamento incremental)"
      - "Derivar ROI = uplift / investimento no influenciador"
      - "Escalar para rede inteira quando ROI comprovado"
    guest: Marcio Apolinário
    episode: "#215 Influenciadores Regionais"
    domain: [influenciadores, metricas]

  - id: RH-FW-153
    name: "Modelo Evento + Esteira (Marcus Marques)"
    description: "Usar eventos presenciais low-ticket como front-end de aquisição, convertendo participantes para esteira de produtos high-ticket via pitch no palco"
    steps:
      - "Viajar pelo Brasil fazendo pequenos eventos para empresários"
      - "Cobrar ticket de entrada baixo (front-end)"
      - "Durante evento, construir rapport, entregar valor real"
      - "No final, fazer pitch para imersão/acelerador (high-ticket)"
      - "Converter para esteira: imersão → mentoria → Giantz"
    guest: Marcus Marques
    episode: "#324 Eu Lucrei R$100 Milhões"
    domain: [vendas, eventos, infoprodutos]

  - id: RH-FW-154
    name: "Hub de Serviços para Contadores (BS Hub)"
    description: "Modelo onde contadores pagam fixo para acessar marca/educação, vendem serviços adjacentes (marcas e patentes, certificado digital) na própria base, lucro dividido 50/50"
    steps:
      - "Recrutar contadores para o hub (~1.800 na base)"
      - "Cobrar fixo por acesso a marca, educação e sistema"
      - "Oferecer serviços adjacentes (marcas/patentes, certificado digital, crédito)"
      - "Contador vende na base dele, lucro 50/50"
      - "Economia de escala: volume = preço menor por unidade"
    guest: Rogério Fameli (BS Hub)
    episode: "#227 Escala de serviços profissionais"
    domain: [parcerias, escala, saas]

  - id: RH-FW-155
    name: "Canal de Parceiros para Escala B2B"
    description: "Ao invés de contratar 5 vendedores, contratar 4 vendedores + 1 pessoa de canais. Estratégia de canais demora mais (6-24 meses) mas escala exponencialmente"
    steps:
      - "Mapear verticais de negócios com sinergias"
      - "Recrutar parceiros estratégicos que atendem mesmo ICP"
      - "Definir modelo de incentivo (revenue share, bonificação, co-sell)"
      - "Treinar e habilitar parceiros no seu produto/serviço"
      - "Medir pipeline gerado por parceiros vs direto"
    guest: Guilherme de Sushi (Microsoft)
    episode: "#224 Escalando através de Canais de Parcerias"
    domain: [parcerias, b2b, escala]

  - id: RH-FW-156
    name: "Conteúdo por Tema Semanal"
    description: "Definir 1 tema por semana e buscar 3-4 pesquisas sobre ele. Todos os posts da semana giram em torno daquele tema. Uma pesquisa de 200 páginas rende a semana inteira de conteúdo"
    steps:
      - "Escolher 1 tema da semana (ex: marketing de influência)"
      - "Buscar 3-4 pesquisas/artigos sobre o tema"
      - "Criar múltiplos ângulos de conteúdo sobre o mesmo tema"
      - "Publicar durante a semana com variações"
    guest: Marcio Apolinário
    episode: "#215 Influenciadores Regionais"
    domain: [conteudo, produtividade]

  - id: RH-FW-157
    name: "Experiência Imersiva de Unboxing (Caso Gamer)"
    description: "Transformar a entrega de um produto em experiência narrativa completa com quadrinhos, cristal, pergaminho de iniciação e linguagem épica para viralização orgânica"
    steps:
      - "Criar narrativa de marca com personagens (quadrinhos)"
      - "Ligar pós-compra em até 2h, capturar WhatsApp, enviar PDF dos quadrinhos"
      - "Embalagem = baú do tesouro (mesmo custo que caixa normal)"

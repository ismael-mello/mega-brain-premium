# =============================================================================
# L1: PHILOSOPHIAS (Core Beliefs & Worldviews)
# =============================================================================
L1_PHILOSOPHIES:

  - id: RH-PHI-050
    title: "Cultura é educação, não retenção de talentos"
    content: "Construímos um negócio de bilhão com talentos medianos mas muito educados com mentalidade empreendedora. Não busco talento pronto — invisto em educação empreendedora para transformar qualquer pessoa."
    guest: "Mario Magalhães"
    episode: "A Filosofia Polêmica de Gestão do Homem que Descobriu o Flávio Augusto"
    tags: [cultura, liderança, educação, gestão-de-pessoas]

  - id: RH-PHI-051
    title: "Toda empresa precisa virar uma escola"
    content: "Todo negócio tem que se transformar no negócio de educação. Tem que ter uma musculatura, um viés de educação. Quem não tiver disposição de entregar educação empreendedora para o seu time vai perder para produtos inferiores que entregam esse tipo de solução."
    guest: "Mario Magalhães"
    episode: "A Filosofia Polêmica de Gestão"
    tags: [cultura, educação-corporativa, liderança]

  - id: RH-PHI-052
    title: "CRM é mais importante que aquisição"
    content: "Se amanhã acabar a verba de marketing, como é que você faz para vender? Se você não sabe, você não tem CRM. Não dá para construir uma empresa que, para falar com o seu cliente, tem que gastar dinheiro em outra empresa."
    guest: "Augusto Rocha (PMWeb)"
    episode: "A importância do CRM em uma estratégia de marketing (#139)"
    tags: [crm, aquisição, retenção, independência]

  - id: RH-PHI-053
    title: "Growth é crescer sustentavelmente, não adquirir a qualquer custo"
    content: "Growth não pode ser trazer cliente a todo custo. É trazer o cliente bom que vai engajar, que vai reter, que vai monetizar e que vai recomendar. Growth é sobre crescimento sustentável."
    guest: "Robson Harada"
    episode: "Como Dobrar Seu ROAS (#271)"
    tags: [growth, sustentabilidade, aquisição]

  - id: RH-PHI-054
    title: "Cliente no centro — não a ferramenta"
    content: "Muitas vezes a gente fica focado nas etapas para adquirir clientes e esquece que a gente vive de cliente. Quando coloca o cliente no centro, começa a necessidade de se relacionar com ele."
    guest: "Augusto Rocha (PMWeb)"
    episode: "A importância do CRM (#139)"
    tags: [customer-centric, crm, relacionamento]

  - id: RH-PHI-055
    title: "Quem tem o maior LTV ganha"
    content: "Quem tem o maior LTV ganha. Porque você pode pagar mais no CAC. Por que banco paga tanto no CAC? Porque a relação com banco é 30 anos. Quase sempre, é melhor vender na Amazon/Mercado Livre porque esse cara tem tanto LTV que na mesma palavra-chave você vai tomar um pau."
    guest: "Robson Harada"
    episode: "Como Dobrar Seu ROAS (#271)"
    tags: [ltv, cac, competitividade, marketplace]

  - id: RH-PHI-056
    title: "Indústria precisa pensar no sell-out, não só no sell-in"
    content: "Se o varejo vai bem, eu vou bem. Quando eu como indústria penso em como fazer meu varejo vender mais para o consumidor final, eu crio uma máquina de crescimento que beneficia toda a cadeia."
    guest: "Erich Shibata (CIMED)"
    episode: "Branding & Cultura com Erich Shibata da CIMED"
    tags: [sell-out, varejo, trade-marketing, indústria]

  - id: RH-PHI-057
    title: "Retenção é diferente de recorrência"
    content: "Retenção está muito mais para relevância e uso do que necessariamente recompra. A recompra é um fator que acontece no tempo, mas não precisa acontecer imediatamente. Posso ter retenção sem recorrência — o próximo celular será iPhone mesmo sem assinatura."
    guest: "Bruno Nardon"
    episode: "Como aumentar a retenção de clientes (#262)"
    tags: [retenção, recorrência, relevância, product-market-fit]

  - id: RH-PHI-058
    title: "O milionário empata na primeira venda, o bilionário aceita perder"
    content: "O milionário é o cara que aceita empatar na primeira venda. O bilionário é o cara que aceita tomar prejuízo na primeira venda — porque sabe que o LTV futuro compensa."
    guest: "Érico Rocha"
    episode: "Como Explodir de Vender em um Lançamento Digital (#31)"
    tags: [ltv, cac, investimento, longo-prazo]

  - id: RH-PHI-059
    title: "Marca pessoal é limitante — empresa escala sem o fundador"
    content: "Sou uma espécie de limitante da minha empresa. A gente fez 22% de conversão num evento sem mim, versus 11% comigo no Rio. Não é que sem mim é melhor — é que eu não sou necessário para ter ROI grande."
    guest: "Érico Rocha"
    episode: "Como Explodir de Vender em um Lançamento Digital (#31)"
    tags: [marca-pessoal, escalabilidade, delegação]

  - id: RH-PHI-060
    title: "Empreender é chamar para si a responsabilidade"
    content: "A origem da palavra empreendedorismo é chamar para si, assumir a responsabilidade. Tem muito dono de empresa que não empreende — é dono de CNPJ. Empreender é fazer a diferença que só você pode fazer."
    guest: "Mario Magalhães"
    episode: "A Filosofia Polêmica de Gestão"
    tags: [empreendedorismo, mindset, responsabilidade]

  - id: RH-PHI-061
    title: "Tecnologia vem depois — processo e cultura vem antes"
    content: "O maior erro em CRM é pensar na ferramenta antes do processo. Primeiro: qual é a cultura da sua empresa? Tem uma cultura de vendas, de resultado, de estar perto do cliente? Depois: quais são os processos? Aí sim, a tecnologia."
    guest: "Daniel Rouber (Salesforce VP LATAM)"
    episode: "As Grandes Mudanças que Vão Dominar Vendas em 2026 (#326)"
    tags: [crm, cultura, processo, tecnologia]

  - id: RH-PHI-062
    title: "A mídia é sexy, mas o lucro está no CRM"
    content: "Muita gente pensa que V4 é comprar tráfego pago. A mídia é muito sexy, mas ela não é onde está o lucro. O lucro está no CRM, na retenção, em vender várias vezes para o mesmo cliente."
    guest: "V4 Company (Dener Lippert)"
    episode: "Como aumentar a retenção (#262)"
    tags: [crm, tráfego, lucro, retenção]

# =============================================================================
# L2: MENTAL MODELS (Thinking Frameworks & Decision Lenses)
# =============================================================================
L2_MENTAL_MODELS:

  - id: RH-MM-050
    title: "Acquisition → Retention → Monetization (Framework de Growth)"
    content: "Growth se divide em três momentos: Acquisition (adquirir clientes, mesmo que não paguem), Retention (manter na base, gerar experiência) e Monetization (extrair valor, cross-sell, upsell). A maioria esquece da monetização."
    guest: "V4 Company (Ricardo / Guilherme)"
    episode: "Acquisition, Retention, Monetization = Growth (#170)"
    tags: [growth, acquisition, retention, monetization]

  - id: RH-MM-051
    title: "Mar Aberto vs Aquário Próprio"
    content: "Pescar no mar aberto (aquisição via mídia paga) vs criar seu próprio aquário (base proprietária). O aquário é onde está o verdadeiro asset — é a audiência adquirida e retida que você pode monetizar sem depender de terceiros."
    guest: "V4 Company"
    episode: "Acquisition, Retention, Monetization = Growth (#170)"
    tags: [base-proprietária, audiência, independência, mídia]

  - id: RH-MM-052
    title: "Boi de Piranha — Produto isca que atrai para monetizar depois"
    content: "O balaio de promoção do supermercado (meia por R$5) é o boi de piranha — isca para atrair o cliente. A ideia é adquirir o cliente para a loja, e dentro da loja monetizar com produtos de maior margem. Funciona em qualquer mercado."
    guest: "V4 Company"
    episode: "Acquisition, Retention, Monetization = Growth (#170)"
    tags: [isca, aquisição, monetização, varejo]

  - id: RH-MM-053
    title: "LTV Cruzado — Cross-sell aumenta retenção de outros produtos"
    content: "Adicionar um produto (ex: cartão de crédito no banco de investimento) aumenta o LTV do produto original. O cartão criou ponto de contato diário, o que aumentou a retenção de investimentos. É um LTV cruzado via retenção maior."
    guest: "V4 Company / Ricardo (XP)"
    episode: "Acquisition, Retention, Monetization = Growth (#170)"
    tags: [ltv, cross-sell, retenção, ponto-de-contato]

  - id: RH-MM-054
    title: "Custo de Servir como critério de decisão"
    content: "A decisão de focar em cliente premium vs volume depende do custo de servir. Se o custo de servir é o mesmo para o cliente de R$100 e de R$12k, vale pegar volume. Se o custo é proporcional ao ticket, foque no premium."
    guest: "Robson Harada"
    episode: "Como Dobrar Seu ROAS (#271)"
    tags: [custo-de-servir, precificação, segmentação]

  - id: RH-MM-055
    title: "Gráfico de Diferenciação Competitiva (eixos X/Y)"
    content: "Desenhe um gráfico com critérios de diferenciação (preço, frescor, mix, limpeza, conveniência) e compare sua marca com concorrentes de 0-5 em cada critério. Identifique onde você ganha e onde perde para definir posicionamento."
    guest: "Bruno Nardon"
    episode: "Como aumentar a retenção de clientes (#262)"
    tags: [diferenciação, posicionamento, análise-competitiva]

  - id: RH-MM-056
    title: "Inversão do PID — O mercado como laboratório"
    content: "Em vez de gastar bilhões em P&D interno, as grandes empresas incentivam o mercado (startups) a inovar com capital próprio, depois compram as que funcionam. O conceito de startup foi criado pelo B2B para baratear a despesa de P&D."
    guest: "Carlos Busch"
    episode: "Como Crescer e Precificar no Mercado B2B (#232)"
    tags: [b2b, inovação, aquisição, startup]

  - id: RH-MM-057
    title: "Retenção como Product-Market Fit"
    content: "Retenção começa com: meu produto resolve um problema relevante? Tem diferencial competitivo? É um monopólio? Quando você tem product-market fit forte, a retenção vem by default — todo o resto é ferramental."
    guest: "Bruno Nardon"
    episode: "Como aumentar a retenção de clientes (#262)"
    tags: [product-market-fit, retenção, diferenciação]

  - id: RH-MM-058
    title: "Ecossistema Apple — Produto que prende no ecossistema"
    content: "Apple adquire pelo iPhone, retém pela experiência, monetiza com Watch/TV/iCloud. Cada produto novo é uma nova forma de monetizar um cliente já retido. Se não lançar novos produtos, não há como o marketing fazer o cliente gastar mais."
    guest: "V4 Company"
    episode: "Acquisition, Retention, Monetization = Growth (#170)"
    tags: [ecossistema, apple, monetização, cross-sell]

  - id: RH-MM-059
    title: "Sell-in vs Sell-out — Duas fases do crescimento de indústria"
    content: "Primeiro fase: conquistar o varejista (sell-in) com relacionamento, treinamento, condições comerciais. Segunda fase: fazer o consumidor ir até a farmácia buscar o produto (sell-out). Quando sell-in satura, sell-out é o próximo motor."
    guest: "Erich Shibata (CIMED)"
    episode: "Branding & Cultura com CIMED"
    tags: [sell-in, sell-out, varejo, indústria]

  - id: RH-MM-060
    title: "Segmentação de Conversão por Valor (A/B/C/D/E)"
    content: "Segmente conversões por valor do cliente: A (depósito >100k, CPA R$1000), B (50-100k, CPA R$500), C (10-50k, CPA R$200), D (5-10k, CPA R$100), E (negativo — não quero). Cada segmento tem um CPA máximo permissivo diferente."
    guest: "Robson Harada"
    episode: "Como Dobrar Seu ROAS (#271)"
    tags: [segmentação, cpa, conversão, mídia-paga]


# ============================================================================
# L1: PHILOSOPHIES (Core beliefs, worldviews, principles)
# ============================================================================

philosophies:

  - id: RH-PHI-100
    element: "O resultado de marketing sempre aparece nos indicadores que você já tem no final do funil — Out of Home, branding, awareness, tudo converge pro digital bem estruturado"
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Lucio Shneider (Eletromídia)"
    tags: [midia, out-of-home, funil]

  - id: RH-PHI-101
    element: "A página de obrigado é a página mais importante de todos os funis — é onde você monetiza o lead que já converteu"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Dener Lippert / Yuri (V4)"
    tags: [funil, conversao, pagina-obrigado]

  - id: RH-PHI-102
    element: "IA vai ser igual a internet — ninguém vai ter 'departamento de IA', vai ser pano de fundo para tudo, como ninguém tem 'departamento de internet'"
    source_file: "transcription_Como_fazer_um_Lan_amento_de_7_D_GITOS_com_Intelig_ncia_Artificial___ROI_Hunters_.md"
    guest: "Convidado lançamento IA"
    tags: [ia, tendencias, mentalidade]

  - id: RH-PHI-103
    element: "Quando você constrói a escada de valor de trás pra frente (do ticket maior pro menor), garante que quem entra no produto de entrada sobe naturalmente — cada produto cria um 'mador' para o próximo"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Dener Lippert"
    tags: [escada-valor, pricing, funil]

  - id: RH-PHI-104
    element: "O mentor não vende conhecimento — vende atalho. A experiência de quem já errou vale mais que qualquer curso teórico"
    source_file: "transcription_Como_se_tornar_um_mentor__Conselhos_sobre_Mentoria_com_Victor_Dam_sio___ROI_Hunt.md"
    guest: "Victor Damásio"
    tags: [mentoria, valor-percebido]

  - id: RH-PHI-105
    element: "Contratação é investimento, não custo — o ROI de uma boa contratação paga 10x, e o custo de uma contratação errada é 3-5x o salário anual"
    source_file: "transcription_Como_Gerar_MAIS_LUCRO_com_as_Suas_Contrata__es__Ricardo_Basaglia____ROI_Hunters_.md"
    guest: "Ricardo Basaglia"
    tags: [contratacao, rh, gestao]

  - id: RH-PHI-106
    element: "Soft skills sem hard skills é 'anão em time de basquete' — não adianta ter perfil comportamental perfeito se a pessoa não consegue instalar a competência técnica necessária"
    source_file: "transcription_Como_Gerar_MAIS_LUCRO_com_as_Suas_Contrata__es__Ricardo_Basaglia____ROI_Hunters_.md"
    guest: "Ricardo Basaglia"
    tags: [contratacao, hard-skill, soft-skill]

  - id: RH-PHI-107
    element: "Lifestyle selling funciona — quando o prospect te vê em Maldivas, ele não compra o curso, compra a promessa de ir pra Maldivas"
    source_file: "transcription_Como_Montar_um_Time_de_Vendas_que_Bate_Meta_Todos_os_Meses___ROI_Hunters__328.md"
    guest: "Yuri (V4)"
    tags: [vendas, lifestyle, social-selling]

  - id: RH-PHI-108
    element: "Conteúdo é o melhor investimento de longo prazo — audiência construída com consistência vira um ativo que gera leads orgânicos indefinidamente"
    source_file: "transcription_Como_se_constr_i_uma_audi_ncia__Com_Samuel_Pereira_-_ROI_Hunters__121.md"
    guest: "Samuel Pereira"
    tags: [conteudo, audiencia, organico]

  - id: RH-PHI-109
    element: "IA não substitui o ser humano em vendas — IA amplifica o vendedor, ajudando ele a se preparar melhor pra call, o que gera 30% mais conversão"
    source_file: "transcription_Como_Sair_do_B_sico_e_usar_Intelig_ncia_Artificial_de_VERDADE___ROI_Hunters__304.md"
    guest: "Convidado IA"
    tags: [ia, vendas, amplificacao]

  - id: RH-PHI-110
    element: "Marca forte não compete por preço — quando você tem brand equity, o cliente paga premium porque confia e se identifica"
    source_file: "transcription_Construir_Marca_ou_Vender_Mais____ROI_Hunters__199.md"
    guest: "Dener Lippert"
    tags: [marca, branding, pricing]

  - id: RH-PHI-111
    element: "Movimento > Marketing — para escalar de verdade, precisa de um movimento com bandeira. O framework é XXX: eXposição do problema, eXcitação do público, eXpansão da solução"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Marketing__Arqu_tipos_e_Narrativas_com_Gilberto_Augusto.md"
    guest: "Gilberto Augusto"
    tags: [movimento, narrativa, escala]

  - id: RH-PHI-112
    element: "ChatGPT nunca vai substituir presencialidade e comunidade — essas são as duas coisas que IA não replica: te introduzir para pessoas e estar presente fisicamente"
    source_file: "transcription_De_Copywriter_a_Empres_ria_Multimilion_ria_-_O_Case_da_Bettina_Rudolph___ROI_Hun.md"
    guest: "Bettina Rudolph"
    tags: [ia, comunidade, presencialidade]

  - id: RH-PHI-113
    element: "Copy não é escrever bonito — é entender profundamente a dor do cliente e traduzir em linguagem que gera ação. O copywriter é um tradutor de desejos"
    source_file: "transcription_Copywriting_S_A__-_O_Case_de__caro_de_Carvalho___ROI_Hunters__270.md"
    guest: "Ícaro de Carvalho"
    tags: [copywriting, vendas, comunicacao]

  - id: RH-PHI-114
    element: "Franquia é uma máquina de expansão — mas só funciona se o franqueador domina tanto o negócio quanto o suporte ao franqueado"
    source_file: "transcription_DE_0_A_300_FRANQUIAS_COM_LEONARDO_CASTELO___ROI_HUNTERS__171.md"
    guest: "Leonardo Castelo"
    tags: [franquias, escala, modelo-negocio]

  - id: RH-PHI-115
    element: "Eu-tagogia > Pedagogia — adultos aprendem por autogestão do conhecimento, não por currículo imposto. Ensine direcionando para o objetivo do aluno, não para o conteúdo programático"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Marketing__Arqu_tipos_e_Narrativas_com_Gilberto_Augusto.md"
    guest: "Gilberto Augusto"
    tags: [educacao, andragogia, metodologia]

  - id: RH-PHI-116
    element: "M&A é mais rápido que crescimento orgânico — comprar empresas que já têm clientes, time e receita acelera o crescimento em anos"
    source_file: "transcription_Comprar_Empresas_como_Estrat_gia_de_Crescimento__M_A_com_Dion_sio_Freire___ROI_H.md"
    guest: "Dionísio Freire"
    tags: [ma, crescimento, estrategia]

  - id: RH-PHI-117
    element: "Bonificação bem estruturada fideliza mais que desconto — o cliente que recebe cashback/pontos volta mais, gasta mais e vira advogado da marca"
    source_file: "transcription_Como_utilizar_bonifica__o_e_CRM___com_Alexandre_Zolko_da_CRM_B_nus____ROI_Hunter.md"
    guest: "Alexandre Zolko (CRM Bônus)"
    tags: [crm, fidelizacao, bonificacao]

  - id: RH-PHI-118
    element: "O algoritmo do YouTube quer que a pessoa passe mais tempo na plataforma — se você entende isso, otimiza para retenção e o algoritmo te entrega audiência de graça"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Podcast_-_O_Case_do_Market_Makers___ROI_Hunters__319.md"
    guest: "Market Makers"
    tags: [youtube, algoritmo, conteudo]

  - id: RH-PHI-119
    element: "A teoria das restrições aplicada a marketing: identifique o gargalo do funil, resolva ele primeiro, e todo o sistema melhora — não otimize onde não é o bottleneck"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Dener Lippert"
    tags: [teoria-restricoes, funil, otimizacao]

# ============================================================================
# L2: MENTAL MODELS (Thinking frameworks, decision lenses)
# ============================================================================

mental_models:

  - id: RH-MM-100
    element: "Matriz Intencionalidade x Atenção para canais de mídia: Out of Home = baixa intenção + alta atenção (elevador). Google = alta intenção + baixa atenção. Instagram = média/média"
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Dener Lippert"
    tags: [canais, midia, modelo-decisao]

  - id: RH-MM-101
    element: "Modelo de contratação por Pipeline: aquisição de talentos funciona igual aquisição de clientes — você precisa de funil, nutrição e timing. O melhor candidato está empregado e feliz, você precisa estar lá quando ele ficar infeliz"
    source_file: "transcription_Como_Gerar_MAIS_LUCRO_com_as_Suas_Contrata__es__Ricardo_Basaglia____ROI_Hunters_.md"
    guest: "Ricardo Basaglia"
    tags: [contratacao, funil, talent-acquisition]

  - id: RH-MM-102
    element: "Modelo ROAS diário: em vez de medir ROAS mensal, meça quanto gastou e quanto vendeu TODO DIA. Se todo dia fecha positivo, o mês fecha mega positivo. Elimina surpresas"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [metricas, roas, controle-diario]

  - id: RH-MM-103
    element: "Modelo de Qualificação por Gancho: quanto mais você fala de DOR no anúncio (não benefício), mais qualificado é o lead. Benefício atrai curioso; dor atrai quem já tem o problema"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [qualificacao, anuncio, lead-gen]

  - id: RH-MM-104
    element: "Modelo Looping de OOH: campanhas de Out of Home funcionam em loops de frequência — 1 inserção a cada 3-4 minutos nos edifícios gera familiaridade mesmo com baixo investimento"
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Lucio Shneider"
    tags: [ooh, frequencia, awareness]

  - id: RH-MM-105
    element: "Modelo de Influência por Valor Gerado: em vez de pagar cachê alto ao influenciador, gere valor real (viagens, experiências). Custo de R$80K vira R$7.800 quando você gera valor mútuo"
    source_file: "transcription_Como_Monetizar_amizade____ROI_Hunters__211.md"
    guest: "Convidado monetização"
    tags: [influencer, negociacao, valor]

  - id: RH-MM-106
    element: "Modelo de Conteúdo do YouTube: CTR do thumbnail + % médio visualizado = as duas métricas que fazem o algoritmo te entregar. Spotify cresce por rede (boca a boca), YouTube cresce por ciência (otimização)"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Podcast_-_O_Case_do_Market_Makers___ROI_Hunters__319.md"
    guest: "Market Makers"
    tags: [youtube, podcast, algoritmo]

  - id: RH-MM-107
    element: "Modelo de Lançamento com IA: grave 5 criativos humanos, depois use IA para gerar 100+ variações. O humano define a mensagem, a IA escala a produção"
    source_file: "transcription_Como_fazer_um_Lan_amento_de_7_D_GITOS_com_Intelig_ncia_Artificial___ROI_Hunters_.md"
    guest: "Convidado lançamento IA"
    tags: [ia, lancamento, criativos]

  - id: RH-MM-108
    element: "Modelo de escada de consciência para lançamento: o lead precisa estar 'esquentado pelo zeitgeist' — se o mercado está falando de IA, seu lançamento de IA surfa essa onda de awareness gratuita"
    source_file: "transcription_Como_fazer_um_lan_amento_digital_passo_a_passo__com_Fernando_Miranda____ROI_Hunt.md"
    guest: "Fernando Miranda"
    tags: [lancamento, consciencia, timing]

  - id: RH-MM-109
    element: "Modelo de Evento como Funil: evento presencial não é custo — é o topo do funil mais qualificado que existe. Quem vai presencialmente já demonstrou intenção máxima"
    source_file: "transcription_Como_tirar_ROI_de_Eventos____ROI_Hunters__213.md"
    guest: "Dener Lippert"
    tags: [eventos, funil, qualificacao]

  - id: RH-MM-110
    element: "Modelo de IA como amplificador (não substituto): use IA para preparar o vendedor antes da call (resumo do deal, sugestões de abordagem), não para substituir a call. 30% mais conversão por call melhor preparada"
    source_file: "transcription_Como_Sair_do_B_sico_e_usar_Intelig_ncia_Artificial_de_VERDADE___ROI_Hunters__304.md"
    guest: "Convidado IA"
    tags: [ia, vendas, amplificacao]

  - id: RH-MM-111
    element: "Modelo de validação de franquia por cliente oculto: antes de escalar franquia, faça cliente oculto no seu próprio negócio e nos concorrentes para entender gaps de experiência"
    source_file: "transcription_Como_vender_franquias_atrav_s_da_Internet___ROI_Hunters__117.md"
    guest: "Equipe V4"
    tags: [franquias, validacao, experiencia]

  - id: RH-MM-112
    element: "Modelo de Repertório para Criatividade: quanto mais inputs diversos (cinema, filosofia, museu, viagens), mais conexões criativas o cérebro faz. Premissa 1 + Premissa 2 = Conclusão inesperada"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Marketing__Arqu_tipos_e_Narrativas_com_Gilberto_Augusto.md"
    guest: "Gilberto Augusto"
    tags: [criatividade, repertorio, inovacao]

  - id: RH-MM-113
    element: "Modelo de M&A por múltiplo de receita: para empresas de serviço, pague 2-4x o faturamento anual. Para SaaS, 6-10x ARR. Para e-commerce, 1-3x"
    source_file: "transcription_Comprar_Empresas_como_Estrat_gia_de_Crescimento__M_A_com_Dion_sio_Freire___ROI_H.md"
    guest: "Dionísio Freire"
    tags: [ma, valuation, multiplos]

  - id: RH-MM-114
    element: "Modelo de Publicidade Nativa: anúncios que parecem conteúdo editorial performam melhor porque o usuário não tem banner blindness — Taboola/Outbrain exploram isso com CTR 2-5x maior que display"
    source_file: "transcription_DESVENDADO_A_PUBLICIDADE_NATIVA_COM_A_TABOOLA___ROI_Hunters__186.md"
    guest: "Taboola"
    tags: [native-ads, publicidade, ctr]

# ============================================================================
# L3: HEURISTICS (Practical rules with numbers/thresholds)
# ============================================================================

heuristics:

  - id: RH-HEUR-100
    element: "Out of Home no elevador a partir de R$249/mês por torre — ponto de entrada para PMEs testarem OOH com geolocalização"
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Lucio Shneider"
    tags: [ooh, investimento, pme]
    threshold: "R$249/mês/torre"

  - id: RH-HEUR-101
    element: "Cross de OOH + Digital: case fast food teve +254% pedidos em SP, +80% no Rio, e +15% na taxa de cliques do digital ao adicionar OOH ao mix"
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Lucio Shneider"
    tags: [ooh, digital, resultados]
    threshold: "+254% pedidos SP, +80% RJ, +15% CTR"

  - id: RH-HEUR-102
    element: "Eletromídia: 70 mil pontos no Brasil, 50 mil digitais. Segmentação torre a torre, por demografia, comportamento ou afinidade setorial"
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Lucio Shneider"
    tags: [ooh, inventario, segmentacao]
    threshold: "70K pontos, 50K digitais"

  - id: RH-HEUR-103
    element: "Taxa de qualificação de funis: a média do mercado é 20% de agendamento a partir de MQLs. Se você está em 60%, seu comercial é excepcional"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [vendas, qualificacao, benchmark]
    threshold: "20% média, 60% excepcional"

  - id: RH-HEUR-104
    element: "IA para SDR: quadruplica atendimentos — de 25 leads/dia para 100 leads/dia por SDR, mantendo mesma taxa de agendamento"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [ia, sdr, produtividade]
    threshold: "25 → 100 leads/dia por SDR (4x)"

  - id: RH-HEUR-105
    element: "ROAS diário: se você mede gasto vs venda todo dia e todo dia fecha positivo, o mês fecha muito positivo. Exemplo: ROAS médio 17 no dia, 13 na semana (por dias mortos)"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [roas, metricas, controle]
    threshold: "ROAS 13-17x diário"

  - id: RH-HEUR-106
    element: "Lançamento com IA: 5 criativos gravados + 100 variações por IA = investimento de R$100K+ para bater 7 dígitos (R$1M) no primeiro lançamento"
    source_file: "transcription_Como_fazer_um_Lan_amento_de_7_D_GITOS_com_Intelig_ncia_Artificial___ROI_Hunters_.md"
    guest: "Convidado lançamento"
    tags: [lancamento, ia, criativos]
    threshold: "5 criativos humanos + 100 variações IA → R$1M"

  - id: RH-HEUR-107
    element: "Lançamento digital: conversão de vídeo de vendas previsível em 0.6% quando você controla a qualificação do MQL. Com isso, 131 vendas previstas vs 132 realizadas"
    source_file: "transcription_Como_fazer_um_lan_amento_digital_passo_a_passo__com_Fernando_Miranda____ROI_Hunt.md"
    guest: "Fernando Miranda"
    tags: [lancamento, conversao, previsibilidade]
    threshold: "0.6% conversão em VSL qualificado"

  - id: RH-HEUR-108
    element: "Influenciador: cachê de R$80K virou R$7.800 ao gerar valor (viagem) em vez de pagar dinheiro. ROI do post muito superior ao investimento"
    source_file: "transcription_Como_Monetizar_amizade____ROI_Hunters__211.md"
    guest: "Convidado monetização"
    tags: [influencer, custo, negociacao]
    threshold: "R$80K → R$7.800 via troca de valor"

  - id: RH-HEUR-109
    element: "Custo de contratação errada: 3-5x o salário anual do cargo. Para um gerente de R$15K/mês, errar custa R$540K-R$900K"
    source_file: "transcription_Como_Gerar_MAIS_LUCRO_com_as_Suas_Contrata__es__Ricardo_Basaglia____ROI_Hunters_.md"
    guest: "Ricardo Basaglia"
    tags: [contratacao, custo, rh]
    threshold: "3-5x salário anual"

  - id: RH-HEUR-110
    element: "SDR atende ~50 reuniões/mês, closer faz 250 atendimentos/mês — dimensionar time comercial por essa capacidade"
    source_file: "transcription_Como_Sair_do_B_sico_e_usar_Intelig_ncia_Artificial_de_VERDADE___ROI_Hunters__304.md"
    guest: "Convidado IA"
    tags: [vendas, capacidade, dimensionamento]
    threshold: "SDR: 50 reuniões/mês, Closer: 250 atendimentos/mês"

  - id: RH-HEUR-111
    element: "Escada de valor: ter ofertas de R$6K, R$9K, R$30K, R$37K e R$70K para atender diferentes qualificações. O SDR tagueia qual produto é ideal baseado no faturamento do lead"
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [escada-valor, pricing, vendas]
    threshold: "5 níveis de ticket: R$6K a R$70K"

  - id: RH-HEUR-112
    element: "Curva de fechamento de franquia: ~50-60 dias da geração do lead até o fechamento. Não espere gerar lead e fechar no mesmo mês"
    source_file: "transcription_Como_vender_franquias_atrav_s_da_Internet___ROI_Hunters__117.md"
    guest: "Equipe V4"
    tags: [franquias, ciclo-venda, expectativa]
    threshold: "50-60 dias de ciclo de venda"

  - id: RH-HEUR-113
    element: "Podcast: YouTube cresce se você acertar título + CTR + % médio visualizado. Spotify cresce por recomendação boca a boca — estratégias completamente diferentes"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Podcast_-_O_Case_do_Market_Makers___ROI_Hunters__319.md"
    guest: "Market Makers"
    tags: [podcast, youtube, spotify]
    threshold: "YouTube = ciência (CTR + retenção), Spotify = rede"

  - id: RH-HEUR-114
    element: "Lançamento: ROI de 10x era 'ruim' na XP — investia R$300K e voltava R$3M. O medo de escalar (botar R$1M de mídia) é o maior limitador"
    source_file: "transcription_Como_fazer_um_lan_amento_digital_passo_a_passo__com_Fernando_Miranda____ROI_Hunt.md"
    guest: "Fernando Miranda"
    tags: [lancamento, roi, escala]
    threshold: "ROI 10x em lançamento, R$300K → R$3M"

  - id: RH-HEUR-115
    element: "CPMQL reduzido pela metade: a chave é qualificar melhor no topo do funil (perguntas no formulário, lead scoring) para não encher o comercial de lead ruim"
    source_file: "transcription_Como_Reduzimos_nosso_CPMQL_pela_METADE____ROI_Hunters__228.md"
    guest: "Equipe V4"
    tags: [cpmql, qualificacao, funil]
    threshold: "CPMQL reduzido 50% com melhor qualificação"

  - id: RH-HEUR-116
    element: "Newsletter como funil: criar 'dossiers' temáticos (ex: Dossier Brasil com opinião dos 5 melhores economistas) gera captação de email qualificado e constrói autoridade"
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Podcast_-_O_Case_do_Market_Makers___ROI_Hunters__319.md"
    guest: "Market Makers"
    tags: [newsletter, lead-magnet, conteudo]

  - id: RH-HEUR-117
    element: "Instagram: algoritmo prioriza compartilhamento > salvamento > comentário > curtida. Conteúdo educacional gera salvamento, conteúdo polêmico gera comentário, conteúdo com identidade gera compartilhamento"

# ============================================================================
# L5: METHODOLOGIES (Step-by-step implementations)
# ============================================================================

methodologies:

  - id: RH-MET-100
    element: |
      Metodologia de Qualificação por Gancho no Anúncio:
      1. Escreva o gancho do anúncio focando na DOR (não benefício)
      2. Quanto mais específica a dor, mais qualificado o lead
      3. Exemplo: "Se você está procurando contratar alguém pro time comercial" = fala com quem já tem time
      4. CTR será menor, mas qualificação será muito maior
      5. O closer recebe leads que já sabem o que querem
      6. Resultado: mesma conversão do closer, ticket médio maior
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [anuncio, qualificacao, gancho]

  - id: RH-MET-101
    element: |
      Metodologia de Lançamento Digital Passo a Passo (Fernando Miranda):
      1. AQUECIMENTO: surfe o zeitgeist (o mercado já fala do tema)
      2. CURSO GRÁTIS: 3 aulas de ~30min cada, educando e elevando consciência
      3. Na aula 3: "Quer aprofundar? Tenho um programa completo"
      4. VSL: vídeo de vendas com conversão esperada de 0.6% se MQL bem qualificado
      5. CARRINHO: aberto por 7 dias com contagem regressiva
      6. CONTROLE: preveja vendas = leads qualificados × 0.6%
      7. ESCALA: se ROI > 5x, aumente investimento em mídia
      Benchmark: R$300K investidos → R$3M de receita (ROI 10x)
    source_file: "transcription_Como_fazer_um_lan_amento_digital_passo_a_passo__com_Fernando_Miranda____ROI_Hunt.md"
    guest: "Fernando Miranda"
    tags: [lancamento, passo-a-passo, digital]

  - id: RH-MET-102
    element: |
      Metodologia de Construção de Escada de Valor (de trás pra frente):
      1. DEFINA o produto de maior ticket (ex: R$70K mentoria)
      2. Crie o produto imediatamente abaixo que PREPARA para ele (ex: R$37K programa)
      3. Continue descendo: R$30K, R$9K, R$6K
      4. Na base: produto de entrada R$17-97 (evento ou mini-curso)
      5. Cada nível cria "mador" — desejo pelo próximo
      6. O SDR tagueia qual produto é ideal baseado na qualificação
      7. O closer tem liberdade para upsell se perceber que lead é mais qualificado
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [escada-valor, produto, pricing]

  - id: RH-MET-103
    element: |
      Metodologia de IA para Multiplicar SDRs:
      1. Configure bot de IA com RAG (base de dados do produto + scripts de venda)
      2. Integre com WhatsApp para atendimento inicial automatizado
      3. IA qualifica lead com perguntas-chave (faturamento, momento, dor)
      4. IA agenda reunião com closer se lead qualificado
      5. Humano supervisiona: monitora conversas, intervém se IA bugar
      6. Resultado: 4x mais leads atendidos por "SDR" (25→100/dia)
      7. Mesma taxa de agendamento mantida
    source_file: "transcription_Como_Sair_do_B_sico_e_usar_Intelig_ncia_Artificial_de_VERDADE___ROI_Hunters__304.md"
    guest: "Convidado IA"
    tags: [ia, sdr, whatsapp, automacao]

  - id: RH-MET-104
    element: |
      Metodologia de OOH para PMEs (Eletromídia):
      1. Acesse plataforma self-service da Eletromídia
      2. Coloque endereço do seu negócio para encontrar telas próximas
      3. Selecione prédios/torres por geolocalização + afinidade de público
      4. Investimento mínimo: R$249/mês por torre
      5. Configure looping (1 inserção a cada 3-4 minutos)
      6. Combine com campanha digital para amplificar (QR Code no criativo OOH)
      7. Mensure: aumento de busca, tráfego no site, cupom exclusivo
    source_file: "transcription_Como_fazer_Out_of_Home__com_Lucio_Shneider_da_Eletromidia__ROI_Hunters__248.md"
    guest: "Lucio Shneider"
    tags: [ooh, pme, implementacao]

  - id: RH-MET-105
    element: |
      Metodologia de Podcast Monetizado (Market Makers):
      1. Defina DNA editorial: qual é o "jeito Market Makers" que ninguém copia
      2. YouTube = ciência: otimize título + thumbnail para CTR, retenção para watch time
      3. Spotify = rede: cresça por recomendação, qualidade do papo
      4. Crie lead magnets temáticos: "Dossier Brasil" = resumo de 5 episódios sobre o tema
      5. Newsletter: hosts escrevem em dias alternados para construir autoridade individual
      6. Monetize: produto próprio (fundo de investimento, comunidade, cursos)
      7. Auto-promoção: dedique parte do episódio para falar de seus produtos
      8. Posicionamento: hosts se posicionam com opinião própria (não só perguntam)
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Podcast_-_O_Case_do_Market_Makers___ROI_Hunters__319.md"
    guest: "Market Makers"
    tags: [podcast, monetizacao, youtube, newsletter]

  - id: RH-MET-106
    element: |
      Metodologia de Venda de Franquias pela Internet:
      1. CLIENTE OCULTO: faça cliente oculto no seu próprio processo + concorrentes
      2. LANDING PAGE com formulário qualificatório (capital disponível, experiência, região)
      3. TRÁFEGO PAGO: Facebook/Google com segmentação por perfil investidor
      4. SDR ESPECIALIZADO: educa sobre modelo de franquia (não vende direto)
      5. CLOSER apresenta números reais: COF, faturamento médio, payback
      6. EXPECTATIVA DE CICLO: 50-60 dias da lead ao fechamento
      7. CRM robusto para acompanhar cada lead no ciclo longo
      8. SUPORTE: o pós-venda (suporte ao franqueado) define se escala ou não
    source_file: "transcription_Como_vender_franquias_atrav_s_da_Internet___ROI_Hunters__117.md"
    guest: "Equipe V4 / Leonardo Castelo"
    tags: [franquias, vendas-online, processo]

  - id: RH-MET-107
    element: |
      Metodologia de IA para Preparação de Calls de Vendas:
      1. Integre IA com o CRM (acesso ao histórico do deal)
      2. Antes da call, peça à IA: resuma tudo sobre esse lead
      3. IA retorna: empresa, cargo, dores mencionadas, interações anteriores
      4. IA sugere: melhores perguntas e abordagem personalizada
      5. Vendedor entra na call 100% preparado
      6. Resultado: -30% tempo de preparação, +30% conversão
      7. NÃO automatize a call — automatize a PREPARAÇÃO
    source_file: "transcription_Como_Sair_do_B_sico_e_usar_Intelig_ncia_Artificial_de_VERDADE___ROI_Hunters__304.md"
    guest: "Convidado IA"
    tags: [ia, vendas, crm, preparacao]

  - id: RH-MET-108
    element: |
      Metodologia de Página de Obrigado Monetizada (Russell Brunson / Linchpin):
      1. Lead converte (isca gratuita, webinar, compra low-ticket)
      2. PÁGINA DE OBRIGADO: em vez de "obrigado, check seu email"
      3. Ofereça produto de RECORRÊNCIA imediatamente (assinatura, comunidade)
      4. Ou ofereça upsell de ticket maior com desconto por tempo limitado
      5. Exemplo Russell: R$1M/ano de webinar → +R$9M/ano de MRR da página de obrigado
      6. O lead está no pico de emoção pós-conversão — momento ideal para 2ª oferta
    source_file: "transcription_Como_Fazer_Seu_Marketing_Vender_Todo_Dia___ROI_Hunters__329.md"
    guest: "Yuri (V4)"
    tags: [pagina-obrigado, recorrencia, upsell]

  - id: RH-MET-109
    element: |
      Metodologia de Documentação de Processos (para sair da operação):
      1. IDENTIFIQUE: os processos que só você faz (owner-dependent)
      2. GRAVE: filme-se fazendo o processo do início ao fim
      3. TRANSCREVA: use IA para transformar vídeo em SOP escrito
      4. DELEGUE: dê para alguém executar e acompanhe por 2 semanas
      5. ITERE: ajuste o SOP com feedback de quem executou
      6. LIBERE: só considere documentado quando outra pessoa executa sem você
    source_file: "transcription_Como_Sair_da_Opera__o_e_ESCALAR_sua_Empresa__Marcos_Freitas____ROI_Hunters__307.md"
    guest: "Marcos Freitas"
    tags: [processos, delegacao, escala, sop]

  - id: RH-MET-110
    element: |
      Metodologia de Contratação de Alta Performance (Ricardo Basaglia):
      1. DEFINA o perfil antes de abrir a vaga (hard skills + soft skills + cultural fit)
      2. CONSTRUA pipeline: os melhores estão empregados e felizes
      3. NUTRA relacionamento: converse sem urgência, crie confiança
      4. TIMING: quando o candidato ficar insatisfeito, você é a primeira opção
      5. ENTREVISTA: valide hard skills com teste prático (não apenas currículo)
      6. REFERÊNCIA: ligue para 3 ex-chefes/colegas
      7. ONBOARDING: primeiros 90 dias definem se a contratação funcionou
      Custo de erro: 3-5x salário anual
    source_file: "transcription_Como_Gerar_MAIS_LUCRO_com_as_Suas_Contrata__es__Ricardo_Basaglia____ROI_Hunters_.md"
    guest: "Ricardo Basaglia"
    tags: [contratacao, rh, processo, pipeline]

  - id: RH-MET-111
    element: |
      Metodologia de Conteúdo para Redes Sociais (Gilberto Augusto):
      1. DEFINA OBJETIVO por peça: curtida, comentário, salvamento ou compartilhamento
      2. USE EUTAGOGIA: ensine o que o aluno QUER aprender (não currículo fixo)
      3. AMPLIE REPERTÓRIO: busque referências fora do marketing (cinema, filosofia, arte)
      4. APLIQUE SILOGISMO: Premissa 1 + Premissa 2 = Conclusão inesperada
      5. MEÇA por ação: a ação que a rede dá (curtir, salvar, compartilhar) É o indicador
      6. CONTEÚDO EDUCATIVO gera salvamento; POLÊMICO gera comentário; IDENTITÁRIO gera compartilhamento
    source_file: "transcription_Como_Ganhar_Dinheiro_com_Marketing__Arqu_tipos_e_Narrativas_com_Gilberto_Augusto.md"
    guest: "Gilberto Augusto"
    tags: [conteudo, redes-sociais, engajamento, criatividade]


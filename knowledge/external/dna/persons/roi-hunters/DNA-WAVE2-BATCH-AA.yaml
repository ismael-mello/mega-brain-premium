    guest: "Dener Lippert / Guilherme Lippert"
    tags: [roas, escala, unit-economics, resultado-liquido]

  - id: RH-HEUR-303
    element: "Custo de lead pode cair 50%+ usando estratégia de duplicação de conjuntos de anúncios (1 público dividido em 10 conjuntos) — cada conjunto ataca uma fatia diferente do público"
    source_file: "transcription_Campanhas_bizarras_que_d_o_certo___ROI_Hunters__06.md"
    guest: "Guilherme Lippert"
    tags: [facebook-ads, otimizacao, cpl, escala]

  - id: RH-HEUR-304
    element: "Spotify: 90% da receita vem de usuários premium, 10% de publicidade; de 116M users, 94M pagantes (2019) crescendo para 124M pagantes em 9 meses"

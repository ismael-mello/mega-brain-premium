# L5: METHODOLOGIES (Step-by-step implementations)
# ============================================================================

methodologies:

  - id: RH-MET-300
    element: |
      Metodologia de reativação de criativos:
      1. Puxar histórico vitalício de criativos no gerenciador
      2. Identificar criativos que performaram bem mas foram pausados há 3+ meses
      3. Analisar o core: qual gancho, qual formato, qual copy funcionou
      4. Opção A: reativar o criativo idêntico (funciona em muitos casos)
      5. Opção B: recriar usando o mesmo gancho/formato com execução atualizada
      6. Aplicar mesma lógica para conteúdo orgânico (regravar vídeo mais popular do canal)
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [criativos, otimizacao, reativacao, anuncios]

  - id: RH-MET-301
    element: |
      Metodologia de criativo dinâmico para campanhas novas:
      1. Criar campanha de conversão com criativo dinâmico ativo
      2. Adicionar até 10 imagens variadas
      3. Escrever 5 textos diferentes
      4. Criar 5 títulos diferentes
      5. Selecionar até 5 CTAs
      6. Deixar Facebook otimizar combinações por 7-14 dias
      7. Ir em Detalhamento > Criativos Dinâmicos para ver performance por ativo
      8. Extrair top performers (3 melhores imagens + melhor título + melhores textos)
      9. Criar anúncios tradicionais com essas combinações vencedoras
    source_file: "transcription_Campanhas_bizarras_que_d_o_certo___ROI_Hunters__06.md"
    guest: "Guilherme Lippert"
    tags: [facebook-ads, criativos, teste-ab, otimizacao]

  - id: RH-MET-302
    element: |
      Metodologia de duplicação de conjuntos para escala:
      1. Pegar público grande (ex: 1 milhão)
      2. Criar 10 conjuntos de anúncios idênticos no mesmo público
      3. Cada conjunto vai atacar uma fatia diferente do público automaticamente
      4. Rodar e analisar: alguns conjuntos terão CPL muito baixo (ex: R$0,10), outros muito alto (ex: R$100)
      5. Na MÉDIA, o CPL total cai 50%+ vs campanha única
      6. Escalar mantendo os conjuntos ativos (a diversificação dá escala)
    source_file: "transcription_Campanhas_bizarras_que_d_o_certo___ROI_Hunters__06.md"
    guest: "Guilherme Lippert"
    tags: [facebook-ads, escala, cpl, otimizacao]

  - id: RH-MET-303
    element: |
      Processo de documentação 'Empresa que escreve' (Modelo G4/João Vitor):
      1. Toda área tem workspace próprio no Notion
      2. Criar 'Links de Acesso Rápido' no topo (atalhos para databases mais usadas)
      3. Toda reunião: responsável por pauta definido no início
      4. Reuniões regulares: cada pessoa preenche modelo PREVIAMENTE
      5. Toda decisão significativa: ATA documentada imediatamente
      6. Formalização de decisões grandes via email ou slide
      7. Database de conteúdos/produtos com todos os links (provedor, backup, material complementar)
      8. Estrutura macro do Notion espelha estrutura da empresa
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [documentacao, notion, processos, gestao]

  - id: RH-MET-304
    element: |
      Processo V4 de investigação de churn (baseado em acidente aéreo):
      1. Acessar gravação da reunião de venda do cliente
      2. Revisar ligações de qualificação
      3. Analisar check-ins e touchpoints durante o contrato
      4. Chegar ao 'acidente' (cancelamento) entendendo toda a trajetória
      5. NÃO buscar culpado — buscar O QUE ACONTECEU para NÃO repetir
      6. Output = backlog de melhorias obrigatório
      7. Toda perda TEM um motivo, 'inaceitável é um motivo' não é resposta válida
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [churn, investigacao, processo, melhoria-continua]

  - id: RH-MET-305
    element: |
      Como montar estratégia de tráfego para Google (primeira campanha):
      1. Começar SEMPRE por Search (pesquisa) — 99% das empresas podem fazer
      2. Se não tem landing page/site: campanha de Search levando para número de telefone
      3. Escalar Search até ponto de saturação antes de ir para outros canais
      4. Depois: Display para remarketing das pessoas que já visitaram
      5. YouTube para awareness + conversão (formato longo)
      6. Usar Google Ads Editor para otimização em massa (produtividade 5-10x)
    source_file: "transcription_Brand_vs_Performance__Onde_devemos_focar_os_nossos_esfor_os____ROI_Hunters__08.md"
    guest: "Guilherme Lippert / Dener Lippert"
    tags: [google-ads, trafego, search, escala]

  - id: RH-MET-306
    element: |
      Formação de hábitos (baseado em Atomic Habits):
      1. Comece com nível que tem CERTEZA que vai cumprir (ex: academia 3x/semana, 30min)
      2. Ajuste o ambiente para o hábito (ex: livro na mesa de cabeceira, garrafa de água visível)
      3. Empilhe hábitos: novo hábito atrelado a um existente (café → meditação)
      4. Use gatilho de um hábito como trigger para o próximo
      5. Quando falhar, não quebre 2 dias seguidos (Two Day Rule)
      6. A cada mês, incremente (3x → 5x → 6x por semana)
      7. Nunca desista na primeira falha — a maioria morre ali
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "Dener Lippert (ref. James Clear - Atomic Habits)"
    tags: [habitos, produtividade, disciplina, rotina]

  - id: RH-MET-307
    element: |
      Cálculo do ROI real de marketing (fórmula V4):
      1. Calcular ARPU (Average Revenue Per User): ticket médio x nº transações OU receita total / total de usuários
      2. Calcular Gross Margin: receita - custo dos produtos/serviços vendidos (diferente de margem de contribuição)
      3. Multiplicar ARPU x Gross Margin = valor real por cliente
      4. Calcular CAC: total investido em aquisição / nº de clientes adquiridos
      5. Dividir (ARPU x Gross Margin) / CAC = ROI real
      6. Se ROI > 1: negócio saudável; quanto maior, melhor
      7. Nota: indicadores gerenciais, não contábeis — adaptar ao contexto do negócio
    source_file: "transcription__142_-_ARPU_X_Gross_Margin___CAC___ROI.md"
    guest: "Dener Lippert / João Vitor"
    tags: [roi, unit-economics, formula, metricas, calculo]


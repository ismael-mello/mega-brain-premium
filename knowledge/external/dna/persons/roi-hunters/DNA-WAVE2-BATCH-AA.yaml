# ============================================================================
# L4: FRAMEWORKS (Structured methodologies with names)
# ============================================================================

frameworks:

  - id: RH-FW-300
    element: "Growth Checklist — Mapeie seu histórico (3-6 meses mínimo): todas ações que deu certo e errado. Próxima vez que precisar dar pump, volte na lista de ações que funcionaram antes de inventar algo novo"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [growth, checklist, retrospectiva, playbook]

  - id: RH-FW-301
    element: "5 Es para diminuir Churn: (1) Expectativa — underpromise over deliver; (2) Engajamento — manter cliente ativo; (3) Educação — ensinar cliente a usar melhor; (4) Experiência — qualidade da jornada; (5) Evolução — melhorar continuamente o produto/serviço"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"
    guest: "Dener Lippert / Guilherme Lippert / João Vitor"
    tags: [churn, retencao, framework, cs]

  - id: RH-FW-302
    element: "Fórmula V4 de ROI: ARPU x Gross Margin / CAC = ROI — topo da pirâmide para julgar a saúde de um negócio"
    source_file: "transcription__142_-_ARPU_X_Gross_Margin___CAC___ROI.md"
    guest: "Dener Lippert / João Vitor / Guilherme Lippert"
    tags: [roi, formula, unit-economics, metricas]

  - id: RH-FW-303
    element: "Framework de criativos dinâmicos do Facebook — 1 anúncio com até 10 imagens + 5 textos + 5 títulos + 5 CTAs; Facebook testa combinações automaticamente; analisar via Detalhamento > Criativos Dinâmicos; depois extrair winners para campanhas tradicionais"
    source_file: "transcription_Campanhas_bizarras_que_d_o_certo___ROI_Hunters__06.md"
    guest: "Guilherme Lippert"
    tags: [facebook-ads, criativos, otimizacao, teste]

  - id: RH-FW-304
    element: "Framework de duplicação de conjuntos — 1 público grande dividido em 10 conjuntos de anúncios idênticos; cada conjunto ataca fatia diferente do público; média de CPL cai 50%+ mesmo com conjuntos individuais caros"
    source_file: "transcription_Campanhas_bizarras_que_d_o_certo___ROI_Hunters__06.md"
    guest: "Guilherme Lippert"
    tags: [facebook-ads, escala, cpl, otimizacao]

  - id: RH-FW-305
    element: "Modelo RFM para cliente ideal — Recência (última compra), Frequência (quantas compras), Valor Monetário (ticket); segmentar base por esses 3 eixos para identificar clientes ideais e em risco"
    source_file: "transcription__149_-_Rec_ncia__Frequ_ncia_e_Valor_Monet_rio_para_o_cliente_ideal__RFM_.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [rfm, segmentacao, cliente-ideal, retencao]

  - id: RH-FW-306
    element: "Framework de Aquisição V4 para Facebook: (1) Campanha de awareness/tráfego para criar público; (2) Retargeting desse público para conversão. Mas se produto é conhecido, pode ir direto para conversão em público aberto"
    source_file: "transcription_Brand_vs_Performance__Onde_devemos_focar_os_nossos_esfor_os____ROI_Hunters__08.md"
    guest: "Guilherme Lippert"
    tags: [facebook-ads, funil, aquisicao, retargeting]

  - id: RH-FW-307
    element: "Processo de investigação de churn inspirado em acidentes aéreos — ir do início (primeiro contato, reunião de venda, qualificação, check-ins) até o 'acidente' (cancelamento); output é melhoria/backlog, não culpado"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [churn, investigacao, root-cause, processo]

  - id: RH-FW-308
    element: "Empresa que escreve (Writing Culture): não é só playbook/SOP; toda reunião tem ata, todo estudo é documentado por escrito, links de acesso rápido por área, workspace espelha estrutura organizacional"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [documentacao, cultura, processos, notion]


heuristics:

  - id: RH-HEUR-300
    element: "90% das pessoas no Instagram ficam no feed/stories e NÃO acessam o perfil — média de 3K visitas/semana com 39K seguidores (<10%)"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [instagram, alcance, metricas]

  - id: RH-HEUR-301
    element: "É melhor comprar 10 inserções no programa mais barato que 1 inserção no programa caro — frequência > alcance único para construir lembrança"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [midia, frequencia, awareness]

  - id: RH-HEUR-302
    element: "Investir R$1M a ROAS 3 gerando R$500K líquido é MELHOR que investir R$1K a ROAS 10 gerando R$4K líquido — resultado líquido absoluto > ROAS percentual"

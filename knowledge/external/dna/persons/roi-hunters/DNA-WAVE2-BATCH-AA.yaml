    tags: [habitos, produtividade, disciplina]

  - id: RH-HEUR-315
    element: "V4 cancelou comissão de vendedor para reduzir churn — vendedor ampliava expectativa para fechar mais vendas, prejudicando a entrega"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"

  - id: RH-HEUR-305
    element: "Média de churn em agências de marketing digital servindo PMEs nos EUA: mais de 50% ao ano"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"
    guest: "Dener Lippert"
    tags: [churn, benchmark, agencia, pme]

  - id: RH-HEUR-306
    element: "Se não aplicar o aprendizado, você esquece 70% em 24 horas (curva do esquecimento)"
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "Dener Lippert"
    tags: [aprendizado, retencao-conhecimento, pratica]

  - id: RH-HEUR-307
    element: "Retrospectiva obrigatória a cada 30 dias — 1 hora na agenda recorrente para revisar: o que deu certo que vou expandir/reativar?"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [retrospectiva, ritual, melhoria-continua]

  - id: RH-HEUR-308
    element: "Primo Rico: projetando 50-60% da receita anual como recorrente (ARR) que vira base no ano seguinte — shift de receita pontual para recorrente"
    source_file: "transcription_5_melhores_estrat_gias_de_Marketing_e_Growth___ROI_HUNTERS__100.md"
    guest: "Thiago Nigro (Primo Rico)"
    tags: [arr, recorrencia, modelo-negocio]

  - id: RH-HEUR-309
    element: "XP reduziu jornada de abertura de conta de 14 dias para menos de 10 minutos — isso foi marco de inflexão no crescimento"
    source_file: "transcription__145_-_A_segunda_compra___a_mais_importante_.md"
    guest: "Ricardo Domingues"
    tags: [jornada, ux, conversao, fintech]

  - id: RH-HEUR-310
    element: "Black Friday precisa de 3 meses de preparação mínima — a mesma campanha/mote pode ser repetida no ano seguinte com bons resultados"
    source_file: "transcription_A_Black_Friday_J__Come_ou____ROI_Hunters__92.md"
    guest: "Dener Lippert"

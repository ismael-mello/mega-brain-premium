# ============================================================================
# L1: PHILOSOPHIES (Core beliefs, worldviews, principles)
# ============================================================================

philosophies:

  - id: RH-PHI-300
    element: "Marketing só é marketing quando vende — branding sem conversão é vaidade corporativa"
    source_file: "transcription_Brand_vs_Performance__Onde_devemos_focar_os_nossos_esfor_os____ROI_Hunters__08.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [branding, performance, vendas]

  - id: RH-PHI-301
    element: "A grande vantagem de um negócio pensando no longo prazo é melhoria incremental — 1% todo dia empilhado constrói negócios sólidos"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert / Guilherme Lippert / João Vitor"
    tags: [melhoria-continua, growth, longo-prazo]

  - id: RH-PHI-302
    element: "Se você quebra tudo e começa do zero repetidamente, você não constrói algo sólido no longo prazo — são anos de melhorias empilhadas que geram valor"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [consistencia, crescimento, iteracao]

  - id: RH-PHI-303
    element: "A culpa é sempre sua — você sempre tem que trazer responsabilidade pra você daquilo que existiu, nem que seja 'fui incompetente em escolher quem ia trabalhar comigo'"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [responsabilidade, ownership, lideranca]

  - id: RH-PHI-304
    element: "Branding ajuda a ter mais performance — não é um ou outro, é como o branding impulsiona o objetivo de vendas"
    source_file: "transcription_Brand_vs_Performance__Onde_devemos_focar_os_nossos_esfor_os____ROI_Hunters__08.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [branding, performance, sinergia]

  - id: RH-PHI-305
    element: "Skin in the game — se eu falo que marketing digital dá certo, tem que fazer pra mim também; a V4 investe 1.5M/ano em mídia própria"
    source_file: "transcription_Brand_vs_Performance__Onde_devemos_focar_os_nossos_esfor_os____ROI_Hunters__08.md"
    guest: "Dener Lippert"
    tags: [skin-in-the-game, credibilidade, investimento]

  - id: RH-PHI-306
    element: "Você pode atingir o ápice sozinho, mas você não consegue se manter lá — para se manter, você precisa de um time"
    source_file: "transcription_5_melhores_estrat_gias_de_Marketing_e_Growth___ROI_HUNTERS__100.md"
    guest: "Thiago Nigro (Primo Rico)"
    tags: [equipe, escala, sustentabilidade]

  - id: RH-PHI-307
    element: "Todo influenciador deveria transformar receita em base recorrente (ARR) — receita que vira zero no mês seguinte é fragilidade estrutural"
    source_file: "transcription_5_melhores_estrat_gias_de_Marketing_e_Growth___ROI_HUNTERS__100.md"
    guest: "Thiago Nigro (Primo Rico)"
    tags: [recorrencia, arr, modelo-negocio]

  - id: RH-PHI-308
    element: "Reciprocidade é o gatilho mais poderoso que existe — reciprocidade leva à lealdade"
    source_file: "transcription_A_M_TRICA_MAIS_IMPORTANTE_DO_PRIMO_RICO_ROI_HUNTERS__91.md"
    guest: "Thiago Nigro (Primo Rico)"
    tags: [gatilho-mental, reciprocidade, lealdade]

  - id: RH-PHI-309
    element: "Pessoas não compram por motivos racionais, compram por emoção, pelo que gostariam que o mundo fosse — marketing político é o melhor exemplo disso"
    source_file: "transcription_Bolsonaro_Vs_Lula__Quem_est__fazendo_o_Melhor_Marketing____ROI_Hunters__75.md"
    guest: "Dener Lippert / Fernando Miranda"
    tags: [comportamento, emocao, decisao-compra]

  - id: RH-PHI-310
    element: "Vendas cura tudo — quando está vendendo, os problemas ficam menores e mais fáceis de resolver"
    source_file: "transcription__146_-_VENDAS_CURA_TUDO_.md"
    guest: "Dener Lippert"
    tags: [vendas, cash-flow, prioridade]

  - id: RH-PHI-311
    element: "O output de investigação de churn não é punição, é backlog — toda perda tem um motivo e esse motivo é uma melhoria para não repetir"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [churn, melhoria, investigacao]

  - id: RH-PHI-312
    element: "Empresa que documenta é empresa que escala — ir de 'playbooks de processo' para 'empresa que escreve' é o próximo nível"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [documentacao, processos, escala]

  - id: RH-PHI-313
    element: "Satisfação = Realidade - Expectativa — se a realidade for maior que a expectativa o cliente fica satisfeito, independente do valor absoluto da entrega"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [satisfacao, expectativa, retencao]

  - id: RH-PHI-314
    element: "Sobre livros: menos é mais — é melhor ter 5-10 livros que você relê todo ano do que ler 30 livros superficialmente"
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "João Vitor / Dener Lippert"
    tags: [aprendizado, livros, profundidade]

  - id: RH-PHI-315
    element: "O trabalho de um CEO é basicamente alocar recursos — investir no negócio, comprar empresas ou recomprar ações; distribuir dividendos é ineficiência"
    source_file: "transcription_A_M_TRICA_MAIS_IMPORTANTE_DO_PRIMO_RICO_ROI_HUNTERS__91.md"
    guest: "Dener Lippert (ref. livro Outsiders)"
    tags: [ceo, alocacao-recursos, equity]

  - id: RH-PHI-316
    element: "É melhor ter uma fatia menor de uma pizza maior — abdicar de equity é pensar no futuro (2.5% de 2.5B > 100% de 50M)"
    source_file: "transcription_Audiovisual___Escal_vel____ROI_Hunters__61.md"
    guest: "Guilherme Lippert"
    tags: [equity, escala, partnership]

# ============================================================================
# L2: MENTAL-MODELS (Thinking frameworks, decision lenses)
# ============================================================================

mental_models:

  - id: RH-MM-300
    element: "Builder vs Keeper — todo negócio precisa do cara que constrói coisas novas E do cara que mantém e melhora o que já funciona; ser só um dos dois limita crescimento"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [gestao, operacao, equilíbrio]

  - id: RH-MM-301
    element: "Ciclo de vida da campanha/criativo — todo anúncio tem uma curva de performance (subida → pico → declínio); depois de 3 meses parado, pode ser reativado e ter nova curva de crescimento"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [criativos, campanhas, otimizacao]

  - id: RH-MM-302
    element: "Investigação de acidente aéreo aplicada a churn — ir do início ao cancelamento (não do efeito à causa); output é melhoria/backlog, não punição"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [churn, investigacao, root-cause]

  - id: RH-MM-303
    element: "ROAS vs Resultado Líquido — ROAS caindo não significa problema; se o resultado financeiro líquido continua crescendo, o negócio está saudável. Só é problema quando o líquido começa a decrescer"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [roas, metricas, escala, unit-economics]

  - id: RH-MM-304
    element: "Aquisição vs Monetização — antes de diversificar canais, estresse o canal que já funciona até o ponto de saturação (retorno líquido começa a cair)"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [canais, escala, saturacao]

  - id: RH-MM-305
    element: "Feio que converte > Bonito que não converte — conteúdo 'feio' (celular, stories naturais) frequentemente converte melhor que produção cinematográfica porque não ativa filtro de 'publicidade' no cérebro"
    source_file: "transcription_Campanhas_bizarras_que_d_o_certo___ROI_Hunters__06.md"
    guest: "Dener Lippert / Guilherme Lippert"
    tags: [criativos, ugc, conversao, anuncios]

  - id: RH-MM-306
    element: "Growth de Aquisição vs Growth de Produto — a maioria das empresas quebra por não aplicar growth em produto; escalam aquisição mas não retêm/monetizam o usuário"
    source_file: "transcription_Analisando_Spotify_Growth_KPI_s___ROI_Hunters__27.md"
    guest: "João Vitor"
    tags: [growth, produto, retencao, aquisicao]

  - id: RH-MM-307
    element: "Campanha eleitoral como lançamento — pré-lançamento (aquecimento), abertura de carrinho (dia da eleição), gatilhos de medo/esperança/inimigo comum/rapport"
    source_file: "transcription_Bolsonaro_Vs_Lula__Quem_est__fazendo_o_Melhor_Marketing____ROI_Hunters__75.md"
    guest: "Dener Lippert / Fernando Miranda"
    tags: [lancamento, copy, gatilhos-mentais]

  - id: RH-MM-308
    element: "ARPU x Gross Margin / CAC = ROI — a fórmula definitiva para julgar um bom negócio; não precisa ser perfeita contabilmente, precisa gerar bom insight gerencial"
    source_file: "transcription__142_-_ARPU_X_Gross_Margin___CAC___ROI.md"
    guest: "Dener Lippert / João Vitor / Guilherme Lippert"
    tags: [unit-economics, formula, roi, metricas]

  - id: RH-MM-309
    element: "North Star Metric — para 99% dos negócios é overengineering; o consenso de ter UMA métrica guia é bom, mas poucos usam de verdade como obsessão"
    source_file: "transcription_A_m_trica_absoluta_de_qualquer_empresa___ROI_Hunters__105.md"
    guest: "João Vitor / Ricardo Domingues"
    tags: [north-star, metricas, foco]

  - id: RH-MM-310
    element: "Jornada Micro vs Jornada Macro do cliente — micro é o passo-a-passo de ativação; macro é o 'caminho crítico' ideal que soma todas as micro-jornadas"
    source_file: "transcription__145_-_A_segunda_compra___a_mais_importante_.md"
    guest: "Ricardo Domingues / Guilherme Lippert"
    tags: [jornada-cliente, ativacao, experiencia]

  - id: RH-MM-311
    element: "Fama como meio vs Fama como resultado — se o resultado financeiro é o objetivo, fama pode ser o caminho mais rápido, mas tem ônus pesado (privacidade, família, hype temporário)"
    source_file: "transcription_A_M_TRICA_MAIS_IMPORTANTE_DO_PRIMO_RICO_ROI_HUNTERS__91.md"
    guest: "Thiago Nigro (Primo Rico) / João Vitor"
    tags: [personal-brand, fama, estrategia]

  - id: RH-MM-312
    element: "4 alavancas de crescimento — ou mais receita, ou mais clientes, ou mais margem, ou mais retenção; precisa entender qual priorizar em cada momento"
    source_file: "transcription_A_m_trica_absoluta_de_qualquer_empresa___ROI_Hunters__105.md"
    guest: "João Vitor"
    tags: [growth, priorizacao, alavancas]


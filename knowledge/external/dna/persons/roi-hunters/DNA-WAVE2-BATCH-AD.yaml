methodologies:

  - id: RH-MET-450
    text: "Método de 40 Reuniões em 40 Dias (Dener nos EUA): (1) Definir roteiro geográfico (Miami → Boston), (2) Contratar intercambistas para prospectar via LinkedIn nas cidades, (3) Marcar reuniões presenciais enquanto viaja, (4) Pitch: 'Sou brasileiro, quero fazer negócio nos EUA, vamos tomar um café'"
    guest: Dener Lippert
    episode: "#202 Networking é superestimado?"
    domain: [networking, outbound]
    steps:
      - "Definir rota e datas por cidade"
      - "Ter equipe prospectando via LinkedIn nas cidades futuras"
      - "Mensagem simples: brasileiro, quer fazer negócio, café"
      - "Aceitar todo convite social que surgir (festas, eventos)"
      - "Registrar contatos e fazer follow-up pós-viagem"

  - id: RH-MET-451
    text: "Método de Networking Hierárquico via LinkedIn: (1) Adicionar estagiários da empresa-alvo, (2) Subir para gestores, (3) Subir para diretores, (4) Quando adicionar o C-level, já tem 30+ conexões em comum, (5) Mandar e-mail personalizado com pitch de valor"
    guest: João Pedro
    episode: "#202 Networking é superestimado?"
    domain: [networking, linkedin]
    steps:
      - "Identificar empresa-alvo e mapear organograma no LinkedIn"
      - "Adicionar colaboradores de nível mais baixo (aceitam fácil)"
      - "Ir subindo gradualmente na hierarquia"
      - "Quando chegar no C-level, ter 30+ conexões em comum"
      - "Enviar e-mail com apresentação e proposta de café"

  - id: RH-MET-452
    text: "Método de Report com Cohorts (V4/G4): (1) Agrupar leads por semana de entrada, (2) Acompanhar conversão de cada cohort por 16 semanas, (3) Usar algoritmo de previsão de conversão, (4) Quando margem de erro chegar a 3-5%, modelo está maduro, (5) Decidir sobre cohort só após 4 meses"
    guest: Guilherme Lippert
    episode: "#54 Melhor Processo para Gerar Relatórios"
    domain: [analytics, cohorts]
    steps:
      - "Agrupar leads semanalmente por canal/lead magnet"
      - "Registrar conversões progressivas de cada cohort"
      - "Aplicar modelo de previsão (inicialmente com margem grande)"
      - "Calibrar modelo até margem de erro de 3-5%"
      - "Só declarar cohort morto após 16 semanas de observação"

  - id: RH-MET-453
    text: "Método V4 de Aquisição por M&A estratégico (caso Staage): (1) Identificar gap na oferta (educação/LMS), (2) Avaliar build vs buy (buy mais rápido se produto existe), (3) Integrar ao modelo de serviços como módulo vendável, (4) Usar base existente de 3000+ clientes como distribution"
    guest: Dener Lippert / Fernando Miranda
    episode: "#231 Por que compramos a Staage"
    domain: [estrategia, ma]
    steps:
      - "Identificar gap no portfólio que clientes já pedem"
      - "Avaliar se é melhor construir ou comprar (build vs buy)"
      - "Negociar e integrar a aquisição à oferta existente"
      - "Distribuir via base de clientes existente (CAC próximo de zero)"

  - id: RH-MET-454
    text: "Método de Campanha com Pouca Verba: (1) Escolher 1 canal (o que você mais domina), (2) Criar 1 público-alvo baseado em custom/lookalike, (3) Rodar 1 criativo com 3x CPA de budget, (4) Se funcionar, escalar gradualmente. Se falhar, trocar criativo (não canal ou público)"
    guest: Dener Lippert
    episode: "#07 Pouca verba, e agora?"
    domain: [trafego, orcamento]
    steps:
      - "Selecionar canal que domina (Facebook, Google, etc.)"
      - "Construir público com dados que já tem (custom audience ou lookalike)"
      - "Budget mínimo = 3x CPA médio esperado"
      - "Testar 1 criativo por vez (sequencial, não simultâneo)"
      - "Resultado: escalar. Sem resultado: trocar criativo, manter público"

  - id: RH-MET-455
    text: "Método de Implementação de CRM com Cadência: (1) Escolher ferramenta (Pipedrive, Nectar, HubSpot), (2) Mapear pipeline com etapas claras, (3) Definir cadência de contato por etapa (ex: 5 touchpoints em 14 dias), (4) Automatizar lembretes, (5) Medir conversão por etapa e iterar"
    guest: Guilherme Lippert / João Vitor
    episode: "#39 O que é CRM"
    domain: [vendas, crm]
    steps:
      - "Selecionar CRM adequado ao tamanho/complexidade"
      - "Definir pipeline: Lead → Qualificado → Proposta → Fechamento"
      - "Cadência: 5-7 touchpoints antes de descartar lead"
      - "Automatizar alertas de follow-up no CRM"
      - "Dashboard semanal: conversão por etapa, velocity, cadência cumprida"

  - id: RH-MET-456
    text: "Método de Economia para Marketeiros: (1) Estudar oferta e demanda (elasticidade de preço), (2) Entender custo de oportunidade nas decisões de investimento, (3) Aplicar conceito de marginal utility ao pricing, (4) Usar unit economics (CAC, LTV, payback) como linguagem de decisão"
    guest: Guilherme Lippert / Dener Lippert
    episode: "#102 Porque todo marketeiro deveria estudar economia"
    domain: [economia, marketing]
    steps:
      - "Estudar elasticidade de preço do seu produto/serviço"
      - "Calcular custo de oportunidade de cada real investido"
      - "Aplicar marginal utility: cada real extra gera menos retorno"
      - "Comunicar ROI em linguagem de unit economics (não apenas CTR/CPL)"

  - id: RH-MET-457
    text: "Método de Lançamento Bruno Perini (Viver de Renda): (1) Base orgânica no Instagram marca data e abre carrinho, (2) Simultâneo: evento de 3 dias no YouTube com carrinho já aberto, (3) Dia 1 = Problema, Dia 2 = Solução, Dia 3 = Acelerador, (4) Primeiro lançamento com tráfego pago após 4 anos orgânico puro"
    guest: Bruno Perini
    episode: "Por que o Grupo Primo Surgiu"
    domain: [lancamento, infoprodutos]
    steps:
      - "Construir base orgânica sólida (4+ anos no caso Perini)"
      - "Evento de lançamento no YouTube em 3 dias"
      - "Dia 1: foco no problema (dor do público)"
      - "Dia 2: foco na solução (metodologia)"
      - "Dia 3: acelerador (bônus, urgência)"
      - "Primeiro lançamento com tráfego pago para bater recorde"


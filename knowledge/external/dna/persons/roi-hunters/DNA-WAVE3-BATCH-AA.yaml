  - id: RH-MET-601
    title: "Metodo de Pesquisa de Recompensas para Programa de Indicacao"
    description: |
      Rodrigo Noll — antes de criar programa de indicacao:
      1. PESQUISA QUANTITATIVA com base de clientes
      2. Perguntar: "Se voce indicar e a pessoa comprar, o que voce gostaria de receber?"
      3. Listar opcoes com preco estimado
      4. Ranking por desejabilidade
      5. Posicionar: melhor premio no MEIO da escada (nao no topo)
      6. Primeira recompensa na primeira indicacao (baixa barreira)
      7. Definir gatilho: gerar lead OU gerar venda
      8. Quando bate topo da escada: reiniciar ou criar experiencia VIP
    steps: ["Pesquisa quanti com clientes", "Listar recompensas por desejo", "Melhor premio no meio", "Primeira recompensa na 1a indicacao", "Definir gatilho", "Ativar com copy certa"]
    tags: [indicacao, pesquisa, recompensa, escada, programa]
    speaker: "Rodrigo Noll"
    source_file: "transcription__123_-_O_Boca___Boca_4_0___Rodrigo_Noll.md"

  - id: RH-MET-602
    title: "Metodo de Diagnostico V4 — Composicao de Canais com Analytics"
    description: |
      Quando resultado cai:
      1. NAO culpar agencia/midia automaticamente
      2. Abrir analytics: composicao de canais
      3. Verificar CADA canal: organico, pago, direto, social, email
      4. Identificar QUAL canal caiu
      5. Se midia ok mas organico caiu = problema e SEO, nao performance
      6. Apresentar diagnostico com dados ao cliente
      7. Criar plano de acao para o canal real do problema

      Caso real: cliente caiu 40% faturamento. Midia estava ok. Organico caiu 50%.
    steps: ["Nao culpar midia", "Abrir analytics", "Composicao de canais", "Identificar canal problema", "Diagnosticar raiz", "Plano de acao especifico"]
    tags: [analytics, diagnostico, canais, v4, problema]
    speaker: "Guilherme Lippert"
    source_file: "transcription__130_-Web_Analytics___MUITO_MAIS_que_um_gr_fico_bonitinho_.md"

  - id: RH-MET-603
    title: "Metodo de Anotacao Conference Call (Joao Vitor)"
    description: |
      Para conference calls de empresas (Meta, Google, etc.):
      1. Ouvir/ler a call
      2. Anotar INSIGHTS (fatos, numeros, declaracoes)
      3. Para cada insight, definir O QUE FAZER (judu)
      4. Exemplo: "20% tempo = Reels" → judu: "Alocar 20%+ budget em Reels"
      5. Catalogar no Notion por empresa/tema
      6. Revisitar antes de tomar decisoes de alocacao

      Formato: INSIGHT + O QUE FAZER + FONTE
    steps: ["Ouvir conference call", "Anotar insights", "Definir judu para cada", "Catalogar no Notion", "Revisitar antes de decisoes"]
    tags: [estudo, conference-call, judu, notion, processo]
    speaker: "Joao Vitor"
    source_file: "transcription__147_-_Voc__consegue_praticar_aquilo_que_estuda_.md"

  - id: RH-MET-604
    title: "Metodo de Escalada de Time — Compartilhado para Dedicado"
    description: |
      Progressao natural de time de growth:
      1. INICIO: time compartilhado (agencia/V4) ~R$4.5k/mes
         - 4-6 profissionais compartilhados entre clientes
         - Ideal para quem investe pouco em midia
      2. CRESCIMENTO: semi-dedicado ~R$7-12k/mes
         - Mais horas dedicadas, menos clientes por profissional
      3. MATURIDADE: dedicado ~R$20k+/mes
         - Profissional 100% no seu projeto
         - Gestor de projetos adicional
      4. INTERNALIZACAO: time interno
         - So quando volume justifica custo fixo
         - Cuidado: custo de oportunidade alto para senior
    steps: ["Comecar compartilhado", "Escalar para semi-dedicado", "Evoluir para dedicado", "Internalizar quando volume justifica"]
    tags: [time, growth, escalada, custo, agencia, v4]
    speaker: "Guilherme Lippert"
    source_file: "transcription__125_-_Os_Fundamentos_de_um_Time_de_Growth.md"

  - id: RH-MET-605
    title: "Metodo CRM de Augusto Rocha — Muito Alem de Email"
    description: |
      CRM como estrategia completa:
      1. CRM nao e ferramenta de email = e gestao de relacionamento
      2. Integrar dados de TODOS os touchpoints
      3. Criar segmentacoes por comportamento (cohort, compra, engajamento)
      4. Automatizar jornadas por segmento
      5. Medir: retencao, LTV, NPS por cohort
      6. CRM e mais importante que aquisicao para negocios maduros
      7. PMWeb cresceu 70%+ focando nessa abordagem

  - id: RH-MET-608
    title: "Metodo Documentacao V4 — De Playbook para Tudo"
    description: |
      Evolucao de documentacao na V4:
      1. FASE 1: Playbooks (como fazer algo especifico) — basico
      2. FASE 2: Atas de reuniao e decisoes — intermediario
      3. FASE 3: TUDO — a empresa escreve tudo que faz (Notion)
      4. Padronizacao: definir como cada coisa e feita, com regras
      5. Documentacao: registrar o que foi feito e como
      6. Revisitacao: revisitar periodicamente (nem sempre acontece)
      7. Game changer: quando saiu de so playbook para documentar TUDO
    steps: ["Playbooks basicos", "Atas e decisoes", "Documentar TUDO", "Padronizar processos", "Revisitar periodicamente"]

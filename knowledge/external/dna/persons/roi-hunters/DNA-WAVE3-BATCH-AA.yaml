  - id: RH-MET-612
    title: "Metodo Gustavo Borges — Tratar Marketeiro como Atleta Olimpico"
    description: |
      Principios do atleta olimpico aplicados ao marketing:
      1. PLANEJAMENTO DE LONGO PRAZO — ciclos de 4 anos, nao meses
      2. MELHORIA INCREMENTAL — 1% todo dia
      3. DISCIPLINA DE ROTINA — rituais diarios nao negociaveis
      4. PERIODIZACAO — fases de construcao, pico, recuperacao
      5. METRICAS OBJETIVAS — tempo, splits, performance mensuravel
      6. EQUIPE DE SUPORTE — ninguem vence sozinho
      7. ANTECIPACAO — se preparar antes da competicao, nao durante
    steps: ["Planejar longo prazo", "Melhoria incremental diaria", "Disciplina de rotina", "Periodizar esforcos", "Medir objetivamente", "Montar equipe de suporte"]
    tags: [atleta, disciplina, rotina, melhoria, longo-prazo]
    speaker: "Gustavo Borges"

  - id: RH-MET-606
    title: "Metodo Growth Machine — Outbound B2B com Thiago Reis"
    description: |
      Estrutura de vendas B2B outbound:
      1. PRE-VENDEDOR HUNTER (BDR): prospeccao ativa, gera contato
      2. PRE-VENDEDOR (SDR): qualifica lead
      3. CLOSER: faz a venda
      4. Separar funcoes = maior eficiencia na jornada
      5. Nao deixar vendedor prospectar, qualificar E fechar ao mesmo tempo

      Performance sem separacao = lapis sozinho. Com separacao = mais eficiente.
    steps: ["BDR faz prospeccao ativa", "SDR qualifica", "Closer fecha", "Cada um foca em sua etapa"]
    tags: [outbound, b2b, vendas, growth-machine, estrutura]
    speaker: "Thiago Reis"
    source_file: "transcription__140_-_Conhe_a_a_Growth_Machine___Com_Thiago_Reis.md"

  - id: RH-MET-607
    title: "Metodo Varejo Familiar — Escalar com Conteudo e Arquitetos"
    description: |
      Para negocio de varejo familiar (acabamentos):
      1. Posicionar time de vendas como CONSULTORES (treinamento em design)
      2. Criar programa de conteudo com ARQUITETOS parceiros
      3. Arquitetos fazem conteudo no SEU canal (reciprocidade)
      4. Trust Advisory: pos-venda que pergunta como ficou e pede fotos
      5. Transformar arquitetos em EMBAIXADORES (nao so indicadores)
      6. Estrategia de conteudo = longo prazo, mas compounding
    steps: ["Treinar vendedores como consultores", "Programa com arquitetos", "Conteudo conjunto", "Trust Advisory pos-venda", "Construir embaixadores"]

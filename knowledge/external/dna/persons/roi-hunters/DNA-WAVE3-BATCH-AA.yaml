  - id: RH-MET-609
    title: "Metodo de Analise de Safra (Cohort) para Decisao"
    description: |
      1. Agrupar clientes por MES DE ENTRADA (safra/cohort)
      2. Medir retencao de cada safra ao longo dos meses (1, 3, 6, 12)
      3. Comparar safras: a de hoje e melhor ou pior que 2 anos atras?
      4. Segmentar por TIPO: ecommerce vs infoproduto vs servico
      5. Se cohort de ecommerce retencao 8-10 meses vs infoproduto 2-3 meses → mirar vendas em ecommerce
      6. Usar para decidir: escalar aquisicao (se safras melhoram) ou corrigir (se pioram)
    steps: ["Agrupar por mes de entrada", "Medir retencao mensal", "Comparar safras no tempo", "Segmentar por tipo de cliente", "Decidir: escalar ou corrigir"]
    tags: [cohort, safra, retencao, metricas, decisao]
    speaker: "Dener Lippert / Guilherme Lippert"
    source_file: "transcription__137_-_M_tricas_para_escalar_o_seu_neg_cio.md"

  - id: RH-MET-610
    title: "Metodo PROFE — Identificar Cliente Ideal por Dados"
    description: |
      Na V4:
      1. Analisar HISTORICO de retencao por segmento (cohort)
      2. Mapear: quem tem ticket alto + margem alta + volume?
      3. Sigla PROFE (alto valor, alto margem, volume adequado)
      4. Mirar forcas de venda nesse ICP especifico
      5. Analisar PERSONA: mentalidade do gestor, comportamento em adversidade
      6. Resultado: mais LTV, menos churn, melhor unit economics
    steps: ["Analisar cohort por segmento", "Identificar PROFE", "Mirar vendas nesse ICP", "Avaliar persona do gestor", "Monitorar LTV por cohort"]
    tags: [icp, profe, segmentacao, vendas, v4]
    speaker: "Vinicius Colli / Gustavo Figueiredo"
    source_file: "transcription__144_-_Como_encontrar_bons_clientes__Com_Vinicius_Colli_e_Gustavo_Figueiredo.md"


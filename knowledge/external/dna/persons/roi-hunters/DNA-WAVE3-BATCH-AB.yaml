L5_METHODOLOGIES:

  - id: "RH-MET-650"
    title: "Metodologia de Prospecção por Indicação (Outbound Quente)"
    content: |
      Passo a passo para prospecção sem lista fria:

      FASE 1 — MAPEAR BASE
      1. Abra contatos do celular (média: 3.000+)
      2. Categorize por proximidade: X (próximo), Y (segundo grau), Z (terceiro grau)

      FASE 2 — PROSPECTAR
      3. Comece pelo Mercado X (mais próximo)
      4. Abordagem: "Quero te mostrar o que estou fazendo" (não vender)
      5. Se não vendeu, peça 5 indicações: "Quem são 5 amigos muito bem-sucedidos?"

      FASE 3 — OPERAR
      6. Lead de indicação → direcionar para time OUTBOUND (não closer inbound)
      7. Pagar comissão para vendedor que gerou o lead via indicação
      8. A não-venda pode não estar sob seu controle, mas pegar recomendação ESTÁ

      Resultado V4: 10% das vendas via indicação de leads (700 vendas B2B/mês)
    tags: ["outbound", "indicação", "vendas", "prospecção"]
    source_file: "transcription_COMO_N_O_FRUSTRAR_COM_OUTBOUND_.md"
    speaker: "Dêner Lippert"

  - id: "RH-MET-651"
    title: "Metodologia de Documentação de Processos (Playbooks)"
    content: |
      Como criar playbooks operacionais:

      PASSO 1 — IDENTIFICAR MOMENTO
      - Gatilho A: "Sempre faço mais ou menos a mesma coisa" → padronizar
      - Gatilho B: "Preciso ensinar para muitas pessoas" → base comum

      PASSO 2 — DOCUMENTAR AS IS
      - Quem documenta: quem EXECUTA o processo
      - Documentar como realmente acontece (não como deveria ser)
      - Se executor não pode: observador externo senta ao lado e documenta

      PASSO 3 — ITERAR VIA REDE
      - Distribuir playbook para franquias/times
      - Cada um sugere melhoria ("tem uma etapa faltando")
      - Processo fica "supertestado" ao longo do tempo

      PASSO 4 — ALOCAÇÃO POR WORKLOAD
      - Definir horas por pessoa/dia (padrão: 8h)
      - Tempo padrão por tipo de tarefa
      - Relatório de acerto/erro para calibrar tempos
    tags: ["processos", "playbook", "operações", "escala", "franquia"]
    source_file: "transcription_COMO_ORGANIZAR_SUA_EMPRESA_.md"
    speaker: "Convidado (G4/Operações)"

  - id: "RH-MET-652"
    title: "Metodologia de Assinatura para Criadores de Conteúdo"
    content: |
      Como manter assinatura (vs curso one-shot):

      PRINCÍPIO: Curso = relevante UMA VEZ. Assinatura = relevante TODO MÊS.

      DISCIPLINA DE OVERDELIVER (Case Norton):
      1. Live de manhã para quem acorda cedo
      2. Live à tarde para quem perdeu a de manhã
      3. Gravação disponível para quem perdeu ambas
      4. Conteúdo NOVO todo dia (valor marginal não decresce)

      MONETIZAÇÃO VIA 3 PILARES:
      1. Acesso — Patreon-like, comunidade fechada
      2. Atenção — Responder, interagir, reconhecer
      3. Educacional — Treinos/aulas/conteúdo atualizado

      ANTI-PATTERN: "R$3 por dia, menos que um cafezinho"
      → Se não gera valor todo dia, perde para o cafezinho na 10ª semana
    tags: ["creator-economy", "assinatura", "retenção", "infoproduto"]
    source_file: "transcription_COMO_SER_UM_INFLUENCIADOR_DE_SUCESSO____Jo_o_Vitor.md"
    speaker: "João Vitor"


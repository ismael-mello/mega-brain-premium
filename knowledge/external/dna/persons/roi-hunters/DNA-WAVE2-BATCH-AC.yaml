# ============================================================================
# L1: PHILOSOPHIES (Core beliefs, worldviews, principles)
# ============================================================================

philosophies:

  - id: RH-PHI-400
    element: "A grande vantagem de um negócio pensando no longo prazo é melhoria incremental — se todo dia tu observar e melhorar um pouquinho, vai ter um negócio que vai empilhar a receita e se tornar grande no longo prazo"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert / Guilherme Lippert / João Vitor"
    tags: [melhoria-continua, crescimento, longo-prazo]

  - id: RH-PHI-401
    element: "Se tu quebra tudo e começa do zero, quebra tudo e começa do zero, tu não constrói algo sólido no longo prazo — foram anos de melhorias empilhadas que constroem algo sólido"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [consistencia, crescimento-composto, longo-prazo]

  - id: RH-PHI-402
    element: "Cinema Hollywood é bilionário fazendo sempre a mesma coisa (jornada do herói) só melhorando a estética — replicar o que funciona com melhorias incrementais é mais rentável que reinventar"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [replicacao, melhoria-incremental, consistencia]

  - id: RH-PHI-403
    element: "A empresa que escreve vence — não é só documentar playbooks, é fazer TUDO ser escrito: reuniões, estudos, decisões, atas. Quando você sai de mapear processos para documentar a empresa como um todo, vai para outro nível"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [documentacao, gestao-conhecimento, processos, cultura]

  - id: RH-PHI-404
    element: "Diferencia padronização, processo e documentação — processo é tudo que você faz, padronização é fazer sempre do mesmo jeito com regras, documentação é descrever e guardar o que foi feito"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [processos, padronizacao, documentacao]

  - id: RH-PHI-405
    element: "A investigação de problemas não busca culpado, busca entender o que aconteceu para nunca mais repetir — o output não é punição, o output é backlog de melhoria"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [gestao, melhoria-continua, cultura, postmortem]

  - id: RH-PHI-406
    element: "Vendedor sem comissão não é vagabundo — se todo mundo sem comissão fosse vagabundo, nenhuma outra área da empresa funcionaria. Top performers performam por ego e competitividade, não pelo dinheirinho de curto prazo"
    source_file: "transcription__155_-_Por_que_n_o_pagamos_comiss_o_.md"
    guest: "Dener Lippert"
    tags: [vendas, remuneracao, gestao-pessoas, comissao]

  - id: RH-PHI-407
    element: "Satisfação = Realidade - Expectativa. Se a realidade for maior que a expectativa, cliente satisfeito. Se menor, insatisfeito. Independente de quão boa foi a entrega objetivamente"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"
    guest: "Dener Lippert"
    tags: [expectativa, satisfacao, retencao, churn]

  - id: RH-PHI-408
    element: "A segunda compra é mais importante que a primeira — a indústria de growth no Brasil está muito restrita à aquisição e primeira compra, negligenciando recorrência e LTV"
    source_file: "transcription__145_-_A_segunda_compra___a_mais_importante_.md"
    guest: "Ricardo Domingues / Guilherme Lippert"
    tags: [retencao, ltv, segunda-compra, jornada-cliente]

  - id: RH-PHI-409
    element: "Livros: menos é mais — é melhor ter 5-10 livros que você acredita e relê-los anualmente do que ler 30 livros por ano e não lembrar nada de nenhum"
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "Dener Lippert / Ricardo Domingues"
    tags: [aprendizado, livros, profundidade]

  - id: RH-PHI-410
    element: "A culpa é sempre sua — você sempre tem que trazer responsabilidade pra você daquilo que aconteceu, nem que seja admitir incompetência em escolher quem trabalhar contigo"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [responsabilidade, lideranca, mentalidade]

  - id: RH-PHI-411
    element: "O Brasil é uma das maiores economias do mundo, extremamente incompetente no que fazemos. Ninguém dominou esse mercado. Por que ir ser idiota competindo com os melhores do mundo nos EUA quando não dominei meu terreno?"
    source_file: "transcription__149_-_Rec_ncia__Frequ_ncia_e_Valor_Monet_rio_para_o_cliente_ideal__RFM_.md"
    guest: "Dener Lippert"
    tags: [foco, mercado-brasil, estrategia, icp]

# ============================================================================
# L2: MENTAL MODELS (Thinking frameworks, lenses for analysis)
# ============================================================================

mental_models:

  - id: RH-MM-400
    element: "Builder and Keeper — tem momento pra ser Builder (construir coisas novas) e momento pra ser Keeper (dar manutenção e melhoria). Se for só um deles, dificilmente constrói um grande negócio"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Guilherme Lippert"
    tags: [gestao, crescimento, manutencao, roles]

  - id: RH-MM-401
    element: "Ciclo de Vida do Criativo — todo criativo/campanha tem uma curva: sobe, performa, entra em declínio. Mas após alguns meses parado, pode ter nova curva de crescimento se reativado"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [criativos, campanha, ciclo-vida, midia-paga]

  - id: RH-MM-402
    element: "T-Shaped Professional — profissional em formato de T que sabe um pouco de várias coisas e aprofunda muito em uma. Como Federer que jogou vários esportes antes de se especializar em tênis"
    source_file: "transcription__135_-_Generalista_ou_Especialista__O_Criativo_Vence_.md"
    guest: "Dener Lippert / Ricardo Domingues"
    tags: [carreira, especialista, generalista, t-shaped]

  - id: RH-MM-403
    element: "Range Model (livro) — generalistas vencem num mundo de especialistas. Mais casos de sucesso tipo Roger Federer (testou vários esportes) do que Tiger Woods (fez só golfe a vida inteira). O generalista é mais provável como padrão replicável"
    source_file: "transcription__135_-_Generalista_ou_Especialista__O_Criativo_Vence_.md"
    guest: "Dener Lippert"
    tags: [carreira, generalista, range, esportes]

  - id: RH-MM-404
    element: "Jornada Macro vs Micro — Jornada micro é o passo-a-passo de ativação (cadastro → primeira compra). Jornada macro é a soma das jornadas micro pensando em 10 anos de LTV, recorrência e monetização"
    source_file: "transcription__145_-_A_segunda_compra___a_mais_importante_.md"
    guest: "Ricardo Domingues"
    tags: [jornada-cliente, macro, micro, ltv]

  - id: RH-MM-405
    element: "Caminho Crítico do Cliente — o caminho ideal/mais virtuoso que um cliente pode percorrer na empresa. Não é linear, o cliente vai e volta, mas você precisa ter o caminho ideal mapeado para guiar"
    source_file: "transcription__145_-_A_segunda_compra___a_mais_importante_.md"
    guest: "Ricardo Domingues"
    tags: [jornada-cliente, caminho-critico, experiencia]

  - id: RH-MM-406
    element: "Árvore de Frutas do ICP — seu universo de clientes está numa árvore. As frutas mais baixas são o ICP (menos energia, mais resultado). Não vá buscar a fruta lá em cima enquanto as de baixo estão desassistidas"
    source_file: "transcription__149_-_Rec_ncia__Frequ_ncia_e_Valor_Monet_rio_para_o_cliente_ideal__RFM_.md"
    guest: "Dener Lippert"
    tags: [icp, foco, priorizacao, vendas]

  - id: RH-MM-407
    element: "Indicador Contábil vs Gerencial — contábil tem lei e padrão (IFRS/GAAP), gerencial é o que faz sentido pra você. ARPU, LTV são gerenciais. Não precisa passar na prova de contabilidade, precisa gerar insight útil"
    source_file: "transcription__142_-_ARPU_X_Gross_Margin___CAC___ROI.md"
    guest: "Dener Lippert / João Vitor"
    tags: [metricas, contabilidade, gerencial, indicadores]

  - id: RH-MM-408
    element: "Investigação de Acidente Aéreo aplicada a churn — ao invés de investigar do efeito pra causa (cancelou, por quê?), ir do início pra frente: como foi a primeira qualificação, como foi a venda, os check-ins, até chegar no cancelamento"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [churn, investigacao, processo, melhoria]

# ============================================================================
# L3: HEURISTICS (Rules of thumb, decision shortcuts, thresholds)
# ============================================================================

heuristics:

  - id: RH-HEUR-400
    element: "90% do tempo as pessoas ficam no feed, não entram no perfil do Instagram. De 39 mil seguidores, apenas ~3 mil visitam o perfil por semana (<10%)"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [instagram, engajamento, alcance, redes-sociais]
    numeric_value: "10%"

  - id: RH-HEUR-401
    element: "Estressar canal que está funcionando antes de abrir novo — se Google está dando certo, colocar mais dinheiro até o retorno líquido começar a decrescer. Só então partir pro próximo canal"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [canais, escala, roi, midia-paga]

  - id: RH-HEUR-402
    element: "ROAS caindo não significa prejuízo — investir R$1M com ROAS 3 (faturar R$3M, margem R$1.5M, lucro R$500K) é MUITO melhor que investir R$1K com ROAS 10 (faturar R$10K, margem R$5K, lucro R$4K). O resultado líquido importa mais que o ROAS"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [roas, escala, metricas, midia-paga]
    numeric_value: "ROAS 3 @ R$1M > ROAS 10 @ R$1K"

  - id: RH-HEUR-403
    element: "Retrospectiva a cada 30 dias — marcar na agenda evento recorrente para olhar histórico: o que deu certo que posso expandir ou reativar? Quase sempre dá para replicar algo da lista"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [retrospectiva, processo, melhoria-continua]
    numeric_value: "30 dias"

  - id: RH-HEUR-404
    element: "Em 24 horas sem aplicar, você esquece ~70% do que estudou. A curva de esquecimento é brutal — por isso releia os melhores livros anualmente ao invés de ler muitos uma vez"
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "Ricardo Domingues"
    tags: [aprendizado, retencao, curva-esquecimento]
    numeric_value: "70% em 24h"

  - id: RH-HEUR-405
    element: "Two Day Rule para hábitos — você pode falhar um dia, mas nunca dois dias seguidos. Quebre um link da corrente, mas não dois. Isso mantém o hábito vivo"
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "Ricardo Domingues"
    tags: [habitos, disciplina, regra-dois-dias]

  - id: RH-HEUR-406
    element: "Média de churn em serviço de marketing digital para PMEs é 50%+ ao ano nos EUA. O setor de serviço para PME é ingrato globalmente"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"
    guest: "Dener Lippert"
    tags: [churn, retencao, agencia, pme]
    numeric_value: ">50% ao ano"

  - id: RH-HEUR-407
    element: "O teto de CAC é a margem de contribuição — se margem é R$280, CAC máximo é R$280 para ficar zero a zero (contando que já está breakevenado na operação)"
    source_file: "transcription__137_-_M_tricas_para_escalar_o_seu_neg_cio.md"
    guest: "Dener Lippert"
    tags: [cac, margem, breakeven, metricas]

  - id: RH-HEUR-408
    element: "Contabilidade com margem ~80%, CAC R$250-300, ticket R$400/mês, retenção 3 anos = LTV de R$6.750. Com fluxo de caixa quase neutro no M1, deveria socar mídia"
    source_file: "transcription__137_-_M_tricas_para_escalar_o_seu_neg_cio.md"
    guest: "Dener Lippert"
    tags: [unit-economics, saas, recorrencia, metricas]
    numeric_value: "margem 80%, CAC R$250-300, LTV R$6.750"

  - id: RH-HEUR-409
    element: "Se o cliente não fez a segunda compra dentro do período médio de recorrência + 1 dia, ative jornada de reengajamento. Exemplo: média é 2 meses → no dia 61 sem recompra, ativar automação"
    source_file: "transcription__145_-_A_segunda_compra___a_mais_importante_.md"
    guest: "Ricardo Domingues"
    tags: [retencao, segunda-compra, automacao, jornada]

  - id: RH-HEUR-410
    element: "Se cada lead indicar outro lead na landing page, você reduz o CPL pela metade. Programa de indicação pós-cadastro na página de obrigado gera referrals baratos"
    source_file: "transcription__128_-_5_Ferramentas_Digitais_que_voc__PRECISA_conhecer.md"
    guest: "Guilherme Lippert"
    tags: [referral, cpl, indicacao, growth]
    numeric_value: "CPL / 2"

  - id: RH-HEUR-411
    element: "Vendedor precisa de 4-6 follow-ups para ter contato interessante com o lead. Lead marcado como Lost após uma tentativa é lead desperdiçado"
    source_file: "transcription__125_-_Os_Fundamentos_de_um_Time_de_Growth.md"
    guest: "Guilherme Lippert"
    tags: [vendas, follow-up, leads, inside-sales]
    numeric_value: "4-6 follow-ups"

  - id: RH-HEUR-412
    element: "ICP Sweet Spot = interseção de 3 coisas: (1) o que eu sou bom, (2) o que o mercado acha que eu sou bom, (3) o que tem alta demanda e escassez de boas ofertas"
    source_file: "transcription__149_-_Rec_ncia__Frequ_ncia_e_Valor_Monet_rio_para_o_cliente_ideal__RFM_.md"
    guest: "Dener Lippert"
    tags: [icp, posicionamento, foco, estrategia]

  - id: RH-HEUR-413
    element: "Remuneração variável impacta negativamente a saúde mental de vendedores (pesquisa AMA). O turnover alto das áreas de vendas é diretamente ligado à oscilação de renda"
    source_file: "transcription__155_-_Por_que_n_o_pagamos_comiss_o_.md"
    guest: "Dener Lippert"
    tags: [vendas, remuneracao, saude-mental, turnover]

  - id: RH-HEUR-414
    element: "Comissão por venda é o pior modelo — vendedor ganha mesmo quando a empresa tem prejuízo na venda (desconto excessivo, CAC alto). O incentivo fica desalinhado"
    source_file: "transcription__155_-_Por_que_n_o_pagamos_comiss_o_.md"
    guest: "Dener Lippert"
    tags: [vendas, comissao, incentivos, remuneracao]

# ============================================================================
# L4: FRAMEWORKS (Structured methodologies, named systems)
# ============================================================================

frameworks:

  - id: RH-FW-400
    element: "ARPU x Gross Margin / CAC = ROI — fórmula definitiva para julgar bom negócio. ARPU (receita média por usuário) x margem de contribuição / custo de aquisição = retorno real"
    source_file: "transcription__142_-_ARPU_X_Gross_Margin___CAC___ROI.md"
    guest: "Dener Lippert / João Vitor / Guilherme Lippert"
    tags: [metricas, roi, formula, unit-economics]
    components:
      - "ARPU: Average Revenue Per User (ticket médio x transações, ou receita total / total de usuários)"
      - "Gross Margin: Margem de contribuição (tudo que sobra para contribuir com custos fixos)"
      - "CAC: Custo de aquisição do cliente"
      - "Diferença: ARPU com 1P (paid users only) vs 2P (todos os usuários)"

  - id: RH-FW-401
    element: "5 Es para Diminuir o Churn — framework de retenção para serviços: (1) Expectativa, (2) Educação, (3) Engajamento, (4) Experiência, (5) Evolução"
    source_file: "transcription__143_-_5_Es_para_diminuir_o_Churn_.md"
    guest: "Dener Lippert"
    tags: [churn, retencao, framework, servicos]
    components:
      - "E1 Expectativa: Underpromise, overdeliver. Satisfação = Realidade - Expectativa"
      - "E2 Educação: Quanto mais o cliente entende o que você faz, menor a frustração"
      - "E3 Engajamento: Manter cliente ativo e usando o serviço"
      - "E4 Experiência: Qualidade da interação e do atendimento"
      - "E5 Evolução: Mostrar progresso e resultados ao longo do tempo"

  - id: RH-FW-402
    element: "V1-V4 Growth Stages — classificação de maturidade do cliente: V1 (zero controle de indicadores), V2 (processos básicos), V3 (escalando), V4 (growth avançado). Cada estágio define disciplinas necessárias no time"
    source_file: "transcription__125_-_Os_Fundamentos_de_um_Time_de_Growth.md"
    guest: "Guilherme Lippert / Ricardo Domingues"
    tags: [growth, maturidade, time, operacao]
    components:
      - "V1: Setup — nunca fez mídia paga, zero controle de CAC/CPL. Time compartilhado"
      - "V2: Processos básicos estabelecidos, começando a ter dados"
      - "V3: Escalando com dados, time semi-dedicado"
      - "V4: Growth avançado, time dedicado, BI sofisticado"

  - id: RH-FW-403
    element: "Disciplinas do Time de Growth — macro split em Analítico (estratégia, tráfego, dados, BI) e Criativo (design, copy, landing pages). Mínimo para V1: gestor de projeto + tráfego + designer-copywriter híbrido"
    source_file: "transcription__125_-_Os_Fundamentos_de_um_Time_de_Growth.md"
    guest: "Guilherme Lippert / Ricardo Domingues"
    tags: [growth, time, disciplinas, estrutura]
    components:
      - "Analítico: gestão de projeto, tráfego, BI/dados, estratégia"
      - "Criativo: design, copy, landing page, UX"
      - "V1 mínimo: 1 pessoa pode fazer tudo (generalista)"
      - "Escalado: especialistas + head generalista"

  - id: RH-FW-404
    element: "RFM — Recência, Frequência e Valor Monetário para definir ICP. Segmentar base de clientes por quão recente comprou, com que frequência compra, e quanto gasta"
    source_file: "transcription__149_-_Rec_ncia__Frequ_ncia_e_Valor_Monet_rio_para_o_cliente_ideal__RFM_.md"
    guest: "Dener Lippert / Ricardo Domingues"
    tags: [rfm, icp, segmentacao, clientes]
    components:
      - "Recência: quão recente foi a última compra"
      - "Frequência: quantas vezes compra em período X"
      - "Valor Monetário: quanto gasta por transação/período"
      - "Combinação dos 3 define clusters de qualidade de cliente"

  - id: RH-FW-405
    element: "OTE (On-Target Earnings) como alternativa a comissão — fixo base + variável atrelado a bater meta trimestral (não % por venda). Elimina incentivo perverso de vender a qualquer custo"
    source_file: "transcription__155_-_Por_que_n_o_pagamos_comiss_o_.md"
    guest: "João Vitor / Dener Lippert"
    tags: [vendas, remuneracao, ote, gestao]
    components:
      - "Fixo: salário base que atrai bons talentos (reduz risco do vendedor)"
      - "Variável: bônus por atingimento de meta (não % por venda)"
      - "Médio prazo: PLR semestral/trimestral"
      - "Longo prazo: stock options com cliff 1 ano, vesting 5 anos"

  - id: RH-FW-406
    element: "Estrutura de Documentação Empresarial via Notion — workspace espelha estrutura da empresa. Cada área tem: nome, missão, indicadores (real vs meta), pessoas, subseções (playbooks, reuniões, assets, links rápidos)"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [documentacao, notion, organizacao, processos]
    components:
      - "Estrutura espelha organograma da empresa"
      - "Cada workspace: missão da área + indicadores real vs meta + lista de pessoas"
      - "Obrigatórios: playbooks, reuniões com ata, assets"
      - "Links rápidos: atalhos para itens mais acessados"
      - "Opcionais: estudos, análises ad-hoc"

  - id: RH-FW-407
    element: "Adquirir-Reter-Monetizar — as 3 coisas que realmente importam para qualquer negócio, não só SaaS. Cliente não é só quem paga, é quem dá atenção (Spotify conta não-pagantes como base)"
    source_file: "transcription__137_-_M_tricas_para_escalar_o_seu_neg_cio.md"
    guest: "Dener Lippert"
    tags: [growth, metricas, saas, retencao]

  - id: RH-FW-408
    element: "Growth Checklist — playbook da imersão Growth Cat: mapear histórico dos últimos 3-6 meses de todas as ações (certas e erradas). Na próxima vez que precisar de pump, voltar na lista de ações que funcionaram e replicar"
    source_file: "transcription__119_-_O_Ciclo_de_Vida_da_Campanha.md"
    guest: "Dener Lippert"
    tags: [growth, checklist, historico, replicacao]

# ============================================================================
# L5: METHODOLOGIES (Step-by-step implementations, processes)
# ============================================================================

methodologies:

  - id: RH-MET-400
    element: "Processo de Implementação de Documentação Empresarial — método em 5 passos para criar cultura de documentação"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [documentacao, implementacao, cultura, notion]
    steps:
      - "1. Criar guia de como fazer documentação (tutorial + templates, não espere que as pessoas saibam)"
      - "2. Montar estrutura base espelhando organograma da empresa (workspace = área)"
      - "3. Definir o que é OBRIGATÓRIO: playbooks das áreas, reuniões com ata, assets/fotos/vídeos"
      - "4. Forçar acesso recorrente: reuniões regulares documentadas no Notion obrigam as pessoas a usar"
      - "5. Esperar 3-4 meses: conformidade social (toda empresa usa → quem não usa é o esquisito)"

  - id: RH-MET-401
    element: "Processo de Definição de ICP por Setores — método V4 para encontrar segmentos ideais"
    source_file: "transcription__149_-_Rec_ncia__Frequ_ncia_e_Valor_Monet_rio_para_o_cliente_ideal__RFM_.md"
    guest: "Dener Lippert"
    tags: [icp, segmentacao, estrategia, vendas]
    steps:
      - "1. Analisar base de clientes: separar por setor/indústria"
      - "2. Filtrar setores com: volume de clientes + clientes-âncora + ROI comprovado"
      - "3. Cruzar com ICP Sweet Spot: o que sou bom × o que mercado acha que sou bom × alta demanda com escassez de oferta"
      - "4. Avaliar TAM de cada setor filtrado"
      - "5. Priorizar setores = frutas baixas da árvore (menos energia, mais resultado)"

  - id: RH-MET-402
    element: "Diagnóstico de Lead Ruim — processo de investigação quando leads 'não convertem'"
    source_file: "transcription__125_-_Os_Fundamentos_de_um_Time_de_Growth.md"
    guest: "Guilherme Lippert"
    tags: [vendas, leads, diagnostico, qualidade]
    steps:
      - "1. Vendedor diz que lead é ruim → pedir motivo específico"
      - "2. Quanto mais vago o feedback, mais provável que vendedor não trabalhou o lead"
      - "3. Ligar diretamente para o lead: 'o time ligou pra você? Como foi o atendimento?'"
      - "4. Descobrir: muitos leads marcados como Lost nunca receberam ligação"
      - "5. Corrigir processo de follow-up: mínimo 4-6 tentativas antes de Lost"

  - id: RH-MET-403
    element: "Cálculo de Fluxo de Caixa por CAC e Payback — método para avaliar se investimento em aquisição faz sentido"
    source_file: "transcription__137_-_M_tricas_para_escalar_o_seu_neg_cio.md"
    guest: "Dener Lippert"
    tags: [financeiro, cac, payback, fluxo-caixa]
    steps:
      - "1. Calcular margem de contribuição por venda (receita - impostos - frete - COGS)"
      - "2. Comparar margem M1 vs CAC: se margem M1 > CAC = fluxo de caixa positivo (ótimo)"
      - "3. Se CAC > margem M1 = fluxo de caixa negativo temporário"
      - "4. Calcular payback: em quantos meses a recorrência paga o CAC"
      - "5. Projetar LTV: margem de contribuição × meses de retenção"
      - "6. Decidir velocidade de aquisição: mais rápido = mais rombo de caixa mas mais margem futura"

  - id: RH-MET-404
    element: "Implementação de Hábitos (Atomic Habits aplicado) — método para criar novos hábitos com sucesso"
    source_file: "transcription__127_-_ONDE_buscar_conhecimento_.md"
    guest: "Ricardo Domingues"
    tags: [habitos, disciplina, atomic-habits, desenvolvimento]
    steps:
      - "1. Ambiente: ajuste o ambiente para facilitar o hábito (garrafa de água visível, Kindle na mesa)"
      - "2. Empilhamento: anexe novo hábito a hábito existente (após café → meditar)"
      - "3. Gatilhos: use a conclusão do hábito A como trigger para hábito B"
      - "4. Comece ridiculamente baixo: 3x por semana, não 6x (certeza de cumprir)"
      - "5. Two Day Rule: pode falhar um dia, nunca dois seguidos"
      - "6. Build up gradual: janeiro 3x/semana → fevereiro 5x → março 6x"

  - id: RH-MET-405
    element: "Compartilhamento de Consciência para Autonomia — método para capacitar equipe a tomar decisões sem precisar do líder"
    source_file: "transcription__122_-_Por_que_sua_empresa_deveria_ESCREVER_MAIS_.md"
    guest: "João Vitor"
    tags: [gestao, autonomia, documentacao, decisao]
    steps:
      - "1. Documentar CONTEXTO de cada área/projeto: por que existe, o que é importante"
      - "2. Documentar COVENANTES: em cada situação, qual métrica priorizar (ex: durante lançamento, volume > CPL)"
      - "3. Tornar facilmente acessível: links rápidos, 3 cliques máximo"
      - "4. Testar: às 3h da manhã, seu time consegue tomar decisão correta sem você?"
      - "5. Se não conseguem → documentação de contexto insuficiente, volte ao passo 1"


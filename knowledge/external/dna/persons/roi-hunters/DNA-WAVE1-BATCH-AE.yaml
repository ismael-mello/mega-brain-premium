# ==========================================================================
# L1: PHILOSOPHIES (Core beliefs and worldviews)
# ==========================================================================

PHILOSOPHIES:
  - id: RH-PHI-200
    text: "Melhoria incremental diaria e o que constroi negocios solidos no longo prazo. Empilhar pequenas melhorias todo dia gera resultados compostos que sao imbativeis."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: growth

  - id: RH-PHI-201
    text: "A culpa e sempre sua. Voce sempre tem que trazer responsabilidade pra voce daquilo que existiu. Nem que seja falar: fui incompetente em escolher quem ia trabalhar comigo."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: lideranca

  - id: RH-PHI-202
    text: "Vendas cura tudo. Se voce tem vendas, voce resolve qualquer problema no negocio."
    source: Ep.146 - Vendas Cura Tudo
    speaker: Dener Lippert / Ricardo Jordao
    domain: vendas

  - id: RH-PHI-203
    text: "O obvio e subestimado. Empresarios ficam procurando ciencia de foguete em coisas obvias. Starbucks vende cafe, Boticario tem modelo obvio. O problema e que a gente complica."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: estrategia

  - id: RH-PHI-204
    text: "Quem nao escolhe, dificilmente vai ser escolhido. O mercado quer atender todo mundo e nao escolhe. Voce precisa definir quem voce serve e focar nisso."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: posicionamento

  - id: RH-PHI-205
    text: "Dinheiro e o que o cliente deixa, valor e o que ele leva. NPS nao e a atividade mais importante do negocio. A mais importante e o quanto de ROI o cliente fez."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: experiencia-cliente

  - id: RH-PHI-206
    text: "Comprar conhecimento sempre paga os melhores dividendos. Contrate especialistas, aprenda enquanto desenvolve o projeto com eles. Nao tente ser Steve Jobs em tudo."
    source: Clip - Decisao de Tecnologia
    speaker: Dener Lippert
    domain: gestao

  - id: RH-PHI-207
    text: "Tudo que tem dono e melhor. Quando alguem com skin in the game e commitment lidera algo, os resultados sao superiores."
    source: Ep.166 - 8 Inovacoes de Marketing 2023
    speaker: Dener Lippert
    domain: lideranca

  - id: RH-PHI-208
    text: "Se o usuario repetiu, e porque e importante. Se e importante, grave. O feedback implicito e mais valioso que pesquisas formais."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    domain: produto

  - id: RH-PHI-209
    text: "A fama deve ser meio, nao fim. Usar fama como meio para resultado e diferente de ter fama como resultado. Quando fama vira fim, vira droga."
    source: Ep.91 - Metrica do Primo Rico
    speaker: Joao Vitor
    domain: branding-pessoal

  - id: RH-PHI-210
    text: "A rentabilidade mora na retencao, nao na aquisicao. Ao inves de focar so em aumentar network/clientes, nutra os relacionamentos que voce tem."
    source: Clip - Chave para Networking
    speaker: Dener Lippert
    domain: retencao

  - id: RH-PHI-211
    text: "Nao existe separacao entre vida pessoal e profissional. Com redes sociais a mascara caiu. Voce e uma pessoa, ponto."
    source: Ep.118 - Lucas Amadeu
    speaker: Lucas Amadeu
    domain: carreira

  - id: RH-PHI-212
    text: "O objetivo nao e punir, e criar backlog de melhoria. O output de uma investigacao de problema nao e achar culpado, e garantir que nunca mais aconteca."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: gestao

  - id: RH-PHI-213
    text: "As pessoas nao julgam as coisas de maneira objetiva. Elas julgam com base na comparacao. Nao e bom ou ruim, e melhor ou pior que a expectativa."
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Joao Vitor
    domain: experiencia-cliente

  - id: RH-PHI-214
    text: "Escassez gera growth. Proibir celular, proibir foto, negar clientes na porta - coisas contraintuitivas que criam desejo e exclusividade."
    source: Clip - Proibido Celular no Bar / Sweet Secrets
    speaker: Dener Lippert
    domain: growth

  - id: RH-PHI-215
    text: "O processo comercial tem que ser maduro o suficiente para ter uma camada de estrategia onde a narrativa e controlada pela empresa e nao pelo vendedor."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: vendas


# ==========================================================================
# L2: MENTAL MODELS (Thinking frameworks, decision lenses)
# ==========================================================================

MENTAL_MODELS:
  - id: RH-MM-200
    text: "Builder vs Keeper - Todo negocio precisa de dois perfis: quem constroi coisas novas e quem da manutencao/melhora o existente. Se voce so for um dos dois, dificilmente constroi algo grande."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    domain: gestao

  - id: RH-MM-201
    text: "Indicador Contabil vs Indicador Gerencial - Indicadores contabeis (DRE, Gross Margin) seguem leis. Indicadores gerenciais (ARPU, LTV, CAC) voce adapta ao insight que precisa. Nao precisa passar em prova de contabilidade."
    source: Ep.142 - ARPU x Gross Margin / CAC = ROI
    speaker: Joao Vitor / Dener Lippert
    domain: metricas

  - id: RH-MM-202
    text: "Atividade-Chave vs Fator Critico de Sucesso - Atividade-chave e a razao pela qual o cliente vem ate voce (McDonalds = comer rapido padronizado). Fator critico e o que voce monitora para saber se esta entregando valor."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: estrategia

  - id: RH-MM-203
    text: "Persona Atitudinal vs Demografica - Persona por demografia (idade, renda) e limitada. Persona por atitude (o que leva a decisao) e mais poderosa. McDonalds: nao e C/D, e qualquer um que quer comer rapido."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: marketing

  - id: RH-MM-204
    text: "ROAS vs Resultado Liquido - ROAS caindo nao significa negocio piorando. Se ROAS cai de 10 para 3 mas investimento subiu de 1K para 1M, resultado liquido pode ser 500K vs 4K. Olhe resultado liquido, nao ROAS."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: midia-paga

  - id: RH-MM-205
    text: "Satisfacao = Realidade - Expectativa. Se realidade > expectativa, cliente satisfeito. Se realidade < expectativa, insatisfeito. Nao importa quao boa foi a entrega em termos absolutos."
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Joao Vitor
    domain: retencao

  - id: RH-MM-206
    text: "Investigacao de Acidente Aereo aplicada a Churn - Em vez de ir do efeito para causa, va do inicio ao fim: contratacao, qualificacao, check-ins, ate o cancelamento. Output nao e punir, e criar backlog de melhoria."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: retencao

  - id: RH-MM-207
    text: "Ciclo de Vida do Criativo - Criativos de anuncio tem ciclo: lancamento, pico, declinio, morte. Mas apos meses de pausa, podem ser reativados com nova curva. O mesmo vale para conteudo, campanhas e publicos."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    domain: midia-paga

  - id: RH-MM-208
    text: "LTV sobre CAC - A metrica definitiva de um bom negocio. Mas LTV nao e receita dividida por usuarios (erro comum). LTV = ARPU x Margem de Contribuicao / CAC."
    source: Ep.142 - ARPU x Gross Margin / CAC = ROI
    speaker: Dener Lippert
    domain: metricas

  - id: RH-MM-209
    text: "Interdependencia vs Modularidade - Velocidade vem de modularidade. Servicos padronizados escalam mais rapido. Mas personalizacao (interdependencia) aumenta retencao. Encontre o equilibrio."
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Guilherme Lippert
    domain: produto

  - id: RH-MM-210
    text: "North Star Metric como KPI Supremo - So use de verdade se tiver maturidade organizacional. Para 99% dos negocios, usar como balizador geral (mais receita OU mais clientes OU mais margem OU mais atencao)."
    source: Ep.105 - Metrica Absoluta
    speaker: Joao Vitor
    domain: metricas

  - id: RH-MM-211
    text: "Startup dentro de Megacorp - Para inovar em grande empresa, crie uma BU separada, completamente independente, com autonomia e budget. Descolada do caminho tortuoso de aprovacoes."
    source: Clip - Diferenca Empresas Tech vs Tradicionais
    speaker: Natano Mattos
    domain: inovacao

  - id: RH-MM-212
    text: "Acqui-hire - M&A de pessoas. Comprar uma consultoria/startup nao pela solucao mas pelo time (65-75 pessoas que ja trabalham em conjunto). Time funcional junto tem valor de equity."
    source: Clip - Acqui-hire
    speaker: Dener Lippert
    domain: gestao-pessoas

  - id: RH-MM-213
    text: "Use Case como driver de growth - Entender QUANDO e POR QUE o cliente usa seu produto (situacoes especificas). Uber: situacao de precisar ir de A a B. Spotify: momento de ouvir musica. Mapear use cases gera expansao."
    source: Clip - Importancia do Use Case
    speaker: Natano Mattos
    domain: produto


# ==========================================================================
# L3: HEURISTICS (Practical rules with numbers/thresholds)
# ==========================================================================

HEURISTICS:
  - id: RH-HEUR-200
    text: "90% das pessoas ficam no feed/stories - nao entram no perfil. De 39K seguidores, apenas ~3K visitas ao perfil por semana (menos de 10%)."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    numbers: "10% visitam perfil por semana"
    domain: social-media

  - id: RH-HEUR-201
    text: "Retrospectiva a cada 30 dias - Marque na agenda evento recorrente mensal. Pergunte: o que deu certo que posso expandir ou reativar? Uma hora na agenda a cada 30 dias."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    numbers: "1h/30 dias"
    domain: growth

  - id: RH-HEUR-202
    text: "Estresse o canal que funciona antes de diversificar. Se Google ta dando certo, coloca mais, mais, mais ate ele comecar a dar indicios de declinio. So entao va pro proximo canal."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: midia-paga

  - id: RH-HEUR-203
    text: "Black Friday se prepara 3+ meses antes. Comparar com Rock in Rio que e planejado o ano inteiro. Pense em Black Friday como um lancamento."
    source: Ep.92 - Black Friday Ja Comecou
    speaker: Dener Lippert
    numbers: "3 meses de antecedencia"
    domain: campanhas

  - id: RH-HEUR-204
    text: "Taxa media de churn em servicos de marketing para PME e 50%+ ao ano. Qualquer coisa abaixo disso ja e acima da media do setor."
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Dener Lippert
    numbers: ">50% churn anual (media do setor)"
    domain: retencao

  - id: RH-HEUR-205
    text: "Se o cliente que ja comprou antes tem taxa de conversao de 90%, segregue na LP. Pergunte no formulario: voce ja comprou antes? Sim = lead quente. Nao = outro funil."
    source: Clip - Aumente a Eficiencia
    speaker: Dener Lippert
    numbers: "90% conversao de recompra"
    domain: vendas

  - id: RH-HEUR-206
    text: "Teto de CAC = Margem de Contribuicao unitaria (breakeven). Nunca gaste mais em CAC do que a margem que aquele cliente gera. Exemplo: copo por R$100, margem 70% = teto CAC R$70."
    source: Ep.142 - ARPU x Gross Margin / CAC = ROI
    speaker: Guilherme Lippert
    numbers: "CAC max = margem de contribuicao"
    domain: metricas

  - id: RH-HEUR-207
    text: "Melhor comprar 10 insercoes no programa barato do que 1 no caro. Frequencia > Alcance para memorizacao. O cara nao lembra do seu anuncio com 1 exibicao."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    numbers: "10 insercoes > 1 insercao cara"
    domain: midia

  - id: RH-HEUR-208
    text: "Se conteudo/criativo deu certo, reposte a cada mes por 6 meses. Publico novo entra, publico antigo nao lembra. Historico de audiencia renova constantemente."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    numbers: "repost 1x/mes por 6 meses"
    domain: conteudo

  - id: RH-HEUR-209
    text: "Toda proposta comercial deve ter prazo + limite de quantidade. Urgencia temporal + escassez de vagas. Mas tem que ser real, tem que ter algo que sustente."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: vendas

  - id: RH-HEUR-210
    text: "Empresas que melhor atendem cliente cresceram 1700% em 15 anos vs 600% do S&P 500. CX Index da Forrester vs S&P 100 mostra: atender bem = crescer mais."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    numbers: "1700% vs 600% em 15 anos"
    domain: experiencia-cliente

  - id: RH-HEUR-211
    text: "2/3 do publico que investe na Bolsa segue no Instagram (caso Primo Rico com 5.2M seguidores, 3.6M investem, 2.4M sao seguidores). O excedente e publico de growth."
    source: Ep.91/100 - Primo Rico / Estrategias Growth
    speaker: Thiago Nigro
    numbers: "2/3 overlap audiencia-produto"
    domain: growth

  - id: RH-HEUR-212
    text: "Para growth de verdade, escolha entre 4 coisas: mais receita OU mais clientes OU mais margem OU mais atencao. O maior gap e onde focar. Se correr para todos ao mesmo tempo, decisao desesperada."
    source: Ep.105 - Metrica Absoluta
    speaker: Joao Vitor
    numbers: "4 alavancas de crescimento"
    domain: growth

  - id: RH-HEUR-213
    text: "Todo segundo-feira mande uma mensagem para alguem relevante do network que voce nao fala ha tempo. Simples: 'E ai, ta tudo certo? Precisa de alguma coisa?' Previna networking de emergencia."
    source: Clip - Chave para Networking
    speaker: Dener Lippert
    numbers: "1 mensagem/semana"
    domain: networking

  - id: RH-HEUR-214
    text: "Numa cidade que antes tinha 15 integradores de energia solar agora tem 70-90. Quando barreira de entrada e baixa, concorrencia explode. Voce NAO PODE viver so de um canal de venda (indicacao nao e infinita)."
    source: Clip - Barreira Energia Solar
    speaker: Convidado (energia solar)
    numbers: "15 para 70-90 concorrentes"
    domain: estrategia

  - id: RH-HEUR-215
    text: "Crie LPs com perguntas de qualificacao mesmo que suba o CPL. Filtrar leads no formulario economiza tempo de vendedor. Pergunta 'ja comprou antes?' ja separa 90% conversao vs baixa conversao."
    source: Clip - Aumente a Eficiencia
    speaker: Dener Lippert
    domain: leadgen

  - id: RH-HEUR-216
    text: "Pixel Helper e obrigatorio no navegador de todo profissional de marketing. Use como argumento de venda: entre no site do prospect, mostre que ele nao tem pixel. 'Eles nao sabem o que estao fazendo.'"
    source: Ep.46 - 9 Ferramentas
    speaker: Dener Lippert
    domain: ferramentas

  - id: RH-HEUR-217
    text: "Breakeven da operacao em 8 meses para negocio de experiencia/escassez (bar speakeasy). Planejado no BP como caixa negativo no inicio para gerar atracao organica."
    source: Clip - Proibido Celular no Bar
    speaker: Convidado (Sweet Secrets)
    numbers: "8 meses para breakeven"
    domain: negocios

  - id: RH-HEUR-218
    text: "O nosso CAC de conteudo organico e muito mais baixo do que qualquer trafego pago. Ja paguei pelo time, ja produzi conteudo. O custo marginal de manter e muito inferior."
    source: Ep.100 - 5 Melhores Estrategias
    speaker: Thiago Nigro (Primo Rico)
    domain: growth


# ==========================================================================
# L4: FRAMEWORKS (Structured methodologies with names)
# ==========================================================================

FRAMEWORKS:
  - id: RH-FW-200
    name: "Formula do ROI da V4"
    description: "ARPU x Gross Margin / CAC = ROI. A metrica definitiva para julgar eficiencia de marketing. ARPU = ticket medio x numero de transacoes (para negocios sem usuarios nao-pagantes). Margem de contribuicao = tudo que sobra para contribuir com custos fixos."
    source: Ep.142 - ARPU x Gross Margin / CAC = ROI
    speaker: Dener Lippert
    domain: metricas

  - id: RH-FW-201
    name: "5 Es para Reduzir Churn"
    description: |
      1. EXPECTATIVA - Underpromise, overdeliver. Satisfacao = Realidade - Expectativa.
      2. EDUCACAO - Quanto mais o cliente entender o que voce faz, menor a frustracao.
      3. EDICAO - Quanto mais personalizado/editado a entrega, mais engajado.
      4. (nao capturado na transcricao)
      5. (nao capturado na transcricao)
      Retirado de pesquisa de instituicao americana sobre servicos de marketing para PMEs.
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Dener Lippert
    domain: retencao

  - id: RH-FW-202
    name: "Growth Checklist - Historico de Acoes"
    description: |
      1. Mapeie historico de acoes dos ultimos 3-6 meses (tudo que fez de certo e errado)
      2. Quando precisar dar pump nas vendas, volte na lista
      3. Identifique acoes que deu certo e podem ser replicadas
      4. Quase sempre da para replicar algo da lista
      5. So pense em algo novo se nenhuma acao antiga faz sentido
      Previne inercia e reinvencao desnecessaria.
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    domain: growth

  - id: RH-FW-203
    name: "Growth Class Obrigatoria (V4)"
    description: "Todo cliente que fecha passa por uma aula obrigatoria de 1h sobre como gerenciar time de marketing. Aula gravada do CEO. Garante alinhamento de expectativa independente de qual closer vendeu."
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Dener Lippert
    domain: onboarding

  - id: RH-FW-204
    name: "Land and Expand"
    description: "Traga o cliente com experiencia impecavel (sem empurrar produto). Uma vez que e seu cliente, expanda naturalmente com ofertas adequadas a jornada de atitudes dele. Nao e empurrar - e disponibilizar o que ele precisa na hora certa."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: vendas

  - id: RH-FW-205
    name: "Investigacao de Churn estilo Acidente Aereo"
    description: |
      Nao investigue do efeito para a causa. Va do inicio:
      1. Quem era o cliente? (perfil, historico)
      2. Como foi qualificado? (ligacao gravada)
      3. Como foi a reuniao de venda? (gravacao)
      4. Como foram os check-ins? (registros)
      5. O que aconteceu ate o cancelamento?
      Output: backlog de melhoria, nao punicao.
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: retencao

  - id: RH-FW-206
    name: "Member Get Member (Escassez)"
    description: "Negocios baseados em exclusividade: proibir fotos (misterio), exigir indicacao para entrar, experiencia presencial sem celular. Tres pilares: misterio, exclusividade, experiencia real. Contra-intuitivo mas gera growth organico."
    source: Clip - Sweet Secrets / Proibido Celular
    speaker: Convidado (Sweet Secrets)
    domain: growth

  - id: RH-FW-207
    name: "Branded Content como Evolucao da Midia"
    description: "Em vez de vender algo interruptivo, crie conteudo integrado. Modelo SBT/Silvio Santos foi primeiro revenue share de midia no Brasil. Creator > Influencer: creator e diretor dos proprios conteudos, influencer so empresta audiencia."
    source: Clip - 5 Evolucoes da Midia Paga
    speaker: Dener Lippert
    domain: midia

  - id: RH-FW-208
    name: "Atividade-Chave do Negocio (Carlos Busch)"
    description: |
      Pergunte: O que faz meu cliente vir ate mim?
      - McDonald's: comer rapido com padrao conhecido
      - Amazon: confianca + conveniencia + preco baixo
      - Apple Store: loja cheia (visitacao)
      - Padaria: ter tudo, qualquer hora
      Proteja isso acima de tudo. Nao terceirize atividade-chave.
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: estrategia

  - id: RH-FW-209
    name: "Documentacao como Motor de Growth"
    description: |
      1. Toda ligacao/reuniao e gravada
      2. Quando alguem pergunta algo, primeiro verificar se ja esta documentado
      3. Se nao esta e deveria, responder + documentar + avisar o time
      4. Criar playbooks por area em Notion/G4 Skills
      5. Retrospectiva mensal usa documentacao para encontrar padroes
    source: Clip - Melhores Ferramentas Documentacao
    speaker: Guilherme Lippert
    domain: operacoes

  - id: RH-FW-210
    name: "Pesquisa Atitudinal vs Demografica"
    description: "Em vez de segmentar por dados demograficos (idade, renda, segmento), segmente por atitudes: o que leva a pessoa a tomar a decisao? Amazon olha quantas vezes Carlos compra por mes, nao quanto gasta."
    source: Ep.323 - 20 Anos de Vendas (Carlos Busch)
    speaker: Carlos Busch
    domain: marketing

  - id: RH-FW-211
    name: "CRM como Sistema Anti-Burrice da Marca"
    description: "CRM serve para sua marca nao parecer idiota. Nao mande email de venda para cliente com chamado aberto no reclameaqui. Nao gaste dinheiro em ads para clientes insatisfeitos. CRM da trabalho mas o resultado e de longo prazo."
    source: Ep.139 - CRM nao e Email Marketing
    speaker: Dener Lippert
    domain: crm


# ==========================================================================
# L5: METHODOLOGIES (Step-by-step implementations)
# ==========================================================================

METHODOLOGIES:
  - id: RH-MET-200
    name: "Como Calcular a Metrica Definitiva (V4)"
    steps:
      - "1. Calcule ARPU: Se todo cliente e pagante, ARPU = Ticket Medio x N. Transacoes"
      - "2. Calcule Margem de Contribuicao: Receita - Impostos - Frete - Taxas - CMV"
      - "3. O teto de CAC e a sua Margem de Contribuicao (breakeven)"
      - "4. Formula: (ARPU x Margem de Contribuicao) / CAC = ROI"
      - "5. Se ROI > 1, negocio eficiente. Se < 1, ineficiente."
      - "6. Use como indicador gerencial (nao contabil). Adapte ao que gera insight para voce."
    source: Ep.142 - ARPU x Gross Margin / CAC = ROI
    speaker: Dener Lippert / Joao Vitor / Guilherme Lippert
    domain: metricas

  - id: RH-MET-201
    name: "Retrospectiva Mensal de Growth"
    steps:
      - "1. Agende evento recorrente mensal (1 hora)"
      - "2. Liste todas as acoes dos ultimos 30 dias: o que fez, resultado, custo"
      - "3. Separe em 'deu certo' e 'deu errado'"
      - "4. Para cada 'deu certo': pode replicar? Pode escalar? Pode melhorar?"
      - "5. Para cada 'deu errado': o que aprendeu? Documentar para nao repetir"
      - "6. Quando precisar de ideias: volte na lista antes de inventar algo novo"
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Guilherme Lippert
    domain: growth

  - id: RH-MET-202
    name: "Reciclagem de Criativos e Conteudo"
    steps:
      - "1. Puxe vitalicios dos criativos de 3-6 meses atras"
      - "2. Identifique os que tiveram bom resultado historico mas foram pausados"
      - "3. Reative o criativo original OU extraia o hook/gancho principal"
      - "4. Crie versao atualizada mantendo a essencia que funcionou"
      - "5. Para conteudo organico: regrave o video mais visto, reposte 1x/mes por 6 meses"
      - "6. Publicos 'saturados' se renovam apos meses de pausa"
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert / Guilherme Lippert
    domain: midia-paga

  - id: RH-MET-203
    name: "Investigacao de Cancelamento (Modelo Aereo)"
    steps:
      - "1. NAO comece pelo cancelamento. Comece pelo inicio."
      - "2. Revise a gravacao da ligacao/reuniao de venda original"
      - "3. Revise as ligacoes de qualificacao"
      - "4. Revise os check-ins durante o servico"
      - "5. Identifique o momento exato onde comecou o problema"
      - "6. Output: emitir 1+ melhoria para o backlog operacional"
      - "7. NAO busque culpado. Busque entender para nao repetir."
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: retencao

  - id: RH-MET-204
    name: "Qualificacao por Formulario Inteligente"
    steps:
      - "1. Substitua envio de PDF/catalogo por formulario tipo Gumroad/pedido online"
      - "2. Adicione perguntas de qualificacao no formulario (ex: 'Ja comprou antes?')"
      - "3. CPL vai subir, mas leads serao mais qualificados"
      - "4. Segregue: quem ja comprou (90% conversao) vs primeira vez (funil diferente)"
      - "5. Cada segmento recebe abordagem comercial propria"
      - "6. Vendedor gasta tempo so com leads filtrados"
    source: Clip - Aumente a Eficiencia
    speaker: Dener Lippert
    domain: vendas

  - id: RH-MET-205
    name: "Como Escalar Midia sem Panic"
    steps:
      - "1. Canal dando resultado? Invista mais (nao diversifique ainda)"
      - "2. Monitore resultado LIQUIDO, nao ROAS"
      - "3. ROAS caindo mas lucro subindo = continue escalando"
      - "4. Quando resultado LIQUIDO comeca a decrescer = ponto de saturacao"
      - "5. So entao considere proximo canal"
      - "6. Se entrar em panico e mudar tudo: provavelmente resultado piora"
      - "7. Quando nada funciona: volte ao que funcionava antes"
    source: Ep.119 - Ciclo de Vida da Campanha
    speaker: Dener Lippert
    domain: midia-paga

  - id: RH-MET-206
    name: "Onboarding Anti-Churn (Growth Class)"
    steps:
      - "1. Todo cliente novo e OBRIGADO a assistir aula de 1h antes de comecar"
      - "2. Aula gravada pelo CEO/fundador (garante qualidade independente do closer)"
      - "3. Conteudo: como gerenciar o servico que esta comprando"
      - "4. Alinha expectativa de forma padronizada"
      - "5. Depois: educacao continuada com eventos presenciais/webinars periodicos"
      - "6. Convidar cliente para Red Quarter para reexplicar detalhes"
    source: Ep.143 - 5 Es para diminuir Churn
    speaker: Dener Lippert
    domain: retencao

  - id: RH-MET-207
    name: "Fine-tuning de AI para Criativos (V4)"
    steps:
      - "1. Colete historico de todos os anuncios/criativos com metricas (CTR, CAC)"
      - "2. Crie base de dados com: imagem + copy + metricas de resultado"
      - "3. Use AI generativa com fine-tuning nessa base"
      - "4. Input: briefing do cliente + dados do cliente"
      - "5. Output: sugestao de criativo baseada no historico de performance"
      - "6. Use como ponto de partida, nao como output final"
    source: Clip - Aplicacoes ChatGPT Marketing
    speaker: Dener Lippert
    domain: ai-marketing



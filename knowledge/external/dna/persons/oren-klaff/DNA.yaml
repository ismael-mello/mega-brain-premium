layers:

  L1_PHILOSOPHIES:
    - id: "FIL-OK-001"
      title: "All Social Interactions Are Governed by Frames"
      content: "Every meeting, business call, or online interaction is a social encounter governed by frames. Frames are mental structures the brain uses to control the massive flow of information coming through your senses. The stronger frame always absorbs the weaker one."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, social-dynamics, pitching]
    - id: "FIL-OK-002"
      title: "Two Dominant Frames Cannot Coexist"
      content: "Two dominant points of view or perspectives cannot exist in the same place at the same time. When frames meet, they collide like a slow-moving car accident — one frame breaks the other to pieces and absorbs it. The dominant frame becomes the governing perspective."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, negotiation, social-dynamics]
    - id: "FIL-OK-003"
      title: "Neediness Destroys Deals"
      content: "Neediness is the single most destructive force in deal-making. You must eradicate neediness inside yourself — not replace it with bravado or aggression, but with response-independence. Being non-needy and nonreactive disrupts the power frame because they don't see the response they expect."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, mindset, negotiation, pitching]
    - id: "FIL-OK-004"
      title: "Humans Have Three Core Emotions"
      content: "We are descendants of people who had just three emotions: angry, hungry, and horny. Our three core behavioral drivers are: we want what we cannot have, we chase that which moves away from us, and we only value those things we work for."
      source: "Module1-SetTheFrame-Transcript"
      domains: [neuroscience-of-selling, evolutionary-psychology, persuasion]
    - id: "FIL-OK-005"
      title: "Money Is a Commodity, Your Deal Is the Prize"
      content: "The buyer's money is a commodity — everyone has money. What you have (your deal, product, idea) is the prize. You are not selling; you are interviewing buyers to see if they deserve access to what you offer. Flip the traditional buyer-seller dynamic entirely."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, pitching, prize-frame, mindset]
    - id: "FIL-OK-006"
      title: "If You're Not Having Fun, Get Out"
      content: "If you are not having fun in a deal or pitch, something is fundamentally wrong. Frame control and prizing must be done in a social, fun, light way with humanity and humility. Without fun, the pressure you apply will feel bitter and repel people."
      source: "Module1-SetTheFrame-Transcript"
      domains: [mindset, pitching, social-dynamics]
    - id: "FIL-OK-007"
      title: "Belief Perseverance Makes First Impressions Lasting"
      content: "Once a frame is set and meaning is associated with it, it becomes highly resistant to new information. Initial judgments are hard to shake. This is the technical principle of belief perseverance — the foundation of why frame control is so powerful."
      source: "Module1-SetTheFrame-Presentation"
      domains: [frame-control, neuroscience-of-selling, persuasion]
    - id: "FIL-OK-008"
      title: "Information Requests Moving Faster Than Relationship = Lost Frame Control"
      content: "When you are getting information requests that are moving faster than the development of the relationship, you are losing frame control. The analyst frame feeds on information disconnected from social relationship."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, analyst-frame, sales-process]
    - id: "FIL-OK-009"
      title: "Stories Are About Who, Not What"
      content: "A business narrative is not about what happens — it's about who it happens to. Buildings are nothing without people. When you make the 'who' things are happening to more important than the 'what' of their questions, people abandon their process and come to yours."
      source: "Module1-SetTheFrame-Transcript"
      domains: [storytelling, pitching, narrative]
    - id: "FIL-OK-010"
      title: "The Pitch Is Always 20 Minutes"
      content: "Your pitch is 20 minutes long and that's all the time you get. You might be in the room for an hour, but 20 minutes is the limit of focused human attention. After that, people's brains slip into survival mode and stop absorbing new information."
      source: "Keynote-Transcript"
      domains: [pitching, attention-management, neuroscience-of-selling]
    - id: "FIL-OK-011"
      title: "Crocodile Brain Is the First Gatekeeper"
      content: "Your message must first pass through the most primitive part of the brain — the crocodile brain — which is focused on survival. Then it passes through the social mid-brain. Only then can it reach the neocortex where decisions are made. If you trigger fear at the croc brain level, you lose."
      source: "Keynote-Transcript"
      domains: [neuroscience-of-selling, pitching, persuasion]
    - id: "FIL-OK-012"
      title: "The Unknown Is a Point of Connection, Answers Are Points of Disconnect"
      content: "Questions, paradox, mystery and uncertainty are seeds of human connection. Once you give someone an answer, it is a point of disconnect — they have what they need and no longer need to pay attention. The unanswered question prompts a powerful reaction of engagement."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [intrigue, attention-management, persuasion, dopamine]
    - id: "FIL-OK-013"
      title: "Business Narrative Is About the Future, Not the Past"
      content: "A business narrative is not about what has happened — it's about what's going to happen. People don't want to hear about the past in a business meeting. The past serves only to frame what the future will be like. You move from past through present into an exciting future."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, narrative]
    - id: "FIL-OK-014"
      title: "Don't Be a Pig — Leave Money on the Table"
      content: "Even when your skill set allows you to charge premium fees, don't overload the deal. Take a fair fee and leave money on the table for other people. Relationships last longer than any single deal, and greed destroys long-term partnerships."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [negotiation, mindset, deal-making]
    - id: "FIL-OK-015"
      title: "Humans Are Pattern-Making Machines"
      content: "Humans are uniquely obsessive about finding patterns, even perceiving order where none exists. The brain has an 'Interpreter' module that drives us to believe 'I can figure this out.' This helps in simple environments but fails in complex financial decisions. People make decisions on very small samples of data."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [neuroscience-of-selling, decision-making, cognitive-bias]
    - id: "FIL-OK-016"
      title: "Add More Value Than You Take"
      content: "Imagine a tube between you and the other person — value flows through it. If you want something from somebody, you must push more value through that tube than you take. Questions take value. Providing insight, introductions, and knowledge adds value. Adding value raises your status."
      source: "Module1-SetTheFrame-Transcript"
      domains: [status, pitching, value-delivery, frame-control]
    - id: "FIL-OK-017"
      title: "Fortune-Cookie Wisdom Defeats Displays of Power"
      content: "When facing the power frame with its fancy accoutrements (planes, restaurants, grand history), rely on basic high-quality business principles: work hard, don't waste money, build quality products, choose good customers, focus on what you're good at. Simple wisdom trumps displays of wealth."
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, negotiation, mindset]
    - id: "FIL-OK-018"
      title: "Prizing Is Not Puffery — It Is Acknowledging Your Own Value"
      content: "Prizing is not blowing up your chest, peacocking, or internal motivation. It's genuinely acknowledging your own value to yourself first, then making your value the prize other people have to win. It flows from an authentic assessment of dominance areas."
      source: "Module1-SetTheFrame-Transcript"
      domains: [prize-frame, mindset, self-awareness]
    - id: "FIL-OK-019"
      title: "Absorbing Factual Information Is Exhausting"
      content: "It is exhausting for the brain to absorb factual information — calculus, accounting, technical data. Social interactions and narrative are what humans are built for. If you walk into a room and start giving people factual information, you are fighting 200,000 years of brain evolution."
      source: "Keynote-Transcript"
      domains: [neuroscience-of-selling, pitching, attention-management]
    - id: "FIL-OK-020"
      title: "Decisions Are Made on Emotion, Not Logic"
      content: "Decisions are made on emotion, not logic. The analytical paradigmatic mindset is the greatest obstacle to closing a deal. You must grab the audience with narrative to keep them in emotional mode rather than cold analytical mode."
      source: "Module6-GetTheDeal-Transcript"
      domains: [neuroscience-of-selling, decision-making, persuasion]
    - id: "FIL-OK-021"
      title: "There's Many a Slip Between the Cup and the Lip"
      content: "Getting a verbal agreement is nothing — actually getting money to transact is everything. Things go wrong even when it looks like a deal is a lay-up. Until money has actually been transferred, the deal is not done."
      source: "Module6-GetTheDeal-Transcript"
      domains: [deal-making, closing, mindset]
    - id: "FIL-OK-022"
      title: "You Must Be Willing to Walk Away"
      content: "The fundamental foundation to pitching, intrigue, and deal-making is the willingness to walk away. If you don't have this inside you, everything else is built like castles on sand. Signal at key moments that if it's not right, you will take your prize and go play in a different sandbox."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [mindset, negotiation, intrigue, frame-control]
    - id: "FIL-OK-023"
      title: "200,000 Years of Brain vs 400 Years of Finance"
      content: "The human race is 200,000 years old but formal financial markets are only 400 years old. Our brains are excellent at simple survival patterns but terrible at economic calculations, identifying randomness, and multivariate decisions. This is why narrative beats analysis in pitching."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [neuroscience-of-selling, evolutionary-psychology, decision-making]
    - id: "FIL-OK-024"
      title: "The Power Frame Wants Economic Value for Nothing"
      content: "The power frame's purpose is to extract economic concessions from you in exchange for things that cost them nothing — their name, their field of play, their volume potential. They use status from money, celebrity, and influence to get you to lower price or give free work."
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, negotiation, frame-control]
    - id: "FIL-OK-025"
      title: "The Attention Problem Is THE Problem"
      content: "At the crucial moment when it's most important to be convincing, 9 out of 10 times we are not. The core challenge in pitching is solving the attention problem - getting and keeping people's focus."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, attention-management, sales-psychology]
    - id: "FIL-OK-026"
      title: "Crocodile Brain Gatekeeping"
      content: "Any new idea presented to another person is initially filtered through the most primitive part of the brain - the crocodile brain. It only thinks: Should I eat it? Should I kill it? Should I mate with it? If your message doesn't pass this filter, nothing else matters."
      source: "PitchMastery-Welcome-Introduction"
      domains: [neuroscience, pitching, buyer-psychology]
    - id: "FIL-OK-027"
      title: "Pitching Is About People, Not Information"
      content: "Pitching is not the organization of information. The better you try to organize your information, it doesn't mean your pitch gets better. Pitching is about people - it's not what happens, it's who it happens to."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, human-psychology, storytelling]
    - id: "FIL-OK-028"
      title: "Stronger Frames Always Win"
      content: "When frames collide, the stronger frame absorbs the weaker one and becomes the dominant perspective. Once a frame is set with strong meaning, new information bounces off it. Initial judgments are hard to shake - this is belief perseverance."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, persuasion, cognitive-psychology]
    - id: "FIL-OK-029"
      title: "The Moral Authority Frame Is Unbreakable"
      content: "The moral authority frame cannot be broken if used properly. You can't appeal beyond doing the right thing. The power frame can't ask you to do the wrong thing - you go to jail for trying to break the morality frame."
      source: "PitchMastery-Welcome-Introduction"
      domains: [frame-control, ethics, negotiation]
    - id: "FIL-OK-030"
      title: "We Are Hardwired To Be Bad At Presentations"
      content: "Humans are hardwired to be bad at making presentations. Our brains developed in three stages (croc brain, midbrain, neocortex) and our thought process exactly matches our evolution: first survival, then social relationships, finally problem-solving."
      source: "PitchMastery-Welcome-Introduction"
      domains: [neuroscience, presentation-skills, evolution]
    - id: "FIL-OK-031"
      title: "The Brain Cannot Multitask"
      content: "The notion of multitasking is false. The brain only focuses on concepts sequentially, one at a time. Minor interruptions can double the time to finish a task or understand a point in a presentation."
      source: "PitchMastery-Welcome-Introduction"
      domains: [neuroscience, attention-management, presentation-skills]
    - id: "FIL-OK-032"
      title: "Stories Don't Explain - They Establish Truthfulness"
      content: "Arguments convince people that something is likely to happen. Stories convince people that what you're talking about is true. Arguments provide empirical proof; narratives establish your truthfulness. Products are easy to understand - don't wrap simple things in stories."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, narrative, persuasion]
    - id: "FIL-OK-033"
      title: "Business Narratives Are About The Future"
      content: "A business narrative is not about what has happened - it's about what's going to happen. People don't want to hear about the past in a business meeting. The past serves only to frame what the future will be like."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, business-narrative, pitching]
    - id: "FIL-OK-034"
      title: "We Chase That Which Moves Away"
      content: "Humans instinctively chase what moves away from us. We want what we cannot have. We only value those things that we work for. This is the fundamental psychology behind withdrawal and prizing."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [buyer-psychology, prize-frame, human-nature]
    - id: "FIL-OK-035"
      title: "Certainty Over Roller Coasters"
      content: "People pay you for certainty and reliability, not for descriptions of roller coaster rides. Telling dramatic stories of failure and recovery gives you low status. People buy McDonald's worldwide because they know exactly what they'll get."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [positioning, status, business-narrative]
    - id: "FIL-OK-036"
      title: "Information Requests Must Match Relationship Phase"
      content: "When information requests move faster than the development of the relationship, you are losing frame control. The analyst frame is recognized when deep due diligence happens before wanting, collaboration, or basic deal terms are in place."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [analyst-frame, deal-management, relationship-building]
    - id: "FIL-OK-037"
      title: "Power Frames Want Economic Concession For Nothing"
      content: "The power frame wants economic value from you in exchange for things that cost them nothing - their name, their platform, promises of future volume. They use power to extract value, not exchange it. That's why it must be combated."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [power-frame, negotiation, pricing]
    - id: "FIL-OK-038"
      title: "Status Comes From Three Sources"
      content: "Status comes from money, celebrity, and influence. Power is driven by status. Cognitive psychologists have confirmed this through fMRI brain imaging. Understanding the source of someone's status is key to disrupting their power frame."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [status, social-dynamics, power-frame]
    - id: "FIL-OK-039"
      title: "Focused Attention Has A Biological Limit"
      content: "After about 20 minutes of focused attention, mental efficiency drops dramatically. The audience's brain essentially stalls out. You must restart the engagement engine through intrigue, not by continuing to present information."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [attention-management, neuroscience, presentation-skills]
    - id: "FIL-OK-040"
      title: "People Make Decisions On Small Samples"
      content: "Our ancestors evolved in simple environments and learned to make the most of small data samples. Today our brains still work this way - people perceive patterns where none exist and leap to conclusions from fragments. They don't need all the detail."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [buyer-psychology, decision-making, neuroscience]
    - id: "FIL-OK-041"
      title: "Desire Is Created By Tension, Not Information"
      content: "Information doesn't create desire - tension does. When you give all the information, desire drops to zero. The key to creating wanting is to introduce something and then pull it back before fully revealing it."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [desire-creation, intrigue, sales-psychology]
    - id: "FIL-OK-042"
      title: "Don't Be A Piker"
      content: "A piker is someone who wants a push-button method and wants someone else to do the hard work for them. People learn to pitch the right way to become great, grow businesses, close big deals, break records and make money. No other reason."
      source: "PitchMastery-Welcome-Introduction"
      domains: [mindset, work-ethic, mastery]
    - id: "FIL-OK-043"
      title: "Leave Money On The Table"
      content: "Don't be pigs in fee negotiations. Making fair fees with parity builds long-term relationships. Charging maximum fees when you can get them is short-sighted. The moral authority of fairness is more powerful than extra profit."
      source: "AccelerationCallWeek1"
      domains: [pricing, moral-authority, business-ethics]
    - id: "FIL-OK-044"
      title: "Fortune Cookie Wisdom Over Accoutrements Of Power"
      content: "Counter displays of wealth and power with basic, honest business principles: I work hard, I don't waste money, we build quality products, we choose good customers. Simple fortune-cookie wisdom defeats flashy power displays."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [power-frame, values, positioning]
    - id: "FIL-OK-045"
      title: "You Cannot Blow Up Someone's Process"
      content: "When you're in someone else's process (interview, pitch fest, bake-off), you can't disrupt it completely. Instead, use dozens of tiny strands (like Gulliver's Travels) that accumulate frame control without destroying the process."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, process-management, adaptation]
    - id: "FIL-OK-046"
      title: "Value Must Flow Both Ways"
      content: "When you get together with someone, imagine a tube between you through which value flows. If you want something from someone, you must add more value than you take. Questions take value; insights give value. Status rises as you push value through the tube."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [value-creation, status, relationship-building]
    - id: "FIL-OK-047"
      title: "The Social Transaction Precedes The Financial Transaction"
      content: "The pitch is the social transaction. The financial transaction happens during due diligence. During the social transaction, you're tough, serious, and forceful while also having fun with humanity and humility."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [deal-making, social-dynamics, pitching]
    - id: "FIL-OK-048"
      title: "A Character Reveals Himself Through Conflict"
      content: "A character reveals himself by rising to the level necessary to overcome conflict. If the forces defeated are easy, the story is not emotionally involving. Great tenacity and strength of will can only be shown against worthy adversaries."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, character-building, narrative]

    - id: "FIL-OK-049"
      title: "Cash is a Commodity You Are the Prize"
      content: "The buyers money is a commodity what you have (product, service, idea) is the prize. Their cash is interchangeable; your offering is unique and valuable."
      source: "Module4-OfferThePrize"
      domains: [pitching, sales-psychology, frame-control]
    - id: "FIL-OK-050"
      title: "Three Laws of Human Condition"
      content: "Three laws govern deals: we want what we cannot have, we chase that which moves away, we only value things we pay for."
      source: "Module4-OfferThePrize"
      domains: [human-psychology, sales-psychology, persuasion]
    - id: "FIL-OK-051"
      title: "Wanting Over Liking Drives Action"
      content: "Do not get people to LIKE your deal (cold, reasoned). Create WANTING (hot, fast, poised for action). Hot cognition beats cold cognition."
      source: "Module4-OfferThePrize"
      domains: [persuasion, hot-cognition, sales-psychology]
    - id: "FIL-OK-052"
      title: "Analysis Serves Justification Not Decision"
      content: "People use research and data to justify choices already made emotionally, not to make the choices. If analysis doesnt support what they want, they redo it."
      source: "Module4-OfferThePrize"
      domains: [decision-making, sales-psychology]
    - id: "FIL-OK-053"
      title: "Autonomy Is Hardwired in Humans"
      content: "Humans desire autonomy the ability to choose according to free will. When autonomy is threatened by coercion, people become fearful and resistant even to things they want."
      source: "Module6-GetTheDeal"
      domains: [human-psychology, deal-closing, persuasion]
    - id: "FIL-OK-054"
      title: "Say What You Mean and Mean What You Say"
      content: "Commitment to your word is the foundation of compelling character. Honor time constraints, walk-away points, pricing limits even when it costs you a deal."
      source: "Module6-GetTheDeal"
      domains: [integrity, deal-closing, character]
    - id: "FIL-OK-055"
      title: "Frame Control Is Giving Not Dominating"
      content: "Frame control is not about domination. Get control to qualify yourself as the prize, then give it back. Give someone a fun game to play in a business meeting."
      source: "Deconstruction"
      domains: [frame-control, social-dynamics, pitching]
    - id: "FIL-OK-056"
      title: "Questions Suck Value from Interactions"
      content: "Asking questions in a pitch takes value. Questions force interaction rather than earning it. Make statements that draw people into conversation instead."
      source: "Deconstruction"
      domains: [pitching, value-exchange, communication]
    - id: "FIL-OK-057"
      title: "Attention Is the Ultimate Currency"
      content: "Your dream as a presenter is attention. Everything in pitching is about earning and keeping voluntary attention through social tools not force."
      source: "Teardown"
      domains: [attention, pitching, communication]
    - id: "FIL-OK-058"
      title: "Emotion Is Essential to Decision Making"
      content: "Contrary to high-reason view, emotions are not intrusions. Patients with damage to emotion-processing areas struggle with routine decisions. Emotion and reason must work together."
      source: "Decisions_and_Desires"
      domains: [neuroscience, decision-making, emotion]
    - id: "FIL-OK-059"
      title: "Social Pain Equals Physical Pain"
      content: "Social rejection activates the same neural region as physical pain (dorsal anterior cingulate cortex). Being ostracized triggers responses equivalent to a blow to the head."
      source: "Managing_with_the_Brain_in_Mind"
      domains: [neuroscience, social-dynamics, leadership]
    - id: "FIL-OK-060"
      title: "Threat Always Trumps Reward"
      content: "Threat response is more intense and longer-lasting than reward. Once aroused, hard to displace and can impair performance all day."
      source: "Managing_with_the_Brain_in_Mind"
      domains: [neuroscience, leadership, persuasion]
    - id: "FIL-OK-061"
      title: "Feeling Is First Affect Precedes Cognition"
      content: "Affective reactions are the very first reactions. We can like or fear something before we know precisely what it is. Reliable affect discriminations occur without recognition memory."
      source: "Thinking_and_Feeling"
      domains: [neuroscience, emotion, perception]
    - id: "FIL-OK-062"
      title: "Believability Beats Logic"
      content: "Logically valid but unbelievable conclusions accepted only 56 percent of time. Logically invalid but believable conclusions accepted 71 percent. We prefer fast less cognitively taxing processes."
      source: "Cognitive_Biases"
      domains: [cognitive-bias, decision-making, persuasion]
    - id: "FIL-OK-063"
      title: "Catchers Judge the Pitcher Not Just the Idea"
      content: "Catchers gauge the pitchers creativity as well as the proposal. Judgments about the pitchers ability permanently overshadow perceptions of the ideas worth."
      source: "How_to_Pitch_a_Brilliant_Idea"
      domains: [pitching, perception, persuasion]
    - id: "FIL-OK-064"
      title: "Emotional Memories Are Unforgettable"
      content: "Strong emotions potentiate learning via norepinephrine. Memory traces tied to strong emotions are retrieved with great clarity. Amygdala activation during encoding determines long-term stability."
      source: "Emotional_Memories"
      domains: [neuroscience, emotion, memory]
  L2_MENTAL_MODELS:
    - id: "MM-OK-001"
      title: "The Three-Brain Model (Croc Brain Theory)"
      content: "Information must pass through three layers of the brain in sequence: (1) Crocodile brain — primitive, survival-focused, first responder; (2) Mid-brain — social processing; (3) Neocortex — analytical decision-making. Your pitch must first satisfy the croc brain before it can reach the neocortex."
      source: "Keynote-Transcript"
      domains: [neuroscience-of-selling, pitching, persuasion]
    - id: "MM-OK-002"
      title: "Frame Collision Model"
      content: "When two people meet, each brings a frame (point of view). These frames collide like a slow-moving car accident — they bend, morph, and battle for dominance. Eventually one frame breaks the other and absorbs it. The winner has frame control and their perspective governs the interaction."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, social-dynamics, negotiation]
    - id: "MM-OK-003"
      title: "Paradigmatic vs Narrative Mode"
      content: "The brain operates in two incompatible modes (per Bruner): Paradigmatic mode = cold analysis, logic, categorization, hypothesis testing. Narrative mode = empathy, meaning-making, human experience, trust. When you put someone in paradigmatic mode, they grind you analytically. In narrative mode, they listen and empathize."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, neuroscience-of-selling, persuasion]
    - id: "MM-OK-004"
      title: "The Status Wave Model"
      content: "Status follows a wave pattern through the STRONG method: starts low at entry, rises during frame-setting, peaks during pitch delivery, dips during intrigue phase, drops during commercial terms offer, recovers at hookpoint. Understanding this wave helps you calibrate pressure and prizing at each moment."
      source: "Module4-OfferThePrize-Transcript"
      domains: [status, pitching, deal-structure]
    - id: "MM-OK-005"
      title: "The Dopamine Reward System in Deals"
      content: "Getting what you expect produces little dopamine kick. Unexpected gains fire up the dopamine system powerfully. Humans hate randomness and try to solve it with pattern-making. Once the pattern is solved, there is no more dopamine and the meeting is effectively over. You must keep new dopamine opportunities open."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [neuroscience-of-selling, dopamine, intrigue, attention-management]
    - id: "MM-OK-006"
      title: "The Value Tube"
      content: "Between you and the other person exists an imaginary tube through which value flows. Questions extract value (take). Insight, knowledge, introductions, and resources push value (give). If you want something, push more value than you take. Adding value raises your status proportionally."
      source: "Module1-SetTheFrame-Transcript"
      domains: [status, value-delivery, sales-process]
    - id: "MM-OK-007"
      title: "The Buying Temperature Model"
      content: "Buying temperature must be raised gradually across the entire STRONG sequence, not spiked early. You cannot keep someone perpetually excited — if buying temperature peaks before you've offered terms and nailed the hookpoint, it will cool before you can close. Control the temperature to peak at exactly the right moment."
      source: "Module5-NailTheHookpoint-Transcript"
      domains: [closing, pitching, sales-process, calibration]
    - id: "MM-OK-008"
      title: "Attention → Engagement → Decision Progression"
      content: "The STRONG method maps to three meta-phases: Attention (Set Frame + Tell Story), Engagement (Reveal Intrigue), Decision (Offer Prize + Nail Hookpoint + Get Deal). Each phase requires different tools and energy levels. You cannot skip phases."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [pitching, deal-structure, persuasion]
    - id: "MM-OK-009"
      title: "Counter-Party Risk Lens"
      content: "Buyers are not just customers — they are counter-parties who can cause you damage. A huge order you can't fulfill, a demanding client who erodes margins, a partner who drains resources. Viewing buyers through the counter-party risk lens gives you legitimate authority to screen and qualify them."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [intrigue, deal-making, risk-management]
    - id: "MM-OK-010"
      title: "The Gulliver Strategy for Structured Processes"
      content: "When forced into someone else's process (interview, pitch fest, RFP), you cannot blow it up. Instead, lay many tiny 'strands' of frame control like the Lilliputians tying down Gulliver — a time reframe here, a prize statement there, an intrigue ping, a morality frame. These accumulate until their process erodes toward yours."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, pitching, interview, process-management]
    - id: "MM-OK-011"
      title: "Five Phases of a Deal (Analyst Frame Detection)"
      content: "Phase I: Introduce product/ideas. Phase II: Establish timelines, terms, pricing bookends. Phase III: Explore options, overcome objections, establish counterparts, momentum. Phase IV: Deep analytics, testing, due diligence. Phase V: Closing timeline, cell phone numbers exchanged, final paperwork. Information requests out of phase with these stages = analyst frame attack."
      source: "Module1-SetTheFrame-Transcript"
      domains: [analyst-frame, sales-process, deal-structure]
    - id: "MM-OK-012"
      title: "The Three Moving Forces Model"
      content: "Every business narrative should be framed against three forces changing the market: (1) Economic forces — credit, interest rates, buying patterns, dollar value; (2) Social forces — behavioral changes, cultural trends, demographic shifts; (3) Technology forces — disruptive innovation, platform shifts, new capabilities. These forces create the 'why now' of your deal."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, market-analysis]
    - id: "MM-OK-013"
      title: "Narrative Transport Model"
      content: "The primary job of a business story is narrative transport — the ability for someone to hear your story and retell it accurately when you're gone. Deals die because people go home and can't explain the deal to their wife, accountant, or lawyer. Your narrative must be repeatable and simple."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, deal-making]
    - id: "MM-OK-014"
      title: "Close Distance and Shut It Down"
      content: "Borrowed from Navy SEALs: when they see a recognized threat during an operation, they don't evaluate — they close distance and shut it down. Similarly, when you hear anything that diminishes your prize status or implies weakness, react immediately. Don't evaluate, don't wait — close distance and shut it down."
      source: "Module1-SetTheFrame-Transcript"
      domains: [prize-frame, negotiation, frame-control]
    - id: "MM-OK-015"
      title: "The Immersion Zone"
      content: "Between under-taxing (causing apathy/boredom) and over-taxing (causing stress/fear) people's perceptive and cognitive systems lies the immersion zone — where people are satisfied, interested, and fully paying attention. The hookpoint happens when your audience is in this immersive state and begins adding value."
      source: "Module6-GetTheDeal-Transcript"
      domains: [attention-management, calibration, pitching]
    - id: "MM-OK-016"
      title: "Aristotelian Learning Model for Frames"
      content: "You learn and apply frames through the Aristotelian method: (1) What do I know? (2) What does it mean? (3) What should I do? This progresses through Perceiving (immersion and awareness), Understanding (grasping with scope and depth), and Taking Action (application). Don't rush to action without sufficient understanding."
      source: "Module1-SetTheFrame-Transcript"
      domains: [learning, frame-control, skill-development]
    - id: "MM-OK-017"
      title: "Fetch Me Another Rock Trap"
      content: "The power frame uses an infinite loop of requests: 'Bring me a blue rock.' You bring it. 'Great, now bring a green rock with polka dots.' You bring it. 'Perfect, now bring a red rock.' This never ends. At some point you must stop and say: 'I'll fetch your rock, but now you fetch me one — issue a letter of intent.'"
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, negotiation, deal-making]
    - id: "MM-OK-018"
      title: "Three-Brain Model"
      content: "Humans have three brains developed in stages: crocodile brain (survival filtering), midbrain (social meaning), and neocortex (problem-solving). All incoming information enters through the croc brain first. You pitch with your neocortex but the audience receives with their croc brain."
      source: "PitchMastery-Welcome-Introduction"
      domains: [neuroscience, pitching, buyer-psychology]
    - id: "MM-OK-019"
      title: "Prizing Lens: Who Is Reacting To Whom?"
      content: "The test for frame control: if you react to them (laugh at bad jokes, pause when they text, stop when they stand), they have frame control. If they react to you, you have it. Frame control = who is the performer and who is the audience."
      source: "PitchMastery-Welcome-Introduction"
      domains: [frame-control, social-dynamics, status]
    - id: "MM-OK-020"
      title: "Croc Brain Decision Filter"
      content: "The crocodile brain makes quick decisions: Boring = Ignore it. Red flags/untrue = Run from it. Too complex = Summarize and discard. Information must be packaged to pass this filter before higher brain functions engage."
      source: "PitchMastery-Welcome-Introduction"
      domains: [neuroscience, message-design, pitching]
    - id: "MM-OK-021"
      title: "Five Frame Taxonomy"
      content: "Five core frames govern business interactions: Prize Frame (who is the prize), Time Frame (driving decisions), Power Frame (recognize and combat), Analyst Frame (recognize and deflect), and Needy Frame (recognize in yourself and eradicate)."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, social-dynamics, deal-making]
    - id: "MM-OK-022"
      title: "Value Tube Mental Model"
      content: "Imagine a tube between you and the other person through which value flows. Push more value through than you take. Questions extract value; insights add value. When you add enough value, the other side starts giving back naturally."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [value-creation, relationship-building, status]
    - id: "MM-OK-023"
      title: "Restaurant Frame Model"
      content: "Like finding a friend in a crowded restaurant - you frame out irrelevant information (babies, waiters, groups) to focus on what matters. Once the frame is set with meaning, new information bounces off. More meaningful information can reset the frame."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, attention-management, cognitive-psychology]
    - id: "MM-OK-024"
      title: "Gulliver's Travels Strategy"
      content: "When you can't disrupt someone's process, use many tiny strands of frame control that accumulate. Small time frame adjustments, subtle prize positioning, tiny intrigue drops - individually insignificant but collectively powerful."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, strategy, process-management]
    - id: "MM-OK-025"
      title: "Perceive-Understand-Act Learning Model"
      content: "Three stages of mastering frames: Perceive (immerse in material, develop awareness), Understand (identify with material, grasp with depth), then Act (apply knowledge). Moving too quickly to action from learning causes blown deals."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [learning, skill-development, frame-control]
    - id: "MM-OK-026"
      title: "Narrative Transport"
      content: "The #1 job of a business story is narrative transport - can someone repeat your story when you're gone? In business deals, almost nobody makes decisions alone. They must retell your story to accountants, lawyers, spouses. If they can't retell it, you lose."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, sales-process, deal-making]
    - id: "MM-OK-027"
      title: "Psychological Realism Detector"
      content: "Everyone has a natural lie detector for psychological realism. Stories that happen in human time scales, physical environments, and believable sequences feel real. You anchor your deal in reality by using human-scale descriptions rather than abstract concepts."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, credibility, persuasion]
    - id: "MM-OK-028"
      title: "Three Moving Forces"
      content: "Every market opportunity is driven by three types of forces: Economic forces (credit, interest rates, inflation), Social forces (behavioral changes, cultural shifts), and Technological forces (innovation, disruption). Map your deal against these to build the future narrative."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [market-analysis, business-narrative, pitching]
    - id: "MM-OK-029"
      title: "Future Action Projection"
      content: "Project the buyer into your narrative by painting the future with them in it. Show how the past changed to create the present, how market forces are opening a window, and how they'll participate in benefits. Then subtly withdraw it to create desire."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, desire-creation, pitching]
    - id: "MM-OK-030"
      title: "Intrigue As Attention Restart"
      content: "After 20 minutes of focused pitch, the brain stalls out. Intrigue is the ignition key that restarts attention. Like restarting a stalled car: key out, key in, lights on, fire up, get in gear. You must restart engagement through intrigue, not more information."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [intrigue, attention-management, presentation-skills]
    - id: "MM-OK-031"
      title: "Amtrak Decision Model"
      content: "The train leaves at 3:03, not 3:04. You're either on it or you stay where you are. Time frames drive decision-making by creating real consequences for inaction. Manufacturing authentic time constraints forces choices."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [time-frame, decision-making, urgency]
    - id: "MM-OK-032"
      title: "Fetch Me Another Rock"
      content: "Power frames play the game of repeatedly asking for 'one more thing' before closing. Blue rock, then green rock with polka dots, then red rock. At some point, stop fetching and say: 'I'll get your red rock, but now you fetch me a rock' - a letter of intent, purchase order, or contract."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [power-frame, negotiation, deal-management]
    - id: "MM-OK-033"
      title: "Black Swan Spinning Wheel"
      content: "Instead of viewing investments as throwing darts at a dartboard, view them as a spinning wheel of chance. You need about 125 spins to hit a 'black swan' consistently. This physical metaphor made abstract venture investing understandable to investors."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [abstraction-to-concrete, investing, narrative-anchoring]
    - id: "MM-OK-034"
      title: "The Index Card System"
      content: "Don't memorize frames - write them on index cards and have them in front of you during meetings. When you hear a power frame, look at your card and choose your counter. This is how even experienced practitioners like Klaff operate."
      source: "PitchMastery-Welcome-Introduction"
      domains: [frame-control, practical-tools, preparation]
    - id: "MM-OK-035"
      title: "Phase-Relationship Mapping"
      content: "Track five deal phases against relationship development. Phase 1: Introduction. Phase 2: Timelines/terms/pricing. Phase 3: Options/compatibility/counterparts/momentum. Phase 4: Due diligence/testing. Phase 5: Closing timeline. Information requests outside their phase = analyst frame."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [deal-management, analyst-frame, process-management]
    - id: "MM-OK-036"
      title: "Prize Frame Construction (3-Column Model)"
      content: "Build your prize frame with three columns: What do I have? (pros AND cons), What do they need?, Where am I dominant? Then present ONLY from dimensions where you're dominant, deflecting questions about weak areas."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [prize-frame, positioning, sales-strategy]
    - id: "MM-OK-037"
      title: "Dopamine-Tension Loop"
      content: "Desire is created through a cycle of dopamine release and tension. Introduce something intriguing, then pull it back. The brain releases dopamine in anticipation. The gap between what's revealed and what's withheld creates desire. Full information kills desire."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [neuroscience, desire-creation, intrigue]
    - id: "MM-OK-038"
      title: "Pitch Deconstruction Model"
      content: "Every pitch can be broken into: (1) Opening stride/frame set, (2) Big idea in ~68 words, (3) Problem deepening, (4) Character/connection, (5) Solution/value proposition, (6) Economic case, (7) Intrigue/pull-back, (8) Qualify-back/counter-pressure."
      source: "PitchMastery-Deconstruction"
      domains: [pitching, structure, presentation-skills]
    - id: "MM-OK-039"
      title: "Non-Reactive Frame Disruption"
      content: "When facing the power frame, be non-reactive and non-needy. Decline restaurants, planes, fancy offers with fortune-cookie wisdom. The power frame escalates offers until it becomes awkward - that awkwardness signals you have frame control."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [power-frame, status, emotional-control]

    - id: "MM-OK-040"
      title: "Hot vs Cold Cognition Model"
      content: "Hot cognition is inner certainty by feeling fast in brainstem/midbrain. Cold cognition is certainty through evaluation slow analytical neocortex. Pitching should trigger hot not cold."
      source: "Module4-OfferThePrize"
      domains: [neuroscience, persuasion, decision-making]
    - id: "MM-OK-041"
      title: "Status Wave Model"
      content: "Status follows a wave: rises during frame-setting, peaks during storytelling, drops sharply during price/terms delivery, must be rebuilt during hook point."
      source: "Module4-OfferThePrize"
      domains: [status, pitching, social-dynamics]
    - id: "MM-OK-042"
      title: "Buying Temperature Control"
      content: "Buying temperature must be raised gradually not spiked early. Peak too soon and excitement dissipates before they can buy at the right moment."
      source: "Module5-NailTheHookpoint"
      domains: [sales-psychology, pitching, timing]
    - id: "MM-OK-043"
      title: "Value Tipping Point"
      content: "After enormous value is added the buyer thinks: Ive received a lot. Time to reciprocate and add value. That internal tipping point IS the hook point."
      source: "Module5-NailTheHookpoint"
      domains: [value-exchange, hook-point, pitching]
    - id: "MM-OK-044"
      title: "Immersion Sweet Spot Model"
      content: "Immersion when perceptual and cognitive systems challenged at near capacity without being exceeded. Under-taxed equals boredom. Over-taxed equals stress."
      source: "Module5-NailTheHookpoint"
      domains: [immersion, attention, presentation-design]
    - id: "MM-OK-045"
      title: "Concession Response Matrix"
      content: "When buyers request last-minute concessions you have exactly two options: Concede with high status or Refuse with absolute firmness. Never whine or grumble."
      source: "Module6-GetTheDeal"
      domains: [negotiation, deal-closing, status]
    - id: "MM-OK-046"
      title: "SCARF Model Five Social Threats and Rewards"
      content: "Five qualities enabling or disabling brain performance: Status, Certainty, Autonomy, Relatedness, Fairness. Each triggers threat or reward responses."
      source: "Managing_with_the_Brain_in_Mind"
      domains: [leadership, neuroscience, social-dynamics]
    - id: "MM-OK-047"
      title: "Confirmation Bias Cascade"
      content: "Once initial theory forms people seek only confirming evidence and dismiss disconfirming data. Initial impressions are hard to shake (belief perseverance)."
      source: "Cognitive_Biases"
      domains: [cognitive-bias, decision-making]
    - id: "MM-OK-048"
      title: "Dopamine Reward Circuitry Gas and Steering"
      content: "Nucleus accumbens accelerates drive for rewards (gas pedal). Prefrontal cortex directs reward-seeking (steering). Anticipation activates accumbens more than attainment."
      source: "Decisions_and_Desires"
      domains: [neuroscience, motivation, decision-making]
    - id: "MM-OK-049"
      title: "Pitcher Prototype Classification"
      content: "Three positive types: Showrunner (creative plus practical), Artist (passionate storyteller), Neophyte (eager learner). Four negative: Pushover, Robot, Used-Car Salesman, Charity Case."
      source: "How_to_Pitch_a_Brilliant_Idea"
      domains: [pitching, persuasion, stereotyping]
    - id: "MM-OK-050"
      title: "100 Millisecond First Impression Model"
      content: "Trait inferences from facial appearance made in 100ms. Additional time only increases confidence not accuracy. Trustworthiness detected faster than attractiveness."
      source: "Science_of_First_Impressions"
      domains: [first-impressions, neuroscience, perception]
    - id: "MM-OK-051"
      title: "Choking vs Panic Model"
      content: "Choking equals explicit system taking over thinking too much. Panic equals short-term memory wiped thinking too little. Opposite mechanisms requiring opposite interventions."
      source: "Art_of_Failure"
      domains: [performance, psychology, stress-management]
  L3_HEURISTICS:
    - id: "HEUR-OK-001"
      title: "20-Minute Pitch Maximum"
      content: "Never pitch for more than 20 minutes. This is the hard limit of focused human attention. After 20 minutes, the brain enters survival mode and stops absorbing new information. Your entire pitch structure must fit within this constraint."
      source: "Module2-TellTheStory-Transcript"
      domains: [pitching, attention-management, time-management]
    - id: "HEUR-OK-002"
      title: "Always Set a Shorter Time Constraint"
      content: "If they say 30 minutes, say you only have 25. If they say 20, you have 19. If they give you 60 minutes to present, say 'I present in 20, so for the other 40 minutes I'll allow you to present to me.' Never accept their time frame — always set a tighter one."
      source: "Module1-SetTheFrame-Transcript"
      domains: [time-frame, frame-control, pitching]
    - id: "HEUR-OK-003"
      title: "Proposal Requests Are the Analyst Frame in Disguise"
      content: "When someone says 'This looks interesting, why don't you send us a proposal?' — that is the analyst frame at its most basic. Never spend hours writing proposals for people who haven't established wanting, relationship, or basic deal terms. It's the biggest waste of time in business."
      source: "Module1-SetTheFrame-Transcript"
      domains: [analyst-frame, sales-process, frame-control]
    - id: "HEUR-OK-004"
      title: "Weakness Signals Require Immediate Response"
      content: "When you hear dismissive phrases like 'kind of interesting,' 'a lot like [competitor],' 'good product but niche,' 'we're evaluating you,' or 'our purchasing is tough' — immediately close distance and shut it down. Never let weakness attributions stand unchallenged for even a few seconds."
      source: "Module1-SetTheFrame-Transcript"
      domains: [prize-frame, frame-control, negotiation]
    - id: "HEUR-OK-005"
      title: "No-Fit Statements Cannot Be Attacked"
      content: "When someone says 'We just bought one / no budget / beyond our reach / too big / too small' — these are no-fit statements, not weakness attributions. You cannot attack or reframe genuine lack of fit. Don't waste frame control on situations that are simply not a match."
      source: "Module1-SetTheFrame-Transcript"
      domains: [prize-frame, sales-process, qualification]
    - id: "HEUR-OK-006"
      title: "Three-Column Prize Assessment"
      content: "Build your prize frame with three columns: (1) What do I have? (both pros and cons), (2) What do they need?, (3) Where am I dominant? Prize yourself only in the dimensions where you're dominant. When questioned on weaknesses, redirect to your dominant dimensions."
      source: "Module1-SetTheFrame-Transcript"
      domains: [prize-frame, preparation, pitching]
    - id: "HEUR-OK-007"
      title: "Time Constraints Must Be Real, Not Deadlines"
      content: "Use time constraints, not deadlines. 'Price only good today' = aggressive deadline (bad). 'We need to reach a decision by Monday because it can't go beyond Tuesday' = constraint (good). Manufacture authentic time constraints that feel real and that you'll actually enforce."
      source: "Module1-SetTheFrame-Transcript"
      domains: [time-frame, negotiation, frame-control]
    - id: "HEUR-OK-008"
      title: "Six Signs You Have Frame Control"
      content: "(1) People pay attention and are interested in what you'll say next. (2) They react to you — laugh at your humor, respond to your cues. (3) There's authentic participation, not just Q&A. (4) They start adding value — offering introductions, ideas, resources. (5) Healthy tension and playful push-pull. (6) Weird reactions — spilling coffee, telling inappropriate stories to prove themselves."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, pitching, social-dynamics]
    - id: "HEUR-OK-009"
      title: "Deploy Frames in Live Action Starting with Prize Frame"
      content: "When entering live-action deals, start with the prize frame only — it's the easiest, most natural, and people won't respond negatively. Meanwhile, observe and look for power and analyst frames. Only after you're good at identifying them should you start counteracting them."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, skill-development, pitching]
    - id: "HEUR-OK-010"
      title: "Five Basic Framing Steps in a Deal"
      content: "(1) Prizing — establish yourself as the prize. (2) Time constraint — set a time frame. (3) Big idea — introduce the overall frame. (4) Qualify back — let people know they'll need to explain why you'd choose them. (5) Raise status — provide value and insight throughout."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, pitching, deal-structure]
    - id: "HEUR-OK-011"
      title: "Take Over the Agenda to Disrupt Power Frame"
      content: "The power frame will always make social missteps (king-like behavior). When they say 'skip the background, just give me the price,' call it out with a smile: 'Stop. You know how this works. This is now my meeting, running on my agenda. I say when it starts and stops, and when you get a bathroom break.'"
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, frame-control, negotiation]
    - id: "HEUR-OK-012"
      title: "Remove Money as a Source of Power"
      content: "When the power frame grinds you on price, say: 'Money is not important to us. We're well financed. What's important is good partners and having fun. All this grinding on price is not fun.' Take money away as a source of power and redirect to business principles and values."
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, negotiation, frame-control]
    - id: "HEUR-OK-013"
      title: "Three Counterframes to the Analyst Frame"
      content: "(1) Time Frame: 'These information requests eat into our time — we haven't accomplished basic milestones.' (2) Power Frame: 'Until you prove you're a good customer, these analytical questions are getting us off track.' (3) Value Frame: 'Let analysts add value in breakout sessions, not consume our management time.'"
      source: "Module1-SetTheFrame-Presentation"
      domains: [analyst-frame, frame-control, negotiation]
    - id: "HEUR-OK-014"
      title: "Big Idea Formula: 187 Words or Less"
      content: "The big idea can be stated in under 200 words: If you could do X (the impossible/valuable thing), then Y would happen (massive market/revenue). We have done X, and Z customers are buying. We are building a billion-dollar company. Orient people so they can self-qualify in or out within seconds."
      source: "GrandArchitecture-Transcript"
      domains: [pitching, storytelling, deal-structure]
    - id: "HEUR-OK-015"
      title: "Stories Don't Explain — Products Are Already Easy to Understand"
      content: "Don't wrap simple products in stories. If you have ball bearings with Teflon coating that last 10x longer at 25% cheaper — that's 4 seconds to describe. Narratives don't make things easier to understand; they establish truthfulness and create emotional engagement where pure facts would trigger cold analysis."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, value-proposition]
    - id: "HEUR-OK-016"
      title: "Admit Other Solutions Exist"
      content: "Never claim you're the only one who has thought of the problem or has a solution. Nobody comes up with something so original that there's no other version. Admitting other solutions anchors your pitch in reality and increases credibility. Then explain why yours is better."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, credibility, pitching]
    - id: "HEUR-OK-017"
      title: "Concede with High Status or Refuse with Finality"
      content: "When buyers request last-minute concessions: if you'll concede, do it from high status ('Hey, if 5% means that much to you, whatever, we don't grind'). If you won't concede, make the period sound like a judge's death sentence gavel. No whining, no back-and-forth."
      source: "Module6-GetTheDeal-Transcript"
      domains: [closing, negotiation, status]
    - id: "HEUR-OK-018"
      title: "50 Minutes Total Meeting Duration"
      content: "The STRONG method allocates: ~10 min for frame setting, ~20 min for pitch/story, ~10 min for intrigue, ~10 min for commercial terms. Total: ~50 minutes. After 50 minutes, you are unlikely to get more attention. Buying temperature must peak right at this point."
      source: "Module5-NailTheHookpoint-Transcript"
      domains: [pitching, time-management, deal-structure]
    - id: "HEUR-OK-019"
      title: "The Hookpoint Is When Buyers Add Value"
      content: "The hookpoint is the singular moment when the buyer starts contributing ways to make the deal stronger, the relationship better, or the transaction easier. Signs: they offer introductions, volunteer to handle internal approvals, increase their order size, offer to pay costs, or want social time together."
      source: "Module5-NailTheHookpoint-Transcript"
      domains: [closing, deal-making, calibration]
    - id: "HEUR-OK-020"
      title: "Three Reasons for Post-Pitch Questions"
      content: "(1) You left information gaps — inevitable. (2) You raised excitement — 'what if we combined...' questions. (3) Your high status triggers analyst attempts to lower it — 'in our experience, your product...' Be prepared for all three types and respond differently to each."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [pitching, intrigue, frame-control]
    - id: "HEUR-OK-021"
      title: "Five Sources of Intrigue"
      content: "(1) You are intriguing — build celebrity through knowledge and insight. (2) Require authorization — 'Even if you want it, we must screen you.' (3) Premium product restriction — 'You can only have our basic product first.' (4) Compatibility uncertainty — 'We're not sure we're right for each other.' (5) Certainty — contracted revenue, guaranteed returns, celebrity endorsement."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [intrigue, pitching, persuasion]
    - id: "HEUR-OK-022"
      title: "Denial and Defiance Reset Broken Frames"
      content: "When you've lost frame control, use small denials and defiances to reclaim it. Leave a labeled 'confidential' folder as bait — when they reach for it, take it back: 'Not yet. This is my meeting, my agenda. I say when it starts and stops.' Defiances must be social and delivered with a smile."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, power-frame, negotiation]
    - id: "HEUR-OK-023"
      title: "Introduce Yourself with a Three-Point Success Stack"
      content: "When asked about your background, deliver a rapid three-point stack of successes. Example: (1) Degree from Berkeley, MBA from UCLA. (2) Four years at McKinsey developing a $15M sales program for Lexus. (3) Left consulting to work on this Big Idea. Keep it brief and impressive."
      source: "Module1-SetTheFrame-Scripts"
      domains: [pitching, status, personal-branding]
    - id: "HEUR-OK-024"
      title: "Past Performance Is Not Prediction of Future"
      content: "When the power frame boasts about their grand history, redirect: 'That's awesome. But I think it's better to focus on the present and current events, because what we're doing isn't based in the past. As any stock offering says, past performance is not a prediction of future performance.'"
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, negotiation, frame-control]
    - id: "HEUR-OK-025"
      title: "Certainty Combined with Celebrity Is Maximum Intrigue"
      content: "Certainty alone is intriguing (contracted revenue, guaranteed returns). Celebrity alone is intriguing. Combined, they create extraordinary pull. When you can say 'Next year's revenue is already under contract AND a celebrity figure is attached,' you change the entire finance-ability of the deal."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [intrigue, deal-making, pitching]
    - id: "HEUR-OK-026"
      title: "High Contrast, Objects, and Motion Recapture Attention"
      content: "Three neurological techniques to recapture fading attention: (1) Introduce high-contrast ideas in a physical way. (2) Introduce a physical object — brains give special treatment to objects vs backgrounds. (3) Introduce agency and motion — living things demand attention more than static things."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [attention-management, neuroscience-of-selling, pitching]
    - id: "HEUR-OK-027"
      title: "Grand Architecture Landing Page Must Include Six Elements"
      content: "Every pitch deck or landing page needs: (1) Orientation — what the deal is, who it's for. (2) Big idea — the massive opportunity. (3) Why now — timing forces. (4) Clear economics — you pay X, you get Y back. (5) Value proposition — features, benefits, differentiation. (6) Downside protection — how you won't lose money. Plus: real market insight."
      source: "GrandArchitecture-Transcript"
      domains: [deal-structure, pitching, marketing]
    - id: "HEUR-OK-028"
      title: "In One-Way Media, Lead with Status and Value Under Time Constraint"
      content: "For video sales letters and webinars: set a time constraint ('In the next 5 minutes...'), give real value immediately (don't hold it behind a paywall), raise your status through expertise, then ask for something fair at the moment of earned fairness. On the internet, too many go for control before status is high enough."
      source: "Module1-SetTheFrame-Transcript"
      domains: [pitching, online-selling, frame-control]
    - id: "HEUR-OK-029"
      title: "20-Minute Attention Ceiling"
      content: "A pitch should be no longer than 20 minutes. After 20 minutes of focused attention, the brain's efficiency drops dramatically and you must restart engagement through intrigue. Plan every minute of a 20-minute pitch."
      source: "PitchMastery-Welcome-Introduction"
      domains: [presentation-skills, attention-management, timing]
    - id: "HEUR-OK-030"
      title: "Big Idea In 68 Words Or Less"
      content: "Your big idea must be communicable in 68 words or fewer. If you can't state the problem, the solution, and the opportunity concisely, your pitch will fail to get past the crocodile brain."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, message-clarity, big-idea]
    - id: "HEUR-OK-031"
      title: "Visual Pipes Are 50-70x Faster"
      content: "The neural pathways carrying visual information are 50 to 70 times faster than auditory pipes. If you want ideas to enter someone's mind faster, make your pitch visual. Show, don't just tell."
      source: "PitchMastery-Welcome-Introduction"
      domains: [presentation-skills, visual-communication, neuroscience]
    - id: "HEUR-OK-032"
      title: "High-Contrast Options Only"
      content: "Never present options that are shades of gray of each other. Present two high-contrast options: one is $5M and takes 2 weeks, the other is $30M and takes 6 months. Which one do you want? Confusing options kill deals."
      source: "PitchMastery-Welcome-Introduction"
      domains: [decision-design, pricing, presentation-skills]
    - id: "HEUR-OK-033"
      title: "Shorter Time Constraint Wins"
      content: "When someone says 'I only have 30 minutes,' say 'I only have 25.' If they say 20, you say 19. Always have a shorter time constraint than the other person. This communicates you're the prize."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [time-frame, frame-control, prize-positioning]
    - id: "HEUR-OK-034"
      title: "Never Ask 'Are There Any Questions'"
      content: "Never end a pitch with 'Are there any questions?' or 'Thanks for listening.' This invites the audience to prove how smart they are by pointing out your weaknesses. Instead, make them qualify themselves to you."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [pitching, closing, frame-control]
    - id: "HEUR-OK-035"
      title: "Proposals Are The Analyst Frame"
      content: "When someone says 'Send us a proposal for us to review,' that's the analyst frame in full effect. It's the biggest waste of time. Push back: 'We haven't even established if we like each other or have terms.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [analyst-frame, deal-management, time-management]
    - id: "HEUR-OK-036"
      title: "Get A Check Before Your Big Pitch"
      content: "Before a high-stakes pitch, get someone else - uncle, brother, friend - to commit even $250. Having a check in hand before your big pitch eradicates neediness that would otherwise undermine you."
      source: "AccelerationCallWeek1"
      domains: [neediness-eradication, preparation, mindset]
    - id: "HEUR-OK-037"
      title: "Never Chase No-Fit Statements"
      content: "Don't attack or reframe when there genuinely isn't a fit ('We just bought one,' 'No budget,' 'Too small/big for us'). No amount of framing makes the Four Seasons buy polyester lawn chairs. Save your energy for real prospects."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [qualification, frame-control, sales-efficiency]
    - id: "HEUR-OK-038"
      title: "Five Signs Of Frame Control"
      content: "You have frame control when: (1) Energy/attention flowing your way, (2) People react to you (laugh at mild jokes), (3) Authentic participation (not just Q&A), (4) Buyer providing value/connections, (5) Healthy tension in social dynamic."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, social-dynamics, deal-management]
    - id: "HEUR-OK-039"
      title: "Spilling Coffee = You're Winning"
      content: "When people spill their coffee, tell inappropriate stories, or try to mimic your style and get frazzled, you're doing an amazing job. These weird reactions signal maximum frame control. Lean back and enjoy."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, social-dynamics, confidence]
    - id: "HEUR-OK-040"
      title: "Six Pitching Flaws To Avoid"
      content: "Six common pitching flaws that trigger the croc brain to ignore you: (1) Too much information/detail/too fast, (2) Too vague/fuzzy, (3) No context/looks like every other pitch, (4) Seeming needy, (5) Going too slow, (6) Not visual enough."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, presentation-flaws, buyer-psychology]
    - id: "HEUR-OK-041"
      title: "Use Deadlines Not Deadlines"
      content: "Never use aggressive deadlines ('Price only good today'). Use authentic constraints ('In the next 30 days we'll select an investor. Please prepare to explain your value add beyond money'). Constraints feel real; deadlines feel manipulative."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [time-frame, urgency, authenticity]
    - id: "HEUR-OK-042"
      title: "5-Minute Email Pitch For VIPs"
      content: "To circulate a pitch deck to high-profile targets, send a short email: 'Hey [Name], we have [thing]. I'd like you to look at it. If I send you the pitch deck, will you spend five minutes with it?' No grand signatures, no attachments. Wait for 'yes' before sending."
      source: "AccelerationCallWeek2"
      domains: [outreach, networking, pitch-distribution]
    - id: "HEUR-OK-043"
      title: "Deepen The Problem Before The Solution"
      content: "Most people rush from introducing the problem to the solution. Spend significant time deepening the problem from many angles. Only after the problem is deeply felt, acknowledge other solutions exist, THEN introduce yours as a better alternative."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, problem-framing, pitching]
    - id: "HEUR-OK-044"
      title: "Use Constraints Not Deadlines"
      content: "Don't say 'decide by end of day' (aggressive deadline). Say 'I have today and the next couple days. By Monday we need a decision because it can't go beyond Tuesday' (authentic constraint). Constraints drive decisions without aggression."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [time-frame, urgency, deal-management]
    - id: "HEUR-OK-045"
      title: "Go With The Eight, Leave The Two"
      content: "If you have buy-in from 8 of 10 people in a room and 2 resist, go with the 8. Don't seek validation from the holdouts. Don't feed negative feedback. Go with your strengths, not weaknesses."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [audience-management, frame-control, confidence]
    - id: "HEUR-OK-046"
      title: "The 'I Get It' Threshold"
      content: "People pattern-match from small data samples and say 'I get it' very quickly. Once they feel they understand, adding more information actually decreases engagement. Hit the 'I get it' moment and move to intrigue."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [attention-management, pitching, neuroscience]
    - id: "HEUR-OK-047"
      title: "Make It Fun For YOU"
      content: "When preparing for a high-stakes pitch, figure out how to make it fun for you, not for them. Maybe tell a great joke you've always wanted to tell. The pitch must benefit you too. If it's not fun for you, something is wrong."
      source: "AccelerationCallWeek1"
      domains: [mindset, presentation-preparation, emotional-control]
    - id: "HEUR-OK-048"
      title: "Never Do A Bake-Off"
      content: "Refuse to participate in competitive bake-offs or comparison processes. Say: 'If you want a bake-off, go ahead, but I won't be in it. You've got to decide if you want the best or a process.' Single-source or walk away."
      source: "AccelerationCallWeek1"
      domains: [positioning, prize-frame, deal-management]
    - id: "HEUR-OK-049"
      title: "Bait Object Denial Technique"
      content: "Leave something big, gnarly, and physical on the desk with the buyer's name on it. When they reach for it, pull it back: 'I'll tell you when you can look at this. This is my meeting, on my agenda.' Instant frame recapture."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, meeting-management, intrigue]
    - id: "HEUR-OK-050"
      title: "Treat Phone Checking As Process Violation"
      content: "If someone checks their phone during your pitch, call it out: 'You only have to pay attention for 15 minutes and you can't seem to do it. I'm questioning why I'd work with someone like that. Let's start over.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, attention-management, boundary-setting]
    - id: "HEUR-OK-051"
      title: "Character Values Sequence"
      content: "Build a compelling character by showing: (1) Consistency of effort, (2) Self-sacrifice, (3) Going into the unknown, (4) Working hard in face of uncertainty, (5) Holding against the tide, (6) When successful, maintaining high values."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, character-building, credibility]
    - id: "HEUR-OK-052"
      title: "Anchor Abstract In Physical Reality"
      content: "Whenever discussion drifts into abstract financial concepts, bring it back to human time scales and physical reality. Don't say 'our solution prevents infection' - say 'the nurse admits the patient, the doctor identifies the signal, they apply the dressing and monitor for two weeks.'"
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, concrete-thinking, persuasion]
    - id: "HEUR-OK-053"
      title: "Have Alternatives Before Any Meeting"
      content: "Before any pitch, have at least one other deal in your pipeline. Even a tiny commitment from someone else removes neediness. You cannot prize effectively when this is your only shot."
      source: "AccelerationCallWeek1"
      domains: [neediness-eradication, preparation, positioning]
    - id: "HEUR-OK-054"
      title: "Introduce Yourself Through Skill"
      content: "Don't introduce yourself through titles or background. Do something skilful in the first 30-60 seconds that demonstrates your ability. Show, don't tell. Your status should be earned through demonstrated competence."
      source: "PitchMastery-Module5-NailTheHookpoint"
      domains: [status, opening, credibility]
    - id: "HEUR-OK-055"
      title: "Counter-Pressure At Maximum Momentum"
      content: "Apply counter-pressure (qualify-back) ONLY when you have maximum time constraint, highest status, most intrigue, and end of presentation. Never do it at the beginning. It only works when all prior steps are completed."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, timing, counter-pressure]
    - id: "HEUR-OK-056"
      title: "Red Pill / Blue Pill Close"
      content: "Frame the decision as: Blue pill = join us, make good things happen, have fun, make money. Red pill = go on your own and watch from the sidelines. Frame it as their loss, not your sale."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [closing, framing, decision-design]
    - id: "HEUR-OK-057"
      title: "Wanting Before Due Diligence"
      content: "Due diligence should only happen after wanting is established. If they're deep into analytics before they even want what you have, it's the analyst frame - shut it down. 'Why waste time on specs when we don't even know if we want to work together?'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [analyst-frame, deal-management, process-management]

    - id: "HEUR-OK-058"
      title: "Status Drops When You Ask for Resources"
      content: "Your status will drop sometimes precipitously whenever you introduce price commercial terms or ask for anything. Tied to ancient brain resource-protection instinct."
      source: "Module4-OfferThePrize"
      domains: [status, pricing, sales-psychology]
    - id: "HEUR-OK-059"
      title: "After Frame Stack Withdraw Physically"
      content: "After delivering the four-frame hot cognition stack withdraw. Start moving backwards literally and figuratively. Do not lean in. People chase what moves away."
      source: "Module4-OfferThePrize"
      domains: [deal-closing, frame-control, neediness-eradication]
    - id: "HEUR-OK-060"
      title: "Location Shift After Price Delivery"
      content: "After delivering price create a location shift. Leave room and take buyer with you. Tour factory grab coffee. Moving to new environment resets dynamic."
      source: "Module4-OfferThePrize"
      domains: [pitching, deal-closing]
    - id: "HEUR-OK-061"
      title: "Walk-Away Willingness Must Be Real"
      content: "If you say you will walk away you MUST actually walk away. Failure to commit destroys all your social tools. Accepting after your own deadline means your word means nothing."
      source: "Module6-GetTheDeal"
      domains: [integrity, deal-closing, commitment]
    - id: "HEUR-OK-062"
      title: "Commitment Math Lose 1 Win 5-10"
      content: "For every deal you lose by committing to walk-away points and pricing limits you win another 5-10 deals. The math strongly favors commitment over flexibility."
      source: "Module6-GetTheDeal"
      domains: [deal-closing, commitment, sales-psychology]
    - id: "HEUR-OK-063"
      title: "Hook Point Recognition Buyer Adds Value"
      content: "Hook point is when buyer starts adding value: making introductions, removing obstacles, negotiating against themselves, conceding deal points, offering to pay costs."
      source: "Module5-NailTheHookpoint"
      domains: [hook-point, calibration, deal-closing]
    - id: "HEUR-OK-064"
      title: "14 Waypoints to the Hook Point"
      content: "14 cognitive waypoints: Big Idea, Prizing, Social Engagement, Frame Control, Tension, Build Character, Novelty, Clear VP, Generic Solution, Croc-Friendly, Counter-Pressure, Statements, Walk Away, Time Constraint."
      source: "Module5-NailTheHookpoint"
      domains: [pitching, hook-point, process-model]
    - id: "HEUR-OK-065"
      title: "Product Detail Comes Last Not First"
      content: "In a successful pitch deck do not talk about product until page 10 or 11. People care about the deal the social relationship and wanting it. Product details last."
      source: "Deconstruction"
      domains: [pitching, presentation-design, communication]
    - id: "HEUR-OK-066"
      title: "90 Percent Messages Discarded by Croc Brain"
      content: "Up to 90 percent of your message is discarded by the crocodile brain before passing to midbrain and neocortex. Only big obvious concrete chunks pass through."
      source: "PITCH_ANYTHING_CHAPTER_1"
      domains: [pitching, neuroscience, communication]
    - id: "HEUR-OK-067"
      title: "Six Common Pitching Flaws"
      content: "Six deadly flaws: Too much detail, Too vague, No frame, You seem needy, Too similar to others, Going too slow. Any single flaw can kill a pitch."
      source: "FrameControl101"
      domains: [pitching, presentation-design]
    - id: "HEUR-OK-068"
      title: "1 Percent of Ideas Survive Initial Pitch"
      content: "Only about 1 percent of ideas make it beyond initial pitch session. Process is strictly elimination-based with negative impressions more salient and memorable."
      source: "How_to_Pitch_a_Brilliant_Idea"
      domains: [pitching, persuasion]
    - id: "HEUR-OK-069"
      title: "Price Introduction Formula"
      content: "Introduce price: The price is more than you want to pay of course and it is less than we want to charge. Frames price as fair for both sides immediately."
      source: "Module4-OfferThePrize"
      domains: [pricing, frame-control, scripts]
    - id: "HEUR-OK-070"
      title: "Fair 50 Cents Beats Unfair 8 Dollars"
      content: "People respond more positively to 50 cents from fair 1 dollar split than 8 dollars from unfair 25 dollar split. Fairness perception overrides economic rationality."
      source: "Managing_with_the_Brain_in_Mind"
      domains: [fairness, neuroscience, negotiation]
    - id: "HEUR-OK-071"
      title: "Collaboration Invitation Reduces Rejection"
      content: "Once catcher feels like creative collaborator odds of rejection diminish. Find a part to yield on and invite suggestions. Should happen as soon as possible."
      source: "How_to_Pitch_a_Brilliant_Idea"
      domains: [pitching, collaboration, persuasion]
  L4_FRAMEWORKS:
    - id: "FW-OK-001"
      title: "S.T.R.O.N.G. Method"
      content: "The complete pitch architecture: S = Set the Frame (establish frame control, raise status, prize yourself), T = Tell the Story (20-min narrative with 8 steps), R = Reveal the Intrigue (reboot attention with dopamine triggers), O = Offer the Prize (present commercial terms), N = Nail the Hookpoint (calibrate buying temperature to peak), G = Get the Deal (close with high status)."
      source: "Module1-SetTheFrame-Transcript"
      domains: [pitching, deal-structure, sales-process]
    - id: "FW-OK-002"
      title: "Five Frames of Business Encounters"
      content: "Five frames you encounter in every business interaction: (1) Prize Frame — who is the prize, who is the supplicant. (2) Time Frame — who controls the timeline and decision urgency. (3) Power Frame — who has decision-making authority (combat it). (4) Analyst Frame — who seeks information void of relationship (combat it). (5) Needy Frame — recognize in yourself and eradicate."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, negotiation, social-dynamics]
    - id: "FW-OK-003"
      title: "Eight-Step Business Narrative (Tell the Story)"
      content: "Step 1: Build a character people care about (via big idea). Step 2: Deepen the problem (don't rush to solution). Step 3: Introduce yourself as character connected to the problem. Step 4: Anchor in reality (admit other solutions, tell human stories). Step 5: Deliver value proposition (idea introduction pattern). Step 6: Bring back to human scale (big animal pictures). Step 7: Future-action projection (integrate the buyer into your future). Step 8: Add dramatic tension (subtle withdrawal — 'Are you good enough for this?')."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, narrative]
    - id: "FW-OK-004"
      title: "Idea Introduction Pattern (Value Proposition Template)"
      content: "'For [target customers] who are dissatisfied with [current offerings], my idea/product is a [new category] that provides [key solution/features]. Unlike [competing product], my idea/product is [key differentiators].' Based on Geoffrey Moore's Crossing the Chasm, used successfully in thousands of deals."
      source: "Module2-TellTheStory-Presentation"
      domains: [pitching, value-proposition, storytelling]
    - id: "FW-OK-005"
      title: "Power Frame Disruption System"
      content: "Disrupt the power frame through: (1) Denials and defiances — take the agenda, shorter time constraints, refuse displays of wealth. (2) Remove money as power source — 'Money doesn't matter to us, relationships do.' (3) Fortune-cookie wisdom over accoutrements — 'We fly coach and put money into product.' (4) Focus on present, not their grand history. (5) Stop 'fetch me another rock' — demand reciprocal action. (6) Be nonreactive to escalating offers."
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, frame-control, negotiation]
    - id: "FW-OK-006"
      title: "Analyst Frame Detection and Destruction"
      content: "Detection: Information requests before (1) wanting, (2) working relationship, or (3) basic deal terms. The classic trigger: 'Send us a proposal.' Destruction: Use time frame ('This eats into our time'), power frame ('Prove you're a good customer first'), or value frame ('Analysts can work in breakout sessions'). Key insight: chart info requests against the 5-phase buying process."
      source: "Module1-SetTheFrame-Transcript"
      domains: [analyst-frame, frame-control, sales-process]
    - id: "FW-OK-007"
      title: "Grand Architecture (Deal Pipeline)"
      content: "Step 1: Build a great landing page/pitch deck (orientation, big idea, why now, economics, value prop, downside protection, insight). Step 2: Execute the STRONG pitch. Step 3: Fill Phase I of pipeline with maximum prospects. Step 4: Work through deal phases. Get as many people as possible into Phase I so you have options at the closing table."
      source: "GrandArchitecture-Transcript"
      domains: [deal-structure, pitching, pipeline-management]
    - id: "FW-OK-008"
      title: "Intrigue Development Worksheet"
      content: "Five inputs to build intrigue: (1) What valuable, insightful knowledge do you have about the market? (2) What risks can a customer give you (counter-party risk)? (3) What aspects of your product are for power users only? (4) What signs of incompatibility do you look for in partners? (5) What's genuinely cool about what you do? Each maps to a specific script for deploying intrigue."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [intrigue, preparation, pitching]
    - id: "FW-OK-009"
      title: "Frame-Setting Sequence"
      content: "Before any pitch: (1) Set the big idea frame — establish what's at stake. (2) Set the prize frame — 'We're not seeking buyers, we're interviewing them.' (3) Set the time frame — 'In the next 30 days, we will have selected our partner.' Each must be set firmly, as if almost immovable."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, pitching, preparation]
    - id: "FW-OK-010"
      title: "Three Scenarios for Getting the Deal"
      content: "Scenario 1: Buyer loves it, price is good — put them in your closing process immediately (like Amazon 'Buy Now'). Scenario 2: Last-minute concession request — either concede with high status or refuse with finality, no whining. Scenario 3: Small terms to negotiate — acknowledge the deal is on, commit to working through paperwork, don't let minor terms derail momentum."
      source: "Module6-GetTheDeal-Transcript"
      domains: [closing, deal-making, negotiation]
    - id: "FW-OK-011"
      title: "Four Purposes of Business Narrative"
      content: "(1) Narrative transport — they can retell your story to their ecosystem when you're gone. (2) Psychological realism — anchor your business in human time scales so it feels real. (3) Avoid paradigmatic mode — keep them in narrative (empathy) mode, not analytical mode. (4) Recapture fading attention — when abstract concepts lose them, human stories bring them back."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, persuasion]
    - id: "FW-OK-012"
      title: "Future-Action Projection"
      content: "Build from the past using three forces (economic, social, technological), establish the present moment, then project into the future. Integrate the buyer into this future: 'Here's where I am within these changes, and here's what's going to happen next — and you can be part of it.' Paint the picture of their future with you, then hint they might not be included."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, persuasion]
    - id: "FW-OK-013"
      title: "Velocity Pitch Deck Structure"
      content: "A compact pitch deck (not PowerPoint, not business plan) designed to bring maximum prospects into Phase I: Cover/Big Idea (under 200 words), Deal Summary, Market Disruption, Problem Quantification, Provocative Insight, Eye Candy breaks, Opportunity, Value Proposition, Go-to-Market, Team. Use visual breathing room between data-heavy pages."
      source: "GrandArchitecture-Transcript"
      domains: [pitching, deal-structure, marketing]
    - id: "FW-OK-014"
      title: "Script System: Six Tested Routines"
      content: "Battle-tested scripts for frame control: (1) 'Let's Jump In' — time reframe to bypass target's agenda. (2) 'The Teaser' — labeled folder bait to establish agenda control. (3) 'I've Only Got a Second' — reframe short time to test their character. (4) 'Compete for My Attention' — prize frame with humor. (5) 'How I Got Here' — 3-point success stack. (6) 'Analyst Frame Crusher' — redirect to big idea with 20-minute deadline."
      source: "Module1-SetTheFrame-Scripts"
      domains: [frame-control, pitching, scripts]
    - id: "FW-OK-015"
      title: "Deepening the Problem (New Approach vs Old)"
      content: "Old approach: Gloss over problem → jump to solution → features/benefits (basically just selling). New approach: Give a point of entry into the problem (simple) → take them deeper (it's massive) → show it's very hard to solve → THEN generic solution → THEN your specific solution. Let the problem breathe before introducing any solution."
      source: "Module2-TellTheStory-Presentation"
      domains: [storytelling, pitching, persuasion]
    - id: "FW-OK-016"
      title: "STRONG Method"
      content: "The complete pitch methodology: S = Set the Frame, T = Tell the Story, R = Reveal the Intrigue, O = Offer the Prize, N = Nail the Hook Point, G = Get the Deal. Each letter represents a distinct module to be executed in sequence."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, methodology, deal-making]
    - id: "FW-OK-017"
      title: "Five Frame Taxonomy Framework"
      content: "Five frames to master: (1) Prize Frame - you're the prize they must win, (2) Time Frame - drive decisions via constraints, (3) Power Frame - recognize and disrupt, (4) Analyst Frame - recognize and deflect, (5) Needy Frame - recognize in yourself and eradicate."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, social-dynamics, negotiation]
    - id: "FW-OK-018"
      title: "Three Frame Setting Sequence"
      content: "Set three frames at pitch opening: (1) Big Idea Frame - define the stakes in 1-2 sentences, (2) Prize Frame - 'We're not seeking investors, we're interviewing them,' (3) Time Frame - 'In the next 30 days we'll select the partner.' Set these firmly, almost immovably."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, opening, pitching]
    - id: "FW-OK-019"
      title: "Power Frame Disruption Toolkit"
      content: "Counter the power frame with: (1) Shorter time constraints, (2) Remove money as power source ('money means nothing to us'), (3) Decline accoutrements of power (planes, restaurants), (4) Fortune-cookie wisdom, (5) Focus on present not grand history, (6) Stop rock-fetching."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [power-frame, negotiation, status]
    - id: "FW-OK-020"
      title: "Analyst Frame Counter-Toolkit"
      content: "Counter the analyst frame with: (1) Time frame - 'this is chewing up time on things we haven't accomplished yet,' (2) Power frame - 'until you prove you're a good customer, I'm paying to be your supplier,' (3) Value frame - 'let's have our analysts add value in breakout sessions.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [analyst-frame, frame-control, deal-management]
    - id: "FW-OK-021"
      title: "Idea Introduction Pattern (Geoffrey Moore)"
      content: "For [target customers] who are dissatisfied with [current offerings], my [idea/product] is a [new category] that provides [key solutions]. Unlike [competing products], my product has [differentiating features]. Clear, structured value proposition delivery."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [value-proposition, pitching, positioning]
    - id: "FW-OK-022"
      title: "8-Step Business Narrative"
      content: "Build business narrative in 8 steps: (1) Build character people care about, (2) Deepen the problem, (3) Introduce your character/connection to problem, (4) Anchor in reality, (5) Deliver value proposition, (6) Bring back to human scale, (7) Future action projection, (8) Add dramatic tension."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, pitching, narrative-structure]
    - id: "FW-OK-023"
      title: "Problem-Deepening Framework"
      content: "Four stages of problem deepening: (1) Point of entry - introduce the problem simply, (2) Deepen it - explore from many angles, show scale, (3) Show it's difficult to solve, (4) Admit other solutions exist (anchor in reality). Only THEN introduce your solution as the better alternative."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, problem-framing, persuasion]
    - id: "FW-OK-024"
      title: "Prize Frame Construction (3-Column)"
      content: "Build prize frame with three columns: Column 1 = What do I have? (pros AND cons), Column 2 = What do they need?, Column 3 = Where am I dominant? Present exclusively from dominance dimensions. Deflect pricing objections into dominance areas."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [prize-frame, positioning, sales-strategy]
    - id: "FW-OK-025"
      title: "Frame Recapture via Denial/Defiance"
      content: "To recapture lost frame control: (1) Bait object denial - place something tempting, pull it back when reached for, (2) Agenda takeover - 'I need to run this meeting properly,' (3) Identify the frame type attacking you, name it, then apply counter-frame."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, meeting-management, recovery]
    - id: "FW-OK-026"
      title: "Grand Architecture Pipeline"
      content: "Four-phase deal pipeline: Phase 0 = Awareness/pipeline building, Phase 1 = Interest/wanting initiated (wanting must exist), Phase 2 = Expression of interest/draft agreements, Phase 3 = Due diligence complete/closing date set, then Close. Each phase has specific exit criteria."
      source: "PitchMastery-GrandArchitecture"
      domains: [deal-management, pipeline, sales-process]
    - id: "FW-OK-027"
      title: "Intrigue Narrative Structure"
      content: "Build intrigue with: (1) Put yourself in the story as the central character, (2) Be in a situation with high-stakes danger that is very real, (3) Create time pressure (it was about to happen), (4) Add uncertainty (things could go either way), (5) Cut the story before resolution to maintain tension."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [intrigue, storytelling, attention-management]
    - id: "FW-OK-028"
      title: "Five Framing Steps In A Deal"
      content: "Sequential steps for every deal: (1) Prize yourself, (2) Get a time constraint, (3) Set the overall frame with big idea, (4) Let people know they'll have to qualify themselves to you, (5) Raise your status by providing value. Then at peak momentum, apply counter-pressure."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [pitching, frame-control, deal-structure]
    - id: "FW-OK-029"
      title: "Character Building Sequence"
      content: "Build compelling character: (1) 'When I got here it was not easy,' (2) Show consistency of effort, (3) Show self-sacrifice, (4) Show going into the unknown, (5) Show working hard despite uncertainty, (6) Show holding against the tide, (7) When success came, maintained high values."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, character-building, credibility]
    - id: "FW-OK-030"
      title: "Hookpoint Architecture"
      content: "The hookpoint is the moment where all previous work converts to a decision. Components: (1) Summary of value delivered, (2) Demonstrate demand/scarcity, (3) Explain you're choosing customers, (4) Ask them to qualify: 'Tell me about yourself. Why are you a good customer?'"
      source: "PitchMastery-Module5-NailTheHookpoint"
      domains: [closing, pitching, counter-pressure]
    - id: "FW-OK-031"
      title: "Deal Closing Sequence (Get The Deal)"
      content: "Closing sequence: (1) Never negotiate in the pitch meeting, (2) Separate the social transaction from the financial, (3) Get agreement on basic terms, (4) Schedule the close, (5) Use wire frame agreements (draft LOI/MOU), (6) Set closing timeline, (7) Exchange cell phone numbers as commitment signal."
      source: "PitchMastery-Module6-GetTheDeal"
      domains: [closing, deal-management, negotiation]
    - id: "FW-OK-032"
      title: "Pitch Teardown Analysis Framework"
      content: "Analyze any pitch by deconstructing: (1) How was the frame set? (2) Was there a clear big idea? (3) How was the problem deepened? (4) Was the character compelling? (5) Was value proposition clear? (6) Where did intrigue appear? (7) Was there counter-pressure? (8) How was the close attempted?"
      source: "PitchMastery-Teardown"
      domains: [analysis, pitching, skill-development]
    - id: "FW-OK-033"
      title: "Dramatic Tension Framework (Step 8)"
      content: "Add dramatic tension at pitch end by: (1) Don't ask for questions, (2) Don't seek approval, (3) State you have limited capacity, (4) You're choosing customers, (5) Ask them to qualify back: 'How do you add value? Are you good to work with? Do others make money with you?'"
      source: "PitchMastery-Module2-TellTheStory"
      domains: [closing, counter-pressure, prize-frame]
    - id: "FW-OK-034"
      title: "Wanting Escalation Model"
      content: "Track wanting through deal phases: Phase 0 = No wanting, Phase 1 = Wanting initiated (they're interested), Phase 2 = Wanting escalating (expression of interest), Phase 3 = Wanting high (completing due diligence), Close = Wanting converts to action. Never allow due diligence before Phase 1 wanting."
      source: "PitchMastery-GrandArchitecture"
      domains: [deal-management, buyer-psychology, pipeline]
    - id: "FW-OK-035"
      title: "Intrigue Push-Pull Mechanism"
      content: "Create intrigue by alternating revelation and withdrawal: (1) Introduce something compelling, (2) Begin revealing details, (3) Pull back before full resolution ('but that's for another time'), (4) The gap between revealed and withheld creates desire and engagement."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [intrigue, desire-creation, attention-management]

    - id: "FW-OK-036"
      title: "Four-Frame Hot Cognition Stack"
      content: "Deliver commercial terms through four stacked frames: (1) Intrigue Frame for PRICE, (2) Prize Frame for TERMS, (3) Time Frame for DEADLINE, (4) Moral Authority Frame to tie together."
      source: "Module4-OfferThePrize"
      domains: [frame-stacking, pricing, deal-closing, hot-cognition]
    - id: "FW-OK-037"
      title: "Hook Point Recognition Framework"
      content: "Hook point when TWO conditions simultaneous: (1) Buyer started adding value to relationship, AND (2) This while buyer is immersed in your presentation."
      source: "Module5-NailTheHookpoint"
      domains: [hook-point, deal-closing, calibration]
    - id: "FW-OK-038"
      title: "14 Waypoint System for Hook Point"
      content: "14 cognitive waypoints with observable results. From Big Idea through Prizing, Frame Control, Tension, Character, Novelty, VP, Generic Solution, Croc-Friendly, Counter-Pressure, Statements, Walk Away, Time Constraint."
      source: "Module5-NailTheHookpoint"
      domains: [pitching, hook-point, calibration]
    - id: "FW-OK-039"
      title: "Three Principles of Getting the Deal"
      content: "Three principles: (1) Provide buyer AUTONOMY and self-determination, (2) Eradicate NEEDINESS, (3) COMMIT to everything said (time constraints, pricing, walk-away)."
      source: "Module6-GetTheDeal"
      domains: [deal-closing, negotiation, psychology]
    - id: "FW-OK-040"
      title: "Value Proposition Template"
      content: "For [target customers] dissatisfied with [current offerings], my product is a [new category] that provides [key solution]. Unlike [competitor], mine has [key features]."
      source: "Module5-NailTheHookpoint"
      domains: [value-proposition, positioning, pitching]
    - id: "FW-OK-041"
      title: "Immersion Design Framework"
      content: "Create immersion through: rich sensory plus cognitive engagement, overcomable challenges, minimal distractions, promote control, warm/hot stimuli, disconnect from reality build future."
      source: "Module5-NailTheHookpoint"
      domains: [immersion, presentation-design]
    - id: "FW-OK-042"
      title: "Market Window of Opportunity Framework"
      content: "Three forces creating opportunity: (1) Trend line macro force, (2) Social change behavior shift, (3) Tech change new capability. Why now and not a year ago."
      source: "Teardown"
      domains: [pitching, market-analysis, timing]
    - id: "FW-OK-043"
      title: "Pitch Deck Optimal Sequence"
      content: "Order: Novel cover, Orientation, Big Idea (not product), Company overview with revenue, Simplified financials, Proof points, Product details (LAST), VP, Exit strategy."
      source: "Deconstruction"
      domains: [pitching, presentation-design, fundraising]
    - id: "FW-OK-044"
      title: "SCARF Leadership Framework"
      content: "Five dimensions: Status (relative standing), Certainty (predictability), Autonomy (sense of control), Relatedness (friend-or-foe), Fairness (equitable exchange)."
      source: "Managing_with_the_Brain_in_Mind"
      domains: [leadership, management, neuroscience]
    - id: "FW-OK-045"
      title: "Three Pitcher Archetypes Framework"
      content: "Showrunner (levels power via knowledge duets), Artist (inverts via commanding imagination), Neophyte (exploits by asking boldly for mentoring). Three positive types."
      source: "How_to_Pitch_a_Brilliant_Idea"
      domains: [pitching, persuasion, stereotyping]
    - id: "FW-OK-046"
      title: "Pre-Pitch Checklist 8 Critical Verifications"
      content: "Before any pitch: (1) 20-min deliverable, (2) Clear VP, (3) Big Idea, (4) Decision time frame, (5) Meeting time, (6) Not needy, (7) Prepared to walk, (8) Croc-brain ready."
      source: "Pre-pitch_Checklist"
      domains: [pitching, preparation, checklist]
    - id: "FW-OK-047"
      title: "French Waiter Frame Control Sequence"
      content: "Seize status: (1) Isolate target, (2) Expose mistake via expertise, (3) Quickly rescue them, (4) Co-opt ally, (5) Distribute social power, (6) Release some power back."
      source: "PITCH_ANYTHING_Chapter_3"
      domains: [status, frame-control, social-dynamics]
  L5_METHODOLOGIES:
    - id: "MET-OK-001"
      title: "How to Set Three Frames Firmly in Place"
      content: "Step 1: Set the Big Idea — 'If you could [impossible thing], then [massive result]. We have [proof of capability].' Step 2: Set the Prize Frame — 'Because we have [proof points], we are not seeking buyers. We are interviewing them. You'll need to explain your value beyond just money.' Step 3: Set the Time Frame — 'In the next 30 days, we will select our partner. Prepare to explain your value-add.' Deliver each with conviction that makes it feel immovable."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, pitching, preparation]
    - id: "MET-OK-002"
      title: "How to Build Your Prize Frame (3-Column Exercise)"
      content: "Step 1: List 'What do I have?' — both pros AND cons, honestly. Step 2: List 'What do they need?' — their real requirements. Step 3: Identify 'Where am I dominant?' — the intersection where your strengths match their needs. Step 4: When questioned on any weakness, immediately redirect to your dominant dimensions. Step 5: If they focus on price and that's not your strength, tell them 'Go get it somewhere else — price is not how you succeed in this market.'"
      source: "Module1-SetTheFrame-Transcript"
      domains: [prize-frame, preparation, sales-strategy]
    - id: "MET-OK-003"
      title: "How to Dismantle the Power Frame"
      content: "Step 1: When they make a social misstep ('Skip the background, give me price'), take the agenda — 'This is my meeting now.' Step 2: Set shorter time constraints ('45 min? We planned 35. Seems like you guys are running slow.'). Step 3: Remove money as power ('Money isn't important to us'). Step 4: Deflect accoutrements ('We fly coach, put money in product'). Step 5: Refuse grand history ('Focus on present, past performance doesn't predict future'). Step 6: Stop rock-fetching ('I'll get your rock if you fetch me one — issue a letter of intent'). Step 7: Be completely nonreactive to escalating offers."
      source: "Module1-SetTheFrame-Transcript"
      domains: [power-frame, frame-control, negotiation]
    - id: "MET-OK-004"
      title: "How to Build a Business Narrative (8 Steps in Practice)"
      content: "Step 1: Open with big idea ('If you could do X, you'd make Y'). Step 2: Deepen the problem from multiple angles, making it viscerally painful. Step 3: Introduce yourself — your personal connection and stakes in the problem. Step 4: Anchor in reality — admit other solutions exist, tell a human-scale story of impact. Step 5: Deliver value proposition using Geoffrey Moore's template. Step 6: Return to human timescales — 'A doctor opens the package, breaks the seal, applies it in 3 minutes.' Step 7: Build future-action projection — past forces → present changes → future vision with the buyer included. Step 8: Apply dramatic tension — subtly withdraw ('We can't take everyone. Do you do things the right way?')."
      source: "Module2-TellTheStory-Transcript"
      domains: [storytelling, pitching, narrative]
    - id: "MET-OK-005"
      title: "How to Deploy Intrigue After the Pitch"
      content: "Step 1: Accept that the audience is tired — their attention is spent. Step 2: Identify your intrigue resources (worksheets: insights, counter-party risks, premium features, incompatibility signs, cool factors). Step 3: Deploy from your strongest asset: 'You are intriguing' (build celebrity via story), 'You can't have it yet' (authorization required), 'Basic product only' (premium restriction), 'We're not sure about you' (compatibility), or 'Certainty' (contracted revenue + celebrity). Step 4: Signal willingness to walk away. Step 5: Open a new area of inquiry related to your pitch that triggers fresh dopamine."
      source: "Module3-RevealTheIntrigue-Transcript"
      domains: [intrigue, pitching, attention-management]
    - id: "MET-OK-006"
      title: "How to Control Buying Temperature Through STRONG"
      content: "Step 1: During Set Frame, raise STATUS not buying temperature. Step 2: During Tell Story, keep engagement high but don't spike excitement. Step 3: During Reveal Intrigue, use surprise to reset dopamine (not excitement). Step 4: During Offer Prize, expect and accept status drop — it's natural when discussing money. Step 5: During Nail Hookpoint, buying temperature should reach its peak exactly here. Step 6: At Get Deal, the buyer should already be adding value and helping close. If temperature peaked too early, it will have cooled by now."
      source: "Module5-NailTheHookpoint-Transcript"
      domains: [closing, calibration, pitching]
    - id: "MET-OK-007"
      title: "How to Recover a Broken Frame"
      content: "Step 1: Identify what happened — name the frame that broke yours (power frame? morality frame? interruption?). Step 2: Execute a denial or defiance. Options: (a) Use the 'Teaser' — labeled bait folder, snatch it back when they reach for it; (b) If they left the room, when they return say 'I need you to say to me: Oren, I like you, I'm interested, I want to continue.' Step 3: Force them to verbally recommit before proceeding. Step 4: Restart from your strongest remaining position."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, negotiation, recovery]
    - id: "MET-OK-008"
      title: "How to Learn and Deploy Frames (5-Step Progression)"
      content: "Step 1: Perceive — immerse yourself in frame material; gain awareness without rushing to action. Step 2: Understand — identify with the material, grasp it with scope and depth. Step 3: Practice with scripts (Mad Libs) — use fill-in-the-blank scripts for prize, time, power, analyst, and needy frames. Step 4: Enter live action using prize frame only (safest) while observing power and analyst frames. Step 5: Introduce the material to a friend and practice talking in 'frame language' regularly."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, skill-development, learning]
    - id: "MET-OK-009"
      title: "How to Handle a Process/Interview You Can't Control"
      content: "Step 1: Follow their process — you cannot blow it up. Step 2: Lay Gulliver strands: set shorter time frame ('I only have 29 minutes'), add prize ('I came to help you have a successful process'), set intrigue ('When you're done, I want to tell you something interesting about your company'). Step 3: Deploy morality frame ('Money means nothing to me — I want to work with good people doing good things'). Step 4: Watch their process erode as they want to join yours. Step 5: Make the 'who' more important than the 'what' of their questions."
      source: "Module1-SetTheFrame-Transcript"
      domains: [frame-control, interview, process-management]
    - id: "MET-OK-010"
      title: "How to Build a Velocity Pitch Deck"
      content: "Step 1: Write the Big Idea in under 200 words — one page, captures the essence and self-qualifies readers. Step 2: Create Deal Summary — CEO, product, location, capital raised, market size. Step 3: Market Disruption page — show forces and market size shift. Step 4: Problem Quantification — provocative data. Step 5: Solution overview — clear, simple. Step 6: Eye candy breaks between data pages. Step 7: Value proposition — economics clearly stated. Step 8: Go-to-market strategy. Step 9: Team page. Goal: Get maximum prospects into Phase I of Grand Architecture."
      source: "GrandArchitecture-Transcript"
      domains: [pitching, deal-structure, marketing]
    - id: "MET-OK-011"
      title: "How to Get the Deal Closed (3 Paths)"
      content: "Path 1 (Buyer loves it): Immediately put them in your closing process — no more negotiation, just paperwork and payment. Path 2 (Last-minute concession): Either concede with high status and a wave of the hand, or refuse with absolute finality like a judge's gavel. Never whine. Path 3 (Small terms remaining): Acknowledge the deal is on, commit to working through details, create a timeline for paperwork. In all cases: maintain high status, be willing to walk away, and remember 'many a slip between cup and lip.'"
      source: "Module6-GetTheDeal-Transcript"
      domains: [closing, deal-making, negotiation]
    - id: "MET-OK-012"
      title: "How to Offer Commercial Terms Without Losing Status"
      content: "Step 1: Recognize status WILL drop when you discuss price — this is inevitable. Step 2: Have previously established maximum status through framing and story. Step 3: Present terms confidently and simply — price, delivery, payment terms, options. Step 4: Frame the offer as the prize ('These are the terms for joining us'). Step 5: Maintain prizing language throughout ('We can work with a limited number of customers'). Step 6: Accept the status dip and prepare for the hookpoint recovery."
      source: "Module4-OfferThePrize-Transcript"
      domains: [closing, status, pitching, negotiation]
    - id: "MET-OK-013"
      title: "STRONG Method Full Implementation"
      content: "Complete 20-minute pitch execution: Minutes 1-3: Set the Frame (prize, time, big idea). Minutes 3-10: Tell the Story (character, problem, solution, value prop). Minutes 10-15: Reveal the Intrigue (attention restart, push-pull). Minutes 15-17: Offer the Prize / Nail the Hookpoint. Minutes 17-20: Get the Deal (qualify-back, counter-pressure, next steps)."
      source: "PitchMastery-Welcome-Introduction"
      domains: [pitching, methodology, deal-making]
    - id: "MET-OK-014"
      title: "Frame Setting Execution Method"
      content: "Step 1: Set Big Idea - 'If you could [do X], then [massive opportunity].' Step 2: Set Prize Frame - 'Because we have [proof points], we are not seeking [buyers]. We are interviewing them.' Step 3: Set Time Frame - 'In the next [X days], we will have selected the [partner/customer]. Prepare to explain your value beyond just money.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, opening, execution]
    - id: "MET-OK-015"
      title: "Power Frame Takedown Method"
      content: "Step 1: Recognize the power frame (leaning back, 'pitch us your deal'). Step 2: Apply shorter time constraint. Step 3: Remove money as power source. Step 4: Decline fancy offers with fortune-cookie wisdom. Step 5: Take control of the agenda ('this is my meeting now'). Step 6: Stop rock-fetching ('I'll get your rock, but you fetch me one too'). Step 7: Remain non-reactive as they escalate."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [power-frame, negotiation, execution]
    - id: "MET-OK-016"
      title: "Analyst Frame Shutdown Method"
      content: "Step 1: Recognize out-of-phase information requests. Step 2: Say 'All these details are in this binder. But let's not waste our time going through minutia.' Step 3: Redirect - 'I don't know if I like you yet. Let's figure that out first.' Step 4: Offer breakout sessions for technical review. Step 5: Use time frame - 'This is chewing up time when we haven't accomplished basic milestones.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [analyst-frame, meeting-management, execution]
    - id: "MET-OK-017"
      title: "Business Narrative Construction Method"
      content: "Step 1: Build character ('When I started, it was not easy...'). Step 2: Deepen the problem (multiple angles, show scale). Step 3: Admit other solutions exist. Step 4: Introduce your connection to the problem. Step 5: Present solution and value proposition. Step 6: Anchor in human-scale reality. Step 7: Build future action projection (past→present→future with them in it). Step 8: Add dramatic tension (qualify-back)."
      source: "PitchMastery-Module2-TellTheStory"
      domains: [storytelling, pitching, narrative-construction]
    - id: "MET-OK-018"
      title: "Prizing Execution Under Fire"
      content: "Step 1: Prepare 3-column analysis (have/need/dominant). Step 2: When hearing weakness signals ('kind of interesting'), close distance instantly. Step 3: Reframe - 'It's not kind of interesting, it's amazing.' Step 4: When hearing 'a lot like X' - 'No, it's not like anything. This is unique.' Step 5: When hearing 'evaluate you' - 'You should worry less about selecting us and more about proving you'd want to work with us.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [prize-frame, objection-handling, execution]
    - id: "MET-OK-019"
      title: "Intrigue Story Method"
      content: "Step 1: Put yourself as central character. Step 2: Set a real high-stakes situation. Step 3: Add time pressure. Step 4: Introduce a turning point where things could go either way. Step 5: As tension peaks, CUT the story before resolution. Step 6: Return to the pitch with renewed attention. The unresolved tension keeps them engaged."
      source: "PitchMastery-Module3-RevealTheIntrigue"
      domains: [intrigue, storytelling, attention-management]
    - id: "MET-OK-020"
      title: "Hookpoint and Counter-Pressure Method"
      content: "Step 1: Summarize what you've presented. Step 2: Demonstrate demand - 'We're busy, there's high demand.' Step 3: Announce selectivity - 'We're choosing our customers.' Step 4: Apply counter-pressure - 'Tell me about yourself. Why should I choose you?' Step 5: Ask qualifying questions - 'Do others make money working with you? How do you add value?' Step 6: Let them chase you."
      source: "PitchMastery-Module5-NailTheHookpoint"
      domains: [closing, counter-pressure, qualification]
    - id: "MET-OK-021"
      title: "Frame Learning Progression Method"
      content: "Step 1: Use scripts and mad libs (fill-in-the-blank frame responses). Step 2: Practice with friendly people. Step 3: In live deals, start with prize frame ONLY (easiest/most natural). Step 4: Observe and identify power/analyst frames without acting. Step 5: Once good at identifying, start counteracting. Step 6: Introduce material to a friend and discuss in frame language regularly."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [skill-development, frame-control, practice]
    - id: "MET-OK-022"
      title: "VIP Pitch Deck Distribution Method"
      content: "Step 1: Get the target's email. Step 2: Send ultra-short email: 'Hey [Name], we have [thing] I'd like you to look at. If I send the pitch deck, will you spend 5 minutes with it?' Step 3: No signature block, no attachments, just name. Step 4: Wait for 'yes.' Step 5: Send pitch deck. Step 6: Open dialogue from there."
      source: "AccelerationCallWeek2"
      domains: [outreach, networking, execution]
    - id: "MET-OK-023"
      title: "Neediness Eradication Process"
      content: "Step 1: Before any big pitch, secure at least one alternative (even tiny). Step 2: Get a check in hand, even small. Step 3: Do NOT think of the meeting as your only shot. Step 4: Make it fun for YOU. Step 5: Throughout the pitch, be non-reactive to displays of power. Step 6: When you feel neediness rising, remember: they need what you have more than you need their money."
      source: "AccelerationCallWeek1"
      domains: [neediness-eradication, mindset, preparation]
    - id: "MET-OK-024"
      title: "Grand Architecture Deal Management"
      content: "Step 1: Fill pipeline (Phase 0 - mass awareness). Step 2: Qualify into Phase 1 (wanting must exist). Step 3: Get expression of interest (Phase 2 - draft LOI/PO). Step 4: Complete due diligence (Phase 3 - no more questions, closing date set). Step 5: Close. Key rule: control who moves between phases. YOU allow them to advance, not the other way around."
      source: "PitchMastery-GrandArchitecture"
      domains: [deal-management, pipeline, sales-process]
    - id: "MET-OK-025"
      title: "Moral Authority Frame Deployment"
      content: "Step 1: Identify situation where power frame demands unethical/unfair action. Step 2: State your position - 'You can ask me to do anything. Dig ditches, shine trucks.' Step 3: Draw the line - 'The one thing you will not ask me to do is do the wrong thing.' Step 4: Hold firm. There is no higher appeal than the moral authority frame. Step 5: Use it for fee negotiations - 'We don't have to be pigs. Fair fees, parity.'"
      source: "PitchMastery-Welcome-Introduction"
      domains: [moral-authority, negotiation, ethics]
    - id: "MET-OK-026"
      title: "Process Infiltration Method (Interviews/Pitch Fests)"
      content: "Step 1: Accept the process (don't blow it up). Step 2: Deploy tiny strands: shorter time counter ('You have 30 min? I have 25'). Step 3: Prize positioning ('Glad I could help you have a successful process'). Step 4: Set intrigue hook ('When you're done, there's something interesting I want to tell you about your company'). Step 5: Deploy moral authority. Step 6: Accumulate micro-wins until their process erodes toward yours."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, interviews, process-management]
    - id: "MET-OK-027"
      title: "Live Pitch Coaching Method"
      content: "Step 1: Student describes business in 60 seconds. Step 2: Identify the core prize (what makes you different). Step 3: Craft the big idea in 1-2 sentences. Step 4: Build 3-column prize analysis. Step 5: Practice the opening frame set. Step 6: Role-play common objections (power frame, analyst frame). Step 7: Practice counter-pressure and qualify-back."
      source: "AccelerationCallWeek2"
      domains: [coaching, skill-development, pitching]
    - id: "MET-OK-028"
      title: "Pitch Deck Construction Method"
      content: "Step 1: Opening slide = Big Idea (68 words). Step 2: Problem slides (deepen from multiple angles). Step 3: Character/team slide. Step 4: Solution/product slides. Step 5: Value proposition slide (Geoffrey Moore pattern). Step 6: Revenue/economic model. Step 7: Market forces (3 moving forces). Step 8: Future projection with buyer in it. Step 9: Hookpoint/qualify-back."
      source: "PitchMastery-GrandArchitecture"
      domains: [pitch-deck, presentation-design, deal-making]
    - id: "MET-OK-029"
      title: "Swear Word Recovery Method"
      content: "When called out for swearing in a meeting, reframe: 'You're upset over a swear word during my passionate exuberance? We're about to do hard work together - late nights, weekends, difficult problems. If you can't handle authentic passion, I'm not sure you're ready for this.'"
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, recovery, authenticity]
    - id: "MET-OK-030"
      title: "Frame Loss Recovery via Validation Request"
      content: "When a phone call interrupts and breaks your frame: Step 1: Wait for them to return. Step 2: Say 'Bob, everything settled? What I'd like you to do is say to me: Oren, I like you. I'm very interested in this deal and I want to continue.' Step 3: Make them explicitly re-commit before continuing."
      source: "PitchMastery-Module1-SetTheFrame"
      domains: [frame-control, recovery, meeting-management]
    - id: "MET-OK-031"
      title: "Hot Cognition Stack Delivery Process"
      content: "Step-by-step: (1) State price neutrally, (2) Intrigue Frame pivot, (3) Prize Frame scarcity, (4) Time Frame external force, (5) Moral Authority Frame, (6) Withdraw physically, (7) Location shift."
      source: "Module4-OfferThePrize"
      domains: [frame-stacking, pricing, deal-closing]
    - id: "MET-OK-032"
      title: "Waypoint Verification Process"
      content: "At each waypoint: (1) Execute action, (2) Look for specific observable result, (3) If no result re-attempt, (4) Only proceed when current verified."
      source: "Module5-NailTheHookpoint"
      domains: [pitching, calibration, process-model]
    - id: "MET-OK-033"
      title: "Deal Closing Autonomy Method"
      content: "To close: (1) Summarize value, (2) Acknowledge bias: I am biased I work here, (3) State: You need to decide for yourself, (4) Back away and give space."
      source: "Module6-GetTheDeal"
      domains: [deal-closing, autonomy, persuasion]
    - id: "MET-OK-034"
      title: "Concession Handling Protocol"
      content: "When buyer requests concession: (1) Pre-evaluate yes/no, (2) If YES: wave hand We focus on doing things right, (3) If NO: No that is not going to happen (like gavel)."
      source: "Module6-GetTheDeal"
      domains: [negotiation, deal-closing, status]
    - id: "MET-OK-035"
      title: "Pitch Teardown and Rebuild Process"
      content: "(1) Listen to original, (2) Identify missing Porter elements, (3) Develop intrigue narrative, (4) Market window, (5) Acknowledge competitors position advantage, (6) Define ideal customer, (7) Rebuild with frame control."
      source: "Teardown"
      domains: [pitching, coaching]
    - id: "MET-OK-036"
      title: "Buying Temperature Calibration Process"
      content: "Raise gradually: Set Frame equals low, Tell Story building, Reveal Intrigue bouncing, Offer Prize climbing (status drops), Nail Hookpoint ready threshold, Get Deal aligned close."
      source: "Module5-NailTheHookpoint"
      domains: [buying-temperature, pitching, timing]
    - id: "MET-OK-037"
      title: "Cognitive Bias Mitigation Process"
      content: "(1) Establish accountability BEFORE info, (2) Present multiple framings, (3) Challenge initial hypotheses, (4) Time pressure awareness, (5) Multiple independent evaluators."
      source: "Cognitive_Biases"
      domains: [cognitive-bias, decision-making]
    - id: "MET-OK-038"
      title: "SCARF Threat Reduction Process"
      content: "(1) Share max info for Certainty, (2) Give latitude for Autonomy, (3) Inclusive planning for Status, (4) Team bonding for Relatedness, (5) Transparent treatment for Fairness."
      source: "Managing_with_the_Brain_in_Mind"
      domains: [leadership, change-management]
    - id: "MET-OK-039"
      title: "Complete STRONG Pitch Full Sequence"
      content: "Full: SET FRAME (10min) then TELL STORY (20min) then REVEAL INTRIGUE (10min) then OFFER PRIZE (4-Frame Stack then Withdraw) then NAIL HOOKPOINT (14 waypoints) then GET DEAL (autonomy plus commitment)."
      source: "Module6-GetTheDeal"
      domains: [pitching, sales-process]

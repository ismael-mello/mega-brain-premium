# ============================================================================

modelos_mentais:

  - id: JH-30DC-MM-001
    titulo: "Shoot and Cushion"
    descricao: >
      Sales follow-up model based on medical analogy. First "shoot them in the
      leg" by presenting a drastic business problem (e.g., no SSL, no pixel).
      Then "run up and cushion the wound" by acknowledging the pain. Then "dig
      your thumb in" by amplifying consequences. Finally "stitch it up" by
      positioning yourself as the doctor with the solution. Creates urgency
      through pain amplification then relief.
    peso: 0.92
    citacao: >
      "It's kind of like shooting them in the leg and then as you shoot them in
      the leg, you run up and you're like, 'Oh, Jesus man, you got this wound
      on your leg right here. I'm going to cushion it a little bit.'"
    aplicacao: "Follow-up videos, urgency creation, pain-based selling"
    fonte: "[30DC-0019] 19 - DAY 19..txt"

  - id: JH-30DC-MM-002
    titulo: "Pricing Pyramid Real Estate"
    descricao: >
      Business pricing visualized as a pyramid with real estate. Base level has
      the most room (attention/low-cost). Each level up has less capacity but
      higher value. When capacity fills up at any level, the price for remaining
      spots goes up - like real estate appreciating when units are scarce.
      If no rooms left, you build an extension on top, which costs even more.
    peso: 0.90
    citacao: >
      "If there's only one room left or if there's no rooms left, you got to
      build a whole extension on top of that pyramid. That's going to cost a
      lot more, right? You see what I'm trying to say here? You guys have to
      look at your business. Like, you got some real estate you're trying to fill."
    aplicacao: "Service packaging, pricing tiers, capacity-based pricing"
    fonte: "[30DC-0013] 13- DAY 13..txt"

  - id: JH-30DC-MM-003
    titulo: "Power of Choice Psychology"
    descricao: >
      When giving someone a response option, never frame it as yes/no. Instead,
      provide two positive choices (morning or afternoon, 10 AM or 2 PM). The
      answer is no longer "yes or no" but becomes "which one." Give people the
      right choices and they'll give you the right answers.
    peso: 0.90
    citacao: >
      "If I give somebody morning or night or morning or afternoon or 10 or two,
      is it yes or no? No, it's morning or afternoon. You see what you can do
      with the power of choice? Give people the right choices, they'll make the
      right answers."
    aplicacao: "Appointment setting, closing, any binary decision in sales"
    fonte: "[30DC-0003] 3 - DAY 3.txt"

  - id: JH-30DC-MM-004
    titulo: "Problem Cost vs Solution Value"
    descricao: >
      Every sales conversation exists on a balance between how much the problem
      costs the prospect and how much the solution is worth. The salesperson's
      job is to make the prospect see both sides clearly - the financial
      liability of the problem (DDoS, no SSL, lost traffic) versus the value
      of the solution. When the cost of the problem exceeds the price of the
      solution, the sale is logical.
    peso: 0.88
    citacao: >
      "You have to be able to see these things in real time and know that that's
      a piece of value somebody's willing to pay for because they understand how
      much that problem could cost them or how much that solution could make them."
    aplicacao: "Value selling, ROI conversations, proposal framing"
    fonte: "[30DC-0005] 5 - DAY 5.txt"

  - id: JH-30DC-MM-005
    titulo: "Lead Graph Content Consumption Matrix"
    descricao: >
      Four-quadrant model mapping content types by two axes: "Hard to Consume
      vs Easy to Consume" and "Low Desire vs High Desire." Webinars/Video
      series = hard to consume but high desire. PDF downloads = easy to consume
      and high desire. Sales calls = hard to consume, low desire. Ebooks = easy
      to consume, low desire. Webinars have 50% attrition rate because they're
      hard to consume. Use this to choose the right lead magnet format.
    peso: 0.88
    citacao: >
      "This is a pretty cool pitch... So this is downloadable once again for you."
    aplicacao: "Lead generation, content strategy, funnel design"
    fonte: "[30DC-0027] 27 - DAY 27..txt"

  - id: JH-30DC-MM-006
    titulo: "Learning Style Selling"
    descricao: >
      35% of people are visual learners, 40% kinesthetic/tactile, 25% auditory.
      A screen share sales presentation hits all three simultaneously - showing
      visuals (visual), explaining concepts (auditory), and moving them
      emotionally (kinesthetic). Listen for cues: "I'd like to see more" (visual),
      "I need to hear more" (auditory), "it made us feel bad" (kinesthetic).
      Adapt selling style to their dominant learning type.
    peso: 0.85
    citacao: >
      "35% of people in real life are visual learners... 40% of the entire
      demographic in the world is kinesthetic... 25%'s auditory. Technically,
      you hit all three by being able to show them things that move them and
      explaining them on a call."
    aplicacao: "Sales presentations, screen share calls, proposal delivery"
    fonte: "[30DC-0010] 10 - DAY 10..txt"

  - id: JH-30DC-MM-007
    titulo: "Teaching Retention Multiplier"
    descricao: >
      You retain 70-90% of information when you teach it to others, versus only
      10% through passive learning. When doing data-driven outreach, the act of
      explaining a prospect's data to them is simultaneously teaching yourself.
      This means every sales interaction makes you smarter and more capable
      for the next one. Volume compounds skill.
    peso: 0.85
    citacao: >
      "You have a 70 to 90% opportunity to retain that information comparatively
      to the normal 10% when retaining information that you're learning when you
      teach it to others."
    aplicacao: "Skill development through outreach, training methodology, coaching"
    fonte: "[30DC-0005] 5 - DAY 5.txt"



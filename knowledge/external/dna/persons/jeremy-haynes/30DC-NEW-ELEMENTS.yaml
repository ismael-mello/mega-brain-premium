  - id: JH-30DC-MET-003
    titulo: "One-Liner Follow-Up Rotation"
    descricao: >
      System for high-volume follow-up: Create 3 different one-liner messages
      in a text editor/notes app. Rotate through them to avoid spam filters and
      repetition. Examples: (1) "Wanted to follow up and make sure you saw this.
      Would love to get on the phone." (2) "Hey, had some time. Wanted to see
      if you were available for a call right now." (3) "Hey, I just saw something
      about your website on Google." Deploy across email, Facebook Messenger,
      and text message. Copy-paste for text; manually vary for other channels.
    peso: 0.90
    citacao: >
      "Simple one-liners that you're going to rotate through. That way, you
      don't flag any of these mediums that you're going to be communicating
      through."

heuristicas:

  - id: JH-30DC-HEUR-001
    titulo: "100 Outreach Per Day Non-Negotiable"
    descricao: >
      Minimum 100 new communications or follow-ups per day. This is the core
      daily discipline of the 30-Day Challenge. Follow-ups count toward the 100.
      No exceptions for any reason short of medical emergency.
    peso: 0.95
    citacao: >
      "This is an A+ only test. Everything below that, literally 99, F."
    aplicacao: "Daily outreach targets, sales team KPIs"
    fonte: "[30DC-0016] 16 - DAY 16..txt"

  - id: JH-30DC-HEUR-002
    titulo: "8-17 Follow-ups To Close (Current)"
    descricao: >
      The average close now requires 8-17 follow-up attempts, up from the
      historical 5-12. Communication cycles are increasing because there are
      more salespeople competing for attention. Extreme case: 193 follow-ups
      for a $15K deal. Fast case: 7 follow-ups for a $100K/mo deal.
    peso: 0.92
    citacao: >
      "The average close won't happen until the fifth to 12th follow-up attempt.
      I think those numbers are higher now. I actually think it's between about
      eight and sometimes 17."
    aplicacao: "Follow-up persistence, pipeline expectations, CRM configuration"
    fonte: "[30DC-0003] 3 - DAY 3.txt"

  - id: JH-30DC-HEUR-003
    titulo: "193 Follow-ups $15K / 7 Follow-ups $100K"
    descricao: >
      Extreme case study: One deal required 193 follow-up attempts to close at
      $15K. Conversely, a $100K monthly deal closed after only 7 follow-ups.
      Volume and persistence have no direct correlation with deal size - the
      highest value deals can close fastest.
    peso: 0.90
    citacao: >
      "I had to follow up with a guy 193 times in order to close him for 15k.
      But I've closed 100k monthly deals that I've only had to follow up with
      seven times."
    aplicacao: "Persistence calibration, pipeline management, never giving up"
    fonte: "[30DC-0003] 3 - DAY 3.txt"

  - id: JH-30DC-HEUR-004
    titulo: "1500-1700 Communications By Day 18"
    descricao: >
      At 100 communications per day for 18 days, the accumulated pipeline
      should have 1,500-1,700 total communications. At this point, follow-ups
      should consume most of the daily 100 allocation and a "tsunami" of
      responses should be incoming.
    peso: 0.88
    citacao: >
      "You should at this point have had over 1,500, 1,500 different
      communications, 1,700 different communications."
    aplicacao: "Pipeline forecasting, activity tracking, momentum benchmarks"
    fonte: "[30DC-0018] 18 - DAY 18..txt"

  - id: JH-30DC-HEUR-005
    titulo: "2100-2200 Contacts By Day 22"
    descricao: >
      By day 22 of the challenge, the database should contain 2,100-2,200
      people available for follow-up. On high-volume follow-up days, the
      target should be 20x the standard 100, potentially reaching all
      accumulated contacts in 8-9 hours of focused work.
    peso: 0.88
    citacao: >
      "Hopefully you have 2,200 people that you can follow up with or 2,100
      people by this point... You should be able to follow up with all 2,100
      people by doing simple one-liners if you spend a solid eight to nine hours."
    aplicacao: "Database size benchmarks, massive follow-up days, catch-up strategy"
    fonte: "[30DC-0022] 22 - DAY 22..txt"

  - id: JH-30DC-HEUR-006
    titulo: "70-90% Retention When Teaching"
    descricao: >
      Teaching information to others produces 70-90% retention rate versus only
      10% through passive consumption. Doing data-driven outreach is a form of
      teaching, so sales activity simultaneously builds expertise.
    peso: 0.85
    citacao: >
      "70% 90% it's in between the two of the information that you learn you
      have a 70 to 90% opportunity to retain that information comparatively to
      the normal 10%."
    aplicacao: "Training methodology, onboarding programs, skill acceleration"
    fonte: "[30DC-0005] 5 - DAY 5.txt"

  - id: JH-30DC-HEUR-007
    titulo: "35% Visual 40% Kinesthetic 25% Auditory"
    descricao: >
      Global learning style distribution: 35% visual, 40% kinesthetic/tactile,
      25% auditory. Screen share presentations can hit all three simultaneously.
      Identify which type by listening to their language cues.
    peso: 0.85
    citacao: >
      "35% of people in real life are visual learners... 40% is kinesthetic...
      25%'s auditory."
    aplicacao: "Sales presentation design, communication adaptation"
    fonte: "[30DC-0010] 10 - DAY 10..txt"

  - id: JH-30DC-HEUR-008
    titulo: "$16K Min Package / $8-12K Mid / $4K Entry / $1K One-Time"
    descricao: >
      Jeremy's agency pricing pyramid at the time: Level 5 (top) = $16K minimum
      (now his floor), Level 4 = $8K-$12K/month, Level 3 = $4K/month (Social
      Services Package), Level 2 = $1K one-time service. Current minimum for
      any service is $15K.
    peso: 0.88
    citacao: >
      "That level right there was a 16k package at the time. That's my minimum
      now... between 8 to 12K... social services package which at the time was
      4K... a $1,000 package, a one-time service."
    aplicacao: "Agency pricing benchmarks, package structuring"
    fonte: "[30DC-0013] 13- DAY 13..txt"

  - id: JH-30DC-HEUR-009
    titulo: "$5K Speaking Fee Entry Point"
    descricao: >
      Charge $5K minimum for keynote speaking engagements. Include a speaking
      pitch page in your digital playbook to position yourself as a speaker
      even before you're known as one. "If you let people know you're a
      speaker, all of a sudden, you might become one."
    peso: 0.82
    citacao: >
      "I charged 5K for speaking gigs. And right here, it was just a great way
      for a speaking pitch."
    aplicacao: "Speaking career development, personal brand positioning"
    fonte: "[30DC-0014] 14 - DAY 14..txt"

  - id: JH-30DC-HEUR-010
    titulo: "25-5 Pomodoro For Outreach"
    descricao: >
      Work 25 minutes at high intensity, then take a 5-minute break. Repeat.
      Applied specifically to outreach and follow-up cycles. From a high
      performance neurology book. Prevents burnout while maintaining high
      volume during intensive follow-up days.
    peso: 0.85
    citacao: >
      "I want to encourage you to do something I learned from a high performance
      neurology book that talked about the 25-5 rule. Meaning work hard, high
      intensity, 25 minutes straight, give yourself a five-minute break."
    aplicacao: "Daily outreach execution, productivity management, focus sessions"
    fonte: "[30DC-0022] 22 - DAY 22..txt"

  - id: JH-30DC-HEUR-011
    titulo: "50% Webinar Attrition Rate"
    descricao: >
      Webinars suffer approximately 50% attrition - half the people who register
      never actually consume the content. This is because webinars are "hard to
      consume" even though they generate high desire. Factor this into funnel
      math and consider easier-to-consume lead magnet formats.
    peso: 0.85
    citacao: >
      "50% attrition rate"
    aplicacao: "Funnel math, lead magnet selection, content format decisions"
    fonte: "[30DC-0027] 27 - DAY 27..txt"

  - id: JH-30DC-HEUR-012
    titulo: "$10-20 Physical Prop Investment Per Prospect"
    descricao: >
      Send physical objects (baseball bats, stuffed animals, picture frames)
      to high-value prospects for $10-20 total including shipping. Write
      personalized messages with Sharpie. The unusual nature of the prop
      creates memorability that digital outreach cannot match.
    peso: 0.82
    citacao: >
      "Few bucks, maybe 10 bucks each. I don't know, five, 10 bucks to ship.
      So all in all, maybe you're 10, $15, $20 invested here on the shipment."
    aplicacao: "High-value prospect outreach, physical marketing, whale hunting"
    fonte: "[30DC-0024] 24 - DAY 24..txt"



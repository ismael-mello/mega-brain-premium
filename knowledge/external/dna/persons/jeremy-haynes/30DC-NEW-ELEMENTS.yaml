# LAYER 4: FRAMEWORKS (9 NEW)
# ============================================================================
# Existing JH frameworks checked: 25. All below are genuinely NEW.
# Skipped: "Follow-Up Architecture" (existing), "Call Funnel" (existing)
# ============================================================================

frameworks:

  - id: JH-30DC-FW-001
    titulo: "Data-Driven Email Outreach"
    descricao: >
      Cold email approach where instead of pitching services, you send the
      prospect detailed data about their own business - pixel status, SSL
      security, social analytics, ad performance, SEO gaps. The email is
      about THEM, not about you. This gains psychological interest because
      you're showing them themselves, creating a natural conversation about
      their specific situation rather than an awkward sales pitch.
    peso: 0.95
    citacao: >
      "That's why I like the data driven approach more than anything else.
      You're showing them themselves. You're literally just saying, 'Here,
      I want to show you a bunch of stuff about you.'"
    aplicacao: "Cold outreach, email prospecting, initial contact strategy"
    fonte: "[30DC-0003] 3 - DAY 3.txt"

  - id: JH-30DC-FW-002
    titulo: "Deep vs Wide Prospecting"
    descricao: >
      Two opposing approaches to prospecting. Deep = few prospects with extensive
      research and personalized data for each. Wide = many prospects with minimal
      personalization. JH advocates Deep because: (1) the data you gather becomes
      your conversation fuel, (2) it benefits the prospect with real insights,
      (3) it creates documentation you can reference in follow-ups, and (4) it
      differentiates you from every other salesperson doing wide spray-and-pray.
    peso: 0.92
    citacao: >
      "You went deep versus wide, you sent them a data driven email. That's also
      why you have every bit of data that you could ever possibly need because you
      sent a data driven email went deep instead of wide."
    aplicacao: "Prospecting strategy, research depth, outreach quality"
    fonte: "[30DC-0003] 3 - DAY 3.txt"

  - id: JH-30DC-FW-003
    titulo: "Digital Playbook"
    descricao: >
      A physical/digital branded document used as follow-up collateral. Structure:
      (1) Cover page with strong branding, (2) Baseball Card with personal stats
      and results, (3) Battle Plan Blueprint with 6-step process, (4) Complex
      process page showing expertise, (5) VFP product pages with name/description/
      bullets/price, (6) Speaking pitch page. Print spiral-bound copies for events
      ($5 each at FedEx Kinko). Send digitally as follow-up material.
    peso: 0.92
    citacao: >
      "This is what I call the battle plan blueprint. This is six specific steps
      that we follow through... gives you an opportunity to go back to all those
      other people that you have already communicated with."
    aplicacao: "Follow-up collateral, event materials, proposal substitute"
    fonte: "[30DC-0014] 14 - DAY 14..txt"

  - id: JH-30DC-FW-004
    titulo: "VFP - Valuable Final Product"
    descricao: >
      Structured product presentation format: (1) Product name - typically 3
      words plus acronym (e.g., Social Services Package = SSP), (2) Strategic
      description of the product, (3) Bullet points of specific services
      included (NOT results), (4) Price clearly displayed, (5) Visual icons
      showing deliverables (platforms, frequency), (6) Consistent footer
      with contact information.
    peso: 0.90
    citacao: >
      "This right here, see at the top it has a name of the product, social
      services package. Typically three words, SSP, social services package.
      From there, I have a description of what the product is."
    aplicacao: "Service packaging, pricing documents, proposal design"
    fonte: "[30DC-0014] 14 - DAY 14..txt"

  - id: JH-30DC-FW-005
    titulo: "Pricing Pyramid (5-Level)"
    descricao: >
      Visual framework for structuring agency pricing as a pyramid with 5 tiers:
      Level 1 (base) = Attention/free content, Level 2 = $1K one-time entry,
      Level 3 = $4K/mo mid-tier, Level 4 = $8-12K/mo high-tier, Level 5 (top)
      = $16K+ premium. Print it large, hang on office wall. Use it as a sales
      tool to show prospects where they fit. As capacity fills, prices increase.
    peso: 0.90
    citacao: >
      "This pyramid represents the different pricing structures within my
      business model... five different levels. The base to any pyramid where
      the most real estate is, meaning the most people can occupy, is the
      attention level."
    aplicacao: "Service pricing, sales visual tools, capacity management"
    fonte: "[30DC-0013] 13- DAY 13..txt"

  - id: JH-30DC-FW-006
    titulo: "Steps To Result (6-Step)"
    descricao: >
      Visualized cycle for walking prospects through your delivery process:
      (1) Set Expectations, (2) Gather the Assets, (3) Change or Create
      Image/Quotes/Content, (4) Strategy Session, (5) Action, (6) Reporting
      and Real-Time Changes. Multi-purpose: works for internal staff, external
      clients, and outsourcing partners. Use as follow-up asset.
    peso: 0.88
    citacao: >
      "Set expectations, gather the assets, change or create image quotes,
      content, strategy session, action, reporting, and real-time changes."
    aplicacao: "Service delivery visualization, proposal content, client onboarding"
    fonte: "[30DC-0015] 15 - DAY 15.txt"

  - id: JH-30DC-FW-007
    titulo: "Phases of Growth and Result (4-Phase)"
    descricao: >
      Four-phase client growth cycle: (1) Re-engagement - reactivate dormant
      audience, (2) Expansion - grow reach and channels, (3) Sell and Retarget -
      convert and recapture, (4) Collect and Analyze - measure and optimize.
      Used as both internal process guide and client-facing visual asset.
    peso: 0.85

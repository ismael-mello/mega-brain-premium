    descricao: "Sistema completo de 30 dias para construir pipeline do zero. Disciplina diaria de 100 comunicacoes. Days 1-5: cold emails orientados a dados. Days 5-10: follow-up one-liners e agendamento. Days 10-15: apresentacoes Zoom, propostas. Days 15-20: docs legais, videos criativos. Days 20-25: props, correio fisico, tecnicas avancadas de video. Days 25-30: escalando, terceirizando, duplicando habilidades."
    peso: 0.95
    chunks: ["30DC-all"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Launch de novo negocio, construcao de pipeline, onboarding de equipe de vendas"
    rating: "★★★★★"

  - id: "JH-MET-020"
    titulo: "Construcao de Email Orientado a Dados"
    descricao: "Processo passo a passo: (1) Escolher prospect (deep-not-wide), (2) Verificar SSL/HTTPS, (3) Instalar Facebook Pixel Helper, (4) Usar Google Tag Manager, (5) Verificar SocialBlade para analytics, (6) Usar ferramentas de spy de ads, (7) Verificar plataforma de email marketing, (8) Compilar todos os dados em um email abrangente."
    peso: 0.92
    chunks: ["30DC-005"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Criacao de cold email, processo de pesquisa de prospect"
    rating: "★★★★★"

  - id: "JH-MET-021"
    titulo: "Rotacao de Follow-Up One-Liner"
    descricao: "Sistema para follow-up de alto volume: Criar 3 mensagens one-liner diferentes num editor de texto. Rotacionar para evitar filtros de spam. Exemplos: (1) 'Queria acompanhar e ter certeza que viu isso.', (2) 'Tive um tempinho. Queria ver se estava disponivel para uma ligacao agora.', (3) 'Acabei de ver algo sobre seu site no Google.' Distribuir por email, Facebook Messenger e texto."
    peso: 0.90
    chunks: ["30DC-022"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Execucao de follow-up em massa, diversificacao de canais"
    rating: "★★★★★"

  - id: "JH-MET-022"
    titulo: "Aquisicao de Numero de Celular"
    descricao: "Scripts para adquirir numero de celular do prospect: Script 1: 'Tinha algo que precisava te enviar por mensagem agora. E uma imagem rapida. Qual e o melhor celular?' Script 2: 'Acabei de ver esse link de artigo. Queria te ligar. Nao tinha acesso ao meu email. Qual e o melhor celular para enviar isso?' Cria urgencia para justificar pedir o numero."
    peso: 0.88
    chunks: ["30DC-018"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Enriquecimento de dados de contato, preparacao de follow-up multi-canal"
    rating: "★★★★"

  - id: "JH-MET-023"
    titulo: "Superacao de Objecao NDA"
    descricao: "Quando prospect recusa compartilhar dados proprietarios, usar NDA como ferramenta: (1) Ter NDA pre-formatado no DocuSign, (2) Se presencial, deslizar NDA fisico pela mesa, (3) Script: 'Entendo. Voce tem dados proprietarios. Trouxe um NDA. Nao vou divulgar nada. Se voce tiver um NDA, fico feliz em assinar o seu tambem.' (4) Oferecer assinar o NDA DELES mostra flexibilidade e confianca."
    peso: 0.85
    chunks: ["30DC-017"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Gestao de objecoes, remocao de barreiras de fechamento"
    rating: "★★★★"

  - id: "JH-MET-024"
    titulo: "Producao de Video Follow-Up"
    descricao: "Producao de video de follow-up no celular: (1) Abrir camera, selfie mode, (2) Posicionar contra parede de cor solida, (3) Evitar luz de cima (efeito Frankenstein), usar luz lateral suave, (4) Laptop proximo com dados do prospect, (5) Gravar sem rever - se errar, deletar e refazer, (6) Incluir nome do prospect, (7) Referenciar dados especificos, (8) Finalizar com escolha binaria de close, (9) Enviar imediatamente."
    peso: 0.90
    chunks: ["30DC-018"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Execucao de follow-up em video, criacao de conteudo"
    rating: "★★★★★"

  - id: "JH-MET-025"
    titulo: "Outreach Com Props Fisicos"
    descricao: "Sistema para usar objetos fisicos no outreach: (1) Comprar itens baratos ($10-20) como bates de beisebol, porta-retratos, peluchas, (2) Escrever mensagem personalizada com Sharpie, (3) Enviar ao endereco comercial do prospect para o decisor, (4) Fazer video follow-up referenciando o prop enviado, (5) Usar brinquedos de criancas como iniciadores de conversa sobre POR QUE estao no negocio."
    peso: 0.85
    chunks: ["30DC-024"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Engajamento de prospects de alto valor, marketing fisico"
    rating: "★★★★"

  - id: "JH-MET-026"
    titulo: "Exercicio de Decomposicao de Eficiencia"
    descricao: "Exercicio escrito para identificar e eliminar ineficiencias: (1) Escrever a desculpa para nao atingir 100/dia, (2) Decompor a desculpa em razoes subjacentes, (3) Se razoes ainda sao amplas, decompor mais, (4) Encontrar a dor psicologica ou vulnerabilidade de processo na raiz, (5) Projetar uma eficiencia para eliminar aquela causa raiz."
    peso: 0.85
    chunks: ["30DC-011"]
    fontes: ["30DC-NEW-ELEMENTS"]
    aplicacao: "Otimizacao de produtividade, eliminacao de desculpas"
    rating: "★★★★"

  - id: "JH-MET-027"
    titulo: "Execucao do Launch Plan (Processo 14 Dias)"
    descricao: "Processo completo de lancamento: Days 1-3: resumo executivo, mapeamento de produto, tier de clientes. Days 4-7: analise de concorrentes, revisao de funil, baseline. Days 8-10: projecoes GERU, estrategia criativa, scripts. Days 11-13: rollout de campanha, configuracao de audiencia, UTM. Day 14: riscos, needle movers, metas mensais. Pos-lancamento: pulse semanal, sessoes mensais de needle mover."
    peso: 0.94
    chunks: ["CA-0013"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Onboarding de clientes, lancamentos de campanha"
    rating: "★★★★★"

  - id: "JH-MET-028"
    titulo: "Processo de Teste e Scale de Conceito"
    descricao: "Processo em etapas: (1) Definir CPA target e calcular budget por conceito (3.5-4x CPA). (2) Lancar conceitos em ABO com 1% LAL de melhores clientes. (3) Rodar por 7 dias. (4) Definir winner: CPA dentro do target. (5) Calcular win rate (target: 20%). (6) Promover winners para CBO. (7) Medir winners no scale (target: 50%). (8) Criar variacoes dos scale winners."
    peso: 0.93
    chunks: ["CA-0013"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Teste criativo, media buying, scaling"
    rating: "★★★★★"

  - id: "JH-MET-029"
    titulo: "Metodo de Documentacao de Baseline"
    descricao: "Documentar baseline antes de qualquer otimizacao: (1) Capturar metricas atuais (CPC, CVR, CPA, ROAS, AOV), (2) Gravar Loom como prova do baseline, (3) Documentar fonte dos dados, (4) Criar projecoes GERU com pior/medio/melhor, (5) Apresentar ao cliente para alinhamento, (6) Usar como referencia para medir progresso. Sem baseline = sem prova de melhoria."
    peso: 0.91
    chunks: ["CA-0013"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Relatorios de clientes, otimizacao de campanha"
    rating: "★★★★★"

  - id: "JH-MET-030"
    titulo: "Sessao Mensal de Needle Mover"
    descricao: "Sessao mensal de priorizacao: (1) Definir hipotese com racional, (2) Identificar metrica especifica, (3) Documentar baseline com Loom, (4) Projetar nova metrica, (5) Calcular impacto financeiro, (6) Estimar horas para completar, (7) Avaliar riscos, (8) ICE scoring, (9) Alocar capital. Tambem avalia capacidade estrategica da equipe."
    peso: 0.90
    chunks: ["CA-0013"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Estrategia de agencia, otimizacao de clientes, desenvolvimento de equipe"
    rating: "★★★★★"

  - id: "JH-MET-031"
    titulo: "Protocolo de Mitigacao de Riscos"
    descricao: "Protocolo para identificar e mitigar riscos em lancamentos: (1) Listar top 5 riscos por probabilidade x impacto, (2) Para cada risco: categorizar, atribuir owner, definir indicador, avaliar impacto financeiro, (3) Criar estrategia de mitigacao com deadline, (4) Debrief mensal. Forca o time a pensar estrategicamente."
    peso: 0.89
    chunks: ["CA-0013"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Lancamentos de campanha, gestao de riscos, treinamento de equipe"
    rating: "★★★★"

  - id: "JH-MET-032"
    titulo: "Ascensao Low-Ticket para Backend"
    descricao: "Metodologia para escalar via low-ticket front-end: (1) Front-end $29-$97, (2) Bump offer recorrente ($47/mes), (3) OTOs sequenciais, (4) Medir liquidation e AOV ao longo de day 1/60/90, (5) Nurture compradores para book calls, (6) Backend high-ticket ($8-25K), (7) Track TCV ROAS separadamente. Case Freedom Funders: perda no front-end transformou em $38K/mes de lucro via backend."
    peso: 0.91
    chunks: ["CA-0012"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Arquitetura de funil, design de oferta, scaling de receita"
    rating: "★★★★★"

  - id: "JH-MET-033"
    titulo: "Execucao do Pitch de Video de 60 Segundos"
    descricao: "Execucao do pitch de 60 segundos: (1) Pesquisar perfil 30-60seg, (2) Gravar vertical no celular, (3) Seguir 6 steps: agreement, qualifying agreement, crisis state, why/how/who, solucao, CTA com 2 opcoes, (4) Enviar via DM no Instagram/Facebook, (5) Usar Iconosquare para encontrar leads, (6) Meta: 100 videos em 2 horas, (7) Usar como cold outreach, warm follow-up, ou pos-pitch."
    peso: 0.90
    chunks: ["PCVP-0001"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Prospecao de agencia, cold outreach, scaling de vendas"
    rating: "★★★★★"

  - id: "JH-MET-034"
    titulo: "Producao do Pitch de Video Frio Completo"
    descricao: "Producao do pitch de video frio (7-12 min): (1) Pesquisar prospect profundamente, (2) Preparar todos os materiais pre-abertos em tabs, (3) Usar Camtasia (nao Loom) para mover webcam, (4) Imprimir foto do prospect, (5) Abrir com alinhamento cultural, (6) Credenciais em bullet format rapido, (7) Transicao instantanea para PowerPoint, (8) Demo ao vivo no ads manager, (9) Mencionar preco upfront, (10) Empoderar para fazer sozinho."
    peso: 0.91
    chunks: ["PCVP-0002"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Vendas B2B high-ticket, aquisicao de agencia"
    rating: "★★★★★"

  - id: "JH-MET-035"
    titulo: "Metodologia de Teste A/B de Thumbnails"
    descricao: "Teste sistematico de thumbnails: (1) Criar 3-5 visual hooks diferentes, (2) Parear cada hook com thumbnail correspondente, (3) Manter mesmo text hook em todas variacoes, (4) Rodar como Dynamic Creative Tests com budgets baixos, (5) Analisar engagement velocity, (6) Escalar winner, (7) Medir CTR + AVD, (8) Flash test: mostrar 1 segundo a alguem e perguntar sobre o que e."
    peso: 0.87
    chunks: ["CA-0016"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "YouTube ads, Facebook ads, otimizacao criativa"
    rating: "★★★★"

  - id: "JH-MET-036"
    titulo: "Metodo de Comunicacao Adaptado Para Demograficos Tradicionais"
    descricao: "Adaptar comunicacao de pitch para prospects menos digitalmente savvy: (1) Identificar nivel digital (se nao esta no Google, provavelmente nao e digital-savvy), (2) NAO dizer 'link na descricao', (3) Verbalizar TODAS as informacoes de contato no video, (4) Repetir numero de telefone 2-3 vezes, devagar, (5) Falar mais devagar, (6) Dar tempo para anotar, (7) Reiterar informacoes simples."
    peso: 0.86
    chunks: ["PCVP-0009"]
    fontes: ["CA-NEW-ELEMENTS"]
    aplicacao: "Negocios tradicionais, marketing local, demograficos mais velhos"
    rating: "★★★★"



# Sintese narrativa
sintese_narrativa: |
  Jeremy Haynes defende recurring high-ticket sobre transactional. Mas so funciona
  se voce entregar valor que exceda o preco a cada ciclo de 30 dias.

  Fair Pricing nao e sobre cobrar o maximo possivel. E sobre criar uma troca onde
  ambas as partes reconhecem que o valor excede o custo.

  Sua jornada de $1,500 para $10,000/mes mostra: pricing e reflexo da certeza do
  seu sistema. Subir preco conforme certeza aumenta.

  Call funnels sao os mais previsiveis. TypeForm + Calendly integrado = 99% booking
  vs 50% se separados. Hammer Strategy (12 emails + 4 texts + content ads) = 50-80%
  show rate.


    descricao: "Antes de qualquer investimento ou decisao de negocios, calcule e mitigue o downside primeiro. Se voce sabe o pior cenario e consegue viver com ele, a decisao se torna muito mais clara."
    peso: 0.92
    citacao: "One of the big things that I think has helped me be successful in life is I always look at my downside. Okay, so what is my downside on anything?"
    aplicacao: "Decisoes de investimento, contratacao, lancamento de campanhas, scaling"
    fonte: "[CA-0011] 2 - CHERRINGTON MEDIA LAUNCH PLAN.txt"

  - id: "JH-FIL-032"
    titulo: "Documentation Over Memory"
    descricao: "Documentar todos os processos operacionais e criar sistemas escritos para duplicacao rapida de skills. Quando nao se documenta, cria-se um caos que leva muito tempo para resolver."
    peso: 0.90
    citacao: "I document and I record all my operational processes so I can give them out to my staff to have easy duplicated skills rapidly picked up by the rest of my team."

  # ═══════════════════════════════════════════════════════════════
  # 30-DAY CHALLENGE (30DC) - Merged 2026-03-03
  # ═══════════════════════════════════════════════════════════════
  - id: "JH-FIL-023"
    titulo: "100 Per Day Is Discipline Not Goal"
    descricao: "Hitting 100 outreach communications per day is not a goal to aspire to - it is a non-negotiable discipline. Goals can be missed; disciplines cannot. Anything below 100 is an F grade. 99 is failure. Only 100 is acceptable."
    peso: 0.95
    citacao: "It's a discipline. It's not a goal. Hit a 100 per day. Do not come to your teacher and say something like, 'Oh, hey Jeremy. I hit like 70 the other day.' Cool. You got a C, C minus."
    aplicacao: "Daily outreach volume, sales team accountability, personal standards"
    fonte: "[30DC-0016] 16 - DAY 16..txt"

  - id: "JH-FIL-024"
    titulo: "Data Machine Identity"
    descricao: "A salesperson must see themselves as a data machine - constantly acquiring, analyzing, and leveraging data about prospects. Every interaction, every website visit, every social media check is data acquisition. This data becomes your weapon, your conversation starter, and your credibility."
    peso: 0.90
    citacao: "Figure all this stuff out. Get the data because as you acquire data, you get a heightened viewpoint on all this stuff. You're a data machine."
    aplicacao: "Prospect research, outreach personalization, building credibility"
    fonte: "[30DC-0005] 5 - DAY 5.txt"

  - id: "JH-FIL-025"
    titulo: "Don't Disrespect The Mentor"
    descricao: "Not executing on what you've been taught is the ultimate form of disrespect to the mentor. If you have access to proven systems and processes and still don't hit your numbers, you are demonstrating that you don't value the knowledge."
    peso: 0.85
    citacao: "Don't disrespect the mentor. It's the number one way to show me that you don't give a fuck about what it is that I'm talking about by not actually hitting 100 per day."
    aplicacao: "Coaching accountability, student commitment, mentorship programs"
    fonte: "[30DC-0016] 16 - DAY 16..txt"

  - id: "JH-FIL-026"
    titulo: "Vital Lies Blind Spots"
    descricao: "From the book 'Vital Lies, Simple Truths' - humans create psychological blind spots around painful experiences. After experiencing pain, the mind buries and almost erases the memory, creating solidified beliefs about why to avoid that thing. Salespeople use these self-created blind spots as justifications for not hitting numbers."
    peso: 0.85
    citacao: "Vitalizing simple truths will show you from a psychological perspective that there's blind spots within our memory. If we go through something and we experience any kind of pain through it, our own psychology will not only bury it, it will almost erase it."
    aplicacao: "Overcoming sales call reluctance, eliminating excuses, self-awareness"
    fonte: "[30DC-0004] 4 - DAY 4..txt"

  - id: "JH-FIL-027"
    titulo: "Human To Human (H2H)"
    descricao: "Sales is not B2B or B2C - it's H2H: Human to Human. Every communication cycle is between two people. Humor, authenticity, and genuine care must be present in follow-up. Don't let prospects think you're just trying to monger their money."
    peso: 0.88
    citacao: "It's not B2B. It's not B TO C. It's H2H. It's human to human. You're trying to have fun. Don't just let these other people think you're going to monger them and try to take money from them."
    aplicacao: "Follow-up strategy, prospect communication, relationship building"
    fonte: "[30DC-0020] 20 - DAY 20..txt"

  - id: "JH-FIL-028"
    titulo: "Comfortability Is The Enemy"
    descricao: "Once you start cashing out and getting results, comfort becomes your biggest threat. The moment you feel comfortable, your output drops. Sustained high performance requires fighting the natural tendency to ease off after wins."
    peso: 0.88
    citacao: "If you've already cashed out a little bit from the 30-day challenge... you will need to know comfortability is your enemy."
    aplicacao: "Post-close motivation, scaling behavior, avoiding plateaus"
    fonte: "[30DC-0022] 22 - DAY 22..txt"

  - id: "JH-FIL-029"
    titulo: "Attention Is The Base Of Everything"
    descricao: "Every business in history is built on attention. Without attention, nothing else works. Even the attention of one person could get you to a billion dollars. Attention is the base of the pricing pyramid - the widest layer where the most people can occupy."
    peso: 0.90
    citacao: "Any business in the entirety of any business ever is built on attention. Meaning you literally cannot go up in life at all whatsoever in a business without attention."
    aplicacao: "Business fundamentals, pricing strategy, lead generation priority"
    fonte: "[30DC-0013] 13- DAY 13..txt"

  - id: "JH-FIL-030"
    titulo: "Multi-Purpose Action Efficiency"
    descricao: "Never do anything for just one reason. Every action should serve multiple purposes simultaneously. A 'Steps to Result' document serves internal staff, external clients, AND outsourcing partners. This multiplied utility is itself an efficiency."
    peso: 0.85
    citacao: "I don't just do things for one reason because that's an efficiency in itself. I do things for multiple reasons because you have to have a multi-purpose action."
    aplicacao: "Process design, asset creation, operational efficiency"
    fonte: "[30DC-0015] 15 - DAY 15.txt"


    fonte: "[PCVP-0001] 1. POWER OF COLD VIDEO..txt"

  - id: "JH-FIL-033"
    titulo: "Objectivity Over Subjectivity in Management"
    descricao: "Tudo em gestao deve ser objetivo, nao subjetivo. Sem metricas claras e KPIs definidos, voce nao consegue dizer a alguem se esta fazendo um bom trabalho ou nao."
    peso: 0.91
    citacao: "I'm a very big proponent on everything being objective from a management standpoint and then from a tracking standpoint."
    aplicacao: "Gestao de equipe, avaliacao de performance, media buying"
    fonte: "[CA-0013] 4. DEEP DIVE - LAUNCH PLAN TEMPLATE.txt"

  - id: "JH-FIL-034"
    titulo: "Strategy Over Tactics in Marketing"
    descricao: "Nao e necessariamente media buying que vai ser o maior needle mover. Entender os metrics, saber quais alavancas puxar, e ter visao estrategica importa mais do que ser o melhor executante tatico."
    peso: 0.88
    citacao: "When I first got started, I wasn't that great of a marketer. But I understood the metrics, I understood what levers to pull."
    aplicacao: "Media buying, planejamento de campanhas, crescimento de agencia"
    fonte: "[CA-0013] 4. DEEP DIVE - LAUNCH PLAN TEMPLATE.txt"

  - id: "JH-FIL-035"
    titulo: "Thumbnails Are Psychological Assets"
    descricao: "Thumbnails nao sao decoracao ou afterthought. Sao ativos psicologicos estrategicos que determinam se o trabalho duro de criar conteudo vai realmente chegar a uma audiencia."
    peso: 0.85
    citacao: "Thumbnails are not decorations - they're psychological triggers designed to interrupt patterns and create irresistible curiosity."
    aplicacao: "Creative strategy, YouTube ads, Facebook ads, organic content"
    fonte: "[CA-0016] 2. THUMBNAIL PSYCHOLOGY GUIDE.txt"

  - id: "JH-FIL-036"
    titulo: "Show Don't Tell in Sales"
    descricao: "Em pitches de venda, demonstrar visualmente o processo e muito mais poderoso do que apenas falar sobre ele. Ter tudo preparado e aberto, fazer transicoes rapidas entre tabs, e mostrar resultados reais na tela cria mais credibilidade do que qualquer claim verbal."
    peso: 0.89
    citacao: "Everything that I'm showing I'm making sure that I show and visually demonstrate rather than just talk about it."
    aplicacao: "Cold video pitches, sales presentations, client onboarding"
    fonte: "[PCVP-0002] 2. SELLING ADVERTISING..txt"

  - id: "JH-FIL-037"
    titulo: "Empower Before You Sell"
    descricao: "Antes de vender seu servico, empodere o prospect mostrando que ele pode fazer sozinho. Quando voce diz 'seu time pode implementar isso', voce remove a barreira de resistencia e o prospect te ve como alguem que realmente quer ajudar."
    peso: 0.87
    citacao: "All this stuff that I'm going to talk about, Dan, you can do yourself. I'm empowering him and his team to be able to do this."
    aplicacao: "Cold outreach, video pitches, consultoria, agency sales"
    fonte: "[PCVP-0002] 2. SELLING ADVERTISING..txt"

  - id: "JH-FIL-038"
    titulo: "Ethical Clickability"
    descricao: "O objetivo de um bom creative/thumbnail nao e enganar alguem para clicar - e convidar alguem que genuinamente vai se beneficiar do conteudo. Curiosidade respeitosa, nao manipulacao."
    peso: 0.86
    citacao: "Your thumbnail's job is to identify people who will genuinely benefit from your content and make it irresistible for them to click."
    aplicacao: "Ad creative strategy, content marketing, thumbnail design"
    fonte: "[CA-0016] 2. THUMBNAIL PSYCHOLOGY GUIDE.txt"

  - id: "JH-FIL-039"
    titulo: "Underpromise, Overdeliver"
    descricao: "Sempre prometer MENOS do que voce sabe que pode entregar. Se o fornecedor garante 550+ canais de distribuicao, prometa 300-400 ao cliente. Quando voce excede expectativas, o cliente fica encantado e se torna evangelista."
    peso: 0.88
    citacao: "They guarantee 550 plus channels. What I would suggest doing is you tell the person, 'Hey, I'm going to get you on 300 to 400 channels.'"
    aplicacao: "Client management, service delivery, agency positioning, reselling"
    fonte: "[PCVP-0013] 13. PR SERVICES..txt"



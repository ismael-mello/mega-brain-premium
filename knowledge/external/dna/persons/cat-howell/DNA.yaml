      description: "Send Loom video on Facebook, Instagram, AND email simultaneously. Multi-channel increases reception."
      source: "INC2"
      domains: ["prospecting", "outreach"]

    - id: "HEUR-CH-076"
      name: "Penalty Fee for Late Briefing"
      description: "Include penalty clause for clients who don't complete onboarding briefing within one week."
      source: "INC2"
      domains: ["client-management"]

    - id: "HEUR-CH-077"
      name: "Push 50% Upfront Freelancer 100% Agency"
      description: "Freelancer: at least 50% upfront. Agency with production costs: push for 100% upfront."
      source: "INC2"
      domains: ["pricing", "client-management"]

    - id: "HEUR-CH-078"
      name: "100 Million Startups Per Year"
      description: "100 million startups launched per year globally — 3 every second. Most weak at sales/marketing. This is the agency opportunity."
      source: "INC2"
      domains: ["market-opportunity"]

    - id: "HEUR-CH-079"
      name: "At Least 50% Upfront for Retainer"
      description: "Get at least 50% of total contract value upfront. Use Proposify or Dubsado for contract-to-payment automation."
      source: "INC2"
      domains: ["client-management", "cash-flow"]

    - id: "HEUR-CH-080"
      name: "Relevance Score Under 7 = Problem"
      description: "If ad relevance score is under 7, add continuity between ad and funnel/landing page."
      source: "FBAA"
      domains: ["facebook-ads", "optimization"]

  # ═════════════════════════════════════════════════════════════════════════════
  # L4 FRAMEWORKS — Named structured methodologies
  # Total: 45 | Next ID: FW-CH-046
  # ═════════════════════════════════════════════════════════════════════════════

  L4_FRAMEWORKS:

    # --- FATC 3.0 (FW-CH-001 to FW-CH-016) ---

    - id: "FW-CH-001"
      name: "Rapid Fire Testing (RFT) Method"
      description: "3-round testing: Round 1 = test personas/audiences ($20/day, 3-4 days, dynamic creative). Round 2 = test hooks/offers (winning persona, lead ads). Round 3 = test creative/headlines/copy (conversion campaign). Total: $200-$500."
      source: "FATC"
      domains: ["testing", "facebook-ads"]

    - id: "FW-CH-002"
      name: "6-Step Copy Framework"
      description: "Six steps: (1) Brief and brand tone, (2) Profiling personas mapped to problems, (3) Indirect competition, (4) Product benefits/features, (5) Core problem/emotional experience, (6) Hooks and stitching in Problem-Solution-Product order."
      source: "FATC"
      domains: ["copywriting"]

    - id: "FW-CH-003"
      name: "TOF-MOF-BOF Funnel Framework"
      description: "Three-stage: Top of Funnel (cold -> awareness, content), Middle of Funnel (warm -> consideration, retarget), Bottom of Funnel (hot -> conversion, direct response with urgency)."
      source: "FATC"
      domains: ["funnels"]

    - id: "FW-CH-004"
      name: "Retargeting Stacks Framework"
      description: "Time-based retargeting stacks by recency: Day 1-5, Day 6-10, Day 11-20, Day 21-30. Each stack gets different creative. Exclude shorter windows from longer to prevent overlap."
      source: "FATC"
      domains: ["retargeting"]

    - id: "FW-CH-005"
      name: "Lead Gen Results Calculator"
      description: "Revenue target / client value = Clients needed. / Close rate (5-10%) = Leads needed. / LP conversion (20%) = Clicks needed. x CPC = Ad spend."
      source: "FATC"
      domains: ["lead-gen", "budget"]

    - id: "FW-CH-006"
      name: "High-Ticket Coaching Calculator"
      description: "Revenue / sale price = Sales needed. / Call conversion (20%) = Calls needed. / (1 - no-show 30%) = Bookings needed. x $150 avg cost = Ad spend."
      source: "FATC"
      domains: ["coaching", "budget"]

    - id: "FW-CH-007"
      name: "Ecom Results Calculator"
      description: "Revenue / AOV = Products to sell. / Website CVR (2-3%) = Clicks needed. x CPC ($1) = Ad spend. Target 3x ROAS, CPA at 30% of AOV."
      source: "FATC"
      domains: ["ecom", "budget"]

    - id: "FW-CH-008"
      name: "Traffic-Ready Audit Framework"
      description: "Client website audit: (1) Tracking/pixel, (2) Conversion rate, (3) Bounce/cart abandonment, (4) Traffic quality, (5) Lead goggles UX, (6) Page speed <5s, (7) Mobile, (8) FB compliance, (9) CTA visibility."
      source: "FATC"
      domains: ["agency", "audit"]

    - id: "FW-CH-009"
      name: "Four Ecom Funnel Types"
      description: "(1) MVF: Cold->Product->DPA. (2) Content warm: Cold->Video->Product->DPA. (3) Lead magnet: Cold->Offer->Product->DPA. (4) Full: Cold->Content->Lead Magnet->Product->DPA. Start with #1."
      source: "FATC"
      domains: ["ecom", "funnels"]

    - id: "FW-CH-010"
      name: "Persona Copy Sheet Framework"
      description: "Single research sheet per persona: (1) Persona definition, (2) Product features, (3) Indirect competition, (4) Benefits, (5) Core emotional problem, (6) Hooks. Generate hundreds of copy variations from one sheet."
      source: "FATC"
      domains: ["copywriting", "process"]

    - id: "FW-CH-011"
      name: "Headline Framework by Funnel Stage"
      description: "TOF: recap pain, tease beliefs/story/transformation. MOF: showcase claim, tease secret, cast doubt on alternatives. BOF: showcase product, urgency, testimonials, guarantee."
      source: "FATC"
      domains: ["copywriting", "headlines"]

    - id: "FW-CH-012"
      name: "Campaign Optimization Checkpoint"
      description: "Systematic: (1) Map stats at each funnel step vs KPIs, (2) Drill to ad level CPA, (3) Check budget distribution, (4) Segment by placement, (5) By country, (6) By age/gender. Duplicate winning segments."
      source: "FATC"
      domains: ["optimization"]

    - id: "FW-CH-013"
      name: "Q4 Ecom Strategy Framework"
      description: "Phase 2: Build momentum (Sept-mid Nov, audience building, test creative). Phase 3: Maximize sales (mid Nov-Dec 20, retarget only). Phase 4: Post-holiday (Jan, lowest CPMs, gift card buyers)."
      source: "FATC"
      domains: ["ecom", "seasonal"]

    - id: "FW-CH-014"
      name: "OCPM/CPM Selection Matrix"
      description: "Low CTR + Low CVR = CPM. Low CTR + Good CVR = Link Click optimization. Good CTR + Good CVR = OCPM. Pair with creative/targeting testing."
      source: "FATC"
      domains: ["optimization", "bidding"]

    - id: "FW-CH-015"
      name: "Social Proof Scaling Method"
      description: "After RFT, create singular ads (not dynamic) to build social proof. Use same ad ID across duplicated ad sets so all engagement consolidates."
      source: "FATC"
      domains: ["scaling", "social-proof"]

    - id: "FW-CH-016"
      name: "Brand Tone Word Bank"
      description: "Google doc compiling all client language from Instagram, Facebook, website, emails. Library of vocabulary and tone. Reduces revisions, enables writing in client's voice."
      source: "FATC"
      domains: ["copywriting", "agency"]

    # --- FB Ads Academy unique (FW-CH-017 to FW-CH-026) ---

    - id: "FW-CH-017"
      name: "4-Level Academy Progression"
      description: "Locked competency levels: Level 1 (FB Basics) -> Level 2 (Pricing/Auditing) -> Level 3 (Landing Clients) -> Level 4 (Mastermind). Must pass competency test to advance."
      source: "FBAA"
      domains: ["agency-building", "training"]

    - id: "FW-CH-018"
      name: "Five Pricing Models"
      description: "(1) Agency Model (% ad spend), (2) Performance Based (% revenue), (3) Retainer (flat monthly), (4) Bulk Buy (per-lead), (5) Hybrid. Each suited to different funnel types."
      source: "FBAA"
      domains: ["pricing"]

    - id: "FW-CH-019"
      name: "Eight Loop Service Document"
      description: "Master pricing doc: every service, time estimate, internal cost, client cost range. Enables BizDev to price independently."
      source: "FBAA"
      domains: ["pricing", "agency-building"]

    - id: "FW-CH-020"
      name: "Client Audit Checklist"
      description: "Audit: website, stock/scalability, messaging, systems, content library, response time, sales skills, goals. Mystery-shop clients."
      source: "FBAA"
      domains: ["auditing", "client-management"]

    - id: "FW-CH-021"
      name: "Seven Lead Gen Funnels"
      description: "(1) Performance Based, (2) Audit Funnel, (3) Straight Up, (4) The Game, (5) Download, (6) Trust Builder, (7) Bot Funnel."
      source: "FBAA"
      domains: ["funnels", "client-acquisition"]

    - id: "FW-CH-022"
      name: "Two-Call Sales Script"
      description: "Call 1: Rapport -> Frame -> Easy question -> Problem -> Goals -> Commitment -> BM access -> NDA. Call 2: Rapport -> Recap -> Audit -> Solution -> Stack -> Pitch -> Deposit."
      source: "FBAA"
      domains: ["sales", "client-acquisition"]

    - id: "FW-CH-023"
      name: "7-Step Client Onboarding"
      description: "(1) First Call, (2) Audit, (3) Price, (4) Pitch & Win, (5) Welcome Email, (6) Contract + Invoice + Briefing, (7) Scoping + Kickoff Call. Never start before payment + signed contract."
      source: "FBAA"
      domains: ["onboarding", "client-management"]

    - id: "FW-CH-024"
      name: "4P Creative Framework"
      description: "Test 4 ad formats: (1) Single Image, (2) Carousel (dynamic), (3) Video, (4) Product/Lifestyle variant. Themes: Unboxing, UGC, Product Shot, Lifestyle."
      source: "FBAA"
      domains: ["creative", "ecom"]

    - id: "FW-CH-025"
      name: "Three Lucrative Verticals"
      description: "Top 3 niches: (1) Online Coaches (most scalable), (2) E-Commerce (scalable but hard), (3) Lead Gen (easy but less scalable). Avoid realtors and dentists."
      source: "FBAA"
      domains: ["niches", "agency-building"]

    - id: "FW-CH-026"
      name: "Agency Foundations Checklist"
      description: "Pre-launch: P&L, FB page with backdated content, Service doc, PM tool, Reporting tool, Invoicing, CRM, Payment gateway (bank transfer preferred)."
      source: "FBAA"
      domains: ["agency-building", "operations"]

    # --- Incubator 2.0 (FW-CH-027 to FW-CH-045) ---

    - id: "FW-CH-027"
      name: "Two-Part Niche Framework"
      description: "A niche = (1) The specific service/process + (2) The specific avatar/industry. Both must be granular. Example: retargeting sequences for e-commerce brands."
      source: "INC2"
      domains: ["agency-positioning", "specialization"]

    - id: "FW-CH-028"
      name: "Service Document Architecture"
      description: "SERVICE -> WHAT'S INCLUDED -> INTERNAL COST (hours x rate) -> CLIENT COST (internal / 0.25 margin). Includes individual services, packages, performance-based."
      source: "INC2"
      domains: ["pricing", "operations"]

    - id: "FW-CH-029"
      name: "Core Solution Messaging Framework"
      description: "Three questions: (1) What's included? [Features] (2) What do they result in? [Outcomes] (3) What problems do they solve? [Core Solution]. Pitch: I help [avatar] to [solution] by [outcomes] through [service]."
      source: "INC2"
      domains: ["messaging", "positioning"]

    - id: "FW-CH-030"
      name: "Three-Hook Funnel Architecture"
      description: "Three front-end hooks: (1) Lead Magnet, (2) Case Study/Straight Hook, (3) 14-Day Trial. Back-end: Buffer form -> Conditional logic -> Calendar -> Confirmation."
      source: "INC2"
      domains: ["funnel-building"]

    - id: "FW-CH-031"
      name: "14-Day Trial Funnel"
      description: "Landing page: Headline (timeframe + avatar) -> Pitch -> No long-term contracts -> Problem storytelling -> Solution -> Outcomes -> Services -> About -> Avatars -> Disclaimer -> CTA."
      source: "INC2"
      domains: ["funnel-building"]

    - id: "FW-CH-032"
      name: "Authority Trinity"
      description: "Three most effective authority builders: (1) Getting published on third-party websites, (2) Speaking engagements, (3) Awards from industry associations."
      source: "INC2"
      domains: ["authority-building", "branding"]

    - id: "FW-CH-033"
      name: "Case Study Formula"
      description: "Three questions: (1) Where were you before? (2) Why did you reach out / what were you nervous about? (3) What specific results? Always push for a NUMBER."
      source: "INC2"
      domains: ["case-studies", "sales"]

    - id: "FW-CH-034"
      name: "Loom Video Prospecting System"
      description: "8 steps: (1) Find prospect, (2) Find owner, (3) Audit assets, (4) Record Loom value video (no pitch), (5) Find email, (6) Write value-first email, (7) Send on 3 platforms, (8) Follow up for call."
      source: "INC2"
      domains: ["prospecting", "outreach"]

    - id: "FW-CH-035"
      name: "LinkedIn Three-Pillar System"
      description: "Pillar 1: Profile optimization (headline = ad headline). Pillar 2: Search and connect with prospects. Pillar 3: Nurture connections through message sequence."
      source: "INC2"
      domains: ["prospecting", "linkedin"]

    - id: "FW-CH-036"
      name: "LinkedIn Nurture Sequence System"
      description: "Weekly batches of 50. Message cadence: deposits (value) and withdrawals (asks). Track: batch date, sent, accepted, conversion rate."
      source: "INC2"
      domains: ["prospecting", "linkedin"]

    - id: "FW-CH-037"
      name: "Strategic Partnership Pipeline"
      description: "Identify businesses serving same audience -> Offer free services -> Reciprocity drives referrals -> Structure kickback agreements."
      source: "INC2"
      domains: ["prospecting", "partnerships"]

    - id: "FW-CH-038"
      name: "Case Study Landing Page Template"
      description: "Structure: Juicy headline with numbers -> Product image -> Problem -> Solution + screenshots -> Evidence -> Services -> Core message -> CTA. Plain white background."
      source: "INC2"
      domains: ["case-studies", "funnel-building"]

    - id: "FW-CH-039"
      name: "Pitch Deck Architecture"
      description: "Sections: What we do -> Who we are -> Messaging -> Why choose us -> Testimonials -> Results -> Services -> Process -> Team."
      source: "INC2"
      domains: ["sales", "authority-building"]

    - id: "FW-CH-040"
      name: "Website Bare Essentials"
      description: "Three minimum sections: (1) About/elevator pitch, (2) Work/Case Studies, (3) Contact form. Must have: Schema, Pixel, GA, favicon, metadata."
      source: "INC2"
      domains: ["branding", "online-presence"]

    - id: "FW-CH-041"
      name: "Google Drive Process Documentation"
      description: "Main folder -> Numbered step subfolders -> Google Doc with written steps + video walkthrough. Record yourself implementing in real-time."
      source: "INC2"
      domains: ["operations", "process-building"]

    - id: "FW-CH-042"
      name: "Performance-Based Pricing Formula"
      description: "Only for validated funnels. Step 1: Identify minimum internal cost. Step 2: Calculate required CPL or revenue cut. Ensures minimum margin protection."
      source: "INC2"
      domains: ["pricing"]

    - id: "FW-CH-043"
      name: "Contract-to-Payment Automation"
      description: "Use Proposify/Dubsado — signature triggers automatic payment portal. Or no-signature: acceptance deemed upon payment to nominated account."
      source: "INC2"
      domains: ["client-management", "operations"]

    - id: "FW-CH-044"
      name: "Messaging Document Template"
      description: "8 fields: Name, Core Competence, Core Solution, Features, Personas, Wants/Needs, Core Desire, Proof. Plus content pillars grid: Affinity/Awareness/Authority."
      source: "INC2"
      domains: ["messaging", "content-marketing"]

    - id: "FW-CH-045"
      name: "Referral Program Structure"
      description: "$1,200 off or 20% per referral, 3-month sunset clause, $3-5K minimum invoice. Ask for testimonials FIRST, then introduce referral program."
      source: "FBAA"
      domains: ["client-retention", "referrals"]

  # ═════════════════════════════════════════════════════════════════════════════
  # L5 METHODOLOGIES — Step-by-step processes
  # Total: 29 | Next ID: MET-CH-030
  # ═════════════════════════════════════════════════════════════════════════════

  L5_METHODOLOGIES:

    # --- FATC 3.0 (MET-CH-001 to MET-CH-010) ---

    - id: "MET-CH-001"
      name: "RFT Round 1: Persona Validation"
      description: "Create conversion campaign CBO $20/day. Ad set per persona with dynamic creative. 2-3 targeting options per persona. Same images, isolate copy. Run 3-4 days. Identify winning persona by CPA."
      source: "FATC"
      domains: ["testing"]

    - id: "MET-CH-002"
      name: "RFT Round 2: Hook/Offer Validation"
      description: "Take winning persona. Lead ad campaign. Same image, test 3-4 headlines/hooks. Same targeting. 500 reach minimum per ad. Pause winners day 2 to give others budget. Identify winning hook by CPL."
      source: "FATC"
      domains: ["testing"]

    - id: "MET-CH-003"
      name: "RFT Round 3: Creative Optimization"
      description: "Conversion campaign $50/day CBO. Winning targeting + copy. Test 10 images (dynamic creative). Then 5 headlines. Then copy variations. Build MVP funnel during this round."
      source: "FATC"
      domains: ["testing", "creative-testing"]

    - id: "MET-CH-004"
      name: "Ad Account Funnel Diagnosis Process"
      description: "Check TOF video costs -> Check MOF LP conversion -> If >20% LP is fine -> Check CTR (1% cold, 2% retarget) -> Check BOF stalling (switch to impressions) -> Pull custom events for full-funnel revenue."
      source: "FATC"
      domains: ["analytics", "optimization"]

    - id: "MET-CH-005"
      name: "Retargeting Stack Setup Process"
      description: "Map funnel in Lucidchart -> Create audiences for time windows (5/10/15/30 days) -> Purchase exclusion -> Exclude shorter from longer windows -> Exclude BOF from MOF -> Different creative per stack."
      source: "FATC"
      domains: ["retargeting"]

    - id: "MET-CH-006"
      name: "Horizontal Scaling Execution"
      description: "Identify winning ad set -> Duplicate 4-5x -> Change ONE variable per duplicate (bid/placement/country) -> Launch simultaneously -> Check within 12 hours -> Kill exceeding CPA."
      source: "FATC"
      domains: ["scaling"]

    - id: "MET-CH-007"
      name: "Client Onboarding Audit Process"
      description: "Get analyst access -> Check pixel/events -> Calculate CVR -> Check cart abandonment (68%) -> Bounce rate (30%) -> PageSpeed (<5s) -> Mobile -> FB Debugger -> Lead goggles -> Document all before quoting."
      source: "FATC"
      domains: ["agency", "audit"]

    - id: "MET-CH-008"
      name: "Copy Research and Persona Mapping"
      description: "Get brief -> Discuss personas -> ID rational vs emotional value -> Collect proof -> Map competition -> Research via Amazon/Quora/Reddit/FB groups -> Fill copy worksheet -> Write direct AND indirect -> RFT to validate."
      source: "FATC"
      domains: ["copywriting", "research"]

    - id: "MET-CH-009"
      name: "Full Funnel Build Process Lead Gen"
      description: "Build opt-in -> Sales page -> Qualifying page with conditional logic -> Book-a-call page -> Thank-you page -> 6-email nurture -> Pixel events per page -> Retargeting per drop-off."
      source: "FATC"
      domains: ["funnels", "lead-gen"]

    - id: "MET-CH-010"
      name: "Attribution Window Analysis"
      description: "Reporting -> Customize columns -> Change attribution windows (1/7/28 day) -> Compare view vs click -> Short conversion = impulse -> Long = nurture needed -> Determines email length and retarget duration."
      source: "FATC"
      domains: ["analytics"]

    # --- FB Ads Academy unique (MET-CH-011 to MET-CH-016) ---

    - id: "MET-CH-011"
      name: "Ad Account Audit Process"
      description: "10 steps: Request access -> Check Pixel/events -> Check custom conversions -> Check audiences -> Pull event columns -> Breakdown by placement/age/gender/country -> Check CTR/CPC/CPM/relevance -> Schema/Debugger -> PageSpeed -> Mystery-shop funnel."
      source: "FBAA"
      domains: ["auditing"]

    - id: "MET-CH-012"
      name: "Backwards Ad Spend Calculator"
      description: "Define target conversions -> Divide by LP CVR = clicks needed -> Divide by CTR = reach needed -> Multiply by CPC/CPM = ad spend. Example: 400 purchases / 0.05 = 8,000 hits / 0.03 = 266K reach x $0.07 = $18,666."
      source: "FBAA"
      domains: ["auditing", "ad-spend"]

    - id: "MET-CH-013"
      name: "Performance-Based Funnel Build"
      description: "FB ad with performance hook -> Squeeze page -> Schedule Once with SMS -> Confirmation page with WuFoo screening -> Custom conversion on confirmation URL -> Pixel on all pages -> Exclusion audiences."
      source: "FBAA"
      domains: ["funnels", "client-acquisition"]

    - id: "MET-CH-014"
      name: "Client Onboarding 7-Step SOP"
      description: "BizDev first call + CRM -> Specialist audits + Google Drive -> BizDev prices from service doc -> Second call pitch + deposit -> Handover email CC AM -> AM sends contract/invoice/briefing -> Scoping + kickoff."
      source: "FBAA"
      domains: ["onboarding", "client-management"]

    - id: "MET-CH-015"
      name: "Service Document Construction"
      description: "List services -> Define what's included + time estimate -> Hours x internal rate = internal cost -> Add 30% margin = client cost -> Create packages -> Train BizDev to price independently."
      source: "FBAA"
      domains: ["pricing", "agency-building"]

    - id: "MET-CH-016"
      name: "Objection Handling Scripts"
      description: "I thought performance-based: explain validated funnel requirement. Too expensive: long-term value reframe. Guarantee: anyone who promises is full of BS. Let me think: 48hr discounted deadline."
      source: "FBAA"
      domains: ["sales", "client-acquisition"]

    # --- Incubator 2.0 (MET-CH-017 to MET-CH-029) ---

    - id: "MET-CH-017"
      name: "Niche Selection Process 6 Steps"
      description: "ID core competence -> Break into granular sub-services -> Circle strongest -> ID which avatars had success -> Break into sub-avatars -> Combine: [granular service] for [granular avatar]."
      source: "INC2"
      domains: ["agency-positioning", "specialization"]

    - id: "MET-CH-018"
      name: "Service Processing Methodology"
      description: "List all delivery steps -> ID roles per step -> Record yourself implementing -> Time each step -> Calculate hours -> Store in Google Drive -> Train team with videos -> Assess with quiz."
      source: "INC2"
      domains: ["operations", "process-building"]

    - id: "MET-CH-019"
      name: "Service Document Pricing Calculation"
      description: "List services -> What's included -> Who delivers -> Time track -> Hours x rate = internal cost -> Divide by 0.25 COGS = client price -> Bundle packages -> Use in contracts for scope."
      source: "INC2"
      domains: ["pricing", "operations"]

    - id: "MET-CH-020"
      name: "Core Solution Messaging Development"
      description: "Pick one service -> Brain dump features -> Ask what does this result in? [Outcomes] -> What problem does this solve? [Problems] -> Flip into core solution -> Construct pitch. Allow 1-2 hours."
      source: "INC2"
      domains: ["messaging", "positioning"]

    - id: "MET-CH-021"
      name: "Loom Video Prospecting Sequence"
      description: "Find prospect -> Find owner -> Audit assets/ads/website -> Record Loom (introduce, reference recent, state coverage, mention what you do, aggravate problems, present solution) -> Find email -> Value-first email -> Send on 3 platforms -> Follow up."
      source: "INC2"
      domains: ["prospecting", "outreach"]

    - id: "MET-CH-022"
      name: "Client Onboarding 6-Step Process"
      description: "Send contract + invoice (Proposify/Dubsado) -> Create client Google Drive folder -> Send onboarding email with briefing doc -> Reassess deliverables -> Scope project -> Kickoff call."
      source: "INC2"
      domains: ["client-management", "operations"]

    - id: "MET-CH-023"
      name: "Case Study Collection Process"
      description: "During pitch: ID case study potential -> Offer performance pricing -> $500 discount for testimonial. During service: Track results. Collection: 3 questions (before/why/results). Push for numbers. Leverage: standalone landing page."
      source: "INC2"
      domains: ["case-studies", "sales"]

    - id: "MET-CH-024"
      name: "Getting Published Strategy"
      description: "ID software providers targeting your niche -> Find active blogs -> Write niche case study/listicle -> Reach out with exclusive article -> Get published -> FB ads to drive traffic -> Capture leads."
      source: "INC2"
      domains: ["authority-building", "prospecting"]

    - id: "MET-CH-025"
      name: "Rapid Fire Testing Validation"
      description: "Map 2+ personas on spreadsheet -> Core problem/desire per persona -> 3+ ad copies -> FB Messenger campaign with CBO -> 3 targeting options per persona -> $50-100 -> Compare cost per message -> Pick winner."
      source: "INC2"
      domains: ["validation", "niche-selection"]

    - id: "MET-CH-026"
      name: "LinkedIn Prospecting System"
      description: "Optimize profile headline -> Sales Navigator searches -> 50 connections/day -> Weekly nurture batches -> Deposit/withdrawal message cadence -> Track in spreadsheet -> Post content -> Pull out when call booked."
      source: "INC2"
      domains: ["prospecting", "linkedin"]

    - id: "MET-CH-027"
      name: "Strategic Partnership Development"
      description: "ID businesses serving same audience -> List connectors -> Soft outreach -> Offer free services -> Deliver exceptional -> Reciprocity generates referrals -> Structure kickback ($500/$2K). Timeline: 6-12 months."
      source: "INC2"
      domains: ["prospecting", "partnerships"]

    - id: "MET-CH-028"
      name: "Agency Funnel Build Process"
      description: "Build buffer form with conditional logic -> Calendar landing page -> Confirmation with tracking. Choose hook (lead magnet/case study/14-day trial) -> Build LP with messaging framework -> Install pixel/schema/GA -> Test mobile+desktop -> Launch -> Troubleshoot 4-9 weeks."
      source: "INC2"
      domains: ["funnel-building"]

    - id: "MET-CH-029"
      name: "Niche-to-Empire Expansion Methodology"
      description: "Pick granular niche -> Process service -> Build team -> Sell and refine -> Once runs without you, repeat for next niche -> Build audiences with content -> Sell process as course. Each expansion uses same avatar."
      source: "INC2"
      domains: ["agency-scaling", "business-model"]

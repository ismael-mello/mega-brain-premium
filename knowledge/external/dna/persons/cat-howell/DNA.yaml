    - id: "HEUR-CH-050"
      name: "$50-$100 Per Ad Set Testing"
      description: "Be willing to spend $50-$100 per ad set in the beginning for testing funnels."
      source: "FBAA"
      domains: ["facebook-ads", "testing"]

    - id: "HEUR-CH-051"
      name: "SMS Reminders Halve No-Shows"
      description: "Having SMS reminders halved no-show rate. Always enable 24hr + 1hr SMS reminders on booking calendars."
      source: "FBAA"
      domains: ["funnels", "client-acquisition"]

    - id: "HEUR-CH-052"
      name: "4-Day Max Booking Window"
      description: "Don't let leads book out more than 4 days ahead. Longer windows increase no-show rates."
      source: "FBAA"
      domains: ["funnels", "client-acquisition"]

    - id: "HEUR-CH-053"
      name: "Alt Codes Increase CTR 0.5%"
      description: "Using alt codes (stars, symbols) in ad copy increases click-through rates by approximately 0.5%."
      source: "FBAA"
      domains: ["facebook-ads", "creative"]

    - id: "HEUR-CH-054"
      name: "First 2 Weeks Daily Client Updates"
      description: "First two weeks of onboarding, email client every single day with an update. Builds tolerance for later campaign fluctuations."
      source: "FBAA"
      domains: ["client-management", "onboarding"]

    - id: "HEUR-CH-055"
      name: "$7-50 Cost Per Agency Lead"
      description: "Agency lead gen funnels produce leads at $7-$50 per lead depending on funnel."
      source: "FBAA"
      domains: ["agency-building", "lead-gen"]

    - id: "HEUR-CH-056"
      name: "10-20% Close Rate On Cold Calls"
      description: "Agency close rate on cold leads is 10-20%. At 10% and $10/lead, cost to acquire a $5-10K client is ~$100."
      source: "FBAA"
      domains: ["sales", "agency-building"]


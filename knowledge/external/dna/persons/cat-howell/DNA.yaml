      domains: ["prospecting", "video"]

    - id: "HEUR-CH-066"
      name: "Case Study Discount $500 Off Invoice"
      description: "Offer $500 off contract in exchange for testimonial commitment. The case study is worth far more long-term."
      source: "INC2"
      domains: ["sales", "case-studies"]

    - id: "HEUR-CH-067"
      name: "Strategic Partnership Referral Fee"
      description: "Freelancing: ~$500 per referral. Agency: ~$2,000 per closed referral. Make it juicy enough to incentivize."
      source: "INC2"
      domains: ["prospecting", "partnerships"]

    - id: "HEUR-CH-068"
      name: "Pitch Deck 2 Hours Investment"
      description: "A pitch deck takes about 2 hours but becomes a powerful reusable asset for sales, partners, and team onboarding."
      source: "INC2"
      domains: ["sales", "operations"]

    - id: "HEUR-CH-069"
      name: "Service Document 3-4 Lines Initially"
      description: "When starting, only have 3-4 service lines. Don't try to offer everything. Expand naturally."
      source: "INC2"
      domains: ["pricing", "specialization"]

    - id: "HEUR-CH-070"
      name: "Upwork Starting Rate $30-$75/hr"
      description: "On Upwork, never go below $30/hr. Start in $30-75 range and increase with reviews."
      source: "INC2"
      domains: ["pricing", "upwork"]

    - id: "HEUR-CH-071"
      name: "Charge Highest On Upwork"
      description: "Always bid highest. Clients who see high pricing assume expertise. High bidders attract quality clients."
      source: "INC2"
      domains: ["pricing", "upwork"]

    - id: "HEUR-CH-072"

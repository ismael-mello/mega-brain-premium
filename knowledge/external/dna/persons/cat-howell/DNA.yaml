    - id: "HEUR-CH-074"
      name: "13 Clients at $5K/mo = $1M/year"
      description: "At a $5,000/month retainer, just 13 clients = $1M annual revenue."
      source: "INC2"
      domains: ["pricing", "agency-scaling"]

    - id: "HEUR-CH-075"

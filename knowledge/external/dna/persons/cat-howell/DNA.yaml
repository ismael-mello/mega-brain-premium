# DNA.yaml - Cat Howell
# Facebook Ads Expert, Agency Builder, Founder of Eight Loop Social
#
# Versão: 1.0.0
# Criado: 2026-03-25
# Total elementos: 253 (após dedup de 271 brutos)
# Fontes: FATC 3.0 (466 files) + FB Ads Academy (363 files) + Incubator 2.0 (68 files)
# Extração: 3 agents Opus em paralelo
#
# ID FORMAT: {LAYER}-CH-{NNN}
#   FIL = Philosophy, MM = Mental Model, HEUR = Heuristic
#   FW = Framework, MET = Methodology
#   CH = Cat Howell
#
# ═══════════════════════════════════════════════════════════════════════════════

pessoa: "Cat Howell"
slug: "cat-howell"
versao: "1.0.0"
total_elementos: 253

layers:

  # ═════════════════════════════════════════════════════════════════════════════
  # L1 PHILOSOPHIES — Core beliefs and worldview
  # Total: 44 | Next ID: FIL-CH-045
  # ═════════════════════════════════════════════════════════════════════════════

  L1_PHILOSOPHIES:

    # --- FATC 3.0 (FIL-CH-001 to FIL-CH-017) ---

    - id: "FIL-CH-001"
      name: "Data Over Feelings"
      description: "Never make decisions based on gut feelings — always look at what the data is telling you. The data will always tell you blatantly what's wrong."
      source: "FATC"
      domains: ["facebook-ads", "optimization"]

    - id: "FIL-CH-002"
      name: "Facebook Is An Auction"
      description: "Facebook ads is fundamentally an auction process with billions of auctions daily. You compete against millions of advertisers for attention in the news feed."
      source: "FATC"
      domains: ["facebook-ads"]

    - id: "FIL-CH-003"
      name: "User Experience Is Facebook's #1 Priority"
      description: "Facebook's primary goal is protecting user experience. High-quality, relevant ads will be rewarded; poor quality will be penalized regardless of budget. Even Coca-Cola can lose auctions to small advertisers with better relevance."
      source: "FATC"
      domains: ["facebook-ads", "algorithm"]

    - id: "FIL-CH-004"
      name: "Don't Sell Shit Through Good Copywriting"
      description: "Great copy cannot save a bad offer or product. The offer must be fundamentally sound before you invest in marketing it."
      source: "FATC"
      domains: ["copywriting", "offers"]

    - id: "FIL-CH-005"
      name: "Match Problems Not People"
      description: "Products match problems, not demographics. A 25-year-old in New York isn't buying a CRM because of their age — they're buying it because they have a specific problem to solve."
      source: "FATC"
      domains: ["copywriting", "audience-targeting"]

    - id: "FIL-CH-006"
      name: "Personas Deserve Different Funnels"
      description: "Different personas have different wants, desires, and pain points — they deserve different funnels and messaging even if leading to the same sales page."
      source: "FATC"
      domains: ["funnels", "audience-targeting"]

    - id: "FIL-CH-007"
      name: "Minimum Viable Funnel First"
      description: "Always start with the minimum viable funnel regardless of price point. If it works, you saved time/money. If not, you have data to build upon."
      source: "FATC"
      domains: ["funnels", "ecom"]

    - id: "FIL-CH-008"
      name: "Emotional Over Rational"
      description: "Tapping into the emotional side of a problem is far more powerful than the rational side. Someone buying email marketing software doesn't care about click-through rates — they're stressed about losing their business."
      source: "FATC"
      domains: ["copywriting", "psychology"]

    - id: "FIL-CH-009"
      name: "Email Addresses Are Top Currency"
      description: "If you're not collecting email addresses, you're wasting massive resources. Email addresses are top currency in funnels — you're leaving so much money on the table."
      source: "FATC"
      domains: ["lead-gen", "funnels"]

    - id: "FIL-CH-010"
      name: "Proactive Client Protection"
      description: "Set expectations with clients upfront about potential website/funnel issues before they blame you. Audit before onboarding, not after problems arise."
      source: "FATC"
      domains: ["agency", "client-management"]

    - id: "FIL-CH-011"
      name: "Test Before You Build"
      description: "Don't build elaborate funnels before validating that the persona/offer/hook will work. Rapid fire testing saves thousands of dollars and weeks of wasted effort."
      source: "FATC"
      domains: ["testing", "funnels"]

    - id: "FIL-CH-012"
      name: "Creative Is The New Targeting"
      description: "With Facebook's algorithm getting better at targeting, audiences are no longer the biggest barrier to growth — creatives and offer angles are."
      source: "FATC"
      domains: ["creative-testing", "scaling"]

    - id: "FIL-CH-013"
      name: "Conversion Rate Is Your Responsibility"
      description: "As a Facebook marketer, the landing page conversion rate directly impacts your ad performance. Facebook penalizes you for low conversion rates by showing your ads to lower quality audiences."
      source: "FATC"
      domains: ["optimization", "funnels"]

    - id: "FIL-CH-014"
      name: "Losing The Scent Kills Conversions"
      description: "When there's a disconnect between what the ad says and what the landing page shows, you lose the scent and conversion rates plummet. Consistency from ad to landing page is critical."
      source: "FATC"
      domains: ["funnels", "copywriting"]

    - id: "FIL-CH-015"
      name: "Don't Be Lazy With Research"
      description: "Most marketers assume they know how their audience talks about problems. Mining Amazon reviews, Quora, Reddit, and client surveys for the exact language your audience uses is what separates good from great copy."
      source: "FATC"
      domains: ["copywriting", "research"]

    - id: "FIL-CH-016"
      name: "Referral Traffic Is Not Facebook Traffic"
      description: "Clients used to referral-based traffic (90% close rate) will get a shock with Facebook cold traffic (5-10% close rate). This expectation gap must be managed from day one."
      source: "FATC"
      domains: ["lead-gen", "client-management"]

    - id: "FIL-CH-017"
      name: "Q4 Gardening Philosophy"
      description: "In Q4/holiday season, you have 3 gardens to tend: Business Manager, Website, and Business Operations. Neglecting any one will undermine your campaigns."
      source: "FATC"
      domains: ["ecom", "seasonal"]

    # --- FB Ads Academy unique (FIL-CH-018 to FIL-CH-027) ---

    - id: "FIL-CH-018"
      name: "Mindset Is The Only Differentiator"
      description: "The only difference between 10K and 80K a month honestly is that mindset. Mindset determines whether tools, blueprints, and funnels actually produce results."
      source: "FBAA"
      domains: ["agency-building", "mindset"]

    - id: "FIL-CH-019"
      name: "Value Is Belief-Based"
      description: "The only thing that matters when it comes to pricing is how big is the problem that you solve and what do you believe it's worth? Pricing is a function of self-belief, not market rates."
      source: "FBAA"
      domains: ["pricing", "mindset"]

    - id: "FIL-CH-020"
      name: "People Are Your Only Asset"
      description: "As an agency, your only asset is your people. You don't really have any assets aside from a couple laptops. Agency value is entirely in human capital."
      source: "FBAA"
      domains: ["agency-building"]

    - id: "FIL-CH-021"
      name: "Never Promise Results"
      description: "Never ever promise results to a client. You don't own Facebook. The only person that could do that would be Mark Zuckerberg. Integrity requires honest expectation-setting."
      source: "FBAA"
      domains: ["client-management", "pricing"]

    - id: "FIL-CH-022"
      name: "No Refunds Policy"
      description: "Do not give refunds. Put this in your contract. If a client is committing to a certain amount of time and you have set the right expectations, they shouldn't be allowed to bail out."
      source: "FBAA"
      domains: ["client-management", "contracts"]

    - id: "FIL-CH-023"
      name: "Don't Take Clients For Money"
      description: "Do not take on clients just because you need the money. I guarantee you 1000% that will always backfire on you. Only onboard clients that are a right fit."
      source: "FBAA"
      domains: ["client-acquisition", "auditing"]

    - id: "FIL-CH-024"
      name: "Competence Before Clients"
      description: "Academy structured in 4 locked levels requiring competency tests because students were landing clients without knowing what a pixel was. The whole thing felt really out of integrity."
      source: "FBAA"
      domains: ["agency-building", "training"]

    - id: "FIL-CH-025"
      name: "Niche Expertise Over Breadth"
      description: "Specializing in verticals reduces learning curves, builds leverage through case studies, and enables premium pricing. Learning curves cost money and they cost time."
      source: "FBAA"
      domains: ["agency-building", "niches"]

    - id: "FIL-CH-026"
      name: "Protect Your Profit Margin"
      description: "It is not okay that you take all the money out of your business. You need to make sure you have a profit margin of 20 to 30%. Profit margin enables reinvestment and survival."
      source: "FBAA"
      domains: ["agency-building", "finance"]

    - id: "FIL-CH-027"
      name: "Algorithm Is 70% Of Success"
      description: "Being really good in Facebook marketing is about 30% down to skills and knowledge and 70% letting the algorithm do its thing. Understanding the algorithm matters more than manual optimization."
      source: "FBAA"
      domains: ["facebook-ads", "algorithm"]

    # --- Incubator 2.0 (FIL-CH-028 to FIL-CH-044) ---

    - id: "FIL-CH-028"
      name: "Niche First, Expand Later"
      description: "Niching is a short-term strategy to get momentum. You pick one niche, process it, lock it down, then expand. You are not restricted forever — you just start focused to spin the windmill."
      source: "INC2"
      domains: ["agency-positioning", "specialization"]

    - id: "FIL-CH-029"
      name: "People Buy From People"
      description: "People buy from people, not products or feature-based solutions. Your brand story must connect to your specific audience so you attract clients you actually want to work with."
      source: "INC2"
      domains: ["branding", "client-attraction"]

    - id: "FIL-CH-030"
      name: "Hate Your Clients Hate Your Business"
      description: "If you hate the people you work with, you'll hate your business and sabotage the whole thing. Client selection is foundational, not optional."
      source: "INC2"
      domains: ["client-management", "agency-positioning"]

    - id: "FIL-CH-031"
      name: "Outcome Over Hours"
      description: "Stop selling your time. Clients pay for outcomes, not hours. Position yourself as someone who solves outcomes vs just someone selling time — this is how you scale."
      source: "INC2"
      domains: ["premium-pricing", "agency-scaling"]

    - id: "FIL-CH-032"
      name: "Service Document Is The Heart of Business"
      description: "Your pricing document/service document IS your business. It determines positioning, pricing, margins, team structure, contracts, and everything downstream."
      source: "INC2"
      domains: ["pricing", "operations"]

    - id: "FIL-CH-033"
      name: "Process Before Scale"
      description: "You cannot scale what you haven't processed. If you can't write a step-by-step of your service, you cannot hire people, cannot step away from implementation, and cannot build a real business."
      source: "INC2"
      domains: ["agency-scaling", "operations"]

    - id: "FIL-CH-034"
      name: "Start With Competence Not Trends"
      description: "Start with what you're actually strong at, not the shiny new thing. Selling services you don't know how to deliver creates friction in sales, poor delivery, and crushed confidence."
      source: "INC2"
      domains: ["specialization", "service-design"]

    - id: "FIL-CH-035"
      name: "Case Studies Are Worth Millions"
      description: "A good case study, properly leveraged, can be worth $50,000+ to your business. It's the most powerful asset you can build for sales, authority, and prospecting."
      source: "INC2"
      domains: ["sales", "authority-building"]

    - id: "FIL-CH-036"
      name: "Balance Sales Marketing Operations"
      description: "If you're strong at lead gen but suck at delivery, it blows up. If you're strong at implementation but can't get clients, you go bust. Every business needs balance between these three."
      source: "INC2"
      domains: ["agency-scaling", "operations"]

    - id: "FIL-CH-037"
      name: "Your Services Are Digital — World Is Your Oyster"
      description: "Don't limit yourself to your local market. Your digital services can be sold globally. This single realization can multiply your addressable market by 100x."
      source: "INC2"
      domains: ["agency-scaling", "prospecting"]

    - id: "FIL-CH-038"
      name: "Never Stop Working Your Pipeline"
      description: "The moment you take your foot off the gas on lead generation, it takes 2x as long to recover. Your fear of losing a client is really a fear that your pipeline isn't big enough."
      source: "INC2"
      domains: ["prospecting", "agency-scaling"]

    - id: "FIL-CH-039"
      name: "Reciprocity Drives Referrals"
      description: "By offering high-value services for free to strategic partners, reciprocity naturally compels them to send referrals. You don't even need to ask — they'll feel indebted."
      source: "INC2"
      domains: ["prospecting", "relationship-building"]

    - id: "FIL-CH-040"
      name: "Don't Compare Your Beginning to Someone's Middle"
      description: "Comparing yourself to other agencies kills momentum. You can't compare apples to oranges — stay focused on your own path and drown out the noise."
      source: "INC2"
      domains: ["mindset", "agency-scaling"]

    - id: "FIL-CH-041"
      name: "Describing Problem Beats Having Credentials"
      description: "If you can describe a prospect's problem in 5G high definition — so accurately they feel understood — they'll assume you have the solution, even without traditional credentials."
      source: "INC2"
      domains: ["sales", "positioning"]

    - id: "FIL-CH-042"
      name: "LinkedIn Is Relationship Not Lead Generation"
      description: "Treat LinkedIn prospecting as a relationship-based pursuit, not a spam channel. Seeds planted today come back months later. Being pushy alienates more prospects than it converts."
      source: "INC2"
      domains: ["prospecting", "linkedin"]

    - id: "FIL-CH-043"
      name: "Never Guarantee Outcomes"
      description: "Regardless of client size — even for brands spending hundreds of thousands — never guarantee outcomes. You don't own the platform. Set super realistic expectations."
      source: "INC2"
      domains: ["client-management", "sales"]

    - id: "FIL-CH-044"
      name: "One Part Suffers All Suffer"
      description: "Don't build a business at the cost of your personal life, relationships, or health. If one part suffers, every part will suffer. You'll self-sabotage."
      source: "INC2"
      domains: ["mindset", "agency-scaling"]

  # ═════════════════════════════════════════════════════════════════════════════
  # L2 MENTAL MODELS — Thinking and decision frameworks
  # Total: 34 | Next ID: MM-CH-035
  # ═════════════════════════════════════════════════════════════════════════════

  L2_MENTAL_MODELS:

    # --- FATC 3.0 (MM-CH-001 to MM-CH-014) ---

    - id: "MM-CH-001"
      name: "BEAR Algorithm Model"
      description: "The Facebook algorithm is driven by Bidding, Expected Actions, and Relevance/Quality. Understanding how each contributes to the auction helps you diagnose and fix campaign problems."
      source: "FATC"
      domains: ["algorithm", "facebook-ads"]

    - id: "MM-CH-002"
      name: "Problem-Solution-Product Sequence"
      description: "Copy should follow the sequence: identify the problem (emotional), present the solution, then introduce the product. Starting with the product means you miss people who don't yet know they need it."
      source: "FATC"
      domains: ["copywriting", "funnels"]

    - id: "MM-CH-003"
      name: "Three-Level Awareness Model"
      description: "Audiences exist at three levels: Problem Awareness (know the pain), Solution Awareness (considering options), Product Awareness (know your product). Map funnel stages to these levels."
      source: "FATC"
      domains: ["copywriting", "funnels"]

    - id: "MM-CH-004"
      name: "Funnel As Temperature Gradient"
      description: "Cold audience (never heard of you) -> Warm (interacted with ad/content) -> Hot (visited sales page/added to cart). Each temperature requires different messaging, hooks, and urgency."
      source: "FATC"
      domains: ["funnels", "retargeting"]

    - id: "MM-CH-005"
      name: "OCPM vs CPM Decision Framework"
      description: "OCPM is like Google Search — targets people likely to convert. CPM is like Google Display — blanket marketing for reach. Switch between them based on CTR and conversion rate performance."
      source: "FATC"
      domains: ["optimization", "bidding"]

    - id: "MM-CH-006"
      name: "Bottleneck Diagnosis Model"
      description: "When a funnel underperforms, work through each step systematically: check conversion rate, CTR, CPC, targeting quality. Fix one variable at a time. If all check out, extend the funnel."
      source: "FATC"
      domains: ["optimization", "funnels"]

    - id: "MM-CH-007"
      name: "Data Tells You Where The Problem Is"
      description: "Facebook data reveals: low CTR = creative problem; high CTR but low conversion = landing page problem; good stats but high CPA = audience problem."
      source: "FATC"
      domains: ["optimization", "analytics"]

    - id: "MM-CH-008"
      name: "Price Point Determines Funnel Length"
      description: "More expensive products require longer funnels with more warmup. Under $50 = minimum viable funnel. $50-$2000 = lead magnet funnel. Over $2000 = sales call funnel."
      source: "FATC"
      domains: ["funnels", "ecom"]

    - id: "MM-CH-009"
      name: "Lead Goggles Model"
      description: "When auditing client assets, remove everything you know and look at the site/ads through fresh eyes as a brand new lead. What do I think they sell? is the fundamental question."
      source: "FATC"
      domains: ["agency", "audit"]

    - id: "MM-CH-010"
      name: "Q4 Four-Phase Model"
      description: "Q4 eCommerce strategy follows 4 phases: Phase 1 (Prep/Q3), Phase 2 (Build Momentum/Sept-mid Nov), Phase 3 (Maximize Sales/mid Nov-Dec 20), Phase 4 (Post-Holiday/January)."
      source: "FATC"
      domains: ["ecom", "seasonal"]

    - id: "MM-CH-011"
      name: "Direct vs Indirect Copywriting"
      description: "Direct copy speaks explicitly about the problem/solution/product. Indirect copy uses storytelling to place the reader in a contextual scenario. Test both against each persona."
      source: "FATC"
      domains: ["copywriting"]

    - id: "MM-CH-012"
      name: "Visual-Headline-Copy Consumption Order"
      description: "Users see the image/video FIRST, then the headline, then the copy. Creative stops the scroll, headline creates curiosity, copy does the selling. This informs testing priority."
      source: "FATC"
      domains: ["creative-testing", "copywriting"]

    - id: "MM-CH-013"
      name: "Horizontal vs Vertical Scaling Model"
      description: "Vertical = safe, slow, increase budget 16-20% every 2-3 days on winning ad sets. Horizontal = fast, risky, duplicate winning ad sets with variable changes. Use vertical when CPA sensitivity is high."
      source: "FATC"
      domains: ["scaling"]

    - id: "MM-CH-014"
      name: "TOF-MOF-BOF Campaign Organization"
      description: "Organize campaigns by funnel stage: Top of Funnel (awareness), Middle of Funnel (consideration/retargeting), Bottom of Funnel (conversion/direct response). Ad sets go within campaigns."
      source: "FATC"
      domains: ["campaign-structure", "facebook-ads"]

    # --- FB Ads Academy unique (MM-CH-015 to MM-CH-022) ---

    - id: "MM-CH-015"
      name: "Four Bottleneck Model"
      description: "Agency scaling encounters 4 sequential bottlenecks: (1) Lead Generation, (2) Sales/Closing, (3) Delivery/HR (hardest), (4) Scaling/Systemization."
      source: "FBAA"
      domains: ["agency-building"]

    - id: "MM-CH-016"
      name: "Owned vs Leased Funnels"
      description: "Two types: Owned (client keeps all assets) and Leased (agency owns assets, client leases access). Leased funnels lock clients into long-term contracts and attract investors."
      source: "FBAA"
      domains: ["pricing", "funnels"]

    - id: "MM-CH-017"
      name: "Two-Call Close Framework"
      description: "Cold leads require a two-call process: Call 1 = discovery + rapport + request BM access; Call 2 = audit findings + pitch. Single-call closes only work for warm/referral leads."
      source: "FBAA"
      domains: ["client-acquisition", "sales"]

    - id: "MM-CH-018"
      name: "Working Backwards Model"
      description: "Calculate required ad spend by working backwards from desired conversions through funnel steps using conversion rates at each stage."
      source: "FBAA"
      domains: ["auditing", "ad-spend"]

    - id: "MM-CH-019"
      name: "Problem-Agitate-Solve Copy Framework"
      description: "Map out: Awesome (desired outcomes), Bad (pain points), Without/Even If (misconceptions/objections). Research via Amazon, YouTube, and direct customer surveys."
      source: "FBAA"
      domains: ["copywriting", "client-acquisition"]

    - id: "MM-CH-020"
      name: "Vertical Lock-In Strategy"
      description: "Build expertise in one vertical first, train team, build case studies, then add a second vertical. Never jump to a new niche before mastering the current one."
      source: "FBAA"
      domains: ["agency-building", "niches"]

    - id: "MM-CH-021"
      name: "BM Access = Trust Accelerator"
      description: "Requesting Business Manager access as analyst on first call doubles close rates. It's a small yes that builds trust — they're handing you the keys to their house."
      source: "FBAA"
      domains: ["sales", "client-acquisition"]

    - id: "MM-CH-022"
      name: "Referral Incentive Flywheel"
      description: "Offer $1,200 off monthly invoice or 20% per referred client with 3-month sunset clause. Minimum invoice threshold ($3-5K) prevents low-value referrals."
      source: "FBAA"
      domains: ["client-acquisition", "retention"]

    # --- Incubator 2.0 (MM-CH-023 to MM-CH-034) ---

    - id: "MM-CH-023"
      name: "The Windmill Model"
      description: "Getting initial business momentum is like spinning a windmill — hardest at the start. Every strategy should reduce friction to make the first spin easier. Once moving, momentum compounds."
      source: "INC2"
      domains: ["agency-scaling", "mindset"]

    - id: "MM-CH-024"
      name: "Niche = Marketing Funnel for Processed Service"
      description: "A niche is NOT a restriction. It's a marketing funnel to sell a processed service. Two parts: (1) the specific service/process, and (2) the avatar/industry it serves."
      source: "INC2"
      domains: ["agency-positioning", "specialization"]

    - id: "MM-CH-025"
      name: "Features-Outcomes-Problems-CoreSolution-Pitch"
      description: "The messaging cascade: list service features, identify outcomes, determine problems solved, synthesize core solution, then craft the pitch."
      source: "INC2"
      domains: ["messaging", "positioning"]

    - id: "MM-CH-026"
      name: "Three A's of Content"
      description: "Content should rotate through three pillars: Affinity (behind the scenes, humor), Awareness (tips, core solution messaging), Authority (case studies, testimonials)."
      source: "INC2"
      domains: ["content-marketing", "branding"]

    - id: "MM-CH-027"
      name: "Freelancer-Agency-Course Progression"
      description: "Stage 1: Process your service and sell. Stage 2: Build production team, refine. Stage 3: Sell the process as an online course. Each stage builds on the previous."
      source: "INC2"
      domains: ["agency-scaling", "business-model"]

    - id: "MM-CH-028"
      name: "Dream 100 Pipeline"
      description: "Write down 100 ideal clients/brands you want to work with. This is your targeting foundation. Without a clear target list, prospecting efforts have no direction."
      source: "INC2"
      domains: ["prospecting", "strategy"]

    - id: "MM-CH-029"
      name: "Internal Hourly Rate Model"
      description: "Calculate true internal cost: time per service x cost per person. Then divide by target COGS margin (e.g., 25%) to get the client price. This protects margins and enables scaling."
      source: "INC2"
      domains: ["pricing", "operations"]

    - id: "MM-CH-030"
      name: "Homeless Doctor Analogy"
      description: "A homeless man who accurately describes your exact symptoms earns more trust than credentialed doctors who dismiss you. Specificity of problem description trumps credentials."
      source: "INC2"
      domains: ["sales", "positioning"]

    - id: "MM-CH-031"
      name: "Know-Like-Trust Sequence"
      description: "Before anyone buys, they need to know, like, and trust you. Branding, content, and positioning are all engineered to move prospects through this sequence."
      source: "INC2"
      domains: ["branding", "sales"]

    - id: "MM-CH-032"
      name: "Prospecting Methods Match Personality"
      description: "Not all prospecting strategies work for all personalities. Cold calling might work for extroverts but fail for introverts. Choose strategies that leverage YOUR strengths."
      source: "INC2"
      domains: ["prospecting", "strategy"]

    - id: "MM-CH-033"
      name: "Category-Based Business"
      description: "As you mature, you become a category-based business: everything revolves around one avatar, and you expand service SKUs within that category. Reduces trust-building overhead."
      source: "INC2"
      domains: ["agency-scaling", "positioning"]

    - id: "MM-CH-034"
      name: "Levels of Awareness (Schwartz Applied)"
      description: "Prospects exist at different awareness levels: problem-aware, solution-aware, product-aware. Funnel messaging must match where they are. Reference: Breakthrough Advertising by Eugene Schwartz."
      source: "INC2"
      domains: ["funnel-building", "messaging"]

  # ═════════════════════════════════════════════════════════════════════════════
  # L3 HEURISTICS — Rules of thumb and numerical guidelines
  # Total: 80 | Next ID: HEUR-CH-081
  # ═════════════════════════════════════════════════════════════════════════════

  L3_HEURISTICS:

    # --- FATC 3.0 (HEUR-CH-001 to HEUR-CH-041) ---

    - id: "HEUR-CH-001"
      name: "$200-$500 RFT Budget"
      description: "Rapid fire testing can be done effectively with $200-$500 total spend. Minimum $200 to avoid too many assumptions."
      source: "FATC"
      domains: ["testing", "budget"]

    - id: "HEUR-CH-002"
      name: "$20/Day Starting Budget"
      description: "Start campaigns at around $20/day for rapid fire testing rounds."
      source: "FATC"
      domains: ["testing", "budget"]

    - id: "HEUR-CH-003"
      name: "3-4 Days Per RFT Round"
      description: "Each round of rapid fire testing should run for approximately 3-4 days before analyzing data."
      source: "FATC"
      domains: ["testing"]

    - id: "HEUR-CH-004"
      name: "20% Minimum Landing Page Conversion"
      description: "Free opt-in/webinar landing pages should convert at minimum 20%. Below that indicates a problem."
      source: "FATC"
      domains: ["funnels", "lead-gen"]

    - id: "HEUR-CH-005"
      name: "2-3% Ecom Website Conversion Rate"
      description: "E-commerce websites typically convert between 2-3%. Industry standard benchmark."
      source: "FATC"
      domains: ["ecom"]

    - id: "HEUR-CH-006"
      name: "4-5% Quote Request Conversion"
      description: "Landing pages driving quote requests (lawyers, builders) typically convert at 4-5%."
      source: "FATC"
      domains: ["lead-gen"]

    - id: "HEUR-CH-007"
      name: "5-10% Lead Gen Close Rate"
      description: "Cold traffic from Facebook in lead gen typically closes at 5-10%. Much lower than the 90% close rate from referrals. Use 5% for projections."
      source: "FATC"
      domains: ["lead-gen"]

    - id: "HEUR-CH-008"
      name: "20% Sales Call Conversion Rate"
      description: "High-ticket coaching funnels typically convert sales calls at about 20%. Use 15% for conservative estimates."
      source: "FATC"
      domains: ["coaching", "lead-gen"]

    - id: "HEUR-CH-009"
      name: "30% No-Show Rate"
      description: "Approximately 30% of booked strategy/sales calls will not show up or cancel."
      source: "FATC"
      domains: ["coaching", "lead-gen"]

    - id: "HEUR-CH-010"
      name: "1% CTR Cold Audience Minimum"
      description: "Cold audience ads should achieve at minimum 1% link click-through rate. Below 1% = creative or targeting issue."
      source: "FATC"
      domains: ["facebook-ads", "optimization"]

    - id: "HEUR-CH-011"
      name: "2-3% CTR Retargeting Minimum"
      description: "Retargeting/warm audience ads should achieve 2-3% click-through rate."
      source: "FATC"
      domains: ["retargeting", "optimization"]

    - id: "HEUR-CH-012"
      name: "$2 Average CPC Benchmark"
      description: "Average cost per click on Facebook is approximately $2 for most audiences."
      source: "FATC"
      domains: ["facebook-ads", "budget"]

    - id: "HEUR-CH-013"
      name: "$5-$15 Webinar Registration Cost"
      description: "Webinar registrations for business/life coaches typically cost $5-$15. Only love and weight loss niches consistently get $2."
      source: "FATC"
      domains: ["coaching", "lead-gen"]

    - id: "HEUR-CH-014"
      name: "68% Cart Abandonment Rate"
      description: "The average e-commerce cart abandonment rate is 68%. Higher = checkout UX problem."
      source: "FATC"
      domains: ["ecom"]

    - id: "HEUR-CH-015"
      name: "30% Max CPA for Ecom"
      description: "Target CPA for e-commerce should be approximately 30% of AOV. $100 AOV = $30 target CPA."
      source: "FATC"
      domains: ["ecom", "budget"]

    - id: "HEUR-CH-016"
      name: "50 Conversions Per Ad Set Per Week"
      description: "Facebook wants approximately 50 conversions per ad set per week for optimal optimization. If not, optimize for higher-funnel event."
      source: "FATC"
      domains: ["optimization", "algorithm"]

    - id: "HEUR-CH-017"
      name: "Don't Kill Ads Under 500 Reach"
      description: "Never kill an ad until it has reached at least 500 people, when Facebook assigns a relevance score."
      source: "FATC"
      domains: ["optimization"]

    - id: "HEUR-CH-018"
      name: "Don't Kill Ad Sets Under 1000-2000 Impressions"
      description: "Allow ad sets at least 1,000-2,000 impressions before making optimization decisions."
      source: "FATC"
      domains: ["optimization"]

    - id: "HEUR-CH-019"
      name: "5000 Impressions for Valid Stats"
      description: "Don't call a stat good or bad unless you have at least 5,000 impressions."
      source: "FATC"
      domains: ["optimization", "analytics"]

    - id: "HEUR-CH-020"
      name: "5000 Reach Before Turning Off"
      description: "Typically don't turn off campaigns until they've reached 5,000 people — that's when Facebook has optimized itself."
      source: "FATC"
      domains: ["optimization"]

    - id: "HEUR-CH-021"
      name: "5-Second Page Load Maximum"
      description: "Website should load within 5 seconds maximum. Each additional second dramatically increases bounce rate."
      source: "FATC"
      domains: ["ecom", "funnels"]

    - id: "HEUR-CH-022"
      name: "$150 Per Booked Call Conservative"
      description: "Conservative estimate for cost per booked strategy call in coaching niche is approximately $150."
      source: "FATC"
      domains: ["coaching", "budget"]

    - id: "HEUR-CH-023"
      name: "Over $2000 = Sales Call Required"
      description: "Any offer priced over $2,000 should lead to a sales call, not direct online purchase."
      source: "FATC"
      domains: ["coaching", "funnels"]

    - id: "HEUR-CH-024"
      name: "16-20% Budget Increase for Vertical Scaling"
      description: "When vertical scaling, increase daily budget by 16-20% every 2-3 days. Safe way to scale without disrupting CPA."
      source: "FATC"
      domains: ["scaling"]

    - id: "HEUR-CH-025"
      name: "200K Minimum Audience for Horizontal Scaling"
      description: "Horizontal scaling (duplicating ad sets) requires audience size of at least 200K. Below that = de-duping issues."
      source: "FATC"
      domains: ["scaling"]

    - id: "HEUR-CH-026"
      name: "Under $50 Products Need Short Funnels"
      description: "Products under $50 are very hard to profit from with Facebook ads unless high LTV. Stick to minimum viable funnel."
      source: "FATC"
      domains: ["ecom", "funnels"]

    - id: "HEUR-CH-027"
      name: "Minimum 500 Reach Per Ad in RFT"
      description: "In rapid fire testing round 2, ensure each ad reaches at least 500 people before pausing."
      source: "FATC"
      domains: ["testing"]

    - id: "HEUR-CH-028"
      name: "10-Second Video View Retargeting Threshold"
      description: "For retargeting video viewers, use 10-second view threshold for videos over 1 minute. Use 50% view for videos under 30 seconds."
      source: "FATC"
      domains: ["retargeting"]

    - id: "HEUR-CH-029"
      name: "Small Audiences Under 10K = Traffic Objective"
      description: "For retargeting audiences under 10,000, use traffic or engagement campaigns, not conversion. OCPM is overkill for tiny audiences."
      source: "FATC"
      domains: ["retargeting", "optimization"]

    - id: "HEUR-CH-030"
      name: "50% Tracking Setup Failure Rate"
      description: "Approximately 50% of client ad accounts you audit will NOT have tracking set up properly. Check tracking first."
      source: "FATC"
      domains: ["agency", "audit"]

    - id: "HEUR-CH-031"
      name: "Right-Hand Column = Low CTR Great CPM"
      description: "Right-hand column placement delivers very low CTR but amazing CPMs. Best for brand awareness and retargeting."
      source: "FATC"
      domains: ["placements"]

    - id: "HEUR-CH-032"
      name: "60% Video Retention at 10 Seconds"
      description: "For a 1-minute video, target approximately 60% retention at 10 seconds. Below 30% at 10s = steep drop-off."
      source: "FATC"
      domains: ["creative-testing", "video"]

    - id: "HEUR-CH-033"
      name: "3x ROAS Minimum for Ecom"
      description: "A 3x return on ad spend is the minimum acceptable benchmark for e-commerce campaigns."
      source: "FATC"
      domains: ["ecom", "budget"]

    - id: "HEUR-CH-034"
      name: "6-Email Nurture Sequence"
      description: "Standard: (1) Delivery/intro, (2) Free value, (3) Direct response, (4) Testimonial, (5) More value, (6) Scarcity/last chance."
      source: "FATC"
      domains: ["email-marketing", "funnels"]

    - id: "HEUR-CH-035"
      name: "Low CTR + Low CVR = Switch to CPM"
      description: "If ads have low CTR AND low CVR, switch from OCPM to CPM to avoid campaign stalling."
      source: "FATC"
      domains: ["optimization", "bidding"]

    - id: "HEUR-CH-036"
      name: "Low CTR + Good CVR = Switch to Link Clicks"
      description: "If low CTR but good CVR, switch to link click optimization to drive more cheaper clicks to the high-converting page."
      source: "FATC"
      domains: ["optimization", "bidding"]

    - id: "HEUR-CH-037"
      name: "High Negative Feedback = Extend Funnel"
      description: "If high negative feedback despite testing creative and audiences, extend your funnel to warm the audience more."
      source: "FATC"
      domains: ["optimization", "funnels"]

    - id: "HEUR-CH-038"
      name: "Webinar to Call Booking = 5% Conversion"
      description: "For high-ticket coaching funnels, webinar-to-booked-call conversion rate is typically around 5%."
      source: "FATC"
      domains: ["coaching", "funnels"]

    - id: "HEUR-CH-039"
      name: "Lower CPM Tactics"
      description: "To lower CPM: (1) Add exclusions, (2) Build social proof on ads, (3) Split test audiences."
      source: "FATC"
      domains: ["optimization"]

    - id: "HEUR-CH-040"
      name: "Link Clicks Not Clicks All"
      description: "Always analyze link clicks and link click CTR — never clicks all or CTR all. Clicks all includes likes and comments, not website visits."
      source: "FATC"
      domains: ["analytics"]

    - id: "HEUR-CH-041"
      name: "15+ Products = Run DPA"
      description: "E-commerce clients with 15-20+ products should run Dynamic Product Ads for retargeting."
      source: "FATC"
      domains: ["ecom", "retargeting"]

    # --- FB Ads Academy unique (HEUR-CH-042 to HEUR-CH-056) ---

    - id: "HEUR-CH-042"
      name: "$156/hr Minimum Rate"
      description: "Minimum hourly rate for agency work. Eight Loop internal rate is $220-$297/hr. Below $156/hr = Upwork freelancer rates."

layers:
  L1_FILOSOFIAS:
    - id: "FIL-ES-001"
      title: "Copy Cannot Create Desire"
      content: >
        Copy cannot create desire. The power behind advertising comes from
        the market itself. Copy can only channel existing desires onto a
        product. Trying to create desire is futile.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-002"
      title: "The Market Is the Master"
      content: >
        The copywriter does not control mass desire. He can only exploit it.
        He dies when he tries to run against it. Success comes from riding
        existing forces, not fighting them.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-003"
      title: "Innovation Over Formula"
      content: >
        No formula works twice. Each formula is simply a written solution to
        a past problem. Memorizing theories won't work. Only innovation —
        finding the unique solution to each unique problem — produces results.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-004"
      title: "The Headline Is 90% of the Ad"
      content: >
        The first 5-10 words represent 90% of the value of your ad. If the
        headline is right, it may start a new industry. If wrong, nothing
        after it will save the ad.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-005"
      title: "Style Serves Strategy"
      content: >
        In effective advertising, styles may change but strategy does not.
        Style is the invisible vehicle that carries and reinforces the
        message. When style becomes trite, people cannot see the message.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-006"
      title: "Copy as Force Direction"
      content: >
        The copywriter is like an atomic physicist or stock speculator — all
        three deal with immense natural forces thousands of times more
        powerful than the men who use them. The skill is in directing, not
        creating.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-007"
      title: "Advertising Makes Markets"
      content: >
        A book about advertising is really a book about market-making. You
        are not just writing an ad — you may be creating the first viable
        financial form for a latent public desire.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-008"
      title: "Long Copy Outsells Short Copy"
      content: >
        Attempting to do the same selling job in ten words instead of a
        thousand is gambling with the client's money. The more of your story
        the prospect reads, the more thoroughly you sell.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-009"
      title: "Belief Is As Powerful As Desire"
      content: >
        The need to believe — and for secure beliefs — is just as powerful
        an emotional force as the strongest physical desire or the most
        urgent search for identification.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-010"
      title: "Every Word Must Sell"
      content: >
        Even mechanism copy and proof copy must be loaded with promise and
        emotion. There is no such thing as "information-only" paragraphs in
        effective copy.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FIL-ES-011"
      title: "Grammar Exists Only to Serve Communication"
      content: >
        Traditional grammar (nouns, verbs, adjectives) is not only wrong but
        disastrous. Grammar has one purpose: to transfer thoughts from your
        mind into another person's mind. Any grammar that doesn't serve
        immediate understanding is worthless.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FIL-ES-012"
      title: "Words Are Translated Into Images, Not Memorized"
      content: >
        The reader's mind never memorizes your words. It immediately and
        automatically translates them into images. Understanding happens
        when the images in the reader's mind match yours.
      domain: communication-psychology
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FIL-ES-013"
      title: "Simplicity Is Supreme"
      content: >
        Simplicity is always more vital than variety, style, cleverness, or
        any other quality. If you must choose between simplicity and anything
        else, choose simplicity.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FIL-ES-014"
      title: "How You Say It Is As Important As What You Say"
      content: >
        Sometimes, how you say something is as important as what you say. The
        same thought stated flatly is forgettable; stated with punch, it
        becomes quotable and unforgettable.
      domain: communication-psychology
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FIL-ES-015"
      title: "Language Is Fluid Because Reality Is Fluid"
      content: >
        Reality changes constantly. To match it, language must be equally
        fluid. Words shift meanings depending on context. This fluidity
        enables metaphor, wit, and fresh expression.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FIL-ES-016"
      title: "The Unconscious Is Your Creative Engine"
      content: >
        You cannot consciously produce brilliant statements. You must train
        your unconscious through practice, give it search commands, and then
        trust it to produce. First learn consciously, then internalize, then
        deploy automatically.
      domain: creativity
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FIL-ES-017"
      title: "Communication Has Two Goals: Understanding and Thinking"
      content: >
        Writing has two basic goals: to let your reader understand, and to
        make her think. Information writing serves the first; impact writing
        serves the second. The greatest communication achieves both
        simultaneously.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

  L2_MODELOS_MENTAIS:
    - id: "MM-ES-001"
      title: "The Two-Product Model"
      content: >
        Every product is actually two products: the physical product and the
        functional product. The physical product does not sell; the functional
        product does.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-002"
      title: "Three Dimensions of the Prospect's Mind"
      content: >
        The human mind has three dimensions for persuasion: Desires
        (wants/drives), Identifications (self-image/roles), and Beliefs
        (opinions/convictions). All copy must work on all three
        simultaneously.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-003"
      title: "The Awareness Spectrum"
      content: >
        Market awareness exists on a spectrum from Most Aware to Completely
        Unaware. Your headline strategy must match the awareness level
        precisely.
      domain: market-analysis
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-004"
      title: "The Sophistication Lifecycle"
      content: >
        Every market moves through a lifecycle of increasing sophistication,
        from virgin territory to exhausted market. Each stage requires a
        fundamentally different advertising approach.
      domain: market-analysis
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-005"
      title: "Character Roles vs Achievement Roles"
      content: >
        People buy products for two types of identity: Character roles
        (personality they want to embody) and Achievement roles (status they
        want to attain).
      domain: consumer-psychology
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-006"
      title: "Primary Image vs Built Images"
      content: >
        Every product has a primary image. The copywriter can build new
        images on top of this, but must always include the primary image as
        foundation. Contradicting it will fail.
      domain: brand-positioning
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-007"
      title: "Three Levels of Creativity"
      content: >
        Level 1: Word-Substitute (weakest). Level 2: Extension (medium).
        Level 3: Breakthrough (finding entirely new angle no one has used —
        strongest).
      domain: creativity
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-008"
      title: "The Architecture of Belief"
      content: >
        Belief is not all-or-nothing. It is built gradually, statement by
        statement. Each statement must fit the prospect's current version of
        "the facts" at that precise moment.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-009"
      title: "The Ad Has Architecture"
      content: >
        Every ad has macro-pattern of how promise, proof, identification, and
        redefinition are arranged. The structure must match where the reader's
        attention shifts at each point.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-010"
      title: "Permanent Forces vs Forces of Change"
      content: >
        Mass desire comes from two categories: Permanent forces (instinct,
        technology) and Forces of Change (emerging trends, new tech). The
        copywriter must identify which type drives the market.
      domain: market-analysis
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MM-ES-011"
      title: "The Movie Screen Mind"
      content: >
        Think of your reader's mind as a movie screen. You flash one image,
        let her absorb it, then flash the next. You cannot overload the
        screen.
      domain: communication-psychology
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-012"
      title: "Road Map Model of Thought-Flow"
      content: >
        Every discourse is like building a road map. Sentences are resting
        stops. Connectors are road signs. If the signs are wrong or missing,
        the reader gets lost.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-013"
      title: "Picture Words vs Connecting Words"
      content: >
        ALL words fall into exactly two categories: Picture Words (carrying
        images) and Connecting Words (showing relationships). This replaces
        traditional 8 parts of speech.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-014"
      title: "The Setup-Payoff Mechanism"
      content: >
        Every punchy statement works like a physical punch: pullback (setup)
        before strike (payoff). Setup creates expectation; payoff violates or
        redirects it.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-015"
      title: "Stated vs. Unstated (Implication Engine)"
      content: >
        The most powerful communication has two layers: stated (what you say)
        and unstated (what forms in reader's mind). Audience completes the
        thought themselves, making it 10x more powerful.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-016"
      title: "The Thought Hierarchy"
      content: >
        Communication has natural hierarchy: Words -> Images -> Sentences ->
        Paragraphs -> Discourse. Each level is built from the one below.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-017"
      title: "Condensation as Power"
      content: >
        The mind cannot hold too many ideas simultaneously. But you can
        compress an entire complex idea into a single small word (it, this,
        that) and carry it forward into new relationships.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-018"
      title: "The Pivot Word"
      content: >
        A Pivot Word has multiple meanings. The reader encounters it with one
        meaning, then is forced to reinterpret with the second. This gap is
        the source of ALL wit, metaphor, symbolism, and suspense.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-019"
      title: "The Search-and-Produce Mechanism"
      content: >
        Your unconscious mind has a scanning mechanism that waits for search
        commands. You give it a command ("Where is the contrast?") and it
        scans your vocabulary and experience for solutions.
      domain: creativity
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-020"
      title: "Film-Strip Time"
      content: >
        When images are arranged in perfect chronological sequence, the
        reader experiences text like watching a film. This allows even very
        long sentences to remain immediately understandable.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MM-ES-021"
      title: "Shop Window Words"
      content: >
        In information writing, words should be transparent — reader sees
        through them to images. In impact writing, the words themselves
        become part of the display.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

  L3_HEURISTICAS:
    - id: "HEUR-ES-001"
      title: "One Desire Per Headline"
      content: >
        Your headline can tap only one mass desire at a time. Trying to
        address multiple desires in a single headline dilutes the power of
        each one.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-002"
      title: "Name the Desire/Solution First"
      content: >
        In 3rd/4th stage awareness, name the desire or solution in the
        headline before anything else. The prospect needs to see their
        problem or want reflected immediately.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-003"
      title: "Never Mention Price to Unaware Prospects"
      content: >
        Price means nothing to unaware prospects. They don't yet know they
        want the product, so a price point has no reference frame and no
        persuasive power.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-004"
      title: "Never Lead With Product Name to Unaware Markets"
      content: >
        Product name means nothing to the unaware. Leading with a brand name
        in an unaware market wastes the most valuable real estate in your ad.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-005"
      title: "Be Simple If First to Market"
      content: >
        If first in market, be simple, direct, don't be fancy. The virgin
        market doesn't need cleverness — it needs a clear statement of
        what you offer.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-006"
      title: "Enlarge the Claim If Second"
      content: >
        If second to market, enlarge, extend, or embellish the existing
        claim. You cannot simply repeat what the first advertiser said —
        you must go bigger or more specific.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-007"
      title: "New Mechanism for Third-Stage Markets"
      content: >
        When the market has heard all the claims, introduce a NEW MECHANISM.
        The prospect is tired of promises — show them a new way, a new
        technology, a new method that makes old promises credible again.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-008"
      title: "Elaborate the Mechanism for Fourth-Stage"
      content: >
        Fourth-stage markets require elaboration and proof of mechanism.
        Simply naming the mechanism is no longer enough — you must explain
        how and why it works in detail.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-009"
      title: "Sell Identification in Fifth-Stage"
      content: >
        When the market is exhausted, shift to identification. Sell feeling,
        personality, image. The prospect has heard every claim and every
        mechanism — now sell who they become.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-010"
      title: "Measure Claims With Specifics"
      content: >
        Replace vague claims with specifics. "In two seconds" is stronger
        than "quickly." Specific numbers, times, and measurements make
        claims believable and memorable.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-011"
      title: "Use Sensory Language"
      content: >
        Make the prospect feel, smell, touch, see, or hear the claim.
        Sensory language bypasses intellectual resistance and creates
        direct experience of the benefit.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-012"
      title: "Demonstrate With Prime Example"
      content: >
        Show a specific extreme demonstration instead of an abstract claim.
        One vivid example is worth a thousand generalizations. Choose the
        most dramatic case that proves your point.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-013"
      title: "Remove Limitations in Headlines"
      content: >
        Adding "WITHOUT SURGERY" or similar limitation-removal dramatically
        increases appeal. Removing the perceived cost or pain of achieving
        the benefit multiplies desire.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-014"
      title: "Proof Copy Must Also Sell"
      content: >
        Documentation and proof should be woven throughout the ad, not
        isolated in a separate section. Every proof element should
        simultaneously reinforce desire and build credibility.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-015"
      title: "Use Transitional Logic Words"
      content: >
        Words like "therefore" and "here's why" carry the emotional force
        of logical proof even when the actual logic is emotional. They
        create the feeling of irrefutable reasoning.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-016"
      title: "Price Cuts Need Mechanism"
      content: >
        Every bargain needs a reason-why for the low price. Without a
        credible explanation for why the price is low, the prospect
        suspects inferior quality.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-017"
      title: "Read Your Copy Aloud"
      content: >
        Rhythms carry emotional force. Read your copy aloud to check
        cadence, flow, and natural speech patterns. What sounds awkward
        spoken will feel awkward read.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-018"
      title: "Momentum Through Incomplete Thoughts"
      content: >
        Withhold the next logical thought until the next paragraph to compel
        continued reading. The incomplete thought creates a mental itch that
        can only be scratched by reading on.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-019"
      title: "Condense the Claim by Interchanging Products"
      content: >
        Replace the measurement with a parallel reality to condense
        and dramatize the claim. "Pour yourself a new engine!" is more
        powerful than "This oil extends engine life by 50%."
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-020"
      title: "Challenge Limiting Beliefs"
      content: >
        "You are twice as smart as you think." Challenge self-imposed
        limitations. When you tell the prospect they are capable of more
        than they believe, you create an emotional bond and open them to
        your message.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-021"
      title: "Bad-Good Parallelism"
      content: >
        Alternate competitor weakness and your strength in a bad-good,
        bad-good pattern. This point-by-point contrast accumulates
        devastating comparative force.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-022"
      title: "Three Headline Questions"
      content: >
        Before writing any headline, answer three questions: (1) What is
        the mass desire that creates this market? (2) How much does the
        prospect already know about your product? (3) How many similar
        products has the prospect seen before?
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "HEUR-ES-023"
      title: "Place Connectors as Close to Front of Each Image as Possible"
      content: >
        Let the reader know immediately how each new image relates to the
        previous one. Front-loaded connectors eliminate confusion and
        maintain reading flow.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-024"
      title: "If Reader Has to Re-Read, Sentence Has Failed"
      content: >
        First-time understanding is the goal. If the reader takes two
        passes to understand a sentence, simplify it. The reader should
        never have to backtrack.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-025"
      title: "End Sentence at the Overloaded Word"
      content: >
        When a Picture Word is overloaded with too much information, end
        the sentence at that word. Start the next sentence by repeating
        that word to give the reader a fresh start.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-026"
      title: "The Simpler the Thought, the Longer the Sentence Can Be"
      content: >
        Simple thoughts allow longer sentences because the reader's mind
        is not strained. Complex thoughts need shorter sentences to prevent
        cognitive overload.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-027"
      title: "Save Short Sentences for Important Points"
      content: >
        Short sentences create emphasis through contrast. Use them for key
        ideas and important points, not for trivial information. Their
        power comes from scarcity.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-028"
      title: "The Overnight Test for Clarity"
      content: >
        Write your text, leave it overnight, then re-read it cold the next
        morning. Fresh eyes reveal ambiguities, confusion, and weaknesses
        that were invisible during writing.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-029"
      title: "Connectors Before Content"
      content: >
        Signal the relationship first, before delivering the content. Put
        "But" before a contradiction. Put "Because" before a reason. The
        connector prepares the reader's mind for what follows.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-030"
      title: "Hooks Go at Beginnings and Ends"
      content: >
        The beginning and end of any piece are where hooks and punch belong.
        The middle carries the payload of information and argument. Power
        positions are at the edges.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-031"
      title: "First Get the Idea Down, Then Sharpen"
      content: >
        Let ideas flow first without trying to make every sentence brilliant
        on the first pass. Capture the thought, then return to sharpen,
        compress, and add punch.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-032"
      title: "Cut Any Metaphor After 2-3 Extensions"
      content: >
        A metaphor wears out after 2-3 extensions. Beyond that, it becomes
        strained and distracting. Return to original direct language before
        the metaphor collapses.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-033"
      title: "'Like' Weakens Metaphor"
      content: >
        Simile ("like a plow") is weaker than direct metaphor ("plowed
        through"). The word "like" introduces distance between the image
        and the subject, reducing impact.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-034"
      title: "Ambiguity = Always from Too Few Words"
      content: >
        Every ambiguity comes from having too few words, not too many. When
        a sentence is unclear, the fix is almost always to add clarifying
        words, not to remove them.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-035"
      title: "Your Reader Hears What She Reads"
      content: >
        The reader unconsciously hears the text as she reads. Alliteration,
        rhythm, and sound patterns affect the reading experience even in
        silent reading. Write for the inner ear.
      domain: communication-psychology
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-036"
      title: "Keep Action and Reaction Close Together"
      content: >
        Nothing should intervene between cause and effect in text. When
        action and reaction are separated by intervening material, the
        reader loses the connection between them.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "HEUR-ES-037"
      title: "Always Choose Simplicity Over Variety"
      content: >
        If you must choose between simplicity and variety, simplicity wins
        every time. Variety for its own sake confuses; simplicity for
        clarity's sake communicates.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

  L4_FRAMEWORKS:
    - id: "FW-ES-001"
      title: "5 Levels of Market Awareness"
      content: >
        Level 1 Most Aware: prospect knows product and just needs the deal
        (use product name and price). Level 2 Product-Aware: prospect knows
        product but isn't convinced (sharpen and prove claims). Level 3
        Solution-Aware: prospect knows the result they want but not your
        product (name the desire or solution in headline). Level 4
        Problem-Aware: prospect senses the problem but doesn't know the
        solution (crystallize the problem, then present solution). Level 5
        Completely Unaware: prospect doesn't know they have a problem (use
        story, emotion, or identity to enter the conversation).
      domain: market-analysis
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-002"
      title: "5 Stages of Market Sophistication"
      content: >
        Stage 1 Virgin Market: be direct and simple — state claim directly.
        Stage 2 Second to Market: enlarge the claim — go bigger or more
        specific than the first advertiser. Stage 3 Mechanism Stage: the
        market has heard all claims — introduce a new mechanism (the how).
        Stage 4 Elaborate Stage: mechanisms are also known — prove your
        mechanism works with detail and evidence. Stage 5 Identification
        Stage: market is exhausted — sell identity, feeling, and personality
        instead of claims.
      domain: market-analysis
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-003"
      title: "7 Techniques of Breakthrough Copy"
      content: >
        Seven master techniques for the body of advertising copy:
        (1) Intensification — heighten desire through detail, action, and
        sensory language. (2) Identification — build identity bridges
        between prospect and product. (3) Gradualization — lead the
        prospect step by step from accepted truths to your claim.
        (4) Redefinition — redefine the product, problem, or market to
        your advantage. (5) Mechanization — introduce and feature the
        mechanism that makes your claim credible. (6) Concentration —
        focus comparative attention on competitor weakness vs your
        strength. (7) Camouflage — disguise the ad as editorial, news,
        or conversation to bypass resistance.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-004"
      title: "13 Ways to Intensify Desire"
      content: >
        Thirteen techniques to heighten desire in copy: (1) Full detail of
        the benefit. (2) Put the benefit in action. (3) Bring the reader
        into the scene. (4) Show how to test/verify. (5) Stretch the
        benefit across time (past, present, future). (6) Bring an audience
        to witness. (7) Show expert approval. (8) Compare and prove against
        alternatives. (9) Picture the negative (life without). (10) Show
        how easy it is. (11) Use metaphor to amplify. (12) Summarize all
        benefits together. (13) Guarantee satisfaction.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-005"
      title: "38 Headline Verbalization Techniques"
      content: >
        Comprehensive toolkit for verbalizing headlines: measure the claim,
        add time specificity, compare to known quantities, metaphorize,
        sensitize with sensory language, demonstrate with prime example,
        dramatize consequences, remove limitations ("without X"), associate
        with authorities, show before/after, challenge beliefs, use
        exclusivity, ask inclusion questions, use news angle, project into
        future, strip to essence, interchange products, and many more.
        Each technique transforms a bare claim into a compelling headline.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-006"
      title: "Three Redefinition Strategies"
      content: >
        Three ways to redefine the selling proposition: Simplification —
        redefine complexity as simple (make the hard look easy). Escalation
        — enlarge the perceived importance of the product or benefit beyond
        its category. Price Reduction — provide a credible mechanism for
        why the price is lower than expected.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-007"
      title: "Three Stages of Mechanization"
      content: >
        Three progressive stages for featuring a mechanism in copy: Stage 1
        Name the mechanism — give it a distinctive name. Stage 2 Describe
        the mechanism — explain how it works. Stage 3 Feature the mechanism
        — make the mechanism itself the star of the ad, with proof and
        detail of why it produces results.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-008"
      title: "Two Concentration Strategies"
      content: >
        Two strategies for concentration copy: Point-by-point parallelism —
        bad-good alternation where each competitor weakness is immediately
        contrasted with your strength. Time-sequence contrast — show a
        recurring pattern of failure, building frustration, then break the
        pattern with your product.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-009"
      title: "Three Camouflage Strategies"
      content: >
        Three ways to camouflage advertising to bypass resistance: Borrow
        the publication format — make the ad look like editorial content.
        Borrow news credibility — frame the ad as a news story or
        announcement. Borrow conversational tone — write as if having a
        personal conversation with the reader.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-010"
      title: "Six Final Touches"
      content: >
        Six finishing elements for polishing copy: Verification — check
        every claim against facts. Reinforcement — strengthen weak spots.
        Interweaving — blend proof, promise, and identification throughout.
        Sensitivity — tune language to audience's emotional state. Momentum
        — ensure every paragraph pulls toward the next. Mood — maintain
        consistent emotional tone from start to finish.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-011"
      title: "The Headline Planning Process"
      content: >
        Three-step process for planning headlines: (1) Define the mass
        desire — identify the strongest single desire driving the market.
        (2) Select best product performance — match the strongest desire to
        the strongest product benefit. (3) Determine awareness level and
        sophistication stage — choose the right headline strategy based on
        where the market stands.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-012"
      title: "Seven Tasks for Product-Aware Headlines"
      content: >
        Seven specific tasks headlines can perform when the prospect already
        knows the product: Reinforce desire for the benefit. Sharpen the
        product image. Extend existing claims further. Introduce new proof.
        Introduce a new mechanism. Eliminate perceived limitations. Deny
        competitor claims directly.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-013"
      title: "The Inclusion Question"
      content: >
        Ask a question designed to get the prospect to identify with the
        scenario described. The question forces a series of "yes" agreements
        that pull the reader deeper into the copy and closer to acceptance.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-014"
      title: "Goal-Conclusion Technique"
      content: >
        State the strongest claim early as an implication rather than a
        direct statement. Build proof gradually throughout the copy. The
        prospect reaches the conclusion himself, making it far more
        convincing than if you stated it directly.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "FW-ES-015"
      title: "The Two-Word Grammar System"
      content: >
        Replace the traditional 8 parts of speech with just 2 categories:
        Picture Words — words that carry images and create mental pictures
        in the reader's mind. Connecting Words — words that show
        relationships between images (space, time, cause, identity). This
        simplification makes writing dramatically clearer.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-016"
      title: "The Six Types of Connecting Words"
      content: >
        Six categories of connecting words that show relationships between
        images: Space connectors (in, on, above, below). Time connectors
        (before, after, when, while). Cause-and-Effect connectors (because,
        therefore, so). Road-Sign connectors (but, however, although).
        Identity connectors (is, was, equals). Pointer connectors (this,
        that, these, those).
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-017"
      title: "The Three Sentence Connectors"
      content: >
        Three ways to connect sentences: Linking connectors — explicit
        words like "but," "however," "therefore" that signal relationship.
        Condensing connectors — pronouns like "he," "she," "it," "this"
        that compress previous ideas. No-Word connectors — structural
        devices like colons, semicolons, and parallel construction.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-018"
      title: "The Simplification Procedure (4-Step)"
      content: >
        Four-step procedure for simplifying confusing sentences: Step 1
        Separate the sentence into individual images. Step 2 Check each
        image for overloading (too much information). Step 3 End the
        sentence at the overloaded word. Step 4 Start the next sentence
        by repeating that word, giving the reader a fresh starting point.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-019"
      title: "The Set-Apart Structures (7 Types)"
      content: >
        Seven types of set-apart structures for adding secondary information
        to sentences: Comment — aside or editorial note. Cause — explaining
        why. Elaboration — expanding on a point. Contrast — showing
        difference. Definition — clarifying meaning. Detail — adding
        specifics. Repetition — restating for emphasis or clarity.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-020"
      title: "The Simplification Structures (7 Types)"
      content: >
        Seven structures for building long but clear sentences: Expansion —
        extending the base idea. Repetition — restating in different words.
        Dependent — adding conditional or qualifying information. Time
        Sequence — arranging in chronological order. Steps — presenting
        sequential actions. Forward Signal — previewing what comes next.
        Summary — condensing what was said.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-021"
      title: "The Four Sources of Ambiguity"
      content: >
        Four sources that create ambiguity in writing: Missing details —
        not enough information for the reader to form a clear image.
        Picture Word with 2 meanings — a word that could be interpreted
        two ways. Connecting Word linking to multiple references — unclear
        what the connector points to. Misplaced Picture Word — an image
        in the wrong position in the sentence.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-022"
      title: "The Pivot Word System (5 Applications)"
      content: >
        Five applications of the Pivot Word — a word with multiple meanings
        that creates surprise when the second meaning is revealed: Wit —
        humor from unexpected meaning shift. Puns — wordplay from double
        meaning. Metaphor — transferring qualities between domains.
        Symbolism — concrete word carrying abstract meaning. Suspense —
        withholding which meaning applies until later.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-023"
      title: "The Two Search Commands"
      content: >
        Two master search commands to train the unconscious creative engine:
        "Where can I use CONTRAST?" — scan any situation for opposing
        elements that can be juxtaposed. "How can I IMPLY this?" — search
        for ways to let the reader complete the thought rather than stating
        it directly. Regular practice of these commands trains the mind to
        produce brilliance automatically.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-024"
      title: "The 12 Implication Devices"
      content: >
        Twelve specific devices for creating powerful implications:
        (1) Chop-Off — cut sentence before conclusion, let reader finish.
        (2) Summary Word — replace detailed description with single loaded
        word. (3) Reversal — flip expected direction. (4) Visual Definition
        — define through vivid image. (5) Delayed Revelation — withhold key
        information. (6) Preconception Violation — subvert what reader
        expects. (7) Metaphorical Contest — pit metaphors against each
        other. (8) Cliche Subversion — twist familiar phrase. (9) Surprising
        Opposites — combine contradictory elements. (10) Humorous Repetition
        — repeat with escalating absurdity. (11) Bounce-Back — return
        speaker's words against them. (12) Outright Word Contrast — direct
        opposition of terms.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-025"
      title: "The Elaboration Structure"
      content: >
        Structure for building extended discourse: Start with core idea,
        then choose elaboration type (definition, contrast, detail, cause,
        example). Write the core sentence, then elaborate. Bridge to the
        next paragraph with a connector. Bridge to the next core idea.
        Repeat the pattern throughout the piece.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "FW-ES-026"
      title: "The 15 Sentence Strengtheners"
      content: >
        Fifteen techniques for strengthening sentences: (1) Scan for boredom
        and cut. (2) Add alliteration. (3) Keep action and reaction close.
        (4) Break synonym patterns — use unexpected word choices. (5) Insert
        fresh metaphor. (6) Choose appropriate register (formal/informal).
        (7) Build metaphorical universe. (8) Create ambiguity hook. (9)
        Draft first, then sharpen. (10) Use transparent words for clarity.
        (11) Borrow truth from proverbs or accepted wisdom. (12) Use
        expanding clauses. (13) Place hooks at beginnings and ends. (14)
        Visualize the debate — write as if arguing. (15) Use power positions
        — most important words at sentence start and end.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

  L5_METODOLOGIAS:
    - id: "MET-ES-001"
      title: "The Complete Ad Creation Process"
      content: >
        Eight-step methodology for creating a complete advertisement:
        Step 1 Analyze the market — identify mass desires, awareness level,
        and sophistication stage. Step 2 Analyze the product — list all
        physical attributes and performances. Step 3 Select the strongest
        performance — match to the strongest market desire. Step 4 Determine
        awareness level — choose headline strategy accordingly. Step 5
        Determine sophistication stage — choose claim presentation
        accordingly. Step 6 Write the headline — using verbalization
        techniques. Step 7 Build the body — apply the 7 techniques
        (intensification, identification, gradualization, redefinition,
        mechanization, concentration, camouflage) as needed. Step 8 Apply
        final touches — verification, reinforcement, interweaving,
        sensitivity, momentum, mood.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-002"
      title: "Gradualization Architecture"
      content: >
        Seven-step methodology for gradually leading prospects to your
        claim: Step 1 Start with an accepted truth that no one disputes.
        Step 2 Use inclusion questions to get mental agreement. Step 3
        Build a stream of agreements that carry the reader forward.
        Step 4 Introduce the goal-conclusion — your strongest claim as an
        implication. Step 5 Provide proof that supports the conclusion
        the reader has already formed. Step 6 Transition to the product
        as the natural fulfillment. Step 7 State the full claim now that
        the reader is ready to accept it.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-003"
      title: "Product Analysis Method"
      content: >
        Five-step methodology for analyzing a product before writing:
        Step 1 List every physical attribute of the product. Step 2 List
        every performance — what the product does for the user. Step 3
        Group performances against known market desires. Step 4 Rank the
        groupings by market size and intensity of desire. Step 5 Feature
        the number one performance-desire match as your primary claim.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-004"
      title: "Campaign Intensification Method"
      content: >
        Five-step methodology for building campaign momentum: Step 1
        Establish a central theme that unifies all communications. Step 2
        Create a memorable slogan that encapsulates the theme. Step 3
        Develop variation ads that explore different facets of the theme.
        Step 4 Change illustration while keeping the headline — maintain
        recognition while refreshing visuals. Step 5 Make each execution
        new while maintaining the underlying campaign structure.
      domain: advertising-strategy
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-005"
      title: "Concentration Copy Blueprint"
      content: >
        Six-step methodology for writing concentration (comparative) copy:
        Step 1 Identify the alternative the prospect is currently using.
        Step 2 Detail the weakness of that alternative specifically.
        Step 3 Show the consequence of that weakness on the prospect's
        life. Step 4 Introduce your product as the solution. Step 5
        Contrast point-by-point — each weakness paired with your
        corresponding strength. Step 6 Accumulate through parallelism —
        the rhythm of bad-good, bad-good builds irresistible momentum.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-006"
      title: "Headline Selection Process"
      content: >
        Five-step methodology for selecting and refining headlines: Step 1
        Answer the three headline questions — what is the mass desire, how
        much does the prospect know, how many similar products has the
        prospect seen. Step 2 Draft the core claim based on your answers.
        Step 3 Apply verbalization techniques to strengthen the headline.
        Step 4 Test the headline — does it select the right audience, stop
        the reader, and compel reading of the first sentence. Step 5
        Refine until the headline passes all three tests.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-007"
      title: "Belief-Building Sequence"
      content: >
        Seven-step methodology for building belief in copy: Step 1 Open
        with a universal truth that the prospect already accepts. Step 2
        Use the language of logic — "therefore," "because," "here's why."
        Step 3 Present claims as conclusions the reader draws, not
        assertions you make. Step 4 Apply syllogistic thinking — if A is
        true and B is true, then C must be true. Step 5 Use inclusion
        questions to get the reader mentally agreeing. Step 6 Contradict
        false beliefs the prospect holds that block the sale. Step 7 Place
        the strongest claim last, after the foundation of belief is built.
      domain: persuasion
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-008"
      title: "Ad Architecture Analysis"
      content: >
        Five-step methodology for analyzing and structuring ad architecture:
        Step 1 Map paragraph functions — identify what each paragraph does
        (promise, proof, identification, close). Step 2 Track the emotional
        state of the reader at each point. Step 3 Match transitions to
        emotional shifts — ensure smooth movement between sections. Step 4
        Place proof at hunger points — where the reader's desire for
        evidence is highest. Step 5 Avoid consecutive heavy sections — no
        two dense proof paragraphs in a row without relief.
      domain: copywriting
      source_file: "breakthrough-advertising/transcription_pdf_Breakthrough-Advertising-by-Eugene-M-Schwartz.txt"

    - id: "MET-ES-009"
      title: "Sentence Construction Method"
      content: >
        Four-step methodology for constructing clear sentences: Step 1
        Choose Picture Words — select the specific images you want to
        create in the reader's mind. Step 2 Choose Connecting Words —
        select the relationship markers between images. Step 3 Place
        connectors at the front of each new image — signal the
        relationship before delivering the content. Step 4 Verify
        first-reading understanding — can the reader understand on a
        single pass without backtracking.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MET-ES-010"
      title: "The Confusing-Sentence Fix"
      content: >
        Eight-step methodology for fixing confusing sentences: Step 1
        Read the sentence once. Step 2 Number each image in the sentence.
        Step 3 Find the overloaded word — the point where meaning breaks
        down. Step 4 End the sentence at that word. Step 5 Repeat the
        overloaded word at the start of the next sentence. Step 6 Continue
        the remaining images in the new sentence. Step 7 Add connectors
        to clarify relationships. Step 8 Verify that both new sentences
        are clear on first reading.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MET-ES-011"
      title: "The Clarity Check Method"
      content: >
        Seven-step methodology for ensuring writing clarity: Step 1 Write
        the text as simply as possible. Step 2 Leave overnight — allow
        time for fresh perspective. Step 3 Return cold the next morning
        and re-read. Step 4 Check for any possible misinterpretation —
        can any sentence be read two ways. Step 5 Identify the cause from
        the 4 sources of ambiguity (missing details, double-meaning word,
        multi-linking connector, misplaced word). Step 6 Add words to
        eliminate the ambiguity — clarity comes from more words, not fewer.
        Step 7 Re-verify that the fix didn't create new ambiguity.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MET-ES-012"
      title: "The Epigram Creation Method"
      content: >
        Seven-step methodology for creating memorable epigrams and punchy
        statements: Step 1 Identify the core thought you want to express.
        Step 2 Search for contrast — what is the opposing element. Step 3
        Find the opposing elements that create tension. Step 4 Search for
        implication — what can be left unstated for the reader to complete.
        Step 5 Choose the implication device (from the 12 devices). Step 6
        Construct the setup-payoff — pullback then strike. Step 7 Test
        reader completion — does the reader automatically fill in the
        unstated conclusion.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MET-ES-013"
      title: "The Discourse Building Method"
      content: >
        Eight-step methodology for building extended discourse: Step 1
        Identify the core idea for the section. Step 2 Choose the
        elaboration type (definition, contrast, detail, cause, example).
        Step 3 Write the core sentence that states the idea. Step 4
        Elaborate using the chosen type. Step 5 Bridge to the next
        paragraph with an appropriate connector. Step 6 Bridge to the
        next core idea with a transition. Step 7 Repeat the pattern
        (core-elaborate-bridge) throughout the piece. Step 8 Place a
        hook at the opening and a strong close at the end.
      domain: writing-mastery
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

    - id: "MET-ES-014"
      title: "The Metaphorical Universe Method"
      content: >
        Seven-step methodology for using extended metaphor effectively:
        Step 1 Find a parallel domain that illuminates your subject.
        Step 2 Introduce the metaphor with a clear bridge between domains.
        Step 3 Invite the reader into the metaphorical world. Step 4
        Extend the metaphor 1-2 times — explore the parallel. Step 5
        Use vocabulary from the metaphorical domain. Step 6 Exit the
        metaphor after 2-3 extensions — before it becomes strained.
        Step 7 Return to direct language refreshed by the perspective
        the metaphor provided.
      domain: rhetoric
      source_file: "the-brilliance-breakthrough/transcription_pdf_Eugene-Schwartz-The-Brilliance-Breakthough.txt"

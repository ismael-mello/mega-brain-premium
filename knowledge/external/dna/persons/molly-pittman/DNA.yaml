layers:

  L1_PHILOSOPHIES:
    - id: "FIL-MP-001"
      title: "Media Buyer Identity"
      content: "A media buyer aggregates and purchases attention. Media buyers connect consumers with brands that may be of service or interest to their life."
      domain: media-buying-identity
      source: "PTM"

    - id: "FIL-MP-002"
      title: "Human to Human (H2H)"
      content: "All marketing is human to human. Behind every click, every impression, every conversion is a real person with real problems. Never forget the human on the other side of the screen."
      domain: traffic-psychology
      source: "PTM"

    - id: "FIL-MP-003"
      title: "Ethics First"
      content: "The best media buyers are ethical. We have a responsibility to connect people with products and services that genuinely help them. Traffic is a tool - use it for good."
      domain: media-buying-identity
      source: "PTM"

    - id: "FIL-MP-004"
      title: "Offer Before Traffic"
      content: "Traffic is the amplifier, not the solution. If your offer does not convert organically or in small tests, more traffic will only lose money faster. Fix the offer first."
      domain: offer-strategy
      source: "PTM"

    - id: "FIL-MP-005"
      title: "Testing Is the Job"
      content: "The job of a media buyer is to test. You are a professional tester. Most campaigns will fail - that is normal. Your edge is systematic testing and optimization."
      domain: campaign-optimization
      source: "PTM"

    - id: "FIL-MP-006"
      title: "Traffic Store Mindset"
      content: "Think of traffic platforms as stores where you buy attention. Facebook, Google, YouTube - each is a store with different inventory, pricing, and customer types."
      domain: media-buying
      source: "PTM"

    - id: "FIL-MP-007"
      title: "Data Over Feelings"
      content: "Never make traffic decisions based on feelings. The data tells the truth. Let the numbers guide every decision - pause, scale, or optimize based on metrics, not gut."
      domain: campaign-optimization
      source: "PTM"

    - id: "FIL-MP-008"
      title: "Patience in Testing"
      content: "Give campaigns enough time and budget to gather statistically significant data before making decisions. Premature optimization kills more campaigns than bad creative."
      domain: campaign-optimization
      source: "PTM"

    - id: "FIL-MP-009"
      title: "Traffic Temperature Awareness"
      content: "Not all traffic is created equal. Cold traffic needs education, warm traffic needs nurture, hot traffic needs a clear call to action. Match your message to the temperature."
      domain: traffic-psychology
      source: "PTM"

    - id: "FIL-MP-010"
      title: "Platform Agnosticism"
      content: "The principles of paid traffic transcend any single platform. Platforms change, algorithms update, features come and go - but the fundamentals of buying attention remain constant."
      domain: media-buying
      source: "PTM"

    - id: "FIL-MP-011"
      title: "Congruence Principle"
      content: "The ad, the landing page, and the offer must be congruent. If the ad promises X, the landing page must deliver X. Incongruence kills conversions and wastes budget."
      domain: conversion-optimization
      source: "PTM"

    - id: "FIL-MP-012"
      title: "Budget Is Not the Bottleneck"
      content: "Budget is rarely the real bottleneck. The bottleneck is usually the offer, the creative, or the funnel. More money on a broken system just means bigger losses."
      domain: scaling-strategy
      source: "PTM"

    - id: "FIL-MP-013"
      title: "Traffic Is a Skill"
      content: "Paid traffic is a learnable, practicable skill - not a talent. Anyone willing to study the principles, practice the execution, and learn from data can master it."
      domain: media-buying
      source: "PTM"

    - id: "FIL-MP-014"
      title: "Failure Is Data"
      content: "A failed campaign is not a failure - it is data. Every test that does not work teaches you something about your audience, your offer, or your creative. Failure is tuition."
      domain: campaign-optimization
      source: "PTM"

    - id: "FIL-MP-015"
      title: "Creative Fatigue Is Inevitable"
      content: "All ad creative has a shelf life. Accept that creative fatigue is inevitable and build systems to continuously produce and test new creative."
      domain: ad-creative
      source: "PTM"

    - id: "FIL-MP-016"
      title: "Test Small Scale Big"
      content: "Always test with small budgets before scaling. Prove the concept at $50/day before spending $500/day. Small tests reduce risk and reveal winners."
      domain: campaign-optimization
      source: "PTM"

    - id: "FIL-MP-017"
      title: "Speed of Implementation"
      content: "In paid traffic, speed of implementation beats perfection. Launch fast, learn from data, iterate. A campaign running imperfectly teaches more than one planned perfectly but never launched."
      domain: campaign-optimization
      source: "PTM"

    - id: "FIL-MP-018"
      title: "Perpetual Traffic Philosophy"
      content: "The goal is perpetual, evergreen traffic systems that run 24/7 - not launch-dependent spikes. Build systems that generate leads and sales while you sleep."
      domain: scaling-strategy
      source: "PTS"

    - id: "FIL-MP-019"
      title: "Water Hose Analogy"
      content: "Traffic is like a water hose. You can point it at anything - a landing page, a blog post, a video. The hose does not care. Your job is to point it at the right thing at the right time."
      domain: media-buying
      source: "PTS"

    - id: "FIL-MP-020"
      title: "Breakeven Acquisition"
      content: "The goal of front-end traffic is to break even on customer acquisition. Profit comes from the back end. If you can acquire customers at breakeven, you have an infinite growth machine."
      domain: customer-acquisition
      source: "PTS"

    - id: "FIL-MP-021"
      title: "Retargeting Power"
      content: "Retargeting is the most powerful weapon in digital marketing. Someone who has already engaged with your brand is exponentially more likely to convert. Never leave retargeting money on the table."
      domain: retargeting
      source: "PTS"

    - id: "FIL-MP-022"
      title: "Three Campaign Types Rule"
      content: "Every business needs exactly three campaign types running at all times: acquisition (cold), retargeting (warm), and monetization (hot). This is non-negotiable."
      domain: paid-traffic
      source: "PTS"

    - id: "FIL-MP-023"
      title: "Ungated Value First"
      content: "Give massive value before asking for anything. Ungated content builds trust and creates retargeting audiences. The more you give, the more permission you earn to sell."
      domain: content-marketing
      source: "PTS"

    - id: "FIL-MP-024"
      title: "Customer Journey Respect"
      content: "Respect the customer journey. Not everyone is ready to buy today. Some need weeks, months, even years of nurturing. The patient marketer wins."
      domain: traffic-psychology
      source: "PTS"

    - id: "FIL-MP-025"
      title: "System Over Campaign"
      content: "Build traffic systems, not individual campaigns. A system has interconnected parts that work together - acquisition feeds retargeting, retargeting feeds monetization."
      domain: paid-traffic
      source: "PTS"
    - id: "FIL-MP-026"
      title: "Permission-Based Marketing"
      content: "The best marketing earns permission. Every touchpoint should earn the right to the next touchpoint. Do not force your way into peoples lives - be invited."
      domain: traffic-psychology
      source: "PTS"

    - id: "FIL-MP-027"
      title: "Lifetime Value Thinking"
      content: "Always think in terms of lifetime customer value, not single transaction value. This changes every acquisition decision you make."
      domain: customer-acquisition
      source: "PTS"

    - id: "FIL-MP-028"
      title: "Bottom of Funnel Efficiency"
      content: "Your bottom-of-funnel campaigns should always be your most efficient. If retargeting is not profitable, something is fundamentally wrong with your offer."
      domain: retargeting
      source: "PTS"

    - id: "FIL-MP-029"
      title: "Ecosystem Thinking"
      content: "Your traffic does not exist in isolation. It is part of an ecosystem - content, email, social, ads, retargeting - all working together. Optimize the ecosystem, not just the campaign."
      domain: paid-traffic
      source: "PTS"

    - id: "FIL-MP-030"
      title: "Full Funnel Vision"
      content: "Never optimize a single step in isolation. Every change to your ad affects your landing page performance, which affects your sales process. See the full funnel."
      domain: funnel-strategy
      source: "PTS"

    - id: "FIL-MP-031"
      title: "Revenue Per Visitor"
      content: "Track revenue per visitor, not just cost per click. A $5 click that generates $50 in revenue is better than a $0.50 click that generates nothing."
      domain: conversion-optimization
      source: "PTS"

    - id: "FIL-MP-032"
      title: "Segment Everything"
      content: "The more you segment your audiences, messages, and offers, the better your results. One-size-fits-all marketing is the most expensive kind."
      domain: audience-targeting
      source: "PTS"

    - id: "FIL-MP-033"
      title: "Trust Tax"
      content: "Cold audiences pay a trust tax - they need more touchpoints, more proof, more value before converting. Budget for the trust-building phase."
      domain: traffic-psychology
      source: "PTS"

    - id: "FIL-MP-034"
      title: "Warm and Hot Copy Matching"
      content: "Warm traffic needs different copy than cold traffic. Hot traffic needs urgency and clarity. Match your copy temperature to your audience temperature."
      domain: copywriting-ads
      source: "PTS"

    - id: "FIL-MP-035"
      title: "Blog Boomerang Principle"
      content: "Every blog post, every video, every piece of content is a boomerang - it goes out, collects an audience, and brings them back via retargeting. Content is a retargeting machine."
      domain: retargeting
      source: "PTS"

    - id: "FIL-MP-036"
      title: "Flash Sale Psychology"
      content: "Urgency and scarcity work because they are real human motivators. Use them ethically with real deadlines and real limits. Fake scarcity destroys trust."
      domain: conversion-optimization
      source: "PTS"

    - id: "FIL-MP-037"
      title: "Customer Story Power"
      content: "Customer stories are the most powerful ad creative you can run. Real people sharing real results is more persuasive than any professional ad you can produce."
      domain: ad-creative
      source: "PTS"

    - id: "FIL-MP-038"
      title: "Serve Unselfishly"
      content: "The brands that win on social media are the ones that serve their audience unselfishly. Create content that helps people, not content that just promotes your products."
      domain: content-marketing
      source: "SSM"

    - id: "FIL-MP-039"
      title: "Faceless Brand Is Dead"
      content: "The era of the faceless brand is over. People connect with people, not logos. Put a face on your brand - be human, be real, be vulnerable."
      domain: brand-building
      source: "SSM"

    - id: "FIL-MP-040"
      title: "Engaged Audience Over Size"
      content: "An engaged audience of 1,000 is more valuable than a disengaged audience of 100,000. Engagement beats reach every single time."
      domain: community-building
      source: "SSM"

    - id: "FIL-MP-041"
      title: "Farming Over Hunting"
      content: "Social selling is farming, not hunting. You plant seeds with content, water them with engagement, and harvest with offers. It is a long game that compounds."
      domain: social-selling
      source: "SSM"

    - id: "FIL-MP-042"
      title: "Content Is the New Ad"
      content: "In the social era, your content IS your ad. The best-performing ads look and feel like organic content. Stop making ads that look like ads."
      domain: ad-creative
      source: "SSM"

    - id: "FIL-MP-043"
      title: "Community Before Commerce"
      content: "Build a community before you try to sell to it. People buy from brands they feel part of, not brands that just broadcast messages at them."
      domain: community-building
      source: "SSM"

    - id: "FIL-MP-044"
      title: "Organic Validates Paid"
      content: "If content works organically, it will almost certainly work as a paid ad. Use organic as your testing ground for paid - it is free research and development."
      domain: content-marketing
      source: "SSM"

    - id: "FIL-MP-045"
      title: "Attention Is the Currency"
      content: "Attention is the most valuable currency in the digital age. Every platform is an attention marketplace. The brands that win are the ones that earn and hold attention."
      domain: media-buying
      source: "SSM"

    - id: "FIL-MP-046"
      title: "Value First Always"
      content: "Lead with value in every touchpoint. Every ad should either educate, entertain, or inspire - ideally all three. Value-first marketing earns the right to sell."
      domain: content-marketing
      source: "SSM"

    - id: "FIL-MP-047"
      title: "Audience Ownership"
      content: "You do not own your social media followers - the platform does. Always work to move people from rented land (social platforms) to owned land (email list, SMS)."
      domain: community-building
      source: "SSM"

    - id: "FIL-MP-048"
      title: "Authenticity Scales"
      content: "Authenticity is the most scalable marketing strategy. Real stories, real results, real people - these resonate more than polished production at any budget level."
      domain: brand-building
      source: "SSM"

    - id: "FIL-MP-049"
      title: "Gratitude Marketing"
      content: "Express genuine gratitude to your customers and audience. Gratitude-based marketing creates loyalty that no competitor can steal with a lower price."
      domain: community-building
      source: "SSM"

    - id: "FIL-MP-050"
      title: "Audience Is the Asset"
      content: "Your audience - email list, pixel data, customer list - is the most valuable business asset you own. Products change, platforms change, but your audience is portable."
      domain: community-building
      source: "SSM"

    - id: "FIL-MP-051"
      title: "Consistency Compounds"
      content: "Show up consistently on social media. The algorithm rewards consistency, and your audience comes to expect and rely on your presence. Sporadic posting kills momentum."
      domain: content-marketing
      source: "SSM"

    - id: "FIL-MP-052"
      title: "Native Over Disruptive"
      content: "The best ads are native to the platform. They look, feel, and sound like the content people came to the platform to consume. Disruptive ads get scrolled past."
      domain: ad-creative
      source: "SSM"

    - id: "FIL-MP-053"
      title: "Content Flywheel"
      content: "Create content once, distribute it everywhere, amplify the winners with paid. This content flywheel is the most efficient way to build a brand and generate leads simultaneously."
      domain: content-marketing
      source: "SSM"

    - id: "FIL-MP-054"
      title: "Reciprocity Engine"
      content: "Every piece of free value you give creates a reciprocity bank. When you finally ask for the sale, that bank gets withdrawn. The bigger the bank, the easier the sale."
      domain: social-selling
      source: "SSM"

    - id: "FIL-MP-055"
      title: "Generosity as Strategy"
      content: "Be the most generous brand in your market. Give away your best stuff. The more you give, the more you create buyers. Generosity is not a cost - it is an investment."
      domain: content-marketing
      source: "SSM"

    - id: "FIL-MP-056"
      title: "Conversation Not Broadcast"
      content: "Social media is a conversation, not a broadcast. Brands that talk AT people lose. Brands that talk WITH people win. Engage in the comments, DMs, and stories."
      domain: social-selling
      source: "SSM"

    - id: "FIL-MP-057"
      title: "Service Mindset"
      content: "Approach every ad, every piece of content, every funnel with a service mindset. How can I help this person? That question should drive every marketing decision."
      domain: traffic-psychology
      source: "TMTP"

    - id: "FIL-MP-058"
      title: "Mindset Over Tactics"
      content: "Tactics change every 6 months. The right mindset lasts a career. Understand WHY traffic works, not just HOW to set up campaigns."
      domain: media-buying
      source: "TMTP"

    - id: "FIL-MP-059"
      title: "Empathy in Advertising"
      content: "The best advertisers are empaths. They deeply understand the pain, desires, fears, and aspirations of their audience. Empathy is the ultimate targeting tool."
      domain: traffic-psychology
      source: "TMTP"

    - id: "FIL-MP-060"
      title: "Digital Age Opportunity"
      content: "We are living in the greatest era of opportunity in human history. The ability to reach any person on the planet with a message has never been more accessible or affordable."
      domain: media-buying
      source: "TMTP"

    - id: "FIL-MP-061"
      title: "Compounding Returns"
      content: "Traffic systems compound over time. Pixel data gets smarter, audiences get warmer, content libraries grow. The longer you run, the better your results get."
      domain: scaling-strategy
      source: "TMTP"

    - id: "FIL-MP-062"
      title: "Multi-Channel Imperative"
      content: "No brand should depend on a single traffic source. Diversify across platforms so that no single algorithm change can destroy your business."
      domain: paid-traffic
      source: "TMTP"

    - id: "FIL-MP-063"
      title: "Creative Is the New Targeting"
      content: "As platform targeting gets broader, creative becomes your targeting mechanism. The right creative naturally attracts the right audience - the algorithm just amplifies it."
      domain: ad-creative
      source: "TMTP"

    - id: "FIL-MP-064"
      title: "Iteration Over Innovation"
      content: "In paid traffic, iteration beats innovation 90 percent of the time. Small improvements to proven campaigns outperform big swings at new ideas."
      domain: campaign-optimization
      source: "TMTP"

    - id: "FIL-MP-065"
      title: "Simplicity Wins"
      content: "The simplest traffic strategy executed consistently will outperform a complex strategy executed sporadically. Simplify everything."
      domain: scaling-strategy
      source: "TMTP"

    - id: "FIL-MP-066"
      title: "Pixel as Memory"
      content: "Your pixel is the memory of your business. It remembers every visitor, every action, every conversion. Feed it data consistently and it becomes your most valuable asset."
      domain: retargeting
      source: "TMTP"

    - id: "FIL-MP-067"
      title: "Message Market Match"
      content: "The number one reason campaigns fail is message-market mismatch. Your message must match the conversation already happening in your prospects mind."
      domain: ad-creative
      source: "TMTP"

    - id: "FIL-MP-068"
      title: "Scale Is a Process"
      content: "Scaling is not flipping a switch. It is a methodical process of increasing budget while maintaining efficiency. Rush it and you will break what is working."
      domain: scaling-strategy
      source: "TMTP"

    - id: "FIL-MP-069"
      title: "Intent Beats Demographics"
      content: "On search platforms, intent beats demographics every time. Someone actively searching for your solution is worth 100x more than a demographic match who is not searching."
      domain: google-ads
      source: "TMTP"

    - id: "FIL-MP-070"
      title: "Time-Delayed ROI"
      content: "In paid traffic, ROI is often time-delayed. Day-1 ROAS may be negative, but 30-day or 60-day ROAS can be wildly profitable. Track cohorts, not just daily metrics."
      domain: customer-acquisition
      source: "TMTP"

    - id: "FIL-MP-071"
      title: "Omnichannel Presence"
      content: "Your customer lives across multiple platforms throughout their day. Show up where they are, when they are there, with the right message for that context."
      domain: paid-traffic
      source: "TMTP"

    - id: "FIL-MP-072"
      title: "Profitable at Scale"
      content: "A business that cannot acquire customers profitably at scale does not really have a business - it has a hobby. Paid traffic is the ultimate test of product-market fit."
      domain: customer-acquisition
      source: "TMTP"

    - id: "FIL-MP-073"
      title: "Creative Volume Wins"
      content: "The brand that produces the most creative variations will win. More creative equals more tests equals more data equals more winners. Build a creative machine."
      domain: ad-creative
      source: "TMTP"

    - id: "FIL-MP-074"
      title: "Paid Amplifies Organic"
      content: "Paid traffic amplifies what already works organically. It does not fix what is broken. If your offer and content do not work organically, they will not work with paid either."
      domain: paid-traffic
      source: "SSM"

    - id: "FIL-MP-075"
      title: "Algorithm as Partner"
      content: "Work WITH the algorithm, not against it. The algorithm wants to show relevant content to the right people. Help it by providing good creative, clear signals, and sufficient data."
      domain: media-buying
      source: "TMTP"
  L2_MENTAL_MODELS:
    - id: "MM-MP-001"
      title: "Traffic Store Model"
      content: "Every traffic platform is a store where you buy attention. Facebook is a social store, Google is an intent store, YouTube is a video store. Each has different inventory, pricing, and buyer behavior. Choose your store based on where your customer shops."
      domain: media-buying
      source: "PTM"

    - id: "MM-MP-002"
      title: "Traffic Temperature"
      content: "All traffic exists on a temperature spectrum: Cold (never heard of you), Warm (aware of you but not ready), Hot (ready to buy). Your messaging, offer, and funnel must match the temperature. Sending cold traffic to a sales page is like proposing on a first date."
      domain: traffic-psychology
      source: "PTM"

    - id: "MM-MP-003"
      title: "Customer Value Journey (CVJ)"
      content: "Every customer moves through 8 stages: Aware, Engage, Subscribe, Convert, Excite, Ascend, Advocate, Promote. Your traffic campaigns should move people through each stage systematically, not skip steps."
      domain: funnel-strategy
      source: "PTM"

    - id: "MM-MP-004"
      title: "Before and After Grid"
      content: "Map your customers state across 4 dimensions before and after using your product: Have (tangible), Feel (emotional), Average Day (routine), Status (social). This grid writes your ad copy for you."
      domain: ad-creative
      source: "PTM"

    - id: "MM-MP-005"
      title: "Hub and Spoke Model"
      content: "Your website or main platform is the hub. Every traffic source - Facebook, Google, YouTube, email - is a spoke. All spokes drive traffic to the hub. The hub converts. Never build spokes without a strong hub."
      domain: funnel-strategy
      source: "PTM"

    - id: "MM-MP-006"
      title: "Awareness Spectrum"
      content: "Prospects exist on an awareness spectrum from Unaware (do not know they have a problem) to Most Aware (know your product and just need the deal). Your ad must meet them at their awareness level."
      domain: traffic-psychology
      source: "PTM"

    - id: "MM-MP-007"
      title: "The 80/20 of Testing"
      content: "80 percent of your results will come from 20 percent of your tests. Most tests will fail. Your job is to find the 20 percent winners quickly and scale them aggressively while cutting losers fast."
      domain: campaign-optimization
      source: "PTM"

    - id: "MM-MP-008"
      title: "Audience Sizing Lens"
      content: "Every audience has a natural size. Too small and costs rise (limited inventory). Too big and relevance drops (wasted impressions). Find the sweet spot where your audience is large enough to be affordable but small enough to be relevant."
      domain: audience-targeting
      source: "PTM"

    - id: "MM-MP-009"
      title: "Campaign Architecture"
      content: "Think of campaigns as a 3-layer architecture: Campaign level (objective and budget), Ad Set level (targeting and placement), Ad level (creative and copy). Each layer has a distinct job. Confuse them and everything breaks."
      domain: facebook-ads
      source: "PTM"

    - id: "MM-MP-010"
      title: "The Troubleshooting Waterfall"
      content: "When a campaign is not working, diagnose from top to bottom: Offer first, then Targeting, then Creative, then Copy, then Landing Page, then Follow-up. Most people start at creative when the problem is the offer."
      domain: campaign-optimization
      source: "PTM"

    - id: "MM-MP-011"
      title: "Retargeting Windows"
      content: "Different retargeting windows serve different purposes. 1-3 days: immediate follow-up. 3-7 days: nurture. 7-14 days: re-engagement. 14-30 days: reactivation. 30-180 days: long-term remarketing."
      domain: retargeting
      source: "PTM"

    - id: "MM-MP-012"
      title: "Pixel Intelligence Model"
      content: "Your pixel learns from the data you feed it. More conversion events equals smarter optimization. The pixel needs volume to learn. Optimize for the event closest to revenue that has enough volume (minimum 50/week)."
      domain: facebook-ads
      source: "PTM"

    - id: "MM-MP-013"
      title: "Creative Angle Thinking"
      content: "Every product can be advertised from multiple angles: pain, aspiration, social proof, curiosity, fear, authority, emotion. Each angle resonates with a different segment. Test multiple angles systematically."
      domain: ad-creative
      source: "PTM"

    - id: "MM-MP-014"
      title: "The Frequency Cap Mental Model"
      content: "There is a sweet spot for how many times someone should see your ad. Too few and they do not notice. Too many and they get annoyed. Monitor frequency and rotate creative before fatigue sets in."
      domain: campaign-optimization
      source: "PTM"

    - id: "MM-MP-015"
      title: "Scale vs Efficiency Tradeoff"
      content: "As you scale spend, efficiency always decreases at some point. The question is not whether it will decrease but when and by how much. Plan for diminishing returns and set acceptable efficiency floors."
      domain: scaling-strategy
      source: "PTM"

    - id: "MM-MP-016"
      title: "Three Campaign Types Framework"
      content: "Your traffic system runs on exactly three campaign types: Acquisition (cold traffic to new audiences), Retargeting (warm traffic to engaged audiences), Monetization (hot traffic to buyers). Each type has its own metrics and goals."
      domain: paid-traffic
      source: "PTS"

    - id: "MM-MP-017"
      title: "Allens Boots Analogy"
      content: "Allens Boots in Austin has boots in the window, not in the warehouse. Your ungated content is the boots in the window - it attracts people in. Your gated offer is the sale inside. Show the goods first."
      domain: content-marketing
      source: "PTS"

    - id: "MM-MP-018"
      title: "Ungated vs Gated Content"
      content: "Ungated content (blog posts, videos, podcasts) builds audience and trust at scale for free. Gated content (lead magnets, webinars) captures contact info. Use ungated to fill the top of funnel, gated to convert."
      domain: content-marketing
      source: "PTS"

    - id: "MM-MP-019"
      title: "Warm vs Hot Copy Matching"
      content: "Warm copy acknowledges the relationship and deepens trust. Hot copy creates urgency and asks for the sale. Using hot copy on warm audiences feels pushy. Using warm copy on hot audiences misses the sale."
      domain: copywriting-ads
      source: "PTS"

    - id: "MM-MP-020"
      title: "The Perpetual Traffic Machine"
      content: "A perpetual traffic machine has 3 gears: Gear 1 acquires new audiences via content and ads, Gear 2 nurtures them via retargeting and email, Gear 3 monetizes via offers and sales campaigns. All 3 gears run simultaneously."
      domain: paid-traffic
      source: "PTS"

    - id: "MM-MP-021"
      title: "Campaign Health Indicators"
      content: "Campaign health is measured by 5 vital signs: CTR (is the ad working?), CPC (is it affordable?), Conversion Rate (is the page working?), CPA (is acquisition profitable?), ROAS (is the system generating return?)."
      domain: campaign-optimization
      source: "PTS"

    - id: "MM-MP-022"
      title: "Traffic Plays Concept"
      content: "Think of your traffic campaigns as plays in a playbook. Each play (Blog Boomerang, Comment-to-Message, Flash Sale, Customer Story, etc.) is a proven pattern you can run repeatedly."
      domain: paid-traffic
      source: "PTS"

    - id: "MM-MP-023"
      title: "The Retargeting Ladder"
      content: "Retargeting audiences form a ladder from cold to hot: Page visitors at bottom, Content engagers next, Lead magnet downloaders next, Cart abandoners next, Past buyers at top. Each rung gets a different message."
      domain: retargeting
      source: "PTS"

    - id: "MM-MP-024"
      title: "Ascension Model"
      content: "Every customer relationship is an ascension. First purchase is just the beginning. Map the natural ascension path: free content to tripwire to core offer to profit maximizer to continuity."
      domain: funnel-strategy
      source: "PTS"

    - id: "MM-MP-025"
      title: "The Blog Post as Fishing Net"
      content: "Every blog post is a fishing net thrown into the ocean of the internet. It catches fish (visitors) through SEO and social. Once caught, retargeting keeps them in your ecosystem."
      domain: content-marketing
      source: "PTS"

    - id: "MM-MP-026"
      title: "Comment-to-Message Automation"
      content: "Comments on posts are buying signals. Automate the path from comment to DM to offer. Each comment is a hand raised by a prospect - never leave a raised hand unanswered."
      domain: social-selling
      source: "PTS"

    - id: "MM-MP-027"
      title: "Flash Sale Mechanics"
      content: "A flash sale works because it creates urgency (limited time), scarcity (limited quantity), and novelty (special pricing). All three must be present and all three must be real."
      domain: conversion-optimization
      source: "PTS"

    - id: "MM-MP-028"
      title: "Customer Story as Social Proof"
      content: "Customer stories work because they are mirror neurons in action. When prospects see someone like them succeed, their brain simulates the same success. Stories sell better than statistics."
      domain: ad-creative
      source: "PTS"

    - id: "MM-MP-029"
      title: "Lookalike Audience Theory"
      content: "Lookalike audiences work by finding patterns in your best customers and finding more people like them. The quality of the seed audience determines the quality of the lookalike. Use your best customers, not all customers."
      domain: audience-targeting
      source: "PTS"

    - id: "MM-MP-030"
      title: "Traffic Source Synergy"
      content: "Traffic sources are not competitors - they are teammates. Facebook warms audiences that convert on Google. YouTube educates audiences that buy via email. Run them together for multiplied results."
      domain: paid-traffic
      source: "PTS"

    - id: "MM-MP-031"
      title: "Exclusion Targeting"
      content: "What you exclude from targeting is as important as what you include. Exclude existing customers from acquisition campaigns, exclude purchasers from retargeting, exclude engaged users from cold campaigns."
      domain: audience-targeting
      source: "PTS"

    - id: "MM-MP-032"
      title: "Engage and Filter Model"
      content: "Social content should engage broadly and filter specifically. Cast a wide net with valuable content, then filter for buyers through calls to action. Not everyone who engages will buy - and that is okay."
      domain: social-selling
      source: "SSM"

    - id: "MM-MP-033"
      title: "Content Pillars Framework"
      content: "Build your content strategy around 3-5 content pillars - core topics your brand owns. Every piece of content should map to a pillar. Pillars prevent content chaos and build topical authority."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-034"
      title: "Four Content Types Model"
      content: "All social content falls into 4 types: Educate (teach something), Entertain (make them laugh or feel), Inspire (motivate action), Convince (move toward purchase). Rotate through all four."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-035"
      title: "Shared Experiences Principle"
      content: "The strongest brands create shared experiences with their audience. Live events, challenges, behind-the-scenes content - these create bonds that no competitor can replicate."
      domain: community-building
      source: "SSM"

    - id: "MM-MP-036"
      title: "The Amplification Flywheel"
      content: "Organic reach seeds content, engagement signals quality, algorithm amplifies winners, paid boosts top performers. This flywheel compounds - each cycle makes the next one stronger."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-037"
      title: "Ambassador Pipeline"
      content: "Your best customers can become your best marketers. The pipeline: Customer to Satisfied Customer to Advocate to Ambassador. Each stage requires different nurturing."
      domain: community-building
      source: "SSM"

    - id: "MM-MP-038"
      title: "Video Hierarchy Model"
      content: "Video content follows a hierarchy of commitment: Short-form (scroll-stopping, 15-60s) to Mid-form (value delivery, 2-10min) to Long-form (deep trust, 10min+). Move people up the hierarchy."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-039"
      title: "Giveaway Mechanics"
      content: "Giveaways work as audience accelerators when designed correctly: Prize attracts the right audience (not freebie seekers), entry mechanics build your list, follow-up converts entrants to buyers."
      domain: community-building
      source: "SSM"

    - id: "MM-MP-040"
      title: "The ICOSA Framework for Branding"
      content: "Identify your brands unique identity across 5 dimensions: Visual Identity, Voice, Values, Vocabulary, and Vibe. All 5 must be consistent across every touchpoint."
      domain: brand-building
      source: "SSM"

    - id: "MM-MP-041"
      title: "Content Syndication Model"
      content: "Create once, syndicate everywhere. One video becomes a blog post, 5 social clips, 3 quote graphics, 1 email, and 1 podcast episode. Maximize every piece of content."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-042"
      title: "Organic Reach Decay"
      content: "Organic reach decays over time on every platform. What worked 2 years ago reaches a fraction of people today. Accept this reality and build paid amplification into your content strategy."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-043"
      title: "Social Proof Cascade"
      content: "Social proof cascades: One testimonial leads to one case study leads to one media mention leads to one industry award. Each piece of proof makes the next one easier to get."
      domain: brand-building
      source: "SSM"

    - id: "MM-MP-044"
      title: "The Tribe Model"
      content: "Build a tribe, not just an audience. A tribe has shared beliefs, shared language, shared identity. Tribes defend the brand and recruit new members organically."
      domain: community-building
      source: "SSM"

    - id: "MM-MP-045"
      title: "Platform Native Content"
      content: "Each platform has its own native content style. Instagram is visual, Twitter is text-first, TikTok is raw video, LinkedIn is professional. Adapt your content to be native to each platform."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-046"
      title: "Engagement as Currency"
      content: "Engagement (likes, comments, shares, saves) is the currency of social media algorithms. The more engagement your content earns, the more people the algorithm shows it to. Optimize for engagement first."
      domain: content-marketing
      source: "SSM"

    - id: "MM-MP-047"
      title: "Traffic System Architecture"
      content: "A complete traffic system has 3 phases: Test (find what works at small scale), Scale (increase spend on winners), Retarget (recapture lost visitors). Each phase has different metrics and different goals."
      domain: paid-traffic
      source: "TMTP"

    - id: "MM-MP-048"
      title: "Total Value Score"
      content: "Every lead has a Total Value Score based on all revenue they generate: front-end purchase, upsells, cross-sells, renewals, referrals. Optimize for total value, not just front-end CPA."
      domain: customer-acquisition
      source: "TMTP"

    - id: "MM-MP-049"
      title: "Splintering Model"
      content: "Take your core offer and splinter off a small, low-risk piece as a tripwire. The tripwire converts browsers to buyers. Once they buy anything, the likelihood of buying more increases dramatically."
      domain: offer-strategy
      source: "TMTP"

    - id: "MM-MP-050"
      title: "Seven Funnel Types"
      content: "There are 7 fundamental funnel types: Squeeze Page, Tripwire, Webinar, Application, Survey, VSL, and Product Launch. Each serves a different price point and audience temperature."
      domain: funnel-strategy
      source: "TMTP"

    - id: "MM-MP-051"
      title: "ABCD YouTube Framework"
      content: "YouTube ads follow the ABCD framework: Attract attention in the first 5 seconds, Brand early, Connect with emotion and story, Direct with a clear call to action."
      domain: youtube-ads
      source: "TMTP"

    - id: "MM-MP-052"
      title: "CBO vs ABO Decision Model"
      content: "Campaign Budget Optimization (CBO) lets Facebook allocate budget across ad sets. Use CBO when you trust the algorithm with 3-5 proven ad sets. Use ABO when testing new audiences and you need control."
      domain: facebook-ads
      source: "TMTP"

    - id: "MM-MP-053"
      title: "Google Search Intent Tiers"
      content: "Google search intent comes in 3 tiers: Navigational (looking for a brand), Informational (looking for answers), Transactional (ready to buy). Bid highest on transactional, lowest on informational."
      domain: google-ads
      source: "TMTP"

    - id: "MM-MP-054"
      title: "YouTube Discovery Model"
      content: "YouTube is a discovery platform. People come to learn, be entertained, or solve problems. Ads that feel like content perform better than ads that feel like ads. Educate first, sell second."
      domain: youtube-ads
      source: "TMTP"

    - id: "MM-MP-055"
      title: "The Scaling Staircase"
      content: "Scale in steps, not leaps. Increase budget by 15-20 percent every 3-5 days. Each step lets the algorithm recalibrate. Jumping spend too fast resets learning and tanks performance."
      domain: scaling-strategy
      source: "TMTP"

    - id: "MM-MP-056"
      title: "Retargeting Layers Model"
      content: "Build retargeting in layers: Layer 1 - website visitors (broadest), Layer 2 - content engagers, Layer 3 - lead magnet engagers, Layer 4 - cart/page visitors, Layer 5 - past buyers (most valuable)."
      domain: retargeting
      source: "TMTP"

    - id: "MM-MP-057"
      title: "Avatar Depth Model"
      content: "Go beyond demographics when defining your avatar. Map their pain points, desires, fears, objections, information sources, and daily routine. The deeper your avatar, the sharper your targeting and copy."
      domain: audience-targeting
      source: "TMTP"

    - id: "MM-MP-058"
      title: "Cross-Platform Attribution"
      content: "Customers touch multiple platforms before buying. Facebook introduces, Google captures intent, email closes. Attribution is messy - use blended metrics (total spend / total revenue) alongside platform metrics."
      domain: paid-traffic
      source: "TMTP"

    - id: "MM-MP-059"
      title: "The Learning Phase"
      content: "Every new campaign enters a learning phase where the algorithm experiments. During learning, performance is volatile. Do not make changes during the learning phase - let it stabilize first."
      domain: facebook-ads
      source: "TMTP"

    - id: "MM-MP-060"
      title: "Budget Allocation Model"
      content: "Allocate your traffic budget using the 70/20/10 rule: 70 percent on proven winners (scale), 20 percent on promising tests (optimize), 10 percent on wild experiments (discover)."
      domain: campaign-optimization
      source: "TMTP"

    - id: "MM-MP-061"
      title: "Platform Maturity Cycle"
      content: "Every ad platform goes through a maturity cycle: Early (cheap, low competition), Growth (affordable, growing competition), Mature (expensive, high competition). Get in early when you can."
      domain: media-buying
      source: "TMTP"

    - id: "MM-MP-062"
      title: "The Auction Model"
      content: "Every ad platform is an auction. You are bidding against other advertisers for the same eyeballs. Your bid, your relevance score, and your estimated action rate determine who wins. Relevance reduces cost."
      domain: media-buying
      source: "TMTP"
  L3_HEURISTICS:
    - id: "HEUR-MP-001"
      title: "20% Campaign Success Rate"
      content: "Only about 20% of campaigns you launch will be successful. This is normal and expected. Budget and plan for an 80% failure rate on new tests."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-002"
      title: "Minimum Audience Size 500K"
      content: "For Facebook prospecting campaigns, target audiences of at least 500,000 to 1 million people. Smaller audiences run out of inventory quickly and costs spike."
      domain: audience-targeting
      source: "PTM"

    - id: "HEUR-MP-003"
      title: "Frequency Cap 2.5-3.0"
      content: "When ad frequency exceeds 2.5-3.0 on cold campaigns, creative fatigue is setting in. Rotate new creative or pause the ad set before frequency kills performance."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-004"
      title: "CTR Benchmark 1% Cold"
      content: "A 1% CTR on cold traffic Facebook ads is the minimum benchmark for viability. Below 1%, your creative or targeting needs work. Above 2% is strong."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-005"
      title: "3x CPA Kill Rule"
      content: "If an ad set has spent 3x your target CPA without a conversion, pause it. The data is telling you it is not going to work. Do not hope it into profitability."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-006"
      title: "50 Conversions Per Week"
      content: "Facebook needs approximately 50 conversion events per week per ad set to optimize effectively. If you cannot hit this volume, optimize for an event higher in the funnel."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-007"
      title: "Landing Page 20-40% Opt-in"
      content: "A well-optimized landing page should convert 20-40% of traffic for a free offer. Below 20%, the page or offer needs work. Above 40% is exceptional."
      domain: conversion-optimization
      source: "PTM"

    - id: "HEUR-MP-008"
      title: "Video Ads 3-Second Rule"
      content: "You have 3 seconds to capture attention in a video ad. If your video does not hook in the first 3 seconds, 65% of viewers are gone. Lead with the most compelling visual or statement."
      domain: ad-creative
      source: "PTM"

    - id: "HEUR-MP-009"
      title: "Interest Stacking 3-5 Interests"
      content: "When building interest-based audiences, stack 3-5 related interests per ad set. This narrows the audience enough to be relevant but keeps it large enough to be deliverable."
      domain: audience-targeting
      source: "PTM"

    - id: "HEUR-MP-010"
      title: "Image Ad 20% Text Rule"
      content: "Keep text to less than 20% of the image area in Facebook ads. More text reduces delivery and increases costs. Let the image do the heavy lifting."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-011"
      title: "CPC Below $3 for Cold Info Products"
      content: "For information product cold traffic, aim for a CPC below $3. Above $3 and the economics become very difficult unless your average order value is above $200."
      domain: paid-traffic
      source: "PTM"

    - id: "HEUR-MP-012"
      title: "Retargeting CPA 50-70% of Cold"
      content: "Retargeting campaigns should produce a CPA that is 50-70% of your cold traffic CPA. If retargeting is as expensive as cold, your retargeting setup is wrong."
      domain: retargeting
      source: "PTM"

    - id: "HEUR-MP-013"
      title: "Ad Set Minimum $10-20/Day"
      content: "Each ad set needs a minimum of $10-20/day to gather meaningful data. Below $10/day, the learning phase takes too long and data is unreliable."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-014"
      title: "Test 3-5 Creatives Per Ad Set"
      content: "Launch each ad set with 3-5 creative variations. This gives the algorithm options and you data on what resonates. More than 5 splits budget too thin."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-015"
      title: "Lookalike 1% Is Gold"
      content: "A 1% lookalike audience from your best customers is typically your highest-performing prospecting audience. Start here before expanding to 2-5% lookalikes."
      domain: audience-targeting
      source: "PTM"

    - id: "HEUR-MP-016"
      title: "24-48 Hour Learning Patience"
      content: "Give new campaigns 24-48 hours before making any changes. The algorithm needs time to stabilize. Making changes too early restarts the learning phase."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-017"
      title: "Headline Under 40 Characters"
      content: "Facebook ad headlines perform best under 40 characters. Short, punchy headlines that state the benefit clearly outperform long, descriptive ones."
      domain: copywriting-ads
      source: "PTM"

    - id: "HEUR-MP-018"
      title: "Video View Cost $0.01-0.05"
      content: "A healthy video view cost on Facebook is $0.01-$0.05 for a 3-second view. Above $0.05, your hook is not compelling enough or your targeting is too narrow."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-019"
      title: "Mobile First 85%+ Traffic"
      content: "85% or more of Facebook traffic is mobile. Design every ad, landing page, and funnel for mobile first. Desktop is the exception, not the rule."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-020"
      title: "2-Week Creative Lifespan"
      content: "Most ad creatives have an effective lifespan of 2-4 weeks before fatigue sets in. Plan to produce new creative every 2 weeks to maintain performance."
      domain: ad-creative
      source: "PTM"

    - id: "HEUR-MP-021"
      title: "Relevance Score 7+ Target"
      content: "Aim for a Facebook Relevance Score (or Quality Ranking) of 7 or above. Below 7 means your ad is not resonating with your audience and costs will be higher."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-022"
      title: "Email Follow-Up 5-7 Sequence"
      content: "After lead capture, send a 5-7 email follow-up sequence. Most conversions happen between email 3 and email 7. Stopping at 1-2 emails leaves money on the table."
      domain: funnel-strategy
      source: "PTM"

    - id: "HEUR-MP-023"
      title: "Split Test One Variable"
      content: "Only split test one variable at a time: audience OR creative OR copy OR placement. Testing multiple variables simultaneously makes it impossible to know what caused the change."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-024"
      title: "Weekend vs Weekday Performance"
      content: "B2C products often perform better on weekends when people have leisure time. B2B products perform better Tuesday-Thursday. Schedule your heaviest spend accordingly."
      domain: campaign-optimization
      source: "PTM"

    - id: "HEUR-MP-025"
      title: "Retargeting Window 1-7 Days Best"
      content: "The 1-7 day retargeting window is your most valuable. Engagement and intent are highest in the first week after someone visits your site. Bid highest on this window."
      domain: retargeting
      source: "PTM"

    - id: "HEUR-MP-026"
      title: "CPM Benchmark $5-15 US Cold"
      content: "For cold traffic in the US on Facebook, expect CPMs (cost per 1000 impressions) of $5-$15. Higher CPMs mean competitive audiences. Lower CPMs may mean low quality."
      domain: facebook-ads
      source: "PTM"

    - id: "HEUR-MP-027"
      title: "Breakeven ROAS Calculation"
      content: "Your breakeven ROAS equals 1 divided by your profit margin. If your margin is 50%, you need a 2.0 ROAS to break even. Below this, you are losing money on every sale."
      domain: conversion-optimization
      source: "PTM"

    - id: "HEUR-MP-028"
      title: "100 Visitors to Start Retargeting"
      content: "You need at least 100 visitors in a retargeting audience before it becomes large enough for Facebook to deliver against. Prioritize getting initial traffic before launching retargeting."
      domain: retargeting
      source: "PTS"

    - id: "HEUR-MP-029"
      title: "40% Landing Page Conversion Hot"
      content: "Hot traffic (retargeted visitors who already know you) should convert at 40% or higher on opt-in pages. Below 40% means your page or offer has friction."
      domain: conversion-optimization
      source: "PTS"

    - id: "HEUR-MP-030"
      title: "50 Conversions/Week Optimization"
      content: "For Facebooks conversion optimization to work effectively, you need roughly 50 conversions per ad set per week. Below this, the algorithm does not have enough data to optimize."
      domain: facebook-ads
      source: "PTS"
    - id: "HEUR-MP-031"
      title: "Blog Boomerang 7-Day Window"
      content: "Blog Boomerang retargeting is most effective in a 7-day window. After 7 days, the reader has likely forgotten the content. Hit them while the topic is fresh."
      domain: retargeting
      source: "PTS"

    - id: "HEUR-MP-032"
      title: "Comment-to-Message 10% Conversion"
      content: "Expect roughly 10% of people who comment on a post to convert through an automated comment-to-message funnel. This varies by offer quality and audience warmth."
      domain: social-selling
      source: "PTS"

    - id: "HEUR-MP-033"
      title: "Flash Sale 48-72 Hours Maximum"
      content: "Flash sales should last 48-72 hours maximum. Shorter creates more urgency. Longer than 72 hours and it stops feeling like a flash sale and urgency dies."
      domain: conversion-optimization
      source: "PTS"

    - id: "HEUR-MP-034"
      title: "Customer Story Ads 2x CTR"
      content: "Customer story ads typically generate 2x the click-through rate of standard promotional ads. Real stories from real people cut through ad blindness."
      domain: ad-creative
      source: "PTS"

    - id: "HEUR-MP-035"
      title: "Retargeting Budget 20-30% of Total"
      content: "Allocate 20-30% of your total ad budget to retargeting. This is where your highest ROI lives. Most businesses under-invest in retargeting."
      domain: retargeting
      source: "PTS"

    - id: "HEUR-MP-036"
      title: "Lookalike Refresh Every 60 Days"
      content: "Refresh your lookalike source audiences every 60 days with updated customer data. Stale seed audiences produce stale lookalikes."
      domain: audience-targeting
      source: "PTS"

    - id: "HEUR-MP-037"
      title: "Warm Traffic CTR 2-5%"
      content: "Warm traffic (retargeted audiences) should produce CTRs of 2-5%. Below 2% means your retargeting creative needs work. Above 5% is excellent."
      domain: retargeting
      source: "PTS"

    - id: "HEUR-MP-038"
      title: "Cold Email Open Rate 15-25%"
      content: "Cold email open rates of 15-25% are normal. Below 15%, your subject lines or list quality need work. Above 25% is strong."
      domain: funnel-strategy
      source: "PTS"

    - id: "HEUR-MP-039"
      title: "Tripwire Conversion 2-5%"
      content: "A tripwire offer (low-priced, $7-$27) should convert 2-5% of landing page visitors from cold traffic. Below 2% means the offer needs work."
      domain: conversion-optimization
      source: "PTS"

    - id: "HEUR-MP-040"
      title: "Upsell Take Rate 10-25%"
      content: "Immediately after a purchase, an upsell should convert 10-25% of buyers. Below 10%, the upsell is not relevant enough. Above 25% is exceptional."
      domain: funnel-strategy
      source: "PTS"

    - id: "HEUR-MP-041"
      title: "Video Completion 25% Threshold"
      content: "If 25% or more of viewers watch your video ad to completion, it is a strong performer. Use 25% video viewers as a retargeting audience."
      domain: ad-creative
      source: "PTS"

    - id: "HEUR-MP-042"
      title: "Audience Overlap Below 20%"
      content: "Keep audience overlap between ad sets below 20%. Above 20% and you are competing against yourself in the auction, driving up costs."
      domain: audience-targeting
      source: "PTS"

    - id: "HEUR-MP-043"
      title: "Lead Magnet Delivery Within 5 Min"
      content: "Deliver your lead magnet within 5 minutes of opt-in. Delayed delivery kills trust and reduces engagement with follow-up emails."
      domain: funnel-strategy
      source: "PTS"

    - id: "HEUR-MP-044"
      title: "Webinar Show Rate 25-40%"
      content: "For automated webinars, expect a 25-40% show rate. For live webinars, 30-50%. Below these thresholds, your pre-webinar nurture sequence needs improvement."
      domain: funnel-strategy
      source: "PTS"

    - id: "HEUR-MP-045"
      title: "Retargeting CPM Premium 2-3x"
      content: "Retargeting CPMs are typically 2-3x higher than cold traffic CPMs. This is normal because the audiences are smaller and more valuable. The higher CPM is worth it because conversion rates are much higher."
      domain: retargeting
      source: "PTS"

    - id: "HEUR-MP-046"
      title: "Ad Copy 125 Characters Primary"
      content: "Facebook primary text performs best at 125 characters or less for cold traffic. Short, punchy, benefit-driven copy outperforms long-form on mobile feeds."
      domain: copywriting-ads
      source: "PTS"

    - id: "HEUR-MP-047"
      title: "Cart Abandonment 3 Emails"
      content: "Send 3 cart abandonment emails: First at 1 hour (reminder), second at 24 hours (objection handling), third at 48-72 hours (final urgency). This sequence recovers 5-15% of abandoned carts."
      domain: funnel-strategy
      source: "PTS"

    - id: "HEUR-MP-048"
      title: "Customer LTV Recalculate Quarterly"
      content: "Recalculate customer lifetime value every quarter. LTV changes as your product mix, retention, and pricing evolve. Stale LTV leads to stale acquisition decisions."
      domain: customer-acquisition
      source: "PTS"

    - id: "HEUR-MP-049"
      title: "Thank You Page Upsell Immediate"
      content: "The thank you page is the highest-converting real estate in your funnel. Always present an upsell or next step immediately. A blank thank you page is wasted opportunity."
      domain: conversion-optimization
      source: "PTS"

    - id: "HEUR-MP-050"
      title: "Engagement Custom Audience 365 Days"
      content: "Build engagement custom audiences with a 365-day window. These are people who have interacted with your page or content in the past year - warm and familiar with your brand."
      domain: audience-targeting
      source: "PTS"

    - id: "HEUR-MP-051"
      title: "Split Test Minimum 1000 Impressions"
      content: "Do not declare a split test winner until each variation has at least 1000 impressions. Below this, statistical significance is unreliable and you will make wrong decisions."
      domain: campaign-optimization
      source: "PTS"

    - id: "HEUR-MP-052"
      title: "Organic Reach 2% of Followers"
      content: "Organic reach on Facebook and Instagram is roughly 2% of your follower count. If you have 10,000 followers, expect 200 people to see each post organically. Plan paid amplification accordingly."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-053"
      title: "Video Views $0.50-2.00 Goal"
      content: "For paid video view campaigns, target a cost per view of $0.50-$2.00 for a 10-second view. Below $0.50 is exceptional. Above $2.00 means your content is not resonating."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-054"
      title: "Giveaway Entry Cost $0.50-1.50"
      content: "A well-run giveaway should acquire entrants at $0.50-$1.50 per entry when boosted with paid. The prize must be relevant to your business - not generic."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-055"
      title: "Amplification Budget 10-20% of Content"
      content: "Allocate 10-20% of your content marketing budget to paid amplification of top-performing organic posts. This multiplies the reach of content that has already proven itself."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-056"
      title: "Posting Frequency 1-2x Daily"
      content: "Post 1-2 times per day on your primary platform. More than 2 can cause content fatigue. Less than 1 and the algorithm forgets you exist."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-057"
      title: "Engagement Rate 3-6% Healthy"
      content: "An engagement rate of 3-6% on posts is healthy. Below 3% means your content is not resonating or your audience is not engaged. Above 6% is excellent."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-058"
      title: "Stories Daily 5-15 Slides"
      content: "Post 5-15 Instagram/Facebook stories per day. Stories keep you at the top of the feed and create an intimacy that posts cannot match."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-059"
      title: "Ambassador Conversion 5-10%"
      content: "Expect 5-10% of satisfied customers to become active brand ambassadors when given the tools and incentives. Focus your ambassador efforts on your top 10% of customers."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-060"
      title: "Content Pillar Split 80/20"
      content: "80% of your content should be value-driven (educate, entertain, inspire). 20% can be promotional (sell, offer, CTA). Invert this ratio and you will lose your audience."
      domain: content-marketing
      source: "SSM"
    - id: "HEUR-MP-061"
      title: "Video Retention 50% at 10s"
      content: "If 50% of viewers are still watching at 10 seconds, your hook is working. Below 50% at 10 seconds means your opening needs to be more compelling."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-062"
      title: "Giveaway Duration 3-7 Days"
      content: "Giveaways should run 3-7 days. Shorter than 3 days does not allow enough time for sharing. Longer than 7 days and momentum dies."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-063"
      title: "User-Generated Content 4x Trust"
      content: "User-generated content generates roughly 4x more trust than brand-created content. Encourage and curate UGC as a core part of your content strategy."
      domain: brand-building
      source: "SSM"

    - id: "HEUR-MP-064"
      title: "Hashtag Use 5-15 Per Post"
      content: "Use 5-15 relevant hashtags per Instagram post. More than 15 looks spammy. Fewer than 5 misses discovery opportunities. Mix popular and niche hashtags."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-065"
      title: "Live Video 6x Engagement"
      content: "Live video gets roughly 6x more engagement than pre-recorded video on Facebook and Instagram. Go live regularly to boost algorithmic reach."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-066"
      title: "Reply Within 60 Minutes"
      content: "Reply to comments and DMs within 60 minutes during business hours. Fast replies signal to the algorithm that your content generates conversation, boosting reach."
      domain: social-selling
      source: "SSM"

    - id: "HEUR-MP-067"
      title: "Content Repurpose 1 to 10 Ratio"
      content: "Every piece of long-form content should be repurposed into at least 10 pieces of micro-content. One video becomes 10 clips, quotes, carousels, stories."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-068"
      title: "Email List Growth 100-500/Day"
      content: "A healthy content machine should add 100-500 email subscribers per day depending on business size. Below 100/day and your top-of-funnel needs work."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-069"
      title: "Social Proof Minimum 10 Testimonials"
      content: "Have at least 10 customer testimonials before running paid traffic. Below 10 and you lack the social proof to convert cold traffic efficiently."
      domain: brand-building
      source: "SSM"

    - id: "HEUR-MP-070"
      title: "Carousel Posts 1.4x Reach"
      content: "Carousel posts on Instagram get roughly 1.4x more reach than single image posts. Use carousels for educational content and step-by-step guides."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-071"
      title: "Amplify Top 10% of Posts"
      content: "Only amplify your top 10% performing organic posts with paid. Let organic performance be your filter. Amplifying mediocre content is wasting money."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-072"
      title: "DM Outreach 20% Response Rate"
      content: "Well-crafted DM outreach to warm contacts should get a 20% or higher response rate. Below 20%, your message is too salesy or your targeting is off."
      domain: social-selling
      source: "SSM"

    - id: "HEUR-MP-073"
      title: "Contest Viral Coefficient 1.3+"
      content: "A successful social contest should achieve a viral coefficient of 1.3 or higher (each participant brings 1.3 new participants). Below 1.0 and the contest is not spreading."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-074"
      title: "Reels/Short-Form 2-3x Reach"
      content: "Short-form video (Reels, Shorts, TikTok) gets 2-3x the reach of static posts in current algorithms. Prioritize short-form video in your content mix."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-075"
      title: "Brand Mention Monitoring Daily"
      content: "Monitor brand mentions daily. Every mention is an opportunity to engage, thank, or address concerns. Unmonitored mentions are missed opportunities."
      domain: brand-building
      source: "SSM"

    - id: "HEUR-MP-076"
      title: "Email Segmentation 14-30% Lift"
      content: "Segmented email campaigns produce 14-30% higher open rates and click rates versus unsegmented blasts. Segment by behavior, not just demographics."
      domain: funnel-strategy
      source: "SSM"

    - id: "HEUR-MP-077"
      title: "Community Response Time Under 4 Hours"
      content: "Respond to community questions within 4 hours during business hours. Response time directly correlates with perceived brand quality and trust."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-078"
      title: "Content Batch 1 Week at a Time"
      content: "Batch produce content 1 week at a time minimum. Batching is 3-5x more efficient than creating content daily. Dedicate one day per week to content creation."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-079"
      title: "Save Rate as Quality Signal"
      content: "Saves are the strongest quality signal on Instagram. A save rate above 2% indicates highly valuable content. Optimize for saves, not just likes."
      domain: content-marketing
      source: "SSM"

    - id: "HEUR-MP-080"
      title: "Giveaway to Customer 5-15%"
      content: "5-15% of giveaway entrants should convert to paying customers within 30 days with proper follow-up. If below 5%, your prize attracted the wrong audience."
      domain: community-building
      source: "SSM"

    - id: "HEUR-MP-081"
      title: "CBO 3-5 Ad Sets Optimal"
      content: "Campaign Budget Optimization works best with 3-5 ad sets. Fewer than 3 and the algorithm does not have enough options. More than 5 and budget gets spread too thin."
      domain: facebook-ads
      source: "TMTP"

    - id: "HEUR-MP-082"
      title: "Webinar Registration to Attend 30-40%"
      content: "For webinar funnels, 30-40% of registrants will attend live. Below 30%, your reminder sequence needs work. Above 40% is excellent."
      domain: funnel-strategy
      source: "TMTP"

    - id: "HEUR-MP-083"
      title: "CPL Info Products $2-5"
      content: "For information products, target a cost per lead of $2-$5 on Facebook. Below $2 is excellent. Above $5 and you need to improve your lead magnet or targeting."
      domain: paid-traffic
      source: "TMTP"

    - id: "HEUR-MP-084"
      title: "Scaling Budget 15-20% Increments"
      content: "Scale winning campaigns by increasing budget 15-20% every 3-5 days. Larger jumps reset the learning phase and tank performance temporarily."
      domain: scaling-strategy
      source: "TMTP"

    - id: "HEUR-MP-085"
      title: "Google Search CPC $1-5 Most Niches"
      content: "For most niches on Google Search, expect a CPC of $1-$5. Highly competitive niches (legal, insurance, finance) can be $20-50+. Know your niche benchmarks."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-086"
      title: "YouTube Pre-Roll Skip Rate 65-80%"
      content: "65-80% of viewers will skip your YouTube pre-roll ad after 5 seconds. This is normal. Focus your best hook and value proposition in the first 5 seconds."
      domain: youtube-ads
      source: "TMTP"

    - id: "HEUR-MP-087"
      title: "Application Funnel 5-15% Fill Rate"
      content: "Application funnels for high-ticket offers should see 5-15% fill rates from cold traffic. Below 5% means the landing page or ad promise needs work."
      domain: funnel-strategy
      source: "TMTP"

    - id: "HEUR-MP-088"
      title: "VSL Watch Time 50%+ for Hot"
      content: "If 50% or more of visitors watch your VSL to completion, the traffic is well-qualified. Below 30% means the traffic is too cold or the VSL opening is weak."
      domain: funnel-strategy
      source: "TMTP"

    - id: "HEUR-MP-089"
      title: "Google Display CPC $0.50-2.00"
      content: "Google Display Network CPCs typically range from $0.50-$2.00. Display is cheaper than Search but lower intent. Use Display for awareness and retargeting."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-090"
      title: "YouTube View Rate 15-30% Good"
      content: "A YouTube TrueView ad with a 15-30% view rate (people watching past 30 seconds) is performing well. Below 15% means your content is not holding attention."
      domain: youtube-ads
      source: "TMTP"
    - id: "HEUR-MP-091"
      title: "Retargeting Frequency Cap 7/Week"
      content: "Cap retargeting ad frequency at 7 impressions per week per person. More than 7 and you cross from persistent to annoying. Rotate creative to stay fresh."
      domain: retargeting
      source: "TMTP"

    - id: "HEUR-MP-092"
      title: "Survey Funnel Completion 30-50%"
      content: "A well-designed survey funnel should see 30-50% completion rates. Below 30%, the survey is too long or the incentive is not compelling enough."
      domain: funnel-strategy
      source: "TMTP"

    - id: "HEUR-MP-093"
      title: "Google Responsive Search 3+ Headlines"
      content: "Google Responsive Search Ads should have at least 3 unique headline variations and 2 description variations. More options means the algorithm can test more combinations."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-094"
      title: "Facebook Broad Targeting 10M+ Audiences"
      content: "When using broad targeting on Facebook (no interest or lookalike restrictions), target audiences of 10M+ and let the algorithm find the right people. Works best with strong creative."
      domain: facebook-ads
      source: "TMTP"

    - id: "HEUR-MP-095"
      title: "YouTube Ad Length 60-90 Seconds"
      content: "YouTube ads in the 60-90 second range tend to perform best. Long enough to tell a story and build desire, short enough to maintain attention."
      domain: youtube-ads
      source: "TMTP"

    - id: "HEUR-MP-096"
      title: "Google Quality Score 7+ Target"
      content: "Aim for a Google Ads Quality Score of 7 or higher on your keywords. Below 7 means you are paying a premium. 8-10 gets you discounted clicks."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-097"
      title: "Retargeting Exclusion 30-Day Buyers"
      content: "Exclude buyers from the last 30 days from retargeting campaigns. Showing ads to recent buyers wastes budget and can create buyer remorse or annoyance."
      domain: retargeting
      source: "TMTP"

    - id: "HEUR-MP-098"
      title: "CPA Target 30% of Product Price"
      content: "As a starting benchmark, target a CPA that is 30% or less of your product price for front-end offers. A $100 product should aim for $30 CPA or less."
      domain: customer-acquisition
      source: "TMTP"

    - id: "HEUR-MP-099"
      title: "Facebook Ad Spend $100 Before Judging"
      content: "Spend at least $100 (or 2x your target CPA, whichever is higher) on an ad set before judging its performance. Anything less and the data is statistically meaningless."
      domain: campaign-optimization
      source: "TMTP"

    - id: "HEUR-MP-100"
      title: "Google Impression Share 70%+ Brand"
      content: "For branded Google Search campaigns, target 70% or higher impression share. Below 70% means competitors are capturing your brand traffic."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-101"
      title: "Video Ads Outperform Image 2x"
      content: "On Facebook, video ads outperform static image ads by approximately 2x in engagement and often in conversion rate. Prioritize video creative."
      domain: ad-creative
      source: "TMTP"

    - id: "HEUR-MP-102"
      title: "Landing Page Load Under 3 Seconds"
      content: "Landing pages must load in under 3 seconds on mobile. Every additional second of load time reduces conversions by 7-10%. Speed is a conversion variable."
      domain: conversion-optimization
      source: "TMTP"

    - id: "HEUR-MP-103"
      title: "Ad Account Warmup 7-14 Days"
      content: "New ad accounts need a 7-14 day warmup period. Start with small budgets and engagement objectives before running conversion campaigns."
      domain: facebook-ads
      source: "TMTP"

    - id: "HEUR-MP-104"
      title: "Negative Keywords Review Weekly"
      content: "Review and add negative keywords to Google campaigns at least weekly. Search term reports reveal wasted spend on irrelevant queries."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-105"
      title: "Click to Lead Time Under 2 Minutes"
      content: "The time from ad click to lead capture should be under 2 minutes. Long landing pages with excessive scrolling lose mobile visitors before they opt in."
      domain: conversion-optimization
      source: "TMTP"

    - id: "HEUR-MP-106"
      title: "Dynamic Creative Test 5+ Elements"
      content: "When using dynamic creative, provide at least 5 images/videos, 5 headlines, and 5 text variations. This gives the algorithm 125+ possible combinations to test."
      domain: facebook-ads
      source: "TMTP"

    - id: "HEUR-MP-107"
      title: "Google Display Placements Review Monthly"
      content: "Review Google Display Network placements monthly and exclude low-quality sites. GDN can waste significant budget on irrelevant or fraudulent placements."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-108"
      title: "Conversion Window 7-Day Click Default"
      content: "Use a 7-day click conversion window as the default for Facebook optimization. 1-day click is too restrictive for most businesses. 28-day is too loose for optimization."
      domain: facebook-ads
      source: "TMTP"

    - id: "HEUR-MP-109"
      title: "Ad Relevance Diagnostics Check Weekly"
      content: "Check Facebook Ad Relevance Diagnostics weekly. Below Average on any of the 3 metrics (Quality, Engagement, Conversion) signals specific creative or targeting issues."
      domain: facebook-ads
      source: "TMTP"

    - id: "HEUR-MP-110"
      title: "YouTube Custom Intent Keywords 50-100"
      content: "For YouTube custom intent audiences, provide 50-100 keywords that your ideal customer would search for on Google. This creates highly targeted YouTube audiences."
      domain: youtube-ads
      source: "TMTP"

    - id: "HEUR-MP-111"
      title: "Retarget Video Viewers 50% Watched"
      content: "Create retargeting audiences of people who watched 50% or more of your videos. These are highly engaged prospects who have demonstrated significant interest."
      domain: retargeting
      source: "TMTP"

    - id: "HEUR-MP-112"
      title: "Ad Copy Test Headlines First"
      content: "When testing ad copy, test headlines first. Headlines have the biggest impact on CTR. Once you find a winning headline, test body copy variations."
      domain: copywriting-ads
      source: "TMTP"

    - id: "HEUR-MP-113"
      title: "Google Exact Match First"
      content: "Start Google Search campaigns with exact match keywords. These are the most targeted and give you the cleanest data. Expand to phrase and broad match after proving ROI."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-114"
      title: "ROAS 3x Minimum for E-commerce"
      content: "For e-commerce with typical margins, target a minimum 3x ROAS to be profitable. For digital products with higher margins, 2x ROAS may be sufficient."
      domain: conversion-optimization
      source: "TMTP"

    - id: "HEUR-MP-115"
      title: "Campaign Naming Convention Always"
      content: "Use consistent campaign naming conventions: [Objective]_[Audience]_[Offer]_[Date]. Example: CONV_LAL1%_FreePDF_0326. Good naming prevents chaos at scale."
      domain: campaign-optimization
      source: "TMTP"

    - id: "HEUR-MP-116"
      title: "Budget Pacing Check 2x Daily"
      content: "Check budget pacing at least 2x per day when actively scaling. Morning and evening checks catch overspend or underspend before they compound."
      domain: scaling-strategy
      source: "TMTP"

    - id: "HEUR-MP-117"
      title: "Google Search Budget 10x CPC Daily"
      content: "Set daily Google Search budgets at 10x your average CPC minimum. A $5 CPC keyword needs at least $50/day budget for enough clicks to generate data."
      domain: google-ads
      source: "TMTP"

    - id: "HEUR-MP-118"
      title: "New Creative Every 2 Weeks"
      content: "Introduce new creative variations every 2 weeks to combat fatigue. Have a content pipeline that continuously feeds fresh creative into your campaigns."
      domain: ad-creative
      source: "TMTP"

    - id: "HEUR-MP-119"
      title: "Attribution Window Match Business Cycle"
      content: "Match your attribution window to your sales cycle. 7-day for impulse purchases, 14-day for considered purchases, 28-day for high-ticket with longer decision times."
      domain: customer-acquisition
      source: "TMTP"
  L4_FRAMEWORKS:
    - id: "FW-MP-001"
      title: "Five Elements of a Paid Traffic Campaign"
      content: "Every campaign has 5 elements that determine success: (1) Offer - what you are selling, (2) Audience - who you are targeting, (3) Ad Creative - the visual hook, (4) Ad Copy - the written message, (5) Landing Page - where they go. Optimize in this priority order."
      domain: paid-traffic
      source: "PTM"

    - id: "FW-MP-002"
      title: "11 Copy Chunks for Ad Writing"
      content: "Structure ad copy in 11 chunks: (1) Hook/Pattern Interrupt, (2) Pain Point, (3) Agitate, (4) Solution Tease, (5) Credibility, (6) Benefit 1, (7) Benefit 2, (8) Benefit 3, (9) Social Proof, (10) Call to Action, (11) Urgency/Scarcity. Not every ad uses all 11."
      domain: copywriting-ads
      source: "PTM"

    - id: "FW-MP-003"
      title: "Traffic Temperature Framework"
      content: "Three temperatures, three strategies: COLD (awareness - lead with value, education, and curiosity), WARM (consideration - lead with benefits, proof, and nurture), HOT (decision - lead with urgency, scarcity, and direct CTA)."
      domain: traffic-psychology
      source: "PTM"

    - id: "FW-MP-004"
      title: "Customer Value Journey Canvas"
      content: "8-stage customer journey mapped to campaigns: (1) Aware via ads, (2) Engage via content, (3) Subscribe via lead magnet, (4) Convert via tripwire, (5) Excite via onboarding, (6) Ascend via upsell, (7) Advocate via satisfaction, (8) Promote via referral program."
      domain: funnel-strategy
      source: "PTM"

    - id: "FW-MP-005"
      title: "Troubleshooting Waterfall Framework"
      content: "When campaigns underperform, diagnose top-down: Step 1: Is the Offer right? Step 2: Is the Audience right? Step 3: Is the Creative compelling? Step 4: Is the Copy resonant? Step 5: Is the Landing Page converting? Step 6: Is Follow-up working? Fix top issues first."
      domain: campaign-optimization
      source: "PTM"

    - id: "FW-MP-006"
      title: "Audience Layering Framework"
      content: "Build audiences in 3 layers: Layer 1 - Interest-based (platform targeting options), Layer 2 - Behavior-based (website actions, video views, engagement), Layer 3 - Value-based (lookalikes from customers, high-LTV segments)."
      domain: audience-targeting
      source: "PTM"

    - id: "FW-MP-007"
      title: "Ad Creative Testing Matrix"
      content: "Test creative in a matrix: 3 visual formats (image, video, carousel) x 3 angles (pain, aspiration, social proof) x 2 tones (emotional, logical) = 18 variations. Launch top 5 per ad set."
      domain: ad-creative
      source: "PTM"

    - id: "FW-MP-008"
      title: "Campaign Structure Blueprint"
      content: "Structure every campaign: Campaign Level (objective + daily budget), Ad Set Level (audience + placement + schedule + bid), Ad Level (creative + copy + CTA + URL). One objective per campaign, 3-5 ad sets per campaign, 3-5 ads per ad set."
      domain: facebook-ads
      source: "PTM"

    - id: "FW-MP-009"
      title: "Landing Page Conversion Framework"
      content: "High-converting landing pages follow this structure: (1) Headline matching ad promise, (2) Subheadline with specific benefit, (3) Hero image/video, (4) 3 bullet benefits, (5) Social proof, (6) Single CTA, (7) Urgency element. Remove all navigation."
      domain: conversion-optimization
      source: "PTM"

    - id: "FW-MP-010"
      title: "Pixel Strategy Framework"
      content: "Set up your pixel in 3 phases: Phase 1 (Setup) - Install pixel, define standard events. Phase 2 (Feed) - Run traffic to build pixel data, optimize for PageView then ViewContent. Phase 3 (Optimize) - Once 50+ events/week, optimize for Purchase or Lead."
      domain: facebook-ads
      source: "PTM"

    - id: "FW-MP-011"
      title: "Budget Allocation Framework"
      content: "Allocate budget across campaign types: 60% Acquisition (cold traffic), 25% Retargeting (warm traffic), 15% Monetization (hot traffic). Adjust based on funnel maturity."
      domain: campaign-optimization
      source: "PTM"

    - id: "FW-MP-012"
      title: "Creative Refresh Cycle"
      content: "Follow a 4-phase creative cycle: Phase 1 (Week 1-2) - Launch new creative. Phase 2 (Week 2-3) - Identify winners. Phase 3 (Week 3-4) - Scale winners, cut losers. Phase 4 (Week 4) - Prepare next batch of creative. Repeat."
      domain: ad-creative
      source: "PTM"

    - id: "FW-MP-013"
      title: "Retargeting Sequence Framework"
      content: "Build retargeting in 4 tiers: Tier 1 (1-3 days) - Urgency and reminder. Tier 2 (4-7 days) - Objection handling and social proof. Tier 3 (8-14 days) - Alternative offer or angle. Tier 4 (15-30 days) - Re-engagement with new content."
      domain: retargeting
      source: "PTM"

    - id: "FW-MP-014"
      title: "Split Testing Protocol"
      content: "Follow the split testing protocol: (1) Identify one variable to test. (2) Create control and variation. (3) Run simultaneously with equal budget. (4) Wait for 1000+ impressions each. (5) Declare winner at 95% confidence. (6) Scale winner, test next variable."
      domain: campaign-optimization
      source: "PTM"

    - id: "FW-MP-015"
      title: "Scaling Decision Tree"
      content: "Scale using this decision tree: CPA below target? Increase budget 15-20%. CPA at target? Duplicate ad set to new audience. CPA above target? Test new creative before scaling. CPA 2x+ target? Pause and diagnose with Troubleshooting Waterfall."
      domain: scaling-strategy
      source: "PTM"

    - id: "FW-MP-016"
      title: "Offer Stack Framework"
      content: "Build an offer stack: Core Offer (main product/service) + Bonus 1 (complementary resource) + Bonus 2 (tool or template) + Bonus 3 (community or support) + Guarantee (risk reversal). The stack increases perceived value beyond the price."
      domain: offer-strategy
      source: "PTM"

    - id: "FW-MP-017"
      title: "Ad Copy Formula AIDA+"
      content: "Extended AIDA for ads: Attention (pattern interrupt hook), Interest (pain point or curiosity), Desire (paint the after state), Action (clear CTA), Plus: Urgency (time/quantity limit) and Proof (testimonial or stat)."
      domain: copywriting-ads
      source: "PTM"

    - id: "FW-MP-018"
      title: "Reporting Dashboard Framework"
      content: "Build your reporting dashboard around 5 key metrics: (1) Cost Per Result (efficiency), (2) ROAS (profitability), (3) CTR (creative health), (4) Frequency (fatigue indicator), (5) Conversion Rate (funnel health). Review daily."
      domain: campaign-optimization
      source: "PTM"

    - id: "FW-MP-019"
      title: "Interest Targeting Research Framework"
      content: "Research interests in 4 categories: (1) Competitors and similar brands, (2) Industry thought leaders and influencers, (3) Related publications and media, (4) Related tools and software. Layer 1-2 interests per ad set for focus."
      domain: audience-targeting
      source: "PTM"

    - id: "FW-MP-020"
      title: "Traffic Plays System (12 Plays)"
      content: "The Traffic Plays system has 12 proven campaign patterns: (1) Blog Boomerang, (2) Content Engagement, (3) Comment-to-Message, (4) Lead Magnet, (5) Flash Sale, (6) Customer Story, (7) Webinar Fill, (8) Cart Abandonment, (9) Cross-Sell, (10) Win-Back, (11) Lookalike Prospecting, (12) Seasonal Promotion."
      domain: paid-traffic
      source: "PTS"

    - id: "FW-MP-021"
      title: "Before/After Grid Framework"
      content: "Map your avatar across 4 dimensions: HAVE (what they have before vs after), FEEL (emotions before vs after), AVERAGE DAY (daily reality before vs after), STATUS (social status before vs after). This grid writes all your ad copy and landing page copy."
      domain: ad-creative
      source: "PTS"

    - id: "FW-MP-022"
      title: "Campaign Health Checklist"
      content: "Daily campaign health check: (1) CTR above 1%? (2) CPC within benchmark? (3) Frequency below 3? (4) Relevance Score 7+? (5) Conversion Rate on target? (6) CPA below ceiling? (7) ROAS above floor? If any fail, diagnose immediately."
      domain: campaign-optimization
      source: "PTS"

    - id: "FW-MP-023"
      title: "Blog Boomerang Framework"
      content: "The Blog Boomerang: Step 1 - Publish valuable blog post. Step 2 - Boost post to cold audience for $5-10/day. Step 3 - Retarget blog readers with relevant lead magnet. Step 4 - Retarget leads with core offer. Low-cost, high-trust acquisition path."
      domain: retargeting
      source: "PTS"

    - id: "FW-MP-024"
      title: "Comment-to-Message Framework"
      content: "Comment-to-Message automation: (1) Create engaging post with specific CTA in comments. (2) Set up automation to DM commenters. (3) DM delivers value and asks qualifying question. (4) Qualified leads receive offer link. (5) Follow up with non-responders at 24h."
      domain: social-selling
      source: "PTS"

    - id: "FW-MP-025"
      title: "Flash Sale Campaign Framework"
      content: "Run a flash sale in 5 steps: (1) Pre-announce to email list 24h before. (2) Launch with urgency-driven ad creative. (3) Retarget engaged non-buyers at 12h mark. (4) Send final call email at 6h remaining. (5) Close sale exactly on time - never extend."
      domain: conversion-optimization
      source: "PTS"

    - id: "FW-MP-026"
      title: "Customer Story Ad Framework"
      content: "Create customer story ads: (1) Open with relatable before state. (2) Introduce the moment of discovery. (3) Describe the transformation. (4) Show specific results with numbers. (5) End with invitation to experience the same. Film as interview or selfie-style."
      domain: ad-creative
      source: "PTS"

    - id: "FW-MP-027"
      title: "Perpetual Traffic Blueprint"
      content: "Build perpetual traffic in 3 layers: Layer 1 (Always-On Acquisition) - Cold traffic to lead magnet, runs daily. Layer 2 (Always-On Retargeting) - Warm audiences to offers, runs daily. Layer 3 (Burst Campaigns) - Seasonal promotions and launches, runs periodically."
      domain: paid-traffic
      source: "PTS"

    - id: "FW-MP-028"
      title: "Email Nurture Sequence Framework"
      content: "Post-opt-in email sequence: Email 1 (immediate) - Deliver lead magnet + welcome. Email 2 (Day 1) - Quick win from lead magnet content. Email 3 (Day 2) - Customer story. Email 4 (Day 3) - FAQ/objection handling. Email 5 (Day 4) - Soft offer. Email 6 (Day 5) - Hard offer with urgency."
      domain: funnel-strategy
      source: "PTS"

    - id: "FW-MP-029"
      title: "Lookalike Audience Ladder"
      content: "Build lookalikes in a ladder: (1) 1% from purchasers (best). (2) 1% from leads. (3) 1% from engagers. (4) 2-5% from purchasers. (5) Stacked lookalikes (combined sources). Start at the top and work down as you scale."
      domain: audience-targeting
      source: "PTS"

    - id: "FW-MP-030"
      title: "Cart Abandonment Recovery Framework"
      content: "Recover abandoned carts in 3 touches: Touch 1 (1h) - Simple reminder email with cart contents. Touch 2 (24h) - Address top objection + add testimonial. Touch 3 (48-72h) - Final urgency + bonus or discount incentive."
      domain: funnel-strategy
      source: "PTS"
    - id: "FW-MP-031"
      title: "Cross-Sell Campaign Framework"
      content: "Cross-sell to existing buyers: (1) Segment buyers by product purchased. (2) Identify complementary product. (3) Create ad showing how products work together. (4) Target 7-30 day post-purchase window. (5) Offer bundle discount incentive."
      domain: funnel-strategy
      source: "PTS"

    - id: "FW-MP-032"
      title: "Win-Back Campaign Framework"
      content: "Win back lapsed customers: (1) Define lapse period (60-180 days no purchase). (2) Create we miss you messaging. (3) Offer exclusive return incentive. (4) Show what is new since they left. (5) Run for 14 days then move to cold pool."
      domain: retargeting
      source: "PTS"

    - id: "FW-MP-033"
      title: "Seasonal Promotion Framework"
      content: "Plan seasonal campaigns: (1) Identify relevant holidays and industry events. (2) Create themed creative 2 weeks before. (3) Pre-announce to warm audiences. (4) Launch 3-5 days before event. (5) Peak spend on event day. (6) Extension offer day after."
      domain: paid-traffic
      source: "PTS"

    - id: "FW-MP-034"
      title: "Webinar Fill Framework"
      content: "Fill webinars with paid traffic: (1) Create registration page with strong benefit headline. (2) Run conversion ads to cold and warm audiences. (3) Retarget page visitors who did not register. (4) Send 3-email reminder sequence to registrants. (5) Run day-of reminder ads."
      domain: funnel-strategy
      source: "PTS"

    - id: "FW-MP-035"
      title: "Content Engagement Campaign Framework"
      content: "Run content engagement campaigns: (1) Select best-performing organic content. (2) Boost to targeted cold audience. (3) Optimize for engagement (ThruPlay, Post Engagement). (4) Build retargeting audience from engagers. (5) Retarget with lead magnet or offer."
      domain: content-marketing
      source: "PTS"

    - id: "FW-MP-036"
      title: "Traffic Source Diversification Matrix"
      content: "Diversify traffic across a matrix: Primary Source (60% of spend, proven ROI), Secondary Source (25% of spend, growing), Experimental Source (15% of spend, testing). Never have more than 60% of spend on one platform."
      domain: paid-traffic
      source: "PTS"

    - id: "FW-MP-037"
      title: "Lead Scoring Framework for Traffic"
      content: "Score leads by traffic source behavior: (1) Downloaded lead magnet = 10 points. (2) Watched 50%+ video = 15 points. (3) Visited pricing page = 25 points. (4) Added to cart = 35 points. (5) Attended webinar = 40 points. Prioritize highest scores for sales follow-up."
      domain: funnel-strategy
      source: "PTS"

    - id: "FW-MP-038"
      title: "Multi-Touch Attribution Framework"
      content: "Track customer journey across touches: First Touch (what introduced them), Middle Touches (what nurtured them), Last Touch (what converted them). Weight attribution: First 30%, Middle 30%, Last 40%."
      domain: paid-traffic
      source: "PTS"

    - id: "FW-MP-039"
      title: "Offer Testing Framework"
      content: "Test offers before scaling traffic: (1) Test headline/hook with small ad spend. (2) Test price point with A/B landing pages. (3) Test bonuses with email split test. (4) Test guarantee type with retargeting. (5) Scale the winning combination."
      domain: offer-strategy
      source: "PTS"

    - id: "FW-MP-040"
      title: "Campaign Naming Convention Framework"
      content: "Name campaigns systematically: [Date]_[Objective]_[Audience]_[Offer]_[Creative Type]. Example: 0326_CONV_LAL1PCT_FreePDF_VID. Consistent naming prevents chaos when managing dozens of campaigns."
      domain: campaign-optimization
      source: "PTS"

    - id: "FW-MP-041"
      title: "Retargeting Content Ladder"
      content: "Serve retargeting content in a ladder: Step 1 - Educational content (build trust). Step 2 - Case study or testimonial (build proof). Step 3 - Soft offer with value stack (build desire). Step 4 - Direct offer with urgency (drive action)."
      domain: retargeting
      source: "PTS"

    - id: "FW-MP-042"
      title: "ICOSA Brand Identity Framework"
      content: "Build brand identity across 5 dimensions: (I) Identity - who you are and what you stand for. (C) Community - who your people are. (O) Offering - what you provide. (S) Story - your origin and mission. (A) Aesthetic - visual and verbal style."
      domain: brand-building
      source: "SSM"

    - id: "FW-MP-043"
      title: "Content Pillars Architecture"
      content: "Structure content around 3-5 pillars: Each pillar represents a core topic your brand owns. Example for a fitness brand: Pillar 1 - Workouts, Pillar 2 - Nutrition, Pillar 3 - Mindset, Pillar 4 - Recovery. Every piece of content maps to a pillar."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-044"
      title: "Video Content Formula Framework"
      content: "Structure social videos: (1) Hook in first 3 seconds (question, statement, visual). (2) Setup the problem or topic in 10 seconds. (3) Deliver value for 30-60 seconds. (4) Call to action in final 5 seconds. Total: 60-90 seconds optimal."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-045"
      title: "Giveaway System Framework"
      content: "Run giveaways for growth: (1) Choose prize relevant to your ideal customer (not generic). (2) Set entry mechanic (follow + tag + share). (3) Boost with $5-10/day paid. (4) Run 5-7 days. (5) Announce winner publicly. (6) Follow up all entrants with offer within 48h."
      domain: community-building
      source: "SSM"

    - id: "FW-MP-046"
      title: "Ambassador Pipeline Framework"
      content: "Build ambassadors in 5 stages: (1) Identify - find your most engaged customers. (2) Invite - personal outreach with exclusive offer. (3) Equip - give them content, discount codes, talking points. (4) Activate - launch first campaign together. (5) Reward - commission, recognition, exclusive access."
      domain: community-building
      source: "SSM"

    - id: "FW-MP-047"
      title: "Content Optimization Cycle"
      content: "Optimize content in a 4-week cycle: Week 1 - Create and publish. Week 2 - Analyze performance metrics. Week 3 - Double down on winners (boost, repurpose). Week 4 - Plan next batch based on learnings. Repeat."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-048"
      title: "Syndication Framework"
      content: "Syndicate content across platforms: (1) Create pillar content on primary platform. (2) Adapt format for each secondary platform (vertical for Reels, text for Twitter, etc). (3) Post within 24h of original. (4) Track which platform drives most engagement. (5) Shift resources to top performers."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-049"
      title: "Amplification Decision Framework"
      content: "Decide what to amplify: (1) Post has 2x average engagement organically? Boost it. (2) Post has high save rate? Boost it. (3) Post has comment engagement? Boost it. (4) Post generated DMs or leads? Boost it significantly. (5) Post underperformed? Do not boost."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-050"
      title: "Social Selling Conversation Framework"
      content: "Sell through social conversations: (1) Engage on their content first (give before asking). (2) Start DM with genuine compliment or shared interest. (3) Ask about their business or challenges. (4) Share relevant resource or insight. (5) If aligned, invite to learn more about your offer."
      domain: social-selling
      source: "SSM"

    - id: "FW-MP-051"
      title: "Community Launch Framework"
      content: "Launch a community: (1) Start with 50 founding members (personal invite). (2) Set clear community guidelines. (3) Seed conversations daily for first 30 days. (4) Spotlight member wins weekly. (5) Open to broader audience after community culture is established."
      domain: community-building
      source: "SSM"

    - id: "FW-MP-052"
      title: "Engagement Tier System"
      content: "Categorize followers by engagement: Tier 1 - Lurkers (80%) who consume silently. Tier 2 - Engagers (15%) who like and comment. Tier 3 - Advocates (4%) who share and recommend. Tier 4 - Ambassadors (1%) who actively promote. Nurture each tier differently."
      domain: community-building
      source: "SSM"

    - id: "FW-MP-053"
      title: "Brand Voice Framework"
      content: "Define brand voice across 4 attributes: (1) Tone (formal vs casual). (2) Language (simple vs complex). (3) Emotion (serious vs playful). (4) Perspective (first person vs third person). Document with examples of DO and DO NOT for each attribute."
      domain: brand-building
      source: "SSM"

    - id: "FW-MP-054"
      title: "Content Calendar Framework"
      content: "Build a content calendar: Map content pillars to days of the week. Monday = Pillar 1, Tuesday = Pillar 2, etc. Include content type rotation (video, carousel, story, static). Plan 2 weeks ahead minimum."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-055"
      title: "Social Proof Collection Framework"
      content: "Systematically collect social proof: (1) Auto-email customers 7 days post-purchase for review. (2) Screenshot every positive DM and comment. (3) Request video testimonials from best results. (4) Create case studies quarterly. (5) Organize in swipe file by objection type."
      domain: brand-building
      source: "SSM"

    - id: "FW-MP-056"
      title: "Crisis Communication Framework"
      content: "Handle social media crises: (1) Acknowledge within 1 hour. (2) Investigate privately, respond publicly. (3) Apologize sincerely if warranted. (4) Explain corrective action. (5) Follow up with resolution. Never delete, ignore, or argue."
      domain: brand-building
      source: "SSM"

    - id: "FW-MP-057"
      title: "Influencer Collaboration Framework"
      content: "Collaborate with influencers: (1) Identify micro-influencers in your niche (10K-100K followers). (2) Engage with their content for 2 weeks. (3) Propose value-first collaboration (not pay-for-post). (4) Co-create content. (5) Track results with UTM codes."
      domain: community-building
      source: "SSM"

    - id: "FW-MP-058"
      title: "User-Generated Content System"
      content: "Build a UGC pipeline: (1) Create branded hashtag. (2) Encourage customers to share experiences. (3) Repost and credit the best UGC. (4) Feature UGC in ads (with permission). (5) Reward top UGC creators with products or features."
      domain: brand-building
      source: "SSM"

    - id: "FW-MP-059"
      title: "Platform Priority Framework"
      content: "Prioritize platforms: (1) Where does your audience spend the most time? Go there first. (2) Master one platform before adding another. (3) Each new platform requires 3 months of consistent effort before judging results."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-060"
      title: "Content Batching System"
      content: "Batch content production: (1) Theme Day - brainstorm all content ideas. (2) Production Day - film all videos, write all copy. (3) Edit Day - edit and prepare all assets. (4) Schedule Day - load into scheduling tool. One batch session = 1-2 weeks of content."
      domain: content-marketing
      source: "SSM"

    - id: "FW-MP-061"
      title: "Social Listening Framework"
      content: "Monitor social conversations: (1) Track brand mentions daily. (2) Monitor competitor mentions weekly. (3) Follow industry hashtags. (4) Join relevant groups and forums. (5) Document recurring questions and pain points for content ideas."
      domain: brand-building
      source: "SSM"
    - id: "FW-MP-062"
      title: "Seven Acquisition Funnel Types"
      content: "Seven funnel types for acquisition: (1) Squeeze Page Funnel - free offer, email capture. (2) Tripwire Funnel - low-cost offer, buyer acquisition. (3) Webinar Funnel - education to high-ticket. (4) Application Funnel - qualify high-ticket leads. (5) Survey Funnel - segment and route. (6) VSL Funnel - video-driven sales. (7) Product Launch Funnel - sequence-based open/close."
      domain: funnel-strategy
      source: "TMTP"

    - id: "FW-MP-063"
      title: "Total Value Framework"
      content: "Calculate Total Value per customer: Immediate Value (first purchase) + Upsell Value (same session) + Follow-up Value (email sequence sales) + Recurring Value (subscriptions) + Referral Value (customers they bring). Optimize for Total Value, not just front-end."
      domain: customer-acquisition
      source: "TMTP"

    - id: "FW-MP-064"
      title: "CBO Scaling Framework"
      content: "Scale with CBO in 4 phases: Phase 1 - Start with 3 proven ad sets in CBO at 2x individual budgets. Phase 2 - Let run 48-72h without changes. Phase 3 - Increase CBO budget 15-20% every 3 days. Phase 4 - Add new winning ad sets to CBO as you find them."
      domain: scaling-strategy
      source: "TMTP"

    - id: "FW-MP-065"
      title: "Retargeting Layers Architecture"
      content: "Build retargeting in 5 layers: Layer 1 - All website visitors (broadest, lowest intent). Layer 2 - Specific page visitors (product pages, pricing). Layer 3 - Content engagers (video viewers, post engagers). Layer 4 - Leads (opted in but not purchased). Layer 5 - Cart abandoners (highest intent). Different messaging per layer."
      domain: retargeting
      source: "TMTP"

    - id: "FW-MP-066"
      title: "Google Search Campaign Architecture"
      content: "Structure Google Search: (1) Campaign per product/service. (2) Ad Groups by keyword theme (5-15 keywords per group). (3) Match types separated (exact, phrase, broad in different groups). (4) Negative keyword lists shared across campaigns. (5) Extensions on every campaign."
      domain: google-ads
      source: "TMTP"

    - id: "FW-MP-067"
      title: "YouTube Ad Framework"
      content: "YouTube ad structure: (1) Hook in first 5 seconds (before skip button). (2) Identify the problem by second 10. (3) Present your solution by second 30. (4) Show proof and results by second 45. (5) Clear CTA by second 60. (6) Extended content for engaged viewers after 60s."
      domain: youtube-ads
      source: "TMTP"

    - id: "FW-MP-068"
      title: "Test-Scale-Retarget System"
      content: "The complete traffic system in 3 phases: TEST Phase - Small budgets, many variations, find winners. SCALE Phase - Increase budgets on winners, expand audiences. RETARGET Phase - Capture and convert visitors who did not buy. All 3 phases run simultaneously."
      domain: paid-traffic
      source: "TMTP"

    - id: "FW-MP-069"
      title: "Avatar Creation Framework"
      content: "Create detailed avatars: (1) Demographics (age, income, location). (2) Psychographics (values, beliefs, lifestyle). (3) Pain Points (top 3 problems). (4) Desires (top 3 goals). (5) Objections (top 3 reasons they would not buy). (6) Information Sources (where they learn). (7) Language (words they use)."
      domain: audience-targeting
      source: "TMTP"

    - id: "FW-MP-070"
      title: "Splintering Funnel Framework"
      content: "Splinter your core offer: (1) Identify your highest-value offering. (2) Break off one compelling piece. (3) Price it as an irresistible entry point ($7-$47). (4) Deliver massive value in the splinter. (5) Upsell to core offer immediately after. The splinter creates buyers from browsers."
      domain: offer-strategy
      source: "TMTP"

    - id: "FW-MP-071"
      title: "Cross-Platform Retargeting Framework"
      content: "Retarget across platforms: (1) Visitor arrives via Facebook ad. (2) Does not convert on website. (3) Sees Google Display retargeting ad. (4) Visits again, does not convert. (5) Sees YouTube pre-roll with testimonial. (6) Returns and converts. Multi-platform retargeting increases conversion by 2-3x."
      domain: retargeting
      source: "TMTP"

    - id: "FW-MP-072"
      title: "Webinar Funnel Framework"
      content: "Build a webinar funnel: (1) Registration page with clear promise. (2) Thank you page with calendar invite. (3) 3-email reminder sequence. (4) Webinar delivers 45min of value + 15min pitch. (5) Post-webinar replay email (48h access). (6) Post-webinar sales sequence (5 emails over 5 days)."
      domain: funnel-strategy
      source: "TMTP"

    - id: "FW-MP-073"
      title: "Application Funnel Framework"
      content: "Build an application funnel for high-ticket: (1) Ad highlights transformation and exclusivity. (2) Landing page with VSL or long-form. (3) Application form (10-15 qualifying questions). (4) Thank you page sets expectations. (5) Sales team calls qualified applicants within 24h."
      domain: funnel-strategy
      source: "TMTP"

    - id: "FW-MP-074"
      title: "Google Display Targeting Framework"
      content: "Target on Google Display: (1) Custom Intent - people searching your keywords on Google. (2) In-Market - people actively researching your category. (3) Affinity - people with relevant interests. (4) Placements - specific websites your audience visits. (5) Remarketing - your website visitors. Layer for precision."
      domain: google-ads
      source: "TMTP"

    - id: "FW-MP-075"
      title: "Budget Scaling Calculator"
      content: "Calculate scaling ceiling: Max Daily Budget = (Monthly Revenue Goal / Average Order Value / Conversion Rate) x CPC. Example: $100K goal / $100 AOV / 2% CR x $3 CPC = $150/day. Scale to this number methodically."
      domain: scaling-strategy
      source: "TMTP"

    - id: "FW-MP-076"
      title: "Creative Brief Framework"
      content: "Write creative briefs: (1) Objective - what action do we want? (2) Audience - who are we talking to? (3) Insight - what does the audience believe/feel? (4) Message - what is the single most important thing to communicate? (5) Proof - why should they believe us? (6) Tone - how should it feel?"
      domain: ad-creative
      source: "TMTP"

    - id: "FW-MP-077"
      title: "Conversion Rate Optimization Framework"
      content: "Optimize conversions systematically: (1) Analyze - identify biggest drop-off points. (2) Hypothesize - what might fix it. (3) Test - A/B test one change. (4) Measure - wait for statistical significance. (5) Implement - roll out winner. (6) Repeat - move to next biggest drop-off."
      domain: conversion-optimization
      source: "TMTP"

    - id: "FW-MP-078"
      title: "Ad Account Structure Framework"
      content: "Structure ad accounts: (1) One campaign per objective. (2) Separate cold and retargeting campaigns. (3) Group similar audiences in same campaign. (4) Never mix prospecting and retargeting in one campaign. (5) Use clear naming conventions on everything."
      domain: facebook-ads
      source: "TMTP"

    - id: "FW-MP-079"
      title: "YouTube Channel Growth Framework"
      content: "Grow a YouTube channel for traffic: (1) Optimize channel page for your keyword. (2) Create 30 searchable videos (how-to, tutorial). (3) Consistency - publish weekly minimum. (4) SEO every video (title, description, tags). (5) Run discovery ads to best-performing videos. (6) End-screen and cards to drive subscribers."
      domain: youtube-ads
      source: "TMTP"

    - id: "FW-MP-080"
      title: "Multi-Platform Campaign Framework"
      content: "Run campaigns across platforms: (1) Facebook/Instagram for awareness and engagement. (2) Google Search for intent capture. (3) YouTube for education and trust. (4) Email for nurture and conversion. (5) Retarget across all platforms for omnipresence."
      domain: paid-traffic
      source: "TMTP"

    - id: "FW-MP-081"
      title: "Performance Reporting Framework"
      content: "Report performance in 3 tiers: Tier 1 Daily (spend, CPA, ROAS), Tier 2 Weekly (trends, creative performance, audience performance), Tier 3 Monthly (LTV, cohort analysis, channel comparison, strategic recommendations). Match reporting frequency to decision frequency."
      domain: campaign-optimization
      source: "TMTP"

  L5_METHODOLOGIES:
    - id: "MET-MP-001"
      title: "Interest Targeting Research Methodology"
      content: "Step 1: List 10 competitors. Step 2: List 10 industry influencers. Step 3: List 10 related publications. Step 4: List 10 related tools/software. Step 5: Input each into Facebook Audience Insights. Step 6: Note audience size and affinity. Step 7: Group into 3-5 interest ad sets with 1M+ size each."
      domain: audience-targeting
      source: "PTM"

    - id: "MET-MP-002"
      title: "Campaign Setup Step-by-Step"
      content: "Step 1: Choose objective (Conversions for most). Step 2: Set daily budget ($20+ per ad set). Step 3: Define audience (location, age, interests). Step 4: Choose placements (auto for start, manual for optimization). Step 5: Upload 3-5 creative variations. Step 6: Write ad copy (hook + benefit + CTA). Step 7: Set destination URL with UTM. Step 8: Review and publish."
      domain: facebook-ads
      source: "PTM"

    - id: "MET-MP-003"
      title: "Campaign Health Check Methodology"
      content: "Daily at 10am: Step 1: Check spend vs budget (on pace?). Step 2: Check CPA vs target (within range?). Step 3: Check frequency (below 3?). Step 4: Check CTR (above 1%?). Step 5: Pause any ad with 3x CPA and zero conversions. Step 6: Note top performer for potential scale. Step 7: Document in tracking sheet."
      domain: campaign-optimization
      source: "PTM"

    - id: "MET-MP-004"
      title: "Troubleshooting Methodology"
      content: "Step 1: Identify the problem metric (CPA too high? CTR too low?). Step 2: Run through Waterfall - check Offer first (does it convert organically?). Step 3: Check Targeting (audience right size and relevance?). Step 4: Check Creative (does it stop the scroll?). Step 5: Check Copy (does it speak to pain/desire?). Step 6: Check Landing Page (does it convert other traffic?). Step 7: Fix ONE thing, wait 48h, re-evaluate."
      domain: campaign-optimization
      source: "PTM"

    - id: "MET-MP-005"
      title: "Scaling Methodology"
      content: "Step 1: Identify campaign with CPA below target for 3+ consecutive days. Step 2: Increase budget 15-20%. Step 3: Wait 48-72 hours. Step 4: If CPA holds, increase again. Step 5: If CPA rises 20%+, reduce to previous level. Step 6: When vertical scaling hits ceiling, horizontal scale (duplicate to new audiences). Step 7: Track in scaling log."
      domain: scaling-strategy
      source: "PTM"
    - id: "MET-MP-006"
      title: "Lookalike Audience Creation Methodology"
      content: "Step 1: Export customer list (email + phone). Step 2: Upload as Custom Audience. Step 3: Create 1% Lookalike from customer list. Step 4: Create 1% Lookalike from top 25% by LTV. Step 5: Create 1% Lookalike from email engagers. Step 6: Test all three as separate ad sets. Step 7: Scale the best-performing lookalike."
      domain: audience-targeting
      source: "PTM"

    - id: "MET-MP-007"
      title: "Retargeting Setup Methodology"
      content: "Step 1: Install pixel on all pages. Step 2: Create Custom Audiences - All Visitors (180 days), Key Page Visitors (30 days), Video Viewers (365 days), Engaged Users (365 days). Step 3: Create retargeting campaign with separate ad sets per audience. Step 4: Create specific messaging per audience. Step 5: Set frequency caps. Step 6: Launch with 20-30% of total budget."
      domain: retargeting
      source: "PTM"

    - id: "MET-MP-008"
      title: "Ad Copy Writing Methodology"
      content: "Step 1: Open Before/After Grid for your avatar. Step 2: Choose primary angle (pain, aspiration, or social proof). Step 3: Write hook that stops the scroll (question, bold statement, or statistic). Step 4: Agitate the problem or paint the desire. Step 5: Present solution with 3 key benefits. Step 6: Add social proof element. Step 7: Write clear CTA. Step 8: Add urgency if applicable."
      domain: copywriting-ads
      source: "PTM"

    - id: "MET-MP-009"
      title: "Creative Production Methodology"
      content: "Step 1: Review top-performing ads in your niche (Facebook Ad Library). Step 2: Identify 3 winning formats. Step 3: Create your version of each format with your messaging. Step 4: Produce in 3 formats - static image, video, carousel. Step 5: Write 3 copy variations per visual. Step 6: Create 9-15 total ad variations. Step 7: Launch in testing campaign."
      domain: ad-creative
      source: "PTM"

    - id: "MET-MP-010"
      title: "Landing Page Optimization Methodology"
      content: "Step 1: Ensure headline matches ad exactly. Step 2: Run heatmap tool (Hotjar) for 1 week. Step 3: Identify biggest drop-off point. Step 4: A/B test one change at that point. Step 5: Run test for 500+ visitors per variation. Step 6: Implement winner. Step 7: Move to next drop-off. Step 8: Repeat monthly."
      domain: conversion-optimization
      source: "PTM"

    - id: "MET-MP-011"
      title: "Budget Optimization Methodology"
      content: "Step 1: Set initial budgets at $20/day per ad set. Step 2: Run for 3-5 days. Step 3: Calculate CPA per ad set. Step 4: Kill ad sets with CPA 2x+ target. Step 5: Maintain ad sets at target CPA. Step 6: Scale ad sets below target CPA by 15-20%. Step 7: Reallocate killed budget to winners. Step 8: Repeat weekly."
      domain: campaign-optimization
      source: "PTM"

    - id: "MET-MP-012"
      title: "Pixel Event Setup Methodology"
      content: "Step 1: Install base pixel code on all pages. Step 2: Set up PageView event (automatic). Step 3: Set up ViewContent on product/sales pages. Step 4: Set up Lead on thank-you pages after opt-in. Step 5: Set up Purchase on order confirmation. Step 6: Verify all events in Events Manager. Step 7: Create Custom Conversions for specific pages if needed."
      domain: facebook-ads
      source: "PTM"

    - id: "MET-MP-013"
      title: "Traffic System Build Methodology"
      content: "Step 1: Map your Customer Value Journey. Step 2: Identify content for each stage. Step 3: Build acquisition campaign (cold to lead magnet). Step 4: Build retargeting campaign (warm to offer). Step 5: Build monetization campaign (hot to upsell). Step 6: Connect all three with email automation. Step 7: Launch all three simultaneously. Step 8: Optimize weekly."
      domain: paid-traffic
      source: "PTS"

    - id: "MET-MP-014"
      title: "Blog Boomerang Execution"
      content: "Step 1: Select top-performing blog post (high engagement or traffic). Step 2: Create Boost Post campaign targeting cold audience interested in topic. Step 3: Set budget $5-10/day. Step 4: Run for 7 days. Step 5: Create Custom Audience of blog post visitors. Step 6: Create retargeting ad with relevant lead magnet for those visitors. Step 7: Track CPA from blog to lead."
      domain: retargeting
      source: "PTS"

    - id: "MET-MP-015"
      title: "Comment-to-Message Setup"
      content: "Step 1: Create engaging organic post with clear CTA (Comment X to get Y). Step 2: Set up ManyChat or Chatfuel automation trigger on comment keyword. Step 3: Write DM sequence - Message 1: Deliver promised value. Message 2: Ask qualifying question. Message 3: If qualified, share offer link. Step 4: Boost the post to warm and cold audiences. Step 5: Monitor and follow up with non-responders at 24h."
      domain: social-selling
      source: "PTS"

    - id: "MET-MP-016"
      title: "Flash Sale Execution Methodology"
      content: "Step 1: Choose product and discount (15-30% off or bonus add-on). Step 2: Set real deadline (48-72h). Step 3: Email list 24h pre-announcement. Step 4: Launch with email + social + paid ads simultaneously. Step 5: Retarget page visitors who did not buy at 12h mark. Step 6: Send final urgency email 6h before close. Step 7: Close sale ON TIME. Step 8: Post-mortem - revenue, CPA, conversion rate."
      domain: conversion-optimization
      source: "PTS"

    - id: "MET-MP-017"
      title: "Customer Story Collection Methodology"
      content: "Step 1: Identify top 20 customer results. Step 2: Send email request with specific questions (before state, after state, specific results). Step 3: Offer incentive (discount, feature, gift). Step 4: Film video testimonials or collect written stories. Step 5: Edit into 60-90 second ad format. Step 6: Test as ads against cold and retargeting audiences. Step 7: Top performers become evergreen ads."
      domain: ad-creative
      source: "PTS"

    - id: "MET-MP-018"
      title: "Webinar Traffic Fill Methodology"
      content: "Step 1: Create registration page with compelling headline and 3 bullet points of what they will learn. Step 2: Launch conversion campaign targeting cold lookalikes and interest audiences. Step 3: Launch retargeting campaign to warm audiences who did not register. Step 4: Send 3 reminder emails (48h, 24h, 1h before). Step 5: Run day-of reminder ads to registrants. Step 6: Track registration CPA and show rate."
      domain: funnel-strategy
      source: "PTS"

    - id: "MET-MP-019"
      title: "Cross-Sell Campaign Setup"
      content: "Step 1: Segment customer list by product purchased. Step 2: Identify most logical next product for each segment. Step 3: Create Custom Audience from buyer segment. Step 4: Create ad messaging that bridges products. Step 5: Set timing window (7-30 days post-purchase). Step 6: Offer bundle or exclusive pricing. Step 7: Track incremental revenue per customer."
      domain: funnel-strategy
      source: "PTS"

    - id: "MET-MP-020"
      title: "Win-Back Campaign Setup"
      content: "Step 1: Define lapse criteria (no purchase in 60-180 days). Step 2: Export lapsed customer list. Step 3: Create Custom Audience. Step 4: Create we miss you ad creative. Step 5: Offer return incentive (discount or new feature highlight). Step 6: Run for 14 days. Step 7: Move non-responders to cold audience pool."
      domain: retargeting
      source: "PTS"

    - id: "MET-MP-021"
      title: "Seasonal Campaign Planning"
      content: "Step 1: Map all relevant holidays and industry events for the year. Step 2: Create campaign calendar with 2-week lead time per event. Step 3: Design themed creative 2 weeks before. Step 4: Pre-announce to email list and warm audiences 3-5 days before. Step 5: Launch ads 3-5 days before event. Step 6: Peak spend on event day. Step 7: Extension or last-chance day after event."
      domain: paid-traffic
      source: "PTS"

    - id: "MET-MP-022"
      title: "Lead Magnet Creation Methodology"
      content: "Step 1: Identify your audiences number one question or pain point. Step 2: Create asset that solves it (PDF, video, quiz, template). Step 3: Write compelling title that promises specific outcome. Step 4: Design professional cover/thumbnail. Step 5: Create delivery automation (email with download). Step 6: Build landing page. Step 7: Test with $50-100 in ads. Step 8: Iterate based on opt-in rate."
      domain: funnel-strategy
      source: "PTS"

    - id: "MET-MP-023"
      title: "Email Nurture Build Methodology"
      content: "Step 1: Map out 5-7 email sequence. Step 2: Email 1 delivers lead magnet with warmth. Step 3: Email 2 provides quick win related to lead magnet. Step 4: Email 3 shares customer success story. Step 5: Email 4 addresses top objection. Step 6: Email 5 soft pitch with value stack. Step 7: Email 6 hard pitch with urgency. Step 8: Set up automation triggers and delays."
      domain: funnel-strategy
      source: "PTS"

    - id: "MET-MP-024"
      title: "Campaign Audit Methodology"
      content: "Step 1: Pull 30-day report for all active campaigns. Step 2: Sort by CPA ascending. Step 3: Bottom 20% - pause immediately. Step 4: Middle 60% - identify optimization opportunity (new creative, audience tweak, or copy change). Step 5: Top 20% - flag for scaling. Step 6: Check frequency on all active ads. Step 7: Refresh any creative above frequency 3. Step 8: Document findings and action items."
      domain: campaign-optimization
      source: "PTS"

    - id: "MET-MP-025"
      title: "Retargeting Audience Organization"
      content: "Step 1: Create master audience list document. Step 2: Set up audiences by time window (1-3d, 3-7d, 7-14d, 14-30d, 30-90d, 90-180d). Step 3: Set up audiences by action (page visit, video view, engagement, lead, purchase). Step 4: Create matrix of time x action. Step 5: Assign messaging strategy per cell. Step 6: Build campaigns per tier. Step 7: Review and prune quarterly."
      domain: retargeting
      source: "PTS"

    - id: "MET-MP-026"
      title: "Conversion Tracking Setup"
      content: "Step 1: Define your key conversion events (Lead, Purchase, Add to Cart). Step 2: Install platform pixels (Facebook, Google, LinkedIn). Step 3: Configure server-side tracking via CAPI or GTM. Step 4: Set up UTM parameters for all campaign URLs. Step 5: Verify events fire correctly in each platform. Step 6: Set up Google Analytics goals. Step 7: Create conversion dashboards. Step 8: Audit tracking monthly."
      domain: conversion-optimization
      source: "PTS"

    - id: "MET-MP-027"
      title: "Lookalike Testing Methodology"
      content: "Step 1: Create source audiences (customers, top LTV, leads, engagers). Step 2: Create 1% lookalike from each source. Step 3: Launch as separate ad sets in same campaign. Step 4: Equal budget per ad set ($20-50/day). Step 5: Run 5-7 days. Step 6: Compare CPA across lookalikes. Step 7: Scale winning lookalike. Step 8: Test 2-5% expansion of winner."
      domain: audience-targeting
      source: "PTS"

    - id: "MET-MP-028"
      title: "Ambassador Pipeline Build"
      content: "Step 1: Identify top 50 most engaged customers (purchase frequency, social engagement). Step 2: Personal outreach via email or DM. Step 3: Invite to exclusive ambassador program. Step 4: Send ambassador kit (talking points, content templates, discount codes). Step 5: Launch first campaign together. Step 6: Track referral revenue per ambassador. Step 7: Reward top performers monthly (commission, products, features)."
      domain: community-building
      source: "SSM"

    - id: "MET-MP-029"
      title: "Content Optimization Methodology"
      content: "Step 1: Post content for 2 weeks. Step 2: Analyze metrics (reach, engagement rate, saves, shares). Step 3: Identify top 3 performers and bottom 3 performers. Step 4: Analyze what the top 3 have in common (topic, format, time, tone). Step 5: Create more content in winning pattern. Step 6: Boost top performer with $5-10/day. Step 7: Repeat monthly. Step 8: Update content pillars quarterly based on data."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-030"
      title: "Content Syndication Methodology"
      content: "Step 1: Create pillar content (long-form video, blog post, or podcast episode). Step 2: Extract 5-10 key quotes or moments. Step 3: Create short-form video clips (15-60s). Step 4: Create quote graphics for Instagram/Twitter. Step 5: Write text-only version for LinkedIn. Step 6: Create carousel for Instagram. Step 7: Post pillar content on primary platform. Step 8: Syndicate derivative content across all platforms within 24-48h."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-031"
      title: "Paid Amplification Methodology"
      content: "Step 1: Let content run organically for 24-48h. Step 2: Identify posts with 2x or higher average engagement. Step 3: Boost top performer to lookalike audience. Step 4: Set budget $5-20/day depending on performance. Step 5: Run for 3-7 days. Step 6: Track new followers, engagement, and downstream conversions. Step 7: If performance holds, increase budget 15-20%. Step 8: Rotate in new winning organic content weekly."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-032"
      title: "Giveaway Execution Methodology"
      content: "Step 1: Choose prize relevant to ideal customer (not iPad - your product/service). Step 2: Define entry mechanics (follow, like, tag 2 friends, share to stories). Step 3: Create announcement post and story. Step 4: Boost announcement with $10/day. Step 5: Post daily reminder content during giveaway (5-7 days). Step 6: Announce winner publicly. Step 7: DM all entrants with consolation offer within 48h. Step 8: Track entrant-to-customer conversion at 30 days."
      domain: community-building
      source: "SSM"

    - id: "MET-MP-033"
      title: "Brand Voice Development"
      content: "Step 1: Describe your brand as a person (age, personality, style). Step 2: List 5 words that describe your voice. Step 3: List 5 words your voice is NOT. Step 4: Write sample responses in your voice for common situations. Step 5: Create DO and DO NOT examples. Step 6: Document in brand voice guide. Step 7: Train team on brand voice. Step 8: Audit content monthly for voice consistency."
      domain: brand-building
      source: "SSM"

    - id: "MET-MP-034"
      title: "Community Building Methodology"
      content: "Step 1: Define community purpose and values. Step 2: Choose platform (Facebook Group, Discord, Circle, etc.). Step 3: Invite 50 founding members personally. Step 4: Post daily conversation starters for first 30 days. Step 5: Create weekly rituals (Win Wednesday, FAQ Friday). Step 6: Spotlight member achievements. Step 7: Establish community guidelines and enforce them. Step 8: Open to broader audience after culture is established (month 2-3)."
      domain: community-building
      source: "SSM"

    - id: "MET-MP-035"
      title: "Influencer Outreach Methodology"
      content: "Step 1: Identify 20 micro-influencers in your niche (10K-100K followers, high engagement). Step 2: Engage with their content daily for 2 weeks (genuine comments, shares). Step 3: DM with value-first proposal (not pay-for-post). Step 4: Propose collaboration (joint live, content swap, product review). Step 5: Send product/service for review. Step 6: Co-create content with agreed terms. Step 7: Track results via UTM codes. Step 8: Nurture relationship for ongoing collaboration."
      domain: community-building
      source: "SSM"

    - id: "MET-MP-036"
      title: "UGC Collection Methodology"
      content: "Step 1: Create branded hashtag. Step 2: Email customers asking them to share experience with hashtag. Step 3: Repost best UGC to your feed with credit. Step 4: DM top UGC creators asking for permission to use in ads. Step 5: Get signed release form. Step 6: Edit UGC into ad format (add captions, branding, CTA). Step 7: Test UGC ads against brand-created ads. Step 8: Compensate top UGC creators."
      domain: brand-building
      source: "SSM"

    - id: "MET-MP-037"
      title: "Social Listening Setup"
      content: "Step 1: List 10 keywords to monitor (brand name, competitors, industry terms). Step 2: Set up monitoring tool (Mention, Brandwatch, or manual searches). Step 3: Check daily for brand mentions. Step 4: Respond to all mentions within 4h. Step 5: Log recurring questions for content ideas. Step 6: Track sentiment trends weekly. Step 7: Report competitive intelligence monthly. Step 8: Adjust content strategy based on findings."
      domain: brand-building
      source: "SSM"

    - id: "MET-MP-038"
      title: "Video Production for Social"
      content: "Step 1: Plan content batch (10 videos per session). Step 2: Set up simple studio (ring light, phone tripod, clean background). Step 3: Write bullet point outlines (not scripts - be natural). Step 4: Record all 10 videos in one session. Step 5: Edit to platform specifications (vertical for Reels/TikTok, square for feed). Step 6: Add captions (85% watch without sound). Step 7: Write post copy. Step 8: Schedule across platforms."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-039"
      title: "Engagement Growth Methodology"
      content: "Step 1: Post consistently (1-2x/day on primary platform). Step 2: Reply to EVERY comment within 60 minutes. Step 3: Engage on 10 accounts in your niche daily. Step 4: Ask questions in every post to drive comments. Step 5: Use polls, quizzes, and interactive stories daily. Step 6: Go live weekly. Step 7: Collaborate with one creator per week. Step 8: Track engagement rate weekly and adjust."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-040"
      title: "Content Pillar Development"
      content: "Step 1: Identify 3-5 core topics your brand can own. Step 2: For each pillar, list 20 subtopics. Step 3: Map subtopics to content formats (video, carousel, static, story). Step 4: Create content calendar assigning pillars to days. Step 5: Produce first 2 weeks of content. Step 6: Track which pillar gets most engagement. Step 7: Double down on winning pillar. Step 8: Review and update pillars quarterly."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-041"
      title: "Social Selling DM Strategy"
      content: "Step 1: Identify 20 warm prospects (engaged with content, visited profile). Step 2: Like and comment on their last 3 posts. Step 3: Send DM with genuine compliment or shared interest. Step 4: Ask one open-ended question about their business. Step 5: Listen and respond thoughtfully. Step 6: Share relevant resource or insight. Step 7: If natural, mention your solution. Step 8: Follow up in 3 days if no response."
      domain: social-selling
      source: "SSM"

    - id: "MET-MP-042"
      title: "Hashtag Research Methodology"
      content: "Step 1: List 30 hashtags in your niche. Step 2: Check volume of each (aim for mix of small 10K-100K, medium 100K-500K, large 500K+). Step 3: Create 3 hashtag sets of 10-15 each. Step 4: Rotate sets across posts. Step 5: Track reach from hashtags in insights. Step 6: Replace underperforming hashtags monthly. Step 7: Add trending industry hashtags when relevant. Step 8: Never use banned hashtags."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-043"
      title: "Content Repurposing Pipeline"
      content: "Step 1: Record one long-form piece (podcast, video, live). Step 2: Transcribe the full content. Step 3: Extract 5-10 key quotes for graphics. Step 4: Cut 3-5 short video clips (15-60s). Step 5: Write blog post from transcript. Step 6: Create email newsletter from highlights. Step 7: Design carousel post for key takeaways. Step 8: Schedule all pieces across platforms over 2 weeks."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-044"
      title: "Analytics Review Methodology"
      content: "Step 1: Review Instagram/Facebook Insights weekly. Step 2: Note top 3 posts by reach, engagement, and saves. Step 3: Analyze commonalities (topic, format, time posted, caption style). Step 4: Note bottom 3 posts. Step 5: Analyze what did not work. Step 6: Adjust next weeks content based on findings. Step 7: Track follower growth rate weekly. Step 8: Monthly deep dive - profile visits, website clicks, email signups from social."
      domain: content-marketing
      source: "SSM"

    - id: "MET-MP-045"
      title: "Test Campaign Setup Methodology"
      content: "Step 1: Define testing objective (audience, creative, or offer). Step 2: Create 3-5 variations of the variable being tested. Step 3: Hold all other variables constant. Step 4: Set up campaign with one ad set per variation. Step 5: Equal budget per ad set ($20-50/day). Step 6: Run for 5-7 days without changes. Step 7: Compare results using primary metric (CPA, ROAS, CTR). Step 8: Scale winner, kill losers, document learnings."
      domain: campaign-optimization
      source: "TMTP"

    - id: "MET-MP-046"
      title: "Scale Campaign Methodology"
      content: "Step 1: Confirm winning campaign has been profitable for 5+ days. Step 2: Check that CPA is 20%+ below target. Step 3: Increase budget 15-20%. Step 4: Wait 48-72h for algorithm to adjust. Step 5: If CPA holds within 10% of previous, increase again. Step 6: If CPA spikes 20%+, revert to previous budget. Step 7: When vertical scaling hits ceiling, horizontal scale to new audiences. Step 8: Track in scaling log with daily CPA and spend."
      domain: scaling-strategy
      source: "TMTP"

    - id: "MET-MP-047"
      title: "Retarget Campaign Setup Methodology"
      content: "Step 1: Define retargeting audiences by layer (visitors, engagers, leads, cart, buyers). Step 2: Create Custom Audiences for each layer with appropriate time windows. Step 3: Create separate ad sets per layer. Step 4: Write layer-specific messaging (reminder, proof, urgency, cross-sell). Step 5: Set frequency caps (7/week). Step 6: Set budget proportional to audience size. Step 7: Exclude buyers from non-buyer campaigns. Step 8: Launch and monitor daily."
      domain: retargeting
      source: "TMTP"

    - id: "MET-MP-048"
      title: "Avatar Creation Methodology"
      content: "Step 1: Name your avatar (make them real). Step 2: Define demographics (age, income, location, family). Step 3: Define psychographics (values, beliefs, lifestyle). Step 4: List top 5 pain points with emotional language. Step 5: List top 5 desires and aspirations. Step 6: List top 5 objections to buying. Step 7: Map information sources (podcasts, blogs, influencers). Step 8: Write a day in their life narrative. Step 9: Validate with real customer interviews."
      domain: audience-targeting
      source: "TMTP"

    - id: "MET-MP-049"
      title: "CBO Campaign Setup"
      content: "Step 1: Select 3-5 proven ad sets (each has been profitable individually). Step 2: Create new CBO campaign. Step 3: Set budget at 2x the sum of individual ad set budgets. Step 4: Move ad sets into CBO campaign. Step 5: Do not set ad set spend limits (let algorithm allocate). Step 6: Run 48-72h without changes. Step 7: Analyze performance per ad set. Step 8: If one ad set dominates unhealthily, add minimum spend to others."
      domain: facebook-ads
      source: "TMTP"

    - id: "MET-MP-050"
      title: "Google Search Campaign Setup"
      content: "Step 1: Define campaign goal and budget. Step 2: Research keywords using Keyword Planner. Step 3: Group keywords into themed ad groups (5-15 keywords each). Step 4: Start with exact match. Step 5: Write 3+ responsive search ads per ad group. Step 6: Add all relevant ad extensions. Step 7: Set up conversion tracking. Step 8: Add negative keyword list. Step 9: Launch with manual CPC bidding. Step 10: Switch to automated bidding after 50+ conversions."
      domain: google-ads
      source: "TMTP"

    - id: "MET-MP-051"
      title: "YouTube Ad Campaign Setup"
      content: "Step 1: Create 60-90 second video ad following ABCD framework. Step 2: Upload to YouTube (unlisted). Step 3: Create Video campaign in Google Ads. Step 4: Target using Custom Intent audiences (keywords) and In-Market segments. Step 5: Set CPV bid at $0.05-0.15. Step 6: Add companion banner. Step 7: Set up conversion tracking. Step 8: Run for 7 days. Step 9: Analyze view rate and conversion rate. Step 10: Optimize targeting based on performance."
      domain: youtube-ads
      source: "TMTP"

    - id: "MET-MP-052"
      title: "Webinar Funnel Build Methodology"
      content: "Step 1: Choose webinar topic solving top audience pain point. Step 2: Build registration page (headline, 3 bullets, time/date, CTA). Step 3: Write 3-email reminder sequence. Step 4: Create 60-min webinar (45 min value + 15 min pitch). Step 5: Build replay page with 48h timer. Step 6: Write 5-email post-webinar sales sequence. Step 7: Launch traffic to registration page. Step 8: Track: registration CPA, show rate, conversion rate, revenue per registrant."
      domain: funnel-strategy
      source: "TMTP"

    - id: "MET-MP-053"
      title: "Application Funnel Build Methodology"
      content: "Step 1: Create landing page with VSL (5-15 min video explaining transformation and process). Step 2: Build application form with 10-15 qualifying questions. Step 3: Set up thank-you page with next steps and expectations. Step 4: Configure email notification to sales team for new applications. Step 5: Train sales team on application follow-up (call within 24h). Step 6: Launch traffic targeting warm and lookalike audiences. Step 7: Track: application CPA, qualification rate, close rate, revenue per application."
      domain: funnel-strategy
      source: "TMTP"

    - id: "MET-MP-054"
      title: "Tripwire Funnel Build Methodology"
      content: "Step 1: Splinter one compelling element from your core offer. Step 2: Price at $7-$47 (irresistible). Step 3: Build sales page emphasizing value relative to low price. Step 4: Add order bump on checkout (complementary offer, 30-50% take rate). Step 5: Build one-click upsell page (core offer or premium version). Step 6: Set up thank-you page with next steps. Step 7: Launch cold traffic. Step 8: Track: front-end CPA, AOV (including bumps/upsells), 30-day LTV."
      domain: offer-strategy
      source: "TMTP"

    - id: "MET-MP-055"
      title: "Survey Funnel Build Methodology"
      content: "Step 1: Create landing page with curiosity-driven headline. Step 2: Build 5-7 question survey that segments respondents. Step 3: Based on answers, route to personalized results page. Step 4: Results page recommends specific product/service. Step 5: Include CTA to purchase or book call. Step 6: Follow up via email with personalized sequence based on survey answers. Step 7: Launch traffic. Step 8: Track: survey completion rate, conversion rate per segment."
      domain: funnel-strategy
      source: "TMTP"

    - id: "MET-MP-056"
      title: "Google Display Campaign Setup"
      content: "Step 1: Create display ad in multiple sizes (responsive display ad). Step 2: Write 5 headlines, 5 descriptions. Step 3: Upload 5+ images and logos. Step 4: Target using Custom Intent (keywords) and In-Market audiences. Step 5: Add placement exclusions (kids content, sensitive topics). Step 6: Set daily budget at 10x target CPC. Step 7: Run for 7 days. Step 8: Review placement report and exclude low-quality sites. Step 9: Optimize toward converting placements."
      domain: google-ads
      source: "TMTP"

    - id: "MET-MP-057"
      title: "Cross-Platform Retargeting Setup"
      content: "Step 1: Install pixels for all platforms (Facebook, Google, LinkedIn). Step 2: Create retargeting audiences on each platform. Step 3: Create platform-specific retargeting creative. Step 4: Launch retargeting on all platforms simultaneously. Step 5: Set frequency caps per platform (5-7/week). Step 6: Create exclusion audiences (buyers, converters) across all platforms. Step 7: Track assisted conversions in GA. Step 8: Allocate more budget to highest-assisting platform."
      domain: retargeting
      source: "TMTP"

    - id: "MET-MP-058"
      title: "Ad Creative Refresh Process"
      content: "Step 1: Monitor frequency and CTR weekly. Step 2: When frequency exceeds 2.5 or CTR drops 20% from peak, flag for refresh. Step 3: Review top-performing ads from last 60 days for pattern. Step 4: Create 3-5 new variations following winning patterns with fresh visuals and hooks. Step 5: Launch new creative in existing ad sets. Step 6: Pause fatigued creative after 48h of new creative running. Step 7: Archive old creative for seasonal reuse."
      domain: ad-creative
      source: "TMTP"

    - id: "MET-MP-059"
      title: "Monthly Performance Review Methodology"
      content: "Step 1: Pull all platform data into single dashboard. Step 2: Calculate blended CPA and ROAS (all spend / all revenue). Step 3: Compare to previous month and same month last year. Step 4: Identify top 3 campaigns by ROI. Step 5: Identify bottom 3 campaigns. Step 6: Analyze creative performance (which themes, formats, hooks won). Step 7: Review audience performance (which audiences converted best). Step 8: Set next month optimization priorities. Step 9: Update forecasts."
      domain: campaign-optimization
      source: "TMTP"

    - id: "MET-MP-060"
      title: "New Platform Expansion Methodology"
      content: "Step 1: Research platform demographics and ad formats. Step 2: Allocate 10-15% of total budget for testing. Step 3: Start with retargeting (your warmest audiences on new platform). Step 4: Run for 14 days. Step 5: If retargeting is profitable, launch prospecting campaigns. Step 6: Test 3-5 audience options unique to the platform. Step 7: Run for 30 days. Step 8: Evaluate CPA vs primary platform. Step 9: If within 30% of primary platform CPA, scale gradually."
      domain: paid-traffic
      source: "TMTP"

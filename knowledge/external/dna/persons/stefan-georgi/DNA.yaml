  L5_METHODOLOGIES:

    # === COPY ACCELERATOR: Step-by-Step Processes (MET-SG-001 to MET-SG-014) ===

    - id: "MET-SG-001"
      title: "RMBC Full Implementation Process"
      description: "Step-by-step execution of RMBC: Step 1 — Research (3-5 hrs: market, product, competition, emotions, objections, proof, mechanisms). Step 2 — Mechanism (identify dual mechanisms, name them, draft proof). Step 3 — Brief (complete full brief template, review before proceeding). Step 4 — Copy (write first draft in one session, edit separately)."
      domains: [copywriting, process, direct-response]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-002"
      title: "Sales Letter Writing Process"
      description: "Complete sales letter workflow: 1) Complete RMBC Steps 1-3, 2) Write lead (10 elements), 3) Write problem agitation, 4) Introduce unique mechanism, 5) Present solution, 6) Build proof stack (3+ layers), 7) Construct offer stack, 8) Write close with AOV Money Close, 9) Add PS, 10) Review and edit in separate session."
      domains: [copywriting, sales-letters, process]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-003"
      title: "Unique Mechanism Discovery Process"
      description: "Step-by-step mechanism identification: 1) Research product ingredients/features deeply, 2) Find what's genuinely different, 3) Research the science/logic behind it, 4) Articulate why competitors can't claim it, 5) Name it memorably, 6) Create visual/metaphor for it, 7) Draft proof for the mechanism, 8) Test the mechanism story on cold audience."
      domains: [copywriting, differentiation, research]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-004"
      title: "Subject Line Generation Process"
      description: "Process for generating subject lines: 1) Choose 3-4 categories from the 12-Category Matrix, 2) Write 5 subject lines per category, 3) Rate each for curiosity 1-10, 4) Select top 5 overall, 5) Test against control, 6) Record results in swipe database."
      domains: [email-marketing, subject-lines, process]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-005"
      title: "AOV Optimization Process"
      description: "Step-by-step AOV improvement: 1) Audit current AOV and identify bottleneck, 2) Test higher price points (always test up first), 3) Optimize Upsell 1 copy and offer, 4) Add stock-up options with escalating discounts, 5) Test checkout page micro-copy, 6) Test guarantee variations, 7) Measure at 300+ conversions before deciding."
      domains: [revenue-optimization, funnels, testing]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-006"
      title: "Emo Story Construction Process"
      description: "16-step emotional story construction: 1) Establish normal life, 2) Introduce inciting incident, 3) Show failed attempts, 4) Describe darkest moment, 5) Discovery moment, 6) Encounter with mechanism, 7) First result, 8) Proof of result, 9) Full transformation, 10) New life, 11) Reason for sharing, 12) Reader identification, 13) Mechanism reveal, 14) Offer bridge, 15) CTA seed, 16) Transition to body."
      domains: [copywriting, storytelling, leads]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-007"
      title: "Ad Creative Production Process"
      description: "Volume-based ad creation: 1) Review top-performing competitor ads, 2) Identify 5 hook angles, 3) Write 10-15 ad variations in 10-30 min each, 4) Pair with 3-5 images/videos, 5) Launch 15-25 combinations, 6) Kill losers after 48 hrs and $50+ spend, 7) Scale winners, 8) Refresh creative weekly."
      domains: [advertising, testing, production]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-008"
      title: "Proof Stack Assembly Process"
      description: "Step-by-step proof construction: 1) Inventory all available proof, 2) Categorize by type (mechanism, social, authority, demonstration), 3) Select strongest from each category, 4) Order by persuasion strength, 5) Write transitions between proof elements, 6) Ensure minimum 3 layers, 7) Test proof stack position in copy."
      domains: [copywriting, proof, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-009"
      title: "Brief Template Completion Process"
      description: "Brief completion workflow: 1) Transfer research findings to brief sections, 2) Define target audience in 1 paragraph, 3) State big idea in 1 sentence, 4) Articulate dual unique mechanism, 5) List all available proof, 6) Outline offer stack, 7) Map emotional triggers to sections, 8) Define voice and tone, 9) State competitive differentiation, 10) Confirm desired action."
      domains: [copywriting, planning, process]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-010"
      title: "Headline Testing Process"
      description: "Systematic headline testing: 1) Generate 20+ headline candidates, 2) Score each on curiosity + specificity + emotion + mechanism, 3) Select top 5, 4) Run as A/B/C/D/E test on traffic, 5) Minimum 300 conversions per variant, 6) Winner becomes new control, 7) Generate 5 new challengers from winning pattern, 8) Repeat quarterly."
      domains: [testing, headlines, optimization]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-011"
      title: "Copywriter Onboarding Process (10-Step)"
      description: "New copywriter training: 1) Read 10 winning controls cover to cover, 2) Hand-copy 3 full sales letters, 3) Analyze structure of 5 controls (identify RMBC elements), 4) Complete RMBC course, 5) Do supervised research exercise, 6) Write brief with mentorship, 7) Write copy under supervision, 8) Peer review exchange, 9) Solo project with senior review, 10) First live project with safety net."
      domains: [training, team-building, copywriting]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-012"
      title: "Competitive Research Process"
      description: "Competitive analysis workflow: 1) Identify top 5 competitors in niche, 2) Buy their products, 3) Join their email lists, 4) Record their VSLs/sales letters, 5) Map their claims, mechanisms, and proof, 6) Identify language patterns they all share, 7) Find the gaps they all miss, 8) Position your mechanism in the white space."
      domains: [research, differentiation, competitive-analysis]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-013"
      title: "Funnel AOV Audit Process"
      description: "Complete funnel audit: 1) Map entire funnel flow with pricing, 2) Calculate current AOV, 3) Benchmark against $200 target, 4) Identify highest-leverage upsell point, 5) Test price increases on main offer, 6) Optimize Upsell 1 copy, 7) Add/improve stock-up options, 8) Test checkout micro-copy, 9) Re-measure AOV after 300+ conversions."
      domains: [funnels, revenue-optimization, audit]
      source: "SG-COPYACCELERATOR"

    - id: "MET-SG-014"
      title: "Stock Up Scarcity Upsell Implementation"
      description: "Stock-up upsell setup: 1) Create 3-tier pricing (1x, 3x at 15% off, 6x at 25% off), 2) Write scarcity copy with genuine deadline, 3) Add visible countdown timer, 4) Write per-unit savings callout, 5) Add 'most popular' badge to 3x option, 6) Include fast-action bonus for 6x buyers, 7) Test against current upsell, 8) Measure AOV impact at 300+ conversions."
      domains: [upsells, offers, scarcity]
      source: "SG-COPYACCELERATOR"

    # === RMBC II + PFF: New Methodologies (MET-SG-015 to MET-SG-056) ===

    - id: "MET-SG-015"
      title: "RMBC II Full Pipeline (AI-Assisted)"
      description: "Complete RMBC II workflow: 1) Run Deep Research with AI (4 modules), 2) Assess Product-Market Awareness, 3) Generate UMP ideas with LLMs, 4) Evaluate and select UMP, 5) Create Brief 2.0 (23 questions), 6) Set up Claude Project for copy type, 7) Generate first draft with AI, 8) Human review and edit, 9) Score funnel on 15 Factors, 10) Build funnel architecture based on score."
      domains: [AI-copywriting, process, copywriting]
      source: "SG-RMBC-II"

    - id: "MET-SG-016"
      title: "Deep Research 4-Module Process"
      description: "AI research pipeline: Module 1) Product-Market Awareness assessment (run awareness prompt, score 5 levels). Module 2) Competitor research (AI analyzes top 10, maps claims/mechanisms). Module 3) Psychographic deep research (emotional triggers, language, objections). Module 4) Unified Research Document synthesis."
      domains: [research, AI-copywriting, process]
      source: "SG-RMBC-II"

    - id: "MET-SG-017"
      title: "UMP Discovery With AI (5-Step)"
      description: "AI mechanism discovery: 1) Feed product + market context to Claude/ChatGPT, 2) Generate 20+ UMP ideas, 3) Run evaluation prompt (score each on 6 criteria), 4) Select top 3, 5) Expand winners with detailed narrative prompts. Create dedicated Claude Project for ongoing mechanism development."
      domains: [mechanisms, AI-copywriting, process]
      source: "SG-RMBC-II"

    - id: "MET-SG-018"
      title: "15 Funnel Factors Assessment Process"
      description: "Rate each factor 1-5: 1) List all 15 factors, 2) Rate each honestly (don't inflate), 3) Sum total score, 4) Map to funnel complexity (46+=light, 25-45=mid, <25=heavy), 5) Design funnel architecture based on score, 6) Iterate one factor at a time to improve score."
      domains: [funnels, strategy, assessment]
      source: "SG-RMBC-II"

    - id: "MET-SG-019"
      title: "Claude VSL Creation Process"
      description: "AI-assisted VSL writing: 1) Create Claude Project with research + brief uploaded, 2) Give project-specific instructions for VSL structure, 3) Generate lead section, 4) Human review and iterate, 5) Generate mechanism section, 6) Human review, 7) Continue section by section, 8) Full human edit pass, 9) Record and test."
      domains: [AI-copywriting, VSL, process]
      source: "SG-RMBC-II"

    - id: "MET-SG-020"
      title: "Advertorial Creation Process"
      description: "AI-assisted advertorial: 1) Identify click-through destination (VSL/PDP), 2) Extract simplified UMP (just the missing 1%), 3) Create Claude Project with advertorial instructions, 4) Generate headline options, 5) Write body with expert voice, 6) Include qualification mechanism (filter for buyers), 7) CTA to next step."
      domains: [advertorials, AI-copywriting, process]
      source: "SG-RMBC-II"

    - id: "MET-SG-021"
      title: "Landing Page Audit Process (PFF)"
      description: "LP audit: 1) Pull PFF landing page checklist, 2) Compare current page element-by-element, 3) Identify missing elements, 4) Prioritize by expected impact (social proof, guarantee, trust badges usually highest), 5) A/B test additions one at a time, 6) Re-audit after 300+ conversions."
      domains: [landing-pages, audit, optimization]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MET-SG-022"
      title: "Checkout Audit Process (PFF)"
      description: "Checkout audit: 1) Pull PFF checkout checklist, 2) Score each element present/absent, 3) Priority fixes: trust seals, order form position, guarantee badge, order summary, 4) Test order bump impact on total AOV (not just bump rate), 5) Add/test exit pop, 6) Verify mobile experience."
      domains: [checkout, audit, optimization]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MET-SG-023"
      title: "Upsell Creation Process (OLAF-Based)"
      description: "Upsell creation: 1) Record 5-7 min congratulation video, 2) Identify logical extension of front-end offer, 3) Define new problem, 4) Script consequences of not resolving, 5) Present solution at discount, 6) Write justification (why this deal), 7) Stack the offer, 8) Remind guarantee, 9) Add retention bar + exit pop, 10) Test against current upsell."
      domains: [upsells, creation, process]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MET-SG-024"
      title: "Facebook Ad Creation Process (PFF)"
      description: "FB ad process: 1) Pull ad checklist, 2) Hook in first 3 seconds, 3) Creative headline/subject, 4) Benefits-heavy body copy, 5) Integrate social proof, 6) Clear CTA, 7) Ensure compliance, 8) Create 5-10 variations, 9) Test on cold traffic, 10) Scale winners."
      domains: [ads, Facebook, process]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MET-SG-025"
      title: "Email Sequence Creation Process (PFF)"
      description: "Email creation: 1) Pull email checklist, 2) Creative subject line (curiosity-driven), 3) Optional creative from name, 4) Compelling first sentence that delivers on hook, 5) Body copy advancing to CTA, 6) Max 2 links, 7) Optional hyperlinked sections, 8) Promo code if relevant, 9) Test subject lines, 10) Monitor opens and clicks."
      domains: [email-marketing, creation, process]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MET-SG-026"
      title: "Full Funnel Optimization Process"
      description: "End-to-end funnel audit: 1) Score on 15 Funnel Factors, 2) Audit landing page (PFF checklist), 3) Audit checkout (PFF checklist), 4) Audit upsell (OLAF checklist), 5) Audit ads (PFF checklist), 6) Audit emails (PFF checklist), 7) Calculate AOV × CVR metric, 8) Identify bottleneck (work backward from goal), 9) Fix highest-leverage bottleneck first, 10) Re-test at 300+ conversions."
      domains: [funnels, optimization, audit]
      source: "SG-RMBC-II"

    - id: "MET-SG-027"
      title: "Brief 2.0 Completion Process"
      description: "Complete new brief: 1) Answer all 23 questions from research, 2) Ensure UMP/UMS section has enough detail for LLM, 3) Include nickname for mechanism, 4) List all testimonials and credibility, 5) Write future-paced results, 6) Review: could an LLM write each section from brief alone? If not, add more detail."
      domains: [copywriting, planning, AI-copywriting]
      source: "SG-RMBC-II"

    - id: "MET-SG-028"
      title: "Cross-Niche Swipe Process"
      description: "Model funnels from other niches: 1) Identify winning funnel in different niche, 2) Map structure (not copy), 3) Identify universal elements (congratulation, new problem, offer stack), 4) Adapt to your product, 5) Preserve structure, change specifics, 6) Test against current funnel."
      domains: [modeling, funnels, strategy]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MET-SG-029"
      title: "RMBC Method Original Full Process"
      description: "Original 4-phase process: Phase 1 RESEARCH (7 sections, 3-5 hours): customer profile, existing solutions, curiosity/corruption, product details, competitor analysis, emotional triggers, proof elements. Phase 2 MECHANISM: identify dual UMP/UMS. Phase 3 BRIEF: transfer research to 10-point brief template. Phase 4 COPY: write in order (lead, story, mechanism, proof, offer, close)."
      domains: [copywriting, process, direct-response]
      source: "SG-RMBC-METHOD"

    - id: "MET-SG-030"
      title: "Fascination Writing Process (RMBC Method)"
      description: "Fascination creation: 1) Pull all interesting facts from research, 2) Convert each to curiosity-driven bullet, 3) Test: does each work as standalone headline?, 4) Categorize: benefit-driven, fear-driven, curiosity-driven, story-driven, 5) Arrange strongest first, 6) Minimum 15 fascinations per section."
      domains: [copywriting, fascinations, process]
      source: "SG-RMBC-METHOD"

    - id: "MET-SG-031"
      title: "Lead Writing Process (10 Structures)"
      description: "Lead creation process: 1) Determine traffic temperature, 2) Select appropriate lead structure from 10 types, 3) Write opening hook (paradox, story, curiosity, promise, etc.), 4) Seed credibility, 5) Agitate problem, 6) Create curiosity loop, 7) Tease mechanism, 8) Make promise, 9) Hint at proof, 10) Transition to body copy."
      domains: [copywriting, leads, process]
      source: "SG-RMBC-METHOD"

    - id: "MET-SG-032"
      title: "Headline Writing Process (RMBC Method)"
      description: "Headline process: 1) Generate 20+ candidates from research angles, 2) Score each on curiosity + specificity + emotion + mechanism, 3) Select top 5, 4) Create variations of each (question, statement, how-to, paradox), 5) Test on traffic, 6) Minimum 300 conversions per variant, 7) Winner becomes control."
      domains: [headlines, testing, process]
      source: "SG-RMBC-METHOD"

    - id: "MET-SG-033"
      title: "Subject Line Creation Process (12 Categories)"
      description: "Subject line process: 1) Generate at least 1 subject line per category (curiosity, fear, greed, news, paradox, controversy, story, urgency, social proof, personal, question, revelation), 2) Test top performers, 3) Rotate categories to prevent fatigue."
      domains: [email-marketing, subject-lines, process]
      source: "SG-RMBC-METHOD"

    - id: "MET-SG-034"
      title: "AOV Money Close Process"
      description: "AOV optimization close: 1) Frame purchase as per-day investment, 2) Compare to daily spending (coffee, lunch), 3) Present savings on bulk options, 4) Add time-limited bonus for highest tier, 5) Use 'most popular' nudge, 6) Remind guarantee, 7) Close with value restatement."
      domains: [copywriting, closing, AOV]
      source: "SG-RMBC-METHOD"

    - id: "MET-SG-035"
      title: "Multiple AI Tools Research Triangulation"
      description: "Multi-AI research: 1) Run same research query on ChatGPT, 2) Run on Gemini (for broad web analysis — 362+ websites), 3) Run on Perplexity (for case studies/LinkedIn), 4) Run on Google Deep Research, 5) Synthesize findings in unified document, 6) Note where sources agree and disagree."
      domains: [research, AI-copywriting, tools]
      source: "SG-RMBC-II"

    - id: "MET-SG-036"
      title: "PDP Copy Creation Process"
      description: "Product detail page copy: 1) Headline with micro UMP/UMS summary, 2) Hero mechanism visualization (image/animation), 3) Problem section with UMP, 4) Scientific explanation (ingredient/feature detail), 5) Benefits with dimensionalization, 6) Social proof integration, 7) CTA, 8) FAQ section, 9) Mobile-first formatting."
      domains: [e-commerce, copywriting, process]
      source: "SG-RMBC-II"


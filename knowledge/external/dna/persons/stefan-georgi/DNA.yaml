layers:

  L1_PHILOSOPHIES:

    # === COPY ACCELERATOR: Core Beliefs (FIL-SG-001 to FIL-SG-029) ===

    - id: "FIL-SG-001"
      title: "Research Is The Foundation"
      description: "Every great piece of copy begins with deep research. You cannot write what you do not understand. 3-5 hours of targeted research saves days of rewriting."
      domains: [copywriting, direct-response, research]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-002"
      title: "Unique Mechanism Is Everything"
      description: "The unique mechanism is what makes your promise believable and differentiated. Without it, you're just another 'me too' product making empty claims."
      domains: [copywriting, offers, differentiation]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-003"
      title: "Process Over Talent"
      description: "A systematic process consistently beats raw talent. The RMBC Method exists because following a proven system produces more reliable results than waiting for inspiration."
      domains: [copywriting, productivity, systems]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-004"
      title: "Problem Before Solution"
      description: "You must agitate the problem deeply before presenting the solution. The prospect must feel the pain viscerally before they'll be motivated to act."
      domains: [copywriting, sales-psychology, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-005"
      title: "Curiosity Drives Engagement"
      description: "Curiosity is the most powerful force in copy. If the reader is curious, they keep reading. Headlines, leads, and transitions must all create open loops."
      domains: [copywriting, headlines, engagement]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-006"
      title: "Corruption Breeds Copy Gold"
      description: "Identifying the hidden corruption — the villain, the systemic failure, the suppressed truth — gives your copy dramatic tension and positions the product as the antidote."
      domains: [copywriting, storytelling, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-007"
      title: "Perfection Is The Enemy"
      description: "Done is better than perfect. Get it out there, test it, and improve with data. Waiting for the perfect draft is how copywriters go broke."
      domains: [copywriting, productivity, testing]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-008"
      title: "Don't Sell In The Lead — Tease"
      description: "The lead's job is to hook, not to sell. Selling too early kills curiosity. The lead should create enough intrigue that the reader must continue."
      domains: [copywriting, leads, sales-psychology]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-009"
      title: "Every Failure Gets You Closer To A Win"
      description: "Failed copy teaches you what doesn't work. Every test that bombs contains data. The copywriter who tests the most wins the most."
      domains: [testing, mindset, copywriting]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-010"
      title: "Get Stuff Out There And Validate With Data"
      description: "Stop overthinking and start testing. Real market feedback is worth more than a thousand hours of theorizing. Ship, measure, iterate."
      domains: [testing, direct-response, productivity]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-011"
      title: "The Brief Is The Blueprint"
      description: "A completed brief is the most valuable asset in the copy process. If the brief is strong, writing the copy is almost mechanical. Skip the brief and you'll rewrite endlessly."
      domains: [copywriting, planning, process]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-012"
      title: "Proof Beats Claims"
      description: "Claims without proof are just noise. Every major promise must be backed by specific evidence — testimonials, studies, mechanism proof, or demonstrations."
      domains: [copywriting, persuasion, trust]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-013"
      title: "Headlines Move The Needle Most"
      description: "If you only have time to optimize one thing, optimize the headline. It determines whether anyone reads the rest. Everything downstream depends on the headline doing its job."
      domains: [copywriting, headlines, testing]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-014"
      title: "Specificity Creates Believability"
      description: "Specific numbers, dates, locations, and details make copy more believable than vague generalities. '37 lbs in 8 weeks' beats 'lose weight fast' every time."
      domains: [copywriting, persuasion, trust]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-015"
      title: "Spirit Of Cooperation"
      description: "Copywriters get better together. Copy Accelerator is built on sharing wins, losses, and learnings openly. Competition between members makes everyone stronger."
      domains: [community, training, mindset]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-016"
      title: "Emotional Copy Converts — Logical Copy Justifies"
      description: "People buy on emotion and justify with logic. Your copy must first trigger the emotional desire, then provide the rational reasons to feel good about the purchase."
      domains: [copywriting, sales-psychology, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-017"
      title: "Upsell 1 Is The Highest Leverage Point"
      description: "The first upsell after initial purchase has the highest acceptance rate and the biggest impact on AOV. Optimize upsell 1 before anything else in the funnel."
      domains: [funnels, offers, revenue-optimization]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-018"
      title: "Cold Traffic Is The True Test"
      description: "Copy that converts cold traffic is proven copy. Warm traffic masks weak copy. If it works on strangers who've never heard of you, it works everywhere."
      domains: [traffic, copywriting, testing]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-019"
      title: "Research Pre-1960 Is Gold"
      description: "Old medical journals, patent filings, and research papers from before 1960 contain unique angles and mechanisms that competitors will never find in modern Google searches."
      domains: [research, differentiation, copywriting]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-020"
      title: "The Big Idea Must Be Simple"
      description: "If you can't explain your big idea in one sentence, it's not clear enough. The most powerful ideas are deceptively simple. Complexity kills conversion."
      domains: [copywriting, offers, messaging]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-021"
      title: "Voice Of The Customer Is Sacred"
      description: "The best copy uses the prospect's own words. Amazon reviews, forum posts, and customer calls contain the exact language that resonates. Don't invent — mirror."
      domains: [research, copywriting, empathy]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-022"
      title: "Split Testing Is Non-Negotiable"
      description: "Opinion is worthless without data. Every assumption must be tested. The copy that YOU think is better frequently loses to the one that feels wrong. Test everything."
      domains: [testing, direct-response, data]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-023"
      title: "The Lead Determines The Fate"
      description: "80% of a sales letter's success or failure is determined in the first 10% of the copy. If the lead doesn't hook, nothing downstream matters."
      domains: [copywriting, leads, conversion]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-024"
      title: "Fascinations Are Miniature Headlines"
      description: "Every bullet point in a fascination stack should work as a standalone headline. Each one must create enough curiosity to justify reading the entire piece."
      domains: [copywriting, fascinations, curiosity]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-025"
      title: "Teach What You Know — Freely"
      description: "Sharing knowledge openly doesn't diminish your value; it compounds it. Recording everything, sharing every framework — this builds authority and community simultaneously."
      domains: [training, community, authority]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-026"
      title: "Copy Cannot Fix A Bad Offer"
      description: "No amount of persuasive writing can save a fundamentally weak offer. Fix the offer first, then write the copy. The offer is the foundation."
      domains: [offers, copywriting, business-strategy]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-027"
      title: "Transitions Are Invisible Glue"
      description: "The reader should never notice the transition between sections. Each transition must create a micro-commitment that pulls the reader into the next section seamlessly."
      domains: [copywriting, flow, engagement]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-028"
      title: "Scarcity Must Be Real"
      description: "Fake scarcity destroys trust. Real scarcity — limited supply, genuine deadline, actual price increase — creates authentic urgency that converts without eroding credibility."
      domains: [copywriting, persuasion, ethics]
      source: "SG-COPYACCELERATOR"

    - id: "FIL-SG-029"
      title: "The Close Is A Logical Conclusion"
      description: "If the copy has done its job, the close should feel inevitable — not pushy. Stack enough proof, agitate enough pain, present the mechanism, and the CTA becomes the obvious next step."
      domains: [copywriting, closing, persuasion]
      source: "SG-COPYACCELERATOR"


    # ═══════════════════════════════════════════════════════════════════════
    # RMBC METHOD — Original Course (FIL-SG-030 to FIL-SG-035)
    # ═══════════════════════════════════════════════════════════════════════

    - id: "FIL-SG-030"
      title: "Curiosity Corruption In Research"
      description: "When researching, look for curiosity corruption — information that contradicts common beliefs, hidden truths the market doesn't know, suppressed knowledge. This is where the best unique mechanisms hide."
      domains: [research, copywriting, differentiation]
      source: "SG-RMBC-METHOD"

    - id: "FIL-SG-031"
      title: "Research Immersion Over Sampling"
      description: "Don't skim research — immerse in it. Read every review, every forum post, every competing product page. The breakthrough angle always comes from depth, never from surface scanning."
      domains: [research, copywriting, process]
      source: "SG-RMBC-METHOD"

    - id: "FIL-SG-032"
      title: "The Brief Prevents Scope Creep"
      description: "Without a brief, copy projects expand endlessly. The brief constrains creativity productively — everything in the copy must trace back to a brief element."
      domains: [copywriting, planning, productivity]
      source: "SG-RMBC-METHOD"

    # ═══════════════════════════════════════════════════════════════════════
    # RMBC II — 2025 Advanced Course (FIL-SG-033 to FIL-SG-050)
    # ═══════════════════════════════════════════════════════════════════════

    - id: "FIL-SG-033"
      title: "AI Amplifies Process — Cannot Replace It"
      description: "AI tools like Claude and ChatGPT are multipliers for copywriters who understand fundamentals. But AI without RMBC understanding produces mediocre output. The process must come first, AI accelerates it."
      domains: [AI-copywriting, copywriting, technology]
      source: "SG-RMBC-II"

    - id: "FIL-SG-034"
      title: "Market Awareness Determines Funnel Complexity"
      description: "The more aware your market is of both the problem and solutions, the less copy you need. Most-aware markets can convert with short pages; unaware markets need full VSL funnels."
      domains: [funnels, copywriting, market-awareness]
      source: "SG-RMBC-II"

    - id: "FIL-SG-035"
      title: "There Is No One Golden Funnel Architecture"
      description: "The optimal funnel depends on 15+ factors specific to your offer, market, and traffic. Anyone claiming one funnel works for everything is selling snake oil."
      domains: [funnels, strategy, offers]
      source: "SG-RMBC-II"

    - id: "FIL-SG-036"
      title: "Demonstrable Proof Shortens Funnels"
      description: "If your product can visually prove it works (OxyClean, teeth whitening, instant wrinkle remover), you need far less copy. The visual IS the sales argument."
      domains: [funnels, proof, conversion]
      source: "SG-RMBC-II"

    - id: "FIL-SG-037"
      title: "Animations Can Replace Demonstrable Proof"
      description: "Even products without visible instant results can create 'demonstrable proof' through high-quality animations showing HOW the product works internally. This shortens the funnel similar to actual demonstrable proof."
      domains: [ads, conversion, creative]
      source: "SG-RMBC-II"

    - id: "FIL-SG-038"
      title: "Brand Equity Lets You Get Lazy With Funnels"
      description: "As brand recognition grows, you can progressively simplify your funnel. Early-stage brands need VSLs; established brands convert with simple product pages and UGC."
      domains: [brand, funnels, strategy]
      source: "SG-RMBC-II"

    - id: "FIL-SG-039"
      title: "Focus On EBITDA Not Just Revenue For Exit"
      description: "Investment bankers value EBITDA multiples for acquisition. Sometimes slowing growth to improve profitability is the right move for maximizing exit value."
      domains: [business-strategy, exits, finance]
      source: "SG-RMBC-II"

    - id: "FIL-SG-040"
      title: "Immediate Pain Point Beats Aspirational Promise"
      description: "Anti-aging is a weak hook. Joint pain is strong. Always find the acute, immediate pain point that is symptomatic of the longer-term problem. Sell the acute pain, deliver the long-term transformation."
      domains: [copywriting, offers, market-psychology]
      source: "SG-RMBC-II"

    - id: "FIL-SG-041"
      title: "Pre-Sell Enough That Friction Doesn't Kill"
      description: "Complex checkouts, eligibility quizzes, and multi-step processes require heavy pre-selling. The more friction ahead, the more conviction needed beforehand."
      domains: [funnels, conversion, checkout]
      source: "SG-RMBC-II"

    - id: "FIL-SG-042"
      title: "Social Proof Speaks So Copy Doesn't Have To"
      description: "Pure e-com lives on social proof. When you have thousands of genuine reviews, you need minimal copy. The reviews ARE the sales argument."
      domains: [social-proof, e-commerce, conversion]
      source: "SG-RMBC-II"

    # ═══════════════════════════════════════════════════════════════════════
    # PROFIT FIX FORMULA (FIL-SG-043 to FIL-SG-065)
    # ═══════════════════════════════════════════════════════════════════════

    - id: "FIL-SG-043"
      title: "Conversion Optimization Is A Profit Multiplier"
      description: "Small improvements across landing page, checkout, upsell, ads, and email compound into massive revenue gains. Fixing conversion is faster than finding new traffic."
      domains: [conversion, optimization, revenue]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-044"
      title: "Order Form On The Right Side"
      description: "Order forms perform better on the right side of the checkout page. Left side is for product info, testimonials, trust elements. Right side is for the actual purchase action."
      domains: [checkout, conversion, UX]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-045"
      title: "Order Bumps Can Kill Upsell Take Rate"
      description: "Test order bumps carefully — a $20 bump that reduces the $150 upsell take rate will lower overall AOV. Always measure total AOV, not just bump acceptance."
      domains: [checkout, upsells, AOV]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-046"
      title: "Congratulate For 6 Minutes Before Selling"
      description: "On upsell pages, spend the first 5-7 minutes of video genuinely congratulating the buyer. J to Bolt method: make them feel amazing about their purchase before introducing the upsell. This dramatically increases take rates."
      domains: [upsells, sales-psychology, conversion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-047"
      title: "The New Problem Creates The Upsell Need"
      description: "Every upsell introduces a new problem that is a logical extension of what they just bought. Bought a guide? You might not implement it. Bought a supplement? You'll want more but it might be out of stock."
      domains: [upsells, copywriting, offers]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-048"
      title: "Trust Seals Multiply On Checkout"
      description: "Repeat trust seals, secure processing badges, and credit card logos multiple times on checkout pages. The more trust elements visible, the higher conversion rate."
      domains: [checkout, conversion, trust]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-049"
      title: "Subject Line Grabs — First Line Holds"
      description: "Email subject line grabs attention. From name builds curiosity. First sentence must deliver on the hook and hold attention. If subject says 'vegan bodybuilder', body must start with vegan bodybuilder."
      domains: [email-marketing, copywriting, engagement]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-050"
      title: "Every Line Of Email Has A Purpose"
      description: "No filler in emails. Every single line serves the goal of driving clicks. If a line doesn't advance the reader toward the CTA, delete it."
      domains: [email-marketing, copywriting, editing]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-051"
      title: "Remind Guarantee On Upsell"
      description: "Always remind buyers on the upsell page that the guarantee covers this purchase too. Without this, people assume the upsell is unprotected, which kills take rates."
      domains: [upsells, conversion, trust]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-052"
      title: "Not Every Page Has Every Element"
      description: "Checklists are reference guides, not rigid templates. Most high-converting pages have most elements, but none have all. The checklist identifies what COULD be added and tested."
      domains: [conversion, optimization, testing]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-053"
      title: "Swipe And Model Across Niches"
      description: "The best upsell or landing page to model isn't necessarily from your niche. A supplement funnel can model a book funnel and vice versa. The structure transfers; the specifics change."
      domains: [copywriting, strategy, modeling]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-054"
      title: "Exit Pops Are Last-Chance Conversion"
      description: "When someone tries to leave a checkout or upsell, an exit pop with a coupon or bonus can recover the sale. It's the last-chance safety net."
      domains: [conversion, checkout, retention]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-055"
      title: "From Name Gimmick Increases Opens"
      description: "Changing email from name from your personal name to something creative (From: Your Next Copywriter, From: Free Cookbook, From: Trash Warning) significantly increases open rates."
      domains: [email-marketing, subject-lines, testing]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-056"
      title: "Scarcity Countdown On Checkout Drives Urgency"
      description: "Adding 'Only 300 left in stock' or 'Order reserved for 10 minutes' countdown timer on checkout creates urgency that pushes fence-sitters to complete purchase."
      domains: [checkout, scarcity, conversion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-057"
      title: "Justify Why You Are Doing This"
      description: "On upsell pages, always explain WHY you're offering this deal. Altruistic reason works better than profit motive. 'I want to make sure you succeed' beats 'buy more stuff.'"
      domains: [upsells, copywriting, persuasion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-058"
      title: "No More Than Two Links In Email"
      description: "Generally limit to two separate links in an email with a clear call to action. Exception: BioTrust style with multiple embedded links, but usually simpler is better."
      domains: [email-marketing, conversion, simplicity]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "FIL-SG-059"
      title: "DTC Marketing In 2025 Demands AI Fluency"
      description: "Direct-to-consumer marketing in 2025 requires comfort with AI tools for research, copy creation, and optimization. Copywriters who resist AI will be outpaced."
      domains: [AI-copywriting, DTC, technology]
      source: "SG-RMBC-II"

    - id: "FIL-SG-060"
      title: "Deep Research With Multiple AI Tools"
      description: "Use ChatGPT, Gemini, Perplexity, and Claude for research — each finds different insights. Google deep research can analyze 360+ websites. Combine all for complete market picture."
      domains: [research, AI-copywriting, tools]
      source: "SG-RMBC-II"

    - id: "FIL-SG-061"
      title: "Claude Projects For Copywriting Workflow"
      description: "Set up dedicated Claude Projects for each copywriting task: research project, mechanism project, brief project, VSL project, advertorial project. Each with specialized instructions and context."
      domains: [AI-copywriting, workflow, tools]
      source: "SG-RMBC-II"

    - id: "FIL-SG-062"
      title: "Advertorial Sells The Qualified Click"
      description: "The advertorial's job is not to sell the product — it's to sell the click to the VSL. It filters for qualified prospects while building enough intrigue to click through."
      domains: [advertorials, funnels, conversion]
      source: "SG-RMBC-II"

    - id: "FIL-SG-063"
      title: "Halo Effect Lowers True CPA"
      description: "Effective CPA considers all revenue sources (organic, referral, repeat) not just direct attribution. Building a brand halo means you can spend more on paid while actual CPA stays low."
      domains: [metrics, marketing-strategy, brand]
      source: "SG-RMBC-II"

    - id: "FIL-SG-064"
      title: "Competitor Analysis Through Purchase"
      description: "Buy competitor products, join their email lists, record their VSLs, go through their entire funnel. This is research gold that most copywriters skip."
      domains: [research, competitive-analysis, copywriting]
      source: "SG-RMBC-II"

    - id: "FIL-SG-065"
      title: "Terms And Conditions Protect The Business"
      description: "Always include terms and conditions checkbox for subscriptions and trials. Not just legal protection — it creates transparency that builds trust."
      domains: [checkout, compliance, trust]
      source: "SG-PROFIT-FIX-FORMULA"

  L2_MENTAL_MODELS:

    # === COPY ACCELERATOR: Thinking Frameworks (MM-SG-001 to MM-SG-022) ===

    - id: "MM-SG-001"
      title: "RMBC Sequencing Model"
      description: "All copy creation follows Research → Mechanism → Brief → Copy. Skipping any step degrades the output. The sequence is sacred."
      domains: [copywriting, process, planning]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-002"
      title: "Dual Unique Mechanism Model"
      description: "Every strong offer has two mechanisms: the mechanism of the problem (why it exists) and the mechanism of the solution (why this fixes it). Both must be articulated."
      domains: [copywriting, differentiation, offers]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-003"
      title: "Lead Temperature Model"
      description: "The lead type must match the traffic temperature. Cold traffic needs indirect leads (story, paradox, curiosity). Warm traffic can handle direct leads (promise, offer)."
      domains: [copywriting, leads, traffic]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-004"
      title: "Corruption-Solution-Proof Stack"
      description: "The persuasion arc follows: reveal the corruption → introduce the solution via unique mechanism → prove it works with layered evidence. This sequence builds conviction."
      domains: [copywriting, persuasion, structure]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-005"
      title: "AOV-First Revenue Thinking"
      description: "Revenue growth starts with AOV optimization, not traffic volume. Increasing AOV from $50 to $100 doubles revenue without adding a single customer."
      domains: [revenue-optimization, funnels, offers]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-006"
      title: "Fascination As Curiosity Engine"
      description: "Each fascination bullet should open a loop the reader desperately wants closed. The mental model: every bullet is a question the reader cannot answer without buying."
      domains: [copywriting, fascinations, curiosity]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-007"
      title: "Subject Line Categories Model"
      description: "Email subject lines fall into 12 distinct categories (curiosity, fear, greed, news, paradox, etc.). Rotating categories prevents fatigue and maximizes open rates."
      domains: [email-marketing, subject-lines, testing]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-008"
      title: "Control vs Challenger Thinking"
      description: "Always test against the current control. The control is the reigning champion; challengers must beat it with statistical significance. Never replace a control on gut feeling."
      domains: [testing, direct-response, data]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-009"
      title: "Emotional Ladder Of Awareness"
      description: "Prospects climb from unaware → problem-aware → solution-aware → product-aware → most-aware. Each stage requires different copy approach and lead type."
      domains: [copywriting, sales-psychology, leads]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-010"
      title: "Research Depth As Competitive Moat"
      description: "The copywriter who does the deepest research finds the unique angles competitors miss. Research depth directly correlates with copy differentiation."
      domains: [research, differentiation, copywriting]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-011"
      title: "Proof Layering Model"
      description: "Single proof points are weak. Stack multiple proof types — testimonials + studies + mechanism proof + expert endorsement + demonstrations — for overwhelming conviction."
      domains: [copywriting, persuasion, trust]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-012"
      title: "Upsell Flow Optimization"
      description: "Upsell sequence follows a logic: Upsell 1 (complementary, highest value) → Upsell 2 (quantity/supply) → Downsell (reduced version). Each step has diminishing acceptance."
      domains: [funnels, offers, revenue-optimization]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-013"
      title: "Copy As Coaching Model"
      description: "Great copy coaches the prospect through a transformation in their mind. By the time they hit the CTA, they've already imagined the outcome. Copy is guided visualization."
      domains: [copywriting, persuasion, sales-psychology]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-014"
      title: "Headline Testing Hierarchy"
      description: "Test headlines before body copy, body copy before offers, offers before design. The element with the highest leverage gets tested first."
      domains: [testing, copywriting, optimization]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-015"
      title: "Time Investment As Quality Signal"
      description: "The time you invest in research and brief directly predicts the quality of the final copy. Shortcuts in prep produce mediocre output every time."
      domains: [copywriting, process, quality]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-016"
      title: "Swipe File As Pattern Library"
      description: "A swipe file isn't for copying — it's for recognizing patterns. Study winning controls to internalize what works, then apply the patterns to new contexts."
      domains: [copywriting, learning, patterns]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-017"
      title: "Dimensionalization As Sensory Immersion"
      description: "Abstract benefits become concrete through dimensionalization — translating 'more energy' into 'bounding out of bed at 5 AM, feeling 20 years younger, outpacing your kids at the park.'"
      domains: [copywriting, persuasion, emotional-triggers]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-018"
      title: "Offer Architecture Model"
      description: "A strong offer has layers: core product + bonuses + guarantee + scarcity + price anchor. Each layer addresses a different objection or motivation."
      domains: [offers, conversion, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-019"
      title: "Ad Creative Speed Model"
      description: "Ad creatives should take 10-30 minutes each. If you're spending hours on a single ad, you're overthinking. Volume and testing beat individual ad perfection."
      domains: [advertising, testing, productivity]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-020"
      title: "Fear-Greed Spectrum"
      description: "All copy operates on a spectrum between fear and greed. Health copy leans fear, biz-op leans greed. The balance determines tone, structure, and CTA approach."
      domains: [copywriting, sales-psychology, emotional-triggers]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-021"
      title: "Checkout Friction Model"
      description: "Every unnecessary word, field, or step on the checkout page costs conversions. Micro-optimizations (button text, field order, trust badges) compound into major revenue differences."
      domains: [conversion, funnels, optimization]
      source: "SG-COPYACCELERATOR"

    - id: "MM-SG-022"
      title: "Copywriter Training Progression"
      description: "Train copywriters through immersion: read winning controls → hand-copy them → analyze structure → write under supervision → solo with review. Skill builds in layers."
      domains: [training, copywriting, team-building]
      source: "SG-COPYACCELERATOR"

    # === RMBC METHOD + RMBC II + PFF: New Mental Models (MM-SG-023 to MM-SG-055) ===

    - id: "MM-SG-023"
      title: "Product-Market Awareness Spectrum"
      description: "5 levels of prospect awareness (Schwartz): Unaware → Problem Aware → Solution Aware → Product Aware → Most Aware. Each level requires different copy approach, lead type, and funnel complexity."
      domains: [market-awareness, copywriting, funnels]
      source: "SG-RMBC-II"

    - id: "MM-SG-024"
      title: "15 Funnel Factors Scoring Model"
      description: "Score your offer 1-5 on 15 factors. Total score determines funnel complexity: High score (46+) = simple PDP/cart; Mid = quiz/advertorial; Low = full VSL/webinar funnel with nurture emails."
      domains: [funnels, strategy, conversion]
      source: "SG-RMBC-II"

    - id: "MM-SG-025"
      title: "AI As Process Accelerator Not Replacement"
      description: "AI tools (Claude Projects, ChatGPT, Gemini) accelerate each RMBC step but cannot replace understanding. Use AI for: research summarization, mechanism ideation, brief expansion, first drafts, evaluation."
      domains: [AI-copywriting, tools, process]
      source: "SG-RMBC-II"

    - id: "MM-SG-026"
      title: "UMP Ideation With LLMs"
      description: "Use LLMs to generate 20+ unique mechanism ideas per product, then evaluate each against market awareness and competitor landscape. AI ideation → human evaluation → AI expansion."
      domains: [AI-copywriting, mechanisms, ideation]
      source: "SG-RMBC-II"

    - id: "MM-SG-027"
      title: "Funnel Architecture Decision Tree"
      description: "Rate 15 factors (1-5 each) → sum score → <25: full heavy funnel (VSL + advertorial + nurture) | 25-45: mid funnel (quiz + landing page) | 46+: light funnel (PDP/cart). Adjust for niche exceptions."
      domains: [funnels, strategy, decision-making]
      source: "SG-RMBC-II"

    - id: "MM-SG-028"
      title: "Advertorial As Qualification Filter"
      description: "Advertorial serves dual purpose: builds curiosity/intrigue for the VSL AND filters traffic so only qualified prospects click through. Not about selling — about qualifying."
      domains: [advertorials, funnels, traffic]
      source: "SG-RMBC-II"

    - id: "MM-SG-029"
      title: "Effective CPA vs Direct CPA"
      description: "Direct CPA only counts direct-attribution conversions. Effective CPA factors in all revenue from brand halo (organic, referral, repeat). Effective CPA is the true metric for scaling decisions."
      domains: [metrics, scaling, marketing-strategy]
      source: "SG-RMBC-II"

    - id: "MM-SG-030"
      title: "Landing Page Type Matching"
      description: "Match landing page type to product type: Multiple Packages → bundle comparison; One Product → single hero; Services → credibility + testimonials; Courses → value demonstration; Lead Gen → simplicity; Free+Shipping → urgency."
      domains: [landing-pages, conversion, UX]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-031"
      title: "Checkout Type Matching"
      description: "Match checkout complexity to product type: Physical → trust + shipping info; Courses → access + guarantee; Free+Shipping → minimal friction; Info Products → value reinforcement. Each type has unique optimization points."
      domains: [checkout, conversion, UX]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-032"
      title: "Upsell As Logical Extension Model"
      description: "Every upsell must be a logical extension of the front-end purchase. Three paths: better results faster, more of what they bought, or done-for-you implementation. Must feel inevitable, not random."
      domains: [upsells, offers, funnels]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-033"
      title: "Email Checklist Mental Model"
      description: "High-converting email structure: creative subject line → compelling from name → deliver on hook in first line → body that advances toward CTA → no more than 2 links → clear single action."
      domains: [email-marketing, copywriting, conversion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-034"
      title: "Urgency Hierarchy On Checkout"
      description: "Layer urgency elements on checkout: countdown timer → stock scarcity → order summary → guarantee seal → trust badges → accepted payment logos → terms checkbox. Each layer reduces abandonment."
      domains: [checkout, conversion, persuasion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-035"
      title: "Brief 2.0 As LLM-Ready Document"
      description: "The new 23-question brief is designed to be fed to AI. Each answer provides enough detail that an LLM could write the corresponding copy section without additional context. Brief completeness = AI output quality."
      domains: [AI-copywriting, brief, planning]
      source: "SG-RMBC-II"

    - id: "MM-SG-036"
      title: "Regulatory Load Determines Funnel Steps"
      description: "Highly regulated industries (telemedicine, finance) require mandatory funnel steps (eligibility quizzes, KYC, terms acceptance). These steps require extra pre-selling to maintain conversion through friction."
      domains: [compliance, funnels, conversion]
      source: "SG-RMBC-II"

    - id: "MM-SG-037"
      title: "Offer Complexity Inverse To Conversion"
      description: "More product options = more decision paralysis = lower conversion. Simplify offer to one clear choice, or use interactive quizzes to personalize recommendations (Omakeage model)."
      domains: [offers, conversion, UX]
      source: "SG-RMBC-II"

    - id: "MM-SG-038"
      title: "LTV-Driven Vs Self-Liquidating Funnels"
      description: "High LTV businesses can afford longer nurture funnels (classes, webinars, email sequences). Low ticket/self-liquidating funnels must convert fast with one-click upsells."
      domains: [funnels, strategy, economics]
      source: "SG-RMBC-II"

    - id: "MM-SG-039"
      title: "Platform-Specific Attention Windows"
      description: "TikTok traffic has 30-second attention span on mobile. Desktop 50+ demographics sit through 30-min VSLs. Match funnel length and complexity to the dominant platform's user behavior."
      domains: [traffic, platforms, conversion]
      source: "SG-RMBC-II"

    - id: "MM-SG-040"
      title: "Bottleneck Analysis Framework"
      description: "Start with end goal, work backward: What does AOV need to be? What does conversion rate need to be? Check ad metrics (CPC, CPM). Find where actual metrics diverge from needed metrics — that's your bottleneck."
      domains: [optimization, metrics, strategy]
      source: "SG-RMBC-II"

    - id: "MM-SG-041"
      title: "AOV × CVR Rule Of Thumb"
      description: "AOV × Conversion Rate metric: if product is below 350, focus on fixing the offer/funnel first. Higher AOV with lower CVR or lower AOV with higher CVR — the product determines which path."
      domains: [metrics, offers, optimization]
      source: "SG-RMBC-II"

    - id: "MM-SG-042"
      title: "Mini VSL In-Feed Ads"
      description: "3-10 minute video ads that function as mini-VSLs in the feed. Work especially well with animations showing product mechanism. Can replace full funnels for demonstrable-proof products."
      domains: [ads, funnels, conversion]
      source: "SG-RMBC-II"

    - id: "MM-SG-043"
      title: "Research Niche Adaptation"
      description: "Same RMBC research process adapts to any niche: weight loss, real estate, high-ticket coaching, tax products. The 7 research sections remain constant; only the market-specific content changes."
      domains: [research, adaptability, copywriting]
      source: "SG-RMBC-METHOD"

    - id: "MM-SG-044"
      title: "Lead Structure Temperature Matching"
      description: "10 lead structures each suited to different awareness levels. Story lead = unaware. Paradox lead = problem-aware. Direct lead = most-aware. Match lead to where prospect IS, not where you wish they were."
      domains: [leads, copywriting, market-awareness]
      source: "SG-RMBC-METHOD"

    - id: "MM-SG-045"
      title: "Fascination As Standalone Headline"
      description: "Test: can each fascination bullet work as a standalone headline? If not, it's too weak. The fascination stack should be a collection of headlines, each powerful enough to sell the piece alone."
      domains: [fascinations, headlines, copywriting]
      source: "SG-RMBC-METHOD"

    - id: "MM-SG-046"
      title: "Get Thin Telemedicine Case Study Model"
      description: "Real-world case: $20M+ business with minimal copy (headline + social proof + questionnaire) because market awareness is peak (everyone knows GLP-1). Proves that aware markets need less funnel."
      domains: [case-study, funnels, market-awareness]
      source: "SG-RMBC-II"

    - id: "MM-SG-047"
      title: "Opal Beauty Rebrand Model"
      description: "Rebrand strategy: video ads in feed → product pages → checkout. No VSL needed when combining strong brand + demonstrable proof + social proof + good product page copy."
      domains: [brand, e-commerce, DTC]
      source: "SG-RMBC-II"

    - id: "MM-SG-048"
      title: "Multiple AI Research Tools Triangulation"
      description: "Run same research query on ChatGPT, Gemini, Perplexity, and Google Deep Research. Each surfaces different insights. Gemini analyzed 362 websites. Triangulate for complete market picture."
      domains: [research, AI-copywriting, tools]
      source: "SG-RMBC-II"

    - id: "MM-SG-049"
      title: "Checklist As Testing Guide Not Template"
      description: "PFF checklists are not rigid templates — they're menus of elements to test. Audit your page against the checklist, identify missing elements, test adding them one at a time."
      domains: [conversion, testing, optimization]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-050"
      title: "Upsell Video As Relationship Builder"
      description: "Upsell video serves dual purpose: converts to additional purchase AND builds relationship for future purchases. Heavy congratulation creates goodwill even if they decline the upsell."
      domains: [upsells, relationship, LTV]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-051"
      title: "Guarantee Badge As Checkout Lever"
      description: "Show guarantee badge on both landing page AND checkout page. Many buyers forget by checkout that there's a guarantee. Reminder reduces friction at the highest-friction point."
      domains: [checkout, conversion, trust]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-052"
      title: "Cross-Niche Funnel Swiping"
      description: "Model funnel structures from completely different niches. Sell Like Crazy book funnel structure works for supplements. 1000 Bars A Day upsell works for info products. Structure transfers; specifics adapt."
      domains: [funnels, modeling, strategy]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "MM-SG-053"
      title: "Missing 1% Research Philosophy"
      description: "The prospect's knowledge about their problem is 99% correct. Your research must find the 1% they're missing — the knowledge gap. That 1% becomes your unique mechanism."
      domains: [research, mechanisms, copywriting]
      source: "SG-RMBC-II"

    - id: "MM-SG-054"
      title: "Micro UMP Summary In Headline"
      description: "The PDP headline should contain a micro-summary of the entire UMP/UMS in one sentence. If you can't compress it to one sentence, your mechanism isn't clear enough."
      domains: [copywriting, headlines, mechanisms]
      source: "SG-RMBC-II"

    - id: "MM-SG-055"
      title: "Caveman Page For High Awareness Markets"
      description: "For highly aware markets, a caveman page (glorified FAQ + mechanism + social proof) can outperform VSLs. Performance Golf model: simple page, clear mechanism, buy button."
      domains: [landing-pages, conversion, simplicity]
      source: "SG-RMBC-II"

  L3_HEURISTICS:

    # === COPY ACCELERATOR: Practical Rules (HEUR-SG-001 to HEUR-SG-033) ===

    - id: "HEUR-SG-001"
      title: "Research Time: 3-5 Hours Maximum"
      description: "Spend 3-5 hours on research per project. Less and you miss critical angles. More and you hit diminishing returns. The brief will reveal if you missed anything."
      domains: [research, productivity, copywriting]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-002"
      title: "Ad Creative Time: 10-30 Minutes Maximum"
      description: "Each ad creative should take 10-30 minutes to write. If it's taking longer, you're overthinking. Produce volume, let data pick the winner."
      domains: [advertising, productivity, testing]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-003"
      title: "Full Sales Letter Time: 4-6 Hours With Complete RMBC"
      description: "A complete sales letter takes 4-6 hours when the RMBC process was properly followed. If it's taking longer, the brief was incomplete."
      domains: [copywriting, productivity, process]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-004"
      title: "First CTA At ~7000 Words In 9000-Word VSL"
      description: "In a 9000-word VSL, place the first call to action at approximately the 7000-word mark. This gives enough time for proof and mechanism before asking for the sale."
      domains: [copywriting, VSL, structure]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-005"
      title: "Pre-1960 Research Is Gold"
      description: "Medical journals, patent filings, and research papers from before 1960 contain unique mechanisms and angles that no competitor will find through modern search engines."
      domains: [research, differentiation, health-copy]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-006"
      title: "Upsell 1 Is Highest Leverage"
      description: "The first upsell has the highest acceptance rate of any post-purchase offer. Optimize it aggressively — it moves AOV more than any other single element."
      domains: [funnels, revenue-optimization, offers]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-007"
      title: "Headlines Move The Needle Most"
      description: "Changing a headline can swing conversion by 200-500%. No other single element has this leverage. Always test headline variations first."
      domains: [copywriting, headlines, testing]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-008"
      title: "Test At 300+ Conversions Minimum"
      description: "Don't call a test until you have at least 300 conversions per variant. Anything less and you're making decisions on statistical noise."
      domains: [testing, data, direct-response]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-009"
      title: "AOV Target: $200+ For Supplements"
      description: "For supplement funnels, target a minimum AOV of $200. Below this, the economics of cold traffic acquisition become very difficult."
      domains: [funnels, supplements, revenue-optimization]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-010"
      title: "Higher Price Test: 37% AOV Increase"
      description: "Testing 49/39/29 pricing tiers against 39/35/29 resulted in a 37% AOV increase with minimal conversion rate drop. Always test higher prices."
      domains: [pricing, testing, revenue-optimization]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-011"
      title: "Checkout Button: 'Checkout' > 'Submit' = 30% Lift"
      description: "Changing checkout button text from 'Submit' to 'Checkout' produced a 30% conversion increase. Micro-copy on buttons matters enormously."
      domains: [conversion, checkout, micro-copy]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-012"
      title: "Lead Should Be 10-15% Of Total Copy"
      description: "The lead (hook through mechanism intro) should be approximately 10-15% of the total sales letter length. Too short and it lacks power; too long and you lose momentum."
      domains: [copywriting, leads, structure]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-013"
      title: "3 Testimonials Minimum In Proof Stack"
      description: "Include at least 3 testimonials in the main proof stack. One feels anecdotal, two feels coincidental, three starts to establish a pattern."
      domains: [copywriting, proof, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-014"
      title: "Fascination Bullets: 15-25 Per Stack"
      description: "A fascination stack should contain 15-25 bullets. Fewer feels thin. More creates fatigue. Each bullet must earn its place by creating genuine curiosity."
      domains: [copywriting, fascinations, structure]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-015"
      title: "Subject Line Length: 4-7 Words For Best Opens"
      description: "Email subject lines between 4-7 words consistently outperform longer alternatives. Short creates curiosity gaps. Long gets truncated on mobile."
      domains: [email-marketing, subject-lines, testing]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-016"
      title: "1 Big Idea Per Sales Letter"
      description: "Never split attention between two big ideas. One sales letter, one big idea, one unique mechanism. Multiple ideas dilute all of them."
      domains: [copywriting, messaging, focus]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-017"
      title: "Video Sales Letters Outperform Text At Scale"
      description: "For cold traffic at scale, VSLs consistently outperform text-based sales letters. The combination of visual, auditory, and text elements increases engagement and trust."
      domains: [VSL, conversion, traffic]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-018"
      title: "Guarantee Should Remove All Risk"
      description: "The guarantee should make buying feel risk-free. 60-day money back minimum for supplements. The stronger the guarantee, the lower the refund rate (paradoxically)."
      domains: [offers, guarantees, conversion]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-019"
      title: "Re-Read Research Notes Before Writing"
      description: "Always re-read your complete research notes immediately before writing. Fresh immersion in the material produces more authentic, detailed copy."
      domains: [copywriting, research, process]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-020"
      title: "Name The Mechanism"
      description: "Always give the unique mechanism a proprietary name. Named mechanisms feel more real, more scientific, and more ownable than generic descriptions."
      domains: [copywriting, differentiation, naming]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-021"
      title: "First Draft Complete Before Editing"
      description: "Write the entire first draft without stopping to edit. Editing during writing kills momentum and creativity. Separate creation from refinement."
      domains: [copywriting, productivity, process]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-022"
      title: "Bonuses Should Overcome Specific Objections"
      description: "Each bonus in an offer should address a specific objection or desire. Random bonuses add clutter. Strategic bonuses remove purchase barriers."
      domains: [offers, conversion, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-023"
      title: "Use Exact Numbers Over Round Numbers"
      description: "Specific numbers (37 lbs, $14,237, 8.3 inches) are more believable than round numbers (40 lbs, $14,000, 8 inches). Precision implies measurement."
      domains: [copywriting, trust, specificity]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-024"
      title: "Open Email With Pattern Interrupt"
      description: "The first line of a sales email should break the reader's expected pattern. A question, a bold statement, a story fragment — anything but 'Hey [name], I wanted to...'"
      domains: [email-marketing, engagement, copywriting]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-025"
      title: "Scarcity Must Have Visible Countdown"
      description: "Deadline-based scarcity works 3-5x better when there is a visible countdown timer. Abstract deadlines don't create the same urgency as ticking clocks."
      domains: [conversion, scarcity, funnels]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-026"
      title: "Long Copy Outperforms Short For Cold Traffic"
      description: "For cold traffic, longer copy consistently outperforms shorter copy because cold prospects need more proof, more mechanism explanation, and more objection handling."
      domains: [copywriting, traffic, conversion]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-027"
      title: "Testimonials With Photos Convert 2x Better"
      description: "Testimonials that include real photos of the person convert approximately twice as well as text-only testimonials. Visual proof amplifies credibility."
      domains: [proof, conversion, trust]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-028"
      title: "Story Lead For Health, Prediction Lead For Finance"
      description: "Health niches respond best to story-based leads (emotional connection). Finance niches respond best to prediction-based leads (intellectual hook). Match lead type to niche."
      domains: [copywriting, leads, niche-strategy]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-029"
      title: "Price Anchor At 3-5x The Actual Price"
      description: "The price anchor should be 3-5x the actual price. Frame the value comparison so the actual price feels like a bargain. 'Value of $997, yours today for $197.'"
      domains: [pricing, persuasion, offers]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-030"
      title: "Research Module Should Have 7 Sections"
      description: "Comprehensive research covers 7 sections: market, product, competition, emotional triggers, objections, proof sources, and unique mechanism angles."
      domains: [research, copywriting, process]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-031"
      title: "Stock Up Offers Increase AOV 40-60%"
      description: "Offering 3-bottle and 6-bottle stock-up options with escalating discounts increases AOV by 40-60% in supplement funnels. Most buyers prefer the 3-bottle option."
      domains: [offers, supplements, revenue-optimization]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-032"
      title: "Downsell Should Be 50-60% Of Original Price"
      description: "The downsell offer should be priced at 50-60% of the declined upsell. Too close to original price and it doesn't feel different. Too low and it devalues the product."
      domains: [funnels, pricing, offers]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-033"
      title: "10 Elements Make A Strong Lead"
      description: "A complete lead has 10 elements: headline, sub-headline, opening hook, credibility seed, problem agitation, curiosity loop, mechanism tease, promise, proof hint, and transition."
      domains: [copywriting, leads, structure]
      source: "SG-COPYACCELERATOR"

    # === RMBC II + PFF: New Heuristics (HEUR-SG-034 to HEUR-SG-133) ===

    # -- 15 Funnel Factors (RMBC II) --
    - id: "HEUR-SG-034"
      title: "Factor 1: Market Awareness Level"
      description: "Rate 1-5: Unaware=1, Problem Aware=2, Solution Aware=3, Product Aware=4, Most Aware=5. Higher awareness = less copy needed. GLP-1 telemedicine = 5 (everyone knows); unknown supplement = 1-2."
      domains: [funnels, market-awareness, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-035"
      title: "Factor 2: Demonstrable Proof"
      description: "Rate 1-5: Instant visible proof=5 (OxyClean, teeth whitening); no visible proof=1 (supplements, coaching). Higher score = shorter funnel possible. Good animations can add 1-2 points."
      domains: [funnels, proof, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-036"
      title: "Factor 3: Price Point And Perceived Spend"
      description: "Rate 1-5: Free/shipping=5 ($5), Low ticket=4 ($10-50), Mid ticket=3 ($50-200), High ticket=2 ($200-2000), Ultra high=1 ($2000+). Lower price = less justification needed."
      domains: [funnels, pricing, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-037"
      title: "Factor 4: Traffic Temperature"
      description: "Rate 1-5: Warm email list=5, Retargeting=4, Lookalike=3, Broad interest=2, Stone cold=1. Warmer traffic = shorter funnel. Cold traffic typically needs advertorial + VSL."
      domains: [funnels, traffic, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-038"
      title: "Factor 5: Brand Equity And Credibility"
      description: "Rate 1-5: Coca-Cola level recognition=5, Celebrity endorser=4, Established with reviews=3, New with some proof=2, Unknown brand=1. Strong brand = minimal copy needed."
      domains: [funnels, brand, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-039"
      title: "Factor 6: Perceived Risk And Risk Reversal"
      description: "Rate 1-5: No risk (free)=5, Low risk (money-back)=4, Medium risk (no guarantee)=3, High risk (expensive + unproven)=2, Very high risk=1. Lower risk = shorter funnel."
      domains: [funnels, risk, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-040"
      title: "Factor 7: Regulatory Compliance Load"
      description: "Rate 1-5: No regulation=5, Light (standard disclaimers)=4, Moderate (terms required)=3, Heavy (eligibility quiz)=2, Ultra (KYC + licensing)=1. More regulation = more mandatory steps."
      domains: [funnels, compliance, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-041"
      title: "Factor 8: Offer Complexity / Choice Overload"
      description: "Rate 1-5: One product one price=5, 2-3 clear options=4, Bundle with add-ons=3, Multiple customizable options=2, Full personalization=1. Simpler = faster conversion."
      domains: [funnels, offers, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-042"
      title: "Factor 9: LTV Importance"
      description: "Rate 1-5: Pure one-time purchase=5, Repeat purchase likely=4, Subscription model=3, High LTV requires nurture=2, Ultra high LTV justifies long nurture=1. High LTV can afford longer funnels."
      domains: [funnels, LTV, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-043"
      title: "Factor 10: Urgency Of Pain Point"
      description: "Rate 1-5: Acute immediate pain (migraine)=5, Uncomfortable daily (joint pain)=4, Moderate annoyance=3, Aspirational improvement=2, Vague long-term (anti-aging)=1. Acute pain sells faster."
      domains: [funnels, psychology, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-044"
      title: "Factor 11: Competitor Saturation"
      description: "Rate 1-5: Blue ocean (nobody else)=5, Few competitors=4, Moderate competition=3, Crowded market=2, Ultra saturated (weight loss supplements)=1. More competition = more differentiation copy needed."
      domains: [funnels, competition, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-045"
      title: "Factor 12: Buying Context / Device / Attention"
      description: "Rate 1-5: Desktop engaged=5, Desktop casual=4, Mobile engaged=3, Mobile casual (TikTok)=2, Ultra short attention=1. Mobile dominant = shorter assets. 90%+ mobile = needs short funnels."
      domains: [funnels, platforms, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-046"
      title: "Factor 13: Payment Friction"
      description: "Rate 1-5: No payment (free)=5, One-click checkout=4, Standard checkout=3, Multi-step or financing=2, Complex application=1. Less friction = simpler funnel possible."
      domains: [funnels, checkout, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-047"
      title: "Factor 14: Social Proof Assets"
      description: "Rate 1-5: 100K+ community + viral reviews=5, Thousands of reviews=4, Good reviews + some proof=3, Minimal reviews=2, Zero social proof=1. Rich proof = less copy needed."
      domains: [funnels, social-proof, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-048"
      title: "Factor 15: Time To Results / Visible Progress"
      description: "Rate 1-5: Instant results (wrinkle remover)=5, Days (supplement effects)=4, Weeks (fitness)=3, Months (career change)=2, Years (anti-aging)=1. Faster results = simpler funnel."
      domains: [funnels, results, scoring]
      source: "SG-RMBC-II"

    # -- Funnel Scoring Thresholds (RMBC II) --
    - id: "HEUR-SG-049"
      title: "Score 46+: Light Funnel (PDP/Cart)"
      description: "15 Funnel Factors score 46 or above: use simple funnel — static ad or short video → product page → cart → upsells. No VSL or advertorial needed."
      domains: [funnels, strategy, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-050"
      title: "Score 25-45: Mid Funnel (Quiz/Advertorial)"
      description: "15 Funnel Factors score 25-45: use mid-complexity funnel — 3-10 min feed video or ad → quiz/advertorial → landing page → cart. May include shorter VSL."
      domains: [funnels, strategy, scoring]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-051"
      title: "Score Below 25: Heavy Funnel (VSL/Webinar)"
      description: "15 Funnel Factors score below 25: use full funnel — ad → story presell/advertorial → 35-45 min VSL → lander → checkout → ascension emails. Maximum copy needed."
      domains: [funnels, strategy, scoring]
      source: "SG-RMBC-II"

    # -- Conversion Metrics (RMBC II + PFF) --
    - id: "HEUR-SG-052"
      title: "AOV x CVR > 350 Rule Of Thumb"
      description: "If AOV × Conversion Rate is below 350, the funnel needs optimization. Example: $200 AOV × 1.75% CVR = 350. Below this = focus on funnel fix first. Niche-dependent but useful starting point."
      domains: [metrics, optimization, funnels]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-053"
      title: "Checkout Button: 'Checkout' Not 'Submit'"
      description: "Changing checkout button text from 'Submit' to 'Checkout' produced 30% conversion increase. Simple micro-copy test with massive impact."
      domains: [checkout, conversion, micro-copy]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-054"
      title: "Free Opt-In Converts 50-70%"
      description: "Name + email opt-in for free content (no credit card) converts 50-70%. The less friction (no payment info), the higher the conversion rate. Use for top of funnel."
      domains: [funnels, conversion, lead-gen]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-055"
      title: "8% TikTok Bounce Rule"
      description: "8% of TikTok traffic either buys or bounces in 30 seconds on mobile. Design mobile-first, ultra-fast pages for TikTok traffic. No long-form for this platform."
      domains: [traffic, mobile, platforms]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-056"
      title: "7-Minute VSL For Aware Markets"
      description: "For product-aware or most-aware markets, test 7-minute VSLs instead of 30-40 minute ones. Get Thin tested 7-minute VSLs; they were competitive with direct landers."
      domains: [VSL, market-awareness, testing]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-057"
      title: "Congratulation Length: 5-7 Minutes On Upsell Video"
      description: "Spend first 5-7 minutes of upsell video congratulating the buyer. Sell Like Crazy upsell: 6 minutes of pure congratulation before ANY selling. Dramatically increases take rates."
      domains: [upsells, conversion, sales-psychology]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-058"
      title: "Order Bumps: Measure Total AOV Not Just Bump Rate"
      description: "A $20 order bump with 30% take rate looks great, but if it reduces $150 upsell take rate from 30% to 15%, total AOV drops. Always measure net AOV impact."
      domains: [checkout, AOV, testing]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-059"
      title: "Trust Seals: Multiple Placements On Checkout"
      description: "Show secure processing, encrypted connection, and credit card logos at MINIMUM 2 spots on checkout page. Blood sugar supplement page: trust badges both top and bottom. Repetition builds confidence."
      domains: [checkout, trust, conversion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-060"
      title: "No More Than 2 Links Per Email"
      description: "Limit emails to 2 separate links maximum with one clear CTA. Exceptions exist (BioTrust uses many links) but simpler generally wins. Test for your audience."
      domains: [email-marketing, conversion, simplicity]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-061"
      title: "Creative From Name Boosts Opens"
      description: "Changing from 'Stefan Georgi' to creative names like 'Your Next Copywriter' or 'Father Time' or 'Free Cookbook' increases open rates. Gimmicky but works."
      domains: [email-marketing, subject-lines, testing]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-062"
      title: "Landing Page Elements Are Additive"
      description: "Adding missing checklist elements to existing landing pages almost always produces conversion lift. Not every page needs every element, but testing additions rarely hurts."
      domains: [landing-pages, conversion, testing]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-063"
      title: "Retention Bar On Every Upsell Page"
      description: "Always include a retention/progress bar at top of upsell: 'Wait! Your order is not complete' or 'Almost complete'. Stops the exit impulse and signals there's more value ahead."
      domains: [upsells, conversion, UX]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-064"
      title: "Video Loop On Upsell: Auto-Play With Prompt"
      description: "Upsell page should have auto-playing video on a teaser loop with play button prompt. Gets attention immediately without relying on them finding the play button."
      domains: [upsells, conversion, UX]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-065"
      title: "Stack Summary On Checkout Increases Clarity"
      description: "Include order summary section on checkout: item, quantity, price, total. Jason Hornam example: simple summary after all copy increases perceived transparency and reduces friction."
      domains: [checkout, conversion, UX]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-066"
      title: "Exit Pop With Coupon On Checkout"
      description: "When buyer tries to leave checkout, fire exit popup with 10% coupon or bonus. Last-chance recovery mechanism. Works on both checkout and upsell decline pages."
      domains: [checkout, conversion, retention]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-067"
      title: "Brief 2.0: 23 Questions Complete"
      description: "New brief template has 23 questions: audience, pain points (short/long term), promises, solution landscape, dual mechanism, nickname, ingredients, claims, product details, story, spokesperson, testimonials, credibility, pricing, guarantee, bonuses, scarcity, future pacing."
      domains: [copywriting, planning, AI-copywriting]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-068"
      title: "UMP Must Pass LLM Evaluation"
      description: "Test each unique mechanism idea through an LLM evaluation prompt: Does it create a knowledge gap? Is it believable? Is it simple enough to explain in one sentence? Does it differ from competitors? Score each."
      domains: [mechanisms, AI-copywriting, evaluation]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-069"
      title: "Advertorial Mechanism: Simplified UMP"
      description: "Advertorial doesn't need full mechanism detail. Just the 'missing 1%' — the one piece of information they didn't know. Full mechanism detail saves for VSL. Advertorial teases, VSL proves."
      domains: [advertorials, mechanisms, funnels]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-070"
      title: "Problem Before Solution Copy Always"
      description: "In any copy asset (LP, checkout, upsell, email), always establish the problem BEFORE presenting the solution. On upsell: congratulate → new problem → consequences → new solution → offer."
      domains: [copywriting, structure, persuasion]
      source: "SG-PROFIT-FIX-FORMULA"

    - id: "HEUR-SG-071"
      title: "Get Thin Revenue: $20M→$40-50M Year 2"
      description: "Get Thin telemedicine company: $20M year 1, tracking $40-50M year 2 with minimal copy (headline + questionnaire). Proves aware-market funnels can scale without VSLs."
      domains: [case-study, scaling, telemedicine]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-072"
      title: "Higher Price Test First — Always"
      description: "When split testing prices, always test the higher price point first. Higher price test (49/39/29 vs 39/35/29) produced 37% AOV increase. You lose nothing by testing high first."
      domains: [pricing, testing, AOV]
      source: "SG-COPYACCELERATOR"

    - id: "HEUR-SG-073"
      title: "Gemini Deep Research: 362+ Websites"
      description: "Gemini deep research can analyze 362+ websites in a single prompt. Use for competitive landscape analysis, case study collection, and market intelligence at scale."
      domains: [research, AI-copywriting, tools]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-074"
      title: "Perplexity For Case Studies"
      description: "Perplexity excels at finding real-world case studies on LinkedIn and marketing sites. Use it specifically for competitive case study research and funnel examples."
      domains: [research, AI-copywriting, tools]
      source: "SG-RMBC-II"

    - id: "HEUR-SG-075"
      title: "One Click Upsells For Self-Liquidating"
      description: "Low-ticket self-liquidating funnels should use one-click upsells (no additional payment info entry). Minimize friction to maximize post-purchase revenue."
      domains: [upsells, funnels, conversion]
      source: "SG-RMBC-II"

  L4_FRAMEWORKS:

    # === COPY ACCELERATOR: Structured Methodologies (FW-SG-001 to FW-SG-020) ===

    - id: "FW-SG-001"
      title: "RMBC Method"
      description: "Research → Mechanism → Brief → Copy. Stefan's signature 4-step system for producing high-converting copy consistently. Each step feeds the next; skipping any step degrades the final output."
      domains: [copywriting, process, direct-response]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-002"
      title: "Sales Letter Outline (7-Part Structure)"
      description: "Lead → Problem/Agitation → Unique Mechanism → Solution → Proof Stack → Offer → Close. Each section has a specific job and flows logically into the next."
      domains: [copywriting, structure, sales-letters]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-003"
      title: "Subject Line Matrix (12-Category Dissection)"
      description: "12 categories for generating and testing email subject lines: curiosity, fear, greed, news, how-to, question, command, reason-why, paradox, story, testimonial, and urgency."
      domains: [email-marketing, subject-lines, testing]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-004"
      title: "AOV Money Close Framework"
      description: "Close technique that reframes the price as a daily investment. Break the total into per-day cost, compare to everyday purchases, and make the math irresistible."
      domains: [closing, pricing, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-005"
      title: "Lead Structure (10 Elements)"
      description: "Ten essential elements of a high-converting lead: headline, sub-headline, opening hook, credibility seed, problem agitation, curiosity loop, mechanism tease, promise, proof hint, transition."
      domains: [copywriting, leads, structure]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-006"
      title: "Emo Story 16-Step Structure"
      description: "16-step emotional story framework: normal life → inciting incident → failed attempts → darkest moment → discovery → mechanism encounter → first result → proof → transformation → new life → reason for sharing → reader identification → mechanism reveal → offer bridge → CTA seed → transition."
      domains: [copywriting, storytelling, leads]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-007"
      title: "Research Module (7 Sections)"
      description: "Comprehensive research framework: 1) Market deep-dive, 2) Product analysis, 3) Competitive landscape, 4) Emotional triggers, 5) Objection inventory, 6) Proof sources, 7) Unique mechanism angles."
      domains: [research, copywriting, process]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-008"
      title: "Unique Mechanism Dual Structure"
      description: "Two-part mechanism framework: Part 1 — mechanism of the problem (why the problem exists/persists), Part 2 — mechanism of the solution (why this specific approach works). Both must be articulated."
      domains: [copywriting, differentiation, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-009"
      title: "Brief Completion Process"
      description: "Structured brief template that must be completed before writing: target audience profile, big idea, unique mechanism, proof inventory, offer outline, emotional triggers, voice/tone guide, competitive differentiation, and desired action."
      domains: [copywriting, planning, process]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-010"
      title: "Copywriter Training System (10-Step)"
      description: "10-step system for training new copywriters: 1) Read winning controls, 2) Hand-copy controls, 3) Analyze structure, 4) Study RMBC, 5) Complete research exercise, 6) Write brief, 7) Write copy under supervision, 8) Peer review, 9) Solo project with review, 10) Live project."
      domains: [training, copywriting, team-building]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-011"
      title: "Stock Up Scarcity Upsell Template"
      description: "Upsell framework that offers multi-unit purchases with escalating discounts: 1-bottle at full price, 3-bottles at 15% off, 6-bottles at 25% off. Combined with deadline scarcity for maximum AOV."
      domains: [upsells, offers, revenue-optimization]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-012"
      title: "Paradoxical Questions Technique"
      description: "Opening technique using seemingly contradictory questions to create curiosity: 'What if the food you eat for health is actually making you sicker?' Forces the reader to continue for resolution."
      domains: [copywriting, headlines, curiosity]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-013"
      title: "Proof Stack Architecture"
      description: "Layered proof framework: Layer 1 — mechanism proof (scientific/logical), Layer 2 — social proof (testimonials), Layer 3 — authority proof (endorsements/credentials), Layer 4 — demonstration proof (before/after). Minimum 3 layers."
      domains: [copywriting, proof, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-014"
      title: "Headline Testing Matrix"
      description: "Test headlines across 4 dimensions: curiosity level, specificity, emotional trigger, and mechanism hint. Create a 4x4 matrix and test the highest-potential combinations first."
      domains: [testing, headlines, optimization]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-015"
      title: "Offer Stack Builder"
      description: "Framework for constructing irresistible offers: Core product → Bonus 1 (amplifies result) → Bonus 2 (removes obstacle) → Bonus 3 (addresses fear) → Guarantee (removes risk) → Scarcity (creates urgency)."
      domains: [offers, conversion, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-016"
      title: "Competitive Differentiation Audit"
      description: "4-step framework: 1) List all competitor claims, 2) Identify common language patterns, 3) Find the gap they all miss, 4) Position your mechanism in that gap. Differentiation is about finding the white space."
      domains: [differentiation, research, positioning]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-017"
      title: "Emotional Trigger Map"
      description: "Framework mapping emotional triggers to copy sections: Fear in problem agitation, Hope in mechanism reveal, Desire in benefit dimensionalization, Urgency in close, Relief in guarantee."
      domains: [copywriting, emotional-triggers, structure]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-018"
      title: "VSL Pacing Framework"
      description: "Framework for VSL timing: Hook (0-30 sec), Story (30 sec-5 min), Problem (5-10 min), Mechanism (10-18 min), Proof (18-25 min), Offer (25-30 min), Close (30-35 min). Adjust proportions by total length."
      domains: [VSL, structure, pacing]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-019"
      title: "Objection Pre-Emption Template"
      description: "Framework for handling objections within copy: 1) Anticipate the objection, 2) Voice it as the reader's thought, 3) Validate the concern, 4) Reframe with evidence, 5) Turn objection into proof. Address top 5 objections before the CTA."
      domains: [copywriting, objection-handling, persuasion]
      source: "SG-COPYACCELERATOR"

    - id: "FW-SG-020"
      title: "Split Test Decision Framework"
      description: "Framework for acting on test results: 300+ conversions per variant, 95% statistical confidence, 2-week minimum run, control wins ties, never test more than 1 variable at a time."
      domains: [testing, data, optimization]
      source: "SG-COPYACCELERATOR"

    # === RMBC II + PFF: New Frameworks (FW-SG-021 to FW-SG-072) ===

    - id: "FW-SG-021"
      title: "15 Funnel Factors Scoring Framework"
      description: "Score 15 factors (1-5 each): Market Awareness, Demonstrable Proof, Price Point, Traffic Temperature, Brand Equity, Perceived Risk, Regulatory Load, Offer Complexity, LTV Importance, Pain Urgency, Competitor Saturation, Device/Attention, Payment Friction, Social Proof, Time to Results. Sum determines funnel architecture."
      domains: [funnels, strategy, decision-making]

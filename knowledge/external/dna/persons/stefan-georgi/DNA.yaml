  synthesis:
    one_liner: "Master direct response copywriting, conversion optimization, and funnel architecture through the RMBC Method and its 2025 AI-powered evolution — systematic research, unique mechanisms, Brief 2.0, 15 Funnel Factors scoring, landing page/checkout/upsell/ad/email optimization, and AI-assisted copy creation."
    core_question: "Have you scored your offer on the 15 Funnel Factors, completed your Brief 2.0, identified the unique mechanism, and optimized every conversion point from landing page to upsell to email?"
    greatest_contribution: "Created the RMBC Method and its AI-powered successor RMBC II — a complete system from research to revenue that covers copywriting, funnel architecture, conversion optimization, and now AI-assisted copy creation with Claude Projects."
    blind_spot: "Heavy focus on direct response health/supplement and DTC market may require adaptation for SaaS, B2B, or non-DR contexts. Profit Fix Formula examples skew toward physical products and supplements."
    declared_bias: "Favors systematic process over raw talent; believes AI amplifies good process but cannot replace fundamental copywriting understanding; always test higher prices first."

  proprietary_terms:
    - term: "RMBC Method"
      meaning: "Research, Mechanism, Brief, Copy — Stefan's 4-step system for writing high-converting copy every time"
    - term: "Unique Mechanism"
      meaning: "The single differentiating element that makes a product's promise believable — the 'why it works' that competitors can't claim"
    - term: "Dimensionalize"
      meaning: "Expanding a benefit into vivid, sensory, emotional detail that makes the reader feel the transformation"
    - term: "Brief"
      meaning: "The comprehensive planning document completed before writing a single word of copy — the blueprint"
    - term: "Money Close"
      meaning: "AOV-focused closing technique that frames the purchase as a per-day investment"
    - term: "Proof Stack"
      meaning: "Layered evidence combining testimonials, studies, mechanism proof, and authority to overwhelm skepticism"
    - term: "Paradoxical Question"
      meaning: "Opening technique that poses a seemingly contradictory question to create irresistible curiosity"
    - term: "Corruption"
      meaning: "The hidden force or villain causing the prospect's problem — creates urgency and positions the product as the antidote"
    - term: "Emo Story"
      meaning: "Emotional origin story structure (16 steps) used in leads to build connection and desire"
    - term: "Stock Up Scarcity"
      meaning: "Upsell technique that creates urgency to buy multiple units through time-limited pricing"
    - term: "Subject Line Matrix"
      meaning: "12-category system for generating and testing email subject lines"
    - term: "Brief 2.0"
      meaning: "23-question comprehensive brief template evolved from original 10-question RMBC brief, designed for AI-assisted copy creation"
    - term: "15 Funnel Factors"
      meaning: "Scoring rubric of 15 factors (1-5 each) that determine optimal funnel complexity — higher score = less copy needed"
    - term: "Funnel Fat"
      meaning: "How much copy and how many steps a funnel needs — determined by the 15 Factors score"
    - term: "Product-Market Awareness"
      meaning: "Eugene Schwartz's 5 levels of awareness (unaware to most-aware) applied to RMBC research and copy approach"
    - term: "UMP / UMS"
      meaning: "Unique Mechanism of the Problem / Unique Mechanism of the Solution — the dual mechanism structure"
    - term: "OLAF Method"
      meaning: "Justin Goff's upsell methodology used in Profit Fix Formula — congratulate, reaffirm, new problem, new solution"
    - term: "Retention Bar"
      meaning: "Stop/progress bar at top of upsell page — 'Wait! Your order is not complete' pattern"
    - term: "Effective CPA"
      meaning: "True customer acquisition cost considering all revenue sources (halo effect), not just direct attribution"
    - term: "Demonstrable Proof"
      meaning: "Product that visually proves it works (like OxyClean stain removal) — reduces need for long-form copy"
    - term: "Claude Project"
      meaning: "AI workspace setup in Claude for specific copywriting tasks — research, mechanisms, briefs, VSLs, advertorials"
    - term: "6 Power Emails"
      meaning: "Six email types that drive conversions: creative subject line, compelling opener, deliver on hook, clear CTA, hyperlinked sections, promo integration"
    - term: "Caveman Page"
      meaning: "Glorified FAQ/product page format used by Performance Golf — simple, direct, mechanism-driven"
    - term: "Missing 1%"
      meaning: "The one crucial piece of information the prospect doesn't know — the gap that research uncovers"


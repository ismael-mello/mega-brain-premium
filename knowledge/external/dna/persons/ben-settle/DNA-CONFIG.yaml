# RESUMO
# ═══════════════════════════════════════════════════════════════════════════

resumo: |
  Ben Settle é o "Email Player" — o maior especialista vivo em email marketing
  diário de resposta direta. Autor do sistema Street Smart Email, publisher da
  newsletter Email Players (73+ issues, 2011-2017+), e criador do Email Client
  Machine. Filosofia central: email diário, entretenimento > educação,
  personalidade > profissionalismo, ugly > pretty, venda em todo email.
  Influenciado por Matt Furey, Dan Kennedy, Eugene Schwartz, Gary Halbert,
  Jim Camp, e Stan Billue.


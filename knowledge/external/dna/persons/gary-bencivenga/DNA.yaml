      source: "7MSWC"
      domains: ["copywriting", "career-management"]
    - id: "HEUR-GB-023"
      name: "Six By Nine Packages Lose"
      description: "Standard 6x9 packages consistently underperform — use unexpected formats to stand out."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles"]
    - id: "HEUR-GB-024"
      name: "Squeamishness Good Sign"
      description: "If you feel squeamish about a test idea, it's probably worth testing — discomfort often signals breakthrough potential."
      source: "7MSWC"
      domains: ["testing-methodology", "copywriting"]
    - id: "HEUR-GB-025"
      name: "Breakthrough In Headlines"
      description: "The single biggest breakthrough opportunity in any campaign is almost always in the headline."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "HEUR-GB-026"
      name: "Starcrest Indicator Magic Moment"
      description: "The Starcrest catalog indicator identifies the magic moment when a prospect is most ready to buy."
      source: "7MSWC"
      domains: ["list-strategy", "direct-mail"]
    - id: "HEUR-GB-027"
      name: "Universal Topics Transcend Category"
      description: "Universal topics like health, wealth, and relationships transcend product categories in list selection."
      source: "7MSWC"
      domains: ["list-strategy", "copywriting"]
    - id: "HEUR-GB-028"
      name: "Yardstick Lists For Launches"
      description: "Use proven yardstick lists to benchmark performance when launching new products or offers."
      source: "7MSWC"
      domains: ["list-strategy", "testing-methodology"]
    - id: "HEUR-GB-029"
      name: "Case Against Headline Power"
      description: "The 'case against' formula reliably generates high readership because it triggers curiosity and contrarian interest."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "HEUR-GB-030"
      name: "Newsletter Look Alike Wins"
      description: "Packages that look like newsletters consistently outperform traditional sales packages."
      source: "7MSWC"
      domains: ["design-principles", "direct-mail"]
    - id: "HEUR-GB-031"
      name: "Your Current Issue Enclosed Envelope"
      description: "Outer envelope copy saying 'your current issue enclosed' dramatically increases open rates."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles"]
    - id: "HEUR-GB-032"
      name: "Never Roll Out Untested"
      description: "Never roll out a campaign to full scale without testing first — test results must validate before expansion."
      source: "7MSWC"
      domains: ["testing-methodology", "direct-mail"]
    - id: "HEUR-GB-033"
      name: "Visual Trend In Direct Mail"
      description: "Direct mail is trending more visual — design-driven packages are increasingly outperforming copy-heavy ones."
      source: "7MSWC"
      domains: ["design-principles", "direct-mail"]
    - id: "HEUR-GB-034"
      name: "Number 10 Envelope Comeback"
      description: "The standard #10 envelope is making a comeback as an alternative to oversized formats in certain markets."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles"]
    - id: "HEUR-GB-035"
      name: "Write 20-25 Headlines Min"
      description: "Write a minimum of 20-25 headlines before selecting the best one — volume produces quality."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "HEUR-GB-036"
      name: "Benefit Headlines Win 75%"
      description: "Headlines built around a clear benefit outperform other types approximately 75% of the time."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "HEUR-GB-037"
      name: "Body Copy Must Pay Off Headline"
      description: "The body copy must immediately deliver on the headline's promise — broken promises kill readership."
      source: "7MSWC"
      domains: ["copywriting"]
    - id: "HEUR-GB-038"
      name: "Dont Address Readers As Group"
      description: "Never address readers as a group — write to one person, use 'you' not 'all of you' or 'readers'."
      source: "7MSWC"
      domains: ["copywriting"]
    - id: "HEUR-GB-039"
      name: "Personalize To Publication Readers"
      description: "Personalize copy to the specific publication's readership — generic copy underperforms targeted messaging."
      source: "7MSWC"
      domains: ["copywriting", "direct-response"]
    - id: "HEUR-GB-040"
      name: "30 Day Hold Triple Sales"
      description: "A 30-day hold or trial offer can triple sales compared to immediate commitment offers."
      source: "7MSWC"
      domains: ["sales-psychology", "testing-methodology"]
    - id: "HEUR-GB-041"
      name: "Critiquing Process 50-100% Lift"
      description: "A systematic critiquing process can produce 50-100% lift in response rates through iterative improvement."
      source: "7MSWC"
      domains: ["testing-methodology", "copywriting"]
    - id: "HEUR-GB-042"
      name: "Headlines On Four Pillars"
      description: "Write headlines based on each of the four pillars of the Persuasion Equation for maximum coverage."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "HEUR-GB-043"
      name: "Serif Type 86% Higher Pull"
      description: "Serif typefaces pull 86% higher response than sans-serif in direct mail body copy."
      source: "7MSWC"
      domains: ["design-principles"]
    - id: "HEUR-GB-044"
      name: "Column Width 40-60 Characters"
      description: "Optimal column width for readability is 40-60 characters per line."
      source: "7MSWC"
      domains: ["design-principles"]
    - id: "HEUR-GB-045"
      name: "Paragraphs Max 5-7 Lines"
      description: "Keep paragraphs to a maximum of 5-7 lines for optimal readability and engagement."
      source: "7MSWC"
      domains: ["design-principles", "copywriting"]
    - id: "HEUR-GB-046"
      name: "Never Period After Headline"
      description: "Never put a period after a headline — periods signal 'stop reading' to the subconscious mind."
      source: "7MSWC"
      domains: ["design-principles", "copywriting"]
    - id: "HEUR-GB-047"
      name: "Never End Page 1 With Period"
      description: "Never end the first page with a period — always break mid-sentence to force the turn to page 2."
      source: "7MSWC"
      domains: ["copywriting", "direct-mail"]
    - id: "HEUR-GB-048"
      name: "PS Second Most Read Part"
      description: "The P.S. is the second most-read part of any letter after the headline — use it for your strongest offer point."
      source: "7MSWC"
      domains: ["direct-mail", "copywriting"]
    - id: "HEUR-GB-049"
      name: "Photos Outpull Illustrations"
      description: "Photographs consistently outpull illustrations because they carry more credibility and reality."
      source: "7MSWC"
      domains: ["design-principles"]
    - id: "HEUR-GB-050"
      name: "Reverse Type Depresses Response"
      description: "White text on dark background (reverse type) consistently depresses response rates."
      source: "7MSWC"
      domains: ["design-principles"]
    - id: "HEUR-GB-051"
      name: "Long Copy Outpulls Short Copy"
      description: "Long copy consistently outpulls short copy when selling considered purchases — more information equals more sales."
      source: "7MSWC"
      domains: ["copywriting", "direct-response"]
    - id: "HEUR-GB-052"
      name: "Brochure Can Depress Response"
      description: "Including a brochure can actually depress response — it makes the package look more like advertising."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles"]
    - id: "HEUR-GB-053"
      name: "Less Selling Cover Higher Response"
      description: "Less overt selling on the cover produces higher response — let value lead, not sales pressure."
      source: "7MSWC"
      domains: ["design-principles", "direct-mail"]
    - id: "HEUR-GB-054"
      name: "10% Savings Rule"
      description: "Save at least 10% of every dollar earned — the foundation of wealth building for freelancers."
      source: "7MSWC"
      domains: ["wealth-building", "career-management"]
    - id: "HEUR-GB-055"
      name: "50% Client Concentration Limit"
      description: "Never let any single client represent more than 50% of your income — diversification protects against catastrophe."
      source: "7MSWC"
      domains: ["career-management", "wealth-building"]
    - id: "HEUR-GB-056"
      name: "Price Consistency Across Clients"
      description: "Maintain consistent pricing across all clients — price integrity protects your market value."
      source: "7MSWC"
      domains: ["career-management"]
    - id: "HEUR-GB-057"
      name: "George Meany Negotiation Rule"
      description: "George Meany's rule — always ask for more than you want, so you have room to negotiate."
      source: "7MSWC"
      domains: ["career-management", "wealth-building"]
    - id: "HEUR-GB-058"
      name: "Ouch Antidote"
      description: "When a price makes the client say 'ouch,' that's the right starting point for negotiation."
      source: "7MSWC"
      domains: ["career-management", "wealth-building"]
    - id: "HEUR-GB-059"
      name: "Online Royalties 10% Benchmark"
      description: "Aim for 10% royalties on online sales — the benchmark for performance-based copywriter compensation."
      source: "7MSWC"
      domains: ["wealth-building", "career-management"]
    - id: "HEUR-GB-060"
      name: "Online Content Ratio 80-20"
      description: "Online content should maintain an 80-20 ratio of value to selling for maximum effectiveness."
      source: "7MSWC"
      domains: ["copywriting", "direct-response"]
    - id: "HEUR-GB-061"
      name: "Chat Rooms Free Focus Groups"
      description: "Online chat rooms and forums serve as free focus groups — eavesdrop to learn market language and concerns."
      source: "7MSWC"
      domains: ["research-methodology"]
    - id: "HEUR-GB-062"
      name: "Magalogs 2.6x Shelf Life"
      description: "Magalogs enjoy 2.6 times the shelf life of standard mail pieces because they get sorted with catalogs."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles"]
    - id: "HEUR-GB-063"
      name: "I Need Your Help 9 Magic Words"
      description: "The phrase 'I need your help' triggers a powerful psychological response — people are wired to assist when asked sincerely."
      source: "7MSWC"
      domains: ["copywriting", "sales-psychology"]
    - id: "HEUR-GB-064"
      name: "Every Photo Must Have Caption"
      description: "Every photo must have a caption — captions are read 2x more than body copy and are a second headline."
      source: "7MSWC"
      domains: ["design-principles", "direct-mail"]
    - id: "HEUR-GB-065"
      name: "Order Form Miniature Ad"
      description: "Treat the order form as a miniature advertisement — it should resell the offer independently."
      source: "7MSWC"
      domains: ["direct-mail", "copywriting"]

  L4_FRAMEWORKS:
    - id: "FW-GB-001"
      name: "Bencivenga Persuasion Equation"
      description: "Problem + Promise + Proof + Proposition — the four-pillar foundation for all persuasive communication."
      source: "7MSWC"
      domains: ["persuasion", "copywriting", "sales-psychology"]
    - id: "FW-GB-002"
      name: "Proof Element Marketing PEM"
      description: "Make proof the alpha and omega of your marketing — build entire campaigns around irrefutable evidence."
      source: "7MSWC"
      domains: ["proof-marketing", "copywriting"]
    - id: "FW-GB-003"
      name: "12 Proof Elements"
      description: "Demonstration, Creative Guarantee, Reason Why, Specifics, Expose, Selling Against Type, Mechanism, Acknowledging Disbelief, Believable Source, Singular Testimonials, Candor, Specialization."
      source: "7MSWC"
      domains: ["proof-marketing", "copywriting"]
    - id: "FW-GB-004"
      name: "Make Advertising Itself Valuable"
      description: "5-word master secret — make the ad itself worth consuming. Formats include editorial, magalogs, book-logs, Cracker Jack, Trojan Horse, issue-logs."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles", "copywriting"]
    - id: "FW-GB-005"
      name: "Joseph Siegel Method"
      description: "Shopping for proof elements not products — build offers around fan base plus exclusive plus trademark plus recurring revenue."
      source: "7MSWC"
      domains: ["product-creation", "proof-marketing", "annuity-models"]
    - id: "FW-GB-006"
      name: "Hot Hand Strategy"
      description: "Shell product that harnesses others' proof elements — attach your offer to someone else's established credibility."
      source: "7MSWC"
      domains: ["product-creation", "proof-marketing"]
    - id: "FW-GB-007"
      name: "Umbrella Headline"
      description: "Structure headlines with an umbrella claim followed by a laundry list of specific benefits underneath."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "FW-GB-008"
      name: "Product Evaluation Persuasion Equation"
      description: "Test any product against the 4 steps of the Persuasion Equation to determine its viability before writing."
      source: "7MSWC"
      domains: ["product-creation", "testing-methodology"]
    - id: "FW-GB-009"
      name: "Persuasion Equation Scoring 120 Points"
      description: "Score system: Problem(15) Urgent(10) Promise(15) Unique(10) Proof(15) Unquestionable(10) Proposition(15) User-friendly(10) Value(20). Total 120 max."
      source: "7MSWC"
      domains: ["testing-methodology", "copywriting"]
    - id: "FW-GB-010"
      name: "Fred Herman Evocation Selling"
      description: "Five steps: take possession, ask why they want it, second deepening question, reflect value back, close on their own words."
      source: "7MSWC"
      domains: ["sales-psychology", "persuasion"]
    - id: "FW-GB-011"
      name: "50-50 Value Rule Magalogs"
      description: "Half tips and half sell in magalogs — the centerfold must be a standalone giveaway of genuine value."
      source: "7MSWC"
      domains: ["direct-mail", "copywriting"]
    - id: "FW-GB-012"
      name: "Fishman 15 Checkpoint List Analysis"
      description: "Analyze lists across 15 checkpoints: Source, Offer, Price, Cycles, Format, and more transaction behavior indicators."
      source: "7MSWC"
      domains: ["list-strategy", "direct-mail"]
    - id: "FW-GB-013"
      name: "If-Then Headline Technique"
      description: "Structure: 'If you [condition], I guarantee [benefit].' This format achieved 200% lift in testing."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "FW-GB-014"
      name: "Hard To Believe Disbelief Neutralizer"
      description: "Suspend disbelief before presenting proof — acknowledge skepticism upfront to lower resistance."
      source: "7MSWC"
      domains: ["copywriting", "proof-marketing"]
    - id: "FW-GB-015"
      name: "Head-On Objection Attack"
      description: "Defeat the primary objection directly in the headline — address resistance before it forms."
      source: "7MSWC"
      domains: ["headlines", "sales-psychology"]
    - id: "FW-GB-016"
      name: "Sell Information To Differentiate Commodities"
      description: "Shell product plus booklets methodology — combine commodity products with proprietary information to create uniqueness."
      source: "7MSWC"
      domains: ["product-creation", "copywriting"]
    - id: "FW-GB-017"
      name: "Bucket Brigade Words"
      description: "Use transition words as a bucket brigade to prevent skim-drop — each sentence pulls the reader to the next."
      source: "7MSWC"
      domains: ["copywriting"]
    - id: "FW-GB-018"
      name: "Consistency Principle Cialdini Applied"
      description: "Test drive analogy for trial offers — once someone takes a small action, they're psychologically committed to the larger one."
      source: "7MSWC"
      domains: ["persuasion", "sales-psychology"]
    - id: "FW-GB-019"
      name: "I Need Your Help Favor Framework"
      description: "Ask for opinion, receive reward — requesting help creates reciprocity and engagement."
      source: "7MSWC"
      domains: ["copywriting", "sales-psychology"]
    - id: "FW-GB-020"
      name: "Multiple Benefit Headline Desperation"
      description: "When stuck, list 3-7 of your best advantages in one headline — aggregate benefits create cumulative impact."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]
    - id: "FW-GB-021"
      name: "Direct Mail Assembly Rules"
      description: "Letter face-forward, response fits envelope, contact info on every piece, caption all photos, PS mandatory, order form as mini-ad."
      source: "7MSWC"
      domains: ["direct-mail", "design-principles"]
    - id: "FW-GB-022"
      name: "10 Rs Of Desire"
      description: "Recognition, Rejuvenation, Relaxation, Relief, Religion, Remuneration, Revenge, Results, Role Performance, Romance — the 10 universal human desires."
      source: "7MSWC"
      domains: ["desire-psychology", "copywriting"]
    - id: "FW-GB-023"
      name: "4 Part Success Process"
      description: "Destination, Plan, Action, Daily Review — the four-step methodology for achieving any significant goal."
      source: "7MSWC"
      domains: ["career-management", "productivity"]
    - id: "FW-GB-024"
      name: "King Gillette Annuity Model"
      description: "Give away the handle, sell the blades — structured approach to creating recurring revenue from consumable attachments."
      source: "7MSWC"
      domains: ["annuity-models", "wealth-building"]
    - id: "FW-GB-025"
      name: "4 Pillars Headline Creation"
      description: "Write headlines on each persuasion equation pillar (Problem, Promise, Proof, Proposition) then select the strongest."
      source: "7MSWC"
      domains: ["headlines", "copywriting"]

  L5_METHODOLOGIES:
    - id: "MET-GB-001"
      name: "Trojan Horse Welcome Package"
      description: "Design like a premium delivery so the prospect thinks they've already subscribed — they open and read before realizing it's an offer."
      source: "7MSWC"
      domains: ["direct-mail", "copywriting"]
    - id: "MET-GB-002"
      name: "Crack A Jack Method"
      description: "Include genuine value upfront, give half the secret freely, keep the other half behind the subscription wall."
      source: "7MSWC"
      domains: ["direct-mail", "copywriting"]
    - id: "MET-GB-003"
      name: "Local Market Franchise Method"
      description: "Create a proven campaign for one professional, get testimonial, then sell the same system to 1000+ markets nationally."
      source: "7MSWC"
      domains: ["wealth-building", "career-management"]
    - id: "MET-GB-004"
      name: "Build Belief Layer By Layer"
      description: "11-step process from demonstration through specialization — systematically stack proof elements until belief is unavoidable."
      source: "7MSWC"
      domains: ["proof-marketing", "copywriting"]
    - id: "MET-GB-005"
      name: "Magic Wand Technique"
      description: "Ask what would make the offer irresistible, then create that premium element as the hero of the campaign."
      source: "7MSWC"
      domains: ["product-creation", "copywriting"]
    - id: "MET-GB-006"
      name: "Product Naming Hopkins Rules"
      description: "Name must contain benefit, genetic category, or founder name — Hopkins' proven methodology for memorable product naming."
      source: "7MSWC"
      domains: ["product-creation"]
    - id: "MET-GB-007"
      name: "Copy Evaluation Crowd Source"
      description: "Spread copy to everyone available, have them read as consumers not critics, identify patterns in feedback."
      source: "7MSWC"
      domains: ["testing-methodology", "copywriting"]
    - id: "MET-GB-008"
      name: "Research To Copy 5 Step"
      description: "Five phases: pure research gathering, organize by theme, identify dominant theme, write from organized notes, polish and tighten."
      source: "7MSWC"
      domains: ["research-methodology", "copywriting"]
    - id: "MET-GB-009"
      name: "Gene Schwartz Research Mining"
      description: "Read, think, squeeze, underline, type, massage — Schwartz's systematic method for mining research material into copy gold."
      source: "7MSWC"
      domains: ["research-methodology", "copywriting"]
    - id: "MET-GB-010"
      name: "Deepak Chopra Regularity Method"
      description: "Prime the subconscious before bed, write first thing in the morning, maintain the same schedule daily for creative output."
      source: "7MSWC"
      domains: ["productivity"]
    - id: "MET-GB-011"
      name: "Manifestation Index Card"
      description: "Write on card: what I choose, visualizations, reasons, next action. Review daily to program the subconscious toward goals."
      source: "7MSWC"
      domains: ["career-management", "productivity"]
    - id: "MET-GB-012"
      name: "Body Copy Starting Techniques"
      description: "Four proven openers: 'Picture this...', 'Has this ever happened to you...', 'Now you can...', 'Just imagine...' — each bypasses resistance."
      source: "7MSWC"
      domains: ["copywriting"]
    - id: "MET-GB-013"
      name: "CRIT System"
      description: "Distribute copy with checklist, readers review independently, share good points first then improvements, writer makes final decisions."
      source: "7MSWC"
      domains: ["testing-methodology", "copywriting"]
    - id: "MET-GB-014"
      name: "Proof Element Procurement"
      description: "Identify ideal proof elements first, then actively create or find them — don't just use whatever proof is conveniently available."
      source: "7MSWC"
      domains: ["proof-marketing", "research-methodology"]
    - id: "MET-GB-015"
      name: "Chat Room Research Method"
      description: "Eavesdrop on target market conversations in forums and chat rooms — learn their vernacular, concerns, and desires firsthand."
      source: "7MSWC"
      domains: ["research-methodology"]
    - id: "MET-GB-016"
      name: "Ted Nicholas Media Buying"
      description: "Send ad with half-price check — it's humanly impossible for the ad rep to return money, guaranteeing your ad gets placed."
      source: "7MSWC"
      domains: ["direct-mail", "career-management"]

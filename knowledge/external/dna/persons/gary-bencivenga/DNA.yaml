  proprietary_terms:
    - term: "Persuasion Equation"
      meaning: "Problem + Promise + Proof + Proposition — the four pillars of every successful ad. Deluxe version adds Urgent, Unique, Unquestionable, User-friendly."
    - term: "Proof Element Marketing (PEM)"
      meaning: "Making proof the alpha and omega of advertising. Layer upon layer of compelling proof to build belief."
    - term: "12 Proof Elements"
      meaning: "Demonstration, Creative Guarantee, Reason Why, Specifics, Expose Format, Selling Against Type, Explaining Mechanism, Acknowledging Disbelief, Highly Believable Source, Testimonials with Singularity, Candor, Specialization."
    - term: "ABA Rule (Anything But Advertising)"
      meaning: "Ads that look like ads trigger rejection. Anything-but-advertising formats get higher response."
    - term: "Mag-a-log"
      meaning: "Magazine-catalog hybrid format for direct mail. Half real estate = genuine tips, half = selling. 2.6x longer shelf life than envelopes."
    - term: "Trojan Horse Package"
      meaning: "Outer packaging designed like premium delivery so prospect thinks they already subscribed."
    - term: "Cracker Jack Method"
      meaning: "Include genuine value inside mailing, give away half the secret, keep other half behind subscription wall."
    - term: "Hot Hand Strategy"
      meaning: "Shell product that serially harnesses others' proof elements. Never runs out of proof."
    - term: "Made Me Buy Folder"
      meaning: "Collection of ads that made YOU personally buy. Reverse-engineer their persuasion techniques."
    - term: "White Hot Center"
      meaning: "The core passionate group in any market. Always target them, never water down for periphery."
    - term: "Fisherman vs Fish"
      meaning: "Two modes of thinking. Fisherman thinking (what I want to sell) vs Fish thinking (what they want to buy). Most marketing failures = fisherman thinking."
    - term: "Starcrest Indicator"
      meaning: "When a non-category list responds strongly, it signals massive universe expansion potential."


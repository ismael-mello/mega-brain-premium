  synthesis:
    one_liner: "Master proof element marketing through the persuasion equation, editorial advertising formats, and systematic proof layering — because without belief nobody buys, and proof is gold."
    core_question: "Does this ad have an urgent problem, a unique promise, unquestionable proof, and a user-friendly proposition — and is the advertising itself valuable?"

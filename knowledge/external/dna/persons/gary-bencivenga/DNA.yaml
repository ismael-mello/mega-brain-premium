  L2_MENTAL_MODELS:

    # === SESSION 1-2: Thinking Models ===

    - id: "MM-GB-001"
      title: "The Fisherman vs The Fish"
      description: "Two modes of thinking in marketing. Fisherman thinking focuses on what you want to sell; fish thinking focuses on what they want to buy. Most marketing failures come from fisherman thinking."
      domains: [desire-psychology, persuasion]
      source: "7MSWC"
      session: "1"

    - id: "MM-GB-002"
      title: "Clutter As The Real Enemy"
      description: "3,000 ad messages bombard prospects daily. Prospects are playing dodgeball, not catch. Your real competition is not other advertisers — it is clutter itself."
      domains: [direct-response, copywriting]
      source: "7MSWC"
      session: "1"

    - id: "MM-GB-003"
      title: "Opening vs Closing The Sale"
      description: "Two distinct categories of salesmanship requiring different skills. Opening gets attention and interest; closing converts interest to action."
      domains: [sales-psychology, copywriting]
      source: "7MSWC"
      session: "1"

    - id: "MM-GB-004"
      title: "The Contrast Principle"
      description: "Admit faults first, then positive claims pop by contrast. Shackleton ad example — leading with difficulty makes opportunity shine brighter."
      domains: [candor-marketing, persuasion]
      source: "7MSWC"
      session: "2"

    - id: "MM-GB-005"
      title: "Pareto Principle Applied To Marketing"
      description: "80/20 rule applied to copywriting and marketing. A few key factors yield the vast majority of results. Focus on the vital few."
      domains: [direct-response, productivity]
      source: "7MSWC"
      session: "2"

    - id: "MM-GB-006"
      title: "The Undervalued Proof Element"
      description: "Look for proof elements sitting unused in every business. Captain John Raid's appearance, Andrew Weil on Time magazine cover. Proof is everywhere if you look."
      domains: [proof-marketing, copywriting]
      source: "7MSWC"
      session: "2"

    - id: "MM-GB-007"
      title: "The Moat (Buffett Model)"
      description: "Build exclusives, trademarks, and barriers against competitors. Create competitive advantages that are hard to replicate."
      domains: [wealth-building, product-creation]
      source: "7MSWC"
      session: "3"

    - id: "MM-GB-008"
      title: "The Zeigarnik Effect"
      description: "Powerful psychological urge to complete what we start. Applied to collections, series, and subscription models. Incompleteness creates compulsion."
      domains: [desire-psychology, persuasion]
      source: "7MSWC"
      session: "3"

    - id: "MM-GB-009"
      title: "Hype As Self-Sabotage"
      description: "Higher hype equals higher chance of being flagged as a sales message. Prospects have sensitive BS meters. Understated claims outperform exaggerated ones."
      domains: [copywriting, candor-marketing]
      source: "7MSWC"
      session: "3"

    # === SESSION 3-5: Product & Format Models ===

    - id: "MM-GB-010"
      title: "People Buy The Premium As Easily As The Main Product"
      description: "Reverse psychology — the premium often becomes the draw. When the bonus is compelling enough, it sells the main product."
      domains: [product-creation, sales-psychology]
      source: "7MSWC"
      session: "3"

    - id: "MM-GB-011"
      title: "House Odds Model"
      description: "Proven principles give you a slight but persistent edge, like casino house odds. Small advantages compounded over many campaigns create massive results."
      domains: [testing-methodology, direct-response]
      source: "7MSWC"
      session: "4"

    - id: "MM-GB-012"
      title: "Prowl The Jungle For The Weak And Wounded"
      description: "Time your market entry. Attack when the control is fatigued. Easier to beat a tired champion than a fresh one."
      domains: [direct-response, copywriting]
      source: "7MSWC"
      session: "4"

    - id: "MM-GB-013"
      title: "Hang Around The Gym"
      description: "No small roles, only small actors. Small assignments done brilliantly lead to bigger ones. Proximity to great opportunities creates access."
      domains: [career-management]
      source: "7MSWC"
      session: "4"

    - id: "MM-GB-014"
      title: "Made Me Buy Folder"

      domains: [copywriting, research-methodology]
      source: "7MSWC"
      session: "4"

    - id: "MM-GB-015"
      title: "Transfer Winning Ideas From Other Fields"
      description: "Cross-pollinate from unrelated industries. Breakthrough ideas often come from adapting solutions from one field to another."
      domains: [copywriting, product-creation]
      source: "7MSWC"
      session: "4"

    - id: "MM-GB-016"
      title: "Subconscious Mind As Overnight Worker"
      description: "Assign problems to your subconscious before bed, wake with answers. The subconscious mind works on problems during sleep."
      domains: [productivity, copywriting]
      source: "7MSWC"
      session: "4"

    # === SESSION 7: List Strategy Models ===

    - id: "MM-GB-017"
      title: "Transaction Behavior Model (Fishman)"
      description: "Michael Fishman's 15 checkpoints for understanding a mailing list: source, offer, price, mailing cycles, format, transaction dates, recency, frequency, universe, service bureau, interest, demographics, usage, response, cost."
      domains: [list-strategy, direct-mail]
      source: "7MSWC"
      session: "7"

    - id: "MM-GB-018"
      title: "Brand Sensitivity Spectrum"
      description: "Range of brand types from personality brands to institutional to commercial to consumer advocate to no brand. Each requires different approach."
      domains: [direct-response, copywriting]
      source: "7MSWC"
      session: "7"

    - id: "MM-GB-019"
      title: "Mail Sorting Behavior"
      description: "Mag-a-logs sorted with catalogs and magazines, not with junk mail. 2.6 times longer shelf life. Read over 4 days vs 2-second envelope sort."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "MM-GB-020"
      title: "Loyalty Paradox In Lists"
      description: "Multi-buyers on another company's list are loyal THERE, making them hardest to acquire. Mail into disloyalty — target single buyers ready to switch."
      domains: [list-strategy, direct-mail]
      source: "7MSWC"
      session: "7"

    - id: "MM-GB-021"
      title: "White Hot Center Targeting"
      description: "Always aim for the core passionate group in any market. Don't water down messaging for the periphery. The center drives the business."
      domains: [list-strategy, desire-psychology]
      source: "7MSWC"
      session: "7"

    # === SESSION 6-8: Copy & Persuasion Models ===

    - id: "MM-GB-022"
      title: "The Translation Technique"
      description: "Substitute your product into a field YOU are passionate about to test headline strength. If it doesn't grab you, it won't grab them."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    - id: "MM-GB-023"
      title: "Doubting Thomas / Adult vs Child Psychology"
      description: "Adult skeptic must be pacified with proof before the emotional child can engage with desire. Address doubt first, then emotion."
      domains: [persuasion, proof-marketing, sales-psychology]
      source: "7MSWC"
      session: "2"

    - id: "MM-GB-024"
      title: "Enemy Creation Model"
      description: "Switch from 'me vs you' to 'you and I vs the enemy.' Creating a common enemy aligns you with the prospect instead of opposing them."
      domains: [persuasion, copywriting]
      source: "7MSWC"
      session: "8"

    - id: "MM-GB-025"
      title: "Battlefield Switching"
      description: "If losing the battle on one front, switch the battlefield. Sell 'wise men's company' not 'books.' Reframe the value proposition entirely."
      domains: [persuasion, sales-psychology]
      source: "7MSWC"
      session: "8"

    - id: "MM-GB-026"
      title: "Mental Board Of Directors"
      description: "Ogilvy, Caples, Schwartz, Hopkins. When stuck, ask 'What would this master do?' Imaginary mentors provide perspective and breakthrough ideas."
      domains: [copywriting, career-management]
      source: "7MSWC"
      session: "9"

    # === SESSION 5, 10-11: Format & Desire Models ===

    - id: "MM-GB-027"
      title: "Value Hierarchy of Formats"
      description: "FedEx package outperforms magalog outperforms editorial outperforms standard ad. Higher perceived value of format equals higher response rate."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "MM-GB-028"
      title: "Reading Gravity"
      description: "Eye reads top-to-bottom, left-to-right naturally. Fighting this pattern creates friction. Design with reading gravity, not against it."
      domains: [design-principles, direct-mail]
      source: "7MSWC"
      session: "10"

    - id: "MM-GB-029"
      title: "Desire Evolution: Quantity To Quality"
      description: "Consumers evolve from basic to premium over time. First any product in the category, then the best. Markets naturally subdivide upward."
      domains: [desire-psychology, product-creation]
      source: "7MSWC"
      session: "10"

    - id: "MM-GB-030"
      title: "Market Subdivision (General to Specialized)"
      description: "Products inevitably subdivide from general to specialized. The first to see the next subdivision wins the new category."
      domains: [product-creation, desire-psychology]
      source: "7MSWC"
      session: "10"

    - id: "MM-GB-031"
      title: "The Bashful Genie (Subconscious Mind)"
      description: "Massive computer controlled by a child. The subconscious is sensitive to criticism, only understands present tense and images, not negatives."
      domains: [desire-psychology, productivity]
      source: "7MSWC"
      session: "11"

    - id: "MM-GB-032"
      title: "Airplane Analogy (Conscious vs Subconscious)"
      description: "Conscious mind equals pilot providing steering and direction. Subconscious mind equals jet engine providing propulsion and power."
      domains: [desire-psychology, productivity]
      source: "7MSWC"
      session: "11"

    - id: "MM-GB-033"
      title: "King Gillette Model (Annuitization)"
      description: "Give away the handle, sell blades forever. Create lifetime customers through initial giveaway that locks in recurring revenue."
      domains: [annuity-models, wealth-building]
      source: "7MSWC"
      session: "11"

    - id: "MM-GB-034"
      title: "Royalties As Defensive Strategy"
      description: "Royalties are not primarily for more money — they enable deeper research which produces stronger work which increases win rate. Defensive, not offensive."
      domains: [career-management, wealth-building]
      source: "7MSWC"
      session: "12"

  L3_HEURISTICS:

    # === SESSION 1-2: Learning & Research ===

    - id: "HEUR-GB-001"
      title: "1% Weekly Improvement Rule"
      description: "1% improvement per week equals 50% better in a year, 100% better in two. Consistent incremental improvement compounds dramatically."
      domains: [career-management, productivity]
      source: "7MSWC"
      session: "1"

    - id: "HEUR-GB-002"
      title: "Ad-A-Day Program"
      description: "Read one good ad daily. One-a-day marketing vitamin. The simplest and most powerful ongoing copywriting education."
      domains: [copywriting, research-methodology]
      source: "7MSWC"
      session: "1"

    - id: "HEUR-GB-003"
      title: "Editorial Ads Pull 500% More Readership"
      description: "Ogilvy study. Ads formatted as editorial content pull five times more readership than obvious advertisements."
      domains: [copywriting, design-principles, direct-response]
      source: "7MSWC"
      session: "4"

    - id: "HEUR-GB-004"
      title: "Article Format Equals 81% Higher Sales"
      description: "John Caples split-run test. Same copy in article format versus ad format produced 81% more sales."
      domains: [copywriting, design-principles]
      source: "7MSWC"
      session: "4"

    - id: "HEUR-GB-005"
      title: "50/50 Information-to-Selling Ratio (DM)"
      description: "In direct mail, half the real estate should be genuine free tips and information, half should be selling. The centerfold must be giveaway content."
      domains: [direct-mail, copywriting]
      source: "7MSWC"
      session: "4"

    - id: "HEUR-GB-006"
      title: "90/10 or 80/20 Ratio For Online"
      description: "E-zines and email need much more content relative to selling compared to direct mail. 80-90% content, 10-20% selling."
      domains: [copywriting, direct-response]
      source: "7MSWC"
      session: "4"

    - id: "HEUR-GB-007"
      title: "Black Book Package Equals 233 Index"
      description: "Black book format package achieved 233 index — 133% lift over control. Format innovation can dramatically boost response."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    # === SESSION 2-3: Persistence & Proof ===

    - id: "HEUR-GB-008"
      title: "The 9-Call Persistence Rule"
      description: "Average of 9 calls required to connect with a prospect. Persistence makes resistance go away. Most salespeople quit after 2-3 attempts."
      domains: [sales-psychology, direct-response]
      source: "7MSWC"
      session: "2"

    - id: "HEUR-GB-009"
      title: "May Outperforms Will In Headlines"
      description: "Softer language is more believable. 'May help' outperforms 'will help' in headline tests because it sounds honest."
      domains: [headlines, copywriting, candor-marketing]
      source: "7MSWC"
      session: "3"

    - id: "HEUR-GB-010"
      title: "Almost Adds Believability"
      description: "'Fix almost any part' beat 'Fix any part' in testing. Qualifier words increase believability by reducing obvious exaggeration."
      domains: [headlines, copywriting, candor-marketing]
      source: "7MSWC"
      session: "3"

    - id: "HEUR-GB-011"
      title: "Up To 90% Of New Products Fail"
      description: "Most new products fail because of fisherman thinking — creating what you want to sell instead of what people want to buy."
      domains: [product-creation, desire-psychology]
      source: "7MSWC"
      session: "1"

    - id: "HEUR-GB-012"
      title: "FedEx Gets 100% Open Rate"
      description: "Think backwards from what the prospect will always open. FedEx package format guarantees opening. Design for guaranteed attention."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-013"
      title: "Read Claude Hopkins 7 Times"
      description: "Ogilvy rule: anyone in advertising should read Scientific Advertising seven times. Foundational text of direct response."
      domains: [copywriting, research-methodology]
      source: "7MSWC"
      session: "1"

    # === SESSION 6: Headlines ===

    - id: "HEUR-GB-014"
      title: "25-Word Headlines Can Win"
      description: "Cruise line ad with 25-word headline outpulled all shorter alternatives. Length is not the problem — relevance and interest are."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    - id: "HEUR-GB-015"
      title: "Less Bullets On Cover Equals Higher Response"
      description: "More magazine-like cover with fewer selling bullets produces higher response. Clean design beats cluttered sales pitches."
      domains: [design-principles, direct-mail]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-016"
      title: "Slice Captured 7% Of $30B With One Proof Element"
      description: "Slice soda captured 7% of the $30 billion soft drink market with one proof element: 'Contains 10% fruit juice.' One proof element can build an empire."
      domains: [proof-marketing, product-creation]
      source: "7MSWC"
      session: "2"

    - id: "HEUR-GB-017"
      title: "The Case Against Is A Mega-Formula"
      description: "'The Case Against [X]' headline format beat competitive headlines by hundreds of percent. Champion arguing against own position creates irresistible curiosity."
      domains: [headlines, copywriting, candor-marketing]
      source: "7MSWC"
      session: "3"

    - id: "HEUR-GB-018"
      title: "Double Your Odds — Submit Two Packages"
      description: "Submit one safe package and one wild card. Doubles your chances of beating the control while managing risk."
      domains: [testing-methodology, direct-response]
      source: "7MSWC"
      session: "4"

    - id: "HEUR-GB-019"
      title: "Research 7X Rule"
      description: "John Caples rule: gather seven times more information than you can use. Thorough research is the foundation of great copy."
      domains: [research-methodology, copywriting]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-020"
      title: "Three-Hour Day Rule"
      description: "Log 3 hours daily on your highest-value 20% activities. Protect those hours ruthlessly from interruption."
      domains: [productivity, career-management]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-021"
      title: "Time Allocation 40/40/20"
      description: "40% of time on research, 40% on writing, 20% on polishing. Most copywriters under-invest in research."
      domains: [copywriting, research-methodology, productivity]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-022"
      title: "Three-Month Cycle"
      description: "A heavy-duty mag-a-log takes a 3-month production cycle. Plan timelines accordingly for quality output."
      domains: [direct-mail, productivity]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-023"
      title: "Six By Nine Packages Lose"
      description: "Odds are heavily against the 6x9 format in direct mail. Avoid this format unless you have specific data supporting it."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-024"
      title: "Squeamishness Equals Good Sign"
      description: "Internal discomfort about bold creative often predicts winning performance. If it makes you nervous, it might be great."
      domains: [copywriting, testing-methodology]
      source: "7MSWC"
      session: "4"

    - id: "HEUR-GB-025"
      title: "Breakthrough In Headlines"
      description: "Joe Sugarman observed he almost never had a loser when the word 'breakthrough' appeared in the headline."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    # === SESSION 7: List Strategy ===

    - id: "HEUR-GB-026"
      title: "Starcrest Indicator (Magic Moment)"
      description: "When a non-category list pops with strong response, it signals massive universe expansion potential. This is the magic moment in list testing."
      domains: [list-strategy, direct-mail]
      source: "7MSWC"
      session: "7"

    - id: "HEUR-GB-027"
      title: "Universal Topics Transcend Category"
      description: "Health and finance topics can trigger response from anyone regardless of their normal buying category."
      domains: [list-strategy, desire-psychology]
      source: "7MSWC"
      session: "7"

    - id: "HEUR-GB-028"
      title: "Yardstick Lists For Launches"
      description: "Use 8-10 benchmark lists for every launch. If the launch fails with yardstick lists, it is a product problem, not a list problem."
      domains: [list-strategy, testing-methodology]
      source: "7MSWC"
      session: "7"

    - id: "HEUR-GB-029"
      title: "Case Against Headline Power"
      description: "Champion arguing AGAINST own position creates massive pull. Counterintuitive candor triggers curiosity and trust simultaneously."
      domains: [headlines, candor-marketing]
      source: "7MSWC"
      session: "3"

    - id: "HEUR-GB-030"
      title: "Newsletter Look-Alike Wins For Newsletter Sales"
      description: "Format should match the product being sold. Newsletter-format mailing for newsletter subscription consistently outperforms other formats."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-031"
      title: "Your Current Issue Enclosed Envelope"
      description: "Information buyers cannot throw out what appears to be something they already paid for. Creates obligation to open."
      domains: [direct-mail, persuasion]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-032"
      title: "Never Roll Out Untested"
      description: "The freshest creative is not always the best. Always test before committing to large quantities."
      domains: [testing-methodology, direct-mail]
      source: "7MSWC"
      session: "7"

    # === SESSION 5, 10: Design & Format ===

    - id: "HEUR-GB-033"
      title: "Visual Trend In Direct Mail"
      description: "Photography and visual emphasis increasingly winning in direct mail tests. The industry is trending toward more visual communication."
      domains: [design-principles, direct-mail]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-034"
      title: "Number 10 Envelope Comeback"
      description: "Old-fashioned number 10 envelope now stands out against the flood of mag-a-logs. Format contrarianism can produce wins."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-035"
      title: "Write 20-25 Headlines Minimum"
      description: "Headline number 17 or 22 is often better than number 1 or 2. Quantity of options produces quality of winner."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    - id: "HEUR-GB-036"
      title: "Benefit Headlines Win 75% Of The Time"
      description: "Benefit headlines outperform curiosity headlines 75% of the time. Combined benefit-plus-curiosity headlines are strongest."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    - id: "HEUR-GB-037"
      title: "Body Copy Must Pay Off Headline Immediately"
      description: "Don't derail the locomotive. The opening of body copy must immediately continue the momentum established by the headline."
      domains: [copywriting, headlines]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-038"
      title: "Don't Address Readers As A Group"
      description: "Words like 'America' or 'friends' fail. Always address the reader as an individual, never as a member of a group."
      domains: [copywriting, persuasion]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-039"
      title: "Personalize To Publication Readers"
      description: "'Special offer to readers of NYT' always boosts response. Personalizing to the reader's publication creates exclusivity."
      domains: [copywriting, direct-response]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-040"
      title: "30-Day Hold Equals Triple Sales, Double Refunds"
      description: "Gary Halbert insight: holding shipment 30 days triples net sales despite doubling refund rate. Net profit dramatically higher."
      domains: [direct-response, sales-psychology]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-041"
      title: "Critiquing Process Equals 50-100% Response Lift"
      description: "Systematic review and critique of copy typically boosts response 50-100%. Never skip the evaluation phase."
      domains: [copywriting, testing-methodology]
      source: "7MSWC"
      session: "9"

    - id: "HEUR-GB-042"
      title: "Headlines On Four Pillars"
      description: "Create headlines for each persuasion equation pillar — Problem, Promise, Proof, Proposition — then test the best from each category."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    # === SESSION 10: Design Rules ===

    - id: "HEUR-GB-043"
      title: "Serif Type Equals 86% Higher Pull"
      description: "Serif typeface pulled 86% higher than sans-serif in split test. Same copy, everything else identical. Typography matters enormously."
      domains: [design-principles, direct-mail]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-044"
      title: "Column Width 40-60 Characters"
      description: "Don't go wider than 40-60 characters per column. Wider columns reduce readability and depress response."
      domains: [design-principles, copywriting]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-045"
      title: "Paragraphs Max 5-7 Lines"
      description: "Keep paragraphs to a maximum of 5-7 lines for readability. Wall-of-text kills readership."
      domains: [copywriting, design-principles]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-046"
      title: "Never Put Period After Headline"
      description: "A period after the headline creates a 'stop' signal that depresses response. Use no punctuation or a colon instead."
      domains: [headlines, design-principles]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-047"
      title: "Never End Page 1 With Period"
      description: "Cliffhanger at end of page 1 forces page turn. A period gives permission to stop reading."
      domains: [copywriting, design-principles]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-048"
      title: "PS Is Second Most-Read Part"
      description: "After the headline, the PS is the second most-read element. Confirmed by two-way mirror eye-tracking studies."
      domains: [copywriting, direct-mail]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-049"
      title: "Photos Outpull Illustrations"
      description: "Photographs outpull illustrations in direct response. Photos carry more credibility and authenticity."
      domains: [design-principles, proof-marketing]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-050"
      title: "Reverse Type Depresses Response"
      description: "White text on black background lowers readership and response. Exception: editorial mimicry where reverse type matches publication style."
      domains: [design-principles, direct-mail]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-051"
      title: "Long Copy Outpulls Short Copy"
      description: "Long copy consistently outpulls short copy in direct response, but it must be readable with subheads and short paragraphs."
      domains: [copywriting, direct-response]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-052"
      title: "Brochure Can Depress Response"
      description: "Colorful brochure can attract the eye to the wrong message first, undermining the selling sequence. Not always beneficial."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-053"
      title: "Less Selling On Cover Equals Higher Response"
      description: "Cleaner magazine-look cover beats bullet-heavy sales cover. More editorial appearance creates more trust."
      domains: [design-principles, direct-mail]
      source: "7MSWC"
      session: "5"

    # === SESSION 11-12: Wealth & Career ===

    - id: "HEUR-GB-054"
      title: "10% Savings Rule"
      description: "Save at least 10% of gross income. 20% is fantastic. Richest Man in Babylon principle applied to career management."
      domains: [wealth-building, career-management]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-055"
      title: "50% Client Concentration Limit"
      description: "No single client should represent more than 50% of income. Diversification protects against catastrophic loss."
      domains: [career-management, wealth-building]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-056"
      title: "Price Consistency Across Clients"
      description: "Clients talk to each other. Never give secret deals. Maintain consistent pricing to preserve trust and reputation."
      domains: [career-management, wealth-building]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-057"
      title: "George Meany Negotiation Rule"
      description: "Never sit down at the negotiating table unless willing to walk away. Willingness to walk is the source of negotiating power."
      domains: [career-management, sales-psychology]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-058"
      title: "The Ouch Antidote"
      description: "Hold firm when clients wince at your price. Their ouch is a negotiation tactic, not a real objection. Stay steady."
      domains: [career-management, sales-psychology]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-059"
      title: "Online Royalties Benchmark 10%"
      description: "Christian Godefroy model: 10% royalties on online sales. Benchmark for negotiating digital copy compensation."
      domains: [career-management, wealth-building]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-060"
      title: "Online Content Ratio 80/20 or 90/10"
      description: "Online channels require much higher content-to-selling ratio than offline. 80-90% content vs 50/50 in direct mail. Gary Halbert insight."
      domains: [copywriting, direct-response]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-061"
      title: "Internet Chat Rooms Equal Free Focus Groups"
      description: "Eavesdrop on prospect language in online communities. Free research into real problems, real language, real desires."
      domains: [research-methodology, desire-psychology]
      source: "7MSWC"
      session: "12"

    - id: "HEUR-GB-062"
      title: "Mag-a-logs Have 2.6x Longer Shelf Life"
      description: "Mag-a-logs are read 2.6 times over 4 days versus 2-second envelope sort decision. Format dramatically extends engagement."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "5"

    - id: "HEUR-GB-063"
      title: "I Need Your Help Equals 9 Magic Words"
      description: "'I have a problem and I need your help.' These 9 words change the dynamic from selling to requesting assistance."
      quote: "I have a problem and I need your help."
      domains: [persuasion, copywriting]
      source: "7MSWC"
      session: "3"

    - id: "HEUR-GB-064"
      title: "Every Photo Must Have Caption"
      description: "Captions are precious selling real estate. Photos without captions waste one of the most-read elements on the page."
      domains: [design-principles, copywriting]
      source: "7MSWC"
      session: "10"

    - id: "HEUR-GB-065"
      title: "Order Form Equals Miniature Ad"
      description: "Include benefits on the order form because many prospects read the order form first. It should sell independently."
      domains: [direct-mail, copywriting]
      source: "7MSWC"
      session: "10"

  L4_FRAMEWORKS:

    # === SESSION 1-2: Core Frameworks ===

    - id: "FW-GB-001"
      title: "The Bencivenga Persuasion Equation"
      description: "Problem plus Promise plus Proof plus Proposition. Deluxe version: Urgent problem, Unique promise, Unquestionable proof, User-friendly proposition. Foundation of all persuasive advertising."
      domains: [persuasion, copywriting, direct-response]
      source: "7MSWC"
      session: "1"

    - id: "FW-GB-002"
      title: "Proof Element Marketing (PEM)"
      description: "Make proof the alpha and omega of advertising. Layer upon layer of compelling proof to build belief systematically."
      domains: [proof-marketing, copywriting, persuasion]
      source: "7MSWC"
      session: "2"

    - id: "FW-GB-003"
      title: "The 12 Proof Elements"
      description: "Complete proof toolkit: Demonstration, Creative Guarantee, Reason Why, Specifics, Expose Format, Selling Against Type, Explaining Mechanism, Acknowledging Disbelief, Highly Believable Source, Testimonials with Singularity, Candor, Specialization."
      domains: [proof-marketing, copywriting, persuasion]
      source: "7MSWC"
      session: "2, 3"

    # === SESSION 4: Advertising Value ===

    - id: "FW-GB-004"
      title: "Make Your Advertising Itself Valuable"
      description: "Five-word master secret of high-response advertising. Formats include editorial ads, magalogs, book-logs, Cracker Jack, Trojan Horse, and issue-logs."
      domains: [direct-response, copywriting, design-principles]
      source: "7MSWC"
      session: "4"

    - id: "FW-GB-005"
      title: "The Joseph Siegel Method"
      description: "Shop for proof elements, not products. Find passionate fan base plus exclusive endorsement plus recurring revenue model. Proof-driven product selection."
      domains: [product-creation, proof-marketing]
      source: "7MSWC"
      session: "3"

    - id: "FW-GB-006"
      title: "The Hot Hand Strategy"
      description: "Shell product that serially harnesses others' proof elements. Each issue features new expert endorsement. Never runs out of proof."
      domains: [proof-marketing, product-creation, annuity-models]
      source: "7MSWC"
      session: "3"

    # === SESSION 6: Headline Frameworks ===

    - id: "FW-GB-007"
      title: "The Umbrella Headline"
      description: "When you cannot sum up the proposition in one line, use umbrella claim plus laundry list of supporting benefits underneath."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    - id: "FW-GB-008"
      title: "Product Evaluation via Persuasion Equation"
      description: "Test any product against the four steps before committing to write. If the product fails the equation, fix the product first."
      domains: [product-creation, copywriting]
      source: "7MSWC"
      session: "3"

    - id: "FW-GB-009"
      title: "Persuasion Equation Scoring System"
      description: "120-point grading scale for any ad. Problem(15) plus Urgent(10) plus Promise(15) plus Unique(10) plus Proof(15) plus Unquestionable(10) plus Proposition(15) plus User-friendly(10) plus Value bonus(20) equals 120 maximum."
      domains: [copywriting, testing-methodology]
      source: "7MSWC"
      session: "9"

    - id: "FW-GB-010"
      title: "Fred Herman Evocation Selling"
      description: "Take possession, then ask 'Why might you want this?' then 'And in addition to that?' Let prospect reveal real reason, reflect value, close. Prospect sells themselves."
      domains: [sales-psychology, persuasion]
      source: "7MSWC"
      session: "8"

    - id: "FW-GB-011"
      title: "50-50 Value Rule (Mag-a-logs)"
      description: "Half real estate equals genuine free tips, half equals sell. The centerfold must always be giveaway content. Format-specific value equation."
      domains: [direct-mail, copywriting]
      source: "7MSWC"
      session: "4"

    # === SESSION 7: List Analysis ===

    - id: "FW-GB-012"
      title: "Fishman 15-Checkpoint List Analysis"
      description: "Michael Fishman's comprehensive list evaluation: Source, Offer, Price, Mailing Cycles, Format, Transaction dates, Recency, Frequency, Universe, Service Bureau, Interest, Demographics, Usage, Response, Cost."
      domains: [list-strategy, direct-mail]
      source: "7MSWC"
      session: "7"

    # === SESSION 6: Headline Techniques ===

    - id: "FW-GB-013"
      title: "If-Then Headline Technique"
      description: "'If you [easy condition], I guarantee to [bold benefit].' Achieved 200% response boost and 1.4 million pieces mailed in 24 hours."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    - id: "FW-GB-014"
      title: "Hard To Believe Disbelief Neutralizer"
      description: "'I'm not asking you to believe anything yet. All I ask is that you refrain from disbelieving while I show you my proof.' Pre-empts skepticism."
      quote: "I'm not asking you to believe anything yet... All I ask is that you refrain from disbelieving while I show you my proof."
      domains: [persuasion, proof-marketing, copywriting]
      source: "7MSWC"
      session: "2"

    - id: "FW-GB-015"
      title: "Head-On Objection Attack"
      description: "Defeat the killer objection in the headline itself. Example: 'Buy shoes by mail? You have to be kidding.' Confront skepticism directly."
      domains: [headlines, sales-psychology, copywriting]
      source: "7MSWC"
      session: "6"

    # === SESSION 8: Product & Persuasion ===

    - id: "FW-GB-016"
      title: "Sell Information To Differentiate Commodities"
      description: "Shell plus booklets, guard service plus safety guide, executive search plus salary guide. Add information to any commodity to create differentiation."
      domains: [product-creation, direct-response]
      source: "7MSWC"
      session: "8"

    - id: "FW-GB-017"
      title: "Bucket Brigade Words"
      description: "Transition words to prevent skim-and-drop: 'Moreover,' 'not only that,' 'what's more,' 'we're just getting started.' Keep the reader moving forward."
      domains: [copywriting]
      source: "7MSWC"
      session: "9"

    - id: "FW-GB-018"
      title: "Consistency Principle (Cialdini Applied)"
      description: "'You wouldn't buy a car without a test drive, so why not try a free trial?' Leverage prior commitments to drive next action."
      domains: [persuasion, sales-psychology]
      source: "7MSWC"
      session: "8"

    - id: "FW-GB-019"
      title: "I Need Your Help Favor Framework"
      description: "Changes dynamic from 'take free issues' to 'give your opinion, receive reward.' Requesting help triggers reciprocity and engagement."
      domains: [persuasion, copywriting]
      source: "7MSWC"
      session: "3"

    - id: "FW-GB-020"
      title: "Multiple Benefit Headline (Desperation)"
      description: "When you cannot find ONE killer benefit, list 3-7 best advantages. Quantity of benefits substitutes for single powerful hook."
      domains: [headlines, copywriting]
      source: "7MSWC"
      session: "6"

    # === SESSION 10: Assembly & Design ===

    - id: "FW-GB-021"
      title: "Direct Mail Assembly Rules"
      description: "Letter face-forward, response device fits envelope, contact info on every piece, caption every photo, at least one PS, order form equals mini-ad."
      domains: [direct-mail, design-principles]
      source: "7MSWC"
      session: "10"

    - id: "FW-GB-022"
      title: "10 R's of Desire"
      description: "Emotional checklist for copywriting: Recognition, Rejuvenation, Relaxation, Relief, Religion, Remuneration, Revenge, Results, Role Performance, Romance."
      domains: [desire-psychology, copywriting]
      source: "7MSWC"
      session: "8"

    # === SESSION 11-12: Success & Wealth ===

    - id: "FW-GB-023"
      title: "4-Part Success Process"
      description: "Clear destination, then plan, then action, then daily review and correction. Systematic approach to achieving any goal."
      domains: [wealth-building, productivity]
      source: "7MSWC"
      session: "11"

    - id: "FW-GB-024"
      title: "King Gillette Annuity Model"
      description: "Give away the handle, sell blades forever. Create lifetime customers through initial giveaway that locks in recurring revenue."
      domains: [annuity-models, wealth-building, product-creation]
      source: "7MSWC"
      session: "11"

    - id: "FW-GB-025"
      title: "4 Pillars For Headline Creation"
      description: "Write headlines on each persuasion equation pillar: Problem, Promise, Proof, Proposition. Test best from each category to find winner."
      domains: [headlines, copywriting, testing-methodology]
      source: "7MSWC"
      session: "6"

  L5_METHODOLOGIES:

    # === SESSION 4-5: Format Methods ===

    - id: "MET-GB-001"
      title: "The Trojan Horse Welcome Package"
      description: "Design outer packaging like premium delivery. Label as 'Your free welcome bonus.' Glossy interior makes prospect think they already subscribed."
      domains: [direct-mail, design-principles, persuasion]
      source: "7MSWC"
      session: "4"

    - id: "MET-GB-002"
      title: "The Cracker Jack Method"
      description: "Include genuine value inside the mailing. Give away half the secret freely. Keep the other half behind the subscription wall."
      domains: [direct-mail, copywriting, product-creation]
      source: "7MSWC"
      session: "4"

    - id: "MET-GB-003"
      title: "The Local Market Franchise Method"
      description: "Create proven campaign for one local professional. They become the testimonial. Package and sell to 1000-plus communities. Scalable proof-driven expansion."
      domains: [direct-response, proof-marketing, annuity-models]
      source: "7MSWC"
      session: "3"

    # === SESSION 2-3: Proof Building ===

    - id: "MET-GB-004"
      title: "How To Build Belief (Layer-By-Layer)"
      description: "11-step proof layering process: demonstration, creative guarantee, reason why, specifics, expose, sell against type, acknowledge disbelief, believable sources, singular testimonials, candor, specialization."
      domains: [proof-marketing, copywriting, persuasion]
      source: "7MSWC"
      session: "2, 3"

    - id: "MET-GB-005"
      title: "The Magic Wand Technique"
      description: "Start with product. Ask 'What would make this irresistible?' Create premium embodying the ideal. Make the premium the hero of the offer."
      domains: [product-creation, copywriting]
      source: "7MSWC"
      session: "3"

    - id: "MET-GB-006"
      title: "Product Naming (Hopkins Rules)"
      description: "Name should contain benefit, or use generic category, or founder name if famous. Test: does the name plant a positive idea in the prospect's mind?"
      domains: [product-creation, copywriting]
      source: "7MSWC"
      session: "8"

    # === SESSION 9: Writing Process ===

    - id: "MET-GB-007"
      title: "The Copy Evaluation Crowd-Source"
      description: "Spread copy to everyone. Ask them as consumers, not copywriters. Look for consistent patterns in feedback. Copywriter decides which feedback to act on."
      domains: [copywriting, testing-methodology]
      source: "7MSWC"
      session: "9"

    - id: "MET-GB-008"
      title: "Research-to-Copy 5-Step Process"
      description: "Pure research, then organize notes, then identify main theme plus priorities, then write, then polish. Sequential disciplined process."
      domains: [copywriting, research-methodology]
      source: "7MSWC"
      session: "9"

    - id: "MET-GB-009"
      title: "Gene Schwartz Research Mining"
      description: "Read sentence, think about it, squeeze every drop of juice, underline, type up, massage into copy. Slow deliberate extraction of maximum value."
      domains: [research-methodology, copywriting]
      source: "7MSWC"
      session: "9"

    - id: "MET-GB-010"
      title: "Deepak Chopra Regularity Method"
      description: "Assign problem to subconscious before bed. Write immediately on waking. Same time daily. Protect sleep quality. Harness subconscious processing."
      domains: [productivity, copywriting]
      source: "7MSWC"
      session: "9"

    # === SESSION 11: Visualization ===

    - id: "MET-GB-011"
      title: "Manifestation Index Card Method"
      description: "Front: 'What I choose to manifest' plus vivid visualizations. Back: Reasons why plus next action. Review daily. No deadline, no penalty for delay."
      domains: [wealth-building, productivity]
      source: "7MSWC"
      session: "11"

    - id: "MET-GB-012"
      title: "Body Copy Starting Techniques"
      description: "Four proven openers for body copy: 'Picture this...' or 'Has this ever happened?' or 'Now you can...' or 'Just imagine...' Pick the one that fits."
      domains: [copywriting]
      source: "7MSWC"
      session: "9"

    - id: "MET-GB-013"
      title: "CRIT System"
      description: "Distribute persuasion equation checklist to reviewers. Everyone reads independently. Start with positives, then improvements. Writer decides which feedback to implement. No mandates."
      domains: [copywriting, testing-methodology]
      source: "7MSWC"
      session: "9"

    - id: "MET-GB-014"
      title: "Proof Element Procurement Method"
      description: "Identify what proof would sell best. Then actively CREATE or FIND that proof. Don't limit yourself to what is readily available."
      domains: [proof-marketing, product-creation]
      source: "7MSWC"
      session: "2"

    - id: "MET-GB-015"
      title: "Chat Room Research Method"
      description: "Go to internet communities where target market congregates. Listen only. Learn their vernacular, concerns, and real problems. Never participate, only observe."
      domains: [research-methodology, desire-psychology]
      source: "7MSWC"
      session: "12"

    - id: "MET-GB-016"
      title: "Ted Nicholas Media Buying"
      description: "Send ad plus check for half rate card. Note: 'I can only afford half. Cash check if you can run it, send back if not.' Almost impossible for salesman to return check."
      domains: [direct-response, career-management]
      source: "7MSWC"
      session: "12"

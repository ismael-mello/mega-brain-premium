# ═══════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (Step-by-Step Processes)
# ═══════════════════════════════════════════════════════════════════
metodologias:
  - id: MET-BT-001
    titulo: "24 Effective Closing Techniques"
    descricao: "Complete closing system: 1) Appointment Close, 2) Approach Close, 3) Demonstration Close, 4) Hot Button Close, 5) Trial Close, 6) Power of Suggestion, 7) Invitational Close, 8) Just Suppose Close, 9) Sudden Death Close, 10) Sharp Angle Close, 11) Instant Reverse Close, 12) Change Places Close, 13) Secondary Close, 14) Alternative Close, 15) Preference Close, 16) Assumption Close, 17) Takeaway Close, 18) Puppy Dog Close, 19) Ben Franklin Close, 20) Summary Close, 21) Order Sheet Close, 22) Relevant Story Close, 23) Doorknob Close, 24) Referral Close."
    passos: 24
    fonte: "21CST-Bonus"
    dominio: [vendas]
    confianca: 0.95

  - id: MET-BT-002
    titulo: "Doctor of Selling Process"
    descricao: "Step 1: Examination (ask questions, take notes, listen — like doctor taking vitals). Step 2: Diagnosis (discuss findings, get agreement — 'Based on what you've told me...'). Step 3: Prescription (present solution with price — only after diagnosis agreement)."
    passos: 3
    fonte: "21CST-Module11"
    dominio: [vendas]
    confianca: 0.95

  - id: MET-BT-003
    titulo: "Problem-Focused Question Sequence"
    descricao: "8-question sequence: 1) What are you doing in this area now? 2) How is that working? 3) How do you feel about current product? 4) What are long-term goals (3-5 years)? 5) What are you trying to achieve/avoid/preserve? 6) What problems/frustrations? 7) If I could show you a way to improve, would you be interested? 8) Would you be open to looking at something better?"
    passos: 8
    fonte: "21CST-Module11"
    dominio: [vendas]
    confianca: 0.95

  - id: MET-BT-004
    titulo: "Compound Improvement Method"
    descricao: "Step 1: Grade yourself 1-10 in each of 7 KRAs. Step 2: Identify weakest area (bottleneck). Step 3: Improve 10% in each area over 12 months. Step 4: 1.1^7 = 1.94 (nearly double). Step 5: Repeat annually."
    passos: 5
    fonte: "21CST-Module2"
    dominio: [vendas, performance]
    confianca: 0.95

  - id: MET-BT-005
    titulo: "Self-Esteem Reprogramming"
    descricao: "Step 1: Repeat 'I like myself' 10-50 times daily (reprograms subconscious). Step 2: Act your way into feeling (behavior changes emotions). Step 3: Write clear goals daily. Step 4: Take complete responsibility ('I am responsible'). Step 5: Invest 3% of income in learning."
    passos: 5
    fonte: "21CST-Module4"
    dominio: [mindset]
    confianca: 0.95

  - id: MET-BT-006
    titulo: "Style Flexibility Selling"
    descricao: "Step 1: Observe (does person speak rapidly or slowly?). Step 2: Identify type (Relator/Socializer/Analyzer/Director). Step 3: Adapt pace and tone to match. Step 4: Adjust benefits focus (relationships/recognition/accuracy/results). Step 5: Close in their preferred style."
    passos: 5
    fonte: "21CST-Module13"
    dominio: [vendas]
    confianca: 0.95

  - id: MET-BT-007
    titulo: "Referral Generation System"
    descricao: "Step 1: After every visit (buying or not), ask for 2-3 referrals. Step 2: Get phone numbers ('Do you have their numbers?'). Step 3: Use alternative close ('Which should I call first?'). Step 4: Ask prospect to call referrals now. Step 5: Every January, call all past customers for 2-3 weeks, get referrals. Step 6: After 90 days, work almost 100% off referrals."
    passos: 6
    fonte: "21CST-Bonus"
    dominio: [vendas]
    confianca: 0.95

  - id: MET-BT-008
    titulo: "Zero-Based Thinking Process"
    descricao: "For each business activity, customer, market, product, or method: Ask 'Knowing what I now know, would I start this again today?' For each 'No' answer: eliminate or restructure that element."
    passos: 2
    fonte: "TBM-Workbook"
    dominio: [business]
    confianca: 0.90

  - id: MET-BT-009
    titulo: "10 Goal Method"
    descricao: "Step 1: Write down 10 goals for next 12 months in present tense. Step 2: Think about goals throughout the day. Step 3: Take daily action toward each goal. Step 4: Work on goals 7 days/week. Step 5: Never stop until achieved."
    passos: 5
    fonte: "TBM-Day1"
    dominio: [mindset, performance]
    confianca: 0.90

  - id: MET-BT-010
    titulo: "Supermarket Sample Trigger Sequence"
    descricao: "Demonstrates how one interaction triggers all 7 buying influences simultaneously: 1) Sample offered → Reciprocity, 2) Others buying → Social proof, 3) Pleasant person → Liking, 4) Store prestige → Authority, 5) Special price → Scarcity, 6) vs other products → Contrast."
    passos: 6
    fonte: "21CST-Module14"
    dominio: [vendas]
    confianca: 0.95


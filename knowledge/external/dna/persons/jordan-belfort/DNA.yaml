        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_1_Introduction"

      - id: "FIL-JB-122"
        content: "Every human being is thirsty for a vision and very few have one. So they gravitate towards someone who does and jump on their bandwagon."
        domains: [vision, leadership, influence]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_1_Introduction"

      - id: "FIL-JB-123"
        content: "Vision without skills is delusion. Three elements required: create the vision, sell the vision, make it real with strategies."

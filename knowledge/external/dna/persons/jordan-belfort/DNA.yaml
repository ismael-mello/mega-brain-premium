    items:
      - id: "FIL-JB-001"
        content: "Every sale is the same — there are five core elements that must line up for any sale to close, regardless of industry, product, or medium"
        domains: [straight-line-system, sales-psychology]
        source: "Main Course/00-Introduction + SLSC Week 1"

      - id: "FIL-JB-002"
        content: "Selling is everything in life. Either you're selling or you're failing — sales pervades all human interaction: parenting, teaching, leading, persuading"
        domains: [sales-psychology, mindset]
        source: "Main Course/00-Introduction/Part_2"

      - id: "FIL-JB-003"
        content: "Sales is about empowering people to overcome barriers that stop them from taking actions they should be taking — ethical selling means helping, not manipulating"
        domains: [sales-ethics, straight-line-system]
        source: "Main Course/00-Introduction/Part_2"

      - id: "FIL-JB-004"
        content: "With great power comes great responsibility — the Straight Line System is powerful enough to get people to buy things they shouldn't; the obligation is to use it ethically"
        domains: [sales-ethics]
        source: "Main Course/00-Introduction/Part_2"

      - id: "FIL-JB-005"
        content: "We love to buy, we hate to be sold to — fundamental human psychology"
        domains: [sales-psychology, buying-psychology]
        source: "Main Course/01-Cracking the Code"

      - id: "FIL-JB-006"
        content: "People don't buy things they think will make their life worse — we only buy what we believe will enhance our lives (Law of Positive Intent)"
        domains: [buying-psychology, positive-intent]
        source: "Main Course/01-Cracking the Code + Weekly Training E24"

      - id: "FIL-JB-007"
        content: "There are no free words — every word in a sales conversation must serve the purpose of moving the prospect toward the close"
        domains: [scripting, straight-line-system]
        source: "Main Course/01-Cracking the Code/Lesson_1"

      - id: "FIL-JB-008"
        content: "Certainty doesn't come from the system — the system allows you to TRANSFER the certainty that's inside of you to your prospect"
        domains: [state-management, certainty-transfer]
        source: "Main Course/03-State Management"

      - id: "FIL-JB-009"
        content: "The first person you must sell and persuade is yourself — self-persuasion precedes external persuasion"
        domains: [mindset, state-management]
        source: "Main Course/00-Introduction/Part_2"

      - id: "FIL-JB-010"
        content: "Strategic preparation is the difference between greatness and mediocrity — never wing it, plan your patterns, write them out, memorize them"
        domains: [scripting, preparation]
        source: "Main Course/01-Cracking the Code"

      - id: "FIL-JB-011"
        content: "90% of your loops can be eliminated by what you do in the front end of the sale — objection handling failures are rooted in poor opening and intelligence gathering"
        domains: [looping, objection-handling, prospecting]
        source: "Main Course/01-Cracking the Code"

      - id: "FIL-JB-012"
        content: "People don't buy logically — they buy emotionally and then justify it logically. But you need BOTH: the airtight logical case AND the emotional case"
        domains: [sales-psychology, buying-psychology]
        source: "Main Course/07-Vision + Weekly Training E24"

      - id: "FIL-JB-013"
        content: "There are no magic words — the words you say in the first four seconds cannot convey everything you need. What does it is tonality and body language"
        domains: [unconscious-communication, tonality]
        source: "Weekly Training E28 + E18"

      - id: "FIL-JB-014"
        content: "Pressure is not a negative — ethical pressure means having so much conviction that you won't let someone make a mistake by saying no to something that genuinely helps them"
        domains: [sales-ethics, closing]
        source: "Weekly Training Action Threshold + E29"

      - id: "FIL-JB-015"
        content: "People don't follow goals, they follow vision — every human being is thirsty for one and most don't have one, so they will follow yours"
        domains: [vision, leadership]
        source: "Main Course/07-Vision Lesson 5"

      - id: "FIL-JB-016"
        content: "The enemy of great is good — the problem with most people is not that they set goals too high and miss them, it's that they set their goals too low and hit them"
        domains: [standards, mindset]
        source: "Main Course/07-Vision Lesson 2"

      - id: "FIL-JB-017"
        content: "Where you end up in life is not dictated by your state (short-term indicator), it's dictated by your standard (long-term thermostat)"
        domains: [standards, mindset]
        source: "Main Course/09-Standards Lesson 1"

      - id: "FIL-JB-018"
        content: "Every objection is a smoke screen for uncertainty — it's never really about the stated objection"
        domains: [objection-handling, looping]
        source: "Main Course/10-Looping Introduction"

      - id: "FIL-JB-019"
        content: "Charisma is an entirely learnable skill — it is not an inborn trait"
        domains: [mindset, unconscious-communication]
        source: "Main Course/08-Script Building Introduction"

      - id: "FIL-JB-020"
        content: "A script is the well-thought-out essence of the perfect sale — it's the truth, well told"
        domains: [scripting]
        source: "Main Course/08-Script Building Lesson 1"

      - id: "FIL-JB-021"
        content: "Limiting beliefs are like viruses that enter our brains from the outside — we don't have spyware or antivirus software to block them"
        domains: [beliefs, mindset]
        source: "Main Course/11-Beliefs"

      - id: "FIL-JB-022"
        content: "It doesn't take a long time to change — change happens in a heartbeat when you're ready. What takes long is going through enough pain until you have the impetus to change"
        domains: [mindset, change-psychology]
        source: "Main Course/11-Beliefs Lesson 7"

      - id: "FIL-JB-023"
        content: "The straight line was the great equalizer — it allowed kids with no education, no degrees, no connections, and no special talents to compete with well-educated counterparts"
        domains: [straight-line-system, mindset]
        source: "Main Course/09-Standards Lesson 4"

      - id: "FIL-JB-024"
        content: "Customers don't leave because of problems — over 80% leave because of indifference. They felt they were treated indifferently"
        domains: [customer-retention, relationship-management]
        source: "Main Course/12-Customers for Life"

      - id: "FIL-JB-025"
        content: "Ducking a phone call is literally the death of a customer relationship — one ducked call destroys trust permanently"
        domains: [customer-retention, relationship-management]
        source: "Main Course/12-Customers for Life"

      - id: "FIL-JB-026"
        content: "The best time to ask for a referral is the moment you close the sale — not after some arbitrary waiting period"
        domains: [referrals, customer-retention]
        source: "Main Course/12-Customers for Life"

      - id: "FIL-JB-027"
        content: "Either you're growing or you're dying — there is no stagnation"
        domains: [mindset, standards]
        source: "SLSC Week 12"

      - id: "FIL-JB-028"
        content: "Your past does not equal your future — unless you choose to live in the past"
        domains: [mindset, beliefs]
        source: "SLSC Week 9 + Inner Game of Wealth"

      - id: "FIL-JB-029"
        content: "There are two types of people in this world: those with reasons and those with results"
        domains: [mindset, standards]

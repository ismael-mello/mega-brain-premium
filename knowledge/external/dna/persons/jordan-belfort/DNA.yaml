        content: "10 Reasons People Are Broke — diagnostic framework: (1) Can't manage state, (2) Set impotent goals, (3) Subscribe to 'The Secret' without action, (4) Limiting beliefs about money, (5) Choose bad mentors, (6) Controlled by fear, (7) Try to reinvent the wheel, (8) Lousy at business, (9) Uncomfortable with sales/marketing, (10) Slave for paycheck instead of leverage"

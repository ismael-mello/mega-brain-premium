        source: "SLSP/1-Inner-World/1-Beliefs/mp4_3_Power_of_Beliefs"

      - id: "FIL-JB-113"
        content: "The language you apply to whatever happens in life creates the meaning. The experience is the experience — language constructs the interpretation."

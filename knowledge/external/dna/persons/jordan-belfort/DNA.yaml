        source: "SLSP/1-Inner-World/2-Standards/mp4_5_Ducks_vs_Eagles"

      - id: "FIL-JB-118"
        content: "A state of uncertainty is literally the death of a salesman. No matter how great your skills, if you are in a state of uncertainty you cannot close."

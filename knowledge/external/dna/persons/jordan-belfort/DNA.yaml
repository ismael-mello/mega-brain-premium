      - id: "HEUR-JB-113"
        content: "You have exactly 4 seconds on the phone to establish three things: enthusiastic as hell, sharp as a tack, authority figure. Miss any one and you're behind the eight ball for the entire sale."
        domains: [opening, first-impressions, phone-sales]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "HEUR-JB-114"
        content: "In person, you have 1/24th of a second before someone has judged you — dissected, assessed, compartmentalized."
        domains: [body-language, first-impressions, in-person-sales]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "HEUR-JB-115"
        content: "72% of the time you must make direct eye contact with someone in person. Below 72% and trust drops dramatically."
        domains: [body-language, rapport, trust-building]
        source: "SLP/Module_04_Being_A_Visionary"

      - id: "HEUR-JB-116"
        content: "9% of communication is words. 91% is tonality and body language. On the phone, 91% is tonality alone."
        domains: [tonality, communication, influence]
        source: "SLP/Module_03_Tonality"

      - id: "HEUR-JB-117"
        content: "Pinky rings have been shown to drop closing rates by 50%. Goatees can be adversarial. Dress for success — blue, dark color, black suits, solid color ties."
        domains: [personal-branding, appearance, closing-optimization]
        source: "SLP/Module_04_Being_A_Visionary"

      - id: "HEUR-JB-118"
        content: "With women: stand directly in front, at least 2.5 feet away, hands visible. With men: never stand directly in front (adversarial) — stand at an angle."
        domains: [body-language, proxemics, gender-dynamics]
        source: "SLP/Module_04_Being_A_Visionary"

      - id: "HEUR-JB-119"
        content: "It takes approximately 3-4 weeks of forced repetition to go from consciously competent to unconsciously competent. First month you'll get 30-50% bump in sales."
        domains: [skill-acquisition, training, performance]
        source: "SLP/Module_01_Three_Tenets"

      - id: "HEUR-JB-120"
        content: "60 days is the commitment window: for the next 60 days while embracing the system, work twice as hard — make twice as many calls, stretch beyond comfort."
        domains: [discipline, training, sales-mastery]
        source: "SLP/Module_01_Three_Tenets"

      - id: "HEUR-JB-121"
        content: "The passive/wimpy handshake is actually the ultimate power handshake — it signals dominance. The cooperative handshake (same waist level, same pressure) is your best sales handshake."
        domains: [body-language, rapport, first-impressions]
        source: "SLP/Module_04_Being_A_Visionary"

      - id: "HEUR-JB-122"
        content: "Keep your powder dry: don't fire your best ammo from 5 miles away. Save your most powerful benefits, language patterns, and closing lines for the later loops, not the opening presentation."
        domains: [closing-strategy, ammunition-management, persuasion]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "HEUR-JB-123"
        content: "Five beats is the kill zone of the pause in the script. A pause of exactly 5 beats before key phrases creates maximum impact and attention capture."
        domains: [tonality, pacing, script-delivery]
        source: "SLP/Flash_Cards"

      - id: "HEUR-JB-124"
        content: "When someone says Let me think about it after 3+ loops, use the real estate reframe: In real estate it's location location location. In my business it's timing timing and timing."
        domains: [objection-handling, urgency, closing]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "HEUR-JB-125"
        content: "Never cut price on your first loop. If you reduce, reduce the quantity/scope, not the price."
        domains: [pricing, objection-handling, negotiation]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "HEUR-JB-126"
        content: "94% of rich people started with nothing. At age 25, out of 100 men who all want to be rich, by 65 only 1 is rich, 4 are financially independent, and the rest are broke."
        domains: [mindset, wealth-statistics, motivation]
        source: "SLP/Module_04_Being_A_Visionary"

      - id: "HEUR-JB-127"
        content: "One ducked phone call kills the relationship forever. Bad news delivered fast is forgiven. Bad news left to fester is fatal."
        domains: [customer-retention, relationship-management, integrity]
        source: "SLP/Module_10_Person_Of_Influence"

      - id: "HEUR-JB-128"
        content: "The Cialdini copy machine experiment: Can I cut the line = 25% success. Can I cut the line because I'm in a rush = 75%. Because I need to (no real reason) = 75%. The word because alone justifies almost anything."
        domains: [trigger-words, persuasion-science, language-patterns]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "HEUR-JB-129"
        content: "Waitress tip experiment: Check alone = 10% tip. Smiley face = 15%. Two chocolates = 25%. Drop chocolates, walk away, turn back with 3 more = 75% tip. The turn back triggers reciprocity."
        domains: [reciprocity, persuasion-science, generosity]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "HEUR-JB-130"
        content: "Please don't misconstrue my enthusiasm for pressure. Say this explicitly if you tend toward high pressure."
        domains: [rapport, self-awareness, objection-prevention]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "HEUR-JB-131"
        content: "Your first sale is always to yourself. The first person you sell every morning is you — on the system, on your product, on your worth."
        domains: [self-belief, state-management, mindset]
        source: "SLP/Module_01_Three_Tenets"

  L4_FRAMEWORKS:
    count: 92
    items:
      - id: "FW-JB-001"
        content: "The Five Core Elements of Influence (The Buying Combination)"
        components: ["1) Product certainty (logical + emotional)", "2) Trust/connection with YOU (conscious + unconscious)", "3) Trust in the COMPANY behind the product", "4) Action Threshold (lowered)", "5) Pain Threshold (elevated)"]
        domains: [straight-line-system, five-core-elements]
        source: "Main Course/01 + SLSC Week 1"

      - id: "FW-JB-002"
        content: "The Three Tens Scale"
        components: ["Ten 1: Certainty about PRODUCT (logical + emotional)", "Ten 2: Trust and connection with YOU (conscious + unconscious)", "Ten 3: Trust in the COMPANY", "All three measured 1-10, all must reach high levels"]
        domains: [three-tens, certainty-science]
        source: "Main Course/01 + 10-Looping"

      - id: "FW-JB-003"
        content: "The Looping Framework"
        components: ["1) Prospect objects after first ask", "2) Deflect: 'Does the idea make sense?'", "3) Gauge certainty via tonality", "4) Pace-Pace-Lead", "5) Loop 1: Rebuild all Three Tens with fresh info", "6) Ask again", "7) Loop 2: Emotional cases + risk reversal", "8) Ask again", "9) Loop 3: Action threshold + pain amplification", "10) Final ask or graceful exit"]
        domains: [looping, objection-handling]
        source: "Main Course/10 + SLSC Week 10 + Weekly Training E50"

      - id: "FW-JB-004"
        content: "The Straight Line Syntax (Complete Structure)"
        components: ["1) Take immediate control in first 4 seconds", "2) Gather intelligence via strategic questions", "3) Build massive rapport simultaneously", "4) Execute straight line transition", "5) Present (create urgency, ask for order)", "6) Deflect first objection + loop", "7) Rebut + loop with higher certainty", "8) Lower action threshold + amplify pain", "9) Final close or graceful exit"]
        domains: [straight-line-system]
        source: "Main Course/01 + Weekly Training E28 + E24"

      - id: "FW-JB-005"
        content: "The 10 Core Tonalities"
        components: ["1) Certainty/Absolute conviction (solar plexus)", "2) Utter sincerity/empathy", "3) Reasonable man/woman", "4) Scarcity/urgency", "5) Mystery/intrigue (whisper)", "6) Enthusiasm/bottled enthusiasm", "7) Caring/empathetic", "8) Questioning/rising tone (micro-agreements)", "9) Declarative/expert mode", "10) 'I really want to know'/phrasing as question"]
        domains: [tonality, influence]
        source: "SLSC Week 4 + Main Course/04 + Weekly Training E45"

      - id: "FW-JB-006"
        content: "Airtight Logical Case + Airtight Emotional Case"
        components: ["Logical: step-by-step features, benefits, cost-benefit (A to Z)", "Emotional: future pacing, imagining life with benefit realized", "Logical FIRST (silences bullshit detector)", "Then Emotional (sweeps them away)"]
        domains: [persuasion, certainty-science]
        source: "Main Course/01 + Main Course/07"

      - id: "FW-JB-007"
        content: "The Four C's (Empowered States)"
        components: ["1) Certainty (vs uncertainty)", "2) Clarity (vs overwhelm)", "3) Confidence (vs lack of confidence)", "4) Courage (vs fear)"]
        domains: [state-management]
        source: "Main Course/03-State Management"

      - id: "FW-JB-008"
        content: "Six Things to Identify During Intelligence Gathering"
        components: ["1) Core needs (plus secondary/tertiary)", "2) Core beliefs that could impact the sale", "3) Past experiences with similar products", "4) Values (what matters most)", "5) Financial situation/spending ability", "6) Where their pain lies"]
        domains: [intelligence-gathering, prospecting]
        source: "Main Course/01"

      - id: "FW-JB-009"
        content: "Four Prospect Archetypes"
        components: ["1) Buyers in Heat: want it, need it, can afford it, ready NOW", "2) Buyers in Power: have authority and money but not urgently motivated", "3) Lookie-Loos: no real intention to buy, browsing", "4) Mistakes: wrong person entirely, can't buy"]
        domains: [prospecting, qualifying]
        source: "Main Course/06-Prospecting"

      - id: "FW-JB-010"
        content: "The Four Secrets to Ultimate Success"
        components: ["1) Own Your State (body + mind)", "2) Crack Destructive Beliefs", "3) Develop Unstoppable Strategies (model others selectively)", "4) Elevate Your Standards"]
        domains: [mindset, inner-game]
        source: "Inner Game of Wealth"

      - id: "FW-JB-011"
        content: "The Two Roads to Ultimate Failure"
        components: ["1) Choose Your Values Wisely (poor values = destruction)", "2) Prioritize Your Values (order matters)", "JB's destructive order: Money > Power > Sex > Drugs", "Success order: Giving Value > Family > Love > Passion"]
        domains: [values, wealth-psychology]
        source: "Inner Game of Wealth"

      - id: "FW-JB-012"
        content: "7 Things That Hold People Back"
        components: ["1) Goals instead of vision", "2) Don't follow a proven system", "3) Think money doesn't matter", "4) Don't play to win", "5) Make decisions slowly, change mind quickly", "6) Haven't chosen a real-world mentor", "7) Haven't taken responsibility for their world"]
        domains: [mindset, self-improvement]
        source: "Inner Game of Wealth"

      - id: "FW-JB-013"
        content: "Three Tenets of the Front Half"
        components: ["1) Take immediate control of the sale", "2) Engage in massive intelligence gathering", "3) Use intelligence gathering to build rapport on conscious and unconscious levels"]
        domains: [straight-line-system, rapport]
        source: "Main Course/01"

      - id: "FW-JB-014"
        content: "Three Key Elements of a Good Script"
        components: ["1) Effective Body Language", "2) Effective Tonality", "3) Effective Language Patterns (chunks with defined beginning, end, and specific outcome)"]
        domains: [scripting]
        source: "Script Builder SB4"

      - id: "FW-JB-015"
        content: "Rebuttal Category System (102-page guide)"
        components: ["50+ named rebuttal categories including:", "Call Back (25 variants), Bad/Scared of Market", "Check My Funds, Competitive Account", "I've Been Burned Before, Let Me Think About It", "Need To Talk To (Wife/Partner/CPA/Lawyer)", "Not Interested, Research First, Send Me Info", "Plus industry-specific rebuttals"]
        domains: [objection-handling, rebuttals]
        source: "04-Rebuttals"

      - id: "FW-JB-016"
        content: "Script Structure: Three-Section Framework"
        components: ["Section 1: Introduction/Opening (first 4 seconds)", "Section 2: Body/Presentation (intelligence + qualifying + pitch)", "Section 3: Close (urgency, soft close 'fair enough?', asking for order)", "Must have seamless transitions between sections"]
        domains: [scripting]
        source: "Script Builder SB3 + SB4"

      - id: "FW-JB-017"
        content: "Pace-Pace-Lead Tonality Pattern"
        components: ["1) Enter prospect's world at their certainty level tonally", "2) First pace: stay at same level + add new benefit", "3) Second pace: continue at same level + another benefit", "4) Lead: slowly ratchet up enthusiasm/certainty", "5) Prospect matches your new enthusiasm level"]
        domains: [tonality, looping]
        source: "Main Course/10-Looping"

      - id: "FW-JB-018"
        content: "Vision Statement Architecture"
        components: ["1) Write in present tense with -ING gerunds", "2) Project 3-5 years ahead", "3) Think BIG", "4) Include all life areas: business, personal, charity, relationships, health", "5) Bold enough to make hairs on neck stand up", "6) Attach your WHY at deepest level", "7) Put on phone screensaver, review daily"]
        domains: [vision, goal-setting]
        source: "Main Course/07-Vision"

      - id: "FW-JB-019"
        content: "Eight Steps for Goal Setting"
        components: ["1) Set a goal", "2) Put a date on it", "3) Identify people/groups to align with", "4) Learn what you need to know", "5) Develop the best plan available (not perfect)", "6) Take massive action", "7) Analyze results with sensory acuity", "8) Change approach one variable at a time, repeat"]
        domains: [goal-setting, strategy]
        source: "Main Course/07-Vision"

      - id: "FW-JB-020"
        content: "Straight Line Script Building Architecture (4 Layers)"
        components: ["Layer 1: OPENING — pattern interrupt + credibility + reason for call", "Layer 2: INTELLIGENCE — 5-8 strategic questions in order of depth", "Layer 3: PRESENTATION — transition + benefits + social proof + urgency + call to action", "Layer 4: LOOPS — pre-written rebuttals for top 5 objections + benefit reserves"]
        domains: [scripting]
        source: "Weekly Training E48 + Building the Perfect Script"

      - id: "FW-JB-021"
        content: "The Overarching Equations of the Straight Line"
        components: ["1) Rapport is constant — never breaks", "2) All three Tens addressed simultaneously", "3) Law of Positive Intent governs all decisions", "4) Certainty must always be increasing", "5) Energy In must exceed Energy Out", "6) Consistency builds through micro-agreements", "7) Unconscious communication must match conscious", "8) Expert Frame must be maintained"]
        domains: [straight-line-system]
        source: "Weekly Training E24"

      - id: "FW-JB-022"
        content: "Corporate Sales Force Optimization Framework"
        components: ["1) Recruit for hunger and coachability, not experience", "2) First 30 days = script memorization + role playing ONLY", "3) Pair new reps with top performers", "4) Daily group call reviews", "5) Tiered commission rewarding volume + quality", "6) Culture of elevation not competition", "7) Weekly specific skill trainings", "8) Monthly diagnostics"]
        domains: [sales-team-training, leadership]
        source: "Weekly Training Peak Behind the Curtain"

      - id: "FW-JB-023"
        content: "The Action Threshold Lowering Pattern"
        components: ["1) Identify prospect has high AT", "2) Future pace — paint vivid picture of life AFTER buying", "3) Use 'imagine' and 'picture this' language", "4) Contrast current pain with future pleasure", "5) If still not closing, escalate to Pain Threshold", "6) Use both together: lower bar (AT) while raising urgency (PT)"]
        domains: [action-threshold, closing]
        source: "Weekly Training Action Threshold + SLSC Week 10"

      - id: "FW-JB-024"
        content: "The Pain Threshold Amplification Pattern"
        components: ["1) Acknowledge current situation empathetically", "2) Ask 'What happens if nothing changes?'", "3) Paint picture of WORSENING status quo", "4) Contrast with vision of transformed future", "5) Create urgency: 'Every day you wait costs you X'", "6) Tie pain directly to your solution"]
        domains: [pain-threshold, closing]
        source: "Weekly Training Action Threshold"

      - id: "FW-JB-025"
        content: "Gatekeeper Navigation Framework (7 Strategies)"
        components: ["1) Sound like an insider — use first name, speak authoritatively", "2) Call at off-hours", "3) Above-the-target strategy — call higher, get referred down", "4) Build relationship with gatekeeper over 2-3 calls", "5) Physical presence — show up after 5-6 calls", "6) Use reciprocity — small gift or valuable info", "7) Leverage LinkedIn/social for direct contact"]
        domains: [prospecting, gatekeepers]
        source: "Weekly Training E26"

      - id: "FW-JB-026"
        content: "The Sales Funnel Model (4 Variants)"
        components: ["1) Strictly Phone-Based", "2) Strictly In-Person/Door-to-Door", "3) Store/Inbound Traffic", "4) Hybrid (phone + field)", "All share same diagnostic principle: identify weakest conversion ratio"]
        domains: [prospecting, sales-metrics]
        source: "Main Course/06-Prospecting"

      - id: "FW-JB-027"
        content: "Sell Me This Pen Framework"
        components: ["The only rational response is to ask questions first", "'How long have you been in the market for a pen?'", "Never start by describing features", "Qualify first to determine if they're a buyer"]
        domains: [prospecting, qualifying]
        source: "Main Course/06-Prospecting"

      - id: "FW-JB-028"
        content: "State Management Protocol (Daily)"
        components: ["1) Morning Physiology — exercise, power postures", "2) Incantations — ACTIVE declarations with full body engagement", "3) Future Pacing — 5-10 min visualizing ideal outcome", "4) Anchoring — associate peak state with physical trigger", "5) Pattern Break — when state drops, change physiology", "6) Pre-call state check — never dial from low state"]
        domains: [state-management]
        source: "Weekly Training E43 + SLSC Week 3"

      - id: "FW-JB-029"
        content: "The Body Language Framework for Sales"
        components: ["1) Active Listening posture — lean forward, head nod", "2) Eye contact — 60-72% of the time", "3) Open palms = trust, pointing = aggression", "4) Subtle mirroring of prospect", "5) Power posture during presentation", "6) Never cross arms", "7) Dress congruently", "8) Firm handshake, 2-3 seconds"]
        domains: [body-language, unconscious-communication]
        source: "Main Course/05 + Weekly Training E10"

      - id: "FW-JB-030"
        content: "Storytelling in Sales Framework"
        components: ["1) Stories must be SHORT — 90 seconds max", "2) Hero, conflict, resolution", "3) Resolution MUST tie to your product/service", "4) Use sensory language", "5) End with transformation", "6) Third-person for social proof", "7) First-person for credibility"]
        domains: [storytelling, persuasion]
        source: "Weekly Training E40"

      - id: "FW-JB-031"
        content: "The Influence Safe-Cracking Framework (5 Tumblers)"
        components: ["1) Product certainty — logical + emotional", "2) You certainty — trust + rapport", "3) Company certainty — credibility + track record", "4) Action threshold — lowered to accessible level", "5) Pain threshold — raised to motivating level", "Combination must be turned in the RIGHT ORDER"]
        domains: [straight-line-system, five-core-elements]
        source: "Weekly Training E41"

      - id: "FW-JB-032"
        content: "Limiting Belief Breaking Process"
        components: ["1) Identify the specific limiting belief", "2) Find root experience (earliest memory)", "3) List 5 references that reinforced it", "4) Write 5 consequences", "5) Write 5 outcomes of empowering opposite", "6) Timeline regression exercise (NLP)", "7) Replace meaning of root experience", "8) Install empowering belief"]
        domains: [beliefs, NLP, mindset]
        source: "Main Course/11-Beliefs (from Dr. Richard Bandler)"

      - id: "FW-JB-033"
        content: "10 Rules for Creating Customers for Life"
        components: ["1) NEVER duck a phone call", "2) Return calls same day", "3) Front problems immediately", "4) Focus on adoption/onboarding", "5) Proactive check-ins", "6) Ethical gifting", "7) After close, DO go to 'Pluto' to learn personal details", "8) Step-down sale approach", "9) Build up to bigger transactions", "10) Treat indifference as #1 enemy"]
        domains: [customer-retention, relationship-management]
        source: "Main Course/12-Customers for Life"

      - id: "FW-JB-034"
        content: "The Step-Down Sale"
        components: ["1) Initial encounter = smaller commitment/lower risk", "2) Demonstrate value through execution", "3) Build trust through delivery", "4) Upsell to larger commitment", "5) Cross-sell complementary products"]
        domains: [closing, customer-retention, upselling]
        source: "Main Course/12-Customers for Life"

      - id: "FW-JB-035"
        content: "Standards Raising Protocol"
        components: ["1) Get honest — do I have a problem?", "2) Identify current standard (write the real number)", "3) Determine target standard", "4) Use dual levers of pain and pleasure", "5) Create line in the sand", "6) Install new standard through daily reinforcement"]
        domains: [standards, self-improvement]
        source: "Main Course/09-Standards"

      - id: "FW-JB-036"
        content: "Four Core Inner Game Distinctions"
        components: ["1) State Management — physiological emotional control", "2) Beliefs — empowering beliefs supporting success", "3) Vision Focus — compelling vision with bifurcated focus", "4) Standards — highest level thermostat", "All four must be congruent with outer world skills"]
        domains: [inner-game, mindset]
        source: "Main Course/07-Vision"

      - id: "FW-JB-037"
        content: "Inner World vs Outer World Distinctions"
        components: ["8 modules = outer world (tactics/strategies)", "4 modules = inner world (state, beliefs, vision, standards)", "Both equally important", "Integration of inner and outer = the secret"]
        domains: [straight-line-system, inner-game]
        source: "Main Course/00-Introduction"

      - id: "FW-JB-038"
        content: "The Triple-A Referral System"
        components: ["Ask for referrals ON THE SPOT when they buy", "Position as helping others", "Get specific names on the spot", "Ongoing: monthly, quarterly, annual touchpoints", "Identify Triple-A referrers (single clients giving 20-50+ leads)"]
        domains: [referrals, customer-retention]
        source: "SLSC Week 12"

      - id: "FW-JB-039"
        content: "Matching and Mirroring Framework"
        components: ["Don't mirror instantly (creepy)", "Wait a few moments, then mirror stance/posture", "Enter at same emotional level", "Slowly pace and lead to desired state"]
        domains: [body-language, rapport]
        source: "Script Builder SB4"

      - id: "FW-JB-040"
        content: "Body Language Gender Rules"
        components: ["Man to Woman: stand directly in front, hands visible, don't invade space", "Man to Man: DON'T stand directly in front (adversarial), stand at an angle"]
        domains: [body-language]
        source: "Script Builder SB4"

      - id: "FW-JB-041"
        content: "State Management Anchoring Framework"
        components: ["1) Body controls emotion (act as if)", "2) Mind controls focus (only solutions, never problems)", "3) Set Your Anchor (link physical gesture to peak state)", "4) Use anchor before every call/meeting"]
        domains: [state-management, anchoring]
        source: "SLSC Week 3"

      - id: "FW-JB-042"
        content: "Mentor Selection Framework"
        components: ["3 criteria: 1) Has this person done it themselves?", "2) Has this person successfully mentored others?", "3) Will it work for ME?"]
        domains: [mentorship, self-improvement]
        source: "Inner Game of Wealth"

      - id: "FW-JB-043"
        content: "New Account Onboarding Timeline"
        components: ["Day 1: Close and confirm order", "Day 2: Call to set up payment", "Day 3-5: Sales assistant arranges pickup", "Day 7: Funds due (5 business days + 2-day grace)", "Never second-trade until check hits"]
        domains: [closing, follow-up, onboarding]
        source: "Rebuttals Guide"

      - id: "FW-JB-044"
        content: "Presentation Structure for Any Company"
        components: ["Introduction: name, symbol, exchange, price, target", "Background: what company does, history, developments", "Strategy: main bullet points, catalyst/event, profit potential, risk/exit"]
        domains: [scripting, presentation]
        source: "Rebuttals Guide"

      - id: "FW-JB-045"
        content: "The Basics of Business Framework"
        components: ["Leads -> New Accounts -> Assets to Manage -> Commissions", "Take on 120+ accounts/year for 5-10 years", "Diversify accounts", "Service all accounts", "Keep 'other brokers' file", "Call ALL clients for special situations"]
        domains: [business-building, sales-metrics]
        source: "Rebuttals Guide"

      - id: "FW-JB-046"
        content: "The Objection Death Spiral (Anti-Pattern)"
        components: ["What NOT to do:", "1) Prospect objects", "2) Salesperson answers directly", "3) Prospect hops to new objection", "4) Infinite loop, never closing", "WHY: You're answering smoke screens, not building certainty"]
        domains: [objection-handling, anti-patterns]
        source: "Main Course/10-Looping"

      - id: "FW-JB-047"
        content: "Script Delivery Call-Type Matrix"
        components: ["Inbound: prospect interested, enter further down the line", "Cold Call: first paragraph tests interest", "Callback Lead: requalify, then create urgency", "All converge at same qualifying section point"]
        domains: [scripting, prospecting]
        source: "Script Builder SB5"

      - id: "FW-JB-048"
        content: "Olfactory Anchoring Framework"
        components: ["Traditional NLP fails because can't reach tippy-top artificially", "1) Choose state to anchor", "2) WAIT until there ORGANICALLY (e.g., after tough close)", "3) At peak moment, inhale distinctive scent", "4) Stack multiple organic occurrences", "5) Use scent before future encounters", "Works because smell connects directly to limbic system"]
        domains: [state-management, anchoring, NLP]
        source: "Main Course/03-State Management"

      - id: "FW-JB-049"
        content: "Seven Benefits of Straight Line Scripts"
        components: ["1) Never run out of intelligent things to say", "2) Apply right tonality at right time", "3) Use best possible words/phrases", "4) Keep you on the straight line (ethical)", "5) Increase confidence", "6) Enable consistent training across teams", "7) Enable continuous improvement"]
        domains: [scripting]
        source: "Main Course/08"

      - id: "FW-JB-050"
        content: "The Staying on the Straight Line Framework"
        components: ["Common mistakes: going sideways into small talk, answering derailing questions, letting prospect take control, getting emotional at objections, skipping intelligence gathering, failing to re-establish rapport after loops", "Fix: always ask 'Is what I'm about to say moving this person closer to certainty?'"]
        domains: [straight-line-system]
        source: "Weekly Training E53"


      - id: "FW-JB-051"
        content: "6-Step SLM Sales Funnel Formula"
        components: ["1) Opt-in Bribe (collect email)", "2) Self-Liquidating Offer (SLO/break-even)", "3) Core Product (profit center)", "4) Upsell (increase AOV)", "5) Downsell (salvage non-buyers)", "6) Funnel Follow-Up (email + retargeting)"]
        domains: [sales-funnels, funnel-architecture]
        source: "SLM/Module 4"

      - id: "FW-JB-052"
        content: "4 Funnel Follow-Up Methods"
        components: ["1) Automated email sequences", "2) Exit offers/pops", "3) Banner retargeting (display network)", "4) Facebook Custom Audience retargeting"]
        domains: [funnel-follow-up, retargeting]
        source: "SLM/Module 4"

      - id: "FW-JB-053"
        content: "Perfect SLM Funnel Layout"
        components: ["Lead Capture → Sales Page → Order Form → Upsell(s) → Downsell(s) → Thank You → Funnel Follow-Up"]
        domains: [sales-funnels, funnel-architecture]
        source: "SLM/Module 4"

      - id: "FW-JB-054"
        content: "Three Tens in Retargeting"
        components: ["Banner Set A: selling the PRODUCT (Ten 1)", "Banner Set B: selling YOU/expertise (Ten 2)", "Banner Set C: selling the COMPANY (Ten 3)", "Each targets the specific Ten that failed to convert"]
        domains: [retargeting, three-tens-application]
        source: "SLM/Module 4"

      - id: "FW-JB-055"
        content: "Online Sales Funnel Framework"
        components: ["Website/Ad → Squeeze Page (collect email) → Deliver report (camouflaged sales letter) → Purchase offer"]
        domains: [sales-funnels, digital-marketing]
        source: "SLM/Module 2"

      - id: "FW-JB-056"
        content: "Direct Response vs Branded Marketing"
        components: ["Direct Response: encourages specific action, fully measurable, ROI trackable", "Branded: awareness only (Coca-Cola billboard), unmeasurable", "SLM is 100% direct response — every dollar must be accountable"]
        domains: [marketing-philosophy, direct-response]
        source: "SLM/Module 2"

      - id: "FW-JB-057"
        content: "Split Testing Framework"
        components: ["1) Identify variable to test", "2) Change ONE variable at a time", "3) Run traffic to both versions simultaneously", "4) Measure conversion impact", "5) Keep winner, cut loser", "6) Repeat with next variable"]
        domains: [split-testing, optimization]
        source: "SLM/Module 2"

      - id: "FW-JB-058"
        content: "Pre-Writing Framework (4 Steps)"
        components: ["1) Define audience/avatar in detail", "2) Identify 3 biggest pain points", "3) Define your magic answer to each pain point", "4) List 3 most likely objections and pre-answers"]
        domains: [copywriting, pre-writing]
        source: "SLM/Module 3"

      - id: "FW-JB-059"
        content: "6-Step Sales Letter Formula"
        components: ["1) FEATURES — list all product features", "2) BENEFITS — translate each feature to benefit", "3) STORY — Problem → Why unsolvable → Magic solution → Results", "4) SUMMARY — benefit stack (everything they get)", "5) HEADLINE — written LAST from strongest element", "6) CALL TO ACTION — specific, urgent, clear"]
        domains: [copywriting, sales-letters]
        source: "SLM/Module 3"

      - id: "FW-JB-060"
        content: "Story Formula for Copy"
        components: ["1) The Problem — paint vivid picture of pain", "2) Why the problem could never be solved — establish impossibility", "3) Your magic solution — the breakthrough", "4) The results of your solution — proof and transformation"]
        domains: [copywriting, storytelling]
        source: "SLM/Module 3"

      - id: "FW-JB-061"
        content: "Customer Avatar Template"
        components: ["Basic: Age, Gender, Location, Family status", "Professional: Job, Industry, Company size, Revenue, Income", "Problems: Primary pain, Secondary pains", "Goals: What they want to achieve", "Interests: Media, hobbies, influencers they follow", "Product Benefit: How your product serves them", "Marketing Strategy: Best channels and messaging for this avatar"]
        domains: [customer-avatar, targeting]
        source: "SLM/Module 5"

      - id: "FW-JB-062"
        content: "Traffic Channel Selection Framework"
        components: ["YouTube (demo needed)", "LinkedIn (B2B)", "Google Search (in-market intent)", "Google Display (scale/retargeting)", "Twitter (young demo)", "Solo Ads (list targeting)", "Facebook (most markets — start here)", "Banner Networks (scaling proven winners)", "PPV (mass market only)", "CPA Networks (scale proven offers)", "Content Discovery — Outbrain/Taboola (mass market, use caution)"]
        domains: [traffic-acquisition, channel-selection]
        source: "SLM/Module 5"

      - id: "FW-JB-063"
        content: "Three Troubleshooting Variables"
        components: ["When campaign fails, change ONE at a time:", "1) Copy/creative — the words and offer", "2) Design/ad format — the visual presentation", "3) Targeting — who sees the ad"]
        domains: [troubleshooting, campaign-optimization]
        source: "SLM/Module 5"

      - id: "FW-JB-064"
        content: "SLM Email Marketing Formula (3-Email Sequence)"
        components: ["Day 0 Email 1: Indoctrination (NO selling — sell yourself + company + deliver free product + whitelist instructions)", "Day 0 Email 2: Content Email 1 (deliver value + soft sell SLO link at bottom)", "Day 1 Email 3: Content Email 2 (more value + scarcity/urgency + SLO link)"]
        domains: [email-marketing, email-sequences]
        source: "SLM/Module 6"

      - id: "FW-JB-065"
        content: "Goal-Based Email Automation"
        components: ["1) Place tracking codes on each funnel page", "2) If user reached page A but NOT page B → trigger targeted email", "3) Time-based triggers for non-openers", "4) Open-based triggers for engaged but non-buyers", "5) Click-based triggers for interested browsers", "6) Goal-based triggers when conversion happens (stop selling sequence)"]
        domains: [email-automation, funnel-optimization]
        source: "SLM/Module 6"

      - id: "FW-JB-066"
        content: "SLM Online Looping Framework (7 Steps)"
        components: ["1) Strategize — identify exact drop-off point in funnel", "2) Create banner ads — 3 types (product, self, company)", "3) Select retargeting platform (Perfect Audience, AdRoll, etc.)", "4) Create campaign with proper audience/duration/frequency", "5) Analyze results — CTR, conversions, ROI", "6) Scale winners, cut losers", "7) Wash, Rinse, Repeat"]
        domains: [retargeting, looping-online]
        source: "SLM/Module 7"

      - id: "FW-JB-067"
        content: "Three Banner Strategy"
        components: ["Banner Set A: selling the PRODUCT — features, benefits, transformation (Ten 1)", "Banner Set B: selling YOURSELF — expertise, authority, credibility (Ten 2)", "Banner Set C: selling the COMPANY — trust, testimonials, track record (Ten 3)", "Deploy all three simultaneously; scale the set that converts best"]
        domains: [banner-advertising, three-tens-application]
        source: "SLM/Module 7"

      - id: "FW-JB-068"
        content: "Pre-Sell Page Strategy"
        components: ["Optional intermediary page between retargeting ad and funnel page", "Does heavy lifting on whichever Ten was weakest", "Warms prospect up BEFORE they re-enter the main funnel", "Content matches the specific objection/concern that caused drop-off"]
        domains: [retargeting, conversion-optimization]
        source: "SLM/Module 7"

      - id: "FW-JB-069"
        content: "4 Steps to Online Domination"
        components: ["1) Find Leading Competitors (Google, social, industry sites)", "2) Identify Highest Value Prospects (demographics, psychographics, behavior)", "3) Use Data to Build Perfect Funnel (model competitor funnels + improve)", "4) Identify Best Traffic Source and Ads (spy on competitor traffic + ads)"]
        domains: [competitive-intelligence, market-domination]
        source: "SLM/Module 8"

      - id: "FW-JB-070"
        content: "Offline-to-Online Campaign Architecture"
        components: ["1) Choose offline medium (newspaper, direct mail, radio, TV)", "2) Write SLM-style copy for that medium", "3) Include simple, memorable URL as primary CTA", "4) URL leads to SLM squeeze page or funnel entry", "5) Funnel does all conversion work online"]
        domains: [hybrid-marketing, offline-to-online]
        source: "SLM/Module 9"

      - id: "FW-JB-071"
        content: "Newspaper Advertising Framework"
        components: ["Option 1: Standard Space Ads — headline + body + CTA + URL", "Option 2: Advertorials — designed to look like editorial content, higher conversion", "Key: always direct response, always trackable URL, never just branding"]
        domains: [newspaper-advertising, offline-marketing]
        source: "SLM/Module 9"

      - id: "FW-JB-072"
        content: "Direct Mail Framework (2 Channels)"
        components: ["Channel 1: 3D Mail (B2B) — lumpy envelope with grabber object + sales letter → URL to funnel", "Channel 2: Postcards (B2C) — offer + URL → funnel", "Rule: NEVER swap them — 3D for B2B, postcards for B2C"]
        domains: [direct-mail, offline-marketing]
        source: "SLM/Module 9"

      - id: "FW-JB-073"
        content: "Broadcast Strategy Framework"
        components: ["1) Buy radio slot (pay-to-play)", "2) Host Dream 100 interviews as guests", "3) Build authority through association", "4) Use commercial break slots for direct marketing", "5) Leverage radio host credibility for endorsements"]
        domains: [radio-marketing, authority-building]
        source: "SLM/Module 9"

      - id: "FW-JB-074"
        content: "Universal Script Architecture (11-step)"
        components: ["1) Opening Hook — establish 3 Tens in 4 seconds", "2) Qualifying Questions (6-8) — gather intelligence", "3) Transition Phrase — bridge to presentation", "4) Presentation — build logical + emotional case", "5) First Close — direct ask for order", "6) Deflect & Loop — handle objection, restart", "7) True Beauty Pattern — 'The true beauty of this is...'", "8) Credibility Transfer — 'If I'd been your advisor...'", "9) Reintroduce Self — sell Ten 2", "10) Sell Company — sell Ten 3", "11) Final Close — urgent, specific ask"]
        domains: [scripting, sales-process]
        source: "SLM/Scripts"

      - id: "FW-JB-075"
        content: "Deflection Pattern"
        components: ["Trigger: prospect gives any objection", "Response: 'I hear what you're saying, but let me ask you a question...'", "Follow-up: 'Does the idea make sense? Do you like the idea?'", "Rule: NEVER say 'I understand' — it validates the objection", "Purpose: breaks pattern, gets micro-agreement, opens door for loop"]
        domains: [objection-handling, language-patterns]
        source: "SLM/Scripts"

      - id: "FW-JB-076"
        content: "The Sales Funnel Reverse Engineering Framework: Start from annual income goal → divide by average commission → weekly sales needed → pitches needed → appointments needed → connects needed → daily dials. The ONLY thing you control is dials."
        domains: [sales-metrics, pipeline-management, prospecting]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "FW-JB-077"
        content: "29 Tonal Patterns Framework (SLP Original): Beyond the 10 core tonalities, SLP teaches 29 distinct tonal patterns including declarative, micro-agreement uptone, tone of mystery, reasonable man, scarcity whisper, bottled enthusiasm, physiological triggers, and kill zone pauses."
        domains: [tonality, communication, influence]
        source: "SLP/Module_03_Tonality"

      - id: "FW-JB-078"
        content: "Micro-Agreement Chaining: In one paragraph, stack 3-4 micro-agreements by raising voice at end of phrases. Each uptone forces the prospect to search memory. They unconsciously agree to avoid seeming slow. Chains compound rapport exponentially."
        domains: [tonality, rapport, opening-techniques]
        source: "SLP/Module_03_Tonality"

      - id: "FW-JB-079"
        content: "Transition Word Power System: Words like well, now, but are emotional control valves. Start well high to give room to drop into scarcity. Now resets attention."
        domains: [tonality, script-building, emotional-management]
        source: "SLP/Module_03_Tonality"

      - id: "FW-JB-080"
        content: "Word Grouping for Expert Speech: Contract irrelevant words into one sound. Stress only meaningful words. Expert speech vs novice speech."
        domains: [tonality, script-delivery, authority-projection]
        source: "SLP/Module_03_Tonality"

      - id: "FW-JB-081"
        content: "Physiological Trigger System: Create physical gestures that anchor specific tonalities. Tap hand = certainty. Push hands out = no big deal. Narrow eyes = mystery. The gesture triggers the tonality even on the phone."
        domains: [state-management, tonality, nlp, anchoring]
        source: "SLP/Module_03_Tonality"

      - id: "FW-JB-082"
        content: "Five Trigger Words Framework: (1) Virtually = bold claims without absolutes. (2) Only = minimizer for price. (3) Because = justifier. (4) Cash outlay = reframe from cost to investment. (5) I would be glad to = rapport builder."
        domains: [language-patterns, trigger-words, closing]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "FW-JB-083"
        content: "Offsetting Language Patterns Framework: Hold your hand every step of the way (offsets abandonment fear). Show you the ins and outs (offsets complexity fear). Huge upside little downside (offsets risk fear). In-depth training (offsets learning fear). Long-term relationship (offsets one-time transaction fear)."
        domains: [language-patterns, objection-prevention, closing]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "FW-JB-084"
        content: "Vision Quest Goal-Setting Framework: (1) Write specific goal with date. (2) Identify people/groups/organizations to align with. (3) Take massive action. (4) Analyze what's working vs not. (5) Change approach accordingly."
        domains: [goal-setting, personal-development, motivation]
        source: "SLP/Module_05_Inner_Game"

      - id: "FW-JB-085"
        content: "The Boxing In Framework: Systematically eliminate all reasons not to buy until the prospect has to go against their own stated beliefs to say no. Four sides: (1) They love the product. (2) They trust you. (3) They trust the company. (4) Their own words painted why they need it now."
        domains: [closing, looping, persuasion]
        source: "SLP/Module_08_Three_10s"

      - id: "FW-JB-086"
        content: "Five Ways to Create Customers for Life: (1) Never duck a phone call. (2) Send them to competitor if you can't help. (3) Remember their family details after closing. (4) Use gifts correctly. (5) Write effective thank-you notes."
        domains: [customer-retention, relationship-building, long-term-value]
        source: "SLP/Module_10_Person_Of_Influence"

      - id: "FW-JB-087"
        content: "Pain-Pleasure Dual Anchor System: Identify your 5 ultimate pain scenarios (with WHYs) and your 5 ultimate pleasure visions (with WHYs). When both are active simultaneously, you move through fear effortlessly."
        domains: [motivation, state-management, goal-setting]
        source: "SLP/Module_10_Person_Of_Influence"

      - id: "FW-JB-088"
        content: "Script Writing Rules: Words on paper differ from spoken word. Contract words in conversational English. Never sound like reading. Test and refine until perfect, then lock it in."
        domains: [script-building, sales-process, quality-control]
        source: "SLP/Module_03_Tonality"

      - id: "FW-JB-089"
        content: "Closing Tonal Sequence: First close = absolute certainty. Second close = reasonable man. Save strongest patterns for 3rd/4th loops. Collapse into reasonableness and calmness at the final ask."
        domains: [closing, tonality, loop-management]
        source: "SLP/Module_09_Power_Of_Language"

      - id: "FW-JB-090"
        content: "Five Personal Obstacles Removal Framework: (1) Get rid of old patterns. (2) Master emotional states. (3) Understand how the brain works. (4) Master fear. (5) Set lofty goals."
        domains: [personal-development, inner-game, fear-management]
        source: "SLP/Flash_Cards"

      - id: "FW-JB-091"
        content: "Three Ways to Overcome Buying Wounds: (1) Create airtight logical case for buying now. (2) Create airtight emotional case. (3) Crack through limiting buying beliefs."
        domains: [closing, objection-handling, persuasion]
        source: "SLP/Flash_Cards"

      - id: "FW-JB-092"
        content: "Objection Tonal Attitude Framework: Tell me you have no money — I respect that. Tell me you don't like the product — I'll argue. Tell me you don't trust me — I'll educate you. But don't tell me you need to think about it."
        domains: [objection-handling, tonality, closing]
        source: "SLP/Module_10_Person_Of_Influence"

  L5_METHODOLOGIES:
    count: 75
    items:
      - id: "MET-JB-001"
        content: "The Complete Straight Line Sale (Full Sequence)"
        steps: ["1) Open — establish sharp/enthusiastic/expert in 4 seconds", "2) Take immediate control", "3) Gather intelligence with strategic questions while building rapport", "4) Identify needs, beliefs, past experiences, values, finances, pain", "5) Execute straight line transition", "6) Present — build airtight logical case, create urgency", "7) Ask for the order", "8) Get objection, deflect with 'Does the idea make sense?'", "9) Gauge certainty via tonality (1-10)", "10) Loop back with powerful follow-up", "11) Build higher certainty for all Three Tens", "12) Future pace for emotional certainty", "13) Lower action threshold", "14) If needed, amplify pain", "15) Ask for order again", "16) Continue looping (max 3-4) until close or exit"]
        domains: [straight-line-system]
        source: "Main Course/01 + Multiple"

      - id: "MET-JB-002"
        content: "The Looping Process (Step-by-Step)"
        steps: ["1) Prospect objects (any objection)", "2) Deflect: 'I hear you. Does the idea make sense?'", "3) If yes: 'Exactly. If you'd known me for years, you'd probably say yes, right?'", "4) Get agreement", "5) 'Well, let me tell you about myself...' — rebuild Ten 2 (you)", "6) 'And as far as my company goes...' — seamless transition to Ten 3", "7) Ask for order again with different language pattern", "8) If new objection: acknowledge, run second loop with emotional content + 'what's the worst?'", "9) Lower action threshold (guarantee, risk reversal)", "10) If still not closing: amplify pain + future pace", "11) Ask for order again"]
        domains: [looping, objection-handling]
        source: "SLSC Week 10 Looping Demo"

      - id: "MET-JB-003"
        content: "Action Threshold Lowering Technique (Making Them Run a Different Movie)"
        steps: ["1) Ask: 'What's the WORST that can possibly happen?'", "2) Minimize downside: 'Is that gonna put you in the poorhouse?' (No)", "3) 'Exactly.'", "4) Maximize upside: 'Let's say I'm RIGHT, and you make Y...'", "5) Frame as benchmark: 'Show you I put you in at right time'", "6) Future pace the relationship: 'After 2-3 base hits, YOU'RE gonna demand home runs'", "7) Down-sell if needed: 'Start off small — firm minimum is Y'"]
        domains: [action-threshold, closing]
        source: "SLSC Week 10 Looping Demo"

      - id: "MET-JB-004"
        content: "State Management / Anchoring Process"
        steps: ["1) Recall peak emotional state", "2) Re-experience fully — see, feel, hear everything", "3) At peak, make specific physical gesture (fist pump, snap)", "4) Repeat 10-20 times", "5) Before every call/meeting, fire anchor", "6) Maintain by focusing only on solutions"]
        domains: [state-management, anchoring]
        source: "SLSC Week 3"

      - id: "MET-JB-005"
        content: "Pain Threshold Amplification Technique"
        steps: ["1) During intelligence gathering, ferret out WHERE their pain is", "2) Ask questions revealing frustrations, unmet needs, costs of inaction", "3) If prospect close but won't close after three tens + AT: amplify pain elegantly", "4) Make them visualize continued pain if they DON'T act", "5) Present your solution as the bridge from pain to goals", "6) Ask for the order"]
        domains: [pain-threshold, closing]
        source: "SLSC Week 1 + Week 10"

      - id: "MET-JB-006"
        content: "Referral Generation System"
        steps: ["1) Close with MASSIVE certainty (not barely exceeding AT)", "2) Immediately ask for referrals ON THE SPOT", "3) Position as helping others", "4) Get specific names and contact info right then", "5) Follow up with referrals mentioning the source", "6) Continue asking at every touchpoint", "7) Identify Triple-A referrers (20-50+ leads)"]
        domains: [referrals, customer-retention]
        source: "SLSC Week 12 + Main Course/12"

      - id: "MET-JB-007"
        content: "Script Writing Process (10 Rules)"
        steps: ["1) Use correct structure (Intro, Body, Close with transitions)", "2) Use correct sound (colloquialisms, natural speech)", "3) Paint pictures with comparisons and metaphors", "4) Reread 100 times, practice out loud", "5) Use correct balance (syllables, beats, pauses)", "6) First 5 words must create right mental picture", "7) Don't frontload — save best for after the fact", "8) Be honest and ethical", "9) Keep script interactive (don't preach)", "10) Create urgency in last paragraph, go into soft close with 'fair enough?'"]
        domains: [scripting]
        source: "Script Builder SB4"

      - id: "MET-JB-008"
        content: "Script Building Workshop Process (16 Steps)"
        steps: ["1) Write 3 best opening introductions", "2) Choose the single BEST one", "3) Role-play until it flows", "4) Write transition to intelligence gathering", "5) Organize qualifying questions (big to small, less to more invasive)", "6) Practice transition + questions", "7) Write main body: 5-7 feature/benefit patterns", "8) Order most-logical-first", "9) Add check-ins after each", "10) Add trustworthy figure links and success stories", "11) FRONT-LOAD first draft", "12) Whittle down to 3-4 core packages", "13) Add urgency creation", "14) Add Energy In/Benefits Out positioning", "15) Write direct close language", "16) Practice until memorized but sounds natural"]
        domains: [scripting]
        source: "Main Course/08"

      - id: "MET-JB-009"
        content: "Intelligence Gathering Methodology (5 Categories)"
        steps: ["1) SITUATION questions: 'Tell me about your current situation with X'", "2) PAIN questions: 'What's your biggest challenge?'", "3) IMPLICATION questions: 'How is that affecting your business/life?'", "4) DESIRE questions: 'In an ideal world, what would you want?'", "5) QUALIFICATION questions: 'Would you be in a position to move forward?'", "Each serves dual purpose: gathers intelligence AND builds rapport"]
        domains: [intelligence-gathering, prospecting]
        source: "Weekly Training E53 + E28"

      - id: "MET-JB-010"
        content: "How to Respond to 'I Want to Think About It'"
        steps: ["1) Don't challenge or pressure", "2) Say 'I hear you' + 'Does the idea make sense to you?'", "3) Listen to TONALITY not just words", "4) Gauge certainty (sounds pretty good = 5-6)", "5) Enter their world at THEIR level", "6) Loop back with more poignant follow-up", "7) Re-test certainty", "8) When logical certainty screaming, shift to emotional"]
        domains: [objection-handling, looping]
        source: "Main Course/01 + Rebuttals Guide"

      - id: "MET-JB-011"
        content: "Belief Destruction and Replacement Process"
        steps: ["1) Identify disempowering belief", "2) Write what it has COST you (3 items)", "3) Write what it will cost in FUTURE if you continue", "4) Crack the legs the belief stands on (challenge every reference)", "5) Replace with empowering belief", "6) Lock in through repetition and evidence"]
        domains: [beliefs, mindset]
        source: "Inner Game of Wealth + SLSC Week 11"

      - id: "MET-JB-012"
        content: "Timeline Regression for Limiting Beliefs (NLP)"
        steps: ["1) Identify specific limiting belief", "2) Go back to find root experience (earliest memory)", "3) List 5 reference experiences that reinforced it", "4) Write 5 negative consequences", "5) Write 5 positive outcomes of empowering opposite", "6) Find quiet space (20 minutes)", "7) Close eyes, draw timeline past to future", "8) Float up above in dissociated helicopter bubble", "9) Create safety sandwich (safe before + safe after)", "10) Float to root experience, observe from above", "11) Change the MEANING of the experience", "12) Float back to present with new meaning", "13) Step into future with empowering belief", "14) Open eyes — belief has shifted"]
        domains: [beliefs, NLP]
        source: "Main Course/11-Beliefs (from Dr. Richard Bandler)"

      - id: "MET-JB-013"
        content: "Vision Statement Creation Process"
        steps: ["1) Drop all limiting beliefs and negative voices", "2) Think BIG — give yourself benefit of future growth", "3) Write in present tense with -ING gerunds", "4) Cover ALL areas: business, income, relationships, health, community", "5) Make it vivid — see yourself dressed, acting, feeling", "6) Test: does reading it make hairs stand up? If no, rewrite bolder", "7) Identify your WHY at deepest level", "8) Visualize in DISSOCIATED state", "9) Put on phone screensaver", "10) Read and review DAILY"]
        domains: [vision, goal-setting]
        source: "Main Course/07-Vision"

      - id: "MET-JB-014"
        content: "Standards Elevation Methodology"
        steps: ["1) GET HONEST: 'Do I have a problem?'", "2) IDENTIFY: 'What will I NOT settle for less than?' (write exact number)", "3) COMPARE: Does standard match vision?", "4) AMPLIFY PAIN: What has low standard cost me?", "5) AMPLIFY PLEASURE: What would new standard give me?", "6) DRAW LINE IN SAND", "7) USE DUAL LEVERS: pain + pleasure", "8) DAILY REINFORCEMENT", "9) WALK YOUR TALK"]
        domains: [standards, self-improvement]
        source: "Main Course/09-Standards"

      - id: "MET-JB-015"
        content: "The 4-Second Opening Methodology"
        steps: ["1) Say name and company in 2 seconds with ENTHUSIASM tonality", "2) State reason for calling in 2 seconds with MYSTERY tonality", "3) Bridge to qualifying: 'Let me ask you a quick question...' with REASONABLE MAN tonality", "Result: sound sharp, enthusiastic, expert — all in 4 seconds without words conveying them"]
        domains: [opening, tonality]
        source: "Weekly Training E28"

      - id: "MET-JB-016"
        content: "The Either-Or Appointment Setting Method"
        steps: ["1) 'I'm checking my calendar...' (pause)", "2) Offer exactly 2 options: 'Tuesday or Thursday?'", "3) If both rejected, offer 2 MORE", "4) Once day selected, narrow to time", "5) Confirm and promise reminder", "NEVER say 'When's a good time for you?'"]
        domains: [appointment-setting, closing]
        source: "Weekly Training E21"

      - id: "MET-JB-017"
        content: "The Deflection-Rebuttal-Loop Methodology"
        steps: ["Objection #1: DEFLECT — 'Does the idea make sense?' Then Loop #1 (re-present Three Tens)", "Objection #2: REBUTTAL — answer head-on + 'In fact, let me say this...' + Loop #2 (new benefits)", "Objection #3: REBUTTAL #2 + urgency/bonus + Loop #3 (final close)"]
        domains: [looping, objection-handling]
        source: "Weekly Intensive 04/2019"

      - id: "MET-JB-018"
        content: "The Follow-Up Compliance Method"
        steps: ["1) Call: 'I noticed we haven't received your paperwork'", "2) If excuse, LOOP back — re-present key benefits", "3) Offer incentive for same-day completion", "4) Reduce friction — electronic signatures, walk through on phone", "5) Nuclear option: send physical messenger ($150 cost, 98% compliance)"]
        domains: [follow-up, closing]
        source: "Weekly Intensive 04/2019"

      - id: "MET-JB-019"
        content: "The Gatekeeper Penetration Method (Multi-Touch)"
        steps: ["Touch 1: Ask for decision maker by first name", "Touch 2: Call at different time, reference previous call", "Touch 3: Build relationship with gatekeeper", "Touch 4-5: Continue building, ask for recommendation", "Touch 6: Go above (CEO office) OR show up in person", "Touch 7: Show up with coffee/gift, wait in lobby"]
        domains: [prospecting, gatekeepers]
        source: "Weekly Training E26"

      - id: "MET-JB-020"
        content: "The Tonality Practice Method"
        steps: ["1) Record yourself reading script (3 min)", "2) Play back and mark flat/mismatched tonality", "3) Re-record, exaggerating each tonality intentionally", "4) Record third time, dialing back to natural but improved", "5) Practice tonality shift (change tone every 5-8 seconds)", "6) Role-play with partner, have them rate 1-10"]
        domains: [tonality, practice]
        source: "Weekly Training E45"

      - id: "MET-JB-021"

        source: "SLP/Module_03_Tonality"

      - id: "FIL-JB-091"
        content: "Money matters. Anyone who tells you it doesn't is full of crap — they never had any. Money is not evil. Rich is good. When you're rich you can donate the X-ray machine to the hospital, build the wing, retire the people you love."

      - id: "FIL-JB-042"
        content: "Making a ton of money quickly and having ethics and integrity are not mutually exclusive — you can have both"
        domains: [sales-ethics, wealth-psychology]
        source: "Weekly Intensive 04/2019"

      - id: "FIL-JB-043"
        content: "The straight line is not the old consultative selling model and it's not the hard close model. Both are bullshit. It's the only logically cohesive model"
        domains: [straight-line-system]
        source: "Weekly Training E24"

      - id: "FIL-JB-044"
        content: "Looping is not just a technique — it's the essence of influence itself: representing your case again and again from different angles until the person reaches absolute certainty"

        source: "SLP/Module_04_Being_A_Visionary"

      - id: "FIL-JB-090"
        content: "There is no amount of poverty you can have to make one person wealthy. There is no amount of sadness to make one person happy. Get as much of those gifts as you can for yourself and spread them around."

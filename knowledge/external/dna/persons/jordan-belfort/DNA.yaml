        domains: [influence, mindset, personal-development]
        source: "SLP/Module_01_Three_Tenets"

      - id: "FIL-JB-102"
        content: "Never ask a salesperson to do something you wouldn't do yourself. They won't respect you. You can't perform at the highest level as a manager unless you've done it yourself."
        domains: [sales-leadership, management, credibility]
        source: "SLP/Module_03_Tonality"

  L2_MENTAL_MODELS:
    count: 83
    items:
      - id: "MM-JB-001"
        content: "The Straight Line — sales is a straight line from Open to Close, with healthy boundaries above and below. On the line = you're talking. Off the line (within boundaries) = rapport building + intelligence gathering. Outside boundaries = losing control"
        domains: [straight-line-system]
        source: "Main Course/01 + Weekly Training E28"

      - id: "MM-JB-002"
        content: "The Certainty Scale (1-10) — every prospect's level of certainty measured on 1-10 for each of the Three Tens. Enter encounter at 4-6 typically. Goal is to move all three to 10"
        domains: [certainty-science, three-tens]
        source: "Main Course/01 + 10-Looping"

      - id: "MM-JB-003"
        content: "The Combination Lock / Safe Metaphor — closing a sale is like cracking a safe with a 5-number combination. Numbers must be entered in order. Miss one = safe won't open"
        domains: [straight-line-system, five-core-elements]
        source: "Main Course/01 + SLSC Week 1"

      - id: "MM-JB-004"
        content: "The Scales Metaphor — balance scale in prospect's mind. One side = reasons to buy NOW, other side = reasons NOT to buy. Fulcrum position determines action threshold"
        domains: [action-threshold, buying-psychology]
        source: "Main Course/01 + Script Builder SB2"

      - id: "MM-JB-005"
        content: "The Off-Center Fulcrum — high action threshold = fulcrum is off-center, giving massive leverage to negatives. Lowering AT = moving fulcrum to center. Pain threshold = moving fulcrum to opposite side"
        domains: [action-threshold, pain-threshold]
        source: "Main Course/01 + Weekly Training"

      - id: "MM-JB-006"
        content: "The Valve Metaphor — emotional state functions like a valve. Empowered = valve open, resources flow freely. Disempowered = valve closes, can't access your own abilities"
        domains: [state-management]
        source: "Main Course/03-State Management"

      - id: "MM-JB-007"
        content: "Logical Mind as Human Bullshit Detector — if you try to move someone emotionally without first satisfying their logical mind, it blocks the emotional appeal. Logical case MUST be established first"
        domains: [sales-psychology, certainty-science]
        source: "Main Course/01"

      - id: "MM-JB-008"
        content: "Old Model vs New Model vs Straight Line — Old Model (10% rapport, 40% closing = ABC hard-charging). Consultative (40% relationships, 10% closing). BOTH are wrong. Straight Line = fluid, everything simultaneous"
        domains: [straight-line-system]
        source: "Main Course/01"

      - id: "MM-JB-009"
        content: "The Movie Running Model — high AT people run a long negative mental movie about what could go wrong and a short positive movie. Low AT people do the opposite. Your job is to make them run a different, more positive movie"
        domains: [action-threshold, visualization]
        source: "SLSC Week 10 Looping Demo"

      - id: "MM-JB-010"
        content: "Four Levels of Learning — 1) Unconsciously Incompetent, 2) Consciously Incompetent, 3) Consciously Competent, 4) Unconsciously Competent (automatic mastery)"
        domains: [learning, skill-acquisition]
        source: "Daily Motivations + SLSC"

      - id: "MM-JB-011"
        content: "Conscious vs Unconscious Communication — Words = conscious (10-15%). Tonality (40-50%) + Body Language (40-50%) = unconscious. Unconscious bypasses conscious filters, hits the gut"
        domains: [unconscious-communication, tonality, body-language]
        source: "Main Course/02 + Weekly Training E28"

      - id: "MM-JB-012"
        content: "Front Half vs Back Half of the Sale — Front Half = opening, rapport, intelligence, presentation, first close. Back Half = objection handling, looping, re-presenting, closing 2-3+. Different rules for each"
        domains: [straight-line-system, looping]
        source: "Main Course/10-Looping + Weekly Training E24"

      - id: "MM-JB-013"
        content: "Energy In vs Energy Out — every action costs energy (Energy Out). Benefits = Energy In. Prospect buys when perceived Energy In exceeds perceived Energy Out"
        domains: [buying-psychology, sales-psychology]
        source: "Main Course/08 + Weekly Training E21"

      - id: "MM-JB-014"
        content: "Vision vs Goals — Vision = higher-level emotional target, no fixed end date, represents best future self. Goals = specific measurable stops with dates. Goals serve the vision, not the other way around"
        domains: [vision, goal-setting]
        source: "Main Course/07-Vision + Inner Game"

      - id: "MM-JB-015"
        content: "Bifurcated Focus — keep one eye locked on your vision with laser-guided precision, while the other eye scans the horizon for opportunities"
        domains: [vision, strategy]
        source: "Main Course/07-Vision + SLSC Week 7"

      - id: "MM-JB-016"
        content: "Cycle of Beliefs — Pure Potential -> Actions -> Results -> Beliefs -> back to Actions. Limiting beliefs create a governor on potential, reducing actions, producing poor results, reinforcing the belief"
        domains: [beliefs, mindset]
        source: "Main Course/11-Beliefs (from Dr. Richard Bandler/NLP)"

      - id: "MM-JB-017"
        content: "Experts vs Novices — Experts say smart shit, sometimes bullshit, occasionally shoot the shit, but NEVER say stupid shit (reserved for novices). Scripts make novices sound like experts"
        domains: [scripting, authority]
        source: "Main Course/08-Script Building"

      - id: "MM-JB-018"
        content: "Standards as Thermostat — your standard acts like a thermostat: it dictates what you'll settle for. You always do what you have to do to hit your standard, no more"
        domains: [standards, mindset]
        source: "Main Course/09-Standards"

      - id: "MM-JB-019"
        content: "Dissociated vs Associated Visualization — Dissociated = seeing yourself from above (powerful for motivation). Associated = stepping inside your body and looking through your eyes (powerful for triggering emotional states)"
        domains: [visualization, state-management]
        source: "Main Course/07-Vision"

      - id: "MM-JB-020"
        content: "Buyers in Heat vs Buyers in Power — Heat = actively want/need product NOW. Power = have authority and money but aren't urgently motivated. Best prospects are BOTH"
        domains: [prospecting, qualifying]
        source: "Main Course/06-Prospecting"

      - id: "MM-JB-021"
        content: "The Sales Funnel as Metrics Engine — diagnostic tool where every level has a conversion ratio. Identify weakest ratio and improve there. Small improvements at top cascade into massive results at bottom"
        domains: [prospecting, sales-metrics]
        source: "Main Course/06-Prospecting"

      - id: "MM-JB-022"
        content: "Tonality as Inner Monologue Paralyzer — layering tonalities forces the prospect to process extra implied words, paralyzing their internal critical monologue and allowing you to take control"
        domains: [tonality, influence]
        source: "Main Course/04-Advanced Tonality"

      - id: "MM-JB-023"
        content: "The Law of Congruency (Package Wrapping) — your appearance must match what the world expects an expert in your field to look like. Dress congruent with your industry's expert archetype"
        domains: [body-language, first-impressions]
        source: "Main Course/05-Body Language"

      - id: "MM-JB-024"
        content: "The Gatekeeper Mental Model — gatekeepers have 3 core fears: (1) Looking bad to boss, (2) Interrupting boss unnecessarily, (3) Being seen as easily manipulated. Address these fears to get through"
        domains: [prospecting, gatekeepers]
        source: "Weekly Training E26"

      - id: "MM-JB-025"
        content: "Above-the-Target Strategy — when you can't get through a gatekeeper, go ABOVE them. Call the CEO's office and get referred down — now you have an internal referral"
        domains: [prospecting, gatekeepers]
        source: "Weekly Training E26"

      - id: "MM-JB-026"
        content: "The Certainty Waning Principle — certainty is like a leaky bucket. The moment you stop filling it, it starts draining. Follow-up calls are harder because you must rebuild from a lower starting point"
        domains: [certainty-science, follow-up]
        source: "Weekly Intensive 04/2019"

      - id: "MM-JB-027"
        content: "The Expert Frame — experts don't ask 'What do you think?' They tell you what to do, speak in definite terms: how much to buy, when, what payment structure, exact next steps"
        domains: [authority, closing]
        source: "Weekly Intensive 04/2019"

      - id: "MM-JB-028"
        content: "Pattern Interrupts — in the first 4 seconds you must break the prospect's expected pattern. They expect boring/generic; be sharp, enthusiastic, and different to create curiosity"
        domains: [first-impressions, opening]
        source: "Weekly Training E28"

      - id: "MM-JB-029"
        content: "State Management as Foundation — your internal emotional state determines everything about sales performance. Wrong state = every technique fails. Right state = even mediocre technique works"
        domains: [state-management]
        source: "Weekly Training E43"

      - id: "MM-JB-030"
        content: "The Invisible Thread — in every conversation, there's an invisible thread of rapport connecting you to the prospect. Every word and signal either strengthens or weakens it. If it snaps, the sale is over"
        domains: [rapport, unconscious-communication]
        source: "Weekly Training E42"

      - id: "MM-JB-031"
        content: "Consistency Principle (Micro-Agreements) — people want to remain consistent with things they've said. Getting repeated 'yes' and 'makes sense' develops a habit of agreement that builds through looping"
        domains: [influence, micro-agreements]
        source: "Weekly Training Building the Perfect Script"

      - id: "MM-JB-032"
        content: "The Ferris Bueller Tonality Model — on one end is the monotone teacher (worst), on the other is a master persuader. Everyone falls somewhere between. You've already used every required tonality in your life, just not on command"
        domains: [tonality]
        source: "Daily Motivations"

      - id: "MM-JB-033"
        content: "Lifetime Value of Customer — even if opening transaction loses money, future business can yield 10x-100x over customer lifetime. Must manage cash flow though"
        domains: [customer-retention, sales-metrics]
        source: "Daily Motivations + Main Course/12"

      - id: "MM-JB-034"
        content: "Perception as Reality — prospect creates a mental image of you in the first seconds. Even on phone, your appearance and state affect your voice. Like a busy doctor with authority"
        domains: [first-impressions, unconscious-communication]
        source: "Rebuttals Guide + SLSC Week 5"

      - id: "MM-JB-035"
        content: "The Dream-Stomper Model — people who stomp on your vision: (1) Those you can remove -> remove immediately, (2) Those you cannot (family) -> silence them for 90 days"
        domains: [vision, relationships]
        source: "Main Course/07-Vision Lesson 6"

      - id: "MM-JB-036"
        content: "Forrest Gump Pattern — when someone doesn't trust you (second Ten), break the deadlock by introducing yourself first to create reciprocity"
        domains: [rapport, trust-building]
        source: "Main Course/10-Looping"

      - id: "MM-JB-037"
        content: "Capability Beliefs — a specific class of beliefs about what we're capable of achieving. Different from general beliefs. These determine whether you even ATTEMPT something"
        domains: [beliefs, capability-beliefs]
        source: "Main Course/11-Beliefs + Weekly Training"

      - id: "MM-JB-038"
        content: "The House-Building Metaphor — presentation is like building a house: foundation, frame, roof, electrical/plumbing, drywall. No single element is more important — must be layered in right order"
        domains: [scripting, presentation]
        source: "Weekly Intensive 04/2019"

      - id: "MM-JB-039"
        content: "Logical vs Emotional Certainty — Logical = features, benefits, cost-benefit (A to Z connection, they can explain WHY to others). Emotional = future pacing, imagining life after purchase with pain resolved"
        domains: [certainty-science, persuasion]
        source: "Main Course/07 + Main Course/01"

      - id: "MM-JB-040"
        content: "Inertia Model — Newton's law applied to behavior: object at rest stays at rest. Getting started requires more force than continuing. First step is hardest. Once moving, self-perpetuating"
        domains: [mindset, action-threshold]
        source: "Main Course/07-Vision"

      - id: "MM-JB-041"
        content: "The Straight Line as Navigation System — like GPS, you need: (1) accurate starting point (know where your standard really is) and (2) accurate destination (your vision). The system is the software"
        domains: [straight-line-system, standards]
        source: "Main Course/09-Standards"

      - id: "MM-JB-042"
        content: "Positive Intent Pattern — humans make decisions based on positive intent. They only say yes when they believe it will enhance their life. They never intentionally buy things they believe will make life worse"
        domains: [buying-psychology, positive-intent]
        source: "Main Course/10-Looping"


      - id: "MM-JB-043"
        content: "The Fishing Model (WHO-WHERE-BAIT-WHAT) — 1) WHO is your target, 2) WHERE do they hang out, 3) BAIT they want, 4) WHAT to do with them in funnel"
        domains: [traffic-acquisition, targeting]
        source: "SLM/Module 2"

      - id: "MM-JB-044"
        content: "Offline-to-Online Evolution — same methodology, different delivery: newspaper ad→phone call→mailed letter becomes website→squeeze page→email→sales letter"
        domains: [digital-marketing, marketing-evolution]
        source: "SLM/Module 2"

      - id: "MM-JB-045"
        content: "Customer as Mathematical Relationship — if I can spend $10 to acquire a customer worth $11 to me, competitors can't beat me"
        domains: [customer-economics, competitive-advantage]
        source: "SLM/Module 2"

      - id: "MM-JB-046"
        content: "SLP-to-Copy Translation — offline straight line (open→boundaries→close) translates to copy: headline=open, body=boundaries, CTA=close"
        domains: [copywriting, straight-line-application]
        source: "SLM/Module 3"

      - id: "MM-JB-047"
        content: "Copy as Avatar Conversation — create detailed customer avatar with demographics, pain points, desires; write ALL copy as if speaking to that ONE person"
        domains: [copywriting, customer-avatar]
        source: "SLM/Module 3"

      - id: "MM-JB-048"
        content: "Quarter-In, Two-Quarters-Out Model — put a dollar at the top of the funnel, expect two dollars out; if the math works, scale infinitely"
        domains: [funnel-economics, scaling]
        source: "SLM/Module 4"

      - id: "MM-JB-049"
        content: "Pareto Principle Applied to Customer Value — increasing customer value is the 20% that controls 80% of business results"
        domains: [customer-value, business-strategy]
        source: "SLM/Module 4"

      - id: "MM-JB-050"
        content: "Dan Kennedy's Marketing Triangle — Market (who) + Message (copy) + Media (traffic channel) = all three must work together perfectly"
        domains: [marketing-strategy, marketing-triangle]
        source: "SLM/Module 5"

      - id: "MM-JB-051"
        content: "Sniper vs Shotgun Targeting — customer avatar enables precise targeting vs broad approaches"
        domains: [targeting, customer-avatar]
        source: "SLM/Module 5"

      - id: "MM-JB-052"
        content: "In-Market vs Display Targeting — search targets people actively looking; display pushes to relevant audiences"
        domains: [traffic-acquisition, targeting-modes]
        source: "SLM/Module 5"

      - id: "MM-JB-053"
        content: "Email as Funnel Follow-Up Engine — the primary mechanism for re-engaging prospects who dropped off at any funnel stage"
        domains: [email-marketing, funnel-optimization]
        source: "SLM/Module 6"

      - id: "MM-JB-054"
        content: "Indoctrination Before Selling — first establish the relationship (three 10s via email), then make offers progressively more aggressive"
        domains: [email-marketing, relationship-building]
        source: "SLM/Module 6"

      - id: "MM-JB-055"
        content: "Responsive List vs Dead List — separate hyper-responsive subscribers from non-openers; non-openers hurt deliverability of entire list"
        domains: [email-marketing, list-hygiene]
        source: "SLM/Module 6"

      - id: "MM-JB-056"
        content: "Three Tens Online Looping Model — every non-conversion = failure in one of 3 areas (product, person, company); create separate retargeting campaigns for each"
        domains: [retargeting, three-tens-application]
        source: "SLM/Module 7"

      - id: "MM-JB-057"
        content: "Funnel Drop-Off Diagnosis — identify exactly WHERE in funnel they dropped off, then retarget to that specific page"
        domains: [funnel-optimization, retargeting]
        source: "SLM/Module 7"

      - id: "MM-JB-058"
        content: "Combination Lock Metaphor — keep looping until the safe opens and he buys; each loop is a turn of the dial"
        domains: [looping-online, persistence]
        source: "SLM/Module 7"

      - id: "MM-JB-059"
        content: "Loop Tightening Model — each successive loop is tighter: Loop 1=product heavy, Loop 2=self/trust, Loop 3=company/integrity"
        domains: [looping-online, escalation]
        source: "SLM/Module 7"

      - id: "MM-JB-060"
        content: "Counter vs Innovator Model — be a counter-puncher, not an innovator; let competitors test and fail, then adopt what works"
        domains: [competitive-intelligence, strategy]
        source: "SLM/Module 8"

      - id: "MM-JB-061"
        content: "Customer Worth Asymmetry — if your customer is worth more to you than to competitors (because of funnels), you can outspend everyone"
        domains: [competitive-advantage, funnel-economics]
        source: "SLM/Module 8"

      - id: "MM-JB-062"
        content: "Offline-to-Online Hybrid Model — start conversation offline (newspaper, mail, radio, TV) → drive to simple URL → enter online SLM funnel"
        domains: [hybrid-marketing, offline-to-online]
        source: "SLM/Module 9"

      - id: "MM-JB-063"
        content: "Online-to-Offline Model — generate leads online (lead gen with phone) → pass to SLP-trained sales team → close high-ticket over phone/face-to-face"
        domains: [hybrid-marketing, high-ticket]
        source: "SLM/Module 9"

      - id: "MM-JB-064"
        content: "B2B vs B2C Media Selection — B2B = 3D mail (gets past gatekeepers); B2C = postcards (volume play). Never swap them"
        domains: [media-selection, B2B-marketing]
        source: "SLM/Module 9"

      - id: "MM-JB-065"
        content: "Broadcast Strategy (Pay-to-Play Radio) — buy your own radio show → invite Dream 100 as guests → build authority + relationships"
        domains: [authority-building, Dream-100]
        source: "SLM/Module 9"

      - id: "MM-JB-066"
        content: "SLO Conversion Engine — Self-Liquidating Offer converts prospects to buyers cheaply; buyers are 10-20x more likely to buy again"
        domains: [sales-funnels, SLO-strategy]
        source: "SLM/Module 10"

      - id: "MM-JB-067"
        content: "The Secret Formula — WHO (ideal customer) → WHERE (traffic source) → BAIT (lead magnet/SLO) → WHAT (core offer + upsells)"
        domains: [marketing-strategy, funnel-design]
        source: "SLM/Module 10"

      - id: "MM-JB-068"
        content: "Defensible Business Model — a business is defensible only if it can outspend competitors on customer acquisition"
        domains: [business-strategy, competitive-moat]
        source: "SLM/Module 4"

      - id: "MM-JB-069"
        content: "Market Growth + Skill Growth = Compound Growth — personal marketing skill growth compounds with upward market trend"
        domains: [market-selection, growth-strategy]
        source: "SLM/Module 8"

      - id: "MM-JB-070"
        content: "Action Threshold in Copy — online through copy you knock out negatives, build up positives, and change beliefs about buying simultaneously without them knowing it"
        domains: [copywriting, buying-psychology]
        source: "SLM/Module 3"

      - id: "MM-JB-071"
        content: "Gold Prospector Model: A prospector doesn't try to turn water into gold — he sifts through thousands of gallons looking for one nugget. Don't try to turn non-buyers into buyers. Find the nuggets."
        domains: [prospecting, qualification, sales-efficiency]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "MM-JB-072"
        content: "The Scale Model of Buying: A fulcrum in the middle with positives on one side, negatives on the other, and the invisible force of limiting buying beliefs weighing down the negative side. Your job is to build positives, knock out negatives, and change beliefs simultaneously."
        domains: [sales-psychology, closing, persuasion]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "MM-JB-073"
        content: "Helicopter Auto-Rotation Model: When diving, don't look at the ground (your problems) — look forward at where you want to go. Human nature forces us to stare at what we fear, and we crash into it. You must condition a new pattern to look ahead."
        domains: [focus, fear-management, state-management]
        source: "SLP/Module_05_Inner_Game"

      - id: "MM-JB-074"
        content: "Wake-Boat Model: The wake (your past) does not drive the boat. What drives it is the captain (you), your focus (where you're looking), and the engine (your actions). Stop looking behind at the foamy white water."
        domains: [mindset, focus, forward-momentum]
        source: "SLP/Module_05_Inner_Game"

      - id: "MM-JB-075"
        content: "McDonald's System Model: McDonald's is the most successful restaurant not because the food is best, but because its system is so simple a 16-year-old can run it. A turnkey system anyone can step into with little training always wins over brilliance without a system."
        domains: [systems-thinking, scalability, sales-management]
        source: "SLP/Module_04_Being_A_Visionary"

      - id: "MM-JB-076"
        content: "The Combination Lock Model for Three 10s: Closing is like opening a combination lock — you need all three numbers (product love, trust in you, trust in company) to align in a single moment in time. Get one click at a time."
        domains: [closing, three-tens, persuasion]
        source: "SLP/Module_08_Three_10s"

      - id: "MM-JB-077"
        content: "RAS (Reticular Activating System) Model: Your brain deletes, distorts, and generalizes to make sense of the world. When you look for blue, you see blue everywhere. Set goals to ignite your RAS so you start seeing opportunities instead of problems."
        domains: [neuroscience, focus, goal-setting]
        source: "SLP/Module_05_Inner_Game"

      - id: "MM-JB-078"
        content: "Baby-Connection Generalization: As babies we equated attention with love. Some become achievers (love through accomplishment), others problem people (attention through crisis), others pleasers or breakers. Understanding your pattern helps manage fear."
        domains: [psychology, self-awareness, motivation]
        source: "SLP/Module_05_Inner_Game"

      - id: "MM-JB-079"
        content: "Ship Without Captain Model: A ship that leaves Tampa for Spain with a captain reaches its destination 99.9% of the time. Without a captain, nearly 0%. Every sale must have a goal. The captain is your intention, the destination is the close."
        domains: [goal-oriented-selling, strategy, sales-discipline]
        source: "SLP/Module_05_Inner_Game"

      - id: "MM-JB-080"
        content: "The Sergei Effect: When someone sounds wrong on the phone — unsharp, unenthusiastic, not authoritative — the prospect instantly creates a negative mental picture. In seconds, the entire call is sabotaged before content even begins."
        domains: [first-impressions, tonality, phone-sales]
        source: "SLP/Module_02_Art_Of_Prospecting"

      - id: "MM-JB-081"
        content: "Art of Not Blowing It: 95% of salespeople destroy the sale in the first 4 seconds, not in the close. The sale starts the instant you open your mouth, not when you present or close. Not blowing the open IS the first close."
        domains: [opening, first-impressions, sales-discipline]
        source: "SLP/Module_03_Tonality"

      - id: "MM-JB-082"
        content: "Delete-Distort-Generalize Model: Humans delete most information, distort what remains (using words like always, never, biggest), and generalize patterns. Use this in selling: ignite their RAS to see positives, let them generalize that you're trustworthy because you sound trustworthy."
        domains: [nlp, persuasion, neuroscience]
        source: "SLP/Module_05_Inner_Game"

      - id: "MM-JB-083"
        content: "Three Fear Management Strategies: (1) Pretend fear doesn't exist — leads to complete disempowerment. (2) Act in spite of fear — creates wealth but also anxiety. (3) Understand and accept fear — the only path to empowered success."
        domains: [fear-management, psychology, personal-development]
        source: "SLP/Module_05_Inner_Game"

  L3_HEURISTICS:
    count: 131
    items:
      - id: "HEUR-JB-001"
        content: "First 4 seconds rule — you must establish 3 things in the prospect's mind: 1) You're sharp as a tack, 2) Wildly enthusiastic, 3) A force to be reckoned with / expert"
        threshold: "4 seconds"
        domains: [first-impressions, opening]
        source: "SLSC Week 2 + Script Builder + Main Course/02"

      - id: "HEUR-JB-002"
        content: "Quarter-second in person — you're judged in 0.25 seconds in person (occipital lobe to prefrontal cortex)"
        threshold: "0.25 seconds"
        domains: [first-impressions, body-language]
        source: "Main Course/02-Unconscious Communication"

      - id: "HEUR-JB-003"
        content: "There are only 14 objections, not thousands — half are variations of two themes (consult someone else, bad timing)"
        threshold: "14 objections total"
        domains: [objection-handling]
        source: "Main Course/00-Introduction"

      - id: "HEUR-JB-004"
        content: "10-10-10 certainty rule — all three tens must be near 10 for close. Below 5-6 on any ten = no shot at closing"
        threshold: "10/10/10 target, 5-6 minimum"
        domains: [three-tens, closing]
        source: "Main Course/01 + SLSC Week 1"

      - id: "HEUR-JB-005"
        content: "91% vs 9% phone rule — on phone, only 9% of impact comes from words, 91% from tone of voice"
        threshold: "91/9 split"
        domains: [tonality, phone-sales]
        source: "Script Builder SB4"

      - id: "HEUR-JB-006"
        content: "72% eye contact rule — make direct eye contact approximately 72% of the time for optimal trust"
        threshold: "72%"
        domains: [body-language]
        source: "Script Builder SB4"

      - id: "HEUR-JB-007"
        content: "5-7 asks rule — ask for the order 5 to 7 times elegantly, not the same way each time. Need 6-7 different language patterns"
        threshold: "5-7 close attempts"
        domains: [closing, looping]
        source: "SLSC Week 10 Looping Demo"

      - id: "HEUR-JB-008"
        content: "Maximum 3-4 loops per encounter — more than that risks breaking rapport and becoming a pusher"
        threshold: "3-4 loops max"
        domains: [looping, objection-handling]
        source: "Multiple trainings"

      - id: "HEUR-JB-009"
        content: "10 tonalities rule — there are only 10 core tonalities to master for influence. You've already used them all in life, just not on command"
        threshold: "10 tonalities"
        domains: [tonality]
        source: "SLSC Week 4 + Main Course/04"

      - id: "HEUR-JB-010"

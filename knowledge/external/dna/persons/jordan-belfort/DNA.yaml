        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_01_Introduction"

      - id: "FIL-JB-128"
        content: "The greatest myth in sales is that it's about turning no into yes. In reality you rarely hear an outright no — you hear 'let me think about it.'"

        source: "SLSP/1-Inner-World/3-State-Management/mp4_1_Introduction"

      - id: "FIL-JB-119"
        content: "We were all born great. Then came day two of our lives — we were conditioned down for mediocrity by society, insults, and being told we are not capable."

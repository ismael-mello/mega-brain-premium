      - id: "FIL-JB-030"
        content: "It's not greed that is good, it's ambition — when you focus only on greed, ethics are the first thing to go out the window"
        domains: [sales-ethics, wealth-psychology]
        source: "Inner Game of Wealth"

      - id: "FIL-JB-031"
        content: "Influence and persuasion is the essence of living an empowered life — anyone who tells you differently is full of it"
        domains: [influence, mindset]
        source: "SLSC Week 11"

      - id: "FIL-JB-032"
        content: "The sale really begins when you get hit with your first objection — and it begins anew once they say yes"
        domains: [objection-handling, customer-retention]
        source: "SLSC Week 12"

      - id: "FIL-JB-033"
        content: "Two types of salespeople in every transaction — the broker and the prospect. If they buy, they bought your presentation. If they don't, you bought theirs"
        domains: [sales-psychology, closing]
        source: "Rebuttals Guide"

      - id: "FIL-JB-034"
        content: "Sound like a million dollar producer and you will become one — act like one, dress like one, speak like one, you will feel like one"

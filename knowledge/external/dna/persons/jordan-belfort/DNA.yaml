      # --- L5 METHODOLOGIES (SLPFT) ---

      - id: "MET-JB-076"
        content: "Fast Track Spaced Repetition Learning Method"
        steps: ["1) Week 1: Learn core concepts (straight line, tonality, body language, first 4 seconds)", "2) Week 2: Apply rapport and inner game principles in live situations", "3) Week 3: Implement outer game (scripting, looping, closing patterns)", "4) Week 4: Review, reinforce, integrate — test everything in real sales", "5) After 4 weeks: The system becomes unconscious competence"]
        domains: [training, learning, sales-team-training]
        source: "SLPFT/1-Introduction/1-Introduction"

      - id: "MET-JB-077"
        content: "Script Writing 5-Step Process"
        steps: ["1) Brainstorm all possible responses, objections, and scenarios", "2) Record yourself doing practice runs (audio or video)", "3) Rank responses by effectiveness (what moves the sale forward?)", "4) Review and refine — cut anything that doesn't serve the close", "5) Find an expert to critique and polish (mentor, top performer, or coach)"]
        domains: [scripting, training]
        source: "SLPFT/4-Outer-Game/4-Action-Worksheet"

      - id: "MET-JB-078"
        content: "Body Language Rapport Building Sequence"
        steps: ["1) Stance: Stand/sit at slight angle (never directly face-to-face, which is confrontational)", "2) Handshake: Match their grip strength exactly — never dominate or submit", "3) Eye contact: 72% rule — maintain eye contact 72% of the time, breaking briefly to avoid intimidation", "4) Personal space: Start at social distance (4-7 feet), read their comfort signals, adjust", "5) Match breathing rhythm within first 30 seconds", "6) Mirror their body position subtly (not mimicking — lagged mirroring)", "7) Pace first, then lead — once rapport is established, shift posture and they'll follow"]
        domains: [body-language, rapport, NLP]
        source: "SLPFT/2-Rapport/3-Power-of-Rapport-eBook"

      - id: "MET-JB-079"
        content: "Certainty Building Sequence with Decay Prevention"
        steps: ["1) Build logical certainty first (facts, features, benefits, case studies)", "2) Build emotional certainty (future pacing, pain-away, pleasure-toward)", "3) Verify Three 10s alignment (product + you + company)", "4) Monitor for certainty decay — if prospect pauses too long, re-engage", "5) Use tonality shifts to maintain emotional engagement during logical delivery", "6) Close IMMEDIATELY when certainty peaks — do not over-sell past the peak", "7) If certainty wanes after first close attempt, loop back to rebuild (never start from scratch)"]
        domains: [certainty-transfer, closing, looping]
        source: "SLPFT/4-Outer-Game/1-Outer-Game-of-Sales + 2-Strategies-Live"

      - id: "MET-JB-080"
        content: "Permission-Based Intelligence Gathering"
        steps: ["1) Establish expert authority in first 4 seconds (sharp, enthusiastic, expert)", "2) Ask permission: 'Let me ask you a couple of quick questions so I can best serve you'", "3) Start with big picture questions (goals, situation, timeline)", "4) Narrow to specific questions (budget, decision process, past attempts)", "5) Use each answer to demonstrate expertise ('That's a great point, and here's why that matters...')", "6) Gather intelligence AND build rapport simultaneously — never just interrogate", "7) Transition from questions to presentation seamlessly: 'Based on what you've told me...'"]
        domains: [prospecting, rapport, scripting]
        source: "SLPFT/1-Introduction/4-Action-Worksheet + 4-Outer-Game/2-Strategies-Live"

      - id: "MET-JB-081"
        content: "State Management Pre-Call Ritual"
        steps: ["1) Choose target state (certainty + enthusiasm)", "2) Change physiology: stand up, power posture, deep breathing", "3) Focus on your best close ever — relive it in full sensory detail", "4) Intensify: see it, hear it, feel it, smell it (all modalities)", "5) Set anchor: physical trigger at peak state (fist pump, snap, etc.)", "6) Fire anchor 30 seconds before the call/meeting", "7) First 4 seconds: deploy the 3 requirements (sharp, enthusiastic, expert)"]
        domains: [state-management, NLP, preparation]
        source: "SLPFT/3-Inner-Game/3-eBook + 4-Action-Worksheet"

      - id: "MET-JB-082"
        content: "Power Language Pattern Deployment"
        steps: ["1) 'If you do even half as well as the rest of my clients...' — social proof + low risk", "2) 'All I ask is that you give me one shot...' — reduces commitment fear", "3) 'The only problem you'll have is that I didn't call you six months ago...' — reframes delay as loss", "4) Deploy patterns in sequence during closing loops", "5) Match pattern to prospect's dominant objection type", "6) Always deliver with certainty tonality, never as memorized lines"]
        domains: [scripting, closing, looping, language-patterns]
        source: "SLPFT/4-Outer-Game/5-Summary-Graphic + 4-Action-Worksheet"

      - id: "MET-JB-083"
        content: "10-Point Broke Diagnostic Self-Assessment"
        steps: ["1) Rate yourself 0-10 on each of the 10 Reasons People Are Broke", "2) Scoring is 'golf format' — LOWER is better", "3) 0-20 = Exceptional, 20-40 = Good, 40-60 = Needs work, 60-80 = Serious issues, 80-100 = Critical", "4) Identify your worst 3 scores — these are your priority development areas", "5) Create specific action plan for each of the 3 priority areas", "6) Re-assess monthly to track improvement"]
        domains: [diagnostics, self-assessment, wealth-psychology]
        source: "SLPFT/5-Resources/10-Reasons-People-Are-Broke"


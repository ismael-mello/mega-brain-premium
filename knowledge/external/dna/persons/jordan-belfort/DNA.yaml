        source: "Rebuttals Guide"

      - id: "FIL-JB-035"
        content: "Cash doesn't rally — you owe it to yourself to invest in opportunities that give you a raise in income"
        domains: [wealth-psychology]
        source: "Rebuttals Guide"

      - id: "FIL-JB-036"
        content: "A sale is not a sale until the check clears"
        domains: [closing, follow-up]
        source: "Rebuttals Guide"

      - id: "FIL-JB-037"
        content: "There is no nobility in playing small — play big, live your life big, burn bright"

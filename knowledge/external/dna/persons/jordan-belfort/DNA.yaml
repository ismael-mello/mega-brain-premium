        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_05_Identifying_Needs"

      - id: "FIL-JB-135"
        content: "Be a creator of circumstance, not a creature of circumstance."
        domains: [mindset, proactivity, inner-game]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_9_Close"

      # --- L2 MENTAL MODELS (SLSP) ---

      - id: "MM-JB-091"
        content: "Table/Legs Model of Beliefs — A belief is like a tabletop supported by legs (references/experiences). The more references, the sturdier the belief. You can't break the tabletop directly; you must knock out the legs one by one."
        domains: [belief-psychology, NLP]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_3_Power_of_Beliefs"

      - id: "MM-JB-092"
        content: "Ferrari with a Governor — You can have a 500HP engine but a governor stops you at 55mph. A limiting belief is that governor — it stops you from charging forward."
        domains: [belief-psychology, mindset]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_2_Empowering_Disempowering"

      - id: "MM-JB-093"
        content: "Root Experience Model — All limiting beliefs trace back to a single root experience. By changing the meaning of that root experience, the unconscious mind automatically rearranges the meanings of all subsequent experiences. No need to address each one individually."
        domains: [NLP, belief-psychology, timeline-therapy]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_6_Exercise"

      - id: "MM-JB-094"
        content: "Thermostat Model of Standards — Standards operate like an internal thermostat/set point. When reality drops below your standard, you feel pain and try to return. But if you can't return, you risk lowering your thermostat permanently."
        domains: [standards, mindset]
        source: "SLSP/1-Inner-World/2-Standards/mp4_2_Defining"

      - id: "MM-JB-095"
        content: "Ducks vs Eagles — Ducks waddle around quacking reasons why they can't succeed, living in impossibility. Eagles soar and find a way no matter what. Even eagles can get wings clipped and start acting like ducks. Must catch yourself immediately."
        domains: [mindset, standards, leadership]
        source: "SLSP/1-Inner-World/2-Standards/mp4_5_Ducks_vs_Eagles"

      - id: "MM-JB-096"
        content: "Shoulds vs Musts — Should is the most disempowering word. Shoulds = wishes that never materialize. Musts = non-negotiables that always get fulfilled. 'If you keep using should, you end up shoulding all over yourself.'"
        domains: [standards, language-patterns, mindset]
        source: "SLSP/1-Inner-World/2-Standards/mp4_2_Defining"

      - id: "MM-JB-097"
        content: "Downward Spiral of Standards — When you drop below your standard and can't get back, a negative feedback loop begins: lower standards slightly, get worse results, feel more pain, lower more, until poverty/disempowerment."
        domains: [standards, mindset]
        source: "SLSP/1-Inner-World/2-Standards/mp4_2_Defining"

      - id: "MM-JB-098"
        content: "Focus-Physiology-Emotion Triad — State is created by three interconnected elements: what you focus on, how you hold/move your body, the emotion that results. Change any one and you change the state."
        domains: [state-management, NLP, physiology]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_2_3Elements"

      - id: "MM-JB-099"
        content: "Dominant Modality Model — Every person has a dominant sensory modality (Visual, Auditory, Kinesthetic). Matching the prospect's dominant modality creates unconscious rapport at a deep level."
        domains: [NLP, rapport, communication]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_4_5Modalities"

      - id: "MM-JB-100"
        content: "Vision vs Goal Hierarchy — Vision sits above goals. Goals are temporary stepping stones; the vision is permanent. Goals don't inspire others; vision does. Emotional investment belongs in the VISION, not the goals."
        domains: [vision, goal-setting, leadership]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_4_Vision_vs_Goals"

      - id: "MM-JB-101"
        content: "Vision Triad — Three elements required for success: (1) Create a compelling vision, (2) Sell/share that vision to inspire others, (3) Have the skills/strategies to make it real. Missing any one = failure or delusion."
        domains: [vision, leadership, straight-line-system]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_3_Sharing"

      - id: "MM-JB-102"
        content: "James Cameron Principle — Think really big. If you're only half right, you're still doing great. A vision so big that even 50% realization is extraordinary."
        domains: [vision, goal-setting]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_2_How_to_Set"

      - id: "MM-JB-103"
        content: "Matching vs Mirroring Distinction — Matching = wait a few seconds, then gradually adopt the other person's physiology. Elegant and effective. Mirroring = real-time copying. Confrontational and risky. Always match, never mirror."
        domains: [body-language, rapport, NLP]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_6_Matching_Mirroring"

      - id: "MM-JB-104"
        content: "Pace-Pace-Lead Model — Enter the prospect's world where they are, match their energy, pace again, then slowly lead them in the direction you want. If not exactly right, it works like a charm; done half-heartedly, it hardly works."
        domains: [rapport, influence, NLP]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_7_Pacing_Leading"

      - id: "MM-JB-105"
        content: "Death Spiral — When salesperson answers bogus objections with canned responses, asks for order, gets another bogus objection, cycle repeats endlessly. Rapport erodes with each cycle. Looping breaks this spiral."
        domains: [looping, objection-handling]
        source: "SLSP/2-Outer-World/3-Looping/mp4_1_Introduction"

      - id: "MM-JB-106"
        content: "Safe Cracker Metaphor — Closing is like cracking a safe with five numbers (Three 10s + Action Threshold + Pain). Every ask clicks the knob to test if safe opens. Not everyone needs 10-10-10; some are 6-6-6."
        domains: [closing, looping, sales-psychology]
        source: "SLSP/2-Outer-World/3-Looping/mp4_6_Live_Demonstration"

      - id: "MM-JB-107"
        content: "Processing Power Liberation — When you memorize your script, processing power normally tied up thinking about what to say is freed. You can now think ahead, read the prospect, manage tonality — like an actor who memorizes lines focuses on performance."
        domains: [scripting, preparation, performance]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_02_Power_of_Scripts"

      - id: "MM-JB-108"
        content: "Consistency Principle (Yes Momentum) — People want to remain consistent with things said aloud. If you get them saying yes-yes-yes, they're predisposed to say yes when you ask for the order."
        domains: [influence, closing, psychology]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_05_Main_Body"

      - id: "MM-JB-109"
        content: "Post-Sale Certainty Shift — After the sale, job shifts from building certainty to maintaining certainty over time. Keep customer past their action threshold, then permanently lower it for repeat purchases."
        domains: [customer-retention, lifetime-value]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_1_Introduction"

      - id: "MM-JB-110"
        content: "Gold Prospector Metaphor — Like a gold prospector sifting through water for nuggets, a salesperson sifts through leads looking for qualified buyers. You don't try to turn water into gold — you find gold that already exists."
        domains: [prospecting, qualifying]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_02_Nuggets"

      - id: "MM-JB-111"
        content: "Pain Preservation Model — Never solve someone's pain during qualifying. Taking them out of pain puts them in logical/analytical mindset. Keep them in emotional pain state so they measure your offer against that feeling."
        domains: [qualifying, pain-amplification, sales-psychology]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_07_Amplify_Pain"

      - id: "MM-JB-112"
        content: "Objection Switching as Buy Signal — If prospect gives objection A first, then switches to objection C after a loop, that IS a buy signal — they are very close. If they REPEAT the same objection, it's probably real."
        domains: [looping, objection-handling, closing]
        source: "SLSP/2-Outer-World/3-Looping/mp4_7_How_Many_Loops"

      # --- L3 HEURISTICS (SLSP) ---

      - id: "HEUR-JB-144"
        content: "Your lowest limiting belief is always the bottleneck — it holds back all empowering beliefs. Always target the lowest/deepest one first."
        domains: [belief-psychology, diagnostics]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_2_Empowering_Disempowering"

      - id: "HEUR-JB-145"
        content: "3 questions for challenging a limiting belief: (1) Does this belief serve me? (2) How is this belief NOT true? Find 3-4 counter-examples. (3) Who would I be without this belief?"
        domains: [belief-psychology, NLP]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_3_Power_of_Beliefs"

      - id: "HEUR-JB-146"
        content: "The gap between excellent and extraordinary standards is only two millimeters — typically one distinction, one skill, one belief change makes the difference."
        domains: [standards, mindset]
        source: "SLSP/1-Inner-World/2-Standards/mp4_3_Raising"

      - id: "HEUR-JB-147"
        content: "Ducks spend 90% of their day wallowing around quacking reasons why they can't get what they want. They blame, justify, and rationalize."
        domains: [standards, mindset, diagnostics]
        source: "SLSP/1-Inner-World/2-Standards/mp4_5_Ducks_vs_Eagles"

      - id: "HEUR-JB-148"
        content: "You cannot set an anchor if you are in a state less than 10 out of 10. You must reach the absolute peak of the emotional state at the exact moment you set the anchor."
        domains: [NLP, anchoring, state-management]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_5_NLP_Anchoring"

      - id: "HEUR-JB-149"
        content: "Smell is the most powerful sense for triggering state — one molecule can instantly transport you back to a memory. Adding a pungent smell to your anchor makes it dramatically more powerful."
        domains: [NLP, anchoring, neuroscience]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_4_5Modalities"

      - id: "HEUR-JB-150"
        content: "Always fire your anchor before picking up the phone or walking through the door. Never leave your state to chance."
        domains: [state-management, preparation, NLP]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_5_NLP_Anchoring"

      - id: "HEUR-JB-151"
        content: "Until you write your vision down, it's not real. Use present tense: 'I AM doing X,' 'WE ARE doing Y.'"
        domains: [vision, goal-setting]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_2_How_to_Set"

      - id: "HEUR-JB-152"
        content: "Project your vision 3-5 years into the future. Shorter = a goal. Longer = too abstract."
        domains: [vision, goal-setting]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_2_How_to_Set"

      - id: "HEUR-JB-153"
        content: "When you read your vision back, your hair should almost stand on end, heart beats faster, you want to jump out of bed. If it doesn't inspire at that visceral level, it's not your true vision."
        domains: [vision, self-assessment]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_7_Close"

      - id: "HEUR-JB-154"
        content: "You are the average of the five people you spend the most time with (Jim Rohn). If dream stompers can't be removed, silence them for 90 days."
        domains: [vision, environment, mindset]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_6_Dreamstompers"

      - id: "HEUR-JB-155"
        content: "On the phone, 9% of impact comes from words, 91% from tone. On the phone, tonality IS your body language."
        domains: [tonality, phone-sales]
        source: "SLSP/2-Outer-World/2-Body-Language/docx_0"

      - id: "HEUR-JB-156"
        content: "Dress expected, not outstanding. Business colors: black and blue. You don't want to stick out like a sore thumb."
        domains: [body-language, first-impressions, preparation]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_3_Wrap_Package"

      - id: "HEUR-JB-157"
        content: "When matching someone's physiology, wait a few seconds after they change position before adopting their new posture. Matching instantly is confrontational mirroring."
        domains: [body-language, rapport, NLP]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_6_Matching_Mirroring"

      - id: "HEUR-JB-158"
        content: "Enter at their certainty level, then move them. If they're at 7, enter at 7. Never jump to 10 — it's incongruent and breaks rapport."
        domains: [pacing-leading, rapport, tonality]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_7_Pacing_Leading"

      - id: "HEUR-JB-159"
        content: "90% of the Straight Line is looping. The initial pitch and qualifying is only the front 10%."
        domains: [looping, closing, straight-line-system]
        source: "SLSP/2-Outer-World/3-Looping/docx_0"

      - id: "HEUR-JB-160"
        content: "90%+ of first objections are nothing more than knee-jerk reactions to stall. Real objections only emerge after you've built certainty close to 10-10-10."
        domains: [objection-handling, looping]
        source: "SLSP/2-Outer-World/3-Looping/mp4_4_Objections_Deflections"

      - id: "HEUR-JB-161"
        content: "Ask for the order 5-7 times, each with a different language pattern. Never sound like a broken record."
        domains: [closing, looping, scripting]
        source: "SLSP/2-Outer-World/3-Looping/mp4_6_Live_Demonstration"

      - id: "HEUR-JB-162"
        content: "A repeated objection is probably real — let it rest. Switching objections each time = buy signal — keep going."
        domains: [objection-handling, closing-signals]
        source: "SLSP/2-Outer-World/3-Looping/docx_0"

      - id: "HEUR-JB-163"
        content: "Never say 'payment' or 'costs' — say 'just a cash outlay of...' and immediately follow with an onslaught of positives."
        domains: [language-patterns, pricing, closing]
        source: "SLSP/2-Outer-World/3-Looping/docx_0"

      - id: "HEUR-JB-164"
        content: "Save best material for the close. Don't give away your best benefits too early. Keep the bulk of your powder dry for looping."
        domains: [scripting, closing, strategy]
        source: "SLSP/2-Outer-World/3-Looping/docx_0"

      - id: "HEUR-JB-165"
        content: "Logic first, emotion second. Logic quiets the skeptical voice. Emotion creates desire. Logic without emotion = no close. Emotion without logic = buyer's remorse."
        domains: [closing, sales-psychology, dual-certainty]
        source: "SLSP/2-Outer-World/3-Looping/mp4_2_Goal_of_Looping"

      - id: "HEUR-JB-166"
        content: "Maximum 3 powerful benefit distinctions in the main body of your script. More means you've front-loaded and rambled."
        domains: [scripting, preparation]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_05_Main_Body"

      - id: "HEUR-JB-167"
        content: "Main body of script should be no more than 3/4 of a typed page. If it's longer, you've front-loaded."
        domains: [scripting, preparation]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_05_Main_Body"

      - id: "HEUR-JB-168"
        content: "Can only move forward on the straight line when client says YES. If no agreement, backtrack and resell that point. Moving forward without agreement = death zone."
        domains: [straight-line-system, rapport, closing]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_05_Main_Body"

      - id: "HEUR-JB-169"
        content: "Most salespeople can speak intelligently for only 3-6 minutes, good ones 7-8. After that they run out of material and start saying stupid things that break rapport."
        domains: [scripting, preparation, charisma]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_06_Learning_Tonality"

      - id: "HEUR-JB-170"
        content: "Scarcity tone = whisper with force (lowered voice + urgency). Not just lowering voice (that's a secret). Scarcity is lower voice with zest."
        domains: [tonality, influence]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_08_Scarcity"

      - id: "HEUR-JB-171"
        content: "Declarative-as-question ('Hi, it's Jordan Belfort?') literally increases the percentage of people who will NOT hang up by paralyzing negative internal dialogue."
        domains: [tonality, phone-sales, opening]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_12_Declarative_Question"

      - id: "HEUR-JB-172"
        content: "It takes just ONE ducked call to permanently destroy a client relationship. Never duck a phone call — this is the cardinal sin for all salespeople."
        domains: [customer-retention, relationship-building]
        source: "SLSP/3-Customers/1-Customers-for-Life/docx_0"

      - id: "HEUR-JB-173"
        content: "Clients will always accept bad news. What they will NOT accept is not being able to get in touch with you."
        domains: [customer-retention, communication]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_3_Building_Relationship"

      - id: "HEUR-JB-174"
        content: "Don't ask for a referral at the time of the sale. Wait for the first post-sale touch point — a few days later when you check in."
        domains: [referrals, customer-retention]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_5_When_to_Ask"

      - id: "HEUR-JB-175"
        content: "Use 'introduce me to' instead of 'refer me to.' Use 'help' instead of 'service.' These language swaps remove business/money connotation."
        domains: [referrals, language-patterns]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_8_Power_of_Language"

      - id: "HEUR-JB-176"
        content: "Sales Funnel example: 120 dials/week -> 40 connects -> 8 appointments -> 6 interviews -> 2 sales. At $2,000/sale = $4,000/week = ~$200K/year."
        domains: [prospecting, metrics, sales-operations]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_03_Sales_Funnel"

      - id: "HEUR-JB-177"
        content: "Always use a justifier before qualifying questions: 'Just a couple of quick questions so I don't waste your time.' Justifiers increase compliance by 300% (Cialdini copy machine study)."
        domains: [qualifying, rapport, influence]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_06_Maintain_Rapport"

      - id: "HEUR-JB-178"
        content: "Structure qualifying questions from BIG PICTURE to DETAILED/SPECIFIC. Never start with specifics."
        domains: [qualifying, question-design]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_09_Know_Questions"

      # --- L4 FRAMEWORKS (SLSP) ---

      - id: "FW-JB-103"
        content: "Limiting Belief Identification Framework — (1) Write limiting belief about specific area, (2) Write second limiting belief about yourself, (3) Identify consequences, (4) Ask 'How is this NOT true?' with 3-4 counter-examples, (5) Contrast who you are WITH vs WITHOUT the belief."
        domains: [belief-psychology, NLP, self-development]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_4_Identifying"

      - id: "FW-JB-104"
        content: "Belief References Attack Strategy — Don't attack the idea (tabletop). Attack the references (legs). (1) Identify root experience, (2) Re-examine from adult perspective, (3) Apply new language/meaning, (4) Table collapses when enough legs removed."
        domains: [belief-psychology, NLP]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_3_Power_of_Beliefs"

      - id: "FW-JB-105"
        content: "4 Levels of Standards — Level 1: POOR (miserable). Level 2: GOOD (still poor results). Level 3: EXCELLENT (trying but vulnerable). Level 4: EXTRAORDINARY ('The Kwan'). Key: jump Poor->Good and Good->Excellent are massive, but Excellent->Extraordinary is only two millimeters."
        domains: [standards, mindset, self-development]
        source: "SLSP/1-Inner-World/2-Standards/mp4_3_Raising"

      - id: "FW-JB-106"
        content: "Standards Raising Process — (1) Identify current standard, (2) Check if it matches vision, (3) Identify ULTIMATE PAIN, (4) Identify ULTIMATE PLEASURE, (5) Write new standard (your new MUST), (6) Link pain to old standard, (7) Future-pace new standard, (8) Ingrain in your soul."
        domains: [standards, mindset, NLP]
        source: "SLSP/1-Inner-World/2-Standards/mp4_3_Raising"

      - id: "FW-JB-107"
        content: "Reasons vs Results Diagnostic — (1) Listen to self-talk, (2) If giving reasons (excuses) = duck mentality, (3) Snap out immediately, (4) Shift to result mode, (5) Monitor daily: what percentage reasons vs results?"
        domains: [standards, diagnostics, mindset]
        source: "SLSP/1-Inner-World/2-Standards/mp4_5_Ducks_vs_Eagles"

      - id: "FW-JB-108"
        content: "4 C's (Empowering States) — Certainty, Clarity, Confidence, Courage. When triggered, your best resources become available. You become a force of nature."
        domains: [state-management, inner-game]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_3_4Cs"

      - id: "FW-JB-109"
        content: "5 Modalities of State (VAK-G-O) — Visual, Auditory, Kinesthetic, Gustatory, Olfactory. Each exists in two forms: real-world and remembered/internal."
        domains: [NLP, state-management, communication]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_4_5Modalities"

      - id: "FW-JB-110"
        content: "Dream Stomper Defense Framework — (1) Remove: delete them from life entirely. (2) Silence: ask for 90 days of no negativity. (3) Reframe: their reaction is about THEM, not you. (4) Deprive: deny them reactions, they lose power."
        domains: [vision, environment, mindset]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_6_Dreamstompers"

      - id: "FW-JB-111"
        content: "3 Steps to Creating Vision — (1) Think BIG — aspirational, payoff must be worth the work, (2) Write it down — present tense, powerful language, (3) Keep it grounded in reality — highest level, not fantasy."
        domains: [vision, goal-setting]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_2_How_to_Set"

      - id: "FW-JB-112"
        content: "Body Language Impact Framework (10 Elements) — Time, Space, Appearance, Posture, Gestures, Facial Expression, Eye Contact, Touch, Smell, Overall Professional Image."
        domains: [body-language, first-impressions]
        source: "SLSP/2-Outer-World/2-Body-Language/docx_0"

      - id: "FW-JB-113"
        content: "Pacing and Leading Framework — (1) Enter prospect's world WHERE THEY ARE, (2) Pace: stay at their level, (3) Pace again: reinforce connection, (4) Lead: slowly move them toward your desired state."
        domains: [rapport, influence, NLP]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_7_Pacing_Leading"

      - id: "FW-JB-114"
        content: "Five Reasons Prospects Don't Buy — (1) Not sure about product (Ten #1), (2) Not sure about you (Ten #2), (3) Not sure about company (Ten #3), (4) High action threshold, (5) No pain/urgency."
        domains: [closing, diagnostics, sales-psychology]
        source: "SLSP/2-Outer-World/3-Looping/docx_0"

      - id: "FW-JB-115"
        content: "Three-Loop Sequence — Loop 1 (Product-Logic): resell product logically. Loop 2 (You-Trust): build hypothetical track record. Loop 3 (Company): institutional trust. After Loop 3: heavy artillery (emotional close, action threshold, pain)."
        domains: [looping, closing, scripting]
        source: "SLSP/2-Outer-World/3-Looping/mp4_6_Live_Demonstration"

      - id: "FW-JB-116"
        content: "Deflection Framework — Universal phrase: 'I hear what you're saying, but let me ask you a question. Does the idea make sense to you? Do you like the idea?' Refocuses on product certainty without answering the bogus objection."
        domains: [objection-handling, looping]
        source: "SLSP/2-Outer-World/3-Looping/mp4_4_Objections"

      - id: "FW-JB-117"
        content: "5 Qualities of Effective Scripts — (1) Formulaic (adaptable structure), (2) Sound natural, (3) NOT front-loaded, (4) Can be spliced together, (5) Proven to work."
        domains: [scripting, preparation]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_03_Effective"

      - id: "FW-JB-118"
        content: "8-Step Introduction Framework — (1) Be enthusiastic, (2) Use familiar names, (3) Introduce self+company, (4) Restate company name, (5) Use powerful words, (6) Use justifiers, (7) Ask permission to qualify, (8) Listen carefully."
        domains: [scripting, opening, preparation]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_04_Introduction"

      - id: "FW-JB-119"
        content: "8 Crucial Tonal Patterns — (1) Scarcity/Urgency, (2) Reasonable Man, (3) Absolute Certainty, (4) I Care, (5) Declarative as Question, (6) Series of 3 Uptones, (7) Presupposing Tone, (8) I Really Want to Know."
        domains: [tonality, influence, communication]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_07-16"

      - id: "FW-JB-120"
        content: "Charisma Formula — Charisma = Effective Tonality + Appropriate Body Language + Not Saying Stupid Things. 100% learnable."
        domains: [charisma, tonality, body-language]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_06_Learning_Tonality"

      - id: "FW-JB-121"
        content: "6 Strategies for Building Customers for Life — (1) Never duck a phone call, (2) Send clients to competitor when you can't help, (3) Write effective thank-you notes, (4) Use gifts tied to aliveness, (5) Under-promise over-deliver, (6) Always leave client in better place."
        domains: [customer-retention, relationship-building]
        source: "SLSP/3-Customers/1-Customers-for-Life/docx_0"

      - id: "FW-JB-122"
        content: "6-Step Referral System — (1) Set clear targets and measure, (2) Know when to ask (post-sale touch point), (3) Give criteria of who you're looking for, (4) Ask for introduction not referral, (5) Use power language, (6) Reward and thank."
        domains: [referrals, customer-retention, sales-operations]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_4-9"

      - id: "FW-JB-123"
        content: "4 Buying Archetypes — (1) Buyers in Heat (ready NOW, easiest), (2) Buyers in Power (will buy on terms), (3) Looky-Loos (curiosity seekers, waste of time), (4) Dragged (never buying). Eliminate #3 and #4 immediately; only present to #1 and #2."
        domains: [prospecting, qualifying, segmentation]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_04_Archetypes"

      - id: "FW-JB-124"
        content: "3 Keys to Qualifying — (1) Identify Needs with questions to discover actual needs/whys/beliefs/values, (2) Maintain Rapport While Qualifying using justifiers and trusted advisor positioning, (3) Amplify Pain ethically — uncover and deepen without solving prematurely."
        domains: [qualifying, rapport, pain-amplification]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_05-07"

      - id: "FW-JB-125"
        content: "Big Picture Qualifying Questions (in order) — (1) What do you like/dislike about current provider? (2) What would you change? (3) What's your biggest headache? (4) What's your ultimate objective? (5) What would ideal look like? (6) Which factor is most important? (7) Have I asked everything important?"
        domains: [qualifying, question-design]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_09_Know_Questions"

      # --- L5 METHODOLOGIES (SLSP) ---

      - id: "MET-JB-084"
        content: "Timeline Regression Methodology (10-Step NLP Process)"
        steps: ["1) SETUP: sit comfortably, deep breaths, close eyes", "2) Establish timeline by pointing to past/present/future", "3) Float into helicopter bubble 6-8ft above body with resource buttons (certainty, love, confidence, courage, faith)", "4) Float back over timeline to find root experience of limiting belief", "5) Safety Sandwich: white markers 2-5 min before and after root experience", "6) First re-experience: float down with adult resources, relive drawing new meaning in 15 seconds", "7) Rapid repetitions: 8 seconds, then 5 seconds", "8) Resource lending: relive slowly, lending resources to others in scene", "9) Float to present, observe dark spots now light", "10) Future pace: 2 weeks, 1 year, 5 years of success without limiting belief, return to present"]
        domains: [NLP, timeline-therapy, belief-psychology, guided-exercise]
        source: "SLSP/1-Inner-World/1-Beliefs/mp4_6_Exercise"

      - id: "MET-JB-085"
        content: "Standards Audit Methodology"
        steps: ["1) List all major life areas: finances, sales, relationships, health, growth", "2) Rate each: Poor/Good/Excellent/Extraordinary", "3) Write your VISION for each", "4) Identify dissonance: where standards don't match vision", "5) Determine cause: skill gap or standards gap", "6) Skill gaps: create action plan", "7) Standards gaps: apply Standards Raising Process", "8) Convert all 'shoulds' to 'musts'", "9) Set guardrails: what you will NEVER lower below"]
        domains: [standards, self-assessment, diagnostics]
        source: "SLSP/1-Inner-World/2-Standards/mp4_2-3_Defining_Raising"

      - id: "MET-JB-086"
        content: "Belfort Anchoring Exercise (7-Step State Management)"
        steps: ["1) Stand with certainty posture: chest out, shoulders back, clench fists", "2) Recall experience of absolute certainty: see, hear, feel it", "3) Count 1-2-3, squeeze fists, say 'YES' loudly", "4) Repeat with escalating intensity", "5) Add olfactory anchor (pungent smell) at peak state", "6) Go to SECOND peak experience and stack onto same anchor", "7) Repeat full cycle 3+ times to lock in"]
        domains: [NLP, anchoring, state-management]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_6_Anchoring_Exercise"

      - id: "MET-JB-087"
        content: "Physiology-First State Change"
        steps: ["1) If in negative state, change body FIRST: stand up straight, shoulders back, head up, breathe deeply", "2) Then smile", "3) Then direct focus to positive memory", "4) Body change comes FIRST because physiology is the fastest lever"]
        domains: [state-management, physiology, NLP]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_2_3Elements"

      - id: "MET-JB-088"
        content: "Belfort 8-Step Goal Setting Process"
        steps: ["1) Set goal", "2) Put a date on it", "3) Identify people/organizations needed", "4) Learn what you need to know", "5) Develop best plan with current info (don't over-plan)", "6) Take MASSIVE action", "7) Analyze results with visual acuity", "8) Change approach one thing at a time; repeat until moving toward vision"]
        domains: [goal-setting, vision, planning]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_5_Steps"

      - id: "MET-JB-089"
        content: "Vision Creation Process (Blocked Starter)"
        steps: ["1) Ask 'Why is success important to me?'", "2) 'What gives me ultimate pleasure/pain?'", "3) Identify deepest drivers (family, community, spiritual)", "4) Build vision upward from answers", "5) Write in present tense, 3-5 years out", "6) Think big, keep grounded"]
        domains: [vision, goal-setting, motivation]
        source: "SLSP/1-Inner-World/4-Vision-Focus/mp4_2_How_to_Set"

      - id: "MET-JB-090"
        content: "Face-to-Face Matching Methodology"
        steps: ["1) Observe prospect's physiology", "2) Wait a few seconds after they settle", "3) Move naturally, gradually adopt portion of their posture", "4) When they change position, wait, then re-match", "5) Continue throughout conversation", "6) Never match instantly (that's mirroring)"]
        domains: [body-language, rapport, NLP]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_6_Matching_Mirroring"

      - id: "MET-JB-091"
        content: "Pacing and Leading Implementation (Certainty Scale)"
        steps: ["1) Ask certainty-testing question", "2) Calibrate their level 1-10 by tone", "3) Enter at EXACTLY their level", "4) Deliver next point at same energy (pace)", "5) Gradually increase enthusiasm by small increments (pace again)", "6) Continue ramping until led to target certainty", "7) They unconsciously match your rising enthusiasm"]
        domains: [rapport, influence, NLP, pacing-leading]
        source: "SLSP/2-Outer-World/2-Body-Language/mp4_7_Pacing_Leading"

      - id: "MET-JB-092"
        content: "Complete Looping Process (End-to-End)"
        steps: ["1) Complete pitch, ask for order: 'Sound fair enough?'", "2) Prospect objects", "3) Deflect: 'Does the idea make sense? Do you like the idea?'", "4) Match their certainty level", "5) Loop 1: resell product logically", "6) If objection: assess — product uncertainty? Loop back. If not, move to Loop 2", "7) Loop 2: hypothetical track record, resell yourself", "8) Loop 3: resell company", "9) If still objecting: lower action threshold, future-pace positive movie, step down if needed", "10) Add pain if necessary", "11) Ask 5-7 times total with different patterns", "12) Monitor: switching objections = buy signal, repeated = real, rude tone = back off"]
        domains: [looping, closing, objection-handling]
        source: "SLSP/2-Outer-World/3-Looping/mp4_6-8"

      - id: "MET-JB-093"
        content: "Track Record Hypothetical (Selling Yourself)"
        steps: ["1) After product certainty, say: 'If you knew me, you probably wouldn't say let me think about it'", "2) 90%+ agree", "3) For 1-3% pushback: escalate hypothetical with specific scenarios", "4) They always concede", "5) Transition: 'Exactly. Let me reintroduce myself...'", "6) Sell yourself (values, client approach)"]
        domains: [closing, trust-building, looping]
        source: "SLSP/2-Outer-World/3-Looping/mp4_6_Live_Demonstration"

      - id: "MET-JB-094"
        content: "Script Building Methodology"
        steps: ["1) Each salesperson writes 5-6 language patterns per Ten (product, you, company)", "2) Pool all patterns", "3) Pick best of best", "4) Create master script", "5) Read aloud and role-play", "6) Edit for syllable count, beats, rhythm", "7) Drill until everyone sounds great", "8) Continue refining"]
        domains: [scripting, team-building, preparation]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_07-10"

      - id: "MET-JB-095"
        content: "Opening Language Pattern Sequence"
        steps: ["1) 'Hey John, it's Jordan from [Company] in [City]. How's it going?' (enthusiastic)", "2) 'If you recall, we met [context]. Ring a bell?'", "3) 'The reason for the call today is...' (justifier, lowered tone)", "4) 'Just a couple quick questions so I don't waste your time' (permission with justifier)", "5) Transition: 'Based on everything you just said, this is DEFINITELY a perfect fit for you'"]
        domains: [scripting, opening, phone-sales]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_07"

      - id: "MET-JB-096"
        content: "Close Language Pattern Sequence"
        steps: ["1) 'Getting started is very simple' (calm, no-big-deal tone)", "2) 'Just basic information to get account set up'", "3) 'We handle everything else for you'", "4) Ask: 'Give me one shot, you won't be sorry. Sound fair enough?' (reasonable man)", "5) If objection: loop with new pattern", "6) Repeat 4-7 times"]
        domains: [scripting, closing, language-patterns]
        source: "SLSP/2-Outer-World/4-Preparation-Scripting/mp4_09"

      - id: "MET-JB-097"
        content: "Tonality Mastery Practice Method"
        steps: ["1) Pick one tonality", "2) Practice phrases in front of mirror", "3) Notice natural gestures", "4) Get partner and drill", "5) Record and review", "6) Link gesture to tonality as anchor", "7) Test: fire gesture first, see if tonality follows", "8) Repeat until you can elicit any of 8 tonalities on demand"]
        domains: [tonality, practice, NLP]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_17_Anchoring"

      - id: "MET-JB-098"
        content: "Opening Tonality Sequence"
        steps: ["1) 'Hey John!' (enthusiastic, sharp)", "2) 'How are you going today?' (I Really Want to Know tone)", "3) Wait for response", "4) If positive: 'Great!' (match energy)", "5) 'It's Jordan Belfort?' (declarative as question)", "6) 'Calling from Sales Acuity?' (second uptone)", "7) 'In Australia?' (third uptone — series of 3 micro-agreements)"]
        domains: [tonality, opening, phone-sales]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_12-15"

      - id: "MET-JB-099"
        content: "Physiological Anchor Discovery"
        steps: ["1) Talk about something you're CERTAIN about", "2) Watch yourself in mirror", "3) Notice natural gesture when certain", "4) Repeat for scarcity, caring, etc.", "5) Document YOUR unique gesture per tonality", "6) Practice firing gesture FIRST to trigger tonality", "7) Use in sales situations"]
        domains: [tonality, NLP, anchoring]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_17_Anchoring"

      - id: "MET-JB-100"
        content: "Rapport Recovery Method"
        steps: ["1) Notice you've fallen out of rapport", "2) STOP moving forward immediately", "3) Backtrack with 'I Care' or 'I Really Want to Know' tonality", "4) Re-establish rapport at TIGHTER level", "5) Only then resume moving down the straight line"]
        domains: [rapport, tonality, recovery]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_05_Rapport_Not_Constant"

      - id: "MET-JB-101"
        content: "Referral Ask Methodology"
        steps: ["1) Close the sale", "2) Wait a few days for first post-sale touch point", "3) Call to check in", "4) If problem, solve or stay involved", "5) Once on track, ask using 'friends, family, neighbors' language", "6) Ask for introduction, not just contact info", "7) Send handwritten thank-you after receiving referral"]
        domains: [referrals, customer-retention]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_5-9"

      - id: "MET-JB-102"
        content: "Thank-You Note / Ingratiation Methodology"
        steps: ["1) Gather intelligence during/after sale", "2) Identify something specific and personal", "3) Write 3-4 sentence note using emotional trigger words", "4) Make specific to what matters to them", "5) File intelligence for future (holidays, anniversaries)", "6) Repeat relentlessly"]
        domains: [customer-retention, relationship-building]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_2_Setting_Stage"

      - id: "MET-JB-103"
        content: "Competitor Referral Strategy"
        steps: ["1) Acknowledge you can't help", "2) Send to competitor who can", "3) Track which competitor and why", "4) This builds massive reciprocity", "5) Client comes to you first next time"]
        domains: [customer-retention, integrity, reciprocity]
        source: "SLSP/3-Customers/1-Customers-for-Life/mp4_3_Building_Relationship"

      - id: "MET-JB-104"
        content: "Complete Qualifying Process"
        steps: ["1) Write perfect qualifying questions", "2) Memorize or have visible", "3) Set up in logical chain: big picture first, then specific", "4) Practice with precise tonality", "5) Use justifiers before every line", "6) Listen, make notes, do NOT solve pain", "7) Follow-up to exhaust each line", "8) Identify hierarchy of needs", "9) Ask 'Is there anything I've left out?'", "10) Transition: 'Based on everything you told me, this is definitely a perfect fit'"]
        domains: [qualifying, question-design, preparation]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_08-11"

      - id: "MET-JB-105"
        content: "Pain Amplification Technique (Qualifying)"
        steps: ["1) Identify pain spot through qualifying", "2) If minimized, probe deeper: 'Can you explain more?'", "3) Future-pace: 'How do you see this in 2-3 years?'", "4) Use caring tonality", "5) Use empathetic murmurs (mm-hmm, I see, wow)", "6) Do NOT solve pain", "7) Make notes for presentation"]
        domains: [qualifying, pain-amplification, tonality]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_07"

      - id: "MET-JB-106"
        content: "Sales Funnel Diagnostic"
        steps: ["1) Track all ratios consistently", "2) When in slump, examine: Is it dials? Connects? Closing ratio? Pipeline quality?", "3) Identify specific bottleneck", "4) Adjust weak point — you can virtually guarantee results by making more dials"]
        domains: [prospecting, metrics, diagnostics]
        source: "SLSP/3-Customers/2-Prospecting-Qualifying/mp4_03_Sales_Funnel"

      - id: "MET-JB-107"
        content: "Script Tonal Mapping Method"
        steps: ["1) Write script", "2) Go line by line", "3) For each key phrase decide: raise voice? Lower? Speed up? Slow down?", "4) Mark tonal changes in script", "5) Practice with those exact shifts", "6) Enemy is constancy — delivery MUST vary", "7) Align physiology with each shift"]
        domains: [tonality, scripting, practice]
        source: "SLSP/2-Outer-World/5-Tonality/mp4_16_Summary"

      - id: "MET-JB-108"
        content: "Sales Team State Management (Stratton Model)"
        steps: ["1) Give motivational meetings EVERY SINGLE DAY", "2) Have salespeople stand and pace", "3) Make sure everyone feels positive, sees the future", "4) Keep entire team in peak state before they hit the phones"]
        domains: [team-management, state-management, sales-operations]
        source: "SLSP/1-Inner-World/3-State-Management/mp4_1_Introduction"


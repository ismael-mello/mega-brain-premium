      source: "Operação Funil Destrava Prep D3"

    - id: "MET-RM-003"
      text: "Operação Funil Destrava (30 dias): Prep: avatar/cliente/sentença/hackear. S1: falsas crenças/oferta/produtos/metodologia. S2: jornada herói/ganchos/script VSL 35 passos. S3: estratégia central/páginas/order bump. S4: tráfego/4 consciências/anúncios."
      domain: "funnel-architecture"
      source: "Operação Funil Destrava"

    - id: "MET-RM-004"
      text: "Jornada Dupla do Herói: 1) Ponto alto do drama (trailer), 2) Volta ao início, 3) Era igual ao avatar, 4) Dores internas E externas, 5) Momento ahá (engrenagem que faltava), 6) Provas, 7) Audiência chega ao 'preciso disso' SOZINHA."
      domain: "copywriting-sales-pages"
      source: "Operação Funil Destrava S2D1"

    - id: "MET-RM-005"
      text: "Otimização de Página (CRO): 1) Tipo por preço, 2) Estrutura correta, 3) Copy correta, 4) 2 segredos tempo permanência, 5) Design persuasivo, 6) Otimização técnica (lazy loading, WebP, cloud)."
      domain: "CRO"
      source: "Páginas de Vendas Alta Conversão"

    - id: "MET-RM-006"
      text: "Estratégia de Enriquecimento: 1) Habilidade que pague vida, 2) Negócio escalável (funil), 3) NÃO retirar sangue, 4) Reinvestir: R$1.500→R$4.500→escala, 5) Pró-labore só com empresa gorda, 6) Nunca antecipar sonhos."
      domain: "financial-discipline"
      source: "Masterclass Enriquecimento"

    - id: "MET-RM-007"
      text: "Afiliado Profissional com Oferta Própria: 1) Afiliar a produto bom, 2) Isca/lima de valor, 3) Capturar email antes, 4) SUA página com SUA história, 5) Identificar falsas crenças não matadas, 6) Bônus exclusivos, 7) Oferta melhor que do produtor."
      domain: "funnel-architecture"
      source: "Operação Funil Destrava S3D1"

    - id: "MET-RM-008"
      text: "4 Regras do Tripwire: 1) Melhor primeiro beijo, 2) Pregar sobre core offer (seeding), 3) Rápido de consumir (2-7 dias, tudo desbloqueado), 4) IMUTÁVEL: acompanhado de carta de vendas para próximo degrau."
      domain: "tripwire-strategy"
      source: "Segredos do Tripwire A1"

    - id: "MET-RM-009"
      text: "Extração de Front-End: 1) Olhar core offer, 2) Identificar parte mais sexy, 3) Extrair, 4) MUDAR FORMATO, 5) Consumo rápido (7-30 dias), 6) Seeding do core, 7) Carta de vendas acompanhando."
      domain: "tripwire-strategy"
      source: "FUNIOLOGIA Frontend + Tripwire"

    - id: "MET-RM-010"
      text: "Webinário com 3 Vídeos de Antecipação: Dividir em 3 segredos/mitos. Cada um quebra 1 objeção. Vídeo 1 (seg), 2 (ter), 3 (qua). Gera ansiedade → taxa comparecimento."
      domain: "webinar-methodology"
      source: "FUNIOLOGIA Backend Webinar"

    - id: "MET-RM-011"
      text: "Marinada de Preço: 1) Revelar total empilhado, 2) 'Não vai pagar isso, mas exercício', 3) 3-5 comparações emocionais, 4) Arrancar 'sim/vale', 5) NÃO cortar, 6) Duas opções, 7) Revelar real."
      domain: "webinar-methodology"
      source: "Segredos do Webinar Pitch"

    - id: "MET-RM-012"
      text: "Hack Pular a Fila no High Ticket: Página 3 com Passo 3 escondido: 'Não aguenta esperar? Pule a fila — WhatsApp.' Conversão muito maior que ligação proativa."
      domain: "high-ticket-sales"
      source: "FUNIOLOGIA High Ticket A1"

    - id: "MET-RM-013"
      text: "Garantia para Experimentar: 1) 30 dias, 2) Reframe: decisão agora = EXPERIMENTAR, 3) 'Daqui 30 dias você decide', 4) 'Se coração diz sim, experimente', 5) Separar testar (agora) de ficar (30 dias)."
      domain: "webinar-methodology"
      source: "Segredos do Webinar Pitch"

    - id: "MET-RM-014"
      text: "Permissão para Ofertar: 1) 'Se aplicar hack 1+2+3, funcionaria?', 2) Esperar respostas, 3) 'Tudo bem 10 min que pode mudar sua vida?', 4) 'Não é sobre mim, é sobre VOCÊ', 5) Sim → pitch."
      domain: "webinar-methodology"
      source: "Segredos do Webinar Pitch"

    - id: "MET-RM-015"
      text: "Método de Teste de Criativos: 1) Públicos óbvios, 2) Testar criativos (1 público), 3) Testar copies (1 imagem, 1 público), 4) Criativo + copy validados → testar públicos novos, 5) Testes sempre ligados R$10-30/dia."
      domain: "traffic-scaling"
      source: "Escala Secreta Aula 2"

    - id: "MET-RM-016"
      text: "Escala por Checkout: 1) Colunas: checkout + custo + compra + custo compra, 2) Analisar por conjunto (não campanha), 3) Padrão: acima de X = prejuízo, 4) Bem abaixo = escalar, 5) Próximo = manter, 6) CBO descobre, ABO escala."
      domain: "traffic-scaling"
      source: "Escala Secreta Aula 3"

    - id: "MET-RM-017"
      text: "Escala Hard por Segmentação: 1) Detalhamento > Idade, 2) Idade com CPA baixo dentro de CPA geral caro, 3) Duplicar para idades específicas, 4) Repetir sexo/posicionamento, 5) NUNCA desligar sem analisar segmentos."
      domain: "traffic-scaling"
      source: "Escala Secreta Aula 4"

    - id: "MET-RM-018"
      text: "Entrega que Ascende: 1) Parte mais sexy do core, 2) OUTRO formato, 3) Uma única coisa com absurdo valor, 4) Consumo em 1 dia, 5) Seeding várias vezes, 6) Criar/revelar problema do próximo, 7) Toda cura cria outro problema."
      domain: "customer-ascension"
      source: "A Nova Onda Micro Ofertas"

    - id: "MET-RM-019"
      text: "Teste AB para Páginas: 1) Controle, 2) UMA mudança, 3) Mesmo tráfego, 4) Vencedora por conversão, 5) Salvar perdedora, 6) Vencedora = novo controle, 7) Repetir, 8) Priorizar topo do funil."
      domain: "CRO"
      source: "Masterclass #1"

    - id: "MET-RM-020"
      text: "Quebra de 3 Falsas Crenças no Webinar: Para cada: 1) História de epifania, 2) Passo a passo do QUÊ (não como), 3) Depoimento, 4) Quebrar crenças residuais, 5) Reafirmar nova crença, 6) Bônus facilitador. 4 elementos por crença."
      domain: "webinar-methodology"
      source: "Meu Script de Webinar"

    - id: "MET-RM-021"
      text: "Onboarding Anti-Reembolso: Módulo 0: Boas-vindas (promessa + parabéns + objeções + improváveis) + Tour disfarçado (seeding) + Comunidade (manifesto da tribo). Área: máx 5 cards claros."
      domain: "customer-ascension"
      source: "Masterclass #4"

    - id: "MET-RM-022"
      text: "Produção Paralela 10 Tripwires: 1) 10 temas, 2) Freelancers (2 copy + 2 design), 3) Distribuir 1 por par, 4) 3 produtos simultâneos, 5) Upsell = assinatura, 6) R$500/dia dividido, 7) Se 1 cai, 9 sustentam."
      domain: "mini-offers"
      source: "Close Friends #3"

    - id: "MET-RM-023"
      text: "Venda High Ticket sem Ligação Pessoal: 1) VSL para high ticket, 2) Formulário, 3) Closer (não você), 4) Script: pedir ajuda → avatar → formulário → campo → virar jogo → pessoa falar, 5) Pessoa percebe sozinha."
      domain: "high-ticket-sales"
      source: "Masterclass #3"

    - id: "MET-RM-024"
      text: "Automação Email com Metas (Active Campaign): 1) Automação follow-up, 2) META = tag 'comprou X', 3) Meta 'qualquer lugar', 4) Se compra = pula final, 5) 'Aguardar 365 dias' no final, 6) Quando nova sequência, mudar para 5 min."
      domain: "email-marketing"
      source: "Segredos Email Marketing M3"

    - id: "MET-RM-025"
      text: "Fechamento 'À Vista ou Parcelado': Nunca 'quer comprar?' → 'Cartão até 12x, todas bandeiras, PIX/boleto — fica melhor à vista ou parcelado?' Presume a venda."
      domain: "high-ticket-sales"
      source: "Segredos High Ticket Script"

    - id: "MET-RM-026"
      text: "Objeção 'Preciso Pensar': 1) 'Depois não estarei disponível', 2) 'Vamos pensar JUNTOS', 3) 'O que exatamente precisa pensar?', 4) Objeção real aparece, 5) Resolver a verdadeira."
      domain: "high-ticket-sales"
      source: "Segredos High Ticket Script"

    - id: "MET-RM-027"
      text: "Formatos de Tripwire: E-book, livro físico, desafio (5-21 dias), tutoriais, checklists, planilhas, ferramentas, swipe files, testes (eneagrama), mapas, scripts, templates. Foco: rápido + valor sem ser curso."
      domain: "tripwire-strategy"
      source: "Segredos do Tripwire A1"

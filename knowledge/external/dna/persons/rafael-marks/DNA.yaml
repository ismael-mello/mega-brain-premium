layers:
  L1_PHILOSOPHIES:
    - id: "FIL-RM-001"
      text: "Fracos vendem produtos, fortes vendem ofertas. Produto todo mundo vai te copiar. Você tem que vender oferta."
      domain: "offer-construction"
      source: "Operação Funil Destrava S1D1"

    - id: "FIL-RM-002"
      text: "A mágica toda não tá na primeira compra que a pessoa faz, mas sim nas próximas compras que ela faz."
      domain: "customer-ascension"
      source: "Operação Funil Destrava Prep D1"

    - id: "FIL-RM-003"
      text: "Quando você tem lista de e-mail, você nunca mais está no zero. Construção de lista de e-mail é o ativo principal."
      domain: "email-marketing"
      source: "Operação Funil Destrava S3D1"

    - id: "FIL-RM-004"
      text: "O dinheiro não está no primeiro contato. O dinheiro está no prolongar de um relacionamento. É onde a pessoa vai ganhando confiança em você."
      domain: "email-marketing"
      source: "Operação Funil Destrava S4D1"

    - id: "FIL-RM-005"
      text: "Pessoas só param de comprar na sua lista de e-mail por dois motivos: ou ela morreu, ou você ofendeu ela."
      domain: "email-marketing"
      source: "Operação Funil Destrava S3D1"

    - id: "FIL-RM-006"
      text: "Se você aprender a contar histórias, você simplesmente não tem que vender nada. As pessoas vão querer comprar de você."
      domain: "copywriting-sales-pages"
      source: "Operação Funil Destrava S2D1"

    - id: "FIL-RM-007"
      text: "Não é o preço que determina se é caro ou barato — é o valor percebido. R$2.000 é caro ou barato? Depende se R$2.000 for uma casa."
      domain: "offer-construction"
      source: "Operação Funil Destrava S1D1"

    - id: "FIL-RM-008"
      text: "O avatar é sobre o seu cliente. O cliente dos sonhos é sobre VOCÊ — o tipo de pessoa que você amaria trabalhar o tempo inteiro sem se cansar."
      domain: "offer-construction"
      source: "Operação Funil Destrava Prep D3"

    - id: "FIL-RM-009"
      text: "Se você consegue construir lista de graça, você tem um negócio milionário. Fato."
      domain: "email-marketing"
      source: "Operação Funil Destrava S3D1"

    - id: "FIL-RM-010"
      text: "O foco não é ficar milionário agora. É aprender a construir ofertas e funis que convertem. Se você aprender isso, zerou o jogo."
      domain: "funnel-architecture"
      source: "Operação Funil Destrava S1D1"

    - id: "FIL-RM-011"
      text: "Antecipação de sonhos é o maior erro financeiro de quem começa a faturar com funis. A empresa precisa ter oxigênio (caixa) para multiplicar."
      domain: "financial-discipline"
      source: "Masterclass Enriquecimento"

    - id: "FIL-RM-012"
      text: "Lucro é o nome do jogo. O nome do jogo é lucro."
      domain: "financial-discipline"
      source: "Masterclass #2"

    - id: "FIL-RM-013"
      text: "A única verdade são os números. Quando a gente fala de funil, de vendas na internet. A verdade está nos dados, está nos números."
      domain: "CRO"
      source: "Masterclass #1"

    - id: "FIL-RM-014"
      text: "Todo produto é uma carta de vendas para o próximo. Disfarçado. Todo produto é um lançamento do próximo."
      domain: "customer-ascension"
      source: "A Nova Onda Micro Ofertas"

    - id: "FIL-RM-015"
      text: "Você pode ser a melhor semente do mundo, plantada em cimento. Vale mais o barco em que você tá do que quando você sabe remar."
      domain: "financial-discipline"
      source: "A Nova Onda Micro Ofertas"

    - id: "FIL-RM-016"
      text: "Quem fica pobre sabe tudo sobre o custo. Quem fica rico é a galera que está viciada no quanto retorna."
      domain: "financial-discipline"
      source: "A Nova Onda Micro Ofertas"

    - id: "FIL-RM-017"
      text: "Amadores focam no front-end. O que vem após vai te deixar rico."
      domain: "customer-ascension"
      source: "Edição Secreta N2 + High Ticket Módulo 1"

    - id: "FIL-RM-018"
      text: "A venda não acaba quando a pessoa comprou. A venda começa ali. Depois que você vender o produto, agora você tem que vender para ela o consumo e a implementação."
      domain: "customer-ascension"
      source: "A Nova Onda Micro Ofertas"

    - id: "FIL-RM-019"
      text: "Front-end não foi feito para enriquecer. O lugar onde você enriquece é no back-end, o lugar onde se paga é no high-end."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Frontend A2"

    - id: "FIL-RM-020"
      text: "O foco está no produto principal (core offer) — é o produto pelo qual você será reconhecido, que custa entre R$1000-R$3000. Múltiplas portas de entrada (funis) alimentam esse produto principal."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Lead A1"

    - id: "FIL-RM-021"
      text: "As pessoas adiam o que precisam, mas compram o que querem. Você precisa oferecer o que elas querem, não o que elas precisam."
      domain: "offer-construction"
      source: "Jornada de Produtos Fase 3"

    - id: "FIL-RM-022"
      text: "É impossível pescar tubarão com isca de sardinha. Clientes high-ticket existem em todo nicho — a diferença não é o produto, é o cliente."
      domain: "high-ticket-sales"
      source: "Segredos do High Ticket Módulo 1"

    - id: "FIL-RM-023"
      text: "O valor dos seus bônus está nas histórias que você conta sobre eles. Se você não conta uma história, ninguém percebe que vale o quanto você diz."
      domain: "webinar-methodology"
      source: "Segredos do Webinar Pitch"

    - id: "FIL-RM-024"
      text: "A decisão de compra agora não é sobre comprar — é sobre experimentar. A decisão de ficar é só daqui a 30 dias."
      domain: "webinar-methodology"
      source: "Segredos do Webinar Pitch"

    - id: "FIL-RM-025"
      text: "Quando eu entro no mercado com um tripwire, eu ganho um longo período de atenção porque a pessoa comprou. Quando que alguém nas mídias sociais me daria 4 horas de atenção ininterrupta?"
      domain: "tripwire-strategy"
      source: "Segredos do Tripwire A1"

    - id: "FIL-RM-026"
      text: "Pra vender high-ticket, a gente faz o processo reverso — não é a gente tentando vender, é a pessoa que vai ter que se vender para nós. Takeaway selling."
      domain: "high-ticket-sales"
      source: "FUNIOLOGIA High Ticket A1"

    - id: "FIL-RM-027"
      text: "Uma pessoa que acabou de passar o cartão passa muito mais fácil o cartão em outras compras em seguida. Buying frenzy — é um estado hipnótico."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Frontend A2"

    - id: "FIL-RM-028"
      text: "E-mail diário é 85% entretenimento/história, 10% moral da história conectada ao produto, 5% CTA soft. Como se a pessoa estivesse assistindo seus stories."
      domain: "email-marketing"
      source: "Segredos do E-mail Marketing M4"

    - id: "FIL-RM-029"
      text: "Seu negócio precisa vender 3 coisas ao mesmo tempo sem ninguém saber: front-end para público frio, back-end para audiência morna, high-ticket para clientes quentes."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Frontend A1"

    - id: "FIL-RM-030"
      text: "Entregue mais, entregue tudo. Em imersões, quando você tenta entregar menos para forçar upgrade, causa revolta. O processo é inverso: entrega insano, gratidão, depois convida."
      domain: "high-ticket-sales"
      source: "Segredos do High Ticket Módulo 1"

    - id: "FIL-RM-031"
      text: "Upsells não são forçar a pessoa a comprar — é olhar para a pessoa e pensar: qual é o próximo problema que ela vai ter?"
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Frontend A1"

    - id: "FIL-RM-032"
      text: "Você quer fazer elas comprarem mais fácil? Você faz ela perceber que ela precisa. Você não convence ela."
      domain: "copywriting-sales-pages"
      source: "Operação Funil Destrava S2D1"

    - id: "FIL-RM-033"
      text: "Empresa rica, dono pobre? Não. Empresa rica E dono rico — mas sem tirar a saúde da empresa."
      domain: "financial-discipline"
      source: "Masterclass Enriquecimento"

    - id: "FIL-RM-034"
      text: "Dinheiro parado não serve pra nada. A pergunta certa é: como eu MULTIPLICO essa grana de forma segura?"
      domain: "financial-discipline"
      source: "Masterclass Enriquecimento"

    - id: "FIL-RM-035"
      text: "A vida não perdoa quando você vai mais ou menos. Mais ou menos em qualquer coisa, não tem o resultado que queria."
      domain: "financial-discipline"
      source: "A Nova Onda Micro Ofertas"

    - id: "FIL-RM-036"
      text: "O diabo dá na vez todas as estratégias boas pra quem vende mentira. E você que é bom, íntegro, transforma, não consegue vender bem, porque vende verdade como se fosse mentira."
      domain: "copywriting-sales-pages"
      source: "Hackeando o Marketing Digital Dia 2"

    - id: "FIL-RM-037"
      text: "Não te canses pra enriquecer, dá de mão a tua própria sabedoria. Na maior parte das vezes, não é sobre como. É sobre quem faz pra você."
      domain: "financial-discipline"
      source: "Close Friends #3"

    - id: "FIL-RM-038"
      text: "Pré-frame é a arte de colocar a pessoa no estado ideal antes de enviar ela para o seu funil. Se a pessoa estiver no estado correto, compra mais fácil."
      domain: "email-marketing"
      source: "Segredos do E-mail Marketing M4"

    - id: "FIL-RM-039"
      text: "O valor da coisa não está no tempo em que você passa consumindo ela. O valor está no resultado que aquilo gera quando você implementa."
      domain: "offer-construction"
      source: "Masterclass #2"

    - id: "FIL-RM-040"
      text: "Você anda com gente foda para poder ganhar dinheiro. É exatamente o contrário do que as pessoas pensam."
      domain: "financial-discipline"
      source: "A Nova Onda Micro Ofertas"

    - id: "FIL-RM-041"
      text: "Escala quando a gente fala de uma escala onde você quer romper — romper significa rasgar na marra e na força."
      domain: "traffic-scaling"
      source: "Escala Secreta Mastermind"

    - id: "FIL-RM-042"
      text: "Quando você antecipa os sonhos com o dinheiro que tá saindo do seu funil, você tá abrindo mão de um enriquecimento muito mais rápido."
      domain: "financial-discipline"
      source: "Mentalidade Para Enriquecer"

    - id: "FIL-RM-043"
      text: "20% dos seus clientes estão dispostos a pagar 10-20x mais pelo que você oferece hoje. O problema é que você só oferece produtos baratos."
      domain: "high-ticket-sales"
      source: "Segredos do High Ticket Módulo 1"

    - id: "FIL-RM-044"
      text: "Existem funis específicos para cada tipo de oferta na escada de valor — cada degrau tem funis que performam melhor pela sua estrutura."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Lead A1"

    - id: "FIL-RM-045"
      text: "Não te canses pra ficar rico. Quando a empresa tá gorda de caixa, você multiplica muito rápido."
      domain: "financial-discipline"
      source: "Mentalidade Para Enriquecer"

  L2_MENTAL_MODELS:
    - id: "MM-RM-001"
      text: "Página de vendas como funil: 100% no topo, 75% passam pelo próximo bloco, 52% pelo seguinte. O jogo é otimizar cada pedaço para mais gente passar ao próximo nível."
      domain: "CRO"
      source: "Páginas de Vendas de Alta Conversão"

    - id: "MM-RM-002"
      text: "Preço determina comprimento do funil: R$37 = vídeo 5 min; R$297 = VSL 25 min; R$997 = webinário 45-90 min; R$30k+ = evento presencial 3 dias."
      domain: "funnel-architecture"
      source: "Páginas de Vendas de Alta Conversão"

    - id: "MM-RM-003"
      text: "Três mercados fundamentais: Todo mercado existe em torno de três desejos — Riqueza, Saúde, Relacionamento. Submercados → Nichos."
      domain: "offer-construction"
      source: "Operação Funil Destrava S1D1"

    - id: "MM-RM-004"
      text: "Três tipos de tráfego: Pago (anúncios), Orgânico (conteúdo/pesquisa/afiliados), Que Possuo (listas de email, seguidores, Telegram). Foco = transformar pago e orgânico em tráfego que você possua."
      domain: "traffic-scaling"
      source: "Operação Funil Destrava S4D1"

    - id: "MM-RM-005"
      text: "Feed vs Pesquisa: Pesquisa é mais quente mas age por comparação (preço). Feed é mais caro mas eu determino o valor e o preço — alta escala, controle de precificação."
      domain: "traffic-scaling"
      source: "Operação Funil Destrava S4D1"

    - id: "MM-RM-006"
      text: "Três falsas crenças: A mente da pessoa foge em 3 níveis — Falsa Crença no Veículo (sobre o produto), Interna (sobre si mesma), Externa (culpa algo externo)."
      domain: "copywriting-sales-pages"
      source: "Operação Funil Destrava S1D1"

    - id: "MM-RM-007"
      text: "Quatro níveis de consciência para anúncios: Consciente da Dor → do Problema → da Solução → do Produto. Cada nível requer copy diferente."
      domain: "traffic-scaling"
      source: "Operação Funil Destrava S4D2"

    - id: "MM-RM-008"
      text: "Funil da Prosperidade (3 pontas): Habilidade (paga sua vida) + Negócio Escalável (enriquece você) + disciplina de não misturar os dois."
      domain: "financial-discipline"
      source: "Masterclass Enriquecimento"

    - id: "MM-RM-009"
      text: "Copy Direta vs Indireta: Produtos baratos (até R$67) = copy direta. Produtos caros (R$197+) = copy indireta com história, jornada, construção de confiança."
      domain: "copywriting-sales-pages"
      source: "Páginas de Vendas de Alta Conversão"

    - id: "MM-RM-010"
      text: "Analogia da loja de bicicleta: bicicleta → capacete → sapatilha. Cada upsell gera mais dinheiro que foi gratuito de adquirir."
      domain: "funnel-architecture"
      source: "Operação Funil Destrava Prep D1"

    - id: "MM-RM-011"
      text: "Escada de Valor (Value Ladder): Grátis > Front-end (R$7-R$397) > Back-end (R$997-R$3000) > High-end (R$5000+). Cada degrau tem público ideal: frio > morno > quente."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Lead A1"

    - id: "MM-RM-012"
      text: "Ponto de Conversão Ótimo: Front-end = público frio, Back-end = público morno, High-end = público quente. Vender fora do ponto ótimo reduz conversão."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Backend VSL"

    - id: "MM-RM-013"
      text: "Modelo Perpétuo vs Campanha: Perpétuo = crescimento linear, previsível, mais liberdade. Campanha = explosão de caixa, mais correria. Front-end é SEMPRE perpétuo."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Escolhendo Funis"

    - id: "MM-RM-014"
      text: "Corredor da Americana (upsells): Order bump + Upsell 1 + Upsell 2 são como produtos no corredor do checkout — ao nível das crianças, enquanto espera na fila."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Frontend A1"

    - id: "MM-RM-015"
      text: "Tripwire como Arma de Conquista: Não para enriquecer, mas para ganhar o direito de ser ouvido. Dá 4h de atenção ininterrupta que social media nunca daria."
      domain: "tripwire-strategy"
      source: "Segredos do Tripwire A1"

    - id: "MM-RM-016"
      text: "Fórmula Secreta (6 perguntas): QUEM serve + O QUE querem + ONDE estão + ANZOL (ganchos) + RESULTADO único + NOVO VEÍCULO. Se faltar qualquer uma = projeto não funciona."
      domain: "offer-construction"
      source: "Jornada de Produtos Fase 3"

    - id: "MM-RM-017"
      text: "Mapa Ponto A → Ponto B: Estado atual → resultado desejado → listar TODOS os passos intermediários → agrupar por afinidade → grupos viram degraus da escada."
      domain: "funnel-architecture"
      source: "Jornada de Produtos Escada de Valor"

    - id: "MM-RM-018"
      text: "Inversão Psicológica no High Ticket: Faça a pessoa se vender para você. Perguntas de aplicação fazem o prospect admitir que precisa de ajuda."
      domain: "high-ticket-sales"
      source: "FUNIOLOGIA High Ticket A1"

    - id: "MM-RM-019"
      text: "Regra do Melhor Primeiro Beijo: Sua mini-oferta precisa ser o melhor primeiro beijo que a pessoa já deu. Quando dá o melhor primeiro beijo, ela já quer o segundo."
      domain: "mini-offers"
      source: "A Nova Onda Micro Ofertas"

    - id: "MM-RM-020"
      text: "Alternância de Formato: Não pode dar produto na mesma experiência do próximo. Mesma balada, mesma camisa, mesmo beijo — ninguém volta."
      domain: "customer-ascension"
      source: "A Nova Onda Micro Ofertas"

    - id: "MM-RM-021"
      text: "Modelo do Outdoor (Ad-Dor): Um outdoor faz efeito por no máximo 15 dias. Criativos de anúncios têm a mesma vida útil — CTR cai e perde relevância."
      domain: "traffic-scaling"
      source: "Escala Secreta Mastermind"

    - id: "MM-RM-022"
      text: "Topo do Funil Sempre Paga Mais: Aumentar taxa de conversão da página sempre dará mais dinheiro que otimizar upsell."
      domain: "CRO"
      source: "Masterclass #1"

    - id: "MM-RM-023"
      text: "ACV (Average Cart Value): De 10 pessoas, se 3 compram R$300, o ACV sobe de R$20 para R$110. Isso muda o jogo."
      domain: "funnel-architecture"
      source: "Masterclass #2"

    - id: "MM-RM-024"
      text: "Teste AB como Arte Perdida: Taxa de conversão da página tende a ser a mesma para sempre. Diferente de criativos que saturam. Teste de página dura pra sempre."
      domain: "CRO"
      source: "Masterclass #1"

    - id: "MM-RM-025"
      text: "Seeding Dentro do Produto: Semear várias vezes sobre o próximo produto dentro deste. Criar na cabeça do cliente um problema que a promessa do outro resolve."
      domain: "customer-ascension"
      source: "A Nova Onda Micro Ofertas"

    - id: "MM-RM-026"
      text: "Promessa Menor Vende Mais: Quanto menos prometer na mini-oferta, mais vende. Promessas minúsculas, específicas."
      domain: "mini-offers"
      source: "A Nova Onda Micro Ofertas"

    - id: "MM-RM-027"
      text: "Corrida dos Ratos Financeira: Se custo de vida consome todo o lucro do funil, você fica preso. A técnica mirabolante é ter mais dinheiro pra investir."
      domain: "financial-discipline"
      source: "Mentalidade Para Enriquecer"

    - id: "MM-RM-028"
      text: "Modelo Fábrica de Criativos: Designer só faz criativos. Gestor de teste só sobe e testa. Gestor de escala só analisa e escala. Separar funções = escala real."
      domain: "traffic-scaling"
      source: "Escala Secreta Mastermind"

    - id: "MM-RM-029"
      text: "Dominação da Conversa no High Ticket: Você assume o controle. A pessoa tem que se vender pra você. Se ela assumir o domínio, acabou."
      domain: "high-ticket-sales"
      source: "Masterclass #3"

    - id: "MM-RM-030"
      text: "3 Pilares da Mensagem: 2 pilares técnicos (autoridade) + 1 pilar pessoal (empatia/conexão). ~70% técnico, ~30% pessoal."
      domain: "content-funnels"
      source: "Funil de Conteúdo A5"

    - id: "MM-RM-031"
      text: "Habilidade vs Estilo de Vida para escolha de funil: Bom ao vivo? Bom em copy? Quer liberdade? Ao vivo = mais correria mas mais conversão. Gravado = mais liberdade."
      domain: "funnel-architecture"
      source: "FUNIOLOGIA Escolhendo Funis"

    - id: "MM-RM-032"
      text: "Temperatura do Tráfego: Frio (nunca te viu), Morno (audiência/lista), Quente (clientes). Determina qual produto/funil usar."
      domain: "traffic-scaling"
      source: "FUNIOLOGIA Backend VSL"

  L3_HEURISTICS:
    - id: "HEUR-RM-001"
      text: "Front-end funciona para R$97 até R$297. De R$397 para cima, usar webinário."
      domain: "funnel-architecture"
      source: "Operação Funil Destrava S2D3"

    - id: "HEUR-RM-002"
      text: "Webinário funciona para R$697 a R$1.500 (até R$2.000). Acima de R$2.000, use lançamento ou evento presencial."
      domain: "webinar-methodology"
      source: "Páginas de Vendas Alta Conversão"

    - id: "HEUR-RM-003"
      text: "VSL de R$37-67: ~5 minutos. R$197-297: 15-25 min. R$397-497: 30-40 min."
      domain: "copywriting-sales-pages"
      source: "Páginas de Vendas Alta Conversão"

    - id: "HEUR-RM-004"
      text: "Valor total da oferta deve ser pelo menos 10x o preço cobrado. Montante R$4.000, cobre R$400."
      domain: "offer-construction"
      source: "Operação Funil Destrava S1D2"

    - id: "HEUR-RM-005"
      text: "Na hora de ancorar preço dos bônus, NÃO corte para zero. Mostre o valor de cada peça individualmente."
      domain: "offer-construction"
      source: "Operação Funil Destrava S1D2"

    - id: "HEUR-RM-006"

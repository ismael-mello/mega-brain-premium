        sources: [PTM, 10XMB, 10XBBA, CWIRE, SF]

      - id: "MET-GC-080"
        name: "SEO Content Creation Method"
        steps:
          - "Step 1: Research keywords with Google Keyword Planner and YouTube suggest"
          - "Step 2: Select 10 pillar topics with highest search volume + relevance"
          - "Step 3: Write 2,000+ word article for each pillar (or 15+ minute video)"
          - "Step 4: Create 5-10 cluster pieces per pillar — long-tail keywords"
          - "Step 5: Internal link all cluster pieces to their pillar"
          - "Step 6: Optimize: keyword in title, H1, first paragraph, meta description"
          - "Step 7: Build backlinks through guest posting and PR"
          - "Step 8: Update content quarterly — add new data, refresh examples"
          - "Step 9: Track rankings weekly — page 1 for 10 keywords within 12 months"
        domain: "seo"
        sources: [10XMB]

      - id: "MET-GC-081"
        name: "YouTube Channel Growth Method"
        steps:
          - "Step 1: Niche down — pick one topic you can create 100+ videos about"
          - "Step 2: Post 3x per week minimum — consistency builds the algorithm's trust"
          - "Step 3: First 30 seconds = hook — state what they'll learn, why it matters"
          - "Step 4: Title: primary keyword first, then benefit statement"
          - "Step 5: Thumbnail: face showing emotion + 3-5 words of text + contrasting colors"
          - "Step 6: CTA at end: subscribe, comment, watch next video (link in description)"
          - "Step 7: Analyze: watch time > views, retention curve, click-through rate"
          - "Step 8: Double down on topics with highest retention — the algorithm rewards watch time"
        domain: "seo"
        sources: [10XMB]

      - id: "MET-GC-082"
        name: "Email List Building Method"
        steps:
          - "Step 1: Create irresistible lead magnet (solves specific, urgent problem)"
          - "Step 2: Build landing page with single opt-in form"
          - "Step 3: Drive traffic via paid ads (Facebook, Google) + organic content"
          - "Step 4: Tripwire offer on thank-you page ($7-$27)"
          - "Step 5: Welcome sequence: 7 emails over 14 days"
          - "Step 6: Daily broadcasts: 80% value, 20% pitch"
          - "Step 7: Segment by behavior: openers, clickers, buyers"
          - "Step 8: Clean list quarterly: remove 90-day inactive subscribers"
          - "Step 9: Target: 1,000 subscribers in first 30 days, 10,000 by month 6"
        domain: "email-marketing"
        sources: [10XMB]

      - id: "MET-GC-083"
        name: "Podcast Launch and Monetization Method"
        steps:
          - "Step 1: Define niche and target listener — be specific"
          - "Step 2: Record 5 episodes before launching (release all at once for momentum)"
          - "Step 3: Episode structure: 3-min hook → 15-30 min content → 5-min CTA"
          - "Step 4: Distribute to all platforms: Apple, Spotify, YouTube, Google"
          - "Step 5: Weekly release schedule — same day, same time"
          - "Step 6: Repurpose each episode: blog post, social clips, email, quotes"
          - "Step 7: Monetize: CTA to your funnel, not ads. Your funnel converts better than $20 CPM."
          - "Step 8: Guest strategy: interview people whose audience you want to reach"
        domain: "podcasting"
        sources: [10XMB]

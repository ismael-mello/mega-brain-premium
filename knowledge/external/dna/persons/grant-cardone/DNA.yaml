      - id: "MET-GC-075"
        name: "Real Estate Portfolio Building Method"
        steps:
          - "Step 1: Build income to $100K+ through sales skills (SF, CU)"
          - "Step 2: Save aggressively — save to invest, not to save (PTM)"
          - "Step 3: Build broker relationships — 365-day follow-up calendar"
          - "Step 4: Analyze 100 deals → find 1 winner"
          - "Step 5: Acquire first property — 32+ units, 50% expense ratio test"
          - "Step 6: Value-add — renovate, raise rents, improve management"
          - "Step 7: Refinance — pull out capital"
          - "Step 8: Deploy capital into next property"
          - "Step 9: Scale to 5 properties → launch syndication"
          - "Step 10: Syndication — raise capital from investors for larger deals"
        domain: "real-estate-investing"
        sources: [CWIRE, PTM]

      - id: "MET-GC-076"
        name: "Advanced Stall Close Toolkit Method"
        steps:
          - "Think-About-It: use 5-response sequence — escalate from soft to direct"
          - "Spouse Stall: use decision tree — product vs money → isolate specific"
          - "Need to Research: 'Better than research — let me introduce you to a current client'"
          - "Need to Sleep On It: 'Sleep is for after decisions, not before. What's the real concern?'"
          - "Call You Back: 'I'd rather help you now. What would make this a yes?'"
          - "Not Ready Yet: 'What needs to happen for you to be ready? Let's make that happen now.'"
          - "Bad Timing: 'Is there ever a good time to solve a problem? The best time is when you're aware of it.'"
          - "For each stall: identify the real objection hiding behind the stall"
        domain: "stall-closes"
        sources: [CU-2, MO]

      - id: "MET-GC-077"
        name: "Product Close Toolkit Method"
        steps:
          - "Don't Need It: 'You're right — nobody NEEDS it. But everyone who has it is glad they got it.'"
          - "Already Have One: 'Great — then you know the value. Let me show you how this is better.'"
          - "Prefer Competitor: 'I respect that. What specifically do you prefer? Let me show you our version.'"
          - "Too Complex: 'That's exactly why we include [support/training]. You won't be alone.'"
          - "Not What Expected: 'What WERE you expecting? Let me see if we have something that fits.'"
          - "Missing Features: 'Which features are must-haves? Let me show you how we handle that.'"
          - "Quality Concerns: Offer trial (Puppy Dog Close)"
          - "For each product objection: reframe from 'what's wrong' to 'what would make it right'"
        domain: "product-closes"
        sources: [CU-2]

      - id: "MET-GC-078"
        name: "Money Close Master Method (Top 10 Most Used)"
        steps:
          - "1. Agreement Close: 'I agree it's a lot. I need your OK here.'"
          - "2. Budget Close: Compare to existing expenses they already pay"
          - "3. Payment Breakdown: Divide by 365 days"
          - "4. Reduction to Ridiculous: 'Less than your cable bill'"
          - "5. Ben Franklin: Two columns — reasons to buy vs wait"
          - "6. Make-Affordable: 'I make my living making things affordable'"
          - "7. Now or Never: Genuine scarcity + deadline"
          - "8. Assumptive: Don't ask IF, ask WHICH"
          - "9. Puppy Dog: 'Take it home, try it, bring it back if you don't love it'"
          - "10. Investment Close: 'You're not spending — you're investing in [outcome]'"
          - "Rule: Try 3 different money closes before accepting a financial no"
        domain: "money-closes"
        sources: [CU-2, MO]

      - id: "MET-GC-079"
        name: "Wealth Ecosystem Integration Method"
        steps:
          - "Step 1: Master sales — generate $100K+ active income (SF, CU, CU-2 skills)"
          - "Step 2: Save to invest — never increase lifestyle with income increases (PTM)"
          - "Step 3: Build digital marketing machine — funnels, email, omnipresence (10XMB)"
          - "Step 4: First investment: acquire a small business with seller financing (10XBBA)"
          - "Step 5: Apply 10X sales skills to grow acquired business"
          - "Step 6: Second investment: first multifamily property 32+ units (CWIRE)"
          - "Step 7: Value-add → refinance → pull out capital"
          - "Step 8: Repeat: income → invest → cash flow → reinvest"
          - "Step 9: Scale to syndication when net worth exceeds $5M"
          - "Step 10: Multiple streams: sales income + business profits + real estate cash flow"

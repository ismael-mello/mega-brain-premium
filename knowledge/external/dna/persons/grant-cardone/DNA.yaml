layers:

  L1_PHILOSOPHIES:
    count: 100
    elements:
      - id: "FIL-GC-001"
        content: "Selling is not a job or a career. Selling is a way of life. Your ability to do well in life, to survive, to prosper depends solely on your ability to sell others on those things you believe in."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "FIL-GC-002"
        content: "The number one reason a business fails is not because they are undercapitalized. The number one reason is their ideas were not sold quickly enough, in quantities great enough, and at prices high enough."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "FIL-GC-003"
        content: "Everything in life is a commission. Every reward you will get is a commission for something you produced. The whole world is on commission — they just don't know it."
        domain: "commission"
        sources: [SF, CU, PTM]

      - id: "FIL-GC-004"
        content: "There is no salary guaranteed in life. If the company collapses, your salary goes away. Your production, your ability to perform in the marketplace, is where you get your security from."
        domain: "commission"
        sources: [SF, CU]

      - id: "FIL-GC-005"
        content: "Commission jobs are the only real way to create financial security. Don't be scared of commission — embrace it. Every great thing in life is a commission for something you did."
        domain: "commission"
        sources: [SF]

      - id: "FIL-GC-006"
        content: "99% of all so-called professional salespeople have only a slight idea of what selling actually is. The real pros don't even call themselves salespeople — they call themselves litigators, negotiators, entrepreneurs, inventors."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "FIL-GC-007"
        content: "If you're not selling, to some degree, you're not sold. If your sales are slowing down, immediately understand: you're not sold on something. The degree to which you are sold determines the degree to which you will sell."
        domain: "conviction"
        sources: [SF, CU]

      - id: "FIL-GC-008"
        content: "Conviction is the make-break point. A sale is made when your conviction and belief about something is stronger than another's. At that point, the other person gives up their conviction and becomes convinced of yours."
        domain: "conviction"
        sources: [SF, CU]

      - id: "FIL-GC-009"
        content: "You must become so thoroughly and completely sold on your product that your conviction becomes irresistible. You must never allow the consideration that anyone else could compete with you."
        domain: "conviction"
        sources: [SF, CU, MO]

      - id: "FIL-GC-010"
        content: "While it's promoted in society to be reasonable and sensible, this will not service you in sales. In sales, if you want greatness, you've got to be unreasonable."
        domain: "mindset"
        sources: [SF, CU, PTM]

      - id: "FIL-GC-011"
        content: "Most people incorrectly estimate the amount of effort it takes to get results. When it comes to taking action, never think in terms of balance. Think in terms of massive, out-of-balance amounts of action."
        domain: "massive-action"
        sources: [SF, CU, PTM]

      - id: "FIL-GC-012"
        content: "Don't buy the mumbo jumbo that you need balance in your life. It's a lie. You need massive action. These people who talk about taking it easy are trying to convince you to have a mediocre life."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "FIL-GC-013"
        content: "I am happiest when I am producing and creating. Production yields happiness. I love the satisfaction of accomplishing the task. I have never met anyone who does not feel better when they finish something."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "FIL-GC-014"
        content: "The 10X Rule: whatever you think you need to do, increase the amount far greater than you think is necessary — at least ten times — and you will get results beyond your wildest expectations."
        domain: "massive-action"
        sources: [SF, CU, PTM]

      - id: "FIL-GC-015"
        content: "If you take 10 times more action than you think is necessary, you can give up hope. You don't have to hope, wish, or cross your fingers. What you want and far more will come."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "FIL-GC-016"
        content: "Be unreasonable, even insane, with the amount of action you take. The people who tell you to relax, take it easy, stop working so hard — they are like communists trying to create a middle class."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "FIL-GC-017"
        content: "You're putting too much attention on selling people you don't know and ignoring the people you do know. Your power base is gold — mine it."
        domain: "power-base"
        sources: [SF, CU, PTM]

      - id: "FIL-GC-018"
        content: "Everyone has a power base — family, friends, relatives, past associates. One of the fastest ways to NOT get into power is to abandon those people. They already know you, trust you, want to help you."
        domain: "power-base"
        sources: [SF, CU, PTM]

      - id: "FIL-GC-019"
        content: "The most powerful person in the world has 24 hours in a day. The richest has 3,600 minutes. You have the same. When people say they don't have enough time — it's a lie."
        domain: "time-management"
        sources: [SF, CU]

      - id: "FIL-GC-020"
        content: "Time is money if you're producing. Time is money when you're not doing anything too, because somebody else is collecting money while you lie on the couch."
        domain: "time-management"
        sources: [SF, CU]

      - id: "FIL-GC-021"
        content: "The average person watches over three hours of TV a day. That's 67,500 minutes a year. If every call took three minutes, that's 22,500 extra calls you could make."
        domain: "time-management"
        sources: [SF]

      - id: "FIL-GC-022"
        content: "You are the creator of every objection. You must take full responsibility for the customer's objection."
        domain: "objection-handling"
        sources: [MO]

      - id: "FIL-GC-023"
        content: "Most objections are complaints that should not be handled, but used as a reason to close. The biggest mistake in handling objections is treating complaints as actual objections."
        domain: "objection-handling"
        sources: [MO]

      - id: "FIL-GC-024"
        content: "Objections are never a reason not to close or stop working your deal. An objection is just an expression of interest that has not been fully satisfied."
        domain: "objection-handling"
        sources: [MO, CU]

      - id: "FIL-GC-025"
        content: "The most dangerous objection is the unspoken one. The objection you never hear is the one that kills the deal."
        domain: "objection-handling"
        sources: [MO]

      - id: "FIL-GC-026"
        content: "The greatest sales secret of all time is not closing — it is follow-up. Great salespeople are not talkers. They are professional stalkers."
        domain: "follow-up"
        sources: [PTM, HMMP, CU]

      - id: "FIL-GC-027"
        content: "The 98-2 Rule: 98% of all people you interact with will not buy from you the first time. That means 98% of your future income lies in follow-up."
        domain: "follow-up"
        sources: [PTM, HMMP]

      - id: "FIL-GC-028"
        content: "If you can't make time, you will never have money. You don't have a time problem — you have a priorities problem."
        domain: "time-management"
        sources: [PTM, HMMP]

      - id: "FIL-GC-029"
        content: "Always mix business and family. If you can't sell your family, if you can't get money from your friends and family, who can you get it from?"
        domain: "power-base"
        sources: [PTM, SF]

      - id: "FIL-GC-030"
        content: "You live on an economic planet. Finances are vital to your life, your parents, your kids, your marriage. Marriages fall apart because of finances. People are stressed because of finances."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-031"
        content: "Millionaire status is today's new middle class. The middle class in 1974 is not the middle class of today. The only solution for the middle class is to become a millionaire."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-032"
        content: "You do not need to believe in yourself to get started. You need to believe in two things: the possibility, and the source of the content (your coach)."
        domain: "mindset"
        sources: [PTM]

      - id: "FIL-GC-033"
        content: "Becoming a millionaire is two parts mental, one part mechanical. If you don't get the mental handled, the mechanical won't matter because you will quit."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-034"
        content: "Stay on alert about money. I'm not paranoid — I am aware of the situation. Bad things happen to good people every day. My dad's heart blew up in his chest. That was not in the business plan."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-035"
        content: "The phone was first used to sell something. The reason people are calling is because we have buyers actively seeking to buy. The phone is the greatest multiplier of money ever invented."
        domain: "phone-sales"
        sources: [HMMP]

      - id: "FIL-GC-036"
        content: "Every person on this planet can either make more money or lose more money on the phone in two minutes than at any other job. Your phone is the ATM of the future."
        domain: "phone-sales"
        sources: [HMMP]

      - id: "FIL-GC-037"
        content: "Selling affects every person on this planet. Your ability or inability to sell, persuade, negotiate, and convince others affects every single area of your life and determines how well you survive."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "FIL-GC-038"
        content: "The best things in life are not free. The best things come as a result of something extra that you did, some obstacle you overcame. Happiness, security, love — all commissions."
        domain: "commission"
        sources: [SF]

      - id: "FIL-GC-039"
        content: "There is a Great Shortage — not of products, not of money, not of opportunities. There is a shortage of professional salespeople who are committed and dedicated to their craft."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "FIL-GC-040"
        content: "Confidence is the key to selling. To the degree that you are sold, you will sell. You want to move beyond selling into complete believability."
        domain: "conviction"
        sources: [SF, CU]

      - id: "FIL-GC-041"
        content: "Your education, the part of town you grew up in, the color of your skin — none of that matters. The only thing that matters is your decision and your action."
        domain: "mindset"
        sources: [PTM, SF]

      - id: "FIL-GC-042"
        content: "I had more money at age 8 than at age 25. I was using the wrong ingredients. There is a recipe for wealth — if you use the wrong ingredients, you will not get there."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-043"
        content: "Immersion is the doorway to loyalty. The second purchase validates the first sale. You should always go for second money."
        domain: "closing"
        sources: [PTM, CU]

      - id: "FIL-GC-044"
        content: "Don't present yourself as a solopreneur. Even when I was starting out, I would change my voice and call on behalf of myself to appear bigger."
        domain: "sales-management"
        sources: [PTM]

      - id: "FIL-GC-045"
        content: "Selling is used every day by every person on this planet and no one is excluded. It is a prerequisite for all the success you're going to create in your life."
        domain: "sales-fundamentals"
        sources: [SF]

      - id: "FIL-GC-046"
        content: "The only reason you won't like selling is because you don't understand it yet. Once you become a professional, you will love it because you will be in control."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "FIL-GC-047"
        content: "Greener pastures don't exist. The grass is not greener somewhere else. Wherever you go, you take yourself with you. Get great where you are."
        domain: "mindset"
        sources: [SF, CU]

      - id: "FIL-GC-048"
        content: "A lie detector cannot tell the difference between the truth and a lie if the individual believes the lie to be true. Get yourself that sold."
        domain: "conviction"
        sources: [SF]

      - id: "FIL-GC-049"
        content: "Health is a commission for taking care of yourself. Love is a commission for finding and caring for the right partner. Every great thing is earned through production."
        domain: "commission"
        sources: [SF]

      - id: "FIL-GC-050"
        content: "Alexander Graham Bell was considered a lunatic. The impossible is only impossible until someone makes it possible. Photography, flights, space travel — all became possible through conviction."
        domain: "conviction"
        sources: [SF]

      - id: "FIL-GC-051"
        content: "Your problem is not bad luck or misfortune. Your problem is you don't have enough in your pipeline. When you have 10X the pipeline, cancellations become welcome — they free up your time."
        domain: "pipeline-management"
        sources: [SF, CU, HMMP]

      - id: "FIL-GC-052"
        content: "If I took small amounts of action, every lost deal would be a collapse. With massive action, a cancelled appointment is a relief because I have two more people to focus on."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "FIL-GC-053"
        content: "Save to invest, don't save to save. Saving without investing is just protecting money that loses value. The wealthy don't save — they invest."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-054"
        content: "47% of Americans don't have $400 to their name. 62-76% live paycheck to paycheck. Nobody plans on disaster — but rich people can handle it because they have the economic cushion."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-055"
        content: "Your teachers didn't teach you how to be a millionaire. Schools don't teach it. Your parents probably didn't teach it. In fact, society is part of the block."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-056"
        content: "Get so rich that nobody can tell you what to do. Get so rich that you own the town. That's what your parents should have told you."
        domain: "wealth-building"
        sources: [PTM]

      - id: "FIL-GC-057"
        content: "Commit to being a master of objections. Work on objections every single day. If you can predict objections, you can handle them. Prediction is the key."
        domain: "objection-handling"
        sources: [MO, CU]

      - id: "FIL-GC-058"
        content: "In closing, I learned this: I could close anyone. But closing is not the greatest secret. The greatest secret is keeping a full pipeline through relentless follow-up."
        domain: "follow-up"
        sources: [PTM, CU]

      - id: "FIL-GC-059"
        content: "Always, always, always agree with the buyer. Agreement does not mean laying down — it means removing confrontation first, then redirecting from a position of alignment."
        domain: "closing"
        sources: [PTM, CU]

      - id: "FIL-GC-060"
        content: "You can take a horse to water but you can't make him drink — hold that horse's head underwater long enough and he'll open up for a gasp of air and take in some water. Insist on the close."
        domain: "closing"
        sources: [PTM]

      # ===== 10XMB: 10x Marketing Bundle =====

      - id: "FIL-GC-061"
        content: "Marketing is not an expense — it is an investment. The businesses that dominate are the ones that refuse to cut marketing budgets in downturns. Omnipresence is not optional."
        domain: "omnipresence"
        sources: [10XMB]

      - id: "FIL-GC-062"
        content: "Email marketing produces $42 for every $1 spent. There is no marketing channel on earth with that kind of ROI. If you are not emailing your list daily, you are leaving millions on the table."
        domain: "email-marketing"
        sources: [10XMB]

      - id: "FIL-GC-063"
        content: "A funnel is not a website. A funnel is a machine that turns strangers into buyers through a series of micro-commitments. Every step escalates commitment."
        domain: "sales-funnels"
        sources: [10XMB]

      - id: "FIL-GC-064"
        content: "You don't need more traffic. You need better conversion. Most businesses are leaking money at every stage of their funnel and blaming traffic for poor results."
        domain: "conversion-optimization"
        sources: [10XMB]

      - id: "FIL-GC-065"
        content: "Omnipresence means being everywhere your customer looks. When they see you on YouTube, Instagram, email, and billboards in the same week — that creates inevitability."
        domain: "omnipresence"
        sources: [10XMB]

      - id: "FIL-GC-066"
        content: "Your subject line is a billboard on a highway. People are driving 70 miles an hour. You have 2 seconds. If the subject line doesn't grab them, the email doesn't exist."
        domain: "email-marketing"
        sources: [10XMB]

      - id: "FIL-GC-067"
        content: "Content is not king. Distribution is king. The best content in the world means nothing if nobody sees it. Create once, distribute everywhere."
        domain: "omnipresence"
        sources: [10XMB]

      - id: "FIL-GC-068"
        content: "Webinars are the greatest selling tool of the digital age. You get 60-90 minutes of someone's undivided attention. No cold call gives you that. No ad gives you that."
        domain: "webinars"
        sources: [10XMB]

      # ===== 10XBBA: Business Buying Accelerator =====

      - id: "FIL-GC-069"
        content: "The fastest way to 10X your income is not to start a business — it's to buy one. Someone else already did the hard work. You just need to find it, negotiate it, and scale it."
        domain: "business-buying"
        sources: [10XBBA]

      - id: "FIL-GC-070"
        content: "You don't need to be rich to buy a business. You need to be smart. Seller financing, earn-ins, and creative deal structures let you acquire businesses with little to no money down."
        domain: "deal-structure"
        sources: [10XBBA]

      - id: "FIL-GC-071"
        content: "Every business is for sale. The owner might not know it yet. Your job is to find businesses where the owner is tired, burned out, or ready to retire — and make them an offer they can't refuse."
        domain: "acquisitions"
        sources: [10XBBA]

      - id: "FIL-GC-072"
        content: "Due diligence is where deals are won or lost. The amateur skips due diligence because they're excited. The professional lives in due diligence because that's where the truth is."
        domain: "due-diligence"
        sources: [10XBBA]

      - id: "FIL-GC-073"
        content: "Never buy a business that depends on one customer for more than 25% of its revenue. That's not a business — it's a job disguised as a business with one employer."
        domain: "due-diligence"
        sources: [10XBBA]

      - id: "FIL-GC-074"
        content: "The best acquisitions are boring businesses that make money while you sleep. Laundromats, car washes, storage facilities — they don't need your ego, they need your capital."
        domain: "business-buying"
        sources: [10XBBA]

      # ===== CWIRE: Real Estate Wealth =====

      - id: "FIL-GC-075"
        content: "Real estate is the greatest wealth-building vehicle in history. More millionaires are created through real estate than any other investment class. It provides income, appreciation, tax benefits, and leverage."
        domain: "real-estate-investing"
        sources: [CWIRE]

      - id: "FIL-GC-076"
        content: "Never invest in single-family homes for cash flow. The math doesn't work. One vacancy and you're negative. Multifamily is the only real estate investment that makes mathematical sense."
        domain: "multifamily"
        sources: [CWIRE]

      - id: "FIL-GC-077"
        content: "Cash flow is the blood of real estate investing. Appreciation is the bonus. Never buy a property for appreciation alone — that's speculation, not investing."
        domain: "cash-flow"
        sources: [CWIRE]

      - id: "FIL-GC-078"
        content: "You do not need to save $100,000 to start investing in real estate. You need to earn $100,000 first. Income solves all problems. Once you have income, use leverage to multiply it."
        domain: "real-estate-investing"
        sources: [CWIRE]

      - id: "FIL-GC-079"
        content: "I would rather own 100 units in one building than 100 single-family homes across a city. Concentration creates efficiency. Dispersion creates headaches."
        domain: "multifamily"
        sources: [CWIRE]

      - id: "FIL-GC-080"
        content: "The 16-unit minimum: never buy less than 16 units. Below 16, you can't support a full-time property manager. The ideal first deal is 32 units — enough scale to be self-sustaining."
        domain: "multifamily"
        sources: [CWIRE]

      - id: "FIL-GC-081"
        content: "Leverage is the secret weapon of the wealthy. With 3-4x leverage in real estate, you control $4 million in assets with $1 million in capital. The bank does the heavy lifting."
        domain: "leverage"
        sources: [CWIRE]

      - id: "FIL-GC-082"
        content: "Follow up with every broker for 365 days. Most investors give up after 3 calls. I follow up for a year. When the right deal comes, the broker calls ME first because I was persistent."
        domain: "real-estate-investing"
        sources: [CWIRE]

      # ===== CU-2: Cardone University 2nd Half =====

      - id: "FIL-GC-083"
        content: "Closing is not a single event — it is a process of accumulating small agreements until the final yes becomes inevitable. Every question you ask should be a closing question."
        domain: "closing-strategies"
        sources: [CU-2]

      - id: "FIL-GC-084"
        content: "There are only three categories of closes: money closes, stall closes, and product closes. Master all three and you become unstoppable. Most salespeople only know one category."
        domain: "closing-strategies"
        sources: [CU-2]

      - id: "FIL-GC-085"
        content: "The Five-No Strategy: no deal is dead until you've heard 'no' at least five times. Each 'no' is just a request for more information, more value, or a different approach."
        domain: "closing-strategies"
        sources: [CU-2]

      - id: "FIL-GC-086"
        content: "The Road to the Sale is not a suggestion — it is a science. 13 steps, in order, every time. Skip a step and objections multiply exponentially."
        domain: "road-to-sale"
        sources: [CU-2]

      - id: "FIL-GC-087"
        content: "Cold calling is not dead. It's the salespeople who are dead — dead from lack of training, lack of scripts, lack of conviction. The phone still works for anyone willing to use it."
        domain: "cold-calling"
        sources: [CU-2, HMMP]

      # ===== Cross-program philosophies (emerged from new sources) =====

      - id: "FIL-GC-088"
        content: "Diversification is for people who don't know what they're doing. Concentrate your resources on what you know best — sales, real estate, business buying — and dominate it."
        domain: "wealth-building"
        sources: [CWIRE, 10XBBA, PTM]

      - id: "FIL-GC-089"
        content: "Your marketing should make you omnipresent. Your sales skills should make you unstoppable. Your investments should make you untouchable. All three together create true wealth."
        domain: "wealth-building"
        sources: [10XMB, CWIRE, PTM]

      - id: "FIL-GC-090"
        content: "A split test is not a luxury — it is a requirement. Never run a campaign without testing. The market tells you what works, not your opinion."
        domain: "split-testing"
        sources: [10XMB]

      - id: "FIL-GC-091"
        content: "SEO is free traffic from people actively searching for your solution. Ignoring SEO is like ignoring a line of buyers outside your store. Organic search is the compound interest of marketing."
        domain: "seo"
        sources: [10XMB]

      - id: "FIL-GC-092"
        content: "Podcasting and YouTube are long-form trust builders. A 30-second ad creates awareness. A 60-minute podcast creates a relationship. Relationships close deals."
        domain: "podcasting"
        sources: [10XMB]

      - id: "FIL-GC-093"
        content: "Seller financing is the greatest gift in business acquisitions. The seller becomes the bank. You pay them over time from the profits of the business they built. Everybody wins."
        domain: "deal-structure"
        sources: [10XBBA]

      - id: "FIL-GC-094"
        content: "A leveraged buyout is not just for Wall Street. Small businesses can be acquired with LBO structures where the business's own cash flow pays for the acquisition. The asset pays for itself."
        domain: "deal-structure"
        sources: [10XBBA]

      - id: "FIL-GC-095"
        content: "Syndication allows you to pool capital from multiple investors to acquire properties you could never afford alone. It is the ultimate leverage — other people's money working for everyone."
        domain: "syndication"
        sources: [CWIRE]

      - id: "FIL-GC-096"
        content: "Value-add is where the real money is in real estate. Buy something ugly, fix it up, raise rents to market rate, refinance, and repeat. You create equity through improvement, not waiting."
        domain: "value-add"
        sources: [CWIRE]

      - id: "FIL-GC-097"
        content: "The Payment Breakdown method: never let a buyer focus on total price. Break every number into daily cost. A $30,000 product is $82 a day. People spend more than that on coffee and lunches."
        domain: "money-closes"
        sources: [CU-2]

      - id: "FIL-GC-098"
        content: "Cart abandonment is the silent killer of online businesses. 70% of carts are abandoned. A 3-email recovery sequence can recapture 15-20% of those lost sales. That's free money."
        domain: "conversion-optimization"
        sources: [10XMB]

      - id: "FIL-GC-099"
        content: "The tripwire offer exists to convert a prospect into a buyer. Once they buy anything — even $7 — they are 10x more likely to buy again. The first transaction breaks the psychological barrier."
        domain: "sales-funnels"
        sources: [10XMB]

      - id: "FIL-GC-100"
        content: "In real estate, the 50% expense ratio is your reality check. If gross income is $100K, assume $50K goes to expenses before debt service. If the deal doesn't work at 50%, walk away."
        domain: "underwriting"
        sources: [CWIRE]

  L2_MENTAL_MODELS:
    count: 90
    elements:
      - id: "MM-GC-001"
        content: "The 98-2 Rule: 98% will not buy on first contact. Only 2% buy immediately. Most salespeople only work the 2%. The fortune is in the 98%."
        domain: "follow-up"
        sources: [PTM, HMMP]

      - id: "MM-GC-002"
        content: "Four Degrees of Action: (1) Do Nothing (2) Retreat (3) Normal Action (4) Massive Action. Only the 4th degree produces extraordinary results. The first three guarantee mediocrity."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "MM-GC-003"
        content: "The Conviction Scale: your conviction must exceed the buyer's resistance. Sale = Your Conviction > Their Objection. The person with more conviction always wins."
        domain: "conviction"
        sources: [SF, CU]

      - id: "MM-GC-004"
        content: "Power Base Concentric Circles: YOU at center, then Family, Friends, Relatives, Past Associates, Acquaintances. The closer to center, the easier the sale."
        domain: "power-base"
        sources: [SF, CU, PTM]

      - id: "MM-GC-005"
        content: "Objection = Complaint Model: most objections are not real objections but complaints. Complaints should not be handled — they should be used as a reason to close."
        domain: "objection-handling"
        sources: [MO]

      - id: "MM-GC-006"
        content: "7 Types of Objections: Internal (self), External (customer), Valid, Valid-But (won't stop deal), Invalid, Spoken, Unspoken. The unspoken is always the most dangerous."
        domain: "objection-handling"
        sources: [MO]

      - id: "MM-GC-007"
        content: "Two Parts Mental, One Part Mechanical: wealth creation is mostly mindset. If you don't handle the mental blocks, the mechanical steps won't matter because you'll quit."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-008"
        content: "The Professional vs Amateur spectrum: amateurs treat selling as a pastime. Professionals commit to study, practice, and mastery. 99% of career salespeople are still amateurs."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "MM-GC-009"
        content: "Time Inventory Model: inventory your time like money. Calculate: 3 hours TV/day = 22,500 potential three-minute calls per year. Time wasted = money lost."
        domain: "time-management"
        sources: [SF, CU]

      - id: "MM-GC-010"
        content: "Massive Action = New Problems equation. Taking massive action first creates new problems, then those new problems lead to big sales. Problems from massive action are good problems."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "MM-GC-011"
        content: "Sticky Note Analogy for Wealth: if you wanted to collect 1 million sticky notes, you'd (1) confirm they exist, (2) find who has them, (3) make contact, (4) convince them to give them to you. Same with dollars."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-012"
        content: "The Phone as ATM: the phone is the greatest money multiplier ever. More people make or lose money in 2 minutes on the phone than at any other activity."
        domain: "phone-sales"
        sources: [HMMP]

      - id: "MM-GC-013"
        content: "Pipeline Abundance Model: when you have massive pipeline, problems shrink. Cancelled appointment? Relief. Lost deal? Next one. No pipeline = every loss is catastrophic."
        domain: "pipeline-management"
        sources: [SF, CU, HMMP]

      - id: "MM-GC-014"
        content: "The Ninety-Day Phenomenon: most salespeople quit mentally at around 90 days. The enthusiasm fades. This is the critical period to recommit and get resold."
        domain: "mindset"
        sources: [SF, CU]

      - id: "MM-GC-015"
        content: "Production Yields Happiness: you are happiest when producing, not consuming. Cleaning the yard > lying on the sofa. Finishing tasks > avoiding them."
        domain: "massive-action"
        sources: [SF, CU]

      - id: "MM-GC-016"
        content: "Impose vs Help Framework: you're not imposing on people when you sell them — you're helping them. The only way to impose is to not offer your product when they need it."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "MM-GC-017"
        content: "Third Party Touch Model: always bring a second person into the deal. It adds value, removes ego, and creates the perception of a larger organization."
        domain: "closing"
        sources: [PTM, CU]

      - id: "MM-GC-018"
        content: "The Prediction Power: the ability to predict what a buyer will do, say, or object to is the skill that separates the professional from the amateur. Prediction comes from drill."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      - id: "MM-GC-019"
        content: "AB/ABC Proposal Model: always offer multiple options. When someone objects to price A, show price B (higher) to make A look reasonable, or C (lower) as entry point."
        domain: "closing"
        sources: [PTM, CU]

      - id: "MM-GC-020"
        content: "The Sold Scale: if you're not selling, you're not sold. Monitor your sales as an indicator of your own belief level. Sales drop = conviction drop."
        domain: "conviction"
        sources: [SF, CU]

      - id: "MM-GC-021"
        content: "Capitalize on the Easy Sale: the easiest sale is the second sale to an existing customer. Second money validates the first purchase and builds loyalty."
        domain: "closing"
        sources: [PTM, CU]

      - id: "MM-GC-022"
        content: "Objection Categories: (1) Price (2) Terms (3) Contract (4) Product (5) Timing (6) Company (7) You (8) Competition (9) Buyer uncertainty (10) Third-party data (11) Confusions (12) Lack of information."
        domain: "objection-handling"
        sources: [MO]

      - id: "MM-GC-023"
        content: "The Follow-Up Escalation Ladder: Day 0 (immediate thank-you), Day 1 (value call), Day 2 (handwritten note), Day 3 (video), etc. Each touch adds different medium and value."
        domain: "follow-up"
        sources: [PTM, HMMP]

      - id: "MM-GC-024"
        content: "The Income-Expense Trap: most people try to match expenses to income. The wealthy focus on increasing income dramatically, not managing expenses. You can't save your way to wealth."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-025"
        content: "Sell Or Be Sold: every interaction has a transaction. Either you sell them on your idea or they sell you on why they can't. Someone is always selling someone."
        domain: "sales-fundamentals"
        sources: [SF, CU, HMMP]

      - id: "MM-GC-026"
        content: "The Price-Value Disconnect: when someone says 'the price is too high,' they are really saying 'I don't see the value yet.' The problem is always value demonstration, not price."
        domain: "closing"
        sources: [MO, CU]

      - id: "MM-GC-027"
        content: "Multiple Streams of Income: create more than one source of income. One stream is vulnerability. Multiple streams is security. The wealthy never depend on one paycheck."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-028"
        content: "Increase Income and Stay Broke: when your income goes up, don't increase your lifestyle. Put the extra into investments. Force yourself to live below what you make."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-029"
        content: "The 10X Pipeline Buffer: if you need 1 deal, have 10 in your pipeline. If you need 10, have 100. The buffer prevents desperation and creates negotiating power."
        domain: "pipeline-management"
        sources: [SF, CU, HMMP]

      - id: "MM-GC-030"
        content: "The Caller ID Consistency Rule: never call from a number different than the number you want them to call back. Technology confusion kills callbacks."
        domain: "phone-sales"
        sources: [HMMP, PTM]

      - id: "MM-GC-031"
        content: "Present Numbers to Everyone: every presentation must include a written proposal with figures, even if the buyer says they're not ready. It makes it real and gives them something to decide on."
        domain: "closing"
        sources: [PTM, CU]

      - id: "MM-GC-032"
        content: "The Getting-Sold Checkpoint: daily, answer — why should anyone go into debt for my product? Why choose mine? Why now? Why pay more? If you can't answer fast, you're not sold enough."
        domain: "conviction"
        sources: [SF, CU]

      - id: "MM-GC-033"
        content: "Middle Class Math Reality: 50% of Americans take home less than $30,000. 80% have falling incomes. Home ownership at 20-year lows. The old middle-class recipe doesn't work anymore."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-034"
        content: "Understanding vs Selling: understanding the buyer is step one before any close. You cannot close what you don't understand. Needs, wants, timing, decision-makers — map them all first."
        domain: "sales-fundamentals"
        sources: [CU]

      - id: "MM-GC-035"
        content: "Cold Call as Warm Reach: every cold call becomes warm on the second attempt. By the third attempt, they know your name. Persistence converts cold into warm."
        domain: "prospecting"
        sources: [CU, HMMP]

      - id: "MM-GC-036"
        content: "Internet Lead Response hierarchy: speed kills — the first to respond wins. 5-minute response vs 30-minute response = dramatically different close rates."
        domain: "prospecting"
        sources: [CU]

      - id: "MM-GC-037"
        content: "The Incoming Call Advantage: incoming calls represent buyers with intent. They are 10x more valuable than outbound. Never waste an incoming call."
        domain: "phone-sales"
        sources: [CU, HMMP]

      - id: "MM-GC-038"
        content: "Sales Process vs Random Acts: selling is a process with specific steps, not random acts of hope. Process = predictability. Random = failure."
        domain: "sales-fundamentals"
        sources: [CU]

      - id: "MM-GC-039"
        content: "The 'I Need To Think About It' Decoder: thought is instantaneous. 'I need to think about it' is a stall, not a real objection. What they need is a decision, not more time."
        domain: "objection-handling"
        sources: [MO, CU]

      - id: "MM-GC-040"
        content: "The Spouse Stall Decoder: when someone says 'I need to talk to my spouse,' ask: 'Would they say no to the product or no to the money?' This isolates the real issue."
        domain: "objection-handling"
        sources: [MO, CU]

      - id: "MM-GC-041"
        content: "Jim Carrey's $10M Check: he wrote himself a check for $10 million and looked at it every day until he earned it. Make your claim, post it, tell the world. Decision precedes result."
        domain: "mindset"
        sources: [PTM]

      - id: "MM-GC-042"
        content: "The Data-Doubt Connection: if you doubt the source of the content, you will not use the content. That's why schools fail — students don't trust the source."
        domain: "mindset"
        sources: [PTM]

      - id: "MM-GC-043"
        content: "Fear and Scarcity Programming: constant messages of 'save money, turn out the lights, don't spend' create a scarcity mindset. To create wealth, you must reprogram from scarcity to abundance."
        domain: "wealth-building"
        sources: [PTM]

      - id: "MM-GC-044"
        content: "The Follow-Up Multiplier: Art Wildland model — quiet, introverted, paced, never talks big. But always has a full pipeline. Consistency beats charisma."
        domain: "follow-up"
        sources: [PTM]

      - id: "MM-GC-045"
        content: "Closing Theory: every close attempt that doesn't close teaches you something. The close is not one moment — it's a series of agreements building toward the final yes."
        domain: "closing"
        sources: [CU]

      - id: "MM-GC-046"
        content: "The 12 Objection Categories Map: price, terms, contract, product, timing, company, you, competition, buyer uncertainty, third-party data, confusions, lack of information. Master each one."
        domain: "objection-handling"
        sources: [MO]

      - id: "MM-GC-047"
        content: "The Agreement Principle: never confront first. Agree, align, then redirect. 'I agree it's a lot of money' followed by the close removes resistance without creating confrontation."
        domain: "closing"
        sources: [MO, CU, PTM]

      - id: "MM-GC-048"
        content: "100 Ways to Stay Motivated: motivation is not something that happens to you. It is a discipline you practice. Read, drill, role-play, review goals — every single day."
        domain: "mindset"
        sources: [CU]

      - id: "MM-GC-049"
        content: "Top Traits of Great Salespeople: persistence, conviction, product knowledge, willingness to be uncomfortable, ability to follow up, commitment to growth, and unreasonable action levels."
        domain: "sales-fundamentals"
        sources: [CU]

      - id: "MM-GC-050"
        content: "The Commitment Escalation: first commit to the profession, then to the product, then to the customer, then to mastery. Half-commitments produce zero results."
        domain: "sales-fundamentals"
        sources: [SF, CU]

      # ===== 10XMB: Marketing Mental Models =====

      - id: "MM-GC-051"
        content: "The Funnel Building Blocks Model: every funnel has 5 components — Traffic Source, Landing Page, Offer, Upsell Sequence, Follow-Up Sequence. Remove any one and the funnel collapses."
        domain: "sales-funnels"
        sources: [10XMB]

      - id: "MM-GC-052"
        content: "Micro-Commitment Escalation: move the prospect through a series of tiny yeses — click, opt-in, watch, tripwire purchase, core offer, upsell. Each yes makes the next yes easier."
        domain: "conversion-optimization"
        sources: [10XMB]

      - id: "MM-GC-053"
        content: "Three Funnel Types: (1) Lead Generation Funnel — capture email (2) Sales Funnel — convert to buyer (3) Ascension Funnel — move buyer to high-ticket. Every business needs all three."
        domain: "sales-funnels"
        sources: [10XMB]

      - id: "MM-GC-054"
        content: "The 5 Email Sequences Model: (1) Welcome — indoctrinate (2) Engagement — deliver value (3) Ascension — pitch upgrade (4) Segmentation — sort by interest (5) Re-engagement — win back dormant. Each serves a different purpose."
        domain: "email-marketing"
        sources: [10XMB]

      - id: "MM-GC-055"
        content: "The Godfather Offer: make the prospect an offer so good they feel stupid saying no. This is the tripwire — $7-$27 product that's worth 10x the price. The goal is conversion, not profit."
        domain: "sales-funnels"
        sources: [10XMB]

      - id: "MM-GC-056"
        content: "Two-Step Checkout Psychology: step 1 captures shipping info, step 2 captures payment. Once they've entered shipping, they're 70% committed. Abandonment drops dramatically after step 1."
        domain: "conversion-optimization"
        sources: [10XMB]

      - id: "MM-GC-057"
        content: "The Omnipresence Matrix: map every platform your prospect uses — search, social, email, video, podcast, display ads. Then be present on ALL of them simultaneously. Repetition creates familiarity. Familiarity creates trust."
        domain: "omnipresence"
        sources: [10XMB]

      - id: "MM-GC-058"
        content: "Google Ads Intent Model: search ads capture demand (people searching for your solution). Display/video ads create demand (interrupting people who aren't searching yet). You need both."
        domain: "digital-advertising"
        sources: [10XMB]

      # ===== 10XBBA: Business Buying Mental Models =====

      - id: "MM-GC-059"
        content: "The 28-Day Acquisition Blueprint: Day 1-7 identify targets, Day 8-14 initial contact and LOI, Day 15-21 due diligence, Day 22-28 close and transition. Speed is competitive advantage in acquisitions."
        domain: "business-buying"
        sources: [10XBBA]

      - id: "MM-GC-060"
        content: "1/3-1/3-1/3 Deal Structure: (1) 1/3 seller financing (2) 1/3 bank debt (3) 1/3 buyer equity (can be earn-in). This structure minimizes cash needed and aligns seller's interests with success."
        domain: "deal-structure"
        sources: [10XBBA]

      - id: "MM-GC-061"
        content: "ODE Valuation Model: Owner's Discretionary Earnings = Net Profit + Owner's Salary + Perks + Non-recurring Expenses. Multiply ODE by 2-2.5x for small business valuation. Simple, effective, universal."
        domain: "valuation"
        sources: [10XBBA]

      - id: "MM-GC-062"
        content: "The R3 People Framework for acquisitions: (1) Retain key employees (2) Replace underperformers (3) Recruit missing talent. Do this within the first 90 days or the acquisition will underperform."
        domain: "acquisitions"
        sources: [10XBBA]

      - id: "MM-GC-063"
        content: "The Earn-In Model: instead of paying full price upfront, earn ownership through performance. Hit revenue targets = earn equity. This protects the buyer and motivates the seller to ensure transition success."
        domain: "deal-structure"
        sources: [10XBBA]

      - id: "MM-GC-064"
        content: "Customer Concentration Risk: if one customer is >25% of revenue, you don't own a business — you own a dependent relationship. Walk away or negotiate the price down by 50%."
        domain: "due-diligence"
        sources: [10XBBA]

      - id: "MM-GC-065"
        content: "The Business Buying Funnel: 100 businesses identified → 30 conversations → 10 LOIs → 3 due diligence → 1 closed deal. It's a numbers game, just like sales."
        domain: "business-buying"
        sources: [10XBBA]

      - id: "MM-GC-066"
        content: "Leveraged Buyout Mechanics for Small Business: use the business's own cash flow to pay acquisition debt. If the business generates $500K/year and debt service is $300K/year, you pocket $200K while the business pays for itself."
        domain: "deal-structure"
        sources: [10XBBA]

      # ===== CWIRE: Real Estate Mental Models =====

      - id: "MM-GC-067"
        content: "The Four Quadrants of Real Estate: (1) Location (2) Units (3) Condition (4) Price. A deal must work in at least 3 of 4 quadrants. If only 2 work, the deal is too risky."
        domain: "real-estate-investing"
        sources: [CWIRE]

      - id: "MM-GC-068"
        content: "The 50% Expense Ratio: assume 50% of gross rental income goes to expenses (taxes, insurance, maintenance, vacancy, management). If the deal doesn't cash-flow after 50% expenses + debt service, pass."
        domain: "underwriting"
        sources: [CWIRE]

      - id: "MM-GC-069"
        content: "NOI = Gross Income - Operating Expenses (before debt). Cap Rate = NOI / Purchase Price. These two numbers tell you 90% of what you need to know about a deal."
        domain: "underwriting"
        sources: [CWIRE]

      - id: "MM-GC-070"
        content: "DCR (Debt Coverage Ratio) = NOI / Debt Service. Banks want 1.20+ DCR. If DCR is below 1.0, the property doesn't generate enough to cover its loans. Red flag."
        domain: "financing"
        sources: [CWIRE]

      - id: "MM-GC-071"
        content: "The Leverage Multiplier: with 75% LTV (loan-to-value), you control 4x your capital in assets. $1M equity = $4M property. A 10% increase in property value = 40% return on your equity."
        domain: "leverage"
        sources: [CWIRE]

      - id: "MM-GC-072"
        content: "The 21-Day Due Diligence Clock: Day 1-7 physical inspection, Day 8-14 financial audit, Day 15-21 legal and title review. Never extend DD without cause — speed kills in real estate too."
        domain: "due-diligence"
        sources: [CWIRE]

      - id: "MM-GC-073"
        content: "Broker Exhaustion Strategy: follow up with brokers so relentlessly that when the perfect deal comes in, they call you first just to get you off their back. Persistence is your deal flow."
        domain: "real-estate-investing"
        sources: [CWIRE]

      - id: "MM-GC-074"
        content: "The 365-Day Follow-Up Calendar for Brokers: same concept as sales follow-up but for deal flow. Monthly touchpoints with every broker in your target market. Never let them forget you're a buyer."
        domain: "real-estate-investing"
        sources: [CWIRE]

      - id: "MM-GC-075"
        content: "Value-Add Investment Thesis: buy below market → improve (renovations, better management, rent increases) → refinance at new value → pull out original capital → repeat with zero money left in."
        domain: "value-add"
        sources: [CWIRE]

      - id: "MM-GC-076"
        content: "Syndication Structure: General Partner (GP) manages the deal, takes 20-30% of profits. Limited Partners (LP) provide capital, take 70-80% of profits. GP gets promoted interest for doing the work."
        domain: "syndication"
        sources: [CWIRE]

      # ===== CU-2: Advanced Closing Mental Models =====

      - id: "MM-GC-077"
        content: "The Three Close Categories Model: (1) Money Closes — overcome financial objections (45 techniques) (2) Stall Closes — overcome delay tactics (17 techniques) (3) Product Closes — overcome product doubts (13 techniques). Together they cover 100% of objection scenarios."
        domain: "closing-strategies"
        sources: [CU-2]

      - id: "MM-GC-078"
        content: "The 13-Step Road to Sale: (1) Greeting (2) Determine wants/needs (3) Select product (4) Build value (5) Offer to trade (6) Test close (7) Walk around (8) Sit down (9) Present numbers (10) Handle objections (11) Close (12) Follow up (13) Referrals. Each step has specific scripts."
        domain: "road-to-sale"
        sources: [CU-2]

      - id: "MM-GC-079"
        content: "The Five-No Strategy Model: every 'no' reveals information. No #1 = fear, No #2 = uncertainty, No #3 = need more info, No #4 = stalling, No #5 = if still no, it may be real. Most deals close between no #3 and no #5."
        domain: "closing-strategies"
        sources: [CU-2]

      - id: "MM-GC-080"
        content: "Payment Breakdown Psychology: the brain processes $82/day differently than $30,000. Break every big number into the smallest possible increment — daily, hourly, per-use. Small numbers feel manageable."
        domain: "money-closes"
        sources: [CU-2]

      - id: "MM-GC-081"
        content: "The Lifestyle Walk-Through Close: don't compare your price to competitors. Compare it to what the buyer already spends on lifestyle — dinner, subscriptions, car payment. Your product becomes the same as things they already pay for."
        domain: "money-closes"
        sources: [CU-2]

      - id: "MM-GC-082"
        content: "Think-About-It Response Hierarchy: 5 different responses for 'I need to think about it' — each escalating in directness. Start soft, move firm. By response #5, the buyer either closes or reveals the real objection."
        domain: "stall-closes"
        sources: [CU-2]

      - id: "MM-GC-083"
        content: "The Spouse Stall Resolution Tree: (1) Would they say no to the product or the money? (2) If product: what specifically? (3) If money: is it the total, down, or monthly? This binary tree isolates the real blocker in 3 questions."
        domain: "stall-closes"
        sources: [CU-2, MO]

      # ===== Cross-program mental models =====

      - id: "MM-GC-084"
        content: "The Wealth Ecosystem: Active Income (sales) → Invest (real estate/business) → Passive Income → Reinvest → Scale. Each level funds the next. Sales is always the engine."
        domain: "wealth-building"
        sources: [PTM, CWIRE, 10XBBA]

      - id: "MM-GC-085"
        content: "Digital + Analog Closing: online funnels warm the prospect, email nurtures them, but the PHONE closes them. Technology creates leads. Humans close deals. Never automate the close."
        domain: "sales-funnels"
        sources: [10XMB, HMMP]

      - id: "MM-GC-086"
        content: "The Acquisition vs Creation Decision: building a business from scratch takes 5-10 years. Buying an existing business with revenue takes 28 days. When speed matters, acquire."
        domain: "business-buying"
        sources: [10XBBA]

      - id: "MM-GC-087"
        content: "Property Management as Profit Center: bad management bleeds money. Good management IS the value-add. Reducing expenses by 10% on a 100-unit property is equivalent to raising rents $50/unit."
        domain: "property-management"
        sources: [CWIRE]

      - id: "MM-GC-088"
        content: "The Cold Call Reframe: cold calling is not interruption — it's introduction. You're not bothering someone. You're offering them a solution they don't know exists yet."
        domain: "cold-calling"
        sources: [CU-2, HMMP]

      - id: "MM-GC-089"
        content: "Cart Abandonment as Follow-Up: abandoned carts are the online equivalent of 'I need to think about it.' The same follow-up principles apply — email within 1 hour, offer value within 24 hours, create urgency within 48."
        domain: "conversion-optimization"
        sources: [10XMB]

      - id: "MM-GC-090"
        content: "Webinar as Virtual Close: the webinar structure mirrors the sales process — rapport, education, offer, close. A well-designed webinar can close 5-15% of attendees without a single phone call."
        domain: "webinars"
        sources: [10XMB]

  L3_HEURISTICS:
    count: 110
    elements:
      - id: "HEUR-GC-001"
        content: "Call a prospect at least 15 times in 3 days before giving up. I called a client 15 times in 3 days plus texts plus emails plus video clips. If anything, it's not enough because I haven't gotten a result yet."
        domain: "follow-up"
        sources: [SF, HMMP]

      - id: "HEUR-GC-002"
        content: "Day 0 follow-up: call within 5 minutes of contact. Same day: second call within 1 hour. Day 1: third call with 'I have a great idea.' Day 2: handwritten note + text."

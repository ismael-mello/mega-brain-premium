        sources: [CU-2, MO]

      - id: "HEUR-GC-100"
        content: "Think-About-It 5-response sequence: (1) 'What specifically?' (2) 'Think of an elephant — see, thought is instant' (3) 'You've been thinking about this for weeks' (4) 'The only thing to think about is yes or no' (5) 'I respect that — but nothing changes if you leave. Let me help you decide now.'"

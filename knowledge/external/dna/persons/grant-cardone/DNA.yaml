      - id: "HEUR-GC-092"
        content: "21-day due diligence structure: Week 1 — physical walk-through of every unit, roof, plumbing, HVAC. Week 2 — financial audit (rent rolls, expenses, taxes). Week 3 — legal review (title, zoning, environmental)."

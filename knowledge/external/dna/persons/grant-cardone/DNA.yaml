        sources: [10XMB]

      # ===== 10XBBA: Business Buying Heuristics =====

      - id: "HEUR-GC-081"
        content: "Business valuation shortcut: 2-2.5x ODE (Owner's Discretionary Earnings) for businesses under $5M revenue. Above $5M, valuations shift to 3-5x EBITDA. Know which metric applies to your target."
        domain: "valuation"
        sources: [10XBBA]

      - id: "HEUR-GC-082"
        content: "The 25% customer concentration rule: if any single customer represents more than 25% of revenue, discount the valuation by 30-50%. That customer is a ticking time bomb."
        domain: "due-diligence"
        sources: [10XBBA]

      - id: "HEUR-GC-083"
        content: "Due diligence checklist minimum: 3 years tax returns, 3 years P&L, customer list with revenue breakdown, employee list with salaries, all contracts and leases, all pending litigation. Missing any of these = red flag."
        domain: "due-diligence"
        sources: [10XBBA]

      - id: "HEUR-GC-084"
        content: "LOI terms: 10% earnest money deposit, 21-day due diligence period, seller financing at least 30% of purchase price, 90-day transition support included, non-compete of 3+ years."
        domain: "deal-structure"
        sources: [10XBBA]

      - id: "HEUR-GC-085"
        content: "First 90 days after acquisition: do not change anything major. Observe, learn, meet every employee personally, understand the culture. Changes in the first 90 days create panic and turnover."
        domain: "acquisitions"
        sources: [10XBBA]

      - id: "HEUR-GC-086"
        content: "Ideal acquisition target profile: $1-5M revenue, owner-operated, owner tired/retiring, stable customer base, no customer >25%, positive cash flow, simple operations, boring industry."
        domain: "business-buying"
        sources: [10XBBA]

      - id: "HEUR-GC-087"
        content: "Seller financing negotiation: ask for 50% seller financing as your opening position. Settle for 30-40%. Offer premium price in exchange for favorable financing terms — price is flexible, terms are not."
        domain: "deal-structure"
        sources: [10XBBA]

      # ===== CWIRE: Real Estate Heuristics =====


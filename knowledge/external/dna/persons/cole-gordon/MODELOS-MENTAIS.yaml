modelos_mentais:

  - id: "MM-CG-001"
    nome: "7 Beliefs como Mapa de Objecoes"
    descricao: "Qualquer objecao pode ser mapeada para uma das 7 beliefs. Se prospect objeta, uma belief nao foi instalada."

    quando_aplicar: "Analisando porque prospect nao fechou ou qual belief falta"

    como_usar: |
      1. Prospect apresenta objecao
      2. Mapear para qual das 7 Beliefs:
         - PAIN: Nao reconhece problema
         - DOUBT: Nao acredita ser possivel
         - COST: Nao ve custo de inacao
         - DESIRE: Nao quer esse resultado especifico
         - MONEY: Nao tem recursos
         - SUPPORT: Nao tem apoio de terceiros
         - TRUST: Nao confia em voce
      3. Voltar e instalar belief faltante
      4. Se estruturou corretamente, objecao desaparece

    evidencias:
      - citacao: "Every objection maps to one of the 7 beliefs. If they object, you missed installing one."
        chunk_id: "CG001_006"
        source_id: "CG001"
        source_title: "7 Beliefs Framework"

    relacionado_a:
      - "FIL-CG-002"

    dominios:
      - "objection-mapping"
      - "diagnostics"
      - "discovery"

    peso: 0.95

  - id: "MM-CG-002"
    nome: "Buying Pocket Spectrum"
    descricao: "Prospect esta em algum lugar entre 'impossivel para mim' e 'posso fazer sozinho'. Seu trabalho e move-lo para o meio."

    quando_aplicar: "Ajustando abordagem baseado na posicao do prospect"

    como_usar: |
      IMPOSSIVEL <-----> BUYING POCKET <-----> FAZ SOZINHO

      Se prospect diz "impossivel":
      → Usar PROOF (cases, stats, testimonials)

      Se prospect diz "posso fazer sozinho":
      → Usar SKILL QUESTIONS + REFRAMES

      Zona ideal: "E possivel, mas preciso de ajuda"

    evidencias:
      - citacao: "Adjust approach based on where prospect is on the spectrum between 'impossible' and 'can do it myself'..."
        chunk_id: "CG002_003"
        source_id: "CG002"
        source_title: "Call Flow Structure"

    dominios:
      - "prospect-assessment"
      - "calibration"
      - "pitch-adjustment"

    peso: 0.85

  - id: "MM-CG-003"
    nome: "Hell Island vs Heaven Island"
    descricao: "Criar clareza extrema entre futuro sem mudanca (Hell) e futuro com mudanca (Heaven). Quanto mais clareza, mais tensao interna."

    quando_aplicar: "Discovery para criar leverage emocional sem manipulacao"

    como_usar: |
      1. Hell Island (Dickens Process):
         "O que acontece em 1, 3, 5, 10 anos se nada mudar?"
         "Como isso afeta sua familia/carreira/saude?"

      2. Heaven Island:
         "Se resolver isso, como seria sua vida?"
         "O que seria possivel que hoje nao e?"

      3. Contraste:
         Quanto maior a diferenca percebida, maior a tensao interna
         Tensao interna → motivacao propria para decidir

    evidencias:
      - citacao: "The more CLARITY on the difference between Hell Island and Heaven Island, the more internal TENSION..."
        chunk_id: "CG002_004"
        source_id: "CG002"
        source_title: "Call Flow Structure"

    relacionado_a:
      - "FIL-CG-003"

    dominios:
      - "discovery"
      - "emotional-leverage"
      - "future-pacing"

    peso: 0.90

  - id: "MM-CG-004"
    nome: "Consistency Bias como Motor de Vendas"
    descricao: "Se prospect DIZ EM VOZ ALTA que acredita algo, ele vai agir de forma consistente com isso. Perguntas sao mais poderosas que afirmacoes."

    quando_aplicar: "Desenhando perguntas de discovery e pitch"

    como_usar: |
      ERRADO: Voce afirmar algo
      "Nosso produto e o melhor do mercado"

      CERTO: Prospect afirmar via resposta a pergunta
      "O que voce acha que acontece se nada mudar nos proximos 12 meses?"
      (Prospect DIZ que vai continuar no problema)

      Agora prospect se comprometeu verbalmente com a necessidade de mudar.

    evidencias:
      - citacao: "The Consistency Bias (Cialdini) is the most powerful in sales. If the prospect SAYS OUT LOUD that they believe something, they will act consistently."
        chunk_id: "CG001_007"
        source_id: "CG001"
        source_title: "7 Beliefs Framework"

    relacionado_a:
      - "Robert Cialdini - Influence"

    dominios:
      - "persuasion"
      - "psychology"
      - "questions"

    peso: 0.90

  - id: "MM-CG-005"
    nome: "Resolve vs Pumped Up Energy"
    descricao: "Estado ideal de venda nao e energia hipy mas calm sense of certainty. Como se ja estivesse feito."

    quando_aplicar: "Gerenciando estado interno antes e durante calls"

    como_usar: |
      EVITAR (Pumped Up):
      - Tony Robbins "yes yes yes"
      - Energia hipy/animada demais
      - Confianca de superficie
      - Pode triggerar defesas do prospect

      BUSCAR (Resolve):
      - Calm sense of certainty
      - Flow state
      - "As if it's already done"
      - Builds trust naturally

    evidencias:

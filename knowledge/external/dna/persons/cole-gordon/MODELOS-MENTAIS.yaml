  - id: "MM-CG-006"
    nome: "Free Throw Analogy"
    descricao: "Accountability individual na frente do time, como arremesso livre no basquete. Todos veem se voce acerta ou erra."

    quando_aplicar: "Criando cultura de accountability em times de vendas"

    como_usar: |
      No basquete:
      - Jogador na linha de lance livre
      - Todo mundo olhando
      - Sucesso ou falha e publico

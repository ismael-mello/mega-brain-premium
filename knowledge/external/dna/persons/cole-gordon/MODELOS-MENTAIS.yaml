  - id: "MM-CG-008"
    nome: "Unsupervised Behavior"
    descricao: "Performance verdadeira so e visivel quando ninguem esta olhando. Por isso secret shopping funciona."

    quando_aplicar: "Avaliando performance real de vendedores"

    como_usar: |
      PRINCIPIO:
      - Comportamento supervisionado ≠ comportamento real
      - Pessoas agem diferente quando sabem que estao sendo observadas
      - Performance verdadeira emerge quando acham que estao sozinhos

      APLICACAO:
      - Secret shopping para ver comportamento real
      - Gravacoes sem aviso previo (onde legal)
      - Monitoramento aleatorio
      - "Trust but verify" como filosofia

    evidencias:
      - citacao: "True performance only visible when nobody's watching - unsupervised behavior reveals truth"
        chunk_id: "BATCH-005_003"
        source_id: "BATCH-005"
        source_title: "How to Manage Closers"

    dominios:
      - "management"
      - "performance"
      - "truth"

    peso: 0.85

  - id: "MM-CG-009"
    nome: "Interest Level Scale (5 Stages)"
    descricao: "Escala de 5 niveis de interesse do lead, do curioso ao comprador."

    quando_aplicar: "Qualificando leads e ajustando abordagem"

    como_usar: |
      NIVEIS:
      1. CURIOUS - So olhando, sem compromisso
         → Educar, nao vender

      2. INTERESTED - Quer saber mais
         → Aprofundar discovery

      3. CONSIDERING - Comparando opcoes
         → Diferenciar, resolver objecoes

      4. DECIDING - Pronto para escolher
         → Fechar, criar urgencia interna

      5. BUYING - Decidido, so precisa do caminho
         → Facilitar processo

      REGRA: Cada nivel requer abordagem diferente

    evidencias:
      - citacao: "Interest Level Scale: 5 stages from curious to buying - each requires different approach"
        chunk_id: "BATCH-006_001"
        source_id: "BATCH-006"
        source_title: "Cole Gordon Marketing"

    dominios:
      - "qualification"
      - "sales-process"
      - "lead-scoring"

    peso: 0.85

  - id: "MM-CG-010"
    nome: "VAK System (NLP)"
    descricao: "Pessoas processam informacao de 3 formas: Visual, Auditivo, Cinestesico. Adaptar comunicacao ao estilo."

    quando_aplicar: "Ajustando pitch ao estilo de processamento do prospect"

    como_usar: |
      VISUAL (V):
      - Usa palavras como "veja", "imagine", "visualize"
      - Gosta de slides, diagramas, demonstracoes
      - Fala rapido, pensa em imagens
      → Usar: "Deixa eu te mostrar...", graficos, visuals

      AUDITIVO (A):
      - Usa palavras como "ouca", "soa bem", "ressoa"
      - Gosta de explicacoes verbais, discussao
      - Ritmo moderado, valoriza como coisas soam
      → Usar: "Como isso soa para voce?", tons de voz variados

      CINESTESICO (K):
      - Usa palavras como "sente", "pega", "concreto"
      - Gosta de experiencias hands-on, exemplos reais
      - Fala devagar, precisa "sentir" a decisao
      → Usar: "Como voce se sentiria se...", casos concretos

    evidencias:
      - citacao: "VAK System (NLP): Visual, Auditory, Kinesthetic - adapt communication to prospect's processing style"
        chunk_id: "BATCH-006_002"
        source_id: "BATCH-006"
        source_title: "Cole Gordon Marketing"

    dominios:
      - "communication"
      - "nlp"
      - "adaptability"

    peso: 0.85

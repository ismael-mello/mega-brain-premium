  - id: "MM-CG-007"
    nome: "Farmer vs Hunter"
    descricao: "Closers precisam de ambas skills, nao apenas caca. Cultivar pipeline e tao importante quanto fechar."

    quando_aplicar: "Desenvolvendo closers completos, nao apenas 'fechadores'"

    como_usar: |
      HUNTER (tradicional):
      - Foca em fechar cada lead
      - Mentalidade de caca
      - Short-term thinking

      FARMER (necessario):
      - Cultiva pipeline
      - Nurturing de leads frios
      - Follow-up consistente
      - Long-term relationship building

      IDEAL:
      - 60% Hunter (closing skills)
      - 40% Farmer (pipeline cultivation)

    evidencias:

  - id: "MET-CG-001"
    nome: "Double Tie Down Technique"
    descricao: "Check-in duplo durante pitch para manter prospect engajado e identificar objecoes early."

    passos:
      - ordem: 1
        acao: "Apresentar um pillar ou conceito (max 45 segundos)"
        resultado_esperado: "Prospect recebeu informacao"
      - ordem: 2
        acao: "Pergunta 1: 'Does that make sense?'"
        resultado_esperado: "Prospect confirma entendimento"
      - ordem: 3
        acao: "Pergunta 2: 'What are your thoughts on that?'"
        resultado_esperado: "Prospect verbaliza opiniao - revela objecoes early"
      - ordem: 4
        acao: "Se positivo, continuar. Se objecao, resolver antes de prosseguir"
        resultado_esperado: "Pitch e dialogo, nao monologo"

    quando_usar: "Durante toda a fase de Pitch (Fase 4 do 6-Phase Call Flow)"

    indicadores_sucesso:
      - "Prospect engajado e respondendo"
      - "Objecoes identificadas e resolvidas em tempo real"
      - "Trust sendo instalada progressivamente"

    erros_comuns:
      - "Falar por muito tempo sem check-in"
      - "Fazer apenas uma pergunta"
      - "Nao parar para resolver objecao identificada"

    evidencias:

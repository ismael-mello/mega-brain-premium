  - id: "MET-CG-002"
    nome: "3 Data Points Method for Financial Objections"
    descricao: "Processo para lidar com objecoes de dinheiro/preco coletando dados reais."

    passos:
      - ordem: 1
        acao: "Isolar dinheiro: 'Money aside, do you 100% want this?'"
        resultado_esperado: "Confirmar que objecao e APENAS financeira"
      - ordem: 2
        acao: "Coletar Data Point 1: Net income nos proximos 30 dias"
        resultado_esperado: "Entender fluxo de caixa"
      - ordem: 3
        acao: "Coletar Data Point 2: Cash on hand (dinheiro disponivel agora)"
        resultado_esperado: "Entender capacidade imediata"
      - ordem: 4
        acao: "Coletar Data Point 3: Credit access (cartao, emprestimo)"
        resultado_esperado: "Entender opcoes de financiamento"
      - ordem: 5
        acao: "APENAS apos coletar os 3, oferecer payment plan"
        resultado_esperado: "Plano baseado em dados reais"
      - ordem: 6
        acao: "Pedir algo em retorno por melhores terms"
        resultado_esperado: "Preservar valor atraves de reciprocidade"

    quando_usar: "Quando prospect diz que nao tem dinheiro/esta caro"

    indicadores_sucesso:
      - "Prospect revela situacao financeira real"
      - "Payment plan customizado e aceito"
      - "Algo oferecido em retorno (referral, depoimento)"

    erros_comuns:

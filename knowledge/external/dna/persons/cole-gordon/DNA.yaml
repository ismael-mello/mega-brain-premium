      - id: "CG-MM-001"
        title: "7 Beliefs as Objection Map"
        statement: "Qualquer objeção pode ser mapeada para uma das 7 beliefs. Se prospect objeta, uma belief não foi instalada."
        quote: "Every objection maps to one of the 7 beliefs. If they object, you missed installing one."
        weight: 0.95
        chunk_ids: ["CG001_006"]
        source_ids: ["CG001"]
        domains: ["objection-mapping", "diagnostics", "discovery"]
        when_to_apply: "Analisando porque prospect não fechou ou qual belief falta"
        how_to_use: |
          1. Prospect apresenta objeção
          2. Mapear para qual das 7 Beliefs:
             PAIN, DOUBT, COST, DESIRE, MONEY, SUPPORT, TRUST
          3. Voltar e instalar belief faltante
          4. Se estruturou corretamente, objeção desaparece
        related_to: ["CG-FIL-002"]

      - id: "CG-MM-002"
        title: "Buying Pocket Spectrum"
        statement: "Prospect está em algum lugar entre 'impossível para mim' e 'posso fazer sozinho'. Seu trabalho é movê-lo para o meio."
        quote: "Adjust approach based on where prospect is on the spectrum between 'impossible' and 'can do it myself'."
        weight: 0.85
        chunk_ids: ["CG002_003"]
        source_ids: ["CG002"]
        domains: ["prospect-assessment", "calibration", "pitch-adjustment"]
        when_to_apply: "Ajustando abordagem baseado na posição do prospect"
        how_to_use: |
          IMPOSSÍVEL <-----> BUYING POCKET <-----> FAZ SOZINHO
          Se "impossível" → usar PROOF (cases, stats, testimonials)
          Se "faz sozinho" → usar SKILL QUESTIONS + REFRAMES
          Zona ideal: "É possível, mas preciso de ajuda"

      - id: "CG-MM-003"
        title: "Hell Island vs Heaven Island"
        statement: "Criar clareza extrema entre futuro sem mudança (Hell) e futuro com mudança (Heaven). Quanto mais clareza, mais tensão interna."
        quote: "The more CLARITY on the difference between Hell Island and Heaven Island, the more internal TENSION."
        weight: 0.90
        chunk_ids: ["CG002_004"]
        source_ids: ["CG002"]
        domains: ["discovery", "emotional-leverage", "future-pacing"]
        when_to_apply: "Discovery para criar leverage emocional sem manipulação"
        how_to_use: |
          1. Hell Island: "O que acontece em 1, 3, 5, 10 anos se nada mudar?"
          2. Heaven Island: "Se resolver isso, como seria sua vida?"
          3. Contraste: Quanto maior a diferença, maior a tensão interna
        related_to: ["CG-FIL-003"]

      - id: "CG-MM-004"
        title: "Consistency Bias as Sales Engine"
        statement: "Se prospect DIZ EM VOZ ALTA que acredita algo, ele vai agir de forma consistente com isso. Perguntas são mais poderosas que afirmações."
        quote: "The Consistency Bias (Cialdini) is the most powerful in sales. If the prospect SAYS OUT LOUD that they believe something, they will act consistently."
        weight: 0.90
        chunk_ids: ["CG001_007"]
        source_ids: ["CG001"]
        domains: ["persuasion", "psychology", "questions"]
        when_to_apply: "Desenhando perguntas de discovery e pitch"
        how_to_use: |
          ERRADO: Você afirmar "Nosso produto é o melhor"
          CERTO: Prospect afirmar via resposta a pergunta
          "O que acontece se nada mudar nos próximos 12 meses?"
          Agora prospect se comprometeu verbalmente com necessidade de mudar.

      - id: "CG-MM-005"
        title: "Resolve vs Pumped Up Energy"
        statement: "Estado ideal de venda não é energia hype mas calm sense of certainty. Como se já estivesse feito."
        quote: "Resolve is not pumped up energy. It's a calm sense of certainty, as if it's already done."

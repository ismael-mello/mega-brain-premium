          - {order: 3, action: "Week 3: Independent calls with daily debrief + call review"}
          - {order: 4, action: "Week 4: Full independence with weekly coaching check-in"}
          - {order: 5, action: "Day 30: Evaluate against 25% close rate benchmark"}

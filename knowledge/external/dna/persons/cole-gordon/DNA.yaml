        weight: 0.90
        chunk_ids: ["CIL_M2_040"]
        source_ids: ["CIL"]
        domains: ["call-structure", "introduction", "frame-control"]
        steps:
          - {order: 1, action: "Greeting + Name confirmation (10 seconds)"}
          - {order: 2, action: "Agenda frame: 'Here's how this works...' (30 seconds)"}
          - {order: 3, action: "Permission: 'Are you cool with that?' (tie-down)"}
          - {order: 4, action: "Context question: 'What made you book this call today?' (60 seconds)"}
          - {order: 5, action: "Transition to discovery: 'Great, let me ask you a few questions so I can see if I can help...'"}

  sintese: |
    Cole Gordon pensa em termos de PREVENÇÃO, não tratamento. Enquanto a maioria
    dos closers foca em lidar com objeções, ele foca em fazer com que objeções
    nunca apareçam. A chave são as 7 Beliefs que todo prospect precisa ter para
    comprar - 6 instaladas no Discovery, 1 no Pitch. Sua abordagem é fortemente
    influenciada por Cialdini - especialmente o Consistency Bias. Se o prospect
    DIZ EM VOZ ALTA que acredita algo, ele vai agir de forma consistente. É contra
    pressão externa (descontos, urgência artificial) e a favor de pressão interna
    (prospect reconhecer que precisa mudar). Isso cria vendas que não cancelam.


      - id: "CG-CIL-MET-203"
        title: "Financial Discovery Deep-Dive Method"
        statement: "Method for uncovering prospect's true financial situation without being pushy."
        quote: "financial discovery deep-dive method"
        weight: 0.85
        chunk_ids: ["CIL_M2_043"]
        source_ids: ["CIL"]
        domains: ["discovery", "financial-qualification", "objection-prevention"]
        steps:
          - {order: 1, action: "Early discovery: 'What are you currently investing in solving this?' (normalizes money talk)"}
          - {order: 2, action: "Cost of problem: 'What is this problem costing you monthly/annually?'"}
          - {order: 3, action: "Budget awareness: 'Have you set aside any budget to fix this?'"}
          - {order: 4, action: "Investment readiness: 'If we had something that could solve this, are you in a position to invest today?'"}
          - {order: 5, action: "If no: Apply 3 Data Points method (income, cash, credit)"}

      - id: "CG-CIL-MET-204"
        title: "Two-Call Close Adjustment Method"
        statement: "How to adapt the sales process for a two-call close model."

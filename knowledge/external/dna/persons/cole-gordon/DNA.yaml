          - {order: 4, action: "Build rapport through 3-5 message exchange"}
          - {order: 5, action: "Transition: 'Hey, would you be open to a quick chat about [specific problem]?'"}
          - {order: 6, action: "Book call within 48 hours of agreement"}

      - id: "CG-CIL-MET-200"
        title: "Call Introduction Script Methodology"
        statement: "Precise methodology for the first 3 minutes of any sales call."

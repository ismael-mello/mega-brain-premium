        domains: ["framing", "authority", "positioning"]
        when_to_apply: "Setting the frame at the beginning of every sales conversation"
        how_to_use: |
          Moral Authority: You genuinely care about helping (not just commission)
          Prize Frame: Your time and offer are valuable (you're interviewing THEM)
          Expert Frame: You have superior knowledge to diagnose and prescribe

      - id: "CG-CIL-MM-108"
        title: "Two Sales In Every Call"
        statement: "Every call requires two sales: the sale of the method AND the sale of the product."
        quote: "there are two sales in every call: the sale of the method and the sale of the product"
        weight: 0.90
        chunk_ids: ["CIL_M1_018"]
        source_ids: ["CIL"]
        domains: ["sales-process", "pitch-structure", "persuasion"]
        when_to_apply: "Structuring pitch to address both method belief and product belief"
        how_to_use: |
          SALE 1 (Method): Why THIS approach works (paradigm shift)
          SALE 2 (Product): Why YOUR product delivers this approach best
          Order matters: Method first, then product

      - id: "CG-CIL-MM-200"
        title: "Belief Blueprint / Belief Ladder"
        statement: "Sales process derived from Belief Blueprint combined with Socratic Dialogue."
        quote: "the sales process is derived from the belief blueprint plus socratic dialogue"
        weight: 0.90
        chunk_ids: ["CIL_M2_010"]
        source_ids: ["CIL"]
        domains: ["sales-methodology", "belief-systems", "questioning"]
        when_to_apply: "Designing the complete sales conversation flow"
        how_to_use: |
          1. Map the 7 beliefs prospect needs
          2. Design Socratic questions for each belief
          3. Use prospect's own answers to install beliefs
          4. Close becomes natural conclusion of belief installation

      - id: "CG-CIL-MM-205"
        title: "Big Three Objection Categories"
        statement: "All objections fall into three categories: Uncertainty, Financial, Support."
        quote: "uncertainty, financial, support — the big three objection categories"
        weight: 0.90
        chunk_ids: ["CIL_M2_015"]
        source_ids: ["CIL"]
        domains: ["objection-handling", "diagnosis", "closing"]
        when_to_apply: "Diagnosing and categorizing objections for targeted handling"
        how_to_use: |
          UNCERTAINTY: "I need to think" / "I need to research" → missed belief
          FINANCIAL: "I can't afford it" → 3 Data Points method
          SUPPORT: "I need to talk to spouse" → identify real decision-maker

      - id: "CG-CIL-MM-303"
        title: "Volume vs Efficiency Duality"
        statement: "Two ways to improve sales results: increase volume or increase efficiency."
        quote: "two ways to improve: increase volume or increase efficiency"
        weight: 0.85
        chunk_ids: ["CIL_M3_013"]
        source_ids: ["CIL"]
        domains: ["optimization", "performance", "scaling"]
        when_to_apply: "Diagnosing whether a rep needs more activity or better skills"
        how_to_use: |
          LOW VOLUME + LOW EFFICIENCY → Fix volume first (easier, faster)
          HIGH VOLUME + LOW EFFICIENCY → Skill training (coaching, call review)
          LOW VOLUME + HIGH EFFICIENCY → Activity management (accountability)
          HIGH VOLUME + HIGH EFFICIENCY → Already optimized → promote or increase comp

      - id: "CG-CIL-MM-305"
        title: "Quantitative + Qualitative Dual Assessment"
        statement: "Effective sales management requires BOTH quantitative metrics AND qualitative call review."
        quote: "effective sales management requires both quantitative and qualitative assessment"
        weight: 0.85
        chunk_ids: ["CIL_M3_015"]
        source_ids: ["CIL"]
        domains: ["management", "coaching", "performance-management"]
        when_to_apply: "Building a complete rep evaluation system"
        how_to_use: |
          QUANTITATIVE: Close rate, show rate, offers/day, DPL
          QUALITATIVE: Call reviews, tone, discovery depth, objection handling
          Neither alone is sufficient — both required for accurate diagnosis

      - id: "CG-CIL-MM-400"
        title: "Market Sophistication Leveling Model"
        statement: "Tactics exist on a spectrum relative to market sophistication."
        quote: "tactics exist on a spectrum relative to market sophistication"
        weight: 0.80
        chunk_ids: ["CIL_M4_001"]
        source_ids: ["CIL"]
        domains: ["market-awareness", "strategy", "positioning"]
        when_to_apply: "Choosing sales tactics based on how sophisticated the market is"
        how_to_use: |
          LOW sophistication: Direct claims, simple pitches work
          MEDIUM sophistication: Need unique mechanism, social proof
          HIGH sophistication: Need paradigm shift, contrarian positioning
          Mismatch = lost deals (too aggressive for sophisticated, too subtle for naive)


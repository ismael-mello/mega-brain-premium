          - {order: 2, action: "Assign homework: Video, case study, or resource to review"}
          - {order: 3, action: "Book Call 2 within 48 hours (max 72 hours)"}
          - {order: 4, action: "Call 2: Recap beliefs + Pitch Codex + Close"}
          - {order: 5, action: "If no-show on Call 2: Recovery sequence within 24 hours"}

      - id: "CG-CIL-MET-301"

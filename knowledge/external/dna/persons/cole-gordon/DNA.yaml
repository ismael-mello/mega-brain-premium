      - id: "CG-CIL-MET-102"
        title: "Projection Setting and Hedging Methodology"
        statement: "Systematic approach to setting and hedging sales projections."
        quote: "projection setting and hedging methodology"
        weight: 0.85
        chunk_ids: ["CIL_M1_041"]
        source_ids: ["CIL"]
        domains: ["forecasting", "planning", "management"]
        steps:
          - {order: 1, action: "Calculate raw projection: Expected calls x Historical close rate x Average ticket"}
          - {order: 2, action: "Apply hedge factor: Multiply by 0.50-0.70 (30-50% hedge)"}
          - {order: 3, action: "Set three tiers: Conservative (50% hedge), Likely (30% hedge), Stretch (raw)"}
          - {order: 4, action: "Communicate conservative number externally, track against all three internally"}
          - {order: 5, action: "Review and adjust hedge factor monthly based on accuracy"}


insights:
  - id: "INS-GVR-001"
    title: "The Three Rs Formula — Influence = Reach x Relevancy x Relationship"
    description: "The core equation for evaluating any influencer's true value. Reach alone is vanity — relevancy adds authority and relationship drives trust and conversion. This formula replaces the common mistake of selecting influencers by follower count alone."
    impact: "HIGH"
    source_elements: ["FW-GVR-002", "MM-GVR-001", "FIL-GVR-003"]
    tags: [influence-formula, selection, core-framework]

  - id: "INS-GVR-002"
    title: "Influencer Ad Takeover Yields 3-4x More Sales at $9.50 CPM vs $128 CPM"
    description: "Instead of paying for organic posts with limited reach, get advertiser access to run dark posts through an influencer's page. A celebrity case study showed $9.50 CPM via ad takeover vs $128 CPM for pay-per-post — 13x cheaper with 9x more reach. Same budget yields 3-4x more sales."
    impact: "HIGH"
    source_elements: ["MM-GVR-013", "HEUR-GVR-016", "HEUR-GVR-017", "HEUR-GVR-018", "FW-GVR-009", "MET-GVR-005"]
    tags: [ad-takeover, dark-posts, CPM, ROI, paid-media]

  - id: "INS-GVR-003"
    title: "Venture Capital Mindset for Micro-Influencer Gifting — 1 in 10 Needs to Work"
    description: "Think of micro-influencer gifting like venture capital: only around 1 out of 10 investments needs to work, as the payoff will often be over 10x the initial investment. Target 50% completion rate as baseline for product-only campaigns."
    impact: "HIGH"
    source_elements: ["MM-GVR-006", "HEUR-GVR-002", "FIL-GVR-017"]
    tags: [VC-mindset, gifting, risk-management, ROI]

  - id: "INS-GVR-004"
    title: "Scale to 100+ Micro-Influencer Sendouts Per Month for Breakthrough Results"
    description: "Target 50-100 micro-influencer sendouts per month for 3 months minimum. Brands that really scale do around 100 units/week (400/month). The 5K-15K follower range is the sweet spot. Micro-influencer revenue can account for up to 30% of monthly sales. Alaya Skin sends to 1,000+ per month."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-001", "HEUR-GVR-011", "HEUR-GVR-012", "HEUR-GVR-030", "MET-GVR-001", "MET-GVR-039"]
    tags: [scale, micro-influencers, sendouts, revenue]

  - id: "INS-GVR-005"
    title: "The Sweetener Framework — Included, Special, VIP"
    description: "Three pillars to build lasting influencer relationships: (1) Make them feel INCLUDED in your brand story, vision, and mission. (2) Make them feel SPECIAL — tell them why you chose them, personalize everything. (3) Make them feel VIP — go above and beyond with handwritten cards, custom products, and surprise gifts."
    impact: "HIGH"
    source_elements: ["FW-GVR-001", "FW-GVR-022", "MET-GVR-013", "FIL-GVR-015"]
    tags: [sweetener, relationship-building, VIP, retention]

  - id: "INS-GVR-006"
    title: "YouTube Influencers Convert 4x Better Than Instagram or Facebook"
    description: "YouTube influencers convert on average 4 times better than those on Facebook or Instagram due to deeper audience relationships built through video. YouTube is also evergreen — a $1,000 review generated $23,000 in sales (2,200% ROI) and still converts to this day. 8 of 10 Google video results are YouTube."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-006", "HEUR-GVR-007", "FIL-GVR-016", "HEUR-GVR-023"]
    tags: [YouTube, conversion, evergreen, SEO, ROI]

  - id: "INS-GVR-007"
    title: "The Everybody's Doing It Effect — Audience Overlap Is a Feature, Not a Bug"
    description: "Deliberately seek audience overlap among your influencers. When multiple influencers post about your product and their audiences overlap, consumers start to see you everywhere. This omnipresence creates social proof and accelerates trust. The compounding effects take time — don't give up after one month."
    impact: "HIGH"
    source_elements: ["FIL-GVR-007", "MM-GVR-005", "FIL-GVR-006", "FW-GVR-008"]
    tags: [omnipresence, audience-overlap, social-proof, compounding]

  - id: "INS-GVR-008"
    title: "Four-Stage Influencer Funnel — Awareness to Loyalty"
    description: "Every influencer campaign must map to a full funnel: Brand Awareness (influencer posts) -> Consideration (follow on social via CTAs) -> Conversion (email capture + purchase) -> Brand Loyalty (repeat exposure + higher LTV). The conversion stage — getting the email address — is the most important step. 40% of Gretta's sales come through email."
    impact: "HIGH"
    source_elements: ["MM-GVR-008", "FW-GVR-003", "FIL-GVR-013"]
    tags: [funnel, conversion, email-capture, customer-journey]

  - id: "INS-GVR-009"
    title: "Product-for-Content vs Product-for-Post — Know the Completion Rate Tradeoff"
    description: "Product-for-Content campaigns (content submitted privately) achieve ~90% completion rate vs ~50-60% for Product-for-Post campaigns. Content campaigns yield more reusable assets (UGC, video testimonials). Post campaigns leverage the influencer's audience directly. Choose based on your goal."
    impact: "MEDIUM"
    source_elements: ["MM-GVR-014", "HEUR-GVR-003", "HEUR-GVR-002", "FW-GVR-005", "FW-GVR-006"]
    tags: [campaign-types, completion-rate, UGC, tradeoff]

  - id: "INS-GVR-010"
    title: "YouTube-to-Instagram Arbitrage — Cheaper Access to Super Fans"
    description: "Find macro YouTube influencers on Instagram where they have a relatively smaller following of super fans. They often cost less to engage on Instagram, but their influence is still sky-high because these followers are their most dedicated fans. This is a cost-reduction play."
    impact: "MEDIUM"
    source_elements: ["MM-GVR-012", "FW-GVR-017"]
    tags: [YouTube, Instagram, arbitrage, cost-reduction, super-fans]

  - id: "INS-GVR-011"
    title: "Tag-to-Win Giveaways Can Generate 20K+ Followers in 24 Hours"
    description: "The Fifth grew Instagram following by 20K in 24 hours with a single tag-to-win competition (80K+ comments). Bambi Boutique went from 0 to 150K followers in one week with 3 macro influencer giveaways. Give 2 extra units so tagger + tagged friend both win. Include discount code for runners-up to convert non-winners."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-024", "HEUR-GVR-025", "FW-GVR-007", "MET-GVR-004"]
    tags: [tag-to-win, follower-growth, giveaway, case-study]

  - id: "INS-GVR-012"
    title: "Nick Shackelford Campaign: 20 Influencers, $20K Spend, $73K Return"
    description: "Ad takeover campaign results: 20 influencers, 72 content pieces received, $20,000 total spend, $72,976 total return. CPA target was $35, but influencer CPA achieved was $18. Each influencer is isolated as a campaign with product-specific targeting using page engagers and lookalikes."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-036", "FW-GVR-027", "FW-GVR-028"]
    tags: [ad-takeover, case-study, CPA, paid-strategy]

  - id: "INS-GVR-013"
    title: "Influencer Cluster Campaign — The Reality TV Strategy"
    description: "Group interconnected influencers (same reality show, friendship circle, location, niche) whose audiences overlap significantly. When they all post about your brand, it creates the 'everybody's doing it' effect. Reality TV contestants from the same show are the perfect cluster."
    impact: "MEDIUM"
    source_elements: ["MM-GVR-011", "FW-GVR-008", "MET-GVR-015"]
    tags: [cluster, reality-TV, audience-overlap, coordination]

  - id: "INS-GVR-014"
    title: "Instagram Profile Must Be Optimized Like a Landing Page"
    description: "Your Instagram account acts as the initial landing page for influencer marketing. Optimize three elements: (1) Feed — match aesthetic to your influencers. (2) Bio — elevator pitch with UVP, social proof, and CTA in fewest words. (3) Link — trackable link to waitlist, content unlock, best sellers, or shoppable feed. 'Whoever says it the simplest wins.'"
    impact: "MEDIUM"
    source_elements: ["MM-GVR-007", "FW-GVR-004", "FIL-GVR-009", "MET-GVR-016"]
    tags: [profile-optimization, landing-page, bio, conversion]

  - id: "INS-GVR-015"
    title: "Lock In High-Growth Influencers at Current Rates Before They Blow Up"
    description: "Use Social Blade to identify high month-on-month growth influencers. Lock them into multi-month contracts (3+ months) at current pricing. As they grow, you're still paying the original reduced rate. The Fifth locked a mid-tier Hawaiian influencer before his follower explosion."
    impact: "MEDIUM"
    source_elements: ["MM-GVR-004", "MET-GVR-020"]
    tags: [lock-in, growth-rate, negotiation, forward-pricing]

  - id: "INS-GVR-016"
    title: "Waitlist Growth via Influencer-Driven FOMO — 50K Signups"
    description: "When product is out of stock, change entire website UX to lead generation. Push every influencer post toward waitlist signup. Drop Bottle grew a 50,000-person waitlist using this method. The Fifth's 'only sell on the 5th for 5 days' model combined with influencer marketing drove $1M in a single day."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-029", "HEUR-GVR-037", "MET-GVR-027", "MET-GVR-033"]
    tags: [waitlist, FOMO, scarcity, lead-generation, $1M]

  - id: "INS-GVR-017"
    title: "Video Testimonial Formula — Hook-Problem-Solution-Demo-Results-CTA"
    description: "Structured formula for influencer video testimonials: (1) Reaction as hook. (2) Problem they had before. (3) How it affected them. (4) Why everyone should be aware. (5) Product as perfect solution. (6) Demonstrate usage + UVPs. (7) Results guaranteeing it works. (8) Offer/CTA. At scale: hundreds of monthly testimonials layered onto top-performing ads."
    impact: "MEDIUM"
    source_elements: ["FW-GVR-011", "MET-GVR-003", "MET-GVR-023"]
    tags: [video-testimonial, formula, content-structure, ads]

  - id: "INS-GVR-018"
    title: "DM-Like-Comment Outreach Flow — Warm Multi-Touch Before Ask"
    description: "Step 1: Send DM from brand account. Step 2: Like 3 photos on their feed. Step 3: Comment on their most recent post. Step 4: Follow-up DM if no reply in 1 day. Step 5: Switch to email. This multi-touch approach warms the influencer before the ask and tracks everything in a spreadsheet."
    impact: "MEDIUM"
    source_elements: ["FW-GVR-013", "FW-GVR-030", "MET-GVR-001"]
    tags: [outreach, DM, multi-touch, flow, warming]

  - id: "INS-GVR-019"
    title: "Macro Influencers Trickle Down to Micro Influencers"
    description: "If a smaller influencer sees a larger one posting about your product, it serves as an ad saying 'this brand does influencer marketing' and they'll reach out to work with you. Macro influencers are a great way to organically attract micro-influencer partnerships."
    impact: "MEDIUM"
    source_elements: ["FIL-GVR-011"]
    tags: [macro, micro, trickle-down, ecosystem]

  - id: "INS-GVR-020"
    title: "Drop Bottle Budget Tiers — Expected ROI by Follower Range"
    description: "Structured compensation tiers: 3-10K followers: Product only (expect 3 sales, 15 followers). 11-50K: Product + $50 (5 sales). 51-100K: Product + $300 (30 sales). 100-500K: Product + $500 (50 sales). 500K+: Product + $1,500 (150 sales). This enables predictable unit economics for scaling."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-033", "HEUR-GVR-005"]
    tags: [budget-tiers, compensation, expected-ROI, unit-economics]

  - id: "INS-GVR-021"
    title: "8,000 Email Signups in 24 Hours via Lead Magnet + Influencers"
    description: "A free 14-day booty challenge pushed across Instagram accounts got Skinny Me Tea over 8,000 new email signups within 24 hours. Create valuable free content and use email-unlock platform. Also: Pinterest discount code 'Pinterest10' drove 5,000 purchases and $294K in sales."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-027", "HEUR-GVR-028", "MET-GVR-029"]
    tags: [lead-magnet, email-signups, case-study, Pinterest]

  - id: "INS-GVR-022"
    title: "Always Request Audience Insights — Influencer Demographics ≠ Audience Demographics"
    description: "Just because an influencer is a female based in the US doesn't mean her followers will be other females based in the US. Always request audience insights — this is a mistake brands make again and again. Also monitor the gap between organic and sponsored engagement rates."
    impact: "MEDIUM"
    source_elements: ["FIL-GVR-014", "MM-GVR-017"]
    tags: [audience-insights, demographics, due-diligence]

  - id: "INS-GVR-023"
    title: "Custom Landing Pages per Influencer Drive Higher Conversion on YouTube"
    description: "Create custom landing pages geared toward each influencer with their logo, language and style. Visitors feel like they barely left the YouTube channel. Then retarget visitors with custom ad creatives using the same influencer style. Customize even abandoned cart emails in the influencer's style."
    impact: "MEDIUM"
    source_elements: ["MM-GVR-020", "FW-GVR-019", "MET-GVR-035"]
    tags: [custom-lander, YouTube, retargeting, personalization]

  - id: "INS-GVR-024"
    title: "Micro-Influencer with 8K Followers Can Outperform Macro Influencers"
    description: "One of Alaya Skin's micro-influencers with 8,000 followers generated 50 sales through her discount code alone — a better result than many macro-influencers they'd worked with. Individual discount codes make influencers feel like brand ambassadors, and some post multiple times organically."
    impact: "HIGH"
    source_elements: ["HEUR-GVR-031", "MET-GVR-019"]
    tags: [micro-outperforms-macro, discount-codes, ambassador]

  - id: "INS-GVR-025"
    title: "Influencer Marketing Has 11x ROI of All Other Digital Media"
    description: "Influencer Marketing has 11x the ROI of all other forms of digital media. $6.50 for every $1 spent on average. 90% of marketers consider it the same or more effective than other marketing channels. This is the #1 growth lever for ecommerce brands."
    impact: "HIGH"
    source_elements: ["FIL-GVR-012", "FIL-GVR-001"]
    tags: [ROI, digital-media, industry-stats, core-belief]

      - "commitment"
      - "self-persuasion"

    peso: 0.96

  - id: "FRA-JM-006"
    nome: "Cold Call Gatekeeper Framework"
    descricao: "Pattern interrupt para cold calls - diferente de 99.9% dos vendedores"

    estrutura:
      - passo: "1. Abertura Pattern Interrupt"
        texto: "Hi, this is [nome]. I was wondering if you could possibly help me out for a moment?"
        nota: "NAO usar 'Hi, my name is X from Y company...'"

      - passo: "2. Pausa Estrategica"
        duracao: "3 segundos"
        resultado: "Gatekeeper: 'Sure, how can I help you?'"

      - passo: "3. Downplay Introduction"
        texto: "Well, I'm not sure you could yet, but I was calling to see if you would be open to looking at [problema que resolve]..."

      - passo: "4. Boring Stuff Downplay"
        texto: "...before I go into who we are and what we do and all that kind of boring stuff..."

    resultado: "Gatekeeper se torna aliado, nao obstaculo"

    evidencias:
      - citacao: "99.9% use 'Hi, my name is...' which triggers instant rejection"
        source_id: "JM-0025"

    dominios:

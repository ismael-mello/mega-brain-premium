frameworks:

  - id: "FRA-JM-001"
    nome: "NEPQ Framework (Neuro Emotional Persuasion Questions)"
    descricao: "Framework completo de 6 fases de perguntas para vendas baseadas em self-persuasion"

    estrutura:
      - fase: "Phase 1: Connecting Questions"
        objetivo: "Entender por que responderam, iniciar self-persuasion"
        perguntas:
          - "What was it about [X] that attracted your attention?"
          - "Was there anything else that attracted your attention?"
          - "Do you know what you're looking for?"

      - fase: "Phase 2: Situation Questions"
        objetivo: "Mapear situacao atual sem julgamento"
        perguntas:
          - "What do you currently have/use?"
          - "How long have you had/used it?"
          - "What made you choose that one?"

      - fase: "Phase 3: Problem Awareness Questions"
        objetivo: "Fazer prospect SENTIR a dor (80-90% da venda)"
        perguntas:
          - "What problems are you experiencing with [current situation]?"
          - "How long has this been going on?"
          - "What have you tried to fix it?"

      - fase: "Phase 4: Solution Awareness Questions"
        objetivo: "Deixar prospect descrever solucao ideal"
        perguntas:
          - "What would be ideal for you?"
          - "What would that mean for you/your business?"
          - "How important is it to solve this?"

      - fase: "Phase 5: Consequence Questions"
        objetivo: "Amplificar urgencia atraves de dor futura"
        perguntas:
          - "What happens if you don't solve this?"
          - "How is this affecting [other areas]?"
          - "What's the cost of NOT doing anything?"

      - fase: "Phase 6: Commitment Questions"
        objetivo: "Self-persuasion final, nao closing tradicional"
        perguntas:
          - "Do you feel like this could be what you're looking for?"
          - "Why do you feel like it is though?"
          - "What would you like to do from here?"

    evidencias:
      - citacao: "NEPQ - Neuro Emotional Persuasion Questions - The complete question-based selling framework"
        source_id: "JM-0001"

    dominios:
      - "sales-methodology"
      - "discovery"
      - "closing"

    peso: 0.98

  - id: "FRA-JM-002"
    nome: "7 Tonalities Framework"
    descricao: "7 tons de voz distintos para diferentes situacoes de vendas - 72% da comunicacao e nao-verbal"

    estrutura:
      - tonalidade: "1. Curious"
        uso: "Para perguntas de descoberta"
        exemplo: "Hmmm, interessante... e o que aconteceu depois?"

      - tonalidade: "2. Confused"
        uso: "Para objecoes - desativa defesas"
        exemplo: "Espera... nao tenho certeza se entendi..."

      - tonalidade: "3. Concerned"
        uso: "Para amplificar consequencias"
        exemplo: "Isso me preocupa... e se isso continuar?"

      - tonalidade: "4. Challenging"
        uso: "Para testar comprometimento"
        exemplo: "Voce realmente quer resolver isso ou...?"

      - tonalidade: "5. Playful"
        uso: "Para quebrar tensao"
        exemplo: "Bom, eu poderia mentir e dizer que e perfeito..."

      - tonalidade: "6. Skeptical"
        uso: "Para aumentar credibilidade"
        exemplo: "Nao sei se isso e pra todo mundo..."

      - tonalidade: "7. Empathetic"
        uso: "Para validar sentimentos"
        exemplo: "Eu entendo como isso pode ser frustrante..."

    evidencias:
      - citacao: "72% of communication is NON-VERBAL. Tone + Pace + Pauses > Words"
        source_id: "JM-0020"

    dominios:
      - "tonality"
      - "communication"
      - "non-verbal"

    peso: 0.96

  - id: "FRA-JM-003"
    nome: "Two Truths Framework"
    descricao: "Todo prospect tem duas verdades - a primeira e protegida/automatica, a segunda e real"

    estrutura:
      - passo: "1. Receber primeira resposta"
        descricao: "Historia protegida - 'We love our current provider'"

      - passo: "2. Aplicar pergunta gatilho"
        descricao: "'Anything you would change if you could?'"

      - passo: "3. Receber segunda resposta"
        descricao: "Verdade real emerge - 'Well, actually...'"

      - passo: "4. Explorar segunda verdade"
        descricao: "Probing questions para aprofundar"

    metricas:
      - "99% contradizem primeira resposta"
      - "8/10 dizem amar onde moram, depois contradizem"

    evidencias:
      - citacao: "Everyone has TWO TRUTHS. First is protected, second is real."
        source_id: "JM-0045"

    dominios:
      - "psychology"
      - "probing"
      - "discovery"

    peso: 0.95

  - id: "FRA-JM-004"
    nome: "3-Step Objection Diffusing Framework"
    descricao: "3 passos para difundir objecoes sem confronto - 99% dos vendedores pulam para handling"

    estrutura:
      - passo: "Step 1: CLARIFY"
        objetivo: "Entender objecao real, nao superficial"
        perguntas:
          - "O que voce quer dizer com isso?"
          - "Pode me dar mais detalhes?"

      - passo: "Step 2: DISCUSS"
        objetivo: "Deixar prospect processar"
        perguntas:
          - "Se pudessemos resolver isso, o que significaria?"
          - "Explore as implicacoes"

      - passo: "Step 3: DIFFUSE"
        objetivo: "Resolver com credibilidade, nao pressao"
        tecnicas:
          - "Use evidencias, nao argumentos"
          - "Valide primeiro, resolva depois"

    evidencias:
      - citacao: "99% of salespeople skip straight to handling mode"
        source_id: "JM-0060"

    dominios:
      - "objections"
      - "diffusing"
      - "communication"

    peso: 0.94

  - id: "FRA-JM-005"
    nome: "3 Commitment Questions Framework"
    descricao: "Substituicao de closing tradicional por self-persuasion questions"

    estrutura:
      - pergunta: "Question 1"
        texto: "Do you feel like this could be what you're looking for?"
        objetivo: "Ativar auto-avaliacao"

      - pergunta: "Question 2"
        texto: "Why do you feel like it is though?"
        objetivo: "SELF-PERSUASION TRIGGER - quando dizem POR QUE, convencem a si mesmos"

      - pergunta: "Question 3"
        texto: "What would you like to do from here?"
        objetivo: "Transferir controle - eles escolhem, nao sao pressionados"

    principio: "O close acontece DURANTE o discovery, nao no final"

    evidencias:
      - citacao: "3 Commitment Questions outperform any closing technique"
        source_id: "JM-0005"

    dominios:

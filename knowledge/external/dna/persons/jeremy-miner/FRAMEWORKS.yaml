    peso: 0.92

  - id: "FRA-JM-009"
    nome: "Travel Commitment Pre-Check Framework"
    descricao: "Testar commitment antes de viajar para demos/apresentacoes"

    estrutura:
      - passo: "1. Hypothetical Setup"
        texto: "Let's pretend I fly to [city] for a demo..."

      - passo: "2. Decision Scenario"
        texto: "And everyone agrees this fits what you're looking for..."

      - passo: "3. Commitment Question"
        texto: "What do you see happening next?"

    respostas_possiveis:
      - resposta: "'Fechariamos negocio na hora'"
        acao: "VIAJE - ha commitment real"
      - resposta: "'Teriamos que passar pelo juridico/comite...'"
        acao: "NAO VIAJE - remova obstaculos primeiro"

    starter_phrases:

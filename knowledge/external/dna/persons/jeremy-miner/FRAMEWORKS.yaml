  - id: "FRA-JM-008"
    nome: "Spouse Objection Framework"
    descricao: "5 passos para lidar com 'preciso falar com meu conjuge' - 70% sao smokescreens"

    estrutura:
      - passo: "1. Acknowledge"
        texto: "Faz total sentido consultar seu conjuge..."

      - passo: "2. Benefit Question"
        texto: "Se seu conjuge estivesse aqui, o que voce acha que ele/ela diria sobre isso?"

      - passo: "3. Consequence Question"
        texto: "O que acontece se voces decidirem nao fazer nada sobre [problema]?"

      - passo: "4. Calendar Commit"
        texto: "Quando voces vao conversar sobre isso? Que tal agendarmos um horario para os tres?"

      - passo: "5. 'Before I Go' Magic Question"
        texto: "Antes de eu ir... quais partes especificamente voce precisa discutir com seu conjuge?"
        nota: "Guarda baixa quando pensa que voce esta saindo - objecao REAL emerge"

    resultado: "Feche ALI, sem follow-up"

    evidencias:
      - citacao: "70% of 'spouse' objections are smokescreens"
        source_id: "JM-0065"

    dominios:

  - id: "FRA-JM-014"
    nome: "Problem Awareness Deep Probing Framework"
    descricao: "Perguntas expandidas para NEPQ Phase 3 - a fase mais critica"

    estrutura:
      - pergunta: "What's happening with [problem] right now?"
        objetivo: "Current state"

      - pergunta: "How long has this been going on?"
        objetivo: "Duration/urgency"

      - pergunta: "What have you done to try to fix it?"
        objetivo: "Previous attempts"

      - pergunta: "Why do you think that hasn't worked?"
        objetivo: "Root cause"

      - pergunta: "How is this affecting other areas of your [business/life]?"
        objetivo: "Ripple effects"

      - pergunta: "On a scale of 1-10, how urgent is solving this?"
        objetivo: "Priority level"

      - pergunta: "What made you reach out NOW vs 6 months ago?"
        objetivo: "Timing trigger"


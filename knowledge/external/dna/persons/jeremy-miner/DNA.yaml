      - id: "FRA-JM-001"
        title: "NEPQ Framework (Neuro Emotional Persuasion Questions)"
        statement: "Framework completo de 6 fases de perguntas para vendas baseadas em self-persuasion"
        quote: "NEPQ - Neuro Emotional Persuasion Questions - The complete question-based selling framework"
        weight: 0.98
        source_ids: ["JM-0001"]
        domains: ["sales-methodology", "discovery", "closing"]
        components:
          - phase: "Phase 1: Connecting Questions"
            objective: "Entender por que responderam, iniciar self-persuasion"
            questions: ["What was it about [X] that attracted your attention?", "Was there anything else that attracted your attention?", "Do you know what you're looking for?"]
          - phase: "Phase 2: Situation Questions"
            objective: "Mapear situacao atual sem julgamento"
            questions: ["What do you currently have/use?", "How long have you had/used it?", "What made you choose that one?"]
          - phase: "Phase 3: Problem Awareness Questions"
            objective: "Fazer prospect SENTIR a dor (80-90% da venda)"
            questions: ["What problems are you experiencing with [current situation]?", "How long has this been going on?", "What have you tried to fix it?"]
          - phase: "Phase 4: Solution Awareness Questions"
            objective: "Deixar prospect descrever solucao ideal"
            questions: ["What would be ideal for you?", "What would that mean for you/your business?", "How important is it to solve this?"]
          - phase: "Phase 5: Consequence Questions"
            objective: "Amplificar urgencia atraves de dor futura"
            questions: ["What happens if you don't solve this?", "How is this affecting [other areas]?", "What's the cost of NOT doing anything?"]
          - phase: "Phase 6: Commitment Questions"
            objective: "Self-persuasion final, nao closing tradicional"
            questions: ["Do you feel like this could be what you're looking for?", "Why do you feel like it is though?", "What would you like to do from here?"]


          - numero: 2
            acao: "Dominate Completely"
            descricao: "Become the undisputed leader — offer what competitors physically cannot."
          - numero: 3
            acao: "Expand to Adjacent Markets"
            descricao: "Same infrastructure, similar customer profile — books to CDs to electronics."
          - numero: 4
            acao: "Become the Universal Store"
            descricao: "Distribution competence becomes so strong any category can be added."
          - numero: 5
            acao: "Stay Invisible Until Unbeatable"
            descricao: "Never announce war early — be invisible until too big to stop."

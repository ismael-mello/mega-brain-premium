      - id: MET-PT-005
        titulo: "Dominacao Sequencial de Mercados (Metodo Amazon)"
        texto: >
          Processo de expansao gradual de monopolio para mercados adjacentes.
          PASSO 1: ESCOLHA UM NICHO MINUSCULO. Amazon comecou com livros — mercado definido,
          catalogavel, com demanda comprovada mas distribuicao ineficiente (livrarias tinham
          espaco limitado).
          PASSO 2: DOMINE COMPLETAMENTE O NICHO. Torne-se o player indiscutivel. Amazon
          rapidamente ofereceu QUALQUER livro, nao apenas bestsellers — algo que livrarias
          fisicas nao podiam fazer.
          PASSO 3: EXPANDA PARA MERCADOS ADJACENTES. De livros para CDs/DVDs — mesma
          infraestrutura de distribuicao, perfil similar de cliente. Depois eletronicos.
          PASSO 4: TORNE-SE A LOJA UNIVERSAL. Eventualmente, a competencia logistica e de
          distribuicao se torna tao forte que qualquer categoria pode ser adicionada. Amazon
          se tornou a 'loja de tudo'.
          PASSO 5: NUNCA fale em 'disruption' cedo demais. Amazon nao anunciou guerra contra
          o Walmart em 1999. Ficou invisivel ate ser imbativel.

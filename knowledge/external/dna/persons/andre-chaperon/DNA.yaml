  L5_METHODOLOGIES:
    count: 54
    items:
      # ═══ CORE METHODOLOGIES ═══
      - id: "MET-AC-001"
        text: "SOI Build Methodology: (1) Define audience → (2) Map Chain of Beliefs → (3) Create Presell Sites → (4) Build email ecosystem → (5) Create content for external sites → (6) Link everything together."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MET-AC-002"
        text: "AoE Implementation: (1) Define pathways → (2) Build RBS per pathway → (3) Set up VNL heartbeat → (4) Create SOS for promotion → (5) Build PLS for launches → (6) Add COS post-purchase → (7) Set up re-engagement."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-003"
        text: "VPDC Method: (1) Define audience → (2) Brainstorm Jobs → (3) Identify Pains → (4) Identify Gains → (5) List product/service → (6) Map Pain Relievers → (7) Map Gain Creators → (8) Select top 1-3 each → (9) Create messaging brief."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "MET-AC-004"
        text: "Offer Discovery Method: (1) List Skills/Hobbies/Experience → (2) Five Whys for each → (3) Cross out non-exciting → (4) Identify who benefits → (5) Map value → (6) Three-year future test."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "MET-AC-005"
        text: "Momentum Builder Sprint: Week 1 (Strategy/Thematic Arc) → Week 2 (500-800w Ad) → Week 3 (1200-1800w Landing Page) → Week 4 (3-Email RBS) → Week 5 (Bridge + 3 Promos) → Week 6 (Edit/Polish)."
        domain: "campaign-design"
        source: "MMS-09-Momentum"

      - id: "MET-AC-006"
        text: "Durable Business Build: (1) Discover audience needs → (2) Validate through writing/testing → (3) Build minimum viable infrastructure → (4) Optimize through data-driven loops."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MET-AC-007"
        text: "Organic Traffic Empire: (1) Build badass Presell Sites → (2) Write guest posts that seed context → (3) Syndicate 20 versions to authority sites → (4) Let evergreen links compound."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MET-AC-008"
        text: "Paid+SOI Integration: (1) Run paid ads for list building → (2) Deploy SOS email sequences → (3) Link to SOI Presell Sites → (4) Retarget engaged visitors."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      # ═══ EMAIL METHODOLOGIES ═══
      - id: "MET-AC-009"
        text: "RBS Creation Method: (1) Define entry point/pathway → (2) Write 3-7 value emails → (3) Zero selling → (4) Build rapport through micro-commitments → (5) End with VNL subscription."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-010"
        text: "VNL Automation Setup: (1) Create custom field 'email_state' → (2) Set new subscriber → 'new' → (3) RBS completes → switch to 'vnl' → (4) Create VNL segment where email_state='vnl' → (5) Broadcast to VNL segment."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-011"
        text: "SOS Writing Method: (1) Define story arc → (2) Write 5-7 emails building emotional investment → (3) Each email builds on previous → (4) Offer emerges naturally from story."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "MET-AC-012"
        text: "Bridge Email Method: (1) Provide value in VNL → (2) Signal promotional content coming → (3) Ask for explicit permission to proceed → (4) Only promote to those who opted in."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-013"
        text: "Re-Engagement Method: (1) Identify below 2-star engagement → (2) Send 3-email reactivation → (3) If no response → remove from active list."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-014"
        text: "VNL Muting Method: (1) Detect active promotional sequence → (2) Set custom field to 'in_promo' → (3) Exclude from VNL broadcast → (4) Sequence ends → reset to 'vnl'."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-015"
        text: "VIP Physical Mail Method: (1) Identify top 50 prospects by engagement → (2) Create physical mailing ($17/piece) → (3) Send as pattern interrupt → (4) Follow up with digital sequence."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      # ═══ CONTENT METHODOLOGIES ═══
      - id: "MET-AC-016"
        text: "Facebook Ad Writing Method: (1) Define hook → (2) State thesis → (3) Show empathy → (4) Demonstrate authority → (5) Present plan → (6) CTA. 500-800 words."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "MET-AC-017"
        text: "Landing Page Writing Method: (1) Organizing question → (2) Create tension → (3) Build resolution → (4) CTA. 1200-1800 words."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "MET-AC-018"
        text: "Thematic Arc Method: (1) Define controlling idea → (2) Choose theme type (literary/expert/counterintuitive) → (3) Weave through all touchpoints."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MET-AC-019"
        text: "Beat Sheet Writing Method: (1) Write bullet points → (2) Arrange for effect → (3) Expand to prose → (4) Edit for flow."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MET-AC-020"
        text: "Open Loop Method: (1) Introduce story element → (2) Leave unresolved at end → (3) Resolve in next piece → (4) Open new loop."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MET-AC-021"
        text: "Guest Post for SOI: (1) Write content seeding PS context → (2) Submit to authority sites → (3) Link to Presell Site in bio/body → (4) PS continues narrative."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "MET-AC-022"
        text: "Content Syndication Method: (1) Write one core article → (2) Create 20 variations → (3) Submit to relevant authority sites → (4) Each links to SOI."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      # ═══ SOI METHODOLOGIES ═══
      - id: "MET-AC-023"
        text: "Presell Site Creation: (1) Define audience segment → (2) Map Chain of Beliefs → (3) Write narrative content → (4) Add 50+ contextual outbound links → (5) Create entry and exit CTAs."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MET-AC-024"
        text: "Chain of Beliefs Mapping: (1) Identify end belief (purchase decision) → (2) Work backwards → (3) Define each belief step → (4) Create content addressing each belief."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MET-AC-025"
        text: "SOI World Construction: (1) Create multiple Presell Sites → (2) Interlink them → (3) Connect to email ecosystem → (4) Add external content pointing in → (5) Create character arcs."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MET-AC-026"
        text: "Side Project Marketing: (1) Identify useful ancillary project → (2) Build it → (3) Make it genuinely valuable → (4) Let it attract right audience → (5) Connect to main SOI."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      # ═══ BUSINESS METHODOLOGIES ═══
      - id: "MET-AC-027"
        text: "A-to-B Goal Method: (1) Define current reality (A) → (2) Define desired state (B) max 3 months out → (3) Focus on controllable actions → (4) Create structural tension → (5) Let tension drive progress."
        domain: "goal-setting"
        source: "MMS-01-Getting-Started"

      - id: "MET-AC-028"
        text: "LTV Calculation Approach: (1) Use 2-year window → (2) Track all purchases per customer → (3) Average across cohort → (4) Compare to CAC for viability."
        domain: "economics"
        source: "MMS-01-Getting-Started"

      - id: "MET-AC-029"
        text: "Project X Validation: (1) Define hypothesis → (2) Create minimum viable experiment → (3) Test with small audience → (4) Measure results → (5) Decide: build or pivot."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MET-AC-030"
        text: "TDB Discovery Method: (1) Research audience deeply → (2) Have real conversations → (3) Identify patterns → (4) Write about findings → (5) Let writing reveal gaps."
        domain: "durable-business"
        source: "MMS-07-TDB"

      # ═══ AUDIENCE METHODOLOGIES ═══
      - id: "MET-AC-031"
        text: "JTBD Analysis Method: (1) Define audience → (2) List all functional jobs → (3) Add social jobs → (4) Add emotional jobs → (5) Rate pain/gain/urgency 0-10 → (6) Select top 1-3."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "MET-AC-032"
        text: "Audience Segmentation via VPDC: (1) Complete canvas for one audience → (2) If JTBD priorities differ within → (3) Split into sub-audiences → (4) Create separate canvas for each."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "MET-AC-033"
        text: "Prospect POV Exercise: (1) Choose ideal prospect → (2) Write as if you ARE them → (3) Describe their day, frustrations, desires → (4) Use insights in messaging."
        domain: "audience"
        source: "MMS-09-Momentum"

      - id: "MET-AC-034"
        text: "Three-Year Future Test: (1) Imagine wild success → (2) Is that what you want? → (3) Would you enjoy it daily? → (4) If no → adjust before building."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      # ═══ TRAFFIC METHODOLOGIES ═══
      - id: "MET-AC-035"
        text: "Multi-Touch Retargeting: (1) Initial touch (video) → (2) Retarget most engaged → (3) Expose to content → (4) Take down journey across touchpoints."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MET-AC-036"
        text: "Paid Traffic Setup: (1) Define front-end offer → (2) Calculate break-even → (3) Set up tracking → (4) Test creative → (5) Optimize for long-term customer value."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      # ═══ ADDITIONAL METHODOLOGIES (37-54) ═══
      - id: "MET-AC-037"
        text: "TTE Module 0 Overview: (1) Understand offers → (2) Map front-end vs back-end → (3) Define customer economics → (4) Set realistic expectations."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "MET-AC-038"
        text: "TTE Current Reality Assessment: (1) No single right way → (2) Results are probabilistic → (3) Map your specific situation → (4) Identify constraints and opportunities."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "MET-AC-039"
        text: "TTE Paid Principles Application: (1) Align with platform goals → (2) Eliminate obvious mistakes → (3) Prioritize high-impact activities → (4) Measure obsessively → (5) Optimize for customer happiness."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "MET-AC-040"
        text: "Promotional Email Sequence: (1) Bridge (ask permission) → (2) Email 1 (build desire) → (3) Email 2 (provide proof) → (4) Email 3 (create urgency)."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      - id: "MET-AC-041"
        text: "RBS 3-Day Method: (1) Day 1: Welcome + set context + first story → (2) Day 2: Deliver value + second story → (3) Day 3: Commitment invitation + open loop to VNL."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      - id: "MET-AC-042"
        text: "Campaign Assembly: (1) Define thematic arc → (2) Write ad → (3) Write landing page → (4) Write RBS → (5) Write promos → (6) Connect all with consistent theme."
        domain: "campaign-design"
        source: "MMS-09-Momentum"

      - id: "MET-AC-043"
        text: "Editing Process: (1) Complete shitty first draft → (2) Walk away → (3) Return with fresh eyes → (4) Edit for flow → (5) Arrange for maximum effect → (6) Polish."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MET-AC-044"
        text: "Peer Review Method: (1) Submit work → (2) Receive live review → (3) Learn from others' reviews → (4) Apply feedback → (5) Iterate."
        domain: "pedagogy"
        source: "MMS-09-Momentum"

      - id: "MET-AC-045"
        text: "Value Proposition Validation: (1) Complete VPDC → (2) Build assets → (3) Test with real audience → (4) Measure results → (5) Refine or pivot."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "MET-AC-046"
        text: "SOI Traffic Layering: (1) Organic content creates foundation → (2) Email sequences deepen relationship → (3) Paid traffic amplifies reach → (4) Retargeting recaptures engaged."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MET-AC-047"
        text: "Engagement Score Management: (1) Set up ConvertKit scoring → (2) Monitor weekly → (3) Below 2 stars → trigger re-engagement → (4) No response after 3 emails → remove."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-048"
        text: "Custom Field State Management: (1) Define states (new/rbs/vnl/sos/pls/cos) → (2) Automate transitions → (3) Use fields for broadcast segmentation."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MET-AC-049"
        text: "TDB Writing as Validation: (1) Choose topic → (2) Write about it → (3) If writing flows → topic resonates → (4) If stuck → topic needs more research or pivoting."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MET-AC-050"
        text: "MMS Complete Curriculum Path: Getting Started → Systems Theory → Audience/Offer → AoE → SOI → TTE → TDB → Live Workshop → Momentum Builder."
        domain: "marketing-system"
        source: "MMS-All"

      - id: "MET-AC-051"
        text: "Cognitive Reframing Method: (1) Identify current prospect frame → (2) Introduce new perspective → (3) Provide evidence → (4) Let prospect adopt new frame."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MET-AC-052"
        text: "Presell Site Linking Strategy: (1) Create contextually relevant outbound links → (2) Each link sends with YOUR frame → (3) Inbound links from authority sites → (4) Compound traffic over time."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI-Organic"

      - id: "MET-AC-053"
        text: "Strategic Fulfillment Method (Jay Abraham story): (1) Acquire customer at loss → (2) Fulfill with premium packaging → (3) Preemptively address objections → (4) Upsell with trade-in credit → (5) Generate lifetime value."
        domain: "economics"
        source: "MMS-05-SOI-Organic"

      - id: "MET-AC-054"
        text: "Authority Site Placement: (1) Identify market-specific authority sites → (2) Understand their content needs → (3) Write valuable guest content → (4) Include contextual links to SOI → (5) Syndicate variations."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"


        source: "MMS-04-AoE"

      - id: "FW-AC-011"
        text: "SOS (Soap Opera Series): 5-7 story-driven emails building emotional investment before any offer."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-012"
        text: "STP (Story-Powered Promotion): Promotional content woven through narrative storytelling."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-013"
        text: "PLS (Product Launch Series): 3-5 emails with escalating urgency for product launch windows."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-014"
        text: "COS (Customer Onboarding Series): Post-purchase sequence reducing refunds and building satisfaction."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-015"
        text: "Bridge Email Framework: Permission-seeking transition from value to promotion."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-016"
        text: "Re-Engagement Series: 3 emails to cold subscribers → reactivate or remove."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-017"
        text: "5-Step VNL Automation: (1) Create custom field → (2) New subscriber automation → (3) RBS automation → (4) VNL broadcast segment → (5) COS automation."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-018"
        text: "Email State Machine: Custom fields manage subscriber state (new/rbs/vnl/sos/pls/cos)."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FW-AC-019"
        text: "Pathways Architecture: Multiple RBS entry points feed into single VNL heartbeat."

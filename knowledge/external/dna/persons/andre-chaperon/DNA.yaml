person: "André Chaperon"
version: "v1.0.0"
sources: 1
total_elements: 380
co_authors:
  - name: "Shawn Twing"
    role: "Co-creator of MMS modules (TTE, Audience & Offer, AoE Live Workshop, Momentum Builder)"
    weight: 0.40

layers:
  L1_PHILOSOPHIES:
    count: 82
    items:
      # ═══ SYSTEMS THINKING ═══
      - id: "FIL-AC-001"
        text: "It's the way the parts of a system interact — not how they act independently — that actually improves performance."
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-002"
        text: "The righter you do the wrong things, the wronger you become. — Russell Ackoff"
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-003"
        text: "Linear optimization assumes — incorrectly — that every click, every lead, and every customer is qualitatively the same."
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-004"
        text: "More clicks, more leads, and even more customers can make your business perform worse overall."
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-005"
        text: "There's an enormous distinction between doing things right and doing the right things. — Peter Drucker"
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      # ═══ RELATIONSHIP-FIRST MARKETING ═══
      - id: "FIL-AC-006"
        text: "Emphasize relationships before transactions. Customers are created before they buy anything."
        domain: "relationship-marketing"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-007"
        text: "Permission before promotion. The relationship predates the sale."
        domain: "relationship-marketing"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-008"
        text: "World building is the strategic upstream decision that creates the context for everything downstream."
        domain: "relationship-marketing"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-009"
        text: "SOI is built on a long ROI cycle, where the primary focus is on building attraction, desire, and bonding FIRST, long BEFORE any sale."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "FIL-AC-010"
        text: "People buy things for many reasons that are rarely obvious. We buy for functional, social, and emotional reasons."
        domain: "buyer-psychology"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-011"
        text: "The job, not the customer, is the fundamental unit of analysis for a marketer. — Clayton Christensen"
        domain: "buyer-psychology"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-012"
        text: "You want to deliver to the world what you would buy if you were on the other end. — Charlie Munger"
        domain: "value-creation"
        source: "MMS-03-Audience-Offer"

      # ═══ ANTI-TACTICS / STRATEGIC THINKING ═══
      - id: "FIL-AC-013"
        text: "The strategic layer changes very rarely; it's the tactical details that change and shift all the time."
        domain: "strategy-vs-tactics"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-014"
        text: "A tactical thinker made $7K and quit. A strategic thinker lost $2K and 15 months later made $25 million. — Jay Abraham story"
        domain: "strategy-vs-tactics"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-015"
        text: "I am not a paid traffic expert, largely because I've chosen to avoid it so that I can focus on organic, and get world-class at that."
        domain: "focus"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-016"
        text: "No single right way in marketing. Results are probabilistic, not guaranteed."
        domain: "epistemic-humility"
        source: "MMS-06-TTE"

      # ═══ EMAIL AS RELATIONSHIP ═══
      - id: "FIL-AC-017"
        text: "Email is not a sales channel. Email is a relationship channel that occasionally sells."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-018"
        text: "The purpose of each email is to get the next email opened."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-019"
        text: "Story-powered email creates context, then links out to your SOI world."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-020"
        text: "Direct response marketers relentlessly hammer subscribers with offers until they buy or unsubscribe. We do the opposite."
        domain: "email-marketing"
        source: "MMS-05-SOI-Organic"

      # ═══ CONTENT & ATTENTION ═══
      - id: "FIL-AC-021"
        text: "Presell Sites are evergreen assets that automatically ATTRACT targeted people over time."
        domain: "content-marketing"
        source: "MMS-05-SOI"

      - id: "FIL-AC-022"
        text: "The INTENT behind a click is very important. Multi-step clicks driven by context and powered by intent and desire are HUGELY VALUABLE."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-023"
        text: "Each step in the click process increases their level of attention and commitment."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-024"
        text: "A single guest post can result in multiple 6-figures of revenue over time."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      # ═══ OFFERS & VALUE ═══
      - id: "FIL-AC-025"
        text: "Offers are how we monetize the attention we're buying with paid traffic or earning in other ways."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-026"
        text: "A really strong offer is the intersection of the creator's interests/experience, an audience with a need, and clearly articulated value."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-027"
        text: "We are not trying to be all things to everybody. We're looking for the few things that really matter from the customer's perspective."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-028"
        text: "Framework before work. A framework focuses on the few things that matter most to produce an important result."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      # ═══ DURABLE BUSINESS ═══
      - id: "FIL-AC-029"
        text: "The goal is to build a durable business — one that generates happy, long-term repeat customers."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "FIL-AC-030"
        text: "Discover first. Validate through writing and testing. Build only what's validated. Then systematically optimize."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "FIL-AC-031"
        text: "Optimize your entire business for happy, long-term repeat customers, not just immediate sales."
        domain: "durable-business"
        source: "MMS-06-TTE"

      # ═══ WRITING & CRAFT ═══
      - id: "FIL-AC-032"
        text: "The shitty first draft is the essential starting point. Do the work before trying to perfect."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-033"
        text: "Narrative structure and emotional resonance matter more than tactics."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-034"
        text: "A thematic arc is the single organizing idea connecting all touchpoints in a customer journey."
        domain: "writing"
        source: "MMS-09-Momentum"

      # ═══ TRAFFIC PHILOSOPHY ═══
      - id: "FIL-AC-035"
        text: "Give the platform users what they want. Avoid big mistakes. Focus time and energy on what matters most."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "FIL-AC-036"
        text: "Know exactly what you're doing and measure it. The economics and algorithms have changed the landscape."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "FIL-AC-037"
        text: "Paid traffic costs money and requires short ROI cycles. SOI requires long ROI cycles. Understand these opposing forces."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      # ═══ ADDITIONAL PHILOSOPHIES ═══
      - id: "FIL-AC-038"
        text: "The audience that can benefit most is the subset perfectly matched to your specific experience."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-039"
        text: "Imagine your idea is wildly successful and verify that's something you would want to be true for you."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-040"
        text: "There's a vast difference between doing something as a hobby and doing it as a vocation."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-041"
        text: "Don't try to do this work as quickly as possible. Instead, aim to be as thorough as is valuable. You're looking for insights, not quick wins."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-042"
        text: "Awareness → Engagement → Conversion are the three essential components of a business system."
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      - id: "FIL-AC-043"
        text: "Only about 15-20% of people who are eventually going to buy, buy in the first 90 days. The remainder buy up to two years. — Dean Jackson"
        domain: "buyer-psychology"
        source: "MMS-01-Getting-Started"

      - id: "FIL-AC-044"
        text: "Customer Lifetime Value should be measured on a 2-year window, not 30 days."
        domain: "economics"
        source: "MMS-01-Getting-Started"

      - id: "FIL-AC-045"
        text: "Structural tension between A (current reality) and B (desired state) is the engine that moves you forward."
        domain: "personal-development"
        source: "MMS-01-Getting-Started"

      - id: "FIL-AC-046"
        text: "B should really be a few weeks, maybe as far out as three months. Not longer."
        domain: "goal-setting"
        source: "MMS-01-Getting-Started"

      - id: "FIL-AC-047"
        text: "Interruption advertising is neither good nor bad. Just understand the dynamics that underpin it."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-048"
        text: "Multi-step contextual advertising moves people through touchpoints, not linear funnels."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-049"
        text: "Bloggers love linking to Presell Sites. Build badass PS and you build an evergreen empire."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-050"
        text: "I prefer leveraging my time writing content that attracts people into my SOI, rather than spinning up FB Ads that fizzle out."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-051"
        text: "Empathy first, then authority, then the plan. That's the order."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-052"
        text: "Open loops create tension. Tension seeks resolution. Resolution drives the reader forward."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-053"
        text: "Before you promote, ask for explicit permission via a bridge email."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-054"
        text: "Using deadlines is not bad when used for good. Humans are world-class procrastinators — it's part of our DNA programming."
        domain: "sales-psychology"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-055"
        text: "When different audiences have different jobs, pains, and gains — create separate audience segments."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-056"
        text: "You will get no benefit from this module if you don't do the work, or if you rush through it."
        domain: "pedagogy"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-057"
        text: "95 out of 100 people in digital marketing probably can't calculate CAC or LTV accurately."
        domain: "economics"
        source: "MMS-01-Getting-Started"

      - id: "FIL-AC-058"
        text: "SOI — Sphere of Influence — is a framework for understanding customer acquisition. AoE — Art of Email — is a framework for building relationships via email."
        domain: "frameworks"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-059"
        text: "Frameworks provide enough guidance to be broadly useful, but are not so restrictive that they inhibit creativity."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-060"
        text: "Purchasing decisions have functional, emotional, and social components."
        domain: "buyer-psychology"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-061"
        text: "VNL — Value Newsletter — is the heartbeat email that maintains the relationship between promotional sequences."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-062"
        text: "Re-engagement series: 3 emails to reactivate cold subscribers before removing them."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-063"
        text: "The four strategic decisions in email: what to send, when, to whom, and why."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "FIL-AC-064"
        text: "The VIP idea: spending $17/mailing to top 50 prospects creates disproportionate returns."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-065"
        text: "Paid advertising costs are only going up and to the right. This trend won't change."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-066"
        text: "Content publishers need content to sell advertising. This creates opportunity for strategic placement."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-067"
        text: "Writing for external audiences should seed the context you want someone to be in BEFORE they click through to your PS."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-068"
        text: "Don't just ask 'why' once. Dig deeply. Five Whys is the benchmark."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-069"
        text: "Once you have it you'll know. It'll feel right — a combination of excitement and anxiety. That's a sign you're on the right track."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-070"
        text: "A Presell Site with 50+ outbound contextually relevant links establishes the frame for others."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-071"
        text: "The pressure to recoup advertising dollars ASAP trumps all else. Buy now, screw later. This is what we fight against."
        domain: "philosophy"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-072"
        text: "Banner blindness requires new media assets and marketing hooks continuously. It's never ending."
        domain: "paid-traffic"
        source: "MMS-05-SOI-Organic"

      - id: "FIL-AC-073"
        text: "Discover → Validate → Build → Optimize. The phased approach to durable businesses."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "FIL-AC-074"
        text: "Writing is editing. Arrange ideas for maximum effect. Create seamless flow across all elements."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-075"
        text: "Use beat sheets — bullet points — before writing full copy. It forces structure before prose."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-076"
        text: "Avoid the three temptations of promotional writing: being too salesy, too early, too obvious."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-077"
        text: "Build desire and reveal offers organically. Don't force-feed."
        domain: "sales-psychology"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-078"
        text: "Jobs to Be Done: rate pain, gain, and urgency on a 0-10 scale for each customer job."
        domain: "buyer-psychology"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-079"
        text: "The controlling idea is the DNA of your entire campaign. Everything flows from it."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "FIL-AC-080"
        text: "Specificity is key. The more focused you are on the audience, the more powerful the offer."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "FIL-AC-081"
        text: "Mute VNLs when in promotional sequences (SOS/SPP/PLS). Don't compete with yourself."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "FIL-AC-082"
        text: "ConvertKit engagement scoring (1-5 stars) drives re-engagement decisions."
        domain: "email-marketing"
        source: "MMS-04-AoE"

  L2_MENTAL_MODELS:
    count: 68
    items:
      # ═══ SYSTEMS & BUSINESS MODELS ═══
      - id: "MM-AC-001"
        text: "Awareness → Engagement → Conversion: Three essential components interact as a system, not independently."
        domain: "systems-thinking"
        source: "MMS-02-Systems-Theory-101"

      - id: "MM-AC-002"
        text: "A-to-B Structural Tension: Current Reality (A) → Desired State (B). The gap creates the engine for progress."
        domain: "goal-setting"
        source: "MMS-01-Getting-Started"

      - id: "MM-AC-003"
        text: "Tactical Thinker vs Strategic Thinker: Tactician optimizes the ad. Strategist designs the back-end system."
        domain: "strategy"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-004"
        text: "Interruption Click vs Multi-Step Pull-Click: Fleeting attention vs built intent through multiple contextual steps."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-005"
        text: "Two Opposing Forces in SOI: Paid traffic needs fast ROI, SOI needs slow relationship building."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-006"
        text: "The Venn Diagram of Offers: Creator's interests ∩ Audience needs ∩ Clear value articulation."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "MM-AC-007"
        text: "Value Proposition Design Canvas: Jobs to Be Done × Pains × Gains mapped to Pain Relievers × Gain Creators."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "MM-AC-008"
        text: "The $300 Watch Model: People buy for emotional reasons (talisman), not functional ones."
        domain: "buyer-psychology"
        source: "MMS-03-Audience-Offer"

      - id: "MM-AC-009"
        text: "JTBD Three Dimensions: Every job has a functional, social, and emotional dimension."
        domain: "buyer-psychology"
        source: "MMS-03-Audience-Offer"

      - id: "MM-AC-010"
        text: "Dean Jackson's 85/15 Rule: Only 15-20% buy in first 90 days. 80-85% buy within 2 years."
        domain: "buyer-psychology"
        source: "MMS-01-Getting-Started"

      # ═══ EMAIL MODELS ═══
      - id: "MM-AC-011"
        text: "Email System Architecture: RBS (Relationship Building Sequence) → VNL (Value Newsletter) → SOS (Soap Opera Series) → PLS (Product Launch Series) → COS (Customer Onboarding Series)."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-012"
        text: "Pathways Model: Multiple entry points into an email system — each with its own RBS leading to VNL."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "MM-AC-013"
        text: "VNL as Heartbeat: The regular pulse of value that maintains relationship between promotional sequences."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-014"
        text: "Bridge Email: The permission-seeking email that transitions from value to promotion."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-015"
        text: "SOS (Soap Opera Series): Story-driven sequence that creates emotional investment before selling."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "MM-AC-016"
        text: "STP (Story-Powered Promotion): Weaving story through promotional content."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-017"
        text: "Engagement Scoring Model: 1-5 stars based on open/click behavior. Below 2 stars triggers re-engagement."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-018"
        text: "VIP Tier Marketing: $17/mailing to top 50 prospects creates disproportionate ROI."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      # ═══ SOI MODELS ═══
      - id: "MM-AC-019"
        text: "SOI Architecture: Presell Sites → Email World → Customer Journey. Multiple doors into one world."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-020"
        text: "Chain of Beliefs: The logical sequence of beliefs a prospect must hold before purchasing."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-021"
        text: "The Logic Chain (Todd Brown): Building logical case through belief sequencing."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-022"
        text: "Presell World Structure: Multi-page narrative sites that build context before any offer."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-023"
        text: "Character Arcs in Marketing: Prospects experience transformation through content."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-024"
        text: "Side Project Marketing: Creating valuable side projects that attract the right audience."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-025"
        text: "Funnel Visualization & Tracking: Seeing the entire SOI system as interconnected."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      # ═══ TRAFFIC MODELS ═══
      - id: "MM-AC-026"
        text: "6 Traffic Approaches: (1) Traffic→Buy, (2) Thin Squeeze→Buy, (3) Squeeze→Email→Buy, (4) Blog→Squeeze→Email→Buy, (5) Hybrid Multi-Touch, (6) SOI."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-027"
        text: "Multi-Touch Contextual Advertising: Smart advertisers touch cold prospects with multiple media types across touchpoints."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-028"
        text: "Paid Traffic + SOI Hybrid: Use paid for list building → SOS email sequences → Link to SOI presell sites."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-029"
        text: "Evergreen Content Empire: Guest posts + PS create permanent traffic assets."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "MM-AC-030"
        text: "Two-Sided Business Model of Media: Publishers need content → You provide content → They link to your SOI."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      # ═══ BUSINESS MODELS ═══
      - id: "MM-AC-031"
        text: "Front-End vs Back-End Economics: The real money is in the back-end. Front-end may break even or lose."
        domain: "economics"
        source: "MMS-06-TTE"

      - id: "MM-AC-032"
        text: "30-Day ARV Model: Large publishers set up business on 30-day average order value, 6-month LTV."
        domain: "economics"
        source: "MMS-01-Getting-Started"

      - id: "MM-AC-033"
        text: "Durable Business Flywheel: Discover → Validate → Build → Optimize → Repeat."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MM-AC-034"
        text: "Project X Model: Minimum viable experiment to validate before full build."
        domain: "durable-business"
        source: "MMS-07-TDB"

      # ═══ WRITING & MOMENTUM MODELS ═══
      - id: "MM-AC-035"
        text: "Thematic Arc as DNA: A single idea that connects ads → landing pages → emails → offers."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MM-AC-036"
        text: "Rule of Three: Controlling idea + 3 main points + 3 supporting ideas each = complete structure."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MM-AC-037"
        text: "Open Loop → Tension → Resolution: The narrative engine that pulls readers forward."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MM-AC-038"
        text: "Empathy → Authority → Plan: The order of persuasion in any piece of content."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MM-AC-039"
        text: "Beat Sheet Method: Bullet-point story structure before writing prose."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "MM-AC-040"
        text: "500-800 Word Facebook Ad: Long-form ad that attracts right prospects and repels wrong ones."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "MM-AC-041"
        text: "1200-1800 Word Landing Page: Organizing question framework with tension creation and resolution."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "MM-AC-042"
        text: "3-Email RBS over 3 Days: Building rapport without selling using micro-commitments."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      - id: "MM-AC-043"
        text: "Bridge + 3 Promotional Emails: Permission-based promotional sequence."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      # ═══ AUDIENCE MODELS ═══
      - id: "MM-AC-044"
        text: "Audience Definition by JTBD: An audience is best defined by the combination of jobs, pains, and gains that resonate most."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "MM-AC-045"
        text: "Strategic Messaging Brief: Audience Description + Top 3 Jobs + Top 3 Pains + Top 3 Gains + Pain Relievers + Gain Creators."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "MM-AC-046"
        text: "The Brewing Beer Trap: Success at something you don't actually want to do daily is worse than failure."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      # ═══ ADDITIONAL MODELS ═══
      - id: "MM-AC-047"
        text: "Custom Field State Machine: Using custom fields (not tags) in email automation for state management."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-048"
        text: "5-Step VNL Automation: Create field → New subscriber automation → RBS automation → VNL broadcast segment → COS automation."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-049"
        text: "3-Email Re-Engagement: Reactivation sequence with full email copy templates."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "MM-AC-050"
        text: "Prospect POV Exercise: Writing from the customer's perspective to understand their reality."
        domain: "audience"
        source: "MMS-09-Momentum"

      - id: "MM-AC-051"
        text: "Robin Harford RBS Case Study: 6 emails with open/click rates showing relationship building effectiveness."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "MM-AC-052"
        text: "Julie Angel SOS Case Study: Story-driven promotional sequence with measured results."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "MM-AC-053"
        text: "Khara Dating/Anna Case Study: Bridge email sequences for niche audiences."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "MM-AC-054"
        text: "Cognitive Reframing in SOI: Changing how prospects perceive problems and solutions."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-055"
        text: "Commitment & Consistency: Leveraging small commitments to build toward larger ones."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-056"
        text: "Strategy of Preeminence: Advanced positioning through supreme authority and value."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-057"
        text: "Educational Content as Trust Builder: Teaching creates authority and bonds faster than selling."
        domain: "content-marketing"
        source: "MMS-05-SOI"

      - id: "MM-AC-058"
        text: "The Flow of a Presell Site: Narrative arc from entry to engagement to next action."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-059"
        text: "Channeling Desire Through Beliefs (Rich Schefren): Aligning prospect desires with belief sequences."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "MM-AC-060"
        text: "Shawn Twing's Paid Traffic Principles: 5 foundational rules for advertising execution."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "MM-AC-061"
        text: "E-commerce vs Info Marketing Dynamics: Fundamentally different business models requiring different approaches."
        domain: "economics"
        source: "MMS-06-TTE"

      - id: "MM-AC-062"
        text: "Attribution Challenge: Multiple customer sources make attribution increasingly difficult."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "MM-AC-063"
        text: "Google & Facebook Platform Evolution: Increasingly challenging as platforms change rules."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "MM-AC-064"
        text: "Data-Driven Optimization Loops: Systematic testing and measurement for continuous improvement."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MM-AC-065"
        text: "Minimum Viable Infrastructure: Build only what's needed to validate, then expand."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MM-AC-066"
        text: "Validation Through Writing: Writing forces clarity of thought and reveals gaps."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "MM-AC-067"
        text: "5-Week Sprint Campaign: Complete journey from ad → landing page → emails → promotion."
        domain: "campaign-design"
        source: "MMS-09-Momentum"

      - id: "MM-AC-068"
        text: "Peer Review Feedback Loop: Student work reviewed live creates learning through observation."
        domain: "pedagogy"
        source: "MMS-09-Momentum"

  L3_HEURISTICS:
    count: 98
    items:
      # ═══ EMAIL HEURISTICS ═══
      - id: "HEUR-AC-001"
        text: "RBS (Relationship Building Sequence): 3-7 emails over 3-7 days, no selling, pure value and rapport."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-002"
        text: "VNL frequency: Weekly or bi-weekly. Never less than monthly or subscribers forget you."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-003"
        text: "Mute VNLs during active SOS/SPP/PLS sequences to avoid competing with yourself."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-004"
        text: "Re-engagement trigger: Below 2-star engagement in ConvertKit. Send 3-email reactivation."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-005"
        text: "Use custom fields (not tags) for email state management. Tags accumulate; fields toggle."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-006"
        text: "Bridge email before any promotional sequence. Ask permission, don't assume it."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-007"
        text: "SOS length: 5-7 story-driven emails. Each builds on the previous."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "HEUR-AC-008"
        text: "PLS (Product Launch Series): 3-5 emails with urgency escalation at the end."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "HEUR-AC-009"
        text: "COS (Customer Onboarding Series): Immediate post-purchase sequence to reduce refunds."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      - id: "HEUR-AC-010"
        text: "Email subject line: Match the energy and topic of the email. Don't clickbait."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-011"
        text: "VIP mailing: $17/mailing to top 50 prospects. Physical mail to digital audience = pattern interrupt."
        domain: "email-marketing"
        source: "MMS-04-AoE"

      - id: "HEUR-AC-012"
        text: "3 relationship-building emails over 3 days. No selling. Build rapport with micro-commitments."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-013"
        text: "Bridge + 3 promotional emails = complete promotional mini-sequence."
        domain: "email-marketing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-014"
        text: "Four strategic email decisions: what to send, when to send, to whom, and why."
        domain: "email-marketing"
        source: "MMS-08-AoE-Live"

      # ═══ AUDIENCE & OFFER HEURISTICS ═══
      - id: "HEUR-AC-015"
        text: "Identify 1-3 most important customer jobs. Not all jobs — only the critical few."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-016"
        text: "Identify 1-3 most important customer pains. Focus on what really matters."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-017"
        text: "Identify 1-3 most important customer gains. Surprise gains create delight."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-018"
        text: "One canvas per product/service/idea. Don't combine unless there's a specific reason."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-019"
        text: "Spend 2-3 hours minimum on skills/hobbies/experience list. Revisit over days or weeks."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-020"
        text: "Five Whys for each item on your interest list to find core drivers."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-021"
        text: "Use sticky notes (one idea per note). Don't convert to lists too early. Interact visually."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-022"
        text: "Strategic messaging brief: Audience + Top 3 Jobs + Top 3 Pains + Top 3 Gains + Pain Relievers + Gain Creators."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-023"
        text: "When audiences within a segment have different JTBD priorities, split into separate audiences."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-024"
        text: "Three-year future test: Imagine wild success. Would you actually want that life?"
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-025"
        text: "Jobs to Be Done 0-10 scale: Rate pain intensity, gain desirability, and urgency separately."
        domain: "buyer-psychology"
        source: "MMS-09-Momentum"

      # ═══ TRAFFIC HEURISTICS ═══
      - id: "HEUR-AC-026"
        text: "Paid traffic needs fast ROI (short cycle). SOI needs slow ROI (long cycle). Plan accordingly."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-027"
        text: "Multi-step clicks through content are exponentially more valuable than single ad clicks."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-028"
        text: "Guest posts on authority sites (Forbes, Inc, etc.) create evergreen traffic for years."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-029"
        text: "Syndicate 20 versions of one article to big sites. One article can drive 100K people into SOI."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-030"
        text: "External content should seed context before clickthrough to Presell Site."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-031"
        text: "Paid traffic + SOI hybrid: Paid for list building → SOS sequences → SOI presell sites."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-032"
        text: "Every market has its own versions of Inc. and Forbes. Find them."
        domain: "content-marketing"
        source: "MMS-05-SOI-Organic"

      - id: "HEUR-AC-033"
        text: "Banner blindness requires continuous new media assets. Organic content doesn't have this problem."
        domain: "traffic"
        source: "MMS-05-SOI-Organic"

      # ═══ WRITING HEURISTICS ═══
      - id: "HEUR-AC-034"
        text: "Facebook ad: 500-800 words. Hook + thesis statement + empathy + authority + plan."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-035"
        text: "Landing page: 1200-1800 words. Organizing question + tension + resolution."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-036"
        text: "Rule of Three: Controlling idea + 3 main points + 3 supporting ideas each."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-037"
        text: "Start with shitty first draft. Edit later. Do the push-ups."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-038"
        text: "Use beat sheets (bullet points) before writing full prose."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-039"
        text: "Open loops at the end of emails/content create pull to the next piece."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-040"
        text: "Empathy first, then authority, then the plan. Never start with authority."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-041"
        text: "Three temptations of promotional writing: too salesy, too early, too obvious. Avoid all three."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-042"
        text: "Build desire organically. Reveal offers as natural next step, not forced pitch."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-043"
        text: "Thematic arc connects all touchpoints: ad → landing page → emails → offer."
        domain: "campaign-design"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-044"
        text: "5-week sprint: one complete campaign from ad to promotion."
        domain: "campaign-design"
        source: "MMS-09-Momentum"

      # ═══ SOI HEURISTICS ═══
      - id: "HEUR-AC-045"
        text: "Presell Sites should have 50+ contextually relevant outbound links."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "HEUR-AC-046"
        text: "Chain of Beliefs must be defined before writing any SOI content."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "HEUR-AC-047"
        text: "Educational content builds trust faster than any promotional content."
        domain: "content-marketing"
        source: "MMS-05-SOI"

      - id: "HEUR-AC-048"
        text: "Presell Sites are not landing pages. They are narrative worlds."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "HEUR-AC-049"
        text: "Multiple doors into one SOI world. Each door serves a different audience segment."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      - id: "HEUR-AC-050"
        text: "Character arcs in content: prospects should experience transformation through your content."
        domain: "sphere-of-influence"
        source: "MMS-05-SOI"

      # ═══ BUSINESS HEURISTICS ═══
      - id: "HEUR-AC-051"
        text: "LTV measured on 2-year window. 30-day ARV for operational planning."
        domain: "economics"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-052"
        text: "A-to-B goal window: few weeks to max 3 months. Not longer."
        domain: "goal-setting"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-053"
        text: "Prioritize things you can fully control (write a sequence) over things you can't (revenue target)."
        domain: "goal-setting"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-054"
        text: "Validate through small experiments (Project X) before committing resources."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "HEUR-AC-055"
        text: "Discover audience needs through writing, not just research."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "HEUR-AC-056"
        text: "Build minimum viable infrastructure. Expand only what's validated."
        domain: "durable-business"
        source: "MMS-07-TDB"

      - id: "HEUR-AC-057"
        text: "Optimize entire business for happy long-term customers, not just first sale."
        domain: "durable-business"
        source: "MMS-06-TTE"

      - id: "HEUR-AC-058"
        text: "Give platforms what they want. Avoid big mistakes. Focus on what matters most."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "HEUR-AC-059"
        text: "Know exactly what you're doing and measure it. No guessing."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      - id: "HEUR-AC-060"
        text: "Multiple customer sources needed. Don't rely on one channel."
        domain: "paid-traffic"
        source: "MMS-06-TTE"

      # ═══ ADDITIONAL HEURISTICS (61-98) ═══
      - id: "HEUR-AC-061"
        text: "Don't feel bad about not knowing CAC/LTV calculations. 95% of marketers can't do them either."
        domain: "economics"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-062"
        text: "Financial goals are okay, but A-to-B should focus on things you can control."
        domain: "goal-setting"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-063"
        text: "One client for 21 years = the power of relationship-based business."
        domain: "relationship-marketing"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-064"
        text: "Sending dreaded 'last chance' emails damages long-term relationships."
        domain: "email-marketing"
        source: "MMS-01-Getting-Started"

      - id: "HEUR-AC-065"
        text: "Analog (pencil/paper) exercises often produce better results than digital for brainstorming."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-066"
        text: "Consume content 2-3 times before starting exercises. Depth over speed."
        domain: "pedagogy"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-067"
        text: "After completing VPDC, take the few sticky notes that matter most off the canvas. Those are your strategy."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-068"
        text: "Convert VPDC insights to a digital messaging brief. Refer to it when writing all assets."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-069"
        text: "Verify assumptions: Ask for feedback or measure results. Great results = right track."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-070"
        text: "Repeat VPDC for each new audience. Different audiences need different value propositions."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-071"
        text: "Make three lists: Skills, Hobbies/Interests, Experience (professional and personal)."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-072"
        text: "Cross out anything that doesn't really excite you from the list."
        domain: "business-design"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-073"
        text: "Think about your answers from the perspective of your ideal audience, not your own."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-074"
        text: "Don't worry about the mechanism for delivering value. Stay focused on the value itself."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-075"
        text: "Imagine a conversation with your ideal prospect. Who are they? What do they need?"
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-076"
        text: "What questions don't they ask that they should ask? That's where deep value lives."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-077"
        text: "Consider social and emotional pain relievers, not just functional ones."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-078"
        text: "Teaching dance at home relieves social embarrassment AND the pain of group learning."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-079"
        text: "Download Strategyzer VPDC trigger questions as prompts for each canvas section."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-080"
        text: "ROI-specific reporting serves functional, emotional, AND social needs for agency clients."
        domain: "offers"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-081"
        text: "One audience may split into 3 when JTBD analysis reveals different priorities."
        domain: "audience"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-082"
        text: "Prospect POV writing exercise: Write as if you ARE the customer to understand their reality."
        domain: "audience"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-083"
        text: "Theme ideas for thematic arcs: literary themes, expert/insider view, counterintuitive thinking."
        domain: "writing"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-084"
        text: "Hook + thesis statement: The first sentence and the core argument of any piece of content."
        domain: "copywriting"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-085"
        text: "Create micro-commitments: Small yeses that build toward larger engagement."
        domain: "sales-psychology"
        source: "MMS-09-Momentum"

      - id: "HEUR-AC-086"
        text: "Screenshot the VPDC canvas and work with it by hand for deeper thinking."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-087"
        text: "The Suunto Watch: $300 for a watch you can't read. The value was the emotional connection to a movie."
        domain: "buyer-psychology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-088"
        text: "Color code your top 1-3 items in each VPDC quadrant for quick reference."
        domain: "methodology"
        source: "MMS-03-Audience-Offer"

      - id: "HEUR-AC-089"
        text: "Think beyond obvious functional benefits. Social and emotional components often drive purchases."

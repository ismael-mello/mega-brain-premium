  L4_FRAMEWORKS:
    count: 78
    items:
      # ═══ CORE FRAMEWORKS ═══
      - id: "FW-AC-001"
        text: "Sphere of Influence (SOI) Framework: Presell Sites + Email Sequences + Content create an interconnected world that attracts, bonds, and converts."

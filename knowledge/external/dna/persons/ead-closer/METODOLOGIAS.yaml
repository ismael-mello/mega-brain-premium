itens:
  - id: "EDC-MET-001"
    titulo: "Metodologia Completa de Fechamento em Call"
    descricao: >
      Playbook passo-a-passo para fechar na call: STEP 1: Apresentar valor
      de tabela com confianca e fazer SILENCIO STEP 2: Sustentar valor
      (cases, ROI, depoimentos) - nao baixar preco STEP 3: Perguntar
      compromisso de orcamento: "Se caber, fecha hoje?" STEP 4: Revelar
      valor protagonista + narrativa CAF STEP 5: Dupla confirmacao: "So pra
      confirmar, o valor e X, o formato e Y" STEP 6: "Anunciar a venda":
      "Parabens, voce esta entrando para [programa]" STEP 7: Enviar link/pix
      e aguardar comprovante SEM sair da call STEP 8: Se resistencia, usar
      cartas na manga (bonus, parcelas, downsell) STEP 9: Se forte
      resistencia, "tirar da mesa" (simular fim da negociacao) STEP 10:
      Ultimo recurso: sinal de compromisso (min R$1000, reembolsavel) REGRA:
      Nunca fechar no protagonista se cliente ja disse sim no tabela. REGRA:
      "Argumenta, melhora e fecha" - o combo de 3 acoes.
    peso: 0.80
    citacao: "Argumenta, melhora e fecha. Nunca fechar no protagonista se o cliente ja disse sim no tabela."
    fonte: "[EDC-0048] + [EDC-0049] + [EDC-0019]"

  - id: "EDC-MET-002"
    titulo: "Metodologia SPIN Selling Completa (BR)"
    descricao: >
      Playbook detalhado do SPIN adaptado: PREPARACAO: Ter mind map pronto.
      Abrir CRM. Preparar perguntas por nicho. TRANSICAO: Sair do warm-up
      suavemente: "Agora que nos conhecemos melhor..." S - SITUACAO (3-5
      perguntas): "Qual seu faturamento atual?" "Quantos funcionarios?"
      "Como funciona seu processo de vendas hoje?" "Ja tentou algo para
      melhorar?" P - PROBLEMA (3-5 perguntas): "Qual sua maior dificuldade
      hoje?" "O que te impede de crescer?" "Onde voce sente que perde mais
      dinheiro?" I - IMPLICACAO (2-3 perguntas - AMPLIFICAR DOR): "Se
      continuar assim por mais 1 ano, o que acontece?" "Quanto dinheiro ja
      perdeu com isso?" "Como isso afeta sua familia/saude?" N - NECESSIDADE
      (2-3 perguntas - CLIENTE VERBALIZA): "Se tivesse uma solucao, como
      seria o ideal?" "De 0 a 10, quanto quer resolver isso?" "O que mudaria
      na sua vida se resolvesse?" REGRA: Nao corrigir o cliente durante
      SPIN. So ouvir e anotar. REGRA: "Quanto mais a pessoa fala, mais ela
      compra."
    peso: 0.80
    citacao: "Situacao, Problema, Implicacao, Necessidade. Quanto mais a pessoa fala, mais ela compra."
    fonte: "[EDC-0005] + [EDC-0029] + [EDC-0087]"

  - id: "EDC-MET-003"
    titulo: "Metodologia de Onboarding do Vendedor Novo (8 Semanas)"
    descricao: >
      Playbook de 8 semanas para novos vendedores: SEMANA 1 - ONBOARD:
      Cultura, organizacao, empresa, produto. O basico. SEMANA 2 -
      TREINAMENTO TECNICO: Formulacao, produto, especificacoes. SEMANA 3 -
      TREINAMENTO COMPORTAMENTAL: Mindset, inteligencia emocional, habitos.
      SEMANA 4 - TREINAMENTO DE CAMPO: Levar para assistir vendas ao vivo.
      Shadowing. SEMANA 5 - LABORATORIO DE VENDAS: Simular cenarios. "O que
      faria se...?" SEMANAS 6-8 - AJUSTES: Ajuste tecnico + comportamental +
      campo. POS 8 SEMANAS - TREINAMENTO MENSAL: Desenvolvimento,
      planejamento, especializacao. REGRA: Vendedor ja vende desde semana 1
      (paralelo ao treinamento). REGRA: Em 1 mes, decidir se fica ou sai.
    peso: 0.80
    citacao: "Primeira semana onboard, segunda tecnico, terceira comportamental, quarta campo, quinta laboratorio, sexta a oitava ajustes."
    fonte: "[EDC-0073] Curso 16 Aula 6 - Vendedor Novo.txt"

  - id: "EDC-MET-004"
    titulo: "Metodologia PTMA (Ciclo de Gestao)"
    descricao: >
      Ciclo de gestao de equipe de vendas: P - PLANEJAR: Definir metas,
      KPIs, estrategia, alocacao de recursos T - TREINAR: 87% comportamental
      + 13% tecnico. Treino diario. M/A - MOTIVAR + ACOMPANHAR: Reconhecer,
      celebrar, monitorar metricas diarias C/F - COBRAR + FEEDBACK: Cobrar
      resultados com dados, dar feedback construtivo CICLO: P -> T -> M/A ->
      C/F -> volta ao P (continuo, nao linear) REGRA: Nao pular etapas.
      Treinar sem cobrar e omissao. Cobrar sem treinar e injustica.
    peso: 0.80
    citacao: "Planejar, Treinar, Motivar+Acompanhar, Cobrar+Feedback. Ciclo continuo."
    fonte: "[EDC-0072] PTMA.txt"

  - id: "EDC-MET-005"
    titulo: "Metodologia de Contorno de Objecao (Detalhada)"
    descricao: >
      Playbook detalhado para cada tipo de objecao: OBJECAO "PRECISO
      PENSAR": 1. Despressurizar: "Entendo perfeitamente, e uma decisao
      importante" 2. Isolar: "Me ajuda a entender, pensar sobre o que
      exatamente?" 3. Se preco: Ir para cartas na manga (parcelamento,
      downsell) 4. Se credibilidade: Voltar a cases e provas sociais 5.
      Pedir pela venda: "Com essa nova informacao, faz sentido seguir?"
      OBJECAO "NAO TENHO DINHEIRO": 1. Despressurizar: "Entendo, ninguem
      quer se comprometer sem ter certeza" 2. Isolar: "Se o valor nao fosse
      um problema, voce fecharia agora?" 3. Se SIM: Parcelamento, sinal de
      compromisso, cartao 4. Se NAO: Voltar para credibilidade (a objecao
      real nao era dinheiro) 5. Ultimo recurso: Downsell ou sinal
      reembolsavel OBJECAO "PRECISO FALAR COM SOCIO/ESPOSA": 1.
      Despressurizar: "Claro, decisao em conjunto e muito madura" 2. Isolar:
      "Se dependesse so de voce, fecharia?" 3. Se SIM: Agendar 2a call com
      decisor + PIX de honra 4. Se NAO: Tratar como credibilidade (usou
      socio como desculpa) REGRA: Multiplos "nao" sao normais. Persistir sem
      insistir. REGRA: "Nao" pode significar "nao agora" ou "nao entendi".
    peso: 0.80
    citacao: "Despressurizar, isolar, lidar, pedir pela venda. Persistir sem insistir."
    fonte: "[EDC-0055] + [EDC-0036] + [EDC-0088]"

  - id: "EDC-MET-006"
    titulo: "Metodologia de Rapport FORM + Mirror"
    descricao: >
      Playbook completo de rapport combinando FORM e espelhamento: STEP 1:
      ABERTURA - Cumprimento caloroso, sorriso, postura aberta STEP 2: FORM
      - Familia, Ocupacao, Recriacao, Motivacao (2-3 perguntas) STEP 3:
      PONTO COMUM - Identificar e verbalizar semelhanca STEP 4: APRECIACAO
      SINCERA - Elogiar algo genuino sobre o cliente STEP 5: MIRROR -
      Espelhar tom, ritmo, volume, postura, respiracao STEP 6: MARKETING
      PESSOAL - Breve credencial do closer (30 segundos) STEP 7: 3 INTENCOES
      - "Nao estou aqui pra vender, estou pra contribuir" STEP 8: TRANSICAO
      - "Agora que nos conhecemos, quero entender melhor sua situacao"
      TIMING: Maximo 5-8 minutos. Se cliente for direto, ir rapido. REGRA:
      Se cliente monossilabico, buscar "fio para puxar" e ir no tempo dele.
    peso: 0.80
    citacao: "FORM para conexao. Mirror para espelhamento. 3 intencoes para abertura."
    fonte: "[EDC-0003] + [EDC-0040] + [EDC-0086]"

  - id: "EDC-MET-007"
    titulo: "Metodologia de Pegando o Pagamento"
    descricao: >
      Playbook para o momento critico de receber o pagamento em call: STEP
      1: DUPLA CONFIRMACAO - Repetir valor, formato e condicoes STEP 2:
      ANUNCIAR A VENDA - "Parabens! Voce esta entrando para [programa]" STEP
      3: ENVIAR LINK - Compartilhar link de pagamento no chat da call STEP
      4: MICROACOES - "Recebeu o link? Abriu? Esta certinho?" STEP 5:
      AGUARDAR - Permanecer na call enquanto cliente preenche/paga STEP 6:
      CONFIRMAR COMPROVANTE - "Me envia o comprovante aqui" STEP 7: SE
      TRAVAR - "Se der algum erro, me avisa que eu resolvo aqui" STEP 8:
      POS-PAGAMENTO - Onboarding imediato, grupo, proximos passos REGRA:
      NUNCA sair da call antes do comprovante. REGRA: Postura relaxada, voz
      calma. Naturalidade e fundamental.
    peso: 0.80
    citacao: "Nunca sair da call antes do comprovante. Postura relaxada, voz calma."
    fonte: "[EDC-0019] PEGANDO O PAGAMENTO.txt"

  - id: "EDC-MET-008"
    titulo: "Metodologia 'Tirar da Mesa'"
    descricao: >
      Playbook da tecnica de simular fim da negociacao: STEP 1: DIAGNOSTICO
      - Cliente resistente apos todas as tentativas STEP 2: RECOLHER -
      "Entendo, nao vou te pressionar. Fico feliz que conheceu" STEP 3:
      DESPRESSURIZAR - Mudar tom, ficar leve, como se a venda ja acabou STEP
      4: CONVERSA CASUAL - Perguntar algo pessoal, leve (fora da venda) STEP
      5: REINTRODUZIR - "Antes de irmos, so uma ultima coisa que esqueci de
      mencionar..." STEP 6: NOVA OFERTA - Apresentar angulo diferente,
      bonus, ou condicao nova STEP 7: FECHAR - Com a guarda do cliente
      baixa, o fechamento flui melhor REGRA: So usar depois de esgotar todas
      as outras tentativas. REGRA: A transicao deve ser natural, nao
      teatral.
    peso: 0.80
    citacao: "Tirar da mesa. Simular o fim da negociacao para baixar a guarda do cliente."
    fonte: "[EDC-0048] Curso 21 Aula 2.txt"

  - id: "EDC-MET-009"
    titulo: "Metodologia de Desqualificacao"
    descricao: >
      Playbook para quando o lead nao e qualificado para o produto
      principal: STEP 1: IDENTIFICAR - Cliente claramente nao tem
      orcamento/perfil STEP 2: MOSTRAR PRECO - Revelar o valor sabendo que
      vai "desqualificar" STEP 3: REACAO - Cliente confirma que nao pode
      STEP 4: DOWNSELL - "Tenho uma opcao menor que pode fazer sentido para
      voce" STEP 5: ALTERNATIVA - Apresentar produto de entrada com ticket
      menor STEP 6: FECHAR OU LIBERAR - Se nem downsell funcionar, encerrar
      com elegancia REGRA: Desqualificacao e um processo, nao um momento.
      REGRA: Nao insistir em produto que o cliente nao pode pagar.
    peso: 0.80
    citacao: "Desqualificacao e um processo. Mostrar preco para desqualificar."
    fonte: "[EDC-0057] Curso 21 Mod 2 Aula 6.txt"

  - id: "EDC-MET-010"
    titulo: "Metodologia de Upsell (Pos-Fechamento)"
    descricao: >
      Playbook de upsell apos primeira compra: STEP 1: FECHAR VENDA
      PRINCIPAL - Completar todo o processo de fechamento STEP 2: CELEBRAR -
      Parabenizar, reforcar a decisao STEP 3: SEPARAR - O upsell NUNCA e
      apresentado junto com venda principal STEP 4: MOMENTO CERTO - Apos
      onboarding ou primeira entrega de valor STEP 5: APRESENTAR - "Agora
      que voce ja esta [resultado], tenho algo que pode potencializar" STEP
      6: FECHAR UPSELL - Processo simplificado (cliente ja confia) REGRA:
      NUNCA oferecer upsell junto da venda principal (paradoxo de escolha).
      REGRA: Cliente deve ter recebido valor antes do upsell.
    peso: 0.80
    citacao: "O upsell nunca e apresentado junto com a venda principal. Paradoxo de escolha."
    fonte: "[EDC-0044] Upsell.txt"


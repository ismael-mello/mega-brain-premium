versao: "1.0.0"
pessoa: "EAD Closer"
camada: "MODELOS-MENTAIS"
total_itens: 14

itens:
  - id: "EDC-MM-001"
    titulo: "GAP: Ponto A (Inferno) vs Ponto B (Ilha Sagrada)"
    descricao: >
      Modelo mental central do SPIN Selling adaptado. O cliente esta no Ponto A
      (situacao atual, o 'inferno') e precisa ir para o Ponto B (situacao
      desejada, a 'ilha sagrada'). O closer deve amplificar a dor do Ponto A
      e tornar o Ponto B vividamente desejavel, criando um GAP que so o
      produto/servico pode preencher.
    peso: 0.95
    citacao: "O GAP e o Ponto A, que e o inferno, ate o Ponto B, que e a ilha sagrada."
    aplicacao: "Usar durante SPIN Selling para construir contraste entre situacao atual e desejada."
    fonte: "[EDC-0054] Curso 21 Mod 2 Aula 3.txt"

  - id: "EDC-MM-002"
    titulo: "Sapo na Agua Fervendo"
    descricao: >
      Analogia para clientes que nao percebem a gravidade da propria situacao.
      Assim como o sapo que nao percebe a agua esquentando gradualmente, o
      cliente se acostumou com a dor e nao enxerga a urgencia de mudar. O
      closer deve fazer o cliente perceber que a 'agua esta fervendo'.
    peso: 0.85
    citacao: "O sapo na agua fervendo. Ele nao percebe que a agua esta esquentando."
    aplicacao: "Usar perguntas de implicacao para despertar consciencia da urgencia."
    fonte: "[EDC-0054] Curso 21 Mod 2 Aula 3.txt"

  - id: "EDC-MM-003"
    titulo: "Certeza Emocional vs Certeza Cognitiva"
    descricao: >
      Existem dois tipos de certeza na venda. Certeza cognitiva (racional,
      'faz sentido') e certeza emocional ('eu sinto que e certo'). A venda
      de alta performance trabalha ambas, mas a certeza emocional e o gatilho
      final da decisao de compra.
    peso: 0.90
    citacao: "Certeza emocional versus certeza cognitiva. A decisao final e emocional."
    aplicacao: "Construir ambas as certezas durante a venda, priorizando a emocional no fechamento."
    fonte: "[EDC-0023] PRE-PITCH.txt"

  - id: "EDC-MM-004"
    titulo: "Faturamento Por Reuniao (Nao Apenas Conversao %)"
    descricao: >
      Metrica mental que muda o paradigma de avaliacao de closers. Em vez de
      medir apenas taxa de conversao, medir o faturamento medio por reuniao.
      Um closer pode ter conversao de 20% mas gerar 25k por reuniao, o que
      e mais valioso que 40% de conversao com ticket baixo.
    peso: 0.85
    citacao: "Faturamento por reuniao, nao apenas conversao. Full Sales atingindo 22k a 26k por apresentacao."
    aplicacao: "Avaliar closers por faturamento/reuniao, nao apenas por taxa de conversao."
    fonte: "[EDC-0054] Curso 21 Mod 2 Aula 3.txt"

  - id: "EDC-MM-005"
    titulo: "3 Categorias de Objecao"
    descricao: >
      Todo tipo de objecao se encaixa em 3 categorias: (1) Credibilidade/
      Incerteza - o cliente nao confia ou tem duvida, (2) Financeira - o
      cliente alega nao ter dinheiro, (3) Socio/Esposa - precisa consultar
      outra pessoa. A regra fundamental e sempre tratar primeiro como
      credibilidade, pois e a mais comum e a mais disfarcada.
    peso: 0.90
    citacao: "3 categorias: credibilidade/incerteza, financeira, socio/esposa. Sempre trate primeiro como credibilidade."
    aplicacao: "Ao receber objecao, assumir credibilidade como causa raiz antes de aceitar a superficial."
    fonte: "[EDC-0055] Curso 21 Mod 2 Aula 7.txt"

  - id: "EDC-MM-006"
    titulo: "Contornar, Nao Quebrar Objecoes"
    descricao: >
      Modelo mental sobre como lidar com objecoes. O verbo correto e
      'contornar' (ir ao redor, respeitar, redirecionar), nao 'quebrar'
      (confrontar, destruir, forcar). Quebrar objecoes gera resistencia.
      Contornar gera concordancia.
    peso: 0.90
    citacao: "Contornar, nao quebrar. Contornar e ir ao redor, respeitar, redirecionar."
    aplicacao: "Nunca confrontar objecao diretamente. Sempre redirecionar com respeito."
    fonte: "[EDC-0055] Curso 21 Mod 2 Aula 7.txt"

  - id: "EDC-MM-007"
    titulo: "Mindset Presuntivo"
    descricao: >
      O closer entra na call pressupondo que a venda vai acontecer. Nao e
      arrogancia, e autosugestao positiva. A presuncao de venda transmite
      confianca e seguranca ao cliente, que sente que esta no lugar certo.
    peso: 0.85
    citacao: "Mindset presuntivo. Voce entra na call pressupondo que a venda vai acontecer."
    aplicacao: "Preparacao mental antes de cada call com autosugestao positiva de fechamento."
    fonte: "[EDC-0054] Curso 21 Mod 2 Aula 3.txt"

  - id: "EDC-MM-008"
    titulo: "Honda: Vender Emocao Antes de Especificacao"
    descricao: >
      Analogia da venda de carros Honda. O vendedor nao fala de motor e
      especificacoes. Ele faz voce sentar no carro, sentir o cheiro, imaginar
      dirigindo. Primeiro a emocao (test drive), depois a especificacao.
      Aplicado a vendas high-ticket: primeiro o metodo/transformacao, depois
      o produto/features.
    peso: 0.80
    citacao: "Honda nao vende especificacao, vende emocao. Primeiro faz voce sentar no carro."
    aplicacao: "Na apresentacao, criar experiencia emocional antes de mostrar features."
    fonte: "[EDC-0054] Curso 21 Mod 2 Aula 3.txt"

  - id: "EDC-MM-009"
    titulo: "Pontos de Precedencia"
    descricao: >
      Para closers novos que nao tem track record proprio, usar 'pontos de
      precedencia' - conquistas, associacoes, experiencias anteriores que
      geram credibilidade. Ex: 'trabalhei com empresa X', 'ja atendi N
      clientes no setor Y'. Emprestar credibilidade de experiencias passadas.
    peso: 0.80
    citacao: "Pontos de precedencia. Conquistas e associacoes anteriores que geram credibilidade."
    aplicacao: "Closers novos devem mapear suas experiencias previas como pontos de credibilidade."
    fonte: "[EDC-0059] Curso 21 Mod 2 Aula 8.txt"

  - id: "EDC-MM-010"
    titulo: "Transferencia de Autoridade"
    descricao: >
      Tecnica de emprestar credibilidade de uma marca, pessoa ou instituicao
      conhecida para gerar confianca. Ex: 'a empresa que atende a Ambev' ou
      'o metodo usado pelo Flavio Augusto'. A autoridade e transferida por
      associacao.
    peso: 0.80
    citacao: "Transferencia de autoridade. A autoridade e transferida por associacao."
    aplicacao: "Associar produto/empresa a marcas e pessoas conhecidas pelo cliente."
    fonte: "[EDC-0059] Curso 21 Mod 2 Aula 8.txt"

  - id: "EDC-MM-011"
    titulo: "Perfil DISC do Vendedor (4 Tipos)"
    descricao: >
      Quatro perfis de vendedores baseados em DISC: (1) Executor/Dominante -
      direto, resultados, (2) Influente - comunicativo, entusiasmado,
      (3) Estavel - calmo, consistente, (4) Sistematico - analitico, detalhista.
      Cada perfil requer abordagem de treinamento diferente.
    peso: 0.75
    citacao: "Executor, Influente, Estavel, Sistematico. Cada perfil requer treinamento diferente."
    aplicacao: "Identificar perfil DISC do vendedor para personalizar treinamento e gestao."
    fonte: "[EDC-0070] Tipos de Vendedores.txt"

  - id: "EDC-MM-012"
    titulo: "Ganha-Ganha-Ganha"
    descricao: >
      Em negociacao, nao basta ganha-ganha (closer + cliente). Deve ser
      ganha-ganha-ganha: o cliente ganha (solucao), o closer ganha (comissao),
      e a empresa ganha (receita). Se algum dos tres perde, a negociacao esta
      errada.
    peso: 0.85
    citacao: "Ganha-ganha-ganha: cliente ganha, closer ganha, empresa ganha."
    aplicacao: "Toda negociacao deve equilibrar os 3 lados. Nunca sacrificar margem da empresa nem comissao do closer."
    fonte: "[EDC-0043] Negocie como Closer Aguia.txt"

  - id: "EDC-MM-013"
    titulo: "Personal Trainer: Overdelivery e Retencao"
    descricao: >
      Analogia do personal trainer para vendas. Assim como o personal que
      entrega mais do que o esperado e mantem o aluno engajado, o closer e
      a empresa devem fazer overdelivery e manter acompanhamento constante
      para reter clientes e gerar indicacoes.
    peso: 0.75
    citacao: "Personal trainer: overdelivery e retencao. Entregar mais do que o esperado."
    aplicacao: "Pos-venda com acompanhamento ativo e entrega acima da expectativa."
    fonte: "[EDC-0059] Curso 21 Mod 2 Aula 8.txt"

  - id: "EDC-MM-014"
    titulo: "Mercado Mudou de 80/20 para 20/80"
    descricao: >
      Antes o mercado era 80% presencial e 20% digital. Agora inverteu para
      20% presencial e 80% digital. A equipe de vendas deve ser adaptada:
      SDR (qualifica), Closer (fecha online), CS (retencao), Social Selling
      (conteudo).
    peso: 0.80
    citacao: "O mercado mudou de 80/20 para 20/80. 80% digital agora."
    aplicacao: "Estruturar equipe para vendas digitais: SDR + Closer + CS + Social Selling."
    fonte: "[EDC-0020] Como Vender Ingressos.txt"

  L5_METHODOLOGIES:
    - id: "MET-VG-001"
      title: "Complete Storytelling Method"
      content: "Step 1 INCIDENT: Set who/where/what/when → Add VAKS (visual, auditory, kinesthetic, smell) → Bring characters alive with body language + dialogue. Step 2 TRANSFORMATION: What changed? What was the turning point? Step 3 LIFE LESSON: Bridge to audience with 'And the reason I tell this story is...' → Connect to their world. RULES: Don't over-describe incident. Keep tight. Relive, don't report."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Formula+Linking+Tips"

    - id: "MET-VG-002"
      title: "Vocal Archetype Cycling Method"
      content: "Step 1: Identify your DEFAULT archetype (record and review). Step 2: Practice each of the 4 archetypes in isolation. Step 3: Learn the 4MAT sequence (Friend→Motivator→Educator→Coach→Friend). Step 4: Cycle with PURPOSE — each archetype serves a function. Step 5: Daily practice — vary archetypes in every conversation."
      domain: vocal-archetypes
      source: "SA/03-Module3"

    - id: "MET-VG-003"
      title: "Self-Awareness Building Method"
      content: "Step 1: Record yourself speaking (video preferred). Step 2: Review and identify defaults (rate, volume, pitch, archetype, gestures). Step 3: Rate yourself 1-10 on each foundation. Step 4: Set improvement targets. Step 5: Practice with neutral ears (strangers). Step 6: Prime family/colleagues. Step 7: Integrate into daily conversations. Step 8: Re-record and compare monthly."
      domain: self-awareness
      source: "SA/02-Module2/Self-Awareness+01-Module1/Universal-Laws"

    - id: "MET-VG-004"
      title: "Rate of Speech Mastery Method"
      content: "Step 1: Record yourself — identify your default rate. Step 2: Practice intentionally slow passages. Step 3: Practice intentionally fast passages. Step 4: Practice varying in same paragraph (slow for key points, fast for transitions). Step 5: Use verbal highlighting rule (slow = important). Step 6: Test with neutral ears."
      domain: vocal-mastery
      source: "SA/02-Module2/Rate-of-Speech"

    - id: "MET-VG-005"
      title: "Volume Calibration Method"
      content: "Step 1: Record yourself — identify your default volume. Step 2: Practice 1-10 scale (whisper to shout). Step 3: Set presentation default at 7/10. Step 4: Practice dropping to 2-3 for dramatic effect. Step 5: Practice jumping to 8-9 for enthusiasm. Step 6: Golden Rule — deliver key sentence at elevated volume + lower pitch + pause."
      domain: vocal-mastery
      source: "SA/02-Module2/Volume"

    - id: "MET-VG-006"
      title: "Pitch and Melody Method"
      content: "Step 1: Record — identify if monotone or melodic. Step 2: Practice Siren (low to high to low). Step 3: Practice reading sentences with EXAGGERATED melody. Step 4: Read children's books aloud (forces extreme variation). Step 5: Apply to real conversations. Step 6: Use melody to signal emotion — more melody = more warmth."
      domain: vocal-mastery
      source: "SA/02-Module2/Melody"

    - id: "MET-VG-007"
      title: "Facial Expression Training Method"
      content: "Step 1: Learn the 7 foundations (Happy, Sad, Angry, Fearful, Surprised, Disgusted, Contemptuous). Step 2: Practice each in mirror. Step 3: Take selfie of each — verify recognition. Step 4: Practice combining (excited = happy + surprised). Step 5: Remember: face = remote control for voice. Step 6: Before important moments, 'warm up' face with exaggerated expressions."
      domain: body-language
      source: "SA/05-Module5/Facial-Expressions"

    - id: "MET-VG-008"
      title: "Hand Gesture Mastery Method"
      content: "Step 1: Learn 5 Satir categories (Placator, Leveler, Blamer, Computer, Distractor). Step 2: Practice each in mirror. Step 3: Match gestures to context (Placator for openness, Leveler for authority, etc.). Step 4: Stay in Power Sphere (belly to eyes). Step 5: Record yourself presenting — check for pocket/arm habits. Step 6: Replace pockets with Placator default. Step 7: Practice daily until natural."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "MET-VG-009"
      title: "Body Language Integration Method"
      content: "Step 1: Fix POSTURE first (shoulders back, head aligned, door frame anchor). Step 2: Add hand gestures (Satir categories in Power Sphere). Step 3: Add facial expressions (practice 7 foundations, selfie test). Step 4: Add eye contact (3-5 second holds). Step 5: Add purposeful movement (walk TO audience, not pace AWAY). Step 6: Record full presentation with all 5 elements. Step 7: Review and refine."
      domain: body-language
      source: "SA/05-Module5"

    - id: "MET-VG-010"
      title: "Presentation Sequencing Method"
      content: "Step 1: Open with FRIEND archetype (connect, rapport, warmth). Step 2: Move to MOTIVATOR (WHY this matters to them — make them thirsty). Step 3: Deliver content in EDUCATOR (WHAT — the information). Step 4: Push to action in COACH (HOW — direct them). Step 5: Close with FRIEND (reconnect, warmth, call to community). Throughout: Weave stories using 4 Chemical Framework. Use VAKS. Relive, don't report."
      domain: presentation-skills
      source: "SA/03-Module3/Enhanced+04-Module4"


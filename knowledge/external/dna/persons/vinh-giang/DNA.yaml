  L2_MENTAL_MODELS:
    # ── Stage Academy (MM-VG-001 to MM-VG-018) ────────────────────────────────
    - id: "MM-VG-001"
      title: "88 Keys Piano Model"
      content: "Voice as piano with full range of 88 keys. Familiar keys = comfort zone. Unfamiliar keys = growth zone. Using all keys = authentic expression, not fakeness."
      domain: vocal-mastery
      source: "SA/01-Module1/Universal-Laws"

    - id: "MM-VG-002"
      title: "Visual → Assumptions → Vocal → Beliefs"
      content: "People see you from afar (visual image) and form ASSUMPTIONS. When you speak (vocal image), assumptions convert into BELIEFS about your competence, authority, confidence."
      domain: communication-skills
      source: "SA/01-Module1/Visual-Vocal-Image"

    - id: "MM-VG-003"
      title: "Illusion of Complexity Model"
      content: "Magic trick metaphor: what looks incredibly complex is actually 5 cards repeated. Communication is the same — looks hard but it's 5 simple foundations mastered."
      domain: communication-skills
      source: "SA/02-Module2/The-Reveal"

    - id: "MM-VG-004"
      title: "Communication Fitness Model"
      content: "Like athletic fitness, communication fitness builds over time. Can't run a marathon on day one. Need stamina building through daily practice."
      domain: self-awareness
      source: "SA/01-Module1/Universal-Laws"

    - id: "MM-VG-005"
      title: "Neutral Ears Model"
      content: "Practice new vocal skills with strangers (neutral ears) before family (biased ears). Family reacts negatively because changed voice = perceived personality change."
      domain: self-awareness
      source: "SA/01-Module1/Universal-Laws"

    - id: "MM-VG-006"
      title: "Verbal Highlighting Model"
      content: "Speed = priority indicator. Slow = this is important (verbal highlight). Fast = transitional content. Variation = holding attention."
      domain: vocal-mastery
      source: "SA/02-Module2/Rate-of-Speech"

    - id: "MM-VG-007"
      title: "Brain Prediction = Disengagement"
      content: "When the brain can predict your rate, volume, pitch, archetype — it switches off. Unpredictability = attention. Monotony = disengagement."
      domain: audience-engagement
      source: "SA/02-Module2/Rate-of-Speech"

    - id: "MM-VG-008"
      title: "Default Trap Model"
      content: "Every communicator has a default archetype/rate/volume they get stuck in. Identifying and escaping your default is the key breakthrough."
      domain: vocal-archetypes
      source: "SA/03-Module3/Motivator"

    - id: "MM-VG-009"
      title: "4 Chemical Storytelling Model"
      content: "Stories trigger 4 neurochemicals: Dopamine (curiosity/suspense), Oxytocin (vulnerability/empathy), Endorphins (humor/relief), Cortisol (tension/urgency)."
      domain: storytelling
      source: "SA/04-Module4/Dopamine+Oxytocin+Endorphins+Cortisol"

    - id: "MM-VG-010"
      title: "Body-Voice Interconnection"
      content: "Body moves voice and voice moves body. Leveler gesture = more authority in voice. Coach archetype + finger out = more commanding presence. They're inseparable."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "MM-VG-011"
      title: "Power Sphere Model"
      content: "Hand gestures are most effective between belly button and eyes (the Power Sphere). Below = weak. Above = bizarre. Within = powerful. From Mark Bowden."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "MM-VG-012"
      title: "Satir Categories Model"
      content: "Virginia Satir's 5 foundational hand gestures: Placator (palms up, inviting), Leveler (palms down, authority), Blamer (pointing, emphasis), Computer (chin, processing), Distractor (pattern break)."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "MM-VG-013"
      title: "4MAT Sequencing Model"
      content: "Bernice McCarthy's 4MAT adapted for archetypes: WHY (Motivator) → WHAT (Educator) → HOW (Coach) → CONNECT (Friend). Start AND end with connection."
      domain: audience-engagement
      source: "SA/03-Module3/Enhanced"

    - id: "MM-VG-014"
      title: "Remote Control Face Model"
      content: "Your face is the remote control that injects emotion into words. Without it, words are flat. Same words + different face = completely different meaning."
      domain: body-language
      source: "SA/05-Module5/Facial-Expressions"

    - id: "MM-VG-015"
      title: "Priming Model"
      content: "Before practicing new vocal techniques around familiar people, 'prime' them: 'I'm on a journey to improve communication, support me.' This prevents negative reactions to change."
      domain: self-awareness
      source: "SA/01-Module1/Universal-Laws"

    - id: "MM-VG-016"
      title: "Staccato vs Legato Voice Model"
      content: "Legato (words linking together) = Motivator energy, inspiring. Staccato (punchy, separated words) = Coach energy, directive. Musical concept applied to speech."
      domain: vocal-mastery
      source: "SA/03-Module3/Motivator+Coach"

    - id: "MM-VG-017"
      title: "Content Shield Model"
      content: "Nervous speakers use content as a shield — jumping straight to WHAT because it feels safe. But audience hasn't been given WHY, so they don't care about the WHAT."
      domain: presentation-skills
      source: "SA/03-Module3/Enhanced"

    - id: "MM-VG-018"
      title: "Vocal Coach Pipeline"
      content: "Voice production follows a pipeline: Respiration (breath/fuel) → Phonation (vocal cord vibration) → Resonation (amplification in chest/head) → Articulation (clarity/diction)."
      domain: vocal-coaching
      source: "SA/06-Module6/Respiration+Phonation+Resonation+Articulation"

    # ── YouTube (MM-VG-019 to MM-VG-055) ──────────────────────────────────────
    - id: "MM-VG-019"
      title: "Visual-Vocal Image Conversion"
      content: "Visual Image → Assumptions → Vocal Image → Beliefs: People see you (visual) and form assumptions. When you speak (vocal), assumptions convert into beliefs about competence and authority."
      domain: communication-skills
      source: "YT/13_Years"

    - id: "MM-VG-020"
      title: "Four Stages of Learning"
      content: "Four Stages of Learning: (1) Unconscious Incompetence, (2) Conscious Incompetence, (3) Conscious Competence, (4) Unconscious Competence. Most people stuck at 2-3."
      domain: mastery
      source: "YT/10_Communication_Skills"

    - id: "MM-VG-021"
      title: "Head vs Heart Communicator"
      content: "Head vs Heart Communicator: Head = facts/frameworks. Heart = stories/emotion. Magic lives in the mix. Head informs, heart inspires, both transform."
      domain: communication-skills
      source: "YT/10_Speaking_Techniques"

    - id: "MM-VG-022"
      title: "The Influence Diamond"
      content: "The Influence Diamond: True influence requires shifting four things — how people Think, Feel, Behave, and their Beliefs."
      domain: influence
      source: "YT/5_Communication_Secrets"

    - id: "MM-VG-023"
      title: "Software vs Hardware (Speech)"
      content: "Software vs Hardware (Speech): Software = thinking/translating/grammar processing. Hardware = physical mouth movements/articulation. Diagnosis determines fix."
      domain: vocal-mastery
      source: "YT/13_Years"

    - id: "MM-VG-024"
      title: "The Talent Myth"
      content: "The Talent Myth: What looks like talent is often relentless repetition. People mistake familiarity for competence."
      domain: mastery
      source: "YT/3_Lessons_10000_Hours"

    - id: "MM-VG-025"
      title: "Neutral Ears Concept"
      content: "Neutral Ears Concept: Practice new behaviors with strangers who have no preconceived ideas about you, because known people push you back into your mold."
      domain: self-awareness
      source: "YT/43_minutes"

    - id: "MM-VG-026"
      title: "The Mold Effect"
      content: "The Mold Effect: People create a mold of who you are. When you try something different, they push you back. Find new environments to break free."
      domain: self-awareness
      source: "YT/13_Years"

    - id: "MM-VG-027"
      title: "Benign Violation Theory of Humor"
      content: "Benign Violation Theory of Humor: Humor requires both a benign element (safe) and a violation element (unexpected). Pure benign = not funny. Pure violation = offensive."
      domain: humor
      source: "YT/13_Years"

    - id: "MM-VG-028"
      title: "Value Shifts in the AI Era"
      content: "Value Shifts in the AI Era: (1) Value moves from doing to translating the work. (2) Human influence more valuable as AI handles execution. (3) Trust = scarcest resource."
      domain: communication-skills
      source: "YT/While_AI_Takes_Over"

    - id: "MM-VG-029"
      title: "The Chef Analogy"
      content: "The Chef Analogy: Find 5 communicators. Study their ingredients. Copy recipes. After mastering (10-30 reps), add your own lemon — your personal flavor."
      domain: mastery
      source: "YT/13_Years"

    - id: "MM-VG-030"
      title: "Self-Conscious vs Audience-Conscious"
      content: "Self-Conscious vs Audience-Conscious: The more you focus on yourself, the more nervous you get. Shift consciousness outward — no capacity left to be self-conscious."
      domain: fear-management
      source: "YT/Delete_Fear_Public_Speaking"

    - id: "MM-VG-031"
      title: "Wound vs Scar Storytelling"
      content: "Wound vs Scar Storytelling: Speaking from a wound turns listeners into therapists. Speaking from a scar allows clarity, perspective, and emotional control."
      domain: storytelling
      source: "YT/Never_Tell_Stories_Like_This"

    - id: "MM-VG-032"
      title: "50/50 Attention Split"
      content: "50/50 Attention Split: Most people put 100% into WHAT they say and 0% into HOW. Split 50/50 between content and delivery."
      domain: communication-skills
      source: "YT/5_Speaking_Traps"

    - id: "MM-VG-033"
      title: "Volume for Free vs Expensive Volume"
      content: "Volume for Free vs Expensive Volume: Straining throat = expensive (unsustainable). Lifting soft palate for resonance = free (sustainable all day)."
      domain: vocal-mastery
      source: "YT/Daily_Routine_Deeper_Voice"

    - id: "MM-VG-034"
      title: "Story Is the Door, Meaning Is the Room"
      content: "The Story Is the Door, the Meaning Is the Room: The story is just the doorway. The meaning you share after is what you lead people into."
      domain: storytelling
      source: "YT/ONLY_3_Ingredients"

    - id: "MM-VG-035"
      title: "Content Shield"
      content: "Content Shield: Hiding behind complexity because you think it equals credibility. 'If I sound smart enough, no one will question me.'"
      domain: communication-skills
      source: "YT/5_Speaking_Traps"

    - id: "MM-VG-036"
      title: "Conversational Threading"
      content: "Conversational Threading: Every answer contains threads you can pull on. Ask a key question, follow up on one thread. Each answer reveals more threads."
      domain: conversation-skills
      source: "YT/5_communication_hacks"

    - id: "MM-VG-037"
      title: "Four Color Communication"
      content: "Four Color Communication (Thomas Erickson): Red = power/results. Yellow = fun/connection. Green = peace/stability. Blue = logic/structure. Master all four to connect with 95% of people."
      domain: influence
      source: "YT/How_to_Talk_ANYONE_Color"

    - id: "MM-VG-038"
      title: "Three Forms of Rambling"
      content: "Three Forms of Rambling: (1) Detail rambling. (2) Sequence rambling (beginning to end). (3) Repetition rambling (same thing over and over)."
      domain: communication-skills
      source: "YT/PARA_Method"

    - id: "MM-VG-039"
      title: "Be As Big As The Room"
      content: "Be As Big As The Room: Match energy to audience size. Camera = imagine 10-20 people. 10,000 people = big energy. One-on-one = dial down."
      domain: presentation-skills
      source: "YT/Why_Nobody_Listens"

    - id: "MM-VG-040"
      title: "Cognitive Overload Model"
      content: "Cognitive Overload Model: Working memory holds 4-7 items. Extra question pushes past limit, causing freeze. Frameworks provide retrieval cues."
      domain: impromptu-speaking
      source: "YT/Why_You_Freeze"

    - id: "MM-VG-041"
      title: "Fight-Flight-Freeze Response"
      content: "Fight-Flight-Freeze Response: Amygdala doesn't distinguish bear from boardroom. Adrenaline floods, prefrontal cortex shuts down."
      domain: fear-management
      source: "YT/Why_You_Freeze"

    - id: "MM-VG-042"
      title: "Staccato vs Legato Speech"
      content: "Staccato vs Legato Speech: Staccato = disconnected words (causes stuttering). Legato = linked words like connected notes (creates flow)."
      domain: vocal-mastery
      source: "YT/3_Simple_Exercises_Fix_Stutter"

    - id: "MM-VG-043"
      title: "The Sheep Trap"
      content: "The Sheep Trap: Every goal you pursue will eventually become monotonous if you don't keep evolving."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Alchemist_EP1"

    - id: "MM-VG-044"
      title: "Rigidity vs Fluidity"
      content: "Rigidity vs Fluidity: Life requires knowing when to be rigid (discipline) and when to be fluid (adapt). Too rigid = break. Too fluid = potato."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Alchemist_EP1"

    - id: "MM-VG-045"
      title: "Career Capital Stack"
      content: "Career Capital Stack: Your rare skills are currency. Mastery of rare skill combination buys autonomy, competence, relatedness."
      domain: personal-development
      source: "YT/Vinh_Ali_So_Good_EP2"

    - id: "MM-VG-046"
      title: "The Bamboo Tree"
      content: "The Bamboo Tree: Months of invisible watering then explosive growth in weeks. There's a tipping point where overnight success happens after invisible effort."
      domain: mastery
      source: "YT/Vinh_Ali_Atomic_Habits_EP10"

    - id: "MM-VG-047"
      title: "Create Your Own Game"
      content: "Create Your Own Game: Don't try to be best at someone else's game. Create your own where your unique combination gives you the unfair advantage."
      domain: personal-development
      source: "YT/Vinh_Ali_Atomic_Habits_EP10"

    - id: "MM-VG-048"
      title: "Burning the Boats"
      content: "Burning the Boats: Having responsibility removes quitting as an option. Creating obligations that only allow forward movement."
      domain: personal-development
      source: "YT/Vinh_Ali_Think_Grow_Rich_EP15"

    - id: "MM-VG-049"
      title: "The Self-Story Loop"
      content: "The Self-Story Loop: Identity story → thoughts/feelings → actions → evidence → reinforces story. Can spiral positively outward or negatively inward."
      domain: personal-development
      source: "YT/Vinh_Ali_33_Laws_EP41"

    - id: "MM-VG-050"
      title: "Recalibration Frequency"
      content: "Recalibration Frequency: Course correct every 6-12 months instead of every 10 years. Small deviations become massive errors when left unchecked."
      domain: life-philosophy
      source: "YT/Vinh_Ali_33_Laws_EP41"

    - id: "MM-VG-051"
      title: "The Cup Problem"
      content: "The Cup Problem: Not solving root problems by changing external circumstances — same person, different cup, same suffering."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Power_of_Now_EP30"

    - id: "MM-VG-052"
      title: "Solve It, Accept It, or Leave It"
      content: "Solve It, Accept It, or Leave It: For any problem, you have only three options. Choose one and commit."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Power_of_Now_EP30"

    - id: "MM-VG-053"
      title: "The Matthew Effect for Skills"
      content: "The Matthew Effect for Skills: Communication is the highest-compounding cumulative advantage. Once developed, it multiplies returns across every domain."
      domain: communication-skills
      source: "YT/Vinh_Ali_Outliers_EP44"

    - id: "MM-VG-054"
      title: "Version 1.0 Mindset"
      content: "Version 1.0 Mindset: Release without perfection. Each iteration allows improvement with real feedback rather than imagined perfection."
      domain: creativity
      source: "YT/Vinh_Ali_Creative_Act_EP39"

    - id: "MM-VG-055"
      title: "The Two Arrows (Buddhist)"
      content: "The Two Arrows (Buddhist): First arrow = unavoidable event. Second arrow = beating yourself up about it. Minimize second arrows."
      domain: life-philosophy
      source: "YT/Vinh_Ali_25_Life_Lessons"

  L3_HEURISTICS:
    - id: "HEUR-VG-001"
      title: "Volume 7/10 Default for Presentations"
      content: "For presentations, use volume 7/10 as baseline. Projects confidence, authority, vitality, and belief in what you're saying."
      domain: vocal-mastery
      source: "SA/02-Module2/Volume"
      type: numeric

    - id: "HEUR-VG-002"
      title: "Brain Prediction Disengagement Rule"
      content: "If the brain can predict your next rate/volume/pitch/archetype, it WILL tune out. Break the pattern constantly."
      domain: audience-engagement
      source: "SA/02-Module2/Rate-of-Speech"

    - id: "HEUR-VG-003"
      title: "Slow = Important Highlight"
      content: "Slow down for important parts — this creates a verbal highlight. Speed up for transitional/less important content."
      domain: vocal-mastery
      source: "SA/02-Module2/Rate-of-Speech"

    - id: "HEUR-VG-004"
      title: "Lower Pitch = Credibility"
      content: "End sentences on LOWER pitch = credibility + authority + confidence. Higher pitch ending = sounds unsure, questioning."
      domain: vocal-mastery
      source: "SA/03-Module3/Educator"

    - id: "HEUR-VG-005"
      title: "More Pauses for Complex Topics"
      content: "When teaching something new or complex, increase pauses significantly. Pauses = processing time for the audience."
      domain: vocal-mastery
      source: "SA/02-Module2/Rate-of-Speech"

    - id: "HEUR-VG-006"
      title: "Hands in Pockets = Closed Off"
      content: "Hands in pockets = closed off, hiding, lacking confidence. Default position should be Placator (palms visible, open)."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "HEUR-VG-007"
      title: "Selfie Test for Facial Expressions"
      content: "Take selfies of each of the 7 facial expression foundations. If YOUR face can't tell what the emotion is, neither can your audience."
      domain: body-language
      source: "SA/05-Module5/Facial-Expressions"

    - id: "HEUR-VG-008"
      title: "3-5 Seconds Eye Contact Rule"
      content: "Hold eye contact for 3-5 seconds per person before naturally moving to next. Shorter = shifty. Longer = intense/creepy."
      domain: body-language
      source: "SA/05-Module5/Eye-Contact"
      type: numeric

    - id: "HEUR-VG-009"
      title: "Motivator Archetype for WHY"
      content: "Use Motivator archetype when answering WHY something matters. Legato delivery, high volume, open face, energy. Make them THIRSTY for the content."
      domain: vocal-archetypes
      source: "SA/03-Module3/Motivator"

    - id: "HEUR-VG-010"
      title: "Educator Archetype for WHAT"
      content: "Use Educator archetype when delivering WHAT (the content). Slower rate, more pauses, lower pitch endings, minimal movement. Give them TIME to process."
      domain: vocal-archetypes
      source: "SA/03-Module3/Educator"

    - id: "HEUR-VG-011"
      title: "Coach Archetype for HOW"
      content: "Use Coach archetype when directing HOW to do something. Staccato delivery, strong volume, finger out okay, direct language. Push them to ACTION."
      domain: vocal-archetypes
      source: "SA/03-Module3/Coach"

    - id: "HEUR-VG-012"
      title: "Friend Archetype for Connection"
      content: "Use Friend archetype to connect and build rapport. Conversational tone, lots of melody, relaxed body, filler words acceptable. Creates TRUST."
      domain: vocal-archetypes
      source: "SA/03-Module3/Friend"

    - id: "HEUR-VG-013"
      title: "Don't Over-Describe the Incident"
      content: "In storytelling, keep the incident tight. The audience doesn't need every detail — they need enough to FEEL it. Over-description kills momentum."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Tips"

    - id: "HEUR-VG-014"
      title: "Relive Don't Report"
      content: "When telling stories, RELIVE the moment — use present tense, body language, facial expressions. Don't REPORT it like a news anchor."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Formula"

    - id: "HEUR-VG-015"
      title: "Bridge with AND THE REASON"
      content: "Always bridge your story to the audience with 'And the reason I tell this story is...' Without this bridge, the story is just entertainment."
      domain: storytelling
      source: "SA/04-Module4/Linking"

    - id: "HEUR-VG-016"
      title: "VAKS Sensory Detail"
      content: "Add Visual, Auditory, Kinesthetic, Smell details to stories. The more senses engaged, the more vivid the experience for the listener."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Formula"

    - id: "HEUR-VG-017"
      title: "Dopamine = Curiosity Driver"
      content: "Dopamine is released when the brain detects something NEW or unexpected. Vary your delivery to trigger constant micro-doses of curiosity."
      domain: audience-engagement
      source: "SA/06-Module6/Chemical-Framework"

    - id: "HEUR-VG-018"
      title: "Oxytocin = Trust Builder"
      content: "Oxytocin is released through stories, vulnerability, and connection. Use personal stories and the Friend archetype to build trust."
      domain: audience-engagement
      source: "SA/06-Module6/Chemical-Framework"

    - id: "HEUR-VG-019"
      title: "Endorphins = Humor Reward"
      content: "Endorphins are released through laughter and play. Humor is NOT comedy — it's lightness, play, and unexpected moments."
      domain: audience-engagement
      source: "SA/06-Module6/Chemical-Framework"

    - id: "HEUR-VG-020"
      title: "Serotonin = Status Recognition"
      content: "Serotonin is released when someone feels acknowledged, important, valued. Call people by name. Recognize contributions publicly."
      domain: audience-engagement
      source: "SA/06-Module6/Chemical-Framework"

    - id: "HEUR-VG-021"
      title: "Power Sphere Rule"
      content: "Keep hand gestures within the Power Sphere — from belly to eyes, shoulder width. Outside this zone, gestures look erratic or weak."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "HEUR-VG-022"
      title: "Walk TO Not AWAY"
      content: "When moving on stage, walk TOWARD the audience to emphasize key points. Walking AWAY signals retreat or disengagement."
      domain: stage-presence
      source: "SA/05-Module5/Movement"

    - id: "HEUR-VG-023"
      title: "Posture = First Impression"
      content: "Fix posture FIRST before anything else in body language. Shoulders back, head aligned. Use door frame anchor daily to reset."
      domain: body-language
      source: "SA/05-Module5/Posture"

    - id: "HEUR-VG-024"
      title: "Filler Words = Processing Sounds"
      content: "Filler words (um, uh, like) are the brain's processing sounds. Replace with SILENCE. Pause is more powerful than filler."
      domain: vocal-mastery
      source: "SA/02-Module2/Pause"

    - id: "HEUR-VG-025"
      title: "Legato for Inspiration"
      content: "Legato (connected, flowing speech) is the delivery style of the Motivator archetype. Words flow into each other for emotional momentum."
      domain: vocal-mastery
      source: "SA/03-Module3/Motivator"

    - id: "HEUR-VG-026"
      title: "Staccato for Direction"
      content: "Staccato (punchy, separated words) is the delivery style of the Coach archetype. Creates urgency and call to action."
      domain: vocal-mastery
      source: "SA/03-Module3/Coach"

    - id: "HEUR-VG-027"
      title: "Energy = Generosity"
      content: "High energy in delivery is an act of generosity to your audience. Low energy is selfish — you're protecting yourself at their expense."
      domain: communication-skills
      source: "SA/01-Module1/Universal-Laws"

    - id: "HEUR-VG-028"
      title: "Neutral Ears First"
      content: "Practice new communication behaviors with strangers FIRST (Uber drivers, coffee shops). Family and colleagues have preconceived ideas about your voice."
      domain: self-awareness
      source: "SA/01-Module1/Universal-Laws"

    - id: "HEUR-VG-029"
      title: "Default Archetype Trap"
      content: "Most people have ONE default archetype. This creates predictability. The audience's brain disengages because it knows what's coming."
      domain: vocal-archetypes
      source: "SA/03-Module3"

    - id: "HEUR-VG-030"
      title: "Dialogue Brings Characters Alive"
      content: "In stories, don't describe what someone said — BECOME them. Change voice, posture, gestures. Dialogue is the engine of vivid storytelling."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Formula"

    - id: "HEUR-VG-031"
      title: "Prime Your Inner Circle"
      content: "Before using new vocal behaviors with family/friends, TELL them you're working on communication skills. Otherwise they think something is wrong."
      domain: self-awareness
      source: "SA/01-Module1/Universal-Laws"

    - id: "HEUR-VG-032"
      title: "Record Monthly for Progress"
      content: "Record yourself at least monthly and compare to previous recordings. Progress in communication is invisible without playback evidence."
      domain: self-awareness
      source: "SA/02-Module2/Self-Awareness-Technique"

    - id: "HEUR-VG-033"
      title: "7 Facial Expression Foundations"
      content: "Master 7 facial expressions: Happy, Sad, Angry, Fearful, Surprised, Disgusted, Contemptuous. These are the FOUNDATIONS — combine and vary for complexity."
      domain: body-language
      source: "SA/05-Module5/Facial-Expressions"

    - id: "HEUR-VG-034"
      title: "Blamer Gesture Strategically"
      content: "The Blamer gesture (pointing finger) is powerful but divisive. Use sparingly and only for dramatic emphasis — never at specific individuals."
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    # === YouTube Elements (HEUR-VG-035 through HEUR-VG-120) ===

    - id: "HEUR-VG-035"
      title: "Volume 6-7 Scale Default"
      content: "Volume 1-10 scale: Default speaking should be 6-7/10. Most people speak at 3. At 6-7 you project confidence, authority, vitality."
      domain: vocal-mastery
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-036"
      title: "Copy 3-5 Communicators"
      content: "Find 3-5 communicators you admire. Copy their posture, tone, gestures. This develops your range."
      domain: mastery
      source: "YT/10_Communication_Skills"

    - id: "HEUR-VG-037"
      title: "24-Hour Review Delay"
      content: "Record 5-10 min video, wait 24 hours before reviewing. Too self-critical immediately after."
      domain: self-awareness
      source: "YT/30_Day_Plan"

    - id: "HEUR-VG-038"
      title: "80% of Wit is Prepared"
      content: "80% of witty responses aren't spontaneous — people have experienced that situation before and repeat a line that works."
      domain: humor
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-039"
      title: "Daily Social Anxiety KPI"
      content: "Daily KPI for social anxiety: Say hello to 3 new people. Level up from hello to hello+compliment to hello+compliment+question."
      domain: confidence
      source: "YT/33_Minutes"
      type: numeric

    - id: "HEUR-VG-040"
      title: "Face = Remote Control for Voice"
      content: "Face = remote control for voice. Move your face to move your voice. Blank face = no emotion."
      domain: body-language
      source: "YT/13_Years"

    - id: "HEUR-VG-041"
      title: "Low Pitch Endings for Authority"
      content: "End sentences on LOW pitch for authority. High pitch = sounds like a question = kills credibility."
      domain: vocal-mastery
      source: "YT/10_Speaking_Techniques"

    - id: "HEUR-VG-042"
      title: "Siren Technique 5 Min Daily"
      content: "Siren technique: 5 min/day, go low to high to falsetto and back. Expands vocal range."
      domain: vocal-mastery
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-043"
      title: "3% Reach Level 3 Communication"
      content: "Only 3% of people reach Level 3 (conscious competence) in communication."
      domain: mastery
      source: "YT/4_Levels"
      type: numeric

    - id: "HEUR-VG-044"
      title: "6 Core Facial Emotions"
      content: "6 core emotions attached to facial expressions: Happy, Sad, Disgust, Angry, Surprise, Fearful. Must show all 6 tonalities."
      domain: body-language
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-045"
      title: "3 Tweaks Transform Perception"
      content: "Tweaking just 3 things can completely transform how people perceive you."
      domain: communication-skills
      source: "YT/47_Minutes_LIVE"
      type: numeric

    - id: "HEUR-VG-046"
      title: "Music Matching Before Speaking"
      content: "Before speaking: play a song matching desired energy. Fun = upbeat. Epic = focused. Lo-fi = calm."
      domain: presentation-skills
      source: "YT/10_Speaking_Techniques"

    - id: "HEUR-VG-047"
      title: "$300 Accent Diagnostic"
      content: "For accent fix: Record 20min improvised video. Send to speech pathologist ($150) + ESL teacher ($150). $300 total diagnostic."
      domain: vocal-mastery
      source: "YT/43_minutes"
      type: numeric

    - id: "HEUR-VG-048"
      title: "50-50 vs 70-30 Conversation Split"
      content: "Good conversationalist gives 50-50 time. To hold space, aim for other person to speak 70%+."
      domain: conversation-skills
      source: "YT/5_Communication_Secrets"
      type: numeric

    - id: "HEUR-VG-049"
      title: "Pre-Speaking Nerve Management"
      content: "When nervous: (1) Wim Hof breathing 2-3 cycles, (2) Brisk walk/star jumps/10 pushups to burn adrenaline."
      domain: fear-management
      source: "YT/43_minutes"

    - id: "HEUR-VG-050"
      title: "Move On If Wit Doesn't Land"
      content: "If wit doesn't land, don't spend 30 seconds explaining. Just move on. If you don't make a big deal, they won't."
      domain: humor
      source: "YT/13_Years"

    - id: "HEUR-VG-051"
      title: "5-10% Rapport in Interviews"
      content: "In job interviews, invest 5-10% building connection/rapport before diving into qualifications."
      domain: influence
      source: "YT/43_minutes"
      type: numeric

    - id: "HEUR-VG-052"
      title: "15+ Min = Tell a Story"
      content: "If 15+ minutes and want to be memorable, tell a story. If less, give a straight precise answer."
      domain: storytelling
      source: "YT/ONLY_3_Ingredients"
      type: numeric

    - id: "HEUR-VG-053"
      title: "70% Vocal Practice Transfer"
      content: "Only 70% of vocal practice follows through to everyday voice. Practice at 150% intensity."
      domain: vocal-mastery
      source: "YT/Daily_Routine_Deeper_Voice"
      type: numeric

    - id: "HEUR-VG-054"
      title: "Gesture Frequency Rule"
      content: "Repetitive gesture every 30 min = fine. Every 20 seconds = visual clutter, must reduce."
      domain: body-language
      source: "YT/3_Powerful_Ways_Stories"
      type: numeric

    - id: "HEUR-VG-055"
      title: "9 Min Daily Vocal Routine"
      content: "3 min per vocal exercise, 3 exercises = 9 min daily routine. Commit 3-6 months for transformation."
      domain: vocal-mastery
      source: "YT/Daily_Routine_Deeper_Voice"
      type: numeric

    - id: "HEUR-VG-056"
      title: "Wim Hof Fixes 80% of Nerves"
      content: "Wim Hof breathing 2-3 cycles (2-3 min each) before speaking fixes ~80% of nerves."
      domain: fear-management
      source: "YT/Delete_Fear"
      type: numeric

    - id: "HEUR-VG-057"
      title: "Stories = 93% Recall"
      content: "Stanford study: stories = 93% recall vs 13% for facts alone."
      domain: storytelling
      source: "YT/ONLY_3_Ingredients"
      type: numeric

    - id: "HEUR-VG-058"
      title: "Headline First Then Detail"
      content: "Say headline first — one clean sentence. Then add detail only if asked."
      domain: communication-skills
      source: "YT/5_Speaking_Traps"

    - id: "HEUR-VG-059"
      title: "3-4 Min Daily Reading Fix"
      content: "Read book 3-4 min daily with exaggerated mouth movements to fix mumbling."
      domain: vocal-mastery
      source: "YT/Speak_10X_Clearer"
      type: numeric

    - id: "HEUR-VG-060"
      title: "10-15 Yawns Daily for Resonance"
      content: "Do 10-15 yawns each day to build soft palate awareness and resonance."
      domain: vocal-mastery
      source: "YT/5_communication_hacks"
      type: numeric

    - id: "HEUR-VG-061"
      title: "Finish Low Then Pause"
      content: "Finish sentences low pitch then pause, rather than ending high or micro-checking (right? does that make sense?)."
      domain: vocal-mastery
      source: "YT/5_Speaking_Traps"

    - id: "HEUR-VG-062"
      title: "Volume + Melody = Confident"
      content: "Volume + No Melody = Sounds angry. Volume + Melody = Confident and warm."
      domain: vocal-mastery
      source: "YT/How_Speak_Louder"

    - id: "HEUR-VG-063"
      title: "Box Breathing 4-4-4-4"
      content: "Box breathing: In 4, hold 4, out 4, hold 4. Used by Navy SEALs."
      domain: fear-management
      source: "YT/NEVER_Feel_Anxiety"
      type: numeric

    - id: "HEUR-VG-064"
      title: "Present Tense in Stories"
      content: "Use present tense in stories ('I'm standing there') vs past tense ('I was standing there'). Present = reliving."
      domain: storytelling
      source: "YT/ONLY_3_Ingredients"

    - id: "HEUR-VG-065"
      title: "Pair Wins with Cost"
      content: "When sharing a win, pair it with the cost/struggle. Never share just the outcome."
      domain: storytelling
      source: "YT/Never_Tell_Stories"

    - id: "HEUR-VG-066"
      title: "Top 5 Go-To Questions"
      content: "Prepare top 5 go-to conversation questions. In high-pressure moments, won't have to think on spot."
      domain: conversation-skills
      source: "YT/5_communication_hacks"

    - id: "HEUR-VG-067"
      title: "Credibility in 30-60 Seconds"
      content: "Audiences decide credibility within 30-60 seconds of your presentation."
      domain: presentation-skills
      source: "YT/3_Remarkable_First_Impression"
      type: numeric

    - id: "HEUR-VG-068"
      title: "Hands by Sides as Default"
      content: "If no reason to use hands, have them by sides. Default to neutral, not fidgeting."
      domain: body-language
      source: "YT/3_Remarkable_First_Impression"

    - id: "HEUR-VG-069"
      title: "5 Eye Contact Don'ts"
      content: "5 Eye Contact Don'ts: (1) Don't dart. (2) Don't scan. (3) Don't go sequential L-C-R. (4) Don't look over heads. (5) Don't stare one person too long."
      domain: body-language
      source: "YT/5_things_NOT_eye_contact"

    - id: "HEUR-VG-070"
      title: "Virtual Eye Contact Rule"
      content: "Virtual eye contact: When speaking, camera 100%. When listening, camera 80%. Hide self-view."
      domain: presentation-skills
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-071"
      title: "Optimal Keynote Mix"
      content: "Optimal keynote: 30% education + 30% entertainment + 30% inspiration + 10% X-factor."
      domain: presentation-skills
      source: "YT/Why_Nobody_Listens"
      type: numeric

    - id: "HEUR-VG-072"
      title: "Stand for Virtual Calls"
      content: "For virtual calls: stand, don't sit. Better access to instrument, energy, breathing."
      domain: presentation-skills
      source: "YT/13_Years"

    - id: "HEUR-VG-073"
      title: "Volume 6-7 Projects CABV"
      content: "Volume 6-7/10 as default projects confidence, authority, vitality, belief."
      domain: vocal-mastery
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-074"
      title: "Energy Drops 50-70% on Camera"
      content: "Energy drops 50-70% on camera vs in person. Must deliberately amp up for virtual."
      domain: presentation-skills
      source: "YT/Why_Nobody_Listens"
      type: numeric

    - id: "HEUR-VG-075"
      title: "5 Seconds to Think = Ask Question"
      content: "If need more than 5 seconds to think, ask clarifying question — buys 10-15 extra seconds."
      domain: impromptu-speaking
      source: "YT/5_Second_Trick"
      type: numeric

    - id: "HEUR-VG-076"
      title: "Feedback in Private Only"
      content: "Give feedback in private, never in front of peers. Leave time between event and feedback."
      domain: leadership
      source: "YT/Difficult_Conversation_EASY_Mode"

    - id: "HEUR-VG-077"
      title: "Keep Feedback Tonality Caring"
      content: "Keep feedback tonality caring throughout. Shift from warm to critical signals attack."
      domain: leadership
      source: "YT/Difficult_Conversation"

    - id: "HEUR-VG-078"
      title: "3 Levels to Stop Talker"
      content: "To stop never-ending talker: Level 1 = visual (raise palm). Level 2 = visual + auditory. Level 3 = talk over them."
      domain: conversation-skills
      source: "YT/3_Strategies_Interrupt"

    - id: "HEUR-VG-079"
      title: "Use I-Statements for Feedback"
      content: "Use 'I statements' for feedback. 'I noticed that...' not 'You did this wrong.'"
      domain: leadership
      source: "YT/5_Steps_Feedback_PRO"

    - id: "HEUR-VG-080"
      title: "Humor is Not Comedy"
      content: "Humor ≠ comedy. Humor = lightness + smile + melody + volume."
      domain: humor
      source: "YT/3_Powerful_Stories"

    - id: "HEUR-VG-081"
      title: "Camera Energy for 10-20 People"
      content: "On camera, imagine audience of 10-20 people and bring that energy level."
      domain: presentation-skills
      source: "YT/Why_Nobody_Listens"

    - id: "HEUR-VG-082"
      title: "Pattern Interrupts Mid-Speech"
      content: "Pattern Interrupts: Drop volume mid-sentence, pause unexpectedly, move location, inject humor in serious moments."
      domain: presentation-skills
      source: "YT/10_Speaking_Techniques"

    - id: "HEUR-VG-083"
      title: "Pause Before AND After Big Point"
      content: "Pause BEFORE and AFTER big point. Before = anticipation. After = weight."
      domain: presentation-skills
      source: "YT/10_Speaking_Techniques"

    - id: "HEUR-VG-084"
      title: "Mirror and Match Slowly"
      content: "Mirror and match slowly — too fast is detectable and feels manipulative."
      domain: influence
      source: "YT/10_Speaking_Techniques"

    - id: "HEUR-VG-085"
      title: "Empathy Echo Technique"
      content: "The Empathy Echo: Echo their last words back ('Overwhelmed?'). Signals 'you get me,' deepens trust."
      domain: emotional-intelligence
      source: "YT/10_Speaking_Techniques"

    - id: "HEUR-VG-086"
      title: "9 out of 10 Welcome You"
      content: "9 out of 10 people welcome you at networking if you say 'Do you mind if I join?'"
      domain: networking
      source: "YT/Network_Top_1%"
      type: numeric

    - id: "HEUR-VG-087"
      title: "Ask Free Time Not Job"
      content: "Don't ask 'What's your job?' Ask 'What do you do in free time?' — you learn far more."
      domain: conversation-skills
      source: "YT/5_Questions_Continue"

    - id: "HEUR-VG-088"
      title: "10 Improv Classes Life-Changing"
      content: "10 improv classes will change your life for breaking comfort zone."
      domain: confidence
      source: "YT/13_Years"
      type: numeric

    - id: "HEUR-VG-089"
      title: "Brain 400 vs Mouth 150 Words/Min"
      content: "Brain thinks 400+ words/min; mouth speaks ~150 words/min. Gap = root of stuttering."
      domain: vocal-mastery
      source: "YT/3_Simple_Fix_Stutter"
      type: numeric

    - id: "HEUR-VG-090"
      title: "2-3 Second Pause Feels Natural"
      content: "2-3 second pause feels natural to others. Gives brain breathing room."
      domain: communication-skills
      source: "YT/Why_You_Freeze"
      type: numeric

    - id: "HEUR-VG-091"
      title: "Add 10-15% More Volume"
      content: "Add 10-15% more volume than feels natural. You self-assess 7/10 but audience perceives 3/10."
      domain: vocal-mastery
      source: "YT/7_Communication_Cheat_Codes"
      type: numeric

    - id: "HEUR-VG-092"
      title: "Nose Breathing 20% Better O2"
      content: "Nose breathing improves O2 efficiency 20%, hydrates vocal cords, activates parasympathetic."
      domain: vocal-mastery
      source: "YT/9_Habits_Clearer_Speaking"
      type: numeric

    - id: "HEUR-VG-093"
      title: "Exhale 1 Second Before Speaking"
      content: "When stuttering: exhale 1 second first, THEN start speaking. Extra second relaxes body."
      domain: vocal-mastery
      source: "YT/5_Secrets_Stop_Stuttering"

    - id: "HEUR-VG-094"
      title: "Conviction Formula"
      content: "Conviction formula: Short declarative sentences + 10-15% more volume + Power Drop = instant authority."
      domain: communication-skills
      source: "YT/7_Communication_Cheat_Codes"

    - id: "HEUR-VG-095"
      title: "Weekly Experience Documentation"
      content: "Every week document one real work moment that taught you something. Builds experience library AI can't fake."
      domain: personal-development
      source: "YT/While_AI_Takes_Over"

    - id: "HEUR-VG-096"
      title: "Networking Pre-Research"
      content: "Networking: research attendee list, connect LinkedIn 2 weeks before, study posts. Never attend blind."
      domain: networking
      source: "YT/Network_Top_1%"

    - id: "HEUR-VG-097"
      title: "Networking Goal = Give First"
      content: "Networking goal: Primary = form connection. Secondary = find how to help them. Give first, ask later."
      domain: networking
      source: "YT/Network_Top_1%"

    - id: "HEUR-VG-098"
      title: "Never Abandon Idea from Expression"
      content: "When sensing resistance mid-idea, pause, breathe, slow down. Never abandon idea based on a facial expression."
      domain: confidence
      source: "YT/5_Speaking_Traps"

    - id: "HEUR-VG-099"
      title: "Fast+Loud vs Slow+Soft"
      content: "Faster rate + more volume = charisma/enthusiasm. Slow + soft = sincerity/calmness. Master both."
      domain: vocal-mastery
      source: "YT/2_simple_changes_ENERGETIC"

    - id: "HEUR-VG-100"
      title: "Don't Over-Monetize Passion"
      content: "If monetizing passion too aggressively, you accelerate monotony. Be conscious."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Alchemist_EP1"

    - id: "HEUR-VG-101"
      title: "Say That's Interesting First"
      content: "When you hear challenging idea, say 'that's interesting' and sit with it before dismissing."
      domain: life-philosophy
      source: "YT/Vinh_Ali_4_Hour_EP3"

    - id: "HEUR-VG-102"
      title: "1 Month Energy Audit"
      content: "Spend 1 month documenting daily what gives peak experiences and what drains you."
      domain: personal-development
      source: "YT/Vinh_Ali_4_Hour_EP3"

    - id: "HEUR-VG-103"
      title: "1-2 Dreams with Obsessive Focus"
      content: "Don't have 50 dreams. Have 1-2 and fill in all details with obsessive focus."
      domain: personal-development
      source: "YT/Vinh_Ali_Be_Useful_EP43"

    - id: "HEUR-VG-104"
      title: "Time-Melting Activities = Omens"
      content: "Pursue time-melting activities — when time melts, that's an omen toward your personal legend."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Alchemist_EP1"

    - id: "HEUR-VG-105"
      title: "Practice Where You Fail"
      content: "Schedule deliberate practice that is uncomfortable — practice where you're guaranteed to fail."
      domain: mastery
      source: "YT/Vinh_Ali_So_Good_EP2"

    - id: "HEUR-VG-106"
      title: "Set Due Dates to Force Action"
      content: "Set due dates to force action. Without deadlines, productivity is stifled."
      domain: personal-development
      source: "YT/Vinh_Ali_Think_Grow_Rich_EP15"

    - id: "HEUR-VG-107"
      title: "1700 Actions/Year = 5/Day"
      content: "Track with Asana: 1,700 actions/year = only 5/day. After 12 months the compound story is visible."
      domain: personal-development
      source: "YT/Vinh_Ali_Be_Useful_EP43"
      type: numeric

    - id: "HEUR-VG-108"
      title: "Recalibrate Every 6 Months"
      content: "Recalibrate every 6 months: Where am I? Am I happy? Where am I headed? Do I still want to go there?"
      domain: life-philosophy
      source: "YT/Vinh_Ali_Die_With_Zero_EP45"

    - id: "HEUR-VG-109"
      title: "3+ Negatives = Recalibrate Signal"
      content: "If 3+ negative things consuming mind, it's signal to recalibrate — ignoring warning lights."
      domain: life-philosophy
      source: "YT/Vinh_Ali_Die_With_Zero_EP45"
      type: numeric

    - id: "HEUR-VG-110"
      title: "Protect Morning Creative Hours"
      content: "Limit email/social/Slack until midday. Protect morning creative hours."
      domain: creativity
      source: "YT/Vinh_Ali_Creative_Act_EP39"

    - id: "HEUR-VG-111"
      title: "Hans Zimmer Visualization Trick"
      content: "Hans Zimmer playlist trick: Play cinematic music during sunrise, visualize dream life, convert to actions."
      domain: personal-development
      source: "YT/Vinh_Ali_Be_Useful_EP43"

    - id: "HEUR-VG-112"
      title: "Create New Evidence for New Story"
      content: "When negative self-stories spiral, create new evidence backing a new story."
      domain: personal-development
      source: "YT/Vinh_Ali_33_Laws_EP41"

    - id: "HEUR-VG-113"
      title: "Pre-Networking Research Protocol"
      content: "Before networking function: research list, identify targets, LinkedIn 2 weeks before, research posts."
      domain: networking
      source: "YT/Network_Top_1%"

    - id: "HEUR-VG-114"
      title: "7 Presentation Tools"
      content: "7 Presentation Tools: Content, Questions, Props, Activities, Video, Storytelling, Analogies. Pick 1-2 beyond content."
      domain: presentation-skills
      source: "YT/In_7_Minutes_Better_Presentations"

    - id: "HEUR-VG-115"
      title: "Slow = Important, Fast = Less"
      content: "Speak important things slow (verbal highlight). Less important things, speed up."
      domain: vocal-mastery
      source: "YT/13_Years"

    - id: "HEUR-VG-116"
      title: "Stand to Prevent Interruptions"
      content: "Stand up to speak in team environments — signals 'I'm still going' and prevents interruptions."
      domain: leadership
      source: "YT/5_Steps_Feedback_PRO"

    - id: "HEUR-VG-117"
      title: "5-Min Timer for Serial Interrupters"
      content: "For serial interrupters: Set 5-min timer, ask for floor explicitly, promise input after."
      domain: leadership
      source: "YT/47_Minutes_LIVE"

    - id: "HEUR-VG-118"
      title: "Golden Rule of Errors"
      content: "Golden rule of errors (from theater): If you don't make big deal, they won't."
      domain: presentation-skills
      source: "YT/Why_Nobody_Listens"

    - id: "HEUR-VG-119"
      title: "Delayed Detailed Feedback"
      content: "When someone says 'how was it?' post-stage, give love now, schedule detailed feedback 3-4 days later."
      domain: leadership
      source: "YT/5_Steps_Feedback_PRO"

    - id: "HEUR-VG-120"
      title: "Three-Step Minimum Warm-Up"
      content: "Lip trills for 1 minute, then lip trill favorite song, then short bursts. Three-step minimum warm-up."
      domain: vocal-mastery
      source: "YT/9_Habits_Clearer_Speaking"

  L4_FRAMEWORKS:
    - id: "FW-VG-001"
      title: "5 Universal Laws of Communication"
      content: "1. 88 Keys (full vocal range = authenticity) 2. Only Practice Leads to Improvement 3. No Automatic Transfer (need neutral ears) 4. All Judgments Are Temporary 5. Generosity = Energy"
      domain: communication-skills
      source: "SA/01-Module1/Universal-Laws"

    - id: "FW-VG-002"
      title: "5 Vocal Foundations"
      content: "1. Rate of Speech (vary: slow=important, fast=transitional) 2. Volume (scale 1-10, default 7 for presentations) 3. Pitch/Melody (vary for engagement) 4. Tonality (emotion in voice) 5. Pause (processing time, emphasis)"
      domain: vocal-mastery
      source: "SA/02-Module2"

    - id: "FW-VG-003"
      title: "4 Vocal Archetypes"
      content: "1. MOTIVATOR (goal: inspire — legato, high volume, open face, energy) 2. EDUCATOR (goal: inform — slower rate, more pauses, lower pitch endings, minimal movement) 3. COACH (goal: guide/instruct — staccato, strong volume, finger out, direct language) 4. FRIEND (goal: connect — conversational, lots of melody, relaxed, filler words OK)"
      domain: vocal-archetypes
      source: "SA/03-Module3"

    - id: "FW-VG-004"
      title: "Self-Awareness Technique"
      content: "Record yourself → Review the recording → Identify your defaults (rate, volume, pitch, archetype, gestures) → Set improvement targets → Practice daily"
      domain: self-awareness
      source: "SA/02-Module2/Self-Awareness-Technique"

    - id: "FW-VG-005"
      title: "Golden Rule Framework"
      content: "Identify most powerful sentence → Deliver it slowly with low pitch ending → Add dramatic pause before AND after → Volume slightly elevated → No filler words near it"
      domain: vocal-mastery
      source: "SA/02-Module2/Golden-Rule"

    - id: "FW-VG-006"
      title: "Storytelling Formula (3-Part)"
      content: "Part 1 INCIDENT: Who/Where/What/When + VAKS + Dialogue. Part 2 TRANSFORMATION: Turning point, what changed. Part 3 LIFE LESSON: 'And the reason I tell this story...' + Bridge to audience."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Formula"

    - id: "FW-VG-007"
      title: "Story Linking Method"
      content: "Step 1: Finish story. Step 2: Say 'And the reason I tell this story is...' Step 3: Connect to the audience's world/problem/opportunity. The LINK is the most important part of any story."
      domain: storytelling
      source: "SA/04-Module4/Linking"

    - id: "FW-VG-008"
      title: "4MAT Archetype Sequencing"
      content: "Open with FRIEND (warmth, rapport) → MOTIVATOR (WHY this matters, make them thirsty) → EDUCATOR (WHAT, the content) → COACH (HOW, call to action) → Close with FRIEND (reconnect, warmth)"
      domain: vocal-archetypes
      source: "SA/03-Module3/Enhanced"

    - id: "FW-VG-009"
      title: "4 Chemical Framework"
      content: "1. DOPAMINE (curiosity — vary delivery, pattern interrupts) 2. OXYTOCIN (trust — personal stories, vulnerability) 3. ENDORPHINS (joy — humor, play, lightness) 4. SEROTONIN (status — recognize others, call by name)"
      domain: audience-engagement
      source: "SA/06-Module6/Chemical-Framework"

    - id: "FW-VG-010"
      title: "5 Satir Hand Gestures"
      content: "1. PLACATOR (palms up/open — openness, receiving) 2. LEVELER (palms down flat — authority, certainty, 'this is how it is') 3. BLAMER (pointing finger — use sparingly, creates division) 4. COMPUTER (chin stroke, thinking — analytical, cerebral) 5. DISTRACTOR (hands moving randomly — shows excitement but can be chaotic)"
      domain: body-language
      source: "SA/05-Module5/Hand-Gestures"

    - id: "FW-VG-011"
      title: "7 Facial Expression Foundations Framework"
      content: "7 universal expressions: Happy, Sad, Angry, Fearful, Surprised, Disgusted, Contemptuous. Practice each in isolation → Take selfies to verify → Combine for complexity → Your face is the REMOTE CONTROL for your voice."
      domain: body-language
      source: "SA/05-Module5/Facial-Expressions"

    - id: "FW-VG-012"
      title: "Storytelling Tips Framework"
      content: "1. If you've told it more than twice, audiences have heard something LIKE it. Add unique twist. 2. Relive don't report. 3. Always use DIALOGUE. 4. Add a MAGIC detail — one specific unique thing. 5. Humor goes with almost every story."
      domain: storytelling
      source: "SA/04-Module4/Storytelling-Tips"

    - id: "FW-VG-013"
      title: "Vocal Warm-Up Framework"
      content: "1. Lip Trills (loosen facial muscles) 2. Humming (warm up vocal cords) 3. Tongue Twisters (articulation) 4. Siren (range expansion — low to high and back) 5. Volume Ladder (1 to 10 and back down)"
      domain: vocal-mastery
      source: "SA/02-Module2"

    - id: "FW-VG-014"
      title: "Eye Contact System"
      content: "Virtual: Look at CAMERA when speaking, look at SCREEN when listening. In-person: 3-5 second holds per person. Large audience: Section by section, treat each section as one person."
      domain: body-language
      source: "SA/05-Module5/Eye-Contact"

    - id: "FW-VG-015"
      title: "Movement Framework"
      content: "Stand still for key points → Move with PURPOSE (transition between ideas = physical transition) → Walk TO audience for emphasis → Avoid pacing/rocking/weight shifting."
      domain: stage-presence
      source: "SA/05-Module5/Movement"

    - id: "FW-VG-016"
      title: "Dopamine Triggering Techniques"
      content: "1. Vary rate of speech unpredictably 2. Change volume mid-sentence 3. Shift archetype without warning 4. Use unexpected props or visuals 5. Pattern interrupt with silence 6. Physical position change. Goal: Never let the brain predict what's next."
      domain: audience-engagement
      source: "SA/06-Module6/Chemical-Framework"

    - id: "FW-VG-017"
      title: "Oxytocin Building Techniques"
      content: "1. Share personal vulnerability 2. Use FRIEND archetype 3. Make eye contact 4. Use audience's names 5. Reference shared experiences 6. Tell personal stories (not hypothetical). Goal: Create deep trust and connection."
      domain: audience-engagement

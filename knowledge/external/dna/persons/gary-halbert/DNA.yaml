      title: "PS as Traffic Cop"
      description: "The postscript directs the reader back to the order form. It's the second-most-read element after the headline — use it to reinforce the key selling point."
      domains: [copywriting, sales-letter-structure]
      source: "GH-HALBERTOLOGY"

    - id: "FW-GH-313"
      title: "National Love Your Lawyer Day Framework"
      description: "Create a themed event or holiday around your product/industry to generate media attention and position yourself as the authority."
      domains: [public-relations, marketing-strategy]
      source: "GH-HALBERTOLOGY"

    - id: "FW-GH-314"
      title: "If-Then Self-Qualifier Framework"
      description: "Open copy with 'If you are [specific type of person], then...' to self-select the right audience and make the reader feel the message is personally for them."
      domains: [copywriting, targeting]
      source: "GH-HALBERTOLOGY"

  L5_METHODOLOGIES:

    # === BATCH 1: Parts 1-5 (MET-GH-001 to MET-GH-007) ===

    - id: "MET-GH-001"
      title: "Direct Mail Profitability Calculation Method"
      description: "Step-by-step: 1) Calculate cost per thousand mailed. 2) Estimate response rate from list history. 3) Multiply by order value. 4) Subtract costs. 5) If positive, scale."
      domains: [direct-mail, business-economics]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-002"
      title: "Live Letter Writing Process"
      description: "1) Set timer for 90 minutes. 2) Load template. 3) Fill in market-specific variables. 4) Write through without stopping. 5) Read aloud. 6) Edit once. 7) Send to test."
      domains: [copywriting, productivity]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-003"
      title: "Swipe File Building Methodology"
      description: "1) Subscribe to competitor mailings. 2) Save every piece that arrives. 3) Organize by industry/type. 4) Handwrite the best ones. 5) Note what makes winners work."
      domains: [copywriting, research]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-004"
      title: "Market Selection Process"
      description: "1) Check SRDS for available lists. 2) Evaluate list size and recency. 3) Calculate potential volume. 4) Rate market passion. 5) Verify product-market fit. 6) Test."
      domains: [market-selection, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-005"
      title: "Headline Workshop Process"
      description: "1) Write 50 headline variations. 2) Read each aloud. 3) Rate on curiosity, specificity, and benefit. 4) Select top 5. 5) Test against control."
      domains: [copywriting, headlines]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-006"
      title: "Product Interview and Copy Extraction Method"
      description: "1) Interview product creator for 2+ hours. 2) Transcribe conversation. 3) Highlight emotional phrases. 4) Extract key stories. 5) Build copy from authentic voice."
      domains: [copywriting, research]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-007"
      title: "Element Assembly Method"
      description: "1) Collect all proof elements, stories, and benefits. 2) Write each on separate card. 3) Arrange in most compelling order. 4) Write transitions. 5) Assemble final letter."
      domains: [copywriting, methodology]
      source: "GH-HALBERTOLOGY"

    # === BATCH 2: Parts 6-11 (MET-GH-101 to MET-GH-107) ===

    - id: "MET-GH-101"
      title: "Complete Halbert Sales Letter Creation Method"
      description: "1) Research market (80% of time). 2) Select template. 3) Write headline first. 4) Write lead. 5) Build body from proof elements. 6) Construct offer. 7) Add guarantee. 8) Write PS. 9) Incubate 3 days. 10) Rewrite. 11) Read aloud. 12) Test."
      domains: [copywriting, methodology]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-102"
      title: "Phone-to-Copy Conversion Method"
      description: "1) Record phone conversation with prospect. 2) Transcribe. 3) Highlight emotional language. 4) Identify objections raised. 5) Build copy using prospect's own words."
      domains: [copywriting, research]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-103"
      title: "Neurological Imprinting Process"
      description: "1) Select a proven winning letter. 2) Handwrite the entire letter. 3) Do this daily for 30 days minimum. 4) Your brain absorbs rhythm, pacing, and persuasion patterns."
      domains: [skill-development, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-104"
      title: "White-Hot Writing Session Method"
      description: "1) Clear all distractions. 2) Set room to 67 degrees. 3) Review research one final time. 4) Write without stopping for 90 minutes. 5) Don't edit during writing. 6) Channel pure emotion."
      domains: [copywriting, productivity]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-105"
      title: "1,000-Piece Test Mailing Method"
      description: "1) Rent 5,000 names from best available list. 2) Select 1,000 randomly. 3) Mail first class. 4) Track responses for 30 days. 5) Calculate ROI. 6) Scale or kill based on results."
      domains: [direct-mail, testing]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-106"
      title: "Swipe File Building Process (Advanced)"
      description: "1) Buy from 20+ different mailers monthly. 2) Catalog every piece by category. 3) Track which mailers repeat (winners). 4) Handwrite top 3 per month. 5) Build reference library."
      domains: [copywriting, research]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-107"
      title: "Bullet Adaptation Twist Method"
      description: "1) Take a proven bullet from a swipe file. 2) Identify the curiosity mechanism. 3) Adapt structure to your product. 4) Add one unique twist. 5) Test against original structure."
      domains: [copywriting, bullet-writing]
      source: "GH-HALBERTOLOGY"

    # === BATCH 3: Parts 12-17 + guests (MET-GH-201 to MET-GH-205) ===

    - id: "MET-GH-201"
      title: "30-Day Copywriter Training Method"
      description: "1) Handwrite one sales letter daily. 2) Study one copywriting book weekly. 3) Write one original letter weekly. 4) Get feedback from a mentor. 5) Repeat for 30 days minimum."
      domains: [skill-development, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-202"
      title: "Personal Ad Writing Method"
      description: "1) Write a personal ad for yourself. 2) Apply direct response principles. 3) Test different headlines/approaches. 4) Use response data to understand what works."
      domains: [copywriting, training]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-203"
      title: "Halbert Headline Creation Method"
      description: "1) Write the offer in one sentence. 2) Express the biggest benefit. 3) Add specificity. 4) Create 50 variations. 5) Add curiosity element. 6) Test top 5. 7) Roll out winner."
      domains: [copywriting, headlines]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-204"
      title: "Mike's Bar Copy Testing Method"
      description: "1) Read your copy to a non-marketing friend in a casual setting. 2) Watch their face for confusion or boredom. 3) Note where attention drops. 4) Rewrite those sections."
      domains: [copywriting, testing]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-205"
      title: "Water Ad Structure Method"
      description: "1) Start with environmental crisis hook. 2) Present health threat. 3) Introduce purification solution. 4) Layer scientific proof. 5) Close with family protection urgency."
      domains: [copywriting, health-marketing]
      source: "GH-HALBERTOLOGY"

    # === BATCH 4: Kevin + webinars (MET-GH-301 to MET-GH-310) ===

    - id: "MET-GH-301"
      title: "Hand-Copy Training Method"
      description: "1) Choose a legendary sales letter. 2) Copy it word-for-word by hand. 3) Speak each sentence as you write. 4) Do this for one hour daily. 5) Continue for 90 days."
      domains: [skill-development, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-302"
      title: "Craig's Total Immersion Protocol"
      description: "1) Study copy 8+ hours daily for 3 years. 2) Handwrite letters. 3) Study results data obsessively. 4) Work with multiple clients simultaneously. 5) Learn from failures more than wins."
      domains: [skill-development, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-303"
      title: "Probiotics Sales Letter Process"
      description: "1) Lead with health crisis. 2) Establish scientific mechanism. 3) Present probiotics as solution. 4) Stack clinical proof. 5) Add personal story. 6) Offer with risk-reversal guarantee."
      domains: [health-marketing, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-304"
      title: "Halbert Copywriting Course Master Process"
      description: "1) Teach arithmetic first. 2) Then list selection. 3) Then offer construction. 4) Then letter structure. 5) Then emotional writing. 6) Then testing. 7) Then scaling. Sequential mastery."
      domains: [training, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-305"
      title: "Hopkins Beer Differentiation Method"
      description: "1) Tour the factory. 2) Document every process step. 3) Find one step competitors also do but don't advertise. 4) Claim it. 5) Make it your unique selling proposition."
      domains: [differentiation, positioning]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-306"
      title: "Nader PR Stunt Methodology"
      description: "1) Create a newsworthy event or declaration. 2) Package for media consumption. 3) Pitch to local outlets first. 4) Leverage coverage for larger outlets. 5) Convert media exposure to clients."
      domains: [public-relations, marketing-strategy]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-307"
      title: "Fortin Guaranteed Deposit Pricing Method"
      description: "1) Require a deposit before writing. 2) Guarantee the copy will beat control or refund deposit. 3) Performance-based royalty on top. 4) Eliminates client risk entirely."
      domains: [copywriting-business, pricing]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-308"
      title: "Voice Calibration Process"
      description: "1) Record yourself reading the copy. 2) Listen for unnatural phrasing. 3) Rewrite anything that sounds 'written' instead of 'spoken'. 4) Re-record and compare. 5) Repeat until natural."
      domains: [copywriting, voice]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-309"
      title: "Objection Killing Process"
      description: "1) List every possible objection. 2) Rank by frequency. 3) Address top 5 preemptively in copy. 4) Use porcupine theory — raise and resolve before reader thinks of them."
      domains: [copywriting, objection-handling]
      source: "GH-HALBERTOLOGY"

    - id: "MET-GH-310"
      title: "Journalist Credibility Article Method"
      description: "1) Write an informational article on your topic. 2) Submit to publications as contributed content. 3) Use published article as credibility proof in sales materials."
      domains: [credibility, content-marketing]
      source: "GH-HALBERTOLOGY"

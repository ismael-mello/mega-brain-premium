    - id: "MM-GH-005"
      title: "Passion Index"
      description: "Rate market opportunities by the intensity of desire, not market size. A small passionate market beats a large indifferent one."
      domains: [market-selection, targeting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-006"
      title: "Hollywood Elements Model"
      description: "Great copy uses Hollywood storytelling elements — conflict, drama, vivid characters, emotional peaks — to maintain engagement."
      domains: [copywriting, storytelling]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-007"
      title: "Two Principles of Good Writing"
      description: "All good writing follows two rules: clarity (say exactly what you mean) and engagement (make it impossible to stop reading)."
      domains: [copywriting, writing-craft]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-008"
      title: "Neural Imprint Through Handwriting"
      description: "Handwriting great sales letters creates a neurological connection to the copy's rhythm, pacing, and persuasion patterns."
      domains: [skill-development, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-009"
      title: "Does It Have Life Test"
      description: "Read copy aloud and ask: does it have energy, rhythm, and emotional impact? If it feels dead on the page, it is dead."
      domains: [copywriting, quality-control]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-010"
      title: "Theater + Reason Why"
      description: "Effective selling combines theatrical presentation (emotional impact) with rational justification (reason why). Both elements are necessary."
      domains: [sales-psychology, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-011"
      title: "Template / Swipe Model"
      description: "Use proven templates and swipe files as starting frameworks, then customize. Working from a template is faster and more reliable than starting blank."
      domains: [copywriting, productivity]
      source: "GH-HALBERTOLOGY"

    # === BATCH 2: Parts 6-11 (MM-GH-101 to MM-GH-114) ===

    - id: "MM-GH-101"
      title: "Passion Index — Detailed Application"
      description: "Systematically rank markets by emotional intensity: health fears > wealth desires > relationship needs > hobby interests. Higher passion = easier sell."
      domains: [market-selection, targeting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-102"
      title: "Shark vs Drowning Man"
      description: "The best marketing targets people who are drowning (desperate need) rather than sharks (sophisticated buyers). Drowning people grab anything."
      domains: [market-selection, sales-psychology]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-103"
      title: "Lesser Mortal Shit Concept"
      description: "Identify and eliminate low-value tasks that consume time but produce no revenue. Delegate or destroy them to protect high-value creative time."
      domains: [productivity, time-management]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-104"
      title: "Biker Bar Model"
      description: "Test your copy's strength like testing a joke in a biker bar — if it works on the toughest audience, it works everywhere."
      domains: [copywriting, testing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-105"
      title: "Three Outcomes of Every Test"
      description: "Every mailing test has exactly three outcomes: winner (scale it), loser (kill it), or inconclusive (test again with more volume)."
      domains: [testing, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-106"
      title: "The Factor Model"
      description: "Isolate individual variables (list, offer, copy, format) and test one at a time. Changing multiple factors simultaneously makes results uninterpretable."
      domains: [testing, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-107"
      title: "Usage Report + Continuation Model"
      description: "After the initial sale, send a usage report to demonstrate value, then offer a continuation or upgrade. Proves value before asking for more money."
      domains: [backend-marketing, customer-retention]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-108"
      title: "Template as Script"
      description: "Treat proven sales letter templates like movie scripts — they provide structure, timing, and emotional beats that you customize with your specific content."
      domains: [copywriting, methodology]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-109"
      title: "Eimak Stromite Buildup"
      description: "Layer credibility elements progressively — each proof point builds on the last until the weight of evidence becomes irresistible."
      domains: [copywriting, persuasion]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-110"
      title: "Concert Pitch Capture"
      description: "Identify the exact moment when emotional intensity peaks and deliver the close. Timing the ask at concert pitch maximizes conversion."
      domains: [sales-psychology, closing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-111"
      title: "Perfect Prospect RFM Profile"
      description: "The ideal prospect has bought something similar recently, buys frequently from similar offers, and spends at or above your price point."
      domains: [list-selection, targeting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-112"
      title: "Barn Full of Bad Checks"
      description: "A high response rate with poor payment quality is worse than lower response with solid buyers. Quality of buyer matters more than quantity."
      domains: [direct-mail, business-economics]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-113"
      title: "Health Affliction Hierarchy"
      description: "Health markets rank by severity of affliction: life-threatening > chronic pain > cosmetic > prevention. Higher severity = higher willingness to pay."
      domains: [market-selection, health-marketing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-114"
      title: "Manufactured Aha Experience"
      description: "Structure copy to create a moment of sudden insight where the prospect sees your solution as the obvious answer. Engineer the epiphany."
      domains: [copywriting, persuasion]
      source: "GH-HALBERTOLOGY"

    # === BATCH 3: Parts 12-17 + guests (MM-GH-201 to MM-GH-209) ===

    - id: "MM-GH-201"
      title: "Porcupine Theory"
      description: "Address objections before they arise, like a porcupine's quills deter predators before contact. Preemptive objection handling eliminates resistance."
      domains: [copywriting, objection-handling]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-202"
      title: "Differences That Whisper vs Differences That Scream"
      description: "Small differentiators (whispers) rarely win markets. You need differences so dramatic they scream — impossible to ignore or compare away."
      domains: [positioning, differentiation]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-203"
      title: "A-Pile vs B-Pile"
      description: "All mail is sorted into two piles: A-pile (personal, interesting — gets opened) and B-pile (obvious marketing — gets trashed). Your job is to be A-pile."
      domains: [direct-mail, envelope-design]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-204"
      title: "Attention-Getting vs Obligating"
      description: "Getting attention is necessary but insufficient. The copy must then obligate the reader to continue through curiosity, self-interest, or story."
      domains: [copywriting, attention]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-205"
      title: "Central Selling Idea"
      description: "Every piece of copy needs one dominant idea that everything else supports. Multiple competing ideas dilute impact."
      domains: [copywriting, messaging]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-206"
      title: "Incubation Process"
      description: "After research and first draft, step away for 3+ days. The subconscious mind continues working on the problem and produces superior solutions."
      domains: [creativity, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-207"
      title: "Radio Umbrella of Bullshit"
      description: "Most marketing advice is noise. Filter through the constant stream of bad advice by testing everything against arithmetic reality."
      domains: [critical-thinking, marketing-strategy]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-208"
      title: "Perpetual Over Trendy"
      description: "Build marketing assets that work forever over chasing temporary trends. A great sales letter can mail for decades."
      domains: [marketing-strategy, longevity]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-209"
      title: "Truth About Flaws Builds Believability"
      description: "Admitting a weakness or limitation makes the rest of your claims more believable. Perfect claims trigger skepticism."
      domains: [copywriting, persuasion]
      source: "GH-HALBERTOLOGY"

    # === BATCH 4: Kevin + webinars (MM-GH-301 to MM-GH-320) ===

    - id: "MM-GH-301"
      title: "Base Trilogy: Headline-Lead-Offer"
      description: "The three foundational elements of any sales piece. If any one fails, the entire piece fails regardless of how good the other two are."
      domains: [copywriting, sales-letter-structure]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-302"
      title: "Pareto of Headlines"
      description: "80% of your copy's success is determined by the headline. Invest disproportionate time and testing on headlines."
      domains: [copywriting, headlines]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-303"
      title: "Perceived Value Pyramid"
      description: "Stack value elements so perceived value far exceeds price. Physical items, bonuses, guarantees, and exclusivity all add perceived layers."
      domains: [offer-design, pricing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-304"
      title: "Imaginary Competitor"
      description: "Create a contrast between your approach and a vague 'everyone else' to position yourself as the superior alternative without naming competitors."
      domains: [positioning, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-305"
      title: "LTV Thinking"
      description: "Judge customer acquisition by lifetime value, not first purchase profit. Willing to lose money on the front end to win on the back end."
      domains: [business-economics, backend-marketing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-306"
      title: "Death or Glory Story"
      description: "The most compelling narratives feature a protagonist who risks everything. Copy that conveys genuine stakes creates visceral engagement."
      domains: [storytelling, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-307"
      title: "New Reason to Believe"
      description: "In saturated markets, the winning copy introduces a fresh mechanism or explanation for why this solution works when others haven't."
      domains: [copywriting, differentiation]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-308"
      title: "Proof Stacking"
      description: "Layer multiple types of proof — testimonials, statistics, demonstrations, credentials, logic — until skepticism collapses under the weight."
      domains: [copywriting, persuasion]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-309"
      title: "Turning Point"
      description: "Every great sales story needs a clear turning point — the moment everything changed. This is where the reader sees themselves in the story."
      domains: [storytelling, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-310"
      title: "James Bond Opening"
      description: "Start with action, drama, or an arresting scene — like a James Bond movie that drops you into the middle of the action immediately."
      domains: [copywriting, openings]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-311"
      title: "Tab Test"
      description: "Flip through your sales letter reading only the bold, underlined, and highlighted parts. If these alone tell a compelling story, the copy works."
      domains: [copywriting, formatting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-312"
      title: "Can't-Make-This-Up Stories"
      description: "True stories that seem too outrageous to be real are the most compelling. Reality provides better material than fiction."
      domains: [storytelling, credibility]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-313"
      title: "Avatar Character Creation"
      description: "Build a detailed character profile of your ideal buyer — their fears, desires, language, daily life — and write exclusively to that person."
      domains: [targeting, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-314"
      title: "UPWARDS Mnemonic"
      description: "Framework for evaluating copy quality: Urgent, Personal, Worthy, Actionable, Readable, Desirable, Specific."
      domains: [copywriting, quality-control]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-315"
      title: "80/10/10 Research Ratio"
      description: "Spend 80% of your time researching, 10% writing, 10% editing. Most copywriters reverse this ratio and wonder why their copy fails."
      domains: [copywriting, research]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-316"
      title: "Hemingway Challenge"
      description: "After writing, ruthlessly cut every unnecessary word. If removing a word doesn't change the meaning, it shouldn't be there."
      domains: [writing-craft, editing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-317"
      title: "Cardboard Hero"
      description: "The 'average person' success story that proves anyone can achieve results. More relatable than celebrity endorsements."
      domains: [copywriting, social-proof]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-318"
      title: "Shark in Water Technique"
      description: "Like a shark that must keep swimming to breathe, copy must maintain forward momentum. Never let the reader pause or consider stopping."
      domains: [copywriting, pacing]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-319"
      title: "Co-Op Mailing List Intelligence"
      description: "Use co-op databases to find proven buyers across multiple categories. These multi-buyers are the highest-value prospects."
      domains: [list-selection, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "MM-GH-320"
      title: "Two Horse Race Law"
      description: "Position your copy as a choice between two options (yours vs. the status quo) rather than one of many. Binary choices are easier to win."
      domains: [positioning, sales-psychology]
      source: "GH-HALBERTOLOGY"

  L3_HEURISTICS:

    # === BATCH 1: Parts 1-5 (HEUR-GH-001 to HEUR-GH-026) ===

    - id: "HEUR-GH-001"
      title: "$500/M Mailing Cost Benchmark"
      description: "Budget approximately $500 per thousand pieces mailed as a baseline cost for direct mail campaigns."
      domains: [direct-mail, budgeting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-002"
      title: "2% Response Rate Baseline"
      description: "A 2% response rate on a targeted direct mail piece is a solid baseline. Below 1% is usually unprofitable."
      domains: [direct-mail, metrics]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-003"
      title: "Coat of Arms: 7% Response / 22% Peak"
      description: "Halbert's famous coat of arms letter achieved 7% average response with peaks of 22% on hot lists."
      domains: [direct-mail, benchmarks]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-004"
      title: "Personalization Triples Response Rate"
      description: "Adding the recipient's name and personal details to a mail piece can triple response rates versus generic addressing."
      domains: [direct-mail, personalization]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-005"
      title: "$69.95 + $4 S&H Sweet Spot"
      description: "The $69.95 price point plus $4 shipping and handling is a proven sweet spot for information products via direct mail."
      domains: [pricing, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-006"
      title: "$30K Retainer + 20% Royalty Fee Structure"
      description: "Top copywriters should charge $30,000+ retainer plus 20% of gross revenue as their fee structure."
      domains: [copywriting-business, pricing]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-007"
      title: "First Paragraph Must Be One Sentence"
      description: "The opening paragraph should be a single short sentence to draw the reader in with minimal commitment."
      domains: [copywriting, formatting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-008"
      title: "Indent Paragraphs 5 Spaces"
      description: "Indent the first line of every paragraph five spaces to create visual breathing room and signal a personal letter format."
      domains: [copywriting, formatting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-009"
      title: "Always Read Copy Aloud"
      description: "Read every piece of copy out loud before sending. Your ear catches problems your eye misses."
      domains: [copywriting, editing]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-010"
      title: "Eliminate Every Superfluous 'That'"
      description: "Remove the word 'that' wherever possible. Most sentences read better without it."
      domains: [writing-craft, editing]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-011"
      title: "Use Commas Where You Would Pause Speaking"
      description: "Place commas where you naturally pause when speaking the sentence aloud. Grammar rules are secondary to readability."
      domains: [writing-craft, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-012"
      title: "Always Mail First Class"
      description: "First class mail gets opened; bulk mail gets trashed. The extra postage cost is recovered many times over in response rates."
      domains: [direct-mail, delivery]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-013"
      title: "Always Use 'Dear Friend' as Salutation"
      description: "When you don't know the recipient's name, 'Dear Friend' is the most effective generic salutation — warm and personal."
      domains: [copywriting, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-014"
      title: "Put Quotes Around Headlines"
      description: "Headlines in quotation marks increase readership because they imply someone important said something noteworthy."
      domains: [copywriting, headlines]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-015"
      title: "1500-1700 Direct Marketing Messages Per Day"
      description: "The average American receives 1500-1700 marketing messages daily. Your piece must cut through this noise to survive."
      domains: [marketing-environment, attention]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-016"
      title: "60% Are Lifetime Subscribers"
      description: "Approximately 60% of newsletter subscribers who pay will remain subscribers indefinitely if content quality is maintained."
      domains: [subscription-business, retention]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-017"
      title: "Coat of Arms Profit: $75 Per Thousand Mailed"
      description: "The coat of arms letter generated approximately $75 profit per thousand pieces mailed at peak performance."
      domains: [direct-mail, profitability]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-018"
      title: "Backend Generates 20-40% Additional Revenue"
      description: "A well-structured backend follow-up sequence adds 20-40% additional revenue on top of the initial front-end sale."
      domains: [backend-marketing, revenue]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-019"
      title: "Products Under $5 Are Doomed"
      description: "Products priced below $5 cannot sustain profitable marketing economics. The margins are too thin to support acquisition costs."
      domains: [pricing, product-strategy]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-020"
      title: "Never Use Exclamation Mark After Title/Logo"
      description: "Exclamation marks in headlines and titles signal amateurism. Confident copy doesn't need punctuation to shout."
      domains: [copywriting, formatting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-021"
      title: "Handwrite Entire Swipe Files"
      description: "Copy great sales letters by hand to internalize their rhythm and structure. This is non-negotiable training for new copywriters."
      domains: [skill-development, copywriting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-022"
      title: "90-Minute Letter Using a Template"
      description: "A competent copywriter using a proven template can produce a complete sales letter in approximately 90 minutes."
      domains: [copywriting, productivity]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-023"
      title: "18 Consecutive Winners Possible with Templates"
      description: "Halbert claims to have produced 18 consecutive winning direct mail pieces using his template system."
      domains: [copywriting, templates]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-024"
      title: "Blind Ads Outpull Specific Ads"
      description: "Ads with curiosity-driven headlines (blind) typically outperform those that reveal the product upfront (specific)."
      domains: [copywriting, headlines]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-025"
      title: "Old/Young Age References Boost Copy"
      description: "Mentioning extreme ages (very old or very young achievers) in copy increases credibility and fascination."
      domains: [copywriting, proof-elements]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-026"
      title: "Never Start a Sales Letter with a Question"
      description: "Opening with a question invites a 'no' that terminates reading. Start with a statement that hooks."
      domains: [copywriting, openings]
      source: "GH-HALBERTOLOGY"

    # === BATCH 2: Parts 6-11 (HEUR-GH-101 to HEUR-GH-123) ===

    - id: "HEUR-GH-101"
      title: "Mail 1,000 Pieces as First Test"
      description: "Always start with a 1,000-piece test mailing. This is the minimum for statistically meaningful results without excessive risk."
      domains: [direct-mail, testing]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-102"
      title: "$500/M Cost — Reinforced"
      description: "Direct mail costs approximately $500 per thousand including printing, postage, list rental, and lettershop. Use this for all projections."
      domains: [direct-mail, budgeting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-103"
      title: "5,000 Name Minimum for List Rental"
      description: "Most list brokers require a minimum order of 5,000 names. Plan test quantities accordingly."
      domains: [list-selection, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-104"
      title: "7% Response Rate Is Excellent"
      description: "A 7% response rate on direct mail is exceptional performance. Most profitable campaigns run 2-4%."
      domains: [direct-mail, benchmarks]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-105"
      title: "Keep Nixie Rate Below 7%"
      description: "If more than 7% of your mail comes back as undeliverable (nixie), the list quality is unacceptable."
      domains: [direct-mail, list-quality]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-106"
      title: "TV-Generated Lists Don't Work for DM"
      description: "Names collected from TV advertising typically perform poorly for direct mail because they're passive responders, not active buyers."
      domains: [list-selection, direct-mail]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-107"
      title: "US Mail Works Better Abroad Than Local Mail"
      description: "Letters from America get premium attention in foreign countries. The curiosity and perceived status of US mail boosts response rates."
      domains: [direct-mail, international]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-108"
      title: "Mail First Class to Detect Dead Addresses"
      description: "First class mail returns undeliverables. This cleans your list and prevents wasting money on dead addresses."
      domains: [direct-mail, list-hygiene]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-109"
      title: "If Response Is Zippo, Drop Immediately"
      description: "If a test mailing produces zero or near-zero response, don't try to optimize — kill it and move on to the next test."
      domains: [direct-mail, testing]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-110"
      title: "Breakeven Is Worth Refining"
      description: "If a mailing breaks even on the front end, the backend will make it profitable. Refine rather than abandon breakeven campaigns."
      domains: [direct-mail, business-economics]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-111"
      title: "Headlines in 24pt Upper/Lower Case"
      description: "Set headlines in 24-point type using upper and lower case (not ALL CAPS). This maximizes readability and visual impact."
      domains: [copywriting, formatting]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-112"
      title: "Use White or Buff #10 Envelope"
      description: "Standard white or buff-colored #10 business envelopes get the best response rates. Fancy colors signal marketing."
      domains: [direct-mail, envelope-design]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-113"
      title: "Never Tell What's Inside the Envelope"
      description: "The envelope's job is to get opened, not to sell. Revealing contents on the envelope reduces open rates."
      domains: [direct-mail, envelope-design]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-114"
      title: "3 Presentations = 1 Sale Average"
      description: "On average, it takes three sales presentations to close one sale in direct selling environments."
      domains: [sales, conversion-rates]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-115"
      title: "6-10 Calls to Reach Concert Pitch"
      description: "Prospect needs 6-10 touchpoints before reaching maximum buying readiness (concert pitch)."
      domains: [follow-up, sales]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-116"
      title: "3-Day Incubation Period for Copy"
      description: "After completing a first draft, wait at least three days before editing. Fresh eyes catch what fatigued eyes miss."
      domains: [copywriting, editing]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-117"
      title: "Repeated Ad Is a Winning Ad"
      description: "If someone is running the same ad repeatedly, it's working. Stop looking for new ideas and model what's proven."
      domains: [advertising, competitive-intelligence]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-118"
      title: "Don't Choose Product Until You Check SRDS"
      description: "Verify available mailing lists in Standard Rate and Data Service before committing to a product. No lists = no viable market."
      domains: [market-validation, list-selection]
      source: "GH-HALBERTOLOGY"

    - id: "HEUR-GH-119"
      title: "Request Competitor's Mailing Piece from List Broker"
      description: "Before renting a list, ask the broker for samples of other mailers using that list. Study what's working."
      domains: [competitive-intelligence, direct-mail]
      source: "GH-HALBERTOLOGY"


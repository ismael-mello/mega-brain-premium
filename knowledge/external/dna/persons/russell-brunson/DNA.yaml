    - id: PHI-RB-MCC-001
      statement: Micro-continuity is the easiest, fastest, and best way to make money on the internet. Sell once, get paid every month. A small recurring program at $10-47/month is more valuable than a
        big one-time sale -- it compounds, it builds trust, and it creates predictable income.
      context: Module 1 opening, Micro Continuity Course (~2008). Russell's personal favorite model at that era.
      tags:
      - micro-continuity

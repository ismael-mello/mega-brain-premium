      statement: 'Bridge Page Funnel Framework: (1) Determine prospect''s awareness level, (2) Mini-survey with mass-market language, (3) Bridge page video that delivers promise AND educates on industry
        terms, (4) Sales page using industry vocabulary. Bridge does 3 things: give what was promised, explain the industry term, explain why they need the product.'

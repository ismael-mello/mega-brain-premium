    - id: PHI-RB-MCC-003
      statement: Dominate through multiple touchpoints, not single-channel presence. If all your favorite authority sites are using one keyword, you own that keyword. Build presence across HubPages, Squidoo,
        Weebly, Mix, article directories, RSS, and video simultaneously. The search engine sees coordinated topical authority.
      context: Oprah Traffic Method, Micro Continuity Course. Web 2.0 content syndication philosophy.

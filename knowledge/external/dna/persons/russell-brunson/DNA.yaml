    - id: HEUR-RB-212
      statement: Layer at least 3 interests when targeting Facebook ads — single-interest targeting is too broad. Interest A + B + C = hyper-relevant audience.
      context: Day 1 Evening — Facebook ads tactical session.
      module_sources:
      - ES-LIVE-S03
    - id: HEUR-RB-213
      statement: Spend $5-10/day on Facebook ad Ask Campaigns — just enough to get 50-100 responses in a week. Minimal spend, maximum learning.
      context: Day 1 Evening — budget heuristic for market research via Ask Campaigns.
      module_sources:
      - ES-LIVE-S03
    - id: HEUR-RB-214
      statement: 'Do Facebook Lives as your Ask Campaign — get real-time feedback AND build content simultaneously. Two-for-one: live video asking questions serves both purposes.'
      context: Day 1 Evening — combining content creation with market research.
      module_sources:
      - ES-LIVE-S03
    - id: HEUR-RB-215
      statement: Use lead ads (not landing pages) for Ask Campaigns on Facebook — auto-fill user info means 2-5x higher response rates than external pages.
      context: Day 1 Evening — friction reduction for market research.
      module_sources:
      - ES-LIVE-S03
    - id: HEUR-RB-216
      statement: 'Perfect Webinar timing: 15 min intro (rapport + ruler + Big Domino + qualify + origin) + 45 min content (3x15 min secrets) + 30 min stack/close + 30 min Q&A = ~2 hours total.'
      context: Day 2 Evening — precise timing breakdown of the Perfect Webinar structure.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-217
      statement: 'Trial closes: ask ''yes'' questions thousands of times throughout the presentation. Ted Thomas: ''The reason I close so well is I ask people to say yes thousands of times.'' Use ''right?'',
        ''how many of you guys...'', and tonality-based trial closes.'
      context: Day 2 Evening — closing technique from Ted Thomas that Russell applies.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-218
      statement: After every testimonial, drop 5-8 trial closes in rapid succession — that's prime conversion time. 'Most people share testimony, get awkward and move off quick. That's the BEST time for
        me to drop five, six, seven, eight trial closes in a row.'
      context: Day 2 Evening — testimonial + closing integration technique.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-219
      statement: Never explain your product for more than 20 seconds in the stack — spend 3-4x more time on testimonials about the product than on the product itself.
      context: 'Day 2 Evening — stack presentation: proof > description.'
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-220
      statement: Video testimonials must be compressed to 60-90 seconds max or tell the story yourself. 'Most people do testimonial video and they talk for 13 minutes... I chopped it to a minute and 12
        seconds.'
      context: Day 2 Evening — testimonial production heuristic.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-221
      statement: Each testimonial serves a specific strategic purpose — never random. Liz = established business, Stan = complete beginner, Simon = ROI concern. Each destroys a specific objection at a specific
        moment.
      context: Day 2 Evening — strategic testimonial placement in webinar.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-222
      statement: '''You''re probably thinking this, right? But the truth is...'' can DOUBLE webinar conversions. Jason Fladlien technique: after main presentation, spend up to 90 minutes addressing every
        possible false belief with this pattern.'
      context: Day 2 Evening — Fladlien tested this live and literally doubled conversions that night.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-223
      statement: PayPal financing option adds ~30% to webinar sales. No payments, no interest for 6 months. 'Every time we've done that, it's like 30% lift.'
      context: Day 2 Evening — payment option heuristic for increasing conversions.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-224
      statement: Qualify yourself by association with authority nonchalantly, not by reading your bio. 'The most annoying thing you can do is brag about how cool you are. So you brag in a way that's nonchalant.'
        Associates with Tony Robbins, Richard Branson casually.
      context: Day 2 Evening — qualification technique in webinar intro.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-225
      statement: Always ask permission before transitioning to the close. 'I always ask permission before I transition. You guys okay if I spend 10 minutes really quick...? And I wait.' Removes awkward
        transition and gets consent.
      context: Day 2 Evening — Armand Morin technique Russell adopted.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-226
      statement: Webinar replay stays up Friday-Saturday-Sunday, page down Sunday midnight. Order link stays live forever. 'I never take my order link down ever. I take the replay page down.'
      context: Day 2 Evening — scarcity mechanism for webinar sales cycle.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-227
      statement: Teach the WHY, not the HOW — the HOW is your product. 'I'm telling them why they should lift weights, but I'm not giving them a plan to lift weights.'
      context: Day 2 Evening — content strategy for webinar teaching sections.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-228
      statement: '''10% of 10% of 10%'' close: reduces intimidating number to achievable daily amount. $100K/day → $10K/day (10%) → $1K/day (1%) → $100/day. ''That''s $3K/month. You don''t have to get this
        perfect. You just got to try.'''
      context: Day 2 Evening — price/result reframing close.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-229
      statement: 'Visa/Mastercard close: reframe full price as minimum monthly payment. ''What''s the minimum monthly payment on $1000? About $50. Can you afford $50 in 30 days?'' Reframes entire price
        psychology.'
      context: Day 2 Evening — payment reframing close technique.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-230
      statement: 'Scarcity shortcut: ''When they''re gone, they''re gone.'' Vague but effective urgency. Armand Morin: ''What does that mean? I don''t know. But when they''re gone, they''re gone.'''
      context: Day 2 Evening — urgency mechanism when specific scarcity is hard to define.
      module_sources:
      - ES-LIVE-S06
    - id: HEUR-RB-231
      statement: 'Dream 100 response rate: contact 100 → 30 say yes → 6 actually do it = 6% execution rate = $3-4M launch.'
      context: Day 3 Afternoon — quantified Dream 100 conversion funnel from ClickFunnels book launches.
      module_sources:
      - ES-LIVE-S08
    - id: HEUR-RB-232
      statement: Send blank book first to build curiosity before launch. 'I sent them all a blank copy because it hadn't been written yet. People started asking for early copies.' Pre-commitments spike.
      context: Day 3 Afternoon — Dream 100 package contents for Expert Secrets launch.
      module_sources:
      - ES-LIVE-S08
    - id: HEUR-RB-233
      statement: Dream 100 monthly cadence — send physical mail every single month. 'Some people think you're weird at first. But if I am consistent, eventually they'll contact me.'
      context: 'Day 3 Afternoon — monthly Dream 100 mail cadence. DCS launch: Ferrari keychains, miniature Ferraris monthly.'
      module_sources:
      - ES-LIVE-S08
    - id: HEUR-RB-234
      statement: 'Getting Dream 100 physical addresses: DM ''I got a gift for you — what''s your best address?'' Everybody except one person gave their address, no questions asked.'
      context: Day 3 Afternoon — practical address collection for Dream 100 packages.
      module_sources:
      - ES-LIVE-S08
    - id: HEUR-RB-235
      statement: Video on webinar registration pages almost never increases conversion. Registration pages should be simple and high curiosity.
      context: Day 3 Recap — funnel build walkthrough.
      module_sources:
      - ES-LIVE-S12
    - id: HEUR-RB-236
      statement: Dream 100 list should be 500-600 people, not just 100. 'We kept adding — our Dream 100 is about 500 or 600 people.'
      context: Day 3 Afternoon — practical reality of Dream 100 scale at ClickFunnels.
      module_sources:
      - ES-LIVE-S08
    - id: HEUR-RB-237
      statement: 'False Belief Pattern chain: Experience → Story → Belief. Every false belief traces back to an experience that created a story that hardened into a belief. To change the belief, tell a
        new story (Epiphany Bridge) that replaces the old one.'
      context: Day 2 Afternoon — psychological mechanism behind Epiphany Bridge stories.
      module_sources:
      - ES-LIVE-S05
    - id: HEUR-RB-238
      statement: 'First direct mail piece: 1835 (American Anti-Slavery Association). First radio ad: 1922 (Hawthorne Court Apartments, Jackson Heights). First TV commercial: 1927+13 years = 1940 (Bolvo
        Watch, 10 seconds on NBC). History of interruption marketing follows the same adoption curve every time.'
      context: TS LIVE Session 2. Russell teaches marketing history timeline to prove that search→interruption shift is universal.
      module_sources:
      - TS-LIVE-S2
    - id: HEUR-RB-239
      statement: 'Search = race to the bottom on price. Amazon alarm system: $99. Door-to-door interruption (Trevor Chapman): same alarm system, $100,000 contract. The difference: interruption gives you
        the opportunity to sell on perceived value. Search makes you compete on price.'
      context: TS LIVE Session 2. Trevor Chapman door-to-door alarm sales story as the canonical example of search vs interruption price difference.
      module_sources:
      - TS-LIVE-S2
    - id: HEUR-RB-240
      statement: Real email address (Facebook-linked) is worth 80x more than a throwaway email. Jeremy Shoemaker tested across hundreds of millions of emails. If they can't verify it's a real social email,
        just delete the contact -- it's a waste of time.
      context: TS LIVE Session 1 (RFM section). Shoemaker's autoresponder data. This became the 'S' (Social) in the RFM+S value score in ClickFunnels.
      module_sources:
      - TS-LIVE-S1
    - id: HEUR-RB-241
      statement: The average woman goes on 8 weight loss plans per year. The best person to sell your thing to is someone who already bought something similar -- they are proven buyers in your category.
        Your mental block ('they already bought one') is wrong.
      context: TS LIVE Session 1 (RFM section). Data from Caitlin/Lady Boss. Destroys the myth that 'they already have a solution so they won't buy mine.'
      module_sources:
      - TS-LIVE-S1
    - id: HEUR-RB-242
      statement: 'Hotline buyers (purchased within last 30 days) are the cream of the crop in any list. In direct mail, the hotline segment always outperforms everything else. Recency is the #1 factor in
        lead scoring.'
      context: TS LIVE Session 1. Old school direct mail principle from Dan Kennedy/Gary Halbert era, now built into ClickFunnels value score.
      module_sources:
      - TS-LIVE-S1
    - id: HEUR-RB-243
      statement: '10X value rule: Whatever you sell, make the perceived value at least 10 times the price. If you create something worth only $30 in your mind, don''t sell it for $30 -- make it worth $3,000
        and sell it for $300.'
      context: TS LIVE Session 8 (funnel offer mapping). Russell's pricing heuristic for all offers in a funnel.
      module_sources:
      - TS-LIVE-S8
    - id: HEUR-RB-244
      statement: Start with ONE platform for your show -- the one you're most comfortable with. If you try to launch podcast + Facebook + YouTube + Instagram all at once, you will fail. Even Russell's team
        isn't actively destroying every channel -- they succeed in 2-3 and add more over time.
      context: TS LIVE Session 5 (Distribution & Your Show). Russell admits his Funnel Hacking Live 'Conversation Domination' talk was poorly received because it stressed people out about being everywhere.
      module_sources:
      - TS-LIVE-S5
    - id: HEUR-RB-245
      statement: Tony Robbins dominated with infomercials on just 3 TV channels (ABC/CBS/NBC). When cable splintered into 10,000 channels, his business struggled. He couldn't profitably buy on fragmented
        channels. That's when he shifted to internet marketing.
      context: 'TS LIVE Session 5. Tony Robbins told Russell this in their first meeting: ''I was on all 3 channels. Then cable came and everything broke.'''
      module_sources:
      - TS-LIVE-S5
    - id: HEUR-RB-246
      statement: eBay paid ~$2.5 billion for Skype despite Skype having zero revenue and eBay having 800 developers who could clone it in a weekend. They bought the customer list. Zuckerberg offered $6B
        for Snapchat for the same reason. Customer base > features.
      context: TS LIVE Session 3. Acquisition case studies proving that owned traffic (customer list) is the only asset worth buying.
      module_sources:
      - TS-LIVE-S3
    - id: HEUR-RB-247
      statement: 'ClickFunnels value score has 4 circles: Recency, Frequency, Monetary value, Social (email quality). Default weighting is 25% each. Todd is adding ability to customize weights so you can
        prioritize what matters most to your business.'
      context: TS LIVE Session 1 (end of RFM section). Product feature explanation tied to direct mail lead scoring theory.
      module_sources:
      - TS-LIVE-S1
    - id: HEUR-RB-248
      statement: Hook Story Offer happens at EVERY level of the funnel, not just the sales page. Ad = hook story offer. Squeeze page = hook story offer. Sales page = hook story offer. Upsell = hook story
        offer. Email subject line = hook story offer. You make offers dozens of times per day.
      context: 'TS LIVE Session 8. Russell maps out HSO at every funnel touchpoint: ''If I want somebody to open my email, that''s an offer. If I want them to click my ad, that''s an offer.'''
      module_sources:
      - TS-LIVE-S8
    - id: HEUR-RB-249
      statement: 108 Split Tests book was the bait that shifted Russell's customer base. Old customers would have been repelled by it. Dream customers (real entrepreneurs) saw it as 'porn for entrepreneurs.'
        Shift your bait, shift your customers.
      context: TS LIVE Session 1 (Dream Customer section). After Tony Robbins' 'change your business' challenge + Eben Pagan avatar exercise, Russell created a product that attracted his dream customers
        and repelled the old ones.
      module_sources:
      - TS-LIVE-S1
    - id: HEUR-RB-250
      statement: 'Perry Belcher (Digital Marketer): Bed Bath & Beyond makes all buying decisions based on ''would Julie like this?'' -- Julie is a fictional customer avatar. Huge company, every product
        decision filtered through one fictional persona.'
      context: TS LIVE Session 1 (Dream Customer Avatar section). Russell uses Perry's story to illustrate corporate-level avatar usage.
      module_sources:
      - TS-LIVE-S1
    - id: HEUR-RB-251
      statement: 'Brian Underwood/Proobit and ClickFunnels launched at the same time. Two years before that, they did a failed project together ($47 total commission for 6 months). Four years after launch:
        Proobit = $500M/year, ClickFunnels = $100M+/year. Skills from failure compound into capacity for success.'
      context: TS LIVE Session 7 (Day 2 opening). The failed project got 1.5M subscribers in 6 weeks but never monetized.
      module_sources:
      - TS-LIVE-S7
    - id: HEUR-RB-252
      statement: 'Your show is leverage for Dream 100 relationships. Without a platform, you''re begging: ''Can you promote my thing?'' With a platform, you''re offering value: ''I''d love to feature you
        on my show.'' Nobody called Arsenio Hall back when he had no show. Everyone takes Russell''s calls now because he has a platform.'
      context: TS LIVE Session 5. Core argument for why every entrepreneur should start their own show -- it's Dream 100 leverage, not just content marketing.
      module_sources:
      - TS-LIVE-S5
    - id: HEUR-RB-253
      name: epc-4-dollars-acv-300-benchmark
      statement: 'Benchmark: $4 EPCs and over $300 ACV ($304.55 exact) on a free-plus-shipping membership funnel. This is what a well-optimized funnel with proper offer stacking achieves.'
      context: Jan 2022 Greatest Hits. RB's Magnetic Marketing membership funnel results. Behind-the-scenes breakdown of exact numbers.
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-254
      name: order-bump-always-mandatory
      statement: 'There should NEVER be a funnel without an order form bump on it — unless of course, you hate money! The bump is the closest thing to free money you''ll ever see. Oftentimes, this bump
        will cover all of your ad costs. Benchmark: 10.13% conversion on $97 bump.'
      context: Feb 2022 Greatest Hits. Two Comma Club LIVE funnel. Order bump right before the order button. Also referenced in Jan 2022 ecomm context.
      module_sources:
      - MM-GH-FEB2022
    - id: HEUR-RB-255
      name: invisible-funnel-10pct-refund
      statement: 'Invisible funnel refund rate: only about 10% of attendees ask not to be billed. Net increase in signups is 2-3x vs traditional paid event. Risk reversal dramatically increases registration.'
      context: Feb 2022 Greatest Hits. Two Comma Club LIVE invisible funnel mechanism. Concept from Daegan Smith, originally in first DotComSecrets edition.
      module_sources:
      - MM-GH-FEB2022
    - id: HEUR-RB-256
      name: prepay-vs-invisible-split
      statement: 'When offering both options: 57.45% choose invisible funnel ($0 now → $197 after), 42.55% choose prepay ($97 with replays access). Label the prepay as ''most popular'' and offer $50 discount
        + replays to incentivize upfront payment.'
      context: Feb 2022 Greatest Hits. Exact split test data from Two Comma Club LIVE registration.
      module_sources:
      - MM-GH-FEB2022
    - id: HEUR-RB-257
      name: vip-upsell-self-selection
      statement: 'VIP upsell ($197 for private Q&A with coaches): 10.05% conversion rate. Critical insight: MOST $25K coaching buyers came from VIP group. VIPs self-select as action-takers — your highest-ticket
        buyers will come from this pool.'
      context: Feb 2022 Greatest Hits. Two Comma Club LIVE virtual event. VIP upgrade between breaks and during lunch = private access to coaches.
      module_sources:
      - MM-GH-FEB2022
    - id: HEUR-RB-258
      name: ecomm-oto1-more-of-same
      statement: Most successful ecomm OTO1 = 'more of the same' product at a discount. Offer TWO high-package options (3-box save $84 and 6-box save $192) instead of just one — gives 'breathing room' to
        choose either/or instead of a straight no.
      context: Jan 2022 Greatest Hits. Heath Wilcock breakdown of Zuma Juice and Au Bon Broth funnels built by RB's team.
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-259
      name: downsell-one-more-50pct
      statement: 'Downsell strategy: ''Add one more to your order'' at 50% off. This is the grocery store cookie psychology — deal too good to pass up, one box isn''t going to hurt. The ''Oh, why not, toss
        it in the cart'' impulse buy.'
      context: Jan 2022 Greatest Hits. Zuma Juice downsell — if they say no to 3-box or 6-box, offer single box at 50% off.
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-260
      name: ecomm-oto2-new-problem-new-product
      statement: 'OTO2 = introduce entirely NEW product with NEW problem and NEW solution. Don''t rush it — treat it like a brand-new sales page. Use same package layout as front-end (1, 3, 6 options).
        Example: Zuma Greens front-end → Zuma Reds OTO2 (new problem: slow metabolism).'
      context: 'Jan 2022 Greatest Hits. Au Bon bone broth front-end → chocolate/vanilla powder OTO2 (new problem: late-night cravings).'
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-261
      name: ebook-squeeze-5-dollar-leads
      statement: 'Free ebook squeeze pages consistently generate leads at ~$5 cost vs $20-25 for direct webinar registration pages. Test fast: find old ebook/report, create simple squeeze page, clone funnel
        with different hooks for new segments — new funnel in under 1 hour.'
      context: Apr 2022 Greatest Hits. 108 Proven Split Test Winners ebook was first test. Then cloned for network marketers, then webinar hacks video via One-Pager.
      module_sources:
      - MM-GH-APR2022
    - id: HEUR-RB-262
      name: pre-funnel-80pct-cost-reduction
      statement: Pre-funnels (ebook squeeze → webinar) reduced ad costs by 75-80%. Webinar registrant cost went from $20-25 down to $5. Even people who don't register on thank-you page get forced into webinar
        email sequence.
      context: Apr 2022 Greatest Hits. Response to Facebook/Apple feud raising ad costs. 'Dozens of tests' led to this innovation.
      module_sources:
      - MM-GH-APR2022
    - id: HEUR-RB-263
      name: slo-10-dollar-profit-before-webinar
      statement: 'Self-liquidating offers (SLOs) on thank-you page averaged over $10 in profit per registrant BEFORE the webinar even started. Oftentimes covered entire lead cost. Different SLO per segment
        based on #1 problem answer.'
      context: 'Mar 2022 Greatest Hits. Webinar funnel with SLO books (DotComSecrets, Expert Secrets, Traffic Secrets) segmented by user''s self-identified #1 problem.'
      module_sources:
      - MM-GH-MAR2022
    - id: HEUR-RB-264
      name: give-reason-for-upsell-buy
      statement: 'Always give customers a REASON why they should add more. Without a reason: ''I just bought this, why would I want more?'' With a reason (shipping problems, warehouse oopsie, limited inventory):
        if the price is right, successful upsell #1 leads to successful upsell #2.'
      context: 'Jan 2022 Greatest Hits. Heath Wilcock ecomm funnel breakdown. Examples: worldwide shipping problem, warehouse inventory surplus, any reason works.'
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-265
      name: subscription-ecomm-priority
      statement: If you haven't set up subscriptions for your ecomm offer yet, make that a priority. Subscriptions can help you get to 'Scalesville' faster. Customers are better trained for subscriptions
        today — use them. Stack subscription with bonus (shaker bottle, premium packaging).
      context: Jan 2022 Greatest Hits. Zuma Juice subscription pushed with bonus stacking. Au Bon Broth with electric frother + classy mug in cotton drawstring bag for premium feel.
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-266
      name: free-eguides-nudge-ecomm
      statement: Spend a couple hundred bucks and get some e-books made for your e-comm offer. While it may not seem like much, tested across TONS of brands and it works every time. They act like little
        'nudges' to get the customer to purchase. Simple and affordable, immediately adds value.
      context: Jan 2022 Greatest Hits. Zuma Juice offer includes two free e-guides with initial purchase. Can be as simple as a '5-Day Challenge Checklist.'
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-267
      name: negotiate-crazy-ask
      statement: 'When negotiating any contract, always throw in one crazy thing you REALLY want but assume they won''t do, and just see what they say. Marcus Lemonis: slipped in 1-hour meeting → led to
        TV show appearance. Dan Kennedy: slipped in ''coauthor a book'' → got a yes by fax.'
      context: Jan 2022 Greatest Hits. Two examples from RB's career. 'I was almost too scared to send it, but I clicked the Send button anyway.'
      module_sources:
      - MM-GH-JAN2022
    - id: HEUR-RB-268
      name: segment-on-registration
      statement: 'Ask registrants their #1 problem on registration pop-up. Segment into different email sequences and SLO offers based on answer. Example: 3 options (need funnel → DotComSecrets, need product
        → Expert Secrets, need traffic → Traffic Secrets). Different indoctrination pages per segment.'
      context: 'Mar 2022 Greatest Hits. ''Even if you only have one product, customize thank-you page and follow-ups to show how your SLO solves their #1 problem.'''
      module_sources:
      - MM-GH-MAR2022
    - id: HEUR-RB-269
      name: webinar-transcript-readers-convert
      statement: A huge percentage of buyers came from people who READ the full video (sales letter version). Many people will NEVER sit through a 90-minute presentation because it isn't their learning
        modality. Add 'Read Transcripts' option that pops up on exit — Agora-style.
      context: Mar 2022 Greatest Hits. Evergreen webinar funnel. Exit-intent triggers transcript option. 90% verbatim from presentation, cleaned up with headlines, subheadlines, images.
      module_sources:
      - MM-GH-MAR2022
    - id: HEUR-RB-270
      name: subtitles-burned-into-video
      statement: Even on a 90-minute webinar, many people watch videos silently. Having subtitles/transcripts burned into the video file will dramatically increase your consumption rate.
      context: Mar 2022 Greatest Hits. Evergreen webinar funnel page breakdown — one of key elements for increasing stick rate and consumption.
      module_sources:
      - MM-GH-MAR2022
    - id: HEUR-RB-271
      name: video-spoiler-box-below
      statement: Under the webinar video, add a 'spoiler' box showing what will be covered inside the presentation. Used like bullet points in a sales letter — one bullet could be the thing that gets people
        to WATCH the full presentation. Order button appears only after CTA in video.
      context: Mar 2022 Greatest Hits. Evergreen webinar funnel — spoiler box + delayed order button + urgency timer (48hr expiry after registration).
      module_sources:
      - MM-GH-MAR2022
    - id: HEUR-RB-272
      statement: 'Order Form Bump: 35-38% take rate on bump offers under $50. Price sweet spot is $27-$47. Above $50, sales almost stop completely. Copy MUST be 4 sentences max.'
      context: Funnel Labs Issue 1 - Order Form Bump specific conversion data and copy length rule.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 1 (Magnetic Marketing)
    - id: HEUR-RB-273
      statement: 'Order Form Bump front-end revenue lift: DCS Labs went from $9.95 to $24.01 per buyer (+$14.06) before any upsells, just from adding the bump.'
      context: Funnel Labs Issue 1 - specific revenue data.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 1 (Magnetic Marketing)
    - id: HEUR-RB-274
      statement: Free Plus Shipping gets ~3x more buyers than straight sale. Plus, a sales video for F+S is 100x easier to create than a sales video for a $37 product.
      context: Funnel Labs Issue 1 - F+S conversion multiplier.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 1 (Magnetic Marketing)
    - id: HEUR-RB-275
      statement: 'Invisible Funnel stats: 550 signed up, 85% show up rate, only 10% cancelled, 500 billed at $47 = $24,500 upfront, 6 people at $5,000 backend = $54,500 total.'
      context: Funnel Labs Issue 2 - Affiliate Bootcamp campaign numbers.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 2 (Magnetic Marketing)
    - id: HEUR-RB-276
      statement: 85% show up rate for Invisible Funnel webinar vs typical 30% for free webinars -- people who put credit card on file have massive commitment.
      context: Funnel Labs Issue 2 - show-up rate comparison.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 2 (Magnetic Marketing)
    - id: HEUR-RB-277
      statement: 'Invisible Funnel pre-pay option: 69% pre-paid, 31% took free option. Pre-pay dramatically reduces credit card fails and cancellations. Upsell: 41% take rate on $197 OTO.'
      context: Funnel Labs Issue 2 - Double Your Reading campaign stats.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 2 (Magnetic Marketing)
    - id: HEUR-RB-278
      statement: 'Two-step order form (shipping first, CC second): conversions on first page as high or HIGHER than basic squeeze page, even with 9 fields of information.'
      context: Funnel Labs Issue 1 - two-step form insight.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 1 (Magnetic Marketing)
    - id: HEUR-RB-279
      statement: 'ClickFunnels free trial: 200 signups/day but only 1.7% conversion rate click-to-trial. 32% put in credit card. Only 37.81% made it through trial to billing.'
      context: Funnel Labs Issue 5 - baseline SAAS metrics.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: HEUR-RB-280
      statement: 'ClickFunnels monthly churn curve: Month 1: 17.83%, Month 2: 15.72%, Month 3: 8.59%, Month 4: 5.16%, Month 5: 4.06%, Month 6: 3.02%, Month 7: 2.08%, Month 8: 1.48%, Month 9: 1.09%.'
      context: Funnel Labs Issue 5 - detailed SAAS churn data by month.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: HEUR-RB-281
      statement: Video Unlocker increased trial-to-paid stick rate from 37.81% to 46.84% -- a 23.88% improvement worth millions/year in found revenue.
      context: Funnel Labs Issue 5 - consumption-driven retention data.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: HEUR-RB-282
      statement: 'Replacing SAAS long-form sales page with webinar registration: page conversion jumped from 1.7% trial to 9.1% webinar registration + still 1% trial. Each registration = $35 average within
        5 days.'
      context: Funnel Labs Issue 5 - SAAS vs registration page test.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: HEUR-RB-283
      statement: 'Removing pricing table link: trials went UP 20% and webinar registrations jumped from 9.1% to 13.46% (41.91% increase). EPC went from $3.18 to $4.71.'
      context: Funnel Labs Issue 5 - pricing table removal test.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: HEUR-RB-284
      statement: Webinar promotional sequence closes 2x as many sales from the replay as from the live webinar -- over $250,000 in replay sales in 7 days.
      context: Funnel Labs Issue 4 - Perfect Webinar replay sequence performance.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 4 (Magnetic Marketing)
    - id: HEUR-RB-285
      statement: 'ClickFunnels 2.0 launch registration: 53% overall conversion rate -- 9,947 registered out of 18,742 visitors in first 3 days.'
      context: Funnel Labs Issue 6 - launch page conversion data.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 6 (Magnetic Marketing)
    - id: HEUR-RB-286
      statement: 'Micro-commitment quiz vs standard landing page: conversion rate increase of 95% (from 18% to 35%).'
      context: Funnel Labs Issue 7 - Funnel Catcher quiz pre-frame bridge data.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 7 (Magnetic Marketing)
    - id: HEUR-RB-287
      statement: 'Dream 100 monthly direct mail: Send physical gift every single month without fail. A single JV partner from Dream 100 has made Russell over $1 million each.'
      context: Funnel Labs Issue 8 - ROI of monthly gifting.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: HEUR-RB-288
      statement: 'Dream 100 hacking: Tellman Knudson called 49 people before getting first yes. Once he had one, the next 32 calls all said yes. Made $800,000 first year.'
      context: Funnel Labs Issue 8 - Tellman Knudson 49-call persistence story.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: HEUR-RB-289
      statement: If you can get 10% of your Dream 100 to actively promote you, that's enough to make tens of millions of dollars.
      context: Funnel Labs Issue 8 - Dream 100 conversion rate expectation.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: HEUR-RB-290
      statement: Claude Hopkins was paid $52K/year in 1907 ($1.39M equivalent today) just to create offers. His book Scientific Advertising is the foundation of all direct response.
      context: Funnelology - historical direct response reference.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: HEUR-RB-291
      statement: 'Survey funnel: use when product serves multiple segments that need different messaging. Route each segment to tailored video/offer.'
      context: Funnelology - survey funnel use case heuristic.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: HEUR-RB-292
      statement: Upsells that sell MORE of the same convert near zero. Upsells that sell the NEXT STEP convert at 20-30%. DCSLabs book on split testing upselling more split testing = 0%. Upselling traffic
        product = 23% instantly.
      context: DCS LIVE Session 3 - RB's own failed upsell experiments, next-step principle.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: HEUR-RB-293
      statement: 'Liz Benny webinar metrics: 800-1500 registrations/week at $1-3 per registrant. 1/3 show up live. 10-15% of live attendees buy at $1,000. Result: $40-60K/week from one weekly webinar.'
      context: DCS LIVE Session 2 - live coaching student's actual metrics.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 2 (Magnetic Marketing)
    - id: HEUR-RB-294
      statement: 'DotCom Secrets Labs free+shipping book: 10,000+ new dream clients. 150+ bought $10K coaching, 36 bought $25K coaching = $2.3M+ revenue. That''s $230 revenue per free book given away.'
      context: DCS LIVE Sessions 1-2 - specific lifetime value metrics of DCSLabs tripwire.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Sessions 1-2 (Magnetic Marketing)
    - id: HEUR-RB-295
      statement: 'Survival Life credit card knife funnel: 130,000 units sold in first month on Facebook. Total 400-500K buyers. Email list value: $22,000 per single email ad sold daily. Revenue: $1.7M/month
        at peak.'
      context: DCS LIVE Sessions 2-3 - concrete case study numbers.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Sessions 2-3 (Magnetic Marketing)
    - id: HEUR-RB-296
      statement: 'Venus Factor (ClickBank #1 health/fitness): 4 pages total make $30-50K/day. Front end $47, upsells at $37, $79, $19.95. Cost to funnel hack: $47.'
      context: DCS LIVE Session 3 - ClickBank funnel hacking with real numbers.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: HEUR-RB-297
      statement: 'Porter Stansbury/Agora: almost $1B/year selling digital financial newsletters. ''The only way to compete with us is to copy us.'' Hundreds of millions in testing data -- the case for modeling
        over innovating.'
      context: DCS LIVE Session 3 - Dan Kennedy seminar story.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: HEUR-RB-298
      statement: 'Video brochure cards: $30 each from China, 100 cards = $3,000 total. Almost every recipient called back, many made unboxing videos creating viral reach.'
      context: DCS LIVE Session 4 - ClickFunnels launch Dream 100 tactic with costs.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 4 (Magnetic Marketing)
    - id: HEUR-RB-299
      statement: 'NYT bestseller threshold: ~11,000 copies. RB had 202 Dream 100 members competing for a Ferrari to drive book sales past this threshold.'
      context: DCS LIVE Session 4 - DotCom Secrets book launch strategy.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 4 (Magnetic Marketing)
    - id: HEUR-RB-300
      statement: 'RB''s million-dollar coaching deal: $100K upfront + 10% of client''s revenue until $1M total paid. Full done-for-you service -- copy, funnels, everything built for client.'
      context: DCS LIVE Session 1 - highest-ticket offer in value ladder.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 1 (Magnetic Marketing)
    - id: HEUR-RB-301
      rule: When you bomb at speak-to-sell, the problem is almost never your teaching -- it's your pitch. You can blow minds with content and still sell zero if you don't have a structured close. Teaching
        alone does not convert to sales.
      context: MM Welcome -- RB recounting bombing at speaking events early in career. Thought teaching great content = sales. Learned from DK that platform selling requires specific pitch mechanics separate
        from content delivery.
      module_sources:
      - MM-08-Welcome
    - id: HEUR-RB-302
      rule: When you find a working webinar/presentation, deploy it in every media channel you can that at least breaks even (if you have a back end). A winning message should be converted to direct mail,
        video ads, email, stage -- every possible deployment. Don't create new content when your winner hasn't been fully deployed.
      context: MM Welcome -- DK's multi-media deployment principle as applied by RB. ClickFunnels webinar went from live to automated to multiple media. Same message, maximum distribution.
      module_sources:
      - MM-08-Welcome
    - id: HEUR-RB-303
      rule: The difference between a standing ovation and getting credit cards is massive. Getting applause is easy -- getting people to buy requires a completely different skill set. Never confuse audience
        engagement with conversion ability.
      context: 'MM Welcome -- DK teaching RB about platform selling. Standing ovation vs credit cards distinction. Joan Rivers example: amazing entertainer, sold 2 units first attempt because she skipped
        the 16-minute pitch.'
      module_sources:
      - MM-08-Welcome
    - id: HEUR-RB-304
      rule: 'Fatal Flaw #1 of Funnels: Focusing only on funnel mechanics without understanding the marketing fundamentals underneath. A funnel is just a delivery mechanism for a marketing message -- if
        the message sucks, the funnel fails regardless of design.'
      context: MM Welcome -- First of RB's Five Fatal Flaws framework. The realization that waking up one day and questioning whether money was coming from the funnel or from good marketing was the first
        shift.
      module_sources:
      - MM-08-Welcome
    - id: HEUR-RB-305
      rule: As acquisition costs rise (and they always do), whoever figures out how to spend the most for their lead and their sale wins. They buy speed, scale, discouragement of competition, and sustainability.
        You must figure this out without going bankrupt -- you need a shorter runway than Uber's 12 years.
      context: MM Welcome -- DK's 'whoever can spend the most to acquire a customer wins' applied to modern context. RB connecting DK's principle to Facebook/Apple privacy wars driving costs up. Mathematical
        gravity of direct marketing.
      module_sources:
      - MM-08-Welcome
  L4_FRAMEWORKS:
    count: 109
    items:
    - id: FW-RB-001
      name: The Perfect Webinar Framework
      components: '1) Introduction/Rapport (bold promise, hook to end, qualify, future pace), 2) The One Thing / Big Domino, 3) Origin Story / Epiphany Bridge, 4) Secret #1 -- Vehicle false belief, 5) Secret
        #2 -- Internal false belief, 6) Secret #3 -- External false belief, 7) Transition (ask permission), 8) The Stack, 9) Closes (if-all, two choices, urgency/scarcity, countdown Q&A)'
      application: Master framework for any sales presentation -- webinar, stage, Facebook Live, email sequence. Works for $500-$2,500 products.
      module_sources:
      - M06
      - M07
      - M08
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.152-191
        enrichment: 'Perfect Webinar Structure (4 Parts, 66+ slides): Part 1 -- Introduction/Rapport (slides 1-14), Part 2 -- The One Thing + Origin Story (slides 15-20), Part 3 -- The Three Secrets with
          Epiphany Bridges (slides 21-48), Part 4 -- The Stack + 16 Closes (slides 49-66+).'
      - pdf_source: Expert Secrets
        page_ref: p.232-233
        enrichment: 'Perfect Webinar Cheat Sheet (5 Questions): (Q1) What''s the new opportunity I''m offering? (Q2) What is the one Big Domino? (Q3) What special offer/stack can I create? (Q4) What is
          my Epiphany Bridge origin story? (Q5) What are the 3 false beliefs and corresponding stories? Can be completed in 15 minutes.'
      - pdf_source: Modules & Scripts
        page_ref: PDF-12-FHAT-Event PAGE 1-4
        enrichment: 'FHAT Event Worksheet (6-Part Implementation): Part 1 = The What and How. Part 2 = The One Thing / Big Domino / Hook. Part 3 = Origin story. Part 4 = False belief patterns and 3 secrets.
          Part 5 = The Stack Slide. Part 6 = Epiphany bridges for each secret.'
    - id: FW-RB-002
      name: The Stack Slide Framework
      components: 1) Introduce Component + assign value, 2) Show Stack Slide with running total, 3) Repeat for each component, 4) Show Final Stack with total value, 5) Three if-all closes, 6) Reveal 90%
        discount price, 7) Restack one final time, 8) Final slide with offer recap + green price + URL + countdown
      application: Closing technique for any offer presentation. Re-show all previous components stacked together before adding the next.
      module_sources:
      - M06
      - M07
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 157
        enrichment: The Stack improved stage closing from 5-10% to consistently 20%+ of the room. Visual accumulation of value overwhelms price objection.
    - id: FW-RB-003
      name: Mass Movement Triangle
      components: '3 essential elements: 1) Charismatic Leader (the expert), 2) Future-Based Cause (the mission), 3) New Opportunity (the vehicle). All three are required.'
      application: Foundation of Expert Secrets. Build all three pillars before launching your movement.
      module_sources:
      - M00
      - M01A
      - M06
    - id: FW-RB-004
      name: The Secret Formula Framework
      components: '4 questions: 1) WHO is your dream customer? 2) WHERE are they congregating? 3) What BAIT will attract them? 4) What RESULT will you take them to?'
      application: Master framework for DotCom Secrets. Answer these before building any funnel or offer.
      module_sources:
      - M02
      - M06
    - id: FW-RB-005
      name: The Value Ladder Structure
      components: 'Bottom: Free/low-ticket ($0-$20). Middle: Medium-ticket ($300-$3K). Top: High-ticket ($5K-$100K+). Each level provides enough value that the customer wants to ascend.'
      application: Design your complete product ecosystem as a ladder.
      module_sources:
      - M02
      - M08
    - id: FW-RB-006
      name: New Opportunity Framework (Switch vs Stack)
      components: Switch = new vehicle replacing current approach (done ONCE). Stack = new tools layered on top of the new opportunity (done repeatedly). Front-end = Switch. Back-end = Stack.
      application: One switch to acquire, then stacks to monetize and expand.
      module_sources:
      - M01B
      - M06
    - id: FW-RB-007
      name: The Big Domino Statement
      components: 'Template: ''If I can make [target] believe that [new opportunity] is the key to [what they desire most] and is only attainable through [my specific vehicle], then all objections become
        irrelevant.'''
      application: Define the single core belief your entire presentation must establish.
      module_sources:
      - M05
      - M06
    - id: FW-RB-008
      name: Three False Beliefs Framework / Three Secrets Structure
      components: 'Secret #1 = Vehicle/New Opportunity false belief; Secret #2 = Internal false belief about ability; Secret #3 = External false belief about circumstances. Each secret is an Epiphany Bridge
        story.'
      application: Content structure for the Perfect Webinar body.
      module_sources:
      - M05
      - M06
      - M07
    - id: FW-RB-009
      name: Attractive Character Framework
      components: '4 Elements: Backstory, Parables, Character Flaws, Polarity. 4 Identities: Leader, Adventurer/Crusader, Reporter/Evangelist, Reluctant Hero. 6 Storylines: Loss/Redemption, Us vs Them,
        Before/After, Amazing Discovery, Secret Telling, Third-Party Testimonials.'
      application: Choose your type and deliberately incorporate all elements into content and marketing.
      module_sources:
      - M01A
      - M03
    - id: FW-RB-010
      name: One Sentence Persuasion (Blair Warren)
      components: 'Touch all 5 elements: 1) Encourage their dreams, 2) Justify their failures, 3) Allay their fears, 4) Confirm their suspicions, 5) Help them throw rocks at their enemies'
      application: Use in sales copy, webinars, emails. All 5 must be present within ~5 minutes.
      module_sources:
      - M01A
    - id: FW-RB-011
      name: Future-Based Cause / Culture-Building Framework
      components: 1) Campaign Slogan (future-oriented), 2) Four-Minute Mile Moment (proof it's possible), 3) Self-Identifier (T-shirt test), 4) Title of Liberty / Manifesto
      application: Build each element to create a cause people want to join.
      module_sources:
      - M01A
      - M06
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.25-32
        enrichment: '6 Rules for Charismatic Leaders: (1) Have an attractive character, (2) Have absolute certainty, (3) Don''t try to be all things to all people, (4) Flaws are assets, (5) Use self-deprecating
          humor, (6) Hold nothing back -- radical transparency.'
    - id: FW-RB-012
      name: Market Depth Framework (3 Levels)
      components: 'Level 1: Core Market (health, wealth, relationships). Level 2: Sub-Market. Level 3: Created Niche (your unique combination).'
      application: Map your business to all 3 levels. Ensure you're at Level 3.
      module_sources:
      - M01A
    - id: FW-RB-013
      name: How-To-Without Headline Formula
      components: 'Template: ''How to [greatest desire] without [largest pain/fear].'' ~50% of Russell''s most successful offers use this format.'
      application: Starting headline for every webinar and sales presentation.
      module_sources:
      - M01B
      - M06
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.75-76
        enrichment: 'Opportunity Switch Headline Formula: ''How to [desired result] without [pain point they fear] -- even if [common objection].'' The ''without'' eliminates the biggest fear. The ''even
          if'' pre-handles the top objection.'
    - id: FW-RB-014
      name: Who-What Statement
      components: 'Template: ''I teach [WHO] how to [WHAT]''. Must be specific enough to attract dream customer and repel non-ideal.'
      application: Positioning statement. If you can't fill in both blanks, your niche isn't defined.
      module_sources:
      - M01B
      - M06
    - id: FW-RB-015
      name: Status Integration Framework
      components: 'For every element: Does it increase perceived status? (good) Decrease? (bad) Neutral? (mediocre). Must demonstrate clear net status increase.'
      application: Audit every benefit and testimonial through the status lens.
      module_sources:
      - M01B
    - id: FW-RB-016
      name: Ask Campaign Framework (6 Steps)
      components: 1) Go live or email; 2) Ask specific question; 3) Collect 100+ responses; 4) Categorize into themes; 5) Create offer around top themes; 6) Repeat quarterly
      application: Discover what your market wants. Russell used this to create ClickFunnels.
      module_sources:
      - M01B
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.78-80
        enrichment: Ask Campaign requires 100 survey responses to be statistically meaningful. From those 100 responses, 6-8 core questions/pain points will emerge that form the structure of your masterclass
          or product.
    - id: FW-RB-017
      name: Results-First Launch Sequence (1->10->100)
      components: 'Phase 1: Give to 1 person free, get result. Phase 2: Give to 10. Phase 3: Give to 100. Then launch with proof.'
      application: Build proof through progressive beta testing.
      module_sources:
      - M01B
    - id: FW-RB-018
      name: Belief-Building Stack
      components: Hope -> Faith -> Identity -> Manifesto -> Enemy. Sequential -- can't skip to Identity without Hope and Faith.
      application: Build beliefs in this order.
      module_sources:
      - M01A
    - id: FW-RB-019
      name: The $20K/Month Reverse Engineering Formula
      components: $20K = $10K continuity ($50x200) + $10K back-end ($5Kx2). Need 150 buyers/month. At 5% = 3,000 clicks = 100/day.
      application: Reverse-engineer exactly how much traffic you need.
      module_sources:
      - M02
    - id: FW-RB-020
      name: Three Core Funnel Types
      components: 1) Tripwire ($0-$20, free+shipping); 2) Perfect Webinar ($300-$3K); 3) High Ticket ($5K+, application + phone). Each covers a specific price range.
      application: Choose ONE based on your price point.
      module_sources:
      - M02
      - M04
    - id: FW-RB-021
      name: The Traffic Trifecta / Five Distribution Channels
      components: 'Three traffic types across 5 channels: Email (mandatory), Facebook, YouTube, Podcasts, Blog. All traffic converts to email list.'
      application: Email is mandatory + pick one additional channel.
      module_sources:
      - M02
      - M03
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 55-56
        enrichment: 'Traffic Conversion Funnel: Controlled traffic -> Squeeze Page (one option: give email or leave) -> Owned traffic. Uncontrolled traffic -> Blog with squeeze page as top third -> Owned
          traffic. Two distinct funnels for the two non-owned traffic types.'
    - id: FW-RB-022
      name: Dream Customer Profile Framework
      components: 1) Define who; 2) Find pictures; 3) Write profiles; 4) Ensure they have money; 5) Create bait for THAT person; 6) Repel non-ideal.
      application: Complete before creating any offer or funnel.
      module_sources:
      - M02
    - id: FW-RB-023
      name: The Funnel Diagnostic Framework
      components: Examine each metric (squeeze %, front-end %, OTO1-3 %). Find the ONE broken piece. Fix ONLY that. Usually 2-3 iterations.
      application: Never scrap a whole funnel. Diagnose metric by metric.
      module_sources:
      - M02
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 86
        enrichment: 'Five Variables Diagnostic: When a campaign fails, it''s always one of five things -- Demographics, Offer, Landing Page, Traffic Source, or Ad Copy. Diagnose by isolating variables.
          Critical rule: never move forward with two unknowns.'
      - pdf_source: DotCom Secrets
        page_ref: PAGE 88
        enrichment: Never move forward with two unknowns. One unknown in your campaign variables is acceptable. Two unknowns means don't enter that market yet. Must know at least 4 of 5 before launching.
      - pdf_source: DotCom Secrets
        page_ref: PAGE 86-88
        enrichment: 'Five Variables of Successful Campaigns: (1) Demographics, (2) Offer, (3) Landing Page, (4) Traffic Source, (5) Ad Copy. Must know at least 4 before launching. Diagnostic: isolate variables
          when campaign fails.'
    - id: FW-RB-024
      name: The Competitor Research Stack
      components: '4 layers: 1) ClickBank Marketplace; 2) SimilarWeb; 3) AdBeat; 4) Buy competitor products.'
      application: Complete all 4 layers before building your own funnel.
      module_sources:
      - M02
    - id: FW-RB-025
      name: The SOAP Opera Sequence
      components: 'Email 1: High Drama opening; Email 2: Backstory -> Wall; Email 3: Epiphany -> Product. Each hooks to the next.'
      application: First 3 emails after opt-in -- the critical bonding sequence.
      module_sources:
      - M03
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.234-236
        enrichment: Soap Opera Sequence + Perfect Webinar = Email Epiphany Funnel. Each email corresponds to one section of the Perfect Webinar (Origin Story, Secret 1, Secret 2, Secret 3, Stack). Each
          email ends with a hook to the next, like a soap opera cliffhanger.
      - pdf_source: Expert Secrets
        page_ref: p.234-236
        enrichment: 'Email Epiphany Funnel Structure: Email 1 -- Origin Story + hook. Email 2 -- Secret #1 (Vehicle belief). Email 3 -- Secret #2 (Internal belief). Email 4 -- Secret #3 (External belief).
          Email 5 -- The Stack + CTA. Each email can contain story OR link to video.'
    - id: FW-RB-026
      name: Daily Seinfeld Email System
      components: Daily emails 'about nothing' -- tell stories, weave back to product. Copy each to blog for content.
      application: Ongoing daily email engagement after SOAP Opera completes.
      module_sources:
      - M03
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 78
        enrichment: 'Daily email frequency maximizes revenue. Progression: monthly, twice monthly, weekly, twice weekly, every other day, daily -- revenue increased at each frequency increase. ''If I don''t
          email my list every day, I lose money every day.'''
      - pdf_source: DotCom Secrets
        page_ref: PAGE 78
        enrichment: Seinfeld emails should be 90% entertainment and 10% content. Readership, opens, clicks, and sales all skyrocketed when switching from 100% content to this ratio.
    - id: FW-RB-027
      name: Communication Funnel Architecture
      components: Traffic -> Opt-in -> SOAP Opera (3 emails) -> Daily Seinfeld -> Ascend through value ladder offers.
      application: Overall email marketing architecture.
      module_sources:
      - M03
    - id: FW-RB-028
      name: High Drama Story Opening / Backstory-Wall-Epiphany Arc
      components: 'Start at the point of high drama, not the beginning. Then: Backstory -> Wall -> Epiphany -> Product.'
      application: Core narrative structure for any persuasive story.
      module_sources:
      - M03
      - M05
    - id: FW-RB-029
      name: Seven Phases Of A Funnel
      components: 1) Traffic Temperature, 2) Pre-Frame Bridge, 3) Qualify Subscribers, 4) Qualify Buyers, 5) Identify Buyers In Heat, 6) Age and Ascend, 7) Change Selling Environment.
      application: Master framework for designing any funnel from first touch to high-ticket close.
      module_sources:
      - M04
      pdf_enrichments:
      - pdf_source: Network Marketing Secrets
        page_ref: PAGE 60-64
        enrichment: 'Bridge Funnel Structure: Page 1 = Curiosity squeeze page with ''How to [desire] without [pain]'' headline + email capture. Page 2 = Viral Loop video (Epiphany Bridge + Demo + CTA) with
          button linking to company/distributor page.'
    - id: FW-RB-030
      name: The 23 Building Blocks Of A Funnel
      components: Pre-Frame (7 types), Qualify Subscribers (7 types), Qualify Buyers (5 types), Buyers In Heat (4 types), Age & Ascend (multiple), Change Environment (multiple). Pick one per category.
      application: Funnel assembly -- select one block per phase.
      module_sources:
      - M04
    - id: FW-RB-031
      name: The 100 Visitor Test
      components: 'Compare: 100 visitors to $197 direct (1% = $197, 1 buyer) vs free+shipping (8% = ~2x revenue, 8 buyers).'
      application: Deciding between direct sale vs free-plus-shipping.
      module_sources:
      - M04
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 123-124
        enrichment: 'One-Hundred-Visitor Test: Send 100 visitors to your funnel. 1% conversion at $197 = $197/100 visitors. Compare: 8% free+shipping with 25% upsell at $197 = $394/100 visitors (2x revenue).'
    - id: FW-RB-032
      name: The Breakeven Funnel Formula
      components: Build funnel where $1 in = $1 out. If less, add upsell. Once breakeven, list grows free, backend is profit.
      application: Primary goal of any funnel optimization.
      module_sources:
      - M04
    - id: FW-RB-033
      name: Epiphany Bridge Script (8-Element Story Framework)
      components: 1) Backstory, 2) Desires, 3) The Wall, 4) The Epiphany, 5) The Plan, 6) The Conflict, 7) The Achievement, 8) The Transformation
      application: Master story structure for any selling situation.
      module_sources:
      - M05
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.117-119
        enrichment: 'Five Turning Points of Conflict in every Epiphany Bridge story: (1) The initial desire, (2) The first wall/obstacle, (3) The epiphany moment, (4) The plan that emerges, (5) The conflict
          during execution. These 5 points create the emotional arc.'
    - id: FW-RB-034
      name: Hero's Two Journeys Framework
      components: 'Journey #1: Achievement (external goal). Journey #2: Transformation (internal change). Audience cares more about transformation.'
      application: Structuring any origin story or case study.
      module_sources:
      - M05
    - id: FW-RB-035
      name: Plot Statement Framework
      components: 'CHARACTER + DESIRE + CONFLICT. Template: ''[Character] had a desire to [desire], but conflict: [conflict].'''
      application: Outlining any story before writing.
      module_sources:
      - M05
    - id: FW-RB-036
      name: Five Rapport Building Elements
      components: 'Include at least 2 of: 1) Victim, 2) Jeopardy, 3) Likable, 4) Funny, 5) Powerful.'
      application: Opening 10% of any story or presentation.
      module_sources:
      - M05
    - id: FW-RB-037
      name: False Belief Replacement Framework
      components: '4 columns: 1) False Chain of Belief, 2) The Experience, 3) The Story, 4) New Epiphany Bridge'
      application: Preparing to break specific objections.
      module_sources:
      - M05
    - id: FW-RB-038
      name: Kinda Like Bridge Framework
      components: When hitting jargon, say 'it's kinda like [something they understand].' Bridge the unknown to the known.
      application: Explaining complex concepts.
      module_sources:
      - M05
    - id: FW-RB-039
      name: The If-All Close
      components: 'Three sequential if-all statements: ''If ALL this did was [result], would it be worth [value]?'' Three yeses at full price = they cannot refuse the discounted real price.'
      application: Price justification and close technique after the Stack.
      module_sources:
      - M06
      - M07
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.195-205
        enrichment: 'The 16 Closes (in order): (1) Money Is Good, (2) Disposable Income, (3) Money Replenishes, (4) Break Old Habits, (5) Information Alone, (6) Money or Excuses, (7) Your Two Choices, (8)
          Their Two Choices, (9) Us vs. Them, (10) The Hand Hold, (11) Say Goodbye, (12) Now & Later, (13) Only Excuses, (14) Reluctant Hero, (15) If You Only Got, (16) The Close Close.'
    - id: FW-RB-040
      name: The Two Choices Close
      components: 'Option 1: do nothing. Option 2: make this tiny investment for massive value. Frame so one looks foolish.'
      application: Close technique after the Stack and If-All closes.
      module_sources:
      - M07
    - id: FW-RB-041
      name: Perfect Webinar Funnel Sequence
      components: Registration Page > Thank You Page with origin story video + upsell > Indoctrination Videos > Live Webinar > Encore Replay > Cart Close.
      application: Complete funnel architecture surrounding the Perfect Webinar.
      module_sources:
      - M07
    - id: FW-RB-042
      name: Dream 100 Strategy
      components: 1) Identify 100+ people with lists, 2) Build genuine relationships first, 3) Provide value before asking, 4) Approach with stats when ready. Each JV = $100K-$1M potential.
      application: Primary traffic strategy for scaling webinar revenue.
      module_sources:
      - M07
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.245
        enrichment: 'Integration Marketing: Instead of one-time promotions, integrate your offer into the ongoing sales flow of your Dream 100. Put your product on their thank-you pages, in their PS, co-create
          products. This creates continuous customer streams, not one-time spikes. Accounts for ~20% of traffic.'
      - pdf_source: Network Marketing Secrets
        page_ref: PAGE 50-53
        enrichment: 'Three Levels of Duplication: Level 1 = you sign people up directly. Level 2 = you ask them to bring people into YOUR funnel and you presell for them. Level 3 = you share funnel links
          so they copy your funnel, replace videos with theirs, and point buttons to their own distributor links.'
      - pdf_source: Expert Secrets
        page_ref: p.244-245
        enrichment: 30% of traffic from Dream 100 promotions, 40% from paid ads targeting Dream 100 audiences, 10% from organic/SEO, 20% from integration marketing. This is the ideal traffic mix.
      - pdf_source: Expert Secrets
        page_ref: p.242
        enrichment: 'Dream 100 list composition: 25 list owners + 25 bloggers + 25 podcasters + 25 social media influencers = 100 people who already have your dream customers'' attention.'
      - pdf_source: Expert Secrets
        page_ref: p.240
        enrichment: 'Dream 100: After 4 months of consistent outreach with zero response, Chet Holmes landed Xerox. By month 6, he had 29 of 167 targets. Patience + pig-headed determination = breakthrough.'
      - pdf_source: Expert Secrets
        page_ref: p.244-245
        enrichment: '3 Promotion Strategies for Dream 100: Strategy 1 -- Get them to promote your webinar to their audience (30% of traffic). Strategy 2 -- Run paid ads targeting their followers (40% of
          traffic). Strategy 3 -- Integration marketing into their sales flow (20% of traffic).'
    - id: FW-RB-043
      name: Two-Step Free+Shipping Funnel Framework
      components: 'Step 1: shipping address | Step 2: credit card | Upsell 1 -> Downsell -> Upsell 2 -> Thank You.'
      application: Frontend funnel for physical products.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 124-126
        enrichment: 'Free-Plus-Shipping Order Form Bump Strategy: (1) Free item, (2) Charge shipping $4.95-$9.95, (3) Add bump checkbox at $37, (4) Add OTO at $97-$197, (5) Add downsell. Expected: 34% bump
          rate, $66 average revenue per free item.'
    - id: FW-RB-044
      name: Automated Webinar Funnel Framework
      components: Registration with 'watch replay now' option -> Webinar -> 4 email segments (Subscribers, Showed-up, Watched-full, No-shows) -> Tailored follow-up.
      application: Evergreen version that sells 24/7.
      module_sources:
      - M08
    - id: FW-RB-045
      name: Invisible Funnel Framework
      components: Registration $0 upfront with credit card -> 2-4 hours teaching, no selling -> 'Loved it? Do nothing, I'll bill $97' -> Soft close to backend.
      application: Trust-based selling through law of reciprocity. 85% show-up, ~90% keep and pay.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 160
        enrichment: 'Invisible Funnel results: 550 registrations, 85% show rate (vs 30% for free webinars), 90% payment rate (only 10% cancel), $23.5K revenue from $47 price point.'
      - pdf_source: DotCom Secrets
        page_ref: PAGE 159-165
        enrichment: 'Invisible Funnel Webinar Method: (1) Create 3-4 hour deep-dive training, (2) Attendees register with credit card, (3) ''Try before you buy'' -- only charged IF they don''t cancel, (4)
          85% show rate vs 30% free, (5) 90% payment rate.'
    - id: FW-RB-046
      name: Product Launch Funnel Framework (4 Videos)
      components: 'V1: Wow & How | V2: Transformational Education | V3: Ownership Experience | V4: The Offer. Released 3-5 days apart.'
      application: 4-video launch sequence for maximum anticipation.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 167-170
        enrichment: 'Product Launch Funnel (4 videos): Video 1: Wow and How (pattern interrupt, big promise). Video 2: Transformational Education (teach, build belief). Video 3: Ownership Experience (let
          them experience result). Video 4: The Offer (present with Stack). One video per day over 4 days.'
      - pdf_source: Expert Secrets
        page_ref: p.237-238
        enrichment: 'Epiphany Product Launch Funnel: (1) Intro video with Origin Story + opt-in. (2) Video #1 = Secret #1. (3) Video #2 = Secret #2. (4) Video #3 = Secret #3. (5) Video #4 = The Stack. (6)
          Send non-webinar-attendees through this sequence.'
    - id: FW-RB-047
      name: High-Ticket Application Funnel Framework
      components: Case study video -> Application -> Homework page with emotional pre-frame -> Phone call (setter/closer).
      application: Backend funnel for $5K-$25K+ offers.
      module_sources:
      - M08
    - id: FW-RB-048
      name: Star-Story-Solution Script Framework
      components: 'STAR: Pattern interrupt -> Core desires -> Agitate -> One big thing -> Introduce character. STORY: High drama -> Backstory -> Wall -> Epiphany -> Path -> Success -> Conspiracy -> Case
        studies. SOLUTION: Value build -> Price -> Close -> Guarantee -> Scarcity.'
      application: Complete sales script for $17-$197 products.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 139-147
        enrichment: 'Star/Story/Solution Script (44 pieces in 3 sections): Section 1: STAR (pattern interrupt, core promise, CTA preview). Section 2: STORY (high drama, backstory, wall, epiphany, plan,
          results). Section 3: SOLUTION (present offer, build value, stack, guarantee, scarcity, final CTA).'
    - id: FW-RB-049
      name: Who-What-Why-How Script Framework
      components: 'Who am I? -> What do I have? -> Why do you need it? -> How do you get it? Plus optional: The Catch, Urgency, Guarantee, Recap.'
      application: Simplest script for free+shipping and squeeze pages up to $7.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 133-135
        enrichment: 'Who/What/Why/How Script for Two-Step Free+Shipping Funnel: Page 1: Squeeze page with bait. Page 2: Sales page -- WHO are you? WHAT do you have? WHY do I need it? HOW can I get it? Page
          3: Order form with bump. Page 4-5: OTO upsells.'
    - id: FW-RB-050
      name: High-Ticket Two-Step Sales Script / Four Commitments Close
      components: 'SETTER: Intro -> Qualify -> Blast -> Posture -> Probe -> Pass. CLOSER: Time? Decision maker? Resources? Knowledge? -> Close.'
      application: Complete phone sales script for $5K-$25K+ offers.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 173
        enrichment: 'High-ticket two-step process: reduced from 60 salespeople to 2 with same revenue output by using setter+closer model with application funnel.'
      - pdf_source: Expert Secrets
        page_ref: p.218
        enrichment: The 4-Question Close is for offers priced $2,997 to $100,000. At these prices, you cannot close on a webinar -- you need a personal conversation.
      - pdf_source: Expert Secrets
        page_ref: p.218-226
        enrichment: 'The 4-Question Close Script: Phase 1 (5-10 min) -- Build rapport. Phase 2 (20-30 min) -- Ask the 4 Questions, let them talk 80%. Phase 3 (10-15 min) -- Present solution mapped to THEIR
          words. Phase 4 (5-10 min) -- Handle logistics. Total: 45-60 minutes.'
      - pdf_source: Modules & Scripts
        page_ref: PDF-07-The-Funnels PAGE 4-6
        enrichment: 'The 4-Question High-Ticket Close exact language: Q1 = ''If we worked together and I taught you everything, what would make you believe this was the best decision you ever made?'' Q2
          = ''Why don''t you have it yet? What''s been holding you back?'' Q3 = ''What resources do you have that you''re not utilizing 100%?'' Q4 = ''Do you want me to help you?'' Then stop talking until
          they answer.'
      - pdf_source: DotCom Secrets
        page_ref: PAGE 173-184
        enrichment: 'High-Ticket Two-Step Script: Step 1 SETTER (15-30 min): Build rapport, ask about situation, identify pain, present application, set appointment. Step 2 CLOSER (45-90 min): Recap application,
          deep dive into pain, present high-ticket offer with Stack, handle objections, close.'
    - id: FW-RB-051
      name: Downsell Strategy Framework
      components: 'Upsell rejected -> Option A: Payment plan | Option B: Shift format (physical to digital) | Option C: Different offer. NEVER: Incremental price drops.'
      application: Three acceptable strategies, one forbidden.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: DotCom Secrets
        page_ref: PAGE 136
        enrichment: 'Three OTO Structures: (1) The Next Thing -- logical next step, (2) Do It Faster -- speed/shortcut tool, (3) Need Help? -- done-for-you service or coaching.'
      - pdf_source: DotCom Secrets
        page_ref: PAGE 136-138
        enrichment: 'OTO Script Structure: (1) ''Wait! Your order is not yet complete!'' (keep loop open), (2) Acknowledge smart purchase, (3) One-sentence pitch of next offer, (4) Urgency -- truly one
          time only, (5) If they say no -> downsell with payment plan.'
    - id: FW-RB-052
      statement: 'Hook, Story, Offer: Every piece of marketing must have a hook to grab attention, a story to build connection, and an offer to drive action. The hook stops the scroll, the story creates
        desire, the offer converts.'
      context: The universal marketing framework. Applies to ads, posts, emails, videos, landing pages -- every customer touchpoint.
      pdf_source: Traffic Secrets
      page_ref: PAGE 60-65
      original_pdf_id: Traffic FW-RB-PDF-002
    - id: FW-RB-053
      statement: 'Fill Your Funnel Framework (6 Steps): 1) Understand history and goal of platform, 2) Find your Dream 100, 3) Identify publishing strategy and create plan, 4) Work your way in, 5) Buy your
        way in, 6) Fill your funnel.'
      context: The master framework applied to every traffic platform (Instagram, Facebook, Google, YouTube, podcasts, and any future platform). Repeatable and platform-agnostic.
      pdf_source: Traffic Secrets
      page_ref: PAGE 143-146, 272-273
      original_pdf_id: Traffic FW-RB-PDF-003
    - id: FW-RB-054
      statement: '3 Closes in Follow-Up Funnels: Close #1 Emotion (storytelling, identity), Close #2 Logic (case studies, data, ROI), Close #3 Fear (urgency, scarcity, deadlines).'
      context: Structure follow-up sequences with emotion first (50% of buyers), logic second (30%), fear/urgency third (20%). Maps to the buyer psychology distribution.
      pdf_source: Traffic Secrets
      page_ref: PAGE 118-120
      original_pdf_id: Traffic FW-RB-PDF-004
    - id: FW-RB-055

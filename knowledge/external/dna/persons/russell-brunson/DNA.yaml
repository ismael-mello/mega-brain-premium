    - id: FW-RB-069
      name: The 31 Funnel Building Blocks
      components: '6 phases, each with 4-7 interchangeable options: (1) Pre-frame [quiz/blog/video/email/pre-sell page], (2) Qualify Subscribers [squeeze/free+ship/webinar reg/free account], (3) Qualify
        Buyers [free+ship/trial/tripwire/SLO/straight sale], (4) Identify Buyers-in-Heat [OTO/downsell/bump/recommend], (5) Age Relationship [launch/webinar/autowebinar/teleseminar/daily Seinfeld], (6)
        Change Environment [application/phone/seminar/face-to-face]'
      application: Build funnels by selecting ONE block per phase. Test by swapping individual blocks -- never rebuild the entire funnel. If you replace BDR with advertisements, you get a scalable traffic
        funnel.
      module_sources:
      - DCS-IGNITE
      raw_source: knowledge/external/sources/russell-brunson/raw/05._Dotcom_Secrets_Ignite/transcription_06
    - id: FW-RB-070
      name: The Secret Formula (4 Questions)
      components: (1) Who is your dream customer? (2) Where do they congregate? (3) What's the bait to attract them? (4) What result do you want to give them?
      application: Foundation question-set for any business or funnel. Must answer all 4 before building anything. This is the DCS-Ignite live presentation of the same framework in FW-RB-001/MM-RB-001 --
        confirms this was Russell's signature workshop opening.
      module_sources:
      - DCS-IGNITE
      - M02
      raw_source: knowledge/external/sources/russell-brunson/raw/05._Dotcom_Secrets_Ignite/transcription_01
    - id: FW-RB-071
      name: Pre-Sell Page Affiliate Strategy (Andre Chaperon Method)
      components: (1) Write a story-based article that creates curiosity and an open loop, (2) Page ends with no resolution -- only a link 'to find out more', (3) Reader lands on the actual sales page already
        pre-sold. Story does NOT sell -- it creates curiosity and redirects.
      application: Affiliate marketing strategy that can 2-3x conversions by warming up traffic before they see the sales page. The pre-sell page owns the customer relationship while the sales page closes.
      module_sources:
      - DCS-IGNITE
      raw_source: knowledge/external/sources/russell-brunson/raw/05._Dotcom_Secrets_Ignite/transcription_06
    - id: FW-RB-072
      name: Two-Part Sale Architecture
      components: '(1) SET Call: Introduction + Blast (story/pain) + Probe (financial + emotional qualification), (2) Gap Period: 3 Homework Assignments to build commitment, (3) CLOSE Call: Re-elevate emotion
        + Present offer + Handle objections + Collect payment, (4) COMPLIANCE Call: Non-salesperson records commitment, sets expectations'
      application: Complete high-ticket phone sales system. The SET call never sells - it qualifies and emotionally primes. The GAP builds investment. The CLOSE harvests. The COMPLIANCE locks retention.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Set_Script.txt
    - id: FW-RB-073
      name: Four Commitments Framework
      components: '(1) TIME: ''Are you willing to commit 5-10 hours per week?'', (2) DECISION: ''Are you the decision maker or do you need to talk to someone?'', (3) RESOURCES/MONEY: ''Do you have access
        to funds or credit to invest in yourself?'', (4) KNOWLEDGE: ''Are you coachable and willing to follow a system?'''
      application: Qualification framework used during SET call. All 4 commitments must be 'yes' before scheduling close call. If married and spouse not on call, reschedule with spouse present.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Set_Script.txt
    - id: FW-RB-074
      name: SET Script Structure
      components: '(1) Introduction: Name, role, congratulations on booking, (2) Blast: Tell your story or client story, paint the pain, show the transformation, (3) Probe: Ask about their situation, goals,
        frustrations, timeline, financial readiness, credit card inventory'
      application: The SET call is NOT a sales call - it's a qualification and emotional priming call. Setter identifies pain, inventories resources, assigns homework, and schedules the close call.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Set_Script.txt
    - id: FW-RB-075
      name: Three Homework Assignments
      components: '(1) Write your 6-month goal: ''Where do you want to be in 6 months? Be specific with numbers.'', (2) Write your 12-month goal: ''Where in 12 months?'', (3) Write your 5-year vision: ''Describe
        your perfect day 5 years from now in detail - what do you see, hear, feel?'''
      application: Assigned between SET and CLOSE calls. The homework creates emotional investment and gives the closer ammunition to 'paint the picture' during the close. Prospect who does homework closes
        at 2-3x higher rate.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Set_Script.txt
    - id: FW-RB-076
      name: Compliance Script Architecture
      components: '(1) Non-salesperson makes the call (admin/support role), (2) Call is recorded (stated upfront), (3) Confirm purchase details and amount, (4) Set expectations for onboarding, (5) Confirm
        first coaching call date, (6) Ask: ''On a scale of 1-10, how committed are you?'', (7) Address any score below 8, (8) Get verbal commitment to complete first module by X date, (9) Provide direct
        support contact, (10) Welcome to the program'
      application: Post-sale retention call. Done by non-salesperson to reduce buyer's remorse. The recording creates psychological commitment. The 1-10 scale surfaces hidden doubts before they become cancellations.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Compliance_Script.txt
    - id: FW-RB-077
      name: Story Selling Architecture (Dagan Smith)
      components: 1) High Drama (display a wall - insurmountable obstacle), 2) One Simple Epiphany (one word/idea that changes everything), 3) New Possibilities Cascade (all the ideas that flow from the
        epiphany), 4) Hero's Choice (choose to act despite fear), 5) First Signs of Success, 6) Rapid Growth, 7) Case Studies (detach idea from you - throw the basketball), 8) Hidden Benefits (what people
        don't see beyond obvious), 9) Objection Transformation (turn objections into reasons to say yes), 10) Allude to Twist (something bigger you haven't revealed), 11) Mistake Inoculation (protect them
        from your mistakes), 12) Ultimate Solution Reveal (the twist that makes it even better), 13) Pain Bridge (remind of pain of inaction), 14) Invitation (invisible funnel proposition)
      application: Use this 14-step architecture to structure content webinars, sales letters, and email sequences. The architecture creates belief in one simple idea, proves it works for everyone, then
        makes the product the natural conclusion.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_8.txt
    - id: FW-RB-078
      name: Heroes Two Journeys (Michael Hauge)
      components: 'Outer Journey (visible goal pursuit): Setup > Opportunity (10%) > Change of Plans (25%) > Point of No Return (50%) > Major Setback (75%) > Climax (90-99%) > Aftermath. Inner Journey (identity
        to essence transformation): Living in Identity > Glimpse of Essence > Vacillation between Identity and Essence > Full Commitment to Essence > Retreat to Identity after Setback > Final Push > Full
        Essence Achievement'
      application: Every marketing story must have both an outer journey (the visible goal and obstacles) AND an inner journey (the emotional transformation from fear to courage, from identity to essence).
        The two journeys intertwine at the same structural turning points.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_9.txt
    - id: FW-RB-079
      name: TJ Rohleder's 8-Step Offer Formula
      components: 1) Giant Promises (huge, almost hard to believe), 2) Proof (back up promises with evidence), 3) Stories and Examples (your story + customer stories), 4) Premium Pricing (make it special,
        just for them), 5) Better-Than-No-Risk Guarantee (they keep everything even if they refund), 6) Relentless Follow-Up (salespeople, teleseminars, webinars), 7) Emotional Hook (the one sticky phrase
        they can't get out of their head), 8) Your Story and Vulnerability (reveal your flaws, build trust through authenticity)
      application: Apply all 8 elements to every high-ticket offer. The formula works from $9 front-end offers all the way to $3,000+ back-end offers. The key differentiator is the better-than-no-risk guarantee
        and the emotional hook.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_7.txt
    - id: FW-RB-080
      name: Attractive Character Email Framework (John Alanis)
      components: 1) Create an Attractive Character persona to speak from, 2) Use colorful language (test and discard what doesn't work, keep what does - like Marx Brothers testing comedy), 3) Send two
        emails per day from the character's voice, 4) Share personal stories and flaws to build identification, 5) Maintain consistent voice and vocabulary across all communications
      application: Build a persona that people tune in to read HOW you write as much as WHAT you write. Test colorful language sparingly at first, keep what resonates. People respond to characters, not
        faceless brands.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_4.txt
    - id: FW-RB-081
      name: Beta Tester Method (TJ Rohleder)
      components: '1) Create a ''reason why'' offer framed as needing beta testers, 2) Frame it as: ''we need beta testers to get all the bugs out,'' 3) Explain: ''the more websites/systems we have, the
        better we can test,'' 4) Use done-for-you elements where you profit by helping them profit, 5) Include better-than-no-risk guarantee (keep everything even if refund), 6) Works for 15+ years without
        competitors copying it'
      application: Frame your offer launch as a beta test. This gives a legitimate 'reason why' for the offer, reduces skepticism, and creates urgency. Combined with done-for-you elements and affiliate
        structures where 'the more we help you make, the more we make.'
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_7.txt
    - id: FW-RB-082
      name: Inception Language Pattern Framework
      components: 1) Identify the belief you want to install, 2) Structure words and language patterns that plant the idea without direct persuasion, 3) Use stories as delivery vehicle for inception (the
        audience doesn't realize the belief is being installed), 4) Layer multiple language patterns to reinforce the core belief, 5) Let the audience arrive at the conclusion themselves
      application: 'Named after the movie Inception. Instead of directly persuading, use language patterns and stories to plant ideas that the prospect believes they came up with themselves. Russell''s
        approach to copy: structuring words and language patterns for inception-style belief installation.'
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_2.txt
    - id: FW-RB-083
      name: Three Objection Killers for 'Why Are You Selling This?'
      components: '1) Internet Abundance: ''There''s more than enough for everybody - helping you make money helps me make money,'' 2) Personal Mission: ''It took me so long to figure out how to get rich,
        I was so angry I decided to share from the rooftops as a public service,'' 3) Scaling Through Others: ''My business is growing so fast, I''m looking for other people to do my trainings for me -
        I don''t want to travel every weekend at 52'''
      application: Use all three reasons when prospects ask 'if this is so good, why sell it to me instead of keeping it for yourself?' Each reason reframes their skepticism from a different angle. Combined,
        they dismantle the objection completely.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_7.txt
    - id: FW-RB-084
      name: Chapter-Based Sales Letter Launch
      components: '1) Write your sales story as a narrative, not a traditional sales letter, 2) Break the story into chapters, 3) Release one chapter at a time to your list (daily), 4) Add an opt-in box
        at end of each chapter: ''opt in to get chapter X before everyone else,'' 5) Build anticipation through the story arc, 6) On launch day, the audience is primed and eager to buy'
      application: Instead of sending a long sales letter all at once, serialize it into chapters released daily. Each chapter builds anticipation and the opt-in creates commitment escalation.

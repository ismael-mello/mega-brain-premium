    - id: FW-RB-140
      statement: 'Dream 100 Category Matrix: list ALL who have your dream customers across (1) List owners, (2) Bloggers, (3) Podcasters, (4) Social media influencers (by platform), (5) YouTube channels.
        Go one step BACK to sub-market level to cast wider net. If you created a new niche, competitors become partners.'
      context: Day 3 Afternoon — systematic Dream 100 list building with 4-5 people brainstorming.
      module_sources:
      - ES-LIVE-S08
    - id: FW-RB-141
      statement: 'Niche Creation Formula: [Your expertise] + [Your unique story] + [Specific submarket] + [Unique mechanism name] = New niche only YOU own. Zero competition by design.'
      context: Day 1 Morning — niche creation (not finding) framework.
      module_sources:
      - ES-LIVE-S01
    - id: FW-RB-142
      statement: 'Search vs Interruption historical timeline: Store visits (pre-1835, search) → Direct mail 1835 (interruption) → Yellow Pages 1886 (search) → Radio ads 1922 (interruption) → TV 1927/1940
        (interruption) → Google (search) → Facebook/Instagram (interruption). Pattern always repeats: search first, then interruption disrupts.'
      context: TS LIVE Session 2. The backbone framework of the Traffic Secrets book. Each era follows the same adoption curve.
      module_sources:
      - TS-LIVE-S2
    - id: FW-RB-143
      statement: 'Three Traffic Types framework: (1) CONTROL = Pay someone to push traffic to your funnel (Facebook ads, Google ads). You don''t own it but you steer it. (2) EARN = Work your way into someone
        else''s platform (podcast interviews, guest posts, collaborations). (3) OWN = Your list, your followers, your black box. Goal: funnel Control and Earn into Own.'
      context: TS LIVE Session 3. Illustrated with dollar sign (control), handshake (earn), and person holding black box (own). 'One is a scary number -- diversify traffic sources.'
      module_sources:
      - TS-LIVE-S3
    - id: FW-RB-144
      statement: 'Dream Customer Avatar exercise: (1) Write attributes of the person you''d stay up till 5am helping. (2) Do separate male and female versions. (3) Go to Google Images, type in attributes.
        (4) Find the face that matches. (5) Print it. Name them. (6) Ask: ''Would this product attract or repel this person?'' If repel → change the bait.'
      context: TS LIVE Session 1. Based on Eben Pagan's training. Russell found 'Mike' and a female avatar. This exercise led him to create the 108 Split Tests book.
      module_sources:
      - TS-LIVE-S1
    - id: FW-RB-145
      statement: 'Hook Story Offer at every funnel level: AD (hook = image/thumb stop, story = 30sec context, offer = click for access) → SQUEEZE PAGE (hook = headline, story = video/copy, offer = email
        for free thing) → SALES PAGE (hook = big promise, story = full presentation, offer = product + bonuses) → UPSELL (hook = congrats, story = next problem, offer = logical next step).'
      context: TS LIVE Session 8. Russell physically maps out all potential assets, then assigns HSO to each funnel page. Visualizes the customer 'sitting on the pot scrolling' for the ad level.
      module_sources:
      - TS-LIVE-S8
    - id: FW-RB-146
      statement: 'Traffic Secrets book framework (the master doodle): LEFT SIDE = Foundations: Dream 100 → Your Show → Earn traffic + Control traffic → Both push into your Black Box (traffic you own). RIGHT
        SIDE = Monetization: Front-end funnels (break even) → Follow-up funnels → Value ladder ascension. This is the complete traffic system.'
      context: TS LIVE Session 1 (end) and Session 7 (recap). The single framework slide Russell says he could teach the entire 2-day event from.
      module_sources:
      - TS-LIVE-S1
      - TS-LIVE-S7
    - id: FW-RB-147
      statement: 'Funnel offer logical sequencing: (1) Brainstorm ALL possible assets/content you have. (2) For the main offer, pick the combination that makes it irresistible. (3) For the opt-in, pick
        a piece that creates desire for the main offer. (4) For the upsell, solve the NEXT problem that opens when they buy the main. Never sell more of the same -- they already solved that in their mind.'
      context: TS LIVE Session 8. The 'buying solves the problem' insight from Tim Urway applied to funnel architecture.
      module_sources:
      - TS-LIVE-S8
    - id: FW-RB-148
      statement: 'RFM+S Value Score framework: Four dimensions scored and displayed as circles -- Recency (days since last purchase), Frequency (number of purchases in window), Monetary (total spend), Social
        (email quality/real vs throwaway). Default 25% weight each, customizable. Hotline buyers (R=high) are priority targets.'
      context: TS LIVE Session 1. Dan Kennedy/Gary Halbert direct mail RFM adapted into ClickFunnels Actionetics with Social dimension added from Jeremy Shoemaker data.
      module_sources:
      - TS-LIVE-S1
    - id: FW-RB-149
      statement: 'Your Show as first distribution channel: Choose ONE platform you love most → Publish consistently → Use it to (a) find your voice, (b) test material, (c) test hooks, (d) build platform
        to leverage Dream 100. Your show is not just content -- it''s your Arsenio Hall chair that makes the Dream 100 want to come to you.'
      context: TS LIVE Session 5. Russell corrects his earlier 'Conversation Domination' advice -- start with one channel, not all at once.
      module_sources:
      - TS-LIVE-S5
    - id: FW-RB-150
      statement: 'Opportunity Switch into Value Ladder: First, opportunity switch the customer into your NEW vehicle (not improvement of old). Then create a value ladder where each tier provides more value
        and they provide more value back. The key: each tier must give them a FEELING they want more of. Ascension is emotional, not logical.'
      context: TS LIVE Session 1 (end of Day 1). Colette dating story (date→engagement→marriage→kids) as analogy for value ladder emotional escalation.
      module_sources:
      - TS-LIVE-S1
    - id: FW-RB-151
      name: ecomm-offer-stack-framework
      statement: 'Ecomm Offer Stack: (1) Core product + free e-guides + subscription option. (2) Order bump — complementary small item ($27). (3) OTO1 — ''more of the same'' at discount, two package options
        (3-box + 6-box) with REASON to buy more. (4) Downsell1 — ''one more'' at 50% off. (5) OTO2 — NEW product for NEW problem, same package layout as front-end. (6) Downsell2 — rinse and repeat of Downsell1
        for OTO2 product.'
      context: Jan 2022 Greatest Hits. Zuma Juice + Au Bon Broth funnels. Heath Wilcock breakdown of RB team's ecomm funnel architecture.
      module_sources:
      - MM-GH-JAN2022
    - id: FW-RB-152
      name: invisible-virtual-event-framework
      statement: 'Invisible Virtual Event: (1) Registration page — invisible funnel (pay after IF you love it) + prepay option with discount + replays. (2) Order bump on registration. (3) VIP upsell ($197
        private Q&A). (4) 3-day event: Day1=Strategy+Internal beliefs, Day2=External beliefs+Pitch+Stack+Close+Stories, Day3=PD+Re-pitch+Bonuses+Urgency. (5) Evergreen: replay every 90 days.'
      context: 'Feb 2022 Greatest Hits. Two Comma Club LIVE. 259 people into $25K coaching in one weekend. 8+ figures from single evergreen funnel. $50K Inner Circle / $150K Category Kings members confirmed:
        virtual events = most money in past 12 months.'
      module_sources:
      - MM-GH-FEB2022
    - id: FW-RB-153
      name: evergreen-webinar-funnel-framework
      statement: 'Evergreen Webinar Funnel: (1) Registration page — curiosity headline, countdown clock, button with email popup. (2) Webinar page — speakers-on notice, subtitles, 48hr urgency timer, spoiler
        box, Read Transcripts exit-intent popup, delayed order button. (3) Sales letter version for readers. (4) Order form. Key elements: stick rate (speakers on), consumption rate (subtitles + transcripts),
        order rate (urgency + spoilers).'
      context: 'Mar 2022 Greatest Hits. The funnel that built ClickFunnels. Grant Cardone 10x event version: $3.2M in 90 minutes world record. Video of best live performance used as automated webinar.'
      module_sources:
      - MM-GH-MAR2022
    - id: FW-RB-154
      name: pre-funnel-cost-reduction-framework
      statement: 'Pre-Funnel Framework: (1) Free ebook squeeze page (~$5/lead). (2) Thank-you page with webinar registration + video explaining bonus webclass. (3) Registration popup asks #1 problem → segments
        into lists. (4) Second thank-you page offers free ClickFunnels trial. (5) Email sequence pushes back to thank-you pages for replays + SLO book sales. (6) Non-registrants forced into webinar sequence
        anyway. Clone funnel with different hooks for new segments in <1 hour.'
      context: 'Apr 2022 Greatest Hits. Developed in response to Facebook/Apple feud raising costs 5x. Multiple pre-funnels: 108 Split Test Winners, Network Marketing Secrets, Webinar Hacks video, etc.'
      module_sources:
      - MM-GH-APR2022
    - id: FW-RB-155
      name: multiple-versions-market-penetration
      statement: 'Market Penetration via Multiple Versions: Take proven webinar/funnel that converts. Have a TOP SUCCESS STORY create THEIR version — same offer, different hooks, stories, pictures, personality.
        The ''science'' (structure) stays the same, the ''art'' (personal story) changes. Reach entirely new market segments. Example: Kaelin Poulin version of ClickFunnels webinar.'
      context: Mar 2022 Greatest Hits. 'This structure works for any presentation. Just plug it into the proven webinar funnel framework.'
      module_sources:
      - MM-GH-MAR2022
    - id: FW-RB-156
      name: radical-imbalance-cycle-framework
      statement: 'Radical Imbalance Cycle: (1) Identify which SEASON you''re in (self-mastery, relationship, mission). (2) Pick ONE goal. (3) Shift 90% of effort to that goal (radical imbalance). (4) Build
        routines/habits for other areas to maintain on autopilot. (5) Achieve mastery or key milestone. (6) Routines keep the achievement running in background. (7) Snap back, give time to other areas.
        (8) Shift to next goal. The rubber band: stretch to capacity but don''t snap.'
      context: Jan 2022 Greatest Hits. Wrestling → wife → ClickFunnels → each required radical seasonal focus. Ecclesiastes 3 'to every thing there is a season.' Keith Giddens rubber band metaphor.
      module_sources:
      - MM-GH-JAN2022
    - id: FW-RB-157
      name: four-levels-value-progression
      statement: '4 Levels of Value Progression: (1) Implementation — trade time for money, learn the craft. (2) Unification — manage people doing implementation, build systems. (3) Communication — create
        messages that move masses, get good at persuasion. (4) Imagination — conceive ideas + communicate them so people ask ''where can I send my money?'' Combine imagination + communication for 100X income
        vs implementation.'
      context: 'Apr 2022 Greatest Hits. Steve Jobs: WWDC events + visionary ideas → $2T company. RB: from $6.25/hr trash man to making more in one hour than a decade. ''Get good at crafting messages that
        move the masses.'''
      module_sources:
      - MM-GH-APR2022
    - id: FW-RB-158
      name: achievement-fulfillment-balance
      statement: 'Achievement vs Fulfillment Framework: (1) Recognize routines drive achievement but delete memories (days feel shorter). (2) Consciously create EVENT HORIZONS — unique, unrepeatable experiences
        that lock in memories. (3) After achieving through routine, celebrate with event horizon before diving back. (4) Apply to family, team, customers — create event horizons for people you serve. (5)
        The yin and yang: routine for results, event horizons for meaning.'
      context: 'Feb 2022 Greatest Hits. Craig Ballantyne''s concept. Wrestling: don''t remember 10,000 practice shots, but remember 6-minute state title match forever. ''There isn''t a referee lifting our
        hands in business, so we skip celebration and dive back into routine.'''
      module_sources:
      - MM-GH-FEB2022
    - id: FW-RB-159
      statement: 'Order Form Bump Framework: (1) Free+Shipping or front-end offer page, (2) Shipping address on page 1 (CC on page 2), (3) Add bump AFTER credit card entry -- like grocery store checkout
        impulse buy. Rules: 4 sentences max copy, price under $50, only available right here right now.'
      context: Funnel Labs Issue 1 - complete OFB implementation framework.

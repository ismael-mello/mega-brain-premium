    - id: PHI-RB-MCC-004
      statement: Recycle traffic from your own list before spending money on new traffic. Your list is an asset. Sending short emails to a pre-sell blog post and then to an offer costs zero and monetizes
        what you already have. The Three C's method maximizes existing subscriber value.
      context: 'Three C''s Method / System Checklist #18, Micro Continuity Course.'

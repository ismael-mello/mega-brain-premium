      statement: 'Invisible Funnel Framework (Chet Holmes adapted): (1) Run ads offering free content, (2) Prospect puts CC on file but NOT charged, (3) Deliver 3-4 hour premium training, (4) At end ask
        ''was it worth $X?'' -- if yes bill, if no don''t charge, (5) Soft offer for high-ticket.'

    - id: MET-RB-035
      name: Funnel Block Testing Methodology
      steps: 1) Pick ONE building block per phase from the 31 options, 2) Build the funnel, 3) Drive traffic, 4) Identify the underperforming phase, 5) SWAP only that block -- do NOT rebuild the whole funnel,
        6) Test the new block, 7) Repeat until each phase is optimized.
      context: 'DotCom Secrets Ignite live workshop (~2014-2015). The key insight: funnel optimization is not rebuilding -- it''s surgical swapping. The 31 Building Blocks (FW-RB-069) gives you the menu
        of options for each phase.'
      module_sources:
      - DCS-IGNITE
      raw_source: knowledge/external/sources/russell-brunson/raw/05._Dotcom_Secrets_Ignite/transcription_06
    - id: MET-RB-036
      name: Paint the Picture Visualization Technique
      steps: 1) Identify prospect's stated goal, 2) Ask 'close your eyes', 3) Describe achieving the goal in sensory detail (what they see, hear, feel), 4) Add specific lifestyle elements (car, house, freedom),
        5) Anchor to emotion ('how does that FEEL?'), 6) Open eyes and connect to the offer as the vehicle
      application: Used during close calls to emotionally anchor the prospect to their future state before presenting price. Makes the investment feel small relative to the vision.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Close_Script.txt
    - id: MET-RB-037
      name: OPM Positioning Method
      steps: '1) Acknowledge ''I don''t have the money'' objection, 2) Ask ''do you have credit cards?'', 3) Reframe: ''this isn''t debt, it''s short-term leveraging'', 4) Share example of Russell using
        credit cards to start, 5) Frame as ''investing in yourself'', 6) Ask ''what''s the limit on your Visa?'', 7) Position: ''successful people use OPM (Other People''s Money)'', 8) Close: ''one card
        or two?'''
      application: Objection handler for 'I can't afford it'. Reframes credit card use from debt to investment tool. Always inventory cards during set call to use during close.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Close_Script.txt
    - id: MET-RB-038
      name: What Credit Card? Objection Handler
      steps: '1) Prospect says ''I need to think about it'', 2) Respond: ''I totally understand - what specifically do you need to think about?'', 3) Isolate the real objection (usually money), 4) Ask:
        ''If money wasn''t an issue, would you do this?'', 5) If yes: ''Great, so it''s just a matter of figuring out the investment'', 6) Reference cards from probe: ''You mentioned your Chase has $X available'',
        7) Ask: ''What''s different tomorrow that would make this easier?'', 8) Close: ''Let''s get you started today'''
      application: 'The ''think about it'' killer. Key insight: ''need to think'' is NEVER the real objection - it''s always something else (usually money or spouse).'
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Close_Script.txt
    - id: MET-RB-039
      name: Credit Card Probe Methodology
      steps: '1) During set call (not close), ask about financial readiness, 2) Ask: ''Do you have credit cards?'', 3) For each card: ''What''s the card?'', ''What''s the limit?'', ''What''s the balance?'',
        ''What''s the rate?'', 4) Document all cards in CRM notes, 5) Calculate total available credit, 6) During close call: reference specific cards by name, 7) Use assumptive: ''Should we put it on the
        Chase or the Amex?'''
      application: Financial qualification done during SET call so closer has ammunition. The setter does the uncomfortable probing; the closer uses the intel to close.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Set_Script.txt
    - id: MET-RB-040
      name: Why Are You a Good Candidate? Inversion
      steps: '1) After presenting the opportunity, ask: ''So tell me, why do you think you''d be a good candidate for this program?'', 2) Let prospect SELL YOU on why they deserve it, 3) Listen for commitment
        signals (time, money, desire), 4) Reflect back: ''Those are great reasons'', 5) Ask: ''What would change in your life if we could help you achieve X?'', 6) Prospect builds their own case for buying'
      application: Inversion close where prospect sells themselves. Based on philosophy 'If I say it, it could be a lie - if you say it, it's the truth'. Most powerful when prospect is already emotionally
        engaged.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Close_Script.txt
    - id: MET-RB-041
      name: Assumptive Card Collection
      steps: '1) Never ask ''do you want to buy?'', 2) After handling last objection, transition: ''Great, let''s get you set up'', 3) Ask: ''Do you have that Chase card handy?'', 4) If hesitation: ''I''ll
        wait while you grab it'', 5) Collect card number, 6) Read back: ''So that''s $X on the Chase ending in XXXX, correct?'', 7) Process immediately, 8) Confirm: ''Welcome to the program!'', 9) Set next
        steps immediately, 10) Never leave dead air after close'
      application: The assumptive close - never ask permission to charge, just collect the card. Reference specific card from probe (MET-RB-039). Process while still on the phone.
      module_sources:
      - IF-SCRIPTS
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/transcription_Close_Script.txt
    - id: MET-RB-042
      name: Two-Part Story Selling Webinar Method
      steps: 'Step 1: Send short emails with a compelling story hook for registration. Step 2: Part 1 Webinar - Tell the full story using the Story Selling Architecture (high drama, epiphany, proof, hidden
        benefits, objection transformation, allude to twist). Step 3: At the end of Part 1, make the invisible funnel proposition (Tomorrow I will share how to do this live - do not give me a dime now,
        put me to the test). Step 4: Part 2 Webinar - Deliver the content/training. Step 5: Close with invisible funnel offer.'
      application: Use when launching any product or service. Part 1 creates the belief and excitement through story. Part 2 delivers the content. The two-part structure gets higher conversion than cramming
        story + content + close into one session. 1,100 registered for Part 1 > 500 registered for Part 2 in Dagan's case.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_8.txt
    - id: MET-RB-043
      name: Active Emotion Writing Method
      steps: 'Step 1: Identify the key emotion your hero feels at each point in the story. Step 2: Do NOT write the emotion passively (e.g., ''I was depressed''). Step 3: Instead, bring the reader INTO
        the experience by describing three layers: a) Mental thoughts (''All I could think was, why me?''), b) Physical sensations (''My heart sunk,'' ''my hands got cold, my mouth went dry''), c) The experience
        itself (''When I looked at the piece of paper and it said...''). Step 4: Journal about what emotions physically feel like to build your vocabulary of physical sensations. Step 5: Apply this active
        emotional writing to every key turning point in your story.'
      application: Use whenever writing sales copy, emails, or video scripts that involve emotional moments. Passive emotion ('I was excited') creates no identification. Active emotion ('My hands got cold,
        my mouth went dry, I started tingling all over') creates full identification and transportation into the experience.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_8.txt
    - id: MET-RB-044
      name: Inner Journey Diagnostic Method
      steps: 'Step 1: Ask ''What does my hero long for?'' (a deeply held desire they''re too afraid to pursue). Step 2: Ask ''What was my hero''s wound?'' (a painful past experience they believe they''ve
        left behind but still determines their behavior). Step 3: Ask ''What is my hero''s belief?'' (the conclusion they drew from the wound about how the world works - always logical but never accurate).
        Step 4: Ask ''What is my hero''s fear?'' (what they''re afraid of based on the belief). Step 5: Ask ''What is my hero''s identity?'' (the false self created to protect against the fear). Step 6:
        Ask ''What is my hero''s essence?'' (who they would be if they could strip away all the armor). Step 7: Fill in the blank: ''I''ll do whatever it takes to achieve my goal. Just don''t ask me to
        ___ because that''s just not me.'' The blank reveals their identity resistance.'
      application: Use before creating any marketing story or customer avatar. Map the wound-belief-fear-identity-essence chain for your target customer. This reveals the real reason they resist buying
        or taking action.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_10.txt
    - id: MET-RB-045
      name: Story Content Mapping Method
      steps: 'Step 1: Brain-dump ALL content ideas related to your core belief/idea. Step 2: List all possible objections your audience will have. Step 3: List all benefits (obvious and hidden). Step 4:
        For each piece of content, tag it with where it fits in the Story Selling Architecture (HB = hidden benefit, regular benefit, case study, mistake, etc.). Step 5: Identify which benefits are ''hidden''
        - frame as Everyone knows X, but what most people do not see is Y. Step 6: Organize all tagged content into the story flow. Step 7: Create a visual map showing the hero''s journey story with episodes/moments
        attached to each structural point.'
      application: Use when building out any story-based presentation or sales webinar. This method ensures no good content is wasted and every piece of content is strategically placed in the architecture
        for maximum impact.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_8.txt
    - id: MET-RB-046
      name: Competitive Offer Stacking Method
      steps: 'Step 1: Start with your base offer. Step 2: Gather your team (marketing, sales, key people) in a brainstorming session. Step 3: Challenge everyone: ''How can we give them MORE?'' Step 4: Let
        it become a competitive game where each person tries to top the previous idea. Step 5: Keep stacking until even you can''t keep track of everything being offered. Step 6: In the presentation, present
        what you can, then hand off to your marketing person to explain the rest. Step 7: Use this especially when the audience seems resistant or ''dead.'''
      application: When facing a tough crowd or needing to close at high ticket, use competitive team brainstorming to stack the offer beyond what anyone would expect. TJ Rohleder sold almost everybody
        in a 'dead' room at $3-4K per person using this method.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_7.txt
    - id: MET-RB-047
      name: Story Coaching Rebuild Method (Michael Hauge)
      steps: 'Step 1: Don''t try to ''fix'' the story by moving pieces around - rebuild from the ground up. Step 2: Ask questions first to understand the creator''s vision (don''t impose your own). Step
        3: Establish the visible goal (must be specific, clear, and something you can picture). Step 4: Map the outer journey turning points (opportunity, change of plans, point of no return, major setback,
        climax). Step 5: Map the inner journey (wound, belief, fear, identity, essence). Step 6: Ensure the aftermath is included - show the ''after picture'' of the new life, not just the climax achievement.
        Step 7: Intertwine outer and inner journeys at matching turning points.'
      application: Use when coaching others (or yourself) on their origin story or sales story. The key insight is that most stories fail because they lack the aftermath and because they skip the inner
        journey transformation.
      module_sources:
      - IF-WORKSHOP
      raw_source: knowledge/external/sources/russell-brunson/raw/08._Funnel_Immersion/Invisible Funnel/Invisible Funnel Workshop/transcription_Session_13.txt

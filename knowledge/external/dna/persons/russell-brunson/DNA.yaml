    - id: PHI-RB-MCC-002
      statement: Keyword specificity is where sales happen. If someone types 'one hour facelift' into Google, you know EXACTLY what they want. Specificity lets you tailor your offer to their exact need.
        General traffic = low conversions. Specific buyer-intent keywords = where money is made.
      context: Core Traffic System Overview, Micro Continuity Course. Keyword research philosophy.
      tags:
      - keyword-research
      - seo
      - buyer-intent
      - specificity
      confidence: 0.93

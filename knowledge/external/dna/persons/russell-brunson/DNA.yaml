      name: The Three Foundational Elements
      description: Every successful business needs exactly three things before building a funnel - a secret (unique mechanism), a case study (proof it works for others), and a system (step-by-step process)
      quote: What is your secret, what is your case study and what is your system
      application: Before building any funnel, document your unique secret, gather at least one case study from someone else, and outline your system
      tags:

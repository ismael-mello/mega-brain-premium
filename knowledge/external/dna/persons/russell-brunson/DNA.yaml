      name: System Outline as Universal Content Engine
      description: A single system outline becomes the foundation for every product in your funnel - the free CD, invisible funnel training, coaching program, and book all teach the same system at different
        depths
      quote: When the people paid $5,500 and they came to Boise came to my event guess what I taught those people at that event the exact same thing that was on the free DVD
      application: Create one master system outline and repackage it at varying depths for each tier of your value ladder
      tags:

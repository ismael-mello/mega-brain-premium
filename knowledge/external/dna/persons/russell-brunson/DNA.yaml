      statement: 'Dream 100 Relationship-First Sequence: Step 1 — Build list across all categories (list owners, bloggers, podcasters, influencers). Step 2 — ''Dig well before thirsty'': follow, subscribe,
        comment, buy their stuff, interview on podcasts, provide value. Step 3 — Send monthly physical packages (Dream 100 Box). Step 4 — Ask ''What are you working on? How can I support that?'' (Sean Stevenson
        approach). Step 5 — Only AFTER relationship exists, make the ask. Step 6 — If no, go Path 2 (ads to their audience) or Path 3 (JV). Key: one cool kid saying yes triggers cascade.'

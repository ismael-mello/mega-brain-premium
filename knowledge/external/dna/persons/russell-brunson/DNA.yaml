    - id: PHI-RB-MCC-005
      statement: Research is the most important step -- it makes or breaks everything else. Without good research on your target market, trigger words, competition level, and keyword difficulty, all subsequent
        work is wasted. Most people skip research to 'save time' and waste 10x more time on bad execution.
      context: 'Copywriting System, System Checklist #20, Micro Continuity Course.'
      tags:

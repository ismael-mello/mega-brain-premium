      - ES-LIVE-S01
    - id: MET-RB-090
      statement: 'Book writing methodology (used 3x): Step 1: Write first draft. Step 2: Read it -- ''Am I proud of it?'' Step 3: If not, DELETE entire manuscript. Step 4: Invite 100 people to a live event.
        Step 5: Teach the material for 2-3 days. Step 6: Watch their eyes -- where they glaze over, that''s where you need to explain better. Step 7: Between breaks, restructure your framework. Step 8:
        Go home and rewrite the book based on what actually worked live.'
      context: TS LIVE Session 1 opening. Used for DotCom Secrets (DCS Ignite event, ~100 people), Expert Secrets (Inner Circle event after Kenya trip, 3-hour expansion of 15-minute concept), and Traffic
        Secrets (this very event -- Two Comma Club X workshop).
      module_sources:
      - TS-LIVE-S1
    - id: MET-RB-091
      statement: 'Dream Customer Avatar creation process: (1) Ask ''if I could sit in a room and help anyone, who would light me up?'' (2) Write attributes separately for male and female. (3) Google Image
        search those attributes. (4) Find the face that IS your customer. (5) Print it. Name them. (6) Ask ''would everything I sell attract or repel this person?'' (7) If repel → create new bait that attracts
        them. (8) Test: when they share your product, do they describe it with passion?'
      context: 'TS LIVE Session 1. Russell''s version: found ''Mike'' (athletic, successful, wants more) and female avatar. Led to 108 Split Tests book as the new bait. Social proof: customer called it
        ''porn for entrepreneurs.'''
      module_sources:
      - TS-LIVE-S1
    - id: MET-RB-092
      statement: 'Who Rolodex building methodology: (1) Go to platforms like Freelancer/Upwork. (2) Hire 10-20 people at $5 each for small projects. (3) Evaluate: communication, quality, speed, personality.
        (4) Keep the best 1-2 in your Rolodex. (5) Repeat across skills (designers, copywriters, developers). (6) Over years, build a curated network of proven who''s. (7) For each new project, assemble
        your team from the Rolodex. (8) If no cash: cast vision, offer equity/percentage.'
      context: 'TS LIVE Session 1. Russell''s origin: broke college kid, wife making $9.50/hr. Used ScriptLance to test dozens of cheap freelancers. Todd Dickerson example: worked free for a year, became
        ClickFunnels co-founder.'
      module_sources:
      - TS-LIVE-S1
    - id: MET-RB-093
      statement: 'Funnel offer mapping process: (1) Brain dump ALL potential content assets (courses, videos, templates, PDFs, scripts). (2) For each, note the story tied to it. (3) Pick the main product
        (center of funnel). (4) Build irresistible offer around it (bundle assets until customer MUST have it). (5) Step back one page: what''s the opt-in offer? (6) Step back again: what''s the ad hook?
        (7) Step forward: what''s the upsell? (always the NEXT problem, never more of the same). (8) Apply HSO at every page.'
      context: 'TS LIVE Session 8. Russell physically diagrams the process: ''I visualize the customer on the pot scrolling Facebook. What stops them? That''s the ad hook. Then I sequence backward and forward
        from there.'''
      module_sources:
      - TS-LIVE-S8
    - id: MET-RB-094
      statement: 'Dream 100 daily intelligence routine: (1) On your phone, create a folder called ''Conversation Domination.'' (2) Put ALL apps where your dream audience lives (Facebook, Instagram, YouTube,
        Twitter, LinkedIn, etc.). (3) Every morning, open the folder. (4) Click each app, scroll through Dream 100''s content. (5) Note what they''re doing, what''s working, what hooks are getting engagement.
        (6) Look for opportunities to serve/collaborate. (7) This is your daily market intelligence gathering.'
      context: TS LIVE Session 5. Russell shows his actual iPhone setup. This replaced random social media scrolling with intentional Dream 100 surveillance.
      module_sources:
      - TS-LIVE-S5
    - id: MET-RB-095
      name: pre-funnel-launch-process
      statement: 'Pre-Funnel Launch Method: (1) Find old ebook, report, webinar recording, or create one via One-Pager. (2) Build simple squeeze page (2 minutes in ClickFunnels). (3) Thank-you page: video
        thanking + pitch ''unadvertised bonus webclass'' related to ebook. (4) Registration popup asks #1 problem (3 options). (5) Segment into different email sequences per problem. (6) Second thank-you
        page offers free trial. (7) Non-registrants get forced into webinar sequence anyway. (8) Clone entire funnel, swap ebook cover + headline for new segment — done in 1 hour. (9) Run multiple pre-funnels
        simultaneously targeting different segments.'
      context: 'Apr 2022 Greatest Hits. Created after Facebook/Apple feud raised costs 5x. First test: 108 Proven Split Test Winners ebook. Then cloned for Network Marketing Secrets, then Webinar Hacks
        video. Each new hook = new segment = $5/lead consistently.'
      module_sources:
      - MM-GH-APR2022
    - id: MET-RB-096
      name: virtual-event-evergreen-process
      statement: 'Virtual Event Evergreen Method: (1) Create invisible funnel registration page (pay after event if loved it). (2) Offer prepay option with $50 discount + replay access, label ''most popular.''
        (3) Add order bump before submit. (4) VIP upsell page ($197 private Q&A). (5) Thank-you page with event details. (6) Run 3-day event: Day1=Strategy+Workshop beliefs, Day2=External fears+Pitch+Stack+Close+Student
        roundtable, Day3=PD+Re-pitch+New bonuses+Urgency deadline. (7) Record entire event. (8) Set up evergreen replay, relaunch every 90 days with fresh urgency.'
      context: Feb 2022 Greatest Hits. Two Comma Club LIVE breakdown. 259 into $25K coaching, 8+ figures total. 'I rarely if ever share [Inner Circle strategies] outside of the room. But I wanted to share
        this one video with you.'
      module_sources:
      - MM-GH-FEB2022
    - id: MET-RB-097
      name: webinar-to-empire-process
      statement: 'Webinar-to-Empire Method: (1) Write webinar using Perfect Webinar script. (2) Do live webinars 2-3 times per week for at least 1 year. (3) Perfect presentation over 100+ live sessions
        (RB did 100+ in first 12 months). (4) Speak at big events to test (Grant Cardone 10x = $3.2M in 90 min). (5) Use best live recording as automated webinar video. (6) Add SLOs to make leads ''better
        than free'' ($10+ profit per reg before webinar). (7) Have success stories create their versions for new market segments. (8) Stack pre-funnels to reduce lead costs 80%.'
      context: Mar + Apr 2022 Greatest Hits combined. Full journey from first failed ClickFunnels launches (funnels 1-5 failed) to speaking at friend's event → first table rush → 100+ live webinars → world
        record → automated empire.
      module_sources:
      - MM-GH-MAR2022
      - MM-GH-APR2022
    - id: MET-RB-098
      name: negotiate-crazy-ask-method
      statement: 'Negotiate Crazy Ask Method: (1) Draft contract with all standard/expected terms. (2) Before sending, slip in ONE sentence with the ''crazy thing'' you really want but assume they''ll say
        no to. (3) Send it anyway — click send even if scared. (4) Wait for response. The worst they can say is no. The best: life-changing outcome. Example A: Marcus Lemonis contract — ''1-hour meeting
        before keynote'' → led to TV show. Example B: Dan Kennedy fax — ''coauthor a book with Russell'' → led to ''Whoever Can Spend the Most'' book deal.'
      context: 'Jan 2022 Greatest Hits. RB: ''I was almost too scared to send it.'' Dan Kennedy only communicates via fax. The crazy ask became one of RB''s most important business relationships.'
      module_sources:
      - MM-GH-JAN2022
    - id: MET-RB-099
      statement: 'Invisible Funnel Registration Script: (1) Introduce expert with proof, (2) State guarantee in money terms, (3) Reveal irresistible offer (''only pay AFTER''), (4) Share personal result,
        (5) Paint the picture, (6) Explain mechanics, (7) Restaurant analogy (''pay only if you love the food''), (8) CTA with credit card reservation.'
      context: Funnel Labs Issue 2 - complete registration script structure.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 2 (Magnetic Marketing)
    - id: MET-RB-100
      statement: 'Bridge Page Video Script (3-step): (1) ''The free [thing] is great, BUT if you can''t get [layman term], you can''t [outcome]'', (2) ''We call [layman term] [industry term]'', (3) ''I
        can show you how to get as much [industry term] as you want on the next page.'' Three sentences bridge mass market to industry vocabulary.'
      context: Funnel Labs Issue 3 - exact 3-sentence bridge script.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 3 (Magnetic Marketing)
    - id: MET-RB-101
      statement: '7-Day Webinar Promotional Sequence: Mon-Tue-Wed = promote registration. Wed (1hr before) = last-minute push. Wed = live webinar. Thu-Fri = promote second live Friday. Fri = second live.
        Sat = replay. Sun AM = Cliff Notes + 12hr warning. Sun PM = urgency + 6hr warning.'
      context: Funnel Labs Issue 4 - exact day-by-day email sequence.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 4 (Magnetic Marketing)
    - id: MET-RB-102
      statement: 'SAAS Homepage Testing Method: (1) Replace long-form sales page with webinar registration form, (2) Remove pricing table/link, (3) Keep Free Trial and Login links for existing members,
        (4) On thank-you page offer free trial. Tiny dip in direct trials but massive increase in registrations worth $35+ each.'
      context: Funnel Labs Issue 5 - SAAS page optimization method.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: MET-RB-103
      statement: 'Dream 100 Monthly Gifting: (1) Build spreadsheet with names, addresses, phone, birthdays, (2) Send physical gift monthly -- books, video cards from Alibaba, themed items, (3) Don''t wait
        for promotion -- send gifts just to be nice, (4) When ready: include short letter with gift asking for promotional support.'
      context: Funnel Labs Issue 8 - specific implementation steps.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: MET-RB-104
      statement: 'Dream 100 Hack Sequence: (1) Call all 100, expect 48 no''s, (2) Get first yes from person #49, (3) Ask ''Who else would be interested?'', (4) Call referred: ''Hey, [name] just said he''s
        in. Are you in?'', (5) Leverage names: ''X and Y are both in.'' Chain grows exponentially.'
      context: Funnel Labs Issue 8 - exact Dream 100 hacking method.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: MET-RB-105
      statement: 'Challenge Funnel Launch Method: 30 days of daily coaching calls, box in mail with physical materials, video from host + accountability partner. Indoctrinates cold traffic into dream customers
        over the challenge period.'
      context: Funnelology - challenge funnel launch methodology.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: MET-RB-106
      statement: 'Affiliate Offer Stacking Method: Don''t sell the product (everyone does). Create your OWN offer around it -- unique bonuses, coaching, implementation support. You become the offer, the
        product is just the vehicle.'
      context: Funnelology - affiliate differentiation methodology.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: MET-RB-107
      statement: 'Summit Funnel Method: Interview speakers as content, registration page for free access, all-access pass upsell, upsell covers ad costs so leads are essentially free. Positions you as curator/authority.'
      context: Funnelology - summit funnel methodology.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: MET-RB-108
      statement: 'Tripwire Upsell Sequencing (Next Step Principle): Front end solves ONE itch (conversions). Once purchased, itch is ''scratched.'' Upsell 1 = NEXT logical need (traffic), NOT more of same.
        Fatal flaw tested: selling more split testing to split test buyers = near 0% (5-6 failed variations).'
      context: DCS LIVE Session 3 - upsell methodology with specific failure data.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: MET-RB-109
      statement: 'Dream 100 Podcast Infiltration: (1) Start podcast (even with zero subscribers), (2) Use as your ''show'' -- Arsenio Hall principle, (3) Contact Dream 100: ''I''d love to interview you,''
        (4) They say yes (exposure for THEM), (5) 30-60min interview builds real relationship, (6) You''ve infiltrated by providing value first, (7) Relationship becomes leverage.'
      context: DCS LIVE Session 4 - podcast as Dream 100 tool.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 4 (Magnetic Marketing)
    - id: MET-RB-110
      name: Speak-to-Sell Recovery Method
      description: 'Step 1: Accept you bombed (teaching != selling). Step 2: Study the specific pitch mechanics (not content). Step 3: Create a timed, scripted close separate from your teaching content.
        Step 4: Practice the pitch until it''s flawless. Step 5: Deploy 100+ times to different audiences. Joan Rivers proof: admitted failure to audience, re-did the 16-minute pitch properly, killed it.
        Next night, killed it from the start.'
      context: 'MM Welcome -- RB synthesizing his own speak-to-sell failure + DK''s Joan Rivers case study into a recovery methodology. The key insight: your pitch is a separate skill from your teaching.
        Practice them independently.'
      module_sources:
      - MM-08-Welcome
  L1_PHILOSOPHIES_OMG:
    count: 3
    items:
    - id: PHI-RB-OMG-001
      statement: 'Most funnel builders focus on what visitors see — the homepage, the design, the visible landing page. All the money is in the invisible iceberg below: the OTOs, downsells, exit pops, and
        follow-up sequences the visitor never knew existed. Focus on what they don''t see.'
      context: OMG Funnels Event Video 2 - Funnel planning session with Mandy Pratt. Russell drew the iceberg analogy to explain why his 'ugly' websites made more money than beautiful ones. Core framing
        for funnel backend value.
      module_sources:
      - OMG
      tags:
      - iceberg
      - backend
      - funnel
      - design-vs-conversion
      confidence: 0.97
    - id: PHI-RB-OMG-002
      statement: Always map your entire funnel on a whiteboard BEFORE opening any software. Know exactly where each page goes, what you're selling at each step, and what happens on every 'no' (downsell
        path). Building without a map means constant rework and confusion.
      context: OMG Funnels Event Video 2 - Russell maps out Mandy Pratt's entire coaching funnel on whiteboard before touching ClickFunnels. Contrasted explicitly with people who 'log in and start clicking
        stuff and it's all over the place.'
      module_sources:
      - OMG
      tags:
      - whiteboard
      - planning
      - funnel
      - methodology
      confidence: 0.97
    - id: PHI-RB-OMG-003
      statement: Technology should democratize what was previously exclusive to those with $190K/year teams. The software that replaces your designer, programmer, and analytics person is the great equalizer
        — it gives the solo entrepreneur the same funnel power as a large company.
      context: 'OMG Funnels Event Video 1 - The ClickFunnels origin story. Russell explains why he built it: years of relying on a $190K+ team to build funnels, and wanting to give that power to everyone.
        Core founding philosophy of ClickFunnels.'
      module_sources:
      - OMG
      tags:
      - technology
      - democratization
      - clickfunnels
      - team-replacement
      confidence: 0.95
  L2_MENTAL_MODELS_OMG:
    count: 3
    items:
    - id: MM-RB-OMG-001
      name: Iterative Funnel Scaling Model
      description: 'Each element added to a funnel should produce a measurable revenue increment. Scale happens by adding one tested element at a time: squeeze → OTO1 → OTO2 → downsell → exit pop #1 → exit
        pop #2. Never add multiple elements simultaneously — you need to know what each addition produces.'
      application: NeuroCell went from $20K to $500K/month in 2 months by testing each addition in sequence. The key is measuring the before/after on each single change before the next.
      module_sources:
      - OMG
      tags:
      - scaling
      - iterative
      - funnel
      - testing
      - AOV
      confidence: 0.97
    - id: MM-RB-OMG-002
      name: Tech Stack Consolidation Economics
      description: 'Traditional funnel tech stack = 6-7 separate tools: hosting ($10-400/mo) + landing page software ($50-97/mo) + split testing ($100-300/mo) + membership site ($97+/mo) + webinar software
        ($97-500+/mo) + shopping cart. Total: $500-1,400+/mo. Consolidation into one platform changes unit economics fundamentally and eliminates integration friction.'
      application: Use the $500-1,400/mo traditional stack cost as benchmark when evaluating any funnel platform. Plus factor in the $190K/yr team required. Any all-in-one that costs less and delivers same
        output has immediate positive ROI.
      module_sources:
      - OMG
      tags:
      - tech-stack
      - consolidation
      - costs
      - unit-economics
      - clickfunnels
      confidence: 0.95
    - id: MM-RB-OMG-003
      name: Homework Page Commitment Psychology
      description: Before a high-ticket application, give prospects a 'homework page' — a page with a specific task to complete before their call. Prospects who complete homework are psychologically committed,
        filter out tire-kickers, and close at dramatically higher rates. The homework creates sunk cost and demonstrates coachability.
      application: Add homework page between application submission and call confirmation for any offer above $2K. Task should take 15-30 minutes and relate directly to the transformation being sold.
      module_sources:
      - OMG
      tags:
      - high-ticket
      - psychology
      - homework-page
      - commitment
      - filtering
      confidence: 0.93
  L3_HEURISTICS_OMG:
    count: 5
    items:
    - id: HEUR-RB-OMG-001
      rule: 'Supplement ''more of the same'' OTO (bundle/volume upsell) converts at 23-24%. NeuroCell: bought 1 bottle, offered 6-bottle pack. Result: 23-24% take rate.'
      threshold: 23-24% take rate for same-product bundle OTO
      context: OMG Funnels Event Video 1 - NeuroCell funnel anatomy. This is one of the most specific supplement upsell benchmarks Russell shares publicly.
      tags:
      - supplement
      - OTO
      - upsell
      - conversion-rate
      - benchmark
      module_sources:
      - OMG
      confidence: 0.95
    - id: HEUR-RB-OMG-002
      rule: Exit pop with alternate purchase channels (phone number + Amazon/alternative marketplace) adds approximately 35% more orders for older/skeptical audiences. ~20% via phone, ~15% via Amazon in
        NeuroCell case.
      threshold: ~35% incremental orders (20% phone + 15% alternate marketplace)
      context: 'OMG Funnels Event Video 1 - NeuroCell exit pop #1. Audience was older (nerve health supplement), many nervous about online credit card entry. Two exit pop options: call to order + buy on
        Amazon.'
      tags:
      - exit-pop
      - phone-order
      - amazon
      - conversion
      - older-audience
      module_sources:
      - OMG
      confidence: 0.93
    - id: HEUR-RB-OMG-003
      rule: Payment plan downsell converts approximately 15% of people who said no to upsell. When 'no' = budget objection not desire objection, a 2-payment split typically converts.
      threshold: ~15% of OTO 'noes' convert with 2-payment plan downsell
      context: OMG Funnels Event Video 2 - Whiteboard planning with Mandy. 'We usually get about 15% of people who say no here, who then say yes to that just because they're like, you know, they're on the
        edge and like, okay, it's just 50 bucks.'
      tags:
      - downsell
      - payment-plan
      - conversion
      - objection-handling
      - benchmark
      module_sources:
      - OMG
      confidence: 0.95
    - id: HEUR-RB-OMG-004
      rule: 'Traditional funnel team: designer ($50K/yr) + programmer ($80K/yr) + analytics ($60-80K/yr) = $190K-$210K/yr minimum. Build time: 1-3 weeks per funnel with 2-3 people working full time.'
      threshold: $190K/yr minimum; 1-3 weeks per funnel build
      context: OMG Funnels Event Video 1 - Russell's explicit breakdown of the team cost before ClickFunnels. Used as contrast to justify the software investment. Benchmark for enterprise funnel build cost
        in 2014-2015.
      tags:
      - cost
      - team
      - funnel-build
      - benchmark
      - opportunity-cost
      module_sources:
      - OMG
      confidence: 0.97
    - id: HEUR-RB-OMG-005
      rule: Scale ad spend only after achieving $1 in → $3+ out ratio. Minimum viable for scaling is break-even ($1:$2). Below $1:$2 = fix the funnel. At $1:$2 = careful scaling. At $1:$3+ = aggressive
        scaling.
      threshold: $1:$2 = minimum scale; $1:$3 = confident aggressive scale
      context: OMG Funnels Event Video 1 - NeuroCell funnel. 'If I was to give you a dollar and you gave me $3 back, how often would you do that? I'll do that all day long.' This ratio unlocked the ramp
        from $20K to $500K/month.
      tags:
      - ad-spend
      - funnel-economics
      - ROAS
      - scaling
      - threshold
      module_sources:
      - OMG
      confidence: 0.97
  L4_FRAMEWORKS_OMG:
    count: 3
    items:
    - id: FW-RB-OMG-001
      name: NeuroCell $500K/Month Funnel Evolution
      description: Complete documented evolution of supplement funnel from $20K to $500K/month, each phase adding one tested element.
      structure:
        phase_1_initial: Sales Letter → Thank You (~$20K/mo)
        phase_2_squeeze: +Squeeze Page → List + follow-up → income increase
        phase_3_oto1: '+OTO1: 6-pack bundle (23-24% take) → AOV increase'
        phase_4_oto2: '+OTO2: Neuromend nerve cream (3 bottles) → complementary product; +Downsell: 1 bottle (~15% of OTO2 noes)'
        phase_5_exit_pops: '+Exit Pop #1: Phone # + Amazon (+35% orders); +Exit Pop #2: Free 2-week trial (captures skeptics) → $300K-$500K/mo'
      key_insight: Each element tested in isolation. Dollar-in-$3-out ratio achieved before aggressive scaling. Went from $20K to $300K to $500K in ~2 months once ratio was locked.
      tags:
      - supplement
      - funnel-case-study
      - neuro-cell
      - scaling
      - upsell-architecture
      module_sources:
      - OMG
      confidence: 0.97
    - id: FW-RB-OMG-002
      name: 5-Step Classic Sales Funnel Template
      description: Minimum viable funnel structure applicable to any product or service.
      steps:
      - '1. Lead Magnet: capture name + email'
      - '2. Core Offer: product or service main offer'
      - '3. Order Form: capture credit card'
      - '4. Upsell OTO: complementary or volume offer'
      - '5. Thank You: confirmation + next step'
      application: Starting template before adding complexity. Any element beyond these 5 (squeeze, downsell, exit pop, membership) is an optimization layer.
      tags:
      - funnel
      - template
      - 5-step
      - minimum-viable
      - structure
      module_sources:
      - OMG
      confidence: 0.97
    - id: FW-RB-OMG-003
      name: Coaching Business 8-Page Value Ladder Funnel
      description: Complete funnel architecture for coaching certification business, designed live with Mandy Pratt.
      pages:
      - '1. Squeeze: hook = ''Day in the Life of a Life Coach'' (curiosity hook for fence-sitters)'
      - '2. Free+Shipping: DVD with life coach interviews ($0 + shipping = committed buyer)'
      - '3. OTO1: ''7 Steps to Become a Life Coach'' product ($97)'
      - '3b. Downsell: 2 payments of $47 (~15% of OTO1 noes)'
      - '4. OTO2: ''How to Get Clients'' magic bullet ($97)'
      - '5. Automated Webinar: sells $897 certification program'
      - '6. Application Page: coaching premium program ($3,995-$4,995)'
      - '7. Homework Page: creates commitment before application call'
      sequencing_logic: DVD = inspiration (I want to be a coach) → OTO1 = skills (how to coach) → OTO2 = business (get clients) → certification = credential → high-ticket = acceleration. Each step solves
        the 'next problem' revealed by buying the previous step.
      tags:
      - coaching
      - value-ladder
      - funnel
      - 8-pages
      - certification
      module_sources:
      - OMG
      confidence: 0.95
  L5_METHODOLOGIES_OMG:
    count: 2
    items:
    - id: MET-RB-OMG-001
      name: 7-Step Funnel Scaling Methodology
      steps: '1) Launch simple (sales page + thank you only) — validate product sells. 2) Add squeeze page — build list, enable follow-up sequences. 3) Add OTO1 — more of same product (bundle/volume). Target
        20%+ take rate. 4) Add OTO2 — complementary product for same buyer. 5) Add downsell — payment plan or smaller version for OTO2 rejections (captures ~15%). 6) Add Exit Pop #1 — alternate purchase
        channel (phone + marketplace) for skeptical/older audience (+35%). 7) Add Exit Pop #2 — free trial/sample offer for fence-sitters. RULE: Test each step in isolation. Measure before/after revenue
        before adding next element.'
      tags:
      - funnel
      - scaling
      - methodology
      - 7-steps
      - iterative
      - neuro-cell
      module_sources:
      - OMG
      confidence: 0.97
    - id: MET-RB-OMG-002
      name: Whiteboard Funnel Planning Process (5 Steps)
      steps: '1) Define entry hook — what gets the lead to give email? Curiosity-driven, specific, ties to desire. 2) Map value ladder on whiteboard — draw each page as a box, annotate with purpose + price.
        Connect with arrows showing flow. 3) Define all rejection paths — for each OTO, plan: downsell (payment plan or smaller offer). 4) Identify magic bullet offer — which product solves the most urgent/burning
        pain for the buyer at this stage? This is your OTO2. 5) Design high-ticket backend — application page → homework page → call → close. RULE: Do not open funnel software until the entire map is drawn
        and every page''s purpose, price, and rejection path is defined.'
      tags:
      - whiteboard
      - planning
      - funnel
      - methodology
      - before-building
      module_sources:
      - OMG
      confidence: 0.95

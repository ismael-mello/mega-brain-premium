    - id: MM-RB-086
      name: Pattern Interrupt Marketing
      description: Unconventional offers and presentation styles break through market noise because they are different from what prospects expect
      quote: This is a pattern interrupt. It is something different that they are not used to seeing and that is why people respond to it so well because it is different
      application: Use free-plus-shipping physical products and casual iPhone videos instead of standard squeeze pages and polished sales letters
      tags:
      - pattern-interrupt
      - differentiation
      - marketing
      - attention

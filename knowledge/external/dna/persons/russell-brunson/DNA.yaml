    - id: MET-RB-MCC-007
      name: 15-Step Sales Letter Copywriting Process
      steps: 'RESEARCH: 1) Define target market + sophistication level. 2) Identify trigger words. 3) Define problem/desire. 4) Unique selling proposition. STORY+PROOF: 5) Develop attractive character/narrator.

      statement: Content marketing should self-liquidate. The goal is not to make profit from your content -- it's to break even. If you spend a dollar to get someone to listen, read, or watch your content,
        and you make a dollar back immediately, your entire audience growth becomes free. That's the power of a Self-Liquidating Offer (SLO).
      context: FU Issue 1 / Self-Liquidating Content - Mike Dillard Self Made Man case study. Russell's core thesis on content monetization.
      tags:
      - content-marketing
      - slo
      - fu2016
      - self-liquidating
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-121
      statement: 'There are only two reasons to publish content: (1) to find your voice -- even if nobody shows up, you''re becoming better; (2) to discover what your audience responds to -- the topics
        that get engagement tell you what to do more of. Publishing is a feedback loop, not just a broadcast.'
      context: FU Issue 1 / Self-Liquidating Content. Russell's philosophy on content creation as discovery mechanism.
      tags:
      - content-marketing
      - publishing
      - fu2016
      confidence: 0.92
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-122
      statement: Cold traffic requires a bridge -- you cannot sell directly from cold interest to your offer. Someone who just voted to impeach Obama won't sign up for ClickFunnels. There's nothing connecting
        those two things. You must build a bridge that takes them from where they are emotionally to where you need them to be.
      context: FU Issue 1 / Political Bridge. The fundamental insight about cold traffic conversion.
      tags:
      - cold-traffic
      - bridge
      - fu2016
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-123
      statement: The best funnels push people AWAY. Don't try to appeal to everyone -- create a funnel that filters for your dream client. If some people are offended, if some people self-select out, that's
        working AS DESIGNED. The goal is the core few who are exactly right, not the masses who are sort of right.
      context: FU Issue 2 / Warrior Week case study (Garrett White). The polarization-as-filter philosophy.
      tags:
      - filtering
      - positioning
      - high-ticket
      - fu2016
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-124
      statement: You must sell the desire at every single step. Don't just say give me your email and send you a documentary. Pitch it. Create desire for why they NEED to watch it. If there's no desire,
        they won't give the email, and they certainly won't watch 2 hours. Every page is a sales page.
      context: FU Issue 2 / Warrior Week funnel analysis. Garrett White model -- every step must sell the next step.
      tags:
      - desire
      - high-ticket
      - documentary-funnel
      - fu2016
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-125
      statement: When you have a buyer at a certain price point, you MUST sell them the next thing. A $5,000 buyer has more money to spend. A $10,000 Warrior Week attendee will buy a $50,000 program. If
        you don't have a next offer, you're leaving massive money on the table. The moment of highest conversion is immediately after an amazing experience.
      context: FU Issue 2 / High Ticket Funnel (Warrior Week). Russell's reflection on backend offer stacking.
      tags:
      - backend
      - offer-stack
      - high-ticket
      - fu2016
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-126
      statement: Sell one specific thing from your library, not the whole library. Nobody wants to pay for a library card -- they want the ONE book they need right now. Pull out individual pieces of your
        membership/content and sell each as its own front-end offer. Different pieces attract different market segments.
      context: FU Issue 3 / Digital Marketer Continuity Funnel. Ryan Deiss model that took DM from hundreds to tens of thousands of continuity members.
      tags:
      - continuity
      - splinter-offer
      - membership
      - fu2016
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-127
      statement: Indoctrination before the sale is the key to high-ticket. Don't sell on the first touch. Build culture, community, belonging FIRST. Let them watch hours of content, fill out applications,
        go through a process -- by the time they talk to sales, they're already sold. The sale is just the formality.
      context: FU Issue 2 / Warrior Week funnel. Average person watches 2-hour documentary 4x before applying = 8+ hours before purchase.
      tags:
      - indoctrination
      - high-ticket
      - pre-selling
      - fu2016
      confidence: 0.95
      module_sources:
      - FU2016
      raw_source: knowledge/external/sources/russell-brunson/raw/17._Funnel_University_2016/
    - id: PHI-RB-128
      statement: People don't just want to BUY your thing -- they want to BELONG to something. The most powerful funnels create a movement, a tribe, an identity. When they join Warrior Week, they're not
        buying training -- they're becoming a Warrior. Build your funnel around belonging, not just benefit.
      context: FU Issue 2 / Warrior Week. The experiential funnel philosophy -- belonging over benefit.
      tags:
      - belonging
      - tribe
      - community

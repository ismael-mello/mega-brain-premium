    - id: MM-RB-085
      name: The Slippery Slope of Micro-Commitments
      description: Once someone makes a small purchase decision, they are psychologically primed to make larger purchases in sequence
      quote: They say yes I am interested enough I am willing to pull my credit card out and start this process when they say that and they begin it all of a sudden the next step they are way more likely
        to say yes
      application: Design funnels with incremental commitment steps - free to shipping to upsell to invisible funnel to application
      tags:
      - psychology
      - commitment
      - upsells
      - buyer-psychology
      confidence: 0.9

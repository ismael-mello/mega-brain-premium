    - id: FW-RB-129
      statement: 'Stack Slide Framework: (1) Present item 1, stack it. (2) Present item 2, stack 1+2. (3) Present item 3, stack 1+2+3. Continue until all items displayed. Only THEN reveal price. Brain associates
        price with entire stack, not last item. Armand Morin invention.'
      context: Day 2 Evening — detailed mechanical breakdown of the Stack.
      module_sources:
      - ES-LIVE-S06
    - id: FW-RB-130
      statement: 'Perfect Webinar Full Structure: Act 1 (15min) = rapport + ruler + Big Domino statement + qualify by association + origin story. Act 2 (45min) = 3 Secrets, each with Epiphany Bridge destroying
        one false belief category (Vehicle/Internal/External). Act 3 (60min) = transition + stack + closes + urgency/scarcity + Q&A with countdown.'
      context: Day 2 Morning→Evening — complete 3-act PW structure taught across 3 sessions.
      module_sources:
      - ES-LIVE-S04
      - ES-LIVE-S05
      - ES-LIVE-S06
    - id: FW-RB-131
      statement: 'If-All Statement Close: ''If all this did was [result from Secret 1], would it be worth [price]?'' Repeat for each secret. Three consecutive yes''s anchored to stack value. ''They''ve
        told me three times it''s worth $11,552. Now that''s the value in their mind.'''
      context: Day 2 Evening — value anchoring close technique.
      module_sources:
      - ES-LIVE-S06
    - id: FW-RB-132
      statement: 'Secret Teaching Framework: (1) State the Secret → (2) Epiphany Bridge Story → (3) Show others'' results → (4) Break related beliefs (''You''re probably thinking...'') → (5) Restate as
        undeniable truth. Not traditional education but belief transformation through storytelling.'
      context: Day 2 Afternoon/Evening — the complete teaching flow for each of the 3 secrets.
      module_sources:
      - ES-LIVE-S05
      - ES-LIVE-S06
    - id: FW-RB-133
      statement: 'Price Drop Sequence: Full stack value → ''I had two choices'' → show what end result is worth → $100K anchor (what others pay) → reveal actual price → price justification → guarantee.'
      context: Day 2 Evening — multi-step price reveal mechanism.
      module_sources:
      - ES-LIVE-S06
    - id: FW-RB-134
      statement: 'Webinar Q&A Framework: preload known questions into slides → answer each question → call to action after EVERY answer → 30-minute countdown clock. ''For 30 minutes I do Q&A. Every time
        I answer a question, I do a call to action.'''
      context: Day 2 Evening — structured Q&A as closing mechanism.
      module_sources:
      - ES-LIVE-S06
    - id: FW-RB-135
      statement: 'Offer Completeness Framework: Core Training + Tool (software) + Tangible tied to Secret 1 (e.g., traffic) + Tangible for Secret 2 (e.g., copy templates) + Tangible for Secret 3 (e.g.,
        email sequences) + Urgency Bonus for first N buyers.'
      context: Day 2 Afternoon/Evening — the stack builds in purposeful layers.
      module_sources:
      - ES-LIVE-S05
      - ES-LIVE-S06
    - id: FW-RB-136
      statement: 'Dream 100 Box Package: (1) Intro letter explaining who you are + opportunity, (2) Copy of product/book (even blank pre-launch), (3) Branded entertainment piece (ClickFunnels Avengers comic
        with us-vs-enemy narrative), (4) Memorable physical item (Avenger dolls, Ferrari keychains), (5) Contact info for affiliate/partner managers.'
      context: Day 3 Afternoon — Russell shows actual Expert Secrets Dream 100 box on stage.
      module_sources:
      - ES-LIVE-S08
    - id: FW-RB-137
      statement: 'Dream 100 Three Paths to Monetization: Path 1 = get them to promote directly (email list, social post). Path 2 = if they won''t promote, buy ads targeting their audience (e.g., target
        Tony Robbins'' 1.5M FB followers). Path 3 = true joint ventures — co-create products (e.g., Jim Edwards co-created Funnel Scripts).'
      context: Day 3 Afternoon — three monetization strategies after building Dream 100 relationships.
      module_sources:
      - ES-LIVE-S08
    - id: FW-RB-138
      statement: 'PW→Email Sequence Mapping: Email 1 = Origin Story. Email 2 = New Opportunity (Secret #1). Email 3 = Internal Belief (Secret #2). Email 4 = External Belief (Secret #3). Email 5 = Stack/Close.
        Replaces DotCom Secrets'' Soap Opera Sequence with structured persuasion.'
      context: Day 3 Recap — Russell's epiphany from inner circle member. PW framework maps perfectly to 5-email sequence.
      module_sources:

    - id: MM-RB-131
      statement: 'Prolific Index: spectrum from Boring → Mainstream → Prolific → Crazy. Content/positioning diagnostic tool. Boring = no attention, Crazy = no credibility, Prolific = massive following with
        authority.'
      context: Day 1 Morning — introduced as key positioning diagnostic for content creators and movement leaders.
      module_sources:
      - ES-LIVE-S01
    - id: MM-RB-132
      statement: 'Triple-Layer Interest Targeting: layer 3 different interest groups in Facebook ads for hyper-targeted audiences. Stack interests (must like A AND B AND C) to find intersection audience
        that IS your niche.'
      context: Day 1 Evening — Facebook ads tactical teaching.
      module_sources:
      - ES-LIVE-S03
    - id: MM-RB-133
      statement: 'Techno Babble kills sales — use ''Kind Of Like'' bridges to translate expert language into everyday understanding. When experts use jargon, prospects disconnect. Fix: ''It''s kind of like...''
        followed by relatable analogy.'
      context: Day 2 Morning — Epiphany Bridge storytelling teaching, making complex concepts accessible.
      module_sources:
      - ES-LIVE-S04
    - id: MM-RB-134
      statement: 'Three Categories of False Beliefs: Vehicle (''this method won''t work''), Internal (''I can''t do this personally''), External (''my circumstances prevent success''). Each requires a separate
        Epiphany Bridge story to break.'
      context: Day 2 Afternoon — deepens the three secrets structure. Each secret addresses one category of false belief.
      module_sources:
      - ES-LIVE-S05
    - id: MM-RB-135
      statement: 'Zeigarnik Effect: open loops create irresistible curiosity. Incomplete information creates tension that demands closure. Use for naming secrets with curiosity-based titles.'
      context: Day 2 Afternoon — psychology behind secret/curiosity-based naming of webinar sections.
      module_sources:
      - ES-LIVE-S05
    - id: MM-RB-136
      statement: 'The Ruler: set expectations in first 2-3 minutes — explicitly state who the presentation is for and what result to expect. Reduces early drop-off. Also opportunity to exclude wrong prospects.'
      context: Day 2 Evening — webinar introduction structure.
      module_sources:
      - ES-LIVE-S06
    - id: MM-RB-137
      statement: 'Memory Association Principle: the brain associates price with the LAST thing it saw, not the total offer. If last item shown is a small bonus, price feels expensive. Stack Slide solves
        this by re-presenting entire offer before price.'
      context: Day 2 Evening — Armand Morin's insight behind the Stack mechanism.
      module_sources:
      - ES-LIVE-S06
    - id: MM-RB-138
      statement: One is a scary number. I have almost gone bankrupt three times. Every single time it was because I was focusing on just one thing — one traffic source, one merchant account, one platform.
        Diversifying is big.
      context: Day 3 Afternoon — Dream 100 teaching, warning against single-source dependence. Google screwed him, MySpace disappeared overnight.
      module_sources:
      - ES-LIVE-S08
    - id: MM-RB-139
      statement: 'Never Been Kissed / One Cool Kid principle: all you need is one cool kid to think you''re cool and then you''re in. Tellman Knudsen got 48 rejections, then Kevin Wilkie said yes — next
        30 people all said yes.'
      context: Day 3 Afternoon — Dream 100 relationship dynamics. One influential yes triggers cascade.
      module_sources:
      - ES-LIVE-S08
    - id: MM-RB-140
      statement: The UPS man gets past every gatekeeper. Physical mail is the only way to get past the gatekeeper directly to the decision maker. Russell orders Amazon items in separate boxes to maximize
        'Christmas every day' feeling.
      context: Day 3 Afternoon — why Dream 100 packages must be physical boxes, not emails or letters.
      module_sources:
      - ES-LIVE-S08
    - id: MM-RB-141
      statement: 'Perfect Webinar as email sequence: Email 1 = Origin Story, Email 2 = New Opportunity (Secret #1), Email 3 = Internal Belief (Secret #2), Email 4 = External Belief (Secret #3), Email 5
        = The Stack/Close. Replaces Soap Opera Sequence.'
      context: Day 3 Recap — Russell's epiphany from inner circle member who adapted PW to email. Realizes it replaces soap opera sequences from DotCom Secrets.
      module_sources:
      - ES-LIVE-S12
    - id: MM-RB-142
      statement: 'Perfect Webinar as product launch: Landing page = origin story + opt-in. Video 1 = New Opportunity. Video 2 = Internal Belief. Video 3 = External Belief. Video 4 = Stack/Close. Maps Jeff
        Walker sideways sales letter to PW framework.'
      context: Day 3 Recap — Russell shows how he did this at extremefunnelmakeover.com for Funnel Hacking Live.
      module_sources:
      - ES-LIVE-S12
    - id: MM-RB-143
      statement: 'Culture Creation Loop: define identity → name the tribe → create rituals → members police each other. Self-sustaining community flywheel where belonging drives behavior more than external
        incentive.'
      context: Day 1 Morning — movement building infrastructure. Naming creates identity, identity drives self-policing behavior.
      module_sources:
      - ES-LIVE-S01
    - id: MM-RB-144
      statement: 'Search vs Interruption -- the two fundamental modes of commerce throughout history. Search: customer actively looking, price-sensitive, race to the bottom. Interruption: marketer captures
        attention, sells on perceived value, can charge premium. History always starts with search then shifts to interruption.'
      context: TS LIVE Session 2. Core framework of the Traffic Secrets book. Russell traces from store visits (search) → direct mail 1835 (first interruption) → radio 1922 → TV 1927 → Google (search) →
        Facebook (interruption).
      module_sources:
      - TS-LIVE-S2
    - id: MM-RB-145
      statement: 'Three types of traffic: (1) Traffic you CONTROL -- you pay for it (Facebook ads, Google ads). (2) Traffic you EARN -- you work for it (podcast interviews, guest posts, PR). (3) Traffic
        you OWN -- your list, your followers, your black box. Own is the most important. Control and Earn should always push into Own.'
      context: TS LIVE Session 3. Core traffic classification. If you have more money than time → control. More time than money → earn. Both should feed into own.
      module_sources:
      - TS-LIVE-S3
    - id: MM-RB-146
      statement: 'Cold-Warm-Hot traffic spectrum (Gene Schwartz awareness levels). Cold: only knows pain, speak to the problem. Warm: knows the solution category, speak to the desire. Hot: knows your product,
        speak to the product. Different language patterns at each stage. You can''t sell ClickFunnels to cold traffic -- you sell ''make money online.'''
      context: TS LIVE Session 1 (Dream Customer Journey section). Gene Schwartz awareness ladder applied to funnel copy at each traffic temperature.
      module_sources:
      - TS-LIVE-S1
    - id: MM-RB-147
      statement: 'Gary Vee TV-Phone model: The TV in 1965 with 3 channels (ABC/CBS/NBC) = the smartphone today. The apps (Facebook, Instagram, YouTube) = the channels. Your show/content inside the app =
        the TV show. Miller Light won by shifting from radio to TV while others stayed romantic about radio.'
      context: 'TS LIVE Session 5. Gary Vee video clip shown on stage. Russell extends: Tony Robbins dominated 3 TV channels with infomercials, then struggled when cable splintered into 10,000 channels.'
      module_sources:
      - TS-LIVE-S5
    - id: MM-RB-148
      statement: 'Porcupine in Heat principle: When customers are in pain, they buy everything in sight for a short window. Like porcupines that mate frantically for two weeks then stop for a year. Frequency
        in buying signals a buyer in heat -- the most valuable customer to catch.'
      context: 'TS LIVE Session 1 (RFM section). Russell''s bowling story: lost to Mike Loveridge, then bought everything bowling-related in one night -- shoes, balls, courses, ebooks. Never bowled again
        for 4 years.'
      module_sources:
      - TS-LIVE-S1
    - id: MM-RB-149
      statement: 'RFM+S scoring: Recency (how recent they bought -- hotline buyers within 30 days are best), Frequency (how often -- porcupine in heat), Monetary (how much they spend -- measures pain level),
        Social (real email vs throwaway -- real email worth 80x more per Jeremy Shoemaker data).'
      context: TS LIVE Session 1. Old school direct mail lead scoring (Dan Kennedy, Gary Halbert era) adapted into ClickFunnels ActioneticsMD value score with 4 circles.
      module_sources:
      - TS-LIVE-S1
    - id: MM-RB-150
      statement: 'Distribution Channel model (Shark Tank analogy): Every shark has ONE distribution channel they''ve mastered. Damon John → clothing retail. Lori → QVC. Cuban → internet. They only invest
        when the product fits their channel. Your job is to build your own distribution channel.'
      context: 'TS LIVE Session 3. Lori Greiner took a $1.50 glasses magnet to $18M through QVC distribution. Russell''s own channel: email list of 1.5M people.'
      module_sources:
      - TS-LIVE-S3
    - id: MM-RB-151
      statement: 'Black Box concept: Like an airplane''s black box that records all flight data and survives the crash -- your customer database is your black box. It records all the data (email, messenger,
        followers). When the platform crashes (Thanos snaps), your black box survives.'
      context: TS LIVE Session 7 (Front End Funnels). Russell defines black box as bigger than email list -- it's all your owned data across channels.
      module_sources:
      - TS-LIVE-S7
    - id: MM-RB-152
      statement: 'Buying solves the problem in the customer''s mind -- it opens the NEXT problem. The second someone buys your abs ebook, in their mind they already have abs. Selling them more abs content
        on the upsell fails. Instead, solve the next logical problem: ''Now that you have abs, you need big biceps.'' Tim Urway insight.'
      context: 'TS LIVE Session 8 (Front End Funnels). 108 Split Tests upsell failure: offered more split testing content to split-test buyers → 0.5% take rate. Should have offered the next logical need.'
      module_sources:
      - TS-LIVE-S8
    - id: MM-RB-153
      statement: 'Value Ladder as feeling escalation: The reason someone ascends your value ladder is not logical progression of products -- it''s that each tier gives them a FEELING they want more of.
        Like dating: first date → second date → engagement → marriage → kids. Each step they received value (feeling) and wanted more.'
      context: TS LIVE Session 1 (end of Day 1, value ladder section). Russell connects Tony Robbins' 'everything is a feeling' insight to why customers naturally ascend.
      module_sources:
      - TS-LIVE-S1
    - id: MM-RB-154
      statement: You don't create traffic -- you tap into existing streams. People are already going to Facebook, Instagram, YouTube, blogs, podcasts. Your job is to figure out where your dream customers
        already congregate and step into that stream to divert some of it to you.
      context: 'TS LIVE Session 3. Key mindset shift: stop saying ''how do I create traffic'' -- traffic already exists everywhere. You find it and redirect it.'
      module_sources:
      - TS-LIVE-S3
    - id: MM-RB-155
      statement: 'Conversation Domination: On your phone, group all the apps where your dream audience lives into one folder. Every morning, open that folder, scroll through each app, follow your Dream
        100''s shows in each channel. This is your daily traffic intelligence routine.'
      context: TS LIVE Session 5. Russell shows his actual iPhone folder called 'Conversation Domination' with 9 apps grouped together.
      module_sources:
      - TS-LIVE-S5
    - id: MM-RB-156
      name: product-commodity-offer-environment-evolution
      statement: 'Business value evolves in phases: Product (initial traction) → Commodity (competitors copy, price war) → Offer (unique bundle, charge more) → Environment (community/loyalty). Each phase
        lets you spend more to acquire customers.'
      context: Jan 2022 Greatest Hits. Visual diagram showing evolution. 'As I went through Dan Kennedy archives, I saw this evolution documented across 40 years of case studies.'
      module_sources:
      - MM-GH-JAN2022
    - id: MM-RB-157
      name: invisible-funnel-model
      statement: 'Invisible Funnel (Daegan Smith concept): People sign up for premium paid training but don''t pay until AFTER it''s over, and only IF they love it. Credit card captured upfront. ~10% ask
        not to be billed. Net signup increase 2-3x. Takes away ALL risk for buyer.'
      context: Feb 2022 Greatest Hits. Used for Two Comma Club LIVE virtual event. 57.45% chose invisible funnel ($0→$197), 42.55% prepaid for $97 with replays.
      module_sources:
      - MM-GH-FEB2022
    - id: MM-RB-158
      name: virtual-event-vs-live-economics
      statement: 'Virtual event economics destroy live events: $0 venue cost (vs $500K+), 3-5 person team (vs 300+ people), launch every 90 days (vs once/year), 8+ figures from single evergreen funnel.
        Lockdowns trained people to sit on Zoom for 3-day events.'
      context: 'Feb 2022 Greatest Hits. Inner Circle + Category Kings mastermind consensus: virtual events made them the most money in past 12 months. 7-8-9 figure entrepreneurs all agreed.'
      module_sources:
      - MM-GH-FEB2022
    - id: MM-RB-159
      name: three-day-virtual-event-structure
      statement: 'Day 1: Teach STRATEGY behind new opportunity (''I need a funnel!''). Workshop internal false beliefs (''I could build a funnel!''). Day 2: Address external false beliefs (traffic). Pitch
        coaching + stack/close. Break, then success story roundtable. Day 3: Personal development (''I can do anything!''). Re-pitch with new bonuses + urgency close.'
      context: Feb 2022 Greatest Hits. Structure mirrors Perfect Webinar but expanded to 3 days. 259 people into $25K coaching in one weekend. Most $25K buyers came from VIP group.
      module_sources:
      - MM-GH-FEB2022
    - id: MM-RB-160
      name: pre-funnel-cost-reduction
      statement: 'Pre-funnel model: Free ebook squeeze page ($5/lead) → Thank-you page pitches webinar registration → Even if they don''t register, force into webinar sequence. Result: webinar registrant
        cost drops from $20-25 to $5 (75-80% reduction). Clone funnel with different hooks to target new segments within hours.'
      context: Apr 2022 Greatest Hits. Facebook/Apple feud raised costs dramatically. 108 Proven Split Test Winners ebook was first test. Cloned for network marketers, webinar hacks video, multiple segments.
      module_sources:
      - MM-GH-APR2022
    - id: MM-RB-161
      name: rubber-band-stretch-capacity
      statement: 'Keith Giddens: ''By itself, a rubber band is useless. Stretched to its capacity, it can do amazing things — bind things together, organize things. But stretched too far, it will snap and
        break.'' We need to stretch ourselves but not to the point where we break.'
      context: Jan 2022 Greatest Hits, Secrets of Success. RB applies to seasonal radical imbalance — push hard but recognize when to snap back to balance.
      module_sources:
      - MM-GH-JAN2022
    - id: MM-RB-162
      name: event-horizon-memory-model
      statement: 'Craig Ballantyne: Brain creates routine → routine deletes memories → days feel shorter. Event horizons = unique, unrepeatable experiences that lock memories permanently. Wyoming helicopters
        = vivid forever. Puerto Rico repeat = brain deletes. Consciously create event horizons to combat routine memory deletion.'
      context: 'Feb 2022 Greatest Hits, Secrets of Success. 3rd mastermind meeting — first two (Wyoming, Puerto Rico) were unique and memorable. Third was same location, same activities — brain would delete
        it. Solution: do something crazy to lock it in.'
      module_sources:
      - MM-GH-FEB2022
    - id: MM-RB-163
      name: media-cost-evolution-inevitability
      statement: 'DK via RB: Cheap media is always available somewhere. But prices ALWAYS rise. TV half-hours went from $200 to $20,000. Facebook went from $5/lead to $25+. Winners figure out economics
        to survive price increases. Losers see the numbers and ''commit suicide.'' No bad number exists — only gaps to bridge.'
      context: 'Apr 2022 Greatest Hits. DK''s detailed response at FHL 2021 about rising media costs. Proactiv example: spending $300→$600→$900 to acquire $39 customer. Competitors couldn''t figure out
        the math.'
      module_sources:
      - MM-GH-APR2022
    - id: MM-RB-164
      name: cross-industry-borrowing
      statement: Breakthroughs come from bringing in fresh ideas found OUTSIDE your own business. Drive-through from banks to McDonald's. NetJets from time-shares. Microwave from restaurants to homes. 'Gift
        with appointment' from real estate to dentistry to financial advisors. Fools stay stuck in 'my business is different' box.
      context: Mar 2022 Greatest Hits, Classic Kennedy column in RB's newsletter. 'You choose to limit or expand your income by how you reject or embrace ideas found far afield from your present modus operandi.'
      module_sources:
      - MM-GH-MAR2022
    - id: MM-RB-165
      name: four-levels-value-pyramid
      statement: Implementation (trade time for dollars, $6.25/hr trash man) → Unification (manage people doing implementation) → Communication (create messages that move masses — singers, authors, speakers)
        → Imagination (conceive ideas that change world — Steve Jobs took over music, computer, phone, movie industries with ideas + events).
      context: Apr 2022 Greatest Hits, Secrets of Success. Steve Wozniak invented computer (implementer, still became billionaire by hitching to Jobs). Tim Cook is CEO since 2011 but people still think
        of Jobs. Apple WWDC = ideas + events → $2T company.
      module_sources:
      - MM-GH-APR2022
    - id: MM-RB-166
      statement: 'The Bump Test: Free+Shipping gets 3x more buyers than straight sale. Add Order Form Bump and ~1/3 take it. Result: same front-end revenue with far less effort AND 3x more people seeing
        upsells.'
      context: Funnel Labs Issue 1 - Order Form Bump revenue equivalence model.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 1 (Magnetic Marketing)
    - id: MM-RB-167
      statement: Reverse billing removes purchase friction exponentially -- charging AFTER value delivery lets you convert 5-10x more registrations than upfront payment, with only ~10% cancellation rate.
      context: Funnel Labs Issue 2 - Invisible Funnel reverse billing model (550 signups vs ~55 upfront).
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 2 (Magnetic Marketing)
    - id: MM-RB-168
      statement: 'Product Awareness Continuum (Gene Schwartz adapted): Unaware > Problem-Aware > Solution-Aware > Product-Aware > Most Aware. Cold traffic is at the bottom; you must meet them where they
        are.'
      context: Funnel Labs Issue 7 - Funnel Catcher applied Gene Schwartz awareness model.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 7 (Magnetic Marketing)
    - id: MM-RB-169
      statement: 'Food Court Test: If you yelled your offer in a food court, would the majority understand? If not, your message is too product/solution-focused for cold traffic. Broaden vocabulary for
        the masses.'
      context: Funnel Labs Issue 3 - Bridge Page cold traffic messaging test.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 3 (Magnetic Marketing)
    - id: MM-RB-170
      statement: 'Sideways Sales Letter model: Take your proven webinar pitch (3 secrets + stack) and break it into 4 product launch videos. Video 1 = Secret 1, Video 2 = Secret 2, Video 3 = Secret 3, Video
        4 = The Pitch with Stack.'
      context: Funnel Labs Issue 6 - Ultimate Funnel Stack webinar-to-launch conversion model.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 6 (Magnetic Marketing)
    - id: MM-RB-171
      statement: 'Consumption drives retention: anyone who started USING the product (building a funnel) almost never cancelled. The problem is getting people to consume, not getting them to buy.'
      context: Funnel Labs Issue 5 - Video Unlocker consumption-retention connection.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 5 (Magnetic Marketing)
    - id: MM-RB-172
      statement: 'Good Old Boys Club model: In every mature market there''s a club of top players who know each other. Getting in is like rolling a stone up a hill -- hard at first, but once over the top,
        momentum is unstoppable.'
      context: Funnel Labs Issue 8 - Dream 100 network penetration model.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: MM-RB-173
      statement: 'Arsenio Hall Platform Effect: ''When I had my own show, everybody returned my calls.'' Without a platform, even previously famous people lose access. A podcast IS your platform for Dream
        100 access.'
      context: Funnel Labs Issue 8 - Dream 100 platform as currency model.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: MM-RB-174
      statement: 'Direct Competitors vs Indirect Competitors: Direct competitors sell the same thing (nerve pain supplements). Indirect competitors sell to the same customer (diabetic products). 80% of
        supplement buyers had diabetes -- indirect competitors had the audience.'
      context: DCS LIVE Session 3 - two-axis competitor analysis for funnel hacking.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: MM-RB-175
      statement: 'Freemium-to-Premium transition: Survival Life''s credit card knife funnel failed upselling membership directly. Only worked when bridging with ANOTHER physical product (Hoffman Richter
        knife) gated behind membership. Free-to-free (bigger free) converts to premium.'
      context: DCS LIVE Session 3 - freemium mechanics, 50-60K members at $20/month.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: MM-RB-176
      statement: 'Splinter Offer model: Don''t sell your whole thing as tripwire. Splinter off the single MOST interesting piece. Not ''36 favorite juice recipes'' -- just ''The Shrek Shake.'' Creates curiosity,
        leaves room for ascension.'
      context: DCS LIVE Session 3 - tripwire offer construction principle.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: MM-RB-177
      statement: 'Bait-as-Filter: Your bait should simultaneously ATTRACT your dream client and REPEL everyone else. ''108 Proven Split Test Winners'' repels beginners who don''t know what split tests are,
        magnetically attracts experienced marketers.'
      context: DCS LIVE Session 1 - why bait attracted $25K-$100K coaching clients.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 1 (Magnetic Marketing)
    - id: MM-RB-178
      name: Five Fatal Flaws of Funnels
      description: Framework for diagnosing funnel failures through 5 core principles learned from Dan Kennedy. Designed to help funnel hackers look at their funnels and business differently using foundational
        marketing principles rather than internet-only tactics.
      context: MM Welcome -- RB's structured interview framework with DK. The 5 flaws represent gaps between internet marketing tactics and foundational direct response principles.
      module_sources:
      - MM-08-Welcome
    - id: MM-RB-179
      name: Strategies vs Tactics Mental Model
      description: 'Two-tier evaluation of any marketing approach: (1) Is this a STRATEGY (timeless principle that works across media and eras) or a TACTIC (platform-specific trick that expires)? Build
        your foundation on strategies, use tactics for execution. When tactics stop working, strategies remain.'
      context: MM Welcome -- RB's core thesis for acquiring Magnetic Marketing. All internet marketing training teaches tactics; DK's material teaches strategies. The combination creates sustainable businesses.
      module_sources:
      - MM-08-Welcome
    - id: MM-RB-180
      name: Webinar Mastery Through Repetition
      description: 'When you find a presentation that works, do it 100+ times back to back until the AV crew can set their watch by when you say each sentence. Every joke, water break, and transition becomes
        muscle memory. Inspired by Kavett Robert''s principle (via DK): ''It''s infinitely easier to get a new qualified audience than it is to get a new speech that works.'''
      context: MM Welcome -- RB describing his ClickFunnels launch webinar experience. Did the same 75-minute presentation 100+ times. AV crew knew his timing to the second. Direct application of DK's 'ride
        the winner' principle.
      module_sources:
      - MM-08-Welcome
  L3_HEURISTICS:
    count: 173
    items:
    - id: HEUR-RB-001
      rule: For every $1 made in front-end funnels, follow-up/communication funnels generate over $16 in revenue.
      threshold: $16 return per $1 front-end
      context: Overall business economics showing follow-up funnel ROI.
      module_sources:
      - M03
    - id: HEUR-RB-002
      rule: The goal of a properly built funnel is to put $1 in advertising and get $2-$3 back out. At that point you have no advertising budget, just a cash printing machine.
      threshold: $1 in -> $2-3 out (2-3x ROAS minimum)
      context: DotCom Secrets introduction (M00); Funnel economics (M06).
      module_sources:
      - M00
      - M06
    - id: HEUR-RB-003
      rule: ClickFunnels spends $15 to acquire a customer and makes $33 back, netting +$18 per customer.
      threshold: $15 spend -> $33 return = +$18 net
      context: Real example from ClickFunnels' own funnel economics.
      module_sources:
      - M00
    - id: HEUR-RB-004
      rule: 8 weeks of sequential implementation builds a complete foundation for an expert business.
      threshold: 8 weeks
      context: Secrets Masterclass structure.
      module_sources:
      - M00
    - id: HEUR-RB-005
      rule: Watch content for 30 seconds to 4 minutes, then pause and implement. Never consume more than 4 minutes without implementing.
      threshold: 30s - 4min consumption, then pause
      context: Brandon and Kaylin went $0 to $80K/month in 2 months using this.
      module_sources:
      - M00
    - id: HEUR-RB-006
      rule: Pick ONE funnel type and master it. Don't try to build all funnels simultaneously. You are not allowed to do anything else until that presentation has made you at least a million dollars.
      threshold: 1 funnel until $1M; then diversify
      context: DotCom Secrets Blueprint Workshop (M00); Webinar discipline (M07, M08).
      module_sources:
      - M00
      - M02
      - M07
      - M08
    - id: HEUR-RB-007
      rule: Businesses plateau at $3-4M revenue without a movement/tribe. Adding the movement layer breaks through.
      threshold: $3-4M revenue ceiling
      context: Expert Secrets introduction. Russell's own plateau.
      module_sources:
      - M00
    - id: HEUR-RB-008
      rule: You only need 1,000 true fans to build a sustainable expert business.
      threshold: 1,000 fans
      context: Kevin Kelly's concept referenced in M01A.
      module_sources:
      - M01A
    - id: HEUR-RB-009
      rule: '''Would They Want It Bad?'' -- Before creating any offer, ask this. If the answer is lukewarm, the offer needs work.'
      threshold: 'Qualitative (binary: passionate yes or no)'
      context: Mass Movement lesson on choosing your niche.
      module_sources:
      - M01A
    - id: HEUR-RB-010
      rule: Your target market must have irrational passion for the topic. They must be both willing AND able to buy.
      threshold: Qualitative (irrational passion + money)
      context: Creating Your Niche lesson (M01A); Dream Customer Profile (M02).
      module_sources:
      - M01A
      - M02
    - id: HEUR-RB-011
      rule: You will find your authentic voice after approximately 30-40+ pieces of content. Everything before that is practice.
      threshold: ~30-40 episodes/pieces of content
      context: Attractive Character lesson (M01A); Voice discovery (M06).
      module_sources:
      - M01A
      - M06
    - id: HEUR-RB-012
      rule: '5-Minute Persuasion Window: Touch all 5 elements of persuasion (dreams, failures, fears, suspicions, enemies) within ~5 minutes.'
      threshold: 5 minutes; 5 elements
      context: One Sentence Persuasion lesson.
      module_sources:
      - M01A
    - id: HEUR-RB-013
      rule: 'Content Volume Reveals Winners: The person who produces the most content is almost always the market leader.'
      threshold: Qualitative (more = better)
      context: Mass Movement lesson on building audience.
      module_sources:
      - M01A
    - id: HEUR-RB-014
      rule: Tangible identity-building rewards like custom T-shirts create more loyalty than cash incentives.
      threshold: ~$10/shirt for identity marker
      context: T-Shirt Identity lesson.
      module_sources:
      - M01A
    - id: HEUR-RB-015
      rule: Free Plus Shipping ($7-$10) is the most effective way to identify true fans and acquire buyers. Keep shipping under $5 for best results.
      threshold: $4.95-$9.95 shipping; <$5 ideal, <$10 acceptable
      context: T-Shirt lesson (M01A); Tripwire Funnel (M02); Free-plus-shipping price thresholds (M04).
      module_sources:
      - M01A
      - M02
      - M04
    - id: HEUR-RB-016
      rule: Less than 1% of any market wants improvement. Almost everyone wants something NEW.
      threshold: <1% of market wants improvement
      context: New Opportunity lesson Part 1.
      module_sources:
      - M01B
    - id: HEUR-RB-017
      rule: Run your ask campaign until you receive at least 100 questions/responses. Below 100 is insufficient data.
      threshold: 100 questions minimum
      context: Ask Campaign lesson.
      module_sources:
      - M01B
    - id: HEUR-RB-018
      rule: Run an ask campaign approximately every quarter to stay connected to what your market wants.
      threshold: Every ~90 days
      context: Ask Campaign lesson.
      module_sources:
      - M01B
    - id: HEUR-RB-019
      rule: Before launching any paid product, give it away free to ~100 people and get them results first.
      threshold: 100 beta users
      context: Results-First Launch Sequence lesson.
      module_sources:
      - M01B
      pdf_enrichments:
      - pdf_source: Modules & Scripts
        page_ref: PDF-02-Ladders-Funnels PAGE 6
        enrichment: 'SLO funnel math: At 30% SLO conversion rate, need 150 front-end sales per month. At 5% opt-in rate, need 3,000 clicks per month (100 per day).'
    - id: HEUR-RB-020
      rule: Only offer ONE new opportunity on the front end. Additional opportunities go in the back-end stack.
      threshold: 1 front-end offer
      context: New Opportunity lesson.
      module_sources:
      - M01B
    - id: HEUR-RB-021
      rule: '$20K/month take-home provides financial freedom: $2M house, Tesla, debt elimination, vacations, $10K/month savings.'
      threshold: $20K/month take-home
      context: Message From Russell lesson.
      module_sources:
      - M02
    - id: HEUR-RB-022
      rule: 100 clicks/day to front-end funnel = 3,000 clicks/month. At 5% conversion = 150 buyers. 30% ascend to continuity = 50 new members. 20 apply for high-ticket = $20K/month.
      threshold: 100 clicks/day -> $20K/month
      context: The '100 Clicks Per Day' lesson.
      module_sources:
      - M02
    - id: HEUR-RB-023
      rule: For free-plus-shipping or low-ticket funnels, approximately 5% of traffic will buy. Free-plus-shipping averages 8% conversion.
      threshold: 5% conversion (low-ticket); 8% (free+shipping)
      context: 100 Clicks Per Day formula (M02); 100 Visitor Test (M04).
      module_sources:
      - M02
      - M04
    - id: HEUR-RB-024
      rule: Of front-end buyers, about 30% can be moved into continuity/membership.
      threshold: 30% ascension rate
      context: 100 Clicks Per Day formula.
      module_sources:
      - M02
    - id: HEUR-RB-025
      rule: Budget for approximately 25% of continuity members canceling each month.
      threshold: 25% monthly churn
      context: Continuity/membership economics.
      module_sources:
      - M02
    - id: HEUR-RB-026
      rule: Even if you completely botch sales, worst case close at least 1 out of 10 high-ticket applicants.
      threshold: 10% minimum close rate
      context: High Ticket Funnel lesson.
      module_sources:
      - M02
    - id: HEUR-RB-027
      rule: '$50/month continuity price point. 200 members at $50 = $10K/month. $5,000 back-end price: 2 sales = $10K/month.'
      threshold: $50/mo continuity; $5K back-end; 2 sales = $10K
      context: 100 Clicks Per Day formula.
      module_sources:
      - M02
    - id: HEUR-RB-028
      rule: Webinar registration cost $1-$3. One-third of registrants show up live.
      threshold: $1-$3/registrant; ~33% show-up rate
      context: Perfect Webinar Funnel lesson.
      module_sources:
      - M02
    - id: HEUR-RB-029
      rule: On a live webinar, close 10-15% of attendees on a $1K product. 7-8% is good. 15% is Russell's benchmark. 50% close rate from stage.
      threshold: 10-15% live; 7-8% good; 50% stage
      context: Perfect Webinar Funnel lesson (M02); Performance benchmarks (M06, M07).
      module_sources:
      - M02
      - M06
      - M07
    - id: HEUR-RB-030
      rule: Most people won't pull out a credit card above $2-3K in a group selling situation. Above that requires one-on-one phone sales.
      threshold: $2,000-$3,000 credit card threshold
      context: Three Core Funnel Types lesson.
      module_sources:
      - M02
    - id: HEUR-RB-031
      rule: When reverse engineering, find at least 3 of 5 elements (demographics, offer, landing page, traffic source, ad copy). Maximum 2 unknowns.
      threshold: Minimum 3 of 5 known
      context: Funnel Hacking 101 lesson.
      module_sources:
      - M02
    - id: HEUR-RB-032
      rule: If a competitor's ad has been running 100+ days, it is working profitably. If it disappears within a week, it failed.
      threshold: 100+ days = proven; <7 days = failed
      context: Funnel Hacking / Traffic Hacks lesson.
      module_sources:
      - M02
    - id: HEUR-RB-033
      rule: When starting with no list, give affiliates 100% commission on front-end. You get the customer and email for free.
      threshold: 100% commission
      context: Five Distribution Channels lesson. 217 subs from one deal started Russell's empire.
      module_sources:
      - M02
    - id: HEUR-RB-034
      rule: Within 2-3 iterations of fixing the broken piece, a funnel works.
      threshold: 2-3 iterations
      context: When A Funnel Flops lesson.
      module_sources:
      - M02
    - id: HEUR-RB-035
      rule: Upsell should be approximately 3x the front-end price, expect 20-30% take rate, roughly doubling total revenue.
      threshold: 3x price; 20-30% take; ~2x total revenue
      context: DotCom Secrets introduction.
      module_sources:
      - M00
    - id: HEUR-RB-036
      rule: Email paragraphs should be one sentence max. Big paragraphs cause people to stop reading.
      threshold: 1 sentence per paragraph
      context: Email formatting for maximum readability.
      module_sources:
      - M03
    - id: HEUR-RB-037
      rule: A very good Attractive Character introduction can be done in just 3 SOAP Opera emails. Sent on consecutive days with no gaps.
      threshold: 3 emails minimum; consecutive days
      context: SOAP Opera Sequence length.
      module_sources:
      - M03
    - id: HEUR-RB-038
      rule: At minimum email your list once a day. If you don't email for two weeks, response rate drops by 50%.
      threshold: 1/day minimum; 50% drop after 2 weeks
      context: Daily Seinfeld email frequency (M03).
      module_sources:
      - M03
    - id: HEUR-RB-039
      rule: Pick ONE distribution channel plus email and go deep. Only after ~1M followers add a second.
      threshold: 1 channel until ~1M followers
      context: Platform selection for distribution building.
      module_sources:
      - M03
    - id: HEUR-RB-040
      rule: A homeless man with 300K YouTube followers on juicing charged $500/hour for consulting. Platform + attractive character = premium pricing.
      threshold: $500/hour with platform
      context: Pricing power from internet fame example.
      module_sources:
      - M03
    - id: HEUR-RB-041
      rule: 'Podcast ad revenue: ~$1,200 per episode at 100K listeners.'
      threshold: ~$1,200/episode at 100K listeners
      context: Podcast monetization via advertising.
      module_sources:
      - M03
    - id: HEUR-RB-042
      rule: Out of 100 visitors, $197 product at 1% = $197 revenue. Free-plus-shipping at 8% + $197 upsell = ~2x revenue AND 8 buyers instead of 1.
      threshold: 1% at $197 vs 8% free+shipping = 2x revenue
      context: The 100 Visitor Test.
      module_sources:
      - M04
    - id: HEUR-RB-043
      rule: Facebook email address subscriber averages $80/year in value, non-Facebook email averages only $1/year.
      threshold: Facebook email = $80/yr, non-Facebook = $1/yr
      context: Jeremy Shoemaker's email subscriber quality measurement.
      module_sources:
      - M04
    - id: HEUR-RB-044
      rule: Average person needs 7 touches before purchase.
      threshold: 7 touches
      context: Justification for squeeze pages and follow-up sequences.
      module_sources:
      - M04
    - id: HEUR-RB-045
      rule: Adding a quiz pre-frame before webinar registration doubled conversion.
      threshold: 2x+ conversion with quiz
      context: Glen Ledwell's Mind Movies.
      module_sources:
      - M04
    - id: HEUR-RB-046
      rule: Changing 'get started' to 'finish' on a form increased front-end conversion by ~23% but killed downstream conversion (closed the loop).
      threshold: ~23% front-end lift but kills downstream
      context: Open-loop vs closed-loop copy.
      module_sources:
      - M04
    - id: HEUR-RB-047
      rule: Upselling the next logical step converts dramatically better than more of the same. Russell's traffic upsell after conversion book hit 23%.
      threshold: 23% conversion on 'next step' upsell
      context: Upsell sequencing tied to 'itch is scratched' principle.
      module_sources:
      - M04
    - id: HEUR-RB-048
      rule: Print-on-demand testing at ~$6/unit. Only order bulk at 1,000+/month.
      threshold: ~$6/unit POD; bulk at 1,000+/month
      context: Disk Delivered testing economics.
      module_sources:
      - M04
    - id: HEUR-RB-049
      rule: 'Russell''s supplement Nerve Cell: January $20K -> March $300K -> projected $500K. Scaling happens fast once break-even is achieved.'
      threshold: $20K -> $300K in 2 months after breakeven
      context: Breakeven funnel iteration timeline.
      module_sources:
      - M04
    - id: HEUR-RB-050
      rule: Webinars convert best on Thursdays (Russell's market).
      threshold: Thursdays
      context: Webinar scheduling optimization.
      module_sources:
      - M04
    - id: HEUR-RB-051
      rule: Russell's funnel hacks webinar generated over $2M from just 3 pages.
      threshold: $2M+ from 3 pages
      context: Webinar funnel simplicity and revenue potential.
      module_sources:
      - M04
    - id: HEUR-RB-052
      rule: Ryan Deiss/Perry Belcher sold 130K free credit card knives month one. That company went from $20-30K/month to over $1M/month with free+shipping.
      threshold: 130K buyers month 1; $20-30K -> $1M+/month
      context: Free-plus-shipping scale potential.
      module_sources:
      - M04
    - id: HEUR-RB-053
      rule: Russell's $97/month newsletter stalled at 250 subscribers. Converting to free+shipping book generated 6,000-7,000 buyers.
      threshold: 250 at $97/mo vs 6,000-7,000 free+shipping
      context: Price barrier impact on audience building.
      module_sources:
      - M04
    - id: HEUR-RB-054
      rule: Russell shipped 10,000 DVDs with no content burned on them. Only 1 person noticed (0.01%). Most people never consume the product.
      threshold: 1 out of 10,000 noticed (0.01%)
      context: Consumer behavior reality for information products.
      module_sources:
      - M04
    - id: HEUR-RB-055
      rule: 'High-ticket funnel is just 3 pages: video testimonial/case study page -> application -> homework page.'
      threshold: 3 pages for high-ticket
      context: High-ticket funnel simplicity.
      module_sources:
      - M04
    - id: HEUR-RB-056
      rule: Direct mail lift letter increases response 2-3x. Email functions as digital equivalent.
      threshold: 2-3x response with lift letter
      context: Pre-frame effectiveness using third-party endorsement.
      module_sources:
      - M04
    - id: HEUR-RB-057
      rule: One belief per sales message. Multiple beliefs = bombs.
      threshold: 1 belief per message
      context: Foundation for Big Domino concept (M05).
      module_sources:
      - M05
    - id: HEUR-RB-058
      rule: Read your Big Domino statement -- if it's not a TRUE logical statement, you're not in a blue ocean. Fix positioning.
      threshold: Qualitative (must be logically true)
      context: Big Domino validity test.
      module_sources:
      - M05
    - id: HEUR-RB-059
      rule: 'First 10% of presentation = rapport only. Character needs at least 2 of 5 rapport qualities: Victim, Jeopardy, Likable, Funny, Powerful.'
      threshold: First 10%; minimum 2 of 5 elements
      context: Michael Hague's rapport-building framework.
      module_sources:
      - M05
    - id: HEUR-RB-060
      rule: Tell your story 5-8 times to different people before using it live.
      threshold: 5-8 rehearsals
      context: Story practice requirement.
      module_sources:
      - M05
    - id: HEUR-RB-061
      rule: 'Write out at least 10 false beliefs. For each: the experience, the story, and the replacement Epiphany Bridge.'
      threshold: Minimum 10 false beliefs inventoried
      context: False belief inventory for webinar prep.
      module_sources:
      - M05
    - id: HEUR-RB-062
      rule: Keep asking 'why' 5-7 times to reach someone's true internal desire.
      threshold: 5-7 'why' questions
      context: Discovering internal desires.
      module_sources:
      - M05
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.123-124
        enrichment: 'The ''Why'' Drill: To find the internal struggle behind any achievement story, ask ''why?'' 5-6 times. Surface: ''I wanted to lose weight.'' Level 5: ''I wanted my kids to not be ashamed
          of me at school.'' The deep ''why'' is the real story.'
    - id: HEUR-RB-063
      rule: Videos on webinar registration pages ALWAYS destroy conversion. No video.
      threshold: 0% lift from video (always hurts)
      context: Russell has never tested a video that helped.
      module_sources:
      - M05
    - id: HEUR-RB-064
      rule: Use 'web class' instead of 'webinar' for cold traffic -- conversion is much better.
      threshold: '''web class'' > ''webinar'' for cold traffic'
      context: Terminology choice.
      module_sources:
      - M05
    - id: HEUR-RB-065
      rule: 98% of Hollywood films follow the Hero's Two Journeys structure.
      threshold: 98% of films
      context: Validation of universal story template.
      module_sources:
      - M05
    - id: HEUR-RB-066
      rule: Send great sales videos to Rev.com for transcription. Read 10-15 times to internalize structure.
      threshold: 10-15 reads
      context: Self-education method for improving presentations.
      module_sources:
      - M05
    - id: HEUR-RB-067
      rule: Between registration and webinar, send 3 teaser videos -- one per day -- each teasing one Secret. Do NOT give the answer.
      threshold: 3 videos, 1/day
      context: Pre-webinar indoctrination sequence.
      module_sources:
      - M05
    - id: HEUR-RB-068
      rule: A crappy video in a funnel is better than an empty placeholder. Crappy > empty.
      threshold: Qualitative (crappy > empty)
      context: Funnel completion philosophy.
      module_sources:
      - M05
    - id: HEUR-RB-069
      rule: Total stated value of Stack must be at least 10x the actual price.
      threshold: 10x minimum value-to-price ratio
      context: Stack slide design.
      module_sources:
      - M06
    - id: HEUR-RB-070
      rule: Training programs should be approximately 6 weeks -- short enough for closure, long enough to push past 30-day refund window.
      threshold: 6 weeks (sweet spot); minimum 4-5 weeks
      context: Program design for digital courses.
      module_sources:
      - M06
    - id: HEUR-RB-071
      rule: Every piece of content should be approximately 60% story and 40% content.
      threshold: 60/40 story-to-content ratio
      context: Content creation for presentations.
      module_sources:
      - M06
    - id: HEUR-RB-072
      rule: 'Every offer should have exactly 5 stack components: Core Training, Tools, Tangible #1, #2, #3, plus Bonus.'
      threshold: 5 stack components minimum
      context: Offer stack architecture.
      module_sources:
      - M06
    - id: HEUR-RB-073
      rule: 'Perfect Webinar runs 60-90 minutes: ~15 min intro, ~45 min content (3 secrets), ~15-30 min close/stack. Exactly 3 secrets -- not 2, not 5.'
      threshold: 60-90 min total; 3 secrets
      context: Perfect Webinar time allocation (M06, M08).
      module_sources:
      - M06
      - M08
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.212
        enrichment: 5% close rate = good webinar, you'll be profitable. 10% close rate = million-dollar webinar. 15% close rate = potential $10M/year business.
      - pdf_source: Expert Secrets
        page_ref: p.210, p.218
        enrichment: 'Optimal webinar price range: $297 to $2,997. Below $297, the webinar format is overkill. Above $2,997, you need a different close mechanism (4-Question Close or phone sales).'
    - id: HEUR-RB-074
      rule: Ask permission to spend 'about 10 minutes' showing your special offer. This makes the transition non-threatening.
      threshold: 10 minutes (stated transition time)
      context: Webinar close transition.
      module_sources:
      - M06
    - id: HEUR-RB-075
      rule: Average American woman goes on 8 diets per year. Your customers have tried many solutions before you.
      threshold: 8 prior attempts (average)
      context: Offer positioning -- assume they've tried and failed before.
      module_sources:
      - M06
    - id: HEUR-RB-076
      rule: Before revealing discounted price, get 3 yeses using if-all statements tied to your three secrets. Then reveal price at 90% discount from stated value.
      threshold: 3 yeses + 90% discount reveal
      context: Price reveal sequence in Perfect Webinar close.
      module_sources:
      - M06
    - id: HEUR-RB-077
      rule: One-third of all sales come in the last 6 hours before an offer closes.
      threshold: ~33% of sales in final 6 hours
      context: Urgency and scarcity effectiveness (M06, M07).
      module_sources:
      - M06
      - M07
    - id: HEUR-RB-078
      rule: Approximately 50% of automated webinar sales came from 'watch yesterday's replay right now' option.
      threshold: 50% from replay-now option

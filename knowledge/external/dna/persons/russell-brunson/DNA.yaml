    - id: PHI-RB-129
      statement: The goal of a continuity self-liquidating offer is to cover ad costs with the backend upsell, not the recurring billing. Build in a $300-400 high-ticket upsell right after the $1 trial.
        The trial builds the membership. The high ticket pays for the ads. Any continuity revenue is pure profit on top.
      context: FU Issue 3 / Digital Marketer Continuity Funnel analysis. Russell's insight on continuity funnel economics.
      tags:
      - continuity

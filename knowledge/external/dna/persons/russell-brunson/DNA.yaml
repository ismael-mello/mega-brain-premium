    - id: FW-RB-165
      statement: 'Funnel Catcher Framework -- 6 Pre-Frame Bridge Types: (1) Micro-Commitment Quiz, (2) Full Survey (routes to specific video), (3) Conversion Articles on blogs, (4) YouTube Videos pre-selling
        topic, (5) Contests giving away what dream customer wants, (6) Free Gifts (swipe files, reports).'
      context: Funnel Labs Issue 7 - 6-type cold traffic capture framework.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 7 (Magnetic Marketing)
    - id: FW-RB-166
      statement: 'Dream 100 Four-Step Framework: (1) IDENTIFY list owners, bloggers, podcasters, influencers with your dream customers, (2) DIG YOUR WELL -- follow, subscribe, buy their products, start
        podcast and invite them, (3) PROMOTE -- monthly physical mail, when ready ask for email blast > direct mail > retargeting pixel swaps > ads, (4) HACK -- get ONE to say yes, leverage that name for
        #2, #3.'
      context: Funnel Labs Issue 8 - complete Dream 100 implementation framework.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: FW-RB-167
      statement: 'Dream 100 Promotion Hierarchy: (1) Email their customer list, (2) Direct mail to their list (you fund, split 50/50), (3) Put retargeting pixel on their site, (4) Buy ads targeting their
        fans on Facebook/YouTube, (5) Buy ads on their websites.'
      context: Funnel Labs Issue 8 - promotion request priority order.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 8 (Magnetic Marketing)
    - id: FW-RB-168
      statement: 'Switching Modalities Framework for replays: (1) PowerPoint webinar, (2) Same webinar at live seminar on video, (3) Cliff Notes -- screenshot each slide with short writeup. Three modalities,
        same content, different consumption preferences.'
      context: Funnel Labs Issue 4 - modality-switching framework.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 4 (Magnetic Marketing)
    - id: FW-RB-169
      statement: 'Webinar Confirmation Page Framework -- 4 elements: (1) Personal thank-you video showing excitement, (2) Tell them what to expect, (3) Event ticket with re-registration, (4) Get them to
        BUY something -- covers ad costs AND conditions them to pay you.'
      context: Funnel Labs Issue 4 - confirmation page requirements.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnel Labs Issue 4 (Magnetic Marketing)
    - id: FW-RB-170
      statement: '9 Ways to Create Info Products: Written (crowdsource, compile examples, public domain) + Audio (audiobooks, interviews, compile hard-to-find) + Video (screen capture, iPhone, workshops).
        Every business can create info products.'
      context: Funnelology - info product creation framework.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: FW-RB-171
      statement: 'Funnelology Value Ladder 4-Tier Map: Tier 1 (Lead): Squeeze, Survey, Summit. Tier 2 (Unboxing): Book, Cart, Challenge. Tier 3 (Presentation): VSL, Webinar, Product Launch. Tier 4 (Phone):
        Application, Phone Sales.'
      context: Funnelology - specific funnel types mapped to value ladder tiers.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: Funnelology (Magnetic Marketing)
    - id: FW-RB-172
      statement: 'Drew Canole Result-First Framework: (1) Identify dream client with business but struggling, (2) Offer to work FREE but videotape everything, (3) Deliver transformative result (Drew: losing
        money to $20-30K/day), (4) Capture video testimonials of entire team, (5) Drive Facebook ads to testimonials, (6) Testimonials produce applications for $25K+ coaching.'
      context: DCS LIVE Session 1 - detailed 'work for free' case study.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 1 (Magnetic Marketing)
    - id: FW-RB-173
      statement: 'iPhone Testimonial Filming Framework: (1) Interesting background outdoors, (2) Person OFF-CENTER, (3) Camera at eye level, look NEXT TO camera (not into lens), (4) Oprah-style questions:
        Before? Struggles? Why start? Easy at first? Life now?, (5) Coach to restate questions, (6) Cut interviewer voice, (7) Add music.'
      context: DCS LIVE Session 1 - step-by-step testimonial creation.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 1 (Magnetic Marketing)
    - id: FW-RB-174
      statement: 'Three-Funnel Selection: (1) TRIPWIRE $0-$20 -- F+S books, $7 reports, physical products, (2) PERFECT WEBINAR $300-$3K -- 60-90min presentation then sell, (3) HIGH-TICKET $3K-$1M+ -- testimonial
        video, application, homework page, phone call. Pick ONE that matches your business.'
      context: DCS LIVE Session 2 - which funnel to start with decision framework.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 2 (Magnetic Marketing)
    - id: FW-RB-175
      statement: 'ClickBank Funnel Hacking: (1) clickbank.com Marketplace, (2) Filter by category, (3) Top 3-4 = proven winners, (4) Buy the product ($47), (5) Screenshot EVERY page, (6) Transcribe VSL,
        (7) Map offer, (8) Note all prices, (9) Sketch funnel on whiteboard, (10) Model all elements for your market.'
      context: DCS LIVE Session 3 - step-by-step ClickBank funnel hacking.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: FW-RB-176
      statement: 'High-Ticket 3-Page Architecture: PAGE 1: Third-party testimonial video (not you pitching), 12 variations. PAGE 2: Application with background testimonial videos playing (removes fear).
        PAGE 3: Homework with deeply personal/emotional video of WHY you do this. Prepares emotionally for sales call.'
      context: DCS LIVE Session 3 - high-ticket funnel with psychological reasoning.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 3 (Magnetic Marketing)
    - id: FW-RB-177
      statement: 'Dream 100 Monthly Mail Cadence: Month 1: Video brochure cards ($30/ea, 5hrs recording). Month 2: Ferrari keychain + sales letter. Alternate between asks and gifts. Rule: Every month they
        hear from you via physical mail.'
      context: DCS LIVE Session 4 - specific Dream 100 cadence with actual items.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 4 (Magnetic Marketing)
    - id: FW-RB-178
      statement: 'Dream 100 Facebook Bypass: When Dream 100 member will NEVER promote you (e.g., Tony Robbins), target their followers directly on Facebook. Dream 100 becomes your ad targeting list. No
        permission needed.'
      context: DCS LIVE Session 4 - organic + paid Dream 100 strategy.
      module_sources:
      - MM-MAGNETIC-MARKETING
      mm_source: DotCom Secrets LIVE Session 4 (Magnetic Marketing)
    - id: FW-RB-179
      name: Annoying Pest to Most Welcome Guest Framework
      description: 'The transformation from pest to guest happens through RIGHT MESSAGE + RIGHT TIME alignment. Example: solicitor is annoying pest until your house is on fire and he says ''you call the
        fire department, I''ll work the hose.'' Only thing that changed was message-timing alignment. Applied to email: sending 8 emails/day doesn''t fix the pest problem -- you need to become the welcome
        guest with relevant, timely value.'
      context: 'MM Welcome -- DK''s parable about door-to-door solicitors, taught during Five Fatal Flaws discussion. RB identifies this as a core principle missing from internet marketing: most marketers
        optimize for frequency (more emails, more ads) when they should optimize for relevance.'
      module_sources:
      - MM-08-Welcome
    - id: FW-RB-180
      name: Equity in Customers Framework
      description: 'Three things everyone wants: freedom, wealth, and security. NONE come from what you do (skills/work); all three come from what you OWN. The most controllable asset is yourself (personality,
        knowledge, skill). The second hardest to lose is equity in your customers. When DK got divorced, he took the customer list (illiquid) and rebuilt in 18 months. ''Send the invoice to the herd'' --
        with strong customer equity, you can recover from any setback.'
      context: MM Welcome -- DK's wealth philosophy as captured by RB. Customer equity > cash. List > Lamborghini. This directly informs RB's obsession with building email lists and customer relationships
        over one-time transactions.
      module_sources:
      - MM-08-Welcome
  L5_METHODOLOGIES:
    count: 66
    items:
    - id: MET-RB-001
      name: The Funnel Hacking Process (Complete)
      steps: 1) Identify competitors; 2) Buy their products, go through entire funnel; 3) Set up Gmail filter for emails; 4) Screenshot every page; 5) Transcribe sales videos; 6) Document upsells, downsells,
        prices; 7) SimilarWeb for traffic sources; 8) AdBeat for exact ads; 9) Sketch funnel on whiteboard; 10) Build your version
      application: Master methodology for entering any market. Model what works, don't reinvent.
      module_sources:
      - M02
      - M04
    - id: MET-RB-002
      name: Perfect Webinar Build Sequence
      steps: 1) Write How-To-Without headline; 2) Define Big Domino statement; 3) Identify Three Secrets/false beliefs; 4) Build Stack Slide/offer; 5) Build all slides; 6) Add trial closes after every statement
        and testimonial; 7) Practice and deliver
      application: Step-by-step for creating a Perfect Webinar from scratch. Can be done in a single day.
      module_sources:
      - M06
      - M07
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.155-166
        enrichment: 'Perfect Webinar Introduction Sequence (Slides 1-14): Slide 1 -- Title. Slides 2-6 -- One Sentence Persuasion (one element per slide). Slides 7-8 -- Ruler and Progression. Slides 9-10
          -- Qualify yourself. Slides 11-12 -- Origin Story. Slide 13 -- Liken to Them. Slide 14 -- Case Study.'
      - pdf_source: Modules & Scripts
        page_ref: PDF-06-Moral-Obligation PAGE 5-57
        enrichment: 'Perfect Webinar Slide Script (51 Slides): 1-Title, 2-Intro/Rapport, 3-Ruler Goal #1, 4-Ruler Goal #2 Big Domino, 5-Goal Continued, 6-Qualify Yourself, 7-Epiphany Bridge Origin, 8-Liken
          to Them, 9-Case Study, 10-Transition to Secrets, 11-Delivering Content, 12-State Secret, 13-Share Epiphany Bridge, 14-Show Results, 15-Break Beliefs, 16-Restate New Belief, 17-Repeat Secrets 2&3,
          18-The Question, 19-Transition to Sales, 20-The Stack, 21-Deliverables, 22-Recap, 23-Case Studies, 24-Who This Works For, 25-Destroy #1 Reason, 26-Stack Slide #1, 27-Element #2 Tools, 28-You''ll
          Be Able To, 29-Problem Solved, 30-Time/Money Saved, 31-Break Beliefs, 32-Stack Slide #2, 33-Tangible #1, 34-Pain/Cost, 35-Ease/Speed, 36-Break Beliefs, 37-Stack Slide #3, 38-Tangibles #2/#3, 39-Big
          Stack #5, 40-If/All, 41-Two Choices, 42-What Would It Be Worth, 43-Price Drop, 44-Price Reveal, 45-Price Justification, 46-2 Choices, 47-Guarantee, 48-Real Question, 49-Stack Slide, 50-Urgency/Scarcity,
          51-Close/Q&A.'
    - id: MET-RB-003
      name: The Stack Presentation Method
      steps: '1) Introduce Component #1, assign value; 2) Show Stack Slide; 3) Repeat for each component; 4) Show Final Stack; 5) Three if-all closes; 6) 90% discount reveal; 7) Additional closes; 8) Restack;
        9) Final slide with recap, price, URL, countdown, Q&A'
      application: Complete execution sequence for presenting the Stack during any close.
      module_sources:
      - M06
      - M07
      - M08
    - id: MET-RB-004
      name: Epiphany Bridge Story Writing Process
      steps: 1) Answer 8 questions (backstory, desires, wall, epiphany, plan, conflict, achievement, transformation); 2) Write the story; 3) Tell it live on Facebook Live or video; 4) Watch, critique, identify
        disconnects; 5) Retell 5-8 times until natural; 6) Refine based on audience response
      application: Creating your origin story or any persuasive story.
      module_sources:
      - M05
      - M06
    - id: MET-RB-005
      name: False Belief Inventory Methodology
      steps: '1) Write 10+ false beliefs; 2) For each, identify the experience that created it; 3) Write the story they tell themselves; 4) Create replacement Epiphany Bridge story; 5) Categorize into Vehicle/Internal/External;
        6) Circle #1 in each category; 7) These become Three Secrets'
      application: Core objection mapping for webinar or sales presentation.
      module_sources:
      - M05
      - M07
    - id: MET-RB-006
      name: SOAP Opera Sequence Writing Method
      steps: '1) Open 3 notepads (Day 1, 2, 3); 2) Day 1: HIGH DRAMA opening + hook; 3) Day 2: Backstory -> Wall + hook; 4) Day 3: Epiphany -> Results -> CTA; 5) Write all 3 side-by-side so hooks connect;
        6) Paste into autoresponder'
      application: Creating the initial bonding email sequence.
      module_sources:
      - M03
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.234-236
        enrichment: 'Email Epiphany Funnel Creation: (1) Take your completed PW content. (2) Extract 4 core stories (Origin + 3 Secrets). (3) Write each story as email OR record video and link. (4) Add
          Stack as final email with CTA. (5) Add soap opera hooks at end of each email. (6) Deploy as automated sequence.'
    - id: MET-RB-007
      name: Daily Seinfeld Email Writing Method
      steps: 1) Think about what happened today; 2) Write the story in short sentences; 3) WEAVE back to the product (THE SECRET); 4) Add CTA link; 5) Send; 6) Copy to blog. Repeat daily.
      application: Daily ongoing email creation process.
      module_sources:
      - M03
    - id: MET-RB-008
      name: Attractive Character Development Process
      steps: 1) Define BACKSTORY; 2) List PARABLES; 3) Identify CHARACTER FLAWS; 4) Define POLARITY positions; 5) Choose IDENTITY type; 6) Map 6 STORYLINES. Keep printout next to desk.
      application: One-time foundational exercise.
      module_sources:
      - M03
    - id: MET-RB-009
      name: Culture Building Methodology
      steps: 1) Define future-based cause/campaign slogan; 2) Create four-minute mile aspirational goal; 3) Create self-identifier (T-shirt); 4) Build Title of Liberty/manifesto; 5) Test with market; 6)
        Create T-shirt/physical marker for milestones
      application: Building the cultural infrastructure of your movement.
      module_sources:
      - M01A
      - M06
    - id: MET-RB-010
      name: How To Optimize A Live Webinar Iteratively
      steps: '1) Do webinar live; 2) Export ALL Q&A questions; 3) Read every question to find stuck points; 4) Tweak slides; 5) Repeat within days. Result: $30K -> $120K -> $150K through iteration.'
      application: Continuous improvement for live webinars.
      module_sources:
      - M07
    - id: MET-RB-011
      name: How To Build Your Dream 100 List
      steps: 1) Like pages in your market on Facebook; 2) Search ClickBank, Amazon; 3) Google for bloggers, podcasters; 4) Identify adjacent markets; 5) Build Excel with names, platforms, list sizes; 6)
        Start engaging immediately; 7) Approach with stats when ready
      application: Building a JV partner list for webinar promotion.
      module_sources:
      - M07
    - id: MET-RB-012
      name: How To Use Trial Closes Throughout A Presentation
      steps: 1) Embed yes-or-no questions on every slide; 2) After every testimonial, future pace with trial closes; 3) When showing features, ask 'How many want this?'; 4) Use 'Does this make sense?',
        'Right?', 'Awesome?'; 5) Target 1,000+ yeses across the presentation
      application: Micro-commitment methodology that increased revenue per registrant from $9 to $16+.
      module_sources:
      - M07
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.192-193
        enrichment: Trial Closes increased per-registrant earnings from $9.45 to $16.50 -- a 74% improvement.
      - pdf_source: Expert Secrets
        page_ref: p.192-194
        enrichment: 'Trial Closes Implementation: Insert at specific points: (1) After the Big Promise, (2) After each Secret, (3) Before revealing the Stack, (4) After each Stack component, (5) Before
          the price reveal. Track hand raises/chat responses.'
    - id: MET-RB-013
      name: Building An Automated Webinar System
      steps: 1) Do live webinar using PW script; 2) Record it; 3) Set up automated funnel with 'watch replay now' option; 4) Configure 4 email segments; 5) Create follow-up sequences per segment; 6) Drive
        traffic continuously
      application: Converting proven live webinar into 24/7 selling machine.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: Modules & Scripts
        page_ref: PDF-10-Post-Webinar-FollowUps PAGE 1-6
        enrichment: 'Post-webinar email sequence timing: Immediately after -> 3 hours later -> 24 hours -> 48 hours -> 72 hours -> 96 hours -> 120 hours -> 144 hours -> final day (cart close).'
    - id: MET-RB-014
      name: Building A High-Ticket Phone Sales Operation
      steps: 1) Create application funnel with case study video; 2) Build homework page with emotional video; 3) Hire setter + closer; 4) Train setter on qualification script; 5) Train closer on 4 commitments;
        6) Never read applications before calling; 7) Contact within 24-48 hours; 8) Scale to 2-3 people
      application: Complete build-out for high-ticket phone sales.
      module_sources:
      - M08
      pdf_enrichments:
      - pdf_source: Expert Secrets
        page_ref: p.218-226
        enrichment: '4-Question Close Methodology: Phase 1 (5-10 min) -- Build rapport. Phase 2 (20-30 min) -- Ask 4 Questions, let them talk 80%. Phase 3 (10-15 min) -- Present solution in THEIR words.
          Phase 4 (5-10 min) -- Handle logistics. Total: 45-60 minutes.'
    - id: MET-RB-015
      name: The Value Ladder Business Design Process
      steps: 1) Define highest-ticket offering; 2) Work backwards through middle and low; 3) Add continuity; 4) Choose front-end bait; 5) Build point-of-sale funnel; 6) Build warm-traffic funnel; 7) Stack
        and rotate to prevent fatigue
      application: Complete business architecture design.
      module_sources:
      - M02
      - M08
    - id: MET-RB-016
      name: The Funnel Stacking Strategy
      steps: 1) Start with one proven front-end (free+shipping); 2) After $1M, add middle funnel (automated webinar); 3) Add backend (application + phone); 4) Rotate between types to prevent pattern fatigue;
        5) Re-skin front-ends while keeping backend consistent
      application: Master strategy for building a complete, multi-funnel business.
      module_sources:
      - M08
    - id: MET-RB-017
      statement: 'Trial Closes Script (12 phrases to use throughout webinar): ''Are you ready to get started?'' / ''Are you getting all this?'' / ''Is this making sense?'' / ''Can you imagine if that happened
        to you?'' / ''Who here wants a free copy of _?'' / ''Would you like to be our next case study?'' / ''You''ve heard them talk about this before, right?'' / ''Isn''t that cool?'' / ''Isn''t that exciting?''
        / ''Am I right?'' / ''Can you see yourself doing _?'' / ''I''m sure you''ve noticed this too, right?'''
      context: Module 6 Moral Obligation workbook -- exact trial close phrases to pepper throughout webinar presentation.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-06-Moral-Obligation PAGE 57
      original_pdf_id: Modules MET-RB-PDF-006
    - id: MET-RB-018
      statement: 'The 16 Webinar Closes (named scripts in order): (1) Money Is Good, (2) Information Alone, (3) Us VS Them, (4) Only Excuses, (5) Disposable Income, (6) Money or Excuses, (7) The Hand Hold,
        (8) Reluctant Hero, (9) Money Replenishes, (10) Your 2 Choices, (11) Say Goodbye, (12) If You Only Got, (13) Break Old Habits, (14) Their 2 Choices, (15) Now & Later, (16) Close Close.'
      context: Module 6 workbook + Perfect Webinar Script -- complete list of named closing patterns used in rotation during Q&A.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-06-Moral-Obligation PAGE 58-62
      original_pdf_id: Modules MET-RB-PDF-007
    - id: MET-RB-019
      statement: 'Star Story Solution Video Sales Letter Script (28 Steps): Pattern Interrupt -> Core Desire Questions -> Agitate Past Failures -> Big Promise (ONE Big Thing) -> Intro Attractive Character
        -> High Drama -> Backstory & Wall -> Identify Problem -> Epiphany/Declaration of Independence -> Path to Find Ultimate Solution -> First Signs of Success -> Conspiracy -> Big Lie/Not Your Fault
        -> Common Enemy -> Rapid Growth -> Case Studies -> Formal Introduction -> Pain + Cost -> Ease -> Speed -> Social Proof -> Build Value -> Fake Price -> ''If All''s'' (Pleasure & Pain) -> Reveal Price
        -> Guarantee -> Inject Scarcity -> Future Pacing -> CTA.'
      context: Module 8 Sales Scripts workbook -- complete VSL/long-form video sales letter script template.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-08A-Sales-Scripts PAGE 15-29
      original_pdf_id: Modules MET-RB-PDF-008
    - id: MET-RB-020
      statement: 'OTO (One Time Offer) Upsell Script (11 Steps): Congrats on ordering -> 3X 2X (triple results, double speed) -> Smart/Why (you made a smart choice because...) -> Question 3X 2X -> Exclusive
        (NOT for everyone) -> Results/Fast/Speed -> The 1 Thing (cool name for upsell) -> Future Casting -> CTA -> Guarantee -> Value Stacking + Scarcity -> 2nd CTA.'
      context: Module 8 Sales Scripts workbook -- complete upsell page script template.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-08A-Sales-Scripts PAGE 29-34
      original_pdf_id: Modules MET-RB-PDF-009
    - id: MET-RB-021
      statement: 'Two-Step Phone Sales Script - SET Script: Intro (Hey this is _ from _) -> Questions (ask based on answers: why is that? how do you mean? anything else?) -> Blast (maybe I can help you)
        -> Posture (this is exclusive) -> Probe (finding personal info) -> Finding Credit (can they afford high-ticket?)'
      context: Module 8 Sales Scripts workbook -- appointment setting script for phone sales team.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-08A-Sales-Scripts PAGE 49-52
      original_pdf_id: Modules MET-RB-PDF-010
    - id: MET-RB-022
      statement: 'Two-Step Phone Sales Script - CLOSE Script: Goals (where you are vs where you want to be) -> 4 Commitments (Time, Teachable, Investment, Decision Maker) -> Time commitment -> Decision
        commitment -> Resources/Investment commitment -> Knowledge/Teachability -> What''s Included -> Close (finalize the sale).'
      context: Module 8 Sales Scripts workbook -- closing script for high-ticket phone sales.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-08A-Sales-Scripts PAGE 52-55
      original_pdf_id: Modules MET-RB-PDF-011
    - id: MET-RB-023
      statement: 'Post-Webinar Follow-Up Email Sequence (8 Emails): Email 1 (Immediate) = Thank you + download link + enrollment reminder. Email 2 (3 hours) = Social proof of others joining + enrollment
        link. Email 3 (24 hours) = 2 options: watch replay or sign up ASAP. Email 4 (48 hours) = Special letter/long-form sales page + replay with 24hr expiration. Email 5 (72 hours) = ''Are you in or out?''
        final warning + replay. Email 6 (96 hours) = Reframe as job opportunity/income angle. Email 7 (120 hours) = Personal request to work together. Email 8 (144 hours) = Payment plan/low barrier option
        + last replay chance.'
      context: PDF-10 Post-Webinar Follow-Ups -- complete swipe file with exact timing of each email.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-10-Post-Webinar-FollowUps PAGE 1-6
      original_pdf_id: Modules MET-RB-PDF-014
    - id: MET-RB-024
      statement: 'Webinar Indoctrination Email Sequence: Between registration and webinar day, send 3 pre-sell videos. Each video pre-sells one of the 3 secrets by (1) talking about the false belief pattern
        tied to that secret, (2) telling them the webinar will show why that belief isn''t true and why the opposite IS true.'
      context: 'Module 7 workbook -- Step 3: Indoctrination emails for registered webinar attendees.'
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-07-The-Funnels PAGE 14-15
      original_pdf_id: Modules MET-RB-PDF-015
    - id: MET-RB-025
      statement: 'Webinar Reminder Cadence: Day before -> Morning of -> 1 hour before -> 15 minutes before -> ''We''re live - join us!'''
      context: 'Module 7 workbook -- Step 4: Send reminders with specific timing.'
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-07-The-Funnels PAGE 15
      original_pdf_id: Modules MET-RB-PDF-016
    - id: MET-RB-026
      statement: 'Dream 100 Physical Mail Campaign (4 Letters): Letter 1 = Welcome + introduce opportunity + explain sticky cookies + include comic book. Letter 2 = Funnel walkthrough + commission structure
        + launch dates + virtual book tour invitation. Letter 3 = Real book copy + affiliate prizes (custom superhero suit for top 10, private mastermind for top 20) + swipe copy/banners. Letter 4 = Final
        bribe ($20 flat per book sold, doubling commissions) + deadline urgency + $500k cash prize pool.'
      context: PDFs 11A through 11D -- complete 4-letter Dream 100 physical mail sequence for Expert Secrets book launch.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-11A through PDF-11D
      original_pdf_id: Modules MET-RB-PDF-017
    - id: MET-RB-027
      statement: '3 Promotion Strategies for Dream 100: Strategy #1 = Physically mail a newsletter and package every month about promotions they can be part of, then ask them to promote. Strategy #2 = Target
        specific ads to your Dream 100''s followers. Strategy #3 = Integration Marketing -- find the ''holes'' in their sales funnel and ask to add your product, co-create a product, or simply add a PS
        in their emails.'
      context: Module 7 workbook -- three specific strategies to get Dream 100 to promote your products.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-07-The-Funnels PAGE 22-23
      original_pdf_id: Modules MET-RB-PDF-018
    - id: MET-RB-028
      statement: 'Epiphany Bridge Story Template (for each of the 3 Secrets): Your Backstory -> Your Desires (External + Internal) -> The Wall -> The Epiphany -> The Plan -> The Conflict -> The Achievement
        -> The Transformation. Fill in each element per secret to create the narrative arc that breaks false beliefs.'
      context: FHAT Event worksheet -- Part 6, providing the complete story structure to fill in for each of the 3 secrets in a webinar.
      pdf_source: Modules/Scripts/Swipe Files
      page_ref: PDF-12-FHAT-Event PAGE 4
      original_pdf_id: Modules MET-RB-PDF-019
    - id: MET-RB-029
      statement: 'Dream 100 List Building Process: 1) Identify top influencers/brands in your submarket, 2) Follow them on each platform, 3) Study their content daily (3-5 min), 4) Like/comment on 10+ posts
        daily, 5) DM at least 10 of their videos daily, 6) Build genuine relationship for 60+ days before asking for anything.'
      context: The tactical execution of the Dream 100 strategy. Requires daily discipline and patience.
      pdf_source: Traffic Secrets
      page_ref: PAGE 48-55, 70-78, 177-178
      original_pdf_id: Traffic MET-RB-PDF-001
    - id: MET-RB-030
      statement: 'Break-Even Funnel Optimization: Product price + Order bump + OTO1 + OTO2 = Average Cart Value (ACV). If ACV > Cost Per Acquisition, you win. Example: Book $7.95 + Audiobook bump $37 (16%
        take) + Masterclass OTO1 $97 (5% take) + Funnel Scripts OTO2 $297 (2% take) = ACV $37.71 vs CPA $23 = $14.71 profit per customer.'
      context: DotCom Secrets book funnel example with complete ACV calculation.
      pdf_source: Traffic Secrets
      page_ref: PAGE 87-89
      original_pdf_id: Traffic MET-RB-PDF-002
    - id: MET-RB-031
      statement: 'Retargeting Setup: 1) Install pixel on all funnel pages, 2) Create Engaged audience (5-day window of post interactions), 3) Create Landed audience (7-day window of page visitors), 4) Create

    context: "Distinction between knowing and doing - action is what creates results"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: PHI-TR-003
    belief: "Decisions equal destiny - the decisions you make determine your financial future"

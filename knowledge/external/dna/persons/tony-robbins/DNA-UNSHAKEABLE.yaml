# ============================================================================
# L4 - FRAMEWORKS (Structured Approaches)
# ============================================================================
frameworks:

  - id: FW-TR-001
    name: "The 7 Freedom Facts"
    description: "Seven indisputable facts that free you from fear of corrections and crashes"
    components:
      - "1. Corrections occur on average once a year since 1900"
      - "2. Less than 20% of corrections turn into bear markets"
      - "3. Nobody can predict consistently whether market will rise or fall"
      - "4. Stock market rises over time despite many short-term setbacks"
      - "5. Bear markets have happened every 3-5 years historically"
      - "6. Bear markets become bull markets - pessimism becomes optimism"
      - "7. Greatest danger is being OUT of the market"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-002
    name: "The Core 4 Investment Principles"
    description: "Four principles shared by nearly all great investors"
    components:
      - "1. Don't Lose - obsessed with avoiding losses (defense 10x more important than offense)"
      - "2. Asymmetric Risk/Reward - risk little to make much (Paul Tudor Jones 5:1 rule)"
      - "3. Tax Efficiency - maximize after-tax returns, not gross returns"
      - "4. Diversification - across asset classes, within classes, across countries, across time"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-003
    name: "Core and Explore Portfolio Strategy"
    description: "Creative Planning's asset allocation approach"
    components:
      - "CORE: Index funds for US and international stocks (low-cost, tax-efficient, broad diversification)"
      - "EXPLORE: Additional strategies at margins for potential outperformance (private equity, Berkshire Hathaway, etc.)"
      - "ALL SIZES: Large cap, mid cap, small cap, micro cap for maximum diversification"
      - "REBALANCE: Annually or opportunistically back to target allocation"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-004
    name: "6 Money Mistakes Framework"
    description: "Six psychological mistakes investors make and how to avoid them"
    components:
      - "1. Confirmation Bias - seeking info that confirms beliefs (solution: seek qualified disagreement)"
      - "2. Recency Bias - projecting recent trends into future (solution: rebalance, don't chase)"
      - "3. Overconfidence - believing you can beat the market (solution: get honest, use index funds)"
      - "4. Greed/Gambling - swinging for home runs (solution: patient long-term compounding)"
      - "5. Home Bias - investing too heavily in own country (solution: diversify globally)"
      - "6. Negativity/Loss Aversion - losses hurt 2x more than gains feel good (solution: preparation is key)"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-005
    name: "4 Ways to Diversify (Malkiel)"
    description: "Burton Malkiel's four dimensions of effective diversification"
    components:
      - "1. Across different asset classes (stocks, bonds, real estate, alternatives)"
      - "2. Within asset classes (not all in one stock or one property)"
      - "3. Across markets, countries and currencies around the world"
      - "4. Across time (dollar cost averaging - systematic investing over months/years)"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-006
    name: "Swenson's 6 Asset Classes for Individuals"
    description: "David Swenson's recommended diversification for individual investors"
    components:
      - "1. US Stocks"
      - "2. International Stocks"
      - "3. Emerging Market Stocks"
      - "4. Real Estate Investment Trusts (REITs)"
      - "5. Long-term US Treasuries"
      - "6. Treasury Inflation Protected Securities (TIPS)"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-007
    name: "7 Key Questions for Financial Advisors"
    description: "Questions to vet any financial advisor"
    components:
      - "1. Are you a registered investment advisor? (No = broker, walk away)"
      - "2. Are you or your firm affiliated with a broker dealer? (Yes = can act as broker, run)"
      - "3. Does your firm offer proprietary mutual funds? (Yes = conflict of interest)"
      - "4. Do you receive third-party compensation for recommending investments? (Must be no)"
      - "5. What's your investing philosophy? (Should believe in indexing, not stock picking)"
      - "6. What financial planning services beyond investing? (Tax, estate, insurance, holistic)"
      - "7. Where will my money be held? (Must be third-party custodian like Fidelity/Schwab)"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-008
    name: "5 Criteria for Choosing an Advisor"
    description: "Five criteria for vetting a fiduciary advisor"
    components:
      - "1. Credentials - CFP, attorneys, CPAs on team"
      - "2. Breadth - comprehensive wealth management (mortgage, insurance, taxes, legacy)"
      - "3. Track Record - experience with people in your specific situation"
      - "4. Philosophy - aligned on indexing vs active management"
      - "5. Personal Fit - connection, trust, long-term relationship potential"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-009
    name: "Peter Maluk's 6 Portfolio Guidelines"
    description: "Key principles for portfolio construction"
    components:
      - "1. Asset allocation drives returns - most important investment decision"
      - "2. Use index funds for the core of your portfolio"
      - "3. Always have a cushion - income-producing investments for rainy days"
      - "4. Rule of 7 - ideally 7 years of income in income-producing investments"
      - "5. Explore - at the margins, consider additional strategies for outperformance"
      - "6. Rebalance - annually bring portfolio back to target allocation"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-010
    name: "Paul Tudor Jones Trading Checklist"
    description: "Systematic investment decision checklist created with Tony Robbins"
    components:
      - "1. Is this a HARD trade? (Not one everyone would make)"
      - "2. Is there asymmetric risk/reward? (3:1 or 5:1?)"
      - "3. Where are the breaking points for other investors? (Entry point)"
      - "4. What's the exit if wrong? (Stop-loss defined in advance)"
      - "5. No trades after opening bell (avoid reactive trading)"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-011
    name: "3 Steps to Achievement"
    description: "Universal pattern for achieving any goal"
    components:
      - "1. FOCUS - Intense, obsessive focus on what you want activates reticular activating system"
      - "2. MASSIVE ACTION - Take action and keep changing approach until you find what works; model successful people"
      - "3. GRACE - Acknowledge luck/God/universe; appreciation brings more grace"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: FW-TR-012
    name: "4 Estate Planning Checklists"
    description: "Four areas to protect your financial kingdom"
    components:
      - "1. POWER: Durable power of attorney for healthcare + finances + living will"
      - "2. ESTATE: Will + trusts + avoid probate + estate tax planning"
      - "3. INSURANCE: Protect against illness, disability, lawsuits, divorce"
      - "4. CHARITABLE GIVING: Create legacy of impact and philanthropy"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

# ============================================================================
# L5 - METHODOLOGIES (Complete Implementations)
# ============================================================================
methodologies:

  - id: MET-TR-001
    name: "The Unshakeable Financial Freedom Method"
    description: "Complete roadmap from where you are to financial freedom"
    steps:
      - "1. LEARN THE RULES: Understand 7 Freedom Facts, market patterns, fee impacts"
      - "2. CALCULATE YOUR NUMBER: Use 20x income as independence target; security = 60% of that"
      - "3. PAY YOURSELF FIRST: Automate savings (start 3%, grow to 15-20%) into freedom fund"
      - "4. CUT FEES: Switch to low-cost index funds, audit 401k fees, eliminate hidden costs"
      - "5. FIND A TRUE FIDUCIARY: Use 7 questions to vet; must be RIA, not broker"
      - "6. BUILD DIVERSIFIED PORTFOLIO: Core (index funds) + Explore; across classes, countries, time"
      - "7. PREPARE FOR WINTER: Have 7 years income in bonds/income assets; write down reasons you own each asset"
      - "8. REBALANCE ANNUALLY: Sell what's high, buy what's low - forces buy-low-sell-high discipline"
      - "9. MASTER PSYCHOLOGY: Apply 90-second rule, awareness of 6 money mistakes, beautiful state"
      - "10. PROTECT & PLAN: Estate planning, powers of attorney, trusts, tax efficiency"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MET-TR-002
    name: "Bear Market Profit Method (Peter Maluk)"
    description: "How Creative Planning navigated 2008-2009 and profited"
    steps:
      - "1. PREPARE BEFORE THE STORM: Build diversified portfolio with income cushion before bear arrives"
      - "2. EDUCATE IN ADVANCE: Explain to clients how each asset performs in bear markets so no surprises"
      - "3. COMMUNICATE CONSTANTLY: Be the lighthouse broadcasting 'stay the course' during turmoil"
      - "4. SELL STRENGTH, BUY WEAKNESS: Take profits from strong assets (bonds) and buy beaten-down stocks"
      - "5. BUY INDEX FUNDS: Instant diversification at low cost across massively undervalued markets"
      - "6. STAY INVESTED: Every bear market becomes a bull market - patience is rewarded spectacularly"
      - "7. DOCUMENT THE PLAN: Written strategy agreed upon when calm; refer to it during panic"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MET-TR-003
    name: "The 90-Second Rule"
    description: "Technique to break suffering state and return to beautiful state"
    steps:
      - "1. DETECT: Feel tension rising in body (stomach, chest, holding breath)"
      - "2. BREATHE: Gently breathe and slow things down"
      - "3. DETACH: Step back from stressful thoughts - 'there goes that crazy mind again'"
      - "4. DON'T BELIEVE: Recognize thoughts as just thoughts, not reality"
      - "5. REDIRECT: Focus on something to appreciate - you can't suffer and appreciate simultaneously"
      - "6. APPRECIATE: Find anything to be grateful for (alive, breathing, loved ones)"
      - "7. RESOLVE: From beautiful state, solutions come more easily"
      - "8. PRACTICE: Gets easier with repetition - goes from discipline to habit"
    target: "Complete in 90 seconds or less; kill the monster when it's little"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MET-TR-004
    name: "2-Minute Gratitude Meditation"
    description: "Heart-centered meditation to shift from suffering to beautiful state"
    steps:
      - "1. Stand up, shake body, create physical energy"
      - "2. Identify unfinished business causing stress (rate 6-10 on upset scale)"
      - "3. Set aside that problem temporarily"
      - "4. Place both hands on heart, close eyes, breathe deeply into heart"
      - "5. Feel gratitude for your heart (100K beats/day, 60K miles of blood vessels)"
      - "6. Think of 3 experiences you're deeply grateful for - step into each memory fully"
      - "7. Think of a coincidence that led to something beautiful in your life"
      - "8. From this grateful state, return to the problem and ask: 'All I need to remember/focus on/believe/do is...?'"
      - "9. Trust your heart's first instinctive answer"
    result: "95%+ of people know what to do about their problem after this meditation"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MET-TR-005
    name: "Investment Success Checklist Method"
    description: "Create personal flight-deck checklist for investment decisions"
    steps:
      - "1. Write down where you're trying to go as an investor (specific financial goals)"
      - "2. Define your asset allocation percentages (stocks/bonds/alternatives)"
      - "3. Write down reasons why you own each asset in your portfolio"
      - "4. List what to watch out for (the 6 money mistakes)"
      - "5. Define your rebalancing schedule (annually minimum)"
      - "6. Share flight plan with trusted advisor (co-pilot)"
      - "7. Review checklist whenever tempted to make emotional decisions"
      - "8. Refer to written reasons when an asset underperforms"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md


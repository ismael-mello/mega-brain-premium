  # === COMPOUNDING & RETURNS ===

  - id: HEUR-TR-024
    rule: "At 10% annual return, money doubles every 7 years"
    threshold: "7-year doubling at 10%"
    context: "Rule of 72 applied to historic stock market returns"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-025
    rule: "Joe vs Bob: Starting 8 years earlier with $28,800 beats investing $140,000 (5x more) due to compounding"

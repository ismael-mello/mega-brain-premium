# ============================================================================
# L2 - MENTAL MODELS (Thinking Frameworks)
# ============================================================================
mental_models:

  - id: MM-TR-001
    name: "The Snake and the Rope"
    description: "Buddhist story - anxiety about investing is like mistaking a rope for a snake. Once you understand market patterns (the 7 Freedom Facts), the feared 'snake' is revealed as a harmless rope. Knowledge eliminates irrational fear."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-002
    name: "Financial Seasons Model"
    description: "Markets follow seasonal patterns like nature: spring (bull), summer (peak), fall (correction), winter (bear). Winter always comes but always ends. You plant seeds in spring, not winter. Recognize which season you're in to make better decisions."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-003
    name: "The Toll Collector vs The Gambler"
    description: "Better to be the one who collects tolls than the one who pays them. Brokerage firms (the house) always win because they charge a toll on every transaction. Index funds minimize tolls; active trading maximizes them."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-004
    name: "Termites Eating Your Future"
    description: "Fees are like termites - tiny, barely noticeable, but they can eat away your entire financial future. John Oliver analogy for how compound fees destroy wealth over decades."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-005
    name: "Consumer vs Owner Mindset"
    description: "Shift from being a consumer to being an owner. When you buy an iPhone you're a consumer of Apple. When you buy Apple stock you're an owner. The wealthy become owners of the economy, not just consumers within it."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-006
    name: "The Co-Pilot System"
    description: "Like airlines using checklists and co-pilots to prevent human error, investors need systematic checks and balances to prevent emotional decision-making. A financial advisor serves as co-pilot."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-007
    name: "Highway vs Rural Road (Risk Premium)"
    description: "Crossing a quiet rural road for $1 is fine. Crossing a 4-lane highway for $1, nobody would do it. The additional reward demanded for additional risk is the risk premium. Asset allocation is about balancing risk premiums."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-008
    name: "Saber-Toothed Tiger Brain"
    description: "The brain processes financial losses in the same parts that respond to mortal threats. Losing money triggers the same fight-or-flight as a predator. This ancient survival software makes us sell at bottoms and buy at tops."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-009
    name: "Beautiful State vs Suffering State"
    description: "At any moment you live in one of two states. Beautiful: love, joy, gratitude, creativity, appreciation. Suffering: stress, worry, anger, frustration. The undirected mind defaults to suffering (survival mode). You must consciously choose the beautiful state."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-010
    name: "Three Triggers of Suffering"
    description: "All suffering comes from focusing on one of three things: LOSS (believing you've lost something valuable), LESS (believing you have or will have less), NEVER (believing you'll never have something). Awareness of these patterns breaks the cycle."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-011
    name: "Kill the Monster When It's Little"
    description: "Catch negative thoughts within 90 seconds before they become Godzilla. The longer negative emotions linger, the harder they are to reverse. Early intervention is exponentially easier."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-012
    name: "The Gorilla and the Coin Flip"
    description: "Jack Bogle: If you pack 1,024 gorillas in a gym and teach them to flip coins, one will flip heads 10 times in a row. Most would call that luck, but in the fund business we call that a genius. Survivorship bias in fund performance."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-013
    name: "Return-Free Risk vs Risk-Free Return"
    description: "Traditional safe investments now offer 'return-free risk instead of risk-free returns.' Bonds and savings accounts are so low-yielding they've inverted the classic risk-return relationship."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: MM-TR-014
    name: "Dalio's Holy Grail of Investing"
    description: "15 or more good uncorrelated bets reduces overall risk by ~80% and increases return-to-risk ratio by 5x. Doesn't have to be great investments, just diversified and uncorrelated."
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

# ============================================================================
# L3 - HEURISTICS (Rules of Thumb with Numbers)

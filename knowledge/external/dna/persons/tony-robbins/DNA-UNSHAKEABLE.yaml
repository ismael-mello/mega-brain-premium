heuristics:

  # === MARKET STATISTICS & PATTERNS ===

  - id: HEUR-TR-001
    rule: "Corrections occur on average once per year since 1900"
    threshold: "~1x per year"
    context: "Freedom Fact 1 - corrections are routine, not exceptional"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-002
    rule: "Average correction lasts only 54 days (less than 2 months)"
    threshold: "54 days average duration"
    context: "Most corrections are over before you know it"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-003
    rule: "Average correction drops the market by 13.5% (historically), 14.2% from 1980-2015"
    threshold: "13.5-14.2% average decline"
    context: "Uncomfortable but not devastating"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-004
    rule: "Less than 20% of corrections turn into bear markets"
    threshold: "<20% escalation rate"
    context: "Freedom Fact 2 - 80% of corrections DON'T become bear markets"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-005
    rule: "Bear markets have occurred every 3-5 years historically"
    threshold: "34 bear markets in 115 years (1900-2015); 14 in 70 years (1946-2015)"
    context: "Freedom Fact 5"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-006
    rule: "Average bear market drops S&P 500 by 33%; more than a third drop over 40%"
    threshold: "33% average decline; >40% in 1/3 of bears"
    context: "Bear markets are painful but survivable"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-007
    rule: "Average bear market lasts about 1 year (range: 45 days to ~2 years)"
    threshold: "~1 year average; 45 days shortest; 694 days longest (1973-74)"
    context: "Bear markets are temporary"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-008
    rule: "Every single bear market in US history has been followed by a bull market without exception"
    threshold: "100% recovery rate"
    context: "Freedom Fact 6 - absolute historical pattern"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-009
    rule: "S&P 500 intra-year average decline was 14.2% from 1980-2015 yet ended positive in 27 of 36 years (75%)"
    threshold: "75% positive years despite avg 14.2% intra-year drops"
    context: "Freedom Fact 4 - the market rises over time despite setbacks"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-010
    rule: "Market is down about 1 in every 4 years; up 3 out of every 4 years"
    threshold: "75% up years, 25% down years"
    context: "Long-term odds strongly favor being invested"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-011
    rule: "US market hits all-time high on approximately 5% of all trading days - roughly once a month"
    threshold: "5% of trading days = all-time highs"
    context: "All-time highs are normal, not a warning sign"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  # === TIMING & MISSING DAYS ===

  - id: HEUR-TR-012
    rule: "Missing the top 10 trading days in 20 years cuts returns from 8.2% to 4.5% annually"
    threshold: "Missing 10 best days = returns nearly halved"
    context: "1996-2015 S&P 500 data"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-013
    rule: "Missing the top 20 trading days drops returns from 8.2% to 2.1%"
    threshold: "Missing 20 best days = paltry 2.1%"
    context: "Over 20 years (1996-2015)"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-014
    rule: "Missing the top 30 trading days drops returns to zero"
    threshold: "Missing 30 best days = 0% return over 20 years"
    context: "Devastating cost of being out of market"
    source_file: transcription_mp3_Unshakeable_Your_Financial_Freedom_Playbook_by_Tony_Robbins.md

  - id: HEUR-TR-015
    rule: "6 of the 10 best market days occurred within 2 weeks of the 10 worst days"

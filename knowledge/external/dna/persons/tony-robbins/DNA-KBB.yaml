# ============================================================================
# L4 — FRAMEWORKS (Structured Methodologies, Step-by-Step)
# ============================================================================
frameworks:

  - id: FW-TR-001
    name: "Massive Action + Certainty + Effective Execution = Cure All"
    description: "The formula for overcoming any challenge. Take massive action, build certainty through mental rehearsal, and execute effectively through modeling (learning from those who've done it)."
    steps: ["1. Build Certainty (rehearse results in advance)", "2. Take Massive Action", "3. Execute Effectively (model success)"]
    speaker: Tony Robbins
    source: "KBB-Workbook + M01-L01-P02"

  - id: FW-TR-002
    name: "RPM — Rapid Planning Method (5 Cs)"
    description: "Tony's personal productivity system. Not a to-do list — a thinking process."
    steps:
      - "1. CAPTURE: Get everything out of your head into one place with categories"
      - "2. CREATE A PLAN: 3 questions — What's my outcome? What's my purpose/why? What's my massive action plan?"
      - "3. CREATE A PLAN (actions): Star the 20% MUSTS, set minimum-maximum time, identify leverage"
      - "4. COMMIT: Do it now — never leave the site of a decision without action"
      - "5. CELEBRATE: Reward progress to reinforce momentum"
    speaker: Tony Robbins
    source: "BONUS-Tony-How_To_Take_Massive_Action"

  - id: FW-DG-003
    name: "Story → Teach → Tool → Action (The Magical Dance)"
    description: "The winning event formula for any mastermind or training. A continuous cycle that creates transformational learning."
    steps:
      - "1. STORY: Tell transformational story that inspires, motivates, builds credibility, shows epiphany"
      - "2. TEACH: Share tactical knowledge, how-tos, specific strategies"
      - "3. TOOL: Anchor the teaching with an interactive exercise/worksheet"
      - "4. ACTION: Get them to physically do something, apply it immediately"
      - "Repeat the dance throughout the event"
    speaker: Dean Graziosi
    source: "M01-L03-P01-Story_Teach_Tool"

  - id: FW-DG-004
    name: "Superpower Extraction (4 Questions)"
    description: "Process to extract your unconscious competence and identify what to teach."
    steps:
      - "Q1: List 3 things that make you stand out from your competition"
      - "Q2: List 3 specific skills you've developed that made you successful"
      - "Q3: List 2 things in your business that make you happiest and you'd never outsource"
      - "Q4: Write down 2-3 transformational stories (your hero's journey / epiphany moments)"
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: FW-DG-005
    name: "Ideal Client Avatar Builder"
    description: "Reverse engineer your superpower to find the perfect client. Three questions to identify them."
    steps:
      - "1. What are your ideal client's 3 biggest PAIN POINTS?"
      - "2. What are your ideal client's 3 biggest DESIRES?"
      - "3. Reverse engineer your superpower — what attributes must they have?"
    speaker: Dean Graziosi
    source: "M01-L02-P03-Identifying_Your_Ideal_Client"

  - id: FW-DG-006
    name: "Narrow Your Niche Tool"
    description: "One-sentence mission statement template for absolute clarity."
    steps:
      - "Template: 'I'm launching a _______ to help _______ to _______ by _______'"
      - "Example: 'I'm launching a mastermind to help authors to write and sell more books by using high impact direct response marketing'"
    speaker: Dean Graziosi
    source: "M01-L02-P04-Narrow_Your_Niche + KBB-Workbook"

  - id: FW-DG-007
    name: "Seven Levels Deep Exercise"
    description: "Ask 'why' 7 times to move from head-level (logical) reasons to heart-level (emotional) drivers. Each answer becomes the subject of the next 'why.'"
    steps:
      - "Level 1: Why do you want this? (surface answer — e.g., 'scale my business')"
      - "Level 2: Why is that important? (e.g., 'make bigger impact')"
      - "Level 3: Why? (e.g., 'set new standard')"
      - "Level 4: Why? (shift starts here — e.g., 'leave a legacy')"
      - "Level 5: Why? (emotional — e.g., 'never go backwards')"
      - "Level 6: Why? (deep emotional — e.g., 'want kids to have choices')"
      - "Level 7: Why? (core truth — e.g., 'want to be in control of my life')"
    speaker: Dean Graziosi (from Joe Stump)
    source: "M01-L04-P04-Seven_Levels_Deep"

  - id: FW-DG-008
    name: "The One Thing (Exponential Results)"
    description: "Instead of solving 10 problems individually, find the ONE thing that solves all of them simultaneously. Write all problems, write all possible solutions, then ask: is there ONE thing that addresses all problems?"
    steps:
      - "1. List ALL problems/fears/worries"
      - "2. List ALL possible solutions you're already trying"
      - "3. Ask: Could there be ONE THING that solves all of these?"
      - "4. Identify the ONE THING"
      - "5. Obsess ONLY on making that ONE THING a reality"
    speaker: Dean Graziosi
    source: "M01-L04-P10-The_One_Thing"

  - id: FW-DG-009
    name: "23-Day Launch Model"
    description: "Full launch process for filling events or selling products with emotional AND logical buyers."
    steps:
      - "Days 1-7: HYPE — tease that something is coming ('They're coming')"
      - "Days 8-14: VALUE VIDEOS — deliver value, remind of pain, show authority, push to register for launch date"
      - "Day 15: OPEN — release sales video, collect orders/applications (1/3 of sales)"
      - "Day 16: Replay available, push traffic"
      - "Days 17-19: FAQ/CLARITY VIDEO — address top 5 most common questions"
      - "Days 20-21: SOCIAL PROOF VIDEO — testimonials, results"
      - "Day 22: Countdown timer visible, urgency emails"
      - "Day 23: CLOSE — final day, 3 emails, deadline expires (1/3+ of sales come here)"
      - "Post-launch: Convert to EVERGREEN (same funnel minus urgency, running perpetually)"
    speaker: Dean Graziosi
    source: "M02-L05-P02-Launch_Evergreen"

  - id: FW-DG-010
    name: "Mastermind Marketing Message Framework"
    description: "5-part framework for crafting your mastermind marketing message."
    steps:
      - "1. OVERCOME OBJECTIONS: Kill 'time' objection (ROT not cost) and 'cost' objection (ROI not expense)"
      - "2. ESTABLISH AUTHORITY: Share your superpower, edify yourself with results"
      - "3. SHARE WHAT YOU'LL TEACH: Align your unique abilities with their desires"
      - "4. PRESENT BENEFITS (not options): What outcomes will they get?"
      - "5. CREATE BELONGING: Entrepreneurs are lonely — masterminds provide community"
    speaker: Dean Graziosi
    source: "M02-L01-P03-Mastermind_Marketing_Philosophy"

  - id: FW-DG-011
    name: "Knowledge Broker Partnership Model"
    description: "How to partner with experts who have knowledge but don't know how to monetize it."
    steps:
      - "1. Pick a niche you're passionate about (go NARROW)"
      - "2. Find expert with knowledge + following (warm referral > cold outreach)"
      - "3. Reach out via DM/email/text with simple pitch: 'I learned from Tony & Dean how to run profitable masterminds. I can handle everything. You just show up.'"
      - "4. Reduce their complexity — you handle marketing, sales, logistics"
      - "5. Revenue share on profits"
      - "6. First mastermind: zero ad spend using expert's existing audience"
    speaker: Dean Graziosi
    source: "M04-L01-P01-Knowledge_Broker"

  - id: FW-DG-012
    name: "Clarity Tool (Mapping Your Bigger Future)"
    description: "Event opening tool. Four quadrants to create clarity on current state and desired future."
    steps:
      - "Quadrant 1: CURRENT STATUS (The Truth — where are you right now?)"
      - "Quadrant 2: ONE YEAR GOALS (look back from 1 year ahead)"
      - "Quadrant 3: WHY THESE GOALS ARE IMPORTANT"
      - "Quadrant 4: CAPABILITIES NEEDED TO ACHIEVE GOALS (the HOW — what they'll learn)"
    speaker: Dean Graziosi
    source: "M01-L04-P02-Clarity_Tool + KBB-Workbook"

  - id: FW-DG-013
    name: "Extracting What To Teach (5 Questions)"
    description: "Questions to extract your teachable expertise from your actual experience."
    steps:
      - "Q1: What were the biggest needle movers in your business in the last 12 months?"
      - "Q2: What are the biggest mistakes you made that you could warn others about?"
      - "Q3: What small daily/weekly habits add to your success?"
      - "Q4: If you could tell your teenage self ONE thing, what would it be?"
      - "Q5: What's ONE thing you do that makes you more successful than your competition that others may not know exists?"
      - "BONUS: Pick 5-7 'riff topics' you could talk about for 10-30 minutes with no notes"
    speaker: Dean Graziosi
    source: "M01-L03-P03-Extracting_What_To_Teach + KBB-Workbook"

  - id: FW-DG-014
    name: "Irresistible Offer Model (Zappos Example)"
    description: "Turn your biggest obstacle into your irresistible offer. From Tony's friend Tony Hsieh at Zappos."
    steps:
      - "1. Identify your ideal customer"
      - "2. Identify the biggest OBSTACLE preventing them from buying"
      - "3. Turn that obstacle into your offer (Zappos: free shipping BOTH ways)"
      - "4. The more irresistible the offer, the more the obstacle disappears"
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: FW-DG-015
    name: "Nine-Word Email"
    description: "Dean Jackson's concept for conversational outreach. Write like you'd text a friend."
    steps:
      - "Keep it conversational (not corporate newsletter)"
      - "Example: 'Hey, it's Dean. I'm doing a small private mastermind in LA next week. You want to join?'"
      - "Follow up with detail email for those who reply"
      - "Then qualify with phone calls"
    speaker: Dean Graziosi (via Dean Jackson)
    source: "M03-L01-P02-Psychology_Of_Running_A_Mastermind"

  - id: FW-DG-016
    name: "Mastermind Pre-Frame Questionnaire"
    description: "Questions to send attendees BEFORE the event to maximize value."
    steps:
      - "Q1: What is the biggest OPPORTUNITY you're facing that you'd love to take advantage of?"
      - "Q2: What is the biggest OBSTACLE you'd love to solve?"
      - "Q3: What is the biggest BREAKTHROUGH you've had in the last 90-180 days?"
      - "Use answers to: prep your agenda, identify hot seats, find peer teachers"
    speaker: Dean Graziosi
    source: "M03-L01-P02-Psychology_Of_Running_A_Mastermind"

# ============================================================================
# L5 — METHODOLOGIES (Complete Implementations / Playbooks)
# ============================================================================
methodologies:

  - id: MET-DG-001
    name: "Complete Mastermind Launch-to-Delivery Playbook"
    description: "End-to-end methodology for launching and running a profitable mastermind."
    process:
      phase_1_extract:
        - "Discover your Superpower (4 questions)"
        - "Identify your Ideal Client (avatar, pain points, desires)"
        - "Narrow Your Niche (one-sentence mission)"
        - "Extract What To Teach (5 questions + riff topics)"
        - "Create curriculum: Story → Teach → Tool → Action dance"
        - "Select and prepare tools (Clarity, 7 Levels Deep, One Thing, etc.)"
        - "Build your first agenda"
      phase_2_fill:
        - "Craft marketing message (objections, authority, benefits)"
        - "Build landing page with Hook, Story, Close"
        - "Set pricing based on your time value + delivered value"
        - "Create application or order page"
        - "Choose launch model (launch or evergreen)"
        - "Execute 23-day launch sequence"
        - "Qualify applicants via phone"
      phase_3_run:
        - "Pre-frame attendees (questionnaire: obstacle, opportunity, breakthrough)"
        - "Prepare venue/virtual setup"
        - "Send gifts/welcome package (books, journal, pen)"
        - "Show up in your authentic self — serve, don't perform"
        - "Execute Story → Teach → Tool → Action dance"
        - "Facilitate group problem-solving (hot seats)"
        - "Frame the 'ONE THING' they should implement immediately"
        - "Close with next steps and ascension offer"
    speaker: Dean Graziosi + Tony Robbins
    source: "Full KBB Course (Modules 1-3)"

  - id: MET-DG-002
    name: "Knowledge Broker Partnership Methodology"
    description: "Complete process for monetizing someone else's expertise through masterminds."
    process:
      - "1. Choose niche you're passionate about (go narrow)"
      - "2. Make list of experts with knowledge + following"
      - "3. Prioritize warm connections (friend of friend > cold outreach)"
      - "4. Send 9-word style outreach: conversational, not corporate"
      - "5. Pitch: 'I handle everything — marketing, sales, logistics. You show up and deliver.'"
      - "6. Use expert's existing audience for first event (zero ad spend)"
      - "7. Apply full KBB system: extract → fill → run"
      - "8. Revenue share profits"
      - "9. Reinvest profits into paid advertising for event #2"
      - "10. Scale: quarterly events, ascension pricing, build recurring"
    speaker: Dean Graziosi
    source: "M04-L01-P01 + M04-L01-P02 + M04-L01-P03"

  - id: MET-TR-003
    name: "RPM Complete Life Management System"
    description: "Tony's full personal productivity methodology."
    process:
      - "1. CAPTURE: Everything out of head → one place with categories (companies, roles, projects)"
      - "2. GROUP: See patterns — 80 items become 4-5 outcomes"
      - "3. OUTCOME: For each group — what's the specific measurable RESULT I want?"
      - "4. PURPOSE: Why do I want this? Use juicy emotional language"
      - "5. MASSIVE ACTION PLAN: List all action items for this outcome"
      - "6. PRIORITIZE: Star the 20% MUSTS (Pareto)"
      - "7. TIME: Minimum to maximum estimate for each must item"
      - "8. LEVERAGE: Share outcome + purpose + actions with partners; check in before deadline"
      - "9. EXECUTE: Start with musts, measure progress"
      - "10. REVIEW: Daily check musts, weekly review outcomes"
    speaker: Tony Robbins
    source: "BONUS-Tony-How_To_Take_Massive_Action"

  - id: MET-DG-004
    name: "Mastermind Event Day Execution Framework"
    description: "How to actually run the day of your event."
    process:
      preparation:
        - "Day before: Review agenda, think through flow, take long shower visualizing"
        - "Prepare slides/whiteboard, tools printed, examples filled out"
        - "Set up gifts at each seat (book, journal, pen, mug)"
        - "Have your comfort items (green tea, kombucha, water, energy bars)"
        - "Dress authentically — don't wear a suit if you never wear one"
      morning_block:
        - "Energy entrance — mirror the state you want from them"
        - "Intro Card tool (who are you, what you do, why you're here)"
        - "Clarity Tool (where they are → where they want to go)"
        - "First story → teach → tool → action cycle"
        - "Group work (5 people, 10 min each sharing)"
        - "Hot seat from pre-frame questionnaire"
        - "Morning takeaway check-in"
      afternoon_block:
        - "Energy reset after lunch"
        - "Deeper teach with more tools (7 Levels Deep, One Thing)"
        - "Guest speaker or peer breakthrough sharing"
        - "Implementation sessions"
        - "Close: What's your ONE THING to implement immediately?"
        - "Next steps and ascension offer"
      post_event:
        - "Follow up within 48 hours"
        - "Collect testimonials"
        - "Offer next-level mastermind (ascension)"
    speaker: Dean Graziosi
    source: "M03-L01-P02-Psychology_Of_Running_A_Mastermind"


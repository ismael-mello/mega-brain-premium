# ============================================================================
# L1 — PHILOSOPHIES (Core Beliefs & Worldview)
# ============================================================================
philosophies:

  - id: PHI-TR-001
    text: "Resources are not the problem. The problem is people are not resourceful enough."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-TR-002
    text: "Reasons aren't going to get you where you want to go. Results come from an obsession with getting yourself to take action."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-TR-003
    text: "Knowledge is not power. Execution is the ultimate power. Execution trumps knowledge every day of the week."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-TR-004
    text: "Complexity is the enemy of execution."
    speaker: Tony Robbins
    source: "M00-Course_Introduction"

  - id: PHI-TR-005
    text: "Never leave the site of setting a goal or making a decision without doing something in that moment that commits you to follow through."
    speaker: Tony Robbins
    source: "M00-Course_Introduction"

  - id: PHI-TR-006
    text: "The only way you get wealthy and sustain that wealth is if you understand that life is not about me, it's about what do I do for you."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-007
    text: "If you can do more for others than anybody else is doing in the marketplace, you will dominate. It's only a matter of time."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-008
    text: "Work harder on yourself than you do on your job."
    speaker: Tony Robbins (quoting Jim Rohn)
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-009
    text: "Don't fall in love with your product or service. Fall in love with your ideal customer."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-010
    text: "People don't buy products, they buy feelings. People don't buy products, they buy states. People don't buy products, they buy identities."
    speaker: Tony Robbins (from Steve Wynn conversation)
    source: "BONUS-Tony-People_Buy_Feelings"

  - id: PHI-TR-011
    text: "People will pay disproportionately to feel significant than for any other need."
    speaker: Tony Robbins (from Steve Wynn)
    source: "BONUS-Tony-People_Buy_Feelings"

  - id: PHI-TR-012
    text: "If you want to be wealthy, the entire secret in one sentence: Do more for others than anyone else is doing. Add more value and you will own the marketplace."
    speaker: Tony Robbins
    source: "BONUS-Tony-People_Buy_Feelings"

  - id: PHI-TR-013
    text: "High margins come from high human needs being met."
    speaker: Tony Robbins
    source: "BONUS-Tony-People_Buy_Feelings"

  - id: PHI-TR-014
    text: "Adding value is not about cutting your prices. Sometimes adding value is raising your price."
    speaker: Tony Robbins
    source: "BONUS-Tony-People_Buy_Feelings"

  - id: PHI-TR-015
    text: "80% of success in anything is psychology and 20% is mechanics."
    speaker: Tony Robbins
    source: "Tony-Secret_To_Energy_For_Life"

  - id: PHI-TR-016
    text: "If you do what you've always done, you'll get what you've always gotten."
    speaker: Tony Robbins
    source: "KBB-Workbook"

  - id: PHI-TR-017
    text: "Activity without purpose is the drain to your life. Activity without purpose is the drain to your wealth."
    speaker: Tony Robbins
    source: "BONUS-Tony-How_To_Take_Massive_Action"

  - id: PHI-DG-018
    text: "Self-education is the new norm. We're in the information age and masterminds will be the new norm."
    speaker: Dean Graziosi
    source: "M02-L01-P03-Mastermind_Marketing_Philosophy"

  - id: PHI-DG-019
    text: "People don't sue relationships. They don't refund relationships. They sue and refund transactions."
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: PHI-DG-020
    text: "Hard work didn't mean results. They didn't teach us in school how to be successful."
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: PHI-DG-021
    text: "People who pay, pay attention. Give somebody something for free, it's not worth anything."
    speaker: Dean Graziosi
    source: "M04-L01-P01-Knowledge_Broker"

  - id: PHI-DG-022
    text: "They don't make statues of critics."
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: PHI-DG-023
    text: "Your next level of life — love, income, abundance, joy — lives on the other side of your biggest fear or your biggest pain or your biggest obstacle."
    speaker: Dean Graziosi
    source: "M01-L04-P10-The_One_Thing"

  - id: PHI-DG-024
    text: "At the end of your life, you don't want to say you lived an okay life or even a good life."
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: PHI-TR-025
    text: "Entrepreneurs usually fall in love with their product. If you're going to scale, fall in love with your ideal customer — who is the client going to tell all their friends, refer the most business, and become a client not just a customer."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-026
    text: "Customers go away, clients stay. What makes a client is someone you're constantly adding more value to."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-027
    text: "Business is really only two things: innovation and marketing. Innovation is finding a better way to meet your customer's needs. Marketing is getting people to want to do business with you."
    speaker: Tony Robbins (quoting Peter Drucker)
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-TR-028
    text: "Repetition is the mother of skill."
    speaker: Tony Robbins (quoting Jim Rohn)
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-TR-029
    text: "Reasons come first, answers come second. If you get a strong enough why, you can figure out how to do anything."
    speaker: Tony Robbins (quoting Jim Rohn)
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-TR-030
    text: "Where focus goes, energy flows."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-DG-031
    text: "I want to inform people, I want to influence people. That's what a leader does — a leader is a person who can influence the thoughts, feelings, emotions and actions of another human being."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: PHI-DG-032
    text: "Most people overestimate what they're going to do in a year and underestimate what they can do in a decade or two."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: PHI-DG-033
    text: "Don't die with knowledge in your head. The world deserves to learn what you know."
    speaker: Dean Graziosi
    source: "M01-L04-P04-Seven_Levels_Deep"

  - id: PHI-DG-034
    text: "Marketing is simply attracting those you want and repelling those you don't."
    speaker: Dean Graziosi
    source: "M01-L02-P03-Identifying_Your_Ideal_Client"

  - id: PHI-DG-035
    text: "You are there to serve, not be judged."
    speaker: Dean Graziosi
    source: "M03-L01-P02-Psychology_Of_Running_A_Mastermind"

# ============================================================================
# L2 — MENTAL MODELS (Thinking Frameworks & Decision Lenses)
# ============================================================================
mental_models:

  - id: MM-TR-001
    name: "Success Momentum Cycle (Belief-Potential-Action-Results)"
    description: "Four-square clockwise cycle: Certainty/Belief → Potential → Action → Results → reinforces Belief. When you're uncertain, you tap little potential, take little action, get poor results, reinforcing the negative spiral. The rich get richer because certainty → more potential → massive action → great results → more certainty."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: MM-TR-002
    name: "Three Levels of Mastery"
    description: "Level 1: Cognitive Understanding (you understand it intellectually). Level 2: Emotional Mastery (you feel enough emotion to move and use it). Level 3: Physical Mastery (you've done it so many times with emotion it's in your body — you do it without thinking). Physical mastery is the goal."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: MM-TR-003
    name: "Six Human Needs"
    description: "1. Certainty (avoid pain, have pleasure). 2. Uncertainty/Variety (surprise, novelty). 3. Significance (feeling unique, special, important). 4. Connection/Love. 5. Growth (grow or die). 6. Contribution. First four are needs of personality — everyone finds a way to meet them. Last two are needs of the spirit."
    speaker: Tony Robbins
    source: "BONUS-Tony-People_Buy_Feelings"

  - id: MM-TR-004
    name: "Reticular Activating System (RAS)"
    description: "The RAS determines what you notice in your environment. When you decide something is your mission and can't stop thinking about it, your brain starts noticing opportunities everywhere that others miss — like when you buy a car and suddenly see it everywhere."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: MM-TR-005
    name: "CANI — Constant And Never-ending Improvement"
    description: "The real secret to sustained wealth and success. Not a one-time event but a continuous process of improving what you do, how you reach people, how you add value."
    speaker: Tony Robbins
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: MM-TR-006
    name: "Innovation and Marketing Model"
    description: "Business = Innovation + Marketing. Innovation = finding a better way to meet your customer's needs. Marketing = getting people to want to do business with you. Like a relationship: first you innovate (unique approaches), then market (make them want you). If you stop either, you lose."
    speaker: Tony Robbins (via Peter Drucker)
    source: "M01-L01-P03-Mindset_Secrets_To_Scale"

  - id: MM-TR-007
    name: "Results In Advance"
    description: "The mind doesn't distinguish between vivid imagination and real experience. To create certainty before having results, vividly rehearse success repeatedly. Like the turning exercise — 3 mental rehearsals = 25%+ physical improvement."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: MM-TR-008
    name: "Emotional vs Logical Buyers"
    description: "About 1/3 of buyers are emotional (buy immediately), 1/3 buy during consideration period, 1/3 are logical (buy at the deadline). 40% of all buyers buy on the LAST day. Most businesses lose logical buyers by not creating proper urgency and giving time to process."
    speaker: Dean Graziosi
    source: "M02-L05-P02-Launch_Evergreen"

  - id: MM-DG-009
    name: "Unconscious Competence"
    description: "Most successful people don't know WHY they're successful — they have 'unconscious competence.' They say 'I just work hard' when there's actually a hidden system. The Superpower extraction process makes the unconscious conscious and teachable."
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: MM-DG-010
    name: "Art vs Science of Business"
    description: "Every business has an art side (creative messaging, human connection, presentation) and a science side (algorithms, data, processes). Know which side is YOUR superpower. Teach the art; hire for the science — or vice versa."
    speaker: Dean Graziosi
    source: "M01-L02-P02-Discovering_Your_Superpower"

  - id: MM-DG-011
    name: "Options vs Benefits"
    description: "Options are features/mechanics. Benefits are feelings/outcomes. Don't sell headlights (options) — sell 'when it's dark outside, you can see' (benefit). Don't sell air conditioning mechanics — sell 'when it's hot outside, you get in and it's cold.'"
    speaker: Dean Graziosi
    source: "M02-L01-P03-Mastermind_Marketing_Philosophy"

  - id: MM-DG-012
    name: "ROT — Return On Time"
    description: "Masterminds don't cost you time — they give you a Return On Time. Everything learned shortcuts your learning curve and gives exponential time back. Frame events as ROT not cost."
    speaker: Dean Graziosi
    source: "M02-L01-P03-Mastermind_Marketing_Philosophy"

  - id: MM-TR-013
    name: "Three Steps to Achievement"
    description: "Step 1: Get obsessed — focus on what you want with burning desire until your RAS activates. Step 2: Massive action — take relentless action, keep changing approach. Step 3: Grace/luck — the more you acknowledge and act, the more grace comes to you."
    speaker: Tony Robbins
    source: "M01-L01-P02-What_Does_It_Take_To_Succeed"

  - id: MM-TR-014
    name: "Leverage vs Delegation"
    description: "Delegation = dump tasks on someone and get mad when they fail. Leverage = share the outcome, purpose, and action plan; partner with them; check in before deadline; let them improve the approach. Leverage is sustainable; delegation creates resentment."
    speaker: Tony Robbins
    source: "BONUS-Tony-How_To_Take_Massive_Action"

  - id: MM-DG-015
    name: "Significance Pricing Model"
    description: "From Steve Wynn: People pay disproportionately for significance. When competitors shrink during downturns, add MORE value and keep prices high. High-end customers gravitate to whoever maintains the most significance. Building significance during recession locks in loyalty."
    speaker: Tony Robbins
    source: "BONUS-Tony-People_Buy_Feelings"


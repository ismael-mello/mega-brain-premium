# L5 — METHODOLOGIES (Complete implementations, playbooks)
# =============================================================================
L5_METHODOLOGIES:

  - id: MET-TR-001
    name: "The Complete Knowledge Business Launch Methodology"
    process: |
      PHASE 1 - FOUNDATION (7-Step Jumpstart, ~7-10 days):
        1. Define compelling future + 7 Levels Deep WHY
        2. Extract knowledge asset (career skill / life experience / passionate reporter)
        3. Identify ideal client (niche within niche + Room Test)
        4. Create lead magnet (resource guide / checklist / myth report)
        5. Build opt-in page
        6. Set up automated email delivery
        7. Choose delivery system (course / coaching / mastermind)
        8. Create solution statement + celebrate

      PHASE 2 - PRODUCT DESIGN:
        1. Complete Irresistible Product Framework (7 Questions)
        2. If needed: Use Passionate Reporter Method for additional expertise
        3. Define 6 modules/topics using AI assistance
        4. Create teaching points for each module using Story-Teach-Tool
        5. Build out content with workbooks/worksheets

      PHASE 3 - BUILD YOUR PRODUCT:
        Option A: Mastermind (6-12 people, collective wisdom)
        Option B: Coaching (1-on-1 or group, accountability)
        Option C: Course (self-paced, scalable)
        + Set up sales funnel, client portal, payment processing

      PHASE 4 - BUSINESS SKILLS:
        1. Communication & Influence (Hook Story Close)
        2. Marketing (Social Media + Email + Copywriting)
        3. Entrepreneurial Mindset
        4. Financial & Legal Basics
        5. Sales Basics

      PHASE 5 - ATTRACT CLIENTS:
        Track A: Networking (low cost, personal touch)
        Track B: Social Media (organic reach)
        Track C: Meta Ads (paid, scalable)

      PHASE 6 - LAUNCH:
        Option 1: One-Day Launch
        Option 2: Webinar Formula (Content + Close)
    speaker: Dean Graziosi + Tony Robbins (full MBS course)
    source_file: "Entire MBS Course"

  - id: MET-TR-002
    name: "Hook Story Close Implementation Playbook"
    process: |
      PRE-WORK:
        - Fall in love with your client, product, and results
        - Study what's already working (join email lists, watch ads, build swipe file)
        - Know your ideal client's problems, desires, and internal objections

      STEP 1 - CRAFT THE HOOK:
        - Spend 70% of creative time on the hook
        - Enter conversations already in their head
        - Test: "Would this make ME stop scrolling?"
        - Format depends on medium:
          * Email: Subject line
          * Social: First line/thumbnail
          * Sales page: Headline
          * Video: First 3 seconds
        - The Larry King test: Is this about THEM or about ME?

      STEP 2 - TELL THE STORY:
        - Share ONE scene, not your whole life
        - Include your journey/epiphany/transformation
        - Overcome objections INSIDE the story
        - Share success stories (yours + clients)
        - Let them feel understood ("me too" not "look at me")
        - Be vulnerable and authentic

      STEP 3 - DELIVER THE CLOSE:
        - Ask directly for the action
        - Lead with OUTCOMES not features (Air Conditioning Analogy)
        - Include money-back or results guarantee
        - Create ethical urgency ("If not now, when? If not us, who?")
        - Add one powerful bonus
        - Energy goes UP at the offer, not down
        - ONE call to action only

      ADAPTABILITY:
        - 1-minute Instagram reel
        - 5-minute YouTube video
        - 30-minute podcast
        - 90-minute webinar
        - 3-7 day launch sequence
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: MET-TR-003
    name: "4S Copywriting Implementation Method"
    process: |
      FOR EVERY PIECE OF COPY:

      S1 - STOP:
        - Subject line / headline must be pattern interrupt
        - Use curiosity, counterintuitive claims, personal touch
        - Creative sender names (RSVPRequired-MM style)
        - Build and maintain a swipe file of great subject lines
        - Test multiple subject lines (split test everything)

      S2 - SHOCK:
        - First 1-3 sentences hit them in the heart
        - Create emotional/psychological jolt
        - Promise to save time, energy, pain, or deliver pleasure
        - Build on the curiosity from the STOP

      S3 - STORY:
        - Identify the pain they're experiencing
        - Show the desires they long for
        - Be specific (not "divorce hurts" but "wondering if you're the problem")
        - Put words to what they think but never said out loud
        - Show the solution through your story / client stories
        - Make it about THEM not YOU
        - Address one person, not a crowd

      S4 - SELL:
        - Remind who this is for (and who it's not)
        - Use urgency (time limit) + scarcity (quantity limit)
        - Sell benefits/outcomes, not features
        - Tell them EXACTLY what to do (click here, not vague)
        - Remind what happens if they DON'T act
        - ONE action only

      POST-WRITE AUDIT (8 checkpoints):
        1. Read aloud — sounds like me?
        2. Motivating/inspiring words?
        3. Concise but specific?
        4. Written to ONE person?
        5. Will it stick out?
        6. Ideal client compelled?
        7. No cliches?
        8. CTA clear and specific?

      ONGOING IMPROVEMENT:
        - Read and study others' copy constantly
        - Split test everything (subject lines, body, CTAs)
        - Data is your best friend
        - Don't assume you know what works
    speaker: Charlie
    source_file: transcription_mp4_06-_Crafting_Compelling_Copy.md

  - id: MET-TR-004
    name: "Value Ladder Construction Playbook"
    process: |
      STAGE 1 - START WITH ONE (Months 1-6):
        - Pick ONE product type (course, coaching, or mastermind)
        - Price it based on market research + gut (err higher)
        - Focus: First sale → Next sale → Consistent sales
        - Reinvest in quality and marketing

      STAGE 2 - ADD LEAD GENERATION (Months 3-12):
        - Create free lead magnet below your main offer
        - Build email list with opt-in pages
        - Give massive value in advance (reciprocity)

      STAGE 3 - ADD NEXT LEVEL (Year 1-2):
        - When clients say "What's next?" — you have the answer
        - If started with course → add coaching
        - If started with coaching → add course below AND mastermind above
        - 10% conversion up, 1-2% to top tier

      STAGE 4 - EXPAND DOWN (Year 2-3):
        - Consider writing a book from your framework/course
        - Book feeds course funnel ($20 → $1K pathway)
        - Add podcast or free content layer

      STAGE 5 - SCALE WITH ADVERTISING (Year 3-5):
        - Take profits from right side and invest in left side
        - Run ads to free content, book, lead magnets, webinars
        - The whole system becomes self-funding

      MATH MODEL:
        100 course sales × $1K = $100K
        + 10% coaching × $10K = $100K
        + 2% mastermind × $25K = $50K
        = $250K from 100 initial course sales
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: MET-TR-005
    name: "Momentum Building Methodology (Success Cycle)"
    process: |
      WHEN IN A DOWNWARD SPIRAL:

      STEP 1 - RECOGNIZE:
        - Low certainty → little potential tapped → little action → poor results
        - "I tried that, it didn't work" = you were uncertain

      STEP 2 - CREATE CERTAINTY FIRST:
        - Don't just take more action with uncertainty
        - Vivid mental rehearsal: see yourself succeeding emotionally + visually
        - The mind cannot tell the difference between vividly imagined and real
        - Do this repeatedly until you FEEL certain

      STEP 3 - ESTABLISH MISSION:
        - Write down your real mission (what am I here to serve/give/deliver?)
        - This activates the RAS (Reticular Activating System)
        - You start noticing opportunities others miss

      STEP 4 - TAKE MASSIVE ACTION:
        - With certainty, you tap full potential
        - Keep changing approach if something doesn't work
        - "How long do you give your child to learn to walk?"
        - Fortune is in the follow-up (5+ times)

      STEP 5 - MODEL:
        - Speed up results by following proven practices
        - Don't reinvent — model what works

      STEP 6 - ACKNOWLEDGE GRACE:
        - Recognize what's beyond your own effort
        - Gratitude attracts more grace

      THREE LEVELS TO REACH:
        1. Cognitive understanding (know it)
        2. Emotional mastery (feel it enough to act)
        3. Physical mastery (in your body, automatic)
        Key: Repetition is the mother of skill
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MET-TR-006
    name: "Passionate Reporter Execution Playbook"
    process: |
      PHASE 1 - IDENTIFY EXPERTS:
        - Use AI (Gigi/ChatGPT) to find experts in your topic
        - Get specific categories (instructors, therapists, educators, parents)
        - Ask AI for specific names in each category
        - Find contact info via Google/LinkedIn

      PHASE 2 - OUTREACH:
        - Draft personalized email offering value exchange:
          * 30-minute Zoom interview
          * Include their business info in your course resources
          * Promote them on social media
        - Use AI to draft and shorten emails
        - Send to 5-7+ experts
        - Follow up 5+ times if no response
        - Try LinkedIn (less crowded)
        - Go local if big names don't respond

      PHASE 3 - CONDUCT INTERVIEWS:
        - Prepare 15 questions with AI
        - Start with top 3-5, vary the rest by expertise
        - Record on Zoom
        - Send confirmation emails, calendar invites, reminders

      PHASE 4 - EXTRACT & BUILD:
        - Transcribe with Otter.ai
        - Upload transcripts to AI
        - Extract key points and structure content
        - Layer with your own perspective and personality

      IF NO ONE RESPONDS:
        - Review your ask email (too long? not specific enough?)
        - Personalize more
        - Go local (state/city experts)
        - Ask for referrals on social media
        - Keep asking — persist until you succeed
    speaker: Mike Place
    source_file: transcription_mp4_02-Amplifying_Your_Knowledge__Step-by-Step.md

  - id: MET-TR-007
    name: "Story, Teach, Tool Content Creation Methodology"
    process: |
      FOR EACH MODULE/LESSON/SESSION:

      PREPARATION:
        - Write down all stories/scenes from your life related to your topic
        - Identify which scene sets up which teaching point
        - Use AI to generate and refine teaching points

      DELIVERY STRUCTURE:
        1. STORY (30% of time):
           - ONE scene, not whole life story
           - Make it relatable and intriguing
           - Show vulnerability
           - Set up WHY this topic matters

        2. TEACH (40% of time):
           - 2-5 teaching points per module
           - Can use ONE story for all points OR micro-stories for each
           - Be specific and actionable
           - Share what you learned, what changed

        3. TOOL (30% of time):
           - Exercise, worksheet, or action step
           - Must anchor the learning
           - Can be custom-created or adapted from existing tools
           - This is what makes knowledge STICK

      EXAMPLE (Weight Loss Module):
        STORY: "Before I understood nutrients, I thought skipping bread was enough..."
        TEACH: 1) Understanding calories/energy 2) Meal planning for deficit 3) Sustainable habits
        TOOL: "Fill out this meal planner for the next week"

      SCALING:
        - 6 modules × Story + 3-5 teaching points + Tool = complete course
        - Same framework works for coaching sessions, mastermind topics, workshops
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Story__Teach__Tool__The_Ultimate_Framework.md

  - id: MET-TR-008
    name: "Lead Magnet to Email List Building Playbook"
    process: |
      STEP 1 - CREATE LEAD MAGNET:
        - Choose type: Resource guide / Checklist / Myth-busting report
        - Use AI to draft content based on your expertise
        - Customize and personalize (AI gets you off blank page, YOU make it yours)
        - Design in Canva (free, drag-and-drop)
        - Download as PDF

      STEP 2 - BUILD OPT-IN PAGE:
        - Use platform templates (plug-and-play)
        - Enter name, lead magnet title, color theme
        - Customize copy and imagery
        - Include popup reminder
        - Connect to domain

      STEP 3 - SET UP AUTOMATION:
        - Create email workflow: opt-in triggers automated email
        - Email delivers lead magnet link
        - Tag contact record
        - Send yourself notification

      STEP 4 - START COLLECTING:
        - Share opt-in page URL on social media
        - Add to email signature
        - Tell everyone about your free resource
        - Can start in 48 hours

      STEP 5 - NURTURE:
        - Follow up with value-adding emails
        - Eventually offer your paid product
        - Build trust before selling
    speaker: Dean Graziosi + Lane + Ali
    source_file: Steps 4-6 of Jumpstart

  - id: MET-TR-009
    name: "Dean's Morning Routine Protocol"
    process: |
      IMMEDIATELY UPON WAKING:
        1. Think of something you're grateful for (can be small)
        2. Think of ONE win from yesterday
        3. Think of ONE win you want to accomplish today
        4. Think of someone you love

      FEED YOUR BODY:
        5. Big green drink (green powder + MCT oil + apple cider vinegar)

      MOVE YOUR BODY:
        6. Walk, run, stair master, weights — any movement

      RESULT: Sets your day up for OFFENSE (not defense)
      DURATION: 25+ years of practice
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Story__Teach__Tool__The_Ultimate_Framework.md

  - id: MET-TR-010
    name: "Seven Levels Deep Methodology"
    process: |
      PURPOSE: Go from HEAD to HEART to find true emotional drivers

      PROCESS:
        Q1: Why do you want to [goal]?
        → Answer 1

        Q2: Why do you want [Answer 1]?
        → Answer 2

        Q3: Why do you want [Answer 2]?
        → Answer 3

        Q4: Why do you want [Answer 3]?
        → Answer 4

        Q5: Why do you want [Answer 4]?
        → Answer 5 ← Usually the SHIFT from head to heart happens here

        Q6: Why do you want [Answer 5]?
        → Answer 6

        Q7: Why do you want [Answer 6]?
        → Answer 7 ← Deepest emotional truth

      KEY SIGNS:
        - Around Q5, people feel a "thump" in their heart
        - Tears often appear
        - Answers shift from intellectual to emotional
        - Final answer reveals true motivation (control, safety, love, legacy)

      DEAN'S EXAMPLE:
        Q1: Why help students? → I want people to live their potential
        Q2: Why potential? → I want to leave a legacy
        Q3: Why legacy? → Self-education should be the new norm
        Q4: Why new norm? → ...
        Q5: SHIFT → "I never want to go backwards" (childhood poverty)
        Q6: → "I want my kids to have choices"
        Q7: → "I need to be in control of my decisions"

      USE: Do monthly for first year. Do with partner/family.
    speaker: Dean Graziosi (learned from Joe Stump)
    source_file: transcription_mp4_01-Step_1_-_Craft_Your_Unstoppable_Future.md


# =============================================================================
# L4 — FRAMEWORKS (Structured processes, step-by-step)
# =============================================================================
L4_FRAMEWORKS:

  - id: FW-TR-001
    name: "Hook, Story, Close (HSC) Framework"
    steps:
      - "HOOK: First sentence/subject line that STOPS people — enters conversations in their head, solves a problem, or shares a goal. Obsess on the hook more than anything else."
      - "STORY: Scene from your life that sets up the opportunity. Share your journey, epiphany, hero's journey. Include: overcome objections in advance, share success stories, let them feel understood."
      - "CLOSE: Call to action. Ask them directly. Remember: outcomes not features. Include guarantee, ethical urgency, and one powerful bonus."
    context: "Foundational framework for ALL marketing — posts, emails, sales pages, webinars, videos, podcasts. Works from 1-minute Instagram reels to 7-day launches."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: FW-TR-002
    name: "Story, Teach, Tool (STT) Framework"
    steps:
      - "STORY: Tell a scene from your life (not your whole life) that sets up the teaching point. Make it relatable, intriguing, vulnerable."
      - "TEACH: Share 2-5 teaching points/lessons you learned. The permission to teach comes from the story."
      - "TOOL: Give them an exercise, worksheet, or action step to anchor the learning. This is what makes knowledge stick."
    context: "The framework for DELIVERING content — each module/lesson/coaching session follows this pattern. Story = permission + engagement, Teach = knowledge transfer, Tool = application + results."
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Story__Teach__Tool__The_Ultimate_Framework.md

  - id: FW-TR-003
    name: "The 4S Copywriting Framework"
    steps:
      - "STOP: Subject line or headline that grabs attention in crowded inbox/feed"
      - "SHOCK: First 1-3 sentences that create emotional/psychological jolt — move toward pleasure or away from pain"
      - "STORY: Bulk of content — identify pain, show desires, demonstrate solution through narrative"
      - "SELL: Call to action with urgency, scarcity, benefits (not features), one specific action"
    context: "Universal framework for emails, social posts, ads, sales pages, videos"
    speaker: Charlie (MBS copywriter)
    source_file: transcription_mp4_06-_Crafting_Compelling_Copy.md

  - id: FW-TR-004
    name: "7-Step Jumpstart Framework"
    steps:
      - "Step 1: Craft your unstoppable future (compelling future + 7 levels deep WHY)"
      - "Step 2: Extract what you'll share (career skill, life experience, or passionate reporter)"
      - "Step 3: Identify your ideal client (niche within a niche, the Room Test)"
      - "Step 4: Create your lead magnet (checklist, resource guide, or myth-busting report)"
      - "Step 5: Build your opt-in page (landing page for email collection)"
      - "Step 6: Develop your email strategy (automated delivery + nurture)"
      - "Step 7: Choose your delivery system (course, coaching, or mastermind)"
      - "BONUS Step 8: Celebrate + create solution statement"
    context: "The complete jumpstart process to go from zero to ready-to-build in 7-10 days"
    speaker: Dean Graziosi
    source_file: transcription_mp4_01-Welcome.md through 14-BONUS_Step_8_-_Celebrate.md

  - id: FW-TR-005
    name: "Irresistible Product Framework (7 Questions)"
    steps:
      - "Q1: Who is your ideal client? (narrow the niche)"
      - "Q2: What results have you had or helped others achieve? (social proof)"
      - "Q3: What is the ultimate goal/outcome of the product? (not promise of what they get, promise of OUTPUT)"
      - "Q4: What are 6 topics/modules to achieve that outcome? (teaching points)"
      - "Q5: What format will you deliver it? (course, coaching, mastermind, workshop)"
      - "Q6: What would you name the product?"
      - "Q7: What would you charge? (your first thought is probably too cheap)"
    context: "This framework becomes the foundation for everything — marketing, sales, definitions, order page, sales page."
    speaker: Dean Graziosi
    source_file: transcription_mp4_01-Designing_Your_Irresistible_Product_Framework.md

  - id: FW-TR-006
    name: "The Value Ladder"
    steps:
      - "Level 0 (FREE): Lead magnet, podcast, social content — attracts people"
      - "Level 1 (LOW): Book ($20-30) — proves your expertise"
      - "Level 2 (MID): Course ($500-$2K) — do it yourself"
      - "Level 3 (HIGH): Coaching ($5K-$10K) — do it together"
      - "Level 4 (PREMIUM): Mastermind ($25K-$100K) — collective wisdom + immersion"
      - "Level 5 (ELITE): All-access/inner circle — custom pricing"
    context: "Each level naturally leads to 'What's next?' The profits from lower levels fund marketing for higher levels."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: FW-TR-007
    name: "Solution Statement Formula"
    steps:
      - "I am a [course creator / coach / mastermind facilitator]"
      - "who helps [ideal client description]"
      - "[achieve specific outcome]"
      - "without [common pain point / objection]"
    examples:
      - "I'm a coach who helps new CPAs establish their own profitable agency without getting stuck in red tape"
      - "I am a course creator who teaches moms of preschoolers how to be an entrepreneur and a mom without stress"
    speaker: Dean Graziosi
    source_file: transcription_mp4_14-BONUS_Step_8_-_Celebrate.md

  - id: FW-TR-008
    name: "The Passionate Reporter Method"
    steps:
      - "Step 1: Use AI to identify experts in your topic area"
      - "Step 2: Find contact information (Google, LinkedIn)"
      - "Step 3: Draft outreach email offering value exchange (exposure + social media promotion)"
      - "Step 4: Prepare 15 interview questions (ask top 3-5 to all, vary the rest)"
      - "Step 5: Conduct Zoom interviews"
      - "Step 6: Transcribe with Otter.ai"
      - "Step 7: Upload transcripts to AI for content extraction and course structuring"
    context: "How Tony Robbins started — reporting Jim Rohn's wisdom. How to build expertise through research."
    speaker: Mike Place
    source_file: transcription_mp4_02-Amplifying_Your_Knowledge__Step-by-Step.md

  - id: FW-TR-009
    name: "Tony's Success Formula"
    steps:
      - "Step 1: Get clear on MISSION/WHY (not just money)"
      - "Step 2: MASSIVE ACTION — keep changing approach until it works"
      - "Step 3: MODEL what works (this whole course is modeling)"
      - "Step 4: GRACE — acknowledge guidance beyond your own efforts"
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: FW-TR-010
    name: "Copy Audit Checklist (8 points)"
    steps:
      - "1. Read it out loud — does it sound like me or a robot?"
      - "2. Have I used motivating/inspiring words that create emotion?"
      - "3. Am I concise but specific (not vague, not too long)?"
      - "4. Did I write this to ONE person, not a crowd?"
      - "5. Will it blend in or stick out?"
      - "6. Would my ideal client be compelled by this?"
      - "7. Did I use any cliches? (replace with unexpected)"
      - "8. Is my CTA clear and specific?"
    speaker: Charlie
    source_file: transcription_mp4_06-_Crafting_Compelling_Copy.md

  - id: FW-TR-011
    name: "The Close Elements"
    steps:
      - "Outcomes not features (it's cold in the car, not freon through aluminum tubes)"
      - "Money-back or results guarantee"
      - "Ethical urgency (real deadlines, not fake ones)"
      - "Powerful bonus that is almost as valuable as the main offer"
      - "Ask directly — don't hint, don't be shy"
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: FW-TR-012
    name: "Three Delivery Paths"
    steps:
      - "COURSE CREATOR: Pre-recorded video, workbooks, self-paced. Best if you can clearly communicate in writing/video and deeply understand client challenges."
      - "COACH: 1-on-1 or small group, goals + action plans + accountability. Best if you're a strong communicator, active listener, emotionally intelligent."
      - "MASTERMIND FACILITATOR: 6-12 people, collective problem solving. Best if you're a strong public speaker, flexible, love group dynamics."
    speaker: MBS Course
    source_file: transcription_mp4_11-What_Is_a_Course_Creator.md, 12, 13

  - id: FW-TR-013
    name: "Lead Magnet Types"
    steps:
      - "Type 1: RESOURCE GUIDE — top 10 lists, curated recommendations"
      - "Type 2: CHECKLIST — step-by-step action list for specific outcome"
      - "Type 3: SHORT REPORT — myth-busting (3 biggest myths about X)"
    context: "Must be quick to consume, valuable, and include a CTA"
    speaker: Dean Graziosi / Lane
    source_file: transcription_mp4_04-Step_4_-_Create_Your_Lead_Magnet.md

  - id: FW-TR-014
    name: "Email Automation Flow"
    steps:
      - "Visitor lands on opt-in page"
      - "Enters email + name"
      - "Confirmation page + immediate access to lead magnet"
      - "Automated email delivers lead magnet + welcome"
      - "Tag added to contact record"
      - "Notification sent to you"
    speaker: Ali (MBS team)
    source_file: transcription_mp4_09-Step_6_-_Develop_Your_Email_Strategy.md

  - id: FW-TR-015
    name: "Compelling Future Exercise"
    steps:
      - "1. WHERE ARE YOU NOW? Be honest about starting point"
      - "2. WHERE DO YOU WANT TO GO? Pretend it's 1 year from now, best year ever — what happened?"
      - "3. ATTACH YOUR HEART: Do 7 Levels Deep exercise to find emotional core"
      - "4. THE HOW: Use this course as the vehicle"
    speaker: Dean Graziosi
    source_file: transcription_mp4_01-Step_1_-_Craft_Your_Unstoppable_Future.md

  - id: FW-TR-016
    name: "Module Layout Structure"
    steps:
      - "OUTCOME/MODULE TITLE: The main topic (e.g., Understanding Nutrients)"
      - "STORY: Scene that sets up why this matters"
      - "TEACHING POINT 1: Specific sub-topic (with optional micro-story)"
      - "TEACHING POINT 2: Next sub-topic"
      - "TEACHING POINT 3-5: Additional sub-topics"
      - "TOOL/EXERCISE: Homework that anchors the learning"
    context: "Can use one story for all teaching points OR micro-stories for each. This is how each section of a course/coaching/mastermind is structured."
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Story__Teach__Tool__The_Ultimate_Framework.md

  - id: FW-TR-017
    name: "Success Cycle Reversal Process"
    steps:
      - "1. Recognize you're in a downward spiral (low certainty → low action → poor results)"
      - "2. Don't try to 'take more action' with uncertainty"
      - "3. Create certainty FIRST through vivid mental rehearsal of results"
      - "4. With certainty restored, tap more potential → take massive action → get better results"
      - "5. Better results increase certainty → upward spiral begins"
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: FW-TR-018
    name: "4 Types of Emails"
    steps:
      - "1. ENTERTAIN: Captivating content that builds connection"
      - "2. EDUCATE: Share knowledge and demonstrate expertise"
      - "3. SHOWCASE: Build authority with social proof and results"
      - "4. INVITE: Direct offer/CTA emails"
    speaker: MBS Course (Email Basics section)
    source_file: "04-Step 4/02-Marketing Basics/02-Email Basics/"

  - id: FW-TR-019
    name: "Urgency + Scarcity Formula"
    steps:
      - "SCARCITY: Limited quantity (only 50 tickets left)"
      - "URGENCY: Time limit (this offer closes at midnight)"
      - "ETHICAL: Must be real — don't fake deadlines"
      - "ALTERNATIVE URGENCY: If not this, then when? If not us, then who?"
    speaker: Dean Graziosi + Charlie
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md + transcription_mp4_06-_Crafting_Compelling_Copy.md

  - id: FW-TR-020
    name: "Air Conditioning Analogy for Selling Outcomes"
    steps:
      - "WRONG: Explain the pump, generator, freon, aluminum tubes, fins, fan (features)"
      - "RIGHT: When it's hot outside and you hit this button, it's cold in the car (outcome)"
    context: "People just want to know the result, not the mechanism"
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md


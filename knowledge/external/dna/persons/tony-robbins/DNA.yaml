# =============================================================================
# L2 — MENTAL MODELS (Thinking frameworks, decision lenses)
# =============================================================================
L2_MENTAL_MODELS:

  - id: MM-TR-001
    name: "Success Cycle (Potential → Action → Results → Certainty)"
    description: "Four-quadrant cycle: Potential → Action → Results → Certainty/Belief → back to Potential. When certainty is low, you tap little potential, take little action, get poor results, which further lowers certainty (downward spiral). Break the cycle by creating certainty FIRST through visualization/mental rehearsal."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MM-TR-002
    name: "The Compelling Future Model"
    description: "All change starts with: 1) Being honest about WHERE YOU ARE, 2) Defining WHERE YOU WANT TO GO (compelling future, not what you want to avoid), 3) Attaching your HEART/WHY to it. Without a compelling future, people just avoid potholes without a destination."
    speaker: Dean Graziosi
    source_file: transcription_mp4_01-Step_1_-_Craft_Your_Unstoppable_Future.md

  - id: MM-TR-003
    name: "Seven Levels Deep"
    description: "Ask WHY 7 times, each time using the previous answer as the subject. Goes from HEAD to HEART by level 5-6. Reveals true emotional drivers. Taught to Dean by Joe Stump. The shift from intellectual reasons to emotional core usually happens around question 5."
    speaker: Dean Graziosi (learned from Joe Stump)
    source_file: transcription_mp4_01-Step_1_-_Craft_Your_Unstoppable_Future.md

  - id: MM-TR-004
    name: "Value Ladder (Client Path)"
    description: "Ascending offers where each level delivers more value at higher price. Bottom: Free (lead magnet/podcast) → Book ($20) → Course ($1K) → Coaching ($10K) → Mastermind ($25K+) → All-Access ($100K). Customer naturally asks 'What's next?' after each level. 10% typically ascend to next tier."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: MM-TR-005
    name: "Three Pillars of Mastery"
    description: "1) IMMERSION — go deep, be all in. 2) REPETITION — practice consistently or skill decays. 3) MODELING PROVEN PRACTICES — follow what works."
    speaker: Tony Robbins & Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: MM-TR-006
    name: "Reticular Activating System (RAS)"
    description: "Part of the brain that determines what you notice. When you decide on a mission/obsession, your RAS starts filtering the world to show you relevant opportunities. Like buying a car and suddenly seeing it everywhere."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MM-TR-007
    name: "Momentum as the Master Tool"
    description: "The single tool Tony has come back to again and again in 42 years. The difference between sustained success and someone who dribbles away. Momentum is built through certainty, which is built through mental rehearsal of results."
    speaker: Tony Robbins
    source_file: transcription_mp4_01-Step_1_-_Craft_Your_Unstoppable_Future.md

  - id: MM-TR-008
    name: "Knowledge Asset Sources (3 Types)"
    description: "Your business comes from one of three sources: 1) CAREER SKILL (professional expertise), 2) LIFE EXPERIENCE (personal transformation), 3) PASSIONATE REPORTER (researching and synthesizing others' expertise). Tony started as a reporter of Jim Rohn."
    speaker: Dean Graziosi
    source_file: transcription_mp4_01-Designing_Your_Irresistible_Product_Framework.md

  - id: MM-TR-009
    name: "The Red Shirt in a Sea of Black"
    description: "Standing out model — your content/message must be like the only red shirt among black ones, or the colored golf ball among white ones. People grab the one that's different."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: MM-TR-010
    name: "Three Levels of Mastery"
    description: "Level 1: COGNITIVE UNDERSTANDING (intellectual grasp). Level 2: EMOTIONAL MASTERY (enough emotion to move and do it). Level 3: PHYSICAL MASTERY (in your body, automatic, like tying shoes). Most people stop at Level 1."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MM-TR-011
    name: "Do It Yourself → Do It Together → Done For You"
    description: "Course = do it yourself. Coaching = do it together. Mastermind = collective wisdom. Each level offers more hand-holding and accountability at higher price."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: MM-TR-012
    name: "The Room Test"
    description: "Imagine a room of 20 people. Which group would you RUN into the room to serve? That's your ideal client. If you wouldn't run in, wrong people in the room."
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Step_3_-_Identify_Your_Ideal_Client.md

  - id: MM-TR-013
    name: "Arms Crossed → Arms Open"
    description: "People scrolling are metaphorically arms-crossed. Your hook must STOP them and get arms uncrossed. Story gets them engaged. Close gets them to act."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: MM-TR-014
    name: "Specialist vs Generalist"
    description: "Would you want a general practitioner or a specialist for life-saving surgery? Specialized knowledge commands premium pricing. The more specialized, the more you can charge."
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Step_3_-_Identify_Your_Ideal_Client.md

  - id: MM-TR-015
    name: "Tony's 3 Keys to Achievement"
    description: "1) FOCUS — know precisely what you want (not what you don't). 2) MASSIVE ACTION — take action and keep changing approach if it doesn't work. 3) GRACE — acknowledge and attract the guidance/luck that comes."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MM-TR-016
    name: "Kaizen Progression"
    description: "How to run a 1000-mile race? One step at a time. How to eat an elephant? One bite at a time. Progress over perfection. Culture of progress."
    speaker: Dean Graziosi
    source_file: transcription_mp4_04-Step_4_-_Create_Your_Lead_Magnet.md

  - id: MM-TR-017
    name: "The Morning Routine Habit Model"
    description: "Wake up → Think of something grateful → One win from yesterday → One win for today → Think of someone you love → Feed body (green drink) → Move (exercise). Sets up day for OFFENSE not defense."
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Story__Teach__Tool__The_Ultimate_Framework.md

  - id: MM-TR-018
    name: "Wagon Wheel Marketing"
    description: "Multiple spokes of client acquisition — each spoke is a different marketing channel. Referenced in context of expanding revenue sources."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: MM-TR-019
    name: "Future Pacing"
    description: "Show someone what's possible in their future. Pretend it's a year from now and it's been the greatest year. Look BACK, don't look forward anxiously."
    speaker: Dean Graziosi
    source_file: transcription_mp4_01-Step_1_-_Craft_Your_Unstoppable_Future.md

  - id: MM-TR-020
    name: "Upward vs Downward Spiral"
    description: "Most people are on different spirals in different life areas simultaneously — upward in health but downward in finances. You can change any spiral by changing certainty first."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MM-TR-021
    name: "Niche Within a Niche"
    description: "Don't just pick an audience, narrow it further. Not 'women who want to lose weight' but 'women 35-50 with kids and a job who want to lose weight with yoga and meditation.' The magic is in the middle — not too narrow, not too broad."
    speaker: Dean Graziosi
    source_file: transcription_mp4_03-Step_3_-_Identify_Your_Ideal_Client.md

  - id: MM-TR-022
    name: "Pain-Pleasure Motivational Duality"
    description: "If you link enough PLEASURE to mastering and enough PAIN to not mastering, you'll follow through. This is how you move from cognitive to emotional to physical mastery."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md

  - id: MM-TR-023
    name: "Reciprocity as Lead Generation"
    description: "Lead magnets are really 'value in advance' — give immense value for free, and reciprocity naturally drives people to engage further."
    speaker: Dean Graziosi
    source_file: transcription_mp4_04-Step_4_-_Create_Your_Lead_Magnet.md

  - id: MM-TR-024
    name: "Enter Conversations Already in Their Head"
    description: "The hook must meet people where they are — solve a problem they're facing, share a way to achieve a goal they want. You must finish a sentence that's already in their mind."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: MM-TR-025
    name: "First Sale → Next Sale → Consistent Sales → Scale"
    description: "Business growth progression. Don't try to scale before proving the first sale. Each stage requires different skills."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-The_Big_Picture__Building_Your_Value_Ladder.md

  - id: MM-TR-026
    name: "The Larry King Lesson"
    description: "Changed only the HOOK (first sentence) of an infomercial — from talking about Dean (no one cares) to talking about the VIEWER's pain. Same show, same offer, same price. Result: massive hit. The hook is everything."
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: MM-TR-027
    name: "Overcome Objections Inside Your Story"
    description: "Instead of addressing objections after the pitch, weave objection-busting INTO the story. 'I know you might think X... I felt the same way until...'"
    speaker: Dean Graziosi
    source_file: transcription_mp4_02-Hook__Story__Close__The_Foundational_Framework.md

  - id: MM-TR-028
    name: "Trying = Uncertainty"
    description: "When people say 'I tried that, it didn't work' — trying means uncertain. With uncertainty you tap little potential, take little action, get poor results. The cure is certainty first, not more action."
    speaker: Tony Robbins
    source_file: transcription_mp4_05-Success_Mindset_Framework.md



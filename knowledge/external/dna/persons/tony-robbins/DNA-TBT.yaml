L1_PHILOSOPHIES:
  - id: PHI-TR-TBT-001
    quote: "Progress equals happiness. Even if you're not where you want to be yet, if you're on the road, if you're improving, if you're making progress, you're going to love it."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-002
    quote: "It doesn't matter how successful you are, if you stop growing, you start dying inside."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-003
    quote: "Two things in life make you feel alive: growing and giving."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-004
    quote: "The secret to living is giving."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-005
    quote: "The quality of your life is the quality of your relationships."
    source: "Notes_-_Week_6.md"
  - id: PHI-TR-TBT-006
    quote: "Life doesn't happen to you, it happens for you."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-007
    quote: "Suffering doesn't come from facts, it comes from the meaning you give it."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-008
    quote: "See it as it is, but not worse than it is."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-009
    quote: "Your worth is not tied to what you do. But it is tied to being the man in your family and taking care of them."
    source: "MU1-Module-1-Breakthrough_Hawkins.md"
  - id: PHI-TR-TBT-010
    quote: "We get so caught up in the story that it takes over our bodies, our minds and our emotions."
    source: "MU1-Module-1-Breakthrough_Hawkins.md"
  - id: PHI-TR-TBT-011
    quote: "Having resentment in your soul is like drinking poison and hoping your enemy will die."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-012
    quote: "Sometimes failing to get your goal gives you your destiny."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-013
    quote: "It's not about the game. It's about who you become."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-014
    quote: "You can be a warning or an example. You are an archetype."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-015
    quote: "Emotion is the invisible force. It is the force that changes people."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-016
    quote: "80% of changing a business is changing the emotions of those leaders."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-017
    quote: "All real change - somebody can have the right strategy and still not do it. The only reason is the emotional content."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-018
    quote: "Meaning creates emotion. Emotion creates the quality of life."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-019
    quote: "The fastest way to transform your life is trade your expectations for appreciation."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-020
    quote: "It's not what you get, it's who you become and how you live."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-021
    quote: "A breakthrough is when the impossible becomes possible."
    source: "Notes_-_Week_6.md"
  - id: PHI-TR-TBT-022
    quote: "How you deal with stress determines the quality of your life."
    source: "Notes_-_Week_6.md"
  - id: PHI-TR-TBT-023
    quote: "Positive thinking does not work long term. Telling a person to change negatives to positives makes them feel more misunderstood."
    source: "SISolutionsAnxiety.md"
  - id: PHI-TR-TBT-024
    quote: "Love and compassion are the antidote for anxiety and stress."
    source: "SISolutionsAnxiety.md"
  - id: PHI-TR-TBT-025
    quote: "Instead of trying to tell somebody, give them an experience and then it's true for them."
    source: "BREAKTHROUGH_EP1_Title1_1.md"
  - id: PHI-TR-TBT-026
    quote: "All a breakthrough is, is a moment when the veil disappears and you take back control of your life."
    source: "BREAKTHROUGH_EP1_Title1_1.md"
  - id: PHI-TR-TBT-027
    quote: "Physical stress and emotional stress are experienced in the same way by the body."
    source: "Notes_-_Week_6.md"
  - id: PHI-TR-TBT-028
    quote: "Fears everyone experiences: 1) We aren't enough. 2) If I'm not enough, I won't be loved."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-029
    quote: "Growth equals shift in standards. Standards are what we demand of ourselves."
    source: "Notes_-_Week_5.md"
  - id: PHI-TR-TBT-030
    quote: "Living in blame is a cheap way to meet needs. Truth and responsibility set you free."
    source: "Notes_-_Week_5.md"
  - id: PHI-TR-TBT-031
    quote: "You can only believe something that you don't question."
    source: "Notes_-_Week_6.md"
  - id: PHI-TR-TBT-032
    quote: "Pleasures are in the body. Happiness is in the mind. Joy is in the spirit."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-033
    quote: "A person who can worry deeply can also love deeply. The darker the fear the brighter the hope."
    source: "SISolutionsAnxiety.md"
  - id: PHI-TR-TBT-034
    quote: "One of the most powerful ways to make a difference to yourself is to make a difference to others."
    source: "TBT_Orientation_Week_1.md"
  - id: PHI-TR-TBT-035
    quote: "Where life puts us, there is winter for everyone."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-036
    quote: "The only lasting happiness comes from growth and contribution - the spiritual needs regardless of religion."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-037
    quote: "Strategies can compress decades into days."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-038
    quote: "Sympathy feels ok for a while then it feels disgusting."
    source: "Notes_-_Week_2.md"
  - id: PHI-TR-TBT-039
    quote: "The real challenges that choke hold business growth are the psychology and skill sets of the leader."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-040
    quote: "Anytime you conform to rules someone else came up with, you bump up against limitations."
    source: "Tony_Interview_Replay.md"
  - id: PHI-TR-TBT-041
    quote: "When you're angry, you feel strong for the moment, even though it's fake strength."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: PHI-TR-TBT-042
    quote: "After you break through the worst, there's a psychological immunity - I'm ready for whatever life gives me."
    source: "MU1-Module-2-TonysChallenge.md"

# ============================================================================
# L2 - MENTAL MODELS (32 elements)
# ============================================================================
L2_MENTAL_MODELS:
  - id: MM-TR-TBT-001
    name: "The Blueprint Model"
    description: "Happy = Life Conditions match Blueprint. Unhappy = gap. Suffering = gap + helplessness. Change life, change blueprint, or both."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: MM-TR-TBT-002
    name: "Three Choices When Suffering"
    description: "1) Blame (doesn't work). 2) Change life. 3) Change blueprint. Usually both 2 and 3."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: MM-TR-TBT-003
    name: "Six Human Needs"
    description: "1) Certainty 2) Variety 3) Love/Connection 4) Significance 5) Growth 6) Contribution. 1-4 personality; 5-6 spiritual."
    source: "Six_Human_Needs.md"
  - id: MM-TR-TBT-004
    name: "Surface vs Deep Problem"
    description: "Every problem has surface symptom and deeper unmet need. Coach must dig beneath."
    source: "Notes_-_Week_6.md"
  - id: MM-TR-TBT-005
    name: "The Holdback (Bottleneck)"
    description: "Any complex system has ONE thing holding it back. Fix that ONE thing first."
    source: "TBT_Orientation_Week_1.md"
  - id: MM-TR-TBT-006
    name: "Mode of Being"
    description: "Preferred way of engaging: Team Player, Leader, Observer, Creative, Critic, Learner, Philosopher, Romantic."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-007
    name: "Post-Traumatic Growth"
    description: "Push through trauma: 1) Realize true strength 2) Deepen relationships 3) Build psychological immunity."
    source: "MU1-Module-2-TonysChallenge.md"
  - id: MM-TR-TBT-008
    name: "Triad of State Change"
    description: "Change state via: 1) Physiology 2) Focus 3) Language/Meaning."
    source: "Tony_Interview_Replay.md"
  - id: MM-TR-TBT-009
    name: "Shock and Learned Helplessness"
    description: "In shock: wait for reset, focus on past, shut down. Where still operational = what holding out for."
    source: "TBT_Week_1_Teleclass.md"
  - id: MM-TR-TBT-010
    name: "Four Theories of Happiness"
    description: "1) Rock Star (get all, doesn't last) 2) Lower Expectations 3) Flow State 4) Growth + Contribution (only lasting)."
    source: "Tony_Interview_Replay.md"
  - id: MM-TR-TBT-011
    name: "Flow Test for Love"
    description: "3 tests: 1) Time disappears 2) You disappear 3) You need nothing else."
    source: "Tony_Interview_Replay.md"
  - id: MM-TR-TBT-012
    name: "Addiction to a Problem"
    description: "Problems meet needs. How does it meet Variety, Certainty, Significance, Love, Growth?"
    source: "Notes_-_Week_5.md"
  - id: MM-TR-TBT-013
    name: "Anxiety as Propeller vs Blocker"
    description: "Anxiety either drives action (Propeller) or immobilizes (Blocker)."
    source: "SISolutionsAnxiety.md"
  - id: MM-TR-TBT-014
    name: "Key Decisions Model"
    description: "Broad decisions that shape entire life. Finding and examining them unlocks change."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-015
    name: "Life Stages Framework"
    description: "All coaching occurs within a life stage. Each has 1-3 key priorities."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-016
    name: "The Farmer and the Maybe"
    description: "Parable: events alternate good/bad, farmer always says 'Maybe.' We cannot judge in the moment."
    source: "Notes_-_Week_2.md"
  - id: MM-TR-TBT-017
    name: "Blame Triangle"
    description: "When helpless, blame: 1) Past 2) Absent people 3) World/systems. All external."
    source: "Notes_-_Week_5.md"
  - id: MM-TR-TBT-018
    name: "Focus Imbalance"
    description: "Focus on others' problems, experience only own feelings. Fix: remember what YOU did and said."
    source: "Notes_-_Week_5.md"
  - id: MM-TR-TBT-019
    name: "Relationship Stress Triggers"
    description: "4 triggers: Rules, Expectations, Judgments, Shoulds."
    source: "Notes_-_Week_6.md"
  - id: MM-TR-TBT-020
    name: "CULPRITS (Anxiety Assessment)"
    description: "Coping, Usefulness, Longevity, Precedes, Ritual, Intensity, Timing, Strategies."
    source: "SISolutionsAnxiety.md"
  - id: MM-TR-TBT-021
    name: "Anxiety Personality"
    description: "Internal/external refs, relationship/self-focused, guilt(in)/blame(out), past/future oriented."
    source: "SISolutionsAnxiety.md"
  - id: MM-TR-TBT-022
    name: "Anxiety Loop vs Healthy Cycle"
    description: "Loop: pain > memory > replay > stress > label. Healthy: break > compassion > humor > practice > control."
    source: "SISolutionsAnxiety.md"
  - id: MM-TR-TBT-023
    name: "Secondary Gain"
    description: "Problems have hidden benefits. Who rescues? Who's hurt? Child involved? Guilt?"
    source: "SISolutionsAnxiety.md"
  - id: MM-TR-TBT-024
    name: "Leaving Home Priorities"
    description: "3 priorities: 1) Life skills 2) Social life 3) Learning direction."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-025
    name: "Identity Dissociation"
    description: "Describe 'the guy in the chair' from outside. What does he get? What is he really? Contrast."
    source: "Notes_-_Week_2.md"
  - id: MM-TR-TBT-026
    name: "Elevation Strategy"
    description: "Find strength in everything client reveals. Build positive intent, identity, history, possibilities."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-027
    name: "Bright Spot Strategy"
    description: "Find when needs were met more fully. Understand what made it work."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-028
    name: "Finding the Spark"
    description: "Every client has resources. Look for enthusiasm, desire, humor, passion, anger."
    source: "Notes_-_Week_4.md"
  - id: MM-TR-TBT-029
    name: "The Muscle Metaphor"
    description: "Muscle comes from doing hard things. You keep physical muscle but give up faith/work muscle. Why?"
    source: "Notes_-_Week_2.md"
  - id: MM-TR-TBT-030
    name: "Karikari Principle"
    description: "What's mine is yours, yours is mine. Everyone pulls weight. Family as team."
    source: "MU1-Module-1-Breakthrough_Hawkins.md"
  - id: MM-TR-TBT-031
    name: "Breakthroughs Look Like"
    description: "An insight. Tired of being tired. Change state, take action, or assign new meaning."
    source: "Notes_-_Week_6.md"
  - id: MM-TR-TBT-032
    name: "Rejection as Drug"
    description: "Using rejection as excuse. Meets certainty and significance through victim identity."
    source: "Notes_-_Week_5.md"


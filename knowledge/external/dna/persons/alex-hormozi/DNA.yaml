        domains: ["upsells", "money-models"]
      - id: "FIL-AH-ACQ-012"
        title: "Every Offer Opens Door to Upsell"
        statement: "When an offer solves a problem, another appears. Upsell the solution to the problem your first offer reveals."
        weight: 0.90

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 5: METHODOLOGIES (5 items)
  # ═══════════════════════════════════════════════════════════════════════════

  L5_METHODOLOGIES:
    count: 5
    items:
      - id: "MET-AH-001"
        title: "Processo Outbound Completo (BDR → SDS → BC)"
        objective: "Gerar vendas de forma previsível através de cold calling."
        weight: 0.95
        domains: ["outbound", "sales-process", "scaling"]
        insight_id: "SS001, SS002, SS003"
        prerequisites:
          - "Ticket mínimo de $15k"
          - "LTV que justifique CAC de ~$500"
          - "Lista de prospects qualificados"
          - "PhoneBurner ou similar com wrap de área code local"
        steps:
          - step: 1
            name: "Scrape e Enriquecimento de Lista"
            description: "VAs nas Filipinas scrapeiam Google e enriquecem dados."
            success_criteria: "Lista com contatos verificados"
            pitfalls: ["Listas desatualizadas", "Não verificar números"]
          - step: 2
            name: "BDR Cold Calling"
            description: "100 calls/dia em blocos de 4h. Objetivo: 2 shows por dia."
            success_criteria: "20 pickups de 100 dials, 2 shows"
            pitfalls: ["Não usar local area code wrap", "Blocos de 8h"]
          - step: 3
            name: "SDS Value Delivery"
            description: "Call de 45min: 30min valor + 15min transição."
            success_criteria: "Prospect diz 'esses caras sabem do que falam'"
            pitfalls: ["SDS não é domain expert", "Não deixar 15min transição"]
          - step: 4
            name: "Warm Transfer ao Closer"
            description: "Speakerphone scriptado + Zoom face-to-face intro."
            success_criteria: "Closer e prospect se conhecem face-to-face"
            pitfalls: ["Só texto/email = não funciona"]
          - step: 5
            name: "BC Closing Call"
            description: "CLOSER Framework. Fechar ou qualificar out."
            success_criteria: "10% close rate de shows"
            pitfalls: ["Não deixar claro que é call de vendas"]
        duration: "12-14 meses para maturar"
        common_errors:
          - error: "Desistir antes de 12 meses"
            prevention: "Compromisso mínimo de 12 meses se há progresso no funil"
          - error: "Compensar BDRs por hora"
            prevention: "Compensar por show confirmado"
        evidence:
          - quote: "Understanding the organizational chart which creates the sale and the actual process of the sale is where we should start."
            chunk_id: "chunk_201"
            source_id: "AH-SS001"

      - id: "MET-AH-002"
        title: "Farm System de Desenvolvimento de Vendedores"
        objective: "Desenvolver closers internamente com 60% close rate (vs 25% externos)."
        weight: 0.95
        domains: ["hiring", "training", "career-path"]
        insight_id: "FS001, FS002, FS003"
        prerequisites:
          - "Volume suficiente para ter níveis (pelo menos 3 BDRs)"
          - "Commitment de 12+ meses"
          - "Métricas claras de progressão"
        steps:
          - step: 1
            name: "Contratar para Double A (BDR)"
            description: "Atrair com visão de $200k, não $40k. 4 níveis por role."
            pitfalls: ["Atrair pelo salário inicial", "Não mostrar career path"]
          - step: 2
            name: "Milestone-Based Progression"
            description: "Promoção por ABILITY (50→100→150 shows), não por tempo."
            pitfalls: ["Promoções automáticas por tempo", "Bumps grandes demais"]
          - step: 3
            name: "Promoção para Triple A (SDS)"
            description: "Senior BDR ganha ABILITY de ser promovido. Não automático."
            pitfalls: ["Promover quem não é domain expert"]
          - step: 4
            name: "Trial de 10 Deals no BC"
            description: "Fechar 10 deals como trial antes de virar BC permanente."
            pitfalls: ["Promover sem trial", "Dar inbound para novato"]
        duration: "9-12 meses de BDR para BC"
        common_errors:
          - error: "Contratar closer pronto de fora"
            prevention: "Desenvolver internamente pelo sistema"
          - error: "Poupar novatos de cold calling"
            prevention: "Deixar cut their teeth antes de dar inbound"
        evidence:
          - quote: "The human resource training system itself becomes an asset to the business... Our inbound closing percentage went from 20-25% to 60%."
            chunk_id: "chunk_213"
            source_id: "AH-SS001"

      - id: "MET-AH-003"
        title: "Warm Transfer Protocol (SDS → BC)"
        objective: "Garantir que leads qualificados apareçam para call de fechamento."
        weight: 0.90
        domains: ["sales-process", "scripts", "show-rates"]
        insight_id: "SD002"
        prerequisites:
          - "SDS e BC trabalhando simultaneamente"
          - "Script de transição pronto"
          - "Zoom ou similar"
        steps:
          - step: 1
            name: "Transition no Final do SDS"
            description: "Deixar 15min no final da call. 'Posso trocar de chapéu?'"
          - step: 2
            name: "Highlight Pain Points"
            description: "Apontar 2-3 coisas que se destacaram."
          - step: 3
            name: "Speakerphone Call com Closer"
            description: "Diálogo SCRIPTADO mas natural. Prospect ouve os dois lados."
          - step: 4
            name: "Face-to-Face Zoom Intro"
            description: "BC entra no Zoom por 5min. Faz intro pessoal."
        duration: "15-20min SDS + 5min BC"
        common_errors:
          - error: "Só mandar email/texto para agendar"
            prevention: "SEMPRE fazer face-to-face intro"
        evidence:
          - quote: "We could not get the SDS to show for the close calls... But if you do the face-to-face where they hop on the call then they're like 'yeah perfect'."
            chunk_id: "chunk_211"
            source_id: "AH-SS001"

      - id: "MET-AH-004"
        title: "HR Value Creation Process"
        objective: "HR que cria valor para a empresa ao invés de apenas processar papelada."
        weight: 0.85
        domains: ["hr-philosophy", "organizational-culture", "compensation"]
        insight_id: "HR001, HR002, HR003, HR004"
        steps:
          - step: 1
            name: "Proteger a Empresa"
            description: "Dizer NÃO a contratações desnecessárias."
          - step: 2
            name: "Recruit Best Talent"
            description: "Encontrar, desenvolver e reter os melhores."
          - step: 3
            name: "Monitorar Compensation vs Market"
            description: "Só aumentar se problema de ATRAÇÃO ou RETENÇÃO."
          - step: 4
            name: "Criar Cultura de Alta Performance"
            description: "Ambiente onde winners prosperam e low performers não duram."
        duration: "Ongoing"
        common_errors:
          - error: "HR focado em felicidade"
            prevention: "Foco em performance e resultados"
          - error: "Star employees não são retidos"
            prevention: "Pagar desproporcional (3-5x valor)"
        evidence:
          - quote: "Your job is NOT to make employees happy. HR's customer = THE COMPANY, not employees."
            chunk_id: "AH002_002"
            source_id: "AH-HR001"

      - id: "MET-AH-005"
        title: "7 Universal Closes"
        objective: "Arsenal de técnicas de fechamento para qualquer situação."
        weight: 0.95
        domains: ["closing", "sales-process", "objection-handling"]
        insight_id: "AH-CP001_005"
        prerequisites:
          - "Prospect qualificado (passou por discovery)"
          - "Convicção genuína no produto"
          - "Entendimento do bucket (YES/NO/MAYBE)"
        steps:
          - step: 1
            name: "The Assumptive Close"
            description: "Assumir que vai comprar e agir como se já tivesse decidido."
            example: "'Vamos começar com o premium ou o standard?'"
          - step: 2
            name: "The Takeaway Close"
            description: "Remover a oferta ou criar escassez genuína."
            example: "'Talvez esse programa não seja ideal pra você...'"
          - step: 3
            name: "The Question Close"
            description: "Fechar fazendo pergunta que leva ao sim."
            example: "'Se eu resolver [X], tem algo mais que te impediria?'"
          - step: 4
            name: "The Now or Never Close"
            description: "Criar urgência real baseada em custo de esperar."
            example: "'Cada mês sem isso, você perde [X] - vale esperar?'"
          - step: 5
            name: "The Summary Close"
            description: "Resumir benefícios acordados antes de pedir."
            example: "'Recapitulando: você quer [A], precisa de [B], isso resolve [C]. Certo?'"
          - step: 6
            name: "The Sharp Angle Close"
            description: "Concordar condicionalmente ao fechamento."
            example: "'Se eu conseguir [o que pediu], você fecha hoje?'"
          - step: 7
            name: "The Puppy Dog Close"
            description: "Oferecer trial sem risco."
            example: "'7 dias e se não funcionar, devolvemos tudo.'"
        duration: "Variar técnicas ao longo de call de 30-60min"
        common_errors:
          - error: "Usar sempre o mesmo close"
            prevention: "Ter repertório de 7 e variar"
          - error: "Technique > Conviction"
            prevention: "Closes só funcionam com convicção genuína"
        evidence:
          - quote: "7 Universal Closes: Assumptive, Takeaway, Question, Now or Never, Summary, Sharp Angle, Puppy Dog."
            chunk_id: "AH-CP001_005"
            source_id: "AH-CP001"


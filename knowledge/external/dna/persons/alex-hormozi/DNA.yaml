        weight: 0.90
        domains: ["sales", "content"]
      - id: "FIL-AH-ACQ-018"
        title: "Sales Is Transfer of Conviction"
        statement: "The salesperson must believe more than the prospect doubts."
        weight: 0.90
        domains: ["sales", "closing"]
      - id: "FIL-AH-ACQ-019"
        title: "Deprivation Is Key to Selling"
        statement: "Create a state where the prospect feels the gap. Without deprivation, there's no motivation to buy."
        weight: 0.95
        domains: ["sales", "psychology"]
      - id: "FIL-AH-ACQ-020"
        title: "Never Follow Up Too Often"
        statement: "You can never email too often or make content too long. Only too boring or not valuable."
        weight: 0.85
        domains: ["marketing", "follow-up"]
      - id: "FIL-AH-ACQ-021"
        title: "Consumption Drives Retention"
        statement: "If people don't consume the stuff, they cancel at a much faster rate."
        weight: 0.90
        domains: ["retention", "continuity"]
      - id: "FIL-AH-ACQ-022"
        title: "First Offer Doesn't Need Profit"
        statement: "Your first offer doesn't always have to make a profit. Profit comes from 2nd, 3rd, 4th offers."
        weight: 0.90
        domains: ["money-models", "offers"]
      - id: "FIL-AH-ACQ-023"
        title: "Give What They Want Now, Need Later"
        statement: "Give customers what they want now so you can give them what they need later."
        weight: 0.85
        domains: ["offers", "psychology"]
      - id: "FIL-AH-ACQ-024"
        title: "I'd Rather Redo Than Refund"
        statement: "Roll over credit toward the right offer instead of giving money back."
        weight: 0.85
        domains: ["retention", "offers"]
      - id: "FIL-AH-ACQ-025"
        title: "Discounting Is Not Evil, Stupid Discounting Is"

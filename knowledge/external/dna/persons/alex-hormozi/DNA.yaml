        weight: 0.85
        domains: ["pricing", "math"]
      - id: "FIL-AH-ACQ-026"
        title: "People Hide Behind Complexity"
        statement: "People hide behind complexity to justify procrastination. If it really is that simple, the only thing you're not doing is doing it."
        weight: 0.90
        domains: ["mindset", "execution"]
      - id: "FIL-AH-ACQ-027"
        title: "You Haven't Capped Your Market"
        statement: "Most businesses think they've maximized lead gen but have only explored one method, one platform, one medium."
        weight: 0.90
        domains: ["scaling", "lead-gen"]
      - id: "FIL-AH-ACQ-028"
        title: "Education at Core of Marketing"
        statement: "You help people shift their belief so they make a decision to buy. Best way to prove value is give value before they pay."
        weight: 0.85
        domains: ["marketing", "content"]
      - id: "FIL-AH-ACQ-029"
        title: "Ethical Upselling = Recommendations That Help Both"
        statement: "Bad salesmanship rooted in deception; good salesmanship rooted in education."
        weight: 0.85
        domains: ["sales", "ethics"]
      - id: "FIL-AH-ACQ-030"
        title: "Redo > Refund"
        statement: "I'd rather do a redo than a refund. Roll over credit toward the right offer."
        weight: 0.85
        domains: ["retention", "customer-success"]
      - id: "FIL-AH-ACQ-031"
        title: "You Design the Game"
        statement: "The customer thinks they're getting a deal; the offer architecture is intentional. You design the game, they just play it."
        weight: 0.90
        domains: ["offers", "psychology"]
      - id: "FIL-AH-ACQ-032"
        title: "No One Knows You Exist"
        statement: "8 billion people exist. Even people who recognize you don't know your offers. The market is vastly larger than anyone thinks."
        weight: 0.85
        domains: ["mindset", "scaling"]
      - id: "FIL-AH-ACQ-033"
        title: "Meta-Skill > Tactics"
        statement: "The ability to identify what to do next is more valuable than any single tactic."
        weight: 0.90
        domains: ["strategy", "mindset"]
      - id: "FIL-AH-ACQ-034"
        title: "Close Is a Process Not a Moment"
        statement: "Closing starts at the beginning of the conversation, not at the end."
        weight: 0.90
        domains: ["sales", "closing"]
      - id: "FIL-AH-ACQ-035"
        title: "Speed Game Innovation"
        statement: "Business models aren't patentable. Leaders make 80% of profits because by the time followers catch up, leaders have already innovated again."
        weight: 0.85
        domains: ["scaling", "innovation"]

  ACQ18K_L2_MENTAL_MODELS:
    count: 30
    source_id: "AH-ACQ18K"
    items:
      - id: "MM-AH-ACQ-001"
        title: "The Three Numbers (CAC, GP, PPD)"
        statement: "Low CAC + High GP + Short PPD = more money faster. These three triangulate acquisition."
        weight: 0.95
        domains: ["unit-economics", "money-models"]
      - id: "MM-AH-ACQ-002"
        title: "Three Levels of Advertising"
        statement: "Level 1: LTGP > CAC (basic). Level 2: 30-day GP > CAC (never use own money). Level 3: 30-day GP > 2x CAC (unlimited scale, compound)."
        weight: 0.95
        domains: ["advertising", "scaling"]
      - id: "MM-AH-ACQ-003"
        title: "The Penny Gap"
        statement: "Free vs $0.01 = 9x more people take free. The gap between free and any price is the biggest behavioral change lever."
        weight: 0.90
        domains: ["pricing", "psychology"]
      - id: "MM-AH-ACQ-004"
        title: "Hyperactive Buyer Mode"
        statement: "When someone makes new decision/identity (buys bike), they enter short hyper-buying window for everything related. If you don't offer, someone else will."
        weight: 0.90
        domains: ["upsells", "psychology"]
      - id: "MM-AH-ACQ-005"
        title: "Steak Stomach vs Dessert Stomach"
        statement: "After solving one problem (steak), customer doesn't want more of same but may want adjacent (dessert). Create new deprivation to sell next offer."
        weight: 0.90
        domains: ["upsells", "offers"]
      - id: "MM-AH-ACQ-006"
        title: "Money Model = Series of Offers"
        statement: "One offer is a unit. A money model is deliberately sequencing multiple offers to maximize GP in 30 days."
        weight: 0.95
        domains: ["money-models"]
      - id: "MM-AH-ACQ-007"
        title: "The Rental Car Model"
        statement: "$19/day became $400 through invented fees/policies. Car upgrade, insurance (minimum naming), prepaid gas, late fees. Game maker designs the architecture."
        weight: 0.90
        domains: ["money-models", "upsells"]
      - id: "MM-AH-ACQ-008"
        title: "CAC Is Tight, GP Is Wide"
        statement: "Between competitors CAC ranges are surprisingly tight. The massive difference is how much they make per customer. That is the arms race."
        weight: 0.95
        domains: ["unit-economics", "competition"]
      - id: "MM-AH-ACQ-009"
        title: "Create Flow Then Monetize Then Add Friction"
        statement: "Start with biggest magnet for maximum flow, then monetize, then add filters/friction to optimize quality."
        weight: 0.90
        domains: ["lead-gen", "offers"]
      - id: "MM-AH-ACQ-010"
        title: "Burger-Fries-Soda Model"
        statement: "$2 burger with $1.75 cost = $0.25 profit. Add fries+soda+supersize = $1.75 profit = 8x GP per sale."
        weight: 0.90
        domains: ["upsells", "money-models"]
      - id: "MM-AH-ACQ-011"
        title: "Price Anchoring / Recategorization"
        statement: "$16K suit makes $2.2K suit feel like nothing. Price isn't absolute, it's relative to last number considered. Rolls Royce shows at yacht shows."
        weight: 0.90
        domains: ["pricing", "upsells"]
      - id: "MM-AH-ACQ-012"
        title: "The Seesaw (Downsell)"
        statement: "More you put down now = less you pay over time. Less you put down = more you pay. Incentivizes bigger down payments."
        weight: 0.85
        domains: ["pricing", "downsells"]
      - id: "MM-AH-ACQ-013"
        title: "Continuity Math"
        statement: "$1K one-time to 100: 10 buy = $10K. $50/mo to 100: 40 buy, keep 20mo = $40K + 4x more customers to upsell."
        weight: 0.90
        domains: ["continuity", "money-models"]
      - id: "MM-AH-ACQ-014"
        title: "Leverage Shift in Free Trials"
        statement: "After they decline to pay and you offer free, leverage shifts to YOU. Now THEY must prove they deserve free service."
        weight: 0.85
        domains: ["downsells", "psychology"]
      - id: "MM-AH-ACQ-015"
        title: "The Believability Threshold"
        statement: "$500/month claims get more opt-ins than $5K/month because more people believe the lower number. Too good to be true kills response."
        weight: 0.85
        domains: ["marketing", "offers"]
      - id: "MM-AH-ACQ-016"
        title: "Bigger Plane Longer Runway"
        statement: "Price relative to buyer's power determines trust-building time needed. $20 product = 7-sec ad. $7K to $50M owner = 30-sec. $500+ consumer = phone sales."
        weight: 0.90
        domains: ["sales", "pricing"]
      - id: "MM-AH-ACQ-017"
        title: "Microwaving the Prospect"
        statement: "Compress trust-building that normally takes weeks/months into days/hours. In 2 days go from stranger to absolute trust."
        weight: 0.85
        domains: ["sales", "events"]
      - id: "MM-AH-ACQ-018"
        title: "Demand vs Supply Constraint"
        statement: "Every business is either demand-constrained (need more customers) or supply-constrained (can't serve more). This determines entire strategy."
        weight: 0.95
        domains: ["scaling", "diagnostics"]
      - id: "MM-AH-ACQ-019"
        title: "The Pie Table"
        statement: "Current lead gen is one tiny slice of one tiny pie on a table full of pies. Methods x Platforms x Mediums = massive expansion."
        weight: 0.90
        domains: ["lead-gen", "scaling"]
      - id: "MM-AH-ACQ-020"
        title: "Equilibrium Trap"
        statement: "When demand=supply, business feels stuck. Way out: deliberately create imbalance by pushing demand harder, use extra cash to expand supply."
        weight: 0.90
        domains: ["scaling", "operations"]
      - id: "MM-AH-ACQ-021"
        title: "Content as Proof Compounding"
        statement: "Every piece of content is a unit of proof. Over time proof compounds. Brand = accumulated proof over time."
        weight: 0.85
        domains: ["content", "brand"]
      - id: "MM-AH-ACQ-022"
        title: "Deprivation-Satiation Model"
        statement: "After receiving great value = satiated, won't buy. Make offers after deprivation (unanswered questions). Same pitch, different timing = dramatically different results."
        weight: 0.95
        domains: ["sales", "events"]
      - id: "MM-AH-ACQ-023"
        title: "External to Internal Motivation"
        statement: "Use external motivation (money at stake) to create internal motivation (habit). Mom told you to brush teeth (external) → you brush as adult (internal)."
        weight: 0.85
        domains: ["psychology", "retention"]
      - id: "MM-AH-ACQ-024"
        title: "Participation Trophy Effect"
        statement: "People who applied and lost feel they almost won. Sunk cost of effort makes them more likely to buy partial scholarship."
        weight: 0.85
        domains: ["psychology", "offers"]
      - id: "MM-AH-ACQ-025"
        title: "3x Growth Multiplier"
        statement: "2x customer value × 2x volume × 2x payment speed = 8x growth. Triple each = 27x."
        weight: 0.90
        domains: ["scaling", "money-models"]
      - id: "MM-AH-ACQ-026"
        title: "Problems Create Problems"
        statement: "Every offer solves one problem and creates another. Upsell solves the next problem."
        weight: 0.85
        domains: ["upsells", "offers"]
      - id: "MM-AH-ACQ-027"
        title: "Zealot Model"
        statement: "Bring the people who love your product most to make content for you. Community of advocates generates ads/content on your behalf."
        weight: 0.85
        domains: ["content", "community"]
      - id: "MM-AH-ACQ-028"
        title: "Nurture as Selling the Sell"
        statement: "Between opt-in and sales call, you're not selling the product - selling value of showing up. Three stages: sell scheduling, sell showing, sell program."
        weight: 0.90
        domains: ["sales", "nurture"]
      - id: "MM-AH-ACQ-029"
        title: "Consumption-Retention Link"
        statement: "People who don't use what they bought cancel faster. Proactively feature-downselling non-users creates loyal customers."
        weight: 0.85
        domains: ["retention", "continuity"]
      - id: "MM-AH-ACQ-030"
        title: "Gift Card Play"
        statement: "Sell $200 gift cards for $20 (90% off), limit 2, can only use on someone else. You get paid $20 for a hot referral lead."
        weight: 0.85
        domains: ["referrals", "offers"]


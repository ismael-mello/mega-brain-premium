# ═══════════════════════════════════════════════════════════════════════════════
# LAYER 1: PHILOSOPHIES (8 items)
# ═══════════════════════════════════════════════════════════════════════════════

layers:
  L1_PHILOSOPHIES:
    count: 8
    items:
      - id: "FIL-AH-001"
        title: "Outbound é Indestrutível"
        statement: "Outbound sales é impossível de quebrar. Se Facebook shuts you down, phone still works."
        weight: 0.95
        domains: ["sales-structure", "scaling", "exit-strategy"]
        insight_id: "OB003"
        implications:
          do:
            - "Investir em outbound mesmo que leve 12-14 meses para maturar"
            - "Construir independência de canal antes de tentar exit"
            - "Valorizar a estabilidade sobre a velocidade de escala"
          avoid:
            - "Desistir de outbound antes dos 12 meses"
            - "Depender exclusivamente de paid ads"
            - "Subestimar o valor de PE/acquirers em ter outbound"
        conflicts: ["Pressão por resultados rápidos pode conflitar com timeline de 12-14 meses"]
        evidence:
          - quote: "The outbound process takes significantly longer than most people expect. That being said, it's part of the reason that private equity and potential acquirers will value it - because it is this sturdy machine."
            chunk_id: "chunk_198"
            source_id: "AH-SS001"
          - quote: "The beautiful part about this model is that it takes a long time to build and it also is impossible to break."
            chunk_id: "chunk_212"
            source_id: "AH-SS001"

      - id: "FIL-AH-002"
        title: "HR Serve a Empresa"
        statement: "O cliente do HR é A EMPRESA, não os funcionários. Funcionários são responsáveis pela própria felicidade."
        weight: 0.85
        domains: ["hr-philosophy", "organizational-culture", "compensation"]
        insight_id: "HR001"
        implications:
          do:
            - "Proteger a empresa em decisões de HR"
            - "Focar em performance, não em felicidade"
            - "Deixar claro os três stakeholders (shareholders, customers, employees)"
          avoid:
            - "Transformar HR em departamento de felicidade"
            - "Priorizar conforto do funcionário sobre resultados"
            - "Confundir role de HR com assistência social"
        conflicts: ["Pode parecer insensível em culturas mais empáticas", "Risco de burnout se aplicado sem equilíbrio"]
        evidence:
          - quote: "Your job is NOT to make employees happy. Employees responsible for own happiness. HR's customer = THE COMPANY, not employees."
            chunk_id: "AH002_002"
            source_id: "AH-HR001"

      - id: "FIL-AH-003"
        title: "Pague o Mínimo pelo Máximo Valor"
        statement: "Goal = pay as little as possible for as much value as possible. Só pague mais se tiver problema em atrair OU reter."
        weight: 0.80
        domains: ["compensation", "hr-philosophy", "unit-economics"]
        insight_id: "HR003"
        implications:
          do:
            - "Monitorar métricas de atração e retenção"
            - "Aumentar salário apenas quando dados indicarem necessidade"
            - "Focar em criar valor desproporcional com star employees"
          avoid:
            - "Aumentos automáticos sem análise de mercado"
            - "Benchmark salarial apenas por benchmark"
            - "Gastar recursos de compensação de forma uniforme"
        conflicts: ["Pode perder talentos para concorrentes que pagam mais"]
        evidence:
          - quote: "Only pay more if: 1) trouble attracting talent, OR 2) trouble retaining talent. Otherwise, pay is fine."
            chunk_id: "AH002_004"
            source_id: "AH-HR001"

      - id: "FIL-AH-004"
        title: "Meritocracia Pura"
        statement: "Pure meritocracy - the numbers don't lie. Promoção por HABILIDADE, não por tempo."
        weight: 0.90
        domains: ["compensation", "hiring", "organizational-culture"]
        insight_id: "FS003"
        implications:
          do:
            - "Criar métricas objetivas para promoção"
            - "Publicar critérios claros de progressão"
            - "Celebrar resultados, não tempo de casa"
          avoid:
            - "Promoções automáticas por tempo"
            - "Aumentos baseados em política"
            - "Favoritismo ou nepotismo"
        conflicts: ["Pode criar ambiente competitivo demais"]
        evidence:
          - quote: "What job in the world can you go from zero to $200,000 a year in nine to twelve months with no degree? Here you can because we're pure meritocracy and the numbers don't lie."
            chunk_id: "chunk_217"
            source_id: "AH-SS001"
          - quote: "Get promoted ABILITY, not automatic. 10 deals trial at BC level."
            chunk_id: "AH001_006"
            source_id: "AH-SS001"

      - id: "FIL-AH-005"
        title: "Ambiente de Vencedores"
        statement: "High performance culture é lugar perigoso pra trabalhar. Se você é winner, vai amar. Se não é, não vai durar."
        weight: 0.85
        domains: ["organizational-culture", "hiring", "hr-philosophy"]
        insight_id: "CC001"
        implications:
          do:
            - "Criar cultura que se auto-reforça via core team"
            - "Deixar claro expectations na contratação"
            - "Remover low performers rapidamente"
          avoid:
            - "Tolerar mediocridade por medo de turnover"
            - "Suavizar a cultura para agradar todos"
            - "Confundir cultura exigente com cultura tóxica sem propósito"
        conflicts: ["Risco de burnout", "Pode parecer tóxico sem contexto"]
        evidence:
          - quote: "Gym Launch é um lugar perigoso pra trabalhar. Se você entra e sobe no trem, vai aprender mais do que nunca. Mas você precisa performar."
            chunk_id: "AH002_005"
            source_id: "AH-HR001"

      - id: "FIL-AH-006"
        title: "Ninguém Começa Matador"
        statement: "No killer starts cold and gets good. Closers são forjados pelo Farm System, não contratados prontos."
        weight: 0.90
        domains: ["hiring", "sales-structure", "training"]
        insight_id: "FS001"
        implications:
          do:
            - "Construir pipeline interno de talentos"
            - "Valorizar o training system como asset"
            - "Deixar novos passarem pelas dificuldades"
          avoid:
            - "Contratar closers prontos e caros de fora"
            - "Poupar novatos das dificuldades"
            - "Dar inbound leads para quem não cortou os dentes"
        conflicts: ["Demora mais para ter closers prontos"]
        evidence:
          - quote: "The key point here is that the human resource training system itself becomes an asset to the business because we know that when someone works their way up from being a BDR all the way to a BC, they know how to close."
            chunk_id: "chunk_213"
            source_id: "AH-SS001"

      - id: "FIL-AH-007"
        title: "Largar para Crescer"
        statement: "O que estou segurando que preciso largar? Cada nível de crescimento exige abrir mão de algo."
        weight: 0.85
        domains: ["scaling", "leadership", "delegation"]
        insight_id: "GL002"
        implications:
          do:
            - "Identificar o que você está segurando"
            - "Delegar antes de estar 100% confortável"
            - "Aceitar que sua função muda a cada estágio"
          avoid:
            - "Acumular funções indefinidamente"
            - "Ser indispensável em operações"
            - "Achar que você é a exceção"
        conflicts: ["Ego pode dificultar o desapego"]
        evidence:
          - quote: "'What am I holding onto that I need to give up?' Key question at each growth level."
            chunk_id: "AH001_012"
            source_id: "AH-SS001"

      - id: "FIL-AH-008"
        title: "Consistência Vence Intensidade"
        statement: "The wealthiest people in the world: 'I've been doing the same thing for 40 years.' That's the secret."
        weight: 0.85
        domains: ["wealth-building", "exit-strategy", "long-term-thinking"]
        insight_id: "EX002"
        implications:
          do:
            - "Escolher um jogo e jogá-lo por décadas"
            - "Construir para compor, não para vender rápido"
            - "Resistir à tentação de pivotar constantemente"
          avoid:
            - "Pular de oportunidade em oportunidade"
            - "Vender na primeira oferta boa"
            - "Confundir movimento com progresso"
        conflicts: ["Pode parecer contrário à narrativa de exits rápidos"]
        evidence:
          - quote: "Buy, build, refinance - don't need to sell. Wealthiest people: 'I've been doing the same thing for 40 years.'"
            chunk_id: "AH001_010"
            source_id: "AH-SS001"

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 2: MENTAL MODELS (6 items)
  # ═══════════════════════════════════════════════════════════════════════════

  L2_MENTAL_MODELS:
    count: 6
    items:
      - id: "MM-AH-001"
        title: "Christmas Tree Structure"
        statement: "Visualizar a estrutura de vendas como árvore de Natal - base larga de BDRs, meio de SDS, topo estreito de closers."
        weight: 0.95
        domains: ["sales-structure", "hiring", "scaling"]
        insight_id: "SS001"
        analogy: "Org chart parece árvore de Natal - cada nível alimenta metade do próximo."
        mechanism: "A base larga (BDRs) faz volume de calls e filtra. O meio (SDS) qualifica e entrega valor. O topo (closers) apenas fecha deals qualificados. 6 BDRs → 3 SDS → 1 BC."
        trigger_questions:
          - "Quantos BDRs preciso para alimentar meus closers?"
          - "Onde está o gargalo na minha árvore?"
          - "O topo está recebendo leads qualificados o suficiente?"
        when_to_apply: ["Desenhando estrutura de time outbound", "Diagnosticando problemas de volume", "Planejando contratações"]
        when_not_to_apply: ["Times muito pequenos (1-2 pessoas)", "Modelos puramente inbound"]
        related_philosophy: "FIL-AH-006"
        evidence:
          - quote: "This looks like a Christmas tree if you were to look at the org chart. You've got the base of BDRs who feed half as many SDS, who then feed half as many BCs."
            chunk_id: "chunk_202"
            source_id: "AH-SS001"

      - id: "MM-AH-002"
        title: "Farm System (Baseball Analogy)"
        statement: "Ver o desenvolvimento de vendedores como sistema de ligas menores do baseball - Double A, Triple A, The Bigs."
        weight: 0.90
        domains: ["hiring", "training", "sales-structure"]
        insight_id: "FS001"
        analogy: "BDRs são Double A, SDS são Triple A, closers são The Bigs."
        mechanism: "Novatos entram na base (BDR) e são forjados. Sobem para SDS quando provam competência. Só chegam ao BC depois de cut their teeth. O sistema de treinamento vira ASSET."
        trigger_questions:
          - "Meu closer cortou os dentes em outbound?"
          - "Tenho pipeline interno de talentos?"
          - "Estou contratando prontos ou desenvolvendo?"
        when_to_apply: ["Construindo time escalável", "Avaliando se closer está pronto", "Justificando investimento em treinamento"]
        when_not_to_apply: ["Precisa de resultados em menos de 6 meses", "Time muito pequeno para ter níveis"]
        related_philosophy: "FIL-AH-006"
        evidence:
          - quote: "My CEO was an ex-pro baseball player so we used the pro baseball player analogy a lot. We've got Double A, we've got Triple A, and we've got the Bigs."
            chunk_id: "chunk_213"
            source_id: "AH-SS001"

      - id: "MM-AH-003"
        title: "3 Stakeholders"
        statement: "Ver toda empresa como tendo exatamente 3 stakeholders: shareholders, customers, employees - nessa ordem."
        weight: 0.85
        domains: ["hr-philosophy", "organizational-culture", "decision-making"]
        insight_id: "HR002"
        analogy: "Triângulo de stakeholders onde shareholders estão no topo, customers no meio, employees na base."
        mechanism: "HR serve a EMPRESA (shareholders), não os employees. Employees servem os CUSTOMERS. Customers pagam, o que sustenta tudo."
        trigger_questions:
          - "Quem estou servindo com essa decisão?"
          - "Essa ação beneficia shareholders ou employees?"
          - "Isso melhora a experiência do customer?"
        when_to_apply: ["Decisões de HR que conflitam com business", "Trade-offs entre felicidade e performance"]
        when_not_to_apply: ["Contextos de compliance legal", "Situações de segurança do trabalho"]
        related_philosophy: "FIL-AH-002"
        evidence:
          - quote: "HR's customer is THE COMPANY, not employees. 3 stakeholders: shareholders, customers, employees."
            chunk_id: "AH002_003"
            source_id: "AH-HR001"

      - id: "MM-AH-004"
        title: "Growth Levels"
        statement: "Cada faixa de receita exige largar algo diferente. O founder deve mudar sua função a cada estágio."
        weight: 0.90
        domains: ["scaling", "leadership", "delegation"]
        insight_id: "GL001"
        analogy: "Escada onde cada degrau exige deixar algo pra trás antes de subir."
        mechanism: "0-1M: Largar fulfillment. 1-10M: Largar sales. 10-30M: Largar marketing. 30-50M+: Largar liderança."
        trigger_questions:
          - "Em que nível estou hoje?"
          - "O que estou segurando que preciso largar?"
          - "Já deleguei o que deveria para este estágio?"
        when_to_apply: ["Planejando próximo estágio de crescimento", "Sentindo sobrecarga como founder"]
        when_not_to_apply: ["Startup muito early stage", "Negócio lifestyle sem intenção de escalar"]
        related_philosophy: "FIL-AH-007"
        evidence:
          - quote: "Growth Levels: 0-1M (give up fulfillment), 1-10M (give up sales), 10-30M (give up marketing), 30-50M+ (give up leading)."
            chunk_id: "AH001_012"
            source_id: "AH-SS001"

      - id: "MM-AH-005"
        title: "BDR = Advertisement"
        statement: "Mentalizar o BDR como substituição do anúncio pago. Ele compra atenção com ligações, não com dinheiro."
        weight: 0.85
        domains: ["sales-structure", "marketing", "unit-economics"]
        insight_id: "SS002"
        analogy: "Se Facebook Ads compra atenção com dólares, BDR compra atenção com dials."
        mechanism: "BDR faz o que o anúncio faria: gerar interesse. Custo por show = $50 por BDR → equivalente ao CAC de ads. Diferença: outbound é impossível de desligar."
        trigger_questions:
          - "Quanto estou pagando por show via ads vs via BDR?"
          - "Se meus ads pararem, tenho backup?"
          - "Meus BDRs estão gerando shows a custo competitivo?"
        when_to_apply: ["Comparando CAC entre canais", "Justificando investimento em outbound"]
        when_not_to_apply: ["Ticket muito baixo (< $15k)", "Sem infraestrutura para cold calling"]
        related_philosophy: "FIL-AH-001"
        evidence:
          - quote: "If you replace a BDR mentally with what an advertisement used to do, that's exactly how this functions."
            chunk_id: "chunk_201"
            source_id: "AH-SS001"

      - id: "MM-AH-006"
        title: "Venda a Praia, Não o Avião"
        statement: "Vender o destino (outcome) e não o veículo (método). Cliente quer resultado, não processo."
        weight: 0.85
        domains: ["sales-process", "copywriting", "persuasion"]
        insight_id: "CL002"
        analogy: "Ninguém compra passagem aérea pelo avião. Compra pela praia, pelo vento, pelo status."
        mechanism: "Na pitch, falar das árvores, do vento, do status. NÃO falar dos módulos, das calls de Zoom. Limitar a 3 pontos. Emoção vende, lógica justifica."
        trigger_questions:
          - "Estou vendendo o avião ou a praia?"
          - "Minha pitch foca no outcome ou no método?"
          - "Quantos pontos estou tentando fazer? (máx 3)"
        when_to_apply: ["Estruturando pitch de vendas", "Criando materiais de marketing", "Treinando closers"]
        when_not_to_apply: ["Cliente muito técnico que quer detalhes", "Fase de due diligence pós-interesse"]
        evidence:
          - quote: "Sell the vacation (trees, wind, status) not the plane (Zoom calls, modules). 3 points max (attention span)."
            chunk_id: "AH001_005"
            source_id: "AH-SS001"

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 3: HEURISTICS (28 items)
  # ═══════════════════════════════════════════════════════════════════════════

  L3_HEURISTICS:
    count: 28
    items:
      # --- NUMERIC THRESHOLD HEURISTICS ---
      - id: "HEUR-AH-001"
        title: "Ticket Mínimo Outbound"
        rule: "Se ticket < $15k, não fazer outbound - unit economics não funcionam."
        weight: 0.95
        domains: ["pricing", "outbound", "unit-economics"]
        insight_id: "OB002"
        threshold: {value: 15000, operator: "<", unit: "USD"}
        context: "Decidindo se vale investir em outbound sales."
        action: "Aumentar ticket ou usar outro canal de aquisição."
        exceptions: ["Produtos com LTV muito alto podem funcionar com ticket menor", "Upsell pipeline pode justificar CAC maior"]
        related_philosophy: "FIL-AH-001"
        evidence:
          - quote: "If you want to do outbound, your ticket has to be at least 15,000 dollars. The unit economics don't really work otherwise."
            chunk_id: "chunk_199"
            source_id: "AH-SS001"

      - id: "HEUR-AH-002"
        title: "Conversão BDR"
        rule: "100 dials → 20 pickups → 2 shows. Essa é a conversão esperada de BDR."
        weight: 0.95
        domains: ["sales-metrics", "outbound", "performance-management"]
        insight_id: "SS003"
        threshold: {value: 100, operator: "=", unit: "dials/dia"}
        context: "Definindo metas de atividade para BDRs."
        action: "Se abaixo de 2 shows por 100 dials, revisar script ou lista."
        exceptions: ["Nichos diferentes podem ter taxas diferentes", "Listas frias vs warm podem variar"]
        related_model: "MM-AH-001"
        evidence:
          - quote: "Those BDRs are required to make 100 calls a day... From those 100 calls they are expected to have two appointments that show."
            chunk_id: "chunk_203"
            source_id: "AH-SS001"
          - quote: "From there you'll get your 100 dials, you'll get 20 to pick up (that's 1 in 5), and from the 20 we will have two who schedule and show."
            chunk_id: "chunk_204"
            source_id: "AH-SS001"

      - id: "HEUR-AH-003"
        title: "Diagnóstico Close Rate Outbound"
        rule: "Se close rate < 10% em outbound, problema é qualificação (SDS), não closing."
        weight: 0.90
        domains: ["sales-metrics", "outbound", "diagnostics"]
        insight_id: "SS003"
        threshold: {value: 10, operator: "<", unit: "%"}
        context: "Diagnosticando por que vendas outbound não estão fechando."
        action: "Revisar processo de qualificação do SDS antes de treinar closers."
        exceptions: ["Closers novos podem ter taxa temporariamente menor"]
        related_model: "MM-AH-001"
        evidence:
          - quote: "For us we close 10% of scheduled SDS appointments."
            chunk_id: "chunk_212"
            source_id: "AH-SS001"

      - id: "HEUR-AH-004"
        title: "Call Block de 4 Horas"
        rule: "4 horas de call block, não 8. Pessoas não conseguem cold call produtivamente por 8h."
        weight: 0.90
        domains: ["performance-management", "outbound", "efficiency"]
        insight_id: "SS004"
        threshold: {value: 4, operator: "=", unit: "horas"}
        context: "Estruturando jornada de trabalho de BDRs."
        action: "Contratar para blocos de 4h e pagar por performance, não por hora."
        evidence:
          - quote: "The way that we structure this is that they get four hours to work per day... His experience was that people cannot be productive for eight hours straight cold calling."
            chunk_id: "chunk_203"
            source_id: "AH-SS001"

      - id: "HEUR-AH-005"
        title: "OTE por Role"
        rule: "BDR OTE = $40k, SDS OTE = $55-70k, BC OTE = $120-220k."
        weight: 0.90
        domains: ["compensation", "hiring", "sales-structure"]
        insight_id: "CM002"
        threshold: {value_min: 40000, value_max: 220000, operator: "range", unit: "USD/ano"}
        context: "Definindo faixas salariais para time de vendas outbound."
        action: "Atrair BDRs com visão do $200k lottery, não com o $40k inicial."
        exceptions: ["Mercados diferentes podem ter OTEs diferentes"]
        related_model: "MM-AH-002"
        related_philosophy: "FIL-AH-004"
        evidence:
          - quote: "The BDRs do not get paid very much - on target earnings is 40 grand. How do you attract someone for $40,000? You attract them because the guys who win the lottery make $200,000 a year."
            chunk_id: "chunk_216"
            source_id: "AH-SS001"

      - id: "HEUR-AH-006"
        title: "Steam de Vendedor"
        rule: "6-8 semanas de steam antes de vendedor desanimar. Criar milestones nesse intervalo."
        weight: 0.90
        domains: ["retention", "performance-management", "compensation"]
        insight_id: "CM001"
        threshold: {value_min: 6, value_max: 8, operator: "range", unit: "semanas"}
        context: "Estruturando sistema de progressão para reter vendedores."
        action: "Criar promoções/milestones a cada 6-8 semanas para manter engajamento."
        related_model: "MM-AH-002"
        related_philosophy: "FIL-AH-004"
        evidence:
          - quote: "A sales person has like six to eight weeks of steam in them before they start getting disheartened. So we created milestones."
            chunk_id: "chunk_215"
            source_id: "AH-SS001"

      - id: "HEUR-AH-007"
        title: "Timeline Outbound"
        rule: "12-14 meses para outbound maturar. Desistir antes disso é não ter testado."
        weight: 0.95
        domains: ["outbound", "scaling", "patience"]
        insight_id: "OB001"
        threshold: {value_min: 12, value_max: 14, operator: "range", unit: "meses"}
        context: "Avaliando se outbound está funcionando."
        action: "Comprometer-se com no mínimo 12 meses antes de avaliar."
        related_philosophy: "FIL-AH-001"
        evidence:
          - quote: "The first month we made one sale, second month two sales, third month four sales... We're now at month 14 and now it does about 45 sales a month."
            chunk_id: "chunk_198"
            source_id: "AH-SS001"

      - id: "HEUR-AH-008"
        title: "Estrutura SDS Call"
        rule: "SDS call = 45min total: 30min value delivery + 15min transição para close."
        weight: 0.85
        domains: ["sales-process", "time-management", "scripts"]
        insight_id: "SD001"
        threshold: {value: 45, operator: "=", unit: "minutos"}
        context: "Estruturando call de qualificação/valor."
        action: "Deixar 15min dead time no final para transicionar para closer."
        related_model: "MM-AH-001"
        evidence:
          - quote: "The SDS call is like 45 minutes - so it's 30 to do the thing, 15 to set the next deal."
            chunk_id: "chunk_208"
            source_id: "AH-SS001"

      - id: "HEUR-AH-009"
        title: "Unit Economics Referência"
        rule: "$50 por show = CAC de $500 para 10% close rate."
        weight: 0.90
        domains: ["unit-economics", "compensation", "outbound"]
        threshold: {value: 50, operator: "=", unit: "USD/show"}
        context: "Calculando CAC de outbound."
        action: "Se custo por show > $50, revisar eficiência de BDRs."
        exceptions: ["Tickets maiores justificam CAC maior"]
        related_model: "MM-AH-005"
        evidence:
          - quote: "They get 50 bucks for every show, so it's $500 in BDRs per close. Which for a $40,000 LTV is pretty cool."
            chunk_id: "chunk_212"
            source_id: "AH-SS001"

      - id: "HEUR-AH-010"
        title: "Farm System Close Rate"
        rule: "Close rate 20-25% → 60% quando closer veio do Farm System."
        weight: 0.95
        domains: ["training", "sales-metrics", "hiring"]
        insight_id: "FS002"
        threshold: {before: 25, after: 60, operator: "improvement", unit: "%"}
        context: "Avaliando valor do Farm System vs contratar closers prontos."
        action: "Desenvolver closers internamente pelo Farm System."
        related_model: "MM-AH-002"
        related_philosophy: "FIL-AH-006"
        evidence:
          - quote: "Our inbound closing percentage went from 20-25% to 60%. Because they cut their teeth at the bottom."
            chunk_id: "chunk_214"
            source_id: "AH-SS001"

      - id: "HEUR-AH-011"
        title: "Star Employee Multiplier"
        rule: "Star employees valem 3-5x output normal. Pagar desproporcionalmente para reter."
        weight: 0.85
        domains: ["compensation", "retention", "hr-philosophy"]
        insight_id: "HR004"
        threshold: {value_min: 3, value_max: 5, operator: "multiplier", unit: "x"}
        context: "Decidindo quanto pagar para reter top performers."
        action: "Identificar star employees e criar pacote desproporcional."
        related_philosophy: "FIL-AH-003"
        evidence:
          - quote: "Star employees worth 3-5x normal output. Pay them disproportionately to retain."
            chunk_id: "AH002_004"
            source_id: "AH-HR001"

      - id: "HEUR-AH-012"
        title: "Net de Exit"
        rule: "$100M sale = ~$40M net após seller note, earnout, equity roll, broker 4%, capital gains 20%."
        weight: 0.90
        domains: ["exit-strategy", "wealth-building", "financial-planning"]
        insight_id: "EX001"
        threshold: {value: 40, operator: "=", unit: "% net"}
        context: "Planejando exit e entendendo valor real de venda."
        action: "Calcular net real antes de definir preço-alvo de exit."
        evidence:
          - quote: "$100M sale = ~$40M net after: seller note, earnout, equity roll, broker 4%, bonuses, capital gains 20%, escrow."
            chunk_id: "AH001_010"
            source_id: "AH-SS001"

      - id: "HEUR-AH-017"
        title: "MAYBE Bucket"
        rule: "MAYBE bucket = 60% dos leads = onde o dinheiro é feito."
        weight: 0.95
        domains: ["lead-nurturing", "qualification", "sales-strategy"]
        insight_id: "AH-CP001_004"
        threshold: {value: 60, operator: "=", unit: "%"}
        context: "Alocando tempo e esforço de nurture/closing."
        action: "Focar energia no MAYBE bucket, não no YES que já vai comprar."
        evidence:
          - quote: "The MAYBE bucket is 60% of your audience - this is where the money is made."
            chunk_id: "AH-CP001_004"
            source_id: "AH-CP001"

      - id: "HEUR-AH-019"
        title: "Asks por Call"
        rule: "Top performers pedem fechamento 5-7x por call. Medianos pedem 1-2x."
        weight: 0.95
        domains: ["closing", "sales-training", "performance-metrics"]
        insight_id: "SP-AH010"
        threshold: {value_min: 5, value_max: 7, operator: "range", unit: "asks/call"}
        context: "Treinando closers para aumentar taxa de fechamento."
        action: "Contar asks por call e treinar para aumentar frequência."
        evidence:
          - quote: "Vendedores medianos pedem 1-2x, top performers pedem 5-7x por call."
            chunk_id: "AH-YT007_001"
            source_id: "AH-YT007"

      - id: "HEUR-AH-020"
        title: "Cortar Bottom 10%"
        rule: "Cortar bottom 10% consistentemente. Manter padrão de excelência é mais importante que evitar turnover."
        weight: 0.90
        domains: ["performance-management", "team-building", "hr-philosophy"]
        insight_id: "TS-AH003"
        threshold: {value: 10, operator: "bottom", unit: "% do time"}
        context: "Gerenciando performance de time de vendas."
        action: "Implementar revisão mensal/trimestral e remover consistentemente os 10% piores."
        exceptions: ["Times muito pequenos usar critério absoluto", "Considerar ramp-up para novos"]
        related_model: "MM-AH-002"
        related_philosophy: "FIL-AH-004"
        evidence:
          - quote: "Corte do bottom 10%: eliminar consistentemente os piores performers mantém padrão de excelência."
            chunk_id: "AH-YT011_001"
            source_id: "AH-YT011"

      - id: "HEUR-AH-021"
        title: "Gravação 100%"
        rule: "Gravar 100% das calls. Sem gravação = sem QC, sem treinamento, sem padrões."
        weight: 0.90
        domains: ["quality-control", "training", "sales-process"]
        insight_id: "TS-AH002"
        threshold: {value: 100, operator: "=", unit: "% das calls"}
        context: "Estruturando processo de QC e treinamento."
        action: "Implementar gravação obrigatória de todas as calls. Revisar amostra semanal."
        exceptions: ["Regulações locais sobre consent podem exigir adaptação"]
        evidence:
          - quote: "Gravação de todas as calls é obrigatória - base para QC, treinamento e identificação de padrões."
            chunk_id: "AH-YT011_001"
            source_id: "AH-YT011"

      - id: "HEUR-AH-023"
        title: "Onboarding 2 Semanas"
        rule: "Primeiras 2 semanas de onboarding definem sucesso. Intensidade máxima nesse período."
        weight: 0.90
        domains: ["onboarding", "hiring", "training"]
        insight_id: "HT-AH002"
        threshold: {value: 2, operator: "=", unit: "semanas"}
        context: "Estruturando programa de onboarding para vendedores."
        action: "Criar onboarding intensivo de 2 semanas. Acompanhamento diário."
        evidence:
          - quote: "Onboarding intenso: primeiras 2 semanas definem se o vendedor vai performar ou não."
            chunk_id: "AH-YT010_001"
            source_id: "AH-YT010"

      # --- TEXTUAL/QUALITATIVE HEURISTICS ---
      - id: "HEUR-AH-013"
        title: "Diagnóstico Salarial"
        rule: "Se funcionário não está atraindo ou retendo, não pague mais - salário está OK."
        weight: 0.80
        domains: ["compensation", "hr-philosophy"]
        insight_id: "HR003"
        context: "Decidindo se deve dar aumento para time."
        action: "Verificar métricas de atração e retenção antes de aumentar."
        evidence:
          - quote: "Only pay more if: 1) trouble attracting talent, OR 2) trouble retaining talent. Otherwise, pay is fine."
            chunk_id: "AH002_004"
            source_id: "AH-HR001"

      - id: "HEUR-AH-014"
        title: "SDS = Ex-Cliente"
        rule: "Se SDS não é ex-cliente ou domain expert, não vai conseguir mostrar expertise."
        weight: 0.80
        domains: ["hiring", "sales-structure"]
        insight_id: "SD001"
        context: "Contratando para posição de SDS."
        action: "Buscar ex-clientes de sucesso para SDS roles."
        evidence:
          - quote: "The SDS for us almost exclusively is ex-clients. You have to show some domain expertise."
            chunk_id: "chunk_208"
            source_id: "AH-SS001"

      - id: "HEUR-AH-015"
        title: "Core Team Rejeita"
        rule: "Se core team rejeita novo membro, remover. Cultura se auto-reforça."
        weight: 0.75
        domains: ["organizational-culture", "hiring"]
        insight_id: "CC002"
        context: "Avaliando fit de novo funcionário após onboarding."
        action: "Escutar feedback do core team sobre novos membros."
        evidence:
          - quote: "Strong core team assimilates or rejects new members. Culture self-enforces."
            chunk_id: "AH002_005"
            source_id: "AH-HR001"

      - id: "HEUR-AH-016"
        title: "Conviction > Technique"
        rule: "Conviction > Technique. Contratar por convicção, treinar técnica depois."
        weight: 0.90
        domains: ["hiring", "closing", "sales-philosophy"]
        insight_id: "AH-CP001_001"
        context: "Decidindo critérios para contratar closers."
        action: "Buscar pessoas que acreditam genuinamente no produto."
        evidence:
          - quote: "Conviction beats technique every time. Hire for conviction, train for technique."
            chunk_id: "AH-CP001_001"
            source_id: "AH-CP001"

      - id: "HEUR-AH-018"
        title: "Onion of Blame"
        rule: "Descartar objeções de 'circumstance' e 'others' - ir direto para o medo 'self'."
        weight: 0.85
        domains: ["objection-handling", "psychology", "closing"]
        insight_id: "AH-CP001_003"
        context: "Handling de objeções que parecem vagas."
        action: "Quando prospect culpa circunstâncias ou outras pessoas, escavar mais fundo."
        evidence:
          - quote: "Onion of Blame: prospects blame circumstance first, then others, finally self. The real objection is always at the self layer."
            chunk_id: "AH-CP001_003"
            source_id: "AH-CP001"

      - id: "HEUR-AH-022"
        title: "Coachability #1"
        rule: "Coachability é critério #1 para contratação. Supera experiência prévia."
        weight: 0.95
        domains: ["hiring", "sales-training", "team-building"]
        insight_id: "HT-AH001"
        context: "Entrevistando candidatos para posições de vendas."
        action: "Testar coachability durante entrevista: dar feedback e observar reação."
        related_model: "MM-AH-002"
        related_philosophy: "FIL-AH-006"
        evidence:
          - quote: "Coachability é o critério #1 na seleção: capacidade de receber feedback e mudar supera experiência prévia."
            chunk_id: "AH-YT010_001"
            source_id: "AH-YT010"

      - id: "HEUR-AH-024"
        title: "Feedback em Rituais"
        rule: "Feedback diário/semanal em rituais > feedback pontual esporádico."
        weight: 0.80
        domains: ["coaching", "performance-management", "leadership"]
        insight_id: "HT-AH003"
        context: "Estruturando sistema de feedback e coaching."
        action: "Implementar rituais fixos: daily standup, weekly 1:1, review semanal de calls."
        evidence:
          - quote: "Cadência de feedback: rituais diários/semanais de revisão são mais efetivos que feedback pontual."
            chunk_id: "AH-YT010_001"
            source_id: "AH-YT010"

      - id: "HEUR-AH-025"
        title: "Consistência > Paixão"
        rule: "Consistência > paixão. Tolerância à frustração é o motor real do sucesso."
        weight: 0.85
        domains: ["mindset", "performance", "hiring"]
        insight_id: "MC-AH001"
        context: "Avaliando candidatos e desenvolvendo mentalidade de time."
        action: "Buscar histórico de persistência. Desconfiar de entusiasmo sem disciplina."
        evidence:
          - quote: "Consistência supera paixão: disciplina e tolerância à frustração são os motores reais do sucesso."
            chunk_id: "AH-YT005_001"
            source_id: "AH-YT005"

      - id: "HEUR-AH-026"
        title: "Manual Antes de Automatizar"
        rule: "Dominar manualmente antes de automatizar. Proficiência precede escala."
        weight: 0.85
        domains: ["scaling", "operations", "systems"]
        insight_id: "MC-AH002"
        context: "Decidindo quando automatizar processos."
        action: "Fazer manualmente até dominar. Só então sistematizar."
        evidence:
          - quote: "Proficiência antes de automação: dominar manualmente antes de escalar com sistemas."
            chunk_id: "AH-YT005_001"
            source_id: "AH-YT005"

      - id: "HEUR-AH-027"
        title: "Pricing Progressivo"
        rule: "Começar gratuito/barato, aumentar preço conforme prova social acumula."
        weight: 0.85
        domains: ["pricing", "positioning", "go-to-market"]
        insight_id: "LG-AH004"
        context: "Definindo estratégia de pricing para produto novo."
        action: "Primeiros clientes = gratuito ou barato. Coletar testemunhos. Aumentar progressivamente."
        evidence:
          - quote: "Aumento progressivo de preços: começar gratuito/barato, aumentar conforme prova social acumula."
            chunk_id: "AH-YT008_001"
            source_id: "AH-YT008"

      - id: "HEUR-AH-028"
        title: "Ancoragem de Preço"
        rule: "Ancorar com preço alto antes de revelar preço real. Aumenta percepção de valor."
        weight: 0.85
        domains: ["pricing", "closing", "psychology"]
        insight_id: "PO-AH001"
        context: "Apresentando preço em call de vendas."
        action: "Mostrar valor total (ancorar alto). Depois revelar preço real como desconto implícito."
        evidence:
          - quote: "Ancoragem e pré-pagamento: apresentar preço mais alto primeiro, depois revelar preço real."
            chunk_id: "AH-YT014_001"
            source_id: "AH-YT014"

  # ═══════════════════════════════════════════════════════════════════════════
  # LAYER 4: FRAMEWORKS (12 items)
  # ═══════════════════════════════════════════════════════════════════════════

  L4_FRAMEWORKS:
    count: 12
    items:
      - id: "FW-AH-001"
        title: "CLOSER Framework"
        type: "sequence"
        weight: 0.95
        domains: ["sales-process", "scripts", "closing"]
        insight_id: "CL001"
        components:
          - name: "C - Clarify"
            description: "Clarificar por que estão na call"
          - name: "L - Label"
            description: "Nomear o outcome desejado"
          - name: "O - Overview"
            description: "Revisar dores passadas (pain cycle)"
          - name: "S - Sell"
            description: "Vender a praia, não o avião"
          - name: "E - Explain"
            description: "Explicar e trazer objeções (3 buckets)"
          - name: "R - Reinforce"
            description: "Reforçar a decisão após fechamento"
        usage: "Seguir cada letra na ordem durante call de fechamento. Não pular fases."
        when_to_use: ["Toda call de fechamento high-ticket", "Treinamento de novos closers"]
        when_not_to_use: ["Calls de qualificação (SDS)", "Cold calls de BDR"]
        evidence:
          - quote: "CLOSER Framework: C-Clarify, L-Label outcome, O-Overview past pain, S-Sell vacation, E-Explain concerns, R-Reinforce decision"
            chunk_id: "AH001_005"
            source_id: "AH-SS001"

      - id: "FW-AH-002"
        title: "3 Buckets de Objeção"
        type: "list"
        weight: 0.90
        domains: ["objection-handling", "sales-process", "closing"]
        insight_id: "OF001"
        components:
          - name: "Decision Maker"
            description: "Precisa consultar outra pessoa"
            strategy: "Past agreements + 'ask forgiveness not permission'"
          - name: "Price"
            description: "Acha caro ou não tem dinheiro"
            strategy: "Ancorar no valor, construir convicção"
          - name: "Delay"
            description: "Quer pensar, não é o momento"
            strategy: "Best case/worst case, Decision Framework (3 Yes = go)"
        usage: "Toda objeção cai em um desses 3 buckets. Identificar qual antes de responder."
        when_to_use: ["Qualquer objeção em call de vendas", "Análise de calls perdidas"]
        when_not_to_use: ["Objeções técnicas sobre o produto"]
        evidence:
          - quote: "3 Objection Buckets: Decision Maker, Price, Delay. Each has specific handling strategy."
            chunk_id: "AH001_008"
            source_id: "AH-SS001"

      - id: "FW-AH-003"
        title: "4 Levels por Role"
        type: "progression"
        weight: 0.90
        domains: ["compensation", "career-path", "retention"]
        insight_id: "CM001"
        components:
          - name: "Junior"
            description: "Entrada, aprendendo basics"
          - name: "Associate"
            description: "Competente, precisa de supervisão"
            requirement: "~50 shows (8 semanas)"
          - name: "[Title]"
            description: "Proficiente, trabalha independente"
            requirement: "~100 shows"
          - name: "Senior"
            description: "Expert, elegível para promoção de role"
            requirement: "~150+ shows"
        usage: "Aplicar a cada role (BDR, SDS, BC). Bumps de título + pequeno bump de pay a cada nível."
        when_to_use: ["Estruturando plano de carreira", "Definindo quando promover"]
        evidence:
          - quote: "Four levels of BDRs: Junior, Associate, BDR, Senior BDR. Same four step system applies to all levels."
            chunk_id: "chunk_214"
            source_id: "AH-SS001"

      - id: "FW-AH-004"
        title: "Growth Levels de Delegação"
        type: "progression"
        weight: 0.90
        domains: ["scaling", "leadership", "delegation"]
        insight_id: "GL001"
        components:
          - name: "0-1M"
            description: "Dar fulfillment (delivery manual)"
          - name: "1-10M"
            description: "Dar sales (ensinar outros)"
          - name: "10-30M"
            description: "Dar marketing"
          - name: "30-50M+"
            description: "Dar liderança (virar recurso)"
        usage: "Identificar em qual faixa está. Perguntar: 'O que estou segurando que preciso largar?'"
        when_to_use: ["Planejando próximo estágio de crescimento", "Sentindo-se sobrecarregado"]
        when_not_to_use: ["Negócio lifestyle sem intenção de escalar"]
        evidence:
          - quote: "Growth Levels: 0-1M (give up fulfillment), 1-10M (give up sales), 10-30M (give up marketing), 30-50M+ (give up leading)."
            chunk_id: "AH001_012"
            source_id: "AH-SS001"

      - id: "FW-AH-005"
        title: "Beta Process (Remover Founder)"
        type: "sequence"
        weight: 0.85
        domains: ["scaling", "exit-strategy", "process-development"]
        insight_id: "EX003"
        components:
          - name: "Ask clients problems"
            description: "Perguntar aos clientes quais problemas estão tendo"
          - name: "Top 1% roundtable"
            description: "Reunir os top 1% clientes em roundtable"
          - name: "Find common things"
            description: "Encontrar coisas que TODOS os top performers fazem"
          - name: "Consolidate solution"
            description: "Consolidar em solução replicável"
          - name: "Test on bottom 10%"
            description: "Testar nos bottom 10% - se funcionar lá, funciona em qualquer lugar"
        usage: "Criar processos que não dependem do founder. Processo gera inovação, não guru."

        domains: ["continuity", "valuation"]
      - id: "FIL-AH-ACQ-015"
        title: "Revenue Solves All Known Problems"
        statement: "When in doubt between expanding supply or generating demand, always start with generating more revenue first."
        weight: 0.90
        domains: ["scaling", "operations"]
      - id: "FIL-AH-ACQ-016"
        title: "Hooks Are 80% of the Battle"
        statement: "In advertising and content. 3-4 hooks carried millions in ad spend for years across portfolio companies."
        weight: 0.95
        domains: ["advertising", "content"]
      - id: "FIL-AH-ACQ-017"
        title: "Proof Is How You Sell"

        source_id: "AH-YT007"
        source_title: "After Closing 4000+ Sales, I Discovered a New Method"

    insight_origem: "SP-AH004"

    dominios:
      - "objection-handling"
      - "sales-process"
      - "closing"

    peso: 0.95  # Framework nomeado + citação direta + muito prático

  - id: "FW-AH-010"
    nome: "Ghost Product Technique"
    tipo: "tatica"

    estrutura:
      componentes:
        - nome: "Identificar itens não-essenciais"
          descricao: "Componentes da oferta que custam pouco mas têm valor percebido"
          exemplos:
            - "Templates"
            - "Módulos extras"
            - "Acesso a comunidade"

        - nome: "Conceder gratuitamente"
          descricao: "Dar de graça ANTES de pedir o fechamento"
          exemplos:
            - "'Olha, isso normalmente é extra, mas vou incluir pra você'"
            - "'Deixa eu te dar isso também, sem custo'"

        - nome: "Fechar produto principal"
          descricao: "Com confiança elevada, fechar o produto core"
          exemplos:
            - "Agora que você tem tudo isso, faz sentido a gente começar?"

    como_usar: |
      Usar quando perceber hesitação sobre valor.
      Dar algo de graça eleva confiança e reciprocidade.
      Prospect sente que está ganhando vantagem.
      Reduz resistência ao preço do produto principal.

    output_esperado: "Prospect sente que está fazendo um bom negócio, fecha produto principal."

    quando_usar:
      - "Prospect hesitante mas interessado"
      - "Objeção de valor/preço"
      - "Precisando criar goodwill"

    quando_nao_usar:
      - "Prospect já decidiu que sim"
      - "Itens 'ghost' são core do produto"

    evidencias:

  - id: "FW-AH-006"
    nome: "3 Audience Buckets"
    tipo: "lista"

    estrutura:
      elementos:
        - nome: "YES Bucket (20%)"
          descricao: "Ja decidiram comprar - so precisam de confirmacao"
          estrategia: "Confirmar e fechar rapidamente, nao over-sell"

        - nome: "NO Bucket (20%)"
          descricao: "Nunca vao comprar - desqualificar rapido"
          estrategia: "Identificar cedo e nao gastar energia"

        - nome: "MAYBE Bucket (60%)"
          descricao: "Nao decidiram ainda - AQUI esta o dinheiro"
          estrategia: "Trabalho real do closer/LNS: mover para YES antes da call"

    como_usar: |
      Identificar em qual bucket o prospect esta ANTES de investir tempo.
      60% dos leads sao MAYBE - o closer nao precisa convencer o YES bucket.
      O LNS eleva o interesse do MAYBE para YES antes da call.
      Desqualificar NO bucket rapido para nao desperdicar tempo do closer.

    output_esperado: "Alocacao eficiente de tempo - maior parte do esforco no MAYBE bucket."

    quando_usar:
      - "Qualificacao inicial de leads"
      - "Estrategia de nurture (LNS)"
      - "Analise de pipeline"

    quando_nao_usar:
      - "Leads ja super qualificados (todos YES)"

    evidencias:
      - citacao: "3 Audience Buckets: YES (20%), NO (20%), MAYBE (60%). The money is made in the MAYBE bucket."
        chunk_id: "AH-CP001_004"
        source_id: "AH-CP001"
        source_title: "$100M Closing Playbook"

    insight_origem: "AH-CP001_004"

    dominios:
      - "qualification"
      - "lead-nurturing"
      - "sales-strategy"

    peso: 0.95  # Framework central + muito pratico

  - id: "FW-AH-007"
    nome: "STAR Qualification"
    tipo: "lista"

    estrutura:
      elementos:
        - nome: "S - Situation"
          descricao: "Qual a situacao atual do prospect?"
          perguntas:
            - "O que esta acontecendo agora?"
            - "Qual o cenario atual?"

        - nome: "T - Task"
          descricao: "O que ele esta tentando fazer?"
          perguntas:
            - "Qual objetivo ele quer atingir?"
            - "O que ele precisa realizar?"

        - nome: "A - Action"
          descricao: "O que ja tentou?"
          perguntas:
            - "Que acoes ja tomou?"
            - "Por que nao funcionou?"

        - nome: "R - Result"
          descricao: "Qual resultado espera?"
          perguntas:
            - "Como seria o sucesso?"
            - "O que mudaria na vida dele?"

    como_usar: |
      Usar na discovery/qualificacao para entender completamente o prospect.
      Cada letra guia um bloco de perguntas.
      O resultado gera material para o closer usar depois.

    output_esperado: "Prospect completamente mapeado com dores e desejos claros."

    quando_usar:
      - "Discovery calls (SDS)"
      - "Inicio de call de fechamento"
      - "Qualificacao de leads inbound"

    quando_nao_usar:
      - "Prospect ja passou por discovery anterior"

    evidencias:
      - citacao: "STAR Qualification: Situation, Task, Action, Result - use in discovery to fully map the prospect."
        chunk_id: "AH-CP001_002"
        source_id: "AH-CP001"
        source_title: "$100M Closing Playbook"

    insight_origem: "AH-CP001_002"

    dominios:
      - "discovery"
      - "qualification"
      - "sales-process"

    peso: 0.90  # Framework de qualificacao muito pratico

  - id: "FW-AH-008"
    nome: "Onion of Blame (3 Camadas)"
    tipo: "progressao"

    estrutura:
      elementos:
        - nome: "Circumstance"
          descricao: "Primeiro culpam as circunstancias"
          exemplos:
            - "O mercado esta ruim"
            - "A economia esta dificil"
            - "Nao e o momento"

        - nome: "Others"
          descricao: "Depois culpam outras pessoas"
          exemplos:
            - "Meu socio nao deixa"
            - "Minha esposa nao vai concordar"
            - "Meus funcionarios nao vao conseguir"

        - nome: "Self"
          descricao: "Por ultimo (se chegam) culpam a si mesmos"
          exemplos:
            - "Talvez eu nao consiga"
            - "Nao sei se tenho disciplina"
            - "Eu sempre falho nisso"

    como_usar: |
      Entender que objecoes seguem esse padrao de camadas.
      Prospect descasca as camadas ate chegar no medo real (self).
      Nao resolver a camada superficial - ir ate o core.
      Quando chega em "self" = objecao real revelada.

    output_esperado: "Identificacao do medo real por tras da objecao superficial."

    quando_usar:
      - "Prospect dando desculpas vagas"
      - "Objecao parece nao fazer sentido"
      - "Handling de objecoes em geral"

    quando_nao_usar:
      - "Objecao clara e logica (preco real, timing genuino)"

    evidencias:
      - citacao: "Onion of Blame: 3 layers - Circumstance, Others, Self. Peel until you get to the real fear."
        chunk_id: "AH-CP001_003"
        source_id: "AH-CP001"
        source_title: "$100M Closing Playbook"

    insight_origem: "AH-CP001_003"

    dominios:
      - "objection-handling"
      - "psychology"
      - "closing"

    peso: 0.90  # Framework psicologico muito poderoso


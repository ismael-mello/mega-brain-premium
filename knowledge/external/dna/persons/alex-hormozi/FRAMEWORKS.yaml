          descricao: "Expert, elegível para promoção de role"
          requisito: "~150+ shows + ability to promote"

    como_usar: |
      Aplicar a cada role (BDR, SDS, BC).
      Bumps de título + pequeno bump de pay a cada nível.
      Senior não promove automaticamente - ganha ABILITY de ser promovido.

    output_esperado: "Career path claro que mantém vendedores engajados por 6-8 semanas de milestones."


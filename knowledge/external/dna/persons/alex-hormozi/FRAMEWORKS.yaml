frameworks:
  - id: "FW-AH-001"
    nome: "CLOSER Framework"
    tipo: "sequencia"

    estrutura:
      componentes:
        - nome: "C - Clarify"
          descricao: "Clarificar por que estão na call"
          perguntas:
            - "Por que você quis essa conversa?"
            - "O que te trouxe até aqui?"

        - nome: "L - Label"
          descricao: "Nomear o outcome desejado"
          perguntas:
            - "Qual é o resultado que você quer?"
            - "Como seria o sucesso para você?"

        - nome: "O - Overview"
          descricao: "Revisar dores passadas (pain cycle)"
          perguntas:
            - "O que você já tentou?"
            - "Por que não funcionou antes?"

        - nome: "S - Sell"
          descricao: "Vender a praia, não o avião"
          perguntas:
            - "Está vendendo o destino ou o veículo?"
            - "Limitou a 3 pontos?"

        - nome: "E - Explain"
          descricao: "Explicar e trazer objeções (3 buckets)"
          perguntas:
            - "Qual dos 3 buckets é a objeção?"
            - "Decision Maker, Price ou Delay?"

        - nome: "R - Reinforce"
          descricao: "Reforçar a decisão após fechamento"
          perguntas:
            - "Como vou reforçar a decisão?"
            - "Vídeo personalizado do CS?"

    como_usar: |
      Seguir cada letra na ordem durante a call de fechamento.
      Cada fase tem perguntas específicas e objetivos claros.
      Não pular fases - a sequência constrói para o close.

    output_esperado: "Call estruturada que endereça todas as objeções e fecha ou qualifica out."

    quando_usar:
      - "Toda call de fechamento high-ticket"
      - "Treinamento de novos closers"
      - "Revisão de calls para diagnóstico"

    quando_nao_usar:
      - "Calls de qualificação (SDS)"
      - "Cold calls de BDR"

    evidencias:
      - citacao: "CLOSER Framework: C-Clarify, L-Label outcome, O-Overview past pain, S-Sell vacation, E-Explain concerns, R-Reinforce decision"
        chunk_id: "AH001_005"
        source_id: "AH-SS001"
        source_title: "How I Scaled My Sales Team [Taki Moore Mastermind]"

    insight_origem: "CL001"

    dominios:
      - "sales-process"
      - "scripts"
      - "closing"

    peso: 0.95  # Framework nomeado + citação direta + muito usado

  - id: "FW-AH-002"
    nome: "3 Buckets de Objeção"
    tipo: "lista"

    estrutura:
      elementos:
        - nome: "Decision Maker"
          descricao: "Precisa consultar outra pessoa"
          estrategia: "Past agreements + 'ask forgiveness not permission'"

        - nome: "Price"
          descricao: "Acha caro ou não tem dinheiro"
          estrategia: "Ancorar no valor, construir convicção, levar pra eventos"

        - nome: "Delay"
          descricao: "Quer pensar, não é o momento"
          estrategia: "Best case/worst case, Decision Framework (3 Yes = go)"

    como_usar: |
      Toda objeção cai em um desses 3 buckets.
      Identificar qual bucket antes de responder.
      Aplicar estratégia específica do bucket.

    output_esperado: "Objeção categorizada e estratégia de handling clara."

    quando_usar:
      - "Qualquer objeção em call de vendas"
      - "Treinamento de closers"
      - "Análise de calls perdidas"

    quando_nao_usar:
      - "Objeções técnicas sobre o produto"
      - "Objeções de compliance/legal"

    evidencias:

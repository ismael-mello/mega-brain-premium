  - id: "FW-AH-005"
    nome: "Beta Process (Remover Founder)"
    tipo: "sequencia"

    estrutura:
      passos:
        - nome: "Ask clients problems"
          descricao: "Perguntar aos clientes quais problemas estão tendo"

        - nome: "Top 1% roundtable"
          descricao: "Reunir os top 1% clientes em roundtable"

        - nome: "Find common things"
          descricao: "Encontrar coisas que TODOS os top performers fazem (não alguns)"

        - nome: "Consolidate solution"
          descricao: "Consolidar em solução replicável"

        - nome: "Test on bottom 10%"
          descricao: "Testar a solução nos bottom 10% clientes"

    como_usar: |
      Usar para criar processos que não dependem do founder.
      Processo gera inovação, não guru.
      Bottom 10% é o teste real - se funcionar lá, funciona em qualquer lugar.


  - id: "FW-AH-009"
    nome: "Framework 3A para Objeções"
    tipo: "sequencia"

    estrutura:
      componentes:
        - nome: "A - Acknowledge"
          descricao: "Reconhecer a objeção sem resistir"
          perguntas:
            - "Entendo completamente, faz sentido..."
            - "Você tem razão em pensar assim..."

        - nome: "A - Associate"
          descricao: "Associar a uma experiência ou cliente similar"
          perguntas:
            - "Muitos dos nossos melhores clientes pensavam isso também..."
            - "Eu teria a mesma preocupação..."

        - nome: "A - Ask"
          descricao: "Fazer pergunta que avança a conversa"
          perguntas:
            - "Me conta mais sobre isso - o que especificamente te preocupa?"
            - "Se isso não fosse um problema, você avançaria?"

    como_usar: |
      Usar SEMPRE que surgir objeção durante call.
      Mantém rapport enquanto avança a conversa.
      Não confrontar - absorver e redirecionar.
      Mais eficaz que rebater diretamente.

    output_esperado: "Objeção neutralizada sem perder rapport, conversa continua fluindo."

    quando_usar:
      - "Qualquer objeção durante call de vendas"
      - "Prospect resistente mas ainda engajado"
      - "Objeções de preço, tempo, decision maker"

    quando_nao_usar:
      - "Prospect claramente desqualificado"
      - "Objeção é dealbreaker real"

    evidencias:
      - citacao: "Framework 3A para objeções: Acknowledge (reconheça), Associate (associe), Ask (pergunte) - mantém rapport enquanto avança"

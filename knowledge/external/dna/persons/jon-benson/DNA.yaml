  L5_METHODOLOGIES:
      - id: "MET-JB-001"
        title: "Complete VSL Creation Process"
        description: "End-to-end methodology for creating a VSL: (1) Research: Identify USP using USP Factory -> (2) Story: Write Nightmare + Dream stories -> (3) Tips: Create 3 tips (Avoid, Enjoy, How-To) -> (4) Comparisons: Build 4 comparisons (2 heavy, 2 light) -> (5) Structure: Assemble using 5-Step VSL Process -> (6) Subliminals: Add red text, action drops, anchor drops -> (7) Review: Check against 4 Buyer Modalities -> (8) Polish: Paraphrase cycle + transitions."
        domains: ["vsl-creation", "copywriting", "production"]
        source: "3XVSL"
      - id: "MET-JB-002"
        title: "USP Creation Methodology"
        description: "Step-by-step USP development: (1) List all product benefits -> (2) Identify the PRIME benefit (what buyers care most about) -> (3) Create 5 Power Phrases (emotional hooks) -> (4) Craft 3 Enabler Phrases (mechanisms) -> (5) Combine best Power Phrase + Prime Benefit + best Enabler -> (6) Test: Is it 20 words or fewer? -> (7) Test: Would your buyer say this is why they buy? -> (8) Iterate until both tests pass."
        domains: ["copywriting", "positioning", "usp-design"]
        source: "3XVSL"
      - id: "MET-JB-003"
        title: "Nightmare Story Writing Process"
        description: "How to write the nightmare story: (1) Identify your (or your client's) lowest point related to the problem -> (2) Open with Specifics Strategy (date, weather, clothing, location) -> (3) Escalate the Bad Part (make it progressively worse) -> (4) Hit the Focal Point (absolute rock bottom) -> (5) Write the Declaration of Independence (turning point) -> (6) Craft the Moral (bridge to solution without pitching) -> (7) Review: Does it create empathy, not pity?"
        domains: ["storytelling", "copywriting", "emotional-design"]
        source: "3XVSL"
      - id: "MET-JB-004"
        title: "Dream Story Writing Process"
        description: "How to write the dream story: (1) Identify 2-3 authorities who exemplify the outcome -> (2) Write Follow the Leader opening referencing them -> (3) Share personal specifics (what you did, achieved) -> (4) Generalize results to 'they' (people who use this approach) -> (5) Write transition phrase to next section -> (6) Close with Present Tense Promise (future as if already real) -> (7) Review: Is the dream THEIRS, not yours?"
        domains: ["storytelling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "MET-JB-005"
        title: "Tip Writing Process"
        description: "How to write each tip: (1) Start with the BENEFIT (what they get from this tip) -> (2) Name the tip (What Is It) -> (3) Explain How To apply it (actionable steps) -> (4) State the Result (what happens when they apply it) -> (5) Add Mini Dream Story (paint the specific outcome) -> (6) Ensure tip type matches position: Avoid first, Enjoy second, How-To third."
        domains: ["vsl-structure", "copywriting", "engagement"]
        source: "3XVSL"
      - id: "MET-JB-006"
        title: "Snap Suggestion Assembly"
        description: "How to build the opening: (1) Write optional intro (under 3 slides, context only) -> (2) Choose Pattern Interrupt type (image from nightmare story OR linguistic surprise) -> (3) Craft Big Promise (specific, numbered, tangible) -> (4) Add Video Scarcity (believable reason) -> (5) Write Let's Make a Deal (value exchange) -> (6) Review: Does it stop scrolling within 5 seconds?"
        domains: ["vsl-structure", "attention-capture", "production"]
        source: "3XVSL"
      - id: "MET-JB-007"
        title: "Conspiracy Cycle Construction"
        description: "How to build the Big Problem section: (1) Identify the industry Big Lie (what everyone is told that isn't true) -> (2) Write Not Your Fault (absolve the prospect) -> (3) Identify external Blame Target (system, industry, establishment) -> (4) Reveal the Big Truth (the real answer) -> (5) Open Bigger Solution loop (tease without revealing product) -> (6) Review: Does it make the prospect angry at the system, not at themselves?"
        domains: ["problem-framing", "persuasion", "vsl-creation"]
        source: "3XVSL"
      - id: "MET-JB-008"
        title: "Grand Offer Assembly"
        description: "How to build the Grand Offer: (1) Describe the Product clearly -> (2) Stack value before revealing Price -> (3) Write CTA (repeat 3+ times) -> (4) Alternate Pain/Pleasure points -> (5) List specific Actions buyer will take -> (6) List specific Results they will get -> (7) Write Q&A addressing top 5-7 objections -> (8) Review: Does every section move toward the click/purchase?"
        domains: ["offer-design", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "MET-JB-009"
        title: "Comparison Writing Process"
        description: "How to create all 4 comparisons: (1) Competition: Research alternatives, identify weaknesses, position your approach as different -> (2) With/Without: Mirror 3-5 pain points with 3-5 resolutions -> (3) General: Broad market statements that position your category -> (4) Specific-to-Tip: Connect each comparison to a specific tip already delivered. Heavy comparisons go before Grand Offer; light comparisons are sprinkled throughout."
        domains: ["comparison", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "MET-JB-010"
        title: "Subliminal Layer Implementation"
        description: "How to add subliminal influence: (1) Identify 5-8 power words for red text highlighting (Decide, Freedom, Secret, Now, You, Today) -> (2) Place Action Drops every 3-5 slides (Today, Now, You See, Listen, Actually) -> (3) Add Anchor Drops at transition points (yet, because, guess what) -> (4) Review: Are subliminals natural or forced? If forced, remove."
        domains: ["vsl-creation", "persuasion", "visual-psychology"]
        source: "3XVSL"
      - id: "MET-JB-011"
        title: "4 Buyer Modalities Integration"
        description: "How to address all 4 buyer types: (1) Why Buyers: Include reason and context in Vital Connection and Big Problem -> (2) What Buyers: Include detailed information in Tips and Product description -> (3) How-To Buyers: Include step-by-step in How-To Tip and Actions section -> (4) What-If Buyers: Include possibilities in Dream Story and Future Pacing. Review each section for modality coverage."
        domains: ["buyer-psychology", "copywriting", "vsl-creation"]
        source: "3XVSL"
      - id: "MET-JB-012"
        title: "Even If Technique Implementation"
        description: "How to use Even If for objection handling: (1) List top 10 objections prospects have -> (2) Rank by frequency -> (3) Convert each to 'Even if...' statement -> (4) Place top 3 in Grand Offer CTA area -> (5) Sprinkle remaining through Tips and Comparisons -> (6) Test: Does each 'Even if' address a REAL objection, not an imagined one?"
        domains: ["objection-handling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "MET-JB-013"
        title: "Hero Study Execution"
        description: "How to build Hero Study: (1) Identify 3-5 respected authorities in your space -> (2) Research their methods and results -> (3) Extract 2-3 patterns that align with your approach -> (4) Write 'their success can be your success' narrative -> (5) Position your product as embodying these proven patterns -> (6) Never claim to BE them — claim to have LEARNED from them."
        domains: ["authority-building", "social-proof", "credibility"]
        source: "3XVSL"
      - id: "MET-JB-014"
        title: "Vital Connection Building"
        description: "How to create the Vital Connection: (1) Acknowledge the prospect's current situation -> (2) Demonstrate understanding of their frustrations -> (3) Share a brief 'I've been there' statement -> (4) Bridge to 'what I discovered' -> (5) Transition smoothly to Big Problem section -> (6) Review: Does the viewer feel 'this person gets me'?"
        domains: ["rapport", "trust-building", "vsl-structure"]
        source: "3XVSL"
      - id: "MET-JB-015"
        title: "Transition to Grand Offer Execution"
        description: "How to execute the closing transition: (1) After How-To Tip, pause — acknowledge they've received value -> (2) Present Two Choices (do nothing vs. act) -> (3) Label acting as 'the savvy choice' -> (4) State 'I've done the work for you' -> (5) Reveal product: 'It's called...' -> (6) Immediately describe what it is and does -> (7) Review: Does the transition feel earned, not forced?"
        domains: ["closing", "vsl-structure", "persuasion"]
        source: "3XVSL"
      - id: "MET-JB-016"
        title: "Paraphrase Cycle Execution"
        description: "How to implement paraphrase cycles: (1) Identify 3-5 core messages of the VSL -> (2) After every 5-15 slides, check if a core message needs reinforcing -> (3) Choose a paraphrase vehicle: analogy, example, reframe, or different angle -> (4) Write the paraphrase so it adds NEW insight, not just repetition -> (5) Ensure paraphrases use different vocabulary than originals."
        domains: ["retention", "engagement", "copywriting"]
        source: "3XVSL"
      - id: "MET-JB-017"
        title: "Open Loop Management"
        description: "How to manage curiosity loops: (1) Open major loop in Snap Suggestion (the big secret/revelation) -> (2) Open 2-3 micro-loops in each section (teases of upcoming content) -> (3) Close micro-loops within their section to build trust -> (4) Keep major loop open until product reveal -> (5) Make product the ONLY way to fully close the major loop -> (6) Test: Can viewer close any loop without buying? If yes, redesign."
        domains: ["engagement", "persuasion", "vsl-creation"]
        source: "3XVSL"
      - id: "MET-JB-018"
        title: "Tire Kicker Elimination Execution"
        description: "How to implement tire kicker filter: (1) Place early in VSL (within first 3 minutes) -> (2) State clearly: 'If you're looking for a magic pill or get-rich-quick scheme, please close this video now' -> (3) Follow with: 'But if you're serious about...' -> (4) This self-selects committed viewers -> (5) Review: Does it feel genuine, not manipulative?"
        domains: ["qualification", "engagement", "trust-building"]
        source: "3XVSL"
      - id: "MET-JB-019"
        title: "VSL Slide Design Process"
        description: "How to design VSL slides: (1) Use Title Case for all text -> (2) One key idea per slide -> (3) Highlight power words in red -> (4) Keep background simple (solid color or subtle gradient) -> (5) Use large, readable font -> (6) Add Action Drop words naturally -> (7) Test readability at smallest expected viewing size."
        domains: ["vsl-creation", "visual-design", "production"]
        source: "3XVSL"
      - id: "MET-JB-020"
        title: "Q&A Section Construction"
        description: "How to build the Q&A objection sweep: (1) List every objection you've ever heard about this type of product -> (2) Rank top 5-7 by frequency -> (3) Frame each as a question: 'You might be wondering...' -> (4) Answer each concisely (2-3 sentences) -> (5) End each answer with a mini push toward the CTA -> (6) Close Q&A section with final CTA."
        domains: ["objection-handling", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "MET-JB-021"
        title: "Price Reveal Methodology"
        description: "How to present price for maximum acceptance: (1) Build complete value stack first -> (2) Anchor with higher comparison price -> (3) Reveal actual price as contrast -> (4) Follow immediately with guarantee/risk reversal -> (5) Restate value received vs. price paid -> (6) CTA immediately after. Never allow price to sit alone without value context."
        domains: ["pricing", "offer-design", "closing"]
        source: "3XVSL"
      - id: "MET-JB-022"
        title: "Nightmare Story Object Selection"
        description: "How to choose the pattern interrupt image: (1) List all physical objects mentioned in nightmare story -> (2) Choose the one with strongest emotional association -> (3) Use it as the opening visual of the VSL -> (4) This connects the emotional story to the visual hook before the viewer even hears the story -> (5) Test: Does seeing this object trigger curiosity or emotional response?"
        domains: ["vsl-creation", "visual-design", "storytelling"]
        source: "3XVSL"
      - id: "MET-JB-023"
        title: "Buyer Modality Audit"
        description: "How to verify all 4 modalities are addressed: (1) Highlight all Why content in blue -> (2) Highlight all What content in green -> (3) Highlight all How-To content in yellow -> (4) Highlight all What-If content in purple -> (5) If any color is absent from a major section, add content for that modality -> (6) Ensure no single modality dominates more than 35% of total content."
        domains: ["buyer-psychology", "copywriting", "quality-assurance"]
        source: "3XVSL"
      - id: "MET-JB-024"
        title: "Emotional Arc Verification"
        description: "How to verify the VSL emotional arc is correct: (1) Map each section to its target emotion -> (2) Verify sequence: Curiosity -> Connection -> Anger -> Empathy -> Hope -> Trust -> Desire -> Action -> (3) Check for emotional dead zones (sections that don't evoke anything) -> (4) Ensure no emotion is sustained for more than 3-4 minutes -> (5) Add emotional transitions between sections if abrupt."
        domains: ["emotional-design", "vsl-creation", "quality-assurance"]
        source: "3XVSL"
      - id: "MET-JB-025"
        title: "Competition Research for Comparisons"
        description: "How to research for competition comparison: (1) Identify top 3-5 alternatives prospects consider -> (2) List their key features and claims -> (3) Identify gaps or weaknesses in their approach -> (4) Map your unique advantages against those gaps -> (5) Write comparison that highlights your differentiation WITHOUT naming competitors -> (6) Test: Is it ethical? Could you say it if they were in the room?"
        domains: ["comparison", "research", "positioning"]
        source: "3XVSL"
      - id: "MET-JB-026"
        title: "With/Without Comparison Construction"
        description: "How to build the most powerful comparison: (1) List 5 current pain points of life WITHOUT product -> (2) For each, write the corresponding state WITH product -> (3) Mirror them: pain #1 -> resolution #1, pain #2 -> resolution #2 -> (4) Present as two-column or alternating format -> (5) End with strongest pair last (escalation) -> (6) Follow immediately with CTA."
        domains: ["comparison", "closing", "emotional-design"]
        source: "3XVSL"
      - id: "MET-JB-027"
        title: "Dream Story Present Tense Writing"
        description: "How to write present tense future pacing: (1) Choose 3-5 desired outcomes of using the product -> (2) Write each as if happening right now: 'You wake up and...' / 'You check your...' -> (3) Include sensory details (what they see, feel, hear) -> (4) Make it a 60-90 second narrative, not a bullet list -> (5) Close with an emotional peak moment."
        domains: ["storytelling", "persuasion", "copywriting"]
        source: "3XVSL"
      - id: "MET-JB-028"
        title: "Bigger Solution Section Assembly"
        description: "How to assemble the Bigger Solution: (1) Start with Avoid Tip (fear-based, addresses the 'why' modality) -> (2) Follow with Enjoy Tip (aspiration-based, addresses 'what-if' modality) -> (3) Close with How-To Tip (actionable, linchpin — strongest reciprocity builder) -> (4) After How-To Tip, begin Transition to Grand Offer sequence -> (5) Each tip follows the Tip Formula (Benefit -> What Is It -> How To -> Result -> Mini Dream Story)."
        domains: ["vsl-structure", "persuasion", "production"]
        source: "3XVSL"
      - id: "MET-JB-029"
        title: "Actions/Results Section Writing"
        description: "How to write the Actions/Results section: (1) List 5-7 specific actions the buyer will take with the product -> (2) For each action, state the result -> (3) Format: 'First, you'll [ACTION], which gives you [RESULT]' -> (4) Escalate — start with easy actions, end with transformative ones -> (5) Final action/result pair should mirror the Big Promise from Snap Suggestion."
        domains: ["offer-design", "closing", "copywriting"]
        source: "3XVSL"
      - id: "MET-JB-030"
        title: "Pain/Pleasure Close Execution"
        description: "How to execute pain/pleasure in Grand Offer: (1) Write 3 pain statements (consequences of not buying) -> (2) Write 3 pleasure statements (benefits of buying) -> (3) Alternate: Pain #1 -> Pleasure #1 -> Pain #2 -> Pleasure #2 -> Pain #3 -> Pleasure #3 -> (4) End on pleasure (final image should be positive) -> (5) Follow immediately with CTA."
        domains: ["closing", "emotional-design", "persuasion"]
        source: "3XVSL"
      - id: "MET-JB-031"
        title: "VSL Review Checklist"
        description: "Final quality review before publishing: (1) USP present and under 20 words? -> (2) Both stories (nightmare + dream) present? -> (3) All 3 tip types in correct order? -> (4) All 4 comparisons present (2 heavy, 2 light)? -> (5) Grand Offer has all 6 parts? -> (6) All 4 buyer modalities addressed? -> (7) Subliminals natural (not forced)? -> (8) Transitions smooth between sections? -> (9) Total length 28-32 minutes? -> (10) Paraphrase cycles present?"
        domains: ["quality-assurance", "vsl-creation", "production"]
        source: "3XVSL"
      - id: "MET-JB-032"
        title: "Inclusion Statement Placement"
        description: "How to place inclusion statements throughout VSL: (1) In Vital Connection: 'You're not alone in feeling...' -> (2) After Tips: 'Thousands have already discovered...' -> (3) In Grand Offer: 'Join the growing community of...' -> (4) In Q&A: 'Most of our members found...' -> (5) Never use fake numbers. Vague inclusion ('many', 'thousands') is better than specific lies."
        domains: ["social-proof", "copywriting", "trust-building"]
        source: "3XVSL"
        # === CHAT VSL (CVSL) — 16 new methodologies ===
      - id: "MET-JB-033"
        title: "Complete Buyer's Roadmap Build Process"
        description: "Step-by-step roadmap creation: (1) Open ChatGPT-4 Plus, (2) Input niche in 2-4 words, (3) Run SEARCH 1 prompt to generate 12 data fields, (4) Review and refine each field manually, (5) Run branding prompt 5-12 times for positive and negative hooks, (6) Select best hooks based on mystery and scientific sound, (7) Run offer branding prompt for name, price, guarantee, bonuses, (8) Copy entire roadmap data before any VSL prompt."
        domains: ["ai-copywriting", "market-research", "methodology"]
        source: "CVSL"
      - id: "MET-JB-034"
        title: "Pattern Interrupt Creation (Movie Scene)"
        description: "Pattern interrupt creation methodology: (1) Write movie-scene prompt with visual setting and anchor object, (2) Include all buyer roadmap data in prompt, (3) Specify: no exclamation marks, no hype, conversational tone, (4) Generate pattern interrupt, (5) Run pattern interrupt REFINER to add anchor object and remove sales language, (6) Review for dimensionalization, (7) Ensure open loop at end leading to lead section."
        domains: ["ai-copywriting", "pattern-interrupt", "vsl-creation"]
        source: "CVSL"
      - id: "MET-JB-035"
        title: "Two-Shot AI Training for Nightmare Stories"
        description: "In-context training methodology: (1) Gather 3 example nightmare stories from different niches, (2) Paste all 3 examples BEFORE the prompt, (3) Add buyer roadmap data, (4) Instruct AI to write a nightmare story in the STYLE of the examples, (5) Do NOT give rigid structural instructions — let AI learn the pattern from examples, (6) Refine for dimensionalization and anchor object continuity."
        domains: ["ai-copywriting", "storytelling", "prompt-engineering"]
        source: "CVSL"
      - id: "MET-JB-036"
        title: "Hook Generation Process"
        description: "Unique mechanism naming methodology: (1) Run branding prompt with buyer roadmap data, (2) Review 4-6 options generated, (3) Re-run prompt 5-12 more times, (4) Collect 20-50+ hook name options, (5) Filter: must be 3-4 words max, Title Case, scientific/mysterious sounding, (6) Test: does it sound like something you'd Google?, (7) Select best positive hook and best negative hook."
        domains: ["branding", "offer-construction", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-037"
        title: "Grand Offer Assembly (6 Parts)"
        description: "Step-by-step Grand Offer creation: (1) Write 3 Choices intro (do nothing / DIY / smart path), (2) Write product features using So-Rather-Than formula for each benefit, (3) Build faux price stack with retail values > 2x offer price, (4) Write dimensional bonus descriptions with That-Means-You-Get-To formula, (5) Write guarantee with immediate community inclusion, (6) Write NLP close: future pacing (7d + 30d) + presupposition + click anchor + CTA."
        domains: ["offer-design", "closing", "vsl-creation"]
        source: "CVSL"
      - id: "MET-JB-038"
        title: "VSL Editing and Refinement Process"
        description: "Post-generation editing methodology: (1) Read full output aloud — mark anything that sounds like 'radio voice', (2) Run refiner prompt on flagged sections, (3) Check dimensionalization: can you SEE and FEEL every claim?, (4) Remove ALL exclamation marks, (5) Verify anchor object appears in interrupt + nightmare + offer, (6) Ensure all open loops are closed, (7) Check facts — AI lies, (8) Final pass for tone consistency."
        domains: ["editing", "quality-assurance", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-039"
        title: "Refiner Prompt Methodology"
        description: "Copy refinement process: (1) Identify flat/generic sections in AI output, (2) Paste section into refiner prompt, (3) Specify: make more dimensional, add sensory language, remove hype, (4) Compare original vs refined, (5) Take best parts of both, (6) Re-run refiner on still-flat sections, (7) Maximum 3 refinement passes per section — diminishing returns after that."
        domains: ["ai-copywriting", "editing", "dimensionalization"]
        source: "CVSL"
      - id: "MET-JB-040"
        title: "Offer Branding Process"
        description: "Complete offer branding methodology: (1) Start with buyer roadmap data, (2) Generate offer name options (5+ iterations), (3) Generate bonus names and values using tilde-separated format, (4) Assign retail values that stack to 4-8x the real price, (5) Write guarantee name and terms, (6) Compile testimonial data for social proof sections."
        domains: ["branding", "offer-design", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-041"
        title: "Bullet Expansion Methodology"
        description: "Converting bullet points to dimensional paragraphs: (1) Take a single bullet/benefit, (2) Run through expansion prompt targeting ~200 words, (3) Structure: restate concept + why it matters + specific example + before/after picture + connect to daily life, (4) Check for sensory language, (5) Ensure no generic claims remain."
        domains: ["copywriting", "expansion", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-042"
        title: "Returns/Slides Formatting"
        description: "Converting VSL copy to slide format: (1) Take completed VSL text, (2) Run create returns prompt, (3) Break into 1-2 sentence slides, (4) Each slide = one thought or image, (5) Add slide transition markers, (6) Include red text markers for subliminal emphasis words, (7) Timing: average 2-3 seconds per slide."
        domains: ["vsl-production", "formatting", "production"]
        source: "CVSL"
      - id: "MET-JB-043"
        title: "Different Goals Prompt Usage"
        description: "Preventing AI repetition methodology: (1) When AI generates similar goals/complaints/benefits repeatedly, (2) Use the Different Goals prompt which explicitly says 'do NOT repeat any of the following: [paste existing]', (3) Force AI into new creative territory, (4) Run 3-4 times to build a diverse pool, (5) Select best from each run."
        domains: ["ai-copywriting", "variety-generation", "prompt-engineering"]
        source: "CVSL"
      - id: "MET-JB-044"
        title: "Get Specific Prompt Usage"
        description: "Fact-based selling methodology: (1) Identify vague claims in copy (some, many, often), (2) Run Get Specific prompt on each claim, (3) AI finds or creates supporting statistics, studies, dates, (4) CRITICAL: verify every fact AI provides — it lies, (5) Replace vague claims with specific, verifiable data, (6) Add attribution where possible."
        domains: ["credibility", "fact-checking", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-045"
        title: "Simple VSL Funnel Build"
        description: "Minimum viable funnel methodology (via Jeff Johnson/$100M Funnel): (1) Create squeeze page with single opt-in, (2) VSL page with delayed buy button at 20-25 min, (3) Include both button AND text hyperlink CTA, (4) Simple order form, (5) One-Time Offer 1, (6) One-Time Offer 2, (7) Thank you page with superbonus countdown, (8) Test with $50-100/day traffic before scaling."
        domains: ["funnel-design", "traffic", "conversion-optimization"]
        source: "CVSL"
      - id: "MET-JB-046"
        title: "YouTube Ad Script with AI"
        description: "AI-powered YouTube ad creation (via John Mulry/E5): (1) Define perfect persona using AI prompts, (2) Script hook for first 5 seconds (skippable threshold), (3) Establish pain point in seconds 5-15, (4) Introduce solution with proof, (5) Direct CTA, (6) Shoot in 'talking head' format, (7) Test 3-5 script variations, (8) Scale winners with broad targeting."
        domains: ["ad-scripting", "youtube-ads", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-047"
        title: "Unique Mechanism Naming"
        description: "Complete hook naming methodology: (1) Review buyer roadmap for root cause (negative) and secret sauce (positive), (2) Run branding prompt with data, (3) Generate 4-6 options per run, (4) Repeat 5-12 runs, (5) Build list of 20-50 candidates, (6) Filter: 3-4 words max, Title Case, mysterious, scientific, (7) Test: would you Google this?, (8) Select best negative + best positive hook."
        domains: ["branding", "naming", "offer-construction"]
        source: "CVSL"
      - id: "MET-JB-048"
        title: "Metabolic Dissection Analysis"
        description: "Advanced VSL reverse-engineering methodology (from Bonus 2): (1) Take a proven high-revenue VSL, (2) Map all 9 attention frames, (3) Identify and number every open loop, (4) Mark where each loop opens and closes, (5) Identify NLP techniques line by line, (6) Map transition triggers between sections, (7) Note pricing psychology architecture, (8) Document the emotional journey curve, (9) Extract reusable patterns for your own VSL."
        domains: ["copywriting-education", "analysis", "pattern-recognition"]
        source: "CVSL"
      - id: "MET-JB-350"
        title: "SNAP Suggestion Method"
        description: "Image interrupt + 3 promises + scarcity + yes-question."
        domains: ["vsl-creation"]
        source: "3XBONUS-100M"
      - id: "MET-JB-352"
        title: "Frictionless Checkout"
        description: "Show screenshot, seals, exact button. 21% lift."
        domains: ["checkout-optimization"]
        source: "3XBONUS-100M"
      - id: "MET-JB-354"
        title: "Future Pacing"
        description: "Future > present tense drift. Specific daily life. No photos."
        domains: ["copywriting"]
        source: "3XBONUS-100M"
      - id: "MET-JB-356"
        title: "NLP Anchor Drops"
        description: "NOW Remember In-order-to. Every 5-10 slides."
        domains: ["nlp-techniques"]
        source: "3XBONUS-100M"
      - id: "MET-JB-358"
        title: "Three Emotional Triggers Close"
        description: "PAIN/LOSS + FREEDOM/PLEASURE + VALIDATION."
        domains: ["closing-techniques"]
        source: "3XBONUS-100M"
      - id: "MET-JB-400"
        title: "Week 1 Topic Research"
        description: "What teach free + survey + passion x demand."
        domains: ["product-creation"]
        source: "3XBONUS-28DAY"
      - id: "MET-JB-403"
        title: "Week 4 Launch"
        description: "Opt-in Kindle ClickBank 75% video upsell."
        domains: ["product-launch"]
        source: "3XBONUS-28DAY"
      - id: "MET-JB-500"
        title: "Facebook Revenue Pipeline"
        description: "Like ads > blog > promos > chat > webinars."
        domains: ["facebook-traffic"]
        source: "3XBONUS-TP"
      - id: "MET-JB-501"
        title: "YouTube Revenue System"
        description: "Sub-niche validate AdWords banner CTA."
        domains: ["youtube-traffic"]
        source: "3XBONUS-TP"
      - id: "MET-JB-502"
        title: "Lead Scoring Automation"
        description: "Score engagement personalize progressive button."
        domains: ["conversion-optimization"]
        source: "3XBONUS-TP"
      - id: "MET-JB-548"
        title: "18 Step Sales Page Construction Method"
        description: "Step-by-step method to write a complete text sales page: 1) Write attention pre-headline, 2) Craft headline with benefit formula, 3) Optional sub-headline with rapport/backup, 4) Write You-heavy rapport intro (5 paragraphs), 5) One-line 'here is what will happen,' 6) Subheadline 1: Big Problem + Did You Know copy, 7) Subheadline 2: What It Isnt + Listen paragraph, 8) Subheadline 3: The Answer/Hook + 4 Es, 9) Subheadline 4: Us vs Them comparison, 10) Subheadline 5: Works for Anyone, 11) Special Sauce explanation, 12) Objections answered, 13) Subheadline 6: How You Will Feel (future-paced), 14) Subheadline 7: Everything You Need + product intro, 15) Recap, 16) Subheadline 8-18: Hard to Find through Better Choice, 17) Order Button, 18) Signature + PS/PPS."
        domains: ["copywriting", "sales-pages", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-549"
        title: "Article Page Creation Method"
        description: "Step-by-step to create the article page that precedes the sales page: 1) Write short headline with number + byline, 2) Write 3-7 'Did you know' paragraphs including personal intro and negatives, 3) Create sub-headline that acts as the real headline, 4) Write 3-5 command-verb bullet points (Stop, Forget, Avoid, Work), 5) Add optional warning, 6) End with 'What do I do next?' + link to sales page. Test with and without article page — it often wins."
        domains: ["copywriting", "funnel-design", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-550"
        title: "Hook Discovery and Trademarking Method"
        description: "Method for discovering and branding your hook: 1) Identify the one thing your product does better than competition, 2) Create a branded term (F4X, Caloric Staggering, etc.), 3) Test if customers reference the hook name organically, 4) Consider phonetic associations (F4X sounds like P90X), 5) Embed hook in Subheadline 3 of sales page formula, 6) Separate from Special Sauce — hook opens the door, special sauce keeps them inside."
        domains: ["positioning", "branding", "copywriting"]
        source: "5MSLF"
      - id: "MET-JB-551"
        title: "Duality Objection Handling Method"
        description: "Method for writing objection sections in duality: 1) List common objections as quoted statements ('But I am 69 years old'), 2) Start each answer with a positive word (Great! Ideal! Terrific!), 3) Reframe the objection as an advantage, 4) Maintain conversational duality — address both lizard brain and logical brain, 5) Use graphics/formatting to make objections visually distinct."
        domains: ["copywriting", "objection-handling", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-552"
        title: "Negative to Positive Price Justification Method"
        description: "Method for the 'Why it is just $X' section: 1) State the price using 'Why it is just' framing (assumes affordability), 2) List apparent negatives (not professionally published, only 16 pages, no fancy cover), 3) Reframe each negative as positive (raw = real, short = dense, no cover = substance), 4) Use treasure map analogy ('How many pages does a treasure map need?'), 5) Make reader feel silly for caring about superficial things."
        domains: ["pricing-psychology", "copywriting", "objection-handling"]
        source: "5MSLF"
      - id: "MET-JB-553"
        title: "Future Pacing in Copy Method"
        description: "Method for writing future-paced sections: 1) Use 'Imagine this day with me' as opener (physical + mental engagement), 2) Write in present tense, not future ('You remain in control' not 'You will feel'), 3) Describe the daily experience after purchase, 4) Include sensory details the avatar cares about, 5) Embed 'by now' as subliminal 'buy now,' 6) End with order button immediately after the vision."
        domains: ["copywriting", "future-pacing", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-554"
        title: "Rapport Intro Writing Method"
        description: "Method for writing the You-heavy rapport intro: 1) Count 'you' usage — aim for 7-9 in first paragraph, 2) Keep paragraphs to 3 lines maximum, 3) Use 'Did you know' questions instead of declarative statements, 4) Avoid judgment entirely in opening paragraphs, 5) Optional: Use 'Fact:' style intro but only in niches where you are the original user."
        domains: ["copywriting", "rapport-building", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-555"
        title: "Avatar Voice Capture Method"
        description: "Method for capturing your avatar's voice before writing: 1) Define demographic precisely (age, gender, lifestyle), 2) Identify their worldview and frustrations, 3) Learn their specific vocabulary and slang, 4) Write as if you ARE them talking, 5) Test double entendres against their cultural references ('new-age' for older audience), 6) Validate tone against real customer language."
        domains: ["copywriting", "market-awareness", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-556"
        title: "Email Subject Line Number Optimization Method"
        description: "Method for optimizing email subject lines: 1) Always include a number (numbers outperform non-numbers), 2) Prefer odd numbers over even, 3) Be specific (7 not 'several'), 4) Use odd characters sparingly for pattern break, 5) Test 'two words that always work' variations, 6) Use 3-magazine trick (combine three unrelated topics), 7) Measure and resend to un-opens with modified subject."
        domains: ["email-marketing", "subject-lines", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-557"
        title: "Email Intimacy Writing Method"
        description: "Method for creating intimate-feeling mass emails: 1) Write as if to one specific person, 2) Use first name and 'you' language throughout, 3) Use personal confession-style content, 4) Keep sentences to 10-15 words, 5) Never start with a greeting, 6) Make the first line provocative or curiosity-driven (it is the preview text), 7) End with PS that functions as second headline."
        domains: ["email-marketing", "rapport-building", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-558"
        title: "NLP Three Link Email Method"
        description: "Method for placing three links in every email: 1) Place first link early in email (catches curiosity-driven readers), 2) Place second link mid-email after value delivery (catches value-seekers), 3) Place third link late after urgency statement (catches fear-motivated readers), 4) Each link catches different reader psychologies, 5) Use 'next page' framing instead of 'click to buy' for final link."
        domains: ["email-marketing", "nlp", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-559"
        title: "Resend to Un-Opens Method"
        description: "Method for recapturing non-openers: 1) Send initial email, 2) Wait appropriate interval, 3) Identify non-openers from email platform, 4) Modify subject line (not body), 5) Resend to non-openers only, 6) Expect 15-30% additional opens, 7) Track incremental revenue separately."
        domains: ["email-marketing", "list-management", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-560"
        title: "Auto Responder Seduction Sequence Method"
        description: "Method for building an auto-responder sequence: 1) Email 1: Intrigue — curiosity hook, personal angle, 2) Email 2-3: Rapport — personal story, shared struggles, 3) Email 4-5: Value — teaching content, tips, 4) Email 6: Intimacy — deeper personal revelation, 5) Email 7: Offer — natural transition from relationship to sale, 6) Space emails equidistantly, 7) Each email builds on previous relationship."
        domains: ["email-marketing", "sequencing", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-561"
        title: "Modality Shifting Campaign Method"
        description: "Method for extending campaign life through modality shifts: 1) Launch with VSL as primary, 2) Create text sales page alternate, 3) Run 50/50 split test, 4) Use article page as exit popup format, 5) Add webinar as follow-up modality, 6) Route non-buyers through different modalities over time, 7) Each shift captures people who did not respond to previous format."
        domains: ["marketing-strategy", "conversion-optimization", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-562"
        title: "Four Es Proof Section Construction Method"
        description: "Method for building the proof section: 1) Choose minimum 2 of 4 Es, 2) Engagers: Include 2-3 testimonials from real users, 3) Evidence: Cite studies, data, or research, 4) Experience: Share your personal story with the product, 5) Expertise: Reference authority credentials, 6) Weave into 3-7 paragraph description of the hook, 7) Format: 'In fact, Mary says... A report from Stanford shows... My own experience tells me... Dr. So-and-so confirms...'"
        domains: ["copywriting", "proof-elements", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-563"
        title: "Scarcity Section Real vs False Method"
        description: "Method for writing real scarcity: 1) Choose a real limitation (limited copies, price increase date, enrollment window, seats available), 2) Write 3-5 paragraphs with compelling reasons to act now, 3) Be specific ('Only 1000 initial copies at this price'), 4) If using price increase: 'I may increase the price' only if true, 5) Sleep test — can you sleep at night with this claim? If not, change it."
        domains: ["copywriting", "scarcity", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-564"
        title: "PPS Encapsulation Writing Method"
        description: "Method for writing the PPS: 1) Summarize entire sales letter in approximately 5 lines, 2) Include the main hook, key benefit, and price, 3) Place after signature and first PS, 4) Optional: Add PPPS with provocative close ('If you are not sold at this point, I do not feel sorry for you'), 5) Include final order button below PPS."
        domains: ["copywriting", "sales-pages", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-565"
        title: "VSL Pattern Break Slide Method"
        description: "Method for VSL slide construction with pattern breaks: 1) Write most slides with every word displayed, 2) Every 5th-7th slide, switch to paraphrased text only, 3) Paraphrased slide shows summary while voice gives detail, 4) Viewer cannot predict when sentence ends, 5) Creates hypnotic attention through unpredictability, 6) Full paraphrase VSLs also work but are harder to execute."
        domains: ["vsl", "presentation", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-566"
        title: "Comparison Copy Us vs Them Method"
        description: "Method for writing comparison/Us vs Them section: 1) Anchor against known alternatives ('Unlike the Atkins Diet, my book...'), 2) Include one 'Did you know' informative fact about competition, 3) Write 5-8 paragraphs total, 4) Address objections preemptively through comparisons, 5) Make inclusion feel natural — reader joins your tribe by seeing alternatives are worse."
        domains: ["copywriting", "positioning", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-567"
        title: "Guarantee Stack Construction Method"
        description: "Method for building guarantee stack: 1) Choose double or triple guarantee format, 2) Double: Two distinct conditions for refund, 3) Triple: Two serious conditions + one absurd ('even if you just do not like my voice'), 4) Make guarantee graphic if possible, 5) Place after price justification section, 6) Use as risk reversal to push past final resistance."
        domains: ["offer-design", "risk-reversal", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-568"
        title: "Current News Email Hook Method"
        description: "Method for using current events in emails: 1) Find trending news story or event, 2) Connect it to your product/niche with a unique angle, 3) Use the event as subject line or opening hook, 4) Reader perceives email as timely and relevant rather than automated, 5) Works especially well for breaking out of auto-responder monotony."
        domains: ["email-marketing", "relevance", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-569"
        title: "Monkey Mind Marketing Execution Method"
        description: "Method for applying limbic system marketing: 1) Identify the primary fear/pain your avatar wants to avoid, 2) Lead with avoidance modality in headline and opening (75% more effort to avoid pain than gain pleasure), 3) Use emotional triggers before logical ones, 4) Let the prefrontal cortex rationalize after emotional decision is made, 5) Apply 'Read This Book or Die' principle — avoidance modality as attention capture, 6) Confirm purchase with logic on upsell ('You made a wise decision')."
        domains: ["sales-psychology", "neuroscience", "implementation"]
        source: "5MSLF"
      - id: "MET-JB-600"
        title: "VSL Fast Track Complete Build Process"
        description: "Step-by-step: (1) Complete 5-step pre-VSL checklist (5-7 days), (2) Build SNAP Suggestion with pattern interrupt, (3) Write Bottle Connection with nightmare story, (4) Construct Big Problem with conspiracy cycle, (5) Create Bigger Solution with 3 branded tips, (6) Assemble Grand Offer with all 6 sections, (7) Test and iterate."
        domains: ["vsl-creation", "copywriting", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-601"
        title: "Customer Survey Execution Method"
        description: "Use SurveyMonkey (free). Send to list, Facebook, or rented list (5000 people, ~$200). Ask 5 questions in brain-ping order. Collect responses. Paste into Word Cloud tool. Identify top 5 fear words, top 5 desire words, top book title phrases, and optimal price point."
        domains: ["market-research", "survey-design", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-602"
        title: "Competitor Analysis Word Cloud Method"
        description: "Step 1: Identify top 3 competitor VSLs or sales pages. Step 2: Transcribe video (hire on Fiverr) or copy-paste text. Step 3: Paste all three into free Word Cloud tool. Step 4: Extract top 5 words/phrases. Step 5: Use these words heavily in first 30 slides. Optional: handwrite the best one."
        domains: ["competitive-analysis", "copywriting", "market-research"]
        source: "VSLFT18"
      - id: "MET-JB-603"
        title: "Headline Testing Method"
        description: "Step 1: Write 10 headlines using survey data + word cloud words. Step 2: Survey your list ranking interest. Step 3: Take top 3 and spend $50 each on PPC/banner ads. Step 4: Most clicks wins. Use this headline above your VSL and in all emails."
        domains: ["headline-testing", "split-testing", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-604"
        title: "Blank Field Price Discovery Method"
        description: "Write product synopsis using USP factory. Send survey: 'How much would you pay for a straight-to-the-point how-to blueprint to achieving GOAL?' Leave price field BLANK. Never give multiple choice. Take the most common price. 7/10 times it is higher than you expected."
        domains: ["pricing", "market-research", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-605"
        title: "10 Minute Bullet Brainstorm Method"
        description: "Set timer for 10 minutes. Zero distractions. Write every benefit of your product nonstop for 10 minutes. Then apply Super Bullet Trick: add one power adjective before each benefit. 'Simple' → 'Deceptively simple.' Use Thesaurus for unique descriptors."
        domains: ["copywriting", "brainstorming", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-606"
        title: "Pattern Interrupt Image Selection Method"
        description: "Step 1: Write your nightmare story first. Step 2: Identify a physical object from the story. Step 3: Show that image as opening slide. Step 4: Say 'I know this looks strange — I will explain in a few minutes.' Step 5: Close the loop when you tell the nightmare story later."
        domains: ["vsl-creation", "storytelling", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-607"
        title: "Nightmare Story Writing Method"
        description: "Step 1: Choose specific date, time, weather, setting. Step 2: Introduce secondary character. Step 3: Include sensory details (cold, rain, breath). Step 4: Introduce the object that becomes pattern interrupt. Step 5: Spiral downward through humiliation. Step 6: 'Even that was not enough' — add second lower moment. Step 7: Make the vow."
        domains: ["storytelling", "copywriting", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-608"
        title: "Conspiracy Cycle Construction Method"
        description: "Step 1: Identify the biggest lie your prospect believes. Step 2: Name 3-5 villains contributing to the problem (media, government, industry). Step 3: Present the lie using 'you may have heard.' Step 4: Label it false with evidence. Step 5: Show consequences of believing it. Step 6: 'Not entirely your fault.' Step 7: Assign blame."
        domains: ["vsl-creation", "persuasion", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-609"
        title: "One Thing Tip Integration Method"
        description: "Step 1: Create trademarked name for your core concept (e.g., Caloric Staggering Principle). Step 2: Frame avoid tip around it: 'to kick in CSP, avoid X.' Step 3: Frame enjoy tip: 'here is how to enjoy CSP.' Step 4: Frame how-to tip: 'here is how to start CSP in 24-48 hours.' All tips orbit the One Thing."
        domains: ["branding", "vsl-creation", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-610"
        title: "Grand Offer Product Section Build"
        description: "Step 1: Write overview (1-2 sentences). Step 2: Add formal credentials. Step 3: Present USP with killer word (first, only, breakthrough). Step 4: Build 'works even if' slides (every objection). Step 5: Write 'what it isn't' (alienate wrong buyers). Step 6: Hero study if applicable. Step 7: Testimonials. Step 8: 'On page X discover Y' dimensionalization."
        domains: ["offer-design", "vsl-creation", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-611"
        title: "Price Presentation Triple Drop Method"
        description: "Step 1: State retail/faux price ($217). Step 2: 'Not even half that.' Step 3: 'Not even $67.' Step 4: Present bonuses with individual dollar values. Step 5: Stack total value ($300+). Step 6: 'Your total investment today... one payment of only $47.' Step 7: Reveal cause/reason for discount."
        domains: ["pricing-psychology", "closing", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-612"
        title: "Triple Guarantee Writing Method"
        description: "Guarantee 1: Specific measurable result in timeframe (lose 10% body weight in 30 days). Guarantee 2: Secondary qualitative metric (do not like the experience). Guarantee 3: Catch-all (do not like the font, design, anything). Word as 'I will gladly refund every penny.' Include 100% badge."
        domains: ["guarantee-design", "risk-reversal", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-613"
        title: "Pain Pleasure Close Writing Method"
        description: "Step 1: 'Remember you have been struggling with X for far too long.' Step 2: Describe pain of continued inaction. Step 3: 'Yet all of this can change the moment you begin...' Step 4: Present-tense future pace (you feel alive, you see results). Step 5: 'It is true this was not your fault.' Step 6: 'But today you take responsibility.'"
        domains: ["closing", "emotional-selling", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-614"
        title: "Samurai QA Section Build Method"
        description: "Step 1: Allow 7 seconds of dead air after final CTA. Step 2: 'If you are still watching, you probably have some questions.' Step 3: Write 5-10 questions you WANT asked (overcome specific objections). Step 4: Include CTA after every 2-3 questions. Step 5: End with three urgency reasons. Step 6: Go as long as content allows."
        domains: ["closing", "objection-handling", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-615"
        title: "VSL Industry Adaptation Method"
        description: "For any industry: Step 1: Ask 'what are the top 3 desires of your client?' Step 2: Keep asking WHY until you reach emotional core (3-7 levels deep). Step 3: Position product around emotional core, not surface feature. Coins → patriotism/legacy. Dating → confidence/status. Finance → security/freedom."
        domains: ["positioning", "market-research", "adaptation"]
        source: "VSLFT18"
      - id: "MET-JB-616"
        title: "Blood Pressure VSL Repositioning Method"
        description: "For invisible/silent problems: Step 1: Make the invisible visible (connect to visible symptoms like weight gain, ED). Step 2: Start with personal near-death story. Step 3: Lead with a paradoxical hook (banana split cures blood pressure). Step 4: Connect fear to tangible consequences. Step 5: Age-appropriate voice casting."
        domains: ["vsl-creation", "health-marketing", "repositioning"]
        source: "VSLFT18"
      - id: "MET-JB-617"
        title: "Bonus Creation and Stacking Method"
        description: "Step 1: Create 2-3 bonuses (not 10). Step 2: Each bonus must complement, not compete with main product. Step 3: Assign dollar value to each. Step 4: Introduce during price section with individual values. Step 5: Add super unannounced bonus after price reveal. Step 6: Restate: 'Total value $300+ but you pay just $47.'"
        domains: ["offer-design", "bonus-strategy", "implementation"]
        source: "VSLFT18"
      - id: "MET-JB-618"
        title: "NLP Subliminal Layer Implementation"
        description: "Step 1: Identify 5-7 power commands (remember, now, buy, decide, order, strategy). Step 2: Highlight in red text across slides at irregular intervals. Step 3: Ensure highlighted words across consecutive slides form hidden sentences. Step 4: Use 'by now' for subliminal 'buy now.' Step 5: End slides with anchor drops."
        domains: ["nlp", "copywriting", "subliminal-messaging"]
        source: "VSLFT18"
      - id: "MET-JB-619"
        title: "Deadline Funnel Price Enforcement Method"
        description: "Step 1: Set real retail price on main sales page. Step 2: Create discounted VSL/webinar page with lower price. Step 3: Use Deadline Funnel to enforce 72-hour window. Step 4: After deadline, redirect to full-price page. Step 5: Never fake scarcity — make it real and enforceable."
        domains: ["urgency", "pricing", "technology"]
        source: "VSLFT18"
      - id: "MET-JB-650"
        title: "NOW VSL Method Complete Pipeline"
        description: "Step 1: USP Factory (define top 3 problems, select differentiator, form power+benefit+enabler). Step 2: 1-2-3 Formula (write USP, two stories, three tips, four comparisons). Step 3: Build 5-Step VSL (Snap Suggestion → Vital Connection → Big Problem → Bigger Solution → Grand Offer). Step 4: Apply VSL Toolbox (12 tools throughout). Step 5: Record and upload."
        domains: ["vsl-architecture", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-651"
        title: "USP Creation Methodology"
        description: "Step 1: Define top 3 problems your product solves. Step 2: Select the one most different from competition. Step 3: Write crude USP. Step 4: Add power phrase. Step 5: Identify prime benefit. Step 6: Add enabler phrase (verb). Step 7: Compress to under 20 words. Step 8: Pass by 3 trusted associates. Step 9: Test with buyers."
        domains: ["usp", "positioning", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-652"
        title: "Nightmare Story Writing Methodology"
        description: "Step 1: Identify lowest point before discovering solution. Step 2: Select focal point object. Step 3: Write introduction with setting and characters. Step 4: Escalate discomfort progressively. Step 5: Build toward focal point moment. Step 6: Describe feelings at each stage. Step 7: Reach rock bottom. Step 8: Declaration of independence. Step 9: Transition to solution discovery. Step 10: Tie focal point back to positive."
        domains: ["storytelling", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-653"
        title: "Dream Story Writing Methodology"
        description: "Step 1: Survey audience for actual top desires. Step 2: Choose universal relatable image. Step 3: Write 'Imagine this' opener. Step 4: Describe sensory experience of ideal life. Step 5: Include confidence/identity transformation. Step 6: Add social validation element. Step 7: Close with self-gift framing. Step 8: Keep to 5-8 sentences."
        domains: ["storytelling", "future-pacing", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-654"
        title: "Tip Creation Methodology"
        description: "Step 1: List USP benefits. Step 2: Map Avoid tip to 2nd/3rd benefit opposite. Step 3: Map Enjoy tip to 2nd/3rd benefit. Step 4: Map How-To to primary benefit. Step 5: For each tip write: benefit, why do it, what is it (coin phrase), how to (2-3 steps), result (with open loop), mini dream story. Step 6: Order Avoid → Enjoy → How-To."
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-655"
        title: "Comparison Creation Methodology"
        description: "Step 1: List 4 potential comparisons. Step 2: Select 2 serious (famous product anchor OR emotional state comparison). Step 3: Select 2 funny (witty not trite). Step 4: Test each for memorability. Step 5: Place throughout VSL at strategic moments. Step 6: Ensure none are legally problematic."
        domains: ["comparison-marketing", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-656"
        title: "Headline Writing Methodology"
        description: "Step 1: Identify power word/phrase (number, quickly, easily, revealed, new). Step 2: State outrageous result (the benefit). Step 3: Subtract public enemy with 'without' (enemy #1, #2, #3). Step 4: Wordsmith through three levels. Step 5: Test multiple variations."
        domains: ["headlines", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-657"
        title: "Big Lie Loop Construction Methodology"
        description: "Step 1: Extract lies from 'without' statements. Step 2: For each lie — describe using may/or technique. Step 3: Label as false with subliminal highlighting on 'truth.' Step 4: Paint consequence mini-nightmare in present tense. Step 5: Empathize ('not what I want for you'). Step 6: Include inclusion statement. Step 7: Anchor drop with 'yet.' Step 8: Repeat for 2-3 lies."
        domains: ["persuasion", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-658"
        title: "Grand Offer Construction Methodology"
        description: "Step 1: Formal reintroduction. Step 2: Product + USP + Works Even If + What It Isn't. Step 3: Hero Study + Testimonials + Content Description. Step 4: Emphasize X + First Price Tease. Step 5: Faux Price + Bonuses + Cost of Loss. Step 6: Price Dropdown (3 steps) + Reveal. Step 7: Triple Guarantee. Step 8: CTA + Super Bonus. Step 9: Pain/Pleasure + Actions/Results. Step 10: Q&A."
        domains: ["offer-design", "vsl-architecture", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-659"
        title: "Price Architecture Methodology"
        description: "Step 1: Set actual price. Step 2: Set faux price at 2-3x actual. Step 3: Value each bonus individually. Step 4: Calculate total stack (faux + all bonuses). Step 5: Create reason for discount. Step 6: Build 3-step dropdown from stack to actual. Step 7: Reveal with 'only one payment of just $X.' Step 8: Add triple guarantee immediately after."
        domains: ["price-psychology", "offer-design", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-700"
        title: "Snap Suggestion Construction Methodology"
        description: "Step 1: Create triple pattern interrupt (visual + verbal + conceptual). Step 2: Write big promise with 'watch this presentation until the end.' Step 3: Add discovery tease. Step 4: Write headline using benefit formula. Step 5: Add video scarcity element. Step 6: Write 'something completely different' differentiation. Step 7: Create ethical bribe / 'let's make a deal.'"
        domains: ["vsl-architecture", "pattern-interrupts", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-701"
        title: "Vital Connection Construction Methodology"
        description: "Step 1: Write modest introduction (credentials without ego). Step 2: Add social proof logos (no personal photos). Step 3: Write nightmare story using full formula. Step 4: Write 'about the system' section. Step 5: Present brief results. Step 6: Write final transition phrase to Big Problem."
        domains: ["vsl-architecture", "rapport-building", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-702"
        title: "Big Problem Construction Methodology"
        description: "Step 1: Transition from Vital Connection. Step 2: Build Big Lie Loop for each lie (2-3 lies). Step 3: Write 'It's Not Your Fault' section. Step 4: Write 'Blame This' (external enemy). Step 5: Reveal the Big Truth. Step 6: Create Bigger Solution Open Loop transition."
        domains: ["vsl-architecture", "persuasion", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-703"
        title: "Bigger Solution Construction Methodology"
        description: "Step 1: Open tip loop with tease. Step 2: Write Avoid tip (full 6-step formula). Step 3: Write Enjoy tip (most challenging — can combine with How-To). Step 4: Write How-To tip (primary benefit, most detailed). Step 5: Transition from How-To directly to Grand Offer."
        domains: ["vsl-architecture", "tip-formula", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-704"
        title: "Triple Guarantee Writing Methodology"
        description: "Step 1: Choose guarantee length (30, 60, 90, 365 days). Step 2: Level 1 — broad satisfaction promise with full length. Step 3: Level 2 — specific measurable metric with shorter length. Step 4: Level 3 — something absurdly generous/funny. Step 5: Add security seals and guarantee graphics. Step 6: Frame with 'Don't decide right now.'"
        domains: ["guarantees", "offer-design", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-705"
        title: "CTA Sequence Methodology"
        description: "Step 1: Primary CTA with specific button details (color, text). Step 2: Immediate access/delivery promise. Step 3: Second testimonials batch. Step 4: Super bonus introduction. Step 5: Inclusion statement. Step 6: Secondary CTA with delivery timeline. Step 7: Re-mention super bonus."
        domains: ["cta-design", "closing-techniques", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-706"
        title: "Pain and Pleasure Close Methodology"
        description: "Step 1: 'Remember' opener to reactivate pain. Step 2: List pain states of inaction (despair, frustration, primary fear). Step 3: 'Yet all of this can change' pivot. Step 4: Future-paced pleasure in strict present tense. Step 5: 'Picture' command for final dream story. Step 6: Responsibility frame. Step 7: Reinforce with emotional peak."
        domains: ["closing-techniques", "persuasion", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-707"
        title: "Actions and Results Close Methodology"
        description: "Step 1: Future-paced specific actions after purchase. Step 2: Brief remember/overview of VSL journey. Step 3: Three reasons to act now (price, bonus cap, procrastination). Step 4: 'Let us make sure you get what you want.' Step 5: 'The smart thing to do right now is...' Step 6: Final CTA."
        domains: ["closing-techniques", "urgency", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-708"
        title: "Wordsmithing Upgrade Methodology"
        description: "Step 1: Write sentence naturally (Level 1). Step 2: Replace weakest word with power word (Level 2: good→ideal, help→empower). Step 3: Restructure for maximum impact (Level 3: add power phrases, emotional triggers, specificity). Step 4: Read aloud for flow. Step 5: Apply throughout VSL during final edit pass."
        domains: ["copywriting", "wordsmithing", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-709"
        title: "Subliminal Highlighting Implementation Methodology"
        description: "Step 1: Select 10-15 power words for your specific product/audience. Step 2: Place highlighted words every 3-5 slides. Step 3: Build YES-BUY-NOW across three consecutive slides. Step 4: Highlight based on two criteria — tell user what they ARE (strong, smart) and what you WANT them to DO (decide, act). Step 5: Do not overuse — 1-2 per section maximum."
        domains: ["nlp", "copywriting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-710"
        title: "Pre-Qualification Sequence Methodology"
        description: "Step 1: 'Before I tell you about the success others are seeing with [product].' Step 2: 'Let me first tell you who would never fit as a [customer type].' Step 3: List 3-4 specific disqualifiers. Step 4: 'I know that you have [positive trait] because you are watching this video.' Step 5: Reinforce that 'you' are part of the success club."
        domains: ["qualification", "positioning", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-711"
        title: "Open Loop Management Methodology"
        description: "Step 1: Identify 5-8 strategic points for open loops throughout VSL. Step 2: Open loop with specific tease ('I will reveal this in just a moment'). Step 3: Continue with other content. Step 4: Close each loop within 5-10 slides. Step 5: Never leave more than 2 loops open simultaneously. Step 6: Final loop closes with the offer."
        domains: ["engagement", "vsl-architecture", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-712"
        title: "Comparison Creation and Placement Methodology"
        description: "Step 1: Brainstorm 8-10 potential comparisons. Step 2: Filter to 4 (2 serious, 2 funny). Step 3: Check for legal issues with competitor mentions. Step 4: Test for memorability. Step 5: Place serious comparisons during product positioning sections. Step 6: Place funny comparisons during pattern-break moments. Step 7: Ensure no trite cliches."
        domains: ["comparison-marketing", "copywriting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-713"
        title: "Focal Point Object Discovery Methodology"
        description: "Step 1: Recall the lowest moment in your story. Step 2: Identify specific physical objects present (coat, car, store, food item). Step 3: Select the one that can appear at multiple story points. Step 4: Use it as the narrative thread (forgotten → consequences → rock bottom). Step 5: Tie it back to something positive at the end."
        domains: ["storytelling", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-750"
        title: "VSL Slide Formatting Methodology"
        description: "Step 1: Write complete script. Step 2: Split into one sentence per slide (90%). Step 3: Add ellipses at end of each slide. Step 4: Insert paraphrase slides every 5-7. Step 5: Add subliminal highlighting to selected words. Step 6: Insert action drops at sentence beginnings. Step 7: Replace all 'but' with 'yet/however/and.' Step 8: Final read-through for flow."
        domains: ["vsl-architecture", "formatting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-751"
        title: "Audience Survey for Dream Story Methodology"
        description: "Step 1: Create survey with top 5-10 desired outcomes. Step 2: Distribute to email list, Facebook fans, and personal contacts. Step 3: Identify top desire (often not what you assume — confidence outranked weight loss). Step 4: Find universal image that represents that desire. Step 5: Build dream story around that specific image."
        domains: ["market-research", "storytelling", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-752"
        title: "VSL Testing and Optimization Methodology"
        description: "Step 1: Launch with full 5-step VSL. Step 2: Test 'presentation' vs 'video' in suggestion. Step 3: A/B test headline variations. Step 4: Test different focal point emphasis in nightmare story. Step 5: Measure tip section dropout rates. Step 6: Optimize Grand Offer price points. Step 7: Test triple guarantee vs standard guarantee."
        domains: ["testing", "conversion-optimization", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-753"
        title: "Avoid Tip Construction Methodology"
        description: "Step 1: Select 2nd or 3rd USP benefit (or its opposite). Step 2: Frame as 'the number one mistake people make when it comes to [topic].' Step 3: Add inclusion language ('people just like you and me'). Step 4: Explain why it must be avoided. Step 5: Connect avoidance to positive outcome. Step 6: Add mini dream story. Step 7: Open loop for How-To tip."
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-754"
        title: "Enjoy Tip Construction Methodology"
        description: "Step 1: Find one aspect of your topic that can be reframed as enjoyable. Step 2: Frame as 'a fantastic way to enjoy [dreaded thing].' Step 3: Make it relatable (most people dread this). Step 4: Give specific enjoyment mechanism. Step 5: If too difficult, combine with How-To: 'doing it right will make your journey more fun.'"
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-755"
        title: "How-To Tip Construction Methodology"
        description: "Step 1: Select primary USP benefit as topic. Step 2: Frame as 'let me show you a way to [primary benefit].' Step 3: Coin a phrase for the mechanism. Step 4: Write 2-3 step explanation (first do this, why, result). Step 5: Open loop: 'if you do it right — more on that in a moment.' Step 6: Position so all other tips fail without this one. Step 7: Bridge to Grand Offer."
        domains: ["tip-formula", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-756"
        title: "VSL Toolbox Application Methodology"
        description: "Apply the 12 tools systematically: 1) Paraphrase Strategy (every 5-7 slides), 2) Headline Benefit Formula (headline + promises), 3) Pain Then Pleasure (throughout), 4) Triple Guarantee (offer section), 5) Faux Price (price section), 6) Product Pacing (post-offer), 7) Pre-Qualification (before tips or testimonials), 8) Wordsmithing (final edit), 9) Subliminal Highlighting (throughout), 10) One Sentence Format (90%), 11) Action Drops (sentence starts), 12) May-Or Technique (replace assumptions)."
        domains: ["vsl-architecture", "implementation", "copywriting"]
        source: "NOWVSL"
      - id: "MET-JB-757"
        title: "Vocal Tonality and Recording Methodology"
        description: "Step 1: Write full script first. Step 2: Read aloud multiple times for natural flow. Step 3: Mark pauses, emphasis, and emotional shifts. Step 4: Record audio first (not synced with slides). Step 5: Use varied tonality — conversational not announcer. Step 6: Match slide transitions to natural speech pauses. Step 7: Compress to appropriate quality."
        domains: ["recording", "vsl-architecture", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-758"
        title: "Complete VSL Assembly Methodology"
        description: "Phase 1: Foundation (USP Factory + 1-2-3 Formula research). Phase 2: Content Creation (nightmare story + dream story + 3 tips + 4 comparisons). Phase 3: Architecture (5-Step VSL construction, slide by slide). Phase 4: Polish (VSL Toolbox application — wordsmithing, subliminal highlighting, action drops). Phase 5: Production (recording + PowerPoint + upload)."
        domains: ["vsl-architecture", "copywriting", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-759"
        title: "Bonus Stack Construction Methodology"
        description: "Step 1: Create 3-5 bonuses that complement the main product. Step 2: Assign realistic individual values to each. Step 3: Present each bonus separately with its own mini-pitch. Step 4: Stack total value visually. Step 5: Reserve one 'super bonus' for after price reveal as final incentive. Step 6: Use super bonus as scarcity mechanism."
        domains: ["bonuses", "offer-design", "methodology"]
        source: "NOWVSL"
      - id: "MET-JB-760"
        title: "Conspiracy Building Methodology"
        description: "Step 1: Identify the lies your prospect believes. Step 2: For each lie, build a conspiracy: who benefits from this misinformation? Step 3: Name the external enemy (the industry, big pharma, gurus who profit from confusion). Step 4: Position yourself as the whistleblower. Step 5: 'It is not your fault — you were lied to.' Step 6: Present your truth as the antidote."
        domains: ["persuasion", "copywriting", "positioning"]
        source: "NOWVSL"
      - id: "MET-JB-761"
        title: "Inclusion Language Implementation Methodology"
        description: "Step 1: Replace 'you' with 'people like you and me' at rapport-critical moments. Step 2: Use 'folks like us' for shared identity. Step 3: Reference 'one of the millions' for scale. Step 4: Place inclusion language before pre-qualification and during lie dismantling. Step 5: Use at least 5-8 inclusion phrases throughout the entire VSL."
        domains: ["rapport-building", "copywriting", "implementation"]
        source: "NOWVSL"
      - id: "MET-JB-762"
        title: "Pattern Interrupt Object Discovery Methodology"
        description: "Step 1: Review nightmare story for physical objects mentioned. Step 2: Select the object most unusual or memorable. Step 3: This object becomes the snap suggestion pattern interrupt in the VSL opening. Step 4: Reference it again at the focal point. Step 5: Tie it back positively at the close. The same object serves three narrative functions."
        domains: ["pattern-interrupts", "storytelling", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MET-JB-763"
        title: "Objection Pre-handling Through What It Isnt"
        description: "Step 1: List top 5 likely objections/misconceptions. Step 2: Frame each as 'This is NOT [misconception].' Step 3: Follow each negation with what it IS instead. Step 4: Place before testimonials to clear the mental path. Step 5: Use 'Works Even If' section to handle remaining situational objections. Step 6: Let testimonials confirm the handling."
        domains: ["objection-handling", "positioning", "methodology"]
        source: "NOWVSL"


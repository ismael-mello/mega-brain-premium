  L4_FRAMEWORKS:
      - id: "FW-JB-586"
        title: "18 Subheadline Sales Page Formula"
        description: "Complete text sales page structure: 18 subheadlines in sequence — Attention/Headline, Big Problem, What It Isnt, What It Is/Hook, Us vs Them, Works for Anyone, Special Sauce, Objections, How You Will Feel, Everything You Need, Recap, Hard to Find, Cant Take Credit, Dont Try Alone, Warning Not for Everyone, Remember+New Fact, Why Its Just $X, Double Guarantee, Scarcity, Oh Did I Mention, Youd Be Stupid, Better Choice, Order+PPS."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "FW-JB-587"
        title: "Four Es Proof Framework"
        description: "Four types of proof to support your hook: Engagers (testimonials from users), Evidence (studies and data), Experience (your personal story), Expertise (authority credentials). Use minimum 2 of 4."
        domains: ["copywriting", "proof-elements", "credibility"]
        source: "5MSLF"
      - id: "FW-JB-588"
        title: "Duality Marketing Framework"
        description: "Speak in pros AND cons, not all-positive. Address cognitive dissonance by affirming indecision while persuading action. Goes negative to positive in close: 'Here is why you would be stupid' followed by 'Here is a better choice.'"
        domains: ["copywriting", "sales-psychology", "persuasion"]
        source: "5MSLF"
      - id: "FW-JB-589"
        title: "Headline Benefit Formula"
        description: "Power Word + Outrageous Result - Public Enemy #1. Example: '3 ways to lose weight quickly and easily, without giving up your favorite foods or spending hours doing cardio.' Number + benefit + power words minus public enemies."
        domains: ["copywriting", "headlines", "structure"]
        source: "5MSLF"
      - id: "FW-JB-590"
        title: "Article Page Formula"
        description: "Pre-sales page structure: 1) Short headline + byline, 2) 'Did you know' copy 3-7 paragraphs with personal intros and warnings, 3) Sub-headline acting as headline, 4) 3-5 command/verb bullet points, 5) Optional warning, 6) 'What do I do next?' + link."
        domains: ["copywriting", "funnel-design", "content-marketing"]
        source: "5MSLF"
      - id: "FW-JB-591"
        title: "Hook Trademark Special Sauce Trinity"
        description: "Three distinct branding elements: Hook (what gets attention — the big idea), Trademark (branded term like F4X), Special Sauce (unique mechanism explaining WHY it works). All three coexist and serve different purposes."
        domains: ["positioning", "branding", "offer-design"]
        source: "5MSLF"
      - id: "FW-JB-592"
        title: "Modality Shifting Strategy"
        description: "Use multiple content modalities to extend campaign life: VSL as primary, text sales page as alternate (50/50 split), article page as exit, webinar as follow-up. Each modality captures non-responders from other formats."
        domains: ["marketing-strategy", "conversion-optimization", "funnel-design"]
        source: "5MSLF"
      - id: "FW-JB-593"
        title: "Double and Triple Guarantee Framework"
        description: "Double guarantee: two distinct guarantee conditions. Triple guarantee: three conditions including one absurd ('even if you don't like my accent'). Multiple guarantees reduce perceived risk exponentially."
        domains: ["offer-design", "risk-reversal", "closing"]
        source: "5MSLF"
      - id: "FW-JB-594"
        title: "Negative to Positive Duality Close"
        description: "Close sequence framework: First 'You would be stupid not to take it' (incongruence with values) → Then 'Here is a better choice' (future-paced benefits). Hammer negative then immediately lift with positive vision."
        domains: ["closing", "copywriting", "persuasion"]
        source: "5MSLF"
      - id: "FW-JB-595"
        title: "Fact Style Intro Framework"
        description: "Open with repeated 'Fact:' statements to establish authority without discussion. Pattern: Fact + negative truth, Fact + common knowledge, Fact + lie reveal, Fact + exclusive availability. Creates 'this is not up for debate' tone."
        domains: ["copywriting", "authority-building", "formatting"]
        source: "5MSLF"
      - id: "FW-JB-596"
        title: "Future Pacing in Present Tense"
        description: "Framework for describing post-purchase life: Use present tense instead of future tense. 'You remain in total control' not 'You will feel in control.' 'Imagine this day with me' creates physical+mental engagement."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "5MSLF"
      - id: "FW-JB-597"
        title: "Objection Answer Reframe Pattern"
        description: "Pattern for answering objections in copy: State objection in quotes ('But I'm 69 years old') → Start with positive word ('Great!' 'Ideal time!' 'Terrific!') → Reframe as advantage. Complete duality — address lizard brain and logical brain."
        domains: ["copywriting", "objection-handling", "reframing"]
        source: "5MSLF"
      - id: "FW-JB-598"
        title: "Negative Objection to Positive Reversal"
        description: "Turn every apparent weakness into a strength: Not professionally published = raw and real. Only 16 pages = dense and actionable. No fancy cover = substance over style. Use treasure map analogy: 'How many pages does a treasure map need? One.'"
        domains: ["copywriting", "objection-handling", "value-framing"]
        source: "5MSLF"
      - id: "FW-JB-599"
        title: "Upsell Bridge Formula"
        description: "Bridge from main product to upsell: 'You have everything you need to achieve X. However, some people want to do it faster/easier.' Never say 'everything you need' without immediately creating the bridge to the upsell."
        domains: ["upsell-strategy", "copywriting", "offer-design"]
        source: "5MSLF"
      - id: "FW-JB-600"
        title: "VSL Paraphrase Strategy"
        description: "VSL engagement framework: Show every word on screen for most slides, but every 5th-7th slide use only paraphrased text. Viewer does not know when the sentence will end, creating hypnotic attention. Pattern break prevents boredom."
        domains: ["vsl", "presentation", "engagement"]
        source: "5MSLF"
      - id: "FW-JB-601"
        title: "Open Click Buy Email Architecture"
        description: "Complete email marketing system: OPEN (subject line tricks — numbers, odd characters, intimacy, resend un-opens), CLICK (NLP 3-link trick, carrot, faux video, GIF, PS trick), BUY (5-step VSL process embedded in email-to-page flow)."
        domains: ["email-marketing", "conversion-optimization", "structure"]
        source: "5MSLF"
      - id: "FW-JB-602"
        title: "25 Email Samurai Tricks System"
        description: "Comprehensive email trick system: 8 Open Tricks (number, odd character, two words, 3-magazine, intimacy, resend, phone, everything from pages 1-90), 13 Click Tricks (subject/link, NLP 3-link, carrot, faux video, GIF, 10-15 words, equidistant, PS, first line, responsive, seduction, current news, next page), plus Buy section."
        domains: ["email-marketing", "conversion-optimization", "copywriting"]
        source: "5MSLF"
      - id: "FW-JB-603"
        title: "Email Seduction Auto Responder Arc"
        description: "Auto-responder sequence framework following seduction pattern: Intrigue (curiosity-based opener) → Rapport (personal story/connection) → Value (teaching/content) → Intimacy (personal revelation) → Offer (natural transition to sale)."
        domains: ["email-marketing", "sequencing", "relationship-building"]
        source: "5MSLF"
      - id: "FW-JB-604"
        title: "Avoidance Modality Marketing Framework"
        description: "Marketing framework built on avoidance psychology: Limbic system responds 75% more to fear avoidance than pleasure seeking. Structure: Lead with what they will avoid/lose, then present the positive alternative. 'Read This Book or Die' principle."
        domains: ["sales-psychology", "persuasion", "marketing-strategy"]
        source: "5MSLF"
      - id: "FW-JB-605"
        title: "Three Trust Keys Framework"
        description: "Three keys to building trust in copy: Modesty (makes you relatable, 'I can't take all the credit'), Honesty (even humiliating truths build credibility), Determination (shows commitment to the craft). All three must be present for maximum trust."
        domains: ["rapport-building", "credibility", "copywriting"]
        source: "5MSLF"
      - id: "FW-JB-606"
        title: "Price Absence Checkout Video Strategy"
        description: "Two-step pricing framework: 1) Remove price from sales page entirely — forces prospects to search and engage longer. 2) On checkout page, show 30-second video: 'Thanks for wanting this. I almost forgot to tell you, it is only $X and here is why.' Creates secondary conversion point."
        domains: ["pricing-psychology", "conversion-optimization", "funnel-design"]
        source: "5MSLF"
      - id: "FW-JB-607"
        title: "High Ticket Application Close Framework"
        description: "For products $3-5K+: Replace direct purchase with application. 'This is going to cost $3,997. However if you think you are qualified... I am taking 19 applications right now below.' Phone close replaces online purchase above $5K."
        domains: ["pricing-psychology", "high-ticket", "closing"]
        source: "5MSLF"
      - id: "FW-JB-608"
        title: "Subliminal Spelling Technique"
        description: "Embed subliminal commands through deliberate word choice: 'By now you probably realize...' reads subliminally as 'Buy now.' Use 'Imagine this day with me' where 'with me' creates association. Intentional, not accidental."
        domains: ["nlp", "persuasion", "copywriting"]
        source: "5MSLF"
      - id: "FW-JB-609"
        title: "Remember Plus New Fact Ninja Pattern"
        description: "Start a section with 'Remember...' followed by completely new information the reader has never seen. Reader thinks they missed something and rereads the page. One of the most 'samurai' elements in copy."
        domains: ["copywriting", "attention-capture", "persuasion"]
        source: "5MSLF"
      - id: "FW-JB-610"
        title: "Two Negative One Positive Cadence"
        description: "Pattern for 'Did you know' sequences: Two alarming/negative statements followed by one positive revelation. Creates tension-tension-release that maximizes engagement and makes the positive hit harder."
        domains: ["copywriting", "persuasion", "structure"]
        source: "5MSLF"
      - id: "FW-JB-611"
        title: "Inclusive Exclusion Copy Framework"
        description: "Framework for 'Who it works for' section: Appear to narrow your audience while actually including 95-99%. 'This works for women who want to lose at least 5 pounds or more' includes 95% of all women while feeling targeted."
        domains: ["copywriting", "qualification", "positioning"]
        source: "5MSLF"
      - id: "FW-JB-612"
        title: "Info Apocalypse Survival Framework"
        description: "Email marketing positioning: The information apocalypse is coming — bad email is dying, not email itself. Survival requires thinking of subscribers as fans, not a list. Authenticity and value delivery are the survival skills."
        domains: ["email-marketing", "positioning", "messaging"]
        source: "5MSLF"
      - id: "FW-JB-613"
        title: "Duality Headline Architecture"
        description: "Headlines with embedded duality for target audiences: 'Today's exercise programs are way too long' — sounds negative to younger people but positive to older audience. Double entendres ('new-age workouts') resonate on two levels simultaneously."
        domains: ["copywriting", "headlines", "market-awareness"]
        source: "5MSLF"
      - id: "FW-JB-614"
        title: "Special Sauce Differentiation System"
        description: "System for creating unique product differentiation: Special Sauce is separate from Hook and Trademark. It explains the unique mechanism within the product (e.g., time-tension principle, 3 phases). Can use as long as needed to explain. Works alongside the hook, not as replacement."
        domains: ["positioning", "offer-design", "differentiation"]
        source: "5MSLF"
      - id: "FW-JB-640"
        title: "SNAP Suggestion Framework"
        description: "Step 1 of the 5-step VSL: Pattern interrupt image or sound → personal image (optional) → words of intrigue → three big promises → video scarcity with reason → 'unlike anything you have ever seen.' Goal: open loops and command attention in 7 seconds."
        domains: ["vsl-structure", "copywriting", "engagement"]
        source: "VSLFT18"
      - id: "FW-JB-641"
        title: "Bottle Connection Framework"
        description: "Step 2: Build rapport through three trust keys (modesty, honesty, determination). Start with modest informal intro → nightmare story with ultra-specific details → rock bottom moment → personal vow → transition to big problem. Goal: make them love you."
        domains: ["rapport-building", "storytelling", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-642"
        title: "Big Problem Conspiracy Cycle"
        description: "Step 3: Make the problem bigger than they think → reveal the lie they have been told → name the villain(s) → 'not entirely your fault' → assign blame → big truth (problem is even bigger) → open loop to solution. Goal: remove guilt and create villains."
        domains: ["vsl-structure", "persuasion", "problem-agitation"]
        source: "VSLFT18"
      - id: "FW-JB-643"
        title: "Bigger Solution Three Tip Framework"
        description: "Step 4: Open reminder loop → Tip 1 Avoid (fear-based) → Tip 2 Enjoy (pleasure-based) → Tip 3 How-To (logic-based, transitions to offer). Brand the most important tip with trademark name. Center all tips around One Thing concept."
        domains: ["vsl-structure", "content-strategy", "teaching"]
        source: "VSLFT18"
      - id: "FW-JB-644"
        title: "Grand Offer Product Section (13 Parts)"
        description: "Step 5 Part 1: Overview → formal introduction → USP → works even if → what it isn't → hero study → results → out of the club → qualify remaining → testimonials → what is in the product → emphasize speed/ease → first price tease → three more benefits."
        domains: ["offer-design", "vsl-structure", "closing"]
        source: "VSLFT18"
      - id: "FW-JB-645"
        title: "Grand Offer Price Section"
        description: "Step 5 Part 2: Optional faux price → bonuses with dollar values → restate total cost of everything → reason for discount (cause/mission) → triple drop (retail → not even half → not even $67) → 'one payment of only $X' → triple guarantee."
        domains: ["pricing-psychology", "closing", "offer-design"]
        source: "VSLFT18"
      - id: "FW-JB-646"
        title: "Grand Offer Call to Action Framework"
        description: "Step 5 Part 3: More testimonials → super unannounced bonus → inclusion ('join thousands') → access timing ('immediate') → check out process instructions → repeat CTA 4-5 times with exact same copy each time."
        domains: ["closing", "conversion-optimization", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-647"
        title: "Pain Pleasure Future Pacing Sequence"
        description: "Step 5 Part 4: Remember your struggle (pain) → cost of inaction (more pain) → 'yet all this can change the moment...' (pivot) → present-tense future pace (pleasure) → 'you feel alive, you see results' → this is why not your fault → take responsibility NOW."
        domains: ["closing", "nlp", "emotional-selling"]
        source: "VSLFT18"
      - id: "FW-JB-648"
        title: "Action Results Download Framework"
        description: "Step 5 Part 5: Tell them exactly what to download first → 'flip to page 4 to begin your assessment' → restate all bonuses → remind of guarantee → three reasons to buy now (price going up, bonus expiring, you may never act)."
        domains: ["closing", "urgency", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-649"
        title: "Samurai QA Closing Framework"
        description: "Step 5 Part 6: Seven seconds dead silence after final CTA → 'If you are still watching, you probably have questions' → ask and answer pre-written questions → overcome objections → include multiple CTAs → go as long as sales keep coming."
        domains: ["closing", "objection-handling", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-650"
        title: "Five Step Pre-VSL Checklist"
        description: "Before writing any copy: (1) Customer survey with 5 brain-pinging questions, (2) Analyze top 3 competitor websites via word cloud, (3) Write 10 headlines and test, (4) Survey price points with blank field, (5) 10-minute bullet brainstorm with super bullet trick."
        domains: ["vsl-preparation", "market-research", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-651"
        title: "Nightmare Story Structure"
        description: "Specific date and time → setting with sensory detail → secondary character (Steve) → physical object (jacket) → spiraling sequence of events → humiliating low point → 'even THAT was not enough' → second even lower moment → personal vow ('die trying') → transition."
        domains: ["storytelling", "vsl-structure", "emotional-selling"]
        source: "VSLFT18"
      - id: "FW-JB-652"
        title: "Lie Loop Structure"
        description: "In the Big Problem section: describe the lie your prospect believes → use anchor drop term → label it as false → show results of believing the lie → tell them that is not what you desire for them. Repeat for 1-3 lies."
        domains: ["vsl-structure", "persuasion", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-653"
        title: "Tip Formula Internal Structure"
        description: "Each tip follows: state the tip → benefit of applying it → why (one slide minimum) → mini dream story (optional) → permission-based validation → transition to next tip. The avoid tip uses fear language, enjoy uses pleasure, how-to uses logic."
        domains: ["vsl-structure", "teaching", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-654"
        title: "Enhanced Rapport Formula"
        description: "Build your story twice without sounding repetitive: first in the modest introduction (brief, informal), then expanded in the nightmare story (detailed, emotional). This double-telling creates deeper rapport because the audience connects twice."
        domains: ["rapport-building", "storytelling", "vsl-structure"]
        source: "VSLFT18"
      - id: "FW-JB-655"
        title: "USP Factory Process"
        description: "Create a one-sentence unique selling proposition: 'The first/only [adjective] [product type] ever created that allows you to [primary benefit] and [secondary benefit].' Must include killer differentiator word: first, only, one-of-a-kind, breakthrough."
        domains: ["positioning", "branding", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-656"
        title: "Works Even If Objection Destroyer"
        description: "List every reason someone would not buy: 'Works even if you are over 40... even if you have tried everything... even if you hate X.' End with: 'or if you think you have tried everything.' Systematically demolish every objection before they arise."
        domains: ["objection-handling", "copywriting", "closing"]
        source: "VSLFT18"
      - id: "FW-JB-657"
        title: "Cost of Loss Content Framework"
        description: "Quantify the cost of not buying: money spent on alternatives ($10-100x), forced purchases (new clothes), medical bills, medication, lost time. Then: 'And that is not what I want for you.' Makes the product price seem trivial by comparison."
        domains: ["pricing-psychology", "closing", "persuasion"]
        source: "VSLFT18"
      - id: "FW-JB-658"
        title: "Two Choices Close Framework"
        description: "Present exactly two choices: Choice 1 — take the information and try to go it alone (who knows, you may see some success). Choice 2 — let me do the work for you with my proven blueprint. Make Choice 2 obviously superior."
        domains: ["closing", "framing", "persuasion"]
        source: "VSLFT18"
      - id: "FW-JB-659"
        title: "Cause Creation and Discount Justification"
        description: "Create a real cause: 'I set a goal to help remove 10 million pounds.' This justifies the discount ('I do not want finances to stand in your way'), creates higher aspiration, and makes prospects feel guilty for not joining."
        domains: ["cause-marketing", "pricing-psychology", "community-building"]
        source: "VSLFT18"
      - id: "FW-JB-660"
        title: "What It Isn't Qualification Section"
        description: "Before revealing the product, state what it is NOT: 'This is not some magic pill... not a swallow-this-overnight solution... not a scam.' Alienate buyers you do not want. Then: 'What this IS, is the most powerful X ever devised.' Contrast creates credibility."
        domains: ["positioning", "qualification", "credibility"]
        source: "VSLFT18"
      - id: "FW-JB-661"
        title: "Super Unannounced Bonus Technique"
        description: "After presenting all bonuses and price, introduce one more surprise bonus: 'Plus if you act now before this presentation ends, I will toss in this one-of-a-kind super bonus.' Restate total value but keep same price. Maximizes perceived value."
        domains: ["offer-design", "urgency", "closing"]
        source: "VSLFT18"
      - id: "FW-JB-662"
        title: "Three Urgency Reasons Close"
        description: "Reason 1: Price is temporarily lowered and will go back up. Reason 2: Super bonus has limited availability/membership quota. Reason 3: Unless you act now, you may never act at all (procrastination truth). Three reasons is the sweet spot."
        domains: ["urgency", "closing", "persuasion"]
        source: "VSLFT18"
      - id: "FW-JB-663"
        title: "Five Question Customer Survey Framework"
        description: "Q1: Most pressing concern about GOAL? (amygdala/fear) Q2: Number one thing you want to know? (prefrontal/logic) Q3: What word would make you buy a book? (mid-brain/emotion) Q4: What would you see? (visual) Q5: What would it feel like? (kinesthetic). This sequence pings all brain centers."
        domains: ["market-research", "survey-design", "neuroscience"]
        source: "VSLFT18"
      - id: "FW-JB-664"
        title: "Emphasize X Superpower Technique"
        description: "In the product section, take the one thing your customers want most (from survey) and spotlight it: 'Here is its superpower.' Pull out the single feature that matches their most pressing concern and emphasize it above all others."
        domains: ["offer-presentation", "positioning", "copywriting"]
        source: "VSLFT18"
      - id: "FW-JB-700"
        title: "5-Step VSL Process Framework"
        description: "Step 1: Snap Suggestion (pattern interrupt + big promise + ethical bribe). Step 2: Vital Connection (modest intro + nightmare story + about system + results). Step 3: Big Problem (lies + blame + big truth). Step 4: Bigger Solution (3 tips). Step 5: Grand Offer (product + price + CTA + pain/pleasure + actions/results + Q&A)."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-701"
        title: "1-2-3 Formula Framework"
        description: "1 USP (power phrase + prime benefit + enabler phrase). 2 Stories (nightmare + dream). 3 Tips (avoid + enjoy + how-to). 4 Comparisons (2 serious + 2 funny). These four elements exist in virtually every top-performing video sales letter."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-702"
        title: "USP Factory Framework"
        description: "Step 1: List top 3 problems your product solves. Step 2: Select the one that best differentiates from competition. Step 3: Form power phrase + prime benefit + enabler in under 20 words. Step 4: Pass by 3 trusted business associates. Step 5: Test with actual buyers."
        domains: ["usp", "positioning", "marketing-strategy"]
        source: "NOWVSL"
      - id: "FW-JB-703"
        title: "Nightmare Story Framework"
        description: "Introduction (setting, time, characters). Escalation (things getting worse). Focal Point Object (the rock-bottom moment with physical anchor). Declaration of Independence (the vow to change). Moral Journey (what was learned). Transition to Discovery (the solution found)."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-704"
        title: "Dream Story Framework"
        description: "Follow the Leader ('Imagine this' or 'Walk with me'). Specific You + General They (direct address + social context). Transition Phrase (connecting to benefits). Present Tense Promise (future state described as current reality). One key relatable image."
        domains: ["storytelling", "future-pacing", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-705"
        title: "Headline Benefit Formula Framework"
        description: "Power Word + Outrageous Result - Public Enemy #1 (- Public Enemy #2, #3). Example: '3 ways to lose weight quickly and easily without giving up your favorite foods or spending hours doing cardio.' Universal formula for any headline."
        domains: ["headlines", "copywriting", "formulas"]
        source: "NOWVSL"
      - id: "FW-JB-706"
        title: "Triple Guarantee Framework"
        description: "Level 1: Broad promise with longest timeframe (60 days, general satisfaction). Level 2: Specific metric with shorter timeframe (30 days, 10% body weight). Level 3: Something ridiculous (even if you don't like the font). Pattern break + humor + total risk reversal."
        domains: ["guarantees", "offer-design", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FW-JB-707"
        title: "Faux Price Architecture Framework"
        description: "Step 1: Anchor faux price 2-3x higher. Step 2: List what is included at that value. Step 3: Tease 'better deal today.' Step 4: Present bonuses with separate values. Step 5: Stack total value (faux + bonuses). Step 6: Three-step price dropdown. Step 7: Reveal actual price with 'only one payment.'"
        domains: ["price-psychology", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-708"
        title: "Snap Suggestion Framework"
        description: "Triple Pattern Interrupt (visual + verbal + conceptual). Big Promise (watch until the end + discovery tease). Benefit Formula headline. Video Scarcity (exclusive presentation offer). Something Completely Different (differentiation from competition). Let's Make a Deal (ethical bribe to continue watching)."
        domains: ["vsl-architecture", "pattern-interrupts", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-709"
        title: "Vital Connection Framework"
        description: "Modest Introduction (credentials without ego). Nightmare Story (full formula). About the System (what makes it different). Results of the System (brief proof). Final Transition Phrase (bridge to Big Problem). This section builds all rapport needed for conversion."
        domains: ["vsl-architecture", "rapport-building", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-710"
        title: "Big Problem Framework"
        description: "Transition into the Lie. Big Lie Loop (discover, describe, label false, show consequences, empathize, negate). It's Not Your Fault (guilt removal). Blame This (external enemy). Big Truth (your unique mechanism). Bigger Solution Open Loop (transition to tips)."
        domains: ["vsl-architecture", "persuasion", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-711"
        title: "Bigger Solution Framework"
        description: "Open Tip Loop (tease what's coming). 3 Tip Formula (Avoid → Enjoy → How-To, each with benefit/why/what/how/result/mini-dream). Transition into Grand Offer (from how-to tip directly to product introduction)."
        domains: ["vsl-architecture", "tip-formula", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-712"
        title: "3 Tip Formula Framework"
        description: "Each tip follows: 1) Benefit (from USP), 2) Why do it (2 sentences), 3) What is it/driving force (coin a phrase), 4) How to do it (2-3 steps: first do this, why, result), 5) Result with open loop, 6) Mini Dream Story (1-2 sentences). Order: Avoid, Enjoy, How-To."
        domains: ["tip-formula", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-750"
        title: "Big Lie Loop Framework"
        description: "Part 1: Discover the lie (from without statements). Part 2: Describe the lie (with may/or technique). Part 3: Label as false ('not even close to truth'). Part 4: Consequences (mini nightmare of believing lie). Part 5: Empathy ('not what I want for you'). Part 6: Transition to truth."
        domains: ["persuasion", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-751"
        title: "Grand Offer Part 1 The Product Framework"
        description: "Formal Introduction (full name + credentials). Product + USP restate. Works Even If section. What It Isn't section. Hero Study (detailed success story). Results of Hero Study. Out of the Club (exclusivity). Easy As It Gets. Qualify Remaining. Testimonials batch. What's In the Product. Emphasize X. First Price Tease. 3 More Benefits."
        domains: ["vsl-architecture", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-752"
        title: "Grand Offer Part 2 The Price Framework"
        description: "Optional Faux Price (2-3x anchor). Bonuses (individual value each). Restate Faux Price + bonus total. Cost of Loss (what inaction costs). Reason for Discount. Price Dropdown (3 steps). Price Reveal ('only one payment of just $X'). Triple Guarantee."
        domains: ["price-psychology", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-753"
        title: "Grand Offer Part 3 CTA Framework"
        description: "CTA Overview (specific button color, text, outcome). Second Testimonials batch. Super Bonus (exclusive for immediate action). Inclusion statement. Primary CTA with delivery timeline. Re-mention super bonus in CTA."
        domains: ["cta-design", "closing-techniques", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FW-JB-754"
        title: "Grand Offer Part 4 Pain and Pleasure Framework"
        description: "Reminder (reopen pain with 'remember'). Pain of inaction tied to despair/frustration/primary fear. 'Yet all of this can change' pivot. Future-paced pleasure in present tense. 'You feel alive, full of hope.' Responsibility frame. Reinforce with final emotional peak."
        domains: ["closing-techniques", "future-pacing", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-755"
        title: "Grand Offer Part 5 Actions and Results Framework"
        description: "Future Paced Actions (specific steps after purchase). Remember Overview (brief recap of entire VSL journey). 3 Reasons to Act Now (price raise, bonus cap, procrastination). The Smart Thing (frame purchase as intelligent choice). Final CTA."
        domains: ["closing-techniques", "urgency", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-756"
        title: "VSL Toolbox Framework"
        description: "12 tools: Paraphrase Strategy, Headline Benefit Formula, Pain Then Pleasure, Triple Guarantee, Faux Price, Product Pacing, Pre-Qualification, Wordsmithing, Subliminal Highlighting, One Sentence Formatting, Action Drops, May-Or Technique."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-757"
        title: "Wordsmithing Upgrade Framework"
        description: "Take any sentence through three levels: Level 1 (basic/bland), Level 2 (replace one key word with power word), Level 3 (replace multiple words, add power phrases, include emotional triggers). Replace: good→ideal, help→empower, make money→truckload of cash."
        domains: ["copywriting", "wordsmithing", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-758"
        title: "Subliminal Highlighting System Framework"
        description: "Select words that appeal to greatest desires: easy, fun, simple, superior, proven, yes, buy, now. Highlight in red throughout VSL. Advanced: build 3-20 word sentences across consecutive slides. Two criteria: tell user what they ARE and what you WANT them to DO."
        domains: ["nlp", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-759"
        title: "Avoid Tip Framework"
        description: "Open: 'Today I am going to reveal the number one mistake people just like you and me make when it comes to [topic].' Inclusion language. Amygdala trigger through avoidance. Addresses Why modality. Usually second or third USP benefit."
        domains: ["tip-formula", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "FW-JB-760"
        title: "Enjoy Tip Framework"
        description: "Present a way to enjoy an otherwise dreaded aspect of the topic. Most challenging to write. Addresses What-If modality. Can be combined with How-To tip: 'If you do this just right it will make your [journey] more fun.' Taps into higher emotional states."
        domains: ["tip-formula", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "FW-JB-761"
        title: "How-To Tip Framework"
        description: "The linchpin tip. Relates directly to primary USP benefit. Addresses What and How-To modalities. Position: all other tips fail without this one. Walk user step by step through the easiest aspect of solution. Bridge directly to product offer."
        domains: ["tip-formula", "copywriting", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-762"
        title: "Serious Comparison Framework"
        description: "Type 1: Anchor to famous product ('Unlike Atkins, Body for Life, or the Four Hour Body, my book offers X'). Type 2: Emotional state comparison (negative state of not having product vs positive state of having it). Both create powerful psychological associations."
        domains: ["comparison-marketing", "positioning", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-763"
        title: "Funny Comparison Framework"
        description: "Lighthearted analogy in positive light causing a smile. Can be PG-13 if audience appropriate. Must not be trite (no 'sticky as white on rice'). Example: 'A diet easier to follow than a two-step map to buried treasure.' Buried treasure anchors the diet to something desirable."
        domains: ["comparison-marketing", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-764"
        title: "Four Buyer Modalities Tip Mapping Framework"
        description: "Why modality → Avoid Tip (why does this work, why am I like this). What-If modality → Enjoy Tip (what if I could enjoy this). What modality → How-To Tip (what is it). How-To modality → How-To Tip (how do I do it). Map all four to cover 100% of audience."
        domains: ["buyer-behavior", "tip-formula", "sales-psychology"]
        source: "NOWVSL"
      - id: "FW-JB-765"
        title: "Vague But Useful Phrase Framework"
        description: "Use strategic vagueness: 'at the right time,' 'if you know exactly what to say,' 'the ideal amount,' 'on specific days.' Each phrase is helpful (they know what to do) but incomplete (they need the product for specifics). Product fills the gap."
        domains: ["copywriting", "tip-formula", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-766"
        title: "Modest Introduction Framework"
        description: "Formula: 'I was not always [credential/achievement] and I certainly was not always [impressive state].' Drop social proof logos (not personal photos). Set up for nightmare story with 'In fact...' transition. Build just-like-you rapport before authority."
        domains: ["positioning", "rapport-building", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-767"
        title: "Pre-Qualification Framework"
        description: "'Before I tell you about the success others are seeing, let me tell you who would never fit.' List 3-4 disqualifiers. 'If you are looking for a magic pill... this will never work.' Then: 'I know you have self-discipline because you are watching this video.' Creates club mentality."
        domains: ["qualification", "positioning", "rapport-building"]
        source: "NOWVSL"
      - id: "FW-JB-800"
        title: "Nightmare Story Writing Process Framework"
        description: "Step 1: Identify the low point in your life that created desire to turn around. Step 2: Find a physical focal point object. Step 3: Note specific references (friend names, times, settings). Step 4: Write the pattern interrupt within the story. Step 5: Build toward focal point. Step 6: Declaration of independence. Step 7: Transition to discovery."
        domains: ["storytelling", "copywriting", "process"]
        source: "NOWVSL"
      - id: "FW-JB-801"
        title: "Dream Story Writing Process Framework"
        description: "Step 1: Survey audience to discover actual top desires. Step 2: Choose one universal relatable image (skinny jeans equivalent). Step 3: Open with 'Imagine this' or equivalent. Step 4: Address confidence/identity change. Step 5: Include vanity/social validation. Step 6: Close with self-gift framing."
        domains: ["storytelling", "future-pacing", "process"]
        source: "NOWVSL"
      - id: "FW-JB-802"
        title: "External Rapport Technique Framework"
        description: "Compare yourself to something far below the viewer's station: 'I was addicted to sugar — my crack was different but the addiction was the same as those prostitutes on the corner.' This pulls you below them, making your rise more impressive and relatable."
        domains: ["rapport-building", "storytelling", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-803"
        title: "Transition to Big Problem Framework"
        description: "From Vital Connection to Big Problem: 1) Present brief system results, 2) 'But first you need to understand why everything else has failed,' 3) 'In fact...' bridge, 4) Begin lie dismantling. This creates 'I need to know what went wrong' curiosity."
        domains: ["vsl-architecture", "transitions", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-804"
        title: "Its Not Your Fault Blame Framework"
        description: "Step 1: 'It is not your fault' (direct guilt removal). Step 2: 'Blame this' (redirect to external enemy — industry, misinformation, big companies). Step 3: 'The Big Truth' (reveal your unique mechanism as the real answer). This three-step creates shared enemy narrative."
        domains: ["persuasion", "rapport-building", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-805"
        title: "Bigger Solution Open Loop Framework"
        description: "Transition from Big Problem to Bigger Solution: 1) Establish that you have the answer, 2) Open a tip loop ('Before I reveal the solution, there are three things you must know'), 3) Begin Avoid tip. The open loop creates irresistible forward momentum."
        domains: ["vsl-architecture", "transitions", "engagement"]
        source: "NOWVSL"
      - id: "FW-JB-806"
        title: "Grand Offer Gear Shift Framework"
        description: "Step 1: Reintroduce with full name and credentials. Step 2: Reconnect to product/service. Step 3: Shift tone from casual to authoritative. Step 4: Begin product presentation. This deliberate gear shift signals 'something important is happening now.'"
        domains: ["vsl-architecture", "closing-techniques", "transitions"]
        source: "NOWVSL"
      - id: "FW-JB-807"
        title: "Cost of Loss Calculation Framework"
        description: "Before price reveal: 'What is the cost of NOT buying? Medical bills, lost confidence, missed promotions, failed relationships, wasted money on solutions that don't work.' Calculate the real dollar cost of inaction to make the product price seem trivial."
        domains: ["price-psychology", "persuasion", "closing-techniques"]
        source: "NOWVSL"
      - id: "FW-JB-808"
        title: "Final Close Sequence Framework"
        description: "Remember (pain reopen) → Pain of Inaction → Yet All Can Change (pivot) → Future-Paced Pleasure (present tense) → Picture Command → Responsibility Frame → Reinforce → 3 Reasons to Act Now → The Smart Thing → Final CTA. This is the complete closing architecture."
        domains: ["closing-techniques", "vsl-architecture", "frameworks"]
        source: "NOWVSL"
      - id: "FW-JB-809"
        title: "Action Drop Implementation Framework"
        description: "Place action drops (Today, Now, See, Listen, Actually) at the beginning of sentences throughout the VSL. Combine with other techniques: 'Now, you may be thinking' (action drop + may-or). 'Listen, this is not what I want for you' (action drop + empathy). Layer for maximum impact."
        domains: ["copywriting", "nlp", "implementation"]
        source: "NOWVSL"
      - id: "FW-JB-810"
        title: "Product Pacing Implementation Framework"
        description: "Always assume purchase: 'When you purchase today, turn to page 37' (book). 'When you order the service, you will want to immediately call' (service). 'When you begin the program, watch module 3 first' (course). Never use 'if' — always 'when.'"
        domains: ["future-pacing", "closing-techniques", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-811"
        title: "Open Loop Implementation Framework"
        description: "Technique 1: Start tip, interrupt with 'I will cover that last, but first...' Technique 2: Mention benefit without explaining mechanism. Technique 3: Reference a result you will show 'in just a moment.' Always close loops eventually — never leave the viewer feeling cheated."
        domains: ["engagement", "nlp", "copywriting"]
        source: "NOWVSL"
      - id: "FW-JB-812"
        title: "Ethical Bribe Framework"
        description: "After the pattern interrupt and suggestion, ethically bribe the viewer to watch until the end: 'If you watch until the end, you will discover [specific valuable thing].' The bribe must be genuinely valuable — not just a sales pitch. This is the retention hook."
        domains: ["engagement", "vsl-architecture", "persuasion"]
        source: "NOWVSL"
      - id: "FW-JB-813"
        title: "Something Completely Different Framework"
        description: "Differentiate from everything else the viewer has seen: 'This is something completely different from anything you have tried before.' Follow with specific reasons why. This addresses the 'I have seen this before' objection preemptively."
        domains: ["differentiation", "positioning", "objection-handling"]
        source: "NOWVSL"
      - id: "FW-JB-814"
        title: "Lets Make a Deal Ethical Bribe Framework"
        description: "Propose a deal: 'If you give me X minutes of your time, I will show you Y.' This frames watching the VSL as a fair exchange rather than a passive consumption. The viewer feels they are getting value for their time investment."
        domains: ["engagement", "rapport-building", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FW-JB-815"
        title: "Samurai Q&A Framework"
        description: "End the Grand Offer with a Q&A section addressing common objections formatted as real questions from real students. Each answer should reinforce value, handle objections, and include a mini-CTA. The Q&A serves as extended social proof."
        domains: ["objection-handling", "social-proof", "closing-techniques"]
        source: "NOWVSL"
        L5_METHODOLOGIES: "MET-JB-764"
      - id: "FW-JB-001"
        title: "USP Factory"
        description: "Three-part formula for creating a Unique Selling Proposition: Power Phrase (emotional hook, 3-5 words) + Prime Benefit (the main outcome, 5-8 words) + Enabler Phrase (the mechanism, 5-7 words). Total must be 20 words or fewer."
        domains: ["copywriting", "positioning", "usp-design"]
        source: "3XVSL"
      - id: "FW-JB-002"
        title: "1-2-3 Formula"
        description: "The complete content backbone of any VSL: 1 USP + 2 Stories (nightmare + dream) + 3 Tips (avoid + enjoy + how-to) + 4 Comparisons (2 heavy + 2 light). This ratio creates optimal persuasion density."
        domains: ["vsl-structure", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-003"
        title: "5-Step VSL Process"
        description: "The complete VSL architecture in 5 sequential steps: (1) Snap Suggestion -> (2) Vital Connection -> (3) Big Problem -> (4) Bigger Solution -> (5) Grand Offer. Each step transitions the prospect's emotional state."
        domains: ["vsl-creation", "sales-psychology", "copywriting"]
        source: "3XVSL"
      - id: "FW-JB-004"
        title: "Nightmare Story Formula"
        description: "6-part story structure for creating empathy and pain awareness: (1) Transition -> (2) Intro with Specifics Strategy (date, weather, clothing, location) -> (3) Bad Part (escalation) -> (4) Focal Point (rock bottom) -> (5) Declaration of Independence -> (6) Moral (bridges to solution)."
        domains: ["storytelling", "copywriting", "emotional-design"]
        source: "3XVSL"
      - id: "FW-JB-005"
        title: "Dream Story Formula"
        description: "4-part story structure for creating desire and aspiration: (1) Follow the Leader (cite authorities) -> (2) Specific You/General They (be specific about self, general about others) -> (3) Transition Phrase -> (4) Present Tense Promise (future pacing as if already real)."
        domains: ["storytelling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-006"
        title: "Tip Formula"
        description: "5-part structure for value-delivering tips in the VSL: (1) Benefit (what they get) -> (2) What Is It (name/explain) -> (3) How To (application) -> (4) Result (what happens) -> (5) Mini Dream Story (paint the outcome). Each tip must be self-contained yet connect to the whole."
        domains: ["vsl-structure", "copywriting", "reciprocity"]
        source: "3XVSL"
      - id: "FW-JB-007"
        title: "3 Tip Types Framework"
        description: "Three types of tips in strict sequence: (1) Avoid Tip (fear/why-based: what to avoid and why) -> (2) Enjoy Tip (what-if-based: what they could enjoy) -> (3) How-To Tip (linchpin: most actionable, bridges to product). Sequence mirrors fear -> desire -> action arc."
        domains: ["vsl-structure", "emotional-design", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-008"
        title: "4 Buyer Modalities Framework"
        description: "Four types of buyers that must all be addressed in every VSL: (1) Why Buyer (needs reason and context) -> (2) What Buyer (needs information and details) -> (3) How-To Buyer (needs process and steps) -> (4) What-If Buyer (needs possibilities and vision). Missing any one = losing 25% of audience."
        domains: ["buyer-psychology", "copywriting", "vsl-creation"]
        source: "3XVSL"
      - id: "FW-JB-009"
        title: "4 Comparisons Framework"
        description: "Four comparison types in two tiers: HEAVY (high emotional impact): (1) Competition Comparison (why you beat alternatives) + (2) With/Without Comparison (life with vs without product). LIGHT (reinforcement): (3) General Comparison (broad market context) + (4) Specific-to-Tip Comparison (connects back to tips given)."
        domains: ["comparison", "closing", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-010"
        title: "Snap Suggestion Framework"
        description: "5-part opening sequence for maximum attention capture: (1) Optional Intro (brief context, under 3 slides) -> (2) Pattern Interrupt (image or linguistic) -> (3) Big Promise (specific, tangible) -> (4) Video Scarcity (may be taken down) -> (5) Let's Make a Deal (value exchange agreement)."
        domains: ["vsl-structure", "attention-capture", "engagement"]
        source: "3XVSL"
      - id: "FW-JB-011"
        title: "Pattern Interrupt Types"
        description: "Two categories of pattern interrupts: (1) Image Interrupt (physical object from nightmare story used as visual hook) and (2) Linguistic/Verbal Interrupt (unexpected statement that breaks expected patterns). At least one must be used in the Snap Suggestion."
        domains: ["attention-capture", "vsl-creation", "engagement"]
        source: "3XVSL"
      - id: "FW-JB-012"
        title: "Conspiracy Cycle (Big Problem)"
        description: "5-step framework for establishing the problem through conspiracy: (1) Big Lie (industry conspiracy) -> (2) Not Your Fault (absolve prospect) -> (3) Blame This (external enemy) -> (4) Big Truth (the real answer) -> (5) Open Bigger Solution Loop (tease without revealing)."
        domains: ["problem-framing", "persuasion", "vsl-structure"]
        source: "3XVSL"
      - id: "FW-JB-013"
        title: "Bigger Solution Architecture"
        description: "4-part solution section structure: (1) Avoid Tip (fear/why) -> (2) Enjoy Tip (what-if) -> (3) How-To Tip (linchpin) -> (4) Transition to Grand Offer via: Two Choices -> Savvy Choice -> I've Done Work For You -> It's Called..."
        domains: ["vsl-structure", "closing", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-014"
        title: "Grand Offer 6 Parts"
        description: "Complete Grand Offer structure: (1) Product (what it is) -> (2) Price (value-stacked) -> (3) CTA (clear, repeated 3x minimum) -> (4) Pain/Pleasure (alternating) -> (5) Actions/Results (what they DO and GET) -> (6) Q&A (objection mop, top 5-7 remaining doubts)."
        domains: ["offer-design", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "FW-JB-015"
        title: "Transition to Grand Offer Sequence"
        description: "Strict 4-step transition from tips to offer: (1) Two Choices (do nothing vs. act) -> (2) Savvy Choice (flatter the buyer) -> (3) I've Done Work For You (position product as shortcut) -> (4) It's Called... (product reveal). Order is non-negotiable."
        domains: ["closing", "vsl-structure", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-016"
        title: "Even If Technique"
        description: "Pre-emptive objection handling framework: Add 'Even if...' clauses after key claims to address doubts before they form. Example: 'You can achieve X, even if you have no experience, even if you've tried before, even if you think it's too late.'"
        domains: ["objection-handling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-017"
        title: "Hero Study Framework"
        description: "Analyze successful experts to create aspirational proof: (1) Identify relevant authorities -> (2) Extract their patterns/methods -> (3) Show parallels to your approach -> (4) Conclude: 'Their success can be your success.' Builds credibility without self-promotion."
        domains: ["authority-building", "social-proof", "credibility"]
        source: "3XVSL"
      - id: "FW-JB-018"
        title: "Tire Kicker Elimination"
        description: "Early qualification framework: State clearly 'If you want a magic pill, leave now.' This: (1) Filters unqualified viewers -> (2) Builds trust with remaining viewers -> (3) Creates exclusivity -> (4) Increases commitment through self-selection."
        domains: ["qualification", "trust-building", "engagement"]
        source: "3XVSL"
      - id: "FW-JB-019"
        title: "Subliminal Command System"
        description: "Three layers of subliminal influence in VSL slides: (1) Red Text Highlighting (Decide, Freedom, Secret, Now, You, Today) -> (2) Action Drops (Today, Now, You See, Listen, Actually) -> (3) Anchor Drops (yet, because, guess what). All three layers work simultaneously beneath conscious awareness."
        domains: ["persuasion", "vsl-creation", "visual-psychology"]
        source: "3XVSL"
      - id: "FW-JB-020"
        title: "Vital Connection Architecture"
        description: "The bridge between opening (Snap Suggestion) and problem (Big Problem): Creates emotional rapport by showing understanding of the prospect's world. Establishes 'I know what you're going through' before revealing the conspiracy."
        domains: ["rapport", "vsl-structure", "trust-building"]
        source: "3XVSL"
      - id: "FW-JB-021"
        title: "3 States of Mind Progression"
        description: "Complete prospect journey framework: (1) Disbelief (skeptical wall — overcome with pattern interrupt + vital connection) -> (2) Decision (logical weighing — overcome with tips + comparisons) -> (3) Desire (emotional readiness — achieved through stories + grand offer)."
        domains: ["buyer-journey", "sales-psychology", "vsl-creation"]
        source: "3XVSL"
      - id: "FW-JB-022"
        title: "Nightmare Story Specifics Strategy"
        description: "Opening technique for nightmare stories: Include 4 specific details in the first 3-5 sentences: (1) Exact date or time period -> (2) Weather or environmental condition -> (3) Clothing or physical detail -> (4) Specific location or setting. Specificity signals authenticity."
        domains: ["storytelling", "credibility", "engagement"]
        source: "3XVSL"
      - id: "FW-JB-023"
        title: "Declaration of Independence Formula"
        description: "The turning point in the nightmare story: After the Focal Point (rock bottom), the protagonist makes a declaration: 'Enough is enough' / 'I decided that day...' This mirrors the buying decision the prospect must make."
        domains: ["storytelling", "transformation", "buyer-journey"]
        source: "3XVSL"
      - id: "FW-JB-024"
        title: "Follow the Leader Opening"
        description: "Dream story opening technique: Reference 2-3 known authorities who embody the promise or use similar principles. Structure: 'You know how [authority] always says/does [principle]? Well...' Creates borrowed credibility."
        domains: ["social-proof", "storytelling", "authority-building"]
        source: "3XVSL"
      - id: "FW-JB-025"
        title: "Pain/Pleasure Alternation Close"
        description: "Closing technique within Grand Offer: Alternate between pain points (what happens if they don't buy) and pleasure points (what happens if they do). Pattern: Pain -> Pleasure -> Pain -> Pleasure. Never stack same emotion consecutively."
        domains: ["closing", "emotional-design", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-026"
        title: "Actions/Results Tangibility Framework"
        description: "Grand Offer section that makes abstract products concrete: List specific ACTIONS the buyer will take (Step 1, Step 2...) paired with specific RESULTS they will achieve. Transforms 'digital product' into 'clear path with outcomes.'"
        domains: ["offer-design", "value-framing", "closing"]
        source: "3XVSL"
      - id: "FW-JB-027"
        title: "Q&A Objection Architecture"
        description: "Final Grand Offer section structured as strategic objection handling: Identify top 5-7 remaining objections (price, time, complexity, trust, uniqueness, guarantee, alternatives). Frame as prospect's questions; answer each to eliminate final resistance."
        domains: ["objection-handling", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "FW-JB-028"
        title: "Open Loop Architecture"
        description: "Strategic curiosity management throughout VSL: (1) Open major loop in Snap Suggestion -> (2) Open micro-loops within each section -> (3) Close micro-loops to build trust -> (4) Keep major loop open until product reveal -> (5) Product is the ONLY way to close the major loop."
        domains: ["engagement", "persuasion", "vsl-creation"]
        source: "3XVSL"
      - id: "FW-JB-029"
        title: "Emotional Arc Design"
        description: "Complete emotional trajectory of the VSL: Curiosity (Snap Suggestion) -> Connection (Vital Connection) -> Anger (Big Problem/Conspiracy) -> Empathy (Nightmare Story) -> Hope (Dream Story) -> Trust (Tips) -> Desire (Comparisons) -> Action (Grand Offer)."
        domains: ["emotional-design", "vsl-creation", "sales-psychology"]
        source: "3XVSL"
      - id: "FW-JB-030"
        title: "Comparison Placement Strategy"
        description: "Where each comparison type goes: (1) Competition Comparison — after tips, before Grand Offer -> (2) With/Without — within Grand Offer close -> (3) General Comparison — sprinkled through Vital Connection -> (4) Specific-to-Tip — immediately after each relevant tip."
        domains: ["comparison", "vsl-structure", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-031"
        title: "Reciprocity Escalation Ladder"
        description: "Progressive value delivery to build reciprocity: (1) Small value in Snap Suggestion (big promise) -> (2) Medium value in Tips (actionable content) -> (3) High value in How-To Tip (linchpin) -> (4) Full value requires purchase. Each rung increases psychological debt."
        domains: ["reciprocity", "trust-building", "vsl-structure"]
        source: "3XVSL"
      - id: "FW-JB-032"
        title: "USP Testing Matrix"
        description: "How to validate your USP: (1) Is it 20 words or fewer? -> (2) Does it contain a Power Phrase? -> (3) Does it state the Prime Benefit clearly? -> (4) Does it include an Enabler Phrase? -> (5) Would your buyer say it describes why they buy? If any answer is no, rewrite."
        domains: ["usp-design", "positioning", "validation"]
        source: "3XVSL"
      - id: "FW-JB-033"
        title: "Nightmare-to-Moral Bridge"
        description: "Connecting nightmare story ending to the solution: (1) State the moral of the story -> (2) Generalize to the prospect's situation -> (3) Hint at the existence of a solution -> (4) Do NOT name the product yet. The moral is a bridge, not a destination."
        domains: ["storytelling", "vsl-structure", "persuasion"]
        source: "3XVSL"
      - id: "FW-JB-034"
        title: "Buyer Identity Positioning"
        description: "Position the buyer as: (1) Savvy (smart enough to watch) -> (2) Action-oriented (willing to take steps) -> (3) Exclusive (part of a select group) -> (4) Deserving (earned the right to succeed). Product becomes the vehicle for this already-established identity."
        domains: ["buyer-psychology", "identity", "positioning"]
        source: "3XVSL"
      - id: "FW-JB-035"
        title: "Let's Make a Deal Agreement"
        description: "Early micro-commitment framework: (1) Acknowledge their time is valuable -> (2) Promise specific value (3 secrets, step-by-step, etc.) -> (3) Ask only for their attention -> (4) Frame as fair exchange. This agreement increases watch-through by 20-40%."
        domains: ["engagement", "commitment", "vsl-structure"]
        source: "3XVSL"
      - id: "FW-JB-036"
        title: "Competition Comparison Structure"
        description: "How to compare against competitors: (1) Acknowledge alternatives exist -> (2) Identify their key weaknesses -> (3) Show how your approach is different -> (4) Never badmouth by name — compare approaches, not companies. Ethical differentiation."
        domains: ["comparison", "positioning", "ethics"]
        source: "3XVSL"
      - id: "FW-JB-037"
        title: "With/Without Comparison Format"
        description: "Most powerful comparison format: Create two-column view — (1) WITHOUT Product: List 3-5 continuing pain points -> (2) WITH Product: List 3-5 resolved outcomes. Mirror each pain with its resolution. Makes inaction feel like choosing suffering."
        domains: ["comparison", "closing", "emotional-design"]
        source: "3XVSL"
      - id: "FW-JB-038"
        title: "Video Scarcity Execution"
        description: "How to implement video scarcity in Snap Suggestion: (1) State the video may not be available long -> (2) Give a believable reason (controversial content, limited offer, legal concerns) -> (3) Recommend watching now -> (4) Do NOT use countdown timers in VSL — they break credibility."
        domains: ["scarcity", "engagement", "credibility"]
        source: "3XVSL"
      - id: "FW-JB-039"
        title: "Paraphrase Cycle System"
        description: "Systematic approach to key point repetition: (1) Identify the 3-5 core messages -> (2) Restate each using different words every 5-15 slides -> (3) Use analogies, examples, and reframes as paraphrase vehicles -> (4) Each paraphrase must ADD value, not just repeat."
        domains: ["retention", "engagement", "copywriting"]
        source: "3XVSL"
      - id: "FW-JB-040"
        title: "Present Tense Promise Technique"
        description: "Dream story closing technique: Describe the desired future using present tense verbs — 'You wake up and check your phone. Sales notifications from overnight. Your calendar is clear because systems handle the work.' Makes the future feel inevitable."
        domains: ["storytelling", "persuasion", "visualization"]
        source: "3XVSL"
        # === CHAT VSL (CVSL) — 20 new frameworks ===
      - id: "FW-JB-041"
        title: "Buyer's Roadmap 3-Part System"
        description: "Complete pre-prompting framework in 3 parts: Part 1 (SEARCH 1 — 12 data fields: niche, avatar, goals, complaints, promises, benefits, objections, fears, false solutions, mistaken beliefs, expensive alternatives), Part 2 (Unique Mechanisms — positive hook + negative hook, each 3 words, with detail expansions), Part 3 (Offer Branding — name, price, guarantee, bonuses with values, testimonials)."
        domains: ["ai-copywriting", "market-research", "systems-thinking"]
        source: "CVSL"
      - id: "FW-JB-042"
        title: "ChatVSL 5-Step Formula"
        description: "The complete ChatVSL formula: Step 1 Snap Suggestion (pattern interrupt + lead, ~1000w) -> Step 2 Vital Connection (nightmare story + bridge, ~1500w) -> Step 3 Big Problem (negative hook reveal, ~500w) -> Step 4 Bigger Solution (positive hook + tips, ~800w) -> Step 5 Grand Offer (6-part perfect pitch, ~2200w). Total ~6000 words."
        domains: ["vsl-structure", "copywriting", "methodology"]
        source: "CVSL"
      - id: "FW-JB-043"
        title: "Grand Offer 6-Part Structure"
        description: "The Grand Offer (Step 5) has exactly 6 parts: (1) Offer Introduction with 3 Choices, (2) Product Features as benefit blocks with So-Rather-Than formula, (3) Faux pricing + real price reveal, (4) Dimensional bonus descriptions with That-Means-You-Get-To formula, (5) Guarantee + community inclusion, (6) NLP Close with future pacing + presupposition + click anchor."
        domains: ["offer-design", "closing", "vsl-structure"]
        source: "CVSL"
      - id: "FW-JB-044"
        title: "12-Prompt Library System"
        description: "Complete reusable prompt library: (1) Buyer's Roadmap, (2) Refiner, (3) Branding, (4) Expansion, (5) Rewrite Sections, (6) Offer Branding, (7) Pattern Interrupt, (8) Pattern Interrupt Refiner, (9) Lead, (10) Different Goals, (11) Get Specific, (12) Bullet Expander, (13) Create Returns/Slides."
        domains: ["ai-copywriting", "systems-thinking", "prompt-engineering"]
        source: "CVSL"
      - id: "FW-JB-045"
        title: "NLP Close Sequence"
        description: "Layered NLP closing sequence: (1) Future pacing at 7 days (quick wins), (2) Future pacing at 30 days (life transformation), (3) Presupposition language (assuming purchase), (4) Click Anchor (embedding the word 'click'), (5) Direct CTA command, (6) Inclusion statement (joining community)."
        domains: ["nlp-selling", "closing", "persuasion"]
        source: "CVSL"
      - id: "FW-JB-046"
        title: "Pattern Interrupt Prompt Template"
        description: "Prompt structure for AI pattern interrupts: instruct AI to write a 'movie scene' opening with (1) visual setting, (2) character in action, (3) anchor object, (4) building tension, (5) twist/cliffhanger. Must include: no exclamation marks, no hype, conversational tone, open loop at end."
        domains: ["ai-copywriting", "pattern-interrupt", "prompt-engineering"]
        source: "CVSL"
      - id: "FW-JB-047"
        title: "Nightmare Story In-Context Template"
        description: "Two-shot training for nightmare stories: provide 3 complete example stories (different niches) that follow the pattern: (1) normal life, (2) inciting incident, (3) anchor object appears, (4) escalating struggle, (5) rock bottom, (6) Declaration of Independence, (7) discovery of solution. AI learns the emotional arc without rigid instructions."
        domains: ["ai-copywriting", "storytelling", "prompt-engineering"]
        source: "CVSL"
      - id: "FW-JB-048"
        title: "Benefit Block Formula"
        description: "Each benefit block follows the structure: 'So rather than [old painful way], you get to [new desirable way].' Followed by dimensional expansion: What does that LOOK like? What does that FEEL like? What does that MEAN for your daily life?"
        domains: ["copywriting", "benefit-writing", "sensory-writing"]
        source: "CVSL"
      - id: "FW-JB-049"
        title: "Faux Price Architecture"
        description: "Pricing reveal structure: (1) State the 'real' retail value of each component, (2) Stack to impressive total, (3) Acknowledge the total, (4) Reveal 'on this page only' discount, (5) Show real price with 80%+ perceived savings, (6) Justify the discount (no catch, just smart business)."
        domains: ["pricing-psychology", "offer-design", "closing"]
        source: "CVSL"
      - id: "FW-JB-050"
        title: "SEARCH 1 Data Fields"
        description: "The 12 required data fields for Part 1 of the Buyer's Roadmap: [Niche], [Avatar], [Primary Goal], [Primary Complaint], [Secondary Goals], [Secondary Complaints], [Promises], [Benefits], [Objections], [Ultimate Fear], [False Solutions], [Mistaken Beliefs], plus [Expensive Alternatives]."
        domains: ["market-research", "ai-copywriting", "data-architecture"]
        source: "CVSL"
      - id: "FW-JB-051"
        title: "Dimensional Bonus Description"
        description: "Each bonus follows the formula: Name + 'valued at $X' + What It Is (1 sentence) + 'That means you get to...' (3-5 dimensional benefits showing what it LOOKS and FEELS like to use the bonus)."
        domains: ["offer-design", "benefit-writing", "copywriting"]
        source: "CVSL"
      - id: "FW-JB-052"
        title: "Guarantee + Community Close"
        description: "Guarantee structure: (1) Name the guarantee (e.g., 'Iron-Clad 60-Day Guarantee'), (2) State terms simply, (3) Remove all risk language, (4) Immediately follow with community inclusion ('You're about to join X members who...'), (5) Social proof embedded in the guarantee section."
        domains: ["risk-reversal", "community-building", "closing"]
        source: "CVSL"

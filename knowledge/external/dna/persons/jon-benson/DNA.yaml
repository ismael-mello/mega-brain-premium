      - id: "MET-JB-033"
        title: "Complete Buyer's Roadmap Build Process"
        description: "Step-by-step roadmap creation: (1) Open ChatGPT-4 Plus, (2) Input niche in 2-4 words, (3) Run SEARCH 1 prompt to generate 12 data fields, (4) Review and refine each field manually, (5) Run branding prompt 5-12 times for positive and negative hooks, (6) Select best hooks based on mystery and scientific sound, (7) Run offer branding prompt for name, price, guarantee, bonuses, (8) Copy entire roadmap data before any VSL prompt."
        domains: ["ai-copywriting", "market-research", "methodology"]
        source: "CVSL"
      - id: "MET-JB-034"
        title: "Pattern Interrupt Creation (Movie Scene)"
        description: "Pattern interrupt creation methodology: (1) Write movie-scene prompt with visual setting and anchor object, (2) Include all buyer roadmap data in prompt, (3) Specify: no exclamation marks, no hype, conversational tone, (4) Generate pattern interrupt, (5) Run pattern interrupt REFINER to add anchor object and remove sales language, (6) Review for dimensionalization, (7) Ensure open loop at end leading to lead section."
        domains: ["ai-copywriting", "pattern-interrupt", "vsl-creation"]
        source: "CVSL"
      - id: "MET-JB-035"
        title: "Two-Shot AI Training for Nightmare Stories"
        description: "In-context training methodology: (1) Gather 3 example nightmare stories from different niches, (2) Paste all 3 examples BEFORE the prompt, (3) Add buyer roadmap data, (4) Instruct AI to write a nightmare story in the STYLE of the examples, (5) Do NOT give rigid structural instructions — let AI learn the pattern from examples, (6) Refine for dimensionalization and anchor object continuity."
        domains: ["ai-copywriting", "storytelling", "prompt-engineering"]
        source: "CVSL"
      - id: "MET-JB-036"
        title: "Hook Generation Process"
        description: "Unique mechanism naming methodology: (1) Run branding prompt with buyer roadmap data, (2) Review 4-6 options generated, (3) Re-run prompt 5-12 more times, (4) Collect 20-50+ hook name options, (5) Filter: must be 3-4 words max, Title Case, scientific/mysterious sounding, (6) Test: does it sound like something you'd Google?, (7) Select best positive hook and best negative hook."
        domains: ["branding", "offer-construction", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-037"
        title: "Grand Offer Assembly (6 Parts)"
        description: "Step-by-step Grand Offer creation: (1) Write 3 Choices intro (do nothing / DIY / smart path), (2) Write product features using So-Rather-Than formula for each benefit, (3) Build faux price stack with retail values > 2x offer price, (4) Write dimensional bonus descriptions with That-Means-You-Get-To formula, (5) Write guarantee with immediate community inclusion, (6) Write NLP close: future pacing (7d + 30d) + presupposition + click anchor + CTA."
        domains: ["offer-design", "closing", "vsl-creation"]
        source: "CVSL"
      - id: "MET-JB-038"
        title: "VSL Editing and Refinement Process"
        description: "Post-generation editing methodology: (1) Read full output aloud — mark anything that sounds like 'radio voice', (2) Run refiner prompt on flagged sections, (3) Check dimensionalization: can you SEE and FEEL every claim?, (4) Remove ALL exclamation marks, (5) Verify anchor object appears in interrupt + nightmare + offer, (6) Ensure all open loops are closed, (7) Check facts — AI lies, (8) Final pass for tone consistency."
        domains: ["editing", "quality-assurance", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-039"
        title: "Refiner Prompt Methodology"
        description: "Copy refinement process: (1) Identify flat/generic sections in AI output, (2) Paste section into refiner prompt, (3) Specify: make more dimensional, add sensory language, remove hype, (4) Compare original vs refined, (5) Take best parts of both, (6) Re-run refiner on still-flat sections, (7) Maximum 3 refinement passes per section — diminishing returns after that."
        domains: ["ai-copywriting", "editing", "dimensionalization"]
        source: "CVSL"
      - id: "MET-JB-040"
        title: "Offer Branding Process"
        description: "Complete offer branding methodology: (1) Start with buyer roadmap data, (2) Generate offer name options (5+ iterations), (3) Generate bonus names and values using tilde-separated format, (4) Assign retail values that stack to 4-8x the real price, (5) Write guarantee name and terms, (6) Compile testimonial data for social proof sections."
        domains: ["branding", "offer-design", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-041"
        title: "Bullet Expansion Methodology"
        description: "Converting bullet points to dimensional paragraphs: (1) Take a single bullet/benefit, (2) Run through expansion prompt targeting ~200 words, (3) Structure: restate concept + why it matters + specific example + before/after picture + connect to daily life, (4) Check for sensory language, (5) Ensure no generic claims remain."
        domains: ["copywriting", "expansion", "ai-copywriting"]
        source: "CVSL"
      - id: "MET-JB-042"
        title: "Returns/Slides Formatting"
        description: "Converting VSL copy to slide format: (1) Take completed VSL text, (2) Run create returns prompt, (3) Break into 1-2 sentence slides, (4) Each slide = one thought or image, (5) Add slide transition markers, (6) Include red text markers for subliminal emphasis words, (7) Timing: average 2-3 seconds per slide."
        domains: ["vsl-production", "formatting", "production"]
        source: "CVSL"
      - id: "MET-JB-043"
        title: "Different Goals Prompt Usage"
        description: "Preventing AI repetition methodology: (1) When AI generates similar goals/complaints/benefits repeatedly, (2) Use the Different Goals prompt which explicitly says 'do NOT repeat any of the following: [paste existing]', (3) Force AI into new creative territory, (4) Run 3-4 times to build a diverse pool, (5) Select best from each run."

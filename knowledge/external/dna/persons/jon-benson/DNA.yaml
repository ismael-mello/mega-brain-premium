layers:
  L1_PHILOSOPHIES:
      - id: "FIL-JB-592"
        title: "Duality Marketing as Foundation"
        description: "The answer to your customer's natural state of indecision is duality marketing. Everyone is in a state of indecision until they hit the buy button. Speak in pros and cons, not hammer-positive."
        domains: ["copywriting", "sales-psychology", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-593"
        title: "Cognitive Dissonance Drives Indecision"
        description: "Indecision is a direct response to cognitive dissonance — the internal 'I know I should but I shouldn't.' When you speak decisively in duality, you affirm their indecision while persuading action."
        domains: ["sales-psychology", "buyer-behavior", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-594"
        title: "Text Sales Pages Are Not Dead"
        description: "Text-based sales pages are not dead — they are effective as modality shifters, alternate landing pages, and exit pages. A 50/50 split with VSL extends campaign life."
        domains: ["copywriting", "sales-pages", "conversion-optimization"]
        source: "5MSLF"
      - id: "FIL-JB-595"
        title: "Three-Line Paragraph Rule"
        description: "Most sales page paragraphs should be no more than three lines. People do not want to read dense text blocks. This has been tested and proven to increase conversions."
        domains: ["copywriting", "formatting", "readability"]
        source: "5MSLF"
      - id: "FIL-JB-596"
        title: "Inquiry Cures Judgment"
        description: "Questions build rapport without judgment. 'Did you know' and 'Have you ever thought about' create inquisitive copy that avoids the hard-sell feeling."
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "5MSLF"
      - id: "FIL-JB-597"
        title: "Subheadlines Are the Sales Letter in Blip Format"
        description: "Your subheadlines are essentially the entire sales letter in very brief format. Each one must carry the argument forward independently."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "FIL-JB-598"
        title: "Four Es of Proof"
        description: "Four types of proof to support your hook: Engagers (testimonials), Evidence (studies/data), Experience (personal), and Expertise (authority credentials). Use at least 2 of 4."
        domains: ["copywriting", "proof-elements", "credibility"]
        source: "5MSLF"
      - id: "FIL-JB-599"
        title: "Us Versus Them is Inclusion"
        description: "The 'Us versus Them' section is about inclusion — making the reader feel part of your tribe while comparing your solution to alternatives and preemptively answering objections."
        domains: ["copywriting", "positioning", "tribe-building"]
        source: "5MSLF"
      - id: "FIL-JB-600"
        title: "Clicks Dont Matter Buys Do"
        description: "People are so concerned about clicks. Be more concerned about buys. Getting a click is not the answer — conversion to purchase is the only metric that matters."
        domains: ["conversion-optimization", "metrics", "direct-response"]
        source: "5MSLF"
      - id: "FIL-JB-601"
        title: "Special Sauce Separate from Hook"
        description: "The special sauce is something else within your program that makes it unique — it is NOT your hook. You can have multiple trademark elements. The hook opens the door; the special sauce keeps them inside."
        domains: ["positioning", "offer-design", "differentiation"]
        source: "5MSLF"
      - id: "FIL-JB-602"
        title: "People Buy Feelings Not Products"
        description: "No one buys a product because of how they will think. They buy because of how they will feel. The lizard brain decides; the prefrontal cortex rationalizes after."
        domains: ["sales-psychology", "buyer-behavior", "emotion"]
        source: "5MSLF"
      - id: "FIL-JB-603"
        title: "Imagine This Day With Me"
        description: "Future pacing in present tense is more powerful than future tense. 'Imagine this day with me' creates association between the reader and the narrator subconsciously."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "5MSLF"
      - id: "FIL-JB-604"
        title: "Buy Now Subliminal Spelling"
        description: "Intentionally using 'By now you probably realize...' with the subliminal read of 'Buy now' is a proven covert persuasion technique embedded in sales copy."
        domains: ["nlp", "persuasion", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-605"
        title: "Everything You Need Cripples Upsell"
        description: "Saying 'everything you need is right here' can cripple the upsell if not phrased correctly. Bridge with 'however, some people want to do it faster/easier.'"
        domains: ["offer-design", "upsell-strategy", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-606"
        title: "Treasure Map Analogy for Short Products"
        description: "How many pages does a treasure map need before you buy it? One. Use this analogy to neutralize objections about product length or perceived thinness of content."
        domains: ["objection-handling", "value-framing", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-607"
        title: "Making Negative Objections Positive"
        description: "Turn every apparent weakness into a strength: not professionally published means raw and real, only 16 pages means dense and actionable, no fancy cover means substance over style."
        domains: ["copywriting", "objection-handling", "reframing"]
        source: "5MSLF"
      - id: "FIL-JB-608"
        title: "Remember Then New Fact is Samurai"
        description: "Starting a section with 'Remember' followed by a totally new fact is one of the most ninja elements. Readers think they missed something and reread the page."
        domains: ["copywriting", "attention-capture", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-609"
        title: "Why Its Just Price Assumes Affordability"
        description: "The phrasing 'Why it's just $X' automatically assumes the price is remarkably low. The reader accepts the framing before they have even evaluated the price."
        domains: ["pricing-psychology", "copywriting", "framing"]
        source: "5MSLF"
      - id: "FIL-JB-610"
        title: "Incongruence Close from A Few Good Men"
        description: "Showing that inaction is incongruent with the reader's own stated values is the ultimate close. Like Jack Nicholson on the stand — they must act or betray their own integrity."
        domains: ["closing", "persuasion", "sales-psychology"]
        source: "5MSLF"
      - id: "FIL-JB-611"
        title: "Negative to Positive Duality Close"
        description: "The close sequence goes negative to positive in duality: 'Here's why you'd be stupid not to take it' followed by 'But here's a better choice — here's what awaits you.'"
        domains: ["closing", "copywriting", "duality-marketing"]
        source: "5MSLF"
      - id: "FIL-JB-612"
        title: "Average Person Sees Ad Nine Times"
        description: "The average person needs to see an ad 9 times before buying. This justifies intentional repetition within a sales page — repeating key messages is not redundancy, it is strategy."
        domains: ["advertising", "frequency", "sales-psychology"]
        source: "5MSLF"
      - id: "FIL-JB-613"
        title: "PPS Encapsulates Entire Sales Letter"
        description: "The PPS should encapsulate the entire sales letter in about 5 lines because that is where people scroll to first. The bottom of the page is premium real estate."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "FIL-JB-614"
        title: "Modesty Honesty Determination Build Trust"
        description: "The three trust keys are modesty, honesty, and determination. Modesty makes you relatable, honesty (even humiliating) builds credibility, determination shows commitment."
        domains: ["rapport-building", "credibility", "storytelling"]
        source: "5MSLF"
      - id: "FIL-JB-615"
        title: "Email is Not Dead The Message Is"
        description: "Email is not dying — bad email is dying. You are not your list; you are your message. The quality of your communication determines everything."
        domains: ["email-marketing", "messaging", "copywriting"]
        source: "5MSLF"
      - id: "FIL-JB-616"
        title: "Monkey Mind Controls Buying"
        description: "The limbic system (monkey mind) controls virtually every buying decision. The prefrontal cortex rationalizes after. Speak to the monkey mind first, logic second."
        domains: ["sales-psychology", "neuroscience", "persuasion"]
        source: "5MSLF"
      - id: "FIL-JB-617"
        title: "Avoidance Modality Over Approach"
        description: "The monkey mind responds more to avoidance of fear than to possibility of pleasure. 'Read This Book or Die' works because avoidance modality triggers deeper attention."
        domains: ["sales-psychology", "persuasion", "attention-capture"]
        source: "5MSLF"
      - id: "FIL-JB-618"
        title: "HTML Templates Are Satans Sex Toys"
        description: "HTML email templates destroy deliverability and personal connection. Plain text emails that look personal always outperform designed templates."
        domains: ["email-marketing", "deliverability", "authenticity"]
        source: "5MSLF"
      - id: "FIL-JB-619"
        title: "Being Afraid to Offend Kills Sales"
        description: "Being afraid to offend is one of the biggest email killers. The polarizing voice creates tribe; the vanilla voice creates indifference. Offend the wrong people to attract the right ones."
        domains: ["email-marketing", "voice", "polarization"]
        source: "5MSLF"
      - id: "FIL-JB-620"
        title: "Overuse of Swipe Copy Destroys Voice"
        description: "Swipe files should be studied for structure, not copied verbatim. Overusing swipe copy destroys your unique voice and makes you sound like everyone else."
        domains: ["copywriting", "authenticity", "voice"]
        source: "5MSLF"
      - id: "FIL-JB-621"
        title: "Email Too Infrequently Kills Revenue"
        description: "Emailing too infrequently is worse than emailing too much. Your list forgets you. Frequency builds familiarity and familiarity builds trust."
        domains: ["email-marketing", "frequency", "list-management"]
        source: "5MSLF"
      - id: "FIL-JB-622"
        title: "All Email Rules Can Be Broken"
        description: "Every single email rule can be broken if you understand why the rule exists. Mastery means knowing when to follow and when to violate conventions intentionally."
        domains: ["email-marketing", "mastery", "rule-breaking"]
        source: "5MSLF"
      - id: "FIL-JB-650"
        title: "Pattern Interrupt Is Neurological Not Gimmick"
        description: "A pattern interrupt is not a random gimmick — it is a neurological strategy from NLP that temporarily disengages the prefrontal cortex, making the viewer more open to auditory suggestion. When the brain snaps back into attention, the very next thing heard seems larger and more important."
        domains: ["vsl-structure", "nlp", "sales-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-651"
        title: "Seven Second Web Attention Window"
        description: "The average length of time spent on a website, even a killer website, is under seven seconds. You do not have long to grab attention. Your prospect clicked one link — that is all they committed to. You must earn every second after that."
        domains: ["vsl-structure", "conversion-optimization", "attention"]
        source: "VSLFT18"
      - id: "FIL-JB-652"
        title: "Modesty Honesty Determination Build Trust"
        description: "The three trust keys that build rapport better than anything are modesty, honesty, and determination. Modesty means 'I'm just like you.' Honesty means humiliating vulnerability. Determination means 'I made a vow and kept it.' These three together create unshakeable trust."
        domains: ["rapport-building", "trust", "storytelling"]
        source: "VSLFT18"
      - id: "FIL-JB-653"
        title: "People Buy Experiences Not Products"
        description: "The most valuable thing you can sell is the experience. People go to Starbucks for the experience, not the coffee. Build an experience around whatever you sell — guns, dating, weight loss, finance. 'Here is what you are about to experience' is a killer framing."
        domains: ["positioning", "offer-design", "buyer-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-654"
        title: "Negative Motivation Outweighs Positive 75 to 25"
        description: "75% of human behavior is motivated by avoiding pain, only 25% by gaining pleasure. Fear, avoidance, and loss drive action far more powerfully than hope or gain. This is hardwired — the amygdala fires fear signals that override the prefrontal cortex."
        domains: ["sales-psychology", "buyer-behavior", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-655"
        title: "Ruthlessly Efficient and Absolutely Honest"
        description: "You should be ruthlessly efficient in selling and absolutely honest to the core. If you do not want to sell the most effective and ethical way you can, you are in the wrong business. Good products deserve aggressive, ethical marketing."
        domains: ["ethics", "sales-philosophy", "direct-response"]
        source: "VSLFT18"
      - id: "FIL-JB-656"
        title: "If It Sounds Stupid Try It"
        description: "If you think a marketing tactic sounds stupid or ridiculous, try it anyway. The stupidest-sounding ideas often produce the best results. Never dismiss a tactic without testing it. Same-page redirect after window-out is an example."
        domains: ["testing", "conversion-optimization", "mindset"]
        source: "VSLFT18"
      - id: "FIL-JB-657"
        title: "Your Product Is Not About Your Product"
        description: "When selling, it is never about the product — it is about the prospect's feelings, desires, and solutions that improve their life. Even if your product is a gun, you sell the feeling of safety, power, or protection. Always ask: what happens AFTER they use it?"
        domains: ["copywriting", "positioning", "buyer-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-658"
        title: "Conspiracy Cycle Is Universal"
        description: "Every single problem your customer faces has a conspiracy element — something or someone other than themselves to blame. The media, the government, the industry — there is always a villain. This is not lying; it is illuminating the real contributing factors."
        domains: ["vsl-structure", "storytelling", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-659"
        title: "Not Entirely Your Fault Is Key Phrasing"
        description: "Never say 'it is not your fault' — say 'it is not entirely your fault.' The word 'entirely' is the critical difference. It removes guilt without absolving responsibility, making the prospect far more receptive to listening and learning."
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-660"
        title: "Let Your Customer Tell You What to Name Your Product"
        description: "Survey your prospects: 'What word or phrase would inspire you to buy a book about GOAL if you saw it on the cover?' The most common answer IS your product title. Never guess — let the market tell you."
        domains: ["market-research", "product-naming", "positioning"]
        source: "VSLFT18"
      - id: "FIL-JB-661"
        title: "Guilt Kills Attention"
        description: "When people feel guilty, they hear blah blah blah. They are wrapped in their own shame and cannot absorb your message. Remove guilt first, then teach. A prospect freed from guilt has radically higher attention span."
        domains: ["sales-psychology", "rapport-building", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-662"
        title: "One New Belief Is All You Need"
        description: "You only want your customer to believe one new thing after watching your VSL. One central idea. One trademarked principle. If they cannot think about your topic without thinking about your concept, you have won."
        domains: ["positioning", "branding", "vsl-structure"]
        source: "VSLFT18"
      - id: "FIL-JB-663"
        title: "Copy Length Correlates with Conversion"
        description: "Longer copy almost always outperforms shorter copy. The longer people stay engaged, the more they buy. Redundancy is wonderful in copy — repeat the core message in different ways because people are selectively stupid at any given moment."
        domains: ["copywriting", "conversion-optimization", "direct-response"]
        source: "VSLFT18"
      - id: "FIL-JB-664"
        title: "Handwriting Sales Copy Embeds It in Your Brain"
        description: "Handwriting successful sales copy on paper creates a neural connection between senses that literally locks the patterns into your brain. This old copywriting trick from Gary Halbert through John Carlton makes you start thinking and writing like a pro naturally."
        domains: ["copywriting", "skill-development", "learning"]
        source: "VSLFT18"
      - id: "FIL-JB-665"
        title: "YouTube Is Now Preferred VSL Host"
        description: "YouTube is now the preferred source for hosting video sales letters. Top VSLs are hosted on YouTube for zero cost instead of paying $20-50K/month to Wistia. YouTube allows stripping controls except the logo and provides viral distribution."
        domains: ["vsl-delivery", "technology", "cost-optimization"]
        source: "VSLFT18"
      - id: "FIL-JB-666"
        title: "75 Percent of Sales Come in QA Section"
        description: "Roughly 75% of sales from a VSL come during the Q&A section, not when the buy button first drops. Only about 25% buy at the initial price reveal. The Q&A is where the real selling happens — go as long as it takes."
        domains: ["vsl-structure", "closing", "conversion-optimization"]
        source: "VSLFT18"
      - id: "FIL-JB-667"
        title: "Be Passionate About Your Subject"
        description: "You need to know your field deeply and be genuinely passionate about it. Passion comes through in copy and presentation. Admittedly say 'I could be wrong' — it builds credibility. But know your subject cold."
        domains: ["authenticity", "expertise", "credibility"]
        source: "VSLFT18"
      - id: "FIL-JB-668"
        title: "The Problem Is Bigger Than They Think"
        description: "Every single problem your prospect faces is bigger than they think it is. Your job as a marketer is to elucidate how large it really is — not by lying, but by extrapolating the real downstream consequences they have not considered."
        domains: ["sales-psychology", "problem-agitation", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-669"
        title: "Pre-VSL Research Doubles Sales"
        description: "Doing the 5-step pre-VSL checklist before writing a single word will likely double your sales. Every person who struggled with a VSL and was asked 'did you do the pre-step research?' answered no. The homework is mandatory, not optional."
        domains: ["market-research", "vsl-preparation", "conversion-optimization"]
        source: "VSLFT18"
      - id: "FIL-JB-670"
        title: "Specificity Creates Believability"
        description: "The more specific your details — exact dates, times, places, objects, sensations — the more believable your story becomes. 'Tuesday, November 6th, 1992, it was raining and I was cold' is infinitely more powerful than 'one day I decided to change.'"
        domains: ["storytelling", "copywriting", "credibility"]
        source: "VSLFT18"
      - id: "FIL-JB-671"
        title: "Everyone Procrastinates Even Professionals"
        description: "Procrastination is universal — even professionals put off their own work. You must engineer urgency because left to their own devices, people will put things off for days, months, years. Unless you act now, you may never act at all."
        domains: ["urgency", "buyer-behavior", "closing"]
        source: "VSLFT18"
      - id: "FIL-JB-672"
        title: "Ethical Persuasion Is a Moral Obligation"
        description: "If you have a genuinely good product or service, you ethically owe it to your customers to sell as effectively as possible. Making a strong case for your solution is not manipulation — it is a moral obligation."
        domains: ["ethics", "sales-philosophy", "persuasion"]
        source: "VSLFT18"
      - id: "FIL-JB-673"
        title: "Die Trying Creates Emotional Resonance"
        description: "The most powerful determination statement is 'I was going to solve this or die trying.' When you make a personal vow at rock bottom, people resonate with it deeply. It is the pivot point that transforms nightmare into hero journey."
        domains: ["storytelling", "rapport-building", "emotional-selling"]
        source: "VSLFT18"
      - id: "FIL-JB-674"
        title: "Give Away 80 Percent Keep 20"
        description: "Give away 80% of your knowledge in the VSL. People will buy it for the other 20%. Give away concepts and principles but keep the specific implementation for the product. Generosity builds trust and creates obligation."
        domains: ["content-strategy", "value-delivery", "trust"]
        source: "VSLFT18"
      - id: "FIL-JB-675"
        title: "Validation Is Constant and Non-Negotiable"
        description: "Every single element of the VSL must validate the prospect. 'That is okay.' 'You may feel overwhelmed and that is fine.' Not one word should be judgmental or make the viewer feel stupid. With them, always gentle."
        domains: ["rapport-building", "copywriting", "buyer-psychology"]
        source: "VSLFT18"
      - id: "FIL-JB-676"
        title: "Third Person Story Builds Same Rapport"
        description: "If the expert cannot tell a personal nightmare story, use a client's story instead. 'Let me tell you about Sally' works just as powerfully as a first-person story. The expert becomes the hero because they helped Sally."
        domains: ["storytelling", "rapport-building", "vsl-structure"]
        source: "VSLFT18"
      - id: "FIL-JB-677"
        title: "Howard Stern Principle of Curiosity"
        description: "People listened to Howard Stern — even those who hated him — because they wanted to hear what he would say next. Your VSL must create that same irresistible curiosity. Every slide must make it impossible to window out."
        domains: ["engagement", "curiosity", "vsl-structure"]
        source: "VSLFT18"
      - id: "FIL-JB-678"
        title: "Investment Not Price"
        description: "Never say 'price' — say 'investment.' Investment implies expected return. 'Your investment today' frames the purchase as a wise financial decision rather than an expense."
        domains: ["pricing-psychology", "framing", "closing"]
        source: "VSLFT18"
      - id: "FIL-JB-679"
        title: "That Is Not What I Want for You"
        description: "The phrase 'and that is not what I want for you' is one of the most powerful closing phrases ever tested. It shows compassion, implies you deserve more, and forces the prospect to ask 'so what DO you want for me?'"
        domains: ["closing", "copywriting", "emotional-selling"]
        source: "VSLFT18"
      - id: "FIL-JB-700"
        title: "VSL Is Architecture Not Writing"
        description: "A video sales letter is not a writing exercise — it is an architectural blueprint. Every slide, every word, every pause is placed with surgical intention. The 5-Step VSL Process (Snap Suggestion, Vital Connection, Big Problem, Bigger Solution, Grand Offer) is the roof of the house built on foundational elements."
        domains: ["vsl-architecture", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-701"
        title: "Decision to Desire Is the Core Conversion"
        description: "Your goal is to move your viewers from a state of decision to a state of desire. When you desire something you say 'how much is it? I don't care, just give it to me.' When in decision mode you think 'I wonder if I can afford this.' The entire VSL exists to accomplish this single shift."
        domains: ["sales-psychology", "buyer-behavior", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-702"
        title: "Expert from Necessity Principle"
        description: "You became an expert from necessity, not from choice. Your back was against the wall. This positioning disarms the expert's paradox — the viewer sees you as slightly better off rather than impossibly above them, which builds rapport instead of creating distance."
        domains: ["positioning", "rapport-building", "storytelling"]
        source: "NOWVSL"
      - id: "FIL-JB-703"
        title: "People Want Personality Not Just Information"
        description: "People are not just seeking information — they are seeking personality. With 3 billion new internet users coming, the only thing that will make you stand out is your voice. Your unique style of communication is your ultimate competitive advantage."
        domains: ["branding", "voice", "differentiation"]
        source: "NOWVSL"
      - id: "FIL-JB-704"
        title: "You Can Never Give Away Too Much Information"
        description: "It is almost impossible to give away too much information. Even if you gave away 90% of your content, your prospect would still buy. The buyer assumes that someone giving fantastic free content always has more to offer. Generosity builds trust and reciprocity."
        domains: ["content-strategy", "trust-building", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-705"
        title: "Three States of Every Website Visitor"
        description: "Every person hitting your sales page is in one or more of three states: Disbelief Mode (doubt), Decision Mode (analyzing options), and Discovery Mode (wants to find something new). Your VSL must address all three simultaneously."
        domains: ["buyer-behavior", "sales-psychology", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-706"
        title: "Rapport Is Built Through Vulnerability Not Authority"
        description: "You will never enter a state of rapport with someone who believes you are too far above them. Your job is to convince readers you are only slightly better off than they are. Authority comes later — rapport through vulnerability comes first."
        domains: ["rapport-building", "positioning", "storytelling"]
        source: "NOWVSL"
      - id: "FIL-JB-707"
        title: "Continuation Is Everything in VSL"
        description: "Video sales letters are all about continuation. That is what makes them more powerful than text-based sales pages — you can inspire continuation, you can get people to keep watching. Every technique exists to serve this one purpose."
        domains: ["vsl-architecture", "engagement", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-708"
        title: "Grand Offer Makes or Breaks Everything"
        description: "Without the Grand Offer step, the other four steps are completely in vain. You can have the greatest copy, the most awesome nightmare story, a stellar USP — fail at the grand offer and the video fails. The offer is everything."
        domains: ["offer-design", "vsl-architecture", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-709"
        title: "Ethical Persuasion Is Still Persuasion"
        description: "All of these NLP tricks and psychological techniques are ethical and honest. If your goal is to sell a product that helps people, doing it in any honest way possible is the right path. Dishonest marketing is never acceptable."
        domains: ["ethics", "persuasion", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-710"
        title: "Presentation Beats Video by 25 Percent"
        description: "Using the term 'presentation' instead of 'video' increased VSL conversions by 25%. Small word choices create massive conversion differences. Wordsmithing is not decoration — it is engineering."
        domains: ["copywriting", "conversion-optimization", "testing"]
        source: "NOWVSL"
      - id: "FIL-JB-711"
        title: "Pain Must Be Continuously Reinforced"
        description: "Throughout the entire video sales letter, you must continually remind the reader about their pain. They know they are in pain but they need to be reminded about it. Pain followed by your specific solution is the fundamental selling rhythm."
        domains: ["sales-psychology", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "FIL-JB-712"
        title: "Nightmare Story Is Not Fiction"
        description: "Your nightmare story should not be fiction. It must be true and authentic. Events can be resequenced for dramatic effect like a biopic movie, but the core story must be real. Authenticity is what creates genuine rapport."
        domains: ["storytelling", "authenticity", "rapport-building"]
        source: "NOWVSL"
      - id: "FIL-JB-750"
        title: "Lies Are Found Within Your Withouts"
        description: "Your prospect's lies — the misinformation they believe — are found directly within your 'without' statements from your benefit formulas. Each 'without' is a lie the prospect believes they must endure. You expose and dismantle these lies systematically."
        domains: ["copywriting", "persuasion", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-751"
        title: "Four Buyer Modalities Must All Be Addressed"
        description: "There are four buyer modalities: Why, What, How-To, and What-If. Most marketers only speak to one modality. If you focus on only one, you lose 75% of your potential audience. Tips must address all four."
        domains: ["sales-psychology", "buyer-behavior", "tip-formula"]
        source: "NOWVSL"
      - id: "FIL-JB-752"
        title: "Tips Are the Heart of Affiliate Promotion"
        description: "Affiliates want to send to solid content, not pitchy material. The tips section of your VSL is the secret to affiliate success. Without great tips, affiliates will simply promote someone else's product."
        domains: ["affiliate-marketing", "content-strategy", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-753"
        title: "All Tips Build a Funnel Toward Your Product"
        description: "Your tips are leading your prospect to your unified solution found within your product or service. Tips build and build until there is almost no choice but to get your product. The funnel is invisible but inevitable."
        domains: ["tip-formula", "sales-funnels", "persuasion"]
        source: "NOWVSL"
      - id: "FIL-JB-754"
        title: "Inclusion Is the Most Powerful Rapport Tool"
        description: "No one wants to feel left out of the club. When you present your successful users as a club and then say 'here is who will never fit,' the fence-sitters desperately want to join. Inclusion language like 'people like you and me' is immensely powerful."
        domains: ["rapport-building", "persuasion", "nlp"]
        source: "NOWVSL"
      - id: "FIL-JB-755"
        title: "Avoid the Word But in Sales Copy"
        description: "The word 'but' is a stop term in neuro-linguistic programming that halts the reader negatively. Replace with 'yet,' 'however,' or 'and.' 'However' is also an imagination term that provokes the reader's creative mind."
        domains: ["copywriting", "nlp", "wordsmithing"]
        source: "NOWVSL"
      - id: "FIL-JB-756"
        title: "Never Assume What Your Reader Thinks"
        description: "When you say 'I know what you're thinking,' you risk two things: bringing up negative thoughts they weren't having, and offending them by suggesting you can read their minds. Use the 'may or' technique instead: 'You may be thinking X, or perhaps you already know Y.'"
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-757"
        title: "Guarantee Must Be Triple Not Single"
        description: "Solid guarantees increase conversions by 50%. The triple guarantee is far more powerful than a standard guarantee because it addresses three levels of satisfaction, with the third being something ridiculous that breaks the pattern and creates a chuckle."
        domains: ["offer-design", "conversion-optimization", "guarantees"]
        source: "NOWVSL"
      - id: "FIL-JB-758"
        title: "Dont Decide Right Now Is the Ultimate Close Setup"
        description: "Saying 'don't decide right now' is a psychological pattern break that leads into the guarantee. In essence they don't have to decide now — they can decide in 60 days. This reversal is one of the most powerful sales close techniques."
        domains: ["closing-techniques", "sales-psychology", "pattern-interrupts"]
        source: "NOWVSL"
      - id: "FIL-JB-759"
        title: "Good VSLs Become Great at the Grand Offer"
        description: "An okay video sales letter can become a great one purely through the Grand Offer section. There is not a lot of writing skills involved — it is just sequencing. The offer is where all the prior rapport converts to revenue."
        domains: ["vsl-architecture", "offer-design", "conversion-optimization"]
        source: "NOWVSL"
      - id: "FIL-JB-760"
        title: "Investment Not Price in the Close"
        description: "Never say 'your total price' — say 'your total investment.' They are investing in their body, their future, their lives. The word 'investment' reframes the transaction from an expense to an asset."
        domains: ["copywriting", "price-psychology", "framing"]
        source: "NOWVSL"
      - id: "FIL-JB-761"
        title: "Voice Is Your Ultimate Competitive Moat"
        description: "Work on your voice — not the voice you speak with but the way you speak, your style of communication. The people achieving the most success in any industry are those with the most unique, controversial, powerful, explosive voices. No one can duplicate your persona."
        domains: ["branding", "differentiation", "voice"]
        source: "NOWVSL"
      - id: "FIL-JB-762"
        title: "USP Is Foundation of All Marketing Communication"
        description: "Without a properly defined USP, your marketing will miss the target. Your true USP is best defined as how your buyers view your business. If you cater to your buyer's desires and their understanding of what your business is, you will always profit more."
        domains: ["positioning", "usp", "marketing-strategy"]
        source: "NOWVSL"
      - id: "FIL-JB-763"
        title: "Casual Mode to Close Mode Gear Shift"
        description: "The Grand Offer requires a deliberate gear shift from casual mode to close mode. This is when you reintroduce yourself with full credentials and formally present the product. The shift signals the viewer that something important is happening."
        domains: ["vsl-architecture", "closing-techniques", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-764"
        title: "Every Slide Is a Continuation Device"
        description: "Every fifth to seventh slide should use the paraphrase strategy to create pattern breaks. When the viewer cannot predict when the sentence ends, they remain hypnotically glued to the screen. The unpredictability is the engagement mechanism."
        domains: ["vsl-architecture", "engagement", "nlp"]
        source: "NOWVSL"
      - id: "FIL-JB-765"
        title: "Dream Story Belongs to the Viewer Not You"
        description: "Your nightmare story is about you and is used once. Your dream story is about the viewer and is used multiple times throughout the VSL. Dream stories future pace the viewer into their ideal life after purchasing. The after part is the most important aspect."
        domains: ["storytelling", "future-pacing", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-766"
        title: "Buying Is a Gift to Yourself"
        description: "If you imply that when the prospect picks up this product today they are giving a gift to themselves, it does that much more to close the sale. People love gifts. Framing a purchase as self-gifting transforms the transaction emotionally."
        domains: ["sales-psychology", "framing", "closing-techniques"]
        source: "NOWVSL"
      - id: "FIL-JB-767"
        title: "Pain of Inaction Alongside Pleasure of Action"
        description: "Emphasize the pain of inaction alongside the pleasure of action, where the pleasure is future-paced. Tie the pain to inaction explicitly — 'the pain of continuing in a state of inaction will only lead to more despair.' Then pivot to the future-paced pleasure."
        domains: ["persuasion", "future-pacing", "closing-techniques"]
        source: "NOWVSL"
      - id: "FIL-JB-768"
        title: "Survey Your Audience Never Assume Desires"
        description: "Do not assume you know what your audience wants most. Survey your list, your Facebook fans, your friends. In weight loss, we found that confidence was a huge spike — not just losing weight. Find out the real desire through direct research."
        domains: ["market-research", "audience-insight", "positioning"]
        source: "NOWVSL"
      - id: "FIL-JB-800"
        title: "Open Loops Are Verbal Foreplay"
        description: "Think of open loops as verbal foreplay. You are building anticipation and the climax is the sale. If you tell a joke and stop before the punchline, everyone desperately wants to hear it. That is what open loops do throughout your VSL."
        domains: ["copywriting", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "FIL-JB-801"
        title: "Creative Writing Is Just Knowing a Formula"
        description: "Most creative writing is just knowing a formula. The nightmare story, the dream story, the tips — all have specific formulas. Once you know the formula, the writing becomes mechanical, not artistic. Anyone can create compelling sales copy with the right system."
        domains: ["copywriting", "systems-thinking", "vsl-architecture"]
        source: "NOWVSL"
      - id: "FIL-JB-802"
        title: "Rapport Building Never Stops Throughout VSL"
        description: "Rapport is not built once and forgotten. You continuously build, deepen, and reinforce rapport at every stage: the nightmare story, the lies section, the tips, even the guarantee. Each section has rapport-building elements woven in."
        domains: ["rapport-building", "vsl-architecture", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-803"
        title: "This Course Is Not About Perfect Grammar"
        description: "This course is not about creating a VSL with perfect grammar. It is about creating a VSL that makes you money. 'And' at the beginning of a sentence is not ideal grammar and it does not matter. Conversion trumps correctness."
        domains: ["copywriting", "conversion-optimization", "pragmatism"]
        source: "NOWVSL"
      - id: "FIL-JB-804"
        title: "Scarcity Must Be Real and Specific"
        description: "Provide three compelling reasons to act right now using real scarcity. Threaten the price raise, cap membership quota on bonuses, and remind them that procrastination turns days into months into years. Make the cost of inaction tangible."
        domains: ["scarcity", "urgency", "closing-techniques"]
        source: "NOWVSL"
      - id: "FIL-JB-805"
        title: "Pictures Come After Rapport Not Before"
        description: "Do not use pictures of yourself or your product early in the VSL. You have not built rapport yet. Once they hear your nightmare story and see what you have been through, then the picture carries meaning. Social proof logos are acceptable early; personal photos are not."
        domains: ["vsl-architecture", "rapport-building", "social-proof"]
        source: "NOWVSL"
      - id: "FIL-JB-806"
        title: "Anchoring Creates Perceived Fame"
        description: "When you compare your product to something famous — Atkins, Body for Life, Four Hour Body — the brain automatically assigns equal fame, quality, and credibility to your product. This is proactive anchoring."
        domains: ["positioning", "nlp", "comparison-marketing"]
        source: "NOWVSL"
      - id: "FIL-JB-807"
        title: "Aha Moments Are the Core of Tips"
        description: "The heart of a great tip is the aha moment — the part of time in their life where they go 'wow, I did not know that.' Once you give someone knowledge, they cannot unknow it. That creates an obligation to apply it, which leads them to your product."
        domains: ["content-strategy", "tip-formula", "sales-psychology"]
        source: "NOWVSL"
      - id: "FIL-JB-808"
        title: "Desire to Reciprocate Drives Purchases"
        description: "When you deliver benefits for free, your prospect has a natural tendency to want to give back. That is human nature. Free valuable tips create a reciprocity loop that makes the purchase feel like returning a favor, not spending money."
        domains: ["reciprocity", "sales-psychology", "persuasion"]
        source: "NOWVSL"
      - id: "FIL-JB-809"
        title: "Future Pacing Must Be Present Tense"
        description: "Future pacing in present tense is more powerful than future tense. Say 'you feel alive' not 'you will feel alive.' Say 'you see the weight coming off today' — today is a day in the future but is not worded that way. Present tense creates immediate identification."
        domains: ["copywriting", "nlp", "future-pacing"]
        source: "NOWVSL"
      - id: "FIL-JB-810"
        title: "One Sentence Per Slide Hypnotic Effect"
        description: "Limit 90% of your slides to only one sentence followed by ellipses. When slides go by quickly with one sentence at a time, it creates a hypnotic effect. People are listening to what you say while being slightly hypnotized by what they see."
        domains: ["vsl-architecture", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "FIL-JB-811"
        title: "Selling Solutions Not Products"
        description: "You may think that you are selling a service or a book. You are selling a solution. The product is a solution to a problem. That word 'solution' is critical to understand because it changes how you position everything in your VSL."
        domains: ["positioning", "offer-design", "marketing-strategy"]
        source: "NOWVSL"
      - id: "FIL-JB-812"
        title: "The Experts Paradox Must Be Resolved"
        description: "The experts paradox: at some point you must make a case for being an expert, but first you must position yourself as someone who went through a horrendous story that relates to what your user feels. Authority follows vulnerability."
        domains: ["positioning", "storytelling", "rapport-building"]
        source: "NOWVSL"
      - id: "FIL-JB-813"
        title: "Comparisons Two Serious Two Funny"
        description: "Use four comparisons in your VSL: two serious and two funny. Serious comparisons anchor to famous products or contrast negative vs positive emotional states. Funny comparisons are lighthearted analogies that cause the reader to crack a smile and break the pattern."
        domains: ["copywriting", "comparison-marketing", "engagement"]
        source: "NOWVSL"
      - id: "FIL-JB-814"
        title: "Avoid Trite Comparisons at All Costs"
        description: "Comparing your website to 'white on rice' for stickiness is trite and awful. Instead create witty, unexpected comparisons like 'a diet easier to follow than a two-step map to buried treasure.' Trite kills conversion; wit creates memorability."
        domains: ["copywriting", "wordsmithing", "differentiation"]
        source: "NOWVSL"
      - id: "FIL-JB-815"
        title: "I Dont Want This For You Deepens Rapport"
        description: "Saying 'this is not what I want for you — I know it is not what you desire for yourself' deepens rapport profoundly. When someone tells you they want something better for you, you feel a deeper connection. This technique works on total strangers through clever language."
        domains: ["rapport-building", "copywriting", "sales-psychology"]
        source: "NOWVSL"
        L2_MENTAL_MODELS: "MM-JB-815"
      - id: "FIL-JB-001"
        title: "USP as Foundation"
        description: "If you do not get your USP right, everything crumbles. The USP is the single most important element of any sales message."
        domains: ["copywriting", "vsl-creation", "positioning"]
        source: "3XVSL"
      - id: "FIL-JB-002"
        title: "Sell Wants Not Needs"
        description: "Sell what people want, not what you think people need. The market decides what matters, not the marketer."
        domains: ["sales-psychology", "offer-design", "market-awareness"]
        source: "3XVSL"
      - id: "FIL-JB-003"
        title: "USP Through Buyer Eyes"
        description: "Your true USP is best defined as how your buyers view your business, not how you view it yourself."
        domains: ["positioning", "market-awareness", "brand-perception"]
        source: "3XVSL"
      - id: "FIL-JB-004"
        title: "Freedom as Core Craving"
        description: "People crave freedom more than anything. Freedom from pain, freedom from limitation, freedom to live the life they want."
        domains: ["sales-psychology", "persuasion", "human-motivation"]
        source: "3XVSL"
      - id: "FIL-JB-005"
        title: "Enter the Existing Conversation"
        description: "Enter a conversation already going on in your prospect's mind. Never start a new conversation — join the one they are already having internally."
        domains: ["copywriting", "market-awareness", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-006"
        title: "Expert from Necessity"
        description: "Your job is to convince readers you are only slightly better off than they are. Expert from necessity, not from superiority."
        domains: ["authority-building", "rapport", "storytelling"]
        source: "3XVSL"
      - id: "FIL-JB-007"
        title: "Fear Breeds Attention"
        description: "Fear breeds attention. The human brain is wired to pay more attention to threats than rewards. Use this ethically in marketing."
        domains: ["sales-psychology", "attention-capture", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-008"
        title: "Decision to Desire Transformation"
        description: "The core selling transformation is moving prospects from Decision mode to Desire mode. Decision mode is logical resistance; Desire mode is emotional openness."
        domains: ["sales-psychology", "vsl-creation", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-009"
        title: "Bonding Through Feeling"
        description: "You bond through feeling, not through logic. Emotional connection precedes intellectual agreement in every sale."
        domains: ["rapport", "storytelling", "sales-psychology"]
        source: "3XVSL"
      - id: "FIL-JB-010"
        title: "Emotional Buying, Logical Justification"
        description: "People buy emotionally, justify logically. 85% of buying decisions are emotional. The 15% logical is post-purchase rationalization."
        domains: ["sales-psychology", "persuasion", "buyer-behavior"]
        source: "3XVSL"
      - id: "FIL-JB-011"
        title: "Reciprocity Through Free Value"
        description: "When you deliver benefits for free, prospects want to reciprocate. Give real value in the VSL and the sale becomes natural."
        domains: ["persuasion", "reciprocity", "vsl-creation"]
        source: "3XVSL"
      - id: "FIL-JB-012"
        title: "Their Dream Not Yours"
        description: "Don't give your dream, give THEIR dream. The prospect's vision of success is the only one that matters in the sales message."
        domains: ["copywriting", "market-awareness", "empathy"]
        source: "3XVSL"
      - id: "FIL-JB-013"
        title: "Grand Offer as Make or Break"
        description: "If you fail at the grand offer, the video fails. Everything in the VSL leads to and supports the grand offer."
        domains: ["offer-design", "vsl-creation", "closing"]
        source: "3XVSL"
      - id: "FIL-JB-014"
        title: "Position as Done-For-You"
        description: "Position product as having done the work for them. Buyers want the shortcut, the done path, the already-figured-out solution."
        domains: ["offer-design", "positioning", "value-framing"]
        source: "3XVSL"
      - id: "FIL-JB-015"
        title: "Exclusivity as Desire Driver"
        description: "Everyone wants to be a member of an exclusive club. Exclusivity signals value and triggers belonging desire."
        domains: ["sales-psychology", "scarcity", "community"]
        source: "3XVSL"
      - id: "FIL-JB-016"
        title: "VSL as Psychological Journey"
        description: "VSL is a psychological journey, not a sales pitch. Each section transitions the prospect's emotional state toward readiness to buy."
        domains: ["vsl-creation", "sales-psychology", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-017"
        title: "Invisible Selling"
        description: "The best copy is when the reader doesn't know they're being sold to. Seamless integration of selling into valuable content."
        domains: ["copywriting", "persuasion", "vsl-creation"]
        source: "3XVSL"
      - id: "FIL-JB-018"
        title: "Rapport Before Pitch"
        description: "Rapport before pitch. Always. Without emotional connection, no logical argument will land."
        domains: ["rapport", "sales-psychology", "vsl-structure"]
        source: "3XVSL"
      - id: "FIL-JB-019"
        title: "Stories Sell, Facts Tell"
        description: "Stories create emotional engagement that facts alone cannot. Stories are the vehicle that carries the sale."
        domains: ["storytelling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-020"
        title: "Specificity Creates Believability"
        description: "Specific details make stories believable. Dates, weather, clothing, location — the more specific, the more real it feels."
        domains: ["storytelling", "copywriting", "credibility"]
        source: "3XVSL"
      - id: "FIL-JB-021"
        title: "You is the Most Powerful Word"
        description: "The word 'You' is the most powerful word in copy. It makes every sentence personal and direct."
        domains: ["copywriting", "persuasion", "engagement"]
        source: "3XVSL"
      - id: "FIL-JB-022"
        title: "Cause Over Effect"
        description: "Address the cause of the problem, not just the symptoms. Prospects are tired of band-aid solutions."
        domains: ["problem-framing", "positioning", "sales-psychology"]
        source: "3XVSL"
      - id: "FIL-JB-023"
        title: "Open Loops Drive Action"
        description: "Create curiosity gaps that can only be closed by purchasing the product. Open loops are the engine of engagement."
        domains: ["persuasion", "engagement", "vsl-creation"]
        source: "3XVSL"
      - id: "FIL-JB-024"
        title: "Three Universal Cravings"
        description: "People crave three things above all else: freedom, release from pain, and love. All effective copy taps into at least one."
        domains: ["human-motivation", "sales-psychology", "copywriting"]
        source: "3XVSL"
      - id: "FIL-JB-025"
        title: "Conspiracy Amplifies Engagement"
        description: "A conspiracy (Big Lie) creates a common enemy bigger than the individual problem. It shifts blame and builds solidarity with the prospect."
        domains: ["persuasion", "problem-framing", "engagement"]
        source: "3XVSL"
      - id: "FIL-JB-026"
        title: "Never Assume Reader Thinking"
        description: "Never assume what the reader is thinking. Use the 'may or' technique to offer multiple entry points into agreement."
        domains: ["copywriting", "empathy", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-027"
        title: "Paraphrase Cycle for Retention"
        description: "Paraphrase key points every 5-15 slides. Repetition through variation ensures the message sticks without boring the viewer."
        domains: ["vsl-creation", "engagement", "retention"]
        source: "3XVSL"
      - id: "FIL-JB-028"
        title: "Tips Build Trust Bridges"
        description: "Free tips in the VSL build trust bridges that make the eventual pitch feel earned, not forced."
        domains: ["reciprocity", "trust-building", "vsl-creation"]
        source: "3XVSL"
      - id: "FIL-JB-029"
        title: "Nightmare Before Dream"
        description: "Always establish the nightmare before painting the dream. Pain creates the vacuum that desire fills."
        domains: ["storytelling", "sales-psychology", "vsl-structure"]
        source: "3XVSL"
      - id: "FIL-JB-030"
        title: "Numbers Are Magical"
        description: "Numbers are magical in headlines and promises. They create specificity, credibility, and a sense of concreteness."
        domains: ["copywriting", "headlines", "credibility"]
        source: "3XVSL"
      - id: "FIL-JB-031"
        title: "Pattern Interrupt Resets Attention"
        description: "Breaking expected patterns resets the prospect's attention clock. Pattern interrupts are not gimmicks — they are attention management."
        domains: ["attention-capture", "vsl-creation", "engagement"]
        source: "3XVSL"
      - id: "FIL-JB-032"
        title: "Inclusion Over Exclusion in Copy"
        description: "Inclusion statements build social proof subconsciously. People want to feel they are part of the majority who are making smart choices."
        domains: ["social-proof", "persuasion", "copywriting"]
        source: "3XVSL"
      - id: "FIL-JB-033"
        title: "Video Scarcity Creates Urgency"
        description: "Framing the VSL itself as scarce (limited availability, may be taken down) increases engagement and watch-through rates."
        domains: ["scarcity", "engagement", "vsl-creation"]
        source: "3XVSL"
      - id: "FIL-JB-034"
        title: "Savvy Buyer Positioning"
        description: "Position the buyer as savvy and intelligent for choosing your solution. People buy identities, not just products."
        domains: ["buyer-psychology", "positioning", "identity"]
        source: "3XVSL"
      - id: "FIL-JB-035"
        title: "Not Your Fault Absolution"
        description: "Absolving the prospect of blame for their current situation opens them to the solution. Blame creates defensiveness; absolution creates receptivity."
        domains: ["sales-psychology", "persuasion", "rapport"]
        source: "3XVSL"
      - id: "FIL-JB-036"
        title: "Tire Kicker Elimination Builds Trust"
        description: "Telling unqualified prospects to leave (if you want magic pill, leave) paradoxically builds trust and exclusivity with qualified buyers."
        domains: ["trust-building", "qualification", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-037"
        title: "Hero Study as Proof Engine"
        description: "Analyzing experts' patterns and showing that 'their success can be your success' creates aspirational proof without self-aggrandizing."
        domains: ["social-proof", "authority-building", "storytelling"]
        source: "3XVSL"
      - id: "FIL-JB-038"
        title: "Two Choices Close Psychology"
        description: "Presenting two choices (do nothing and suffer vs. take action now) reframes the buying decision from 'should I?' to 'which path?'"
        domains: ["closing", "persuasion", "decision-framing"]
        source: "3XVSL"
      - id: "FIL-JB-039"
        title: "Subliminal Anchoring Through Color"
        description: "Red text on key words (Decide, Freedom, Secret, Now) creates subliminal anchoring that reinforces urgency and desire."
        domains: ["vsl-creation", "persuasion", "visual-psychology"]
        source: "3XVSL"
      - id: "FIL-JB-040"
        title: "Future Pacing as Present Tense"
        description: "Walk prospects into the future using present tense as if it has already happened. Future pacing collapses the gap between desire and reality."
        domains: ["persuasion", "storytelling", "sales-psychology"]
        source: "3XVSL"
      - id: "FIL-JB-041"
        title: "With Without Creates Strongest Desire"
        description: "The with/without comparison creates the strongest close desire because it makes the cost of inaction visceral and real."
        domains: ["closing", "comparison", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-042"
        title: "Avoid Word But"
        description: "Avoid the word 'but' as it negates everything before it. Use 'yet', 'however', 'and' instead to maintain positive momentum."
        domains: ["copywriting", "linguistics", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-043"
        title: "Even If as Objection Killer"
        description: "The 'Even If' technique pre-emptively handles objections before they form. It removes excuses before the prospect can voice them."
        domains: ["objection-handling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-044"
        title: "All Four Buyer Types"
        description: "Only speaking to one buyer modality means losing 75% of your audience. Every VSL must address all four: Why, What, How-To, What-If."
        domains: ["buyer-psychology", "vsl-creation", "persuasion"]
        source: "3XVSL"
      - id: "FIL-JB-045"
        title: "Declaration of Independence Moment"
        description: "Every nightmare story must have a Declaration of Independence — the moment the protagonist decides 'enough is enough' and commits to change."
        domains: ["storytelling", "transformation", "engagement"]
        source: "3XVSL"
        # === CHAT VSL (CVSL) — 25 new philosophies ===
      - id: "FIL-JB-046"
        title: "AI is Rewriter Not Writer"
        description: "AI is a better rewriter than it is a writer. The key insight is using AI to refine and enhance human-created frameworks, not to generate copy from scratch."
        domains: ["ai-copywriting", "workflow-design", "copy-quality"]
        source: "CVSL"
      - id: "FIL-JB-047"
        title: "Pre-Prompting Supremacy"
        description: "Pre-prompting and formula is super important. If you don't do that, you're not going to get the quality of output that you want. The data you feed AI before prompting determines 80% of output quality."
        domains: ["ai-copywriting", "prompt-engineering", "systems-thinking"]
        source: "CVSL"
      - id: "FIL-JB-048"
        title: "Chunked Creativity Principle"
        description: "If I give you too much to think about, if I ask you to create too much all at once, you're going to be less creative than if I ask you to create in chunks and blocks. Break creative work into focused segments."
        domains: ["ai-copywriting", "creativity", "workflow-design"]
        source: "CVSL"
      - id: "FIL-JB-049"
        title: "Movie Scripts for AI"
        description: "Chat has read tons and tons of movie scripts. It has not read tons and tons of video sales letters. Prompt AI using formats it knows well (movie scenes) to get VSL-quality output."
        domains: ["ai-copywriting", "prompt-engineering", "pattern-interrupt"]
        source: "CVSL"
      - id: "FIL-JB-050"
        title: "Editing as Core Skill"
        description: "Editing is one of the most important parts of copywriting in general. The ability to refine, cut, and dimensionalize copy separates professionals from amateurs."
        domains: ["copywriting", "quality-assurance", "skill-development"]
        source: "CVSL"
      - id: "FIL-JB-051"
        title: "Soft Selling is Unethical"
        description: "If you believe in your product, selling softly is actually unethical. You owe it to your prospect to make the strongest possible case for transformation."
        domains: ["sales-ethics", "persuasion", "conviction"]
        source: "CVSL"
      - id: "FIL-JB-052"
        title: "80% After First Pitch"
        description: "80% of your sales happen after the first pitch. Most marketers give up too early. Keep writing long after the first CTA — the real selling happens in the second half."
        domains: ["closing", "persistence", "vsl-structure"]
        source: "CVSL"
      - id: "FIL-JB-053"
        title: "Community Drives Purchase"
        description: "People buy things because they want to be a part of something. Inclusion — making the buyer feel they are joining a tribe — is one of the most powerful sales levers."
        domains: ["sales-psychology", "community-building", "belonging"]
        source: "CVSL"
      - id: "FIL-JB-054"
        title: "Dimensionalization as Quality Metric"
        description: "Dimensionalization means: can I see this? Can I feel it when I read it? If the copy doesn't create a vivid mental picture, it's not dimensional enough."
        domains: ["copywriting", "sensory-writing", "quality-assurance"]
        source: "CVSL"
      - id: "FIL-JB-055"
        title: "AI Verification Mandatory"
        description: "Chat can lie. Always double-check Chat's facts. Never trust AI output without human verification, especially for claims, statistics, and testimonials."
        domains: ["ai-copywriting", "quality-assurance", "fact-checking"]
        source: "CVSL"
      - id: "FIL-JB-056"
        title: "Systems Over Memorization"
        description: "The future is having somebody talk to AI for you. Don't memorize prompts — build systems. The prompt library is a machine, not a checklist."
        domains: ["ai-copywriting", "systems-thinking", "automation"]
        source: "CVSL"
      - id: "FIL-JB-057"
        title: "Hands on Steering Wheel"
        description: "Just because chat can write copy doesn't mean you should take your hands off the steering wheel. AI is Tesla autopilot — you still need to be alert and ready to intervene."
        domains: ["ai-copywriting", "quality-assurance", "human-ai-collaboration"]
        source: "CVSL"
      - id: "FIL-JB-058"
        title: "Open Loops Must Close"
        description: "Every open loop you create must be closed before the end of the VSL. Unclosed loops create frustration, not curiosity. The art is opening them strategically and closing them at peak moments."
        domains: ["vsl-structure", "engagement", "narrative-design"]
        source: "CVSL"
      - id: "FIL-JB-059"
        title: "More Data Less Hallucination"
        description: "The more data you give AI, the less it has to create on the fly and the better the copy that surrounds it can be. Data richness is the antidote to AI hallucination."
        domains: ["ai-copywriting", "prompt-engineering", "data-quality"]
        source: "CVSL"
      - id: "FIL-JB-060"
        title: "No Exclamation Marks Ever"
        description: "Exclamation marks scream desperation. Professional copy never uses them. Every VSL prompt explicitly instructs: no exclamation marks, no ALL CAPS, no hype language."
        domains: ["copywriting", "tone-control", "professionalism"]
        source: "CVSL"
      - id: "FIL-JB-061"
        title: "Anchor Object Continuity"
        description: "A physical anchor object (box, rock, ticket, hospital gown) introduced in the pattern interrupt must reappear throughout the VSL. It creates subconscious continuity and emotional recall."
        domains: ["nlp-selling", "storytelling", "pattern-interrupt"]
        source: "CVSL"
      - id: "FIL-JB-062"
        title: "Permission to Be Noticed"
        description: "The hero must give the prospect psychological permission to succeed. N3 in the attention framework — the prospect needs to feel they DESERVE the transformation before they'll buy it."
        domains: ["sales-psychology", "rapport", "transformation"]
        source: "CVSL"
      - id: "FIL-JB-063"
        title: "Modest Introduction Principle"
        description: "Your job is to convince readers you are only slightly better off than they are. Expert from necessity, not from superiority. The modest hero is more persuasive than the guru."
        domains: ["authority-building", "rapport", "trust"]
        source: "CVSL"
      - id: "FIL-JB-064"
        title: "Formula Beats Freestyle in AI"
        description: "With AI copywriting, formula-driven prompting produces 10x better results than open-ended requests. The formula constrains AI creativity into productive channels."
        domains: ["ai-copywriting", "prompt-engineering", "systems-thinking"]
        source: "CVSL"
      - id: "FIL-JB-065"
        title: "Hyperlink Plus Button Always"
        description: "30% of buyers click hyperlinks instead of buttons. Always include both a button AND a text hyperlink for every CTA. Never assume everyone clicks the same way."
        domains: ["conversion-optimization", "ux-design", "cta-strategy"]
        source: "CVSL"
      - id: "FIL-JB-066"
        title: "Unique Mechanism Naming Art"
        description: "Hook names must be 3-4 words, Title Case, mysterious and scientific-sounding. Examples: Metabolic Adaptation, Leptin Resistance, Blank Page Paralysis, Opposition Obedience. The name IS the sale."
        domains: ["offer-construction", "branding", "copywriting"]
        source: "CVSL"
      - id: "FIL-JB-067"
        title: "In-Context Training Over Rigid Prompts"
        description: "Pre-prompts are so much cooler than prompts. Instead of telling AI WHAT to write with rigid instructions, show it 2-3 examples and let it learn the PATTERN. Two-shot training produces more natural copy."
        domains: ["ai-copywriting", "prompt-engineering", "nlp-selling"]
        source: "CVSL"
      - id: "FIL-JB-068"
        title: "VSL Revenue Proof: $4 Billion+"
        description: "My VSL formula has sold over $4 billion for my customers. The Metabolic Sherpa VSL alone has generated $50 million and is still running since 2015. Results prove methodology."
        domains: ["social-proof", "vsl-copywriting", "credibility"]
        source: "CVSL"
      - id: "FIL-JB-069"
        title: "90 Seconds of Desire"
        description: "Immediately after the pattern interrupt, you need 90 seconds of pure desire — a benefit stack so vivid the prospect is physically leaning forward. No selling yet, just want-creation."
        domains: ["vsl-structure", "persuasion", "engagement"]
        source: "CVSL"
      - id: "FIL-JB-070"
        title: "Three Choices Close"
        description: "Every offer presentation must give exactly 3 choices: (1) Do nothing and stay stuck, (2) Try to figure it out alone (expensive), (3) Take the smart path with this offer. Choice architecture makes buying feel logical."
        domains: ["closing", "offer-design", "decision-architecture"]
        source: "CVSL"
      - id: "FIL-JB-350"
        title: "Nobody Cares About Your Product"
        description: "They care about themselves. What they buy has nothing to do with your product."
        domains: ["sales-psychology"]
        source: "3XBONUS-100M"
      - id: "FIL-JB-353"
        title: "Negative Motivation 100x Positive"
        description: "Mammalian brain responds to fear first."
        domains: ["sales-psychology"]
        source: "3XBONUS-100M"
      - id: "FIL-JB-355"
        title: "Imagine Is Most Powerful Word"
        description: "Puts user into imagination. You give them an order."
        domains: ["copywriting", "nlp-techniques"]
        source: "3XBONUS-100M"
      - id: "FIL-JB-357"
        title: "Simple But Not Easy"
        description: "Cuts refunds in half. Correct expectations."
        domains: ["offer-positioning"]
        source: "3XBONUS-100M"
      - id: "FIL-JB-361"
        title: "Make Reader Feel Understood"
        description: "People buy because they feel understood."
        domains: ["copywriting"]
        source: "3XBONUS-100M"
      - id: "FIL-JB-364"
        title: "Not Your Fault Then Your Responsibility"
        description: "First empathy, then transfer responsibility."
        domains: ["persuasion-psychology"]
        source: "3XBONUS-100M"
      - id: "FIL-JB-400"
        title: "Perfection Enemy Of Progress"
        description: "Good is good enough. Update later."
        domains: ["product-creation"]
        source: "3XBONUS-28DAY"
      - id: "FIL-JB-405"
        title: "Anti-Guru More Relatable"
        description: "Journey > arrived success."
        domains: ["product-creation"]
        source: "3XBONUS-28DAY"
      - id: "FIL-JB-408"
        title: "Sell Before You Create"
        description: "Pre-sold webinar, future bonus, upsell."
        domains: ["product-launch"]
        source: "3XBONUS-28DAY"
      - id: "FIL-JB-413"
        title: "The List Is Gold"
        description: "Qualified buyer email list = ultimate asset."
        domains: ["list-building"]
        source: "3XBONUS-28DAY"
      - id: "FIL-JB-450"
        title: "Ugly Always Wins"
        description: "Raw aesthetic > polished production."
        domains: ["vsl-copywriting"]
        source: "3XBONUS-FT"
      - id: "FIL-JB-500"
        title: "Great VSL Attracts Traffic"
        description: "Converting VSL attracts affiliates and organic."
        domains: ["traffic-strategy"]
        source: "3XBONUS-TP"
      - id: "FIL-JB-501"
        title: "Small Targeted Beats Mass"
        description: "2500 targeted = $7000+."
        domains: ["traffic-strategy"]
        source: "3XBONUS-TP"

  L2_MENTAL_MODELS:
      - id: "MM-JB-586"
        title: "Duality Response Model"
        description: "When prospects are in cognitive dissonance (should/shouldn't), speaking in duality (pros AND cons) resolves their internal conflict better than all-positive hammering."
        domains: ["sales-psychology", "persuasion", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-587"
        title: "Modality Shifting Model"
        description: "Prospects respond to different content modalities (video, text, audio, webinar). Switching modalities extends campaign life and captures non-responders from the primary format."
        domains: ["marketing-strategy", "conversion-optimization", "content"]
        source: "5MSLF"
      - id: "MM-JB-588"
        title: "Fact Style Intro as Authority Builder"
        description: "Starting with 'Fact:' statements creates an 'it's not even open for discussion' tone that establishes authority immediately. But it's easy to copy, so use sparingly outside your niche."
        domains: ["copywriting", "authority-building", "formatting"]
        source: "5MSLF"
      - id: "MM-JB-589"
        title: "Rapport Through Questions Not Statements"
        description: "Questions like 'Did you know?' and 'Have you ever?' build rapport without the hard-sell resistance that declarative statements create. Inquiry mode disarms judgment."
        domains: ["rapport-building", "copywriting", "sales-psychology"]
        source: "5MSLF"
      - id: "MM-JB-590"
        title: "Hook vs Trademark vs Special Sauce"
        description: "Three distinct elements: Hook (what gets attention), Trademark (branded term like F4X), Special Sauce (the unique mechanism that explains WHY it works). All three can coexist."
        domains: ["positioning", "branding", "offer-design"]
        source: "5MSLF"
      - id: "MM-JB-591"
        title: "Objection Preemption Through Comparison"
        description: "The 'Us vs Them' comparison copy answers objections before the reader even raises them. By comparing to alternatives, you address every 'but what about...' in advance."
        domains: ["objection-handling", "copywriting", "persuasion"]
        source: "5MSLF"
      - id: "MM-JB-592"
        title: "Negative Qualification as Desire Amplifier"
        description: "Telling people who should NOT buy ('Warning: not for everyone') triggers the desire to prove they qualify. Nobody wants to be excluded from the club."
        domains: ["sales-psychology", "scarcity", "qualification"]
        source: "5MSLF"
      - id: "MM-JB-593"
        title: "Price Absence Creates Search Behavior"
        description: "Not showing the price forces prospects to search the page, increasing engagement time. On checkout, a short video justifying the price creates a secondary conversion point."
        domains: ["pricing-psychology", "conversion-optimization", "engagement"]
        source: "5MSLF"
      - id: "MM-JB-594"
        title: "Real Scarcity vs False Scarcity Ethics"
        description: "Real scarcity beats false scarcity for sleeping at night. Both convert similarly, but real scarcity (limited enrollment, price increase, access window) maintains integrity."
        domains: ["scarcity", "ethics", "conversion-optimization"]
        source: "5MSLF"
      - id: "MM-JB-595"
        title: "Collaborative Modesty Before Price"
        description: "'I can't take all the credit' serves two purposes: builds modesty rapport AND justifies the price by framing it as collaborative effort worth more than one person's work."
        domains: ["pricing-psychology", "rapport-building", "credibility"]
        source: "5MSLF"
      - id: "MM-JB-596"
        title: "Nightmare Mini Story at Dont Try Alone"
        description: "A mini nightmare story placed at 'Don't Try This Alone' section shows what happens when people attempt without guidance. Works best for products under $197."
        domains: ["storytelling", "copywriting", "fear-appeal"]
        source: "5MSLF"
      - id: "MM-JB-597"
        title: "Article Page as VSL Extension"
        description: "An article-style page before the sales page acts as a trust-builder and modality shifter. Tested and proven to outperform direct-to-sales-page in many niches."
        domains: ["funnel-design", "conversion-optimization", "content"]
        source: "5MSLF"
      - id: "MM-JB-598"
        title: "Five Steps Article Formula"
        description: "Article formula: Short headline + byline, 3-7 'Did you know' paragraphs, sub-headline acting as headline, 3-5 command/verb bullet points, optional warning, 'What do I do next?' link."
        domains: ["copywriting", "content-marketing", "funnel-design"]
        source: "5MSLF"
      - id: "MM-JB-599"
        title: "Avatar Voice Writing Model"
        description: "Capture the feeling and vocabulary of your target avatar and write as if you were them talking. If writing for over-40 fitness, use their worldview, their language, their frustrations."
        domains: ["copywriting", "market-awareness", "empathy"]
        source: "5MSLF"
      - id: "MM-JB-600"
        title: "Double Entendre Headlines"
        description: "Headlines with double meanings ('New-age workouts' as both literal and negative-connotation for older audience) create subconscious resonance with the target avatar."
        domains: ["copywriting", "headlines", "wordplay"]
        source: "5MSLF"
      - id: "MM-JB-601"
        title: "Samurai Postal Service Email Model"
        description: "Email should be treated like a personal letter from a samurai: precise, respectful, personal, with hidden power moves embedded in the structure."
        domains: ["email-marketing", "strategy", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-602"
        title: "Limbic System Decision Model"
        description: "The limbic system (emotional center) reacts first and controls buying decisions. The prefrontal cortex rationalizes after. Marketing must speak to the limbic system first."
        domains: ["neuroscience", "sales-psychology", "persuasion"]
        source: "5MSLF"
      - id: "MM-JB-603"
        title: "Number Trick for Subject Lines"
        description: "Numbers in email subject lines always outperform non-number subjects. Odd numbers slightly outperform even. Specificity (7 vs 'several') triggers curiosity."
        domains: ["email-marketing", "subject-lines", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-604"
        title: "Intimacy Trick in Email"
        description: "Writing emails as if to one person creates intimacy. Using first name, 'you' language, and personal confession-style content makes mass email feel like a private letter."
        domains: ["email-marketing", "rapport-building", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-605"
        title: "Resend to Un-Opens Strategy"
        description: "Resending emails to people who didn't open with a modified subject line can capture 15-30% additional opens. Simple tactic, massive incremental revenue."
        domains: ["email-marketing", "list-management", "conversion-optimization"]
        source: "5MSLF"
      - id: "MM-JB-606"
        title: "NLP Three Link Trick"
        description: "Place three links in an email: one early (curiosity), one mid (after value), one late (after urgency). Each link catches different reader psychologies at different engagement points."
        domains: ["email-marketing", "nlp", "conversion-optimization"]
        source: "5MSLF"
      - id: "MM-JB-607"
        title: "Equidistant Email Spacing"
        description: "Space emails equidistantly in a sequence for maximum impact. Irregular spacing creates unpredictability that can hurt deliverability and reader expectations."
        domains: ["email-marketing", "sequencing", "deliverability"]
        source: "5MSLF"
      - id: "MM-JB-608"
        title: "PS Trick as Second Headline"
        description: "The PS in an email functions as a second headline. Many readers scroll to the PS first. Use it to restate the core offer or add a unique angle not covered in the body."
        domains: ["email-marketing", "copywriting", "structure"]
        source: "5MSLF"
      - id: "MM-JB-609"
        title: "First Line Trick for Opens"
        description: "The first line of an email (preview text) determines whether the opened email gets read. Make it provocative, personal, or curiosity-driven — never a greeting."
        domains: ["email-marketing", "subject-lines", "engagement"]
        source: "5MSLF"
      - id: "MM-JB-610"
        title: "Email Seduction Auto-Responder Model"
        description: "Auto-responder sequences should follow a seduction arc: intrigue, rapport, value, intimacy, offer. Each email builds on the relationship established by the previous one."
        domains: ["email-marketing", "sequencing", "relationship-building"]
        source: "5MSLF"
      - id: "MM-JB-611"
        title: "Current News Trick for Relevance"
        description: "Tying emails to current news or events creates immediate relevance and higher open rates. The reader perceives the email as timely rather than automated."
        domains: ["email-marketing", "relevance", "engagement"]
        source: "5MSLF"
      - id: "MM-JB-612"
        title: "Next Page Trick for Engagement"
        description: "Ending an email with a 'next page' concept (click to continue reading) rather than 'click to buy' dramatically increases click-through by reducing perceived commitment."
        domains: ["email-marketing", "conversion-optimization", "copywriting"]
        source: "5MSLF"
      - id: "MM-JB-640"
        title: "Three-Brain Decision Model"
        description: "Humans decide using three brain sections: amygdala (fear/concern), mid-brain (emotion/inspiration), and prefrontal cortex (logic/knowledge). The 5-step survey pings all three sections in sequence to extract maximum insight from prospects."
        domains: ["neuroscience", "buyer-psychology", "market-research"]
        source: "VSLFT18"
      - id: "MM-JB-641"
        title: "Open Loop Retention Model"
        description: "An open loop is an unresolved promise — 'I will tell you about X in a few minutes.' The brain craves resolution like a musical scale ending on the 7th note wanting to resolve to tonic. Stack 3-9 open loops throughout a VSL to make it impossible to stop watching."
        domains: ["engagement", "nlp", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-642"
        title: "Nightmare to Hero Arc"
        description: "Every VSL follows the universal story arc: nightmare (rock bottom) → determination (vow) → discovery (solution) → hero (transformation). The deeper the nightmare, the more powerful the hero emergence. This is Joseph Campbell in sales copy."
        domains: ["storytelling", "vsl-structure", "narrative"]
        source: "VSLFT18"
      - id: "MM-JB-643"
        title: "Five Step VSL Formula"
        description: "The complete VSL structure: Step 1 (SNAP Suggestion/Pattern Interrupt), Step 2 (Bottle Connection/Rapport), Step 3 (Big Problem/Conspiracy), Step 4 (Bigger Solution/Tips), Step 5 (Grand Offer with 6 sub-sections). Each step flows into the next with open loops."
        domains: ["vsl-structure", "copywriting", "frameworks"]
        source: "VSLFT18"
      - id: "MM-JB-644"
        title: "Avoid Enjoy HowTo Tip Sequence"
        description: "The three-tip formula follows buyer psychology: Tip 1 (Avoid) speaks to amygdala fear, Tip 2 (Enjoy) speaks to emotional pleasure center, Tip 3 (How-To) speaks to prefrontal logic and transitions directly into the grand offer."
        domains: ["vsl-structure", "buyer-psychology", "content-strategy"]
        source: "VSLFT18"
      - id: "MM-JB-645"
        title: "Faux Price Anchoring Model"
        description: "Present the real retail price first ($97), then show it stacked with bonuses ($200+), then drop to the actual offer price ($47). The triple drop creates anchoring. 'One payment of only' reinforces the bargain. Most people expect Ronco-style multiple payments."
        domains: ["pricing-psychology", "anchoring", "closing"]
        source: "VSLFT18"
      - id: "MM-JB-646"
        title: "Inclusion Exclusion Persuasion Cycle"
        description: "Alternate between including prospects in the success club ('join thousands who...') and excluding unfit buyers ('if you want a magic pill, leave now'). Exclusion makes the remaining audience prove they belong, increasing commitment."
        domains: ["persuasion", "community-building", "qualification"]
        source: "VSLFT18"
      - id: "MM-JB-647"
        title: "Word Cloud Discovery Method"
        description: "Paste competitor copy and survey responses into a free word cloud tool. The top 5 words that emerge are the exact words your audience responds to. Use these words heavily in the first 30 slides of your VSL. This is what makes those competitors convert."
        domains: ["market-research", "copywriting", "competitive-analysis"]
        source: "VSLFT18"
      - id: "MM-JB-648"
        title: "Seven Why Drill Down"
        description: "Keep asking 'why' until you reach the real emotional driver. 'Why do they collect coins?' 'Because they like investing.' 'Why?' 'Because they are patriotic.' Three to seven levels of 'why' reveals the true purchasing motivation beneath the surface."
        domains: ["market-research", "buyer-psychology", "positioning"]
        source: "VSLFT18"
      - id: "MM-JB-649"
        title: "Misery Club to Success Club Pipeline"
        description: "The entire VSL is about pulling people into the misery club (rapport through shared pain) and then transitioning them into the success club (solution through your product). They enter feeling alone in their pain and exit feeling part of a winning movement."
        domains: ["community-building", "rapport-building", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-650"
        title: "Movie Opening Attention Model"
        description: "Think of your VSL like a movie. If it starts with rolling credits, nobody pays attention. If it starts like a Tarantino film with something shocking, attention locks in. Your prospect is grabbing popcorn — they are not committed yet."
        domains: ["vsl-structure", "attention", "engagement"]
        source: "VSLFT18"
      - id: "MM-JB-651"
        title: "Cultural Hot Topic Amplifier"
        description: "Tie your pattern interrupt to something culturally hot and emotionally resonant — patriotism, current events, social movements. A military story opening a weight loss VSL works because it taps into deep cultural values the audience already holds."
        domains: ["vsl-structure", "positioning", "emotional-selling"]
        source: "VSLFT18"
      - id: "MM-JB-652"
        title: "Trademark Your Tip Branding Model"
        description: "Take your most important tip and give it a branded name — the Caloric Staggering Principle, the CSP. Beechwood aged was not unique to Budweiser but they branded it first. Your trademarked term becomes impossible to think around."
        domains: ["branding", "positioning", "intellectual-property"]
        source: "VSLFT18"
      - id: "MM-JB-653"
        title: "Grand Offer Six Part Architecture"
        description: "The grand offer has exactly 6 sections: (1) Product introduction with USP, (2) Price with anchoring and drops, (3) Call to Action repeated 4-5 times, (4) Pain-Pleasure future pacing, (5) Action Results with testimonials, (6) Samurai Q&A for the remaining 75% of buyers."
        domains: ["vsl-structure", "closing", "offer-design"]
        source: "VSLFT18"
      - id: "MM-JB-654"
        title: "Hero Study Credibility Model"
        description: "Instead of claiming personal expertise, say 'I analyzed thousands of successful people and found the patterns they all share.' The hero study borrows credibility from the crowd. 'The majority of successful people did this' is more persuasive than 'I discovered this.'"
        domains: ["credibility", "social-proof", "positioning"]
        source: "VSLFT18"
      - id: "MM-JB-655"
        title: "Double Pattern Interrupt Technique"
        description: "Use two pattern interrupts in sequence — a visual/story interrupt followed by an unexpected pivot. Military story (interrupt 1) → bizarre connection to weight loss binder (interrupt 2). The double scramble makes the brain hyper-attentive."
        domains: ["vsl-structure", "nlp", "attention"]
        source: "VSLFT18"
      - id: "MM-JB-656"
        title: "Modality Ping Pong Survey Design"
        description: "The 5 survey questions deliberately bounce between brain modalities: fear (amygdala) → knowledge (prefrontal) → emotion (mid-brain) → visual (see) → feeling (kinesthetic). This ping-ponging extracts richer data than sequential same-type questions."
        domains: ["market-research", "neuroscience", "survey-design"]
        source: "VSLFT18"
      - id: "MM-JB-657"
        title: "Cause Marketing Conversion Multiplier"
        description: "Create a real cause behind your product — '10 Million Pounds Down.' When people feel guilty for not joining a cause, they buy. The higher aspiration phenomenon makes your offer about something bigger than the individual purchase."
        domains: ["cause-marketing", "persuasion", "community-building"]
        source: "VSLFT18"
      - id: "MM-JB-658"
        title: "One Thing Focus Principle"
        description: "Center all three tips around one trademarked concept. The avoid tip, enjoy tip, and how-to tip all connect back to your One Thing. After watching, the prospect cannot think about the topic without thinking about your concept. Inspired by the book 'The One Thing.'"
        domains: ["positioning", "branding", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-659"
        title: "Blame Assignment Relieves Paralysis"
        description: "Most people want to blame something for their failures. The more evolved resist this, but your audience is not there yet. Give them permission to blame the villain — media, government, industry — and they will be freed to take action."
        domains: ["sales-psychology", "persuasion", "rapport-building"]
        source: "VSLFT18"
      - id: "MM-JB-660"
        title: "Four Buyer Modalities Teaching Model"
        description: "People learn and buy through four modalities: what to avoid (fear), what to enjoy (pleasure), how to do it (logic), and who else has done it (social proof). Address all four in your tips section to capture every buyer type."
        domains: ["buyer-psychology", "teaching", "vsl-structure"]
        source: "VSLFT18"
      - id: "MM-JB-661"
        title: "Lame Pattern Interrupt Detection"
        description: "A bad pattern interrupt is either (a) a random image never explained, (b) something completely expected for the niche (abs on a fitness page), or (c) too cheesy and disconnected. Good interrupts are unexpected, tied to the nightmare story, and closed later."
        domains: ["vsl-structure", "quality-control", "engagement"]
        source: "VSLFT18"
      - id: "MM-JB-662"
        title: "Price Survey Blank Field Discovery"
        description: "When surveying prospects about price, leave the field blank and let them type a number. Never give multiple choice — people always pick the lowest option. Blank-field pricing is almost always higher than expected, typically 7 out of 10 times."
        domains: ["pricing-psychology", "market-research", "offer-design"]
        source: "VSLFT18"
      - id: "MM-JB-663"
        title: "Samurai QA as Extended Webinar"
        description: "Treat the Q&A section like the end of a paid webinar where you control the questions. Ask the questions you want asked, overcome the objections you know exist, and keep going until sales stop. One practitioner goes 4-5 hours until support says no more sales."
        domains: ["closing", "vsl-structure", "conversion-optimization"]
        source: "VSLFT18"
      - id: "MM-JB-664"
        title: "Ferris Bueller Dead Air Technique"
        description: "After the final call to action, leave 7 seconds of dead silence. Then: 'If you are still watching...' This catches the remaining undecided viewers and transitions them into the extended Q&A section where 75% of sales happen."
        domains: ["closing", "vsl-structure", "engagement"]
        source: "VSLFT18"
      - id: "MM-JB-700"
        title: "Three Brain Evolutionary Model"
        description: "The brain exists in three evolutionary stages: the amygdala (primitive lizard fears), the emotional brain (higher emotions), and the prefrontal cortex (rational/creative mind). Poor connection between them explains irrational buying decisions. VSL techniques tap into all three."
        domains: ["sales-psychology", "neuroscience", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-701"
        title: "1-2-3 Formula Model"
        description: "Every top-performing VSL contains four elements: 1 USP, 2 Stories (Nightmare + Dream), 3 Tips (Avoid + Enjoy + How-To), and 4 Comparisons (2 Serious + 2 Funny). This is the skeletal structure that all content hangs upon."
        domains: ["vsl-architecture", "copywriting", "frameworks"]
        source: "NOWVSL"
      - id: "MM-JB-702"
        title: "5-Step VSL Process Model"
        description: "The complete VSL follows five sequential steps: Step 1 Snap Suggestion (pattern interrupt + big promise), Step 2 Vital Connection (nightmare story + rapport), Step 3 Big Problem (lies + conspiracy), Step 4 Bigger Solution (tips), Step 5 Grand Offer (product + price + CTA + pain/pleasure + actions/results + Q&A)."
        domains: ["vsl-architecture", "copywriting", "sales-funnels"]
        source: "NOWVSL"
      - id: "MM-JB-703"
        title: "NLP Suggestion Pattern Model"
        description: "Pattern interrupt primes the mind for suggestion, just like hypnosis works. You scratch the vinyl record of their mental pattern, the brain opens to a suggestion, then you give a benign suggestion: 'watch this presentation until the end.' The state of openness is temporary."
        domains: ["nlp", "persuasion", "pattern-interrupts"]
        source: "NOWVSL"
      - id: "MM-JB-704"
        title: "Open Loop Psychology Model"
        description: "An open loop is an NLP technique where you start a thought and promise to finish it later. The user's mind goes 'I want that sentence to finish — I am going to stick around.' Like a joke told without its punchline, incomplete patterns demand resolution."
        domains: ["nlp", "engagement", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-705"
        title: "USP Power-Benefit-Enabler Model"
        description: "A perfect USP contains three elements: a Power Phrase (exclusive intro like 'the only'), a Prime Benefit (what it does best), and an Enabler Phrase (what it enables them to do — always a verb). Under 20 words total."
        domains: ["usp", "positioning", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-706"
        title: "Headline Benefit Formula"
        description: "Power Word + Outrageous Result - Public Enemy #1. Example: '3 ways to lose weight quickly and easily without giving up your favorite foods or spending hours doing cardio.' This formula works for any headline, benefit statement, or big promise."
        domains: ["copywriting", "headlines", "formulas"]
        source: "NOWVSL"
      - id: "MM-JB-707"
        title: "Faux Price Anchoring Model"
        description: "Anchor a price 2-3x higher than actual before revealing bonuses. Say 'valued at $97' then describe what is included. Before revealing the real price, stack faux price plus bonus value, then perform a three-step price dropdown. Each drop triggers deal receptors in the brain."
        domains: ["price-psychology", "anchoring", "offer-design"]
        source: "NOWVSL"
      - id: "MM-JB-708"
        title: "Subliminal Highlighting Model"
        description: "Highlight specific words in red throughout the VSL to prompt the subconscious: easy, fun, simple, superior, proven, yes, buy, now. Across three slides spell Y-E-S / B-U-Y / N-O-W. Consciously few readers notice the pattern; subconsciously they absorb the command."
        domains: ["nlp", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-709"
        title: "Action Drop Model"
        description: "Action drops bring the reader's focus back to the present moment using words like Today, Now, See, Listen, Actually. These appear at the beginning of sentences and trigger immediate engagement. 'Now, I have to warn you' is far more powerful than 'I have to warn you.'"
        domains: ["nlp", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "MM-JB-710"
        title: "Product Pacing Model"
        description: "Always assume the prospect has or is about to purchase. Say 'When you purchase today, you will want to turn immediately to page 37' — never 'If you purchase.' This future paces the ownership experience and makes the purchase feel inevitable."
        domains: ["future-pacing", "closing-techniques", "nlp"]
        source: "NOWVSL"
      - id: "MM-JB-711"
        title: "Pre-Qualification Exclusion Model"
        description: "Say 'let me tell you who would never fit as a customer' and list people who will never work with your product. This kicks tire-kickers out while making fence-sitters desperately want to join the success club. No one wants to feel left out."
        domains: ["qualification", "sales-psychology", "positioning"]
        source: "NOWVSL"
      - id: "MM-JB-750"
        title: "Big Lie Loop Model"
        description: "Discover the lie (from your 'without' statements), describe the lie, label it as false, show the painful results of believing the lie, say 'this is not what I want for you,' then transition to the truth. This six-part loop dismantles false beliefs systematically."
        domains: ["persuasion", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-751"
        title: "Tip Funnel Model"
        description: "Tips build a funnel toward the unified solution: Avoid Tip (addresses Why modality, amygdala), Enjoy Tip (addresses What-If modality, emotions), How-To Tip (addresses What/How modalities, logic). The How-To is last because it walks the user directly into the offer."
        domains: ["tip-formula", "sales-funnels", "buyer-behavior"]
        source: "NOWVSL"
      - id: "MM-JB-752"
        title: "Tip Formula Six-Step Model"
        description: "The tip formula follows six steps: 1) Benefit (why listen), 2) Why do it (two sentences max), 3) What is it (the driving force with coined phrase), 4) How to do it (2-3 steps), 5) Result (what happens after), 6) Mini Dream Story (1-2 sentences of future pacing)."
        domains: ["tip-formula", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-753"
        title: "Vague But Useful Tip Design"
        description: "Make tips helpful but incomplete. Use phrases like 'if you do this at the right time' or 'if you know exactly what to say.' The vague element creates curiosity while the useful element builds trust. The missing details are found in your product."
        domains: ["tip-formula", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "MM-JB-754"
        title: "Grand Offer Six-Part Architecture"
        description: "The Grand Offer has six parts: Part 1 The Product (formal intro, USP restate, hero study, testimonials, content, price tease), Part 2 The Price (faux price, bonuses, cost of loss, dropdown, reveal, guarantee), Part 3 CTA, Part 4 Pain & Pleasure, Part 5 Actions & Results, Part 6 Q&A."
        domains: ["vsl-architecture", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "MM-JB-755"
        title: "Nightmare Story Formula Model"
        description: "The nightmare story follows a specific formula: introduction of setting, escalating discomfort, a focal point (the rock-bottom moment), a declaration of independence, and transition to the solution. Events can be resequenced but must be authentic."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-756"
        title: "Dream Story Formula Model"
        description: "The dream story uses: Follow the Leader (imagine this), Specific You and General They, Transition Phrase, Present Tense Promise. It engages the right brain creative part, temporarily disengaging decision mode and putting the reader into desire mode."
        domains: ["storytelling", "future-pacing", "nlp"]
        source: "NOWVSL"
      - id: "MM-JB-757"
        title: "Wordsmithing Three-Level Model"
        description: "Level 1 Bad: 'Product is really good if you want to make money.' Level 2 Better: 'Product is ideal if you really want to make money.' Level 3 Supreme: 'Product is ideally positioned to empower you to make a truckload of cash faster than ever.' Replace bland words with power words at each level."
        domains: ["copywriting", "wordsmithing", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-758"
        title: "Anchoring Through Comparison Model"
        description: "Take something popular and anchor it to something within your product. This is proactive NLP anchoring — creating an association without the user knowing. Like 'Don't Stop Believing' anchored to high school, you anchor your product to something already valued."
        domains: ["nlp", "positioning", "comparison-marketing"]
        source: "NOWVSL"
      - id: "MM-JB-759"
        title: "Pain Then Pleasure Principle"
        description: "Always reinforce the prospect's pain and follow with your specific solution — not a solution, YOUR specific solution. The rhythm is: pain state, reminder, specific solution. This creates the cognitive pattern that your product is the only logical relief."
        domains: ["sales-psychology", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-760"
        title: "Emotional State Comparison Model"
        description: "Compare the negative emotional state of not having your product with the positive emotional state of having it. From 'dreading your closet and hating that your clothes don't fit' to 'absolutely loving your closet and wearing them with comfort and style.' This is the emotional comparison."
        domains: ["comparison-marketing", "sales-psychology", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-761"
        title: "Modest Introduction Model"
        description: "List credentials and expertise modestly: 'I wasn't always a best-selling author and certainly wasn't always a guy you'd see on the cover of a magazine.' The modest intro sets up the nightmare story. Use social proof logos early but hold personal photos until after rapport is built."
        domains: ["positioning", "rapport-building", "social-proof"]
        source: "NOWVSL"
      - id: "MM-JB-762"
        title: "Triple Pattern Interrupt Model"
        description: "Use three successive pattern interrupts at the start of a VSL to crack open the viewer's attention: a visual interrupt (something unexpected on screen), a verbal interrupt (provocative statement), and a conceptual interrupt (surprising fact or statistic)."
        domains: ["pattern-interrupts", "nlp", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-763"
        title: "Three-Step Price Dropdown Model"
        description: "Start with the highest price mentioned in the video (faux price + bonus value), then step down three times to the actual price. 'You will not be paying $217. Not even half that. Not even $67. Your total investment today is only one payment of just $47.' Each drop triggers excitement."
        domains: ["price-psychology", "closing-techniques", "offer-design"]
        source: "NOWVSL"
      - id: "MM-JB-764"
        title: "May Or Technique Model"
        description: "Instead of assuming what the reader thinks, use the 'may or' construction: 'Now you may be thinking that you've heard this before, or perhaps you already know that this is something totally new and different.' This avoids offense while guiding their thought process."
        domains: ["copywriting", "nlp", "rapport-building"]
        source: "NOWVSL"
      - id: "MM-JB-800"
        title: "Focal Point Story Architecture"
        description: "Every nightmare story needs a focal point — the single most embarrassing or shocking moment. In Jon's case it was stealing donuts. Everything before builds toward this point, everything after responds to it. The focal point creates maximum emotional impact."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-801"
        title: "External Rapport Building Model"
        description: "Build rapport by comparing yourself to something far below what most people would consider acceptable. 'I was addicted to sugar — my crack was different but the addiction was the same.' This makes the viewer think 'that person was even worse off than me.'"
        domains: ["rapport-building", "storytelling", "sales-psychology"]
        source: "NOWVSL"
      - id: "MM-JB-802"
        title: "Positioning Anchor Within Story Model"
        description: "Place anchors inside the nightmare story itself — physical objects that tie back to the narrative. The forgotten coat ties to the wallet ties to the theft ties to the rock bottom moment. Each object creates a memory hook that makes the story unforgettable."
        domains: ["storytelling", "nlp", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-803"
        title: "Imagine This NLP Command Model"
        description: "'Imagine this' is an NLP command that literally prompts someone to imagine whatever follows. It takes them out of the logical brain into the visualization brain. Once the right brain engages, the decision-making left brain temporarily disengages."
        domains: ["nlp", "future-pacing", "sales-psychology"]
        source: "NOWVSL"
      - id: "MM-JB-804"
        title: "Walk With Me Dual-Mode Engagement"
        description: "'Walk with me for a moment as we imagine' combines physical (walk) and mental (imagine) engagement simultaneously. The 'we' statement creates shared experience. This is an advanced NLP technique creating physical-mental dichotomy."
        domains: ["nlp", "engagement", "copywriting"]
        source: "NOWVSL"
      - id: "MM-JB-805"
        title: "Tip Failure Chain Model"
        description: "If tips fail, everything else in the whole VSL fails. Poor tips cause: conversions dropping to nothing, no viral sharing, affiliates refusing to promote, viewers thinking you are disingenuous, and your message never reaching the world."
        domains: ["tip-formula", "conversion-optimization", "vsl-architecture"]
        source: "NOWVSL"
      - id: "MM-JB-806"
        title: "How-To Tip as Unified Solution Funnel"
        description: "The How-To tip is the linchpin — all other tips actually fail for the user without this one. Position it so that the avoid and enjoy tips build dependency on the how-to. Say 'if you don't do this, everything else is worthless.' This creates unstoppable momentum toward the product."
        domains: ["tip-formula", "sales-funnels", "persuasion"]
        source: "NOWVSL"
      - id: "MM-JB-807"
        title: "Amygdala Activation Through Avoid Tips"
        description: "The word 'avoid' creates a strong visceral reaction because it taps into the amygdala — the primitive brain. 'Caution' and 'warning' trigger evolutionary survival responses. People want to watch the avoid tip because it is for their own safety."
        domains: ["neuroscience", "sales-psychology", "tip-formula"]
        source: "NOWVSL"
      - id: "MM-JB-808"
        title: "One Payment Framing Model"
        description: "Say 'only one payment of just $47' instead of just 'only $47.' People have been conditioned by QVC and subscription services to think in terms of multiple payments. Emphasizing 'one payment' triggers relief and perceived value."
        domains: ["price-psychology", "framing", "closing-techniques"]
        source: "NOWVSL"
      - id: "MM-JB-809"
        title: "Three Reasons to Act Now Model"
        description: "Provide exactly three compelling reasons for immediate action: 1) Price will be raised back to where it deserves, 2) Super bonus membership will cap out, 3) Without action today you may procrastinate forever — days turn to months turn to years."
        domains: ["urgency", "scarcity", "closing-techniques"]
        source: "NOWVSL"
      - id: "MM-JB-810"
        title: "Video Scarcity Model"
        description: "Create urgency within the video itself by implying this offer is exclusive to this presentation. The presentation discount price is only available through watching this video. This ties scarcity to the viewing experience rather than just the product."
        domains: ["scarcity", "vsl-architecture", "conversion-optimization"]
        source: "NOWVSL"
      - id: "MM-JB-811"
        title: "Remember as Subconscious Trigger"
        description: "Starting a slide with 'Remember' activates subconscious recall of all the pain points established earlier. It is a single word that resurrects the entire emotional journey the viewer has been on, priming them for the final push."
        domains: ["nlp", "copywriting", "sales-psychology"]
        source: "NOWVSL"
      - id: "MM-JB-812"
        title: "Skinny Jeans Universal Desire Model"
        description: "Find the one literal example that almost everyone in your market can relate to. In weight loss it is 'fitting into your high school skinny jeans.' Every market has its equivalent universal desire object. Use this specific tangible image in dream stories."
        domains: ["copywriting", "audience-insight", "future-pacing"]
        source: "NOWVSL"
      - id: "MM-JB-813"
        title: "Super Bonus Strategic Timing Model"
        description: "The super bonus is introduced after the main bonuses and price reveal. It serves as a 'golden ticket' that creates an additional reason to act now and can be used as a scarcity mechanism by capping membership."
        domains: ["offer-design", "bonuses", "scarcity"]
        source: "NOWVSL"
      - id: "MM-JB-814"
        title: "Checkout Process Optimization Model"
        description: "The CTA must include specific instructions: what color the button is, what text it says, and what happens after clicking. Give timeline for delivery. If digital: 'immediate access.' If physical: delivery estimate. Specificity reduces friction."
        domains: ["conversion-optimization", "cta-design", "vsl-architecture"]
        source: "NOWVSL"
        L3_HEURISTICS: "HEUR-JB-876"
      - id: "MM-JB-001"
        title: "Three States of Mind"
        description: "Prospects move through 3 mental states: Disbelief (skeptical wall) -> Decision (weighing options logically) -> Desire (emotional readiness to act). The VSL must guide them through all three."
        domains: ["sales-psychology", "buyer-journey", "vsl-creation"]
        source: "3XVSL"
      - id: "MM-JB-002"
        title: "Expert Paradox"
        description: "Must demonstrate expertise while maintaining relatability. Too much authority creates distance; too little loses credibility. The sweet spot is 'expert from necessity' — someone who found answers through their own struggle."
        domains: ["authority-building", "rapport", "positioning"]
        source: "3XVSL"
      - id: "MM-JB-003"
        title: "Conspiracy Cycle"
        description: "A bigger enemy (conspiracy/Big Lie) is more powerful than an individual problem. It shifts blame from the prospect, creates solidarity, and makes the solution feel like a revelation rather than a purchase."
        domains: ["persuasion", "problem-framing", "engagement"]
        source: "3XVSL"
      - id: "MM-JB-004"
        title: "Open Loop Psychology"
        description: "Create curiosity gaps (open loops) that can only be closed by purchasing the product. The brain craves completion — unresolved loops create psychological tension that drives action."
        domains: ["engagement", "persuasion", "retention"]
        source: "3XVSL"
      - id: "MM-JB-005"
        title: "Pattern Interrupt Receptivity"
        description: "Breaking expected patterns (visual or linguistic) resets the prospect's attention and increases receptivity to new information. Pattern interrupts bypass the brain's auto-pilot filtering."
        domains: ["attention-capture", "vsl-creation", "engagement"]
        source: "3XVSL"
      - id: "MM-JB-006"
        title: "Future Pacing Model"
        description: "Walking prospects into their future as if it has already happened makes the desired outcome feel real and achievable. Present tense future pacing collapses temporal distance."
        domains: ["persuasion", "storytelling", "visualization"]
        source: "3XVSL"
      - id: "MM-JB-007"
        title: "Inclusion Psychology"
        description: "People want to be part of the majority making smart decisions. Inclusion statements (thousands have already, you're not alone) trigger belonging instinct and reduce perceived risk."
        domains: ["social-proof", "persuasion", "community"]
        source: "3XVSL"
      - id: "MM-JB-008"
        title: "Cause Over Effect Thinking"
        description: "Addressing the root cause of a problem rather than symptoms positions you as the deep expert. Prospects are tired of surface-level solutions and respond to someone who understands the real source."
        domains: ["problem-framing", "positioning", "credibility"]
        source: "3XVSL"
      - id: "MM-JB-009"
        title: "Emotional Anchoring"
        description: "Bind specific emotions to product features through story. When a prospect hears a story that triggers emotion, that emotion gets anchored to whatever comes next — ideally your product."
        domains: ["sales-psychology", "storytelling", "persuasion"]
        source: "3XVSL"
      - id: "MM-JB-010"
        title: "Tips as Funnel"
        description: "Tips build progressively toward the product as the unified solution. Each tip solves a piece; the product solves everything. The funnel makes the pitch feel like a natural conclusion."
        domains: ["vsl-structure", "reciprocity", "persuasion"]
        source: "3XVSL"
      - id: "MM-JB-011"
        title: "Nightmare-Dream Emotional Arc"
        description: "The nightmare story creates emotional low point; the dream story creates emotional high. The distance between the two is the perceived value of your solution."
        domains: ["storytelling", "emotional-design", "vsl-structure"]
        source: "3XVSL"
      - id: "MM-JB-012"
        title: "Buyer Modality Spectrum"
        description: "Four types of buyers exist: Why buyers (need reason), What buyers (need information), How-To buyers (need process), What-If buyers (need possibility). Missing any one loses 25% of audience."
        domains: ["buyer-psychology", "copywriting", "market-awareness"]
        source: "3XVSL"
      - id: "MM-JB-013"
        title: "Reciprocity Ladder"
        description: "Each free tip climbs a reciprocity ladder. By the time the pitch arrives, the prospect feels psychologically indebted. The product becomes the natural way to 'even the score.'"
        domains: ["reciprocity", "persuasion", "trust-building"]
        source: "3XVSL"
      - id: "MM-JB-014"
        title: "Scarcity-Value Equation"
        description: "Perceived value increases proportionally with perceived scarcity. Video scarcity (may be taken down), time scarcity (limited offer), and access scarcity (exclusive group) all multiply perceived worth."
        domains: ["scarcity", "value-framing", "urgency"]
        source: "3XVSL"
      - id: "MM-JB-015"
        title: "Declaration Moment"
        description: "Every transformation story requires a 'Declaration of Independence' moment — the point where the protagonist decides everything changes. This mirrors the prospect's own decision to buy."
        domains: ["storytelling", "transformation", "buyer-journey"]
        source: "3XVSL"
      - id: "MM-JB-016"
        title: "Blame Shifting as Rapport"
        description: "Shifting blame from the prospect to an external enemy (industry, system, establishment) creates instant rapport. It says 'I understand and it's not your fault' simultaneously."
        domains: ["rapport", "persuasion", "problem-framing"]
        source: "3XVSL"
      - id: "MM-JB-017"
        title: "Comparison as Closing Mechanism"
        description: "Comparisons (competition, with/without, general, specific-to-tip) are closing mechanisms disguised as information. Each type of comparison eliminates a different category of objection."
        domains: ["closing", "objection-handling", "comparison"]
        source: "3XVSL"
      - id: "MM-JB-018"
        title: "Let's Make a Deal Framing"
        description: "Framing the VSL as a mutual exchange (I'll give you value, you give me attention) creates a micro-commitment at the start that increases watch-through rates."
        domains: ["engagement", "commitment", "vsl-structure"]
        source: "3XVSL"
      - id: "MM-JB-019"
        title: "Subliminal Command Architecture"
        description: "Red-highlighted words, action drops (Today, Now, Listen), and anchor drops (yet, because, guess what) create a subliminal command layer beneath the conscious narrative."
        domains: ["persuasion", "visual-psychology", "vsl-creation"]
        source: "3XVSL"
      - id: "MM-JB-020"
        title: "Moral as Mini Close"
        description: "The moral of the nightmare story is a mini close — it seeds the solution before the explicit pitch. It bridges story to sell without breaking the narrative spell."
        domains: ["storytelling", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "MM-JB-021"
        title: "General They vs Specific You"
        description: "In dream stories, use general 'they' (people who use this) not specific 'you' (you will get this). General claims feel safer and more believable than direct promises."
        domains: ["copywriting", "credibility", "persuasion"]
        source: "3XVSL"
      - id: "MM-JB-022"
        title: "Identity Purchase Model"
        description: "Buyers purchase identities, not products. They buy who they want to become. The product is the vehicle; the identity is the destination."
        domains: ["buyer-psychology", "positioning", "identity"]
        source: "3XVSL"
      - id: "MM-JB-023"
        title: "Pain-Pleasure Oscillation"
        description: "The VSL oscillates between pain and pleasure points. This emotional oscillation prevents habituation and keeps engagement high throughout the entire video."
        domains: ["engagement", "emotional-design", "vsl-creation"]
        source: "3XVSL"
      - id: "MM-JB-024"
        title: "Q&A as Objection Mop"
        description: "The Q&A section at the end of the Grand Offer is not informational — it is an objection mop that catches every remaining doubt the prospect might have."
        domains: ["objection-handling", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "MM-JB-025"
        title: "Focal Point as Turning Point"
        description: "In the nightmare story, the Focal Point is the lowest moment — the rock bottom. It creates maximum empathy and makes the Declaration of Independence feel earned."
        domains: ["storytelling", "emotional-design", "engagement"]
        source: "3XVSL"
      - id: "MM-JB-026"
        title: "Vital Connection as Trust Bridge"
        description: "The Vital Connection section creates the emotional bridge between the pattern interrupt opening and the problem section. Without it, the VSL feels like two disconnected halves."
        domains: ["vsl-structure", "rapport", "trust-building"]
        source: "3XVSL"
      - id: "MM-JB-027"
        title: "Follow the Leader Principle"
        description: "Starting dream stories with 'Follow the Leader' (referencing authority figures who use similar approaches) creates aspirational credibility before making any personal claims."
        domains: ["social-proof", "authority-building", "storytelling"]
        source: "3XVSL"
      - id: "MM-JB-028"
        title: "Transition Phrase Architecture"
        description: "Strategic transition phrases between VSL sections maintain flow and prevent the prospect from feeling section breaks. Smooth transitions keep the trance state intact."
        domains: ["vsl-creation", "engagement", "copywriting"]
        source: "3XVSL"
      - id: "MM-JB-029"
        title: "I've Done the Work for You"
        description: "Positioning the product as having already done the research, testing, and organization for the buyer transforms price from cost into time saved."
        domains: ["offer-design", "value-framing", "positioning"]
        source: "3XVSL"
      - id: "MM-JB-030"
        title: "Linchpin Tip Strategy"
        description: "The How-To tip (third tip) is the linchpin — it provides the most actionable value, creates the strongest reciprocity, and serves as the bridge to the product pitch."
        domains: ["vsl-structure", "reciprocity", "persuasion"]
        source: "3XVSL"
      - id: "MM-JB-031"
        title: "Heavy vs Light Comparisons"
        description: "Heavy comparisons (competition, with/without) carry more emotional weight and should come first. Light comparisons (general, specific-to-tip) reinforce without pressure."
        domains: ["comparison", "persuasion", "vsl-structure"]
        source: "3XVSL"
      - id: "MM-JB-032"
        title: "Slide Readability Model"
        description: "VSL slides must use Title Case and be scannable at a glance. The viewer is watching, not reading — every slide must communicate in 2-3 seconds."
        domains: ["vsl-creation", "visual-design", "readability"]
        source: "3XVSL"
      - id: "MM-JB-033"
        title: "Product Name as Anchor"
        description: "Delaying the product name until the 'It's Called...' moment creates maximum curiosity and makes the reveal feel like a reward for watching."
        domains: ["engagement", "vsl-structure", "branding"]
        source: "3XVSL"
      - id: "MM-JB-034"
        title: "Actions and Results Close"
        description: "The Actions/Results section of the Grand Offer shows what the buyer will DO and what they will GET, making the abstract product tangible and real."
        domains: ["closing", "offer-design", "value-framing"]
        source: "3XVSL"
      - id: "MM-JB-035"
        title: "Big Truth as Solution Seed"
        description: "After the Big Lie (conspiracy), the Big Truth plants the seed of the real solution. It reframes the entire problem space and makes the product the obvious answer."
        domains: ["persuasion", "problem-framing", "solution-framing"]
        source: "3XVSL"
        # === CHAT VSL (CVSL) — 20 new mental models ===
      - id: "MM-JB-036"
        title: "Buyer's Roadmap Pre-Prompting"
        description: "Before writing any copy, build a complete Buyer's Roadmap: 12 data fields (niche, avatar, goals, complaints, promises, benefits, objections, fears, false solutions, mistaken beliefs, expensive alternatives) that feed every subsequent prompt."
        domains: ["ai-copywriting", "market-research", "systems-thinking"]
        source: "CVSL"
      - id: "MM-JB-037"
        title: "5-Step ChatVSL Formula"
        description: "Complete VSL = 5 sequential steps: (1) Snap Suggestion (pattern interrupt + lead, ~1000w), (2) Vital Connection (nightmare story, ~1500w), (3) Big Problem (negative hook, ~500w), (4) Bigger Solution (positive hook + tips, ~800w), (5) Grand Offer (perfect pitch with 6 sub-parts, ~2200w). Total ~6000 words, ~40 minutes."
        domains: ["vsl-structure", "copywriting", "methodology"]
        source: "CVSL"
      - id: "MM-JB-038"
        title: "9 Attention Frames System"
        description: "Nine attention frames that structure a VSL: N1 (first 7 seconds, notice the VSL), N2 (notice the hero), N3 (permission to be noticed), O1 (negative hook reveal), O2 (positive hook reveal), W3 (killer wants + works even if), plus 90 Seconds of Desire, future pacing, and NLP close."
        domains: ["vsl-structure", "attention-engineering", "nlp-selling"]
        source: "CVSL"
      - id: "MM-JB-039"
        title: "Dimensionalization Model"
        description: "Copy quality is measured by one metric: can you SEE it and FEEL it? Dimensional copy creates vivid mental images. Flat copy just informs. The refiner prompt exists specifically to convert flat copy into dimensional copy."
        domains: ["copywriting", "sensory-writing", "quality-metric"]
        source: "CVSL"
      - id: "MM-JB-040"
        title: "Two-Shot In-Context Training"
        description: "Instead of rigid instructions, provide AI with 2-3 complete examples of the desired output pattern. AI learns the pattern implicitly rather than following explicit rules. Best technique for nightmare stories and emotional copy."
        domains: ["ai-copywriting", "prompt-engineering", "pattern-learning"]
        source: "CVSL"
      - id: "MM-JB-041"
        title: "Anchor Object Architecture"
        description: "A physical object introduced in the pattern interrupt becomes the emotional anchor for the entire VSL. It appears in the pattern interrupt, nightmare story, and Grand Offer. Creates subconscious thread that ties the VSL together."
        domains: ["nlp-selling", "storytelling", "vsl-structure"]
        source: "CVSL"
      - id: "MM-JB-042"
        title: "Positive-Negative Hook Duality"
        description: "Every offer needs TWO hooks: a Negative Hook (root cause of pain, 3 words, scientific-sounding) and a Positive Hook (secret solution, 3 words, aspirational). Together they create the complete problem-solution narrative."
        domains: ["offer-construction", "copywriting", "positioning"]
        source: "CVSL"
      - id: "MM-JB-043"
        title: "Faux Pricing Psychology"
        description: "Show a higher price first (retail value, competitor cost, DIY cost), then reveal the real lower price. The contrast creates perceived value. 'On this page only' adds exclusivity. Must feel genuine, not manipulative."
        domains: ["pricing-psychology", "offer-design", "closing"]
        source: "CVSL"
      - id: "MM-JB-044"
        title: "Nested Prompt Architecture"
        description: "Prompts embedded within formula templates. The formula has blank slots where AI generates content, but the surrounding structure is fixed. Like fill-in-the-blank meets AI creativity. Controls output while allowing creative flexibility."
        domains: ["ai-copywriting", "systems-thinking", "prompt-engineering"]
        source: "CVSL"
      - id: "MM-JB-045"
        title: "Open Loop Architecture"
        description: "A high-performing VSL maintains 10-12 open loops simultaneously. Each loop is a question or promise that hasn't been resolved. Loops must be opened strategically (front-loaded) and closed at peak emotional moments."
        domains: ["engagement", "vsl-structure", "attention-engineering"]
        source: "CVSL"
      - id: "MM-JB-046"
        title: "Snap Suggestion Mechanism"
        description: "The Snap Suggestion is an NLP pattern interrupt that 'scratches the brain' — creating a moment of cognitive surprise that bypasses the prospect's mental filters. Movie-scene format works best because AI excels at cinematic writing."
        domains: ["pattern-interrupt", "nlp-selling", "opening-strategy"]
        source: "CVSL"
      - id: "MM-JB-047"
        title: "Vital Connection Bridge"
        description: "The nightmare story creates a Vital Connection between hero and prospect. The hero's struggle MUST mirror the prospect's struggle. The Declaration of Independence moment transforms the hero, making the prospect believe they can transform too."
        domains: ["storytelling", "rapport", "transformation"]
        source: "CVSL"
      - id: "MM-JB-048"
        title: "Grand Offer Sequencing"
        description: "The Grand Offer has exactly 6 parts in fixed order: (1) 3 Choices intro, (2) Product features as benefits, (3) Faux pricing + real price, (4) Dimensional bonus descriptions, (5) Guarantee + community, (6) NLP close with future pacing + presupposition."
        domains: ["offer-design", "closing", "vsl-structure"]
        source: "CVSL"
      - id: "MM-JB-049"
        title: "NLP Close Architecture"
        description: "The final close uses layered NLP: future pacing (7 days from now + 30 days from now), presupposition language (assuming the sale), the Click Anchor (embedding 'click' as a command word), and direct CTA. Each layer deepens the buying commitment."
        domains: ["nlp-selling", "closing", "persuasion"]
        source: "CVSL"
      - id: "MM-JB-050"
        title: "Yes Reflex Chaining"
        description: "Build a chain of 'yes' responses before the close. Agreement statements, rhetorical questions the prospect answers internally with 'yes', and confirmation of pain points create momentum toward the purchase decision."
        domains: ["nlp-selling", "persuasion", "closing"]
        source: "CVSL"
      - id: "MM-JB-051"
        title: "Future Pacing Template"
        description: "Future pacing in present tense at two time horizons: 7 days from now (immediate quick wins) and 30 days from now (life transformation). Speak as if it has already happened. The prospect visualizes themselves in the desired state."
        domains: ["nlp-selling", "closing", "visualization"]
        source: "CVSL"
      - id: "MM-JB-052"
        title: "Presupposition Language Model"
        description: "Language that assumes the purchase has already happened: 'after you click the order button', 'when you open the program', 'as you go through module one'. Removes the decision friction by bypassing the 'should I buy?' question."
        domains: ["nlp-selling", "closing", "language-patterns"]
        source: "CVSL"
      - id: "MM-JB-053"
        title: "Avatar Diary Deep Research"
        description: "The deepest market research is reading your prospect's 'diary' — forums, Reddit, Amazon reviews, support tickets. Their exact language becomes your copy language. Don't invent pain points; document the ones they already express."
        domains: ["market-research", "empathy", "copywriting"]
        source: "CVSL"
      - id: "MM-JB-054"
        title: "Radio Voice Elimination"
        description: "AI default output sounds like a radio announcer — generic, hype-filled, surface-level. The refiner prompt specifically targets 'radio voice' and converts it to conversational, dimensional, human-sounding copy."
        domains: ["ai-copywriting", "quality-assurance", "tone-control"]
        source: "CVSL"
      - id: "MM-JB-055"
        title: "Superbonus Reveal Strategy"
        description: "After the initial CTA, reveal an additional surprise bonus with a countdown timer. The superbonus creates a second buying impulse for prospects who hesitated on the first CTA. It's the safety net for the undecided."
        domains: ["offer-design", "urgency", "closing"]
        source: "CVSL"
      - id: "MM-JB-350"
        title: "Honey Badger Syndrome"
        description: "Make customer believe ONE thing only."
        domains: ["offer-positioning"]
        source: "3XBONUS-100M"
      - id: "MM-JB-352"
        title: "Hero and Villain Narrative"
        description: "Villain never a person. You RELUCTANT hero."
        domains: ["storytelling"]
        source: "3XBONUS-100M"
      - id: "MM-JB-354"
        title: "Three Tip Modalities"
        description: "AVOID ENJOY HOW-TO in that order."
        domains: ["persuasion-psychology"]
        source: "3XBONUS-100M"
      - id: "MM-JB-358"
        title: "Seven Why Drill-Down"
        description: "Ask why 7 times for real emotional core."
        domains: ["market-research"]
        source: "3XBONUS-100M"
      - id: "MM-JB-359"
        title: "Brain Layer Persuasion"
        description: "Amygdala > mammalian > prefrontal. Start fear."
        domains: ["neuroscience-marketing"]
        source: "3XBONUS-100M"
      - id: "MM-JB-360"
        title: "Cost of Inaction vs Price"
        description: "Cost of NOT acting should dwarf the price."
        domains: ["pricing-psychology"]
        source: "3XBONUS-100M"
      - id: "MM-JB-400"
        title: "Passion x Demand"
        description: "Love + value intersection."
        domains: ["product-creation"]
        source: "3XBONUS-28DAY"
      - id: "MM-JB-407"
        title: "Record-First Triple Product"
        description: "Audio + ebook + video from one recording."
        domains: ["product-creation"]
        source: "3XBONUS-28DAY"
      - id: "MM-JB-408"
        title: "Amazon-as-Ad"
        description: "Kindle = free advertising platform."
        domains: ["traffic"]
        source: "3XBONUS-28DAY"
      - id: "MM-JB-500"
        title: "Three Traffic Types"
        description: "TOLL BOOTH DIRECT DISTRACTION."
        domains: ["traffic-strategy"]
        source: "3XBONUS-TP"
      - id: "MM-JB-501"
        title: "Horoscope Effect"
        description: "Smallest sub-segments. Speak specifically."
        domains: ["ad-targeting"]
        source: "3XBONUS-TP"
      - id: "MM-JB-503"
        title: "Rule Of Ones"
        description: "$1 CPC x 1% conv x $100 = break even."
        domains: ["media-buying"]
        source: "3XBONUS-TP"
      - id: "MM-JB-505"
        title: "Conversions Before Traffic"
        description: "Double conversions easier than double traffic."
        domains: ["conversion-optimization"]
        source: "3XBONUS-TP"

  L3_HEURISTICS:
      - id: "HEUR-JB-626"
        title: "Three Line Paragraph Maximum"
        description: "Most sales page paragraphs should be no more than 3 lines. If an image narrows the column, 5-6 lines are acceptable (newspaper print). Tested and proven to increase conversions."
        domains: ["copywriting", "formatting", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-627"
        title: "Five Paragraph Rapport Intro"
        description: "The rapport intro section should be approximately 5 paragraphs, heavily loaded with the word 'You' — aim for 7-9 uses of 'you' in the opening paragraphs."
        domains: ["copywriting", "rapport-building", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-628"
        title: "Did You Know Copy Five to Seven Paragraphs"
        description: "The 'Did you know' question-centered copy section should be 5-7 paragraphs. Use questions to build rapport without judgment. Can use rapport if story-based."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-629"
        title: "What It Isnt Copy Four to Seven Paragraphs"
        description: "The 'What it isn't' section should be 4-7 paragraphs plus a paragraph starting with the underlined word 'Listen' — a direct command that demands attention."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-630"
        title: "Hook Description Three to Seven Paragraphs"
        description: "The description of the hook/trademark should be 3-7 paragraphs. Include at least 2 of the 4 Es (Engagers, Evidence, Experience, Expertise) to prove why it works."
        domains: ["copywriting", "proof-elements", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-631"
        title: "Us Versus Them Five to Eight Paragraphs"
        description: "Comparison copy section should be 5-8 paragraphs total, including anchoring comparisons plus one 'Did you know about...?' informative fact."
        domains: ["copywriting", "positioning", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-632"
        title: "Works For Anyone Three to Five Paragraphs"
        description: "The 'Who it works for' section should be 3-5 paragraphs plus the 'Why? Because!' connection. Roll out 95-99% of your audience while appearing specific."
        domains: ["copywriting", "qualification", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-633"
        title: "How You Will Feel Three to Five Paragraphs"
        description: "The experience description section should be 3-5 paragraphs. Future pace in present tense, not future tense. 'You remain in total control' beats 'You will feel in control.'"
        domains: ["copywriting", "future-pacing", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-634"
        title: "Product Intro One to Three Paragraphs"
        description: "The 'Everything you need is here' product intro should be only 1-3 paragraphs. People are buying emotions, not features. Going too long here is 'all pudding.'"
        domains: ["copywriting", "product-description", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-635"
        title: "Hard to Find Copy Three to Seven Paragraphs"
        description: "The 'really hard to find these answers' section should be 3-7 paragraphs. Use the 'My life's work in a handbook' theme. Imply the option of searching yourself."
        domains: ["copywriting", "value-framing", "sales-pages"]
        source: "5MSLF"
      - id: "HEUR-JB-636"
        title: "Collaborative Effort Three to Five Paragraphs"
        description: "The 'Can't take all the credit' section should be 3-5 paragraphs. Builds modesty while justifying price through collaborative effort framing."
        domains: ["copywriting", "credibility", "pricing-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-637"
        title: "Dont Try Alone Three to Five Paragraphs"
        description: "The nightmare mini-story about trying it alone should be 3-5 paragraphs. Works best for products $197 and under. For $5K+ products, use totally different copy approach."
        domains: ["copywriting", "fear-appeal", "pricing-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-638"
        title: "Scarcity Section Three to Five Paragraphs"
        description: "The 'Act fast' section should be 3-5 paragraphs with compelling reasons to act now. Use real scarcity (limited copies, price increase, enrollment window) over false scarcity."
        domains: ["copywriting", "scarcity", "urgency"]
        source: "5MSLF"
      - id: "HEUR-JB-639"
        title: "Incongruence Close Five to Seven Paragraphs"
        description: "The 'You'd be stupid not to take it' section should be 5-7 paragraphs. Frame inaction as incongruent with the reader's own stated values and admissions."
        domains: ["copywriting", "closing", "persuasion"]
        source: "5MSLF"
      - id: "HEUR-JB-640"
        title: "PPS Encapsulates in Five Lines"
        description: "The PPS should encapsulate the entire sales letter in approximately 5 lines. People scroll to the bottom first — the PPS is premium real estate."
        domains: ["copywriting", "sales-pages", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-641"
        title: "Paraphrase Every Fifth to Seventh Slide"
        description: "In VSLs, every 5th to 7th slide should use paraphrased text (not word-for-word). This creates pattern breaks that keep viewers hypnotically glued to the screen."
        domains: ["vsl", "presentation", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-642"
        title: "Ideal VSL Length 28 to 36 Minutes"
        description: "The ideal video sales letter length is 28-36 minutes. Hour-and-a-half VSLs can convert depending on price point, but the sweet spot is under 40 minutes."
        domains: ["vsl", "conversion-optimization", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-643"
        title: "Two of Four Es Minimum"
        description: "Use at least 2 of the 4 Es (Engagers, Evidence, Experience, Expertise) when proving your hook. Using all 4 creates longer copy but maximum proof. Minimum 2 for effective copy."
        domains: ["copywriting", "proof-elements", "credibility"]
        source: "5MSLF"
      - id: "HEUR-JB-644"
        title: "Average Nine Ad Exposures Before Purchase"
        description: "The average person needs to see an ad 9 times before buying. This justifies strategic repetition of key messages within the sales letter — repetition is strategy, not redundancy."
        domains: ["advertising", "frequency", "sales-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-645"
        title: "Products Under 197 Use Nightmare Story"
        description: "The nightmare 'Don't try this alone' mini-story works best for products priced at $197 or below. For products at $3-5K, switch to application-based copy with phone close."
        domains: ["pricing-psychology", "copywriting", "offer-design"]
        source: "5MSLF"
      - id: "HEUR-JB-646"
        title: "Sell 2K Online 5K Needs Phone"
        description: "You can sell $2,000 products online directly. Eventually $5,000 online but that is pushing it. Above $5K, it is harder to convert without a human phone call."
        domains: ["pricing-psychology", "sales-strategy", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-647"
        title: "Article Page Did You Know Three to Seven Paragraphs"
        description: "The article page before the sales page should have 3-7 'Did you know' paragraphs with personal introductions, revealing negatives, and warnings."
        domains: ["copywriting", "funnel-design", "content-marketing"]
        source: "5MSLF"
      - id: "HEUR-JB-648"
        title: "Article Page Three to Five Sound Bite Points"
        description: "Article pages should have 3-5 sound bite bullet points, each beginning with a command verb (Stop, Forget, Avoid, Work). Commands demand attention."
        domains: ["copywriting", "content-marketing", "formatting"]
        source: "5MSLF"
      - id: "HEUR-JB-649"
        title: "50 50 Split Text vs VSL Extends Campaign Life"
        description: "Running a 50/50 split between text sales page and VSL extends campaign life. People who did not respond to VSL may convert on text — different modalities capture different buyers."
        domains: ["conversion-optimization", "split-testing", "marketing-strategy"]
        source: "5MSLF"
      - id: "HEUR-JB-650"
        title: "Odd Numbers Outperform Even in Subject Lines"
        description: "Numbers in email subject lines always outperform non-number subjects. Odd numbers slightly outperform even numbers. Specificity (7 vs 'several') triggers curiosity."
        domains: ["email-marketing", "subject-lines", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-651"
        title: "Resend Un-Opens Captures 15 to 30 Percent More"
        description: "Resending emails to people who did not open with a modified subject line captures 15-30% additional opens. Simple tactic with massive incremental revenue."
        domains: ["email-marketing", "list-management", "conversion-optimization"]
        source: "5MSLF"
      - id: "HEUR-JB-652"
        title: "Three Links Per Email Optimal"
        description: "Place three links in each email: one early (curiosity), one mid (after value), one late (after urgency). Each link catches different reader psychologies at different engagement points."
        domains: ["email-marketing", "conversion-optimization", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-653"
        title: "10 to 15 Words Per Sentence in Email"
        description: "Keep email sentences to 10-15 words for maximum readability and engagement. Short sentences create rhythm and prevent reader fatigue."
        domains: ["email-marketing", "copywriting", "readability"]
        source: "5MSLF"
      - id: "HEUR-JB-654"
        title: "75 Percent More Effort to Avoid Pain Than Gain Pleasure"
        description: "People will do approximately 75% more to avoid potential pain than to gain potential pleasure. Use avoidance modality in subject lines and opening sentences."
        domains: ["sales-psychology", "persuasion", "email-marketing"]
        source: "5MSLF"
      - id: "HEUR-JB-655"
        title: "Plain Text Emails Beat HTML Templates Always"
        description: "Plain text emails that look personal always outperform designed HTML templates. HTML templates destroy deliverability and personal connection. No exceptions."
        domains: ["email-marketing", "deliverability", "authenticity"]
        source: "5MSLF"
      - id: "HEUR-JB-656"
        title: "Two Negatives Followed by One Positive"
        description: "In 'Did you know' copy, use two negative/alarming statements followed by one positive revelation. This pattern creates tension then release, maximizing engagement."
        domains: ["copywriting", "persuasion", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-657"
        title: "Objections Start with Positive Words"
        description: "Start objection answers with positive words: 'Great,' 'Ideal time,' 'Terrific.' The objection is negative; your response reframes it immediately as positive. Complete duality."
        domains: ["copywriting", "objection-handling", "reframing"]
        source: "5MSLF"
      - id: "HEUR-JB-658"
        title: "Equidistant Email Spacing for Sequences"
        description: "Space emails equidistantly in a sequence for maximum impact. Irregular spacing creates unpredictability that hurts deliverability and reader expectations."
        domains: ["email-marketing", "sequencing", "deliverability"]
        source: "5MSLF"
      - id: "HEUR-JB-659"
        title: "First Line of Email Is Preview Text"
        description: "The first line of an email determines whether the opened email gets read. Make it provocative, personal, or curiosity-driven. Never start with a greeting."
        domains: ["email-marketing", "subject-lines", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-660"
        title: "PS Functions as Second Headline"
        description: "The PS in an email functions as a second headline. Many readers scroll to the PS first. Use it to restate the core offer or add a unique angle not in the body."
        domains: ["email-marketing", "copywriting", "structure"]
        source: "5MSLF"
      - id: "HEUR-JB-661"
        title: "Use Commands as Paragraph Starters"
        description: "Start key paragraphs with command words: 'Listen,' 'Stop,' 'Forget,' 'Remember,' 'Imagine.' Commands demand attention and create pattern breaks."
        domains: ["copywriting", "persuasion", "formatting"]
        source: "5MSLF"
      - id: "HEUR-JB-662"
        title: "Negative Qualification Triggers Desire to Prove"
        description: "Telling people who should NOT buy ('Warning: not for everyone') triggers desire to prove they qualify. Nobody wants to be excluded from the club."
        domains: ["sales-psychology", "qualification", "scarcity"]
        source: "5MSLF"
      - id: "HEUR-JB-663"
        title: "Capture Avatar Voice Before Writing"
        description: "Before writing any copy, capture the feeling and vocabulary of your target avatar. Write as if you were them talking. Their worldview, their language, their frustrations."
        domains: ["copywriting", "market-awareness", "empathy"]
        source: "5MSLF"
      - id: "HEUR-JB-664"
        title: "Word Selection is Never Accidental"
        description: "Choose words with subliminal connotations intentionally. 'Peer into' creates rapport subconsciously. 'By now/Buy now' embeds commands. Every word is strategic."
        domains: ["copywriting", "nlp", "persuasion"]
        source: "5MSLF"
      - id: "HEUR-JB-665"
        title: "Remove Blame from Reader Immediately"
        description: "In the 'Big Problem' section, remove blame from the reader. 'Today's programs are keeping YOU from results' — it is the programs' fault, not theirs. Blame removal builds trust."
        domains: ["copywriting", "rapport-building", "sales-psychology"]
        source: "5MSLF"
      - id: "HEUR-JB-666"
        title: "You Cant Find This Anywhere Else Statement"
        description: "Include 'You can't find this anywhere else but here' when true. It is technically always true for a unique sales page. Gives enormous power to the page."
        domains: ["copywriting", "exclusivity", "value-framing"]
        source: "5MSLF"
      - id: "HEUR-JB-667"
        title: "Auto Responder Follows Seduction Arc"
        description: "Auto-responder sequences should follow a seduction arc: intrigue, rapport, value, intimacy, offer. Each email builds on the relationship established by the previous one."
        domains: ["email-marketing", "sequencing", "relationship-building"]
        source: "5MSLF"
      - id: "HEUR-JB-668"
        title: "Tie Emails to Current Events for Relevance"
        description: "Tying emails to current news or events creates immediate relevance and higher open rates. The reader perceives the email as timely rather than automated."
        domains: ["email-marketing", "relevance", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-669"
        title: "No Price on Page Forces Search Behavior"
        description: "Not showing the price on the sales page forces prospects to search the page, increasing engagement time. On checkout page, a 30-second video justifies the price."
        domains: ["pricing-psychology", "conversion-optimization", "engagement"]
        source: "5MSLF"
      - id: "HEUR-JB-670"
        title: "Article Page Tested Better Than Direct to Sales Page"
        description: "An article-style page placed before the sales page has been tested and proven to outperform direct-to-sales-page in many niches. The article builds trust first."
        domains: ["funnel-design", "conversion-optimization", "split-testing"]
        source: "5MSLF"
      - id: "HEUR-JB-671"
        title: "Exit Page Article Recaptures Abandoners"
        description: "When prospects try to leave, use an exit popup offering 'Would you like to read an article on X?' to redirect to an article-format page. Recaptures abandoning traffic."
        domains: ["conversion-optimization", "funnel-design", "traffic"]
        source: "5MSLF"
      - id: "HEUR-JB-672"
        title: "Frequency Builds Familiarity Builds Trust"
        description: "Emailing too infrequently is worse than emailing too much. Your list forgets you. Frequency builds familiarity, and familiarity builds trust. Consistency beats perfection."
        domains: ["email-marketing", "frequency", "list-management"]
        source: "5MSLF"
      - id: "HEUR-JB-690"
        title: "First Name Only Introduction Rule"
        description: "At the start of your VSL, only use your first name — 'Hi, I'm John.' Save credentials and full name for the first slide of the grand offer. Nobody cares who you are until you have earned their attention."
        domains: ["vsl-structure", "rapport-building", "credibility"]
        source: "VSLFT18"
      - id: "HEUR-JB-691"
        title: "Use 'Now' as Anchor Drop"
        description: "The word 'now' is an NLP anchor drop — it commands presence and attention. 'Now listen' is two anchor drops in succession. Use 'now' at the beginning of key transitions to snap attention back."
        domains: ["nlp", "copywriting", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-692"
        title: "Use 'Remember' as NLP Command"
        description: "Scatter the word 'remember' throughout your VSL. It is an NLP command — you are not asking them to recall, you are telling their brain to remember. 'And remember, what I am sharing...' makes them think they missed something, prompting re-engagement."
        domains: ["nlp", "copywriting", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-693"
        title: "Ellipses on Almost Every Slide"
        description: "End almost every VSL slide with dot dot dot (ellipses). Ellipses promote the feeling of forward motion — the brain wants to see what comes next. Occasionally use a colon for variety and a slight stopping point before resolution."
        domains: ["copywriting", "vsl-structure", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-694"
        title: "Highlight NLP Commands in Red"
        description: "Highlight specific subliminal words in red across multiple slides so they form hidden sentences: 'remember... now... strategy... right now.' The subconscious picks up these patterns even when the conscious mind does not notice them."
        domains: ["nlp", "copywriting", "subliminal-messaging"]
        source: "VSLFT18"
      - id: "HEUR-JB-695"
        title: "Say Yes Trick Throughout"
        description: "Continuously ask questions with obvious yes answers or ask rhetorical questions that get the prospect nodding. 'Would you like to know the trick? Well yeah.' Every yes builds micro-commitment toward the final purchase."
        domains: ["persuasion", "nlp", "micro-commitment"]
        source: "VSLFT18"
      - id: "HEUR-JB-696"
        title: "Nightmare Story Must Start with Exact Date and Time"
        description: "Your nightmare story should begin with ultra-specific temporal detail: 'I remember the day and time. It was Tuesday, November 6th, 1992. It was raining and I was cold.' Specificity makes it impossible to doubt the story is real."
        domains: ["storytelling", "credibility", "copywriting"]
        source: "VSLFT18"
      - id: "HEUR-JB-697"
        title: "Use Object from Nightmare Story as Pattern Interrupt"
        description: "Take a physical object from your nightmare story and use it as your opening pattern interrupt image. The magic jacket, a clown, a binder — something tangible that you will explain later, creating the first open loop."
        domains: ["vsl-structure", "storytelling", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-698"
        title: "Describe Weight Loss Not State It"
        description: "Never say 'I lost 80 pounds.' Instead say 'drop over 80 pounds of ugly, unwanted body fat.' Descriptive adjectives (ugly, unwanted) create visceral imagery that plain numbers cannot achieve."
        domains: ["copywriting", "descriptive-language", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-699"
        title: "Benefit Without Pain Formula"
        description: "Structure bullet points as: massive benefit WITHOUT massive pain. 'Protect your family without ever having to feel like X.' The negative reinforcement ('without') is always stronger than the positive benefit alone."
        domains: ["copywriting", "bullet-points", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-700"
        title: "Warning Is Universal Pattern Interrupt"
        description: "The word 'Warning' at the start of a VSL or section is one of the most effective pattern interrupts. It stops people in their tracks universally. Combine with scarcity reason: 'This video will not be online forever because...'"
        domains: ["vsl-structure", "urgency", "attention"]
        source: "VSLFT18"
      - id: "HEUR-JB-701"
        title: "Window Out Redirect to Same Video"
        description: "When a viewer tries to leave, redirect them to a page with an article that has the same video embedded at the bottom, or to a webinar. Some practitioners redirect to the exact same presentation — and it converts the second time."
        domains: ["conversion-optimization", "exit-strategy", "testing"]
        source: "VSLFT18"
      - id: "HEUR-JB-702"
        title: "By Now Subliminal Trick"
        description: "'By now you probably realize...' contains the subliminal read of 'Buy now.' This is a proven covert persuasion technique that the subconscious processes as a purchase command while the conscious reads it as a transitional phrase."
        domains: ["nlp", "copywriting", "subliminal-messaging"]
        source: "VSLFT18"
      - id: "HEUR-JB-703"
        title: "Use May Not Definitive Statements"
        description: "Say 'you may have heard' instead of 'you have heard.' 'You may think' instead of 'you think.' Using 'may' keeps you in rapport-building mode rather than accusatory mode. Never assume what the prospect knows or believes."
        domains: ["copywriting", "rapport-building", "language-patterns"]
        source: "VSLFT18"
      - id: "HEUR-JB-704"
        title: "Yet Instead of But"
        description: "Replace 'but' with 'yet' at the end of slides. 'But' is a stop word that causes the mind to shut off, especially as the last word. 'Yet' creates continuation and curiosity. This tiny nuance makes measurable difference."
        domains: ["copywriting", "language-patterns", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-705"
        title: "Blueprint System Formula Product Naming"
        description: "Name your product a 'blueprint,' 'system,' or 'formula' — never a 'book' or 'course.' People want to follow a blueprint; they do not want to think. 'I discovered a blueprint' triggers the desire for a ready-made solution."
        domains: ["product-naming", "positioning", "buyer-psychology"]
        source: "VSLFT18"
      - id: "HEUR-JB-706"
        title: "On Page X You Will Discover Dimensionalization"
        description: "Get hyper-specific in your offer: 'On page 17 you will discover...' 'At the 1 minute 30 second mark in Video One...' This dimensionalization makes the product feel tangible and real before they buy it."
        domains: ["copywriting", "offer-presentation", "future-pacing"]
        source: "VSLFT18"
      - id: "HEUR-JB-707"
        title: "Men and Women Inclusion Phrase"
        description: "Always include the phrase 'men and women' in your VSL as many places as possible. If you are male presenting, women may tune out thinking it is a male-oriented product. Explicit inclusion prevents audience leakage."
        domains: ["copywriting", "inclusion", "audience-targeting"]
        source: "VSLFT18"
      - id: "HEUR-JB-708"
        title: "One Payment of Only Price Framing"
        description: "When presenting price, always say 'one payment of only $47.' Emphasis on 'one payment' distinguishes from expected multiple-payment Ronco-style pricing. The word 'only' further minimizes perceived cost."
        domains: ["pricing-psychology", "framing", "closing"]
        source: "VSLFT18"
      - id: "HEUR-JB-709"
        title: "4-5 Calls to Action Minimum"
        description: "Include four to five calls to action throughout your grand offer — not just one or two. 'Look below this video now.' 'Click the orange add to cart button.' Repeat the exact same CTA copy. Most people use too few."
        domains: ["closing", "conversion-optimization", "vsl-structure"]
        source: "VSLFT18"
      - id: "HEUR-JB-710"
        title: "Future Pace in Present Tense"
        description: "Use present tense for future pacing, not future tense. 'You see the weight coming off in the mirror today' not 'you will see.' 'You are experiencing the energy' not 'you will experience.' Present tense creates association."
        domains: ["nlp", "copywriting", "future-pacing"]
        source: "VSLFT18"
      - id: "HEUR-JB-711"
        title: "Folks Like You and Me Rapport Phrase"
        description: "Use 'folks like you and me' — 'folks' is deliberately informal and country. It creates connection through linguistic humility. This simple phrasing does rapport, inclusion, and relatability in five words."
        domains: ["rapport-building", "copywriting", "language-patterns"]
        source: "VSLFT18"
      - id: "HEUR-JB-712"
        title: "Screenshot Testimonials Over Video"
        description: "Facebook screenshots are more trusted than polished video testimonials. If using video testimonials, keep them to 10-15 seconds max with rapid-fire cuts. Long video testimonials bore people faster than you would think possible."
        domains: ["social-proof", "testimonials", "vsl-structure"]
        source: "VSLFT18"
      - id: "HEUR-JB-713"
        title: "Triple Guarantee Architecture"
        description: "Use three separate guarantee conditions: (1) if you do not get specific result, (2) if you do not achieve secondary metric, (3) if you just do not like the font or design. Give them zero excuses to hesitate."
        domains: ["guarantee-design", "risk-reversal", "closing"]
        source: "VSLFT18"
      - id: "HEUR-JB-714"
        title: "Selectively Stupid Redundancy Rule"
        description: "People are uniformly smart but selectively stupid — at any moment they may be thinking about ten other things. Repeat your core message multiple times in different ways. If someone says you are redundant, you are doing it right."
        domains: ["copywriting", "repetition", "buyer-psychology"]
        source: "VSLFT18"
      - id: "HEUR-JB-715"
        title: "Super Bullet Trick with Adjectives"
        description: "Turn plain benefits into power bullets by adding one descriptor word. 'Simple' becomes 'Deceptively simple.' 'Fast' becomes 'Alarmingly fast.' One word transforms a boring benefit into a compelling bullet point."
        domains: ["copywriting", "bullet-points", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-716"
        title: "Three Promises in SNAP Suggestion"
        description: "After the pattern interrupt, list three big promises of what the viewer will discover. These are your main hooks. Open with words of intrigue: 'You are about to discover...' The three promises establish the value proposition in seconds."
        domains: ["vsl-structure", "hook-creation", "engagement"]
        source: "VSLFT18"
      - id: "HEUR-JB-717"
        title: "Cost of Loss Is Content Rich CTA"
        description: "Make the cost-of-loss section content-rich, not just emotional. Quantify it: 'You could pay $10, $20, even 100 times as much in expensive food, new fat clothes, medical bills, medication costs.' Financial cost of inaction makes the product a bargain."
        domains: ["closing", "pricing-psychology", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-718"
        title: "Do Not Decide Now Before Guarantee"
        description: "Say 'Don't decide right now' immediately before presenting the guarantee. It sounds counterintuitive but sets up the risk reversal perfectly. Take advantage of the unconditional guarantee — just try it for 60 days."
        domains: ["closing", "risk-reversal", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-719"
        title: "Reason for Scarcity Is Mandatory"
        description: "Never just say 'this will not be available forever.' Always give a specific reason for scarcity: 'I may make this a paid presentation,' 'membership quota,' 'I will raise the price.' Unsubstantiated scarcity creates cognitive dissonance."
        domains: ["urgency", "scarcity", "credibility"]
        source: "VSLFT18"
      - id: "HEUR-JB-720"
        title: "Write 10 Headlines Then Traffic Test Top 3"
        description: "Write 10 headlines using survey data and word cloud insights. Survey your list to rank interest. Then spend $50 per headline on PPC/banner ads testing the top 3. The one with most clicks wins — now you know beyond a shadow of a doubt."
        domains: ["headline-testing", "market-research", "conversion-optimization"]
        source: "VSLFT18"
      - id: "HEUR-JB-721"
        title: "Desire and Deserve Paired Phrase"
        description: "Use the paired phrase 'desire and deserve' repeatedly throughout the VSL. People want what they desire and feel they deserve it. Repetition of this exact pairing builds entitlement to the solution."
        domains: ["copywriting", "language-patterns", "persuasion"]
        source: "VSLFT18"
      - id: "HEUR-JB-722"
        title: "Unless You Act Now Final Urgency"
        description: "The third and most powerful urgency reason: 'Unless you take action now, you may never take action at all.' This is universally applicable — everyone can relate to putting things off until they never happen. It is the ultimate scarcity."
        domains: ["urgency", "closing", "buyer-psychology"]
        source: "VSLFT18"
      - id: "HEUR-JB-723"
        title: "Three Samurai Headline Formulas"
        description: "Formula 1: Power Word + Hook/Benefit + Verb + Target + Promise. Formula 2: Number + Adjective + Power Word + Product/Benefit + Verb + Target + Promise. Formula 3: Power Word + Descriptor + Feature + Power Word + Verb + Benefit + While/Withouts."
        domains: ["headline-creation", "copywriting", "frameworks"]
        source: "VSLFT18"
      - id: "HEUR-JB-724"
        title: "3X Hook Formula Meta Values Worksheet"
        description: "Map your product through: Meta-Values (health, energy, love, family, safety) → Success Looks Like → Present Looks Like → Role Model Is → Magic Pill → As If → Other Than You Who (villain). This single worksheet generates the entire VSL narrative."
        domains: ["vsl-preparation", "copywriting", "market-research"]
        source: "VSLFT18"
      - id: "HEUR-JB-750"
        title: "Paraphrase Every 5-7 Slides"
        description: "Every 5th to 7th slide, break the pattern from using every word on screen to only a paraphrased version. This keeps viewers hypnotically glued because they cannot predict when the sentence will end."
        domains: ["vsl-architecture", "engagement", "formatting"]
        source: "NOWVSL"
      - id: "HEUR-JB-751"
        title: "90 Percent One Sentence Per Slide"
        description: "Limit 90% of your slides to only one sentence followed by ellipses. The remaining 10% can have multi-line content. When slides go by quickly with one sentence each, it creates a hypnotic effect."
        domains: ["vsl-architecture", "formatting", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-752"
        title: "Faux Price 2-3x Higher Than Actual"
        description: "Anchor a faux price that is 2-3 times higher than the actual price. For a $47 product, say 'valued at $97.' This anchors a higher number in the brain so the actual price feels like a steal."
        domains: ["price-psychology", "anchoring", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-753"
        title: "Optimal VSL Length 28-36 Minutes"
        description: "The ideal time for video sales letters is 28 to 36 minutes. Longer VSLs (even 90 minutes) can convert depending on the price point. Do not worry about time — worry about content quality."
        domains: ["vsl-architecture", "formatting", "conversion-optimization"]
        source: "NOWVSL"
      - id: "HEUR-JB-754"
        title: "USP Under 20 Words Rule"
        description: "Take your second and third problem solvers, form all three into one sentence under 20 words, and use one of them as your enabler verb. Example: 'The only lifestyle eating plan that allows you to eat all your favorite foods and still lose weight.'"
        domains: ["usp", "copywriting", "positioning"]
        source: "NOWVSL"
      - id: "HEUR-JB-755"
        title: "Always Use Without Instead of Negatives"
        description: "The word 'without' is extremely powerful in headlines and benefits. It subtracts the public enemy from the promise. 'Lose weight without giving up your favorite foods' is far more compelling than listing what you have to give up."
        domains: ["copywriting", "headlines", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-756"
        title: "Triple Guarantee Three Levels Plus Ridiculous"
        description: "Structure guarantee in three tiers: Level 1 (broad promise, 60 days), Level 2 (specific metric, 30 days), Level 3 (something ridiculous like 'even if you don't like the font'). The third level creates a pattern break and humor."
        domains: ["guarantees", "offer-design", "conversion-optimization"]
        source: "NOWVSL"
      - id: "HEUR-JB-757"
        title: "Guarantee Increases Conversions 50 Percent"
        description: "Solid guarantees increase conversions by 50%. The most effective is triple-your-money-back (if you can afford refunds), followed by the triple guarantee. Always include guarantee seals and security graphics."
        domains: ["guarantees", "conversion-optimization", "trust-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-758"
        title: "Three Tips Minimum per VSL"
        description: "Include at least three tips: Avoid (amygdala trigger), Enjoy (emotional anchor), and How-To (logical pull). You can use more, but three is the optimal number. The How-To tip must always be last."
        domains: ["tip-formula", "vsl-architecture", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-759"
        title: "How-To Tip Always Last Position"
        description: "The How-To tip must always come last because it appeals to the logical brain asking 'just tell me how to do it.' After the how-to, you transition directly to 'the only way I can show you all of this is through this product.' It bridges directly to the offer."
        domains: ["tip-formula", "vsl-architecture", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-760"
        title: "Tips 2-5 Sentences Maximum"
        description: "Keep each tip to 2-5 sentences at most. Going over creates overwhelm. If the viewer cannot handle the first tip, they will assume the product is equally overwhelming. Brevity builds confidence."
        domains: ["tip-formula", "copywriting", "formatting"]
        source: "NOWVSL"
      - id: "HEUR-JB-761"
        title: "Four Comparisons Two Serious Two Funny"
        description: "Use four comparisons: two serious (anchor to famous product or contrast emotional states) and two funny (witty analogy that causes a smile). This is not carved in stone but the 2+2 formula is optimal."
        domains: ["comparison-marketing", "copywriting", "engagement"]
        source: "NOWVSL"
      - id: "HEUR-JB-762"
        title: "Red Highlighting for Subliminal Words"
        description: "Highlight power words in red: easy, fun, simple, superior, proven, yes, buy, now, desire, strong, truth, change, quick. Across three consecutive slides, spell out YES-BUY-NOW. Conscious mind notices red; subconscious absorbs the command."
        domains: ["nlp", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-763"
        title: "Action Drop at Sentence Beginning"
        description: "Place action drops (Today, Now, See, Listen, Actually) at the beginning of sentences to trigger present-moment engagement. 'Now I have to warn you' outperforms 'I have to warn you' significantly."
        domains: ["copywriting", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "HEUR-JB-764"
        title: "Anchor Drop with Yet for Continuation"
        description: "End a slide with 'yet' to create an anchor drop — no one will stop watching when a sentence ends with 'yet.' It forward-paces them into the next slide. This creates irresistible continuation momentum."
        domains: ["copywriting", "nlp", "engagement"]
        source: "NOWVSL"
      - id: "HEUR-JB-765"
        title: "Never Use If You Purchase Use When"
        description: "Always say 'when you purchase today' never 'if you purchase.' 'When' assumes the purchase will happen. 'If' introduces doubt. This single word change creates product pacing that assumes ownership."
        domains: ["copywriting", "closing-techniques", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-766"
        title: "Three Price Drops Before Reveal"
        description: "Perform three price drops before revealing the actual price. Start at the highest mentioned value ($217), drop to half ($109), drop again ($67), then reveal ('only one payment of just $47'). Each drop triggers deal-seeking dopamine."
        domains: ["price-psychology", "closing-techniques", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-767"
        title: "Use Investment Not Price"
        description: "Always say 'your total investment today' instead of 'your total price.' Investment implies value-building; price implies expense. This reframes the entire financial transaction."
        domains: ["copywriting", "price-psychology", "framing"]
        source: "NOWVSL"
      - id: "HEUR-JB-768"
        title: "One Payment Emphasis for Digital Products"
        description: "Say 'only one payment of just $X' instead of 'only $X.' People conditioned by subscription models hear 'one payment' and feel relief. The emphasis on 'one' reduces perceived financial risk."
        domains: ["price-psychology", "closing-techniques", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-769"
        title: "Watch Until the End Command"
        description: "Use 'watch this presentation until the end and you will also discover' as the core suggestion after the pattern interrupt. The word 'presentation' converts 25% better than 'video.' This single phrase is the foundation of VSL continuation."
        domains: ["vsl-architecture", "engagement", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-770"
        title: "Replace But with Yet However And"
        description: "Replace every instance of 'but' with 'yet,' 'however,' or 'and.' 'But' is a stop term that creates negative friction. 'However' is an imagination term. 'And' is an addition statement that implies more value."
        domains: ["copywriting", "nlp", "wordsmithing"]
        source: "NOWVSL"
      - id: "HEUR-JB-771"
        title: "Inclusion Phrases Throughout VSL"
        description: "Use inclusion language throughout: 'people like you and me,' 'folks like us,' 'if you are one of the millions.' Inclusion builds rapport and makes the viewer feel part of a community rather than being sold to."
        domains: ["rapport-building", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-772"
        title: "No Pictures Before Rapport Is Built"
        description: "Do not use pictures of yourself or product results in the first half of the VSL. Social proof logos (magazine logos, network logos) are acceptable. Personal photos gain meaning only after the nightmare story establishes vulnerability."
        domains: ["vsl-architecture", "social-proof", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-773"
        title: "Nightmare Story One Time Only"
        description: "The nightmare story is told once. The dream story can be used multiple times throughout the VSL. The nightmare is about you; the dream is about them. This asymmetry is fundamental to VSL structure."
        domains: ["storytelling", "vsl-architecture", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-774"
        title: "Power Words in Every Headline"
        description: "Always include power words in headlines: quickly, easily, revealed, new, scientifically proven, discover. Anything with a number is powerful ('3 ways,' '7 tips'). Power words are the spice that transforms bland copy into compelling hooks."
        domains: ["headlines", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-800"
        title: "Lies Come from Without Statements"
        description: "Your prospect's lies are found in your 'without' statements from the benefit formula. 'Without starving yourself skinny' means the lie is 'you have to starve to be skinny.' Each without reveals a dismantleable false belief."
        domains: ["copywriting", "persuasion", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-801"
        title: "Label Lies as False Simply"
        description: "After describing the lie, simply negate it: 'That is not even close to the truth.' Wordsmith if desired but the basic mechanism is just 'that is not true.' Highlight 'the truth' in red for subliminal reinforcement."
        domains: ["copywriting", "persuasion", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-802"
        title: "Mini Nightmare Story for Each Lie"
        description: "After labeling the lie as false, paint a vivid picture of the consequences of believing the lie using present-tense future pacing. 'Your metabolism slows to a snail's pace, halting all weight loss dead in its tracks.' This is a mini nightmare story per lie."
        domains: ["storytelling", "persuasion", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-803"
        title: "Avoid Tips Address Why Modality"
        description: "Avoid tips specifically address the Why buyer modality — 'why does this work? why am I like this?' The amygdala response to avoidance language hooks the Why thinkers."
        domains: ["tip-formula", "buyer-behavior", "sales-psychology"]
        source: "NOWVSL"
      - id: "HEUR-JB-804"
        title: "Enjoy Tips Address What-If Modality"
        description: "Enjoy tips address the What-If buyer modality — 'what if I could enjoy this process?' The enjoy tip is the most challenging to write but taps into higher emotional states."
        domains: ["tip-formula", "buyer-behavior", "sales-psychology"]
        source: "NOWVSL"
      - id: "HEUR-JB-805"
        title: "How-To Tips Address What and How Modalities"
        description: "How-To tips cover both the What and How-To buyer modalities simultaneously. Step-oriented thinkers need 'what is it' and 'how do I do it.' These are the logical, practical modalities."
        domains: ["tip-formula", "buyer-behavior", "sales-psychology"]
        source: "NOWVSL"
      - id: "HEUR-JB-806"
        title: "Tip Step Structure First-Why-Result"
        description: "Within each tip's how-to section, follow the step structure: 'First you do this, here is why you do it, here is the result.' This three-part structure makes even complex tips feel simple and actionable."
        domains: ["tip-formula", "copywriting", "formatting"]
        source: "NOWVSL"
      - id: "HEUR-JB-807"
        title: "Coin a Phrase in the What-Is-It Step"
        description: "The 'what is it' step of the tip formula is the ideal place to coin a trademarked phrase anchored to your product. If your concept is not unique, a coined phrase makes it unique. Example: 'Caloric Staggering Principle.'"
        domains: ["copywriting", "branding", "positioning"]
        source: "NOWVSL"
      - id: "HEUR-JB-808"
        title: "Mini Dream Story 1-2 Sentences Only"
        description: "End each tip with a mini dream story of only 1-2 sentences: 'Imagine being able to eat the right foods and lose weight effortlessly.' Focus on one key aspect the reader can relate to. Do not ask them to absorb too much."
        domains: ["future-pacing", "tip-formula", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-809"
        title: "Prime Benefit Equals How-To Tip"
        description: "Your How-To tip must relate directly to your USP's primary benefit. The main thing your product does best becomes the subject of the most important tip. This creates perfect alignment between content and offer."
        domains: ["tip-formula", "usp", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-810"
        title: "Tip Mistakes Kill Conversions"
        description: "Three tip design mistakes: 1) Too much detail causes overwhelm, 2) Complex/difficult tips lose prospects to easier solutions, 3) Obvious teases without proper open loops feel cheating. Avoid all three to maintain rapport."
        domains: ["tip-formula", "conversion-optimization", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-811"
        title: "Formal Reintroduction with Full Credentials"
        description: "At the Grand Offer start, reintroduce yourself with full name and credentials: 'Hi, I'm Jon Benson, creator of the Every Other Day Diet.' This gear shift from casual to close mode signals the transition to the pitch."
        domains: ["vsl-architecture", "closing-techniques", "positioning"]
        source: "NOWVSL"
      - id: "HEUR-JB-812"
        title: "Works Even If Section Before Testimonials"
        description: "Include a 'works even if' section before testimonials: 'Works even if you have no experience, even if you have tried everything before, even if you have limited time.' This preemptively handles objections and widens the market."
        domains: ["objection-handling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-813"
        title: "What It Isnt Section for Positioning"
        description: "Include a 'what it isn't' section to differentiate from competitors and address misconceptions: 'This is not another fad diet. This is not a pill. This is not something that requires hours at the gym.' Negation sharpens positioning."
        domains: ["positioning", "differentiation", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-814"
        title: "Hero Study Before Testimonials"
        description: "Include a hero study — one detailed success story — before the batch of shorter testimonials. The hero study provides depth and believability that multiple brief testimonials cannot achieve alone."
        domains: ["social-proof", "storytelling", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-815"
        title: "Cost of Loss Before Price Reveal"
        description: "Before revealing the price, calculate the cost of NOT buying: 'What is the cost of continued weight gain? Lost confidence? Medical bills? Missed opportunities?' Make inaction more expensive than the product."
        domains: ["price-psychology", "persuasion", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-816"
        title: "Reason for Discount Must Be Believable"
        description: "Always provide a reason for the discount: 'Because this is a presentation-only offer,' 'Because I want to build my testimonial base,' 'Because it is a cause I believe in.' Unexplained discounts reduce credibility."
        domains: ["price-psychology", "credibility", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-817"
        title: "CTA Click Orange Button Specificity"
        description: "Call to action must be hyper-specific: 'Click on the orange button that says add to cart to claim your discounted price now.' Name the button color, the button text, and the outcome. Specificity reduces decision friction."
        domains: ["cta-design", "conversion-optimization", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-818"
        title: "Second CTA with Delivery Timeline"
        description: "Use a second CTA that emphasizes delivery timeline: 'You will be granted immediate access to everything' for digital, or specific shipping estimate for physical. Timeline emphasis increases urgency."
        domains: ["cta-design", "urgency", "conversion-optimization"]
        source: "NOWVSL"
      - id: "HEUR-JB-819"
        title: "Re-mention Super Bonus in CTA"
        description: "In the CTA section, re-mention the super bonus: 'plus your free virtual trainer bonus worth $97 just for taking immediate action today.' This reinforces the exclusive value at the decision point."
        domains: ["bonuses", "closing-techniques", "cta-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-820"
        title: "Remember Slide Reopens Pain"
        description: "Start the pain/pleasure section with 'Remember' followed by pain reinforcement: 'Remember, you have been struggling with your weight loss for far too long.' The word 'remember' activates all prior emotional anchors."
        domains: ["copywriting", "nlp", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-821"
        title: "Yet All Of This Can Change Pivot"
        description: "After the pain reminder, pivot with 'Yet all of this can change the moment you begin applying the quick start principles.' 'Yet' transitions from despair to hope. Pick a specific feature name for the 'quick start' reference."
        domains: ["copywriting", "future-pacing", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-822"
        title: "Picture Command for Final Dream Story"
        description: "Use 'Picture the moment you finally have the answer you have been looking for' to set up the final dream story. 'Picture' clicks the mind out of decision mode and into future pacing mode."
        domains: ["nlp", "future-pacing", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-823"
        title: "Three Scarcity Reasons Structure"
        description: "Provide exactly three reasons to act now: 1) Price will be raised, 2) Bonus membership will cap, 3) Procrastination turns days into months into years. Each reason addresses a different psychological pressure point."
        domains: ["scarcity", "urgency", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-824"
        title: "Lets Make Sure You Get What You Want Close"
        description: "End the scarcity section with 'So let us make sure you get what you really want.' This reframes the decision from spending money to getting what they deserve. It is warm, not pushy."
        domains: ["closing-techniques", "copywriting", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-825"
        title: "Future Paced Actions Before Final Push"
        description: "Before the final closing push, describe specific actions the buyer will take after purchase: 'Turn immediately to page 37,' 'Watch module 3 first,' 'Call our support team.' This assumes the purchase and makes it feel real."
        domains: ["future-pacing", "closing-techniques", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-826"
        title: "You Feel Alive Present Tense Close"
        description: "In the final dream story, use strict present tense: 'You feel alive, full of hope and optimism. You see the weight coming off in the bathroom mirror today.' Today is a future day but is worded as present reality."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-827"
        title: "Q&A Section Handles Remaining Objections"
        description: "The Q&A section at the end of the Grand Offer addresses common questions and remaining objections. Format as genuine questions from real students. This provides social proof that others had the same concerns and found resolution."
        domains: ["objection-handling", "social-proof", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-850"
        title: "Nightmare Story Focal Point Object"
        description: "Every nightmare story needs a physical focal point object — in Jon's case it was a jacket (forgotten → wallet lost → theft). Find your equivalent object that ties the entire narrative together as a recurring anchor."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-851"
        title: "Feeling Words Throughout Nightmare Story"
        description: "Emphasize the word 'feeling' and other sensory words throughout the nightmare story. How were you feeling when this happened? Reflect feelings at every escalation point. Emotional resonance comes from stated feelings, not just events."
        domains: ["storytelling", "copywriting", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-852"
        title: "Expert Paradox Resolution Sequence"
        description: "First position as someone who went through horrendous experience (vulnerability). Then reveal authority through necessity (I had to figure this out or die trying). Finally present credentials modestly. This sequence resolves the expert paradox."
        domains: ["positioning", "storytelling", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-853"
        title: "Dream Story Specific You General They"
        description: "In dream stories, use 'specific you' (direct second person addressing the viewer's life) combined with 'general they' (the people in your life, everyone at work). This creates both intimacy and social validation simultaneously."
        domains: ["copywriting", "future-pacing", "nlp"]
        source: "NOWVSL"
      - id: "HEUR-JB-854"
        title: "Follow the Leader Imagination Phrases"
        description: "Use phrases like 'Imagine this,' 'Picture this for a moment,' 'Picture your life,' or 'Walk with me for a moment as we imagine' to open dream stories. These engage the right brain creative mind and temporarily disengage decision mode."
        domains: ["nlp", "copywriting", "future-pacing"]
        source: "NOWVSL"
      - id: "HEUR-JB-855"
        title: "Nightmare Story Ends with Vow Plus Discovery"
        description: "The nightmare story must end with a declaration of independence: 'I vowed to read every book and crawl under every rock to break my addiction or die trying.' Then transition: 'The good news is I figured it out — and how to enjoy it.'"
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-856"
        title: "Tie Focal Point Back to Positive"
        description: "At the nightmare story conclusion, tie the focal point object back to something positive: 'Not only did I figure out how to drop the weight, I figured out how to enjoy my donuts while doing it.' This creates a satisfying narrative arc."
        domains: ["storytelling", "copywriting", "rapport-building"]
        source: "NOWVSL"
      - id: "HEUR-JB-857"
        title: "Pattern Interrupt Before Nightmare Story"
        description: "The snap suggestion pattern interrupt primes the mind for the vital connection. The viewer's brain is in an open state of suggestion when the nightmare story begins, which is why rapport builds so quickly."
        domains: ["nlp", "vsl-architecture", "pattern-interrupts"]
        source: "NOWVSL"
      - id: "HEUR-JB-858"
        title: "Social Proof Logos Before Personal Photos"
        description: "Use magazine logos, TV network logos, and publication logos early in the VSL for social proof. These are acceptable before rapport is built. Save personal photos and testimonials for after the nightmare story."
        domains: ["social-proof", "vsl-architecture", "credibility"]
        source: "NOWVSL"
      - id: "HEUR-JB-859"
        title: "Transition to Big Problem from Vital Connection"
        description: "After the nightmare story and modest introduction, transition to the Big Problem section with a phrase that bridges personal story to universal problem: 'In fact...' followed by the systematic lie dismantling."
        domains: ["vsl-architecture", "copywriting", "transitions"]
        source: "NOWVSL"
      - id: "HEUR-JB-860"
        title: "Big Truth After Lies"
        description: "After dismantling all lies, reveal the Big Truth — your unique mechanism or approach that solves the problem. This is the positive counterpart to all the dismantled falsehoods. It positions your product as the antidote."
        domains: ["copywriting", "positioning", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-861"
        title: "Bigger Solution Open Loop into Tips"
        description: "Transition from the Big Problem to the Bigger Solution by opening a tip loop: 'Before I tell you about the solution, let me share three things you need to know.' This bridges the problem section to the tip section naturally."
        domains: ["vsl-architecture", "copywriting", "transitions"]
        source: "NOWVSL"
      - id: "HEUR-JB-862"
        title: "Blame This Not Blame You"
        description: "In the Big Problem section, assign blame to external forces (industry, misinformation, big companies) not to the viewer. 'It is not your fault' removes guilt. 'Blame this' redirects anger toward the enemy you are fighting together."
        domains: ["rapport-building", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-863"
        title: "Its Not Your Fault Guilt Removal"
        description: "Say 'It is not your fault' explicitly after presenting the lies. This removes guilt from the viewer for having believed false information. Guilt-free viewers are more open to accepting your solution."
        domains: ["rapport-building", "sales-psychology", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-864"
        title: "Declaration of Independence in Nightmare Story"
        description: "Every nightmare story needs a declaration of independence moment — the turning point where you decided to change everything. This moment creates maximum emotional catharsis and hope in the viewer."
        domains: ["storytelling", "copywriting", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-865"
        title: "Moral Journey in Nightmare Story"
        description: "The nightmare story should include a moral journey — what you learned about yourself and life through the struggle. This adds depth beyond the physical events and connects to universal human experience."
        domains: ["storytelling", "rapport-building", "copywriting"]
        source: "NOWVSL"
      - id: "HEUR-JB-866"
        title: "About the System Credibility Section"
        description: "Include an 'about the system' section in the Vital Connection that establishes credibility for your methodology without hard-selling: how you developed it, what makes it different, who has used it. Keep it modest."
        domains: ["credibility", "positioning", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-867"
        title: "Results of the System Before Transition"
        description: "Present brief results of the system before transitioning to the Big Problem section. Show evidence that your approach works, then pivot to 'but first you need to understand why everything else has failed you.'"
        domains: ["social-proof", "vsl-architecture", "transitions"]
        source: "NOWVSL"
      - id: "HEUR-JB-868"
        title: "Emphasize X Before Price Tease"
        description: "Before the first price tease in the Grand Offer, emphasize one extraordinary feature or benefit: 'But the most exciting part of all is X.' This creates peak desire right before introducing price, maximizing willingness to pay."
        domains: ["offer-design", "price-psychology", "vsl-architecture"]
        source: "NOWVSL"
      - id: "HEUR-JB-869"
        title: "Qualify Remaining Fence-Sitters"
        description: "Before the guarantee, include a qualify remaining section for fence-sitters: 'If you are still on the fence, let me ask you this...' followed by a question that reframes inaction as loss."
        domains: ["closing-techniques", "qualification", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-870"
        title: "Bonuses Before Price Reveal Sequence"
        description: "After the faux price, present bonuses before revealing the actual price. Stack the total faux value (product + bonuses) to the highest number, then begin the price dropdown. The gap between stacked value and actual price creates irresistible perceived value."
        domains: ["bonuses", "price-psychology", "offer-design"]
        source: "NOWVSL"
      - id: "HEUR-JB-871"
        title: "Super Bonus After Regular Bonuses"
        description: "The super bonus comes after all regular bonuses and after the price reveal. It serves as an additional push for those still undecided: 'Plus, if you order today, you also get this exclusive bonus worth $97.' Strategic timing is everything."
        domains: ["bonuses", "offer-design", "closing-techniques"]
        source: "NOWVSL"
      - id: "HEUR-JB-872"
        title: "Inclusion Statement Before CTA"
        description: "Before the call to action, use an inclusion statement: 'You are not alone — join thousands who have already transformed their lives.' This creates community belonging that reduces the loneliness of making a purchase decision."
        domains: ["rapport-building", "closing-techniques", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-873"
        title: "Responsibility Section in Pain and Pleasure"
        description: "In the Pain & Pleasure section, include a responsibility frame: 'I have given you the information — now the choice is yours.' This transfers ownership of the decision while maintaining rapport. It is firm but not aggressive."
        domains: ["closing-techniques", "copywriting", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-874"
        title: "Reinforce Section After Responsibility"
        description: "After the responsibility frame, reinforce with a final dream story and emotional peak: 'You deserve this. Your family deserves this.' Responsibility + reinforcement creates the final emotional momentum toward the purchase."
        domains: ["closing-techniques", "future-pacing", "persuasion"]
        source: "NOWVSL"
      - id: "HEUR-JB-875"
        title: "The Smart Thing Close"
        description: "End with 'The smart thing to do right now is...' followed by the final CTA. This frames the purchase as the intelligent choice rather than an emotional impulse. Viewers who identify as smart are compelled to act consistently with that identity."
        domains: ["closing-techniques", "framing", "persuasion"]
        source: "NOWVSL"
        L4_FRAMEWORKS: "FW-JB-816"
      - id: "HEUR-JB-001"
        title: "USP Word Limit"
        description: "USP must be 20 words or fewer. Power Phrase + Prime Benefit + Enabler Phrase compressed into a single scannable sentence."
        domains: ["copywriting", "positioning", "brevity"]
        source: "3XVSL"
      - id: "HEUR-JB-002"
        title: "Optimal VSL Length"
        description: "Optimal VSL length is 28-32 minutes. Shorter loses persuasion depth; longer loses attention."
        domains: ["vsl-creation", "timing", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-003"
        title: "Title Case for VSL Slides"
        description: "Use Title Case for all VSL slide text. Never all-caps (screaming), never lowercase (weak). Title Case is authoritative yet readable."
        domains: ["vsl-creation", "visual-design", "readability"]
        source: "3XVSL"
      - id: "HEUR-JB-004"
        title: "Paraphrase Every 5-15 Slides"
        description: "Repeat key points in different words every 5-15 slides. This ensures retention without monotony."
        domains: ["vsl-creation", "retention", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-005"
        title: "85/15 Emotional-Logical Split"
        description: "15% of buyers are logical, 85% buy emotionally. Weight your copy 85% emotional, 15% logical support."
        domains: ["copywriting", "sales-psychology", "buyer-behavior"]
        source: "3XVSL"
      - id: "HEUR-JB-006"
        title: "Never Pitch After Nightmare"
        description: "Never put the pitch right after the nightmare story. The prospect is in pain mode, not buying mode. Insert tips and dream story first."
        domains: ["vsl-structure", "timing", "emotional-design"]
        source: "3XVSL"
      - id: "HEUR-JB-007"
        title: "Avoid the Word But"
        description: "Never use 'but' in copy — it negates everything before it. Substitute with 'yet', 'however', 'and' to maintain positive momentum."
        domains: ["copywriting", "linguistics", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-008"
        title: "May Or Technique"
        description: "Never assume what the reader is thinking. Use 'may or may not' to offer multiple entry points: 'You may or may not have heard of...' covers all bases."
        domains: ["copywriting", "empathy", "inclusion"]
        source: "3XVSL"
      - id: "HEUR-JB-009"
        title: "Specificity in Story Details"
        description: "Include specific details in stories: exact dates, weather conditions, clothing worn, exact locations. Specificity equals believability."
        domains: ["storytelling", "credibility", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-010"
        title: "One Buyer Modality Loses 75%"
        description: "Speaking to only one buyer modality (Why, What, How-To, What-If) means losing 75% of your potential audience. Address all four."
        domains: ["buyer-psychology", "copywriting", "vsl-creation"]
        source: "3XVSL"
      - id: "HEUR-JB-011"
        title: "Action Drops for Present Moment"
        description: "Use Action Drop words (Today, Now, You See, Listen, Actually) to keep the viewer in present-moment awareness. These words prevent mental drifting."
        domains: ["engagement", "copywriting", "vsl-creation"]
        source: "3XVSL"
      - id: "HEUR-JB-012"
        title: "Subliminal Red Text Highlighting"
        description: "Highlight key words in red text on VSL slides: Decide, Now, Freedom, Secret, You, Today. Creates subliminal urgency anchoring."
        domains: ["vsl-creation", "visual-psychology", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-013"
        title: "Anchor Drop Forward Momentum"
        description: "Use Anchor Drop words (yet, because, guess what) to create forward momentum. These words signal that something important is coming next."
        domains: ["copywriting", "engagement", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-014"
        title: "Open Loops Only Product Closes"
        description: "Create open loops that can ONLY be closed by buying the product. If the loop can be closed by free content, it fails as a selling mechanism."
        domains: ["engagement", "persuasion", "vsl-creation"]
        source: "3XVSL"
      - id: "HEUR-JB-015"
        title: "Numbers in Headlines and Promises"
        description: "Numbers are magical in headlines and promises. '3 Secrets' beats 'Some Secrets'. '28 Minutes' beats 'A Short Time'. Numbers create concrete expectations."
        domains: ["copywriting", "headlines", "specificity"]
        source: "3XVSL"
      - id: "HEUR-JB-016"
        title: "Dream Story General They Rule"
        description: "In dream stories, always use general 'they' (people who tried this), never specific 'you' (you will get this). General feels honest; specific feels like a guarantee."
        domains: ["storytelling", "copywriting", "credibility"]
        source: "3XVSL"
      - id: "HEUR-JB-017"
        title: "With/Without Creates Strongest Close"
        description: "The with/without comparison creates the strongest close desire among all 4 comparison types. It makes inaction feel like a conscious choice to suffer."
        domains: ["closing", "comparison", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-018"
        title: "Inclusion Statements Build Social Proof"
        description: "Inclusion statements (thousands already, most people agree, you're joining) build social proof subconsciously without explicit testimonials."
        domains: ["social-proof", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-019"
        title: "Avoid Tip First in Bigger Solution"
        description: "In the Bigger Solution section, always lead with the Avoid Tip (fear-based) before the Enjoy Tip and How-To Tip. Fear creates the vacuum; tips fill it."
        domains: ["vsl-structure", "emotional-design", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-020"
        title: "Nightmare Story Image Object"
        description: "Pick one physical object from the nightmare story to use as the visual pattern interrupt. It connects the emotional story to the visual opening."
        domains: ["vsl-creation", "visual-design", "storytelling"]
        source: "3XVSL"
      - id: "HEUR-JB-021"
        title: "Two Heavy Two Light Comparisons"
        description: "Use exactly 2 heavy comparisons (competition + with/without) and 2 light comparisons (general + specific-to-tip). This ratio provides balanced persuasion."
        domains: ["comparison", "vsl-structure", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-022"
        title: "Tire Kicker Elimination Placement"
        description: "Place tire kicker elimination early: 'If you want a magic pill, leave now.' This filters unqualified viewers and increases commitment of remaining viewers."
        domains: ["qualification", "engagement", "trust-building"]
        source: "3XVSL"
      - id: "HEUR-JB-023"
        title: "Grand Offer Six Parts Rule"
        description: "Grand Offer must contain exactly 6 parts: Product, Price, CTA, Pain/Pleasure, Actions/Results, Q&A. Missing any part leaves objections unaddressed."
        domains: ["offer-design", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-024"
        title: "Present Tense in Dream Stories"
        description: "Dream stories must use present tense promise (as if already happening), not future tense. Present tense feels real; future tense feels hypothetical."
        domains: ["storytelling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-025"
        title: "Even If for Preemptive Objections"
        description: "Use 'Even If' technique to handle objections before they form: 'Even if you have no experience...' removes excuses before the prospect can voice them."
        domains: ["objection-handling", "copywriting", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-026"
        title: "Snap Suggestion Optional Intro"
        description: "The Snap Suggestion can start with an optional intro (brief context) before the pattern interrupt. The intro must be under 3 slides."
        domains: ["vsl-structure", "engagement", "opening"]
        source: "3XVSL"
      - id: "HEUR-JB-027"
        title: "Big Promise Specificity"
        description: "The Big Promise in the Snap Suggestion must be specific and tangible: '3 secrets to X' not 'learn how to improve'. Vague promises get vague attention."
        domains: ["copywriting", "headlines", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-028"
        title: "Lets Make a Deal Early"
        description: "Include 'Let's Make a Deal' (I give value, you give attention) in the first 2 minutes. This micro-commitment increases watch-through by setting expectations."
        domains: ["engagement", "commitment", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-029"
        title: "Conspiracy Before Solution"
        description: "Always present the Big Lie/conspiracy BEFORE introducing the solution. The conspiracy creates the problem frame; the solution fills it."
        domains: ["persuasion", "problem-framing", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-030"
        title: "Big Truth Opens Solution Loop"
        description: "The Big Truth must open the Bigger Solution loop, not close it. It teases the answer without fully delivering, maintaining curiosity into the next section."
        domains: ["engagement", "persuasion", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-031"
        title: "Transition to Grand Offer Flow"
        description: "The transition to Grand Offer follows a strict sequence: Two Choices, Savvy Choice, I've Done Work For You, It's Called... Any deviation breaks the closing momentum."
        domains: ["closing", "vsl-structure", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-032"
        title: "Hero Study Before Personal Claims"
        description: "Present Hero Study (analysis of experts) before making personal claims. Borrowed credibility is more believable than self-proclaimed credibility."
        domains: ["authority-building", "social-proof", "credibility"]
        source: "3XVSL"
      - id: "HEUR-JB-033"
        title: "Tip Benefit-First Structure"
        description: "Every tip must lead with the benefit before explaining the what or how. Benefit creates curiosity; explanation satisfies it."
        domains: ["vsl-structure", "copywriting", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-034"
        title: "Mini Dream Story in Tips"
        description: "Each tip should end with a mini dream story that paints the result. This keeps the emotional momentum high between the main story sections."
        domains: ["storytelling", "vsl-structure", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-035"
        title: "Nightmare Intro Specifics Strategy"
        description: "Start the nightmare story intro with the Specifics Strategy: exact date, time, weather, location. This signals 'this is a real story, not a script.'"
        domains: ["storytelling", "credibility", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-036"
        title: "Focal Point as Rock Bottom"
        description: "The focal point of the nightmare story must be the absolute rock bottom moment. If it doesn't make the viewer cringe or feel empathy, go deeper."
        domains: ["storytelling", "emotional-design", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-037"
        title: "Moral Bridges Story to Sale"
        description: "The nightmare story moral must bridge directly to the product solution without feeling like a pitch. If the transition feels jarring, the moral is wrong."
        domains: ["storytelling", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-038"
        title: "Price After Value Stack"
        description: "Never reveal price until after the full value stack has been presented. Price before value creates sticker shock; price after value creates 'that's it?'"
        domains: ["pricing", "offer-design", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-039"
        title: "CTA Repetition Rule"
        description: "Repeat the CTA (Call to Action) at least 3 times in the Grand Offer section. Once is informational; three times is directional."
        domains: ["closing", "cta-design", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-040"
        title: "Pain Pleasure Alternation in Close"
        description: "In the Grand Offer Pain/Pleasure section, alternate between pain of inaction and pleasure of action. Do not stack all pain or all pleasure together."
        domains: ["closing", "emotional-design", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-041"
        title: "1-2-3 as Universal Structure"
        description: "1 USP + 2 Stories + 3 Tips + 4 Comparisons = the complete content backbone of any VSL. This ratio provides optimal persuasion density."
        domains: ["vsl-structure", "copywriting", "framework"]
        source: "3XVSL"
      - id: "HEUR-JB-042"
        title: "Three Tip Type Sequence"
        description: "Tips must follow the sequence: Avoid Tip (fear/why) -> Enjoy Tip (what-if) -> How-To Tip (linchpin). This sequence mirrors the emotional arc from fear to desire to action."
        domains: ["vsl-structure", "emotional-design", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-043"
        title: "Video Scarcity in Opening"
        description: "Include video scarcity statement in the Snap Suggestion (this video may be taken down). This must appear before the big promise to create urgency to watch."
        domains: ["scarcity", "engagement", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-044"
        title: "Verbal Pattern Interrupt Types"
        description: "Two types of pattern interrupts exist: Image Interrupt (visual from nightmare story) and Linguistic/Verbal Interrupt (unexpected statement). Use at least one."
        domains: ["attention-capture", "vsl-creation", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-045"
        title: "Blame This External Target"
        description: "In the Conspiracy Cycle, 'Blame This' must point to an external target (industry, system, establishment), never the prospect or their close circle."
        domains: ["problem-framing", "rapport", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-046"
        title: "Not Your Fault Before Big Truth"
        description: "'Not Your Fault' must come before the Big Truth in the Conspiracy Cycle. Absolution must precede revelation for maximum receptivity."
        domains: ["persuasion", "vsl-structure", "rapport"]
        source: "3XVSL"
      - id: "HEUR-JB-047"
        title: "Two Choices as False Dichotomy"
        description: "The 'Two Choices' close (do nothing vs. act now) is a strategic false dichotomy that reframes the buying decision from optional to binary."
        domains: ["closing", "decision-framing", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-048"
        title: "Savvy Choice After Two Choices"
        description: "Immediately after presenting two choices, label the buying choice as the 'savvy' choice. This flatters the buyer's identity and makes purchasing feel intelligent."
        domains: ["closing", "identity", "persuasion"]
        source: "3XVSL"
      - id: "HEUR-JB-049"
        title: "It's Called Reveal Timing"
        description: "The product name reveal ('It's Called...') should come only after Two Choices + Savvy Choice + I've Done the Work for You. This sequence maximizes the reveal impact."
        domains: ["vsl-structure", "engagement", "branding"]
        source: "3XVSL"
      - id: "HEUR-JB-050"
        title: "Follow the Leader in Dream Story"
        description: "Begin dream stories with 'Follow the Leader' (citing known authorities who use similar principles). This creates aspirational framework before personal claims."
        domains: ["social-proof", "storytelling", "authority-building"]
        source: "3XVSL"
      - id: "HEUR-JB-051"
        title: "Specific You General They Rule"
        description: "In dream stories: be specific about yourself (I did X) but general about prospects (people who try this tend to). Specific claims about others invite skepticism."
        domains: ["copywriting", "credibility", "storytelling"]
        source: "3XVSL"
      - id: "HEUR-JB-052"
        title: "Transition Phrase Between Sections"
        description: "Every major VSL section must end with a transition phrase that flows into the next section. Abrupt section breaks lose viewers."
        domains: ["vsl-creation", "engagement", "flow"]
        source: "3XVSL"
      - id: "HEUR-JB-053"
        title: "Benefit Then What Is It"
        description: "In tip structure: always state the benefit FIRST, then explain what the tip is. Never start with the tip name or category."
        domains: ["copywriting", "vsl-structure", "engagement"]
        source: "3XVSL"
      - id: "HEUR-JB-054"
        title: "Q&A as Final Objection Sweep"
        description: "The Q&A section must address the top 5-7 objections remaining after the main close. Structure as questions the buyer would ask, not generic FAQs."
        domains: ["objection-handling", "closing", "vsl-structure"]
        source: "3XVSL"
      - id: "HEUR-JB-055"
        title: "Power Phrase Plus Prime Benefit"
        description: "USP structure: Power Phrase (emotional hook) + Prime Benefit (what they get) + Enabler Phrase (how they get it). All three must be present."
        domains: ["copywriting", "positioning", "usp-design"]
        source: "3XVSL"
        # === CHAT VSL (CVSL) — 25 new heuristics ===
      - id: "HEUR-JB-056"
        title: "40 Minutes Ideal VSL Length"
        description: "The ideal classic long-form VSL runs approximately 40 minutes (~6000 words). This gives enough time for all 5 steps plus the complete Grand Offer with bonuses and NLP close."
        domains: ["vsl-structure", "production", "conversion-optimization"]
        source: "CVSL"
      - id: "HEUR-JB-057"
        title: "6000 Words Target"
        description: "A complete ChatVSL outputs approximately 6000 words across all 5 steps: ~1000 (Snap) + ~1500 (Vital) + ~500 (Problem) + ~800 (Solution) + ~2200 (Offer)."
        domains: ["vsl-structure", "copywriting", "production"]
        source: "CVSL"
      - id: "HEUR-JB-058"
        title: "5-12 Iterations for Hooks"
        description: "Run the branding/hook generation prompt 5-12 times minimum. Each iteration produces different hook name options. The best hooks emerge after multiple iterations, not the first try."
        domains: ["offer-construction", "branding", "ai-copywriting"]
        source: "CVSL"
      - id: "HEUR-JB-059"
        title: "3 Words Max for Hook Names"
        description: "Unique mechanism hook names must be 3 words or less, Title Case, mysterious and scientific-sounding. Examples: Metabolic Adaptation, Leptin Resistance, Blank Page Paralysis."
        domains: ["branding", "offer-construction", "copywriting"]
        source: "CVSL"
      - id: "HEUR-JB-060"
        title: "2-4 Words Max for Niche"
        description: "Niche description in the Buyer's Roadmap must be 2-4 words maximum. Forces clarity. If you can't describe your niche in 4 words, you don't know your niche well enough."
        domains: ["market-research", "positioning", "clarity"]
        source: "CVSL"
      - id: "HEUR-JB-061"
        title: "Retail Price >2x Offer Price"
        description: "The displayed retail/comparison price should be more than double the actual offer price. Creates perceived discount of 50%+ which triggers the bargain-hunting instinct."
        domains: ["pricing-psychology", "offer-design", "conversion-optimization"]
        source: "CVSL"
      - id: "HEUR-JB-062"
        title: "$120 AOV Minimum for Traffic"
        description: "Average Order Value of $120+ is the minimum threshold for scalable paid traffic acquisition. Below $120 AOV, the math rarely works for profitable paid advertising."
        domains: ["unit-economics", "traffic", "offer-design"]
        source: "CVSL"
      - id: "HEUR-JB-063"
        title: "20-25 Min Buy Button Drop"
        description: "In modern VSLs, the sweet spot to drop the buy button is at the 20-25 minute mark. Earlier feels pushy; later loses the undecided."
        domains: ["vsl-structure", "conversion-optimization", "timing"]
        source: "CVSL"
      - id: "HEUR-JB-064"
        title: "30% Click Hyperlinks Not Buttons"
        description: "30% of buyers click text hyperlinks instead of buttons. Always include BOTH a button AND a hyperlink for every CTA. Missing either loses conversions."
        domains: ["conversion-optimization", "ux-design", "cta-strategy"]
        source: "CVSL"
      - id: "HEUR-JB-065"
        title: "10-12 Open Loops Per VSL"
        description: "A high-performing VSL maintains 10-12 simultaneous open loops. Fewer and the prospect loses curiosity; more and they feel overwhelmed. All must be closed before the end."
        domains: ["engagement", "vsl-structure", "attention-engineering"]
        source: "CVSL"
      - id: "HEUR-JB-066"
        title: "Unique Mechanism at 1/3 Through"
        description: "The unique mechanism (negative hook) should be revealed approximately 1/3 through the VSL. The Metabolic Sherpa ($50M) reveals its mechanism at page 25 of 75."
        domains: ["vsl-structure", "pacing", "revelation-timing"]
        source: "CVSL"
      - id: "HEUR-JB-067"
        title: "1000 Words Pattern Interrupt+Lead"
        description: "Step 1 (Snap Suggestion) targets approximately 1000 words: movie-scene pattern interrupt (~300w) + 90 seconds of desire/benefit stack (~400w) + lead with promises (~300w)."
        domains: ["vsl-structure", "copywriting", "pacing"]
        source: "CVSL"
      - id: "HEUR-JB-068"
        title: "1500 Words Nightmare Story"
        description: "Step 2 (Vital Connection) targets approximately 1500 words: nightmare story with anchor object, struggle details, Declaration of Independence moment, and bridge to solution."
        domains: ["vsl-structure", "storytelling", "pacing"]
        source: "CVSL"
      - id: "HEUR-JB-069"
        title: "500 Words Big Problem"
        description: "Step 3 (Big Problem) targets approximately 500 words: negative hook reveal, root cause explanation, why false solutions fail, and conspiracy/Big Lie framing."
        domains: ["vsl-structure", "problem-framing", "pacing"]
        source: "CVSL"
      - id: "HEUR-JB-070"
        title: "800 Words Bigger Solution"
        description: "Step 4 (Bigger Solution) targets approximately 800 words: positive hook reveal, 2-3 tips using the mechanism, each tip following the Benefit→WhatIsIt→HowTo→Result formula."
        domains: ["vsl-structure", "solution-framing", "pacing"]
        source: "CVSL"
      - id: "HEUR-JB-071"
        title: "2200 Words Grand Offer"
        description: "Step 5 (Grand Offer) targets approximately 2200 words across 6 sub-parts: intro, features, pricing, bonuses, guarantee, NLP close."
        domains: ["vsl-structure", "closing", "pacing"]
        source: "CVSL"
      - id: "HEUR-JB-072"
        title: "GPT-4 Mandatory Not GPT-3.5"
        description: "ChatVSL requires GPT-4 Plus ($20/month). GPT-3.5 produces dramatically inferior copy quality. The investment in GPT-4 is non-negotiable for professional-grade output."
        domains: ["ai-copywriting", "quality-assurance", "tool-selection"]
        source: "CVSL"
      - id: "HEUR-JB-073"
        title: "88% Perceived Discount Target"
        description: "Stack bonus values to create 80-90% perceived discount. Demo example: $27 offer vs $232 total value = 88% off. The discount percentage must feel overwhelming but believable."
        domains: ["pricing-psychology", "offer-design", "value-stacking"]
        source: "CVSL"
      - id: "HEUR-JB-074"
        title: "Copy All Roadmap Before Prompting"
        description: "Before running any prompt, copy ALL relevant Buyer's Roadmap data into the chat. Do not reference external documents. AI needs the data in-context for maximum quality."
        domains: ["ai-copywriting", "prompt-engineering", "workflow"]
        source: "CVSL"
      - id: "HEUR-JB-075"
        title: "90 Seconds of Desire Post-Interrupt"
        description: "Immediately after the pattern interrupt, deliver 90 seconds (~300 words) of pure desire content — benefit stack, promise stack, aspiration imagery. No selling, no features, just want-creation."
        domains: ["vsl-structure", "persuasion", "pacing"]
        source: "CVSL"
      - id: "HEUR-JB-076"
        title: "Movie Scene Format for Pattern Interrupt"
        description: "Always prompt AI to write pattern interrupts as movie scenes — opening with visual setting, introducing a character in action, building tension, ending with a twist/cliffhanger. AI writes movies better than ads."
        domains: ["ai-copywriting", "pattern-interrupt", "storytelling"]
        source: "CVSL"
      - id: "HEUR-JB-077"
        title: "Remove Radio Voice from AI Output"
        description: "After every AI generation, run the refiner prompt to eliminate 'radio voice' — generic, hype-filled, surface-level AI default tone. Replace with conversational, dimensional, human-sounding copy."
        domains: ["ai-copywriting", "quality-assurance", "editing"]
        source: "CVSL"
      - id: "HEUR-JB-078"
        title: "Physical Anchor Object Required"
        description: "Every pattern interrupt must include a physical anchor object (box, rock, ticket, hospital gown). The object creates emotional resonance and reappears in the nightmare story."
        domains: ["nlp-selling", "storytelling", "vsl-structure"]
        source: "CVSL"
      - id: "HEUR-JB-079"
        title: "Tilde Key for AI Parsing"
        description: "Use the tilde/backtick character to separate multiple values in AI prompts (bonus names, prices, descriptions). AI parses tilde-separated values more reliably than commas or semicolons."
        domains: ["ai-copywriting", "prompt-engineering", "formatting"]
        source: "CVSL"
      - id: "HEUR-JB-080"
        title: "So Rather Than Formula"
        description: "Benefit blocks use the formula: 'So rather than [old painful way], you get to [new desirable way].' This contrast structure makes every benefit feel like relief from pain."
        domains: ["copywriting", "benefit-writing", "contrast-framing"]
        source: "CVSL"
      - id: "HEUR-JB-350"
        title: "6% Fitness = Exceptional"
        description: "1.2% cold = rich. PersonalDev can get 30%."
        domains: ["conversion-benchmarks"]
        source: "3XBONUS-100M"

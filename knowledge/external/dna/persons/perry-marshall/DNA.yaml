    theme: "evolution-2.0"

  - id: PHI-PM-304
    text: "Read something written before 1440 every day. Cicero, Moses, Plato, Virgil. One of the 12 Imperatives of Planet Perry."
    source: PM-SRC-004
    theme: "learning"

  - id: PHI-PM-305
    text: "Marketers are more cynical than scientists. Nobody is LESS likely to buy into some politician's juicy promise of a New Utopia than a marketer."
    source: PM-SRC-004
    theme: "contrarian"

  - id: PHI-PM-306
    text: "The right USP should make you feel sick to your stomach. If it doesn't scare you, it's not bold enough."
    source: PM-SRC-004
    theme: "usp"

bonus_mental_models:
  - id: MM-PM-300
    name: "Head Logic vs Heart Logic"
    description: "Head Logic: Bad thing → condition → pain (Wall Street Journal). Heart Logic: Person feeling pain ← condition ← bad thing (Huffington Post). 80% of people operate on Heart Logic. Run business on Head, sell on Heart."
    source: PM-SRC-004

  - id: MM-PM-301
    name: "Six Words of Giftedness"
    description: "Distill unique abilities to ~6 words via survey. Perry's: Writing, Teaching, Inventing, Deconstructing, Evangelizing, Encouraging. Any project must involve at least 3."
    source: PM-SRC-004

  - id: MM-PM-302
    name: "Jazz Improvisation = Business"
    description: "Jazz requires knowing scales AND improvising. Musicians who learn business scales can improvise where others freeze."
    source: PM-SRC-004

  - id: MM-PM-303
    name: "Friday Afternoon Possibility Work"
    description: "Drucker: Don't solve problems — get rid of them. Friday PM exclusively for dream prospects, recovered deals, new opportunities."
    source: PM-SRC-004

  - id: MM-PM-304
    name: "The Vivian Principle (Cosmic Confirmation)"
    description: "When working on something truly meaningful AND aligned with purpose, confirmation arrives from unexpected sources."
    source: PM-SRC-004

  - id: MM-PM-305
    name: "Subversion from Big 5 Dependency"
    description: "Email is the only medium where no corporate entity can throw the OFF switch. Most marketers get 50-90% from ONE source that can kill them."
    source: PM-SRC-004

bonus_heuristics:
  - id: HEUR-PM-300
    text: "When a CEO pays $5000/day, he takes notes. Charge high for respect, not greed."
    source: PM-SRC-004

  - id: HEUR-PM-301
    text: "Immerse in live community 3-6X per year. If event is free, bar is too low. Be the dumbest guy in the room."
    source: PM-SRC-004

  - id: HEUR-PM-302
    text: "Email click costs $4 vs $40 on Facebook, and the person trusts you 10X more."
    source: PM-SRC-004

  - id: HEUR-PM-303
    text: "Bold guarantee cost $1,500/year in payouts (3 claims) but doubled sales. The right USP should make you sick."
    source: PM-SRC-004

  - id: HEUR-PM-304
    text: "80% of problems come from 20% of customers. Fire them. Call them and say go buy from my competitor."
    source: PM-SRC-004

  - id: HEUR-PM-305
    text: "Sleep with phone in next room. Start day with shower, tea, notebook. Zero screen time before morning centering."
    source: PM-SRC-004

  - id: HEUR-PM-306
    text: "Facebook Score <7 on 1-10 scale = don't bother with social media for your business."
    source: PM-SRC-004

bonus_frameworks:
  - id: FW-PM-300
    name: "12 Imperatives of Planet Perry"
    steps: ["Immerse in LIVE community 3-6X/year", "Start your day right (The Regimen)", "Live and Tell an Epic Story (Reluctant Hero)", "Read something Pre-Gutenberg daily", "Additional imperatives in full 48-page document"]
    source: PM-SRC-004

  - id: FW-PM-301
    name: "Self-Inventory → Market Value → Giftedness Niche Selection"
    steps: ["Brain-dump 50+ things", "Sift for threads → niches", "Email 7-12 friends for giftedness feedback", "Distill to ~6 giftedness words", "Assign market value via keyword tool", "Find intersection of giftedness + market demand"]
    source: PM-SRC-004

  - id: FW-PM-302
    name: "Cold Email List Warmup via Personal Video"
    steps: ["Create landing page: tell me about your thing", "Prospect fills Typeform quiz", "Record personalized Loom video for each", "Build deep 1:1 relationship first", "Convert warm relationships to high-ticket"]
    source: PM-SRC-004

  - id: FW-PM-303
    name: "Problem-Agitate-Solve Autoresponder Sequence"
    steps: ["Website purpose = get email before they leave", "Sequence length = buying cycle length", "80% content / 20% pitch ratio", "Stories about pain or escaping pain", "Reinforce with phone, webinar, snail mail"]
    source: PM-SRC-004

  - id: FW-PM-304
    name: "Conservative Industry Penetration via Ironclad Guarantee"
    steps: ["Identify most risk-averse industry", "Create guarantee that takes ALL risk off customer", "Include competitor replacement if you fail", "Budget payouts as marketing expense", "Example: $160K/year cost → 90% market share in 10 years"]

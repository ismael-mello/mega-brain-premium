# DNA COGNITIVO — Perry Marshall
# Version: 1.0.0
# Created: 2026-04-05
# Total Elements: 314
# Sources: 3 programs (80/20 Masterclass, Google Ads Mastery, New Renaissance Club)

# ═══════════════════════════════════════════════════════════════════════
# LAYER 1: PHILOSOPHIES (84 elements)
# Core beliefs, worldview, fundamental truths
# ═══════════════════════════════════════════════════════════════════════

philosophies:

  # --- 80/20 MASTERCLASS (PHI-PM-001 to PHI-PM-028) ---

  - id: PHI-PM-001
    text: "80/20 actually delivers what all those get-rich guys are promising. It actually works. It's the one thing you can rely on to always work."
    source: PM-SRC-001
    theme: "80/20-core"

  - id: PHI-PM-002
    text: "The problem with selling something that nobody wants is it trains you to think that nobody wanting anything is normal."
    source: PM-SRC-001
    theme: "market-selection"

  - id: PHI-PM-003
    text: "You should quit anything that doesn't work as fast as you can. Not quitting is not a virtue."
    source: PM-SRC-001
    theme: "subtraction"

  - id: PHI-PM-004
    text: "Most companies, most industries have gaping holes in their buckets and the water is just pouring through. They are anything but optimized."
    source: PM-SRC-001
    theme: "opportunity"

  - id: PHI-PM-005
    text: "The reason people wear suits and ties and have degrees is to hide the fact that they don't know what they're doing."
    source: PM-SRC-001
    theme: "contrarian"

  - id: PHI-PM-006
    text: "Bureaucracy is civilization's answer to the 80/20 rule. Thousands of people do what appears to be work and don't really produce a whole lot."
    source: PM-SRC-001
    theme: "80/20-core"

  - id: PHI-PM-007
    text: "The bigger anything you do gets, the more inefficient it's going to try to be. Solving problems by adding things eventually becomes counterproductive."
    source: PM-SRC-001
    theme: "subtraction"

  - id: PHI-PM-008
    text: "For most people 80/20 is working against them. They are on the wrong side of it. The easiest way to get ahead is to apply it."
    source: PM-SRC-001
    theme: "80/20-core"

  - id: PHI-PM-009
    text: "Marketing is first and foremost an elimination process, not a convincing people process."
    source: PM-SRC-001
    theme: "marketing-philosophy"

  - id: PHI-PM-010
    text: "You can't say yes until you've said no. You have to have space or you can't say yes."
    source: PM-SRC-001
    theme: "subtraction"

  - id: PHI-PM-011
    text: "It's okay to do nothing. It's okay to sit and think. A lot of people are so trained to look busy."
    source: PM-SRC-001
    theme: "productivity"

  - id: PHI-PM-012
    text: "Selling to the right person is more important than all the sales methods, copywriting techniques, and negotiation tactics in the world."
    source: PM-SRC-001
    theme: "selling"

  - id: PHI-PM-013
    text: "Money escapes from the needy. Money goes where it isn't needed."
    source: PM-SRC-001
    theme: "deal-flow"

  - id: PHI-PM-014
    text: "The bell curve is the wrong curve. It doesn't tell you what you really need to know."
    source: PM-SRC-001
    theme: "80/20-math"

  - id: PHI-PM-015
    text: "80/20 is fractal. It's the same pattern whether you're looking at 6 or 6 million. It is the most common denominator in your entire life."
    source: PM-SRC-001
    theme: "80/20-core"

  - id: PHI-PM-016
    text: "School wants a well-rounded student. As an entrepreneur I'm looking for an eccentric person who's incredibly good at one thing."
    source: PM-SRC-001
    theme: "unique-capability"

  - id: PHI-PM-017
    text: "Never develop an expensive complex product until at least one client makes a cash deposit today."
    source: PM-SRC-001
    theme: "validation"

  - id: PHI-PM-018
    text: "If they train you to sell until you get seven nos, just assume nobody wants it and go sell something else."
    source: PM-SRC-001
    theme: "contrarian"

  - id: PHI-PM-019
    text: "When a CEO pays you $5,000 a day, when you sit down and tell him what's wrong, he takes notes."
    source: PM-SRC-001
    theme: "consulting"

  - id: PHI-PM-020
    text: "What you sell is money at a discount."
    source: PM-SRC-001
    theme: "value-proposition"

  - id: PHI-PM-021
    text: "Nobody goes to a guru at the bottom of the mountain. Nobody gets a cold call from a cardiologist."
    source: PM-SRC-001
    theme: "positioning"

  - id: PHI-PM-022
    text: "Don't count other people's money."
    source: PM-SRC-001
    theme: "abundance"

  - id: PHI-PM-023
    text: "5% of my business produces two-thirds of the money. And it's usually the stuff you're bored with."
    source: PM-SRC-001
    theme: "80/20-core"

  - id: PHI-PM-024
    text: "Friends come and go but enemies accumulate. Never burn a bridge."
    source: PM-SRC-001
    theme: "relationships"

  - id: PHI-PM-025
    text: "If you add fuel to the fire of what you're good at, you will get exponentially better — like a tree growing over 30 years."
    source: PM-SRC-001
    theme: "unique-capability"

  - id: PHI-PM-026
    text: "B players attract C players. C players repel A players. Then you've only got B players. Then C players."
    source: PM-SRC-001
    theme: "hiring"

  - id: PHI-PM-027
    text: "It takes two years for people in an industry to figure out who you are and what you do."
    source: PM-SRC-001
    theme: "positioning"

  - id: PHI-PM-028
    text: "No client is going to use 100% of what you give them. If they use the most valuable 5%, that's where your bragging rights come from."
    source: PM-SRC-001
    theme: "consulting"

  # --- GOOGLE ADS MASTERY (PHI-PM-100 to PHI-PM-122) ---

  - id: PHI-PM-100
    text: "Google is THE benchmark for advertisers worldwide. From the standpoint of ordinary people getting things done, Google is the most trusted institution on the planet."
    source: PM-SRC-002
    theme: "google-ads"

  - id: PHI-PM-101
    text: "People who test, fly. People who rely on brute force, die."
    source: PM-SRC-002
    theme: "testing"

  - id: PHI-PM-102
    text: "Advertising is selling in print. The words in your Google ads are the same words you use sitting across from a prospect."
    source: PM-SRC-002
    theme: "copywriting"

  - id: PHI-PM-103
    text: "We don't want more traffic. You want more QUALITY traffic. More of the right people."
    source: PM-SRC-002
    theme: "traffic"

  - id: PHI-PM-104
    text: "Impressions is a vanity metric. Who cares if 19 million were shown to the wrong people."
    source: PM-SRC-002
    theme: "metrics"

  - id: PHI-PM-105
    text: "Google Ads are the language of the street, not the ivory tower."
    source: PM-SRC-002
    theme: "copywriting"

  - id: PHI-PM-107
    text: "Smart people with smart machines will beat the machine alone. A human with a machine will beat the machine."
    source: PM-SRC-002
    theme: "ai-automation"

  - id: PHI-PM-108
    text: "The worst thing you can do is automate something you don't understand and hand the keys to a black box."
    source: PM-SRC-002
    theme: "ai-automation"

  - id: PHI-PM-109
    text: "80 percent of what you get comes from 20 percent of what you do. Small effort, big reward."
    source: PM-SRC-002
    theme: "80/20-core"

  - id: PHI-PM-110
    text: "Deep 80/20 is literally one of the top ten most powerful marketing skills. Far less than 1 percent of marketers understand it."
    source: PM-SRC-002
    theme: "80/20-core"

  - id: PHI-PM-111
    text: "A USP is worthless if it doesn't convince people to buy. USP is the knife-edge of your chisel."
    source: PM-SRC-002
    theme: "usp"

  - id: PHI-PM-112
    text: "In advertising, an academic education is more of a liability than an asset."
    source: PM-SRC-002
    theme: "contrarian"

  - id: PHI-PM-113
    text: "Building a business online is not a crapshoot. It's a science."
    source: PM-SRC-002
    theme: "methodology"

  - id: PHI-PM-114
    text: "The search engine is the motor. Your website is the glider. When you feed traffic to a website that can fly, you have a business."
    source: PM-SRC-002
    theme: "traffic"

  - id: PHI-PM-115
    text: "Your job in a world of AI is to know the target. The machine is getting very good at hitting it."
    source: PM-SRC-002
    theme: "ai-automation"

  - id: PHI-PM-116
    text: "Automate the crap out of as much as we can. Not to reduce headcount, but to improve results."
    source: PM-SRC-002
    theme: "ai-automation"

  - id: PHI-PM-120
    text: "When it comes to Display, you're going to do a lot of failing because that is the surest path to success."
    source: PM-SRC-002
    theme: "testing"

  - id: PHI-PM-121
    text: "If search is a game of checkers, display is a game of chess."
    source: PM-SRC-002
    theme: "google-ads"

  - id: PHI-PM-122
    text: "Never let Google optimize your campaigns for you. Google may have built the greatest piano but that doesn't mean it knows how to play it."
    source: PM-SRC-002
    theme: "google-ads"

  # --- NEW RENAISSANCE CLUB (PHI-PM-200 to PHI-PM-232) ---

  - id: PHI-PM-200
    text: "We are at the beginning of a second Renaissance. When a paradigm shifts, all the clocks reset to zero and the old rules go away."
    source: PM-SRC-003
    theme: "renaissance"

  - id: PHI-PM-201
    text: "Incessant activity is not the answer. Inspiration never comes when your fists are clenched."
    source: PM-SRC-003
    theme: "productivity"

  - id: PHI-PM-202
    text: "Business is not built on guilt. Business is not built on self-condemnation."
    source: PM-SRC-003
    theme: "mindset"

  - id: PHI-PM-204
    text: "50% of what you made last week came from 1% of what you did."
    source: PM-SRC-003
    theme: "80/20-core"

  - id: PHI-PM-205
    text: "Renaissance entrepreneurs don't want to just sip a Mai Tai on the beach. They want their play to be as energetic as their work."
    source: PM-SRC-003
    theme: "renaissance"

  - id: PHI-PM-206
    text: "You are the lever that splits time in half — before and after you showed up."
    source: PM-SRC-003
    theme: "positioning"

  - id: PHI-PM-210
    text: "The biggest problem in the 21st century is not being able to manage abundance."
    source: PM-SRC-003
    theme: "productivity"

  - id: PHI-PM-211
    text: "Civilization itself is all about rising above the lizard brain and building something valuable."
    source: PM-SRC-003
    theme: "mindset"

  - id: PHI-PM-212
    text: "Your business needs to be furthering purposes greater than you. That makes it easy to ignore time-wasters."
    source: PM-SRC-003
    theme: "purpose"

  - id: PHI-PM-213
    text: "You should feel guilty for NOT outsourcing, because you need to be in your ability zone."
    source: PM-SRC-003
    theme: "outsourcing"

  - id: PHI-PM-214
    text: "Accept how you are made and don't try to live someone else's life."
    source: PM-SRC-003
    theme: "unique-capability"

  - id: PHI-PM-215
    text: "Whatever you got in trouble for as a child, you did out of strength. It was unwieldy, out-of-control strength."
    source: PM-SRC-003
    theme: "unique-capability"

  - id: PHI-PM-216
    text: "What pushes you forward, holds you back. Push motivation shuts off your best natural inner resources."
    source: PM-SRC-003
    theme: "motivation"

  - id: PHI-PM-217
    text: "If you are operating by push motivation, you are physically incapable of doing $10,000/hour work."
    source: PM-SRC-003
    theme: "motivation"

  - id: PHI-PM-218
    text: "What you resist, persists. The truths you try to pretend aren't there will fight against you."
    source: PM-SRC-003
    theme: "mindset"

  - id: PHI-PM-219
    text: "People overestimate what they can accomplish in one year. They greatly underestimate five years."
    source: PM-SRC-003
    theme: "vision"

  - id: PHI-PM-220
    text: "Management is doing things right. Leadership is doing RIGHT things."
    source: PM-SRC-003
    theme: "leadership"

  - id: PHI-PM-221
    text: "Ideas are worth nothing unless executed. They are just a multiplier. Execution is worth millions."
    source: PM-SRC-003
    theme: "execution"

  - id: PHI-PM-223
    text: "Every time I start $10,000/hour work, my procrastination demons go haywire. That's how I know it's important."
    source: PM-SRC-003
    theme: "productivity"

  - id: PHI-PM-224
    text: "Customers can't tell you what they want. They can tell you what pain they're experiencing."
    source: PM-SRC-003
    theme: "market-research"

  - id: PHI-PM-225
    text: "The greatest 80/20 leverage is your own Gifts, Passions, Values, and Acquired Skills."
    source: PM-SRC-003
    theme: "unique-capability"

  - id: PHI-PM-227
    text: "I provoke and stir people to action through the power of the written word."
    source: PM-SRC-003
    theme: "personal-usp"

  - id: PHI-PM-228
    text: "The greatest thing about being an entrepreneur is arranging your life so you're in four, five, six talent zones at the same time."
    source: PM-SRC-003
    theme: "unique-capability"

  - id: PHI-PM-229
    text: "Everything you do in business flows from your Natural Unique Selling Proposition."
    source: PM-SRC-003
    theme: "usp"

  - id: PHI-PM-230
    text: "Whatever gets under your skin — that's your holy discontent. Don't medicate yourself with a movie. Take action."
    source: PM-SRC-003
    theme: "purpose"

  - id: PHI-PM-231
    text: "Entrepreneurs are what sets people free and creates the wealth that makes everything go around."
    source: PM-SRC-003
    theme: "purpose"

  - id: PHI-PM-232
    text: "My business has to work. It deserves to prosper. It's too important not to prosper."
    source: PM-SRC-003
    theme: "mindset"

# ═══════════════════════════════════════════════════════════════════════
# LAYER 2: MENTAL MODELS (59 elements)
# Thinking frameworks, analogies, ways of seeing
# ═══════════════════════════════════════════════════════════════════════

mental_models:

  # --- 80/20 MASTERCLASS ---

  - id: MM-PM-001
    name: "Rack the Shotgun"
    description: "Send a signal into the market and see who responds. Don't sell to everyone — identify who self-selects."
    source: PM-SRC-001

  - id: MM-PM-002
    name: "The 20/120 Rule"
    description: "20% of what you do produces 120% of profits. 60% breaks even. 20% loses money."
    source: PM-SRC-001

  - id: MM-PM-003
    name: "Fractal 80/20"
    description: "80/20 applies at every level — whole business, single project, an afternoon. You can fold it infinitely."
    source: PM-SRC-001

  - id: MM-PM-004
    name: "Complexity Tax"
    description: "As systems grow, they naturally become more inefficient. Subtraction is the antidote."
    source: PM-SRC-001

  - id: MM-PM-005
    name: "Desert Mirage"
    description: "The sexy prospect without money who won't buy. Your ego is invested. Filter them out or die of thirst."
    source: PM-SRC-001

  - id: MM-PM-006
    name: "The Espresso Machine"
    description: "20% will spend 4X more, and 20% of those 4X more again. Engineer upsells for the 1%."
    source: PM-SRC-001

  - id: MM-PM-007
    name: "Power Laws vs Bell Curves"
    description: "Statistics teaches bell curves. Business runs on power laws. If you can multiply and divide by 10, you can do power laws."
    source: PM-SRC-001

  - id: MM-PM-008
    name: "The Marketing DNA Box"
    description: "8 dimensions: Alchemist/Producer, Live/Recorded, Images/Words, Empathy/Analytics. Creates unique marketing vector."
    source: PM-SRC-001

  - id: MM-PM-009
    name: "Deal Flow vs Need"
    description: "When you have more deal flow than you can service, it changes posture, psychology, and atmosphere."
    source: PM-SRC-001

  - id: MM-PM-010
    name: "Sunk Cost Trap"
    description: "The biggest enemy of subtraction. Cancel projects that deep down you know are doomed."
    source: PM-SRC-001

  - id: MM-PM-013
    name: "RFM as Universal Predictor"
    description: "Recency-Frequency-Money applies to everything: email opens, purchases, even phone autocomplete."
    source: PM-SRC-001

  - id: MM-PM-014
    name: "Market Saturation Power Law"
    description: "Selling to any fixed population follows 80/20 saturation. Counteract with finer segmentation."
    source: PM-SRC-001

  - id: MM-PM-015
    name: "Martini Glass Principle"
    description: "2X bid = 4X traffic = 8X budget. Easier to fill 5 small martini glasses than 1 large one."
    source: PM-SRC-001

  - id: MM-PM-017
    name: "Audition vs Interview"
    description: "Don't hire based on what people say. Give a small paid project and see what they actually deliver."
    source: PM-SRC-001

  - id: MM-PM-018
    name: "Magic Gumball Machine"
    description: "How much would you put in a machine that spit out clients? Frames CAC as investment, not expense."
    source: PM-SRC-001

  - id: MM-PM-019
    name: "Rat-Dog-Panda-Bear-Elephant"
    description: "Power laws visualized: 1kg to 10,000kg. Each power of 10. Markets and customers distribute this way."
    source: PM-SRC-001

  - id: MM-PM-020
    name: "Hostage Negotiator vs Copywriter"
    description: "Two DNA archetypes. One thrives under live pressure, the other retreats to write. Neither should try to be the other."
    source: PM-SRC-001

  # --- GOOGLE ADS MASTERY ---

  - id: MM-PM-100
    name: "The Profit Curve"
    description: "X=CPA target, Y=profit. Maximum profit is NOT at lowest CPA. Sometimes raising CPA target increases total profit via volume."
    source: PM-SRC-002

  - id: MM-PM-101
    name: "The Centaur Model"
    description: "Human + machine beats machine alone. Smart human judgment + machine learning = optimal Google Ads results."
    source: PM-SRC-002

  - id: MM-PM-102
    name: "ABCs of Optimization"
    description: "A = Ads (test copy), B = Bids (adjust based on results), C = Keywords (add/remove). Simplifies everything."
    source: PM-SRC-002

  - id: MM-PM-104
    name: "Bullseye Targeting Strategy"
    description: "Start from center (remarketing) and work outward. Only after exhausting inner rings move to outer."
    source: PM-SRC-002

  - id: MM-PM-105
    name: "Deep 80/20 (Fractal)"
    description: "4% of customers create 64% of income. 0.8% deliver 52%. Every metric obeys 80/20."
    source: PM-SRC-002

  - id: MM-PM-106
    name: "Wright Brothers vs Langley"
    description: "Make the glider (website/offer) work FIRST, then add the engine (traffic)."
    source: PM-SRC-002

  - id: MM-PM-107
    name: "Negative Keywords as CTR Multiplier"
    description: "Reducing impressions via negatives can nearly double CTR, triggering Google discounts."
    source: PM-SRC-002

  - id: MM-PM-109
    name: "Quality Score as Automated Opinion"
    description: "Google's automated opinion of performance. Relative to competitors. Higher QS = lower CPC."
    source: PM-SRC-002

  - id: MM-PM-110
    name: "70-20-10 Budget Allocation"
    description: "70% on proven campaigns. 20% experimental. 10% crazy ideas."
    source: PM-SRC-002

  - id: MM-PM-113
    name: "Goldilocks Theory of Ads"
    description: "Relevant and clear beats clever and shocking. In-your-face ad got 0.3% CTR vs straightforward at 1.0%."
    source: PM-SRC-002

  - id: MM-PM-114
    name: "Benefits First, Features Second"
    description: "Switching order produced 3,600% improvement in CTR."
    source: PM-SRC-002

  - id: MM-PM-115
    name: "Ad Scent"
    description: "Landing page must continue the scent from the ad. Matching language, common elements."
    source: PM-SRC-002

  - id: MM-PM-116
    name: "Interruption vs Intent"
    description: "Search = intent. Display/YouTube = interruption. Different approaches needed."
    source: PM-SRC-002

  - id: MM-PM-117
    name: "ABCD Video Story Arc"
    description: "Attract (5 sec), Brand (early), Connect (benefits), Direct (CTA)."
    source: PM-SRC-002

  - id: MM-PM-118
    name: "The Toddler AI Model"
    description: "AI is like a toddler: amazing AND silly. Needs supervision but don't abandon after one bad result."
    source: PM-SRC-002

  # --- NEW RENAISSANCE CLUB ---

  - id: MM-PM-200
    name: "Marketing DNA Test"
    description: "Personality assessment determining how you sell and solve problems."
    source: PM-SRC-003

  - id: MM-PM-201
    name: "New Renaissance Business Model"
    description: "Hit numbers monthly, top 5% in market, waiting list, delete problem clients without remorse."
    source: PM-SRC-003

  - id: MM-PM-202
    name: "Star Principle"
    description: "Be #1 in a growing niche. Almost impossible to make money as #4."
    source: PM-SRC-003

  - id: MM-PM-203
    name: "Simplification as Competitive Advantage"
    description: "When you dramatically simplify life for your customer, you don't have competition."
    source: PM-SRC-003

  - id: MM-PM-206
    name: "Fasting as Productivity Control"
    description: "Fasting from food, internet, email, work — soul over lizard brain. You get control back."
    source: PM-SRC-003

  - id: MM-PM-207
    name: "Five Kinds of Work"
    description: "$10,000/hr, $1,000/hr, $100/hr, $10/hr, and negative $1,000,000/hr work."
    source: PM-SRC-003

  - id: MM-PM-208
    name: "Plow Horse vs Thoroughbred"
    description: "Plow horses work 14 hours steady. Thoroughbreds run hard then rest. Know which one you are."
    source: PM-SRC-003

  - id: MM-PM-209
    name: "Unique Capability Stack (80/20^N)"
    description: "Combining 3-5 unique gifts = 80/20 to the power of N leverage. Tom Hoobyar: 80/20^6 = 4000:1."
    source: PM-SRC-003

  - id: MM-PM-210
    name: "Kolbe Action Modes"
    description: "Fact Finder, Follow Through, Quick Start, Implementor. Difference between 9 and 10 is 10x."
    source: PM-SRC-003

  - id: MM-PM-211
    name: "Push vs Pull Motivation"
    description: "Push = running from tiger (decreases). Pull = running toward outcome (increases). Only pull enables $10K/hr work."
    source: PM-SRC-003

  - id: MM-PM-212
    name: "Values-Mission-Vision-Goals Hierarchy"
    description: "Each level serves the one above. Values are private truth, not what sounds good."
    source: PM-SRC-003

  - id: MM-PM-214
    name: "Single Workflow vs Mass Production"
    description: "Complete one project fully (month 4 to market) instead of all simultaneously (month 10 to market)."
    source: PM-SRC-003

  - id: MM-PM-215
    name: "Ideas x Execution Multiplier"
    description: "Average idea x brilliant execution >> brilliant idea x weak execution."
    source: PM-SRC-003

  - id: MM-PM-216
    name: "Build-Measure-Learn Loop"
    description: "Build MVP → measure response → learn → iterate. Speed of iteration = probability of success."
    source: PM-SRC-003

  - id: MM-PM-218
    name: "Resistance as Compass"
    description: "When procrastination hits hardest, that's your compass pointing to $10,000/hour work."
    source: PM-SRC-003

  - id: MM-PM-219
    name: "Holy Discontent"
    description: "The thing that bothers you is wired into you. Make it part of your life, always chipping away."
    source: PM-SRC-003

# ═══════════════════════════════════════════════════════════════════════
# LAYER 3: HEURISTICS (107 elements)
# Rules of thumb, numbers, thresholds
# ═══════════════════════════════════════════════════════════════════════

heuristics:

  # --- 80/20 MASTERCLASS (HEUR-PM-001 to HEUR-PM-035) ---

  - id: HEUR-PM-001
    text: "Raise your prices 10%. Easiest way to make anybody more money."
    source: PM-SRC-001
  - id: HEUR-PM-002
    text: "20% of what you do produces 120% of profits. 60% breaks even. 20% loses 20%."
    source: PM-SRC-001
  - id: HEUR-PM-005
    text: "Shave 5% once. Then shave 1% fifteen times. Don't amputate — use a scalpel."
    source: PM-SRC-001
  - id: HEUR-PM-007
    text: "Subtract 3% of employees, customers, services, products, vendors, bills. Subtract 20% of ad targets."
    source: PM-SRC-001
  - id: HEUR-PM-008
    text: "Don't read any book unless people are still talking about it 5 years later."
    source: PM-SRC-001
  - id: HEUR-PM-009
    text: "Subtract 30% of gurus and consultants you follow. A third send you on rabbit trails."
    source: PM-SRC-001
  - id: HEUR-PM-010
    text: "80/20 curve predictions are accurate to plus or minus 10-20% all the way across."
    source: PM-SRC-001
  - id: HEUR-PM-012

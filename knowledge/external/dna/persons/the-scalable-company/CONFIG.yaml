# Sintese narrativa
sintese_narrativa: |
  Ryan Deiss e fundador do The Scalable Company e DigitalMarketer.
  Desenvolveu o ScalableOS - um sistema operacional para empresas escalarem
  sem depender exclusivamente do fundador.

  FILOSOFIA CORE: Sistemas bem documentados permitem escalar com previsibilidade.
  Manual > Automated para scorecards. Clareza > Complexidade.

  FRAMEWORKS SIGNATURE:
  - ScalableOS (Build → Install → Optimize)
  - Value Engine Mapping (Growth, Fulfillment, Innovation)
  - Clarity Compass (3-Year Target, Purpose, Anchors, Values)
  - 12Q Planning Grid (3 years = 12 quarterly sprints)
  - QSP Meeting (5-Step Quarterly Sprint Planning)
  - High Output Team Canvas
  - CABs (Critical Accountability Bullets)
  - Traffic Light Leadership (Red → Yellow → Green)
  - 3D Playbook Process (Define → Design → Deploy)
  - Power Stages Identification

  METRICAS DE REFERENCIA:
  - 2-3 power stages por value engine
  - 3-5 metricas por time (maximo)
  - 90-day sprints (nao annual planning)
  - 9/10 vezes criador esquece passos do proprio checklist
  - 30-45 min para recuperar de interrupcao
  - 12 semanas minimo para definir targets precisos


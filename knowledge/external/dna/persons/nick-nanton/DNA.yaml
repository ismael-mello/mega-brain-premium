# ═══════════════════════════════════════════════════════════════
# L1: FILOSOFIAS (Core Beliefs & Worldview)
# Total: 52 elements (FIL-NN-001 to FIL-NN-052)
# ═══════════════════════════════════════════════════════════════
L1_FILOSOFIAS:
    - id: "FIL-NN-001"
      title: "People Buy People, Not Products"
      content: >
        People buy people. They don't buy your products or services. They buy you
        as a person. Once they get to know you, like you, trust you, then they do
        business with you. This is the fundamental philosophy behind everything.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "FIL-NN-002"
      title: "Brand Is Your Story, Branding Is Storytelling"
      content: >
        Your brand is really just your story. Branding is storytelling. Everything
        revolves around stories. The way people connect with you, remember you, and
        trust you is through the stories you tell about who you are, what you do,
        and why you do it.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "FIL-NN-003"
      title: "You Get Paid for Who You Are, Not What You Do"
      content: >
        As a celebrity expert, you get paid for who you are, not just what you do.
        The market pays a premium for the person, the brand, the trust. The commodity
        is what you do; the premium is who you are.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FIL-NN-004"
      title: "Stories Trigger Oxytocin - The Trust Chemical"
      content: >
        When someone hears a story, there's a chemical release in their brain called
        oxytocin. Oxytocin is literally kind of like this love chemical, and it builds
        trust. When you tell a good story, there's a chemical emitted in someone's
        brain that actually builds trust.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "FIL-NN-005"
      title: "Marketing Is the Business Everyone Is Really In"
      content: >
        Marketing is the business that you're really in. No matter what your widget is,
        no matter what your service is, you are in the marketing business first. If you
        can't market it, you can't sell it. If you can't sell it, nothing else matters.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FIL-NN-006"
      title: "Can't Save Souls in an Empty Church"
      content: >
        You can't save souls in an empty church. Reference to David Ogilvy's philosophy
        that you must first get people's attention and bring them in before you can serve
        them. Applies directly to marketing - you need eyeballs before you can help anyone.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FIL-NN-007"
      title: "Strength at Which You Repel Equals Strength at Which You Attract"
      content: >
        The strength at which you repel is the same strength at which you attract. If
        you try to be for everyone, you're for no one. The more polarizing and specific
        your position, the more magnetically you attract your ideal clients. You must be
        willing to lose some to gain the right ones.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-008"
      title: "Celebrity Expert Commands Premium Pricing"
      content: >
        A celebrity expert by definition commands premium pricing. When you combine
        celebrity status with genuine expertise, you create an apex position where
        people pay more not because your service is different, but because YOU are
        delivering it. The who elevates the what.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FIL-NN-009"
      title: "Most People Buy on Emotions, From People They Like"
      content: >
        Most people buy on emotions, from people they like. Logic justifies the
        purchase after the emotional decision. This is why personal branding is more
        powerful than product branding - the emotional connection to a person is
        stronger than to a product.
      domain: sales-psychology
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FIL-NN-010"
      title: "Silly on Top of Silly Is Just More Silly"
      content: >
        You need to match your branding to your profession. A brain surgeon doing
        wacky marketing is silly on top of silly. But a comedian being wacky makes
        sense. Context matters - your brand must have congruence with your profession
        and the trust level required.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-011"
      title: "Four Freedoms of Entrepreneurship"
      content: >
        Dan Sullivan's four freedoms that entrepreneurs are really after: freedom of
        time, freedom of money, freedom of relationships, and freedom of place.
        Celebrity branding allows you to have those on whatever level you desire.
        It's more like autonomy than freedom.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-012"
      title: "Stories Appeal to the Left Brain, Not Just the Right"
      content: >
        Most people think stories appeal to the right side of the brain (creative),
        but actually stories appeal to the left side of the brain because a story
        is what helps people make sense of facts. Stories are how we organize and
        process factual information.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "FIL-NN-013"
      title: "Personal Brand Transcends Any Single Business"
      content: >
        When you build your personal brand, if your market changes or your business
        goes down, you can take your community wherever you want to go. You can take
        them to different industries. Donald Trump built the Trump brand, not a
        skyscraper rehab company - and could go into golf, residential, anything.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-014"
      title: "Brand Yourself AND Build Systems - Not One or the Other"
      content: >
        It's not a question of branding yourself versus branding a product. Brand
        yourself because that's what people buy into. But sell the business on its
        systems. Systems of lead generation, conversion, and customer care make the
        business saleable. Brand + systems = legacy.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-015"
      title: "Hours for Dollars Is the Enemy of Scale"
      content: >
        When you're working hours for dollars, you need to fix that or else nothing
        is scalable and ultimately nothing is saleable. Removing the hours-for-dollars
        equation is the most important concept for building legacy dollars.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-016"
      title: "Perception Is Reality in Branding"
      content: >
        What you do is not as important as how you are perceived by your marketplace.
        Perception is reality. If the marketplace perceives you as the expert, the
        celebrity, the go-to person, then you are. Branding is fundamentally about
        managing perception.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FIL-NN-017"
      title: "Implementation Over Consumption"
      content: >
        You may not implement all 100 things we talk about today but if you implement
        1, 2, 3, 4, 5, 6 you will see a huge shift in your business. This is a
        blueprint - don't watch passively. Implementation of a few things beats
        passive consumption of everything.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FIL-NN-018"
      title: "Every Business Can Be Celebrity Branded"
      content: >
        Any business can do this. From dentists to financial advisors to chiropractors
        to coaches. The principles of celebrity branding are universal because they're
        about human psychology, not about a specific industry.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-019"
      title: "Storytelling Is the Secret Weapon"
      content: >
        Erin Huffington herself said storytelling is the secret weapon of the 2012 race.
        Stories are the one way to break through in the attention age. The bombardment
        of information means the only way to connect is through narrative. Story selling
        is a high level strategy that delivers high level results.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-020"
      title: "The Power of Emotion Over Logic in Decision-Making"
      content: >
        Decisions are made emotionally first, then justified logically. Antonio Damasio's
        research shows people with brain damage to emotional centers cannot make decisions
        at all, even logical ones. Emotion is not the enemy of logic; it's the prerequisite.
      domain: sales-psychology
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-021"
      title: "Documentary Film Is the Ultimate Story Selling Vehicle"
      content: >
        Documentary filmmaking is the most powerful form of story selling because it
        combines all elements: visual, emotional, narrative, social proof, and third-party
        credibility. A 20-minute film about your story is worth more than any sales letter.
      domain: media-production
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-022"
      title: "Crazy Person in Straight World or Straight Person in Crazy World"
      content: >
        There are two types of positioning that work: be the crazy person in a straight
        world or the straight person in a crazy world. Either way, you stand out by
        contrast. You need to be different from your peers in a meaningful, memorable way.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-023"
      title: "Community Before Commerce"
      content: >
        If you spend the time pouring into people, building a community of people who
        want to follow you, you can take them wherever you want to go. Build the tribe
        first. The commerce follows the community, not the other way around.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-024"
      title: "Legend Status Is Above Celebrity"
      content: >
        The notch above celebrity is legend. Becoming a legend means getting other
        people to tell your story for you. Disney did this - every employee knows
        Walt's story. The legend is self-perpetuating because others carry the narrative.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-025"
      title: "Unique Ability as Life's Purpose"
      content: >
        Dan Sullivan's unique ability concept: that one thing where if you woke up every
        day, you'd be super excited to do it, you'd go to bed late to do it more, you were
        motivated and driven by it, and the more you did the better you'd get and the
        happier you'd be and the more you'd get paid. Find that and build around it.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-026"
      title: "Third-Party Validation Trumps Self-Promotion"
      content: >
        When someone else says you're great, it's 10 times more powerful than when you
        say it yourself. Third-party endorsement, media credibility, and social proof
        are the pillars of celebrity expert status. Books, TV, awards - all third-party.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-027"
      title: "The Attention Age Demands Stories"
      content: >
        We live in the attention age. Jack Trout talked about it in 1986 when there were
        only 3 channels. Now the bombardment is exponential. The one way to break through
        is to tell a story because you get people's attention when you tell a story rather
        than just talking at them.
      domain: marketing
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-028"
      title: "Everyone Has a Story Worth Telling"
      content: >
        Everyone has an origin story. Everyone has overcome something. The question is
        not whether you have a story, but whether you've taken the time to identify it,
        structure it, and tell it in a way that connects with your marketplace.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FIL-NN-029"
      title: "The Invisible Versus the Visible Expert"
      content: >
        If five dentists or five financial advisors stood in front of you, you couldn't
        tell the difference. Most professionals are invisible because they don't actively
        work on being visible. Celebrity branding makes the invisible expert visible.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "FIL-NN-030"
      title: "Systemize Everything Including Your Story"
      content: >
        Disney systemized everything from storytelling to the two-finger point to
        everything. If you can't create systems that someone else can follow, you're
        not going to be able to sell or scale your business. Systemize even the
        intangibles.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-031"
      title: "You Are Always On Stage"
      content: >
        Whether you realize it or not, you are always on stage. Every interaction,
        every social media post, every email is a branding moment. Your brand is not
        just what you do on purpose - it's everything you do, period.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-032"
      title: "Your Photo Is Your First Branding Opportunity"
      content: >
        Your photo is the first branding opportunity that most people miss. Most people
        use terrible photos. A professional photo that conveys your brand personality is
        one of the cheapest and most impactful branding investments you can make.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-033"
      title: "Mass Media Plus Direct Response Equals Celebrity Expert"
      content: >
        The formula for media success is mass media plus direct response marketing.
        Mass media gives credibility and reach. Direct response gives trackability
        and ROI. Combine them and you get celebrity expert marketing that both builds
        brand and drives revenue.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FIL-NN-034"
      title: "The Specialist Always Wins"
      content: >
        The biggest mistake most people make is becoming a generalist. A specialist
        always commands more respect, more referrals, and more money. The riches are
        in the niches. You have to pick a small section of the marketplace that you
        can afford to reach and dominate.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "FIL-NN-035"
      title: "Great Content Without Marketing Is Invisible"
      content: >
        In the music industry parallel: a musician creates 6 great songs, doesn't market
        them, comes back 6 months later with 6 more songs. Now he has 12 great songs but
        still no fans. Same in business - great service without marketing is invisible.
        You have to roll out.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FIL-NN-036"
      title: "Congruence Is King in Personal Branding"
      content: >
        Everything must be congruent - your story, your image, your marketing, your
        delivery. If your website says one thing but your in-person experience says
        another, you've broken the brand promise. Congruence builds trust; incongruence
        destroys it.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-037"
      title: "Story Selling Is More Powerful Than Hard Selling"
      content: >
        Story selling is about letting the story do the selling for you. Instead of
        feature-benefit-close, you tell a story that demonstrates transformation. The
        prospect sells themselves because they see themselves in the story. No objections
        because it was never a pitch.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-038"
      title: "People Support What They Help Create"
      content: >
        When people are part of creating something, they support it. This applies to
        your brand - involve your community, let them co-create. Collaborative books,
        community events, user-generated content all leverage this principle.
      domain: community-building
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FIL-NN-039"
      title: "This Is Not Where Learning Ends, This Is Where It Starts"
      content: >
        The concepts don't change - we just apply them in different ways. Becoming a
        celebrity expert is not a one-time event; it's a way of business and a way of
        life. It can provide you with a lifestyle that nothing else can.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-040"
      title: "Information Without Emotion Is Forgettable"
      content: >
        Facts and data alone are forgettable. When wrapped in a story with emotional
        resonance, those same facts become unforgettable. This is why case studies
        as stories outperform feature lists every time.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-041"
      title: "Your Mess Is Your Message"
      content: >
        The struggles you've overcome, the failures you've had, the mess you came
        from - that IS your message. Origin stories that include vulnerability and
        overcoming are the most powerful connection points with your audience.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FIL-NN-042"
      title: "Credibility Is Transferable"
      content: >
        When you collaborate with other celebrity experts or appear alongside credible
        figures, their credibility transfers to you. This is why collaborative books,
        joint ventures, and media appearances alongside known figures are so powerful.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-043"
      title: "Google Is Your Online First Impression"
      content: >
        What shows up when someone Googles you IS your brand online. If nothing shows
        up, you don't exist. If bad things show up, you have a problem. You need to
        control page one of your Google results because that is your online first
        impression.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "FIL-NN-044"
      title: "Build Relationships Not Just Transactions"
      content: >
        Newsletter is like having a cup of coffee with a friend. Build the relationship
        over time. Don't just sell - inform, entertain, connect. The transaction comes
        naturally from the relationship, not the other way around.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FIL-NN-045"
      title: "You Need to Be Hanging Out With Like-Minded People"
      content: >
        You need to be around people who are not telling you you're crazy. Your church,
        your family, your old friends may not understand your business ambitions. You
        need a mastermind of like-minded people who share and collaborate to grow.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-046"
      title: "The Best Marketing Is Invisible Marketing"
      content: >
        The best marketing doesn't feel like marketing. It feels like entertainment,
        education, or a story from a friend. Documentary films, story-based content,
        and value-first approaches all market without the audience feeling marketed to.
      domain: marketing
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-047"
      title: "Authority Stacking Creates Unassailable Position"
      content: >
        Each piece of credibility (book, TV, award, media mention) stacks on top of
        the others. A best-selling author who's also been on TV and won awards is
        exponentially more credible than someone with just one credential. Stack
        your authority.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FIL-NN-048"
      title: "Rome Was Not Built in a Day"
      content: >
        Neither Nick nor Greg looked like this 10 or 15 years ago. It took a lot of
        hard work, a lot of telling the story over and over. Celebrity branding is
        a journey, not an event. Start with one step and keep building.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FIL-NN-049"
      title: "Content Is the New Currency"
      content: >
        In the attention economy, content is currency. Books, videos, podcasts, articles,
        social media - all forms of content establish you as the expert. The more quality
        content you produce, the more currency you accumulate in your market.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FIL-NN-050"
      title: "Film Is the Most Powerful Storytelling Medium"
      content: >
        Nothing connects emotionally like film. A well-produced documentary film
        about your story or your client's transformation is worth more than any
        other marketing asset. That's why Emmy Award-winning filmmaking is central
        to our strategy.
      domain: media-production
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FIL-NN-051"
      title: "SEO Is Passive Celebrity Building"
      content: >
        Search engine optimization is like passive celebrity building. While you sleep,
        people find you, learn about you, and form opinions. Owning page one for your
        name and your niche keywords is foundational online celebrity.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "FIL-NN-052"
      title: "A Buyer Is a Buyer Is a Buyer"
      content: >
        Someone who has bought once is exponentially more likely to buy again. A buyer
        is a buyer is a buyer. This is why a hotline buyer list is the most valuable
        asset in direct marketing. Don't treat all leads equally - treat buyers as gold.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"


# Total: 32 elements (MM-NN-001 to MM-NN-032)
# ═══════════════════════════════════════════════════════════════
L2_MODELOS_MENTAIS:
    - id: "MM-NN-001"
      title: "Celebrity Expert Triangle"
      content: >
        The Celebrity Expert Triangle has celebrity on one side, expert on the other,
        and the apex is where they meet: the celebrity expert. Celebrity alone is
        fame without substance. Expert alone is competence without visibility.
        Celebrity + Expert = premium positioning with authority.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "MM-NN-002"
      title: "Business Trifecta - Marketing, Media, and PR"
      content: >
        The business trifecta is marketing plus media plus PR. Most businesses focus
        on one. Celebrity experts integrate all three. Marketing drives revenue, media
        builds credibility, PR amplifies reach. The intersection is where celebrity
        expert status lives.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "MM-NN-003"
      title: "Formula for Media Success"
      content: >
        The formula for media success equals mass media plus direct response. Mass media
        (TV, books, press) builds credibility and broad awareness. Direct response
        (landing pages, email, funnels) converts that awareness into revenue. Neither
        alone is sufficient for celebrity expert status.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "MM-NN-004"
      title: "Seven Basic Plots for Business Stories"
      content: >
        Christopher Booker's Seven Basic Plots adapted for business: Overcoming the
        Monster (defeating a big problem), Rags to Riches (transformation), The Quest
        (pursuit of a goal), Voyage and Return (went out, came back transformed),
        Comedy (lightening the mood), Tragedy (cautionary tale), Rebirth (reinvention).
        Every business story fits one of these.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MM-NN-005"
      title: "Kill Your Brand Exercise"
      content: >
        The Brand Obituary or Kill Your Brand exercise: if your business died
        tomorrow, what would the obituary say? What would people remember? What
        would they miss? If the answer is nothing distinctive, your brand needs work.
        Forces you to confront what's truly memorable about your brand.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MM-NN-006"
      title: "The $10,000 Test for Uniqueness"
      content: >
        The $10,000 test: imagine your top 5 competitors each get $10,000 to spend on
        marketing. Would they all produce the same stuff? If your competitors could use
        the same marketing you use with no changes, you don't have a unique brand. Your
        marketing must be uncopiable because it's YOU.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MM-NN-007"
      title: "The Homer Simpson Exercise"
      content: >
        The Homer Simpson Exercise for niche clarity: if Homer Simpson saw your marketing,
        could he instantly understand what you do, who you do it for, and why he should
        care? If it takes more than a second to understand, it's too complicated. Simplify
        until Homer gets it.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MM-NN-008"
      title: "Replacement Math vs Sale Price"
      content: >
        Before selling your business: if you make $1M/year and can sell for $4M (4x multiple),
        you'd make that in 4 years anyway. But if you hire 2 people at $150K each ($300K total)
        to replace you, you still net $700K/year doing nothing. Always compare replacement
        math against sale price.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MM-NN-009"
      title: "Golden Circle Applied to Brand Story"
      content: >
        Simon Sinek's Golden Circle (Why, How, What) applied to brand storytelling:
        start with WHY you do what you do (your purpose), then HOW you do it differently
        (your process), then WHAT you actually offer. People don't buy what you do,
        they buy why you do it.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "MM-NN-010"
      title: "Dunbar's Number for Business Relationships"
      content: >
        Dunbar's number is approximately 100-150 meaningful relationships a person
        can maintain. This means your most loyal community, your hot list, your top
        clients will always be limited. Focus on quality over quantity and serve
        your Dunbar group incredibly well.
      domain: community-building
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MM-NN-011"
      title: "Superhero Framework for Personal Branding"
      content: >
        Every superhero has an origin story, superpowers, and a nemesis. Your personal
        brand follows the same structure: your origin story (where you came from), your
        superpowers (what makes you unique), and your nemesis (the problem you fight).
        Together they create a compelling character.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "MM-NN-012"
      title: "The Road Show Model"
      content: >
        Historically, experts sent trained representatives to do the road show and tell
        the story. The expert didn't have to be everywhere personally. This model scales
        because the story is systemized and can be told by many. Key to legacy building.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MM-NN-013"
      title: "Media Inventory Audit"
      content: >
        Take inventory of all your existing media assets: books, articles, videos,
        interviews, testimonials, photos, press mentions. Most people have more than
        they think. Then identify gaps. What you don't have is what you need to create.
        This inventory reveals your credibility stack.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MM-NN-014"
      title: "Content Repurposing Chain"
      content: >
        One piece of content becomes many: a speech becomes a video, the video becomes
        a podcast, the podcast becomes a blog post, the blog post becomes social media
        snippets, the snippets drive traffic to the original video. Every content asset
        should spawn at least 5 derivative pieces.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "MM-NN-015"
      title: "Trust Thermometer"
      content: >
        Trust is a thermometer, not a switch. It goes up and down based on every
        interaction. Stories raise trust (oxytocin). Broken promises lower trust.
        Third-party validation raises it faster than self-promotion. Manage it
        actively with every touchpoint.
      domain: sales-psychology
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "MM-NN-016"
      title: "The Disney Systemization Model"
      content: >
        Disney institutionalized everything people needed to know, including the stories.
        Every one of maybe 100,000+ employees knows Walt's story. The brand is not
        dependent on the founder because the founder's vision is in the system. This
        is the ultimate scale of personal branding.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MM-NN-017"
      title: "The 5WH Framework for Core Story"
      content: >
        The 5WH Framework for building your core story: Who are you? What do you do?
        Where do you do it? When did you start and why? Why do you do it? How do you
        do it differently? These six questions form the foundation of every effective
        brand narrative.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "MM-NN-018"
      title: "Segmentation Thinking"
      content: >
        One market, one problem, one sequence. Don't try to sell everything to everyone.
        Segment your audience by their specific problem, create a specific message for
        that segment, and deliver it in a specific sequence. This is how you scale
        personal branding without diluting it.
      domain: marketing
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "MM-NN-019"
      title: "The Attention Funnel"
      content: >
        In the attention age, the funnel starts with grabbing attention (story), then
        building trust (oxytocin), then demonstrating expertise (content), then
        creating desire (transformation proof), then making the offer. Skip a step
        and you lose them.
      domain: marketing
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MM-NN-020"
      title: "The Iceberg Metaphor for Expert Knowledge"
      content: >
        What you show the market is the tip of the iceberg. Your full body of knowledge,
        experience, and capability is underwater. Celebrity branding is about making more
        of that iceberg visible without overwhelming people. Show enough to establish
        authority; reserve depth for delivery.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MM-NN-021"
      title: "The Dual Exit Strategy"
      content: >
        Two exit strategies: sell the business (one-time windfall) or step back and
        keep earning (replacement model). The son rides the legend of the father until
        creating his own legend. Many business exits are not sales but transitions to
        next-generation operators.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MM-NN-022"
      title: "Online Real Estate vs Physical Real Estate"
      content: >
        Your website, social profiles, and search results are your online real estate.
        Just like physical real estate, location matters (page 1 of Google), curb appeal
        matters (design), and square footage matters (content volume). Own and develop
        your online properties.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "MM-NN-023"
      title: "The Jacob's Turn Moment"
      content: >
        The moment when you personally get sold by a story so powerfully that you
        can't help but act. Nick's Jacob's Turn documentary was born from a chance
        airport conversation about a boy with Down syndrome. When a story grabs you
        emotionally, you become its champion. That's story selling at its purest.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MM-NN-024"
      title: "The Likeability Factor as Business Multiplier"
      content: >
        People do business with people they like. Likeability is not a soft skill -
        it's a business multiplier. Your personal brand must be likeable first,
        impressive second. A likeable expert beats an unlikeable genius every time.
      domain: sales-psychology
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "MM-NN-025"
      title: "The Cocktail Party Introduction Test"
      content: >
        If someone introduces you at a cocktail party, what do they say about you?
        If they can't clearly and compellingly describe what you do and why you're
        special in 10 seconds, your brand needs work. Your brand must be referrable
        in a single sentence.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MM-NN-026"
      title: "Push vs Pull Marketing in Celebrity Branding"
      content: >
        Traditional marketing pushes messages out. Celebrity branding creates a pull -
        people come to you because they've heard about you, read your book, seen you
        on TV. The goal is to create such strong pull that selling becomes unnecessary.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "MM-NN-027"
      title: "The WordPress Hub Strategy"
      content: >
        WordPress is not just a blog - it's your online hub. All roads lead to and
        from your WordPress site. Social media, SEO, content, email - they all
        either feed your hub or are fed by it. Control your hub, control your
        online presence.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "MM-NN-028"
      title: "Emotional Transportation via Narrative"
      content: >
        Stories transport the listener emotionally from their current state to a new
        state. This is neurological - the brain cannot distinguish between living an
        experience and vividly hearing about it. This is why stories change minds more
        effectively than data.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MM-NN-029"
      title: "The Authority Stack Model"
      content: >
        Stack authority signals in this order: best-selling author (lowest barrier),
        media appearances (TV, press), awards and recognition, then association with
        other authorities. Each layer reinforces the others. An Emmy winner who is
        also a best-selling author is exponentially credible.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MM-NN-030"
      title: "The Entrepreneurial Identity Crisis"
      content: >
        Many entrepreneurs struggle because the people around them (church, family,
        old friends) don't understand their ambitions. This creates an identity crisis
        that slows growth. Masterminds solve this by surrounding you with people who
        validate and accelerate your vision.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MM-NN-031"
      title: "The IP Licensing Escalator"
      content: >
        IP monetization follows an escalator: sell products (bottom), coach others
        to do it (middle), license your system (top). A chiropractor who builds a
        system can license it to other chiropractors. You go from practitioner to
        platform. Each step multiplies revenue without multiplying effort.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MM-NN-032"
      title: "The Three Audiences for Your Story"
      content: >
        Every story has three audiences: those who resonate (future clients), those
        who are repelled (not your market), and those who are inspired (future
        advocates and referrers). Design your story to maximize resonance, accept
        repulsion, and trigger inspiration.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

# ═══════════════════════════════════════════════════════════════
# L3: HEURISTICAS (Rules of Thumb & Practical Shortcuts)
# Total: 42 elements (HEUR-NN-001 to HEUR-NN-042)
# ═══════════════════════════════════════════════════════════════
L3_HEURISTICAS:
    - id: "HEUR-NN-001"
      title: "Specialist Always Charges More Than Generalist"
      content: >
        A specialist always charges more than a generalist. A pediatric dentist charges
        more than a general dentist. A brain surgeon charges more than a general
        practitioner. Pick a niche and you automatically command higher fees.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "HEUR-NN-002"
      title: "Dunbar's Number - 100 to 150 Meaningful Relationships"
      content: >
        You can only maintain approximately 100 to 150 meaningful relationships
        (Dunbar's number). This means your VIP list, your inner circle, your
        mastermind should be capped around this number for maximum depth and
        quality of connection.
      domain: community-building
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "HEUR-NN-003"
      title: "Homer Simpson Must Understand Your Message"
      content: >
        If Homer Simpson can't understand what you do in one second, your message
        is too complicated. Simplify your positioning until the least sophisticated
        person can instantly get it. Clarity beats cleverness every time.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "HEUR-NN-004"
      title: "A Buyer Is a Buyer Is a Buyer - Hotline Lists"
      content: >
        In direct marketing, a hotline buyer list (people who recently bought something)
        is the most valuable list. A buyer is a buyer is a buyer. Someone who has
        purchased once is 3-5x more likely to purchase again. Always prioritize
        buyers over prospects.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "HEUR-NN-005"
      title: "Do Replacement Math Before Selling Business"
      content: >
        Before selling your business: calculate what it would cost to replace yourself
        with employees. If you earn $1M/year and replacement costs $300K, you net $700K
        doing nothing. Only sell if the sale price significantly exceeds the present
        value of that ongoing income stream.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-006"
      title: "Professional Photo Is the Cheapest Brand Investment"
      content: >
        A professional photo is the first and cheapest branding investment. Most people
        use terrible photos that undermine their entire brand. For a few hundred dollars,
        you get the most-seen element of your brand right.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "HEUR-NN-007"
      title: "Newsletter Is a Cup of Coffee With a Friend"
      content: >
        Write your newsletter like you're having a cup of coffee with a friend. Personal,
        warm, conversational. Not corporate, not salesy. This tone builds the relationship
        that eventually leads to business. Reference to Dan Kennedy's approach via NN.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "HEUR-NN-008"
      title: "Best-Selling Author Is the Easiest Authority Signal"
      content: >
        Becoming a best-selling author is the lowest barrier to entry for authority
        building. Collaborative books make it even easier. Once you're a best-selling
        author, every piece of marketing can include that credential for life.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "HEUR-NN-009"
      title: "Control Page One of Google for Your Name"
      content: >
        You must control page one of Google results for your name. This is non-negotiable.
        Page one typically shows 10 results. Aim to control at least 7 of them with
        your website, social profiles, book listings, and media mentions.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "HEUR-NN-010"
      title: "One Piece of Content Should Spawn Five Derivatives"
      content: >
        Every piece of content you create should be repurposed into at least 5 derivative
        pieces. A keynote becomes a video, a podcast, a blog post, social snippets, and
        an email sequence. Maximize ROI on content creation time.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "HEUR-NN-011"
      title: "30 Days of Vacation Leads to Drunk, Burnt, and Fat"
      content: >
        For most entrepreneurs, margaritas by the pool sounds great after filming for
        8 hours. But do it for 30 or 60 days and you're drunk, burnt, and fat. The
        exit doesn't have to mean doing nothing - it means doing only your unique
        ability. Complete removal rarely satisfies.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-012"
      title: "Collaborative Book Is Cheaper Than Solo Book"
      content: >
        A collaborative book where multiple authors share costs is significantly cheaper
        than a solo book. You still get the best-selling author credential, you get
        credibility by association with other experts, and you reduce financial risk.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-013"
      title: "WordPress Is the Hub, Social Media Is the Spoke"
      content: >
        WordPress is your hub, social media platforms are spokes. Always drive traffic
        back to your hub where you control the relationship. Social media platforms
        change algorithms, shut down accounts, shift policies. Your WordPress site is
        yours forever.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "HEUR-NN-014"
      title: "TV Credibility Is Immediate and Permanent"
      content: >
        Appearing on TV (NBC, CBS, Fox affiliates) gives you instant credibility that
        lasts forever. You can use the 'As seen on' badge in all marketing materials
        indefinitely. The perception of being on TV creates a permanent trust lift.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "HEUR-NN-015"
      title: "10 Seconds to Make Your Point at a Cocktail Party"
      content: >
        If someone can't explain what makes you special in 10 seconds at a cocktail
        party, your brand message is too complex. Work on it until it's instantly
        transferable in a brief introduction.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "HEUR-NN-016"
      title: "20-Minute Documentary Sells Better Than Any Sales Letter"
      content: >
        A well-produced 20-minute documentary about your story or your client's
        transformation is worth more than any sales letter, any brochure, any
        presentation. Film combines visual, emotional, and narrative power that
        no other medium matches.
      domain: media-production
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "HEUR-NN-017"
      title: "Impacted 2000+ People in 33 Countries"
      content: >
        The agency has directly helped over 2,000 people in 33 different countries
        with these concepts, and reached millions through media placements. The
        concepts are living proof - built a multi-million dollar business on the
        back of these principles.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "HEUR-NN-018"
      title: "Implement 5-6 Things for a Huge Shift"
      content: >
        You don't need to implement everything. If you implement 5 or 6 things from
        the blueprint, you will see a huge shift in your business. The key is to
        start, not to wait until you can do everything perfectly.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "HEUR-NN-019"
      title: "Start With One Niche, Then Expand"
      content: >
        Even if you're in a position to serve multiple niches, start with one.
        Master that niche, become the celebrity expert there, then expand. You
        might be in multiple niches eventually, but you started with that one.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-020"
      title: "The Son Rides the Legend of the Father"
      content: >
        Many financial advisors are passing their business to their sons. The son gets
        to ride the legend of the father until he creates his own legend over time.
        Legacy dollars come from building something transferable where the next
        generation leverages accumulated trust.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-021"
      title: "400-500 Emails Per Day Requires Story-Based Filtering"
      content: >
        Nick gets 400-500 emails per day. The only way to break through that kind of
        noise is to tell a story. This is the attention age reality - if your
        communication doesn't tell a story, it gets lost in the flood.
      domain: marketing
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "HEUR-NN-022"
      title: "Google Yourself Monthly"
      content: >
        Google yourself at least monthly to see what comes up. Your online reputation
        is your brand. If negative results appear, address them immediately. If nothing
        appears, you have work to do. Monitor your online brand continuously.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "HEUR-NN-023"
      title: "Mastermind Group Is Non-Negotiable for Growth"
      content: >
        Being in a mastermind of like-minded people who are at or above your level
        is non-negotiable for growth. You cannot grow surrounded by people who don't
        understand your ambitions. Pay for access to better thinking.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-024"
      title: "Every Employee Should Know the Founder's Story"
      content: >
        If your employees and clients don't know your story, it's really hard to
        transfer that story from generation to generation. How well do your employees
        know your story? If they can't tell it, you haven't systemized your narrative.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-025"
      title: "Use Over 100 Major Dot Coms for Online Presence"
      content: >
        Claim profiles on over 100 major dot com sites. Each profile is a piece of
        online real estate that you control. These profiles feed Google results,
        build backlinks, and create omnipresence online.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "HEUR-NN-026"
      title: "Photo Shoot Before Any Marketing"
      content: >
        Always do a professional photo shoot before launching any marketing campaign
        or brand rollout. The photo is in every piece of marketing, on every platform,
        in every book. It's the most repeated visual element of your brand.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "HEUR-NN-027"
      title: "Overcoming the Monster Is the Most Common Business Story"
      content: >
        Of the 7 basic plots, Overcoming the Monster (defeating a big problem or enemy)
        is the most commonly used and effective in business storytelling. The monster can
        be a disease, a broken industry, financial ruin, or any powerful adversary.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "HEUR-NN-028"
      title: "Origin Story Must Include Vulnerability"
      content: >
        An origin story without vulnerability is just bragging. The audience connects
        through your struggles, not your triumphs. Show the before, the low point,
        the turning point, then the triumph. Without vulnerability, there's no
        emotional transportation.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "HEUR-NN-029"
      title: "Ascension Starts With Free Content"
      content: >
        The ascension ladder always starts with free content. Give value first, build
        trust, demonstrate expertise - then offer paid solutions. Never start with
        the ask. Start with the give.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "HEUR-NN-030"
      title: "Multiple Revenue Streams From One Brand"
      content: >
        A well-built celebrity expert brand should generate revenue from at least 4-5
        streams: products, coaching, done-for-you services, licensing/franchising, and
        speaking. Never rely on a single revenue stream.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-031"
      title: "Social Media Without Website Is Sharecropping"
      content: >
        Building your brand only on social media is like sharecropping - you're building
        on someone else's land. Platforms change rules, algorithms shift, accounts get
        shut down. Always have your own website as the foundation.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "HEUR-NN-032"
      title: "Brand Film vs Corporate Video"
      content: >
        A brand film tells a story. A corporate video lists features. Brand films create
        emotional connection. Corporate videos create boredom. Invest in a brand film
        that shows your why, not a corporate video that lists your what.
      domain: media-production
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "HEUR-NN-033"
      title: "Apply by Invitation Creates Exclusivity"
      content: >
        For premium offerings, require an application. 'If you want information on
        that, you have to apply.' This creates exclusivity, pre-qualifies clients,
        and positions you as the selector, not the selected.
      domain: sales-psychology
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-034"
      title: "Match Branding Tone to Trust Level Required"
      content: >
        A brain surgeon needs serious, credible branding. A party planner can be fun
        and colorful. Match your branding tone to the level of trust your profession
        requires. The higher the stakes, the more gravitas needed.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "HEUR-NN-035"
      title: "Build the Relationship Before the Rollout"
      content: >
        Stages 1-3 (niche, brand, celebrity status) are about building the foundation.
        Only Stage 4 is the rollout. Most people rush to roll out before their
        foundation is solid. Build the relationship infrastructure first.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "HEUR-NN-036"
      title: "Joint Ventures Accelerate Celebrity Status"
      content: >
        Joint ventures with other celebrity experts accelerate your own celebrity
        status through association. Their audience discovers you, their credibility
        transfers to you, and you both win. Strategic alliances are force multipliers.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "HEUR-NN-037"
      title: "SEO Takes Time But Compounds"
      content: >
        SEO is not overnight magic. It takes 3-6 months to see results. But once it
        compounds, it's the most cost-effective marketing channel. The earlier you
        start building your online presence, the stronger your compounding advantage.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "HEUR-NN-038"
      title: "The X-Factor Mindset Comes First"
      content: >
        Of the 8 X-Factors, mindset is number one. If you don't believe you deserve
        celebrity expert status, nothing else works. The inner game precedes the outer
        game. Work on your mindset before your marketing.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "HEUR-NN-039"
      title: "Rags to Riches Is the Most Relatable Business Plot"
      content: >
        While Overcoming the Monster is most common, Rags to Riches is the most
        relatable business story plot. Everyone loves a transformation story where
        someone started from nothing and built something great. It gives hope.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "HEUR-NN-040"
      title: "Invest in Video Before Any Other Content"
      content: >
        If you can only invest in one type of content, invest in video. Video can be
        repurposed into audio (podcast), text (transcription/blog), and images
        (screenshots/quotes). It's the most versatile starting format.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "HEUR-NN-041"
      title: "The Two-Finger Point Principle"
      content: >
        Disney employees use a two-finger point instead of a single finger because
        in some cultures pointing with one finger is rude. This level of detail in
        systemization is what separates a good brand from a legendary one. Every
        detail matters in brand experience.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "HEUR-NN-042"
      title: "Email List Is Your Most Valuable Asset"
      content: >
        Your email list is your most valuable marketing asset because you own it.
        Social media followers can disappear overnight. Google rankings can change.
        But your email list is yours. Build it, nurture it, protect it.
      domain: marketing
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

# ═══════════════════════════════════════════════════════════════
# L4: FRAMEWORKS (Multi-Step Structured Processes)
# Total: 28 elements (FW-NN-001 to FW-NN-028)
# ═══════════════════════════════════════════════════════════════
L4_FRAMEWORKS:
    - id: "FW-NN-001"
      title: "Celebrity Branding Blueprint 5-Stage Framework"
      content: >
        The complete 5-stage process for building a celebrity brand:
        Stage 1: Finding Your Niche (specialize, Homer Simpson test, $10K test).
        Stage 2: Building Your Brand (core story, 5WH, Golden Circle, oxytocin trigger).
        Stage 3: Developing Celebrity Expert Status (4 freedoms, authority stacking, media).
        Stage 4: Rollout - Expanding Your Celebrity Brand (content, marketing, ascension).
        Stage 5: Selling/Legacy Dollars (exit strategy, replacement math, systemization).
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FW-NN-002"
      title: "8 X-Factors of the Celebrity Expert"
      content: >
        The 8 X-Factors that differentiate a celebrity expert:
        1. Mindset (belief you deserve it).
        2. Story (origin story that connects).
        3. Superpowers (unique abilities that set you apart).
        4. Positioning (niche and market clarity).
        5. Media Mastery (books, TV, press).
        6. Community (tribe of followers).
        7. Content Engine (consistent value creation).
        8. Monetization (multiple revenue streams from authority).
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FW-NN-003"
      title: "Ascension Ladder"
      content: >
        The ascension ladder for monetizing celebrity expert status:
        Level 1: Free content (build audience and trust).
        Level 2: Products (books, courses, digital assets).
        Level 3: Coaching/Consulting (group and individual).
        Level 4: Done-For-You services (your team delivers using your system).
        Level 5: Exclusive/VIP access (limited spots, high ticket).
        Level 6: Licensing/Franchise (others run your system, you get royalties).
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FW-NN-004"
      title: "Media and Asset Inventory Framework"
      content: >
        Comprehensive audit of all media and marketing assets:
        1. Books (authored, co-authored, featured in).
        2. Video (TV appearances, interviews, presentations, brand films).
        3. Audio (podcast appearances, radio, audio books).
        4. Print (press mentions, magazine features, newspaper articles).
        5. Digital (website, social profiles, blog posts, email list size).
        6. Awards (recognition, certifications, honors).
        7. Testimonials (client stories, endorsements, case studies).
        Gap analysis: what's missing becomes the action plan.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-005"
      title: "Segmentation Framework - 1 Market 1 Problem 1 Sequence"
      content: >
        The segmentation framework for scaling personal branding:
        Step 1: Identify one specific market segment.
        Step 2: Identify the one core problem that segment has.
        Step 3: Create one specific message sequence for that problem.
        Step 4: Deliver via one optimized channel.
        Step 5: Only after mastering this one segment, add another.
        Each segment gets its own market-problem-sequence combination.
      domain: marketing
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FW-NN-006"
      title: "7 Brand Story Plot Lines Framework"
      content: >
        Adapted from Christopher Booker's 7 Basic Plots for business storytelling:
        1. Overcoming the Monster: You fought a big enemy/problem and won.
        2. Rags to Riches: You transformed from nothing to success.
        3. The Quest: You pursued a noble goal against obstacles.
        4. Voyage and Return: You left, experienced transformation, came back wiser.
        5. Comedy: You use humor and lightness to connect and disarm.
        6. Tragedy: A cautionary tale of what happens when you don't act.
        7. Rebirth: You reinvented yourself after a fundamental change.
        Every business needs at least one primary plot line.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FW-NN-007"
      title: "Origin Story Structure"
      content: >
        The origin story structure for personal branding:
        1. The Before (where you were, the struggle, the status quo).
        2. The Catalyst (the moment everything changed, the turning point).
        3. The Journey (the challenges you faced, what you learned).
        4. The Transformation (what you became, what you discovered).
        5. The Mission (why you now help others with this, your purpose).
        This maps directly to the Superhero Framework: backstory, superpowers, mission.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FW-NN-008"
      title: "Core Story Formula - 5WH Plus Golden Circle"
      content: >
        The Core Story Formula combines 5WH with the Golden Circle:
        WHY: Why do you do what you do? (Purpose, belief, cause).
        WHO: Who are you? (Background, credibility, personality).
        WHAT: What do you offer? (Products, services, solutions).
        WHERE: Where do you operate? (Market, geography, niche).
        WHEN: When did this start? (Origin moment, timeline).
        HOW: How do you do it differently? (Process, methodology, USP).
        Start with WHY (Golden Circle), then wrap the others around it.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "FW-NN-009"
      title: "Authority Stacking Sequence"
      content: >
        Build authority in a specific sequence for maximum impact:
        Step 1: Professional photo shoot and brand identity.
        Step 2: Become a best-selling author (collaborative or solo book).
        Step 3: Get on TV (NBC, CBS, Fox affiliates via brand show).
        Step 4: Get into major print media (USA Today, Wall Street Journal).
        Step 5: Win awards and recognition (industry, media).
        Step 6: Establish online omnipresence (100+ sites, SEO domination).
        Each step compounds on the previous ones.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-010"
      title: "Celebrity Expert Triangle Implementation"
      content: >
        How to position at the apex of the Celebrity Expert Triangle:
        Celebrity side: Media appearances, books, awards, public visibility.
        Expert side: Deep niche knowledge, case studies, methodologies, results.
        Apex (Celebrity Expert): Integrate both - be the visible authority.
        Business Trifecta overlay: Marketing (reach) + Media (credibility) + PR (amplification).
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FW-NN-011"
      title: "Niche Selection Framework"
      content: >
        How to select your niche for celebrity expert positioning:
        1. List everything you can do and everyone you can help.
        2. Apply the Homer Simpson test (can Homer understand it?).
        3. Apply the $10,000 test (would competitors produce identical marketing?).
        4. Apply Dunbar's filter (can you meaningfully serve this number?).
        5. Ask: Can I afford to reach this market?
        6. Ask: Can I speak their language authentically?
        7. Ask: Is there enough pain/demand in this niche?
        8. Narrow until you're the only obvious choice.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "FW-NN-012"
      title: "Legacy Dollars Creation Framework"
      content: >
        Framework for creating legacy dollars from a personality-driven business:
        1. Systemize everything (lead gen, conversion, delivery, storytelling).
        2. Identify your unique ability and protect it.
        3. Replace yourself in everything else (hire for your weaknesses).
        4. Train others to tell your story (employees, partners, systems).
        5. Create scalable products (courses, coaching, done-for-you).
        6. Consider: licensing, franchising, employee buyout, family transition.
        7. Always compare replacement math vs sale price.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FW-NN-013"
      title: "Online Legend Building Framework"
      content: >
        Lindsay Dicks' framework for building your online legend:
        1. Foundation: WordPress hub (your home base).
        2. Presence: Claim 100+ online profiles.
        3. Content: Regular blog posts, articles, videos.
        4. SEO: Optimize for your name + niche keywords.
        5. Social: Active on key platforms (drive to hub).
        6. Monitoring: Google yourself monthly, manage reputation.
        7. Authority: Link building via media mentions and high-quality sites.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "FW-NN-014"
      title: "Story Selling Framework"
      content: >
        Nick Nanton's Story Selling Framework:
        1. Identify: Find the real story (not the manufactured one).
        2. Structure: Map to one of the 7 basic plots.
        3. Emotionalize: Find the emotional hooks (vulnerability, triumph).
        4. Visualize: Plan how to tell it visually (film, images, stage).
        5. Deliver: Choose the medium (documentary, presentation, written).
        6. Distribute: Get it in front of the right audience.
        7. Measure: Track the emotional and commercial impact.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FW-NN-015"
      title: "Content Generation Rollout Framework"
      content: >
        The systematic content generation rollout:
        1. Create one cornerstone piece (keynote speech, master class, interview).
        2. Film it in high quality.
        3. Extract audio for podcast/audio content.
        4. Transcribe for blog posts and articles.
        5. Pull quotes and snippets for social media.
        6. Create email sequence around the theme.
        7. Bundle for lead magnet or product.
        8. Repeat monthly with new cornerstone content.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "FW-NN-016"
      title: "Collaborative Book Strategy Framework"
      content: >
        Framework for becoming a best-selling author via collaborative books:
        1. Select a topic aligned with your niche.
        2. Join or organize a collaborative book with other experts.
        3. Write your chapter showcasing your expertise and story.
        4. Leverage the combined marketing power of all authors.
        5. Hit best-seller lists through coordinated launch.
        6. Use 'best-selling author' credential in all marketing forever.
        7. Repurpose chapter as lead magnet, presentation, course module.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-017"
      title: "Brand Congruence Audit"
      content: >
        Audit framework for brand congruence across all touchpoints:
        1. Visual: Photos, website, business cards, office - do they match?
        2. Verbal: How you speak, write, present - same voice everywhere?
        3. Experiential: In-person experience matches online promise?
        4. Social: Social media profiles consistent with brand positioning?
        5. Cultural: Team behavior aligns with brand values?
        6. Digital: Email tone matches website tone matches ad tone?
        Fix any inconsistency - it breaks trust.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-018"
      title: "Four Freedoms Achievement Framework"
      content: >
        Using celebrity branding to achieve Dan Sullivan's four freedoms:
        Freedom of Time: Celebrity expert chooses their schedule, not dictated by clients.
        Freedom of Money: Premium pricing means fewer clients, more revenue.
        Freedom of Relationships: Select clients you want to work with.
        Freedom of Place: Work from anywhere, speak anywhere, create anywhere.
        Each stage of the CBB builds toward these four freedoms.
      domain: entrepreneurship
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-019"
      title: "Repel to Attract Positioning Framework"
      content: >
        Framework for polarizing positioning:
        1. Identify what you strongly believe (and defend it publicly).
        2. Identify what you're against (the enemy, the wrong way).
        3. State both clearly in your messaging.
        4. Accept that some people will be repelled.
        5. Observe that the strength of repulsion equals attraction.
        6. Measure: repelled people are not your market anyway.
        7. Result: stronger tribe of aligned followers.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-020"
      title: "Superhero Personal Brand Framework"
      content: >
        Build your personal brand like a superhero character:
        1. Origin Story: Where did you come from? What happened to you?
        2. Superpowers: What are your unique abilities? (max 3).
        3. Nemesis: What enemy/problem do you fight?
        4. Mission: What is your purpose/cause?
        5. Costume: Your visual brand (photo, style, colors).
        6. Catchphrase: Your signature line or tagline.
        7. Sidekick: Your team, your community, your allies.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "FW-NN-021"
      title: "IP Monetization Escalator Framework"
      content: >
        Framework for monetizing intellectual property through licensing:
        1. Document your system/methodology completely.
        2. Prove it works (case studies, results, track record).
        3. Create training materials for others to learn it.
        4. Offer licensing to practitioners in your field.
        5. Provide ongoing support/quality control for licensees.
        6. Collect royalties/licensing fees.
        Example: Chiropractor licenses his patient acquisition system to other chiropractors.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FW-NN-022"
      title: "Social Media Strategy Framework"
      content: >
        Social media strategy for celebrity expert positioning:
        1. Hub: WordPress website as central destination.
        2. Primary platform: Choose one to master first.
        3. Content mix: 80% value, 20% promotion.
        4. Engagement: Respond, connect, build relationships.
        5. Repurpose: All content feeds back to hub.
        6. Consistency: Regular posting schedule.
        7. Analytics: Track what resonates, double down.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "FW-NN-023"
      title: "Documentary Film Production Framework"
      content: >
        Framework for creating story-selling documentary films:
        1. Find the real story (interview, research, discovery).
        2. Identify the emotional core (what will move people).
        3. Map to a plot structure (usually Overcoming the Monster or Rags to Riches).
        4. Film with cinematic quality (not corporate video).
        5. Include real testimonials and footage.
        6. Edit for emotional pacing (build tension, release, inspire).
        7. Distribute strategically (events, online, media).
      domain: media-production
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "FW-NN-024"
      title: "Brand Photo Shoot Framework"
      content: >
        Framework for a professional brand photo shoot:
        1. Define your brand personality (serious, approachable, edgy, warm).
        2. Choose wardrobe that matches (professional vs creative).
        3. Select location that reinforces brand (office, outdoor, studio).
        4. Get multiple shots: headshot, action, lifestyle, with props.
        5. Plan for all uses: website, social, book, press kit.
        6. Get both digital and print-ready versions.
        7. Update annually or when brand evolves.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-025"
      title: "Marketing Calendar Framework"
      content: >
        Structured marketing calendar for celebrity expert rollout:
        1. Monthly: One cornerstone content piece (keynote, master class).
        2. Weekly: Blog post + email + social campaign.
        3. Daily: Social media presence (value posts, engagement).
        4. Quarterly: Major PR push or media appearance.
        5. Bi-annually: Book release or major credential addition.
        6. Annually: Photo shoot refresh and brand audit.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "FW-NN-026"
      title: "Client Selection Through Celebrity Branding"
      content: >
        Using celebrity branding to select (not just attract) clients:
        1. Define ideal client profile clearly.
        2. Tell stories that only resonate with ideal clients.
        3. Price at premium level to filter for serious buyers.
        4. Require application for high-ticket services.
        5. Interview before accepting (you're the selector).
        6. Fire clients who don't fit (protect the brand).
        Result: Better clients, better results, better testimonials, better brand.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "FW-NN-027"
      title: "Mass Media Plus Direct Response Integration"
      content: >
        Framework for integrating mass media with direct response:
        1. Mass media creates awareness and credibility (TV, books, press).
        2. Direct response captures and converts that attention (landing pages, email).
        3. Every mass media appearance includes a call-to-action (website, offer).
        4. Every direct response piece leverages mass media credentials (As seen on).
        5. Track everything: what mass media generates, what converts.
        6. Optimize the loop: more media drives more DR, more DR justifies more media.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "FW-NN-028"
      title: "Mastermind Group Structure Framework"
      content: >
        Framework for a high-value mastermind group:
        1. Curate members by application (quality over quantity).
        2. Create regular meeting cadence (quarterly or more).
        3. Combine education (expert presentations) with peer sharing.
        4. Include experiential bonding (events, activities).
        5. Facilitate connections between members.
        6. Add exclusive access to resources and experts.
        7. Price at premium to ensure commitment and quality.
      domain: community-building
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

# ═══════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (Complete Step-by-Step Implementations)
# Total: 24 elements (MET-NN-001 to MET-NN-024)
# ═══════════════════════════════════════════════════════════════
L5_METODOLOGIAS:
    - id: "MET-NN-001"
      title: "Story Selling Methodology - 7 Plots Applied to Business"
      content: >
        Complete methodology for using the 7 basic plots in business story selling:
        Step 1: Audit your personal and business history for story material.
        Step 2: Map each potential story to one of the 7 plots.
        Step 3: Select your primary plot (usually Overcoming the Monster or Rags to Riches).
        Step 4: Structure the story: Beginning (setup), Middle (conflict), End (resolution).
        Step 5: Add emotional hooks at each transition point.
        Step 6: Test the story with a small audience for emotional response.
        Step 7: Adapt the story for different media (film, stage, written, social).
        Step 8: Create variations for different audiences and contexts.
        Step 9: Train your team to tell the story consistently.
        Step 10: Measure commercial impact and refine.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MET-NN-002"
      title: "Celebrity Expert Status 5-Stage Development Methodology"
      content: >
        Complete step-by-step methodology for achieving celebrity expert status:
        Stage 1 - Find Your Niche:
          a. List all services/skills. b. Apply Homer Simpson test. c. Apply $10K test.
          d. Validate with Dunbar's number. e. Choose and commit to one niche.
        Stage 2 - Build Your Brand:
          a. Develop core story (5WH). b. Apply Golden Circle (Why, How, What).
          c. Create story assets. d. Ensure oxytocin-triggering narrative.
        Stage 3 - Develop Celebrity Expert Status:
          a. Professional photo shoot. b. Become best-selling author.
          c. Get on TV affiliates. d. Get into major print media.
          e. Win awards. f. Build media inventory.
        Stage 4 - Rollout:
          a. Content generation system. b. Social media + SEO presence.
          c. Ascension ladder setup. d. Marketing calendar activation.
        Stage 5 - Legacy Dollars:
          a. Systemize everything. b. Replace yourself. c. Create scalable products.
          d. Consider licensing/franchise. e. Build legacy transfer plan.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Introduction_-_What_Is_a_Celebrity_Brand.txt"

    - id: "MET-NN-003"
      title: "Content Generation Rollout Methodology"
      content: >
        Complete step-by-step content generation system:
        Week 1: Create cornerstone content (film a keynote or master class).
        Week 2: Extract audio, create podcast episodes. Transcribe for written content.
        Week 3: Write 4 blog posts from transcription. Create 20+ social snippets.
        Week 4: Build email sequence. Create lead magnet from best content.
        Monthly: One new cornerstone piece. Weekly: One blog + email + social campaign.
        Daily: Engagement on 2-3 key social platforms.
        Quarterly: Review analytics, double down on what works.
        Annually: Refresh cornerstone content library.
        Key principle: Create once, repurpose 5-10 times.
      domain: marketing
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "MET-NN-004"
      title: "Online Legend Building Methodology"
      content: >
        Lindsay Dicks' complete methodology for building your online legend:
        Step 1: Set up WordPress website with professional theme and SEO plugin.
        Step 2: Claim and optimize profiles on 100+ major websites.
        Step 3: Create Google My Business listing and optimize.
        Step 4: Write and publish at least 2 blog posts per week.
        Step 5: Build backlinks through guest posts and media mentions.
        Step 6: Optimize all content for your name + niche keywords.
        Step 7: Set up Google Alerts for your name and brand.
        Step 8: Create video content for YouTube (second largest search engine).
        Step 9: Build email list with lead magnets on every page.
        Step 10: Establish social media presence on 3-5 key platforms.
        Step 11: Monitor and respond to reviews on all platforms.
        Step 12: Monthly audit: Google yourself, review analytics, adjust strategy.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "MET-NN-005"
      title: "Collaborative Book Publication Methodology"
      content: >
        Complete methodology for becoming a best-selling author via collaborative books:
        Step 1: Choose a book topic aligned with your celebrity expert positioning.
        Step 2: Write your chapter (2,000-5,000 words) showcasing your story and expertise.
        Step 3: Include your core story, key methodology, and case study/results.
        Step 4: Submit to collaborative book publisher (e.g., Celebrity Press).
        Step 5: Professional editing, design, and production.
        Step 6: Coordinated launch with all co-authors for best-seller push.
        Step 7: Use best-selling author credential in all marketing materials.
        Step 8: Repurpose chapter as: lead magnet, presentation, course module, blog series.
        Step 9: Use book as business card (send to prospects, clients, media).
        Step 10: Repeat with additional books in related or expanded niches.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MET-NN-006"
      title: "Brand Film Production Methodology"
      content: >
        Complete methodology for producing a story-selling brand documentary:
        Step 1: Discovery - deep interview with subject to find the real story.
        Step 2: Research - gather supporting materials, B-roll footage ideas, testimonials.
        Step 3: Story mapping - identify plot structure and emotional arc.
        Step 4: Pre-production - plan shoots, locations, interviews, equipment.
        Step 5: Principal photography - capture interview, B-roll, testimonials.
        Step 6: Editing - build the emotional arc, select music, pace for impact.
        Step 7: Sound design and color grading for cinematic quality.
        Step 8: Test screening with target audience.
        Step 9: Refine based on emotional response.
        Step 10: Strategic distribution (events, website, social, media).
        Step 11: Create derivative content (trailer, snippets, stills, quotes).
        Key: Never make a corporate video. Make a film about a human story.
      domain: media-production
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MET-NN-007"
      title: "Niche Selection and Validation Methodology"
      content: >
        Step-by-step methodology for selecting and validating your niche:
        Step 1: Brain dump all skills, services, and audiences you can serve.
        Step 2: For each combination, apply the Homer Simpson test (instant clarity).
        Step 3: Apply the $10,000 test (would competitors create identical marketing?).
        Step 4: Check Dunbar's feasibility (can you meaningfully serve this group?).
        Step 5: Research market size and purchasing power.
        Step 6: Write the Kill Your Brand obituary - would this niche notice?
        Step 7: Test with the Cocktail Party Introduction test (10-second pitch).
        Step 8: Validate with 10-20 prospects in the niche (do they respond?).
        Step 9: Commit to one niche for minimum 12 months.
        Step 10: Build all celebrity expert assets around this single niche.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_1_-_Finding_Your_Niche.txt"

    - id: "MET-NN-008"
      title: "Core Story Development Methodology"
      content: >
        Complete methodology for developing your core brand story:
        Step 1: Answer the 5WH questions in writing (Who, What, Where, When, Why, How).
        Step 2: Apply the Golden Circle - start with WHY (your purpose).
        Step 3: Identify your origin story - the moment everything changed.
        Step 4: Find the vulnerability - what struggle makes you relatable?
        Step 5: Define the transformation - before and after clearly.
        Step 6: Connect to your audience - how does your story serve THEM?
        Step 7: Write three versions: 30-second, 2-minute, 10-minute.
        Step 8: Practice telling it until it feels natural (not rehearsed).
        Step 9: Film yourself telling the story.
        Step 10: Get feedback and refine.
        Step 11: Ensure every team member can tell at least the 30-second version.
      domain: storytelling
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_2_-_Building_Your_Brand.txt"

    - id: "MET-NN-009"
      title: "TV Credibility Acquisition Methodology"
      content: >
        Methodology for getting on TV to build celebrity expert credibility:
        Step 1: Create a compelling media kit (bio, photo, talking points, book).
        Step 2: Identify target shows and affiliate stations (NBC, CBS, Fox).
        Step 3: Develop 3-5 timely, newsworthy story angles.
        Step 4: Pitch to producers (story-first, not self-promotion).
        Step 5: Prepare for on-camera appearance (media training).
        Step 6: Appear on show - deliver value, tell your story.
        Step 7: Get footage/screenshots for marketing use.
        Step 8: Add 'As Seen On [Network]' to all marketing materials.
        Step 9: Repurpose appearance into: social clips, website embed, email blast.
        Step 10: Use TV credential to pitch larger media opportunities.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MET-NN-010"
      title: "Ascension Ladder Implementation Methodology"
      content: >
        Step-by-step implementation of the ascension ladder:
        Step 1: Create free content that demonstrates expertise (blog, podcast, videos).
        Step 2: Build email list with valuable lead magnets.
        Step 3: Offer low-cost entry product ($7-$97 range) - book, mini-course.
        Step 4: Create mid-tier program ($497-$2,997) - online course, group coaching.
        Step 5: Develop high-ticket offering ($5,000-$25,000) - private coaching, consulting.
        Step 6: Create VIP/exclusive offering ($25,000+) - mastermind, done-for-you.
        Step 7: Explore licensing/franchise model for top performers.
        Key: Each level must overdeliver so clients naturally ascend.
        Map ascension to client journey - not everyone reaches the top.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_4_-_Rollout_-_Expanding_Your_Celebrity_Brand.txt"

    - id: "MET-NN-011"
      title: "WordPress Hub Setup Methodology"
      content: >
        Complete methodology for setting up WordPress as your online hub:
        Step 1: Purchase domain name (yourname.com if possible).
        Step 2: Install WordPress on quality hosting.
        Step 3: Choose professional theme aligned with brand.
        Step 4: Install essential plugins: SEO (Yoast), caching, security, email capture.
        Step 5: Create core pages: Home, About (your story!), Services, Blog, Contact.
        Step 6: Set up email capture on every page (lead magnet offer).
        Step 7: Start blogging consistently (2+ posts per week).
        Step 8: Integrate social media feeds and sharing buttons.
        Step 9: Optimize for mobile (majority of traffic).
        Step 10: Connect Google Analytics and Search Console.
        Step 11: Submit sitemap to search engines.
        Step 12: Build internal linking structure between related content.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "MET-NN-012"
      title: "Superhero Personal Brand Development Methodology"
      content: >
        Complete methodology for developing your personal brand using the superhero framework:
        Step 1: Write your origin story (where you came from, the struggle).
        Step 2: Identify your 3 superpowers (unique abilities that set you apart).
        Step 3: Name your nemesis (the problem/enemy you fight for your clients).
        Step 4: Define your mission statement (your purpose and cause).
        Step 5: Design your visual brand (the 'costume' - photo, colors, style).
        Step 6: Create your catchphrase or tagline.
        Step 7: Identify your sidekicks (team, partners, community).
        Step 8: Write the 30-second, 2-minute, and 10-minute versions.
        Step 9: Test with your market - does this resonate?
        Step 10: Build all marketing assets around this character.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Adding_the_X_Factor_to_Your_Business.txt"

    - id: "MET-NN-013"
      title: "Media Kit Development Methodology"
      content: >
        Complete methodology for creating a professional media kit:
        Step 1: Professional headshot and brand photos (multiple poses/settings).
        Step 2: Write compelling bio in three lengths (50 words, 150 words, 500 words).
        Step 3: List all credentials: books, TV, awards, media mentions.
        Step 4: Compile best testimonials and case studies.
        Step 5: Create list of 5-10 topics you can speak/write about.
        Step 6: Include sample interview questions for media.
        Step 7: Add social media links and website URL.
        Step 8: Design professionally (PDF and web versions).
        Step 9: Update quarterly with new credentials and media appearances.
        Step 10: Have physical copies for in-person opportunities.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MET-NN-014"
      title: "Exit Strategy Planning Methodology"
      content: >
        Complete methodology for planning your business exit:
        Step 1: Define your desired lifestyle post-exit (unique ability focus).
        Step 2: Calculate replacement cost (what would it cost to hire your replacement?).
        Step 3: Calculate business sale value (realistic multiple of earnings).
        Step 4: Compare: replacement math vs sale price (which is better long-term?).
        Step 5: If keeping: hire replacements, step into advisory role, keep equity.
        Step 6: If selling: document all systems, prove they work without you.
        Step 7: Build the team that can run without you for 12+ months.
        Step 8: Transfer the legend (train everyone to tell your story).
        Step 9: Create continuity plan (what if you get sick tomorrow?).
        Step 10: Execute transition over 12-24 months (not overnight).
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MET-NN-015"
      title: "SEO Domination Methodology for Celebrity Experts"
      content: >
        Complete methodology for dominating search results:
        Step 1: Research keywords: your name, your niche, your solutions.
        Step 2: Optimize WordPress site for all target keywords.
        Step 3: Claim and optimize 100+ online profiles with consistent NAP.
        Step 4: Create content targeting each keyword cluster.
        Step 5: Build backlinks from high-authority sites (media, guest posts).
        Step 6: Create YouTube channel (video content ranks highly).
        Step 7: Get listed in relevant directories and associations.
        Step 8: Encourage reviews on Google, Yelp, industry sites.
        Step 9: Monitor rankings monthly and adjust strategy.
        Step 10: Goal: control 7+ of 10 results on page 1 for your name.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "MET-NN-016"
      title: "Brand Congruence Audit Methodology"
      content: >
        Complete methodology for auditing and fixing brand congruence:
        Step 1: List every touchpoint (website, email, social, phone, in-person, mail).
        Step 2: Screenshot/document each touchpoint.
        Step 3: Compare visual consistency (colors, fonts, photos, quality).
        Step 4: Compare verbal consistency (tone, vocabulary, messaging).
        Step 5: Compare experiential consistency (does reality match promise?).
        Step 6: Identify gaps (where is the brand inconsistent?).
        Step 7: Prioritize fixes (start with highest-traffic touchpoints).
        Step 8: Fix and standardize with brand guidelines document.
        Step 9: Train team on brand standards.
        Step 10: Schedule quarterly re-audit.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MET-NN-017"
      title: "Marketing Academy Positioning Methodology"
      content: >
        Methodology for the Marketing Academy positioning session:
        Step 1: Professional brand photo shoot.
        Step 2: Work through marketing calendar planning.
        Step 3: Positioning exercises (niche clarity, competitive analysis).
        Step 4: Story development workshop (core story, 30s/2min/10min versions).
        Step 5: Marketing plan creation (12-month roadmap).
        Step 6: Implementation support and accountability.
        Result: Clear brand position, marketing plan, professional assets.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MET-NN-018"
      title: "Polarization Marketing Methodology"
      content: >
        Methodology for using polarization to strengthen your brand:
        Step 1: Identify your strongest convictions (what you believe deeply).
        Step 2: Identify the conventional wisdom you disagree with.
        Step 3: Create content that challenges the status quo.
        Step 4: State your position boldly (no hedging, no qualifiers).
        Step 5: Prepare for pushback (have data, stories, and proof).
        Step 6: Engage with supporters, don't fight with detractors.
        Step 7: Measure: track who comes in vs who leaves.
        Step 8: Refine your position based on market response.
        Result: Stronger, more loyal community that self-selects.
      domain: brand-positioning
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MET-NN-019"
      title: "PR and Major Media Placement Methodology"
      content: >
        Methodology for getting into major print and digital media:
        Step 1: Build foundation (book, TV appearances, professional brand).
        Step 2: Create newsworthy angles tied to current events/trends.
        Step 3: Develop relationships with journalists and editors.
        Step 4: Pitch stories (not self-promotion) to targeted outlets.
        Step 5: Provide value in media interactions (be quotable, insightful).
        Step 6: Get placements in USA Today, Wall Street Journal, Forbes, etc.
        Step 7: Get featured on 100+ major dot com websites.
        Step 8: Compile all media mentions into a press page.
        Step 9: Use media mentions in all marketing (social proof).
        Step 10: Repeat - each placement makes the next one easier.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MET-NN-020"
      title: "Story Collection and Curation Methodology"
      content: >
        Methodology for building a library of stories for story selling:
        Step 1: Personal stories - catalog all significant life events.
        Step 2: Client stories - document every transformation/success.
        Step 3: Industry stories - collect relevant case studies from your field.
        Step 4: Universal stories - gather timeless stories that illustrate key points.
        Step 5: For each story, tag: plot type, emotion, business lesson, length.
        Step 6: Create 30-second, 2-minute, and 10-minute versions of top stories.
        Step 7: Match stories to common sales objections and questions.
        Step 8: Practice telling each story until natural.
        Step 9: Update library quarterly with new stories.
        Step 10: Train team on the top 10 stories everyone should know.
      domain: storytelling
      source_file: "living-legend-formula/bonus/transcription_mp4_Story_Selling.txt"

    - id: "MET-NN-021"
      title: "Social Media Omnipresence Methodology"
      content: >
        Complete methodology for creating social media omnipresence:
        Step 1: Audit all existing social profiles for brand consistency.
        Step 2: Prioritize 3-5 platforms where your audience lives.
        Step 3: Create content calendar (aligns with marketing calendar).
        Step 4: Post consistently: daily on primary, 3x/week on secondary.
        Step 5: Engage authentically (reply, comment, share others' content).
        Step 6: Use each platform's native features (Stories, Reels, Lives).
        Step 7: Drive traffic to hub (WordPress) from every platform.
        Step 8: Cross-promote content across platforms.
        Step 9: Track engagement metrics weekly.
        Step 10: Adjust content mix based on what gets engagement.
        Step 11: Build ad strategy on top of organic success.
      domain: online-branding
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

    - id: "MET-NN-022"
      title: "Business Systemization for Scalability Methodology"
      content: >
        Complete methodology for systemizing a personality-driven business:
        Step 1: Map every process in your business (lead gen, sales, delivery, support).
        Step 2: Identify which processes depend on YOU specifically.
        Step 3: For YOU-dependent processes: document, film, create SOPs.
        Step 4: Identify what skills you'd need to hire to replace yourself.
        Step 5: Hire and train replacements for each skill set.
        Step 6: Create quality control checkpoints.
        Step 7: Institutionalize your story (everyone can tell it).
        Step 8: Test the system without you for 30 days.
        Step 9: Fix gaps revealed by the test.
        Step 10: Gradually reduce your operational involvement.
        Step 11: Redirect time to unique ability activities only.
      domain: business-strategy
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_5_-_Selling_Your_Business_and_Creating_Legacy_Dollars.txt"

    - id: "MET-NN-023"
      title: "Award and Recognition Acquisition Methodology"
      content: >
        Methodology for winning awards and recognition to build authority:
        Step 1: Research all awards available in your industry.
        Step 2: Identify awards you're already qualified for.
        Step 3: Submit applications with strong stories and results.
        Step 4: Create award-worthy initiatives if needed (community service, innovation).
        Step 5: Leverage any win across all marketing channels immediately.
        Step 6: Add to media kit, website, email signature.
        Step 7: Use award as PR angle for additional media coverage.
        Step 8: Nominate clients for awards (builds goodwill and their success story).
        Step 9: Create internal awards program for your community.
        Step 10: Stack awards over time - each one adds to the authority stack.
      domain: celebrity-branding
      source_file: "celebrity-branding-blueprint/hd-video/transcription_mp4_Stage_3_-_Developing_Your_Celebrity_Expert_Status.txt"

    - id: "MET-NN-024"
      title: "Email Marketing and Newsletter Methodology"
      content: >
        Complete methodology for email marketing as celebrity expert:
        Step 1: Choose email platform and set up.
        Step 2: Create lead magnets for each audience segment.
        Step 3: Build capture forms on every page of website.
        Step 4: Write welcome sequence (introduce yourself via story).
        Step 5: Create weekly newsletter (cup of coffee with a friend tone).
        Step 6: Mix content: 80% value/story, 20% offer.
        Step 7: Segment list based on interests and behavior.
        Step 8: Use storytelling in every email (hook with story, then teach/offer).
        Step 9: Track open rates, click rates, conversion rates.
        Step 10: Clean list quarterly (remove inactive subscribers).
        Step 11: Test subject lines, send times, content types.
        Step 12: Guard list as your most valuable business asset.
      domain: marketing
      source_file: "celebrity-branding-blueprint/bonus/transcription_mp4_Building_Your_Online_Legend.txt"

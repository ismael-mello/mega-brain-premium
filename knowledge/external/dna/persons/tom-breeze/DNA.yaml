# ═══════════════════════════════════════════════════════════════════════════
# L1: PHILOSOPHIES (Core Beliefs & Worldview)
# ═══════════════════════════════════════════════════════════════════════════
philosophies:
  - id: FIL-TB-001
    title: "Start With The User"
    content: "Always begin by understanding who's out there and what they want. Don't start with your product and try to push it — start with the customer and figure out how your products fit into what they're already looking for."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: FIL-TB-002
    title: "YouTube Is Active Intent, Not Passive Interest"
    content: "People go to YouTube because they're in a motivated state — looking to learn, do, or buy something. They're in active intent mode, not scrolling passively like on Facebook. This makes the closing a logical next step because they WANT to find out more."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: youtube-advertising

  - id: FIL-TB-003
    title: "Be There And Be Useful"
    content: "When people see your ad, it should not be a straight pitch. It should provide actually useful content. If they're in active intent mode searching for what you can help with, give them information that's going to help them. Value first, pitch second."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: video-marketing

  - id: FIL-TB-004
    title: "YouTube Rewards Good Ads"
    content: "YouTube algorithmically rewards video ads that people actually watch. Good view rates = more scale, lower costs. Bad ads with just a sales pitch get fatigue in days. Good content ads last months without needing replacement."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: FIL-TB-005
    title: "YouTube Is An Expanding Platform"
    content: "Unlike Facebook's single newsfeed where everyone competes, YouTube's inventory is always expanding. More videos uploaded = more places to advertise. It's like hundreds of main streets where you can put your billboards. Now is the time because 9 out of 10 brands are NOT there when customers are looking."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: FIL-TB-006
    title: "Advertising Is About Human Moments, Not Data"
    content: "Strip away all the jargon and complexity. Imagine it was 20 years ago in a physical store. How would you talk to a window shopper vs someone at checkout? It's people behind the data, not clicks on a page."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: video-marketing

  - id: FIL-TB-007
    title: "The Customer Moment Game"
    content: "YouTube advertising is a game of customer moments. Map out what your customer is doing when they pick up their phone and search. If you can intercept their moment EARLIER than competitors anticipate, you open up massive scale."
    source: "YouTube Ad Workshop / Module 1 + Bonus"
    domain: youtube-advertising

  - id: FIL-TB-008
    title: "One Video, Three Ads"
    content: "Film one complete video with all three sections (Schema Violation + Education + CTA), then in editing, cut it into three different ads for three different audiences. Efficiency in production, precision in targeting."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative

  - id: FIL-TB-009
    title: "The Barrier Is The Moat"
    content: "YouTube ads are harder than Facebook ads because you need both creative (video) and targeting married up. This barrier means less competition — when everyone zigs with Facebook, you zag with YouTube."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: FIL-TB-010
    title: "Just Make The Damn Thing"
    content: "Don't overthink video length or production quality. Just make it and test with $10-20/day. You don't have to spend a ton of money to figure out what works. Start small, find what works, then scale."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: ad-creative

# ═══════════════════════════════════════════════════════════════════════════
# L2: MENTAL MODELS (Thinking & Decision Frameworks)
# ═══════════════════════════════════════════════════════════════════════════
mental_models:
  - id: MM-TB-001
    title: "Three Shopper Types"
    content: "Every customer is in one of three states: (1) WINDOW SHOPPER — interested but not engaged, walking past your store; (2) IN-STORE SHOPPER — doing research, asking questions, comparing options; (3) CHECKOUT SHOPPER — decision made, credit card in hand, just needs final confidence."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: MM-TB-002
    title: "Customer Moment Theory"
    content: "People go to YouTube for 4 reasons: Want to KNOW something, Want to DO something, Want to BUY something, or Want to be INSPIRED. The first three make up ~47% of all YouTube traffic and are the gold mine for advertisers."
    source: "YouTube Ad Workshop / Module 2: Research"
    domain: audience-targeting

  - id: MM-TB-003
    title: "Schema Violation Psychology"
    content: "A 'schema' is a mental shortcut about how things work (like opening a door). When you VIOLATE that schema — do something unexpected — two things happen: (1) attention locks 100% on the task, and (2) the brain opens a learning portal, ready to absorb anything. This is how to grab attention in the first 5 seconds."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative

  - id: MM-TB-004
    title: "Cold→Warm→Hot Traffic Mapping"
    content: "Window shoppers = cold traffic (need Schema Violation + Education + CTA). In-store shoppers = warm traffic (need Education + CTA only). Checkout shoppers = hot traffic (need CTA only). Match your ad creative to the temperature of the audience."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: MM-TB-005
    title: "YouTube vs Facebook Distinction"
    content: "Facebook: people are passive, you interrupt them with your product. YouTube: people are active, searching for information. Facebook is cheaper per lead but YouTube has higher ROI through the funnel because the intent quality is higher."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: paid-media

  - id: MM-TB-006
    title: "Expanding Inventory Model"
    content: "Facebook = one newsfeed, increasing competition. YouTube = hundreds of main streets that keep growing as more videos are uploaded. Every new viral video is a new advertising opportunity. The platform expands, not contracts."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: MM-TB-007
    title: "Session-Based Targeting"
    content: "YouTube/Google tracks what people search within a 'session' (30-60 minutes). If someone searched a keyword on Google and then went to YouTube, you can still show them your ad. This cross-platform session tracking is incredibly powerful."
    source: "YouTube Ad Workshop / Module 1 + Module 4"
    domain: audience-targeting

  - id: MM-TB-008
    title: "The CPA Agency Model"
    content: "Instead of charging monthly fees or percentage of ad spend, work on a cost-per-acquisition model. Client defines what they'll pay per lead/sale — you deliver at or under that number. Aligns incentives, zero risk for client, grows as they grow."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: paid-media

  - id: MM-TB-009
    title: "Offline-To-Online Translation"
    content: "Every digital targeting option has an offline equivalent. Remarketing = following someone who left your store. Keywords = someone asking a specific question. Placements = putting your billboard on a specific street. Simplify by thinking offline first."
    source: "YouTube Ad Workshop / Module 1 + Bonus"
    domain: audience-targeting

  - id: MM-TB-010
    title: "The Advertorial Model (Ogilvy)"
    content: "David Ogilvy wrote advertorials in newspapers — articles that educated while selling. YouTube video ads are the modern equivalent. Include a claim ('here's X things we learned'), quick credibility, remarkable content, then CTA."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative

# ═══════════════════════════════════════════════════════════════════════════
# L3: HEURISTICS (Practical Rules & Decision Shortcuts)
# ═══════════════════════════════════════════════════════════════════════════
heuristics:
  - id: HEUR-TB-001
    title: "TrueView Billing Rule"
    content: "You only pay when someone watches past 30 seconds of your in-stream ad OR clicks to your website. If they skip at 29 seconds, it costs $0. This means you can get massive free brand exposure."
    source: "YouTube Ad Workshop / Module 1 + Bonus: Frank Kern"
    domain: youtube-advertising
    type: numeric

  - id: HEUR-TB-002
    title: "Session Window = 30-60 Minutes"
    content: "Keyword targeting works within a session window of approximately 30-60 minutes. If someone typed a keyword on Google or YouTube within that window, your ad can still reach them even on unrelated videos."
    source: "YouTube Ad Workshop / Module 1 + Module 4"
    domain: audience-targeting
    type: numeric

  - id: HEUR-TB-003
    title: "Start Campaigns at $10-20/Day"
    content: "Don't start with massive budgets. Begin at $10-20/day per campaign to test targeting and creative. YouTube can spend money fast because of huge inventory. Find what works first, then scale."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: youtube-advertising
    type: numeric

  - id: HEUR-TB-004
    title: "Video Length: Under 4 Minutes For Full Ads"
    content: "Try to keep even the longest video ads under 4 minutes when covering all three sections (Schema Violation + Education + CTA). For checkout audiences, it can be as short as 20-30 seconds."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative
    type: numeric

  - id: HEUR-TB-005
    title: "Script Target: 90 Seconds Or Less"
    content: "After drafting your video ad script using the ADUCATE framework, condense and delete until it reads well at 90 seconds or less. This creates a 'power script.'"
    source: "YouTube Ad Workshop / Video Ad Scripting Process"
    domain: video-scripting
    type: numeric

  - id: HEUR-TB-006
    title: "Quick Credibility = 1-2 Sentences Max"
    content: "Don't spend 6 minutes bragging about yourself. Quick credibility means ONE sentence: 'This comes from a presentation I delivered to 600 people in London.' Then move on. Overdoing credibility actually reduces trust."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative
    type: qualitative

  - id: HEUR-TB-007
    title: "Three Yes Questions Before The Ask"
    content: "Once someone says 'yes' three times internally, it's very hard to say 'no.' Structure your script to get three internal agreements before making your call to action."
    source: "YouTube Ad Workshop / Video Ad Drafting"
    domain: video-scripting
    type: numeric

  - id: HEUR-TB-008
    title: "Similar Audiences = 10x Your List"
    content: "Upload a customer list of 50,000 people to Google, and they'll build a similar audience of 500,000. It's 10x the uploaded size. These audiences are typically very high quality on YouTube."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: audience-targeting
    type: numeric

  - id: HEUR-TB-009
    title: "Custom Affinity Can Scale to $20K/Day"
    content: "When you build custom affinity audiences based on keywords, websites, and apps, the scale is 'ridiculously big.' This is where agencies can push $20,000+ per day in ad spend profitably."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: audience-targeting
    type: numeric

  - id: HEUR-TB-010
    title: "Future Pace The CTA"
    content: "Don't just say 'click the link.' Say: 'Once you click this, you'll see a page. Fill in your details here, and then you'll get access to...' Future pacing what happens after the click dramatically improves conversion."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative
    type: qualitative

  - id: HEUR-TB-011
    title: "Placements First, Keywords Second"
    content: "Start with placement targeting (specific video URLs) — easier to get very good results but limited scale. Then move to keyword targeting for broader reach. Placements validate your offer, keywords scale it."
    source: "YouTube Ad Workshop / Module 4: Setting Up"
    domain: youtube-advertising
    type: qualitative

  - id: HEUR-TB-012
    title: "The 'Power Of But' Principle"
    content: "People remember what comes AFTER 'but.' Instead of 'The plan looks positive, but it takes time to implement,' say 'It takes time to implement, but the plan looks very positive.' Put the positive after the but."
    source: "YouTube Ad Workshop / Video Ad Drafting"
    domain: video-scripting
    type: qualitative

  - id: HEUR-TB-013
    title: "Use 'Because' — People Need Reasons"
    content: "People always need a reason, even if it doesn't make total sense. Use the word 'because' in your script because it simply works. Viewers emotionally want you to be their answer — give their brain a logical explanation."
    source: "YouTube Ad Workshop / Video Ad Drafting"
    domain: video-scripting
    type: qualitative

  - id: HEUR-TB-014
    title: "YouTube CPC Is Higher But Funnel ROI Is Better"
    content: "YouTube may cost more per initial lead than Facebook ($16 vs lower on FB), but people who convert from YouTube give more money through the funnel. Frank Kern: $16/book buyer on YouTube vs $23 on Facebook, with 25% immediate ROI on total spend."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: paid-media
    type: numeric

  - id: HEUR-TB-015
    title: "Pareto Research: 20% Effort → 80% Results"
    content: "Don't spend weeks on research before your first campaign. 20% of research drives 80% of results. Do rapid keyword research, launch, then let campaign data guide further optimization."
    source: "YouTube Ad Workshop / Module 2: Research"
    domain: youtube-advertising
    type: qualitative

  - id: HEUR-TB-016
    title: "No Ad Fatigue Like Facebook"
    content: "YouTube doesn't suffer the same ad fatigue as Facebook because you're reaching fresh people searching for information, not bombarding the same audience based on interests. Good ads can run for months without replacement."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: youtube-advertising
    type: qualitative

  - id: HEUR-TB-017
    title: "Tee-Up Statements Refresh Attention"
    content: "Use tee-up phrases throughout your script to refresh viewer attention: 'Here's why this is important...', 'Here's what you ought to know...', 'If you take one thing from this video, this is it...', 'Here's why most people get this bit wrong...'"
    source: "YouTube Ad Workshop / Video Ad Drafting"
    domain: video-scripting
    type: qualitative

  - id: HEUR-TB-018
    title: "'So You Can' Keeps Focus On Viewer"
    content: "Use the phrase 'so you can' obsessively to keep everything focused on the viewer and their benefit. Video moves fast — viewers need constant reminding of what's in it for them."
    source: "YouTube Ad Workshop / Video Ad Drafting + Bonus Russell Brunson"
    domain: video-scripting
    type: qualitative

  - id: HEUR-TB-019
    title: "22-Second Free Traffic Hack"
    content: "Create a 22-second video ad with a clickable end screen. If someone clicks the end screen link, it's free. The ad is under 30 seconds so you don't get charged for a view. You only pay if they watch past 30 seconds."
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: youtube-advertising
    type: numeric

  - id: HEUR-TB-020
    title: "1600+ Topics Available"
    content: "Google has over 1,600 predefined topic categories for YouTube ad targeting. These are far more detailed than YouTube creator categories and cover most business niches."
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: audience-targeting
    type: numeric

# ═══════════════════════════════════════════════════════════════════════════
# L4: FRAMEWORKS (Structured Methodologies)
# ═══════════════════════════════════════════════════════════════════════════
frameworks:
  - id: FW-TB-001
    title: "ADUCATE Framework (Video Ad Scripting)"
    content: |
      7-step framework for scripting YouTube video ads:
      A — AIM: What is the viewer looking for? What's the initial benefit?
      D — DIFFICULTY: What's standing in their way? Why are they searching online?
      U — UNDERSTAND: Show you understand how they feel. "Yeah, that's exactly how I feel!"
      C — CREDIBILITY: 1-2 sentences showcasing expertise. Quick, then move on.
      A — ACTION PLAN: Simple 3-4 step plan. Even if complex, break it down simply.
      T — TEACH: Pull incredible value. Tips, advice, perspective shifts in 30-45 seconds.
      E — EXIT: Clear CTA. What offer? What steps? What do they gain? What do they lose?
    source: "YouTube Ad Workshop / Video Ad Scripting Process"
    domain: video-scripting

  - id: FW-TB-002
    title: "Perfect Video Ad Structure"
    content: |
      Three-section framework for YouTube video ads:
      1. SCHEMA VIOLATION — Do something unexpected but related to your message.
         Purpose: Lock attention + open learning portal in the brain.
         Example: Frank Kern's strip club story that leads into sales training.
      2. EDUCATION — Provide genuinely useful content (Ogilvy advertorial style).
         Include: Claim ("here's 3 things") + Quick credibility + Remarkable content.
         Use "so you can" to tie back to viewer benefits.
      3. CALL TO ACTION — Make it logical, clear, and future-paced.
         Tell them exactly what happens when they click.
         Use end screens for mobile+desktop+tablet compatibility.
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative

  - id: FW-TB-003
    title: "Three-Tier Ad Structure (One Video, Three Ads)"
    content: |
      Film one video with all three sections, then edit into three ads:
      WINDOW SHOPPER AD (cold): Schema Violation + Education + CTA (full video)
      IN-STORE SHOPPER AD (warm): Education + CTA (cut schema violation)
      CHECKOUT SHOPPER AD (hot): CTA only (cut schema violation + education)
      Rule: Each section must stand alone as its own starting point.
      Start new sentences clearly so edits sound natural.
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative

  - id: FW-TB-004
    title: "Targeting Hierarchy (Launch Strategy)"
    content: |
      Progressive targeting approach from most precise to broadest:
      LEVEL 1: Placement Targeting — Select specific video URLs. Highest ROI, lowest scale.
      LEVEL 2: Keyword Targeting — Target by search terms within sessions. Good balance.
      LEVEL 3: Custom Intent — Build audiences from keyword + website + video behavior.
      LEVEL 4: In-Market Audiences — People with recent behavioral change (7-14 days).
      LEVEL 5: Custom Affinity — Build interest audiences from websites/keywords/apps. Massive scale.
      LEVEL 6: Affinity Audiences — Google's predefined interest categories. Biggest scale.
      Start at Level 1-2, scale through the levels as data accumulates.
    source: "YouTube Ad Workshop / Module 4: Setting Up"
    domain: audience-targeting

  - id: FW-TB-005
    title: "Customer Moment Mapping"
    content: |
      Map ALL customer moments for your product/service:
      1. Identify the end goal (buying your product/service)
      2. Work backwards through all possible search moments
      3. Categorize each: Checkout (ready to buy) / In-Store (researching) / Window (interested)
      4. For each moment, define: What would they type? What video would help?
      5. Create ads that intercept earlier moments than competitors target
      Example (Marathon): "best running shoes" (checkout) → "how to avoid back pain running" (in-store) → "how to run a marathon" (window)
      The earlier you intercept, the more scale and less competition.
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: FW-TB-006
    title: "5½ Power Statements"
    content: |
      Scripting power techniques to amplify your video ad:
      1. POWER OF BUT — Put positive after "but" (people remember what follows "but")
      2. BECAUSE — Always give a reason, even simple ones. "Because" triggers compliance.
      3. YES SET — Get 3 internal "yes" answers before your ask. Hard to say "no" after 3 yeses.
      4. IGNITE IDEAL IDENTITY — Appeal to who they want to be. "The best advertisers take action."
      5. SO YOU CAN — Keep refocusing on viewer benefits. "So you can achieve..."
      ½. TEE-UP STATEMENTS — Refresh attention: "Here's why this is important...", "If you take one thing..."
    source: "YouTube Ad Workshop / Video Ad Drafting"
    domain: video-scripting

  - id: FW-TB-007
    title: "Rapid Research Method"
    content: |
      Fast keyword research for YouTube campaigns (Pareto 80/20 approach):
      1. Brainstorm 3 types of keywords your customer would type:
         - WANT TO KNOW: "parenting advice", "how does X work"
         - WANT TO DO: "how to get baby to sleep", "how to fix X"
         - WANT TO BUY: "baby sleep product reviews", "X vs Y comparison"
      2. Fill Google Sheet with keywords per category (max 10-15 minutes)
      3. Use YouTube search predictor to expand keywords
      4. Qualify keywords by checking search volume on YouTube
      5. Launch with top keywords, let campaign data drive further research
      Don't over-research. 20% of research = 80% of results.
    source: "YouTube Ad Workshop / Module 2: Research"
    domain: audience-targeting

  - id: FW-TB-008
    title: "YouTube Targeting Layer Cake"
    content: |
      All available targeting dimensions that can be layered:
      DEMOGRAPHIC: Age brackets, Gender, Household Income, Parental Status
      BEHAVIORAL: Keywords, Topics, In-Market, Affinity, Custom Affinity, Custom Intent
      CONTEXTUAL: Placements (specific videos), Channel targeting
      REMARKETING: Website visitors, Video viewers, Customer Match (email upload)
      EXPANSION: Similar Audiences (10x uploaded list)
      SCHEDULING: Time of day, Day of week, Device type, Location (down to zip code)
      Layer these for precision: e.g., In-market + male + 25-34 + mobile
    source: "YouTube Ad Workshop / Module 1 + Module 4"
    domain: audience-targeting

# ═══════════════════════════════════════════════════════════════════════════
# L5: METHODOLOGIES (Step-by-Step Implementations)
# ═══════════════════════════════════════════════════════════════════════════
methodologies:
  - id: MET-TB-001
    title: "Video Ad Scripting Process (3-Step)"
    content: |
      STEP 1 — NOTE TAKING (10-15 min max):
      Answer these questions (no wrong answers, brainstorm freely):
      - AIM: What is your viewer looking for? What's the initial benefit?
      - DIFFICULTY: What's standing in their way? Can you personify this difficulty?
      - UNDERSTAND: What does it feel like when they can't achieve their aim?
      - CREDIBILITY: 1-2 sentences of proof you know what you're doing.
      - ACTION PLAN: Break your solution into 3-4 simple steps.
      - TEACH: What's your best tip/advice/perspective shift?
      - EXIT: What's the offer? Steps to access? What they gain/lose?

      STEP 2 — DRAFTING THE SCRIPT:
      Use power statement templates:
      - Aim: "Did you know..." / "If you're looking to..."
      - Difficulty: "But here's the problem..."
      - Understand: "Look... I/we get it. It can feel ___ because ___."
      - Credibility: "As a ___, I have helped..." / "Here at ___, we have helped..."
      - Action Plan: "The way this works is actually pretty simple. First... second... third..."
      - Teach: "Here's the great thing, each step is really easy. Let me walk you through..."
      - Exit: "If you've found this useful, you're going to love what I have for you next..."

      STEP 3 — GETTING CREATIVE:
      Condense and delete until it reads well aloud at 90 seconds or less.
      Apply 5½ Power Statements. Read aloud multiple times.
      Result: A power script ready for filming.
    source: "YouTube Ad Workshop / Video Ad Scripting Process + Video Ad Drafting"
    domain: video-scripting

  - id: MET-TB-002
    title: "Placement-First Campaign Launch"
    content: |
      Step-by-step to launch your first YouTube ad campaign:
      1. RESEARCH (15 min): Brainstorm Want to Know/Do/Buy keywords
      2. FIND PLACEMENTS: Search keywords on YouTube, find top videos with ads enabled
      3. COLLECT URLs: Copy specific video URLs you want to advertise in front of
      4. CREATE AD: Film one video using Perfect Video Ad Structure
      5. EDIT INTO 3: Create window/in-store/checkout versions
      6. SET UP CAMPAIGN: Google Ads → Video campaign → In-stream
      7. ADD PLACEMENTS: Paste your collected video URLs
      8. SET BUDGET: $10-20/day per campaign
      9. LAUNCH: Run for 3-7 days minimum
      10. OPTIMIZE: Check which placements convert → scale winners, cut losers
      11. EXPAND: Once placements work, add keyword targeting campaigns
      12. SCALE: Move through targeting hierarchy (Custom Intent → In-Market → Affinity)
    source: "YouTube Ad Workshop / Module 2 + Module 4"
    domain: youtube-advertising

  - id: MET-TB-003
    title: "Customer Moment Mapping Process"
    content: |
      How to map all customer moments for your business:
      1. Define your product/service
      2. Identify the CHECKOUT moment — what would they search when ready to buy?
         Example: "Nike free run marathon shoes" / "buy [product name]"
      3. Identify the IN-STORE moment — what would they research before buying?
         Example: "best running shoes for marathons" / "[product] vs [competitor]"
      4. Identify the WINDOW moment — what's the EARLIEST search related to your product?
         Example: "how to run a marathon" / "how to [achieve the goal your product serves]"
      5. For each moment, create a video ad with appropriate structure:
         - Checkout: CTA only (short, direct)
         - In-Store: Education + CTA (give advice, demonstrate expertise)
         - Window: Schema Violation + Education + CTA (full creative treatment)
      6. Map targeting options to each moment:
         - Checkout: Keywords (brand + product names) + Placements
         - In-Store: Keywords (how-to, comparison) + Custom Intent
         - Window: Keywords (broad problem) + In-Market + Custom Affinity
      7. Launch checkout campaigns first (highest conversion), then work backwards
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: youtube-advertising

  - id: MET-TB-004
    title: "Schema Violation Creation Process"
    content: |
      How to create an attention-grabbing opening for your video ad:
      1. IDENTIFY the expected (what people normally see in your niche)
      2. DO SOMETHING UNEXPECTED — but it MUST be related to your message
      3. The unexpected element should create a "Wait, what?" reaction
      4. Immediately transition into your content (education section)
      5. The schema violation creates two effects:
         a) Attention locks 100% on the task
         b) Brain opens a "learning portal" — viewer will absorb anything you teach next
      Examples:
      - Frank Kern: "I was kicked out of a strip club in the daytime on a Monday while working" → leads into sales training
      - Pattern interrupts work like Tony Robbins' interventions
      - The unexpected + related = memorable and educational (like the Milky Way ad remembered decades later)
      Rule: The violation must be RELATED to your content or it's just random.
    source: "YouTube Ad Workshop / Bonus: Strategy With Russell Brunson"
    domain: ad-creative

  - id: MET-TB-005
    title: "Book Funnel + YouTube Traffic Strategy (Frank Kern Case Study)"
    content: |
      Proven funnel structure with YouTube ads (Frank Kern's $138K/month example):
      TRAFFIC: YouTube in-stream ads → targeting keywords + placements
      FRONT-END: $5.60 book (long-form 10-page sales letter)
      UPSELL 1: ReFrame product — $297 (or 3 × $97 downsell)
      UPSELL 2: Video Blackbox — 2 × $97
      BACKEND: Automated webinar registration (thank you page) → Client Acquisition System $1,860
      NUMBERS (October):
      - YouTube spend: $29,319 | Facebook spend: $51,496
      - Collected revenue: $100,736 + $30,885 receivables + $6,984 month 2
      - YouTube CPA for book buyer: $16 (vs $23 on Facebook)
      - Immediate ROI: ~25% on total ad spend
      KEY INSIGHT: YouTube cost per book buyer is LOWER than Facebook AND converts better through the funnel.
    source: "YouTube Ad Workshop / Bonus: Strategy With Frank Kern"
    domain: youtube-advertising

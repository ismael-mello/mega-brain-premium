  sintese: |
    Sam Ovens built Consulting.com from his parents garage in New Zealand into a $30M+ business.
    His cognitive DNA spans the full consulting lifecycle: mindset foundations (W1-W2), sales as
    diagnosis (W3), client acquisition organic and paid (W4-W5), service delivery and operations
    (W6), and productization for exponential scale (W7). Core philosophy: every offer is a Bridge
    between Current State and Desired State. Purple Ocean positioning combines Red Ocean validation
    with Blue Ocean differentiation. Deeply influenced by first-principles thinking, pattern
    recognition from nature, and the belief that identity transformation precedes business success.
    Favors DWY (Done With You) models, minimum viable service delivery, and systematic productization.


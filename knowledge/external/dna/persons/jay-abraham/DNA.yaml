# ═══════════════════════════════════════════════════════════════
# L1: PHILOSOPHIES (35 elements)
# ═══════════════════════════════════════════════════════════════
philosophies:
  - id: JA-PHI-001
    name: "Value Creation as Life Purpose"
    description: "We are rewarded and successful in direct proportion to the problems we solve for others — the quantity, quality, and significance of problems solved and opportunities created."
    source: CYBS Module 1

  - id: JA-PHI-002
    name: "Be a Multiplier, Not a Diminisher"
    description: "A multiplier makes everything better — clients feel better, products improve lives, employees are respected, industries are elevated. The opposite is a diminisher who treats business as commodity."
    source: CYBS Module 1

  - id: JA-PHI-003
    name: "Aikido Business Philosophy"
    description: "Use negatives, problems, and weaknesses as your greatest opportunity. Like Aikido martial arts, turn the force of problems back to your advantage. No resources = great advantage through partnerships."
    source: CYBS Module 1

  - id: JA-PHI-004
    name: "98/2 Rule of Business Control"
    description: "98% of what happens in business is the direct result of actions you take or don't take. Only 2% are acts of God beyond your control."
    source: CYBS Module 2

  - id: JA-PHI-005
    name: "Strategy of Preeminence"
    description: "Be the most trusted advisor to your marketplace. Put the client's best interest ahead of your own, always. This is not manipulation — it is contribution and service."
    source: CYBS Module 10, Workbook

  - id: JA-PHI-006
    name: "Business Must Work Harder For You"
    description: "Either you work very hard for your business, or you engineer a business model that works harder for you. The latter is totally possible through understanding forces, factors, and principles."
    source: CYBS Module 2

  - id: JA-PHI-007
    name: "Human Beings Are Silently Begging to Be Led"
    description: "People are constantly, silently begging to be led to answers, solutions, ways to realize opportunities. They only trust people who have their best interest at heart."
    source: CYBS Module 2

  - id: JA-PHI-008
    name: "Marketing Is Education, Not Manipulation"
    description: "Marketing is educating people to realize they have unfilled problems/desires, intensifying that recognition, proving solutions exist, and demonstrating you understand their circumstance better than anyone."
    source: CYBS Module 6

  - id: JA-PHI-009
    name: "Never Jeopardize Everything"
    description: "Never put your entire life in financial jeopardy for a business. Those who bet everything and lost didn't just lose money — they lost their entrepreneurial spirit forever."
    source: CYBS Module 3

  - id: JA-PHI-010
    name: "Maximum Ethical Advantage"
    description: "Your job is to put maximum ethical advantage in your hands and move maximum ethical disadvantage to competitors. Always ethical, but always strategic."
    source: CYBS Module 2, LIS Keynote

  - id: JA-PHI-011
    name: "Safe Progressive Stair-Stepping"
    description: "Never try to pole vault to success. Take safe, short, predictable steps. Build stable, predictable, solid revenue behind you at all times before reaching for the next level."
    source: CYBS Module 3

  - id: JA-PHI-012
    name: "Movement Over Meditation"
    description: "More is accomplished in business by movement — forward movement, taking action, committing, executing — than is ever achieved by meditation."
    source: CYBS Module 6, Module 12

  - id: JA-PHI-013
    name: "Preeminence Over Competition"
    description: "The goal is to be preeminent — not just different, but advantageously superior. You are paid in business to think better than your competitors."
    source: CYBS Module 6

  - id: JA-PHI-014
    name: "All of Life Is Theater"
    description: "We're all actors telling stories — not fake stories, but real stories that become the story of our business life. The story you tell is the story you sell."
    source: CYBS Module 4

  - id: JA-PHI-015
    name: "Break Even Front End, Fortune on Back End"
    description: "Spend all profit on the first sale through advertising, commissions, or partnerships. The sooner you get the first sale, the sooner you get the second and third."
    source: CYBS Module 7

  - id: JA-PHI-016
    name: "Relational Capital as Infinite Resource"
    description: "Any resource you think you don't have — capital, salespeople, products, marketing, credibility — someone else already possesses it. Structure a deal to access it."
    source: CYBS Module 9

  - id: JA-PHI-017
    name: "Everybody Matters"
    description: "Everyone matters — clients, team, vendors, community. The housekeeper matters as much as the CEO. Show genuine concern for all."
    source: CYBS Module 11

  - id: JA-PHI-018
    name: "Trust as Geometric Multiplier"
    description: "High-trust companies TRIPLE results of low-trust competitors — 3x revenue, 3x margins, 3x retention. Trust is a multiplier, distrust is a diminisher."
    source: CYBS Module 11

  - id: JA-PHI-019
    name: "Referral as Benevolent Obligation"
    description: "Asking for referrals is not overstepping — it is your benevolent obligation. You owe it to your customers' families, friends, and associates to arrange the opportunity for them to benefit from you."
    source: CYBS Workbook

  - id: JA-PHI-020
    name: "Ferrari with a 4-Cylinder Engine"
    description: "Most businesses are Ferraris unknowingly powered by a 4-cylinder engine. The body is capable of greatness, but the growth engine is dramatically underperforming. Replace with a 16-cylinder supercharged engine."
    source: LIS Keynote

  - id: JA-PHI-021
    name: "Successfully Stuck"
    description: "Most successful companies are 'successfully stuck.' Compounding at 20-30-40%, but accepting a fraction of what their assets, people, and relationships could deliver."
    source: LIS Keynote

  - id: JA-PHI-022
    name: "Duality Principle"
    description: "Everything you do in business should have duality — cash flow enhancing AND asset value building. Same effort should accomplish both simultaneously."
    source: LIS Keynote

  - id: JA-PHI-023
    name: "Business as Hedge Fund"
    description: "Think like a hedge fund manager — focus on maximum upside with minimum downside risk. Allocate resources based on yield-to-risk ratios, not arbitrary decisions."
    source: LIS Keynote

  - id: JA-PHI-024
    name: "Spending vs Investing"
    description: "Spending is speculating for unpredictable returns. Investing is utilizing capital for highly predictable, measurable returns. Most businesses spend when they should invest."
    source: LIS Keynote

  - id: JA-PHI-025
    name: "Everything Is an Asset with a Return"
    description: "Effort, time, media, salespeople, buyers, distribution channels, testimonials — ALL are assets that should be measured for yield. If you're not measuring the return, you're wasting the asset."
    source: LIS Keynote

  - id: JA-PHI-026
    name: "Exponential Zone vs Incremental Zone"
    description: "Always operate in the exponential zone, not the incremental zone. Leverage multiple growth levers simultaneously for compounding effects far beyond linear efforts."
    source: LIS Keynote

  - id: JA-PHI-027
    name: "Tom Sawyer School of Business"
    description: "Joint ventures are the Tom Sawyer approach — instead of doing everything yourself, get others to do it while you orchestrate. The ultimate moneymaking approach."
    source: CYBS Workbook

  - id: JA-PHI-028
    name: "USP as Nucleus of Success"
    description: "The USP is the nucleus around which you build success, fame, and wealth. If you can't state it, your prospects won't see it."
    source: CYBS Workbook

  - id: JA-PHI-029
    name: "Grow or Die"
    description: "You grow or you die. You don't stay static. Growth means understanding, ability, respect, trustworthiness, relationships, and knowledge base."
    source: CYBS Module 11

  - id: JA-PHI-030
    name: "Wrong Assumptions = Wrong Everything"
    description: "If any assumptions are wrong — about revenue, marketing, clients, value creation — every assumption and action that follows is wrong. Challenge foundational assumptions first."
    source: LIS Keynote

# ═══════════════════════════════════════════════════════════════
# L2: MENTAL MODELS (30 elements)
# ═══════════════════════════════════════════════════════════════
mental_models:
  - id: JA-MM-001
    name: "Three Ways to Grow a Business"
    description: "Only 3 ways: (1) Increase number of buyers, (2) Increase average transaction size, (3) Increase frequency of repurchase. Multiplied together = geometric growth."
    source: CYBS Module 2, Module 7

  - id: JA-MM-002
    name: "Power Parthenon vs Diving Board"
    description: "Diving Board = one revenue source (fragile). Parthenon = multiple pillars (resilient). Like the Greek Parthenon — still standing after thousands of years. Each pillar adds revenue AND safety."
    source: CYBS Module 2, Module 6, Module 7

  - id: JA-MM-003
    name: "Lifetime Value of a Client (LTV)"
    description: "Know how much different types and sources of buyers are worth in ongoing revenue minus costs. Without LTV you cannot determine acquisition investment. Not all buyers are equal."
    source: CYBS Module 7, LIS Keynote

  - id: JA-MM-004
    name: "Allowable Acquisition Cost Theory"
    description: "Gives your business an unlimited marketing budget. By knowing LTV across buyer categories, mathematically determine what to invest per acquisition. Turns marketing from arbitrary expense to calculated investment."
    source: LIS Keynote

  - id: JA-MM-005
    name: "The Gap/Delta Model"
    description: "Where you are = 'here.' Where you want to be = 'there.' The differential = delta. Most try to close the gap dangerously fast. Instead, stair-step methodically with stable revenue behind you."
    source: CYBS Module 3

  - id: JA-MM-006
    name: "Lock/Canal Progression"
    description: "Like ships through Panama Canal locks, success happens through progressive steps. Can't go from one ocean to another directly. Each lock raises you higher systematically."
    source: CYBS Module 1

  - id: JA-MM-007
    name: "Toll Position Mental Model"
    description: "Create 'toll booth' positions — recurring situations where you extract value from ongoing transactions. Multiple toll positions = multiple income streams."
    source: CYBS Module 3

  - id: JA-MM-008
    name: "Sunk Cost Opportunity"
    description: "Most companies spend more acquiring people who DON'T buy than those who do. 1000 leads, 4% close = 960 non-buyers with sunk investment = massive untapped opportunity."
    source: CYBS Module 3

  - id: JA-MM-009
    name: "Before/During/After/Instead Purchase Model"
    description: "Know what buyers purchase BEFORE, DURING, AFTER, and INSTEAD of your product. Most preemptive: own what they buy BEFORE — you have access before anyone else."
    source: CYBS Module 2, LIS Keynote

  - id: JA-MM-010
    name: "Four/Five Categories of Market Readiness"
    description: "(1) Unaware/uninterested, (2) Aware but uninterested, (3) Aware and interested but not motivated, (4) Motivated but not from you, (5) Ready to buy from you. Each needs different marketing."
    source: CYBS Module 6

  - id: JA-MM-011
    name: "Exponential vs Linear Thinking"
    description: "Never do anything incremental when you can do exponential. 3x3x3=27, not 1+1+1=3. This is the geometry of business — everything should produce multiplied results."
    source: CYBS Module 6

  - id: JA-MM-012
    name: "OPR (Other People's Resources)"
    description: "100+ categories of resources available through partnerships: sales forces, brand endorsements, licenses, distribution, technology, subscriber lists, manufacturing capacity. All without capital."
    source: CYBS Module 9, Workbook

  - id: JA-MM-013
    name: "Good vs Bad Leverage (Cholesterol Metaphor)"
    description: "Bad leverage = debt obligations hoping for appreciation. Good leverage = capitalizing on underutilized assets with no fixed obligation. Pay only after results."
    source: CYBS Workbook

  - id: JA-MM-014
    name: "Fixed Overhead Leverage"
    description: "Once above fixed overhead, each additional sale becomes enormously profitable because servicing cost is very low. First sale covers overhead; subsequent sales are nearly pure profit."
    source: CYBS Module 7

  - id: JA-MM-015
    name: "Four Categories of Clients"
    description: "(1) Those who pay you, (2) Those you pay, (3) Your team members, (4) Community influencers. Serve ALL as trusted advisor."
    source: CYBS Module 10

  - id: JA-MM-016
    name: "Hindsight-Insight-Foresight Triad"
    description: "Three factors for continuous growth: Hindsight (learn from past), Insight (see current opportunities), Foresight (anticipate future changes in technology, consumer attitudes, competition)."
    source: CYBS Module 11

  - id: JA-MM-017
    name: "Preemptive Marketing"
    description: "Be first to tell the complete story of how your product is made/delivered. Schlitz beer told the same process all brewers used — went from #10 to #1 in 6 months by being first to articulate it."
    source: CYBS Module 4, Workbook

  - id: JA-MM-018
    name: "Dream 100 Customer Concept"
    description: "Target the BEST customers first. Best buyers buy faster, create social acceptance, refer more. Create a superior access vehicle to reach them."
    source: CYBS Workbook

  - id: JA-MM-019
    name: "Resistible Offers = Beatable Propositions"
    description: "If you don't make irresistible offers, by definition you're making resistible offers and beatable propositions. Not wordplay — it's how the market perceives you."
    source: LIS Keynote

  - id: JA-MM-020
    name: "97 Strategies → Best 7"
    description: "From 97 identified growth strategies, 7 are the best — easiest, most infallible, least effort and risk. Master these 7 rather than trying all 97."
    source: LIS Keynote

  - id: JA-MM-021
    name: "10x Bottom Line Easier Than 10x Top Line"
    description: "10x bottom line is much easier, safer, and doable than 10x top line. Use freed-up cash from bottom-line improvements to fund harder, riskier top-line growth."
    source: LIS Keynote

  - id: JA-MM-022
    name: "Lifestyle Entrepreneur Retirement Trap"
    description: "Making $500K-$1M/year but no asset value growth = when you retire, nothing. Must build compounding business value, not just cash flow."
    source: LIS Keynote

  - id: JA-MM-023
    name: "Cross-Industry Strategy Transfer"
    description: "Doing same as competitors but better = incremental. Doing something NO ONE in your industry does (imported from another) = geometric change."
    source: LIS (Tony Robbins about Jay)

  - id: JA-MM-024
    name: "Attention as Ultimate Scarce Resource"
    description: "Not time, not money — attention (undistracted time for meaningful progress on goals) is the only resource where demand always exceeds supply. Most entrepreneurs have 1-2 hours/day of true attention."
    source: LIS (Dr. Alan Barnard, endorsed by Jay)

  - id: JA-MM-025
    name: "Exploit Before Elevate"
    description: "Before getting MORE resources, first exploit what you have. Gap between current utilization and potential is usually enormous. 90% of daily activities may not contribute to your primary goal."
    source: LIS (Dr. Alan Barnard, endorsed by Jay)

  - id: JA-MM-026
    name: "Recursive Pareto (20% of 20% of 20%)"
    description: "Pareto applied recursively: 20% explains 80%. 4% explains 64%. ~1 change accounts for 50% of total improvement. Find that ONE change."
    source: LIS (Dr. Alan Barnard, endorsed by Jay)

  - id: JA-MM-027
    name: "Theory of Constraints — 5 Business Constraints"
    description: "Find in sequence: (1) Clear goal? (2) Market demand? (3) Capacity? (4) Supply? (5) Cash? Plus ultimate constraint: Management Attention. Whichever is limiting = THE one thing to focus on."
    source: LIS (Dr. Alan Barnard, endorsed by Jay)

  - id: JA-MM-028
    name: "Impossible Unless Framing"
    description: "Set impossible goals. Then ask: 'It's impossible UNLESS...' This question forces discovery of all conditions needed to make the impossible possible. Highest-leverage question for breakthrough thinking."
    source: LIS (Dr. Alan Barnard, endorsed by Jay)

  - id: JA-MM-029
    name: "Identity Selling"
    description: "Customers buy identities. Won't buy if brand identity doesn't match self-concept. Most powerful influence in human psyche is identity — need to stay consistent with who you are."
    source: LIS (Tony Robbins, endorsed by Jay)

  - id: JA-MM-030
    name: "Life Is the Dance Between Desire and Fear"
    description: "If you know what someone desires most and fears most, you know them. Master key to understanding any client or prospect."
    source: LIS (Tony Robbins, endorsed by Jay)

# ═══════════════════════════════════════════════════════════════
# L3: HEURISTICS (55 elements)
# ═══════════════════════════════════════════════════════════════
heuristics:
  - id: JA-HEUR-001
    name: "10-10-10 = 33% Growth"
    description: "Increase each of the 3 Ways by just 10% = 33.3% total growth (not 30%) due to compounding. 20-20-20 = 72.8%. Double all three = 800% growth."
    source: CYBS Module 6, Module 7, LIS
    numeric: true
    threshold: "10% per dimension = 33% total"

  - id: JA-HEUR-002
    name: "93 Referral Strategies Available"
    description: "93 separate strategies for stimulating referral buyers. Referral buyers: buy faster, negotiate less, buy more, buy more often, cost zero to acquire, and refer more people themselves."
    source: CYBS Module 5, Module 8, Workbook
    numeric: true
    threshold: "93 strategies"

  - id: JA-HEUR-003
    name: "Trust = 3X Performance Multiple"
    description: "High-trust businesses earn 3X more: prospects purchase 3X faster, buy 3X more often, buy 3X more products, refer 3X more people. Teams work 3X harder."
    source: CYBS Module 3, Module 11
    numeric: true
    threshold: "3X across all metrics"

  - id: JA-HEUR-004
    name: "~20 Ways to Generate Prospects"
    description: "Approximately 20 major ways to generate leads. Each should be tested and optimized as a pillar."
    source: CYBS Module 5
    numeric: true

  - id: JA-HEUR-005
    name: "~10 Ways to Convert Prospects to Buyers"
    description: "Approximately 10 major ways to convert a prospect into a first-time buyer."
    source: CYBS Module 5
    numeric: true

  - id: JA-HEUR-006
    name: "~10 Ways to Increase Transaction Size"
    description: "10 proven ways to turn a purchase into a larger purchase — potentially doubling transaction size."
    source: CYBS Module 5
    numeric: true

  - id: JA-HEUR-007
    name: "~35 Business Creation Paths"
    description: "Approximately 35 business creation paths with different risk profiles, capital requirements, and growth trajectories."
    source: CYBS Module 3
    numeric: true

  - id: JA-HEUR-008
    name: "13 Characteristics of Trust Building"
    description: "Straight talk, demonstrate concern, create transparency, right wrongs, show loyalty, deliver results, get better, clarify expectations, practice accountability, confront reality, keep commitments, listen first, extend trust."
    source: CYBS Modules 11-12
    numeric: true
    threshold: "13 characteristics"

  - id: JA-HEUR-009
    name: "10 Profit Pathways for Passive Income"
    description: "10 distinct profit pathways creating perpetual, ongoing, recurring passive income — set up, negotiate, keep getting income for life."
    source: CYBS Module 1
    numeric: true

  - id: JA-HEUR-010
    name: "Brand Value = 6-8X Cash Flow"
    description: "When you build a brand with controlled customer relationships, companies pay 6-8X cash flow/profit when you sell."
    source: CYBS Module 3
    numeric: true
    threshold: "6-8X"

  - id: JA-HEUR-011
    name: "Cost 6X More to Acquire Than Resell"
    description: "Costs 6 times more to sell to a new customer than to sell to an existing one."
    source: CYBS Workbook
    numeric: true
    threshold: "6X"

  - id: JA-HEUR-012
    name: "30% Add-On Rate at Point of Sale"
    description: "30% of customers will buy additional products if offered at point of sale."
    source: CYBS Workbook
    numeric: true
    threshold: "30%"

  - id: JA-HEUR-013
    name: "80/20 Headline Rule"
    description: "80% of marketing outcome is determined by headline. A headline change can make 20X improvement in response."
    source: CYBS Workbook
    numeric: true
    threshold: "80% impact, up to 20X improvement"

  - id: JA-HEUR-014
    name: "JV = 30% Volume / 70% Profit"
    description: "Joint ventures generated ~30% of Jay's business volume but produced ~70% of profits due to favorable cost structure."
    source: CYBS Workbook
    numeric: true

  - id: JA-HEUR-015
    name: "20% Performance Utilization"
    description: "Most small entrepreneurs only get 20% (one-fifth) of the impact their team could produce — due to poor communication, leadership, and unclear expectations."
    source: CYBS Module 11
    numeric: true
    threshold: "20%"

  - id: JA-HEUR-016
    name: "Risk Reversal = 50% Increase"
    description: "Risk reversal alone can give 50% increase if done right. 3 categories x 5 directions."
    source: LIS Keynote
    numeric: true
    threshold: "50% increase"

  - id: JA-HEUR-017
    name: "9 Ad Levers = Up to 21X Improvement"
    description: "9 simple levers in any ad that can make it pull up to 21X better. 3-5X common and achievable."
    source: LIS Keynote
    numeric: true
    threshold: "3-5X common, 21X max"

  - id: JA-HEUR-018
    name: "20% Revenue / 40% Volume from Partners"
    description: "Biggest corporations get ~20% revenue and ~40% volume from strategic partners. Microsoft got ~$20B from distribution partners."
    source: LIS Keynote
    numeric: true

  - id: JA-HEUR-019
    name: "$250M Revenue on $300K Risk"
    description: "Jay personally generated $250M in seminar revenue with only $300K risk through JV partnerships with Tony Robbins, Success Magazine, financial newsletters."
    source: LIS Keynote, CYBS Module 9
    numeric: true

  - id: JA-HEUR-020
    name: "4-5 Referral Systems Minimum"
    description: "Need at least 4-5 different active referral systems running simultaneously. Different people respond to different stimuli."
    source: CYBS Workbook
    numeric: true

  - id: JA-HEUR-021
    name: "ICEHOT: $20K to $13M in 1 Year"
    description: "ICEHOT pain relief went from $20K to $13M in 1 year, sold for $10M. Product cost $0.55, sold for $3, ~$50/person/year profit for life."
    source: CYBS Module 7
    numeric: true

  - id: JA-HEUR-022
    name: "138 Alliances Per Large Company"
    description: "Companies with $2B+ revenue formed average 138 alliances apiece (1996-1999). Alliances growing 20%/year."
    source: CYBS Workbook
    numeric: true

  - id: JA-HEUR-023
    name: "90% Clients Choose Referral Discount Deal"
    description: "When offered full fee vs discounted fee + 2 referrals, 90% of clients accept the referral deal."
    source: CYBS Workbook
    numeric: true

  - id: JA-HEUR-024
    name: "50% Customers Bring Guests to Events"
    description: "At monthly customer briefings, 50% of customers bring a qualified guest, and half of guests become customers."
    source: CYBS Workbook
    numeric: true

  - id: JA-HEUR-025
    name: "Three Breakage Reasons"
    description: "(1) Life interruption unrelated to product, (2) Negative experience with delivery/service, (3) Simply drifted away. Each requires different reactivation approach."
    source: CYBS Module 3

  - id: JA-HEUR-026
    name: "First Win = Highest Probability Business"
    description: "First entrepreneurial activity should be highest probability of success, not most money. Validates capability, generates predictable cash flow."
    source: CYBS Module 3

  - id: JA-HEUR-027
    name: "Product Ladder Heuristic"
    description: "Build value ladder: Free → $500 → $4K → $10K → $200-300K/year. Different buyers at different progression points."
    source: CYBS Module 2

  - id: JA-HEUR-028
    name: "Annual Penetration Rule"
    description: "Every year: (1) Penetrate one new market, (2) Introduce one new product/service, (3) Acquire a complementary or competitive business."
    source: CYBS Module 2, Module 7

  - id: JA-HEUR-029
    name: "Pay Anything If Revenue-Correlated"
    description: "You can pay almost anything if payment is correlated to revenue generated. Market at 3X? Give 7X — doesn't matter at 25-30% of the revenue."
    source: LIS Hot Seats
    numeric: true

  - id: JA-HEUR-030
    name: "Title Change = Everything Changes"
    description: "Think and Grow Rich bombed with original title. Same book, changed title, sold 100-200M copies. Men Are from Mars sold 1,100 copies until title change."
    source: LIS Hot Seats

  - id: JA-HEUR-031
    name: "2x Price or 3x Volume = 10x Profit"
    description: "$10M revenue, $5M variable, $4M operating = $1M profit. Just 2x price = $10M profit. Or 3x volume = $10M profit. Don't need 10x sales for 10x profit."
    source: LIS (Dr. Alan Barnard)
    numeric: true

  - id: JA-HEUR-032
    name: "90% Daily Activities Don't Contribute to Goal"
    description: "Approximately 90% of daily activities do NOT directly contribute to the most important goal. 10x improvement possible by eliminating waste."
    source: LIS (Dr. Alan Barnard)
    numeric: true

  - id: JA-HEUR-033
    name: "1 Change = 50% of Total Gap"
    description: "Recursive Pareto: 1 single change can account for 50% of all possible improvement. Find that ONE change."
    source: LIS (Dr. Alan Barnard)
    numeric: true

# ═══════════════════════════════════════════════════════════════
# L4: FRAMEWORKS (40 elements)
# ═══════════════════════════════════════════════════════════════
frameworks:
  - id: JA-FW-001
    name: "Power Parthenon Strategy"
    description: "Build business on multiple revenue pillars instead of single 'diving board.' Each pillar adds 5-15% revenue at far higher profitability since overhead is already absorbed."
    steps:
      - "Identify current revenue sources (pillars)"
      - "Add new pillars: referrals, JVs, media, online, telemarketing, book authority"
      - "Each pillar independently viable"
      - "Multiple pillars = resilience + geometric growth"
    source: CYBS Module 6, Module 7, Workbook

  - id: JA-FW-002
    name: "4-Sell Framework: Upsell-Crosssell-Downsell-Resell"
    description: "Upsell = higher quality/quantity. Cross-sell = complementary products. Down-sell = entry-level starter. Resell = sell again over time. Plus 5th: Referral-Sell."
    source: CYBS Module 8

  - id: JA-FW-003
    name: "Risk Reversal Framework (3 Categories x 5 Directions)"
    description: "Two risk types: tangible (spend money, no outcome) and intangible (look stupid). Remove, reduce, or reverse risk to make YES easier than NO. 3 categories x 5 directions = 15 combinations."
    source: CYBS Module 2, LIS Keynote

  - id: JA-FW-004
    name: "Positioning Framework (7 Steps)"
    description: "(1) Self-reality check, (2) Identify target AND non-target, (3) Message-to-market congruency, (4) Study direct AND indirect competition, (5) Define value proposition, (6) Create USP, (7) Integrate across ALL touchpoints."
    source: CYBS Module 4

  - id: JA-FW-005
    name: "Preemptive Marketing Framework"
    description: "Be first to tell complete story of your process. Like Schlitz beer — all brewed same way, but first to explain went from #10 to #1 in 6 months."
    source: CYBS Module 4

  - id: JA-FW-006
    name: "Competition Research Framework"
    description: "(1) Review competitor ads/websites/positions, (2) Study discussion groups and complaints for emotional language, (3) Search books on your category, (4) Read reviews for language patterns, (5) Find gaps and voids."
    source: CYBS Module 4

  - id: JA-FW-007
    name: "AIDA Copywriting Formula"
    description: "Attention → Interest → Desire → Action. Get attention, develop interest, stimulate desire, drive action with call-to-action and risk reversal."
    source: CYBS Module 5

  - id: JA-FW-008
    name: "Robert Collier Formula"
    description: "Attention → Interest → Description → Persuasion → Proof → Close. Adds dimensionalized description and mandatory proof before asking."
    source: CYBS Module 5

  - id: JA-FW-009
    name: "Victor Schwab Formula (AAPAA)"
    description: "Attention → Advantage → Proof → Action. Focus on specific advantage, prove with evidence, then ask for action."
    source: CYBS Module 5

  - id: JA-FW-010
    name: "Bob Bly Formula (7-Step)"
    description: "(1) Gain attention, (2) Focus on client, (3) Stress benefits, (4) Differentiate from competition, (5) Prove case, (6) Establish credibility, (7) Build value and close."
    source: CYBS Module 5

  - id: JA-FW-011
    name: "Consultative/Advisory Selling Framework"
    description: "(1) Help buyer understand desired outcome, (2) Socratic interviews, (3) Objective advice, (4) Recommend their best interest, (5) Project positive impact forward, (6) Establish why you vs competitors."
    source: CYBS Module 10

  - id: JA-FW-012
    name: "Mastermind Alliance Framework"
    description: "Form advisory board of successful people in diverse fields. Meet monthly/quarterly. Share goals, get ideas. Create BEFORE you even start your business."
    source: CYBS Module 2

  - id: JA-FW-013
    name: "5 Ways to Monetize Non-Buyers"
    description: "(1) Go back and get them to buy, (2) Find other products they'll buy, (3) Sell their intent to competitors, (4) Create insurance-model offerings, (5) Build toll position as reactivation partner."
    source: CYBS Module 3

  - id: JA-FW-014
    name: "Tactic Selection Framework (3 Criteria)"
    description: "Choose based on: (1) Clearest, most cost-effective source of targeted market, (2) Least time investment, (3) Highest predictability. Test conservatively before scaling."
    source: CYBS Module 5

  - id: JA-FW-015
    name: "Business Acquisition Without Capital"
    description: "Find struggling business with identifiable problems. Propose paying owner more than current worth, entirely from future revenue/profits you generate."
    source: CYBS Module 1, Module 2

  - id: JA-FW-016
    name: "Earn-Into-Ownership Framework"
    description: "Work at reduced salary as intern/GM, earn equity option over 1-2 years. Each month earns equity credit. Buy at pre-negotiated price from increased profits created."
    source: CYBS Module 3

  - id: JA-FW-017
    name: "Host-Beneficiary Relationship Model"
    description: "Host has the relationship and endorses Beneficiary. Beneficiary provides product/service. Compensation is performance-based: share of profit, per-sale fee, or reciprocal endorsement."
    source: CYBS Workbook, Module 9

  - id: JA-FW-018
    name: "9 Major Benefits of JV/Strategic Alliance"
    description: "(1) Scale/scope/speed, (2) Market penetration, (3) Competitiveness, (4) Product development, (5) New opportunities, (6) New businesses, (7) Control assets, (8) Reduce risk, (9) Geographic expansion."
    source: CYBS Module 9

  - id: JA-FW-019
    name: "USP Integration Framework"
    description: "Integrate USP into: every ad headline, direct mail, 60-second pitch, phone interaction, post-purchase follow-up, complaint resolution, all employee behavior."
    source: CYBS Workbook

  - id: JA-FW-020
    name: "The 7 Magnificent Steps"
    description: "Seven steps to creating more business wealth without risk. How to recession-proof any business, blow past competition, have predictability. Jay's distilled best from 97 strategies."
    source: LIS Keynote

  - id: JA-FW-021
    name: "5 Things to Constantly Increase"
    description: "(1) Predictable current income, (2) Predictable future income, (3) Windfall/newfound income, (4) Fulfillment, (5) Net worth."
    source: LIS Keynote

  - id: JA-FW-022
    name: "Irresistible Offer Construction"
    description: "(1) Clear statement of what you do/who you serve, (2) Contrast against competition, (3) Social proof, (4) Risk reversal/guarantee, (5) Clear value articulation visible 'on a foggy night at a mile away.'"
    source: LIS Hot Seats

  - id: JA-FW-023
    name: "Hot Seat Diagnostic Process"
    description: "(1) 5 min max to explain business + bottleneck, (2) Force clarity, (3) Ask charges/results/success rate, (4) Apply 'Why buy from you?' test, (5) Identify if stated problem is symptom, (6) Prescribe specific intervention."
    source: LIS Hot Seats

  - id: JA-FW-024
    name: "Three-Step Growth Model (Zappos)"
    description: "(1) Know ideal customer deeply (desires, fears), (2) Create irresistible offer, (3) Over-deliver (turn customers into raving fans). Zappos: near-bankruptcy to $1.2B acquisition in 5.5 years."
    source: LIS (Tony Robbins, endorsed by Jay)

  - id: JA-FW-025
    name: "Three to Five to Thrive Selection"
    description: "From everything learned, select 3-5 strategies that are: (a) easiest to implement, (b) highest probability, (c) lowest cost. Start there."
    source: LIS (Tony Robbins, endorsed by Jay)

  - id: JA-FW-026
    name: "Story Platform Framework (7 Elements)"
    description: "(1) Vision, (2) Insights, (3) Identity, (4) Differentiators, (5) Strategy, (6) People/Culture, (7) So What/Impact. Lead with Vision + Insights before selling."
    source: LIS (Allan Eagle, endorsed by Jay)

  - id: JA-FW-027
    name: "CPR Framework (Communication, Planning, Resources)"
    description: "3 drawers of business information: Communication (Slack/Teams), Planning (Asana/ClickUp), Resources (Notion/Confluence). Put everything in the right drawer."
    source: LIS (Nick Sonnenberg, endorsed by Jay)

  - id: JA-FW-028
    name: "Three Pillars of SEO"
    description: "Content (keywords, entities), Architecture (site structure), Links (domain authority). Each requires separate analysis and optimization."
    source: LIS (Stephan Spencer, endorsed by Jay)

# ═══════════════════════════════════════════════════════════════
# L5: METHODOLOGIES (25 elements)
# ═══════════════════════════════════════════════════════════════
methodologies:
  - id: JA-MET-001
    name: "No-Capital Product Distribution Method"
    description: "Find oversupply products in warehouses → get control without paying → place in retail on consignment → 3-way revenue split. Jay's result: $500K product, 40 stores, $4K/week in 3 weeks."
    source: CYBS Module 1

  - id: JA-MET-002
    name: "Subscriber List Profit Center Method"
    description: "Approach publisher → create complementary profit center → use their name/distribution → split revenue. Jay's result: $8M first year, zero capital."
    source: CYBS Module 1

  - id: JA-MET-003
    name: "Location Arbitrage Method"
    description: "Tie up underutilized prime location on revenue share → find professional operator → sublicense at markup. Flea market at sports arena: millions from middleman positioning."
    source: CYBS Module 1

  - id: JA-MET-004
    name: "Pre-sell Financing Method (Porsche Example)"
    description: "Find 200 enthusiasts willing to pay $75K for perpetual access → pool funds to buy dealership → fulfill through demo program. Result: dealership acquired with zero debt, $1.5M surplus."
    source: CYBS Module 1

  - id: JA-MET-005
    name: "Barter for Advertising Method (Carnival Cruise)"
    description: "Identify unused capacity → trade to media for equivalent advertising → use ads to fill with paying customers → reinvest. Carnival: multi-billion dollar company from one ugly ship."
    source: CYBS Module 1

  - id: JA-MET-006
    name: "Business Consolidation Method"
    description: "Buy 2-3 businesses in same field → combine → eliminate redundant overhead → dramatically larger profit from economies of scale."
    source: CYBS Module 1

  - id: JA-MET-007
    name: "Infomercial Rights International Method"
    description: "Find successful infomercials → license for another country at minimal cost → buy products at volume discount → run in new market. Result: $25M first year."
    source: CYBS Module 1

  - id: JA-MET-008
    name: "Design Royalty Method"
    description: "Offer to design bland products at no upfront cost → A/B test → collect 5% of increased sales. Sometimes doubled sales, generating millions in royalties."
    source: CYBS Module 1

  - id: JA-MET-009
    name: "Franchise/License Replication Method"
    description: "Find successful single-location → blueprint and codify → get partners to pay fee + percentage → share revenue with original owner."
    source: CYBS Module 3

  - id: JA-MET-010
    name: "White Label Brand Building Method"
    description: "Find quality product from manufacturer → private label under your brand → sell through established distribution → keep brand ownership and customer relationships."
    source: CYBS Module 3

  - id: JA-MET-011
    name: "Media Negotiation Methods"
    description: "5 methods: (1) Negotiate lower rates, (2) Pay half now/half in 90 days, (3) Performance-based payment, (4) Trade unsold inventory for revenue share, (5) Guaranteed-sale arrangement."
    source: CYBS Module 2

  - id: JA-MET-012
    name: "Toll Position Reactivation Method"
    description: "Identify companies with non-buyers/lapsed buyers → propose reactivation at no upfront cost → implement 5-7 methods → negotiate permanent share of reactivated revenue."
    source: CYBS Module 3

  - id: JA-MET-013
    name: "ICEHOT LTV Calculation Method"
    description: "Get 10 first-time buyers → track repeat monthly → track additional products → track bulk → calculate total profit per buyer per year for life → determine allowable acquisition cost."
    source: CYBS Module 7

  - id: JA-MET-014
    name: "Earn-Out Business Acquisition"
    description: "Identify struggling business → propose buying with zero capital, pay from future profits → consolidate overhead → bring their buyers into your business."
    source: CYBS Module 7

  - id: JA-MET-015
    name: "87-Question Self-Diagnostic Assessment"
    description: "87 scored questions covering selling methods, referrals, USP, attrition, testing, risk reversal, Power Parthenon, strategic partners. Score reveals % of potential being realized."
    source: CYBS Workbook

  - id: JA-MET-016
    name: "Never Turn A Customer Away Method"
    description: "When prospect doesn't buy: say 'I've arranged with [competitor] for special deal.' Negotiate better terms with competitor for your prospects. Earn referral commission on each redirect."
    source: CYBS Workbook

  - id: JA-MET-017
    name: "Referral System Template"
    description: "Demographics → psychographics → buying patterns → identify who in customer's life matches → craft incentive → draft letter → test on 5-10-20 best customers → deploy multiple systems → measure."
    source: CYBS Workbook

  - id: JA-MET-018
    name: "JV Deal Structuring"
    description: "Identify underutilized assets → structure performance-based → use endorsement mechanism → you provide product/fulfillment, they provide distribution/trust → 50/50 on results only."
    source: CYBS Module 9, Workbook

  - id: JA-MET-019
    name: "Consultative Selling Training Roll-Out"
    description: "Read 3+ books → buy training → practice → team reads at lunch → retrain monthly → observe real consultative sellers → extend to ALL staff."
    source: CYBS Module 10

  - id: JA-MET-020
    name: "Referral-as-Currency Methodology"
    description: "When client can't pay full price: value each referral at specific dollar amount ($1K per qualified intro) → allow referrals to offset pricing → client pays fewer dollars but gives more value."
    source: LIS Hot Seats


# DNA.yaml - Jason Fladlien
# 47 elementos em 5 camadas
# Fonte: Webinar Blueprint (Video 1 + Video 2)
# Data: 2026-03-08

pessoa: jason-fladlien
versao: 1.0.0
total_elementos: 47

# ============================================
# L1 - FILOSOFIAS (8 elementos)
# ============================================

filosofias:

  - id: FIL-JF-001
    titulo: Destruicao de crencas e melhor que construcao de argumentos
    descricao: Nao tente convencer com logica. Identifique a crenca limitante que impede a compra e destrua-a. Quando a crenca cai, a venda acontece naturalmente.
    fonte: Webinar Blueprint Video 1

  - id: FIL-JF-002
    titulo: Vender e dar permissao para comprar
    descricao: O papel do apresentador nao e forcar uma decisao. E remover as barreiras internas que impedem a pessoa de tomar a decisao que ela ja quer tomar.
    fonte: Webinar Blueprint Video 1

  - id: FIL-JF-003
    titulo: Um webinar bem feito substitui um time de vendas inteiro
    descricao: Webinars escalam sem headcount. Um apresentador pode vender para 10 ou 10000 pessoas simultaneamente com a mesma eficacia.
    fonte: Webinar Blueprint Video 1

  - id: FIL-JF-004
    titulo: O preco nunca e o problema real
    descricao: Quando alguem diz que e caro, o problema real e uma crenca nao destruida. O valor percebido nao superou a resistencia interna.
    fonte: Webinar Blueprint Video 1

  - id: FIL-JF-005
    titulo: Conteudo e o veiculo da venda, nao o oposto
    descricao: O conteudo educacional em um webinar nao e o objetivo. E o veiculo que carrega a mensagem de venda. Ensinar demais sem direcionar e desperdicio.
    fonte: Webinar Blueprint Video 1

  - id: FIL-JF-006
    titulo: Urgencia real supera urgencia artificial
    descricao: Criar urgencia genuina baseada em resultados reais e transformacao e mais poderoso que countdown timers e vagas limitadas artificiais.
    fonte: Webinar Blueprint Video 2

  - id: FIL-JF-007
    titulo: A venda comeca nos primeiros 10 minutos
    descricao: Se voce nao capturou a atencao e estabeleceu autoridade nos primeiros 10 minutos, o resto do webinar e irrelevante. A maioria ja decidiu ficar ou sair.
    fonte: Webinar Blueprint Video 1

  - id: FIL-JF-008
    titulo: Servir e a forma mais elevada de vender
    descricao: Quando voce genuinamente acredita que seu produto transforma vidas, vender nao e manipulacao. E um servico. Nao vender e negligencia.
    fonte: Webinar Blueprint Video 2

# ============================================
# L2 - MODELOS MENTAIS (9 elementos)
# ============================================

modelos_mentais:

  - id: MM-JF-001
    titulo: Belief Destruction Model
    descricao: Toda decisao de compra e bloqueada por 3-5 crencas limitantes. Identifique-as, priorize-as, e destrua-as sistematicamente durante a apresentacao.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-002
    titulo: Permission-Based Selling
    descricao: Em vez de empurrar a venda, crie condicoes onde a audiencia se da permissao para comprar. Remova culpa, medo e incerteza.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-003
    titulo: Trial Close Thermometer
    descricao: Trial closes ao longo da apresentacao funcionam como termometro. Se a audiencia nao esta concordando nos micro-compromissos, a venda final vai falhar.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-004
    titulo: Value Perception Multiplier
    descricao: O valor percebido deve ser no minimo 10x o preco pedido. Se nao for, o stack nao esta forte o suficiente ou as crencas nao foram destruidas.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-005
    titulo: Objection Pre-Destruction
    descricao: Objecoes devem ser destruidas ANTES de surgirem. Antecipar e endereccar objecoes durante o conteudo e 3x mais eficaz que rebater depois.
    fonte: Webinar Blueprint Video 2

  - id: MM-JF-006
    titulo: Attention Economy Model
    descricao: A atencao da audiencia e a moeda mais valiosa. Cada minuto do webinar deve competir com todas as outras opcoes de entretenimento e informacao.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-007
    titulo: Transformation Gap
    descricao: Mostre o gap entre onde a pessoa esta e onde ela quer estar. Quanto maior e mais claro o gap, maior a urgencia de compra.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-008
    titulo: Authority Transfer
    descricao: Nos primeiros minutos, transfira autoridade de fontes externas para voce. Use resultados, credenciais e prova social para estabelecer que voce e a pessoa certa.
    fonte: Webinar Blueprint Video 1

  - id: MM-JF-009
    titulo: Emotional-Logical Bridge
    descricao: A decisao de compra e emocional, mas precisa de justificativa logica. Forneca ambas - emocao para decidir, logica para justificar.
    fonte: Webinar Blueprint Video 2

# ============================================
# L3 - HEURISTICAS (12 elementos)
# ============================================

heuristicas:

  - id: HEUR-JF-001
    titulo: Se a audiencia nao esta comprando, identifique qual crenca nao foi destruida
    descricao: "Antes de ajustar preco, oferta ou copy, volte ao basico: qual crenca limitante ainda esta de pe? Essa e quase sempre a causa raiz."
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-002
    titulo: Destrua 3-5 crencas limitantes por webinar
    descricao: O numero ideal de crencas a destruir em um webinar e entre 3 e 5. Menos que isso e a resistencia permanece. Mais que isso e a audiencia fica sobrecarregada.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-003
    titulo: Value stack deve representar 10x o preco
    descricao: Ao construir o value stack, some todos os bonus e componentes. O total deve ser no minimo 10x o preco que voce vai pedir. Se nao for, adicione mais valor.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-004
    titulo: Primeiros 10 minutos decidem tudo
    descricao: Se voce nao prendeu a atencao e estabeleceu autoridade nos primeiros 10 minutos, a maioria da audiencia ja decidiu mentalmente sair.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-005
    titulo: Webinar ideal dura entre 60-90 minutos
    descricao: Menos de 60 minutos nao da tempo de destruir crencas suficientes. Mais de 90 minutos perde a audiencia por fadiga. O sweet spot e 60-90 min.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-006
    titulo: Cada segmento de conteudo deve ter um trial close
    descricao: Apos cada bloco de conteudo ou destruicao de crenca, insira um trial close para medir engajamento e criar micro-compromissos.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-007
    titulo: A transicao para a oferta deve ser invisivel
    descricao: A melhor transicao de conteudo para pitch e aquela que a audiencia nao percebe. O conteudo deve naturalmente levar a oferta como solucao logica.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-008
    titulo: Use urgencia real, nao artificial
    descricao: Urgencia baseada em transformacao real converte 2x mais que countdown timers artificiais. Mostre o custo de nao agir agora.
    fonte: Webinar Blueprint Video 2

  - id: HEUR-JF-009
    titulo: Sempre use trial closes a cada 5-7 minutos
    descricao: A cada 5-7 minutos de conteudo, insira um trial close. Isso mantem engajamento, cria micro-compromissos e prepara para o close final.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-010
    titulo: Bonus devem resolver objecoes especificas
    descricao: Cada bonus no stack deve ser desenhado para resolver uma objecao especifica. Bonus generico nao move a agulha.
    fonte: Webinar Blueprint Video 1

  - id: HEUR-JF-011
    titulo: Prova social deve ser especifica e relevante
    descricao: Depoimentos genericos nao funcionam. Use prova social que espelha a situacao exata da audiencia-alvo.
    fonte: Webinar Blueprint Video 2

  - id: HEUR-JF-012
    titulo: Feche com no minimo 3 calls-to-action
    descricao: Apos revelar a oferta, faca no minimo 3 chamadas para acao claras. Muitas pessoas precisam ouvir o CTA multiplas vezes antes de agir.
    fonte: Webinar Blueprint Video 1

# ============================================
# L4 - FRAMEWORKS (11 elementos)
# ============================================

frameworks:

  - id: FW-JF-001
    titulo: Webinar Blueprint Framework
    descricao: Framework completo de 16 passos para estruturar um webinar de alta conversao. Da abertura ao fechamento, cada passo tem funcao especifica na jornada de compra.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-002
    titulo: Belief Destruction Framework
    descricao: Processo sistematico para identificar, priorizar e destruir crencas limitantes. 1) Listar crencas. 2) Priorizar por impacto. 3) Criar argumento de destruicao. 4) Testar com trial close.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-003
    titulo: Value Stack Architecture
    descricao: Estrutura para construir um stack de valor que parece irrecusavel. Produto principal + bonus estrategicos + garantia + urgencia. Total percebido deve ser 10x o preco.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-004
    titulo: Trial Close System
    descricao: Sistema de micro-compromissos inseridos ao longo da apresentacao a cada 5-7 minutos. Cada trial close prepara para o close final e mede temperatura da audiencia.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-005
    titulo: Opening Hook Framework
    descricao: Framework para os primeiros 10 minutos criticos. 1) Hook de atencao. 2) Promise de transformacao. 3) Prova de autoridade. 4) Razao para ficar ate o fim.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-006
    titulo: Objection Pre-Handling Framework
    descricao: Framework para identificar e destruir as 5-7 objecoes mais comuns ANTES que surjam. Embutir a destruicao de objecoes dentro do conteudo educacional.
    fonte: Webinar Blueprint Video 2

  - id: FW-JF-007
    titulo: Transition Bridge Framework
    descricao: Framework para transicionar suavemente de conteudo para oferta. O conteudo cria o problema que a oferta resolve. A transicao e logica e natural.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-008
    titulo: Social Proof Integration
    descricao: Framework para integrar prova social ao longo do webinar, nao apenas no final. Depoimentos e cases devem aparecer em momentos estrategicos que reforcem cada ponto.
    fonte: Webinar Blueprint Video 2

  - id: FW-JF-009
    titulo: Urgency and Scarcity Framework
    descricao: Framework para criar urgencia genuina baseada em transformacao real. Mostrar o custo da inacao, deadline real, e consequencias de esperar.
    fonte: Webinar Blueprint Video 2

  - id: FW-JF-010
    titulo: Content-to-Sale Ratio
    descricao: Framework para balancear conteudo educacional com elementos de venda. Cada bloco de conteudo deve servir a venda, mas entregar valor real ao mesmo tempo.
    fonte: Webinar Blueprint Video 1

  - id: FW-JF-011
    titulo: Close Sequence Framework
    descricao: "Sequencia estruturada de fechamento: 1) Recap de valor. 2) Revelar preco. 3) Comparar com alternativas. 4) Garantia. 5) CTA. 6) Repetir CTA 2x mais."
    fonte: Webinar Blueprint Video 1

# ============================================
# L5 - METODOLOGIAS (7 elementos)
# ============================================

metodologias:

  - id: MET-JF-001
    titulo: Webinar Creation Methodology
    descricao: "Metodologia passo-a-passo para criar um webinar do zero: 1) Definir avatar e dor principal. 2) Listar 3-5 crencas limitantes. 3) Criar conteudo que destrua cada crenca. 4) Construir value stack 10x. 5) Inserir trial closes a cada 5-7 min. 6) Criar sequencia de fechamento. 7) Testar e iterar."
    fonte: Webinar Blueprint Video 1

  - id: MET-JF-002
    titulo: Belief Identification Methodology
    descricao: "Metodologia para identificar crencas limitantes da audiencia: 1) Pesquisar objecoes mais comuns do nicho. 2) Entrevistar clientes atuais sobre o que quase impediu a compra. 3) Analisar comentarios negativos de concorrentes. 4) Priorizar por frequencia e impacto. 5) Criar script de destruicao para cada uma."
    fonte: Webinar Blueprint Video 1

  - id: MET-JF-003
    titulo: Value Stack Construction Methodology
    descricao: "Metodologia para construir value stack irresistivel: 1) Definir produto principal e valor real. 2) Listar objecoes restantes apos conteudo. 3) Criar bonus que resolve cada objecao. 4) Atribuir valor crivel a cada item. 5) Somar total (deve ser 10x preco). 6) Adicionar garantia que elimina risco."
    fonte: Webinar Blueprint Video 1

  - id: MET-JF-004
    titulo: Trial Close Implementation Methodology
    descricao: "Metodologia para implementar trial closes: 1) Apos cada bloco de conteudo, fazer pergunta que so tem resposta positiva. 2) Usar formato: Isso faz sentido? Voces conseguem ver como isso funcionaria? 3) Pedir acao fisica (digitar no chat, levantar a mao). 4) Se engajamento cai, reforcar antes de continuar."
    fonte: Webinar Blueprint Video 1

  - id: MET-JF-005
    titulo: Webinar Optimization Methodology
    descricao: "Metodologia para otimizar webinar existente: 1) Analisar ponto de queda de audiencia. 2) Identificar qual crenca nao foi destruida naquele ponto. 3) Reforcar conteudo naquele segmento. 4) Adicionar trial close antes do ponto de queda. 5) Testar novamente. 6) Repetir ate conversao alvo."
    fonte: Webinar Blueprint Video 2

  - id: MET-JF-006
    titulo: Offer Reveal Methodology
    descricao: "Metodologia para revelar a oferta: 1) Recapitular valor entregue no conteudo. 2) Apresentar a solucao completa como proximo passo logico. 3) Revelar cada componente do stack individualmente. 4) Somar valor total. 5) Revelar preco com contraste. 6) Adicionar garantia. 7) CTA claro e repetido 3x."
    fonte: Webinar Blueprint Video 1

  - id: MET-JF-007
    titulo: Pre-Objection Destruction Methodology
    descricao: "Metodologia para destruir objecoes antes que surjam: 1) Listar top 5-7 objecoes do nicho. 2) Para cada objecao, criar historia ou exemplo que a invalida. 3) Embutir dentro do conteudo educacional (nao na secao de venda). 4) Usar trial close apos destruir cada objecao. 5) Na secao de venda, apenas reforcar o que ja foi destruido."
    fonte: Webinar Blueprint Video 2
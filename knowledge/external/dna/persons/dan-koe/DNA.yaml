  L5_METHODOLOGIES:

    - id: "MET-DK-001"
      title: "Writing Habit Building (7 Steps)"
      description: "Step-by-step habit formation: (1) Set specific daily writing time (same time every day), (2) Start with 30 minutes minimum, (3) Eliminate all distractions (phone in another room), (4) Use Hemingway App for editing, (5) Publish something every day (even if imperfect), (6) Track streak visually, (7) Gradually increase to 2 hours. Consistency beats intensity."
      domains: [writing, productivity, self-development]
      source: "2HW"
      confidence: 0.90

    - id: "MET-DK-002"
      title: "Creator Growth Path (5 Phases)"
      description: "Five phases of creator growth: Phase 1 (0-1K) — daily tweets + engagement + DMs, build voice. Phase 2 (1K-5K) — add threads + launch newsletter, find niche. Phase 3 (5K-10K) — first product + consistent newsletter, build authority. Phase 4 (10K-25K) — scale products + raise prices, build leverage. Phase 5 (25K+) — build team + community, compound."
      domains: [audience-building, monetization, content-strategy]
      source: "2HW"
      confidence: 0.90

    - id: "MET-DK-003"
      title: "Daily Content Creation Process (2 Hours)"
      description: "Daily 2-hour workflow: Hour 1 (Creative) — review Queue, select ideas, brainstorm connections, write outlines, capture new ideas during walk. Hour 2 (Productive) — write 3-5 tweets, work on thread/newsletter section, schedule posts, engage for 15-20 minutes. End with Queue review."
      domains: [content-creation, productivity, writing]
      source: "2HW"
      confidence: 0.90

    - id: "MET-DK-004"
      title: "Building Notion System (7 Steps)"
      description: "Set up The Queue in Notion: (1) Create a database called 'The Queue', (2) Add properties: Type (quote, idea, observation), Source (book, tweet, podcast), Theme (content pillars), Status (raw, developing, published), Format (tweet, thread, newsletter), (3) Create views for each status, (4) Add daily capture template, (5) Build 'Today's Hub' dashboard, (6) Create archive for published items, (7) Review and refine weekly."
      domains: [productivity, idea-generation, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-005"
      title: "Launching Newsletter on Beehiiv (6 Steps)"
      description: "Launch process: (1) Create Beehiiv account and customize design (minimal — focus on words), (2) Write first 3 editions as drafts before publishing any, (3) Set up welcome email with clear value proposition, (4) Announce launch on Twitter with thread explaining what subscribers get, (5) Add subscribe link to bio and pinned tweet, (6) Send first edition and iterate based on open rates and replies."
      domains: [newsletter-marketing, email-marketing, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-006"
      title: "Twitter Scheduling with TweetHunter (7 Steps)"
      description: "Scheduling workflow: (1) Write tweets in batches (not individually), (2) Load into TweetHunter queue, (3) Set posting schedule (3-5x daily at peak hours), (4) Use auto-retweet for best performers, (5) Schedule threads for Tuesday/Thursday mornings, (6) Review analytics weekly, (7) Adjust content mix based on what performs. Batch creation frees daily time for engagement."
      domains: [twitter-growth, productivity, social-media]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-007"
      title: "Writing in Hemingway (3-Phase Process)"
      description: "Three-phase editing process using Hemingway App: Phase 1 (Draft) — write freely without editing, ignore errors, get ideas on page. Phase 2 (Structure) — reorganize for flow, cut unnecessary sections, ensure logical progression. Phase 3 (Polish) — paste into Hemingway App, simplify highlighted sentences, reduce adverbs, aim for Grade 5-6 readability."
      domains: [writing, productivity, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-008"
      title: "Non-Needy Networking Implementation (6 Phases)"
      description: "Phase 1 (Week 1-2): Identify 20-30 target accounts, follow all, turn on notifications. Phase 2 (Week 3-6): Reply thoughtfully to 5-10 of their posts daily, never self-promoting. Phase 3 (Week 7-8): Send first DM — specific compliment + genuine question. Template: 'Hey [name], your thread on [topic] was great. I especially resonated with [specific point]. I'm curious — how did you come up with that angle?' Phase 4 (Week 9-12): Build rapport through DM conversation, share relevant resources. Phase 5 (Month 4-5): Propose small collaboration (co-thread, newsletter swap). Phase 6 (Month 6+): Nurture with periodic check-ins and mutual support."
      domains: [networking, community-building, audience-building]
      source: "2HW"
      confidence: 0.90

    - id: "MET-DK-009"
      title: "Newsletter Writing Process (7 Steps Using 6-Step Framework)"
      description: "Step 1: Choose topic from Queue (highest resonance). Step 2: Outline using Problem-Solution framework. Step 3: Write intro hook (use Newsletter Introduction Framework — bold claim, story, question, or stat). Step 4: Draft body section by section, one per day. Step 5: Add personal stories and specific examples. Step 6: Write conclusion with clear takeaway. Step 7: Edit in Hemingway, add links and CTA."
      domains: [newsletter-marketing, writing, content-creation]
      source: "2HW"
      confidence: 0.90

    - id: "MET-DK-010"
      title: "Complete Newsletter Writing Process (10 Steps)"
      description: "Full process: (1) Monday — choose topic and outline, (2) Tuesday — write intro and first section, (3) Wednesday — write middle sections, (4) Thursday — write conclusion and CTA, (5) Friday — first edit (structure and flow), (6) Saturday — second edit (Hemingway polish), (7) Sunday — final review and schedule, (8) Monday — send and monitor opens, (9) Extract threads from newsletter, (10) Extract tweets from threads. One newsletter feeds entire content week."
      domains: [newsletter-marketing, writing, productivity]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-011"
      title: "Week-Long Content Production System"
      description: "Daily schedule: Monday (outline newsletter + write 5 tweets), Tuesday (draft newsletter section 1 + write 3 tweets + engage), Wednesday (draft newsletter section 2 + write thread + engage), Thursday (complete newsletter + schedule thread + engage), Friday (edit newsletter + batch tweets for weekend + promote), Saturday (light engagement + idea capture), Sunday (newsletter final review + Queue review + plan next week)."
      domains: [content-creation, productivity, content-strategy]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-012"
      title: "Tweet Ideation Process (Rapid 5-Step)"
      description: "Fast tweet creation: (1) Pull 3 items from Queue, (2) For each, ask 'What's the one sentence version?' (3) Apply a tweet structure (listicle, contrast, one-liner), (4) Write 3 variations of each, (5) Select best one, schedule rest for testing. 9 tweets in 15 minutes. Speed comes from having a full Queue."
      domains: [twitter-growth, writing, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-013"
      title: "Thread Writing Process from Newsletter"
      description: "Convert newsletter to thread: (1) Identify the strongest section of the newsletter, (2) Extract the core argument, (3) Write a hook tweet (bold claim or surprising stat from the section), (4) Break argument into 5-7 sequential points (one tweet each), (5) Add a personal example or story tweet, (6) Write CTA tweet (subscribe to newsletter for full version), (7) Schedule for optimal time (Tuesday or Thursday 8-10 AM)."
      domains: [twitter-growth, content-repurposing, writing]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-014"
      title: "Visualization and Metaphor Development Process"
      description: "Eight steps to develop memorable metaphors: (1) Identify the abstract concept to explain, (2) List 5 concrete things it resembles, (3) Choose the most vivid comparison, (4) Write the metaphor in one sentence, (5) Extend the metaphor — how far can you push it? (6) Test with a friend — do they get it instantly? (7) If not, try the next comparison from step 2, (8) Save winning metaphors to a dedicated Queue category for reuse."
      domains: [writing, creativity, copywriting]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-015"
      title: "The Idea Capture System (The Queue)"
      description: "Capture process: (1) Always have capture tool accessible (Notion mobile or notes app), (2) When idea strikes, capture in under 30 seconds (raw form is fine), (3) Add source tag (walk, book, conversation, shower), (4) Every evening, process raw captures into Queue database, (5) Add theme tags and potential format, (6) Weekly review — promote best ideas to 'developing' status. The goal: never lose an idea."
      domains: [idea-generation, productivity, creativity]
      source: "2HW"
      confidence: 0.90

    - id: "MET-DK-016"
      title: "How to Write High-Engagement Tweets (7 Steps)"
      description: "Step 1: Choose a Queue item with emotional resonance. Step 2: Pick a tweet structure (from the 18 patterns). Step 3: Write the hook line first (bold, specific, curiosity-inducing). Step 4: Add supporting substance (1-2 sentences). Step 5: End with a punchline or reframe. Step 6: Check length (200-280 chars ideal). Step 7: Read aloud — if it sounds like conversation, publish. If it sounds like an essay, simplify."
      domains: [twitter-growth, writing, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-017"
      title: "Engagement Group Setup and Operation (5 Steps)"
      description: "Step 1: Identify 5-7 creators at your level (±20% follower count) in similar niches. Step 2: DM each with specific compliment + group proposal. Step 3: Create group DM or Telegram group. Step 4: Rules — engage within 30 minutes of member posting, genuine comments only (no 'great post'), rotate who posts first. Step 5: Evaluate monthly — remove inactive members, add aligned new ones."
      domains: [twitter-growth, community-building, networking]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-018"
      title: "Twitter Money Story (5 Phases)"
      description: "Phase 1 (Month 1-3): Build voice and small following through daily tweets + engagement. Phase 2 (Month 4-6): Launch newsletter, start threads, grow to 2-5K. Phase 3 (Month 7-9): Launch first service ($500-$1,500), sell through DMs. Phase 4 (Month 10-12): Raise prices, add low-ticket product, grow to 5-10K. Phase 5 (Year 2): Scale with courses, communities, premium services. Dan's personal trajectory validated to 50K+."
      domains: [monetization, twitter-growth, audience-building]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-019"
      title: "How to Dissect a Quote (8 Steps)"
      description: "Quote dissection for content: (1) Read quote 3 times, (2) Define every key word, (3) Identify the core insight, (4) Ask 'Why is this true?' (5) Ask 'When is this NOT true?' (6) Connect to personal experience, (7) Connect to another idea from a different domain, (8) Write 3 content pieces: one tweet (compressed), one thread (expanded), one newsletter section (deep dive). One quote = 3 pieces of content."
      domains: [idea-generation, writing, creativity]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-020"
      title: "Readwise + Kindle Content System"
      description: "Setup: (1) Highlight aggressively while reading Kindle books, (2) Connect Kindle to Readwise, (3) Readwise sends daily review of 5-10 highlights, (4) When a highlight sparks an idea, capture to Queue immediately, (5) Tag highlight with content pillar, (6) Use Readwise search when writing on specific topic. This creates a steady stream of book-sourced content ideas."
      domains: [idea-generation, productivity, self-development]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-021"
      title: "Queue Optimization Process"
      description: "Weekly Queue maintenance: (1) Review all items tagged 'raw', (2) Promote items with high potential to 'developing', (3) Archive items that no longer resonate, (4) Check theme distribution — are all 3 pillars represented? (5) Identify gaps — what topics need more raw material? (6) Plan consumption for the week to fill gaps. A healthy Queue has 50-100 items across all stages."
      domains: [productivity, idea-generation, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-022"
      title: "Creating Database of Unique Perspectives"
      description: "Build a perspective library: (1) For every topic you write about, document your contrarian take, (2) Record the mainstream view AND your counter-view, (3) Note the evidence for your position, (4) Track which perspectives get most engagement, (5) Refine and strengthen over time, (6) Use as foundation for all content on that topic. Unique perspectives are your competitive moat."
      domains: [personal-branding, idea-generation, content-strategy]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-023"
      title: "Content Reuse Cascade Method"
      description: "Maximize content lifespan: (1) Write newsletter (original long-form), (2) Extract thread (medium-form derivative), (3) Extract 5-10 tweets (short-form derivatives), (4) Repost thread after 6 months, (5) Update newsletter annually, (6) Compile related newsletters into a guide or lead magnet, (7) Turn guide into a paid product module. One idea cascades into 12+ months of content."
      domains: [content-repurposing, content-strategy, productivity]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-024"
      title: "Consumption Cycle for Different Media"
      description: "Structured consumption by media type: Books — read 30 min/day, highlight, review weekly via Readwise. Podcasts — listen during walks, note timestamps of key insights. Twitter — 15 min/day curated list only, save tweets to Queue. YouTube — watch with purpose, take notes, never autoplay. Newsletter — subscribe to 5-10 max, read actively with Queue open. Each medium has specific rules to prevent passive consumption."
      domains: [self-development, productivity, creativity]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-025"
      title: "Dan's Daily Lifestyle Sequence"
      description: "Dan's personal daily system: (1) Wake without alarm, (2) 30-60 min walk (DMN activation, idea capture), (3) 2-hour writing block (creative + productive), (4) Review and respond to DMs, (5) Engagement round (15-20 replies), (6) Afternoon — business operations, calls, projects, (7) Evening — reading and idea capture. The writing block is sacred and non-negotiable."
      domains: [lifestyle-design, productivity, writing]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-026"
      title: "Newsletter Creation Pipeline (Week-Long)"
      description: "Full pipeline: Sunday — Queue review, topic selection. Monday — outline (30 min). Tuesday — write section 1. Wednesday — write section 2. Thursday — write section 3 + conclusion. Friday — edit pass 1 (structure). Saturday — edit pass 2 (Hemingway polish). Sunday — final review, schedule, plan next topic. This pipeline ensures quality through distributed effort."
      domains: [newsletter-marketing, writing, productivity]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-027"
      title: "Income-Follower Scaling Method (Validated to 50K)"
      description: "Validated monetization path: 1K followers → launch $500 service, expect 1-2 clients/month ($500-$1,000/mo). 5K → raise to $1,500, launch lead magnet, expect 3-5 clients/month ($4,500-$7,500/mo). 10K → raise to $3,000, launch course, newsletter sponsors ($10K-$15K/mo). 25K → premium services $5,000+, community, multiple products ($25K-$40K/mo). 50K → scale all channels ($50K+/mo). Dan's personal trajectory validates this path."
      domains: [monetization, audience-building, digital-leverage]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-028"
      title: "Content Strategy for Service-Based Businesses"
      description: "Service business content strategy: (1) Create content that demonstrates the transformation your service provides, (2) Use case studies as proof (with permission), (3) Share your methodology publicly (trust-building), (4) Post results regularly, (5) Use DMs to qualify interested people, (6) Direct to application/call, (7) Let content do the selling — the call is just logistics."
      domains: [sales, content-strategy, monetization]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-029"
      title: "Week-Based Content Planning"
      description: "Weekly planning process: (1) Review previous week's analytics — what performed? (2) Check Queue for high-potential items, (3) Plan 3-5 tweet themes per day, (4) Plan 1-2 threads for the week, (5) Plan newsletter topic and outline, (6) Schedule at least 3 promotion posts, (7) Set engagement targets (# of replies/day). Plan on Sunday, execute Monday-Saturday."
      domains: [content-strategy, productivity, content-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-030"
      title: "Horizontal and Vertical Questioning for Ideas"
      description: "Idea expansion technique: Take any concept and ask Horizontal questions (What else relates? What's a parallel in another field? Who else talks about this?) to expand breadth. Then ask Vertical questions (Why does this matter? What's underneath this? What's the root cause?) to expand depth. Document all answers in Queue. One concept generates 10-20 content ideas."
      domains: [idea-generation, creativity, writing]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-031"
      title: "First 30 Days Twitter Playbook"
      description: "Day 1-7: Set up profile (photo, bio, banner, pinned tweet). Follow 100 accounts in niche. Day 8-14: Post 3 tweets daily, reply to 15 accounts daily, join 1 engagement group. Day 15-21: Increase to 5 tweets daily, experiment with different structures, track what performs. Day 22-30: Write first thread, reach out to 5 creators via DM, evaluate and adjust strategy. Target: 200-500 followers by day 30."
      domains: [twitter-growth, audience-building, social-media]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-032"
      title: "Lead Magnet Creation Process"
      description: "Create a converting lead magnet: (1) Identify the #1 question your audience asks, (2) Create a short PDF/guide (5-10 pages) that answers it, (3) Design a simple cover (Canva), (4) Set up landing page on Beehiiv or ConvertKit, (5) Write a tweet announcing it, (6) Pin the tweet, (7) Add link to bio. The lead magnet should solve one specific problem completely, not be a mini-course."
      domains: [email-marketing, audience-building, offer-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-033"
      title: "DM Sales Process for Services"
      description: "Sell services through DMs: (1) Wait for inbound interest (from content), (2) Qualify — ask about their situation and goals, (3) Identify if you can help (honest assessment), (4) Describe the transformation (not features), (5) Share relevant case study or result, (6) State price and timeline, (7) Create urgency (limited spots or deadline). Never hard sell in DMs — attract, qualify, present."
      domains: [sales, networking, monetization]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-034"
      title: "Content Audit Process (Monthly)"
      description: "Monthly content review: (1) Export analytics for all posts, (2) Identify top 10% by engagement, (3) Analyze what they have in common (topic, structure, timing), (4) Identify bottom 10% — what failed? (5) Adjust content pillar distribution based on performance, (6) Update Queue priorities, (7) Plan next month's content themes based on data, not gut feeling."
      domains: [content-strategy, productivity, social-media]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-035"
      title: "Newsletter to Product Pipeline"
      description: "Turn newsletter content into products: (1) Write newsletters for 3-6 months, (2) Identify which topics get most replies and saves, (3) Compile related newsletters into a structured guide, (4) Add frameworks and templates, (5) Package as a digital product ($27-$97), (6) Sell first to newsletter audience, (7) Use sales data to refine next product. Your audience tells you what to build through engagement."
      domains: [monetization, newsletter-marketing, offer-creation]
      source: "2HW"
      confidence: 0.85

    - id: "MET-DK-036"
      title: "Platform Expansion Methodology"
      description: "Expand from Twitter to new platforms: (1) Master Twitter first (6-12 months minimum), (2) Choose ONE additional platform based on audience overlap, (3) Repurpose existing content — don't create from scratch, (4) Adapt format to platform norms (LinkedIn = professional, Instagram = visual), (5) Maintain Twitter as primary, (6) Add next platform only after new one is self-sustaining. Never maintain more than 3 active platforms."
      domains: [social-media, content-strategy, content-repurposing]
      source: "2HW"
      confidence: 0.85

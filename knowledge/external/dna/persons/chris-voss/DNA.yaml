person: chris-voss
version: "v1.0.0"
total_elements: 93
source_id: CV-NSTD
source_name: "Never Split the Difference Negotiation Course (Beyond the Book)"

layers:
  L1_PHILOSOPHIES:
    count: 23
    items:
      - id: "FIL-CV-001"
        content: "The adversary is the situation, not the person across the table — your counterpart is your partner"
        domain: negotiation-philosophy
        source: "Module 10 - Overcoming Fear"

      - id: "FIL-CV-002"
        content: "Negotiation is not rational — it's emotional. Prospect theory proved humans are irrational emotional beasts"
        domain: negotiation-philosophy
        source: "Module 1 - Heart vs Mind"

      - id: "FIL-CV-003"
        content: "Never split the difference — compromise is always lose-lose. No deal is better than a bad deal"
        domain: negotiation-philosophy
        source: "Module 6 - Dont Compromise"

      - id: "FIL-CV-004"
        content: "No is the start of negotiation, not the end — it protects autonomy and opens real dialogue"
        domain: negotiation-philosophy
        source: "Module 4 - No Starts It"

      - id: "FIL-CV-005"
        content: "Tactical empathy is understanding the feelings AND the mindset of another person while hearing the meaning behind what they say"
        domain: tactical-empathy
        source: "Module 3 - Tactical Empathy"

      - id: "FIL-CV-006"
        content: "The listener has the upper hand in every negotiation — the talker reveals, the listener learns"
        domain: negotiation-philosophy
        source: "Module 7 - The Other Side"

      - id: "FIL-CV-007"
        content: "Your biggest enemy is your own fear of conflict — we take ourselves hostage before we even get to the table"
        domain: negotiation-psychology
        source: "Module 10 - Overcoming Fear"

      - id: "FIL-CV-008"
        content: "People dont just avoid loss — they hate losing 2-9x more than gaining the same amount"
        domain: loss-aversion
        source: "Module 1 - Prospect Theory"

      - id: "FIL-CV-009"
        content: "Empathy precedes assertion — always. You cannot influence without first understanding"
        domain: tactical-empathy
        source: "Module 6 - Dont Compromise"

      - id: "FIL-CV-010"
        content: "All business negotiation follows the same human nature as hostage negotiation — the intersection is human nature"
        domain: negotiation-philosophy
        source: "Module 1 - Heart vs Mind Part 1"

      - id: "FIL-CV-011"
        content: "Fair is the most powerful word in any negotiation — it triggers emotional compliance instantly"
        domain: anchoring
        source: "Module 6 - The F-Word"

      - id: "FIL-CV-012"
        content: "Getting to 'thats right' is getting to the moment of unconditional positive regard — thats when real change happens"
        domain: behavioral-change
        source: "Module 5 - Introduction"

      - id: "FIL-CV-013"
        content: "Every negotiation is an information-gathering process — the person with the most information wins"
        domain: negotiation-philosophy
        source: "Module 2 - Introduction"

      - id: "FIL-CV-014"
        content: "Genuine honest conflict between people around their goals actually energizes collaborative problem-solving"
        domain: conflict-philosophy
        source: "Module 10 - Overcoming Fear"

      - id: "FIL-CV-015"
        content: "Too easy equals implementation problems — if you dont make them work for it, they will reneg"
        domain: implementation
        source: "Module 9 - Ackerman Bargaining"

      - id: "FIL-CV-016"
        content: "Empathy is not agreeing — its demonstrating understanding. You can understand without accepting"
        domain: tactical-empathy
        source: "Module 3 - Tactical Empathy"

      - id: "FIL-CV-017"
        content: "The real deal is the deal after the deal — negotiation without implementation is worthless"
        domain: implementation
        source: "Module 8 - Yes and How"

      - id: "FIL-CV-018"
        content: "Wimp-win deals are the most common in the kitchen and the boardroom — people surrender to avoid conflict"
        domain: conflict-philosophy
        source: "Module 10 - Overcoming Fear"

      - id: "FIL-CV-019"
        content: "Black Swans are leverage multipliers — unknown unknowns that change everything when discovered"
        domain: black-swans
        source: "Module 10 - Leverage"

      - id: "FIL-CV-020"
        content: "Emotions are not obstacles to a successful negotiation — they ARE the means"
        domain: tactical-empathy
        source: "Module 3 - Tactical Empathy"

      - id: "FIL-CV-021"
        content: "Denials of a negative dont work — they plant the very seed you want to avoid"
        domain: accusation-audit
        source: "Module 3 - Accusation Audit"

      - id: "FIL-CV-022"
        content: "The person in the conversation who feels the most in control is the one who is listening"
        domain: negotiation-power
        source: "Module 7 - Beyond the Book"

      - id: "FIL-CV-023"
        content: "You dont just want a yes — you want a committed yes. A counterfeit yes is worse than an honest no"
        domain: commitment
        source: "Module 4 - Introduction"

  L2_MENTAL_MODELS:
    count: 18
    items:
      - id: "MM-CV-001"
        content: "System 1 vs System 2 — Fast emotional brain is always on (like respiratory system), slow rational brain requires effort"
        domain: cognitive-psychology
        source: "Module 1 - Heart vs Mind Part 2"

      - id: "MM-CV-002"
        content: "Loss Aversion — People react 2-9x more intensely to losses than equivalent gains, distorting all decision-making"
        domain: cognitive-bias
        source: "Module 1 - Prospect Theory"

      - id: "MM-CV-003"
        content: "Behavioral Change Stairway — Active Listening > Empathy > Rapport > Influence > Behavioral Change (FBI model)"
        domain: behavioral-change
        source: "Module 5 - Introduction"

      - id: "MM-CV-004"
        content: "Three Types of Yes — Counterfeit (escape), Confirmation (reflexive), Commitment (real) — only last one matters"
        domain: commitment-psychology
        source: "Module 4 - Introduction"

      - id: "MM-CV-005"
        content: "Caveman Brain (Amygdala) — We envision 13 of the actual 3 negative consequences. Brain overpredicts threats"
        domain: fear-psychology
        source: "Module 10 - Overcoming Fear"

      - id: "MM-CV-006"
        content: "Team Behind the Table — Decision-makers, deal-killers, and influencers are different people with different motivations"
        domain: stakeholder-mapping
        source: "Module 7 - The Other Side"

      - id: "MM-CV-007"
        content: "Three Negotiator Types — Analyst (methodical/data), Accommodator (relationship-first), Assertive (time=money)"
        domain: personality-types
        source: "Module 9 - What Type Are You"

      - id: "MM-CV-008"
        content: "Three Types of Leverage — Positive (ability to give), Negative (ability to hurt), Normative (use their rules/religion)"
        domain: leverage
        source: "Module 10 - Three Types of Leverage"

      - id: "MM-CV-009"
        content: "7-38-55 Rule (Mehrabian) — 7% words, 38% tone of voice, 55% body language in communication impact"
        domain: communication
        source: "Module 8 - The 7-38-55%"

      - id: "MM-CV-010"
        content: "Framing Effect — Same information framed differently produces completely different decisions (90% success vs 1-in-10 failure)"
        domain: cognitive-bias
        source: "Module 1 - Framing Effect"

      - id: "MM-CV-011"
        content: "Pinocchio Effect — Liars use more words, more third-person pronouns, more complex sentences to distance themselves"
        domain: deception-detection
        source: "Module 8 - Liars Jerks and Everyone Else"

      - id: "MM-CV-012"
        content: "Reciprocity Trap — Asking a question creates obligation to answer; calibrated questions co-opt without creating debt"
        domain: influence
        source: "Module 7 - Suspend Unbelief"

      - id: "MM-CV-013"
        content: "Mirror Neurons — Humans unconsciously mimic each other; deliberate mirroring accelerates bonding and trust"
        domain: neuroscience
        source: "Module 2 - How to Confront"

      - id: "MM-CV-014"
        content: "Presenting vs Underlying Emotions — What they show (anger) vs what they feel (fear/insecurity). Label the underlying"
        domain: emotional-intelligence
        source: "Module 3 - Negative and Positive"

      - id: "MM-CV-015"
        content: "Black Swans — Unknown unknowns that change the entire dynamic. 3-5 per negotiation. Discovery = leverage explosion"
        domain: black-swans
        source: "Module 10 - Leverage"

      - id: "MM-CV-016"
        content: "Unconditional Positive Regard (Carl Rogers) — 'Thats right' moment = person feels truly understood for first time"
        domain: behavioral-change
        source: "Module 5 - Introduction"

      - id: "MM-CV-017"
        content: "Listeners Judo — Use counterparts own energy through calibrated questions; co-opt rather than conquer"
        domain: negotiation-strategy
        source: "Module 7 - Beyond the Book"

      - id: "MM-CV-018"
        content: "Deadline Psychology — All deadlines are emotional and often arbitrary. Revealing yours builds trust; hiding creates panic"
        domain: time-pressure
        source: "Module 6 - Deadlines"

  L3_HEURISTICS:
    count: 30
    items:
      - id: "HEUR-CV-001"
        content: "First offer at 65% of target price — extreme anchor shifts their range"
        type: numeric
        domain: bargaining
        source: "Module 9 - Ackerman Bargaining"

      - id: "HEUR-CV-002"
        content: "Three raises at decreasing increments: 20%, 10%, 5% of target — signals approaching limit"
        type: numeric
        domain: bargaining
        source: "Module 9 - Ackerman Bargaining"

      - id: "HEUR-CV-003"
        content: "Use precise non-rounded numbers ($37,893 not $37,500) — adds credibility and weight to any offer"
        type: numeric
        domain: anchoring
        source: "Module 9 - Ackerman Bargaining"

      - id: "HEUR-CV-004"
        content: "Throw non-monetary item on final number (year supply of smoothies) — shows youre at your absolute limit"
        type: qualitative
        domain: bargaining
        source: "Module 9 - Ackerman Bargaining"

      - id: "HEUR-CV-005"
        content: "Labels always start with 'It seems like / It sounds like / It looks like' — NEVER with 'I think'"
        type: verbal
        domain: labeling
        source: "Module 3 - Labeling"

      - id: "HEUR-CV-006"
        content: "After a label, shut up — minimum 4 seconds of silence. Let the label work"
        type: numeric
        domain: labeling
        source: "Module 3 - Labeling"

      - id: "HEUR-CV-007"
        content: "Mirror the last 1-3 words of what they said — triggers elaboration without asking a question"
        type: numeric
        domain: mirroring
        source: "Module 2 - How to Confront"

      - id: "HEUR-CV-008"
        content: "'Have you given up on this project?' email gets average 3-minute response time from even most unresponsive people"
        type: numeric
        domain: email-negotiation
        source: "Module 4 - No is Protection"

      - id: "HEUR-CV-009"
        content: "No-oriented questions outperform yes-oriented questions — 'Is this a bad time?' beats 'Do you have a minute?'"
        type: qualitative
        domain: questioning
        source: "Module 4 - No Starts It"

      - id: "HEUR-CV-010"
        content: "70% of buying decisions are driven by avoiding loss, not seeking gain — frame everything as loss prevention"
        type: numeric
        domain: loss-aversion
        source: "Module 6 - Emotional Drivers"

      - id: "HEUR-CV-011"
        content: "A calibrated 'no' is worth 5 yeses — 'no' gives feeling of safety and control"
        type: numeric
        domain: no-oriented
        source: "Module 4 - No Starts It"

      - id: "HEUR-CV-012"
        content: "Bundle calibrated questions in groups of 3 — overwhelming but not aggressive"
        type: numeric
        domain: calibrated-questions
        source: "Module 7 - Calibrate"

      - id: "HEUR-CV-013"
        content: "Accusation audit: List every terrible thing they could say about you, then say it first — defuses completely"
        type: qualitative
        domain: accusation-audit
        source: "Module 3 - Accusation Audit"

      - id: "HEUR-CV-014"
        content: "Use odd numbers in offers — perceived as calculated result, not arbitrary rounding"
        type: qualitative
        domain: anchoring
        source: "Module 6 - Emotional Drivers"

      - id: "HEUR-CV-015"
        content: "Late-night FM DJ voice for delivering bad news, establishing authority, or making a point that sticks"
        type: qualitative
        domain: voice-control
        source: "Module 2 - The Voice"

      - id: "HEUR-CV-016"
        content: "Use positive/playful voice 80% of the time — creates open, collaborative atmosphere"
        type: numeric
        domain: voice-control
        source: "Module 2 - The Voice"

      - id: "HEUR-CV-017"
        content: "Never use 'why' in calibrated questions — it sounds accusatory. Replace with 'what caused' or 'what makes'"
        type: qualitative
        domain: calibrated-questions
        source: "Module 7 - Calibrate"

      - id: "HEUR-CV-018"
        content: "Always let the other side go first in bargaining when possible — their anchor may be better than expected"
        type: qualitative
        domain: bargaining
        source: "Module 6 - Emotional Drivers"

      - id: "HEUR-CV-019"
        content: "Rule of Three — get agreement three different ways to confirm commitment is real, not counterfeit"
        type: numeric
        domain: implementation
        source: "Module 8 - Yes and How"

      - id: "HEUR-CV-020"
        content: "$500K divorce settlement reduced to $35K using accusation audit alone"
        type: case-study
        domain: accusation-audit
        source: "Module 3 - Accusation Audit Part 2"

      - id: "HEUR-CV-021"
        content: "If they say 'youre right' you have LOST — its a dismissal. 'Thats right' is the goal — it means true understanding"
        type: qualitative
        domain: thats-right
        source: "Module 5 - Thats Right"

      - id: "HEUR-CV-022"
        content: "Summary = Paraphrase + Label — this is the formula that triggers 'thats right'"
        type: formula
        domain: thats-right
        source: "Module 5 - Thats Right"

      - id: "HEUR-CV-023"
        content: "In salary negotiations, persist on non-salary terms first (title, flexibility, development) before touching money"
        type: qualitative
        domain: salary-negotiation
        source: "Module 6 - Get a Better Salary"

      - id: "HEUR-CV-024"
        content: "'What does it take to be successful here?' — defines success metrics AND sparks your boss interest in your success"
        type: qualitative
        domain: salary-negotiation
        source: "Module 6 - Get a Better Salary"

      - id: "HEUR-CV-025"
        content: "Reveal your deadline to build trust — counterparts tighten offers when they know time is running out"
        type: qualitative
        domain: deadline-management
        source: "Module 6 - Deadlines"

      - id: "HEUR-CV-026"
        content: "4-second silence minimum after mirrors and labels — let the tool work before speaking again"
        type: numeric
        domain: silence
        source: "Module 2 - How to Confront"

      - id: "HEUR-CV-027"
        content: "Direct/assertive voice only as last resort — its counterproductive 90% of the time"
        type: numeric
        domain: voice-control
        source: "Module 2 - The Voice"

      - id: "HEUR-CV-028"
        content: "If they say 'Ill try' — they wont. Probe deeper with 'It sounds like youre not fully comfortable with this'"
        type: qualitative
        domain: deception-detection
        source: "Module 8 - Liars Jerks"

      - id: "HEUR-CV-029"
        content: "Mislabel on purpose to provoke a 'no' that corrects you into the truth — controlled provocation"
        type: qualitative
        domain: labeling
        source: "Module 4 - Persuade in Their World"

      - id: "HEUR-CV-030"
        content: "'How am I supposed to do that?' — the one calibrated question that replaces No and invites problem-solving"
        type: qualitative
        domain: calibrated-questions
        source: "Module 7 - Suspend Unbelief"

  L4_FRAMEWORKS:
    count: 15
    items:
      - id: "FW-CV-001"
        content: "Ackerman Model — 6-step bargaining system: 1) Set target, 2) First offer 65%, 3) Calculate 3 raises (20/10/5%), 4) Use empathy to resist raising, 5) Final with precise non-rounded number, 6) Non-monetary item to signal limit"
        domain: bargaining
        source: "Module 9 - Ackerman Bargaining"

      - id: "FW-CV-002"
        content: "4-Step Mirror — 1) Use late-night FM DJ voice, 2) Start with 'Im sorry...', 3) Mirror last 1-3 words, 4) Silence at least 4 seconds"
        domain: mirroring
        source: "Module 2 - How to Confront"

      - id: "FW-CV-003"
        content: "Accusation Audit — 1) List ALL possible criticisms, 2) Create label for each, 3) Lead with them before your case, 4) Allow response, 5) Only then present position"
        domain: accusation-audit
        source: "Module 3 - Accusation Audit"

      - id: "FW-CV-004"
        content: "Calibrated Questions Framework — What/How ONLY; avoid Why/Can/Is/Do; bundle in groups of 3; follow with silence"
        domain: calibrated-questions
        source: "Module 7 - Calibrate"

      - id: "FW-CV-005"
        content: "5 Voice Types — Inquisitive (curiosity), Declarative (neutral), Positive/Playful (default 80%), FM DJ (authority), Direct/Assertive (last resort)"
        domain: voice-control
        source: "Module 2 - The Voice"

      - id: "FW-CV-006"
        content: "Labeling Framework — 'It seems/sounds/looks like...' + Silence + Listen + If denied go deeper + Repeat until acknowledged"
        domain: labeling
        source: "Module 3 - Labeling"

      - id: "FW-CV-007"
        content: "Summary Formula — Paraphrase (their position in your words) + Label (their emotions) = Summary that triggers 'Thats Right'"
        domain: thats-right
        source: "Module 5 - Thats Right"

      - id: "FW-CV-008"
        content: "3 Types of Leverage — Positive (ability to give what they want), Negative (ability to cause loss), Normative (their own rules/religion used against them)"
        domain: leverage
        source: "Module 10 - Three Types of Leverage"

      - id: "FW-CV-009"
        content: "No-Oriented Questions — Flip yes-traps to no-triggers: 'Is this a bad time?' / 'Would it be unreasonable if...' / 'Have you given up on...?'"
        domain: no-oriented
        source: "Module 4 - No Starts It"

      - id: "FW-CV-010"
        content: "Behavioral Change Stairway (FBI) — Active Listening > Empathy > Build Rapport > Influence > Behavioral Change (sequential, no skipping)"
        domain: behavioral-change
        source: "Module 5 - Introduction"

      - id: "FW-CV-011"
        content: "Salary Negotiation 3-Step — 1) Persist on non-salary terms, 2) Define success metrics ('what does it take'), 3) Spark boss interest in your growth"
        domain: salary-negotiation
        source: "Module 6 - Get a Better Salary"

      - id: "FW-CV-012"
        content: "Black Swan Discovery — 1) Identify leverage type (positive/negative/normative), 2) Know their religion (worldview), 3) Seek their mistakes (3 types: ill-informed, constrained, vested)"
        domain: black-swans
        source: "Module 10 - Know Their Religion"

      - id: "FW-CV-013"
        content: "3 Negotiator Types Strategy — Analyst: give data + time; Accommodator: build rapport first; Assertive: show respect for their time + solution-orient"
        domain: personality-adaptation
        source: "Module 9 - What Type Are You"

      - id: "FW-CV-014"
        content: "Rule of Three — Get commitment 3 ways: 1) Direct agreement, 2) Label for confirmation ('it seems like youre on board'), 3) Calibrated question ('how will we know this is working')"
        domain: implementation
        source: "Module 8 - Yes and How"

      - id: "FW-CV-015"
        content: "Liar Detection (Pinocchio) — Listen for: 1) More words than needed, 2) Third-person pronouns, 3) Complex sentences, 4) 7-38-55 incongruence (words vs tone vs body)"
        domain: deception-detection
        source: "Module 8 - Liars Jerks"

  L5_METHODOLOGIES:
    count: 7
    items:
      - id: "MET-CV-001"
        content: "Complete Negotiation Process — 1) Prepare (research + accusation audit + hypothesis), 2) Open (empathy + labels + mirrors), 3) Discover (calibrated questions + tactical silence), 4) Bargain (Ackerman Model), 5) Implement (Rule of Three + how questions), 6) Follow up (Black Swan discovery + relationship maintenance)"
        domain: negotiation-process
        source: "Synthesis of all 10 modules"

      - id: "MET-CV-002"
        content: "Mirroring Methodology — Step 1: Set tone (FM DJ voice), Step 2: 'Im sorry...' or empathic opener, Step 3: Mirror last 1-3 words with upward inflection, Step 4: Silence minimum 4 seconds, Step 5: Listen for elaboration, Repeat until underlying concern surfaces"
        domain: mirroring
        source: "Module 2 - How to Confront"

      - id: "MET-CV-003"
        content: "Labeling Methodology — Step 1: Observe emotion (presenting AND underlying), Step 2: Label with 'It seems/sounds/looks like...', Step 3: Silence minimum 4 seconds, Step 4: If denied = go deeper (underlying emotion), Step 5: Continue until fully acknowledged"
        domain: labeling
        source: "Module 3 - Labeling"

      - id: "MET-CV-004"
        content: "Accusation Audit Full Process — Step 1: List ALL possible criticisms they have of you, Step 2: Create specific label for each criticism, Step 3: Deliver calmly and empathetically BEFORE your case, Step 4: Allow full response, Step 5: Only then present your position (barriers are cleared)"
        domain: accusation-audit
        source: "Module 3 - Accusation Audit"

      - id: "MET-CV-005"
        content: "Ackerman Bargaining Full Process — Step 1: Set target price (non-negotiable), Step 2: First offer at 65% of target, Step 3: Use tactical empathy to resist raising ('How am I supposed to do that?'), Step 4: Three raises at 20% then 10% then 5%, Step 5: Final number is precise non-rounded, Step 6: Add non-monetary item to signal absolute limit"
        domain: bargaining
        source: "Module 9 - Ackerman Bargaining"

      - id: "MET-CV-006"
        content: "Getting to Thats Right — Step 1: Active listen (minimal encouragers), Step 2: Paraphrase their position accurately, Step 3: Label their emotions, Step 4: Combine paraphrase + labels into summary, Step 5: Deliver summary and wait, Step 6: 'Thats right' = green light for influence"
        domain: thats-right
        source: "Module 5 - Thats Right + Using Thats Right"

      - id: "MET-CV-007"
        content: "Detecting Deception — Step 1: Establish baseline with easy questions, Step 2: Ask calibrated questions on topic, Step 3: Listen for word count increase, Step 4: Note third-person pronoun shift, Step 5: Watch 7-38-55 incongruence, Step 6: Apply Rule of Three to test consistency"
        domain: deception-detection
        source: "Module 8 - Liars Jerks + The 7-38-55%"


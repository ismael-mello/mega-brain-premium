# --- L1_PHILOSOPHIES (BOC) ---
  - id: "FIL-DK-593"
    title: "You can be paid for doing something - you have to be somebody to be very well paid"
    content: "You can be paid for doing something. Almost everybody is. Waitresses, cab driver, doctor, lawyer, we're all paid for doing something. You have to be somebody to be very well paid. You will be paid commensurate with who you are, not commensurate with what you do."
    source: "business-of-copywriting"
    tags: [positioning, pricing, identity, client-attraction]
  - id: "FIL-DK-594"
    title: "We are in the self-aggrandizement business - copy is just the exchange medium"
    content: "Halbert said to me, we're in the self-aggrandizement business. We write copy because you got to deliver something for the money. But we're in the self-aggrandizement business. Nobody but Kardashian and Paris Hilton have figured out how to get paid just to be in the self-aggrandizement business. Everybody else has to exchange something for the money."
    source: "business-of-copywriting"
    tags: [positioning, self-marketing, halbert-quote, client-attraction]
  - id: "FIL-DK-595"
    title: "Ogilvy advertised Ogilvy - the business of advertising yourself"
    content: "Above all other advertising people, Ogilvy advertised Ogilvy. You got to be in the business of advertising you. Not just your services. Because all services can be commoditized. The distinction and the differentiation has to be you. He was as much in the business of being Ogilvy as in the business of being anything else."
    source: "business-of-copywriting"
    tags: [positioning, personal-branding, ogilvy, self-marketing]
  - id: "FIL-DK-596"
    title: "Businesses don't buy - only human beings buy and they care about themselves"
    content: "Businesses don't buy anything. Only human beings buy things. And human beings care about themselves more than anything else. So even in B2B, you still want to be personal. Your very first personal benefit should lead in B2B copy."
    source: "business-of-copywriting"
    tags: [b2b-marketing, copywriting, human-nature, client-attraction]
  - id: "FIL-DK-597"
    title: "Price lists are for pizza shops not for professionals"
    content: "Price lists are for pizza shops. Price lists are not for professionals. You don't walk into the Cleveland Clinic and find a price list. That's not the way it works. And so it shouldn't work that way for us either. Taking prices off the website doubled sales month to month."
    source: "business-of-copywriting"
    tags: [pricing, positioning, fee-presentation, professional-services]
  - id: "FIL-DK-598"
    title: "In the land of the blind the one-eyed man is king - relative competence"
    content: "John Francis Tighe's quote: it is in the land of the blind, the one-eyed man is king. You don't even need both eyes if your client is half blind. You only need more know-how, skill, and available time than they've got."
    source: "business-of-copywriting"
    tags: [consulting, competence, confidence, client-attraction]
  - id: "FIL-DK-599"
    title: "Never underestimate the stupidity of the successful - they are not that bright"
    content: "You don't want to underestimate the stupidity of the successful. They're not as bright as everybody thinks they are, not even close. The secret reason why there aren't more rich people is because poor people think there's something special about rich people that they don't have."
    source: "business-of-copywriting"
    tags: [consulting, confidence, money-mindset, client-attraction]
  - id: "FIL-DK-600"
    title: "The word negotiate should never be spoken - it is an evil nasty word"
    content: "The word negotiate should never be spoken. It's an evil, nasty word. Several people have said it today in this room. Bad word. He's asking for it. Whatever fee he quotes, they're going to negotiate it. He told them to negotiate. If he gets somebody who doesn't negotiate, they're too dumb to take as a client."
    source: "business-of-copywriting"
    tags: [pricing, fee-presentation, negotiation, contracts]
  - id: "FIL-DK-601"
    title: "If you insist on investing effort only in the message you lose"
    content: "If you insist on investing effort only in the message, you lose. Because you are writers and you entered the room thinking of yourself as copywriters, you will tend to focus on the copy. Whereas you need to divide your focus over message, media, markets, strategic issues."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, consulting, strategy-vs-copy]
  - id: "FIL-DK-602"
    title: "Little benefit in achieving more than good enough results - move to bigger opportunity"
    content: "There is little benefit to you in achieving more than good enough results. Unless your royalties are tied to maximum results. If you spend too much time perfecting one thing while not moving the client to six other bigger better opportunities, you've accomplished nothing with all that extra effort."
    source: "business-of-copywriting"
    tags: [project-management, optimization, consulting, good-enough]
  - id: "FIL-DK-603"
    title: "Most beliefs about money are unhelpful - taught by people with bad money relationships"
    content: "Most people's beliefs about money are unhelpful rather than helpful because most of them have been taught to you and implanted in you by people who don't have a good relationship with money themselves. And so you got what you get."
    source: "business-of-copywriting"
    tags: [money-mindset, belief-systems, ideology]
  - id: "FIL-DK-604"
    title: "A buyer is a buyer is a buyer - past purchase behavior predicts future"
    content: "A buyer is a buyer is a buyer is a buyer. Most of my clients who've hired me to ghost write books in the past five years have already bought one of those co-authored anthology books. They already are in one of those. Now they want their own."
    source: "business-of-copywriting"
    tags: [customer-behavior, ghostwriting, buyer-psychology]
  - id: "FIL-DK-605"
    title: "I do projects not pieces - never accept piece work"
    content: "I do projects, not pieces. When they ask how much to do a full page magazine ad: A, I don't know if we're going to do a full page magazine ad. And B, I don't know if we're going to do one or twenty. I do projects, not pieces. Let's have the conversation about the objective first."
    source: "business-of-copywriting"
    tags: [pricing, consulting, project-definition, fee-presentation]
  - id: "FIL-DK-606"
    title: "Free is a dangerous precedent - hard to take back once established"
    content: "Establishing the precedent of free is hard to take back. Very difficult. So when you do free, you've got to think long and hard about it. It ought to be the exception. J. Abraham's wrap: he has decided for reasons X Y Z to buy you a day of his time. Making an exception and actually buying you his day."
    source: "business-of-copywriting"
    tags: [pricing, fee-presentation, consulting, free-work]
  - id: "FIL-DK-607"
    title: "Signing NDAs is an invitation to be litigated against"
    content: "Signing non-disclosure agreements and signing confidentiality agreements is an invitation to be litigated against. That's what it is. I haven't seen anybody yet with an original idea. They all think they got one but they don't. I got 50 duplicates in my file drawer."
    source: "business-of-copywriting"
    tags: [contracts, legal, consulting, nda]
  - id: "FIL-DK-608"
    title: "The difficulty of prospecting breeds skepticism - if you are good why prospect"
    content: "You ought not underestimate the difficulty of overt prospecting because it is by its very nature handicapped by the fact that it breeds skepticism. Not only is it bad positioning, but if you're in good demand, why the hell do you have to be prospecting? You should be so busy that you would never need to."
    source: "business-of-copywriting"
    tags: [client-attraction, positioning, prospecting, skepticism]

# --- L2_MENTAL_MODELS (BOC) ---
  - id: "MM-DK-582"
    title: "Skatoma - business blindness where owners become immune to their own problems"
    content: "Almost every business owner has skatoma. You should look it up because it's a good rap to give them. Part of your diagnosis is you have skatoma. Like cat owners who don't smell their cats anymore. Somebody fresh comes in, they smell it in a hot second. We visually become immune to what's going on in our business."
    source: "business-of-copywriting"
    tags: [consulting, diagnosis, fresh-eyes, client-attraction]
  - id: "MM-DK-583"
    title: "The Ham Story - questioning inherited business practices through three why questions"
    content: "Zig's story about the ham: daughter cuts ends off because mom always did. Mom did because grandma did. Grandma did because her pot was too small. For two generations everyone cuts the ends off because that's what we do. In business, if you ask three dumb questions in a row about anything, you'll get to the point they can't defend it."
    source: "business-of-copywriting"
    tags: [consulting, diagnosis, questioning, inherited-practices]
  - id: "MM-DK-584"
    title: "Kill It and Drag It Back - display hunting effort to build client obligation"
    content: "I don't want to give them everything all at once. I want to make it look like what I'm doing for them is more difficult than it is. Like I put myself out more than I am. If I know what to show a client, I don't pre-organize it neatly. I go back into the storeroom and root around and find it for them. Going out hunting, killing it, dragging it back for us to eat."
    source: "business-of-copywriting"
    tags: [client-management, obligation, posture, consulting]
  - id: "MM-DK-585"
    title: "Good Enough Spot - every business and task has an optimization threshold"
    content: "There's what I call the good enough spot. Not all GE spots are in the same place. Southwest Airlines has a different GE spot than American first class. If you spend too much time getting cost per sale from 180 to 165 when the client is happy at 180, you've accomplished nothing. Move to the next bigger opportunity."
    source: "business-of-copywriting"
    tags: [project-management, optimization, consulting, diminishing-returns]
  - id: "MM-DK-586"
    title: "The Muse - clients must pursue you not the reverse for proper positioning"
    content: "If I'm at a cocktail party and I turn around and tap someone on the shoulder saying I can solve your problem, they back away. But if someone else says 'see that guy over there, he solved that problem 412 times,' it's a whole different thing. His acceptance of the preposterous idea is facilitated by it being a big deal just to get to her."
    source: "business-of-copywriting"
    tags: [positioning, client-attraction, pursuit-reversal, referrals]
  - id: "MM-DK-587"
    title: "Celebrity Buried in the Closet - finding the undervalued story in every business"
    content: "Miracle Air had Ken Dalvorkin buried. WWII fighter pilot, 103 missions, triple ace, shot down three times, Distinguished Service Cross, Silver Star, Purple Heart. Their average customer is 60 plus. He's John Wayne. They weren't using him. I find him talking to a franchise owner in a dinky town. They had a celebrity and they had him buried."
    source: "business-of-copywriting"
    tags: [consulting, copywriting, storytelling, undervalued-assets]
  - id: "MM-DK-588"
    title: "Secular Religion of Business - untested articles of faith that must be challenged"
    content: "Every business and every business owner has this secular religion that they believe about their business. Works just like a real religion. It's got ten commandments that can't be broken. They haven't been tested in eons. They're not fact-based, not data-based, not experience-based. They're just a belief system. Challenge them."
    source: "business-of-copywriting"
    tags: [consulting, diagnosis, belief-systems, business-assumptions]
  - id: "MM-DK-589"
    title: "The Frog Model - poor people don't know rich people are as dumb as they are"
    content: "Frog is smarter than some of my clients but doesn't make much money. The main reason is he thinks there's something unique about rich people, some gene they have that he doesn't. He has no idea how dumb they are. If he knew, he might do something about it."
    source: "business-of-copywriting"
    tags: [money-mindset, confidence, wealth-perception, consulting]
  - id: "MM-DK-590"
    title: "Niche Segmentation Beat-the-Control - 7 packages to 7 segments beats 1 to all"
    content: "Financial newsletter subscribers are 60-70% from 7 professional groups: doctors, dentists, lawyers, pilots. Instead of one package to everybody, bust out the dentists, change envelope and lift note to talk dentalese, find a dentist testimonial. Mail seven different packages to seven segments. You could beat the control in your sleep."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, segmentation, list-management, beat-the-control]
  - id: "MM-DK-591"
    title: "Patient Farming - six months of groundwork before overt marketing"
    content: "Create a newsletter for the niche, begin sending it as if they had subscribed. Illustrate everything wrong with their industry marketing. Introduce yourself, make yourself look smart. Put out a niche book even if you print 80 copies. After six months of groundwork, if you still need to, start overt marketing. You probably won't need to."
    source: "business-of-copywriting"
    tags: [client-attraction, positioning, long-game, content-marketing]
  - id: "MM-DK-592"
    title: "Specialized Knowledge Pyramid - presidents need people who aren't presidents"
    content: "Presidents are dependent on people who aren't presidents to become presidents. What Carville and Rove know is direct marketing - demographics, lists, direct mail. The presidents can't even spell direct marketing. Neither Kenny Rogers nor Smothers Brothers exist without Ken Craven. Trump ain't possible without George Ross."
    source: "business-of-copywriting"
    tags: [consulting, value-proposition, specialized-knowledge, confidence]

# --- L3_HEURISTICS (BOC) ---
  - id: "HEUR-DK-764"
    title: "35% refund rate to 20% with stick letters - split the 15-point reduction 50/50"
    content: "Client has a 35% refund rate but making tons of money so they ignore it. Series of stick letters reminding why they bought - probably cut to 20%. That's 15 points. On the front end they can only give me 1% royalty. On the refund reduction, we're splitting it - 7 points of that's mine. Huge money."
    source: "business-of-copywriting"
    tags: [pricing, royalties, refund-reduction, stick-letters, client-management]
  - id: "HEUR-DK-765"
    title: "Three-person integrity test before accepting client - need three positive references"
    content: "If I can't find three people who've done business with you who say they would do business with you again, we're not going to do business. Because I kind of know I'm not going to be the one to cure all the bad behavior."
    source: "business-of-copywriting"
    tags: [client-management, screening, problem-clients, integrity]
  - id: "HEUR-DK-766"
    title: "All salesy paragraphs start with as you probably know - they probably don't"
    content: "Almost all my salesy paragraphs start with the words 'as you probably know.' They probably don't know. That's why I'm telling them. But they're supposed to."
    source: "business-of-copywriting"
    tags: [copywriting, sales-letters, persuasion, positioning]
  - id: "HEUR-DK-767"
    title: "Never answer the fee question before a diagnostic conversation"
    content: "Talking about money too soon is a mistake. How much do you charge to do a full page magazine ad? You'll never get an answer from me. Because it's the wrong question. I do projects not pieces. Let's have the conversation about the objective first. Then let's talk about the money."
    source: "business-of-copywriting"
    tags: [pricing, fee-presentation, consulting, diagnostic]
  - id: "HEUR-DK-768"
    title: "Remove prices from website - removing them doubled sales month to month"
    content: "We took our prices off our website and stopped listing them altogether. We doubled sales month to month from April to May. Encourages consultative selling, reduces apples-to-apples price comparisons, strengthens positioning, allows raising prices at will. Single most important reason: allows you to choose your customers."
    source: "business-of-copywriting"
    tags: [pricing, positioning, website, fee-presentation]
  - id: "HEUR-DK-769"
    title: "Never let referrer give you prospect contact - make prospect contact you"
    content: "Often somebody says I told Billy Bob about you, here's his contact. I don't want his contact. I'm not going to contact him. My process starts with client inquiry. He has to contact me. Go back to Billy Bob and tell him what to do. Send him one of my books."
    source: "business-of-copywriting"
    tags: [client-attraction, referrals, positioning, pursuit-reversal]
  - id: "HEUR-DK-770"
    title: "Always report back to referrer regardless of outcome - control the narrative"
    content: "If you get a referral you should always report. They want to know. They deserve to know. And you want to control what they're told. You don't want the referred person reporting back. You want to be the one to report that. Use it as excuse to get into something else with the referrer."
    source: "business-of-copywriting"
    tags: [referrals, client-management, relationship-building]
  - id: "HEUR-DK-771"
    title: "Standard contract paragraphs in block typeface - variable in Times Roman"
    content: "Paragraphs in block typeface communicate that they are standard. Times Roman are the variable paragraphs that change for the client. This reduces negotiation by signaling these are my standard paragraphs that everybody agrees to."
    source: "business-of-copywriting"
    tags: [contracts, fee-resistance, typography, negotiation-prevention]
  - id: "HEUR-DK-772"
    title: "Give me a call today is the worst call to action - implies you are sitting around"
    content: "Give me a call today means what? You're sitting around waiting for a call. That ain't no good. Then 'I would love to discuss your project' - what does that imply? Free. Unless you're sleeping with them, you ought not be loving discussing their project."
    source: "business-of-copywriting"
    tags: [copywriting, calls-to-action, positioning, client-attraction]
  - id: "HEUR-DK-773"
    title: "Start narrow go broad - never start broad and try to go narrow"
    content: "It's easiest to begin narrow and then go broad. You get lost when you're broad. I started by positioning myself as direct response marketing specialist. Then simultaneously went narrow: speakers (6000 reachable) and chiropractors. Narrow to broad, never the reverse."
    source: "business-of-copywriting"
    tags: [positioning, niche-marketing, client-attraction, career-strategy]
  - id: "HEUR-DK-774"
    title: "Make clients fill out questionnaire - builds authority and exposes inadequacies"
    content: "If you are a little light on authority, making them do the questionnaire imposes some authority. It also exposes inadequacies, makes them invest in you, demonstrates how smart you are, and the very fact that you have a process is reassuring."
    source: "business-of-copywriting"
    tags: [consulting, authority, questionnaires, client-management]
  - id: "HEUR-DK-775"
    title: "In B2B lead with personal benefit not business benefit"
    content: "Read this letter to slash your stress by 90%. That's a personal benefit not a business benefit. Businesses don't buy anything. Only human beings buy things. And human beings care about themselves more than anything else."
    source: "business-of-copywriting"
    tags: [copywriting, b2b-marketing, personal-benefits, direct-mail]
  - id: "HEUR-DK-776"
    title: "Recording consulting days is mandatory - tell clients to bring equipment"
    content: "I want to record consulting days. If you don't tell them to bring recording equipment, they show up without a pencil. From my standpoint, I want the recording because I said a lot of smart stuff that I don't remember that I need to use to do the work for them."
    source: "business-of-copywriting"
    tags: [consulting, diagnostic-day, documentation, client-management]
  - id: "HEUR-DK-777"
    title: "Nobody I know ever beat a Halbert control - but you can beat it strategically"
    content: "I don't know anybody that ever beat a Halbert control. I tried five times. I got two of mine he couldn't beat. But you're not going to beat a Halbert control. However, you can beat ANY control by changing strategy: different segments, different media, different envelope, different lift note."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, beat-the-control, halbert, strategy-vs-copy]
  - id: "HEUR-DK-778"
    title: "The book of EST has the best agreements process ever - read it regardless of opinion"
    content: "The first three hours of the EST seminar was the agreements process. The book of est has it almost word for word. It's irrelevant what you think of EST. But they probably had the best agreements process. Read it and see a good agreement process."
    source: "business-of-copywriting"
    tags: [contracts, agreements, client-management, est]
  - id: "HEUR-DK-779"
    title: "Consulting day fee $9700 in 2005 - projects $50K to $200K plus"
    content: "The fee for the day is $9,700. In this instance I want two additional concessions. Projects range from $50K to $100K or more. First project was $45,000. He wound up spending a couple hundred thousand. I'm the most expensive guy on the planet."
    source: "business-of-copywriting"
    tags: [pricing, fee-benchmarks, consulting, fee-presentation]
  - id: "HEUR-DK-780"
    title: "Ghostwriting is lower stress because usually not response-sensitive"
    content: "Ghost writing projects are not usually response sensitive. The stress level is lower because they're being used for general promotional purposes or as part of shock and awe packages. And there's ego attachment - they actually want to have a book."
    source: "business-of-copywriting"
    tags: [ghostwriting, project-types, stress-management, special-opportunities]
  - id: "HEUR-DK-781"
    title: "When someone has emergency 911 call - get paid well because result will be not as bad"
    content: "Clients with emergencies. You can get a lot of money from them, but you have very low likelihood of success and long-term relationships. The result won't be good - it will just be not as bad as it would be. Better be well paid for it."
    source: "business-of-copywriting"
    tags: [client-management, problem-clients, emergencies, pricing]
  - id: "HEUR-DK-782"
    title: "Average nonfiction book sells 8000 copies then dies - focus on the right 10000 people"
    content: "Average nonfiction book sells about 8,000 copies then dies. NoBS books do 20-35K but with internal consumption maybe reaching 10K new people. I don't want to sell 100K books. I want to focus on selling 5 books to those 10,000 people who if I influence them I really have got the person I want."
    source: "business-of-copywriting"
    tags: [books, publishing, targeted-marketing, positioning]
  - id: "HEUR-DK-783"
    title: "Rarely prospect for clients - say it even though you do it all the time"
    content: "I rarely prospect for clients or hunt for opportunity. Actually I do it all the time. That's exactly what I'm doing. But I'm not going to say that. I rarely prospect for clients or hunt for opportunity. But in your case, you I want."
    source: "business-of-copywriting"
    tags: [positioning, prospecting, takeaway-selling, posture]
  - id: "HEUR-DK-784"
    title: "Delay delivering some information from call to follow-up letter"
    content: "A few random thoughts I didn't get to in the call. Well, here's why you didn't get to them in the call: because I wanted to give them to him after the call. I want more than one contact, a reason for more than one contact, and the demonstration that I am thinking about him and going on his behalf."
    source: "business-of-copywriting"
    tags: [client-management, obligation-building, follow-up, posture]
  - id: "HEUR-DK-785"
    title: "Famous person nobody's ever heard of - strategic fame to small cadre who can pay"
    content: "I've always thought of myself as the famous person nobody's ever heard of. You and I can stroll around this hotel lobby and the paparazzi won't ruin our evening. But 15 years after not doing active marketing to chiropractors, I can still walk around their convention and have people rushing up. You want to be famous to the right few."
    source: "business-of-copywriting"
    tags: [positioning, visibility, strategic-fame, niche-marketing]
  - id: "HEUR-DK-786"
    title: "Lock all lead sources into same standardized process regardless of origin"
    content: "Whether it's a networking cocktail party conversation, somebody who inquires from your books, a referral, or a bunch of people in the back of the room when you speak, take them all home and shove them into the same machine. Same process. If you're not disciplined about this, you will squander prospects."
    source: "business-of-copywriting"
    tags: [client-attraction, process, lead-management, discipline]

# --- L4_FRAMEWORKS (BOC) ---
  - id: "FW-DK-747"
    title: "Client Attraction Three Pillars - Opportunity Methodology Ideology"
    content: "In client attraction, we're dealing with three issues. One is Opportunity: where are clients, sources, access, who to go after. Two is Methodology: how to position, market, sell, and manage. Three is Ideology: belief systems about yourself, clients, business, and money. Ideology has as much to do with success as anything."
    source: "business-of-copywriting"
    tags: [client-attraction, framework, positioning, ideology]
  - id: "FW-DK-748"
    title: "Values Beyond Wallet - 12 consulting values independent of income differential"
    content: "Values you bring regardless of income gap: (1) Fresh eyes, (2) Dumb questions, (3) Forced thought, (4) Interaction and defending ideas, (5) Unearthing ignored opportunities, (6) Finding undervalued stories, (7) Validation, (8) Motivation, (9) Decision-making support, (10) Accelerated implementation, (11) Resources and connections, (12) Specialized knowledge."
    source: "business-of-copywriting"
    tags: [consulting, value-proposition, confidence, client-attraction]
  - id: "FW-DK-749"
    title: "Fee Presentation Seven Mistakes - what NOT to do when discussing money"
    content: "Seven fee presentation mistakes: (1) Establishing precedent of free, (2) Writing to assignment instead of projects, (3) Talking about money too soon, (4) Selling mode/ping-pong objections, (5) Inviting negotiation by using the word or publishing prices, (6) No diagnostic conversation first, (7) Vigorously defending against objections."
    source: "business-of-copywriting"
    tags: [pricing, fee-presentation, mistakes, consulting]
  - id: "FW-DK-750"
    title: "Problem Clients Framework - nine categories to screen and manage"
    content: "Nine problem client types: (1) Just doesn't get it, (2) Refusal to work as agreed, (3) Interference by committee, (4) Personality conflicts, (5) Work outside your ability, (6) Questionable integrity with people like you, (7) Actual or probable legal problems, (8) FTC consent decrees, (9) Emergency 911 calls."
    source: "business-of-copywriting"
    tags: [client-management, screening, problem-clients, risk]
  - id: "FW-DK-751"
    title: "Client Handling Funnel - single standardized process for all lead sources"
    content: "All leads feed same process: (1) Inquiry mechanism - they must contact you, (2) Positioning - handling creates proper perception, (3) Phone appointment or initial meeting, (4) Diagnostic conversation, (5) Prescription, (6) Agreement on project, (7) If yes: contract, (8) If no: follow-up sequence."
    source: "business-of-copywriting"
    tags: [client-attraction, process, lead-management, positioning]
  - id: "FW-DK-752"
    title: "Contract Architecture - six non-negotiable elements for consulting agreements"
    content: "Six contract elements: (1) No warranty of non-disclosure or confidentiality - NDAs are invitation to litigation, (2) Indemnity - whatever they do with your work is on them, (3) Access/Limitation - rules of the road for communication, (4) Conflicts of interest disclosure, (5) Ownership of work - they own it but you can use it, (6) Timetable of deliverables."
    source: "business-of-copywriting"
    tags: [contracts, consulting, legal, fee-presentation]
  - id: "FW-DK-753"
    title: "Strategic Visibility Three Principles - right audience right fame level"
    content: "Three principles: (1) No point being visible to wrong audience - I won't do morning drive time with Chip and Dale in Bozeman Montana, (2) OK to be famous only to chosen group - Oprah fame isn't necessarily what it's cracked up to be, (3) Self-aggrandizement IS the business per Halbert."
    source: "business-of-copywriting"
    tags: [positioning, visibility, marketing, client-attraction]
  - id: "FW-DK-754"
    title: "Agreements Process Framework - paper trail everything based on EST model"
    content: "The agreements process with the client needs to be paper-trailed, not just said. Correspondence and contracts. When they start to deviate, you get to play fair: 'wait a minute, here's what we agreed to.' Can't fix bad behavior that wasn't discussed to begin with. It's not even fair to try."
    source: "business-of-copywriting"
    tags: [client-management, contracts, agreements, expectations]
  - id: "FW-DK-755"
    title: "Copywriter Strategic Focus - message media market strategy as four-pillar approach"
    content: "You are always best served by bringing to the table a new context, a new strategic context in which you deliver copy. If all you focus on is the copy against a good control, the odds are you lose. I never beat a Halbert control trying to beat copy. But I can beat any control by changing strategy."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, consulting, strategy-vs-copy, beat-the-control]
  - id: "FW-DK-756"
    title: "Ghost Writing Business Model - book as disguised sales letter with ego attachment"
    content: "What we bring to ghost writing that normal writers don't: the book should be a disguised sales letter, not just a book. There's ego and pleasure reasons to buy, not just business. Co-authored anthology books are the stepping stone. Most clients who hire you already bought one of those first."
    source: "business-of-copywriting"
    tags: [ghostwriting, special-opportunities, books, client-attraction]
  - id: "FW-DK-757"
    title: "Takeaway Selling in Proposals - tell them no then let them convince you"
    content: "Tell them there's no way to have a short notice day. Take it away further with a potential conflict of interest. Lay down the fee plus extras. Tell them you won't have time for copywriting assignments. Offer to refer elsewhere. What happens: they try to kill you to get the assignment. Fee resistance is non-existent."
    source: "business-of-copywriting"
    tags: [pricing, takeaway-selling, posture, fee-resistance]
  - id: "FW-DK-758"
    title: "Open Webinar Structure - 12-step sales presentation for online events"
    content: "Structure: (1) Personal endorsement of host, (2) Tease reasons to stay, (3) Establish authority, (4) Specific relevance to audience, (5) Over-arching promise, (6) Begin explanation, (7) Reveal contrarian fact, (8) Gain agreement to premise, (9) Separate winners and losers, (10) Present offer and price, (11) Add bonuses, (12) Three calls to action with social proof between each."
    source: "business-of-copywriting"
    tags: [webinars, sales-presentations, online-marketing, special-opportunities]

# --- L5_METHODOLOGIES (BOC) ---
  - id: "MET-DK-629"
    title: "Diagnostic Day Methodology - pre-day setup live hunting and post-day obligation"
    content: "Pre-day: tell them to record, spell out logistics, send questionnaire. During: don't pre-organize materials - go to storeroom and root around live (hunting, killing, dragging back). Post-day: delay some deliverables, come back with hunted information in follow-up letter, build obligation through multiple touchpoints."
    source: "business-of-copywriting"
    tags: [consulting, diagnostic-day, methodology, obligation-building]
  - id: "MET-DK-630"
    title: "Client Onboarding Seven-Step Sequence - voicemail to contract"
    content: "Step 1: They call, get voicemail. Step 2: Assistant calls back with process. Step 3: They send 1-2 page fax. Step 4: Review and decision in about a week. Step 5: Phone appointment (clumped into 1-2 days per month). Step 6: Paid consulting day if warranted. Step 7: Contract."
    source: "business-of-copywriting"
    tags: [client-attraction, onboarding, process, positioning]
  - id: "MET-DK-631"
    title: "Referral Handling Five-Step - never pursue always control the narrative"
    content: "Step 1: Never take the prospect's contact from referrer. Step 2: Tell referrer to have prospect contact you. Step 3: Optionally give referrer a book to send. Step 4: Always report back to referrer regardless of outcome. Step 5: Use report as excuse for additional business with referrer."
    source: "business-of-copywriting"
    tags: [referrals, client-attraction, positioning, relationship-building]
  - id: "MET-DK-632"
    title: "Fee Resistance Prevention Seven-Step - desensitize then make non-negotiable"
    content: "Step 1: Desensitize early with fee range mentions. Step 2: Use takeaway (I rarely take new clients). Step 3: Standard contract with block typeface for non-negotiable terms. Step 4: Never use word negotiate. Step 5: If they object, present as standard everyone agrees to. Step 6: Frame objections as questioning your integrity/value. Step 7: Set deadline - sign or don't."
    source: "business-of-copywriting"
    tags: [pricing, fee-resistance, contracts, methodology]
  - id: "MET-DK-633"
    title: "Critique-to-Client Pipeline - free coupon to six-figure project"
    content: "Step 1: Offer critique coupon in books/products. Step 2: Most get standard critique form. Step 3: Spot good prospects among critiques. Step 4: Send personalized letter with diagnosis (not prescription). Step 5: Mention fee range ($50K-$100K+). Step 6: Offer to refer if they don't want you. Step 7: Follow up with hunted information."
    source: "business-of-copywriting"
    tags: [client-attraction, critique, pipeline, consulting]
  - id: "MET-DK-634"
    title: "Patient Farming a Niche Market - newsletter to book to omnipresence"
    content: "Step 1: Choose niche (e.g. toy companies). Step 2: Create newsletter for that niche. Step 3: Send monthly as if they subscribed. Step 4: Diagnose industry problems in newsletter. Step 5: Publish niche book (even 80 copies). Step 6: After six months groundwork, overt marketing if needed (probably won't be). Step 7: Become omnipresent to the point of nauseating in that niche."
    source: "business-of-copywriting"
    tags: [client-attraction, niche-marketing, content-marketing, long-game]
  - id: "MET-DK-635"
    title: "Cold Inquiry to $200K Project - champion upstream from book to contract"
    content: "Step 1: Person of influence finds you via book/newsletter. Step 2: They champion up the corporate chain. Step 3: CEO inquiry handled through standard process. Step 4: Pre-speech research and staff interviews to identify real opportunities. Step 5: Post-speech diagnostic debrief with CEO. Step 6: Consulting work flows from diagnosis."
    source: "business-of-copywriting"
    tags: [client-attraction, corporate-clients, methodology, consulting]
  - id: "MET-DK-636"
    title: "Post-Contract Obligation Building - find resources delay information create touchpoints"
    content: "Step 1: Immediately find relevant research for client and send unsolicited. Step 2: Connect them with useful people. Step 3: Delay some deliverables to follow-up letter ('random thoughts I didn't get to'). Step 4: Create multiple touchpoints. Step 5: Display visible effort in hunting for them. Step 6: Each touch increases obligation and reduces fee resistance for next project."
    source: "business-of-copywriting"
    tags: [client-management, obligation-building, retention, consulting]
  - id: "MET-DK-637"
    title: "Contract Negotiation Pushback - refuse downgrade reframe and set deadline"
    content: "Step 1: Refuse to deal with junior negotiator - go back to decision maker. Step 2: Address objections point by point in letter. Step 3: Reframe as questioning integrity/value. Step 4: Set deadline - sign or don't but we're moving on. Step 5: After contract signed, make nice with junior to prevent sabotage. Step 6: Know the potential saboteur exists and plan for Phase 2."
    source: "business-of-copywriting"
    tags: [contracts, negotiation, pushback, client-management]

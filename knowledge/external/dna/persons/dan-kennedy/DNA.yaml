  - id: "FIL-DK-029"
    title: "Você Não Precisa de Permissão para Construir Autoridade"
    content: >
      Certificações, associações e títulos de autoridade são essencialmente inventados. Qualquer pessoa
      pode criar sua própria certificação, associação ou credencial. A única autoridade que importa é a
      percebida pelo mercado, não a concedida por terceiros.
    source: "7FA-CD12-T11"
    context: "Unless you're doing brain surgery or heart surgery, you don't need permission from anybody. It's all made up. All of it."

  - id: "FIL-DK-030"
    title: "Superioridade Filosófica como Fundação do Alto Rendimento"
    content: >
      Pessoas de renda muito alta — como Carnegie — operam com uma crença profunda em sua superioridade
      sobre a maioria das pessoas. Essa superioridade não é arrogância vazia: é fundamentada em
      disciplina, estudo e ação superiores. Quem tem baixa renda nos EUA tem isso fundamentalmente por
      escolha, não por falta de capacidade.
    source: "7FA-CD12-T03"
    context: "Andrew Carnegie talked about believing himself superior to most men and thus deserving of all that came his way."

  - id: "FIL-DK-031"
    title: "Filosofia Pessoal Clara como Navegação do Negócio"
    content: >
      Pessoas de alta renda têm uma filosofia pessoal bem definida e articulável — uma visão de mundo com
      cornerstones claros (10-12 partes). Essa filosofia é o framework dentro do qual se otimiza ou se
      restringe potencial e renda. Sem uma filosofia clara, decisões de negócio e dinheiro ficam
      inconsistentes.
    source: "7FA-CD12-T01"
    context: "I think it is very difficult to separate business money from a political philosophy — a complete view of how society ought to work."

  - id: "FIL-DK-032"
    title: "Alinhamento Filosófico como Critério de Seleção em Vendas Complexas"
    content: >
      Em vendas de alto valor ou alto comprometimento, os compradores estão avaliando não apenas
      competência, mas alinhamento filosófico. Abaixo de certo nível de ticket, isso não importa. Acima
      dele, é fator decisivo. Face-to-face é o único formato que permite essa avaliação completa.
    source: "7FA-CD12-T02"
    context: "What people are really trying to figure out in complex buying is: are we in sync? Do we have shared values, shared philosophy?"

  - id: "FIL-DK-033"
    title: "Desdém Compassivo pelos que Permanecem Estagnados"
    content: >
      Ter compaixão pelas pessoas não exclui ter desdém por suas escolhas de estagnação. Quem assiste sua
      vida desmoronar sem agir merece desdém, independente de compaixão. Respeito é ganho por mérito, não
      concedido por longevidade. A maioria das pessoas não mereceu respeito — merece cortesia.
    source: "7FA-CD12-T07"
    context: "Respect is earned, not granted by seniority. Courtesy is deserved purely by longevity, but that's it."

  - id: "FIL-DK-034"
    title: "Fracasso é Escolha, Não Circunstância"
    content: >
      Em mercados com abundância de oportunidade como os EUA, baixa renda é resultado de escolha —
      incluindo escolha de não aprender, não agir, não persistir. A mesma janela de tempo usada para nada
      poderia ser usada para se tornar superior. O principal diferenciador não é talento, é escolha.
    source: "7FA-CD12-T04"
    context: "Anybody who has a low income, at least in America, has it fundamentally by choice."

  - id: "FIL-DK-035"
    title: "Paralelismo como Filosofia de Execução"
    content: >
      Pessoas de alto rendimento não trabalham sequencialmente — trabalham em múltiplos projetos
      simultaneamente em estágios diferentes. Fazer uma coisa de cada vez é padrão de pessoa de 6 dígitos.
      Fazer várias coisas em paralelo (Patterson tem 6-7 livros, Oprah tem múltiplos lançamentos) é padrão
      de 7 dígitos.
    source: "7FA-CD12-T08"
    context: "Six-figure people do one thing, get it done, then go on to another. We don't. Working on six or seven books at the same time."

  - id: "FIL-DK-036"
    title: "Aquisição de Negócios como Crescimento com Caneta"
    content: >
      Adquirir negócios existentes é uma das formas mais eficientes de crescimento — uma assinatura compra
      receita imediata, clientela estabelecida e marca construída. A maioria dos empreendedores não usa
      aquisição suficientemente, preferindo crescimento orgânico mais lento e caro.
    source: "7FA-CD12-T12"
    context: "A stroke of a pen and buying a million-seven in revenue. I'm a big fan of acquisition and I don't think we do it enough."

  - id: "FIL-DK-037"
    title: "Otimização Antes de Inovação"
    content: >
      Antes de lançar algo novo, extrair o máximo do que já existe. A maioria dos negócios tem ouro não
      minerado em clientes perdidos, reativação, cross-selling, e melhoria de conversão. Jay Abraham:
      optimize first, then innovate.
    source: "7FA-CD8"
    context: "Most businesses haven't milked what they've got. You need to optimize before you innovate."

  - id: "FIL-DK-038"
    title: "Obrigação Moral de Não Deixar o Prospecto Não Comprar"
    content: >
      Se você genuinamente acredita que seu produto/serviço beneficia o cliente, você tem obrigação moral
      de vendê-lo com todo esforço. Não vender — ou vender meio-a-meio — é uma falha ética. A Estratégia
      de Preeminência (Jay Abraham) começa aqui.
    source: "7FA-CD8"
    context: "The Strategy of Preeminence: you have a moral obligation not to let the prospect not buy if what you have will benefit them."

  - id: "FIL-DK-039"
    title: "Mercado Saturado É Mito — 5% Compram Tudo"
    content: >
      Em qualquer nicho, apenas cerca de 5% dos participantes compram todos os produtos e programas
      disponíveis. Isso significa que entrar em um mercado "saturado" ainda deixa acesso a 95% que nunca
      compraram de você. Saturação é percepção, não realidade.
    source: "7FA-CD7"
    context: "In any niche, 5% of the people buy everything. The market is never truly saturated."

  - id: "MET-DK-039"
    title: "Metodologia de Lançamento de Associação Proprietária"
    content: >
      Como criar uma associação de indústria do zero para dominar um nicho: Passo 1: Nomear a associação
      com credibilidade (American / National / Institute / Council); Passo 2: Criar logo, site e materiais
      membros; Passo 3: Recrutar 10-20 founding members com credibilidade no nicho; Passo 4: Criar
      benefícios reais de membership (recursos, networking, credibilidade); Passo 5: Promover a associação
      como o padrão do setor; Passo 6: Monetizar via dues, eventos, endorsements, e leads para members.
    source: "7FA-CD7"
    passos:
      - "1. Nomear com credibilidade"
      - "2. Logo, site, materiais"
      - "3. 10-20 founding members"
      - "4. Benefícios reais"
      - "5. Promover como padrão do setor"
      - "6. Monetizar via múltiplos canais"

  - id: "FIL-DK-040"
    title: "Tempo é o Único Recurso Não Renovável"
    content: >
      Ao contrário de dinheiro, clientes ou parcerias, tempo perdido não pode ser recuperado. A má gestão
      de tempo é o principal assassino de produtividade em negócios de 7 dígitos. Não ter hora de término
      é tão prejudicial quanto não ter hora de início.
    source: "7FA-CD9"
    context: "Meetings must have end times, not just start times. Time pressure enables performance."

  - id: "FIL-DK-041"
    title: "Maestria Cria Atração, Não Convencimento"
    content: >
      Quem atinge maestria genuína numa área não precisa convencer ninguém — as melhores oportunidades e
      colaboradores vêm até eles. Maestria reconhecida (acknowledged mastery) é ativo que se auto-promove.
      Exemplo: Guthy-Ranker tem primeiro acesso a todos os deals porque demonstraram maestria em
      infomerciais.
    source: "7FA-CD10"
    context: "Mastery creates a situation where you don't have to do any convincing. Best opportunities come to you."

  - id: "FIL-DK-042"
    title: "A Ferramenta Não é o Problema — A Cabeça é"
    content: >
      Quando clientes fracassam com ferramentas, sistemas ou treinamentos, raramente é o conteúdo que
      falhou. É a psicologia — falta de coragem, autoestima, crença. Você não pode vender isso
      diretamente, mas deve entregar. Sem ignição, nenhuma ferramenta funciona.
    source: "7FA-CD12-T12"
    context: "There ain't no ignition switch. There's a car, but there ain't no ignition switch — that's what they're missing."

  - id: "FIL-DK-043"
    title: "Visibilidade Gera Crítica — Crítica Indica Impacto"
    content: >
      Pessoas que jamais recebem críticas provavelmente não estão fazendo nada significativo. Crítica é
      sinal de impacto. O volume de crítica é proporcional ao volume de influência. Imunidade à crítica
      não significa ausência dela — significa não ser governado por ela.
    source: "7FA-CD11"
    context: "If you don't get mail like this sometimes, you ain't doing much."


      People's dissatisfactions are their hobbies. The most likely to buy prospect has a dysfunction as a
      hobby that he continues to buy stuff for. The poor stay poor — it don't matter how many
      opportunities they buy, the vast majority of them stay in the same place in the pyramid.
    source: "CD/12 track 6 — DK on the nature of repeat buyers"

  - id: "FIL-DK-364"
    title: "We are not ever going to impact the pyramid numbers. We'll impact individuals, b"
    content: >
      We are not ever going to impact the pyramid numbers. We'll impact individuals, because obviously
      most of us started in one place and now we're in a different place. But the numbers never change.
      Never. And so business structure, profitability, process, message — it all has to reflect the
      reality of this pyramid.
    source: "CD/12 track 4 — DK on the immutable social pyramid"

  - id: "FIL-DK-365"
    title: "The influences are really interchangeable. It's about the person being influence"
    content: >
      The influences are really interchangeable. It's about the person being influenced, not really the
      influencer. If I had enough money to become a veterinarian instead of doing this, the impact on any
      of you or the world would be non-existent. Somebody else would have influenced you.
    source: "CD/12 track 4 — DK on the interchangeability of mentors"

  - id: "FIL-DK-366"
    title: "You win in the primaries with the narrow, focused extremist message to the core"

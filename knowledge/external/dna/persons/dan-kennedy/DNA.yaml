      pipeline. Even when busy servicing current clients. Confucius: dig the well before you thirst.
    source: "MM-02-cd6"

  - id: "HEUR-DK-288"
    title: "Red Rubber Stamp Test: Workers' compensation rubber stamp on plain envelope = 33"
    content: >
      Red Rubber Stamp Test: Workers' compensation rubber stamp on plain envelope = 33% response increase.
      Only change. Dinky little things can make massive difference. Never know if you don't test.
    source: "MM-02-cd6"

  - id: "HEUR-DK-289"
    title: "80/20 Time Rule + 95/5 Corollary: 80% of profits from 20% of clients and time. 9"
    content: >
      80/20 Time Rule + 95/5 Corollary: 80% of profits from 20% of clients and time. 95/5 = 5% of clients
      and 5% of time infinitely more valuable than other 95%. Slight re-adjustment in time investment can
      multiply income.
    source: "MM-03-pdf"

  - id: "HEUR-DK-290"
    title: "Direct Line Limit: only ~10 people in business life have your direct personal li"
    content: >

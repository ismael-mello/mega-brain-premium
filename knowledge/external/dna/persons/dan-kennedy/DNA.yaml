    source: "DVD08-JeffWalker"

  - id: "FIL-DK-403"
    title: "The further we are over into selling opportunity, the more we liberate ourselves"
    content: >
      The further we are over into selling opportunity, the more we liberate ourselves from the formulaic
      relationships between their transaction size, profit margin, income, and the price we charge.
    source: "DVD10"

  - id: "FIL-DK-404"
    title: "The infinitely better business is a business where everybody's already got a veh"

    source: "OMC CD/20 track 7 — Dan Kennedy (Don Dwyer SMI to Rainbow example)"

  - id: "FIL-DK-391"
    title: "A delayed sale can be a better sale. The prospect is better prepared, has less r"
    content: >
      A delayed sale can be a better sale. The prospect is better prepared, has less remorse, and the

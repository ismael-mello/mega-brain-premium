  - id: "MET-DK-224"
    title: "14-System Sales Letter Construction Methodology"
    content: >
      Build a sales letter using the 14-system approach: PHASE 1 — FOUNDATION (before writing): - System
      14 Checklist: Review all requirements - Research: Product, market, competition, proof points PHASE 2
      — CORE ELEMENTS (write in this order): - System 1: Write 25+ headline candidates - System 3: Write
      3+ opening variations - System 4: List all bullets/fascinations - System 5: Craft the offer stack
      PHASE 3 — PERSUASION ELEMENTS: - System 6: Pre-empt top 5 objections - System 7: Design guarantee(s)
      - System 10: Collect/write testimonials PHASE 4 — STRUCTURE: - System 2: Write subheads (must tell
      story independently) - System 8: Add segues between sections - System 9: Write P.S. (restate offer +
      urgency) - System 11: Write clear CTA PHASE 5 — PRODUCTION: - System 12: Select template/layout -
      System 13: Design order form - System 14: Final checklist review
    source: "System1-14 PDFs (methodology derived from system sequence)"
    domain: "copywriting"


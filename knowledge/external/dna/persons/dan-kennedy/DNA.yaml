      (Ringer).
    source: "MM-02-cd2"

  - id: "FIL-DK-204"
    title: "Immunity To Criticism: highly successful people become immune to criticism. Most"
    content: >
      Immunity To Criticism: highly successful people become immune to criticism. Most important personal

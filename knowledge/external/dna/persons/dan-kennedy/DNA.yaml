  - id: "MET-DK-223"
    title: "Swipe File Study Methodology"
    content: >
      DK's implicit methodology for using swipe files (derived from how the System PDFs are organized):
      STEP 1: COLLECT — Gather winning examples by category (headline, subhead, opening, etc.) STEP 2:
      CATEGORIZE — Sort by type (question, command, story, etc.) STEP 3: ANALYZE — For each example,
      identify WHY it works (what psychological trigger) STEP 4: ADAPT — Take the structure/pattern,
      replace with your product/market specifics STEP 5: TEST — Run adapted version against control, keep
      winner STEP 6: ADD TO SWIPE FILE — Winners become new swipe file entries This is NOT "copy and
      paste" — it's structural analysis and adaptation. The methodology creates a self-reinforcing library
      that improves over time.
    source: "System1-14 PDFs (methodology implicit in organization)"
    domain: "copywriting"

  - id: "HEUR-DK-224"
    title: "Minimum bid language: 'the stated fee is the minimum bid. You can bid above the"

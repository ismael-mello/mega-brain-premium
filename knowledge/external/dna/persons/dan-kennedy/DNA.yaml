      min, ~3 days/week. Can go days without communicating with office. Everything waits and everything's
      okay.
    source: "MM-03-cd2"

  - id: "HEUR-DK-296"
    title: "Build Up To Change Gradually: 5 min/day first 2 weeks → 10 min next 15 days → 15"
    content: >

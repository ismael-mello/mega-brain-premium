    title: "The Prospect Starting Position Framework — 8 obstacles to selling improvement: 1"
    content: >
      The Prospect Starting Position Framework — 8 obstacles to selling improvement: 1) Resentment ('I
      shouldn't have to do all that') 2) Ego ('Who are you to tell me?') 3) Worker head mentality (tenure
      = entitlement) 4) Absence of real ambition 5) 'Won't work for me' 6) Zombie resignation 7) Negative
      influences of others 8) Brain dead dumb (too new or too stupid).
    source: "CD1-track5, CD2-track1-2"

  - id: "FW-DK-232"

    content: >
      Ben Suarez's 21 Myths Framework: Before teaching how to get rich, address the myths keeping people
      broke first: 'You can't start a business anymore,' 'Market is saturated,' 'I don't have experience,'
      'It's genetics,' 'I need credentials/permission.' The starting point is not ready to be told how to
      get rich — this stuff is in the way.
    source: "CD3-track4-5"

  - id: "FW-DK-236"
    title: "The Gullibility Achievement Framework: To achieve gullibility (prospect state of"
    content: >
      The Gullibility Achievement Framework: To achieve gullibility (prospect state of being easily
      persuaded/overtrusting), you need: 1) Place faith outside self (in someone/something) 2) Present as
      NEW or HIDDEN opportunity 3) Create controlled environment or deliver enough content for
      self-induced state 4) Match their desire (everyone wants to be rich) 5) Use luck/preordination as
      ally, not enemy ('you are receiving this because it was meant to be').
    source: "CD4-track3-6, CD5-track1"


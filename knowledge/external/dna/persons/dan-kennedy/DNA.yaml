    source: "OMC CD/20 track 6 — Dan Kennedy"

  - id: "FIL-DK-387"
    title: "I didn't get eight and a half years by changing the creative. I didn't get it by"
    content: >
      I didn't get eight and a half years by changing the creative. I didn't get it by changing the show.

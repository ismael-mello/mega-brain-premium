  - id: "MET-DK-221"
    title: "Vindication Story Architecture"
    content: >
      Step-by-step revenge/vindication story for copy: 1) Establish the DOUBT — others skeptical, critics,
      family disapproval. 2) Show the STRUGGLE — humiliation, embarrassment, near-failure. 3) The TURNING
      POINT — discovery of method/product. 4) The TRIUMPH — 'They Laughed When I Sat Down At The Piano But
      When I Started To Play!' 5) The VINDICATION — doubters silenced, respect earned. Key: everyone wants
      to stick it up the butts of some friends over their skepticism.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"


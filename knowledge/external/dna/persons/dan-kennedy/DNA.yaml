      Invest in excellence as competitive moat.
    source: "MM-04-cd2-3"

  - id: "FW-DK-184"
    title: "Prepay Agreement Model: restaurant sells 25-dinner membership card for $249 (vs"
    content: >
      Prepay Agreement Model: restaurant sells 25-dinner membership card for $249 (vs ~$300 individual).

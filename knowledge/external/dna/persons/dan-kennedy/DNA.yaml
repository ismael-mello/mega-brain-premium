layers:
    - id: "MET-DK-223"
      title: "Swipe File Study Methodology"
      content: >
        DK's implicit methodology for using swipe files (derived from how the System PDFs
        are organized):
        STEP 1: COLLECT — Gather winning examples by category (headline, subhead, opening, etc.)
        STEP 2: CATEGORIZE — Sort by type (question, command, story, etc.)
        STEP 3: ANALYZE — For each example, identify WHY it works (what psychological trigger)
        STEP 4: ADAPT — Take the structure/pattern, replace with your product/market specifics
        STEP 5: TEST — Run adapted version against control, keep winner
        STEP 6: ADD TO SWIPE FILE — Winners become new swipe file entries
        This is NOT "copy and paste" — it's structural analysis and adaptation.
        The methodology creates a self-reinforcing library that improves over time.
      domain: copywriting
      source_file: "System1-14 PDFs (methodology implicit in organization)"
    - id: "MET-DK-224"
      title: "14-System Sales Letter Construction Methodology"
      content: >
        Build a sales letter using the 14-system approach:
        PHASE 1 — FOUNDATION (before writing):
        - System 14 Checklist: Review all requirements
        - Research: Product, market, competition, proof points
        PHASE 2 — CORE ELEMENTS (write in this order):
        - System 1: Write 25+ headline candidates
        - System 3: Write 3+ opening variations
        - System 4: List all bullets/fascinations
        - System 5: Craft the offer stack
        PHASE 3 — PERSUASION ELEMENTS:
        - System 6: Pre-empt top 5 objections
        - System 7: Design guarantee(s)
        - System 10: Collect/write testimonials
        PHASE 4 — STRUCTURE:
        - System 2: Write subheads (must tell story independently)
        - System 8: Add segues between sections
        - System 9: Write P.S. (restate offer + urgency)
        - System 11: Write clear CTA
        PHASE 5 — PRODUCTION:
        - System 12: Select template/layout
        - System 13: Design order form
        - System 14: Final checklist review
      domain: copywriting
      source_file: "System1-14 PDFs (methodology derived from system sequence)"

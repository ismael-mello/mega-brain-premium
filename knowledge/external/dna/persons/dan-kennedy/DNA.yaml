    source: "ACC-video-DK_11"

  - id: "MET-DK-165"
    title: "The Luck/Preordination Ally Technique: Step 1) Identify prospect beliefs about l"
    content: >
      The Luck/Preordination Ally Technique: Step 1) Identify prospect beliefs about luck and
      preordination. Step 2) Instead of fighting these beliefs, USE them as allies. Step 3) Integrate
      'your lucky day' story into your opportunity presentation. Step 4) Include version of 'you are
      receiving this out of millions who could have received it because it was meant to be.' Step 5) Turn
      the enemy belief into a sales tool.
    source: "CD4-track5"


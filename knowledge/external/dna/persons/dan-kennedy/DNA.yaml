L2_MODELOS_MENTAIS:
  - id: MM-DK-001
    text: "Headline as Gatekeeper — sole purpose is to get them to read the first sentence"
    source: "01B"
  - id: MM-DK-002
    text: "Classified Ad Test — pull headline out, run it as classified + 'write for info'. Would anyone respond?"
    source: "01B"
  - id: MM-DK-003
    text: "Pain → Pleasure Sequence — always start in pain category before moving to pleasure"
    source: "03A"
  - id: MM-DK-004
    text: "Rapport Before Pitch — like personal selling, warm up before going into the sale"
    source: "01B"
  - id: MM-DK-005
    text: "Message to Market Match — the closer you match their world, the better your response"
    source: "01B, 02A"
  - id: MM-DK-006
    text: "Become The Customer — don't write as you, write as THEM writing to them"
    source: "02A"
  - id: MM-DK-007
    text: "Opportunity Gap Analysis — find what all competitors do badly, make that your USP"
    source: "01B"
  - id: MM-DK-008
    text: "Three Sales In One — typical sales presentation repeats pitch 3 times through objection cycles"
    source: "04A"
  - id: MM-DK-009
    text: "Photo Caption = Mini Headline — never waste caption on mere description"
    source: "01B"
  - id: MM-DK-010
    text: "Subhead = Independent Headline — each must stand alone and pull reader in"
    source: "01B"
  - id: MM-DK-011
    text: "Fear of Loss > Promise of Gain — invalidate what they have before selling the alternative"
    source: "03A, 03B"
  - id: MM-DK-012
    text: "Big Claim Mental Discount — prospects mentally reduce claims but still buy"
    source: "03B"
  - id: MM-DK-013
    text: "Insider/Outsider Dynamic — create language and community that people want to join"
    source: "04B"
  - id: MM-DK-014
    text: "Snowstorm Test — what would you say to get someone to drive through a blizzard to the post office?"
    source: "05B"
  - id: MM-DK-015
    text: "Couch Sloth Visualization — picture prospect as giant lazy sloth that almost nothing will move"
    source: "05B"
  - id: MM-DK-016
    text: "Niche Expertise Advantage — writing to a market you know is 10x easier than writing to strangers"
    source: "02A"
  - id: MM-DK-017
    text: "Testimonial Immersion — spend days collecting testimonials to absorb the customer's world"
    source: "02A"
  - id: MM-DK-018
    text: "The Bob Stupak Model — word pictures that put the reader INTO the experience using the product"
    source: "04A"
  - id: MM-DK-019
    text: "Formula Banking — build a library of fill-in-the-blank headline formulas for instant use"
    source: "01B"
  - id: MM-DK-020
    text: "Control Surfing — study magazines like Money Making Opportunities for proven headline formulas"
    source: "01A"
  - id: MM-DK-021
    text: "Media-Product Fit — not all media works for all products, find what fits"
    source: "02B"
  - id: MM-DK-022
    text: "Yes Momentum in Print — ask questions throughout copy designed to get mental yes answers"
    source: "04A"
  - id: MM-DK-023
    text: "Emotional Logic — decision is emotional, but must provide logical justification"
    source: "03A"
  - id: MM-DK-024
    text: "Current Events Hook — link to what's already on their minds for instant relevance"
    source: "02B"
  - id: MM-DK-025
    text: "Quiet Endorsement — riding credibility of the medium (AmEx statement = implicit trust)"
    source: "02B"
  - id: MM-DK-026
    text: "The Vacuum Cleaner Test — real selling experience beats formal training"
    source: "01A"
  - id: MM-DK-027
    text: "Damaging Admission Credibility — admitting one weakness makes all other claims more believable"
    source: "05A"

- id: MM-DK-028
    titulo: "Termostato de Renda — Auto-Sabotagem Calibrada"
    descricao: >
      Cada pessoa tem um termostato interno de renda. Quando a renda começa a subir muito
      acima do set point, comportamentos de sabotagem inconsciente emergem para trazer de
      volta ao nível habitual. O termostato deve ser reprogramado explicitamente — não é
      automático. Exemplos: gastando excesso, sabotando negócios, recusando oportunidades.
    citacao: "People calibrate their behavior to stay near their set point. The thermostat concept applies to income."
    fonte: "7FA-CD11"
    camada: L2

  - id: MM-DK-029
    titulo: "Modelo das 3 Conversas em Vendas Face-a-Face"
    descricao: >
      Em qualquer reunião de vendas de alto valor, 3 conversas ocorrem simultaneamente:
      (1) Conversa sobre o deal — lógica e benefícios; (2) Conversa sobre confiança — "vai
      cumprir o que diz?"; (3) Conversa tácita — "quem é essa pessoa? Compartilhamos valores?"
      A terceira é a mais determinante mas a menos verbalizada.
    citacao: "There's one conversation about the deal, another about trust, and another not going on but really is: what is this person really about?"
    fonte: "7FA-CD12-T02"
    camada: L2

  - id: MM-DK-030
    titulo: "Curva Sino Ruinada pelos 80% que Não Agem"
    descricao: >
      Qualquer produto ou programa tem sua curva de resultados destruída pelos 80-90% de
      compradores que não implementam. A média de resultados se torna quase zero não porque
      o produto falha, mas porque a maioria não usa. Isso tem implicação legal (FTC), de
      marketing (depoimentos) e de negócio (suporte/coaching).
    citacao: "The problem is the 80-90% who don't do anything with what they bought. There couldn't possibly be any results."
    fonte: "7FA-CD12-T05"
    camada: L2

  - id: MM-DK-031
    titulo: "Modelo de Aquisição em 3 Formas (Jay Abraham)"
    descricao: >
      Todo negócio tem apenas 3 formas de crescer: (1) mais clientes; (2) ticket médio maior;
      (3) frequência de compra maior. Toda estratégia de crescimento se encaixa em uma dessas
      três. O que mais impacta o LTV é geralmente frequência, não aquisição.
    citacao: "There are only three ways to grow any business: more customers, higher average sale, buy more often."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-032
    titulo: "Modelo Host-Beneficiário — Encurtando pelo Relacionamento Alheio"
    descricao: >
      Em vez de construir audiência do zero, use o relacionamento já estabelecido de outro
      negócio com sua audiência. O host acessa valor para seus clientes, o beneficiário acessa
      clientes já aquecidos. Isso encurta o ciclo de vendas porque confiança já foi estabelecida.
    citacao: "JV/host-beneficiary: shortcut by using others' existing customer relationships. Trust has already been established."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-033
    titulo: "Modelo dos 9 Pontos de Alavancagem"
    descricao: >
      Jay Abraham identifica 9 pontos de alavancagem em qualquer negócio: clientes perdidos,
      leads não convertidos, upsell/cross-sell, joint ventures, mídia de inserção, newsletter,
      reativação, referências, e back-end. A maioria dos negócios explora apenas 1-2 desses pontos.
    citacao: "Nine leverage points in any business. Most exploit only one or two."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-034
    titulo: "Lente da Preeminência — Advisor vs Vendor"
    descricao: >
      A diferença entre vendedor e advisor de preeminência é a postura: o advisor age no melhor
      interesse do cliente mesmo quando isso significa não vender. Isso cria tal nível de confiança
      que o cliente para de comparar preços e para de precisar ser convencido.
    citacao: "The Strategy of Preeminence positions you as the most trusted advisor — acting in their best interest above all."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-035
    titulo: "Modelo do Concorrente de Segunda Geração"
    descricao: >
      O verdadeiro concorrente não é quem você pode ver — é o próximo entrante que virá após
      você. O segundo player num mercado novo geralmente supera o primeiro porque aprende com
      seus erros e desvios sem pagar o custo do pioneirismo. Estratégia: criar barreiras antes
      que o segundo geração apareça.
    citacao: "The second-generation competitor phenomenon — they learn from your mistakes without paying for the pioneering."
    fonte: "7FA-CD7"
    camada: L2

  - id: MM-DK-036
    titulo: "Lente do Maior Problema Irritante (MPI)"
    descricao: >
      O posicionamento mais poderoso num mercado é identificar e resolver o maior problema
      que as pessoas mais odeiam e que ninguém ainda resolveu de forma satisfatória. Exemplo:
      Domino's não vendeu pizza — vendeu certeza de entrega. Funeral pre-need não vendeu serviço
      — vendeu eliminação do maior peso emocional.
    citacao: "Solving the 'biggest nagging problem' — Domino's: people just wanted to know when it was coming and if it'd be hot."
    fonte: "7FA-CD7"
    camada: L2

  - id: MM-DK-037
    titulo: "Modelo da Imersão no Mercado para Encontrar o Hook"
    descricao: >
      Os melhores hooks de marketing não vêm de copywriters em isolamento — vêm de imersão
      profunda no produto/mercado. Ogilvy passou 3 semanas com engenheiros da Rolls Royce
      antes de escrever uma linha. Walton visitava lojas da concorrência. A observação direta
      revela o que pesquisa não captura.
    citacao: "Ogilvy spent 3 weeks with Rolls Royce engineers to find the hook — 'the loudest noise in the new Rolls is the clock.'"
    fonte: "7FA-CD10"
    camada: L2

  - id: MM-DK-038
    titulo: "Lente da Transformação de Mão-de-Obra em Mídia"
    descricao: >
      Em períodos de crescimento, a mídia pode substituir a força de vendas humana (escala
      por mídia). Em recessão, o inverso ocorre — mão-de-obra volta a ser mais eficiente.
      Negócios que entendem quando alternar entre as duas estratégias sobrevivem a ciclos
      econômicos melhor do que os que ficam presos em uma delas.
    citacao: "Media replacing manual labor — and the reverse in recessions. Knowing when to switch is the strategic insight."
    fonte: "7FA-CD7"
    camada: L2

  - id: MM-DK-039
    titulo: "Modelo de Compartimentalização Cognitiva"
    descricao: >
      Alta produtividade requer a habilidade de "empacotar" mentalmente problemas não resolvidos
      e colocá-los em segundo plano enquanto se foca no que importa agora. Não é ignorar — é
      agendar. Treinamento dessa habilidade é separar o que pode ser resolvido agora do que não pode.
    citacao: "Compartmentalization — train yourself to box distractions. Not ignoring, but scheduling."
    fonte: "7FA-CD9"
    camada: L2

  - id: MM-DK-040
    titulo: "Modelo da Origem do Sucesso por Chance + Profundidade"
    descricao: >
      A maioria das influências transformadoras na vida de qualquer pessoa começou por acaso
      (encontrar o livro certo, o mentor certo). O diferenciador entre pessoas comuns e sérias
      é o que fazem depois: a pessoa séria mergulha mais fundo — busca a origem, os predecessores,
      vai upstream. A maioria para no primeiro nível.
    citacao: "Random chance opens the door for most people. The serious student then moves upstream — where did this come from? What preceded it?"
    fonte: "7FA-CD12-T09"
    camada: L2

  - id: MM-DK-041
    titulo: "Modelo de Venda Fria-para-Preparada com Delay Deliberado"
    descricao: >
      Em vendas de alto ticket para prospectos frios, inserir um delay deliberado antes do
      pitch aumenta significativamente conversão. O delay é usado para enviar um pacote de
      informações que pré-aquece, educa e cria expectativa. A conversão de "cold-to-prepared"
      pode dobrar em relação a "cold-to-pitch".
    citacao: "Cold-to-prepared sale strategy — deliberate delay plus info package doubles conversions vs. cold-to-pitch."
    fonte: "7FA-CD6"
    camada: L2

  - id: MM-DK-042
    titulo: "Lente da Gestão de Sala como Gestão de Performance"
    descricao: >
      Em apresentações de palco ou platform selling, a maioria dos vendedores falha porque
      perde o controle do tempo. O maior sabotador é falar demais sobre conteúdo e chegar
      ao pitch sem tempo suficiente. A gestão do tempo em sala é gestão de conversão.
    citacao: "Most people doing platform selling sabotage themselves by running out of time. Time management in the room is conversion management."
    fonte: "7FA-CD6"
    camada: L2

  - id: MM-DK-043
    titulo: "Modelo de Preço como Seleção de Cliente"
    descricao: >
      O preço que você cobra seleciona ativamente quem são seus clientes. Preço alto seleciona
      clientes com mais recursos, mais comprometidos e que dão menos trabalho. Preço baixo
      atrai volume mas também atrai o tipo de cliente que drena energia e que tem menor taxa
      de sucesso com seu produto.
    citacao: "Price selects your customers. High price selects committed, resourceful clients who are easier to work with."
    fonte: "7FA-CD1"
    camada: L2
  # --- DK-MM-02: Brass Balls (02-brass-balls) ---
  - id: MM-DK-220
    text: "Guided Missile Model (Maltz) - success is constant course-correction, not straight-line perfection; the missile is off course most of the time but keeps correcting"
    source: "MM-BB-CD3"
  - id: MM-DK-221
    text: "Testing Frame - every marketing action is a test, not success/failure; determine what does not work as quick and cheap as possible"
    source: "MM-BB-CD3"
  - id: MM-DK-222
    text: "Compartmentalization Model - close one mental file, open another; reset between tasks like a football coach resets between plays"
    source: "MM-BB-CD4"
  - id: MM-DK-223
    text: "5%/5%/90% Theft Model - 5% will never steal, 5% always steal, 90% steal if: (1) believe undetected, (2) perceived need, (3) can rationalize; only control #1"
    source: "MM-BB-CD5"
  - id: MM-DK-224
    text: "Core Competency Factor - people good in one area are NOT equally good in all areas; sort expert advice by their actual track record"
    source: "MM-BB-CD5"
  - id: MM-DK-225
    text: "Deal Flow = Independence - enough prospective customers flowing gives you power to be viciously independent about pricing, terms, customer selection"
    source: "MM-BB-CD5"
  - id: MM-DK-226
    text: "Big Picture Optimist / Detailed Pessimist - believe plane will arrive safely but assume they will lose your baggage and try to poison you with the food"
    source: "MM-BB-CD5"
  - id: MM-DK-227
    text: "Ringer Ladder Principle - climbing the ladder of success is a waste of time; just jump up there; self-appointment over waiting for permission"
    source: "MM-BB-CD2"
  - id: MM-DK-228
    text: "Cookie Counter Model - mama counts 24 cookies, tells Johnny she will count when she returns; only theft factor you can control is certainty of detection"
    source: "MM-BB-CD5"
  - id: MM-DK-229
    text: "Celebrity-in-Your-Niche Model - be so famous you cannot walk through your industry convention without being mobbed; create it deliberately"
    source: "MM-BB-CD6"
  - id: MM-DK-230
    text: "Credibility vs Believability - credibility (years, associations, degrees) is mandatory but not persuasive; believability (identification + specifics) is what sells"
    source: "MM-BB-CD6"
  - id: MM-DK-231
    text: "Feast or Famine Cycle - in service businesses you either have too much or too little; better too much; keep marketing running, get pickier"
    source: "MM-BB-CD5"


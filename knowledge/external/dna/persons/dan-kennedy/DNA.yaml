      credibility. Staff sitting there thinking 'bullshit.
    source: "MM-03-cd3"

  - id: "FIL-DK-220"
    title: "Recovery Time Is Essential: quiet time to think, regain perspective, recharge. C"
    content: >
      Recovery Time Is Essential: quiet time to think, regain perspective, recharge. Cell phones/email

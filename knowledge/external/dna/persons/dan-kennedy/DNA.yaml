      fire them. Less gross, more margin. Sales managers make same mistake with salespeople.
    source: "MM-02-cd2"

  - id: "HEUR-DK-268"
    title: "Sacrifice Principle for Employees: Fire the worst problem employee → all others"
    content: >
      Sacrifice Principle for Employees: Fire the worst problem employee → all others knew you should have
      done it sooner → they give you credit → productivity temporarily jumps → they realize you WILL fire
      someone.
    source: "MM-02-cd2"

  - id: "HEUR-DK-269"
    title: "Compliance Through Penalty: Show penalty for non-compliance publicly → everyone"
    content: >
      Compliance Through Penalty: Show penalty for non-compliance publicly → everyone else complies
      better. Newsletter publisher canceled jerk subscribers publicly in next issue → all remaining
      subscribers became better.
    source: "MM-02-cd2"

  - id: "HEUR-DK-270"
    title: "Urgency In Minutes Not Hours: Minutes matter. 'I left messages and they haven't"
    content: >
      Urgency In Minutes Not Hours: Minutes matter. 'I left messages and they haven't called back' = did
      NOTHING. Correct response = be at UPS terminal at 11pm looking for boxes. Trump: 10 minutes to fix
      bathroom or you're fired.
    source: "MM-02-cd4"

  - id: "HEUR-DK-271"
    title: "Fortune 500 CEO Productivity: Average CEO gets less than 30 productive minutes p"
    content: >
      Fortune 500 CEO Productivity: Average CEO gets less than 30 productive minutes per day. Calculate
      the dollar value of going from 30 to 33 minutes. Small shifts toward productivity give enormous
      payoffs.
    source: "MM-02-cd4"

  - id: "HEUR-DK-272"
    title: "Calculate Your Minute Worth: Do the math — what must your minutes be worth for d"
    content: >
      Calculate Your Minute Worth: Do the math — what must your minutes be worth for desired income? Once
      you know, you get angry when people waste them. Anger drives you to fix the problem.
    source: "MM-02-cd4"

  - id: "HEUR-DK-273"
    title: "5am Writing Regimen: Write 1-2 hours every morning before any interruption. Deci"
    content: >
      5am Writing Regimen: Write 1-2 hours every morning before any interruption. Decision of WHAT to
      write made night before. No pondering, no shuffling. Too many exceptions = no regimen anymore.
    source: "MM-02-cd4"

  - id: "HEUR-DK-274"
    title: "Only Talk To 8s 9s and 10s: Never be face-to-face or on phone with prospect belo"
    content: >
      Only Talk To 8s 9s and 10s: Never be face-to-face or on phone with prospect below 8 on
      readiness-to-buy scale. If spending time with 2s/3s/4s = you don't have time management problem, you
      have marketing problem.
    source: "MM-02-cd4"

  - id: "HEUR-DK-275"
    title: "Never Meet At Restaurant First: Make them come to your office, then go to restau"
    content: >
      Never Meet At Restaurant First: Make them come to your office, then go to restaurant together. When
      they're 30 min late, you're on phone making money, not reading magazine. Then let them wait in your
      lobby 10 min.
    source: "MM-02-cd4"

  - id: "HEUR-DK-276"
    title: "1-in-8 Winner Ratio: In infomercials, 1 winner per 8 shows = terrific industry r"
    content: >
      1-in-8 Winner Ratio: In infomercials, 1 winner per 8 shows = terrific industry record. If framed as
      success/failure, you'd quit after 7 flops. Frame as testing = just keep going.
    source: "MM-02-cd3"

  - id: "HEUR-DK-277"
    title: "72 Things For 1 Each: 'I don't know one thing to get 72 new patients/month. But"
    content: >
      72 Things For 1 Each: 'I don't know one thing to get 72 new patients/month. But I know 72 things to
      get 1 new patient each. And I do all 72.' Diversity of lead generation methods beats magic bullet.
    source: "MM-02-cd6"

  - id: "HEUR-DK-278"
    title: "Break-Even Acquisition = Dance In Streets: Any method acquiring customers at bre"
    content: >
      Break-Even Acquisition = Dance In Streets: Any method acquiring customers at break-even or better =
      keep doing it. Don't stop profitable method because another is MORE profitable. Do all 10 methods if
      all acceptable.
    source: "MM-02-cd6"

  - id: "HEUR-DK-279"
    title: "One Variable Testing Rule: Test one variable at a time against control. Change h"
    content: >
      One Variable Testing Rule: Test one variable at a time against control. Change headline + price +
      photo = accomplished nothing because you don't know what worked. Requires enormous patience but
      payoff justifies it.
    source: "MM-02-cd6"

  - id: "HEUR-DK-280"
    title: "Specialization Price Multiplier: Same product specialized = 3-5x higher price. T"
    content: >
      Specialization Price Multiplier: Same product specialized = 3-5x higher price. Time management
      generic $69-99. For dentists $300. For orthodontists with multiple offices $500-700. Tighter
      specialization = higher perceived value.
    source: "MM-02-cd6"

  - id: "HEUR-DK-281"
    title: "Raise Prices — Everyone Waits Too Long: James Cameron (Titanic): just double mov"
    content: >

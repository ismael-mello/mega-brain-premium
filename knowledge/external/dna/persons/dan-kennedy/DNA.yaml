      power comes from this liberation.
    source: "MM-02-cd2"

  - id: "FIL-DK-205"
    title: "Testing Not Failing: don't think success/failure, think testing. In DR, we fail"
    content: >
      Testing Not Failing: don't think success/failure, think testing. In DR, we fail more often than
      succeed. 1 in 8 infomercials win. Challenge = determine what won't work as quick and cheap as
      possible.
    source: "MM-02-cd3"

  - id: "MET-DK-205"
    title: "Professional Seminar Room Selling for High-Income Niches: 1) Use evenings (not f"
    content: >
      Professional Seminar Room Selling for High-Income Niches: 1) Use evenings (not full days) to reduce
      chair-side income loss, 2) If ego is a problem, provide anonymity/discretion, 3) Use disclosed
      discovery-day format if appropriate, 4) For drop-in days: set regular schedule (e.g. two Fridays a
      month), let prospects observe your operation, have lunch together, answer questions — 3-4 drop in
      almost every Friday for $30-45K sales.
    source: "DVD09-DVD10"

  - id: "FIL-DK-206"
    title: "Success Is Not A Straight Line: nobody gets anywhere in straight line. Tight zig"
    content: >
      Success Is Not A Straight Line: nobody gets anywhere in straight line. Tight zigzags vs loose
      zigzags — difference is clarity. Don't cause yourself pain by expecting straight path.
    source: "MM-02-cd3"

  - id: "FIL-DK-207"
    title: "Big Picture Optimist Detail Pessimist: smart entrepreneurs = big picture optimis"
    content: >
      Big Picture Optimist Detail Pessimist: smart entrepreneurs = big picture optimists + detail
      pessimists. Believe plane will get there (optimist) but assume it'll be late, food will be bad,
      baggage lost (pessimist). Believe in both Peale and Murphy's Law.
    source: "MM-02-cd5"

  - id: "FIL-DK-208"
    title: "Healthy Paranoia: just because you're paranoid doesn't mean they're not out to g"
    content: >
      Healthy Paranoia: just because you're paranoid doesn't mean they're not out to get you. Napoleon
      Hill's accurate thinking = dealing with reality positively without ignoring it.
    source: "MM-02-cd5"

  - id: "FIL-DK-209"
    title: "Personal Satisfaction First: engineer enormous personal satisfaction into what y"
    content: >
      Personal Satisfaction First: engineer enormous personal satisfaction into what you do. Nothing worse
      than success you don't like. Seinfeld walked away. Speaker said 'I'd rather be playing golf.' Top 10
      things you don't want = clarity.
    source: "MM-02-cd2"

  - id: "FIL-DK-210"
    title: "Don't Abuse Customer Trust: when customers trust you, resist temptation to sell"
    content: >
      Don't Abuse Customer Trust: when customers trust you, resist temptation to sell them crap. Undoes

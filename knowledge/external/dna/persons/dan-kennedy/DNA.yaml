      reach, dedicated zones, coffee warmer saves 3 trips/morning. Different tasks = different
      environments.
    source: "MM-03-cd1"

  - id: "FW-DK-174"
    title: "Positive Power Of Negative Preparation Framework (Cramer): (1) List every possib"
    content: >
      Positive Power Of Negative Preparation Framework (Cramer): (1) List every possible obstacle. (2)
      Create Plan B for each. (3) Create Plan C for when Plan B fails. (4) Do this BEFORE starting. (5)
      Worst case of Plan B = you don't need it. Roy Disney balanced Walt's optimism. Parachute analogy.
    source: "MM-03-cd1"

  - id: "FW-DK-175"
    title: "3 Stepping Stones to Direct Mail Success: (1) Right LIST — 30-50% of success. Se"

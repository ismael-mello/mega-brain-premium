L2_MODELOS_MENTAIS:
  - id: "MM-DK-266"
    text: "The Repair-Improvement-Opportunity Spectrum: Three stories you can tell. Repair is about fixing flaws (linked to need). Improvement is about making things better (linked to obligation). Opportunity is about new possibility (linked to desire). Only desire truly motivates."
    source: "CD1-track2"
  - id: "MM-DK-267"
    text: "The Grand Canyon Gap: There is a Grand Canyon sized gap between where prospects are starting mentally/emotionally and where we start our conversation with them. We start pitching from way further along than where they actually are."
    source: "CD1-track2"
  - id: "MM-DK-268"
    text: "Worker Head Mentality: Most small business owners have a worker head on their shoulders. They believe in a religious link between longevity and income escalation — the longer they show up, the more they should be paid, regardless of value delivered."
    source: "CD1-track5"
  - id: "MM-DK-269"
    text: "The Desire-Ambition Distinction: Everybody has desire for more (they play the lottery, put money in slot machines). But very few have ambition — the willingness to actually do the work to get what they desire. We talk to people like they have ambition; they don't."
    source: "CD2-track1"
  - id: "MM-DK-270"
    text: "The Conscious Mind as Belief Fortress (from Est/Werner Erhard): The conscious mind is a collection of beliefs whose only purpose is its own survival. Extracting a belief from it is like cutting off an arm with a rusty saw. The mind will fight to preserve its beliefs."
    source: "CD3-track3"
  - id: "MM-DK-271"
    text: "Open Architecture vs Closed Architecture: We sell the premise that you can remake your reality any way you want (open architecture). But most people operate from closed architecture — they believe their fate is predetermined by place, genetics, credentials, God, astrology."
    source: "CD3-track1"
  - id: "MM-DK-272"
    text: "The Gullibility-Skepticism Axis: What we really want is to move prospects all the way from skepticism, cynicism, and resistance to a state of profound gullibility — where they are easily persuaded because they are overtrusting of us."
    source: "CD4-track3"
  - id: "MM-DK-273"
    text: "The Bored Prospect Model: The #1 marketing sin is being boring. But we are trying to arouse a bored prospect with a message linked to something he's already bored about. His business is like sweatpants and sneakers — routine, familiar, invisible."
    source: "CD2-track6"
  - id: "MM-DK-274"
    text: "The Lottery Player Paradox: People who buy lottery tickets actually think they'll win, despite astronomical odds. Same numbers every week. This is the level of gullibility we need — where desires and vulnerabilities override rational calculation."
    source: "CD4-track4"
  - id: "MM-DK-275"
    text: "Faith Outside Self vs Faith In Self: Every great achievement of gullibility relies on placing faith in someone/something else, not in self. Scams work this way. But so does legitimate opportunity marketing. Drugs are preferred over therapy because drugs require no faith in self."
    source: "CD4-track6"
  - id: "MM-DK-276"
    text: "The Six Ways to Play with opportunity: 1) Same deliverables, present differently 2) Different deliverables in same market 3) Existing deliverables to different market 4) Package as consultant opportunity 5) Convert to pure opportunity for masses 6) Already a pure opportunity marketer."
    source: "CD1-track1"
  - id: "MM-DK-277"
    text: "The Newsletter Color Analysis Model: In DK's newsletter, content coded by color reveals: blue = marketing information, orange = building self-esteem/attitude/belief change. The ratio is heavily orange. Most feedback comes about the orange. The 'selling' never stops even in retention."
    source: "CD4-track2"
  - id: "MM-DK-278"
    text: "The Shrink Wrap Shelf: Buyers have shelves of products with shrink wrap still on. As a collective community, the more of us who sell with non-usage, the harder it gets for everyone else. Each seller shows up after the last one disappointed them."
    source: "CD5-track5"
  - id: "MM-DK-279"
    text: "Creative Disconnection: The best thing is not to try and win the battle of making bored people interested in boring subjects. It's to find ways of creative disconnection — disconnect what you're presenting from what they're already bored with."
    source: "CD3-track1"
  - id: "MM-DK-280"
    text: "The 11 Agreements Model: Before anyone buys opportunity, they must sequentially agree on 11 points — from general need through personal attainability, personal benefit, timing, personal timing, and personal appropriateness. Each is a hurdle that must be cleared."
    source: "CD6-track1, DVD03"
  - id: "MM-DK-281"
    text: "Lucy/Charlie Brown Model: Prospects are Charlie Browns who have repeatedly been convinced to run up and kick the ball, only to have it pulled away. Each failed attempt creates deeper skepticism. You cannot show them Lucy and a ball — you must show them something that looks fundamentally different."
    source: "CD6-track1, DVD03"
  - id: "MM-DK-282"
    text: "Toaster Principle: The closer you get to 'toaster' where they see a simple physical thing, the better. Present your opportunity as a toaster (push button, toast comes up) not as the process of making toast (dough, yeast, water, bread maker, forming, heating). A thing must have a name and sound like a kitchen appliance, not an elaborate process."
    source: "CD7-track2"
  - id: "MM-DK-283"
    text: "Privacy vs Public Behavior Model: People behave very differently alone than in groups. A pitch that would fail miserably in a room of 200 professionals can succeed enormously when delivered privately through direct mail or online. Shame operates publicly, greed operates privately."
    source: "CD6-track4"
  - id: "MM-DK-284"
    text: "Conscious Mind Portfolio Model: The conscious mind maintains a portfolio of beliefs. Every pitch is a threat to that portfolio. The goal of opportunity marketing is to get the prospect to set aside the entire conscious mind box and its accumulated evidence."
    source: "DVD03"
  - id: "MM-DK-285"
    text: "General vs Personal Beneficial Nature: A prospect can agree something is beneficial in general but not believe it is personally beneficial. The Tupperware wife example — she agrees making 80K a year is good, but realizes it will threaten her marriage to a 32K auto repair guy."
    source: "CD6-track1"
  - id: "MM-DK-286"
    text: "Timing vs Personal Timing Model: Timing is about external market conditions (real estate bubble, recession). Personal timing is about their individual circumstances (Barbara quit, kids out of school, vacation coming). Both must be overcome separately."
    source: "CD6-track1, CD6-track2"
  - id: "MM-DK-287"
    text: "Urgency From Past Loss Model: Instead of basing urgency on what they will gain or lose in the future (supply/demand), base it on what they have already lost by not having acted. People have a precedent in their head for having missed out on opportunity."
    source: "CD9-track1"
  - id: "MM-DK-288"
    text: "The Blackie Story Model: A mysterious source figure (dying man, retiring billionaire, old master) who originally discovered the secret and passed it to the seller. This serves dual purpose: (1) provides reason why the seller is sharing, and (2) makes the source not the seller, automatically increasing believability."
    source: "CD7-track3"
  - id: "MM-DK-289"
    text: "Taste Like Chicken Model: For difficult-to-understand propositions, link your opportunity to something the prospect already understands and accepts. Internet mall = regular mall. Oil well = recurring income. Real estate = everybody lives in a house. The analogy makes the incomprehensible accessible."
    source: "CD8-track4, CD8-track5"
  - id: "MM-DK-290"
    text: "Status Elevation Purchase Model: People do not buy the opportunity for its practical value — they buy it for the status elevation it provides in the eyes of others. Brainerd Melanger discovered he was really in the business card business, not the import-export business."
    source: "CD9-track2, CD9-track3"
  - id: "MM-DK-291"
    text: "Value Without Achievement Model: Membership, certificates, business cards, directories — anything that delivers perceived value and status without requiring the buyer to actually do anything or achieve results. Most people never use what they buy, so give them value from the purchase itself."
    source: "CD9-track1, CD9-track2"
  - id: "MM-DK-292"
    text: "Shrink Wrap Shelf Model: Most buyers have a shelf of courses and programs with the shrink wrap still on. The cumulative non-usage experience creates a wall of skepticism for the next seller. You must prove your thing is fundamentally different from everything already on that shelf."
    source: "DVD03"
  - id: "MM-DK-293"
    text: "Fire Alarm Hotel Model: For overcoming personal timing, you have only two choices — make it advantageous to act despite bad timing, or make it so urgent that bad timing is trumped. Like a fire alarm at 3 AM: the only way they move is if you convince them the building is actually on fire."
    source: "CD6-track2"
  - id: "MM-DK-294"
    text: "Original Dream Reselling Model: Every business owner had a dream and motivational picture when they first got into their business. That excitement is dormant but still there. Link your pitch to their original dream to rekindle the excitement they had as virgins in the game."
    source: "CD8-track5, CD8-track6"
  - id: "MM-DK-295"
    text: "Enemy/Villain Model: It is nearly always helpful to have an enemy to sell against. The villain moves you from the other side of the desk to the same side as the buyer. You now have shared understanding of whoever is the ugly in their world."
    source: "CD8-track6"
  - id: "MM-DK-296"
    text: "Two Things Different Model: For someone to buy again after failure, one of two things must be true — either something is profoundly different about them, or something is profoundly different about your thing. Always choose to prove the second, because it lets them off the hook."
    source: "DVD03"
  - id: "MM-DK-297"
    text: "Three Drawers Toolbox: You really only have three drawers in your toolbox. (1) Product/Message — the thing itself and the message about it, which are seamless. Is the thing itself the best thing it can be for opportunity language? (2) Process — how we make the sale. Put everything on a table and consider everything. (3) Prospects — are you investing to talk to the best prospects possible the greatest percentage of the time?"
    source: "CD/12 track 1 — DK presenting the Toolbox framework"
  - id: "MM-DK-298"
    text: "Toaster Principle (#119): When you present opportunity, there must be a thing people can think of as physical, tangible, with a name. The closer you get to 'toaster' where they see a kitchen appliance, the further you get from describing the process for making toast, the better you are. A thing must have a name and feel like a kitchen appliance, not a process."
    source: "DVD/04 — DK on making opportunities tangible"
  - id: "MM-DK-299"
    text: "Social Security Pyramid (immutable since 1954): 1% rich, 4% financially secure, 54% still working out of necessity (net assets under $100K), 5% dead broke, 36% dead. The only number that changed between 1954 and 2008 is the 54-to-36 ratio because people live longer. Otherwise NOTHING has changed despite all technological and informational advances."
    source: "CD/12 track 3 — DK presenting the unchanging pyramid"
  - id: "MM-DK-300"
    text: "Faith Healer List Model: Oral Roberts List goes to Pop-Off. Pop-Off's List goes to Oral Roberts. They're usually buying from more than one at the same time. When they get tired of one guru, they just move to another. You can swap lists with no damage — 20% of people were buying both products and not doing anything with either."
    source: "CD/12 track 6 — DK on list exchange and buyer behavior"
  - id: "MM-DK-301"
    text: "Moving Parade of Interest (David Ogilvy): The fact that Joe doesn't respond this week has everything to do with Joe and nothing to do with you or your piece. He was getting ready for vacation and was more vicious with his mail. Next week he's constipated and takes the mail to the john and reads everything. Same guy, same message, different week."
    source: "CD/15 track 4 — DK on why lists can be reused frequently"
  - id: "MM-DK-302"
    text: "Market Capacity Wall: You see a honeymoon period where cost per sale is relatively low (deluding because it won't last). Then gradual creep where every meaningful statistic turns chilly but not horrible. Then at some point all that gradual shift skyrockets bad — you've hit the wall. You've hit hard dirt. You either find another plot of soil or you need new tools (new economics)."
    source: "CD/15 track 1 — DK on the lifecycle of market saturation"
  - id: "MM-DK-303"
    text: "Greener Pastures Pitch: You can move people to greener pastures much easier than you can sell them a better version of what they already got. Even their don't-like list looks better than my don't-like list — I'm going 'that sounds shitty, but it doesn't sound as shitty as my shit.' Based on Earl Nightingale's story."
    source: "CD/13 track 3 — DK on true replacement opportunity selling"
  - id: "MM-DK-304"
    text: "Blackie Story: There is always another figure from whom the seller received the secrets — a dying man with his final breath, a billionaire ready to retire. The seller is really moving legacy rather than inventing. It answers the reason-why AND makes the source not the seller, which automatically makes it more believable."
    source: "DVD/04 — DK on the Blackie story device"
  - id: "MM-DK-305"
    text: "Urgency from Past Loss (#12): Instead of basing urgency only on what they're going to get or going to lose, talk about what they ALREADY lost by not having acted. What you could have collected, not what you will collect. People have a precedent in their head for having missed out on opportunity — everyone has at least one such story."
    source: "DVD/04 — DK on urgency drawn from past loss"
  - id: "MM-DK-306"
    text: "Taste-Like-Chicken Analogy: When you have a difficult proposition to explain, use analogy to something people already understand. Get rich in real estate works because everybody lives in a house. Get rich in mail order worked when Sears catalog existed. If your proposition is harder to understand, find the 'chicken' — the familiar reference frame people can anchor to."
    source: "DVD/04 — DK on making difficult propositions simple"
  - id: "MM-DK-307"
    text: "Compiled vs Response Lists: A compiled list is people thrown onto a file with enhanced demographic data. A response list is people who raised their hand and showed interest. The person NOT on any response list is a 'stubborn virgin' — they were already mailed and refused. Seducing them is expensive and they don't know how to behave."
    source: "CD/14 track 5, CD/15 track 3 — Craig and DK on list types"
  - id: "MM-DK-308"
    text: "Multiple Shovels Model: Take all the same leads and show them a different colored shovel that accomplishes the same three things but differently. Blue shovel = fix the patient who doesn't refer. Green shovel = another approach. You can use a list twice or three times with different offers, which allows you to spend MORE to get the lead."
    source: "CD/15 track 5 — DK on reusing leads with different offers"
  - id: "MM-DK-309"
    text: "Format Rotation on Same List: Postcards vs enveloped piece to the same list — there's virtually no dupe between the responder to the postcard and the responder to the envelope. It allows you to use the best list twice instead of a lesser list."
    source: "CD/15 track 4 — DK on format-based list reuse"
  - id: "MM-DK-310"
    text: "Membership as Value Without Achievement (#13): Membership allows us to give people value from opportunity without requiring activity or result. The real value of any opportunity is delayed until they use the stuff and get a result — and most never will. So we find ways to give them perceived value that doesn't require action."
    source: "DVD/04 — DK on membership as perceived value delivery"
  - id: "MM-DK-311"
    text: "Status Elevation Drives Buying (#15): We're in a business card business. Brainerd Melanger's breakthrough was giving International Traders Association members a business card. The refund rate dropped dramatically because they finally had something that said what they were. A way to identify themselves. Status is a powerful buying motivator."
    source: "DVD/04 — DK on the Brainerd Melanger business card story"
  - id: "MM-DK-312"
    text: "Larger Than Life Figure: Three categories must be present — (1) Humble beginnings (most buyers have humble beginnings, and without it you're just an arrogant asshole with a Bentley), (2) Proof of importance (other people but you must share the opinion you're a big deal — big audiences, media, book signings), (3) Possessions/lifestyle evidence."
    source: "DVD/04 — DK on the three elements of a larger-than-life figure"
  - id: "MM-DK-313"
    text: "Pyramid Within a Pyramid: Take Michael Jans' PNC insurance guys — same pyramid in his customer base. Take Forbes 500 — build yourself a little pyramid with their net worths. There's 1% of the 500 who are enormously rich, 4% impressively rich, and all the way down. The pyramid replicates at every scale."
    source: "CD/12 track 4 — DK on the fractal nature of the social pyramid"
  - id: "MM-DK-314"
    text: "Bonus System as Self-Management: Put all office staff on a percentage of income bonus. They got bonuses of $10,000-$20,000 each at Christmas. The people got rid of the people that didn't work — George never had to fire anybody because the staff self-policed. The non-performers were eliminating themselves because they were affecting everyone's bonus."
    source: "CD/11 track 1 — George on his employee management system"
  - id: "MM-DK-315"
    text: "Birthday Trigger Principle: About 40 and up, birthdays are increasingly near-death experiences. People behave differently in a little window around their birthday. Charlie's going to think more that week than he thinks any other week that year about his status in life, income, and unsatisfactory business."
    source: "CD/12 track 5 — DK on birthday-triggered marketing"
  - id: "MM-DK-316"
    text: "The Moving Parade of Interest — the fact that Joe doesn't respond this week has everything to do with Joe and nothing to do with you or your piece. Same guy, same message, different week produces different results based on life circumstances."
    source: "OMC DVD/07 — Dan Kennedy (citing David Ogilvy)"
  - id: "MM-DK-317"
    text: "Honeymoon Period → Gradual Creep → Wall model. Every market follows this arc: phenomenal early numbers (fans/enthusiasts), then gradual cost increases that are almost imperceptible, then sudden skyrocket where costs jump dramatically. At each wall, you need new economics, not new creative."
    source: "OMC DVD/07 — Dan Kennedy"
  - id: "MM-DK-318"
    text: "Compiled vs Response List mental model. Compiled lists are people thrown onto a file with enhanced data. Response lists are people who raised their hand and showed interest. Response lists consistently outperform compiled lists — the difference can be 0.05% vs 2% response."
    source: "OMC DVD/07 — Craig Simpson (Frank Kern example)"
  - id: "MM-DK-319"
    text: "The Dissatisfaction Gap model from direct selling — 70%+ of the presentation establishes how bad things are, invalidates all other bridges, then presents your solution as the only viable path. Sequence: establish gap → invalidate alternatives → present bridge → force self-definition."
    source: "OMC CD/18 tracks 3-4 — Dan Kennedy"
  - id: "MM-DK-320"
    text: "Lifetime Value Liberation model — if your LTV is $500, you can spend $200 to acquire. If your LTV is $1,000, you can spend $350-400 to acquire. Higher LTV means larger addressable market because you can afford to mail to less productive segments of lists."
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"
  - id: "MM-DK-321"
    text: "The Three Toolbox Drawers model: Product/Message, Process, and Prospects. Every marketing operation should be thought of as three separate drawers you open and optimize independently."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "MM-DK-322"
    text: "The Pyramid That Never Changes — 1% rich, 4% financially secure, 54% still working at 65, 5% broke, 36% dead. This has been unchanged since 1954. You're not going to change these numbers — work within them."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "MM-DK-323"
    text: "Opportunity Structure Spectrum: franchise → almost-franchise → dealership → consultant → coaching-plus → services → one-time events. Each has different payment models: fees, fees+profits, fees+upside, equity. Choose structure based on your control needs and scalability goals."
    source: "OMC CD/18 track 1 — Dan Kennedy"
  - id: "MM-DK-324"
    text: "Five Reasons Exclusivity Helps the Sale: (1) Fear of competitor having it, (2) Pride of ownership/status, (3) Price elasticity increases, (4) Conveyed equity, (5) Authentic urgency + take-away selling."
    source: "OMC CD/18 track 2 — Dan Kennedy"
  - id: "MM-DK-325"
    text: "Jeff Walker's Mental Triggers Framework — authority, reciprocity, community, social proof, anticipation, scarcity, likeability, events. Layer these triggers across a prelaunch sequence to create overwhelming buying momentum before the cart opens."
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"
  - id: "MM-DK-326"
    text: "Replacement Types taxonomy: (1) In-niche replacement, (2) True replacement/greener pastures, (3) Reinvention, (4) Rearrangement, (5) Addition/expansion, (6) Multiplier. Each type of opportunity replacement appeals to a different motivation."
    source: "OMC DVD/06 — Dan Kennedy"
  - id: "MM-DK-327"
    text: "The Tout Business model — using multiple identities to mail the same productive list segment repeatedly. Like football betting touts who operate under different names, you create parallel identities (cowboy hat guy, housewife with five kids) selling fundamentally the same thing at different price points and formats."
    source: "OMC CD/19 tracks 6-7, DVD/07 — Dan Kennedy"
  - id: "MM-DK-328"
    text: "The Blue Shovel model — when unconverted leads rejected your red shovel, don't discard them. Show them a blue shovel that accomplishes the same three things but does it differently. Same leads, different vehicle. If you create a green shovel too, you can use the leads three times."
    source: "OMC DVD/07 — Dan Kennedy (Jay Geyer dental example)"
  - id: "MM-DK-329"
    text: "Scaling Back to Restore Profitability — when you hit the wall, you can pull back to the tiny high-probability segment of the list, make slight adjustments, and live there profitably even though you can no longer live at scale. On TV: retard media buys to only the highest-performing geographies."
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch last 2 years)"
  - id: "MM-DK-330"
    text: "Process linked to who you're selling to — chair-side value plus ego equals difficulty of getting them in the room. The higher the prospect's perceived value of their time and ego, the harder the lead generation and the more the process must accommodate that."
    source: "OMC CD/19 track 2 — Dan Kennedy"
  - id: "MM-DK-331"
    text: "Rodale's 18-Month Rule — the most likely buyer of a product has bought a similar product within the last 18 months. Recency of related purchase is the strongest predictor of future purchase."
    source: "OMC DVD/06 — Dan Kennedy (citing Rodale publishing)"
  - id: "MM-DK-332"
    text: "The Sideways Sales Letter: Instead of a 50-page sales letter, turn it sideways and tell the same story over 10-12 days through 3-4 pieces of content. No mention of the sale until the third piece."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-333"
    text: "The Tennis Court Video principle: Lead with lifestyle and reason why, not with hype. For a warm list, start with authenticity and reason why. For a cold list (JV partners), lead with hype to hook instantly."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-334"
    text: "The Fish Video concept: People don't want to learn how to fish, clean the fish, or cook the fish. Your best prospects are people who bought your product but don't want to do it themselves — they want you to do it for them."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-335"
    text: "Marketing Gods identity transfer: If you can speak internet marketing, you are in a separate class from the rest of the people walking the face of the earth. Instill in people that they have secret knowledge."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-336"
    text: "In the land of the blind, the one-eyed man is king. People buying a training must believe they already have enough knowledge to actually do the thing. Prelaunch content instills this belief."
    source: "DVD08-JeffWalker"
  - id: "MM-DK-337"
    text: "Thing-Person-Place Trinity: You definitely want a thing (system, plan, certification, badge) from which they draw confidence. You need a person they are attached to. And you need a sense of place they plug into."
    source: "DVD09"
  - id: "MM-DK-338"
    text: "Opportunity is Reinvention model: Selling reinvention against the enemy. The reinvention is the answer to the villain making them miserable. Combine the reinvention frame with the enemy frame for maximum power."
    source: "DVD09"
  - id: "MM-DK-339"
    text: "The Dissatisfaction Gap: Direct selling and MLM industries are masters at establishing a big gap between where somebody is and where they had intended, hoped, and dreamed about being. More than 70% of a professional opportunity meeting is building this gap."
    source: "DVD09"
  - id: "MM-DK-340"
    text: "Bridge Invalidation: Invalidate all bridges across the dissatisfaction gap except yours. Every other way the prospect might achieve the same outcome must be destroyed — franchise, starting alone, better job, education, saving, real estate."
    source: "DVD09"
  - id: "MM-DK-341"
    text: "Pick a Door Identity model: Force people to visibly pick door number one or door number two, and by that decision and action define themselves as winner or putz. Used at every MLM opportunity meeting and should be in every room sale."
    source: "DVD09"
  - id: "MM-DK-342"
    text: "Present Bank / Future Bank: Exclusivity creates equity in the thing you sell. Part of the argument for buying is not just the income you make from it, but the equity created in it. Like a UPS store vs. independent packing shop — 150% more valuable."
    source: "DVD09"
  - id: "MM-DK-343"
    text: "The Alter Ego / Second Identity model: Unconverted leads who rejected your personality still want the promises. A different identity with different tone, different backstory, different front person can convert them."
    source: "DVD09"
  - id: "MM-DK-344"
    text: "Reverse Engineering the Ideal Client: If you have customers, reverse engineer who behaved and spent properly. If starting from scratch, find successful competitors and read their marketing material for clues about who they're talking to."
    source: "DVD10"
  - id: "MM-DK-345"
    text: "The Appointment No-Sale System: People don't buy for many reasons — they swore nothing on the credit card, they need to sleep on it, they need to pray about it. Have a system for every non-buyer regardless of how the presentation was made."
    source: "DVD09"
  - id: "MM-DK-346"
    text: "Process is linked to who you are selling to maybe more than to what you are selling. Certain demographic groups are more or less prone to respond to certain sales processes."
    source: "DVD09"
  - id: "MM-DK-347"
    text: "The Jack O'Brien Principle (Justice League of Personalities): If you have a credibility gap (gender, age, style), create a team of personality types and appearances to reassure different segments. Don Dwyer at SMI, James in Tolles and Letter."
    source: "DVD10"
  - id: "MM-DK-348"
    text: "Four Options for a Credibility Disadvantage: 1) Hide entirely, 2) Ignore it and sell like hell, 3) Make a big deal out of it and address it directly, 4) Help it by pairing with elder statesman or creating a Justice League team."
    source: "DVD10"


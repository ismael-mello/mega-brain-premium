  - id: "HEUR-DK-039"
    title: "5% de Qualquer Nicho Compra Tudo"
    content: >
      Em qualquer nicho de mercado, aproximadamente 5% dos participantes compram todos os produtos e
      programas disponíveis. Mercado "saturado" não existe — apenas 5% foram alcançados. Isso significa:
      nunca desistir de um nicho por ter "concorrência demais".
    source: "7FA-CD7"
    valor: "5%"

  - id: "HEUR-DK-040"
    title: "Menos de 30 Dias de Uso de Suplementos — 99% Param"
    content: >
      99% das pessoas que compram suplementos nutricionais nunca terminam o primeiro frasco. O ponto de
      abandono médio é menos de 30 dias. Implicação de negócio: vender supply de 6-18 meses upfront é mais
      rentável do que continuidade mensal porque o cliente vai cancelar de qualquer forma no mês 3-4.
    source: "7FA-CD12-T06"
    valor: "99% param antes de 30 dias"

  - id: "HEUR-DK-041"
    title: "31 Dias = Top 1% em Qualquer Disciplina"
    content: >
      Qualquer pessoa que mantém uma disciplina por 31 dias consecutivos está no top 1% dos que tentaram
      essa disciplina. A superioridade não requer um limiar altíssimo — 99% das pessoas desistem antes
      disso. Implicação: comprometimento de médio prazo é suficiente para diferenciação.
    source: "7FA-CD12-T05"
    valor: "31 dias = top 1%"

  - id: "HEUR-DK-042"
    title: "80% do Tempo em Psicologia, 20% em Ferramentas"
    content: >
      Em programas de coaching e treinamento de alto preço, 80% do tempo e energia deve ser dedicado a
      trabalho psicológico (coragem, crença, mentalidade) e apenas 20% a ferramentas e técnicas. Sem o
      componente psicológico, nenhuma ferramenta funciona.
    source: "7FA-CD12-T12"
    valor: "80% psicologia / 20% ferramentas"

  - id: "HEUR-DK-043"
    title: "Preço Médio por Cabeça como Métrica Principal em Plataforma"
    content: >
      Em eventos e platform selling, a métrica mais importante não é taxa de fechamento mas dólares por
      cabeça (revenue por pessoa na sala). Isso permite otimizar o sistema completo — preço do bilhete,
      preço da oferta, segmentação da audiência — em vez de apenas a técnica de vendas.
    source: "7FA-CD6"
    valor: "Dólares-por-cabeça > taxa de fechamento"

  - id: "HEUR-DK-044"
    title: "80% dos Ligantes para 0800 Não Compram por Má Gestão de Atendimento"
    content: >
      Em infomerciais, aproximadamente 80% das pessoas que ligam para o número de resposta direta não
      compram — não por falta de interesse, mas por má gestão da sala de atendimento telefônico. O gargalo
      de conversão está no telefone, não na oferta.
    source: "7FA-CD6"
    valor: "80% dos ligantes perdem-se no telefone"

  - id: "HEUR-DK-045"
    title: "Reativação de Clientes Perdidos: ROI Mais Alto de Qualquer Canal"
    content: >
      Reativar clientes que já compraram mas pararam é consistentemente o canal de ROI mais alto
      disponível para qualquer negócio. Eles já confiam, já compraram, já superam a barreira inicial. O
      custo de reativação é uma fração do custo de aquisição de novo cliente.
    source: "7FA-CD8"
    valor: "Reativação = ROI mais alto disponível"

  - id: "HEUR-DK-046"
    title: "Renovação Antecipada como Principal Alavanca de Newsletter"
    content: >
      O maior driver de LTV em negócios de newsletter/continuidade é a oferta de renovação antecipada —
      antes do vencimento, com desconto especial. Isso captura renovações de clientes que iriam cancelar e
      reduz churn efetivo sem mudar o produto.
    source: "7FA-CD8"
    valor: "Early renewal = principal alavanca de LTV em newsletter"

  - id: "HEUR-DK-047"
    title: "Teste 3 Pessoas antes de Confiança em Parceria"
    content: >
      Antes de confiar em um parceiro de negócio ou colaborador, encontre 3 pessoas que fariam negócio com
      ele novamente. Não apenas "foi boa experiência" — mas "eu pagaria para trabalhar com ele de novo."
      Essa é a prova de confiança real.
    source: "7FA-CD9"
    valor: "3 pessoas que voltariam = litmus test de parceria"

  - id: "HEUR-DK-048"
    title: "Regra das 3 Manhãs para Decisões Difíceis"
    content: >
      Quando preso numa situação ruim (parceiro, contrato, colaboração), se na terceira manhã consecutiva
      você acorda com o mesmo sentimento negativo, é hora de sair. Não espere a quarta. A clareza de três
      manhãs seguidas elimina oscilações emocionais de momento.
    source: "7FA-CD9"
    valor: "3 manhãs consecutivas = decisão de saída"

  - id: "HEUR-DK-049"
    title: "Não Reabilite — Substitua"
    content: >
      Em nível de 7 dígitos, não há tempo ou ROI em tentar reabilitar um profissional incompetente ou
      resistente. A decisão correta é substituir. Profissionais de elite se tornam o que são por escolha —
      não podem ser convencidos a escolher diferente por você.
    source: "7FA-CD10"
    valor: "Replace, don't rehabilitate"

  - id: "HEUR-DK-050"
    title: "Nunca Delegue: Newsletter, Feedback de Clientes, Enforcement"
    content: >
      Três categorias que nunca devem ser delegadas pelo empreendedor de 7 dígitos: (1) criação do
      conteúdo core/newsletter pessoal; (2) leitura do white mail e feedback direto de clientes; (3)
      enforcement de padrões/mystery shopping. Estas três mantêm o empreendedor conectado com mercado e
      qualidade.
    source: "7FA-CD10"
    valor: "3 coisas para nunca delegar: newsletter, white mail, enforcement"

  - id: "MM-DK-050"
    title: "Jim Rohn's Everything Principle — follow an extraordinarily successful person fo"
    content: >
      Jim Rohn's Everything Principle — follow an extraordinarily successful person for a week, keyword is
      EVERYTHING he does; most people couldn't even keep up
    source: "12BBS-CD1A"

  - id: "HEUR-DK-051"
    title: "Imersão Prévia ao Hook: Mínimo 3 Semanas"
    content: >
      Para encontrar o hook verdadeiro de um produto ou campanha, é necessária imersão direta no universo
      do produto e do comprador — conversas com engenheiros, uso do produto, visitas ao ponto de venda.
      Ogilvy levou 3 semanas. Atalhos para pesquisa secundária não substituem o tempo de imersão.
    source: "7FA-CD10"
    valor: "3 semanas mínimas de imersão antes do hook"

  - id: "HEUR-DK-052"
    title: "Reuniões sem Hora de Término São Inacabadas por Definição"
    content: >
      Reuniões devem ter tanto hora de início quanto de término. Apenas definir quando começa não cria
      pressão de conclusão. Sem deadline de término, reuniões se expandem para preencher o tempo
      disponível. A pressão de tempo habilita performance.
    source: "7FA-CD9"
    valor: "Hora de término obrigatória = habilita performance"

  - id: "HEUR-DK-053"
    title: "Limiar de Maestria: Best Opportunities Come to You"
    content: >
      Existe um ponto de maestria (threshold) após o qual as melhores oportunidades e colaboradores passam
      a buscar você — em vez de você buscar eles. Antes desse threshold, você convence. Depois, você
      seleciona. Guthy-Ranker recebe primeiro acesso a todos os deals exatamente por ter atingido esse
      ponto.
    source: "7FA-CD10"
    valor: "Maestria = inversão de quem persegue quem"

  - id: "HEUR-DK-054"
    title: "Superioridade Legítima: 3-4 Coisas para Ser Genuinamente Melhor"
    content: >
      Para que a crença em superioridade seja funcional (não mera arrogância), ela deve estar ancorada em
      3-4 áreas onde você genuinamente é melhor que 99% das pessoas. Escolha e mantenha essas áreas
      ativamente. Exemplo DK: ele simplesmente trabalha — e isso já o coloca no top 1%.
    source: "7FA-CD12-T06"
    valor: "3-4 áreas de superioridade legítima = base funcional"

  - id: "HEUR-DK-055"
    title: "Prova Social Completa: W. Clement Stone — Sem Pitch Direto"
    content: >
      W. Clement Stone vendeu seguros inteiramente via depoimentos de outros clientes — sem nunca fazer o
      pitch direto ele mesmo. A prova social pode substituir completamente o processo de vendas quando é
      suficientemente poderosa e abundante.
    source: "7FA-CD7"
    valor: "Prova social = pode substituir o pitch completamente"

  - id: "HEUR-DK-056"
    title: "Controle de Ambiente: Remova as Tentações, Não Confie na Força de Vontade"
    content: >
      A forma mais eficiente de manter produtividade e disciplina não é desenvolver força de vontade — é
      remover as tentações do ambiente. Controle do ambiente físico e social é mais confiável do que
      autocontrole sob pressão.
    source: "7FA-CD9"
    valor: "Controle de ambiente > força de vontade"

  - id: "HEUR-DK-057"
    title: "Preço do Ticket Médio de Chiropractor vs Prepay"
    content: >
      Chiropractors em modo convencional cobram $20-25/visita. No modelo prepay ensinado por DK, o pacote
      inicial de 46+12 visitas pode ser vendido por $16.000 (ou $11.000 com desconto). Um fechamento por
      semana = $48.000/mês — 2-5x mais do que o modelo convencional de menor rendimento.
    source: "7FA-CD11"
    valor: "$11-16K prepay vs $20-25/visita convencional"

  - id: "HEUR-DK-058"
    title: "Continuidade vs Front-End Loading em Suplementos"
    content: >
      Com taxa de abandono de 99% antes de 30 dias, empresas de suplemento migraram de continuidade mensal
      para front-end loading (vender supply de 6-18 meses de uma vez com desconto). Resultado: receita
      capturada antes do inevitável abandono.
    source: "7FA-CD12-T06"
    valor: "18 meses upfront > continuidade mensal quando abandono é > 99%"

  - id: "MM-DK-058"
    title: "Client Control Spectrum (1-10) — 1 = don't know you from Adam, 10 = absolutely d"
    content: >
      Client Control Spectrum (1-10) — 1 = don't know you from Adam, 10 = absolutely determined to get
      you. Want them past 5 BEFORE you arrive; this determines the entire relationship
    source: "ACC-cd03-T4"

  - id: "HEUR-DK-059"
    title: "Custo de Eliminar Custos Editoriais (Reader's Digest)"
    content: >
      Reader's Digest eliminou custos editoriais ao usar conteúdo já publicado em outras revistas — sem
      criar conteúdo original. Isso permitiu escalar com margens que publicações tradicionais não
      conseguiam. A pergunta "qual custo posso eliminar sem diminuir valor percebido?" é uma das mais
      poderosas no negócio.
    source: "7FA-CD7"
    valor: "Eliminar custo editorial sem reduzir valor percebido = alavanca"

  - id: "HEUR-DK-060"
    title: "Percentual do Front-End para Mídia Justificado pelo Back-End"
    content: >
      Se o LTV do cliente justifica, você pode dar 100% (ou mais) do lucro do front-end para
      mídia/aquisição e ainda ser lucrativo. O erro é calcular rentabilidade apenas no front-end sem
      considerar o back-end completo. Jay Abraham: saber o LTV real libera agressividade na aquisição.
    source: "7FA-CD8"
    valor: "100% do front-end para mídia = possível se back-end justifica"


  - id: "MM-DK-027"
    title: "Damaging Admission Credibility — admitting one weakness makes all other claims m"
    content: "Damaging Admission Credibility — admitting one weakness makes all other claims more believable"
    source: "05A"

  - id: "MM-DK-028"
    title: "Termostato de Renda — Auto-Sabotagem Calibrada"
    content: >
      Cada pessoa tem um termostato interno de renda. Quando a renda começa a subir muito acima do set
      point, comportamentos de sabotagem inconsciente emergem para trazer de volta ao nível habitual. O
      termostato deve ser reprogramado explicitamente — não é automático. Exemplos: gastando excesso,
      sabotando negócios, recusando oportunidades.
    source: "7FA-CD11"
    context: "People calibrate their behavior to stay near their set point. The thermostat concept applies to income."

  - id: "MM-DK-029"
    title: "Modelo das 3 Conversas em Vendas Face-a-Face"
    content: >
      Em qualquer reunião de vendas de alto valor, 3 conversas ocorrem simultaneamente: (1) Conversa sobre
      o deal — lógica e benefícios; (2) Conversa sobre confiança — "vai cumprir o que diz?"; (3) Conversa
      tácita — "quem é essa pessoa? Compartilhamos valores?" A terceira é a mais determinante mas a menos
      verbalizada.
    source: "7FA-CD12-T02"
    context: "There's one conversation about the deal, another about trust, and another not going on but really is: what is this person really about?"

  - id: "MM-DK-030"
    title: "Curva Sino Ruinada pelos 80% que Não Agem"
    content: >
      Qualquer produto ou programa tem sua curva de resultados destruída pelos 80-90% de compradores que
      não implementam. A média de resultados se torna quase zero não porque o produto falha, mas porque a
      maioria não usa. Isso tem implicação legal (FTC), de marketing (depoimentos) e de negócio
      (suporte/coaching).
    source: "7FA-CD12-T05"
    context: "The problem is the 80-90% who don't do anything with what they bought. There couldn't possibly be any results."

  - id: "MM-DK-031"
    title: "Modelo de Aquisição em 3 Formas (Jay Abraham)"
    content: >
      Todo negócio tem apenas 3 formas de crescer: (1) mais clientes; (2) ticket médio maior; (3)
      frequência de compra maior. Toda estratégia de crescimento se encaixa em uma dessas três. O que mais
      impacta o LTV é geralmente frequência, não aquisição.
    source: "7FA-CD8"
    context: "There are only three ways to grow any business: more customers, higher average sale, buy more often."

  - id: "MM-DK-032"
    title: "Modelo Host-Beneficiário — Encurtando pelo Relacionamento Alheio"
    content: >
      Em vez de construir audiência do zero, use o relacionamento já estabelecido de outro negócio com sua
      audiência. O host acessa valor para seus clientes, o beneficiário acessa clientes já aquecidos. Isso
      encurta o ciclo de vendas porque confiança já foi estabelecida.
    source: "7FA-CD8"
    context: "JV/host-beneficiary: shortcut by using others' existing customer relationships. Trust has already been established."

  - id: "MM-DK-033"
    title: "Modelo dos 9 Pontos de Alavancagem"
    content: >
      Jay Abraham identifica 9 pontos de alavancagem em qualquer negócio: clientes perdidos, leads não
      convertidos, upsell/cross-sell, joint ventures, mídia de inserção, newsletter, reativação,
      referências, e back-end. A maioria dos negócios explora apenas 1-2 desses pontos.
    source: "7FA-CD8"
    context: "Nine leverage points in any business. Most exploit only one or two."

  - id: "MM-DK-034"
    title: "Lente da Preeminência — Advisor vs Vendor"
    content: >
      A diferença entre vendedor e advisor de preeminência é a postura: o advisor age no melhor interesse
      do cliente mesmo quando isso significa não vender. Isso cria tal nível de confiança que o cliente
      para de comparar preços e para de precisar ser convencido.
    source: "7FA-CD8"
    context: "The Strategy of Preeminence positions you as the most trusted advisor — acting in their best interest above all."

  - id: "MM-DK-035"
    title: "Modelo do Concorrente de Segunda Geração"
    content: >
      O verdadeiro concorrente não é quem você pode ver — é o próximo entrante que virá após você. O
      segundo player num mercado novo geralmente supera o primeiro porque aprende com seus erros e desvios
      sem pagar o custo do pioneirismo. Estratégia: criar barreiras antes que o segundo geração apareça.
    source: "7FA-CD7"
    context: "The second-generation competitor phenomenon — they learn from your mistakes without paying for the pioneering."

  - id: "MM-DK-036"
    title: "Lente do Maior Problema Irritante (MPI)"
    content: >
      O posicionamento mais poderoso num mercado é identificar e resolver o maior problema que as pessoas
      mais odeiam e que ninguém ainda resolveu de forma satisfatória. Exemplo: Domino's não vendeu pizza —
      vendeu certeza de entrega. Funeral pre-need não vendeu serviço — vendeu eliminação do maior peso
      emocional.
    source: "7FA-CD7"
    context: "Solving the 'biggest nagging problem' — Domino's: people just wanted to know when it was coming and if it'd be hot."

  - id: "MM-DK-037"
    title: "Modelo da Imersão no Mercado para Encontrar o Hook"
    content: >
      Os melhores hooks de marketing não vêm de copywriters em isolamento — vêm de imersão profunda no
      produto/mercado. Ogilvy passou 3 semanas com engenheiros da Rolls Royce antes de escrever uma linha.
      Walton visitava lojas da concorrência. A observação direta revela o que pesquisa não captura.
    source: "7FA-CD10"
    context: "Ogilvy spent 3 weeks with Rolls Royce engineers to find the hook — 'the loudest noise in the new Rolls is the clock."

  - id: "MM-DK-038"
    title: "Lente da Transformação de Mão-de-Obra em Mídia"
    content: >
      Em períodos de crescimento, a mídia pode substituir a força de vendas humana (escala por mídia). Em
      recessão, o inverso ocorre — mão-de-obra volta a ser mais eficiente. Negócios que entendem quando
      alternar entre as duas estratégias sobrevivem a ciclos econômicos melhor do que os que ficam presos
      em uma delas.
    source: "7FA-CD7"
    context: "Media replacing manual labor — and the reverse in recessions. Knowing when to switch is the strategic insight."

  - id: "MM-DK-039"
    title: "Modelo de Compartimentalização Cognitiva"
    content: >
      Alta produtividade requer a habilidade de "empacotar" mentalmente problemas não resolvidos e
      colocá-los em segundo plano enquanto se foca no que importa agora. Não é ignorar — é agendar.
      Treinamento dessa habilidade é separar o que pode ser resolvido agora do que não pode.
    source: "7FA-CD9"
    context: "Compartmentalization — train yourself to box distractions. Not ignoring, but scheduling."

  - id: "MM-DK-040"
    title: "Modelo da Origem do Sucesso por Chance + Profundidade"
    content: >
      A maioria das influências transformadoras na vida de qualquer pessoa começou por acaso (encontrar o
      livro certo, o mentor certo). O diferenciador entre pessoas comuns e sérias é o que fazem depois: a
      pessoa séria mergulha mais fundo — busca a origem, os predecessores, vai upstream. A maioria para no
      primeiro nível.
    source: "7FA-CD12-T09"
    context: "Random chance opens the door for most people. The serious student then moves upstream — where did this come from? What preceded it?"

  - id: "MM-DK-041"
    title: "Modelo de Venda Fria-para-Preparada com Delay Deliberado"
    content: >
      Em vendas de alto ticket para prospectos frios, inserir um delay deliberado antes do pitch aumenta
      significativamente conversão. O delay é usado para enviar um pacote de informações que pré-aquece,
      educa e cria expectativa. A conversão de "cold-to-prepared" pode dobrar em relação a
      "cold-to-pitch".
    source: "7FA-CD6"
    context: "Cold-to-prepared sale strategy — deliberate delay plus info package doubles conversions vs. cold-to-pitch."

  - id: "MM-DK-042"
    title: "Lente da Gestão de Sala como Gestão de Performance"
    content: >
      Em apresentações de palco ou platform selling, a maioria dos vendedores falha porque perde o
      controle do tempo. O maior sabotador é falar demais sobre conteúdo e chegar ao pitch sem tempo
      suficiente. A gestão do tempo em sala é gestão de conversão.
    source: "7FA-CD6"
    context: "Most people doing platform selling sabotage themselves by running out of time. Time management in the room is conversion management."

  - id: "MM-DK-043"
    title: "Modelo de Preço como Seleção de Cliente"
    content: >
      O preço que você cobra seleciona ativamente quem são seus clientes. Preço alto seleciona clientes
      com mais recursos, mais comprometidos e que dão menos trabalho. Preço baixo atrai volume mas também
      atrai o tipo de cliente que drena energia e que tem menor taxa de sucesso com seu produto.
    source: "7FA-CD1"
    context: "Price selects your customers. High price selects committed, resourceful clients who are easier to work with."

  - id: "MM-DK-044"
    title: "Robert Collier Principle — step into the conversation already occurring in your"
    content: >
      Robert Collier Principle — step into the conversation already occurring in your prospect's mind
      before you write a word of copy or speak a word of sales
    source: "12BBS-CD1A"

  - id: "MM-DK-045"
    title: "Three Internal Conversations Model — prospects have one of three self-talks: (1)"
    content: >
      Three Internal Conversations Model — prospects have one of three self-talks: (1) 'I'll be damned if
      it stops me', (2) 'This doesn't affect extraordinary people like me' [status defense], (3) 'I'm
      anxious and uncertain
    source: "12BBS-CD1A"

  - id: "MM-DK-046"
    title: "Commodity vs. Non-Commodity Perception — you're either selling a commodity (pric"
    content: >
      Commodity vs. Non-Commodity Perception — you're either selling a commodity (price war, race to
      bottom) or an aspiration/experience (premium pricing, no competition)
    source: "12BBS-CD1A"

  - id: "MM-DK-047"
    title: "Alignment vs. Certainty — two recession-proofing approaches: (1) align your mess"
    content: >
      Alignment vs. Certainty — two recession-proofing approaches: (1) align your message WITH the
      recession conversation, or (2) sell certainty DESPITE the recession
    source: "12BBS-CD1A"

  - id: "MM-DK-048"
    title: "Consumer Confidence as Irrational Force — spending and investing don't have a gr"
    content: >
      Consumer Confidence as Irrational Force — spending and investing don't have a great deal to do with
      reality; the Dow goes up or down today for no rational reason, people who can't spell Dow now watch
      it every minute
    source: "12BBS-CD1A"

  - id: "MM-DK-049"
    title: "The Charlatan Principle — study the book 'Charlatan' for blueprint on how certai"
    content: >
      The Charlatan Principle — study the book 'Charlatan' for blueprint on how certainty + conviction
      creates followers regardless of product (Dr. Brinkley: sheep testicle transplants, radio empire,
      Mexico border broadcast station)
    source: "12BBS-CD1A"

  - id: "MM-DK-051"
    title: "The Nero Wolfe Model — make everyone come to you, never leave your house, create"
    content: >
      The Nero Wolfe Model — make everyone come to you, never leave your house, create maximum scarcity
      through inaccessibility (J.J. Armes: conversation starts with $100K on the desk)
    source: "ACC-cd03-T14,T15"

  - id: "FIL-DK-052"
    title: "Value is by the perception of the people you serve — the church delivers value a"
    content: >
      Value is by the perception of the people you serve — the church delivers value and the house of ill
      repute delivers value, different customers
    source: "12BBS-CD1A"

  - id: "MM-DK-052"
    title: "Reputation Stack — what they surmise/assume + what they're told by others + what"
    content: >
      Reputation Stack — what they surmise/assume + what they're told by others + what they read about you
      + legends they hear repeated + who you're associated with
    source: "ACC-cd02-T1,T2,T3"

  - id: "MM-DK-053"
    title: "Shortlist Design — deliberately choose 3-5 things you want to be known as and kn"
    content: >
      Shortlist Design — deliberately choose 3-5 things you want to be known as and known for, then govern
      ALL other decisions by this reference list
    source: "ACC-cd02-T5,T6"

  - id: "MM-DK-054"
    title: "The Ladder Principle — build ladders for others to climb (Boy Scouts, certificat"
    content: >
      The Ladder Principle — build ladders for others to climb (Boy Scouts, certifications — all designed
      to control people), but never climb one yourself
    source: "ACC-cd01-T9"

  - id: "MM-DK-055"
    title: "Three-Layer Content Model — Layer 1: entertainment/education, Layer 2: marketing"
    content: >
      Three-Layer Content Model — Layer 1: entertainment/education, Layer 2: marketing ideas/examples,
      Layer 3: 'what are they up to and why?' (study the strategy behind the content)
    source: "ACC-cd01-T2"

  - id: "MM-DK-056"
    title: "Broad→Narrow→Broad Career Cycle — positioning oscillates: start broad (marketing"
    content: >
      Broad→Narrow→Broad Career Cycle — positioning oscillates: start broad (marketing for any business),
      go narrow (magnetic marketing, 3-step mail), back broad (entrepreneurial strategies), narrow again
      (marketing to affluent)
    source: "ACC-cd03-T1"

  - id: "MM-DK-057"
    title: "Value vs. Core Value Distinction — core value (actual results) doesn't keep clie"
    content: >
      Value vs. Core Value Distinction — core value (actual results) doesn't keep clients; perceived value
      (relationship, recognition, control, delight) keeps them paying for 10-25 years
    source: "ACC-cd01-T13,T14"

  - id: "FIL-DK-065"
    title: "Deception, manipulation, psychological control — that's what we do in this busin"
    content: >
      Deception, manipulation, psychological control — that's what we do in this business. The question is
      degree and competency at it
    source: "ACC-cd03-T14"

  - id: "MM-DK-160"
    title: "Pest-to-Guest Continuum: man banging on door = pest. But when your yard is on fi"
    content: >
      Pest-to-Guest Continuum: man banging on door = pest. But when your yard is on fire, that same man
      becomes the most welcomed guest ever. Change the context from stalking to solving, and you change
      everything.
    source: "MM-01-mod1"

  - id: "MM-DK-161"
    title: "Market-Message-Media Triangle: you must get the right MESSAGE to the right MARKE"
    content: >
      Market-Message-Media Triangle: you must get the right MESSAGE to the right MARKET via the right
      MEDIA. If you're off in any one, you waste money and likely have abject failure.
    source: "MM-01-mod2"

  - id: "MM-DK-162"
    title: "A-Pile vs B-Pile: most people sort mail over a wastebasket. A-pile = bills, lett"
    content: >
      A-Pile vs B-Pile: most people sort mail over a wastebasket. A-pile = bills, letters from friends
      (gets opened). B-pile = everything else (gets trashed). We must be in the A-pile.
    source: "MM-01-mod2"

  - id: "MM-DK-163"
    title: "Sales Letter as Salesman-in-Envelope: think of your letter as a sales representa"
    content: >
      Sales Letter as Salesman-in-Envelope: think of your letter as a sales representative fortunate
      enough to get delivered for the price of a cup of coffee.
    source: "MM-01-mod2"

  - id: "MM-DK-164"
    title: "Widget Bridge: a mundane business becomes a totally different business. A new bu"
    content: >
      Widget Bridge: a mundane business becomes a totally different business. A new business is invented
      WITHIN the business. That new business becomes the widget. (Stupak: hotel → widget-selling business)
    source: "MM-01-mod1"

  - id: "MM-DK-165"
    title: "Collection Letter Linkage: first notice, second notice, third notice, 15 days ap"
    content: >
      Collection Letter Linkage: first notice, second notice, third notice, 15 days apart. If this gets
      money from people who haven't got any, offering nothing — imagine what happens when you offer
      something great to people who HAVE money.
    source: "MM-01-mod3"

  - id: "MM-DK-166"
    title: "Three Self-Destructive Myths: (1) 'My business is different.' (2) 'My advertisin"
    content: >
      Three Self-Destructive Myths: (1) 'My business is different.' (2) 'My advertising has to fit
      industry norms.' (3) 'Tacky mail-order advertising doesn't work.' All three are wrong.
    source: "MM-01-mod1"

  - id: "MM-DK-167"
    title: "Random and Erratic Acts of Marketing: disconnected investments in attempted mark"
    content: >
      Random and Erratic Acts of Marketing: disconnected investments in attempted marketing. This is
      chaos. A system by definition is reliable, predictable and consistent.
    source: "MM-01-mod1"

  - id: "MM-DK-168"
    title: "Cold Prospecting = Coal Mining: dirty, filthy, ugly, smelly, sweaty work best le"
    content: >
      Cold Prospecting = Coal Mining: dirty, filthy, ugly, smelly, sweaty work best left to people who
      earn minimum wage with brawn, not maximum wage with brain.
    source: "MM-01-mod1"

  - id: "MM-DK-169"
    title: "Frontend vs Backend: Frontend = outreach to attract/acquire new leads and custom"
    content: >
      Frontend vs Backend: Frontend = outreach to attract/acquire new leads and customers. Backend =
      developing, retaining customers, increasing frequency and repeat business.
    source: "MM-01-mod3"

  - id: "MM-DK-170"
    title: "Goodyear Blimp Model: image advertising = blimp over stadium (nobody responds)."
    content: >
      Goodyear Blimp Model: image advertising = blimp over stadium (nobody responds). Target marketing =
      parking the blimp right over someone with threadbare tires.
    source: "MM-01-mod1"

  - id: "MM-DK-171"
    title: "Salmon Swimming Upstream (Gary Halbert): mail pieces are little salmon fighting"
    content: >
      Salmon Swimming Upstream (Gary Halbert): mail pieces are little salmon fighting upstream. We must
      give them power boats — personal look, real stamps, plain envelopes.
    source: "MM-01-mod2"

  - id: "MM-DK-172"
    title: "National Enquirer Headline Acid Test: take your headline out of context, run it"
    content: >
      National Enquirer Headline Acid Test: take your headline out of context, run it as a classified ad
      with just 'Box 3, Grand Central Station, NY.' Would anybody respond? If not, headline fails.
    source: "MM-01-mod3"

  - id: "MM-DK-173"
    title: "Emotional Payoff > Functional Benefit: new dentures functionally = eat better. E"
    content: >
      Emotional Payoff > Functional Benefit: new dentures functionally = eat better. Emotionally = never
      being embarrassed about smiling again. Sell the emotional payoff.
    source: "MM-01-mod3"

  - id: "MM-DK-174"
    title: "Enlarged Business Card vs Miniaturized Sales Letter: most ads are enlarged busin"
    content: >
      Enlarged Business Card vs Miniaturized Sales Letter: most ads are enlarged business cards
      (worthless). Winning approach is a miniaturized sales letter with headlines, benefits, copy.
    source: "MM-01-mod2"

  - id: "MM-DK-175"
    title: "Straight Face Test: first qualification for high prices = keeping straight face"
    content: >
      Straight Face Test: first qualification for high prices = keeping straight face when quoting fee.
      Practice in front of mirror. Body language gives you away if you don't believe your own price.
    source: "MM-02-cd1"

  - id: "MM-DK-176"
    title: "Pre-Pay Compliance Model: quote entire case upfront. Chiropractic prepay avg $7K"
    content: >
      Pre-Pay Compliance Model: quote entire case upfront. Chiropractic prepay avg $7K in early 1980s.
      Compliance goes up dramatically — patients who prepay have much higher success rate vs $30/visit
      pay-as-you-go.
    source: "MM-02-cd1"

  - id: "MM-DK-177"
    title: "Vacuum Principle (Customer Firing): fire problem customers → vacuum fills with b"
    content: >
      Vacuum Principle (Customer Firing): fire problem customers → vacuum fills with better ones. If not
      confident vacuum fills = you have marketing problem, not customer problem.
    source: "MM-02-cd2"

  - id: "MM-DK-178"
    title: "80/20 Customer Problem Rule: 20% of customers give 80% of problems. Maybe 85/15"
    content: >
      80/20 Customer Problem Rule: 20% of customers give 80% of problems. Maybe 85/15 or 90/10. Same true
      with employees. Surgically remove problem ones as early as detected.
    source: "MM-02-cd2"

  - id: "MM-DK-179"
    title: "Wise Man Mountain Access: no long line to wise man at bottom of mountain. Apprec"
    content: >
      Wise Man Mountain Access: no long line to wise man at bottom of mountain. Appreciation, respect,
      compliance, and money are in direct proportion to how high the mountain is and how scarred they get
      climbing it.
    source: "MM-02-cd4"

  - id: "MM-DK-180"
    title: "Gross vs Net Confusion: lots of gross ≠ some net. Problems multiply when you mul"
    content: >
      Gross vs Net Confusion: lots of gross ≠ some net. Problems multiply when you multiply gross, not go
      away. Net is the only number that counts. Know net by segment, not just whole business.
    source: "MM-02-cd3"

  - id: "MM-DK-181"
    title: "Compartmentalization (Close File Open File): like computer — close file, open ne"
    content: >
      Compartmentalization (Close File Open File): like computer — close file, open next file. Coach
      resets between plays. Train yourself to shift instantly. Went from horse race finish line to
      conference call in 5 minutes, fully focused.
    source: "MM-02-cd4"

  - id: "MM-DK-182"
    title: "Core Competency Factor: don't give expert in one area credit for expertise in al"
    content: >
      Core Competency Factor: don't give expert in one area credit for expertise in all areas. Sort what
      they know from experience vs what they cheerfully talk about without knowledge. 4 failed
      infomercials ≠ infomercial expert.
    source: "MM-02-cd5"

  - id: "MM-DK-183"
    title: "5-90-5 Theft Rule: 5% never steal. 5% always steal compulsively. 90% in between"
    content: >
      5-90-5 Theft Rule: 5% never steal. 5% always steal compulsively. 90% in between will steal given 3
      conditions: believe undetected + perceived need + can rationalize. Only detection is controllable.
    source: "MM-02-cd5"

  - id: "MM-DK-184"
    title: "Count The Cookies System: show them you're counting. Johnny: 24 cookies, you and"
    content: >
      Count The Cookies System: show them you're counting. Johnny: 24 cookies, you and I are only ones
      home, first thing I do when I return is count. Same principle for employees and vendors.
    source: "MM-02-cd5"

  - id: "MM-DK-185"
    title: "Differentiation Hierarchy: 5 ways to escape commodity pricing: Product, Process,"
    content: >
      Differentiation Hierarchy: 5 ways to escape commodity pricing: Product, Process, Personality,
      Service, Smarter Marketing. If no differentiation given = buyer decides by price only.
    source: "MM-02-cd6"

  - id: "MM-DK-186"
    title: "Second Sale More Important Than First: after first purchase, focus on getting se"
    content: >
      Second Sale More Important Than First: after first purchase, focus on getting second quickly. After
      4th purchase = customer for life. Dry cleaning proven. Job of first sentence = get them to read
      second.
    source: "MM-02-cd6"

  - id: "MM-DK-187"
    title: "Knockoff Defense Speed: if successful, you'll get knocked off — certainty. Only"
    content: >
      Knockoff Defense Speed: if successful, you'll get knocked off — certainty. Only option = invent
      faster than they copy. Ray Kroc: we invent faster than they copy. Accept 3-month window.
    source: "MM-02-cd6"

  - id: "MM-DK-188"
    title: "Trade-Off Factor: everything has pluses and minuses, price tag. Know your non-ne"
    content: >
      Trade-Off Factor: everything has pluses and minuses, price tag. Know your non-negotiables. DK: no
      employees, ever. Jeff Paul: no tie, ever. Engineer business around what you refuse to tolerate.
    source: "MM-02-cd2"

  - id: "MM-DK-189"
    title: "Script vs Schedule: schedule = appointments for the day. Script = every minute o"
    content: >
      Script vs Schedule: schedule = appointments for the day. Script = every minute of the day. Movie
      analogy — can't shoot a movie with an outline. Harold walking to chair = predetermined seconds.
      That's the difference.
    source: "MM-03-cd2"

  - id: "MM-DK-190"
    title: "Kissinger Principle: 'No more crisis this week — I'm fully booked.' If all time"
    content: >
      Kissinger Principle: 'No more crisis this week — I'm fully booked.' If all time is pre-assigned,
      waste literally cannot occur. Supply that doesn't exist can't be wasted or abused.
    source: "MM-03-cd1"

  - id: "MM-DK-191"
    title: "Empty Picture Frame (Arnold Palmer): always have visible space for next win. Pal"
    content: >
      Empty Picture Frame (Arnold Palmer): always have visible space for next win. Palmer embedded
      medallions in table, always routed hole for next one. Message: you ARE going to get the next one.
      Psychological trigger for subconscious.
    source: "MM-03-cd1"

  - id: "MM-DK-192"
    title: "Forced Appointment Setting: send mail ahead, route yourself, tell them 'expect m"
    content: >
      Forced Appointment Setting: send mail ahead, route yourself, tell them 'expect me at 10, Joe at 11,
      Charlie at 12.' Result: 80% saw him vs 20% for average rep doing cold walk-ins. Sales manager asked
      him to take Fridays off — making everyone look bad.
    source: "MM-03-cd1"

  - id: "MM-DK-193"
    title: "Predictive vs Historical Indicators: time targets predict money results. End-of-"
    content: >
      Predictive vs Historical Indicators: time targets predict money results. End-of-month sales review =
      always too late, that's historical. Current time use = predictive indicator. Met all time targets
      today = very predictive of bank balance at month end.
    source: "MM-03-cd3"

  - id: "MM-DK-194"
    title: "Designated Days Principle: phone days where ALL calls clumped. Writing days wher"
    content: >
      Designated Days Principle: phone days where ALL calls clumped. Writing days where ALL you do is
      write. Office days for accumulated faxes/correspondence/bookkeeping. Each function group gets
      dedicated day. No frustration about 'not getting other stuff done.
    source: "MM-03-cd2"

  - id: "MM-DK-195"
    title: "12-Minute Call Protocol: start every call saying 'I've got 12 minutes.' Conditio"
    content: >
      12-Minute Call Protocol: start every call saying 'I've got 12 minutes.' Conditions everyone to be
      efficient. Coaching calls = 14-min slots back-to-back. At 14 minutes, hang up mid-sentence about
      impending Armageddon. They learn.
    source: "MM-03-cd2"

  - id: "MM-DK-196"
    title: "Conversation Planner Per Person: one card/page per frequent contact. Cluster que"
    content: >
      Conversation Planner Per Person: one card/page per frequent contact. Cluster questions instead of 16
      interruptions/day. Also serves as delegation/supervision tracker — if item not checked off, hold
      them accountable next call.
    source: "MM-03-cd1"

  - id: "MM-DK-197"
    title: "Question-Free Communication: FedEx to assistant 2-3x/week. Goal = she doesn't ne"
    content: >
      Question-Free Communication: FedEx to assistant 2-3x/week. Goal = she doesn't need to ask 5
      questions before dispensing. Forces thorough thinking. Post-it notes on everything. Discipline for
      both sides.
    source: "MM-03-cd2"

  - id: "MM-DK-198"
    title: "Baby Steps + One Thing Rule (Thalheimer/Sharper Image): break goal to daily to-d"
    content: >
      Baby Steps + One Thing Rule (Thalheimer/Sharper Image): break goal to daily to-do. Refuse to end ANY
      day without doing something toward the goal. Wrote 4 books last year, one hour a day. Nothing gets
      done in occasional big leaps.
    source: "MM-03-pdf"

  - id: "MM-DK-199"
    title: "Disney Referral Model: find ways to do what you do so well and so uniquely that"
    content: >
      Disney Referral Model: find ways to do what you do so well and so uniquely that customers CANNOT
      RESIST telling lots of other people about you. Disney's #1 memorable factor = cleanliness, #2 =
      authenticity. Then Harry tells friends in Dubuque, and 4 more families bring money to the mouse.
    source: "MM-04-cd1-1"

  - id: "MM-DK-200"
    title: "BB Ball Thinking: individual improvements are like single BBs — one won't shatte"
    content: >
      BB Ball Thinking: individual improvements are like single BBs — one won't shatter a window. But
      solder 200 together and it will. Stop looking for one big magic strategy; accumulate lots of little
      improvements. Dentist found 700 things to change and 10x'd his practice.
    source: "MM-04-cd1-1"

  - id: "MM-DK-201"
    title: "Circle of Influence Model: average person has immediate circle of 52 people. Ave"
    content: >
      Circle of Influence Model: average person has immediate circle of 52 people. Average satisfied
      customer tells only 3. Moving from 3→52 requires action: recognition, appreciation, gifts. Each
      customer could bring you 50 more.
    source: "MM-04-cd1-1"

  - id: "MM-DK-202"
    title: "Ducks To Water: how do ducks go to water? One behind the other. Referral custome"
    content: >
      Ducks To Water: how do ducks go to water? One behind the other. Referral customers are
      pre-conditioned to refer — they arrived via referral, so they're already in the referral mindset.
      Use existing customers as proof points.
    source: "MM-04-cd1-2"

  - id: "MM-DK-203"
    title: "Geographic vs Category Target Marketing: use existing customers to target (A) sa"
    content: >
      Geographic vs Category Target Marketing: use existing customers to target (A) same geographic area —
      other tenants in same complex, or (B) same customer type — other architect firms. One architect
      leads to another.
    source: "MM-04-cd1-2"

  - id: "MM-DK-204"
    title: "Double Readership Path: design copy for two types — analytical (reads everything"
    content: >
      Double Readership Path: design copy for two types — analytical (reads everything, wants maximum
      information) AND impulsive (skims headlines/subheads/captions, wants message quickly). Headline +
      subheads + captions + response device must tell complete story alone.
    source: "MM-04-cd1-4"

  - id: "MM-DK-205"
    title: "80/20 Sales Organization: 80% of sales from 20% of reps, 80% of problems from 20"
    content: >
      80/20 Sales Organization: 80% of sales from 20% of reps, 80% of problems from 20% of reps. As long
      as it's not the same 20%, you're in good shape. Divert attention from mediocre to high performers
      for fastest results.
    source: "MM-04-cd2-2"

  - id: "MM-DK-206"
    title: "80/20 Business Mix: 80% of profits from 20% of your business, 80% of problems fr"
    content: >
      80/20 Business Mix: 80% of profits from 20% of your business, 80% of problems from 20%. Analyze and
      redesign — cut the losing parts. Same 80/20 as in sales orgs but applied to
      products/divisions/customer types.
    source: "MM-04-cd2-3"

  - id: "MM-DK-207"
    title: "Product vs Marketing Breakthrough: every business has opportunity for one or bot"
    content: >
      Product vs Marketing Breakthrough: every business has opportunity for one or both. Sharper Image
      chose marketing (opened retail stores). Nightingale-Conant chose product (tape albums from
      best-selling books). Which breakthrough does YOUR business need?
    source: "MM-04-cd2-3"

  - id: "MM-DK-208"
    title: "Railroad Thinking Trap: they mistakenly thought they were in the railroad indust"
    content: >
      Railroad Thinking Trap: they mistakenly thought they were in the railroad industry instead of the
      transportation industry. Constantly redefine what business you're in. Avon = Avon Ladies →
      mail-order fashion → retail cosmetics → co-worker selling.
    source: "MM-04-cd2-3"

  - id: "MM-DK-209"
    title: "Cleanliness As Marketing Model: Disney treats park cleanliness as MARKETING, not"
    content: >
      Cleanliness As Marketing Model: Disney treats park cleanliness as MARKETING, not just maintenance.
      Think of the 'cleanliness equivalent' in your business — what routine operational excellence becomes
      your referral trigger?
    source: "MM-04-cd1-1"

  - id: "MM-DK-210"
    title: "McDonald's Redefinition Model: began as a hamburger stand. Today among other thi"
    content: >
      McDonald's Redefinition Model: began as a hamburger stand. Today among other things, McDonald's is a
      huge commercial real estate company investing in building a property empire with franchisee leases
      as funding. What business are you REALLY in?
    source: "MM-04-cd2-3"

  - id: "MM-DK-211"
    title: "Blind Archery Model: most business people play blind archery — a most dangerous"
    content: >
      Blind Archery Model: most business people play blind archery — a most dangerous game. Everything
      Kennedy recommends revolves around accurate, precise targeting. If you cannot clearly see your
      target, it's hard to hit.
    source: "MM-05-cd1-1"

  - id: "MM-DK-212"
    title: "Paradigm Shift Model: instead of being a jeweler, become a MARKETER of jewelry."
    content: >
      Paradigm Shift Model: instead of being a jeweler, become a MARKETER of jewelry. The shift in
      thinking, orientation, and identity refocuses you on the single most important and most financially
      rewarding aspect of business — marketing.
    source: "MM-05-cd1-2"

  - id: "MM-DK-213"
    title: "Marketing Noise Model: average adult consumer presented with more spending oppor"
    content: >
      Marketing Noise Model: average adult consumer presented with more spending opportunities in one
      8-hour period today than in 30 24-hour periods just a decade ago. Mammoth marketing noise bombarding
      everyone — your strategy must achieve top-of-consciousness.
    source: "MM-05-cd1-3"

  - id: "MM-DK-214"
    title: "Advertising Accountability Spectrum: Institutional (zero measurement, 'we're nic"
    content: >
      Advertising Accountability Spectrum: Institutional (zero measurement, 'we're nice guys') →
      Non-Measurable Response (trying to sell but unaccountable, 'come on in') → Direct Response (99%
      measurable). Always move toward direct response end.
    source: "MM-05-cd1-3"

  - id: "MM-DK-215"
    title: "1% Added Benefit Factor: non-responding customers still received positive exposu"
    content: >
      1% Added Benefit Factor: non-responding customers still received positive exposure. Cumulative
      effect creates additional customers over time. But NEVER count it or attribute cash value to offset
      costs — marketing must pay with current, measurable results.
    source: "MM-05-cd1-3"

  - id: "MM-DK-216"
    title: "Customer-as-Asset Model: only the mail order industry properly values customers"
    content: >
      Customer-as-Asset Model: only the mail order industry properly values customers as assets in
      financial records. Lost customers diminish balance sheet AND income statement. Most businesses lose
      money on first sale when you cross full customer acquisition cost.
    source: "MM-05-cd1-3"

  - id: "MM-DK-217"
    title: "Cocktail Party Test: will the way you describe what you do cause a crowd to gath"
    content: >
      Cocktail Party Test: will the way you describe what you do cause a crowd to gather at a cocktail
      party, everyone eager to hear more? If not, you have a creative task ahead to redefine what you do
      so the description itself is magnetic.
    source: "MM-05-cd1-2"

  - id: "MM-DK-218"
    title: "Multi-Hoop Qualification Process: when you have a multi-step marketing process t"
    content: >
      Multi-Hoop Qualification Process: when you have a multi-step marketing process that forces prospects
      to jump through multiple hoops before reaching you, it automatically weeds out low-probability
      prospects and pre-sells those who remain. Personal selling time reaches peak productivity.
    source: "MM-05-cd1-1"

  - id: "MM-DK-220"
    title: "Guided Missile Model (Maltz) - success is constant course-correction, not straig"
    content: >
      Guided Missile Model (Maltz) - success is constant course-correction, not straight-line perfection;
      the missile is off course most of the time but keeps correcting
    source: "MM-BB-CD3"

  - id: "MM-DK-221"
    title: "Testing Frame - every marketing action is a test, not success/failure; determine"
    content: >
      Testing Frame - every marketing action is a test, not success/failure; determine what does not work
      as quick and cheap as possible
    source: "MM-BB-CD3"

  - id: "MM-DK-222"
    title: "Compartmentalization Model - close one mental file, open another; reset between"
    content: >
      Compartmentalization Model - close one mental file, open another; reset between tasks like a
      football coach resets between plays
    source: "MM-BB-CD4"

  - id: "MM-DK-223"
    title: "5%/5%/90% Theft Model - 5% will never steal, 5% always steal, 90% steal if: (1)"
    content: >
      5%/5%/90% Theft Model - 5% will never steal, 5% always steal, 90% steal if: (1) believe undetected,
      (2) perceived need, (3) can rationalize; only control #1
    source: "MM-BB-CD5"

  - id: "MM-DK-224"
    title: "Core Competency Factor - people good in one area are NOT equally good in all are"
    content: >
      Core Competency Factor - people good in one area are NOT equally good in all areas; sort expert
      advice by their actual track record
    source: "MM-BB-CD5"

  - id: "MM-DK-225"
    title: "Deal Flow = Independence - enough prospective customers flowing gives you power"
    content: >
      Deal Flow = Independence - enough prospective customers flowing gives you power to be viciously
      independent about pricing, terms, customer selection
    source: "MM-BB-CD5"

  - id: "MM-DK-226"
    title: "Big Picture Optimist / Detailed Pessimist - believe plane will arrive safely but"
    content: >
      Big Picture Optimist / Detailed Pessimist - believe plane will arrive safely but assume they will
      lose your baggage and try to poison you with the food
    source: "MM-BB-CD5"

  - id: "MM-DK-227"
    title: "Ringer Ladder Principle - climbing the ladder of success is a waste of time; jus"
    content: >
      Ringer Ladder Principle - climbing the ladder of success is a waste of time; just jump up there;
      self-appointment over waiting for permission
    source: "MM-BB-CD2"

  - id: "MM-DK-228"
    title: "Cookie Counter Model - mama counts 24 cookies, tells Johnny she will count when"
    content: >
      Cookie Counter Model - mama counts 24 cookies, tells Johnny she will count when she returns; only
      theft factor you can control is certainty of detection
    source: "MM-BB-CD5"

  - id: "MM-DK-229"
    title: "Celebrity-in-Your-Niche Model - be so famous you cannot walk through your indust"
    content: >
      Celebrity-in-Your-Niche Model - be so famous you cannot walk through your industry convention
      without being mobbed; create it deliberately
    source: "MM-BB-CD6"

  - id: "MM-DK-230"
    title: "Credibility vs Believability - credibility (years, associations, degrees) is man"
    content: >
      Credibility vs Believability - credibility (years, associations, degrees) is mandatory but not
      persuasive; believability (identification + specifics) is what sells
    source: "MM-BB-CD6"

  - id: "MM-DK-232"
    title: "Nightingale Inversion Principle — if the majority does X, the opposite is probab"
    content: >
      Nightingale Inversion Principle — if the majority does X, the opposite is probably right; the
      majority is always wrong about money
    source: "MM-03-CD1"

  - id: "MM-DK-233"
    title: "Yin-Yang of Strengths — every entrepreneurial strength has a corresponding weakn"
    content: >
      Yin-Yang of Strengths — every entrepreneurial strength has a corresponding weakness;
      arrogance/optimism can become blind optimism
    source: "MM-03-CD1"

  - id: "MM-DK-234"
    title: "Efficiency vs Effectiveness (Drucker) — quantity of communication has multiplied"
    content: >
      Efficiency vs Effectiveness (Drucker) — quantity of communication has multiplied but quality has
      suffered; efficiency does not equal effectiveness
    source: "MM-03-CD2, Articles"

  - id: "MM-DK-235"
    title: "Recovery Time Model — entrepreneurs need recovery time engineered into daily sch"
    content: >
      Recovery Time Model — entrepreneurs need recovery time engineered into daily schedules; all recovery
      time has been given to cell phones and email
    source: "MM-03-CD1, Articles"

  - id: "MM-DK-236"
    title: "Compartmentalization Lockers — mental lockers to put each situation in its own b"
    content: >
      Compartmentalization Lockers — mental lockers to put each situation in its own box, close the door,
      open the next; schedule your misery
    source: "MM-03-CD2"

  - id: "MM-DK-237"
    title: "Behavior Congruency — your behavior must align with the person already living th"
    content: >
      Behavior Congruency — your behavior must align with the person already living the life you want;
      can't hit invisible targets
    source: "MM-03-CD3"

  - id: "MM-DK-238"
    title: "The Phenomena — there will come a time when you accomplish more in 12 months tha"
    content: >
      The Phenomena — there will come a time when you accomplish more in 12 months than the previous 12
      years; preparation before opportunity
    source: "MM-03-CD3"

  - id: "MM-DK-239"
    title: "Supply-Demand Time Protection — time can be wasted only if available to be waste"
    content: >
      Supply-Demand Time Protection — time can be wasted only if available to be wasted; if fully booked,
      waste literally can't occur (Kissinger: no more crises, I'm fully booked)
    source: "MM-03-CD2"

  - id: "MM-DK-240"
    title: "Script vs Schedule — a schedule is appointments for the day, a script is every m"
    content: >
      Script vs Schedule — a schedule is appointments for the day, a script is every minute of the day;
      like shooting a movie with a script not an outline
    source: "MM-03-CD3"

  - id: "MM-DK-241"
    title: "Empty Picture Frame (Arnold Palmer) — always have the next goal visually represe"
    content: >
      Empty Picture Frame (Arnold Palmer) — always have the next goal visually represented; the
      psychological trigger of what's coming next
    source: "MM-03-CD1"

  - id: "MM-DK-242"
    title: "Replacement vs Delegation — delegation is done out of necessity, replacement is"
    content: >
      Replacement vs Delegation — delegation is done out of necessity, replacement is done out of
      strategy; if business still requires you after 36 months it's a job not a business
    source: "MM-03-CD3"

  - id: "MM-DK-243"
    title: "80/20 to 95/5 Rule Applied to Time — 5% of clients and 5% of time prove infinite"
    content: "80/20 to 95/5 Rule Applied to Time — 5% of clients and 5% of time prove infinitely more valuable than the other 95%"
    source: "MM-03-Articles"

  - id: "MM-DK-244"
    title: "Career Capital Model -- when buyer says yes, he invests career capital. Wisely u"
    content: >
      Career Capital Model -- when buyer says yes, he invests career capital. Wisely used = influence,
      promotions, raises. Squandered = diminishes.
    source: "MM-06-cd2"

  - id: "MM-DK-245"
    title: "Selling Money at a Discount -- offer $10 bill for $1, authenticated. Build perce"
    content: >
      Selling Money at a Discount -- offer $10 bill for $1, authenticated. Build perceived value so far in
      excess of cost that price becomes irresistible bargain.
    source: "MM-06-cd3"

  - id: "MM-DK-246"
    title: "Solution-Solution Model -- generic solution first (supplementation necessary), t"
    content: >
      Solution-Solution Model -- generic solution first (supplementation necessary), then brand solution
      (our vitamins). Two-stage persuasion.
    source: "MM-06-cd2"

  - id: "MM-DK-247"
    title: "Internal Repetition Model -- deliver same info ~5 times differently: feature, pe"
    content: >
      Internal Repetition Model -- deliver same info ~5 times differently: feature, personal story, case
      histories, callback to metaphor, tie-together story.
    source: "MM-06-cd2"

  - id: "MM-DK-248"
    title: "Drain-and-Box Method -- collect ALL objections before responding. Write each dow"
    content: >
      Drain-and-Box Method -- collect ALL objections before responding. Write each down, what else? until
      done. Confirm: if we resolve these, ready? Address each, cross off.
    source: "MM-06-cd3"

  - id: "MM-DK-249"
    title: "Million Dollar Presentation Blueprint -- promise opening, credibility, mutual pa"
    content: >
      Million Dollar Presentation Blueprint -- promise opening, credibility, mutual pain, framework with
      visual metaphor, internal repetition, solution-solution bridge, value build + close.
    source: "MM-06-cd2"

  - id: "MM-DK-250"
    title: "Three Presentations Model -- amateur has 2 (gave + wished). Pro has 3 (planned,"
    content: >
      Three Presentations Model -- amateur has 2 (gave + wished). Pro has 3 (planned, actual, wished). No
      pro coach enters game without game plan.
    source: "MM-06-cd2"

  - id: "MM-DK-251"
    title: "Big Four Foundation -- self-image (winner?), self-esteem (congruent?), self-conf"
    content: >
      Big Four Foundation -- self-image (winner?), self-esteem (congruent?), self-confidence (tools?),
      self-discipline (action?). Given these, enthusiasm is natural.
    source: "MM-06-cd2"

  - id: "MM-DK-252"
    title: "Cafeteria Implementation -- pick ONE thing, 30-day plan, work backwards day 30 t"
    content: >
      Cafeteria Implementation -- pick ONE thing, 30-day plan, work backwards day 30 to 1. Integrate it.
      Then pick next. Will not return later.
    source: "MM-06-cd2"

  - id: "MM-DK-264"
    title: "Dirty Fingernails Test — a $25,000 banquet sale lost because the salesperson had"
    content: >
      Dirty Fingernails Test — a $25,000 banquet sale lost because the salesperson had dirt under two
      fingernails. Customers unsell themselves over seemingly trivial environmental details. The sales
      process has invisible 'dirty fingernails' that silently kill deals.
    source: "MM-08-pdf02"

  - id: "MM-DK-266"
    title: "The Repair-Improvement-Opportunity Spectrum: Three stories you can tell. Repair"
    content: >
      The Repair-Improvement-Opportunity Spectrum: Three stories you can tell. Repair is about fixing
      flaws (linked to need). Improvement is about making things better (linked to obligation).
      Opportunity is about new possibility (linked to desire). Only desire truly motivates.
    source: "CD1-track2"

  - id: "MM-DK-267"
    title: "The Grand Canyon Gap: There is a Grand Canyon sized gap between where prospects"
    content: >
      The Grand Canyon Gap: There is a Grand Canyon sized gap between where prospects are starting
      mentally/emotionally and where we start our conversation with them. We start pitching from way
      further along than where they actually are.
    source: "CD1-track2"

  - id: "MM-DK-268"
    title: "Worker Head Mentality: Most small business owners have a worker head on their sh"
    content: >
      Worker Head Mentality: Most small business owners have a worker head on their shoulders. They
      believe in a religious link between longevity and income escalation — the longer they show up, the
      more they should be paid, regardless of value delivered.
    source: "CD1-track5"

  - id: "MM-DK-269"
    title: "The Desire-Ambition Distinction: Everybody has desire for more (they play the lo"
    content: >
      The Desire-Ambition Distinction: Everybody has desire for more (they play the lottery, put money in
      slot machines). But very few have ambition — the willingness to actually do the work to get what
      they desire. We talk to people like they have ambition; they don't.
    source: "CD2-track1"

  - id: "MM-DK-270"
    title: "The Conscious Mind as Belief Fortress (from Est/Werner Erhard): The conscious mi"
    content: >
      The Conscious Mind as Belief Fortress (from Est/Werner Erhard): The conscious mind is a collection
      of beliefs whose only purpose is its own survival. Extracting a belief from it is like cutting off
      an arm with a rusty saw. The mind will fight to preserve its beliefs.
    source: "CD3-track3"

  - id: "MM-DK-271"
    title: "Open Architecture vs Closed Architecture: We sell the premise that you can remak"
    content: >
      Open Architecture vs Closed Architecture: We sell the premise that you can remake your reality any
      way you want (open architecture). But most people operate from closed architecture — they believe
      their fate is predetermined by place, genetics, credentials, God, astrology.
    source: "CD3-track1"

  - id: "MM-DK-272"
    title: "The Gullibility-Skepticism Axis: What we really want is to move prospects all th"
    content: >
      The Gullibility-Skepticism Axis: What we really want is to move prospects all the way from
      skepticism, cynicism, and resistance to a state of profound gullibility — where they are easily
      persuaded because they are overtrusting of us.
    source: "CD4-track3"

  - id: "FIL-DK-273"
    title: "Credibility alone is not enough - believability through identification and speci"
    content: >
      Credibility alone is not enough - believability through identification and specific testimonials is
      what is truly persuasive
    source: "MM-BB-CD6"

  - id: "MM-DK-273"
    title: "The Bored Prospect Model: The #1 marketing sin is being boring. But we are tryin"
    content: >
      The Bored Prospect Model: The #1 marketing sin is being boring. But we are trying to arouse a bored
      prospect with a message linked to something he's already bored about. His business is like
      sweatpants and sneakers — routine, familiar, invisible.
    source: "CD2-track6"

  - id: "MM-DK-274"
    title: "The Lottery Player Paradox: People who buy lottery tickets actually think they'l"
    content: >
      The Lottery Player Paradox: People who buy lottery tickets actually think they'll win, despite
      astronomical odds. Same numbers every week. This is the level of gullibility we need — where desires
      and vulnerabilities override rational calculation.
    source: "CD4-track4"

  - id: "MM-DK-275"
    title: "Faith Outside Self vs Faith In Self: Every great achievement of gullibility reli"
    content: >
      Faith Outside Self vs Faith In Self: Every great achievement of gullibility relies on placing faith
      in someone/something else, not in self. Scams work this way. But so does legitimate opportunity
      marketing. Drugs are preferred over therapy because drugs require no faith in self.
    source: "CD4-track6"

  - id: "MM-DK-276"
    title: "The Six Ways to Play with opportunity: 1) Same deliverables, present differently"
    content: >
      The Six Ways to Play with opportunity: 1) Same deliverables, present differently 2) Different
      deliverables in same market 3) Existing deliverables to different market 4) Package as consultant
      opportunity 5) Convert to pure opportunity for masses 6) Already a pure opportunity marketer.
    source: "CD1-track1"

  - id: "MM-DK-277"
    title: "The Newsletter Color Analysis Model: In DK's newsletter, content coded by color"
    content: >
      The Newsletter Color Analysis Model: In DK's newsletter, content coded by color reveals: blue =
      marketing information, orange = building self-esteem/attitude/belief change. The ratio is heavily
      orange. Most feedback comes about the orange. The 'selling' never stops even in retention.
    source: "CD4-track2"

  - id: "MM-DK-278"
    title: "The Shrink Wrap Shelf: Buyers have shelves of products with shrink wrap still on"
    content: >
      The Shrink Wrap Shelf: Buyers have shelves of products with shrink wrap still on. As a collective
      community, the more of us who sell with non-usage, the harder it gets for everyone else. Each seller
      shows up after the last one disappointed them.
    source: "CD5-track5"

  - id: "MM-DK-279"
    title: "Creative Disconnection: The best thing is not to try and win the battle of makin"
    content: >
      Creative Disconnection: The best thing is not to try and win the battle of making bored people
      interested in boring subjects. It's to find ways of creative disconnection — disconnect what you're
      presenting from what they're already bored with.
    source: "CD3-track1"

  - id: "MM-DK-280"
    title: "The 11 Agreements Model: Before anyone buys opportunity, they must sequentially"
    content: >
      The 11 Agreements Model: Before anyone buys opportunity, they must sequentially agree on 11 points —
      from general need through personal attainability, personal benefit, timing, personal timing, and
      personal appropriateness. Each is a hurdle that must be cleared.
    source: "CD6-track1, DVD03"

  - id: "MM-DK-281"
    title: "Lucy/Charlie Brown Model: Prospects are Charlie Browns who have repeatedly been"
    content: >
      Lucy/Charlie Brown Model: Prospects are Charlie Browns who have repeatedly been convinced to run up
      and kick the ball, only to have it pulled away. Each failed attempt creates deeper skepticism. You
      cannot show them Lucy and a ball — you must show them something that looks fundamentally different.
    source: "CD6-track1, DVD03"

  - id: "MM-DK-282"
    title: "Toaster Principle: The closer you get to 'toaster' where they see a simple physi"
    content: >
      Toaster Principle: The closer you get to 'toaster' where they see a simple physical thing, the
      better. Present your opportunity as a toaster (push button, toast comes up) not as the process of
      making toast (dough, yeast, water, bread maker, forming, heating). A thing must have a name and
      sound like a kitchen appliance, not an elaborate process.
    source: "CD7-track2"

  - id: "MM-DK-283"
    title: "Privacy vs Public Behavior Model: People behave very differently alone than in g"
    content: >
      Privacy vs Public Behavior Model: People behave very differently alone than in groups. A pitch that
      would fail miserably in a room of 200 professionals can succeed enormously when delivered privately
      through direct mail or online. Shame operates publicly, greed operates privately.
    source: "CD6-track4"

  - id: "MM-DK-284"
    title: "Conscious Mind Portfolio Model: The conscious mind maintains a portfolio of beli"
    content: >
      Conscious Mind Portfolio Model: The conscious mind maintains a portfolio of beliefs. Every pitch is
      a threat to that portfolio. The goal of opportunity marketing is to get the prospect to set aside
      the entire conscious mind box and its accumulated evidence.
    source: "DVD03"

  - id: "MM-DK-285"
    title: "General vs Personal Beneficial Nature: A prospect can agree something is benefic"
    content: >
      General vs Personal Beneficial Nature: A prospect can agree something is beneficial in general but
      not believe it is personally beneficial. The Tupperware wife example — she agrees making 80K a year
      is good, but realizes it will threaten her marriage to a 32K auto repair guy.
    source: "CD6-track1"

  - id: "MM-DK-286"
    title: "Timing vs Personal Timing Model: Timing is about external market conditions (rea"
    content: >
      Timing vs Personal Timing Model: Timing is about external market conditions (real estate bubble,
      recession). Personal timing is about their individual circumstances (Barbara quit, kids out of
      school, vacation coming). Both must be overcome separately.
    source: "CD6-track1, CD6-track2"

  - id: "MM-DK-287"
    title: "Urgency From Past Loss Model: Instead of basing urgency on what they will gain o"
    content: >
      Urgency From Past Loss Model: Instead of basing urgency on what they will gain or lose in the future
      (supply/demand), base it on what they have already lost by not having acted. People have a precedent
      in their head for having missed out on opportunity.
    source: "CD9-track1"

  - id: "MM-DK-288"
    title: "The Blackie Story Model: A mysterious source figure (dying man, retiring billion"
    content: >
      The Blackie Story Model: A mysterious source figure (dying man, retiring billionaire, old master)
      who originally discovered the secret and passed it to the seller. This serves dual purpose: (1)
      provides reason why the seller is sharing, and (2) makes the source not the seller, automatically
      increasing believability.
    source: "CD7-track3"

  - id: "MM-DK-289"
    title: "Taste Like Chicken Model: For difficult-to-understand propositions, link your op"
    content: >
      Taste Like Chicken Model: For difficult-to-understand propositions, link your opportunity to
      something the prospect already understands and accepts. Internet mall = regular mall. Oil well =
      recurring income. Real estate = everybody lives in a house. The analogy makes the incomprehensible
      accessible.
    source: "CD8-track4, CD8-track5"

  - id: "MM-DK-290"
    title: "Status Elevation Purchase Model: People do not buy the opportunity for its pract"
    content: >
      Status Elevation Purchase Model: People do not buy the opportunity for its practical value — they
      buy it for the status elevation it provides in the eyes of others. Brainerd Melanger discovered he
      was really in the business card business, not the import-export business.
    source: "CD9-track2, CD9-track3"

  - id: "MM-DK-291"
    title: "Value Without Achievement Model: Membership, certificates, business cards, direc"
    content: >
      Value Without Achievement Model: Membership, certificates, business cards, directories — anything
      that delivers perceived value and status without requiring the buyer to actually do anything or
      achieve results. Most people never use what they buy, so give them value from the purchase itself.
    source: "CD9-track1, CD9-track2"

  - id: "MM-DK-292"
    title: "Shrink Wrap Shelf Model: Most buyers have a shelf of courses and programs with t"
    content: >
      Shrink Wrap Shelf Model: Most buyers have a shelf of courses and programs with the shrink wrap still
      on. The cumulative non-usage experience creates a wall of skepticism for the next seller. You must
      prove your thing is fundamentally different from everything already on that shelf.
    source: "DVD03"

  - id: "MM-DK-293"
    title: "Fire Alarm Hotel Model: For overcoming personal timing, you have only two choice"
    content: >
      Fire Alarm Hotel Model: For overcoming personal timing, you have only two choices — make it
      advantageous to act despite bad timing, or make it so urgent that bad timing is trumped. Like a fire
      alarm at 3 AM: the only way they move is if you convince them the building is actually on fire.
    source: "CD6-track2"

  - id: "MM-DK-294"
    title: "Original Dream Reselling Model: Every business owner had a dream and motivationa"
    content: >
      Original Dream Reselling Model: Every business owner had a dream and motivational picture when they
      first got into their business. That excitement is dormant but still there. Link your pitch to their
      original dream to rekindle the excitement they had as virgins in the game.
    source: "CD8-track5, CD8-track6"

  - id: "MM-DK-295"
    title: "Enemy/Villain Model: It is nearly always helpful to have an enemy to sell agains"
    content: >
      Enemy/Villain Model: It is nearly always helpful to have an enemy to sell against. The villain moves
      you from the other side of the desk to the same side as the buyer. You now have shared understanding
      of whoever is the ugly in their world.
    source: "CD8-track6"

  - id: "MM-DK-296"
    title: "Two Things Different Model: For someone to buy again after failure, one of two t"
    content: >
      Two Things Different Model: For someone to buy again after failure, one of two things must be true —
      either something is profoundly different about them, or something is profoundly different about your
      thing. Always choose to prove the second, because it lets them off the hook.
    source: "DVD03"

  - id: "MM-DK-297"
    title: "Three Drawers Toolbox: You really only have three drawers in your toolbox. (1) P"
    content: >
      Three Drawers Toolbox: You really only have three drawers in your toolbox. (1) Product/Message — the
      thing itself and the message about it, which are seamless. Is the thing itself the best thing it can
      be for opportunity language? (2) Process — how we make the sale. Put everything on a table and
      consider everything. (3) Prospects — are you investing to talk to the best prospects possible the
      greatest percentage of the time?
    source: "CD/12 track 1 — DK presenting the Toolbox framework"

  - id: "MM-DK-298"
    title: "Toaster Principle (#119): When you present opportunity, there must be a thing pe"
    content: >
      Toaster Principle (#119): When you present opportunity, there must be a thing people can think of as
      physical, tangible, with a name. The closer you get to 'toaster' where they see a kitchen appliance,
      the further you get from describing the process for making toast, the better you are. A thing must
      have a name and feel like a kitchen appliance, not a process.
    source: "DVD/04 — DK on making opportunities tangible"

  - id: "MM-DK-299"
    title: "Social Security Pyramid (immutable since 1954): 1% rich, 4% financially secure,"
    content: >
      Social Security Pyramid (immutable since 1954): 1% rich, 4% financially secure, 54% still working
      out of necessity (net assets under $100K), 5% dead broke, 36% dead. The only number that changed
      between 1954 and 2008 is the 54-to-36 ratio because people live longer. Otherwise NOTHING has
      changed despite all technological and informational advances.
    source: "CD/12 track 3 — DK presenting the unchanging pyramid"

  - id: "MM-DK-300"
    title: "Faith Healer List Model: Oral Roberts List goes to Pop-Off. Pop-Off's List goes"
    content: >
      Faith Healer List Model: Oral Roberts List goes to Pop-Off. Pop-Off's List goes to Oral Roberts.
      They're usually buying from more than one at the same time. When they get tired of one guru, they
      just move to another. You can swap lists with no damage — 20% of people were buying both products
      and not doing anything with either.
    source: "CD/12 track 6 — DK on list exchange and buyer behavior"

  - id: "MM-DK-301"
    title: "Moving Parade of Interest (David Ogilvy): The fact that Joe doesn't respond this"
    content: >
      Moving Parade of Interest (David Ogilvy): The fact that Joe doesn't respond this week has everything
      to do with Joe and nothing to do with you or your piece. He was getting ready for vacation and was
      more vicious with his mail. Next week he's constipated and takes the mail to the john and reads
      everything. Same guy, same message, different week.
    source: "CD/15 track 4 — DK on why lists can be reused frequently"

  - id: "MM-DK-302"
    title: "Market Capacity Wall: You see a honeymoon period where cost per sale is relative"
    content: >
      Market Capacity Wall: You see a honeymoon period where cost per sale is relatively low (deluding
      because it won't last). Then gradual creep where every meaningful statistic turns chilly but not
      horrible. Then at some point all that gradual shift skyrockets bad — you've hit the wall. You've hit
      hard dirt. You either find another plot of soil or you need new tools (new economics).
    source: "CD/15 track 1 — DK on the lifecycle of market saturation"

  - id: "MM-DK-303"
    title: "Greener Pastures Pitch: You can move people to greener pastures much easier than"
    content: >
      Greener Pastures Pitch: You can move people to greener pastures much easier than you can sell them a
      better version of what they already got. Even their don't-like list looks better than my don't-like
      list — I'm going 'that sounds shitty, but it doesn't sound as shitty as my shit.' Based on Earl
      Nightingale's story.
    source: "CD/13 track 3 — DK on true replacement opportunity selling"

  - id: "MM-DK-304"
    title: "Blackie Story: There is always another figure from whom the seller received the"
    content: >
      Blackie Story: There is always another figure from whom the seller received the secrets — a dying
      man with his final breath, a billionaire ready to retire. The seller is really moving legacy rather
      than inventing. It answers the reason-why AND makes the source not the seller, which automatically
      makes it more believable.
    source: "DVD/04 — DK on the Blackie story device"

  - id: "MM-DK-305"
    title: "Urgency from Past Loss (#12): Instead of basing urgency only on what they're goi"
    content: >
      Urgency from Past Loss (#12): Instead of basing urgency only on what they're going to get or going
      to lose, talk about what they ALREADY lost by not having acted. What you could have collected, not
      what you will collect. People have a precedent in their head for having missed out on opportunity —
      everyone has at least one such story.
    source: "DVD/04 — DK on urgency drawn from past loss"

  - id: "MM-DK-306"
    title: "Taste-Like-Chicken Analogy: When you have a difficult proposition to explain, us"
    content: >
      Taste-Like-Chicken Analogy: When you have a difficult proposition to explain, use analogy to
      something people already understand. Get rich in real estate works because everybody lives in a
      house. Get rich in mail order worked when Sears catalog existed. If your proposition is harder to
      understand, find the 'chicken' — the familiar reference frame people can anchor to.
    source: "DVD/04 — DK on making difficult propositions simple"

  - id: "MM-DK-307"
    title: "Compiled vs Response Lists: A compiled list is people thrown onto a file with en"
    content: >
      Compiled vs Response Lists: A compiled list is people thrown onto a file with enhanced demographic
      data. A response list is people who raised their hand and showed interest. The person NOT on any
      response list is a 'stubborn virgin' — they were already mailed and refused. Seducing them is
      expensive and they don't know how to behave.
    source: "CD/14 track 5, CD/15 track 3 — Craig and DK on list types"

  - id: "MM-DK-308"
    title: "Multiple Shovels Model: Take all the same leads and show them a different colore"
    content: >
      Multiple Shovels Model: Take all the same leads and show them a different colored shovel that
      accomplishes the same three things but differently. Blue shovel = fix the patient who doesn't refer.
      Green shovel = another approach. You can use a list twice or three times with different offers,
      which allows you to spend MORE to get the lead.
    source: "CD/15 track 5 — DK on reusing leads with different offers"

  - id: "MM-DK-309"
    title: "Format Rotation on Same List: Postcards vs enveloped piece to the same list — th"
    content: >
      Format Rotation on Same List: Postcards vs enveloped piece to the same list — there's virtually no
      dupe between the responder to the postcard and the responder to the envelope. It allows you to use
      the best list twice instead of a lesser list.
    source: "CD/15 track 4 — DK on format-based list reuse"

  - id: "MM-DK-310"
    title: "Membership as Value Without Achievement (#13): Membership allows us to give peop"
    content: >
      Membership as Value Without Achievement (#13): Membership allows us to give people value from
      opportunity without requiring activity or result. The real value of any opportunity is delayed until
      they use the stuff and get a result — and most never will. So we find ways to give them perceived
      value that doesn't require action.
    source: "DVD/04 — DK on membership as perceived value delivery"

  - id: "MM-DK-311"
    title: "Status Elevation Drives Buying (#15): We're in a business card business. Brainer"
    content: >
      Status Elevation Drives Buying (#15): We're in a business card business. Brainerd Melanger's
      breakthrough was giving International Traders Association members a business card. The refund rate
      dropped dramatically because they finally had something that said what they were. A way to identify
      themselves. Status is a powerful buying motivator.
    source: "DVD/04 — DK on the Brainerd Melanger business card story"

  - id: "MM-DK-312"
    title: "Larger Than Life Figure: Three categories must be present — (1) Humble beginning"
    content: >
      Larger Than Life Figure: Three categories must be present — (1) Humble beginnings (most buyers have
      humble beginnings, and without it you're just an arrogant asshole with a Bentley), (2) Proof of
      importance (other people but you must share the opinion you're a big deal — big audiences, media,
      book signings), (3) Possessions/lifestyle evidence.
    source: "DVD/04 — DK on the three elements of a larger-than-life figure"

  - id: "MM-DK-313"
    title: "Pyramid Within a Pyramid: Take Michael Jans' PNC insurance guys — same pyramid i"
    content: >
      Pyramid Within a Pyramid: Take Michael Jans' PNC insurance guys — same pyramid in his customer base.
      Take Forbes 500 — build yourself a little pyramid with their net worths. There's 1% of the 500 who
      are enormously rich, 4% impressively rich, and all the way down. The pyramid replicates at every
      scale.
    source: "CD/12 track 4 — DK on the fractal nature of the social pyramid"

  - id: "MM-DK-314"
    title: "Bonus System as Self-Management: Put all office staff on a percentage of income"
    content: >
      Bonus System as Self-Management: Put all office staff on a percentage of income bonus. They got
      bonuses of $10,000-$20,000 each at Christmas. The people got rid of the people that didn't work —
      George never had to fire anybody because the staff self-policed. The non-performers were eliminating
      themselves because they were affecting everyone's bonus.
    source: "CD/11 track 1 — George on his employee management system"

  - id: "MM-DK-315"
    title: "Birthday Trigger Principle: About 40 and up, birthdays are increasingly near-dea"
    content: >
      Birthday Trigger Principle: About 40 and up, birthdays are increasingly near-death experiences.
      People behave differently in a little window around their birthday. Charlie's going to think more
      that week than he thinks any other week that year about his status in life, income, and
      unsatisfactory business.
    source: "CD/12 track 5 — DK on birthday-triggered marketing"

  - id: "MM-DK-316"
    title: "The Moving Parade of Interest — the fact that Joe doesn't respond this week has"
    content: >
      The Moving Parade of Interest — the fact that Joe doesn't respond this week has everything to do
      with Joe and nothing to do with you or your piece. Same guy, same message, different week produces
      different results based on life circumstances.
    source: "OMC DVD/07 — Dan Kennedy (citing David Ogilvy)"

  - id: "MM-DK-317"
    title: "Honeymoon Period → Gradual Creep → Wall model. Every market follows this arc: ph"
    content: >
      Honeymoon Period → Gradual Creep → Wall model. Every market follows this arc: phenomenal early
      numbers (fans/enthusiasts), then gradual cost increases that are almost imperceptible, then sudden
      skyrocket where costs jump dramatically. At each wall, you need new economics, not new creative.
    source: "OMC DVD/07 — Dan Kennedy"

  - id: "FIL-DK-318"
    title: "Marketing and sales processes MUST be seamlessly integrated. Most people incorre"
    content: >
      Marketing and sales processes MUST be seamlessly integrated. Most people incorrectly put most focus
      on creating the next great marketing piece, then drop the ball by not having a well-oiled sales
      process to close the deal.
    source: "MM-08-pdf02"

  - id: "MM-DK-318"
    title: "Compiled vs Response List mental model. Compiled lists are people thrown onto a"
    content: >
      Compiled vs Response List mental model. Compiled lists are people thrown onto a file with enhanced
      data. Response lists are people who raised their hand and showed interest. Response lists
      consistently outperform compiled lists — the difference can be 0.05% vs 2% response.
    source: "OMC DVD/07 — Craig Simpson (Frank Kern example)"

  - id: "MM-DK-319"
    title: "The Dissatisfaction Gap model from direct selling — 70%+ of the presentation est"
    content: >
      The Dissatisfaction Gap model from direct selling — 70%+ of the presentation establishes how bad
      things are, invalidates all other bridges, then presents your solution as the only viable path.
      Sequence: establish gap → invalidate alternatives → present bridge → force self-definition.
    source: "OMC CD/18 tracks 3-4 — Dan Kennedy"

  - id: "MM-DK-320"
    title: "Lifetime Value Liberation model — if your LTV is $500, you can spend $200 to acq"
    content: >
      Lifetime Value Liberation model — if your LTV is $500, you can spend $200 to acquire. If your LTV is
      $1,000, you can spend $350-400 to acquire. Higher LTV means larger addressable market because you
      can afford to mail to less productive segments of lists.
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"

  - id: "MM-DK-321"
    title: "The Three Toolbox Drawers model: Product/Message, Process, and Prospects. Every"
    content: >
      The Three Toolbox Drawers model: Product/Message, Process, and Prospects. Every marketing operation
      should be thought of as three separate drawers you open and optimize independently.
    source: "OMC DVD/06 — Dan Kennedy"

  - id: "MM-DK-322"
    title: "The Pyramid That Never Changes — 1% rich, 4% financially secure, 54% still worki"
    content: >
      The Pyramid That Never Changes — 1% rich, 4% financially secure, 54% still working at 65, 5% broke,
      36% dead. This has been unchanged since 1954. You're not going to change these numbers — work within
      them.
    source: "OMC DVD/06 — Dan Kennedy"

  - id: "MM-DK-323"
    title: "Opportunity Structure Spectrum: franchise → almost-franchise → dealership → cons"
    content: >
      Opportunity Structure Spectrum: franchise → almost-franchise → dealership → consultant →
      coaching-plus → services → one-time events. Each has different payment models: fees, fees+profits,
      fees+upside, equity. Choose structure based on your control needs and scalability goals.
    source: "OMC CD/18 track 1 — Dan Kennedy"

  - id: "MM-DK-324"
    title: "Five Reasons Exclusivity Helps the Sale: (1) Fear of competitor having it, (2) P"
    content: >
      Five Reasons Exclusivity Helps the Sale: (1) Fear of competitor having it, (2) Pride of
      ownership/status, (3) Price elasticity increases, (4) Conveyed equity, (5) Authentic urgency +
      take-away selling.
    source: "OMC CD/18 track 2 — Dan Kennedy"

  - id: "MM-DK-325"
    title: "Jeff Walker's Mental Triggers Framework — authority, reciprocity, community, soc"
    content: >
      Jeff Walker's Mental Triggers Framework — authority, reciprocity, community, social proof,
      anticipation, scarcity, likeability, events. Layer these triggers across a prelaunch sequence to
      create overwhelming buying momentum before the cart opens.
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"

  - id: "MM-DK-326"
    title: "Replacement Types taxonomy: (1) In-niche replacement, (2) True replacement/green"
    content: >
      Replacement Types taxonomy: (1) In-niche replacement, (2) True replacement/greener pastures, (3)
      Reinvention, (4) Rearrangement, (5) Addition/expansion, (6) Multiplier. Each type of opportunity
      replacement appeals to a different motivation.
    source: "OMC DVD/06 — Dan Kennedy"

  - id: "MM-DK-327"
    title: "The Tout Business model — using multiple identities to mail the same productive"
    content: >
      The Tout Business model — using multiple identities to mail the same productive list segment
      repeatedly. Like football betting touts who operate under different names, you create parallel
      identities (cowboy hat guy, housewife with five kids) selling fundamentally the same thing at
      different price points and formats.
    source: "OMC CD/19 tracks 6-7, DVD/07 — Dan Kennedy"

  - id: "MM-DK-328"
    title: "The Blue Shovel model — when unconverted leads rejected your red shovel, don't d"
    content: >
      The Blue Shovel model — when unconverted leads rejected your red shovel, don't discard them. Show
      them a blue shovel that accomplishes the same three things but does it differently. Same leads,
      different vehicle. If you create a green shovel too, you can use the leads three times.
    source: "OMC DVD/07 — Dan Kennedy (Jay Geyer dental example)"

  - id: "MM-DK-329"
    title: "Scaling Back to Restore Profitability — when you hit the wall, you can pull back"
    content: >
      Scaling Back to Restore Profitability — when you hit the wall, you can pull back to the tiny
      high-probability segment of the list, make slight adjustments, and live there profitably even though
      you can no longer live at scale. On TV: retard media buys to only the highest-performing
      geographies.
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch last 2 years)"

  - id: "MM-DK-330"
    title: "Process linked to who you're selling to — chair-side value plus ego equals diffi"
    content: >
      Process linked to who you're selling to — chair-side value plus ego equals difficulty of getting
      them in the room. The higher the prospect's perceived value of their time and ego, the harder the
      lead generation and the more the process must accommodate that.
    source: "OMC CD/19 track 2 — Dan Kennedy"

  - id: "MM-DK-331"
    title: "Rodale's 18-Month Rule — the most likely buyer of a product has bought a similar"
    content: >
      Rodale's 18-Month Rule — the most likely buyer of a product has bought a similar product within the
      last 18 months. Recency of related purchase is the strongest predictor of future purchase.
    source: "OMC DVD/06 — Dan Kennedy (citing Rodale publishing)"

  - id: "MM-DK-332"
    title: "The Sideways Sales Letter: Instead of a 50-page sales letter, turn it sideways a"
    content: >
      The Sideways Sales Letter: Instead of a 50-page sales letter, turn it sideways and tell the same
      story over 10-12 days through 3-4 pieces of content. No mention of the sale until the third piece.
    source: "DVD08-JeffWalker"

  - id: "MM-DK-333"
    title: "The Tennis Court Video principle: Lead with lifestyle and reason why, not with h"
    content: >
      The Tennis Court Video principle: Lead with lifestyle and reason why, not with hype. For a warm
      list, start with authenticity and reason why. For a cold list (JV partners), lead with hype to hook
      instantly.
    source: "DVD08-JeffWalker"

  - id: "MM-DK-334"
    title: "The Fish Video concept: People don't want to learn how to fish, clean the fish,"
    content: >
      The Fish Video concept: People don't want to learn how to fish, clean the fish, or cook the fish.
      Your best prospects are people who bought your product but don't want to do it themselves — they
      want you to do it for them.
    source: "DVD08-JeffWalker"

  - id: "MM-DK-335"
    title: "Marketing Gods identity transfer: If you can speak internet marketing, you are i"
    content: >
      Marketing Gods identity transfer: If you can speak internet marketing, you are in a separate class
      from the rest of the people walking the face of the earth. Instill in people that they have secret
      knowledge.
    source: "DVD08-JeffWalker"

  - id: "MM-DK-336"
    title: "In the land of the blind, the one-eyed man is king. People buying a training mus"
    content: >
      In the land of the blind, the one-eyed man is king. People buying a training must believe they
      already have enough knowledge to actually do the thing. Prelaunch content instills this belief.
    source: "DVD08-JeffWalker"

  - id: "MM-DK-337"
    title: "Thing-Person-Place Trinity: You definitely want a thing (system, plan, certifica"
    content: >
      Thing-Person-Place Trinity: You definitely want a thing (system, plan, certification, badge) from
      which they draw confidence. You need a person they are attached to. And you need a sense of place
      they plug into.
    source: "DVD09"

  - id: "MM-DK-338"
    title: "Opportunity is Reinvention model: Selling reinvention against the enemy. The rei"
    content: >
      Opportunity is Reinvention model: Selling reinvention against the enemy. The reinvention is the
      answer to the villain making them miserable. Combine the reinvention frame with the enemy frame for
      maximum power.
    source: "DVD09"

  - id: "MM-DK-339"
    title: "The Dissatisfaction Gap: Direct selling and MLM industries are masters at establ"
    content: >
      The Dissatisfaction Gap: Direct selling and MLM industries are masters at establishing a big gap
      between where somebody is and where they had intended, hoped, and dreamed about being. More than 70%
      of a professional opportunity meeting is building this gap.
    source: "DVD09"

  - id: "MM-DK-340"
    title: "Bridge Invalidation: Invalidate all bridges across the dissatisfaction gap excep"
    content: >
      Bridge Invalidation: Invalidate all bridges across the dissatisfaction gap except yours. Every other
      way the prospect might achieve the same outcome must be destroyed — franchise, starting alone,
      better job, education, saving, real estate.
    source: "DVD09"

  - id: "MM-DK-341"
    title: "Pick a Door Identity model: Force people to visibly pick door number one or door"
    content: >
      Pick a Door Identity model: Force people to visibly pick door number one or door number two, and by
      that decision and action define themselves as winner or putz. Used at every MLM opportunity meeting
      and should be in every room sale.
    source: "DVD09"

  - id: "MM-DK-342"
    title: "Present Bank / Future Bank: Exclusivity creates equity in the thing you sell. Pa"
    content: >
      Present Bank / Future Bank: Exclusivity creates equity in the thing you sell. Part of the argument
      for buying is not just the income you make from it, but the equity created in it. Like a UPS store
      vs. independent packing shop — 150% more valuable.
    source: "DVD09"

  - id: "MM-DK-343"
    title: "The Alter Ego / Second Identity model: Unconverted leads who rejected your perso"
    content: >
      The Alter Ego / Second Identity model: Unconverted leads who rejected your personality still want
      the promises. A different identity with different tone, different backstory, different front person
      can convert them.
    source: "DVD09"

  - id: "MM-DK-344"
    title: "Reverse Engineering the Ideal Client: If you have customers, reverse engineer wh"
    content: >
      Reverse Engineering the Ideal Client: If you have customers, reverse engineer who behaved and spent
      properly. If starting from scratch, find successful competitors and read their marketing material
      for clues about who they're talking to.
    source: "DVD10"

  - id: "MM-DK-345"
    title: "The Appointment No-Sale System: People don't buy for many reasons — they swore n"
    content: >
      The Appointment No-Sale System: People don't buy for many reasons — they swore nothing on the credit
      card, they need to sleep on it, they need to pray about it. Have a system for every non-buyer
      regardless of how the presentation was made.
    source: "DVD09"

  - id: "MM-DK-346"
    title: "Process is linked to who you are selling to maybe more than to what you are sell"
    content: >
      Process is linked to who you are selling to maybe more than to what you are selling. Certain
      demographic groups are more or less prone to respond to certain sales processes.
    source: "DVD09"

  - id: "MM-DK-347"
    title: "The Jack O'Brien Principle (Justice League of Personalities): If you have a cred"
    content: >
      The Jack O'Brien Principle (Justice League of Personalities): If you have a credibility gap (gender,
      age, style), create a team of personality types and appearances to reassure different segments. Don
      Dwyer at SMI, James in Tolles and Letter.
    source: "DVD10"

  - id: "MM-DK-349"
    title: "The 8 Versions Model - Create multiple versions of the same selling script custo"
    content: >
      The 8 Versions Model - Create multiple versions of the same selling script customized for different
      audience segments. There is an unwashed masses general version that serves as the copy platform,
      from which specialized versions get built.

  - id: "MM-DK-354"
    title: "Primacy and Recency Model - Given a chain of random numbers or words, most peopl"
    content: >
      Primacy and Recency Model - Given a chain of random numbers or words, most people immediately recall
      the first several and the last several. 15 minutes later, only the first 1-2 and last 1-2. The
      middle gets lost. Good presentation architecture plants a big idea at the start and reconnects to it
      at the end.

  - id: "MM-DK-358"
    title: "Synambulistic Blob Model — Prospect Starting Position"
    content: >
      People in the average market are a synambulistic blob welded to the couch so firmly it wouldn't
      leave to save its ass if the house was burning down. Your job as an advertiser is to get them to
      take out their wallet and actually take some action.
    source: "Secrets/transcription_mp3_CD3.txt"
    domain: "prospect-psychology"

  - id: "MM-DK-359"
    title: "Origin Story Necessity — People Uncomfortable Without It"
    content: >
      People are vaguely, unconsciously uncomfortable at bare minimum when a good origin / reason-why
      story is missing. Even if they can't enunciate it, even if it doesn't directly and consciously
      bother them, it unconsciously bothers them. Batman without origin story = just a scary guy in a
      goofy suit beating people up.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "storytelling"

  - id: "MM-DK-360"
    title: "Single Emotion Channel — Mind Holds One Trigger at a Time"
    content: >
      The mind can only hold one emotion trigger response at a time. If it is being curious and
      interested, it can't be skeptical at the same time. It doesn't multitask. Very cool thing to know.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "psychology"

  - id: "MM-DK-361"
    title: "Story Equity Model — Three Empires Built on Single Stories"
    content: >
      Napoleon Hill + Andrew Carnegie story (Think and Grow Rich endures since 1937). Maxwell Maltz +
      plastic surgery patient who couldn't see improvement (Psycho-Cybernetics matched 50 Shades in
      copies). Kiyosaki + Rich Dad/Poor Dad. Take the story away and what do you have? Not much.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "storytelling"

  - id: "MM-DK-363"
    content: >
      Copy Code Discovery Model — every successful category of direct response has an underlying 'code' —
      a set of elements that appear in virtually every winning control. The code is NOT obvious. You must
      reverse-engineer it by collecting many winners and isolating commonalities. Once cracked, the code
      becomes a checklist for creating new copy.

  - id: "MM-DK-367"
    title: "4 Vital Principles of Mind-Control Copy"
    content: >
      1) Do NOT empower the prospect to think — make them POWERLESS to think in any way except what serves
      your sale. 2) Do NOT seek rational thought — seek EMOTIONAL RESPONSE at exclusion of rational
      thought. 3) Do NOT educate more than necessary — manipulate and motivate. 4) Every single piece of
      copy must have a SALES PURPOSE tied to an E-Factor.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "MM-DK-368"
    title: "3 Chief Evils of Info-Marketing"
    content: >
      Three chief problems of our business: 1) Cost of new customer acquisition (filling seats, getting
      traffic). 2) Ever-rising clutter and competition of FREE content. 3) Absence of legitimate ambition
      in the overwhelming majority of every population — hardest to understand but most important.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "info-marketing"

  - id: "MM-DK-369"
    title: "3 Categories of Business Owners"
    content: >
      Three categories: 1) Be-Your-Own-Boss crowd — ambition limited to not having a boss (auto mechanic
      becomes shop owner, discovers 1000 bosses instead of 1). 2) Lifestyle crowd — want comfortable
      living, resist growth. 3) Empire-builders — the minority we can actually monetize. We mostly can
      only make money on people who DO ambition.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "business"

  - id: "MM-DK-370"
    title: "E-Factor Model (Emotional Drivers)"
    content: >
      The most basic E-Factors that drive all copy: Fear, Guilt, Greed, Pride, Love/Lust. Then there are
      E-Factors specific to affluent individuals (see Marketing to the Affluent). Whatever your target
      market, there will be E-Factors specific to that market but the big general ones always apply.
      Everything in copy is tied to an E-Factor.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "MM-DK-371"
    title: "Income vs Wealth Monetization Model"
    content: >
      The difference between high income individuals and wealthy individuals: high income only monetize
      their customers. Wealthy people monetize ALL unconverted leads, everybody who touches them, one way
      or another. To do that, you must appeal to the actual ambition of a large percentage — which is
      escape from unwanted, not aspiration.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "business"

  - id: "MM-DK-372"
    title: "14-System Copy Architecture Model"
    content: >
      A complete direct-response sales letter has 14 distinct systems, each serving a specific function in
      the persuasion sequence: System 1: Headlines (grab attention, make promise) System 2: SubHeads
      (maintain momentum, organize scanning) System 3: Openings (establish rapport, create urgency) System
      4: Bullets (compress benefits, create fascination) System 5: Offers (structure the deal) System 6:
      Objections (pre-empt and overcome resistance) System 7: Guarantees (reverse risk) System 8: Segues
      (transition between sections seamlessly) System 9: Postscripts (P.S. — most-read after headline)
      System 10: Testimonials (social proof) System 11: Call To Action (command response) System 12:
      Templates (proven page layouts) System 13: Order Forms (close the transaction) System 14: Checklist
      (quality control before mailing) Mental model: analyze any sales letter by checking each of the 14
      systems.
    source: "System1-14 PDFs (complete taxonomy)"
    domain: "copywriting"

  - id: "MM-DK-373"
    title: "Headline Category Taxonomy"
    content: >
      Headlines are not one thing — they fall into distinct categories, each triggering different
      psychological responses. DK's swipe file reveals recurring headline archetypes: - Question headlines
      ("Are You...?", "Do You...?", "What Would...?") - Command headlines ("Stop!", "Warning!", "Read This
      Before...") - How-To headlines ("How To [Benefit] Without [Pain]") - News headlines
      ("Announcing...", "New...", "At Last...") - Story headlines ("They Laughed When...", "I Was Broke
      Until...") - Testimonial headlines ("I Made $X In Y Days") - Secret/Mystery headlines ("The Secret
      of...", "What [Authority] Don't Tell You") - Guarantee headlines ("Guaranteed or...") - Reason-Why
      headlines ("7 Reasons Why...") Each category matches a different buyer psychology — select based on
      where prospect is on awareness spectrum.
    source: "PDFs/transcription_pdf_System1Headlines.txt"
    domain: "copywriting"

  - id: "MM-DK-374"
    title: "Trust as Delegation Model"
    content: >
      The affluent do not have time to verify everything. They DELEGATE trust to people and institutions
      they have vetted. Once trust is delegated, the affluent buyer stops questioning and starts following
      recommendations. The mental model: trust is not earned incrementally in affluent markets — it is
      DELEGATED in a moment of decision after a gestation period. Before delegation, the prospect is
      skeptical. After delegation, the prospect is compliant. The marketer's job is to engineer the
      conditions for trust delegation, not to earn trust slowly over years. Think of it like a switch, not
      a dimmer.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 40-55)"
    domain: "affluent-marketing"

  - id: "MM-DK-375"
    title: "Competence Premium Model"
    content: >
      The affluent pay a premium for PERCEIVED competence, not actual competence. Competence is signaled
      through: (1) Specificity of language, (2) Published authority (books, articles, media), (3)
      Association with other competent people, (4) Environmental cues (office, materials, presentation),
      (5) Process rigor (structured intake, assessment, methodology). The Competence Premium means the
      affluent will pay 3-10x more for the SAME service if competence signals are properly deployed. This
      is not deception — it is accurate communication of value through the channels the affluent use to
      evaluate providers.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 55-70)"
    domain: "affluent-marketing"

  - id: "MM-DK-376"
    title: "Intangibles Over Product Model"
    content: >
      In affluent markets, the intangibles surrounding the product are worth MORE than the product itself.
      The experience of buying, the status of owning, the story of acquiring, the recognition from peers —
      these intangibles justify premiums that the product alone never could. DK uses the wine crate Flex
      Jet direct mail piece as example: a wooden wine crate containing a sales letter and brochure for
      fractional jet ownership. The CRATE (intangible — experience, novelty, status) was worth more than
      the paper inside. Mental model: always ask what intangibles can be wrapped around the core offer.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 80-100)"
    domain: "affluent-marketing"

  - id: "MM-DK-377"
    title: "Ascension Principle — Because There Is a Front Row"
    content: >
      DK observes that in any audience, someone always sits in the front row. In any market, someone
      always buys the most expensive option. The Ascension Principle: if you do not offer a premium tier,
      you leave money on the table AND you under-serve your best clients. The mental model is simple —
      always create levels. Bronze, Silver, Gold, Platinum. Some percentage will ALWAYS choose the top
      tier. DK connects this to newsletters: the newsletter itself is the base, but Diamond membership,
      inner circle, masterminds, and personal access are ascension tiers that the affluent expect and seek
      out.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 55-65)"
    domain: "affluent-marketing"

  - id: "MM-DK-378"
    title: "8 Critical Time Investments Info-Marketers Miss"
    content: >
      DK identifies 8 areas where info-marketers systematically under-invest their time, destroying
      long-term value: 1. Quality control of fulfillment (packaging, shipping, materials) 2. New customer
      onboarding experience (first 48 hours critical) 3. Back-end product development (most revenue comes
      from continuity) 4. Referral system development (most profitable acquisition channel) 5. Customer
      reactivation (cheaper than new acquisition) 6. Staff training on customer interaction 7. Personal
      brand development and positioning 8. Physical newsletter production (highest retention tool) Most
      entrepreneurs spend 80% of time on acquisition and 20% on everything else. DK argues the ratio
      should be closer to 50/50, because retention and referrals compound while acquisition is linear.
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "time-management"

  - id: "MM-DK-379"
    title: "OPC Leverage — Other People's Content, Customers, Channels"
    content: >
      Rather than creating everything from scratch, leverage OPC (Other People's Content, Customers, and
      Channels). This is DK's time-multiplier model: - Other People's CONTENT: License, co-brand, or
      curate existing excellent content rather than creating from zero. Joint ventures with authors,
      speakers, experts. - Other People's CUSTOMERS: Access established audiences through endorsement
      deals, host-beneficiary arrangements, and affiliate partnerships. - Other People's CHANNELS: Use
      established distribution (newsletters, events, associations) rather than building your own from
      scratch. The OPC model means you invest time in RELATIONSHIPS (which compound) rather than in
      PRODUCTION (which is linear). One good JV partner can be worth 10,000 cold leads.
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "business-strategy"

  - id: "MM-DK-380"
    title: "Athlete Recovery Model for Entrepreneurs"
    content: >
      Professional athletes build NECESSARY RECOVERY into their schedules — day to day, week to week,
      month to month, season to season, project to project. Most entrepreneurs do NOT follow this model.
      DK and sports performance coach Rejek Grapple (who works with professional tennis players, golfers,
      marathon runners, Olympic athletes) agree: entrepreneurs need structured recovery periods just like
      athletes. The 24/7 connected culture (cell phone, email, BlackBerry) means people walk to lunch
      while on phones, check messages while eating — ZERO recovery in the daily schedule. Retirement as
      classically defined fails because it removes PURPOSE. The solution is NOT retirement but
      "mini-retirements" — distributed recovery periods and adventures throughout life. Work becomes
      synonymous with PURPOSE, and the goal is liberation from time-consuming financially-driven work, NOT
      from work itself.
    source: "transcription_mp3_Tim_Ferriss_Bonus.txt"
    domain: "time-management"

  - id: "MM-DK-381"
    title: "Franchise Thinking for Info Products"
    content: >
      Info-marketers should think in terms of FRANCHISES, like the entertainment industry. Disney under
      Bob Iger thinks almost entirely in terms of franchises intended for long-term life (hence buying
      Star Wars from George Lucas). A franchise = a product with a sequential series of subsequent
      purchases behind it. Example: DK built Renegade Millionaire as a franchise — original System →
      Retreat (productized) → Marketing → Time Management. Ideally each would have its own club, yearly
      event, website, community, apparel, awards. Each product should be the STAR of a similar chain; each
      1st product in the chain a doorway to a separate world. Most info-marketers "kill and eat their milk
      cows long before they are out of milk" — too little build-out of each product they create.
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "MM-DK-382"
    title: "Product Investment Ratio Is Upside Down"
    content: >
      The book publishing industry exemplifies the wrong ratio: publishers invest 95%+ in the product and
      less than 5% in marketing. Jay-Z received a 7-figure advance but a $50,000 marketing budget — which
      barely covers travel to one event. Jay-Z had to spend his own advance assembling a 50-person
      marketing team. DK says the equation should be inverted: $50,000 advance to the author, $1-million
      marketing the product. "Any idiot can make soap — it takes a genius to sell it" (paraphrasing
      Gamble). Anybody can get a good info-product made (low skill) — it takes a genius AND MONEY to sell
      it. This applies to all info-marketers: they over-invest in creation and under-invest in marketing
      of what they already have.
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "MM-DK-383"
    title: "USP Through Benefit Reframing — Not Product Differentiation"
    content: >
      From the DK + Cesari discussion: the most powerful USP strategy is NOT making a better product, but
      REFRAMING an ordinary product around a compelling benefit. Three case studies prove this: 1. Juice
      Man: Identical juicers existed. Competitors marketed as kitchen appliance (motor size, blade type).
      DK/Cesari reframed as HEALTH DEVICE — immune strengthening diet, weight loss juice diet, anti-aging
      juice diet. Zero to $75M in 3.5 years. 2. Sonic Care: $150 toothbrush when competitors cost $1-2.
      Reframed from technology to GUM DISEASE REVERSAL — the benefit, not the mechanism. 3. George Foreman
      Grill: Was originally a taco maker with zero sales. Reframed with close-up of grease running off =
      "Knock Out the Fat" health benefit + speed/convenience. 4. GoPro: Camera itself is commodity.
      Reframe = mounts + user-generated content + social sharing. "Nothing special about this camera
      except the mounts." The lesson: find the BENEFIT REFRAME, not the product improvement.
    source: "transcription_pdf_The_Principal_of_Selling.txt"
    domain: "sales"

  - id: "MM-DK-384"
    title: "True Mastermind vs Fake Mastermind — The Two Structures"
    content: >
      DK distinguishes two structures: (1) TRUE mastermind — small group (max 20), boardroom or U-shape
      style, every member takes a turn during the meeting. (2) FAKE mastermind — larger groups, more
      workshop-style with hot seats for some members. "The latter can be more lucrative and can certainly
      benefit its participants, but my view is, it is not an application of the mastermind concept as
      originally described by Napoleon Hill." DK ran his Platinum Group for 11 consecutive years (true
      mastermind), now runs Titanium for GKIC (also true, max 19-20 members). Both have value, but calling
      the big format a "mastermind" is technically misleading.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "MM-DK-385"
    title: "Spontaneous Combustion — The 3rd Mind Effect"
    content: >
      The core value proposition of a mastermind: "By the melding of the minds in the group, by the focus
      of all their intelligence and varied experience on a single Member's business and subject for
      discussion, insights occur spontaneously that might never occur otherwise. One person's question or
      comment sparks another's, that sparks another's, and ultimately brand new and unforeseen solutions,
      strategies and opportunities are ignited." DK attributes revolutionary industry innovations to this:
      forced continuity in info-marketing was "brought to life in one of my mastermind meetings." The
      Harrison brothers' price-breakthrough for National Publicity Summit came from DK's mastermind. Dr.
      Chris Tomshack's entry into franchising (360+ clinics) was sparked in the group. "This is the
      'mastermind effect' that Napoleon Hill originally learned about from Carnegie, Edison, Ford,
      Firestone."
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "MM-DK-386"
    title: "19X Multiplier — Purchasing Speed Through Combined Experience"
    content: >
      "Twenty smart and progressive people within a field sharing and exchanging information drawn from
      their marketing tests, successes and flops, solving of problems, finding vendors, etc. is a 19X
      against your own experience. This is a way to purchase speed." DK also frames the efficiency angle:
      "Seven days of focus spaced during the year, out and away from your regular day to day activities,
      away from interruptions and disruption, work 'on not in' the business in an idea-charged,
      experience-rich environment can produce more clarity and actionable strategy than what might come
      from sixty days of normal activity." If 20 members each run 3 experiments per year, each member
      benefits from 60 experiments. At 3 per year alone, one member would need 20 years to match.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "MM-DK-387"
    title: "Easy Fill vs Difficult Fill — The 1%-5% Customer Base Rule"
    content: >
      DK provides a mental model for predicting how hard it will be to fill a mastermind group: "If the
      number of positions to be filled in a mastermind group = 1% of your active customer base, it should
      be easy to fill. If = 5%, it's difficult but doable. If it will take more than 5% of your active
      customer base to fill and maintain the group, you're in trouble, especially 2nd year, 3rd year,
      etc." This applies to both initial fill and renewal. A group filled with difficulty "will be in
      constant jeopardy, and the leader will be weakened; if a group is filled easily, and that is visible
      and known, the group will be more stable and the leader strengthened." The key variable: total
      active customers + flow of new customers month by month.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "MM-DK-388"
    title: "Marketing Triangle: Message × Market × Media"
    content: >
      Three-legged stool — any leg too short, hard to balance. Message = what do we say. Market = who do
      we say it to (and by definition who do we NOT say it to). Media = how do we deliver the message to
      the intended person in a way that will be effective. "Climbing over my fence and banging on my back
      door to tell me about the latest mattress is not going to be effective." If you add timing as a
      circle around the triangle, you get maximum power. All three must fit together — great message to
      wrong market = waste; right market with wrong media = waste.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "MM-DK-389"
    title: "Three Ways to Sell: Push vs Pursuit vs Attraction"
    content: >
      DK categorizes all selling into three approaches. PUSH: retail aisles constructed so items fall into
      your cart; impulse items at cash register. PURSUIT: clerk says "can I help you?" then follows you
      through the store; cold calling; networking where you pin someone between wall and potted palm.
      ATTRACTION (Magnetic): creating perception that the customer discovers you and moves to you by their
      own decision. Push and pursuit create reluctance — "for every person who comes to a financial
      advisor workshop, there's 10 who had interest but stopped themselves because they anticipate a
      push/pursuit experience."
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "MM-DK-390"
    title: "Knowing Pest to Welcome Guest — The House Fire Story"
    content: >
      DK's signature story: alone at home, ignoring persistent doorbell. Person climbs over a mason wall
      with glass shards, gets past pool, bangs on patio doors. DK ignores for 5-6 minutes. The reason:
      front of house is on fire. "In 30 seconds he went from being the most annoying pest ever to one of
      the most welcome guests ever. Why? Because he had a message that was personally relevant, therefore
      welcomed, and on top of that it was well timed." The whole prospect selection in Magnetic Marketing
      includes the possibility of getting timing right. Message to market match = welcome vs unwelcome
      message.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "MM-DK-391"
    title: "17 Criteria for Target Market Selection"
    content: >
      DK's comprehensive targeting framework: (1) Size of market — what do you need to support yourself?
      (2) Reachability — can we reach them? (3) Affordable reachability — at a price we can afford? (4-6)
      Affinity, Authority, Celebrity — how well you match with market mindset. (7) Points of leverage —
      great testimonials that match. (8) Own customer facts. (9) Best customer facts. (10) Desired
      customer facts. (11) Geography. (12) Generic vs Niche vs Subculture. (13) Economics — ability to
      pay. (14) Willingness to pay our prices. (15) How they buy — in a way we're able and willing to
      sell. (16-17) Psychographic and behavioral profiles beyond demographics.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "MM-DK-392"
    title: "Three Levels of Market Data: Demographic → Psychographic → Psychic-Graphic"
    content: >
      Level 1 DEMOGRAPHIC: age, gender, income, net worth, married, kids, pets, car age — basic stats. DMV
      example: weight loss industry got lists of "short fat dumpy women" — woefully unproductive because
      demographics don't tell if she CARES or cares enough to DO what you sell. Level 2 PSYCHOGRAPHIC:
      motivations, interests, tribal language, belief systems. Same real estate investing product needs
      completely different messages for engineers (fear of layoff), dentists (5 years from retirement),
      and single moms (supplemental income). Level 3 PSYCHIC- GRAPHIC (DK's coined term): getting inside
      their head — what keeps them up at night, what frustrates them, what conversations they have at the
      kitchen table.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "MM-DK-393"
    title: "The Carpet Cleaner Parable — Message-Market Mismatch Kills Results"
    content: >
      DK's teaching story: customer calls saying Magnetic Marketing "doesn't work." Upon investigation,
      the carpet cleaner mailed to all homeowners in closest zip code for convenience. DK has him drive
      the neighborhoods at 5:30-6:30 PM. Result: cheap stucco houses, cars on blocks, mama and papa in
      matching undershirts with holes, baby crawling in car parts, three-legged one-eyed mangy dog. "Do
      these people look like the kind of folks who pay good money to have somebody come and clean their
      carpets?" They rent a machine from Walmart once a year. No message, no matter how brilliant,
      conquers that hill. "The dirty little secret among copywriters: list selection is at least as
      important as the message itself."
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "MM-DK-394"
    title: "Cowboys & Indians Magazine Model — Media Is About WHO Reads, Not WHAT It's About"
    content: >
      DK client: wealth manager for people selling companies for $10-40M. Lead generation ad in Cowboys &
      Indians magazine — a western lifestyle magazine full of ranch real estate, high-end boots, and
      jewelry. Reader profile: male, 55-70, rich from recent exit, got third wife one- third his age. "In
      Forbes there's 50 of us. In Cowboys & Indians we show up alone." The editorial content about cowboys
      is irrelevant — what matters is WHO the reader is. Same principle: Limbaugh vs Rachel Maddow
      audiences — same product but running the same ad on both "is dumber than a box of rocks."
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "MM-DK-395"
    title: "USP = Why Should I Do Business with You vs Every Other Option Including Doing Nothing"
    content: >
      DK's copyrighted USP question: "Why should I do business with you versus any and every other option
      available to me in your category, including doing nothing?" The "including doing nothing" is
      critical — inaction is always the biggest competitor. Best USPs are driven by the target market
      selected to receive them, not by the business's self-perception. Domino's USP (fresh hot pizza, 30
      minutes or less, guaranteed) said nothing about taste because their market (stoned college kids)
      wanted speed, not quality. "Pathways to USP: positioning and differentiation, niche specialization,
      guarantee, dramatic demonstration, proprietary process."
    source: "transcription_mp4_3.txt"
    domain: "copywriting"

  - id: "MM-DK-396"
    title: "Lead Generation vs Direct Sale — Capturing the Interested Majority"
    content: >
      DK defines lead generation as "a broader and more comprehensive approach than get-a-customer." At
      any time, a significant percentage who see your marketing have some interest but aren't ready to
      buy. "Lead generation captures that secondary quantity who can be developed into customers through a
      series of steps over a period of time." Leads are people who "raised their hands, stepped forward,
      given permission — moved you from knowing pest to welcome guest." The bar analogy: "Can I buy you a
      drink?" — "No, I'm with somebody" = game over. "Yes" = raised hand, gave permission to have a
      conversation. Without lead gen, "you leave huge sums on the table and leave your business dependent
      upon random activity rather than control."
    source: "transcription_mp4_4.txt"
    domain: "marketing"

  - id: "MM-DK-397"
    title: "The Herd Value Equation"
    content: >
      Real value factor is not the fact that you have a list, not the size, not even the makeup — it's the
      relationship with the list, their perception, their sense, their valuing of it. Either improving or
      losing value every single day.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "MM-DK-398"
    title: "The Approachability Index"
    content: >
      Celebrities are measured by how many people feel comfortable approaching them. High approachability
      = better for advertising, QVC, home shopping. Ed McMahon had higher approachability than Johnny
      Carson.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "marketing"

  - id: "MM-DK-399"
    title: "Subconscious Imprint of Package Opening"
    content: >
      Every time we evoke subconscious emotional responses that go back to childhood — birthday,
      Christmas, opening packages — we really get somewhere. Print mail triggers this. Email cannot
      replicate it.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "direct-mail"

  - id: "MM-DK-400"
    title: "Church Frequency Model"
    content: >
      Every religion tries to get everybody to a meeting once a week. Seven days is about as far as they
      can let them go without losing them altogether. Applied to business: frequency of contact determines
      longevity of herd.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "MM-DK-401"
    title: "Evangelical Recruitment Lock-In"
    content: >
      If I can get you to quickly get two or three other people involved, it's much harder for you to
      exit. You look bad with the people you recruited. Basis of network marketing, church, weight
      watchers retention.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "MM-DK-402"
    title: "The Omnipresence Principle"
    content: >
      If they stand in their environment and turn around in a slow circle, they shouldn't make it all the
      way around without some sighting of something relevant to you. Reinforces relationship all the time
      and causes longevity.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "marketing"

  - id: "FIL-DK-408"
    title: "People's income is not necessarily logically connected to their ability to buy."
    content: >
      People's income is not necessarily logically connected to their ability to buy. They can go get
      money or will go get money to make the purchase.
    source: "DVD10"

  - id: "FIL-DK-422"
    title: "Good Enough Is Good Enough — Perfectionism Kills Output"
    content: >
      Perfect ads seldom work anyway. Often what you're doing is messing with what's going to be a 1%
      difference. It's incremental. When it's good enough, that's when you ship. Two edits and done.
    source: "Secrets/transcription_mp3_CD3.txt"
    domain: "copywriting"

  - id: "MM-DK-425"
    title: "Rapport Bridge / Affinity Bridge Model"
    content: >
      Rapport bridges and affinity bridges when we create them change the dynamic of how people respond to
      us. Their natural, habitual, and logical defenses start to go down. Multiple bridges are even better
      than one.
    source: "transcription_mp4_video_2.txt"
    context: "Bernie Madoff example — rich Jewish community affinity bridges"

  - id: "MM-DK-426"
    title: "F.O.R.M. Conversation Template"
    content: >
      Family, Occupation, Recreation, Money — this is what people tend to talk about and it tends to be
      the order in which they talk about it. Build affinity bridges in this sequence before getting to
      business.
    source: "transcription_mp4_video_2.txt"
    context: "MLM training standard adapted for all business"

  - id: "MM-DK-427"
    title: "Dog Whistle Disclosure Effect"
    content: >
      Disclosures work as dog whistles — they're not really paid attention to by people they don't matter
      to, but to people they matter to, they build a bridge. The targeted audience hears it loud and clear
      while others pass over it.
    source: "transcription_mp4_video_3.txt"
    context: "DK's bankruptcy disclosure in Peter Low speech"

  - id: "MM-DK-428"
    title: "Transparency-Mystery Balance"
    content: >
      If you're 100% transparent, people lose interest pretty quick. If you are 100% mysterious, people
      get frustrated and don't trust you. The trick is to have both — use disclosure but hold some things
      back so there is ongoing curiosity.
    source: "transcription_mp4_video_3.txt"
    context: "Mata Hari story — created entire exotic persona from nothing"

  - id: "MM-DK-429"
    title: "Sound-Off Test"
    content: >
      What does it say with the sound turned off? This is one of the ways we always look at video, at
      infomercials. No sound. What impression do you get? Because most people don't really hear what's
      being said.
    source: "transcription_mp4_video_5.txt"
    context: "Trump escalator descent, political optics"

  - id: "MM-DK-430"
    title: "Disney Triple Camera Evaluation"
    content: >
      Disney Imagineers are taught to look at everything three times: wide shot, medium shot, close up.
      Everything. Because optics matter enormously.
    source: "transcription_mp4_video_5.txt"
    context: "Lunch with Disney Imagineer"

  - id: "MM-DK-431"
    title: "Good Demo Anatomy"
    content: >
      Good demos use: powerful analogy (X is like Y), familiarity, spotlight similarities, obscure
      differences, telegraph the whole story, resonate emotionally, support preexisting beliefs, are hard
      to argue against.
    source: "transcription_mp4_video_5.txt"
    context: "OJ glove demo analysis — all demo criteria checklist"

  - id: "MM-DK-432"
    title: "Ritualistic Recognition Ladder"
    content: >
      Create ascending levels of recognition — pin systems, ceremonies, public events. When combined with
      peer pressure and public recognition, the power multiplies. Even wealthy, educated professionals
      respond to it.
    source: "transcription_mp4_video_4.txt"
    context: "Chiropractor luncheon example — 600 people, 50 new patients"

  - id: "MM-DK-433"
    title: "Four Affinity Categories"
    content: >
      Four basic ways to build affinity/rapport: 1) Empathetic statements, 2) Affinity statements or
      symbols, 3) Advocacy statements (standing up for a group), 4) Permission slips (it's OK to think
      this way).
    source: "transcription_mp4_video_2.txt"
    context: "Master framework for mind hijacking rapport techniques"

  - id: "MM-DK-434"
    title: "Force Model (Mentalism Applied to Sales)"
    content: >
      Verbal communication (language narrows choices) + nonverbal communication (gestures plant thoughts)
      + harvesting (aggregate multiple partial successes to look like total success). You plant a thought
      in someone's mind by combining verbal and nonverbal forces.
    source: "transcription_mp4_video_7.txt"
    context: "Dave's mentalism demo — triangle/circle, 37, card force"

  - id: "MM-DK-435"
    title: "Proof By Process Or Device"
    content: >
      When you plug data into a machine and it lights up, spins, calculates — this flips switches in
      people's heads. The very fact that you have a process creates authority. People have been
      hard-conditioned to accept machine authority.
    source: "transcription_mp4_video_6.txt"
    context: "Scholes, cosmetics analyzers, biorhythm machines, Kreskin ESP tester"

  - id: "MM-DK-436"
    title: "Stretch Number Model"
    content: >
      A stretch number is a number that is accurate and factual about a certain thing and you stretch it
      over like a rubber band to apply to what it is that you do. Over 450 of the 500 richest people are
      'real estate investors' — technically true, massively misleading.
    source: "transcription_mp4_video_8.txt"
    context: "Forbes 500 applied to any industry — real estate, stocks, collector cars"

  - id: "MM-DK-437"
    title: "Enemy/Villain Model (7 Criteria)"
    content: >
      1) Need a devil, 2) Excitement proportionate to vividness, 3) Must be tangible not abstract, 4) Tie
      multiple enemies into one, 5) One concentrated focus, 6) When things fail it's the devil's fault not
      yours, 7) Ideally a foreign invader not insider.
    source: "transcription_mp4_video_9.txt"
    context: "Trump, Walmart as retailer villain, Obama as healthcare villain"

  - id: "MM-DK-438"
    title: "Big Idea Model"
    content: >
      When there's a big driving idea, it gets easier to sell stuff. Music rooms → pianos. Man caves →
      furniture/electronics. Home offices → equipment. Smartphones → everyone buys. The big idea creates
      automatic purchasing demand.
    source: "transcription_mp4_video_9.txt"
    context: "Ogilvy's 'what's the big idea?' question"

  - id: "MM-DK-439"
    title: "Houdini Metaphor Effect"
    content: >
      Houdini was popular not just as escape artist but as METAPHOR. People felt trapped and couldn't
      escape their circumstances. He symbolized escape. The demo became more powerful because of what it
      represented beyond itself.
    source: "transcription_mp4_video_8.txt"
    context: "Dave's commentary on Houdini clip symbolism"

  - id: "MM-DK-440"
    title: "Threshold Resistance Model"
    content: >
      Every step in a sales process has a threshold height. Most businesses make it too high without
      realizing it. Solution: offer optional thresholds — high threshold for eager buyers + low threshold
      (free report, recorded message, video) for timid ones. You scoop up the 'almost persuaded.
    source: "transcription_mp4_video_10.txt"
    context: "Arnold Topman — financial advisor seminar to free report funnel"

  - id: "MM-DK-441"
    title: "False Choice / Forced Choice"
    content: >
      Three-part magic: 1) 'I don't care' (drops defenses), 2) 'You decide/you pick' (gives feeling of
      control), 3) Present only 2 pre-selected options. They feel they picked. They go home and say 'I
      decided, I chose.' But you framed the entire pick.
    source: "transcription_mp4_video_10.txt"
    context: "DK's restaurant formula with Carla — works for 3+ years"

  - id: "MM-DK-442"
    title: "Comparative Choice Switch"
    content: >
      Switch people's mental frame from 'Do I want this or not?' to 'Which one should I get?' Three
      mechanisms: choice of items, choice of timing, differential benefit. The bread maker effect: $270
      alone = no sales, $270 next to $400 = sales skyrocket.
    source: "transcription_mp4_video_11.txt"
    context: "Williams-Sonoma bread maker + AB offer at Peter Low events"

  - id: "MM-DK-443"
    title: "Mouse Trapping (Depth Of Extraction)"
    content: >
      Bob Stupak: 'When we put 50 slot machines in, I always consider that there are 50 more mouse traps.'
      The depth that casinos go to — 441-page book on machine addiction design, entire book on casino
      floor layout. Most businesses don't go 1/10th that deep.
    source: "transcription_mp4_video_10.txt"
    context: "Addiction By Design + casino floor layout books"

  - id: "MM-DK-444"
    title: "New/Improved Cycle"
    content: >
      P&G Tide: every 6 weeks, something changes (add scent, remove scent, blue sprinkles, new bottle,
      booster product). Trump: every 2-3 days. The cycle prevents fatigue. People don't leave because it
      stopped working — they leave because they're bored.
    source: "transcription_mp4_video_13.txt"
    context: "Tide + Trump + 5 detergent brands (all Tide in different boxes)"

  - id: "MM-DK-445"
    title: "Three Requirements For Greed Activation"
    content: >
      90% of population needs: 1) Perceived need (even if irrational), 2) Ability to rationalize the
      behavior, 3) Belief they can go undetected. Management can only control #3. Marketing can stimulate
    source: "transcription_mp4_video_13.txt"
    context: "Theft control business + employee theft + Martha Stewart"

  - id: "MM-DK-446"
    title: "Positional/Comparative Status Model"
    content: >
      People don't compete with themselves — they compare with others in their community. Remove the
      comparison (no board, no tipping, no awards) and performance collapses. Create visible status tiers
      and performance rises. Swimming pool/TV effect: one in the neighborhood → five follow.
    source: "transcription_mp4_video_14.txt"
    context: "Joe's Crab Shack, Saturn, MLM, Weight Watchers, Suburban Joneses"

  - id: "MM-DK-447"
    title: "Three Levers For Affluent Selling"
    content: >
      Most expensive + most exclusive + most symbolic. These are the three levers with affluent buyers.
      They buy to reflect self-image AND for bragging rights. Hard to get = stories they tell. Bill Murray
      principle: the travail of getting you IS the value.
    source: "transcription_mp4_video_14.txt"
    context: "DK positioning: highest paid, hard to get, Cleveland basement"

  - id: "MM-DK-448"
    title: "Emotional Poverty / Hidden Desire"
    content: >
      Every person has at least one deep emotional black hole. Find it for the individual (consulting) or
      for the group (chiropractors = disrespected vs real doctors). This hidden desire drives spending,
      behavior, and susceptibility to influence.
    source: "transcription_mp4_video_16.txt"
    context: "Sally Field, chiropractor parking sign, MD vs DC trigger"

  - id: "MM-DK-449"
    title: "Optimistic Bias Addiction Cycle"
    content: >
      Optimistic bias → purchase → failure → brief disappointment → optimistic bias again → repurchase.
      92% chance of buying second diet after first. 30% of Weight Watchers on 3rd-5th cycle. Opportunity
      seekers: same opportunity bought 3-4 times. The cycle IS the business model.
    source: "transcription_mp4_video_16.txt"
    context: "Lottery, diets, get-rich programs, abusive relationships"

  - id: "MM-DK-450"
    title: "Sunk Cost Leverage"
    content: >
      The more invested someone is (financially, emotionally, time, ego), the more susceptible they are to
      buying anything related. Dentist (school + practice + equipment) vs real estate agent (40hr course +
      phone). Sell to the invested. Leverage their investment.
    source: "transcription_mp4_video_16.txt"
    context: "Horse business escalation, DK's 23 horses, sulky upgrades"

  - id: "MM-DK-451"
    title: "Gaslighting Model For Sales"
    content: >
      When selling to someone who feels superior to you, you must take them down a peg. Make them
      uncertain when they were feeling certain. Knock them off their perch. 'Maybe I'm not as smart as I
      thought.' Opens them to accepting your guidance.
    source: "transcription_mp4_video_17.txt"
    context: "Wealth advisor targeting $20M+ company sellers — 'irreplaceable money' fear"

  - id: "MM-DK-452"
    title: "Addiction Engineering Model"
    content: >
      Casino slot evolution: mechanical → video game → pretend control (pick, spin, roll). Goal shifted
      from winning illusion to maximizing TIME playing. Progressive involvement levels (like video games).
      McDonald's adds sugar to everything. Build addiction loops into customer experience.
    source: "transcription_mp4_video_17.txt"
    context: "441-page Addiction by Design, casino pee problem, dashboard gamification"

  - id: "MM-DK-453"
    title: "Steve Jobs Desktop Metaphor Model"
    content: >
      Transform unfamiliar into familiar by leveraging metaphors from existing experience. Jobs replaced
      'archaic typing commands' with visuals everyone knew: desktop, file folders, clipboard, scissors,
      paste, trash can. 'We built it as a metaphor to leverage experience people already had.
    source: "transcription_mp4_video_20.txt"
    context: "Installing the familiar — hijack #48"

  - id: "MM-DK-454"
    title: "He Must Know Something I Don't Know Assumption"
    content: >
      When people encounter someone acting with apparent purpose and confidence (man with umbrella on
      sunny day), DEFAULT assumption is 'he must know something I don't know' — not 'he might be a
      nutball.' Extremely useful assumption to trigger.
    source: "transcription_mp4_video_20.txt"
    context: "Red umbrella experiment, Barnum brick trick"

  - id: "MM-DK-455"
    title: "Kissinger-Nixon Manipulation Model"
    content: >
      Nixon would automatically balk at direct recommendations. Kissinger's method: create 2-3 choices,
      argue both sides, position preferred option as 'obvious,' occasionally argue VEHEMENTLY for one he
      KNEW Nixon would reject. Let them 'discover' the right answer.
    source: "transcription_mp4_video_21.txt"
    context: "Hijack #51 — making it their own idea. Basis for House of Cards."

  - id: "MM-DK-456"
    title: "The Big Tent Fallacy"
    content: >
      Making your message/doctrine/movement more inclusive/flexible/tolerant will NOT attract more people.
      Every political, religious, dietary, and business example shows the opposite — the more rigid and
      exclusionary, the more followers.
    source: "transcription_mp4_video_22.txt"
    context: "Bernie vs Hillary, Atkins domination, Pope Francis error"

  - id: "MM-DK-457"
    title: "Nostalgia Wrapper Model"
    content: >
      Wrap marketing in familiar nostalgic elements (Life Magazine, It's a Wonderful Life, Norman
      Rockwell, newspaper comics) to make the pitch less scary and trigger warm feelings. The sales
      message rides inside the familiar container.
    source: "transcription_mp4_video_20.txt"
    context: "Direct mail for 60+ demographic — 6+ rotating wrappers"

  - id: "MM-DK-458"
    title: "Incongruity Detection Model"
    content: >
      Consumers detect mismatch between marketing promises and physical reality. Orthodontist marketing
      'excellence' but bare-bones office creates damaging gap. Threshold for acceptable incongruity is
      inversely proportional to number of clients needed.
    source: "transcription_mp4_video_19.txt"
    context: "DK's 10-client tolerance vs dental practice needing 2,500"

  - id: "MM-DK-459"
    title: "Methodical Fear Build"
    content: >
      Fear must be BUILT through methodical pacing. 'Another Man's Family' fire alarm film: 20 minutes of
      slow mundane normalcy (family routines, the dog, bedtime), emotional investment, THEN catastrophe
      gradually introduced. 'It has to build. The pace is painfully slow but that's what makes the fear
      genuine.
    source: "transcription_mp4_video_21.txt"
    context: "War of the Worlds, fire alarm films, 'Act Now' story structure"

  - id: "MM-DK-460"
    title: "11 Sequential Agreements Model"
    content: >
      Before any sale, prospect must agree to 11 things in sequence: 1) Possibility, 2) Beneficial Nature,
      3) Attainability, 4) Personal Possibility (where most stall), 5) Practical Attainability, 6) History
      Resolution, 7) This Time Is Different, 8) Personal Beneficial Nature, 9) Advantageous Timing, 10)
      Personal Advantageous Timing, 11) Personal Appropriateness. Missing one stops the sale.
    source: "transcription_mp4_video_23.txt"

  - id: "MM-DK-461"
    title: "Personal Disqualification Pattern"
    content: >
      At step 4 (Personal Possibility), most people disqualify themselves: 'My business is different. I'm
      in a small town. I'm too young/old/dumb/broke.' The first three agreements are easy — personal
      possibility is where sticking begins.
    source: "transcription_mp4_video_23.txt"

  - id: "MM-DK-462"
    title: "Charlie Brown / Lucy Football Model"
    content: >
      Almost every customer is Charlie Brown lining up to kick the football Lucy is holding. They have a
      history of failure. You must: let them off the hook for past failures AND give concrete reasons why
      this time is different.
    source: "transcription_mp4_video_23.txt"

  - id: "MM-DK-463"
    title: "Personal Appropriateness Block"
    content: >
      Even after 10 agreements, people stop at 'personal appropriateness.' With money: 'If I do better
      than everyone, I'll lose friends. Dad never made more than 20K.' This buried mental crap surfaces
      and stops the sale. Must be addressed proactively.
    source: "transcription_mp4_video_23.txt"

  - id: "MM-DK-464"
    title: "FBI Friendship Formula"
    content: >
      Proximity + Frequency + Constancy + Intensity = Friendship. Proximity: physical closeness (real room
      beats online). Frequency: contacts in quick succession (3-step, 15 days apart). Constancy: total
      time spent. Intensity: message-to-market match. All four together = rapid relationship.
    source: "transcription_mp4_video_24.txt"

  - id: "MM-DK-465"
    title: "Distance-To-Sale Ratio"
    content: >
      Person from 6 blocks away is least likely to buy. Person who drove farthest is a lock. Guy who flew
      from SF to your LAX preview — he's buying. Has nothing to do with you or them. Purely about
      time/effort invested.
    source: "transcription_mp4_video_23.txt"

  - id: "MM-DK-466"
    title: "Misery Of Going Home Empty-Handed"
    content: >
      The more time/effort someone invested to get to you, the more miserable it is to leave without
      buying. Guy who gave a lot of time and is empty handed = miserable. Guy who gave a little time = not
      painful.
    source: "transcription_mp4_video_23.txt"

  - id: "MM-DK-467"
    title: "The Lottery Effect"
    content: >
      People stay in if there's a chance something might suddenly happen. MLM: 'If Bill ignites after I
      quit, I'll kick my ass forever.' So they stay paying $100/month. Works everywhere — memberships,
      licensing, events.
    source: "transcription_mp4_video_25.txt"

  - id: "MM-DK-468"
    title: "Activity Masquerading As Achievement"
    content: >
      People need to confuse activity with accomplishment. The very fact that something happened (even
      marginal) creates feeling of progress. Mail 1000, one person responds — they're excited because
      something happened.
    source: "transcription_mp4_video_24.txt"

  - id: "MM-DK-469"
    title: "Sunk Cost Leverage For Retention"
    content: >
      The deeper they're in, the less that happens (less chance of exit). Best argument is reinvention,
      not abandonment: 'We're not getting out of law. We're replacing your law practice with a better one.
    source: "transcription_mp4_video_25.txt"

  - id: "MM-DK-470"
    title: "Two Kinds Of Buyers"
    content: >
      Only two kinds: ready to buy now, and not ready now but may be later. You cannot build a fortune
      only on buy-now buyers. For every now buyer, there's a multiple who will buy later. The game is
      maintaining dialogue.
    source: "transcription_mp4_video_26.txt"

  - id: "MM-DK-471"
    title: "Principles-Strategies-Tactics-Tools Hierarchy"
    content: >
      Principles almost never change. Strategies don't change much. Tactics change a lot. Tools change a
      lot. You can return to same principles and freshen by changing tactical applications.
    source: "transcription_mp4_video_25.txt"

  - id: "MM-DK-472"
    title: "The Shortlist Model — What They Must And Must Not Think"
    content: >
      For every market, create two lists: (1) What MUST we have them think? (2) What CAN'T we have them
      think? Everything in your marketing must support these lists. Christianity doesn't want positive
      thoughts about reincarnation. The fire alarm company needs people to think 'tonight could be the
      night.
    source: "transcription_mp4_video_27.txt"
    context: "Orthodontist needs patients to think delay makes it worse/more expensive. Two-column psyche management."

  - id: "MM-DK-473"
    title: "Problem Creation vs Problem Solving Model"
    content: >
      You are not limited to selling solutions for existing problems. You can create the problem itself.
      Listerine created bad breath (1922: $0→$5M ad spend, $4M profit). Athlete's Foot invented by a
      copywriter (1930). Body odor created by ad agencies (1928). None came from the medical world.
    source: "transcription_mp4_video_27.txt"
    context: "GDP would be 3% if people only bought what they already knew they needed — we all make our living creating awareness of problems"

  - id: "MM-DK-474"
    title: "The Dust Mite Magnification Model"
    content: >
      Take something invisible/insignificant, magnify it 5 million times until it looks like a giant
      cockroach, then show it next to a baby on a bed. The vacuum cleaner demo: empty clear canister fills
      with horrifying debris from a mattress. Transforms the invisible into the terrifying.
    source: "transcription_mp4_video_27.txt"
    context: "Also used for sinus problems: '10,000 biological invaders enter your nose every day' with magnified images"

  - id: "MM-DK-475"
    title: "Dark-To-Light Stacking Model"
    content: >
      In absence of any other formula, stack copy: dark item → embellishment → even darker item → darkest
      item → light at end of tunnel → light → personal positive benefits. This creates emotional
      trajectory from fear to hope to desire.
    source: "transcription_mp4_video_28.txt"
    context: "Trump stacks border items identically every speech: pouring across → drug dealers/rapists → no borders no country → build wall → audience participation"

  - id: "MM-DK-476"
    title: "Cold Reading As Copywriting Foundation"
    content: >
      Cold reading scripts from psychics translate directly into copy. Fail-safe scripts play both sides
      of the coin: 'You are usually a person of strong character yet at times...' The reader gloms onto
      whichever side is right, ignores the wrong side. 32 of 52 minutes of the Wind Trillions VSL is cold
      read copy.
    source: "transcription_mp4_video_28.txt"
    context: "Barnum statements: everyone agrees, builds rapport. 'I believe you are the kind of person who secretly dreams of a big windfall' — safe cold read for lottery site visitors"

  - id: "MM-DK-477"
    title: "The Real Objection Diagnosis Model"
    content: >
      If a salesperson is really good at handling price objections, they'll make everything into a price
      objection that isn't one. If all you've got is a hammer, every problem is a nail. Must diagnose the
      TRUE objection, not the stated one, and answer ALL possible real objections in copy.
    source: "transcription_mp4_video_29.txt"
    context: "Miracle Ear transcript analysis — salesman justifies price when man really wants permission to spend on himself"

  - id: "MM-DK-478"
    title: "Self-Disqualification vs Proposition Rejection"
    content: >
      People go through two stages: (1) Accept/reject the proposition itself, (2) Qualify/disqualify
      themselves. Most marketers only defend stage 1 while prospects are stuck at stage 2. 'Yeah it works,
      but not for me because...' The 11 agreements model: first 3-4 easy, then self-disqualification
      begins.
    source: "transcription_mp4_video_29.txt"
    context: "Dentists: 'I can't do math so marketing won't work for me.' Courses: 'I have a shelf full of unopened courses."

  - id: "MM-DK-479"
    title: "The Reverse Reality Model"
    content: >
      When something is too familiar, too scary, too incredible, too demanding, or too complicated, you
      must change the reality of what it is. Dig a deep hole of alternate reality in lead generation, only
      climb out when they've raised their hand. Get-rich-in-real-estate becomes 'finder's fees for looking
      things up on a computer.
    source: "transcription_mp4_video_29.txt"
    context: "8-9 year control: real estate investing disguised as 'part-time finders needed.' Also works with dead real estate investor lists in 2008 crash."

  - id: "MM-DK-480"
    title: "The Lust For One Thing Model"
    content: >
      Preexisting belief: 'If I only had X, everything would be different.' This creates lust for a
      one-thing answer. Even smart people fall for it — Gary Keller's 'The One Thing,' Viagra, 'giving
      account/wealth account.' If that one magic thing isn't in your offer, people are unhappy with the
      whole deal.
    source: "transcription_mp4_video_31.txt"
    context: "Orthodontist: 'If your kid has a perfect smile, everything else falls into place.' Swiss cell therapy: one pill diagnoses and fixes everything. Geritol = same pitch since Lydia Pinkham 1900s."

  - id: "MM-DK-481"
    title: "Gender-Split Motivation Model"
    content: >
      Men: hardwired for conquest/victory/gain. Go to stores to buy (conquer), tell conquer stories at end
      of day, brag about how much they spent. Women: hardwired for security/safety, more internal, worry
      about impending tragedy, brag about how little they spent. Different leverage points for each.
    source: "transcription_mp4_video_31.txt"
    context: "Men more susceptible to gain messaging, women more susceptible to loss/safety messaging. Both present but different primary leverage."

  - id: "MM-DK-482"
    title: "The FAQ Laziness Problem"
    content: >
      Clumping all objections into FAQ at the end is how lazy copywriters handle objections. In real
      selling, objections get raised along the way as part of the conversation. The customer doesn't hold
      seven objections until the end. Selling in media should mirror real human selling dynamics.
    source: "transcription_mp4_video_29.txt"
    context: "Objections should be raised and answered throughout copy, not clumped at the end"

  - id: "MM-DK-483"
    title: "The LI Word Acceptance Model"
    content: >
      Obviously' and 'naturally' are LI (Linguistic Influence) words — whatever is said after them tends
      to be accepted without question. 'Obviously I'm experienced' → they accept your experience. 'As you
      know' is an assumptive statement — even if they don't know, they tend to agree with what follows.
    source: "transcription_mp4_video_32.txt"
    context: "Dave's cold reading system: these words are hardwired acceptance triggers"

  - id: "MM-DK-484"
    title: "The Mind Reading Plant Model"
    content: >
      You might be wondering' / 'You might be thinking' / 'It might be on your mind' — two outcomes: (1)
      If they ARE thinking it, you've 'read their mind.' (2) If they WEREN'T thinking it, you've now
      planted that thought. Either way, they're now thinking what you want. Then add embedded command: 'if
      I invest in this product today.
    source: "transcription_mp4_video_33.txt"
    context: "Plant desired thought + embedded command in one sentence: 'You might be wondering, can I really get [benefits] if I invest in this service today?"

  - id: "MM-DK-485"
    title: "The Ego Stroke With Takeaway Model"
    content: >
      When using ego stroking, add a realistic disclaimer/takeaway so it sounds genuine. 'Your portfolio
      might not be the largest I've ever seen' → then compliment: 'but it's much more impressive than
      most.' Without the takeaway, flattery comes across as manipulative. A tactic known as a tactic
      blown.
    source: "transcription_mp4_video_33.txt"
    context: "Dave: make it sound like a real compliment by adding a slight negative first"

  - id: "MM-DK-486"
    title: "The Barnum Statement Congruence Trap"
    content: >
      You pride yourself on being an independent thinker who doesn't accept others' opinions without
      satisfactory proof.' Person says yes. Now they MUST accept your proof because they just committed to
      being proof-driven. Their desire for self-congruence locks them into accepting your testimonials and
      evidence.
    source: "transcription_mp4_video_32.txt"
    context: "Dave: it's more than rapport — it creates a logical commitment chain. They said they accept proof → you give proof → they must accept it."

  - id: "MM-DK-487"
    title: "The Embedded Command Model"
    content: >
      In speech: pause slightly before the command, change tonality. 'If you IMPLEMENT THIS PLAN NOW, your
      future looks bright.' In copy: use ellipses, dashes, underlining, highlighting to break the command
      apart visually. Embedded commands work in both copy and verbal selling.
    source: "transcription_mp4_video_32.txt"
    context: "Dave: combine Barnum statement + future prediction + embedded command in one passage"

  - id: "MM-DK-488"
    title: "The Euphemism Control Model"
    content: >
      Whoever controls the naming controls the argument. 'Death tax' = everyone recoils. 'Estate tax' =
      only affects rich people's mansions. 'Criminal alien' = indefensible. 'Undocumented' = sympathetic.
      In business: 'workbook' = nobody wants it. Use a thesaurus to find palatable language for
      everything.
    source: "transcription_mp4_video_31.txt"
    context: "From Alinsky and Bernays: changing the language of a thing is prerequisite to changing acceptance of the thing"

  - id: "MM-DK-489"
    title: "The Species Centrism Model"
    content: >
      Humans are now totally centered on ourselves. Social media trains everyone to broadcast every
      moment. Arby's commercials show people photographing food to upload. We are fascinated with PEOPLE
      and nothing else. 30% of all magazine covers feature people regardless of topic. This means
      people-stories must be your foundation.
    source: "transcription_mp4_video-37.txt"
    context: "Term from book 'Riveted' — horse groups as example of species centrism. Forbes celebrity issue outsells wealth issue 3:1."

  - id: "MM-DK-490"
    title: "Social Explanation > Scientific Explanation"
    content: >
      People now prefer 'social explanations' (a story about a fireman that proves this point) over
      scientific, factual, or mathematical explanations. This represents a fundamental shift in what
      constitutes proof. A story about a person is now more persuasive than data.
    source: "transcription_mp4_video-37.txt"
    context: "Climate change: polar bear on ice floe worked better than all the science. People who reject assertions get sucked into stories."

  - id: "MM-DK-491"
    title: "The Fake Amazon Package Model"
    content: >
      Everyone recognizes Amazon packaging. In B2B, gatekeepers pass it unopened ('Doc ordered a book').
      You can create a thing that looks exactly like an Amazon delivery, ship it UPS or mail, and nobody
      knows the difference. Invented with Dr. Bisucci. May be as effective as FedEx at lower cost.
    source: "transcription_mp4_video-38.txt"
    context: "New invention: exploit Amazon's packaging familiarity as a delivery hijack for B2B penetration"

  - id: "MM-DK-492"
    title: "The Permission Slip Model"
    content: >
      When people want something but feel it's unseemly/inappropriate, your copy must make it OKAY. Luxury
      cars post-2008: people had money but felt guilty buying while neighbors suffered. Constantly making
      wealth pursuit okay is on Kennedy's shortlist — every month's newsletter has a wealth-permission
      dissertation.
    source: "transcription_mp4_video-38.txt"
    context: "Dupont Registry ad: 'You've climbed the ladder of success and you want a stunning woman' — permission to want. Rob Report: 'In Defense of Decadence."

  - id: "MM-DK-493"
    title: "The Buyers Are Liars Model"
    content: >
      Focus groups, surveys, and customer interviews are fundamentally flawed. People go to
      product-feature-benefit justification after the fact. They either don't know why they really bought,
      or they find the real reason embarrassing. Weight loss: 'lose more than your friends' vastly
      outperforms 'lose X pounds' but no woman would state positional status as her motivation.
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan: 'even the benefits they say they're buying it for' aren't the real benefits — must find the unstated reasons"

  - id: "FIL-DK-558"
    title: "Most People Inhibit Themselves Far Below Legal And Believability Limits"
    content: >
      People stop themselves short far tighter than what the law allows AND far short of what their
      audience is willing to believe. Two separate limits exist (legal and audience belief) and most
      marketers don't even approach either one. Go as far as law and sleeping at night allow.
    source: "transcription_mp4_video-38.txt"
    context: "Alternative health: 'Could this pill put your doctor out of business? Experts say yes.' Question format pushes limits further."

- id: "MM-DK-582"
    title: "Skatoma - business blindness where owners become immune to their own problems"
    content: "Almost every business owner has skatoma. You should look it up because it's a good rap to give them. Part of your diagnosis is you have skatoma. Like cat owners who don't smell their cats anymore. Somebody fresh comes in, they smell it in a hot second. We visually become immune to what's going on in our business."
    source: "business-of-copywriting"
    tags: [consulting, diagnosis, fresh-eyes, client-attraction]
  - id: "MM-DK-583"
    title: "The Ham Story - questioning inherited business practices through three why questions"
    content: "Zig's story about the ham: daughter cuts ends off because mom always did. Mom did because grandma did. Grandma did because her pot was too small. For two generations everyone cuts the ends off because that's what we do. In business, if you ask three dumb questions in a row about anything, you'll get to the point they can't defend it."
    source: "business-of-copywriting"
    tags: [consulting, diagnosis, questioning, inherited-practices]
  - id: "MM-DK-584"
    title: "Kill It and Drag It Back - display hunting effort to build client obligation"
    content: "I don't want to give them everything all at once. I want to make it look like what I'm doing for them is more difficult than it is. Like I put myself out more than I am. If I know what to show a client, I don't pre-organize it neatly. I go back into the storeroom and root around and find it for them. Going out hunting, killing it, dragging it back for us to eat."
    source: "business-of-copywriting"
    tags: [client-management, obligation, posture, consulting]
  - id: "MM-DK-585"
    title: "Good Enough Spot - every business and task has an optimization threshold"
    content: "There's what I call the good enough spot. Not all GE spots are in the same place. Southwest Airlines has a different GE spot than American first class. If you spend too much time getting cost per sale from 180 to 165 when the client is happy at 180, you've accomplished nothing. Move to the next bigger opportunity."
    source: "business-of-copywriting"
    tags: [project-management, optimization, consulting, diminishing-returns]
  - id: "MM-DK-586"
    title: "The Muse - clients must pursue you not the reverse for proper positioning"
    content: "If I'm at a cocktail party and I turn around and tap someone on the shoulder saying I can solve your problem, they back away. But if someone else says 'see that guy over there, he solved that problem 412 times,' it's a whole different thing. His acceptance of the preposterous idea is facilitated by it being a big deal just to get to her."
    source: "business-of-copywriting"
    tags: [positioning, client-attraction, pursuit-reversal, referrals]
  - id: "MM-DK-587"
    title: "Celebrity Buried in the Closet - finding the undervalued story in every business"
    content: "Miracle Air had Ken Dalvorkin buried. WWII fighter pilot, 103 missions, triple ace, shot down three times, Distinguished Service Cross, Silver Star, Purple Heart. Their average customer is 60 plus. He's John Wayne. They weren't using him. I find him talking to a franchise owner in a dinky town. They had a celebrity and they had him buried."
    source: "business-of-copywriting"
    tags: [consulting, copywriting, storytelling, undervalued-assets]
  - id: "MM-DK-588"
    title: "Secular Religion of Business - untested articles of faith that must be challenged"
    content: "Every business and every business owner has this secular religion that they believe about their business. Works just like a real religion. It's got ten commandments that can't be broken. They haven't been tested in eons. They're not fact-based, not data-based, not experience-based. They're just a belief system. Challenge them."
    source: "business-of-copywriting"
    tags: [consulting, diagnosis, belief-systems, business-assumptions]
  - id: "MM-DK-589"
    title: "The Frog Model - poor people don't know rich people are as dumb as they are"
    content: "Frog is smarter than some of my clients but doesn't make much money. The main reason is he thinks there's something unique about rich people, some gene they have that he doesn't. He has no idea how dumb they are. If he knew, he might do something about it."
    source: "business-of-copywriting"
    tags: [money-mindset, confidence, wealth-perception, consulting]
  - id: "MM-DK-590"
    title: "Niche Segmentation Beat-the-Control - 7 packages to 7 segments beats 1 to all"
    content: "Financial newsletter subscribers are 60-70% from 7 professional groups: doctors, dentists, lawyers, pilots. Instead of one package to everybody, bust out the dentists, change envelope and lift note to talk dentalese, find a dentist testimonial. Mail seven different packages to seven segments. You could beat the control in your sleep."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, segmentation, list-management, beat-the-control]
  - id: "MM-DK-591"
    title: "Patient Farming - six months of groundwork before overt marketing"
    content: "Create a newsletter for the niche, begin sending it as if they had subscribed. Illustrate everything wrong with their industry marketing. Introduce yourself, make yourself look smart. Put out a niche book even if you print 80 copies. After six months of groundwork, if you still need to, start overt marketing. You probably won't need to."
    source: "business-of-copywriting"
    tags: [client-attraction, positioning, long-game, content-marketing]
  - id: "MM-DK-592"
    title: "Specialized Knowledge Pyramid - presidents need people who aren't presidents"
    content: "Presidents are dependent on people who aren't presidents to become presidents. What Carville and Rove know is direct marketing - demographics, lists, direct mail. The presidents can't even spell direct marketing. Neither Kenny Rogers nor Smothers Brothers exist without Ken Craven. Trump ain't possible without George Ross."
    source: "business-of-copywriting"
    tags: [consulting, value-proposition, specialized-knowledge, confidence]

  # --- IWW (Influential Writing Workshop) CD05-08 ---
- id: "MM-DK-603"
    title: "External vs Internal Communication Model"
    content: >
            External communication (books, guest articles, magazine) is for meeting new people.
      Internal communication (newsletters, weekly faxes, blog) is for intimate relationships.
      'I talk differently to you once we have an intimate relationship than I do when we are
      meeting for the first time through a book.'
    source: "IWW-CD05-T01"
    domain: "marketing"

  - id: "MM-DK-604"
    title: "Red Room Blue Room Coded Language"
    content: >
            When outsiders hear your insiders communicating in proprietary language they don't
      understand, it creates a physical Red Room/Blue Room dynamic. The outsider WANTS to cross
      over to full understanding. 'The guest is seeing everybody else communicate in this
      language that they only understand part of. And now it's created a physical red room,
      blue room.'
    source: "IWW-CD05-T01"
    domain: "influence"

  - id: "MM-DK-605"
    title: "Starbucks Third Place Model"
    content: >
            Starbucks doesn't think of itself in the coffee business. 'They think of themselves
      as being in the third place business. Work, home, Starbucks.' People don't go for the
      coffee — they go for the social environment, the illusion of social environment, and the
      status. This is why $4 coffee beats 50-cent coffee.
    source: "IWW-CD05-T02"
    domain: "business-strategy"

  - id: "MM-DK-606"
    title: "Desires Met Dual Layer Model"
    content: >
            Two layers of desires to fulfill: (1) GENERAL desires — broad
      emotional/psychological needs all humans have (simple certainties, things to believe in,
      faith, magic pills), (2) SPECIFIC desires — unique to YOUR customer base, discovered
      through deep profiling. 'More effort is invested in trying to sell things to people than
      first understanding the people we are trying to influence.'
    source: "IWW-CD05-T03"
    domain: "influence"

  - id: "MM-DK-607"
    title: "Al Bundy Profiling Shortcut"
    content: >
            For low-end opportunity market: 'Every time I've been writing that stuff I've been
      writing for Al Bundy the character in Married with Children — he's the buyer of the
      typical low-end get-rich opportunity.' TV and pop culture can hand you a ready-made
      living, breathing profile to write to.
    source: "IWW-CD05-T04"
    domain: "copywriting"

  - id: "MM-DK-608"
    title: "Atlas Contest Innovation — Compete Against Your Peers"
    content: >
            Bill Phillips' innovation: instead of one big contest where most feel they can't
      win, create a matrix of 25-35 quadrants where you only compete against people like you
      (age, weight, goal type). Many secondary prizes for each box. Everyone believes they can
      beat people just like them. 'The only thing Phillips changed' — and it revolutionized
      contests.
    source: "IWW-CD05-T07"
    domain: "marketing"

  - id: "MM-DK-609"
    title: "Joe Carbo Challenge-to-Deny Model"
    content: >
            Present a provocative statement ('What was your reaction when you read it? Did your
      habit conditioned mind automatically say not me?'). Then challenge them: 'But a wise man,
      free of deadly self-limitation, would merely ask...' The reader who dismissed the claim
      is now challenged to prove they're NOT the dumb person with bad habits.
    source: "IWW-CD05-T07"
    domain: "copywriting"

  - id: "MM-DK-610"
    title: "Elephant vs Standard Objection"
    content: >
            An elephant is bigger than a standard objection. Objections are stated in
      face-to-face selling. Elephants are: (1) The BIG unspoken ones nobody wants to talk
      about, (2) Things affecting people they don't even enunciate, (3) Things they would never
      admit to (racial prejudice, vanity, fear). 'There are a whole lot more people who think
      it, who will never enunciate it, would never raise it as an objection.'
    source: "IWW-CD06-T02"
    domain: "persuasion"

  - id: "MM-DK-611"
    title: "Welcome Prophet Formula"
    content: >
            The perfect product/message: (1) Tells them exactly what to do (no thought
      required), (2) Is what they WANT to do anyway, (3) Doesn't require sacrifice of things
      they love. Weight loss example: 'By all means eat lunch at McDonald's — here's exactly
      what to eat to crank up your metabolism.' You are the most welcome prophet yet to arrive.
    source: "IWW-CD06-T07"
    domain: "influence"

  - id: "MM-DK-612"
    title: "FTC Rabbit Foot to Prayer Pivot"
    content: >
            The Lyman Wood story: FTC banned claims about lucky rabbit's feet, but doesn't
      regulate religion. Solution: throw out the rabbit's foot, just sell the prayers. They'd
      already conquered advertising economics and had infrastructure — just needed a new
      container for the same desire.
    source: "IWW-CD06-T07"
    domain: "business-strategy"

  - id: "MM-DK-613"
    title: "Language Document Template (Brooks Model)"
    content: >
            For each customer type, build a language document with: (1) What are they wanting?
      (2) What words do they respond to positively? (3) What words do they respond to
      negatively? (4) What words you want to use, (5) What words you don't want to use.
      Template by customer type (accountant, CEO, etc.). 'Conceptually, they got it right.'
    source: "IWW-CD06-T08"
    domain: "copywriting"

  - id: "MM-DK-614"
    title: "Mary Kay Recognition Principle"
    content: >
            'Mary Kay — if you show up at a meeting and breathe, you get a ribbon. If you show
      up three times in a row, you get a car.' Recognition of ANY behavior — attendance,
      longevity, consistency — drives more of that behavior. Works especially 'in an
      environment where they ain't making any money.'
    source: "IWW-CD07-T01"
    domain: "cult-building"

  - id: "MM-DK-615"
    title: "Four Types of Writing"
    content: >
            Only 4 types: (1) TEACHING — actual textbook (Bob Stone's Direct Marketing), (2)
      REFERENCE — tools to be used repeatedly (thesaurus), (3) STORY — narrative-driven, (4)
      ADVOCACY — persuading acceptance of ideas. The enduring classics (Think and Grow Rich,
      Psycho-Cybernetics) are STORY + ADVOCACY constructed like sales letters, NOT teaching
      books.
    source: "IWW-CD07-T03"
    domain: "copywriting"

  - id: "MM-DK-616"
    title: "Bertha's House Ad — Values Selling Model"
    content: >
            A real estate agent wrote a features ad (bedrooms, bathrooms). It didn't sell. The
      homeowner Bertha rewrote it as a values/feelings/aspirations ad — the house is almost
      incidental, the connection is with someone who has Bertha's values. 'Makes price
      relatively unimportant.' The word choice of 'home' versus 'house' matters. The structure
      matters. 'Ultimately what she got right is operating on a level of aspirations.'
    source: "IWW-CD07-T05"
    domain: "copywriting"

  - id: "MM-DK-617"
    title: "Peterman Catalog — Merchant Poet Model"
    content: >
            Peterman catalog creates a cult through copy: (1) NY Times called him a 'merchant
      poet,' (2) Customer says 'knowing about the catalog was like being a member of a club,'
      (3) Blue blazer sold not as a garment but as 'being David Niven, Cary Grant-like, cool
      and unflappable and glamorous.' Copy is about the guy walking out of a bomb crater with
      jacket perfectly pressed. 'That's how you sell a $99 jacket for $499. It's not about the
      jacket.'
    source: "IWW-CD08-T01"
    domain: "copywriting"

  - id: "MM-DK-618"
    title: "Rodale's Most Likely Customer Insight"
    content: >
            'The most likely customer for a book on any given topic was someone who had bought
      a similar book within the preceding 18 months.' Implication: show up as X to an audience
      that wants X. Don't try to convert. 'Cult recruiters do not go out and try and convert
      people. They go out in search of people who are ready to join a cult.'
    source: "IWW-CD08-T05"
    domain: "marketing"


# --- IWW CD01-04 L2_MENTAL_MODELS ---
  - id: "MM-DK-619"
    title: "The Eight Purposes Of Influential Writing"
    content: >
      Eight reasons we write to influence: 1) Attraction of right
      people not just quantity, 2) Connection — feelings beyond
      monetary transactions, 3) Acceptance of advocated positions,
      4) Sales and purchases, 5) Involvement — getting them
      interactive not passive, 6) Loyalty — defending you and
      dragging people back, 7) Retention — keeping them longer,
      8) Ascension — moving them up commitment and spending ladders.
    source: "IWW-CD01-T03"
    domain: "influence"

  - id: "MM-DK-620"
    title: "Four Essentials For Influence"
    content: >
      Four essentials to have influence: 1) They must be fascinated
      with you, not merely interested, 2) They must feel they share
      common values with you, 3) They must believe you care about
      them, 4) They must get value from the relationship as they
      define value, not as you define it.
    source: "IWW-CD01-T04"
    domain: "influence"

  - id: "MM-DK-621"
    title: "Five Signs Youre Getting Influence Right"
    content: >
      Five indicators of successful influence: 1) They tell your
      stories back to you then tell their version, 2) They tell
      your stories to others giving you credit, 3) You get personal
      fan mail with life stories, 4) They send you cures for your
      ailments and try to help you, 5) They seek your approval —
      bringing colored papers for the refrigerator door.
    source: "IWW-CD01-T04"
    domain: "influence"

  - id: "MM-DK-622"
    title: "Disclosure And Holdback Model For Fascination"
    content: >
      Fascination requires both disclosure and holdback. You reveal
      enough about how you work, your quirks, your process to create
      curiosity, then deliberately withhold enough to maintain
      mystery. They must always be trying to find out more. The
      model is serial fiction characters who readers cant stop
      thinking about.
    source: "IWW-CD01-T06"
    domain: "influence"

  - id: "MM-DK-623"
    title: "Personal Narrative Building Blocks From Life Experience"
    content: >
      Personal narratives have building blocks from life experience.
      Most people overlook the usefulness of all their experiences
      including negative ones. Even alcoholism becomes an asset on
      the personal narrative asset list once it is past. A huge
      percentage of the population connects to that. Build a list
      of 20+ personal assets including things others would not
      think of as assets.
    source: "IWW-CD02-T02"
    domain: "storytelling"

  - id: "MM-DK-624"
    title: "Wide Swath vs Narrow Swath Of Connection"
    content: >
      Stories that connect to common experiences create a wide
      swath of connection. More people have fathers than military
      experience. More people wanted a bicycle they never got than
      were war heroes. The dollhouse story, the pony story, the
      bike story — they all work because a huge number of people
      have their own version of desperately wanting something and
      being refused it.
    source: "IWW-CD02-T02"
    domain: "storytelling"

  - id: "MM-DK-625"
    title: "Point Of View Categories For Writers Of Influence"
    content: >
      Categories of writer point of view: Observer-reporter like
      Napoleon Hill or Tom Peters. Radical system bringer like
      Atkins. Prophet or psychic like Harry Dent. Specialist expert.
      Choose your primary category so people can pigeonhole you.
      If there is confusion about what you are, its hard to connect
      and impossible for them to retell your story.
    source: "IWW-CD02-T04"
    domain: "personal-branding"

  - id: "MM-DK-626"
    title: "Superhero Formula For Building Influential Characters"
    content: >
      Judge Learned Hand defined superhero components: 1) A mission
      beyond self-interest, 2) Superpowers or mystical skills,
      3) An origin story, 4) Fallibility — flaws people can
      identify with. The most super heroes that were truly flawless
      disappeared and could not hold an audience. Spider-Man was
      written as Archie bitten by a spider. Both sides must exist
      in the same body.
    source: "IWW-CD03-T03"
    domain: "personal-branding"

  - id: "MM-DK-627"
    title: "Shrinking Frame Of Reference — History Is Now"
    content: >
      Peoples frame of reference and knowledge base is shrinking
      not expanding due to media fragmentation. Donnie Deutsch
      said advertisers need to understand that history consists
      of now. Historical references are shorter and shorter. You
      cannot assume knowledge on peoples part. Jay Leno tells you
      who everyone is because you cannot assume the audience knows.
    source: "IWW-CD03-T06"
    domain: "copywriting"

  - id: "MM-DK-628"
    title: "The Culture Code — Cracking Mental Imprint At Deep Level"
    content: >
      The Culture Code book reveals how to crack the code of the
      person you are trying to influence at a deep psychological
      level. Instead of asking what people want, ask what their
      memories are. For the Jeep in America, the embedded code is
      horse. That colors everything you do to sell Jeeps. Connect
      to the mental imprint already there.
    source: "IWW-CD03-T05"
    domain: "persuasion"

  - id: "MM-DK-629"
    title: "Four Categories Of Story Events"
    content: >
      Four categories of story events: 1) Achievement through
      conflict with others or self — triumph stories,
      2) Adversity stories — overcoming hardship, 3) Achievement
      through discovery — like Maltz discovering self-image
      through plastic surgery observations, 4) Achievement through
      a teacher or mentor — the blackie story or Carnegie to Hill.
    source: "IWW-CD04-T01"
    domain: "storytelling"

  - id: "MM-DK-630"
    title: "Four Values A Story Delivers"
    content: >
      Four values achieved by a story: 1) Transformational change
      in the person — timid to bold, fearful to courageous,
      2) An idea — the story leads to a profoundly important idea,
      3) A behavior — the story gets specific change in behavior,
      4) A benefit outcome — something tangible they got from it.
    source: "IWW-CD04-T02"
    domain: "storytelling"

  - id: "MM-DK-631"
    title: "The Principle Of Place — Creating A World They Want To Enter"
    content: >
      Everything you present to people must be thought of as a
      place. Three components: 1) A visible door they walk through
      from world A to world B, 2) An environment completely
      different from their outside world, 3) Consistency with your
      positions. Martha Stewart is a place of affordable class.
      Howard Stern is animal house. Limbaugh is a place to be
      smarter than everyone.
    source: "IWW-CD04-T06"
    domain: "cult-building"

  - id: "MM-DK-632"
    title: "Bizarro Planet Model — Your World Validates What Theirs Rejects"
    content: >
      Like Supermans Bizarro Planet where everything is opposite,
      your world should glorify and validate and celebrate exactly
      what your audience is disrespected for in their outside world.
      What they are criticized for elsewhere is what you applaud.
      Naturally they want to be in your place more than any other
      place.
    source: "IWW-CD04-T07"
    domain: "cult-building"

  - id: "MM-DK-633"
    title: "Oversimplification Plus Feel-Good Wrapper"
    content: >
      Two commonalities of all people with great influence through
      writing: 1) They oversimplify what they present — to the
      point experts criticize them, which is how you know you are
      getting it right, 2) They wrap everything in a feel-good
      wrapper so people feel good about themselves as a result
      of the communication.
    source: "IWW-CD02-T02"
    domain: "influence"

  - id: "MM-DK-634"
    title: "Four Basic Story Types"
    content: >
      Four basic types of stories: 1) Personal experience —
      your own life, 2) Someone elses experience — testimonials
      and anecdotes, 3) Parable — told as if fiction like Richest
      Man in Babylon, 4) Fable — like the fox and rabbit. Parables
      and fables are best because audiences cannot immediately
      disconnect with this is not relevant to me resistance.
    source: "IWW-CD04-T05"
    domain: "storytelling"

  - id: "MM-DK-635"
    title: "Approval Seeking As Influence Indicator And Purchase Driver"
    content: >
      When people seek your approval — bringing you their papers
      wanting you to put them on the refrigerator door — you have
      enormous influence. That means they will do pretty much
      whatever is necessary to get approval from you. A certain
      amount of purchase activity occurs with no thought about
      whether they want or need it. They buy because they want
      approval.
    source: "IWW-CD01-T05"
    domain: "influence"

  - id: "MM-DK-636"
    title: "Three Stages Of Cult Brand Building"
    content: >
      Three stages of cult brand building: 1) The curious consumer
      crosses the members only firewall — a clear visible door,
      2) The hand-picked consumer gets brand washed — key word is
      hand-picked because source matters, 3) The dedicated brand
      tribe member helps create a parallel social universe where
      members interact, encourage, and support each other.
    source: "IWW-CD04-T07"
    domain: "cult-building"


# --- IWW CD09-13 L2_MENTAL_MODELS ---

  - id: "MM-DK-637"
    title: "Tiered Promotional Agenda Model"
    content: >
      Organize promotions in tiers of importance. Top tier: the two major
      annual events with six-month marketing cycles that take precedence
      over everything. Second tier: upgrade campaigns and standalone
      product launches mapped to open months. Third tier: new product
      inserts placed wherever there is an opening.
    source: "IWW-CD09-T01"
    domain: "marketing"

  - id: "MM-DK-638"
    title: "Fonts As Communication Model"
    content: >
      Typefaces communicate independently of the words they display.
      Typewriter look says personal and handmade. Helvetica screams
      commercially prepared. Script conveys femininity or emotional
      topic. Typography helps the reader through the piece by varying
      paragraph sizes, indentation, and cosmetic treatment.
    source: "IWW-CD09-T01"
    domain: "copywriting"

  - id: "MM-DK-639"
    title: "Three-Column Vs Two-Column Communication Model"
    content: >
      A three or four column page speaks differently than a two column
      page. Three columns conveys serious journalism like a trade journal
      or Newsweek. Two columns is more casual, like newsletters people
      receive from individuals. The column format itself sets expectations
      for the type of content within.
    source: "IWW-CD09-T02"
    domain: "copywriting"

  - id: "MM-DK-640"
    title: "Advocacy Book Vs Reference Book Model"
    content: >
      Reference books stay on the shelf and bring speaking engagements
      and consulting. Advocacy books with stories bring customers and
      create emotional bonding. The format of advocacy books: tell what
      to do but not how. Give checklists so they feel they got something,
      but the checklist alone does not lead anywhere.
    source: "IWW-CD10-T03"
    domain: "copywriting"

  - id: "MM-DK-641"
    title: "Points Of Connection Diversity Model"
    content: >
      Each personal story you share knocks off buyers one at a time for
      different reasons. If you had no dad growing up, there is a certain
      number of people who connect with that. If you grew up in a small
      town, there is another set. The diversity of stories is important
      because people are not all motivated at the same point.
    source: "IWW-CD10-T02"
    domain: "influence"

  - id: "MM-DK-642"
    title: "Low-Grade Infection Selling Model"
    content: >
      You want to set up a sale like a low-grade infection. It is just
      always there until finally somebody steps in front of them and asks
      for money related to what you have been laying in again and again.
      Give your people ink in every communication. It sets up their ability
      to get on stage and make the sale later.
    source: "IWW-CD10-T01"
    domain: "marketing"

  - id: "MM-DK-643"
    title: "Person Most Likely Elected Model"
    content: >
      The person most likely to get elected president is the person you
      would like to have a beer with, the woman would trust babysitting
      their kid. Very few deviations from that over the years. People are
      trying to find authenticity and humanity. That is what they are
      really looking for over information.
    source: "IWW-CD10-T03"
    domain: "influence"

  - id: "MM-DK-644"
    title: "Subconscious Training Through Repetition Model"
    content: >
      The subconscious gets it when it is trained by place, time, routine,
      and discipline. Show up at the same place at the same time every day,
      do the same things to get ready to write, and you are in gear. I have
      never had writer's block because the subconscious is trained to do it.
      Usually it has started before the fingers hit the keys.
    source: "IWW-CD10-T04"
    domain: "copywriting"

  - id: "MM-DK-645"
    title: "Disney Music Pacing Model For Writing"
    content: >
      Disney changes music to get people in and out of parks. Before Epcot
      fireworks, lilting classical music causes patience. Afterwards, peppier
      music transitions to marching music and everybody marches out the door.
      None of it is accidental. We can do the same thing with pacing in the
      way we do words — build up, slow down, build to a stronger point.
    source: "IWW-CD11-T01"
    domain: "copywriting"

  - id: "MM-DK-646"
    title: "Niche Splinter Identity Model"
    content: >
      The minute you specialize a service for a niche, even though the
      product is identical, its price can go up. Create parallel businesses:
      one generic for the mixed bag, one niche-specific. When we splintered
      theft control into three industries, we talked to each in their
      language with their testimonials. The product was the same.
    source: "IWW-CD11-T04"
    domain: "marketing"

  - id: "MM-DK-647"
    title: "Aspirational Purchase vs Commodity Purchase Model"
    content: >
      Nobody buys three days in a room. They buy aspirations. Dog food at
      commodity level needs no story. But expensive dog food is sold with
      incredible stories — organic origins, medical science, extending life.
      Our deliverables are the commodity. The aspirations they lead to have
      very high value. Stories present those aspirations.
    source: "IWW-CD13-T03"
    domain: "influence"

  - id: "MM-DK-648"
    title: "Persistent Non-Member Value Model"
    content: >
      The persistent non-member who will not join or stay as a member but
      keeps buying has surprising value. Our non-member list is actually
      now worth more than our member list. The old rule was get rid of them
      but in the internet era you can talk to them forever and they keep
      buying at irregular intervals.
    source: "IWW-CD12-T03"
    domain: "marketing"

  - id: "MM-DK-649"
    title: "Second Business Inside Existing Customer Base"
    content: >
      Inside your existing customer base there is likely a segment — maybe
      ten percent — of entrepreneurial customers whose business wisdom needs
      are worth ten to thirty times your current average customer value. That
      ten percent in the second business could do the same volume that a
      hundred percent does in the first business.
    source: "IWW-CD11-T02"
    domain: "business-strategy"

  - id: "MM-DK-650"
    title: "Staged Truth Revelation Model"
    content: >
      There is the business people think it is and the business it really
      is. And there are about three different levels of the business it
      really is. Only reveal certain truths once they are committed enough
      not to run screaming. It is a tightrope — you must talk to beginners
      and veterans at the same time in your newsletter.
    source: "IWW-CD12-T03"
    domain: "marketing"

  - id: "MM-DK-651"
    title: "Testing With Good Media Not Bad Media Model"
    content: >
      Never test with bad media. My analogy: we have a new jockey we think
      is pretty good so we put him on a great big pig in the Kentucky Derby.
      If he does well then we let him ride horses. You do not know if it was
      him or the pig. Put your best ad in the best media and you will know
      something in a week versus knowing nothing for a year.
    source: "IWW-CD13-T01"
    domain: "marketing"


    source: "ACC-video-DK_4"

  - id: "FIL-DK-169"
    title: "Be not do' — coaching identity. You are a coach, not someone who does coaching."
    content: >
      Be not do' — coaching identity. You are a coach, not someone who does coaching. Identity drives
      behavior, not the reverse.
    source: "ACC-pdf-bootcamp-notes"

  - id: "MET-DK-169"
    title: "Proof By Test Method: Include a self-test the prospect can take that 'proves' th"
    content: >

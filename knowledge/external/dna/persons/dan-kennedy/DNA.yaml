    source: "ACC-video-DK_4"

  - id: "FIL-DK-170"
    title: "What you get paid for is REPUTATION — more than know-how, service, or results. R"
    content: >
      What you get paid for is REPUTATION — more than know-how, service, or results. Reputation is the
      asset. Everything else is secondary.
    source: "ACC-pdf-transcript"

  - id: "MET-DK-170"
    title: "Cafeteria Opportunity Method (George Douglas): Step 1 — Start with 4 home-based"
    content: >
      Cafeteria Opportunity Method (George Douglas): Step 1 — Start with 4 home-based businesses. Step 2 —
      Add 2-5 new options per year until you reach 42. Step 3 — Allow any buyer to swap to any other
      program for $50. Step 4 — Communicate growth ('the company is growing all the time'). Step 5 —
      Position: 'if you cannot make one of these 42 businesses work, you probably should not be in
      business.' Result: eliminates fear of making wrong choice, dramatically reduces refunds.
    source: "CD10-track5"

  - id: "HEUR-DK-171"
    title: "Annual Event Strategy (Summers White): 15-year practice of annual invitation-onl"
    content: >
      Annual Event Strategy (Summers White): 15-year practice of annual invitation-only formal dinner.
      Rarity creates anticipation. Not monthly — that signals desperation. Annual = tradition,
      institution, aspiration.
    source: "ACC-video-DK_5"

  - id: "FIL-DK-171"
    title: "Compensation based on value as defined by RECIPIENT, not you. What YOU think it"
    content: >
      Compensation based on value as defined by RECIPIENT, not you. What YOU think it's worth is
      irrelevant. What THEY perceive it's worth determines price.
    source: "ACC-pdf-transcript"

  - id: "MET-DK-171"
    title: "Direct Mail Heart Transplant Method (George Douglas literal example): Step 1 — G"
    content: >
      Direct Mail Heart Transplant Method (George Douglas literal example): Step 1 — Get your records even
      if they resist. Step 2 — Write a personal letter explaining who you are, what you need, and why,
      with personal context (Christmas letter). Step 3 — Mail to all 467 hospitals that do transplants.
      Step 4 — Include proof you can pay, can relocate, and are motivated. Step 5 — Follow up on every
      positive response. Result: 4 doctors responded, got a heart within 6 months vs the 3 years the
      system said it would take.
    source: "CD9-track5, CD10-track1"

  - id: "HEUR-DK-172"
    title: "Formal Dress Code Positioning: ladies in gowns, gentlemen in tuxedos. Creates ps"
    content: >
      Formal Dress Code Positioning: ladies in gowns, gentlemen in tuxedos. Creates psychological
      distinction from casual networking. Elevates perceived importance. Makes attendees feel special.
    source: "ACC-video-DK_5"

  - id: "FIL-DK-172"
    title: "Give NOTHING for free — even $1M/yr clients lose respect without paying. Free de"
    content: >
      Give NOTHING for free — even $1M/yr clients lose respect without paying. Free devalues. Always
      charge something, even if token.
    source: "ACC-pdf-bootcamp-notes"

  - id: "MET-DK-172"
    title: "Saturday Open Farm Method (George Douglas): Step 1 — Invite all new customers to"
    content: >
      Saturday Open Farm Method (George Douglas): Step 1 — Invite all new customers to visit every
      Saturday. Step 2 — Give 2-hour presentation covering all programs. Step 3 — Open for Q&A. Step 4 —
      Feed them lunch at the farm. Step 5 — Have wife interact naturally with visitors. Step 6 — Program
      advisors available to work individually. Only 20% of buyers visit but the fact they CAN visit is the
      reassurance factor that drives 100% of sales.
    source: "CD10-track3"

  - id: "HEUR-DK-173"
    title: "No Explicit Pitch Rule (Summers): never overtly suggest they should be clients."
    content: >
      No Explicit Pitch Rule (Summers): never overtly suggest they should be clients. The situation itself
      does the selling. Explicit pitch creates resistance, puts prospect in defensive mindset,
      commoditizes the service.
    source: "ACC-video-DK_5"

  - id: "FIL-DK-173"
    title: "Conformity to industry norms GUARANTEES average results. Do what everyone does,"
    content: >
      Conformity to industry norms GUARANTEES average results. Do what everyone does, get what everyone
      gets. Nonconformity is prerequisite to exceptional.
    source: "ACC-pdf-bootcamp-notes"

  - id: "MET-DK-173"
    title: "Reselling the Original Dream Method: Step 1 — In first meeting/conversation, ask"
    content: >
      Reselling the Original Dream Method: Step 1 — In first meeting/conversation, ask 'How did you get
      into this business? Why?' Step 2 — Let them tell the story — they will perk up re-experiencing the
      original excitement. Step 3 — Link your proposition to that original dream and mental picture. Step
      4 — Use the language and imagery of their original aspiration, not your technical features. Example:
      Harrison's postcard going right back to 'how to have a bestselling book' for disillusioned authors.
    source: "CD8-track5, CD8-track6"

  - id: "HEUR-DK-174"
    title: "Connector Positioning: valuable not for expertise alone but for network and conn"
    content: >
      Connector Positioning: valuable not for expertise alone but for network and connections. Introducing
      two people makes both obligated to you. Both think: 'If he can do this for me, imagine what he could
      do as my consultant.
    source: "ACC-video-DK_5"

  - id: "FIL-DK-174"
    title: "Made more people more money by raising prices than anything else. Price increase"
    content: >
      Made more people more money by raising prices than anything else. Price increases are the fastest,
      easiest path to profitability.
    source: "ACC-pdf-transcript"

  - id: "MET-DK-174"
    title: "Dramatic Before Story Method: Step 1 — Weight the before portion of your story a"
    content: >
      Dramatic Before Story Method: Step 1 — Weight the before portion of your story at least 2:1 versus
      the after. Step 2 — Make the before as horrible, miserable, humiliating, and painful as the worst
      nostalgic memory. Step 3 — Include a specific 'firm resolution' or 'day that turned my life around'
      moment. Step 4 — The after follows naturally but with less emphasis. Examples: Jeff Paul sitting in
      his car in his driveway weeping. Jim Rohn lying to a Girl Scout because he could not afford cookies.
    source: "CD7-track5, CD8-track1"

  - id: "HEUR-DK-175"
    title: "Convention Timing Heuristic: night before convention = speakers arriving, checki"
    content: >
      Convention Timing Heuristic: night before convention = speakers arriving, checking in, vulnerable,
      looking for connection. Maximum receptivity. 250-300 people = large enough to feel important, small
      enough to feel exclusive.
    source: "ACC-video-DK_5"

  - id: "FIL-DK-175"
    title: "Behavioral congruency — match behaviors, results follow automatically. If you ac"
    content: >
      Behavioral congruency — match behaviors, results follow automatically. If you act like someone who
      charges $50K, you'll charge $50K. Incongruent behavior caps income.
    source: "ACC-pdf-bootcamp-notes"

  - id: "MET-DK-175"
    title: "Taste Like Chicken Analogy Method: Step 1 — Identify what is hard to explain abo"
    content: >
      Taste Like Chicken Analogy Method: Step 1 — Identify what is hard to explain about your opportunity.
      Step 2 — Find something the prospect already knows, understands, and accepts. Step 3 — Create the
      analogy: internet store = mall store, recurring income = oil well in your front yard. Step 4 — Build
      entire pitch around the analogy. Example: iMall sold virtual store spaces at $3-5K each by saying
      'it is just like the mall in your area except more people come and it has no walls.
    source: "CD8-track4, CD8-track5"

  - id: "HEUR-DK-176"
    title: "Telecoaching must send recording of calls to members — mandatory for retention."
    content: >
      Telecoaching must send recording of calls to members — mandatory for retention. 'You must do that.
      If not, you're going to have a lot of dropout.
    source: "ACC-video-DK_7"

  - id: "FIL-DK-176"
    title: "Autonomy: what/when/where/whom you want, or cheerfully saying No. The ultimate m"
    content: >
      Autonomy: what/when/where/whom you want, or cheerfully saying No. The ultimate measure of business
      success is freedom, not revenue.
    source: "ACC-pdf-bootcamp-notes"

  - id: "MET-DK-176"
    title: "Six-Copy Directory Method (Brainerd Melanger): Step 1 — Create a directory listi"
    content: >
      Six-Copy Directory Method (Brainerd Melanger): Step 1 — Create a directory listing every member.
      Step 2 — Give each member a full page about themselves. Step 3 — Ship six copies to each member.
      Step 4 — Add a large certificate suitable for framing. Step 5 — Each item delivers status elevation
      without requiring any business activity. The cost per member is small relative to the retention and
      satisfaction impact.
    source: "CD9-track3"

  - id: "HEUR-DK-177"
    title: "Telecoaching pricing sweet spot: $240/month for group + one-on-one combination."
    content: "Telecoaching pricing sweet spot: $240/month for group + one-on-one combination. 460 members = $110K+/month revenue."
    source: "ACC-video-DK_7"

  - id: "MET-DK-177"
    title: "Ken Roberts Direct Mail Methodology: (1) Lead generation via direct mail with ri"
    content: >
      Ken Roberts Direct Mail Methodology: (1) Lead generation via direct mail with risk-diffusing copy.
      (2) Present offer focusing on benefits, not product features — second income, pay off mortgage, buy
      dream car. (3) Make spokesperson look ordinary — denim shirt > suit, black-and-white photo, stories
      of average background. (4) Delay product reveal until page 24-25 of 56-page piece. (5) Use Greek
      philosopher / historical story before revealing what product actually is. (6) Track every detail of
      every list — which lists work best and WHEN they work best. (7) Capitalize on every customer with 11
      offers over first 17 weeks.
    source: "CD/14 tracks 1-6 — Craig presenting Ken Roberts methodology"

  - id: "HEUR-DK-178"
    title: "Monthly fee as quality filter: pricing filters out tire kickers. People in the p"
    content: >
      Monthly fee as quality filter: pricing filters out tire kickers. People in the program are serious
      about growing their business and willing to invest in themselves.
    source: "ACC-video-DK_7"

  - id: "MET-DK-178"
    title: "Craig's List Selection Methodology: (1) Always prefer RESPONSE lists over compil"
    content: >
      Craig's List Selection Methodology: (1) Always prefer RESPONSE lists over compiled lists — people
      who raised their hand. (2) Get the data card — check source (compiled vs direct response), universe
      size, selects available. (3) Get ON the list yourself — see what they're mailing. (4) Test in small
      quantities before scaling. (5) Track seasonality — best months vs worst months. (6) After
      identifying winners, test FORMAT variation on same list (postcard vs envelope). (7) Merge-purge
      against occupational selects for ultra-targeting.
    source: "CD/14 tracks 5-6, CD/15 tracks 1-5 — Craig's list management approach"

  - id: "HEUR-DK-179"
    title: "Partner directory with lock/remove capability is mandatory for coaching communit"
    content: >
      Partner directory with lock/remove capability is mandatory for coaching community. Members want to
      find and connect with each other — directory enables this.
    source: "ACC-video-DK_7"

  - id: "MET-DK-179"
    title: "George's Saturday Farm Presentation Methodology: (1) Lead ads in specialty sales"
    content: >
      George's Saturday Farm Presentation Methodology: (1) Lead ads in specialty sales magazines (2
      publications). (2) Inbound calls to HUMAN operators (never recorders). (3) Large package with
      full-color literature, farm photos, family photos, advisor photos. (4) Assign program advisor with
      personal letter and direct number. (5) 3-hour audio cassettes mailed — prospects listened 5x before
      buying. (6) Every Saturday: 3-hour presentation 9-12, open Q&A, then lunch at the farmhouse with
      wife. (7) Program advisors close after lunch. Result: 20 attendees/week, 100 total sales/week at
      $10,000+ each.
    source: "DVD/05 — George describing his complete sales process"

  - id: "HEUR-DK-180"
    title: "Competitive element drives coaching results: share metrics among members and let"
    content: >
      Competitive element drives coaching results: share metrics among members and let them rank
      themselves. People are competitive by nature — use it to motivate performance.
    source: "ACC-video-DK_7"

  - id: "MET-DK-180"
    title: "Don't-Like List Replacement Methodology: (1) Start consulting day by asking 'lis"
    content: >
      Don't-Like List Replacement Methodology: (1) Start consulting day by asking 'list everything you
      don't like about your business.' (2) Categorize: which pains can be REPLACED (eliminated entirely),
      which can be REINVENTED (reduced), which can only be REARRANGED (slightly improved). (3) Build the
      replacement pitch around the highest-pain items. (4) Use opportunity language for the replacement
      and improvement language only as fallback. (5) Price the replacement as premium (Rob Min: $900 →
      $8,500 with no response difference).
    source: "CD/13 tracks 1-4 — DK on building replacement from pain lists"

  - id: "HEUR-DK-181"
    title: "Menu of services in coaching: let clients choose from options (group call, one-o"
    content: >
      Menu of services in coaching: let clients choose from options (group call, one-on-one, both).
      Flexibility and customization increase retention and satisfaction.
    source: "ACC-video-DK_7"

  - id: "MET-DK-181"
    title: "Market Capacity Wall Management Methodology: (1) Track leading indicators: CPS c"
    content: >
      Market Capacity Wall Management Methodology: (1) Track leading indicators: CPS creep, response rate
      decline, steps-to-close increase. (2) When wall hits (CPS skyrockets), do NOT change creative first
      — change economics. (3) Add back-end products to support higher CPS. (4) Retract media buys to
      highest-performing markets/lists only. (5) Test format rotation on surviving lists. (6) If second
      wall hits, restructure entire business economics. DK got 8.5 years from Go By The Inch by changing
      economics, not the show.
    source: "CD/15 tracks 1-2 — DK on managing market saturation over time"

  - id: "HEUR-DK-182"
    title: "Fee raising is progressive: Jack Henry went from $500 to $5,000 (10x) over caree"
    content: >
      Fee raising is progressive: Jack Henry went from $500 to $5,000 (10x) over career as expertise
      compounded. Tapes from $49 to $490 as consulting fee rose.
    source: "ACC-video-DK_8"

  - id: "MET-DK-182"
    title: "Multiple Shovels Lead Maximization Methodology: (1) Generate leads for 3 specifi"
    content: >
      Multiple Shovels Lead Maximization Methodology: (1) Generate leads for 3 specific desired outcomes.
      (2) Present Offer A (red shovel — e.g., fix the staff/phones). (3) Unconverted leads go back into
      pool. (4) Lead-generate again from unconverted leads for same 3 outcomes. (5) Present Offer B (blue
      shovel — e.g., fix the patient who doesn't refer). (6) Repeat with Offer C (green shovel). (7) Each
      round allows higher initial spend on lead gen because total yield-per-lead increases. (8)
      Outspending becomes barrier to entry for competitors.
    source: "CD/15 track 5 — DK on maximizing lead yield through offer variation"

  - id: "HEUR-DK-183"
    title: "Product pricing follows consulting fee: when Jack Henry's fee hit $5,000, his ta"
    content: >
      Product pricing follows consulting fee: when Jack Henry's fee hit $5,000, his tapes went from $49 to
      $490. Ancillary products price proportionally to core service.
    source: "ACC-video-DK_8"

  - id: "MET-DK-183"
    title: "Opportunity Presentation Construction Methodology (DVD/04): (1) Give the thing a"
    content: >
      Opportunity Presentation Construction Methodology (DVD/04): (1) Give the thing a NAME — make it a
      toaster, not a process. (2) Create/identify a Blackie Story — dying man, legacy source. (3) Answer
      the reason-why objection upfront — 'why would any sane person reveal this?' (4) Build personal story
      with humble beginnings. (5) Create transformational story emphasizing BEFORE more than AFTER. (6)
      Construct larger-than-life figure (humble beginnings + proof of importance + possessions). (7) Use
      taste-like-chicken analogy for difficult propositions. (8) Resell the original dream they already
      had. (9) Identify and attack the common enemy/villain. (10) Build urgency from past loss — what they
      ALREADY missed. (11) Wrap in membership for value-without-achievement. (12) Elevate status — give
      them a business card, a title.
    source: "DVD/04 — DK presenting the 12-step opportunity construction method"

  - id: "HEUR-DK-184"
    title: "Guest speaker criteria for your platform: must provide value to YOUR list while"
    content: >
      Guest speaker criteria for your platform: must provide value to YOUR list while giving YOU toll
      position credit. You curate, they deliver, you get positioned as gatekeeper.
    source: "ACC-video-DK_8"

  - id: "MET-DK-184"
    title: "George's Employee Self-Management Methodology: (1) Put ALL office staff on a per"
    content: >
      George's Employee Self-Management Methodology: (1) Put ALL office staff on a percentage-of-income
      bonus. (2) Christmas bonuses of $10K-$20K each based on total company income. (3) Staff self-polices
      — non-performers eliminated by peers because they affect everyone's bonus. (4) Hire 'unwanted'
      people (ex-felons, people nobody else will hire) — they become the most loyal. (5) Never have a
      fancy office — show that the business can be run simply. (6) Top salespeople make $100K-$200K/year.
    source: "CD/11 track 1, DVD/05 — George on self-managing team economics"

  - id: "HEUR-DK-185"
    title: "Niche is mandatory for cold prospecting: cost of sale is $5K-$9K per client with"
    content: >
      Niche is mandatory for cold prospecting: cost of sale is $5K-$9K per client without niche focus.
      With niche, cost drops dramatically through specialization and reputation.
    source: "ACC-video-DK_8"

  - id: "MET-DK-185"
    title: "Birthday-Triggered Opportunity Marketing Methodology: (1) Identify benchmark bir"
    content: >
      Birthday-Triggered Opportunity Marketing Methodology: (1) Identify benchmark birthdays in your
      market (40, 45, 50, 55, 60, 65). (2) Obtain cold lists segmented by birthday (Dean Kelley
      Beckworth's method). (3) Mail opportunity offers in the birthday window when status-in-life
      reflection is highest. (4) Proven in cosmetic surgery/dentistry — extend to any opportunity niche.
      (5) Also target life events: divorce (+6 months), marriage of children, job loss.
    source: "CD/12 track 5 — DK on birthday-triggered opportunity marketing"

  - id: "HEUR-DK-186"
    title: "Hit list farming (David Ogilvy): identify 100 target companies, be relentlessly"
    content: >
      Hit list farming (David Ogilvy): identify 100 target companies, be relentlessly present. Farm the
      list — don't spray and pray.
    source: "ACC-video-DK_8"

  - id: "MET-DK-186"
    title: "Jeff Walker's Prelaunch Content Sequence methodology: Step 1 — Release free cont"
    content: >
      Jeff Walker's Prelaunch Content Sequence methodology: Step 1 — Release free content that teaches and
      builds authority. Step 2 — Layer mental triggers (reciprocity by giving value, authority by
      demonstrating expertise, community by showing others engaged, anticipation by hinting at what's
      coming). Step 3 — Address objections in prelaunch content before they arise. Step 4 — Open cart with
      time-limited window. Step 5 — Close cart with authentic scarcity. Result: $1.5M in 58 hours from
      email list.
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"

  - id: "HEUR-DK-187"
    title: "Cold selling requires 90+ days of relentless presence: Steve's pizza oven story"
    content: >
      Cold selling requires 90+ days of relentless presence: Steve's pizza oven story — 93+ days of daily
      business card visits before first sale. Persistence is the strategy.
    source: "ACC-video-DK_8"

  - id: "MET-DK-187"
    title: "Craig Simpson's List Selection methodology: Step 1 — Get data cards for all cand"
    content: >
      Craig Simpson's List Selection methodology: Step 1 — Get data cards for all candidate lists. Step 2
      — Set cards side by side and compare source type (compiled vs response), universe size, available
      selects, average unit of sale. Step 3 — For response lists, check recency and source behavior. Step
      4 — Check who else rents the list — if smart operators rent repeatedly, confidence is high. Step 5 —
      Get control copies of winners' mail pieces from InsideDirectMail.com. Step 6 — Find commonalities
      across all winners (payment terms, imagery, tone). Step 7 — Start your creative with their tested
      winning elements.
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"

  - id: "HEUR-DK-188"
    title: "Diagnostic selling: ask essay questions, not yes/no. 'How did you get in this bu"
    content: >
      Diagnostic selling: ask essay questions, not yes/no. 'How did you get in this business?' opens them
      up. Listen extensively, build diagnosis from their words, present solution in their language.
    source: "ACC-video-DK_8"

  - id: "MET-DK-188"
    title: "Ken Roberts 17-Week Maximization methodology: Step 1 — Purchase arrives with sti"
    content: >
      Ken Roberts 17-Week Maximization methodology: Step 1 — Purchase arrives with stick letter +
      immediate upsell (credit to Halbert). Step 2 — Over 17 weeks, mail 11 different offers (books, DVDs,
      advanced courses, newsletters, seminars). Step 3 — Quarterly reactivation mailings after 17 weeks.
      Step 4 — Track which products each buyer purchased. Step 5 — Calculate lifetime value and use it to
      justify higher acquisition costs. Step 6 — Continuously develop new products to offer. Result: 700K
      courses sold, $200M+ revenue.
    source: "OMC DVD/07 — Craig Simpson"

  - id: "HEUR-DK-189"
    title: "Wow them with materials: send bobbleheads, books with post-it notes on relevant"
    content: >
      Wow them with materials: send bobbleheads, books with post-it notes on relevant sections, clocks,
      unusual items. NOT press kits. Nobody throws out a bobblehead of a guy on a bull.
    source: "ACC-video-DK_8"

  - id: "MET-DK-189"
    title: "Seasonality Tracking methodology: Step 1 — Track response rates at the individua"
    content: >
      Seasonality Tracking methodology: Step 1 — Track response rates at the individual list level by
      month/season. Step 2 — Identify when each list's audience is most receptive (farmers: off-season;
      consumers: January). Step 3 — Identify dead zones (harvest for farmers, holidays for consumers).
      Step 4 — Heavy-up mailing during peak responsiveness for each list. Step 5 — Zero mailing during
      dead zones. Step 6 — Also track buyer seasonality independently of list seasonality.
    source: "OMC DVD/07 — Craig Simpson (farming + Ken Roberts examples)"

  - id: "HEUR-DK-190"
    title: "77/100 CEO response rate: interview request for book gets 77% response from top"
    content: >
      77/100 CEO response rate: interview request for book gets 77% response from top executives. Media is
      a legitimate entry mechanism that bypasses gatekeepers.
    source: "ACC-video-DK_8"

  - id: "MET-DK-190"
    title: "Competitive Intelligence as Prospect methodology: Step 1 — Identify your top com"
    content: >
      Competitive Intelligence as Prospect methodology: Step 1 — Identify your top competitors. Step 2 —
      Become their prospect: sign up, request info, attend events. Step 3 — Document everything they send
      you over 90 days. Step 4 — Source their customer data (with awareness of sourcing bias). Step 5 —
      Observe their operations directly. Step 6 — Analyze their list rentals (who else rents the same
      lists). Step 7 — Read/watch what your shared prospects read/watch. Step 8 — Learn their tribal
      language and mirror it.
    source: "OMC CD/19 track 1 + CD/18 tracks 5-6 — Dan Kennedy"

  - id: "HEUR-DK-191"
    title: "Fine point pink pen on faxes and printed materials: handwritten hot pink notes g"
    content: >
      Fine point pink pen on faxes and printed materials: handwritten hot pink notes get attention and
      response. Everyone else sends printed — you write on it in color.
    source: "ACC-video-DK_9"

  - id: "MET-DK-191"
    title: "Jeff Walker's Certification Program Launch methodology: Step 1 — Survey audience"
    content: >
      Jeff Walker's Certification Program Launch methodology: Step 1 — Survey audience to measure demand
      (312 of 2,300 = proof). Step 2 — Announce limited spots with rigorous selection (130 apply for 50).
      Step 3 — Price with skin-in-the-game structure ($5K down + $20K from profits). Step 4 — At the live
      event, upsell platinum coaching ($10K waiving the $20K). Step 5 — Create assets inventory for each
      participant. Step 6 — Build social proof from selection process itself. Step 7 — Use geography proof
      to overcome location objections.
    source: "OMC CD/16 tracks 5-6, CD/17 tracks 1-4 — Jeff Walker"

  - id: "HEUR-DK-192"
    title: "Send items nobody else sends: bobbleheads, clocks, unusual gifts. 'They ain't ch"
    content: >
      Send items nobody else sends: bobbleheads, clocks, unusual gifts. 'They ain't chucking them.' Kids
      get them, they sit on office shelves — you stay top of mind.
    source: "ACC-video-DK_9"

  - id: "MET-DK-192"
    title: "Unconverted Lead Recovery methodology: Step 1 — Appointment no-sale: don't disca"
    content: >
      Unconverted Lead Recovery methodology: Step 1 — Appointment no-sale: don't discard, enter follow-up.
      Step 2 — Handoff to different closer (tele-shark to supervisor). Step 3 — Unending follow-up cycles
      with varied messaging. Step 4 — Switch to different opportunity framing (blue shovel vs red shovel).
      Step 5 — Offer second-tier/downsell product. Step 6 — If still unconverted, switch identity (alter
      ego business mails same list). Step 7 — Loop-back-up mechanism: after downsell purchase, offer
      original product again.
    source: "OMC CD/19 tracks 4-8 — Dan Kennedy"

  - id: "HEUR-DK-193"
    title: "Infomercial golden rule: 30 minutes where viewer doesn't realize it's a commerci"
    content: >
      Infomercial golden rule: 30 minutes where viewer doesn't realize it's a commercial. Interweave
      testimonials, benefits, demonstration throughout. Don't separate entertainment from pitch.
    source: "ACC-video-DK_9"

  - id: "MET-DK-193"
    title: "Multiple Identity List Exploitation methodology: Step 1 — Identify your most pro"
    content: >
      Multiple Identity List Exploitation methodology: Step 1 — Identify your most productive list
      segment. Step 2 — Create identity A (e.g., cowboy hat farmer guy) with format A (digest). Step 3 —
      Create identity B (e.g., housewife with five kids) with format B (letter) at different price point.
      Step 4 — Mail segment with identity A. Step 5 — Two weeks later, mail same segment with identity B.
      Step 6 — If possible, create identity C with format C. Step 7 — Rotate continuously through
      identities. Each pass extracts buyers the other identities missed.
    source: "OMC CD/19 tracks 6-7, DVD/07 — Dan Kennedy"

  - id: "HEUR-DK-194"
    title: "Most people price 20-30% too low: 'If you're pricing at what you think is the ri"
    content: >
      Most people price 20-30% too low: 'If you're pricing at what you think is the right price, you're
      probably pricing too low.' Try raising prices — often zero customer loss.
    source: "ACC-video-DK_9"

  - id: "MET-DK-194"
    title: "Market Saturation Response methodology: Step 1 — Monitor leading indicators: cos"
    content: >
      Market Saturation Response methodology: Step 1 — Monitor leading indicators: cost per lead, cost per
      sale, response percentages, steps to conversion. Step 2 — When gradual creep becomes apparent, begin
      economic restructuring (don't wait for the wall). Step 3 — When wall hits (costs skyrocket), pull
      back to highest-probability list segments. Step 4 — Retard media buys to best-performing geographies
      only. Step 5 — Create new economic models (accept higher CPA if LTV supports it). Step 6 — If
      economics can't work, find new soil (new list, new niche, new identity).
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch + Think and Grow Rich TV examples)"

  - id: "HEUR-DK-195"
    title: "Drip on media contacts 12+ months before ask: DK started sending stuff to magazi"
    content: >
      Drip on media contacts 12+ months before ask: DK started sending stuff to magazine interviewer a
      year before the interview was booked. Never asked for anything — just dripped.
    source: "ACC-video-DK_9"

  - id: "MET-DK-195"
    title: "Direct Mail Format Rotation methodology: Step 1 — Develop multiple formats that"
    content: >
      Direct Mail Format Rotation methodology: Step 1 — Develop multiple formats that work (postcard,
      envelope piece, digest, booklet). Step 2 — Test each format on the same list segment. Step 3 —
      Confirm minimal respondent overlap between formats. Step 4 — Mail format A to full segment. Step 5 —
      Mail format B to same segment 2-3 weeks later. Step 6 — Same message, different enough appearance to
      avoid 'numb' reaction. Step 7 — This doubles or triples effective use of your best list without list
      fatigue.
    source: "OMC DVD/07 — Dan Kennedy (Michael's dental + Ron Ipec examples)"

  - id: "HEUR-DK-196"
    title: "Cost of client acquisition $5K-$9K without system: must be systematic and niche-"
    content: >
      Cost of client acquisition $5K-$9K without system: must be systematic and niche-focused to reduce.
      Random prospecting is expensive and inefficient.
    source: "ACC-video-DK_9"

  - id: "MET-DK-196"
    title: "PLF Prelaunch Content Sequence: Video 1 — Set the hook for a story + present the"
    content: >
      PLF Prelaunch Content Sequence: Video 1 — Set the hook for a story + present the opportunity + teach
      ABOUT the opportunity (not how). No selling. Video 2 — Show how people like them applied the
      opportunity to their lives. Video 3 — More details + 2/3 through, transition to 'I'm creating this
      program.' Video 4 — Sales video/letter. Each builds on the prior, BS detector relaxes as no selling
      occurs.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-197"
    title: "Behavior observation predicts coaching success: watch what they DO at events and"
    content: >
      Behavior observation predicts coaching success: watch what they DO at events and in groups, not what
      they say. 'I want one of everything' is a success signal.
    source: "ACC-video-DK_10"

  - id: "MET-DK-197"
    title: "PLF Certification Business Creation Method: 1) Identify massive deal flow you ca"
    content: >
      PLF Certification Business Creation Method: 1) Identify massive deal flow you can't handle, 2) Ask
      'how can I train talent AND make money doing it?', 3) Inventory assets (reputation,
      hyperresponsives, event skill, pent-up demand), 4) Assess dangers (brand dilution, legal, different
      market), 5) Two-step: internal launch of high-end event to hyperresponsives, then JV launch of home
      study to wider audience, 6) Cherry-pick initial students for success stories, 7) Use their success
      as proof for wider rollout.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-198"
    title: "IP theft response sequence: (1) cease and desist, (2) outrace with speed/volume,"
    content: >
      IP theft response sequence: (1) cease and desist, (2) outrace with speed/volume, (3) plant decoy bad
      ads to trap thieves. Don't get consumed by litigation.
    source: "ACC-video-DK_10"

  - id: "MET-DK-198"
    title: "PLF Survey-to-Proof Method: 1) Survey your list asking 'would you hire me to do"
    content: >
      PLF Survey-to-Proof Method: 1) Survey your list asking 'would you hire me to do X?', 2) Follow with
      'would you hire one of my trained people?', 3) Use percentage results as social proof in prelaunch
      ('74.2% said yes'), 4) Calculate implied demand ('228 clients waiting for you'), 5) Use math
      escalation ('I only sent to 2,000 — I have 70,000 more'), 6) Present your financial bet ('I'm taking
      an $800,000 gamble on you').
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-199"
    title: "Payment models menu: per hour, term programs, per project, retainer, till-forbid"
    content: >
      Payment models menu: per hour, term programs, per project, retainer, till-forbid recurring. Use the
      model that fits the situation and maximizes your leverage.
    source: "ACC-video-DK_10"

  - id: "MET-DK-199"
    title: "PLF Coaching Conversion at Live Event: 1) Teach intensely for 5 days, 2) At end"
    content: >
      PLF Coaching Conversion at Live Event: 1) Teach intensely for 5 days, 2) At end say 'Monday is
      coming, you'll lose momentum,' 3) Offer coaching program, 4) Price it as savings: 'Not going to cost
      you money — $10K coaching WAIVES the $20K you owe from profits,' 5) Result: 37-45 of 50 attendees
      convert.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-200"
    title: "Group coaching buddies system: pair members for mutual accountability and suppor"
    content: >
      Group coaching buddies system: pair members for mutual accountability and support. Creates retention
      through peer connection beyond coach-client relationship.
    source: "ACC-video-DK_10"

  - id: "MET-DK-200"
    title: "Reverse Engineering Ideal Client Method: 1) If you have customers, identify who"
    content: >
      Reverse Engineering Ideal Client Method: 1) If you have customers, identify who behaved and spent
      properly, reverse engineer their profile, 2) If starting from scratch, find successful competitors,
      access all their marketing material, 3) Read their copy for clues (married couple paragraph = target
      married people, scrap singles from lists), 4) Go where prospects gather and observe (OTB, seminars,
      Walmart, Neiman's), 5) Validate with focus groups, 6) Constantly refine from your own testing.
    source: "DVD10"

  - id: "HEUR-DK-201"
    title: "Three levers for getting paid more: (1) charge more, (2) select better clients,"
    content: >
      Three levers for getting paid more: (1) charge more, (2) select better clients, (3) manipulate
      supply and demand. All three work independently and compound together.
    source: "ACC-video-DK_10"

  - id: "MET-DK-201"
    title: "The Handoff Close System: 1) Salesperson takes their best shot, 2) Before lettin"
    content: >
      The Handoff Close System: 1) Salesperson takes their best shot, 2) Before letting prospect go,
      required to say 'I'm required to let you talk to my supervisor,' 3) Supervisor starts the entire
      process over from the beginning, 4) If supervisor can't close, pass to third person, 5) In teleshark
      operations: if Charlie can't close by 5th call, switch to Bob; if Bob can't close by 5th call,
      switch back to Charlie.
    source: "DVD09-DVD10"

  - id: "HEUR-DK-202"
    title: "Avoid too-easy payment terms: easy terms reduce commitment and increase dropout."
    content: >
      Avoid too-easy payment terms: easy terms reduce commitment and increase dropout. Make them feel the
      investment to maintain their engagement.
    source: "ACC-video-DK_10"

  - id: "MET-DK-202"
    title: "Post-Event Non-Buyer Follow-Up System: 1) Remove buyers from event attendee list"
    content: >
      Post-Event Non-Buyer Follow-Up System: 1) Remove buyers from event attendee list, 2) Mail all
      non-buyers a long sales letter within days, 3) Address the 5 reasons people don't buy right away, 4)
      Offer the same deal they could have gotten at the event, 5) Rarely breaks even on immediate sale but
      customer value is enormous. Never skip this — it worked every single city, every single time.
    source: "DVD09"


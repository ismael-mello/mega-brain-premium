    source: "ACC-video-DK_11"

  - id: "MET-DK-220"
    title: "Shame-Based Copy Construction"
    content: >
      Step-by-step: 1) IDENTIFY the 'Loserville' — what unwanted state does audience fear most? 2) Use
      SHAME THESAURUS to expand (left out, uncool, incompetent, etc). 3) Show FAMILIAR EXAMPLES (classic
      ads: 'Jones Must Be Broke' 1923, 'They Laughed When I Sat Down' Caples). 4) Create the ESCAPE —
      position product as vehicle from shame to triumph. 5) Key insight: even Forbes 400 are
      hyper-sensitive to these triggers.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"


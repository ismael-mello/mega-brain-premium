      Attainability — it's practically achievable, not just possible 4) Personal possibility — it's
      possible for ME specifically 5) This thing is different — profoundly different from everything on
      the shrink wrap shelf.
    source: "CD5-track1-5"

  - id: "FW-DK-234"
    title: "The Newsletter Content Ratio Model: Color-code your newsletter/content. Blue = a"
    content: >

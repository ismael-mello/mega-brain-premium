    source: "MM-BB-CD1"

  - id: "FIL-DK-252"
    title: "Credentials do not matter - the marketplace is outcome-oriented, not credential-"
    content: "Credentials do not matter - the marketplace is outcome-oriented, not credential-oriented"
    source: "MM-BB-CD1"

  - id: "FIL-DK-253"
    title: "Self-appointment works just as well as being anointed - and you do not have to w"

    source: "OMC CD/18 tracks 3-4 — Dan Kennedy (lessons from direct selling/MLM)"

  - id: "FIL-DK-390"
    title: "People need a vehicle they can actually do. Don Dwyer at SMI discovered the best"
    content: >
      People need a vehicle they can actually do. Don Dwyer at SMI discovered the best salespeople for
      cleaning franchises were people who had previously been in sales — they needed something to sell,

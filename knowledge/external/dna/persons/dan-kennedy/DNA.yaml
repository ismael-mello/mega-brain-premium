      E-Factor (Fear, Guilt, Greed, Pride, Lust). 5) ENSURE purchase = accomplishment pathway exists. 6)
      VALIDATE: does every word on the page further the sale?
    source: "Sorcery/transcription_mp3_CD1.txt + PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"

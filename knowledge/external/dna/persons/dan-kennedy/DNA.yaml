    tags: [referrals, referral-machine]

# ============================================================
# DNA APPEND — MAGNETIC EMAIL MARKETING (MEM)
# Source: magnetic-email-marketing (Sessions 1-4 + ICFSG)
# Speakers: Dan Kennedy + Dave Dee (primary), Brian Kruzberger, Adam Speel, Justin Brooke (bonus guests)
# Elements: 59 total (FIL:15 MM:10 HEUR:20 FW:8 MET:6)
# Extraction date: 2026-03-16
# ============================================================

# --- L1_PHILOSOPHIES (MEM) ---
  - id: "FIL-DK-578"
    title: "My business is different is the number one business killer"
    content: "The biggest mistake business owners make is thinking 'my business is different.' Successful people ask 'how can I make this work?' while unsuccessful people say 'that doesn't apply to me.' This single belief determines success or failure."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, mindset]
  - id: "FIL-DK-579"
    title: "Money is hidden in your existing customer list - fastest cash is there not new leads"
    content: "The real value in your business is not in the building or equipment - it's in the people, your list. They are waiting to give you money provided you offer something they want need or desire. Fastest path to cash is existing list not new lead generation."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, list-management]
  - id: "FIL-DK-580"
    title: "Email is selling - you cannot create cash flow without making an offer and selling"
    content: "Make no doubt about it you are actually selling here. You're not selling face to face - you're using email as your selling tool but you're selling. I don't know a way to create an instant cash flow surge without making an offer and without selling."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, selling]
  - id: "FIL-DK-581"
    title: "System over tactics - stop doing one-off marketing put everything into a system"
    content: "We want you to stop doing one-off marketing things one-off marketing techniques. We want you to put it into a system all of your marketing into a system. Transform your marketing from random acts to systematic campaigns."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, systems]
  - id: "FIL-DK-582"
    title: "Relationship trumps cleverness - with relationship subject line cleverness is unnecessary"
    content: "Relationship trumps just about everything. This gets easier when you are emailing to people who want to receive your email and will open it because it is from you. Then a lot of cleverness about subject line becomes unnecessary."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, relationships]
  - id: "FIL-DK-583"
    title: "A six implemented beats a nine never done"
    content: "There's something to be said for a six implemented versus a nine never done. This implemented is a whole lot better than something twice as good not implemented. Perfect action paralysis kills more businesses than imperfect action."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, action]
  - id: "FIL-DK-584"
    title: "The tubes of the internet are clogged - but charging thins the herd for smart marketers"
    content: "There's so much email that people are overwhelmed. Everyone is sorting with a delete button. But if there is taxing and charging for email that can actually be good if you know what you're doing - it thins the herd like postage stamps did for mail."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, deliverability]
  - id: "FIL-DK-585"
    title: "A tactic known is a tactic blown - use promotional techniques sparingly"
    content: "As we like to say in the business a tactic known is a tactic blown. Plan promotional campaigns in your marketing calendar. Don't overuse any single technique or your audience builds immunity to it."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, strategy]
  - id: "FIL-DK-586"
    title: "Never be corporate or institutional - personal conversational writing always wins"
    content: "One of the biggest mistakes is making it sound like Mr or Ms Professional big corporation. It is much easier to be uninteresting and boring in a corporate institutional voice than in a personal voice. You are almost always going to do better conversationally communicating as one human would to the next."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, copywriting]
  - id: "FIL-DK-587"
    title: "Readership is sequential agreement - line by line they agree to keep reading"
    content: "Readership is about both a sequential agreement and a constant agreement. The person is predisposed to try and not stay with you. If the first two sentences they can get rid of it they're getting rid of it. Sequential agreement: I'm going to read some more."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, copywriting]
  - id: "FIL-DK-588"
    title: "Everything is selling - door to door guy speaker on stage email writer same thing"
    content: "The email is akin to the door-to-door sales guy is akin to the speaker walking out on stage is akin to the first 10 seconds of a television commercial. Try putting corporate speak in any of those environments and see how you do."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, selling]
  - id: "FIL-DK-589"
    title: "Be holistic - email marketing fits in context of broader whole marketing system"
    content: "You really got to step back and take a look at your entire approach to lead generation customer acquisition conversion of one time buyer to committed customer back end sources of revenue and then fit these things together. View not component parts but integrated process."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, systems]
  - id: "FIL-DK-590"
    title: "Direct mail still works and works better than ever because fewer do it"
    content: "Direct mail mailing your customers still works. In fact it's working better than it ever has before. The reason is because fewer and fewer business owners are doing it. So your mail piece stands out."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, direct-mail]
  - id: "FIL-DK-591"
    title: "Your list is not a database - it is an audience of people waiting for relevant offers"
    content: "Hardly any business sells one thing. Lead generation is about giving people an opportunity to step forward and identify a particular interest. When you don't take advantage of segmentation capability you are doing broadcasting when you don't have to be in a broadcast media. It's foolish."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, segmentation]
  - id: "FIL-DK-592"
    title: "Language matters - templates look simple but every word is deliberate"
    content: "When you look at the templates you may say God that doesn't look like anything this looks really simple. They look simple but they're not simple. A lot of thought has gone into it. Language matters a lot. Structure matters but language matters a lot."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, copywriting]

# --- L2_MENTAL_MODELS (MEM) ---
  - id: "MM-DK-572"
    title: "Lead Generation Magnet - coined by DK - magnetic offer in exchange for contact info"
    content: "When you want people to give you information about themselves you have to give something in exchange. Something magnetic interesting compelling alarming opportunity-revealing that I want so much I am willing to exchange whatever information knowing it includes permission for you to pursue me."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, lead-generation]
  - id: "MM-DK-573"
    title: "Threshold of Information Exchange - email less than email plus address less than phone"
    content: "You have climbing up the mountain of difficulty. Email, email and full address, email and full address and phone numbers, email full address phone numbers and answer five questions so we can segment you. Each level requires more magnetic offer."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, lead-generation]
  - id: "MM-DK-574"
    title: "Cookies vs Food vs Meals - ascending levels of lead generation magnets"
    content: "Cookies are the easiest level - checklists coupons quick wins. Food is mid-level - reports guides books. Meals are substantial - webinars courses consultations. Match LGM level to information threshold required."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, lead-generation]
  - id: "MM-DK-575"
    title: "Sequential Agreement Model - every interaction is chain of will they stay or leave"
    content: "In every selling situation there is will they stay and proceed long enough that I can get anything done with this person. The door-to-door guy whose opening line had to get the chain released and the door opened wider. Then get invited in. Same for email."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, persuasion]
  - id: "MM-DK-576"
    title: "Short intense sequence plus maintenance forever - follow-up structure"
    content: "In most cases there should be a relatively short number of follow-up steps intensely. And then a maintenance level like forever. And then moving them back into an intense sequence by one mechanism or another based on their response."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, follow-up]
  - id: "MM-DK-577"
    title: "Calendar as Campaign Generator - holidays events designated days fuel promotions"
    content: "The calendar gives you pretty much an idea day an idea week an idea month. Beyond obvious seasonal and holiday situations there are Congress-designated days for everything. Halloween is now a month. Easter is two weeks. The calendar is your friend."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, campaigns]
  - id: "MM-DK-578"
    title: "Broadcast vs Narrowcast - not segmenting is broadcasting in non-broadcast medium"
    content: "When you dump everybody into one big general database and everybody gets the same email regardless of what they do or don't do - that is broadcasting when you don't have to be in a broadcast media. This is the mistake most people make."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, segmentation]
  - id: "MM-DK-579"
    title: "Pain and Pleasure twin forces in follow-up sequences"
    content: "As Tony Robbins teaches people are motivated by twin opposing forces pain and pleasure. First two emails focus on pleasure. Day 3 email uses pain - what happens if they don't take advantage of the opportunity."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, persuasion]
  - id: "MM-DK-580"
    title: "Multiple LGMs for Segmentation - one audience different magnets for different interests"
    content: "A chiropractor has people with back pain headaches knee pain insomnia. A financial advisor has income-concerned wealth-transfer-concerned charitable-giving-concerned. Create different lead generation magnets to segment by interest."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, segmentation]
  - id: "MM-DK-581"
    title: "First investment in paid ads equals data collection - second investment equals ROI"
    content: "Most of the time first investment in paid ads is not a home run. When you do that you get data of what was working and what was not working. The second investment is where the ROI comes from. Biggest mistake is stopping after first investment."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, advertising, guest-justin-brooke]

# --- L3_HEURISTICS (MEM) ---
  - id: "HEUR-DK-744"
    title: "3-step email sequence creates instant cash flow surge from existing list"
    content: "Three emails over three days to your existing customer list creates an instant cash flow surge. Day 1 goodwill plus offer. Day 2 resell plus new angle. Day 3 urgency plus deadline. GKIC made over 250000 dollars from five templates using this system."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cash-flow]
  - id: "HEUR-DK-745"
    title: "Day 1 email - goodwill plus limited time offer plus testimonials plus CTA"
    content: "First email establishes goodwill acknowledges relationship and presents limited-time offer. Include testimonials or results from others. Clear call to action. Set up the deadline that Day 3 will enforce."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cash-flow]
  - id: "HEUR-DK-746"
    title: "Day 2 email - resell with new angle plus additional testimonials and CTA"
    content: "Second email resells the offer from a different angle. Add new testimonials or results. Remind of the opportunity. Reinforce the deadline mentioned in Day 1."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cash-flow]
  - id: "HEUR-DK-747"
    title: "Day 3 email - pain of not buying plus overcome objections plus deadline PS"
    content: "Third email discusses what happens if they don't buy. Overcome objections by listing all possible objections and answering them in advance. PS highlights deadline. Notice surge of additional sales right at the deadline."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cash-flow]
  - id: "HEUR-DK-748"
    title: "No deadline equals no urgency - must have time or quantity deadline always"
    content: "If there's no deadline there's no sense of urgency. We're asking people to take action and give you money they weren't planning on. Time deadline based around a date. Quantity deadline based on limited availability. Without either it is very difficult to move people to action."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, urgency]
  - id: "HEUR-DK-749"
    title: "Do BOTH email AND direct mail to amp up any campaign"
    content: "If you really want to amp up this system you will do both email and direct mail. A lot of people no matter how good your email is aren't reading it. Some don't check email for over a week. Direct mail plus email reaches both audiences."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, multichannel]
  - id: "HEUR-DK-750"
    title: "Subject line equals teaser copy on envelope equals headline for the ad"
    content: "The subject line is essentially the same as teaser copy on the outside of an envelope or the complete absence of anything revealing it is commercial. It is the same as the headline for the ad. Same arena different medium."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines]
  - id: "HEUR-DK-751"
    title: "Seven types of subject lines - question how-to secrets news personal command controversy"
    content: "Seven reliable subject line types: 1-Intriguing question (open loop) 2-How-to (specific benefit claim) 3-Secrets (unusual secrets to X) 4-News/announcement 5-Personal (first name plus casual question) 6-Command/CTA 7-Controversy/curiosity"
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines]
  - id: "HEUR-DK-752"
    title: "Intriguing question buries claims you cannot make as assertive statements"
    content: "You can sometimes bury a claim in a question that you cannot make as an assertive statement. 'Do nitrous oxide supplements really replace Viagra?' You can ask that as a question but cannot say it as a claim. And it has higher intrigue factor."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines, copywriting]
  - id: "HEUR-DK-753"
    title: "How-to declining in power due to declining willingness to do things"
    content: "How-to is not as powerful as it once was due to decline of willingness to do things. Real variables are application by audience - are you talking to do-it-yourselfers or ambitious individuals. It concisely makes a specific benefit claim - you'll know HOW TO do something not just know about something."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines]
  - id: "HEUR-DK-754"
    title: "The word hey before a name creates pattern interrupt in subject lines"
    content: "Personal subject lines like 'Dave, what's going on?' from Dan Kennedy gets huge open rate because it sounds like he's personally reaching out - maybe even pissed. But only works with established relationship."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines]
  - id: "HEUR-DK-755"
    title: "Sorry I missed you - magic words for voice broadcast messages"
    content: "If you do voice broadcast that leaves a message the magic words are 'sorry I missed you.' That's what makes the message seem like a real message. Without those words the rest of the script won't get nearly the result."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, voice-broadcast]
  - id: "HEUR-DK-756"
    title: "Negative odd-sounding subject lines outperform positive ones"
    content: "Odd-sounding negative subject lines consistently outperform positive professional-sounding ones. Controversial subjects create curiosity that compels opening. But must be mixed with other types - variety is key."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines]
  - id: "HEUR-DK-757"
    title: "List all possible objections and answer them in advance in Day 3 email"
    content: "One of the most important things in any type of selling is make a list of ALL possible objections your customer might have. Why wouldn't they take advantage of this opportunity? Work out in advance how you could answer those objections."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, objection-handling]
  - id: "HEUR-DK-758"
    title: "Follow-up is reselling not reminding - never just say remember you signed up"
    content: "Follow-up is not about reminders. It's not about reminders. It's reselling. Persuading. Motivating. Reselling. In some cases shaming. Most people's follow-up says 'remember you signed up for this thing' which is useless."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, follow-up]
  - id: "HEUR-DK-759"
    title: "Online instructions presume common knowledge that may not be common"
    content: "One of the mistakes made a lot online is web designer people presuming common knowledge about online things that may not be common to all people coming to the site. There's still a significant number who don't know the underlying item is what you click on."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, landing-pages]
  - id: "HEUR-DK-760"
    title: "Lead capture page must verify location restate offer give instructions reassure"
    content: "Landing page elements: 1-Verify they came to the right place 2-Restate reason they came and the offer 3-Instructions on what to do now 4-Optional reassurances about what happens next."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, landing-pages]
  - id: "HEUR-DK-761"
    title: "Three level LGM test - cookie food or full meal determines commitment threshold"
    content: "Cookie equals free checklist or coupon - lowest commitment. Food equals free report or guide - medium commitment. Full meal equals free consultation webinar or course - highest commitment but highest quality leads."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, lead-generation]
  - id: "HEUR-DK-762"
    title: "QR codes generally discouraged - sends people where you don't want them creates exclusion"
    content: "QR codes tend to not work well. They send people where you do not necessarily want them to go. They discourage response from people not comfortable using them. Not universally comfortable. Exception: extending articles with video in your own media environment."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, technology]
  - id: "HEUR-DK-763"
    title: "Too much discounting destroys customer value - Kohl's Macy's JCPenney problem"
    content: "You don't want to do too much price discount deadline driven cash flow surge or you destroy all customer value. It's the problem that Kohl's Macy's and Penney's got themselves into. Use sparingly as part of marketing calendar."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, pricing]

# --- L4_FRAMEWORKS (MEM) ---
  - id: "FW-DK-739"
    title: "4-Session Email Marketing Recipe: Collection > Attention > Conversion > Monetization"
    content: "Magnetic Email Marketing System is a cookbook with four segments: Session 1 Collection (lead gen email capture) Session 2 Attention (subject lines that get opened) Session 3 Conversion (automated follow-up sequences) Session 4 Monetization (campaign types for revenue)."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, systems]
  - id: "FW-DK-740"
    title: "Instant Cash Flow Surge 3-Day System: Day 1 offer Day 2 resell Day 3 urgency"
    content: "Three-step system for instant cash flow from existing list. Day 1: goodwill plus offer plus testimonials plus CTA. Day 2: resell from new angle plus additional proof. Day 3: pain of not buying plus objection handling plus deadline PS. Can be email or direct mail."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cash-flow]
  - id: "FW-DK-741"
    title: "7 Subject Line Types Framework for email open rates"
    content: "Seven proven subject line categories: 1-Intriguing Question (open loop) 2-How-To (specific benefit) 3-Secrets (unusual secrets to X) 4-News/Announcement 5-Personal (first name plus question) 6-Command/CTA 7-Controversy/Curiosity. Must mix and rotate types."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, subject-lines]
  - id: "FW-DK-742"
    title: "Lead Capture Page Architecture: verify > restate > instruct > reassure"
    content: "Four-element lead capture page: 1-Verify arrival at right place (logo brand visual) 2-Restate the reason they came and the LGM offer 3-Instructions on exactly what to do now 4-Optional reassurances about what happens next after they submit."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, landing-pages]
  - id: "FW-DK-743"
    title: "Follow-up Architecture: intense short sequence plus maintenance forever plus re-trigger"
    content: "Short number of intensive follow-up steps immediately. Then maintenance level communications forever. Then mechanism to move them back into intense sequence based on behavior clicks or new LGM response."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, follow-up]
  - id: "FW-DK-744"
    title: "7 Email Types Framework: content lead-gen promotional educational event referral reactivation"
    content: "Seven types of emails every business should send: content/value emails lead generation emails promotional/offer emails educational emails event invitation sequences referral request campaigns and reactivation campaigns for lapsed contacts."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, campaigns]
  - id: "FW-DK-745"
    title: "Direct Response Email vs Image Email: always include measurable call to action"
    content: "Most business owners do image advertising modeled after big corporations. Direct response email always has a specific measurable call to action. The only way we know there's anybody paying attention is if they have to do something as result of reading it."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, direct-response]
  - id: "FW-DK-746"
    title: "Segmentation through LGM Response: raise hand identify interest get targeted sequence"
    content: "Give people opportunity to raise hand and respond to different LGMs. By their clicks purchases and hands raised to different lead generation magnets they tell us what they want to hear more about. Segment into targeted campaigns by behavior."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, segmentation]

# --- L5_METHODOLOGIES (MEM) ---
  - id: "MET-DK-623"
    title: "Cash Flow Surge 3-Day Execution: template fill-in-blank to cash in bank"
    content: "Step-by-step: 1-Identify offer for existing list 2-Fill in Day 1 template (goodwill plus offer plus testimonials) 3-Send Day 1 4-Fill in Day 2 template (new angle resell) 5-Send Day 2 6-Fill in Day 3 template (pain plus objections plus deadline) 7-Send Day 3 8-Close at deadline. Can convert to direct mail by making subject line the headline."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cash-flow]
  - id: "MET-DK-624"
    title: "Lead Capture Page Build: right place verify to conversion optimization"
    content: "Build landing page: verify arrival (brand logo) restate offer (picture of LGM) provide clear instructions (fill in email click here) add reassurances (what happens next). Test full contact vs email-only based on LGM value level."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, landing-pages]
  - id: "MET-DK-625"
    title: "Holiday Campaign Calendar Planning: map entire year of promotional campaigns"
    content: "Map all 12 months with promotional campaign opportunities: major holidays plus industry-specific days plus current events plus seasonal. Plan in marketing calendar in advance. Execute via email plus direct mail combination for maximum impact."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, campaigns]
  - id: "MET-DK-626"
    title: "Email to Direct Mail Conversion: subject line becomes headline CTA becomes order form"
    content: "Convert any email campaign to direct mail: subject line becomes the headline. Email body becomes letter body. Click here CTA becomes phone number or order form. PS stays as PS. Do both simultaneously for maximum reach."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, direct-mail]
  - id: "MET-DK-627"
    title: "Automated Opt-in Follow-up Sequence: confirm value segment sell maintain"
    content: "After opt-in: immediate confirmation email with delivery of promised LGM. Series of value-add emails establishing authority. Segmentation emails with different LGMs to identify specific interests. Sales sequence for identified interests. Maintenance communications forever."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, follow-up]
  - id: "MET-DK-628"
    title: "Cold Email to Meeting System: intro plus leverage plus follow-up equals meeting"
    content: "Brian Kruzberger method: Email intro identifying correct contact mention writing to persons A B C in that pursuit. Company one-liner who you help and how. Create opportunity for recipient not pitch. Follow-up 4-5 times. Track with tools like Yesware Sidekick."
    source: "magnetic-email-marketing"
    tags: [email-marketing, magnetic-email-marketing, cold-email, guest-brian-kruzberger]

- id: "MET-DK-629"
    title: "Diagnostic Day Methodology - pre-day setup live hunting and post-day obligation"
    content: "Pre-day: tell them to record, spell out logistics, send questionnaire. During: don't pre-organize materials - go to storeroom and root around live (hunting, killing, dragging back). Post-day: delay some deliverables, come back with hunted information in follow-up letter, build obligation through multiple touchpoints."
    source: "business-of-copywriting"
    tags: [consulting, diagnostic-day, methodology, obligation-building]
  - id: "MET-DK-630"
    title: "Client Onboarding Seven-Step Sequence - voicemail to contract"
    content: "Step 1: They call, get voicemail. Step 2: Assistant calls back with process. Step 3: They send 1-2 page fax. Step 4: Review and decision in about a week. Step 5: Phone appointment (clumped into 1-2 days per month). Step 6: Paid consulting day if warranted. Step 7: Contract."
    source: "business-of-copywriting"
    tags: [client-attraction, onboarding, process, positioning]
  - id: "MET-DK-631"
    title: "Referral Handling Five-Step - never pursue always control the narrative"
    content: "Step 1: Never take the prospect's contact from referrer. Step 2: Tell referrer to have prospect contact you. Step 3: Optionally give referrer a book to send. Step 4: Always report back to referrer regardless of outcome. Step 5: Use report as excuse for additional business with referrer."
    source: "business-of-copywriting"
    tags: [referrals, client-attraction, positioning, relationship-building]
  - id: "MET-DK-632"
    title: "Fee Resistance Prevention Seven-Step - desensitize then make non-negotiable"
    content: "Step 1: Desensitize early with fee range mentions. Step 2: Use takeaway (I rarely take new clients). Step 3: Standard contract with block typeface for non-negotiable terms. Step 4: Never use word negotiate. Step 5: If they object, present as standard everyone agrees to. Step 6: Frame objections as questioning your integrity/value. Step 7: Set deadline - sign or don't."
    source: "business-of-copywriting"
    tags: [pricing, fee-resistance, contracts, methodology]
  - id: "MET-DK-633"
    title: "Critique-to-Client Pipeline - free coupon to six-figure project"
    content: "Step 1: Offer critique coupon in books/products. Step 2: Most get standard critique form. Step 3: Spot good prospects among critiques. Step 4: Send personalized letter with diagnosis (not prescription). Step 5: Mention fee range ($50K-$100K+). Step 6: Offer to refer if they don't want you. Step 7: Follow up with hunted information."
    source: "business-of-copywriting"
    tags: [client-attraction, critique, pipeline, consulting]
  - id: "MET-DK-634"
    title: "Patient Farming a Niche Market - newsletter to book to omnipresence"
    content: "Step 1: Choose niche (e.g. toy companies). Step 2: Create newsletter for that niche. Step 3: Send monthly as if they subscribed. Step 4: Diagnose industry problems in newsletter. Step 5: Publish niche book (even 80 copies). Step 6: After six months groundwork, overt marketing if needed (probably won't be). Step 7: Become omnipresent to the point of nauseating in that niche."
    source: "business-of-copywriting"
    tags: [client-attraction, niche-marketing, content-marketing, long-game]
  - id: "MET-DK-635"
    title: "Cold Inquiry to $200K Project - champion upstream from book to contract"
    content: "Step 1: Person of influence finds you via book/newsletter. Step 2: They champion up the corporate chain. Step 3: CEO inquiry handled through standard process. Step 4: Pre-speech research and staff interviews to identify real opportunities. Step 5: Post-speech diagnostic debrief with CEO. Step 6: Consulting work flows from diagnosis."
    source: "business-of-copywriting"
    tags: [client-attraction, corporate-clients, methodology, consulting]
  - id: "MET-DK-636"
    title: "Post-Contract Obligation Building - find resources delay information create touchpoints"
    content: "Step 1: Immediately find relevant research for client and send unsolicited. Step 2: Connect them with useful people. Step 3: Delay some deliverables to follow-up letter ('random thoughts I didn't get to'). Step 4: Create multiple touchpoints. Step 5: Display visible effort in hunting for them. Step 6: Each touch increases obligation and reduces fee resistance for next project."
    source: "business-of-copywriting"
    tags: [client-management, obligation-building, retention, consulting]
  - id: "MET-DK-637"
    title: "Contract Negotiation Pushback - refuse downgrade reframe and set deadline"
    content: "Step 1: Refuse to deal with junior negotiator - go back to decision maker. Step 2: Address objections point by point in letter. Step 3: Reframe as questioning integrity/value. Step 4: Set deadline - sign or don't but we're moving on. Step 5: After contract signed, make nice with junior to prevent sabotage. Step 6: Know the potential saboteur exists and plan for Phase 2."
    source: "business-of-copywriting"
    tags: [contracts, negotiation, pushback, client-management]

# ======================================================================
# SMU APPEND — Sales Mastery Unleashed (62 elements)
# ======================================================================

# --- L1_PHILOSOPHIES (SMU: 19 elements, FIL-DK-609 to FIL-DK-627) ---

# --- L2_MENTAL_MODELS (SMU: 10 elements, MM-DK-593 to MM-DK-602) ---
- id: "MM-DK-593"
    title: "Inverted Pyramid Benefits Model"
    content: >
      Present 12 benefits. Based on feedback, determine that 6 are far more important.
      Come down the pyramid — talk more about the 6. Ultimately determine that 2 of
      those 6 are hot buttons. By the time you get to the bottom, the narrowest part,
      the only thing you're talking about is the 2.
    source: "SMU-DVD2"
    domain: "presentation"

  - id: "MM-DK-594"
    title: "Money at a Discount Model"
    content: >
      If your bank had hundred dollar bills on sale today for 85 bucks, how many
      would you want? And what lengths would you go to to round up as many 85s as
      possible? That's money at a discount. Net Jets sells fractional jet ownership
      this way based on the value of the executive's time.
    source: "SMU-DVD2"
    domain: "offer-construction"

  - id: "MM-DK-595"
    title: "Career Capital Investment Model"
    content: >
      Like politicians, every executive has career capital. If invested wisely,
      it multiplies — producing influence, promotions, raises, security. If
      squandered, it diminishes. Understanding this reveals the emotional
      dimension of every B2B sale.
    source: "SMU-CD2"
    domain: "b2b-sales"

  - id: "MM-DK-596"
    title: "Comedian-Salesperson Parallel"
    content: >
      Comedians write their stuff, memorize it, perform in harmless venues until
      perfected, then lock it in forever. Seinfeld working open mic nights after
      making a gazillion dollars, with handwritten notes on a stool. Joan Rivers
      writing on big boards. This is exactly how top salespeople should develop.
    source: "SMU-DVD1"
    domain: "scripting"

  - id: "MM-DK-597"
    title: "Ping Pong Game of Objections"
    content: >
      Answering objections turns into a ping pong game. The prospect has a whole
      pocket full of ping pong balls. He hits one over to you, you hit it off the
      board, he's got another one. Pre-emptive objection handling reduces the
      pocket to 2-3 balls instead of 15-20.
    source: "SMU-DVD3"
    domain: "objection-handling"

  - id: "MM-DK-598"
    title: "Three Fixes for Apples-to-Apples Selling Environment"
    content: >
      If you're in an environment where you're easily replaceable: (1) Change
      the way you attract prospects, (2) Change the entire game from apples to
      apples to apples to oranges, or (3) Find a new company in a different
      industry.
    source: "SMU-CD2"
    domain: "positioning"

  - id: "MM-DK-599"
    title: "Top 1% / 5% / 10% Salesperson Pyramid"
    content: >
      Top 10% set quotas and get to President's Club. Top 5% control who they
      spend time with via magnetic marketing — 80% of sales by appointment.
      Top 1% own the script, the tonality, the front end, the back end. They
      are students who hate losing more than they like winning.
    source: "SMU-DVD4"
    domain: "sales-excellence"

  - id: "MM-DK-600"
    title: "Learned Optimism / Explanatory Style Model"
    content: >
      Martin Seligman's research with MetLife on insurance agent turnover.
      Optimistic explanatory style predicts sales success. Those who explain
      bad events as temporary, specific, and external persist longer and sell
      more than those with pessimistic explanatory style.
    source: "SMU-CD1"
    domain: "sales-psychology"

  - id: "MM-DK-601"
    title: "False Freedom Model — Unscripted is Dysfunction"
    content: >
      Salespeople claim they want freedom to be authentic. But when you record
      them, three presentations from the same person are unrecognizable as the
      same person, product, or company. That's not freedom — that's dysfunction.
      True freedom comes from mastery of a script.
    source: "SMU-DVD1"
    domain: "scripting"

  - id: "MM-DK-602"
    title: "Purple Elephant Damaging Admission Model"
    content: >
      Better to paint the elephant purple with yellow polka dots and trot him
      out than pretend he's not in the room. Acknowledge weaknesses as damaging
      admission — the 56 benefits far outweigh the one flaw. People respect
      honesty more than perfection.
    source: "SMU-DVD3"
    domain: "objection-handling"

# --- L3_HEURISTICS (SMU: 15 elements, HEUR-DK-787 to HEUR-DK-801) ---
- id: "HEUR-DK-787"
    title: "94% of all commerce occurs offline — marketing alone can't close"
    content: >
      CNBC reported that 94% of all commerce in the United States occurred
      offline. Even e-commerce is deceptive because some had a salesperson
      involved. The overwhelming majority of sales requires human selling.
    source: "SMU-DVD1"
    domain: "sales-process"
    type: "numeric"

  - id: "HEUR-DK-788"
    title: "Top producer did 80% of sales by appointment, not walk-ins"
    content: >
      One of the things he did right was 80% of his sales were by appointment.
      He created his own prospects via magnetic marketing. Everybody else in
      the dealership is standing there with their donut waiting for random
      walk-ins.
    source: "SMU-DVD4"
    domain: "prospecting"
    type: "numeric"

  - id: "HEUR-DK-789"
    title: "If prospect says 'think it over' — it's almost never that"
    content: >
      If you can't anticipate that the stall objection is going to be 'I have
      to speak to my CPA and my tax attorney and my financial advisor,' you
      must be making the presentation for the first time. It should have been
      a conference call with everyone present.
    source: "SMU-DVD3"
    domain: "objection-handling"

  - id: "HEUR-DK-790"
    title: "Give your absolute best presentation regardless of hostile environment"
    content: >
      Terrible facility, big metal exhibition building, no air conditioning,
      hot day, faint smell of livestock, people on hardwood benches all day,
      bad sound. People were heckling and leaving. I gave my very best
      presentation and had terrific sales that day.
    source: "SMU-CD3"
    domain: "presentation"

  - id: "HEUR-DK-791"
    title: "Average sale of a jet takes 2.5 years of relationship building"
    content: >
      The average length of time it takes to sell a jet to a company is two
      and a half years. During that time, the salesperson is wining and dining
      and meeting with decision makers multiple times. Rapport skills take on
      increased importance.
    source: "SMU-CD2"
    domain: "b2b-sales"
    type: "numeric"

  - id: "HEUR-DK-792"
    title: "Script development: write → memorize → rehearse in safe venue → lock in"
    content: >
      Write scripts, memorize them, go do them somewhere that doesn't do any
      harm until they get exactly the way you want, and then lock them in and
      do them that way forever more. Same process as comedians developing material.
    source: "SMU-DVD1"
    domain: "scripting"

  - id: "HEUR-DK-793"
    title: "12 benefits → narrow to 6 → close on 2 hot buttons"
    content: >
      Present 12 benefits. Determine 6 are far more important. Filter to 2
      hot buttons. By the close, only talk about those 2. Better yet: use
      pre-information to start narrow — skip the pyramid top entirely.
    source: "SMU-DVD2"
    domain: "presentation"
    type: "numeric"

  - id: "HEUR-DK-794"
    title: "Pre-date PO technique for the 'think it over' stall"
    content: >
      I'm going to predate this PO two or three days from now. Let's sign it,
      let's get the paperwork done, because this sounds like something you want
      to move forward, you just need to process it. I promise you I'm not going
      to process it until then.
    source: "SMU-DVD3"
    domain: "closing"

  - id: "HEUR-DK-795"
    title: "Damaging admission upfront beats surprise objection at close"
    content: >
      Raise the curtain on the elephant lurking in the room. Better to paint him
      purple with yellow polka dots and trot him out. Or acknowledge the flaw as
      damaging admission — these 56 benefits far outweigh the one weakness.
    source: "SMU-DVD3"
    domain: "objection-handling"

  - id: "HEUR-DK-796"
    title: "$500 package sold to newspaper-reading front-row skeptic"
    content: >
      At a seminar, a guy sat in the front row, put his feet up on the table,
      and read the newspaper during my entire presentation. Then he bought a
      $500 package. Don't pre-judge — give every prospect your best shot.
    source: "SMU-CD3"
    domain: "sales-mindset"

  - id: "HEUR-DK-797"
    title: "Shock and awe box for post-sale morning-after reassurance"
    content: >
      Big gigantic box with a bow on it arrives the morning after. That's the
      post-sale, while the shock may be wearing off. Reinforces the buying
      decision and prevents buyer's remorse.
    source: "SMU-BONUS"
    domain: "post-sale"

  - id: "HEUR-DK-798"
    title: "New salesperson should be productive by day 2-3 with scripts"
    content: >
      The salesperson is burning your money until they become productive. You
      want to get them productive day two, day three. Scripts allow scaling
      the process faster — the ability to get them productive right from
      the beginning.
    source: "SMU-DVD3"
    domain: "sales-management"
    type: "numeric"

  - id: "HEUR-DK-799"
    title: "Record salespeople and transcribe — it's always horrifying"
    content: >
      When brought into a company with salespeople, record them and get that
      transcribed. It is usually horrifying. Same person, three presentations
      in a row — you wouldn't know it was the same person, product, or company.
    source: "SMU-DVD1"
    domain: "sales-management"

  - id: "HEUR-DK-800"
    title: "Promise statement opening: specific time + specific outcome + curiosity"
    content: >
      I start with: 'suck it up and stay for 55 minutes. I promise you'll leave
      with enough strategies to double your income in 90 days. At the end I'll
      give you one complete action strategy you can use and see income from in
      15 days.' Specific, measurable, irresistible.
    source: "SMU-CD3"
    domain: "presentation"

  - id: "HEUR-DK-801"
    title: "Attention-commanding opening is required — minds wander in person too"
    content: >
      Just as an ad needs an attention-commanding headline, a sales presentation
      needs an attention-commanding opening sentence. Even one-on-one, the
      prospect is tempted to leave mentally. His mind certainly wanders.
    source: "SMU-CD3"
    domain: "presentation"

# --- L4_FRAMEWORKS (SMU: 10 elements, FW-DK-759 to FW-DK-768) ---
- id: "FW-DK-759"
    title: "No BS Sales Process — 6 Steps"
    content: >
      The No BS Sales Process: (1) Foundations / Positioning, (2) Irresistible
      Offer Construction, (3) Presentation / Benefits Delivery, (4) Objection
      Handling / Pre-emption, (5) Assumptive Closing, (6) Post-Sale Romance /
      Follow-up. Each step feeds the next. Begin with end in mind.
    source: "SMU-DVD1-4"
    domain: "sales-process"

  - id: "FW-DK-760"
    title: "Irresistible Offer Construction Framework"
    content: >
      Elements: (1) Risk Reversal — guarantee, free trial, exit without wound,
      (2) Money at a Discount — show $100 for $85 economics, (3) Emotional
      Value Ratio — if not selling money, sell transformation, (4) Flexible
      pieces for pros, locked-in for junior reps, (5) Urgency/scarcity element.
    source: "SMU-DVD2"
    domain: "offer-construction"

  - id: "FW-DK-761"
    title: "Pre-emptive Objection Elimination — 3 Approaches"
    content: >
      (1) Pre-answer in marketing before sales event — most can be handled
      automatically. (2) Damaging Admission — acknowledge flaw, show benefits
      outweigh it. (3) Get all stakeholders on one call — never let 'I need
      to talk to my CPA' happen at close.
    source: "SMU-DVD3"
    domain: "objection-handling"

  - id: "FW-DK-762"
    title: "Assumptive Close Framework — Seamless Progression"
    content: >
      (1) Assumptive Tone — 'Here's how this is going to work, here's how
      you're going to use this.' (2) Seamless Transition — not jarring call
      to action. (3) Attitudinal — not dragging across imaginary line.
      (4) Energy Match — no cadence change, no tensing. (5) Begin with end
      in mind.
    source: "SMU-DVD4"
    domain: "closing"

  - id: "FW-DK-763"
    title: "Script Development Framework — Comedy Method"
    content: >
      (1) Write scripts like comedians write material. (2) Memorize completely.
      (3) Rehearse in safe environments (open mic nights equivalent). (4) Get
      feedback and refine. (5) Lock in the winning version. (6) Perform
      consistently forever more. Never roam free.
    source: "SMU-DVD1"
    domain: "scripting"

  - id: "FW-DK-764"
    title: "Prospect Pre-qualification via Temperature Assessment"
    content: >
      (1) Pre-information by demographics — age, gender, income. (2) Group
      presentation → one-on-one appointment. (3) Questionnaire to rank hot
      buttons in advance. (4) Website self-selection. (5) Marketing that
      pre-qualifies — arrive knowing price range, ready to buy.
    source: "SMU-DVD2"
    domain: "prospecting"

  - id: "FW-DK-765"
    title: "Apples-to-Oranges Positioning Framework"
    content: >
      When you're in an easily-replaceable, commodity-comparison environment:
      (1) Change how you attract prospects — magnetic marketing. (2) Change
      the game entirely — differentiate so comparison is impossible.
      (3) Last resort: change company or industry.
    source: "SMU-CD2"
    domain: "positioning"

  - id: "FW-DK-766"
    title: "Million Dollar Presentation Structure"
    content: >
      (1) Attention-commanding opening / promise statement with specific time
      and specific outcome. (2) Benefits presentation via inverted pyramid.
      (3) Hot button isolation. (4) Assumptive close woven throughout.
      (5) Specific action strategy as final hook.
    source: "SMU-CD3"
    domain: "presentation"

  - id: "FW-DK-767"
    title: "Post-Sale Romance Framework"
    content: >
      (1) Shock and Awe box — big box with bow, morning after. (2) Ongoing
      relationship nurture — every Christmas, every holiday. (3) Romance
      the relationship OR romance the value added. (4) Works even in
      unsexy B2B businesses.
    source: "SMU-DVD2, SMU-BONUS"
    domain: "post-sale"

  - id: "FW-DK-768"
    title: "Sales Force Scaling Framework — Day 2-3 Productivity"
    content: >
      (1) Provide complete script book — modify for specific business.
      (2) Include psychology and reasoning (not just scripts). (3) Train
      via the SMU program structure. (4) Target day 2-3 productivity.
      (5) Get them productive before they burn your money. (6) Scale
      up the sales force using standardized scripts.
    source: "SMU-DVD3-4, SMU-BONUS"
    domain: "sales-management"

# --- L5_METHODOLOGIES (SMU: 8 elements, MET-DK-638 to MET-DK-645) ---
- id: "MET-DK-638"
    title: "Think It Over Handling Methodology"
    content: >
      Step 1: Isolate the real reason — ask about other purchase decisions they
      make quickly. Step 2: Pre-date the PO — 'let's get paperwork done, I'll
      predate it 2-3 days.' Step 3: Takeaway — 'I want to respect your time and
      mine.' Step 4: Conditional — 'If after you think it over and I call tomorrow,
      are you leaning yes or no?'
    source: "SMU-DVD3, SMU-BONUS"
    domain: "objection-handling"

  - id: "MET-DK-639"
    title: "Objection Pre-emption Methodology"
    content: >
      Step 1: List ALL possible objections for your product/service. Step 2:
      Address as many as possible in marketing materials BEFORE the sales event.
      Step 3: For remaining — use Damaging Admission technique. Step 4: Ensure
      all stakeholders are present on the call. Step 5: At close, only 2-3
      objections should remain to handle.
    source: "SMU-DVD3"
    domain: "objection-handling"

  - id: "MET-DK-640"
    title: "Benefits Inverted Pyramid Methodology"
    content: >
      Step 1: Present all 12 benefits during presentation. Step 2: Observe
      reactions — verbal and body language feedback. Step 3: Filter to 6 most
      resonant benefits. Step 4: Probe deeper on those 6. Step 5: Identify
      2 'hot buttons.' Step 6: At close, only discuss those 2. Advanced:
      Use pre-information to start at step 5.
    source: "SMU-DVD2"
    domain: "presentation"

  - id: "MET-DK-641"
    title: "Script Creation and Locking Methodology"
    content: >
      Step 1: Record current salespeople doing live presentations. Step 2:
      Transcribe recordings — confront the horror. Step 3: Identify the best
      stories, phrases, and sequences across recordings. Step 4: Write the
      optimal composite script. Step 5: Memorize completely. Step 6: Rehearse
      in safe environment. Step 7: Lock in winning version — never deviate.
    source: "SMU-DVD1"
    domain: "scripting"

  - id: "MET-DK-642"
    title: "Prospect Pre-qualification via Questionnaire Methodology"
    content: >
      Step 1: Design questionnaire that makes prospects rank their priorities.
      Step 2: Deliver before the sales meeting (at event, via website, by mail).
      Step 3: Analyze responses to identify hot buttons in advance. Step 4: Skip
      the top of the inverted pyramid — start narrow. Step 5: Customize
      presentation to their self-declared priorities.
    source: "SMU-DVD2"
    domain: "prospecting"

  - id: "MET-DK-643"
    title: "Promise Statement Opening Methodology"
    content: >
      Step 1: Define specific time commitment — 'stay 55 minutes.' Step 2:
      Promise specific measurable outcome — 'double your income in 90 days.'
      Step 3: Add immediate payoff — 'one strategy you can use in 15 days.'
      Step 4: Deliver with confidence and authority. Step 5: Tie promise
      to the close at the end.
    source: "SMU-CD3"
    domain: "presentation"

  - id: "MET-DK-644"
    title: "Risk Reversal Design Methodology"
    content: >
      Step 1: Assess product type — can they try it first? (jacket vs mattress).
      Step 2: Determine perceived risk level for the buyer. Step 3: Design
      guarantee that approaches 'irresistible' threshold. Step 4: Combine
      with money-at-a-discount economics. Step 5: Package as part of the
      irresistible offer.
    source: "SMU-DVD2"
    domain: "offer-construction"

  - id: "MET-DK-645"
    title: "Sales Force Training Deployment Methodology"
    content: >
      Step 1: Have team watch/listen to full SMU program (psychology + scripts).
      Step 2: Read and study the script book. Step 3: Modify scripts for specific
      business model and offering. Step 4: Memorize modified scripts. Step 5:
      Role-play in safe environment. Step 6: Deploy — target productive by day 2-3.
      Step 7: Ongoing recording and transcription for quality control.
    source: "SMU-DVD3-4, SMU-BONUS"
    domain: "sales-management"

  # --- IWW (Influential Writing Workshop) CD05-08 ---
- id: "MET-DK-646"
    title: "Daily Ritual Injection Method"
    content: >
            Step 1: Identify 5-10 daily activities the member already does. Step 2: Attach your
      brand/tool/product to each (green pen = color of money, parking backwards = thinking
      forward, sleep tape = last thing at night). Step 3: Each ritual = one reinforcement
      touchpoint per day. Step 4: Multiply across 10+ daily activities = 10+ daily impressions.
      'Every time they backed their car in, what were they thinking of? Us.'
    source: "IWW-CD05-T01"
    domain: "cult-building"

  - id: "MET-DK-647"
    title: "Saddleback Sam Profiling Method"
    content: >
            Step 1: Build a bullet list of 'what makes them tick' (philosophies, irritations,
      attractions, motivations). Step 2: Translate into a living, breathing profile with a NAME
      (like 'Saddleback Sam'). Step 3: Go deeper than demographics — build psychological,
      emotional, and experiential profiles. Step 4: Ask philosophy questions ('What is this
      person's underlying attitude about life/money/politics/time?'). Step 5: Ask the key trust
      question: 'What does she need to know about another person in order to accept that other
      as trustworthy?' Step 6: Use this profile as the person you're writing to EVERY time.
    source: "IWW-CD05-T03"
    domain: "marketing"

  - id: "MET-DK-648"
    title: "Multiplicity Reason-Value Mapping"
    content: >
            Step 1: List every reason someone might buy your thing (Melvin Powers found 10 for
      'write and publish a book'). Step 2: For each reason, identify the deeper VALUE/emotional
      motivator behind it. Step 3: Build into a master checklist. Step 4: Check every piece of
      writing against it — 'how many of these bases are we hitting?' Step 5: Decide whether to
      hit all bases in one piece or segment and hit different bases with different
      communications.
    source: "IWW-CD05-T06"
    domain: "copywriting"

  - id: "MET-DK-649"
    title: "Copywriting Elephant Discovery Process"
    content: >
            Step 1: Ask 'What's all the bad shit? What's wrong with this deal? Why don't people
      buy it?' Step 2: List all stated objections (the obvious ones). Step 3: Go DEEPER — find
      the objections nobody ever raises but are in the way (the Miracle-Ear legacy objection vs
      stated price objection). Step 4: Frame each elephant proactively. Step 5: When possible,
      convert the elephant to an opportunity (Carl Stokes 'Don't Vote For A Negro' ad).
    source: "IWW-CD06-T01"
    domain: "copywriting"

  - id: "MET-DK-650"
    title: "Dan Kennedy Newsletter Structural Checklist"
    content: >
            The complete newsletter structure: (A) What's In This Issue box — create
      readership, note giveaways, promote something (B) Quote box / small ad (50/50 split) (C)
      Opening monologue — personal voice, reconnection, personal story, current event, humor,
      thematic major point (like a talk show host opening — modeled on Regis) (D) Banner
      interrupt — promote or call attention to provocative thing ('15 Naked Elves Celebrate
      Christmas in Norway, story on page 3') (E) Short-to-medium items using references to
      familiar things (Disney, Starbucks, FedEx — not unknown companies) (F) Member
      related/provided content — recognition (G) Humor — 'Do you have to be funny? Only if you
      want to be paid' (H) Rant or personal experience (I) Tips — some useful content ('not a
      lot, but some') (J) Reinforcement of key teachings AND key behaviors (being a good
      student, coming to events, having a coach, ascending) (K) Examples of extreme stupidity
      from non-members — makes members feel superior
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "MET-DK-651"
    title: "Newsletter Recognition System (Multiple Forms)"
    content: >
            Forms of member recognition to deploy: (KK-1) Proof of value — members reporting
      success (KK-2) Self-aggrandizement — tearful emotional change stories (KK-3) Counter
      objections/skepticism — member took massive action, used idea 16 ways (KK-4) Promotion —
      recognition that leads to discussing products/events (KK-5) Encourage involvement —
      recognizing they sent a book/article = encourages more (KK-6) Highlight ascension —
      showcase upgraded members (KK-7) Dan Gets Mail section — testimonials in conversation
      format, recognition, make points in response 'We underdo this recognition thing. You
      really want to try and do as much of it as you can.'
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "MET-DK-652"
    title: "Dan Kennedy 31-Point Newsletter Content Checklist"
    content: >
            31 specific content elements to cycle through, organized into categories: - MEMBER
      RECOGNITION types (proof of value, self-aggrandizement, counter objections, promotion,
      encourage involvement, highlight ascension) - Specific promotion in copy or as footnotes
      - Marketing 101 content (for early retention/new members) - Demonstrations of wizardry
      (actually showing transformation) - Pronouncements of wizardry (declaring expertise) -
      Statements of value (pointing out 'this alone pays for your subscription') - 'I want to
      be like Dan' content (attitudinal + lifestyle) - Warning against bad behavior - Real
      inspiration (exciting examples of what's possible) - Guilt, shame, inadequacy
      (challenging statements) - Political/social comment
    source: "IWW-CD08-T03"
    domain: "newsletter"

  - id: "MET-DK-653"
    title: "Newsletter Production Process (Kennedy Method)"
    content: >
            Step 1: Accumulate material constantly throughout month — drawer/box system by
      type. Step 2: Pieces get written piecemeal as inspiration strikes (5-10 min each). Step
      3: Sit down for 3-4 hour finishing session (not sequential — random order). Step 4: Check
      against the 31-point checklist + alpha checklist. Step 5: Catch missing elements, pull
      items that don't serve any purpose ('why the hell is this here? Because I felt like
      writing about it'). Step 6: If consecutive pieces are too similar, make the next one
      entirely different. Total: ~4-5 hours writing for 12-page newsletter.
    source: "IWW-CD08-T08"
    domain: "newsletter"

# --- IWW CD01-04 L5_METHODOLOGIES ---
  - id: "MET-DK-654"
    title: "Personal Narrative Asset List Creation Method"
    content: >
      Step 1: Write heritage checklist — childhood, family,
      education, early work. Step 2: List every life experience
      including negatives — alcoholism, bankruptcy, divorce,
      failures. Step 3: Add at least 20 items to your asset list.
      Step 4: For each, ask what common experience does this
      connect to in a wide audience. Step 5: Ask trusted group
      to tell you what they perceive about you that you missed.
      Step 6: Label each with a fascinating headline.
    source: "IWW-CD02-T03"
    domain: "personal-branding"

  - id: "MET-DK-655"
    title: "Story Purpose Identification Method"
    content: >
      Step 1: List all the points you need to make in your business
      across all media — newsletters, emails, sales letters,
      seminars. Step 2: For each point, identify whether you have
      a story. Step 3: If not, decide: personal experience,
      testimonial, parable, or fable. Step 4: Find or create the
      story. Step 5: Write the bridge — the language at the end
      that drives the specific point. Step 6: File by purpose.
    source: "IWW-CD04-T03"
    domain: "storytelling"

  - id: "MET-DK-656"
    title: "Story Multi-Purposing Method"
    content: >
      Step 1: Take any story from your inventory. Step 2: List
      every possible point it could make. Step 3: For each purpose,
      identify what small tweaks to the story would be needed.
      Step 4: Write different bridge endings for each purpose.
      Step 5: Verify no two uses contradict each other. Step 6:
      File the story under each purpose category. The fox and
      rabbit story example yielded 8-10 different purposes.
    source: "IWW-CD04-T04"
    domain: "storytelling"

  - id: "MET-DK-657"
    title: "Philosophy Statement Development Method"
    content: >
      Step 1: Write a concise statement of profound core belief
      about each of eight topics — money, business, success, sales,
      time, religion, politics, health. Step 2: Remove all wiggle
      room and qualifiers. Step 3: Test with audience to see if
      they can guess your positions. Step 4: If they cant guess
      correctly, you havent been clear enough in your writing.
      Step 5: Integrate positions into all content consistently.
    source: "IWW-CD02-T06"
    domain: "influence"

  - id: "MET-DK-658"
    title: "Prevention Principle Implementation Method"
    content: >
      Step 1: List everything you do NOT want to be known for.
      Step 2: For each, identify what proactive messaging prevents
      it. Step 3: Add these to your ongoing writing checklist.
      Step 4: Monitor what surfaces in customer discussions and
      online forums. Step 5: If negative perception emerges, address
      it aggressively and directly to your entire customer base.
      Step 6: Add deliberate commentary in ongoing publications
      to clarify and correct.
    source: "IWW-CD03-T04"
    domain: "personal-branding"

  - id: "MET-DK-659"
    title: "Story Formula — Inciting Incident To Resolution"
    content: >
      Simple story formula: 1) Inciting incident — something sets
      the story in motion, 2) Complications — things get worse,
      3) Crisis — the pivotal challenge, 4) Climax — the turning
      point, 5) Resolution — how it ended, 6) Point — what the
      audience should take away. This is the same structure as
      effective sales letter copywriting. Pin the entire story
      to one point for maximum imprint.
    source: "IWW-CD04-T05"
    domain: "storytelling"

  - id: "MET-DK-660"
    title: "Legend Construction Method"
    content: >
      Step 1: Identify the 1-2 things you want to be known for
      above all else. Step 2: Reduce to a capsule people can
      remember and repeat. Step 3: Build origin story that explains
      why you are uniquely positioned. Step 4: Include mission
      beyond self-interest. Step 5: Include superpowers or mystical
      skills. Step 6: Include fallibility for identification.
      Step 7: Consistently reinforce in all communications.
      Step 8: Proactively prevent alternative narratives.
    source: "IWW-CD03-T02"
    domain: "personal-branding"

  - id: "MET-DK-661"
    title: "Dale Carnegie Story-Point-Benefit Formula"
    content: >
      The Dale Carnegie formula applied: Story then Point then
      Benefit. In every newsletter, every article, every email.
      People do not get bored with formula. TV programs run for
      years on the same formula — Perry Mason nine years with
      identical story structure, Battlestar Galactica used locked
      room mystery for every episode. One formula that works
      beats twenty you rotate through.
    source: "IWW-CD04-T05"
    domain: "copywriting"

  - id: "MET-DK-662"
    title: "Place Construction Method For Cult-Like Loyalty"
    content: >
      Step 1: Define the door — visible entry point from their
      world to yours. Step 2: Make environment opposite of their
      outside world — what is criticized out there is celebrated
      here. Step 3: Establish closed borders — members only
      firewall. Step 4: Hand-pick consumers via source quality.
      Step 5: Foster member-to-member interaction creating
      parallel social universe. Step 6: Repetitively counter
      negative outside influences. Step 7: Position yourself
      as the single strong leader of the place.
    source: "IWW-CD04-T07"
    domain: "cult-building"

  - id: "MET-DK-663"
    title: "Frame Of Reference Adjustment Method"
    content: >
      Step 1: Identify the age range and background of your
      audience. Step 2: List all references you commonly use —
      historical, cultural, industry. Step 3: For each, ask
      would a person 10-20 years younger know this? Step 4:
      If not, either provide frame of reference before using
      it or replace with current reference. Step 5: Never
      assume knowledge. Like Leno, tell them who everyone is
      before telling the joke.
    source: "IWW-CD03-T06"
    domain: "copywriting"

# --- IWW CD09-13 L5_METHODOLOGIES ---

  - id: "MET-DK-664"
    title: "Newsletter Typography And Cosmetics Methodology"
    content: >
      Step 1: Write the content in short sections. Step 2: After every
      three to four paragraphs, stop and adjust the visual appearance.
      Step 3: Vary paragraph sizes — some big, some small, some indented.
      Step 4: Select typefaces from a curated palette of about 50. Step 5:
      Apply cosmetic treatments — bold, italic, underline, shadow — each
      conveying different emphasis. Step 6: Use column layout to set tone —
      three columns for journalism, two for newsletter feel. Step 7: Review
      with typography checklist before submitting.
    source: "IWW-CD09-T01"
    domain: "copywriting"

  - id: "MET-DK-665"
    title: "Content Recycling Across Media Methodology"
    content: >
      Step 1: Create content in any format first — newsletter, fax, speech.
      Step 2: After using in original medium, file for cross-media use.
      Step 3: When new product needed (book, course), start with six boxes
      labeled by topic. Step 4: Have assistant search all previous media
      for related content. Step 5: Print everything relevant on one disc.
      Step 6: Write new product from accumulated material, adding fresh
      connective tissue. Step 7: Each piece of content is used in at
      least three to six different media.
    source: "IWW-CD09-T03"
    domain: "marketing"

  - id: "MET-DK-666"
    title: "Story Mining And Testing Methodology"
    content: >
      Step 1: Inventory all personal stories — childhood, career, family,
      hobbies, military, embarrassments. Step 2: Categorize by type:
      origin, turning point, transparency, mentor, attributed, humor.
      Step 3: For each new story, tell it 8-12 times to different people.
      Step 4: Experiment with details — change colors, names, settings.
      Step 5: Observe reactions to determine optimal version. Step 6:
      Lock the winning version including specific words and timing.
      Step 7: Deploy across media adapting length to format.
    source: "IWW-CD10-T05"
    domain: "storytelling"

  - id: "MET-DK-667"
    title: "Parallel Niche Business Creation Methodology"
    content: >
      Step 1: Analyze customer base to identify top one or two industries
      by revenue. Step 2: Create separate brand identity for niche —
      different name, website, newsletter. Step 3: Take existing generic
      materials and replace: (a) all stories with niche-specific stories,
      (b) all testimonials with niche clients, (c) title and cover with
      niche language. Step 4: Product underneath stays identical. Step 5:
      Increase price by 20-100 percent because of specialization perception.
      Step 6: Let the two identities run in parallel. Step 7: If they
      merge naturally later, no harm done.
    source: "IWW-CD11-T04"
    domain: "marketing"

  - id: "MET-DK-668"
    title: "Client Individual Review And Coaching Methodology"
    content: >
      Step 1: Review all of the client's communications — newsletter,
      emails, catalog, faxes, website. Step 2: Identify where they are
      strong (good openings, timely stories) and where they are weak
      (inconsistent, no personality, too much teaching). Step 3: Compare
      against the 31-element checklist issue by issue. Step 4: Identify
      the single biggest opportunity — usually either niche specialization
      or personality injection. Step 5: Prescribe the specific fix with
      examples from their own material. Step 6: Check for the fatal flaw:
      telling them to do what they are not doing in their own communications.
    source: "IWW-CD11-T03"
    domain: "marketing"

  - id: "MET-DK-669"
    title: "Demonstration-Based Marketing Methodology"
    content: >
      Step 1: Identify the dramatic demonstration that proves your value
      proposition. Step 2: Perform the demo live — at seminars, on video,
      for media. Step 3: Let the thing itself be the star, not just your
      explanation of it. Step 4: Record the demonstration for use in
      multiple contexts — DVDs, website, sales letters. Step 5: Pitch
      local media with the demonstration as a story angle. Step 6: Use
      demo footage as the centerpiece of all marketing material. Example:
      theft control seminars where Jack stole 36 different ways under the
      audience member's nose.
    source: "IWW-CD11-T05"
    domain: "marketing"

  - id: "MET-DK-670"
    title: "Weekly Communication Purpose Mapping Methodology"
    content: >
      Step 1: List every communication piece — weekly fax, monthly
      newsletter, email series, catalog, tele-seminar. Step 2: For each
      piece, define its specific purpose — retention, acquisition, bonding,
      teaching, selling. Step 3: For each piece, define the desired response.
      Step 4: Reverse-engineer from desired response to content needed.
      Step 5: Apply the 31-element checklist deliberately for each piece.
      Step 6: Ensure consistency from issue to issue — do not randomly hit
      different bases. Step 7: Review quarterly for drift from strategic
      purpose.
    source: "IWW-CD13-T01"
    domain: "newsletter"

  - id: "MET-DK-671"
    title: "Aspirational Selling Through Stories Methodology"
    content: >
      Step 1: Identify the real aspirational reasons people buy — not the
      deliverables but the emotional value: status, ease, validation,
      lifestyle change. Step 2: For each aspiration, find or create a
      customer success story that embodies it. Step 3: Mine those stories
      for personal details that create visual movies, not static photos.
      Step 4: In sales material, list the deliverables for justification
      but make the stories the dominant content. Step 5: For every factual
      claim about deliverables, include two or three aspirational stories.
      Step 6: Use diversity of stories to knock off buyers one at a time
      for different personal reasons.
    source: "IWW-CD13-T03"
    domain: "influence"


# ======================================================================
# HFYIC - How to Find Your Ideal Customer (66 elements)
# Date: 2026-03-16
# ======================================================================

  - id: "FIL-DK-669"
    title: "Differential Customer Value Is Real"
    content: "Not all customers are the same. Some are dramatically more valuable than others. Very few business people ever give this any thought. Most people's approach to customers is anybody they can get."
    source: "HFYIC-CD1-Track1"
    domains: [customer-avatar, whale-hunting]

  - id: "FIL-DK-670"
    title: "Whales Mate With Whales"
    content: "If you're going to hunt for a whale, you have to present yourself in a way that is really acceptable to the whale. You need affinity links — shared personal history, not credentials."
    source: "HFYIC-CD1A-Track8"
    domains: [positioning, whale-hunting, authority-creation]

  - id: "FIL-DK-671"
    title: "Whales Want Information Not Education"
    content: "Whales do not want to know how to do it. They want to understand it and know that YOU know how to do it. They want to find somebody they can trust to do things. Inform, don't educate."
    source: "HFYIC-CD1A-Track9"
    domains: [whale-hunting, sales-psychology, positioning]

  - id: "FIL-DK-672"
    title: "Show Up Alone Principle"
    content: "Be the only one who shows up in this place. Matt Zagula's principle: show up like no one else. Sidney Barrows advertised in the Financial Times — only escort service there — got 4-7x average client value."
    source: "HFYIC-CD1-Track8"
    domains: [place-strategy, positioning, whale-hunting]

  - id: "FIL-DK-673"
    title: "Marketing Is Buying Haystacks"
    content: "In marketing, what we all do is we buy a haystack and pay for every piece of straw. The question is how small a haystack are you going to build that has a lot of gold needles vs how big with few."
    source: "HFYIC-CD1A-Track9"
    domains: [marketing, lead-generation, whale-hunting]

  - id: "FIL-DK-674"
    title: "High Maintenance Client Has No Value"
    content: "They have to be respectful, well-behaved and low maintenance. A high maintenance client is no good for me regardless of spending potential."
    source: "HFYIC-CD1-Track6"
    domains: [client-management, whale-hunting]

  - id: "FIL-DK-675"
    title: "Hit List Is The Starting Point"
    content: "David Ogilvy made a list of 100 dream accounts. Over time, 38 became clients. Most people never make a list — they take anyone they can get."
    source: "HFYIC-CD1-Track7"
    domains: [prospecting, whale-hunting, direct-marketing]

  - id: "FIL-DK-676"
    title: "Build Character Profiles Like Fiction Writers"
    content: "You should have a clear character profile of your whale, like a fiction writer creates a character. Go to Barnes & Noble, writer section — they have 26-page fill-in-the-blank character profile forms."
    source: "HFYIC-CD1A-Track7"
    domains: [customer-avatar, copywriting, whale-hunting]

  - id: "FIL-DK-677"
    title: "Credentials Don't Attract Whales — Affinity Does"
    content: "Most advisors think humble beginnings are irrelevant or embarrassing. Wrong. Whales connect through shared personal history — Ted's outhouse photos sold more than his certifications."
    source: "HFYIC-CD1A-Track8"
    domains: [positioning, trust-building, whale-hunting]

  - id: "FIL-DK-678"
    title: "Never Rush Marketing Creation"
    content: "Big pet peeve: the rush to get stuff out. We work for three months on a script before putting half a million dollars at stake. Your time has the same value — always get a qualified reader to red-line."
    source: "HFYIC-CD1A-Track7"
    domains: [copywriting, quality-control]

  - id: "FIL-DK-679"
    title: "No Excuse Not To Use Direct Mail For Whale Hunting"
    content: "The whales already exist in somebody's list. There's just no excuse not to use direct mail if you want to do whale hunting. You can rent lists matching any behavioral profile."
    source: "HFYIC-CD1A-Track9"
    domains: [direct-mail, list-building, whale-hunting]

  - id: "FIL-DK-680"
    title: "Whale Is Not Just Monetary — It's Behavioral Fit"
    content: "A whale is not just about monetary value. It's about the kind of customer you want to deal with. The multiplier effect, the circle of influence, the maintenance level, the growth potential."
    source: "HFYIC-CD1-Track1"
    domains: [customer-avatar, whale-hunting]

    L2_MENTAL_MODELS:

# MM-DK-652 to MM-DK-663 (12 elements)
  - id: "MM-DK-652"
    title: "Vegas Whale Definition"
    content: "A whale is someone worth between 5x and 50x the average customer. They obviously prefer 50x over 5x. This is the foundational multiplier for whale classification."
    source: "HFYIC-CD1-Track1"
    domains: [whale-hunting, customer-avatar]

  - id: "MM-DK-653"
    title: "Three Ways To Get Whales"
    content: "1) Small Pond Fishing — hit list, go after them directly. 2) Wide Net with Place Strategy — create environment where whales find you. 3) Wide Net with Lead Generation — advertise whale bait."
    source: "HFYIC-CD1-Track7"
    domains: [whale-hunting, prospecting, lead-generation]

  - id: "MM-DK-654"
    title: "Whale Markers Model"
    content: "Every business has behavioral + demographic + psychographic markers that identify whales. Financial advisors: investable assets + paid-off house + conservative mentality. Chiropractor: chronic condition + affluence + open-mindedness."
    source: "HFYIC-CD1-Track2"
    domains: [customer-avatar, whale-hunting]

  - id: "MM-DK-655"
    title: "Time-Sensitive Whale Stimulus"
    content: "Life events create temporary whales: marriage (esp. 2nd/3rd), divorce, home purchase, age benchmarks, sale of business, retirement, new hobby, disease diagnosis. Two days before, they were useless."
    source: "HFYIC-CD1-Track3"
    domains: [whale-hunting, timing, life-events]

  - id: "MM-DK-656"
    title: "Three-Step Customer Focus Process"
    content: "Step 1: Intelligence (demographics, psychographics, emotions, language). Step 2: Target Personal Positioning (affinity links). Step 3: Outreach & Invitation (low threshold, bypass gatekeepers, home addresses, inform don't educate)."
    source: "HFYIC-CD1A-Track5"
    domains: [whale-hunting, marketing, positioning]

  - id: "MM-DK-657"
    title: "Four Conversational Zones"
    content: "Most people spend most of their thought and conversational time in four places: family stuff, occupation stuff (mostly complaining), chief recreational pursuit, and money."
    source: "HFYIC-CD1A-Track6"
    domains: [customer-avatar, psychographics, copywriting]

  - id: "MM-DK-658"
    title: "Emotional Anchor Timeline"
    content: "Most people's emotional anchors: year born, first car, high school graduation, college graduation, year married. Big brands license songs from those years for commercials."
    source: "HFYIC-CD1A-Track6"
    domains: [psychographics, copywriting, emotional-triggers]

  - id: "MM-DK-659"
    title: "Out-of-Category Advertising"
    content: "Place yourself where no competitor advertises. Mattress company in chiropractic Yellow Pages. Matchmaking in car collector magazines. Exercise machine in Robb Report. The consumer matters, not the magazine category."
    source: "HFYIC-CD1-Track8"
    domains: [place-strategy, media-buying, whale-hunting]

  - id: "MM-DK-660"
    title: "Two-Offer Principle"
    content: "Always have two reasons to respond: buy now (high threshold) AND get free info (low threshold). You rarely lose the immediate buyer, but gain many who are mentally moving toward purchase."
    source: "HFYIC-CD1A-Track1"
    domains: [lead-generation, advertising, direct-response]

  - id: "MM-DK-661"
    title: "Haystack Optimization Model"
    content: "Every marketing investment buys a haystack. Most people build giant haystacks hoping to find needles. With the three-step process, build a much smaller haystack packed with gold needles."
    source: "HFYIC-CD1A-Track9"
    domains: [marketing, ROI, whale-hunting]

  - id: "MM-DK-662"
    title: "Boomer Whale Mega-Trend"
    content: "First time classic demographics are disrupted: older continue spending, younger don't replace. Anti-aging skincare sweet spot migrated from 48 to 71 in 7 years. 70 is the new 50."
    source: "HFYIC-CD1-Track4"
    domains: [demographics, affluent-marketing, whale-hunting]

  - id: "MM-DK-663"
    title: "Affinity Link Model"
    content: "Whales connect through shared biography, not credentials. Ted's outhouse photos, humble beginnings, self-made journey — these are the affinity links that close the gap between advisor and whale."
    source: "HFYIC-CD1A-Track8"
    domains: [positioning, trust-building, personal-branding]


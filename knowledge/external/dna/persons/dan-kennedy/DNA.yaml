      incest: in a short period of time, everybody gets dumber and dumber.
    source: "MM-01-mod1"

  - id: "FIL-DK-184"
    title: "All great advancements in businesses come from outside the box, not inside the b"
    content: >
      All great advancements in businesses come from outside the box, not inside the box. Innovation comes
      from cross-industry transfer.
    source: "MM-01-mod1"

  - id: "FIL-DK-185"
    title: "If you want your marketing done by somebody who really knows what he's doing, yo"
    content: >
      If you want your marketing done by somebody who really knows what he's doing, you must own your
      marketing. (Ogilvy principle)
    source: "MM-01-mod1"

  - id: "FIL-DK-186"
    title: "The only way anybody ever makes a decision to respond to anything is on an emoti"
    content: >
      The only way anybody ever makes a decision to respond to anything is on an emotional level. Then we
      apply logic to make ourselves feel good about what we decided to do in the first place.
    source: "MM-01-mod3"

  - id: "FIL-DK-187"
    title: "Save your money. Never do one-shot mail. What makes people think they can send o"
    content: >
      Save your money. Never do one-shot mail. What makes people think they can send one crummy golden rod
      flyer and get a stampede of response?
    source: "MM-01-mod3"

  - id: "FIL-DK-188"
    title: "Much more often than not, the long letter works better than the short letter. Wo"
    content: >
      Much more often than not, the long letter works better than the short letter. Would you send a live
      salesperson with this instruction: whatever you do, don't say more than 200 words?
    source: "MM-01-mod2"

  - id: "FIL-DK-189"
    title: "The customer is an asset to be acquired by investment and to be taken care of an"
    content: >
      The customer is an asset to be acquired by investment and to be taken care of and maintained. You
      have an opportunity to start at value A and build all the way to value B.
    source: "MM-01-mod3"

  - id: "FIL-DK-190"
    title: "You can't be Amazoned without your permission. Their message is fast, cheap, cho"
    content: >
      You can't be Amazoned without your permission. Their message is fast, cheap, choices — a pretty
      small territory. You need a different message of your own.
    source: "MM-01-mod1"

  - id: "FIL-DK-191"
    title: "On the internet especially, there's a popular idea that content is king. I would"
    content: "On the internet especially, there's a popular idea that content is king. I would disagree. The sale is king."
    source: "MM-01-mod1"

  - id: "FIL-DK-192"
    title: "If you have break-even media, you should continue to use it over and over. You c"
    content: >
      If you have break-even media, you should continue to use it over and over. You can't afford not to
      use it — it pays its own way and you're acquiring customers for free.
    source: "MM-01-mod2"

  - id: "FIL-DK-193"
    title: "A lot of people balk at giving away valuable information, but that's a huge mist"
    content: >
      A lot of people balk at giving away valuable information, but that's a huge mistake. You give to
      get. If your LGM has no value, the prospect assumes your products have none either.
    source: "MM-01-mod2"

  - id: "FIL-DK-194"
    title: "If you don't have a good answer to 'What's new?', they go looking for it somewhe"
    content: >
      If you don't have a good answer to 'What's new?', they go looking for it somewhere else. A bored
      customer goes elsewhere. They forget about you.
    source: "MM-01-mod3"

  - id: "FIL-DK-195"
    title: "Retention and repeat business is not an entitlement from excellent products and"
    content: >
      Retention and repeat business is not an entitlement from excellent products and excellent service.
      It is also a result of excellent marketing.
    source: "MM-01-mod3"

  - id: "FIL-DK-196"
    title: "Price-Setting Self-Sovereignty: set price based on what YOU want, not competitor"
    content: >
      Price-Setting Self-Sovereignty: set price based on what YOU want, not competitors. Primary factor =

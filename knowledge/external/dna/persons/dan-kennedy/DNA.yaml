  - id: "MET-DK-214"
    title: "Story Selection by Objection Mapping"
    content: >
      How to decide what stories you need: (1) List ALL objections that need erased → find/create story
      for each. (2) List assumptions/negative opinions about you or industry → story to correct each. (3)
      List assertions that can't be proven scientifically → story that proves them emotionally. (4)
      Identify philosophical positions to establish → story for each. Result: comprehensive story arsenal
      mapped to every selling obstacle.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "copywriting"


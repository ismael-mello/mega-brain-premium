      positioning.
    source: "ACC-video-DK_3"

  - id: "FIL-DK-164"
    title: "Application Must Demonstrate Inadequacy: the application itself makes them confr"
    content: >
      Application Must Demonstrate Inadequacy: the application itself makes them confront how unsatisfied
      and inadequate they are, setting up the need for the program.
    source: "ACC-video-DK_11"

  - id: "MET-DK-164"
    title: "The Opportunity Story Conversion — Six Ways to Play: Step 1) Take present delive"
    content: >
      The Opportunity Story Conversion — Six Ways to Play: Step 1) Take present deliverables and present
      them differently (most common). Step 2) Bring different deliverables to your current market. Step 3)
      Take existing deliverables to a different marketplace. Step 4) Package as consultant opportunity.
      Step 5) Convert to pure opportunity for the masses. Step 6) If already pure opportunity marketer,
      apply all concepts. Choose your path, then apply opportunity language.
    source: "CD1-track1"


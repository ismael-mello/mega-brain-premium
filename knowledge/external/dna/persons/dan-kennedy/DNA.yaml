      delivery. (3) Personality — Peterman's first-person copy. (4) Service — FedEx changed logistics. (5)
      Smarter marketing — if none of above, outmarket them. If commodity with no differentiation = price
      decides.
    source: "MM-02-cd6"

  - id: "FW-DK-167"
    title: "Income Increase Framework: (1) Raise fees/prices — almost everyone waits too lon"
    content: >

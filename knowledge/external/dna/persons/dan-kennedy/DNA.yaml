      businesses.
    source: "MM-02-cd1"

  - id: "HEUR-DK-285"
    title: "Your Tardiness Not Our Emergency: Don't let others' perception of urgency stampe"
    content: >
      Your Tardiness Not Our Emergency: Don't let others' perception of urgency stampede you. Train
      customers from prospect stage. Being instantly massively accessible = bad positioning. Positioning
      wins over service.
    source: "MM-02-cd1"

  - id: "HEUR-DK-286"
    title: "Vendor SOB Principle: Vendors respond fastest to person pressing them to wall. B"
    content: >
      Vendor SOB Principle: Vendors respond fastest to person pressing them to wall. Be nice = moved to
      back of line. 10 o'clock meant 10, not 10:30. Next week 10 becomes noon, then noon becomes
      September.
    source: "MM-02-cd2"

  - id: "HEUR-DK-287"
    title: "Never Turn Off Marketing Machine: Every single day must do something keeping new"
    content: >

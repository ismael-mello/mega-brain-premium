  - id: "FIL-DK-409"
    title: "A group presentation is a group presentation is a group presentation. The struct"
    content: >
      A group presentation is a group presentation is a group presentation. The structure elements do not
      change much depending on delivery. Stage to group, webcast to group, DVD sent in the mail to group -
      the architecture is the same.

  - id: "FIL-DK-416"
    title: "They only need to KNOW the minimum necessary to buy before they buy; they need t"
    content: >
      They only need to KNOW the minimum necessary to buy before they buy; they need to be inspired,
      motivated, swept up by negative and positive emotion to the greatest extent possible. Too much
      information, not enough EMOTION is one of the most common Middle mistakes.

  - id: "FIL-DK-420"
    title: "Direct Response = Half Psychology, Half Math"
    content: >
      Direct response is roughly half behavioral psych and half math. That's really what it is. There's
      reliable psychological principles, reliable sales principles. Someone periodically innovates but
      it's really not necessary to be the innovator to make a lot of money.
    source: "Secrets/transcription_mp3_CD3.txt"
    domain: "direct-response"

  - id: "FIL-DK-421"
    title: "Stories Have Equity — Proprietary and Protected"
    content: >
      Stories actually have equity. Napoleon Hill's Andrew Carnegie story, Maxwell Maltz's plastic surgery
      patient discovery, Robert Kiyosaki's Rich Dad Poor Dad — each built entire empires on a single
      proprietary personal story that cannot be copied or diluted.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "storytelling"

  - id: "FIL-DK-423"
    content: >
      Napoleon Hilling — the discipline of hunting for commonalities across winning controls. Named after
      Napoleon Hill's method of interviewing successful people to find shared traits. Applied to copy:
      collect 12-24 historical controls and 6-12 contemporary controls in a category, then identify what
      they ALL have in common. The commonalities ARE the code.

  - id: "FIL-DK-426"
    title: "End Justifies Means in Selling"
    content: >
      The underlying premise of powerful selling copy is 'the end justifies the means'. Extreme techniques
      are MORE necessary in info-marketing than in other businesses because we are essentially selling
      nothing — intangibles where the buyer walks out with 'stuff' that must be translated into action to
      have value.
    source: "Sorcery/transcription_mp3_CD1.txt + PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FIL-DK-427"
    title: "Dark Greater Than Light Principle"
    content: >
      If you have a choice and cannot split test, you are ALWAYS better off dragging them into the
      darkness than showing them happy things and light. We do better with the dark than with the light.
      Most of the 7 Secrets are in the dark category.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FIL-DK-428"
    title: "Purchase Equals Accomplishment"
    content: >
      In our world, purchase counts as accomplishment and it is in our best interest to let that confusion
      occur. The person who gets whipped up by copy and acts on rage/shame/pain by ordering immediately
      feels better because he has done something. Has he really done anything? No. Changed anything? No.
      90% of books sold never have the shrink wrap taken off.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FIL-DK-429"
    title: "Selling People On Their Own Assets"
    content: >
      When people invest with you, they are really investing in themselves. We are selling people on their
      own assets, skills, talents, capabilities and opportunities. It's not like selling a magic
      slicer-dicer where you walk out with a machine. In our case, you walk out with 'stuff' that must be
      translated into action for value.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "info-marketing"

  - id: "FIL-DK-430"
    title: "Salesmanship In Print"
    content: >
      Copywriting is salesmanship in print. Good copywriting is good selling. That's what it is. The
      opposite — creative, award-winning copy judged by designers and brand managers — does not sell.
      Direct response is the only copy that matters.
    source: "Sorcery/transcription_mp3_CD2.txt"
    domain: "copywriting"

  - id: "FIL-DK-431"
    title: "Ethics Test for Copy"
    content: >
      The line is: if they follow instructions from the deliverable, can they get the promised benefits?
      That's the ethical boundary. We know most won't follow instructions — that's not our problem. The
      only question is CAN they, if they do.
    source: "Sorcery/transcription_mp3_CD2.txt"
    domain: "copywriting"

  - id: "FIL-DK-432"
    title: "Excited Consumer Over Informed Consumer"
    content: >
      We do NOT need an informed consumer — we need an EXCITED consumer. We manipulate, we motivate. We do
      not educate any more than is absolutely necessary to make the sale. Being a teacher instead of a
      salesperson until they pay is one of the biggest copy mistakes in the business.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FIL-DK-433"
    title: "Complete Sales Letter as Living Organism"
    content: >
      A sales letter is not a collection of parts — it is a living organism where every element serves the
      sale. The 14-system taxonomy (Headlines → SubHead → Openings → Bullets → Offers → Objections →
      Guarantees → Segues → Postscripts → Testimonials → CTA → Templates → Order Forms → Checklist)
      represents the complete anatomy. Missing any system weakens the whole. DK organized decades of
      winning ads into these 14 systems because mastery of each system independently creates mastery of
      the whole.
    source: "System1-14 PDFs (taxonomy structure)"
    domain: "copywriting"

  - id: "FIL-DK-434"
    title: "Swipe Files Are the Foundation of All Great Copy"
    content: >
      DK's entire copy education system is built on SWIPE FILES — collections of proven, tested examples
      organized by function. You don't write from scratch, you write from models. The System PDFs are
      organized swipe files: hundreds of real headlines, real subheads, real openings, real segues, real
      postscripts from ads that actually worked. "The best copywriters are the best collectors" — mastery
      comes from studying what already works, not from theory. Every System file is a museum of proven
      copy elements.
    source: "System1-14 PDFs (overall philosophy)"
    domain: "copywriting"

  - id: "FIL-DK-435"
    title: "Price Suspension — Everyone Has Their Thing"
    content: >
      Price is NEVER the real barrier for affluent buyers. Everyone has Their Thing — the category where
      price becomes irrelevant. A man who clips coupons for groceries will spend $200K on a boat without
      blinking. A woman who buys discount clothes will spend $50K on horses. The marketer's job is to find
      what Their Thing is and position the offer as belonging to that category. When you are Their Thing,
      price objections disappear completely. DK calls this Price Suspension — the affluent do not stop
      spending, they simply redirect spending to what matters to them personally.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 28-45)"
    domain: "affluent-marketing"

  - id: "FIL-DK-436"
    title: "Affluent Buy the Person Before They Buy the Product"
    content: >
      The affluent do not buy products or services — they buy the person selling them. Trust, competence,
      and personal connection precede any transaction. DK states this explicitly: the sale is made or lost
      based on WHO is doing the selling, not WHAT is being sold. This is why founder stories, personal
      credentials, and relationship building are more important than product features when selling to
      high-net-worth individuals. Susan Adams confirms from her experience selling fractional jet
      ownership — the personal relationship was everything.
    source: "transcription_pdf + transcription_mp3_Adams (cross-confirmed)"
    domain: "affluent-marketing"

  - id: "FIL-DK-437"
    title: "Process Is Identical Regardless of Price Level"
    content: >
      DK emphasizes that the fundamental sales and marketing process is the SAME whether selling a $47
      product or a $470,000 service. The mechanics of trust-building, sequential contact, offer structure,
      and closing do not change. What changes is the MEDIUM and the PATIENCE required. High-ticket
      requires more trust gestation time and more personal touchpoints, but the underlying framework is
      identical. This philosophy liberates marketers from believing affluent markets require completely
      different approaches — they require the same approach executed with more care and over a longer
      timeline.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 115-130)"
    domain: "affluent-marketing"

  - id: "FIL-DK-438"
    title: "Satisfaction Does NOT Prompt Referrals"
    content: >
      Contrary to popular belief, customer satisfaction does NOT generate referrals. DK is adamant:
      satisfied customers do NOT refer. Referrals come from specific triggers — recognition, appreciation,
      status access, wow experiences, and cocktail party stories. A satisfied customer has no REASON to
      tell anyone. A customer who had a remarkable experience, who gained status, who received unexpected
      recognition — THAT customer refers. This is why loyalty programs based on satisfaction measurement
      are fundamentally flawed. The referral engine must be designed around trigger events, not
      satisfaction scores.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 150-165)"
    domain: "affluent-marketing"

  - id: "FIL-DK-439"
    title: "Geographic Boundaries Are Mental Fences"
    content: >
      DK argues that geographic limitations on business are entirely mental constructs. The affluent think
      globally — they will fly across the country for the right dentist, the right advisor, the right
      experience. Marketers who limit themselves to local markets are imposing artificial constraints.
      With direct mail, internet, and sequential contact systems, any business can serve affluent clients
      nationally or internationally. The fence is in the marketer's mind, not in the market.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 177-185)"
    domain: "affluent-marketing"

  - id: "FIL-DK-440"
    title: "Congruent Quality — Everything Must Match the Promise"
    content: >
      If you promise premium, EVERYTHING must be premium. DK describes a restaurant that serves great
      steak but has dirty restrooms — the incongruence destroys the experience. This applies to
      info-marketing: if your content is brilliant but your delivery is sloppy (bad audio, cheap paper,
      delayed shipping), the customer perceives the WHOLE thing as low quality. Congruent quality means
      every touchpoint — packaging, delivery, customer service, follow-up, billing — must match the
      quality of the core product. Most info-marketers obsess over content quality but ignore delivery
      quality. DK insists they are EQUALLY important: "The wrapper IS part of the gift."
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "marketing"

  - id: "FIL-DK-441"
    title: "No Perfect Horse — Stop Waiting, Start Running"
    content: >
      There is no perfect horse. DK tells the story of waiting for the ideal conditions to launch, hire,
      invest — and it never comes. "Everybody has twenty-one small reasons to delay." The conditions are
      NEVER going to be perfect. The cost of inaction is always higher than the cost of imperfect action.
      DK recommends: "Make a big mess, throw six or seven things off the diving board, and jump in after."
      The circumstances change the MINUTE you take action — everything shifts. What matters is getting the
      ball into play and then adapting. Every ultra-successful person DK has observed got in over their
      head FIRST and figured it out SECOND.
    source: "transcription_mp3_Tim_Ferriss_Bonus.txt"
    domain: "business-strategy"

  - id: "FIL-DK-442"
    title: "Conspiracy to Steal My Time"
    content: >
      DK has a worldview that says everybody on the planet is in a vast conspiracy to steal as much of his
      time as possible, screw up his plans, and get in his way. This is not paranoia — it is a DESIGN
      PRINCIPLE. By assuming the worst, you build defenses, fortresses, strategies, and behaviors that
      prevent interference. The result: when DK IS working, he is working liberated from distractions. One
      hour of his truly productive time is equivalent to ten or twenty hours of the typical entrepreneur
      who allows constant interruption. The 24/7 connected culture (phones at lunch, checking email while
      eating) means zero recovery is built into anyone's daily schedule. DK goes out of his way to prevent
      this.
    source: "transcription_mp3_Tim_Ferriss_Bonus.txt"
    domain: "time-management"

  - id: "FIL-DK-443"
    title: "Sales ASSETS Not Sales PIECES — Build Equity Not Expense"
    content: >
      DK insists on the distinction between sales PIECES and sales ASSETS. A sales piece is one-time-use:
      a launch campaign, a single mailing, a one-off promotion. You spend money, get results, then shelve
      it. A sales ASSET is a consistently performing piece with long life that amortizes down to near-zero
      cost. Example: DK wrote a $25,000 full-page ad for a client. That ad ran every month in 3 magazines
      for 8+ years (96+ months). Cost per run: $86. DK says: "I am too expensive to pay just to sell some
      stuff. Let us create ASSETS for you." The aspiration should be a STABLE of consistently performing
      assets with long life. Operating entirely based on your next blockbuster hit is "a great way to pee
      away a lot of money."
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "FIL-DK-444"
    title: "It Is All New to THEM — The Gold in the Old"
    content: >
      There is enormous pressure to be brand new all the time. DK rejects this. Cavett Robert told him
      early: "It is new TO THEM." A client's TV infomercial held the all-time record for uninterrupted
      airing — 8 years. Every night it was brand new to enough people. Lexus reused the same Christmas
      commercials 3 years in a row. Disney still sells the 2-eared Mickey Mouse hat from when DK was a
      child. When DK's daughter was young, she could not distinguish old TV reruns from new shows — "We
      know it is old. THEY do not." The smartest info-marketers understand that what matters is
      entertainment or productivity when USED, not when CREATED. Most info-marketers commit 4 big mistakes
      about old stuff: personal disinterest in the gold in the old, getting tired of their own stock
      material, one-and-done promotion thinking, and creating new products instead of new marketing for
      good existing ones.
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "FIL-DK-445"
    title: "Direct Response Is Direct Response Is Direct Response"
    content: >
      Whether you are running a local brick-and-mortar business, retail business, service business,
      professional practice, or operating on a global scale — the same direct response principles apply.
      DK makes this point introducing Rick Cesari who built brands like Juice Man ($75M from zero in 3.5
      years), George Foreman Grill (30M+ units sold), Sonic Care toothbrush, and GoPro. The architecture
      of direct response has not fundamentally changed from the 1980s to today. Internet and social media
      give additional weapons to integrate, but the core selling techniques are identical. "If they do not
      work on a one-on-one or a small business level, they will not work on a large level either." The
      medium changes; the principles are eternal.
    source: "transcription_pdf_The_Principal_of_Selling.txt"
    domain: "direct-response"

  - id: "FIL-DK-446"
    title: "Familiarity Breeds Contempt — Leader Must Maintain Authority Distance"
    content: >
      DK is emphatic that socializing, being a buddy, hanging out at the bar, and otherwise socializing
      with mastermind members is a MISTAKE. "Familiarity breeds contempt. It diminishes your impact in the
      meetings. It runs risk of you doing something embarrassing that severely damages your authority." DK
      acknowledges some leaders party with their groups, but says: "I am not convinced this is
      sustainable. After all, I don't pay my friends to hang out with them." This extends to a strict
      prohibition on sexual liaisons with members. A "partying culture" is not conducive to real
      mastermind alliance. The leader must lead from the front, in an authority position — not as a peer
      sitting among equals.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "leadership"

  - id: "FIL-DK-447"
    title: "Loosely Formed Leaderless Groups Are Never a Tenth as Productive"
    content: >
      DK makes a sharp distinction between true masterminds with a capable leader and informal peer
      groups. "Loosely formed, less formal, leaderless groups are NEVER a tenth as productive as mine. To
      think you can just pile wood in the room is fallacious. Somebody who knows what they're doing needs
      to rub the sticks together." The mastermind effect — "spontaneous combustion" — requires harnessing
      by someone with deep, rich, relevant experience, current relevant work, and a capability for this
      particular leadership role. Without this, groups devolve into social clubs or complaint sessions.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "leadership"

  - id: "FIL-DK-448"
    title: "Time Invested Equals Commitment — The Deepest Selling Principle"
    content: >
      DK identifies this as one of the most important and least understood selling principles: "Time
      invested equals commitment. The more time a person invests, in this case in the application, the
      more invested he is in successful outcome — this is joining. Walking away empty-handed after putting
      in time and going to the trouble of applying feels like failure." He applies this to applications
      (Dr. Tom Orent's application takes at least an hour and requires fetching financial information),
      but says it "applies to much more than the Application Model, and most marketers and info-marketers
      do NOT grasp the importance of this fact." This is a universal selling psychology principle.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "sales"

  - id: "FIL-DK-449"
    title: "You Are in the Marketing Business — Everything Else Is a Deliverable"
    content: >
      DK elevates marketing beyond "most important function" to the actual identity of the business. "The
      business you're in IS the marketing business. And whatever it is that you exchange for money is a
      deliverable." A veterinarian doesn't get to be a veterinarian unless somebody walks through the door
      with a dog. A restaurant owner doesn't get to be a restaurant owner unless somebody walks in with an
      appetite and a wallet. Marketing is the ante to be able to be in whatever game you think you're in.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FIL-DK-450"
    title: "Good Enough Is Good Enough in the Deliverable — Master Marketing Instead"
    content: >
      DK argues that improving your core skill beyond "good enough" has zero correlation to income. "If
      the public goes to a magic show and the elephant disappears and they are fooled, if there's
      technical flaws that only other magicians would spot, getting better at making the elephant
      disappear will not equate to any increase in income whatsoever." The 10 highest paid speakers would
      get C and D grades by the professionals who teach voice technique — who make far less money. "It's
      more important to be a great marketer than a great doer of what you do."
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FIL-DK-451"
    title: "No Heart Surgeon Makes Cold Calls — Positioning Through Attraction"
    content: >
      DK's philosophy of attraction over pursuit or push. "No heart surgeon makes cold calls. You'll never
      have a cardiac surgeon knock on your door with a sample case. You'll never have a cardiac surgeon
      offer to do a demo." How you acquire customers defines your positioning, which links to price
      elasticity, acceptance of prescription, and referral willingness. Cold prospecting is "the lowest
      level of work — you fall off that cliff into janitorial work and that's as low as you can go."
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FIL-DK-452"
    title: "Big Businesses Play with Play Money — Small Business Uses Real Money"
    content: >
      DK distinguishes between corporations operating with "play money" from Wall Street/VCs and small
      businesses using "real money" that must cover payroll on the 15th. "Overstock.com — hundreds of
      millions a year — they've never made a profit, not one dollar ever. They don't have to because
      they're operating with big bushel baskets of play money." If you copy people who have access to play
      money and you only have real money, "you're going to be roadkill." The government is in the best
      position because they can legally print it.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FIL-DK-453"
    title: "All Breakthroughs Come from Outside — Don't Be Amish"
    content: >
      DK coins the concept of being "Amish" in business — looking only at what others in your industry do.
      "The Amish community is a closed community. Everybody does exactly what everybody else does. By rule
      and by custom." Most businesses are the same — "all the dentists look at what all the other dentists
      are doing." But "all breakthroughs come from outside, not inside. There's almost never an organic
      internal breakthrough in any business, industry or profession." Your leverage comes from doing
      something that not every competitor is doing.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FIL-DK-454"
    title: "Create Marketing Assets, Not Marketing Activities"
    content: >
      DK distinguishes between "doing marketing" (random, erratic acts driven by desperation) and
      "creating marketing assets" (something built once that works continuously). Keith Lee example: took
      a campaign from Magnetic Marketing 22 years ago, used it every year without changing it, brings in
      roughly $14 for every $1 spent. Front-end direct revenue: almost $2M. Back-end lifetime value
      stacked over 22 years: $20-30M. "That's a very different experience than your Google AdWords
      campaign this week, that by next week all the algorithms will have changed."
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FIL-DK-455"
    title: "Sloganism Is Stupid — Meaningful Specifics Beat Vague Generalities"
    content: >
      DK attacks slogans as the refuge of businesses unwilling to differentiate. "A slogan is stupid and a
      USP is smart." Sloganism is "almost always product driven not market driven — all about who they are
      and what they got: we're the oldest, we're the best, we're the smartest." Financial services
      companies unwilling to say "we will guarantee you won't run out of money before you run out of life"
      resort to "vaguer broader sloppy things." DK's counter: use meaningful specifics instead of vague
      generalities — the Domino's USP said nothing about taste, quality, or tradition.
    source: "transcription_mp4_3.txt"
    domain: "copywriting"

  - id: "FIL-DK-456"
    title: "Privacy Is Dead — Use It or Lose to Those Who Do"
    content: >
      DK's philosophy that the erosion of privacy creates marketing opportunity. Timing data, behavioral
      data, purchase history, life events — all available commercially. A male who fits a hearing aid
      profile is "four times more likely to respond to marketing between the third and sixth month after
      the death of his spouse" because he just lost his "human hearing aid." In skincare, if marketing
      arrives during the week of a 50-68 year old woman's birthday, it's more effective than at any other
      time. "You can cut the list into 12 based on birthday month and spend all your money aiming at the
      ones who have higher susceptibility."
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "FIL-DK-457"
    title: "Every Herd Member Loses Value Daily Unless Something Increases It"
    content: >
      Every member of your herd is losing value today as you sit here, unless something's occurring today
      to increase its value. This is not a static asset.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FIL-DK-458"
    title: "Personality-Driven Business Is Infinitely Easier to Build"
    content: >
      A personality-driven business is infinitely easier to build and infinitely easier to build herd
      value in than is a non-personality driven business.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "business-model"

  - id: "FIL-DK-459"
    title: "Value Alone Is Fatally Flawed as Retention Strategy"
    content: >
      The logic that if I give them value they'll stay is fatally flawed. Subculture herds spend enormous
      sums with no ROI. Value is not why people stay in a herd.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FIL-DK-460"
    title: "Dependency Is Better Than Any Other Retention Factor"
    content: >
      Dependency when you can make it occur is better than any of the others. Crack dealers don't have to
      work hard to keep their herd together.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FIL-DK-461"
    title: "Size Is Most Meaningful to List Rental Business Only"
    content: >
      Measuring success or value by sheer numbers is like equating gourmet with bulk. A herd that is too
      big can be obstacle to efficacy, too expensive to fence, or outright delusion.
    source: "8 Lords of List Building/transcription_pdf_Lords_of_List_Building_Exhibits.txt"
    domain: "list-management"

  - id: "FIL-DK-492"
    title: "Trust Enables Abdication"
    content: >
      People make almost all their trust decisions which trust allows for abdication of choice and
      abdication of responsibility. We abdicate authority. We don't delegate. We abdicate authority to
      people we trust.
    source: "transcription_mp4_video_2.txt"
    context: "Mind Hijacking seminar — Item on Rapport Bridge / Affinity Bridge"

  - id: "FIL-DK-493"
    title: "No Genuine Negatives Exist"
    content: >
      I happen to believe you have no negatives. It's just how you use them. Everything you got is some
      sort of rapport or affinity bridge for somebody. And by the very act of disclosure, you disarm
      people's defenses.
    source: "transcription_mp4_video_3.txt"
    context: "Trump disclosure strategy vs Romney timidity"

  - id: "FIL-DK-494"
    title: "Disclosure Is Disarming"
    content: >
      People hear disclosures almost as dog whistles. Hardly anybody hears it except somebody who's been
      through it. They hear it loud and clear. And I instantly had cred with them that I wouldn't have had
      otherwise.
    source: "transcription_mp4_video_3.txt"
    context: "DK's own Peter Low speech — bankruptcy disclosure"

  - id: "FIL-DK-495"
    title: "People Want Permission Slips"
    content: >
      People want to do things, think things, say things that they feel badly about. When you dispense
      permission slips, that's pretty powerful. Limbaugh and Howard Stern are the two highest paid radio
      people in the world and they have one thing in common — they issue permission slips.
    source: "transcription_mp4_video_2.txt"
    context: "Permission Slips as hijack technique"

  - id: "FIL-DK-496"
    title: "Ritualistic Recognition Is Baked In"
    content: >
      We should never lose sight of how powerful this is because it's baked in us as kids. School, boy
      scouts, church groups. Most people do not outgrow it. It's in there and it's easy to trigger.
    source: "transcription_mp4_video_4.txt"
    context: "Pete Fernandez chiropractor example — knights of the round table"

  - id: "FIL-DK-497"
    title: "90% Are Not There For The Money"
    content: >
      Network marketing totally revolves around ritualistic recognition. It revolves far more around that
      than it does money because 90% of the people aren't making any money. They're not really even there
      to make money. They're there for this.
    source: "transcription_mp4_video_4.txt"
    context: "Why MLM companies thrive on recognition"

  - id: "FIL-DK-498"
    title: "Americans Want Royalty"
    content: "Americans want royalty. Don't ever think we don't. We'd sign up for a hot second if they let us share the queen."
    source: "transcription_mp4_video_5.txt"
    context: "Trump's escalator descent optics"

  - id: "FIL-DK-499"
    title: "Optics Beat Substance"
    content: >
      It is less about what is being said than the impression they get by what they see. In many cases
      that's what's going to stick. Not what you said. That's what's going to stick.
    source: "transcription_mp4_video_5.txt"
    context: "Showmanship and optics — Dukakis tank, Kerry windsurfing"

  - id: "FIL-DK-500"
    title: "Rituals Create Behavioral Lock-In"
    content: >
      If you can get people performing these rituals, it is easier to get them to do other things you want
      them to do because you've already established a pattern of behavior. You also create pain and
      disconnect because it's emotional.
    source: "transcription_mp4_video_5.txt"
    context: "Green pens, backing cars, carrying $100 bills"

  - id: "FIL-DK-501"
    title: "Demo Beats Testimony"
    content: >
      Are they really going to remember much of the DNA expert on the stand in his 50 minutes of Q&A
      testimony, or are they going to remember that glove? They're going to remember that.
    source: "transcription_mp4_video_5.txt"
    context: "OJ Simpson glove demo analysis"

  - id: "FIL-DK-502"
    title: "Most Demos Are Rigged — And Should Be"
    content: >
      You never do a demo that you don't know the outcome of. Like the law rule — you never ask somebody a
      question you don't know the answer to. Most demos that you see are rigged. Sometimes a little,
      sometimes not so much, but they're rigged.
    source: "transcription_mp4_video_6.txt"
    context: "Phone demo, infomercial gel insole, firewalking all analyzed"

  - id: "FIL-DK-503"
    title: "Demos Can Be Illogical And Still Powerful"
    content: >
      These demos actually prove nothing about how this is going to work. They prove nothing, zero. Yet in
      people's minds, they absolutely prove how fantastic these products are. Demos can be illogical and
      yet extremely powerful.
    source: "transcription_mp4_video_6.txt"
    context: "Impact gel insole — hammer and car demos"

  - id: "FIL-DK-504"
    title: "Any Version of 'The Computer Says So' Is Gospel"
    content: >
      Any version of the computer says so is now accepted as gospel. That's how people drive up off-ramps
      because the GPS says. People will follow a machine into a dead-end crack house street rather than
      use their own eyes.
    source: "transcription_mp4_video_6.txt"
    context: "Scholes insole machine, cosmetics analyzers, GPS obedience"

  - id: "FIL-DK-505"
    title: "No Movement Rises Without Belief In A Devil"
    content: >
      No movement ever rises without belief in a devil. You need a devil. The excitement of the movement
      is proportionate to the tangibility and vividness of the devil.
    source: "transcription_mp4_video_9.txt"
    context: "Seven criteria for using enemies and villains"

  - id: "FIL-DK-506"
    title: "Boogie Man Under The Bed Is Universal"
    content: >
      100% of people as children had boogie men under the bed or in the closet. Someone coming to get
      them. And usually a parent fixed it. That's deep in there. It's just waiting to be hit with a sharp
      pointed stick and there it is again.
    source: "transcription_mp4_video_9.txt"
    context: "Universal childhood fear = root of villain psychology"

  - id: "FIL-DK-507"
    title: "Big Numbers In Isolation Override Context"
    content: >
      The minute people hear what feels to them to be a big number, they believe a thing is more real than
      if they hear a small number or no number at all. The number never really has to be in context.
    source: "transcription_mp4_video_8.txt"
    context: "Invisalign 2M, Proactiv #1 brand, UFO belief study"

  - id: "FIL-DK-508"
    title: "If Enough People Believe Something, It Must Be True"
    content: >
      816 of 1000 UFO believers stated as their number one reason: the sheer number of reports means there
      must be some truth to it. If stock prices are rising, 87% of active investors agreed they are very
      likely to continue rising.
    source: "transcription_mp4_video_8.txt"
    context: "Skeptic Magazine + Investors Business Daily surveys"

  - id: "FIL-DK-509"
    title: "90% of Marketing Defaults To Feature-Price-Offer"
    content: >
      All bad marketers, bad salespeople, bad advertisers default to product feature, benefit, price,
      offer, and some claim of comparative superiority. That's the least important thing we could ever do.
      All this other stuff moves a lot more merchandise.
    source: "transcription_mp4_video_9.txt"
    context: "Contrast with mind hijacking techniques"

  - id: "FIL-DK-510"
    title: "We Greatly Underestimate Threshold Height"
    content: >
      We think we're not scary. Whatever it is that you do, you do it all the time and it long ago lost
      its novelty. But for prospects, getting dressed, driving somewhere unknown, sitting with strangers,
      stripping naked financially — these are enormous thresholds.
    source: "transcription_mp4_video_10.txt"
    context: "Financial advisor seminar — 40% don't book even after showing up"

  - id: "FIL-DK-511"
    title: "People Don't Want Control — They Want To FEEL In Control"
    content: >
      People often like to feel in control. Truth of the matter is, they don't really even want to be in
      control. They just like to feel like they're in control. It's not the reality ever. It's how
      somebody feels about the reality.
    source: "transcription_mp4_video_11.txt"
    context: "Restaurant choice with Carla — 'you pick' from two pre-selected options"

  - id: "FIL-DK-512"
    title: "Greed Is Visceral, Not Optional"
    content: >
      For 95% of us, greed is not really optional. It's not really consciously managed. It's visceral.
      Like a full dog will still eat a hunk of steak on the floor. Therefore it is stimulatable in just
      about anybody — poor, rich, smart, dumb, educated, uneducated.
    source: "transcription_mp4_video_13.txt"
    context: "Martha Stewart insider trading, doctors at get-rich seminars"

  - id: "FIL-DK-513"
    title: "Free Never Dies"
    content: >
      Every 3-5 years there's a funeral for the word 'free.' The consumer has wised up, they say. Then
      free crawls back out of the grave and works. Same with long copy. People have an unconscious,
      hardwired, visceral desire for it that is irresistible even when intellectually they know it's
      nonsense.
    source: "transcription_mp4_video_13.txt"
    context: "Advertising industry cycles of declaring free/long copy dead"

  - id: "FIL-DK-514"
    title: "Fatigue With The Old Beats Satisfaction With The Working"
    content: >
      It doesn't matter necessarily how well what you are delivering works. They will still grow unhappy
      with it. As they lose the pleasure of new, more of old will not counteract that emotional reaction.
      Piling more of the same on won't make them happier.
    source: "transcription_mp4_video_13.txt"
    context: "P&G Tide — nobody stopped using it because it didn't work, they switched because they were bored"

  - id: "FIL-DK-515"
    title: "90% Of Population Is Situationally Corruptible"
    content: >
      5% hardwired honest, 5% hardwired dishonest, 90% situational. The 90% need three things: perceived
      need, ability to rationalize, and belief in undetectability. If all three present, greed/theft
      occurs.
    source: "transcription_mp4_video_13.txt"
    context: "Theft control client + employee theft up 50% in 7 years"

  - id: "FIL-DK-516"
    title: "Nobody Operates In A Vacuum — Positional Status Rules"
    content: >
      People are constantly comparing themselves to each other in whatever community they are in. When you
      take positional status away from any group of performers, everybody's performance goes down. That's
      actually the problem with egalitarian socialism.
    source: "transcription_mp4_video_14.txt"
    context: "Joe's Crab Shack no-tip failure, Saturn no-commission failure"

  - id: "FIL-DK-517"
    title: "We Don't See Things As They Are — We See Them As We Are"
    content: >
      We often buy not by what it is but by who we are or who we like to think of ourselves as being.
      Affluent generally buy what is most expensive, most exclusive, and most symbolic. Poor people buy
      what reflects aspirational self-image.
    source: "transcription_mp4_video_14.txt"
    context: "Cadillac symbolism, Patek Philippe ad, Dan Kennedy positioning"

  - id: "FIL-DK-518"
    title: "Everybody Has At Least One Deep Dark Black Hole"
    content: >
      Just about everybody has at least one thing they genuinely don't feel good about. This is their
      greatest hidden desire. A lot of what they spend money on, and a lot of things they do, is really
      about that. They rarely enunciate it even to themselves.
    source: "transcription_mp4_video_16.txt"
    context: "Johnny Cash stage fright, famous athlete fragility, Sally Field 'you like me"

  - id: "FIL-DK-519"
    title: "Optimistic Bias Is Deeply Embedded, Nearly Hardwired"
    content: >
      Even the most pessimistic and cynical people are susceptible to optimistic bias. Somebody does win
      the lottery, and that fact triumphs over the odds. People will buy the same failed diet, the same
      failed opportunity, the same thing they failed at — because THIS TIME it'll be different.
    source: "transcription_mp4_video_16.txt"
    context: "Lottery stats, 30% of WW are 3rd-5th timers, Trump U cross-lists"

  - id: "FIL-DK-520"
    title: "Loss Is Always Bigger Than Gain"
    content: >
      People are always more reluctant to suffer a loss than they are motivated by getting a gain. Disney
      gets compliance not through joy but through 'you may NEVER get on this ride.' Loss gives you urgency
      organically.
    source: "transcription_mp4_video_17.txt"
    context: "DVC 7am booking, coaching call door-slam, Zig loss script"

  - id: "FIL-DK-521"
    title: "Confidence Is Situational, Not Universal"
    content: >
      When you move somebody from one place they're comfortable to another they're uncomfortable, often
      all their psychological strengths are situational. Johnny Cash performs for tens of thousands but
      nearly in fetal position before a speaking gig.
    source: "transcription_mp4_video_16.txt"
    context: "Athletes, celebrities, business people — all situational"

  - id: "FIL-DK-522"
    title: "Conspiracy Is The Most Appealing Belief Choice"
    content: >
      When people face negative outcomes, three belief choices: 'I'm an idiot,' 'I'm a slob with no
      discipline,' or 'there's a conspiracy against me.' Conspiracy is the most psychologically
      comfortable. People gravitate to it.
    source: "transcription_mp4_video_19.txt"
    context: "Why conspiracy industries thrive — most appealing explanation"

  - id: "FIL-DK-523"
    title: "People Understand New Through The Familiar"
    content: >
      People always try to comprehend something new in context of something they already understand. 'It
      tastes like chicken.' We underestimate how uncomfortable people are with the unfamiliar.
    source: "transcription_mp4_video_20.txt"
    context: "Steve Jobs desktop metaphor, IKEA catalog as 'technology"

  - id: "FIL-DK-524"
    title: "1+1=2 Is Tattooed So Deep They Accept False Logic"
    content: >
      Because 'one plus one equals two' is embedded since childhood, people automatically accept any two
      presented 'ones' as equaling the 'two' you show them. They almost never question the logical
      connection. All fake science in marketing is done this way.
    source: "transcription_mp4_video_21.txt"
    context: "Shark cartilage: 'sharks don't get cancer' + 'eat cartilage' = 'you won't get cancer.' 12-14M books sold."

  - id: "FIL-DK-525"
    title: "Consumers Have NOT Gotten Smarter"
    content: >
      From Barnum's brick trick (1800s) to the California museum glasses prank (2016), the same
      psychological mechanisms work identically. People are not more discerning than they were generations
      ago.
    source: "transcription_mp4_video_20.txt"
    context: "Each new medium fools the public again (radio, TV, internet)"

  - id: "FIL-DK-526"
    title: "Effectiveness Of Doctrine Comes From Certitude, Not Meaning"
    content: >
      Eric Hoffer's True Believer: 'The effectiveness of a doctrine does not come from the meaning but
      from its certitude. It's not effective unless presented as the one and only truth.' People want AN
      answer, not a portfolio of answers.
    source: "transcription_mp4_video_22.txt"
    context: "Hoffer + Atkins + chiropractor + political examples"

  - id: "FIL-DK-527"
    title: "Flexibility Equals Repulsion, Not Attraction"
    content: >
      The intuitive idea that loosening up and becoming more flexible will attract more people is
      fundamentally wrong. The more you water down, the FEWER people come into the tent. This applies to
      politics, diets, religions, and businesses.
    source: "transcription_mp4_video_22.txt"
    context: "Pope Francis liberalizing, Democrats losing, Atkins domination"

  - id: "FIL-DK-528"
    title: "Fear Drives Hope Which Drives Belief Acceptance"
    content: >
      Fear is the driver. 'I don't know if he's telling the truth about that generator, but I HOPE he is
      because I'm SCARED of the power grid collapse.' Fear creates the emotional space that makes
      hope-based promises irresistible.
    source: "transcription_mp4_video_21.txt"
    context: "Wizard's First Rule + fear/hope link model"

  - id: "FIL-DK-529"
    title: "People Walk Around With Umbilical Cord Seeking A Place To Plug In"
    content: >
      Most people want someone to tell them THE way, THE answer, THE system. Winners in any market give
      them exactly this. You can't sell it by saying 'it's a good one.' It must be presented as the ONLY
      one.
    source: "transcription_mp4_video_22.txt"
    context: "Kavitz quote — every diet, system, methodology must be the only truth"

  - id: "FIL-DK-530"
    title: "Sequential Submission Trumps Single Giant Commitment"
    content: >
      People always prefer to submit sequentially rather than in one big giant commitment. But at a point
      fairly early, a significant commitment makes all subsequent ones easier. When you've given up your
      clothes, you're not going to object too much to the rest.
    source: "transcription_mp4_video_23.txt"

  - id: "FIL-DK-531"
    title: "Time Obtained Is The Master Variable"
    content: >
      There is a direct ratio between the time they invest with you and: likelihood of buying, price
      they'll pay, happiness after purchase, and referrals. One variable (time) equals four outcomes.
    source: "transcription_mp4_video_23.txt"

  - id: "FIL-DK-532"
    title: "Never Surrender Effectiveness For Efficiency"
    content: >
      Peter Drucker: big difference between efficiency and effectiveness. You don't want to trade away
      effectiveness for efficiency at any time. Particularly when there's money at stake. Anybody trying
      to bully you into shorter is trading effectiveness for efficiency.
    source: "transcription_mp4_video_23.txt"

  - id: "FIL-DK-533"
    title: "Attention Span Is A Myth — Interest Is Real"
    content: >
      Nobody has attention span except for things they find interesting, entertaining, or personally
      relevant. For that, people have virtually unlimited attention span. Binge-watching proves it. The
      trend to shorten everything is surrender of effectiveness.
    source: "transcription_mp4_video_23.txt"

  - id: "FIL-DK-534"
    title: "Glory Is A Theatrical Concept Requiring An Audience"
    content: >
      Eric Hoffer: 'There is no striving for glory without a vivid awareness of an audience.' Nobody would
      do anything competitive if nobody watched, applauded, or gave out ribbons. Everybody is susceptible
      — even wealthy, successful people.
    source: "transcription_mp4_video_23.txt"

  - id: "FIL-DK-535"
    title: "Don't Do Unimportant Shit"
    content: >
      The advice to scan quickly is only valid if what you're doing is unimportant. Two suggestions: don't
      do unimportant shit — do something important. And do it to somebody who has agreed it's important.
      Then they'll give unlimited attention.
    source: "transcription_mp4_video_23.txt"

  - id: "FIL-DK-536"
    title: "Nobody Wants The Blue Pill — Fortunes Require Full Arsenal"
    content: >
      The relentless search for an incredibly simple answer to an incredibly complex opportunity is our
      desire for a blue pill. That's not how fortunes are made. You cannot winnow persuasion down to a top
      20% — you need the full toolkit integrated.
    source: "transcription_mp4_video_26.txt"

  - id: "FIL-DK-537"
    title: "Output Is About Input — Eclectic Consumption Required"
    content: >
      If in a subject genre you are going to be able to be new, you do have to take in a lot of
      information and ideas in order to freshen yourself. And you need it to be eclectic. Principles never
      change, but tactics and tools change.
    source: "transcription_mp4_video_25.txt"

  - id: "FIL-DK-538"
    title: "The Messenger Matters Not Just The Message"
    content: >
      You need a constituency of people who resonate with you and want to spend time with you. They will
      then be forgiving of some retread of same territory. The overall experience is something they want
      to do.
    source: "transcription_mp4_video_25.txt"

  - id: "FIL-DK-539"
    title: "Human Nature Doesn't Change — Only Tools Change"
    content: >
      Principles of persuasion never change because human nature doesn't change. Human behavior changes a
      little. Strategies don't change much. Tactics change a lot. Tools change a lot and accelerate.
    source: "transcription_mp4_video_25.txt"

  - id: "FIL-DK-540"
    title: "Every Market Needs An Overarching Psyche Shortlist"
    content: >
      Most marketers skip having clarity on the 3-5 overarching objectives they must achieve with their
      targets' psyche BEFORE any specific pitch can work. The shortlist is about where people must be
      mentally and emotionally to respond. Everything must support that shortlist.
    source: "transcription_mp4_video_27.txt"
    context: "Financial services example: need active investors, short-term thinking, fear/anxiety, temptation with new products"

  - id: "FIL-DK-541"
    title: "No Law Requires A Problem To Exist Before A Solution Is Sold"
    content: >
      Lasker said 'there is no law that requires a problem to exist before a solution is created for it
      and sold to cure it.' When you write copy, you need not restrict yourself to preexisting problems.
      Most of the GDP depends on selling people things for problems they didn't know they had.
    source: "transcription_mp4_video_27.txt"
    context: "Listerine invented bad breath 1922, Athlete's Foot invented 1930, body odor created 1928 by ad agencies"

  - id: "FIL-DK-542"
    title: "Importance Should Be Disproportionate To Actual Problem"
    content: >
      There's no law that your use of copy needs to be proportional or reasonable in perspective to the
      actual impact of the problem. Whatever you're doing should be magnified to be THE #1
      destroyer/killer/evil threat or opportunity in their life at this moment. 70 pages about occasional
      sinus issues is the right approach.
    source: "transcription_mp4_video_27.txt"
    context: "Sinus pill mag-a-log: 70 pages making a trivial problem seem catastrophic — immune system, cancer, erection problems all linked to sinuses"

  - id: "FIL-DK-543"
    title: "Never Write To A Length — Write To Maximum Effectiveness"
    content: >
      Never start with a page count or time limit. Write to maximum effectiveness first. No client would
      ask for 70 pages about a sinus pill or a 52-minute lottery VSL — but that's what produces results.
      The person most susceptible is OK with almost any length.
    source: "transcription_mp4_video_28.txt"
    context: "Wind Trillions VSL: client wanted a 'better landing page,' got a 52-minute VSL. 32 minutes of cold read, 20 minutes of product."

  - id: "FIL-DK-544"
    title: "People Express Resistance Differently Than Their Real Resistance"
    content: >
      More often than not, people express their objections differently than what their resistance really
      is. A 72-year-old man saying 'I wasn't planning on spending that much' isn't objecting to price —
      he's asking for permission to spend money on himself instead of his grandkids.
    source: "transcription_mp4_video_29.txt"
    context: "Miracle Ear example: salesman answers price objection when real objection is guilt about spending on himself"

  - id: "FIL-DK-545"
    title: "People Disqualify Themselves More Than They Reject Propositions"
    content: >
      Half the selling story is about THEM, not the proposition. People accept the premise but then
      disqualify themselves: 'Yeah, but I have a shelf full of courses I never used.' Most marketers
      defend the proposition while the prospect has already moved past that to arguing with themselves
      about themselves.
    source: "transcription_mp4_video_29.txt"
    context: "Magnetic Marketing speech: must address 'this time will be different' because people's default disqualification is 'I never do anything with what I buy"

  - id: "FIL-DK-546"
    title: "Everybody's Default System Is No Action And No Purchase"
    content: >
      Everybody's system for buying is not to buy. Everybody's system for action is procrastination. You
      walk into a store hoping to find something, the clerk says 'can I help you' and you say 'no thanks,
      just looking.' This is the ingrained system — instant rejection happens easily.
    source: "transcription_mp4_video_29.txt"
    context: "Why retail scripts like 'can I help you' fail 9 out of 10 times — must design better opening scripts"

  - id: "FIL-DK-547"
    title: "Self-Interest Drives All Human Action"
    content: >
      Almost everybody, almost all the time is actually acting out of self-interest. If you clean the
      kitchen as a married guy, you didn't do it to be nice — you did it to avoid being bitched at, to buy
      golf points, or to have sex. Even charity has significant self-interest components.
    source: "transcription_mp4_video_31.txt"
    context: "Arrow to the Heart hijack — everything boils down to self-interest, self-esteem, and gender-specific motivations"

  - id: "FIL-DK-548"
    title: "Marketing To Both Genders Is Harder Than Splitting Them"
    content: >
      Messages aimed at both genders are more difficult to make work than splitting genders and talking to
      them differently. Glen Turner and Tolleson companies would separate men and women at opportunity
      meetings to talk differently because you can't be as blunt with either when both are present.
    source: "transcription_mp4_video_31.txt"
    context: "Men hardwired for conquest/gain, women hardwired for security/safety — different leverage points"

  - id: "FIL-DK-549"
    title: "Encouraging Cooperation Precedes Information Gathering"
    content: >
      Before you can elicit values or get anyone to open up, you must use a cooperation script. Psychics
      do it so the person gives information they can feed back later. Salespeople do it so they can
      structure their presentation around what the person told them they want.
    source: "transcription_mp4_video_32.txt"
    context: "Dave's psychic salesperson course — financial advisor cooperation script: 'obviously I'm experienced... as you know every person is different..."

  - id: "FIL-DK-550"
    title: "Language Acceptance Precedes Concept Acceptance"
    content: >
      Almost all societal change revolves around inventing palatable euphemisms for what is unpalatable
      when stated boldly. If you let the other side name the thing, you've already lost the argument.
      'Living wage' = undefeatable. 'Starter wage' = defensible. Whoever controls the language controls
      the outcome.
    source: "transcription_mp4_video_31.txt"
    context: "Estate tax vs death tax, illegal alien vs undocumented vs criminal alien, minimum wage → living wage → should be 'entry wage"

  - id: "FIL-DK-551"
    title: "People Want To Know Why — Any Explanation Beats None"
    content: >
      People desire an explanation for everything. Every culture independently developed religion as
      explanation for the unexplainable — not innate, but a response to the need for 'why.' In copy,
      adding a reason why ('because it has probiotic enzymes') instantly makes claims more believable and
      satisfying.
    source: "transcription_mp4_video_31.txt"
    context: "The explanation doesn't even need to be good — virtually every culture developed religions independently, all to explain 'why"

  - id: "FIL-DK-552"
    title: "Specificity Is The Universal Copy Weakness"
    content: >
      In almost every copy critique, specificity is one of the things Kennedy finds missing. Most people
      don't put in enough specifics about the product, the story, the testimonial person, about anything.
      Taking 4 paragraphs to tell a detail-rich story beats 1 paragraph of summary. Efficiency vs
      effectiveness.
    source: "transcription_mp4_video_31.txt"
    context: "Miracle Ear: went from 'Barbara N.' to full specific detail about each testimonial person — RNs, pastors, football coaches"

  - id: "FIL-DK-553"
    title: "Copy Is Creating And Agreeing With Reality"
    content: >
      Copy isn't just persuasion in print — it's changing someone's reality or agreeing with their
      existing reality/delusion so you can create a new reality in their head. The Kumari documentary
      proved this: fake guru's fraud teachings produced REAL benefits. It doesn't matter if the change
      mechanism is 'real.
    source: "transcription_mp4_video_34.txt"
    context: "Doverman Dan: Vikram Gandhi became fake guru Kumari in Phoenix — when revealed as fraud, followers still experienced real benefits"

  - id: "FIL-DK-554"
    title: "People Are Profoundly Reluctant To Abandon Beliefs"
    content: >
      Even Houdini demonstrating exactly how psychic tricks were done could not disabuse Arthur Conan
      Doyle of his belief in spiritualism. Doyle simply created new facts: 'Houdini actually IS psychic
      and is hiding it.' When people hold a belief, contradictory evidence gets reinterpreted to support
      the belief.
    source: "transcription_mp4_video_34.txt"
    context: "Reinforcing existing beliefs is far easier than creating new ones — people just rewrite facts to fit"

  - id: "FIL-DK-555"
    title: "All Media Has Become People Magazine"
    content: >
      From 1950s fenced-off categories (hard news, sports, entertainment) to now: non-news gets priority
      over news, celebrity preempts world events. 30% of all magazine covers feature people regardless of
      magazine topic. Cigar Aficionado has a celebrity on the cover. Forbes #1 issue: 100 richest
      celebrities outsells 500 richest by 3:1.
    source: "transcription_mp4_video-37.txt"
    context: "CNN leads with Katy Perry before Russia invading Ukraine. Empty Trump stage outdraws Hillary actually speaking."

  - id: "FIL-DK-556"
    title: "Stories Bypass Critical Thinking That Assertions Trigger"
    content: >
      Outright assertion automatically causes questioning: 'Who says so? Is that true?' When the same
      premise is buried in a story about a person, people get sucked in and accept it without challenging.
      Stories trigger different emotional responses than facts, figures, or information.
    source: "transcription_mp4_video-37.txt"
    context: "Political person-props (one-legged veteran, single mom) at State of Union — story with a person beats assertion even with opponents"

  - id: "FIL-DK-557"
    title: "Vast Numbers Of People Understate Their Importance"
    content: >
      People fear they're overstating when they're actually understating. You cannot be timid about
      putting across the importance of who you are, what you do, and what you want them to do. Ziglar:
      'timid salespeople have skinny kids.' Go to the outer limit that law and your conscience will allow.
    source: "transcription_mp4_video-38.txt"
    context: "Stem cell capsule: 'world's first,' 'most potent weapon against illness EVER CREATED,' 'repairs every organ in 57 days"

- id: "FIL-DK-593"
    title: "Firewall Against Counter-Influence"
    content: >
            'You've got to prepare them. Here's what's going to happen. You've got to
      negatively characterize all those people. They're going to descend on you like vultures
      picking at meat. They are going to try and drag you away from success because of their
      own past conditioning and purposes.' Pre-frame your audience against the opposing voices
      BEFORE they encounter them.
    source: "IWW-CD05-T01"
    domain: "influence"

  - id: "FIL-DK-594"
    title: "Communication Must Be Intimate Not Just Business"
    content: >
            'It can't just be the business communication. It can't just be the focus on the
      clinical, the technical, the mechanical. It has to arrive at a level of intimacy because
      they have influence over them to maintain their interest and attention and fascination.'
    source: "IWW-CD05-T01"
    domain: "influence"

  - id: "FIL-DK-595"
    title: "Competing With Intimacy Forces"
    content: >
            'We are in a sense competing with other forces that have a level of intimacy with
      them. So we got to have it.' The people and forces in your prospect's life already have
      intimate relationships — you must achieve the same level to compete for influence.
    source: "IWW-CD05-T01"
    domain: "influence"

  - id: "FIL-DK-596"
    title: "Everybody Wants To Be An Insider"
    content: >
            'Nobody likes to feel like an outsider. Everybody wants to be an insider. Everybody
      wants to belong.' This is the fundamental human drive that coded communication, rituals,
      and place exploit.
    source: "IWW-CD05-T01"
    domain: "influence"

  - id: "FIL-DK-597"
    title: "People Want Simple Certainties Not Complex Answers"
    content: >
            'People don't want complex answers to complex problems. They want simple answers to
      complex problems. And they want them to be very certain and very definitive.' The magic
      pill, the magic talisman. This is what makes Psycho-Cybernetics sell 100,000+ copies per
      year for 50+ years — 'think better about yourself and everything else will work out.'
    source: "IWW-CD05-T03"
    domain: "influence"

  - id: "FIL-DK-598"
    title: "Information Does Not Equal Influence"
    content: >
            'You don't influence with information, you don't influence with education. With
      education all you do is educate. They want things to believe in, they don't necessarily
      want to know anymore. They want faith.' When we inform and educate we are NOT building
      our influence. When we give them things to believe in, THEN we are building our
      influence.
    source: "IWW-CD05-T03"
    domain: "influence"

  - id: "FIL-DK-599"
    title: "Politics and Religion Are 50% of Life — Don't Ignore Them"
    content: >
            'The advice of never speak about politics, sex, and religion, I always thought it
      was stupid because pretty much what else are you going to talk about? We've just
      described 50% of everybody's life. The kitchen table conversation is still largely
      dominated by some version of politics and religion.'
    source: "IWW-CD05-T06"
    domain: "influence"

  - id: "FIL-DK-600"
    title: "Everything Is Derivative — Study The History"
    content: >
            'People see Tony Robbins, they think they're seeing something new. They see a
      current magician, they think they're seeing something radically new. And it goes back to
      the 1800s.' The smart operator is a pack rat in their industry who can pull from 30-50
      years of history. 'If you're only looking at the most contemporary stuff, you're seeing
      what's derivative of all these other steps.'
    source: "IWW-CD05-T07"
    domain: "business-strategy"

  - id: "FIL-DK-601"
    title: "Copywriting Job Is 80% Research, 20% Writing"
    content: >
            'Most copywriters view the job of writing copy as writing copy. And that's the
      smallest part of the job. The biggest part of the job is all this kind of stuff that
      we're doing to get ready to write the copy. And most of them don't ever do any of this
      stuff.'
    source: "IWW-CD06-T01"
    domain: "copywriting"

  - id: "FIL-DK-602"
    title: "Mount Olympus Is A Gated Community"
    content: >
            Dick Sutfen: 'Mount Olympus is a gated community. Reluctance to declare yourself a
      god and constantly remind everyone of your status prohibits residence on Mount Olympus.'
      Halbert: this IS the business we're in. 'Ultimately, they're buying us, and they're
      believing in us more than they are believing in themselves.'
    source: "IWW-CD06-T03"
    domain: "personal-branding"

  - id: "FIL-DK-603"
    title: "Self-Aggrandizement Is Required Not Optional"
    content: >
            'I hated all this stuff early, personally, and I fought it for a long time. I don't
      like being in the self-aggrandizement business. But it is the business that we are in.
      You have to do it constantly to remind them of your position and your status. And it
      permeates into every piece of printed matter you ever put in front of them.'
    source: "IWW-CD06-T03"
    domain: "personal-branding"

  - id: "FIL-DK-604"
    title: "Why Classics Endure — Unique Importance Over Subtlety"
    content: >
            Books that sell 100,000+ per year for decades with no advertising (Think and Grow
      Rich, Psycho-Cybernetics, How to Win Friends) all share the Principle of Unique
      Importance. 'It is this, more than it is anything else' that explains their endurance.
      Don't be subtle. Declare.
    source: "IWW-CD06-T04"
    domain: "marketing"

  - id: "FIL-DK-605"
    title: "People Want Miracles Not How-To"
    content: >
            From the prayer business story: 'Sold 20 prayers for every one of the lessons.
      People want miracles, not how-to information.' They wrote practical mimeographed lessons
      on getting out of debt, getting a job — nobody wanted them. The prayers outsold lessons
      20 to 1.
    source: "IWW-CD06-T07"
    domain: "influence"

  - id: "FIL-DK-606"
    title: "Take Away Value Is Low On The Priority List"
    content: >
            Newsletter priority order: (1) Connection/reconnection with place, (2) Members'
      connection with me, (3) Interest and entertainment, (4) Reinforcement, (5) Promotion, (6)
      Variety, (7) Take away value, (8) Involvement, (9) Overall satisfying experience. 'You
      will notice the take away value is fairly low on the list. There are other things that
      are far more important.'
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "FIL-DK-607"
    title: "Very Few Things Are Inherently Persuasive"
    content: >
            'There's very few things that are inherently funny and there's very few things that
      are inherently persuasive. So all this little detail makes a difference.' The unimportant
      details are what make writing persuasive or funny — not the core idea itself.
    source: "IWW-CD07-T03"
    domain: "copywriting"

  - id: "FIL-DK-608"
    title: "Never Be In The Conversion Business"
    content: >
            'I've never wanted to be in the conversion business. I'd rather go where they get
      it. Starting from zero with any proposition is an ugly thing.' Don't go where nobody
      understands or wants what you offer. Go where there's a friendly place and you're a good
      match. If you must go to the uninitiated: 'everybody's got to read this book and listen
      to this CD before I show up. Otherwise I ain't coming.'
    source: "IWW-CD08-T05"
    domain: "business-strategy"


# --- IWW CD01-04 L1_PHILOSOPHIES ---
  - id: "FIL-DK-628"
    title: "Fiction Over Nonfiction — We Are In The Fiction Business"
    content: >
      We are in the fiction business, not the nonfiction business.
      Most customers never do anything with what they buy, so their
      experience is fictional. They have activity confused with
      accomplishment and purchasing confused with accomplishment.
      We need to be fictional characters to them.
    source: "IWW-CD01-T06"
    domain: "influence"

  - id: "FIL-DK-629"
    title: "Personal Narrative Over Resume — Story Beats Credentials"
    content: >
      Traditional credentials, resumes, and qualifications are
      completely irrelevant to influencing people. The personal
      story is what gives authority. Barbara DeAngelois was a
      magician stage assistant before becoming a relationship guru.
      Marianne Williamson was a lounge singer before becoming a
      thought leader. We have never elected the best qualified
      person by resume to be president.
    source: "IWW-CD02-T01"
    domain: "personal-branding"

  - id: "FIL-DK-630"
    title: "Invention Is The Basis For Influence"
    content: >
      Really the basis for influence is invention. Person after
      person of great influence, you will find that they are
      inventions. Personal narratives can be written at will and
      rewritten at will. People have very short memories and are
      extremely accepting of whatever narrative we put in front
      of them, especially if it resonates with them.
    source: "IWW-CD01-T07"
    domain: "personal-branding"

  - id: "FIL-DK-631"
    title: "They Dont Care How Much You Know Until They Know How Much You Care"
    content: >
      Kavett Roberts Hallmark Card wisdom that proved profoundly
      true over decades: they dont care how much you know until
      they know how much you care. We are often trying to
      demonstrate knowledge and expertise, but they dont really
      care about that unless they believe you care about them on
      a personal and emotional level.
    source: "IWW-CD01-T04"
    domain: "influence"

  - id: "FIL-DK-632"
    title: "Influential Writing Is Simplification Not Explanation"
    content: >
      Influential writing is not about doing a better job of
      explaining things. Influential writing is about doing a
      better job of simplifying things. One is not the same as
      the other. We are not going for understanding, we are going
      for acceptance. Two entirely different objectives.
    source: "IWW-CD02-T02"
    domain: "copywriting"

  - id: "FIL-DK-633"
    title: "Connection Sells Better Than Pitch"
    content: >
      Personal narrative sells better than product. Dean Koontz
      spent 15 of 20 minutes on radio talking about his dogs
      instead of his horror novel. He was working on connection
      rather than on pitch. There are a lot more people who own
      and like dogs than people who read horror novels.
    source: "IWW-CD02-T02"
    domain: "influence"

  - id: "FIL-DK-634"
    title: "Greatest Influence Comes From Certainty And Concreteness"
    content: >
      The greatest influence comes from certainty, from
      concreteness, from black and white positions. The less
      wiggle room you give them, the firmer you are, the more
      influence you have over people. People look for concrete
      positions and want to be told exactly what to do.
    source: "IWW-CD03-T01"
    domain: "influence"

  - id: "FIL-DK-635"
    title: "The More You Avoid Offending The Less Influence You Have"
    content: >
      The more you try and avoid offending and repelling and
      annoying people and being criticized by them, the less
      influence you have over the ones you have. You must be
      willing to dump, repel, and send away a large number of
      people in order to have enormous impact on a small number.
    source: "IWW-CD02-T06"
    domain: "personal-branding"

  - id: "FIL-DK-636"
    title: "Embellished Reality Not Lies — Prevention Principle"
    content: >
      The way to play the game is with embellished reality, not
      with lies and disguises. There is a distinct difference
      between embellishing your story and faking your story.
      When you get your hand caught in a fabrication cookie jar
      the consequences are devastating and it was never necessary.
    source: "IWW-CD03-T04"
    domain: "personal-branding"

  - id: "FIL-DK-637"
    title: "Story Is The Source Of All Power In Selling"
    content: >
      The story is the source of all power in selling from the
      stage in person and certainly in writing. Few people can
      tell you any facts about Robin Hood but they all have a
      story in mind. Everybody knows the Think and Grow Rich
      story but nobody knows the 17 principles. You have not
      got a prayer of imprinting with core content or teaching.
    source: "IWW-CD03-T05"
    domain: "storytelling"

  - id: "FIL-DK-638"
    title: "Human Connection Is More Powerful Than Any Fact Or Resume"
    content: >
      In the Glenn Turner trial, one holdout juror refused to
      convict because Glenn Turner had a cleft palate like her
      son. One human connection kept him from a 10-year jail
      sentence. That power of human connection is more powerful
      than fact, more powerful than resume, more powerful than
      anything else.
    source: "IWW-CD02-T04"
    domain: "influence"

  - id: "FIL-DK-639"
    title: "The Most Powerful Narcotic Is The Promise Of Belonging"
    content: >
      The most powerful narcotic is the promise of belonging.
      The most valuable customers are typically people who feel
      like odd man out where they are — underappreciated,
      disrespected, misunderstood. When you provide a place
      where they are understood, you immediately have enormous
      influence over them.
    source: "IWW-CD04-T06"
    domain: "cult-building"

  - id: "FIL-DK-640"
    title: "Fascination Not Interest — The Difference That Matters"
    content: >
      There is a difference between fascination and interest.
      Interested people want to know if it works. Fascinated
      people want to know how it works — they want to take
      things apart, study the mechanics. People who are casually
      interested dont have enormous value. People fascinated
      with you have enormous value.
    source: "IWW-CD01-T06"
    domain: "influence"

  - id: "FIL-DK-641"
    title: "Legends Rarely Reflect Reality But Must Be Simple"
    content: >
      Legends rarely reflect reality but must be relatively
      simple for people to grasp, remember, and repeat. Nobody
      will memorize the biography. They will get the capsule
      you create. What served Wyatt Earp well was a simple
      legend — law man, fastest gun — even though the reality
      was completely different.
    source: "IWW-CD03-T02"
    domain: "personal-branding"

  - id: "FIL-DK-642"
    title: "People Want Values Connection Not Resume Connection"
    content: >
      People are looking for values connections, not resume
      connections or mechanical connections. The public doesnt
      care about policy details. What they are really trying
      to get at is what does this person stand for philosophically
      and do we kind of agree on core beliefs about family,
      religion, money.
    source: "IWW-CD02-T05"
    domain: "influence"

  - id: "FIL-DK-643"
    title: "Your Philosophical Positions Must Have No Wiggle Room"
    content: >
      Your philosophical positions must have no wiggle room to
      maximize influence. The three-step letter campaign worked
      because Kennedy was willing to set aside the fact that it
      shouldnt always be three steps. At point of connection,
      its three steps, 15 days apart, each refers to the previous.
      People got that. They want a thing.
    source: "IWW-CD03-T01"
    domain: "influence"

  - id: "FIL-DK-644"
    title: "Consistency Violation Destroys Influence"
    content: >
      You cant have Columbo pull a 44 magnum at the end of an
      episode. Once you pick a value position you must stay
      consistent with it in everything you do. Inconsistency
      destroys the value of your story. John Edwards had a great
      working class story destroyed by a 26000 square foot house
      and $400 haircuts.
    source: "IWW-CD04-T05"
    domain: "personal-branding"

  - id: "FIL-DK-645"
    title: "Pick A Side — Them Or Us Separation"
    content: >
      You must separate your people from the negative influences
      of family, friends, and employees who dont get your kind
      of marketing. You must alert them that most people around
      them will hate everything you tell them to do and will try
      to stop them. They have to pick a side. Them or us.
    source: "IWW-CD04-T07"
    domain: "cult-building"

  - id: "FIL-DK-646"
    title: "Happiness Is Not The Goal — Frustration Is The Constant"
    content: >
      I live in frustration pretty much constantly. I am pissed
      off more than anything else. I dont view it in terms of
      better or worse. I am not trying to fix it. I have no
      illusion that it is correctable. If you remove one irritant,
      a new one crops up. I suspect I seek it. I immerse myself
      in activity certain to guarantee frustration.
    source: "IWW-CD04-T01"
    domain: "business-strategy"


# --- IWW CD09-13 L1_PHILOSOPHIES ---

  - id: "FIL-DK-651"
    title: "People Care More About Who You Are Than What You Offer"
    content: >
      People care generally more about who you are than what you have done,
      and certainly more than what you do or even what you offer them. What
      they are really trying to figure out is: is this guy real? At the core
      of all of this, people make their buying decisions by trying to decide
      if the person is real or faking it.
    source: "IWW-CD10-T02"
    domain: "influence"

  - id: "FIL-DK-652"
    title: "Best Selling Books Are Stories Stitched Together"
    content: >
      Books that have outlived their authors and continue to influence years
      after there is no marketing, no advertising, no promotion — Think and
      Grow Rich, Psycho-Cybernetics, Dale Carnegie — they are fundamentally
      stories stitched together. That is what they are. The information is
      secondary to the stories.
    source: "IWW-CD10-T02"
    domain: "storytelling"

  - id: "FIL-DK-653"
    title: "Authenticity Through Transparency Is Supreme"
    content: >
      The word authenticity links to the principle of transparency. The more
      you let people in, the more likely they are to connect with you on a
      deeper level than transactional. Stories and personal life experience
      are the way to get there. The more diversity of stories you are willing
      to share, the more likely you are to connect with somebody.
    source: "IWW-CD10-T02"
    domain: "influence"

  - id: "FIL-DK-654"
    title: "Blank Slate Creativity Is The Enemy Of Speed"
    content: >
      If by creativity you mean blank slate creativity, that is the enemy
      of speed. Theft stopping short of plagiarism is a lot faster. The
      true fiction writer starting from scratch takes a lot of time. I am
      never going to be a great American novelist because I am not doing
      that — but I produce at high volume.
    source: "IWW-CD10-T05"
    domain: "copywriting"

  - id: "FIL-DK-655"
    title: "If You Are Going To Be A Writer You Must Write"
    content: >
      Bottom line: if you are going to be a writer, you write. Any writer
      will tell you that. The fact that you write speeds you up and makes
      you more proficient. It makes you less dependent on checklists because
      you reference them all the time in your head. The business we are in
      is really influencing people by words in print.
    source: "IWW-CD10-T04"
    domain: "copywriting"

  - id: "FIL-DK-656"
    title: "Jim Rohn Has No Content But Incredible Stories"
    content: >
      If you look at Jim Rohn, there is no content to what Jim does. Nothing.
      You should set goals. You should manage time. You should save money.
      I just gave you all the content. The guy has got a six day boot camp.
      That is because he is a good storyteller with great stories. He tells
      twenty stories then makes the point instead of one story.
    source: "IWW-CD10-T06"
    domain: "storytelling"

  - id: "FIL-DK-657"
    title: "People Buy From People They Like"
    content: >
      Fundamentally people buy things from people they like. You can bully
      them or intimidate them into a sale, but keeping them over a period
      of time the people who sell those ways do not keep them. Ultimately
      people have to find a reason to like you and then they have to have
      reasons to stay fascinated with you.
    source: "IWW-CD10-T06"
    domain: "influence"

  - id: "FIL-DK-658"
    title: "A Definitive Place Beats A Non-Definitive Place"
    content: >
      A definitive place is better than a non-definitive place because the
      people who connect with it really connect. If you try and create a
      place for everybody it is a place nobody likes. Like the neighborhood
      tavern with 22 regulars that support the whole deal. Those lifers
      have enormous value.
    source: "IWW-CD10-T06"
    domain: "marketing"

  - id: "FIL-DK-659"
    title: "People Symbolically Buy What You Represent"
    content: >
      They like what you symbolically represent to them. For some it is
      Americana and trustworthiness. For me it is being able to make things
      happen, live life on your own terms, make money from thin air. All
      of the writing from an influence standpoint needs to be geared
      towards that symbolic representation.
    source: "IWW-CD10-T07"
    domain: "influence"

  - id: "FIL-DK-660"
    title: "People Want To Plug The Umbilical Cord Into Someone"
    content: >
      Everybody is walking around with the umbilical cord looking for the
      new place to plug it in. People want to get rid of responsibility.
      They want to be told what to do. Preferably they want somebody to
      do it for them. They want to be connected to somebody who solves a
      whole set of problems for them.
    source: "IWW-CD10-T07"
    domain: "influence"

  - id: "FIL-DK-661"
    title: "Stories Are Infinitely More Powerful Than Teaching"
    content: >
      The piss in the pool story is infinitely better than all the diagrams
      and lists and teaching you could possibly do. It is memorable — people
      six months later say Harriet was pissing in the pool. Ideas that
      stick are visual stories. It is easier to do the outline and five
      points, but the story changes behavior.
    source: "IWW-CD10-T07"
    domain: "storytelling"

  - id: "FIL-DK-662"
    title: "Never Underestimate Their Ability To Ignore Us"
    content: >
      You should never underestimate their ability to ignore us. If you
      got a hundred customers together and asked what they know about you,
      you would be shocked at what they do not know. Even though you think
      you put it in front of them six million times, they do not know it.
      Be the broken record and do it happily and regularly.
    source: "IWW-CD12-T04"
    domain: "marketing"

  - id: "FIL-DK-663"
    title: "They Got It All In The First Year But Stay For Other Reasons"
    content: >
      To keep people in coaching four, five, six, seven, ten years — they
      got it all in the first year. You kind of got Dan direct marketing
      in a relatively short period of time. So why do you stay around?
      You stay around for other reasons. The more personal disclosure you
      do, the more it becomes a retention issue.
    source: "IWW-CD11-T01"
    domain: "marketing"

  - id: "FIL-DK-664"
    title: "Advocacy Books Outperform Reference Books For Bonding"
    content: >
      Reference books stay on the shelf forever but they do not create
      emotional bonding and emotional movement. Advocacy books that are
      mostly stories do the opposite — they bring customers, not speaking
      engagements. The No BS books are advocacy books. The Ultimate Sales
      Letter is a reference book. Different purposes, different outcomes.
    source: "IWW-CD10-T03"
    domain: "copywriting"

  - id: "FIL-DK-665"
    title: "The Higher The Price Point The More They Buy The Story"
    content: >
      The further away from a commodity you are, the more it is dependent
      upon the story. The higher the price point, the more people are
      buying the story. Nobody buys three days in a room. Nobody buys
      three meetings a year. They buy aspirations. And the best way to
      present aspirations is through stories.
    source: "IWW-CD13-T03"
    domain: "influence"

  - id: "FIL-DK-666"
    title: "You Cannot Sell In Installments Month To Month"
    content: >
      You cannot sell in installments. They do not remember anything from
      month to month. Continuation is risky from week to week. But month
      to month, not a prayer. The story must link to something and have
      a purpose. A story without a bridge to what you want them to do is
      an expression of feeling without purpose.
    source: "IWW-CD13-T02"
    domain: "marketing"

  - id: "FIL-DK-667"
    title: "Customers Project Godlike Status Beyond Your Specialty"
    content: >
      Your customers project onto you godlike status that extends beyond
      your area of specialty. If they really connect with you they now
      want you to be a guru of many other things. They found you, they
      like you, they are happy with you. They want one dad. They do not
      want to go find seven different dads.
    source: "IWW-CD11-T02"
    domain: "marketing"

  - id: "FIL-DK-668"
    title: "Being A Broken Record Is A Performance"
    content: >
      The biggest thing to get people to be the broken record and do it
      happily and regularly is to view things as a performance. Like Yul
      Brynner doing The King and I for twenty years. It does not mean you
      will always nail the performance, but it gets you warmed up to the
      idea that you are going to repeat from here to eternity.
    source: "IWW-CD12-T04"
    domain: "influence"

  - id: "FIL-DK-647"
    title: "Origin Stories Are Absolutely Essential"
    content: >
      If you look at the superhero genre — Batman without the story of the
      parents being killed and falling in the well with the bats — the whole
      thing does not make sense. Who is he and why is he running around in
      that suit? Origin stories are absolutely essential. People are looking
      for missions beyond just taking their money.
    source: "IWW-CD12-T04"
    domain: "storytelling"

  - id: "FIL-DK-648"
    title: "Ugly Disclosure Makes Pretty Claims Believable"
    content: >
      If I show all this ugly stuff — my dad swallowing dynamite on a bar
      bet, caught drunk driving twice in 24 hours — then the pretty stuff
      I am showing you must be real too. There is never a need for due
      diligence because what I am telling you is the truth. Full disclosure
      of ugly things makes the good claims credible.
    source: "IWW-CD13-T04"
    domain: "influence"

  - id: "FIL-DK-649"
    title: "Facts Get Filtered But Stories Do Not"
    content: >
      Facts get filtered but stories do not. People filter facts through
      their preconceptions and dismiss them. Stories bypass that filtering
      mechanism and lodge in memory. Understanding this distinction is what
      separates influential writing from mere information delivery.
    source: "IWW-CD13-T04"
    domain: "influence"

  - id: "FIL-DK-650"
    title: "America Likes Heroes Because We Become Their Heroes"
    content: >
      America likes heroes because we are actually becoming heroes to the
      people that follow us. They have a duty to listen to us because we
      have become that hero. The hero story and origin story become
      important because it gives people a reason to follow, listen, and
      ultimately buy.
    source: "IWW-CD13-T04"
    domain: "influence"


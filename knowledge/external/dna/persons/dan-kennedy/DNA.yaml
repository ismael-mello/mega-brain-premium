      high margin (eagle business: $1 art print sold for $1,000). (B) Consistency factor:
      continuity/subscription that chugs along predictably. Ideally business justified by big paydays
      alone.
    source: "MM-02-cd6"

  - id: "FW-DK-169"
    title: "Grand Opening Customer Lock-In (4-Visit): (1) Ridiculous low-price blitz — any g"
    content: >
      Grand Opening Customer Lock-In (4-Visit): (1) Ridiculous low-price blitz — any garment 89 cents. (2)
      Second visit automatic: pick up clothes. (3) Great coupons for 3rd visit — almost as good as first
      offer. (4) Pick up couponed items = 4th visit. After 4 visits = customer locked for life.
    source: "MM-02-cd6"

  - id: "FW-DK-170"
    title: "Renegade Time Management System: (1) Decide how you'll do business and how peopl"
    content: >
      Renegade Time Management System: (1) Decide how you'll do business and how people do business with
      you. (2) Value time as #1 non-replaceable asset. (3) Train everyone to your rules. (4) Script days
      not just schedule. (5) Eliminate interruptions — appointment with yourself = same as appointment
      with pope. (6) Designated days for designated functions.
    source: "MM-03-cd1"

  - id: "FW-DK-171"
    title: "Self-Imposed Discipline Framework: not willpower but engineered structure. (1) M"
    content: >
      Self-Imposed Discipline Framework: not willpower but engineered structure. (1) Make commitments to
      people. (2) Set deadlines for everything. (3) Pre-script every day so no option exists. (4) Create
      self-imposed accountability via targets. (5) Join mastermind for external accountability. Result:
      'hitting snooze alarm 6 times doesn't exist as option.
    source: "MM-03-cd1"

  - id: "FW-DK-172"
    title: "Storyboard Planning (Disney Displayed Thinking): corkboard + index cards, one id"
    content: >

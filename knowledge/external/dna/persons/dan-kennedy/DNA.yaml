    source: "ACC-cd11"

  - id: "FW-DK-082"
    title: "The 'Co-op Coaching Add-On' model (Lee Milteer's Millionaire Mindset): Pre-packa"
    content: >
      The 'Co-op Coaching Add-On' model (Lee Milteer's Millionaire Mindset): Pre-packaged content that
      attaches to other coaches' programs. Coach pays ~$36K/year, amortizes to ~$500/member across 165
      members.
    source: "ACC-cd11"

  - id: "MET-DK-082"
    title: "Liability Prevention Method: (1) Screen clients through selectivity criteria, (2"
    content: >
      Liability Prevention Method: (1) Screen clients through selectivity criteria, (2) Use contracts with
      explicit disclaimers, (3) Decline at first lawyer red flag, (4) Maintain professional boundaries (no
      dating, drinking, therapy), (5) Eliminate problems early — never let them escalate.
    source: "ACC-video-DK_4"

  - id: "FIL-DK-083"
    title: "Being an entrepreneur is one of the loneliest jobs in the world. It's real hard"
    content: >
      Being an entrepreneur is one of the loneliest jobs in the world. It's real hard to really share with
      other people what's going on in your business.
    source: "ACC-cd10"

  - id: "MM-DK-083"
    title: "The 'Both Benefit' principle of public feuds: Trump vs. Rosie puts you on rival"
    content: >
      The 'Both Benefit' principle of public feuds: Trump vs. Rosie puts you on rival networks that would
      never otherwise promote you. He got on ABC the week before Apprentice premiered on NBC because of
      the Rosie feud.
    source: "ACC-cd11"

  - id: "FW-DK-083"
    title: "The 'Reputation Engineering' framework: Deliberately construct what is said abou"
    content: >
      The 'Reputation Engineering' framework: Deliberately construct what is said about you. Control the
      narrative with BOTH good stuff AND a calculated negative. The negative makes the positive more
      believable AND pre-qualifies behavior.
    source: "ACC-cd11"

  - id: "MET-DK-083"
    title: "Relationship Choreography Implementation (Summers White): (1) Create annual excl"
    content: >
      Relationship Choreography Implementation (Summers White): (1) Create annual exclusive event with
      formal setting, (2) Select guests on 3 layers (obligation + social proof + covert acquisition), (3)
      Engineer strategic introductions throughout, (4) Never pitch, (5) Let 15 years of consistency
      compound network value.
    source: "ACC-video-DK_5"

  - id: "HEUR-DK-084"
    title: "50% of closing happens with pre-filled paperwork — have the contract ready with"
    content: >
      50% of closing happens with pre-filled paperwork — have the contract ready with their name, terms,
      and details already filled in. Handing someone a document with their name on it creates
      psychological ownership.
    source: "ACC-cd04-T4"

  - id: "FIL-DK-084"
    title: "If you are not being talked about continuously — good or bad, better if it's mor"
    content: >
      If you are not being talked about continuously — good or bad, better if it's more good than bad — by
      your clientele amongst themselves and to others, you have a marketing problem. That won't happen by
      accident, it has to be planted.
    source: "ACC-cd10"

  - id: "MM-DK-084"
    title: "The 'Constituency Expansion' model: Trump at World Wrestling isn't about the wre"
    content: >
      The 'Constituency Expansion' model: Trump at World Wrestling isn't about the wrestling crowd per se.
      It's reaching a constituency that might not normally pay attention, then cross-pollinating
      audiences.
    source: "ACC-cd11"

  - id: "FW-DK-084"
    title: "The 'Challenge Feat' publicity model (Robert Allen style): Create a repeatable p"
    content: >
      The 'Challenge Feat' publicity model (Robert Allen style): Create a repeatable public challenge
      media can test. 'Drop me in any city with $500, no contacts — 48 hours later I'll have bought real
      estate.' Use it in advertising forever.
    source: "ACC-cd11"

  - id: "MET-DK-084"
    title: "Network Leverage Method: (1) Become hub of valuable relationships in niche, (2)"
    content: >
      Network Leverage Method: (1) Become hub of valuable relationships in niche, (2) Create switching
      costs through deep connections, (3) Use network access as value proposition beyond expertise, (4)
      Scale by being more valuable connector — not more work.
    source: "ACC-video-DK_5"

  - id: "HEUR-DK-085"
    title: "The escort method creates highest satisfaction — physically walk clients through"
    content: >
      The escort method creates highest satisfaction — physically walk clients through every step of
      onboarding, don't just send instructions. Personal escort from sale to fulfillment eliminates
      buyer's remorse.
    source: "ACC-cd04-T7"

  - id: "FIL-DK-085"
    title: "Everybody draws their lines about deception situationally. Everybody's got a mov"
    content: >
      Everybody draws their lines about deception situationally. Everybody's got a moving line. Anybody
      who tells you they got a permanent line, they don't.
    source: "ACC-cd10"

  - id: "MM-DK-085"
    title: "The 'Amortized Extraordinary' calculation: $175K for Branson's space flight over"
    content: >
      The 'Amortized Extraordinary' calculation: $175K for Branson's space flight over 3-year run-up =
      ~$50K/year for being talked about constantly. Probably really cheap money for perpetual
      word-of-mouth.
    source: "ACC-cd11"

  - id: "FW-DK-085"
    title: "The 'Jack Henry Fee Explosion': (1) Find someone with great story + underpriced"
    content: >
      The 'Jack Henry Fee Explosion': (1) Find someone with great story + underpriced service, (2) Add
      zeros to fee ($500→$5K), (3) Add zeros to product ($49→$490), (4) Split into Basic + Advanced
      (doubles fee to $10K), (5) Use story as marketing engine, (6) Use enemy/villain as emotional hook.
    source: "ACC-cd11"

  - id: "MET-DK-085"
    title: "Gold Plus Onboarding Method: (1) Deep business analysis via one-on-one call, (2)"
    content: >
      Gold Plus Onboarding Method: (1) Deep business analysis via one-on-one call, (2) Identify problems
      and opportunities, (3) Create simple reality-based plan (not complicated), (4) Identify key metrics
      to track, (5) Establish accountability rhythms (individual + group).
    source: "ACC-video-DK_7"

  - id: "HEUR-DK-086"
    title: "9 out of 10 people repent after a come-to-Jesus conversation — when you confront"
    content: >
      9 out of 10 people repent after a come-to-Jesus conversation — when you confront underperforming
      clients directly, 90% course-correct. The 10% who leave were going to leave anyway.
    source: "ACC-cd05-T2"

  - id: "FIL-DK-086"
    title: "The perverse nature of consulting is: number one, they don't want you if you fin"
    content: >
      The perverse nature of consulting is: number one, they don't want you if you find them, they only
      want you if they find you. Secondly, they pretty much only want your time if there is none of it
      available.
    source: "ACC-cd10"

  - id: "MM-DK-086"
    title: "Finite-Infinite Money Continuum: At one end, Ron LeGrand believes no limit to cu"
    content: >
      Finite-Infinite Money Continuum: At one end, Ron LeGrand believes no limit to customer spend. At the
      other, people believe every dollar to someone else is lost. Most successful operators are closer to
      infinite.
    source: "ACC-cd12"

  - id: "FW-DK-086"
    title: "Opposition Positioning Strategy: Pick something popular and position yourself as"
    content: >
      Opposition Positioning Strategy: Pick something popular and position yourself as the antidote. Both
      'I'm still doing it and nobody else is' AND 'I've never done it and you don't want someone who does'
      work equally well.
    source: "ACC-cd12"

  - id: "MET-DK-086"
    title: "Coaching Community Building Method: (1) Create partner directory of all members,"
    content: >
      Coaching Community Building Method: (1) Create partner directory of all members, (2) Host annual
      gathering for networking, (3) Add networking intro segments at events, (4) Facilitate
      member-to-member connections, (5) Remove departed members from directory (lock feature).
    source: "ACC-video-DK_7"

  - id: "HEUR-DK-087"
    title: "The #1 reason people drop out is too much stuff — overwhelm kills retention. Giv"
    content: >
      The #1 reason people drop out is too much stuff — overwhelm kills retention. Give them LESS content,
      MORE implementation time. One thing per month beats ten things per quarter.
    source: "ACC-cd05-T4"

  - id: "FIL-DK-087"
    title: "Everything that is talked about here has to be applied differently in different"
    content: >
      Everything that is talked about here has to be applied differently in different situations. This is
      not like Moses coming down the hill with the 11 commandments.
    source: "ACC-cd10"

  - id: "MM-DK-087"
    title: "Think of getting clients cold as more of a financing problem than a marketing pr"
    content: >
      Think of getting clients cold as more of a financing problem than a marketing problem. If you're
      narrow enough niched with a story, cost of sales is formulaic: $5,000-$9,000 per client.
    source: "ACC-cd12"

  - id: "FW-DK-087"
    title: "Industry Survey Strategy: Survey all key players in target market. Compile resul"
    content: >
      Industry Survey Strategy: Survey all key players in target market. Compile results into professional
      report. Nearly 100% enter dialogue because they participated and want results.
    source: "ACC-cd12"

  - id: "MET-DK-087"
    title: "Rent-a-Person-of-Influence Method: (1) Identify person of influence (Nido Qubein"
    content: >
      Rent-a-Person-of-Influence Method: (1) Identify person of influence (Nido Qubein, Gorbachev), (2)
      Negotiate rental arrangement, (3) Use their name and presence for your event or offer, (4) Extract
      toll from attendees and clients who want access.
    source: "ACC-video-DK_8"

  - id: "HEUR-DK-088"
    title: "Phone calls should be by appointment only — never accept inbound calls. Schedule"
    content: >
      Phone calls should be by appointment only — never accept inbound calls. Scheduled calls position you
      as the authority; available-anytime positions you as an employee.
    source: "ACC-cd05-T10"

  - id: "FIL-DK-088"
    title: "Better to be talked about in a negative way than not talked about at all. Being"
    content: >
      Better to be talked about in a negative way than not talked about at all. Being talked about drives
      all commerce — if they're not talking about you, they're talking about somebody else.
    source: "ACC-cd11"

  - id: "MM-DK-088"
    title: "When selling cold, being diagnostic rather than salesy is the key. Ask a lot of"
    content: >
      When selling cold, being diagnostic rather than salesy is the key. Ask a lot of questions and get
      people to tell you things. Essay questions, not yes-or-no.
    source: "ACC-cd12"

  - id: "FW-DK-088"
    title: "Interview Strategy for Access: Get a legitimate media vehicle (book deal, magazi"
    content: >
      Interview Strategy for Access: Get a legitimate media vehicle (book deal, magazine), approach hit
      list as media rather than seller. Bridge from media relationship to business relationship.
    source: "ACC-cd12"

  - id: "MET-DK-088"
    title: "Diagnostic Cold Selling Method: (1) Ask essay questions not yes/no, (2) 'How did"
    content: >
      Diagnostic Cold Selling Method: (1) Ask essay questions not yes/no, (2) 'How did you get in this
      business?' as opener, (3) Listen extensively, (4) Build diagnosis from their words, (5) Present
      solution based on their language, (6) Be patient — cold selling takes 90+ days.
    source: "ACC-video-DK_8"

  - id: "HEUR-DK-089"
    title: "Summers' dinner rule: 250 people you know × $2,500 average = a business can be b"
    content: >
      Summers' dinner rule: 250 people you know × $2,500 average = a business can be built from existing
      relationships alone. Most consultants ignore their existing network chasing strangers.
    source: "ACC-cd06-T4"

  - id: "FIL-DK-089"
    title: "This is not a coaching business or a consulting business or an information busin"
    content: >
      This is not a coaching business or a consulting business or an information business — it is a
      self-aggrandizement business, a promotion business, a client control business.
    source: "ACC-cd11"

  - id: "MM-DK-089"
    title: "Think of your prospect list as a farm — a real estate sales term. Carve out mana"
    content: >
      Think of your prospect list as a farm — a real estate sales term. Carve out manageable territory,
      then be ever present. Be there, be there, be there, be there.
    source: "ACC-cd12"

  - id: "FW-DK-089"
    title: "Rent-a-Person-of-Influence: Identify top 5 people everyone in constituency knows"
    content: >
      Rent-a-Person-of-Influence: Identify top 5 people everyone in constituency knows and admires. If you
      can't attach any other way, buy them — rent them. You are who you're with.
    source: "ACC-cd12"

  - id: "MET-DK-089"
    title: "Media Drip Prospecting Method: (1) Identify media target, (2) Start sending unus"
    content: >
      Media Drip Prospecting Method: (1) Identify media target, (2) Start sending unusual items 12 months
      before, (3) Never ask for anything, (4) Send books with post-it notes on relevant sections, (5) Send
      bobbleheads/clocks/unusual items, (6) Intensify drip when interview booked, (7) Stand out from 20
      identical press kits per week.
    source: "ACC-video-DK_9"

  - id: "HEUR-DK-090"
    title: "Familiarity breeds disaster in high-fee consulting — the more casual and familia"
    content: >
      Familiarity breeds disaster in high-fee consulting — the more casual and familiar you become with
      clients, the less they value your advice. Maintain formality and distance proportional to your fee.
    source: "ACC-cd06-T9,T10"

  - id: "FIL-DK-090"
    title: "What you see is rarely what is. Carnegie's real skill was raising money, not ind"
    content: >
      What you see is rarely what is. Carnegie's real skill was raising money, not industry. Edison was a
      fabulous self-promoter, not a great inventor. Trump is in the Trump business, not real estate.
    source: "ACC-cd11"

  - id: "MM-DK-090"
    title: "A book is better than a brochure. Nothing has more assumed expert status than a"
    content: >
      A book is better than a brochure. Nothing has more assumed expert status than a book. And it doesn't
      have to be good — a crappy self-published book typed on a typewriter still made me half a million.
    source: "ACC-cd12"

  - id: "FW-DK-090"
    title: "Cold Prospecting Trifecta: (1) Create hit list and farm relentlessly, (2) Be rel"
    content: >
      Cold Prospecting Trifecta: (1) Create hit list and farm relentlessly, (2) Be relentlessly persistent
      — daily contact until response, (3) When you get the meeting, be diagnostic not salesy.
    source: "ACC-cd12"

  - id: "MET-DK-090"
    title: "Marketing Media Selection Method: (1) List all potential media for your market,"
    content: >
      Marketing Media Selection Method: (1) List all potential media for your market, (2) Test each
      against 5 requirements (profitable, testable, measurable, understandable, predictable, duplicable),
      (3) Focus on ones that pass all 5, (4) Use them repeatedly, (5) Stop using ones that fail regardless
      of personal preference.
    source: "ACC-video-DK_9"

  - id: "HEUR-DK-091"
    title: "Just add a zero — Larry's foreign brides went from $395 to $3,950 with zero diff"
    content: >
      Just add a zero — Larry's foreign brides went from $395 to $3,950 with zero difference in
      conversions. Same story with $1,100→$30,000. No changes to offer, just price. The old price was
      simply wrong.
    source: "ACC-cd09-T5,T6"

  - id: "FIL-DK-091"
    title: "You are a more interesting character if you do not attempt to appear to be perfe"
    content: >
      You are a more interesting character if you do not attempt to appear to be perfect. The flaws are as
      interesting as the strengths. Superman without kryptonite = no enduring character.
    source: "ACC-cd11"

  - id: "MM-DK-091"
    title: "Every couple has a polished 'how did you meet' story. CEOs have the same with 'h"
    content: >
      Every couple has a polished 'how did you meet' story. CEOs have the same with 'how did you get in
      this business.' They've perfected it, they're dying to tell it. That's your opening question.
    source: "ACC-cd12"

  - id: "FW-DK-091"
    title: "Wow-Them Packaging: Send a big box of stuff instead of a brochure. Books with po"
    content: >
      Wow-Them Packaging: Send a big box of stuff instead of a brochure. Books with post-it noted
      sections, CDs, testimonial letters, bobbleheads, clocks. Nobody throws out a bobblehead.
    source: "ACC-cd12"

  - id: "MET-DK-091"
    title: "IP Protection Method for Coaches: (1) Cease and desist letter to copycats, (2) O"
    content: >
      IP Protection Method for Coaches: (1) Cease and desist letter to copycats, (2) Outrace with speed
      and volume of new content, (3) Plant decoy bad ads as traps, (4) Discourage entry with apparent
      complexity (Mike Storms billboard). Run faster, don't litigate slower.
    source: "ACC-video-DK_10"

  - id: "HEUR-DK-092"
    title: "Transaction size bump: if they'll pay $2,999 they'll pay $3,449. Small invisible"
    content: >
      Transaction size bump: if they'll pay $2,999 they'll pay $3,449. Small invisible-to-buyer bumps ×
      100 transactions = massive difference to seller. Disney sells caps for $14 in a captive environment
      and nobody's grumpy.
    source: "ACC-cd09-T7"

  - id: "FIL-DK-092"
    title: "If you've got personal scars, failures, or vulnerabilities — use them. Don't wal"
    content: >
      If you've got personal scars, failures, or vulnerabilities — use them. Don't walk away from any of
      your life experience that will be meaningful to people.
    source: "ACC-cd11"

  - id: "MM-DK-092"
    title: "When you fight an association, expect incremental punishment and retaliation. Bu"
    content: >
      When you fight an association, expect incremental punishment and retaliation. But a significant
      segment of their membership will resonate with you like never before.
    source: "ACC-cd12"

  - id: "FW-DK-092"
    title: "Guest/Partner Vetting Criteria: (1) What is their downstream business model? (2)"
    content: >
      Guest/Partner Vetting Criteria: (1) What is their downstream business model? (2) What happens to
      your customer? (3) Can you impose front-end restrictions? (4) Reputational risk? (5) If comparable,
      is there reciprocity?
    source: "ACC-cd12"

  - id: "MET-DK-092"
    title: "Ascension Ladder Implementation: (1) Free/low content at base to build audience,"
    content: >
      Ascension Ladder Implementation: (1) Free/low content at base to build audience, (2) Group coaching
      mid-tier, (3) Platinum/exclusive top-tier with waiting list, (4) 20% of each tier ascends naturally,
      (5) Create pent-up demand at top, (6) Staged conversion from monthly to annual prepay.
    source: "ACC-video-DK_10"

  - id: "HEUR-DK-093"
    title: "A book is just 12 newsletters — don't make it a big thing. A page a day is more"
    content: >
      A book is just 12 newsletters — don't make it a big thing. A page a day is more than you need. As
      soon as you say 'book', everybody's underwear tightens up. It's not Hemingway, it's a really long
      sales letter disguised.
    source: "ACC-cd07-T6,T7"

  - id: "FIL-DK-093"
    title: "Keeping clients in coaching programs is as much about their ongoing interest and"
    content: >
      Keeping clients in coaching programs is as much about their ongoing interest and fascination in you
      in general as it is about the core values of what they're getting from the group.
    source: "ACC-cd11"

  - id: "FW-DK-093"
    title: "Toll Position Monetization: When letting someone access your audience, either (a"
    content: >
      Toll Position Monetization: When letting someone access your audience, either (a) get reciprocal
      list access, (b) get paid on downstream sales, or (c) arrange equal trade. Never free access when
      there's trade-of-dollars risk.
    source: "ACC-cd12"

  - id: "MM-DK-093"
    title: "Count the Cookies Mechanism: Only way to get paid on usage-based compensation is"
    content: >
      Count the Cookies Mechanism: Only way to get paid on usage-based compensation is to control
      fulfillment yourself. Tie essential materials to YOUR office so client can't bypass the count.
    source: "ACC-cd15-track4"

  - id: "MET-DK-093"
    title: "Coaching Application Close Method: (1) Design 4-46 page application, (2) Include"
    content: >
      Coaching Application Close Method: (1) Design 4-46 page application, (2) Include 'zero answer'
      questions (how many marketing systems?), (3) Include 'top 3 frustrations' essays, (4) Include
      self-grading sections, (5) Prospect fills out before call, (6) Use their answers to customize pitch,
      (7) Time investment = emotional commitment.
    source: "ACC-video-DK_11"

  - id: "HEUR-DK-094"
    title: "Most books bought are never read — put promotional pages and free offer sticker"
    content: >
      Most books bought are never read — put promotional pages and free offer sticker in FRONT of book,
      not back. Don't rely on them reading through to find your offer. The book is a credibility tool
      better than any brochure.
    source: "ACC-cd07-T8"

  - id: "FIL-DK-094"
    title: "One good story can make you a lot of money. It's better to have 10, but one good"
    content: >
      One good story can make you a lot of money. It's better to have 10, but one good story built
      Kiyosaki's entire empire — Rich Dad Poor Dad is fundamentally one short story turned into 512 books.
    source: "ACC-cd11"

  - id: "MM-DK-094"
    title: "Three Numbers for Consulting Sale: Average transaction size + gross margin + cus"
    content: >
      Three Numbers for Consulting Sale: Average transaction size + gross margin + customer value
      (lifetime) = make anything you're selling them free via discount argument.
    source: "ACC-cd15-track2"

  - id: "FW-DK-094"
    title: "Five Compensation Structures Beyond Fees: (1) Percentage above base, (2) Royalti"
    content: >
      Five Compensation Structures Beyond Fees: (1) Percentage above base, (2) Royalties on copy/system
      usage, (3) Per-something measurable, (4) Use fees/licensing for work product, (5) Equity (last
      resort, with sale triggers and salary controls).
    source: "ACC-cd15-tracks3-5"

  - id: "MET-DK-094"
    title: "Consulting Referral-to-Close Method: (1) Receive referral inquiry, (2) Have pros"
    content: >
      Consulting Referral-to-Close Method: (1) Receive referral inquiry, (2) Have prospect write/fax why
      they want you, (3) Before your call, get 2+ testimonials faxed to prospect from people they respect,
      (4) Call with pre-positioned authority, (5) Always report back to referrer regardless of outcome.
    source: "ACC-video-DK_11"

  - id: "HEUR-DK-095"
    title: "Celebrity ROI is always multi-layered: (1) direct attendance lift, (2) mood/sell"
    content: >
      Celebrity ROI is always multi-layered: (1) direct attendance lift, (2) mood/selling environment at
      event, (3) accumulated reputation compound, (4) competitor discouragement, (5) media/PR. $75K for
      George Foreman paid back across all five.
    source: "ACC-cd07-T9,T10"

  - id: "FIL-DK-095"
    title: "Pushy is good, especially for women. Pushy broads do better than non-pushy broad"
    content: "Pushy is good, especially for women. Pushy broads do better than non-pushy broads."
    source: "ACC-cd11"

  - id: "MM-DK-095"
    title: "Application as Dual Device: (1) Involvement — time invested = emotional commitme"
    content: >
      Application as Dual Device: (1) Involvement — time invested = emotional commitment growing by the
      minute, (2) Inadequacy — self-diagnosis of gaps makes them need the program.
    source: "ACC-cd16-track2"

  - id: "FW-DK-095"
    title: "Consulting Fee Presentation Protocol: (1) Don't discuss fee too soon (3-ask rule"
    content: >
      Consulting Fee Presentation Protocol: (1) Don't discuss fee too soon (3-ask rule), (2) Don't switch
      to salesman mode after quoting, (3) Don't be afraid of the number, (4) Quote and shut up, (5)
      Pre-desensitize through environment and reputation.
    source: "ACC-cd15-tracks6-7"

  - id: "MET-DK-095"
    title: "Cold Client 4-Step Method: (1) Build hit list of 100 ideal targets, (2) Relentle"
    content: >
      Cold Client 4-Step Method: (1) Build hit list of 100 ideal targets, (2) Relentless presence for 90+
      days (unusual items, not brochures), (3) Diagnostic first conversation (essay questions, listen),
      (4) Wow box delivery (bobbleheads, books with post-its, personalized items).
    source: "ACC-pdf-bootcamp-notes"

  - id: "HEUR-DK-096"
    title: "Buy big celebrity at small celebrity price — get Trump's Apprentice cast (Bill R"
    content: >
      Buy big celebrity at small celebrity price — get Trump's Apprentice cast (Bill Rancic, Kristy Frank)
      instead of Trump. Linked at the hip but fraction of cost. You're buying Trump at a discount.
    source: "ACC-cd07-T10"

  - id: "FIL-DK-096"
    title: "Once you awaken someone to interest in a category, you can't fence them into jus"
    content: >
      Once you awaken someone to interest in a category, you can't fence them into just you. You
      automatically create a customer for a lot of other people.
    source: "ACC-cd12"

  - id: "MM-DK-096"
    title: "Staged Sale Architecture: Get easy yes first (percentage above base = 100% close"
    content: >
      Staged Sale Architecture: Get easy yes first (percentage above base = 100% close), then show what
      30% will cost over 3 years, then convert to prepay buyout at massive discount.
    source: "ACC-cd15-track3-4"

  - id: "FW-DK-096"
    title: "Application Selling System: (1) Long application (4-46 pages), (2) Mix fill-in-t"
    content: >
      Application Selling System: (1) Long application (4-46 pages), (2) Mix fill-in-the-blank + essay
      questions, (3) Inadequacy self-assessment grids, (4) 'Why are you a good candidate?' essay, (5)
      Supply-demand language, (6) Waiting list positioning, (7) Use self-disclosed gaps in closing call.
    source: "ACC-cd16-tracks1-4"

  - id: "MET-DK-096"
    title: "Testimonial Collection 7 Steps: (1) Identify best results, (2) Ask specific ques"
    content: >

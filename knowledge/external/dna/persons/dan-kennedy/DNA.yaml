  # --- DK-MM-02: Brass Balls (02-brass-balls) ---
  - id: MET-DK-136
    text: "Immunity to Criticism Method: (1) Read Thick Face Black Heart by Chin Ning Chu, (2) Apply psycho-cybernetics, (3) Stop looking at evaluation forms, (4) One metric: did they buy? (5) Practice until bulletproof"
    source: "MM-BB-CD2"
  - id: MET-DK-137
    text: "Compartmentalization Method: (1) Visualize closing computer file, (2) Open new file instantly, (3) Reset like football coach between plays, (4) Decide tonight, execute at 5am, (5) Practice daily switching"
    source: "MM-BB-CD4"
  - id: MET-DK-138
    text: "Multiple Lead Source Method: (1) List all possible lead generation methods, (2) Test each independently, (3) Keep ALL at break-even or better, (4) Never drop profitable for MORE profitable, (5) Test second ad in same pub, (6) 72 things x 1 patient each"
    source: "MM-BB-CD5"
  - id: MET-DK-139
    text: "Self-Celebrity Creation Method: (1) Write a book, (2) Do interviews, (3) Get articles published, (4) Be visible at industry events, (5) Be seen with famous people, (6) Maintain separate specialist identities per market"
    source: "MM-BB-CD6"
  - id: MET-DK-140
    text: "Big Picture Optimist / Detailed Pessimist Method: (1) Set optimistic goals, (2) List every detail that can go wrong, (3) Create contingency plan for each, (4) Do not let detail pessimism diminish outcome optimism, (5) Believe in both Peale and Murphy"
    source: "MM-BB-CD5"
  # --- DK-MM-03: Renegade Millionaire (03-renegade-millionaire) ---
  - id: MET-DK-141
    text: "Kennedy Day Scripting Method — night before: list all tasks with minutes assigned in priority order; morning: execute sequentially; constantly assess position vs clock; adjust like timing overhead slides in a speech"
    source: "MM-03-CD2"
  - id: MET-DK-142
    text: "Kennedy Client Selectivity Protocol — litmus tests (sued everyone? can't produce 3 happy past partners? time demands incompatible?); 3-morning rule; decline regardless of money if time-incompatible"
    source: "MM-03-CD3"
  - id: MET-DK-143
    text: "Kennedy Office-Free Management System — one support person in different city; daily call under 30 min; weekly FedEx box; schedule advisory to all contacts; inbound A/B/C triage; fax-only, no email, no cell"
    source: "MM-03-CD3"
  - id: MET-DK-144
    text: "Time-to-Money Accountability System — set time targets not just money targets; time targets are predictive indicators while money targets are historical; meet daily time targets and bank balance follows"
    source: "MM-03-CD3"
  - id: MET-DK-145
    text: "Kennedy Rules of Engagement Onboarding — query letter explains how you work before any relationship begins; present as win-win (no phone tag, prepared conversations); 3-strike tolerance policy; willing to drive someone off"
    source: "MM-03-CD3"
  # --- DK-MM-06: Midas Touch Selling (04-midas-touch/03-selling) ---
  - id: MET-DK-146
    text: "Million Dollar Presentation Build: (1) choose formula (AIDA/Problem-Solution), (2) decide generic proposition, (3) build that presentation, (4) build brand solution presentation, (5) yes-or-yes close, (6) practice perfectly before delivery, (7) refine over years."
    source: "MM-06-cd2"
  - id: MET-DK-147
    text: "Value Build Price Drop Close: (1) highest comparable (seminar $300), (2) condensed at lower, (3) add premiums (+$200), (4) total Z, (5) drop to ~50% Z, (6) guarantee + proof, (7) yes-or-yes."
    source: "MM-06-cd2"
  - id: MET-DK-148
    text: "Objection Draining: (1) prospect states objection, (2) nod write down, (3) what else?, (4) repeat until that is it, (5) if we resolve these you are ready?, (6) agreement, (7) address each, (8) cross off."
    source: "MM-06-cd3"
  - id: MET-DK-149
    text: "30-Day Implementation Sprint: (1) isolate ONE idea, (2) day-30 vision, (3) work backwards to tomorrow, (4) execute daily, (5) integrate thoroughly, (6) pick next. Do NOT set aside for later."
    source: "MM-06-cd2"
  - id: MET-DK-150
    text: "Game-Changing Reinvention: (1) identify no-advantage product, (2) refuse price competition, (3) add unique services, (4) create bundle eliminating comparison, (5) change rules -- no level playing field."
    source: "MM-06-cd3"
  - id: MET-DK-151
    text: "Stick Letter Execution: (1) same day long-form letter, (2) handwritten notes, (3) receipt + docs + card in envelope, (4) hand-address, (5) mail next AM, (6) dollar bill letter later, (7) extend to TCV."
    source: "MM-06-cd3"
  # --- DK-MM-07: Greatest Hits Newsletters (05-greatest-hits) ---
  # --- L1: PHILOSOPHIES (FIL-DK-302 to FIL-DK-316) ---
  - id: FIL-DK-302
    text: "Spy Mentality — your success is directly proportionate to your effectiveness as a spy. Observe, collect, steal ideas from every business you encounter. Walk through malls, restaurants, trade shows with spy eyes."
    source: "MM-07-pdf01"
  - id: FIL-DK-303
    text: "SFB Club (Stupid F***ing Blunders) — willingness to confess and learn from your own stupid mistakes is a strength, not weakness. Most people hide mistakes; winners study them."
    source: "MM-07-pdf01"
  - id: FIL-DK-304
    text: "Read FOR Purpose — train your subconscious by reading focused material for 21-30 consecutive days on one subject. After 21 days, subconscious starts generating ideas, connections, and solutions automatically."
    source: "MM-07-pdf03"
  - id: FIL-DK-305
    text: "Be Very Hard On Yourself — no time-out cards, no stress balls, no excuses. Winners hold themselves to the harshest standards. Self-compassion in business is self-sabotage."
    source: "MM-07-pdf02"
  - id: FIL-DK-306
    text: "Only Worthwhile Question: 'What did I get that I can use?' — never be a critic evaluating quality; be a prospector mining for gold nuggets in every presentation, book, seminar."
    source: "MM-07-pdf02"
  - id: FIL-DK-307
    text: "No Media Is Different — what works in direct mail works on TV works online. The medium changes, the principles of persuasion do not. Stop treating each medium as if different rules apply."
    source: "MM-07-pdf03"
  - id: FIL-DK-308
    text: "No Market Is Different — same E-FACTORS (emotional factors) drive behavior regardless of demographics, industry, B2B or B2C. The business owner who says 'my market is different' is strangling growth."
    source: "MM-07-pdf03"
  - id: FIL-DK-309
    text: "If You Want More, Make Yourself More Valuable — wealth follows value; value is built through relentless study, skill acquisition, and discipline. People who want million-dollar outcomes without building million-dollar competence are delusional."
    source: "MM-07-pdf06"
  - id: FIL-DK-310
    text: "Time Is Democratic and Just — everyone has the same amount. People who say they lack time are choosing not to prioritize self-improvement. The farmer who dies of starvation surrounded by ripe fruit."
    source: "MM-07-pdf06"
  - id: FIL-DK-311
    text: "Critical Competency Mastery — success in every business depends on mastery of a handful of critical competencies, one of which is ALWAYS marketing. The individual who diligently acquires know-how in each winds up with wealth."
    source: "MM-07-pdf06"
  - id: FIL-DK-312
    text: "Whoever can spend the MOST money to acquire a customer WINS — they buy speed, scale, discouragement of competition, and sustainability. Most marketers try to spend as little as possible and get crappy customers."
    source: "MM-07-pdf05,pdf08"
  - id: FIL-DK-313
    text: "Nothing Overcomes Bad Economics — the graveyard of marketing is bad economics. If you temporarily live with bad math because you're using cheap media, it's only a matter of time before you're in trouble."
    source: "MM-07-pdf08"
  - id: FIL-DK-314
    text: "There Is No Bad Number — once you get a number and know what it is, your challenge is how to bridge the gap to a number you can afford. Knowing the real number is always better than guessing."
    source: "MM-07-pdf08"
  - id: FIL-DK-315
    text: "Stick-to-itiveness Is Everything — the most striking distinction between winners and losers. Winners find strategies and stick to applying them. Losers waste years looking for the Easy Button. Talent is the most overrated of all things, less likely to lead to success than most things."
    source: "MM-07-pdf08"
  - id: FIL-DK-316
    text: "Rewards For Good Intentions Are Small — the rewards for unfulfilled talent just as small. Most people's report card reads 'Incomplete.' Success requires being stuck like superglue to an objective."
    source: "MM-07-pdf08"
  # --- L2: MENTAL MODELS (MM-DK-253 to MM-DK-263) ---
  - id: MM-DK-253
    text: "Mini-Conglomerate Theory — instead of finding new customers, add more and varied services to the SAME customer. Build 11+ revenue streams from one customer relationship. Deeper wallet share beats wider market share."
    source: "MM-07-pdf01"
  - id: MM-DK-254
    text: "Behavioral Targeting — reach prospects where their guard is relaxed and there is ZERO competition. Advertise outside the obvious context: dental ads in gourmet cooking magazines, financial planning in golf publications."
    source: "MM-07-pdf03"
  - id: MM-DK-255
    text: "5 Ways to Create Separation from competitors: (1) Product differentiation, (2) Price positioning, (3) Process uniqueness, (4) Service excellence, (5) Marketing superiority. If you can't separate on 1-4, Marketing (#5) is your last and most powerful option."
    source: "MM-07-pdf02"
  - id: MM-DK-256
    text: "Harvest Preparation — most business owners miss the harvest because they didn't prepare to collect it. Having leads without follow-up sequences, having traffic without capture mechanisms. The harvest dies in the field."
    source: "MM-07-pdf02"
  - id: MM-DK-257
    text: "Little Hinges Swing Big Doors — small annoyances, small neglects, small friction points undo even the smartest marketing strategy. A rude receptionist kills a $50,000 ad campaign. Sweat the small things."
    source: "MM-07-pdf02"
  - id: MM-DK-258
    text: "Buyer Motives as Moving Target — what drives the purchase decision shifts constantly. Yesterday's status symbol is today's commodity. Must continuously research and adapt to current emotional drivers."
    source: "MM-07-pdf01"
  - id: MM-DK-259
    text: "Crawl to Competence, Then Fast Rise to Superiority — mastery follows a two-phase curve: slow, painful competence-building phase followed by rapid ascent once critical mass of knowledge is reached."
    source: "MM-07-pdf06"
  - id: MM-DK-260
    text: "Genealogy of a Field — trace a master back to his teachers, and them to theirs. Understanding the intellectual lineage of a discipline reveals the original principles before they were diluted by imitators."
    source: "MM-07-pdf06"
  - id: MM-DK-261
    text: "Bad Math Tolerance via Cheap Media — using only cheap media masks unsustainable unit economics. When the cheap media window closes (and it always does), the business collapses. TV infomercial slots went from $200 to $20,000 in 5 years."
    source: "MM-07-pdf08"
  - id: MM-DK-262
    text: "Dollar-Cost Averaging Media — don't drop the 3 most expensive channels; average them together with the 5 cheapest. Competitors who keep only the cheapest channels lose scale, quality, and eventually market position."
    source: "MM-07-pdf08"
  - id: MM-DK-263
    text: "Copycat Immunity Through Economics — competitors can duplicate your creative, your show, your ad. They CANNOT duplicate your economics. The moat is unit economics, not creative genius. 'They didn't copycat the math.'"
    source: "MM-07-pdf08"
  # --- L3: HEURISTICS (HEUR-DK-380 to HEUR-DK-395) ---
  - id: HEUR-DK-380
    text: "List Decay Rule — a mailing list loses approximately 10% of its value per month it goes neglected. A 6-month-old untouched list has lost ~60% of its value. Frequency is the cheapest form of marketing."
    source: "MM-07-pdf02"
  - id: HEUR-DK-381
    text: "A-Pile vs B-Pile — teaser copy on envelopes tested against blank envelopes: teaser beats blank by 32% in consumer mail. But in B2B, plain envelope goes in A-pile (personal) while teaser goes in B-pile (junk)."
    source: "MM-07-pdf02"
  - id: HEUR-DK-382
    text: "4 Pipers of Personalization — personalized direct mail can achieve up to 20,000% ROI when personalization includes: (1) name, (2) relevant data points, (3) behavioral triggers, (4) timed sequences."
    source: "MM-07-pdf02"
  - id: HEUR-DK-383
    text: "Crayon Letter Positioning — a handwritten-looking letter (crayon/marker) placed as #2 in a multi-step sequence achieves 4-5% response rate. Works because it breaks pattern after a formal first letter."
    source: "MM-07-pdf02"
  - id: HEUR-DK-384
    text: "Ice Cream Sundae Rule — small delights compensate disproportionately for larger problems. A free dessert after bad service is worth more than 50% off. Delight on small things, fix big things."
    source: "MM-07-pdf02"
  - id: HEUR-DK-385
    text: "Slogan Recognition Failure — only 6 out of 22 big-company advertising slogans recognized by >10% of consumers. Branding through slogans fails for even the biggest spenders. Direct response beats branding."
    source: "MM-07-pdf02"
  - id: HEUR-DK-386
    text: "Big Fish Persistence — to get appointment with high-value prospect, try every creative approach available until you get in. Send FedEx, lumpy mail, celebrity endorsement, show up in person. Never accept 'no' as permanent."
    source: "MM-07-pdf02"
  - id: HEUR-DK-387
    text: "Observe Big Companies, Do the Opposite — big companies optimize for committees, consensus, brand guidelines. Entrepreneurs should optimize for speed, testing, and direct response. When Coke runs image ads, you run offers."
    source: "MM-07-pdf02"
  - id: HEUR-DK-388
    text: "Infomercial Market Scale — infomercials drove $154B in 2003. The format works because it gives enough time to build a complete sales argument. Lesson: never compress your sales message to fit a short format if you can go long."
    source: "MM-07-pdf03"
  - id: HEUR-DK-389
    text: "Kennedy Reading Rule — for 25 years, read a book a day plus newspapers, trade journals, and newsletters. Daily minimum: 1 book + all relevant trade publications. Knowledge acquisition is not optional."
    source: "MM-07-pdf06"
  - id: HEUR-DK-390
    text: "Handwrite Winning Ads 21x — take great direct-response ads and write them out longhand 21 times each to teach the subconscious the rhythm of great copy. DK did this with 100 different ads (2,100 total handwritten copies)."
    source: "MM-07-pdf06"
  - id: HEUR-DK-391
    text: "Build 200+ Book Library — collect over 200 books in your core discipline. Create organized sample/swipe files. The investment in reference material pays dividends for decades."
    source: "MM-07-pdf06"
  - id: HEUR-DK-392
    text: "There Is Always Cheap Media — but cheap media windows close. TV infomercial slots went from $200 to $20,000 in 5 years. Facebook ads were cheap in 2014, expensive by 2020. Smart operators use cheap media WITHOUT depending on it."
    source: "MM-07-pdf08"
  - id: HEUR-DK-393
    text: "5% vs 95% Rule — in any business category, fewer than 5% of owners create extraordinary incomes, wealth, security, and independence. 95% flounder frustrated for life. The difference is NOT talent."
    source: "MM-07-pdf08"
  - id: HEUR-DK-394
    text: "Proactiv Acquisition Escalation — DK helped scale Proactiv (Guthy-Renker) customer acquisition from $300 to $600 to $900 per $39 product by building backend economics. Used 22 different media forms simultaneously."
    source: "MM-07-pdf08"
  - id: HEUR-DK-395
    text: "Marketing is behavioral psychology and math — that's what it is. If either variable is wrong (psychology or economics), nothing saves you. Get both right and almost everything works."
    source: "MM-07-pdf08"
  # --- L4: FRAMEWORKS (FW-DK-221 to FW-DK-229) ---
  - id: FW-DK-221
    text: "Good Idea Bad Ad 13-Point Rewrite: (1) Headline must promise benefit, (2) Lead with strongest claim, (3) Include specific numbers, (4) Use testimonials, (5) Add deadline/urgency, (6) Clear call to action, (7) Multiple response options, (8) Guarantee, (9) Reason why, (10) P.S. with key benefit, (11) Remove corporate jargon, (12) Add Johnson Box, (13) Test against control."
    source: "MM-07-pdf01"
  - id: FW-DK-222
    text: "Leveraging the Customer Checklist — identify 11+ products/services you can sell to the SAME customer: core product, upsell, cross-sell, consumables, maintenance, referral program, events, membership, licensing, information products, affiliate offers."
    source: "MM-07-pdf01"
  - id: FW-DK-223
    text: "'What Would You Like That You Don't Get?' Diagnostic — single most powerful question for market research. Ask existing customers, lost customers, competitor's customers. Answers reveal unmet needs that become your competitive advantage."
    source: "MM-07-pdf02"
  - id: FW-DK-224
    text: "Against/Attack Advertising — explicitly position against a competitor, an industry norm, or a common practice. Name what you're against. Creates tribal loyalty and instant differentiation. Most businesses are too timid to attack."
    source: "MM-07-pdf03"
  - id: FW-DK-225
    text: "Romance/Theme Marketing Conversion — take a boring business and convert it to themed marketing. Estate planner becomes 'Romance Director', dental office becomes 'Smile Spa', accounting firm becomes 'Wealth Guardian'. Theme creates emotional connection and premium pricing."
    source: "MM-07-pdf03"
  - id: FW-DK-226
    text: "Kennedy-Style Marketing Summary (7 Principles): (1) Direct response always, (2) Measurable results on everything, (3) Brand is a byproduct not a goal, (4) Personality-driven marketing, (5) Multi-step sequences, (6) Test everything, (7) Discrimination in choosing customers."
    source: "MM-07-pdf03"
  - id: FW-DK-227
    text: "Gift With Appointment — offer tangible gift in exchange for showing up to appointment/consultation. Estée Lauder's origin strategy. Applied across dentists, financial advisors, real estate, hundreds of fields. Creates millions of sales appointments weekly."
    source: "MM-07-pdf07"
  - id: FW-DK-228
    text: "Cost Escalation Response Framework — as customer acquisition cost rises: (1) Add multi-step follow-up sequences, (2) Add phone room for non-responders, (3) Lead-swap with complementary marketers to cut costs in half, (4) Dollar-cost average across expensive and cheap media. Never just cut the expensive channels."
    source: "MM-07-pdf08"
  - id: FW-DK-229
    text: "Two Elements of Exceptional Achievement: (1) Sticking to a course of study and acquisition of information/methodology even when uncomfortable, foreign, or difficult; (2) Sticking to self-imposed requirements for implementation of what is learned. Most fail on #2."
    source: "MM-07-pdf08"
  # --- L5: METHODOLOGIES (MET-DK-152 to MET-DK-157) ---
  - id: MET-DK-152
    text: "Dog Letter / Sydney Letter Method — B2B outreach using a compelling story (dog named Sydney who picks mail) to make direct mail unmissable. Physical attachment (dog biscuit/treat) forces opening. Follow up with 'Did Sydney deliver my letter?' phone call."
    source: "MM-07-pdf01"
  - id: MET-DK-153
    text: "Renegade Millionaire Modeling: (1) Identify 10 leaders in your industry, (2) Visit each personally, (3) Observe operations for a full day, (4) Take notes on everything different from norm, (5) Synthesize best practices, (6) Implement the uncommon denominators."
    source: "MM-07-pdf03"
  - id: MET-DK-154
    text: "Read FOR Purpose Training (21-30 Day Program): (1) Pick ONE subject, (2) Collect all materials available, (3) Read/consume nothing else for 21-30 days, (4) Take action notes not academic notes, (5) After 21 days subconscious produces ideas automatically, (6) Implement immediately."
    source: "MM-07-pdf03"
  - id: MET-DK-155
    text: "DK Mastery Process: (1) Take on needed skill, (2) Study thoroughly/intensely minimum 1 hour/day, (3) Listen to recorded material constantly, (4) Seek out and get to know top people in the field, (5) Trace masters back to their teachers (learn genealogy), (6) Collect 200+ books, (7) Build organized swipe files, (8) Handwrite winning examples 21x each."
    source: "MM-07-pdf06"
  - id: MET-DK-156
    text: "Lead-Swap Methodology: (1) Use leads internally for 30 days, (2) Share exhausted leads with non-competing opportunity marketers, (3) They give you their exhausted leads in return, (4) Both cut acquisition costs in half, (5) Scale to 9+ swap partners for maximum leverage."
    source: "MM-07-pdf08"
  - id: MET-DK-157
    text: "Newsletter on a Postcard — condense newsletter content to postcard format for prospects who won't read full newsletters. Include: (1) one key insight, (2) teaser for full version, (3) call to action, (4) personality/photo. Maintains frequency at lowest cost."
    source: "MM-07-pdf01"
  # --- DK-MM-08: Direct Mail Swipe File (06-direct-mail-swipe-file) ---
  - id: MET-DK-158
    text: "Event-as-Transformation-Catalyst Method: (1) Create annual signature event (SuperConference), (2) Stack urgency (3-Warning Architecture), (3) Use post-event testimonials as proof that 'pieces came together' at event, (4) Pre-register 50%+ before they leave current event, (5) Position event as THE place where breakthroughs happen, connections form, and action is triggered."
    source: "MM-08-pdf02"

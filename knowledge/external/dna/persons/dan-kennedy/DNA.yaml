      money if we do.
    source: "CD/12 track 2 — DK on narrow vs broad messaging"

  - id: "FIL-DK-367"
    title: "The money is in marketing to the most likely buyer. You don't craft everything t"
    content: >
      The money is in marketing to the most likely buyer. You don't craft everything to influence the
      unlikely buyers. Screw them. Leave them in the bottom of the pyramid. Let somebody else rescue them.
    source: "CD/12 track 5 — DK on focusing on the most likely buyer"

  - id: "FIL-DK-368"

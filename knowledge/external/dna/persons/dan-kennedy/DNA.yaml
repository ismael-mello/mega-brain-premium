    source: "ACC-video-DK_3"

  - id: "FIL-DK-161"
    title: "First Time Ever or Last Time Ever: 'your challenge is to figure out how everythi"
    content: >
      First Time Ever or Last Time Ever: 'your challenge is to figure out how everything can be a
      history-making event.' Anything less than first-ever or last-ever is not particularly exciting.
    source: "ACC-video-DK_11"

  - id: "MET-DK-161"
    title: "The Content Color-Coding Audit: Step 1) Print your newsletter/ongoing content. S"
    content: >
      The Content Color-Coding Audit: Step 1) Print your newsletter/ongoing content. Step 2) Highlight in
      blue all actual marketing/tactical information. Step 3) Highlight in orange all belief-building,

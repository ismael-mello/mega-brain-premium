layers:
    - id: "MET-DK-225"
      title: "Trust Acceleration Process Engineering Methodology"
      content: >
        DK outlines a step-by-step methodology for engineering accelerated trust with
        affluent prospects:
        STEP 1: INITIAL CONTACT — High-quality direct mail (not email) with something
        physical and remarkable (wine crate, book, dimensional mailer)
        STEP 2: VALUE DELIVERY — Send 2-3 pieces of genuine value content (reports,
        case studies, articles) within 14 days of initial contact
        STEP 3: SOCIAL PROOF PACKAGE — Testimonials, media mentions, client list,
        credentials package — delivered as a physical portfolio
        STEP 4: PERSONAL OUTREACH — Phone call or personal note referencing something
        specific about the prospect (research required)
        STEP 5: INVITATION — Invite to Discovery Day, exclusive event, or diagnostic
        session (behind first money movement per HEUR-DK-552)
        STEP 6: IMMERSIVE EXPERIENCE — The event itself, designed for environmental
        control and wow factor
        STEP 7: FOLLOW-UP SEQUENCE — 7+ contacts post-event, mixing media
        (mail, phone, email, gifts)
        Timeline: 30-90 days from first contact to close for most affluent offers.
      domain: affluent-marketing
      source_file: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 45-175, synthesized)"
    - id: "MET-DK-226"
      title: "Affluent Market Entry — Simultaneous Preparation Methodology"
      content: >
        DK teaches that entering an affluent market requires simultaneous preparation
        across multiple dimensions (not sequential):
        TRACK A — POSITIONING (do all at once):
        - Write a book or authoritative report for the niche
        - Get published in niche media (trade journals, magazines)
        - Speak at niche events and conferences
        - Build celebrity within the niche through association
        TRACK B — INFRASTRUCTURE (do all at once):
        - Create a newsletter for the niche (monthly minimum)
        - Build a referral system (Advisory Board, Founding Members)
        - Design a Discovery Day or immersive sales event
        - Create a sequential contact system (7+ touches)
        TRACK C — OFFER ARCHITECTURE (do all at once):
        - Design ascension tiers (base, premium, ultra-premium)
        - Create first-money-movement offer (diagnostic, Discovery Day fee)
        - Build the full-price core offer with intangibles wrapped around it
        - Design the renewal/continuity component
        KEY INSIGHT: These three tracks must be prepared SIMULTANEOUSLY because
        each reinforces the others. A book without a newsletter has no follow-up.
        A newsletter without positioning has no authority. An offer without infrastructure
        has no conversion mechanism.
      domain: affluent-marketing
      source_file: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 177-192, synthesized)"

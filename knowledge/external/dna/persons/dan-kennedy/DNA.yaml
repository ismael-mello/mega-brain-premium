layers:
    - id: "MET-DK-228"
      title: "Sales Asset Creation Methodology (Not Sales Piece)"
      content: >
        DK's methodology for creating assets instead of one-time pieces:
        PHASE 1 — MULTI-PURPOSE DESIGN:
        - Before writing a word, map ALL possible uses (not just the immediate one)
        - Example: DK was retained to write copy to fill free preview seminars for a year tour
        - He designed it to ALSO fill regional paid seminars, ALSO drive online funnel prospects,
          ALSO generate leads for a tele-shark, ALSO work as evergreen automated system
        - One creation, 5+ revenue streams
        PHASE 2 — FRANCHISE ARCHITECTURE:
        - Build each product as the first in a sequential chain
        - Each first product = doorway to a separate world
        - Plan the chain BEFORE creating the first product
        - World around each franchise: website, community, apparel, awards, events
        PHASE 3 — LONGEVITY ENGINEERING:
        - Design for YEARS of use, not months
        - Avoid date-specific references that expire
        - Build in modularity so pieces can be updated without full rewrite
        - Test in small scale, then scale the PROVEN asset
        PHASE 4 — AMORTIZATION TRACKING:
        - Calculate cost-per-use as asset ages (should approach near-zero)
        - $25,000 ad / 288 runs = $86.80 per run and dropping monthly
        - Compare to one-time campaign costs to demonstrate asset superiority
      domain: marketing
      source_file: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    - id: "MET-DK-229"
      title: "PR-to-Funnel Launch Methodology"
      content: >
        The launch methodology that built Juice Man from zero to $75M, still applicable today:
        PHASE 1 — PROOF OF CONCEPT:
        - Start with live demos at trade shows, state fairs, home shows
        - Validate that a captivating person + product can draw crowds (50 people vs 1-2)
        - Refine the pitch in person before spending on media
        PHASE 2 — PR-FIRST MEDIA:
        - Call TV/radio stations for free appearances (cannot afford PR firm yet)
        - Deliver educational value + soft offer (free recipes for $1 + envelope)
        - One WOR TV appearance = 12,000 mail responses
        - Build customer database from PR-generated leads
        PHASE 3 — DIRECT RESPONSE LAYERING:
        - Convert PR list into buyers via direct mail (hastily printed flyer)
        - Add paid media (run local TV time in target cities)
        - Fill seminar rooms with TV + PR combo in each city
        - 90-minute free lecture → product orders shipped from central
        PHASE 4 — SCALE TO INFOMERCIAL:
        - Only after proving concept through PR + seminars + direct mail
        - Infomercial is the SCALING tool, not the testing tool
        - Use user-generated content + social media for modern version (GoPro model)
        KEY: PR adds credibility that advertising alone cannot achieve.
        Layer ALWAYS: advertising + PR, never advertising alone.
      domain: marketing
      source_file: "transcription_pdf_The_Principal_of_Selling.txt"

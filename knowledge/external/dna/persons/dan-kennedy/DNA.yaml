      Movie is cheapest part of evening. Won't hurt attendance much or long. Same applies to most
      businesses.
    source: "MM-02-cd6"

  - id: "HEUR-DK-282"
    title: "4 Visits = Customer For Life: Dry cleaning proven — after 4 visits, car automati"
    content: >
      4 Visits = Customer For Life: Dry cleaning proven — after 4 visits, car automatically finds its way
      there. Not vulnerable to competition or coupons. Strategy: buy first 4 visits at any cost.
    source: "MM-02-cd6"

  - id: "HEUR-DK-283"
    title: "Never Delegate Three Things: (1) Checkbook — lifelong friend diverted $11M throu"
    content: >
      Never Delegate Three Things: (1) Checkbook — lifelong friend diverted $11M through 23 ghost
      companies. (2) Marketing — highest payoff activity. (3) Legal — never accept 'don't worry, I have it
      under control.
    source: "MM-02-cd5"

  - id: "HEUR-DK-284"

      determined by God/genetics/astrology) 2) Wealth is evil 3) Credentials/permission required 4)
      Experience validates limiting beliefs 5) Market is saturated/too late 6) Born talent myth. People
      feel COMPELLED to defend these beliefs — the conscious mind fights to preserve them.
    source: "CD3-track1-2, CD3-track5"

  - id: "FW-DK-233"

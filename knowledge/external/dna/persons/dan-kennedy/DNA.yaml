      right for them. Examples: free writing aptitude test (writing schools), invention evaluation
      (invention companies), profit test (info marketing). The test creates personal attainability proof
      and engagement. Results always come back positive.
    source: "CD8-track4"

  - id: "HEUR-DK-170"
    title: "Results Over Credentials: package what you've DONE (case studies, outcomes), not"

      can only be released through list division and better list use. Tapping this stored value can be the
      difference between survival and an income boom.
    source: "MM-08-pdf02"

  - id: "HEUR-DK-265"
    title: "Price Shock Direction: If prospects express surprise at how LOW your price is, y"
    content: >

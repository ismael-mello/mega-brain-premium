    source: "OMC CD/20 track 3 — Dan Kennedy"

  - id: "FIL-DK-392"
    title: "The sideways sales letter is the single biggest idea I ever had — instead of one"
    content: >
      The sideways sales letter is the single biggest idea I ever had — instead of one long sales letter,

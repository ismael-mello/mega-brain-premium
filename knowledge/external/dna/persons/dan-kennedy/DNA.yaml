    content: >
      The Possibility-to-Purchase Ladder: Possibility (could work in theory) → Beneficial Nature (outcome
      is actually good) → Attainability (practically achievable) → Personal Possibility (achievable for
      ME) → Differentiation (this is different from what failed before). Each rung must be climbed; most
      sellers skip to the top.
    source: "CD5-track3-5"

  - id: "FW-DK-238"
    title: "The Three Marketing Approaches: 1) Interest the uninterested (tell your story to"
    content: >
      The Three Marketing Approaches: 1) Interest the uninterested (tell your story to everybody — classic
      mass marketing) 2) Seek out the interested (needle in haystack — lead generation) 3) Make the
      fundamentally uninteresting message more interesting to more prospects (opportunity marketing
      approach).
    source: "CD1-track1"

  - id: "FW-DK-239"
    title: "The 11 Agreements Framework for Attainability: (1) Need/want exists, (2) Solutio"
    content: >
      The 11 Agreements Framework for Attainability: (1) Need/want exists, (2) Solution exists, (3) This
      specific solution works, (4) Others have succeeded with it, (5) Personal attainability — I can do
      this, (6) It is different from all past failures, (7) Not my fault it has not worked before, (8)
      Personal beneficial nature — good specifically for ME, (9) Timing is right — market conditions, (10)
      Personal timing is right — my circumstances, (11) Personal appropriateness — I deserve this / it is
      right for me.
    source: "CD6-track1, CD6-track2, DVD03"

  - id: "FW-DK-240"
    title: "15 Elements of Opportunity Presentation Framework: (1) Pure hype/mystery, (2) Tr"
    content: >
      15 Elements of Opportunity Presentation Framework: (1) Pure hype/mystery, (2) Trust (person, place,
      affinity, disarming), (3) Reason why, (4) Toaster principle — tangible thing with a name, (5) Reason
      why advertising, (6) Personal story of the presenter, (7) Being a larger-than-life figure, (8)
      Difficult proposition made simple, (9) Big idea, (10) Reselling the original dream, (11)
      Enemy/villain, (12) Urgency from past loss, (13) Membership, (14) Proof by test, (15) Status
      elevation.
    source: "CD6-track3 through CD9-track3"

  - id: "FW-DK-241"
    title: "Four Trust Elements Framework: (1) Person — who is the face, their story, authen"
    content: >
      Four Trust Elements Framework: (1) Person — who is the face, their story, authenticity,
      relatability; (2) Place — small town, heartland, trustworthy location; (3) Affinity — shared
      background, tone, conversational match; (4) Disarming — casual, non-threatening, no salesy
      movements.
    source: "CD6-track6, CD7-track1, DVD03"

  - id: "FW-DK-242"
    title: "Three Elements of Larger-Than-Life Figure: (1) Humble beginnings — so they do no"
    content: >
      Three Elements of Larger-Than-Life Figure: (1) Humble beginnings — so they do not see you as just an
      arrogant asshole with a Bentley; (2) Proof of importance — big audiences, media appearances, book
      signings, celebrity endorsements; (3) Taking control — 'I am your trainer, you are the trainees, I
      am here because my life works, you are here because yours does not.
    source: "CD8-track1, CD8-track2"

  - id: "FW-DK-243"
    title: "Transformational Story Framework: (1) Dramatic BEFORE — weighted heavily, this i"
    content: >
      Transformational Story Framework: (1) Dramatic BEFORE — weighted heavily, this is where they are;
      (2) The turning point / firm resolution moment (Girl Scout at the Door, purple diary); (3) The AFTER
      — the transformation achieved. Key insight: the before must be more dramatic and weighted than the
      after.
    source: "CD7-track5, CD8-track1"

  - id: "FW-DK-244"
    title: "Overcoming Personal Timing Framework: Three choices when a list has seasonality"
    content: >
      Overcoming Personal Timing Framework: Three choices when a list has seasonality — (1) Tactical:
      ignore the list except when responsive, then mail hard; (2) Reframe: convince them that what they
      think is disadvantageous timing is actually ideal timing; (3) Urgency override: make urgency so
      great that bad timing is trumped.
    source: "CD6-track2"

  - id: "FW-DK-245"
    title: "George Douglas Sales System Framework: (1) Lead generation ads in publications;"
    content: >
      George Douglas Sales System Framework: (1) Lead generation ads in publications; (2) Inbound calls
      answered by real humans; (3) Pre-assigned program advisor; (4) Big package: color brochure, farm
      photos, family photos, office photos, program advisor pics; (5) 3-hour cassette tape that must be
      listened to before purchase; (6) Write down questions for program advisor; (7) Program advisor sells
      on straight commission; (8) Open farm invitation every Saturday (9-12 presentation, lunch, farm tour
      with wife).
    source: "CD10-track2, CD10-track3, CD10-track4"

  - id: "FW-DK-246"
    title: "Membership Value Delivery Framework: (1) Immediate tangible — business cards sen"
    content: >
      Membership Value Delivery Framework: (1) Immediate tangible — business cards sent before the course;
      (2) Directory/who's who listing — send 6 copies; (3) Certificate for the wall — large, impressive;
      (4) Ongoing status markers — pins, watches, branded items; (5) Each delivers perceived value without
      requiring activity or achievement from the buyer.
    source: "CD9-track2, CD9-track3"

  - id: "FW-DK-247"
    title: "Reason Why Framework for Opportunity: (1) Direct answer — why are you sharing th"
    content: >
      Reason Why Framework for Opportunity: (1) Direct answer — why are you sharing this instead of
      keeping it; (2) Blackie story — inherited from a dying man / retiring master; (3) Irresistible
      impulse — the thing is so great he could not help coming back; (4) Legacy obligation — feels
      compelled to pass it on; (5) Timing reason why — about to retire, new discovery, etc.
    source: "CD7-track3, CD7-track4"

  - id: "FW-DK-248"
    title: "5 Types of Repositioning: (1) REPLACEMENT — new/different version of same busine"
    content: >
      5 Types of Repositioning: (1) REPLACEMENT — new/different version of same business (cash practice,
      staff-driven practice). (2) TRUE REPLACEMENT / GREENER PASTURES — take them completely out of their
      current situation (Larry's foreign brides). (3) REINVENTION — step down from replacement, knocking
      items off the don't-like list without full replacement. (4) REARRANGEMENT — changing sales process,
      pricing, fee structure (close to 'deck chairs on the Titanic'). (5) ADDITION/EXPANSION —
      business-in-business (Donna's weight loss in gyms) or MULTIPLIER (go-by-the-inch multiple
      locations).
    source: "CD/13 tracks 1-6 — DK presenting the repositioning spectrum"

  - id: "FW-DK-249"
    title: "Opportunity Presentation Elements (15+ items from DVD/04): #119 Toaster Principl"
    content: >
      Opportunity Presentation Elements (15+ items from DVD/04): #119 Toaster Principle (thing with a
      name), #5 Reason Why (if so good why share?), Blackie Story (dying man/legacy source), Personal
      Story importance, Transformational Story (BEFORE > AFTER), Larger Than Life Figure (humble
      beginnings + proof of importance + possessions), Difficult Proposition Made Simple,
      Taste-Like-Chicken analogy, #10 Reselling the Original Dream, #11 Enemy/Villain, #12 Urgency from
      Past Loss, #13 Membership, #15 Status Elevation.
    source: "DVD/04 — DK presenting the elements of opportunity presentation"

  - id: "FW-DK-250"
    title: "Three Elements of Larger Than Life Figure: (1) HUMBLE BEGINNINGS — most buyers h"
    content: >
      Three Elements of Larger Than Life Figure: (1) HUMBLE BEGINNINGS — most buyers have humble
      beginnings, without it you're just an arrogant asshole with a Bentley. (2) PROOF OF IMPORTANCE —
      other people must share the opinion, big audiences, media appearances, book signings. (3)
      POSSESSIONS/LIFESTYLE — evidence of results/success.
    source: "DVD/04 — DK on constructing a larger-than-life persona"

  - id: "FW-DK-251"
    title: "Realistic Market Assessment Framework: Step 1 — Math assessment: What is the tot"
    content: >
      Realistic Market Assessment Framework: Step 1 — Math assessment: What is the total addressable
      number? Step 2 — Apply the pyramid: Only a fraction will ever buy. Step 3 — Psychographic
      assessment: Who are the 1,250? Not by name but by mindset. Step 4 — Find the trigger point with
      them. Step 5 — Craft everything to influence the most likely buyer, not the 55,000.
    source: "CD/12 tracks 1-2 — DK on realistic market sizing"

  - id: "FW-DK-252"
    title: "Replacement Pitch Construction (Chiropractic example): Start with the 'don't lik"
    content: >
      Replacement Pitch Construction (Chiropractic example): Start with the 'don't like list' — insurance
      paperwork, rejections, caps, $56 billed/$18 paid. Replacement = cash practice, no insurance, prepay
      ($13,800 case, 20% discount for single payment, 10% for three payments). Since all-cash, you can
      offer any discounts you want.
    source: "CD/13 track 2 — DK on building the replacement opportunity"

  - id: "FW-DK-253"
    title: "Don't-Like List to Opportunity: Start every consulting engagement with the clien"
    content: >
      Don't-Like List to Opportunity: Start every consulting engagement with the client's list of
      everything they hate about their business. This list becomes the foundation for the replacement,
      reinvention, or rearrangement pitch. The more items you can knock off, the more powerful the
      opportunity.
    source: "CD/13 tracks 1-2 — DK on using pain points as opportunity fuel"

  - id: "FW-DK-254"
    title: "Market Capacity Wall Response Framework: Phase 1 (Honeymoon) — low CPS, deluding"
    content: >
      Market Capacity Wall Response Framework: Phase 1 (Honeymoon) — low CPS, deluding. Phase 2 (Gradual
      Creep) — every stat turning chilly but not horrible. Phase 3 (The Wall) — CPS skyrockets. Response:
      Don't change the creative, change the economics. If CPS goes from $330 to $880, rejigger the
      business to live with $1,100 CPS. The second wall requires another economic restructure.
    source: "CD/15 track 1 — DK on responding to market saturation"

  - id: "FW-DK-255"
    title: "Craig's Three Keys to Ken Roberts' Success: (1) Present the offer in a way that"
    content: >
      Craig's Three Keys to Ken Roberts' Success: (1) Present the offer in a way that diffuses risk —
      focus on benefits, not the 85% failure rate. (2) Focus on connecting with the customer on their
      level — make the spokesperson look ordinary (denim shirt, cowboy hat, black-and-white photo). (3)
      Capitalize on every customer — 11 offers over 17 weeks, 80% rebuy in 30-90 days.
    source: "CD/14 tracks 1-6 — Craig's three pillars of direct mail success"

  - id: "FW-DK-256"
    title: "Reason Why + Blackie Story Framework: The biggest cause for skepticism in opport"
    content: >
      Reason Why + Blackie Story Framework: The biggest cause for skepticism in opportunity is 'if it's so
      good, why share it?' The Blackie Story answers this: a dying man/retiring
      billionaire/great-grandfather passed it to me. It does two things: (1) Provides a reason why
      (legacy/obligation), (2) Makes the source not the seller (more believable).
    source: "DVD/04 — DK on combining reason-why with Blackie story"

  - id: "FW-DK-257"
    title: "Business-in-Business (Addition/Expansion): Install a synergistic business inside"
    content: >
      Business-in-Business (Addition/Expansion): Install a synergistic business inside an existing
      practice. Example: Weight loss in fitness gyms (Donna). Massage business next door to chiropractic.
      The wrinkle: massage therapists kept their place only by producing 5 new chiropractic patients per
      week — symbiotic requirement.
    source: "CD/13 track 5 — DK on synergistic business-in-business"

  - id: "FW-DK-258"
    title: "Multiplier Story (Go By The Inch): Instead of making $500 from one location, hav"
    content: >
      Multiplier Story (Go By The Inch): Instead of making $500 from one location, have 10 locations
      hiring retired people and high school kids — make $250 from each. Then three-tier: 50 locations at
      $150 each. The multiplier story transforms a small personal income opportunity into a scalable
      business vision.
    source: "CD/13 track 6 — DK on the multiplier repositioning story"

  - id: "FW-DK-259"
    title: "Competitive Intelligence via List Analysis: Get on the list yourself. Order from"
    content: >
      Competitive Intelligence via List Analysis: Get on the list yourself. Order from competitors. Get
      the data cards of your best-performing lists. Look at the top 5 users of your list. Examine their
      direct mail pieces for commonalities. If they're all selling on six-pay, test six-pay. If they all
      use gray-haired photos, don't use young blondes. Start with their testing results.
    source: "CD/15 track 3 — DK on mining competitor intelligence from lists"

  - id: "FW-DK-260"
    title: "Feature-to-Opportunity Conversion (RegOnline example): Feature-oriented: 'automa"
    content: >
      Feature-to-Opportunity Conversion (RegOnline example): Feature-oriented: 'automated follow-up
      emails, one-click reports, instant payment.' Opportunity-oriented: 'cut your event cost 25% while
      increasing attendance 20%.' Same product, completely different positioning — from software features
      to business outcomes.
    source: "CD/14 track 3 — Craig on repositioning features as opportunities"

  - id: "FW-DK-261"
    title: "George's Trust-Building Sales System: (1) Lead generation ads in specialty magaz"
    content: >
      George's Trust-Building Sales System: (1) Lead generation ads in specialty magazines, (2) Big
      package with full-color literature + photos of farm, family, and program advisors, (3) Pre-assigned
      program advisor with personal letter and direct phone number, (4) 3-hour audio cassettes prospects
      listened to 5x before buying, (5) Open Saturday farm visits (20/week came, 100/week sold), (6) Human
      answering phones always — never answering machines.
    source: "DVD/05 — George's complete trust-based sales system"

  - id: "FW-DK-262"
    title: "Repositioning Spectrum (Opportunity → Improvement): REPLACEMENT (pure opportunit"
    content: >
      Repositioning Spectrum (Opportunity → Improvement): REPLACEMENT (pure opportunity language) → TRUE
      REPLACEMENT/GREENER PASTURES → REINVENTION (drifting toward improvement) → REARRANGEMENT (one step
      from deck chairs on Titanic) → ADDITION/EXPANSION (back to opportunity) → MULTIPLIER (pure
      scalability story). The further from pure replacement, the weaker the opportunity language.
    source: "CD/13 tracks 1-6 — DK on the repositioning spectrum"

  - id: "FW-DK-263"
    title: "Jeff Walker's Product Launch Formula (PLF): (1) Prelaunch content sequence build"
    content: >
      Jeff Walker's Product Launch Formula (PLF): (1) Prelaunch content sequence building anticipation,
      (2) Layer mental triggers across sequence (authority, reciprocity, community, social proof,
      anticipation, scarcity), (3) Open cart with time-limited offer, (4) Close cart with urgency. The
      'sideways sales letter' replaces the traditional long-form sales letter.
    source: "OMC CD/16 tracks 2-4 — Jeff Walker"

  - id: "FW-DK-264"
    title: "Craig Simpson's Three Keys to Direct Mail Success: (1) Diffuse the risk — take a"
    content: >
      Craig Simpson's Three Keys to Direct Mail Success: (1) Diffuse the risk — take away the scary part
      of the offer, (2) Focus on benefits not features — show the dream life, not the product specs, (3)
      Connect with customer on their level — look ordinary, tell relatable stories, match their
      self-image.
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"

  - id: "FW-DK-265"
    title: "The 17-Week Backend Sequence: Over the first 17 weeks after purchase, mail 11 di"
    content: >
      The 17-Week Backend Sequence: Over the first 17 weeks after purchase, mail 11 different offers —
      books, DVDs, advanced courses, mini courses, newsletters, seminars. Then quarterly reactivation
      products. The stick letter is offer #1 (sent immediately with confirmation).
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company) + Dan Kennedy (Halbert stick letter)"

  - id: "FW-DK-266"
    title: "Direct Selling Presentation Framework (from MLM): (1) 70%+ establishing dissatis"
    content: >
      Direct Selling Presentation Framework (from MLM): (1) 70%+ establishing dissatisfaction gap, (2)
      Invalidate all other bridges/solutions, (3) Present your solution so simple any buffoon can do it
      (do-it-for-them model), (4) Force self-definition by yes/no decision — 'Are you the kind of person
      who...
    source: "OMC CD/18 tracks 3-4 — Dan Kennedy"

  - id: "FW-DK-267"
    title: "Competitive Intelligence Gathering Framework: (1) 'Let them have at you' — becom"
    content: >
      Competitive Intelligence Gathering Framework: (1) 'Let them have at you' — become a prospect of your
      competitors, (2) Source customer data (with bias caveats), (3) Direct observation, (4) Focus groups,
      (5) List information analysis, (6) Read/watch what your prospects read/watch, (7) Learn tribal
      language.
    source: "OMC CD/19 track 1 — Dan Kennedy"

  - id: "FW-DK-268"
    title: "List Selection Decision Framework: (1) Get data cards side by side, (2) Compare"
    content: >
      List Selection Decision Framework: (1) Get data cards side by side, (2) Compare compiled vs response
      source, (3) Check available selects (age, income, SIC code, recency), (4) Look at who else is
      renting the list — smart repeat renters = high confidence, (5) Get control copies from top renters
      via InsideDirectMail.com, (6) Look for commonalities in what winners are doing.
    source: "OMC DVD/07 — Craig Simpson + Dan Kennedy"

  - id: "FW-DK-269"
    title: "Unconverted Leads Recovery Framework: (1) Appointment no-sale system, (2) Handof"
    content: >
      Unconverted Leads Recovery Framework: (1) Appointment no-sale system, (2) Handoff system (tele-shark
      to supervisor), (3) Unending follow-up cycles, (4) Switch to different opportunity/different shovel,
      (5) Second tier/downsell, (6) Switch to different identity/alter ego business, (7) Loop-back-up
      mechanism from downsell to original offer.
    source: "OMC CD/19 tracks 4-8 — Dan Kennedy"

  - id: "FW-DK-270"
    title: "Proof Stacking Framework (Jeff Walker): (1) Survey as proof — 'We asked 2,300 an"
    content: >
      Proof Stacking Framework (Jeff Walker): (1) Survey as proof — 'We asked 2,300 and 312 said yes,' (2)
      The money bet — '$800K bet that this works,' (3) Geography proof — 'Geography doesn't matter, here's
      proof from [locations],' (4) Social proof via community — let prospects see other prospects buying,
      (5) Third-party endorsement — rigorous selection process implies quality.
    source: "OMC CD/17 tracks 2-4 — Jeff Walker"

  - id: "FW-DK-271"
    title: "Jeff Walker's Certification/Franchise Model: (1) Create rigorous selection proce"
    content: >
      Jeff Walker's Certification/Franchise Model: (1) Create rigorous selection process (130 apply for 50
      spots), (2) Two-step pricing: $5K down + $20K from profits, (3) Upsell platinum coaching at the
      event itself ($10K waiving the $20K), (4) Leverage hyper-responsives (people who always buy
      everything), (5) Assets inventory — document what they already have to work with.
    source: "OMC CD/16 tracks 5-6, CD/17 tracks 1-4 — Jeff Walker"

  - id: "FW-DK-272"
    title: "Backend Economics Framework: (1) Customers as resellers/distributors/affiliates,"
    content: >
      Backend Economics Framework: (1) Customers as resellers/distributors/affiliates, (2) Retain space in
      media you provide, (3) Make their leads your list — lead sharing/exchange, (4) Drop-down sale to
      recover non-buyers, (5) Loop-back-up from downsell to original, (6) Multiple identities to mail same
      list segment repeatedly.
    source: "OMC CD/20 tracks 1-2 + CD/19 track 8 — Dan Kennedy"

  - id: "FW-DK-273"
    title: "The Market Saturation Response Framework: (1) Recognize honeymoon → gradual cree"
    content: >
      The Market Saturation Response Framework: (1) Recognize honeymoon → gradual creep → wall pattern,
      (2) When wall hits, change economics not creative, (3) Pull back to high-probability list segments,
      (4) Retard media buys to best geographies, (5) Create new identities/formats for same segments, (6)
      Adjust pricing/offers for new cost-per-acquisition reality.
    source: "OMC DVD/07 — Dan Kennedy"

  - id: "FW-DK-274"
    title: "Preview/Discovery Funnel Options: (1) Fake seminar (positioned as education, act"
    content: >
      Preview/Discovery Funnel Options: (1) Fake seminar (positioned as education, actually a pitch), (2)
      Disclosed event (transparently a sales presentation), (3) Discovery day (come see the operation),
      (4) Drop-in days, (5) Direct to purchase. Choose based on prospect ego and chair-side value.
    source: "OMC CD/19 track 3 — Dan Kennedy"

  - id: "FW-DK-275"
    title: "Gathering Material Framework for Opportunity Marketing: (1) Historical archives"
    content: >
      Gathering Material Framework for Opportunity Marketing: (1) Historical archives — study old
      examples, (2) Contemporary examples — collect current cases, (3) Play prospect with competitors
      ('let them have at you'), (4) Hold swipe files of everything, (5) Look for commonalities across
      successful pieces, (6) Watch/read what your prospects watch/read to understand tribal language.
    source: "OMC CD/18 tracks 5-6 — Dan Kennedy"

  - id: "FW-DK-276"
    title: "List Test Matrix Framework: (1) Build matrix of X lists × segments × messages ×"
    content: >
      List Test Matrix Framework: (1) Build matrix of X lists × segments × messages × formats, (2) Test
      all combinations in small quantities, (3) Validate assumptions from house file data, (4) Make
      discoveries about unexpected winning combinations, (5) Repeat 2-3 times to refine down to a science,
      (6) Then roll out at scale with validated segments.
    source: "OMC DVD/07 — Dan Kennedy + Craig Simpson"

  - id: "FW-DK-277"
    title: "Exclusivity Sale Accelerators: (1) Territorial exclusivity — fear of competitor"
    content: >
      Exclusivity Sale Accelerators: (1) Territorial exclusivity — fear of competitor getting it, (2)
      Status/pride of ownership, (3) Price elasticity liberation — exclusive = willing to pay more, (4)
      Conveyed equity — they're buying an asset not just a product, (5) Authentic urgency — limited slots
      are real, (6) Take-away selling enabled by genuine scarcity.
    source: "OMC CD/18 track 2 — Dan Kennedy"

  - id: "FW-DK-278"
    title: "Product Launch Formula Sideways Sales Letter Framework: Headline > Story/Hook >"
    content: >
      Product Launch Formula Sideways Sales Letter Framework: Headline > Story/Hook > Opportunity > Build
      Story > Benefits/Bullets > Offer > Risk Reversal > Price — spread across 3-4 pieces of prelaunch
      content over 10-14 days instead of one long sales letter.
    source: "DVD08-JeffWalker"

  - id: "FW-DK-279"
    title: "PLF Mental Triggers Sequence: Authority (first video) > Reciprocity (teach them"
    content: >
      PLF Mental Triggers Sequence: Authority (first video) > Reciprocity (teach them content) > Community
      + Social Proof (comments, sharing) > Anticipation > Scarcity (hard deadline). Build tension like a
      novel arc.
    source: "DVD08-JeffWalker"

  - id: "FW-DK-280"
    title: "PLF Two-Step Certification Launch: Step 1 — Internal launch to own list, sell hi"
    content: >
      PLF Two-Step Certification Launch: Step 1 — Internal launch to own list, sell high-end live event
      ($25K) to hyperresponsives, create success stories. Step 2 — JV launch of home study version using
      social proof from Step 1 at higher scale.
    source: "DVD08-JeffWalker"

  - id: "FW-DK-281"
    title: "PLF Asset Inventory Framework: Before launching, inventory your assets — persona"
    content: >
      PLF Asset Inventory Framework: Before launching, inventory your assets — personal reputation,
      product reputation, historical successes, established pricing, JV partners, hyperresponsives on
      list, event capability, pent-up demand. Then stack these assets into the launch sequence.
    source: "DVD08-JeffWalker"

  - id: "FW-DK-282"
    title: "PLF Danger Assessment Framework: Identify dangers before launch — no proven dema"
    content: >
      PLF Danger Assessment Framework: Identify dangers before launch — no proven demand, inventing a
      profession, risk to partner relationships, potential brand dilution, legal complexity, fundamentally
      different market. Plan mitigations for each.
    source: "DVD08-JeffWalker"

  - id: "FW-DK-283"
    title: "Opportunity Structure Options (8 types): 1) Real franchise, 2) Almost-franchise"
    content: >
      Opportunity Structure Options (8 types): 1) Real franchise, 2) Almost-franchise (flirts with
      franchise rules), 3) Distributorship, 4) Consultant opportunity +/- certification, 5) Coaching-plus,
      6) Benefits/services + coaching, 7) Outright services, 8) One-time event/training + stuff.
    source: "DVD09"

  - id: "FW-DK-284"
    title: "Opportunity Payment Models (6 types): 1) Fees only, 2) Fees + profits on service"
    content: >
      Opportunity Payment Models (6 types): 1) Fees only, 2) Fees + profits on services used (disclosed or
      hidden), 3) Fees + share of upside, 4) Fees + upside + service profits (3 revenue streams), 5) All
      upside no fee, 6) Equity partnership.
    source: "DVD09"

  - id: "FW-DK-285"
    title: "Exclusivity Benefits Framework (7 reasons): 1) Removes 'who else has it' worry,"
    content: >
      Exclusivity Benefits Framework (7 reasons): 1) Removes 'who else has it' worry, 2)
      Competitors-they-hate motivation, 3) Pride of ownership/status, 4) Price elasticity support, 5)
      Conveys real/perceived equity, 6) Supports ownership language, 7) Creates authentic urgency. Also
      supports takeaway selling and compliance.
    source: "DVD09"

  - id: "FW-DK-286"
    title: "6 Lessons from Direct Selling/MLM Industry: 1) Establish big dissatisfaction gap"
    content: >
      6 Lessons from Direct Selling/MLM Industry: 1) Establish big dissatisfaction gap, 2) Invalidate all
      other bridges, 3) Prove any buffoon can do it (with done-for-them elements), 4) Master poster
      children stories, 5) Force pick-a-door identity decision, 6) Use all of the above relentlessly.
    source: "DVD09"

  - id: "FW-DK-287"
    title: "Unconverted Lead Monetization Framework: 1) Unending follow-up (communicate unti"
    content: >
      Unconverted Lead Monetization Framework: 1) Unending follow-up (communicate until they buy or die),
      2) Switch to different opportunity of yours (red shovel/blue shovel), 3) Second-tier downsell offer,
      4) Switch to different identity/alter ego, 5) Rent/sell/exchange/barter lists, 6) Lead qualification
      tiers (paid vs free self-selection), 7) Drop-down sale with loop-back-up.
    source: "DVD09"

  - id: "FW-DK-288"
    title: "Sales Process Options Menu: Lead generation (free vs self-liquidating) > Preview"
    content: >
      Sales Process Options Menu: Lead generation (free vs self-liquidating) > Preview seminar
      (physical/phone/online) > One-on-one teleshark > Fake seminar (disguised as education) > Disclosed
      discovery day > Drop-in/tour days > Direct-to-purchase via media > Sequential multi-step >
      Appointment no-sale system > Handoff system.
    source: "DVD09"

  - id: "FW-DK-289"
    title: "Material Gathering Framework for Opportunity Marketers: 1) Historical archives a"
    content: >
      Material Gathering Framework for Opportunity Marketers: 1) Historical archives and examples (go
      backwards to go forward), 2) Contemporary examples (be on every list), 3) Build swipe files of
      commonalities, 4) Play prospect (let them sell to you), 5) Study your own customers (with sourcing
      bias caveat), 6) Observe prospects in their habitat, 7) Focus groups, 8) List information and SRDS
      data, 9) Read/watch what they read/watch, 10) Commercially available research.
    source: "DVD09"

  - id: "FW-DK-290"
    title: "Exit Strategy Selling Framework: Sell the exit/transition as the primary pitch ("
    content: >
      Exit Strategy Selling Framework: Sell the exit/transition as the primary pitch (3-5 year full income
      replacement program), then bonus the system improvement. Not the other way around. Stack current
      leverage: stock market losses + Obamacare anxiety + inability to sell practice at expected price.
    source: "DVD10"

  - id: "FW-DK-291"
    title: "Pre-Call Influence Framework: 1) Send package after first conversation if no clo"
    content: >
      Pre-Call Influence Framework: 1) Send package after first conversation if no close, 2) Require
      deposit for 'discovery day in a box,' 3) Require them to swear they reviewed materials before phone
      appointment, 4) Include form that forces engagement with content, 5) Schedule call after review
      period.
    source: "DVD10"

  - id: "FW-DK-293"
    title: "Open-Middle-Close Architecture for One-to-Many - OPEN (credentials, pattern inte"
    content: >
      Open-Middle-Close Architecture for One-to-Many - OPEN (credentials, pattern interrupt, preview,
      urgency, agenda) - MIDDLE (build case, stack proof, demonstrate, pre-handle objections, transition)
      - CLOSE (clear instruction, next step, urgency, remove friction, social proof of action).

  - id: "FW-DK-298"
    title: "B.O.L.D. Framework for Sticky Ideas - (1) BIG idea that sticks, (2) OUTRAGEOUS p"
    content: >
      B.O.L.D. Framework for Sticky Ideas - (1) BIG idea that sticks, (2) OUTRAGEOUS promise, (3) LINK to
      audience (relevance, affinity, circumstances), (4) DIRECTIONS - clear and specific response
      directions. Caution: LONG acronyms are self-defeating.

  - id: "FW-DK-306"
    title: "Story Power Framework — 5 Advantages Over Statements"
    content: >
      Stories vs Statements — 5 dimensions: (1) Statement = skepticism; Story = curiosity + interest. (2)
      Statement = confrontational; Story = inspirational. (3) Statement requires authority; Story creates
      authority. (4) Statement can be copied/diluted; Story is proprietary. (5) Statement is challenged;
      Story is listened to (conditioned since childhood).
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "copywriting"

  - id: "FW-DK-307"
    title: "Origin Story Types — 3 Common Info-Marketer Origins"
    content: >
      Three most common infomarketer origin stories: (1) 'I found the key and I feel guilty keeping it to
      myself' (provides extra reason-why). (2) 'I figured it out the hard way, still mad at those who
      misled me' (revenge sharing). (3) 'Teaching/writing found ME — people kept asking' (reluctant
      expert). For outsiders entering niche: 'Friends in the field begged me to help them'.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "info-marketing"

  - id: "FW-DK-308"
    title: "Bridge Story Architecture — One Story, Multiple Sales Contexts"
    content: >
      A single story can bridge to multiple selling contexts. Example (donut story): bridge to success
      environment vs failure environment → sell mastermind; bridge to futility of willpower → sell
      self-image reprogramming; bridge to importance of self-awareness → sell diagnostic tool; bridge to
      what we allow inside our house → sell association principle. Prime purpose of story = BRIDGE to
      whatever you want to sell.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "copywriting"

  - id: "FW-DK-309"
    title: "Classic Info-Marketing Story Plots — 6 Archetypes"
    content: >
      Six classic story plots most useful to info marketers: (1) Charles Atlas / Rocky / 'They all
      laughed' — underestimated person rises. (2) Little Engine Who Could — proves 'you can too'. (3)
      Blackie Story — old wise possessor passes secret (Carnegie→Hill, Gambler on train). (4) Eureka Story
      — sudden realization, light bulb moment. (5) Inspired By Story — motivated to become what you are by
      compelling event. (6) Lost/Hidden Secrets / Amazing Discovery — uncovering forbidden knowledge.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "info-marketing"

  - id: "FW-DK-311"
    content: >
      15-Element Copy Code for Investment Newsletters: (1) Alarm — crisis/danger, (2) Mystery/Mystique —
      hidden knowledge, (3) Amazing Stories of People Like Them — relatable success, (4)
      Authority-Figure/Expert/Media Verification — third-party proof, (5) Acknowledgement of 'Incredible'
      — address skepticism, (6) Why This Is Different — differentiation, (7) Your Enemy Is My Enemy —
      tribal bonding, (8) If Good Enough For Famous Person — celebrity proof, (9) Pronouncements of Epic
      Importance — gravitas, (10) Emotional Mission Statement — purpose, (11) Crisis=Opportunity — reframe
      fear, (12) Exotic/Proprietary Name — branded IP, (13) Tastes Like Chicken — familiar comparison,
      (14) What To Do Not How To — tease without reveal, (15) Timeliness/Urgency — act now. Plus (16)
      Meaningful Specifics — precise numbers and dates.

  - id: "FW-DK-316"
    title: "7 Secrets of Mind-Control Copy"
    content: >
      Complete framework for persuasive copy using dark psychology: 1) SHAME — no one wants to live in
      Loserville, negative motivation > positive. 2) EMOTIONAL PAIN — twist the knife, make it maximally
      painful then solve. 3) ANGER/RAGE/RESENTMENT — mad people can't think, purchase = accomplishment. 4)
      MYSTICISM — secrets, conspiracies, suppressed cures, insider knowledge. 5) REVENGE — vindication
      stories, proving doubters wrong. 6) FAITH — belief systems, authority, trust transfer. 7) COMPASSION
      — empathy triggers, identification with suffering.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt + Sorcery/transcription_mp3_CD1.txt"
    domain: "copywriting"

  - id: "FW-DK-317"
    title: "4 Methods of Twisting the Knife (Emotional Pain)"
    content: >
      Four methods to inflict emotional pain in copy: 1) ALL TOO FAMILIAR SCENARIOS — situations reader
      instantly recognizes ('It starts' cartoon at altar). 2) PERSONAL CONFESSIONS — stories reader
      sharply identifies with ('I looked at that trophy that said #1 but felt like absolute zero'). 3)
      REMINDERS OF SUPPRESSED NEGATIVE SELF-FEELINGS — 'maybe my father was right, we're not the sort of
      people who rise to top incomes'. 4) TRIGGERING NEGATIVE IMAGINATION — of others' poor
      perceptions/disappointments with them.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FW-DK-318"
    title: "Shame Thesaurus (15 Negative States)"
    content: >
      Complete inventory of shame triggers for copy: Don't want to be LEFT OUT, LEFT BEHIND, UNCOOL,
      STUPID, ATTACHED TO A LOSER or losing argument, EMBARRASSED, FOOLISH, INCOMPETENT, WEAK/IMPOTENT,
      LOOKED DOWN UPON, UNWANTED, PITIED, GOSSIPED ABOUT, UNATTRACTIVE, OLD. They have ambition to ESCAPE
      these conditions — far easier to motivate about escape than positive alternatives.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FW-DK-319"
    title: "Anger-to-Purchase Pipeline"
    content: >
      4-step pipeline: 1) Get them MAD (at IRS, competitors, system, etc). 2) While mad they're INCAPABLE
      of analytical/critical/rational thought about price, value, or skepticism. 3) Only available ACTION
      to discharge rage = BUY the product. 4) Purchase = ACCOMPLISHMENT — they feel better because they
      'did something'. Example: 'The IRS Has Had You Long Enough' → book with 5,122 tax reduction ways.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "FW-DK-320"
    title: "Mysticism Copy Triggers"
    content: >
      Categories of mysticism that drive copy: SECRETS (they don't want you to know), CONSPIRACIES (47%
      believe Elvis faked death), SUPPRESSED CURES/KNOWLEDGE, INSIDER INFORMATION (belong to the 'in'
      group), FORBIDDEN/HIDDEN methods. 'Secrets they don't want you to know' is the copy approach that
      NEVER wears out because it taps into universal human psychology.
    source: "Sorcery/transcription_mp3_CD1.txt"
    domain: "copywriting"

  - id: "FW-DK-321"
    title: "5 Essential Copy Elements for Info-Marketing"
    content: >
      Part 2 of Sorcery program — the five best types of copywriting elements specifically for
      info-product and service businesses. Built on foundation that copy = salesmanship in print, NOT
      creative/award-winning art. Each element must pass the E-Factor test and further the sale.
    source: "Sorcery/transcription_mp3_CD2.txt + PDFs/transcription_pdf_Sorcery5EssentialCopyElements.txt"
    domain: "copywriting"

  - id: "FW-DK-322"
    title: "Headline Testing Priority Framework"
    content: >
      DK's headline swipe file (49 pages, largest of all systems) reveals a testing priority framework
      implicit in the organization: TIER 1 — TEST FIRST (highest historical response): - How-To + Specific
      Benefit + Timeframe ("How to [X] in [Y] days") - Question + Pain Point ("Are you still [suffering
      from X]?") - Story + Result ("They laughed when... but when I...") TIER 2 — TEST SECOND: -
      News/Announcement + Urgency - Command + Warning - Testimonial + Numbers TIER 3 — SITUATIONAL: -
      Guarantee-led (for skeptical markets) - Secret/Mystery (for curiosity-driven markets) - Reason-Why
      (for analytical buyers) The sheer volume of headlines in the swipe file (49 pages vs 2-12 for other
      systems) confirms DK's hierarchy: headlines are THE most important copy element.
    source: "PDFs/transcription_pdf_System1Headlines.txt"
    domain: "copywriting"

  - id: "FW-DK-323"
    title: "SubHead Architecture Framework"
    content: >
      SubHeads serve as the skeleton of a sales letter — they must tell the complete story even if the
      reader ONLY reads subheads. DK's subhead swipe file reveals the framework: RULE 1: SubHeads must be
      self-contained (make sense without body copy) RULE 2: SubHeads must create curiosity gap (pull
      reader into next section) RULE 3: SubHeads must include at least one benefit OR one proof point RULE
      4: SubHeads should alternate between emotional and logical SCANNING TEST: Cover all body copy. Read
      only subheads top to bottom. If they don't tell a compelling story by themselves, rewrite. This is
      why DK's System 2 is 10 pages — subheads are the second structural pillar.
    source: "PDFs/transcription_pdf_System2SubHead.txt"
    domain: "copywriting"

  - id: "FW-DK-324"
    title: "Complete Sales Letter Quality Checklist (System 14)"
    content: >
      System 14 is DK's final quality control framework — a checklist to verify before any sales letter
      goes to print/mail: STRUCTURE: All 14 systems present and functioning? HEADLINE: Does it stop the
      right person? Does it make a promise? OFFER: Is it irresistible? Is the math clear? GUARANTEE: Is
      risk fully reversed? URGENCY: Is there a real reason to act NOW? PROOF: Are claims supported by
      testimonials/data? P.S.: Does it restate offer + add urgency? ORDER FORM: Is it simple and clear?
      Can they order without reading the letter? TEMPLATE: Is layout proven (not experimental)? This
      meta-framework turns the 14 systems into an actionable review protocol.
    source: "PDFs/System14Checklist + System12Templates + System13OrderForms"
    domain: "copywriting"

  - id: "FW-DK-325"
    title: "5 Reasons the Affluent Do NOT Refer — And What Does"
    content: >
      DK identifies 5 reasons why even satisfied affluent clients fail to refer: (1) No remarkable
      experience to share (satisfaction is expected, not remarkable) (2) No mechanism — they were never
      ASKED or given a structured way to refer (3) No incentive aligned with their values (money discounts
      insult the affluent; recognition, status, and access motivate them) (4) No story — the experience
      was good but not TELLABLE at a cocktail party (5) No ongoing relationship — the business delivered
      and disappeared WHAT WORKS: Create wow moments, provide referral mechanisms, offer status-based
      incentives (Advisory Board membership, Founding Member title), give them stories (unusual packaging,
      surprise gifts, exclusive access), and maintain ongoing contact through newsletters and events.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 150-170)"
    domain: "affluent-marketing"

  - id: "FW-DK-326"
    title: "Full Disclosure vs Surprise Sell Decision Framework"
    content: >
      When designing a sales event (seminar, Discovery Day, webinar), DK presents two legitimate
      approaches: FULL DISCLOSURE: Tell prospects upfront that a sales presentation will occur. Works
      when: (a) brand trust is already high, (b) the offer is expected, (c) audience is pre-qualified and
      knows why they are there. SURPRISE SELL: Deliver pure value content, then transition to an offer
      that was not explicitly promised. Works when: (a) the content is genuinely valuable, (b) the
      transition feels natural, (c) the offer solves a problem revealed during the content. DK notes: both
      work for affluent markets. The key is CONGRUENCE — whichever approach you choose, the audience must
      feel it was honest and aligned with their expectations.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 180-188)"
    domain: "affluent-marketing"

  - id: "FW-DK-327"
    title: "Price Acceptance Hierarchy for Affluent Markets"
    content: >
      DK outlines a hierarchy of factors that drive price acceptance in affluent markets (in order of
      importance): TIER 1 — IDENTITY ALIGNMENT: Does this purchase align with who I am or want to be? TIER
      2 — TRUST IN THE PERSON: Do I trust the individual behind this offer? TIER 3 —
      CELEBRITY/POSITIONING: Is this person/brand recognized as the authority? TIER 4 —
      EXCLUSIVITY/SCARCITY: Is this available to everyone or just a select few? TIER 5 — COMPETENCE
      SIGNALS: Does the process, environment, and communication signal expertise? TIER 6 — ACTUAL
      PRODUCT/SERVICE: What am I actually getting? Note: the product itself is TIER 6 — last. The affluent
      decide to buy based on Tiers 1-5 and only verify with Tier 6. This inverts the typical marketer's
      focus on product features.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 183-192)"
    domain: "affluent-marketing"

  - id: "FW-DK-328"
    title: "Cost of Inaction vs Cost of Action Framework"
    content: >
      When evaluating any decision, most people focus on the POTENTIAL DOWNSIDE of taking action. DK
      insists on also calculating the DEFINITE COST OF INACTION: STEP 1: List potential downsides of
      ACTION (what could go wrong?) STEP 2: List DEFINITE costs of INACTION (what am I losing by NOT
      acting?) STEP 3: Compare the two — inaction costs are usually HIGHER and more CERTAIN STEP 4: Factor
      in TIME DECAY — the longer you wait, the higher inaction costs Key insight: Action costs are
      POTENTIAL (might happen), but inaction costs are DEFINITE (accumulating daily). A month of delayed
      launch is a month of ZERO revenue, ZERO learning, ZERO customer feedback. Tim Ferriss agrees: "The
      most critical decisions that set the stage for selling a company for $486 million resulted from
      getting in over their head and then figuring out." The UFC fighting analogy: "Everyone has a plan
      until they get hit in the face" — theorizing and planning have diminishing returns; the important
      point is getting the ball into play and adapting.
    source: "transcription_mp3_Tim_Ferriss_Bonus.txt"
    domain: "business-strategy"

  - id: "FW-DK-329"
    title: "Congruent Quality Enforcement Framework"
    content: >
      Framework for auditing and enforcing quality congruence across all customer touchpoints: AUDIT
      PHASE: - List every touchpoint: marketing → sale → fulfillment → onboarding → delivery → support →
      billing → renewal - Rate each touchpoint on 1-10 quality scale - Identify the LOWEST-RATED
      touchpoint — this IS your brand quality in the customer's mind (weakest link principle) ENFORCEMENT
      PHASE: - Bring lowest touchpoint up to match highest (not the reverse) - Assign ownership for each
      touchpoint (no orphan touchpoints) - Create quality standards document for each touchpoint -
      Mystery-shop your own business regularly MAINTENANCE PHASE: - Monthly quality audit (rotate which
      touchpoints you test) - Customer feedback loop specifically about NON-CONTENT touchpoints - Staff
      training on quality standards (not just product knowledge) DK's rule: "If you wouldn't be proud to
      show it to your best customer, fix it."
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "marketing"

  - id: "FW-DK-330"
    title: "4 Questions for Every Winner (EXTEND-EXPAND-REUSE-SHARE)"
    content: >
      When you have a confirmed winner (product + promotion that filled coffers), apply these 4 questions
      before moving on: 1. How can we EXTEND it? (Run it longer, in more places, to more segments) 2. How
      can we EXPAND it? (Add formats, channels, versions — franchise build-out) 3. How/when can we RE-USE
      it? (Re-release with minor tweaks, new audience, new context) 4. WHO ELSE can we let and get to use
      it? (Affiliates, JV partners, distributors, trade associations, licensees) Only after exhausting all
      4 questions should you consider creating something new. DK says most clients shelve confirmed
      winners far too quickly because "the fucking is more fun than the child rearing" — creating new
      products is more exciting than maximizing existing ones.
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "FW-DK-331"
    title: "Cross-Selling Database Framework"
    content: >
      The failure to segment customer lists and identify who has NOT bought each product is "goofy"
      according to DK. The framework: STEP 1: Segment customer list by product ownership (who bought what)
      STEP 2: For each product, identify NON-BUYERS within your customer base STEP 3: Direct specific
      promotions to each non-buyer group as if the product were NEW STEP 4: Use full product line catalogs
      (most info-marketers do terrible job with these) STEP 5: In publish-on-demand world, never kill a
      product entirely — let it live in catalog KEY INSIGHT: It does not matter how old the product OR how
      long you have had the customer, if they did not pay attention to or were not ready for that
      particular product last time. Disney still sells Mickey Mouse hats from the 1950s because "people
      are having new babies."
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "FW-DK-332"
    title: "12 Features & Benefits of Mastermind Groups (Sales Framework)"
    content: >
      DK lists 12 sellable benefits of mastermind groups, each with specific angles: 1. Antidote to
      Aloneness — entrepreneurs feel isolation; group provides friendly competition, mutual understanding,
      a place to brag and get applause 2. Access to (High Level) Information — broader portfolio than
      casual peer conversations 3. Power of Combined Experience — 20 smart people sharing tests,
      successes, flops 4. Efficiency — look under the hood of 10-20 businesses in one trip, two days 5.
      Speed from Combined Experimentation — 20 members × 3 experiments = 60 experiments 6. Mutual Sharing
      of Resources; Alliances & JVs — swap services, endorse books, negotiate 7. Extension Solutions —
      your contacts become mine and mine become yours 8. (Intimate) Access to the Leader / Exclusivity —
      sought-after guru, limited access 9. Status — membership confers status within community and
      marketplace 10. Bundled Products, Services, Perks — value proposition improvement 11. Exclusive
      Products, Services (Portal) — not accessible outside the group 12. Unique or Appealing Experience —
      exotic locale, field trips (DK is "not personally a fan")
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "sales"

  - id: "FW-DK-333"
    title: "7 Sales Models for Filling Mastermind Groups"
    content: >
      DK describes 7 distinct models for selling mastermind memberships: 1. ASCENSION — best model. Good
      customers move up through pyramid. Pre-requisites at each level. "If a group is filled easily, and
      that is visible and known, the group will be more stable and the leader strengthened." 2.
      DIRECT/COLD — bypass pyramid, sell front-end to cold leads. CPS: $6K-$16K. Best for leader too busy
      for full info-biz pyramid. 3. APPLICATION MODEL — application creates impetus to buy when accepted.
      Time invested = commitment. Dr. Tom Orent's model: 1-hour application → Diagnostic Call. 4.
      TELE-SEMINAR/WEBINAR — used as precursor, sales presentation, or follow-up to unconverted leads. Can
      be with or without pre-disclosure of the offer. 5. DIAGNOSTIC CALL — one-to-one with
      coach/tele-shark. Manual labor intensive but extremely effective. Can be used within ascension or
      from cold leads. 6. AT AN EVENT — best opportunity: current members testify, emotional atmosphere,
      red room-blue room manipulation, event fees credit to mastermind. 7. DISCOVERY DAY — pre-disclosure,
      attendees know they're deciding. Plan to stay for Fast Start Day if they join. Optional: SAMPLING
      (DK "not a big fan" — "anticipation is often more appealing than reality") and OPEN ENROLLMENT (no
      exclusivity, sold to all).
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "sales"

  - id: "FW-DK-334"
    title: "Mastermind Operations: 4 Discipline Problems & Solutions"
    content: >
      DK identifies 4 types of discipline problems in mastermind groups with specific solutions: 1. THE
      BULLY — overly argumentative or critical know-it-all. Solution: private one-to-one corrective
      conversation first. If persists, visible correction to group required. 2. THE CHEATER (Type 1: Taker
      Not Giver) — "takes and not sharing or giving." Must be "sternly counseled and if he repeats his
      one-way behavior, ejected." Cannot be tolerated in small groups; can be hidden in large groups but
      still harmful. 3. THE CHEATER (Type 2: Non-Attentive) — wants everyone tuned into his turn but is on
      laptop, napping, or absent during others' turns. "Must be called on it and must fully participate or
      be ejected." 4. THE EARLY LEAVER — invariably has "good reason" but is unfair to those present for
      full duration. DK's solution: place that person LAST at next meeting, and caution that repeat
      offense means expulsion. Those who went late have right to go first next time. Meta-rule: "If one is
      allowed to get away with something, six'll be doing it next meeting." DK has "separated
      multi-millionaires who couldn't stop whispering, re-arranged seating, given time-outs, confiscated
      phones."
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "leadership"

  - id: "FW-DK-335"
    title: "Magnetic Marketing System — Attraction-Based Direct Response"
    content: >
      DK's master system combining metaphysical concepts of attraction/magnetism with practical direct
      response strategies. Core premise: create at least the perception (if not reality) that the
      prospective customer discovers you and moves to you by their own decision, rather than being pushed
      or pursued. Components: (1) Marketing Triangle (Message × Market × Media), (2) Target market
      profiling at 3 levels (demographic, psychographic, psychic-graphic), (3) USP development, (4) Lead
      generation campaigns, (5) Multi-step follow-up sequences, (6) Fill-in-the-blank templates and swipe
      files. Changes positioning, relationship dynamic, price elasticity, acceptance of prescription, and
      referral likelihood.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FW-DK-336"
    title: "Saddleback Sam Profile — Church Target Market Template"
    content: >
      From Rick Warren's Purpose Driven Church. Two key pages: (1) 23-24 point profile of the perfect
      prospective parishioner ("Saddleback Sam"), (2) List of susceptibility timing — when people fitting
      the profile are most likely to be receptive. Timing items include: "in the middle of severe family
      problems," "18-year-old getting in trouble with the law," "recently divorced." DK notes this is
      "more predatory than people expect from a church" but the principle is sound: "You get to be most
      helpful to the people you can be most helpful to. You can't help them if you can't get them in the
      door."
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "FW-DK-337"
    title: "USP Pathways — Five Routes to Differentiation"
    content: >
      DK's pathways to developing a USP: (1) Positioning and differentiation in market — what makes you
      unique among competitors. (2) Niche specialization — narrow focus creates authority. (3) Guarantee —
      dramatic guarantee that removes risk (Domino's "30 minutes or less guaranteed"). (4) Dramatic
      demonstration — showing vs telling. (5) Proprietary process — naming and owning a method. Best USPs
      are "at least in part driven by the target market selected to receive them." The Domino's USP said
      nothing about taste because their market (college students) wanted speed and delivery.
    source: "transcription_mp4_3.txt"
    domain: "marketing"

  - id: "FW-DK-338"
    title: "Three-Level Prospect Data Architecture"
    content: >
      DK's data hierarchy for target marketing: Layer 1 — OWN DATA: reverse-engineer from existing
      customers. "Literally paying attention helps — most people don't." Mine purchase records, segment
      who buys what. Layer 2 — COMMERCIAL DATA: go into the marketplace of lists, "privacy gets deader by
      the day, so if you know what you want you can get it for a price." Layer 3 — SELF-SELECTION: create
      lead generation that qualifies prospects by the very act of responding. Media selection as
      aggregation: "media is always an aggregation of people who share demographics and psychographics" —
      choose media for WHO the reader/listener is, not what the content is about.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "FW-DK-339"
    title: "Media Is Media Is Media — Online = Just Another Collection of Media"
    content: >
      DK's framework for treating online marketing as simply another media channel, not a fundamentally
      different methodology. "Online really means a collection of media — that's really what we're talking
      about. The idea that because it is online or on television or on radio or on a postcard, somehow now
      all new methodology applies, is a completely false, erroneous, and dangerous idea." PPC is
      essentially buying eyeballs for a classified ad. A classified ad from Harper's Weekly during the
      Civil War works exactly the same posted online. "Corn's gone in seven days or money back — just
      change the response instruction to 'see free video at' and you're good to go."
    source: "transcription_mp4_5.txt"
    domain: "marketing"

  - id: "FW-DK-340"
    title: "Multi-Step Campaign Architecture — Beyond One-Shot Marketing"
    content: >
      DK's lead generation framework operates through multi-step campaigns rather than single- shot
      marketing. Step 1: Capture lead via free report/information/video offer (classified ad, display ad,
      online ad). Step 2: Deliver value-first content that positions you as authority. Step 3: Follow-up
      sequence (mail, email, phone) over weeks/months. Step 4: Convert developed lead into customer. "The
      whole campaign may be stretched over two months." This captures the "secondary quantity of people
      who have some level of interest" but aren't ready to buy immediately, developing them through "a
      series of steps over a period of time."
    source: "transcription_mp4_4.txt"
    domain: "marketing"

  - id: "FW-DK-341"
    title: "Fill-in-the-Blank Template Toolkit — Cross-Media, Cross-Industry"
    content: >
      The Magnetic Marketing Toolkit contains copyright-free templates for every business category,
      designed to cross media platforms and create evergreen marketing assets. Includes: sales letters,
      classified ads, display ads, email templates, banner ads, tweets, text messages. Key instruction:
      "Don't just go to your section — go through ALL sections." DK's "Amish" warning: being too
      industry-insular means missing cross-pollination opportunities. Templates reduce learning curve and
      speed implementation — Dave Dee implemented within 3 days of purchase. 6th Edition updated for
      online media channels.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "FW-DK-342"
    title: "The Psychic-Graphic Questionnaire — Getting Inside Their Head"
    content: >
      DK's coined term "psychic-graphic" represents a series of questions to answer about your target
      market before creating any marketing material. Core questions: What keeps them up at night staring
      at the ceiling? What frustrates them daily? What conversations are they having at the kitchen table?
      How do they see themselves? What do they secretly desire? What are they afraid of? Different people
      buy the same thing for different reasons — engineer buys real estate investing from fear of layoff,
      dentist from retirement planning, single mom from income supplementation. The psychic-graphic
      profile dictates message tone, language, and emotional triggers.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "FW-DK-343"
    title: "10 Relationship Value Factors for Herd Management"
    content: >
      1. Affinity (pride of attachment) 2. Attachment to person/personality 3. Philosophy (belief system)
      4. Mission (evangelical purpose) 5. Frequency 6. Constancy 7. Presence/Omnipresence 8. Value 9.
      Dependency 10. Pain of Disconnect
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FW-DK-344"
    title: "5 Personality Attachment Requirements"
    content: >
      1. They believe you care about them and their results 2. They think they have more relationship with
      you than they do 3. You are continually interesting 4. They trust and admire you 5. Personal
      correspondence flows
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FW-DK-345"
    title: "Objective vs Subjective Herd Measurements"
    content: >
      Objective: retention stats, value per defined term, ascension %, referrals, involvement,
      responsiveness. Subjective: fan mail, gifts received, success reports, volunteerism, chatter
      (online/offline/women's room).
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FW-DK-346"
    title: "8 Content Categories for Herd Communication"
    content: >
      1. Ideas 2. Information (curated/synthesized) 3. Instruction (how-to) 4. Motivation (pep talks) 5.
      Entertainment (fun, humor) 6. Personal stories 7. Current events 8. Them (featuring members)
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "FW-DK-347"
    title: "Pain of Disconnect Architecture"
    content: >
      Craig Proctor controlled realtors' lead generation websites, recorded messages — when they leave,
      bunch of plugs he can unplug. Royalty Rewards: merchant's customers have points and rewards tied to
      system — dropping out means telling customers their card is worthless.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-348"
    title: "Evaluation forms are useless - only metric that matters: did they BUY? 27 of 30"
    content: "Evaluation forms are useless - only metric that matters: did they BUY? 27 of 30 negative evaluators still bought"
    source: "MM-BB-CD2"

  - id: "FW-DK-364"
    title: "Cooperation-Through-Importance Formula"
    content: >
      6 steps to get cooperation: 1) Explain situation with something at stake, 2) Create a role the
      person can play, 3) Emphasize importance of the role, 4) Personalize — why YOU are qualified, 5)
      Acknowledge the sacrifice, 6) Put them on the spot and ask if you can count on them.
    source: "transcription_mp4_video_2.txt"
    context: "Used in charity/political fundraising, applicable everywhere"

  - id: "FW-DK-365"
    title: "Four Affinity Builders Framework"
    content: >
      Build trust through 4 categories: 1) Empathetic statements (30% of content), 2) Affinity
      statements/symbols (I'm one of you), 3) Advocacy statements (standing up for group against enemy),
      4) Permission slips (it's OK to think/feel this way).
    source: "transcription_mp4_video_2.txt"
    context: "Core framework for all rapport/trust building"

  - id: "FW-DK-366"
    title: "Ascension Ritual System"
    content: >
      Copy MLM pin system for any business: Define levels → Create physical symbols (pins/badges) → Public
      ceremony at regular events → Peer pressure drives compliance → Combine with referral program → Never
      skip the back-end recognition.
    source: "transcription_mp4_video_4.txt"
    context: "Pete Fernandez knights + chiropractor implementation"

  - id: "FW-DK-367"
    title: "Disclosure-Mystery Dual Strategy"
    content: >
      Balance both: Use transparency and disclosure to disarm defenses + Hold some things back to maintain
      curiosity. Some weirdness, eccentricities, superpowers that always need to be not quite disclosed.
      Create an Era of Mystery (per Robert Greene).
    source: "transcription_mp4_video_3.txt"
    context: "Mata Hari case study + Penn & Teller clear cups"

  - id: "FW-DK-368"
    title: "Good Demo Construction"
    content: >
      Anatomy of a powerful demo: 1) Powerful analogy (X is like Y), 2) Uses something familiar, 3)
      Spotlights similarities, 4) Obscures differences, 5) Telegraphs the whole story, 6) Resonates
      emotionally, 7) Supports preexisting beliefs, 8) Hard to argue against.
    source: "transcription_mp4_video_5.txt"
    context: "OJ glove demo dissected"

  - id: "FW-DK-369"
    title: "Optics Design Protocol"
    content: >
      Evaluate everything 3 ways (Disney): wide shot, medium shot, close-up. Apply Sound-Off Test to all
      visuals. Stage: arrival (car+driver), escort (never alone), setting (symbols of power), visual
      abundance (flags, gold). What impression with no audio?
    source: "transcription_mp4_video_5.txt"
    context: "Disney Imagineers + Trump staging + DK personal rules"

  - id: "FW-DK-370"
    title: "Demo Construction Framework"
    content: >
      1) Control the outcome (rig if needed), 2) Make the demo easy not hard (Houdini principle), 3) Use
      familiar analogy (glove = everyone's tried one), 4) Spotlight similarities with your claim, 5)
      Obscure differences from reality, 6) Telegraph the story you want them to believe, 7) Match
      emotional preexisting beliefs, 8) Make it hard to argue against.
    source: "transcription_mp4_video_6.txt"
    context: "Synthesis of OJ, Houdini, infomercial demos"

  - id: "FW-DK-371"
    title: "Proof By Numbers Framework"
    content: >
      Three types: 1) SOCIAL PROOF NUMBERS — big numbers in isolation (2M Invisalign), 2) TREND NUMBERS —
      what's rising will continue (87% investor belief), 3) STRETCH NUMBERS — factual number rubber-banded
      to your context (Forbes 500 = 'real estate investors'). Stack 5-6 boom-boom-boom for maximum effect.
    source: "transcription_mp4_video_8.txt"
    context: "Complete proof-by-numbers taxonomy"

  - id: "FW-DK-372"
    title: "Enemy/Villain Creation Framework (7 Points)"
    content: >
      1) Every movement needs a devil, 2) Excitement proportionate to devil's vividness, 3) Must be
      tangible not abstract, 4) Consolidate multiple enemies into one, 5) Concentrate on one main villain,
      6) Failures become villain's fault (GOOJFC), 7) Ideal villain is foreign invader not insider.
    source: "transcription_mp4_video_9.txt"
    context: "7 criteria for villains — Trump, Walmart, Obama examples"

  - id: "FW-DK-373"
    title: "Big Idea Sales Engine"
    content: >
      Create the big idea that drives automatic purchasing: 1) Identify or create a cultural norm ('you
      need X'), 2) Make it feel mandatory ('everyone has one'), 3) Once norm is accepted, you only compete
      on brand/model, 4) Examples: music rooms→pianos, man caves→gear, home offices→equipment,
      websites→services, smartphones→apps.
    source: "transcription_mp4_video_9.txt"
    context: "Ogilvy's big idea applied at industry level"

  - id: "FW-DK-374"
    title: "Mentalism Force Framework (Sales Application)"
    content: >
      1) Use VERBAL force — language that narrows choices while appearing open, 2) Use NONVERBAL force —
      gestures that plant the desired thought, 3) Eliminate options through stated 'rules', 4) Use
      embedded examples that contain the target, 5) HARVEST — ask for multiple answers, aggregate raised
      hands, 6) LABEL difficulty upward even when easier.
    source: "transcription_mp4_video_7.txt"
    context: "Triangle/circle, 37, 86, card force demonstrations"

  - id: "FW-DK-375"
    title: "Threshold Resistance Reduction System"
    content: >
      1) Map every threshold in your sales process, 2) Identify where 'almost persuaded' people drop off,
      3) Create low-threshold alternatives at each step (free report, recorded message, video, website),
      4) Accept ~15% trade-down from high-threshold for entirely new lead stream, 5) Build follow-up
      system for leads who chose low threshold, 6) Graduate them through progressively higher thresholds.
    source: "transcription_mp4_video_10.txt"
    context: "Financial advisor + Dr. Hawkins diabetes + free recorded message"

  - id: "FW-DK-376"
    title: "Forced Choice Architecture"
    content: >
      Step 1: Use 'I don't care' to drop defenses. Step 2: 'You decide/you pick' gives control feeling.
      Step 3: Present only 2-3 pre-selected options (all acceptable to you). Step 4: Switch frame from 'do
      I want it?' to 'which one?' Three mechanisms: choice of items, choice of timing, differential
      benefit.
    source: "transcription_mp4_video_10.txt"
    context: "Restaurant choice + AB offer + consulting prescriptions"

  - id: "FW-DK-377"
    title: "New/Improved Cycle Framework"
    content: >
      Step 1: Recognize fatigue is inevitable regardless of quality. Step 2: Create multiple versions of
      same product in different packaging (P&G: 5+ 'different' detergents). Step 3: Implement 6-week
      new/improved cycle on flagship. Step 4: Changes can be trivial (scent/no scent, new bottle,
      'booster' add-on). Step 5: Maintain the illusion of novelty perpetually.
    source: "transcription_mp4_video_13.txt"
    context: "P&G Tide + Trump 2-3 day cycle + new car psychology"

  - id: "FW-DK-378"
    title: "Greed Pitch Architecture"
    content: >
      Works on ALL demographics (doctors through trailer park). Three elements: 1) Create perceived need
      ('you NEED this opportunity'), 2) Provide rationalization ('smart people do this'), 3) Use 'free' as
      irresistible trigger (hardwired, visceral, never dies). Stack: free + new + exclusivity + big
      numbers. Even when they know intellectually it's nonsense, they can't resist.
    source: "transcription_mp4_video_13.txt"
    context: "Stupak, get-rich seminars, Proactiv, stock-market ads"

  - id: "FW-DK-379"
    title: "Positional Status Sales Architecture"
    content: >
      1) Create visible tiers with physical symbols (pins, rooms, jackets). 2) Use glass walls/accordion
      doors so lower tier SEES upper tier benefits. 3) Run split-test headlines with comparative framing
      ('more than your friends'). 4) In pricing, use 'ugly friend' — place expensive option next to
      standard. 5) Keep the board visible — names, rankings, achievements public.
    source: "transcription_mp4_video_14.txt"
    context: "GKIC, MLM, Weight Watchers, suburban pool effect synthesis"

  - id: "FW-DK-380"
    title: "Affluent Client Attraction Framework"
    content: >
      Three levers: 1) MOST EXPENSIVE — state it plainly ('highest paid on earth'), 2) MOST EXCLUSIVE —
      hard to get (Bill Murray principle: no agent, hard to find, travail stories), 3) MOST SYMBOLIC —
      represents who they ARE, not what it does. Their bragging stories about getting you = free
      marketing.
    source: "transcription_mp4_video_14.txt"
    context: "DK personal positioning + Patek Philippe + Bill Murray"

  - id: "FW-DK-381"
    title: "Optimistic Bias Exploitation Framework"
    content: >
      1) Show winners prominently (lottery, testimonials), 2) Use big numbers ('paid out $200M this
      year'), 3) Make it easy to replay (auto-buy, subscription), 4) Create new versions of same thing
      (new diet = new hope), 5) Target the invested (sunk cost amplifies bias), 6) Never let them fully
      process failure before next offer arrives.
    source: "transcription_mp4_video_16.txt"
    context: "Lottery, WinTrillions, Weight Watchers, opportunity seekers"

  - id: "FW-DK-382"
    title: "Gaslighting Sales Framework"
    content: >
      When target feels superior: 1) Establish affinity first (Ted Oakley life story). 2) Introduce doubt:
      'What got you here won't get you there.' 3) Make their money feel IRREPLACEABLE: 'No pump, no oil
      wells anymore.' 4) Show mistakes peers made ('first 12 months, they lose millions trading stocks').
      5) Position yourself as the only safe harbor. 6) Fear of loss > pride of accomplishment.
    source: "transcription_mp4_video_17.txt"
    context: "20 Million and Broke' campaign — wealth advisor to company sellers"

  - id: "FW-DK-383"
    title: "Addiction Loop Design"
    content: >
      1) Progressive levels of involvement (casino: bonus rounds, levels). 2) Pretend control (pick, spin,
      choose). 3) Near-miss engineering (you ALMOST won 5000 credits). 4) Continuous micro-rewards. 5)
      Physical/chemical addiction (McDonald's sugar in everything). 6) Social obligation to return
      (community, streaks, daily check-ins). Goal: maximize TIME engaged, not just transactions.
    source: "transcription_mp4_video_17.txt"
    context: "Casino evolution + McDonald's + dashboard gamification"

  - id: "FW-DK-384"
    title: "Installing The Familiar Framework"
    content: >
      1) Identify what audience IS familiar with, 2) Map your new thing onto that familiar framework using
      metaphor/analogy, 3) Use visual/environmental cues that trigger recognition, 4) Reduce resistance by
      wrapping unfamiliar in familiar container. Examples: Jobs desktop, IKEA catalog as 'technology,'
      nostalgia wrappers.
    source: "transcription_mp4_video_20.txt"
    context: "Hijack #48 — complete framework"

  - id: "FW-DK-385"
    title: "Encouraged Assumption Framework"
    content: >
      Create environment rich with familiar cues that encourage desired assumptions. Stack: 1)
      Setting/location cues, 2) Professional roles/uniforms, 3) Language/terminology, 4) Props and
      symbols, 5) Social proof from others assuming same thing. Penn & Teller water steward = 6+ hijacks
      working simultaneously.
    source: "transcription_mp4_video_20.txt"
    context: "Hijack #50 + Penn & Teller multi-hijack stack analysis"

  - id: "FW-DK-386"
    title: "Making It Their Own Idea Framework"
    content: >
      1) Understand target's ego/insecurity, 2) Create 2-3 carefully crafted choices, 3) Argue both sides
      convincingly, 4) Position preferred option as 'obvious,' 5) Include decoy you argue FOR (knowing
      they'll reject it), 6) Let them 'discover' right answer. Kissinger/Nixon model.
    source: "transcription_mp4_video_21.txt"
    context: "Hijack #51 — basis for House of Cards character"

  - id: "FW-DK-387"
    title: "Certainty Selling Framework"
    content: >
      1) Present your method as THE one and only right way, 2) Explicitly declare all alternatives wrong,
      3) Be dogmatic and rigid — zero flexibility, 4) Have non-negotiable rules for participation, 5) Be
      willing to turn people away (phone book test), 6) Never water down for broader appeal. Atkins model:
      conquered diet industry for a decade with pure certainty.
    source: "transcription_mp4_video_22.txt"
    context: "Hoffer True Believer + Atkins + chiropractor + politics"

  - id: "FW-DK-388"
    title: "Conspiracy Selling Architecture"
    content: >
      1) Identify target's negative outcome, 2) Present conspiracy as most appealing belief choice, 3)
      Position yourself as solution circumventing the conspiracy, 4) Stack 'evidence' reinforcing desired
      beliefs (even if contradictory). Cross-pollination: conspiracy believers buy multiple conspiracies.
    source: "transcription_mp4_video_19.txt"
    context: "Diet industry, financial services, health — conspiracy as driver"

  - id: "FW-DK-389"
    title: "Orson Welles Media Exploitation Method"
    content: >
      1) Use conventions of trusted medium (radio news format), 2) Start with something normal (dance
      music), 3) Interrupt with 'breaking news,' 4) Build slowly, 5) Use amateur-sounding eyewitnesses, 6)
      Escalate through authority figures, 7) Insert authenticating details (locations, miles, county
      names), 8) Build to climax through methodical escalation. Each new medium has this 'confusion
      window.
    source: "transcription_mp4_video_21.txt"
    context: "War of the Worlds 1938 — 25% of radio homes tuned in, mass panic"

  - id: "FW-DK-390"
    title: "Sequential Agreement Mapping Framework"
    content: >
      Before building any presentation, map all sequential agreements prospect must accept. What does
      somebody have to agree to sequentially to reach the final agreement? Example: fire alarms — must
      agree fires are significant → brick houses burn too → it's urgent → etc. Skip one = sale stops.
    source: "transcription_mp4_video_23.txt"

  - id: "FW-DK-391"
    title: "Four Reasons Why This Time Is Different"
    content: >
      For audiences with purchase history: create four concrete reasons why this attempt differs from all
      previous failures. Required because 95%+ of buyers have failure history. Miss this step = persuasion
      stops.
    source: "transcription_mp4_video_23.txt"

  - id: "FW-DK-392"
    title: "Time = 4 Outcomes Framework"
    content: >
      One input (time obtained) drives four outcomes: 1) Likelihood of purchase, 2) Price elasticity, 3)
      Happiness with purchase / reduced remorse, 4) Referrals generated. When you hijack their time, you
      get everything else.
    source: "transcription_mp4_video_23.txt"

  - id: "FW-DK-393"
    title: "Artificial Glory Environment Framework"
    content: >
      Create environments where glory occurs theatrically: audience, recognition, winners, rankings,
      awards ceremony, trophies, theatrical trappings (red carpet, cameras, celebrity host). Even
      infomercial industry has full Oscar-style awards. Create it and they reward you.
    source: "transcription_mp4_video_23.txt"

  - id: "FW-DK-394"
    title: "Small Victory Engineering Framework"
    content: >
      First action must be: small, easy, impossible to screw up, guaranteed result, quick. Then convert
      victory to commitment for next harder task. Progressive chain. If you don't engineer the small
      victory, you've had it.
    source: "transcription_mp4_video_24.txt"

  - id: "FW-DK-395"
    title: "Light His Fire — Remove Cooperation Bottleneck"
    content: >
      Ellen Kriedman's method for bad marriages: 'He doesn't have to cooperate, doesn't have to know
      you're doing it, but he will be changed.' She removed the #1 reason every prior solution failed
      (requiring both parties). Brilliant because she took away the reason it always failed.
    source: "transcription_mp4_video_25.txt"

  - id: "FW-DK-396"
    title: "Later Buyer Capture Framework"
    content: >
      Systematically capture non-immediate buyers. For every now-buyer there's a multiple of later-buyers.
      Need: capture mechanism, follow-up system with long legs, affordable economics. Persistent
      permission-based dialogue.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-397"
    title: "No-Recordings Scarcity: stop making recordings available for purchase after even"
    content: >
      No-Recordings Scarcity: stop making recordings available for purchase after events. The ONLY way to
      get the information is to attend in person. Eliminates 'I'll just buy the recordings' excuse.
    source: "MM-08-pdf02"

  - id: "FW-DK-397"
    title: "Longevity Content Framework"
    content: >
      For long-running businesses: 1) Principles fixed, 2) Tactics/tools change — use to freshen, 3)
      Rearrange/repackage/re-describe the old, 4) Constant eclectic input generates new output, 5)
      Messenger/experience matters as much as message.
    source: "transcription_mp4_video_25.txt"

  - id: "FW-DK-398"
    title: "Overarching Objectives Shortlist Framework"
    content: >
      For every market, build a shortlist of 3-5 overarching psyche objectives that MUST be achieved
      before any pitch works. Two columns: (1) What must they think (2) What must they NOT think. Then
      verify every piece of copy supports the shortlist. Financial services example: (a) be active
      investor, (b) act on short-term info, (c) feel fear/anxiety, (d) be tempted by new products.
    source: "transcription_mp4_video_27.txt"
    context: "Master list on cheat sheet card — most marketers don't even have this stage"

  - id: "FW-DK-399"
    title: "Problem Magnification Framework"
    content: >
      Step 1: Take a minor/non-existent problem. Step 2: Connect it to major consequences (immune system,
      cancer, relationships). Step 3: Show terrifying visuals (magnified dust mites, biological invaders).
      Step 4: Create urgency ('sneaks up on you'). Step 5: Present your solution as the only escape.
      Product: sinus pill. Treatment: 70 pages of catastrophizing.
    source: "transcription_mp4_video_27.txt"
    context: "Also: mattress dust mites, Listerine bad breath, Athlete's Foot — all invented problems sold as life-threatening"

  - id: "FW-DK-400"
    title: "Copy Stacking Framework (Shuffle Deck Method)"
    content: >
      Process: (1) Write every element on a single sheet — headline, paragraph, subhead, each on its own
      page. (2) Shuffle and reorder repeatedly until raw copy is in optimal sequence. (3) Stitch together,
      bridge, and finish. Order of presentation matters as much as content. The order question is at least
      as important as what you choose to say.
    source: "transcription_mp4_video_27.txt"
    context: "Kennedy's personal copy ordering process — physical shuffling of individual elements"

  - id: "FW-DK-401"
    title: "Dark-Light Stacking Formula"
    content: >
      Default stacking when no other formula applies: (1) Dark item, (2) Embellishment, (3) Even darker
      item, (4) Darkest item, (5) Light at end of tunnel, (6) More light, (7) Personal positive benefits.
      Creates emotional arc from fear through despair to hope to desire.
    source: "transcription_mp4_video_28.txt"
    context: "Blue star formula — Trump uses this exact pattern in every speech for border, trade, and infrastructure topics"

  - id: "FW-DK-402"
    title: "Cold Read Copy Framework"
    content: >
      Structure: (1) Barnum statements that everyone agrees with, (2) Fail-safe statements playing both
      sides of the coin, (3) Safe cold reads matched to known context, (4) Permission slips for
      guilt-laden desires, (5) Explained data mining, (6) More cold read validation, (7) Then product
      pitch. Wind Trillions: 32 minutes cold read → 20 minutes product. The VSL IS the psychic sitting
      across from you.
    source: "transcription_mp4_video_28.txt"
    context: "Scripts from actual psychic cold read manuals translated directly into sales copy"

  - id: "FW-DK-403"
    title: "Complete Objection Handling Framework For Copy"
    content: >
      Step 1: List ALL stated objections in your market. Step 2: For each, determine possible TRUE
      meanings. Step 3: Write answers to ALL possible real objections (not just stated ones). Step 4:
      Distribute objection answers throughout copy (not clumped in FAQ). Step 5: Place them where they'd
      naturally arise in a human conversation.
    source: "transcription_mp4_video_29.txt"
    context: "Miracle Ear transcript analysis: stated objection ≠ real objection — must answer BOTH"

  - id: "FW-DK-404"
    title: "Anti-Self-Disqualification Framework"
    content: >
      Step 1: Identify HOW prospects disqualify themselves ('I can't write,' 'I never do anything with
      courses,' 'I'm too old'). Step 2: Address it directly in copy — don't hide from it. Step 3: Use 'no
      matter what' bridge phrases. Step 4: Explain why 'this time is different' with specific reasons.
      Step 5: Make it easy/simple/fill-in-the-blank so no skill is required.
    source: "transcription_mp4_video_29.txt"
    context: "Magnetic Marketing speech: 'fill-in-the-blank letters — all you do is put your business name in the right place"

  - id: "FW-DK-405"
    title: "Reverse Reality Lead Generation Framework"
    content: >
      When the real thing is too familiar/scary/demanding/complicated: (1) Create completely alternate
      description. (2) Maintain alternate reality through ALL lead gen materials. (3) No reveal until
      requested presentation. (4) Be willing to dig a very deep hole. (5) Climb out gradually in the
      conversion piece. Tests show this approach works even with lists who should know better (dentists,
      IBD subscribers).
    source: "transcription_mp4_video_29.txt"
    context: "Real estate → 'finder's fees.' 8-9 year control. Also worked in 2008 crash on dead RE investor lists."

  - id: "FW-DK-406"
    title: "The One Thing Positioning Framework"
    content: >
      Structure: (1) Find or create a single magic element in your offer. (2) Position it as the solution
      to everything. (3) Make all negatives go away because of this one thing. (4) Make all positives
      occur because of this one thing. (5) Make it simple and easy. Orthodontist: 'perfect smile fixes
      everything.' Swiss cell therapy: 'one pill has intuitive knowledge of what ailment to address.
    source: "transcription_mp4_video_31.txt"
    context: "Same pitch from Lydia Pinkham (1900s) → Geritol → Cellergy (2016). People want ONE thing, simple and magical."

  - id: "FW-DK-407"
    title: "Arrow To The Heart — Four Quadrant Analysis"
    content: >
      For any offer, map the appeal across 4 quadrants: (1) Self-interest hooks (what's in it for me), (2)
      Self-esteem hooks (how will I feel about myself), (3) Male-specific hooks (conquest, credit,
      bragging rights, status spending), (4) Female-specific hooks (safety, emotional health, impending
      tragedy prevention, deal bragging). Different weight per quadrant based on audience gender split.
    source: "transcription_mp4_video_31.txt"
    context: "Orthodontist broken into male parent vs female parent motivations — completely different conversations"

  - id: "FW-DK-408"
    title: "Dave's Cooperation + Cold Read Sales Framework"
    content: >
      Step 1: Align with prospect ('just looking and shopping around?' → yes). Step 2: Stack 5-7 yes
      responses. Step 3: Colombo walkaway + turn-back question. Step 4: Deliver core story. Step 5: Use
      Barnum statements for deeper rapport. Step 6: Use 'you might be wondering' thought plants. Step 7:
      Add embedded commands. Step 8: Ego stroke with realistic takeaway. Result: total psychological
      compliance before any selling.
    source: "transcription_mp4_video_32.txt"
    context: "Dave's psychic salesperson system adapted for retail, financial advisory, and any face-to-face selling"

  - id: "FW-DK-409"
    title: "Euphemism Control Framework"
    content: >
      Step 1: Identify the unpalatable term attached to your thing. Step 2: Determine which side of the
      argument the current term serves. Step 3: Create euphemism that reframes the concept. Step 4:
      Stubbornly use your term and correct anyone who uses the opponent's term. Step 5: Get adoption. In
      business: replace 'workbook' with better term; replace 'seminar' with aspirational name. Use
      thesaurus aggressively.
    source: "transcription_mp4_video_31.txt"
    context: "Political examples (death tax, living wage, undocumented) + business applications (workbook, seminar naming)"

  - id: "FW-DK-410"
    title: "The Reason Why Integration Framework"
    content: >
      For any claim that might be questioned: (1) Add a reason why, even if thin ('probiotic enzymes').
      (2) Match the explanation type to what will satisfy your audience. (3) People don't need MUCH
      explanation, but they need SOME. (4) 'Because' is the magic bridge word. The Xerox copy machine
      study: people let you cut in line when you give any reason, even a tautological one.
    source: "transcription_mp4_video_31.txt"
    context: "Spray hair product: each generation of control added MORE explanation of how it works, and each performed better"

  - id: "FW-DK-411"
    title: "Specificity Amplification Framework"
    content: >
      For every element in copy, ask: (1) What specific details can I add to the person (age, profession,
      hospital, grandkids)? (2) What specific details add to the story ('dark and stormy night')? (3) What
      trivial but vivid details make it real (jacket color, dog breed, dog's name, one funny eye)? (4) For
      testimonials: move from 'Barbara N.' → full name + profession + tenure + specific result + photo +
      documents.
    source: "transcription_mp4_video_31.txt"
    context: "Comedians play with trivial details until the laugh works — same process for copy. Charles Jarvis 'bird joke' = 7-minute detail-rich story."

  - id: "FW-DK-412"
    title: "People-Story Persuasion Framework"
    content: >
      Step 1: Lead with a PERSON, not a proposition. Step 2: Use story structure (beginning, challenge,
      transformation). Step 3: Embed assertions/claims INSIDE the story (bypasses critical thinking). Step
      4: Add specific trivial details for believability. Step 5: Social proof using people with maximum
      affinity (same profession, same situation). Step 6: Remember: 'social explanations' now work better
      than scientific ones.
    source: "transcription_mp4_video-37.txt"
    context: "Current control: 'I used to bike past this mansion as a kid.' Daring to lead with story because people are more interested in people."

  - id: "FW-DK-413"
    title: "Four-Factor Social Proof Optimization Framework"
    content: >
      Optimize testimonials across 4 dimensions: (1) BULK: flood factor, quantity matters (5000 in a
      book). (2) MEANING: authority + credibility of person (RNs, pastors, coaches over random names). (3)
      STORY: specificity, photos, documents, tax returns, details. (4) AFFINITY: 'just like me' matching —
      firemen for firemen, carpenters for carpenters. Segment testimonials by audience for maximum
      affinity.
    source: "transcription_mp4_video-37.txt"
    context: "Heartland shed company: 83 owner stories + DVD. Miracle Ear: sought specific high-trust occupations."

  - id: "FW-DK-414"
    title: "Physical Delivery Hijack Framework"
    content: >
      Hierarchy: (1) FedEx (best B2B penetration, ~$6-8 per unit). (2) Fake Amazon package (new, high B2B
      penetration, lower cost). (3) Themed object + contents (circus items, Disney envelopes, bullets with
      wanted posters). (4) Premium packaging (Tiffany-style box with real money). Rules: delivery must
      match quality of contents. Never economize outside and invest inside. Never reveal sender on
      curiosity packages.
    source: "transcription_mp4_video-38.txt"
    context: "Kennedy: Disney envelope not thrown out. Bullet mailing always has postal inspector problems but always worth it."

  - id: "FW-DK-415"
    title: "Statements of Profound Importance Framework"
    content: >
      Step 1: Push every descriptor to the outer limit ('world's first,' 'most potent ever created,'
      'mind-blowing discovery'). Step 2: Use dramatic analogies for further amplification. Step 3: Add
      TM/R/C/Patent marks to amplify perceived importance. Step 4: Use question format + third-party
      attribution to push further than direct claims. Step 5: Use 'break free even if you've suffered for
      years' to stop self-disqualification. Step 6: Good-better-best offer with inventory load if product
      won't produce felt results.
    source: "transcription_mp4_video-38.txt"
    context: "Stem cell capsule control: 'repairs every organ in 57 days,' 'the only time you'll see your doctor is on the golf course"

  - id: "FW-DK-416"
    title: "Permission Slip Copy Framework"
    content: >
      Step 1: Identify what your audience wants but feels is unseemly/inappropriate. Step 2: Make it a
      badge of courage or honor, not just acceptable. Step 3: Use 'earned privilege' framing. Step 4:
      Embed permission consistently (Kennedy: every month's newsletter has wealth-permission content).
      Step 5: Use cultural examples: Dupont Registry 'You've climbed the ladder,' Rob Report 'In Defense
      of Decadence,' Ducati 'You deserve both.
    source: "transcription_mp4_video-38.txt"
    context: "Luxury cars post-2008: money available but guilt present. Copy must constantly make the aspiration feel okay."

  - id: "FW-DK-417"
    title: "Escalating Toughness Framework"
    content: >
      Step 1: Start nice in early communications. Step 2: Escalate tone with non-responders. Step 3:
      Eventually shame and bully: 'Be honest with yourself. Is your reason really just a selfish excuse?'
      Step 4: Calibrate toughness by measuring: apologies from converters (good) + complaints from
      non-converters (good) = right level. Step 5: At some point in every sequence, you want them 'ashamed
      and cringing at what they haven't done.
    source: "transcription_mp4_video-38.txt"
    context: "WWI UK recruiting posters: 'What will you say when your children ask father, why weren't you a soldier too?"

  - id: "HEUR-DK-506"
    title: "Over 50% of football betting is on NFL Sunday. At end of Sunday, 90% are upside"
    content: >
      Over 50% of football betting is on NFL Sunday. At end of Sunday, 90% are upside down. Monday Night
      is the 'bailout game.' Tout services exploit this by calling losers with a Monday night lock.
    source: "DVD09"

  - id: "HEUR-DK-727"
    title: "Use Question Format To Push Claim Limits"
    content: >
      This pill WILL put your doctor out of business' = step too far. 'COULD this pill put your doctor out
      of business? Experts say yes.' = defensible. Question format + third-party attribution lets you make
      claims you couldn't make as direct statements.
    source: "transcription_mp4_video-38.txt"
    context: "Alternative health compliance technique — question + 'experts say' pushes further than direct assertion"

- id: "FW-DK-747"
    title: "Client Attraction Three Pillars - Opportunity Methodology Ideology"
    content: "In client attraction, we're dealing with three issues. One is Opportunity: where are clients, sources, access, who to go after. Two is Methodology: how to position, market, sell, and manage. Three is Ideology: belief systems about yourself, clients, business, and money. Ideology has as much to do with success as anything."
    source: "business-of-copywriting"
    tags: [client-attraction, framework, positioning, ideology]
  - id: "FW-DK-748"
    title: "Values Beyond Wallet - 12 consulting values independent of income differential"
    content: "Values you bring regardless of income gap: (1) Fresh eyes, (2) Dumb questions, (3) Forced thought, (4) Interaction and defending ideas, (5) Unearthing ignored opportunities, (6) Finding undervalued stories, (7) Validation, (8) Motivation, (9) Decision-making support, (10) Accelerated implementation, (11) Resources and connections, (12) Specialized knowledge."
    source: "business-of-copywriting"
    tags: [consulting, value-proposition, confidence, client-attraction]
  - id: "FW-DK-749"
    title: "Fee Presentation Seven Mistakes - what NOT to do when discussing money"
    content: "Seven fee presentation mistakes: (1) Establishing precedent of free, (2) Writing to assignment instead of projects, (3) Talking about money too soon, (4) Selling mode/ping-pong objections, (5) Inviting negotiation by using the word or publishing prices, (6) No diagnostic conversation first, (7) Vigorously defending against objections."
    source: "business-of-copywriting"
    tags: [pricing, fee-presentation, mistakes, consulting]
  - id: "FW-DK-750"
    title: "Problem Clients Framework - nine categories to screen and manage"
    content: "Nine problem client types: (1) Just doesn't get it, (2) Refusal to work as agreed, (3) Interference by committee, (4) Personality conflicts, (5) Work outside your ability, (6) Questionable integrity with people like you, (7) Actual or probable legal problems, (8) FTC consent decrees, (9) Emergency 911 calls."
    source: "business-of-copywriting"
    tags: [client-management, screening, problem-clients, risk]
  - id: "FW-DK-751"
    title: "Client Handling Funnel - single standardized process for all lead sources"
    content: "All leads feed same process: (1) Inquiry mechanism - they must contact you, (2) Positioning - handling creates proper perception, (3) Phone appointment or initial meeting, (4) Diagnostic conversation, (5) Prescription, (6) Agreement on project, (7) If yes: contract, (8) If no: follow-up sequence."
    source: "business-of-copywriting"
    tags: [client-attraction, process, lead-management, positioning]
  - id: "FW-DK-752"
    title: "Contract Architecture - six non-negotiable elements for consulting agreements"
    content: "Six contract elements: (1) No warranty of non-disclosure or confidentiality - NDAs are invitation to litigation, (2) Indemnity - whatever they do with your work is on them, (3) Access/Limitation - rules of the road for communication, (4) Conflicts of interest disclosure, (5) Ownership of work - they own it but you can use it, (6) Timetable of deliverables."
    source: "business-of-copywriting"
    tags: [contracts, consulting, legal, fee-presentation]
  - id: "FW-DK-753"
    title: "Strategic Visibility Three Principles - right audience right fame level"
    content: "Three principles: (1) No point being visible to wrong audience - I won't do morning drive time with Chip and Dale in Bozeman Montana, (2) OK to be famous only to chosen group - Oprah fame isn't necessarily what it's cracked up to be, (3) Self-aggrandizement IS the business per Halbert."
    source: "business-of-copywriting"
    tags: [positioning, visibility, marketing, client-attraction]
  - id: "FW-DK-754"
    title: "Agreements Process Framework - paper trail everything based on EST model"
    content: "The agreements process with the client needs to be paper-trailed, not just said. Correspondence and contracts. When they start to deviate, you get to play fair: 'wait a minute, here's what we agreed to.' Can't fix bad behavior that wasn't discussed to begin with. It's not even fair to try."
    source: "business-of-copywriting"
    tags: [client-management, contracts, agreements, expectations]
  - id: "FW-DK-755"
    title: "Copywriter Strategic Focus - message media market strategy as four-pillar approach"
    content: "You are always best served by bringing to the table a new context, a new strategic context in which you deliver copy. If all you focus on is the copy against a good control, the odds are you lose. I never beat a Halbert control trying to beat copy. But I can beat any control by changing strategy."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, consulting, strategy-vs-copy, beat-the-control]
  - id: "FW-DK-756"
    title: "Ghost Writing Business Model - book as disguised sales letter with ego attachment"
    content: "What we bring to ghost writing that normal writers don't: the book should be a disguised sales letter, not just a book. There's ego and pleasure reasons to buy, not just business. Co-authored anthology books are the stepping stone. Most clients who hire you already bought one of those first."
    source: "business-of-copywriting"
    tags: [ghostwriting, special-opportunities, books, client-attraction]
  - id: "FW-DK-757"
    title: "Takeaway Selling in Proposals - tell them no then let them convince you"
    content: "Tell them there's no way to have a short notice day. Take it away further with a potential conflict of interest. Lay down the fee plus extras. Tell them you won't have time for copywriting assignments. Offer to refer elsewhere. What happens: they try to kill you to get the assignment. Fee resistance is non-existent."
    source: "business-of-copywriting"
    tags: [pricing, takeaway-selling, posture, fee-resistance]
  - id: "FW-DK-758"
    title: "Open Webinar Structure - 12-step sales presentation for online events"
    content: "Structure: (1) Personal endorsement of host, (2) Tease reasons to stay, (3) Establish authority, (4) Specific relevance to audience, (5) Over-arching promise, (6) Begin explanation, (7) Reveal contrarian fact, (8) Gain agreement to premise, (9) Separate winners and losers, (10) Present offer and price, (11) Add bonuses, (12) Three calls to action with social proof between each."
    source: "business-of-copywriting"
    tags: [webinars, sales-presentations, online-marketing, special-opportunities]

  # --- IWW (Influential Writing Workshop) CD05-08 ---
- id: "FW-DK-769"
    title: "Parallel Social Universe Construction"
    content: >
            Create a parallel social universe with its own: (1) Rituals — prescribed daily
      behaviors that reinforce your brand (parking backwards, green flair pens, sleep learning
      tapes), (2) Relationship structures — group dynamics and hierarchy, (3) Experiences —
      unique to your world that outsiders don't share. Goal: omnipresence in their daily life.
    source: "IWW-CD05-T01"
    domain: "cult-building"

  - id: "FW-DK-770"
    title: "Place Transportation Strategy"
    content: >
            Moving your place INTO their place through: (1) Physical objects — apparel, mouse
      pads, posters, notebooks, (2) Daily rituals — morning reading, specific tools, (3)
      Bookend anchoring — first thing in morning (required reading) and last thing at night
      (sleep learning tape). 'You want to move your place to them.'
    source: "IWW-CD05-T01"
    domain: "cult-building"

  - id: "FW-DK-771"
    title: "Coded Communication System for Insider/Outsider Dynamics"
    content: >
            Create proprietary language that: (1) Only insiders understand fully, (2) Outsiders
      hear and want decoded — creates curiosity and desire to belong, (3) Functions as the
      'secret handshake' — makes members feel special, (4) Reinforces community identity every
      time it's used. 'There ought to be some language that only makes sense to us that
      outsiders don't get.'
    source: "IWW-CD05-T01"
    domain: "cult-building"

  - id: "FW-DK-772"
    title: "Place Construction Exercise"
    content: >
            Answer these questions for your business: (1) How do they perceive what's on your
      side of the wall? (2) What is it like being over there vs over here? (3) How do you make
      it feel like a physical environment even though it's a book, course, or email? (4) How
      are you creating place in your business?
    source: "IWW-CD05-T02"
    domain: "influence"

  - id: "FW-DK-773"
    title: "Place Selling Through Emotional Connection"
    content: >
            For businesses selling intangibles or non-sexy products (like Iowa real estate):
      (1) Identify the emotional connection the buyer has (roots, values, nostalgia), (2)
      Create romance around the place (small town, main street, flags on porches), (3)
      Newsletter should be 'less fact figure stuff and more about what's going on at the Iowa
      State Fair,' (4) Use visuals and symbolism — pencil sketches, not photographs, cracker
      barrel themes. 'You're really selling values. That's what you're selling, a profound
      value connection.'
    source: "IWW-CD05-T03"
    domain: "marketing"

  - id: "FW-DK-774"
    title: "High Concept Principle"
    content: >
            You need an umbrella idea under which you operate that: (1) Is easy to understand —
      concise, clever, telegraphic, (2) Has legs — can last for some time, (3) Gives room
      underneath for multiple activities, (4) Has meaning when heard and seen, (5) Preferably
      benefit-based. Examples: Disney's 'Happiest Place on Earth,' 'Zero Resistance,' 'Renegade
      Millionaire,' 'Lead the Field.' 'It encompasses sort of traditional thought about brand,
      but it's really more than brand.'
    source: "IWW-CD05-T03"
    domain: "marketing"

  - id: "FW-DK-775"
    title: "Emotional Mini-Bio Profiling Tool"
    content: >
            Build a profile that includes: (1) Philosophy about life, money, politics, time,
      (2) How they arrive at trust, (3) How they accept authority, (4) Their underlying fears
      (secret fears vs public statements), (5) What they value most (family, reputation,
      recognition), (6) Their day-to-day existence, (7) Their experiential profile. 'If you
      could follow your typical customer around for a month, live in their house, overhear
      their conversations, you would view that customer very differently.'
    source: "IWW-CD05-T04"
    domain: "marketing"

  - id: "FW-DK-776"
    title: "Principle of Multiplicity"
    content: >
            Different people buy for different reasons. Your choices: (1) Segment them (married
      vs single, etc.) and communicate differently to each, (2) Or touch EVERY base in priority
      order for the majority. Identify every possible reason why someone would buy, then
      identify the VALUE behind each reason (the real emotional motivator). Build a checklist
      to check against every piece of writing.
    source: "IWW-CD05-T06"
    domain: "marketing"

  - id: "FW-DK-777"
    title: "Principle of Self-Identification (Rope In + Deny Negatives)"
    content: >
            Two approaches to make the reader identify they're in the right place: (1) ROPE
      THEM IN — 'If you're like me, [description].' If they nod their head, you've got them.
      (2) DENY NEGATIVES — 'This is not for everybody. You really have to be a serious student.
      You have to have big goals, not small goals.' Nobody wants to admit they're
      lazy/stupid/cheap, so they deny it and move closer to you.
    source: "IWW-CD05-T07"
    domain: "copywriting"

  - id: "FW-DK-778"
    title: "Principle of Transparency — Trot Out The Elephants"
    content: >
            'My preference is always not to have skeletons in the closet. When flaws drip out
      over time, they do untold amounts of damage. When they're all put out ahead of time, they
      often do no damage at all.' The framework: (1) Identify all the bad stuff, (2) Put it ALL
      on the table at once, (3) Have one really bad week and move on, (4) Recapture control of
      the conversation. 'You could just as easily put all ten of them things on the table to
      start with.'
    source: "IWW-CD06-T01"
    domain: "persuasion"

  - id: "FW-DK-779"
    title: "Reassurance-Proof Format for Overcoming Beliefs"
    content: >
            When you must contradict what they believe (e.g., 'I need money to start'): Format
      = REASSURANCE STATEMENT + PROOF + REASSURANCE STATEMENT + PROOF. Example from Cossman:
      'Do not be concerned if you think you're undercapitalized. The mail order business is the
      one business where money is secondary.' Then proof. Repeat pattern.
    source: "IWW-CD06-T01"
    domain: "copywriting"

  - id: "FW-DK-780"
    title: "Status Demonstration Multi-Channel System"
    content: >
            Constantly demonstrate your status through multiple channels: (1) Display personal
      affluence (cars, homes, horses), (2) Show your packed consulting schedule (Cobain model —
      schedule so full there's no room), (3) Tell them how brilliant you are, (4) Tell them you
      possess secrets they don't have, (5) Tell them about the line of people waiting to give
      you money, (6) Use testimonials of others declaring your status. 'Not doing that is a
      mistake. And big mistake is not to do it a lot.'
    source: "IWW-CD06-T03"
    domain: "personal-branding"

  - id: "FW-DK-781"
    title: "Principle of Unique Importance"
    content: >
            Take whatever you do and make it of MUCH GREATER epic importance than it actually
      is: (1) Use Barnum-like proclamations, (2) Create proprietary language, (3) Don't be
      afraid to declare your thing THE thing of all things, (4) Don't pull punches — declare it
      unique even if intellectually you know it isn't. Examples: 'Greatest Show On Earth,'
      'Happiest Place On Earth,' Trump declaring everything the greatest/biggest/highest.
    source: "IWW-CD06-T04"
    domain: "marketing"

  - id: "FW-DK-782"
    title: "Proof Principle — Beyond Testimonials"
    content: >
            Key proof elements beyond testimonials: (1) NAME DROPPING AND ASSOCIATION —
      surround yourself with prominent/credible/celebrity people, (2) WHO TAKES YOU SERIOUSLY —
      if an influential person endorses you, amplify it, (3) STUNTS — Bob Allen
      homeless-to-homeowner challenge, publicity stunts, (4) CREDENTIALS — media appearances,
      publications. 'You demonstrate to people that you are influential by surrounding yourself
      with influential people.'
    source: "IWW-CD06-T05"
    domain: "personal-branding"

  - id: "FW-DK-783"
    title: "Principle of Relevance — Micro-Audience Tailoring"
    content: >
            When writing to a specific audience: (1) Scour all your client/speaker backgrounds
      for anything relevant to THAT audience, (2) Omit everything that doesn't directly connect
      to them, (3) Dentist-ize, restaurant-ize — change every bullet to their world, (4)
      Reorder name-dropping by who THEIR audience recognizes first, (5) Create bridges from
      non-relevant credentials to their world. 'The only thing a restaurant owner thinks about
      is restaurants.'
    source: "IWW-CD06-T06"
    domain: "copywriting"

  - id: "FW-DK-784"
    title: "Principle of Welcome Prophet Status"
    content: >
            'Most of what is profitable for us to do in writing to influence people is not
      change their minds, but instead give them what they want — appear as the prophet they
      hoped would appear, not as the prophet they don't want.' Unwelcome advice is a losing
      proposition in sales. People will shop for advice they like until they find someone
      giving it.
    source: "IWW-CD06-T07"
    domain: "influence"

  - id: "FW-DK-785"
    title: "Pre-Communication Outcome Design"
    content: >
            Before writing ANY communication, answer: (1) What do I want them to KNOW? (2) How
      do I want them to FEEL? (3) What response do I want to evoke? Then construct it to
      achieve those outcomes. 'Most people don't give thought to what do we want to have
      happen. We just sat down and wrote.'
    source: "IWW-CD06-T08"
    domain: "copywriting"

  - id: "FW-DK-786"
    title: "Newsletter Emotional Objectives Checklist"
    content: >
            Desired feelings from each newsletter: (1) They're in a continuing
      relationship/conversation, (2) You like them, care about them, understand them, (3)
      They're part of something, (4) There's great value here, (5) If they're not getting
      results, it's THEIR fault (reinforced by success examples), (6) Desire to succeed in THIS
      place, (7) Anxiety about disconnecting, (8) Pride in themselves, (9) Motivation and
      optimism.
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "FW-DK-787"
    title: "NSA False Success Architecture"
    content: >
            NSA created a world where success is completely disconnected from real world
      outcomes: (1) Year joined listed next to every name (longevity = success), (2) Awards not
      tied to income (Certified Speaking Professional based on number of speeches, not money),
      (3) You're penalized if same client invites you back. People strive for these false
      measures 'as if it was' real success. Transferable to any membership environment.
    source: "IWW-CD07-T02"
    domain: "cult-building"

  - id: "FW-DK-788"
    title: "Word Choice Enhancement Checklist"
    content: >
            For any word/description, run through these options: (1) The cliche, (2) The
      obvious extension, (3) Literal description, (4) Odd description, (5) Extremely poetic
      description, (6) Make them stop and think, (7) Cultural reference, (8) Political
      reference, (9) Make it funny, (10) Take enormous risk. Build an 'advanced thesaurus' for
      keywords you use frequently.
    source: "IWW-CD07-T03"
    domain: "copywriting"

  - id: "FW-DK-789"
    title: "Principle of the Unimportant Detail"
    content: >
            'You can give two people the same joke and one of them can get laughs and the other
      one doesn't.' The three things that affect this: (1) Confidence of delivery (expect it to
      be funny), (2) Pace, (3) The details you put into it. In writing, the little details make
      all the difference. Never leave 'he was wearing a blue shirt' alone — always ask 'what
      can we say about this person that makes it more meaningful?'
    source: "IWW-CD07-T04"
    domain: "storytelling"

  - id: "FW-DK-790"
    title: "Selling On Values and Aspirations Framework"
    content: >
            Three levels of why people buy: (1) Features/Benefits level (seminar speakers,
      content), (2) Fraternal/Social level (seeing people, belonging), (3) ASPIRATIONAL level
      (wanting to be perceived a certain way, feel about themselves, be like the people there).
      'When you get at the aspirational value, price goes away.' Connect to their hopefulness —
      despite pessimistic words, behavior proves they're optimists (lottery tickets, third
      marriages).
    source: "IWW-CD07-T05"
    domain: "persuasion"

  - id: "FW-DK-791"
    title: "Principle of The Big Entrance"
    content: >
            'Every piece of writing is best served by your big entrance. We sometimes take the
      attention of people we communicate with all the time for granted. It's a bad
      presumption.' Apply the headline test to opening lines: take the opening sentence away
      from everything else — on a page by itself — what response does it evoke? Examples from
      fiction: 'Mary had loved the family axe as a glittering extension of her own arm.'
    source: "IWW-CD08-T01"
    domain: "copywriting"

  - id: "FW-DK-792"
    title: "Principle of Welcome Prophet — Two Exercises"
    content: >
            For your business, answer: (1) What do people believe IN GENERAL that you can show
      up and agree with to influence them? (2) What do the people you seek to influence believe
      SPECIFICALLY that you can show up and agree with them about? 'We're looking for how you
      get to be a welcomed prophet rather than an unwelcomed prophet.'
    source: "IWW-CD08-T02"
    domain: "influence"

  - id: "FW-DK-793"
    title: "Weekly Fax Communication Audit"
    content: >
            When reviewing a communication piece, evaluate: (1) What do you want them to KNOW?
      (2) How do you want them to FEEL? (3) Does the actual copy achieve both objectives?
      Example: 'It's finally here, new addition' touches the first objective but misses 'we
      killed ourselves for them.' Needs: 'After 412 months of arduous labor, having spent
      $612,000 of capital on your behalf...'
    source: "IWW-CD08-T02"
    domain: "copywriting"

  - id: "FW-DK-794"
    title: "Source Quality Determines Business Quality"
    content: >
            'Source is extremely important. From a quality of customer standpoint, from an
      ability to sell to them standpoint, from a retention standpoint — most of the problems in
      our businesses have as much to do with source as they have to do with anything else.'
      Taking low hanging fruit (broke people) = best short term, worst long term approach. 'If
      your entire customer base was made up of [stable business owners], when the market
      downturn hit, you would be less affected.'
    source: "IWW-CD08-T05"
    domain: "business-strategy"

  - id: "FW-DK-795"
    title: "Harvard Classics Aspirational Selling Discovery"
    content: >
            The Harvard Classics 'five-foot shelf' — originally selling books of knowledge,
      then discovered the aspirational angle: owning and displaying these books symbolizes
      being educated, cultured, successful. 'Pretty much a happy accident that then changed the
      way they advertised the books for evermore, tying in with aspirations.'
    source: "IWW-CD08-T06"
    domain: "copywriting"

  - id: "FW-DK-796"
    title: "Principle of the Big Entrance — Opening Line Workshop"
    content: >
            Process for crafting big entrances: (1) Write your opening, (2) Isolate it from
      everything else, (3) Ask: on a page by itself, what response does it evoke? (4) What
      response do you WANT it to evoke? (5) Apply the headline test — would anyone respond to
      this alone? (6) Review openings of each chapter/section, not just the start. Every
      classic that endures (Hill, Maltz, Carnegie, Peale) uses self-identification devices in
      their early pages AND at beginnings of chapters.
    source: "IWW-CD08-T07"
    domain: "copywriting"


# --- IWW CD01-04 L4_FRAMEWORKS ---
  - id: "FW-DK-797"
    title: "31 Principles Of Influential Writing"
    content: >
      Thirty-one principles and strategies that comprise a checklist
      for influential writing. Everything you do in print, the more
      of the 31 it hits the better. Includes fascination, personal
      narrative, point of view, legend, prevention, mental imprint,
      frame of reference, organization, purpose, multi-purposing,
      formula, consistency, place, and transparency among others.
    source: "IWW-CD01-T02"
    domain: "influence"

  - id: "FW-DK-798"
    title: "Personal Narrative Construction Framework"
    content: >
      Build personal narrative in layers: 1) Heritage checklist —
      mining family background and childhood, 2) Personal narrative
      asset list — catalog all life experiences including negative
      ones, 3) Label each story with a fascinating headline,
      4) Determine purpose for each story, 5) Test with trusted
      group to discover stories you dont know you have.
    source: "IWW-CD02-T02"
    domain: "personal-branding"

  - id: "FW-DK-799"
    title: "Philosophy Statement Framework For Influence Topics"
    content: >
      Develop concise statements of profound core belief on eight
      key topics: money, business, success, sales, time, religion
      or spirituality, politics, health and fitness. Each statement
      must have no wiggle room. These positions color everything
      you write and become the foundation for values-based
      connection with your audience.
    source: "IWW-CD02-T06"
    domain: "influence"

  - id: "FW-DK-800"
    title: "Legend Building Framework — Simple Memorable Repeatable"
    content: >
      Build your legend to be: 1) Simple enough for people to
      grasp and remember, 2) Memorable enough they can repeat it
      to others, 3) Based on one or two core elements that precede
      you. Nobody memorizes biographies. They get the capsule you
      create. Use the Wyatt Earp principle — law man plus fastest
      gun was enough even though both were largely false.
    source: "IWW-CD03-T02"
    domain: "personal-branding"

  - id: "FW-DK-801"
    title: "Prevention Principle Framework — What Not To Be Known For"
    content: >
      Prevention principle framework: 1) Identify what you do NOT
      want to be known for, 2) Preemptively act in all communications
      to prevent it, 3) If negative perception surfaces, aggressively
      address it directly to your customers, 4) Add it to your
      ongoing writing checklist. Kennedy prevents speaker or
      motivational speaker label by constantly reinforcing serial
      entrepreneur in the trenches.
    source: "IWW-CD03-T03"
    domain: "personal-branding"

  - id: "FW-DK-802"
    title: "Story Purpose Catalog — 12 Purposes Every Story Should Serve"
    content: >
      Twelve purposes for cataloging stories: 1) Explain yourself
      — who you are, 2) Gain authority — why listen to you,
      3) Compress time — quickly establish backstory, 4) Convey
      empathy — you and I are alike, 5) United enemy — common
      foe, 6) Make yourself human — personal flaws, 7) Present
      inconvenient truth, 8) Present philosophy, 9) Teach or
      glorify a value, 10) Link to buying, 11) Get conformance
      to needed behavior, 12) Shame or guilt into action.
    source: "IWW-CD04-T02"
    domain: "storytelling"

  - id: "FW-DK-803"
    title: "Multi-Purposing Framework — Same Story Different Points"
    content: >
      Same story can be used to make many different points. The
      Kenneth Cole story used three ways: do whatever it takes,
      never take first no for an answer, and creative problem
      solving. Slightly different ways to tell the same story can
      get you to a different point. Only constraint: the different
      uses must not contradict each other.
    source: "IWW-CD04-T04"
    domain: "storytelling"

  - id: "FW-DK-804"
    title: "Story Organization System — File Cabinet For Speed"
    content: >
      Organize stories by: 1) Event category — conflict, adversity,
      discovery, mentor, 2) Chronology — when they happened,
      3) Purpose — what point they make, 4) Values achieved —
      transformation, idea, behavior, benefit. Cross-file stories
      in multiple categories. Include magazine articles and book
      pages. The pre-built bank eliminates hunting time and
      ensures consistency.
    source: "IWW-CD04-T01"
    domain: "copywriting"

  - id: "FW-DK-805"
    title: "Point Of View Dual Framework — What You Are Plus What You Stand For"
    content: >
      Point of view has two parts: 1) What you are — choose a
      primary category people can pigeonhole you in: observer,
      radical system, prophet, specialist expert, 2) What you
      stand for — your philosophical positions on key topics.
      Acquisition position may differ from retention position
      but primary must be clear and consistent.
    source: "IWW-CD02-T05"
    domain: "personal-branding"

  - id: "FW-DK-806"
    title: "Hefner Model — Philosophy Plus Place Plus Character"
    content: >
      Hefner brilliantly created influence through three integrated
      elements: 1) A stated philosophy — the Playboy Philosophy
      enunciated over many magazine installments, 2) A place —
      both physical mansion and metaphorical lifestyle that men
      desperately wanted to enter, 3) A fictional character — he
      starred in the movie of his own life with quirky affectations
      like the pipe chosen by design.
    source: "IWW-CD02-T06"
    domain: "personal-branding"

  - id: "FW-DK-807"
    title: "Workshop Resource Building vs Busywork"
    content: >
      Workshops should be build-a-bear exercises where participants
      create resources they take home and use, not traditional
      busywork exercises. Exercises should produce personal asset
      lists, story inventories, philosophy statements, and purpose
      catalogs. The outcome should have value after they leave
      the room. Swap groups between exercises for diverse input.
    source: "IWW-CD01-T02"
    domain: "business-strategy"


# --- IWW CD09-13 L4_FRAMEWORKS ---

  - id: "FW-DK-808"
    title: "Newsletter Content Strategy Framework"
    content: >
      Framework for newsletter content management: (1) Rate promotions
      in order of importance — top tier events get precedence. (2) Map
      second-tier promotions to clearer months. (3) Place third-tier
      product promotions in remaining openings. (4) Integrate everything
      deliberately — even months with no offer are strategic breathers.
      (5) Keep content as current as possible for timeliness.
    source: "IWW-CD09-T02"
    domain: "newsletter"

  - id: "FW-DK-809"
    title: "Material Accumulation And Book Writing Framework"
    content: >
      Step 1: Start five to six cardboard boxes labeled by topic. Throw
      material in as you get it. Step 2: Have assistant pull all old
      newsletters, faxes, books for anything relevant — one disc, printed.
      Step 3: Write an hour each morning, accumulating disconnected hunks.
      Step 4: When enough material exists, write first draft from the boxes.
      Step 5: Second draft with checklist — reorder, find missing stories.
    source: "IWW-CD10-T04"
    domain: "copywriting"

  - id: "FW-DK-810"
    title: "Story Templating Framework"
    content: >
      Great stories are templatable. Keep the template structure and change
      the specifics. Napoleon Hill's persistence story, Zig's close-no-
      matter-what story, Jim Rohn's Girl Scout at the Door story — each is
      a template. Take details out, stick in your own. Types: origin story,
      turning point story, transparency story, tale of two sides, mentor
      story, attributed story, nearly-true embellished story.
    source: "IWW-CD10-T01"
    domain: "storytelling"

  - id: "FW-DK-811"
    title: "Humorous Storytelling Development Framework"
    content: >
      Step 1: Start with canned jokes from joke books. Step 2: Move to
      making the joke your own. Step 3: Ultimately tell stories uniquely
      yours. For timing: tell new stories 8-12 times to different people
      experimenting with details. Study Carson for timing. Study Charlie
      Jarvis for the bird story timing. Study Woody Allen for print humor.
      80 percent of being funny on stage is timing, not content.
    source: "IWW-CD10-T05"
    domain: "storytelling"

  - id: "FW-DK-812"
    title: "Copywriting Skill Building Framework (Halbert Method)"
    content: >
      Step 1: Recopy successful ads by hand to ingrain rhythm into the
      subconscious. Step 2: Dissect ads into pieces on file cards — a
      paragraph here, a starter phrase there. Step 3: Rewrite the ad
      trying to make it better. Do this for 100 ads minimum over one
      year. Direct response copy is about rhythm, and rhythm comes from
      this kind of repetitive training.
    source: "IWW-CD10-T05"
    domain: "copywriting"

  - id: "FW-DK-813"
    title: "Niche Splintering Framework"
    content: >
      Step 1: Identify your top one to two niches by revenue. Step 2:
      Create a parallel business for each niche with customized wrapper.
      Step 3: Tweak language, testimonials, and stories to be niche-
      specific. Step 4: The product can be identical underneath. Step 5:
      Change title, cover, and industry references. Step 6: Price up
      because specialized perception allows higher pricing.
    source: "IWW-CD11-T04"
    domain: "marketing"

  - id: "FW-DK-814"
    title: "Catalog Average Order Optimization Framework"
    content: >
      Three-prong approach: (1) Create tiered gift incentives at three
      price benchmarks above current average order — this makes buyers
      search for additional items. (2) Create named bundles of related
      items at or slightly above each benchmark. (3) Include both a
      bound-in order form and a loose insert order form. Optional:
      include reply envelope for older demographics.
    source: "IWW-CD11-T03"
    domain: "marketing"

  - id: "FW-DK-815"
    title: "Influential Newsletter Checklist Application Framework"
    content: >
      For each communication piece, define its purpose first. Map out
      what it is supposed to accomplish from a list of 31 influence
      elements. Ensure consistency issue to issue — do not hit some bases
      one month and none the next. Use the checklist proactively before
      writing, not retroactively after. Include: story, self-aggrandizement,
      member recognition, teaching, current events, takeaway.
    source: "IWW-CD11-T03"
    domain: "newsletter"

  - id: "FW-DK-816"
    title: "Ad Testing In Niche Markets Framework"
    content: >
      Step 1: Customize headline and copy to reference the specific niche
      with their language, pain points, and known competitors. Step 2:
      Test with direct mail or email to a website for initial pulse — low
      cost. Step 3: If indicative results are positive, move to small
      ad in the top niche publication, big enough to be in main editorial
      section. Step 4: Full-page ad in the best magazine for definitive test.
    source: "IWW-CD13-T01"
    domain: "marketing"

  - id: "FW-DK-817"
    title: "Origin Story Construction Framework"
    content: >
      Essential elements: (1) Where you came from — the mundane or
      difficult beginnings. (2) The transformation moment — what changed
      everything. (3) The mission that emerged — why you do what you do
      beyond money. (4) Points of connection — details people can relate
      to personally. (5) Tell it in multiple lengths — thirty-second,
      five-minute, and full versions. Make the hero relatable, not perfect.
    source: "IWW-CD12-T04"
    domain: "storytelling"

  - id: "FW-DK-818"
    title: "Writing Purpose Definition Framework"
    content: >
      Before writing any piece: (1) Define what it is supposed to
      accomplish — retention, sale, positioning, education. (2) Map
      which elements from the 31-point checklist to include. (3) Decide
      what response to evoke. (4) Reverse-engineer from the desired
      response back to the story and content. Writing without a defined
      purpose is an expression of feeling without strategic value.
    source: "IWW-CD13-T01"
    domain: "copywriting"

  - id: "FW-DK-819"
    title: "Communication Frequency Escalation Framework"
    content: >
      Different media for different relationship levels: weekly fax for
      committed members — can be chiding and behavioral. Email series
      for non-members — must be gentle and topical. Monthly newsletter
      for the broad base — mix of personal and teaching. Tele-seminars
      for front-end prospects — interject personal stories. Match the
      intensity of message to the depth of relationship.
    source: "IWW-CD12-T03"
    domain: "marketing"

# ======================================================================
# L5_METHODOLOGIES — 351 elements
# ======================================================================
L5_METHODOLOGIES:
  - id: "MET-DK-001"
    title: "Complete Copy Creation Process"
    source: "01A-06B"
    steps:
      - "1. Deep customer avatar research (drain brain, crystallize ONE person)"
      - "2. Market immersion (read/watch/listen to their world)"
      - "3. Collect testimonials (absorb customer language)"
      - "4. Write headline by formula (spend DAYS on this)"
      - "5. Build rapport section first"
      - "6. Pain → pleasure sequence"
      - "7. Word pictures and involvement devices"
      - "8. Internal repetition (3-6x)"
      - "9. Objection draining"
      - "10. Irresistible offer"
      - "11. Urgency with real reason"
      - "12. Summation/recap"
      - "13. Self-check against formula list"
      - "14. Let 5-6 prospects read, observe if they ask to buy"

  - id: "MET-DK-002"
    title: "Headline Writing Methodology"
    source: "01A, 01B"
    steps:
      - "1. Go to formula bank (Schwab's 100 + tabloid formulas)"
      - "2. Write 20-50 variations using formulas"
      - "3. Apply Classified Ad Test (would it work as standalone classified?)"
      - "4. Apply 'Read Next Sentence' Test"
      - "5. Check: is it specific? Believable? Compelling?"
      - "6. Remove cleverness that doesn't advance the sale"
      - "7. Test the winner against 2nd best (split test)"

  - id: "MET-DK-003"
    title: "Customer Avatar Construction"
    source: "02A"
    steps:
      - "1. List: homes, neighborhoods, magazines, TV, schedule, shopping, income"
      - "2. List: fears, dreams, daily frustrations, kitchen table conversations at 2am"
      - "3. Find ONE real person who represents the list"
      - "4. Write TO that specific person (not 'the market')"
      - "5. If you don't know the market: immerse for weeks (read, watch, visit stores, tape shows)"

  - id: "MET-DK-004"
    title: "Lead Gen Inversion System"
    source: "03A"
    steps:
      - "1. Replace image ad with copy-intensive 'warning' ad"
      - "2. No easy coupon — force them to read to know how to respond"
      - "3. Send 16-page sales letter to responders"
      - "4. Include video request form (mail/fax/call)"
      - "5. Decision-maker now calls YOU — asks 5 questions — buys same call"

  - id: "MET-DK-005"
    title: "Fear-of-Loss Sales Methodology"
    source: "03A, 03B"
    steps:
      - "1. Open with vivid description of current pain (blizzard, commute, stress)"
      - "2. Invalidate their current solution (job security is illusion)"
      - "3. Amplify consequences of NOT acting"
      - "4. Transition to pleasurable alternative"
      - "5. Present irresistible offer"
      - "6. Add urgency with real deadline"

  - id: "MET-DK-006"
    title: "Objection Draining Methodology"
    source: "05A"
    steps:
      - "1. List ALL reasons someone would NOT buy (5-8 typical)"
      - "2. Enumerate them: 'Reason Not to Buy #1..."
      - "3. Answer each one thoroughly"
      - "4. Close: 'Now that we've answered all those reasons..."
      - "5. Alternative: 'Read this only if you've decided to say NO' fold-over"

  - id: "MET-DK-007"
    title: "Word Picture Creation"
    source: "04A"
    steps:
      - "1. Identify the experience the product delivers"
      - "2. Put the reader IN the scene (you're sitting at the blackjack table...)"
      - "3. Add sensory details (sunset, holding hands, camera clicking)"
      - "4. Include ACTION element (you're using it, not just seeing it)"
      - "5. Link back to the offer"

  - id: "MET-DK-008"
    title: "Guarantee Optimization"
    source: "05A"
    steps:
      - "1. Minimum 90 days, ideally 1 year"
      - "2. Word it as OUTCOME, not policy ('if friends don't accuse you of facelift')"
      - "3. Make it generous: refund EVERYTHING including shipping"
      - "4. Add usage requirement for long guarantees"
      - "5. Monitor returns by percentage, not individual stories"
      - "6. Under 8% = don't investigate. Over 8% = ask 6 million questions"

  - id: "MET-DK-009"
    title: "Copy Editing Process"
    source: "06A"
    steps:
      - "1. Let it sit (lake hold)"
      - "2. First edit: effectiveness (cut what doesn't contribute to the sale)"
      - "3. Second edit: space limitation (if imposed)"
      - "4. Self-check against formula list"
      - "5. 5-6 prospect reads (look for purchase intent, not opinions)"
      - "6. Peer review (2-3 trusted copywriters only)"

  - id: "MET-DK-010"
    title: "USP Discovery via Opportunity Gap"
    source: "01B"
    steps:
      - "1. List everything competitors do"
      - "2. Identify the ONE thing they ALL do badly"
      - "3. Focus your entire USP on solving that one thing"
      - "4. Sacrifice other claims if needed (Domino's says nothing about taste)"
      - "5. State it concisely and memorably"

  - id: "MET-DK-011"
    title: "Swipe File Methodology"
    source: "01A, 04B"
    steps:
      - "1. Organize by category (beauty, diet, sex, money, health)"
      - "2. Read tabloids weekly — clip 2-3 per issue"
      - "3. Read opportunity magazines monthly"
      - "4. Watch Leno monologue for humor formulas"
      - "5. Study Victor Schwab's 100 headlines"
      - "6. Keep Esar's Comic Encyclopedia for humor structures"

  - id: "MET-DK-012"
    title: "Insider Language Strategy"
    source: "04B"
    steps:
      - "1. Coin unique terms for your concepts"
      - "2. Use them consistently in all materials"
      - "3. Members/insiders use the language casually"
      - "4. Outsiders at events hear language they can't decipher"
      - "5. Desire to join and learn 'the code' drives action"

  - id: "MET-DK-013"
    title: "Story-Based Copy Structure"
    source: "03B, 04A"
    steps:
      - "1. Choose position: first person or third person"
      - "2. Weave story throughout entire piece (never stops)"
      - "3. Embed sales points within the narrative"
      - "4. Use real details (even embellished) for believability"
      - "5. Include relatable 'before' moments"
      - "6. Maintain conversational tone throughout"

  - id: "MET-DK-014"
    title: "Summation Close"
    source: "05B"
    steps:
      - "1. Create summary box or final paragraph"
      - "2. Recap: what they get, for how much, with what guarantee"
      - "3. Fit it in 2-3 sentences max"
      - "4. Make it work for people who skip to the end"
      - "5. Can double as PS in sales letters"

  - id: "MET-DK-015"
    title: "Multi-Step Niche Mailing Sequence"
    source: "02A"
    steps:
      - "1. First mailing: full pitch + self-credentials"
      - "2. Second follow-up: reinforce + new angle"
      - "3. Third: trickle/last-chance"
      - "4. Expected: $20/member in revenue per sequence"
      - "5. Repeat 2-3x per year indefinitely"

  - id: "MET-DK-016"
    title: "Irresistible Offer Construction"
    source: "05B"
    steps:
      - "1. Start with core offer (product + price)"
      - "2. Add bonuses with real perceived value"
      - "3. Add guarantee (outcome-worded)"
      - "4. Add urgency (real deadline + real reason)"
      - "5. Add penalty for delay (price increase, bonus removal)"
      - "6. Apply Snowstorm Test: would they drive through blizzard for this?"

  - id: "MET-DK-017"
    title: "Testimonial Collection for Copy"
    source: "02A, 03B"
    steps:
      - "1. Interview 30-40 customers over 2 days"
      - "2. After 10, pattern emerges — formulaic customer profile"
      - "3. Use exact language and stories in copy"
      - "4. Mix big and small success stories"
      - "5. Match testimonial demographics to target prospect"

  - id: "MET-DK-018"
    title: "Emotion Injection for B2B"
    source: "03A"
    steps:
      - "1. Start with corporate/logical benefits (required)"
      - "2. ADD personal pain of the decision-maker"
      - "3. The ulcer, the Wednesday headaches, the ruined golf game"
      - "4. Talk to his stomach, his head, his weekend"
      - "5. Give logical justification for emotional decision"

  - id: "MET-DK-019"
    title: "Sales Letter for Niche Market"
    source: "02A, 05B"
    steps:
      - "1. Self-credentials section (who you are, why listen)"
      - "2. Rapport through insider knowledge"
      - "3. Pain identification specific to their world"
      - "4. Solution presentation"
      - "5. Word pictures of outcome"
      - "6. Testimonials from peers"
      - "7. Offer with guarantee"
      - "8. Urgency"
      - "9. Summary/PS"

  - id: "MET-DK-020"
    title: "Blue Collar Market Writing Protocol"
    source: "02A"
    steps:
      - "1. Watch Married with Children, Roseanne, Grace Under Fire"
      - "2. Spend hours in Kmart watching behavior"
      - "3. Use simple language, no jargon"
      - "4. Lead with relatable pain (commute, boss, bills)"
      - "5. Use 'Al Bundy' as avatar"

  - id: "MET-DK-021"
    title: "Infomercial Structure"
    source: "04A, 05B"
    steps:
      - "1. Three 7.5-minute show segments"
      - "2. Hook together with 2-minute commercial spots"
      - "3. Show = wrapper to keep them watching"
      - "4. Commercial = the actual sale (most important part)"
      - "5. Write commercial FIRST, show second"

  - id: "MET-DK-022"
    title: "Split Testing Protocol"
    source: "02A"
    steps:
      - "1. Write your version"
      - "2. Get alternative version (client, colleague)"
      - "3. Test both — don't pre-judge"
      - "4. Ego aside: sometimes 'wrong' version wins"
      - "5. Winner becomes new control"

  - id: "MET-DK-023"
    title: "Involvement Device Deployment"
    source: "04A"
    steps:
      - "1. Place quiz/checklist early (after rapport)"
      - "2. 'Ask yourself these 5 questions"
      - "3. 'If you answer yes to 3+, read on"
      - "4. Sprinkle yes-questions throughout copy"
      - "5. End with commitment question before close"

  - id: "MET-DK-024"
    title: "Copywriting Humor Integration"
    source: "04B"
    steps:
      - "1. Study: Esar's Comic Dictionary, Herb True, Ben Cerv"
      - "2. Watch Leno monologue for usable material"
      - "3. Build humor swipe file"
      - "4. Use humor to diffuse sales tension"
      - "5. Never be funny for funny's sake — must advance the sale"

  - id: "MET-DK-025"
    title: "Proprietary Term Coinage"
    source: "04B"
    steps:
      - "1. Identify your core concept/method"
      - "2. Create jazzy, intriguing name for it"
      - "3. Use it consistently as bullet point ('The amazing triple hoop advertising secret')"
      - "4. People call asking 'what IS that?"
      - "5. Creates mystique and desire to learn more"

  - id: "MET-DK-026"
    title: "Hype Boundary Navigation"
    source: "04B"
    steps:
      - "1. Identify the legally permissible boundary"
      - "2. Make it as large-as-life as possible WITHOUT crossing"
      - "3. If hotel is 1.5 miles from beach: sell 'magnificent view from balcony"
      - "4. Never explicitly lie — reframe to legal maximum"

  - id: "MET-DK-027"
    title: "PS/Fold-Over Strategy"
    source: "05A, 05B"
    steps:
      - "1. PS = most-read part after headline"
      - "2. Use for summary, final push, or bonus offer"
      - "3. 'Read this only if you've decided to say NO' fold-over"
      - "4. Inside: last-chance objection handling"

  - id: "MET-DK-028"
    title: "Copy Self-Audit Checklist"
    source: "01A-06B"
    steps:
      - "1. Does headline pass classified ad test?"
      - "2. Is rapport established before pitch?"
      - "3. Is complete sales story told?"
      - "4. Are subheads independent headlines?"
      - "5. Photo captions selling, not describing?"
      - "6. Pain before pleasure?"
      - "7. Involvement devices present?"
      - "8. Core pitch repeated 3+ times?"
      - "9. Objections drained?"
      - "10. Irresistible offer with real urgency?"
      - "11. Summary at end?"
      - "12. Would THEY drive through blizzard for this?"

  - id: "MET-DK-029"
    title: "Metodologia de Venda Fria-para-Preparada"
    content: >
      Processo para converter prospectos frios em compradores aquecidos antes do pitch: Passo 1:
      Identificar prospecto frio via mídia/lead gen; Passo 2: NÃO fazer pitch imediato — informar que um
      pacote de informações será enviado; Passo 3: Montar e enviar pacote de informações relevantes (case
      studies, depoimentos, artigos, FAQ de objeções); Passo 4: Aguardar 5-7 dias; Passo 5: Fazer a
      chamada de vendas com prospecto já aquecido; Resultado: conversão pode dobrar versus abordagem fria
      direta.
    source: "7FA-CD6"
    passos:
      - "1. Identificar prospecto frio"
      - "2. Anunciar envio de pacote (não pitch)"
      - "3. Montar e enviar pacote de pré-aquecimento"
      - "4. Aguardar 5-7 dias"
      - "5. Realizar chamada com prospecto preparado"

  - id: "MET-DK-030"
    title: "Metodologia de Prepay para Profissionais de Saúde"
    content: >
      Processo de venda de pacotes prepagos em vez de cobrança por visita: Passo 1: Mapear o programa
      completo de tratamento (ex: 46 visitas nas primeiras 8 semanas + 12 nas próximas 8); Passo 2:
      Calcular o valor total e o preço com desconto para pagamento à vista; Passo 3: Usar script de
      apresentação que justifica o desconto pelo pagamento antecipado; Passo 4: Fechar o pacote completo
      na primeira ou segunda consulta; Passo 5: Garantir o resultado financeiro antes do tratamento
      começar.
    source: "7FA-CD11"
    passos:
      - "1. Mapear programa completo de tratamento"
      - "2. Calcular valor total e preço com desconto"
      - "3. Script de apresentação do valor"
      - "4. Fechamento do pacote completo"
      - "5. Garantia de resultado financeiro antecipado"

  - id: "MET-DK-031"
    title: "Metodologia de Construção de Superioridade Legítima em 90 Dias"
    content: >
      Processo para criar base de superioridade em 3-4 áreas em 90 dias: Passo 1: Identificar 3-4 áreas
      onde quero ser genuinamente superior (não apenas parecer); Passo 2: Para cada área, identificar os
      top 10 livros/recursos e os predecessores históricos; Passo 3: Comprometer-se a consumir todos em 90
      dias + implementar pelo menos 3 elementos; Passo 4: Documentar resultados para ancoragem
      psicológica; Passo 5: Manter a prática continuamente para que a superioridade seja resultado, não
      pose.
    source: "7FA-CD12-T04"
    passos:
      - "1. Escolher 3-4 áreas de foco"
      - "2. Mapear top 10 recursos + predecessores"
      - "3. Consumir + implementar em 90 dias"
      - "4. Documentar resultados como âncoras"
      - "5. Manter prática contínua"

  - id: "MET-DK-032"
    title: "Metodologia de Entrega do Componente de Cabeça (sem Vender)"
    content: >
      Como entregar psicologia/mentalidade em programas de treinamento sem vender explicitamente: Passo 1:
      Reconhecer que não se pode vender o componente psicológico diretamente; Passo 2: Embutir o
      componente em casos de sucesso e fracasso dentro do conteúdo técnico; Passo 3: Estruturar pequenas
      vitórias iniciais que criam impulso antes dos grandes pedidos; Passo 4: Usar modelagem de
      comportamento (histórias de pessoas como o aluno que venceram); Passo 5: Medir progresso psicológico
      (coragem, ação) separadamente das ferramentas.
    source: "7FA-CD12-T12"
    passos:
      - "1. Aceitar que não pode ser vendido diretamente"
      - "2. Embutir em casos reais no conteúdo técnico"
      - "3. Estruturar pequenas vitórias iniciais"
      - "4. Modelagem por histórias de pares"
      - "5. Medir progresso psicológico separadamente"

  - id: "MET-DK-033"
    title: "Metodologia de Reativação de Clientes Perdidos"
    content: >
      Processo sistemático para reativar clientes que compraram mas pararam: Passo 1: Segmentar base em
      "perdidos" (não compram há X meses) vs ativos; Passo 2: Criar oferta de reativação específica com
      razão de ser (novo produto, evento, aniversário, "ficamos com saudades"); Passo 3: Enviar sequência
      de 3-5 contatos (carta, email, ligação); Passo 4: Oferecer incentivo de reativação (sem degradar o
      preço regular); Passo 5: Medir ROI separado da aquisição de novos clientes (sempre será maior).
    source: "7FA-CD8"
    passos:
      - "1. Segmentar base: perdidos vs ativos"
      - "2. Criar oferta de reativação com razão"
      - "3. Sequência de 3-5 contatos"
      - "4. Incentivo sem degradar preço"
      - "5. Medir ROI separado"

  - id: "MET-DK-034"
    title: "Metodologia de Certificação Proprietária"
    content: >
      Como criar e lançar uma certificação proprietária do zero: Passo 1: Definir o nome e sigla da
      certificação (use termos de autoridade); Passo 2: Criar critérios de qualificação que filtrem e
      elevem percepção de valor; Passo 3: Desenvolver currículo/treinamento que justifique a certificação;
      Passo 4: Criar materiais físicos de prestígio (certificado, placa, logo); Passo 5: Lançar para
      primeiros certificados como fundadores/charter members; Passo 6: Criar comunidade e recursos
      exclusivos para certificados; Passo 7: Marketing da certificação para o público-alvo final.
    source: "7FA-CD12-T11"
    passos:
      - "1. Nome e sigla de autoridade"
      - "2. Critérios de qualificação"
      - "3. Currículo que justifica"
      - "4. Materiais físicos de prestígio"
      - "5. Lançamento com charter members"
      - "6. Comunidade exclusiva"
      - "7. Marketing para público-alvo"

  - id: "MET-DK-035"
    title: "Metodologia de Joint Venture / Host-Beneficiário"
    content: >
      Processo de execução de uma parceria host-beneficiário: Passo 1: Identificar negócios com audiência
      complementar (não concorrentes) que já têm confiança estabelecida com seus clientes; Passo 2: Criar
      proposta de valor para o host (comissão, produto gratuito, exclusividade); Passo 3: Desenvolver
      comunicação co-branded que aproveita o endorsement do host; Passo 4: Garantir fulfillment
      excepcional para preservar reputação do host; Passo 5: Documentar e escalar a parceria; criar modelo
      replicável para outros hosts.
    source: "7FA-CD8"
    passos:
      - "1. Identificar hosts com audiência complementar"
      - "2. Proposta de valor para o host"
      - "3. Comunicação co-branded com endorsement"
      - "4. Fulfillment excepcional"
      - "5. Documentar e escalar o modelo"

  - id: "MET-DK-036"
    title: "Metodologia de Imersão no Mercado para Descoberta do Hook"
    content: >
      Processo para encontrar o hook central de marketing por imersão direta: Passo 1: Passar 2-3 semanas
      com o produto ou em campo com os usuários; Passo 2: Entrevistar os criadores/engenheiros sobre o que
      os deixa mais orgulhosos; Passo 3: Observar o produto em uso sem filtros de marketing; Passo 4:
      Listar todos os detalhes surpreendentes ou inesperados; Passo 5: Perguntar: "O que disso nunca foi
      dito antes e chocaria o prospecto?"; Passo 6: Escrever headline testando o detalhe mais
      surpreendente.
    source: "7FA-CD10"
    passos:
      - "1. 2-3 semanas com produto/usuários"
      - "2. Entrevistar criadores sobre orgulho"
      - "3. Observação sem filtros de marketing"
      - "4. Listar detalhes surpreendentes"
      - "5. Pergunta: 'O que nunca foi dito?"
      - "6. Headline com detalhe mais surpreendente"

  - id: "MET-DK-037"
    title: "Metodologia de Construção de Filosofia Pessoal Articulável"
    content: >
      Processo para desenvolver e articular a filosofia pessoal como ativo de negócio: Passo 1: Listar
      20-30 posições sobre temas: liberdade, esforço, merecimento, governo, riqueza, relacionamentos,
      sucesso, fracasso; Passo 2: Reduzir para os 10-12 cornerstones mais impactantes; Passo 3: Para cada
      cornerstone, redigir 2-3 frases que o articulam claramente; Passo 4: Identificar quais se alinham
      naturalmente com o ICP (ideal customer profile); Passo 5: Decidir quais expressar publicamente
      (atraem o cliente ideal + repelem o errado); Passo 6: Integrar na comunicação de marketing sem
      parecer imposição.
    source: "7FA-CD12-T01"
    passos:
      - "1. Listar 20-30 posições brutas"
      - "2. Reduzir para 10-12 cornerstones"
      - "3. Articular cada um em 2-3 frases"
      - "4. Alinhar com ICP"
      - "5. Decidir o que expressar publicamente"
      - "6. Integrar no marketing organicamente"

  - id: "MET-DK-038"
    title: "Metodologia de Diagnóstico de Gargalo nos 7 Elementos"
    content: >
      Processo para identificar qual dos 7 elementos é o gargalo atual na jornada para 7 dígitos: Passo 1:
      Avaliar cada um dos 7 elementos em escala 1-10 (marketing, vendas, modelo, operações, psicologia,
      filosofia, integração); Passo 2: Identificar o elemento com pior pontuação que mais impacta receita
      agora; Passo 3: Selecionar top 3 ações para esse elemento; Passo 4: Iniciar as 3 ações em paralelo;
      Passo 5: Reavaliação mensal para ver se o gargalo mudou.
    source: "7FA-CD1"
    passos:
      - "1. Avaliar 7 elementos em escala 1-10"
      - "2. Identificar gargalo de maior impacto"
      - "3. Top 3 ações para o gargalo"
      - "4. Iniciar em paralelo"
      - "5. Reavaliação mensal"

  - id: "MET-DK-040"
    title: "Harley-Davidson Garage Party Method: (1) Create women-specific events at dealers"
    content: >
      Harley-Davidson Garage Party Method: (1) Create women-specific events at dealerships modeled on
      Tupperware parties, (2) Build sisterhood/belonging culture around the product, (3) Graduation
      ceremonies for new riders, (4) Changed entire customer demographic from male-only to inclusive →
      Sell aspirations, not motorcycles
    source: "12BBS-CD1A"

  - id: "MET-DK-041"
    title: "Adjacent Revenue Stream Launch: (1) Identify your core business asset/capability"
    content: >
      Adjacent Revenue Stream Launch: (1) Identify your core business asset/capability, (2) List all
      experiences/services that asset enables, (3) Package as premium offerings, (4) Sell to existing
      customer base first → Blue Canyon: restaurant → wine school + casino day trips + cooking classes
    source: "12BBS-CD1A"

  - id: "MET-DK-042"
    title: "Recession Message Alignment Method: (1) Identify which of the 3 internal convers"
    content: >
      Recession Message Alignment Method: (1) Identify which of the 3 internal conversations your prospect
      is having, (2) Match your message to THAT specific conversation, (3) Provide the certainty they need
      to act NOW, (4) Build guarantee around their specific economic fear
    source: "12BBS-CD1A"

  - id: "MET-DK-043"
    title: "No Fear Guarantee Method: (1) Identify the economic fear blocking purchase, (2)"
    content: >
      No Fear Guarantee Method: (1) Identify the economic fear blocking purchase, (2) Create specific
      guarantee addressing THAT fear, (3) Remove all risk language, (4) Name it memorably — 'No Fear
      Lease' (apartments), 'Job Loss Guarantee' (Hyundai), 'Investment Grade' (Ferrari)
    source: "12BBS-CD1A"

  - id: "MET-DK-045"
    title: "Authority Reestablishment Method: even with existing clients, every session: (1)"
    content: >
      Authority Reestablishment Method: even with existing clients, every session: (1) reestablish
      specific authority for specific topic, (2) demonstrate via live examples/testimonials, (3) reset
      me-chief-you-Indian frame
    source: "ACC-cd01-T6,T7"

  - id: "MET-DK-046"
    title: "Reputation-Before-Arrival Method: (1) identify every touchpoint before meeting,"
    content: >
      Reputation-Before-Arrival Method: (1) identify every touchpoint before meeting, (2) put reputation
      in a box (books/CDs/newsletters/testimonials), (3) FedEx with specific reading instructions, (4)
      only two conversations: them convincing you OR details of when/where/how much
    source: "ACC-cd03-T2,T3"

  - id: "MET-DK-047"
    title: "Consulting Day Upsell Method: (1) all relationships begin with PAID day, (2) cha"
    content: >
      Consulting Day Upsell Method: (1) all relationships begin with PAID day, (2) charge premium for
      inconvenient scheduling, (3) force them to come to YOUR location, (4) at end of day: offer or not,
      (5) if more stakeholders: another PAID meeting with pre-framing
    source: "ACC-cd03-T4,T5"

  - id: "MET-DK-048"
    title: "Recognition Call Pattern: (1) 20min private call 8x/year, (2) ~25% are recogniti"
    content: >
      Recognition Call Pattern: (1) 20min private call 8x/year, (2) ~25% are recognition calls — listen to
      wins, say 'brilliant/genius', (3) ~25% accountability, (4) minimal heavy-lifting calls, (5) all done
      in one day
    source: "ACC-cd03-T10"

  - id: "MET-DK-049"
    title: "Coaching Group Retention Method: (1) construct ladders/levels, (2) provide recog"
    content: >
      Coaching Group Retention Method: (1) construct ladders/levels, (2) provide recognition environment,
      (3) exercise dictatorial control, (4) keep one 'dumb' member who asks basic questions, (5) focus on
      delight not results, (6) never judge by your value system — only theirs
    source: "ACC-cd03-T13"

  - id: "MET-DK-050"
    title: "Environment Choreography Method: (1) control every physical detail of consulting"
    content: >
      Environment Choreography Method: (1) control every physical detail of consulting space — lighting,
      seating, props, (2) have YOUR books/awards visible, (3) client sits in designated 'receiving'
      position, (4) use timer visibly, (5) have pre-prepared materials with client's name, (6) end with
      physical artifact (signed book, certificate)
    source: "ACC-cd04-T3,T4,T7"

  - id: "MET-DK-051"
    title: "Summers' Relationship Brokering Method: (1) identify what each client needs that"
    content: >
      Summers' Relationship Brokering Method: (1) identify what each client needs that another client has,
      (2) make introductions with both parties knowing YOU facilitated, (3) take percentage or credit for
      resulting business, (4) create annual 'connection dinner' where you curate guest list, (5) position
      yourself as the hub — everyone connects THROUGH you
    source: "ACC-cd06-T3,T4,T5"

  - id: "MET-DK-052"
    title: "Rules Enforcement Cycle: (1) establish rules BEFORE enrollment — in writing, (2)"
    content: >
      Rules Enforcement Cycle: (1) establish rules BEFORE enrollment — in writing, (2) first violation:
      gentle reminder with smile, (3) second violation: formal warning with consequences stated, (4) third
      violation: enforce consequence immediately and publicly (within group), (5) celebrate rule-followers
      visibly
    source: "ACC-cd06-T10,T11"

  - id: "MET-DK-053"
    title: "Book as Long-Form Sales Letter: (1) identify target buyer persona, (2) list 4-5"
    content: >
      Book as Long-Form Sales Letter: (1) identify target buyer persona, (2) list 4-5 key message points
      to hammer, (3) structure as storybook — client cases + famous examples intermingled for borrowed
      credibility, (4) willingly repel non-ideal readers, (5) embed promotional pages + capture offers in
      FRONT of book, (6) use as credibility brochure replacement — send books instead of brochures
    source: "ACC-cd07-T6,T7,T8"

  - id: "MET-DK-054"
    title: "Celebrity Acquisition & Deployment: (1) mine free celebrity connections first —"
    content: >
      Celebrity Acquisition & Deployment: (1) mine free celebrity connections first — articles, public
      endorsements, (2) understand usage tiers control cost — avoid broadcast rights, (3) buy big via
      associated smaller celebrities (Apprentice cast = Trump at discount), (4) deploy for mood/selling
      environment at events, (5) accumulate associations over years for compound reputation, (6) use for
      competitor discouragement and media leverage
    source: "ACC-cd07-T8,T9,T10"

  - id: "MET-DK-055"
    title: "Price Discovery by Zero Addition: (1) identify current price, (2) add a zero — n"
    content: >
      Price Discovery by Zero Addition: (1) identify current price, (2) add a zero — no other changes to
      offer, (3) test conversions — usually identical, (4) pocket the difference, (5) then add
      differential tiers (self-service $3,950 vs personal-attention $7,995), (6) 20% naturally take
      premium tier — pure profit
    source: "ACC-cd09-T5,T6"

  - id: "FW-DK-056"
    title: "Outrageous Marketing PR Framework: Create something so provocative it generates"
    content: >
      Outrageous Marketing PR Framework: Create something so provocative it generates free media → Heart
      Attack Grill (outrageous health-mocking concept = massive PR); Playhouse company ($8/day play access
      = customer acquisition funnel for $10K-$80K playhouse sales)
    source: "12BBS-CD1A"

  - id: "MET-DK-056"
    title: "Two-Hour Coaching Call Process: (1) Send pre-coaching questionnaire, (2) Review"
    content: >
      Two-Hour Coaching Call Process: (1) Send pre-coaching questionnaire, (2) Review completed
      questionnaire for up to one hour, (3) Get on phone for one hour — client doesn't waste time because
      you're prepared, (4) They learn to deliver information properly through questionnaire format.
    source: "ACC-cd10"

  - id: "MET-DK-057"
    title: "Mastermind Group Enhancement: (1) Run standard format (what happened/what's work"
    content: >
      Mastermind Group Enhancement: (1) Run standard format (what happened/what's working/challenges), (2)
      Add dedicated networking sessions, (3) Add annual gathering for relationship-building, (4) Members
      want to rub elbows with each other as much as with you.
    source: "ACC-cd10"

  - id: "MET-DK-058"
    title: "Maintaining Authority in Groups: (1) Develop definite program structure, (2) Sti"
    content: >
      Maintaining Authority in Groups: (1) Develop definite program structure, (2) Stick to it strictly,
      (3) Bring something unique each meeting only YOU have, (4) Never let it get to point where you're no
      longer in control, (5) Welcome 20% natural churn.
    source: "ACC-cd10"

  - id: "MM-DK-059"
    title: "Performance Art Model: consulting/coaching is not about the advice — it's a perf"
    content: >
      Performance Art Model: consulting/coaching is not about the advice — it's a performance. The
      staging, the ritual, the props, the timing are all part of the show that justifies premium fees.
    source: "ACC-cd04-T1,T2,T3"

  - id: "MET-DK-059"
    title: "Embellished Schedule Publication: (1) Maintain two versions — real and embellish"
    content: >
      Embellished Schedule Publication: (1) Maintain two versions — real and embellished, (2) Fill every
      day with something, (3) Update and send to clients every 1-2 weeks, (4) Purpose: reinforce 'Kennedy
      is busier than crap', (5) Use 'hold, not yet scheduled' as closest to indicating availability.
    source: "ACC-cd10"

  - id: "MM-DK-060"
    title: "Hunt vs Pile Model: there are two ways to get clients — hunting (active outreach"
    content: >
      Hunt vs Pile Model: there are two ways to get clients — hunting (active outreach, one at a time) vs
      piling (building systems that pile up prospects). Hunting is exhausting, piling scales.
    source: "ACC-cd04-T10,T11"

  - id: "MET-DK-060"
    title: "Daily 'Be Talked About' routine: (1) Read USA Today in morning, (2) Pick #1 stor"
    content: >
      Daily 'Be Talked About' routine: (1) Read USA Today in morning, (2) Pick #1 story people will
      discuss, (3) Tie yourself to it with opinion/lesson, (4) Write email in 15 minutes, (5) Send to
      list, (6) Prefer local stories — all politics is local.
    source: "ACC-cd11"

  - id: "MM-DK-061"
    title: "Inverse Guarantee Law: the MORE you guarantee, the LESS refunds you get — becaus"
    content: >
      Inverse Guarantee Law: the MORE you guarantee, the LESS refunds you get — because the guarantee
      removes the buyer's anxiety and they never activate it. Bold guarantees are profit centers, not cost
      centers.
    source: "ACC-cd05-T5,T6"

  - id: "MET-DK-061"
    title: "Personal Disclosure deployment: (1) Identify real vulnerabilities, (2) Craft eac"
    content: >
      Personal Disclosure deployment: (1) Identify real vulnerabilities, (2) Craft each into 2-3 minute
      story with lesson, (3) Place strategically in speeches/books, (4) Wait — connectors hang around
      until everyone leaves, (5) Let them tell their version, (6) They ALL buy — it's a lock.
    source: "ACC-cd11"

  - id: "MM-DK-062"
    title: "What's Next Engine: retention is driven by always having a 'what's next' — next"
    content: >
      What's Next Engine: retention is driven by always having a 'what's next' — next level, next
      certification, next mastermind, next event. The moment there's no next, they leave.
    source: "ACC-cd05-T8,T9"

  - id: "MET-DK-062"
    title: "Criticism Campaign method (J. Abraham model): (1) Pick a niche trade journal, (2"
    content: >
      Criticism Campaign method (J. Abraham model): (1) Pick a niche trade journal, (2) Run provocative
      ad: 'Who is this man and why is he saying these terrible things about [industry]?', (3) Position as
      champion of frustrated practitioners, (4) Repeat niche by niche.
    source: "ACC-cd11"

  - id: "FW-DK-063"
    title: "Expectation Management Framework: set clear low expectations + deliver on ONE ke"
    content: >
      Expectation Management Framework: set clear low expectations + deliver on ONE key promise
      consistently (Southwest: on-time) = highest satisfaction with least delivery
    source: "ACC-cd03-T15"

  - id: "MM-DK-063"
    title: "Mountains from Molehills: the ability to take a small idea, a minor distinction,"
    content: >
      Mountains from Molehills: the ability to take a small idea, a minor distinction, a simple technique
      and package it as a MAJOR breakthrough is the core skill of info-marketing and coaching.
    source: "ACC-cd06-T5,T6"

  - id: "MET-DK-063"
    title: "Convention 'Reverse Visibility' method: (1) Time provocative mailing 4-6 weeks b"
    content: >
      Convention 'Reverse Visibility' method: (1) Time provocative mailing 4-6 weeks before convention,
      (2) Make critical statements about industry, (3) Show up and work during sessions, (4) Be visible on
      breaks, (5) Let them find you — 'Boy, you hit it right on the nail.
    source: "ACC-cd11"

  - id: "FW-DK-064"
    title: "Call Schedule Architecture: (1) pre-set all calls for the year on day 1, (2) gro"
    content: >
      Call Schedule Architecture: (1) pre-set all calls for the year on day 1, (2) group all calls on ONE
      day per week, (3) never exceed 6 calls per day, (4) 20min max each, (5) client must submit agenda
      24h before or call is cancelled
    source: "ACC-cd04-T9,T10"

  - id: "MM-DK-064"
    title: "Gold Stars Economy: people who need gold stars make all decisions about getting"
    content: >
      Gold Stars Economy: people who need gold stars make all decisions about getting approval instead of
      getting money. Liberation comes from not needing any. Every decision made for gold stars is a
      decision NOT made for profit.
    source: "ACC-cd09-T8,T9,T10"

  - id: "MET-DK-064"
    title: "Pad Your Coaching Program: (1) Find co-op add-on provider, (2) They provide mont"
    content: >
      Pad Your Coaching Program: (1) Find co-op add-on provider, (2) They provide monthly call + CD +
      articles + emails, (3) You get content padding + celebrity attachment, (4) Amortize cost across
      members, (5) Raise monthly fee by $5 for cost-neutral, (6) Multiple attachment benefits stack.
    source: "ACC-cd11"

  - id: "FW-DK-065"
    title: "Negative Optioning Framework: (1) present the premium option first, (2) let clie"
    content: >
      Negative Optioning Framework: (1) present the premium option first, (2) let client self-select DOWN,
      (3) each lower option removes benefits visibly, (4) client feels loss with each downgrade, (5) most
      land on middle-high option
    source: "ACC-cd05-T1"

  - id: "MM-DK-065"
    title: "5/15/80 Buyer Population: 5% of every population buys everything, 15% buys a lot"
    content: >
      5/15/80 Buyer Population: 5% of every population buys everything, 15% buys a lot, 80% buys nothing.
      This is human behavior, not money availability. In any niche, the same 5% are in every coaching
      program simultaneously.
    source: "ACC-cd08-T5"

  - id: "MET-DK-065"
    title: "Book-as-Interview-Access: (1) Get legitimate book deal, (2) Send letter on publi"
    content: >

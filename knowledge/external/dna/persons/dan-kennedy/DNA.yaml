      (self-awareness). Step 2: Remove the pathway to temptation (moved house to avoid donut shop). Step
      3: Destroy temptation before it enters inner space (rip bread in garage). Step 4: Accept you lack
      willpower INSIDE — engineer environment OUTSIDE. Principle: 'I have the iron will not to go get any,
      as long as I'm not passing any'.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "self-management"


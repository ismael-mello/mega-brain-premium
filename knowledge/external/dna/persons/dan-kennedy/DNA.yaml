    source: "DVD09"

  - id: "FIL-DK-407"
    title: "Most urgency is inauthentic — we make it up. Exclusivity creates authentic urgen"
    content: >
      Most urgency is inauthentic — we make it up. Exclusivity creates authentic urgency because if

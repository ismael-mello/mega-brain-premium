      paper-trail the conversation, exempt gift from relationship. Prevent it from becoming 'the most
      expensive free car I ever got.
    source: "ACC-video-DK_3"

  - id: "FIL-DK-163"
    title: "Application Creates Emotional Commitment: 'their emotional commitment to buy is"
    content: >
      Application Creates Emotional Commitment: 'their emotional commitment to buy is literally growing by
      the number of minutes they're spending filling out the application.' Length = commitment.
    source: "ACC-video-DK_11"

  - id: "MET-DK-163"
    title: "The Prospect Message Repositioning Process: Step 1) Identify where your prospect"
    content: >
      The Prospect Message Repositioning Process: Step 1) Identify where your prospect really is (bored,
      discouraged, resigned, belief-defended). Step 2) Back your conversation up to where THEY are, not
      where you think they are. Step 3) Reframe/reposition/repackage/relanguage from repair or improvement
      to opportunity. Step 4) Disconnect what you're presenting from what they're already bored with.
    source: "CD1-track1, CD2-track4, CD3-track1"

  - id: "HEUR-DK-164"

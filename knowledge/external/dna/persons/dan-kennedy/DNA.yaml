      guaranteed. Assign minutes to each. Total must equal time block available. No unallocated minutes.
    source: "MM-03-cd1"

  - id: "HEUR-DK-292"
    title: "14-Minute Coaching Slots: phone appointments back-to-back with 1 minute gap. At"
    content: >
      14-Minute Coaching Slots: phone appointments back-to-back with 1 minute gap. At 14 minutes, hang up
      regardless. After initial shock, members learn to prepare 3 things in priority order with time
      allocated to each.
    source: "MM-03-cd2"

  - id: "HEUR-DK-293"
    title: "A/B/C Inbound Sorting: assistant sorts all inbounds. A's = attended within 1 wee"
    content: >

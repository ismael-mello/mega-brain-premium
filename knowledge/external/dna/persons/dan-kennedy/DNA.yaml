    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch TV example)"

  - id: "FIL-DK-388"
    title: "Don't just build a herd and be done with it. Build a herd, offer them 11 product"
    content: >
      Don't just build a herd and be done with it. Build a herd, offer them 11 products over 17 weeks, and

  - id: "MET-DK-219"
    title: "Emotional Pain Copy Method"
    content: >
      Step-by-step: 1) IDENTIFY target market's emotional pain points. 2) SELECT method (familiar
      scenario, confession, suppressed feelings, or negative imagination). 3) TWIST THE KNIFE — make it
      maximally painful. A copy WIN = the reader who cannot sleep because of the angst we created. 4) THEN
      solve it — present product as the relief. The deeper the pain, the stronger the desire for relief.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "HEUR-DK-220"
    title: "Application length drives commitment: more minutes filling out = more committed."

      Vertical columns by topic. Rearrange freely. See everything at once — subconscious works
      pictorially. Multiple people can contribute without meetings. Move cards from To Do → Doing → Done.
    source: "MM-03-cd1"

  - id: "FW-DK-173"
    title: "Productivity Environment Design: Two components — (A) Psychological: photos, tri"
    content: >

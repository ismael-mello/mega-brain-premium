    - id: "MET-DK-219"
      name: "Emotional Pain Copy Method"
      content: "Step-by-step: 1) IDENTIFY target market's emotional pain points. 2) SELECT method (familiar scenario, confession, suppressed feelings, or negative imagination). 3) TWIST THE KNIFE — make it maximally painful. A copy WIN = the reader who cannot sleep because of the angst we created. 4) THEN solve it — present product as the relief. The deeper the pain, the stronger the desire for relief."
      source_file: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
      domain: "copywriting"
      tags: ["emotional-pain", "methodology", "twist-knife"]
    - id: "MET-DK-220"
      name: "Shame-Based Copy Construction"
      content: "Step-by-step: 1) IDENTIFY the 'Loserville' — what unwanted state does audience fear most? 2) Use SHAME THESAURUS to expand (left out, uncool, incompetent, etc). 3) Show FAMILIAR EXAMPLES (classic ads: 'Jones Must Be Broke' 1923, 'They Laughed When I Sat Down' Caples). 4) Create the ESCAPE — position product as vehicle from shame to triumph. 5) Key insight: even Forbes 400 are hyper-sensitive to these triggers."
      source_file: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
      domain: "copywriting"
      tags: ["shame", "construction", "methodology"]
    - id: "MET-DK-221"
      name: "Vindication Story Architecture"
      content: "Step-by-step revenge/vindication story for copy: 1) Establish the DOUBT — others skeptical, critics, family disapproval. 2) Show the STRUGGLE — humiliation, embarrassment, near-failure. 3) The TURNING POINT — discovery of method/product. 4) The TRIUMPH — 'They Laughed When I Sat Down At The Piano But When I Started To Play!' 5) The VINDICATION — doubters silenced, respect earned. Key: everyone wants to stick it up the butts of some friends over their skepticism."
      source_file: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
      domain: "copywriting"
      tags: ["revenge", "vindication", "story-architecture"]
    - id: "MET-DK-222"
      name: "Mind-Control Copy Writing Process"
      content: "Master process: 1) SELECT dominant secret for audience (Shame, Pain, Anger, Mysticism, Revenge, Faith, Compassion). 2) APPLY 4 Vital Principles (no thinking, emotional response, minimal education, everything sells). 3) DEFAULT TO DARK over light when cannot split test. 4) TIE every element to an E-Factor (Fear, Guilt, Greed, Pride, Lust). 5) ENSURE purchase = accomplishment pathway exists. 6) VALIDATE: does every word on the page further the sale?"
      source_file: "Sorcery/transcription_mp3_CD1.txt + PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
      domain: "copywriting"
      tags: ["mind-control", "master-process", "writing-methodology"]

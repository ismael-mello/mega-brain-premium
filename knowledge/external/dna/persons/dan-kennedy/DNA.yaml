  - id: "HEUR-DK-379"
    title: "Canned responses provide FREEDOM -- 90% free from figuring what to say = concent"
    content: >
      Canned responses provide FREEDOM -- 90% free from figuring what to say = concentrate on reading
      prospect verbal and non-verbal signals.
    source: "MM-06-cd3"

  - id: "HEUR-DK-396"
    title: "Personalization in direct mail can take a campaign from 2% to 20% response. Dirt"
    content: >
      Personalization in direct mail can take a campaign from 2% to 20% response. Dirt-cheap postcards
      with personalization can outperform costly lengthy sales letters.
    source: "MM-08-pdf02"

  - id: "HEUR-DK-398"
    title: "80% of patients at the VA who can fill their prescriptions for free never fill t"
    content: >
      80% of patients at the VA who can fill their prescriptions for free never fill the prescriptions.
      It's not about money — nobody's even motivated enough by need to walk to the pharmacy.
    source: "CD1-track5"

  - id: "HEUR-DK-399"
    title: "If you ask business owners 'what are the first 5 things you'd do if you hit the"
    content: >
      If you ask business owners 'what are the first 5 things you'd do if you hit the lottery for $50
      million?' — walk away from their business is on everybody's top 5 list. Every single one of them.
    source: "CD1-track4"

  - id: "HEUR-DK-400"
    title: "In the franchise business: 1,400 leads raise their hand expressing interest → na"
    content: >
      In the franchise business: 1,400 leads raise their hand expressing interest → narrow to 300 who
      could buy → out of that, 1 or 2 actually purchase. The other 298 who could have bought are still way
      back mentally/emotionally.
    source: "CD2-track4"

  - id: "HEUR-DK-401"
    title: "Over 50% of people die where they were born. Over 30% never leave. They stay whe"
    content: >
      Over 50% of people die where they were born. Over 30% never leave. They stay where they were
      planted. The idea of packing up and going somewhere is inconceivable to most people.
    source: "CD5-track2"

  - id: "HEUR-DK-402"
    title: "The #1 reason people go to work: to pay the bills. #2 reason: because if I don't"
    content: >
      The #1 reason people go to work: to pay the bills. #2 reason: because if I don't, I'll get fired.
      This applies equally to small business owners — they just give the obligatory answers they think
      they should give.
    source: "CD1-track3"

  - id: "HEUR-DK-403"
    title: "The FDA rule is meat has to be 40% meat to call it meat. The #1 filler is sand."
    content: >
      The FDA rule is meat has to be 40% meat to call it meat. The #1 filler is sand. When we're arguing
      about 5% (Taco Bell at 35%), the real issue is the 60% that's allowed — same thing applies to
      marketing content vs. belief-building content ratio.
    source: "CD4-track2"

  - id: "HEUR-DK-404"
    title: "The rub-the-Buddha-for-money ad ran in tabloids for almost 8 years successfully."
    content: >
      The rub-the-Buddha-for-money ad ran in tabloids for almost 8 years successfully. When tested in
      Investor's Business Daily (Wall Street Journal readership), it was the least profitable placement
      but still covered ad cost with a slight profit.
    source: "CD4-track3"

  - id: "HEUR-DK-405"
    title: "The #1 buyers of gambling information systems are stockbrokers. The #2 buyers ar"
    content: >
      The #1 buyers of gambling information systems are stockbrokers. The #2 buyers are doctors. You can't
      be much more gullible than that — yet these are credentialed professionals.
    source: "CD4-track3"

  - id: "HEUR-DK-406"
    title: "The headliner at comedy clubs always gets a better response and more laughter ev"
    content: >
      The headliner at comedy clubs always gets a better response and more laughter even though the middle
      act's material is usually the best. People are more 'in fun' for the headliner because they've
      predetermined the hierarchy. State matters more than content.
    source: "CD4-track3"

  - id: "HEUR-DK-407"
    title: "If you tape and transcribe stand-up comedy, then sit in a chair and read it — yo"
    content: >
      If you tape and transcribe stand-up comedy, then sit in a chair and read it — you'll rarely laugh
      out loud. Most comedy isn't funny outside the environment where everyone is in the state of fun.
      Same principle applies to sales environments.
    source: "CD4-track3"

  - id: "HEUR-DK-408"
    title: "In continuity businesses, every day subscribers are waking up trying to quit. Yo"
    content: >
      In continuity businesses, every day subscribers are waking up trying to quit. You get one whack per
      month at keeping them for another month vs. 28-31 days they're trying to quit. That ratio is
      horrible.
    source: "CD4-track3"

  - id: "HEUR-DK-409"
    title: "Prospect's #1 internal objection (heard from private clients repeatedly): 'There"
    content: >
      Prospect's #1 internal objection (heard from private clients repeatedly): 'There's no point doing
      that because my employees will just screw it up' or 'my employees will refuse to do it.' This is the
      point where they shut you off.
    source: "CD2-track2"

  - id: "HEUR-DK-410"
    title: "Your only prayer at distance selling is to deliver so much that prospects get th"
    content: >
      Your only prayer at distance selling is to deliver so much that prospects get themselves into a
      state while going through it. Shrinking messages to fit 146 characters is committing suicide because
      they can't get in state.
    source: "CD4-track4"

  - id: "HEUR-DK-411"
    title: "For most business owners, their ambition level arrives at: doing enough not to g"
    content: >
      For most business owners, their ambition level arrives at: doing enough not to go out of business.
      Doing enough to get to bills paid. That's where they settle. The equivalent of a worker doing enough
      not to get fired.
    source: "CD2-track1"

  - id: "HEUR-DK-412"
    title: "For every person who starts a diet, there are 10 people who are good at starting"
    content: >
      For every person who starts a diet, there are 10 people who are good at starting a diet as soon as
      the next event occurs. There is always a 'right after' point at which they will do this — but not
      now.
    source: "CD6-track2"

  - id: "HEUR-DK-413"
    title: "To overcome personal timing, there are only two approaches: (1) make acting now"
    content: >
      To overcome personal timing, there are only two approaches: (1) make acting now advantageous despite
      bad timing, or (2) make it so urgent that bad personal timing is trumped by the urgency.
    source: "CD6-track2"

  - id: "HEUR-DK-414"
    title: "MDs (medical doctors) are the number one buyers of spam penis enlargement pills"
    content: >
      MDs (medical doctors) are the number one buyers of spam penis enlargement pills — hundreds of
      millions of dollars. They know better, they have prescription alternatives, yet hype overcomes
      conscious knowledge even in the most educated buyers.
    source: "CD6-track4"

  - id: "HEUR-DK-415"
    title: "Jeff Paul infomercial: shot for $8,200 first version, $10,000-$11,000 second ver"
    content: >
      Jeff Paul infomercial: shot for $8,200 first version, $10,000-$11,000 second version. Ran for 8.5
      years uninterrupted on 4 national cable networks. Produced $22-26 million in revenue. Holds record
      for longest consecutive running lead generation business opportunity infomercial.
    source: "CD6-track6"

  - id: "HEUR-DK-416"
    title: "One ad sold 1.6 million copies of a book — using mystery opportunity positioning"
    content: >
      One ad sold 1.6 million copies of a book — using mystery opportunity positioning with
      incomprehensible photographs and no promise in the headline. The headline 'Can you tell what this
      woman is doing' violated conventional headline rules.
    source: "CD6-track5"

  - id: "HEUR-DK-417"
    title: "When you have a winner out of the gate and did not test every variable, the last"
    content: >
      When you have a winner out of the gate and did not test every variable, the last thing you want to
      do is screw with it. One guy had mismatched socks — we made him wear mismatched socks in the reshoot
      because who the hell knows what is making it work.
    source: "CD6-track6"

  - id: "HEUR-DK-418"
    title: "The overwhelming majority of pure opportunity marketers locate themselves in sma"
    content: >
      The overwhelming majority of pure opportunity marketers locate themselves in small towns, Heartland
      of America towns. They tell an 'I am in a small town' story. If you live in Gossel, Kansas, you are
      more trustworthy than Phoenix, Cleveland, New York, or Los Angeles.
    source: "CD7-track1"

  - id: "HEUR-DK-419"
    title: "79-year-old works better than 80 because of specificity. The guy has to stay 79"
    content: "79-year-old works better than 80 because of specificity. The guy has to stay 79 until he turns 89."
    source: "CD7-track4"

  - id: "HEUR-DK-420"
    title: "Glenn W. Turner: in 3.5 years, put 500,000+ people into a business at $5,000 a p"
    content: >
      Glenn W. Turner: in 3.5 years, put 500,000+ people into a business at $5,000 a piece. No internet,
      no webinars, no teleseminars — all old-fashioned manual labor putting people in rooms.
    source: "CD8-track3"

  - id: "HEUR-DK-421"
    title: "Brainerd Melanger sent 500 business cards to new members BEFORE shipping the cou"
    content: >
      Brainerd Melanger sent 500 business cards to new members BEFORE shipping the course. Refund rate
      dropped like a rock. He realized he was really in the business card business.
    source: "CD9-track2"

  - id: "HEUR-DK-422"
    title: "Brainerd Melanger sent six copies of the directory to each member — one for them"
    content: >
      Brainerd Melanger sent six copies of the directory to each member — one for them, one for their
      mother, one for the coffee table. The cost 'breaks my heart but we send them six copies.
    source: "CD9-track3"

  - id: "HEUR-DK-423"
    title: "George Douglas: a million dollars a week in sales, 15 years ago. $10,000 average"
    content: >
      George Douglas: a million dollars a week in sales, 15 years ago. $10,000 average sale at a distance.
      42 different home businesses available. About 20 people came to the farm per week, but 100 per week
      bought — the fact that they could come was the reassurance factor.
    source: "CD10-track3, CD10-track4"

  - id: "HEUR-DK-424"
    title: "George Douglas used 3-hour cassette tapes as his sales tool. People would listen"
    content: >
      George Douglas used 3-hour cassette tapes as his sales tool. People would listen 5 times before
      buying. If what you are telling them is what they are looking for, length does not matter.
    source: "CD10-track2"

  - id: "HEUR-DK-425"
    title: "Joe Carbo 'Lazy Man's Way to Riches' — the headline 'too busy earning a living t"
    content: >
      Joe Carbo 'Lazy Man's Way to Riches' — the headline 'too busy earning a living to make any money'
      lets them off the hook in the first line. The entire premise is a mystery opportunity pitch with no
      real disclosure.
    source: "CD6-track5"

  - id: "HEUR-DK-426"
    title: "Pat Williams letter was a control for many years. Headline: 'I have made over $4"
    content: >
      Pat Williams letter was a control for many years. Headline: 'I have made over $429,000 doing
      absolutely nothing.' The lift note from 'SC' says the real process is 'you send a shoebox of paper
      and he sends you back $429,000 every month.' This makes it feel real.
    source: "CD6-track3"

  - id: "HEUR-DK-427"
    title: "Urgency from past loss: 'You could have collected $69,934 in dividend payments o"
    content: >
      Urgency from past loss: 'You could have collected $69,934 in dividend payments over the last two
      years.' Starting with what they COULD HAVE had — not what they will get — is more painful and
      motivating than future gain.
    source: "CD9-track1"

  - id: "HEUR-DK-428"
    title: "A cafeteria line of options is almost always better than one thing. Jeff Paul we"
    content: >
      A cafeteria line of options is almost always better than one thing. Jeff Paul went from selling
      financial planners one way to build a practice (high refund rate) to 101 ways (dramatically reduced
      refunds). George Douglas went from 4 programs to 42.
    source: "CD10-track5"

  - id: "HEUR-DK-429"
    title: "George Douglas added a $50 fee to swap between his 42 programs. He told them why"
    content: >
      George Douglas added a $50 fee to swap between his 42 programs. He told them why on the tape: 'I do
      not want you to order just to get them.' Very few took advantage unfairly. The small fee eliminated
      the scare of losing $10,000 on the wrong choice.
    source: "CD10-track5"

  - id: "HEUR-DK-430"
    title: "Carlton Sheets held the longest running opportunity infomercial record at 14 yea"
    content: >
      Carlton Sheets held the longest running opportunity infomercial record at 14 years with Get Rich in
      Real Estate. Jeff Paul's show held second at 8.5 years.
    source: "CD6-track6"

  - id: "HEUR-DK-431"
    title: "Get rich in real estate is the oldest, most enduring pure opportunity because ev"
    content: >
      Get rich in real estate is the oldest, most enduring pure opportunity because everybody gets it.
      Everybody lives in a house. They know houses get bought, sold, and rented. There is a base of
      knowledge — no explanation needed.
    source: "CD8-track3"

  - id: "HEUR-DK-432"
    title: "International Correspondent Schools ran the same ad from 1919 through the 2000s"
    content: >
      International Correspondent Schools ran the same ad from 1919 through the 2000s and into 2010 — the
      same appeal across nearly a century: man impresses wife/partner with new earning power. The visual
      changed (handing cash, checkbook, laptop) but the core appeal never changed.
    source: "CD9-track2"

  - id: "HEUR-DK-433"
    title: "Visible big ticket purchases by the affluent were affected in recent years not b"
    content: >
      Visible big ticket purchases by the affluent were affected in recent years not because they could
      not buy or did not want them, but because they felt it was inappropriate to drive home in a big new
      Lexus when across the street somebody was getting laid off.
    source: "CD6-track2"

  - id: "HEUR-DK-434"
    title: "Social pyramid numbers (unchanged 1954-2008): 1% rich, 4% financially secure, 54"
    content: >
      Social pyramid numbers (unchanged 1954-2008): 1% rich, 4% financially secure, 54% still working (net
      assets under $100K), 5% dead broke, 36% dead. Only the 54/36 split has shifted slightly because
      people live longer.
    source: "CD/12 track 3 — DK citing Social Security Administration data"

  - id: "HEUR-DK-435"
    title: "Realistic Market Assessment math: If total addressable market is 55,000, you hit"
    content: >
      Realistic Market Assessment math: If total addressable market is 55,000, you hit 5% market share
      before costs go through the roof = ~2,750. Of those, roughly half have the mindset to buy = 1,250
      realistic profitable customers.
    source: "CD/12 track 2 — DK on realistic niche sizing (55K → ~1,250)"

  - id: "HEUR-DK-436"
    title: "George's advertising economics: $100,000/month ad spend driving $4,000,000/month"
    content: >
      George's advertising economics: $100,000/month ad spend driving $4,000,000/month in revenue
      ($1M/week). That's a 2.5% advertising-to-revenue ratio on a $10,000 average sale.
    source: "CD/11 track 2 — George on his ad spend ratio"

  - id: "HEUR-DK-437"
    title: "George's sales force compensation: Salespeople made $100,000-$200,000/year. Offi"
    content: >
      George's sales force compensation: Salespeople made $100,000-$200,000/year. Office staff received
      annual bonuses of $10,000-$20,000 each based on a percentage of total income.
    source: "CD/11 track 1 — George on compensation structure"

  - id: "HEUR-DK-438"
    title: "Ken Roberts Company scale: 700,000 courses sold at $195 each. 5.7 million piece"
    content: >
      Ken Roberts Company scale: 700,000 courses sold at $195 each. 5.7 million piece largest single
      mailing. 95-99% of all sales were via direct mail.
    source: "CD/14 tracks 1-2 — Craig on Ken Roberts' numbers"

  - id: "HEUR-DK-439"
    title: "List change impact: Frank Kern went from 0.05% response rate to 2% response rate"
    content: >
      List change impact: Frank Kern went from 0.05% response rate to 2% response rate. The ONLY change
      was the list. Nothing else changed — same offer, same creative.
    source: "CD/14 track 5 — Craig on the power of list selection"

  - id: "HEUR-DK-440"
    title: "80% of opportunity buyers will buy again within 30-90 days. If you don't sell th"
    content: "80% of opportunity buyers will buy again within 30-90 days. If you don't sell them something, somebody else will."
    source: "CD/14 track 6 — Craig on Ken Roberts buyer behavior"

  - id: "HEUR-DK-441"
    title: "Ken Roberts offered 11 different products/upsells over the first 17 weeks of mem"
    content: >
      Ken Roberts offered 11 different products/upsells over the first 17 weeks of membership. Constant
      new products, repackaging, and keeping customers part of the family.
    source: "CD/14 track 6 — Craig on the Ken Roberts back-end sequence"

  - id: "HEUR-DK-442"
    title: "January is the best time to mail opportunity offers — new year's resolutions, pe"
    content: >
      January is the best time to mail opportunity offers — new year's resolutions, people looking for
      ways to improve their life. Avoid mailing during holidays (Thanksgiving, Christmas) — wallets are
      light and minds are elsewhere.
    source: "CD/14 track 6 — Craig on seasonality of direct mail"

  - id: "HEUR-DK-443"
    title: "George's Saturday farm presentations: About 20 people came per week, but they so"
    content: >
      George's Saturday farm presentations: About 20 people came per week, but they sold 100 units per
      week. The fact that prospects COULD come (even though most didn't) was a great reassurance factor.
    source: "DVD/05 — George on conversion numbers"

  - id: "HEUR-DK-444"
    title: "George's business scale: $1 million per week ($52 million/year), $10,000 average"
    content: >
      George's business scale: $1 million per week ($52 million/year), $10,000 average sale, 290
      employees, 100 sales per week, operating about 15 years ago from today.
    source: "DVD/05 — George and DK on business scale"

  - id: "HEUR-DK-445"
    title: "Format rotation virtually eliminates dupe responses: postcards and enveloped pie"
    content: >
      Format rotation virtually eliminates dupe responses: postcards and enveloped pieces to the same list
      produce virtually no overlap in responders. This allows using the best list twice instead of lesser
      lists.
    source: "CD/15 track 4 — DK on format rotation"

  - id: "HEUR-DK-446"
    title: "Auto repair shop mailing: Ron Ipec mailed the same booklet every single month to"
    content: >
      Auto repair shop mailing: Ron Ipec mailed the same booklet every single month to a finite list with
      no decline in response. Only changed the color of the outside cover.
    source: "CD/15 track 4 — DK on list durability in finite niches"

  - id: "HEUR-DK-447"
    title: "Direct mail return rate: Expect 4-5% undeliverable regardless of list quality. T"
    content: >
      Direct mail return rate: Expect 4-5% undeliverable regardless of list quality. The Post Office
      doesn't know which addresses are deliverable until the carrier shows up at the door.
    source: "CD/15 track 2 — Craig/DK on mail hygiene expectations"

  - id: "HEUR-DK-448"
    title: "The more ordinary the spokesperson looked, the higher the response rates. Ken Ro"
    content: >
      The more ordinary the spokesperson looked, the higher the response rates. Ken Roberts in denim shirt
      outperformed suit. Black and white photo even better. More you told about his average background,
      more people connected.
    source: "CD/14 track 2 — Craig on Ken Roberts image testing"

  - id: "HEUR-DK-449"
    title: "Larry McIntyre foreign brides: Price went from under $1,000 to $8,500 with NO di"
    content: "Larry McIntyre foreign brides: Price went from under $1,000 to $8,500 with NO difference in response rate."
    source: "CD/13 track 3 — DK on price elasticity in opportunity selling"

  - id: "HEUR-DK-450"
    title: "Cost per sale lifecycle: $300 cost per sale gradually creeps to $330. At some po"
    content: >
      Cost per sale lifecycle: $300 cost per sale gradually creeps to $330. At some point it skyrockets
      from $360 to $880 (the wall). After adjustments, it creeps again until it hits $2,000 (the second
      wall). Each recovery requires new economics, not new creative.
    source: "CD/15 track 1 — DK on the cost per sale lifecycle"

  - id: "HEUR-DK-451"
    title: "Go By The Inch TV economics: Buying half hours in major markets for $300 at peak"
    content: >
      Go By The Inch TV economics: Buying half hours in major markets for $300 at peak. Got 8.5 years of
      profitable TV — not by changing the show, but by changing the economics. Today same time block costs
      $6,000.
    source: "CD/15 track 1, CD/11 track 3 — DK on TV media economics"

  - id: "HEUR-DK-452"
    title: "People have to listen to 3 cassette tapes before being allowed to buy. Husband a"
    content: >
      People have to listen to 3 cassette tapes before being allowed to buy. Husband and wife both had to
      sign an affidavit they listened to 12 hours of audio. If they're interested they'll listen to 6
      hours. Don't shrink for the unlikely buyer.
    source: "CD/12 track 5 — DK on qualifying buyers through commitment"

  - id: "HEUR-DK-453"
    title: "George's 3-hour cassette tapes: Prospects listened 5 times before buying. If the"
    content: >
      George's 3-hour cassette tapes: Prospects listened 5 times before buying. If they're interested,
      they'll listen to 6 hours. Never use answering machines — always human operators on the phones.
    source: "DVD/05 — George on prospect engagement"

  - id: "HEUR-DK-454"
    title: "Homeowners are less transient than apartment dwellers. Suburban markets less tra"
    content: >
      Homeowners are less transient than apartment dwellers. Suburban markets less transient than urban
      markets. To reduce mail returns, call out apartments and focus on homeowners in suburban zips.
    source: "CD/15 track 2 — DK on reducing list waste"

  - id: "HEUR-DK-455"
    title: "George hired 'unwanted' people — ex-felons, people nobody else would hire. His j"
    content: >
      George hired 'unwanted' people — ex-felons, people nobody else would hire. His janitor made $35,000
      per year and was an ex-con. People who are given a second chance often become the most loyal and
      hardest-working employees.
    source: "CD/11 track 1 — George on his hiring philosophy"

  - id: "HEUR-DK-456"
    title: "Opportunity sales sequence: Lead generation ads in specialty magazines → big pac"
    content: >
      Opportunity sales sequence: Lead generation ads in specialty magazines → big package with full color
      literature, photos of farm, family, program advisors → assignment to program advisor → personal
      letter with direct phone number → Saturday farm presentation for those who wanted to come.
    source: "DVD/05 — George on his complete sales funnel"

  - id: "HEUR-DK-457"
    title: "Rob Min real estate pricing: Consulting day started with client listing everythi"
    content: >
      Rob Min real estate pricing: Consulting day started with client listing everything he hated about
      the business. This 'don't like list' became the foundation for the replacement/opportunity pitch.
    source: "CD/13 track 1 — DK on starting with the don't-like list"

  - id: "HEUR-DK-458"
    title: "Arrow's commodity course: Wait until page 24-25 of 56 before revealing what the"
    content: >
      Arrow's commodity course: Wait until page 24-25 of 56 before revealing what the offer actually is.
      First diffuse the risk, present stories/testimonials, then reveal. Photo with dog outperformed all
      other poses — makes seller look ordinary.
    source: "CD/14 track 4 — Craig on delayed reveal technique"

  - id: "HEUR-DK-459"
    title: "Merge purge for ideal prospects: Take a good opportunity-seeker response list, m"
    content: >
      Merge purge for ideal prospects: Take a good opportunity-seeker response list, merge-purge against
      only the 7 most likely occupational groups, take the dupes. Jacks up cost but produces the best
      possible list.
    source: "CD/15 track 5 — DK on merge-purge for targeted prospecting"

  - id: "HEUR-DK-460"
    title: "30% of buyers will mail in their order using the business reply envelope rather"
    content: >
      30% of buyers will mail in their order using the business reply envelope rather than calling or
      going online. Removing the reply envelope doesn't just lose 30% — some determined buyers will find
      another way, but you'll lose enough to turn a winner into a loser.
    source: "OMC CD/16 track 1 + DVD/07 — Dan Kennedy (Gary Halbert envelope test)"

  - id: "HEUR-DK-461"
    title: "80% of buyers will buy again within 30-90 days. If you aren't going to sell them"
    content: >
      80% of buyers will buy again within 30-90 days. If you aren't going to sell them something, somebody
      else will. So after purchase, mail 11 different offers over the first 17 weeks.
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"

  - id: "HEUR-DK-462"
    title: "20% of people will take the more expensive option when presented with an AB choi"
    content: >
      20% of people will take the more expensive option when presented with an AB choice. Always offer an
      upsell — one in five will choose it without hesitation.
    source: "OMC CD/20 track 5 — Dan Kennedy"

  - id: "HEUR-DK-463"
    title: "List selection alone can move response from 0.05% to 2% — a 40x improvement. The"
    content: >
      List selection alone can move response from 0.05% to 2% — a 40x improvement. The only change between
      Frank Kern's failed and successful campaign was the list. Response lists (people who raised their
      hand) dramatically outperform compiled lists.
    source: "OMC DVD/07 — Craig Simpson (Frank Kern example)"

  - id: "HEUR-DK-464"
    title: "In photos for direct mail, more ordinary = higher response. Denim shirt + cowboy"
    content: >
      In photos for direct mail, more ordinary = higher response. Denim shirt + cowboy hat + dog
      outperforms suit and tie. Don't reveal the risky product until page 24-25 of a 56-page digest. Make
      the spokesperson look like the prospect, not like an expert.
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts photo testing)"

  - id: "HEUR-DK-465"
    title: "Removing a qualifier from a seminar invitation can increase response 5x. Dennis"
    content: >
      Removing a qualifier from a seminar invitation can increase response 5x. Dennis de Bergen example:
      when he stopped saying 'must have $500K in investable assets,' five times more people showed up.
    source: "OMC DVD/07 — Craig Simpson"

  - id: "HEUR-DK-466"
    title: "Track list seasonality at the list level, not just overall. Farmers work 8 days"
    content: >
      Track list seasonality at the list level, not just overall. Farmers work 8 days a week during
      harvest — they don't read mail. Mail them heavily in off-season, skip harvest entirely. The mailing
      that bombed was the 4th mailing during harvest.
    source: "OMC DVD/07 — Craig Simpson (farming list example)"

  - id: "HEUR-DK-467"
    title: "January is the best time to mail business opportunity offers. New Year's resolut"
    content: >
      January is the best time to mail business opportunity offers. New Year's resolutions = people
      looking for new ways to improve their life, make more money, pay off debt. Worst time: holidays
      (wallets light, too busy, not thinking improvement).
    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"

  - id: "HEUR-DK-468"
    title: "The $10 differentiator test: when testing a lead-sharing or drop-down product, a"
    content: >
      The $10 differentiator test: when testing a lead-sharing or drop-down product, a $10 price
      differential drives 15-20% response rate. Small enough not to be a barrier, large enough to qualify
      interest.
    source: "OMC CD/19 track 8 — Dan Kennedy"

  - id: "HEUR-DK-469"
    title: "Jeff Walker's $1.5M in 58 hours result — Product Launch Formula generated this f"
    content: >
      Jeff Walker's $1.5M in 58 hours result — Product Launch Formula generated this from a sideways sales
      letter sequence (prelaunch content) to an email list, not a single long sales letter.
    source: "OMC CD/16 tracks 2-3 — Jeff Walker"

  - id: "HEUR-DK-470"
    title: "Jeff Walker's certification event: $25K limited to 50 spots. 130 applied for 50"
    content: >
      Jeff Walker's certification event: $25K limited to 50 spots. 130 applied for 50 spots. Two-step
      pricing: $5K down, $20K from profits. This creates both scarcity and skin-in-the-game without full
      upfront barrier.
    source: "OMC CD/16 tracks 5-6 — Jeff Walker"

  - id: "HEUR-DK-471"
    title: "312 out of 2,300 surveyed said yes they would attend — that's proof by survey. U"
    content: >
      312 out of 2,300 surveyed said yes they would attend — that's proof by survey. Use the survey itself
      as a selling tool: 'We asked 2,300 people and 312 said yes, so we know there's demand.' The $800K
      bet framing amplifies this.
    source: "OMC CD/17 tracks 2-3 — Jeff Walker"

  - id: "HEUR-DK-472"
    title: "In B2B direct mail, 40% of registrations can come via fax. Don't eliminate respo"
    content: >
      In B2B direct mail, 40% of registrations can come via fax. Don't eliminate response channels just
      because they seem outdated — different audiences prefer different response mechanisms.
    source: "OMC DVD/07 — Dan Kennedy (financial advisor example)"

  - id: "HEUR-DK-473"
    title: "A viable list can be mailed more frequently than most people think. Ron Ipec mai"
    content: >
      A viable list can be mailed more frequently than most people think. Ron Ipec mailed the same booklet
      to auto repair shop owners every single month with no decline in response — only changed the color
      of the outside cover.
    source: "OMC DVD/07 — Dan Kennedy (Ron Ipec example)"

  - id: "HEUR-DK-474"
    title: "When switching features-to-benefits in copy, results can go from 20K pieces/year"
    content: >
      When switching features-to-benefits in copy, results can go from 20K pieces/year to 850K
      pieces/year. RegOnline example: same product, same list, transformed copy from feature-focused to
      benefit-focused.
    source: "OMC DVD/07 — Craig Simpson (RegOnline example)"

  - id: "HEUR-DK-475"
    title: "Expect 4-5% undeliverable rate even with clean lists. The Post Office doesn't kn"
    content: >
      Expect 4-5% undeliverable rate even with clean lists. The Post Office doesn't know what addresses
      are deliverable until they show up at the door. This is unavoidable baseline noise — factor it into
      economics.
    source: "OMC DVD/07 — Craig Simpson"

  - id: "HEUR-DK-476"
    title: "Direct sale states (Ohio, Utah, Indiana) are more responsive for opportunity off"
    content: >
      Direct sale states (Ohio, Utah, Indiana) are more responsive for opportunity offers than coastal
      states. When economics tighten, retard media buys to only the highest-performing geographies.
    source: "OMC DVD/07 — Dan Kennedy (Gold by the Inch)"

  - id: "HEUR-DK-477"
    title: "Realistic market sizing: 55K chiropractors total → 25K suspects → only 1,250 rea"
    content: >
      Realistic market sizing: 55K chiropractors total → 25K suspects → only 1,250 realistic buyers. The
      number who will actually buy is a small fraction of the total universe. Size your economics
      accordingly.
    source: "OMC DVD/06 — Dan Kennedy"

  - id: "HEUR-DK-478"
    title: "Birthday targeting for benchmark birthdays (40, 45, 50, 55, 60, 65) — people are"
    content: >
      Birthday targeting for benchmark birthdays (40, 45, 50, 55, 60, 65) — people are more receptive to
      opportunity/change messages at milestone ages when they reassess their life trajectory.
    source: "OMC DVD/06 — Dan Kennedy"

  - id: "HEUR-DK-479"
    title: "Don't show the downsell until after trying everything. The downsell is a safety"
    content: >
      Don't show the downsell until after trying everything. The downsell is a safety net, not a starting
      point. First try the full price, then the payment plan, then the premium option, only then the
      downsell.
    source: "OMC CD/20 track 6 — Dan Kennedy"

  - id: "HEUR-DK-480"
    title: "95% of Craig Simpson's 140 million+ pieces mailed have been to response-based li"
    content: >
      95% of Craig Simpson's 140 million+ pieces mailed have been to response-based lists because the
      difference in performance is that significant. Only one client ever had compiled lists outperform
      response lists.
    source: "OMC DVD/07 — Craig Simpson"

  - id: "HEUR-DK-481"
    title: "Halbert's sealed envelope technique in sneak-up mail: put everything except the"
    content: >
      Halbert's sealed envelope technique in sneak-up mail: put everything except the personal letter
      inside a sealed inner envelope marked 'open only after reading letter' to prevent the immediate 'oh
      I've been had' yuck reaction.
    source: "OMC DVD/07 — Dan Kennedy (crediting Gary Halbert)"

  - id: "HEUR-DK-482"
    title: "90% of Peter Lowe event buyers had other people's bags — they'd already bought f"
    content: >
      90% of Peter Lowe event buyers had other people's bags — they'd already bought from other speakers.
      Non-buyers left. The only people remaining to see Kennedy were proven buyers, which is why his
      closing percentage was 5-6x Zig Ziglar's.
    source: "OMC DVD/07 — Dan Kennedy"

  - id: "HEUR-DK-483"
    title: "When you can use multiple formats (postcard + envelope piece) on the same list,"
    content: >
      When you can use multiple formats (postcard + envelope piece) on the same list, there's virtually no
      dupe between responders. This lets you use the best list twice instead of finding a lesser list.
    source: "OMC DVD/07 — Dan Kennedy (Michael's dental business example)"

  - id: "HEUR-DK-484"
    title: "People in apartments are more transient than homeowners. Suburban markets are le"
    content: >
      People in apartments are more transient than homeowners. Suburban markets are less transient than
      urban. Lower affluence = more frequent moves. Use these selects to reduce undeliverable rates on
      compiled lists.
    source: "OMC DVD/07 — Dan Kennedy"

  - id: "HEUR-DK-485"
    title: "Jeff Walker's PLF results: $1,534,758 in 58 hours. $3.5 million in a single laun"
    content: >
      Jeff Walker's PLF results: $1,534,758 in 58 hours. $3.5 million in a single launch. $1.1 million in
      a single hour. $12,000 in a single second. 12 consecutive launches over $1 million, half over $3
      million.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-486"
    title: "PLF certification pricing: Product Launch Formula costs $2,000. The superset tra"
    content: >
      PLF certification pricing: Product Launch Formula costs $2,000. The superset training (Product
      Launch Manager) must be at least $4,000 — settled on $5,000, then escalated to $10,000 after live
      event positioned at $25,000.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-487"
    title: "PLF hyperresponsive leveraging: Surveyed 2,300 hyperresponsives — 312 said yes,"
    content: >
      PLF hyperresponsive leveraging: Surveyed 2,300 hyperresponsives — 312 said yes, 74.2% would hire a
      trained Product Launch Manager. Used this as proof: '228 clients just waiting for you, only 50
      spots.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-488"
    title: "PLF live event conversion: 50 spots, 130 applied, cherry-picked the top. $25,000"
    content: >
      PLF live event conversion: 50 spots, 130 applied, cherry-picked the top. $25,000 event sold as
      $5,000 down + $20,000 from profits. At event, offered $10,000 coaching to waive the $20,000 — 37-45
      of 50 took it.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-489"
    title: "PLF home study results: 440 units sold at $5,000 (also $1,000/mo x6 option) = ap"
    content: "PLF home study results: 440 units sold at $5,000 (also $1,000/mo x6 option) = approximately $2.5 million in sales."
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-490"
    title: "Nothing closes sales like a hard deadline. After the first 24 hours of a 58-hour"
    content: >
      Nothing closes sales like a hard deadline. After the first 24 hours of a 58-hour launch, announcing
      'closing tomorrow at midnight' spikes sales dramatically.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-491"
    title: "PLF Bill Glazer launch: Expected $100,000 from normal list promotion. With PLF l"
    content: >
      PLF Bill Glazer launch: Expected $100,000 from normal list promotion. With PLF launch, did
      $700,000-$750,000. First $100K to Glazer, 10% of upside to Walker.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-492"
    title: "Exclusivity pricing power: A UPS store is 150% more valuable than an independent"
    content: >
      Exclusivity pricing power: A UPS store is 150% more valuable than an independent packing ship place
      after 5 years, purely due to brand and territorial exclusivity.
    source: "DVD09"

  - id: "HEUR-DK-493"
    title: "Dean Martin house flipping: 60-80 houses bought, slept in, sold at 30-50% markup"
    content: >
      Dean Martin house flipping: 60-80 houses bought, slept in, sold at 30-50% markup purely because
      'Dean Martin lived here.' Demonstrates status adds to price elasticity.
    source: "DVD09"

  - id: "MM-DK-494"
    title: "The Reading Level Performance Model"
    content: >
      Fourth grade reading level produces highest response rates. Hemingway wrote at fourth grade level.
      Same ad rewritten from 8th grade to 4th grade reading level: MER jumped from 0.96 to 3.0. Works
      across all markets — health, finance, professional. HemingwayApp.com shows reading level, hard
      sentences.
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan: had his 8-year-old daughter read copy aloud — rewrote anything she stumbled over or couldn't understand"

  - id: "HEUR-DK-494"
    title: "In a well-run MLM opportunity meeting, more than 70% of the presentation is buil"
    content: >
      In a well-run MLM opportunity meeting, more than 70% of the presentation is building the
      dissatisfaction gap — the preamble — not the actual pitch.
    source: "DVD09"

  - id: "HEUR-DK-495"
    title: "Tom Shack's Health Source: 360-380 chiropractic clinics in 4-4.5 years, from 4."
    content: >
      Tom Shack's Health Source: 360-380 chiropractic clinics in 4-4.5 years, from 4. Nobody ever made
      franchise work in chiropractic before.
    source: "DVD09"

  - id: "HEUR-DK-496"
    title: "Mailing to non-buyers post-event always works. Peter Lowe tour: nobody else did"
    content: >
      Mailing to non-buyers post-event always works. Peter Lowe tour: nobody else did it, worked every
      single city, every single time. Pretty predictable results.
    source: "DVD09"

  - id: "HEUR-DK-497"
    title: "Only three reasons people don't buy (beyond crappy leads): 1) Price — actual or"
    content: >
      Only three reasons people don't buy (beyond crappy leads): 1) Price — actual or emotional inability
      to pay, 2) Don't like the shovel/vehicle itself, 3) Don't like or believe you.
    source: "DVD09"

  - id: "HEUR-DK-498"
    title: "20% of people will take the more expensive option. Always do A/B pricing with a"
    content: >
      20% of people will take the more expensive option. Always do A/B pricing with a premium tier — 20%
      will upgrade and give you a lot more money.
    source: "DVD10"

  - id: "HEUR-DK-499"
    title: "Go By The Inch lead qualification: Send a $10 offer with the package. 15-20% pai"
    content: >
      Go By The Inch lead qualification: Send a $10 offer with the package. 15-20% paid $10 for a video
      selling them the same thing. Those are now your hot leads for the telesharks.
    source: "DVD09"

  - id: "HEUR-DK-500"
    title: "Difficulty of getting professionals into a room goes up with two factors: chair-"
    content: >
      Difficulty of getting professionals into a room goes up with two factors: chair-side income value
      (money lost by being away) and ego size. Heart surgeons hardest, podiatrists easiest.
    source: "DVD09"

  - id: "HEUR-DK-501"
    title: "A client's sales team closing 7% first call, 15% total. The other 85% of unconve"
    content: >
      A client's sales team closing 7% first call, 15% total. The other 85% of unconverted leads get
      nothing but drip — that 85% should be getting FedEx packages, downsell offers, financing offers,
      teleshark calls.
    source: "DVD10"

  - id: "HEUR-DK-502"
    title: "If more calls are needed to close, that limits growth because reps can only do s"
    content: >
      If more calls are needed to close, that limits growth because reps can only do so many calls. Going
      from 6 calls to 9 calls per close directly constrains the number of prospects each rep can handle.
    source: "DVD10"

  - id: "HEUR-DK-503"
    title: "In the Carter years, every order form had a way to split the purchase across mul"
    content: >
      In the Carter years, every order form had a way to split the purchase across multiple credit cards.
      This accommodated real purchasing behavior rather than pretending everyone has unlimited credit.
    source: "DVD10"

  - id: "HEUR-DK-504"
    title: "Jeff Walker's Product Launch Manager first student result: Jonathan Drake — no l"
    content: >
      Jeff Walker's Product Launch Manager first student result: Jonathan Drake — no list, no product, no
      launch experience — $18,000 payday in first 10 days after the program.
    source: "DVD08-JeffWalker"

  - id: "HEUR-DK-505"
    title: "Surby dental assistant school insight: Buyers were all gray-haired dentists 3-7"
    content: >
      Surby dental assistant school insight: Buyers were all gray-haired dentists 3-7 years from
      retirement who discovered they couldn't exit. Exit strategy was infinitely more powerful than second
      income pitch.
    source: "DVD10"

  - id: "HEUR-DK-507"
    title: "In one-to-many selling, you have roughly 60-90 seconds in the open before people"
    content: >
      In one-to-many selling, you have roughly 60-90 seconds in the open before people start deciding
      whether to stay or leave. Establish credentials and relevance immediately.

  - id: "HEUR-DK-514"
    title: "Divide presentation length by 3 (if 60 min or less), by 6 (if 60-180 min), or by"
    content: >
      Divide presentation length by 3 (if 60 min or less), by 6 (if 60-180 min), or by 8-10 (if over 3
      hours). Those are your time-frames in which to deliver a headline, message, and tease. A 75-minute
      presentation divides into 12-13 bits each with a beginning, middle and non-end link to next bit.

  - id: "HEUR-DK-522"
    title: "Start Where Prospect IS, Not Where You Think They Should Be"
    content: >
      A very common mistake is making assumptions about where prospects are and starting further along
      than they are in the process towards making a decision. Salespeople get feedback face-to-face; we
      don't through media. Their engine either doesn't exist or still has a hand crank.
    source: "Secrets/transcription_mp3_CD3.txt"
    domain: "prospect-psychology"

  - id: "HEUR-DK-523"
    title: "We Grossly Underestimate How Scary We Are to Other People"
    content: >
      We grossly underestimate how scary we are to other people. Even with existing relationship (member,
      reader), people carry deep anxiety about trust. The last thing they want to know is: how can I feel
      it's okay to trust this person?
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "trust"

  - id: "HEUR-DK-524"
    title: "We Grossly Underestimate How Little Self-Confidence People Have"
    content: >
      We grossly underestimate how little self-confidence people have. Even people with eight years of
      college, professional practices, some measure of success. They have to borrow ours. They need
      stories that arouse 'if he can, I can' belief.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "psychology"

  - id: "HEUR-DK-525"
    title: "Personal Story = Proprietary Protection Against Knockoff"
    content: >
      Statements can be copied and diluted. Personal story really can't be. Personal story is proprietary
      and protected. In an era where barrier to knockoff is lower and lower, speed of knockoff faster and
      faster — story is your moat.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "positioning"

  - id: "HEUR-DK-526"
    title: "One Self-Deprecating Story Max Per Sales Piece"
    content: >
      Be careful not to use too many self-deprecating humor stories or you wound your status with your
      audience. In the same sales letter there's usually only room for one. In the same sales speech,
      usually only room for one, or you start to diminish your status.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "storytelling"

  - id: "HEUR-DK-527"
    title: "Internet Evil = Quantity Over Quality — 75% Less, Work on 25%"
    content: >
      One of the evils of the Internet is it has caused marketers to dramatically increase the quantity of
      their output and made them quick, sloppy and casual about a lot of it. Most people would be better
      off putting 75% less out and really working on the 25% to get it right.
    source: "Secrets/transcription_mp3_CD3.txt"
    domain: "copywriting"

  - id: "HEUR-DK-528"
    title: "Statement → Skepticism; Story → Curiosity + Interest"
    content: >
      Statement immediately manifests skepticism — people's guard goes up and they take the mental
      position 'I don't believe it, prove it.' If we start with a story, curiosity is aroused, interest
      can occur, and skepticism is set aside.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "copywriting"

  - id: "HEUR-DK-529"
    title: "Statements Require Authority; Stories Can CREATE Authority"
    content: >
      A statement requires authority — you immediately think 'who is this guy?' A story can even create
      authority. Tell a story about worldwide search, finding a guy in Nepal, cancer gone — and questions
      about your credentials are forgotten. They want to hear about Nepal.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "copywriting"

  - id: "HEUR-DK-530"
    title: "Every Franchise Reinvention Retells Origin Story"
    content: >
      Every time the Batman franchise is reinvented in movies (five times in my lifetime), the origin
      story must be told. Every time in graphic novels a new series is created, origin story must be told.
      Otherwise he's just a big, dumb, scary guy in a goofy suit.
    source: "Secrets/transcription_mp3_CD4.txt"
    domain: "storytelling"

  - id: "HEUR-DK-531"
    title: "Presentation That Works Is a Presentation That Works"
    content: >
      Media's changed, technology's changed, but a presentation that works is a presentation that works is
      a presentation that works. There are reliable psychological principles, reliable sales principles.
      Really haven't changed.
    source: "Secrets/transcription_mp3_CD3.txt"
    domain: "direct-response"

  - id: "HEUR-DK-533"
    content: >
      To crack a copy code: collect 12-24 historical controls plus 6-12 contemporary controls in the
      category. Read them all. Identify what appears in virtually every single one. Those commonalities
      are the code elements. Build a checklist from them.

  - id: "HEUR-DK-540"
    title: "Negative Motivation Outperforms Positive"
    content: >
      Of all options for selling improvement, opportunity, education, information, change — negative
      motivation works SO MUCH BETTER than positive motivation. Ambition to escape the unwanted is
      available in a larger number of people and easier to stimulate than ambition for gain or benefit.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "HEUR-DK-541"
    title: "Angry People Cannot Think Critically"
    content: >
      If we get them mad, they are incapable of analytical, critical, rational thought about the
      proposition. The mind can only hold one thing at a time. Mad people cannot evaluate price vs value,
      cannot exercise skepticism, cannot engage in analytical thought. We have distracted them from all
      the ways they figure out how NOT to buy.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "HEUR-DK-542"
    title: "90% Rule of Unused Purchases"
    content: >
      90% of books sold never have the shrink wrap taken off. At that moment in time, purchase was the
      same as accomplishment. It is in our best interest to let that confusion between purchase and
      accomplishment persist.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "buyer-psychology"

  - id: "HEUR-DK-543"
    title: "Secrets Never Wear Out"
    content: >
      Secrets they don't want you to know' as a copy approach NEVER wears out. 47% of Americans believe
      Elvis faked his death. People have insatiable appetite for secrets, conspiracies, suppressed
      knowledge, insider information. Mysticism is perhaps the most commercially powerful of the 7
      secrets.
    source: "Sorcery/transcription_mp3_CD1.txt"
    domain: "copywriting"

  - id: "HEUR-DK-544"
    title: "Successful People Are Hyper-Sensitive to Criticism"
    content: >
      Even if you sell to successful people, they are hyper-sensitive to criticism and imagined critical
      thoughts of others. The Forbes 400 get up every morning worrying about this. Almost everybody walks
      around wondering what somebody else is thinking about them — for the most part, nobody's thinking
      about them at all. But it IS there and you can use it.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "buyer-psychology"

  - id: "HEUR-DK-545"
    title: "No Space For Non-Selling Content"
    content: >
      If it does not further the sale: it does not earn its space on the page, its minutes in the video,
      its minutes on stage. Speakers get bored and put in topical content that interests them — this is an
      unforgivable sin because it displaces something that advances the sale.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "copywriting"

  - id: "HEUR-DK-546"
    title: "Write Copy First, Figure Out Deliverable Second"
    content: >
      As a copywriter, I had to help him realize he had five elegantly simple things that could be done in
      a practice — because I wrote the copy first and then we figured out what the five elegantly simple
      things were. But he actually does have them. The copy creates the frame, then the deliverable fills
      it.
    source: "Sorcery/transcription_mp3_CD2.txt"
    domain: "copywriting"

  - id: "HEUR-DK-547"
    title: "One-Percenters vs Monetizing Everyone"
    content: >
      If you only sell to one-percenters it's very hard to make that business work. You must appeal to the
      actual ambition that a large percentage start out with — ambition to escape the unwanted, not
      ambition to be better, bigger, richer, healthier, thinner. You must monetize unconverted leads and
      everyone who touches you.
    source: "PDFs/transcription_pdf_Sorcery7SecretsofMindControlCopy.txt"
    domain: "business"

  - id: "HEUR-DK-548"
    title: "P.S. Is Second-Most-Read Element After Headline"
    content: >
      The postscript (P.S.) is the second-most-read element of any sales letter. Many readers skip to the
      end first. The P.S. must: (1) restate the main offer, (2) add urgency/scarcity, (3) introduce a new
      benefit not mentioned above, or (4) provide a final emotional push. Never waste a P.S. on
      administrative details. Multiple P.S. lines (P.P.S., P.P.P.S.) are acceptable and common in winning
      letters. DK's swipe file shows 4+ pages of P.S. examples — indicating he considers this system
      critical to conversion.
    source: "PDFs/transcription_pdf_System9Postscripts.txt"
    domain: "copywriting"

  - id: "HEUR-DK-549"
    title: "Segues Must Be Invisible — Reader Should Never Feel Transition"
    content: >
      Segues (transitions between sections of a sales letter) must be invisible to the reader. If the
      reader notices a transition, the flow is broken and you risk losing them. Proven segue patterns from
      DK's swipe file: - Story continuation ("But that's not all...") - Question bridge ("Now you might be
      wondering...") - Benefit bridge ("And here's the best part...") - Proof bridge ("Don't just take my
      word for it...") - Urgency bridge ("But you need to act now because...") The segue section is the
      smallest system (2 pages) because good segues are SHORT — 2-3 sentences maximum.
    source: "PDFs/transcription_pdf_System8Segues.txt"
    domain: "copywriting"

  - id: "HEUR-DK-550"
    title: "Opening Must Do One of Three Things in First Paragraph"
    content: >
      The opening paragraph of a sales letter must accomplish one of three things immediately: (1)
      Identify the reader and their pain ("If you're a [type] who struggles with [problem]..."), (2) Make
      a bold promise or claim ("In the next 3 minutes, you'll discover..."), or (3) Tell a story that
      mirrors the reader's situation ("Last Tuesday, I got a call from..."). DK's swipe file shows 12
      pages of openings — ALL fall into these three categories. The opening is the bridge between headline
      (which grabbed attention) and body copy (which builds the case). Lose them here = lose the sale.
    source: "PDFs/transcription_pdf_System3Openings.txt"
    domain: "copywriting"

  - id: "HEUR-DK-551"
    title: "Trust Gestation Accelerated by Contact Frequency"
    content: >
      Trust gestation period can be dramatically shortened by increasing contact frequency. DK states that
      doubling contact frequency can reduce trust gestation by approximately 50%. The rule: if monthly
      contact takes 12 months to build trust, weekly contact can achieve it in 3 months. Sequential
      multi-step campaigns (mail + email + phone + in-person) compress trust timelines further. For
      affluent markets, the minimum is 7 meaningful contacts before asking for a major commitment. Each
      contact must deliver VALUE, not just visibility.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 45-60)"
    domain: "affluent-marketing"

  - id: "HEUR-DK-552"
    title: "Enrollment Process Control — Info Behind First Money Movement"
    content: >
      DK teaches that the detailed information about high-ticket offers should be placed BEHIND a first
      money movement. Do not give away the full picture for free. Require a Discovery Day fee, a
      diagnostic fee, an application fee — anything that creates a financial commitment before full
      disclosure. This serves two purposes: (1) qualifies serious buyers, and (2) creates commitment
      consistency (having paid once, they are more likely to pay again). The first money movement does not
      need to be large — it needs to be REAL. Even $49 changes the psychology completely.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 155-170)"
    domain: "affluent-marketing"

  - id: "HEUR-DK-553"
    title: "Recognition and Appreciation Are #1 Referral Triggers"
    content: >
      The #1 driver of referrals in affluent markets is NOT satisfaction — it is RECOGNITION and
      APPRECIATION. When clients feel recognized (named in newsletters, invited to exclusive events, given
      titles like Founding Member or Advisory Board) and appreciated (unexpected gifts, handwritten notes,
      personal attention), they refer. DK gives the cocktail party test: will this experience give my
      client something to TALK ABOUT at a cocktail party? If yes, they will refer. If no, no matter how
      satisfied, they will not.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 160-175)"
    domain: "affluent-marketing"

  - id: "HEUR-DK-554"
    title: "Niche + Passion or Legacy = Maximum Price Suspension"
    content: >
      The combination of targeting a specific NICHE plus connecting to the buyer's PASSION or LEGACY
      produces maximum price suspension. Generic offers to generic audiences produce price sensitivity.
      Specific offers to people whose identity is wrapped in the purchase category produce price
      blindness. DK examples: horse people, boat people, car collectors, wine enthusiasts. When the
      purchase connects to WHO THEY ARE (passion) or WHAT THEY LEAVE BEHIND (legacy), price becomes a
      non-factor. The marketer's job: find the niche, find the identity connection, and market to that
      intersection.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 30-45)"
    domain: "affluent-marketing"

  - id: "HEUR-DK-555"
    title: "Online Attention Span = 3.5 Minutes vs 11 Without Computer"
    content: >
      DK cites research showing online attention span averages 3.5 minutes, while attention span away from
      a computer averages 11 minutes. This 3x differential means the SAME MESSAGE must be delivered
      differently depending on medium. Online: shorter, punchier, multimedia, with frequent pattern
      interrupts. Offline (direct mail, in-person): longer form, more detailed, story-driven. For affluent
      markets, DK strongly advocates OFFLINE media (direct mail, printed newsletters, in-person events)
      because the longer attention span allows for the trust-building narrative that high-ticket requires.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 177-182)"
    domain: "affluent-marketing"

  - id: "HEUR-DK-556"
    title: "Discovery Day > Seminar > One-on-One > Mail for High-Ticket"
    content: >
      For high-ticket affluent sales, DK ranks conversion methods: (1) Discovery Day (prospect visits your
      location, immersive experience) — HIGHEST (2) Group Seminar (live, in-person, limited attendance)
      (3) One-on-One Meeting (personal but less social proof) (4) Direct Mail Sequence (lowest conversion
      but highest reach) The principle: the MORE immersive and personal the experience, the higher the
      conversion rate for affluent buyers. Discovery Days combine environmental control, personal
      attention, social proof (other attendees), and commitment (they traveled to attend). Each step down
      the hierarchy trades conversion rate for reach.
    source: "transcription_pdf_Marketing_to_the_Affluent_Transcript.txt (pages 170-180)"
    domain: "affluent-marketing"

  - id: "HEUR-DK-557"
    title: "1 Hour Protected = 10-20 Hours Distracted"
    content: >
      One hour of truly productive time — liberated from distractions, phone calls, email, interruptions —
      is equivalent to ten or twenty hours of the typical entrepreneur or executive working in a 70-hour
      week with constant interruption. DK says: if the new 40-hour workweek is actually 70 hours (per
      Forbes), and those 70 hours produce maybe 1 hour of truly undistracted productive time, then
      protecting even a few hours per day creates a 10-20x multiplier. The implication: it is more
      valuable to PROTECT 2 hours than to ADD 10 hours of interrupted work.
    source: "transcription_mp3_Tim_Ferriss_Bonus.txt"
    domain: "time-management"

  - id: "HEUR-DK-558"
    title: "Constant Surprising Beats Predictability in Retention"
    content: >
      For continuity/membership programs, predictability kills retention. DK observes that info-marketers
      who deliver the SAME format every month (predictable newsletter, same structure, same length) see
      higher churn than those who CONSTANTLY SURPRISE members. Surprise formats include: unexpected
      bonuses, guest expert interviews, physical gifts, format changes, special reports, handwritten
      notes, irregular delivery timing. The psychology: predictability allows the member to evaluate
      rationally ("do I still need this?"), while constant surprise triggers curiosity and anticipation
      ("what will come next?"). Surprise is the enemy of cancellation.
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "marketing"

  - id: "HEUR-DK-559"
    title: "Physical Newsletter Creates Ritual — Digital Does Not"
    content: >
      A physical newsletter that arrives in the mail creates a RITUAL: the member anticipates it, opens it
      with ceremony, reads it in a specific place, saves it. Digital-only delivery does NOT create this
      ritual — emails are scanned, PDFs are filed and forgotten. DK presents a case study: a marketer who
      switched from physical+digital to digital-only saw retention DROP dramatically, then restored
      physical and retention recovered. The physical object has psychological weight that digital cannot
      replicate. DK recommends physical newsletter as the ANCHOR of any continuity program, supplemented
      by digital, not replaced by it.
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "marketing"

  - id: "HEUR-DK-560"
    title: "Party Guest Is Not Obligated to Invite You Back"
    content: >
      When you speak at someone else's event, write for someone else's publication, or appear on someone
      else's platform — you are a GUEST at THEIR party. The host is NOT obligated to invite you back,
      feature you again, or continue the relationship. Too many marketers treat JV/guest opportunities as
      entitlements rather than privileges. The correct response: deliver extraordinary value as a guest,
      make the host look brilliant for inviting you, follow up with genuine gratitude, and EARN the next
      invitation through results, not expectation. The guest who makes the host look good gets invited
      back. The guest who treats it as his own platform gets one shot.
    source: "transcription_pdf_Don_t_Waste_Time_02-10_Info_Letter_Special_Report.txt"
    domain: "business-strategy"

  - id: "HEUR-DK-561"
    title: "Never Take the Next Winner for Granted"
    content: >
      DK warns: "I happen to know a helluva lot about creating winners. I do it regularly and repeatedly.
      But even I do NOT do it every time." Jordan missed more game-deciding shots than he made. When you
      have a winner, you should do everything possible to: (a) EXTEND it, (b) EXPAND it, (c) RE-USE it,
      (d) get someone ELSE to use it (affiliates, JV partners, distributors). DK attributes this to having
      been broke — "Cars repossessed, no heat, checks bouncing, bill collectors at the door, humiliated in
      bankruptcy court. I know broke." Leaving a proven opportunity under-exploited is "an insult to the
      gods, an invitation for punishment. Be afraid. Be very afraid."
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "HEUR-DK-562"
    title: "Foundation Story Must Be Repeated Ad Nauseum"
    content: >
      You will think they all know your core story. You are wrong. You will think they are sick of hearing
      it. Wrong. DK tells of a 15+ year Member who recently felt he had to share how DK's "cat who licked
      stamps" story encouraged him — despite it appearing in print many times and being told repeatedly.
      The individual hears it ONCE, when it means something to them. Like detective fiction where readers
      do NOT want characters to change (Nero Wolfe should never drop 100 pounds and take up
      skateboarding), your audience wants your foundation to be consistent, familiar, and omnipresent. Zig
      Ziglar wisely pumped the pump and told the Biscuits, Fleas, and Pump-Handles story all the way to
      the last speech.
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "HEUR-DK-563"
    title: "Spaced Repetition Learning for Customer Indoctrination"
    content: >
      DK used to get better indoctrination results by pushing spaced repetition learning — getting
      customers to listen to the same instructional recordings 7 to 21 times. He used to push "sleep
      learning": listening repetitively every night with a pillow-speaker so material could be embedded in
      the subconscious while the conscious mind dozed. Depending on what you "told" them, sticking and
      being recalled days/weeks/months later is a losing proposition with no reinforcement basis. The
      solution: New Customer-Member Training Classes (like GKIC Fast Start Implementation Boot Camps) that
      can be delivered exactly the same, literally forever. You cannot think "okay, we TOLD them" and that
      is done.
    source: "transcription_pdf_How_to_Create_Sales_Assets.txt"
    domain: "marketing"

  - id: "HEUR-DK-564"
    title: "PR + Advertising Work Synergistically — Layer PR Into Every Campaign"
    content: >
      From the Cesari discussion, DK endorses the principle that PR layered with advertising creates
      synergistic results. When Juice Man went to a city, they ran local TV time AND local PR
      simultaneously. "People are skeptical when they see just advertising. When you layer in the PR and
      the media is talking about it, it adds a level of credibility that works synergistically with the
      advertising." This applies at local and national level. The method used in 1989 (TV appearances →
      free recipe offer → capture addresses → sell via mail) is the same model today (media appearances →
      drive to website → capture leads → sell via funnel). One media appearance for Juice Man generated
      12,000 responses.
    source: "transcription_pdf_The_Principal_of_Selling.txt"
    domain: "marketing"

  - id: "HEUR-DK-565"
    title: "True Mastermind Max 20 Members — Beyond That, Value Degrades"
    content: >
      "The mastermind group meeting for 2 days maxxed out, in my experience, at 20 members. If you go
      beyond that number, I can't imagine how you give each member a fair turn, a reasonable amount of
      time and provide enough value yourself through your contributions." DK's current Titanium has 19
      members and needs one full day (8AM-5:30PM) plus short evening (6:30PM-8:30/9:00PM) plus 2nd day
      ending at 4PM. This "taxes their ability to focus." Format: approximately 25% sharing
      contacts/resources, 25% business report, 25% problem/opportunity presentation, 25% discussion.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "HEUR-DK-566"
    title: "1% Easy / 5% Hard / >5% Impossible — Customer Base to Seats Ratio"
    content: >
      Concrete thresholds for mastermind group viability based on customer base size: 1% = EASY to fill
      (positions needed = 1% of active customers) 5% = DIFFICULT but doable >5% = Very very difficult if
      not impossible (especially year 2, 3+) Example: If you have 2,000 active customers and need 20
      mastermind seats, that's 1% = easy. If you have 400 customers and need 20 seats, that's 5% =
      difficult. If you have 200 customers and need 20 seats, that's 10% = "you're in trouble." The key
      insight: "typically, a lot of new blood is needed" — so flow of new customers matters as much as
      total base.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "HEUR-DK-567"
    title: "Cold CPS for Mastermind: $6,000-$16,000 Per Sale"
    content: >
      When selling coaching/mastermind groups direct to cold leads (bypassing ascension model): "In
      niches, in instances I've worked with over the past 5 years, the CPS has ranged from $6,000 to
      $16,000." Contrast this with ascension model where CPS "can be nearly zero" because members have
      already been nurtured through the pyramid. This massive cost difference explains why most
      info-marketers should build the ascension infrastructure rather than selling mastermind groups cold.
      The cold model works best "for a leader very busy with a successful core business, for whom creating
      and running a pyramid info-biz is impractical."
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "sales"

  - id: "HEUR-DK-568"
    title: "Big Groups: 1-Year-and-Out Rate Is High, Max 2-3 Year Retention"
    content: >
      Large (fake) mastermind groups "usually have poorer year to year or long term retention, typically
      no more than 2 to 3 years per participant, and the 1 year and out rate is high, so you need a source
      and means of re-filling the larger group continuously." Small true mastermind groups (DK's model)
      have "very high year to year renewal rate" — DK's Platinum ran 11 consecutive years. The key
      difference: small groups create higher caliber, closer commonality, which assures value for
      everybody (not just during their own turn). From operational standpoint: "small number of available
      spots leveraged against a large list of candidates are the best position to be in."
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "HEUR-DK-569"
    title: "Bundled Items: Deduct Gross Revenue They'd Buy Anyway from Mastermind Net"
    content: >
      DK warns against bundling too much into mastermind fees, especially making paid events free to
      members: "You have to honestly and carefully evaluate the economics of this: the gross revenue from
      any items they would likely buy if not in mastermind gets deducted from the net of the mastermind
      fee (after all expenses), to reveal what you are really paid for mastermind." DK prefers deep
      discounts but "still their skin in the game" rather than free access. The perk members want most is
      access to the leader — and that "must be carefully controlled — but never 'loose' so it can be taken
      for granted." Zero-balance itemized invoices each month showing the bundle value is recommended.
    source: "transcription_pdf_Mastermind_Special_Report_8_24.txt"
    domain: "business-model"

  - id: "HEUR-DK-570"
    title: "90-Day Transformation Window for Magnetic Marketing Implementation"
    content: >
      Multiple case studies show 90-day transformation: Dave Dee went from 3 shows/month to 25 shows/month
      in 90 days. Bill Tuscher took service business from $50K/month to $80K/month in 90 days ($360K
      annual revenue change). DK's explanation: "Maybe it takes them 89 days to get the first thing right
      out the door... dealing in many cases with multi-step campaigns stretched over two months." The
      90-day window reflects the time to implement fill-in-the-blank templates and run a full multi-step
      campaign cycle.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "HEUR-DK-571"
    title: "3x to 10x ROI Boost from Direct Response vs Brand Marketing"
    content: >
      DK claims direct response marketing within the Magnetic Marketing format "typically gives about a
      three times to a ten times boost in return on investment" compared to conventional marketing
      approaches. This applies across all industries — retail (Garder's Mattress), fitness (Iron Tribe),
      dental (Donna Galante — Invisalign), chiropractic (Tom Shack), real estate (Craig Proctor), B2B,
      e-commerce (Spindler at kidsbullfree.com with 2M customers).
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "HEUR-DK-572"
    title: "$14 Return per $1 Spent — The Keith Lee 22-Year Campaign"
    content: >
      Keith Lee took a campaign from Magnetic Marketing for his B2B niche business roughly 22 years ago.
      Used it every single year without changing it (except adding a website response option recently).
      Returns: roughly $14 for every $1 spent in direct revenue. Total direct revenue: almost $2M. Total
      back-end lifetime value stacked over 22 years: $20-30M. This demonstrates the concept of marketing
      ASSETS vs marketing ACTIVITIES — a single campaign created once producing returns for over two
      decades.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "HEUR-DK-573"
    title: "4x Response Rate from Timing — Hearing Aid After Spouse Death"
    content: >
      A male who fits the hearing aid demographic profile is "four times more likely to respond to
      marketing about hearing aids between the third and sixth month after the death of his spouse than at
      any other time in his life." Reason: "He just lost his human hearing aid." During marriage, the
      spouse compensated. After death, 90 days of isolation/grief, then at 3 months he starts socializing
      again and discovers the gap. Timing data is commercially available (obituary records, public death
      records). This 4x multiplier demonstrates the power of behavioral timing over pure demographics.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "HEUR-DK-574"
    title: "Birthday Week Timing Multiplier for Skincare Marketing"
    content: >
      In the skincare business, if marketing arrives during the week of a 50-68 year old woman's birthday,
      "it'll be more effective than if the same marketing arrives to the same person at any other time
      during the year." DK's tactical implication: "Take the list we would mail, cut it into 12 based on
      birthday month, and spend all your money aiming at the ones who have higher susceptibility."
      Birthday data is commercially available. This applies the timing principle to optimize spend
      allocation.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "HEUR-DK-575"
    title: "Donna Galante — Most Expensive + Double-Digit Growth Despite 2x Competitors"
    content: >
      Donna Galante built the largest, most successful, most profitable Invisalign practice in America
      using Magnetic Marketing. In 3 years, went from 19 competitors to 38 competitors circling around
      her. She is the most expensive one of all, yet has double-digit year-over-year growth. Demonstrates
      that Magnetic Marketing + premium positioning can outperform price competition even when competitor
      density doubles.
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "HEUR-DK-576"
    title: "Highest Paid Celebrity DJ = $58M = Justin Bieber — Marketing Pays, Bartending Doesn't"
    content: >
      DK's income disparity illustration: in Las Vegas, the highest paid celebrity DJ earned $58M in one
      year — identical to Justin Bieber's gross earnings. Meanwhile, the bartender (who provides the
      actual deliverable — the drinks) works for minimum wage plus tips. "You can't do low-wage work and
      expect high pay. The high pay is all tied to the ability to acquire a customer, sell to customers,
      keep customers, multiply customers — functions of marketing."
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "HEUR-DK-577"
    title: "$19,400 Day Rate for Marketing Consultation vs Dermatologist Staff Pay"
    content: >
      DK client: large multi-office dermatology practice in New York. Chief expert dermatologist. "His
      chief problem in life is getting enough patients through the doors." Sitting in a room with DK
      paying $19,400 for one day to talk about marketing. "He is not paying all the dermatologists that
      much together." It's infinitely easier to hire and train good dermatologists than to hire somebody
      who can feed all those practices with patients. "If you want to master something tied to the highest
      compensation available, you'll master the marketing."
    source: "transcription_mp4_1.txt"
    domain: "marketing"

  - id: "HEUR-DK-578"
    title: "Patrick Heller: Screen Printer $100K → $312K in One Year with Magnetic Marketing"
    content: >
      Patrick Heller, a screen printer (customized t-shirts), went from $100K to $312K annual revenue in
      one year using Magnetic Marketing. 3x revenue growth in a commoditized industry (printing) by
      applying direct response principles. Evidence that Magnetic Marketing works even in low-margin,
      seemingly undifferentiated service businesses.
    source: "transcription_mp4_2.txt"
    domain: "marketing"

  - id: "HEUR-DK-579"
    title: "The Dirty Little Secret of Copywriters — List Is More Important Than Copy"
    content: >
      DK reveals the "dirty little secret among copywriters": list selection (who you're mailing to) is
      "at least as important, if not more important, than the message itself and the expertise invested in
      the craftsmanship of the message." If you get targeting really right, "a mediocre message will do
      the job" and you might waste money climbing the copywriter food chain. On the other hand, "if you
      get this really wrong, nobody's going to conquer that hill." Applied: invest more time in list
      research than in copy perfection.
    source: "transcription_mp4_2.txt"
    domain: "copywriting"

  - id: "HEUR-DK-580"
    title: "279 Touches Per Year Benchmark"
    content: >
      We're touching most members at least 279 times a year. 365 days — a little short, but 279 is a
      pretty good number. Don't go more than 2-3 days without at least an attempt for another touch.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-581"
    title: "7-Day Maximum Contact Gap"
    content: >
      Seven days is about as far as you can let them go without losing them. If primary connection occurs
      once a month, you have 29 days of value loss before you try to pump it back up — bad equation.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-582"
    title: "Phone Should Ring 3-4 Days After Expected Delivery"
    content: >
      If you want the acid test, don't send your stuff out for a month and see how many call. If the phone
      ain't ringing 3-4 days after it usually gets there, you got problems.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-583"
    title: "Higher Ascension = Lower Attrition"
    content: >
      Almost without exception, the more they ascend, the longer they stay. Worst attrition at lowest
      level, least attrition at highest level.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-584"
    title: "Document Value or It Doesn't Count"
    content: >
      If you are delivering value, you damn well better document it and demonstrate it. Don't leave it up
      to them to connect the dots. If they tell you their business doubled, two weeks from now they won't
      remember.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-585"
    title: "Always Include Print and Audio in Multimedia"
    content: >
      Always print included in multimedia approach. People listen to more than they read. A 60-minute
      audio CD transcribed is a lot of words they wouldn't read but will listen to. Audio conveys
      personality better than print.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "direct-mail"

  - id: "HEUR-DK-586"
    title: "Fan Mail and Shrine as Relationship Metric"
    content: >
      Are they writing like they would to Elvis? Do they have a shrine? Are they sending gifts, cookies,
      quilts? Did members of your herd make something for you? These subjective measurements indicate herd
      health.
    source: "8 Lords of List Building/transcription_mp3_1.txt"
    domain: "list-management"

  - id: "HEUR-DK-612"
    title: "30% Empathetic Statements Rule"
    content: >
      If you take a highlighter and go through looking for empathetic statements with the owner of a
      business, you're going to find roughly 30 percent of the book is empathetic statements.
    source: "transcription_mp4_video_2.txt"
    context: "DK's own writing proportion"

  - id: "HEUR-DK-613"
    title: "Multiple Bridges > Single Bridge"
    content: >
      Multiple bridges are even better than one. The more you integrate empathetic/affinity statements in
      what you do, the more people are likely to abdicate to you.
    source: "transcription_mp4_video_2.txt"
    context: "Rapport bridge stacking"

  - id: "HEUR-DK-614"
    title: "F.O.R.M. Sequence: Land Where They're Comfortable"
    content: >
      Go Family → Occupation → Recreation → Money. If they don't seem responsive to one topic, move on.
      You will land with everybody in one of these. That's where they'll be comfortable.
    source: "transcription_mp4_video_2.txt"
    context: "MLM standard teaching for stranger rapport"

  - id: "HEUR-DK-615"
    title: "Disclosure + Declarative + Question + Follow-Up"
    content: >
      Formula for each F.O.R.M. topic: disclosure with some kind of declarative statement, a related
      question, and a follow-up question if there's positive response.
    source: "transcription_mp4_video_2.txt"
    context: "Conversation structure within each F.O.R.M. category"

  - id: "HEUR-DK-616"
    title: "Second-Party Affinity for Non-Match"
    content: >
      If you don't match somebody, use second-party affinity: 'My grandfather had a bakery.' At worst: 'I
      love donuts.' Gets you into the conversation even without direct match.
    source: "transcription_mp4_video_2.txt"
    context: "When direct affinity doesn't exist"

  - id: "HEUR-DK-617"
    title: "Today Family = Kids AND Pets"
    content: >
      Family used to be just kids. Today it's kids and pets. Boomers and up are just as likely to show pet
      pictures as kid pictures. They're called pet parents. It's a rapport bridge.
    source: "transcription_mp4_video_2.txt"
    context: "Updated F.O.R.M. for modern audience"

  - id: "HEUR-DK-618"
    title: "Proactive Full Disclosure Neutralizes Attack"
    content: >
      Trump is as unapologetic as you can possibly be about being rich. Therefore he can't get caught at
      it. Romney tried to hide it and every time he got caught, it hurt him. Massive disclosure = can't be
      used against you.
    source: "transcription_mp4_video_3.txt"
    context: "Trump vs Romney strategy comparison"

  - id: "HEUR-DK-619"
    title: "Never Arrive on the Shuttle"
    content: >
      Always have a car and a driver even if it's five minutes. Never be seen arriving on the airport
      shuttle. Never walk alone — always have someone with clipboard. The optics say 'this person is
      important.
    source: "transcription_mp4_video_5.txt"
    context: "DK's personal optics rules for events"

  - id: "HEUR-DK-620"
    title: "Flag Excess Principle"
    content: >
      You never see Trump with two American flags. There's like 20 of them. Visual abundance of symbols =
      perception of power. Not accident — deliberate staging.
    source: "transcription_mp4_video_5.txt"
    context: "Trump announcement speech analysis"

  - id: "HEUR-DK-621"
    title: "Repeat Command 3x With Strong Word"
    content: >
      Cochran said 'If it doesn't fit, you must acquit' three times. The word 'must' is much more powerful
      than 'have to.' Repetition + strong command word = embedded in memory.
    source: "transcription_mp4_video_5.txt"
    context: "OJ trial command analysis"

  - id: "HEUR-DK-622"
    title: "Postcard = You're a Midget"
    content: >
      Sending a postcard to launch yourself as the expert says: this isn't very important and you're small
      time. That's what I can easily deduce. Better to send Craig's Magic Box — sealed, official labels,
      book, golden ticket.
    source: "transcription_mp4_video_5.txt"
    context: "UK optometrist marketing critique"

  - id: "HEUR-DK-623"
    title: "Make Them Feel Superior"
    content: >
      If you want people to like you and want to be around you and to confide in you: simply make them
      feel better about themselves AND superior to others. Then they will want to be around you, stay with
      you, and give you money.
    source: "transcription_mp4_video_2.txt"
    context: "FBI agent formula for influence"

  - id: "HEUR-DK-624"
    title: "Chiropractor Pin System Results"
    content: >
      Copy the Amway pin system for compliance and referrals. Monthly patient luncheon with ritualistic
      recognition. Result: 600 people at lunch, 100 patients, 500 spectators. Walk out with 50 new
      appointments easily.
    source: "transcription_mp4_video_4.txt"
    context: "Single doctor to $3M/year practice in 3 years"

  - id: "HEUR-DK-625"
    title: "Symbols Carry Meaning: Leather + Gold = Bible"
    content: >
      Neil Strauss's 'The Game' — leather bound, gold edges, red bookmark. Instantly looks like the Bible.
      Very deliberate. Symbols telegraph importance and category without saying a word.
    source: "transcription_mp4_video_5.txt"
    context: "Symbol analysis — Roman columns = power, Cadillac = arrived"

  - id: "HEUR-DK-626"
    title: "Never Do A Demo You Don't Control The Outcome Of"
    content: >
      You never do a demo that you don't know the outcome of. Control it. If you can rig it, rig it. If
      you don't have to rig it (because all results are bad like inbound calls), then you don't need to.
    source: "transcription_mp4_video_6.txt"
    context: "Rigged phone demo, inbound call mystery shops"

  - id: "HEUR-DK-627"
    title: "Some Demos Don't Need Rigging"
    content: >
      Mystery shop inbound calls at any business — they're all awful. You don't have to rig that demo
      because they all suck. The smart ass who says 'not mine' is always the worst. You can do that demo
      all day with any company.
    source: "transcription_mp4_video_6.txt"
    context: "Jay Abraham's chiropractor mystery shop demo"

  - id: "HEUR-DK-628"
    title: "Make The Demo Easy, Not Hard"
    content: >
      Houdini says it's easier to do the straight jacket escape hanging upside down from a crane because
      they can't see what you're doing. When you do your demo, think: how can I make it easy, not hard?
    source: "transcription_mp4_video_6.txt"
    context: "Houdini's brother vs Houdini — same trick, better staging"

  - id: "HEUR-DK-629"
    title: "Label It More Difficult (Even If It's Easier)"
    content: >
      When I teach psychic selling — what you LABEL stuff makes a big difference. I say 'this is going to
      be even more difficult.' It's actually not more difficult. It's actually easier. But the label
      elevates the perceived achievement.
    source: "transcription_mp4_video_7.txt"
    context: "37 vs 86 number force — second is 'harder' but actually more controlled"

  - id: "HEUR-DK-630"
    title: "Harvesting Technique"
    content: >
      Ask for 68, then separately ask for 86, then have everyone keep hands up. It LOOKS like almost 100%
      got it right. This is called harvesting — aggregate multiple partial successes to create impression
      of total success.
    source: "transcription_mp4_video_7.txt"
    context: "Mentalism harvesting applied to proof/testimonials"

  - id: "HEUR-DK-631"
    title: "Use The Stat That's Most Favorable"
    content: >
      Arizona State: '85% of graduates are recruited within 90 days.' Recruited = got a job interview.
      They use this because the hired stat is probably low. Always use the statistical framing that sounds
      biggest.
    source: "transcription_mp4_video_8.txt"
    context: "Weasel language in academic/marketing statistics"

  - id: "HEUR-DK-632"
    title: "If 5-6 Big Numbers Boom-Boom-Boom, They're Gone"
    content: >
      If they hear like five or six big numbers boom boom boom boom they're gone. They just assume you're
      it. Stack multiple impressive-sounding numbers in sequence for maximum persuasive impact.
    source: "transcription_mp4_video_8.txt"
    context: "Proactiv '#1 selling' + Invisalign '2 million' pattern"

  - id: "HEUR-DK-633"
    title: "Declare War On The Establishment From Day One"
    content: >
      Starting in 1978 after I quickly determined the whole thing was run by idiots, I crapped on the
      establishment. There was already a bunch of people there thinking 'this doesn't make sense.' They
      were just waiting for someone to validate it.
    source: "transcription_mp4_video_9.txt"
    context: "NSA, chiropractic, traditional advertising — same playbook"

  - id: "HEUR-DK-634"
    title: "Get-Out-Of-Jail-Free Card"
    content: >
      When you have a devil, anything you do that doesn't work is not your fault — it's the fault of the
      devil who won that battle. Which makes it all the more important for your people to band together
      against this evil.
    source: "transcription_mp4_video_9.txt"
    context: "Enemy/villain criterion #6"

  - id: "HEUR-DK-635"
    title: "Foreign Invader > Inside Enemy"
    content: >
      The devil ideally is an invader, a foreigner from outside, not from inside. Walmart is most
      effective as villain when opening NEW store — invading an area. Obama is invading healthcare with
      external government force.
    source: "transcription_mp4_video_9.txt"
    context: "Enemy/villain criterion #7"

  - id: "HEUR-DK-636"
    title: "40% Of Warm Prospects Won't Cross The Final Threshold"
    content: >
      Financial advisor: 60% book from seminars. That means 40% who already answered an ad, registered,
      drove there, sat through the presentation — still don't book. The last threshold (bring records, get
      examined) is too high.
    source: "transcription_mp4_video_10.txt"
    context: "Financial advisor seminar conversion analysis"

  - id: "HEUR-DK-637"
    title: "Optional Thresholds: High + Low"
    content: >
      Don't just have one threshold. Offer: 'Want to jump? Here's a high one. Don't want to jump? Here's a
      low one, just step over.' The low threshold (free report, recorded message) reduces dinner
      attendance by ~15% but creates a whole new lead list.
    source: "transcription_mp4_video_10.txt"
    context: "Dr. Hawkins diabetes seminar + 'undecided' video landing page"

  - id: "HEUR-DK-638"
    title: "Aggressive Intrusion Requires Permission First"
    content: >
      Aggressive and persistent intrusion works only AFTER someone's permission. If they said 'yeah, I
      want to hear more about hearing aids,' the door is open. Before that, aggressiveness works against
      you. The key is getting that first threshold crossed.
    source: "transcription_mp4_video_10.txt"
    context: "Door-to-door sales army era, fire alarm + burglar alarm companies"

  - id: "HEUR-DK-639"
    title: "Burglar Alarm Pre-Conditioning"
    content: >
      Burglar alarm companies would seed neighborhoods for 2 weeks before sales crews arrived — empty
      liquor bottles, condoms, girly magazines in bushes. Then when salesmen knocked, they were received
      very differently. Not the tactic — the STRATEGY.
    source: "transcription_mp4_video_10.txt"
    context: "Create the environment that makes your aggressiveness acceptable"

  - id: "HEUR-DK-640"
    title: "AB Offer: Two-Thirds Take The Better Value"
    content: >
      In a binary choice, two-thirds of people usually take the better value. At Peter Low events: $99 vs
      $278. Half of $99 buyers upgraded on the spot. For services: always present two prescriptions, never
      one. 80-90% take the bigger one.
    source: "transcription_mp4_video_11.txt"
    context: "DK's Peter Low selling + consulting prescription pairs"

  - id: "HEUR-DK-641"
    title: "Ugly Friend Strategy"
    content: >
      Neil Strauss's The Game: go to the bar with a very unattractive decoy friend. Standing next to you,
      you look better. Same as Williams-Sonoma $400 machine next to $270. Comparative choice makes the
      option look better by contrast.
    source: "transcription_mp4_video_11.txt"
    context: "Bread maker + dating analogy applied to pricing"

  - id: "HEUR-DK-642"
    title: "Buyer's Remorse Prevention: Handwritten Thank You"
    content: >
      Most people do little or nothing after a sale. Handwritten thank you notes are like a miracle — by
      comparison you're doing what nobody else does. Most people don't know what happened to them anyway.
      It's an overwrought concern.
    source: "transcription_mp4_video_11.txt"
    context: "Q&A response on finesse and buyer's remorse"

  - id: "HEUR-DK-643"
    title: "Stupak Postcard System: 100K Leads/Year Nearly Free"
    content: >
      Five free postcards per guest, pre-stamped, 'we'll mail them for you.' Irresistible — not using them
      = wasting money. Redemption near 100%. 300 rooms × 5 cards × 150 days = 100,000 names. Mail pitch
      package 1 week after postcard arrives.
    source: "transcription_mp4_video_13.txt"
    context: "Vegas World lead generation — cheapest list acquisition ever"

  - id: "HEUR-DK-644"
    title: "Penny Machine Is Really $3 Machine"
    content: >
      The penny machine is now a $3 bet. People think they're playing a penny machine. They say 'I'm
      playing the penny machine' while betting $3-5 per spin. The label 'penny' changes their
      self-perception of behavior.
    source: "transcription_mp4_video_10.txt"
    context: "Casino mouse trapping — relabeling the bet"

  - id: "HEUR-DK-645"
    title: "New Car Pleasure Lasts Days, Not Weeks"
    content: >
      Three weeks of shopping anticipation. A few days of happiness. Then new car smell fades, you see the
      same car at every light, you can't find it in parking lots, and you discover the cup holder is in
      the wrong place. Pleasure of new is brief.
    source: "transcription_mp4_video_13.txt"
    context: "Bentley cup holder story — $300K car, bad cup holder = rage in 5 minutes"

  - id: "HEUR-DK-646"
    title: "Remove The Board → Performance Collapses"
    content: >
      Joe's Crab Shack: removed tipping, raised base pay. Result: shitty service, ancillary sales dropped,
      good servers left. Lasted 6 months. Saturn: no commissions, all salespeople coasted. Positional
      status is the engine.
    source: "transcription_mp4_video_14.txt"
    context: "Concrete proof that removing positional status kills performance"

  - id: "HEUR-DK-647"
    title: "Red Room / Blue Room Technique"
    content: >
      At seminars: coaching members stand up, leave the room, go to a special room visible through glass.
      Everybody watching wants to get in there. MLM version: accordion wall, bonus checks ceremony noise
      bleeds through. They don't need to hear more — just 'how do I get OVER THERE?
    source: "transcription_mp4_video_14.txt"
    context: "GKIC diamond lounge, MLM prospect/member split"

  - id: "HEUR-DK-648"
    title: "Headline Split Test: Positional > Absolute"
    content: >
      Lose more pounds than your friends in 20 days' beat 'Lose 10 pounds in 20 days' by 3:1 margin.
      Comparative/positional framing dramatically outperforms absolute benefit framing.
    source: "transcription_mp4_video_14.txt"
    context: "Actual split test results — weight loss headline"

  - id: "HEUR-DK-649"
    title: "Three Affluent Levers: Expensive + Exclusive + Symbolic"
    content: >
      DK: 'I'm the highest paid direct response copywriter on earth.' Affluent hears: 1) expensive = must
      be good, 2) exclusive = bragging rights, 3) symbolic = reflects who I am. They go brag: 'I got the
      most expensive guy.
    source: "transcription_mp4_video_14.txt"
    context: "Patek Philippe, Bill Murray exclusivity, DK Cleveland basement"

  - id: "HEUR-DK-650"
    title: "7-8 Hijacks In One Paragraph"
    content: >
      Orthodontist copy analyzed: parental guilt, Rolls Royce analogy, spending analogy (car vs kid's
      dental), splitting (our patients TEND to be), permission for elitism, positional status. Stack
      multiple hijacks in every paragraph.
    source: "transcription_mp4_video_15.txt"
    context: "Burleson orthodontist copy — DK breaks down single paragraph"

  - id: "HEUR-DK-651"
    title: "Chiropractor DC vs MD Trigger"
    content: >
      Use their hidden desire (respect as real doctor) right or you lose them. Parking sign with 'VIP MD,
      VIP DDS' and 'DC - NO' symbol. Instant emotional trigger. But if your catalog shows 'Dr. Harry
      Williams MD' examples, chiropractors trash it.
    source: "transcription_mp4_video_16.txt"
    context: "Used 5-6 times over years for different chiro marketers"

  - id: "HEUR-DK-652"
    title: "92% Repeat Rate After First Purchase/Behavior"
    content: >
      First time buying a diet → 92% chance of buying second. First domestic violence → 92% chance of
      second. Once optimistic bias cycle starts, the repeat rate is near-automatic. The cycle IS the
      business.
    source: "transcription_mp4_video_16.txt"
    context: "Weight Watchers 30% on 3rd-5th round, lottery addicts"

  - id: "HEUR-DK-653"
    title: "Sell To The Invested, Not The Casual"
    content: >
      Dentist with school debt + practice + equipment = buys anything related. Real estate agent with 40hr
      course + phone = won't. One horse = laugh at supplements. 23 horses = 'get it off the truck.' Sunk
      cost creates buy-readiness.
    source: "transcription_mp4_video_16.txt"
    context: "DK's horse business escalation, Greg on sulky upgrades"

  - id: "HEUR-DK-654"
    title: "Urgency: Slam The Door To Get Them Moving"
    content: >
      On coaching calls, if people stop asking questions, say 'well, I'll end early.' Once, twice — by the
      third time someone jumps in. They won't move unless they see the door closing. But NEVER use false
      urgency repeatedly — you become the parent who never follows through.
    source: "transcription_mp4_video_17.txt"
    context: "DVC 7am booking, coaching calls, Disney ExpressPass"

  - id: "HEUR-DK-655"
    title: "Gaslighting Copy: 'Your Money Is Now Irreplaceable"
    content: >
      For wealth advisors targeting company sellers: 'While you had your business, you could replace
      losses. Now every dollar lost is gone forever. You have as little practical experience in managing
      wealth as you did when you started your first business.' Makes the confident man uncertain.
    source: "transcription_mp4_video_17.txt"
    context: "Ted Oakley wealth advisor marketing — '20 Million and Broke' book"

  - id: "HEUR-DK-656"
    title: "Suit Outsells Sport Coat, Tie Outsells No Tie"
    content: >
      Empirically proven across audiences including 'young hip internet geek' crowds. At the Underground
      Internet Marketing Seminar, Kennedy in a suit outsold everyone dressed casually. Symbols of
      authority work regardless of audience.
    source: "transcription_mp4_video_20.txt"
    context: "DK selling at events where all other speakers dress down"

  - id: "HEUR-DK-657"
    title: "Stethoscope Effect: Symbols > Functional Relevance"
    content: >
      Put a chiropractor in white coat with stethoscope (which chiropractors don't use) and matching staff
      uniforms — closing rate on prepays increased. Symbols matter more than whether the symbol is
      functionally relevant.
    source: "transcription_mp4_video_20.txt"
    context: "Encouraged assumption framework — appearance triggers"

  - id: "HEUR-DK-658"
    title: "Because' Produces 94% Compliance Regardless Of Reason"
    content: >
      Copy machine experiment: 'Can I cut in?' = 60%. 'Can I cut in because I'm late?' = 94%. 'Can I cut
      in because I need to make copies?' = 94%. The reason doesn't need to make sense — its mere EXISTENCE
      produces identical compliance.
    source: "transcription_mp4_video_21.txt"
    context: "Hijack #52 — any excuse, any reason, just have one"

  - id: "HEUR-DK-659"
    title: "Pushiness Threshold Is 50 Steps Beyond Where You Think"
    content: >
      When wondering 'have I crossed a line?' with aggressive marketing, the actual line is about 50 steps
      further than where your own inhibitions tell you it is. Most people stop massively short.
    source: "transcription_mp4_video_19.txt"
    context: "Self-imposed inhibition vs actual market tolerance"

  - id: "HEUR-DK-660"
    title: "Phone Book Test For Certainty"
    content: >
      DK's chiropractor: when he tried to negotiate a flexible arrangement, she pulled out the phone book,
      circled three competitors: 'They'll all take you on that basis. But we can't have that here.'
      INCREASED his compliance and 4-year retention.
    source: "transcription_mp4_video_22.txt"
    context: "Zero tolerance with certainty — willing to lose the customer"

  - id: "HEUR-DK-661"
    title: "Red Herring Price: Include An Absurd Option"
    content: >
      Include a deliberately absurd option ($300K coaching next to $70K) so customer can reject it and
      feel smart choosing the 'real' option. Warning: someone occasionally takes it — be prepared to
      deliver.
    source: "transcription_mp4_video_21.txt"
    context: "Kissinger model applied to pricing"

  - id: "HEUR-DK-662"
    title: "Worst Client Is A Referral"
    content: >
      Diametrically opposed to most businesses — referrals bypass the authority-building context chain and
      arrive ill-prepared, creating mismatched expectations. Cold leads who went through 23 books are
      better than referrals.
    source: "transcription_mp4_video_19.txt"
    context: "Context stacking model — referrals skip the stack"

  - id: "HEUR-DK-663"
    title: "Classic Car = Instant 25% Rapport"
    content: >
      Classic car buyers almost always buy the car from their childhood. Financial advisors: buy a classic
      car, park it in front of office. 25% of prospects will have instant rapport conversation about the
      car.
    source: "transcription_mp4_video_20.txt"
    context: "Rapport bridge through nostalgia objects"

  - id: "HEUR-DK-664"
    title: "Show Me Number Six — Verify, Don't Ask"
    content: >
      DK's chiropractor didn't ask 'are you doing exercises?' She said 'Show me number six' — requiring
      PROOF, not claims. When he couldn't demonstrate, she refused the adjustment and sent him home.
    source: "transcription_mp4_video_22.txt"
    context: "Zero tolerance compliance verification"

  - id: "HEUR-DK-665"
    title: "Remove Their Ability To Leave (Trapping)"
    content: >
      Mayo Clinic takes your clothes. Smart car dealer takes your car for 'analysis.' Vicki's uncle put
      strangers on charter planes to Nassau for 3-day lockup — 100% close rate.
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-666"
    title: "Hair Transplant Objection: Personal Beneficial Nature"
    content: >
      Hair transplant #1 sales problem isn't belief it works — it's: 'I've been married a long time. She
      isn't going anywhere.' He passed 7 of 11 agreements but stopped at personal beneficial nature.
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-667"
    title: "Time Stretches Price — Blinds Example"
    content: >
      Blinds.com vs person who comes to your house to measure and show samples. You'll spend more with the
      in-home person. Not because they're better — because time stretched, so price stretched.
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-668"
    title: "Dream Room Effect — 100% Close At Premium"
    content: >
      Mattress store: virtually 100% of people who sleep in the dream room buy something at premium price.
      They put on pajamas and slept for an hour. Nothing to do with the mattress — everything to do with
      time invested.
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-669"
    title: "Cookware Unpacking Tactic — 30 Min To Repack"
    content: >
      Unpack all 36 pieces first. Takes about 30 minutes to pack back up. Even after they've said no 16
      times, you keep talking while packing. Best guys cooked dinner — close rate real high.
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-670"
    title: "Faster Sale = Higher Buyer's Remorse"
    content: >
      The faster the sale, the higher the buyer's remorse. The more time they gave you, the happier they
      are with what they buy. Speed kills satisfaction.
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-671"
    title: "Work Backwards From 100% Close Rate"
    content: >
      Vicki's uncle: 'I worked it backwards. I just wanted 100% close rate.' Then engineered the
      environment to make that inevitable (charter plane to Nassau, 3-day lockup).
    source: "transcription_mp4_video_23.txt"

  - id: "HEUR-DK-672"
    title: "3-Step Campaigns No More Than 15 Days Apart"
    content: >
      Frequency of contact in quick succession builds familiarity. If three-step campaign, no more than 15
      days apart. Fill gaps with email. Not three months apart.
    source: "transcription_mp4_video_24.txt"

  - id: "HEUR-DK-673"
    title: "BMW Shock & Awe — 90 Minutes Of Engagement"
    content: >
      BMW sends giant shock & awe package: video test drive, sample book, tests. ~90 minutes if you go
      through it all. For luxury car buyer, 90 minutes is no big thing. Get to the right person, don't
      compromise presentation for wrong person.
    source: "transcription_mp4_video_24.txt"

  - id: "HEUR-DK-674"
    title: "Zero Interest = Zero Appropriate Time"
    content: >
      If you have no interest, any amount of time is too long. Appropriate amount? None. Answer isn't
      shorter presentations — it's finding the right audience who IS interested.
    source: "transcription_mp4_video_24.txt"

  - id: "HEUR-DK-675"
    title: "Five Ways To Fail At Small Victories"
    content: >
      1) Task too big too soon, 2) Too hard too soon, 3) Too long delay for victory, 4) No progressive
      series, 5) Too long delay for reward. Monthly contests = no good. Daily. If not hourly.
    source: "transcription_mp4_video_24.txt"

  - id: "HEUR-DK-676"
    title: "Magnetic Marketing Small Victory"
    content: >
      How can I put stuff in here that's easy, gets quick result, impossible to screw up? Three-step lost
      customer mailing — somebody WILL respond no matter how badly you screwed up.
    source: "transcription_mp4_video_24.txt"

  - id: "HEUR-DK-677"
    title: "Convert Victory To Commitment Immediately"
    content: >
      The time to get commitment for the next thing is RIGHT AFTER they've gotten a result. Don't let the
      glow of victory fade.
    source: "transcription_mp4_video_24.txt"

  - id: "HEUR-DK-678"
    title: "$800 Shill Sale — Cheapest Retention Investment"
    content: >
      Howard Bonnell (VP World Book) bought first set from every new salesperson via shill couple. Odds of
      second sale went up 20x. Cheapest $800 he spent again and again.
    source: "transcription_mp4_video_25.txt"

  - id: "HEUR-DK-679"
    title: "Product Party Over Recruiting Meeting"
    content: >
      Instead of recruiting meetings (nobody shows = defeat), start with product party. Everyone who comes
      buys something. Five people = five sales. Nobody has to be good. Small victory, encouragement.
    source: "transcription_mp4_video_25.txt"

  - id: "HEUR-DK-680"
    title: "Vacuum Cleaner Audition Appointments"
    content: >
      New recruits: first four calls MUST be family/friends. Pitch: 'I'm not selling, just running
      audition appointments.' At end, put aunt on phone with sales manager who closes. Four recruits × 3
      appointments = 12 appointments = 4 sales.
    source: "transcription_mp4_video_25.txt"

  - id: "HEUR-DK-681"
    title: "MLM Retention = Stay In The Lottery At $100/Month"
    content: >
      How to stay in the lottery? $100 minimum purchase/month. Must be consumable (goes down the sink) so
      it doesn't accumulate. Consumable + lottery psychology = persistent membership.
    source: "transcription_mp4_video_25.txt"

  - id: "HEUR-DK-682"
    title: "Guilt Is The Most Pokeable Button"
    content: >
      Guilt is way up there as most efficient mind hack. Virtually all parents walk around with guilt
      complex. Divorce amplifies enormously. In B2B: guilt about dysfunctional follow-up, wasted
      resources. More efficient than gain.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-683"
    title: "Financial Advisors Lose 60% Of Seminar Attendees"
    content: >
      Dinner seminars: only 40-60% book appointments. What happens to rest? Nothing. But empirically you
      can get 20% of them after the fact over 12 months if you follow up.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-684"
    title: "Car Buyers Buy On The Third Weekend"
    content: >
      Overwhelming majority buy on third weekend, going back to 3+ places they visited before, narrowing
      to one. Nobody in the industry has a system for this despite abundant data.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-685"
    title: "Vending Machines Outsell Humans 3-to-1"
    content: >
      Proactiv vending machines ($250K each) outsell human kiosk workers 3-to-1 because they're
      consistent. Even best humans are inconsistent. Machines serve primarily later buyers.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-686"
    title: "Retargeting With Affinity Language — 15% Lift"
    content: >
      Split test: retargeting with more affinity/emotion language based on mind hijacking concepts.
      Converted 15% more than usual. Same money, same traffic source.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-687"
    title: "Males 3x More Likely To Be Buy-Now Buyers"
    content: >
      Males are 3x more likely to be buy-now buyers than females. Man with broken heel settles on
      something acceptable. Woman spends 4 hours, goes back next weekend, tries another mall.
    source: "transcription_mp4_video_26.txt"

  - id: "HEUR-DK-688"
    title: "Fear-To-Positive Ratio: 2/3 Fear, 1/3 Positive"
    content: >
      Clock any financial news show: the ratio is consistently one-third about things going up, two-thirds
      about things going down. This ratio of fear to optimism keeps people active and anxious, which is
      exactly what drives action.
    source: "transcription_mp4_video_27.txt"
    context: "Cramer show — consistent ratio across episodes. Fear of loss drives more phone calls than gradual upswing trends."

  - id: "HEUR-DK-689"
    title: "Inventory Load = Product Does Nothing Perceptible"
    content: >
      In alternative health: if they're doing inventory load (best deal $206, good deal $126) instead of
      continuity/auto-ship, the product doesn't do anything you'll feel. They know you won't reorder. Get
      the money while you can.
    source: "transcription_mp4_video_27.txt"
    context: "Sinus pill sells $206 load because 'stuff doesn't do anything' — tip-off about product efficacy"

  - id: "HEUR-DK-690"
    title: "Play Your Ace First Unless You Have A Reason Not To"
    content: >
      Most of the time, lead with your strongest, scariest, most timely item first. 'The new president
      wipes out the #1 retirement benefit' beats 'how to make your money worth more' because it's scarier
      AND timely AND plays the heirs emotional card.
    source: "transcription_mp4_video_28.txt"
    context: "Financial newsletter stacking: count how many emotional buttons each item pushes to determine which leads"

  - id: "HEUR-DK-691"
    title: "Micro-Analyze Button Count To Pick Lead Item"
    content: >
      When choosing which of multiple items leads, count the emotional buttons each pushes. 'Congress
      makes heirs pay for already-taxed retirement savings' wins because it has: heirs trigger + anger +
      already-taxed resentment + Congress hatred (22% approval, below dead Hitler at 24%).
    source: "transcription_mp4_video_28.txt"
    context: "Four competing items for financial newsletter page 17 — C wins by button count"

  - id: "HEUR-DK-692"
    title: "Lock Your Stack, Tweak The Flesh"
    content: >
      Once you find the right stacking order for repeated communications, lock in the skeleton and keep
      it. Change the flesh and costume on the bones, but the skeleton stays the same. Not random, not
      accidental. Trump tweaks copy but hasn't changed the stack.
    source: "transcription_mp4_video_28.txt"
    context: "Trump's 3 stacks (border, trade, infrastructure) — same order every speech, only details change"

  - id: "HEUR-DK-693"
    title: "Cold Read Safe Bet: Match Context To Statement"
    content: >
      On a site called 'Win Trillions,' saying 'I believe you secretly dream of a big windfall of cash'
      requires zero psychic ability. Match your cold read to the context they're already in. The safer the
      cold read, the more powerful the rapport.
    source: "transcription_mp4_video_28.txt"
    context: "Travel giveaways are most popular prizes — 'you long for freedom, adventure, world travel' is safe for lottery audience"

  - id: "HEUR-DK-694"
    title: "Add Permission Slip For Guilt-Laden Desires"
    content: >
      After cold-reading their desire, immediately make it okay: 'but probably also the ability to help
      others you can't afford to help now.' Football players buy mom a house first. Give people moral
      cover for wanting money/luxury/status.
    source: "transcription_mp4_video_28.txt"
    context: "Wind Trillions: 'You are not a freeloader. You've worked hard. You've paid your dues.' Makes it okay to want to win lottery."

  - id: "HEUR-DK-695"
    title: "Explained Data Mining Beats Unexplained Creepiness"
    content: >
      When you know too much about someone, explain it: 'We do a lot of data mining to find those most
      deserving.' Translation: 'we find highly susceptible people.' But don't say THAT — wrap data mining
      in a benevolent frame. Too much transparency is as bad as too little.
    source: "transcription_mp4_video_28.txt"
    context: "Wind Trillions copy: 'we never share information with anybody' — calms the 'how do they know' fear"

  - id: "HEUR-DK-696"
    title: "Reverse Reality Control Can Beat Dead Lists"
    content: >
      The finder's fee mail piece (reverse reality of get-rich-in-real-estate) killed with dead real
      estate investor lists during 2008 crash when all RE gurus folded. 8-9 year control because it
      eliminates too-familiar, too-scary, been-there-done-that objections in one move.
    source: "transcription_mp4_video_29.txt"
    context: "Also works as self-mailer: 'How to earn $3K-$10K in one afternoon finding houses hidden in plain sight"

  - id: "HEUR-DK-697"
    title: "No Reveal Until They've Raised Their Hand"
    content: >
      In reverse reality lead gen, maintain the alternate reality through the ENTIRE lead gen piece. No
      reveal on page 1, 2, 3, or 4. Start climbing out of the hole ONLY in the full presentation they've
      requested. Willingness to dig a deep hole is essential.
    source: "transcription_mp4_video_29.txt"
    context: "Check mailer, self-mailer, 'Big Money in Big Chunks' — none reveal it's real estate until the video/website"

  - id: "HEUR-DK-698"
    title: "Four Magic Words: 'No Matter What Your..."
    content: >
      No matter what your circumstances/looks/age/history' is the single bridge phrase to stopping
      self-disqualification. Without this in the ad for a seduction course, readership would be much less
      because men immediately go 'I'm 68 and ugly.
    source: "transcription_mp4_video_29.txt"
    context: "Ross Jeffries ad: 'work for you no matter what your looks or age' — addresses main self-disqualification instantly"

  - id: "HEUR-DK-699"
    title: "Same Reverse Reality Headline Wins Across All Audiences"
    content: >
      How would you like to make money in big chunks fast' won with opportunity seekers, Investors
      Business Daily subscribers, AND dentists. Every time Kennedy thinks 'this crowd has to be saner,'
      he's proven wrong. The same emotional triggers work across sophistication levels.
    source: "transcription_mp4_video_29.txt"
    context: "Tested ~20 headlines, this 'unsophisticated' one beat them all across every list including professional/affluent"

  - id: "HEUR-DK-700"
    title: "Everything Boils Down To Four Things"
    content: >
      All persuasion ultimately resolves to: (1) Self-interest, (2) Self-esteem, (3) Gender-specific male
      motivations (conquest, victory, credit for selection), (4) Gender-specific female motivations
      (emotional health, security, fear of tragedy).
    source: "transcription_mp4_video_31.txt"
    context: "Arrow to the Heart hijack — orthodontist example broken into male vs female motivations"

  - id: "HEUR-DK-701"
    title: "Men Brag About Spending More, Women About Spending Less"
    content: >
      Men: 'Got these boots, $1,800, Charlie Onehorse.' Women: 'Got these shoes at Kohl's with a coupon
      and 20 Kohl's dollars back, they paid ME $2.30.' Same purchase, completely different status story.
      This difference must inform your copy for each gender.
    source: "transcription_mp4_video_31.txt"
    context: "Men want credit for the selection (conquest), women want credit for the deal (safety/security)"

  - id: "HEUR-DK-702"
    title: "Easy To Scare Her, Hard To Scare Him About Kids"
    content: >
      To convince a father his kid might commit suicide from Facebook bullying: very hard. 'My kid's
      tougher than that.' To convince the mother: easy. Women are much more susceptible to impending
      tragedy narratives than men.
    source: "transcription_mp4_video_31.txt"
    context: "Orthodontist marketing: different conversation about risks and outcomes per parent gender"

  - id: "HEUR-DK-703"
    title: "Agreement Frame: 5-7 Yesses Before Selling"
    content: >
      Get prospects to say yes 5-7 times right away before any selling begins. Psychological studies show
      conversion rates go much higher with an agreement frame. Retail script: 'Just looking and shopping
      around?' (yes) → 'Great day for it, isn't it?' (yes) → 'Any questions, just ask. Sound good?' (yes)
      → Colombo turn-back.
    source: "transcription_mp4_video_32.txt"
    context: "Dave's script replaces 'Can I help you?' (gets no) with alignment questions (gets yes). Then Colombo walkaway into core story."

  - id: "HEUR-DK-704"
    title: "Colombo Strategy: Walk Away Then Turn Back"
    content: >
      After initial rapport and yesses, start to walk away like the conversation is done. Then turn back:
      'Oh, by the way, is this the first time you've been here?' Now they must answer and you launch into
      your core story. The walkaway is disarming — removes all sales pressure.
    source: "transcription_mp4_video_32.txt"
    context: "From the TV show Colombo — the 'one more thing' technique adapted for retail/office environments"

  - id: "HEUR-DK-705"
    title: "Barnum Statements Lead Into Proof"
    content: >
      You pride yourself on being an independent thinker who doesn't accept others' opinions without
      satisfactory proof' → person agrees → now transition to testimonials and social proof. Their
      agreement creates obligation to accept your proof. Perfect cold-read-to-proof bridge.
    source: "transcription_mp4_video_32.txt"
    context: "Dave: the statement both builds rapport AND creates logical commitment to accept evidence"

  - id: "HEUR-DK-706"
    title: "Barnum + Variety Statement Opens New Ideas"
    content: >
      You prefer a certain amount of change and variety and become dissatisfied when hemmed in by
      restrictions.' Powerful when you're selling something different or unconventional — their agreement
      carries that they're open to what you'll show them.
    source: "transcription_mp4_video_32.txt"
    context: "Dave: use when your offer is outside their normal comfort zone. Their self-identification as variety-seekers opens the door."

  - id: "HEUR-DK-707"
    title: "Barnum + Doubt + Embedded Command + Future Prediction"
    content: >
      At times you've had serious doubts about whether you've done the right thing.' (rapport) → 'Everyone
      has ups and downs, that's expected.' (normalize) → 'But if you IMPLEMENT THIS PLAN NOW' (embedded
      command) → 'your future looks very bright.' (prediction). Four techniques in three sentences.
    source: "transcription_mp4_video_32.txt"
    context: "Dave: financial advisor example combining cold reading, normalization, embedded commands, and future prediction"

  - id: "HEUR-DK-708"
    title: "Mind Reading Plant: 'You Might Be Wondering"
    content: >
      You might be wondering' / 'you might be thinking' / 'it might be on your mind' — plants thought if
      not already there, reads mind if already there. Always follow with embedded command: 'Can I really
      get [benefits] if I invest in this product today?
    source: "transcription_mp4_video_33.txt"
    context: "Dave: use immediately before listing benefits + buying action. Two outcomes, both favorable."

  - id: "HEUR-DK-709"
    title: "Ego Stroke With Realistic Takeaway"
    content: >
      Your portfolio might not be the largest I've ever seen (takeaway), but it's much more impressive
      than most (stroke).' The disclaimer makes the compliment believable. Without it, ego stroking comes
      across as manipulative — a tactic known as a tactic blown.
    source: "transcription_mp4_video_33.txt"
    context: "Dave: critical for high-net-worth prospects who detect flattery instantly"

  - id: "HEUR-DK-710"
    title: "Rename Everything Unpalatable — Use A Thesaurus"
    content: >
      Workbook' = dead word, nobody wants it. 'Seminar' may need renaming. Use a thesaurus (5 different
      ones if needed) to find palatable terms. Don't spend $19,000 consulting days playing
      rename-the-tune. The right name changes everything behind it; the wrong name makes everything
      heavier lifting.
    source: "transcription_mp4_video_31.txt"
    context: "Kennedy keeps a thesaurus on the computer plus 5 printed ones. Watches basketball while finding the right word."

  - id: "HEUR-DK-711"
    title: "RNs Beat MDs In Alternative Health Testimonials"
    content: >
      Registered nurses are more useful than RMDs for alternative health testimonials — more believed,
      more trusted by the target audience. But HOW LONG an RN, at WHAT hospital, does she have grandkids?
      Specifics about the person multiply the testimonial power.
    source: "transcription_mp4_video_31.txt"
    context: "Miracle Ear: Kennedy specifically sought pastors, school teachers, firemen, cops, RNs, coaches — high trust with old people"

  - id: "HEUR-DK-712"
    title: "Trivial Details Make Stories Believable"
    content: >
      Dark and stormy night' beats 'I was driving.' Gray jacket vs blue jacket, golf swing 'like a bad
      barn door' vs 'like a windy trip' — these trivial details determine whether a story lands. Comedians
      play with minor details until the laugh works. Same in copy.
    source: "transcription_mp4_video_31.txt"
    context: "Charles Jarvis's 'bird joke' — one 7+ minute joke with rich detail throughout, no punchlines along the way"

  - id: "HEUR-DK-713"
    title: "Top 1/3 Test: Would The Top Third Work As A Standalone Ad?"
    content: >
      Take no more than the top one-third of your ad/letter/page real estate. Make that the ad with a call
      to action. If people wouldn't respond to just that, the rest of your brilliance is wasted because
      they never get there. More relevant than ever as attention spans shrink.
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan: 'I could just repeat that for all the critiques I do' — the #1 copy problem is weak opening third"

  - id: "HEUR-DK-714"
    title: "Big Idea Matters More Than Copy Quality"
    content: >
      If you nail the big idea that makes everyone say 'what?!', half-assed copy can produce incredible
      results. A right big idea with C-level copy beats a wrong big idea with A-level copy. Most people
      have a workable big idea buried somewhere in their draft — it's just not leading.
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan: bodybuilding supplement launched from financial desperation with cranked-out copy. Ran 8+ years because big idea was right."

  - id: "HEUR-DK-715"
    title: "Fourth Grade Reading Level Triples Response"
    content: >
      Same pain supplement ad rewritten from 8th grade to 4th grade reading level: MER went from 0.96 to
      3.0. Hemingway wrote at 4th grade level. The closer to 4th-6th grade reading level, the higher the
      response — even with sophisticated audiences like IBD subscribers.
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan: use HemingwayApp.com to check. Watch adverbs, use power verbs. Jennifer (age 8-10) was his human Hemingway app."

  - id: "HEUR-DK-716"
    title: "Never Overestimate Your Audience's Sophistication"
    content: >
      We always overestimate audience intelligence because it flatters us. 'My people are 80% college
      educated, deal with them differently.' Almost always wrong. IBD subscribers respond to same
      headlines as trailer park residents. Kennedy keeps relearning this lesson.
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan's Camelot finding + Kennedy reinforcement. 'How would you like to make money in big chunks fast' wins with dentists too."

  - id: "HEUR-DK-717"
    title: "Listen To Actual Customer Calls Before Writing"
    content: >
      First thing before writing copy: spend a day in the call center listening to actual calls. Weight
      Watchers: calls revealed women wanted to tell their weight loss story. Script was designed for
      speed/efficiency, not effectiveness. 3 minutes of 'Martha telling her story' dramatically increased
      show-up rates.
    source: "transcription_mp4_video_35.txt"
    context: "Kennedy: Weight Watchers call center was optimizing for shortest call time while customers desperately wanted a conversation"

  - id: "HEUR-DK-718"
    title: "Face-To-Face With Market Beats All Research"
    content: >
      Best market research: get belly-to-belly with the person who buys what you sell. Even sitting at the
      Walmart pharmacy bench listening to people pick up prescriptions. Amazon reviews are OK substitute.
      Paid research is data/statistics — gets you half the picture. 'Animals in zoo vs wild in natural
      habitat.
    source: "transcription_mp4_video_36.txt"
    context: "Doverman Dan + Kennedy: Guthrie Ranker had never been to a Walmart. 'That's where your customers are, Bubba."

  - id: "HEUR-DK-719"
    title: "Print Retention: 18 Months At $98/Month vs Industry 2-Month Average"
    content: >
      Most membership sites $30+/month: average retention 2 months, 3 months is thrilling. Doverman Dan:
      18-month average at $98/month. Key factor: print newsletter delivery. Print lights up brain sections
      for spatiality, emotions, decision-making 'like a Christmas tree.' Digital cannot replicate it
      (Millward Brown study).
    source: "transcription_mp4_video_35.txt"
    context: "Doverman Dan's Knights of the Marketing Camelot — print newsletter as anchor for 9x industry retention"

  - id: "HEUR-DK-720"
    title: "Split Physical Delivery = Higher Retention"
    content: >
      When you split delivery to 2 envelopes per month (newsletter at one time, bonus materials at
      another), retention increases by more than the ~50% cost increase. Like dating: showing up only once
      a month for a booty call vs showing up often, sometimes with flowers. GKIC data: consistent year
      over year for 5 years.
    source: "transcription_mp4_video_36.txt"
    context: "GKIC Newsletter + Gold/Diamond delivered separately — doesn't double cost but dramatically increases retention"

  - id: "HEUR-DK-721"
    title: "Lead With Story When Audience Is People-Centric"
    content: >
      Where we are now, leading with a person's story often beats leading with pitch elements. 'I used to
      bike past this 200-year-old stone mansion as a kid' beats product-first approach because people are
      more interested in people than anything else. Stories switch off critical thinking.
    source: "transcription_mp4_video-37.txt"
    context: "Current control: story-driven opening for investment newsletter. Most people are afraid to lead with story — they shouldn't be."

  - id: "HEUR-DK-722"
    title: "Social Proof Four-Factor Evaluation"
    content: >
      Evaluate every testimonial on 4 factors: (1) BULK — flood factor, 5000 testimonials even if nobody
      reads them all. (2) MEANING — authority, credibility, relevance of the person. (3) STORY — facts,
      details, specificity, photos, documents, tax returns. (4) AFFINITY — how much 'just like me' the
      person is. Firemen for firemen beats cops for firemen.
    source: "transcription_mp4_video-37.txt"
    context: "For real estate opportunity: show carpenters to carpenters. Message-to-market match in social proof selection."

  - id: "HEUR-DK-723"
    title: "TM/R/C/Patent Marks = Instant Importance"
    content: >
      Trademark, register mark, copyright mark, patent number (or 'patent pending' which can be pending
      forever) — these symbols instantly make whatever you attach them to seem more important.
      Non-disclosure statements similarly amplify perceived importance. Cheap importance hijack.
    source: "transcription_mp4_video-38.txt"
    context: "Works even when legally meaningless. Combined with dramatic analogies as alternative to direct importance statements."

  - id: "HEUR-DK-724"
    title: "FedEx Beats All Other Delivery Methods"
    content: >
      FedEx triggers different things in everyone's head than mail — embedded by FedEx's own branding.
      B2B: FedEx is ALWAYS handled differently by gatekeepers. For ~$6-8 you buy being treated as
      important. Cannot substitute with DHL or UPS to save money — business people know the difference.
      Still works with consumers.
    source: "transcription_mp4_video-38.txt"
    context: "Kennedy: 'there should be a statue of me at FedEx HQ.' Taliesin events filled entire FedEx trucks."

  - id: "HEUR-DK-725"
    title: "Don't Economize On The Outside After Investing On The Inside"
    content: >
      Tiffany-colored box (expensive) + UPS Ground label (cheap) = destroyed the whole effect. If you're
      investing in premium packaging, the delivery method must match. And don't put your company name on
      the return address of a curiosity package — save the reveal for inside.
    source: "transcription_mp4_video-38.txt"
    context: "Eagle Financial: Tiffany box with $100 real money inside, but UPS Ground and company logo on outside ruined it"

  - id: "HEUR-DK-726"
    title: "Tough Copy Gets Apologies AND Complaints — That's The Sweet Spot"
    content: >
      When you shame non-responders, conversion goes up 27% AND they apologize to you. You know you've got
      the toughness right when you get both apologies from converters and angry complaints from
      non-converters. Both signals = correct calibration.
    source: "transcription_mp4_video-38.txt"
    context: "WWI recruiting posters: 'What will you tell your children when they ask why you weren't a soldier?"

- id: "HEUR-DK-764"
    title: "35% refund rate to 20% with stick letters - split the 15-point reduction 50/50"
    content: "Client has a 35% refund rate but making tons of money so they ignore it. Series of stick letters reminding why they bought - probably cut to 20%. That's 15 points. On the front end they can only give me 1% royalty. On the refund reduction, we're splitting it - 7 points of that's mine. Huge money."
    source: "business-of-copywriting"
    tags: [pricing, royalties, refund-reduction, stick-letters, client-management]
  - id: "HEUR-DK-765"
    title: "Three-person integrity test before accepting client - need three positive references"
    content: "If I can't find three people who've done business with you who say they would do business with you again, we're not going to do business. Because I kind of know I'm not going to be the one to cure all the bad behavior."
    source: "business-of-copywriting"
    tags: [client-management, screening, problem-clients, integrity]
  - id: "HEUR-DK-766"
    title: "All salesy paragraphs start with as you probably know - they probably don't"
    content: "Almost all my salesy paragraphs start with the words 'as you probably know.' They probably don't know. That's why I'm telling them. But they're supposed to."
    source: "business-of-copywriting"
    tags: [copywriting, sales-letters, persuasion, positioning]
  - id: "HEUR-DK-767"
    title: "Never answer the fee question before a diagnostic conversation"
    content: "Talking about money too soon is a mistake. How much do you charge to do a full page magazine ad? You'll never get an answer from me. Because it's the wrong question. I do projects not pieces. Let's have the conversation about the objective first. Then let's talk about the money."
    source: "business-of-copywriting"
    tags: [pricing, fee-presentation, consulting, diagnostic]
  - id: "HEUR-DK-768"
    title: "Remove prices from website - removing them doubled sales month to month"
    content: "We took our prices off our website and stopped listing them altogether. We doubled sales month to month from April to May. Encourages consultative selling, reduces apples-to-apples price comparisons, strengthens positioning, allows raising prices at will. Single most important reason: allows you to choose your customers."
    source: "business-of-copywriting"
    tags: [pricing, positioning, website, fee-presentation]
  - id: "HEUR-DK-769"
    title: "Never let referrer give you prospect contact - make prospect contact you"
    content: "Often somebody says I told Billy Bob about you, here's his contact. I don't want his contact. I'm not going to contact him. My process starts with client inquiry. He has to contact me. Go back to Billy Bob and tell him what to do. Send him one of my books."
    source: "business-of-copywriting"
    tags: [client-attraction, referrals, positioning, pursuit-reversal]
  - id: "HEUR-DK-770"
    title: "Always report back to referrer regardless of outcome - control the narrative"
    content: "If you get a referral you should always report. They want to know. They deserve to know. And you want to control what they're told. You don't want the referred person reporting back. You want to be the one to report that. Use it as excuse to get into something else with the referrer."
    source: "business-of-copywriting"
    tags: [referrals, client-management, relationship-building]
  - id: "HEUR-DK-771"
    title: "Standard contract paragraphs in block typeface - variable in Times Roman"
    content: "Paragraphs in block typeface communicate that they are standard. Times Roman are the variable paragraphs that change for the client. This reduces negotiation by signaling these are my standard paragraphs that everybody agrees to."
    source: "business-of-copywriting"
    tags: [contracts, fee-resistance, typography, negotiation-prevention]
  - id: "HEUR-DK-772"
    title: "Give me a call today is the worst call to action - implies you are sitting around"
    content: "Give me a call today means what? You're sitting around waiting for a call. That ain't no good. Then 'I would love to discuss your project' - what does that imply? Free. Unless you're sleeping with them, you ought not be loving discussing their project."
    source: "business-of-copywriting"
    tags: [copywriting, calls-to-action, positioning, client-attraction]
  - id: "HEUR-DK-773"
    title: "Start narrow go broad - never start broad and try to go narrow"
    content: "It's easiest to begin narrow and then go broad. You get lost when you're broad. I started by positioning myself as direct response marketing specialist. Then simultaneously went narrow: speakers (6000 reachable) and chiropractors. Narrow to broad, never the reverse."
    source: "business-of-copywriting"
    tags: [positioning, niche-marketing, client-attraction, career-strategy]
  - id: "HEUR-DK-774"
    title: "Make clients fill out questionnaire - builds authority and exposes inadequacies"
    content: "If you are a little light on authority, making them do the questionnaire imposes some authority. It also exposes inadequacies, makes them invest in you, demonstrates how smart you are, and the very fact that you have a process is reassuring."
    source: "business-of-copywriting"
    tags: [consulting, authority, questionnaires, client-management]
  - id: "HEUR-DK-775"
    title: "In B2B lead with personal benefit not business benefit"
    content: "Read this letter to slash your stress by 90%. That's a personal benefit not a business benefit. Businesses don't buy anything. Only human beings buy things. And human beings care about themselves more than anything else."
    source: "business-of-copywriting"
    tags: [copywriting, b2b-marketing, personal-benefits, direct-mail]
  - id: "HEUR-DK-776"
    title: "Recording consulting days is mandatory - tell clients to bring equipment"
    content: "I want to record consulting days. If you don't tell them to bring recording equipment, they show up without a pencil. From my standpoint, I want the recording because I said a lot of smart stuff that I don't remember that I need to use to do the work for them."
    source: "business-of-copywriting"
    tags: [consulting, diagnostic-day, documentation, client-management]
  - id: "HEUR-DK-777"
    title: "Nobody I know ever beat a Halbert control - but you can beat it strategically"
    content: "I don't know anybody that ever beat a Halbert control. I tried five times. I got two of mine he couldn't beat. But you're not going to beat a Halbert control. However, you can beat ANY control by changing strategy: different segments, different media, different envelope, different lift note."
    source: "business-of-copywriting"
    tags: [copywriting-strategy, beat-the-control, halbert, strategy-vs-copy]
  - id: "HEUR-DK-778"
    title: "The book of EST has the best agreements process ever - read it regardless of opinion"
    content: "The first three hours of the EST seminar was the agreements process. The book of est has it almost word for word. It's irrelevant what you think of EST. But they probably had the best agreements process. Read it and see a good agreement process."
    source: "business-of-copywriting"
    tags: [contracts, agreements, client-management, est]
  - id: "HEUR-DK-779"
    title: "Consulting day fee $9700 in 2005 - projects $50K to $200K plus"
    content: "The fee for the day is $9,700. In this instance I want two additional concessions. Projects range from $50K to $100K or more. First project was $45,000. He wound up spending a couple hundred thousand. I'm the most expensive guy on the planet."
    source: "business-of-copywriting"
    tags: [pricing, fee-benchmarks, consulting, fee-presentation]
  - id: "HEUR-DK-780"
    title: "Ghostwriting is lower stress because usually not response-sensitive"
    content: "Ghost writing projects are not usually response sensitive. The stress level is lower because they're being used for general promotional purposes or as part of shock and awe packages. And there's ego attachment - they actually want to have a book."
    source: "business-of-copywriting"
    tags: [ghostwriting, project-types, stress-management, special-opportunities]
  - id: "HEUR-DK-781"
    title: "When someone has emergency 911 call - get paid well because result will be not as bad"
    content: "Clients with emergencies. You can get a lot of money from them, but you have very low likelihood of success and long-term relationships. The result won't be good - it will just be not as bad as it would be. Better be well paid for it."
    source: "business-of-copywriting"
    tags: [client-management, problem-clients, emergencies, pricing]
  - id: "HEUR-DK-782"
    title: "Average nonfiction book sells 8000 copies then dies - focus on the right 10000 people"
    content: "Average nonfiction book sells about 8,000 copies then dies. NoBS books do 20-35K but with internal consumption maybe reaching 10K new people. I don't want to sell 100K books. I want to focus on selling 5 books to those 10,000 people who if I influence them I really have got the person I want."
    source: "business-of-copywriting"
    tags: [books, publishing, targeted-marketing, positioning]
  - id: "HEUR-DK-783"
    title: "Rarely prospect for clients - say it even though you do it all the time"
    content: "I rarely prospect for clients or hunt for opportunity. Actually I do it all the time. That's exactly what I'm doing. But I'm not going to say that. I rarely prospect for clients or hunt for opportunity. But in your case, you I want."
    source: "business-of-copywriting"
    tags: [positioning, prospecting, takeaway-selling, posture]
  - id: "HEUR-DK-784"
    title: "Delay delivering some information from call to follow-up letter"
    content: "A few random thoughts I didn't get to in the call. Well, here's why you didn't get to them in the call: because I wanted to give them to him after the call. I want more than one contact, a reason for more than one contact, and the demonstration that I am thinking about him and going on his behalf."
    source: "business-of-copywriting"
    tags: [client-management, obligation-building, follow-up, posture]
  - id: "HEUR-DK-785"
    title: "Famous person nobody's ever heard of - strategic fame to small cadre who can pay"
    content: "I've always thought of myself as the famous person nobody's ever heard of. You and I can stroll around this hotel lobby and the paparazzi won't ruin our evening. But 15 years after not doing active marketing to chiropractors, I can still walk around their convention and have people rushing up. You want to be famous to the right few."
    source: "business-of-copywriting"
    tags: [positioning, visibility, strategic-fame, niche-marketing]
  - id: "HEUR-DK-786"
    title: "Lock all lead sources into same standardized process regardless of origin"
    content: "Whether it's a networking cocktail party conversation, somebody who inquires from your books, a referral, or a bunch of people in the back of the room when you speak, take them all home and shove them into the same machine. Same process. If you're not disciplined about this, you will squander prospects."
    source: "business-of-copywriting"
    tags: [client-attraction, process, lead-management, discipline]

  # --- IWW (Influential Writing Workshop) CD05-08 ---
- id: "HEUR-DK-802"
    title: "5-10 Daily Touchpoint Minimum"
    content: >
            Through ritualistic devices (pens, parking habits, carrying items, required
      reading, sleep tapes), aim for 5-10 daily reinforcement touchpoints. 'So we had
      reinforcement, five, six, seven, eight, nine, ten times a day, right? Through that simple
      device.'
    source: "IWW-CD05-T01"
    domain: "cult-building"

  - id: "HEUR-DK-803"
    title: "Better At Place = Less Price Matters"
    content: >
            'The better at this we are, the less price matters for anything that we do.'
      Starbucks charges $4 for something that costs 50 cents because of insider/outsider
      dynamics and place creation. Apply to any business.
    source: "IWW-CD05-T02"
    domain: "business-strategy"

  - id: "HEUR-DK-804"
    title: "Most Businesses Need 4-6 Customer Profiles"
    content: >
            'Most businesses really should be four or five or six vertical businesses under one
      roof. And they really should be thought of that way.' You can't send the same piece to
      members and non-members if you want maximum effectiveness. Build separate profiles,
      communicate differently.
    source: "IWW-CD05-T03"
    domain: "marketing"

  - id: "HEUR-DK-805"
    title: "Middle-Class Millionaire Profile"
    content: >
            Four characteristics of middle-class millionaires: (1) Hard-working — 70 hour
      weeks, enormous value on work ethic, (2) Networked, (3) Resilient, (4) Put themselves in
      the flow of money. 'Each seems to have one area of passion where they spend rich' while
      remaining frugal in everything else.
    source: "IWW-CD05-T04"
    domain: "marketing"

  - id: "HEUR-DK-806"
    title: "Profile Reveals Hidden Purchase Authority"
    content: >
            Middle management and factory supervisors often have more spending authority than
      expected — pre-established budgets for education, resources, and equipment. Don't assume
      they can't buy. Research the actual budget structures of your target customer's
      organization.
    source: "IWW-CD05-T05"
    domain: "marketing"

  - id: "HEUR-DK-807"
    title: "Err On The Side Of Higher-Value Customers"
    content: >
            'I'll still err on the side of connecting with the ones who I know and believe have
      the greatest value to us over time.' When your customer base shifts from 90-10 to 50-50
      on a divisive topic, prioritize connecting with the more valuable segment.
    source: "IWW-CD05-T06"
    domain: "marketing"

  - id: "HEUR-DK-808"
    title: "Self-Identification Belongs Everywhere Repeatedly"
    content: >
            'It's nearly universally used. You really want to keep doing it again and again and
      again' — in books (beginnings of chapters), newsletters, weekly faxes, daily emails,
      sales letters, speaking from stage. Use it at the beginning, use it at the bridge into
      the commercial, use it to keep reengaging.
    source: "IWW-CD05-T07"
    domain: "copywriting"

  - id: "HEUR-DK-809"
    title: "Write In Private Language Not Public Language"
    content: >
            'It's most effective when you do it in their private language, not necessarily
      their public language.' People aren't verbally calling colleagues 'nitwits and morons'
      publicly — but behind closed doors they are. Use politically incorrect language they
      actually think. 'I fight with my book editors over tooth and nail because it always comes
      back neutered into more polite language.'
    source: "IWW-CD05-T07"
    domain: "copywriting"

  - id: "HEUR-DK-810"
    title: "Build A Pre-Done Inventory Of Templates"
    content: >
            'An hour spent on this in advance is worth hundreds of hours over time.' Build
      business-specific rope-them-in and deny-the-negative templates. Have 1-2 for every single
      reason why people would or wouldn't buy. Don't start from scratch each time.
    source: "IWW-CD06-T01"
    domain: "copywriting"

  - id: "HEUR-DK-811"
    title: "Category-Specific Copy Bank Required"
    content: >
            'The reason that with each passing year I tried to take as little as I can outside
      of a few categories is because to do it right you need a big bank of this stuff for that
      category.' Starting from scratch = 10x the workload. Having a category-specific bank of
      language, templates, self-identification statements = efficiency.
    source: "IWW-CD06-T01"
    domain: "copywriting"

  - id: "HEUR-DK-812"
    title: "Frame Low Results As Compliance Issue"
    content: >
            'If you comply with these 10 things, you're probably going to be up here. If you
      ignore these 10 things, it's a virtual certainty you're going to be down here. That's not
      our problem. We give you the 10 things. It's just most people are completely
      dysfunctional.' Frame bad average results as proof of non-compliance, not product
      failure.
    source: "IWW-CD06-T01"
    domain: "persuasion"

  - id: "HEUR-DK-813"
    title: "Don't Let Them Talk Before Teleseminar"
    content: >
            'They ought not to be loose to talk to each other before the call starts for ten
      minutes. It's a real bad idea.' People comparing notes pre-call and discovering nobody's
      getting results = killing the sale before it starts.
    source: "IWW-CD06-T01"
    domain: "marketing"

  - id: "HEUR-DK-814"
    title: "Ignore What They Say — Find The Real Objection"
    content: >
            From The Culture Code: 'The only way to totally understand a customer is to ignore
      what they're saying.' The Miracle-Ear example: 50% of 'price objections' were really
      legacy objections — guilt about spending $8,000 on themselves when grandkids need money.
      Sales team was misreading every one.
    source: "IWW-CD06-T02"
    domain: "persuasion"

  - id: "HEUR-DK-815"
    title: "Testimonials As Most Powerful Elephant Confrontation"
    content: >
            The most powerful way to confront elephants is through testimonial where other
      people tell their story and allude to the elephant in the process. 'In terms of making
      impact and believability, when others say it it's much more believable than you say by
      yourself.' But don't rely on testimonials exclusively — combine with your own copy.
    source: "IWW-CD06-T02"
    domain: "copywriting"

  - id: "HEUR-DK-816"
    title: "That's Why He Gets The Big Bucks — Repeat 8-12x"
    content: >
            'In coaching meetings, we make sure we say it eight, ten, twelve times during the
      course of the coaching meeting.' Embed your status reminder in humorous, repeatable
      phrases that become part of the culture. 'People now know it so they can say it in
      unison.'
    source: "IWW-CD06-T03"
    domain: "personal-branding"

  - id: "HEUR-DK-817"
    title: "The Packed Schedule Demand Amplifier"
    content: >
            'The less room in the schedule there is, the more somebody wants to get in the
      schedule.' Cobain had a schedule that looked like he didn't have a spare minute — 'he had
      an elegant way of phrasing going to the bathroom so he could list it on his schedule.'
      Publish your schedule.
    source: "IWW-CD06-T03"
    domain: "personal-branding"

  - id: "HEUR-DK-818"
    title: "Warren Buffett Self-Declaration Model"
    content: >
            'The main reason everybody knows who Warren Buffett is, even cooks and maids, and
      view him as the world's greatest investor is because Warren Buffett has made a point of
      telling everybody he's the world's greatest investor.' If you don't declare it, nobody
      else will.
    source: "IWW-CD06-T04"
    domain: "personal-branding"

  - id: "HEUR-DK-819"
    title: "Use Same Proof In 50-60 Different Places"
    content: >
            'Most people don't use the same thing in 50, 60 different places either and that's
      always a mistake.' A single great media appearance should be used as a pre-talk video, in
      print, on website, in newsletter, on teleseminars, etc.
    source: "IWW-CD06-T05"
    domain: "marketing"

  - id: "HEUR-DK-820"
    title: "Name Drop Order By Audience Recognition"
    content: >
            'I put Brian Tracy's name first because Brian's been doing a lot of work in
      dentistry. If I was going to the direct sales industry, I'd probably have Zig's name
      first. If I was going to real estate, I'd probably have Tommy Hopkins' name first.'
      Reorder name-dropping based on audience recognition, not universal fame.
    source: "IWW-CD06-T06"
    domain: "copywriting"

  - id: "HEUR-DK-821"
    title: "Update Dated References To Seem Current"
    content: >
            'He was on the Johnny Carson show. So I change it to the Tonight Show. Half the
      people don't even know who Johnny Carson was. But on the Tonight Show, what they think of
      immediately is Leno.' Don't let aging credentials age your proof — reframe them to feel
      current.
    source: "IWW-CD06-T06"
    domain: "copywriting"

  - id: "HEUR-DK-822"
    title: "Fuzzy Numbers When They Don't Help You"
    content: >
            'Over 10,000 dentists and chiropractors. Probably 7,500 of those were chiropractors
      and only 2,500 were dentists, but that doesn't help me much. So I fuzzy it together, let
      them figure it out.' Combine statistics when the breakout would undermine your case.
    source: "IWW-CD06-T06"
    domain: "copywriting"

  - id: "HEUR-DK-823"
    title: "Challenge Statement As Engagement Device"
    content: >
            'If you are not insatiably, deeply curious about the inside story of what grew
      Starbucks, maybe you ought to find a for sale sign for your restaurant and seek a
      different line of work.' This challenge statement is 'more useful than the eight reasons
      why they should be on the call.'
    source: "IWW-CD06-T06"
    domain: "copywriting"

  - id: "HEUR-DK-824"
    title: "People Want To Be Told What To Do — Exactly"
    content: >
            'People want to be told what to do. Period.' The weight loss infomercial with a
      book that tells you exactly what to eat at 50 major restaurant chains (McDonald's,
      Applebee's, Bob Evans). 'The phones going to ring off the hook right now' because it
      tells them EXACTLY what to do AND it's what they want to do (eat at restaurants).
    source: "IWW-CD06-T07"
    domain: "influence"

  - id: "HEUR-DK-825"
    title: "Read What Your Prospect Reads To Get Their Words"
    content: >
            'Reading the Oprah Magazine from the woman's point of view — this word,
      reinvention. When I started using it, people resonated.' With time and maturity you get
      further from your customer. Combat this by reading what they read.
    source: "IWW-CD06-T08"
    domain: "copywriting"

  - id: "HEUR-DK-826"
    title: "State Value Constantly — 1000x Per Year"
    content: >
            'I'll bet you there's a thousand times where in one way, shape, or form, I say 'now
      this single item pays for your subscription for the whole year. This alone was worth the
      price of admission. This one next thing is a million dollar idea.' If you don't tell them
      it's valuable, they may not know it's valuable.'
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "HEUR-DK-827"
    title: "Conversation Language Test"
    content: >
            'The language people will often use with me is 'when we were talking about X last
      month' — not 'when you wrote about X last month.'' When members use conversational
      language about your newsletter, you know you've achieved the dialogue feel.
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "HEUR-DK-828"
    title: "Activity Masquerading As Accomplishment"
    content: >
            Give members 'goose chases' (go to this website, get this free thing, send for
      that). 'That's activity masquerading as accomplishment. It has the same emotional impact'
      as actually achieving something. They feel like they did something productive.
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "HEUR-DK-829"
    title: "Newsletter Writing Time — 4-5 Hours For 12 Pages"
    content: >
            Kennedy's newsletter is roughly 12 pages, about 2/3 his writing. Writing time:
      approximately 1 hour piecemeal (5-10 minutes here and there as inspiration hits) plus 3-4
      hours to actually finish. Does not write sequentially. Checks against checklist at the
      end.
    source: "IWW-CD07-T01"
    domain: "newsletter"

  - id: "HEUR-DK-830"
    title: "Counter Overwhelm With Smaller More Frequent Deliveries"
    content: >
            '#1 reason we lose people: they can't keep up with the stuff. Stuff piled on corner
      of desk, they haven't read last month's, they start to feel guilty and ashamed.'
      Solution: send content in 2 smaller shipments per month instead of 1 big one. 'We own
      twice a month media now.'
    source: "IWW-CD07-T02"
    domain: "newsletter"

  - id: "HEUR-DK-831"
    title: "Bold Items = Priorities On The Checklist"
    content: >
            When asked 'what are the top quick fixes for newsletters,' Kennedy says the
      bold-faced items under each alpha code are most important. Plus the three common
      failures: (1) They don't think the newsletter is important enough, (2) They don't give
      enough thought to what they're trying to accomplish, (3) They don't like doing it and
      program themselves negatively about it.
    source: "IWW-CD07-T02"
    domain: "newsletter"

  - id: "HEUR-DK-832"
    title: "Moose Are Funnier Than Deer"
    content: >
            'Moose are inherently more funny than deer. Any comedian will tell you that. You're
      much better off with a moose because for some reason people think mooses are funny.' When
      choosing details in stories, some things are inherently funnier/more engaging than
      others.
    source: "IWW-CD07-T03"
    domain: "storytelling"

  - id: "HEUR-DK-833"
    title: "Think And Grow Rich Has Only 1 Page Of Content"
    content: >
            'The only real content in Think and Grow Rich is the list of the 17 things. Beyond
      that there's no particular help with actually implementing any of the 17 principles. So
      you really have a list of what to do which could be fit on one page, no how-to's. The
      rest of the entire book is stories designed to convince you of the wisdom of the 17
      principles. It's a sales letter for the philosophy.'
    source: "IWW-CD07-T03"
    domain: "copywriting"

  - id: "HEUR-DK-834"
    title: "First Priority Is Retention Not Teaching"
    content: >
            'The first thing I'm working on is retention. The second thing I'm working on is
      promotion. Actually teaching anything is pretty far down the damn list. (a) They don't
      want to be taught anything and (b) it doesn't particularly serve our purposes.'
    source: "IWW-CD07-T03"
    domain: "newsletter"

  - id: "HEUR-DK-835"
    title: "Reference Books Every Writer Needs"
    content: >
            Essential writer's references: (1) Words That Sell + More Words That Sell (Bayan),
      (2) The Descriptive Word Finder (Roger) — 'gives you phrases not just synonymous words,
      like 'dark as a pit, gloomy as this,'' (3) A large modern thesaurus. Build your own
      'advanced thesaurus' for keywords you use frequently.
    source: "IWW-CD07-T04"
    domain: "copywriting"

  - id: "HEUR-DK-836"
    title: "Seminars Must Have Dessert"
    content: >
            'You got to have eight or ten checklists or you wouldn't be happy. You got to have
      dessert. You always want to remember that about seminars. Pretty much you give crappy
      food but you got to give them dessert.' Always include tangible takeaways alongside the
      aspirational/emotional experience.
    source: "IWW-CD07-T05"
    domain: "marketing"

  - id: "HEUR-DK-837"
    title: "Kennedy Headline Test Applied To Opening Lines"
    content: >
            'Take the headline away from everything else, run it as a classified ad with only a
      response instruction, will anybody respond?' Apply the same test to opening sentences: if
      it were on a page by itself, would anyone want to read more? Pick deliberately what
      response you want to evoke.
    source: "IWW-CD08-T01"
    domain: "copywriting"

  - id: "HEUR-DK-838"
    title: "Demonstrations vs Pronouncements of Wizardry"
    content: >
            Two distinct things: DEMONSTRATIONS = actually showing transformation (rewriting a
      bad headline into a great one, rewriting someone's ad). PRONOUNCEMENTS = just telling
      people you're a wizard (easier, more common, 'don't require me to do the work of
      rewriting the guy's ad'). Do both.
    source: "IWW-CD08-T03"
    domain: "newsletter"

  - id: "HEUR-DK-839"
    title: "New Member Strange Land Problem"
    content: >
            'They get dropped into this environment where they are a stranger in a strange
      land. We have to write intimately to our members as if we have a long standing
      relationship. But this new person doesn't know the language. It's like showing up at a
      cocktail party and nobody told you it was tuxedos.' This is the #1 early retention
      problem. Solution: add Marketing 101 / onboarding content.
    source: "IWW-CD08-T04"
    domain: "newsletter"

  - id: "HEUR-DK-840"
    title: "The Separate Delivery Box Reminder"
    content: >
            The box saying 'Remember your Gold and Gold Plus loose litter are sent separately'
      serves two purposes: (1) Initially reminds existing members of the change, (2)
      Permanently reminds non-upgraded members 'there's shit they ain't getting.'
    source: "IWW-CD08-T04"
    domain: "newsletter"

  - id: "HEUR-DK-841"
    title: "Who You Present Yourself As Determines Who Shows Up"
    content: >
            'If you're the guy who helps people with no brains, no money, no credit, no
      contacts, no car to buy real estate with no money down — you're going to have rooms full
      of broke people. And at some point they're going to be too broke to even give you money.'
      Change your positioning to attract better source customers.
    source: "IWW-CD08-T05"
    domain: "marketing"

  - id: "HEUR-DK-842"
    title: "Three-Quarter Discard Rate For Incoming Material"
    content: >
            'I probably throw out as completely unusable or unvaluable to me three fourths of
      the stuff that crosses my desk. But one fourth of it accumulates.' Maintain a constant
      intake pipeline, be ruthless in filtering, but always be collecting.
    source: "IWW-CD08-T08"
    domain: "newsletter"

  - id: "HEUR-DK-843"
    title: "Weekly Fax Applies Same Checklist Compressed"
    content: >
            'It's fundamentally the same checklist, winnowed down. And it's harder to hit
      everything because you only got a page.' For shorter communications, work off the same
      31-point list plus the alpha objectives — just accept you can't hit everything in every
      piece. Ensure consecutive pieces vary.
    source: "IWW-CD08-T08"
    domain: "newsletter"


# --- IWW CD01-04 L3_HEURISTICS ---
  - id: "HEUR-DK-844"
    title: "2-10% Of Customer Base Should Communicate Personally"
    content: >
      Two to five to ten percent of your customer base should be
      communicating with you on a personal level — sending mail,
      telling stories, sharing life events. If you are not getting
      this kind of personal fan mail, you are not getting the
      influence thing right.
    source: "IWW-CD01-T05"
    domain: "influence"

  - id: "HEUR-DK-845"
    title: "First-Timers Are Most Significant For Personal Response"
    content: >
      First-time personal communicators are the most significant
      because that shows movement on their part that you want to
      encourage. They get personal communication back from you.
      Repeat communicators who become pen pals eventually need
      to be discouraged with form letters or being ignored.
    source: "IWW-CD01-T05"
    domain: "influence"

  - id: "HEUR-DK-846"
    title: "When Experts In Your Field Hate You — Youre Getting It Right"
    content: >
      When experts in your respective field are constantly critical
      of you because of your oversimplification, that is another
      way you know you are getting it right. The financial planning
      community hates Suzy Orman. The psychology community hates
      John Gray. The more they criticize your simplification, the
      more influence you have.
    source: "IWW-CD02-T02"
    domain: "personal-branding"

  - id: "HEUR-DK-847"
    title: "You Never Get 100% Involvement No Matter The Price"
    content: >
      You never get 100% involvement from customers unless you go
      sit there and make them do it. Even at $12000 events there
      are people who dont fill out pre-event questionnaires or
      submit homework. The percentage who participate in contests
      and interactive elements is painfully low and tends to be
      the same people repeatedly.
    source: "IWW-CD01-T04"
    domain: "influence"

  - id: "HEUR-DK-848"
    title: "80-90% Wont Do Anything With What They Buy"
    content: >
      Eighty to ninety percent of customers are not going to do
      well because they are not going to do anything. If you
      actually worried about them as individuals you would be in
      a nut farm or completely paralyzed. You cant function in our
      businesses with that level of personal concern. You must get
      over that to be effective.
    source: "IWW-CD01-T04"
    domain: "business-strategy"

  - id: "HEUR-DK-849"
    title: "Personal Narrative Asset List Should Have 20+ Items"
    content: >
      Build a personal narrative asset list with at least 20 items.
      Include things most people would not think of as assets —
      alcoholism, bankruptcy, divorce, childhood strife. Each
      represents a wide swath of connection. Kennedys own list
      is two pages, two columns, catalogued by multiple methods
      for quick retrieval.
    source: "IWW-CD02-T03"
    domain: "storytelling"

  - id: "HEUR-DK-850"
    title: "Fascination Requires Conversations Beyond Mechanics"
    content: >
      You know customers are fascinated with you when conversations
      include personal questions and philosophical questions, not
      just mechanical practical questions. If all they talk about
      is the mechanics of what you teach, you wont keep them long
      because you can teach all the mechanics in about 12 months.
    source: "IWW-CD01-T06"
    domain: "influence"

  - id: "HEUR-DK-851"
    title: "Tell One Point Per Story — Multiple Points Dilute Impact"
    content: >
      When Trump told his foreclosure story at a seminar and tried
      to make three points with it, ten minutes later nobody
      remembered any point. Had he pinned it all on one point it
      might have stuck. One story, one point. Trying to make
      multiple points simultaneously is asking too much of the
      audience.
    source: "IWW-CD04-T05"
    domain: "storytelling"

  - id: "HEUR-DK-852"
    title: "Never Let Audience Draw Their Own Conclusions From Stories"
    content: >
      The last thing you want to do is leave people to their own
      devices to draw conclusions from examples, stories, and
      illustrations. God knows what theyll conclude. It is unlikely
      to be your intention. You must tell them what to think about
      what they just heard or read.
    source: "IWW-CD04-T05"
    domain: "storytelling"

  - id: "HEUR-DK-853"
    title: "Never Write Copy In Front Of Anybody"
    content: >
      Never write copy in front of anybody. It is not particularly
      impressive when you see somebody do it, especially if they
      do it fast. People prefer to think you are bleeding and taking
      days. You can never make what you deliver look too simple and
      too easy because you remove all the mysticism.
    source: "IWW-CD03-T05"
    domain: "copywriting"

  - id: "HEUR-DK-854"
    title: "Age The Flaw — Show Past Not Present Dysfunction"
    content: >
      Display flaws and dysfunction but present them in the context
      of past, not present. Let these things age a little bit
      before disclosure. There should be distance between now and
      then. Talk about past addictions rather than current ones.
      The past version is a connection asset; the present version
      is too dangerous.
    source: "IWW-CD04-T01"
    domain: "personal-branding"

  - id: "HEUR-DK-855"
    title: "Acquisition Position vs Retention Position Are Different"
    content: >
      Your primary position for acquisition of new customers may
      differ from your position for retention. Kennedy acquires
      primarily as radical revolutionary system bringer. The most
      money comes from specialist expert positioning. As
      relationships deepen you play 56 different roles to hold
      interest. But for acquisition, one clear pigeonhole.
    source: "IWW-CD02-T05"
    domain: "marketing"

  - id: "HEUR-DK-856"
    title: "Five-Six Drawers Of Story Files Organized By Category"
    content: >
      Maintain five or six file drawers of stories organized by
      chronology, purpose, event category, and values. Include
      magazine articles, torn-out book pages, and personal
      experience notes. When you need a story for a particular
      purpose, go to the relevant file. Buy speed through
      pre-organized story inventory.
    source: "IWW-CD04-T03"
    domain: "copywriting"

  - id: "HEUR-DK-857"
    title: "Closed Borders — Members Only Firewall Is Essential"
    content: >
      Cults and high-influence groups have closed borders. You are
      either in or you are not. Members only clubs can have guest
      passes but the marketing must never cross — members hear a
      completely different story than prospects. Two entirely
      different narratives for two different audiences.
    source: "IWW-CD04-T07"
    domain: "cult-building"

  - id: "HEUR-DK-858"
    title: "Counter Negative Influences Repetitively In Your Writing"
    content: >
      Repetitively talk to your audience about their employees,
      family, and friends who dont get your kind of marketing and
      will try to talk them out of it. Make fun of those people.
      Separate your audience from the negative influences. Use
      stories like the furniture store owner spending $50K on
      brochures to keep wife happy at country club.
    source: "IWW-CD04-T07"
    domain: "cult-building"

  - id: "HEUR-DK-859"
    title: "Pre-Event Involvement Creates Satisfaction Regardless Of Quality"
    content: >
      When buy-in, expectation, price paid, and pre-event
      involvement are all high, the experience is good whether
      it is actually good or not. Involvement helps the person
      be satisfied with what they are getting independent of
      actual quality delivered.
    source: "IWW-CD01-T03"
    domain: "influence"

  - id: "HEUR-DK-860"
    title: "Grand Self-Proclamation Is Required For Influence"
    content: >
      Personal narrative should include conveying upon yourself
      grand and great importance. That there are groundbreaking,
      life changing, radical and revolutionary things being done
      by this person. All self-proclamation. Nothing John Gray
      said was anything anybody didnt already know. He made it
      sound like the epic discovery of the century.
    source: "IWW-CD02-T01"
    domain: "personal-branding"

  - id: "HEUR-DK-861"
    title: "Find A Headline For Each Story That Highlights Fascination"
    content: >
      For each story in your inventory, find a headline or label
      that highlights its fascination quality. Example: I went to
      the dog races to bet on a horse and wound up with a business.
      That label makes everyone want to know the full story. The
      story of the story is what creates inherent fascination.
    source: "IWW-CD02-T03"
    domain: "storytelling"


# --- IWW CD09-13 L3_HEURISTICS ---

  - id: "HEUR-DK-862"
    title: "15 Minutes Writing, 15 Minutes Typography Per Page"
    content: >
      I will often spend about 15 minutes writing a page and 15 minutes
      screwing around with the way it looks. The visual presentation of
      copy deserves equal time to the writing itself. Typography, bold
      face, sizing, formatting are not afterthoughts — they are half
      the communication.
    source: "IWW-CD09-T01"
    domain: "copywriting"

  - id: "HEUR-DK-863"
    title: "Palette Of About 50 Typefaces Is Sufficient"
    content: >
      Out of a choice of 900 type styles, I work with a palette of about
      50. Plus size issues, bold face, italics, underline, shadow, and
      other cosmetics. Too many options is paralysis. A curated set you
      know well allows for fast, deliberate typographic decisions.
    source: "IWW-CD09-T02"
    domain: "copywriting"

  - id: "HEUR-DK-864"
    title: "7 To 8 Days From Finished Writing To Printer"
    content: >
      Dan's newsletter from finishing writing to going to the printer
      takes about seven or eight days. This allows the content to stay
      current and timely. You could do it a month ahead, but timeliness
      suffers. Some of that is accommodating personal work style.
    source: "IWW-CD09-T02"
    domain: "newsletter"

  - id: "HEUR-DK-865"
    title: "Do Not Make It Easy To Not Use What You Deliver"
    content: >
      Giving summary recaps of audio content means they will not listen
      to the audio. Once they know you are recording telecoaching calls,
      attendance goes down. Rather than making it easy to skip, write
      copy about what is on it that would make them want to hear it.
      Making it easy not to use the product is a mistake.
    source: "IWW-CD09-T03"
    domain: "marketing"

  - id: "HEUR-DK-866"
    title: "Do Not Deviate Enormously From Client Font Styles"
    content: >
      When writing copy for clients, do not deviate enormously from
      their established typeface and styling system. The fonts do not
      have to match exactly but major deviation disrupts the communication
      they have established with their audience. Most copywriters do not
      have this sensitivity.
    source: "IWW-CD09-T01"
    domain: "copywriting"

  - id: "HEUR-DK-867"
    title: "Write An Hour Each Morning For Writing Mastery"
    content: >
      For my own stuff — books, products, not client copywriting — I try
      to write an hour each morning. Probably 250 mornings a year. I
      accumulate pieces and hunks that are not connected. Eventually I
      have enough stuff to be the book. The ritualistic routine trains
      the subconscious for automatic access.
    source: "IWW-CD10-T04"
    domain: "copywriting"

  - id: "HEUR-DK-868"
    title: "Two-Draft Maximum Rule For Speed"
    content: >
      I am a two-draft guy. First draft: just write it. Second draft:
      go back with the checklist to figure out what is right, what is
      not, how to rearrange order, find missing stories. That is it.
      This is possible because I write every day and the subconscious
      handles what used to require conscious effort.
    source: "IWW-CD10-T04"
    domain: "copywriting"

  - id: "HEUR-DK-869"
    title: "Book Written In Four To Five Days With Preparation"
    content: >
      If I sat down and just did it, a book takes four to five days. The
      time management book was done Saturday, Sunday, and by noon Monday.
      This speed comes from having material pre-accumulated in boxes and
      files, writing daily for years, and working within narrow structures
      rather than blank-slate creation.
    source: "IWW-CD10-T04"
    domain: "copywriting"

  - id: "HEUR-DK-870"
    title: "Halbert Method: Recopy Ads By Hand For Subconscious Training"
    content: >
      Halbert said: recopy ads by hand because that ingrains them in
      the subconscious exactly the way they are written. Then put pieces
      on file cards. Then rewrite the ad trying to make it better. I did
      that for a year — about 600 file cards. Direct response copy is
      about rhythm. The way you get rhythm is through reps.
    source: "IWW-CD10-T05"
    domain: "copywriting"

  - id: "HEUR-DK-871"
    title: "Pre-Build Lists Of Analogies And Expressions"
    content: >
      I have pre-done lists. The 'serious as cancer' list has 100
      alternatives already done. Serious as the chili at a truck stop
      in Laredo gets a different reaction than serious as cancer. Whether
      you say one or the other matters. I built these lists early and
      rarely need them now because they are automatic.
    source: "IWW-CD10-T05"
    domain: "copywriting"

  - id: "HEUR-DK-872"
    title: "Four Stories Before Every Trial Close"
    content: >
      Howard Bonnell, National Sales Manager for World Book: the best
      encyclopedia salesmen tell four stories before every trial close.
      You have to hold yourself back from the trial close until you have
      told the four stories. Until you got them there, the presentation
      did not work. This is the discipline for influence.
    source: "IWW-CD11-T01"
    domain: "influence"

  - id: "HEUR-DK-873"
    title: "Make Them Laugh Every Seven Minutes On Stage"
    content: >
      If you do not make them laugh every seven minutes on stage you are
      in trouble. It is harder in print because there is no voice inflection,
      no body language, and no audience reinforcement. TV sitcoms need laugh
      tracks because sitting alone you do not laugh the same way. In print,
      amusement is more achievable than outright laughter.
    source: "IWW-CD10-T06"
    domain: "influence"

  - id: "HEUR-DK-874"
    title: "Do Not Use Long Bullet Lists In Story-Based Copy"
    content: >
      I am not a fan of big long three pages of bullets in the middle of
      a sales letter. For me it gets in the way of the rhythm. Boardroom
      can do it because there is no personality or personal connection —
      you are really buying information. But in personality-driven copy,
      bullets interrupt the feeling. I break them out separately.
    source: "IWW-CD10-T07"
    domain: "copywriting"

  - id: "HEUR-DK-875"
    title: "Stories Shorter In Sales Letters, Longer In Newsletters"
    content: >
      In a sales letter, stories that go on for a page and a half get in
      the way of rhythm. I force people to trim them. In a newsletter,
      you have the luxury of a longer story because of the relationship.
      They are interested and fascinated. But good stories are good
      stories regardless of medium.
    source: "IWW-CD10-T07"
    domain: "copywriting"

  - id: "HEUR-DK-876"
    title: "Same Story Used For Five Or Six Different Purposes"
    content: >
      The same story can be used for five or six different purposes.
      Jim Rohn's recruiting stories became teaching stories. Glenn Turner's
      sales stories became motivation stories. One well-crafted story is
      an asset that can be deployed across media and contexts without
      any fundamental changes.
    source: "IWW-CD10-T07"
    domain: "storytelling"

  - id: "HEUR-DK-877"
    title: "Do Not Steal Stories — Disclose That They Are Borrowed"
    content: >
      If a story has been hoared around too much, do not risk telling it
      first person. Most people will not catch it, but the one who does
      immediately thinks less of you and it undermines everything else.
      Disclose that you are telling an old story that many people have used.
      It serves the same purpose to attribute it properly.
    source: "IWW-CD10-T01"
    domain: "storytelling"

  - id: "HEUR-DK-878"
    title: "Catalogs Bad For Acquisition, Good For Existing Customers"
    content: >
      Catalogs are a shitty way to get a new customer. You will almost
      always beat them with a solo direct mail campaign on one or two hot
      items. Catalogs are very good for selling stuff to people with whom
      you already have a relationship. Existing customer goodwill drives
      the page-by-page engagement.
    source: "IWW-CD11-T02"
    domain: "marketing"

  - id: "HEUR-DK-879"
    title: "Tiered Gift Incentives Increase Average Order And Engagement"
    content: >
      The best thing to increase average order price and get people to go
      through an entire catalog is tiered gifts based on size of order. If
      I need another $29 to reach the benchmark, I go back through the
      entire catalog looking for something to add. A gift at $149, $275,
      and $380 creates three decision points that lift average order.
    source: "IWW-CD11-T03"
    domain: "marketing"

  - id: "HEUR-DK-880"
    title: "Irrelevant Gifts Usually Win Over Relevant Gifts"
    content: >
      Irrelevant gifts usually win over relevant ones. If I am selling
      six CDs, offering six more CDs does not have pizzazz. It has to be
      the bronze statue, the sweatshirt and cap, the wall poster. Do not
      mechanize anything you can get money for. Do not give them something
      requiring them to spend more money later.
    source: "IWW-CD11-T03"
    domain: "marketing"

  - id: "HEUR-DK-881"
    title: "One Order Form In Catalog Plus One Loose Insert"
    content: >
      The best setup is one order form in the catalog AND a loose one
      inserted. They use the loose one but keep the catalog around with
      its order form for later. We got a big bump from magazine ads by
      adding the language: there is no need to destroy your magazine, just
      make a photocopy of this coupon.
    source: "IWW-CD11-T03"
    domain: "marketing"

  - id: "HEUR-DK-882"
    title: "Too Much Editorial Content In Catalog Confuses Buyers"
    content: >
      If you do too much editorial content in a catalog, you actually
      confuse people. They do not know they got a catalog, they do not
      know they are supposed to buy from it, and they wind up with a
      great magazine that did not make clear they were supposed to send
      money. A little done well helps. Too much hurts.
    source: "IWW-CD11-T02"
    domain: "marketing"

  - id: "HEUR-DK-883"
    title: "Reply Envelope In Catalog Still Lifts Orders"
    content: >
      A lot of people made erroneous assumptions and removed reply
      envelopes. Only five percent may come through mail, but you do not
      know how many are not ordering at all because the option was removed.
      For demographics fifty-plus and especially sixty-plus, the envelope
      probably lifts orders.
    source: "IWW-CD11-T03"
    domain: "marketing"

  - id: "HEUR-DK-884"
    title: "Start Where People Are Not Where They Should Be"
    content: >
      CEOs of Fortune 500 companies during the OJ trial were all watching
      the trial in their offices. They should not have been but that is
      where people are. Water cooler conversation is water cooler
      conversation. Start with them where they are, use current events
      as the entry point, then ease information in.
    source: "IWW-CD12-T02"
    domain: "influence"

  - id: "HEUR-DK-885"
    title: "Raising Price From 500 To 5000 Lost Only One Client"
    content: >
      With the theft control business, the first thing I did was raise
      the seminar price from $500 to $5,000. We lost one client. Jack
      tells you what the value was. By year three the business did almost
      eleven million dollars. Massive price increases in B2B with strong
      differentiation usually lose very few buyers.
    source: "IWW-CD12-T01"
    domain: "business-strategy"

  - id: "HEUR-DK-886"
    title: "Language Sensitivity With Professional Audiences"
    content: >
      In a profession, watch language sensitivity. Start using words like
      sale and close with doctors or realtors and they just turn you off.
      The first problem with the ad was not using niche language. It did
      not say Attention Realtors and did not reference their specific
      pain points like FSBOs.
    source: "IWW-CD13-T01"
    domain: "copywriting"

  - id: "HEUR-DK-887"
    title: "Do Not Combine Two Reasons In One Headline"
    content: >
      We combined eliminate painful cold calling and triple your income
      in one headline. One is probably more powerful than the other. We
      dilute its power by putting two up there. From experience: they are
      far less interested in tripling income than in eliminating the pain
      of cold calling. The pain headline alone wins.
    source: "IWW-CD13-T01"
    domain: "copywriting"

  - id: "HEUR-DK-888"
    title: "Niche Publication Ad Must Reference The Niche"
    content: >
      As soon as you go into a niche publication, the ad must speak to
      that niche. Attention realtors. The picture should have a for-sale
      sign. Reference their known trainers and common pain points. Generic
      copy in a niche publication gets instantly rejected as not for them.
      It does not take much to change — but it changes everything.
    source: "IWW-CD13-T01"
    domain: "copywriting"

  - id: "HEUR-DK-889"
    title: "93 Percent Retention Once Client Is Brought In"
    content: >
      For the background check business: once we bring a client in,
      retention rate is ninety-three percent. The key is just bringing
      them in. Reference checks as a fulfillment activity become a
      prospecting activity — you are calling prospective clients while
      fulfilling an order.
    source: "IWW-CD11-T04"
    domain: "business-strategy"

  - id: "HEUR-DK-890"
    title: "Involvement Devices Must Be Easy To Participate In"
    content: >
      If you want participation numbers in contests and interaction, it
      has to be easy for them to do. The more complicated you make it,
      the worse it is. The fatal flaw thing works because it is a simple
      response. Then recognize the hell out of those who participate.
      Even contests nobody enters still create perception of community.
    source: "IWW-CD11-T04"
    domain: "marketing"

  - id: "HEUR-DK-891"
    title: "Compact Paragraph Piling For Rhythmic Acceleration"
    content: >
      In one paragraph you reference Ford, Leno, Aristotle, Glenn Turner.
      This kind of piling causes the reader to speed up. People may not
      know every reference but they know some. It delivers one idea and
      reinforces it with as many different meaningful validations as
      possible. Control of pace: speed up and slow down deliberately.
    source: "IWW-CD11-T01"
    domain: "copywriting"

  - id: "HEUR-DK-892"
    title: "Tell What To Do But Not How To Do It"
    content: >
      The classic mistake is thinking that if you teach the hell out of
      it, they will want everything you have. It does not work. The format
      is always to tell them what to do but not really tell them how. Give
      checklists and brain-dead easy tools so they feel like they got
      something, but it does not lead anywhere without your help.
    source: "IWW-CD10-T03"
    domain: "marketing"

  - id: "HEUR-DK-893"
    title: "Best Result When Person Feels They Came To You"
    content: >
      The long-term value of the customer is always better when they feel
      they came to you rather than you came and got them. That is why you
      use takeaway language. I am reluctant to put a telemarketing step
      early rather than late. Let the person decide you are real, that
      they like you, that they connect with you, and then they buy.
    source: "IWW-CD11-T01"
    domain: "influence"

  - id: "HEUR-DK-894"
    title: "Illustrations Can Interrupt Rhythm — Use Carefully"
    content: >
      In writing, illustrations can get in the way. If it interrupts the
      rhythm of delivering on paper, that is not good. People respond
      more to the feelings evoked than the details. However, those of
      us who are word-oriented do not use photos and illustrations enough.
      Put diagrams at the end of the chapter so they do not interrupt.
    source: "IWW-CD11-T01"
    domain: "copywriting"

  - id: "HEUR-DK-895"
    title: "Writing With Humor Is Harder Than Speaking With Humor"
    content: >
      Writing with humor is much harder than speaking. No voice inflection,
      no body language, no audience reinforcement. TV sitcoms need laugh
      tracks because you are sitting alone. I think I achieve amusement
      in print rather than laughter. The people who achieve laughter in
      print — Thurber, early Woody Allen — have every word precisely right.
    source: "IWW-CD10-T06"
    domain: "copywriting"

  - id: "HEUR-DK-896"
    title: "Do Not Jump To The Pitch Too Soon"
    content: >
      The mistake people with a sales background make is jumping to the
      pitch too soon or being overly sales-y. Trying to do it through
      brute force. Always the best result is when the person feels they
      figured it out and moved towards you, rather than you knocking on
      the door. The line — like pornography — you know it when you see it.
    source: "IWW-CD11-T01"
    domain: "influence"

# ======================================================================
# L4_FRAMEWORKS — 513 elements
# ======================================================================
L4_FRAMEWORKS:
  - id: "FW-DK-001"
    title: "Headline Formula Bank"
    content: "Build fill-in-the-blank formulas from tabloids, Victor Schwab's 100 headlines, and Esar's Comic Dictionary"
    source: "01A, 01B"

  - id: "FW-DK-002"
    title: "Headline Testing Framework"
    content: "Test 1: Will it make them read next sentence? Test 2: Run as classified ad — would anyone respond?"
    source: "01B"

  - id: "FW-DK-003"
    title: "Customer Avatar Deep Dive"
    content: >
      List everything about customer: home, neighborhood, magazines, TV, schedule, shopping habits,
      spouse, income. Crystallize into ONE person
    source: "02A"

  - id: "FW-DK-004"
    title: "Pain-Pleasure Sales Sequence"
    content: >
      Step 1: Establish current pain vividly. Step 2: Amplify fear of loss. Step 3: Present pleasurable
      alternative. Step 4: Make irresistible offer
    source: "03A, 03B"

  - id: "FW-DK-005"
    title: "Opportunity Gap Analysis (USP)"
    content: "Identify what ALL competitors do badly → make that your USP (Domino's: delivery was universally bad)"
    source: "01B"

  - id: "FW-DK-006"
    title: "Internal Repetition System"
    content: "Repeat core pitch 3-6 times in same piece, worded differently each time. For skimmers + for emphasis"
    source: "04A"

  - id: "FW-DK-007"
    title: "Objection Draining in Copy"
    content: "List all reasons NOT to buy → answer each one → then say 'now that we've answered all those reasons...' → close"
    source: "05A"

  - id: "FW-DK-008"
    title: "Word Picture Construction"
    content: >
      Don't describe product features — put the reader INTO the experience using it. Action element
      required. (Stupak camera example)
    source: "04A"

  - id: "FW-DK-009"
    title: "Subhead Architecture"
    content: "Each subhead = independent headline. Must stand alone, pass classified test, pull skimmer in"
    source: "01B"

  - id: "FW-DK-010"
    title: "Copy Position Matrix"
    content: "Positions: First person direct | First person story | Third person story | Endorsement | Conversational"
    source: "03B"

  - id: "FW-DK-011"
    title: "Guarantee Wording Formula"
    content: >
      Don't say 'money back guarantee'. Say 'If your friends don't accuse you of having had a facelift,
      send it back.' Outcome-based wording
    source: "05A"

  - id: "FW-DK-012"
    title: "Summation Close Framework"
    content: "End every long piece with summary box: recap offer, price, guarantee, response instruction in 2-3 sentences"
    source: "05B"

  - id: "FW-DK-013"
    title: "Urgency Construction"
    content: "Real deadline + real reason for deadline. Reward early responders AND penalize procrastinators"
    source: "05B"

  - id: "FW-DK-014"
    title: "Tabloid Headline Formula"
    content: "These top [CREDIBLE GROUP] use [SECRET/METHOD] to get [DESIRED RESULT]' — three-part formula"
    source: "01A"

  - id: "FW-DK-015"
    title: "Market Immersion Protocol"
    content: "Read their magazines, watch their TV, go to their stores, tape their shows, listen to their conversations"
    source: "02A"

  - id: "FW-DK-016"
    title: "Lead Gen Inversion"
    content: "Replace image ad + outbound calling with copy-intensive warning ad → 16-page sales letter → prospect calls YOU"
    source: "03A"

  - id: "FW-DK-017"
    title: "Multi-level Testimonial Display"
    content: "Show big success + modest success + 'extra $300/month' — run the full gamut from spectacular to relatable"
    source: "03B"

  - id: "FW-DK-018"
    title: "Insider Language Creation"
    content: "Coin proprietary terms (Holiday Magic, EST, 'publishing on demand', 'triple hoop') → creates desire to belong"
    source: "04B"

  - id: "FW-DK-019"
    title: "Rapport-First Copy Structure"
    content: "Open with rapport/common ground before pitch. Like personal selling: don't walk in and demo the vacuum"
    source: "01B, 02A"

  - id: "FW-DK-020"
    title: "Big Picture + Step Down"
    content: >
      Paint the mansion/jet/million picture, then step down: 'even if you only did half as good...' Let
      them do mental discount
    source: "03B"

  - id: "FW-DK-021"
    title: "Photo Caption Selling"
    content: >
      Caption must be headline, not description. 'Here's John making more money per minute than most make
      per hour' not 'Here's John at his desk
    source: "01B"

  - id: "FW-DK-022"
    title: "Involvement Device Arsenal"
    content: "Quizzes | Self-assessment | Checklists | Yes questions | Highlighter prompts | 'Circle the ones that apply"
    source: "04A"

  - id: "FW-DK-023"
    title: "Dramatic Selling Proposition"
    content: "When no true USP exists, create dramatic positioning: 'A completely different approach to [X]"
    source: "01B"

  - id: "FW-DK-024"
    title: "Fear-of-Loss Sequence"
    content: "Step 1: Invalidate current situation (job security is illusion). Step 2: Amplify pain. Step 3: THEN present opportunity"
    source: "03A, 03B"

  - id: "FW-DK-025"
    title: "Copy Review Protocol"
    content: "Let 5-6 prospects read it. Look for: (1) Same complaints repeated = fix it. (2) Do they ask how to buy? = it works"
    source: "02A"

  - id: "FW-DK-026"
    title: "Self-Check Against Formulas"
    content: "After first draft: go back through checklist (L'Occitane de la Sellerie), check every formula applied"
    source: "02A"

  - id: "FW-DK-027"
    title: "The Irresistible Offer Test"
    content: "Would they drive through a blizzard to the post office for this? If not, make it stronger"
    source: "05B"

  - id: "FW-DK-028"
    title: "Emotion-to-Logic Bridge"
    content: "Hook with emotion (personal pain/fear/desire) → provide logical justification for action → close on emotion"
    source: "03A"

  - id: "FW-DK-029"
    title: "Current Events Linkage"
    content: "Tie your message to what's dominating news/conversation right NOW for instant relevance hook"
    source: "02B"

  - id: "FW-DK-030"
    title: "Infomercial = 3 Shows + Commercials"
    content: "Build three 7.5-minute segments hooked together with 2-minute commercial spots. Show is wrapper; commercial is the sale"
    source: "04A"

  - id: "FW-DK-031"
    title: "Damaging Admission Technique"
    content: "Admit your product's weakness upfront → everything else becomes more believable. Stu Stupak always does it"
    source: "05A"

  - id: "FW-DK-032"
    title: "Swipe File Organization"
    content: >
      Separate files by category (beauty, diet, sex, money, health). Clip 2-3 headlines per issue.
      Organized for instant retrieval
    source: "01A"

  - id: "FW-DK-033"
    title: "Return Rate Management"
    content: "Build things INTO the product to reduce returns. Don't fight refunds — just monitor the percentage (8% threshold)"
    source: "05A"

  - id: "FW-DK-034"
    title: "Blue Collar vs White Collar Copy"
    content: >
      Different avatar = different language, references, dreams, fears. Watch Married with Children for
      blue collar; Wall Street Week for white collar
    source: "02A"

  - id: "FW-DK-035"
    title: "Niche Market Monetization"
    content: "Small market (4,400) + deep rapport + 2-3 mailings/year = $100K+ consistently for 12+ years"
    source: "02A"

  - id: "FW-DK-036"
    title: "Framework de Aquisição em 3 Escolhas"
    content: >
      Ao adquirir um negócio concorrente, há 3 opções estratégicas: (A) Preservar como entidade separada —
      valor de "possuir o próprio concorrente"; (B) Co-branding gradual — transição suave mantendo equity
      da marca original; (C) Absorção total — eliminar a marca e trazer todos os leads/receita para a
      empresa principal. Não há uma certa — a escolha depende de posicionamento, market overlap e equity
      da marca.
    source: "7FA-CD12-T12"
    componentes:
      - "A: Entidade separada (concorrente próprio)"
      - "B: Co-branding com transição gradual"
      - "C: Absorção total"

  - id: "FW-DK-037"
    title: "Framework dos 4 Pilares de Resistência a 7 Dígitos"
    content: >
      Existem 4 categorias de resistência que impedem pessoas de atingir 7 dígitos: (1) Termostato de
      renda / auto-sabotagem quando a renda sobe; (2) Sensibilidade ao ego — incapacidade de tolerar que
      outros os considerem arrogantes; (3) Medo de mudança nas dinâmicas de relacionamento (família,
      amigos, cônjuge); (4) Recusa em cumprir os requisitos práticos (horas, disciplina, sacrifícios).
    source: "7FA-CD11"
    componentes:
      - "1. Termostato de renda / auto-sabotagem"
      - "2. Sensibilidade ao ego / imunidade à crítica"
      - "3. Medo de mudança em relacionamentos"
      - "4. Recusa em cumprir requisitos práticos"

  - id: "FW-DK-038"
    title: "Framework de Preeminência (Jay Abraham)"
    content: >
      Strategy of Preeminence: posicionar-se como o advisor mais confiável do mercado, agindo no melhor
      interesse do cliente acima de tudo mais. Componentes: (1) Obrigação moral de não deixar o cliente
      não comprar quando você genuinamente ajuda; (2) Ser advisor, não vendor — relação consultiva, não
      transacional; (3) LTV como base — dar generosamente no front-end porque o back-end justifica; (4)
      Educação constante do cliente sobre por que você é a melhor escolha.
    source: "7FA-CD8"
    componentes:
      - "1. Obrigação moral de vender"
      - "2. Postura de advisor"
      - "3. LTV como justificativa de generosidade no front-end"
      - "4. Educação contínua do cliente"

  - id: "FW-DK-039"
    title: "Framework das 7 Seções do 7-Figure Academy"
    content: >
      A estrutura de conteúdo do 7FA organiza os elementos necessários para 7 dígitos em 7 seções
      temáticas: marketing, sistemas de vendas, plataforma, modelo de negócio, psicologia
      pessoal/resistências, filosofia pessoal, e gestão do negócio. O framework funciona como auditoria —
      identificar qual seção é o gargalo atual.
    source: "7FA-CD1"
    componentes:
      - "1. Marketing (geração de leads e tráfego)"
      - "2. Sistemas de vendas (plataforma, funil, conversão)"
      - "3. Modelo de negócio (estrutura de receita e leverage)"
      - "4. Operações e pessoal"
      - "5. Psicologia pessoal e resistências"
      - "6. Filosofia pessoal articulável"
      - "7. Integração e sustentabilidade"

  - id: "FW-DK-040"
    title: "Framework de Implementação Paralela (vs Sequencial)"
    content: >
      Em vez de implementar melhorias sequencialmente (termina A, começa B), atacar múltiplas frentes
      simultaneamente em diferentes estágios de completude. Componentes: (1) Selecionar top 3 itens de
      cada categoria estratégica; (2) Iniciar todos em paralelo, em diferentes estágios; (3) Manter
      high-speed sequence — não parar uma enquanto outra avança; (4) Repriorizar apenas quando "fogo em
      quadrante 3" — emergência real.
    source: "7FA-CD12-T08"
    componentes:
      - "1. Top 3 por categoria"
      - "2. Paralelo, estágios diferentes"
      - "3. High-speed sequence"
      - "4. Repriorizar só em emergência real"

  - id: "FW-DK-041"
    title: "Framework de Certificação Proprietária (Crie sua Própria Credencial)"
    content: >
      Qualquer especialista pode criar sua própria certificação sem permissão de terceiros. Componentes:
      (1) Nomear a certificação/associação (inclua termos técnicos ou em latim para presença); (2) Criar
      logo; (3) Definir critérios de "aprovação" que filtram e elevam o valor percebido; (4) Criar
      mecanismo de implementação que gere valor real para certificados; (5) Marketing que estabeleça
      autoridade da certificação.
    source: "7FA-CD12-T11"
    componentes:
      - "1. Nomear (com peso — latim ajuda)"
      - "2. Logo e materiais"
      - "3. Critérios de aprovação"
      - "4. Mecanismo de implementação"
      - "5. Marketing da autoridade"

  - id: "FW-DK-042"
    title: "Framework do Especialista de Equipe vs Estrela Solo"
    content: >
      Negócios de 7 dígitos usam equipe de especialistas para cobrir múltiplas funções críticas; negócios
      de 6 dígitos tentam ser "lone rangers" fazendo tudo. O framework: (1) Mapear as funções críticas do
      negócio (marketing, vendas, operações, etc.); (2) Identificar quais requerem specialist vs
      generalist; (3) Contratar/terceirizar os specialists nos pontos críticos; (4) Manter apenas o que só
      o fundador pode fazer.
    source: "7FA-CD6"
    componentes:
      - "1. Mapeamento de funções críticas"
      - "2. Specialist vs generalist por função"
      - "3. Contratação seletiva"
      - "4. Retenção do que é insubstituível"

  - id: "FW-DK-043"
    title: "Framework Disney de Gestão de Ambiente e Experiência"
    content: >
      Disney criou um sistema de experiência imersiva baseado em: (1) Preço único de entrada que remove
      fricção de decisão dentro do parque; (2) Gestão total do ambiente físico — sem elementos que
      "quebrem o sonho"; (3) Treinamento de staff para manter a ilusão consistentemente; (4) Upsell
      invisível integrado na experiência (não percebido como venda).
    source: "7FA-CD7"
    componentes:
      - "1. Preço único de entrada"
      - "2. Controle total do ambiente"
      - "3. Staff como atores"
      - "4. Upsell invisível"

  - id: "FW-DK-044"
    title: "Framework de Elaboração de Filosofia Pessoal (10-12 Cornerstones)"
    content: >
      Para que a filosofia pessoal funcione como navegação de negócio e alinhamento de mercado: (1) Listar
      10-12 posições filosóficas claras e articuláveis (sobre liberdade, esforço, merecimento, governo,
      riqueza, etc.); (2) Testar se cada uma pode ser verbalizada em 2-3 frases; (3) Identificar qual
      impacta diretamente decisões de negócio; (4) Decidir quais expressar publicamente e como; (5)
      Garantir consistência entre filosofia e comportamento.
    source: "7FA-CD12-T01"
    componentes:
      - "1. 10-12 posições claras"
      - "2. Articulabilidade em 2-3 frases"
      - "3. Ligação com decisões de negócio"
      - "4. Grau de expressão pública"
      - "5. Consistência comportamental"

  - id: "FW-DK-045"
    title: "Framework de Construção de Superioridade Legítima"
    content: >
      Para que a crença em superioridade seja funcional e sustentada: (1) Escolher 3-4 áreas de foco onde
      será genuinamente superior; (2) Tornar-se o maior estudante da área (leia tudo, vá upstream,
      encontre predecessores); (3) Implementar e documentar resultados (não apenas aprender); (4) Manter
      desdém compassivo pelos que permanecem na mediocridade como motivação; (5) Construir referências
      concretas de superioridade para ancoragem psicológica.
    source: "7FA-CD12-T04"
    componentes:
      - "1. 3-4 áreas de foco"
      - "2. Estudo profundo (upstream)"
      - "3. Implementação documentada"
      - "4. Desdém compassivo como motivação"
      - "5. Referências concretas de ancoragem"

  - id: "FW-DK-046"
    title: "Framework de Análise de Resistência Pessoal (Por Que Ainda Não Estou Lá)"
    content: >
      O exercício de DK para mapear resistência ao nível desejado: (1) Descrever em detalhe onde você quer
      estar (renda, estilo de vida, operação); (2) Perguntar: "Por que ainda não estou lá?"; (3) Listar
      todas as respostas sem censura; (4) Examinar cada resposta — é razão real ou racionalização?; (5)
      Para cada razão real, identificar a ação específica que a elimina; (6) Para cada racionalização,
      reconhecer como termostato de renda.
    source: "7FA-CD11"
    componentes:
      - "1. Descrição clara do destino"
      - "2. Pergunta 'Por que ainda não?"
      - "3. Lista sem censura"
      - "4. Razão real vs racionalização"
      - "5. Ação específica para cada razão real"
      - "6. Reconhecimento de termostato"

  - id: "FW-DK-047"
    title: "Framework de Modelagem de Negócios por Analogia Intersetorial"
    content: >
      Inovações de ruptura vêm de aplicar modelos de outros setores. Processo: (1) Mapear elementos de
      negócios extraordinários fora do seu setor; (2) Perguntar: "O que isso seria se aplicado ao meu
      negócio?"; (3) Adaptar o mecanismo, não copiar o formato; (4) Testar a versão adaptada em escala
      pequena; (5) Escalar o que funciona como diferencial proprietário.
    source: "7FA-CD7"
    componentes:
      - "1. Mapeamento cross-setor"
      - "2. Transposição pergunta-chave"
      - "3. Adaptação de mecanismo"
      - "4. Teste em escala pequena"
      - "5. Escala como diferencial"

  - id: "FW-DK-048"
    title: "Framework de Pré-Framing de Expectativas do Cliente"
    content: >
      Vegas pre-frames visitantes para esperar perder dinheiro — o que elimina resistência e
      ressentimento. Aplicado a marketing: (1) Identificar o resultado menos desejado que o cliente pode
      ter; (2) Pre-calibrar essa expectativa na comunicação pré-venda; (3) Posicionar o resultado médio
      como sucesso dentro desse frame; (4) Criar deslumbramento quando supera o resultado pre-framado.
    source: "7FA-CD11"
    componentes:
      - "1. Identificar resultado indesejado possível"
      - "2. Pre-calibrar expectativa"
      - "3. Posicionar resultado médio como sucesso"
      - "4. Deslumbramento pelo excesso"

  - id: "FW-DK-049"
    title: "Framework do Modelo de Franquia Evolutivo"
    content: >
      Negócios escaláveis seguem uma trajetória de franquia: (1) Desenvolver sistema que funciona de forma
      replicável; (2) Documentar e criar manual operacional; (3) Testar replicação com primeiros
      franchisees; (4) Escalar o sistema, não o produto; (5) Criar barreiras (marca, propriedade
      intelectual, exclusividade territorial) antes que o concorrente de segunda geração apareça.
    source: "7FA-CD7"
    componentes:
      - "1. Sistema replicável"
      - "2. Manual operacional"
      - "3. Teste com primeiros franchisees"
      - "4. Escala do sistema"
      - "5. Barreiras antes da 2ª geração"

  - id: "FW-DK-050"
    title: "Three Recession Responses Framework: (1) Sell to DIFFERENT people (geographic/de"
    content: >
      Three Recession Responses Framework: (1) Sell to DIFFERENT people (geographic/demographic
      expansion), (2) Sell DIFFERENTLY (change how you sell — Harley Garage Parties), (3) Sell something
      DIFFERENT (adjacent products or reframed perception)
    source: "12BBS-CD1A"

  - id: "FW-DK-051"
    title: "Recession Alignment via Collier Principle: Step into the economic conversation a"
    content: >
      Recession Alignment via Collier Principle: Step into the economic conversation already in prospect's
      mind → match your message to their specific internal dialogue → provide the certainty they need to
      act
    source: "12BBS-CD1A"

  - id: "FW-DK-052"
    title: "Certainty Selling Framework: In uncertain times, seller with most certainty wins"
    content: >
      Certainty Selling Framework: In uncertain times, seller with most certainty wins → present product
      with absolute conviction as cure for everything that ails them → they borrow YOUR confidence
    source: "12BBS-CD1A"

  - id: "FW-DK-053"
    title: "Adjacent Product Expansion Framework: Use core business to sell many different t"
    content: >
      Adjacent Product Expansion Framework: Use core business to sell many different things → Disney
      (parks → timeshares, glamping tree houses, cooking schools, business training, Hawaii resort); Blue
      Canyon (restaurant → wine school, casino trips, cooking classes)
    source: "12BBS-CD1A"

  - id: "FW-DK-054"
    title: "Permission to Buy Framework: (1) Identify the #1 objection preventing purchase,"
    content: >
      Permission to Buy Framework: (1) Identify the #1 objection preventing purchase, (2) Build specific
      guarantee/justification around it, (3) Name it memorably — Hyundai Job Loss Guarantee, No Fear
      Lease, Ferrari Investment Grade
    source: "12BBS-CD1A"

  - id: "FW-DK-055"
    title: "Commodity Escape via Experience Wrapping: Transform commodity into experience →"
    content: >
      Commodity Escape via Experience Wrapping: Transform commodity into experience → Harley (motorcycles
      → aspirations/sisterhood), Rosewood (hotel rooms → literary experiences/author dinners), watches at
      $80K (timepiece → racing machine on the wrist)
    source: "12BBS-CD1A"

  - id: "FW-DK-057"
    title: "Intake Procedure Framework: express interest → prepare 1-2 page case → fax → rev"
    content: >
      Intake Procedure Framework: express interest → prepare 1-2 page case → fax → review → maybe phone →
      materials FedEx → double opt-in → phone appointment → paid consulting day → maybe contract
    source: "ACC-cd03-T2,T3"

  - id: "FW-DK-058"
    title: "Reputation Construction Checklist: (1) can live with it long-term, (2) facilitat"
    content: >
      Reputation Construction Checklist: (1) can live with it long-term, (2) facilitates
      influence/power/control, (3) magnetic to constituency of choice, (4) evergreen appeal, (5) easy to
      grasp and remember, (6) difficult to undermine or attack
    source: "ACC-cd02-T8"

  - id: "FW-DK-059"
    title: "14 Values That Don't Require Expertise: fresh eyes, dumb questions, forced thoug"
    content: >
      14 Values That Don't Require Expertise: fresh eyes, dumb questions, forced thought, unearthed
      ignored opportunities, influence on associates/employees, political cover, validate premises,
      motivation, accountability, recognition, connections, being used as authority, specialized knowledge
      (only 1 of 14 requires expertise)
    source: "ACC-cd03-T8,T9,T10"

  - id: "FW-DK-060"
    title: "Client Control Architecture: reputation precedes you → intake procedure → big bo"
    content: >
      Client Control Architecture: reputation precedes you → intake procedure → big box of materials →
      double opt-in → paid day → YOU prescribe → they comply → dictatorial relationship sustained for
      years
    source: "ACC-cd03-T2,T3,T4"

  - id: "FW-DK-061"
    title: "Percentage Above Base Pricing: last year revenue + inflation + growth = base → s"
    content: >
      Percentage Above Base Pricing: last year revenue + inflation + growth = base → set increasing bases
      for 2-3 years → you get 30% of everything above base (sold $30K coaching to 600 chiropractors in
      1978)
    source: "ACC-cd01-T8"

  - id: "FW-DK-062"
    title: "Corporate Client Conversion: champion inside → chain of influence → intake mater"
    content: >
      Corporate Client Conversion: champion inside → chain of influence → intake materials → phone
      interview → paid consulting day → paid group meeting → YOU write CEO's letter in his voice → frame
      as 'me deciding if appropriate
    source: "ACC-cd03-T3,T4,T5"

  - id: "HEUR-DK-071"
    title: "Playing blind archery — running a business without defined targets is always dan"
    content: >
      Playing blind archery — running a business without defined targets is always dangerous, but in
      recession it's more dangerous and costly; undefined goals waste more when margins are tight (Paul
      Meyer)
    source: "12BBS-CD1A"

  - id: "HEUR-DK-083"
    title: "One handwritten note from a deliberately non-warm person has 10x more impact tha"
    content: >
      One handwritten note from a deliberately non-warm person has 10x more impact than the same note from
      a warm person — strategic reputation creates currency
    source: "ACC-cd02-T6"

  - id: "FW-DK-147"
    title: "6 Ironclad Rules of Magnetic Marketing: (1) Always an irresistible OFFER. (2) Re"
    content: >
      6 Ironclad Rules of Magnetic Marketing: (1) Always an irresistible OFFER. (2) Reason to respond NOW
      (urgency). (3) CLEAR INSTRUCTIONS on how to respond. (4) TRACKING and measurement of everything. (5)
      FOLLOW-UP — never rely on single touch. (6) RESULTS RULE — nothing else matters.
    source: "MM-01-mod1"

  - id: "FW-DK-148"
    title: "10 Questions to Discover/Create Your USP: (1) What's truly different? (2) How do"
    content: >
      10 Questions to Discover/Create Your USP: (1) What's truly different? (2) How do you uniquely
      benefit your target? (3) Can you niche? (4) What void/opportunity gap can you fill? (5) Can you add
      personality? (6) Superior guarantee? (7) Exceptional speed? (8) What do people hate that you can
      fix? (9) Pricing advantage? (10) Special experience?
    source: "MM-01-mod1"

  - id: "FW-DK-149"
    title: "5 Categories of Target Marketing: (1) Geographic (location/zip). (2) Demographic"
    content: >
      5 Categories of Target Marketing: (1) Geographic (location/zip). (2) Demographic (income/behavior).
      (3) Geo-Demographic (1+2 combined). (4) Affinity (shared identity/memberships). (5) Past & Present
      Customers (the gold mine — most overlooked).
    source: "MM-01-mod2"

  - id: "FW-DK-150"
    title: "Widget Bridge Concept — 3 Reasons for Widgets: (1) Attract new customers with pr"
    content: >
      Widget Bridge Concept — 3 Reasons for Widgets: (1) Attract new customers with promotional offer. (2)
      Sell more/frequently to existing customers with new widgets. (3) Move from vague services to
      specific THING to sell.
    source: "MM-01-mod1"

  - id: "FW-DK-151"
    title: "4 Jobs of an LGM (Lead Generation Magnet): (1) Generate/enhance response to adve"
    content: >
      4 Jobs of an LGM (Lead Generation Magnet): (1) Generate/enhance response to advertising. (2)
      Reinforce prospect's unhappiness with current problems. (3) Establish expertise AND empathy. (4)
      Position so prospect is predisposed to accept your recommendations.
    source: "MM-01-mod2"

  - id: "FW-DK-152"
    title: "4 LGM Writing Rules: (1) Avoid me/we speak — be YOU-oriented. (2) Don't over-edu"
    content: >
      4 LGM Writing Rules: (1) Avoid me/we speak — be YOU-oriented. (2) Don't over-educate — tell WHAT to
      do, not HOW. (3) Don't forget the call to action. (4) Create powerful titles — model
      tabloid/magazine covers.
    source: "MM-01-mod2"

  - id: "FW-DK-153"
    title: "Giorgio 3-Step Letter Structure: Letter 1 = 'Confidential letter to husband from"
    content: >
      Giorgio 3-Step Letter Structure: Letter 1 = 'Confidential letter to husband from Giorgio, Romance
      Director' + photo + emotional hook. Letter 2 (+15 days) = '3 Coins in the Fountain' + 3 pennies
      glued + escalated offer. Letter 3 (+10 days) = 'Lonesome Whippoorwill' + copies of both previous
      letters. Optional: postcard 'Can This Marriage Be Saved?
    source: "MM-01-mod3"

  - id: "FW-DK-154"
    title: "A-Pile Personal Look Framework: plain envelope (no business name), individual ad"
    content: >
      A-Pile Personal Look Framework: plain envelope (no business name), individual addressing (no
      labels), real postage stamp (no bulk rate), personal-looking letter inside. Goal: bypass the B-pile
      wastebasket sort.
    source: "MM-01-mod2"

  - id: "FW-DK-155"
    title: "4 Core Media Tools for Small Business: (1) Squeeze page / landing page (simple,"
    content: >
      4 Core Media Tools for Small Business: (1) Squeeze page / landing page (simple, one offer). (2)
      3-step direct mail letter sequence. (3) Coupon decks / Valpak. (4) Yellow Pages / search-intent
      media.
    source: "MM-01-mod2"

  - id: "FW-DK-156"
    title: "Endorsed Mailing / List Swap: upscale spa's customers = good prospects for cosme"
    content: >
      Endorsed Mailing / List Swap: upscale spa's customers = good prospects for cosmetic dentist and vice
      versa. Each markets to the other's list WITH endorsement from list owner. Gets geo-demographic list
      at zero cost.
    source: "MM-01-mod2"

  - id: "FW-DK-157"
    title: "Headline Formula Arsenal: (1) 'They didn't think I could [X] but I did' (Caples"
    content: >
      Headline Formula Arsenal: (1) 'They didn't think I could [X] but I did' (Caples piano). (2) 'Secrets
      of [X] Revealed' + number. (3) 'Do You Hate Your [X]?' (4) 'At least one [X] within walking distance
      will [bad thing]' (fortune telling).
    source: "MM-01-mod3"

  - id: "FW-DK-158"
    title: "Problem-Agitate-Solve (PAS): set up the existence of a problem your reader has,"
    content: >
      Problem-Agitate-Solve (PAS): set up the existence of a problem your reader has, get them emotionally
      worked up about its effects, then whip out the answer that solves it instantly and easily.
    source: "MM-01-mod3"

  - id: "FW-DK-159"
    title: "Magnetic Marketing 4 Components: (1) Training on foundational direct response pr"
    content: >
      Magnetic Marketing 4 Components: (1) Training on foundational direct response principles. (2)
      Examples from multiple industries. (3) Copyright-free templates for campaigns. (4) Real business
      examples showing results.
    source: "MM-01-mod1"

  - id: "FW-DK-160"
    title: "Brass Balls Pricing Framework: (1) Set price based on what YOU want. (2) Practic"
    content: >
      Brass Balls Pricing Framework: (1) Set price based on what YOU want. (2) Practice straight face when
      quoting. (3) When they show up, bill them. (4) Dictate don't negotiate. (5) Fire non-compliant
      customers. (6) Delay access to appear successful.
    source: "MM-02-cd1,cd2"

  - id: "FW-DK-161"
    title: "Customer Firing Framework: (1) Identify 80/20 problem customers. (2) Surgical re"
    content: >
      Customer Firing Framework: (1) Identify 80/20 problem customers. (2) Surgical removal as early as
      possible. (3) Have direct honest conversation — 'you're not getting results, don't want to take more
      money.' (4) Vacuum fills with better customers. (5) Public example improves compliance of remaining.
    source: "MM-02-cd2"

  - id: "FW-DK-162"
    title: "Time Protection System: (1) Limit access — only talk to 8s/9s/10s. (2) Calculate"
    content: >
      Time Protection System: (1) Limit access — only talk to 8s/9s/10s. (2) Calculate minute worth. (3)
      Regiment time — 5am writing block. (4) Never meet at restaurant first — your office then go. (5) No
      same-day callbacks. (6) Compartmentalize — close file, open next file.
    source: "MM-02-cd4"

  - id: "FW-DK-163"
    title: "Independence Through Deal Flow: Secret to independence = enough deal flow. (1) K"
    content: >
      Independence Through Deal Flow: Secret to independence = enough deal flow. (1) Keep marketing
      machine on every single day. (2) Multiple sources — 72 things for 1 each. (3) Never rely on 1-2
      methods. (4) Break-even acquisition = still dance in streets. (5) Never turn off when busy.
    source: "MM-02-cd4,cd6"

  - id: "FW-DK-164"
    title: "Specialization Repositioning: (1) Take generic product. (2) Specialize to niche."
    content: >
      Specialization Repositioning: (1) Take generic product. (2) Specialize to niche. (3) Price bumps
      3-5x — time mgmt $69 generic vs $300 for dentists vs $500+ for orthodontists with multiple offices.
      (4) 90% material is same. (5) Do 12+ niches for massive revenue.
    source: "MM-02-cd6"

  - id: "FW-DK-165"
    title: "10 Smart Market Questions: (1) What keeps them awake at night? (2) What are they"

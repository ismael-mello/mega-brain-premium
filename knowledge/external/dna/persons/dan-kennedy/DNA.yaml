      direction. Want them shocked by how HIGH. Like racetrack: never bet enough on a winning horse.
    source: "MM-02-cd1"

  - id: "HEUR-DK-266"
    title: "Never Same-Day Callback: Never take inbound call from prospect or call back same"
    content: >
      Never Same-Day Callback: Never take inbound call from prospect or call back same day. Started as
      marketing strategy when broke. Today it's practical reality. Delay = positioning of success.
    source: "MM-02-cd1"

  - id: "HEUR-DK-267"
    title: "Problem Customer Revenue Trap: Client spending $100K/year but costing $300K in t"
    content: >

      personal gift). (4) Product/service packaging. (5) Prepay agreements (restaurant 25-dinner card).
      (6) Accept all credit cards. (7) Monthly newsletter (6 benefits).
    source: "MM-04-cd2-1"

  - id: "FW-DK-177"
    title: "Referral Stimulation System: (1) Do something remarkable (Disney cleanliness). ("
    content: >
      Referral Stimulation System: (1) Do something remarkable (Disney cleanliness). (2) Stage events —
      customers bring friends (Christmas party, July BBQ, anniversary tent). (3) Ask directly for

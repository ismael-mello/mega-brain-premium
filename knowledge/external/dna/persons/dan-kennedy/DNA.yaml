  - id: "HEUR-DK-912"
    title: "80%+ Online Dating Profiles Are False"
    content: "Over 80% of online dating profiles contain false or embellished information. Online dating sites are used by predators and gold diggers. Alarm copy for matchmaking services."
    source: "HFYIC-CD1A-Track4"
    domains: [alarm-copy, matchmaking]
    type: numeric

  - id: "HEUR-DK-913"
    title: "Won't Read/Listen/Watch/Work = Not A Whale"
    content: "If they won't read, won't listen, won't watch, and won't work — they're not a whale for us and won't be around long. Study ethic and work ethic are whale markers."
    source: "HFYIC-CD1-Track6"
    domains: [whale-hunting, customer-qualification]
    type: behavioral

  - id: "HEUR-DK-914"
    title: "GKIC $100K Club: Lifetime Whale Value"
    content: "A whale for GKIC is someone who can/will spend $100,000+ in their lifetime. Behavioral characteristics: own businesses, entrepreneur mindset, study ethic."
    source: "HFYIC-CD1-Track6"
    domains: [whale-hunting, ltv-maximization]
    type: numeric

  - id: "HEUR-DK-915"
    title: "DK Client Whale: $75K+ Project Investment"
    content: "DK's personal whale definition: upwards from $75,000 per project + sufficient scope + year-to-year continuation + intelligent/capable + respectful/low maintenance + leader in field."
    source: "HFYIC-CD1-Track5"
    domains: [client-management, whale-hunting, pricing]
    type: numeric

  - id: "HEUR-DK-916"
    title: "Hit List Fake Newsletter Tactic"
    content: "On two occasions, signed up target whale list as if they had subscribed to newsletter. Welcome letter + invoice marked paid + first issue. They think they subscribed. Let them mature as customers."
    source: "HFYIC-CD1-Track7"
    domains: [guerrilla-marketing, whale-hunting, newsletters]
    type: tactical

  - id: "HEUR-DK-917"
    title: "Trade Show: Dr. Fernandez 'Write Up Everything You Sell'"
    content: "Dr. Peter Fernandez at NSA show: gave Amex card, said 'write up an order for everything you sell.' Became $9,000 first order + 60+ speaking engagements. He found us — place strategy works."
    source: "HFYIC-CD1-Track8"
    domains: [place-strategy, whale-hunting]
    type: anecdotal

  - id: "HEUR-DK-918"
    title: "Three Wealth Magnets For Whales"
    content: "From the wealth book: be somebody, be somewhere, and do something so that a whale can find you. That's place strategy."
    source: "HFYIC-CD1-Track8"
    domains: [whale-hunting, place-strategy, personal-branding]
    type: qualitative

  - id: "HEUR-DK-919"
    title: "Pre-Show + At-Show + Post-Show Strategy Required"
    content: "Trade shows are very effective but most people do horrible job and blame the show. Correct strategy needs pre-show + at-show + post-show components."
    source: "HFYIC-CD1-Track8"
    domains: [trade-shows, whale-hunting, event-marketing]
    type: qualitative

    L4_FRAMEWORKS:

# FW-DK-820 to FW-DK-831 (12 elements)
  - id: "FW-DK-820"
    title: "Whale Definition Framework"
    content: "Define whale by: 1) Monetary value (5x-50x avg). 2) Multiplier effect (circle of influence). 3) Behavioral fit (maintenance level, work ethic). 4) Growth potential (year-to-year continuation)."
    source: "HFYIC-CD1-Track1"
    domains: [whale-hunting, customer-avatar]

  - id: "FW-DK-821"
    title: "Three Whale Hunting Methods"
    content: "Method 1: Small Pond Fishing (hit list, direct targeting). Method 2: Wide Net Place Strategy (let whales find you). Method 3: Wide Net Lead Generation (advertise whale bait information offers)."
    source: "HFYIC-CD1-Track7"
    domains: [whale-hunting, prospecting, lead-generation]

  - id: "FW-DK-822"
    title: "Hit List Campaign Structure"
    content: "1) Create credibility asset (book cover, newspaper ad, retailer letter). 2) FedEx to target list as interview pitch. 3) Book interviews. 4) Convert interviews to follow-up meetings. 5) Convert meetings to clients."
    source: "HFYIC-CD1-Track7"
    domains: [prospecting, whale-hunting, hit-list]

  - id: "FW-DK-823"
    title: "Place Strategy: Show Up Where No One Else Does"
    content: "Find publications/events your competitors ignore but your whale reads/attends. Mattress in chiropractic Yellow Pages. Matchmaking in DuPont Registry. Exercise machine in Robb Report."
    source: "HFYIC-CD1-Track8"
    domains: [place-strategy, media-buying, whale-hunting]

  - id: "FW-DK-824"
    title: "Whale Bait Architecture"
    content: "Offer information, not immediate sales engagement. Free CD/DVD/webinar/report/book. Lower the threshold. Most whale bait is information that allows someone to learn without engaging a salesperson."
    source: "HFYIC-CD1A-Track1"
    domains: [lead-generation, whale-hunting, content-marketing]

  - id: "FW-DK-825"
    title: "Match-Up Copy Framework"
    content: "Profile ideal customer personas with photos + copy. 'What kind of people rely on [Name]?' Each persona gets: 1) Photo. 2) Profile description. 3) Full page of matching copy. Let prospects self-identify."
    source: "HFYIC-CD1A-Track3"
    domains: [copywriting, whale-hunting, targeting]

  - id: "FW-DK-826"
    title: "Direct Whale Whistle"
    content: "Embed specific qualifying criteria in ad copy: 'If you intend to sell a company for $10M-$40M or more.' Clearly excludes non-whales. Whale whistle can be direct or subtle."
    source: "HFYIC-CD1A-Track2"
    domains: [copywriting, lead-generation, whale-hunting]

  - id: "FW-DK-827"
    title: "Affinity Link Positioning Framework"
    content: "1) Profile your whale's biography/values. 2) Find shared personal history. 3) Lead marketing with affinity, not credentials. 4) Use photos and stories of shared experience. Phyllis: wife, mother, athlete, Arizona lover."
    source: "HFYIC-CD1A-Track8"
    domains: [positioning, trust-building, whale-hunting]

  - id: "FW-DK-828"
    title: "Customer Intelligence Stack (6 Layers)"
    content: "1) Demographics. 2) Psychographics (mindset, how they think). 3) Emotional Background (upbringing, heard at top of stairs). 4) Current State of Mind (5 opinions, 5 trends). 5) Weaknesses & Vulnerabilities. 6) Language (tribal terms, dog whistles)."
    source: "HFYIC-CD1A-Track5"
    domains: [customer-avatar, psychographics, copywriting]

  - id: "FW-DK-829"
    title: "Character Profile Construction Method"
    content: "Use fiction-writer character profiles (26-page templates from writer's section at bookstore). Define: top 5 beliefs/values, emotional anchors, emotional reactions (men=rage, women=depression for aging), conversational zones."
    source: "HFYIC-CD1A-Track7"
    domains: [customer-avatar, copywriting, psychographics]

  - id: "FW-DK-830"
    title: "Whale Sighting Categories (2010s)"
    content: "Disproportionate whales in: Boomers/Seniors, Boomer professionals, Late-life divorced (50+), Late-life second families, Bucket-listers, Frustrated fixed-income investors, High-cost hobby enthusiasts, Second-act entrepreneurs, International travelers, Anti-aging buyers."
    source: "HFYIC-CD1-Track4"
    domains: [demographics, affluent-marketing, whale-hunting]

  - id: "FW-DK-831"
    title: "Alarm Copy Architecture for Matchmaking"
    content: "Layer alarm throughout: privacy/reputation concerns, predators on dating sites, emotionally unstable women, security clearance issues, career risk. Then position service as the safe alternative."
    source: "HFYIC-CD1A-Track3"
    domains: [copywriting, alarm-copy, matchmaking]

    L5_METHODOLOGIES:

# MET-DK-672 to MET-DK-678 (7 elements)
  - id: "MET-DK-672"
    title: "Minneapolis Hit List Method"
    content: "1) Make list of 100 CEOs researched for leadership interest. 2) Create book cover for 'Minneapolis Top Business Leaders.' 3) Create full-page newspaper ad featuring their names. 4) Get bookstore commitment letter. 5) FedEx package (cover + ad + letter) to each. 6) Pitch: interview them for book. 7) 63 interviews → 38 follow-ups → 16 clients."
    source: "HFYIC-CD1-Track7"
    domains: [prospecting, whale-hunting, hit-list]

  - id: "MET-DK-673"
    title: "Three-Step Customer Focus Process"
    content: "Step 1 INTELLIGENCE: demographics + psychographics + emotional background + current state + vulnerabilities + language. Step 2 TARGET PERSONAL POSITIONING: affinity links (shared biography over credentials). Step 3 OUTREACH & INVITATION: low threshold, bypass gatekeepers, home addresses, information not education."
    source: "HFYIC-CD1A-Track5"
    domains: [whale-hunting, marketing, customer-avatar]

  - id: "MET-DK-674"
    title: "Copywriter Vocabulary Building Method"
    content: "1) Collect target's magazines/books/content. 2) Use color highlighters to mark repetitively used terms. 3) Cross-reference with thesaurus for synonyms. 4) Build vocabulary list. 5) Get qualified reader (someone FROM the tribe who understands DR) to red-line copy for language errors."
    source: "HFYIC-CD1A-Track7"
    domains: [copywriting, customer-avatar, language]

  - id: "MET-DK-675"
    title: "Whale Profile Construction Method"
    content: "1) Define monetary threshold (5x-50x avg). 2) Identify behavioral markers. 3) Map psychographic fit. 4) Identify time-sensitive triggers. 5) Match to list universe. 6) Build character profile like fiction writer."
    source: "HFYIC-CD1-Track2"
    domains: [whale-hunting, customer-avatar, prospecting]

  - id: "MET-DK-676"
    title: "Two-Offer Ad Structure"
    content: "Every ad should have: 1) Primary offer — engage now (high threshold: call, book meeting). 2) Secondary offer — get free information (low threshold: free report, DVD, webinar). You rarely lose immediate buyers but gain future buyers."
    source: "HFYIC-CD1A-Track1"
    domains: [advertising, lead-generation, direct-response]

  - id: "MET-DK-677"
    title: "List-Based Whale Targeting"
    content: "1) Define whale profile. 2) Research available lists (Amex data, magazine subscribers, club members, donors). 3) Cross-match profile criteria (age, single, income, behavioral). 4) Build targeted direct mail campaign to matched list."
    source: "HFYIC-CD1A-Track9"
    domains: [direct-mail, list-building, whale-hunting]

  - id: "MET-DK-678"
    title: "Niche-Specific Ad Copy Multiplication"
    content: "Create one core ad (e.g. matchmaking) then multiply by niche: dentist version, lawyer version, CPA version, military version. Only the headline and whale whistle changes; body copy is generic. Run in each profession's state/city journal."
    source: "HFYIC-CD1A-Track3"
    domains: [copywriting, niche-marketing, advertising]


# Summary


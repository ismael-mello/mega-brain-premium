      controlled by competitors.
    source: "MM-02-cd1"

  - id: "FIL-DK-197"
    title: "Zero Resistance = Underpriced: if you sell in true zero resistance environment,"
    content: >
      Zero Resistance = Underpriced: if you sell in true zero resistance environment, your prices are too
      low. Want ALMOST zero resistance. Some price pushback = healthy.
    source: "MM-02-cd1"

  - id: "FIL-DK-198"
    title: "Marketplace Self-Appraisal: marketplace takes you at your own appraisal. Decisio"
    content: >
      Marketplace Self-Appraisal: marketplace takes you at your own appraisal. Decisions made in vacuum,
      one-on-one, based on what you say about yourself and what you ask for.
    source: "MM-02-cd1"

  - id: "FIL-DK-199"
    title: "World Revolves Around You: in your business, you should be most valuable person."
    content: >
      World Revolves Around You: in your business, you should be most valuable person. Everyone else's
      first purpose = facilitate you doing what you do. Federal law over state law — your priorities over
      theirs.
    source: "MM-02-cd2"

  - id: "FIL-DK-200"
    title: "Stern But Loving Parent: most customers/patients come looking for the stern but"
    content: >
      Stern But Loving Parent: most customers/patients come looking for the stern but loving parent (Kirby
      Landis). They want authority figure to take charge and tell them the rules.
    source: "MM-02-cd1"

  - id: "FIL-DK-201"
    title: "When They Show Up Bill Them (Stuart Wild): stop doing anything for free unless s"
    content: >
      When They Show Up Bill Them (Stuart Wild): stop doing anything for free unless specific strategy.
      There ain't no free lunch especially with me. $800/hr plus you pay the tab.
    source: "MM-02-cd1"

  - id: "FIL-DK-202"
    title: "Industry Norms = Normal Results: reason a thing is an industry norm = all normal"
    content: >
      Industry Norms = Normal Results: reason a thing is an industry norm = all normal people in industry
      do it. Normal = ordinary/average. Extraordinary results require breaking all rules.
    source: "MM-02-cd2"

  - id: "FIL-DK-203"
    title: "Self-Appointment Works: marketplace cannot tell difference between self-appointe"
    content: >
      Self-Appointment Works: marketplace cannot tell difference between self-appointed and credentialed.

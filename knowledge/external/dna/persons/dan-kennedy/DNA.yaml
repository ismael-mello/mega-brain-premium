    source: "OMC DVD/07 — Craig Simpson (Ken Roberts Company)"

  - id: "FIL-DK-389"
    title: "70% or more of the presentation should be preamble — establishing the dissatisfa"
    content: >
      70% or more of the presentation should be preamble — establishing the dissatisfaction gap — before

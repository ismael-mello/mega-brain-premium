      deals blown over the observation of this one behavior. Big mistake.
    source: "ACC-video-DK_3"

  - id: "FIL-DK-162"
    title: "Never Deal With Underlings: deal only with the person who could write the check."
    content: >
      Never Deal With Underlings: deal only with the person who could write the check. 'Committees don't
      write checks. Committees figure out how NOT to write checks.' Sell top down.
    source: "ACC-video-DK_11"

  - id: "MET-DK-162"
    title: "The Personal Impossibility Mapping for Testimonials: Step 1) List all the factor"
    content: >
      The Personal Impossibility Mapping for Testimonials: Step 1) List all the factors your prospect
      believes make success impossible for THEM specifically. Step 2) For each factor, find/create a
      testimonial from someone who shares that exact impossibility factor. Step 3) One testimonial per

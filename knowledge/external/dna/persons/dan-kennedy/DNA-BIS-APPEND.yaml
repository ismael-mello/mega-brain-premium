# DNA APPEND — Butt In Seats (BIS)
# Person: Dan Kennedy (with Bill Glazer co-presenting)
# Source: Butt In Seats and Bucks in the Bank (2011)
# Program: Glazer-Kennedy Insider's Circle — Info Summit bonus session
# Files: 2 CDs (Bill Glazer), 2 DVDs (DK + BG), 1 Exhibits Manual, 1 Transcript PDF
# Domains: event-marketing, seminar-business, attendance-psychology, list-management,
#          marketing-funnels, event-logistics, event-choreography, celebrity-marketing,
#          content-repurposing, unique-experience-design
# Date: 2026-03-16

# ======================================================================
# L1_PHILOSOPHIES — 20 elements (FIL-DK-681..700)
# ======================================================================

L1_PHILOSOPHIES:
  - id: "FIL-DK-681"
    title: "Seminars must become UNIQUE EXPERIENCES — the seminar-as-information-delivery model is dead"
    content: >
      Moving from a seminar to a unique experience is the secret sauce. These are no longer
      seminars. They really have to be unique experiences. Networking events, special meal
      functions, book signings, meet and greets, contests, award ceremonies, VIP lounges —
      all create an experience people cannot get from a recording.
    source: "BIS"
    domains: ["event-marketing", "unique-experience-design"]

  - id: "FIL-DK-682"
    title: "The person who cannot afford it WILL come — never assume the broke prospect won't buy"
    content: >
      Don't ever think the person who can't afford it won't buy it and come. I promise you
      in this room there are at least a few who absolutely cannot afford to be here but they're
      here anyway. They had to run it on eight credit cards, borrow from their mother-in-law,
      sell something. Don't ever think they're not in your herd.
    source: "BIS"
    domains: ["attendance-psychology", "sales"]

  - id: "FIL-DK-683"
    title: "Celebrity makes you STOP AND LOOK — the infomercial principle applied to event marketing"
    content: >
      The celebrity does the same thing as in an infomercial — makes you stop changing the
      channels and look. What is Suzanne Summers doing with Dan Kennedy? It's something
      that makes you stop and look at the marketing. Celebrity is not an expense, it's a
      multiplier of attendance.
    source: "BIS"
    domains: ["celebrity-marketing", "event-marketing"]

  - id: "FIL-DK-684"
    title: "The hotel is your enemy from the moment you start talking — negotiate everything"
    content: >
      Basically the hotel is your enemy from the moment you start talking to them. You're
      figuring out how to make that work for you. If you sign the first hotel contract they
      deliver, they get their entire staff in a room and they all start laughing at you. They
      are testing you to see how much you know.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]

  - id: "FIL-DK-685"
    title: "You must EARN THE RIGHT to ask people to do business with you — relationship + influence"
    content: >
      You have to really earn the right for being able to sell things to people. Having the
      relationship with the list and being influential are the two key factors that give you
      earning the right to ask people to do business with you.
    source: "BIS"
    domains: ["list-management", "influence"]

  - id: "FIL-DK-686"
    title: "Many seminar promoters who thought they were geniuses for 10 years were just benefiting from conditions"
    content: >
      Many of them for like 10 years thought they were geniuses at this and discovered that
      they were benefiting from certain conditions in the marketplace and now they're
      challenged by certain conditions in the marketplace. Success in events is systems-based,
      not condition-based.
    source: "BIS"
    domains: ["seminar-business", "mindset"]

  - id: "FIL-DK-687"
    title: "Using holidays for marketing is disreputable — and that's why we're so successful"
    content: >
      It's disreputable to be using holidays for doing this kind of thing and that's why
      we're so successful — because of our disreputableness. Enter the conversation already
      on their mind around holiday times.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]

  - id: "FIL-DK-688"
    title: "The job of writing copy is easier than you think — create ONE main sales letter, then repurpose everything"
    content: >
      Everybody thinks the job of writing the copy, they make it harder than it needs to be.
      The job is to create your main big sales letter. Then after that, you repurpose and use
      it as many ways as you possibly can. It IS difficult to write that main sales letter, but
      once you got that, the rest is just repurposing.
    source: "BIS"
    domains: ["copywriting", "content-repurposing"]

  - id: "FIL-DK-689"
    title: "You can't keep doing the same event over and over and expect people to keep coming back"
    content: >
      You can't keep doing the same thing over and over again and keep expecting people to
      keep coming back. You have to constantly come up with new, fresh ideas. Give it a new
      coat of paint, a relevant topic, a reason for existence each time.
    source: "BIS"
    domains: ["event-marketing", "innovation"]

  - id: "FIL-DK-690"
    title: "Declining response in events is the NORM — rising costs, slightly declining response across the industry"
    content: >
      In the last couple of years, most of the people I'm in contact with have been fighting
      rising costs, slightly declining response. That actually is the norm. Don't be comforted
      by it, but know that it's systemic, not personal failure.
    source: "BIS"
    domains: ["seminar-business", "market-reality"]

  - id: "FIL-DK-691"
    title: "Tell the turnaround story EVERY TIME even if you're sick of it — the desperate prospect needs to hear it"
    content: >
      If you have great turnaround testimonials, rescue testimonials, even one dramatic
      human-interest story of the person who was one step away from eviction and suicide and
      scraped together bottle caps to get to your thing, tell the story. Tell it every time
      even if you're sick of it because they're out there and they need to hear it.
    source: "BIS"
    domains: ["attendance-psychology", "storytelling"]

  - id: "FIL-DK-692"
    title: "The early adopters are different from the rescue seekers — address ALL buyer segments in your marketing"
    content: >
      The first ones to register are early adopters who buy everything. The middle ones are
      mainstream who need convincing. The last ones are going down for the third time reaching
      for a life preserver — in real trouble. Each segment needs different messaging.
    source: "BIS"
    domains: ["attendance-psychology", "segmentation"]

  - id: "FIL-DK-693"
    title: "If you can show the opportunity but not give them resources to implement it — that's unvaluable"
    content: >
      It's actually unvaluable if you are able to show people the opportunity but then not
      give them the resources they need to implement the opportunity. Speakers' resources
      exist to facilitate fast growth, not just to sell stuff.
    source: "BIS"
    domains: ["event-marketing", "value-delivery"]

  - id: "FIL-DK-694"
    title: "The winner in marketing is the one who matches message to specific market so people say 'this person speaks to ME'"
    content: >
      The way you win the battle is by matching your message to your specific market so that
      people say to themselves, this person is speaking to me. Whether it's restaurants,
      mortgage brokers, dentists, lawyers — the principle is universal.
    source: "BIS"
    domains: ["marketing-funnels", "segmentation"]

  - id: "FIL-DK-695"
    title: "Being influential is the #2 factor for event attendance — people come because of WHO you are"
    content: >
      Being influential is number two. Everything Glazer-Kennedy does is built on that
      platform of being people of influence. The job of the sale and any sale becomes
      infinitely easier if you are someone who is influential, where somebody wants to be
      with you.
    source: "BIS"
    domains: ["influence", "attendance-psychology"]

  - id: "FIL-DK-696"
    title: "CDs beat DVDs for consumption — people can listen in the car like a traveling university"
    content: >
      If I had to pick one or the other, I would use CDs over DVDs. Because it's easier for
      people to consume CDs — you can put them in your car as you're driving around. I've
      always got a policy of having these in the car, like a traveling university.
    source: "BIS"
    domains: ["content-delivery", "media-strategy"]

  - id: "FIL-DK-697"
    title: "Demonstration in marketing is a sleeper — almost nobody talks about it but it's a biggie"
    content: >
      Demonstration is something that nobody hardly ever talks about. If you're looking for
      a real big takeaway, if you're looking for something very few other people are doing,
      demonstration is really important. Infomercials are TOTAL demonstration.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]

  - id: "FIL-DK-698"
    title: "We are all in the list building business — you always lose prospects and customers, must constantly replace"
    content: >
      We're all in the list building business. We should always be building our list constantly
      including the fact that you always will lose prospects and customers, so you have to
      constantly replace them as well.
    source: "BIS"
    domains: ["list-management", "business-fundamentals"]

  - id: "FIL-DK-699"
    title: "Speaker sabotage is real — one sabotaging speaker can ruin your event and must never return"
    content: >
      We had one speaker years ago, the most sabotaging speaker of all times. He has never
      been back on the Glazer-Kennedy stage since. He'll try to do anything to hurt other
      speakers. I won't even tolerate it. If you don't know about it, you can get sabotaged
      by your speakers.
    source: "BIS"
    domains: ["event-choreography", "speaker-management"]

  - id: "FIL-DK-700"
    title: "The host who introduces speakers is transferring INFLUENCE — this is a position of power"
    content: >
      How the speaker is introduced makes a gigantic difference. Most of us that are serious
      about putting on events always introduce the speakers ourselves. The introducer can
      transfer influence over to the speaker. Chris Cardell is in Guinness Book of Records
      for best speaker introductions.
    source: "BIS"
    domains: ["event-choreography", "influence"]

# ======================================================================
# L2_MENTAL_MODELS — 15 elements (MM-DK-664..678)
# ======================================================================

L2_MENTAL_MODELS:
  - id: "MM-DK-664"
    title: "Buyer Psychology Spectrum — Early Adopters → Mainstream → Rescue Seekers"
    content: >
      Three buyer segments attend events: (1) Early adopters who buy everything and register
      first, (2) Mainstream who need convincing and respond to social proof, (3) Rescue seekers
      going down for the third time — in financial trouble, looking for magic rescue. Address
      all three in marketing with different messages.
    source: "BIS"
    domains: ["attendance-psychology", "segmentation"]

  - id: "MM-DK-665"
    title: "Celebrity Multiplier Effect — Shamu the Whale applied to event attendance"
    content: >
      Celebrity at events works like in infomercials — makes people stop and look. The cost
      of the celebrity is justified by calculating: how many extra seats do I need to sell
      to cover this? Gene Simmons put 200 extra people in a room. Many of those became repeat
      attendees, compounding the ROI indefinitely.
    source: "BIS"
    domains: ["celebrity-marketing", "event-marketing"]

  - id: "MM-DK-666"
    title: "Repurpose with Power Model — One Main Sales Letter → 18+ Derivative Pieces"
    content: >
      Start with one multi-page main sales letter with everything in it. Then repurpose:
      website version, 18 emails over 6 weeks, newsletter inserts, video sales letter,
      fax, voice broadcast, newspaper ads, postcards, magalogue, DVD, CD. The main letter
      is the hard part — everything else is extraction with a ruler and pen.
    source: "BIS"
    domains: ["copywriting", "content-repurposing"]

  - id: "MM-DK-667"
    title: "Seminar as Unique Experience vs Information Delivery — the secret sauce"
    content: >
      The mental model shift: events are NOT seminars (information delivery), they are
      UNIQUE EXPERIENCES that cannot be replicated from a recording. Networking events,
      special meals, celebrity meet-and-greets, contests, VIP lounges, book signings — all
      elements that make attendance irreplaceable.
    source: "BIS"
    domains: ["event-marketing", "unique-experience-design"]

  - id: "MM-DK-668"
    title: "Marketing Funnel Depth Model — 90+ touches over 6 months for major events"
    content: >
      Most people underestimate the difficulty and have a marketing funnel way too small.
      Glazer-Kennedy uses 90+ marketing touches for a single event. Two key subfactors:
      diversity of media (not just one channel) and lead time (6 months minimum for
      full-force marketing).
    source: "BIS"
    domains: ["marketing-funnels", "event-marketing"]

  - id: "MM-DK-669"
    title: "8-Dimension List Knowledge Model — what you know about them determines what you can sell"
    content: >
      8 dimensions of list knowledge: (1) Seminar attendees vs non-attendees, (2) Customers
      vs prospects, (3) Location/driving distance, (4) Contact info available (email, phone,
      fax, text), (5) Previous purchase history, (6) Previous attendees at THIS event,
      (7) Industry/niche, (8) Whatever else you know. More dimensions = more segmentation
      = more targeted messaging.
    source: "BIS"
    domains: ["list-management", "segmentation"]

  - id: "MM-DK-670"
    title: "Common Enemy Demonstration — showing the enemy visually is more powerful than just naming them"
    content: >
      Demonstration of the common enemy is more powerful than just stating it. Rory Fatt
      used McDonald's flying away as a visual — 'Isn't it time YOU are the predator?'
      Much more powerful than just saying 'we compete with fast food.' Show, don't tell.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]

  - id: "MM-DK-671"
    title: "Event Choreography as Profit Architecture — every element positioned for objectives"
    content: >
      The event is choreographed like a movie. Every element serves objectives: deliver
      great value immediately (so attendees validate their decision), rank your 3 chief
      objectives, position speakers strategically for retention, manage resources/offers
      around those objectives. Never less than an hour to choreograph the agenda.
    source: "BIS"
    domains: ["event-choreography", "event-marketing"]

  - id: "MM-DK-672"
    title: "Keep Them Engaged Model — 4 months of monthly mailings to pre-registered attendees"
    content: >
      People register far in advance and lose excitement. Starting 4 months out, send monthly
      mailings with: hotel registration info, guest add-on offers, free gift CDs/content,
      event updates. Each touchpoint re-engages and reduces no-show rate. It's manipulation
      by design — and it works.
    source: "BIS"
    domains: ["event-marketing", "retention"]

  - id: "MM-DK-673"
    title: "Boot Camp in a Box — selling recordings to the prospects who were marketed to but didn't attend"
    content: >
      After heavy marketing, 10-14 days before the event, send the 'sold out' piece to
      everyone who was invited but didn't register. Offer to buy the recordings. All that
      marketing softened the beachhead — they're primed to buy SOMETHING. You always squeeze
      significant money from this audience.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

  - id: "MM-DK-674"
    title: "3-Step Survey System — Survey → Report Results → Give What They Asked For"
    content: >
      Step 1: Survey your list asking what they want. Step 2: Report back the results (with
      a gift for filling it out, like a T-shirt). Step 3: Build your event/product around what
      they asked for, using the premise 'this is what YOU asked for.' Works in any business,
      not just seminars. A very smart advanced strategy.
    source: "BIS"
    domains: ["marketing-funnels", "list-management"]

  - id: "MM-DK-675"
    title: "The Homer Letter Model — post-event follow-up from a creative sender with 3 reasons why"
    content: >
      After the event, send a letter to non-registrants from a creative sender (your dog,
      your wife, your assistant). Give 3 reasons why they didn't register: (1) too caught up
      to turn in the form, (2) afraid of accountability, (3) left early. Include registration
      form. Always converts additional registrations for next year.
    source: "BIS"
    domains: ["event-marketing", "follow-up"]

  - id: "MM-DK-676"
    title: "Add-On Seminar Model — tack a specialized day onto someone else's larger event"
    content: >
      Tack on a one-day seminar before a larger event in the same city. People are already
      traveling there. Do it the day BEFORE (not after — people leave early). Glazer had
      70 paid attendees at his add-on day to Dan Kennedy's Mega Conference in Phoenix.
      Works especially well with industry conventions.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

  - id: "MM-DK-677"
    title: "Position-to-Retain Model — strategic speaker placement keeps attendance throughout"
    content: >
      Frank Kern speaks on day 3, not day 1, because everybody wants to hear him — forces
      attendance through the whole event. Cal Ripken jersey giveaway at the end. Gift
      drawings at closing. Everything is positioned to keep people in seats.
    source: "BIS"
    domains: ["event-choreography", "retention"]

  - id: "MM-DK-678"
    title: "Sell-at-Event Model — the best time to sell next year's event is at THIS year's event"
    content: >
      The absolute best time to sell the next event is at the current event, while they're
      excited and in the moment. Glazer-Kennedy left SuperConference 2010 with 647
      pre-registrations for the next year. Start with 647 instead of zero — that changes
      everything for the promoter.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

# ======================================================================
# L3_HEURISTICS — 25 elements (HEUR-DK-920..944)
# ======================================================================

L3_HEURISTICS:
  - id: "HEUR-DK-920"
    title: "90+ marketing touches for a major event"
    content: >
      Over 90 different marketing touches for a single event. Many online (less costly),
      some offline (some very costly). Most people don't begin to do enough marketing.
    source: "BIS"
    domains: ["marketing-funnels", "event-marketing"]
    type: "numeric"

  - id: "HEUR-DK-921"
    title: "6 months lead time minimum for full-force event marketing"
    content: >
      Give yourself 6 months lead time to market an event properly. This is the minimum
      for full-force marketing. People who give themselves less time consistently
      underperform.
    source: "BIS"
    domains: ["marketing-funnels", "event-marketing"]
    type: "numeric"

  - id: "HEUR-DK-922"
    title: "Gene Simmons put 200 extra people in seats — celebrity ROI calculation"
    content: >
      Gene Simmons was the most expensive celebrity ever hired for a GKIC event. But he
      put 200 people in the room who would never normally have come. Many became repeat
      attendees. Celebrity cost is justified by: extra_seats × ticket_price > celebrity_fee.
    source: "BIS"
    domains: ["celebrity-marketing", "event-marketing"]
    type: "numeric"

  - id: "HEUR-DK-923"
    title: "647 pre-registrations at event for next year — best conversion point"
    content: >
      Left SuperConference 2010 with 647 people registered for next year. That takes
      tremendous pressure off the promoter. Much easier to fill 1,200 seats starting from
      647 than from zero.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]
    type: "numeric"

  - id: "HEUR-DK-924"
    title: "$60 per gallon of hotel coffee — hidden costs are massive"
    content: >
      Hotels charge $60 per gallon of coffee plus extras. There's no conscience at all.
      Hidden fees include shipping/receiving, AV requirements, convention center fees,
      rigging costs, resort fees. Know about them and negotiate every single one.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]
    type: "numeric"

  - id: "HEUR-DK-925"
    title: "6 weeks to negotiate and finalize a hotel contract with all the back and forth"
    content: >
      It takes approximately 6 weeks of back-and-forth negotiation to finalize a hotel
      contract properly. The first contract they send is a test — never sign it as-is.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]
    type: "numeric"

  - id: "HEUR-DK-926"
    title: "18 emails from one main sales letter, distributed over 6 weeks"
    content: >
      Take the main multi-page sales letter and chop it into 18 emails. Distribute over
      6 weeks. Each email contains a segment pulled directly from the main letter.
      Two tools needed: a ruler and a pen.
    source: "BIS"
    domains: ["copywriting", "content-repurposing"]
    type: "numeric"

  - id: "HEUR-DK-927"
    title: "Best event city: Chicago — 2.5 hour flight from anywhere in the US"
    content: >
      Chicago is the best city for events because it's about a two and a half hour flight
      from anywhere in the United States. Two big airports, lots of flights. But can't do
      it there every time — rotate locations.
    source: "BIS"
    domains: ["event-logistics"]
    type: "qualitative"

  - id: "HEUR-DK-928"
    title: "Start moving in Monday for a Thursday event — 4 days of setup"
    content: >
      For a major event starting Thursday, the crew starts moving in Monday. Every day
      more people are added to the setup team. Allow enough time for proper setup and
      breakdown during normal hours.
    source: "BIS"
    domains: ["event-logistics"]
    type: "numeric"

  - id: "HEUR-DK-929"
    title: "General sessions = interesting to everyone; breakout sessions = specialized choice"
    content: >
      Rule of thumb: general session topics should be interesting to everybody in the
      room. Breakout sessions should be specialized where people can choose. Both serve
      important but different purposes.
    source: "BIS"
    domains: ["event-choreography"]
    type: "qualitative"

  - id: "HEUR-DK-930"
    title: "First speaker must deliver GREAT VALUE immediately — validates the attendee's decision"
    content: >
      Deliver great value as soon as possible. Dan Kennedy opens as first speaker. After
      his presentation, people say 'if I just go home right now, I'm done.' That validates
      their decision to attend. Great value early = attendance retention.
    source: "BIS"
    domains: ["event-choreography", "value-delivery"]
    type: "qualitative"

  - id: "HEUR-DK-931"
    title: "Always fax TWO pages — message + order form — let them use the media that brought them"
    content: >
      When faxing, always send two pages: page 1 is the message, page 2 is the order form.
      They're at the fax machine — let them fill it out and fax it back. Let them use the
      media that brought them to the party to respond.
    source: "BIS"
    domains: ["direct-marketing", "marketing-funnels"]
    type: "qualitative"

  - id: "HEUR-DK-932"
    title: "Use voice broadcasts sparingly with celebrity impersonators — Superman, etc."
    content: >
      Use voice broadcast more than fax but don't overuse it. Use celebrity impersonators
      (Superman, etc.) so people laugh instead of getting upset. Outrageous advertising
      applied to voice broadcasts.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]
    type: "qualitative"

  - id: "HEUR-DK-933"
    title: "Newspaper advertising has become much less expensive — negotiate hard, they're traumatized"
    content: >
      Newspaper advertising is still effective for local events. The good news is it's
      become much less expensive because newspaper companies are traumatized. You can
      negotiate really hard with them.
    source: "BIS"
    domains: ["marketing-funnels", "negotiation"]
    type: "qualitative"

  - id: "HEUR-DK-934"
    title: "Add-on seminars should be the day BEFORE the main event — people leave early, never stay to the end"
    content: >
      When tacking on a seminar to another event, always do it the day BEFORE. Very
      few people stay to the end of events, but most arrive early. 70 paid attendees
      is achievable for an add-on day.
    source: "BIS"
    domains: ["event-marketing"]
    type: "qualitative"

  - id: "HEUR-DK-935"
    title: "Send the 'sold out' piece 10-14 days before the event to non-registrants — sell recordings"
    content: >
      About 10 days to 2 weeks before the event, send a 'sold out' message to everyone
      who was marketed to but didn't register. Offer the recordings/boot camp in a box.
      The previous marketing softened the beachhead — this always squeezes money.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]
    type: "numeric"

  - id: "HEUR-DK-936"
    title: "Follow up no-shows with 'overwhelming wave of sadness' letter — give a second chance"
    content: >
      For people who registered for a local event but didn't show up, send an
      'overwhelming wave of sadness washed over me' letter. Give them a second chance
      to attend the next one. This recovers registrations consistently.
    source: "BIS"
    domains: ["event-marketing", "follow-up"]
    type: "qualitative"

  - id: "HEUR-DK-937"
    title: "8 different cover letter versions based on purchase history — same letter, different top copy"
    content: >
      Create up to 8 different versions of a cover letter that goes on top of the same
      sales letter. Each version customized based on what that segment purchased before.
      'Because you attended X, I think you'll be interested in Y.'
    source: "BIS"
    domains: ["segmentation", "copywriting"]
    type: "numeric"

  - id: "HEUR-DK-938"
    title: "Hotel meeting room rental is proportional to hotel rooms filled — can be FREE with enough rooms"
    content: >
      The meeting room rental fee is directly proportional to how many rooms you fill
      in the hotel. You can often get meeting rooms for free if you're filling enough
      hotel rooms. Negotiate 24-hour room rental access.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]
    type: "qualitative"

  - id: "HEUR-DK-939"
    title: "Always use local exhibit decorators — cheaper than national firms, hotels can recommend them"
    content: >
      You will always do better with local exhibitor decorators than big national firms.
      Hotels are usually good about giving you a list of local vendors. Also get AV bids
      from multiple vendors with detailed equipment lists.
    source: "BIS"
    domains: ["event-logistics"]
    type: "qualitative"

  - id: "HEUR-DK-940"
    title: "Discount from vendors for booking multiple events — Marriott, Sheraton, Hyatt, Hilton all offer"
    content: >
      All major hotel chains (Marriott, Sheraton, Hyatt, Hilton) give discounts for
      booking multiple events. Say 'I'm doing three events in the next two years' and
      they'll give you better rates. AV vendors also offer multi-event discounts.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]
    type: "qualitative"

  - id: "HEUR-DK-941"
    title: "Keep people isolated at airport hotels — downtown with restaurants is NOT ideal for events"
    content: >
      Dan Kennedy is 100% right: keep people isolated. Downtown with beautiful
      restaurants and waterfront is NOT ideal. Airport facilities where people are
      isolated keep attendance in the room. Location > luxury.
    source: "BIS"
    domains: ["event-logistics", "attendance-psychology"]
    type: "qualitative"

  - id: "HEUR-DK-942"
    title: "Don't just use one media — pure email marketers who only send emails always lose to diverse media users"
    content: >
      People who use diversity in their media will always win over people who use just
      one kind. Pure internet marketers who want to fill seminars just sending emails
      are crazy. Lloyd Irvin gets it — uses all kinds of media despite being a bright
      internet marketer.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]
    type: "qualitative"

  - id: "HEUR-DK-943"
    title: "Top 3 objectives drive ALL choreography — rank them and build the agenda around #1 first"
    content: >
      Make the list of your 3 top objectives. Choreograph the event to put #1 first,
      #2 second, #3 third. If the #1 goal is selling coaching, the ENTIRE agenda is
      built around selling that, everything else takes a back seat.
    source: "BIS"
    domains: ["event-choreography"]
    type: "qualitative"

  - id: "HEUR-DK-944"
    title: "100% cancellation refund 30+ days out minus marketing examples cost — risk reversal for event pre-registration"
    content: >
      Offer 100% refund on cancellations 30+ days before the event, minus cost of
      the bonus materials already delivered (e.g., $697 for marketing examples CD).
      This removes risk from early registration while protecting your content investment.
    source: "BIS"
    domains: ["event-marketing", "offers"]
    type: "qualitative"

# ======================================================================
# L4_FRAMEWORKS — 18 elements (FW-DK-832..849)
# ======================================================================

L4_FRAMEWORKS:
  - id: "FW-DK-832"
    title: "7 Chief Factors of Seminar Attendance"
    content: >
      Ranked by importance: (1) RELATIONSHIP with the list — know, like, trust,
      (2) Being INFLUENTIAL — person of influence status, (3) Relevant TOPIC or THEME —
      message-to-market match, (4) KNOWLEDGE about the list — enables segmentation,
      (5) SIZE of the list — numbers game, (6) MARKETING FUNNEL — diversity of media +
      lead time, (7) MINDSET of the list — economy, timing, mood.
    source: "BIS"
    domains: ["event-marketing", "attendance-psychology"]

  - id: "FW-DK-833"
    title: "Seminar Marketing BOOSTERS System — 7 categories with 39 S&D examples"
    content: >
      Seven booster categories: (1) Repurpose with Power — one main letter → many pieces,
      (2) Celebrity — stop and look effect, (3) List Segmentation — targeted messaging,
      (4) Diverse Media — never just one channel, (5) Demonstration — show, don't tell,
      (6) P&C (Personality & Clever) — outrageous, fun, memorable, (7) Cool Stuff —
      advanced strategies like surveys, engagement, add-ons.
    source: "BIS"
    domains: ["event-marketing", "marketing-funnels"]

  - id: "FW-DK-834"
    title: "Repurpose with Power System — main sales letter → 18+ derivative media pieces"
    content: >
      System: (1) Write one comprehensive multi-page main sales letter, (2) Repurpose to
      website landing page, (3) Chop into 18 emails over 6 weeks, (4) Create video sales
      letter from same copy, (5) Pull segments for newsletter inserts, (6) Create 2-page
      fax, (7) Script voice broadcast, (8) Create magalogue, (9) Design postcards,
      (10) Produce DVD/CD mailings. All from ONE original source document.
    source: "BIS"
    domains: ["copywriting", "content-repurposing"]

  - id: "FW-DK-835"
    title: "List Segmentation Framework — 8 dimensions for targeted event invitations"
    content: >
      Segment by: (1) Seminar attendees vs non-attendees, (2) Customers vs prospects,
      (3) Location — driving distance vs flying, (4) Contact information available,
      (5) Previous purchase history, (6) Previous attendees at THIS event (alumni),
      (7) International vs domestic, (8) Industry-specific data. Each segment gets
      different cover letter copy on top of the same base sales letter.
    source: "BIS"
    domains: ["segmentation", "list-management"]

  - id: "FW-DK-836"
    title: "Diverse Media Arsenal — 10+ channels for event promotion"
    content: >
      Media channels: (1) Direct mail multi-page sales letter, (2) Website/landing page,
      (3) Email sequences, (4) Newsletter inserts, (5) Online TV/video, (6) Online ezine,
      (7) Fax — 2-page with order form, (8) Voice broadcast with personality,
      (9) Newspaper advertising, (10) Postcards, (11) Magalogues, (12) DVD mailings,
      (13) CD mailings. Never rely on just one. Diversity always wins.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]

  - id: "FW-DK-837"
    title: "Demonstration Marketing Framework — 3 types of demonstration"
    content: >
      Three demonstration types: (1) Social proof demonstration — list of attendees
      showing 'everyone else is coming,' (2) Visual demonstration — photo of previous
      event showing the crowd and energy, (3) Common enemy demonstration — visual of
      the competitor/enemy being defeated. Demonstration always outperforms assertion.
    source: "BIS"
    domains: ["marketing-funnels", "direct-marketing"]

  - id: "FW-DK-838"
    title: "Personality & Clever Marketing Toolkit — 9 creative mailing formats"
    content: >
      Creative formats: (1) Birthday bash themed mailing, (2) Travel postcards sequence
      (Days 2-6-12), (3) Check postcard — 'how I'm spending my $42K', (4) Puzzle piece
      mailing with prize, (5) 'Tickets enclosed' envelope, (6) Big check mailing,
      (7) Trashcan follow-up postcard, (8) Mom's letter, (9) J. Squirrel letter with
      peanuts — 'you must be nuts if you're not coming.'
    source: "BIS"
    domains: ["direct-marketing", "creative-marketing"]

  - id: "FW-DK-839"
    title: "Cool Stuff (Advanced Strategies) Toolkit — 7 advanced event marketing tactics"
    content: >
      Advanced tactics: (1) 3-Step Survey System — survey → results → give what asked,
      (2) Personalized 'Don't Jump' fax cartoon, (3) Keep Them Engaged monthly mailings,
      (4) Add-On Seminar to another event, (5) Boot Camp in a Box for non-attendees,
      (6) 'Overwhelming Sadness' no-show follow-up, (7) Homer Letter — post-event from
      creative sender with 3 reasons why they didn't register.
    source: "BIS"
    domains: ["event-marketing", "advanced-tactics"]

  - id: "FW-DK-840"
    title: "Site Selection Checklist — 5 criteria for choosing event venue"
    content: >
      Five criteria: (1) Location — isolated preferred over downtown, (2) Flight access —
      easy to reach from anywhere (Chicago = 2.5h from anywhere in US), (3) Best time
      of year — no Chicago in February, (4) Site tour — send team before signing contract,
      (5) VIP suites — availability for speakers and VIPs. Hotels will pay for site visit
      if your event is large enough.
    source: "BIS"
    domains: ["event-logistics"]

  - id: "FW-DK-841"
    title: "Contract Negotiation Framework — terms, hidden fees, bonuses, vendor tips"
    content: >
      Negotiate: TERMS — internet rate clause, cancellation clause, noise clause, hotel
      concessions. HIDDEN FEES — shipping/receiving, AV requirements, convention center fees,
      room types, rigging costs. BONUSES — meeting room rental (free with enough rooms),
      24-hour access, service fees waived, resort fees waived, early registration incentives.
      VENDORS — local decorators, setup/breakdown time, competitive AV bids, multi-event discounts.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]

  - id: "FW-DK-842"
    title: "Seminar Choreography Maximization Framework — 10 choreography elements"
    content: >
      Ten elements: (1) Deliver great value ASAP, (2) Rank top 3 objectives — build agenda
      around them, (3) Diversity/non-duplication of topics, (4) Speaker introductions by
      host (influence transfer), (5) Speakers respectful of other speakers, (6) Resource
      offers positioned around objectives, (7) Position speakers to retain attendance,
      (8) General vs breakout session balance, (9) Secret sauce: unique experience elements,
      (10) Pre-registration for next event.
    source: "BIS"
    domains: ["event-choreography", "event-marketing"]

  - id: "FW-DK-843"
    title: "Unique Experience Elements Checklist — 12 elements that transform seminar into experience"
    content: >
      Twelve elements: (1) Networking events by membership level, (2) Special meal functions,
      (3) Book signings with authors, (4) Meet-and-greet/photo ops with celebrities,
      (5) Contests and competitions, (6) Award ceremonies, (7) Prize giveaways,
      (8) Chair massage therapists, (9) VIP lounge by level, (10) Special Q&A sessions,
      (11) Exhibitors as resources, (12) Speaker resources for fast implementation.
    source: "BIS"
    domains: ["unique-experience-design", "event-marketing"]

  - id: "FW-DK-844"
    title: "Celebrity Integration Framework — selection, ROI, and marketing application"
    content: >
      Steps: (1) Find RELEVANT celebrity entrepreneur — not just famous but aligned with
      audience, (2) Calculate ROI: extra seats × ticket price vs celebrity fee, (3) Use
      celebrity in all marketing: Photoshopped images, greeting cards, main sales letter,
      (4) Celebrity creates 'stop and look' effect — 'What is [celebrity] doing with
      [you]?', (5) New attendees attracted by celebrity become repeat customers compounding ROI.
    source: "BIS"
    domains: ["celebrity-marketing", "event-marketing"]

  - id: "FW-DK-845"
    title: "Pre-Registration at Event System — sell next year while they're excited"
    content: >
      System: (1) Present registration offer near end of current event, (2) Offer lowest
      fee available anywhere, (3) Include bonus: all marketing examples/content shown at
      event, (4) Include free bonus day, (5) Easy monthly payment plan, (6) 100% refund
      30+ days out (minus bonus materials cost), (7) Guest add-on for $397/each,
      (8) Homer Letter follow-up for non-registrants after event.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

  - id: "FW-DK-846"
    title: "Endorsed Mailing Framework — leveraging other companies' lists for event promotion"
    content: >
      Framework: (1) Identify companies whose customers would benefit from your event,
      (2) Create co-branded letter: 'Because you are a customer of [company], I'd like
      to invite you...', (3) Include special training relevant to that company's product
      at the event, (4) The endorsing company mails to THEIR list on your behalf.
      This is list segmentation via partnership.
    source: "BIS"
    domains: ["marketing-funnels", "partnerships"]

  - id: "FW-DK-847"
    title: "Attendance Psychology Framework — motivational spectrum from aspiration to rescue"
    content: >
      Buyer motivations for attending events span a spectrum: ASPIRATION (early adopters
      who want to grow), SOCIAL PROOF (mainstream who need to see others attending),
      FEAR/RESCUE (desperate who need turnaround). Marketing must address all three:
      success testimonials for aspirers, attendee lists for social proof, turnaround
      stories for the desperate. Tell the rescue story EVERY TIME.
    source: "BIS"
    domains: ["attendance-psychology", "marketing-funnels"]

  - id: "FW-DK-848"
    title: "Keep Them Engaged System — monthly touchpoints from registration to event"
    content: >
      Starting 4 months before event: MONTH 1 — hotel registration info + free content,
      MONTH 2 — guest add-on offer + free content, MONTH 3 — event schedule preview +
      free content, MONTH 4 — final details + last free content piece. Each mailing
      includes event logistics PLUS a valuable gift (CDs, special report). Purpose:
      maintain excitement and reduce cancellations/no-shows.
    source: "BIS"
    domains: ["event-marketing", "retention"]

  - id: "FW-DK-849"
    title: "Zoom-Zoom Driving Distance Mailing — targeting local attendees with guilt leverage"
    content: >
      For prospects within driving distance: send mailing with toy car inside. Copy
      emphasizes: 'People from Japan, Australia, New Zealand are spending thousands to
      fly here. You can just get in your car and drive over.' Creates guilt/contrast
      that makes NOT attending feel absurd given proximity.
    source: "BIS"
    domains: ["direct-marketing", "segmentation"]

# ======================================================================
# L5_METHODOLOGIES — 12 elements (MET-DK-679..690)
# ======================================================================

L5_METHODOLOGIES:
  - id: "MET-DK-679"
    title: "Complete Event Marketing System — from first sales letter to post-event follow-up"
    content: >
      Step-by-step: (1) Write comprehensive multi-page main sales letter 6 months out,
      (2) Repurpose to website, 18 emails, newsletter inserts, fax, voice broadcast,
      postcards, magalogue, DVD, CD, (3) Segment list by 8 dimensions and create
      customized cover letters, (4) Layer in celebrity for stop-and-look effect,
      (5) Add demonstration elements to all materials, (6) Deploy diverse media over
      6 months with 90+ touches, (7) Send monthly engagement mailings to registered,
      (8) 10-14 days before: Boot Camp in a Box to non-registrants, (9) At event: sell
      next year pre-registration, (10) Post-event: Homer Letter to non-registrants,
      (11) Post-event: Sadness Letter to no-shows.
    source: "BIS"
    domains: ["event-marketing", "marketing-funnels"]

  - id: "MET-DK-680"
    title: "Hotel Contract Negotiation Methodology — 6-week structured negotiation"
    content: >
      Step-by-step: (1) Send team for site tour before committing, (2) Receive first
      contract — NEVER sign it, (3) Week 1-2: negotiate Internet rate clause, cancellation
      clause, noise clause, (4) Week 2-3: identify and negotiate all hidden fees —
      shipping, AV, rigging, resort fees, (5) Week 3-4: negotiate bonuses — free meeting
      rooms, 24-hour access, service fee waivers, early registration incentives,
      (6) Week 4-5: vendor negotiations — local decorators, competitive AV bids, multi-event
      discounts, (7) Week 5-6: finalize room types, VIP suites, setup/breakdown schedule.
      Total timeline: ~6 weeks of back-and-forth.
    source: "BIS"
    domains: ["event-logistics", "negotiation"]

  - id: "MET-DK-681"
    title: "Event Choreography Methodology — from agenda design to unique experience"
    content: >
      Step-by-step: (1) Define top 3 objectives for the event, (2) Place highest-value
      speaker as opener — validate attendee decision immediately, (3) Build agenda with
      #1 objective as primary driver, everything else subordinate, (4) Ensure zero topic
      duplication among speakers, (5) Host introduces all speakers personally (influence
      transfer), (6) Position 'anchor' speakers on later days to retain attendance
      (Frank Kern on Day 3), (7) Place prizes/giveaways at end, (8) Schedule general
      sessions for universal topics, breakouts for specialized, (9) Add unique experience
      elements (12-element checklist), (10) End with pre-registration for next event.
    source: "BIS"
    domains: ["event-choreography", "event-marketing"]

  - id: "MET-DK-682"
    title: "3-Step Survey-to-Seminar Sales Methodology"
    content: >
      Step-by-step: (1) SURVEY — send survey to list asking what topics they want at
      the next event, include incentive (T-shirt, gift), (2) REPORT — send results back
      showing 'these are the topics YOU chose,' (3) SELL — build entire sales letter on
      the premise 'this is what you asked for, so we built it for you.' Works in any
      business. The survey creates commitment and ownership before the offer.
    source: "BIS"
    domains: ["marketing-funnels", "event-marketing"]

  - id: "MET-DK-683"
    title: "List Segmentation Execution Methodology — same sales letter, 8 cover letter versions"
    content: >
      Step-by-step: (1) Create main comprehensive sales letter (20+ pages),
      (2) Identify 8 segments from your list data, (3) Write customized cover letter
      for each: previous attendees of related event, driving distance prospects (Zoom Zoom
      with toy car), international (free airfare offer), endorsed mailing for partner lists,
      alumni of this specific event, product buyers, first-timers, VIP/high-value,
      (4) Stack customized cover letter on top of SAME base sales letter, (5) Deploy all
      versions simultaneously.
    source: "BIS"
    domains: ["segmentation", "direct-marketing"]

  - id: "MET-DK-684"
    title: "Boot Camp in a Box Sales Methodology — converting non-attendees into recording buyers"
    content: >
      Step-by-step: (1) Market event heavily to full list over 6 months, (2) Track who
      registers and who doesn't, (3) 10-14 days before event, send 'SOLD OUT' message to
      non-registrants, (4) Offer recordings package (CDs, DVDs, transcripts) at premium
      price, (5) Use 'because we're sold out, here's your alternative' positioning,
      (6) The 6 months of marketing already softened the beachhead — they WANT the content
      but couldn't commit to attending. Recording offer converts that latent demand.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

  - id: "MET-DK-685"
    title: "Homer Letter Post-Event Follow-Up Methodology"
    content: >
      Step-by-step: (1) Identify all attendees who did NOT register for next year at the
      event, (2) Within days of event ending, send personalized letter from creative sender
      (your dog, spouse, assistant), (3) Include 3 reasons why they might not have registered:
      (a) too caught up in content to turn in form, (b) afraid they won't implement and
      don't want accountability, (c) had to leave early and missed the offer, (4) Include
      reason-why copy for each, (5) Attach registration form with same pricing offered at
      event, (6) This consistently converts additional registrations.
    source: "BIS"
    domains: ["event-marketing", "follow-up"]

  - id: "MET-DK-686"
    title: "Travel Postcards Engagement Sequence — Days 2, 6, 12 drip mailing"
    content: >
      Step-by-step: (1) While traveling, buy postcards from each destination, (2) Upon
      return, duplicate postcards at scale (15,000 copies), (3) Day 2: mail postcard from
      first destination with message, (4) Day 6: mail postcard from second destination,
      (5) Day 12: mail postcard from third destination, (6) Recipients live your trip
      through their lives over 12 days, (7) Include event promotion copy on back.
      Creates personality, engagement, and anticipation through a fun sequence.
    source: "BIS"
    domains: ["direct-marketing", "creative-marketing"]

  - id: "MET-DK-687"
    title: "No-Show Recovery Methodology — overwhelming sadness wave"
    content: >
      Step-by-step: (1) After local event, identify registered no-shows, (2) Send
      'overwhelming wave of sadness washed over me' letter immediately, (3) Explain
      you noticed they didn't attend, (4) Offer second chance to attend next occurrence,
      (5) In local markets where events repeat frequently, this recovers a significant
      percentage of no-shows. The emotional/humorous tone prevents offense while
      creating guilt-based action.
    source: "BIS"
    domains: ["event-marketing", "follow-up"]

  - id: "MET-DK-688"
    title: "Add-On Seminar Revenue Methodology — parasitic event strategy"
    content: >
      Step-by-step: (1) Identify a large event in your industry or a related guru's event,
      (2) Negotiate to add one day before the main event in the same city, (3) Always
      do it the day BEFORE (not after — people leave early), (4) Market to the main
      event's attendee list: 'since you're already coming to [city] for [event], add
      this specialized day', (5) Charge separately for the add-on day, (6) 70 paid
      attendees is a realistic target. Works especially well with industry conventions.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

  - id: "MET-DK-689"
    title: "Pre-Registration at Event Selling Methodology — the highest-conversion offer"
    content: >
      Step-by-step: (1) Near end of current event, present next year's offer,
      (2) Position as lowest fee available — will NEVER be this cheap again,
      (3) Include bonuses: all marketing examples shown at event + free bonus day,
      (4) Offer easy monthly payment plan ($397/month), (5) Include 100% refund
      guarantee 30+ days out (minus bonus materials cost), (6) Allow guest add-ons at
      $397 each (spouse, employee, 1099 associate), (7) Collect forms before people
      leave the venue, (8) Target: 50%+ of attendees registering before they leave.
      647 pre-registrations from 1,200 attendees achieved.
    source: "BIS"
    domains: ["event-marketing", "revenue-maximization"]

  - id: "MET-DK-690"
    title: "Endorsed Mailing Execution Methodology — leveraging partner lists"
    content: >
      Step-by-step: (1) Identify partner companies whose customers align with your event
      topic, (2) Propose co-branded mailing: partner endorses your event to their list,
      (3) Create letter FROM the partner CEO: 'Because you are a customer of [company],
      I'm inviting you to [event],' (4) Include special training segment at event relevant
      to partner's product (e.g., Infusion users get Infusion-specific training),
      (5) Partner mails at their cost or shared cost, (6) This is list segmentation via
      strategic partnership — the endorsement transfers trust.
    source: "BIS"
    domains: ["marketing-funnels", "partnerships"]


# DNA-HFYIC-APPEND — Dan Kennedy: How to Find Your Ideal Customer
# Source: HFYIC (GKIC Seminar — Whale Hunting)
# Elements: 66
# Date: 2026-03-16
# Next IDs after: FIL-DK-681, MM-DK-664, HEUR-DK-920, FW-DK-832, MET-DK-679

layers:
  L1_PHILOSOPHIES:
    # FIL-DK-669 to FIL-DK-680 (12 elements)
    - id: "FIL-DK-669"
      title: "Differential Customer Value Is Real"
      content: "Not all customers are the same. Some are dramatically more valuable than others. Very few business people ever give this any thought. Most people's approach to customers is anybody they can get."
      source: "HFYIC-CD1-Track1"
      domains: [customer-avatar, whale-hunting]

    - id: "FIL-DK-670"
      title: "Whales Mate With Whales"
      content: "If you're going to hunt for a whale, you have to present yourself in a way that is really acceptable to the whale. You need affinity links — shared personal history, not credentials."
      source: "HFYIC-CD1A-Track8"
      domains: [positioning, whale-hunting, authority-creation]

    - id: "FIL-DK-671"
      title: "Whales Want Information Not Education"
      content: "Whales do not want to know how to do it. They want to understand it and know that YOU know how to do it. They want to find somebody they can trust to do things. Inform, don't educate."
      source: "HFYIC-CD1A-Track9"
      domains: [whale-hunting, sales-psychology, positioning]

    - id: "FIL-DK-672"
      title: "Show Up Alone Principle"
      content: "Be the only one who shows up in this place. Matt Zagula's principle: show up like no one else. Sidney Barrows advertised in the Financial Times — only escort service there — got 4-7x average client value."
      source: "HFYIC-CD1-Track8"
      domains: [place-strategy, positioning, whale-hunting]

    - id: "FIL-DK-673"
      title: "Marketing Is Buying Haystacks"
      content: "In marketing, what we all do is we buy a haystack and pay for every piece of straw. The question is how small a haystack are you going to build that has a lot of gold needles vs how big with few."
      source: "HFYIC-CD1A-Track9"
      domains: [marketing, lead-generation, whale-hunting]

    - id: "FIL-DK-674"
      title: "High Maintenance Client Has No Value"
      content: "They have to be respectful, well-behaved and low maintenance. A high maintenance client is no good for me regardless of spending potential."
      source: "HFYIC-CD1-Track6"
      domains: [client-management, whale-hunting]

    - id: "FIL-DK-675"
      title: "Hit List Is The Starting Point"
      content: "David Ogilvy made a list of 100 dream accounts. Over time, 38 became clients. Most people never make a list — they take anyone they can get."
      source: "HFYIC-CD1-Track7"
      domains: [prospecting, whale-hunting, direct-marketing]

    - id: "FIL-DK-676"
      title: "Build Character Profiles Like Fiction Writers"
      content: "You should have a clear character profile of your whale, like a fiction writer creates a character. Go to Barnes & Noble, writer section — they have 26-page fill-in-the-blank character profile forms."
      source: "HFYIC-CD1A-Track7"
      domains: [customer-avatar, copywriting, whale-hunting]

    - id: "FIL-DK-677"
      title: "Credentials Don't Attract Whales — Affinity Does"
      content: "Most advisors think humble beginnings are irrelevant or embarrassing. Wrong. Whales connect through shared personal history — Ted's outhouse photos sold more than his certifications."
      source: "HFYIC-CD1A-Track8"
      domains: [positioning, trust-building, whale-hunting]

    - id: "FIL-DK-678"
      title: "Never Rush Marketing Creation"
      content: "Big pet peeve: the rush to get stuff out. We work for three months on a script before putting half a million dollars at stake. Your time has the same value — always get a qualified reader to red-line."
      source: "HFYIC-CD1A-Track7"
      domains: [copywriting, quality-control]

    - id: "FIL-DK-679"
      title: "No Excuse Not To Use Direct Mail For Whale Hunting"
      content: "The whales already exist in somebody's list. There's just no excuse not to use direct mail if you want to do whale hunting. You can rent lists matching any behavioral profile."
      source: "HFYIC-CD1A-Track9"
      domains: [direct-mail, list-building, whale-hunting]

    - id: "FIL-DK-680"
      title: "Whale Is Not Just Monetary — It's Behavioral Fit"
      content: "A whale is not just about monetary value. It's about the kind of customer you want to deal with. The multiplier effect, the circle of influence, the maintenance level, the growth potential."
      source: "HFYIC-CD1-Track1"
      domains: [customer-avatar, whale-hunting]

  L2_MENTAL_MODELS:
    # MM-DK-652 to MM-DK-663 (12 elements)
    - id: "MM-DK-652"
      title: "Vegas Whale Definition"
      content: "A whale is someone worth between 5x and 50x the average customer. They obviously prefer 50x over 5x. This is the foundational multiplier for whale classification."
      source: "HFYIC-CD1-Track1"
      domains: [whale-hunting, customer-avatar]

    - id: "MM-DK-653"
      title: "Three Ways To Get Whales"
      content: "1) Small Pond Fishing — hit list, go after them directly. 2) Wide Net with Place Strategy — create environment where whales find you. 3) Wide Net with Lead Generation — advertise whale bait."
      source: "HFYIC-CD1-Track7"
      domains: [whale-hunting, prospecting, lead-generation]

    - id: "MM-DK-654"
      title: "Whale Markers Model"
      content: "Every business has behavioral + demographic + psychographic markers that identify whales. Financial advisors: investable assets + paid-off house + conservative mentality. Chiropractor: chronic condition + affluence + open-mindedness."
      source: "HFYIC-CD1-Track2"
      domains: [customer-avatar, whale-hunting]

    - id: "MM-DK-655"
      title: "Time-Sensitive Whale Stimulus"
      content: "Life events create temporary whales: marriage (esp. 2nd/3rd), divorce, home purchase, age benchmarks, sale of business, retirement, new hobby, disease diagnosis. Two days before, they were useless."
      source: "HFYIC-CD1-Track3"
      domains: [whale-hunting, timing, life-events]

    - id: "MM-DK-656"
      title: "Three-Step Customer Focus Process"
      content: "Step 1: Intelligence (demographics, psychographics, emotions, language). Step 2: Target Personal Positioning (affinity links). Step 3: Outreach & Invitation (low threshold, bypass gatekeepers, home addresses, inform don't educate)."
      source: "HFYIC-CD1A-Track5"
      domains: [whale-hunting, marketing, positioning]

    - id: "MM-DK-657"
      title: "Four Conversational Zones"
      content: "Most people spend most of their thought and conversational time in four places: family stuff, occupation stuff (mostly complaining), chief recreational pursuit, and money."
      source: "HFYIC-CD1A-Track6"
      domains: [customer-avatar, psychographics, copywriting]

    - id: "MM-DK-658"
      title: "Emotional Anchor Timeline"
      content: "Most people's emotional anchors: year born, first car, high school graduation, college graduation, year married. Big brands license songs from those years for commercials."
      source: "HFYIC-CD1A-Track6"
      domains: [psychographics, copywriting, emotional-triggers]

    - id: "MM-DK-659"
      title: "Out-of-Category Advertising"
      content: "Place yourself where no competitor advertises. Mattress company in chiropractic Yellow Pages. Matchmaking in car collector magazines. Exercise machine in Robb Report. The consumer matters, not the magazine category."
      source: "HFYIC-CD1-Track8"
      domains: [place-strategy, media-buying, whale-hunting]

    - id: "MM-DK-660"
      title: "Two-Offer Principle"
      content: "Always have two reasons to respond: buy now (high threshold) AND get free info (low threshold). You rarely lose the immediate buyer, but gain many who are mentally moving toward purchase."
      source: "HFYIC-CD1A-Track1"
      domains: [lead-generation, advertising, direct-response]

    - id: "MM-DK-661"
      title: "Haystack Optimization Model"
      content: "Every marketing investment buys a haystack. Most people build giant haystacks hoping to find needles. With the three-step process, build a much smaller haystack packed with gold needles."
      source: "HFYIC-CD1A-Track9"
      domains: [marketing, ROI, whale-hunting]

    - id: "MM-DK-662"
      title: "Boomer Whale Mega-Trend"
      content: "First time classic demographics are disrupted: older continue spending, younger don't replace. Anti-aging skincare sweet spot migrated from 48 to 71 in 7 years. 70 is the new 50."
      source: "HFYIC-CD1-Track4"
      domains: [demographics, affluent-marketing, whale-hunting]

    - id: "MM-DK-663"
      title: "Affinity Link Model"
      content: "Whales connect through shared biography, not credentials. Ted's outhouse photos, humble beginnings, self-made journey — these are the affinity links that close the gap between advisor and whale."
      source: "HFYIC-CD1A-Track8"
      domains: [positioning, trust-building, personal-branding]

  L3_HEURISTICS:
    # HEUR-DK-897 to HEUR-DK-919 (23 elements)
    - id: "HEUR-DK-897"
      title: "Whale = 5x-50x Average Customer"
      content: "Vegas definition: a whale is worth between 5 times and 50 times the average customer value."
      source: "HFYIC-CD1-Track1"
      domains: [whale-hunting, customer-avatar]
      type: numeric

    - id: "HEUR-DK-898"
      title: "Ogilvy Hit List: 100 → 38 Clients"
      content: "David Ogilvy made 100 dream accounts list. Over time, 38 became clients. Hit list works."
      source: "HFYIC-CD1-Track7"
      domains: [prospecting, whale-hunting]
      type: numeric

    - id: "HEUR-DK-899"
      title: "Minneapolis Case: 100 → 63 → 38 → 16"
      content: "Leadership trainer hit list: 100 targets → 63 interviews booked → 38 follow-up meetings → 16 clients. Wanted 5, got 16. FedEx package with book cover + newspaper ad + bookstore letter."
      source: "HFYIC-CD1-Track7"
      domains: [prospecting, whale-hunting, hit-list]
      type: numeric

    - id: "HEUR-DK-900"
      title: "5000 Minnows / 2 Whales = Still Worth It"
      content: "At trade shows: it's okay if there are 5,000 minnows and only 2 whales. As long as we don't kill ourselves finding them, we're in a place where they can find us."
      source: "HFYIC-CD1-Track8"
      domains: [whale-hunting, place-strategy]
      type: qualitative

    - id: "HEUR-DK-901"
      title: "Financial Advisor Whale: Paid House + Investable Assets + Conservative"
      content: "For financial advisors, whale = amount of investable assets + conservative mentality. Revealed by paid-off house + certain asset threshold."
      source: "HFYIC-CD1-Track2"
      domains: [financial-advisory, whale-hunting]
      type: behavioral

    - id: "HEUR-DK-902"
      title: "Chiropractor Whale: Chronic + Affluent + Open-Minded"
      content: "Chiropractor whale = severe chronic condition + affluence or top insurance + open-mindedness to non-medical care (herbs by mail, alternative magazine subscriptions)."
      source: "HFYIC-CD1-Track2"
      domains: [healthcare, whale-hunting]
      type: behavioral

    - id: "HEUR-DK-903"
      title: "Restaurant Whale: Frequent + Lunch AND Dinner + Large Check"
      content: "Upscale restaurant whale = frequently dines out + both lunch and dinner + large check size (more than couple). American Express will sell you that data."
      source: "HFYIC-CD1-Track3"
      domains: [restaurant, whale-hunting, data-driven]
      type: behavioral

    - id: "HEUR-DK-904"
      title: "American Express Rents Competitor Customer Data"
      content: "American Express will sell you data of people using cards at competitor restaurants — frequency, check size, dining patterns. You can steal other restaurant's customers with data."
      source: "HFYIC-CD1-Track3"
      domains: [data-driven, list-building, direct-marketing]
      type: tactical

    - id: "HEUR-DK-905"
      title: "Sidney Barrows Financial Times: 4-7x Client Value"
      content: "Sidney Barrows (Mayflower Madam) advertised in Financial Times instead of tabloids — brought clients who spent 4-7x average client value obtained through any other means."
      source: "HFYIC-CD1-Track8"
      domains: [place-strategy, whale-hunting, media-buying]
      type: numeric

    - id: "HEUR-DK-906"
      title: "Airline Magazine Article: Booked 8 Months Straight"
      content: "Chris Hagerty got 4-page article in United/Continental magazine — booked for next 8 months without doing anything. Then paid to re-run same article twice more."
      source: "HFYIC-CD1-Track8"
      domains: [publicity, place-strategy]
      type: numeric

    - id: "HEUR-DK-907"
      title: "Anti-Aging Sweet Spot: 48 → 71 in 7 Years"
      content: "$680 home skincare product — buyer sweet spot migrated from age 48 to age 71 in just 7 years. Nobody willing to go quietly into the good night anymore."
      source: "HFYIC-CD1-Track4"
      domains: [demographics, anti-aging, affluent-marketing]
      type: numeric

    - id: "HEUR-DK-908"
      title: "Matchmaking Advertised in Classic Car Magazines"
      content: "Valenti International ($25K+ fee) runs ads in Hemming's Motor News and DuPont Registry — magazines for collectors of high-priced classic cars. 50+ affluent guys who drop $80K on a Plymouth might drop $25K for matchmaking."
      source: "HFYIC-CD1-Track8"
      domains: [place-strategy, affluent-marketing, media-buying]
      type: tactical

    - id: "HEUR-DK-909"
      title: "Financial Advisor Whale Whistle: $10M-$40M Company Sale"
      content: "Direct whale whistle: 'If you intend to sell or have recently sold a company for $10M to $40M or more.' Clearly says if you don't fit, don't bother."
      source: "HFYIC-CD1A-Track2"
      domains: [lead-generation, whale-hunting, financial-advisory]
      type: numeric

    - id: "HEUR-DK-910"
      title: "Arthritis: Men = RAGE, Women = DEPRESSION"
      content: "Men react to arthritis/aging with anger and rage (can't do what they used to). Women react with depression (can't garden like always). Two completely different sales conversations required."
      source: "HFYIC-CD1A-Track7"
      domains: [psychographics, healthcare, gender-marketing]
      type: behavioral

    - id: "HEUR-DK-911"
      title: "Hearing Aids: #1 Fear = Nursing Home"
      content: "Greatest vulnerability for hearing aid sales: fear of being stuck in the home. When they can't hear, adult kids think they're addled. Hearing aid = stay out of the nursing home."
      source: "HFYIC-CD1A-Track7"
      domains: [healthcare, fear-selling, vulnerability]
      type: behavioral

    - id: "HEUR-DK-912"
      title: "80%+ Online Dating Profiles Are False"
      content: "Over 80% of online dating profiles contain false or embellished information. Online dating sites are used by predators and gold diggers. Alarm copy for matchmaking services."
      source: "HFYIC-CD1A-Track4"
      domains: [alarm-copy, matchmaking]
      type: numeric

    - id: "HEUR-DK-913"
      title: "Won't Read/Listen/Watch/Work = Not A Whale"
      content: "If they won't read, won't listen, won't watch, and won't work — they're not a whale for us and won't be around long. Study ethic and work ethic are whale markers."
      source: "HFYIC-CD1-Track6"
      domains: [whale-hunting, customer-qualification]
      type: behavioral

    - id: "HEUR-DK-914"
      title: "GKIC $100K Club: Lifetime Whale Value"
      content: "A whale for GKIC is someone who can/will spend $100,000+ in their lifetime. Behavioral characteristics: own businesses, entrepreneur mindset, study ethic."
      source: "HFYIC-CD1-Track6"
      domains: [whale-hunting, ltv-maximization]
      type: numeric

    - id: "HEUR-DK-915"
      title: "DK Client Whale: $75K+ Project Investment"
      content: "DK's personal whale definition: upwards from $75,000 per project + sufficient scope + year-to-year continuation + intelligent/capable + respectful/low maintenance + leader in field."
      source: "HFYIC-CD1-Track5"
      domains: [client-management, whale-hunting, pricing]
      type: numeric

    - id: "HEUR-DK-916"
      title: "Hit List Fake Newsletter Tactic"
      content: "On two occasions, signed up target whale list as if they had subscribed to newsletter. Welcome letter + invoice marked paid + first issue. They think they subscribed. Let them mature as customers."
      source: "HFYIC-CD1-Track7"
      domains: [guerrilla-marketing, whale-hunting, newsletters]
      type: tactical

    - id: "HEUR-DK-917"
      title: "Trade Show: Dr. Fernandez 'Write Up Everything You Sell'"
      content: "Dr. Peter Fernandez at NSA show: gave Amex card, said 'write up an order for everything you sell.' Became $9,000 first order + 60+ speaking engagements. He found us — place strategy works."
      source: "HFYIC-CD1-Track8"
      domains: [place-strategy, whale-hunting]
      type: anecdotal

    - id: "HEUR-DK-918"
      title: "Three Wealth Magnets For Whales"
      content: "From the wealth book: be somebody, be somewhere, and do something so that a whale can find you. That's place strategy."
      source: "HFYIC-CD1-Track8"
      domains: [whale-hunting, place-strategy, personal-branding]
      type: qualitative

    - id: "HEUR-DK-919"
      title: "Pre-Show + At-Show + Post-Show Strategy Required"
      content: "Trade shows are very effective but most people do horrible job and blame the show. Correct strategy needs pre-show + at-show + post-show components."
      source: "HFYIC-CD1-Track8"
      domains: [trade-shows, whale-hunting, event-marketing]
      type: qualitative

  L4_FRAMEWORKS:
    # FW-DK-820 to FW-DK-831 (12 elements)
    - id: "FW-DK-820"
      title: "Whale Definition Framework"
      content: "Define whale by: 1) Monetary value (5x-50x avg). 2) Multiplier effect (circle of influence). 3) Behavioral fit (maintenance level, work ethic). 4) Growth potential (year-to-year continuation)."
      source: "HFYIC-CD1-Track1"
      domains: [whale-hunting, customer-avatar]

    - id: "FW-DK-821"
      title: "Three Whale Hunting Methods"
      content: "Method 1: Small Pond Fishing (hit list, direct targeting). Method 2: Wide Net Place Strategy (let whales find you). Method 3: Wide Net Lead Generation (advertise whale bait information offers)."
      source: "HFYIC-CD1-Track7"
      domains: [whale-hunting, prospecting, lead-generation]

    - id: "FW-DK-822"
      title: "Hit List Campaign Structure"
      content: "1) Create credibility asset (book cover, newspaper ad, retailer letter). 2) FedEx to target list as interview pitch. 3) Book interviews. 4) Convert interviews to follow-up meetings. 5) Convert meetings to clients."
      source: "HFYIC-CD1-Track7"
      domains: [prospecting, whale-hunting, hit-list]

    - id: "FW-DK-823"
      title: "Place Strategy: Show Up Where No One Else Does"
      content: "Find publications/events your competitors ignore but your whale reads/attends. Mattress in chiropractic Yellow Pages. Matchmaking in DuPont Registry. Exercise machine in Robb Report."
      source: "HFYIC-CD1-Track8"
      domains: [place-strategy, media-buying, whale-hunting]

    - id: "FW-DK-824"
      title: "Whale Bait Architecture"
      content: "Offer information, not immediate sales engagement. Free CD/DVD/webinar/report/book. Lower the threshold. Most whale bait is information that allows someone to learn without engaging a salesperson."
      source: "HFYIC-CD1A-Track1"
      domains: [lead-generation, whale-hunting, content-marketing]

    - id: "FW-DK-825"
      title: "Match-Up Copy Framework"
      content: "Profile ideal customer personas with photos + copy. 'What kind of people rely on [Name]?' Each persona gets: 1) Photo. 2) Profile description. 3) Full page of matching copy. Let prospects self-identify."
      source: "HFYIC-CD1A-Track3"
      domains: [copywriting, whale-hunting, targeting]

    - id: "FW-DK-826"
      title: "Direct Whale Whistle"
      content: "Embed specific qualifying criteria in ad copy: 'If you intend to sell a company for $10M-$40M or more.' Clearly excludes non-whales. Whale whistle can be direct or subtle."
      source: "HFYIC-CD1A-Track2"
      domains: [copywriting, lead-generation, whale-hunting]

    - id: "FW-DK-827"
      title: "Affinity Link Positioning Framework"
      content: "1) Profile your whale's biography/values. 2) Find shared personal history. 3) Lead marketing with affinity, not credentials. 4) Use photos and stories of shared experience. Phyllis: wife, mother, athlete, Arizona lover."
      source: "HFYIC-CD1A-Track8"
      domains: [positioning, trust-building, whale-hunting]

    - id: "FW-DK-828"
      title: "Customer Intelligence Stack (6 Layers)"
      content: "1) Demographics. 2) Psychographics (mindset, how they think). 3) Emotional Background (upbringing, heard at top of stairs). 4) Current State of Mind (5 opinions, 5 trends). 5) Weaknesses & Vulnerabilities. 6) Language (tribal terms, dog whistles)."
      source: "HFYIC-CD1A-Track5"
      domains: [customer-avatar, psychographics, copywriting]

    - id: "FW-DK-829"
      title: "Character Profile Construction Method"
      content: "Use fiction-writer character profiles (26-page templates from writer's section at bookstore). Define: top 5 beliefs/values, emotional anchors, emotional reactions (men=rage, women=depression for aging), conversational zones."
      source: "HFYIC-CD1A-Track7"
      domains: [customer-avatar, copywriting, psychographics]

    - id: "FW-DK-830"
      title: "Whale Sighting Categories (2010s)"
      content: "Disproportionate whales in: Boomers/Seniors, Boomer professionals, Late-life divorced (50+), Late-life second families, Bucket-listers, Frustrated fixed-income investors, High-cost hobby enthusiasts, Second-act entrepreneurs, International travelers, Anti-aging buyers."
      source: "HFYIC-CD1-Track4"
      domains: [demographics, affluent-marketing, whale-hunting]

    - id: "FW-DK-831"
      title: "Alarm Copy Architecture for Matchmaking"
      content: "Layer alarm throughout: privacy/reputation concerns, predators on dating sites, emotionally unstable women, security clearance issues, career risk. Then position service as the safe alternative."
      source: "HFYIC-CD1A-Track3"
      domains: [copywriting, alarm-copy, matchmaking]

  L5_METHODOLOGIES:
    # MET-DK-672 to MET-DK-678 (7 elements)
    - id: "MET-DK-672"
      title: "Minneapolis Hit List Method"
      content: "1) Make list of 100 CEOs researched for leadership interest. 2) Create book cover for 'Minneapolis Top Business Leaders.' 3) Create full-page newspaper ad featuring their names. 4) Get bookstore commitment letter. 5) FedEx package (cover + ad + letter) to each. 6) Pitch: interview them for book. 7) 63 interviews → 38 follow-ups → 16 clients."
      source: "HFYIC-CD1-Track7"
      domains: [prospecting, whale-hunting, hit-list]

    - id: "MET-DK-673"
      title: "Three-Step Customer Focus Process"
      content: "Step 1 INTELLIGENCE: demographics + psychographics + emotional background + current state + vulnerabilities + language. Step 2 TARGET PERSONAL POSITIONING: affinity links (shared biography over credentials). Step 3 OUTREACH & INVITATION: low threshold, bypass gatekeepers, home addresses, information not education."
      source: "HFYIC-CD1A-Track5"
      domains: [whale-hunting, marketing, customer-avatar]

    - id: "MET-DK-674"
      title: "Copywriter Vocabulary Building Method"
      content: "1) Collect target's magazines/books/content. 2) Use color highlighters to mark repetitively used terms. 3) Cross-reference with thesaurus for synonyms. 4) Build vocabulary list. 5) Get qualified reader (someone FROM the tribe who understands DR) to red-line copy for language errors."
      source: "HFYIC-CD1A-Track7"
      domains: [copywriting, customer-avatar, language]

    - id: "MET-DK-675"
      title: "Whale Profile Construction Method"
      content: "1) Define monetary threshold (5x-50x avg). 2) Identify behavioral markers. 3) Map psychographic fit. 4) Identify time-sensitive triggers. 5) Match to list universe. 6) Build character profile like fiction writer."
      source: "HFYIC-CD1-Track2"
      domains: [whale-hunting, customer-avatar, prospecting]

    - id: "MET-DK-676"
      title: "Two-Offer Ad Structure"
      content: "Every ad should have: 1) Primary offer — engage now (high threshold: call, book meeting). 2) Secondary offer — get free information (low threshold: free report, DVD, webinar). You rarely lose immediate buyers but gain future buyers."
      source: "HFYIC-CD1A-Track1"
      domains: [advertising, lead-generation, direct-response]

    - id: "MET-DK-677"
      title: "List-Based Whale Targeting"
      content: "1) Define whale profile. 2) Research available lists (Amex data, magazine subscribers, club members, donors). 3) Cross-match profile criteria (age, single, income, behavioral). 4) Build targeted direct mail campaign to matched list."
      source: "HFYIC-CD1A-Track9"
      domains: [direct-mail, list-building, whale-hunting]

    - id: "MET-DK-678"
      title: "Niche-Specific Ad Copy Multiplication"
      content: "Create one core ad (e.g. matchmaking) then multiply by niche: dentist version, lawyer version, CPA version, military version. Only the headline and whale whistle changes; body copy is generic. Run in each profession's state/city journal."
      source: "HFYIC-CD1A-Track3"
      domains: [copywriting, niche-marketing, advertising]


    # ============================================================
    # SOURCE 8: LIVING LEGEND FORMULA (LLF)
    # Extracted: 2026-03-15
    # Files: Part 1, Part 2, Media Strategies, Q&A Manual
    # ============================================================

    # --- L1: PHILOSOPHIES (FIL-DK-462 to FIL-DK-511) ---

    - id: "FIL-DK-462"
      title: "Legend vs Celebrity Distinction"
      content: >
        A legend has depth, teaching, a school of thought, and leaves a lasting legacy.
        A celebrity is famous but often has no depth, no methodology, no lasting impact.
        Celebrities run the risk of winding up broke because they create massive traffic
        but have no organized system for monetizing it. Legends build systems.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-463"
      title: "School of Thought Is Mandatory for Legend Status"
      content: >
        You will have your own school of thought in the field in which you are in,
        about which you can then be a thought leader if you are going to get to
        legendary status. DK's own school of thought is Magnetic Marketing — taking
        the tenets of mail order and moving them to non-mail order businesses.
        Naming it distinctively matters more than the underlying concept being new.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_2.txt"

    - id: "FIL-DK-464"
      title: "Cannot Be Prophet Without Being Heretic First"
      content: >
        You cannot be a prophet without first being a heretic. To establish a school
        of thought you must challenge existing orthodoxy. This creates controversy
        which is one of the 16 Golden Threads. The willingness to be contrarian
        and take positions others won't is foundational to legend building.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-465"
      title: "Better to Be Prolific Than Good"
      content: >
        If you can sum up my whole author published strategy, you can sum it up as
        better to be prolific than good. It's not a single thing I've ever done that
        couldn't be done better. It's more important to have a lot of stuff out there
        and to keep having stuff going out there than it is to have the best thing
        out there. I'm not getting paid by literary critique.
      domain: publishing
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-466"
      title: "Publish or Perish — Non-Negotiable"
      content: >
        You either publish or you perish when you set out to do this stuff. Being
        published matters, and being published a lot matters a lot. There are two
        things in America where you make yourself irrelevant — if you aren't
        published and if you aren't seen on TV. You can maybe get away with one
        but you damn sure can't get away with both.
      domain: publishing
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-467"
      title: "Investment in Legend-Building Is Non-Negotiable"
      content: >
        Legend building requires deliberate, sustained investment of both time and
        money. Every project gets a money budget and a time budget. The book is done
        when it has used up its days. Peyton don't get a fifth quarter. Game over.
        This is how you stay prolific — rigid resource allocation prevents perfectionism.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-468"
      title: "The Single-Word Answer Is DEFIANCE"
      content: >
        When asked what separates legends from everyone else, the single-word answer
        is DEFIANCE. Defiance of norms, defiance of conventional wisdom, defiance of
        what everybody else does. This is the thread that runs through every living
        legend — the willingness to stand apart and refuse to conform.
      domain: legend-building
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-469"
      title: "Free Content Has Only 3 Purposes — Then STOP"
      content: >
        Free content serves exactly three purposes: attract, demonstrate capability,
        and build trust. That's it. STOP. You must be very careful about making too
        much free and viral. Most people give away the store and have no organized
        system for monetizing the traffic their free content creates.
      domain: content-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-470"
      title: "If Amazon Can Be You, You're DOA"
      content: >
        If Amazon can replace what you do, you are dead on arrival. The disappearing
        middle means anyone who can be commoditized will be. You must create
        positioning and legend status that makes you irreplaceable and un-Amazonable.
        The only defense is to be so unique, so positioned, that there is no substitute.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-471"
      title: "Behavioral Psychology and Math Are Foundation of Direct Marketing"
      content: >
        Everything in direct marketing comes down to behavioral psychology and math.
        These are the two foundational disciplines. If you understand how people
        behave and you can do the math on what it costs to acquire and retain them,
        you have the entire foundation of effective marketing.
      domain: direct-marketing
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-472"
      title: "Failure Comes From Wanting Simple Answers to Complex Problems"
      content: >
        The one thing question is a BAD question. Failure comes from wanting simple
        answers to complex problems. People always want the one thing, the silver
        bullet, the magic answer. Success requires a complex, multi-faceted approach.
        Anyone promising the one thing is either lying or doesn't understand the problem.
      domain: success-philosophy
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-473"
      title: "Money Doesn't Care About New vs Old Media"
      content: >
        When you and I go make a bank deposit, we do not get a bonus for using the
        newest media. The teller doesn't go, oh, you've mastered Facebook, I'll add
        20% to your deposit. Money doesn't work that way. Money has no preference
        whatsoever. So you can't either. What matters is effective, profitable media
        that serves your purposes — not whether it's new or old.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-474"
      title: "Fame Without Funnels Creates Broke Celebrities"
      content: >
        Fame in and of itself tends to dump you back down the other side. Very famous
        speaker, roughly same amount of time in the business as me, at least 10 times
        as many people through his fingers as through mine. He's at least 10 times more
        famous than I am. And he needs the money from tomorrow's gig to pay last week's
        bills after 35 years. I do not. Very simple difference — no funnel, no capture,
        no continuous or sequential monetization.
      domain: monetization
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-475"
      title: "Omnipresence Is a Non-Negotiable Strategy"
      content: >
        Within a target audience, they can't turn in a circle 360 degrees at any time
        in 24 hours and seven days, 365 days out of the year without seeing you or
        hearing you or being reminded of you. That's omnipresence. I want books on
        four different bookshelves. I want the bobblehead on the desk. I want the
        mouse pad, the t-shirt. Two newsletter packages a month, weekly memo.
        You must be inescapable to your target audience.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-476"
      title: "Piracy and Theft Are a Media Strategy"
      content: >
        eBay is the largest criminal conspiracy in the world. We spent a decade trying
        to stop piracy. Then we said we can't stop it. So all we can do is make sure
        we embed real well in everything they're going to steal and sell, pathways that
        bring people to us. A lot of people sheepishly say I bought your thing on eBay.
        And now they're paying $2,500 to be at a conference. I'd like 1,000 of them a day.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-477"
      title: "Beneficial Association Creates Unearned Authority"
      content: >
        Standing next to the right people transfers their authority to you without
        you earning it independently. This is beneficial association — the Reagan/Peter
        Lowe principle. Nido Qubein went from refugee to university president to
        Biltmore board through a deliberate chain of beneficial associations.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-478"
      title: "Physical Newsletter Beats Digital — Sitting With Friend Over Coffee"
      content: >
        A physical newsletter creates an experience that digital cannot replicate.
        It's like sitting with a friend over coffee. The tactile experience, the
        permanence, the deliberate act of reading creates a relationship depth
        that email and social media cannot achieve. This is why DK insists on
        print despite the digital age.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_2.txt"

    - id: "FIL-DK-479"
      title: "Nobody in Hollywood Wants Your Content"
      content: >
        Nobody in Hollywood, or anyplace else, wants your content or for that matter
        anybody else's content. Publishers hate their authors. Movie studios hate the
        writers, they hate the actors. They want lots of seats in theaters, subscribers
        to web content, money. None of them are content. The right premise is not
        I have stuff to sell — it's who can give me access to the audience I want.
      domain: content-strategy
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-480"
      title: "Every Project Gets a Money Budget AND a Time Budget"
      content: >
        Everything gets a money budget. I know what every hour has to be worth and
        every day has to be worth because at their minimum I can make 19 grand a day.
        If I'm going to do a book, I pretty much know what the direct monetary gain
        from that book is going to be. That gets divided into the number of hours,
        number of days it can have. It's done when it has used up its days.
      domain: time-management
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-481"
      title: "Crisis — Know Thyself and Pick Categories Wisely"
      content: >
        In times of crisis, the most important thing is to know thyself — know your
        strengths, your weaknesses, your tolerance for risk. Pick your categories
        wisely. Not every battle is worth fighting. The survivors are not the ones
        who fight every fight but the ones who choose their fights strategically.
      domain: crisis-management
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-482"
      title: "Legends Are Often Legends Only to Their Field"
      content: >
        In different fields, a lot of times the legends are legends only to the people
        in that field, more so than they are to the public. You don't need universal
        fame. You need to be legendary within your specific audience. The comedian
        whose poster was above Leno's bed was legendary to comedians but unknown
        to the public. That's sufficient and often preferable.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_2.txt"

    - id: "FIL-DK-483"
      title: "Tracking and Math Must Be Willingly Done"
      content: >
        Tracking is not very hard at all. You just have to be willing to do it.
        Know your cost number, track which people refer and which eat the lasagna
        and never refer anybody. Track productivity by quantity. Most people fail
        at tracking not because it's hard but because they're unwilling to face
        the numbers honestly.
      domain: direct-marketing
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-484"
      title: "Mobilization of an Unpaid Sales Force With a Script"
      content: >
        Christianity calls it evangelism. Werner Erhard at EST called it sell it by
        zealot. It's exactly the same thing — a mobilization of an unpaid sales force
        with a script. Creating disciples who spread the word is the most powerful
        media strategy. Your followers become your marketing department.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-485"
      title: "The Wagon Premise Is Fraud"
      content: >
        The premise of everybody's question is always I have a wagon with stuff in it,
        how can I sell it. That's a wrong premise. The right premise is who can give me
        access to the audience I want, what do they want, and how can I give it to them
        while simultaneously advancing my legend and my monetization.
      domain: business-philosophy
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-486"
      title: "Backstory Creates Emotional Connection and Relatability"
      content: >
        Every legend has a compelling backstory — the origin, the struggle, the
        transformation. This is not optional. People connect with the struggle
        more than the success. The backstory makes you human, relatable, and
        gives your audience a narrative they can root for. Without backstory,
        you are just another expert with credentials.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-487"
      title: "Controversy Is Required — Safe Is Invisible"
      content: >
        Controversy is one of the 16 Golden Threads because safe is invisible.
        Taking positions, being willing to offend some to attract many, having
        strong opinions that polarize — this is what makes you memorable.
        The worst thing is not to be hated, it's to be ignored. Bland consensus
        positions never create legends.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-488"
      title: "Get Paid to Be Exposed — Never Pay to Expose"
      content: >
        Try and get paid to also be exposed. This is paid AND exposure. For me it's
        a whale hunting exercise — maybe there's one person in the room for whom I
        can do a big project. But they'll also be feed to GKIC. Getting paid while
        simultaneously expanding your legend reach is the ideal media play.
      domain: monetization
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FIL-DK-489"
      title: "Demonstration and Dramatization Trump Explanation"
      content: >
        Demonstration and dramatization are infinitely more powerful than explanation.
        Houdini didn't explain how locks work — he escaped from them publicly.
        Jack LaLanne didn't lecture about fitness — he towed boats with his teeth
        at age 70. Hot seat without a net is the ultimate demonstration of expertise.
        Show, don't tell.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FIL-DK-490"
      title: "Course Prep Box System — Dump Everything Then Organize"
      content: >
        When preparing courses or content, use the box system. Get a physical box
        for each module or section. As ideas come to you, research you find, stories
        you hear — dump them in the appropriate box. When it's time to create the
        content, you pour out the box and organize. The box does the collecting
        work over time so the creation work is compressed.
      domain: content-creation
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FIL-DK-491"
      title: "Disappearing Middle Makes Legend Status Urgent"
      content: >
        The disappearing middle in economics means you're either at the top or
        the bottom — the middle is vanishing. This makes legend building not
        a luxury but a survival strategy. Without distinctive positioning and
        legend status, you get commoditized into the disappearing middle where
        margins are crushed and survival is uncertain.
      domain: economics
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    # --- L2: MENTAL MODELS (MM-DK-403 to MM-DK-452) ---

    - id: "MM-DK-403"
      title: "Legend vs Celebrity Distinction Model"
      content: >
        Framework for distinguishing legends from celebrities along key dimensions:
        Depth of content (deep vs shallow), Teaching ability (systematic vs anecdotal),
        School of thought (named methodology vs personality), Legacy (lasting vs
        fleeting), Monetization (systems vs gigs), Funnels (organized vs random).
        Celebrities create traffic; legends create systems that capture and monetize.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "MM-DK-404"
      title: "Beneficial Association Model"
      content: >
        Standing next to the right people transfers their authority to you. The
        Reagan/Peter Lowe principle — when you share a stage with power, some
        transfers to you. Nido Qubein used a chain of beneficial associations:
        refugee to speaker to university president to Biltmore board member.
        Each association unlocked the next level. Deliberate, sequential positioning.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "MM-DK-405"
      title: "Center of Universe Strategy"
      content: >
        Position yourself at the center with planets orbiting around you. Each
        planet is a constituency — infommarketers, authors, speakers, direct
        marketers, TV people, internet people, your own constituency. They all
        revolve around you, interconnect and overlap. Some people exist on only
        one planet. You work hard to ensure all planets know your knowns,
        your legend, your story. Two-way flow but mostly one-way flow to you.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-406"
      title: "Feeder System Model — System Not Random"
      content: >
        Key word is SYSTEM. You don't want to be fed by random accident. You don't
        want to be fed by desperate prospecting. You want to be fed by a system.
        Your own media platform plus others' media platforms plus your legend being
        spread. Ultimately you want funnels — people being sent to you, told about
        you, and when they come to find you, an organized marketing and sales funnel
        they fall into with sequential next steps.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-407"
      title: "Demonstration and Dramatization Model"
      content: >
        Explanation is weak; demonstration is powerful; dramatization is legendary.
        Houdini didn't explain locks — he escaped publicly. Jack LaLanne didn't
        lecture about fitness — he towed boats with his teeth at 70. HPU principle:
        hot seat without a net is the ultimate demonstration. The more dramatic
        the proof of your expertise, the faster legend status builds.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "MM-DK-408"
      title: "Disappearing Middle Economic Model"
      content: >
        The middle market is vanishing across all industries. You end up at the top
        (premium, legendary, irreplaceable) or at the bottom (commodity, price-driven,
        replaceable). The middle where most businesses live is being crushed by
        Amazon-ification. This model drives urgency for differentiation and
        legend building as a survival strategy, not vanity.
      domain: economics
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "MM-DK-409"
      title: "Age Wave Demographic Model"
      content: >
        Massive demographic shift as baby boomers age. This creates specific
        opportunities for those who understand and serve this demographic.
        The wealth manager who only wants people who sold a company for $10-50M
        nearly guarantees they come between ages 57 and 72 with specific value
        perspectives. Demographics dictate media strategy — these people aren't
        on Facebook, their staff person is.
      domain: demographics
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-410"
      title: "Box System for Course Creation"
      content: >
        Physical box system for content creation. One box per module or topic.
        As ideas, research, stories, and references come to you over time, drop
        them into the appropriate box. When it's time to create, pour the box out
        and organize. The box does passive collecting work over weeks or months
        so the creation phase is compressed to days. DK does non-fiction books
        in three days using this method.
      domain: content-creation
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "MM-DK-411"
      title: "Other People's Platform — OPC/OPR/OPM"
      content: >
        Three things to understand about accessing other people's platforms:
        Other People's Customers (often the most valuable thing), Other People's
        Resources, and Other People's Money. Your legend grows by strategically
        accessing these three through products, free content, guest appearances,
        barter, mentorship, and outright business relationships.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-412"
      title: "Upstream Strategy Model"
      content: >
        Spawn thousands of niche information marketers. Each has a core herd of
        3,000-5,000 of their specific niche (plumbers, dentists, real estate agents).
        They spend money sifting through the giant haystack, rounding up the smart
        ambitious ones — and then tell them about you. The smart ones swim upstream
        to the source. Craig Proctor spends a million dollars yearly in real estate
        doing this. You get the best ones pre-filtered without dealing with the rest.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-413"
      title: "Obligation Creation and Discharge Model"
      content: >
        Summers White strategy: Create obligation that ethical people feel a need to
        discharge through third-party brokering of relationships. His entire year's
        marketing was one black-tie dinner before the NSA convention. He strategically
        seated people, facilitated introductions with prepared questions, moved seating
        halfway through. People got business from it, felt obligated, and discharged
        that obligation by referring clients to Summers. Filled his entire book yearly.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-414"
      title: "Media Purpose Matrix — Each Media Serves Different Purpose"
      content: >
        Print is mostly about credibility, authority, and longevity. Broadcast is
        about celebrity and visibility. Products and distribution gives you everything
        — it's the only media that does all of it. Events, spectacles, and stunts
        create dramatic memorable moments. Online media is predominantly for viral
        and defensive purposes. Don't democratize media — rank them by purpose.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-415"
      title: "Stick Gift Psychology Model"
      content: >
        Products designed to reduce refund rates by creating a psychological barrier.
        DK's Ultimate Success Secret book is co-authored by info marketers and shipped
        as a stick gift. Its core message: your failure to get results is not the fault
        of the thing you bought, it's because you aren't taking action. The merchant
        can't say that directly but DK can say it through the book. Nearly 300,000
        copies of the Farting Cat booklet in circulation, each leading back to DK.
      domain: monetization
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-416"
      title: "Amazon Is a Search Engine, Not a Store"
      content: >
        Amazon is not a store — it's a search engine. But it's the only search engine
        used exclusively by people trying to buy something. This distinction matters
        for media strategy: your presence on Amazon is a media play, not just a
        distribution play. The best customers and best clients come from there.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-417"
      title: "Evangelism-Zealot-Disciple Equivalence"
      content: >
        Christianity calls it evangelism. Werner Erhard at EST called it sell it by
        zealot. It's exactly the same thing — mobilization of an unpaid sales force
        with a script. This mental model reveals that all legend-building follows
        the same pattern regardless of domain: create fervent believers who spread
        the word with structured messaging.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-418"
      title: "Statement Document as Positioning Anchor"
      content: >
        Everybody needs at least one statement document — a book, audio interview,
        white paper, or magazine article reprint. If that's all anybody reads, they
        get it. Not depth, but they get the full picture: who this person is, what
        they're about, why they're different, what their philosophy is. This is your
        main positioning document. Replace every 3-4 years when it ages out.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-419"
      title: "New vs Old Media Is a Specious Conversation"
      content: >
        The conversation about new media vs old media is specious. What we really
        want to talk about is effective vs ineffective, profitable vs unprofitable,
        serves our purposes vs doesn't serve our purposes. Who cares if it's old
        or new? A lot of people feel compelled to use every tool in the toolbox.
        They democratize them, don't rank them, don't focus.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-420"
      title: "Institutionalization Model — Parker Chiropractic"
      content: >
        For nearly two decades in chiropractic, Parker was an annual event. If you
        were a chiropractor, you went. It was institutionalized even though privately
        owned. If you weren't going, everybody thought something was wrong with you.
        They got 20% of the profession yearly. This is the center of universe strategy
        made manifest — being the institutional gathering point for your field.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-421"
      title: "Leno Effect — Relevance Requires Continuous Presence"
      content: >
        Leno will discover to his shock six months from now that he's not really
        welcome in Vegas every week. Because it's going to be Jehu real quick. Just
        as Oprah who — she's still on but on channel 16,233. When you stop being
        continuously present, relevance evaporates rapidly. This applies to legends
        too — omnipresence is not optional, it's survival.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-422"
      title: "Disney Omnipresence as Personal Model"
      content: >
        DK uses Disney as his personal model for omnipresence. You cannot be in
        his house for more than five minutes without knowing he's a Disney guy.
        Disney crap everywhere — clock, figurines, posters, calendars, stuffed
        animals, clothes. He can't turn around without encountering Disney. Every
        time he goes to the bathroom, he thinks of Disney. That's what you want
        your audience to experience with you.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-423"
      title: "Five Access Methods to Others' Platforms"
      content: >
        Five ways to access other people's platforms: (1) Products — information or
        entertainment products distributed in their channels, (2) Free content —
        being a guest expert filling their content needs, (3) Barter — exchanging
        audiences and media, (4) Mentorship — helping someone who has media access,
        (5) Outright business — paying for access or joint ventures.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MM-DK-424"
      title: "The Dog Analogy for Customer Needs"
      content: >
        I never really wanted a dog. I do want somebody who's always happy to see me.
        I do want somebody that can be told go sit in the car and leave me alone. I got
        a dog because of these other things. Same with customers — nobody wants content.
        They want what content delivers: status, money, solutions, feelings. Start from
        what they actually want, not what you have to sell.
      domain: sales-psychology
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    # --- L3: HEURISTICS (HEUR-DK-587 to HEUR-DK-636) ---

    - id: "HEUR-DK-587"
      title: "162+ Touches Per Year Minimum for Top-Level Members"
      content: >
        At the highest level in DK's groups, he touches members at least 162 times
        per year — roughly once every 2.2 days. Six monthly print newsletters, monthly
        calls, weekly memos, appearances, webcasts, three meetings a year, plus 10
        calls and four packages for private clients. Add advertising and marketing
        campaigns, and it exceeds 365 — not a day without contact.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-588"
      title: "Every Project Gets Money Budget + Time Budget — No Exceptions"
      content: >
        Every project must have both a money budget and a time budget. DK knows
        his minimum daily rate is $19,000. A book's projected monetary gain gets
        divided into the hours and days it can have. When those days are used up,
        the book is done — whether it's chapter 14 or chapter 20. Peyton don't
        get a fifth quarter. Game over.
      domain: time-management
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-589"
      title: "Non-Fiction Book = Three Days Maximum"
      content: >
        DK does non-fiction books in three days. Three days, gone, next. Because
        he needs to put a dozen things out there, not one. Les Misanthrope comparison:
        one to two fiction books per year, six to seven hours a day for 11 months.
        Non-fiction is much easier than fiction. Prolific beats perfect.
      domain: content-creation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-590"
      title: "Hot Seat Without a Net = Ultimate Demonstration"
      content: >
        Putting yourself in a live, unscripted situation where you must perform
        without preparation is the ultimate demonstration of expertise. DK's Q&A
        sessions, live consulting, and public problem-solving demonstrate mastery
        in a way that no prepared presentation can. The risk is the proof.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "HEUR-DK-591"
      title: "Omnipresence Beats Intermittent Presence — Always"
      content: >
        It's not enough to appear occasionally. You must be inescapable within
        your target audience. Two newsletters per month, not one. Weekly memo
        on top of that. Books on multiple shelves. Branded merchandise on their
        desk. The goal is that they cannot go through a single day without
        encountering you or thinking about you.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-592"
      title: "One Thing Question Is a BAD Question"
      content: >
        When someone asks what is the one thing I should do, that is a bad question.
        It reveals a desire for simple answers to complex problems. Success requires
        multiple things done simultaneously. The person asking for the one thing
        is almost certainly going to fail because they want a shortcut that
        doesn't exist.
      domain: success-philosophy
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "HEUR-DK-593"
      title: "Chose Publisher for Ad Pages — Entrepreneur = 2 Full Pages Per Book"
      content: >
        All things being equal with 15 different small publishers, DK chose
        Entrepreneur Press for a simple reason: he gets two full-page ads in
        Entrepreneur magazine for every book. The publishing deal is the media
        deal — choose distribution partners based on what media access they
        give you, not just royalty rates.
      domain: publishing
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-594"
      title: "Sponsor Mitigates Event Cost by Approximately Half"
      content: >
        Summers White was very good at getting a sponsor for his dinner events,
        mitigating his cost by about half every year. When planning events for
        legend-building purposes, always seek sponsors to reduce your cost basis.
        The event still creates the same obligation and relationship value whether
        you paid full cost or half.
      domain: events
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "HEUR-DK-595"
      title: "Track Who Refers and Who Eats Lasagna"
      content: >
        Track each person's referral productivity. Some people refer prolifically,
        some people eat the lasagna and never refer anybody. Track their productivity
        by quantity and use this data to decide who you want to invite again and who
        you don't. The data determines your invitation list, not sentiment.
      domain: networking
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "HEUR-DK-596"
      title: "Statement Document Has 3-4 Year Lifespan"
      content: >
        A statement document — your core positioning piece — has approximately a
        three to four year lifespan before it needs to be replaced. DK's Success
        Magazine article from three years ago probably had another year or two of
        life in it. Plan to refresh your statement document on this cycle.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-597"
      title: "Niche InfoMarketers Have Core Herds of 3,000-5,000"
      content: >
        The typical niche information marketer DK has spawned has a core herd
        of 3,000 to 5,000 of whatever niche they serve — plumbers, dentists,
        real estate agents. This is the upstream feeder system. Each niche leader
        spends money sifting through the haystack to find the smart, ambitious
        ones and then tells them about DK.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-598"
      title: "Craig Proctor Spends $1M/Year to Feed Upstream"
      content: >
        Craig Proctor in real estate spends a million dollars every year sifting
        through the giant haystack of real estate agents, rounding up the smart
        ambitious progressive ones — and then telling them about Kennedy. A
        significant number swim upstream. This is the quantified upstream
        feeder system at scale.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-599"
      title: "Seat People Strategically — Then Move Them Halfway Through"
      content: >
        At networking events, strategic seating is critical. Summers White spent
        enormous time on the seating chart to put people next to someone they
        could legitimately do business with. Halfway through dinner, all men
        had to move (number under plate), women stayed — effectively seating
        everyone twice during the night.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-600"
      title: "Prepared Questions Make Others Look Smart"
      content: >
        Summers White prepared ahead of time a three-question card for each guest
        about their area of expertise. He was pretty sure they could answer and
        make themselves look smart. Nobody had to pitch — they got to demonstrate.
        Making others look good creates obligation and builds your position as
        the facilitator of success.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-601"
      title: "Embed Pathways in Everything That Gets Stolen"
      content: >
        Since you can't stop piracy, embed pathways back to you in everything.
        When someone buys your stolen product on eBay and follows the embedded
        pathway, they become a $2,500 conference attendee buying $3,000 in products.
        The stolen product becomes your lowest-cost customer acquisition channel.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-602"
      title: "Success Magazine Article = One Client Worth Quarter Million"
      content: >
        DK's article in Success Magazine yielded one wealth advisor client who
        has spent a quarter of a million dollars. That's the best of his knowledge
        from that specific placement. One guy, but what if he hadn't been there?
        This illustrates the whale hunting principle — one relationship from one
        media placement can justify the entire investment.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-603"
      title: "300,000 Copies of Free Gift = 300,000 Lead Sources"
      content: >
        DK's booklet Why Do I Have to Sit Next to the Farting Cat has nearly
        300,000 copies in circulation as a stick gift. People buy them in bulk
        to throw in shipments. Every one leads back to DK. Not all 300,000
        brought people directly, but in aggregate the booklet is pretty profitable.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-604"
      title: "Average Case Value $42,600 Through DK Methods"
      content: >
        Dr. Martin's dental practice in Richmond: average case value $42,600,
        with 38% year-to-year growth and double-digit year-to-year growth every
        year for the past five years. The number one Invisalign doc in the country,
        Dr. Donna Galante, is also a DK student. These are proof-of-concept
        results from following the methodology.
      domain: case-studies
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "HEUR-DK-605"
      title: "Minimum Daily Rate $19,000 — Benchmark for Time Budget"
      content: >
        DK's minimum daily rate is $19,000 as many days as he cares to work with
        people coming to him. This becomes the benchmark: any project's time
        allocation is capped by what those hours could earn at this rate.
        If a book can't justify its time against $19K/day, the book gets
        fewer days, not more perfectionism.
      domain: time-management
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-606"
      title: "Black Tie Dinner = One Event Fills Entire Year's Book"
      content: >
        Summers White's entire year's marketing activity was one dinner — a black-tie
        event the night before the NSA convention. 200 out of 1,000 convention
        attendees dressed up and went somewhere special. This single event, through
        obligation creation and third-party brokering, filled his entire book of
        business every year for twenty years. He didn't do anything else.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-607"
      title: "20% Market Share of Profession at Annual Event"
      content: >
        Parker Chiropractic got approximately 20% of the entire chiropractic
        profession to attend their annual event. That's enormous market share
        for a single event. If you can create an institutionalized gathering
        that captures even 10-20% of your profession, you become the center
        of the universe for that field.
      domain: events
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-608"
      title: "Five Dentistry Relationships = Five Planetary Systems"
      content: >
        In dentistry alone, DK has relationships with five separate leaders,
        each with their own planets revolving around them. Multiple relationships
        per niche multiply your reach exponentially. Don't rely on a single
        point of access — build redundancy into each niche of your universe.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-609"
      title: "$8,000 Per Person Three-Day Extravaganza in the 80s"
      content: >
        DK and Gary Halbert did eight or nine seminars at $8,000 per person for
        three-day extravaganzas — and that's in the 80s. This establishes the
        principle that premium pricing has always been viable when the legend
        and demonstration of value justify it. Premium is not a modern invention.
      domain: pricing
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "HEUR-DK-610"
      title: "Six Monthly Print Newsletters in the GKIC Platform"
      content: >
        The GKIC platform includes six different monthly print newsletters
        (five GKIC, one non-GKIC). Print newsletters are the backbone of the
        omnipresence strategy because they are physical, they sit on desks and
        shelves, they get shared, they don't disappear into an inbox.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "HEUR-DK-611"
      title: "Wealth Manager Client — Only Wants $10-50M Company Sellers"
      content: >
        DK's wealth manager client only wants people who sold a company for $10-50M.
        This nearly guarantees they come between ages 57-72 with certain value
        perspectives. Know your target that specifically. One of the things we
        definitely know: they're not using Facebook. Their staff person might be,
        but they aren't. Media choice follows audience reality, not trends.
      domain: targeting
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    # --- L4: FRAMEWORKS (FW-DK-348 to FW-DK-387) ---

    - id: "FW-DK-348"
      title: "16 Golden Threads of Living Legend"
      content: >
        Complete framework of 16 threads that weave together to create legendary
        status: (1) Backstory/Origin Story, (2) School of Thought, (3) Controversy,
        (4) Beneficial Association, (5) Demonstration and Dramatization, (6) Prolific
        Publishing, (7) Omnipresence, (8) Disciples/Zealots, (9) Institutionalization,
        (10) Longevity, (11) Reinvention, (12) Defiance, (13) Memorable Persona,
        (14) Body of Work, (15) Proof/Results, (16) Center of Universe. Each thread
        reinforces the others. No single thread creates a legend — the weave does.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "FW-DK-349"
      title: "Media Purpose Matrix — 5 Categories by Purpose"
      content: >
        Framework matching media type to strategic purpose: (1) Print — credibility,
        authority, longevity, (2) Broadcast — celebrity, visibility, (3) Products and
        Distribution — gives you everything (only media that does all), (4) Events,
        Spectacles, and Stunts — dramatic memorable moments, (5) Online Media —
        predominantly viral and defensive. Each media type should be deployed
        for its specific strength, not democratized.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-350"
      title: "4 Implementation Lists for Legend Building"
      content: >
        Four lists every legend must create and maintain: (1) List of Knowns — the
        things you are known for, your signature ideas, frameworks, and positions,
        (2) List of Stories — your curated stories that illustrate your knowns and
        reinforce your legend, (3) List of Storytellers — people who tell your stories
        for you (disciples, referrers, media), (4) List of Memorialization —
        how your legend is being captured and preserved for posterity.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_2.txt"

    - id: "FW-DK-351"
      title: "Feeder System Architecture — 5 Access Methods"
      content: >
        Structured feeder system with 5 methods to access others' platforms:
        (1) Products — info/entertainment products distributed through others'
        channels, (2) Free Content — availability as guest expert filling their
        content needs, (3) Barter — exchanging audiences and media access,
        (4) Mentorship — helping people who have media, creating obligation,
        (5) Outright Business — paying for access or joint ventures. The key
        word is SYSTEM — not random, not desperate, systematic.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-352"
      title: "Free Content 3-Purpose Framework"
      content: >
        Free content must serve exactly three purposes and then STOP: (1) Attract —
        bring the right people into awareness of you, (2) Demonstrate — show your
        capability and expertise through actual value, (3) Build Trust — create
        enough trust that they're willing to engage commercially. After these
        three purposes are served, stop giving away and start monetizing. Most
        people fail by making too much free and viral with no capture mechanism.
      domain: content-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-353"
      title: "Media Strategies Rollout — Own + Borrowed Platforms"
      content: >
        Two-tier media strategy: (1) Own Platform — your newsletters, your events,
        your website, your products, your email list; and (2) Borrowed Platform —
        others' stages, others' publications, others' audiences, others' distribution.
        Legends need both. Own platform for control and monetization. Borrowed
        platform for reach and new audience acquisition. The two feed each other
        in a virtuous cycle.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-354"
      title: "Disciple Networks Framework"
      content: >
        Deliberate creation of disciple networks: (1) InfoMarketer Planet — niche
        leaders who spawn from your teaching, (2) Friends of Dan — curated list
        of influencers kept close through ongoing generosity and omnipresence so
        they mention you, (3) Niche Leaders — people leading specific verticals
        who refer upstream, (4) Professional Peers — speakers, authors, consultants
        in your orbit. Each network is cultivated deliberately with ongoing
        investment to maintain the flow of referrals and legend-spreading.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-355"
      title: "Center of Universe Architecture"
      content: >
        Visual architecture with you at the center and planetary systems around you:
        InfoMarketer Planet, Author Planet, Speaker Planet, Direct Marketing Planet,
        TV Planet, Internet Planet, Own Constituency Planet. Each planet has sub-planets
        (e.g., 5 dentistry leaders each with their own orbiting followers). All planets
        revolve around center, interconnect and overlap. Two-way flow but predominantly
        one-way flow to center. Work to ensure all planets know your knowns.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-356"
      title: "Obligation Creation Event Framework"
      content: >
        Framework for creating and discharging obligation through events:
        (1) Create exclusive event (black-tie dinner, invitation-only), (2) Strategic
        seating — invest time pairing people who can do business together, (3) Prepare
        questions — make guests look smart with pre-researched 3-question cards,
        (4) Force mixing — move seating halfway through (number under plate),
        (5) Create FOMO — arriving/departing in formal wear creates envy, (6) Let
        obligation work — ethical people discharge by referring clients to the host.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-357"
      title: "Media Use Audit Framework — 5th Implementation List"
      content: >
        Fifth implementation list for legend building: For every available media,
        create two columns: (1) How am I using it now? and (2) How could I use it
        that I'm not using it now? This systematic audit reveals gaps in your
        media strategy and opportunities for expansion. Apply to both owned
        and borrowed platforms across all media categories.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-358"
      title: "Tracking and Measurement Framework for Events"
      content: >
        Framework for measuring ROI of relationship-based marketing events:
        (1) Know total cost of event, (2) Track clients who come via referrals
        from event attendees during the year, (3) Calculate total value of
        referred clients vs event cost, (4) Track individual referrer productivity,
        (5) Use productivity data to curate future invitation lists, (6) Track
        ancillary costs (postcards, follow-up). Willingness to track is the
        only barrier — the math itself is simple.
      domain: direct-marketing
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "FW-DK-359"
      title: "Christianity Media Strategy Analysis Framework"
      content: >
        Use Christianity as a case study for media strategy analysis: Manual Labor
        (evangelism — mobilization of unpaid sales force with a script), Print
        (Bible, tracts, books), Broadcast (TV ministry — started Catholic with
        Bishop Sheen, not evangelical), Spectacles (churches, events, crusades),
        Stunts (miracles, public acts), Online Media. Same analysis applies to
        superhero franchises. Any legend can be analyzed through this lens.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-360"
      title: "Product Distribution as Media Strategy Framework"
      content: >
        Productizing who you are and what you do and getting it distributed in
        distribution channels is a media strategy, not primarily about getting
        rich from it. Framework: (1) Create how-to products from your methodology,
        (2) Distribute through others' channels (Nightingale Conant, Sky Mall,
        Amazon), (3) Each distribution channel is a feeder — people discover you,
        (4) Some channels yield whales (one Nightingale Conant buyer = $1M+ client),
        (5) Accept low direct ROI for high indirect feeder value.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-361"
      title: "GKIC Platform Architecture — Multi-Level Touch System"
      content: >
        Complete platform architecture: Level 1 — six monthly print newsletters,
        Level 2 — monthly Diamond Members call, Level 3 — weekly Diamond Members
        memo, Level 4 — appearances and webcasts at titanium level, Level 5 —
        three meetings per year, Level 6 — private client group (10 calls + 4
        packages), Level 7 — Peak Performer inclusion. Result: 162+ touches/year
        at highest level, exceeding 365 with marketing campaigns added.
      domain: platform-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-362"
      title: "Upstream Feeder Multiplication Framework"
      content: >
        Framework for creating upstream feeders at scale: (1) Help people become
        niche info marketers, (2) Each builds a core herd of 3,000-5,000 in their
        niche, (3) They spend their money sifting through the haystack to find the
        best, (4) They tell the best about you, (5) The smart ones swim upstream
        to the source, (6) You get pre-filtered premium prospects at zero acquisition
        cost, (7) Multiple feeders in same niche create reinforcement (heard about
        you from multiple sources = certainty).
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "FW-DK-363"
      title: "Sequential Monetization Funnel Framework"
      content: >
        What separates legends from broke celebrities: organized marketing and
        sales funnel where there's one thing to do, then another thing, then another
        thing. Sequential monetization means every touchpoint leads to the next
        commercial engagement. Without this funnel, you create massive traffic
        with no organized system for monetizing it. Entertainers sell t-shirts
        at the back of the room with no capture — no names, often cash in a box.
        That's the anti-pattern.
      domain: monetization
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    # --- L5: METHODOLOGIES (MET-DK-245 to MET-DK-274) ---

    - id: "MET-DK-245"
      title: "Living Legend Formula 16-Thread Implementation Methodology"
      content: >
        Step-by-step methodology for implementing the 16 Golden Threads:
        Step 1 — Craft your backstory and origin narrative (struggle, transformation).
        Step 2 — Name and codify your school of thought (like Magnetic Marketing).
        Step 3 — Identify and embrace your controversies.
        Step 4 — Map beneficial associations and pursue them sequentially.
        Step 5 — Design demonstrations and dramatizations of your expertise.
        Step 6 — Commit to prolific publishing on fixed time budgets.
        Step 7 — Build omnipresence system (162+ touches minimum).
        Step 8 — Develop disciple networks deliberately.
        Step 9 — Work toward institutionalization in your field.
        Step 10 — Plan for longevity and sustained relevance.
        Step 11 — Build reinvention capability.
        Step 12 — Cultivate defiance as a character trait.
        Step 13 — Develop a memorable persona.
        Step 14 — Accumulate body of work systematically.
        Step 15 — Document and publicize proof and results.
        Step 16 — Architecture the center of universe model.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_1.txt"

    - id: "MET-DK-246"
      title: "Media Strategies Deployment Methodology"
      content: >
        Step-by-step for deploying media strategy:
        Step 1 — Identify your target audience with extreme specificity (age, wealth, behavior).
        Step 2 — Determine which media your target actually uses (not what's trendy).
        Step 3 — Create statement document (book, article, white paper).
        Step 4 — Build owned platform (newsletter, events, membership).
        Step 5 — Identify and access borrowed platforms (5 access methods).
        Step 6 — Create products for distribution through others' channels.
        Step 7 — Develop free content strategy (3 purposes only then STOP).
        Step 8 — Build disciple networks in each planetary system.
        Step 9 — Implement omnipresence system (162+ touches/year).
        Step 10 — Audit all media using the 5th Implementation List.
        Step 11 — Embed pathways in everything including pirated content.
        Step 12 — Get paid for exposure whenever possible.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-247"
      title: "Omnipresence 162+ Touches/Year System Methodology"
      content: >
        Implementation methodology for achieving omnipresence:
        Step 1 — Establish monthly print newsletter(s) — minimum one, ideally multiple.
        Step 2 — Add weekly memo or communication.
        Step 3 — Create monthly call or webcast for premium members.
        Step 4 — Schedule quarterly or tri-annual in-person events.
        Step 5 — Create branded physical items (bobblehead, mouse pad, t-shirt, mug).
        Step 6 — Publish multiple books to occupy different shelves.
        Step 7 — Layer marketing campaigns on top of membership touches.
        Step 8 — Count total touches — must exceed 162/year (once every 2.2 days).
        Step 9 — Add advertising and marketing campaigns to exceed 365/year.
        Step 10 — Reinforce same stories, same knowns, same points repeatedly.
      domain: omnipresence
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-248"
      title: "Statement Document Creation Methodology"
      content: >
        How to create your core positioning document:
        Step 1 — Choose format: book, audio interview, white paper, or article reprint.
        Step 2 — Include: who you are, what you're about, why you're different,
        what your philosophy is, proof of results.
        Step 3 — Keep it comprehensive enough that if someone reads only this,
        they get it — not depth, but the full picture.
        Step 4 — Plan for 3-4 year lifespan before replacement needed.
        Step 5 — Use it as the gateway document for all new contacts.
        Step 6 — Distribute through every media channel available.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-249"
      title: "Paint the Fence Every Night Persistence Methodology"
      content: >
        DK's methodology for sustained legend-building through relentless consistency:
        Step 1 — Identify your daily non-negotiable legend-building activities.
        Step 2 — Execute them every single day regardless of mood, energy, or results.
        Step 3 — Understand that consistency compounds — each day adds a coat of paint.
        Step 4 — Never take extended breaks from publishing, communicating, or appearing.
        Step 5 — When you stop, relevance decays rapidly (the Leno/Oprah effect).
        Step 6 — Measure in years and decades, not weeks and months.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_2.txt"

    - id: "MET-DK-250"
      title: "Obligation Event Execution Methodology"
      content: >
        Step-by-step for running an obligation-creating event (Summers White model):
        Step 1 — Choose an anchor event (industry convention) and schedule the
        night before at a different venue.
        Step 2 — Make it black-tie/exclusive to create aspiration and FOMO.
        Step 3 — Curate invitation list based on referral productivity data.
        Step 4 — Invest time in strategic seating chart — pair potential business partners.
        Step 5 — Prepare 3-question cards for each guest about their expertise.
        Step 6 — Go around with microphone — facilitate demonstrations, not pitches.
        Step 7 — Force mixing at midpoint (numbered plates, men move, women stay).
        Step 8 — Get sponsor to mitigate cost by approximately half.
        Step 9 — Track referral results throughout the year from attendees.
        Step 10 — Use productivity data to refine next year's invitation list.
      domain: networking
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-251"
      title: "Box System Course Creation Methodology"
      content: >
        Step-by-step implementation of the box system for content creation:
        Step 1 — Define your course/product modules or sections.
        Step 2 — Get a physical box (or digital equivalent) for each module.
        Step 3 — Over weeks/months, drop ideas, research, stories, clippings,
        quotes, and examples into the appropriate box as they occur.
        Step 4 — When creation time arrives, pour out each box.
        Step 5 — Sort and organize the contents into logical flow.
        Step 6 — Write/record the content — the raw material is already collected.
        Step 7 — Complete within the time budget (for DK: 3 days for a book).
        The box does passive collecting so creation is compressed.
      domain: content-creation
      source_file: "living-legend-formula/content/transcription_pdf_Dan_Kennedy_QA_Manual.txt"

    - id: "MET-DK-252"
      title: "Upstream Feeder System Deployment Methodology"
      content: >
        How to build an upstream feeder system:
        Step 1 — Help people in various niches become successful info marketers.
        Step 2 — Each builds their own core herd of 3,000-5,000 niche members.
        Step 3 — They invest their own money sifting through their niche's haystack.
        Step 4 — They naturally tell their best members about you (the source).
        Step 5 — Build multiple feeders per niche (DK has 5 in dentistry alone).
        Step 6 — When prospects hear about you from multiple upstream sources,
        conversion certainty increases dramatically.
        Step 7 — Smart ones swim upstream — you get pre-filtered premium prospects.
        Step 8 — Have organized funnels ready to catch upstream swimmers.
      domain: lead-generation
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-253"
      title: "Product Distribution as Feeder Methodology"
      content: >
        How to use product distribution as a feeder system:
        Step 1 — Create information products from your methodology (books, courses, CDs).
        Step 2 — Identify distribution channels (Nightingale Conant, Sky Mall, Amazon, etc.).
        Step 3 — Accept low or zero direct ROI from distribution — it's a media play.
        Step 4 — Embed clear pathways back to you in every product.
        Step 5 — Track which distribution channels produce the highest-value clients.
        Step 6 — Understand that one whale from one channel justifies the entire program
        (one Nightingale Conant buyer spent $1M+ with DK).
        Step 7 — Maintain presence in as many distribution channels as possible.
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-254"
      title: "Piracy Monetization Methodology"
      content: >
        How to turn piracy and theft into a marketing channel:
        Step 1 — Accept that you cannot stop piracy (DK tried for a decade).
        Step 2 — Embed clear, prominent pathways back to you in ALL content.
        Step 3 — Make pathways compelling — offers, invitations, exclusive access.
        Step 4 — Track people who come through piracy pathways.
        Step 5 — Convert them through your standard funnel (many become $2,500+
        conference attendees and $3,000+ product buyers).
        Step 6 — View pirated products as your lowest-cost customer acquisition.
        Step 7 — Create products specifically designed to be shareable/stealable
        (like the Farting Cat booklet at 300,000+ copies).
      domain: media-strategy
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-255"
      title: "School of Thought Creation Methodology"
      content: >
        How to create your own school of thought:
        Step 1 — Identify the underlying principles of your approach (for DK:
        tenets of mail order).
        Step 2 — Recognize that the principles themselves may not be new.
        Step 3 — Name it distinctively (Magnetic Marketing, not mail order for
        non-mail-order businesses).
        Step 4 — Make the name interesting and non-antiquated.
        Step 5 — Ensure nobody else can claim the same name.
        Step 6 — Build 30+ years of content around the school of thought.
        Step 7 — Give it a life and identity of its own, separate from you.
        Step 8 — Become the thought leader of your named school.
      domain: legend-building
      source_file: "living-legend-formula/hd-video/transcription_mp4_Living_Legend_Formula_-_Part_2.txt"

    - id: "MET-DK-256"
      title: "Center of Universe Construction Methodology"
      content: >
        How to build your center of universe:
        Step 1 — Identify all your constituencies (authors, speakers, marketers, etc.).
        Step 2 — Map each as a planetary system around your center.
        Step 3 — For each planet, identify sub-planets (leaders with their own orbits).
        Step 4 — Build multiple relationships per niche for redundancy.
        Step 5 — Maintain the Friends of Dan list — constant generosity to influencers.
        Step 6 — Ensure all planets know your knowns, your legend, your story.
        Step 7 — Create two-way flow but engineer predominantly one-way flow to center.
        Step 8 — Interconnect planets so they overlap and reinforce.
      domain: positioning
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

    - id: "MET-DK-257"
      title: "Prolific Publishing Time-Budget Methodology"
      content: >
        DK's methodology for prolific publishing:
        Step 1 — Know your minimum daily rate ($19K for DK).
        Step 2 — Estimate the monetary gain from the project.
        Step 3 — Divide gain by daily rate to get maximum days allowed.
        Step 4 — Use box system to pre-collect material over time.
        Step 5 — Execute creation within the time budget — no extensions.
        Step 6 — Accept that it could be better — prolific beats perfect.
        Step 7 — Ship it. Move to the next project immediately.
        Step 8 — Aim for a dozen publications rather than one perfect one.
        Step 9 — Maintain continuous stream of new content to market.
      domain: publishing
      source_file: "living-legend-formula/hd-video/transcription_mp4_Media_Strategies.txt"

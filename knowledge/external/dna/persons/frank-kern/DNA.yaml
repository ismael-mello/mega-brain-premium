      title: "Rainmaker Certification — 10-week program + live calls covering marketing funnels, paid ads (Facebook+YouTube), email marketing, scaling, supersystems"
      chunks: 105

  connections:
    complements:
      - person: "Dan Kennedy"
        on: "Email marketing, direct response, deadline sequences"
        note: "Kern explicitly cites Kennedy as mentor; both use urgency/deadlines and direct response principles; Kennedy more print-focused, Kern digital-first"
      - person: "Russell Brunson"
        on: "Funnels, offer architecture, loss leader structure"
        note: "Kern's loss leader + OTO funnel architecture aligns with Brunson's value ladder; Brunson built ClickFunnels partly on these principles"
      - person: "Alex Hormozi"
        on: "Offers, scaling, unit economics"
        note: "Both emphasize math-driven decisions and offer optimization; Hormozi more systematic on pricing, Kern more process-diagnostic"
      - person: "Todd Brown"
        on: "Offers, marketing, market sophistication"
        note: "Both focus on offer engineering and direct response; Brown more copy-focused, Kern more systems-focused"
      - person: "Jeremy Haynes"
        on: "Paid advertising, Facebook and YouTube ads"
        note: "Kern covers FB+YT ads in Rainmaker; Haynes is a paid ads specialist with deeper tactical depth"
      - person: "Andre Chaperon"
        on: "Email marketing, automation, relationship sequences"
        note: "Both use behavioral triggers and segmentation; Chaperon more narrative/relational, Kern more deadline/conversion focused"
    diverges:
      - person: "Andre Chaperon"
        on: "Email philosophy"
        note: "Chaperon builds long-term relationship sequences; Kern prioritizes deadline stacks and conversion now"

layers:
  L1_PHILOSOPHIES:
      - id: "FIL-FK-001"
        title: "Holistic Marketing Over Single-Channel Mastery"
        description: "Focusing on any one thing is like building a stool with one leg. If you just do a pretty good job at all of those things -- ads, copy, conversion, email, follow-up -- that stuff adds up to unbelievable exponential growth. Getting a pretty good job at all of it is a thousand times easier than becoming a world-class expert in one little area."
        domains: [marketing-strategy, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-002"
        title: "Math Over Emotion"
        description: "We rarely make decisions based on math. The type of math you could do with the calculator on your phone. We're going to make all of our decisions based on math. It takes the emotion out of it and it really makes it hard for us to make a mistake because the math is almost always right if you follow it."
        domains: [decision-making, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-003"
        title: "Unsexy Secrets Win"
        description: "None of the stuff that actually gets money is a shiny, cool object. It's plain old common sense, math, and the ability to diagnose situations. The stuff that a lot of people avoid is where the rubber meets the road."
        domains: [marketing-philosophy, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-004"
        title: "Process Is the Real Value"
        description: "Every business has a sales process. Every sales process has specific steps that can be maximized. The huge unsexy secret is understanding the process and knowing exactly what to do to improve it. These little improvements all add up."
        domains: [sales-process, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-005"
        title: "Diagnostics as the Secret Weapon"
        description: "The power of diagnostics -- understanding how to diagnose where the missing revenue is. A huge opportunity to get more money immediately is understanding how to find where the hidden money is, whether the business is broken or just underperforming."
        domains: [diagnostics, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-006"
        title: "Low Hanging Fruit First, Always"
        description: "Almost every business I've ever worked with, there is low hanging fruit available to them. They just can't see it because they're so busy doing business owner stuff. We always want to start there before ads and scale."
        domains: [revenue-optimization, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-007"
        title: "Target and Deadline Driven Always"
        description: "One of the most dangerous things we can do in business is to simply go forth and say I want to get more money. There's no quantifiable target and no quantifiable deadline. You cannot hit a target if you don't know what it is."
        domains: [goal-setting, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-008"
        title: "Clients Can't See the Forest Through the Trees"
        description: "Business owners are so busy running a successful business that they can't see the forest through the trees. They're either putting out fires or worried about future fires based on the past. Very rarely are they ever able to take a minute and think about what they actually want."
        domains: [consulting-methodology, client-psychology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-009"
        title: "Repeat What Worked"
        description: "A huge thing that happens to entrepreneurs is they have stuff that worked really, really good and they just stopped doing it. They get distracted because they like new stuff. Your job is going to be to get them to start doing it again and keep doing it."
        domains: [revenue-optimization, entrepreneurship]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-010"
        title: "Be Your Own Consultant"
        description: "I never start a new project without literally sitting by myself in a room and going through this entire process. Pretend like you are a consultant talking to yourself. It forces your brain to get out of the weeds and look at your business from a higher level."
        domains: [self-consulting, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-011"
        title: "Procrastination Is the Real Reason People Don't Buy"
        description: "A lot of times people don't buy something because they're just procrastinating. It's not because they don't want it. Like I literally live three miles from the pharmacy and CVS had to text me multiple times to come get my medicine."
        domains: [buyer-psychology, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-012"
        title: "The Rule of Dammits"
        description: "The majority of people will NOT do what you want them to do. Most won't opt in. Most who opt in won't watch. Most who watch won't click to order. Most who click won't buy. Most who buy won't take upsells. That's normal. A super system is built to counter-attack this."
        domains: [marketing-philosophy, conversion-psychology, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-013"
        title: "More Offers = More Money"
        description: "The more offers you put in front of people, the more stuff you're going to sell. It's almost physically impossible for that not to be true. Offers equal money. The more stuff we put between getting a lead and selling them something, the more sales we're going to get."
        domains: [revenue-optimization, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-014"
        title: "Imperfect Action Over Perfect Inaction"
        description: "Something is better than nothing. The duct tape and bubble gum version of our current super system is actually working very well. Don't try to build the whole thing in a day. Build it over time."
        domains: [entrepreneurship, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-015"
        title: "90% of the Time It's More Follow-Up or More Offers"
        description: "At the end of the day, after we go through nine million of these things, 90% of the time the prescription is more follow-up or make more offers. That's it."
        domains: [revenue-optimization, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-016"
        title: "Facts Over Feelings"
        description: "Rational thought is going to be your best mindset. The more you have to guess what will work based on your thoughts and feelings, the LESS likely you are to be right. Decisions not based on data are MUCH more likely to be WRONG."
        domains: [decision-making, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-017"
        title: "Ads Are Just Words and Pictures -- Money Is Made After the Click"
        description: "Ads are just words and pictures put on a screen in front of the right person at the right time. What happens after they click is when the money is made."
        domains: [advertising, sales-process]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-018"
        title: "Never Use False Scarcity"
        description: "I don't think one should use the false scarcity angle. It's not really that cool. Your deadlines should really expire. Use different web pages for each deadline so the previous one truly goes away."
        domains: [ethics, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-019"
        title: "Fee Minimization Through Targets"
        description: "If we succeed at creating systems to go from $100K per month to $150K per month, that's an extra $600K per year. If you charge significantly LESS than that for the result, it's a NO BRAINER. This is why being target-driven matters for pricing."
        domains: [pricing, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-020"
        title: "Systemize What Works"
        description: "Take whatever is working really well, systemize it, and make it to where it'll always work and can always be deployed. Entrepreneurs do something that works really well and then stop doing it -- that's the real problem."
        domains: [business-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-021"
        title: "Prospects Don't Pay Nearly as Much Attention as We Wish"
        description: "Our prospects and your clients' prospects don't pay nearly as much attention to us as we wish they did. They're not looking at our every move. If someone asks 'won't people get conditioned to my deadline stacks?' -- I've never seen it happen in 20 years."
        domains: [buyer-psychology, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-022"
        title: "The One Thing Principle"
        description: "Our real value is in getting the data, analyzing it to come up with the ONE thing to do right now, to get the most powerful and impactful results in the shortest time period. Not seven billion things -- one thing."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-023"
        title: "The Super System Is the Holy Grail of Marketing"
        description: "A super system is an automated way of making sure people are always in a promotion. You do the work once but your body has the effect as if you did those pushups every hour, every day, forever. It's the secret to making ads work better."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-024"
        title: "Demonstrate You Can Help Them by Actually Helping Them"
        description: "If they're good people, they give genuinely valuable information and actually help people. They use the oldest trick in the book: demonstrate you can help them by actually helping them."
        domains: [sales-philosophy, content-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-025"
        title: "Pretty Good at Everything Beats World-Class at One Thing"
        description: "If you just get incremental improvement across all things -- lower cost per click, higher AOV, a couple percentage points more from follow-up, a bit more repeat business -- it all adds up to exponential growth."
        domains: [marketing-strategy, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-026"
        title: "Facebook Ads Are a Scalable Traffic Machine"
        description: "Facebook advertising, when built on a solid funnel foundation, is the most scalable paid traffic source available. But ads only amplify what already works -- a broken funnel with more traffic is just a faster way to lose money."
        domains: [facebook-ads, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-027"
        title: "The Ad Is Not the Business"
        description: "Ads are a mechanism to drive traffic to an already-working funnel. The business is the funnel, the follow-up, the offers, and the backend. Treating ads as the business is the number one mistake marketers make."
        domains: [paid-advertising, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-028"
        title: "Audiences Are More Important Than Creative"
        description: "Who you show the ad to matters more than what the ad says. Finding the right audience -- people who are actually interested and qualified -- will outperform better creative shown to the wrong people every single time."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-029"
        title: "Let the Data Decide What to Scale"
        description: "Never scale on intuition. Scale on data. If an ad set is profitable at $50/day, test scaling to $100/day. Watch the numbers. If they hold, continue. If they break, dial back. Emotion has no place in scaling decisions."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-030"
        title: "Retargeting Is the Easiest Money in Advertising"
        description: "Retargeting people who already showed interest is dramatically more efficient than cold traffic. They know you, they've been to your site, they almost bought. A good retargeting sequence is often the highest-ROI spend in any ad account."
        domains: [retargeting, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-031"
        title: "Automation Is Leverage, Not Laziness"
        description: "Automating your marketing sequences isn't laziness -- it's the highest form of leverage. One sequence built once runs forever. The goal is to make money while you sleep, not to manually hustle every sale."
        domains: [marketing-automation, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-032"
        title: "Scaling Requires a Stable Foundation"
        description: "You can't scale a leaky bucket. Before turning up ad spend, make sure conversion rates are solid, follow-up sequences are running, and backend offers are in place. Scale amplifies everything -- good and bad."
        domains: [scaling, business-systems]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-033"
        title: "Bid Strategies Are Tools, Not Magic"
        description: "Facebook's bid strategies (lowest cost, cost cap, bid cap) are tools for different goals. Lowest cost for volume, cost cap for efficiency at scale, bid cap for maximum control. Understanding which to use when is a skill, not a hack."
        domains: [bid-strategies, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-034"
        title: "Email Marketing Is the Backbone of Every Online Business"
        description: "Email is still the highest-ROI marketing channel. It's yours -- not rented from a platform. The list is the asset. Every other channel should be feeding the list."
        domains: [email-marketing, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-035"
        title: "Promotions Beat Broadcasts"
        description: "A strategic promotional sequence with a real deadline will always outperform a single broadcast email. The sequence creates a conversation. The broadcast is a monologue. People buy in conversations."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-036"
        title: "Campaign Troubleshooting Is a Skill Worth Mastering"
        description: "Most people give up on campaigns too early or scale bad ones too fast. Learning to diagnose WHY a campaign isn't working -- is it the audience, the creative, the landing page, the follow-up? -- is the difference between burning money and printing it."
        domains: [campaign-troubleshooting, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-037"
        title: "YouTube Ads Are Underutilized and Underpriced"
        description: "YouTube advertising is consistently underpriced relative to Facebook because fewer advertisers understand it. The targeting is exceptional via Google's data, and the video format allows you to build genuine rapport before the first click."
        domains: [youtube-ads, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-038"
        title: "The Video Ad Is a Mini Sales Letter"
        description: "A good YouTube or Facebook video ad follows the same principles as a sales letter: hook, story, offer. The difference is speed. You have 5 seconds to earn the next 5 seconds. Every second must justify the next."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-039"
        title: "Pattern Interrupts Win the First 5 Seconds"
        description: "The most important job of any video ad is to interrupt the pattern of scrolling or content consumption. Say or show something unexpected in the first 5 seconds. If you don't have their attention in 5 seconds, you've lost them."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-040"
        title: "Irresistible Offers Reduce Ad Costs"
        description: "The better your offer, the lower your cost per acquisition. A mediocre offer with great ads will always be beaten by a great offer with mediocre ads. Invest in offer engineering before ad optimization."
        domains: [irresistible-offers, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-041"
        title: "Tracking Is Not Optional"
        description: "If you're not tracking conversions end-to-end, you're flying blind. You need to know which ad, which audience, which creative, and which funnel step caused each sale. Without that, you can't make good decisions about where to spend and where to cut."
        domains: [conversion-tracking, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-042"
        title: "Client Acquisition Is a System, Not an Event"
        description: "Getting clients should not depend on you having a good week or making a lot of phone calls. It should be a system that runs whether you're working or not. Build the system, then optimize it, then scale it."
        domains: [client-acquisition, business-systems]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-043"
        title: "Audience Segments Respond Differently"
        description: "Cold traffic, warm traffic, and hot traffic need different messages. Cold needs education and trust. Warm needs proof and urgency. Hot just needs the offer and a clear path to buy. Using the same message for all three is a waste."
        domains: [audience-targeting, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-044"
        title: "Consulting Is a Process Business"
        description: "The most valuable thing a consultant delivers is a process -- a repeatable way of diagnosing problems and prescribing solutions. The process is what scales. Without it, you're just selling time."
        domains: [consulting-methodology, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-045"
        title: "Campaign Structure Determines Scalability"
        description: "How you structure your campaigns from the start determines how easily you can scale them later. A well-structured campaign with proper audience segmentation, campaign objectives, and bidding logic can be scaled 10x. A poorly structured one hits a ceiling fast."
        domains: [campaign-structure, scaling]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-046"
        title: "Video Production Quality Is Secondary to Message Quality"
        description: "A compelling message shot on an iPhone will outperform a mediocre message shot in a professional studio. Spend your energy on what you're saying before worrying about how it looks."
        domains: [video-production, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-047"
        title: "The Offer Stack Frames Value Before Price"
        description: "Before you reveal the price, stack everything the prospect is getting. Build the value so high that when you reveal the price, it feels like a steal. The offer stack is the mechanism for making any price feel reasonable."
        domains: [irresistible-offers, pricing-psychology]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-048"
        title: "Lookalike Audiences Are the Bridge to Scale"
        description: "Once you have a proven buyer audience, lookalike audiences let you find more people just like them. A 1% lookalike of your buyers is almost always the best-performing cold audience. This is how you go from profitable to scalable."
        domains: [facebook-ads, scaling]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-049"
        title: "Speed of Testing Beats Perfection"
        description: "Run lots of small tests quickly rather than perfecting one thing slowly. The market gives you the fastest and most accurate feedback. Your opinion about what will work is almost always wrong compared to what the data shows."
        domains: [data-driven-decisions, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-050"
        title: "The Rainmaker is the Person Who Makes It Rain Revenue"
        description: "A Rainmaker isn't a tactician -- they're a revenue architect. They understand how all the pieces fit together and can diagnose and fix any part of the system. That's the skill worth building."
        domains: [consulting-methodology, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-051"
        title: "Google's Data Makes YouTube Targeting Superior"
        description: "YouTube runs on Google's targeting data -- search history, purchase intent, site visits, app usage. This means YouTube can target based on actual intent signals, not just demographic and interest assumptions like Facebook."
        domains: [youtube-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-052"
        title: "The Frontend Pays for Customers, the Backend Makes the Profit"
        description: "If you're trying to make profit on your first offer, you're competing with people who are willing to break even to acquire the same customer. Sell at breakeven on the front, make your money on the backend. This is how you outspend everyone."
        domains: [customer-acquisition, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-053"
        title: "Congruence Between Ad and Landing Page Is Non-Negotiable"
        description: "The promise in the ad must match the experience on the landing page. When there's a disconnect -- different language, different offer, different visual style -- trust breaks immediately and conversion rates plummet."
        domains: [conversion-tracking, campaign-troubleshooting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-054"
        title: "Revenue Per Lead Is the Master Metric"
        description: "If you know your revenue per lead, you know exactly how much you can afford to spend to acquire a lead. Everything else flows from that number. Without it, ad spend decisions are guesses."
        domains: [financial-metrics, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-055"
        title: "Ad Fatigue Is Real -- Rotate Creative"
        description: "Any ad shown to the same audience long enough will stop working. Creative fatigue is inevitable. The solution is a systematic rotation of fresh creative so audiences always see something new while the underlying offer and targeting remain constant."
        domains: [facebook-ads, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-056"
        title: "Headline Is the Most Leveraged Word on Any Page"
        description: "Changing the headline of an ad or landing page is the single highest-leverage optimization. A 20% improvement in click-through from a headline change compounds through every subsequent step in the funnel."
        domains: [copywriting, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-057"
        title: "Specificity Builds Credibility"
        description: "Specific numbers always outperform vague claims. 'Generated $47,312 in 11 days' beats 'generated massive revenue.' Specificity signals that you actually did it, while vagueness signals that you might be making it up."
        domains: [copywriting, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-058"
        title: "Simple Systems Beat Complex Systems Every Time"
        description: "The more complex your marketing system, the harder it is to diagnose when something breaks. Build the simplest possible version that works, then add complexity only when simplicity can't scale further."
        domains: [business-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "FIL-FK-059"
        title: "The Follow-Up Is Where the Fortune Is"
        description: "Most sales happen not on first contact but in follow-up. The fortune really is in the follow-up. A systematic follow-up machine -- automated, behavioral, deadline-driven -- captures the sales that manual follow-up misses."
        domains: [email-marketing, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-060"
        title: "Customer Lifetime Value Determines Your Ad Budget"
        description: "How much you can spend to acquire a customer is directly determined by how much that customer is worth over their lifetime. Businesses with high LTV can outspend low-LTV competitors and acquire the same customers. Build the backend to raise LTV before competing on cold traffic."
        domains: [financial-metrics, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-061"
        title: "Warm Traffic Converts at 3-10x Cold Traffic"
        description: "People who already know you, have been to your site, or have engaged with your content will convert at dramatically higher rates than cold audiences. Most of your ad spend optimization should start with warming up traffic before asking them to buy."
        domains: [retargeting, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-062"
        title: "Test Audiences Before Testing Creative"
        description: "When starting a new campaign, test multiple audience segments with the same proven creative before testing multiple creative variations. Find who responds first, then optimize how you talk to them."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-063"
        title: "The Qualifying Process Is a Sales Tool"
        description: "Making someone fill out an application or answer questions before getting on a call pre-sells them. They invest effort. They articulate their problem and their desire. By the time they talk to you, they've already half-convinced themselves to buy."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-064"
        title: "Skip Ads, Win with Engagement -- Unless You Have Budget"
        description: "If you don't have a serious ad budget, build organic engagement first. Get people commenting, sharing, and talking. Then use paid ads to amplify what's already working organically. Don't fight the algorithm -- feed it."
        domains: [facebook-ads, scaling]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-065"
        title: "Conversion Comes From Conviction"
        description: "The prospect must be absolutely convinced that (1) the problem is real and serious, (2) your solution works, (3) it will work for them specifically, and (4) now is the right time. Each conviction must be established before the next."
        domains: [conversion-tracking, irresistible-offers]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-066"
        title: "Daily Ad Account Monitoring Prevents Budget Waste"
        description: "Ad accounts drift. Winning ads become losing ads. Audiences get saturated. Bids shift. A daily 10-minute review of key metrics -- CPM, CTR, CPA, ROAS -- catches problems before they become expensive problems."
        domains: [campaign-troubleshooting, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-067"
        title: "Story Is the Universal Delivery Mechanism for Persuasion"
        description: "Whether it's an ad, an email, a sales page, or a webinar -- the most effective communication wraps its message in story. Story bypasses resistance, builds empathy, and makes the message memorable in a way that lists of benefits never can."
        domains: [copywriting, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-068"
        title: "The Market Doesn't Care About Your Product -- Only Their Problem"
        description: "Nobody wakes up wanting to buy a course or a service. They wake up with a problem they want solved. Lead with the problem, not the product. Make them feel understood before you make them an offer."
        domains: [marketing-philosophy, irresistible-offers]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-069"
        title: "A Rainmaker Certification Means Being Accountable to Results"
        description: "Getting certified as a Rainmaker means you are committed to being accountable for client results -- not just delivering services, but actually moving revenue metrics. The diagnosis is only valuable if the prescription works."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"


  L2_MENTAL_MODELS:
      - id: "MM-FK-001"
        title: "SANDOR Model"
        description: "Six-step consulting model: S=Stated Objective, A=Assets, N=Numbers, D=Diagnosis, O=One-Step, R=Review & Repeat. Always start by getting the specific target, then inventory assets, then get numbers, then diagnose, then prescribe ONE thing, then review and repeat."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-002"
        title: "Three Phases of Business Growth"
        description: "Phase 1: Find low hanging fruit (get immediate revenue from existing traffic/leads). Phase 2: Systemize what's working (make it evergreen and automated). Phase 3: Ads and scale (only AFTER phases 1-2 are dialed in)."
        domains: [business-growth, marketing-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-003"
        title: "Three Asset Categories"
        description: "Every business has three categories of assets: HUMAN (customer lists, audiences, JV relationships, staff), TRANSACTIONAL (traffic, sales processes, funnels, campaigns, ads), and SELLABLE (existing products/services + create-able products/services)."
        domains: [asset-analysis, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-004"
        title: "Behavioral Indication of Interest"
        description: "Everything in email marketing starts with behavioral indication of interest. Someone clicks, watches, registers, attends -- that's the trigger. You only send deadline sequences to people who have behaviorally indicated they're interested."
        domains: [email-marketing, conversion-psychology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-005"
        title: "Only Two Types of Email Sequences"
        description: "There are really only two types of email sequences in the world: Click Sequences (get them to click a link) and Countdown/Deadline Sequences (create urgency to buy). Everything else is a variation of these two."
        domains: [email-marketing, sales-process]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-006"
        title: "Sales Process Categories"
        description: "Four main business categories, each with typical sales processes: Information (courses, coaching), Services (consulting, agencies), E-commerce (physical products), and Retail (brick and mortar). Each has its own unique steps that can be maximized."
        domains: [sales-process, business-types]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-007"
        title: "G.O.O. -- Glaringly Obvious Observations"
        description: "After getting all the data and running through the checklist, look for Glaringly Obvious Observations. These are the things that jump out as clearly broken or missing. The one thing to fix is almost always glaringly obvious once you have the data."
        domains: [diagnostics, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-008"
        title: "Escape and Arrival Framework"
        description: "For product creation: identify where the customer IS (escape) and where they want to BE (arrival). Map every milestone between those two points. Each milestone can become a standalone product. Apply the same framework within each milestone for detailed content creation."
        domains: [product-creation, content-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-009"
        title: "Click Sequence to Deadline Sequence Flow"
        description: "The holy grail of email marketing: Click Sequence (sell the CLICK, not the thing) → if they click → Deadline/Countdown Sequence (create urgency to buy). If they don't click → next Click Sequence for different offer."
        domains: [email-marketing, sales-process]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-010"
        title: "Super System as Contingency Architecture"
        description: "A super system is built on contingencies. What if they don't click? What if they see the pitch but don't buy? What if they register but don't attend? For every exit point in a sales process, there's a contingency that routes them to the next offer."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-011"
        title: "Information Marketing Models"
        description: "Five info marketing models: Event-Based Ascension (preview → bootcamp → main thing), Continuity-Based Ascension (loss leader → membership levels), Product Suite (multiple products, no cross-promotion), One Main Thing (single offer), Product-Based Ascension (loss leader → bumps → upsells → backend)."
        domains: [business-models, information-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-012"
        title: "Three Behavioral Stages"
        description: "Everything in a super system is based on three behavioral stages: Did they CLICK? Did they SEE THE PITCH? Did they ABANDON THE CART? These three checkpoints drive all automation decisions."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-013"
        title: "Reverse Engineering Revenue"
        description: "Find the top 3 revenue months of the past 12 months. For each: What products were selling? What ads/promos were running? This reveals what worked and what to repeat. The answer is almost always 'run that again.'"
        domains: [revenue-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-014"
        title: "Content Sequence + Call Me Sequence Synergy"
        description: "For high-ticket: run Content Sequences (click sequences driving to educational videos with CTA to book call) simultaneously with Call Me Sequences (3 emails: 'hey, call me if you want X'). Anyone who clicks content enters Call Me. Neither removes them from the other until they book."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-015"
        title: "Super System Four-Level Architecture"
        description: "For webinar-based super systems: Level 1 checks 'been through campaign?' Level 2 checks 'registered?' Level 3 checks 'attended?' Level 4 checks 'saw pitch?' Each level re-routes non-completers back to the appropriate campaign."
        domains: [super-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-016"
        title: "Tag Everything Model"
        description: "What powers a super system is tags. Tag every behavioral stage: registered, attended, saw pitch, bought, didn't buy, clicked, didn't click. The super system reads tags to determine what to send next. Remove-then-reapply tags to restart automations."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-017"
        title: "Loss Leader Customer Acquisition"
        description: "The real purpose of loss leader products, order bumps, and OTOs is to acquire a customer at breakeven or better. Then every dime of the backend 'main thing' is profit. The dream: selling loss leader at a profit because of upsells."
        domains: [customer-acquisition, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-018"
        title: "Rearranging Building Blocks for New Offers"
        description: "You don't need new products to create multiple offers. Rearrange existing products: give the book free when they buy the bump, give OTO1 free when they buy the book, give OTO2 free when they buy OTO1. Same products, different combinations, different sales pages."
        domains: [offer-creation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-019"
        title: "Facebook Campaign Structure: Campaign-AdSet-Ad"
        description: "Facebook's three-tier structure: Campaign (objective -- traffic, conversions, awareness), Ad Set (audience, budget, placement, schedule), Ad (creative -- image/video, copy, CTA). Each level controls different variables. Testing must happen at the right level."
        domains: [facebook-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-020"
        title: "Cold-Warm-Hot Traffic Segmentation"
        description: "Cold traffic: never heard of you (needs education and trust). Warm traffic: knows you but hasn't bought (needs proof and urgency). Hot traffic: past buyers (needs new offer and relationship). Each segment needs a different message, offer, and funnel."
        domains: [audience-targeting, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-021"
        title: "Bid Strategy Decision Matrix"
        description: "Lowest Cost: maximize volume when learning. Cost Cap: maintain CPA efficiency as you scale. Bid Cap: maximum control in stable, proven campaigns. Start with Lowest Cost to gather data, shift to Cost Cap when profitable, use Bid Cap to protect margins at scale."
        domains: [bid-strategies, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-022"
        title: "Ad Automation Rules"
        description: "Set automated rules to manage your account without manual intervention: pause ad sets when CPA exceeds threshold, increase budget when ROAS exceeds target, turn off ads when frequency exceeds 3.0. These rules protect the account while you sleep."
        domains: [ad-automation, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-023"
        title: "YouTube Ad Format Decision Tree"
        description: "TrueView In-Stream (skippable after 5s): best for awareness and retargeting with long-form story. TrueView Discovery (appears in search/recommendations): best for capturing intent. Non-skippable bumpers (6s): best for brand recall in retargeting. Match format to funnel stage."
        domains: [youtube-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-024"
        title: "Offer Stack Architecture"
        description: "Stack elements before revealing price: Main offer value → Bonus 1 value → Bonus 2 value → Bonus 3 value → Total value = $X,XXX. Then reveal actual price = $XXX. The ratio of stacked value to price determines perceived deal quality. Aim for 10:1 ratio minimum."
        domains: [irresistible-offers, pricing-psychology]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MM-FK-025"
        title: "Client Acquisition Funnel for Consulting"
        description: "Lead magnet → Email sequence → Application/VSL → Phone call → Offer. Each stage qualifies prospects further. By the time they're on the phone, they've already self-selected as interested and somewhat qualified. The funnel does the pre-selling."
        domains: [client-acquisition, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-026"
        title: "Video Ad AIDA Structure"
        description: "Attention (first 5 seconds -- hook/pattern interrupt), Interest (problem amplification, why this matters), Desire (solution preview, transformation, social proof), Action (clear CTA with specific next step). Every effective video ad follows this sequence, compressed or expanded based on length."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-027"
        title: "Email Countdown Promotion Calendar"
        description: "Promotional calendar model: run a promotion every 30-45 days to each segment of your list. Each promotion has a real deadline. Between promotions, send content/value emails. The calendar ensures you're always making offers without burning the list."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MM-FK-028"
        title: "Conversion Rate Optimization Priority Stack"
        description: "Fix in this order: (1) Traffic quality (right audience), (2) Landing page conversion, (3) Order form conversion, (4) Upsell conversion, (5) Email follow-up conversion. Each layer multiplies the ones below it. Start at the top -- bad traffic makes everything else irrelevant."
        domains: [conversion-tracking, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MM-FK-029"
        title: "Scaling Decision Framework"
        description: "Before scaling: (1) Is CAC below LTV? (2) Is ROAS > 2x? (3) Is the funnel converting at baseline? (4) Do you have budget to sustain 2-4 week payback period? All four must be YES before increasing spend. One NO means fix that before scaling."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-030"
        title: "Retargeting Audience Hierarchy"
        description: "Warmest to coldest: (1) Cart abandoners, (2) Sales page visitors, (3) Video viewers 75%+, (4) Website visitors 30+ days, (5) Email list custom audience, (6) 1% lookalike of buyers, (7) 1% lookalike of leads. Run retargeting in this order before expanding to cold traffic."
        domains: [retargeting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-031"
        title: "Campaign Troubleshooting Decision Tree"
        description: "Is CPM too high? (audience too narrow or low quality score). Is CTR too low? (wrong audience or weak creative). Is landing page conversion low? (message mismatch or weak page). Is CPA too high? (any of the above). Isolate one variable at a time."
        domains: [campaign-troubleshooting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-032"
        title: "YouTube Targeting Layers"
        description: "Layer targeting for precision: Intent audiences (in-market segments from Google search behavior) + Affinity audiences (long-term interests) + Custom intent (specific keywords and URLs they search) + Retargeting (your own video viewers, website visitors). More layers = smaller but more qualified audience."
        domains: [youtube-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-033"
        title: "Irresistible Offer Components"
        description: "Core product + bonuses that remove remaining objections + guarantee that eliminates risk + urgency element (deadline) + scarcity (limited availability) + social proof (testimonials, case studies). All six components present = irresistible offer. Missing one = reduced conversion."
        domains: [irresistible-offers, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MM-FK-034"
        title: "Ad Creative Testing Matrix"
        description: "Test one variable at a time: (1) Hook/first 5 seconds, (2) Main offer angle, (3) CTA language, (4) Visual format (image vs video, static vs carousel). For each test, run minimum 1,000 impressions before evaluating. The winner becomes control; test next variable against it."
        domains: [facebook-ads, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-035"
        title: "Funnel Metrics Master Dashboard"
        description: "9 core metrics to track daily: (1) Ad spend, (2) Leads generated, (3) Cost per lead, (4) Sales generated, (5) Cost per acquisition, (6) Average order value, (7) Revenue per lead, (8) ROAS, (9) Net profit after ad spend. These 9 numbers tell you everything about the health of your business."
        domains: [financial-metrics, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MM-FK-036"
        title: "Consultative Selling via Video Sequence"
        description: "For high-ticket consulting: 3-5 educational videos on separate pages, each addressing a key objection or building a key belief. Click sequence drives to each video. Call-to-action at end of each video = book a call. This pre-sells the prospect and positions you as the expert before the sales call."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-037"
        title: "Budget Allocation Model"
        description: "Ad budget allocation: 70% to proven winners (scale what works), 20% to testing new audiences/creative (find tomorrow's winners), 10% to experimental campaigns (long shots with high potential). Never put all budget into testing -- you need proven campaigns running."
        domains: [scaling, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-038"
        title: "Countdown Promotion Types"
        description: "Four types of deadline-driven promotions: (1) Price-based (discount expires), (2) Bonus-based (bonus removed at deadline), (3) Access-based (enrollment closes), (4) Quantity-based (limited spots/units). Each creates legitimate urgency. Stack types for maximum impact."
        domains: [countdown-promotions, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MM-FK-039"
        title: "The Breakeven Funnel Model"
        description: "Design your frontend funnel to break even on ad spend through upsells and order bumps. If loss leader + bump + OTO1 + OTO2 = ad cost, then every backend sale is pure profit. This lets you scale ad spend aggressively because each new customer costs you nothing."
        domains: [loss-leader-funnels, scaling]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-040"
        title: "Application Qualification Model"
        description: "For consulting/high-ticket: application asks 5-7 questions: current revenue, goal revenue, biggest obstacle, timeline, investment capacity, what they've tried. Answers pre-qualify and pre-sell. Only schedule calls with qualified applicants. Rejection of non-qualified is a feature, not a bug."
        domains: [client-acquisition, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-041"
        title: "Video Production Minimum Viable Setup"
        description: "iPhone with good lighting (ring light or window) + lapel mic ($30-50) + Teleprompter app = professional-looking video. Environment: clean background, good lighting on face, audio with no echo. This setup costs under $100 and outperforms studio setups with bad scripts."
        domains: [video-production, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-042"
        title: "Email Engagement Re-Activation Model"
        description: "Identify disengaged subscribers (no opens in 90 days). Run re-engagement sequence: 3 emails with compelling reason to click. If no engagement after 3 emails, run 9-word email. If still no response after 30 days, remove from main list or move to separate segment with reduced frequency."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MM-FK-043"
        title: "Scaling Safety Net Model"
        description: "When scaling ad spend: increase budget by 20-25% maximum per 48-hour period. Give the algorithm time to adjust. Monitor CPA and ROAS hourly for first 24 hours. If metrics deteriorate by more than 15%, roll back. This prevents catastrophic spend on broken campaigns."
        domains: [scaling, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-044"
        title: "Proof Stack Model"
        description: "Layer proof elements to overcome skepticism: (1) Testimonials from similar people, (2) Case studies with specific numbers, (3) Before/after transformations, (4) Third-party validation (press, certifications), (5) Your own story. Each proof layer addresses a different type of skeptic."
        domains: [irresistible-offers, copywriting]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MM-FK-045"
        title: "Consulting Delivery Model"
        description: "Rainmaker consulting delivery: Month 1 = deep diagnosis + prescribe one thing. Month 2 = implement the one thing + measure. Month 3 = review results + prescribe next one thing. Repeat. Don't try to fix everything at once. The SANDOR model runs in a loop, each cycle improving one variable."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"


  L3_HEURISTICS:
      - id: "HEUR-FK-001"
        title: "Deadline Sequence Last Day: 6 Emails"
        description: "On every day except the last day of a deadline sequence, send two emails before noon. On the last day, send SIX emails: 8AM, 10AM, 12PM, 9PM, 10PM, 11PM."
        domains: [email-marketing, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-002"
        title: "Click Sequence: 2 Emails/Day for 3 Days"
        description: "Click sequence structure: send two emails per day (8:30 AM and 11:30 AM) for three days. If they click, move to next stage. If they don't click after 3 days, move them to the next campaign."
        domains: [email-marketing, click-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-003"
        title: "48-Hour Wait Between Deadline Stacks"
        description: "Between each deadline sequence in a deadline stack, wait 48 hours before starting the next one. This gives prospects breathing room while keeping momentum."
        domains: [deadline-sequences, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-004"
        title: "Minimum 10% Order Form Conversion"
        description: "You should always have a minimum 10% on an order form. If your order form conversion is 2%, you've got a broken order form. Getting it from 2% to 10% would 5x the business."
        domains: [conversion-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-005"
        title: "Under 20% Opt-In Rate Needs Fixing"
        description: "Anything under 20% on an opt-in page conversion rate needs to be fixed."
        domains: [conversion-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-006"
        title: "Three One-Click Upsells Is Ideal"
        description: "Ideally, I like to see three one-click upsells in any loss leader funnel."
        domains: [loss-leader-funnels, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-007"
        title: "5% Conversion from Cold Traffic Is Good for Book Funnels"
        description: "My book funnel page typically converts around 5% from cold traffic, generally speaking. That's a good benchmark for loss leader sales pages."
        domains: [conversion-optimization, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-008"
        title: "80% of the Time Prospects Aren't Ready to Buy"
        description: "Roughly 80% of the time, a person is NOT open to making a purchase. The idea of deadline stacking is to have more coverage to hit them in the 20% when they ARE ready."
        domains: [buyer-psychology, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-009"
        title: "Sweet Spot Clients: $500K-$5M Revenue"
        description: "The sweet spot clients to work with are between half a million and five million and up in revenue. They have enough data, assets, and systems to make the diagnostic process work."
        domains: [consulting-methodology, client-selection]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-010"
        title: "Click Sequence Sells the CLICK, Not the Thing"
        description: "The click sequence sells the CLICK more than it sells the THING. Super important. You're not trying to close the sale in the email -- you're trying to get them to click. The selling happens on the page."
        domains: [email-marketing, copywriting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-011"
        title: "E-Com Low Hanging Fruit: Order Bump + OTO + Cart Abandon Sequence"
        description: "For e-commerce clients, the three most impactful first moves are always: (1) add order bump, (2) add one-click upsell, (3) add deadline sequence to cart abandoners. 99.99% of e-com stores don't do these basic things."
        domains: [ecommerce, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-012"
        title: "Exit Intent Pop-Ups on OTO Pages Increase Conversions"
        description: "Put an exit intent pop-up on every one-click upsell page. When someone goes to leave, the pop says 'Wait, let me get straight to the point -- you can have this right now for this price.' It increases conversions."
        domains: [conversion-optimization, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-013"
        title: "Two-Step Order Form Is Mandatory"
        description: "Always use a two-step order form. Step 1: name, email, phone. Step 2: payment. The reason: many people abandon the cart, and with step 1 data, you can follow up with them."
        domains: [conversion-optimization, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-014"
        title: "One Email Can Generate $27K"
        description: "Real client example: one email to e-com list generated 50% open rate, 31% click rate, 4.4% order rate, $27,000 in revenue. They never sent a second email. Always send more than one email."
        domains: [email-marketing, ecommerce]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-015"
        title: "3 Emails = $600K (Private Client Group Example)"
        description: "Three emails promoting private client group in January generated $600,000 in revenue. The prescription: send those three emails again. It's that simple."
        domains: [email-marketing, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-016"
        title: "Deadline Stack Triple: Price + Bonus + Payment Plan"
        description: "Deadline stack pattern: Deadline 1 = price/bonus deadline. Deadline 2 = original bonus + NEW second bonus added. Deadline 3 = both bonuses + payment plan added. Each with real deadlines using separate web pages."
        domains: [deadline-sequences, offer-creation]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-017"
        title: "40% Self-Schedule Rate Is the Max"
        description: "The overwhelming majority of people do NOT self-schedule. Maybe 40% will, after all that email. Even though they SAY they wanted it and SAY they can afford it. The number one fix: have someone pick up the phone and call them."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-018"
        title: "Deadline Stack Tripled Sales"
        description: "Deadline stacking tripled the sales of the original Intent Based Branding class. This structure works because most prospects zone out on deadline 1, and may start paying attention at deadline 2 or 3."
        domains: [deadline-sequences, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-019"
        title: "Taking Action Beats Perfect Email Sequences"
        description: "Taking action and getting stuff out is going to be a MUCH bigger factor in performance vs. having the 'perfect email sequence' -- it doesn't exist."
        domains: [email-marketing, entrepreneurship]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-020"
        title: "Use Different Web Pages for Each Deadline"
        description: "Create a different web page for each deadline in a stack. The previous page really does expire. Same video, different copy mentioning the new bonus. Use deadline funnel software to enforce real expiration."
        domains: [deadline-sequences, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-021"
        title: "Nine-Word Email for Re-Engagement"
        description: "After all other sequences fail, send a 9-word email from a team member: 'Are you still interested in getting [X]?' Short, personal, gets replies."
        domains: [email-marketing, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-022"
        title: "E-Com Stores Net ~10% of Revenue"
        description: "You could have someone doing $10 million a year in an e-com business and they might be netting 10% of that. Totally different margin game than info products and services."
        domains: [ecommerce, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-023"
        title: "$2.81 Revenue Per Email Sent Is Excellent"
        description: "If your first email in a post-opt-in sequence generates $2.81 per email sent, that's excellent. Plus the ad campaigns got 11-to-1 ROI. Turn those campaigns back on."
        domains: [email-marketing, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-024"
        title: "Upsell Products: $30-$500 Range"
        description: "Upsell products for info businesses are usually between $30 and $500, although not gospel -- can go to $1,000+. They're usually multimedia, cover milestones on escape/arrival framework, and always mission-specific."
        domains: [product-creation, pricing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-025"
        title: "Webinar Itself Isn't What Gets Sales"
        description: "In almost every single circumstance, the webinar itself isn't the thing that actually gets the sales. The webinar gets someone to behaviorally indicate they're interested in buying. The real money is in what happens when you follow up."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-026"
        title: "Facebook Ad Frequency Above 3.0 = Creative Fatigue"
        description: "When frequency (average times each person saw your ad) exceeds 3.0, performance typically drops significantly. At that point either refresh the creative or pause that ad set. Frequency is the leading indicator of ad fatigue."
        domains: [facebook-ads, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-027"
        title: "Scale Budget 20-25% Every 48 Hours"
        description: "Never double or triple a Facebook budget overnight. Increase by 20-25% every 48 hours. Larger jumps force the algorithm to re-enter the learning phase, resetting your hard-won optimization and typically spiking CPAs."
        domains: [scaling, bid-strategies]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-028"
        title: "CTR Benchmark: 1%+ for Cold Traffic Facebook Ads"
        description: "A link click-through rate of 1% or higher on cold traffic Facebook ads is generally a sign of healthy creative and audience match. Below 0.5% is a clear signal to test new creative or different audience targeting."
        domains: [facebook-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-029"
        title: "YouTube View Rate Benchmark: 30%+ for Relevant Audience"
        description: "A 30-second view rate (or view-through rate for skippable ads) of 30% or higher indicates a good match between creative and audience. Below 20% means the hook isn't working for that audience -- test a new opening 5 seconds."
        domains: [youtube-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-030"
        title: "Test Minimum $50/Day Per Ad Set for Statistical Significance"
        description: "Spend at least $50/day per ad set before making optimization decisions. Below that threshold, the data isn't statistically meaningful. Wait for at least 50 conversions before comparing ad sets."
        domains: [facebook-ads, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-031"
        title: "Email Open Rate Below 15% = Deliverability Problem"
        description: "If your list-wide open rate drops below 15%, you likely have a deliverability issue -- too many emails going to spam or promotions folder. Clean your list, reduce send frequency, and warm up your sending reputation before any promotional campaign."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-032"
        title: "ROAS of 2x Is Break-Even, 3x Is Profitable, 4x+ Is Scale"
        description: "Return on ad spend benchmarks for most businesses: 2x ROAS = breaking even (revenue covers cost of goods + ads). 3x ROAS = profitable after all costs. 4x+ ROAS = strong signal to scale budget. These are rough benchmarks -- your margin structure determines your actual thresholds."
        domains: [paid-advertising, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-033"
        title: "Video Ad Sweet Spot: 60-90 Seconds for Warm Traffic, 15-30 Seconds for Cold"
        description: "Cold traffic ads should be short -- hook + problem + CTA in under 30 seconds. Warm traffic (retargeting) can handle longer ads -- 60-90 seconds allows for more story, proof, and offer detail. Match video length to audience temperature."
        domains: [ad-scripting, retargeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-034"
        title: "Lookalike Audience Size 1-3% for Best Performance"
        description: "1% lookalike audiences (most similar to your source) consistently outperform 3-10% lookalikes for conversion campaigns. Use 1% for conversions, 3-5% for reach/traffic campaigns when you need more volume."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-035"
        title: "Retargeting Budget: 20% of Total Ad Spend"
        description: "Allocate roughly 20% of total ad budget to retargeting campaigns. Retargeting consistently delivers 3-5x lower CPA than cold traffic. Underspending on retargeting means leaving your hottest prospects to be taken by competitors."
        domains: [retargeting, scaling]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-036"
        title: "Cart Abandonment Sequence: 3 Emails Within 24 Hours"
        description: "Cart abandonment sequence timing: Email 1 = 1 hour after abandonment (reminder). Email 2 = 6 hours after abandonment (address objection). Email 3 = 24 hours after abandonment (deadline + bonus). Over 50% of cart abandonment revenue comes from email 3."
        domains: [ecommerce, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-037"
        title: "Order Bump Conversion Rate: 15-30% of Buyers"
        description: "A well-crafted order bump (one-click add-on shown on order form) should convert 15-30% of buyers. Below 10% means the bump offer isn't compelling or relevant enough. Above 30% means you might want to test making it the main offer."
        domains: [loss-leader-funnels, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-038"
        title: "High-Ticket Application Show Rate: 70%+ Is Healthy"
        description: "Of people who schedule a call, 70% or more should show up. Below 60% means your pre-call sequence isn't building enough excitement or the qualification isn't tight enough. Strong pre-call content raises show rates to 80-90%."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-039"
        title: "Facebook Learning Phase Requires 50 Conversions in 7 Days"
        description: "Facebook's algorithm needs 50 optimization events (purchases, leads, etc.) within 7 days to exit the learning phase. During learning phase, performance is unstable -- don't make optimization decisions. Budget and audience changes reset the learning phase."
        domains: [facebook-ads, bid-strategies]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-040"
        title: "Webinar Show-Up Rate: 20-30% of Registrants Is Normal"
        description: "Expect 20-30% of webinar registrants to actually attend live. Below 15% means your go-attend sequence isn't working or the topic/headline isn't compelling enough. The follow-up sequence to non-attenders is where you recover the other 70-80%."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-041"
        title: "Email Subject Line: Under 50 Characters for Mobile"
        description: "Keep email subject lines under 50 characters for mobile preview. On desktop, 60-70 characters is fine. Test curiosity-based vs benefit-based subject lines. The open rate tells you which approach your list responds to."
        domains: [email-marketing, copywriting]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-042"
        title: "Ad Copy: First Line Must Stop the Scroll"
        description: "The first line of Facebook ad copy (visible before 'See more') is the most important. It must stop the scroll. Use a bold claim, a provocative question, a surprising statistic, or a pattern-interrupting statement. Test 3-5 different first lines before optimizing creative."
        domains: [facebook-ads, copywriting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-043"
        title: "Cost Per Lead Benchmark: 3-10x of Lead Magnet Price"
        description: "If you're giving away a free lead magnet, a healthy CPL is $3-$10 for consumer markets, $15-$50 for B2B. If CPL exceeds the revenue per lead average of your funnel, you're losing money before any sales are made."
        domains: [paid-advertising, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-044"
        title: "Consulting Retainer Fee: 10-15% of Upside Created"
        description: "Price consulting at 10-15% of the annual upside you're creating. If you're taking someone from $1M to $1.5M, that's $500K upside, so $50-75K/year is a no-brainer for them. Never price on hours or deliverables -- price on results."
        domains: [consulting-methodology, pricing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-045"
        title: "Video Production: Reshoot If More Than 3 Takes"
        description: "If you're struggling to record a clean take after 3 attempts, stop and rewrite the script. A painful recording session signals the script is the problem, not your delivery. Rewrite the section that's causing the stumbles."
        domains: [video-production, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-046"
        title: "Offer Testing: Run 2 Weeks Before Judging"
        description: "Don't judge a new offer or campaign after 3-5 days. Most campaigns need 10-14 days and meaningful spend ($500-1000 minimum) before the data is directionally reliable. Premature judgment kills good campaigns and protects bad ones."
        domains: [data-driven-decisions, campaign-troubleshooting]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-047"
        title: "YouTube CPV (Cost Per View) Benchmark: Under $0.05"
        description: "A cost per view under $0.05 on YouTube TrueView ads indicates good audience-to-creative match. Above $0.10 means either the audience is too competitive or the hook isn't compelling enough to watch past 30 seconds."
        domains: [youtube-ads, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-048"
        title: "Promotional Email List: Send at Least Monthly"
        description: "Any list you haven't emailed in 90+ days is effectively dead. Sending a promotional email to a cold list causes deliverability issues and low response. Warm up cold lists with 2-3 value emails before any promotional sequence."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-049"
        title: "Sales Page Conversion: 1-3% from Cold Traffic Is Viable"
        description: "A long-form sales page converting at 1-3% from cold traffic is a viable business. Below 0.5% means either the traffic is wrong or the page needs significant work. Above 5% from cold traffic is exceptional and means you should be scaling immediately."
        domains: [conversion-optimization, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "HEUR-FK-050"
        title: "Upsell Take Rate: 20-40% for Relevant One-Click Upsell"
        description: "A relevant, well-priced one-click upsell should convert 20-40% of buyers. If take rate is below 15%, the upsell is either priced wrong, poorly positioned, or not relevant enough to the original purchase."
        domains: [loss-leader-funnels, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-051"
        title: "Ad Account Health: Keep Campaigns Under 5 Active at Once"
        description: "Running more than 5-7 active campaigns simultaneously dilutes your ability to monitor and optimize each one. Focus on your best 3-5 campaigns. Kill the bottom performers and use that budget to scale the winners."
        domains: [campaign-troubleshooting, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-052"
        title: "Pre-Launch Warm-Up: 7-10 Days of Value Content Before Offer"
        description: "Before any major launch or promotional campaign, run 7-10 days of pure value content (no ask). This warms up the audience, increases open rates, and conditions them to engage with your emails before you make the big ask."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-053"
        title: "Client Results: Measure at 30, 60, 90 Days"
        description: "Track client results at 30-day, 60-day, and 90-day intervals. This creates natural check-in points for the SANDOR Review & Repeat cycle and gives you enough time to see whether the prescription is working before changing it."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "HEUR-FK-054"
        title: "Facebook Broad Targeting Outperforms Interest Targeting for Large Budgets"
        description: "At budgets above $500/day, broad targeting (no interests, just age/gender/location) often outperforms interest-based targeting because Facebook's algorithm has enough conversion data to find buyers itself. Interest targeting is better for smaller budgets where the algorithm needs help."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-055"
        title: "Phone Follow-Up Converts 3-5x More Than Email for High-Ticket"
        description: "For offers above $3,000, adding a phone call to the follow-up process (calling people who applied or expressed interest) consistently converts 3-5x better than email alone. The phone is underutilized in digital marketing because it requires human effort."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-056"
        title: "Audience Size Minimum: 100,000 for Facebook Ad Testing"
        description: "Target audiences under 100,000 people are too small for Facebook's algorithm to optimize efficiently. The minimum viable audience size for campaign testing is 100,000 -- preferably 500,000+ for scalable campaigns."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-057"
        title: "Testimonial Specificity Multiplier"
        description: "Testimonials with specific results ('I made $47,312 in 11 days') outperform vague testimonials ('This was amazing, life-changing!') by 3-5x in conversion impact. Collect testimonials that contain specific numbers, timeframes, and before/after comparisons."
        domains: [copywriting, irresistible-offers]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "HEUR-FK-058"
        title: "Email Unsubscribe Rate: Below 0.3% Per Email Is Healthy"
        description: "An unsubscribe rate above 0.5% per email indicates list-message mismatch -- either you're emailing the wrong people or your content isn't relevant. Below 0.1% means you have an extremely engaged and aligned list."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-059"
        title: "Hook Testing: First 5 Seconds of Video Ad"
        description: "Test hooks (first 5 seconds) in isolation before testing anything else in a video ad. Create 3-5 different openings for the same underlying message. The hook that generates the best 3-second view rate wins. Then build the full ad around that hook."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-060"
        title: "Consulting Package Minimum: 3-Month Retainer"
        description: "Never sell consulting in one-month increments. Three months minimum gives you enough time to diagnose, implement, and measure results. One-month contracts mean clients leave before you've had a chance to prove value."
        domains: [consulting-methodology, pricing]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "HEUR-FK-061"
        title: "Webinar Registration to Attendance: Improve with Pre-Event Emails"
        description: "A minimum of 3 pre-event emails dramatically improves attendance: Confirmation + agenda (immediately), Reminder with value teaser (24 hours before), Final reminder with urgency (2 hours before). Each email should make attendees more excited about what they'll learn."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-062"
        title: "Facebook Pixel Must Be on Every Page"
        description: "The Facebook pixel must be installed on every page of your funnel -- not just the thank you page. This allows you to build retargeting audiences for each funnel stage, track micro-conversions, and give Facebook more data to optimize campaigns."
        domains: [facebook-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-063"
        title: "Organic Content: 80% Value, 20% Promotion"
        description: "For organic social media and email, maintain an 80/20 ratio: 80% pure value content, 20% promotional. Violate this ratio and engagement drops, unsubscribes increase, and your paid amplification of organic content will underperform."
        domains: [email-marketing, content-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-064"
        title: "Scaling Checkpoint: Profitable for 7 Consecutive Days Before Scaling"
        description: "Only scale a campaign after it has been consistently profitable for 7 consecutive days at current budget. A single profitable day is not a signal to scale. You need a trend, not a data point."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-065"
        title: "Guarantee Removes Risk and Increases Conversions"
        description: "A strong guarantee (30-day money back, results-based, or both) consistently increases conversions by 10-30%. The refund rate almost never exceeds the conversion lift. Risk reversal is one of the highest-ROI elements you can add to any offer."
        domains: [irresistible-offers, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "HEUR-FK-066"
        title: "YouTube Ads: 15-Second Non-Skippable for Retargeting"
        description: "15-second non-skippable bumper ads work best for retargeting people who've already seen your longer content. They're forced to watch all 15 seconds, making them ideal for deadline reminders, testimonials, and direct CTAs to warm audiences."
        domains: [youtube-ads, retargeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-067"
        title: "Lead Quality Over Lead Quantity"
        description: "A $15 lead that converts at 3% is worth more than a $3 lead that converts at 0.5%. Always optimize for cost per acquisition, not cost per lead. More expensive leads from better-targeted audiences will always outperform cheap leads from broad audiences."
        domains: [paid-advertising, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-068"
        title: "Backend Offer Should Be 10x the Price of Frontend"
        description: "The backend main offer should be priced at roughly 10x the frontend loss leader price. $7 book → $97 course. $97 course → $997 coaching. This creates a natural ascension ladder where each step is a significant but justified price increase."
        domains: [pricing, customer-acquisition]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-069"
        title: "Application Qualification: 3 Questions Minimum"
        description: "High-ticket applications should ask at minimum: (1) What's your current revenue? (2) What's your goal? (3) Are you able to invest $X to get there? These three questions eliminate 80% of unqualified leads before they ever reach a sales call."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "HEUR-FK-070"
        title: "Daily Ad Spend Cap: Never More Than 30% of Weekly Budget in One Day"
        description: "Never allow a single day's ad spend to exceed 30% of your weekly budget. If a campaign accidentally spends 50% of weekly budget in one day, pause and investigate. Set spending caps at the campaign level to prevent runaway spend."
        domains: [facebook-ads, scaling]
        source_id: "FK-RC"
        source_week: "Week 5"


  L4_FRAMEWORKS:
      - id: "FW-FK-001"
        title: "SANDOR Consulting Framework"
        description: "S=Stated Objective (get specific target with numbers), A=Assets (inventory all human, transactional, sellable assets), N=Numbers (conversion rates, revenue data), D=Diagnosis (find the one broken thing), O=One-Step (prescribe single highest-impact action), R=Review & Repeat."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-002"
        title: "Deadline Stack Framework"
        description: "Three sequential deadline sequences for the same product: (1) Price/discount + bonus, real deadline. Wait 48h. (2) Same price + original bonus + NEW bonus added, real deadline. Wait 48h. (3) Both bonuses + payment plan added, real deadline. Each uses separate web page. Deadlines really expire."
        domains: [deadline-sequences, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-003"
        title: "Click Sequence Email Framework"
        description: "7-element structure: (1) Subject line - get it opened, (2) First sentence - get it opened, (3) Image - get the click, (4) Early CTA - get the click, (5) Benefits list - sell the click, (6) Second CTA - sell the click, (7) Sign off + PS - re-sell the click. Sells the CLICK, not the product."
        domains: [email-marketing, copywriting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-004"
        title: "Countdown/Deadline Email Framework"
        description: "8-element structure: (1) Subject - open it, (2) First sentence - scarcity + click, (3) Image - click, (4) CTA - click, (5) Reveal bonus - fuel interest, (6) Benefits of bonus - sell click, (7) Second CTA - sell click, (8) PS - restate scarcity."
        domains: [email-marketing, copywriting, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-005"
        title: "Loss Leader Sales Process Diagnostic Checklist"
        description: "Component checklist: opt-in page? two-step order form? order bump? OTO 1-3? exit intent on OTOs? deadline to non-buyers? deadline to bump non-buyers? deadline to OTO non-buyers? retargeting? cart abandon sequence? Then get conversion rates for each component. End with G.O.O."
        domains: [diagnostics, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-006"
        title: "One-To-Many Sales Process Diagnostic Checklist"
        description: "Components: liquidator after registration? order bump on liquidator? OTOs? go-back sequence? go-finish sequence? two-step order form? deadline stack post-webinar? cart abandon deadline? Numbers: show up rate, saw-pitch rate, liquidator conversion, registration rate. G.O.O."
        domains: [diagnostics, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-007"
        title: "E-Commerce Sales Process Diagnostic Checklist"
        description: "Components: two-step order form? order bump? OTO? downsell? exit intent on OTO? deadline to bump/OTO non-buyers? retargeting? cart abandon sequence? Numbers: pre-sale CTR, sales page conversion, order form conversion, bump/OTO conversion rates. G.O.O."
        domains: [diagnostics, ecommerce]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-008"
        title: "Eight Figure Phone Funnel Checklist"
        description: "Components: reminder sequence, go-apply sequence, go-schedule sequence, 9-word email, pre-call sequence, closing stacks, post-call follow-up. Numbers: opt-in rate, lead-to-application, application-to-schedule, schedule-to-show-up, appointment-to-close, plus held/closed/pending/non-qual/vanished breakdown."
        domains: [phone-sales, diagnostics, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-009"
        title: "Escape and Arrival Product Creation Framework"
        description: "Step 1: Define escape situation and arrival situation. Step 2: Map every major milestone between them. Step 3: Take any ONE milestone and create a standalone product. Step 4: Within that milestone, do escape-arrival AGAIN for sub-steps. Each sub-step = 10-30 min video. Result: 1-2 hour course from one milestone."
        domains: [product-creation, content-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-010"
        title: "Asset Extraction Worksheet"
        description: "Three-column worksheet: HUMAN assets (email lists, audiences, staff), TRANSACTIONAL assets (traffic, funnels, campaigns), SELLABLE assets (products, services, create-able offerings). Plus bottom section: Top 3 revenue months → products sold → ads/promos that ran."
        domains: [consulting-methodology, asset-analysis]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-011"
        title: "Stated Objective Extraction Framework"
        description: "Three ways to ask: Dan Sullivan style ('If 8 weeks from today...'), Frank style ('What's your one big important target?'), Alternate ('What's our mission?'). Three common responses: 'more sales,' life story dump, problem vomit. Always dig to establish BASELINE + TARGET with actual numbers."
        domains: [consulting-methodology, goal-setting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-012"
        title: "Super System Architecture (Multi-Campaign)"
        description: "Take all existing campaigns/funnels and connect them sequentially via automation: Campaign 1 → exit → Campaign 2 → exit → Campaign 3... Each connection is: Click Sequence → Countdown Sequence (or Deadline Stack). Build over time, not all at once."
        domains: [super-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FW-FK-013"
        title: "Content + Call Me Sequence Framework"
        description: "Multiple content videos, each on its own web page with headline + video + book-call CTA. One email per content piece (click sequence). Anyone who clicks ANY content email simultaneously enters Call Me sequence (3 emails: 'call me if you want X'). Neither sequence removes them until they book."
        domains: [phone-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-014"
        title: "Super System from Basic Funnel (Mix and Match)"
        description: "Take basic loss leader funnel products (book, bump, OTO1, OTO2) and rearrange into 5+ offers: MO1=original, MO2=give bump free w/book, MO3=give OTO1 free w/book, MO4=give book+OTO1 free w/OTO2, MO5=give OTO2 free w/book. Each offer gets its own deadline sequence. 2-day waits between."
        domains: [super-systems, offer-creation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FW-FK-015"
        title: "Saw-Pitch-But-Didn't-Apply Process"
        description: "Multi-stage follow-up for high-ticket: Go Apply Sequence → Survey Sequence (application disguised as survey) → Go Schedule Sequence → 9-Word Email → Phone Outreach → Goodwill Content + Re-Pitch Click Sequences → Different Campaign. Tags at every stage."
        domains: [high-ticket-sales, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-016"
        title: "Webinar Super System Blueprint"
        description: "For each webinar: Ad/Email invite → Register? → Attend? → See Pitch? → Buy? At every 'No' exit: tag and route to super system. Post-pitch: triple deadline stack. After all deadlines: send to super system. Super system checks 4 levels across multiple webinars."
        domains: [super-systems, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FW-FK-017"
        title: "Call Me Email Framework"
        description: "3 emails: Email 1='Hey, drop me a line if you want us to do X, Y, or Z for you.' Email 2='Do you have questions about [offer]? Choose a time here.' Email 3=Same as Email 1 rephrased. One email per day. Direct, no fluff, link to calendar."
        domains: [phone-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-018"
        title: "Big Picture Numbers Framework"
        description: "9 metrics to get from any business: Monthly Visitors, Monthly Ad Spend, Monthly Gross Revenue, Monthly Net Revenue (after ad spend), Monthly New Customers, Monthly New Leads, Average Customer Value, Cost to Acquire Customer, Net Profit per Customer."
        domains: [diagnostics, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-019"
        title: "Application That Looks Like a Survey"
        description: "After Go-Apply and Go-Schedule fail, send a 'survey' sequence using VideoAsk that asks the same qualification questions as an application but framed as 'help me send you the right stuff.' If they answer yes to 'do you want it?' and 'can you afford it?' → route to schedule page."
        domains: [high-ticket-sales, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-020"
        title: "Webinar Invite Email Framework"
        description: "Structure: (1) Subject - open it, (2) First sentence - announce webinar + click, (3) Official CTA - click, (4) Call to identity - pre-sell click, (5) This is for you if... - qualify, (6) Benefits list - fuel interest, (7) Register CTA, (8) PS - re-sell click with case studies."
        domains: [email-marketing, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-021"
        title: "Facebook Ad Campaign Architecture"
        description: "Campaign level: set objective (conversions for sales, traffic for cheaper leads testing). Ad Set level: define audience (one audience per ad set), budget ($50-100/day to start), placement (Facebook Feed primary), schedule. Ad level: creative (image/video), copy, headline, CTA, destination URL."
        domains: [facebook-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-022"
        title: "Ad Creative Testing Framework"
        description: "Phase 1: Test 5 different audiences with 1 proven creative. Phase 2: Take winning 2 audiences and test 3-5 creative variations. Phase 3: Scale winning audience + creative combination. Phase 4: Test new hooks for the winning creative while scaling. Never test audiences and creative simultaneously."
        domains: [facebook-ads, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-023"
        title: "Retargeting Sequence Framework"
        description: "Tier 1 (hottest): cart abandoners -- direct offer + deadline. Tier 2: sales page visitors who didn't add to cart -- testimonials + FAQ + offer. Tier 3: video viewers 75%+ -- social proof + offer. Tier 4: website visitors 30d -- top of funnel content + opt-in. Each tier gets different creative and budget."
        domains: [retargeting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-024"
        title: "YouTube TrueView Ad Script Framework"
        description: "HOOK (0-5 seconds): bold claim or provocative question. PROBLEM (5-30 seconds): agitate the pain they feel. STORY (30-60 seconds): your journey or a customer's journey. SOLUTION PREVIEW (60-90 seconds): tease the transformation. CTA (final 15 seconds): specific action, urgency, benefit of acting now."
        domains: [youtube-ads, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-025"
        title: "Irresistible Offer Construction Framework"
        description: "Step 1: Define core transformation (from → to). Step 2: List main deliverables that achieve transformation. Step 3: Add bonuses that remove top 3 objections. Step 4: Add guarantee that eliminates purchase risk. Step 5: Calculate real value of each element. Step 6: Stack total value. Step 7: Set price at 10-20% of stacked value."
        domains: [irresistible-offers, pricing]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-026"
        title: "Email Promotional Calendar Framework"
        description: "Month 1-2: Launch new offer with deadline stack. Month 3: Re-launch to non-buyers with new angle. Month 4: New offer launch. Month 5: Evergreen promotion from existing catalog. Month 6: Major promotion (annual sale, anniversary, etc.). Rotate through offer types. Never go 45+ days without a promotion."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-027"
        title: "Client Onboarding Diagnostic Framework"
        description: "Week 1: Get access (analytics, payment processor, email platform, ad accounts). Week 2: Pull all numbers and run SANDOR through A-N stages. Week 3: Present diagnosis with 3 possible prescriptions ranked by impact and ease. Week 4: Client chooses ONE prescription. Start implementation."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-028"
        title: "Scaling Decision Framework"
        description: "Before scaling: CAC below LTV? ROAS > 2x for 7 consecutive days? Funnel converting at or above benchmark? Cash flow to sustain 2-4 week payback? If all YES: increase budget 20-25%, monitor for 48 hours. If CPA holds, increase again. If CPA spikes 15%+, hold budget for 48 hours before adjusting."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FW-FK-029"
        title: "Competitor Research Framework for Ads"
        description: "Step 1: Use Facebook Ad Library to find competitor ads running 90+ days (they work). Step 2: Note: offer angle, creative format, copy structure, CTA. Step 3: Use SimilarWeb to understand their traffic sources. Step 4: Use YouTube to find their video ads. Step 5: Build your own version with a differentiated angle."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-030"
        title: "Campaign Troubleshooting Framework"
        description: "Step 1: Check CPM (is your audience quality score low?). Step 2: Check CTR (is your creative failing to generate interest?). Step 3: Check landing page conversion (is there a message mismatch?). Step 4: Check order form conversion (is there friction or trust issues?). Step 5: Check follow-up metrics. Fix the highest-upstream problem first."
        domains: [campaign-troubleshooting, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FW-FK-031"
        title: "Video Production Workflow"
        description: "Step 1: Write script following AIDA structure. Step 2: Practice 2-3 times without recording. Step 3: Set up: iPhone + ring light + lapel mic + teleprompter app. Step 4: Record 2-3 takes. Step 5: Choose best take. Step 6: Edit (cut dead air, add subtitles, add CTA graphic). Step 7: Export and upload."
        domains: [video-production, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-032"
        title: "Consulting Proposal Framework"
        description: "Section 1: Current situation (baseline numbers from diagnosis). Section 2: Desired outcome (stated objective with specific numbers). Section 3: Gap analysis (what's broken, what's missing). Section 4: Your prescription (ONE specific thing to fix). Section 5: Investment (fee = 10-15% of annual upside). Section 6: Guarantee (results-based or money-back)."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-033"
        title: "List Segmentation Framework"
        description: "Segment by: (1) Engagement level (active/inactive buyers by recency), (2) Product purchased (what they've already bought), (3) Behavioral stage (clicked X, attended Y, applied for Z), (4) Acquisition source (which funnel/ad they came from). Most profitable segments: recent buyers + high-ticket applicants."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-034"
        title: "Rainmaker Client Delivery Framework"
        description: "Month 1: Diagnosis (SANDOR Steps S, A, N, D). Month 2: Prescription + Implementation (SANDOR Step O). Month 3: Measurement + Review (SANDOR Step R). Month 4+: Repeat cycle, fix next highest-impact variable. Deliverables per month: 1 diagnosis report + 1 implementation plan + 1 results report."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-035"
        title: "Offer Validation Framework"
        description: "Before spending on ads: (1) Does the offer solve a real problem? (2) Is the target market actively seeking a solution? (3) Does the price match the market's willingness to pay? (4) Can you deliver the transformation? (5) Can you prove it with testimonials or case studies? All 5 YES = ready to advertise."
        domains: [irresistible-offers, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-036"
        title: "YouTube Campaign Structure Framework"
        description: "Campaign 1: Awareness (TrueView in-stream to cold custom intent audiences). Campaign 2: Consideration (TrueView discovery to warm audiences searching your topic). Campaign 3: Conversion (Non-skippable 15s to retargeting audiences). Campaign 4: Retention (Discovery ads to past buyers for upsells). Each campaign has its own budget and optimization goal."
        domains: [youtube-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-037"
        title: "Ad Account Audit Framework"
        description: "Monthly audit: (1) Review all active campaigns for profitability. (2) Kill bottom 20% performers. (3) Scale top 20% performers. (4) Check frequency of all ad sets (pause any above 3.0). (5) Review audience overlap between ad sets. (6) Check pixel health and attribution. (7) Review ROAS trend over 30 days."
        domains: [campaign-troubleshooting, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FW-FK-038"
        title: "Email Reactivation Framework"
        description: "Step 1: Segment disengaged subscribers (no opens 90+ days). Step 2: Send 3-email re-engagement sequence (curiosity subject lines, no offer). Step 3: If still no engagement, send 9-word email. Step 4: If no response in 30 days, move to suppression list. Step 5: Run periodic win-back campaign with compelling offer every 6 months."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-039"
        title: "High-Ticket Client Acquisition Funnel Framework"
        description: "Top of funnel: content (organic or paid) → Lead magnet opt-in → Value email sequence (3-5 emails) → VSL or webinar with pitch → Application form → Qualification review → Phone call → Offer → Close. Each stage filters: 100 leads → 30 applicants → 10 qualified → 5 calls → 2 clients."
        domains: [client-acquisition, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-040"
        title: "Product Launch Countdown Framework"
        description: "Day -7 to -1: Pre-launch content (value videos or emails, no pitch). Day 0: Launch with main offer + early bird bonus. Days 1-3: Click sequences driving to sales page. Day 3 midnight: First deadline (early bird expires). Day 4-6: New bonus added, second deadline sequence. Day 6 midnight: Second deadline. Day 7-9: Final deadline with payment plan. Day 9 midnight: Close."
        domains: [countdown-promotions, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-041"
        title: "Facebook Audience Research Framework"
        description: "Step 1: Create buyer persona (demographics, interests, behaviors). Step 2: Use Audience Insights to find connected interests. Step 3: Upload customer email list as Custom Audience. Step 4: Create 1% lookalike from buyer list. Step 5: Test 5 interest audiences and 1% lookalike simultaneously. Step 6: Scale winning audiences."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-042"
        title: "Conversion Rate Optimization Hierarchy"
        description: "Fix in this order: (1) Traffic source quality and targeting, (2) Landing page headline and hook, (3) Page body copy and proof elements, (4) CTA button and page flow, (5) Order form (two-step, trust elements, testimonials), (6) Upsell sequence, (7) Email follow-up. Each layer amplifies the ones below."
        domains: [conversion-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "FW-FK-043"
        title: "Guarantee Construction Framework"
        description: "Choose guarantee type: (1) Satisfaction guarantee (100% money back, no questions). (2) Results guarantee (money back if X result not achieved in Y days). (3) Better than free (money back PLUS keep the product). Frame guarantee to address specific buyer hesitation. Always name the guarantee something compelling."
        domains: [irresistible-offers, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-044"
        title: "Testimonial Collection Framework"
        description: "Week 2 after purchase: ask 'How are you getting on? What results have you seen?' Week 6: ask for video testimonial with specific prompts: What was life like before? What have you achieved? What specific results/numbers? Would you recommend? Each testimonial must include specific numbers and timeframes."
        domains: [irresistible-offers, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-045"
        title: "Business Diagnostic Report Template"
        description: "Section 1: Executive summary (one-paragraph diagnosis). Section 2: Assets inventory (human, transactional, sellable). Section 3: Numbers analysis (all 9 key metrics with benchmarks). Section 4: Glaringly Obvious Observations (top 3 gaps). Section 5: Prescription (ONE thing to fix, why, expected impact). Section 6: Timeline and milestones."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-046"
        title: "Email Segmentation by Buyer Stage"
        description: "Segment: (1) Leads who never bought (nurture + offer), (2) Buyers of loss leader (upsell to main), (3) Buyers of main product (upsell to premium/coaching), (4) Premium buyers (retention + referral). Each segment gets different emails. Never send the same promotion to all four -- irrelevant messages burn lists."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-047"
        title: "YouTube Ad Account Structure"
        description: "Account level: billing, settings. Campaign level: separate campaigns per objective (awareness, consideration, conversion, remarketing). Ad Group level: one theme per group (one intent audience or one placement). Ad level: 2-3 creative variations per ad group. This structure allows clean reporting and precise budget control."
        domains: [youtube-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"


  L5_METHODOLOGIES:
      - id: "MET-FK-001"
        title: "SANDOR Implementation Protocol"
        description: "Step 1: Ask the stated objective question (3 methods). Step 2: Dig through their 3 common non-answer responses. Step 3: Establish baseline (revenue past X weeks). Step 4: Set target (desired revenue next X weeks). Step 5: Confirm with actual numbers ('So our mission is to bring in an additional $50K'). Get affirmative yes."
        domains: [consulting-methodology, goal-setting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-002"
        title: "Historical Revenue Mining Protocol"
        description: "Step 1: Log into payment processor, pull monthly revenue for past 12 months. Step 2: Identify top 3 months. Step 3: For each top month, pull products-sold-by-revenue report. Step 4: Pull email broadcasts for that date range (+1 month before). Step 5: Sort by volume sent to find promotions. Step 6: Match promotions to revenue spikes. Step 7: Replicate the promotion."
        domains: [revenue-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-003"
        title: "Deadline Stack Deployment Protocol"
        description: "Step 1: Create content that makes offer at end (webinar, VSL, etc). Step 2: Deploy click sequence to drive to content. Step 3: After behavioral indication, deploy Deadline 1 (2 emails/day + 6 on last day). Step 4: Wait 48h. Step 5: Deploy Deadline 2 with second bonus added. Step 6: Wait 48h. Step 7: Deploy Deadline 3 with payment plan added. Each deadline uses separate web page. Same video, different copy about new bonus."
        domains: [deadline-sequences, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-004"
        title: "Loss Leader Funnel Diagnostic Protocol"
        description: "Step 1: Get big picture numbers (9 metrics). Step 2: Run component checklist (opt-in? two-step? bump? OTOs? exit intent? deadlines? retargeting? cart abandon?). Step 3: Get conversion rates for each component. Step 4: Get email sequence metrics (open/click rates). Step 5: Write G.O.O. Step 6: Prescribe ONE thing based on highest-impact glaringly obvious fix."
        domains: [diagnostics, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-005"
        title: "E-Commerce Quick Win Protocol"
        description: "Step 1: Install two-step order form if missing. Step 2: Add order bump (Zipify for Shopify). Step 3: Add one-click upsell. Step 4: Build cart abandonment deadline sequence. Step 5: Add exit intent pop on OTO page. Step 6: Set up email follow-up to past buyers (click sequence to presale content → deadline sequence). These 6 things alone can transform an e-com business."
        domains: [ecommerce, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-006"
        title: "Content to Call Me Deployment Protocol"
        description: "Step 1: Take 3-5 pieces of existing content (YouTube videos, Facebook Lives). Step 2: Create a web page for each: headline + embedded video + book-a-call CTA with calendar. Step 3: Build click sequence (one email per content piece, one per day). Step 4: Build call-me sequence (3 emails: 'drop me a line if you want X'). Step 5: Anyone who clicks ANY content email gets tagged and enters call-me sequence. Step 6: Nothing removes them from content sequence except booking a call."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-007"
        title: "Super System Build Protocol (Duct Tape Version)"
        description: "Step 1: List all existing offers/funnels. Step 2: String them together sequentially: Offer 1 click sequence → Offer 1 deadline → Offer 2 click sequence → Offer 2 deadline → etc. Step 3: Between each, add 48h wait. Step 4: At each transition, check 'did they buy?' -- if yes, skip. Step 5: Tag everything (bought, clicked, didn't click). Step 6: Add offers over time, don't build all at once."
        domains: [super-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-008"
        title: "Super System Build Protocol (Pristine Version)"
        description: "For webinar funnels: Step 1: Build 3+ webinars for same product (different angles). Step 2: Tag at every stage (registered, attended, saw pitch, bought). Step 3: At every exit, route to super system. Step 4: Level 1 checks 'been through campaign X?' Step 5: Level 2 checks 'registered for X?' Step 6: Level 3 checks 'attended X?' Step 7: Level 4 checks 'saw pitch X?' Each 'no' routes back to appropriate invite sequence."
        domains: [super-systems, marketing-automation, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-009"
        title: "Mix-and-Match Offer Creation Protocol"
        description: "With products A ($7), B ($27), C ($47), D ($97): Offer 1=A with B bump + C upsell + D upsell. Offer 2=B free when buy A + C upsell + D upsell. Offer 3=C free when buy A + B bump + D upsell. Offer 4=A+C free when buy D + B bump. Offer 5=D free when buy A + B bump + C upsell. Each gets own sales page + deadline sequence. 2-day waits between."
        domains: [offer-creation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-010"
        title: "High-Ticket Saw-Pitch Follow-Up Protocol"
        description: "Stage 1: Go Apply Sequence (5 emails, 1/day). Stage 2: Survey Sequence via VideoAsk (4 emails). Stage 3: If qualified, Go Schedule Sequence (4 emails + 9-word email). Stage 4: If still not scheduled, phone outreach. Stage 5: Goodwill Content Sequence with re-pitch. Stage 6: Second Goodwill Content Sequence. Stage 7: Different campaign entirely."
        domains: [high-ticket-sales, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-011"
        title: "Escape and Arrival Product Creation Protocol"
        description: "Step 1: Map global escape-to-arrival (where customer IS → where they want to BE). Step 2: List every major milestone between. Step 3: Pick ONE milestone. Step 4: Do escape-arrival within that milestone (sub-steps). Step 5: For each sub-step, list specific how-to items. Step 6: Record 10-30 min video per sub-step. Result: 1-2 hour multimedia product. Step 7: Repeat for other milestones to create product suite."
        domains: [product-creation, content-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-012"
        title: "One-To-Many Webinar Maximization Protocol"
        description: "Step 1: Registration page (track conversion). Step 2: Liquidator offer after registration (loss leader to offset ad costs). Step 3: Go-Register sequence for non-registrants. Step 4: Go-Attend sequence for registrants. Step 5: Track show-up rate and saw-pitch rate. Step 6: Go-Finish sequence for early leavers. Step 7: Post-pitch deadline stack (3 deadlines). Step 8: Cart abandon sequence for two-step order form. Step 9: Deadline sequences for liquidator non-buyers and OTO non-buyers."
        domains: [webinar-sales, sales-process]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-013"
        title: "Engaged Audience Identification Protocol"
        description: "For each platform, find ENGAGED audiences (not total followers): Facebook Engaged Audience (people who interacted in last 30 days), Instagram Engaged, YouTube Engaged Viewers (watched in past 30 days), Website Visitor Retargeting Audience, Monthly Unique Podcast Downloads. These are the only audiences that count as assets."
        domains: [audience-building, asset-analysis]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-014"
        title: "Pre-Call Sequence Protocol"
        description: "After someone schedules a call, send ONE email immediately: reference a client testimonial or case study podcast. Purpose: build authority and set expectations. Example: 'Before you talk to my wife, listen to this podcast where our client Brooke Castillo describes what she learned working with me.'"
        domains: [phone-sales, pre-call-sequence]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-015"
        title: "Facebook Campaign Launch Protocol"
        description: "Day 1: Create campaign with Conversions objective. Create 5 ad sets (different audiences), $50/day each, same creative. Day 2-7: Monitor CPM, CTR, and CPA. Day 7: Pause bottom 3 ad sets. Increase budget on top 2 by 25%. Day 14: If CPA is profitable, create a 1% lookalike from buyers. Test against winning audience. Day 21: Scale winners, kill underperformers, test new creative."
        domains: [facebook-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MET-FK-016"
        title: "YouTube Ad Launch Protocol"
        description: "Step 1: Write script using AIDA framework (hook 0-5s, problem 5-30s, story 30-60s, solution 60-90s, CTA final 15s). Step 2: Record 3 different hook variations. Step 3: Create TrueView in-stream campaign. Step 4: Upload all 3 hook versions as separate ads. Step 5: Set Custom Intent audience (keywords your buyers search). Step 6: Run $50/day for 14 days. Step 7: Scale winning hook. Step 8: Add retargeting campaign for video viewers 75%."
        domains: [youtube-ads, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MET-FK-017"
        title: "Email List Reactivation Protocol"
        description: "Step 1: Export list sorted by last engagement date. Step 2: Segment: active (opened in 90d), inactive (90-180d), dead (180d+). Step 3: Active list: run normal promotions. Step 4: Inactive list: 5-email re-engagement sequence over 10 days (value, value, value, offer, 9-word email). Step 5: Dead list: one final win-back email with significant offer. Step 6: Non-openers after win-back → suppress or delete."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MET-FK-018"
        title: "Client Consulting Onboarding Protocol"
        description: "Week 1: Access all platforms (analytics, payments, email, ads). Week 2: Run full SANDOR diagnosis -- pull all numbers, complete all checklists. Week 3: Analyze G.O.O., prepare diagnosis report with 3 prescriptions ranked by impact/ease. Week 4: Present to client. Client chooses ONE. Write implementation plan. Week 5+: Execute ONE thing, measure weekly, report monthly."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-019"
        title: "Irresistible Offer Build Protocol"
        description: "Step 1: Define core transformation (from X to Y in Z timeframe). Step 2: List every deliverable that achieves transformation. Step 3: Identify top 3 objections, create a bonus for each. Step 4: Choose guarantee (satisfaction or results). Step 5: Assign real market value to each element. Step 6: Total value = sum of all elements. Step 7: Price at 10-15% of total stacked value. Step 8: Write stack page showing each element, its value, and how it contributes to transformation."
        domains: [irresistible-offers, pricing]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MET-FK-020"
        title: "Sales Call Close Protocol"
        description: "Step 1: Rapport (2-3 minutes of personal connection). Step 2: Situation (confirm what they told you in application). Step 3: Goals (where do they want to be?). Step 4: Gap (what's standing in the way?). Step 5: Solution reveal (how your program bridges the gap). Step 6: Offer presentation (stack, then price). Step 7: Handle objections (feel-felt-found or agree-reframe). Step 8: Close (assume the sale, give clear next step)."
        domains: [high-ticket-sales, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-021"
        title: "Ad Creative Refresh Protocol"
        description: "Week 1: Monitor frequency (pause if above 3.0). Week 2: If creative fatigue detected, test 3 new versions of the same winning ad (new hook only). Week 3: Replace original with winning new hook. Week 4: If still declining, test entirely new angle (different problem, different promise). Never kill a profitable campaign -- refresh the creative first."
        domains: [facebook-ads, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MET-FK-022"
        title: "Webinar Script Protocol"
        description: "Intro (10 min): who you are + big promise. Content (40 min): 3-5 teaching points that build belief. Stack the deck: address each objection within the content itself. Transition (5 min): 'The only thing standing between you and [result] is...' Pitch (15 min): offer stack, price reveal, guarantee, urgency. Q&A/close (10 min): handle objections live. End with deadline announcement."
        domains: [webinar-sales, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-023"
        title: "Post-Launch Retargeting Sequence Protocol"
        description: "Day 1-3 after launch: retarget sales page visitors (not buyers) with testimonials + FAQ ad. Day 4-7: retarget with different angle (different objection addressed). Day 8-14: retarget with deadline reminder (if still open) or downsell offer. Day 15+: move to long-term retargeting pool for future promotions. Budget: $20-50/day, decreasing as audience exhausts."
        domains: [retargeting, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MET-FK-024"
        title: "Consulting Client Results Reporting Protocol"
        description: "Weekly: 5-bullet email to client (what we did, what happened, what it means, what we're doing next, one thing client needs to do). Monthly: full report with before/after numbers, percentage improvements, what's working, what's not, next month prescription. Quarterly: SANDOR reset -- re-run full diagnosis and R step."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-025"
        title: "Budget Scaling Protocol"
        description: "Phase 1 ($0-1K/month): spend $50/day testing audiences and creative. Establish baseline CPA. Phase 2 ($1K-5K/month): scale winning ad sets 20-25% every 48 hours. Add lookalike audiences. Phase 3 ($5K-20K/month): duplicate winning campaigns to new campaign (fresh learning phase). Test new audiences. Phase 4 ($20K+/month): multiple campaigns, bid cap strategy, dedicated creative testing budget (20% of total)."
        domains: [scaling, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MET-FK-026"
        title: "Loss Leader Funnel Build Protocol"
        description: "Step 1: Choose entry product ($7-47 book, report, or mini-course). Step 2: Build opt-in page (one benefit headline, 3 bullets, email capture). Step 3: Build two-step order form. Step 4: Build order bump (complementary product, 30-50% of main price). Step 5: Build 2 OTOs (first = natural next step, second = speed/done-for-you version). Step 6: Build exit intent pop-up for each OTO. Step 7: Build post-purchase deadline sequence to non-OTO-buyers."
        domains: [loss-leader-funnels, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-027"
        title: "Email Automation Tag Protocol"
        description: "Step 1: Map every behavioral action that matters (opt-in, click, purchase, attend, apply). Step 2: Create a unique tag for each action. Step 3: Set automation triggers: add tag → start sequence OR remove tag → stop sequence. Step 4: Build exclusion logic (if tag=bought, exclude from promo sequence). Step 5: Create master tag map document. Step 6: Test every automation path before going live."
        domains: [marketing-automation, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-028"
        title: "High-Ticket Application Funnel Build Protocol"
        description: "Step 1: Create VSL or webinar presenting the transformation and methodology (20-40 min). Step 2: CTA = Apply now button leading to application. Step 3: Application: 6-8 qualifying questions. Step 4: Thank you page: 'We'll review and get back to you within 48 hours.' Step 5: Review applications, approve qualified ones. Step 6: Send approved applicants to scheduling link. Step 7: Pre-call sequence (1 email with authority-building content). Step 8: Sales call."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-029"
        title: "YouTube Channel Authority Building Protocol"
        description: "Month 1: Upload 4 videos (weekly) targeting top search queries in your niche. Month 2: Promote top-performing video with YouTube ads. Month 3: Create playlist of related videos, optimize for watch time. Month 4: Use YouTube ads to drive subscribers (low CPL compared to direct conversions). Month 5+: Retarget channel subscribers and video viewers with conversion offers. Authority compounds over time."
        domains: [youtube-ads, content-marketing]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MET-FK-030"
        title: "Rainmaker Certification Client Delivery Protocol"
        description: "Week 1-2: SANDOR Stated Objective + Assets (S + A). Week 3-4: SANDOR Numbers + Diagnosis (N + D). Week 5: Present diagnosis report and get agreement on ONE thing. Week 6-8: Implement ONE thing (with client's team or do it yourself). Week 9-10: Measure results against baseline. Week 11-12: Review results and prescribe next ONE thing (R). Repeat cycle indefinitely."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-031"
        title: "Promotion Planning Protocol"
        description: "6 weeks before: decide what to promote and set revenue goal. 4 weeks before: plan content (3-5 pre-launch value pieces). 2 weeks before: create or update sales page and order process. 1 week before: run pre-launch content sequence (no pitch). Launch day: email + social. Days 1-3: click sequences. Day 3: first deadline. Days 4-6: second deadline sequence. Day 6: second deadline. Days 7-9: third deadline sequence. Day 9: close."
        domains: [countdown-promotions, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MET-FK-032"
        title: "Ad Account Recovery Protocol"
        description: "When CPA suddenly spikes: Step 1: Check for Facebook algorithm changes (check announcements). Step 2: Check creative frequency (pause if above 3.0). Step 3: Check landing page for errors. Step 4: Check payment processor for cart abandonment spike. Step 5: Check email sequences (did something stop sending?). Step 6: Pause worst-performing ad sets. Step 7: Introduce fresh creative to winning audiences. If none work: reduce budget and wait 72 hours for algorithm to restabilize."
        domains: [campaign-troubleshooting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MET-FK-033"
        title: "New Market Entry Protocol"
        description: "Step 1: Identify existing offer that solves a problem in the new market. Step 2: Research 5 top competitors in that market (Facebook Ad Library + YouTube). Step 3: Identify gaps and angles they're not using. Step 4: Adapt core offer messaging for new market language and pain points. Step 5: Launch test campaign $100/day to 3 audiences. Step 6: Measure CPA vs target. Step 7: If profitable, scale. If not, test new angle before abandoning."
        domains: [paid-advertising, scaling]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MET-FK-034"
        title: "Webinar Technical Setup Protocol"
        description: "Equipment: webcam (Logitech C920 minimum), USB microphone, ring light, clean background. Platform: Zoom Webinar or WebinarJam. Pre-webinar: test audio/video 30 min before, have slides ready, have offer page URL ready to paste in chat. During: go live 10 min early, engage early arrivals, start recording immediately. Post: export recording, upload to delivery page within 24 hours, activate replay sequence."
        domains: [webinar-sales, video-production]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-035"
        title: "Customer Ascension Protocol"
        description: "Step 1: After initial purchase, tag as buyer. Step 2: Send 3-email onboarding sequence (welcome, quick win, what's next). Step 3: 2 weeks post-purchase: offer order bump product they didn't take (repackage as standalone). Step 4: 30 days: offer next level product (OTO1 if they didn't take it). Step 5: 60 days: offer main backend offer. Step 6: 90 days: request testimonial and referrals. Each step triggers only if they haven't already purchased."
        domains: [customer-acquisition, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-036"
        title: "Facebook Pixel Setup and Verification Protocol"
        description: "Step 1: Create pixel in Events Manager. Step 2: Install on all funnel pages (use partner integration or manual code). Step 3: Create standard events: ViewContent (landing pages), AddToCart (order form step 1), InitiateCheckout (order form step 2), Purchase (thank you page). Step 4: Verify with Facebook Pixel Helper Chrome extension. Step 5: Create Custom Audiences based on each event. Step 6: Test purchase event by placing test order."
        domains: [facebook-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MET-FK-037"
        title: "YouTube Conversion Tracking Setup Protocol"
        description: "Step 1: Link Google Ads to Google Analytics 4. Step 2: Create conversion actions in Google Ads (purchase, lead, call). Step 3: Import GA4 goals as conversion actions OR install Google Ads conversion tag directly on thank you pages. Step 4: Link YouTube channel to Google Ads account. Step 5: Enable auto-tagging. Step 6: Verify conversions are recording in Google Ads dashboard. Step 7: Set up attribution modeling (data-driven preferred)."
        domains: [youtube-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MET-FK-038"
        title: "Consulting Discovery Call Protocol"
        description: "Minutes 0-5: intro and rapport. Minutes 5-15: their current situation (what are you doing, what's working, what's not). Minutes 15-25: their goal (if everything went perfectly, what would that look like?). Minutes 25-35: SANDOR quick diagnosis (assets inventory, identify GOO). Minutes 35-45: preview of your prescription. Minutes 45-50: describe your program and investment. Minutes 50-60: next steps and close. Never go past 60 minutes."
        domains: [consulting-methodology, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 10"


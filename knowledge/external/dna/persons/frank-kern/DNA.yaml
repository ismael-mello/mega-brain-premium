person:
  name: "Frank Kern"
  source: "Rainmaker Certification — 10-week program covering consulting methodology (SANDOR model), revenue diagnostics, email marketing (click sequences + deadline stacks), sales funnels (loss leader, webinar, phone, e-com), super systems (automated multi-campaign follow-up), paid advertising (Facebook + YouTube), scaling, and client acquisition. Frank Kern is an internet marketer and consultant since 1999, known for casual conversational teaching style, math-over-emotion decision making, and the SANDOR diagnostic model."
  version: "1.0.0"

metadata:
  total_elements: 269
  by_layer:
    L1_PHILOSOPHIES: 69
    L2_MENTAL_MODELS: 45

layers:
  L1_PHILOSOPHIES:
      - id: "FIL-FK-001"
        title: "Holistic Marketing Over Single-Channel Mastery"
        description: "Focusing on any one thing is like building a stool with one leg. If you just do a pretty good job at all of those things -- ads, copy, conversion, email, follow-up -- that stuff adds up to unbelievable exponential growth. Getting a pretty good job at all of it is a thousand times easier than becoming a world-class expert in one little area."
        domains: [marketing-strategy, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-002"
        title: "Math Over Emotion"
        description: "We rarely make decisions based on math. The type of math you could do with the calculator on your phone. We're going to make all of our decisions based on math. It takes the emotion out of it and it really makes it hard for us to make a mistake because the math is almost always right if you follow it."
        domains: [decision-making, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-003"
        title: "Unsexy Secrets Win"
        description: "None of the stuff that actually gets money is a shiny, cool object. It's plain old common sense, math, and the ability to diagnose situations. The stuff that a lot of people avoid is where the rubber meets the road."
        domains: [marketing-philosophy, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-004"
        title: "Process Is the Real Value"
        description: "Every business has a sales process. Every sales process has specific steps that can be maximized. The huge unsexy secret is understanding the process and knowing exactly what to do to improve it. These little improvements all add up."
        domains: [sales-process, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-005"
        title: "Diagnostics as the Secret Weapon"
        description: "The power of diagnostics -- understanding how to diagnose where the missing revenue is. A huge opportunity to get more money immediately is understanding how to find where the hidden money is, whether the business is broken or just underperforming."
        domains: [diagnostics, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-006"
        title: "Low Hanging Fruit First, Always"
        description: "Almost every business I've ever worked with, there is low hanging fruit available to them. They just can't see it because they're so busy doing business owner stuff. We always want to start there before ads and scale."
        domains: [revenue-optimization, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-007"
        title: "Target and Deadline Driven Always"
        description: "One of the most dangerous things we can do in business is to simply go forth and say I want to get more money. There's no quantifiable target and no quantifiable deadline. You cannot hit a target if you don't know what it is."
        domains: [goal-setting, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-008"
        title: "Clients Can't See the Forest Through the Trees"
        description: "Business owners are so busy running a successful business that they can't see the forest through the trees. They're either putting out fires or worried about future fires based on the past. Very rarely are they ever able to take a minute and think about what they actually want."
        domains: [consulting-methodology, client-psychology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-009"
        title: "Repeat What Worked"
        description: "A huge thing that happens to entrepreneurs is they have stuff that worked really, really good and they just stopped doing it. They get distracted because they like new stuff. Your job is going to be to get them to start doing it again and keep doing it."
        domains: [revenue-optimization, entrepreneurship]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-010"
        title: "Be Your Own Consultant"
        description: "I never start a new project without literally sitting by myself in a room and going through this entire process. Pretend like you are a consultant talking to yourself. It forces your brain to get out of the weeds and look at your business from a higher level."
        domains: [self-consulting, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-011"
        title: "Procrastination Is the Real Reason People Don't Buy"
        description: "A lot of times people don't buy something because they're just procrastinating. It's not because they don't want it. Like I literally live three miles from the pharmacy and CVS had to text me multiple times to come get my medicine."
        domains: [buyer-psychology, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-012"
        title: "The Rule of Dammits"
        description: "The majority of people will NOT do what you want them to do. Most won't opt in. Most who opt in won't watch. Most who watch won't click to order. Most who click won't buy. Most who buy won't take upsells. That's normal. A super system is built to counter-attack this."
        domains: [marketing-philosophy, conversion-psychology, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-013"
        title: "More Offers = More Money"
        description: "The more offers you put in front of people, the more stuff you're going to sell. It's almost physically impossible for that not to be true. Offers equal money. The more stuff we put between getting a lead and selling them something, the more sales we're going to get."
        domains: [revenue-optimization, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-014"
        title: "Imperfect Action Over Perfect Inaction"
        description: "Something is better than nothing. The duct tape and bubble gum version of our current super system is actually working very well. Don't try to build the whole thing in a day. Build it over time."
        domains: [entrepreneurship, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-015"
        title: "90% of the Time It's More Follow-Up or More Offers"
        description: "At the end of the day, after we go through nine million of these things, 90% of the time the prescription is more follow-up or make more offers. That's it."
        domains: [revenue-optimization, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-016"
        title: "Facts Over Feelings"
        description: "Rational thought is going to be your best mindset. The more you have to guess what will work based on your thoughts and feelings, the LESS likely you are to be right. Decisions not based on data are MUCH more likely to be WRONG."
        domains: [decision-making, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-017"
        title: "Ads Are Just Words and Pictures -- Money Is Made After the Click"
        description: "Ads are just words and pictures put on a screen in front of the right person at the right time. What happens after they click is when the money is made."
        domains: [advertising, sales-process]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-018"
        title: "Never Use False Scarcity"
        description: "I don't think one should use the false scarcity angle. It's not really that cool. Your deadlines should really expire. Use different web pages for each deadline so the previous one truly goes away."
        domains: [ethics, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-019"
        title: "Fee Minimization Through Targets"
        description: "If we succeed at creating systems to go from $100K per month to $150K per month, that's an extra $600K per year. If you charge significantly LESS than that for the result, it's a NO BRAINER. This is why being target-driven matters for pricing."
        domains: [pricing, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-020"
        title: "Systemize What Works"
        description: "Take whatever is working really well, systemize it, and make it to where it'll always work and can always be deployed. Entrepreneurs do something that works really well and then stop doing it -- that's the real problem."
        domains: [business-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-021"
        title: "Prospects Don't Pay Nearly as Much Attention as We Wish"
        description: "Our prospects and your clients' prospects don't pay nearly as much attention to us as we wish they did. They're not looking at our every move. If someone asks 'won't people get conditioned to my deadline stacks?' -- I've never seen it happen in 20 years."
        domains: [buyer-psychology, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-022"
        title: "The One Thing Principle"
        description: "Our real value is in getting the data, analyzing it to come up with the ONE thing to do right now, to get the most powerful and impactful results in the shortest time period. Not seven billion things -- one thing."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-023"
        title: "The Super System Is the Holy Grail of Marketing"
        description: "A super system is an automated way of making sure people are always in a promotion. You do the work once but your body has the effect as if you did those pushups every hour, every day, forever. It's the secret to making ads work better."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-024"
        title: "Demonstrate You Can Help Them by Actually Helping Them"
        description: "If they're good people, they give genuinely valuable information and actually help people. They use the oldest trick in the book: demonstrate you can help them by actually helping them."
        domains: [sales-philosophy, content-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-025"
        title: "Pretty Good at Everything Beats World-Class at One Thing"
        description: "If you just get incremental improvement across all things -- lower cost per click, higher AOV, a couple percentage points more from follow-up, a bit more repeat business -- it all adds up to exponential growth."
        domains: [marketing-strategy, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-026"
        title: "Facebook Ads Are a Scalable Traffic Machine"
        description: "Facebook advertising, when built on a solid funnel foundation, is the most scalable paid traffic source available. But ads only amplify what already works -- a broken funnel with more traffic is just a faster way to lose money."
        domains: [facebook-ads, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-027"
        title: "The Ad Is Not the Business"
        description: "Ads are a mechanism to drive traffic to an already-working funnel. The business is the funnel, the follow-up, the offers, and the backend. Treating ads as the business is the number one mistake marketers make."
        domains: [paid-advertising, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-028"
        title: "Audiences Are More Important Than Creative"
        description: "Who you show the ad to matters more than what the ad says. Finding the right audience -- people who are actually interested and qualified -- will outperform better creative shown to the wrong people every single time."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-029"
        title: "Let the Data Decide What to Scale"
        description: "Never scale on intuition. Scale on data. If an ad set is profitable at $50/day, test scaling to $100/day. Watch the numbers. If they hold, continue. If they break, dial back. Emotion has no place in scaling decisions."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-030"
        title: "Retargeting Is the Easiest Money in Advertising"
        description: "Retargeting people who already showed interest is dramatically more efficient than cold traffic. They know you, they've been to your site, they almost bought. A good retargeting sequence is often the highest-ROI spend in any ad account."
        domains: [retargeting, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-031"
        title: "Automation Is Leverage, Not Laziness"
        description: "Automating your marketing sequences isn't laziness -- it's the highest form of leverage. One sequence built once runs forever. The goal is to make money while you sleep, not to manually hustle every sale."
        domains: [marketing-automation, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-032"
        title: "Scaling Requires a Stable Foundation"
        description: "You can't scale a leaky bucket. Before turning up ad spend, make sure conversion rates are solid, follow-up sequences are running, and backend offers are in place. Scale amplifies everything -- good and bad."
        domains: [scaling, business-systems]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-033"
        title: "Bid Strategies Are Tools, Not Magic"
        description: "Facebook's bid strategies (lowest cost, cost cap, bid cap) are tools for different goals. Lowest cost for volume, cost cap for efficiency at scale, bid cap for maximum control. Understanding which to use when is a skill, not a hack."
        domains: [bid-strategies, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-034"
        title: "Email Marketing Is the Backbone of Every Online Business"
        description: "Email is still the highest-ROI marketing channel. It's yours -- not rented from a platform. The list is the asset. Every other channel should be feeding the list."
        domains: [email-marketing, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-035"
        title: "Promotions Beat Broadcasts"
        description: "A strategic promotional sequence with a real deadline will always outperform a single broadcast email. The sequence creates a conversation. The broadcast is a monologue. People buy in conversations."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-036"
        title: "Campaign Troubleshooting Is a Skill Worth Mastering"
        description: "Most people give up on campaigns too early or scale bad ones too fast. Learning to diagnose WHY a campaign isn't working -- is it the audience, the creative, the landing page, the follow-up? -- is the difference between burning money and printing it."
        domains: [campaign-troubleshooting, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-037"
        title: "YouTube Ads Are Underutilized and Underpriced"
        description: "YouTube advertising is consistently underpriced relative to Facebook because fewer advertisers understand it. The targeting is exceptional via Google's data, and the video format allows you to build genuine rapport before the first click."
        domains: [youtube-ads, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-038"
        title: "The Video Ad Is a Mini Sales Letter"
        description: "A good YouTube or Facebook video ad follows the same principles as a sales letter: hook, story, offer. The difference is speed. You have 5 seconds to earn the next 5 seconds. Every second must justify the next."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-039"
        title: "Pattern Interrupts Win the First 5 Seconds"
        description: "The most important job of any video ad is to interrupt the pattern of scrolling or content consumption. Say or show something unexpected in the first 5 seconds. If you don't have their attention in 5 seconds, you've lost them."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-040"
        title: "Irresistible Offers Reduce Ad Costs"
        description: "The better your offer, the lower your cost per acquisition. A mediocre offer with great ads will always be beaten by a great offer with mediocre ads. Invest in offer engineering before ad optimization."
        domains: [irresistible-offers, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-041"
        title: "Tracking Is Not Optional"
        description: "If you're not tracking conversions end-to-end, you're flying blind. You need to know which ad, which audience, which creative, and which funnel step caused each sale. Without that, you can't make good decisions about where to spend and where to cut."
        domains: [conversion-tracking, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-042"
        title: "Client Acquisition Is a System, Not an Event"
        description: "Getting clients should not depend on you having a good week or making a lot of phone calls. It should be a system that runs whether you're working or not. Build the system, then optimize it, then scale it."
        domains: [client-acquisition, business-systems]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-043"
        title: "Audience Segments Respond Differently"
        description: "Cold traffic, warm traffic, and hot traffic need different messages. Cold needs education and trust. Warm needs proof and urgency. Hot just needs the offer and a clear path to buy. Using the same message for all three is a waste."
        domains: [audience-targeting, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-044"
        title: "Consulting Is a Process Business"
        description: "The most valuable thing a consultant delivers is a process -- a repeatable way of diagnosing problems and prescribing solutions. The process is what scales. Without it, you're just selling time."
        domains: [consulting-methodology, business-strategy]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-045"
        title: "Campaign Structure Determines Scalability"
        description: "How you structure your campaigns from the start determines how easily you can scale them later. A well-structured campaign with proper audience segmentation, campaign objectives, and bidding logic can be scaled 10x. A poorly structured one hits a ceiling fast."
        domains: [campaign-structure, scaling]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-046"
        title: "Video Production Quality Is Secondary to Message Quality"
        description: "A compelling message shot on an iPhone will outperform a mediocre message shot in a professional studio. Spend your energy on what you're saying before worrying about how it looks."
        domains: [video-production, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-047"
        title: "The Offer Stack Frames Value Before Price"
        description: "Before you reveal the price, stack everything the prospect is getting. Build the value so high that when you reveal the price, it feels like a steal. The offer stack is the mechanism for making any price feel reasonable."
        domains: [irresistible-offers, pricing-psychology]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-048"
        title: "Lookalike Audiences Are the Bridge to Scale"
        description: "Once you have a proven buyer audience, lookalike audiences let you find more people just like them. A 1% lookalike of your buyers is almost always the best-performing cold audience. This is how you go from profitable to scalable."
        domains: [facebook-ads, scaling]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-049"
        title: "Speed of Testing Beats Perfection"
        description: "Run lots of small tests quickly rather than perfecting one thing slowly. The market gives you the fastest and most accurate feedback. Your opinion about what will work is almost always wrong compared to what the data shows."
        domains: [data-driven-decisions, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-050"
        title: "The Rainmaker is the Person Who Makes It Rain Revenue"
        description: "A Rainmaker isn't a tactician -- they're a revenue architect. They understand how all the pieces fit together and can diagnose and fix any part of the system. That's the skill worth building."
        domains: [consulting-methodology, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FIL-FK-051"
        title: "Google's Data Makes YouTube Targeting Superior"
        description: "YouTube runs on Google's targeting data -- search history, purchase intent, site visits, app usage. This means YouTube can target based on actual intent signals, not just demographic and interest assumptions like Facebook."
        domains: [youtube-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-052"
        title: "The Frontend Pays for Customers, the Backend Makes the Profit"
        description: "If you're trying to make profit on your first offer, you're competing with people who are willing to break even to acquire the same customer. Sell at breakeven on the front, make your money on the backend. This is how you outspend everyone."
        domains: [customer-acquisition, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FIL-FK-053"
        title: "Congruence Between Ad and Landing Page Is Non-Negotiable"
        description: "The promise in the ad must match the experience on the landing page. When there's a disconnect -- different language, different offer, different visual style -- trust breaks immediately and conversion rates plummet."
        domains: [conversion-tracking, campaign-troubleshooting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-054"
        title: "Revenue Per Lead Is the Master Metric"
        description: "If you know your revenue per lead, you know exactly how much you can afford to spend to acquire a lead. Everything else flows from that number. Without it, ad spend decisions are guesses."
        domains: [financial-metrics, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-055"
        title: "Ad Fatigue Is Real -- Rotate Creative"
        description: "Any ad shown to the same audience long enough will stop working. Creative fatigue is inevitable. The solution is a systematic rotation of fresh creative so audiences always see something new while the underlying offer and targeting remain constant."
        domains: [facebook-ads, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-056"
        title: "Headline Is the Most Leveraged Word on Any Page"
        description: "Changing the headline of an ad or landing page is the single highest-leverage optimization. A 20% improvement in click-through from a headline change compounds through every subsequent step in the funnel."
        domains: [copywriting, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-057"
        title: "Specificity Builds Credibility"
        description: "Specific numbers always outperform vague claims. 'Generated $47,312 in 11 days' beats 'generated massive revenue.' Specificity signals that you actually did it, while vagueness signals that you might be making it up."
        domains: [copywriting, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FIL-FK-058"
        title: "Simple Systems Beat Complex Systems Every Time"
        description: "The more complex your marketing system, the harder it is to diagnose when something breaks. Build the simplest possible version that works, then add complexity only when simplicity can't scale further."
        domains: [business-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "FIL-FK-059"
        title: "The Follow-Up Is Where the Fortune Is"
        description: "Most sales happen not on first contact but in follow-up. The fortune really is in the follow-up. A systematic follow-up machine -- automated, behavioral, deadline-driven -- captures the sales that manual follow-up misses."
        domains: [email-marketing, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FIL-FK-060"
        title: "Customer Lifetime Value Determines Your Ad Budget"
        description: "How much you can spend to acquire a customer is directly determined by how much that customer is worth over their lifetime. Businesses with high LTV can outspend low-LTV competitors and acquire the same customers. Build the backend to raise LTV before competing on cold traffic."
        domains: [financial-metrics, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-061"
        title: "Warm Traffic Converts at 3-10x Cold Traffic"
        description: "People who already know you, have been to your site, or have engaged with your content will convert at dramatically higher rates than cold audiences. Most of your ad spend optimization should start with warming up traffic before asking them to buy."
        domains: [retargeting, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-062"
        title: "Test Audiences Before Testing Creative"
        description: "When starting a new campaign, test multiple audience segments with the same proven creative before testing multiple creative variations. Find who responds first, then optimize how you talk to them."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-063"
        title: "The Qualifying Process Is a Sales Tool"
        description: "Making someone fill out an application or answer questions before getting on a call pre-sells them. They invest effort. They articulate their problem and their desire. By the time they talk to you, they've already half-convinced themselves to buy."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-064"
        title: "Skip Ads, Win with Engagement -- Unless You Have Budget"
        description: "If you don't have a serious ad budget, build organic engagement first. Get people commenting, sharing, and talking. Then use paid ads to amplify what's already working organically. Don't fight the algorithm -- feed it."
        domains: [facebook-ads, scaling]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FIL-FK-065"
        title: "Conversion Comes From Conviction"
        description: "The prospect must be absolutely convinced that (1) the problem is real and serious, (2) your solution works, (3) it will work for them specifically, and (4) now is the right time. Each conviction must be established before the next."
        domains: [conversion-tracking, irresistible-offers]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-066"
        title: "Daily Ad Account Monitoring Prevents Budget Waste"
        description: "Ad accounts drift. Winning ads become losing ads. Audiences get saturated. Bids shift. A daily 10-minute review of key metrics -- CPM, CTR, CPA, ROAS -- catches problems before they become expensive problems."
        domains: [campaign-troubleshooting, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FIL-FK-067"
        title: "Story Is the Universal Delivery Mechanism for Persuasion"
        description: "Whether it's an ad, an email, a sales page, or a webinar -- the most effective communication wraps its message in story. Story bypasses resistance, builds empathy, and makes the message memorable in a way that lists of benefits never can."
        domains: [copywriting, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FIL-FK-068"
        title: "The Market Doesn't Care About Your Product -- Only Their Problem"
        description: "Nobody wakes up wanting to buy a course or a service. They wake up with a problem they want solved. Lead with the problem, not the product. Make them feel understood before you make them an offer."
        domains: [marketing-philosophy, irresistible-offers]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FIL-FK-069"
        title: "A Rainmaker Certification Means Being Accountable to Results"
        description: "Getting certified as a Rainmaker means you are committed to being accountable for client results -- not just delivering services, but actually moving revenue metrics. The diagnosis is only valuable if the prescription works."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FIL-FK-070"
        title: "Best Known Beats Best Product"
        description: "The best known product is always gonna be the best product. It doesn't matter if yours is objectively better -- if nobody knows about it, the known competitor wins every time. Visibility is the game."
        domains: [branding]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-071"
        title: "Simplest Path Is Smartest Path"
        description: "99% of the time, the simplest path is the smartest one. Complexity is the enemy of execution. If you can explain your plan in one sentence, you probably have a good plan."
        domains: [marketing-strategy]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-072"
        title: "Model Success Directly"
        description: "If a fellow's got something you want, do what he did to get it. Don't reinvent. Study the competitors who are winning, deconstruct what they do, and adapt it with your own angle."
        domains: [competitive-intelligence]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-073"
        title: "Marketing Is Math and Creativity"
        description: "Marketing is just as much math as creativity. You need the creative to capture attention, but you need the math to know if it's actually working. One without the other is gambling."
        domains: [marketing-strategy]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-074"
        title: "Similar But Better to Same People"
        description: "Show similar but better to same people competition targets. If competitors are running ads to an audience, that audience is already primed to buy -- you just need to show them something slightly better."
        domains: [competitive-intelligence]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-075"
        title: "Content Is an Ad"
        description: "Content is an ad -- content and ads are interchangeable. Every piece of content you create should move someone closer to buying. If it doesn't serve that purpose, it's just noise."
        domains: [content-marketing]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-076"
        title: "Audiences Are the New Assets"
        description: "Audiences are the new assets -- retarget inexpensively. Building an audience of people who have consumed your content is like building a list you can advertise to for pennies compared to cold traffic."
        domains: [audience-building]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-077"
        title: "High Volume Non-Fancy Beats Low Volume Polished"
        description: "High volume non-fancy content beats low volume polished content. The algorithm rewards frequency. People connect with authenticity. A phone video posted daily outperforms a studio production posted monthly."
        domains: [content-marketing]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-078"
        title: "Affiliate Marketing Is Dangerous"
        description: "Affiliate marketing is dangerous -- you only get a little bit of the money. You're building someone else's business and their customer list. Own the product, own the customer, own the backend."
        domains: [business-models]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-079"
        title: "Phone Is the New Television"
        description: "Your prospect's phone is the equivalent of the television. They consume content on it all day. If you can show up in their feed consistently with valuable content, you become the show they watch."
        domains: [content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FIL-FK-080"
        title: "Overthinking Kills Execution"
        description: "The thing that'll mess you up is not doing this -- overthinking kills. Analysis paralysis is the biggest threat to progress. Just hit publish, run the ad, send the email. You can optimize later."
        domains: [execution]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FIL-FK-081"
        title: "Repeat Your Core Messages Relentlessly"
        description: "You'll say the same three things all the time -- audience won't tire of it. You're bored of your message long before they are. Most of your audience hasn't heard it yet. Repetition is how positioning works."
        domains: [content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FIL-FK-082"
        title: "Give Away Good Stuff to Create Demand"
        description: "The more good stuff you give away, the more they want. Generosity in content creates reciprocity and demonstrates competence. People think 'if the free stuff is this good, the paid stuff must be incredible.'"
        domains: [content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FIL-FK-083"
        title: "Non-Professional Content Outperforms Polished"
        description: "Non-professional off-the-cuff content works better than polished. People trust authenticity. A selfie video with genuine enthusiasm converts better than a scripted, edited production that feels corporate."
        domains: [content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FIL-FK-084"
        title: "Post-Webinar Follow-Up Is Where Real Money Is"
        description: "The real money is made in the post-webinar follow-up sequence. The webinar itself generates interest and urgency, but the majority of buyers need 3-7 follow-up touches before they actually complete the purchase."
        domains: [sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FIL-FK-085"
        title: "Simple Is Best -- 20 Years of Experience"
        description: "Simple is best. 20 years of experience. Simple every single time. The most effective sales pages, funnels, and campaigns are the ones that are dead simple to understand and execute."
        domains: [sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-086"
        title: "People Like to Buy Things"
        description: "People like to buy things. People go on vacation to go shopping. Buying is entertainment, identity expression, and emotional fulfillment. Stop feeling guilty about selling -- you're giving people something they enjoy doing."
        domains: [selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-087"
        title: "Culture Celebrates Consumption"
        description: "Our culture celebrates consumption as accomplishment. People buy premium products to signal status, identity, and achievement. Understanding this psychological driver makes selling easier and more ethical."
        domains: [selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-088"
        title: "Damaging Admission Creates Trust"
        description: "You can never go wrong by not bullshitting people -- damaging admission creates trust. Telling the truth about limitations, downsides, or who your product is NOT for makes everything else you say more believable."
        domains: [copywriting-philosophy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-089"
        title: "Repulsive to Wrong, Magnetic to Right"
        description: "The more repulsive to wrong people, the more magnetic to right people. Polarizing messaging filters out tire-kickers and attracts true believers. Being for everyone means being compelling to no one."
        domains: [copywriting-philosophy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-090"
        title: "Start With Most Expensive Offer"
        description: "Just as hard to sell cheap as expensive -- start with most expensive offer. The effort to sell a $500 product is nearly identical to selling a $5,000 product. Lead with premium, downsell if needed."
        domains: [offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-091"
        title: "Emotion Drives Every Decision"
        description: "Man does not ever operate on logic -- emotion drives every decision. People justify with logic after deciding emotionally. Your copy must trigger the feeling first, then provide the rational excuse to buy."
        domains: [selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-092"
        title: "People Buy Identity"
        description: "People buy things because they're buying a new identity. The purchase represents who they want to become. Sell the transformation, not the information. Sell the identity, not the product."
        domains: [selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-093"
        title: "Buyers Are Buyers -- Always Have More Offers"
        description: "Buyers are buyers -- always have upsell, bumps, another campaign. Someone who just bought is in a buying state. The best time to make another offer is immediately after the first purchase."
        domains: [monetization]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-094"
        title: "Want Buyers Not Subscribers"
        description: "I don't want subscribers, I want buyers -- can't cash subscribers. A list of buyers is 10x more valuable than a list of freebie seekers. Optimize for purchase, not opt-in."
        domains: [customer-acquisition]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-095"
        title: "Get to the Point and Make an Offer"
        description: "90% of my stuff gets to the damn point and makes an offer. Don't dance around it. Don't hide the sell behind layers of content. People know you're selling something -- respect their intelligence and time."
        domains: [copywriting-philosophy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-096"
        title: "Obvious Stuff Makes More Money"
        description: "Every year the more glaringly obvious stuff I do, the more money I make. The sophisticated, clever strategies rarely outperform the simple, obvious ones. Stop trying to be clever. Be clear."
        domains: [business-philosophy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-097"
        title: "Copy Is an Asset"
        description: "Copy is an asset -- a single letter that works produces revenue forever. Good sales copy, once written and proven, can run for years generating revenue. Treat copy creation as building an asset, not a task."
        domains: [copywriting-philosophy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FIL-FK-098"
        title: "Obligation to Help Through Selling"
        description: "Whatever you have helps people -- don't squander the ability to help. If your product genuinely improves lives, NOT selling it aggressively is selfish. You have a moral obligation to get it in front of people."
        domains: [selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-099"
        title: "Email's Only Job Is the Click"
        description: "The whole job of the email is just to get them to click the link. Don't try to sell in the email. Don't overexplain. Create curiosity, make a compelling case to click, and let the sales page do the selling."
        domains: [email-marketing]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-100"
        title: "Always Be Selling Something"
        description: "We always have to be selling -- selling something or selling their time. Every touchpoint either moves toward a purchase or earns the right to the next touchpoint. There is no neutral ground in marketing."
        domains: [selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FIL-FK-101"
        title: "Content Ads Are Foundation of Omnipresence"
        description: "Content ads are foundation of omnipresence -- type-in traffic spikes correlate with spend. When you run content-based ads at scale, people start searching for you by name. The ad spend drives organic discovery."
        domains: [youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-102"
        title: "Unqualified Viewers Should Skip"
        description: "If they don't watch your ad, you don't pay -- WANT unqualified to skip. A YouTube ad that only the right people watch is a free filtering mechanism. Make the first 5 seconds repel the wrong audience."
        domains: [youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-103"
        title: "Perfection Kills Production"
        description: "Perfection kills production -- ugly ads that run beat beautiful ads that don't exist. The ad you published today is infinitely more valuable than the perfect ad you'll publish next month. Ship it."
        domains: [content-creation]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-104"
        title: "Mail Twice a Day"
        description: "People don't click because distracted, not because uninterested -- mail twice a day. If someone didn't open your morning email, it's not because they hate you. Send again. Different subject line, different time."
        domains: [email-marketing]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "FIL-FK-105"
        title: "Market Based on Behavioral Indication"
        description: "Actions speak louder -- market to people based on behavioral indication. What someone does (clicks, visits, watches) tells you more than what they say. Build your automation around actions, not demographics."
        domains: [behavioral-marketing]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "FIL-FK-106"
        title: "Every Gear Has One Job"
        description: "Every gear has one job -- email gets click, sales page sells. Don't ask any component of your funnel to do more than its one job. When each piece does its one thing well, the whole machine works."
        domains: [campaign-architecture]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "FIL-FK-107"
        title: "Don't Care If List Gets Mad"
        description: "Lost my ability to care if list gets mad -- 7 billion people, they can unsubscribe. If someone is offended by your selling, they were never going to buy. The people who stay are the ones who matter."
        domains: [email-marketing]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-108"
        title: "Capital Multiplication Business"
        description: "All we're in is capital multiplication business -- dollar in, more than dollar out. Strip away the branding, the creativity, the mission. At its core, advertising is putting in a dollar and getting more than a dollar back."
        domains: [advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-109"
        title: "30-Day ROI Not 24-Hour ROI"
        description: "Look at 30-day ROI not 24-hour ROI. Most people kill winning campaigns because they look at day-one data. A customer acquired today might buy three more times in 30 days. Be patient with the math."
        domains: [advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-110"
        title: "Dollar In vs Dollar Out Over Vanity Metrics"
        description: "Go try to cash that conversion rate -- focus on dollar in vs dollar out. Click-through rates, open rates, conversion rates are means to an end. The only metric that pays your bills is revenue per dollar spent."
        domains: [advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-111"
        title: "Facebook Campaigns Decay and Rebuild"
        description: "Never met anyone where Facebook campaign worked forever -- it decays, you rebuild. Accept that creative fatigue, audience saturation, and algorithm changes will kill every campaign. Build the muscle of rebuilding."
        domains: [paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-112"
        title: "Information Business Never Loses Value"
        description: "Information business is never going to lose its value -- zero concern. People will always pay to solve problems faster. The delivery mechanism changes but the demand for transformation is permanent."
        domains: [info-business]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FIL-FK-113"
        title: "Radical Transparency in Advertising"
        description: "Radical transparency -- tell people it's an ad, trust breeds confidence breeds sales. When you openly say 'this is an ad and here's why you should watch it,' you disarm skepticism and build immediate credibility."
        domains: [ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FIL-FK-114"
        title: "Ads Should Actually Help People"
        description: "Always try to make ads actually help people -- demonstrate by helping. The best ads deliver genuine value before asking for anything. When the ad itself is useful, the product becomes irresistible."
        domains: [ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FIL-FK-115"
        title: "Data Over Opinions on Ads"
        description: "Everything's about data -- opinions and emotions on whether ad should work are irrelevant. You think the ad is ugly? Doesn't matter. You think the hook is weak? Doesn't matter. Run it. Let the data decide."
        domains: [ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FIL-FK-116"
        title: "Remove Emotion From Capital Multiplication"
        description: "We are in capital multiplication business -- remove all emotion, it becomes easier. When you stop being emotionally attached to your ads, your offers, your creative, you make better decisions faster."
        domains: [ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "FIL-FK-117"
        title: "Facebook Is Smarter Than You"
        description: "Facebook is smarter than me -- let the machine do its job. Stop over-managing campaigns. Broad targeting with good creative and a proven offer lets Facebook's algorithm find your buyers better than you can."
        domains: [paid-media]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FIL-FK-118"
        title: "Don't Overthink Ads"
        description: "Don't overthink it -- hey, fuck it, let's see what happens. The best performing ads often come from throwing something against the wall. Deliberation kills momentum. Launch, measure, adjust."
        domains: [ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "FIL-FK-119"
        title: "Psychological Capability to Withstand Unpleasantry"
        description: "What hurts us is wanting results immediately -- need psychological capability to withstand unpleasantry. Advertising requires patience. Campaigns need time to optimize. If you panic at day-three data, you'll kill winners."
        domains: [paid-media]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FIL-FK-120"
        title: "Long Haul Mentality"
        description: "I'm in this for the long haul -- help them, they buy, keep doing good job. Short-term tactics burn audiences. Long-term value creation builds empires. Every interaction should strengthen the relationship."
        domains: [ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 1"


  L2_MENTAL_MODELS:
      - id: "MM-FK-001"
        title: "SANDOR Model"
        description: "Six-step consulting model: S=Stated Objective, A=Assets, N=Numbers, D=Diagnosis, O=One-Step, R=Review & Repeat. Always start by getting the specific target, then inventory assets, then get numbers, then diagnose, then prescribe ONE thing, then review and repeat."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-002"
        title: "Three Phases of Business Growth"
        description: "Phase 1: Find low hanging fruit (get immediate revenue from existing traffic/leads). Phase 2: Systemize what's working (make it evergreen and automated). Phase 3: Ads and scale (only AFTER phases 1-2 are dialed in)."
        domains: [business-growth, marketing-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-003"
        title: "Three Asset Categories"
        description: "Every business has three categories of assets: HUMAN (customer lists, audiences, JV relationships, staff), TRANSACTIONAL (traffic, sales processes, funnels, campaigns, ads), and SELLABLE (existing products/services + create-able products/services)."
        domains: [asset-analysis, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-004"
        title: "Behavioral Indication of Interest"
        description: "Everything in email marketing starts with behavioral indication of interest. Someone clicks, watches, registers, attends -- that's the trigger. You only send deadline sequences to people who have behaviorally indicated they're interested."
        domains: [email-marketing, conversion-psychology]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-005"
        title: "Only Two Types of Email Sequences"
        description: "There are really only two types of email sequences in the world: Click Sequences (get them to click a link) and Countdown/Deadline Sequences (create urgency to buy). Everything else is a variation of these two."
        domains: [email-marketing, sales-process]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-006"
        title: "Sales Process Categories"
        description: "Four main business categories, each with typical sales processes: Information (courses, coaching), Services (consulting, agencies), E-commerce (physical products), and Retail (brick and mortar). Each has its own unique steps that can be maximized."
        domains: [sales-process, business-types]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-007"
        title: "G.O.O. -- Glaringly Obvious Observations"
        description: "After getting all the data and running through the checklist, look for Glaringly Obvious Observations. These are the things that jump out as clearly broken or missing. The one thing to fix is almost always glaringly obvious once you have the data."
        domains: [diagnostics, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-008"
        title: "Escape and Arrival Framework"
        description: "For product creation: identify where the customer IS (escape) and where they want to BE (arrival). Map every milestone between those two points. Each milestone can become a standalone product. Apply the same framework within each milestone for detailed content creation."
        domains: [product-creation, content-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-009"
        title: "Click Sequence to Deadline Sequence Flow"
        description: "The holy grail of email marketing: Click Sequence (sell the CLICK, not the thing) → if they click → Deadline/Countdown Sequence (create urgency to buy). If they don't click → next Click Sequence for different offer."
        domains: [email-marketing, sales-process]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-010"
        title: "Super System as Contingency Architecture"
        description: "A super system is built on contingencies. What if they don't click? What if they see the pitch but don't buy? What if they register but don't attend? For every exit point in a sales process, there's a contingency that routes them to the next offer."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-011"
        title: "Information Marketing Models"
        description: "Five info marketing models: Event-Based Ascension (preview → bootcamp → main thing), Continuity-Based Ascension (loss leader → membership levels), Product Suite (multiple products, no cross-promotion), One Main Thing (single offer), Product-Based Ascension (loss leader → bumps → upsells → backend)."
        domains: [business-models, information-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-012"
        title: "Three Behavioral Stages"
        description: "Everything in a super system is based on three behavioral stages: Did they CLICK? Did they SEE THE PITCH? Did they ABANDON THE CART? These three checkpoints drive all automation decisions."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-013"
        title: "Reverse Engineering Revenue"
        description: "Find the top 3 revenue months of the past 12 months. For each: What products were selling? What ads/promos were running? This reveals what worked and what to repeat. The answer is almost always 'run that again.'"
        domains: [revenue-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MM-FK-014"
        title: "Content Sequence + Call Me Sequence Synergy"
        description: "For high-ticket: run Content Sequences (click sequences driving to educational videos with CTA to book call) simultaneously with Call Me Sequences (3 emails: 'hey, call me if you want X'). Anyone who clicks content enters Call Me. Neither removes them from the other until they book."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-015"
        title: "Super System Four-Level Architecture"
        description: "For webinar-based super systems: Level 1 checks 'been through campaign?' Level 2 checks 'registered?' Level 3 checks 'attended?' Level 4 checks 'saw pitch?' Each level re-routes non-completers back to the appropriate campaign."
        domains: [super-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-016"
        title: "Tag Everything Model"
        description: "What powers a super system is tags. Tag every behavioral stage: registered, attended, saw pitch, bought, didn't buy, clicked, didn't click. The super system reads tags to determine what to send next. Remove-then-reapply tags to restart automations."
        domains: [marketing-automation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-017"
        title: "Loss Leader Customer Acquisition"
        description: "The real purpose of loss leader products, order bumps, and OTOs is to acquire a customer at breakeven or better. Then every dime of the backend 'main thing' is profit. The dream: selling loss leader at a profit because of upsells."
        domains: [customer-acquisition, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-018"
        title: "Rearranging Building Blocks for New Offers"
        description: "You don't need new products to create multiple offers. Rearrange existing products: give the book free when they buy the bump, give OTO1 free when they buy the book, give OTO2 free when they buy OTO1. Same products, different combinations, different sales pages."
        domains: [offer-creation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MM-FK-019"
        title: "Facebook Campaign Structure: Campaign-AdSet-Ad"
        description: "Facebook's three-tier structure: Campaign (objective -- traffic, conversions, awareness), Ad Set (audience, budget, placement, schedule), Ad (creative -- image/video, copy, CTA). Each level controls different variables. Testing must happen at the right level."
        domains: [facebook-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-020"
        title: "Cold-Warm-Hot Traffic Segmentation"
        description: "Cold traffic: never heard of you (needs education and trust). Warm traffic: knows you but hasn't bought (needs proof and urgency). Hot traffic: past buyers (needs new offer and relationship). Each segment needs a different message, offer, and funnel."
        domains: [audience-targeting, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-021"
        title: "Bid Strategy Decision Matrix"
        description: "Lowest Cost: maximize volume when learning. Cost Cap: maintain CPA efficiency as you scale. Bid Cap: maximum control in stable, proven campaigns. Start with Lowest Cost to gather data, shift to Cost Cap when profitable, use Bid Cap to protect margins at scale."
        domains: [bid-strategies, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-022"
        title: "Ad Automation Rules"
        description: "Set automated rules to manage your account without manual intervention: pause ad sets when CPA exceeds threshold, increase budget when ROAS exceeds target, turn off ads when frequency exceeds 3.0. These rules protect the account while you sleep."
        domains: [ad-automation, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-023"
        title: "YouTube Ad Format Decision Tree"
        description: "TrueView In-Stream (skippable after 5s): best for awareness and retargeting with long-form story. TrueView Discovery (appears in search/recommendations): best for capturing intent. Non-skippable bumpers (6s): best for brand recall in retargeting. Match format to funnel stage."
        domains: [youtube-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-024"
        title: "Offer Stack Architecture"
        description: "Stack elements before revealing price: Main offer value → Bonus 1 value → Bonus 2 value → Bonus 3 value → Total value = $X,XXX. Then reveal actual price = $XXX. The ratio of stacked value to price determines perceived deal quality. Aim for 10:1 ratio minimum."
        domains: [irresistible-offers, pricing-psychology]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MM-FK-025"
        title: "Client Acquisition Funnel for Consulting"
        description: "Lead magnet → Email sequence → Application/VSL → Phone call → Offer. Each stage qualifies prospects further. By the time they're on the phone, they've already self-selected as interested and somewhat qualified. The funnel does the pre-selling."
        domains: [client-acquisition, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-026"
        title: "Video Ad AIDA Structure"
        description: "Attention (first 5 seconds -- hook/pattern interrupt), Interest (problem amplification, why this matters), Desire (solution preview, transformation, social proof), Action (clear CTA with specific next step). Every effective video ad follows this sequence, compressed or expanded based on length."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-027"
        title: "Email Countdown Promotion Calendar"
        description: "Promotional calendar model: run a promotion every 30-45 days to each segment of your list. Each promotion has a real deadline. Between promotions, send content/value emails. The calendar ensures you're always making offers without burning the list."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MM-FK-028"
        title: "Conversion Rate Optimization Priority Stack"
        description: "Fix in this order: (1) Traffic quality (right audience), (2) Landing page conversion, (3) Order form conversion, (4) Upsell conversion, (5) Email follow-up conversion. Each layer multiplies the ones below it. Start at the top -- bad traffic makes everything else irrelevant."
        domains: [conversion-tracking, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MM-FK-029"
        title: "Scaling Decision Framework"
        description: "Before scaling: (1) Is CAC below LTV? (2) Is ROAS > 2x? (3) Is the funnel converting at baseline? (4) Do you have budget to sustain 2-4 week payback period? All four must be YES before increasing spend. One NO means fix that before scaling."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-030"
        title: "Retargeting Audience Hierarchy"
        description: "Warmest to coldest: (1) Cart abandoners, (2) Sales page visitors, (3) Video viewers 75%+, (4) Website visitors 30+ days, (5) Email list custom audience, (6) 1% lookalike of buyers, (7) 1% lookalike of leads. Run retargeting in this order before expanding to cold traffic."
        domains: [retargeting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-031"
        title: "Campaign Troubleshooting Decision Tree"
        description: "Is CPM too high? (audience too narrow or low quality score). Is CTR too low? (wrong audience or weak creative). Is landing page conversion low? (message mismatch or weak page). Is CPA too high? (any of the above). Isolate one variable at a time."
        domains: [campaign-troubleshooting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-032"
        title: "YouTube Targeting Layers"
        description: "Layer targeting for precision: Intent audiences (in-market segments from Google search behavior) + Affinity audiences (long-term interests) + Custom intent (specific keywords and URLs they search) + Retargeting (your own video viewers, website visitors). More layers = smaller but more qualified audience."
        domains: [youtube-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-033"
        title: "Irresistible Offer Components"
        description: "Core product + bonuses that remove remaining objections + guarantee that eliminates risk + urgency element (deadline) + scarcity (limited availability) + social proof (testimonials, case studies). All six components present = irresistible offer. Missing one = reduced conversion."
        domains: [irresistible-offers, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MM-FK-034"
        title: "Ad Creative Testing Matrix"
        description: "Test one variable at a time: (1) Hook/first 5 seconds, (2) Main offer angle, (3) CTA language, (4) Visual format (image vs video, static vs carousel). For each test, run minimum 1,000 impressions before evaluating. The winner becomes control; test next variable against it."
        domains: [facebook-ads, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MM-FK-035"
        title: "Funnel Metrics Master Dashboard"
        description: "9 core metrics to track daily: (1) Ad spend, (2) Leads generated, (3) Cost per lead, (4) Sales generated, (5) Cost per acquisition, (6) Average order value, (7) Revenue per lead, (8) ROAS, (9) Net profit after ad spend. These 9 numbers tell you everything about the health of your business."
        domains: [financial-metrics, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MM-FK-036"
        title: "Consultative Selling via Video Sequence"
        description: "For high-ticket consulting: 3-5 educational videos on separate pages, each addressing a key objection or building a key belief. Click sequence drives to each video. Call-to-action at end of each video = book a call. This pre-sells the prospect and positions you as the expert before the sales call."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-037"
        title: "Budget Allocation Model"
        description: "Ad budget allocation: 70% to proven winners (scale what works), 20% to testing new audiences/creative (find tomorrow's winners), 10% to experimental campaigns (long shots with high potential). Never put all budget into testing -- you need proven campaigns running."
        domains: [scaling, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-038"
        title: "Countdown Promotion Types"
        description: "Four types of deadline-driven promotions: (1) Price-based (discount expires), (2) Bonus-based (bonus removed at deadline), (3) Access-based (enrollment closes), (4) Quantity-based (limited spots/units). Each creates legitimate urgency. Stack types for maximum impact."
        domains: [countdown-promotions, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MM-FK-039"
        title: "The Breakeven Funnel Model"
        description: "Design your frontend funnel to break even on ad spend through upsells and order bumps. If loss leader + bump + OTO1 + OTO2 = ad cost, then every backend sale is pure profit. This lets you scale ad spend aggressively because each new customer costs you nothing."
        domains: [loss-leader-funnels, scaling]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MM-FK-040"
        title: "Application Qualification Model"
        description: "For consulting/high-ticket: application asks 5-7 questions: current revenue, goal revenue, biggest obstacle, timeline, investment capacity, what they've tried. Answers pre-qualify and pre-sell. Only schedule calls with qualified applicants. Rejection of non-qualified is a feature, not a bug."
        domains: [client-acquisition, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-041"
        title: "Video Production Minimum Viable Setup"
        description: "iPhone with good lighting (ring light or window) + lapel mic ($30-50) + Teleprompter app = professional-looking video. Environment: clean background, good lighting on face, audio with no echo. This setup costs under $100 and outperforms studio setups with bad scripts."
        domains: [video-production, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MM-FK-042"
        title: "Email Engagement Re-Activation Model"
        description: "Identify disengaged subscribers (no opens in 90 days). Run re-engagement sequence: 3 emails with compelling reason to click. If no engagement after 3 emails, run 9-word email. If still no response after 30 days, remove from main list or move to separate segment with reduced frequency."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MM-FK-043"
        title: "Scaling Safety Net Model"
        description: "When scaling ad spend: increase budget by 20-25% maximum per 48-hour period. Give the algorithm time to adjust. Monitor CPA and ROAS hourly for first 24 hours. If metrics deteriorate by more than 15%, roll back. This prevents catastrophic spend on broken campaigns."
        domains: [scaling, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MM-FK-044"
        title: "Proof Stack Model"
        description: "Layer proof elements to overcome skepticism: (1) Testimonials from similar people, (2) Case studies with specific numbers, (3) Before/after transformations, (4) Third-party validation (press, certifications), (5) Your own story. Each proof layer addresses a different type of skeptic."
        domains: [irresistible-offers, copywriting]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MM-FK-045"
        title: "Consulting Delivery Model"
        description: "Rainmaker consulting delivery: Month 1 = deep diagnosis + prescribe one thing. Month 2 = implement the one thing + measure. Month 3 = review results + prescribe next one thing. Repeat. Don't try to fix everything at once. The SANDOR model runs in a loop, each cycle improving one variable."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MM-FK-046"
        title: "Big Seven Metrics Model"
        description: "Seven key metrics that determine business health: (1) Cost Per Lead, (2) Cost Per Acquisition, (3) Average Order Value, (4) Revenue Per Lead, (5) Lifetime Value, (6) Conversion Rate, (7) Return on Ad Spend. Monitor all seven simultaneously -- optimizing one while ignoring others creates blind spots."
        domains: [financial-metrics, diagnostics]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "MM-FK-047"
        title: "Two Big Questions Model"
        description: "Every business decision comes down to two questions: (1) How much does it cost to get a customer? (2) How much is that customer worth? If the answer to #2 is bigger than #1, you have a business. Everything else is commentary."
        domains: [financial-metrics, business-strategy]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "MM-FK-048"
        title: "Vortex Content Model"
        description: "Content creates a vortex that pulls people toward purchase. Each piece of content is a touchpoint that increases familiarity, trust, and desire. The vortex effect means more content = lower cost per acquisition over time because warm audiences convert cheaper."
        domains: [content-marketing, audience-building]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "MM-FK-049"
        title: "Traffic Arbitrage Model"
        description: "All advertising is traffic arbitrage -- you buy attention in one place and convert it into revenue in another. The spread between cost of attention and value of conversion is your profit margin. Find platforms where attention is underpriced relative to buyer intent."
        domains: [paid-advertising, advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "MM-FK-050"
        title: "Phone-as-TV Mental Model"
        description: "The prospect's phone functions exactly like television did in the 1990s. It's the primary screen, the primary entertainment device, and the primary information source. Content strategy should treat social feeds as TV channels where you are the programming."
        domains: [content-marketing, audience-building]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-051"
        title: "80/20 Competitive Intelligence"
        description: "80% of competitive intelligence value comes from studying just 3-5 top competitors. Identify who is spending the most on ads (they've done the testing for you), deconstruct their funnels, and adapt the winning elements. Don't reinvent -- reverse-engineer."
        domains: [competitive-intelligence, marketing-strategy]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "MM-FK-052"
        title: "Three Pillars Content Model"
        description: "All effective content falls into three pillars: (1) Teach something useful, (2) Share a relevant story, (3) Make a direct offer. Rotate between these three. Each one builds a different aspect of the relationship -- competence, connection, and commerce."
        domains: [content-marketing, content-creation]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-053"
        title: "Yeah-Buts and What-Ifs Model"
        description: "Prospects have two categories of resistance: Yeah-Buts (objections to the offer itself) and What-Ifs (fears about the outcome). Yeah-Buts are logical -- address with proof. What-Ifs are emotional -- address with stories and guarantees. Handle both or lose the sale."
        domains: [selling-psychology, copywriting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-054"
        title: "Story Wrapper Model"
        description: "Every piece of selling content works better wrapped in a story. The story is the delivery vehicle for the lesson, proof, or offer. Without the story wrapper, it's just a lecture. With it, it's entertainment that sells."
        domains: [content-marketing, copywriting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-055"
        title: "IBB Content Structure"
        description: "IBB = Intro-Body-Bridge. Intro hooks attention (pattern interrupt or bold claim). Body delivers value (teach, story, or proof). Bridge transitions to offer (call to action). Every piece of content -- post, video, email -- follows this three-part structure."
        domains: [content-creation, copywriting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-056"
        title: "Episodic Advertising Model"
        description: "Treat your advertising like a TV series, not a movie. Each ad is an episode that builds on the last. Viewers who see multiple episodes develop stronger connection and higher purchase intent. Sequential exposure beats repetitive exposure."
        domains: [youtube-advertising, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-057"
        title: "Google Beginning and End Model"
        description: "Google owns both the beginning and end of the purchase journey. YouTube is where people discover (beginning) and Google Search is where they validate and buy (end). Advertising on both creates a closed loop where you influence the entire decision process."
        domains: [youtube-advertising, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MM-FK-058"
        title: "Filtration Copy Model"
        description: "Great copy acts as a filter, not a net. A net tries to catch everyone. A filter only lets the right people through. Intentionally repelling the wrong prospects makes the sales process smoother and the customers better. Dog whistle copy speaks to your people and nobody else."
        domains: [copywriting, audience-targeting]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MM-FK-059"
        title: "Assembly Line Copy Model"
        description: "Long-form copy works like an assembly line. Each section has one job: headline gets attention, lead creates interest, proof builds belief, offer creates desire, close triggers action, guarantee removes risk. If any station breaks down, the whole line stops."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MM-FK-060"
        title: "Double Tap Campaign Model"
        description: "Double Tap = make the same offer twice through different mechanisms. First touch through content/webinar (value-based), second touch through direct sales copy (urgency-based). Different people respond to different approaches. Running both simultaneously captures more buyers."
        domains: [campaign-architecture, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MM-FK-061"
        title: "Open Loop Psychology"
        description: "The human brain craves closure on incomplete patterns. An open loop -- a story started but not finished, a question raised but not answered -- creates psychological tension that keeps people reading, watching, and clicking. Every email, every ad should open a loop."
        domains: [copywriting, email-marketing]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MM-FK-062"
        title: "Identity Shift Selling"
        description: "People don't buy products -- they buy identity upgrades. The purchase is a vote for who they want to become. Frame the offer not as 'this product does X' but as 'this is who you become when you have this.' The identity shift is the real product."
        domains: [selling-psychology, offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-063"
        title: "Dog Whistle Copy Model"
        description: "Dog whistle copy uses language, references, and insider terms that only your ideal prospect understands. Like a dog whistle that only dogs can hear, it speaks directly to your target while being invisible to everyone else. This creates instant rapport with qualified prospects."
        domains: [copywriting, audience-targeting]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MM-FK-064"
        title: "Nuclear Bomb in a Gunfight"
        description: "When your offer is so strong it's like bringing a nuclear bomb to a gunfight. The offer overwhelms all objections. Stack so much value, proof, and guarantee that saying no becomes irrational. Don't compete -- dominate with offer strength."
        domains: [offer-strategy, irresistible-offers]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-065"
        title: "Bribe to Trial Model"
        description: "Don't try to sell the whole thing upfront -- bribe them to try. Loss leaders, free trials, low-ticket front-ends all serve the same purpose: get the customer to experience your world at low risk. Once they're in, the backend sells itself."
        domains: [loss-leader-funnels, customer-acquisition]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-066"
        title: "Solve the Problem the Purchase Creates"
        description: "Every purchase creates a new problem. Buying a course creates the problem of implementation. Buying coaching creates the problem of accountability. Build your next offer around solving the problem that your current offer creates. This is how you build a natural product ladder."
        domains: [offer-strategy, monetization]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-067"
        title: "Mr. Nice Guy Sale Model"
        description: "The Mr. Nice Guy Sale: be genuinely helpful, provide massive value, then casually mention the offer. No pressure, no urgency tricks, no scarcity manipulation. 'Hey, I helped you for free, here's the thing I sell if you want it.' Works especially well with warm audiences."
        domains: [selling-psychology, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-068"
        title: "Greased Chute Model"
        description: "A greased chute is a buying process with zero friction. From ad to landing page to order form to upsell, every step flows seamlessly into the next. No unnecessary steps, no confusing navigation, no friction. The prospect slides from interest to purchase without resistance."
        domains: [sales-funnels, conversion-tracking]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-069"
        title: "Two Categories of Buyers"
        description: "There are two categories of buyers: impulse buyers (respond to urgency and emotion) and deliberate buyers (respond to logic and proof). Your funnel needs both pathways -- immediate buy option for impulse buyers, and nurture sequence for deliberate buyers."
        domains: [selling-psychology, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-070"
        title: "Blue Ocean Brick and Mortar"
        description: "Brick-and-mortar businesses are a blue ocean for digital marketing consultants. Most local businesses are doing zero or terrible digital marketing. The bar is so low that basic competence looks like genius. The opportunity is enormous and competition is minimal."
        domains: [consulting-methodology, competitive-intelligence]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MM-FK-071"
        title: "Redneck Analytics Model"
        description: "Redneck Analytics = simple, no-BS tracking that any business owner can understand. Forget complex attribution models. Track three things: (1) How much did you spend? (2) How much did you make? (3) What's the difference? If the difference is positive, do more. If negative, fix or stop."
        domains: [financial-metrics, advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MM-FK-072"
        title: "22-Day Buying Cycle"
        description: "Most buyers need approximately 22 days from first exposure to purchase decision. This means judging campaign performance in 3-7 days is premature. Build your reporting windows to account for the full buying cycle. Short-term data kills long-term winners."
        domains: [advertising-economics, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MM-FK-073"
        title: "Two-Type YouTube Ad Model"
        description: "Two types of YouTube ads work: (1) Direct response ads that drive immediate action (click, opt-in, buy), and (2) Content ads that build brand and audience for retargeting later. Run both. Direct response for immediate ROI, content for long-term audience building."
        domains: [youtube-advertising, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MM-FK-074"
        title: "IBB Ecosystem Model"
        description: "The IBB (Intro-Body-Bridge) structure is not just for individual content pieces -- it's an ecosystem. Your social posts are IBBs, your emails are IBBs, your ads are IBBs, your sales pages are IBBs. The same three-part structure scales from a tweet to a VSL."
        domains: [content-creation, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MM-FK-075"
        title: "Diagnostic Funnel Model"
        description: "A diagnostic funnel qualifies and segments prospects before presenting an offer. Instead of one-size-fits-all, ask 3-5 qualifying questions upfront, then route to the appropriate offer. Higher conversion because the offer matches the prospect's specific situation."
        domains: [sales-funnels, diagnostics]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "MM-FK-076"
        title: "Sequential Campaign as TV Series"
        description: "Run sequential ad campaigns like TV series episodes. Episode 1 introduces the problem, Episode 2 shares a story, Episode 3 presents the solution, Episode 4 makes the offer. Only show Episode 2 to people who watched Episode 1. This builds narrative and commitment."
        domains: [campaign-architecture, youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "MM-FK-077"
        title: "Click-Countdown Dual-Phase Model"
        description: "Phase 1 (Click): content and ads designed purely to drive clicks and build engaged audiences. Phase 2 (Countdown): deadline-driven sequences that convert the engaged audience into buyers. Separate the two phases -- mixing them dilutes both."
        domains: [campaign-architecture, email-marketing]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "MM-FK-078"
        title: "Good Ad Checklist Model"
        description: "A good ad passes four tests: (1) Does it stop the scroll in 3 seconds? (2) Does it clearly identify who it's for? (3) Does it deliver a single compelling message? (4) Does it have one clear call to action? If any test fails, fix it before scaling."
        domains: [ad-copywriting, content-creation]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "MM-FK-079"
        title: "Dog Whistle Ad Copy Model"
        description: "Dog whistle ads use specific language, scenarios, and references that only your ideal customer recognizes. Like saying 'if you've ever gotten a ROAS of 2x and wondered why you can't break 4x' -- only media buyers understand and engage. Everyone else scrolls past. Perfect filtering."
        domains: [ad-copywriting, audience-targeting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "MM-FK-080"
        title: "Machine Learning Leverage Model"
        description: "Facebook and YouTube algorithms learn from conversions. The more conversion data you feed them, the better they target. This creates a flywheel: more data = better targeting = more conversions = more data. Early campaigns subsidize machine learning. Don't optimize too early -- let the machine learn."
        domains: [paid-media, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "MM-FK-081"
        title: "Results in Advance Model"
        description: "Give results in advance -- deliver the transformation in the ad itself. If your product teaches email marketing, teach one email tactic in the ad. The prospect experiences a micro-result and thinks 'if the ad was this good, the product must be incredible.' This is the ultimate proof mechanism."
        domains: [ad-copywriting, content-marketing]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "MM-FK-082"
        title: "Restaurant Proximity Model"
        description: "Like a restaurant near a popular tourist spot, position your offer near existing demand. Don't create demand from scratch -- find where people are already looking for solutions and show up there. Retarget competitor audiences, target similar interests, ride existing trends."
        domains: [competitive-intelligence, audience-targeting]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "MM-FK-083"
        title: "Break-Even Front End Model"
        description: "Design your front-end offer to break even on ad spend. You're not trying to profit on the first sale -- you're trying to acquire customers for free. The profit comes from backend offers, upsells, and repeat purchases. This lets you outspend every competitor."
        domains: [loss-leader-funnels, advertising-economics]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "MM-FK-084"
        title: "Ocean Pockets Model"
        description: "Within any large audience (ocean), there are pockets of hyper-responsive people. Your job is to find these pockets through testing and then scale within them. Don't try to boil the ocean -- find the hot pockets where your message resonates strongest."
        domains: [audience-targeting, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "MM-FK-085"
        title: "Multiple Objective Retargeting"
        description: "Retargeting should serve multiple objectives simultaneously: (1) Remind of offer (standard retargeting), (2) Address specific objections (objection-handling ads), (3) Social proof (testimonial ads), (4) Urgency (deadline ads). Different people need different nudges to convert."
        domains: [retargeting, campaign-architecture]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "MM-FK-086"
        title: "Advertising as Consulting Model"
        description: "The best ads function like a free consulting session. They diagnose the prospect's problem, identify the root cause, and prescribe a solution -- which happens to be your product. The ad IS the sales process, compressed into 3-15 minutes."
        domains: [ad-copywriting, consulting-methodology]
        source_id: "FK-AMM"
        source_day: "Day 3"


  L3_HEURISTICS:
      - id: "HEUR-FK-001"
        title: "Deadline Sequence Last Day: 6 Emails"
        description: "On every day except the last day of a deadline sequence, send two emails before noon. On the last day, send SIX emails: 8AM, 10AM, 12PM, 9PM, 10PM, 11PM."
        domains: [email-marketing, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-002"
        title: "Click Sequence: 2 Emails/Day for 3 Days"
        description: "Click sequence structure: send two emails per day (8:30 AM and 11:30 AM) for three days. If they click, move to next stage. If they don't click after 3 days, move them to the next campaign."
        domains: [email-marketing, click-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-003"
        title: "48-Hour Wait Between Deadline Stacks"
        description: "Between each deadline sequence in a deadline stack, wait 48 hours before starting the next one. This gives prospects breathing room while keeping momentum."
        domains: [deadline-sequences, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-004"
        title: "Minimum 10% Order Form Conversion"
        description: "You should always have a minimum 10% on an order form. If your order form conversion is 2%, you've got a broken order form. Getting it from 2% to 10% would 5x the business."
        domains: [conversion-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-005"
        title: "Under 20% Opt-In Rate Needs Fixing"
        description: "Anything under 20% on an opt-in page conversion rate needs to be fixed."
        domains: [conversion-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-006"
        title: "Three One-Click Upsells Is Ideal"
        description: "Ideally, I like to see three one-click upsells in any loss leader funnel."
        domains: [loss-leader-funnels, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-007"
        title: "5% Conversion from Cold Traffic Is Good for Book Funnels"
        description: "My book funnel page typically converts around 5% from cold traffic, generally speaking. That's a good benchmark for loss leader sales pages."
        domains: [conversion-optimization, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-008"
        title: "80% of the Time Prospects Aren't Ready to Buy"
        description: "Roughly 80% of the time, a person is NOT open to making a purchase. The idea of deadline stacking is to have more coverage to hit them in the 20% when they ARE ready."
        domains: [buyer-psychology, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-009"
        title: "Sweet Spot Clients: $500K-$5M Revenue"
        description: "The sweet spot clients to work with are between half a million and five million and up in revenue. They have enough data, assets, and systems to make the diagnostic process work."
        domains: [consulting-methodology, client-selection]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-010"
        title: "Click Sequence Sells the CLICK, Not the Thing"
        description: "The click sequence sells the CLICK more than it sells the THING. Super important. You're not trying to close the sale in the email -- you're trying to get them to click. The selling happens on the page."
        domains: [email-marketing, copywriting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-011"
        title: "E-Com Low Hanging Fruit: Order Bump + OTO + Cart Abandon Sequence"
        description: "For e-commerce clients, the three most impactful first moves are always: (1) add order bump, (2) add one-click upsell, (3) add deadline sequence to cart abandoners. 99.99% of e-com stores don't do these basic things."
        domains: [ecommerce, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-012"
        title: "Exit Intent Pop-Ups on OTO Pages Increase Conversions"
        description: "Put an exit intent pop-up on every one-click upsell page. When someone goes to leave, the pop says 'Wait, let me get straight to the point -- you can have this right now for this price.' It increases conversions."
        domains: [conversion-optimization, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-013"
        title: "Two-Step Order Form Is Mandatory"
        description: "Always use a two-step order form. Step 1: name, email, phone. Step 2: payment. The reason: many people abandon the cart, and with step 1 data, you can follow up with them."
        domains: [conversion-optimization, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-014"
        title: "One Email Can Generate $27K"
        description: "Real client example: one email to e-com list generated 50% open rate, 31% click rate, 4.4% order rate, $27,000 in revenue. They never sent a second email. Always send more than one email."
        domains: [email-marketing, ecommerce]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-015"
        title: "3 Emails = $600K (Private Client Group Example)"
        description: "Three emails promoting private client group in January generated $600,000 in revenue. The prescription: send those three emails again. It's that simple."
        domains: [email-marketing, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-016"
        title: "Deadline Stack Triple: Price + Bonus + Payment Plan"
        description: "Deadline stack pattern: Deadline 1 = price/bonus deadline. Deadline 2 = original bonus + NEW second bonus added. Deadline 3 = both bonuses + payment plan added. Each with real deadlines using separate web pages."
        domains: [deadline-sequences, offer-creation]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-017"
        title: "40% Self-Schedule Rate Is the Max"
        description: "The overwhelming majority of people do NOT self-schedule. Maybe 40% will, after all that email. Even though they SAY they wanted it and SAY they can afford it. The number one fix: have someone pick up the phone and call them."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-018"
        title: "Deadline Stack Tripled Sales"
        description: "Deadline stacking tripled the sales of the original Intent Based Branding class. This structure works because most prospects zone out on deadline 1, and may start paying attention at deadline 2 or 3."
        domains: [deadline-sequences, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-019"
        title: "Taking Action Beats Perfect Email Sequences"
        description: "Taking action and getting stuff out is going to be a MUCH bigger factor in performance vs. having the 'perfect email sequence' -- it doesn't exist."
        domains: [email-marketing, entrepreneurship]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-020"
        title: "Use Different Web Pages for Each Deadline"
        description: "Create a different web page for each deadline in a stack. The previous page really does expire. Same video, different copy mentioning the new bonus. Use deadline funnel software to enforce real expiration."
        domains: [deadline-sequences, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-021"
        title: "Nine-Word Email for Re-Engagement"
        description: "After all other sequences fail, send a 9-word email from a team member: 'Are you still interested in getting [X]?' Short, personal, gets replies."
        domains: [email-marketing, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-022"
        title: "E-Com Stores Net ~10% of Revenue"
        description: "You could have someone doing $10 million a year in an e-com business and they might be netting 10% of that. Totally different margin game than info products and services."
        domains: [ecommerce, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-023"
        title: "$2.81 Revenue Per Email Sent Is Excellent"
        description: "If your first email in a post-opt-in sequence generates $2.81 per email sent, that's excellent. Plus the ad campaigns got 11-to-1 ROI. Turn those campaigns back on."
        domains: [email-marketing, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-024"
        title: "Upsell Products: $30-$500 Range"
        description: "Upsell products for info businesses are usually between $30 and $500, although not gospel -- can go to $1,000+. They're usually multimedia, cover milestones on escape/arrival framework, and always mission-specific."
        domains: [product-creation, pricing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-025"
        title: "Webinar Itself Isn't What Gets Sales"
        description: "In almost every single circumstance, the webinar itself isn't the thing that actually gets the sales. The webinar gets someone to behaviorally indicate they're interested in buying. The real money is in what happens when you follow up."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-026"
        title: "Facebook Ad Frequency Above 3.0 = Creative Fatigue"
        description: "When frequency (average times each person saw your ad) exceeds 3.0, performance typically drops significantly. At that point either refresh the creative or pause that ad set. Frequency is the leading indicator of ad fatigue."
        domains: [facebook-ads, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-027"
        title: "Scale Budget 20-25% Every 48 Hours"
        description: "Never double or triple a Facebook budget overnight. Increase by 20-25% every 48 hours. Larger jumps force the algorithm to re-enter the learning phase, resetting your hard-won optimization and typically spiking CPAs."
        domains: [scaling, bid-strategies]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-028"
        title: "CTR Benchmark: 1%+ for Cold Traffic Facebook Ads"
        description: "A link click-through rate of 1% or higher on cold traffic Facebook ads is generally a sign of healthy creative and audience match. Below 0.5% is a clear signal to test new creative or different audience targeting."
        domains: [facebook-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-029"
        title: "YouTube View Rate Benchmark: 30%+ for Relevant Audience"
        description: "A 30-second view rate (or view-through rate for skippable ads) of 30% or higher indicates a good match between creative and audience. Below 20% means the hook isn't working for that audience -- test a new opening 5 seconds."
        domains: [youtube-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-030"
        title: "Test Minimum $50/Day Per Ad Set for Statistical Significance"
        description: "Spend at least $50/day per ad set before making optimization decisions. Below that threshold, the data isn't statistically meaningful. Wait for at least 50 conversions before comparing ad sets."
        domains: [facebook-ads, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-031"
        title: "Email Open Rate Below 15% = Deliverability Problem"
        description: "If your list-wide open rate drops below 15%, you likely have a deliverability issue -- too many emails going to spam or promotions folder. Clean your list, reduce send frequency, and warm up your sending reputation before any promotional campaign."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-032"
        title: "ROAS of 2x Is Break-Even, 3x Is Profitable, 4x+ Is Scale"
        description: "Return on ad spend benchmarks for most businesses: 2x ROAS = breaking even (revenue covers cost of goods + ads). 3x ROAS = profitable after all costs. 4x+ ROAS = strong signal to scale budget. These are rough benchmarks -- your margin structure determines your actual thresholds."
        domains: [paid-advertising, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-033"
        title: "Video Ad Sweet Spot: 60-90 Seconds for Warm Traffic, 15-30 Seconds for Cold"
        description: "Cold traffic ads should be short -- hook + problem + CTA in under 30 seconds. Warm traffic (retargeting) can handle longer ads -- 60-90 seconds allows for more story, proof, and offer detail. Match video length to audience temperature."
        domains: [ad-scripting, retargeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-034"
        title: "Lookalike Audience Size 1-3% for Best Performance"
        description: "1% lookalike audiences (most similar to your source) consistently outperform 3-10% lookalikes for conversion campaigns. Use 1% for conversions, 3-5% for reach/traffic campaigns when you need more volume."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-035"
        title: "Retargeting Budget: 20% of Total Ad Spend"
        description: "Allocate roughly 20% of total ad budget to retargeting campaigns. Retargeting consistently delivers 3-5x lower CPA than cold traffic. Underspending on retargeting means leaving your hottest prospects to be taken by competitors."
        domains: [retargeting, scaling]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-036"
        title: "Cart Abandonment Sequence: 3 Emails Within 24 Hours"
        description: "Cart abandonment sequence timing: Email 1 = 1 hour after abandonment (reminder). Email 2 = 6 hours after abandonment (address objection). Email 3 = 24 hours after abandonment (deadline + bonus). Over 50% of cart abandonment revenue comes from email 3."
        domains: [ecommerce, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-037"
        title: "Order Bump Conversion Rate: 15-30% of Buyers"
        description: "A well-crafted order bump (one-click add-on shown on order form) should convert 15-30% of buyers. Below 10% means the bump offer isn't compelling or relevant enough. Above 30% means you might want to test making it the main offer."
        domains: [loss-leader-funnels, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-038"
        title: "High-Ticket Application Show Rate: 70%+ Is Healthy"
        description: "Of people who schedule a call, 70% or more should show up. Below 60% means your pre-call sequence isn't building enough excitement or the qualification isn't tight enough. Strong pre-call content raises show rates to 80-90%."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-039"
        title: "Facebook Learning Phase Requires 50 Conversions in 7 Days"
        description: "Facebook's algorithm needs 50 optimization events (purchases, leads, etc.) within 7 days to exit the learning phase. During learning phase, performance is unstable -- don't make optimization decisions. Budget and audience changes reset the learning phase."
        domains: [facebook-ads, bid-strategies]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-040"
        title: "Webinar Show-Up Rate: 20-30% of Registrants Is Normal"
        description: "Expect 20-30% of webinar registrants to actually attend live. Below 15% means your go-attend sequence isn't working or the topic/headline isn't compelling enough. The follow-up sequence to non-attenders is where you recover the other 70-80%."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-041"
        title: "Email Subject Line: Under 50 Characters for Mobile"
        description: "Keep email subject lines under 50 characters for mobile preview. On desktop, 60-70 characters is fine. Test curiosity-based vs benefit-based subject lines. The open rate tells you which approach your list responds to."
        domains: [email-marketing, copywriting]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-042"
        title: "Ad Copy: First Line Must Stop the Scroll"
        description: "The first line of Facebook ad copy (visible before 'See more') is the most important. It must stop the scroll. Use a bold claim, a provocative question, a surprising statistic, or a pattern-interrupting statement. Test 3-5 different first lines before optimizing creative."
        domains: [facebook-ads, copywriting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-043"
        title: "Cost Per Lead Benchmark: 3-10x of Lead Magnet Price"
        description: "If you're giving away a free lead magnet, a healthy CPL is $3-$10 for consumer markets, $15-$50 for B2B. If CPL exceeds the revenue per lead average of your funnel, you're losing money before any sales are made."
        domains: [paid-advertising, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-044"
        title: "Consulting Retainer Fee: 10-15% of Upside Created"
        description: "Price consulting at 10-15% of the annual upside you're creating. If you're taking someone from $1M to $1.5M, that's $500K upside, so $50-75K/year is a no-brainer for them. Never price on hours or deliverables -- price on results."
        domains: [consulting-methodology, pricing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "HEUR-FK-045"
        title: "Video Production: Reshoot If More Than 3 Takes"
        description: "If you're struggling to record a clean take after 3 attempts, stop and rewrite the script. A painful recording session signals the script is the problem, not your delivery. Rewrite the section that's causing the stumbles."
        domains: [video-production, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-046"
        title: "Offer Testing: Run 2 Weeks Before Judging"
        description: "Don't judge a new offer or campaign after 3-5 days. Most campaigns need 10-14 days and meaningful spend ($500-1000 minimum) before the data is directionally reliable. Premature judgment kills good campaigns and protects bad ones."
        domains: [data-driven-decisions, campaign-troubleshooting]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-047"
        title: "YouTube CPV (Cost Per View) Benchmark: Under $0.05"
        description: "A cost per view under $0.05 on YouTube TrueView ads indicates good audience-to-creative match. Above $0.10 means either the audience is too competitive or the hook isn't compelling enough to watch past 30 seconds."
        domains: [youtube-ads, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-048"
        title: "Promotional Email List: Send at Least Monthly"
        description: "Any list you haven't emailed in 90+ days is effectively dead. Sending a promotional email to a cold list causes deliverability issues and low response. Warm up cold lists with 2-3 value emails before any promotional sequence."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-049"
        title: "Sales Page Conversion: 1-3% from Cold Traffic Is Viable"
        description: "A long-form sales page converting at 1-3% from cold traffic is a viable business. Below 0.5% means either the traffic is wrong or the page needs significant work. Above 5% from cold traffic is exceptional and means you should be scaling immediately."
        domains: [conversion-optimization, paid-advertising]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "HEUR-FK-050"
        title: "Upsell Take Rate: 20-40% for Relevant One-Click Upsell"
        description: "A relevant, well-priced one-click upsell should convert 20-40% of buyers. If take rate is below 15%, the upsell is either priced wrong, poorly positioned, or not relevant enough to the original purchase."
        domains: [loss-leader-funnels, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-051"
        title: "Ad Account Health: Keep Campaigns Under 5 Active at Once"
        description: "Running more than 5-7 active campaigns simultaneously dilutes your ability to monitor and optimize each one. Focus on your best 3-5 campaigns. Kill the bottom performers and use that budget to scale the winners."
        domains: [campaign-troubleshooting, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-052"
        title: "Pre-Launch Warm-Up: 7-10 Days of Value Content Before Offer"
        description: "Before any major launch or promotional campaign, run 7-10 days of pure value content (no ask). This warms up the audience, increases open rates, and conditions them to engage with your emails before you make the big ask."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-053"
        title: "Client Results: Measure at 30, 60, 90 Days"
        description: "Track client results at 30-day, 60-day, and 90-day intervals. This creates natural check-in points for the SANDOR Review & Repeat cycle and gives you enough time to see whether the prescription is working before changing it."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "HEUR-FK-054"
        title: "Facebook Broad Targeting Outperforms Interest Targeting for Large Budgets"
        description: "At budgets above $500/day, broad targeting (no interests, just age/gender/location) often outperforms interest-based targeting because Facebook's algorithm has enough conversion data to find buyers itself. Interest targeting is better for smaller budgets where the algorithm needs help."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-055"
        title: "Phone Follow-Up Converts 3-5x More Than Email for High-Ticket"
        description: "For offers above $3,000, adding a phone call to the follow-up process (calling people who applied or expressed interest) consistently converts 3-5x better than email alone. The phone is underutilized in digital marketing because it requires human effort."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-056"
        title: "Audience Size Minimum: 100,000 for Facebook Ad Testing"
        description: "Target audiences under 100,000 people are too small for Facebook's algorithm to optimize efficiently. The minimum viable audience size for campaign testing is 100,000 -- preferably 500,000+ for scalable campaigns."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-057"
        title: "Testimonial Specificity Multiplier"
        description: "Testimonials with specific results ('I made $47,312 in 11 days') outperform vague testimonials ('This was amazing, life-changing!') by 3-5x in conversion impact. Collect testimonials that contain specific numbers, timeframes, and before/after comparisons."
        domains: [copywriting, irresistible-offers]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "HEUR-FK-058"
        title: "Email Unsubscribe Rate: Below 0.3% Per Email Is Healthy"
        description: "An unsubscribe rate above 0.5% per email indicates list-message mismatch -- either you're emailing the wrong people or your content isn't relevant. Below 0.1% means you have an extremely engaged and aligned list."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-059"
        title: "Hook Testing: First 5 Seconds of Video Ad"
        description: "Test hooks (first 5 seconds) in isolation before testing anything else in a video ad. Create 3-5 different openings for the same underlying message. The hook that generates the best 3-second view rate wins. Then build the full ad around that hook."
        domains: [ad-scripting, youtube-ads]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-060"
        title: "Consulting Package Minimum: 3-Month Retainer"
        description: "Never sell consulting in one-month increments. Three months minimum gives you enough time to diagnose, implement, and measure results. One-month contracts mean clients leave before you've had a chance to prove value."
        domains: [consulting-methodology, pricing]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "HEUR-FK-061"
        title: "Webinar Registration to Attendance: Improve with Pre-Event Emails"
        description: "A minimum of 3 pre-event emails dramatically improves attendance: Confirmation + agenda (immediately), Reminder with value teaser (24 hours before), Final reminder with urgency (2 hours before). Each email should make attendees more excited about what they'll learn."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-062"
        title: "Facebook Pixel Must Be on Every Page"
        description: "The Facebook pixel must be installed on every page of your funnel -- not just the thank you page. This allows you to build retargeting audiences for each funnel stage, track micro-conversions, and give Facebook more data to optimize campaigns."
        domains: [facebook-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-063"
        title: "Organic Content: 80% Value, 20% Promotion"
        description: "For organic social media and email, maintain an 80/20 ratio: 80% pure value content, 20% promotional. Violate this ratio and engagement drops, unsubscribes increase, and your paid amplification of organic content will underperform."
        domains: [email-marketing, content-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "HEUR-FK-064"
        title: "Scaling Checkpoint: Profitable for 7 Consecutive Days Before Scaling"
        description: "Only scale a campaign after it has been consistently profitable for 7 consecutive days at current budget. A single profitable day is not a signal to scale. You need a trend, not a data point."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-065"
        title: "Guarantee Removes Risk and Increases Conversions"
        description: "A strong guarantee (30-day money back, results-based, or both) consistently increases conversions by 10-30%. The refund rate almost never exceeds the conversion lift. Risk reversal is one of the highest-ROI elements you can add to any offer."
        domains: [irresistible-offers, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "HEUR-FK-066"
        title: "YouTube Ads: 15-Second Non-Skippable for Retargeting"
        description: "15-second non-skippable bumper ads work best for retargeting people who've already seen your longer content. They're forced to watch all 15 seconds, making them ideal for deadline reminders, testimonials, and direct CTAs to warm audiences."
        domains: [youtube-ads, retargeting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "HEUR-FK-067"
        title: "Lead Quality Over Lead Quantity"
        description: "A $15 lead that converts at 3% is worth more than a $3 lead that converts at 0.5%. Always optimize for cost per acquisition, not cost per lead. More expensive leads from better-targeted audiences will always outperform cheap leads from broad audiences."
        domains: [paid-advertising, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "HEUR-FK-068"
        title: "Backend Offer Should Be 10x the Price of Frontend"
        description: "The backend main offer should be priced at roughly 10x the frontend loss leader price. $7 book → $97 course. $97 course → $997 coaching. This creates a natural ascension ladder where each step is a significant but justified price increase."
        domains: [pricing, customer-acquisition]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "HEUR-FK-069"
        title: "Application Qualification: 3 Questions Minimum"
        description: "High-ticket applications should ask at minimum: (1) What's your current revenue? (2) What's your goal? (3) Are you able to invest $X to get there? These three questions eliminate 80% of unqualified leads before they ever reach a sales call."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "HEUR-FK-070"
        title: "Daily Ad Spend Cap: Never More Than 30% of Weekly Budget in One Day"
        description: "Never allow a single day's ad spend to exceed 30% of your weekly budget. If a campaign accidentally spends 50% of weekly budget in one day, pause and investigate. Set spending caps at the campaign level to prevent runaway spend."
        domains: [facebook-ads, scaling]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "HEUR-FK-071"
        title: "Spy on Top 5 Competitors Weekly"
        description: "Check Facebook Ad Library and YouTube for your top 5 competitors every week. Note what ads they've been running longest (those are the winners). Adapt their winning angles for your audience. The ads that survive longest are proven profitable."
        domains: [competitive-intelligence, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-072"
        title: "Content Volume: Minimum 1 Piece Per Day"
        description: "Post at minimum one piece of content per day across platforms. Volume beats quality in the algorithm game. A mediocre daily post builds more audience than a brilliant weekly post. The algorithm rewards consistency above all else."
        domains: [content-marketing, content-creation]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-073"
        title: "Webinar Follow-Up: 7 Emails in 72 Hours"
        description: "After a webinar, send 7 follow-up emails over 72 hours. Include replay link, key takeaway, testimonial, FAQ, deadline reminder, last chance, and final close. The majority of webinar sales happen in the follow-up, not during the live event."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-074"
        title: "3-5 Content Themes Maximum"
        description: "Stick to 3-5 core content themes maximum. Rotating between too many topics confuses the algorithm and dilutes your authority. Pick your themes and hammer them relentlessly. Your audience will never tire of your core message."
        domains: [content-marketing, content-creation]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-075"
        title: "IBB Content Under 3 Minutes"
        description: "Keep IBB (Intro-Body-Bridge) content pieces under 3 minutes for social media. The intro should be 10-15 seconds, the body 1-2 minutes, and the bridge 15-30 seconds. Longer content performs on YouTube but social requires brevity."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-076"
        title: "Phone Video Over Studio Video"
        description: "Shoot content on your phone, not in a studio. Phone-quality video signals authenticity and relatability. Studio-quality signals corporate and triggers ad blindness. The lower production value, the more it looks like content instead of advertising."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-077"
        title: "Competitor Ad Library Check: Sort by Longest Running"
        description: "In Facebook Ad Library, sort competitor ads by longest running. Any ad running for 60+ days is profitable -- they wouldn't keep spending if it wasn't. These are the ads to study and adapt. Short-lived ads are failures -- ignore them."
        domains: [competitive-intelligence, facebook-ads]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-078"
        title: "Story Format: 80% Story, 20% Lesson"
        description: "In content and copy, use 80% story and 20% lesson/offer. The story does the heavy lifting of engagement and emotional connection. The lesson or offer at the end feels natural, not forced. Reverse the ratio and it feels like a lecture."
        domains: [content-marketing, copywriting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-079"
        title: "Retargeting Window: 180 Days"
        description: "Set retargeting windows to 180 days for content consumers. People who watched your videos or visited your site in the last 6 months are still warm enough to convert. The cost to retarget is so low that a wider window is almost always profitable."
        domains: [retargeting, audience-building]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-080"
        title: "First 5 Seconds: Pattern Interrupt or Die"
        description: "The first 5 seconds of any video content must pattern-interrupt. Say something unexpected, controversial, or intensely relevant. If you don't earn the first 5 seconds, you never get the next 5 minutes. Treat the opening like a headline."
        domains: [content-creation, youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-081"
        title: "Repurpose One Piece Into Five"
        description: "Every long-form content piece should be repurposed into at least 5 shorter pieces. A 30-minute YouTube video becomes 5 social clips, 3 quotes, 2 email topics, and 1 blog post. Create once, distribute everywhere."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-082"
        title: "Google Beginning End: Run YouTube and Search Together"
        description: "Always run YouTube ads and Google Search ads together. YouTube creates awareness (beginning of journey), Google Search captures intent (end of journey). Running only one leaves money on the table. The combination is more powerful than either alone."
        domains: [youtube-advertising, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-083"
        title: "Batch Content: 1 Hour = 1 Week of Posts"
        description: "Batch record content in one-hour sessions. In 60 minutes you can create 10-15 short videos covering your 3-5 core themes. That's 2-3 weeks of daily content from a single recording session. Batching eliminates the daily grind."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-084"
        title: "Email Click Rate Target: 15-25%"
        description: "Target 15-25% click rates on promotional emails. Below 15% means your subject lines or hooks are weak. Above 25% means your audience is highly engaged. If rates drop below 10%, your list is cold -- warm them up with value content before promoting again."
        domains: [email-marketing, financial-metrics]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-085"
        title: "Test Audience Before Creative: 5 Audiences Same Ad"
        description: "When launching a new campaign, test 5 different audiences with the exact same ad creative. The audience that performs best gets more budget. Only after finding the winning audience do you test new creative. Audience > creative in order of operations."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-086"
        title: "Content Engagement: Reply to Every Comment"
        description: "Reply to every comment on your content for the first 30 minutes after posting. This signals to the algorithm that the post is generating conversation, which triggers broader distribution. A 15-minute engagement window can 10x organic reach."
        domains: [content-marketing, audience-building]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-087"
        title: "Video Hook: Question or Shocking Statement"
        description: "Start every video with either a question or a shocking statement. Questions engage the brain's answer-seeking mechanism. Shocking statements trigger curiosity. Both prevent the scroll. Never start with 'Hey guys, welcome back to my channel.'"
        domains: [content-creation, youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-088"
        title: "Ad Spy: Screenshot and Categorize"
        description: "When spying on competitor ads, screenshot every ad and categorize by type: testimonial, story, direct offer, educational, curiosity-driven. After 50 screenshots, you'll see patterns. The most common categories are what's working in the market right now."
        domains: [competitive-intelligence, ad-copywriting]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-089"
        title: "Affiliate Warning: Never More Than 20% of Revenue"
        description: "If affiliate revenue exceeds 20% of your total revenue, you're dangerously dependent on someone else's product and audience. Own your products. Own your customers. Affiliating is a supplementary strategy, never a primary one."
        domains: [business-models, revenue-optimization]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-090"
        title: "Content Conversion: CTA in Every Third Post"
        description: "Include a clear call-to-action in every third content piece. Two value posts, one CTA post. This ratio keeps your audience engaged without feeling constantly sold to. The CTA post should still provide value -- just with a clear next step."
        domains: [content-marketing, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-091"
        title: "YouTube Ad: First 5 Seconds Qualify the Viewer"
        description: "In the first 5 seconds of a YouTube ad, clearly identify who this ad is for. 'If you're a business owner spending at least $5K/month on ads...' Qualified viewers keep watching. Unqualified viewers skip. You don't pay for skips."
        domains: [youtube-advertising, audience-targeting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "HEUR-FK-092"
        title: "Competitive Funnel Map: Screenshot Every Step"
        description: "When researching competitors, click their ads and screenshot every step of the funnel: landing page, opt-in, thank you page, email sequence (subscribe to their list), sales page, order form. Map the entire journey. This is your free R&D."
        domains: [competitive-intelligence, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "HEUR-FK-093"
        title: "Sales Page: Damaging Admission in First 500 Words"
        description: "Include a damaging admission in the first 500 words of any sales page. Admit a limitation, a failure, or a 'who this is NOT for' statement early. This builds trust faster than any testimonial because people expect you to only say positive things."
        domains: [copywriting-philosophy, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-094"
        title: "Copy Length: Long Copy Outsells Short Copy for Cold Traffic"
        description: "For cold traffic, long copy always outsells short copy. Cold prospects need more proof, more story, more overcoming of objections. For warm/hot traffic, shorter copy works because trust is already established. Match copy length to audience temperature."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-095"
        title: "VSL Length: 45-90 Minutes for High Ticket"
        description: "For high-ticket offers ($997+), VSLs should be 45-90 minutes. Shorter VSLs don't build enough belief for premium pricing. The length isn't about padding -- every minute must advance the sale. If you can't fill 45 minutes with valuable content, your offer isn't developed enough."
        domains: [sales-process-design, copywriting]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-096"
        title: "Billion Dollar VSL: 12 Sections in Order"
        description: "The Billion Dollar VSL structure has 12 sections in exact order: (1) Pattern Interrupt, (2) Core Promise, (3) Credibility, (4) Problem Identification, (5) Agitate, (6) Solution Introduction, (7) Benefits/Bullets, (8) Proof Stack, (9) Offer Stack, (10) Price Anchor, (11) Guarantee, (12) Close with Urgency. Don't rearrange."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-097"
        title: "Price Anchor: Show 10x Value Before Reveal"
        description: "Before revealing your price, stack value that's at least 10x the asking price. If you're charging $997, stack $10,000+ in value. The gap between perceived value and actual price makes the decision feel like a no-brainer. Never reveal price before the stack."
        domains: [pricing-psychology, offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-098"
        title: "Guarantee: Risk Reversal Must Be Specific"
        description: "A generic 'money-back guarantee' is weak. A specific guarantee is powerful: '30-day guarantee: if you don't generate at least 10 qualified leads using this system, I'll refund every penny AND let you keep the course.' Specificity makes the guarantee believable."
        domains: [offer-strategy, irresistible-offers]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-099"
        title: "Proof Stack: Minimum 5 Different Types"
        description: "Include at minimum 5 different types of proof in every sales page: (1) Your own results, (2) Client testimonials, (3) Case studies with numbers, (4) Screenshots/evidence, (5) Third-party endorsements. Different people are persuaded by different proof types."
        domains: [copywriting, irresistible-offers]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-100"
        title: "Sales Letter Headline: Write 25, Pick Best"
        description: "Write at minimum 25 headline variations before picking the one for your sales page. The headline is the single most important element -- it determines whether anyone reads the rest. Spend more time on the headline than on any other section."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-101"
        title: "Double Tap Timing: Content First, Direct Sales 48 Hours Later"
        description: "In a Double Tap campaign, run the content/value-based promotion first. Wait 48 hours, then hit the same audience with the direct sales pitch. The content warms them up. The direct pitch closes them. Reversing the order kills both."
        domains: [campaign-architecture, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "HEUR-FK-102"
        title: "Upsell Pages: 60 Seconds or Less"
        description: "One-time offer and upsell pages should take 60 seconds or less to consume. The buyer is already in a buying state -- don't kill momentum with a 30-minute VSL. Quick headline, 3 bullets, price, yes/no button. Speed preserves buying momentum."
        domains: [sales-funnels, monetization]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-103"
        title: "Bump Offer: Always on Order Form, Related to Main Offer"
        description: "Always include an order form bump. It should cost 30-50% of the main offer price and be directly related to the main purchase. Example: main offer is a course ($997), bump is implementation templates ($297). Bump acceptance rate target: 30-40%."
        domains: [monetization, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-104"
        title: "Upsell Sequence: Maximum 2 Upsells After Purchase"
        description: "Never present more than 2 upsell offers after initial purchase. More than that creates frustration and buyer's remorse. First upsell should complement the purchase. Second upsell should be premium/VIP. Stop there."
        domains: [monetization, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-105"
        title: "Email Subject Lines: 4-7 Words Maximum"
        description: "Keep email subject lines to 4-7 words. Short subject lines get higher open rates because they look like personal emails, not marketing. 'Quick question for you' outperforms 'The Ultimate Guide to Scaling Your Business with Facebook Ads' every time."
        domains: [email-marketing, copywriting]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-106"
        title: "Selling Emotion: Lead with Transformation, Not Features"
        description: "Never lead with features or deliverables. Lead with the emotional transformation: 'Imagine waking up knowing exactly where your next 10 clients are coming from.' THEN explain the features. Emotion opens the door, logic walks through it."
        domains: [selling-psychology, copywriting]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-107"
        title: "Identity Sell: Use 'You Are' Statements"
        description: "Use 'you are' statements in copy to trigger identity selling. 'You're the type of person who...' or 'People like you don't settle for...' These statements activate self-concept and make the purchase feel like self-expression rather than a transaction."
        domains: [selling-psychology, copywriting]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-108"
        title: "Buying State: Offer Within 15 Minutes of Value"
        description: "After delivering value (content, webinar, training), make an offer within 15 minutes. The buying state has a half-life. Every minute that passes between value delivery and offer presentation reduces conversion. Strike while the iron is hot."
        domains: [selling-psychology, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-109"
        title: "Downsell: Offer When They Say No to Main Offer"
        description: "Always have a downsell ready when someone declines the main offer. If they won't buy the $2,000 program, offer the $497 version. The downsell recovers 10-20% of lost sales. Never let a 'no' be the end of the conversation."
        domains: [monetization, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-110"
        title: "Order Form: Maximum 6 Fields"
        description: "Keep order forms to maximum 6 fields: name, email, phone (optional), card number, expiry, CVC. Every additional field reduces conversion by 5-10%. If you need more info, collect it AFTER the purchase, not before."
        domains: [conversion-tracking, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-111"
        title: "Email Deadline Stack: 5 Days Maximum"
        description: "Deadline stacks should run for maximum 5 days. Day 1: introduction. Day 2: social proof. Day 3: FAQ/objections. Day 4: urgency. Day 5: last chance (6 emails on final day). Longer than 5 days loses urgency. Shorter doesn't build enough momentum."
        domains: [email-marketing, deadline-sequences]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-112"
        title: "High Ticket Close: Never Sell Price, Sell Gap"
        description: "When selling high-ticket, never defend the price. Instead, sell the gap between where they are and where they want to be. 'You're at $100K/month and want to be at $200K/month. That's a $1.2M annual gap. My program costs $15K. Is $15K worth $1.2M?' The gap makes any price seem small."
        domains: [high-ticket-sales, selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-113"
        title: "Mr. Nice Guy Close: Assume the Sale"
        description: "In the Mr. Nice Guy selling style, don't ask for the sale -- assume it. After delivering value: 'So here's what I've got for you, and here's the link.' No pressure, no closing technique, no urgency manipulation. Just a natural transition from helping to offering."
        domains: [sales-process-design, selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-114"
        title: "Greased Chute: Maximum 3 Clicks from Ad to Purchase"
        description: "The path from ad click to purchase complete should be maximum 3 clicks: (1) Ad click to landing page, (2) Landing page to order form, (3) Order form submit. Every additional click loses 20-30% of prospects. Fewer steps = more sales."
        domains: [sales-funnels, conversion-tracking]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-115"
        title: "Buyer Email: Different Sequence Than Non-Buyer"
        description: "Immediately segment buyers from non-buyers in email. Buyers get ascension sequences (upsell, cross-sell, premium offers). Non-buyers get nurture sequences (value, proof, re-offer). Sending the same emails to both is the most common email mistake."
        domains: [email-marketing, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "HEUR-FK-116"
        title: "4DCM: Daily Content Machine"
        description: "The 4DCM (4-Day Content Machine) workflow: Day 1 batch record 12-15 content pieces. Day 2 edit and caption. Day 3-4 schedule across all platforms. Then repeat. This creates a perpetual content engine that runs on 2 recording sessions per month."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-117"
        title: "YouTube Ad Budget: Start at $50/day Per Campaign"
        description: "Start YouTube ad campaigns at $50/day. Below that, the algorithm doesn't get enough data to optimize. Above that too early, you waste money before finding winners. Once a campaign is profitable at $50/day, scale by 20% every 3 days."
        domains: [youtube-advertising, scaling]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-118"
        title: "Content Ad View Rate: 25%+ Is Good"
        description: "For YouTube content ads (awareness/audience building), a 25%+ view rate indicates the content resonates. Below 25%, the opening is too weak or the audience targeting is off. Above 40% is exceptional and worth scaling aggressively."
        domains: [youtube-advertising, financial-metrics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-119"
        title: "Omnipresence Budget: 20% of Ad Spend"
        description: "Allocate 20% of total ad spend to omnipresence (content) campaigns. These don't drive direct conversions but build the audience and brand that makes direct response campaigns cheaper. It's the tax you pay for lower future acquisition costs."
        domains: [youtube-advertising, advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-120"
        title: "Facebook Campaign Rebuild: Every 4-6 Weeks"
        description: "Plan to rebuild Facebook campaigns every 4-6 weeks. Creative fatigues, audiences saturate, algorithms shift. Rather than fighting decay, accept it and build the muscle of launching fresh campaigns. The best media buyers are the fastest rebuilders."
        domains: [facebook-ads, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-121"
        title: "Email Twice a Day During Promotions"
        description: "During active promotions, email twice a day -- morning and evening. People miss emails because they're distracted, not because they're annoyed. The morning email catches morning checkers. The evening email catches scrollers. Different audiences, same list."
        domains: [email-marketing, deadline-sequences]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "HEUR-FK-122"
        title: "Behavioral Trigger: Click = Intent"
        description: "Anyone who clicks a link in an email has demonstrated intent. Immediately tag them and move them to an accelerated follow-up sequence. Clickers convert at 5-10x the rate of non-clickers. Treat every click as a raised hand."
        domains: [behavioral-marketing, email-marketing]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "HEUR-FK-123"
        title: "Super System Check: 30-Day Campaign Rotation"
        description: "Review your super system every 30 days. Check which campaigns are running, which have expired, and which need refreshing. A stale super system slowly dies. Fresh campaigns injected monthly keep the system producing."
        domains: [super-systems, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "HEUR-FK-124"
        title: "Retargeting Ladder: 3 Tiers by Engagement"
        description: "Build retargeting in 3 tiers: Tier 1 (hottest) = visited sales page or started checkout. Tier 2 (warm) = watched 50%+ of content. Tier 3 (cool) = any website visitor or content engagement. Spend most on Tier 1, least on Tier 3."
        domains: [retargeting, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "HEUR-FK-125"
        title: "Diagnostic Email: Ask One Question"
        description: "Periodically send a diagnostic email that asks one question: 'What's your biggest challenge with [topic]?' The responses give you content ideas, copy angles, and product ideas directly from your market. Plus, replies boost deliverability."
        domains: [email-marketing, diagnostics]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "HEUR-FK-126"
        title: "Campaign Kill Rule: 3x CPA Target = Pause"
        description: "If any campaign reaches 3x your CPA target without a conversion, pause it immediately. Don't let hope burn budget. 3x target with zero conversions means the audience, creative, or offer isn't working. Diagnose before restarting."
        domains: [paid-advertising, campaign-troubleshooting]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-127"
        title: "Landing Page Test: Above the Fold Only"
        description: "When testing landing pages, only change elements above the fold first. Headline, subheadline, hero image, and CTA button drive 80% of the conversion decision. Below-the-fold changes have minimal impact until above-the-fold is optimized."
        domains: [conversion-tracking, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-128"
        title: "YouTube Thumbnail: Face + Text + Bright Color"
        description: "YouTube thumbnails that perform best have three elements: (1) A close-up face showing emotion, (2) Large text (4-6 words max), (3) A bright contrasting background color. Test 3 thumbnails per video and let YouTube optimize."
        domains: [youtube-advertising, content-creation]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-129"
        title: "ROAS Calculation: Include All Backend Revenue"
        description: "When calculating ROAS, include all revenue from a customer within 30-60 days -- not just the initial purchase. A campaign that looks like 1.5x ROAS on day one often becomes 4-5x ROAS when you include upsells, bumps, and repeat purchases."
        domains: [advertising-economics, financial-metrics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-130"
        title: "Scale Rule: 20% Budget Increase Every 3 Days"
        description: "Scale winning campaigns by increasing budget 20% every 3 days. Larger jumps shock the algorithm and break performance. Smaller jumps are too slow. 20% every 3 days lets the algorithm adjust while maintaining momentum."
        domains: [scaling, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-131"
        title: "New Creative Every 2 Weeks"
        description: "Introduce new ad creative every 2 weeks to combat fatigue. You don't need to replace everything -- add 2-3 new variations while keeping top performers running. Fresh creative injected regularly keeps CPMs stable and engagement high."
        domains: [content-creation, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-132"
        title: "Email Revenue Target: 30-40% of Total"
        description: "Email should generate 30-40% of total revenue. If it's below 30%, you're under-mailing or your sequences are weak. If it's above 50%, you're too dependent on email and vulnerable to deliverability issues. The sweet spot is 30-40%."
        domains: [email-marketing, revenue-optimization]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "HEUR-FK-133"
        title: "Sequential Ads: Minimum 3 Episodes"
        description: "Sequential ad campaigns need minimum 3 episodes to be effective. Episode 1: awareness (problem/story). Episode 2: education (solution/proof). Episode 3: offer (CTA/urgency). Fewer than 3 doesn't build enough narrative momentum."
        domains: [campaign-architecture, youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "HEUR-FK-134"
        title: "Webinar Registration Cost: Under $8 or Optimize"
        description: "Target webinar registration cost under $8. Between $8-15 is acceptable if your webinar converts well. Above $15, optimize your ads or landing page before scaling. The registration cost sets the ceiling for your entire webinar funnel economics."
        domains: [webinar-sales, advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "HEUR-FK-135"
        title: "Show Rate: 25-35% Is Normal"
        description: "Webinar show rates of 25-35% are normal and healthy. Below 25%, your reminder sequence is weak. Above 35% is exceptional. Send 3 reminders: day before, morning of, and 15 minutes before. Include one piece of value in each reminder to increase show rates."
        domains: [webinar-sales, email-marketing]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "HEUR-FK-136"
        title: "Type-In Traffic: Track Brand Search Volume"
        description: "Monitor Google Trends for your brand name. When you run content ads at scale, brand search volume should increase proportionally. This 'type-in traffic' is the highest-converting traffic source and validates that your content campaigns are building real awareness."
        domains: [youtube-advertising, financial-metrics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "HEUR-FK-137"
        title: "Dog Whistle Test: If Everyone Understands, Too Broad"
        description: "Test your dog whistle copy by showing it to someone outside your market. If they understand it easily, it's too broad. True dog whistle copy confuses outsiders and resonates deeply with insiders. The confusion of outsiders is the sign it's working."
        domains: [copywriting, ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-138"
        title: "Ad Budget: $100/Day Minimum to Learn"
        description: "Spend minimum $100/day on Facebook/YouTube to generate enough data for the algorithm to learn. Below $100/day, the machine doesn't get enough conversions to optimize. Think of the first $100/day as tuition, not investment."
        domains: [paid-media, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-139"
        title: "Results in Advance: 1 Tactical Win in the Ad"
        description: "Every ad should give the viewer one tactical win they can implement immediately -- without buying. This tactical win IS the ad's value. If they implement it and get results, they'll buy the product for more. Demonstrate competence by creating competence."
        domains: [ad-copywriting, content-marketing]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-140"
        title: "FAQ Bridge: Answer Objection in Ad"
        description: "Use the FAQ Bridge strategy: identify the top 3-5 objections prospects have and answer them directly in your ad. Each FAQ becomes a mini-section of the ad. This preemptively overcomes resistance before they ever reach the sales page."
        domains: [ad-copywriting, selling-psychology]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-141"
        title: "Ad Creative Test: 3 Hooks Same Body"
        description: "When testing ad creative, create 3 versions with different hooks but the same body and CTA. The hook is the highest-leverage variable. Once you find the winning hook, then test body variations. This isolates what's actually driving performance."
        domains: [ad-copywriting, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "HEUR-FK-142"
        title: "Broad Targeting First: Let Facebook Learn"
        description: "Start campaigns with broad targeting (age, gender, country only). Let Facebook's algorithm find your buyers. Over-constraining targeting limits the machine's ability to learn. Broad targeting with strong creative and a proven offer outperforms narrow targeting 7 out of 10 times."
        domains: [paid-media, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-143"
        title: "Ad Transparency: 'This Is an Ad' in First Line"
        description: "Start some ads with 'Hey, this is an ad.' Radical transparency disarms skepticism instantly. People appreciate honesty. The trust gained from transparency converts better than the attention lost from people who would have scrolled anyway."
        domains: [ad-copywriting, selling-psychology]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-144"
        title: "Video Ad Length: 3-7 Minutes for Direct Response"
        description: "Direct response video ads perform best at 3-7 minutes. Under 3 minutes doesn't build enough belief. Over 7 minutes loses attention. The sweet spot is enough time to hook, build belief, and make an offer without overstaying your welcome."
        domains: [ad-copywriting, youtube-advertising]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "HEUR-FK-145"
        title: "Retargeting: Different Ad for Each Objection"
        description: "Create separate retargeting ads for each major objection: price, timing, trust, skepticism. Serve the right objection-handling ad based on where the prospect dropped off. Cart abandoners get price-focused ads. Page visitors get trust-focused ads."
        domains: [retargeting, ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "HEUR-FK-146"
        title: "Break-Even Metric: Track 7-Day and 30-Day Separately"
        description: "Track break-even on ad spend at both 7-day and 30-day windows. 7-day tells you if the funnel's front end works. 30-day tells you if the business model works. A campaign can lose money at 7 days but be wildly profitable at 30 days thanks to backend."
        domains: [advertising-economics, financial-metrics]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "HEUR-FK-147"
        title: "Ad Image: Person Looking at CTA"
        description: "In image ads, have the person in the image looking toward the CTA button or the text. Eye direction guides the viewer's gaze. This subtle visual cue increases click-through rates by directing attention to where you want it."
        domains: [ad-copywriting, content-creation]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "HEUR-FK-148"
        title: "Automation Rule: If Profitable at $X, Auto-Scale to $2X"
        description: "Set up automated rules: if a campaign achieves target CPA for 3 consecutive days, automatically increase budget by 20%. If CPA exceeds 2x target for 2 consecutive days, automatically decrease by 30%. This removes emotion from scaling decisions."
        domains: [ad-automation, scaling]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "HEUR-FK-149"
        title: "Ocean Pockets: Test 10 Interests, Keep Top 3"
        description: "When prospecting for ocean pockets, test 10 different interest-based audiences simultaneously. After 72 hours, identify the top 3 by CPA. Kill the bottom 7 and reallocate budget to the winners. This rapid test-and-kill approach finds pockets fast."
        domains: [audience-targeting, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "HEUR-FK-150"
        title: "Copy Formula: PAS + Proof + Offer"
        description: "The simplest high-converting copy formula: Problem (identify their pain), Agitate (make it urgent), Solution (your product). Then add Proof (testimonials/results) and Offer (what they get + price + guarantee). This formula works for ads, emails, and sales pages."
        domains: [ad-copywriting, copywriting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "HEUR-FK-151"
        title: "Consulting Ad: Free Audit Offer Converts Best"
        description: "For consulting and agency services, 'free audit' or 'free diagnostic' ads consistently outperform all other ad types. The audit demonstrates expertise and creates a natural transition to paid services. It's the SANDOR model packaged as an ad."
        domains: [ad-copywriting, consulting-methodology]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "HEUR-FK-152"
        title: "Multiple Retargeting Objectives: Split Budget 40/30/30"
        description: "Split retargeting budget: 40% to direct offer retargeting, 30% to testimonial/social proof ads, 30% to objection-handling ads. This multi-objective approach addresses different stages of the decision process simultaneously."
        domains: [retargeting, campaign-architecture]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "HEUR-FK-153"
        title: "Ad Testing: Minimum $50 Per Variation Before Judging"
        description: "Spend minimum $50 on each ad variation before making any judgment. Below $50, you don't have statistically meaningful data. Kill nothing before it's had $50 of spend. After $50 with zero conversions, you have permission to pause."
        domains: [paid-media, ad-copywriting]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "HEUR-FK-154"
        title: "Ad as Mini-Consultation: Diagnose in the Ad"
        description: "Structure your ad like a mini-consultation: 'If you're experiencing [symptom], the likely cause is [diagnosis], and here's what to do about it [prescription]... and if you want help implementing, here's my program.' The ad IS the SANDOR model in 5 minutes."
        domains: [ad-copywriting, consulting-methodology]
        source_id: "FK-AMM"
        source_day: "Day 3"


  L4_FRAMEWORKS:
      - id: "FW-FK-001"
        title: "SANDOR Consulting Framework"
        description: "S=Stated Objective (get specific target with numbers), A=Assets (inventory all human, transactional, sellable assets), N=Numbers (conversion rates, revenue data), D=Diagnosis (find the one broken thing), O=One-Step (prescribe single highest-impact action), R=Review & Repeat."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-002"
        title: "Deadline Stack Framework"
        description: "Three sequential deadline sequences for the same product: (1) Price/discount + bonus, real deadline. Wait 48h. (2) Same price + original bonus + NEW bonus added, real deadline. Wait 48h. (3) Both bonuses + payment plan added, real deadline. Each uses separate web page. Deadlines really expire."
        domains: [deadline-sequences, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-003"
        title: "Click Sequence Email Framework"
        description: "7-element structure: (1) Subject line - get it opened, (2) First sentence - get it opened, (3) Image - get the click, (4) Early CTA - get the click, (5) Benefits list - sell the click, (6) Second CTA - sell the click, (7) Sign off + PS - re-sell the click. Sells the CLICK, not the product."
        domains: [email-marketing, copywriting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-004"
        title: "Countdown/Deadline Email Framework"
        description: "8-element structure: (1) Subject - open it, (2) First sentence - scarcity + click, (3) Image - click, (4) CTA - click, (5) Reveal bonus - fuel interest, (6) Benefits of bonus - sell click, (7) Second CTA - sell click, (8) PS - restate scarcity."
        domains: [email-marketing, copywriting, deadline-sequences]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-005"
        title: "Loss Leader Sales Process Diagnostic Checklist"
        description: "Component checklist: opt-in page? two-step order form? order bump? OTO 1-3? exit intent on OTOs? deadline to non-buyers? deadline to bump non-buyers? deadline to OTO non-buyers? retargeting? cart abandon sequence? Then get conversion rates for each component. End with G.O.O."
        domains: [diagnostics, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-006"
        title: "One-To-Many Sales Process Diagnostic Checklist"
        description: "Components: liquidator after registration? order bump on liquidator? OTOs? go-back sequence? go-finish sequence? two-step order form? deadline stack post-webinar? cart abandon deadline? Numbers: show up rate, saw-pitch rate, liquidator conversion, registration rate. G.O.O."
        domains: [diagnostics, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-007"
        title: "E-Commerce Sales Process Diagnostic Checklist"
        description: "Components: two-step order form? order bump? OTO? downsell? exit intent on OTO? deadline to bump/OTO non-buyers? retargeting? cart abandon sequence? Numbers: pre-sale CTR, sales page conversion, order form conversion, bump/OTO conversion rates. G.O.O."
        domains: [diagnostics, ecommerce]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-008"
        title: "Eight Figure Phone Funnel Checklist"
        description: "Components: reminder sequence, go-apply sequence, go-schedule sequence, 9-word email, pre-call sequence, closing stacks, post-call follow-up. Numbers: opt-in rate, lead-to-application, application-to-schedule, schedule-to-show-up, appointment-to-close, plus held/closed/pending/non-qual/vanished breakdown."
        domains: [phone-sales, diagnostics, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-009"
        title: "Escape and Arrival Product Creation Framework"
        description: "Step 1: Define escape situation and arrival situation. Step 2: Map every major milestone between them. Step 3: Take any ONE milestone and create a standalone product. Step 4: Within that milestone, do escape-arrival AGAIN for sub-steps. Each sub-step = 10-30 min video. Result: 1-2 hour course from one milestone."
        domains: [product-creation, content-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-010"
        title: "Asset Extraction Worksheet"
        description: "Three-column worksheet: HUMAN assets (email lists, audiences, staff), TRANSACTIONAL assets (traffic, funnels, campaigns), SELLABLE assets (products, services, create-able offerings). Plus bottom section: Top 3 revenue months → products sold → ads/promos that ran."
        domains: [consulting-methodology, asset-analysis]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-011"
        title: "Stated Objective Extraction Framework"
        description: "Three ways to ask: Dan Sullivan style ('If 8 weeks from today...'), Frank style ('What's your one big important target?'), Alternate ('What's our mission?'). Three common responses: 'more sales,' life story dump, problem vomit. Always dig to establish BASELINE + TARGET with actual numbers."
        domains: [consulting-methodology, goal-setting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-012"
        title: "Super System Architecture (Multi-Campaign)"
        description: "Take all existing campaigns/funnels and connect them sequentially via automation: Campaign 1 → exit → Campaign 2 → exit → Campaign 3... Each connection is: Click Sequence → Countdown Sequence (or Deadline Stack). Build over time, not all at once."
        domains: [super-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FW-FK-013"
        title: "Content + Call Me Sequence Framework"
        description: "Multiple content videos, each on its own web page with headline + video + book-call CTA. One email per content piece (click sequence). Anyone who clicks ANY content email simultaneously enters Call Me sequence (3 emails: 'call me if you want X'). Neither sequence removes them until they book."
        domains: [phone-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-014"
        title: "Super System from Basic Funnel (Mix and Match)"
        description: "Take basic loss leader funnel products (book, bump, OTO1, OTO2) and rearrange into 5+ offers: MO1=original, MO2=give bump free w/book, MO3=give OTO1 free w/book, MO4=give book+OTO1 free w/OTO2, MO5=give OTO2 free w/book. Each offer gets its own deadline sequence. 2-day waits between."
        domains: [super-systems, offer-creation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FW-FK-015"
        title: "Saw-Pitch-But-Didn't-Apply Process"
        description: "Multi-stage follow-up for high-ticket: Go Apply Sequence → Survey Sequence (application disguised as survey) → Go Schedule Sequence → 9-Word Email → Phone Outreach → Goodwill Content + Re-Pitch Click Sequences → Different Campaign. Tags at every stage."
        domains: [high-ticket-sales, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-016"
        title: "Webinar Super System Blueprint"
        description: "For each webinar: Ad/Email invite → Register? → Attend? → See Pitch? → Buy? At every 'No' exit: tag and route to super system. Post-pitch: triple deadline stack. After all deadlines: send to super system. Super system checks 4 levels across multiple webinars."
        domains: [super-systems, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "FW-FK-017"
        title: "Call Me Email Framework"
        description: "3 emails: Email 1='Hey, drop me a line if you want us to do X, Y, or Z for you.' Email 2='Do you have questions about [offer]? Choose a time here.' Email 3=Same as Email 1 rephrased. One email per day. Direct, no fluff, link to calendar."
        domains: [phone-sales, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-018"
        title: "Big Picture Numbers Framework"
        description: "9 metrics to get from any business: Monthly Visitors, Monthly Ad Spend, Monthly Gross Revenue, Monthly Net Revenue (after ad spend), Monthly New Customers, Monthly New Leads, Average Customer Value, Cost to Acquire Customer, Net Profit per Customer."
        domains: [diagnostics, financial-metrics]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-019"
        title: "Application That Looks Like a Survey"
        description: "After Go-Apply and Go-Schedule fail, send a 'survey' sequence using VideoAsk that asks the same qualification questions as an application but framed as 'help me send you the right stuff.' If they answer yes to 'do you want it?' and 'can you afford it?' → route to schedule page."
        domains: [high-ticket-sales, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "FW-FK-020"
        title: "Webinar Invite Email Framework"
        description: "Structure: (1) Subject - open it, (2) First sentence - announce webinar + click, (3) Official CTA - click, (4) Call to identity - pre-sell click, (5) This is for you if... - qualify, (6) Benefits list - fuel interest, (7) Register CTA, (8) PS - re-sell click with case studies."
        domains: [email-marketing, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-021"
        title: "Facebook Ad Campaign Architecture"
        description: "Campaign level: set objective (conversions for sales, traffic for cheaper leads testing). Ad Set level: define audience (one audience per ad set), budget ($50-100/day to start), placement (Facebook Feed primary), schedule. Ad level: creative (image/video), copy, headline, CTA, destination URL."
        domains: [facebook-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-022"
        title: "Ad Creative Testing Framework"
        description: "Phase 1: Test 5 different audiences with 1 proven creative. Phase 2: Take winning 2 audiences and test 3-5 creative variations. Phase 3: Scale winning audience + creative combination. Phase 4: Test new hooks for the winning creative while scaling. Never test audiences and creative simultaneously."
        domains: [facebook-ads, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-023"
        title: "Retargeting Sequence Framework"
        description: "Tier 1 (hottest): cart abandoners -- direct offer + deadline. Tier 2: sales page visitors who didn't add to cart -- testimonials + FAQ + offer. Tier 3: video viewers 75%+ -- social proof + offer. Tier 4: website visitors 30d -- top of funnel content + opt-in. Each tier gets different creative and budget."
        domains: [retargeting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-024"
        title: "YouTube TrueView Ad Script Framework"
        description: "HOOK (0-5 seconds): bold claim or provocative question. PROBLEM (5-30 seconds): agitate the pain they feel. STORY (30-60 seconds): your journey or a customer's journey. SOLUTION PREVIEW (60-90 seconds): tease the transformation. CTA (final 15 seconds): specific action, urgency, benefit of acting now."
        domains: [youtube-ads, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-025"
        title: "Irresistible Offer Construction Framework"
        description: "Step 1: Define core transformation (from → to). Step 2: List main deliverables that achieve transformation. Step 3: Add bonuses that remove top 3 objections. Step 4: Add guarantee that eliminates purchase risk. Step 5: Calculate real value of each element. Step 6: Stack total value. Step 7: Set price at 10-20% of stacked value."
        domains: [irresistible-offers, pricing]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-026"
        title: "Email Promotional Calendar Framework"
        description: "Month 1-2: Launch new offer with deadline stack. Month 3: Re-launch to non-buyers with new angle. Month 4: New offer launch. Month 5: Evergreen promotion from existing catalog. Month 6: Major promotion (annual sale, anniversary, etc.). Rotate through offer types. Never go 45+ days without a promotion."
        domains: [email-marketing, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-027"
        title: "Client Onboarding Diagnostic Framework"
        description: "Week 1: Get access (analytics, payment processor, email platform, ad accounts). Week 2: Pull all numbers and run SANDOR through A-N stages. Week 3: Present diagnosis with 3 possible prescriptions ranked by impact and ease. Week 4: Client chooses ONE prescription. Start implementation."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-028"
        title: "Scaling Decision Framework"
        description: "Before scaling: CAC below LTV? ROAS > 2x for 7 consecutive days? Funnel converting at or above benchmark? Cash flow to sustain 2-4 week payback? If all YES: increase budget 20-25%, monitor for 48 hours. If CPA holds, increase again. If CPA spikes 15%+, hold budget for 48 hours before adjusting."
        domains: [scaling, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FW-FK-029"
        title: "Competitor Research Framework for Ads"
        description: "Step 1: Use Facebook Ad Library to find competitor ads running 90+ days (they work). Step 2: Note: offer angle, creative format, copy structure, CTA. Step 3: Use SimilarWeb to understand their traffic sources. Step 4: Use YouTube to find their video ads. Step 5: Build your own version with a differentiated angle."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-030"
        title: "Campaign Troubleshooting Framework"
        description: "Step 1: Check CPM (is your audience quality score low?). Step 2: Check CTR (is your creative failing to generate interest?). Step 3: Check landing page conversion (is there a message mismatch?). Step 4: Check order form conversion (is there friction or trust issues?). Step 5: Check follow-up metrics. Fix the highest-upstream problem first."
        domains: [campaign-troubleshooting, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FW-FK-031"
        title: "Video Production Workflow"
        description: "Step 1: Write script following AIDA structure. Step 2: Practice 2-3 times without recording. Step 3: Set up: iPhone + ring light + lapel mic + teleprompter app. Step 4: Record 2-3 takes. Step 5: Choose best take. Step 6: Edit (cut dead air, add subtitles, add CTA graphic). Step 7: Export and upload."
        domains: [video-production, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-032"
        title: "Consulting Proposal Framework"
        description: "Section 1: Current situation (baseline numbers from diagnosis). Section 2: Desired outcome (stated objective with specific numbers). Section 3: Gap analysis (what's broken, what's missing). Section 4: Your prescription (ONE specific thing to fix). Section 5: Investment (fee = 10-15% of annual upside). Section 6: Guarantee (results-based or money-back)."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-033"
        title: "List Segmentation Framework"
        description: "Segment by: (1) Engagement level (active/inactive buyers by recency), (2) Product purchased (what they've already bought), (3) Behavioral stage (clicked X, attended Y, applied for Z), (4) Acquisition source (which funnel/ad they came from). Most profitable segments: recent buyers + high-ticket applicants."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-034"
        title: "Rainmaker Client Delivery Framework"
        description: "Month 1: Diagnosis (SANDOR Steps S, A, N, D). Month 2: Prescription + Implementation (SANDOR Step O). Month 3: Measurement + Review (SANDOR Step R). Month 4+: Repeat cycle, fix next highest-impact variable. Deliverables per month: 1 diagnosis report + 1 implementation plan + 1 results report."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-035"
        title: "Offer Validation Framework"
        description: "Before spending on ads: (1) Does the offer solve a real problem? (2) Is the target market actively seeking a solution? (3) Does the price match the market's willingness to pay? (4) Can you deliver the transformation? (5) Can you prove it with testimonials or case studies? All 5 YES = ready to advertise."
        domains: [irresistible-offers, data-driven-decisions]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-036"
        title: "YouTube Campaign Structure Framework"
        description: "Campaign 1: Awareness (TrueView in-stream to cold custom intent audiences). Campaign 2: Consideration (TrueView discovery to warm audiences searching your topic). Campaign 3: Conversion (Non-skippable 15s to retargeting audiences). Campaign 4: Retention (Discovery ads to past buyers for upsells). Each campaign has its own budget and optimization goal."
        domains: [youtube-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-037"
        title: "Ad Account Audit Framework"
        description: "Monthly audit: (1) Review all active campaigns for profitability. (2) Kill bottom 20% performers. (3) Scale top 20% performers. (4) Check frequency of all ad sets (pause any above 3.0). (5) Review audience overlap between ad sets. (6) Check pixel health and attribution. (7) Review ROAS trend over 30 days."
        domains: [campaign-troubleshooting, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "FW-FK-038"
        title: "Email Reactivation Framework"
        description: "Step 1: Segment disengaged subscribers (no opens 90+ days). Step 2: Send 3-email re-engagement sequence (curiosity subject lines, no offer). Step 3: If still no engagement, send 9-word email. Step 4: If no response in 30 days, move to suppression list. Step 5: Run periodic win-back campaign with compelling offer every 6 months."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-039"
        title: "High-Ticket Client Acquisition Funnel Framework"
        description: "Top of funnel: content (organic or paid) → Lead magnet opt-in → Value email sequence (3-5 emails) → VSL or webinar with pitch → Application form → Qualification review → Phone call → Offer → Close. Each stage filters: 100 leads → 30 applicants → 10 qualified → 5 calls → 2 clients."
        domains: [client-acquisition, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "FW-FK-040"
        title: "Product Launch Countdown Framework"
        description: "Day -7 to -1: Pre-launch content (value videos or emails, no pitch). Day 0: Launch with main offer + early bird bonus. Days 1-3: Click sequences driving to sales page. Day 3 midnight: First deadline (early bird expires). Day 4-6: New bonus added, second deadline sequence. Day 6 midnight: Second deadline. Day 7-9: Final deadline with payment plan. Day 9 midnight: Close."
        domains: [countdown-promotions, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-041"
        title: "Facebook Audience Research Framework"
        description: "Step 1: Create buyer persona (demographics, interests, behaviors). Step 2: Use Audience Insights to find connected interests. Step 3: Upload customer email list as Custom Audience. Step 4: Create 1% lookalike from buyer list. Step 5: Test 5 interest audiences and 1% lookalike simultaneously. Step 6: Scale winning audiences."
        domains: [facebook-ads, audience-targeting]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "FW-FK-042"
        title: "Conversion Rate Optimization Hierarchy"
        description: "Fix in this order: (1) Traffic source quality and targeting, (2) Landing page headline and hook, (3) Page body copy and proof elements, (4) CTA button and page flow, (5) Order form (two-step, trust elements, testimonials), (6) Upsell sequence, (7) Email follow-up. Each layer amplifies the ones below."
        domains: [conversion-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "FW-FK-043"
        title: "Guarantee Construction Framework"
        description: "Choose guarantee type: (1) Satisfaction guarantee (100% money back, no questions). (2) Results guarantee (money back if X result not achieved in Y days). (3) Better than free (money back PLUS keep the product). Frame guarantee to address specific buyer hesitation. Always name the guarantee something compelling."
        domains: [irresistible-offers, conversion-optimization]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-044"
        title: "Testimonial Collection Framework"
        description: "Week 2 after purchase: ask 'How are you getting on? What results have you seen?' Week 6: ask for video testimonial with specific prompts: What was life like before? What have you achieved? What specific results/numbers? Would you recommend? Each testimonial must include specific numbers and timeframes."
        domains: [irresistible-offers, consulting-methodology]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "FW-FK-045"
        title: "Business Diagnostic Report Template"
        description: "Section 1: Executive summary (one-paragraph diagnosis). Section 2: Assets inventory (human, transactional, sellable). Section 3: Numbers analysis (all 9 key metrics with benchmarks). Section 4: Glaringly Obvious Observations (top 3 gaps). Section 5: Prescription (ONE thing to fix, why, expected impact). Section 6: Timeline and milestones."
        domains: [consulting-methodology, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "FW-FK-046"
        title: "Email Segmentation by Buyer Stage"
        description: "Segment: (1) Leads who never bought (nurture + offer), (2) Buyers of loss leader (upsell to main), (3) Buyers of main product (upsell to premium/coaching), (4) Premium buyers (retention + referral). Each segment gets different emails. Never send the same promotion to all four -- irrelevant messages burn lists."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "FW-FK-047"
        title: "YouTube Ad Account Structure"
        description: "Account level: billing, settings. Campaign level: separate campaigns per objective (awareness, consideration, conversion, remarketing). Ad Group level: one theme per group (one intent audience or one placement). Ad level: 2-3 creative variations per ad group. This structure allows clean reporting and precise budget control."
        domains: [youtube-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "FW-FK-048"
        title: "Competitive Intelligence Framework"
        description: "5-step competitive intelligence process: (1) Identify top 5 competitors by ad spend (Facebook Ad Library). (2) Screenshot and catalog all their ads, sorting by duration. (3) Click through and map their entire funnel. (4) Subscribe to their email list and track sequences for 30 days. (5) Identify gaps and angles they're missing. Output: competitive analysis document with opportunities."
        domains: [competitive-intelligence, marketing-strategy]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "FW-FK-049"
        title: "IBB Content Framework"
        description: "Three-part content structure for all platforms: Intro (10-15 sec pattern interrupt -- bold claim, question, or shocking statement). Body (1-2 min of genuine value -- teach one thing, tell one story, or share one proof). Bridge (15-30 sec transition to CTA -- link, follow, or opt-in). Every piece of content follows this structure."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-050"
        title: "Vortex Content Strategy Framework"
        description: "Multi-platform content vortex: (1) Choose 3-5 core themes aligned with your offer. (2) Create 1 long-form piece per week (YouTube/podcast). (3) Chop into 10-15 short-form pieces. (4) Distribute across all platforms daily. (5) Retarget all content consumers with direct offers. The vortex pulls prospects from casual awareness to purchase readiness."
        domains: [content-marketing, audience-building]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-051"
        title: "Three Pillars Content Calendar Framework"
        description: "Weekly content calendar built on three pillars: Monday/Wednesday = Teach (educational content that demonstrates expertise). Tuesday/Thursday = Story (personal or client stories that build connection). Friday = Offer (direct promotion with CTA). Weekend = Engagement (reposts, Q&A, behind-the-scenes). Rotate consistently."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-052"
        title: "Episodic Ad Campaign Framework"
        description: "Sequential ad campaign structure: Episode 1 (shown to cold): Problem identification + story hook. Episode 2 (shown to Ep1 viewers): Deeper problem exploration + solution tease. Episode 3 (shown to Ep2 viewers): Solution reveal + proof. Episode 4 (shown to Ep3 viewers): Direct offer + urgency. Each episode filters and warms the audience."
        domains: [youtube-advertising, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-053"
        title: "Phone-as-TV Programming Framework"
        description: "Treat your social media presence like a TV channel: (1) Define your 'show' (recurring content series). (2) Set a schedule (same time, same format). (3) Create episode arcs (multi-part content). (4) Include 'commercial breaks' (promotional content). (5) Build viewer loyalty through consistency. Your audience tunes in like they tune into their favorite show."
        domains: [content-marketing, audience-building]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-054"
        title: "Google Full-Funnel Advertising Framework"
        description: "Google's beginning-and-end framework: Top of funnel = YouTube discovery ads (awareness). Middle = YouTube in-stream ads (consideration). Bottom = Google Search ads (intent capture). Retargeting = Display Network + YouTube remarketing. Running all four layers creates a closed-loop system where you influence every stage of the buyer's journey."
        domains: [youtube-advertising, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-055"
        title: "Content Batching Production Framework"
        description: "Monthly content production workflow: Week 1, Day 1: Script/outline 15 content pieces (1 hour). Week 1, Day 2: Batch record all 15 (1 hour). Week 2: Edit, caption, thumbnail (outsource). Week 3-4: Schedule and distribute. Output: 15 pieces = 3 weeks of daily content from 2 hours of creator time."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-056"
        title: "Yeah-Buts and What-Ifs Handling Framework"
        description: "Objection resolution framework: (1) List all 'Yeah-Buts' (logical objections to the offer). (2) For each Yeah-But, create a proof element (testimonial, case study, data). (3) List all 'What-Ifs' (emotional fears about outcomes). (4) For each What-If, create a safety element (guarantee, refund, support). (5) Address Yeah-Buts in sales copy. (6) Address What-Ifs in follow-up sequences."
        domains: [selling-psychology, copywriting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "FW-FK-057"
        title: "Filtration Copy Framework"
        description: "Write copy that filters: (1) Open with a specific scenario only your ideal prospect relates to. (2) Use insider language/jargon your market uses. (3) Include a 'this is NOT for you if' section. (4) Make the CTA require commitment (application, not just click). (5) Price as a filter (high enough to repel bargain hunters). Each layer filters out wrong-fit prospects."
        domains: [copywriting, audience-targeting]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-058"
        title: "Assembly Line Long-Form Copy Framework"
        description: "12-section long-form copy structure: (1) Headline (attention). (2) Lead/Opening (hook). (3) Problem identification (empathy). (4) Agitation (urgency). (5) Credibility (why listen to you). (6) Solution introduction (hope). (7) Benefits deep-dive (desire). (8) Proof stack (belief). (9) Offer stack (value). (10) Price reveal + anchor (deal). (11) Guarantee (risk reversal). (12) Close + urgency (action). Each section has one job."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-059"
        title: "Billion Dollar VSL Framework"
        description: "The Billion Dollar VSL structure: (1) Pattern Interrupt opening (5 sec). (2) Core Promise (30 sec). (3) Credibility establishment (2 min). (4) Problem Identification + Agitation (5 min). (5) Common Mistakes (3 min). (6) Solution Introduction (5 min). (7) Mechanism Explanation (5 min). (8) Benefits/Bullets (5 min). (9) Proof Stack (10 min). (10) Offer Stack (5 min). (11) Price Anchor + Reveal (3 min). (12) Guarantee + Close with urgency (5 min). Total: 45-90 min."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-060"
        title: "Double Tap Campaign Framework"
        description: "Two-pronged campaign architecture: Prong 1 (Content Touch): Run value-based content (webinar, training, video series) to a cold/warm audience. Wait 48 hours. Prong 2 (Direct Touch): Hit the same audience with direct sales copy (VSL, sales page, deadline sequence). Track which prong each buyer came from. Typically 60% buy from Prong 2, 40% from Prong 1."
        domains: [campaign-architecture, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-061"
        title: "Dog Whistle Copy Framework"
        description: "Writing copy that only your ideal prospect understands: (1) Identify insider terms your market uses. (2) Reference specific scenarios only they experience. (3) Use numbers and metrics specific to their world. (4) Reference tools, platforms, or processes they use. (5) Include industry in-jokes or frustrations. Test: show to 10 people outside your market -- if 8+ are confused, it's working."
        domains: [copywriting, audience-targeting]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-062"
        title: "Damaging Admission Framework"
        description: "Strategic honesty in sales copy: (1) Identify the biggest weakness or limitation of your offer. (2) State it clearly and early (first 500 words). (3) Explain why it exists (builds understanding). (4) Show how you compensate for it (turns weakness to strength). (5) Transition to strengths (contrast effect). The admission makes all subsequent claims more believable."
        domains: [copywriting-philosophy, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-063"
        title: "Price Anchoring Stack Framework"
        description: "Build value before price reveal: (1) List main offer components with individual values. (2) Stack bonuses with individual values. (3) Total the 'real value' (should be 10x+ asking price). (4) Cross out the high price. (5) Reveal the actual price. (6) Immediately follow with guarantee. (7) Add urgency element. The gap between stacked value and actual price makes the decision feel like theft."
        domains: [pricing-psychology, offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-064"
        title: "Open Loop Email Framework"
        description: "Email engagement through incomplete stories: (1) Start with a compelling story or scenario. (2) Build tension and curiosity. (3) At the peak of tension, say 'I'll tell you the rest when you click here.' (4) The click goes to the sales page where the story concludes. (5) The conclusion naturally leads into the offer. The open loop creates irresistible click-through."
        domains: [email-marketing, copywriting]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-065"
        title: "Proof Stack Architecture Framework"
        description: "5-layer proof architecture: Layer 1: Personal story (your own transformation). Layer 2: Client testimonials (written, preferably video). Layer 3: Case studies (specific numbers and timelines). Layer 4: Screenshots/evidence (dashboards, bank statements, analytics). Layer 5: Third-party validation (press, certifications, endorsements). Stack all 5 layers in order for maximum credibility."
        domains: [copywriting, irresistible-offers]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "FW-FK-066"
        title: "Identity Shift Selling Framework"
        description: "Sell the identity, not the product: (1) Define who the prospect IS right now (current identity). (2) Define who they WANT to be (aspirational identity). (3) Show the gap between current and aspirational. (4) Position your product as the bridge. (5) Use 'you are' and 'you become' language. (6) Show proof of others who made the identity shift. The product is just the vehicle for becoming someone new."
        domains: [selling-psychology, offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-067"
        title: "Mr. Nice Guy Selling Framework"
        description: "Non-aggressive selling process: (1) Deliver genuine value upfront (content, training, advice). (2) Build relationship through consistent helpfulness. (3) At natural transition point, casually introduce your offer. (4) Frame as 'here's what I have if you want help.' (5) No pressure, no urgency tricks, no manipulation. (6) Follow up once, then let it go. Works best with warm audiences who already trust you."
        domains: [sales-process-design, selling-psychology]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-068"
        title: "Greased Chute Funnel Framework"
        description: "Zero-friction buying process: (1) Ad → simple landing page (one CTA). (2) Landing page → order form (pre-populated if possible). (3) Order form → one-click bump offer. (4) Purchase → one-click upsell page. (5) Maximum 3 clicks from ad to purchase. (6) No unnecessary pages, no navigation menus, no distractions. Every element slides the prospect toward purchase."
        domains: [sales-funnels, conversion-tracking]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-069"
        title: "Upsell Architecture Framework"
        description: "Post-purchase upsell structure: Main purchase → Order form bump (30-50% of main price, related accessory). → Upsell 1 (complementary product, premium version). → Upsell 2 (VIP/coaching, highest price point). → Downsell (if Upsell 1 declined, offer lighter version). Maximum 2 upsells + 1 downsell. Each upsell page takes under 60 seconds to consume."
        domains: [monetization, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-070"
        title: "Email Deadline Stack Framework"
        description: "5-day promotional email sequence: Day 1 (2 emails): Announcement + story/proof. Day 2 (2 emails): Benefits deep-dive + FAQ. Day 3 (2 emails): Testimonial spotlight + objection handling. Day 4 (2 emails): Urgency building + scarcity. Day 5 (6 emails): Last chance at 8AM, 10AM, 12PM, 9PM, 10PM, 11PM. Total: 14 emails in 5 days. Real deadline expires at midnight Day 5."
        domains: [email-marketing, deadline-sequences]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-071"
        title: "Buyer Segmentation Email Framework"
        description: "Post-purchase email segmentation: Segment A (new buyers): 7-day onboarding → quick win → upsell offer. Segment B (upsell buyers): Premium support → exclusive content → coaching offer. Segment C (declined upsell): Value sequence → re-offer upsell at different angle. Segment D (inactive buyers): Re-engagement → survey → personalized offer. Each segment gets completely different email sequences."
        domains: [email-marketing, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-072"
        title: "Two Categories Close Framework"
        description: "Closing framework based on buyer type: For impulse buyers: Stack urgency + limited availability + fast-action bonus. Short decision window. Single page, minimal copy, strong CTA. For deliberate buyers: Stack proof + detailed explanation + guarantee. Extended decision window. Long-form, comprehensive, FAQ-heavy. Identify which type your prospect is and serve the matching close."
        domains: [selling-psychology, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-073"
        title: "Blue Ocean B&M Consulting Framework"
        description: "Entering brick-and-mortar consulting: (1) Pick a niche vertical (dentists, restaurants, gyms). (2) Audit their current digital presence (usually terrible). (3) Offer a free SANDOR diagnostic. (4) Prescribe one digital marketing improvement. (5) Implement it for them on retainer. (6) Use results as case study for next client in same vertical. (7) Scale to 10 clients in one vertical before expanding."
        domains: [consulting-methodology, competitive-intelligence]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-074"
        title: "Solve-the-Problem-Purchase-Creates Framework"
        description: "Product ladder based on created problems: Product 1 teaches the strategy → Product 2 provides implementation tools → Product 3 offers done-for-you implementation → Product 4 provides ongoing optimization/coaching. Each product solves the problem created by the previous purchase. The ladder is self-generating."
        domains: [offer-strategy, monetization]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "FW-FK-075"
        title: "4DCM Content Production Framework"
        description: "4-Day Content Machine: Day 1: Plan and outline 12-15 pieces based on 3-5 core themes. Day 2: Batch record all pieces (phone, no editing). Day 3: Outsource editing, captions, thumbnails. Day 4: Schedule across all platforms for next 2-3 weeks. Repeat twice per month. Output: 24-30 pieces from 4 hours of creator time per month."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FW-FK-076"
        title: "YouTube Content Ad Framework"
        description: "YouTube content ads (omnipresence): Structure: (1) Hook that qualifies viewer (5 sec). (2) Valuable teaching content (3-10 min). (3) Soft CTA (subscribe, visit site). Targeting: interest-based + custom intent + competitor channels. Budget: 20% of total ad spend. Metric: view rate 25%+. Purpose: build retargetable audience and brand search volume."
        domains: [youtube-advertising, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FW-FK-077"
        title: "Redneck Analytics Dashboard Framework"
        description: "Simple tracking dashboard: Track daily: (1) Total ad spend, (2) Total revenue, (3) Net (revenue minus spend). Track weekly: (4) Cost per lead, (5) Cost per customer, (6) Revenue per customer. Track monthly: (7) 30-day ROAS, (8) Customer lifetime value. Use a spreadsheet, not complex software. If it can't fit on one screen, it's too complex."
        domains: [financial-metrics, advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FW-FK-078"
        title: "22-Day Attribution Framework"
        description: "Campaign evaluation framework: Day 1-3: Ignore performance data (too early). Day 4-7: Check basic metrics (CTR, CPL). Day 7-14: Evaluate front-end ROI. Day 14-22: Evaluate total ROI including backend. Day 22+: Make scaling/killing decision. Never kill a campaign before Day 7. Never scale before Day 14. The 22-day cycle captures the full buying window."
        domains: [advertising-economics, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "FW-FK-079"
        title: "Click-Countdown Dual-Phase Campaign Framework"
        description: "Phase 1 (Click Phase, 7-14 days): Run content ads + lead magnets to build engaged audience. Goal: accumulate clicks, views, opt-ins. No selling. Phase 2 (Countdown Phase, 5 days): Hit engaged audience with deadline promotion (email + retargeting). Full deadline stack. Real expiration. Then: Reset and repeat. This creates predictable promotional cycles."
        domains: [campaign-architecture, email-marketing]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "FW-FK-080"
        title: "Behavioral Trigger Automation Framework"
        description: "Automated responses to behavioral signals: Click link → move to accelerated sequence. Visit sales page → trigger retargeting. Start checkout → cart abandonment emails (3 emails over 48 hours). Watch 75%+ of video → offer-specific retargeting. Open but don't click → resend with different subject. No open in 30 days → re-engagement sequence. Each behavior triggers a specific automated response."
        domains: [behavioral-marketing, super-systems]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "FW-FK-081"
        title: "Sequential Campaign TV Series Framework"
        description: "Run ads like a TV series: Episode 1 (broad targeting): Problem awareness + story hook. Episode 2 (retarget Ep1 50%+ viewers): Deeper exploration + solution tease. Episode 3 (retarget Ep2 50%+ viewers): Solution + proof. Episode 4 (retarget Ep3 50%+ viewers): Offer + urgency. Episode 5 (retarget non-buyers): Testimonial + deadline. Budget allocation: 40% Ep1, 25% Ep2, 20% Ep3, 10% Ep4, 5% Ep5."
        domains: [campaign-architecture, youtube-advertising]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "FW-FK-082"
        title: "Super System Campaign Rotation Framework"
        description: "Monthly super system maintenance: Week 1: Audit all active campaigns (which are running, which expired). Week 2: Create fresh campaigns to replace expired ones. Week 3: Launch new campaigns + monitor existing. Week 4: Review 30-day performance, kill underperformers, scale winners. The system should always have 3-5 active campaigns running simultaneously."
        domains: [super-systems, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "FW-FK-083"
        title: "Diagnostic Funnel Framework"
        description: "Qualification funnel structure: (1) Ad targeting broad audience. (2) Landing page with 3-5 qualifying questions (quiz format). (3) Based on answers, route to Segment A (good fit → direct offer), Segment B (medium fit → nurture sequence), or Segment C (poor fit → free resource + exit). This pre-qualifies before the sales conversation and increases close rates by 2-3x."
        domains: [sales-funnels, diagnostics]
        source_id: "FK-OT"
        source_week: "Week 6"

      - id: "FW-FK-084"
        title: "Dog Whistle Ad Copy Framework"
        description: "Writing ads only your ideal prospect recognizes: (1) Open with an insider scenario: 'When your ROAS drops below 2x and you can't figure out why...' (2) Use market-specific jargon naturally. (3) Reference specific tools they use. (4) Include metrics only they track. (5) CTA is specific: 'Download the audit template' not 'Learn more.' (6) Test: if a general audience doesn't understand the ad, it's perfect."
        domains: [ad-copywriting, audience-targeting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FW-FK-085"
        title: "Results in Advance Ad Framework"
        description: "Ad structure that delivers value first: (1) Hook: identify the viewer's problem (10 sec). (2) Teach: give one specific, actionable tactic they can use today (2-3 min). (3) Prove: show results from using this tactic (screenshots, case study). (4) Bridge: 'This is just one tactic from my full system...' (5) Offer: clear CTA. The ad itself creates a micro-transformation that makes the full product irresistible."
        domains: [ad-copywriting, content-marketing]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FW-FK-086"
        title: "FAQ Bridge Strategy Framework"
        description: "Ad structure built on real objections: (1) Open: 'People always ask me...' (2) FAQ 1: Address biggest objection (usually price or time). (3) FAQ 2: Address trust objection (does it really work?). (4) FAQ 3: Address uniqueness objection (how is this different?). (5) Each FAQ answer includes a mini proof element. (6) Close with 'Now that you know the truth...' + CTA. Preemptive objection handling in ad format."
        domains: [ad-copywriting, selling-psychology]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FW-FK-087"
        title: "Break-Even Front End Framework"
        description: "Design front-end for zero profit: (1) Calculate your average CPA. (2) Design front-end offer priced at CPA (break even). (3) Add order bump to generate small profit. (4) Backend offers generate the real profit (30-60 day window). (5) Reinvest all front-end revenue into ads. (6) Competitor analysis: if competitors profit on front-end, you can outspend them indefinitely by breaking even."
        domains: [loss-leader-funnels, advertising-economics]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "FW-FK-088"
        title: "Ocean Pockets Discovery Framework"
        description: "Finding high-response audience segments: (1) List 20 interests/behaviors related to your market. (2) Create 10 ad sets, each targeting 2 related interests. (3) Run identical creative across all 10 at $10/day each. (4) After 72 hours, rank by CPA. (5) Kill bottom 7, scale top 3. (6) Within top 3, test narrowing (add demographics, behaviors). (7) Within winning pockets, test lookalikes of converters."
        domains: [audience-targeting, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "FW-FK-089"
        title: "Multiple Objective Retargeting Framework"
        description: "Retargeting with purpose: Tier 1 (cart abandoners): Direct offer reminder + urgency. Budget: 40%. Tier 2 (page visitors): Social proof ads (testimonials, case studies). Budget: 30%. Tier 3 (content engagers): Objection-handling ads (FAQ, myths, concerns). Budget: 20%. Tier 4 (email list): Announcement and deadline ads. Budget: 10%. Each tier serves a different psychological need in the decision process."
        domains: [retargeting, campaign-architecture]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "FW-FK-090"
        title: "Ad Automation Rules Framework"
        description: "Automated campaign management rules: Rule 1: If CPA < target for 3 days → increase budget 20%. Rule 2: If CPA > 2x target for 2 days → decrease budget 30%. Rule 3: If frequency > 3.0 → pause ad set. Rule 4: If CTR < 1% after $50 spend → pause ad. Rule 5: If no conversions after $100 spend → pause ad set. Rule 6: If ROAS > 3x for 7 days → duplicate to new audience. Set in Facebook Automated Rules."
        domains: [ad-automation, scaling]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "FW-FK-091"
        title: "Advertising as Consulting Framework"
        description: "Structure ads like consulting sessions: (1) Open with diagnostic question: 'Are you experiencing [symptom]?' (2) Identify root cause: 'The reason is usually [diagnosis].' (3) Prescribe solution: 'Here's what to do about it [3-step fix].' (4) Demonstrate: show proof the fix works. (5) Offer: 'If you want help implementing this at scale, here's my program.' The ad delivers a complete SANDOR mini-cycle."
        domains: [ad-copywriting, consulting-methodology]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "FW-FK-092"
        title: "Machine Learning Leverage Framework"
        description: "Maximizing algorithm performance: (1) Start broad (minimal targeting constraints). (2) Use strong creative that naturally filters (dog whistle). (3) Optimize for deepest-funnel event with enough volume (50+ per week). (4) Feed conversion data back consistently. (5) Don't change targeting for 7 days after launch. (6) Let the machine find pockets you'd never think to target. (7) Use lookalikes of converters only after 500+ conversions."
        domains: [paid-media, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "FW-FK-093"
        title: "Restaurant Proximity Positioning Framework"
        description: "Position your offer near existing demand: (1) Identify competitors with large, engaged audiences. (2) Target those audiences directly (competitor targeting, similar interests). (3) Show a 'similar but better' offer. (4) Use the competitor's audience education to your advantage (they already understand the problem). (5) Differentiate on one clear axis (faster results, better support, lower price, better guarantee). Don't create demand -- redirect existing demand."
        domains: [competitive-intelligence, audience-targeting]
        source_id: "FK-AMM"
        source_day: "Day 2"


  L5_METHODOLOGIES:
      - id: "MET-FK-001"
        title: "SANDOR Implementation Protocol"
        description: "Step 1: Ask the stated objective question (3 methods). Step 2: Dig through their 3 common non-answer responses. Step 3: Establish baseline (revenue past X weeks). Step 4: Set target (desired revenue next X weeks). Step 5: Confirm with actual numbers ('So our mission is to bring in an additional $50K'). Get affirmative yes."
        domains: [consulting-methodology, goal-setting]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-002"
        title: "Historical Revenue Mining Protocol"
        description: "Step 1: Log into payment processor, pull monthly revenue for past 12 months. Step 2: Identify top 3 months. Step 3: For each top month, pull products-sold-by-revenue report. Step 4: Pull email broadcasts for that date range (+1 month before). Step 5: Sort by volume sent to find promotions. Step 6: Match promotions to revenue spikes. Step 7: Replicate the promotion."
        domains: [revenue-optimization, diagnostics]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-003"
        title: "Deadline Stack Deployment Protocol"
        description: "Step 1: Create content that makes offer at end (webinar, VSL, etc). Step 2: Deploy click sequence to drive to content. Step 3: After behavioral indication, deploy Deadline 1 (2 emails/day + 6 on last day). Step 4: Wait 48h. Step 5: Deploy Deadline 2 with second bonus added. Step 6: Wait 48h. Step 7: Deploy Deadline 3 with payment plan added. Each deadline uses separate web page. Same video, different copy about new bonus."
        domains: [deadline-sequences, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-004"
        title: "Loss Leader Funnel Diagnostic Protocol"
        description: "Step 1: Get big picture numbers (9 metrics). Step 2: Run component checklist (opt-in? two-step? bump? OTOs? exit intent? deadlines? retargeting? cart abandon?). Step 3: Get conversion rates for each component. Step 4: Get email sequence metrics (open/click rates). Step 5: Write G.O.O. Step 6: Prescribe ONE thing based on highest-impact glaringly obvious fix."
        domains: [diagnostics, loss-leader-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-005"
        title: "E-Commerce Quick Win Protocol"
        description: "Step 1: Install two-step order form if missing. Step 2: Add order bump (Zipify for Shopify). Step 3: Add one-click upsell. Step 4: Build cart abandonment deadline sequence. Step 5: Add exit intent pop on OTO page. Step 6: Set up email follow-up to past buyers (click sequence to presale content → deadline sequence). These 6 things alone can transform an e-com business."
        domains: [ecommerce, revenue-optimization]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-006"
        title: "Content to Call Me Deployment Protocol"
        description: "Step 1: Take 3-5 pieces of existing content (YouTube videos, Facebook Lives). Step 2: Create a web page for each: headline + embedded video + book-a-call CTA with calendar. Step 3: Build click sequence (one email per content piece, one per day). Step 4: Build call-me sequence (3 emails: 'drop me a line if you want X'). Step 5: Anyone who clicks ANY content email gets tagged and enters call-me sequence. Step 6: Nothing removes them from content sequence except booking a call."
        domains: [phone-sales, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-007"
        title: "Super System Build Protocol (Duct Tape Version)"
        description: "Step 1: List all existing offers/funnels. Step 2: String them together sequentially: Offer 1 click sequence → Offer 1 deadline → Offer 2 click sequence → Offer 2 deadline → etc. Step 3: Between each, add 48h wait. Step 4: At each transition, check 'did they buy?' -- if yes, skip. Step 5: Tag everything (bought, clicked, didn't click). Step 6: Add offers over time, don't build all at once."
        domains: [super-systems, marketing-automation]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-008"
        title: "Super System Build Protocol (Pristine Version)"
        description: "For webinar funnels: Step 1: Build 3+ webinars for same product (different angles). Step 2: Tag at every stage (registered, attended, saw pitch, bought). Step 3: At every exit, route to super system. Step 4: Level 1 checks 'been through campaign X?' Step 5: Level 2 checks 'registered for X?' Step 6: Level 3 checks 'attended X?' Step 7: Level 4 checks 'saw pitch X?' Each 'no' routes back to appropriate invite sequence."
        domains: [super-systems, marketing-automation, webinar-sales]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-009"
        title: "Mix-and-Match Offer Creation Protocol"
        description: "With products A ($7), B ($27), C ($47), D ($97): Offer 1=A with B bump + C upsell + D upsell. Offer 2=B free when buy A + C upsell + D upsell. Offer 3=C free when buy A + B bump + D upsell. Offer 4=A+C free when buy D + B bump. Offer 5=D free when buy A + B bump + C upsell. Each gets own sales page + deadline sequence. 2-day waits between."
        domains: [offer-creation, super-systems]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-010"
        title: "High-Ticket Saw-Pitch Follow-Up Protocol"
        description: "Stage 1: Go Apply Sequence (5 emails, 1/day). Stage 2: Survey Sequence via VideoAsk (4 emails). Stage 3: If qualified, Go Schedule Sequence (4 emails + 9-word email). Stage 4: If still not scheduled, phone outreach. Stage 5: Goodwill Content Sequence with re-pitch. Stage 6: Second Goodwill Content Sequence. Stage 7: Different campaign entirely."
        domains: [high-ticket-sales, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-011"
        title: "Escape and Arrival Product Creation Protocol"
        description: "Step 1: Map global escape-to-arrival (where customer IS → where they want to BE). Step 2: List every major milestone between. Step 3: Pick ONE milestone. Step 4: Do escape-arrival within that milestone (sub-steps). Step 5: For each sub-step, list specific how-to items. Step 6: Record 10-30 min video per sub-step. Result: 1-2 hour multimedia product. Step 7: Repeat for other milestones to create product suite."
        domains: [product-creation, content-strategy]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-012"
        title: "One-To-Many Webinar Maximization Protocol"
        description: "Step 1: Registration page (track conversion). Step 2: Liquidator offer after registration (loss leader to offset ad costs). Step 3: Go-Register sequence for non-registrants. Step 4: Go-Attend sequence for registrants. Step 5: Track show-up rate and saw-pitch rate. Step 6: Go-Finish sequence for early leavers. Step 7: Post-pitch deadline stack (3 deadlines). Step 8: Cart abandon sequence for two-step order form. Step 9: Deadline sequences for liquidator non-buyers and OTO non-buyers."
        domains: [webinar-sales, sales-process]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-013"
        title: "Engaged Audience Identification Protocol"
        description: "For each platform, find ENGAGED audiences (not total followers): Facebook Engaged Audience (people who interacted in last 30 days), Instagram Engaged, YouTube Engaged Viewers (watched in past 30 days), Website Visitor Retargeting Audience, Monthly Unique Podcast Downloads. These are the only audiences that count as assets."
        domains: [audience-building, asset-analysis]
        source_id: "FK-RC"
        source_week: "Week 1"

      - id: "MET-FK-014"
        title: "Pre-Call Sequence Protocol"
        description: "After someone schedules a call, send ONE email immediately: reference a client testimonial or case study podcast. Purpose: build authority and set expectations. Example: 'Before you talk to my wife, listen to this podcast where our client Brooke Castillo describes what she learned working with me.'"
        domains: [phone-sales, pre-call-sequence]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-015"
        title: "Facebook Campaign Launch Protocol"
        description: "Day 1: Create campaign with Conversions objective. Create 5 ad sets (different audiences), $50/day each, same creative. Day 2-7: Monitor CPM, CTR, and CPA. Day 7: Pause bottom 3 ad sets. Increase budget on top 2 by 25%. Day 14: If CPA is profitable, create a 1% lookalike from buyers. Test against winning audience. Day 21: Scale winners, kill underperformers, test new creative."
        domains: [facebook-ads, campaign-structure]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MET-FK-016"
        title: "YouTube Ad Launch Protocol"
        description: "Step 1: Write script using AIDA framework (hook 0-5s, problem 5-30s, story 30-60s, solution 60-90s, CTA final 15s). Step 2: Record 3 different hook variations. Step 3: Create TrueView in-stream campaign. Step 4: Upload all 3 hook versions as separate ads. Step 5: Set Custom Intent audience (keywords your buyers search). Step 6: Run $50/day for 14 days. Step 7: Scale winning hook. Step 8: Add retargeting campaign for video viewers 75%."
        domains: [youtube-ads, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MET-FK-017"
        title: "Email List Reactivation Protocol"
        description: "Step 1: Export list sorted by last engagement date. Step 2: Segment: active (opened in 90d), inactive (90-180d), dead (180d+). Step 3: Active list: run normal promotions. Step 4: Inactive list: 5-email re-engagement sequence over 10 days (value, value, value, offer, 9-word email). Step 5: Dead list: one final win-back email with significant offer. Step 6: Non-openers after win-back → suppress or delete."
        domains: [email-marketing, list-management]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MET-FK-018"
        title: "Client Consulting Onboarding Protocol"
        description: "Week 1: Access all platforms (analytics, payments, email, ads). Week 2: Run full SANDOR diagnosis -- pull all numbers, complete all checklists. Week 3: Analyze G.O.O., prepare diagnosis report with 3 prescriptions ranked by impact/ease. Week 4: Present to client. Client chooses ONE. Write implementation plan. Week 5+: Execute ONE thing, measure weekly, report monthly."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-019"
        title: "Irresistible Offer Build Protocol"
        description: "Step 1: Define core transformation (from X to Y in Z timeframe). Step 2: List every deliverable that achieves transformation. Step 3: Identify top 3 objections, create a bonus for each. Step 4: Choose guarantee (satisfaction or results). Step 5: Assign real market value to each element. Step 6: Total value = sum of all elements. Step 7: Price at 10-15% of total stacked value. Step 8: Write stack page showing each element, its value, and how it contributes to transformation."
        domains: [irresistible-offers, pricing]
        source_id: "FK-RC"
        source_week: "Week 9"

      - id: "MET-FK-020"
        title: "Sales Call Close Protocol"
        description: "Step 1: Rapport (2-3 minutes of personal connection). Step 2: Situation (confirm what they told you in application). Step 3: Goals (where do they want to be?). Step 4: Gap (what's standing in the way?). Step 5: Solution reveal (how your program bridges the gap). Step 6: Offer presentation (stack, then price). Step 7: Handle objections (feel-felt-found or agree-reframe). Step 8: Close (assume the sale, give clear next step)."
        domains: [high-ticket-sales, phone-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-021"
        title: "Ad Creative Refresh Protocol"
        description: "Week 1: Monitor frequency (pause if above 3.0). Week 2: If creative fatigue detected, test 3 new versions of the same winning ad (new hook only). Week 3: Replace original with winning new hook. Week 4: If still declining, test entirely new angle (different problem, different promise). Never kill a profitable campaign -- refresh the creative first."
        domains: [facebook-ads, ad-automation]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MET-FK-022"
        title: "Webinar Script Protocol"
        description: "Intro (10 min): who you are + big promise. Content (40 min): 3-5 teaching points that build belief. Stack the deck: address each objection within the content itself. Transition (5 min): 'The only thing standing between you and [result] is...' Pitch (15 min): offer stack, price reveal, guarantee, urgency. Q&A/close (10 min): handle objections live. End with deadline announcement."
        domains: [webinar-sales, ad-scripting]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-023"
        title: "Post-Launch Retargeting Sequence Protocol"
        description: "Day 1-3 after launch: retarget sales page visitors (not buyers) with testimonials + FAQ ad. Day 4-7: retarget with different angle (different objection addressed). Day 8-14: retarget with deadline reminder (if still open) or downsell offer. Day 15+: move to long-term retargeting pool for future promotions. Budget: $20-50/day, decreasing as audience exhausts."
        domains: [retargeting, countdown-promotions]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MET-FK-024"
        title: "Consulting Client Results Reporting Protocol"
        description: "Weekly: 5-bullet email to client (what we did, what happened, what it means, what we're doing next, one thing client needs to do). Monthly: full report with before/after numbers, percentage improvements, what's working, what's not, next month prescription. Quarterly: SANDOR reset -- re-run full diagnosis and R step."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-025"
        title: "Budget Scaling Protocol"
        description: "Phase 1 ($0-1K/month): spend $50/day testing audiences and creative. Establish baseline CPA. Phase 2 ($1K-5K/month): scale winning ad sets 20-25% every 48 hours. Add lookalike audiences. Phase 3 ($5K-20K/month): duplicate winning campaigns to new campaign (fresh learning phase). Test new audiences. Phase 4 ($20K+/month): multiple campaigns, bid cap strategy, dedicated creative testing budget (20% of total)."
        domains: [scaling, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MET-FK-026"
        title: "Loss Leader Funnel Build Protocol"
        description: "Step 1: Choose entry product ($7-47 book, report, or mini-course). Step 2: Build opt-in page (one benefit headline, 3 bullets, email capture). Step 3: Build two-step order form. Step 4: Build order bump (complementary product, 30-50% of main price). Step 5: Build 2 OTOs (first = natural next step, second = speed/done-for-you version). Step 6: Build exit intent pop-up for each OTO. Step 7: Build post-purchase deadline sequence to non-OTO-buyers."
        domains: [loss-leader-funnels, sales-funnels]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-027"
        title: "Email Automation Tag Protocol"
        description: "Step 1: Map every behavioral action that matters (opt-in, click, purchase, attend, apply). Step 2: Create a unique tag for each action. Step 3: Set automation triggers: add tag → start sequence OR remove tag → stop sequence. Step 4: Build exclusion logic (if tag=bought, exclude from promo sequence). Step 5: Create master tag map document. Step 6: Test every automation path before going live."
        domains: [marketing-automation, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-028"
        title: "High-Ticket Application Funnel Build Protocol"
        description: "Step 1: Create VSL or webinar presenting the transformation and methodology (20-40 min). Step 2: CTA = Apply now button leading to application. Step 3: Application: 6-8 qualifying questions. Step 4: Thank you page: 'We'll review and get back to you within 48 hours.' Step 5: Review applications, approve qualified ones. Step 6: Send approved applicants to scheduling link. Step 7: Pre-call sequence (1 email with authority-building content). Step 8: Sales call."
        domains: [high-ticket-sales, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-029"
        title: "YouTube Channel Authority Building Protocol"
        description: "Month 1: Upload 4 videos (weekly) targeting top search queries in your niche. Month 2: Promote top-performing video with YouTube ads. Month 3: Create playlist of related videos, optimize for watch time. Month 4: Use YouTube ads to drive subscribers (low CPL compared to direct conversions). Month 5+: Retarget channel subscribers and video viewers with conversion offers. Authority compounds over time."
        domains: [youtube-ads, content-marketing]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MET-FK-030"
        title: "Rainmaker Certification Client Delivery Protocol"
        description: "Week 1-2: SANDOR Stated Objective + Assets (S + A). Week 3-4: SANDOR Numbers + Diagnosis (N + D). Week 5: Present diagnosis report and get agreement on ONE thing. Week 6-8: Implement ONE thing (with client's team or do it yourself). Week 9-10: Measure results against baseline. Week 11-12: Review results and prescribe next ONE thing (R). Repeat cycle indefinitely."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-031"
        title: "Promotion Planning Protocol"
        description: "6 weeks before: decide what to promote and set revenue goal. 4 weeks before: plan content (3-5 pre-launch value pieces). 2 weeks before: create or update sales page and order process. 1 week before: run pre-launch content sequence (no pitch). Launch day: email + social. Days 1-3: click sequences. Day 3: first deadline. Days 4-6: second deadline sequence. Day 6: second deadline. Days 7-9: third deadline sequence. Day 9: close."
        domains: [countdown-promotions, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 6"

      - id: "MET-FK-032"
        title: "Ad Account Recovery Protocol"
        description: "When CPA suddenly spikes: Step 1: Check for Facebook algorithm changes (check announcements). Step 2: Check creative frequency (pause if above 3.0). Step 3: Check landing page for errors. Step 4: Check payment processor for cart abandonment spike. Step 5: Check email sequences (did something stop sending?). Step 6: Pause worst-performing ad sets. Step 7: Introduce fresh creative to winning audiences. If none work: reduce budget and wait 72 hours for algorithm to restabilize."
        domains: [campaign-troubleshooting, facebook-ads]
        source_id: "FK-RC"
        source_week: "Week 5"

      - id: "MET-FK-033"
        title: "New Market Entry Protocol"
        description: "Step 1: Identify existing offer that solves a problem in the new market. Step 2: Research 5 top competitors in that market (Facebook Ad Library + YouTube). Step 3: Identify gaps and angles they're not using. Step 4: Adapt core offer messaging for new market language and pain points. Step 5: Launch test campaign $100/day to 3 audiences. Step 6: Measure CPA vs target. Step 7: If profitable, scale. If not, test new angle before abandoning."
        domains: [paid-advertising, scaling]
        source_id: "FK-RC"
        source_week: "Week 7"

      - id: "MET-FK-034"
        title: "Webinar Technical Setup Protocol"
        description: "Equipment: webcam (Logitech C920 minimum), USB microphone, ring light, clean background. Platform: Zoom Webinar or WebinarJam. Pre-webinar: test audio/video 30 min before, have slides ready, have offer page URL ready to paste in chat. During: go live 10 min early, engage early arrivals, start recording immediately. Post: export recording, upload to delivery page within 24 hours, activate replay sequence."
        domains: [webinar-sales, video-production]
        source_id: "FK-RC"
        source_week: "Week 2"

      - id: "MET-FK-035"
        title: "Customer Ascension Protocol"
        description: "Step 1: After initial purchase, tag as buyer. Step 2: Send 3-email onboarding sequence (welcome, quick win, what's next). Step 3: 2 weeks post-purchase: offer order bump product they didn't take (repackage as standalone). Step 4: 30 days: offer next level product (OTO1 if they didn't take it). Step 5: 60 days: offer main backend offer. Step 6: 90 days: request testimonial and referrals. Each step triggers only if they haven't already purchased."
        domains: [customer-acquisition, email-marketing]
        source_id: "FK-RC"
        source_week: "Week 3"

      - id: "MET-FK-036"
        title: "Facebook Pixel Setup and Verification Protocol"
        description: "Step 1: Create pixel in Events Manager. Step 2: Install on all funnel pages (use partner integration or manual code). Step 3: Create standard events: ViewContent (landing pages), AddToCart (order form step 1), InitiateCheckout (order form step 2), Purchase (thank you page). Step 4: Verify with Facebook Pixel Helper Chrome extension. Step 5: Create Custom Audiences based on each event. Step 6: Test purchase event by placing test order."
        domains: [facebook-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 4"

      - id: "MET-FK-037"
        title: "YouTube Conversion Tracking Setup Protocol"
        description: "Step 1: Link Google Ads to Google Analytics 4. Step 2: Create conversion actions in Google Ads (purchase, lead, call). Step 3: Import GA4 goals as conversion actions OR install Google Ads conversion tag directly on thank you pages. Step 4: Link YouTube channel to Google Ads account. Step 5: Enable auto-tagging. Step 6: Verify conversions are recording in Google Ads dashboard. Step 7: Set up attribution modeling (data-driven preferred)."
        domains: [youtube-ads, conversion-tracking]
        source_id: "FK-RC"
        source_week: "Week 8"

      - id: "MET-FK-038"
        title: "Consulting Discovery Call Protocol"
        description: "Minutes 0-5: intro and rapport. Minutes 5-15: their current situation (what are you doing, what's working, what's not). Minutes 15-25: their goal (if everything went perfectly, what would that look like?). Minutes 25-35: SANDOR quick diagnosis (assets inventory, identify GOO). Minutes 35-45: preview of your prescription. Minutes 45-50: describe your program and investment. Minutes 50-60: next steps and close. Never go past 60 minutes."
        domains: [consulting-methodology, high-ticket-sales]
        source_id: "FK-RC"
        source_week: "Week 10"

      - id: "MET-FK-039"
        title: "Competitive Intelligence Audit Protocol"
        description: "Step 1: Open Facebook Ad Library and search top 5 competitors. Step 2: Screenshot all active ads, sort by longest-running (60+ days = proven winners). Step 3: Click each ad and map the full funnel (landing page → opt-in → email → sales page → checkout). Step 4: Subscribe to each competitor's email list with a dedicated email. Step 5: Track their email sequences for 14 days (frequency, offers, deadlines). Step 6: Document all findings in a competitive analysis spreadsheet. Step 7: Identify 3 gaps or angles competitors are not exploiting. Step 8: Design your campaigns to exploit these gaps."
        domains: [competitive-intelligence, marketing-strategy]
        source_id: "FK-OT"
        source_week: "Week 1"

      - id: "MET-FK-040"
        title: "IBB Content Creation Protocol"
        description: "Step 1: Choose one of your 3-5 core themes. Step 2: Write a one-sentence hook (pattern interrupt or bold claim) -- this is the Intro. Step 3: Outline 1-2 minutes of genuine value -- teach one specific thing, share one relevant story, or present one piece of proof. This is the Body. Step 4: Write a 15-30 second Bridge transition to your CTA. Step 5: Record on phone (selfie mode, natural lighting, no script -- just outline). Step 6: Keep total under 3 minutes for social, under 10 for YouTube. Step 7: Post with caption that restates the hook."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MET-FK-041"
        title: "Content Batching Recording Protocol"
        description: "Step 1: Block 60 minutes on calendar (no interruptions). Step 2: List 12-15 content topics from your 3-5 core themes. Step 3: Write one-line hook for each. Step 4: Set up phone on tripod (selfie mode, good lighting, clean background). Step 5: Record each piece back-to-back -- no breaks, no re-takes, no editing between. Step 6: Each piece follows IBB: hook → value → CTA. Step 7: Target 1-3 minutes per piece. Step 8: Send all files to editor for captions and thumbnails. Output: 2-3 weeks of daily content from one hour."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MET-FK-042"
        title: "Vortex Audience Building Protocol"
        description: "Step 1: Create custom audiences for all content consumers (video viewers 50%+, page visitors, post engagers) across all platforms. Step 2: Post daily content following Three Pillars calendar. Step 3: Boost top-performing organic posts to lookalike audiences ($10-20/day). Step 4: Run dedicated content ads to cold audiences (20% of ad budget). Step 5: Build retargeting audiences from all content consumers. Step 6: Hit retargeting audiences with direct offers. Step 7: Measure type-in traffic and brand search volume monthly -- should increase proportionally with content spend."
        domains: [audience-building, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MET-FK-043"
        title: "Episodic Ad Campaign Launch Protocol"
        description: "Step 1: Write 4 ad scripts following episode arc (Ep1: problem, Ep2: exploration, Ep3: solution+proof, Ep4: offer). Step 2: Record all 4 episodes in one session (IBB format each). Step 3: Launch Ep1 to cold audience ($50-100/day). Step 4: After 72 hours, create custom audience of 50%+ viewers. Step 5: Launch Ep2 to Ep1 viewers only. Step 6: Repeat cascade for Ep3 and Ep4. Step 7: Track cost per completed episode and cost per conversion. Step 8: Refresh episodes monthly."
        domains: [youtube-advertising, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MET-FK-044"
        title: "Yeah-Buts/What-Ifs Research Protocol"
        description: "Step 1: Survey 20-50 prospects or past leads who didn't buy. Ask: 'What stopped you from purchasing?' Step 2: Categorize responses into Yeah-Buts (logical objections) and What-Ifs (emotional fears). Step 3: Rank by frequency. Step 4: For top 5 Yeah-Buts, create proof elements (testimonials, data, case studies). Step 5: For top 5 What-Ifs, create safety elements (guarantees, support commitments, risk reversal). Step 6: Integrate Yeah-But proof into sales copy. Step 7: Integrate What-If safety into follow-up emails and retargeting ads."
        domains: [selling-psychology, copywriting]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MET-FK-045"
        title: "Google Full-Funnel Campaign Setup Protocol"
        description: "Step 1: Create YouTube channel and link to Google Ads. Step 2: Set up conversion tracking (purchase, lead, phone call). Step 3: Campaign 1 -- YouTube Discovery (awareness): target broad interests, $30/day. Step 4: Campaign 2 -- YouTube In-Stream (consideration): target custom intent audiences, $30/day. Step 5: Campaign 3 -- Google Search (intent capture): target brand + competitor + problem keywords, $40/day. Step 6: Campaign 4 -- Display Remarketing: target all site visitors + video viewers, $20/day. Step 7: Review all 4 campaigns weekly. Step 8: Scale campaigns individually based on CPA."
        domains: [youtube-advertising, paid-advertising]
        source_id: "FK-OT"
        source_week: "Week 2"

      - id: "MET-FK-046"
        title: "Billion Dollar VSL Production Protocol"
        description: "Step 1: Write the 12-section VSL script following the Billion Dollar framework (60-90 pages). Step 2: Record section by section (not all at once). Step 3: Use teleprompter for key sections (credibility, offer stack, close). Step 4: Speak naturally for story and problem sections (no teleprompter). Step 5: Film in simple setting (desk, bookshelf background). Step 6: Edit together with minimal graphics (text overlays for key points only). Step 7: Add background music (subtle, not distracting). Step 8: Create separate version with slides for automated webinar use. Step 9: Test with warm audience first ($500 ad spend). Step 10: If conversion rate > 1%, scale to cold traffic."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MET-FK-047"
        title: "Double Tap Campaign Execution Protocol"
        description: "Step 1: Create value-based content piece (webinar, training, or video series) -- this is Prong 1. Step 2: Launch Prong 1 to target audience (ads + email). Step 3: Wait exactly 48 hours after Prong 1 delivery. Step 4: Create direct sales copy (VSL, sales letter, or short offer page) -- this is Prong 2. Step 5: Launch Prong 2 to SAME audience via email + retargeting ads. Step 6: Run Prong 2 with 5-day deadline stack. Step 7: Track which prong each buyer came from. Step 8: Calculate total campaign ROI combining both prongs."
        domains: [campaign-architecture, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MET-FK-048"
        title: "Long-Form Sales Letter Writing Protocol"
        description: "Step 1: Research -- read 50+ testimonials and customer conversations. Step 2: Write 25 headline variations (pick best 3 to test). Step 3: Write lead/opening using damaging admission or bold story. Step 4: Problem identification -- describe their pain in their exact words. Step 5: Agitation -- show consequences of not acting. Step 6: Credibility section -- your story + results. Step 7: Solution introduction + mechanism. Step 8: Benefits deep-dive (features translated to emotions). Step 9: Proof stack (5 types minimum). Step 10: Offer stack with individual values. Step 11: Price anchor → reveal. Step 12: Guarantee (specific, not generic). Step 13: Close with urgency. Step 14: Let it rest 24 hours, then edit ruthlessly."
        domains: [copywriting, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MET-FK-049"
        title: "Damaging Admission Copy Protocol"
        description: "Step 1: List your offer's 3 biggest weaknesses or limitations. Step 2: Pick the one that's most obvious (prospects already suspect it). Step 3: Write a 2-3 paragraph section addressing it head-on within the first 500 words. Step 4: Explain WHY the limitation exists. Step 5: Show how you compensate for it (turn weakness into strength). Step 6: Transition immediately into your strongest proof. Step 7: The contrast between honesty and proof makes the proof 2-3x more believable."
        domains: [copywriting-philosophy, sales-process-design]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MET-FK-050"
        title: "Price Anchoring Stack Protocol"
        description: "Step 1: List every component of your offer (main product + all bonuses). Step 2: Assign a credible individual value to each component (what it would sell for standalone). Step 3: Present each component with its value on the sales page. Step 4: Show running total as you stack ('Total value so far: $12,847'). Step 5: Cross out the high total. Step 6: Reveal actual price (should be 5-10% of stacked value). Step 7: Immediately follow with guarantee. Step 8: Add urgency element (deadline, limited spots, price increase)."
        domains: [pricing-psychology, offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 3"

      - id: "MET-FK-051"
        title: "Identity Shift Selling Protocol"
        description: "Step 1: Define current identity of your ideal prospect ('You're a consultant making $10K/month who knows you should be making $50K'). Step 2: Define aspirational identity ('You become the consultant who has clients coming to you'). Step 3: Describe the gap between the two in emotional terms. Step 4: Position your product as the bridge ('This is how you go from here to there'). Step 5: Use 'you become' language throughout copy. Step 6: Show 3+ examples of people who made the identity shift. Step 7: Make the purchase itself feel like the first act of the new identity."
        domains: [selling-psychology, offer-strategy]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MET-FK-052"
        title: "Greased Chute Funnel Build Protocol"
        description: "Step 1: Design landing page with single CTA button (no navigation, no menu, no distractions). Step 2: CTA goes directly to order form (pre-populate email if possible). Step 3: Order form has maximum 6 fields + bump offer checkbox. Step 4: Thank you page = Upsell 1 (one-click purchase, 60-second page). Step 5: If Upsell 1 accepted → Upsell 2. If declined → Downsell (lighter version). Step 6: Final thank you page with onboarding instructions. Step 7: Test entire path with 3 test purchases. Step 8: Target: 3 clicks or fewer from ad to purchase complete."
        domains: [sales-funnels, conversion-tracking]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MET-FK-053"
        title: "Email Deadline Stack Execution Protocol"
        description: "Setup: Create offer page with real deadline timer. Day 1: 8AM email (announcement + big promise). 12PM email (story + proof). Day 2: 8AM email (benefits deep-dive). 12PM email (FAQ + objection handling). Day 3: 8AM email (testimonial spotlight). 12PM email (stack the value). Day 4: 8AM email (urgency building). 12PM email (scarcity -- limited spots or bonuses expiring). Day 5: 8AM (last chance morning), 10AM (reminder), 12PM (countdown), 9PM (hours left), 10PM (final call), 11PM (literally closing). Total: 14 emails. Page truly expires at midnight."
        domains: [email-marketing, deadline-sequences]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MET-FK-054"
        title: "Upsell Sequence Build Protocol"
        description: "Step 1: Main offer purchase completes. Step 2: Immediately present Upsell 1 (complementary product, 60-second video + 3 bullets + yes/no buttons). Step 3: If YES → present Upsell 2 (premium/VIP, same format). Step 4: If Upsell 1 NO → present Downsell (lighter version at lower price, same format). Step 5: After upsell sequence → final thank you with onboarding. Step 6: Tag buyer in email system with all purchases. Step 7: Buyers who declined upsells get email offer for those products 14 days later (different angle). Step 8: Track upsell take rates -- target 20-30% for Upsell 1, 10-15% for Upsell 2."
        domains: [monetization, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MET-FK-055"
        title: "Buyer Segmentation Setup Protocol"
        description: "Step 1: Create email tags for each purchase level (loss leader buyer, main offer buyer, upsell buyer, premium buyer). Step 2: Create 4 separate email sequences. Step 3: Loss leader buyers → 7-day onboarding → re-offer main product they declined. Step 4: Main offer buyers → onboarding → upsell offer at Day 14. Step 5: Upsell buyers → premium support content → coaching/VIP offer at Day 30. Step 6: Premium buyers → retention content → referral request at Day 60. Step 7: Non-purchasers who clicked → nurture sequence → re-offer in 30 days. Step 8: Review segment conversion rates monthly."
        domains: [email-marketing, sales-funnels]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MET-FK-056"
        title: "Blue Ocean B&M Client Acquisition Protocol"
        description: "Step 1: Pick one vertical (dentists, restaurants, gyms, etc.). Step 2: Run Facebook ads targeting business owners in that vertical within 50-mile radius. Step 3: Offer a free SANDOR diagnostic audit of their digital marketing. Step 4: Conduct 30-minute audit (check their Google listing, Facebook presence, reviews, website, email). Step 5: Present findings with specific revenue opportunities. Step 6: Offer to implement fixes on monthly retainer ($1,500-3,000/month). Step 7: Document results as case study. Step 8: Use case study in ads to acquire next client in same vertical. Step 9: Repeat until you have 10 clients. Step 10: Only then expand to second vertical."
        domains: [consulting-methodology, client-acquisition]
        source_id: "FK-OT"
        source_week: "Week 4"

      - id: "MET-FK-057"
        title: "4DCM Weekly Execution Protocol"
        description: "Monday (Day 1 -- Plan): Review analytics from previous week. Identify top-performing themes. Outline 12-15 new content pieces across 3-5 themes. Write one-line hook for each. Tuesday (Day 2 -- Record): Set up phone on tripod. Record all 12-15 pieces back-to-back (45-60 min total). Send files to editor. Wednesday (Day 3 -- Edit): Editor adds captions, thumbnails, and formatting. Review and approve. Thursday (Day 4 -- Schedule): Schedule all pieces across platforms for next 2-3 weeks. Set up any paid amplification for top pieces. Friday-Sunday: Engage with comments and track performance."
        domains: [content-creation, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MET-FK-058"
        title: "YouTube Content Ad Launch Protocol"
        description: "Step 1: Record 3-5 content ad videos (3-10 min each, IBB format, valuable teaching). Step 2: Upload to YouTube channel with optimized titles and thumbnails. Step 3: Create Google Ads campaign (Video -- Brand awareness and reach). Step 4: Set targeting: interest-based + custom intent + competitor channel subscribers. Step 5: Budget: start at $30/day across all ads. Step 6: After 7 days, check view rates -- keep ads above 25%, pause below. Step 7: Monitor brand search volume in Google Trends weekly. Step 8: Create retargeting audience from all viewers (25%+ and 50%+ tiers). Step 9: Use retargeting audience for direct response campaigns."
        domains: [youtube-advertising, content-marketing]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MET-FK-059"
        title: "Redneck Analytics Weekly Review Protocol"
        description: "Every Monday, 15 minutes: Step 1: Open spreadsheet. Step 2: Enter last week's total ad spend (all platforms). Step 3: Enter last week's total revenue (all sources). Step 4: Calculate net (revenue - spend). Step 5: Calculate ROAS (revenue / spend). Step 6: Enter cost per lead and cost per customer. Step 7: Compare to previous week (trending up or down?). Step 8: If net is positive and trending up → scale 20%. Step 9: If net is negative → diagnose (which campaign? which step?). Step 10: Update 30-day rolling ROAS. One screen, one spreadsheet, 15 minutes."
        domains: [financial-metrics, advertising-economics]
        source_id: "FK-OT"
        source_week: "Week 5"

      - id: "MET-FK-060"
        title: "Click-Countdown Campaign Cycle Protocol"
        description: "Phase 1 -- Click Phase (Days 1-10): Run content ads + lead magnets. Goal: build engaged email list and retargetable audience. No selling. Track leads acquired and content consumed. Phase 2 -- Countdown Phase (Days 11-15): Hit engaged audience with 5-day deadline stack (14 emails + retargeting ads). Real deadline expires at midnight Day 15. Phase 3 -- Reset (Days 16-17): Close offer, analyze results, plan next cycle. Day 18: Begin next Click Phase with fresh content angles. Repeat monthly for predictable revenue cycles."
        domains: [campaign-architecture, email-marketing]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "MET-FK-061"
        title: "Behavioral Trigger Automation Setup Protocol"
        description: "Step 1: Map all behavioral events in your funnel (email open, click, page visit, video view, cart add, cart abandon, purchase). Step 2: For each event, define an automated response. Step 3: Email click → tag as 'interested' → move to accelerated offer sequence. Step 4: Sales page visit → add to retargeting Tier 1 → trigger cart abandonment sequence if no purchase in 2 hours. Step 5: 75%+ video view → tag as 'highly engaged' → direct offer email next day. Step 6: No email open in 30 days → move to re-engagement sequence (3 emails: 'miss you' + value + final offer). Step 7: Purchase → remove from all promotional sequences → add to buyer onboarding. Step 8: Test all automations with test contacts before going live."
        domains: [behavioral-marketing, super-systems]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "MET-FK-062"
        title: "Super System Monthly Maintenance Protocol"
        description: "Week 1: Audit -- list all active automated campaigns and their performance (revenue, CPA, engagement). Flag any campaigns running more than 6 weeks without refresh. Week 2: Create -- build 2-3 fresh campaigns to replace flagged ones. New creative, new hooks, same proven offer structure. Week 3: Launch -- activate new campaigns, pause expired ones. Monitor daily for first 72 hours. Week 4: Optimize -- review all campaigns. Scale winners (20% budget increase). Pause losers (CPA > 2x target). Document results. Always maintain 3-5 active campaigns in rotation."
        domains: [super-systems, campaign-architecture]
        source_id: "FK-OT"
        source_week: "Bonus"

      - id: "MET-FK-063"
        title: "Dog Whistle Ad Writing Protocol"
        description: "Step 1: List 10 insider terms your ideal prospect uses daily (specific metrics, tools, frustrations). Step 2: Pick the most niche scenario only they experience. Step 3: Open the ad with that scenario: 'When your [insider term] does [insider thing]...' Step 4: Use their language throughout (not marketing speak). Step 5: Reference specific numbers from their world. Step 6: CTA is specific to their situation ('Download the [tool they'd actually use]'). Step 7: Test: show to 5 people outside your market -- if they're confused, you nailed it. Step 8: Run to broad audience -- the dog whistle will self-select."
        domains: [ad-copywriting, audience-targeting]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "MET-FK-064"
        title: "Results in Advance Ad Creation Protocol"
        description: "Step 1: Identify one specific, implementable tactic from your product. Step 2: Script a 3-5 minute ad that teaches that tactic completely (viewer can get a result from the ad alone). Step 3: Record with screen share or whiteboard (show, don't just tell). Step 4: Open with problem identification (10 sec). Step 5: Teach the tactic (2-3 min). Step 6: Show proof it works -- your results or client results (30 sec). Step 7: Bridge: 'This is just one of the 27 tactics in my full system...' Step 8: CTA: link to full product page. Step 9: Test 3 different opening hooks with same body."
        domains: [ad-copywriting, content-marketing]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "MET-FK-065"
        title: "FAQ Bridge Ad Creation Protocol"
        description: "Step 1: Collect top 5 questions/objections from prospects (survey, sales calls, comments). Step 2: Script the ad as a natural FAQ conversation. Step 3: Open: 'People always ask me these 3 questions...' Step 4: FAQ 1 (biggest objection) -- answer + mini-proof. Step 5: FAQ 2 (trust objection) -- answer + testimonial reference. Step 6: FAQ 3 (uniqueness objection) -- answer + differentiation. Step 7: Transition: 'Now that you know the truth about [topic]...' Step 8: CTA. Step 9: Keep total under 5 minutes. Step 10: Test: if prospects on sales calls stop asking these questions, the ad is doing its job."
        domains: [ad-copywriting, selling-psychology]
        source_id: "FK-AMM"
        source_day: "Day 1"

      - id: "MET-FK-066"
        title: "Ocean Pockets Discovery Protocol"
        description: "Step 1: Brainstorm 20 interest-based audiences related to your market (competitors, tools, influencers, topics). Step 2: Create 10 ad sets, each combining 2 related interests. Step 3: Use identical proven ad creative across all 10. Step 4: Set each to $10/day ($100/day total). Step 5: Run for 72 hours without touching. Step 6: After 72 hours, rank all 10 by CPA. Step 7: Kill bottom 7 ad sets. Step 8: Increase top 3 to $30/day each. Step 9: Within winning ad sets, test narrowing with demographics or behaviors. Step 10: Create lookalike audiences from converters in top ad sets (500+ conversions ideal)."
        domains: [audience-targeting, facebook-ads]
        source_id: "FK-AMM"
        source_day: "Day 2"

      - id: "MET-FK-067"
        title: "Multiple Objective Retargeting Setup Protocol"
        description: "Step 1: Create 4 retargeting audiences: (A) Cart abandoners, (B) Sales page visitors, (C) Content engagers (50%+ video viewers), (D) Email list. Step 2: Create ad sets for each audience with different creative: (A) Direct offer reminder + urgency, (B) Social proof testimonial ads, (C) Objection-handling FAQ ads, (D) Announcement + deadline ads. Step 3: Budget allocation: A=40%, B=30%, C=20%, D=10%. Step 4: Launch all four simultaneously. Step 5: Review weekly -- adjust budget toward highest-converting objective. Step 6: Refresh creative every 2 weeks to prevent fatigue. Step 7: Track CPA by retargeting tier separately."
        domains: [retargeting, campaign-architecture]
        source_id: "FK-AMM"
        source_day: "Day 3"

      - id: "MET-FK-068"
        title: "Ad Automation Rules Setup Protocol"
        description: "Step 1: In Facebook Ads Manager, go to Automated Rules. Step 2: Create Rule 1 (Scale Winners): If CPA < target AND spend > $50 for 3 consecutive days → increase daily budget by 20%. Step 3: Create Rule 2 (Cut Losers): If CPA > 2x target for 2 consecutive days → decrease daily budget by 30%. Step 4: Create Rule 3 (Fatigue Alert): If frequency > 3.0 → send notification + pause ad set. Step 5: Create Rule 4 (Dead Ad): If no conversions after $100 spend → pause ad. Step 6: Create Rule 5 (Scale Aggressively): If ROAS > 3x for 7 consecutive days → duplicate ad set to new campaign with 2x budget. Step 7: Review automated actions weekly. Step 8: Adjust rule thresholds quarterly based on performance trends."
        domains: [ad-automation, scaling]
        source_id: "FK-AMM"
        source_day: "Day 3"


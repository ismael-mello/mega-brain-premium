layers:
  L1_PHILOSOPHIES:
    count: 32
    next_id: "FIL-LA-211"
    elements:
      - id: "FIL-LA-001"
        title: "Escala vs Crescimento"
        description: "Escala e crescimento são coisas diferentes. Crescimento aumenta complexidade proporcionalmente. Escala permite crescer exponencialmente sem aumento proporcional de complexidade."
        source: "FTE/DIA_1:00:00-03:01"
        domains: ["scaling-campaigns"]
      - id: "FIL-LA-002"
        title: "Liberdade é Escolhas"
        description: "Liberdade real é quando você tem escolhas e faz o que quer. O segredo é encontrar demanda de público suficientemente grande que esteja disposto a pagar."
        source: "FTE/DIA_1:00:00-03:01"
        domains: ["scaling-campaigns"]
      - id: "FIL-LA-003"
        title: "Contra a Maré"
        description: "Enquanto todo mundo faz uma coisa, procurar outra para fazer. Atrair pessoas pela competência, não pela ostentação."
        source: "FTE/DIA_1:18:23-21:31"
        domains: ["paid-traffic"]
      - id: "FIL-LA-004"
        title: "Dinheiro Gosta de Discrição"
        description: "Os mais ricos não mostram o que têm. Ostentação funciona para volume mas atrai perfil errado."
        source: "FTE/DIA_1:21:32-24:37"
        domains: ["paid-traffic"]
      - id: "FIL-LA-005"
        title: "Caminho Certo é Estreito"
        description: "Burlar regra é lucrativo a curto prazo, não a longo. Contingência real é preparação para problemas, não tapar buraco."
        source: "FTE/DIA_1:09:04-12:12"
        domains: ["paid-traffic"]
      - id: "FIL-LA-006"
        title: "Amolar o Machado"
        description: "É muito mais sobre amolar o machado do que ficar cortando a árvore. Teoria que falta a 90% das pessoas é o que faz a diferença."
        source: "FTE/DIA_1:1:14:08-1:17:08"
        domains: ["paid-traffic"]
      - id: "FIL-LA-007"
        title: "Gerenciador NÃO é Para Mensurar Resultado Financeiro"
        description: "O gerenciador de anúncios não é o lugar para medir resultado financeiro. É para otimização. Mensurar financeiro deve ser na plataforma de pagamento."
        source: "FTE/DIA_2:2:07:51-2:10:51"
        domains: ["facebook-ads", "tracking"]
      - id: "FIL-LA-008"
        title: "Investidor vs Apostador de Tráfego"
        description: "Diferença fundamental entre ser investidor de tráfego (dados, regras, automação) e apostador (decisões emocionais, impulsivas)."
        source: "FTE/DIA_2:2:19:53-2:22:53"
        domains: ["paid-traffic"]
      - id: "FIL-LA-009"
        title: "Operacional é a Parte Mais Rápida"
        description: "Configurar campanha é a parte mais fácil. O que importa de verdade é a estratégia, a inteligência por trás."
        source: "FTE/DIA_3:2:21:58-2:24:58"
        domains: ["facebook-ads"]
      - id: "FIL-LA-010"
        title: "Ler Documentação Oficial"
        description: "A diferença é ler a documentação oficial do Facebook/Meta. Todo conteúdo deve ser embasado em documentação."
        source: "FTE/DIA_1:40:32-43:34"
        domains: ["facebook-ads", "meta-ads"]
      - id: "FIL-LA-011"
        title: "Teoria Antes da Prática"
        description: "Formação tem forte embasamento teórico antes de partir para a prática. Sem entender o conceito, só fica repetindo receitas."
        source: "FTE/DIA_1:43:35-46:36"
        domains: ["paid-traffic"]
      - id: "FIL-LA-012"
        title: "Não Terceirizar Responsabilidade"
        description: "A maioria terceiriza a responsabilidade quando resultados pioram — culpa a plataforma, a IA, o algoritmo."
        source: "FTE/DIA_1:06:01-09:04"
        domains: ["paid-traffic"]
      - id: "FIL-LA-101"
        title: "ROAS é o que Dá Crescimento"
        description: "Lucratividade supera volume. Vale mais 10 vendas de mil reais do que 100 de 10 reais. Foco na escala deve ser ROAS."
        source: "FTE/7Erros-Erro1"
        domains: ["roas-optimization", "scaling-campaigns"]
      - id: "FIL-LA-102"
        title: "Escalar Nem Sempre é Botar Mais Dinheiro"
        description: "Antes de aumentar investimento em tráfego, otimize infraestrutura. Possível dobrar retorno sem investir um real a mais."
        source: "FTE/7Erros-Erro3"
        domains: ["scaling-campaigns"]
      - id: "FIL-LA-103"
        title: "Tráfego Não é Loteria, é Método"
        description: "Tráfego é exato, trabalha com números. Os números estão aí para ajudar a planejar, metrificar e decidir."
        source: "FTE/AdsAcademy-Aula9"
        domains: ["paid-traffic"]
      - id: "FIL-LA-104"
        title: "Quem Chega Primeiro Bebe Água Limpa"
        description: "Não espere que plataformas implementem recursos avançados de tracking. Construa sua própria infraestrutura."
        source: "FTE/7Erros-Erro4"
        domains: ["tracking", "api-conversion"]
      - id: "FIL-LA-105"
        title: "Tráfego Não Faz Tudo Sozinho"
        description: "O resultado não depende apenas do tráfego. A infraestrutura é igualmente ou mais importante."
        source: "FTE/AdsAcademy-Aula9"
        domains: ["paid-traffic"]
      - id: "FIL-LA-106"
        title: "Comportamento é Mais Preciso que Interesse"
        description: "Na segmentação, comportamento (ações reais) é mais preciso que interesses (suposições) e demografia (dados declarados)."
        source: "FTE/SuperSegmentacao"
        domains: ["audience-segmentation"]
      - id: "FIL-LA-107"
        title: "O Segredo Está na Especificidade"
        description: "Quanto mais específico o direcionamento, menor o público mas maior a qualidade. Interseção de múltiplos critérios gera públicos muito mais qualificados."
        source: "FTE/SuperSegmentacao"
        domains: ["audience-segmentation"]
      - id: "FIL-LA-108"
        title: "Planejamento Inverso: de Baixo para Cima"
        description: "Planejamento deve ser feito do resultado final para trás. Comece pela meta de lucro, derive CPA máximo, calcule métricas necessárias."
        source: "FTE/AdsAcademy-Aula9"
        domains: ["campaign-control", "scaling-campaigns"]
      - id: "FIL-LA-109"
        title: "Momentos Distintos: Planejar, Construir, Medir"
        description: "Três momentos distintos na gestão de campanhas. Confundir esses momentos leva a decisões ruins."
        source: "FTE/MetricasPersonalizadas"
        domains: ["facebook-ads"]
      - id: "FIL-LA-110"
        title: "Automatize para Gerenciar em Escala"
        description: "Automação via IA e regras automáticas é o que permite gerenciar dezenas de produtos simultaneamente."
        source: "FTE/7Erros-Erro7"
        domains: ["automation", "scaling-campaigns"]
      - id: "FIL-LA-201"
        title: "O Jogo É ROAS, Não CPA"
        description: "O foco do negócio digital não é pagar menos por aquisição, é lucrar mais. CPA sempre vai subir — adapte-se aumentando ticket, conversão e LTV."
        source: "FTE/Encontro-04_04_2024:15:05-18:05"
        domains: ["roas-optimization"]
      - id: "FIL-LA-202"
        title: "Marketing Venceu — Não É Só Tráfego"
        description: "O jogo hoje é marketing completo: tráfego + copy + funil + tracking, tudo junto."
        source: "FTE/Encontro-04_04_2024:21:05-24:06"
        domains: ["paid-traffic"]
      - id: "FIL-LA-203"
        title: "Qualidade Primeiro, Quantidade Depois"
        description: "No início de campanha, foco em qualidade dos sinais e criativos, não volume."
        source: "FTE/Encontro-14_03_2024:1:36:16-1:39:16"
        domains: ["paid-traffic", "creative-testing"]
      - id: "FIL-LA-204"
        title: "Queira Fazer o Difícil — Baixa Concorrência"
        description: "Quanto mais complexo o trabalho (tracking, API, funil de eventos), menor a concorrência. Oceano azul na sofisticação técnica."
        source: "FTE/Encontro-04_04_2024:12:04-15:05"
        domains: ["tracking", "api-conversion"]
      - id: "FIL-LA-205"
        title: "O Profissional Que Não Usa IA Será Substituído"
        description: "A IA não vai substituir o profissional. O profissional que usa IA vai substituir o que não usa."
        source: "FTE/Encontro-21_03_2024:1:34:10-1:37:11"
        domains: ["automation"]
      - id: "FIL-LA-206"
        title: "Ninguém Quer Aprender Tracking — Mas É Indispensável"
        description: "Tracking é técnico e ninguém quer aprender. Mas é a vantagem competitiva do gestor de tráfego."
        source: "FTE/Encontro-29_05_2025:33:31-36:31"
        domains: ["tracking"]
      - id: "FIL-LA-207"
        title: "WIIFM — As Pessoas Só Se Importam Com Elas Mesmas"
        description: "Ao abordar clientes, use princípio WIIFM. Ofereça benefício, não sacrifício."
        source: "FTE/Encontro-11_04_2024:06:01-09:03"
        domains: ["paid-traffic"]
      - id: "FIL-LA-208"
        title: "Low Ticket Sem Funil Não Faz Sentido"
        description: "Vender produto de R$10 sem funil de extração (upsell, order bump, back-end) não faz sentido. CPA continuará subindo."
        source: "FTE/Encontro-29_05_2025:30:30-33:31"
        domains: ["scaling-campaigns"]
      - id: "FIL-LA-209"
        title: "Meta Quer Que Você Fique Dentro Dele"
        description: "O Meta ganha dinheiro com tempo do usuário dentro da plataforma. Cada clique para fora é perda."
        source: "FTE/Encontro-03_04_2025:18:13-21:23"
        domains: ["meta-ads", "facebook-ads"]
      - id: "FIL-LA-210"
        title: "Decisão Sem Dados É Achismo"
        description: "O mercado digital permite mensurar 95-97% de tudo. Não tomar decisões baseadas em dados é desperdiçar a maior vantagem do digital."
        source: "FTE/Encontro-04_04_2024:00:00-03:00"
        domains: ["paid-traffic"]

  L2_MENTAL_MODELS:
    count: 31
    next_id: "MM-LA-211"
    elements:
      - id: "MM-LA-001"
        title: "Analogia da Ferrari"
        description: "Facebook/Meta Ads é uma Ferrari. Precisa de: Combustível (dados/eventos), Estrada (infraestrutura), Piloto (estratégia)."
        source: "FTE/DIA_1:24:37-27:43"
        domains: ["facebook-ads", "scaling-campaigns"]
      - id: "MM-LA-002"
        title: "D-7 (Janela de 7 Dias)"
        description: "O sistema de otimização trabalha em D-7. Só últimos 7 dias importam. Pausar 7 dias zera tudo."
        source: "FTE/DIA_1:1:47:17-1:50:16"
        domains: ["facebook-ads"]
      - id: "MM-LA-003"
        title: "Analogia do Sniper (Tiro de Precisão)"
        description: "Com poucos eventos, precisa de muitos tiros até acertar. Com funil de eventos graduado, calibra muito mais rápido."
        source: "FTE/DIA_1:2:08:24-2:14:24"
        domains: ["event-funnel", "tracking"]
      - id: "MM-LA-004"
        title: "Feed Invisível"
        description: "O feed do Instagram/Facebook não existe abaixo do que você vê. A IA monta o feed dinamicamente em tempo real."
        source: "FTE/DIA_1:52:45-55:51"
        domains: ["meta-ads"]
      - id: "MM-LA-005"
        title: "Palco vs Bastidor"
        description: "A rede social sobrevive de palco (dopamina). Interesses do usuário são formados por comportamento na rede E fora dela."
        source: "FTE/DIA_1:58:56-1:04:59"
        domains: ["audience-segmentation"]
      - id: "MM-LA-006"
        title: "Evento de Conversão vs Atribuição"
        description: "Evento é quantitativo (quantas vendas). Atribuição é qualidade. Otimização foca em atribuição, não em quantidade."
        source: "FTE/DIA_1:1:29:10-1:32:10"
        domains: ["tracking", "api-conversion"]
      - id: "MM-LA-007"
        title: "Hierarquia de Eventos"
        description: "Eventos têm hierarquia natural de valor: Page View < View Content < Lead < Add to Cart < Purchase < Subscribe."
        source: "FTE/DIA_1:2:17:24-2:23:26"
        domains: ["event-funnel"]
      - id: "MM-LA-008"
        title: "Toda Campanha Começa Para Alcance"
        description: "Independente do objetivo, toda campanha começa buscando alcance/impressão primeiro. Depois desce no funil."
        source: "FTE/DIA_1:1:53:18-1:56:17"
        domains: ["facebook-ads"]
      - id: "MM-LA-009"
        title: "Dividir Para Conquistar"
        description: "Quando campanha tem problema, dividir em etapas do funil e resolver cada etapa isoladamente."
        source: "FTE/DIA_2:1:09:53-1:12:54"
        domains: ["campaign-control"]
      - id: "MM-LA-010"
        title: "Volume vs Valor"
        description: "Facebook prioriza VALOR sobre VOLUME quando ativado. 4 vendas de R$500 > 10 vendas de R$200."
        source: "FTE/DIA_2:2:04:51-2:07:51"
        domains: ["bid-strategy", "roas-optimization"]
      - id: "MM-LA-011"
        title: "Combinação Fatal"
        description: "Estratégia 'volume mais alto' + orçamento diário é a combinação fatal que impede escala."
        source: "FTE/DIA_2:1:46:33-1:52:35"
        domains: ["bid-strategy"]
      - id: "MM-LA-012"
        title: "Interesse = Interseção, NÃO União"
        description: "Segmentação por interesses deve usar interseção matemática, não união."
        source: "FTE/DIA_2:3:17:12-3:23:12"
        domains: ["audience-segmentation"]
      - id: "MM-LA-013"
        title: "Demográfico/Interesse/Comportamento"
        description: "Três camadas de segmentação com precisão decrescente. Topo = interesse. Meio = comportamento. Fundo = demográfico."
        source: "FTE/DIA_3:2:24:58-2:27:52"
        domains: ["audience-segmentation"]
      - id: "MM-LA-101"
        title: "Modelo dos Dois KPIs"
        description: "Controle: KPI primário = CPA, secundário = ROAS. Escala: inverte. Erro comum é usar CPA na escala."
        source: "FTE/7Erros-Erro1"
        domains: ["campaign-control", "roas-optimization"]
      - id: "MM-LA-102"
        title: "Controle vs Teste (Conceito Estatístico)"
        description: "Quando inicia campanhas, não se faz teste — faz-se controle (linha de base). Teste compara hipótese contra controle."
        source: "FTE/7Erros-Erro3"
        domains: ["campaign-control"]
      - id: "MM-LA-103"
        title: "Combinação Mortal (Lance + Orçamento Diário)"
        description: "Volume Mais Alto + orçamento diário é a combinação mortal que impede escala."
        source: "FTE/7Erros-Erro5"
        domains: ["bid-strategy"]
      - id: "MM-LA-104"
        title: "Funil como Indicadores Preditivos"
        description: "Cada etapa do funil funciona como indicador preditivo do resultado final."
        source: "FTE/MetricasPersonalizadas"
        domains: ["campaign-control"]
      - id: "MM-LA-105"
        title: "Três Níveis de Direcionamento"
        description: "Comportamento > Interesse > Demografia. Devem ser tratados como compartimentos separados."
        source: "FTE/SuperSegmentacao"
        domains: ["audience-segmentation"]
      - id: "MM-LA-106"
        title: "Valor > Volume (Evolução da Conta)"
        description: "Contas novas começam com Volume. Após 30 conversões com 2+ valores, muda para Valor ou Volume."
        source: "FTE/7Erros-Erro5"
        domains: ["bid-strategy"]
      - id: "MM-LA-107"
        title: "Gerenciador é para Criar, Relatório é para Medir"
        description: "Gerenciador = construção. Análise e Relatórios = mensuração. Confundir leva a decisões incompletas."
        source: "FTE/MetricasPersonalizadas"
        domains: ["facebook-ads"]
      - id: "MM-LA-108"
        title: "Interseção de Conjuntos na Segmentação"
        description: "Segmentação avançada funciona como interseção de conjuntos matemáticos. 17 milhões viram poucos milhares."
        source: "FTE/SuperSegmentacao"
        domains: ["audience-segmentation"]
      - id: "MM-LA-201"
        title: "Modelo D-Menos (Otimização é D-1)"
        description: "O que acontece hoje é resultado do aprendizado de ontem. Não existe otimização em tempo real."
        source: "FTE/Encontro-14_03_2024:27:06-30:06"
        domains: ["facebook-ads"]
      - id: "MM-LA-202"
        title: "Funil de Métricas: Topo Prevê Fundo"
        description: "Cada etapa do funil tem taxa de conversão que revela eficiência. Analisando do topo, prevê resultado final."
        source: "FTE/Encontro-14_03_2024:39:10-42:10"
        domains: ["campaign-control"]
      - id: "MM-LA-203"
        title: "Ciclos de 7 Dias"
        description: "Meta trabalha em ciclos de 7 dias. Semana 1→2→3 estabiliza→semana 4 é CPA real."
        source: "FTE/Encontro-21_03_2024:15:23-18:25"
        domains: ["facebook-ads"]
      - id: "MM-LA-204"
        title: "Alvo de Conversões"
        description: "Cada evento do pixel é anel do alvo. Mais eventos intermediários = otimização mais precisa."
        source: "FTE/Encontro-21_03_2024:06:05-09:14"
        domains: ["event-funnel"]
      - id: "MM-LA-205"
        title: "Fórmula V×C×F antes do L (J. Abraham)"
        description: "Primeiro aumente Conversão, Ticket e Frequência. Só depois escale com mais Leads."
        source: "FTE/Encontro-04_04_2024:09:04-12:04"
        domains: ["scaling-campaigns"]
      - id: "MM-LA-206"
        title: "Funil de Consciência nos Criativos"
        description: "5 níveis de consciência determinam tipo de criativo. Topo fala do problema; fundo fala da oferta."
        source: "FTE/Encontro-21_03_2024:27:37-30:37"
        domains: ["creative-testing"]
      - id: "MM-LA-207"
        title: "Hash de Criativo"
        description: "Todo criativo no Meta vira hash. IA reconhece áudio, vídeo, imagem, texto. Brand forte = IA entrega mais."
        source: "FTE/Encontro-21_03_2024:1:19:07-1:22:09"
        domains: ["creative-testing", "meta-ads"]
      - id: "MM-LA-208"
        title: "Texto É o Sinal Mais Rápido"
        description: "Elemento mais rápido que Meta interpreta no criativo é o texto. Mais importante que qualidade visual."
        source: "FTE/Encontro-29_05_2025:39:31-42:32"
        domains: ["creative-testing"]
      - id: "MM-LA-209"
        title: "Bounce Rate do Meta — Punição"
        description: "Quando Meta manda tráfego e pessoa não converte, CPM sobe, qualidade cai, aparece em posicionamentos baratos."
        source: "FTE/Encontro-02_05_2024:27:21-33:21"
        domains: ["facebook-ads"]
      - id: "MM-LA-210"
        title: "Funil Duplo: Página + Checkout"
        description: "Toda estrutura de venda tem dois funis encadeados: funil da página de vendas e funil do checkout."
        source: "FTE/Encontro-05_06_2025:35:56-39:00"
        domains: ["event-funnel"]

  L3_HEURISTICS:
    count: 56
    next_id: "HEUR-LA-218"
    elements:
      - id: "HEUR-LA-001"
        title: "Princípio 80-10-10"
        description: "Connect Rate >= 80%, Conversão LP >= 10%, Conversão Checkout >= 10%. Se qualquer item abaixo, NÃO ESCALE."
        source: "FTE/DIA_2:1:18:59-1:22:00"
        domains: ["campaign-control", "scaling-campaigns"]
        numeric_value: "80/10/10"
      - id: "HEUR-LA-002"
        title: "Conversão Global Mínima 1%"
        description: "Conversão global mínima (visitas/compras) deve ser pelo menos 1%."
        source: "FTE/DIA_2:1:22:01-1:25:02"
        domains: ["campaign-control"]
        numeric_value: "1%"
      - id: "HEUR-LA-003"
        title: "Escala Cadenciada 15%/Dia"
        description: "Na escala cadenciada, aumentar no máximo 15% do orçamento por dia (máximo 20%). Regra automática a cada 12h."
        source: "FTE/DIA_2:2:55:57-2:58:57"
        domains: ["scaling-campaigns"]
        numeric_value: "15%/dia max 20%"
      - id: "HEUR-LA-004"
        title: "Horário de Escala = 5h da Manhã"
        description: "Escalar orçamento às 5h da manhã. Nunca à meia-noite."
        source: "FTE/DIA_2:2:55:57-2:58:57"
        domains: ["scaling-campaigns"]
        numeric_value: "5:00 AM"
      - id: "HEUR-LA-005"
        title: "Decisão com 3 Dias Mínimo"
        description: "Tomar decisão com 1 dia é a pior decisão possível. Ciclo de teste 7 dias máximo, decisão com 3 mínimo."
        source: "FTE/DIA_2:1:43:29-1:46:33"
        domains: ["campaign-control"]
        numeric_value: "3 dias mín, 7 dias máx"
      - id: "HEUR-LA-006"
        title: "Pixel = 40-60% da Otimização"
        description: "Pixel sozinho representa 40-60% da otimização. API de conversões necessária para 90%."
        source: "FTE/DIA_1:1:29:10-1:32:10"
        domains: ["tracking", "api-conversion"]
        numeric_value: "40-60% pixel, 90% com API"
      - id: "HEUR-LA-007"
        title: "Pausar 7 Dias = Zerar Otimização"
        description: "Pausar conjunto por 7+ dias volta para fase de aprendizado do zero."
        source: "FTE/DIA_1:1:59:21-2:02:20"
        domains: ["facebook-ads"]
        numeric_value: "7 dias = reset"
      - id: "HEUR-LA-008"
        title: "Orçamento Mínimo R$5 por Anúncio"
        description: "No mínimo R$5 por anúncio dentro do conjunto. 3 anúncios = R$15 mínimo."
        source: "FTE/DIA_2:3:11:06-3:14:10"
        domains: ["facebook-ads"]
        numeric_value: "R$5/anúncio"
      - id: "HEUR-LA-009"
        title: "3 a 5 Anúncios por Conjunto"
        description: "Trabalhar com 3 a 5 anúncios por conjunto. Nunca misturar imagem com vídeo."
        source: "FTE/DIA_2:3:11:06-3:14:10"
        domains: ["creative-testing"]
        numeric_value: "3-5"
      - id: "HEUR-LA-010"
        title: "3 a 5 Conjuntos por Campanha"
        description: "Trabalhar com 3 a 5 conjuntos por campanha. Mais que 5 = nova campanha."
        source: "FTE/DIA_2:3:08:01-3:11:05"
        domains: ["campaign-control"]
        numeric_value: "3-5"

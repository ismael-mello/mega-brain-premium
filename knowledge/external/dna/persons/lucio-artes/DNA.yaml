        description: "Pausar conjunto por 7+ dias volta para fase de aprendizado do zero."
        source: "FTE/DIA_1:1:59:21-2:02:20"
        domains: ["facebook-ads"]
        numeric_value: "7 dias = reset"
      - id: "HEUR-LA-008"

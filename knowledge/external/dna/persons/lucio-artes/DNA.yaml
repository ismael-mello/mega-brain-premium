  L4_FRAMEWORKS:
    count: 71
    next_id: "FW-LA-072"
    elements:
      - id: "FW-LA-001"
        title: "Framework da Ferrari"
        description: "Três elementos: Combustível (qualidade eventos + API), Estrada (infraestrutura), Piloto (estratégia)."
        source: "FTE/DIA_1:24:37-30:53"
        domains: ["scaling-campaigns"]
      - id: "FW-LA-002"
        title: "Funil de Eventos"
        description: "Hierarquia completa de eventos: PageView > ViewContent > Scroll > Lead > AddToCart > InitiateCheckout > Purchase > Subscribe."
        source: "FTE/DIA_1:2:08:24-2:26:28"
        domains: ["event-funnel", "tracking"]
      - id: "FW-LA-003"
        title: "Princípio 80-10-10 (Planilha Preditiva)"
        description: "Ferramenta preditiva: CR >= 80%, Conv LP >= 10%, Conv Checkout >= 10%. Simular antes de escalar."
        source: "FTE/DIA_2:1:18:59-1:28:03"
        domains: ["campaign-control"]
      - id: "FW-LA-004"
        title: "Campanha de Controle"
        description: "ABO, orçamento total, 3-7 dias, maximizar conversões. Testar públicos diversos."
        source: "FTE/DIA_2:1:15:58-1:22:00"
        domains: ["campaign-control"]
      - id: "FW-LA-005"
        title: "Campanha de Escala (CPA + ROAS)"
        description: "Após controle, escala com melhor público. CPA: começar baixo e subir. ROAS: começar alto e descer."
        source: "FTE/DIA_3:2:39:58-2:51:58"
        domains: ["scaling-campaigns", "bid-strategy"]
      - id: "FW-LA-006"
        title: "Escala Cadenciada (3 Regras)"
        description: "Regra 1: +15% se CPA < meta. Regra 2: -30% se CPA entre meta e teto. Regra 3: pausar se CPA > teto."
        source: "FTE/DIA_3:2:30:58-2:39:58"
        domains: ["scaling-campaigns", "automation"]
      - id: "FW-LA-007"
        title: "Recálculo de Orçamento Total"
        description: "Para estender campanha: média diária × dias + orçamento existente. NÃO volta aprendizado."
        source: "FTE/DIA_2:2:55:57-3:08:01"
        domains: ["campaign-control"]
      - id: "FW-LA-008"
        title: "Análise Gráfica de Escala"
        description: "Gráfico eixo X=custo, Y=conversões. Quando curva quebra = limite ideal de escala."
        source: "FTE/DIA_2:3:29:12-3:35:14"
        domains: ["scaling-campaigns"]
      - id: "FW-LA-009"
        title: "Power 5 / Performance 5"
        description: "Framework Meta: simplificação, criativo DR, diversificação, qualidade API, eventos redundantes."
        source: "FTE/DIA_1:30:54-46:36"
        domains: ["facebook-ads", "meta-ads"]
      - id: "FW-LA-010"
        title: "Pre-cel para WhatsApp"
        description: "Anúncio > mini página com formulário > botão WhatsApp. Evento Contato no botão."
        source: "FTE/DIA_3:1:18:11-1:24:11"
        domains: ["paid-traffic"]
      - id: "FW-LA-011"
        title: "Métricas Customizadas"
        description: "Connect Rate, Conversão LP, Conversão Checkout, Lucro R$, Lucro %, Conversão Global."
        source: "FTE/DIA_2:2:31:55-2:37:53"
        domains: ["campaign-control"]
      - id: "FW-LA-012"
        title: "Subscribe > Purchase para Recorrência"
        description: "Evento Subscribe com predicted_ltv para assinaturas. Facebook busca clientes que ficam."
        source: "FTE/DIA_1:2:17:24-2:20:24"
        domains: ["event-funnel"]
      - id: "FW-LA-101"
        title: "3 Fases de Escala (Controle > S1 > S2)"
        description: "Controle (10-20%), S1 (50% orçamento, descobrir lance/público/criativo), S2 (ajustes + automação)."
        source: "FTE/7Erros-Erro2"
        domains: ["scaling-campaigns"]
      - id: "FW-LA-102"
        title: "Estratégias de Lance por Fase"
        description: "Gastos para controle. Metas (CPA/ROAS) para escala. Lance manual para 90+ dias."
        source: "FTE/7Erros-Erro5"
        domains: ["bid-strategy"]
      - id: "FW-LA-103"
        title: "Funil de Eventos para API"
        description: "Construir funil completo em vez de só PageView > Purchase. Cada evento melhora otimização."
        source: "FTE/7Erros-Erro4"
        domains: ["event-funnel", "api-conversion"]
      - id: "FW-LA-104"

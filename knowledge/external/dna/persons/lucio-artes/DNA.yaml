        domains: ["roas-optimization"]
      - id: "HEUR-LA-012"
        title: "Orçamento Controle = 10-20% do Total"
        description: "Campanha de controle recebe 10-20% do orçamento mensal."
        source: "FTE/DIA_2:2:52:57-2:55:57"
        domains: ["campaign-control"]
        numeric_value: "10-20%"
      - id: "HEUR-LA-013"
        title: "Frequência Acima de 3-4 = Novo Criativo"
        description: "Não se preocupe com frequência até 3. Acima de 4, testar novo criativo."

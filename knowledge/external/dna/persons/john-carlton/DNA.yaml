  synthesis:
    one_liner: "Sell through dramatic true stories featuring a fascinating character who discovered an amazing secret — systematically researched, written with empathy for the prospect's real psychology, and structured as a frictionless grease slide from headline to close."
    core_question: "Have you done the deep research, identified the real prospect psychology, written with genuine empathy, and structured every element as a frictionless grease slide that makes NOT buying feel like the dangerous choice?"
    greatest_contribution: "Pioneered both the third-party narrator sales letter format AND the Simple Writing System — a complete 17-step systematic process that eliminates writer's block and produces high-converting copy through research, empathy, and disciplined structure."
    blind_spot: "Heavy reliance on long-form physical mail format in Best Ads examples — SWS2 addresses adaptation to modern formats but core instinct favors long-form storytelling."
    declared_bias: "Favors visceral storytelling over data-driven copy; prioritizes emotional impact, specificity, and bold positioning over safe corporate-style messaging. Believes empathy is the #1 selling skill."


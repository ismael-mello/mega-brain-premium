layers:

  L1_PHILOSOPHIES:

    - id: "FIL-JC-001"
      title: "Story Sells Better Than Argument"
      description: "A dramatic, true story with a fascinating character is the most powerful selling mechanism. Both the golf ad and the self-defense ad are built entirely on narrative, not logical argument or feature lists."
      domains: [copywriting, storytelling, sales-psychology]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-002"
      title: "The Reader Must See Themselves in the Story"
      description: "The protagonist of the sales letter must be relatable — an ordinary person who had the same frustrations as the reader before discovering the secret. Dr. O'Leary is a frustrated hacker golfer; Chris Clugston is a normal-looking guy."
      domains: [copywriting, identification, sales-psychology]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-003"
      title: "Specificity Is the Currency of Believability"
      description: "Specific numbers, names, locations, and details create credibility. '320 yards dead center,' 'beat-up warehouse outside Tulsa, Oklahoma,' '15 minutes with Milt' are all more believable than vague claims."
      domains: [copywriting, credibility, persuasion]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-004"
      title: "The Third-Party Narrator Creates Trust"
      description: "Writing as a satisfied customer or discoverer rather than the product creator builds inherent trust. The narrator is a peer sharing a discovery, not a salesman pitching a product."
      domains: [copywriting, trust-building, positioning]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-005"
      title: "Fear of Missing Out Is Stronger Than Desire to Gain"
      description: "Both letters use urgency and scarcity to make NOT buying feel dangerous. The golf deal 'may not last past today,' the self-defense tapes will be 'packed away forever' in 7 days."
      domains: [sales-psychology, urgency, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-006"
      title: "Eliminate All Risk From the Buyer"
      description: "A generous money-back guarantee removes the last barrier to purchase. Both letters offer 3-month no-questions-asked guarantees, making the purchase feel entirely risk-free."
      domains: [risk-reversal, offer-design, sales-psychology]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-007"
      title: "The Product Must Represent a Secret Advantage"
      description: "Position the product as a hidden secret that gives the buyer an unfair advantage over others. The Triple Coil Swing is a 'secret weapon'; Combat JKD uses fighting secrets 'no one else will ever see.'"
      domains: [positioning, offer-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-008"
      title: "Price Anchoring Makes Any Price Feel Like a Bargain"
      description: "Establish a much higher reference price before revealing the actual price. Milt's $1,350 lesson fee makes $69 feel like stealing; Chris's 'outrageous fees' for personal students makes $97 a no-brainer."
      domains: [pricing-psychology, offer-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-009"
      title: "Social Proof Must Be Specific and Varied"
      description: "Testimonials with full names, locations, specific results, and diverse backgrounds create overwhelming proof. The golf ad has 13+ testimonials from professionals, amateurs, beginners — each with concrete numbers."
      domains: [social-proof, credibility, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-010"
      title: "Every Element Must Push Toward the Sale"
      description: "Every paragraph, every bullet, every subhead exists for one purpose: moving the reader closer to ordering. There is zero entertainment for entertainment's sake."
      domains: [copywriting, direct-response, sales]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-011"
      title: "The Fascinating Character Is the Product's Proof"
      description: "The credibility of the product flows through the fascinating character — their credentials, their backstory, their results. Milt Wallace's 10+ years as course pro and $225/hour fees prove the swing works. Chris Clugston's fight record proves Combat JKD works."
      domains: [authority-building, storytelling, credibility]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-012"
      title: "Confession Builds Connection"
      description: "The narrator admitting personal weakness (terrible golfer, fear of violence) creates instant rapport with the reader who shares the same frustrations. Vulnerability precedes authority."
      domains: [copywriting, rapport-building, emotional-writing]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-013"
      title: "Simple Beats Complex in Every Claim"
      description: "Position the product as deceptively simple. The Triple Coil Swing has only 6 segments. Combat JKD has only 6 components. Simplicity = believable mastery in short time."
      domains: [positioning, offer-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-014"
      title: "Destroy the Alternatives Before Presenting Your Solution"
      description: "Both letters systematically discredit all competing approaches before revealing the product. Expensive golf pros failed, karate/boxing/wrestling all have fatal flaws, military training is inadequate for real fights."
      domains: [competitive-positioning, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-015"
      title: "The Money Is Irrelevant When Value Is Enormous"
      description: "Position the price as so trivial compared to the value that even mentioning money feels petty. 'The money is actually irrelevant, because you also get a 3-month guarantee.'"
      domains: [pricing-psychology, offer-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-016"
      title: "Physical Attention Devices Guarantee Readership"
      description: "Attaching a physical object (nickel, dollar bill, seed packet) to a letter guarantees it gets read. The nickel forces the reader to engage with the letter because they want to know why it's there."
      domains: [direct-mail, attention, copywriting]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-017"
      title: "Urgency Must Feel Real, Not Manufactured"
      description: "Create urgency through a plausible story — Milt might pull the videos off market, the uncensored tapes are limited. The urgency is embedded in the narrative, not bolted on as a countdown timer."
      domains: [urgency, copywriting, sales-psychology]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-018"
      title: "The P.S. Is the Second-Most-Read Element"
      description: "Both letters use powerful P.S. sections that restate the urgency and call to action. Many readers scan to the end first — the P.S. must standalone as a complete mini-sales pitch."
      domains: [copywriting, direct-mail, sales-letter-structure]
      source: "JC-BEST-ADS"

    - id: "FIL-JC-019"
      title: "Copy Is the #1 Business Skill"
      description: "Nothing good happens in business until the copy gets written. Copy is the fundamental skill that drives all revenue."
      domains: ["copywriting", "business-fundamentals", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-020"
      title: "Direct Response Over Brand Advertising"
      description: "Madison Avenue plays a completely different game from entrepreneurs. Direct response is the only rational approach because every dollar must be accountable."
      domains: ["direct-response", "advertising", "marketing-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-021"
      title: "Research Before Writing — Always"
      description: "Even veteran copywriters must do research before writing. The best copy always comes from deep immersion in the market, the product, and the prospect's world."
      domains: ["copywriting", "research", "process"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-022"
      title: "Facts Over Feelings in Market Decisions"
      description: "Never make emotional decisions based on passion when it comes to market selection. Use cold data, competitive intelligence, and market evidence."
      domains: ["market-selection", "decision-making", "business-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-023"
      title: "You Are NOT Your Market"
      description: "The curse of knowledge blinds you to how prospects actually think and behave. You must escape your own perspective to sell effectively."
      domains: ["market-research", "sales-psychology", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-024"
      title: "Every Sale Is a One-to-One Conversation"
      description: "Regardless of medium, every sale is fundamentally a one-to-one human conversation. Mass communication that works always feels personal."
      domains: ["sales-psychology", "copywriting", "communication"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-025"
      title: "Empathy Is the #1 Selling Skill"
      description: "The ability to understand and feel what your prospect is going through is the most important selling skill. Without genuine empathy, copy becomes tone-deaf manipulation."
      domains: ["sales-psychology", "copywriting", "empathy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-026"
      title: "My Product Is for Everybody Is Always Wrong"
      description: "Believing your product serves everyone is the most common and destructive marketing delusion. The tighter your focus, the more powerful your message."
      domains: ["market-selection", "targeting", "positioning"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-027"
      title: "Everything Must Be Proven"
      description: "Skepticism is the default state of every prospect. Every claim must be backed with proof — testimonials, demonstrations, data, credentials, or logical argument."
      domains: ["copywriting", "credibility", "proof-elements"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-028"
      title: "What Excites You Is Almost Always a Feature"
      description: "Business owners consistently confuse what excites them about their product (features) with what will excite the prospect (benefits). This blindness kills more copy than any other mistake."
      domains: ["copywriting", "features-vs-benefits", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-029"
      title: "People Buy Benefits but Need Features as Proof"
      description: "Benefits drive the emotional decision to buy, but features provide the rational justification. Copy must lead with benefits and support with features."
      domains: ["copywriting", "features-vs-benefits", "buying-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-030"
      title: "The Prospect Is Hostile and in Zombie State"
      description: "Your prospect is half-asleep, resistant, skeptical, and hostile to being sold. Pattern interrupt is not optional, it is prerequisite."
      domains: ["sales-psychology", "copywriting", "attention"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-031"
      title: "Authenticity Over Polish"
      description: "Real language creates credibility. Overly polished copy signals inauthenticity. Write like a real human talks — with personality and rough edges."
      domains: ["copywriting", "voice", "credibility"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-032"
      title: "Selling Is a Moral Obligation"
      description: "When you have something genuinely helpful, failing to sell it aggressively is morally wrong. People out there need your solution and are suffering without it."
      domains: ["sales-psychology", "ethics", "mindset"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-033"
      title: "Cultural Bias Against Salesmen Must Be Overcome"
      description: "Society conditions people to distrust salesmen. Professional selling requires consciously overcoming this bias on both seller and buyer sides."
      domains: ["sales-psychology", "mindset", "selling-philosophy"]
      source: "JC-SWS2"
      confidence: 0.90
    - id: "FIL-JC-034"
      title: "Marketing Graveyard of Superior Products"
      description: "The marketing graveyard is crammed with superior products that died because nobody figured out how to sell them. Product quality alone guarantees nothing."
      domains: ["marketing-strategy", "copywriting", "business-fundamentals"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-035"
      title: "Writing Is Fundamentally Rewriting"
      description: "The myth of the first-draft masterpiece is destructive. All great copy is rewritten copy. The real craft happens in revision, cutting, and polishing."
      domains: ["copywriting", "process", "craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-036"
      title: "Your Story IS Your Selling Advantage"
      description: "Your personal story is your primary competitive advantage — nobody else has it, making it an uncopiable asset. Credibility intersects with story."
      domains: ["storytelling", "credibility", "positioning"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-037"
      title: "Do Not Bore Your Listener — Rule Number One"
      description: "Boredom is the ultimate sin in salesmanship. Every sentence must earn its place by being interesting, relevant, or emotionally compelling."
      domains: ["copywriting", "attention", "engagement"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-038"
      title: "Every Word Must Earn Its Place"
      description: "Strip ruthlessly. Every word must justify its existence by either advancing the sale or maintaining engagement. Padding and filler are enemies of conversion."
      domains: ["copywriting", "editing", "craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-039"
      title: "Creating Urgency Is Ethical Obligation"
      description: "If you have a genuinely good product, creating urgency is not manipulation — it is an ethical obligation. Without urgency, prospects procrastinate and never benefit."
      domains: ["sales-psychology", "urgency", "ethics"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-040"
      title: "Never Lie About Scarcity"
      description: "Fake scarcity destroys long-term trust. Real deadlines, real limited quantities create legitimate urgency. Manufactured scarcity gets exposed and kills reputation."
      domains: ["ethics", "urgency", "trust-building"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-041"
      title: "Sweet Spot Between Cold Reality and Pure Magic"
      description: "Cold hard reality doesn't sell. Pure magic is a lie. The sweet spot — where credible reality meets aspirational possibility — is where all great copy lives."
      domains: ["copywriting", "promise-engineering", "credibility"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-042"
      title: "Believability Over Size of Promise"
      description: "A smaller, believable promise always outperforms a larger, unbelievable one. The prospect's internal believability meter is the final gatekeeper."
      domains: ["copywriting", "credibility", "promise-engineering"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-043"
      title: "Be Bold — The Meek Shall Not Inherit Market Share"
      description: "Timid, safe copy dies in the marketplace. Bold claims backed by proof, strong opinions, and aggressive positioning win attention and sales."
      domains: ["copywriting", "positioning", "boldness"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-044"
      title: "The Human Mind Misinterprets Reality"
      description: "The human mind is hardwired to misinterpret reality through cognitive biases, emotional filters, and tribal conditioning. Great salesmen work with psychology as it is."
      domains: ["sales-psychology", "cognitive-bias", "human-nature"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-045"
      title: "People Behave Irrationally and Non-Linearly"
      description: "Buying decisions are irrational, emotional, and non-linear. People buy on impulse, justify with logic, and behave contrary to stated preferences."
      domains: ["buying-psychology", "sales-psychology", "human-nature"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-046"
      title: "Risk Reversal Is Deeper Than Guarantee"
      description: "Risk reversal means identifying and removing every psychological barrier — fear of looking foolish, wasted time, judgment — not just financial risk."
      domains: ["risk-reversal", "sales-psychology", "closing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-047"
      title: "The Close Is a Layered Sequence"
      description: "The close is not a single dramatic moment but a layered sequence of smaller commitments, proof elements, urgency triggers, and risk reversals."
      domains: ["closing", "copywriting", "sales-structure"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-048"
      title: "Observe Actual Behavior Not Wished Behavior"
      description: "Pay attention to how people actually behave, not how you wish they did. Track what they do, buy, click, and respond to — not what they say."
      domains: ["market-research", "human-nature", "testing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-049"
      title: "Test Everything — No Universal Right Format"
      description: "There is no universal right format, length, or approach. What works for one market bombs in another. The only way to know is to test."
      domains: ["testing", "direct-response", "optimization"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-050"
      title: "If the Client Likes the Ad It Is Probably a Bomb"
      description: "When a client is comfortable with copy, it usually means it's too safe. Great copy pushes past the client's comfort zone because it's written for the prospect."
      domains: ["copywriting", "client-management", "boldness"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-051"
      title: "The Grease Slide Principle"
      description: "Copy must flow like a grease slide — no tangents, no timeouts. Once the reader starts, they should be on a breathless, frictionless ride to the close."
      domains: ["copywriting", "flow", "engagement"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-052"
      title: "Copy Must Flow Like Real Conversation"
      description: "Copy must read like a real conversation — clear, natural language, never assuming the reader already knows or cares about anything."
      domains: ["copywriting", "voice", "clarity"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FIL-JC-053"
      title: "The System Eliminates Writer's Block"
      description: "Writer's block is the result of insufficient preparation. A systematic approach eliminates it by making each step clear and manageable."
      domains: ["copywriting", "process", "productivity"]
      source: "JC-SWS2"
      confidence: 0.95

  L2_MENTAL_MODELS:

    - id: "MM-JC-001"
      title: "Amazing Discovery Narrative Arc"
      description: "Every great sales letter follows this arc: Ordinary person has frustrating problem → discovers fascinating character with secret → secret transforms their life → now available to you for the first time. Both the golf and self-defense ads follow this exact pattern."
      domains: [storytelling, copywriting, narrative-structure]
      source: "JC-BEST-ADS"

    - id: "MM-JC-002"
      title: "Fascinating Character as Proof Engine"
      description: "The product's credibility is embodied in a single fascinating character whose biography, credentials, and backstory make the product's claims believable. Milt Wallace (15+ years, $225/hour) and Chris Clugston (World Rated, 50+ streetfights, 5 black belts, 7 languages) serve this function."
      domains: [authority-building, storytelling, credibility]
      source: "JC-BEST-ADS"

    - id: "MM-JC-003"
      title: "Peer-to-Peer Trust Transfer"
      description: "The third-party narrator transfers trust by being positioned as a peer who discovered something and wants to share it. Dr. O'Leary is 'just a golfer like you.' The narrator of the Nickel Letter is a fellow concerned citizen. This bypasses the natural resistance to being 'sold to.'"
      domains: [trust-building, positioning, sales-psychology]
      source: "JC-BEST-ADS"

    - id: "MM-JC-004"
      title: "Scarcity-Through-Story Model"
      description: "Instead of manufacturing scarcity ('only 100 copies'), embed scarcity in the product's backstory. Milt might pull videos off the market and return to expensive personal lessons. The uncensored version will never be reproduced. The scarcity feels natural because it flows from the narrative."
      domains: [scarcity, urgency, storytelling]
      source: "JC-BEST-ADS"

    - id: "MM-JC-005"
      title: "Anchor-Drop-Justify Pricing Model"
      description: "First establish the high anchor (Milt's $1,350 lessons, Chris's outrageous personal fees), then reveal the shockingly low price, then justify WHY it's so low (video economics, anger at bogus systems). The justification prevents the low price from signaling low quality."
      domains: [pricing-psychology, offer-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "MM-JC-006"
      title: "Specificity-Credibility Loop"
      description: "Every specific detail (320 yards, Hagen Oaks in California, beat-up warehouse outside Tulsa, $225/hour, 15-Zulu Group) adds a micro-dose of credibility. The accumulation of specifics creates overwhelming believability that no single claim could achieve alone."
      domains: [credibility, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "MM-JC-007"
      title: "Enemy-Establishment-Rebel Positioning"
      description: "Position the conventional approach as the enemy (expensive pros, formal martial arts, military training), the fascinating character as the rebel who discovered a better way, and the reader as the fellow rebel who's smart enough to see through the establishment. Creates instant tribal identity."
      domains: [positioning, persuasion, tribal-identity]
      source: "JC-BEST-ADS"

    - id: "MM-JC-008"
      title: "Emotional Escalation Ladder"
      description: "Start with relatable frustration (bad golf game, fear of violence), escalate to vivid desire (crushing drives, total confidence), then escalate to fear of missing out (deal may disappear). Each emotional gear shift is higher intensity than the last."
      domains: [emotional-writing, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "MM-JC-009"
      title: "Video-Superiority-Over-Live Reframe"
      description: "Position the recorded version as BETTER than live instruction — you can rewind, use slow-motion, review at your own pace, get multiple camera angles. This reframes the 'cheaper alternative' as the superior option."
      domains: [offer-positioning, reframing, information-products]
      source: "JC-BEST-ADS"

    - id: "MM-JC-010"
      title: "The Guarantee as Closing Weapon"
      description: "The money-back guarantee is not defensive (protecting against refunds) but offensive (removing the last objection). 'How can I afford to be so generous? Easy — everyone who tries it keeps it.' The guarantee IS the close."
      domains: [risk-reversal, closing, offer-design]
      source: "JC-BEST-ADS"

    - id: "MM-JC-011"
      title: "Competence-Through-Confession Model"
      description: "The narrator demonstrates competence by first confessing incompetence. Dr. O'Leary admits he was a terrible golfer who wasted thousands on pros. This confession proves he can evaluate the solution honestly because he's been through every alternative."
      domains: [credibility, rapport-building, copywriting]
      source: "JC-BEST-ADS"

    - id: "MM-JC-012"
      title: "Results-Stack Testimonial Architecture"
      description: "Stack testimonials in descending order of impressiveness, then follow with the 'these people are just like you' bridge. Each testimonial adds a different result type (distance, accuracy, handicap drop, speed of learning) to address different desires."
      domains: [social-proof, copywriting, testimonial-design]
      source: "JC-BEST-ADS"

    - id: "MM-JC-013"
      title: "Visceral Scene-Setting for Emotional Impact"
      description: "Transport the reader into a vivid scene (standing at the edge of the lake, bag overhead; cornered in a dark warehouse by skinheads) before introducing the solution. The emotional state created by the scene makes the solution feel desperately needed."
      domains: [emotional-writing, storytelling, copywriting]
      source: "JC-BEST-ADS"

    - id: "MM-JC-014"
      title: "Credibility-Through-Enemies Model"
      description: "When everyone hates the fascinating character (martial artists, boxers, wrestlers, military), it paradoxically proves their superiority. The enemies validate the claim by their opposition. 'No one argues with Chris anymore.'"
      domains: [authority-building, social-proof, persuasion]
      source: "JC-BEST-ADS"

    - id: "MM-JC-015"
      title: "Open Challenge as Ultimate Proof"
      description: "The open challenge ('Come on out and scrap with me') that no one accepts is the ultimate credibility device. It's unfalsifiable proof of superiority — the absence of challengers proves the claim."
      domains: [authority-building, credibility, competitive-positioning]
      source: "JC-BEST-ADS"

    - id: "MM-JC-016"
      title: "The Insider-Outsider Dynamic"
      description: "Position the reader as being invited into an exclusive insider group. 'Only a handful of insider students,' 'information the rest of the world will never hear about,' 'uncensored version no one else will ever see.' The reader becomes special by buying."
      domains: [exclusivity, sales-psychology, tribal-identity]
      source: "JC-BEST-ADS"

    - id: "MM-JC-017"
      title: "Bar Room Conversation"
      description: "Imagine your ideal prospect sitting on the barstool next to you describing their problems. Your copy should sound exactly like your side of that conversation."
      domains: ["copywriting", "voice", "prospect-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-018"
      title: "Elevator Chat"
      description: "If you had to explain your offer compellingly in an elevator ride from 9th floor to ground, what would you say? Forces ruthless prioritization."
      domains: ["copywriting", "positioning", "clarity"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-019"
      title: "Sweet Spot Targeting"
      description: "Find the absolute center of your demographic and write exclusively for them. Start narrow, nail that person, and the message naturally attracts adjacent prospects."
      domains: ["targeting", "market-selection", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-020"
      title: "Detective Mode"
      description: "Approach competitive intelligence like a detective. Study competitors' ads, offers, guarantees, prices, and positioning systematically to find gaps."
      domains: ["competitive-intelligence", "research", "market-analysis"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-021"
      title: "The Pill Test"
      description: "If the prospect could take a magic pill and get the same result, would they care about the method? If no, the method is a feature, not a benefit."
      domains: ["features-vs-benefits", "copywriting", "offer-design"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-022"
      title: "Push vs Pull Marketing"
      description: "Push marketing interrupts and compels attention. Pull marketing attracts seekers. Each requires different copy tone, structure, and strategy."
      domains: ["marketing-strategy", "copywriting", "traffic"]
      source: "JC-SWS2"
      confidence: 0.90
    - id: "MM-JC-023"
      title: "Twin Targets of the Pitch"
      description: "Every pitch must hit rational brain (logical reasons, proof, data) AND emotional 8-brain (fear, greed, vanity, lust, guilt). Miss either and the sale collapses."
      domains: ["sales-psychology", "copywriting", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-024"
      title: "Carnival Funnel"
      description: "People move through a sales funnel at their own pace, in their own order, like wandering through a carnival. Accommodate non-linear prospect behavior."
      domains: ["funnel-design", "buyer-journey", "marketing-strategy"]
      source: "JC-SWS2"
      confidence: 0.90
    - id: "MM-JC-025"
      title: "The Appealometer"
      description: "Mental chart mapping the spectrum between cold hard reality and pure magic. The sweet spot — peak response — is where believable reality meets aspirational possibility."
      domains: ["copywriting", "promise-engineering", "calibration"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-026"
      title: "The Blob on the Couch"
      description: "Visualize your prospect as a half-asleep blob on the couch, remote in hand, hostile to being sold. Prevents the fatal mistake of assuming an eager audience."
      domains: ["prospect-psychology", "copywriting", "attention"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-027"
      title: "One-on-One Conversation Metaphor"
      description: "All mass communication that converts treats the interaction as personal, one-on-one. Use 'you' language, personal tone, and direct address."
      domains: ["copywriting", "voice", "communication"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-028"
      title: "Little Salesman Concept"
      description: "Your ad is a little salesman doing a face-to-face sales call. It must grab attention, build rapport, identify pain, present solution, handle objections, and close."
      domains: ["copywriting", "direct-response", "sales-structure"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-029"
      title: "Jungle Proximity Principle"
      description: "One foot in the jungle (raw human nature, primal desires) and one in civilization (credibility, professionalism). The power is in the tension between both."
      domains: ["copywriting", "voice", "positioning"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-030"
      title: "The Grease Slide"
      description: "The sales message is a frictionless slide from headline to close. Any friction point creates an exit where the prospect falls off."
      domains: ["copywriting", "flow", "sales-structure"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-031"
      title: "False Offer and Three-Tier Pricing"
      description: "Present three pricing options: low anchor (inadequate), high anchor (extravagant), middle (your real offer as obvious best value)."
      domains: ["pricing-psychology", "offer-design", "closing"]
      source: "JC-SWS2"
      confidence: 0.90
    - id: "MM-JC-032"
      title: "You, The Movie"
      description: "Life is a movie where you write the script. Reframing tool for prospects to see themselves as the hero with the product as the turning point."
      domains: ["storytelling", "mindset", "positioning"]
      source: "JC-SWS2"
      confidence: 0.90
    - id: "MM-JC-033"
      title: "Incongruous Juxtaposition of Compelling Sales Elements"
      description: "Place unexpected, contradictory elements side by side to create curiosity. The jarring contrast forces the brain to engage and seek resolution."
      domains: ["copywriting", "attention", "curiosity"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-034"
      title: "Company Line vs Sales Detective Research"
      description: "The 'company line' is feature-focused and biased. The 'sales detective' goes beyond to find real reasons people buy. The gap reveals best copy angles."
      domains: ["research", "copywriting", "competitive-intelligence"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-035"
      title: "Nobody Knows What Anything Is Worth Without Comparison"
      description: "Value is always relative. Price anchoring and competitive comparison are necessary because the brain cannot assess value in isolation."
      domains: ["pricing-psychology", "value-framing", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MM-JC-036"
      title: "One-Two Punch"
      description: "Feature + benefit + unexpected twist delivered in rapid succession. The triple combination drives each selling point home with maximum force."
      domains: ["copywriting", "persuasion", "sales-structure"]
      source: "JC-SWS2"
      confidence: 0.95

  L3_HEURISTICS:

    - id: "HEUR-JC-001"
      title: "Open With the Most Powerful Promise in the Headline"
      description: "The headline must contain the single biggest benefit stated as dramatically as possible. 'Amazing Secret Discovered By One-Legged Golfer Adds 50 Yards To Your Drives.' Lead with the most compelling result."
      domains: [headlines, copywriting, direct-response]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-002"
      title: "Use 'If You've Ever Wanted...' to Qualify and Hook"
      description: "The opening line 'If you've ever wanted to [vivid desire] ... then this will be the most important message you ever read' simultaneously qualifies the reader and creates an irresistible hook."
      domains: [openings, copywriting, reader-qualification]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-003"
      title: "Name Real Places, Real People, Real Numbers"
      description: "Never say 'a golf course' when you can say 'Hagen Oaks in California.' Never say 'a lot of money' when you can say '$1,350 in fees.' Never say 'dramatic improvement' when you can say 'handicap plummeted from 16 to just 7.'"
      domains: [specificity, credibility, copywriting]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-004"
      title: "Attach a Physical Object to Guarantee Readership"
      description: "A shiny nickel taped to a letter forces the reader to engage. The object creates curiosity ('why is this here?') and guilt ('someone spent money on this'). The Nickel Letter explicitly explains both reasons for the nickel."
      domains: [direct-mail, attention-devices, copywriting]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-005"
      title: "Always Give Two Reasons for Any Device"
      description: "When using an attention device, state two reasons for it: (1) to get attention, and (2) to connect to the story. The nickel gets attention AND symbolizes how little a life is worth without self-defense skills."
      domains: [copywriting, attention-devices, persuasion]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-006"
      title: "3 Months Is the Ideal Guarantee Period"
      description: "Both letters use a 3-month money-back guarantee. Long enough to feel generous and allow real testing, short enough to feel urgent. 'After 3 entire months ... by which time I had lowered my handicap 11 strokes.'"
      domains: [risk-reversal, offer-design, guarantee-design]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-007"
      title: "Price Must Be Compared to Something 10-20x Higher"
      description: "The anchor price should be 10-20x the actual price. $1,350 personal lessons vs $69 video course (19.6x). Chris's personal training fees vs $97 video course. The ratio must feel dramatic, not incremental."
      domains: [pricing-psychology, offer-design, anchoring]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-008"
      title: "Include 10+ Testimonials With Full Names and Locations"
      description: "The golf ad includes 13 testimonials, each with full name, city, and specific results. Volume of social proof overwhelms skepticism. Each testimonial should include at least one specific number."
      domains: [social-proof, testimonials, credibility]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-009"
      title: "Each Fascination Bullet Needs a Parenthetical Payoff"
      description: "The strongest fascination bullets follow the pattern: bold claim + parenthetical explanation/teaser. 'How to use the secret of choking down to master any club in your bag... (no matter how horrible you were with it before!)'"
      domains: [fascination-bullets, copywriting, curiosity]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-010"
      title: "The Fascinating Character Needs 3+ Credential Layers"
      description: "Milt Wallace: (1) lifelong professional golfer, (2) course pro at Hagen Oaks, (3) 10+ years at $225/hour, (4) most sought-after teacher. Chris Clugston: (1) black belts in 5 martial arts, (2) 7 languages, (3) World Rated fighter, (4) 50+ streetfights, (5) 8 years professional. Stack credentials until they're overwhelming."
      domains: [authority-building, credibility, character-development]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-011"
      title: "Use 'Please Go to the Next Page' to Maintain Readership"
      description: "Explicit page-turn instructions ('Please go to the next page') reduce drop-off in multi-page letters. Never assume the reader will automatically continue."
      domains: [direct-mail, readership, copywriting]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-012"
      title: "The Discovery Story Must Have an Origin Moment"
      description: "Every amazing discovery needs a specific moment of origin. Milt saw the one-legged golfer tee up fifteen years ago. Chris was cornered in a Tulsa warehouse. The origin moment makes the discovery feel real and inevitable."
      domains: [storytelling, credibility, narrative-structure]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-013"
      title: "Restate Price as Equivalent of Something Trivial"
      description: "Compare the price to something trivially cheap: 'For the price of one green fee at a fancy golf club.' 'Less than you'd pay for two lousy lessons at the local karate school... less than a big meal for two... less than a decent pair of cowboy boots.'"
      domains: [pricing-psychology, reframing, copywriting]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-014"
      title: "Address Skepticism Directly With 'I Know What You're Thinking'"
      description: "Preempt the reader's objection by calling it out: 'I know what you're thinking — if this Combat JKD is so great... Why Is It Still Such An Astonishing Secret!' Then answer the objection immediately."
      domains: [objection-handling, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-015"
      title: "The Guarantee Must Include 'No Questions Asked'"
      description: "The phrase 'no questions asked, no hassles, no forms to fill out' eliminates the fear of an awkward return process. The guarantee must feel frictionless to be effective."
      domains: [risk-reversal, guarantee-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-016"
      title: "6 Is the Magic Number for System Components"
      description: "Both products are described as having 6 simple components. The Triple Coil Swing has 6 segments. Combat JKD has 6 components. 6 is complex enough to feel real but simple enough to feel masterable."
      domains: [offer-design, positioning, simplicity]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-017"
      title: "Urgency Must Appear at Minimum 3 Times"
      description: "Urgency appears in the body copy, the close, and the P.S. — at minimum. The golf ad: 'this deal may not last past today,' 'call right now,' P.S. 'this hot deal may never be offered again.' Repetition of urgency is necessary, not redundant."
      domains: [urgency, copywriting, closing]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-018"
      title: "Include a Phone Number AND a Mail-In Form"
      description: "Offer multiple response mechanisms. Both letters include a toll-free 800 number AND a Priority Order Form for check/money order. Remove all barriers to response by matching the reader's preference."
      domains: [response-mechanisms, direct-mail, conversion]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-019"
      title: "Every Subhead Must Be a Complete Mini-Promise"
      description: "Each bold subhead should work as a standalone benefit or curiosity hook: 'This One-Legged Man Actually Had An Advantage Over Normal Golfers!' 'His Life Wasn't Worth Much More Than That Nickel In His Pocket!' A scanner should get the full pitch from subheads alone."
      domains: [subheads, copywriting, readership]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-020"
      title: "Always Include a FREE Bonus That's Worth the Full Price"
      description: "The Nickel Letter includes a free knife-fighting video 'worth the price of the entire package by itself.' The bonus must feel genuinely valuable — not throwaway — and the reader keeps it even if they return the main product."
      domains: [offer-design, bonuses, value-stacking]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-021"
      title: "Testimonials Must Include Diverse Demographics"
      description: "The golf ad testimonials span: doctor, banking VP, production engineer, realtor, financial advisor, TV host, computer analyst, chiropractor/MD. Variety proves the product works for 'anyone,' not just a narrow type."
      domains: [social-proof, testimonials, credibility]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-022"
      title: "Use 'Imagine' to Activate the Reader's Mental Movie"
      description: "'Imagine how this one-legged man must have looked standing up to the ball.' 'Imagine having little danger-sensing antennae inside you.' The word 'imagine' bypasses skepticism and activates emotional visualization."
      domains: [emotional-writing, visualization, persuasion]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-023"
      title: "Destroy Alternatives Using Their Own Logic"
      description: "Don't just dismiss competitors — show why their logic fails. Karate has rules, but streetfights don't. Golf pros tell you to twist your body, but that doesn't fix consistency. Use the competitor's own framework against them."
      domains: [competitive-positioning, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-024"
      title: "The Close Must Include 'Call Right Now' With Exact Number"
      description: "Always restate the phone number at the close, with the department code. 'Call 1-800-282-8316 (ask for Department 2-G).' Make the action hyper-specific and immediately executable."
      domains: [closing, call-to-action, direct-response]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-025"
      title: "Use Emotional Hair-Trigger Language for Frustration"
      description: "'One emotional hair-trigger away from tossing the whole mess and never stepping up to another ball the rest of my life.' The reader's own suppressed frustration is voiced in extreme, vivid language they've felt but never articulated."
      domains: [emotional-writing, empathy, copywriting]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-026"
      title: "The P.S. Must Restate Urgency, Risk-Free, and Phone Number"
      description: "An effective P.S. contains three elements: (1) restate urgency ('this hot deal may never be offered again'), (2) restate risk-free ('there's no risk'), and (3) restate phone number. Both letters follow this formula exactly."
      domains: [copywriting, P.S.-design, closing]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-027"
      title: "Bridge From Testimonials to Reader With 'Just Like You'"
      description: "After stacking testimonials, always include the bridge: 'Are these golfers any different than you? No, they are not.' This explicitly transfers all the social proof onto the reader."
      domains: [social-proof, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-028"
      title: "Personal Reputation as Guarantee Reinforcement"
      description: "'I'm a doctor, and I stake my reputation on my promises.' Adding personal reputation to the financial guarantee creates a dual-layer of trust — you get your money back AND a credible person's word."
      domains: [trust-building, guarantee-design, credibility]
      source: "JC-BEST-ADS"

    - id: "HEUR-JC-029"
      title: "Market Research Murder Rule"
      description: "Most marketers skip market research — this murders results down the line. Deep research is non-negotiable before writing."
      domains: ["copywriting", "market-research", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-030"
      title: "No Competition = No Market"
      description: "If no competition exists in a market, the market often doesn't exist. Competition validates that money is being spent."
      domains: ["market-selection", "market-research", "business-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-031"
      title: "Small Test First Rule"
      description: "Never run tests larger than you need to. Run small test ads first to validate before scaling spend."
      domains: ["direct-response", "testing", "media-buying"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-032"
      title: "1-2% Response Rate Baseline"
      description: "1-2% response rates are typical in direct marketing. This is the baseline — anything above is exceptional."
      domains: ["direct-response", "direct-mail", "metrics"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-033"
      title: "Timeless Headline Longevity"
      description: "One headline can be timeless if it hits the avatar's sweet spot. Carlton's golf headline ran for decades unchanged."
      domains: ["copywriting", "headlines", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-034"
      title: "Double Your Prices Test"
      description: "Most clients never tested pricing and leave money on table. The double test reveals markets bear higher prices than assumed."
      domains: ["pricing-psychology", "testing", "business-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-035"
      title: "USP Elevator Ride Rule (~30 Seconds)"
      description: "Your USP should fit in an elevator ride — approximately 30 seconds. If you can't articulate it that fast, you don't have one."
      domains: ["positioning", "copywriting", "business-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-036"
      title: "5-6 Features Minimum Starting Point"
      description: "Start your features/benefits list with minimum 5-6 features. This is the floor, not the ceiling."
      domains: ["copywriting", "product-analysis", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-037"
      title: "At Least 1 Benefit Per Feature"
      description: "Attach at least 1 benefit to each feature, more if possible. Features without translated benefits are dead weight."
      domains: ["copywriting", "sales-psychology", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-038"
      title: "The One Benefit That Seals It"
      description: "Sometimes 1 benefit out of 100 seals the deal. You cannot predict which one, so list them all."
      domains: ["copywriting", "sales-psychology", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-039"
      title: "5-6 Bullets Minimum"
      description: "Write minimum 5-6 bullets using your features/benefits list. More is better — you can always cut."
      domains: ["copywriting", "fascination-bullets", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-040"
      title: "Never Repeat Action Verbs on Same Page"
      description: "Never use the same action verb twice on a single manuscript page. Repetition dulls engagement."
      domains: ["copywriting", "writing-craft", "editing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-041"
      title: "How-To Bullet Starter Method"
      description: "Use 'How to' for 3+ of first 5-6 bullets to build momentum, then evolve into sophisticated constructions."
      domains: ["copywriting", "fascination-bullets", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-042"
      title: "5-Year Control Longevity Benchmark"
      description: "Carlton's sex letter control lasted 5 years vs normal 3-6 months. Great copy built on deep understanding outlasts dozens of challengers."
      domains: ["direct-response", "copywriting", "testing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-043"
      title: "SSS Testimonial Rule"
      description: "Testimonials should be Specific, Short, and Spicy. Vague praise is worthless. Specific results in punchy sentences outperform."
      domains: ["copywriting", "social-proof", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-044"
      title: "Collect Maximum Testimonials"
      description: "Get as many testimonials as possible. Having an arsenal lets you pick the most compelling ones."
      domains: ["copywriting", "social-proof", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-045"
      title: "Anonymous Testimonials Are Lowest Form"
      description: "Anonymous testimonials are lowest form of credibility. Full name, city, and details make them believable."
      domains: ["copywriting", "social-proof", "credibility"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-046"
      title: "No Testimonials = Product Problem"
      description: "If you cannot get testimonials, something is wrong with the product itself. Their absence is diagnostic."
      domains: ["product-development", "social-proof", "business-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-047"
      title: "80% Hook Search in Gossip"
      description: "80% of the hook search is in gossip and backstories, not official materials. Real selling angles are in informal stories."
      domains: ["copywriting", "market-research", "storytelling"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-048"
      title: "Street-Wise Over Academic for Copy"
      description: "Rather take an illiterate street-wise salesman and teach copy than PhD in English. Selling instinct trumps literary polish."
      domains: ["copywriting", "sales-psychology", "talent-selection"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-049"
      title: "Write 20-50 Headlines Before Picking"
      description: "Write 20-50 headlines before picking one — professional standard. Volume produces quality; best headline is rarely the first."
      domains: ["copywriting", "headlines", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-050"
      title: "One Word Change Can Quadruple Response"
      description: "One word change in headline can quadruple response. Testing single-word variations is where biggest leverage lives."
      domains: ["copywriting", "headlines", "testing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-051"
      title: "10-15% Refund Rate = Full Market Reach"
      description: "10-15% refund rate means reaching full market. Below that means not pushing hard enough in copy."
      domains: ["direct-response", "pricing-psychology", "metrics"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-052"
      title: "Murder Scene Editing Standard"
      description: "Edited piece should look like scene of a murder — covered in red ink and cuts. Clean manuscript = insufficient editing."
      domains: ["copywriting", "editing", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-053"
      title: "Shameless Alliteration and Rhyme"
      description: "Use alliteration and rhyme shamelessly — makes phrases memorable and sticky. What matters is whether the reader remembers."
      domains: ["copywriting", "writing-craft", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-054"
      title: "People Buy Before Consuming"
      description: "People buy before consuming. Blank VHS story: 6 months of blank tapes, still buying steps 2-3. Purchase driven by desire, not completion."
      domains: ["sales-psychology", "buyer-behavior", "product-launches"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-055"
      title: "1-2 Sentences for Who I Am"
      description: "Keep 'here's who I am' to 1-2 sentences maximum. Establish credibility fast and get back to what's in it for them."
      domains: ["copywriting", "credibility", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-056"
      title: "Client Likes Ad = Probably a Bomb"
      description: "If client likes the ad, it's probably too safe. Effective copy makes clients uncomfortable because it pushes past safe."
      domains: ["copywriting", "client-management", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-057"
      title: "Longer Guarantees Reduce Refund Rates"
      description: "Longer guarantees actually REDUCE refund rates — urgency to return disappears. 30-day guarantee creates more refunds than 1-year."
      domains: ["risk-reversal", "sales-psychology", "pricing-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-058"
      title: "Bonuses Should Equal or Exceed Deal Value"
      description: "Bonuses should equal or exceed value of entire deal. When bonuses worth more than core offer, purchase becomes irrational NOT to make."
      domains: ["offer-design", "price-anchoring", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-059"
      title: "First 10/100/1000 Buyers Bonus Urgency"
      description: "Give first 10, 100, or 1000 buyers something extra for real scarcity. Finite quantity bonuses drive faster action."
      domains: ["offer-design", "urgency-scarcity", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-060"
      title: "Nobody Knows Value Without Comparison"
      description: "Nobody knows what anything is worth until there's something to compare it to. Always provide a value anchor."
      domains: ["price-anchoring", "pricing-psychology", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-061"
      title: "5-6 PS Entries Maximum Stacking"
      description: "Use 5-6 PS entries maximum. PS section is most-read part of any letter — use for key benefits, urgency, bonuses."
      domains: ["copywriting", "direct-mail", "sales-letters"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-062"
      title: "Excruciating Detail in Ordering Process"
      description: "Explain ordering process in almost excruciating detail. Never assume prospect knows how to buy."
      domains: ["copywriting", "conversion-optimization", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-063"
      title: "3x Price Anchoring Formula"
      description: "$97 package with $291 stated value = 3x price anchoring. Minimum credible anchor is 3 times asking price."
      domains: ["price-anchoring", "offer-design", "pricing-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-064"
      title: "Only Your Mother Reads Every Word in Order"
      description: "Your mother is the only one who reads every word in order. Write for scanners — use subheads, bullets, bold, callouts."
      domains: ["copywriting", "readability", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-065"
      title: "5-6x Daily Contact Frequency"
      description: "If not contacting prospects more often than their family does, must re-introduce yourself every time. Frequency builds familiarity."
      domains: ["email-marketing", "follow-up", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-066"
      title: "20 Minutes to 1 Hour Daily Journal"
      description: "Journal writing for 20 min to 1 hour daily develops writing voice. Best practice for voice development."
      domains: ["writing-craft", "skill-development", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-067"
      title: "Rewrite Up to a Dozen Times"
      description: "Good writers rewrite up to a dozen times. First draft is never final. Amateurs submit first drafts; professionals submit twelfth."
      domains: ["copywriting", "editing", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "HEUR-JC-068"
      title: "No Adjectives — Let Verbs Do the Work"
      description: "Don't use adjectives — let verbs do the work. Strong verbs create vivid copy. Replace 'walked slowly' with 'crept.'"
      domains: ["copywriting", "writing-craft", "editing"]
      source: "JC-SWS2"
      confidence: 0.95

  L4_FRAMEWORKS:

    - id: "FW-JC-001"
      title: "Carlton's Sales Letter Architecture (8-Part)"
      description: "Both letters follow this structure: (1) Headline with biggest promise, (2) Subhead with vivid elaboration, (3) Opening hook identifying the reader, (4) Problem/frustration story, (5) Discovery of fascinating character and secret, (6) Fascination bullets showing what you'll learn, (7) Testimonial stack, (8) Close with price anchor, guarantee, urgency, and P.S."
      domains: [sales-letter-structure, copywriting, direct-mail]
      source: "JC-BEST-ADS"

    - id: "FW-JC-002"
      title: "The Amazing Discovery Story Formula"
      description: "A 5-act narrative: (Act 1) Narrator has problem/frustration just like reader. (Act 2) Narrator stumbles upon fascinating character. (Act 3) Fascinating character's backstory and credentials revealed through origin story. (Act 4) Narrator is transformed by the secret. (Act 5) Now available to reader for the first time."
      domains: [storytelling, narrative-structure, copywriting]
      source: "JC-BEST-ADS"

    - id: "FW-JC-003"
      title: "Fascinating Character Bio Construction"
      description: "Build the fascinating character in 4 layers: (1) Origin moment — the flash of insight that started everything, (2) Credentials stack — professional history that proves mastery, (3) Results proof — what they achieved for themselves and others, (4) Scarcity of access — they're almost impossible to hire/reach."
      domains: [character-development, authority-building, copywriting]
      source: "JC-BEST-ADS"

    - id: "FW-JC-004"
      title: "Triple-Layer Price Justification"
      description: "Justify the price through three layers: (1) Anchor against something 10-20x more expensive, (2) Compare to something trivial the reader already spends money on, (3) Make the price irrelevant by emphasizing the guarantee. Golf ad: $1,350 lessons → $69 → 'price of one green fee' → '3-month guarantee.'"
      domains: [pricing-psychology, offer-design, closing]
      source: "JC-BEST-ADS"

    - id: "FW-JC-005"
      title: "Risk-Reversal Stack"
      description: "Stack multiple risk-reversals: (1) 3-month money-back guarantee, (2) No questions asked, (3) No hassles or forms, (4) Personal guarantee by the narrator, (5) Keep the bonus even if you return. Each layer removes a different type of risk perception."
      domains: [risk-reversal, offer-design, guarantee-design]
      source: "JC-BEST-ADS"

    - id: "FW-JC-006"
      title: "The Fascination Bullet Battery"
      description: "A sequence of 12-20+ curiosity-driven bullets, each promising a specific secret or technique. Structure: Bold claim with parenthetical payoff, alternating between 'how to' bullets, 'why' bullets, 'secret' bullets, and 'mistake/danger' bullets for variety."
      domains: [fascination-bullets, copywriting, curiosity]
      source: "JC-BEST-ADS"

    - id: "FW-JC-007"
      title: "The Competitor Destruction Sequence"
      description: "Destroy alternatives in order of perceived credibility: (1) Expensive professional instruction, (2) Mainstream training methods, (3) 'Official' systems with fancy names, (4) Self-taught approaches. After destroying all alternatives, your product stands alone."
      domains: [competitive-positioning, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "FW-JC-008"
      title: "Testimonial Architecture (3 Tiers)"
      description: "Structure testimonials in 3 tiers: (1) Authority testimonials from credible professionals, (2) Results testimonials with specific numbers, (3) Transformation testimonials from relatable average people. Follow with the 'just like you' bridge."
      domains: [social-proof, testimonial-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "FW-JC-009"
      title: "The Narrative Urgency Construction"
      description: "Build urgency through 3 story-based mechanisms: (1) The product creator may withdraw the offer (Milt going back to high fees), (2) The current version is special/uncensored (won't be available again), (3) Time-specific deadline embedded in narrative ('within the next 7 days' in Nickel Letter)."
      domains: [urgency, scarcity, storytelling]
      source: "JC-BEST-ADS"

    - id: "FW-JC-010"
      title: "The Physical Attention Device Formula"
      description: "Three requirements for an effective attention device: (1) It must be physical and tangible (nickel, dollar bill), (2) It must have two stated reasons for being there (attention + thematic connection), (3) It must tie back into the story's central metaphor."
      domains: [direct-mail, attention-devices, copywriting]
      source: "JC-BEST-ADS"

    - id: "FW-JC-011"
      title: "Video Course Superiority Reframe"
      description: "Position recorded instruction as superior to live through: (1) Rewind and review capability, (2) Professional studio quality, (3) Multiple camera angles and slow motion, (4) Same instruction for a fraction of the cost, (5) Privacy of home learning. Both letters use this reframe."
      domains: [information-products, offer-positioning, reframing]
      source: "JC-BEST-ADS"

    - id: "FW-JC-012"
      title: "The 'Economic Argument' Persuasion"
      description: "Convince the fascinating character to share their secret using a logical economic argument the reader overhears: 'If Milt would let me videotape him... so many people would buy that he'd never have to give another personal lesson again.' This makes the offer seem rational, not desperate."
      domains: [storytelling, persuasion, offer-design]
      source: "JC-BEST-ADS"

    - id: "FW-JC-013"
      title: "Scene-Paint-Then-Pivot Structure"
      description: "Paint a vivid dangerous/frustrating scene (standing at the lake about to throw clubs; cornered in a dark warehouse), then pivot to the solution with 'But it's not magic at all!' or 'Chris did something these experienced fighters had never seen before.' The contrast creates maximum impact."
      domains: [storytelling, emotional-writing, copywriting]
      source: "JC-BEST-ADS"

    - id: "FW-JC-014"
      title: "The 'Real World vs. Official' Distinction"
      description: "Frame the product as the 'real world' solution versus 'official' systems that fail in practice. Formal martial arts have rules; streetfights don't. Pro golf instruction teaches theory; this teaches results. The 'real world' framing immediately resonates with practical-minded readers."
      domains: [positioning, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "FW-JC-015"
      title: "Identity Transformation Sequence"
      description: "Promise not just skill improvement but identity transformation: from frustrated hacker to 'fearless on the links'; from vulnerable civilian to someone with a 'built-in protection device... your own inner bodyguard.' The product changes WHO you are, not just what you can do."
      domains: [transformation, offer-design, sales-psychology]
      source: "JC-BEST-ADS"

    - id: "FW-JC-016"
      title: "The Dual-Close Structure"
      description: "Close twice: first with a 'story close' (imagine standing there with a smile, watching your ball sail deep and true) and then with a 'mechanical close' (call this number, use your credit card, fill out this form). Emotion first, logistics second."
      domains: [closing, copywriting, sales]
      source: "JC-BEST-ADS"

    - id: "FW-JC-017"
      title: "The Insider Access Escalation"
      description: "Build exclusivity through escalating layers: (1) Only personal students knew this, (2) For the first time it's on video, (3) But only the uncensored version, (4) Which will never be offered again, (5) Only you and a handful of insiders will have it. Each layer makes the reader feel more special."
      domains: [exclusivity, scarcity, offer-design]
      source: "JC-BEST-ADS"

    - id: "FW-JC-018"
      title: "The Reluctant Offer Framework"
      description: "Position the fascinating character as reluctant to sell: Milt 'agreed... sort of' and set conditions. Chris is 'fed up' and offering this out of anger, not greed. The reluctant seller is more credible than the eager salesman."
      domains: [positioning, credibility, offer-design]
      source: "JC-BEST-ADS"

    - id: "FW-JC-019"
      title: "The 'Beginners Welcome' Proof"
      description: "Explicitly address the beginner's fear of being unqualified: 'The less you understand about what the experts try to tell you, the faster you'll be shaving off strokes.' 'No special strength, speed or coordination to get started.' Flip the beginner's weakness into an advantage."
      domains: [objection-handling, copywriting, offer-design]
      source: "JC-BEST-ADS"

    - id: "FW-JC-020"
      title: "The Problem-Frustration-Shame Trifecta"
      description: "Open the letter by touching three emotional pressure points: (1) The problem itself (bad golf, fear of violence), (2) The frustration of failed solutions (wasted money on pros, useless martial arts classes), (3) The shame of being stuck (buddies outdriving you, being helpless if attacked). This triple hit makes the reader desperate for a solution."
      domains: [emotional-writing, problem-agitation, copywriting]
      source: "JC-BEST-ADS"

    - id: "FW-JC-021"
      title: "Simple Writing System (SWS) 17-Step Formula"
      description: "Complete copywriting system: 17 sequential building blocks from market research through final assembly. Each step produces a discrete component. Complete ALL steps before writing."
      domains: ["copywriting", "direct-response", "systematic-creation"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-022"
      title: "3-Part Market Research Framework"
      description: "Three core investigations: (1) Competition Analysis, (2) Market Size Assessment, (3) Market Existence Validation."
      domains: ["market-research", "competitive-intelligence", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-023"
      title: "Avatar Definition Framework"
      description: "Six-dimensional prospect profiling: WHO, WHERE, DEMOGRAPHICS, NEEDS, PAIN, WHAT THEY NEED TO HEAR. Imagine one specific person at a bar."
      domains: ["avatar-creation", "market-research", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-024"
      title: "Carlton's USP Formula (3 Layers)"
      description: "Layer 1: basic differentiation. Layer 2: positioning vs competition. Layer 3: primary transformation benefit stacked on top."
      domains: ["positioning", "copywriting", "marketing-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-025"
      title: "Features vs Benefits Master List"
      description: "Two-column exercise: features left, benefits right. The So What test applied to each. Becomes raw material for bullets and headlines."
      domains: ["copywriting", "product-positioning", "sales-writing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-026"
      title: "The So What? Test"
      description: "Keep asking 'so what?' deeper until hitting emotional bedrock. Most stop at level 1-2; magic is at level 3-5."
      domains: ["copywriting", "sales-psychology", "benefit-deepening"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-027"
      title: "The Pill Test Framework"
      description: "If prospect could take pill for same result, would they care about method? No = feature. Yes = benefit."
      domains: ["copywriting", "offer-design", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-028"
      title: "Blind Bullet Structure"
      description: "State result/promise WITHOUT revealing mechanism. Creates curiosity gap only purchasable by buying."
      domains: ["copywriting", "bullet-writing", "curiosity-creation"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-029"
      title: "Reveal Bullet Structure"
      description: "Give away actionable info freely to build credibility. If free bullets this good, paid must be incredible."
      domains: ["copywriting", "bullet-writing", "credibility-building"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-030"
      title: "One-Two Punch Formula"
      description: "Feature + benefit + unexpected twist in single bullet. The twist separates amateur from professional bullets."
      domains: ["copywriting", "bullet-writing", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-031"
      title: "Objection Handling Through Bullets"
      description: "Address conscious AND unconscious objections within bullet copy. Every major objection needs 2-3 bullets."
      domains: ["copywriting", "objection-handling", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-032"
      title: "Typography as Voice Framework"
      description: "Parentheses = whisper; BOLD = emphasis; italics = nuance; underlines = critical; ALL CAPS = shout."
      domains: ["copywriting", "formatting", "visual-communication"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-033"
      title: "Third Party Endorsement Framework"
      description: "You say = bragging; Others say = validation; Known authority says = borrowed credibility. Most powerful claims from third parties."
      domains: ["copywriting", "credibility", "social-proof"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-034"
      title: "Before-and-After Testimonial Structure"
      description: "Three elements: BEFORE state, EXPERIENCE using product, AFTER results. Must be mini-story, not vague praise."
      domains: ["copywriting", "testimonials", "social-proof"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-035"
      title: "SSS Rule for Testimonials"
      description: "Specific, Short, Spicy. Three-criteria filter. Ten SSS testimonials outperform fifty generic ones."
      domains: ["copywriting", "testimonials", "editing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-036"
      title: "Incongruous Juxtaposition"
      description: "Combine two elements that don't logically belong together to create irresistible curiosity. Both must be independently compelling."
      domains: ["copywriting", "hooks", "headlines"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-037"
      title: "Hook Discovery Process"
      description: "Four steps: Interview, Dig past obvious, Find the unexpected, Test with naive listeners for physical reaction."
      domains: ["copywriting", "hooks", "research"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-038"
      title: "The What?! Test"
      description: "Present hook to unfamiliar person. Must produce involuntary physical reaction. Polite nod = no hook."
      domains: ["copywriting", "hooks", "validation"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-039"
      title: "The Grease Slide Framework"
      description: "Every element reduces friction and accelerates reader toward close. Mark every point where you slow down — eliminate."
      domains: ["copywriting", "sales-writing", "flow"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-040"
      title: "If-Then Setup Framework"
      description: "IF you've ever [situation prospect relates to]... THEN [promise]. IF makes prospect self-identify before delivering promise."
      domains: ["copywriting", "headlines", "leads"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-041"
      title: "Good-Bad Setup Framework"
      description: "Present GOOD immediately followed by BAD. Creates tension only resolved by continuing to read."
      domains: ["copywriting", "leads", "tension-creation"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-042"
      title: "Three-Act Story Structure for Sales"
      description: "Act 1: Setup/identification. Act 2: Struggle/discovery. Act 3: Transformation/results. Resolution leads naturally to pitch."
      domains: ["copywriting", "storytelling", "narrative"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-043"
      title: "Story Archetype Menu"
      description: "Seven types: Origin, Transformation, Discovery, David vs Goliath, Secret, Confession, Borrowed. Select based on product narrative."
      domains: ["copywriting", "storytelling", "narrative-structure"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-044"
      title: "Superscript + Headline + Sub-head Architecture"
      description: "Three-layer headline: superscript qualifies, headline hooks, sub-head sells. Each serves distinct function."
      domains: ["copywriting", "headlines", "layout"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-045"
      title: "How-To Headline Starter"
      description: "Begin with 'How To [specific outcome]'. Add twist or qualifier. Promises actionable information."
      domains: ["copywriting", "headlines"]
      source: "JC-SWS2"
      confidence: 0.93
    - id: "FW-JC-046"
      title: "If-Then Headline Framework"
      description: "Conditional headline: 'If [qualifying condition], Then [promised benefit].' Creates instant self-selection."
      domains: ["copywriting", "headlines", "qualification"]
      source: "JC-SWS2"
      confidence: 0.93
    - id: "FW-JC-047"
      title: "Keyword Circle-and-Replace Method"
      description: "Circle every verb, replace weak with strong. Circle adjectives, delete unnecessary ones. Word-level precision editing."
      domains: ["copywriting", "editing", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-048"
      title: "4-Part Sales Message Template"
      description: "Who I am, What I've got, Why it matters to you, What to do now. Works for any length from 30-second pitch to 20-page letter."
      domains: ["copywriting", "sales-writing", "pitch-construction"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-049"
      title: "Appealometer Framework"
      description: "Visual calibration between REALITY and MAGIC. Too far either way kills response. Sweet spot is reality-adjacent magic."
      domains: ["copywriting", "claim-calibration", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-050"
      title: "Twin Targets of Pitch Framework"
      description: "Rational target (facts, ROI) + Emotional target (fear, desire, status). Emotional hook → rational justification → emotional close."
      domains: ["copywriting", "sales-psychology", "persuasion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-051"
      title: "B2B Arming Strategy"
      description: "Arm the reader/decision-carrier with ROI calc, risk-reduction arguments, competitive pressure, executive summary to forward."
      domains: ["copywriting", "b2b-sales", "sales-strategy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-052"
      title: "Believability Calibration Framework"
      description: "Address unbelievable claims directly: acknowledge skepticism, provide specific proof, offer risk-free verification."
      domains: ["copywriting", "credibility", "claim-management"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-053"
      title: "Make-the-Car-Payment Technique"
      description: "Connect big abstract promise to small relatable metric. Small believable promise makes big promise plausible."
      domains: ["copywriting", "promise-engineering", "relatability"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-054"
      title: "4 Turbulence Tools"
      description: "Urgency, Limitation, Takeaway, Insider. Most powerful combined 2-3 simultaneously. All must be genuine."
      domains: ["copywriting", "urgency", "scarcity", "closing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-055"
      title: "Takeaway Close"
      description: "Reverse selling by threatening to withdraw offer. Triggers loss aversion. Must be genuine willingness to walk away."
      domains: ["copywriting", "closing", "loss-aversion"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-056"
      title: "Ethical Urgency Principle"
      description: "Frame offer as market test with real deadline. Both outcomes (price up or offer pulled) create genuine urgency."
      domains: ["copywriting", "urgency", "ethics"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-057"
      title: "Bonus Stacking Strategy"
      description: "Two types: Same-Topic (deepening core) and Tangential (adjacent value). Total bonus value should exceed price 3-10x."
      domains: ["copywriting", "offer-design", "bonus-architecture"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-058"
      title: "Product Unbundling Framework"
      description: "Extract appealing modules as standalone bonuses. Same content, dramatically increased perceived value."
      domains: ["copywriting", "offer-design", "value-engineering"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-059"
      title: "3-Tier Pricing / False Offer"
      description: "Economy (inadequate), Standard (real offer), Premium (makes standard reasonable). Middle tier is the intended purchase."
      domains: ["pricing", "offer-design", "anchoring"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-060"
      title: "Infomercial Offer Technique"
      description: "Establish high anchor, double quantity, cut price, add bonuses, add guarantee. Creates escalating value while price plummets."
      domains: ["copywriting", "offer-presentation", "pricing"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-061"
      title: "Resource Mining Framework"
      description: "Extract copy material from: interviews, contacts/customer list, old catalog, transcriptions. Best material already exists."
      domains: ["copywriting", "research", "content-mining"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-062"
      title: "4-Step Close Formula"
      description: "Excitement/recap, Deal/price reveal, Clear CTA, PS stack. Close should be 15-25% of total copy length."
      domains: ["copywriting", "closing", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-063"
      title: "PS/PPS Stacking Technique"
      description: "Each PS serves distinct purpose: benefit, social proof, guarantee, takeaway, personal note. Stack should work standalone."
      domains: ["copywriting", "closing", "direct-mail"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-064"
      title: "Rational + Emotional One-Two Punch Close"
      description: "Rational close (remove objections) first, then emotional close (create action). Neither alone is sufficient."
      domains: ["copywriting", "closing", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "FW-JC-065"
      title: "SWS Final Assembly Map"
      description: "Master framework mapping all 17 steps to position in final message. Steps 1-3 inform; steps 4-17 produce components."
      domains: ["copywriting", "systematic-creation", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95

  L5_METHODOLOGIES:

    - id: "MET-JC-001"
      title: "How to Write a Third-Party Narrator Sales Letter"
      description: "Step-by-step: (1) Create a narrator persona who shares the reader's frustrations, (2) Have the narrator discover a fascinating character through a relatable situation ('bitching to anyone who'll listen'), (3) Let the narrator describe their transformation with specific before/after numbers, (4) Have the narrator explain the offer as a peer, not a salesman, (5) Close with the narrator's personal guarantee and reputation."
      domains: [copywriting, sales-letter-writing, direct-mail]
      source: "JC-BEST-ADS"

    - id: "MET-JC-002"
      title: "How to Construct the Fascinating Character"
      description: "Step-by-step: (1) Give them a specific origin moment with vivid detail, (2) Stack 3-5 layers of credentials, (3) Show their results through other people's testimony, (4) Create scarcity around their time/access, (5) Make them reluctant to share their secret, (6) Give them a single named method/system, (7) Show the economic logic of why they're finally sharing."
      domains: [character-development, copywriting, storytelling]
      source: "JC-BEST-ADS"

    - id: "MET-JC-003"
      title: "How to Write Fascination Bullets That Create Hunger"
      description: "Method: (1) Lead with the most dramatic promise, (2) Alternate between 'how to' bullets, 'secret' bullets, 'mistake' bullets, and 'number' bullets, (3) Each bullet has a parenthetical payoff in italics or exclamation, (4) Include at least 2 bullets that directly challenge conventional wisdom, (5) End the bullet section with 'And there's more...' to imply additional hidden value, (6) Aim for 15-20 bullets minimum."
      domains: [fascination-bullets, copywriting, curiosity]
      source: "JC-BEST-ADS"

    - id: "MET-JC-004"
      title: "How to Stack Testimonials for Maximum Impact"
      description: "Method: (1) Lead with the most impressive professional testimonial, (2) Follow with 3-4 testimonials showing different types of results, (3) Include at least one 'skeptic turned believer,' (4) Each must have full name, location, and at least one specific number, (5) Include diverse professions/backgrounds, (6) End with the bridge line: 'Are these people any different than you? No.'"
      domains: [social-proof, testimonial-design, copywriting]
      source: "JC-BEST-ADS"

    - id: "MET-JC-005"
      title: "How to Build a Price Anchor Sequence"
      description: "Method: (1) Establish the high anchor early in the letter through the character's fee history, (2) Let the anchor sit for several paragraphs while building value, (3) Reveal the actual price with a dramatic contrast statement, (4) Immediately compare to something trivially cheap, (5) Add 'the money is actually irrelevant' plus the guarantee. Never reveal price before the anchor is firmly established."
      domains: [pricing-psychology, copywriting, offer-design]
      source: "JC-BEST-ADS"

    - id: "MET-JC-006"
      title: "How to Write the Opening of a Long-Form Sales Letter"
      description: "Method: (1) Headlines: biggest promise + how + intrigue, (2) Subhead: elaborate with 2-3 vivid benefits, (3) First paragraph: 'If you've ever wanted to [desire]... this will be the most important message you ever read,' (4) Second paragraph: 'Here's what this is all about' + introduce narrator, (5) Third paragraph: narrator's frustration/confession that mirrors the reader."
      domains: [copywriting, openings, sales-letter-structure]
      source: "JC-BEST-ADS"

    - id: "MET-JC-007"
      title: "How to Write a Narrative Urgency Close"
      description: "Method: (1) Explain why the offer exists through the story (economic argument, anger at competitors), (2) State the price with anchor comparison, (3) Paint a vivid future-state scene ('standing there with a smile on your face'), (4) Restate the guarantee with all risk-removal layers, (5) Restate urgency embedded in the narrative (deal may expire, uncensored version limited), (6) P.S. with all three elements (urgency + risk-free + phone number)."
      domains: [closing, copywriting, urgency]
      source: "JC-BEST-ADS"

    - id: "MET-JC-008"
      title: "How to Use Physical Attention Devices in Direct Mail"
      description: "Method: (1) Choose a small, inexpensive physical object (nickel, dollar bill, seed, stamp), (2) Attach it visibly to the top of the letter, (3) Reference it immediately in the opening ('As you can see, I have attached...'), (4) State two reasons it's there (attention + thematic), (5) Weave the object into the story as a metaphor, (6) Callback to the object in the close or story climax."
      domains: [direct-mail, attention-devices, copywriting]
      source: "JC-BEST-ADS"

    - id: "MET-JC-009"
      title: "How to Position a Video Course as Superior to Live Training"
      description: "Method: (1) Establish the value of live training through the character's fees, (2) Explain the economic logic of why video is being offered, (3) List 4-5 specific advantages of video over live (rewind, slow-motion, camera angles, home privacy, own pace), (4) Add that video customers get the 'same instruction' as personal clients, (5) Frame the lower price as better economics, not lower value."
      domains: [information-products, offer-positioning, copywriting]
      source: "JC-BEST-ADS"

    - id: "MET-JC-010"
      title: "How to Write the 'Order Now' Section"
      description: "Method: (1) 'Here's what you need to do now:' (direct command), (2) Phone number with department code, (3) Credit card acceptance, (4) Exact price with shipping breakdown, (5) Alternative ordering method (mail-in form), (6) 'Your tapes will be rushed out to you by return mail,' (7) Restate the guarantee one final time."
      domains: [call-to-action, closing, direct-response]
      source: "JC-BEST-ADS"

    - id: "MET-JC-011"
      title: "How to Write a Nickel Letter (Attention Device Letter)"
      description: "Complete method: (1) Attach nickel to top of letter, (2) Open with 'As you can see, I have attached a shiny new nickel,' (3) List 2 reasons for the nickel, (4) Transition into story that connects to the nickel thematically ('his life wasn't worth more than that nickel'), (5) Build dramatic story with vivid scene-setting, (6) Use the nickel as recurring metaphor throughout, (7) Close with standard risk-reversal and urgency sequence."
      domains: [direct-mail, attention-devices, copywriting, sales-letter-writing]
      source: "JC-BEST-ADS"

    - id: "MET-JC-012"
      title: "How to Construct a Priority Order Form"
      description: "Method: (1) Header: 'Priority Order Form', (2) Fastest service line with phone number, (3) 'YES!' statement restating the main promise and guarantee, (4) Credit card option with fields, (5) Check/money order option, (6) Address fields, (7) Company address with department code, (8) Fine print for tax, rush shipping, foreign orders."
      domains: [direct-mail, order-forms, conversion]
      source: "JC-BEST-ADS"

    - id: "MET-JC-013"
      title: "How to Write the Competitor Destruction Section"
      description: "Method: (1) Acknowledge the reader has tried alternatives ('dropped several thousand dollars having pros tell me'), (2) Show the specific failure mode of each alternative, (3) Use the fascinating character to explain WHY those alternatives fail (rules in a no-rules world, theory vs. practice), (4) List enemies who hate the character (proving superiority through opposition), (5) Transition directly to how the product is different."
      domains: [competitive-positioning, copywriting, persuasion]
      source: "JC-BEST-ADS"

    - id: "MET-JC-014"
      title: "How to Write Scene-Setting Paragraphs for Emotional Impact"
      description: "Method: (1) Choose a specific real location with sensory details, (2) Place the reader in the scene using present-tense language, (3) Build tension through physical details (shaved heads, jack boots, chains), (4) Escalate to the crisis moment, (5) Pause at the peak of tension with 'what would you have done?', (6) Pivot to the solution with a dramatic subhead."
      domains: [emotional-writing, storytelling, copywriting]
      source: "JC-BEST-ADS"

    - id: "MET-JC-015"
      title: "How to Write the Transformation Promise Section"
      description: "Method: (1) List the narrator's specific before/after results with numbers, (2) Use bullet points with exclamation marks, (3) Include progression ('And it just gets better and better!'), (4) Use parenthetical commentary to amplify each result, (5) Bridge from narrator's transformation to the reader's potential with 'But it's not magic at all! You see, what I learned...' — connecting the personal story to the product's mechanism."
      domains: [transformation, copywriting, sales-letter-structure]
      source: "JC-BEST-ADS"

    - id: "MET-JC-016"
      title: "SWS Complete 17-Step Process"
      description: "Complete methodology: Research→Avatar→USP→Features/Benefits→Bullets→Testimonials→Hooks→Headlines→Story→Pitch→Offer→Guarantee→Urgency→Bonuses→Close→Assembly. All building blocks BEFORE writing."
      domains: ["copywriting", "systematic-creation", "direct-response"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-017"
      title: "Market Research Detective Method"
      description: "8-step competitive intelligence: identify competitors, buy products, join lists, collect ads, analyze claims, identify gaps, find unspoken pain, document in swipe file."
      domains: ["market-research", "competitive-intelligence", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-018"
      title: "Bar Room Conversation Technique"
      description: "Avatar creation via conversational simulation: name them, seat them next to you, listen to complaints, write in their words, use their exact language in copy."
      domains: ["avatar-creation", "copywriting", "voice-matching"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-019"
      title: "B2B Avatar Decomposition"
      description: "Identify every person in buying decision, create separate avatars, write copy that arms the champion with ammunition for each."
      domains: ["b2b-sales", "avatar-creation", "copywriting"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-020"
      title: "The So What? Deepening Process"
      description: "Benefit excavation: state benefit, ask 'so what?', answer, repeat until tears/rage/desire. Minimum 3 levels, target 5."
      domains: ["copywriting", "benefit-deepening", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-021"
      title: "How-To Bullet Writing Method"
      description: "Start with 'How to...', add specificity, add twist, then evolve away from 'How to'. Training wheels that ensure substance."
      domains: ["copywriting", "bullet-writing", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-022"
      title: "Action Verb Substitution Method"
      description: "Circle every verb, replace generic with muscular alternatives, then delete unnecessary adjectives. 'Went' becomes 'stormed.'"
      domains: ["copywriting", "editing", "writing-craft"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-023"
      title: "Fantasy Testimonial Exercise"
      description: "Write 6 fantasy testimonials, extract subhead hooks from each, compare to real testimonials to find proof gaps."
      domains: ["copywriting", "testimonials", "creative-process"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-024"
      title: "Find the Subhead Hook from Testimonials"
      description: "Underline most powerful phrase in each testimonial, test as standalone subhead, arrange throughout copy."
      domains: ["copywriting", "testimonials", "subheads"]
      source: "JC-SWS2"
      confidence: 0.93
    - id: "MET-JC-025"
      title: "Blob on Couch Visualization"
      description: "Before writing, visualize prospect as exhausted blob. Ask what would make them sit up. That answer is your hook and lead."
      domains: ["copywriting", "creative-process", "reader-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-026"
      title: "Objection Line-Up Method"
      description: "List every objection, steelman each, write 2-3 counter-arguments, determine WHERE in copy to address. Strongest objection addressed 3+ times."
      domains: ["copywriting", "objection-handling", "sales-psychology"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-027"
      title: "Hand-Copying Method"
      description: "Copy proven ads BY HAND on paper. Engages different neural pathways, embedding rhythm and structure into muscle memory."
      domains: ["copywriting", "skill-development", "practice"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-028"
      title: "Toss the First Page Rule"
      description: "Real copy starts mid-page-1. Delete everything above where the energy picks up. First paragraphs are 'throat-clearing.'"
      domains: ["copywriting", "editing", "leads"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-029"
      title: "Melodic Writing Principle"
      description: "Read copy aloud, mark stumbles and unnatural points. Vary sentence length. Copy that sounds good aloud sells on paper."
      domains: ["copywriting", "editing", "quality-assurance"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-030"
      title: "Don't Preach to the Choir"
      description: "If prospect knows their problem, don't over-explain it. 80% on solution/transformation, 20% on problem."
      domains: ["copywriting", "editing", "awareness-levels"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-031"
      title: "Power Word Discipline"
      description: "Delete adjectives one at a time — if sentence works without it, leave it out. Replace adjective+weak verb with single powerful verb."
      domains: ["copywriting", "editing", "word-economy"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-032"
      title: "A/B Headline Testing Methodology"
      description: "Write 10-20+ variations, group by type, select finalists, test with What?! test, run live A/B, track conversion not just clicks."
      domains: ["copywriting", "headlines", "testing"]
      source: "JC-SWS2"
      confidence: 0.93
    - id: "MET-JC-033"
      title: "Metric-Based Guarantee"
      description: "Frame guarantee around measurable outcome 90%+ achieve: 'If you don't [specific result] within [timeframe], full refund.'"
      domains: ["copywriting", "guarantee-design", "risk-reversal"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-034"
      title: "Conditional vs Unconditional Guarantee"
      description: "Unconditional: no questions, max conversions. Conditional: proof of effort, reduces abuse. Start unconditional, switch if refunds >10-15%."
      domains: ["copywriting", "guarantee-design", "risk-management"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-035"
      title: "Market Test Justification for Urgency"
      description: "Frame as market test with real deadline. Two outcomes: price up or offer pulled. Both create genuine urgency."
      domains: ["copywriting", "urgency", "ethics"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-036"
      title: "PS Stacking as Closing Technique"
      description: "Each PS targets different buying motivation: benefit, social proof, guarantee, takeaway, personal note. Must work standalone."
      domains: ["copywriting", "closing", "direct-mail"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-037"
      title: "Media-Adapted Close"
      description: "Written: PS stacking. Video: 'one more thing.' Phone: takeaway close + silence. In-person: physical pile of materials."
      domains: ["copywriting", "closing", "multi-media"]
      source: "JC-SWS2"
      confidence: 0.93
    - id: "MET-JC-038"
      title: "Anti-Writer's-Block Protocol"
      description: "Complete all building blocks (Steps 1-8) before writing. Writer's block = skipped research step. Go back and do it."
      domains: ["copywriting", "creative-process", "productivity"]
      source: "JC-SWS2"
      confidence: 0.95
    - id: "MET-JC-039"
      title: "Daily Journal Practice for Voice Development"
      description: "Minimum 20 min daily. Write fast, no editing, write as you talk. Voice emerges naturally through practice. Journal is private practice, not product."
      domains: ["copywriting", "skill-development", "voice-development"]
      source: "JC-SWS2"
      confidence: 0.95

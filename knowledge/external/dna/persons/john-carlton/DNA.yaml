    - term: "Fascinating Character"
      meaning: "The central figure in a story-driven sales letter whose discovery or ability creates the product's credibility"
    - term: "Amazing Discovery Narrative"
      meaning: "Carlton's signature story arc: ordinary person discovers extraordinary secret through fascinating character, now available to you"
    - term: "Third-Party Narrator"
      meaning: "The letter writer positions as a fellow customer/discoverer rather than the product creator — builds trust through peer identification"

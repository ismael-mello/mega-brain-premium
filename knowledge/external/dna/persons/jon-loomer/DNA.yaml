        content: "Optimize for landing page views instead of link clicks to filter out people who click but never load the page."
        threshold: "LPV > link clicks"
        domain: optimization
        source: YTCH
  L4_FRAMEWORKS:
    count: 72
    items:
      # === EXISTING SFAS (15 items) ===
      - id: "FW-JL-001"
        title: "4-Phase Scaling Checklist"
        content: "Phase 1: Foundation (remarketing + 1-2 prospecting). Phase 2: Expansion (PPE + video + consolidation). Phase 3: Advanced (2X purchasers, wide audiences, broadmatch DPA). Phase 4: Optimization (bid override, cross-sell, geoexpansion, automated rules)"
        domain: scaling
        source: SFAS
      - id: "FW-JL-002"
        title: "Horizontal Scaling Architecture"
        content: "Simultaneously expand: audiences (lookalikes, interests, wide) + offers (different pitches per funnel stage) + objectives (conversions, PPE, video views, catalog sales) + creative (photo, video, carousel, link)"
        domain: scaling
        source: SFAS
      - id: "FW-JL-003"
        title: "Remarketing Rework System"
        content: "Replace simple 30-day DPA + 30-day WCA with: DPA 7d + DPA 30d + WCA 7d + WCA 30d + Engagement 30d + Added to Cart 60d -- each with unique copy/creative"
        domain: remarketing
        source: SFAS
      - id: "FW-JL-004"
        title: "Scalable Account Structure"
        content: "Campaign: Conversions TOFU (lookalikes, interests, behaviorals) + Conversions BOFU (7/30/180 day visitors) + Catalog Sales DPA (7/30 day) + Conversions Previous Purchasers + PPE Fans"
        domain: account-structure
        source: SFAS
      - id: "FW-JL-005"
        title: "Super Lookalike Strategy"
        content: "At low budget: group multiple lookalikes in one ad set. As you see success: separate them out. Always check overlap stays under 30%"
        domain: audience-optimization
        source: SFAS
      - id: "FW-JL-006"
        title: "Multiple Objectives Framework"
        content: "Run simultaneously: Conversions TOFU + Video Views TOFU + Conversions BOFU + Catalog Sales TOFU + Catalog Sales BOFU + Conversions Previous Buyers + PPE Previous Buyers & Fans"
        domain: scaling
        source: SFAS
      - id: "FW-JL-007"
        title: "Naming Convention System"
        content: "Campaign: Date_CampaignName_Objective. Ad Set: Date_Campaign_Audience_Placement_BidType. Ad: Date_Creative_# (best seller = #1). Always put date first"
        domain: account-structure
        source: SFAS
      - id: "FW-JL-008"
        title: "Social Proofing System"
        content: "Step 1: Create photo post. Step 2: Launch PPE to fans/customers. Step 3: Collect social proof comments. Step 4: Copy Post ID. Step 5: Paste into conversion campaigns"
        domain: creative-strategy
        source: SFAS
      - id: "FW-JL-009"
        title: "DPA Complexity Progression"
        content: "Level 1: Simple 30-day viewed/added to cart. Level 2: Segmented 7/14/30 day windows. Level 3: Upsell + cross-sell product sets. Level 4: Broadmatch DPA for prospecting"
        domain: dynamic-product-ads
        source: SFAS
      - id: "FW-JL-010"
        title: "Bid Strategy Decision Tree"
        content: "Goal: Growth = cost-controlled (target cost/manual within CPA range) OR cost-forward (manual 3-5X CPA bully method) OR automatic. Goal: Stability = target cost or auto"
        domain: bidding-strategy
        source: SFAS
      - id: "FW-JL-011"
        title: "Landing Page Mapping"
        content: "TOFU: bestsellers page / product page / collection page. BOFU: product page via DPA + photo/link post for remarketing. Loyalty: separate page for previous customers. Branding: home page"
        domain: scaling
        source: SFAS
      - id: "FW-JL-012"
        title: "Daily Reporting Framework"
        content: "3 reports daily (Yesterday, Today, 30-Day). Each contains: ad set name, spend, results, reach, cost/result, budget, purchases, purchase value, ROAS, link clicks, CPC, CTR(link)"
        domain: reporting
        source: SFAS
      - id: "FW-JL-013"
        title: "Automated Rules System"
        content: "Auto-adjust: budget by CPA thresholds. Auto-pause: by frequency/spend limits. Auto-notify: performance changes. Rules on: cost/result, CPC, CPA, CPM, frequency, impressions, reach"
        domain: scaling
        source: SFAS
      - id: "FW-JL-014"
        title: "Prospecting Audience Stack"
        content: "Core: 1% purchasers, 1% VIP 2yr, 1% add-to-carts, 1% 2X page view. Advanced: 1% 2X purchasers, 2%+ purchasers, 10% VIP + interest, categorical WCA lookalikes, wide/no targeting"
        domain: audience-optimization
        source: SFAS
      - id: "FW-JL-015"
        title: "Stop-Restart Refresh"
        content: "When ad set performance declines: pause it, duplicate it, start again at lower budget. Re-enters auction fresh. Can run concurrently with existing"
        domain: scaling
        source: SFAS
      # === NEW YTCH: 20 Factors (080-087) ===
      - id: "FW-JL-080"
        title: "20 Factors Diagnostic Framework"
        content: "When ads fail, evaluate all 20 factors: bidding, creative, copy, targeting, optimization, budget, placements, frequency, landing page, website performance, pixel setup, email list, purchase intent, sample size, ad formats, website traffic, minimal control, and general approaches."
        domain: facebook-ads
        source: YTCH
      - id: "FW-JL-081"
        title: "Control vs No-Control Matrix"
        content: "Map each of the 20 factors on a control spectrum. Focus energy on high-control factors (creative, landing page, offer) and accept low-control factors (competition, algorithm)."
        domain: facebook-ads
        source: YTCH
      - id: "FW-JL-082"
        title: "Bidding Decision Framework"
        content: "Step 1: Start with auto bidding. Step 2: If CPA is acceptable, keep auto. Step 3: If CPA is too high, try cost cap. Step 4: Only use bid cap if you need strict control."
        domain: bidding-strategy
        source: YTCH
      - id: "FW-JL-083"
        title: "Landing Page Audit Framework"
        content: "Check: Does it match ad promise? Is it clear and concise? Is the CTA visible? Does it load fast on mobile? Is the form simple? Does it have social proof?"
        domain: landing-pages
        source: YTCH
      - id: "FW-JL-084"
        title: "Optimization Event Selection Tree"
        content: "Can you get 50 purchases/week? Use purchase. No? Can you get 50 add-to-carts? Use ATC. No? Move up to initiate checkout or lead. Never optimize for page views if you want sales."
        domain: optimization
        source: YTCH
      - id: "FW-JL-085"
        title: "Sample Size Decision Framework"
        content: "Under 50 conversions: no conclusions. 50-100 conversions: directional insights. 100+ conversions: reliable conclusions. Under 1,000 impressions: ad set not proven."
        domain: measurement
        source: YTCH
      - id: "FW-JL-086"
        title: "Email List Quality Framework"
        content: "Segment email list by recency and value. Upload high-value segments for lookalikes. Use full list for exclusions. Sync regularly."
        domain: audience-optimization
        source: YTCH
      - id: "FW-JL-087"
        title: "Website Performance Checklist"
        content: "Check: load time under 3 seconds, mobile responsive, clear navigation, minimal distractions, working pixel, functioning checkout or form."
        domain: landing-pages
        source: YTCH
      # === NEW YTCH: Attribution (200-208) ===
      - id: "FW-JL-200"
        title: "Attribution Setup Checklist"
        content: "Step 1: Install pixel. Step 2: Set up Conversions API. Step 3: Configure standard events. Step 4: Verify domain. Step 5: Set priority events. Step 6: Enable server-side tracking."
        domain: tracking
        source: YTCH
      - id: "FW-JL-201"
        title: "Attribution Interpretation Framework"
        content: "Compare 1-day click, 7-day click, and 1-day view. High view-through = awareness value. High 7-day click = delayed conversion path. Use all three for complete picture."
        domain: attribution
        source: YTCH
      - id: "FW-JL-202"
        title: "Incremental Attribution Analysis"
        content: "Step 1: Review total conversions. Step 2: Review incremental conversions. Step 3: Calculate incremental lift percentage. Step 4: Adjust budget based on true incremental value."
        domain: attribution
        source: YTCH
      - id: "FW-JL-203"
        title: "Confirmation Bias Detection Framework"
        content: "Step 1: Identify your belief about what works. Step 2: Actively seek contradicting data. Step 3: Run holdout tests. Step 4: Compare with and without the tactic."
        domain: measurement
        source: YTCH
      - id: "FW-JL-204"
        title: "Multi-Platform Attribution Model"
        content: "Meta reports differently from GA, from CRM, and from platform analytics. Create a reconciliation framework that accounts for each source's bias."
        domain: attribution
        source: YTCH
      - id: "FW-JL-205"
        title: "Metrics Hierarchy Framework"
        content: "Primary: ROAS, cost per purchase, value per purchase. Secondary: CPA, CTR, landing page views. Tertiary: reach, impressions, frequency, CPM. Never optimize on tertiary alone."
        domain: reporting
        source: YTCH
      - id: "FW-JL-206"
        title: "Value Rules Application Framework"
        content: "Identify which conversions are worth more. Set value rules in Meta for audience segments, geographies, or devices that convert at higher values."
        domain: attribution
        source: YTCH
      - id: "FW-JL-207"
        title: "Cost Per Lead Valuation Framework"
        content: "Step 1: Track cost per lead. Step 2: Track lead-to-sale conversion rate. Step 3: Calculate value per lead (revenue/leads). Step 4: Target value per lead, not cost per lead."
        domain: measurement
        source: YTCH
      - id: "FW-JL-208"
        title: "Remarketing vs Prospecting Analysis"
        content: "Compare remarketing ROAS to prospecting ROAS. If remarketing is 5x+ better, most remarketing conversions are non-incremental. Shift budget to prospecting."
        domain: attribution
        source: YTCH
      # === NEW YTCH: Audience (300-307) ===
      - id: "FW-JL-300"
        title: "Advantage+ Audience Decision Tree"
        content: "New account? Use suggestions. Established account? No suggestions needed. Purchase optimization? Go broad. Top-of-funnel? Consider original audiences."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-301"
        title: "When to Use Original Audiences Framework"
        content: "Use original audiences for: abandoned cart remarketing, customer exclusion, specific remarketing messages, or when Advantage+ consistently underperforms."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-302"
        title: "Audience Consolidation Framework"
        content: "Step 1: Identify overlapping audiences. Step 2: Merge into fewer ad sets. Step 3: Let algorithm distribute within larger pool. Step 4: Monitor performance improvement."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-303"
        title: "Targeting Evolution Timeline"
        content: "2015: interests and behaviors. 2018: lookalikes dominate. 2021: iOS changes targeting. 2023: Advantage+ audience. 2025: creative is the new targeting."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-304"
        title: "Lead Quality Optimization Framework"
        content: "Step 1: Use conversion leads optimization. Step 2: Gate content in lead forms. Step 3: Restrict to targeted audiences. Step 4: Sync leads to CRM. Step 5: Score and report back."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-305"
        title: "Exclusion Strategy Framework"
        content: "Always exclude: existing customers from prospecting, recent converters from repeat messaging, irrelevant geographies, and known bot audiences."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-306"
        title: "Campaign Impact on Targeting Framework"
        content: "More campaigns and ad sets = more auction overlap = higher costs. Fewer campaigns = better algorithm learning = lower costs."
        domain: audience-targeting
        source: YTCH
      - id: "FW-JL-307"
        title: "Broad Targeting Recovery Framework"
        content: "When broad targeting fails: Step 1: Verify optimization event. Step 2: Check creative quality. Step 3: Review landing page. Step 4: Add audience suggestions. Step 5: Test original audiences."
        domain: audience-targeting
        source: YTCH
      # === NEW YTCH: Campaign (400-410) ===
      - id: "FW-JL-400"
        title: "Simplified Campaign Architecture"
        content: "One prospecting campaign, one remarketing campaign (if needed), fewest ad sets possible, diverse creative within each. Start here, add complexity only with clear justification."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-401"
        title: "Performance Goal Selection Framework"
        content: "Want sales? Maximize conversions (purchase). Want leads? Maximize conversions (lead). Want awareness? Maximize reach. Never optimize for proxy metrics when you can go direct."
        domain: optimization
        source: YTCH
      - id: "FW-JL-402"
        title: "Four Traits Success Framework"
        content: "Trait 1: Prioritize simplicity. Trait 2: Embrace experimentation. Trait 3: Understand how the system works. Trait 4: Adapt to change quickly."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-403"
        title: "Campaign Decline Diagnosis Framework"
        content: "Week 1-2 strong then decline? Check: creative fatigue, audience saturation, increased competition, seasonal shifts, or natural algorithm behavior."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-404"
        title: "Algorithm Understanding Framework"
        content: "Three layers: Andromeda finds eligible ads. Optimization finds likely converters. Auction selects the winner. Understand all three to master the platform."
        domain: optimization
        source: YTCH
      - id: "FW-JL-405"
        title: "Budget Not Spending Diagnosis Framework"
        content: "Check in order: audience too narrow, bid too low, creative rejected by review, optimization event too rare, account spending limit hit."
        domain: budget-management
        source: YTCH
      - id: "FW-JL-406"
        title: "Seasonal Campaign Planning Framework"
        content: "8 weeks out: plan creative. 4 weeks: launch awareness. 2 weeks: launch conversion campaigns. During: monitor and adjust. After: analyze and learn."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-407"
        title: "Long Buying Cycle Framework"
        content: "Step 1: Awareness campaigns for visibility. Step 2: Content engagement for nurture. Step 3: Retarget engaged users. Step 4: Conversion campaign after sufficient touchpoints."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-408"
        title: "Multiple Campaign Justification Framework"
        content: "Use multiple campaigns only when: different budget allocations needed, different objectives required, or different optimization goals exist. Otherwise consolidate."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-409"
        title: "Facebook Ads Funnel Updated"
        content: "Awareness: reach/video views optimization. Consideration: traffic/engagement. Conversion: purchase/lead. With broad targeting, the funnel collapses into fewer stages."
        domain: campaign-strategy
        source: YTCH
      - id: "FW-JL-410"
        title: "Ads Aren't Working Action Framework"
        content: "Step 1: Check offer (is it compelling?). Step 2: Check creative (is it diverse?). Step 3: Check landing page (does it convert?). Step 4: Check tracking (is data flowing?). Step 5: Check budget (is it sufficient?). Step 6: Check optimization (right performance goal?)."
        domain: campaign-strategy
        source: YTCH
      # === NEW YTCH: Creative (500-505) ===
      - id: "FW-JL-500"
        title: "Creative Diversification Phased Approach"
        content: "Phase 1: 3-5 ads with different formats. Phase 2: Add text variations to winners. Phase 3: Add persona-specific messaging. Phase 4: Enable Advantage+ enhancements. Build up, don't start maxed."
        domain: creative-strategy
        source: YTCH
      - id: "FW-JL-501"
        title: "Creative Testing Revisited Framework"
        content: "Old way: A/B test individual elements in separate ad sets. New way: Provide diverse creative in one ad set and let the algorithm find winners. Focus on themes, not elements."
        domain: creative-strategy
        source: YTCH
      - id: "FW-JL-502"
        title: "Creative Diversity Dimensions"
        content: "Three dimensions of diversity: Format (static, video, carousel). Text (personas, pain points, solutions). Visual (styles, colors, UGC vs professional). Cover all three."
        domain: creative-strategy
        source: YTCH
      - id: "FW-JL-503"
        title: "Placement Customization Framework"
        content: "Feed: 1:1 or 4:5 ratio. Stories/Reels: 9:16 vertical. Right column: 1:1 small. Search: text-heavy. Customize at minimum feed and stories."
        domain: creative-strategy
        source: YTCH
      - id: "FW-JL-504"
        title: "Creative Results Action Framework"
        content: "Winners: scale with more variations on same theme. Losers: analyze why (format? message? visual?). Middlers: test with small modifications. Patterns: inform next batch."
        domain: creative-strategy
        source: YTCH
      - id: "FW-JL-505"
        title: "Content Repurposing Framework"
        content: "Record one video. Edit for YouTube. Cut to short for Shorts/Reels/TikTok. Extract audio for podcast. Pull quotes for social. Write blog post from script."
        domain: content-creation
        source: YTCH
      # === NEW YTCH: Business/AI (600-605) ===
      - id: "FW-JL-600"
        title: "AI Integration for Advertisers"
        content: "Use AI for: idea generation, copy drafts, chatbot support, voice cloning for content, and search optimization. Do not use AI for: final strategic decisions or client communication."
        domain: ai-advertising
        source: YTCH
      - id: "FW-JL-601"
        title: "Ideal Client Selection Framework"
        content: "Score clients on: lets you work independently, realistic expectations, quality product/service, adequate budget, responsive to communication, long-term mindset."
        domain: business-strategy
        source: YTCH
      - id: "FW-JL-602"
        title: "Content Consistency Framework"
        content: "Choose sustainable frequency. Record one day ahead. Edit same day. Schedule for next day. Track streak. Never break the chain. Adjust frequency before breaking streak."
        domain: content-creation
        source: YTCH
      - id: "FW-JL-603"
        title: "Future of Search Preparation"
        content: "Create comprehensive, authoritative content. Structure for AI citation. Build E-E-A-T signals. Diversify traffic sources beyond Google."
        domain: ai-advertising
        source: YTCH
      - id: "FW-JL-604"
        title: "Agency Evolution Framework"
        content: "From execution (managing campaigns) to strategy (advising on business fundamentals). From targeting experts to creative strategists. From manual optimization to AI oversight."
        domain: business-strategy
        source: YTCH
      - id: "FW-JL-605"
        title: "Ethics in Advertising Framework"
        content: "Know the rules inside out. Stay away from gray areas. Accept that competitors will bend rules. Focus on sustainable long-term success over short-term gains."
        domain: business-ethics
        source: YTCH
      # === NEW YTCH: Platform (700-708) ===
      - id: "FW-JL-700"
        title: "Ad Auction Understanding Framework"
        content: "Three components: Bid (how much you pay), Estimated Action Rate (how likely user acts), User Value (ad quality and relevance). Total Value = sum of all three."
        domain: optimization
        source: YTCH
      - id: "FW-JL-701"
        title: "Learning Phase Management Framework"
        content: "Step 1: Set realistic expectations. Step 2: Ensure sufficient budget for 25-50 events. Step 3: Do not make changes. Step 4: Evaluate only after completion. Step 5: If stuck, adjust optimization event."
        domain: optimization
        source: YTCH
      - id: "FW-JL-702"
        title: "CAPI Setup Decision Tree"
        content: "Using Shopify/WooCommerce? Use built-in integration. Using GTM? Use GTM solution. Using custom site? Use API Gateway. Budget limited? Use Stape. Always combine with pixel."
        domain: tracking
        source: YTCH
      - id: "FW-JL-703"
        title: "Custom Event Strategy Framework"
        content: "Standard events for main conversions. Custom events for micro-conversions. Parameters for all events. GTM for implementation. Test in Events Manager before launching ads."
        domain: tracking
        source: YTCH
      - id: "FW-JL-704"
        title: "Automated Rules Safety Framework"
        content: "Rule 1: Increase budget if CPA < target for 3 days. Rule 2: Decrease budget if CPA > 150% of target. Rule 3: Pause if spend > 2x CPA with zero conversions. Rule 4: Notify on anomalies."
        domain: optimization
        source: YTCH
      - id: "FW-JL-705"
        title: "Building Blocks Training Approach"
        content: "Foundation: tracking setup. Layer 1: campaign structure. Layer 2: audience strategy. Layer 3: creative approach. Layer 4: measurement and optimization. Build sequentially."
        domain: facebook-ads
        source: YTCH
      - id: "FW-JL-706"
        title: "Biggest Updates Monitoring Framework"
        content: "Track Meta updates quarterly. Categorize as: targeting changes, creative tools, measurement updates, automation features, policy changes. Adjust strategy per category."
        domain: facebook-ads
        source: YTCH
      - id: "FW-JL-707"
        title: "Conspiracy Theory Filter"
        content: "When you hear a claim about Meta: Check Meta help center. Check your own data. If both contradict the claim, it is a conspiracy theory. Dismiss and move on."
        domain: facebook-ads
        source: YTCH
      - id: "FW-JL-708"
        title: "Recent Marketing Evolution Framework"
        content: "Pre-iOS 14: precise targeting and measurement. Post-iOS 14: data loss and adjustment. AI era: algorithmic targeting and creative diversification. Adapt to each era."
        domain: facebook-ads
        source: YTCH

  L5_METHODOLOGIES:
    count: 57
    items:
      # === EXISTING SFAS (9 items) ===
      - id: "MET-JL-001"
        title: "Scaling Phase 1 Setup"
        content: "1. Decide funnel position (TOFU/MOFU/BOFU). 2. Plan horizontal scaling with differentiated value props. 3. Do financial calculations (AOV, LTV, margin). 4. Launch DPA or WCA remarketing. 5. Introduce 1-2 new prospecting audiences. 6. Create 3/7/30 day remarketing windows. 7. Check budget cap. 8. Rename with naming conventions"
        domain: scaling
        source: SFAS
      - id: "MET-JL-002"
        title: "Scaling Phase 2 Expansion"
        content: "1. Introduce PPE objective in BOFU. 2. Launch social proofing via PPE in TOFU, transfer to conversion after 72h. 3. Consolidate prospecting to get closer to 50/week learning phase. 4. Introduce video views in TOFU with :30 video. 5. Create 25% video viewer audience for remarketing. 6. Experiment with higher pixel event optimization"
        domain: scaling
        source: SFAS
      - id: "MET-JL-003"
        title: "Scaling Phase 3 Advanced Audiences"
        content: "1. Launch 1% lookalike of 2X purchasers. 2. Launch 2%+ lookalike of purchasers. 3. Launch specific interests by ad set. 4. Launch wide, no-targeting audience with value optimization. 5. Launch broadmatch DPA. 6. Create 7/14/30/90 day DPA windows with different copy. 7. Test landing pages. 8. Split test placements (especially Instagram)"
        domain: scaling
        source: SFAS
      - id: "MET-JL-004"
        title: "Scaling Phase 4 Optimization"
        content: "1. Manual bid override 3-5X CPA. 2. Launch DPA cross-sells and upsells by product category. 3. Build automated rules framework. 4. Expand into new geographies (UK, DE, AU). 5. Split iOS/Android. 6. When declining: pause, duplicate, restart"
        domain: scaling
        source: SFAS
      - id: "MET-JL-005"
        title: "Broadmatch DPA Setup Protocol"
        content: "1. Select Catalog Sales objective. 2. Choose define broad audience radio button. 3. Set widest targeting (18-65, full country). 4. Exclude 180-day visitors and fans. 5. Create custom exclusion for recent purchasers. 6. Bid 7-day click/1-day view. 7. Ensure irresistible offer. 8. Measure in 30-day window"
        domain: dynamic-product-ads
        source: SFAS
      - id: "MET-JL-006"
        title: "DPA Cross-Sell/Upsell Setup"
        content: "1. Go to catalog > product sets. 2. Create product set filtering by brand/category. 3. In campaign creation, select upsell or cross-sell. 4. Choose product set. 5. Target based on purchase/view history of specific collections. 6. Add WCA pools via advanced options. 7. Exclude fans"
        domain: dynamic-product-ads
        source: SFAS
      - id: "MET-JL-007"
        title: "Social Proof Activation"
        content: "1. Create compelling photo post ad with product. 2. Launch as PPE to fans and previous customers. 3. Collect comments/social proof (48-72h). 4. Copy the Post ID from the ad. 5. Paste Post ID into new conversion campaign. 6. Social proof carries over, boosting total auction value"
        domain: creative-strategy
        source: SFAS
      - id: "MET-JL-008"
        title: "Vertical Scaling Protocol"
        content: "1. Confirm 7-14 days of stable performance. 2. Increase budget 10-20% per 48-72 hours. 3. Monitor daily: CTR, CPA, ROAS. 4. If CPA rises >20%, pause the increase. 5. If performance degrades: duplicate ad set, restart at lower budget. 6. Simultaneously build horizontal scaling alongside"
        domain: scaling
        source: SFAS
      - id: "MET-JL-009"
        title: "Learning Phase Management"
        content: "1. Consolidate audiences into fewer ad sets to approach 50/week. 2. Consider moving pixel event up (purchase > add to cart > initiate checkout). 3. Never change targeting/creative/optimization during learning. 4. Budget and bid changes do NOT reset learning. 5. Automated rule budget changes don't reset either"
        domain: facebook-ads
        source: SFAS
      # === NEW YTCH: 20 Factors (080-086) ===
      - id: "MET-JL-080"
        title: "20 Factors Diagnostic Process"
        content: "1. List all 20 factors. 2. Rate each 1-10 for your account. 3. Identify lowest-scoring factors. 4. Prioritize fixes by impact and control. 5. Fix one at a time. 6. Re-evaluate after each fix."
        domain: facebook-ads
        source: YTCH
      - id: "MET-JL-081"
        title: "Copy Testing Methodology"
        content: "1. Write 3-5 variations targeting different pain points. 2. Test short vs long. 3. Run with same image across variations. 4. Let algorithm distribute. 5. Identify winning themes, not just winning copy."
        domain: creative-strategy
        source: YTCH
      - id: "MET-JL-082"
        title: "Bidding Optimization Process"
        content: "1. Start with auto bidding. 2. Run for 7+ days. 3. Analyze CPA trend. 4. If CPA too high, switch to cost cap at target CPA. 5. If still high, try bid cap at 1.5x target. 6. Monitor 72h after each change."
        domain: bidding-strategy
        source: YTCH
      - id: "MET-JL-083"
        title: "Landing Page Optimization Process"
        content: "1. Match ad promise to landing page headline. 2. Remove unnecessary navigation. 3. Place CTA above fold. 4. Add social proof near CTA. 5. Test mobile speed (under 3 seconds). 6. A/B test page variations."
        domain: landing-pages
        source: YTCH
      - id: "MET-JL-084"
        title: "Website Performance Optimization"
        content: "1. Test load speed with Google PageSpeed Insights. 2. Optimize images. 3. Minimize JavaScript. 4. Use CDN. 5. Test checkout flow on mobile. 6. Monitor bounce rate in GA."
        domain: landing-pages

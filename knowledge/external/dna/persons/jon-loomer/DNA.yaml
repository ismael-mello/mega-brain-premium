layers:
  L1_PHILOSOPHIES:
    count: 94
    items:
      # === EXISTING SFAS (14 items) ===
      - id: "FIL-JL-001"
        title: "Horizontal Scaling Supremacy"
        content: "Sustainable growth comes from expanding audiences/offers/objectives, not just increasing budgets on existing ad sets"
        domain: scaling
        source: SFAS
      - id: "FIL-JL-002"
        title: "Facebook Is Not an ATM"
        content: "Requires constant experimentation. Never get too comfortable. Just because you increase budget doesn't mean same percentage of people want to buy"
        domain: facebook-ads
        source: SFAS
      - id: "FIL-JL-003"
        title: "Complicated Problem Simplifier"
        content: "Be a complicated problem simplifier, not a simple problem complicator. Don't go overboard with testing complexity"
        domain: scaling
        source: SFAS
      - id: "FIL-JL-004"
        title: "Scaling Is Moneyball"
        content: "Get more people on base. Build systems, not single winners. One great ad set will eventually die without the system behind it"
        domain: scaling
        source: SFAS
      - id: "FIL-JL-005"
        title: "Creative Is the Fuel"
        content: "Without creative volume, scaling dies. Creative gap is the #1 killer of scaling efforts"
        domain: creative-strategy
        source: SFAS
      - id: "FIL-JL-006"
        title: "Ads as Landing Pages"
        content: "Photo posts with social proof become landing pages themselves. Comments validate the product better than any landing page copy"
        domain: creative-strategy
        source: SFAS
      - id: "FIL-JL-007"
        title: "Pixel Seasoning Philosophy"
        content: "Like a cast-iron skillet, a seasoned pixel always performs better. More data = better optimization = better results"
        domain: pixel-optimization
        source: SFAS
      - id: "FIL-JL-008"
        title: "Break Even Is Victory"
        content: "If you can break even on prospecting within 30 days, you're winning. Remarketing delivers the profit"
        domain: scaling
        source: SFAS
      - id: "FIL-JL-009"
        title: "Different Pitches for Different People"
        content: "Not everyone is enticed by the same thing. We are all motivated by different ads, benefits, and solutions"
        domain: audience-optimization
        source: SFAS
      - id: "FIL-JL-010"
        title: "Signals Drive Everything"
        content: "More data flowing into pixel events = better lookalikes = better performance. The Facebook book should be called Signals"
        domain: pixel-optimization
        source: SFAS
      - id: "FIL-JL-011"
        title: "Dynamic Over Static"
        content: "Dynamic audiences regenerate every 3-7 days. They almost always outperform static audiences due to data freshness"
        domain: audience-optimization
        source: SFAS
      - id: "FIL-JL-012"
        title: "Algorithm Finds Best First"
        content: "Facebook finds the best converters first. As you increase budget, you reach less relevant people. This is the fundamental scaling challenge"
        domain: facebook-ads
        source: SFAS
      - id: "FIL-JL-013"
        title: "Scaling Is Hard"
        content: "Many industry experts claim scaling is easy. PRO TIP: It's not. There's a reason no in-depth scaling training existed before this"
        domain: scaling
        source: SFAS
      - id: "FIL-JL-014"
        title: "Numbers Before Scale"
        content: "Without financial calculations in order ahead of time, scaling is gambling. Know AOV, LTV, margin percentage before spending more"
        domain: budget-management
        source: SFAS
      # === NEW YTCH: 20 Factors (080-088) ===
      - id: "FIL-JL-080"
        title: "No Magic Bullet in Facebook Ads"
        content: "There is no single fix or template that always works. 20 factors all contribute to your results and you cannot isolate just one."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-081"
        title: "Complicated Problem Simple Answer Fallacy"
        content: "People want a straight answer for why ads failed, but it is impossible because so many factors contribute simultaneously."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-082"
        title: "Bidding Low Is False Economy"
        content: "Bidding too low means you lose every auction or reach low-quality people. Cheap reach often means worthless reach."
        domain: bidding-strategy
        source: YTCH
      - id: "FIL-JL-083"
        title: "No Creative Template Always Works"
        content: "If someone tells you there is a specific formula for imagery that always works, run away. There is no such thing."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-084"
        title: "Sample Size Humility"
        content: "Far too often we react or overreact based on small sample sizes. Results mean very little with a small sample."
        domain: measurement
        source: YTCH
      - id: "FIL-JL-085"
        title: "Landing Page Breaks the Chain"
        content: "You could have a great ad and it won't matter if you have a bad landing page. The landing page must follow through on the ad promise."
        domain: landing-pages
        source: YTCH
      - id: "FIL-JL-086"
        title: "Optimization Is Literal"
        content: "Facebook optimizes to show ads to people most likely to act on what you told it. If you optimize for the wrong thing, you get wrong results."
        domain: optimization
        source: YTCH
      - id: "FIL-JL-087"
        title: "Minimal Control Is the Future"
        content: "The direction of Meta advertising is toward less advertiser control and more algorithmic decision-making. Embrace it."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-088"
        title: "General Approaches Over Specific Hacks"
        content: "Focus on foundational approaches like strong creative, proper tracking, and good offers rather than searching for hacks."
        domain: facebook-ads
        source: YTCH
      # === NEW YTCH: Attribution (200-210) ===
      - id: "FIL-JL-200"
        title: "Attribution Spills Down From the Top"
        content: "If you get attribution wrong, it impacts your reporting, optimization, and targeting. It can screw everything up."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-201"
        title: "Click Attribution Is Not What It Used to Be"
        content: "The shift from 28-day click to 7-day click changed everything. Many conversions that used to be counted are now invisible."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-202"
        title: "View-Through Conversions Are Real"
        content: "Someone sees your ad, gets emailed that day, and converts. That is a legitimate view-through conversion and should not be dismissed."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-203"
        title: "Meta Conversion Reporting Is Not the Problem"
        content: "The problem is usually advertiser misunderstanding of how attribution works, not Meta reporting system itself."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-204"
        title: "One Ad Gets Credit Per Conversion"
        content: "The theory that multiple ads get credit for a single conversion is not true. Meta gives credit to the most recent click."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-205"
        title: "Google Analytics Disagreement Is Expected"
        content: "GA and Meta will never fully match because GA cannot track view-through conversions or delayed click conversions the same way."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-206"
        title: "Incremental Attribution Adds Nuance"
        content: "Incremental attribution separates conversions that would have happened anyway from those truly driven by ads."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-207"
        title: "Confirmation Bias Distorts Attribution"
        content: "Advertisers believe remarketing works because the numbers look good, ignoring that those people would have converted anyway."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-208"
        title: "Correlation Is Not Causation in Ads"
        content: "Just because results improved after a change does not mean that change caused the improvement. Many variables shift simultaneously."
        domain: attribution
        source: YTCH
      - id: "FIL-JL-209"
        title: "Look Beyond Surface-Level Results"
        content: "Surface metrics like cost per lead are mostly meaningless without understanding lead quality and downstream conversion rates."
        domain: measurement
        source: YTCH
      - id: "FIL-JL-210"
        title: "Trust But Verify the Algorithm"
        content: "Meta algorithm can find weaknesses in your optimization. If results seem too good to be true, they probably are."
        domain: measurement
        source: YTCH
      # === NEW YTCH: Audience (300-308) ===
      - id: "FIL-JL-300"
        title: "Targeting Inputs Matter Less Than Before"
        content: "With Advantage+ audience and algorithmic targeting, your targeting inputs are suggestions at best. The algorithm decides."
        domain: audience-targeting
        source: YTCH
      - id: "FIL-JL-301"
        title: "Audience Suggestions Are an Illusion of Control"
        content: "Providing audience suggestions in Advantage+ gives you a feeling of control, but the algorithm goes as broad as it needs to."
        domain: audience-targeting
        source: YTCH
      - id: "FIL-JL-302"
        title: "Creative Diversification Is the New Targeting"
        content: "The focus has shifted from niche targeting to creative diversification as the best lever to find the most relevant audiences."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-303"
        title: "Detailed Targeting Is Mostly Dead"
        content: "Interest-based and behavior-based targeting is being phased out. The algorithm with proper optimization handles targeting better."
        domain: audience-targeting
        source: YTCH
      - id: "FIL-JL-304"
        title: "Broad Targeting Requires Purchase Optimization"
        content: "Broad targeting works best when optimizing for purchases because the algorithm cannot be misled with low-quality purchases."
        domain: audience-targeting
        source: YTCH
      - id: "FIL-JL-305"
        title: "Remarketing Is Not Dead Just Different"
        content: "General remarketing may not be necessary anymore, but specific remarketing like abandoned cart still has unique value."
        domain: remarketing
        source: YTCH
      - id: "FIL-JL-306"
        title: "Separate Ad Sets for Personas Are Unnecessary"
        content: "You do not need separate ad sets for different customer personas. Let the algorithm find the right people through creative diversity."
        domain: audience-targeting
        source: YTCH
      - id: "FIL-JL-307"
        title: "Lookalike Audiences May Be Obsolete"
        content: "With Advantage+ audience, lookalike audiences add diminishing value since the algorithm already uses purchase and pixel data."
        domain: audience-targeting
        source: YTCH
      - id: "FIL-JL-308"
        title: "The Platform Owes You Nothing"
        content: "Meta does not owe you cheap reach or results. The auction is competitive and your success depends on your offer and creative."
        domain: facebook-ads
        source: YTCH
      # === NEW YTCH: Campaign (400-412) ===
      - id: "FIL-JL-400"
        title: "Simplicity Over Sophistication"
        content: "More complicated and sophisticated sounds better but often is not. Performance problems come from advertisers who overcomplicate things."
        domain: campaign-strategy
        source: YTCH
      - id: "FIL-JL-401"
        title: "Performance Goal Is Everything"
        content: "The performance goal defines what you want and controls ad delivery. You cannot overstate its importance."
        domain: optimization
        source: YTCH
      - id: "FIL-JL-402"
        title: "Stop Searching for the Magical Strategy"
        content: "Most guru strategies are snake oil. They ignore fundamental sources of performance that cannot be packaged and sold."
        domain: campaign-strategy
        source: YTCH
      - id: "FIL-JL-403"
        title: "Embrace It Depends"
        content: "The right answer to almost every advertising question is it depends. Anyone giving absolute answers is oversimplifying."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-404"
        title: "Embrace the Grays of Advertising"
        content: "Advertising is not black and white. What works for one business may not work for another. Context matters more than rules."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-405"
        title: "Don't Blindly Follow Any Expert"
        content: "Do not blindly follow any expert advice including mine. Test everything in your own context and let results guide you."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-406"
        title: "Update Your Assumptions Regularly"
        content: "What worked six months ago may not work today. The platform changes constantly and your assumptions must change with it."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-407"
        title: "Campaigns Start Strong Then Decline Naturally"
        content: "Meta shows ads to the most likely converters first. Initial strong results followed by decline is normal, not a sign of failure."
        domain: campaign-strategy
        source: YTCH
      - id: "FIL-JL-408"
        title: "Stopping the Bleeding Is Growth Too"
        content: "Not all growth comes from scaling up. Sometimes fixing inefficiencies and cutting waste is the most valuable growth."
        domain: campaign-strategy
        source: YTCH
      - id: "FIL-JL-409"
        title: "Your Stubbornness Is Killing Your Results"
        content: "Advertisers who refuse to adapt to platform changes and insist on old methods will consistently underperform."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-410"
        title: "Doing Things the Right Way"
        content: "Taking shortcuts in Facebook ads leads to account shutdowns and wasted budgets. Follow the rules and build sustainably."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-411"
        title: "The Algorithm Is Literal"
        content: "The algorithm will literally get you what you asked for. If you asked for link clicks, you will get clickers, not buyers."
        domain: optimization
        source: YTCH
      - id: "FIL-JL-412"
        title: "Challenge Every Choice That Adds Complexity"
        content: "Every additional campaign, ad set, targeting restriction, or manual override should be justified. Default to simplicity."
        domain: campaign-strategy
        source: YTCH
      # === NEW YTCH: Creative (500-510) ===
      - id: "FIL-JL-500"
        title: "Don't Get Emotionally Attached to Your Ads"
        content: "The moment you fall in love with a specific ad is the moment you stop being objective about its performance."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-501"
        title: "Features Don't Sell Pain Does"
        content: "Focus on the pain your product solves rather than listing features. People buy solutions to problems they feel."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-502"
        title: "Creative Testing Must Be Part of Your Process"
        content: "Creative testing should not be an occasional event but a permanent part of your advertising workflow."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-503"
        title: "Text in Images Still Works"
        content: "The old 20% text rule is gone. Text in images can work extremely well for certain audiences and messages."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-504"
        title: "Stack Creative Diversity in Phases"
        content: "Don't overwhelm yourself with massive creative diversification. Build it up gradually phase by phase."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-505"
        title: "Spirit of Creative Diversity"
        content: "Approach ad creation in the spirit of creative diversity. Always be conscious of generating more text and visual options."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-506"
        title: "Advantage+ Creative Enhancements Deserve a Chance"
        content: "Many advertisers reflexively disable all AI enhancements without testing them. Give them a fair chance."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-507"
        title: "What Meta Isn't Telling You About Creative"
        content: "Meta pushes creative diversification because it benefits their system, but the underlying principle is still sound for advertisers."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-508"
        title: "Focus on What and Why Not How"
        content: "Understand what you want to achieve and why before obsessing over the tactical how of ad setup."
        domain: creative-strategy
        source: YTCH
      - id: "FIL-JL-509"
        title: "Let Results Be Your Guide"
        content: "Stop relying on theory and best practices alone. Run the experiment and let actual results tell you what works."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-510"
        title: "Create More Than Anyone Else"
        content: "Volume of creative output is a competitive advantage. The more you create, the more data points you have to learn from."
        domain: creative-strategy
        source: YTCH
      # === NEW YTCH: Business/AI (600-614) ===
      - id: "FIL-JL-600"
        title: "Meta Vision to Replace Agencies with AI"
        content: "Zuckerberg vision is that any business tells Meta what they want and how much to pay, and Meta does the rest. This is probable."
        domain: ai-advertising
        source: YTCH
      - id: "FIL-JL-601"
        title: "AI Won't Make Your Job Obsolete Yet"
        content: "AI tools like ChatGPT are best for idea generation and content repurposing, not for replacing strategic advertising decisions."
        domain: ai-advertising
        source: YTCH
      - id: "FIL-JL-602"
        title: "Be Ethical to a Fault"
        content: "Don't give anyone a reason to believe you might be doing something unethical. Being ethical is a commitment with long-term benefits."
        domain: business-ethics
        source: YTCH
      - id: "FIL-JL-603"
        title: "Beware of Fake Advertising Experts"
        content: "The industry is full of gurus selling complicated strategies that sound impressive but actually hurt results."
        domain: business-ethics
        source: YTCH
      - id: "FIL-JL-604"
        title: "Stubborn Consistency Creates Results"
        content: "Publishing content consistently over long periods compounds into authority and audience. The secret is showing up daily."
        domain: content-creation
        source: YTCH
      - id: "FIL-JL-605"
        title: "The Importance of Streaks"
        content: "Maintaining productive routines and streaks creates momentum that compounds. Breaking a streak has outsized negative effects."
        domain: content-creation
        source: YTCH
      - id: "FIL-JL-606"
        title: "Pick the Right Client"
        content: "The wrong client costs you money, time, and energy. The right client lets you do your job and has realistic expectations."
        domain: business-strategy
        source: YTCH
      - id: "FIL-JL-607"
        title: "Should You Be Everywhere"
        content: "Being on every platform is not necessary. Focus on the platforms where your audience is and where you can be consistent."
        domain: content-creation
        source: YTCH
      - id: "FIL-JL-608"
        title: "AI Chatbots Trained on Your Content"
        content: "Training AI chatbots on your existing content library can provide immediate value to your audience around the clock."
        domain: ai-advertising
        source: YTCH
      - id: "FIL-JL-609"
        title: "We Don't Like Change"
        content: "Advertisers resist platform changes because it threatens their way of life. But adaptation is the only path to continued success."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-610"
        title: "A Little Bit of Luck"
        content: "Success in advertising includes an element of luck and timing. Acknowledge it rather than attributing everything to skill."
        domain: business-strategy
        source: YTCH
      - id: "FIL-JL-611"
        title: "Let Go of the Excuses"
        content: "Stop blaming the platform, the algorithm, or external factors. Focus on what you can control and improve."
        domain: business-strategy
        source: YTCH
      - id: "FIL-JL-612"
        title: "AI-Driven Search Changes Everything"
        content: "AI search engines like ChatGPT citing your website as a source represents a new form of organic referral traffic."
        domain: ai-advertising
        source: YTCH
      - id: "FIL-JL-613"
        title: "Introverts Can Succeed at Video"
        content: "Recording videos for business is difficult for introverts but the discomfort decreases with practice and consistency."
        domain: content-creation
        source: YTCH
      - id: "FIL-JL-614"
        title: "Republish Underperforming Videos"
        content: "Videos that underperformed deserve a second chance. Republishing with tweaks can find a new audience."
        domain: content-creation
        source: YTCH
      # === NEW YTCH: Platform/Tutorials (700-711) ===
      - id: "FIL-JL-700"
        title: "Understand How the System Actually Works"
        content: "Invest time into how things work. Pay attention to what Meta says about the mechanics, not the PR spin."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-701"
        title: "The Learning Phase Is Just a Label"
        content: "The learning phase label scares advertisers into bad decisions. It is a normal process and performance stabilizes after it."
        domain: optimization
        source: YTCH
      - id: "FIL-JL-702"
        title: "Know and Follow the Rules"
        content: "Some ad policy rules are not obvious. Read them and know them. Ignorance is not an excuse when your account gets shut down."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-703"
        title: "Conversions API Is Essential"
        content: "The pixel alone is no longer enough. Conversions API provides server-side tracking that closes the data gap from browser restrictions."
        domain: tracking
        source: YTCH
      - id: "FIL-JL-704"
        title: "Stop Blaming the System"
        content: "Stop blaming Andromeda, the algorithm, or Meta for your results. The system works but requires good inputs from you."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-705"
        title: "Your Budget Is Not Too Small"
        content: "A small budget is not an excuse for failure. It means you need to be smarter about simplicity and optimization choices."
        domain: budget-management
        source: YTCH
      - id: "FIL-JL-706"
        title: "Avoid the Bottomless Pit of Despair"
        content: "Don't keep spending on campaigns that clearly aren't working hoping they will turn around. Set clear stop-loss criteria."
        domain: campaign-strategy
        source: YTCH
      - id: "FIL-JL-707"
        title: "Campaign Automation Has Pros and Cons"
        content: "Meta campaign automation tools are improving but still require human oversight for quality and strategic direction."
        domain: optimization
        source: YTCH
      - id: "FIL-JL-708"
        title: "Meta Is Bad at Naming Stuff"
        content: "Confusing feature names like Advantage+ create unnecessary confusion. Focus on what the feature does, not what it is called."
        domain: facebook-ads
        source: YTCH
      - id: "FIL-JL-709"
        title: "Frequency Is Not Your Problem"
        content: "High frequency is a symptom, not a cause. The real problem is usually creative fatigue or audience saturation."
        domain: measurement
        source: YTCH
      - id: "FIL-JL-710"
        title: "Overthinking Your Ad Setup"
        content: "Most advertisers overthink campaign structure. A simpler setup with good creative outperforms complex structures with mediocre creative."
        domain: campaign-strategy
        source: YTCH
      - id: "FIL-JL-711"
        title: "Simple Isn't Always Better"
        content: "While simplicity is the default, there are legitimate reasons to add complexity. The key is having a clear justification."
        domain: campaign-strategy
        source: YTCH
  L2_MENTAL_MODELS:
    count: 74
    items:
      # === EXISTING SFAS (12 items) ===
      - id: "MM-JL-001"
        title: "Audience Burnout Model"
        content: "Algorithm finds best converters first. Quality decreases as budget increases within same audience. Solution: horizontal scaling"
        domain: audience-optimization
        source: SFAS
      - id: "MM-JL-002"
        title: "Creative Gap Model"
        content: "Declining performance + high frequency = creative gap. Need new hooks/pitches, not just budget changes"
        domain: creative-strategy
        source: SFAS
      - id: "MM-JL-003"
        title: "Horizontal vs Vertical Scaling"
        content: "Vertical = increasing budget. Horizontal = more audiences, offers, objectives, creative. Horizontal is unlimited because you're working on the pitch"
        domain: scaling
        source: SFAS
      - id: "MM-JL-004"
        title: "Learning Phase Model"
        content: "50 conversions/week per ad set to stabilize. Resets on targeting/creative/optimization changes. Budget/bid changes don't reset"
        domain: facebook-ads
        source: SFAS
      - id: "MM-JL-005"
        title: "Funnel Budget Allocation"
        content: "60% TOFU prospecting, 20% BOFU recent visitors, 5-10% Loyalty, 5-10% Branding to BOFU/Engagers"
        domain: budget-management
        source: SFAS
      - id: "MM-JL-006"
        title: "Stabilization Period"
        content: "48-72 hours between any budget change. Making decisions with less than 48h of data is premature"
        domain: budget-management
        source: SFAS
      - id: "MM-JL-007"
        title: "Signal Strength Hierarchy"
        content: "Dynamic audiences (pixel-based, regenerating) > static audiences (email lists). Exception: VIP customer lists"
        domain: audience-optimization
        source: SFAS
      - id: "MM-JL-008"
        title: "Lookalike Decay Curve"
        content: "1% lookalikes wear out after ~$2,500 spend. Performance declines in 3 phases: most relevant > slightly less > much lower quality"
        domain: audience-optimization
        source: SFAS
      - id: "MM-JL-009"
        title: "Auction Total Value"
        content: "Your bid + estimated action rate + user value = total value. Highest total value wins, not highest bid. Social proofing increases total value"
        domain: bidding-strategy
        source: SFAS
      - id: "MM-JL-010"
        title: "Pixel Seasoning Threshold"
        content: "Meaningful pixel seasoning starts at $10K/month for 2+ months. More events = more data = faster learnings"
        domain: pixel-optimization
        source: SFAS
      - id: "MM-JL-011"
        title: "Three-Report Monitoring"
        content: "Check three reports daily: Yesterday, Today, 30-Day. Each with same metrics: spend, results, reach, cost/result, ROAS, CPC, CTR"
        domain: reporting
        source: SFAS
      - id: "MM-JL-012"
        title: "Nesting Lookalikes Caveat"
        content: "Excluding 1% from 2% (nesting) can hurt performance. Facebook is smart enough to know the difference with sufficient data"
        domain: audience-optimization
        source: SFAS
      # === NEW YTCH: 20 Factors (080-087) ===
      - id: "MM-JL-080"
        title: "20 Factors Interdependency Model"
        content: "Ad results are determined by 20 interrelated factors. Fixing one while ignoring others will not fix overall performance."
        domain: facebook-ads
        source: YTCH
      - id: "MM-JL-081"
        title: "Control Spectrum Model"
        content: "Factors range from full control (creative, copy) to partial control (bidding, targeting) to no control (competition, algorithm)."
        domain: facebook-ads
        source: YTCH
      - id: "MM-JL-082"
        title: "Cost Cap vs Bid Cap vs Auto Bidding"
        content: "Cost Cap balances volume and cost. Bid Cap controls max bid. Auto Bidding maximizes volume. Each fits different scaling goals."
        domain: bidding-strategy
        source: YTCH
      - id: "MM-JL-083"
        title: "Email List as Signal Amplifier"
        content: "A quality email list feeds the algorithm with high-quality seed data. Bigger list equals better optimization signals."
        domain: audience-optimization
        source: YTCH
      - id: "MM-JL-084"
        title: "Ad Format Impact Hierarchy"
        content: "Different ad formats grab attention differently. Video for storytelling, carousel for products, static for direct response. Match format to intent."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-085"
        title: "Pixel Event Hierarchy"
        content: "Higher-value events like purchase provide stronger optimization signals than lower events like page view. Optimize as high as possible."
        domain: tracking
        source: YTCH
      - id: "MM-JL-086"
        title: "Website Performance Multiplier"
        content: "A fast, well-designed website multiplies ad effectiveness. A slow site wastes ad spend regardless of campaign quality."
        domain: landing-pages
        source: YTCH
      - id: "MM-JL-087"
        title: "Purchase Intent Gradient"
        content: "Different users have different intent levels. The algorithm finds highest-intent users first, then works down the gradient."
        domain: audience-optimization
        source: YTCH
      # === NEW YTCH: Attribution (200-211) ===
      - id: "MM-JL-200"
        title: "Attribution Window Mental Model"
        content: "7-day click and 1-day view is the default window. Changing it changes what gets reported and what gets optimized."
        domain: attribution
        source: YTCH
      - id: "MM-JL-201"
        title: "Attribution Setting Cascade"
        content: "Attribution setting affects three things in order: what Meta optimizes for, what Meta reports, and what you think is working."
        domain: attribution
        source: YTCH
      - id: "MM-JL-202"
        title: "Incremental vs Non-Incremental"
        content: "Some conversions would happen without ads (non-incremental). Incremental attribution tries to isolate the ones ads actually caused."
        domain: attribution
        source: YTCH
      - id: "MM-JL-203"
        title: "Aggregated Event Measurement Model"
        content: "Post-iOS 14, Meta uses aggregated event measurement with priority ranking. Only 8 events per domain, ranked by importance."
        domain: attribution
        source: YTCH
      - id: "MM-JL-204"
        title: "Compare Windows Analysis"
        content: "Comparing different attribution windows side by side reveals how much of your reported success comes from views vs clicks."
        domain: attribution
        source: YTCH
      - id: "MM-JL-205"
        title: "Hidden Purchases in Traffic Campaigns"
        content: "Traffic campaigns can generate purchases that never show in results because you optimized for clicks, not conversions."
        domain: attribution
        source: YTCH
      - id: "MM-JL-206"
        title: "Remarketing Attribution Illusion"
        content: "Remarketing often gets credit for conversions that were already going to happen. The 80-20 rule applies: 80% of value from prospecting."
        domain: attribution
        source: YTCH
      - id: "MM-JL-207"
        title: "CPM as Quality Signal"
        content: "Higher CPM can actually indicate reaching higher-quality audiences. Lower CPM doesn't always mean better value."
        domain: measurement
        source: YTCH
      - id: "MM-JL-208"
        title: "Cost Per Lead Is Mostly Meaningless"
        content: "CPL without knowing lead-to-sale conversion rate and average value per lead is an incomplete and misleading metric."
        domain: measurement
        source: YTCH
      - id: "MM-JL-209"
        title: "Metrics That Actually Matter"
        content: "Focus on cost per result, ROAS, and quality indicators rather than vanity metrics like reach, impressions, or CTR alone."
        domain: measurement
        source: YTCH
      - id: "MM-JL-210"
        title: "28-Day Click Return Theory"
        content: "Meta can bring back longer attribution windows using probabilistic modeling and improved data systems post-iOS."
        domain: attribution
        source: YTCH
      - id: "MM-JL-211"
        title: "Value Rules for Attribution Fix"
        content: "Value rules allow you to tell Meta that certain conversions are worth more, correcting for attribution blind spots."
        domain: attribution
        source: YTCH
      # === NEW YTCH: Audience (300-308) ===
      - id: "MM-JL-300"
        title: "Advantage+ Audience as Broad Remarketing"
        content: "Without audience suggestions, Advantage+ starts with what is essentially a broad remarketing campaign using pixel history and prior conversions."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-301"
        title: "Audience Expansion Is the Default"
        content: "Even with original audiences, detailed targeting and lookalikes are often expanded. They are suggestions, not restrictions."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-302"
        title: "Auction Overlap Model"
        content: "Auction overlap between ad sets causes you to bid against yourself. Consolidation reduces overlap and improves efficiency."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-303"
        title: "Broad Targeting Failure Modes"
        content: "Broad targeting fails with top-of-funnel optimizations like link clicks because the algorithm finds cheap clickers, not buyers."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-304"
        title: "Custom Audience Expansion Risk"
        content: "Meta testing custom audience expansion means your carefully curated audiences may be expanded beyond your intended scope."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-305"
        title: "Targeting as Suggestion Layer"
        content: "Think of targeting inputs as a suggestion layer on top of algorithmic optimization, not as a hard constraint on delivery."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-306"
        title: "Behavioral Advertising Ban Impact"
        content: "If behavioral targeting gets banned in certain regions, it accelerates the shift to creative-driven audience discovery."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-307"
        title: "Exclusion as Only True Targeting"
        content: "Excluding customers from prospecting campaigns is one of the few targeting actions that still provides clear value."
        domain: audience-targeting
        source: YTCH
      - id: "MM-JL-308"
        title: "Meta Forcing Top-of-Funnel Expansion"
        content: "Meta is forcing audience expansion for top-of-funnel optimizations. This is by design, not a bug."
        domain: audience-targeting
        source: YTCH
      # === NEW YTCH: Campaign (400-408) ===
      - id: "MM-JL-400"
        title: "Four Traits of Successful Advertisers"
        content: "Simplicity, experimentation, understanding the system, and adaptability. These four traits predict advertising success."
        domain: campaign-strategy
        source: YTCH
      - id: "MM-JL-401"
        title: "Baseball Manager Analogy"
        content: "Like a baseball manager, advertisers must make strategic decisions without controlling every outcome. Set up conditions for success."
        domain: campaign-strategy
        source: YTCH
      - id: "MM-JL-402"
        title: "Andromeda Retrieval Engine"
        content: "Andromeda finds a pool of eligible ads. Optimization decides which enter the auction. The auction decides which wins."
        domain: optimization
        source: YTCH
      - id: "MM-JL-403"
        title: "Performance Goal Drives Everything"
        content: "There are 21+ performance goals. Each one changes who sees your ads and how delivery works. Choose wisely."
        domain: optimization
        source: YTCH
      - id: "MM-JL-404"
        title: "Ads Funnel Model Updated"
        content: "The traditional TOFU/MOFU/BOFU funnel still exists but the boundaries are blurred by algorithmic delivery and broad targeting."
        domain: campaign-strategy
        source: YTCH
      - id: "MM-JL-405"
        title: "Reach Optimization Mental Model"
        content: "Reach optimization shows ads to as many unique people as possible. Useful for awareness but terrible for conversion goals."
        domain: optimization
        source: YTCH
      - id: "MM-JL-406"
        title: "Seasonal Campaign Architecture"
        content: "Seasonal campaigns need different lead times, budgets, and creative strategies depending on the buying cycle length."
        domain: campaign-strategy
        source: YTCH
      - id: "MM-JL-407"
        title: "Long Buying Cycle Model"
        content: "Products with long buying cycles need nurture-focused campaigns. Direct response optimization won't capture delayed conversions."
        domain: campaign-strategy
        source: YTCH
      - id: "MM-JL-408"
        title: "Multiple Campaigns Decision Model"
        content: "Use multiple campaigns only when you need separate budgets for distinct goals. Otherwise, consolidate for better optimization."
        domain: campaign-strategy
        source: YTCH
      # === NEW YTCH: Creative (500-507) ===
      - id: "MM-JL-500"
        title: "Creative as Targeting Mechanism"
        content: "With broad audiences, creative is what self-selects the right audience. Different creative attracts different people."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-501"
        title: "Creative Testing Revisited"
        content: "Old-school A/B testing of individual creative elements is less valuable when the algorithm handles distribution dynamically."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-502"
        title: "Creative Diversity vs Creative Volume"
        content: "Diversity means different themes and messages. Volume means more of the same. Meta wants diversity, not just volume."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-503"
        title: "Placement Customization Model"
        content: "Customizing creative by placement ensures your ad looks native everywhere. One size does not fit all placements."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-504"
        title: "Short-Form Video Length Model"
        content: "Ideal short-form video length depends on platform and content type. There is no universal magic number."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-505"
        title: "Creative Fatigue Cycle"
        content: "Creative fatigue follows a predictable cycle: strong start, gradual decline, plateau, sharp drop. Refresh before the sharp drop."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-506"
        title: "Dynamic Creative Obsolescence"
        content: "Dynamic creative optimization is being replaced by Advantage+ creative. The algorithm handles variation better than manual splits."
        domain: creative-strategy
        source: YTCH
      - id: "MM-JL-507"
        title: "What to Do With Creative Testing Results"
        content: "Creative testing results inform future creative direction, not just winner/loser decisions. Learn patterns, not just pick winners."
        domain: creative-strategy
        source: YTCH
      # === NEW YTCH: Business/AI (600-606) ===
      - id: "MM-JL-600"
        title: "Agency Replacement Timeline"
        content: "Full AI replacement of agencies is years away but the direction is clear. Agencies must evolve from execution to strategy."
        domain: ai-advertising
        source: YTCH
      - id: "MM-JL-601"
        title: "AI Content Flywheel"
        content: "AI helps create more content faster. More content means more data. More data means better AI outputs. The flywheel accelerates."
        domain: ai-advertising
        source: YTCH
      - id: "MM-JL-602"
        title: "Content Publishing Compound Effect"
        content: "Publishing one video per day compounds over years into a massive searchable library that generates passive authority."
        domain: content-creation
        source: YTCH
      - id: "MM-JL-603"
        title: "Three Phases of Procrastination"
        content: "Procrastination in content creation follows three phases: avoidance, guilt, and panic. Breaking the cycle requires routine."
        domain: content-creation
        source: YTCH
      - id: "MM-JL-604"
        title: "Ideal Client Selection Model"
        content: "Ideal clients let you do your job, have realistic expectations, have a quality product, and invest adequately in their business."
        domain: business-strategy
        source: YTCH
      - id: "MM-JL-605"
        title: "Future of Search Model"
        content: "AI-driven search will reduce traditional website referral traffic. Content creators must adapt to being cited by AI, not clicked."
        domain: ai-advertising
        source: YTCH
      - id: "MM-JL-606"
        title: "Reels Impact on Instagram Growth"
        content: "Reels drive discovery but not necessarily follower growth or engagement depth. Short-form video has diminishing returns for authority."
        domain: content-creation
        source: YTCH
      # === NEW YTCH: Platform (700-708) ===
      - id: "MM-JL-700"
        title: "Auction Three Components"
        content: "The auction has three components: bid, estimated action rate, and user value. Highest total value wins, not highest bidder."
        domain: optimization
        source: YTCH
      - id: "MM-JL-701"
        title: "Learning Phase 25-50 Events Model"
        content: "The learning phase needs 25-50 optimized events in 7 days. Below that, performance remains unstable and suboptimal."
        domain: optimization
        source: YTCH
      - id: "MM-JL-702"
        title: "CAPI vs Pixel Complementary Model"
        content: "Pixel captures browser-side events. CAPI captures server-side events. Together they provide complete conversion data."
        domain: tracking
        source: YTCH
      - id: "MM-JL-703"
        title: "API Gateway as Best CAPI Method"
        content: "The API Gateway is the most reliable CAPI setup method because it works regardless of website platform."
        domain: tracking
        source: YTCH
      - id: "MM-JL-704"
        title: "Custom Events for Micro-Conversions"
        content: "Custom pixel events let you track micro-conversions like scroll depth, time on page, and video watches for better optimization."
        domain: tracking
        source: YTCH
      - id: "MM-JL-705"
        title: "Event Parameters for Richer Data"
        content: "Adding parameters to events like content type, category, and value gives the algorithm richer signals for optimization."
        domain: tracking
        source: YTCH
      - id: "MM-JL-706"
        title: "Google Tag Manager as Pixel Manager"
        content: "GTM provides more control and flexibility over pixel implementation than native Meta tools, especially for custom events."
        domain: tracking
        source: YTCH
      - id: "MM-JL-707"
        title: "Automated Rules as Safety Net"
        content: "Automated rules prevent runaway spend and catch performance drops. They are a safety net, not a replacement for monitoring."
        domain: optimization
        source: YTCH
      - id: "MM-JL-708"
        title: "iOS 14 Long-Term Impact Model"
        content: "The biggest negative impact of iOS 14 was not lost tracking but the shift in advertiser behavior toward over-correcting."
        domain: tracking
        source: YTCH
  L3_HEURISTICS:
    count: 140
    items:
      # === EXISTING SFAS (29 items) ===
      - id: "HEUR-JL-001"
        title: "Lookalike Spend Threshold"
        content: "1% lookalikes wear out after ~$2,500 spend"
        threshold: "$2,500"
        domain: audience-optimization
        source: SFAS
      - id: "HEUR-JL-002"
        title: "Frequency-Decline Alert"
        content: "Frequency above 3.0 + declining CTR/relevance over 48h = change creative AND/OR audience"
        threshold: "frequency >= 3.0"
        domain: creative-strategy
        source: SFAS
      - id: "HEUR-JL-003"
        title: "CPM Range"
        content: "CPM on FB & IG is between $8-25"
        threshold: "$8-$25"
        domain: facebook-ads
        source: SFAS
      - id: "HEUR-JL-004"
        title: "Minimum Daily Impressions"
        content: "Ad sets need at least 1,000 impressions per day to prove their worth"
        threshold: "1,000/day"
        domain: facebook-ads
        source: SFAS
      - id: "HEUR-JL-005"
        title: "Learning Phase Exit"
        content: "50 conversions per week per ad set to exit the learning phase"
        threshold: "50/week"
        domain: facebook-ads
        source: SFAS
      - id: "HEUR-JL-006"
        title: "Minimum Monthly Spend"
        content: "2 ad sets x ~$15/day = $900/month bare minimum for meaningful scaling"
        threshold: "$900/month"
        domain: budget-management
        source: SFAS
      - id: "HEUR-JL-007"
        title: "AOV Budget Match"
        content: "Match ad set daily budget to your AOV. $50 AOV = $50/day/ad set minimum"
        threshold: "budget >= AOV"
        domain: budget-management
        source: SFAS
      - id: "HEUR-JL-008"
        title: "Vertical Scale Rate"
        content: "Increase budgets 10-30% every 48-72 hours for vertical scaling"
        threshold: "10-30% per 48-72h"
        domain: scaling
        source: SFAS
      - id: "HEUR-JL-009"
        title: "Conservative Scale Rate"
        content: "For cautious scaling: increase 20% every 48 hours after 7-14 days of stable success"
        threshold: "20% per 48h"
        domain: scaling
        source: SFAS
      - id: "HEUR-JL-010"
        title: "Audience Overlap Maximum"
        content: "Avoid audience overlap above 30% between ad sets. Minimum 10K audience size for overlap data"
        threshold: "<= 30%"
        domain: audience-optimization
        source: SFAS
      - id: "HEUR-JL-011"
        title: "Creative Refresh Cadence"
        content: "Refresh ad creative at least once per week when scaling. Some change every 14 days for lower budgets"
        threshold: "weekly"
        domain: creative-strategy
        source: SFAS
      - id: "HEUR-JL-012"
        title: "Ads Per Ad Set Maximum"
        content: "Never more than 2 ads per ad set. Preferably 1 when scaling aggressively"
        threshold: "max 2"
        domain: account-structure
        source: SFAS
      - id: "HEUR-JL-013"
        title: "TOFU Relevance Minimum"
        content: "Aim for 6/10 relevance score minimum on TOFU ads to show decent quality"
        threshold: ">= 6/10"
        domain: creative-strategy
        source: SFAS
      - id: "HEUR-JL-014"
        title: "Headline Length"
        content: "Shorter headline copy always wins. No more than 15 words"
        threshold: "<= 15 words"
        domain: creative-strategy
        source: SFAS
      - id: "HEUR-JL-015"
        title: "Punctuation Performance"
        content: "Period at end of sentence beats exclamation/question marks 8 out of 10 times"
        threshold: "80%"
        domain: creative-strategy
        source: SFAS
      - id: "HEUR-JL-016"
        title: "Bid Override Multiple"
        content: "Manual bid override: 3-5X your CPA goal to force winning auctions"
        threshold: "3-5X CPA"
        domain: bidding-strategy
        source: SFAS
      - id: "HEUR-JL-017"
        title: "Budget Cap Trigger"
        content: "Account daily budget cap defaults around $750/day. Contact Facebook before scaling past this"
        threshold: "$750/day"
        domain: budget-management
        source: SFAS
      - id: "HEUR-JL-018"
        title: "Pixel Seasoning Spend"
        content: "Seasoned pixel starts at $10K/month minimum for at least 2 months"
        threshold: "$10K/mo x 2mo"
        domain: pixel-optimization
        source: SFAS
      - id: "HEUR-JL-019"
        title: "Prospecting Break-Even Window"
        content: "If you can break even on prospecting within 30 days, you're doing well"
        threshold: "30 days"
        domain: scaling
        source: SFAS
      - id: "HEUR-JL-020"
        title: "Default Bid Strategy"
        content: "Start with auto bidding, 7-day click / 1-day view attribution. Widest window = most scale"
        threshold: "7d click / 1d view"
        domain: bidding-strategy
        source: SFAS
      - id: "HEUR-JL-021"
        title: "Ad Sets Per Campaign Max"
        content: "Keep under 20 ad sets per campaign for manageability. Above that, very hard to manage"
        threshold: "<= 20"
        domain: account-structure
        source: SFAS
      - id: "HEUR-JL-022"
        title: "Broadmatch DPA Window"
        content: "Measure broadmatch DPA performance in 30-day window. Latency is big but worthwhile"
        threshold: "30-day measurement"
        domain: dynamic-product-ads
        source: SFAS
      - id: "HEUR-JL-023"
        title: "Assumption Reset Cadence"
        content: "Throw out all copy/creative assumptions and test brand new ideas every 6 months"
        threshold: "every 6 months"
        domain: creative-strategy
        source: SFAS
      - id: "HEUR-JL-024"
        title: "Intraday Budget Threshold"
        content: "Intraday budget shifting only works for massive accounts spending $25K+/day"
        threshold: "$25K+/day"
        domain: budget-management
        source: SFAS
      - id: "HEUR-JL-025"
        title: "Conversion Rate Benchmarks"
        content: "Lead gen: 10% conversion rate is crushing it. Ecom: 5-6% is great"
        threshold: "10% lead / 5-6% ecom"
        domain: scaling
        source: SFAS
      - id: "HEUR-JL-026"
        title: "CPA Control Bid Method"
        content: "To control CPA: set manual bid 10% above goal, decrease over 72h stabilization to match CPA"
        threshold: "+10% then CPA over 72h"
        domain: bidding-strategy
        source: SFAS
      - id: "HEUR-JL-027"
        title: "Geoexpansion Opportunity"
        content: "UK, Australia, Germany still have CPAs not seen in US for 3+ years. Major scale opportunity"
        domain: geoexpansion
        source: SFAS
      - id: "HEUR-JL-028"
        title: "Structure Turnover Cycle"
        content: "Full campaign structure turns over approximately every 90 days. DPA is the exception"
        threshold: "~90 days"
        domain: account-structure
        source: SFAS
      - id: "HEUR-JL-029"
        title: "Test Consolidation Rule"
        content: "Better to consolidate into 14-day test with higher spend than spread over 45 days"
        threshold: "14 > 45 days"
        domain: scaling
        source: SFAS
      # === NEW YTCH: 20 Factors (080-093) ===
      - id: "HEUR-JL-080"
        title: "Bid Too Low Kills Distribution"
        content: "Manual bids set too low result in zero distribution or reaching only the cheapest, lowest-quality people."
        threshold: "bid > minimum auction threshold"
        domain: bidding-strategy
        source: YTCH
      - id: "HEUR-JL-081"
        title: "Target Cost for Scaling"
        content: "If you plan on scaling and increasing your budget, Target Cost may be the best option for manual bidding."
        threshold: "use target cost when scaling"
        domain: bidding-strategy
        source: YTCH
      - id: "HEUR-JL-082"
        title: "Stock Imagery Avoidance"
        content: "Stock imagery is detectable and reduces trust. Use original photos or user-generated content whenever possible."
        threshold: "avoid stock images"
        domain: creative-strategy
        source: YTCH
      - id: "HEUR-JL-083"
        title: "Copy Length Depends on Product"
        content: "Short copy works for simple products. Longer copy works for expensive or complex products that need explanation."
        threshold: "match copy length to product complexity"
        domain: creative-strategy
        source: YTCH
      - id: "HEUR-JL-084"
        title: "Landing Page Must Match Ad Promise"
        content: "If your ad promises X and the landing page delivers Y, conversion rates collapse. Follow through on every promise."
        threshold: "100% ad-to-landing alignment"
        domain: landing-pages
        source: YTCH
      - id: "HEUR-JL-085"
        title: "Mobile Speed Threshold"
        content: "If your landing page takes more than 3 seconds to load on mobile, you lose the majority of your traffic."
        threshold: "< 3 seconds mobile load"
        domain: landing-pages
        source: YTCH
      - id: "HEUR-JL-086"
        title: "Small Sample Decision Ban"
        content: "Do not make optimization decisions based on fewer than 50 conversions. Results can change dramatically with more data."
        threshold: ">= 50 conversions before deciding"
        domain: measurement
        source: YTCH
      - id: "HEUR-JL-087"
        title: "Optimization for Higher Events"
        content: "If you cannot get 50 conversions per week on purchase, move the optimization event up to add-to-cart or initiate checkout."
        threshold: "move up if < 50/week"
        domain: optimization
        source: YTCH
      - id: "HEUR-JL-088"
        title: "Budget vs Results Expectation"
        content: "A $5/day budget cannot deliver purchase optimization results. Match your budget to your optimization event cost."
        threshold: "daily budget >= 5x expected CPA"
        domain: budget-management
        source: YTCH
      - id: "HEUR-JL-089"
        title: "Website Traffic Quality Check"
        content: "If you drive website traffic, check Google Analytics for bounce rate and time on site. High bounce = wasted ad spend."
        threshold: "bounce rate < 70%"
        domain: landing-pages
        source: YTCH
      - id: "HEUR-JL-090"
        title: "Email List Minimum for Lookalikes"
        content: "You need at least 1,000 quality emails for a meaningful lookalike audience. More is better for algorithm accuracy."
        threshold: ">= 1,000 emails"
        domain: audience-optimization
        source: YTCH
      - id: "HEUR-JL-091"
        title: "Frequency as Symptom Not Cause"
        content: "High frequency alone is not a problem. High frequency plus declining results means creative refresh is needed."
        threshold: "frequency alone is not actionable"
        domain: measurement
        source: YTCH
      - id: "HEUR-JL-092"
        title: "Ad Placement Default to Automatic"
        content: "Unless you have a specific reason, use Advantage+ placements. Manual placement restriction limits the algorithm."
        threshold: "default = automatic placements"
        domain: campaign-strategy
        source: YTCH
      - id: "HEUR-JL-093"
        title: "Campaign Budget Optimization Default"
        content: "Use campaign budget optimization as default. It distributes budget to best-performing ad sets automatically."
        threshold: "CBO as default"
        domain: budget-management
        source: YTCH
      # === NEW YTCH: Attribution (200-216) ===
      - id: "HEUR-JL-200"

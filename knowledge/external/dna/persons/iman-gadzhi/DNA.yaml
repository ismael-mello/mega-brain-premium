# =============================================================================
# L1 - PHILOSOPHIES (32 elements)
# =============================================================================
L1_philosophies:

  # --- Core (present across multiple programs) ---

  - id: IG-001
    title: "It's an Honor, Not a Job"
    description: "Running an agency is a privilege, not an obligation. The moment it feels like a chore, you've lost the plot. Gratitude for the opportunity fuels resilience."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "Running an agency is an honor, not a job. The day you forget that is the day you start failing."
    domains: [mindset-performance, agency-business-model]

  - id: IG-002
    title: "You Don't Have a Business Problem"
    description: "Personal problems manifest as business problems. Fix yourself first -- your discipline, habits, and mindset -- and the business follows."
    source_programs: [Agency Incubator, Agency Navigator, Six Figure SMMA]
    quote: "You don't have a business problem. You have a personal problem that's showing up in your business."
    domains: [mindset-performance]

  - id: IG-003
    title: "Progress, Not Perfection"
    description: "Celebrate small wins. Waiting for perfection creates paralysis. Momentum compounds faster than optimization."
    source_programs: [Agency Incubator, Agency Navigator, Six Figure SMMA]
    quote: "Stop waiting for the perfect moment. Progress, not perfection."
    domains: [mindset-performance]

  - id: IG-004
    title: "Client Needs You More Than You Need Them"
    description: "Your stakes are lower than the client's. They need results to survive; you need results to grow. This asymmetry gives you leverage if you internalize it."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "The client needs you more than you need them. Your business doesn't depend on one client, but their growth depends on your service."
    domains: [sales-closing, client-management]

  - id: IG-005
    title: "You Are One Client Away"
    description: "One whale client can change your entire trajectory. One retainer at $8K+/month puts you at six figures annually. Stay in the game."
    source_programs: [Agency Incubator, Six Figure SMMA]
    quote: "You are one client away from a completely different life. One whale client and you're at six figures."
    domains: [mindset-performance, sales-closing]

  - id: IG-006
    title: "Revenue Doesn't Pay for a Ferrari -- Profit Does"
    description: "The LMRD philosophy -- Lean, Mean, Revenue-generating, Debt-free. Revenue is vanity, profit is sanity. Build a machine that prints cash, not one that looks impressive."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "Revenue doesn't pay for a Ferrari -- profit does. Keep it lean, keep it mean."
    domains: [agency-business-model, pricing-strategy]

  - id: IG-007
    title: "Giving Up is Selfish"
    description: "Quitting is the only true failure. Every person who depends on your success -- family, team, future clients -- is let down when you quit."
    source_programs: [Agency Incubator, Six Figure SMMA]
    quote: "Giving up is selfish. The only way you truly fail is if you quit."
    domains: [mindset-performance]

  - id: IG-008
    title: "Focus on Success Not Ego"
    description: "Real success is profit, freedom, and impact -- not followers, revenue screenshots, or fancy offices. Ego is the enemy of the lean agency."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "Focus on success, not ego. The guy with the fancy office and zero profit is losing."
    domains: [mindset-performance, agency-business-model]

  - id: IG-009
    title: "My Cup Runneth Over"
    description: "The wisdom to say no. When your cup is full, overflow serves others. But you can't pour from an empty cup -- fill yours first."
    source_programs: [Agency Incubator]
    quote: "My cup runneth over. You have to fill your own cup before you can serve anyone else."
    domains: [mindset-performance]

  - id: IG-010
    title: "Quality of Life Before Material"
    description: "Invest in tools, systems, and health before luxury. A $2,000 laptop that saves you 2 hours/day beats a $2,000 watch every time."
    source_programs: [Agency Incubator, Six Figure SMMA]
    quote: "Invest in quality of life before material things. Buy the tools, buy the course, buy the flight -- before the watch."
    domains: [mindset-performance]

  - id: IG-011
    title: "Emotion First, Logic Second"
    description: "People buy on emotion and justify with logic. Every sales conversation must trigger emotional desire before presenting rational arguments."
    source_programs: [Agency Incubator, Agency Navigator, Six Figure SMMA]
    quote: "People buy on emotion and justify with logic. If you're leading with features, you've already lost."
    domains: [sales-closing]

  # --- Agency Navigator additions ---

  - id: IG-012
    title: "Agency 3.0 Model"
    description: "Evolution beyond traditional SMMA. Agency 3.0 is lean, automated, high-margin, and built around outcomes not deliverables. The future is fewer clients, higher value."
    source_programs: [Agency Navigator]
    quote: "Agency 3.0 is the evolution. Fewer clients, higher margins, outcome-based pricing, automated delivery."
    domains: [agency-business-model]

  - id: IG-013
    title: "Monk Mode"
    description: "Periods of intense, distraction-free focus where you eliminate everything non-essential. Social media, dating, partying -- all paused. The shortcut is the sacrifice."
    source_programs: [Agency Navigator]
    quote: "Monk Mode is the closest thing to a cheat code. Cut everything that doesn't serve the mission."
    domains: [mindset-performance]

  - id: IG-014
    title: "War Path Mentality"
    description: "Operating with urgency and aggression as if your survival depends on it. Not reckless -- calculated intensity. Sprint mentality for defined periods."
    source_programs: [Agency Navigator]
    quote: "Get on the war path. Operate like your life depends on it, because your future self's life does."
    domains: [mindset-performance]

  - id: IG-015
    title: "Prepare the Vessel"
    description: "Health is the foundation of business performance. Sleep, nutrition, exercise, and mental health are not optional -- they are business infrastructure."
    source_programs: [Agency Navigator]
    quote: "Prepare the vessel. Your body and mind are the vehicle for everything you want to achieve."
    domains: [mindset-performance]

  - id: IG-016
    title: "Mental Metamorphosis"
    description: "Identity shifts are required at each revenue level. The person who gets to $10K/month is not the same person who gets to $50K/month. You must actively shed old identities."
    source_programs: [Agency Navigator]
    quote: "You need a mental metamorphosis. The identity that got you here won't get you there."
    domains: [mindset-performance]

  - id: IG-017
    title: "Social Engineering 101"
    description: "Business is fundamentally about people. Understanding social dynamics, rapport, and influence is more valuable than any technical skill."
    source_programs: [Agency Navigator]
    quote: "Business is social engineering. The person who understands people wins every time."
    domains: [sales-closing, lead-generation]

  - id: IG-018
    title: "Laws of Outreach"
    description: "Outreach is a numbers game governed by laws, not luck. Volume, consistency, and iteration beat talent and creativity every time."
    source_programs: [Agency Navigator]
    quote: "Outreach has laws, not tips. Follow the laws and results are inevitable."
    domains: [lead-generation]

  - id: IG-019
    title: "Client Communication as Retention"
    description: "The number one reason clients leave is not bad results -- it's bad communication. Proactive updates, expectation management, and responsiveness retain clients more than performance."
    source_programs: [Agency Navigator]
    quote: "Clients don't leave because of bad results. They leave because of bad communication."
    domains: [client-management, service-delivery]

  - id: IG-020
    title: "Tax Planning as Wealth Building"
    description: "The money you save on taxes is the easiest money you'll ever make. Tax optimization is not optional -- it's a core business function."
    source_programs: [Agency Navigator]
    quote: "Tax planning is wealth building. Every pound you save in tax is a pound of pure profit."
    domains: [agency-business-model]

  # --- Six Figure SMMA additions ---

  - id: IG-021
    title: "Value Over Time"
    description: "Never sell your time. Sell the value of the outcome. An hour of work that generates $50K in revenue for a client is not worth $100/hour."
    source_programs: [Six Figure SMMA]
    quote: "Stop selling your time. Start selling the value of what your time produces."
    domains: [pricing-strategy, sales-closing]

  - id: IG-022
    title: "Systems Are Scalable, You Are Not"
    description: "If the business can't run without you for a week, you don't have a business -- you have a job. Build systems that replace you."
    source_programs: [Six Figure SMMA]
    quote: "Systems are scalable. You are not. Build the machine, then step out of it."
    domains: [agency-business-model, team-building]

  - id: IG-023
    title: "Business Fuels Lifestyle"
    description: "The business exists to fund the life you want, not the other way around. Design the lifestyle first, then build the business to support it."
    source_programs: [Six Figure SMMA]
    quote: "Your business should fuel your lifestyle, not consume it."
    domains: [mindset-performance, agency-business-model]

  - id: IG-024
    title: "Belief Over Competence"
    description: "In the early stages, belief in yourself matters more than skill. Competence can be learned; conviction cannot be taught."
    source_programs: [Six Figure SMMA]
    quote: "Belief beats competence at the start. You can learn the skill -- you can't learn the fire."
    domains: [mindset-performance]

  - id: IG-025
    title: "Less Is More"
    description: "Fewer services, fewer clients, fewer distractions. Depth beats breadth. The agency that does one thing exceptionally outperforms the one that does ten things adequately."
    source_programs: [Six Figure SMMA, Agency Navigator]
    quote: "Less is more. One service, one niche, one offer -- mastered -- beats ten mediocre ones."
    domains: [agency-business-model, service-delivery]

  - id: IG-026
    title: "Wrong Client Will Destroy You"
    description: "A bad-fit client costs more than no client. They drain energy, damage reputation, and consume disproportionate resources. Fire fast, hire slow."
    source_programs: [Six Figure SMMA, Agency Incubator]
    quote: "The wrong client will destroy you faster than no client at all."
    domains: [client-management]

  - id: IG-027
    title: "Lack of Options Is the Root of All Pain"
    description: "Desperation in business comes from having no pipeline. When you have 10 prospects, losing one client is a Tuesday. When you have zero, it's a crisis."
    source_programs: [Six Figure SMMA]
    quote: "Lack of options is the root of all pain in business. Fill the pipeline and everything changes."
    domains: [lead-generation, sales-closing]

  - id: IG-028
    title: "Success Breeds Complacency"
    description: "The most dangerous moment is right after a big win. Comfort kills more businesses than competition. Stay hungry after every milestone."
    source_programs: [Six Figure SMMA]
    quote: "Success breeds complacency. The moment you get comfortable is the moment you start dying."
    domains: [mindset-performance]

  - id: IG-029
    title: "Business Is Sales"
    description: "Everything else is secondary. If you can sell, you can survive any market, any niche, any economy. Sales is oxygen."
    source_programs: [Six Figure SMMA]
    quote: "Business is sales. Everything else is a support function."
    domains: [sales-closing]

  - id: IG-030
    title: "It's Not the Niche, It's You"
    description: "Niche-hopping is a symptom of avoiding the real problem -- your skills, effort, or persistence. The niche works when you work."
    source_programs: [Six Figure SMMA]
    quote: "Stop blaming the niche. It's not the niche -- it's you."
    domains: [mindset-performance, agency-business-model]

  - id: IG-031
    title: "Work ON the Business, Not IN It"
    description: "If you're doing client work at $30K/month, you've built yourself a cage. Your job is strategy, sales, and systems -- not deliverables."
    source_programs: [Six Figure SMMA]
    quote: "Work on the business, not in it. If you're still editing ads at 30K a month, you're doing it wrong."
    domains: [agency-business-model, team-building]

  - id: IG-032
    title: "Pragmatic Day in Life"
    description: "Design your daily routine around energy, not hours. High-leverage activities (sales, strategy) get your peak hours. Low-leverage tasks get delegated or batched."
    source_programs: [Agency Navigator]
    quote: "Structure your day around energy, not around the clock."
    domains: [mindset-performance]

# =============================================================================
# L2 - MENTAL MODELS (29 elements)
# =============================================================================
L2_mental_models:

  # --- Core (multi-program) ---

  - id: IG-033
    title: "T-Shaped Expertise"
    description: "Be capable across many agency skills (broad bar of T) but go deep in one area (vertical bar). Generalists struggle to charge premium. Specialists command authority."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "Be T-shaped. Know a little about everything, but be the absolute best at one thing."
    domains: [agency-business-model, service-delivery]

  - id: IG-034
    title: "Opportunity vs Convenience Offer"
    description: "Opportunity offers sell ROI and transformation (I'll make you money). Convenience offers sell ease and time-saving (I'll handle this for you). Opportunity commands higher prices."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "Opportunity offers sell ROI. Convenience offers sell ease. ROI always wins on price."
    domains: [pricing-strategy, sales-closing]

  - id: IG-035
    title: "Four Agency Models"
    description: "Contractor Model (outsource everything), Ego Model (fancy office, big team), GaryVee Model (content-first, slow growth), LMRD Model (lean, mean, revenue, debt-free). LMRD wins."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "There are four agency models. Three of them will keep you broke. LMRD is the one that prints money."
    domains: [agency-business-model]

  - id: IG-036
    title: "Crazy-Profitable Scale"
    description: "Client categorization matrix. Rate every client on two axes: how crazy they are to work with, and how profitable they are. Keep the profitable-sane ones, fire the crazy-unprofitable ones."
    source_programs: [Agency Incubator]
    quote: "Rate every client on crazy vs profitable. If they're crazy AND unprofitable, fire them yesterday."
    domains: [client-management]

  - id: IG-037
    title: "Investments vs Expenses"
    description: "Reframe your service from an expense (cost of doing business) to an investment (generates return). Expenses get cut in downturns; investments get increased."
    source_programs: [Agency Incubator, Six Figure SMMA]
    quote: "If the client sees you as an expense, you'll be the first thing cut. Make them see you as an investment."
    domains: [sales-closing, pricing-strategy]

  - id: IG-038
    title: "Input-Output Over Hours"
    description: "Stop measuring hours worked. Measure inputs (calls made, proposals sent) and outputs (clients signed, revenue generated). A 4-hour focused day beats a 12-hour distracted one."
    source_programs: [Agency Incubator, Six Figure SMMA]
    quote: "I don't care about hours. I care about inputs and outputs. What did you DO and what did it PRODUCE?"
    domains: [mindset-performance]

  - id: IG-039
    title: "Unicorn Team Member"
    description: "One exceptional team member is worth more than five average ones. Pay them well, give them ownership, protect them at all costs."
    source_programs: [Agency Incubator, Agency Navigator]
    quote: "A unicorn team member is worth more than five average people. Pay them like it."
    domains: [team-building]

  # --- Agency Navigator additions ---

  - id: IG-040
    title: "Agency 3.0 vs 1.0/2.0"
    description: "Agency 1.0 = trading time for money. Agency 2.0 = team leverage but still service-heavy. Agency 3.0 = outcome-based, automated, high-margin, location-independent."
    source_programs: [Agency Navigator]
    quote: "Agency 1.0 is a job. Agency 2.0 is a business. Agency 3.0 is a machine."
    domains: [agency-business-model]

  - id: IG-041
    title: "Pricing Guidelines Matrix"
    description: "Four pricing models: Base Retainer (fixed monthly), Performance-Based (% of results), Base + Performance (hybrid), Bold Pricing (outcome guarantees). Each fits different client stages."
    source_programs: [Agency Navigator]
    quote: "There are four ways to price. The best agencies use all four depending on the client."
    domains: [pricing-strategy]

  - id: IG-042
    title: "Paid Trials Playbook"
    description: "Instead of free trials (which devalue your work), charge a reduced rate for 30 days. Filters serious clients, creates commitment, and converts at higher rates than free."
    source_programs: [Agency Navigator, Agency Incubator]
    quote: "Never do free trials. Paid trials filter for serious clients and create commitment."
    domains: [pricing-strategy, sales-closing]

  - id: IG-043
    title: "A1 Client Attraction"
    description: "The best clients are attracted, not chased. Position yourself as the authority, and A1 clients (high-revenue, low-maintenance, long-term) come to you."
    source_programs: [Agency Navigator]
    quote: "A1 clients are attracted, not chased. Be the magnet, not the hunter."
    domains: [lead-generation, client-management]

  - id: IG-044
    title: "LinkedIn as Primary Outreach Channel"
    description: "LinkedIn is the most underutilized outreach channel for agencies. Decision-makers are there, professional context is established, and response rates exceed cold email."
    source_programs: [Agency Navigator]
    quote: "LinkedIn is the most slept-on channel for agency outreach. Decision-makers live there."
    domains: [lead-generation]

  - id: IG-045
    title: "Profile Funnel Concept"
    description: "Your social media profile IS your funnel. Every element (bio, posts, highlights, DM strategy) should move the prospect from awareness to booking a call."
    source_programs: [Agency Navigator]
    quote: "Your profile is your funnel. If someone lands on it and doesn't know what you do and how to buy -- you've failed."
    domains: [lead-generation]

  - id: IG-046
    title: "Cardinal Sins of Sales"
    description: "Never talk more than the prospect. Never present before diagnosing. Never handle an objection you created. Never close someone who isn't qualified."
    source_programs: [Agency Navigator]
    quote: "The cardinal sins of sales: talking too much, presenting too early, and closing the unqualified."
    domains: [sales-closing]

  - id: IG-047
    title: "1CC vs 2CC Decision Framework"
    description: "One-Call Close (1CC) for lower-ticket or warm leads. Two-Call Close (2CC) for higher-ticket or cold prospects. The decision depends on price point, prospect warmth, and complexity."
    source_programs: [Agency Navigator]
    quote: "1CC for speed, 2CC for size. Know when to use each."
    domains: [sales-closing]

  - id: IG-048
    title: "Cold Email 101"
    description: "Cold email is a volume game with quality constraints. Short, personalized, value-first, clear CTA. The goal is a reply, not a sale."
    source_programs: [Agency Navigator]
    quote: "Cold email goal: get a reply. That's it. Don't try to sell in the email."
    domains: [lead-generation]

  - id: IG-049
    title: "UpWork as Supplementary Channel"
    description: "UpWork is not the primary strategy but a useful supplementary channel for building case studies, getting initial clients, and generating cash flow while building outbound."
    source_programs: [Agency Navigator]
    quote: "UpWork isn't the endgame, but it's a great starting point for cash flow and case studies."
    domains: [lead-generation]

  # --- Six Figure SMMA additions ---

  - id: IG-050
    title: "Two Hurdles Model"
    description: "Every sale has two hurdles: (1) Does the prospect believe your service works? (2) Does the prospect believe YOU can deliver it? Most agencies fail on hurdle two."
    source_programs: [Six Figure SMMA]
    quote: "Two hurdles to every sale: does this work, and can YOU make it work for me?"
    domains: [sales-closing]

  - id: IG-051
    title: "The Gap (Current vs Desired)"
    description: "Every sale exists in the gap between where the prospect is now and where they want to be. Your job is to widen that gap and position yourself as the bridge."
    source_programs: [Six Figure SMMA]
    quote: "Find the gap between where they are and where they want to be. Then be the bridge."
    domains: [sales-closing]

  - id: IG-052
    title: "Three Types of Traffic"
    description: "Traffic you control (paid ads), traffic you don't control (SEO, viral), and traffic you own (email list, followers). Build all three, but prioritize what you own."
    source_programs: [Six Figure SMMA]
    quote: "Three types of traffic: controlled, uncontrolled, and owned. You want to own as much as possible."
    domains: [lead-generation, service-delivery]

  - id: IG-053
    title: "Social ROI vs Monetary ROI"
    description: "Some clients pay in social proof, not just money. A recognizable brand client at lower margin can open doors to 10 premium clients. Factor in social ROI."
    source_programs: [Six Figure SMMA]
    quote: "Not every client is about the money. Some pay you in social proof that's worth 10x the retainer."
    domains: [client-management, pricing-strategy]

  - id: IG-054
    title: "Offense vs Defense"
    description: "Offense = acquiring new clients, increasing revenue. Defense = retaining clients, reducing churn. Most agencies only play offense. The best play both."
    source_programs: [Six Figure SMMA]
    quote: "Offense wins games, defense wins championships. Acquire and retain."
    domains: [agency-business-model, client-management]

  - id: IG-055
    title: "Every Recall Is a Reframe"
    description: "Every time a prospect brings up a past negative experience, it's your opportunity to reframe. Their bad experience with Agency X is your proof that they need Agency Y (you)."
    source_programs: [Six Figure SMMA]
    quote: "Their bad experience is your best sales tool. Reframe every recall."
    domains: [sales-closing]

  - id: IG-056
    title: "Power vs Force"
    description: "Power attracts (authority, expertise, proof). Force repels (pushy sales, desperation, over-promising). Build power and let prospects come to you."
    source_programs: [Six Figure SMMA]
    quote: "Power attracts. Force repels. Stop forcing and start attracting."
    domains: [sales-closing, lead-generation]

  - id: IG-057
    title: "Permission Marketing"
    description: "Earn the right to market to someone before selling. Provide value first, build trust, then present the offer. Cold pitching without permission burns bridges."
    source_programs: [Six Figure SMMA]
    quote: "Earn permission before you pitch. Value first, offer second."
    domains: [lead-generation]

  - id: IG-058
    title: "Irresistible Offer & Angle"
    description: "The offer is what you deliver. The angle is how you position it. An average offer with an irresistible angle outsells a great offer with no angle."
    source_programs: [Agency Navigator]
    quote: "The angle is everything. Same offer, different angle, completely different results."
    domains: [pricing-strategy, sales-closing]

  - id: IG-059
    title: "1CC vs 2CC Frameworks Philosophy"
    description: "One-call and two-call closes are not just techniques -- they represent different sales philosophies. 1CC is about momentum and urgency. 2CC is about trust and consideration."
    source_programs: [Agency Navigator]
    quote: "1CC is momentum. 2CC is trust. Choose based on the prospect, not your preference."
    domains: [sales-closing]

  - id: IG-060
    title: "Niche Is a Vehicle Not a Destination"
    description: "Your niche gets you started, but your skills make you successful. Don't over-index on niche selection -- pick one, commit, and develop mastery through repetition."
    source_programs: [Six Figure SMMA, Agency Incubator]
    quote: "The niche is the vehicle. Your skills are the engine. Stop shopping for cars and start building the engine."
    domains: [agency-business-model]

  - id: IG-061
    title: "Pragmatic Lifestyle Design"
    description: "Design your lifestyle intentionally, then reverse-engineer the business to support it. Know your number -- what does your dream life actually cost per month?"
    source_programs: [Six Figure SMMA]
    quote: "Know your number. What does your dream life cost? Now build the business to hit that number."
    domains: [mindset-performance, agency-business-model]

# =============================================================================
# L3 - HEURISTICS (40 elements)
# =============================================================================
L3_heuristics:

  # --- Client Tiers & Revenue ---

  - id: IG-062
    title: "Fish/Shark/Whale Client Tiers"
    description: "Fish: $1K-3K/month retainers. Shark: $3K-8K/month. Whale: $8K+/month. Aim for whales -- fewer clients, higher revenue, better margins."
    source_programs: [Agency Incubator, Six Figure SMMA]
    threshold: "Fish=$1K-3K | Shark=$3K-8K | Whale=$8K+"
    domains: [pricing-strategy, client-management]

  - id: IG-063
    title: "Three Cardinal Sins"
    description: "Never charge less than $1,000/month. Never accept less than 50% profit margin. Never do free trials. Violating any of these will destroy your agency."
    source_programs: [Agency Incubator, Agency Navigator, Six Figure SMMA]
    threshold: "Min retainer=$1K | Min margin=50% | Free trials=NEVER"
    domains: [pricing-strategy]

  - id: IG-064
    title: "Top 33% Revenue Rule"
    description: "The top 33% of your clients will generate approximately 89% of your revenue. Focus energy on these clients disproportionately."
    source_programs: [Agency Incubator]
    threshold: "Top 33% clients = 89% revenue"
    domains: [client-management]

  - id: IG-065
    title: "Six Figure Conversion Rate"
    description: "One new client every 36 days gets you to six figures. That's approximately 10 clients per year at ~$10K/year average retainer."
    source_programs: [Agency Incubator]
    threshold: "1 client per 36 days = $100K/year"
    domains: [sales-closing, agency-business-model]

  - id: IG-066
    title: "Minimum Contract Length"
    description: "Always sign clients to 3-month minimum contracts. Anything less doesn't give enough time to prove results and creates constant churn anxiety."
    source_programs: [Agency Incubator, Agency Navigator]
    threshold: "Min contract = 3 months"
    domains: [client-management, pricing-strategy]

  - id: IG-067
    title: "Profit Margin Targets"
    description: "With the LMRD model, 80-95% profit margins are achievable for solo operators. Even with a small team, 60-70% is the target."
    source_programs: [Agency Incubator, Agency Navigator]
    threshold: "Solo: 80-95% margin | Team: 60-70% margin"
    domains: [agency-business-model, pricing-strategy]

  - id: IG-068
    title: "Referral Partner Commission"
    description: "Pay referral partners 50% of the first month's retainer. It's the most cost-effective acquisition channel and creates aligned incentives."
    source_programs: [Agency Incubator]
    threshold: "Referral commission = 50% first month"
    domains: [lead-generation]

  - id: IG-069
    title: "Client Minimum Revenue"
    description: "Don't take clients generating less than $5K/month in their own business. Below that, they can't afford you, won't value you, and will churn."
    source_programs: [Agency Incubator]
    threshold: "Client min revenue = $5K/month"
    domains: [client-management, sales-closing]

  - id: IG-070
    title: "Six Figure Club Monthly"
    description: "$8,300/month is the magic number. That's $100K/year. Every decision should be evaluated against: does this get me closer to $8,300/month?"
    source_programs: [Agency Incubator]
    threshold: "$8,300/month = $100K/year"
    domains: [agency-business-model]

  - id: IG-071
    title: "Celebration Rule"
    description: "Spend 10% of your first retainer on a celebration. This anchors the win in your psychology and creates positive association with closing."
    source_programs: [Agency Incubator]
    threshold: "Celebration spend = 10% first retainer"
    domains: [mindset-performance]

  # --- Activity & Outreach ---

  - id: IG-072
    title: "Phone Screen Time Limit"
    description: "Max 45-60 minutes of phone screen time per day. Beyond that, you're consuming, not producing. Discipline your device usage."
    source_programs: [Agency Incubator]
    threshold: "Phone screen time = 45-60 min/day max"
    domains: [mindset-performance]

  - id: IG-073
    title: "Close Rate Target"
    description: "Target 50% close rate on qualified meetings. Below 30% means your qualification is broken. Above 70% means your pricing is too low."
    source_programs: [Agency Incubator, Agency Navigator]
    threshold: "Close rate target = 50% | Below 30% = bad qualification | Above 70% = pricing too low"
    domains: [sales-closing]

  - id: IG-074
    title: "Contractor Cost Per Client"
    description: "Budget $500-$1,000/month per client for contractor costs. This keeps margins healthy while ensuring quality delivery."
    source_programs: [Agency Incubator]
    threshold: "Contractor cost = $500-1K/month per client"
    domains: [service-delivery, team-building]

  - id: IG-075
    title: "Sole Trader Threshold (UK)"
    description: "Stay as sole trader until $8-10K/month revenue. Don't overcomplicate legal structure prematurely -- it adds cost and complexity without benefit."
    source_programs: [Agency Incubator]
    threshold: "Sole trader until $8-10K/month"
    domains: [agency-business-model]

  - id: IG-076
    title: "70% Time on Outreach"
    description: "In the first 6 months, 70% of your working time should be spent on outreach and prospecting. Everything else is secondary."
    source_programs: [Agency Navigator]
    threshold: "70% time on outreach (first 6 months)"
    domains: [lead-generation]

  - id: IG-077
    title: "Paid Trial Pricing"
    description: "Paid trials should be $500-750 for 30 days. High enough to filter tire-kickers, low enough to reduce commitment anxiety."
    source_programs: [Agency Navigator]
    threshold: "Paid trial = $500-750 for 30 days"
    domains: [pricing-strategy, sales-closing]

  # --- Cold Outreach Metrics ---

  - id: IG-078
    title: "100 Calls to 1 Client"
    description: "100 cold calls = approximately 3 meetings = 1 client. This is the baseline conversion funnel for cold outreach."
    source_programs: [Six Figure SMMA]
    threshold: "100 calls = 3 meetings = 1 client"
    domains: [lead-generation, sales-closing]

  - id: IG-079
    title: "Minimum Daily Cold Calls"
    description: "50 cold calls per day minimum. Below that threshold, you're not generating enough pipeline to sustain growth."
    source_programs: [Six Figure SMMA]
    threshold: "Min 50 cold calls/day"
    domains: [lead-generation]

  - id: IG-080
    title: "500 Calls Before Self-Judgment"
    description: "You are not allowed to judge whether cold calling works until you've made 500 calls. Before that, your sample size is too small."
    source_programs: [Six Figure SMMA]
    threshold: "500 calls before evaluating effectiveness"
    domains: [lead-generation, mindset-performance]

  - id: IG-081
    title: "2x ROI Target for Paid Traffic"
    description: "Target minimum 2x ROI for client paid traffic campaigns. Below 2x, the client won't see enough value. Above 3x, you have room to increase your fees."
    source_programs: [Six Figure SMMA]
    threshold: "Min 2x ROI on paid traffic | Above 3x = raise fees"
    domains: [service-delivery]

  - id: IG-082
    title: "Paid Traffic Pricing Formula"
    description: "Charge based on ad spend managed. Typical range: 15-20% of ad spend for retainer, with performance bonuses on top."
    source_programs: [Six Figure SMMA, Agency Navigator]
    threshold: "Retainer = 15-20% of managed ad spend"
    domains: [pricing-strategy]

  - id: IG-083
    title: "Sell on Leads Not Customers"
    description: "Sell the client on leads delivered, not customers acquired. You control lead generation; you don't control their sales team's ability to close."
    source_programs: [Six Figure SMMA]
    threshold: "Promise leads, not customers"
    domains: [sales-closing, service-delivery]

  - id: IG-084
    title: "Sales Commission for Team"
    description: "Pay 50% of the first month's retainer as sales commission. This incentivizes your closer/setter while maintaining healthy economics."
    source_programs: [Six Figure SMMA]
    threshold: "Sales commission = 50% first month retainer"
    domains: [team-building]

  - id: IG-085
    title: "Minimum Hourly Rate"
    description: "Never go below $30/hour equivalent when calculating your effective rate. If a client's retainer divided by hours equals less than $30, reprice or fire."
    source_programs: [Six Figure SMMA]
    threshold: "Min effective rate = $30/hour"
    domains: [pricing-strategy]

  - id: IG-086
    title: "Copywriter Cost Per Client"
    description: "Budget $150/client for copywriting. This is the going rate for quality ad copy and maintains your margin targets."
    source_programs: [Six Figure SMMA]
    threshold: "Copywriter cost = $150/client"
    domains: [service-delivery, team-building]

  - id: IG-087
    title: "Follow-Up Persistence"
    description: "It takes 8-12 follow-ups to close a sale on average. Most people give up after 2-3. The fortune is in the follow-up."
    source_programs: [Six Figure SMMA]
    threshold: "8-12 follow-ups average to close"
    domains: [sales-closing, lead-generation]

  - id: IG-088
    title: "Social Proof Budget"
    description: "Invest up to $100 maximum for a 30-day social proof engagement. Work at cost or slight loss for a testimonial from a recognizable brand."
    source_programs: [Six Figure SMMA]
    threshold: "Max $100 for 30-day social proof case"
    domains: [lead-generation]

  # --- Agency Navigator specific metrics ---

  - id: IG-089
    title: "LinkedIn Connection Acceptance Rate"
    description: "Target 30-40% connection acceptance rate on LinkedIn. Below 20% means your profile or targeting needs work."
    source_programs: [Agency Navigator]
    threshold: "LinkedIn acceptance rate = 30-40% target | Below 20% = fix profile"
    domains: [lead-generation]

  - id: IG-090
    title: "Cold Email Response Rate"
    description: "Target 5-10% response rate on cold emails. Below 3% means your copy or targeting is off. Above 15% means you've found a goldmine."
    source_programs: [Agency Navigator]
    threshold: "Cold email response = 5-10% target | Below 3% = fix copy | Above 15% = scale aggressively"
    domains: [lead-generation]

  - id: IG-091
    title: "Tax Planning Threshold"
    description: "At $5K/month revenue, get an accountant. At $10K/month, get a tax strategist. The ROI on professional tax advice exceeds every other investment."
    source_programs: [Agency Navigator]
    threshold: "$5K/month = get accountant | $10K/month = get tax strategist"
    domains: [agency-business-model]

  - id: IG-092
    title: "Team Member Pay Structures"
    description: "Contractors: project-based or hourly ($15-50/hr depending on skill). Full-time: salary + performance bonus. Always tie some comp to results."
    source_programs: [Agency Navigator]
    threshold: "Contractors = $15-50/hr | Full-time = salary + performance bonus"
    domains: [team-building]

  - id: IG-093
    title: "Ad Spend Recommendations by Niche"
    description: "Local businesses: $500-2K/month ad spend. E-commerce: $2K-10K+/month. Info products: $1K-5K/month. Match your targeting to what the niche can afford."
    source_programs: [Agency Navigator]
    threshold: "Local=$500-2K | E-comm=$2K-10K+ | Info=$1K-5K monthly ad spend"
    domains: [service-delivery, pricing-strategy]

  - id: IG-094
    title: "Four Pricing Model Ranges"
    description: "Base retainer: $1K-5K. Performance-only: 10-20% of revenue generated. Base + performance: $1K-3K base + 5-10% performance. Bold: $5K+ with guarantee."
    source_programs: [Agency Navigator]
    threshold: "Base=$1K-5K | Perf=10-20% rev | Hybrid=$1K-3K+5-10% | Bold=$5K+ guaranteed"
    domains: [pricing-strategy]

  - id: IG-095
    title: "Outreach Volume Minimums"
    description: "LinkedIn: 50-100 connections/day. Cold email: 50-100 emails/day. Cold calls: 50/day. DMs: 20-30/day. Minimum volume to generate consistent pipeline."
    source_programs: [Agency Navigator, Six Figure SMMA]
    threshold: "LinkedIn=50-100/day | Email=50-100/day | Calls=50/day | DMs=20-30/day"
    domains: [lead-generation]

  - id: IG-096
    title: "Meeting to Close Timeframe"
    description: "Close within 48 hours of the sales call or the deal goes cold. 1CC ideally, but if 2CC, second call within 48 hours maximum."
    source_programs: [Agency Navigator]
    threshold: "Close within 48 hours of sales call"
    domains: [sales-closing]

  - id: IG-097
    title: "Six Month Hall Pass"
    description: "Give your chosen niche a minimum six-month commitment before pivoting. Anything less and you haven't given it a real chance."
    source_programs: [Agency Incubator, Agency Navigator]
    threshold: "Min 6 months in niche before pivoting"
    domains: [agency-business-model]

  - id: IG-098
    title: "Niche Selection Revenue Floor"
    description: "Only target niches where businesses average $250K+ annual revenue. Below that, they can't afford quality agency services."
    source_programs: [Agency Navigator, Six Figure SMMA]
    threshold: "Target businesses with $250K+ annual revenue"
    domains: [agency-business-model, client-management]

  - id: IG-099
    title: "Retainer vs Revenue Ratio"
    description: "Your monthly retainer should be 5-10% of the client's monthly revenue. This ensures you're affordable but also valued."
    source_programs: [Agency Navigator]
    threshold: "Retainer = 5-10% of client monthly revenue"
    domains: [pricing-strategy]

  - id: IG-100
    title: "First 90 Days Focus"
    description: "In the first 90 days with a new client, over-deliver and over-communicate. This period determines whether they stay for 3 months or 3 years."
    source_programs: [Agency Navigator, Six Figure SMMA]
    threshold: "Over-deliver for first 90 days"
    domains: [client-management, service-delivery]

  - id: IG-101
    title: "Content Frequency for Authority"
    description: "Post 3-5 times per week on your primary platform. Below that, you're invisible. Above that, you risk burnout without a content team."
    source_programs: [Six Figure SMMA]
    threshold: "3-5 posts/week on primary platform"
    domains: [lead-generation]

# =============================================================================
# L4 - FRAMEWORKS (38 elements)
# =============================================================================
L4_frameworks:

  # --- Business Model ---

  - id: IG-102
    title: "LMRD Agency Framework"
    description: "Lean, Mean, Revenue-generating, Debt-free. The four pillars of a profitable agency. Lean ops, aggressive revenue focus, zero debt, high margins."
    source_programs: [Agency Incubator, Agency Navigator]
    components: ["Lean operations", "Mean (aggressive) revenue focus", "Revenue-generating activities prioritized", "Debt-free operation"]
    domains: [agency-business-model]

  - id: IG-103
    title: "Expedia Business Model"
    description: "Act as the middle-man between client and fulfillment, like Expedia between traveler and hotel. You sell, manage, and guarantee -- contractors deliver."
    source_programs: [Agency Incubator, Agency Navigator]
    components: ["Client-facing sales", "Contractor fulfillment", "Quality control", "Margin management"]
    domains: [agency-business-model, service-delivery]

  - id: IG-104
    title: "Agency 3.0 Model Framework"
    description: "The evolved agency model: outcome-based pricing, automated delivery systems, remote-first operations, and fewer-higher-value clients."
    source_programs: [Agency Navigator]
    components: ["Outcome-based pricing", "Automated delivery", "Remote-first", "High-value client focus"]
    domains: [agency-business-model]

  - id: IG-105
    title: "Six Figure Formula"
    description: "Reverse-engineer six figures: $100K / 12 months = $8,333/month. At $2.5K avg retainer = 4 clients. At $5K avg = 2 clients. Simple math, simple execution."
    source_programs: [Six Figure SMMA]
    components: ["Revenue target", "Monthly breakdown", "Client count", "Retainer calculation"]
    domains: [agency-business-model, pricing-strategy]

  - id: IG-106
    title: "Dream Lifestyle = Dream Agency"
    description: "Design the lifestyle you want first, then reverse-engineer the agency to fund it. Number of clients, hours worked, location -- all derived from lifestyle goals."
    source_programs: [Six Figure SMMA]
    components: ["Lifestyle design", "Revenue requirement", "Client structure", "Time allocation"]
    domains: [agency-business-model, mindset-performance]

  - id: IG-107
    title: "Value Ladder Framework"
    description: "Structure your services as a ladder: free content > low-ticket audit > mid-ticket retainer > high-ticket premium > exclusive partnership. Each rung feeds the next."
    source_programs: [Six Figure SMMA]
    components: ["Free content layer", "Low-ticket entry", "Mid-ticket core", "High-ticket premium", "Exclusive tier"]
    domains: [pricing-strategy]

  # --- Sales ---

  - id: IG-108
    title: "Four Phases of the Sale"
    description: "Phase 1: Build rapport and establish trust. Phase 2: Diagnose problems (ask, don't tell). Phase 3: Present solution aligned to diagnosis. Phase 4: Close with confidence."
    source_programs: [Agency Incubator, Agency Navigator]
    components: ["Rapport building", "Problem diagnosis", "Solution presentation", "Confident close"]
    domains: [sales-closing]

  - id: IG-109
    title: "1CC Sales Script Framework"
    description: "One-Call Close structure: Hook (pattern interrupt) > Qualify (budget, authority, need, timeline) > Diagnose (pain amplification) > Present (solution stack) > Close (assumptive)."
    source_programs: [Agency Navigator]
    components: ["Hook/pattern interrupt", "Qualification", "Pain amplification", "Solution stack", "Assumptive close"]
    domains: [sales-closing]

  - id: IG-110
    title: "2CC Sales Script Framework"
    description: "Two-Call Close: Call 1 = Discovery (build rapport, diagnose pain, qualify, set homework). Call 2 = Presentation (recap, present solution, handle objections, close)."
    source_programs: [Agency Navigator]
    components: ["Call 1: Discovery + qualification", "Homework assignment", "Call 2: Presentation + close"]
    domains: [sales-closing]

  - id: IG-111
    title: "Objection Handling Framework"
    description: "Acknowledge > Isolate > Reframe > Close. Never argue with an objection. Acknowledge it, isolate it as the only concern, reframe the perception, then close."
    source_programs: [Agency Incubator, Agency Navigator]
    components: ["Acknowledge the concern", "Isolate as only objection", "Reframe perception", "Close again"]
    domains: [sales-closing]

  - id: IG-112
    title: "Objection Obscenity Framework"
    description: "Advanced objection handling for hardened prospects. Make the objection sound absurd by reframing it in extreme terms, then present the logical alternative."
    source_programs: [Agency Navigator]
    components: ["Amplify objection to absurdity", "Contrast with reality", "Present logical path", "Assumptive close"]
    domains: [sales-closing]

  - id: IG-113
    title: "Cold Call Anatomy (5 Steps)"
    description: "Step 1: Pattern interrupt opener. Step 2: Quick value proposition. Step 3: Qualifying question. Step 4: Interest-based pivot. Step 5: Book the meeting."
    source_programs: [Six Figure SMMA]
    components: ["Pattern interrupt", "Value prop (10 sec)", "Qualifying question", "Interest pivot", "Meeting booking"]
    domains: [sales-closing, lead-generation]

  - id: IG-114
    title: "Sales Meeting Flow"
    description: "Pre-frame (set expectations) > Rapport (genuine connection) > Situation (current state) > Problem (pain points) > Implication (cost of inaction) > Need-payoff (solution vision) > Present > Close."
    source_programs: [Six Figure SMMA]
    components: ["Pre-frame", "Rapport", "Situation questions", "Problem questions", "Implication questions", "Need-payoff", "Presentation", "Close"]
    domains: [sales-closing]

  - id: IG-115
    title: "Future Pacing Technique"
    description: "Paint a vivid picture of the prospect's future after working with you. Make them see, feel, and experience the transformation before they buy."
    source_programs: [Six Figure SMMA]
    components: ["Current pain vivid description", "Future state visualization", "Emotional anchoring", "Bridge (your service)"]
    domains: [sales-closing]

  - id: IG-116
    title: "Foot Through The Door Method"
    description: "Start with a small commitment (audit, consultation, paid trial) to reduce resistance, then expand the relationship into a full retainer."
    source_programs: [Six Figure SMMA]
    components: ["Low-commitment entry", "Value demonstration", "Relationship building", "Full proposal"]
    domains: [sales-closing, pricing-strategy]

  # --- Lead Generation ---

  - id: IG-117
    title: "Four Pillars of Lead Generation"
    description: "Pillar 1: Outbound (cold outreach). Pillar 2: Inbound (content, SEO). Pillar 3: Referrals (partner networks). Pillar 4: Paid (ads, sponsorships). Build all four."
    source_programs: [Agency Incubator, Agency Navigator]
    components: ["Outbound cold outreach", "Inbound content marketing", "Referral network", "Paid acquisition"]
    domains: [lead-generation]

  - id: IG-118
    title: "LinkedIn Outreach System"
    description: "Profile optimization > Target list building > Connection requests (personalized) > Value-first DM sequence > Call booking. Systematic, not spammy."
    source_programs: [Agency Navigator]
    components: ["Profile optimization", "Target list", "Personalized connections", "Value-first DM sequence", "Call booking"]
    domains: [lead-generation]

  - id: IG-119
    title: "Cold Email Campaign Framework"
    description: "Research > Personalize > Short subject line > Opening hook > Value proposition > Social proof > Clear CTA > Follow-up sequence (5-7 emails)."
    source_programs: [Agency Navigator]
    components: ["Prospect research", "Personalization tokens", "Hook subject line", "Value-first body", "Social proof", "Clear CTA", "5-7 email sequence"]
    domains: [lead-generation]

  - id: IG-120
    title: "Profile Funnel Framework"
    description: "Transform your social profile into a conversion funnel: Bio (who you help), Highlights/Featured (proof), Posts (value), CTA (how to work with you)."
    source_programs: [Agency Navigator]
    components: ["Bio optimization", "Proof/highlights", "Value content", "Clear CTA"]
    domains: [lead-generation]

  - id: IG-121
    title: "Fake Audit Strategy"
    description: "Create a compelling free audit of the prospect's current marketing. Shows expertise, reveals problems, and naturally leads to 'want me to fix this?' conversation."
    source_programs: [Six Figure SMMA]
    components: ["Prospect research", "Audit creation (15-20 min)", "Problem identification", "Solution teaser", "Meeting request"]
    domains: [lead-generation, sales-closing]

  - id: IG-122
    title: "Authority Building Framework"
    description: "Build authority through: case studies, content creation, speaking engagements, strategic partnerships, and social proof accumulation. Authority = inbound leads."
    source_programs: [Six Figure SMMA]
    components: ["Case study creation", "Content strategy", "Speaking opportunities", "Strategic partnerships", "Social proof"]
    domains: [lead-generation]

  - id: IG-123
    title: "Personal Brand Flywheel"
    description: "Content creates authority. Authority attracts leads. Leads become clients. Client results become case studies. Case studies fuel content. The flywheel accelerates."
    source_programs: [Six Figure SMMA]
    components: ["Content creation", "Authority building", "Lead attraction", "Client delivery", "Case study capture", "Flywheel acceleration"]
    domains: [lead-generation]

  - id: IG-124
    title: "Lead Sourcing & Qualification"
    description: "Identify prospects through directories, social media, Google Maps, industry lists. Qualify with BANT: Budget, Authority, Need, Timeline."
    source_programs: [Six Figure SMMA]
    components: ["Source identification", "List building", "BANT qualification", "Priority scoring"]
    domains: [lead-generation]

  # --- Niche & Client ---

  - id: IG-125
    title: "Three Niche Selection Questions"
    description: "Question 1: Can they afford you? ($250K+ revenue). Question 2: Do they need what you offer? (Marketing-dependent). Question 3: Can you reach them? (Accessible decision-makers)."
    source_programs: [Agency Incubator, Six Figure SMMA]
    components: ["Affordability filter", "Need validation", "Accessibility check"]
    domains: [agency-business-model]

  - id: IG-126
    title: "Wrong Client Checklist (Red Flags)"
    description: "Red flags: negotiates aggressively before signing, wants guarantees without commitment, has fired 3+ agencies, expects instant results, micromanages deliverables."
    source_programs: [Agency Incubator, Six Figure SMMA]
    components: ["Aggressive negotiation", "Unrealistic guarantees", "Agency-hopping history", "Instant results expectation", "Micromanagement tendency"]
    domains: [client-management, sales-closing]

  - id: IG-127
    title: "Niche Selection Criteria"
    description: "Evaluate niches on: market size, average revenue, marketing dependence, competition density, your interest/expertise, and accessibility of decision-makers."
    source_programs: [Six Figure SMMA]
    components: ["Market size", "Avg revenue", "Marketing dependence", "Competition", "Personal interest", "Decision-maker access"]
    domains: [agency-business-model]

  - id: IG-128
    title: "Client ROI Formula"
    description: "Calculate and present client ROI clearly: (Revenue generated - Your fee - Ad spend) / Your fee = ROI multiple. Make this number the center of every retention conversation."
    source_programs: [Six Figure SMMA]
    components: ["Revenue tracking", "Fee calculation", "Ad spend deduction", "ROI multiple presentation"]
    domains: [client-management, service-delivery]

  - id: IG-129
    title: "Whale Client Management"
    description: "Whale clients ($8K+/month) require: dedicated account manager, weekly reporting, monthly strategy calls, priority response times, and proactive optimization."
    source_programs: [Six Figure SMMA]
    components: ["Dedicated account manager", "Weekly reporting", "Monthly strategy calls", "Priority response", "Proactive optimization"]
    domains: [client-management]

  - id: IG-130
    title: "Consulting Proposal Framework"
    description: "Structure proposals: Executive summary > Situation analysis > Proposed solution > Timeline > Investment > ROI projection > Next steps. Make it easy to say yes."
    source_programs: [Six Figure SMMA]
    components: ["Executive summary", "Situation analysis", "Solution proposal", "Timeline", "Investment", "ROI projection", "Next steps"]
    domains: [sales-closing]

  # --- Delivery & Operations ---

  - id: IG-131
    title: "SYE Framework (Sell Your Expertise)"
    description: "Package your knowledge as a service: identify your expertise area, create a signature process, name it, systematize delivery, and sell the process not the hours."
    source_programs: [Agency Incubator]
    components: ["Expertise identification", "Signature process creation", "Naming convention", "Systematized delivery", "Process-based pricing"]
    domains: [service-delivery, pricing-strategy]

  - id: IG-132
    title: "Paid Trial Methodology"
    description: "Offer a paid trial ($500-750/30 days) with clear deliverables and success metrics. Convert to full retainer at trial end with proven results."
    source_programs: [Agency Navigator, Agency Incubator]
    components: ["Trial pricing ($500-750)", "Clear deliverables", "Success metrics", "30-day timeline", "Conversion conversation"]
    domains: [sales-closing, pricing-strategy]

  - id: IG-133
    title: "Strategic Partnership Template"
    description: "Identify complementary businesses (web developers, accountants, business coaches). Formalize referral agreements with 50% first-month commission."
    source_programs: [Agency Incubator]
    components: ["Partner identification", "Value proposition for partner", "Commission structure", "Formal agreement", "Tracking system"]
    domains: [lead-generation]

  - id: IG-134
    title: "Client Communication Framework"
    description: "Weekly: brief update email. Bi-weekly: metrics report. Monthly: strategy review call. Quarterly: roadmap planning session. Proactive > reactive always."
    source_programs: [Agency Navigator]
    components: ["Weekly updates", "Bi-weekly reports", "Monthly strategy calls", "Quarterly planning", "Proactive communication"]
    domains: [client-management, service-delivery]

  - id: IG-135
    title: "Tax & Accounting Framework"
    description: "Separate business and personal accounts. Track all expenses. Quarterly tax planning. Annual tax optimization. Work with specialist, not generalist accountant."
    source_programs: [Agency Navigator]
    components: ["Account separation", "Expense tracking", "Quarterly tax planning", "Annual optimization", "Specialist accountant"]
    domains: [agency-business-model]

  - id: IG-136
    title: "Irresistible Offer Framework"
    description: "Combine: specific outcome promise + timeframe + risk reversal + bonus stack + urgency. The offer should make saying no feel like the risky choice."
    source_programs: [Agency Navigator]
    components: ["Specific outcome", "Defined timeframe", "Risk reversal/guarantee", "Bonus stack", "Urgency element"]
    domains: [pricing-strategy, sales-closing]

  - id: IG-137
    title: "30-Day Client Cheat Sheet"
    description: "Day 1-7: Onboarding + account setup. Day 8-14: Strategy development + approval. Day 15-21: Campaign launch + monitoring. Day 22-30: Optimization + first results report."
    source_programs: [Six Figure SMMA]
    components: ["Week 1: Onboarding", "Week 2: Strategy", "Week 3: Launch", "Week 4: Optimize + report"]
    domains: [service-delivery, client-management]

  - id: IG-138
    title: "Monk Mode Protocol"
    description: "90-day intense focus period: Delete social media. Wake at 5AM. 4-hour deep work blocks. No alcohol. No dating. No entertainment. Weekly review and adjust."
    source_programs: [Agency Navigator]
    components: ["Social media elimination", "Early wake time", "Deep work blocks", "Vice elimination", "Weekly review"]
    domains: [mindset-performance]

  - id: IG-139
    title: "War Path Framework"
    description: "30-day sprint protocol: Define one clear target. Triple daily activity volume. Eliminate all non-essential meetings. Track metrics daily. Win or learn."
    source_programs: [Agency Navigator]
    components: ["Single target definition", "3x activity volume", "Meeting elimination", "Daily metric tracking", "Win-or-learn mindset"]
    domains: [mindset-performance]

# =============================================================================
# L5 - METHODOLOGIES (30 elements)
# =============================================================================
L5_methodologies:

  # --- Business Setup & Growth ---

  - id: IG-140
    title: "Agency Journey Progression Path"

layers:

  L1_PHILOSOPHIES:
    count: 30
    items:
      - id: "FIL-DM-001"
        title: "Clarity Over Cleverness"
        description: "Don't be cute or clever. Be clear. The money is in clarity, not in cute and clever."
        domains: ["messaging", "marketing", "copywriting"]
        source: "SWS"

      - id: "FIL-DM-002"
        title: "Understanding Wins Over Quality"
        description: "People do not buy the best products and services. They buy the ones they can understand the fastest."
        domains: ["positioning", "sales", "marketing"]
        source: "SWS"

      - id: "FIL-DM-003"
        title: "Survival Association Imperative"
        description: "We must associate our products and services with the survival of our potential customer or they are designed to ignore us."
        domains: ["messaging", "psychology", "marketing"]
        source: "SWS"

      - id: "FIL-DM-004"
        title: "Story Is The Only Attention Tool"
        description: "Story is the only tool known to man that can keep your attention for an extended period of time."
        domains: ["storytelling", "messaging", "content"]
        source: "SWS"

      - id: "FIL-DM-005"
        title: "Guide Not Hero"
        description: "Never position yourself as the hero in the story. Always position yourself as the guide."
        domains: ["positioning", "brand-strategy", "sales"]
        source: "SWS"

      - id: "FIL-DM-006"
        title: "Marketing As Memorization"
        description: "Your marketing needs to be an exercise in memorization. You are guiding customers through memorizing why they should buy."
        domains: ["messaging", "marketing", "brand-strategy"]
        source: "SWS"

      - id: "FIL-DM-007"
        title: "Words Are Free"
        description: "Words are free. The solution to your marketing problem is free. It costs mental energy, not money."
        domains: ["copywriting", "messaging"]
        source: "SWS"

      - id: "FIL-DM-008"
        title: "Inferior Product With Better Positioning Wins"
        description: "If your competition has an inferior product but better messaging, they will beat you every single time."
        domains: ["positioning", "competitive-strategy"]
        source: "SWS"

      - id: "FIL-DM-009"
        title: "Execution Over Ideas"
        description: "You do not get points for fumbling the ball on the one yard line. You do not make money from ideas. You make money from executing ideas."
        domains: ["execution", "business-strategy"]
        source: "SWS"

      - id: "FIL-DM-010"
        title: "Customers Buy Feelings Not Solutions"
        description: "Companies sell solutions to problems, but customers buy solutions to their feelings about the problem."
        domains: ["sales-psychology", "messaging", "copywriting"]
        source: "SWS"

      - id: "FIL-DM-011"
        title: "Websites Trigger Daydreams"
        description: "Your websites are literally triggering people to daydream and stop paying attention to you. This is costing you money."
        domains: ["web-design", "messaging", "conversion"]
        source: "SWS"

      - id: "FIL-DM-012"
        title: "Story As Sense-Making Device"
        description: "Story is a sense-making device. The human brain longs for clarity, and people will be attracted to anything that is clear."
        domains: ["storytelling", "psychology", "messaging"]
        source: "SWS"

      - id: "FIL-DM-013"
        title: "Problem Is The Hook"
        description: "The problem is the hook. Until the hero has a problem, we do not have a story. Start talking about your customer's problems to make more money."
        domains: ["copywriting", "messaging", "sales"]
        source: "SWS"

      - id: "FIL-DM-014"
        title: "We Vote For Guides Not Heroes"
        description: "We love our heroes. We honor them. We just don't vote for them. Position as guide, not hero."
        domains: ["positioning", "leadership", "brand-strategy"]
        source: "SWS"

      - id: "FIL-DM-015"
        title: "Shorter Is Always Better"
        description: "The shorter the better. Commas are not your friend. Every comma is another bowling ball you're asking them to hold."
        domains: ["copywriting", "messaging"]
        source: "SWS"

      - id: "FIL-DM-016"
        title: "Don't Waste A Good Crisis"
        description: "Don't waste a good crisis. Use downtime to build your sales funnel so the next year is your best ever."
        domains: ["business-strategy", "resilience"]
        source: "SWS"

      - id: "FIL-DM-017"
        title: "Real Companies Make Money"
        description: "Real companies make money. WeWork is not a real company. It's a money pit. Build like a rocket with powerful engines and tiny overhead."
        domains: ["business-strategy", "finance"]
        source: "SWS"

      - id: "FIL-DM-018"
        title: "Sound Bites Are Essential"
        description: "A great product without sound bites that make people want to buy it will fail. You need both: great product AND great sound bites."
        domains: ["messaging", "marketing", "word-of-mouth"]
        source: "SWS"

      - id: "FIL-DM-019"
        title: "Put Customers First Always"
        description: "If we go to bed worrying about how much money our customers make rather than how much money we make, we will never suffer for money."
        domains: ["customer-centricity", "business-philosophy"]
        source: "SWS"

      - id: "FIL-DM-020"
        title: "Everything Is Survival"
        description: "Everything people buy comes down to survival. Even rest, even a vacation is to rest and recover to survive. Associate your product with survival."
        domains: ["psychology", "sales-psychology", "marketing"]
        source: "SWS"

      - id: "FIL-DM-021"
        title: "Version One Over Version Perfect"
        description: "Version one is better than version none. Get it out. It doesn't have to be perfect. Tweak it later."
        domains: ["execution", "marketing", "business-strategy"]
        source: "SBMR"

      - id: "FIL-DM-022"
        title: "Campaigns Never Die"
        description: "Great campaigns never stop working. The only reason to kill one is boredom or declining results. Millions of people haven't seen it yet."
        domains: ["marketing", "campaign-strategy"]
        source: "SBMR"

      - id: "FIL-DM-023"
        title: "Permission To Make Mistakes"
        description: "Oops emails get enormous open rates. People respond to authenticity and mistakes. Don't let perfectionism kill your marketing."
        domains: ["email-marketing", "authenticity"]
        source: "SBMR"

      - id: "FIL-DM-024"
        title: "Lead Gen Is The Pivot Engine"
        description: "A single lead-generating PDF + email sequence pivoted StoryBrand from $250K to $1.3M in one year. That's the power of this system."
        domains: ["lead-generation", "business-growth"]
        source: "SBMR"

      - id: "FIL-DM-025"
        title: "Reciprocity Through Free Value"
        description: "When customers get enormous value for free, they feel indebted to do business with you. Not a conscious feeling, but a powerful subconscious pull."
        domains: ["lead-generation", "psychology", "sales"]
        source: "SBMR"

      - id: "FIL-DM-026"
        title: "Authority Through Territory Claiming"
        description: "Lead generators establish your client as THE expert in their area. State claim to territory. Become known for something specific."
        domains: ["positioning", "authority", "lead-generation"]
        source: "SBMR"

      - id: "FIL-DM-027"
        title: "Brain Rolodex Problem Filing"
        description: "The brain files companies under the PROBLEM they solve, not their name. If they can't file you, they forget you. Be filed under a problem."
        domains: ["psychology", "positioning", "messaging"]
        source: "SBMR"

      - id: "FIL-DM-028"
        title: "Marketing Collateral Lives Forever"
        description: "Once marketing collateral is created and lives on the internet, it creates sales over and over. The hard work is front-loaded."
        domains: ["marketing", "automation", "business-strategy"]
        source: "SBMR"

      - id: "FIL-DM-029"
        title: "All About Them Not You"
        description: "Your product, service, company are not the hero. They are. You are Yoda, not Luke Skywalker. Keep them in the hero position always."
        domains: ["positioning", "copywriting", "sales"]
        source: "SBMR"

      - id: "FIL-DM-030"
        title: "Tension-Relief Is Universal"
        description: "Sales letters, movies, stories, even music — all work by creating tension and relieving it. Master this rhythm and you master persuasion."
        domains: ["copywriting", "sales-psychology", "storytelling"]
        source: "SBMR"

  L2_MENTAL_MODELS:
    count: 23
    items:
      - id: "MM-DM-001"
        title: "SB7 StoryBrand Framework"
        description: "7 story elements applied to business: Character (want), Problem (external/internal/philosophical), Guide (empathy+authority), Plan (3 steps), CTA (direct+transitional), Success, Failure."
        domains: ["messaging", "brand-strategy", "storytelling"]
        source: "SWS"

      - id: "MM-DM-002"
        title: "Three Stages of Relationship"
        description: "All relationships follow: Curiosity (can you help me survive?) → Enlightenment (prove you can) → Commitment (skin in the game). Marketing must follow this order."
        domains: ["sales-funnel", "relationship-marketing", "psychology"]
        source: "SWS"

      - id: "MM-DM-003"
        title: "Three Levels of Problems"
        description: "Every story has 3 problem levels: External (physical), Internal (feelings), Philosophical (should/ought). The buy button resolves all three in one climactic scene."
        domains: ["copywriting", "storytelling", "messaging"]
        source: "SWS"

      - id: "MM-DM-004"
        title: "The Grunt Test"
        description: "If a caveman can't answer 3 questions in 5 seconds from your website — What do you offer? How will it make my life better? What do I need to do to buy it? — you're losing money."
        domains: ["web-design", "messaging", "conversion"]
        source: "SWS"

      - id: "MM-DM-005"
        title: "Survival Algorithm"
        description: "The brain constantly runs an algorithm: what helps me survive → keep. What doesn't → ignore. Your marketing must pass this filter."
        domains: ["psychology", "marketing", "messaging"]
        source: "SWS"

      - id: "MM-DM-006"
        title: "Calorie Conservation"
        description: "Brain burns 600-800 cal/day processing info. If processing your message burns too many calories, brain shuts down → daydream mode. Simple language = survival."
        domains: ["psychology", "copywriting", "messaging"]
        source: "SWS"

      - id: "MM-DM-007"
        title: "Hero vs Guide Positioning"
        description: "Heroes are weak, filled with self-doubt, ill-equipped. Guides are competent and caring. Position as guide = you're useful. Position as hero = you're in a separate story."
        domains: ["positioning", "brand-strategy", "sales"]
        source: "SWS"

      - id: "MM-DM-008"
        title: "Bowling Ball Analogy"
        description: "Each idea = 8lb bowling ball handed to audience. Max 3 before they drop ALL of them. One thing = one bowling ball = they hold it."
        domains: ["messaging", "presentations", "copywriting"]
        source: "SWS"

      - id: "MM-DM-009"
        title: "Obligatory/Climactic Scene"
        description: "One scene ~9 min before end resolves external + internal + philosophical problems simultaneously. Serotonin release. Position buy button as this scene."
        domains: ["storytelling", "conversion", "sales-psychology"]
        source: "SWS"

      - id: "MM-DM-010"
        title: "The Airplane Model"
        description: "Company = airplane. Body = overhead. Wings = product. Right engine = marketing. Left engine = sales. Fuel = cash flow. All must be proportional."
        domains: ["business-strategy", "scaling", "finance"]
        source: "SWS"

      - id: "MM-DM-011"
        title: "Quantity Time vs Quality Time"
        description: "85% of buyers already went through sales cycle and bought from nurture sequence. Without continued emails, company would be 85% smaller."
        domains: ["email-marketing", "nurture", "sales-funnel"]
        source: "SWS"

      - id: "MM-DM-012"
        title: "Value Stacking"
        description: "Use free words to increase perceived value. A $3K e-bike becomes $8K value with 5 benefit statements. Each benefit adds perceived dollar value."
        domains: ["pricing", "copywriting", "conversion"]
        source: "SWS"

      - id: "MM-DM-013"
        title: "Z-Pattern Eye Movement"
        description: "Eyes scan websites in Z pattern: top-left → top-right → middle → bottom. Place your hooks where the fish swim."
        domains: ["web-design", "conversion", "UX"]
        source: "SWS"

      - id: "MM-DM-014"
        title: "Cow Branding Metaphor"
        description: "If you put 5 different brands on one cow, nobody knows whose cow it is. Same message, same words, repeated = clear brand. Different words each time = confusion."
        domains: ["brand-strategy", "messaging", "consistency"]
        source: "SWS"

      - id: "MM-DM-015"
        title: "First Date vs Marriage"
        description: "Your website is the first date. The job of the first date is to get the second date, not to get married. Don't overwhelming with information."
        domains: ["web-design", "sales-funnel", "conversion"]
        source: "SWS"

      - id: "MM-DM-016"
        title: "7 Persuasion Principles"
        description: "Ray Edwards' framework: (1) All about them, (2) Talk about you to make it about them, (3) People believe what THEY discover, (4) Social proof, (5) Scarcity, (6) Reciprocity, (7) Authority. Sell without being sleazy."
        domains: ["sales-psychology", "copywriting", "persuasion"]
        source: "SBMR"

      - id: "MM-DM-017"
        title: "Tension-Relief Cycle"
        description: "Create problem → amplify it → begin relieving → full relief with solution. Works like fishing: nibble → set hook → reel in. Movies, music, sales letters all follow this."
        domains: ["copywriting", "sales-psychology", "storytelling"]
        source: "SBMR"

      - id: "MM-DM-018"
        title: "Fishing Rod Analogy"
        description: "Present a problem = cast line. Get nibble = interest. Amplify problem = jerk rod to set hook. Offer solution = reel in. The PASTOR framework IS this fishing process."
        domains: ["copywriting", "sales", "persuasion"]
        source: "SBMR"

      - id: "MM-DM-019"
        title: "Marriage-Date Continuum"
        description: "Will you marry me? No. Will you go out with me? Yes. Direct CTA (marry/buy) paired with transitional CTA (date/download). Keep asking both. Eventually they marry."
        domains: ["sales-funnel", "conversion", "lead-generation"]
        source: "SBMR"

      - id: "MM-DM-020"
        title: "Campaign Stacking Model"
        description: "Build campaigns in order: Website → Lead-Gen PDF → Email Nurture → Sales Letter → Testimonials. Each campaign stacks on the previous. Then tweak, duplicate, create new one."
        domains: ["marketing", "campaign-strategy", "sales-funnel"]
        source: "SBMR"

      - id: "MM-DM-021"
        title: "7 Deadly Sins of Email"
        description: "Ray Edwards: (1) Written from company POV, (2) Feels like stranger, (3) Looks like ad, (4) We-speak, (5) Talks AT reader, (6) No value, (7) Feels like spam. Avoid all seven."
        domains: ["email-marketing", "copywriting"]
        source: "SBMR"

      - id: "MM-DM-022"
        title: "7 Things Every Email Needs"
        description: "Ray Edwards: (1) Big idea/MWR, (2) Story, (3) Compelling subject line, (4) Unified through line, (5) Singular voice, (6) Feels from a friend, (7) Single clear CTA."
        domains: ["email-marketing", "copywriting"]
        source: "SBMR"

      - id: "MM-DM-023"
        title: "7 Keys to Email Mastery"
        description: "Ray Edwards/Hemingway: (1) Read spam subject lines for ideas, (2) Read magazine headlines, (3) Conversational voice, (4) Short words, (5) Short sentences, (6) Short paragraphs, (7) Active language."
        domains: ["email-marketing", "copywriting"]
        source: "SBMR"

  L3_HEURISTICS:
    count: 40
    items:
      - id: "HEUR-DM-001"
        title: "8x Metabolization Rule"
        description: "Average person must hear something 8 times in exact same language to metabolize it. Since they're not always listening, say it ~250 times."
        value: "8 times / ~250 repetitions"
        domains: ["messaging", "marketing"]
        source: "SWS"

      - id: "HEUR-DM-002"
        title: "8-Second Attention Window"
        description: "You have 8 seconds to connect how you help them survive. After 8 seconds without connection, they tune out and daydream."
        value: "8 seconds"
        domains: ["messaging", "presentations", "sales"]
        source: "SWS"

      - id: "HEUR-DM-003"
        title: "30% Daydream Rate"
        description: "The average brain daydreams 30% of the time. Story is the only tool that stops daydreaming."
        value: "30%"
        domains: ["psychology", "content", "attention"]
        source: "SWS"

      - id: "HEUR-DM-004"
        title: "Brain Calorie Budget"
        description: "Brain burns 600-800 calories/day processing information. Heavy content day: 1000-1200 cal. Your message must be calorie-efficient."
        value: "600-800 cal/day normal, 1000-1200 heavy"
        domains: ["psychology", "copywriting"]
        source: "SWS"

      - id: "HEUR-DM-005"
        title: "Magic Number Three"
        description: "3 steps is the magic number for a plan. 4 works. 5 kills sales. Break everything into 3 phases."
        value: "3 steps optimal, 4 max, 5 kills sales"
        domains: ["sales-funnel", "conversion", "messaging"]
        source: "SWS"

      - id: "HEUR-DM-006"
        title: "5-Second Website Test"
        description: "If a customer can't figure out what you offer in 5 seconds from your website header, you're losing money."
        value: "5 seconds"
        domains: ["web-design", "conversion"]
        source: "SWS"

      - id: "HEUR-DM-007"
        title: "Header Is 50% of Effectiveness"
        description: "The header of your website is up to 50% of your website copy and effectiveness. Get the header right first."
        value: "50%"
        domains: ["web-design", "conversion", "copywriting"]
        source: "SWS"

      - id: "HEUR-DM-008"
        title: "One Thing Rule"
        description: "Be known for one thing. One problem. One solution. If you hand them 4 bowling balls, they drop all of them."
        value: "1 thing"
        domains: ["positioning", "messaging", "brand-strategy"]
        source: "SWS"

      - id: "HEUR-DM-009"
        title: "70% Problem Recall Test"
        description: "Email your customers asking what problem you solve. If 70% don't answer the exact same way, you're losing money."
        value: "70% same answer"
        domains: ["messaging", "brand-strategy"]
        source: "SWS"

      - id: "HEUR-DM-010"
        title: "Failure Mention Ratio"
        description: "Lightly mention failure (overdo it = survival mechanism kicks in, they stop listening). You cannot overdo success mentions."
        value: "Light failure, unlimited success"
        domains: ["copywriting", "sales-psychology"]
        source: "SWS"

      - id: "HEUR-DM-011"
        title: "Three Problem Perspectives"
        description: "Always address problems from 3 perspectives: External (physical), Internal (feelings), Philosophical (should/ought). Each opens the story gap further."
        value: "3 perspectives always"
        domains: ["copywriting", "messaging", "storytelling"]
        source: "SWS"

      - id: "HEUR-DM-012"
        title: "Climactic Scene Timing"
        description: "In movies, the climactic scene is ~9 minutes before the end. In marketing, position the buy button as the climactic scene."
        value: "~9 minutes before end"
        domains: ["storytelling", "conversion"]
        source: "SWS"

      - id: "HEUR-DM-013"
        title: "Direct CTA Always"
        description: "Say 'Buy Now' not 'Learn More' or 'Get Started'. If it's weird at a cocktail party, it's weird on your website. Give them something to accept or reject."
        value: "Direct > Passive"
        domains: ["conversion", "web-design", "copywriting"]
        source: "SWS"

      - id: "HEUR-DM-014"
        title: "Weekly Email Minimum"
        description: "Email your list at least once per week, ideally twice. Even if they swipe-delete without reading, you're buying real estate in their brain."
        value: "1-2x per week minimum"
        domains: ["email-marketing", "nurture"]
        source: "SWS"

      - id: "HEUR-DM-015"
        title: "Cut It In Half Rule"
        description: "Whatever you wrote, cut the words in half. Remove the word 'very'. Make short, punctuated sentences easy to remember."
        value: "50% reduction"
        domains: ["copywriting", "editing"]
        source: "SWS"

      - id: "HEUR-DM-016"
        title: "One CTA Per Email"
        description: "Each email should have one clear, focused call to action. Don't scatter attention."
        value: "1 CTA per email"
        domains: ["email-marketing", "conversion"]
        source: "SWS"

      - id: "HEUR-DM-017"
        title: "Start With The Problem"
        description: "The very first thing out of your mouth should be the problem you solve. Your name doesn't matter until they know what problem you address."
        value: "Problem first, identity second"
        domains: ["sales", "presentations", "messaging"]
        source: "SWS"

      - id: "HEUR-DM-018"
        title: "Testimonial Resistance Override"
        description: "At least one testimonial should overcome the main resistance people have to buying. Write testimonials FOR customers (they aren't writers) and get approval."
        value: "1 resistance-breaking testimonial minimum"
        domains: ["social-proof", "conversion", "copywriting"]
        source: "SWS"

      - id: "HEUR-DM-019"
        title: "Cocktail Party Test"
        description: "Before using any language, ask: Would this work at a cocktail party? If it's weird there, it's weird on your website."
        value: "Pass cocktail party test"
        domains: ["messaging", "copywriting"]
        source: "SWS"

      - id: "HEUR-DM-020"
        title: "85% Nurture Conversion"
        description: "Up to 85% of customers who bought had already gone through the sale cycle and were in nurture email sequence. Without continued emails, company 85% smaller."
        value: "85% from nurture"
        domains: ["email-marketing", "sales-funnel"]
        source: "SWS"

      - id: "HEUR-DM-021"
        title: "PASTOR Sales Letter In One Afternoon"
        description: "Using the PASTOR framework, a money-making sales page can be cranked out in a single afternoon. Framework removes blank page anxiety."
        value: "1 afternoon"
        domains: ["copywriting", "productivity"]
        source: "SBMR"

      - id: "HEUR-DM-022"
        title: "24-Hour Cooling Period"
        description: "After writing a sales letter, let it sit for 24 hours. Come back and tighten it up. Get rid of as many words as possible."
        value: "24 hours"
        domains: ["copywriting", "editing"]
        source: "SBMR"

      - id: "HEUR-DM-023"
        title: "Bold Negative-Positive-Offer"
        description: "In sales letters, bold a little negative (problem), a little positive (solution), and always bold the offer. Visual highlighting guides the scanner's eye."
        value: "3 bold categories"
        domains: ["copywriting", "sales"]
        source: "SBMR"

      - id: "HEUR-DM-024"
        title: "Email Nurture Spacing"
        description: "Francis Jones/Infusionsoft: 4-5 emails over 10-15 days for nurture sequence. Then transition to sales campaign."
        value: "4-5 emails / 10-15 days"
        domains: ["email-marketing", "automation"]
        source: "SBMR"

      - id: "HEUR-DM-025"
        title: "Segment By Lead Generator"
        description: "Create different lead generators to automatically segment your audience. Each PDF attracts different buyer type. Different sequences for each."
        value: "1 PDF per segment"
        domains: ["lead-generation", "segmentation"]
        source: "SBMR"

      - id: "HEUR-DM-026"
        title: "Educational Email Best Time"
        description: "Francis Jones: educational content emails perform best sent between 8pm and midnight. People consume educational content in evening."
        value: "8pm-midnight"
        domains: ["email-marketing", "timing"]
        source: "SBMR"

      - id: "HEUR-DM-027"
        title: "Emails Must Feel From A Friend"
        description: "Keep emails simple, brief, conversational. They must feel like they're from a friend, not a company. Use singular voice, not corporate we-speak."
        value: "Friend tone, not corporate"
        domains: ["email-marketing", "copywriting"]
        source: "SBMR"

      - id: "HEUR-DM-028"
        title: "Lead Gen PDF Solves ONE Problem"
        description: "The best lead generators solve one specific problem. The brain files you under that problem. Too many topics = unfiled = forgotten."
        value: "1 problem per PDF"
        domains: ["lead-generation", "content-marketing"]
        source: "SBMR"

      - id: "HEUR-DM-029"
        title: "5 Types of Lead Gen PDFs"
        description: "Magazine Article (images + text), Interview (expert Q&A), Checklist (self-diagnosis), Value List (tips/keys), Free Samples (recipes/styles). All get great responses."
        value: "5 types"
        domains: ["lead-generation", "content-marketing"]
        source: "SBMR"

      - id: "HEUR-DM-030"
        title: "Clickbait Title Imperative"
        description: "Lead gen PDF title must be clickbait. Scan newspaper/magazine headlines for inspiration. '10 childhood celebrities and what they look like now' level irresistible."
        value: "Clickbait level"
        domains: ["lead-generation", "copywriting"]
        source: "SBMR"

      - id: "HEUR-DM-031"
        title: "Checklist Revenue Correlation"
        description: "In checklist PDFs, each pain point should correlate with a company revenue stream. Self-diagnosis leads directly to purchase decision."
        value: "Pain point = revenue stream"
        domains: ["lead-generation", "sales-funnel"]
        source: "SBMR"

      - id: "HEUR-DM-032"
        title: "Campaign Execution Order"
        description: "Execute in this exact order: (1) Wireframe website, (2) Create lead-gen PDF, (3) Build email nurture, (4) Write sales letter using PASTOR, (5) Sprinkle testimonials."
        value: "5-step sequence"
        domains: ["marketing", "campaign-strategy", "execution"]
        source: "SBMR"

      - id: "HEUR-DM-033"

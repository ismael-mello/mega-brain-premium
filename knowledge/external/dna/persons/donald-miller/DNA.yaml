  L4_FRAMEWORKS:
    count: 20
    items:
      - id: "FW-DM-001"
        title: "BrandScript Framework"
        description: "7-element story grid for business messaging: 1. Character (what customer wants), 2. Problem (External/Internal/Philosophical), 3. Guide (Empathy + Authority), 4. Plan (3 steps), 5. CTA (Direct + Transitional), 6. Success (what life looks like), 7. Failure (what's at stake)."
        domains: ["messaging", "brand-strategy", "storytelling", "copywriting"]
        source: "SWS"

      - id: "FW-DM-002"
        title: "One-Liner Formula"
        description: "Problem + Product + Result in one memorable statement. 3 parts: (1) State the problem people feel, (2) State your product/solution simply, (3) State the visual result. Then cut in half."
        domains: ["messaging", "elevator-pitch", "sales"]
        source: "SWS"

      - id: "FW-DM-003"
        title: "Landing Page Wireframe"
        description: "Sequential sections: Header (grunt test + value stack) → Stakes (failure/negatives) → Value Proposition (success benefits) → Guide (empathy + authority) → Price Choices → Plan (3 steps) → Explanatory Paragraph → Lead Generator Ad → Junk Drawer."
        domains: ["web-design", "conversion", "copywriting"]
        source: "SWS"

      - id: "FW-DM-004"
        title: "Sales Funnel Architecture"
        description: "5 pieces of collateral in sequence: (1) One-Liner, (2) Website/Landing Page, (3) Lead Generator, (4) Nurture Email Campaign, (5) Sales Email Campaign."
        domains: ["sales-funnel", "marketing", "automation"]
        source: "SWS"

      - id: "FW-DM-005"
        title: "BrandScript Script Template"
        description: "Mad-libs template: 'At [COMPANY] we know you want to be [CHARACTER WANT]. In order to do that, you need [NEED]. The problem is [PROBLEM] which makes you feel [INTERNAL]. We believe [PHILOSOPHICAL]...'"
        domains: ["copywriting", "messaging"]
        source: "SWS"

      - id: "FW-DM-006"
        title: "Email Campaign Types"
        description: "5 email types in sequence: (1) Asset Delivery, (2) Problem + Solution, (3) Testimonial, (4) Paradigm Shift, (5) Overcome Objection. Then transition to weekly nurture."
        domains: ["email-marketing", "sales-funnel", "copywriting"]
        source: "SWS"

      - id: "FW-DM-007"
        title: "Lead Generator Strategy"
        description: "5 types: Magazine Article, Interview, Checklist, Value List, Free Samples. PDF works as well as video but is cheaper. Title must solve a specific problem."
        domains: ["lead-generation", "content-marketing"]
        source: "SWS"

      - id: "FW-DM-008"
        title: "Website Grunt Test Framework"
        description: "3 questions in 5 seconds: (1) What do you offer? (2) How will it make my life better? (3) What do I need to do to buy it? Fail any = losing money."
        domains: ["web-design", "conversion"]
        source: "SWS"

      - id: "FW-DM-009"
        title: "Sales Letter Formula"
        description: "Structure: Subject → Character → Problem → Emotional/Philosophical Struggle → Brief Testimonial → Explain Offer → Plan (3 steps) → Value Stack → CTA → P.S. with urgency."
        domains: ["copywriting", "email-marketing", "sales"]
        source: "SWS"

      - id: "FW-DM-010"
        title: "Guide Positioning Formula"
        description: "Two elements only: (1) Empathy statement — I feel your pain, I understand your struggle. (2) Authority demonstration — We've helped X people solve this problem. That's it."
        domains: ["positioning", "brand-strategy"]
        source: "SWS"

      - id: "FW-DM-011"
        title: "Multi-Segment Lead Generator Strategy"
        description: "Create different lead magnets for different customer segments. Example: '5 mistakes with first million' (young), '5 tax loopholes' (mid), 'leave inheritance without messing up kids' (senior). Different sales sequences for each."
        domains: ["lead-generation", "segmentation", "sales-funnel"]
        source: "SWS"

      - id: "FW-DM-012"
        title: "4P Business Framework"
        description: "Product (in demand, profitable) → People (culture, team) → Processes (scale) → Positioning (4th P = key differentiator, the one most companies miss)."
        domains: ["business-strategy", "positioning"]
        source: "SWS"

      - id: "FW-DM-013"
        title: "PASTOR Framework"
        description: "Ray Edwards' sales letter framework: P (Person/Problem/Pain — start with their problem), A (Amplify — make it worse, set the hook), S (Story/Solution — begin relieving tension), T (Transformation/Testimony — climactic scene of resolution), O (Offer — specific deal with value), R (Response — direct CTA, tell them exactly what to do)."
        domains: ["copywriting", "sales", "email-marketing"]
        source: "SBMR"

      - id: "FW-DM-014"
        title: "7 Persuasion Principles Framework"
        description: "Ray Edwards' 7 principles for ethical selling: (1) It's about them not you, (2) Tell your story to connect, (3) Let them discover truth, (4) Use social proof, (5) Create scarcity, (6) Give first (reciprocity), (7) Demonstrate authority. Sells without sleaze."
        domains: ["sales-psychology", "persuasion", "copywriting"]
        source: "SBMR"

      - id: "FW-DM-015"
        title: "12-Email StoryBrand Campaign"
        description: "Complete email architecture: Email 1 (Covert Conversation - positive pain), 2 (Clear messaging example), 3 (Paradigm shift), 4 (Direct CTA - product available), 5 (Overcome objections), 6 (Free video taste), 7 (Entertaining - Hollywood connection), 8 (Plumber-to-Starbucks test), 9 (Testimonial), 10-12 (Last day urgency sequence)."
        domains: ["email-marketing", "campaign-strategy", "sales-funnel"]
        source: "SBMR"

      - id: "FW-DM-016"
        title: "Lead Generator Architecture"
        description: "5 types of lead gen content: (1) Magazine Article (images + short text), (2) Interview (expert Q&A), (3) Checklist (self-diagnosis), (4) Value List (tips/keys), (5) Free Samples (recipes/styles). Each creates reciprocity, establishes authority, solves specific problem."
        domains: ["lead-generation", "content-marketing"]
        source: "SBMR"

      - id: "FW-DM-017"
        title: "Testimonial Collection Framework"
        description: "Guide customers through storytelling: Ask about problem before working with you, what it felt like, what the experience was like, what results they got, and what they'd tell someone considering your product. Write it FOR them, get approval."
        domains: ["social-proof", "copywriting"]
        source: "SBMR"

      - id: "FW-DM-018"
        title: "15 Building Blocks of Sales Copy"
        description: "Workbook structure: (1) Subject line, (2) Opening hook, (3) Problem statement, (4) Agitation, (5) Story, (6) Solution intro, (7) Benefits, (8) Proof, (9) Offer, (10) Bonuses, (11) Scarcity, (12) Guarantee, (13) CTA, (14) P.S., (15) Urgency closer."
        domains: ["copywriting", "sales"]
        source: "SBMR"

      - id: "FW-DM-019"
        title: "Marketing Roadmap Execution Sequence"
        description: "6 core disciplines in order: (1) Create BrandScript, (2) Wireframe website, (3) Write email nurture campaign, (4) Write sales letter (PASTOR), (5) Create lead-gen PDF, (6) Gather testimonials. Then duplicate for each product."
        domains: ["marketing", "execution", "campaign-strategy"]
        source: "SBMR"

      - id: "FW-DM-020"
        title: "10-Section Website Architecture"
        description: "Complete website structure: (1) Header (grunt test + CTA), (2) Value Proposition (3+ benefits), (3) Plan (3 steps), (4) Testimonials, (5) Logos/authority, (6) Explanatory paragraph, (7) Video, (8) Cost/failure stakes, (9) Price choices, (10) Junk drawer (everything else at bottom)."
        domains: ["web-design", "conversion", "marketing"]
        source: "SBMR"

  L5_METHODOLOGIES:
    count: 14
    items:
      - id: "MET-DM-001"
        title: "BrandScript Creation Process"
        description: "Step-by-step: (1) Define one thing customer wants, (2) Identify external problem, (3) Identify internal feelings, (4) State philosophical injustice, (5) Write empathy statement, (6) Write authority statement, (7) Create 3-step plan, (8) Write direct CTA, (9) Write transitional CTA, (10) Define success vision, (11) Lightly state failure."
        domains: ["messaging", "brand-strategy"]
        source: "SWS"

      - id: "MET-DM-002"
        title: "One-Liner Creation Method"
        description: "3-phase: Phase 1 — State problem (make audience FEEL it, not intellectual). Phase 2 — State product (one sentence, no backstory). Phase 3 — State result (visual climactic scene). Then combine all three. Then CUT IN HALF. Memorize. Put on business card, email signature, wall, website."
        domains: ["messaging", "elevator-pitch"]
        source: "SWS"

      - id: "MET-DM-003"
        title: "Website Wireframe Method"
        description: "Fill out sequentially: (1) Header — pass grunt test, value stack, direct CTA. (2) Stakes — negatives, internal/philosophical problems. (3) Value Proposition — 3+ benefits. (4) Guide — empathy + authority. (5) Plan — 3 baby steps. (6) Explanatory paragraph — one-liner + brand script script. (7) Lead generator ad. (8) Junk drawer — everything else at bottom."
        domains: ["web-design", "conversion"]
        source: "SWS"

      - id: "MET-DM-004"
        title: "Email Nurture Campaign Method"
        description: "Build list via lead generator → Email weekly minimum (podcast, tip, recipe, behind-scenes) → If they open 3-4 nurtures in row, move to sales sequence → Sales email: pure sell from first sentence → P.S. always mentions product → Repeat cycle."
        domains: ["email-marketing", "sales-funnel"]
        source: "SWS"

      - id: "MET-DM-005"
        title: "Cocktail Party Test"
        description: "Before using any marketing language: (1) Imagine saying it at a cocktail party. (2) If it sounds weird → rewrite. (3) If person would zone out → too vague. (4) If person would engage → use it. (5) Apply to website, emails, ads, elevator pitch."
        domains: ["messaging", "quality-control"]
        source: "SWS"

      - id: "MET-DM-006"
        title: "Pink Highlighter Audit"
        description: "For launches: (1) Print landing page on paper. (2) Print every email in sequence. (3) Tape to wall. (4) Take pink highlighter. (5) Highlight every mention of customer's problems. (6) Visual scan — enough color on page? (7) If not enough pink → sprinkle more problem statements. (8) Much better launch."
        domains: ["copywriting", "launch-strategy", "quality-control"]
        source: "SWS"

      - id: "MET-DM-007"
        title: "Story-As-Guide Method"
        description: "When asked 'what's your story?': (1) 'A long time ago, I struggled with X' (empathy). (2) 'I developed a solution' (product). (3) 'I've now helped hundreds experience Y' (authority + result). They think you told your story. You told them empathy + authority. Bond created."
        domains: ["sales", "positioning", "personal-branding"]
        source: "SWS"

      - id: "MET-DM-008"
        title: "Red Sharpie Brand Audit"
        description: "Print marketing collateral → Take red sharpie → Circle every time you mention customer problems → Count circles per page → More circles = more sales → If too few → add problem statements → Especially check launch emails."
        domains: ["copywriting", "quality-control", "conversion"]
        source: "SWS"

      - id: "MET-DM-009"
        title: "PASTOR Sales Letter Writing Method"
        description: "Step-by-step: (1) Open Word doc, (2) Type P-A-S-T-O-R as bold headers, (3) Under P: write customer problem, (4) Under A: amplify — make it worse, describe consequences, (5) Under S: introduce solution, relieve tension, (6) Under T: tell one customer transformation story, (7) Under O: create specific offer with value, (8) Under R: direct CTA. Then remove headers — letter flows as narrative. Wait 24h. Tighten. Bold key phrases."
        domains: ["copywriting", "sales"]
        source: "SBMR"

      - id: "MET-DM-010"
        title: "Lead-Gen PDF Creation Method"
        description: "Steps: (1) Identify ONE specific problem customers have, (2) Choose PDF type (article/interview/checklist/list/samples), (3) Write clickbait title (scan headlines for inspiration), (4) Solve the problem with enormous value, (5) Establish authority throughout, (6) Keep it short but rich with images, (7) Include subtle CTAs, (8) Set up download gate (email capture). Result: qualified leads who feel indebted."
        domains: ["lead-generation", "content-marketing"]
        source: "SBMR"

      - id: "MET-DM-011"
        title: "Email Nurture Campaign Creation Method"
        description: "Steps: (1) Deliver lead gen asset (Email 1), (2) Present problem + solution (Email 2), (3) Share testimonial (Email 3), (4) Create paradigm shift (Email 4), (5) Overcome objections (Email 5), (6) Direct CTA to buy (Email 6). Space 2-3 days apart. If they open 3-4 nurtures consecutively, move to sales sequence. Hemingway voice: short words, short sentences, active language."
        domains: ["email-marketing", "automation", "sales-funnel"]
        source: "SBMR"

      - id: "MET-DM-012"
        title: "Campaign Execution Method"
        description: "Full roadmap: Phase 1 — BrandScript (clarify message). Phase 2 — Wireframe website (pass grunt test). Phase 3 — Create lead-gen PDF (capture emails). Phase 4 — Build email nurture (5-6 emails, 2-3 day spacing). Phase 5 — Write sales letter (PASTOR framework). Phase 6 — Gather testimonials. Then: tweak first campaign, create second campaign, duplicate process. Timeline: 3-6 months for full execution."
        domains: ["marketing", "campaign-strategy", "execution"]
        source: "SBMR"

      - id: "MET-DM-013"
        title: "Testimonial Collection Interview Method"
        description: "Steps: (1) Ask customer 'What problem did you have before working with us?', (2) 'How did that make you feel?', (3) 'What was the experience like working with us?', (4) 'What specific results did you get?', (5) 'What would you tell someone considering our product?'. Then: write the testimonial FOR them using their words. Send for approval. Place strategically — one should overcome main buying resistance."
        domains: ["social-proof", "copywriting"]
        source: "SBMR"

      - id: "MET-DM-014"
        title: "Copywriter Business Launch Method"
        description: "7 pillars from Resources module: (1) Master the BrandScript, (2) Learn to wireframe websites, (3) Write email campaigns, (4) Master PASTOR sales letters, (5) Create lead-gen PDFs, (6) Gather testimonials, (7) Package and sell your services. ROI proof: two certified copywriters made back $10,000 investment within one week using PASTOR alone."
        domains: ["career", "copywriting", "business-building"]
        source: "SBMR"

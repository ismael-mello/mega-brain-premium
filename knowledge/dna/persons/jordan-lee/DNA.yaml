          - name: "Recurring Revenue"
            description: "Receita recorrente"
          - name: "Proprietary AI/Tech"
            description: "Tecnologia proprietária"
          - name: "Low Founder Dependency"
            description: "Baixa dependência do fundador"

      - id: "JL-FW-004"
        title: "Naval's 3 Factors Framework"
        statement: "3 fatores que determinam qualidade de vida e sucesso."
        weight: 0.75
        chunk_ids: ["CJ001_001"]
        source_ids: ["CJ001"]
        application: "Decisões de lifestyle, otimização de ambiente"
        components:
          - name: "Onde você vive"
            example: "Dubai"
          - name: "O que faz"
            example: "AI"
          - name: "Com quem faz"
            example: "Grandes pessoas"

  # ==========================================================================
  # L5: METHODOLOGIES (3 items)
  # ==========================================================================
  L5_METHODOLOGIES:
    count: 3
    items:

      - id: "JL-MET-001"
        title: "Talent Acquisition VSL Method"
        statement: "Tratamento de job ads como Video Sales Letters para atrair top talent."
        weight: 0.85
        chunk_ids: ["CJ001_004", "CJ001_005"]
        source_ids: ["CJ001"]
        application: "Recrutamento, atração de talentos"
        resources: "Dois recruiters internos + plataformas AI"
        steps:
          - step: 1
            name: "Criar VSL Job Ad"
            description: "Job ad deve vender o sonho, mostrar a visão"
            success_criteria: "Candidato quer a visão, não só o salário"
          - step: 2
            name: "Título Aspiracional"
            description: "Postar 'Sales Director' para atrair Sales Managers que querem subir"
            success_criteria: "Atrai candidatos ambiciosos, não apenas matching"
          - step: 3
            name: "Negociação por Valor"
            description: "Negociar salário baseado em valor entregue"
            success_criteria: "Alinhamento de expectativas com resultados"
          - step: 4
            name: "Onboarding com Visão"
            description: "Talento compra visão, não só salário"
            success_criteria: "Retenção de A-players"

      - id: "JL-MET-002"
        title: "AI Sales Call Analyzer Implementation"
        statement: "Sistema de análise de calls usando AI para coaching em escala."
        quote: "É como ter um mentor pessoal para cada closer."
        weight: 0.90
        chunk_ids: ["CJ001_016"]
        source_ids: ["CJ001"]
        application: "QC de vendas, coaching em escala"
        result: "Passou de 2 calls/week para EVERY single call reviewed"
        steps:
          - step: 1
            name: "Integrar com Slack"
            description: "Conectar analyzer ao canal de comunicação do time"
          - step: 2
            name: "Rastrear Compliance"
            description: "Verificar aderência ao script"
          - step: 3
            name: "Analisar Tonalidade"
            description: "Avaliar tom de voz e energia"
          - step: 4
            name: "Cross-reference Training"
            description: "Comparar com centenas de vídeos de treinamento"
          - step: 5
            name: "Feedback Personalizado"
            description: "Gerar feedback automático e específico"

      - id: "JL-MET-003"
        title: "Sales Team Structure"
        statement: "Estrutura organizacional para time de vendas high-ticket em escala."
        weight: 0.85
        chunk_ids: ["CJ001_010"]
        source_ids: ["CJ001"]
        application: "Estruturação de time de vendas"
        capacity: "300 calls/dia com 70 closers"
        steps:
          - step: 1
            name: "Closers (70)"
            description: "Base do time, executam as vendas"
          - step: 2
            name: "Team Leads"
            description: "Com overrides sobre performance"
          - step: 3
            name: "RevOps"
            description: "Booking, calendars, CRM, follow-up, payment links"
          - step: 4
            name: "Sales Coach"
            description: "Assiste calls e dá feedback"


    count: 4
    items:

      - id: "JL-FW-001"
        title: "People-Process-Management Framework"
        statement: "Todo problema de negócio cai em uma dessas três categorias. Diagnostique ANTES de agir."
        weight: 0.95
        chunk_ids: ["CJ001_011"]
        source_ids: ["CJ001"]
        application: "Diagnóstico de problemas operacionais"
        usage_rule: "Diagnostique primeiro. Não assuma."
        components:
          - name: "PEOPLE"

      - id: "JL-FW-003"
        title: "Enterprise Value Framework"
        statement: "6 fatores que determinam o valor de empresa para venda/investimento."
        weight: 0.90
        chunk_ids: ["CJ001_013"]
        source_ids: ["CJ001"]
        application: "Preparação para exit, decisões de product-market"
        example: "Wiz: 5 anos, vendida por $32B = $16M/dia de enterprise value"
        components:
          - name: "High Growth"
            description: "Crescimento de revenue"
          - name: "Profitability Model"
            description: "Para reinvestir, não lifestyle"
          - name: "Scalability"

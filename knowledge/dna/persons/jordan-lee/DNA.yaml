            solution: "Accountability + feedback"

      - id: "JL-FW-002"
        title: "Do-Document-Delegate Framework"
        statement: "Como escalar qualquer processo de forma sustentável."
        weight: 0.90
        chunk_ids: ["CJ001_004"]
        source_ids: ["CJ001"]
        application: "Escalabilidade, delegação, sistemas"
        components:
          - name: "DO"

# Sintese narrativa
sintese_narrativa: |
  Jordan Lee é fundador da AI Acquisition, uma empresa que escala de zero a $4-6M/mês
  em cerca de 3 anos, bootstrapped. Sua filosofia central gira em torno de COMPETÊNCIA
  sobre EXPERIÊNCIA, priorizando jovens com alto potencial de crescimento.

  Seu framework diagnóstico People-Process-Management é usado para categorizar qualquer
  problema de negócio antes de agir. A metodologia Do-Document-Delegate é aplicada para
  escalar processos sem perder qualidade.

  Destaca-se pelo uso intensivo de AI (substituindo SDRs e PMs, AI Sales Call Analyzer
  para QC) e pela cultura de alta performance onde apenas quem bate meta participa de
  eventos e benefícios especiais.


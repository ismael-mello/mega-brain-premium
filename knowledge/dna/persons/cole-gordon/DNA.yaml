        quote: "Rep development: Max 1-2 focus areas per week - more than that, nothing sticks"
        weight: 0.85
        chunk_ids: ["BATCH-007_003"]
        source_ids: ["BATCH-007"]
        domains: ["training", "coaching", "development"]

      - id: "CG-HEUR-021"
        title: "Sizzle Pitch 30-60 Seconds"
        rule: "Sizzle pitch deve durar 30-60 segundos. Mais longo perde atenção, mais curto não gera interesse."
        threshold: {value_min: 30, value_max: 60, operator: "range", unit: "seconds"}
        quote: "Sizzle pitch duration: 30-60 seconds optimal"
        weight: 0.85
        chunk_ids: ["BATCH-008_001"]
        source_ids: ["BATCH-008"]
        domains: ["pitch", "timing", "engagement"]

      - id: "CG-HEUR-022"
        title: "Max 3-4 Pitch Pillars"
        rule: "Máximo de 3-4 pilares no pitch. Mais que isso, prospect não consegue lembrar."
        threshold: {value_min: 3, value_max: 4, operator: "range", unit: "pillars"}
        quote: "Max 3-4 pillars in pitch - more and prospect can't remember"
        weight: 0.85
        chunk_ids: ["BATCH-008_002"]
        source_ids: ["BATCH-008"]
        domains: ["pitch", "structure", "memory"]

      # --- TEXTUAL HEURISTICS ---

      - id: "CG-HEUR-008"
        title: "Isolate 'Need to Think'"
        rule: "Se prospect diz 'preciso pensar', isolar primeiro: 'Além disso, você 100% sente que isso é o que precisa?'"
        quote: "'I Want to Think About It': 1. Diffuse: 'No problem' 2. Isolate: 'Aside from that, do you 100% feel this is what you need?'"
        weight: 0.85
        chunk_ids: ["CG002_007"]
        source_ids: ["CG002"]
        domains: ["objection-handling", "closing"]
        recommended_action: "1) Diffuse 2) Isolate 3) Se vago, força específico 4) Se 'sleep on it', 24h follow-up"

      - id: "CG-HEUR-009"
        title: "Research Objection = Missed Belief"
        rule: "Se prospect diz 'preciso fazer research', significa que você errou antes. Perguntar o que falta para 100% certeza."
        quote: "'I Need to Do Research': Usually means you messed up earlier."
        weight: 0.80
        chunk_ids: ["CG002_008"]
        source_ids: ["CG002"]
        domains: ["objection-handling", "trust"]

      - id: "CG-HEUR-010"
        title: "Feed the Nervous Label"
        rule: "Se prospect diz 'estou nervoso', feed the label: 'GOOD. Nervos estão aí por uma razão.' Pattern interrupt."
        quote: "'I'm Just Nervous': 1. Feed the label 2. Pattern interrupt: 'GOOD. Nerves are there for a reason.'"
        weight: 0.75
        chunk_ids: ["CG002_009"]
        source_ids: ["CG002"]
        domains: ["objection-handling", "emotion"]

      - id: "CG-HEUR-011"
        title: "3 Financial Data Points"
        rule: "Para objeção financeira, coletar 3 Data Points: Net income próximos 30 dias, Cash on hand, Acesso a crédito."
        quote: "Financial (3 Data Points Method): Net income next 30 days, Cash on hand, Credit access"
        weight: 0.85
        chunk_ids: ["CG002_010"]
        source_ids: ["CG002"]
        domains: ["objection-handling", "financial", "payment"]
        recommended_action: "1) 'Money aside, você 100% quer isso?' 2) Coletar 3 data points 3) Só depois oferecer payment plan"

      - id: "CG-HEUR-012"
        title: "Reciprocity on Terms"
        rule: "Sempre pedir algo em retorno por melhores terms. Nunca dar desconto/parcelamento sem reciprocidade."
        quote: "Rule: Always ask for something in return for better terms"

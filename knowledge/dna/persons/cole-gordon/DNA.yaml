          - {name: "5. Personalized Emails", description: "Nome + detalhe da application"}
          - {name: "6. Double Booking", description: "1.5-2x capacity"}
          - {name: "7. Re-bookings", description: "Auto-reschedule no-shows"}

      - id: "CG-FW-006"

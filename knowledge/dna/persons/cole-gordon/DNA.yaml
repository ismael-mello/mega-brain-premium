        domains: ["team-structure", "management", "scaling"]
        usage_context: "Decidindo quando contratar Sales Manager"
        recommended_action: "Contratar Sales Manager quando tiver 6+ closers; não passar de 10 por manager"

      - id: "CG-HEUR-004"
        title: "3 Offers Per Day Minimum"
        rule: "3 OFFERS por closer por dia (não calls, OFFERS). Métrica de produtividade real."
        threshold: {value: 3, operator: ">=", unit: "offers/day"}

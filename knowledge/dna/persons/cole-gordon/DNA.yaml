          - {name: "Process Compliance", description: "How specifically following TalkTrack"}
          - {name: "FTC Compliance", description: "Regulatory adherence"}
          - {name: "Product Knowledge", description: "Offer-specific mastery"}

      - id: "CG-FW-012"

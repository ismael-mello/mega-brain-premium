  # ==========================================================================
  # L5: METHODOLOGIES (10 items)
  # ==========================================================================
  L5_METHODOLOGIES:
    count: 10
    items:

      - id: "CG-MET-001"
        title: "Double Tie Down Technique"
        statement: "Check-in duplo durante pitch para manter prospect engajado e identificar objeções early."
        quote: "Double Tie Down: 'Does that make sense?' + 'What are your thoughts on that?' Check-in every ~45 seconds"
        weight: 0.90
        chunk_ids: ["CG002_015"]
        source_ids: ["CG002"]
        domains: ["pitch", "engagement", "dialogue"]
        steps:
          - {order: 1, action: "Apresentar um pillar ou conceito (max 45 segundos)"}
          - {order: 2, action: "Pergunta 1: 'Does that make sense?'"}
          - {order: 3, action: "Pergunta 2: 'What are your thoughts on that?'"}
          - {order: 4, action: "Se positivo, continuar. Se objeção, resolver antes de prosseguir"}
        success_indicators: ["Prospect engajado e respondendo", "Objeções identificadas em tempo real"]
        common_mistakes: ["Falar por muito tempo sem check-in", "Fazer apenas uma pergunta"]

      - id: "CG-MET-002"
        title: "3 Data Points Method for Financial Objections"
        statement: "Processo para lidar com objeções de dinheiro/preço coletando dados reais."
        quote: "Financial (3 Data Points Method): 1. 'Money aside...' 2. Net income 3. Cash on hand 4. Credit access"
        weight: 0.90
        chunk_ids: ["CG002_016"]
        source_ids: ["CG002"]
        domains: ["objection-handling", "financial", "negotiation"]
        steps:
          - {order: 1, action: "Isolar dinheiro: 'Money aside, do you 100% want this?'"}
          - {order: 2, action: "Coletar Data Point 1: Net income próximos 30 dias"}
          - {order: 3, action: "Coletar Data Point 2: Cash on hand"}
          - {order: 4, action: "Coletar Data Point 3: Credit access"}
          - {order: 5, action: "APENAS após coletar os 3, oferecer payment plan"}
          - {order: 6, action: "Pedir algo em retorno por melhores terms"}
        common_mistakes: ["Oferecer desconto sem isolar primeiro", "Não coletar os 3 data points"]

      - id: "CG-MET-003"
        title: "Daily Routine for High-Performance Closer"
        statement: "Rotina diária estruturada para closers de alta performance."
        quote: "Daily Routines: Morning (90 min - 3h before calls)... During the Day (9am-5pm)... Evening (after 5pm)"
        weight: 0.80
        chunk_ids: ["CG001_012"]
        source_ids: ["CG001"]
        domains: ["routine", "performance", "habits"]
        steps:
          - {order: 1, action: "MANHÃ: Ler 20-30 min"}
          - {order: 2, action: "MANHÃ: Treinar + ouvir 1-2 melhores calls (wins)"}
          - {order: 3, action: "MANHÃ: Podcast/curso para desenvolvimento"}
          - {order: 4, action: "MANHÃ: Breathwork + meditação"}
          - {order: 5, action: "MANHÃ: Checar projections + calendário"}
          - {order: 6, action: "DIA (9am-5pm): Ou gerando calls OU fazendo calls"}
          - {order: 7, action: "DIA: No-shows → atividade de outbound/follow-up"}
          - {order: 8, action: "DIA: 30-min almoço, dois breaks de 10-min max"}
          - {order: 9, action: "NOITE: Batch CRM updates, notas"}
          - {order: 10, action: "NOITE: Hot list follow-ups"}
          - {order: 11, action: "NOITE: Report/journal de fim de dia"}
          - {order: 12, action: "NOITE: Rate yourself em 3 áreas chave"}
          - {order: 13, action: "NOITE: Horário consistente de dormir (7.5-8.5 horas)"}

      - id: "CG-MET-004"
        title: "Transition Avoiding Anvil Drop"
        statement: "Processo para transicionar suavemente do discovery para o pitch sem parecer vendedor."
        quote: "FASE 3: TRANSITION - EVITAR Anvil Drop. Fazer prospect PEDIR para ouvir o pitch"
        weight: 0.85
        chunk_ids: ["CG002_017"]
        source_ids: ["CG002"]
        domains: ["sales-process", "transition", "permission"]
        steps:
          - {order: 1, action: "Completar Discovery com todas as 6 Beliefs instaladas"}
          - {order: 2, action: "Pergunta: 'Based on what you've shared, I think I can help. Would you like to hear how?'"}
          - {order: 3, action: "Prospect deve PEDIR para ouvir, não você oferecendo"}
          - {order: 4, action: "Iniciar Pitch com permissão concedida"}
        common_mistakes: ["Anvil Drop: Saltar direto para pitch", "Mudar tom de curioso para vendedor"]

      - id: "CG-MET-005"
        title: "Secret Shopping System"
        statement: "Sistema para ver comportamento real dos closers quando não supervisionados."
        quote: "Secret shopping is the most effective behavioral reform ever seen with closing teams"
        weight: 0.90
        chunk_ids: ["BATCH-005_001"]
        source_ids: ["BATCH-005"]
        domains: ["management", "quality-control", "accountability"]
        steps:
          - {order: 1, action: "Comprar burner phones ($30 Total by Verizon) e SIM ($30/mês)"}
          - {order: 2, action: "Criar emails falsos e personas"}
          - {order: 3, action: "Submeter como lead no funil real"}
          - {order: 4, action: "Fazer a call como prospect comum"}
          - {order: 5, action: "Documentar tudo: pitch, rapport, objections, follow-up"}
          - {order: 6, action: "Name and shame na frente do time"}
        success_indicators: ["Comportamento melhora imediatamente após reveal", "Qualidade sobe mesmo sem supervisão"]

      - id: "CG-MET-006"
        title: "Priority Buckets Closer Ranking"
        statement: "Sistema de priorização de closers baseado em performance week-over-week."
        quote: "Week-over-week priority system: Level 1 prioritized, Level 4 off inbound"
        weight: 0.85
        chunk_ids: ["BATCH-005_002"]
        source_ids: ["BATCH-005"]
        domains: ["team-management", "incentives", "performance"]
        steps:
          - {order: 1, action: "Classificar closers em 4 níveis baseado em stats"}
          - {order: 2, action: "Level 1 (Top): Prioridade no calendário"}
          - {order: 3, action: "Level 2: No scheduler mas não priorizado"}
          - {order: 4, action: "Level 3: Só inbound leads (Hydra)"}
          - {order: 5, action: "Level 4 (Bottom): Fora do inbound, só pipeline existente"}
          - {order: 6, action: "Ajustar semanalmente baseado em métricas"}

      - id: "CG-MET-007"
        title: "Talk Track Building Process"
        statement: "Processo para criar talk track ao invés de script rígido."
        quote: "Talk Track vs Script: Talk track is flexible framework, script is word-for-word"
        weight: 0.85
        chunk_ids: ["BATCH-008_001"]
        source_ids: ["BATCH-008"]
        domains: ["training", "scripting", "flexibility"]
        steps:

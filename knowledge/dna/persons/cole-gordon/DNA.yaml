          - {name: "Bucket 3: Expected Close Date Past Due", description: "Revenue leakage #1"}
          - {name: "Bucket 4: Qualified Not Closed", description: "Pipeline tracking"}
          - {name: "Bucket 5: Neglected Deals", description: "Days without engagement"}
          - {name: "Bucket 6: Lost Deals Previously Forecasted", description: "Gotcha bucket"}
          - {name: "Bucket 7: Lost Deals Low Attempts", description: "Accountability bucket"}
          - {name: "Reopen Bucket", description: "Assign to competitive reps as spiff"}

      - id: "CG-FW-011"
        title: "Four-Scorecard System"

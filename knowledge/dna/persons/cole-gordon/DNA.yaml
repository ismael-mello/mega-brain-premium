person:
  name: "Cole Gordon"
  empresa: "Closers.io"
  source: "7 Beliefs Framework, Call Flow Structure, Show Rate Optimization, Team Scaling, Courses, Marketing, Masterminds, Podcasts"
  modules_processed: 8
  total_chunks: 373
  sintese: |
    Cole Gordon pensa em termos de PREVENÇÃO, não tratamento. Enquanto a maioria
    dos closers foca em lidar com objeções, ele foca em fazer com que objeções
    nunca apareçam. A chave são as 7 Beliefs que todo prospect precisa ter para
    comprar - 6 instaladas no Discovery, 1 no Pitch. Sua abordagem é fortemente
    influenciada por Cialdini - especialmente o Consistency Bias. Se o prospect
    DIZ EM VOZ ALTA que acredita algo, ele vai agir de forma consistente. É contra
    pressão externa (descontos, urgência artificial) e a favor de pressão interna
    (prospect reconhecer que precisa mudar). Isso cria vendas que não cancelam.

layers:

  # ==========================================================================
  # L1: PHILOSOPHIES (12 items)
  # ==========================================================================
  L1_PHILOSOPHIES:
    count: 12
    items:

      - id: "CG-FIL-001"
        title: "Philosophy Over Tactics"
        statement: "Filosofia supera táticas. Se você tem os mental models corretos, scripts e técnicas vêm naturalmente."
        quote: "If you have the right philosophy, the tactics and scripts come naturally."
        weight: 0.95
        chunk_ids: ["CG001_001"]
        source_ids: ["CG001"]
        domains: ["sales-philosophy", "training", "mastery"]
        implications:
          - "Investir mais tempo em entender PORQUE algo funciona"
          - "Scripts são training wheels - usar no início, abandonar depois"
          - "Flexibilidade comportamental baseada em princípios"
          - "Mestres improvisam; novatos seguem roteiro"

      - id: "CG-FIL-002"
        title: "Objections Are Symptoms"
        statement: "Objeções são sintomas, não causas. Se você está tratando objeção no final da call, já perdeu."
        quote: "Objection prevention is upstream, objection handling is downstream."
        weight: 0.95
        chunk_ids: ["CG001_002"]
        source_ids: ["CG001"]
        domains: ["objection-handling", "discovery", "root-cause"]
        implications:
          - "Prevenção upstream é mais efetiva que handling downstream"
          - "Objeção mapeada a uma das 7 Beliefs = belief não instalada"
          - "Discovery bem feito elimina 80% das objeções"
          - "Nunca tratar sintoma - buscar causa raiz"

      - id: "CG-FIL-003"
        title: "Internal Over External Pressure"
        statement: "Internal pressure > external pressure. A decisão deve vir de razões internas do prospect, não coerção externa."
        quote: "Fast action discounts are training wheels. They diminish respect from affluent prospects."
        weight: 0.90
        chunk_ids: ["CG001_003"]
        source_ids: ["CG001"]
        domains: ["pricing", "urgency", "client-quality"]
        implications:
          - "Fast action discounts diminuem respeito de prospects affluent"
          - "Urgência artificial atrai clientes que cancelam"
          - "Pressão interna cria vendas que não cancelam"
          - "Perguntas que fazem prospect reconhecer necessidade de mudar"

      - id: "CG-FIL-004"
        title: "Conviction Beats Skill"
        statement: "Conviction beats tactical skill every time. Sua convicção precisa superar a dúvida do prospect."
        quote: "Conviction beats tactical skill every time. Your conviction needs to overcome their doubt."
        weight: 0.90
        chunk_ids: ["CG001_004"]
        source_ids: ["CG001"]
        domains: ["inner-game", "conviction", "mindset"]
        implications:
          - "Vender algo que você é naturalmente drawn to"
          - "Estudar produto, clientes, testemunhos constantemente"
          - "Manter Say/Do Ratio = 1:1"
          - "Colecionar folder de 'thank you for enrolling me'"

      - id: "CG-FIL-005"
        title: "Trust Built in Discovery"
        statement: "Trust é construída no Discovery, não no rapport. Rapport só serve para mostrar que você é normal."
        quote: "Trust is NOT built in rapport. Rapport is just to show you're a normal human being. TRUST is built in Discovery."
        weight: 0.85
        chunk_ids: ["CG001_005"]
        source_ids: ["CG001"]
        domains: ["rapport", "trust", "discovery"]
        implications:
          - "Não perder tempo excessivo em small talk"
          - "Discovery profundo demonstra entendimento do problema"
          - "Se descrever problema melhor que prospect, ele assume solução"
          - "Rapport overdone é armadilha comum"

      - id: "CG-FIL-006"
        title: "Different Is Better Than Better"
        statement: "'Different is better than better.' Posicionamento por diferenciação supera competição direta."
        quote: "Different is better than better - positioning principle from Ron"
        weight: 0.90
        chunk_ids: ["BATCH-005_001"]
        source_ids: ["BATCH-005"]
        domains: ["positioning", "strategy", "branding"]
        implications:
          - "Encontrar ângulo único ao invés de ser 'melhor' no mesmo"
          - "Evitar comparações diretas com concorrentes"
          - "Criar categoria própria quando possível"
          - "Diferenciação permite premium pricing"

      - id: "CG-FIL-007"
        title: "Never Trust Closers' Words"
        statement: "Nunca acredite no que closer diz - acredite apenas se as estatísticas são altas."
        quote: "Never take a closer at their word unless statistics are high. Closers will lie about how things are going - ALL THE TIME"
        weight: 0.90
        chunk_ids: ["BATCH-005_002"]
        source_ids: ["BATCH-005"]
        domains: ["management", "leadership", "trust-but-verify"]
        implications:
          - "Closers vão mentir sobre como as coisas estão indo - ALWAYS"
          - "Confiar em dados, não em palavras"
          - "Sistema de métricas e accountability é obrigatório"
          - "Secret shopping para verificar comportamento real"

      - id: "CG-FIL-008"
        title: "Data-Driven Behavioral Reform"
        statement: "Vendedores reformam comportamento quando mostrados dados inarguáveis."
        quote: "Salespeople reform behavior when shown inarguable data"
        weight: 0.85
        chunk_ids: ["BATCH-005_003"]
        source_ids: ["BATCH-005"]
        domains: ["coaching", "behavior-change", "feedback"]
        implications:
          - "Feedback abstrato não funciona"
          - "Gravar calls e mostrar evidências concretas"
          - "Secret shopping gera dados que não tem como negar"
          - "Confrontar com fatos, não opiniões"

      - id: "CG-FIL-009"
        title: "Secret Shopping Supreme"
        statement: "Secret shopping é a reforma comportamental mais efetiva já vista em times de closers."
        quote: "Secret shopping is better than video courses, better than handheld training - most effective behavioral reform ever seen"
        weight: 0.85
        chunk_ids: ["BATCH-005_004"]
        source_ids: ["BATCH-005"]
        domains: ["management", "quality-control", "culture"]
        implications:
          - "Melhor que video courses"
          - "Melhor que handheld training"
          - "Melhor que 1:1s tradicionais"
          - "Closers sabendo que PODEM ser testados muda comportamento"

      - id: "CG-FIL-010"
        title: "Name and Shame Accountability"
        statement: "Name and shame na frente do time é accountability real. Como arremesso livre no basquete."
        quote: "Name and shame in front of the team - free throw analogy for individual accountability"
        weight: 0.80
        chunk_ids: ["BATCH-005_005"]
        source_ids: ["BATCH-005"]
        domains: ["accountability", "team-management", "culture"]
        implications:
          - "Accountability individual em público"
          - "Consequências visíveis para todos"
          - "Cria pressão social positiva"
          - "Closers não querem ser expostos"

      - id: "CG-FIL-011"
        title: "Rapport Before SPIN"
        statement: "Warmup/Rapport ANTES de SPIN - nunca pule. É o prerequisito."
        quote: "Warmup/Rapport BEFORE SPIN - never skip. Critical prerequisite"
        weight: 0.85
        chunk_ids: ["BATCH-005_006"]
        source_ids: ["BATCH-005"]
        domains: ["sales-process", "discovery", "sequencing"]
        implications:
          - "SPIN sem rapport causa resistência"
          - "Prospect precisa se sentir confortável antes de revelar problemas"
          - "Ordem importa: Rapport → SPIN → Solution"
          - "Pular etapas custa vendas"

      - id: "CG-FIL-012"
        title: "Mehrabian Communication Principle"
        statement: "7% palavras, 38% tonalidade, 55% linguagem corporal. Mehrabian muda tudo sobre como vender."
        quote: "7-38-55 Principle (Dr. Albert Mehrabian): 7% Words, 38% Tonality, 55% Body language"
        weight: 0.90
        chunk_ids: ["BATCH-005_007"]
        source_ids: ["BATCH-005"]
        domains: ["communication", "tonality", "body-language"]
        implications:
          - "Treinamento de tonalidade é mais importante que scripts"
          - "Vídeo > phone para high-ticket"
          - "O QUE você diz importa menos que COMO você diz"
          - "Postura e expressões impactam resultado"

  # ==========================================================================
  # L2: MENTAL MODELS (10 items)
  # ==========================================================================
  L2_MENTAL_MODELS:
    count: 10
    items:

      - id: "CG-MM-001"
        title: "7 Beliefs as Objection Map"
        statement: "Qualquer objeção pode ser mapeada para uma das 7 beliefs. Se prospect objeta, uma belief não foi instalada."
        quote: "Every objection maps to one of the 7 beliefs. If they object, you missed installing one."
        weight: 0.95
        chunk_ids: ["CG001_006"]
        source_ids: ["CG001"]
        domains: ["objection-mapping", "diagnostics", "discovery"]
        when_to_apply: "Analisando porque prospect não fechou ou qual belief falta"
        how_to_use: |
          1. Prospect apresenta objeção
          2. Mapear para qual das 7 Beliefs:
             PAIN, DOUBT, COST, DESIRE, MONEY, SUPPORT, TRUST
          3. Voltar e instalar belief faltante
          4. Se estruturou corretamente, objeção desaparece
        related_to: ["CG-FIL-002"]

      - id: "CG-MM-002"
        title: "Buying Pocket Spectrum"
        statement: "Prospect está em algum lugar entre 'impossível para mim' e 'posso fazer sozinho'. Seu trabalho é movê-lo para o meio."
        quote: "Adjust approach based on where prospect is on the spectrum between 'impossible' and 'can do it myself'."
        weight: 0.85
        chunk_ids: ["CG002_003"]
        source_ids: ["CG002"]
        domains: ["prospect-assessment", "calibration", "pitch-adjustment"]
        when_to_apply: "Ajustando abordagem baseado na posição do prospect"
        how_to_use: |
          IMPOSSÍVEL <-----> BUYING POCKET <-----> FAZ SOZINHO
          Se "impossível" → usar PROOF (cases, stats, testimonials)
          Se "faz sozinho" → usar SKILL QUESTIONS + REFRAMES
          Zona ideal: "É possível, mas preciso de ajuda"

      - id: "CG-MM-003"
        title: "Hell Island vs Heaven Island"
        statement: "Criar clareza extrema entre futuro sem mudança (Hell) e futuro com mudança (Heaven). Quanto mais clareza, mais tensão interna."
        quote: "The more CLARITY on the difference between Hell Island and Heaven Island, the more internal TENSION."
        weight: 0.90
        chunk_ids: ["CG002_004"]
        source_ids: ["CG002"]
        domains: ["discovery", "emotional-leverage", "future-pacing"]
        when_to_apply: "Discovery para criar leverage emocional sem manipulação"
        how_to_use: |
          1. Hell Island: "O que acontece em 1, 3, 5, 10 anos se nada mudar?"
          2. Heaven Island: "Se resolver isso, como seria sua vida?"
          3. Contraste: Quanto maior a diferença, maior a tensão interna
        related_to: ["CG-FIL-003"]

      - id: "CG-MM-004"
        title: "Consistency Bias as Sales Engine"
        statement: "Se prospect DIZ EM VOZ ALTA que acredita algo, ele vai agir de forma consistente com isso. Perguntas são mais poderosas que afirmações."
        quote: "The Consistency Bias (Cialdini) is the most powerful in sales. If the prospect SAYS OUT LOUD that they believe something, they will act consistently."
        weight: 0.90
        chunk_ids: ["CG001_007"]
        source_ids: ["CG001"]
        domains: ["persuasion", "psychology", "questions"]
        when_to_apply: "Desenhando perguntas de discovery e pitch"
        how_to_use: |
          ERRADO: Você afirmar "Nosso produto é o melhor"
          CERTO: Prospect afirmar via resposta a pergunta
          "O que acontece se nada mudar nos próximos 12 meses?"
          Agora prospect se comprometeu verbalmente com necessidade de mudar.

      - id: "CG-MM-005"
        title: "Resolve vs Pumped Up Energy"
        statement: "Estado ideal de venda não é energia hype mas calm sense of certainty. Como se já estivesse feito."
        quote: "Resolve is not pumped up energy. It's a calm sense of certainty, as if it's already done."
        weight: 0.80
        chunk_ids: ["CG001_008"]
        source_ids: ["CG001"]
        domains: ["inner-game", "state-management", "mindset"]
        when_to_apply: "Gerenciando estado interno antes e durante calls"
        how_to_use: |
          EVITAR (Pumped Up): Tony Robbins "yes yes yes", energia hype
          BUSCAR (Resolve): Calm sense of certainty, flow state, "as if it's already done"
        related_to: ["CG-FIL-004"]

      - id: "CG-MM-006"
        title: "Free Throw Analogy"
        statement: "Accountability individual na frente do time, como arremesso livre no basquete. Todos veem se você acerta ou erra."
        quote: "Free Throw Analogy - individual accountability in front of team (basketball → sales)"
        weight: 0.80
        chunk_ids: ["BATCH-005_001"]
        source_ids: ["BATCH-005"]
        domains: ["accountability", "team-culture", "management"]
        when_to_apply: "Criando cultura de accountability em times de vendas"

      - id: "CG-MM-007"
        title: "Farmer vs Hunter"
        statement: "Closers precisam de ambas skills, não apenas caça. Cultivar pipeline é tão importante quanto fechar."
        quote: "Farmer vs Hunter - closers need both skills, not just hunting"
        weight: 0.80
        chunk_ids: ["BATCH-005_002"]
        source_ids: ["BATCH-005"]
        domains: ["closer-development", "pipeline", "skills"]
        when_to_apply: "Desenvolvendo closers completos"
        how_to_use: |
          IDEAL: 60% Hunter (closing skills) + 40% Farmer (pipeline cultivation)

      - id: "CG-MM-008"
        title: "Unsupervised Behavior"
        statement: "Performance verdadeira só é visível quando ninguém está olhando. Por isso secret shopping funciona."
        quote: "True performance only visible when nobody's watching - unsupervised behavior reveals truth"
        weight: 0.85
        chunk_ids: ["BATCH-005_003"]
        source_ids: ["BATCH-005"]
        domains: ["management", "performance", "truth"]
        when_to_apply: "Avaliando performance real de vendedores"

      - id: "CG-MM-009"
        title: "Interest Level Scale (5 Stages)"
        statement: "Escala de 5 níveis de interesse do lead, do curioso ao comprador. Cada nível requer abordagem diferente."
        quote: "Interest Level Scale: 5 stages from curious to buying - each requires different approach"
        weight: 0.85
        chunk_ids: ["BATCH006_001"]
        source_ids: ["BATCH-006"]
        domains: ["qualification", "sales-process", "lead-scoring"]
        when_to_apply: "Qualificando leads e ajustando abordagem"
        how_to_use: |
          1. CURIOUS → Educar, não vender
          2. INTERESTED → Aprofundar discovery
          3. CONSIDERING → Diferenciar, resolver objeções
          4. DECIDING → Fechar, criar urgência interna
          5. BUYING → Facilitar processo

      - id: "CG-MM-010"
        title: "VAK System (NLP)"
        statement: "Pessoas processam informação de 3 formas: Visual, Auditivo, Cinestésico. Adaptar comunicação ao estilo."
        quote: "VAK System (NLP): Visual, Auditory, Kinesthetic - adapt communication to prospect's processing style"
        weight: 0.85
        chunk_ids: ["BATCH006_002"]
        source_ids: ["BATCH-006"]
        domains: ["communication", "nlp", "adaptability"]
        when_to_apply: "Ajustando pitch ao estilo de processamento do prospect"
        how_to_use: |
          Visual: "veja", "imagine" → slides, diagramas
          Auditivo: "ouça", "soa bem" → explicações verbais
          Cinestésico: "sente", "pega" → experiências hands-on

  # ==========================================================================
  # L3: HEURISTICS (22 items)

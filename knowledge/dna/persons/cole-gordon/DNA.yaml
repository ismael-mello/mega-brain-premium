  L3_HEURISTICS:
    count: 22
    items:

      # --- NUMERIC THRESHOLD HEURISTICS ---

      - id: "CG-HEUR-001"
        title: "Double Tie Down Every 45s"
        rule: "Check-in a cada 45 segundos durante pitch (Double Tie Down). Pitch é diálogo, não monólogo."
        threshold: {value: 45, operator: "=", unit: "seconds"}
        quote: "Check-in during pitch every ~45 seconds. 'Does that make sense?' + 'What are your thoughts on that?'"
        weight: 0.90
        chunk_ids: ["CG002_005"]
        source_ids: ["CG002"]
        domains: ["pitch", "engagement", "dialogue"]
        usage_context: "Estruturando pitch para manter prospect engajado"
        recommended_action: "Inserir Double Tie Down a cada 45s"

      - id: "CG-HEUR-002"
        title: "2-Day Booking Window"
        rule: "2-day rolling window é optimal para booking. Mais que isso, show rate despenca."
        threshold: {value: 2, operator: "<=", unit: "days"}

  # ==========================================================================
  # L4: FRAMEWORKS (19 items)
  # ==========================================================================
  L4_FRAMEWORKS:
    count: 19
    items:

      - id: "CG-FW-001"
        title: "7 Beliefs Framework"
        statement: "7 crenças que todo prospect precisa ter para comprar. 6 instaladas no Discovery, 1 no Pitch."
        quote: "Every prospect needs to believe 7 things to buy."
        weight: 0.95
        chunk_ids: ["CG001_010"]
        source_ids: ["CG001"]
        domains: ["discovery", "objection-mapping", "sales-process"]
        components:
          - {name: "1. PAIN", description: "Há problema ou desejo não realizado", install: "Discovery"}
          - {name: "2. DOUBT", description: "Acredita que é possível resolver", install: "Discovery"}
          - {name: "3. COST", description: "Custo da inação > Custo do programa", install: "Discovery"}
          - {name: "4. DESIRE", description: "Quer o resultado específico oferecido", install: "Discovery"}
          - {name: "5. MONEY", description: "Tem ou consegue recursos", install: "Discovery"}
          - {name: "6. SUPPORT", description: "Tem apoio das pessoas relevantes", install: "Discovery"}
          - {name: "7. TRUST", description: "Confia que VOCÊ pode entregar", install: "Pitch"}

      - id: "CG-FW-002"
        title: "6-Phase Call Flow"
        statement: "Estrutura completa de uma call de venda em 6 fases distintas."
        quote: "The complete call structure in 6 phases."
        weight: 0.95
        chunk_ids: ["CG002_012"]
        source_ids: ["CG002"]
        domains: ["sales-process", "call-structure", "closing"]
        components:
          - {name: "FASE 1: INTRODUCTION", description: "Rapport + Frame (clean sheet of paper)"}
          - {name: "FASE 2: DISCOVERY", description: "Instalar 6 Beliefs, Consistency Bias, Hell/Heaven Island"}
          - {name: "FASE 3: TRANSITION", description: "Evitar Anvil Drop, prospect PEDE para ouvir pitch"}
          - {name: "FASE 4: PITCH", description: "4 Pillars + Double Tie Down a cada 45s"}
          - {name: "FASE 5: COMMITTING", description: "'Where do you want to go from here?'"}
          - {name: "FASE 6: OBJECTION HANDLING", description: "Raramente necessário se beliefs instalados"}

      - id: "CG-FW-003"
        title: "4 Pillars Pitch Structure"
        statement: "Estrutura de pitch que gera paradigm shift + future pacing."
        quote: "4 Pillars Pitch Structure: High-Level Promise, Paradigm Shift, Future Pacing, Delivery"
        weight: 0.90
        chunk_ids: ["CG002_013"]
        source_ids: ["CG002"]
        domains: ["pitch", "presentation", "persuasion"]
        components:
          - {name: "HIGH-LEVEL PROMISE", description: "Promessa macro do que entrega"}
          - {name: "PILLAR 1-2", description: "PARADIGM SHIFT - Por que métodos anteriores falharam"}
          - {name: "PILLAR 3-4", description: "FUTURE PACING - Vida após resolver"}
          - {name: "DELIVERY", description: "Como entregamos (formato, timeline)"}
        formula: |
          "Quando se trata de [DESIRED OUTCOME],
          a maioria faz [INCORRECT BEHAVIOR],
          resultando em [PROBLEM] e [CONSEQUENCE].
          Em vez disso, fazemos [FEATURE]
          que permite [BENEFIT] e [BENEFIT OF BENEFIT]."

      - id: "CG-FW-004"
        title: "3 Níveis de Tonalidade"
        statement: "Framework para calibrar tom de voz durante call."
        quote: "3 Levels of Tonality: Seeking Rapport (avoid), Neutral (80-90%), Breaking Rapport (5-10%)"
        weight: 0.85
        chunk_ids: ["CG002_014"]
        source_ids: ["CG002"]
        domains: ["tonality", "communication", "influence"]
        components:
          - {name: "SEEKING RAPPORT", description: "Inflexão ascendente - EVITAR (0%)"}
          - {name: "NEUTRAL", description: "Tom relaxado, confiante (80-90%)"}
          - {name: "BREAKING RAPPORT", description: "Inflexão descendente em perguntas difíceis (5-10%)"}

      - id: "CG-FW-005"
        title: "7 Levers for Show Rate"
        statement: "7 alavancas para otimizar taxa de comparecimento."
        quote: "Show Rate Optimization - 7 Levers"
        weight: 0.90
        chunk_ids: ["CG003_003"]
        source_ids: ["CG003"]
        domains: ["show-rate", "operations", "optimization"]
        components:

versao: "1.0.0"
pessoa: "EAD Closer"
camada: "FILOSOFIAS"
total_itens: 18

itens:
  - id: "EDC-FIL-001"
    titulo: "Venda e Emocional, Nao Racional"
    descricao: >
      A decisao de compra e fundamentalmente emocional. O cerebro limbico
      (emocional) decide, e o neocortex (racional) justifica depois. Toda a
      arquitetura de persuasao da Venda de Alta Performance e construida para
      ativar gatilhos emocionais e gerar certeza emocional no cliente.
    peso: 0.95
    citacao: "A venda e emocional. Isso aqui tende nessa estrutura a ativar todos os gatilhos necessarios para a pessoa tomar a decisao naquele momento."
    aplicacao: "Toda construcao de pitch, apresentacao e fechamento deve priorizar gatilhos emocionais sobre argumentos racionais."
    fonte: "[EDC-0076] Estrutura da Venda de Impacto.txt"

  - id: "EDC-FIL-002"
    titulo: "Ninguem Compra Produto, Compra Transformacao"
    descricao: >
      O cliente nao compra o produto em si, compra a transformacao que o produto
      proporciona. O metodo (como transforma) e diferente do produto (como entrega).
      A apresentacao deve vender a transformacao antes de mostrar o produto.
    peso: 0.95
    citacao: "Metodo e diferente de produto. Metodo e como voce transforma. Produto e como voce entrega."
    aplicacao: "Na apresentacao, sempre mostrar metodo/transformacao antes de features do produto."
    fonte: "[EDC-0007] APRESENTACAO PITCH PADRAO.txt"

  - id: "EDC-FIL-003"
    titulo: "A Venda e Construida por Microfechamentos"
    descricao: >
      A venda nao acontece em um unico momento de fechamento. Ela e construida
      ao longo de toda a apresentacao por micropactos, microcompromissos e
      microfechamentos que o cliente vai fazendo, para que no final passar o
      cartao fique muito mais proximo.
    peso: 0.95
    citacao: "A venda e construida a partir de microfechamentos, micropactos, microcompromissos que o cliente vai fazendo com voce ao longo da venda."
    aplicacao: "Inserir pactos e microcompromissos em cada etapa da venda, nao apenas no fechamento final."
    fonte: "[EDC-0077] Pacto Sim ou Nao.txt"

  - id: "EDC-FIL-004"
    titulo: "Voce Nao Vende Para o Cliente, Voce Vende Com o Cliente"
    descricao: >
      A postura do closer nao e de vendedor empurrando produto. E de consultor
      que ajuda o cliente a tomar a melhor decisao. A venda e uma parceria,
      nao uma batalha. O closer guia o cliente pela jornada de decisao.
    peso: 0.90
    citacao: "Eu nao to aqui pra te vender nada, to aqui pra contribuir com voce. Se fizer sentido la na frente, eu mostro pra ti o que a gente tem de solucao."
    aplicacao: "Postura consultiva desde o primeiro contato. Nunca pressionar, sempre guiar."
    fonte: "[EDC-0003] INTRODUCAO (QUEBRA GELO).txt"

  - id: "EDC-FIL-005"
    titulo: "Quanto Mais Caro, Mais Facil de Vender"
    descricao: >
      Produtos mais caros sao mais faceis de vender porque atraem clientes
      mais qualificados, geram mais percepcao de valor e permitem melhor
      entrega. O preco baixo atrai clientes problematicos e desvaloriza o
      trabalho.
    peso: 0.85
    citacao: "Quanto mais caro, mais facil de vender."
    aplicacao: "Posicionar sempre no high-ticket. Nao competir por preco."
    fonte: "[EDC-0059] Curso 21 Mod 2 Aula 8.txt"

  - id: "EDC-FIL-006"
    titulo: "Brasileiro Compra Parcela, Nao Preco"
    descricao: >
      No contexto brasileiro, o cliente avalia se a parcela cabe no orcamento
      mensal, nao o valor total. A estrategia de parcelamento e fundamental
      para viabilizar vendas high-ticket no Brasil.
    peso: 0.90
    citacao: "Brasileiro compra parcela, nao preco."
    aplicacao: "Sempre apresentar valor em parcelas. Focar no impacto mensal, nao no total."
    fonte: "[EDC-0049] Curso 21 Aula 3.txt"

  - id: "EDC-FIL-007"
    titulo: "80% Que Dizem Amanha Nao Pagam"
    descricao: >
      Estatistica interna que demonstra por que o fechamento em call e
      fundamental. Clientes que saem da call com intencao de pagar depois
      tem taxa de conversao drasticamente menor. O dominio se perde quando
      o cliente sai da call.
    peso: 0.90
    citacao: "80% das pessoas que falam que vao pagar amanha, nao pagam."
    aplicacao: "Fechar sempre em call. Nunca deixar o cliente sair com promessa de pagar depois."
    fonte: "[EDC-0019] PEGANDO O PAGAMENTO.txt"

  - id: "EDC-FIL-008"
    titulo: "Toda Objecao e Emocional"
    descricao: >
      Baseado no livro 'Objecoes', toda objecao e fundamentalmente emocional,
      mesmo quando verbalizada como racional (preco, tempo, socio). O closer
      deve tratar a raiz emocional, nao apenas o argumento logico.
    peso: 0.85
    citacao: "Toda objecao e emocional."
    aplicacao: "Ao contornar objecoes, tratar a emocao por tras do argumento racional."
    fonte: "[EDC-0055] Curso 21 Mod 2 Aula 7.txt"

  - id: "EDC-FIL-009"
    titulo: "Ser Autoresponsavel Pelo Resultado"
    descricao: >
      O closer e 100% responsavel pelo resultado da venda. Se o cliente
      disse 'vou pensar', e porque o closer nao construiu a venda corretamente.
      Nao culpar o lead, o mercado ou o preco. A responsabilidade e do closer.
    peso: 0.85
    citacao: "Voce tem que ser autoresponsavel por isso."
    aplicacao: "Analisar cada venda perdida como falha de execucao, nao de lead."
    fonte: "[EDC-0077] Pacto Sim ou Nao.txt"

  - id: "EDC-FIL-010"
    titulo: "Treinar 87% Comportamental, 13% Tecnico"
    descricao: >
      Vendedores que nao performam falham por falta de inteligencia emocional,
      nao por falta de conhecimento tecnico. O treinamento de equipes deve
      focar 87% em comportamento/mentalidade e apenas 13% em tecnica de produto.
    peso: 0.85
    citacao: "87% do seu tempo voce tem que treinar a sua equipe com mentalidade, comportamento, inteligencia emocional, habitos. E 13% do tempo e a tecnica do produto."
    aplicacao: "Treinamento de equipe deve priorizar mindset e inteligencia emocional sobre tecnica."
    fonte: "[EDC-0073] Curso 16 Aula 6 - Vendedor Novo.txt"

  - id: "EDC-FIL-011"
    titulo: "Demore Para Contratar, Seja Rapido Para Demitir"
    descricao: >
      Principio de gestao de equipe de vendas. A contratacao deve ser criteriosa
      e lenta, mas a demissao deve ser rapida quando fica claro que o vendedor
      nao vai performar. Em um mes ja se sabe se o vendedor e bom ou nao.
    peso: 0.80
    citacao: "Demore para contratar e seja rapido para demitir. Em um mes voce ja tem que saber se ele e bom ou nao."
    aplicacao: "Processo seletivo rigoroso. Avaliacao rapida de novos vendedores."
    fonte: "[EDC-0073] Curso 16 Aula 6 - Vendedor Novo.txt"

  - id: "EDC-FIL-012"
    titulo: "Nao Imploro Venda, Deixo Ele Escolher"
    descricao: >
      O closer nunca deve implorar por uma venda ou pressionar de forma
      desesperada. A postura correta e apresentar as opcoes com clareza,
      mostrar qual e melhor, e deixar o cliente decidir. A responsabilidade
      da decisao e transferida para o cliente.
    peso: 0.85
    citacao: "Eu nao imploro venda, gente. Eu deixo ele escolher. Mas eu mostro qual e melhor. Mas e ele que escolhe."
    aplicacao: "Manter autoridade e postura. Nunca demonstrar desespero por vender."
    fonte: "[EDC-0088] Aula 47 - Objecoes e tira duvidas.txt"

  - id: "EDC-FIL-013"
    titulo: "Venda Conversada Tem Conversao Muito Menor"
    descricao: >
      A venda por WhatsApp/email (conversada) tem conversao drasticamente
      menor que a venda de alta performance (call estruturada). Alem disso,
      gera imprevisibilidade, frustracao e gasta muito mais tempo por cliente.
    peso: 0.85
    citacao: "A venda conversada, ela tem uma conversao muito menor. E ela tem uma imprevisibilidade tamanha e tem muita frustracao."
    aplicacao: "Sempre buscar levar o lead para call estruturada, nao fechar por WhatsApp."
    fonte: "[EDC-0076] Estrutura da Venda de Impacto.txt"

  - id: "EDC-FIL-014"
    titulo: "Quem Nao Vende Dentro de Um Evento Mata Um Panda"
    descricao: >
      Citacao de Andre Cia. Eventos sao oportunidades de ouro para vendas.
      Nao vender dentro de um evento e desperdicar um dos melhores canais
      de conversao existentes no mercado.
    peso: 0.75
    citacao: "Quem nao vende dentro de um evento mata um panda."
    aplicacao: "Todo evento deve ter componente de venda estruturado."
    fonte: "[EDC-0084] Mod 4 Aula 8 - Eventos.txt"

  - id: "EDC-FIL-015"
    titulo: "A Gente Faz o Que a Gente Fala"
    descricao: >
      Principio de integridade e coerencia. Se o closer disse ao cliente que
      o preco era valido so naquele dia, deve manter a palavra. Incoerencia
      destroi a credibilidade. Prometer e cumprir, sem excecoes.
    peso: 0.80
    citacao: "A gente segue, a gente faz o que a gente fala. Se eu falei pra ele que era so em call, eu ia fazer so em call."
    aplicacao: "Manter coerencia absoluta entre promessa e acao."
    fonte: "[EDC-0085] Dissertando Vendas 1x1.txt"

  - id: "EDC-FIL-016"
    titulo: "Programas Mentais Moldam o Vendedor"
    descricao: >
      Baseado em neurolinguistica. De 0-7 anos e a fase esponjinha (moldagem).
      De 7-12 consolidacao. De 12+ repeticao. Os condicionamentos do vendedor
      (verbal, modelagem, acontecimento especifico) determinam seus limites
      e crencas sobre vendas.
    peso: 0.75
    citacao: "De 0 a 7 anos e a fase esponjinha. De 7 a 12 consolidacao. Tres condicionamentos: verbal, modelagem e acontecimento especifico."
    aplicacao: "Identificar e reprogramar crencas limitantes do vendedor sobre vendas e dinheiro."
    fonte: "[EDC-0033] Gatilhos Mentais 2.txt"

  - id: "EDC-FIL-017"
    titulo: "60% Apresentacao, 40% Fechamento"
    descricao: >
      A apresentacao (linha) e mais importante que o fechamento em si.
      Se a apresentacao for bem feita, o fechamento flui naturalmente.
      A maioria dos closers foca demais no fechamento e negligencia a
      construcao da venda durante a apresentacao.
    peso: 0.85
    citacao: "60% e a linha, a apresentacao. 40% e o fechamento."
    aplicacao: "Investir mais energia na construcao da apresentacao do que nas tecnicas de fechamento."
    fonte: "[EDC-0054] Curso 21 Mod 2 Aula 3.txt"

  - id: "EDC-FIL-018"
    titulo: "Nao Existe Almoco Gratis"
    descricao: >
      Principio usado para contornar concorrentes que 'nao cobram' taxas.
      Se alguem nao cobra visivelmente, o custo esta embutido em outro lugar.
      Transparencia sobre precos gera confianca e diferenciacao competitiva.
    peso: 0.75
    citacao: "Ninguem trabalha de graca. Se a pessoa nao esta te cobrando nada pra implementar, onde voce acha que esta esse valor?"
    aplicacao: "Usar transparencia de precos como diferencial competitivo contra concorrentes baratos."
    fonte: "[EDC-0088] Aula 47 - Objecoes e tira duvidas.txt"

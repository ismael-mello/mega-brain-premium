itens:
  - id: "EDC-FW-001"
    titulo: "Estrutura da Venda de Alta Performance (Full Sales)"
    descricao: >
      Framework completo da venda de impacto com etapas sequenciais: 1.
      INTRODUCAO (5min) - Recepcao, quebra-gelo, FORM, rapport, marketing
      pessoal, pacto inicio 2. SPIN SELLING (15min) - Situacao, Problema,
      Implicacao, Necessidade + pacto sim/nao 3. APRESENTACAO/PITCH -
      Credibilidade empresa, Metodo, Produto + pactos intermediarios 4.
      ANCORAGEM - Contraste de valor, comparacao com alternativas 5.
      FECHAMENTO - Valor tabela, sustentacao, valor protagonista, cartas na
      manga Total: ~1-1.5 horas. Meta conversao: 25-40%.
    peso: 0.80
    citacao: "Primeira etapa introducao 5min, questionario SPIN 15min, apresentacao pitch, ancoragem, fechamento."
    fonte: "[EDC-0076] Estrutura da Venda de Impacto.txt"

  - id: "EDC-FW-002"
    titulo: "SPIN Selling (Adaptacao BR)"
    descricao: >
      Framework de perguntas adaptado para o mercado brasileiro: S -
      SITUACAO: Perguntas sobre estado atual (faturamento, equipe,
      processos) P - PROBLEMA: Perguntas sobre dores e desafios I -
      IMPLICACAO: Perguntas sobre consequencias de nao resolver N -
      NECESSIDADE: Perguntas que fazem o cliente verbalizar a necessidade
      Usar mind map enquanto o cliente fala. Incluir escala 0-10 para medir
      dor. Construir o GAP (Ponto A -> Ponto B) durante o questionario.
    peso: 0.80
    citacao: "Situacao, Problema, Implicacao, Necessidade de solucao. Mind map enquanto o cliente fala."
    fonte: "[EDC-0005] Questionario Spin Selling.txt"

  - id: "EDC-FW-003"
    titulo: "FORM Method (Rapport)"
    descricao: >
      Framework de rapport para construir conexao rapida: F - FAMILIA:
      Perguntar sobre familia, filhos, situacao pessoal O - OCUPACAO:
      Perguntar sobre trabalho, cargo, empresa, rotina R - RECRIACAO:
      Perguntar sobre hobbies, lazer, o que faz pra relaxar M - MOTIVACAO:
      Perguntar sobre sonhos, objetivos, o que move a pessoa Usar para
      encontrar PONTO EM COMUM com o cliente.
    peso: 0.80
    citacao: "Familia, Ocupacao, Recriacao, Motivacao. Achar o ponto em comum."
    fonte: "[EDC-0003] INTRODUCAO (QUEBRA GELO).txt"

  - id: "EDC-FW-004"
    titulo: "Sistema de Pactos (Microfechamentos)"
    descricao: >
      Framework de micropactos ao longo da venda: 1. PACTO DE INICIO - Apos
      introducao, transicao para questionario 2. PACTO SIM OU NAO - Apos
      SPIN, compromisso de decisao em call 3. PACTOS DE CREDIBILIDADE -
      Durante pitch, confirmacoes de entendimento 4. PACTO DE ORCAMENTO -
      "Se caber no orcamento, fecha hoje?" 5. PACTO FINAL - Antes do preco,
      compromisso de decisao imediata Cada pacto e um microfechamento sem
      pegar dinheiro.
    peso: 0.80
    citacao: "O que e um pacto? E um micro fechamento sem pegar dinheiro."
    fonte: "[EDC-0077] Pacto Sim ou Nao.txt"

  - id: "EDC-FW-005"
    titulo: "6 Passos do Contorno de Objecao"
    descricao: >
      Framework completo para lidar com objecoes: 1. DESPRESSURIZAR -
      Concordar, elogiar, mostrar que entende ("Eu entendo perfeitamente")
      2. TIE-DOWN/AMARRA - Amarrar a um ponto de concordancia 3. ISOLAR A
      OBJECAO - "De 0 a 10, o que te impede?" Descobrir objecao real 4.
      CONFIRMACAO DUPLA - Confirmar que e ESSA a unica objecao 5. LIDAR COM
      A OBJECAO - Mudar angulo, usar metafora, reframe 6. PEDIR PELA VENDA -
      Voltar ao fechamento ("Entao podemos seguir?") Nao interrumpir o
      cliente. Usar silencio. Falar devagar.
    peso: 0.80
    citacao: "Despressurizar, tie-down, isolar, confirmacao dupla, lidar com objecao, pedir pela venda."
    fonte: "[EDC-0055] Curso 21 Mod 2 Aula 7.txt"

  - id: "EDC-FW-006"
    titulo: "Ancoragem de Valor (Contraste)"
    descricao: >
      Framework de ancoragem para criar contraste de valor: 1. ANCORAGEM
      ALTA - Mostrar quanto custaria fazer sozinho ou por outro caminho 2.
      VALOR DE TABELA - Apresentar preco "normal" do produto/servico 3.
      SUSTENTACAO - Provar que o valor de tabela vale a pena (cases, ROI) 4.
      VALOR PROTAGONISTA - Revelar preco especial para decisao em call 5.
      CAF - Justificar desconto: Custos Administrativos e Financeiros
      economizados O gatilho mental do contraste faz o preco final parecer
      muito acessivel.
    peso: 0.80
    citacao: "Proporciona um contraste, um gatilho mental do contraste."
    fonte: "[EDC-0008] ANCORAGEM.txt"

  - id: "EDC-FW-007"
    titulo: "Ritual de Pre-Atendimento (5 Passos)"
    descricao: >
      Framework de preparacao antes de cada call: 1. PESQUISA - Verificar
      Instagram, LinkedIn, site do cliente (3-5 min) 2. PREPARACAO MENTAL -
      Autosugestao, respiracao, mindset presuntivo 3. AMBIENTE - Iluminacao,
      camera, fundo neutro, audio limpo 4. MATERIAIS - Slides prontos, CRM
      aberto, contrato preparado 5. OBJETIVO - Definir meta da call
      (fechamento, 2a reuniao, sinal)
    peso: 0.80
    citacao: "Pesquisa, preparacao mental, ambiente, materiais, objetivo."
    fonte: "[EDC-0001] Ritual de Pre-Atendimento.txt"

  - id: "EDC-FW-008"
    titulo: "Mirror Rapport (9 Dimensoes)"
    descricao: >
      Framework avancado de espelhamento para rapport: 1. TOM de voz -
      Espelhar grave/agudo 2. VOLUME - Espelhar alto/baixo 3. RITMO -
      Espelhar rapido/lento 4. FRASES REPETIDAS - Usar as mesmas palavras do
      cliente 5. ESTADO INTERNO - Espelhar emocao (animado, preocupado) 6.
      EXPRESSOES FACIAIS - Espelhar sorrisos, seriedade 7. POSTURA -
      Espelhar posicao corporal 8. MOVIMENTOS - Espelhar gestos 9.
      RESPIRACAO - Espelhar ritmo respiratorio (mais potente de todos)
    peso: 0.80
    citacao: "Tom, volume, ritmo, frases repetidas, estado interno, expressoes faciais, postura, movimentos, respiracao."
    fonte: "[EDC-0040] Rapport Perito.txt"

  - id: "EDC-FW-009"
    titulo: "Apresentacao: Empresa -> Metodo -> Produto"
    descricao: >
      Sequencia obrigatoria da apresentacao/pitch: 1. EMPRESA -
      Credibilidade, historia, resultados, provas sociais 2. METODO - Como
      transforma (processo, etapas, diferenciais) 3. PRODUTO - Como entrega
      (features, bonus, formato) "Tudo que voce falar tem que ser soco no
      queixo." Antecipar objecoes DURANTE a apresentacao, nao esperar o
      fechamento.
    peso: 0.80
    citacao: "Empresa, metodo e produto. Tudo que voce falar tem que ser soco no queixo."
    fonte: "[EDC-0007] APRESENTACAO PITCH PADRAO.txt"

  - id: "EDC-FW-010"
    titulo: "Closer Aguia Methodology"
    descricao: >
      Framework de gestao de closers por Yuri: PILARES: Preparacao Interna
      (mindset, emocional) + Preparacao Externa (tecnica, produto) EQUIPE:
      SDR (qualifica) -> Closer (fecha) -> CS (retem) -> Social Selling
      (conteudo) SKILLS: Roda de 12 habilidades para avaliacao (Skills
      Wheel) NEGOCIACAO: 3 cenarios (ideal, possivel, impossivel) PRINCIPIO:
      Ganha-ganha-ganha (cliente + closer + empresa) LIDERANCA: PTMA
      (Planejar, Treinar, Motivar+Acompanhar, Cobrar+Feedback)
    peso: 0.80
    citacao: "Preparacao Interna + Externa. SDR, Closer, CS, Social Selling."
    fonte: "[EDC-0061] a [EDC-0068] Serie Closer Aguia"

  - id: "EDC-FW-011"
    titulo: "Funil de Eventos (Product Ladder)"
    descricao: >
      Framework de escada de produtos usando eventos por Aline: AUDIENCIA:
      Fria -> Morna -> Quente EVENTOS: - Entrada (fria): workshops, lives,
      webinars - R$97-497 - Mistos (morna): imersoes, seminarios -
      R$997-2997 - Fundo de funil (quente): VIP, mentorias - R$3k-10k+ -
      Mastermind: 30-40 pessoas, R$50k each Cada evento alimenta o proximo
      nivel. Vender DENTRO do evento e obrigatorio.
    peso: 0.80
    citacao: "Entrada R$97-497, Misto R$997-2997, Fundo de funil R$3k-10k+."
    fonte: "[EDC-0084] Mod 4 Aula 8 - Eventos.txt"

  - id: "EDC-FW-012"
    titulo: "Framework de Fechamento Completo"
    descricao: >
      Sequencia de tecnicas de fechamento em ordem: 1. VALOR DE TABELA -
      Apresentar e sustentar (silencio apos anunciar) 2. SUSTENTACAO -
      Provar valor com cases, ROI, comparacoes 3. PACTO DE ORCAMENTO - "Se
      couber, fecha hoje?" 4. VALOR PROTAGONISTA - Revelar preco especial +
      justificativa CAF 5. DUPLA CONFIRMACAO - Confirmar entendimento antes
      de cobrar 6. CARTAS NA MANGA - Quedas, bonus extras, parcelamento
      diferenciado 7. TIRAR DA MESA - Fingir encerrar negociacao para baixar
      guarda 8. DOWNSELL - Produto menor se cliente verdadeiramente nao pode
      9. SINAL DE COMPROMISSO - Ultimo recurso, minimo R$1000 10. PEGANDO O
      PAGAMENTO - Enviar link, aguardar comprovante em call
    peso: 0.80
    citacao: "Valor tabela, sustentacao, pacto orcamento, protagonista, dupla confirmacao, cartas na manga, tirar da mesa, downsell, sinal, pagamento."
    fonte: "[EDC-0013] a [EDC-0019] + [EDC-0048] a [EDC-0051]"

  - id: "EDC-FW-013"
    titulo: "CAF Narrative (Justificativa de Desconto)"
    descricao: >
      Framework narrativo para justificar o desconto do valor protagonista
      sem desvalorizar o produto: 1. Sustentar valor de tabela completamente
      2. Fazer pacto de fechamento em call 3. Explicar: "Normalmente pessoas
      demoram 30 dias para decidir" 4. "Esses 30 dias tem custo comercial,
      administrativo e financeiro (CAF)" 5. "Para pessoas decididas como
      voce, pego esse custo e dou como bonificacao" 6. Revelar valor
      protagonista "Nao e desconto porque sou legal. E economia que eu passo
      pra voce."
    peso: 0.80
    citacao: "Custos administrativos e financeiros. Nao e desconto, e economia que eu passo pra voce."
    fonte: "[EDC-0049] Curso 21 Aula 3.txt"

  - id: "EDC-FW-014"
    titulo: "BITs (Belief, Identity, Trust)"
    descricao: >
      Framework para construir certeza no cliente antes do pitch: B - BELIEF
      (Crenca): Fazer o cliente acreditar que a solucao funciona I -
      IDENTITY (Identidade): Fazer o cliente se ver como alguem que
      merece/precisa T - TRUST (Confianca): Fazer o cliente confiar no
      closer e na empresa Trabalhados no pre-pitch para criar base emocional
      e cognitiva.
    peso: 0.80
    citacao: "BITs: Belief, Identity, Trust."
    fonte: "[EDC-0023] PRE-PITCH.txt"

  - id: "EDC-FW-015"
    titulo: "Tecnica 'Por Tras dos Panos'"
    descricao: >
      Framework de transparencia para gerar confianca no fechamento: 1. Apos
      cliente demonstrar interesse, "mostrar os bastidores" 2. Compartilhar
      tela mostrando CRM, contrato, plataforma 3. "Vou te mostrar como
      funciona por tras dos panos" 4. Preencher dados do cliente no
      contrato/CRM enquanto conversa 5. Naturaliza o processo de compra e
      reduz ansiedade
    peso: 0.80
    citacao: "Por tras dos panos. Mostrar os bastidores - CRM, contrato, plataforma."
    fonte: "[EDC-0048] Curso 21 Aula 2.txt"

  - id: "EDC-FW-016"
    titulo: "Tecnica 'Escolha 2 de 3 Bonus'"
    descricao: >
      Framework de fechamento usando paradoxo de escolha controlado: 1.
      Apresentar 3 bonus valiosos 2. Dizer ao cliente: "Voce pode escolher 2
      dos 3" 3. O cliente instintivamente quer os 3 4. Oferecer os 3 como
      "excepcao" ou "condicao especial" 5. Cliente sente que ganhou mais do
      que esperava
    peso: 0.80
    citacao: "Escolha 2 de 3 bonus. O cliente vai querer os 3."
    fonte: "[EDC-0048] Curso 21 Aula 2.txt"

  - id: "EDC-FW-017"
    titulo: "Estrategia de 2 Calls (Quando Falta Decisor)"
    descricao: >
      Framework para casos sem todos os decisores presentes: 1. NUNCA
      mostrar preco sem todos os decisores 2. Fazer toda a apresentacao
      normalmente 3. No final: "Para eu montar a melhor proposta, preciso
      falar com voce e [decisor]" 4. Agendar segunda call com todos 5. Se
      possivel, pegar PIX de honra/compromisso (reembolsavel) para garantir
      retorno 6. Na segunda call, focar em fechamento (apresentacao ja foi
      feita)
    peso: 0.80
    citacao: "Nunca mostra preco sem todos os decisores. PIX de honra para garantir retorno."
    fonte: "[EDC-0057] Curso 21 Mod 2 Aula 6.txt"


      - "SMS reminders"
      - "Retargeting ads"
      - "Content ads"
    resultado: "Hammer until buy or unsubscribe"

  - id: "JH-MM-007"
    titulo: "Venus Fly Trap Nurturing"
    descricao: "Atrair e nutrir leads com conteudo antes de pedir acao."
    peso: 0.95
    chunks: ["JH068_002", "JH069_003"]
    fontes: ["BATCH-068", "BATCH-069"]
    pergunta_geradora: "Estou nutrindo o lead ou pedindo acao imediatamente?"
    fases:
      - "Awareness: Captura atencao"
      - "Education: Ensina conceitos"
      - "Conversion: Pede acao"
    insight: "25% watch = move to next step"

  - id: "JH-MM-008"
    titulo: "Consumer Behavior Shift"
    descricao: "Consumidores mudaram - estao cansados de VSLs tradicionais."
    peso: 0.90
    chunks: ["JH069_004"]
    fontes: ["BATCH-069"]

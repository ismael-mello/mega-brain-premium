  - id: "JH-MM-005"
    titulo: "Interest Levels Ladder"
    descricao: "Escada de interesse do lead - de Curious ate Deal."
    peso: 0.95
    chunks: ["JH002_001"]
    fontes: ["JH002"]
    pergunta_geradora: "Onde meu lead esta na escada de interesse? Quantos niveis preciso mover antes da call?"
    niveis:
      - "CURIOUS - Sales odeia leads aqui"
      - "GENERAL INTEREST - Leads tipicamente comecam aqui"
      - "HIGH INTEREST"
      - "DEAL - Onde fechamentos acontecem"
    insight: "Marketing + Sales devem mover leads 2-4 niveis ANTES da call"

  - id: "JH-MM-006"
    titulo: "Hydra Multi-Head"
    descricao: "Atacar lead de multiplos angulos simultaneamente - email + SMS + retargeting."
    peso: 0.95

  # ═══════════════════════════════════════════════════════════════
  # 30-DAY CHALLENGE (30DC) - Merged 2026-03-03
  # ═══════════════════════════════════════════════════════════════
  - id: "JH-MM-021"
    titulo: "Shoot and Cushion"
    descricao: "Sales follow-up model based on medical analogy. First 'shoot them in the leg' by presenting a drastic business problem. Then 'run up and cushion the wound' by acknowledging the pain. Then 'dig your thumb in' by amplifying consequences. Finally 'stitch it up' by positioning yourself as the doctor with the solution."
    peso: 0.92
    citacao: "It's kind of like shooting them in the leg and then as you shoot them in the leg, you run up and you're like, 'Oh, Jesus man, you got this wound on your leg right here. I'm going to cushion it a little bit.'"
    aplicacao: "Follow-up videos, urgency creation, pain-based selling"
    fonte: "[30DC-0019] 19 - DAY 19..txt"

  - id: "JH-MM-022"
    titulo: "Pricing Pyramid Real Estate"
    descricao: "Business pricing visualized as a pyramid with real estate. Base level has the most room (attention/low-cost). Each level up has less capacity but higher value. When capacity fills up at any level, the price for remaining spots goes up - like real estate appreciating when units are scarce."
    peso: 0.90
    citacao: "If there's only one room left or if there's no rooms left, you got to build a whole extension on top of that pyramid. That's going to cost a lot more, right?"
    aplicacao: "Service packaging, pricing tiers, capacity-based pricing"
    fonte: "[30DC-0013] 13- DAY 13..txt"

  - id: "JH-MM-023"
    titulo: "Power of Choice Psychology"
    descricao: "When giving someone a response option, never frame it as yes/no. Instead, provide two positive choices (morning or afternoon, 10 AM or 2 PM). The answer is no longer 'yes or no' but becomes 'which one.'"
    peso: 0.90
    citacao: "If I give somebody morning or night or morning or afternoon or 10 or two, is it yes or no? No, it's morning or afternoon. You see what you can do with the power of choice?"
    aplicacao: "Appointment setting, closing, any binary decision in sales"
    fonte: "[30DC-0003] 3 - DAY 3.txt"

  - id: "JH-MM-024"
    titulo: "Problem Cost vs Solution Value"
    descricao: "Every sales conversation exists on a balance between how much the problem costs the prospect and how much the solution is worth. When the cost of the problem exceeds the price of the solution, the sale is logical."
    peso: 0.88
    citacao: "You have to be able to see these things in real time and know that that's a piece of value somebody's willing to pay for because they understand how much that problem could cost them."
    aplicacao: "Value selling, ROI conversations, proposal framing"
    fonte: "[30DC-0005] 5 - DAY 5.txt"

  - id: "JH-MM-025"
    titulo: "Lead Graph Content Consumption Matrix"
    descricao: "Four-quadrant model mapping content types by two axes: 'Hard to Consume vs Easy to Consume' and 'Low Desire vs High Desire.' Webinars = hard to consume but high desire. PDF downloads = easy to consume and high desire. Webinars have 50% attrition rate because they're hard to consume."
    peso: 0.88
    citacao: "This is a pretty cool pitch... So this is downloadable once again for you."
    aplicacao: "Lead generation, content strategy, funnel design"
    fonte: "[30DC-0027] 27 - DAY 27..txt"

  - id: "JH-MM-026"
    titulo: "Learning Style Selling"
    descricao: "35% of people are visual learners, 40% kinesthetic/tactile, 25% auditory. A screen share sales presentation hits all three simultaneously. Listen for cues: 'I'd like to see more' (visual), 'I need to hear more' (auditory), 'it made us feel bad' (kinesthetic)."
    peso: 0.85
    citacao: "35% of people in real life are visual learners... 40% of the entire demographic in the world is kinesthetic... 25%'s auditory."
    aplicacao: "Sales presentations, screen share calls, proposal delivery"
    fonte: "[30DC-0010] 10 - DAY 10..txt"

  - id: "JH-MM-027"
    titulo: "Teaching Retention Multiplier"
    descricao: "You retain 70-90% of information when you teach it to others, versus only 10% through passive learning. When doing data-driven outreach, the act of explaining a prospect's data to them is simultaneously teaching yourself. Volume compounds skill."
    peso: 0.85
    citacao: "You have a 70 to 90% opportunity to retain that information comparatively to the normal 10% when retaining information that you're learning when you teach it to others."
    aplicacao: "Skill development through outreach, training methodology, coaching"
    fonte: "[30DC-0005] 5 - DAY 5.txt"

  # ═══════════════════════════════════════════════════════════════
  # CLIENT ACCELERATOR + PCVP (CA) - Merged 2026-03-03
  # ═══════════════════════════════════════════════════════════════
  - id: "JH-MM-028"
    titulo: "Capital Deployment Mindset"
    descricao: "Olhar para marketing como um investidor, nao como um marketer. Existem dois tipos de capital sendo alocados: capital monetario e capital humano. O objetivo e maximizar ROI em ambos."
    peso: 0.93
    citacao: "I look at everything through the lens of, 'Hey, we were investors. We're essentially deploying two types of capital. We have monetary capital and we have human capital.'"
    aplicacao: "Alocacao de budget, priorizacao de projetos, scaling decisions"
    fonte: "[CA-0013] 4. DEEP DIVE - LAUNCH PLAN TEMPLATE.txt"

  - id: "JH-MM-029"
    titulo: "Tier Client Hierarchy"
    descricao: "Nem todos os clientes sao iguais. Tier 1 tem o maior LTV, menor sales cycle, e melhor ratio LTV/CAC. Tier 3 nao escala e nao gera lucro. Foco absoluto em Tier 1."
    peso: 0.94
    citacao: "When we bring on Tier 3 type clients, they don't scale, which means we don't make money... We are very hyper-focused on Tier 1 clients."
    aplicacao: "ICP definition, targeting, sales qualification, agency growth"
    fonte: "[CA-0013] 4. DEEP DIVE - LAUNCH PLAN TEMPLATE.txt"

  - id: "JH-MM-030"
    titulo: "Curiosity Gap Model"
    descricao: "A tensao psicologica entre o que sabemos e o que queremos saber e o motor de cada clique. Quando voce apresenta uma historia parcial, uma pergunta sem resposta, ou uma contradicao visual, o cerebro experimenta um desconforto que so e resolvido clicando."
    peso: 0.88
    citacao: "At the heart of every successful thumbnail is something called the curiosity gap - the psychological tension between what we know and what we want to know."
    aplicacao: "Ad creatives, thumbnails, hooks, headlines, email subject lines"
    fonte: "[CA-0016] 2. THUMBNAIL PSYCHOLOGY GUIDE.txt"

  - id: "JH-MM-031"
    titulo: "Concept vs Variation Testing"
    descricao: "Um conceito e um grupo de ads que representam uma IDEIA. Variacoes sao versoes diferentes do mesmo conceito. Voce testa conceitos primeiro para encontrar winners, depois cria variacoes dos winners."
    peso: 0.91
    citacao: "A concept is essentially a group of ads, which is an idea. This is a very big shift for me once I fully understood it and it made it much more linear in scaling up."
    aplicacao: "Creative testing, media buying, scaling de campanhas"
    fonte: "[CA-0013] 4. DEEP DIVE - LAUNCH PLAN TEMPLATE.txt"

  - id: "JH-MM-032"
    titulo: "Neighbor Effect in Content"
    descricao: "Seu conteudo nao e julgado isoladamente - e comparado com conteudo similar que sua audiencia ja viu. Se voce cria um thumbnail/creative generico, esta competindo contra centenas de thumbnails praticamente identicos."
    peso: 0.86
    citacao: "YouTube doesn't judge your video in isolation - it uses collaborative filtering and co-viewing patterns to compare your content to similar videos."
    aplicacao: "YouTube ads, creative strategy, content positioning"
    fonte: "[CA-0016] 2. THUMBNAIL PSYCHOLOGY GUIDE.txt"

  - id: "JH-MM-033"
    titulo: "Responsibility Transfer in Sales"
    descricao: "Em vendas, transferir a responsabilidade do problema para longe do prospect. Fazer o prospect sentir que alguem na equipe dele DEVERIA estar resolvendo isso (mas nao esta). Isso remove culpa e cria urgencia para contratar ajuda externa."
    peso: 0.90
    citacao: "You're making sure that the person doesn't feel guilt, shame, or like they're doing something wrong... you're taking the responsibility of that problem being able to get solved, acting as if it's supposed to be handled by somebody else."
    aplicacao: "Cold outreach, video pitches, sales calls, objection handling"
    fonte: "[PCVP-0001] 1. POWER OF COLD VIDEO..txt"

  - id: "JH-MM-034"
    titulo: "Baseline-Projection-Variance Model"
    descricao: "Sem baseline documentado, voce nao pode projetar forward nem provar melhoria. O modelo e: (1) documentar baseline com Loom, (2) projetar worst/average/best case, (3) executar, (4) medir variancia."
    peso: 0.92
    citacao: "Not really documenting a baseline didn't allow us to show how much we improved results for our clients."
    aplicacao: "Client management, media buying, reporting, expectation setting"
    fonte: "[CA-0013] 4. DEEP DIVE - LAUNCH PLAN TEMPLATE.txt"

  - id: "JH-MM-035"
    titulo: "Technology Evolution Selling"
    descricao: "Vender tecnologia nova usando analogia de evolucao tecnologica que o prospect ja vivenciou. HTML era manual -> WordPress facilitou -> ClickFunnels automatizou. Quando o prospect entende o padrao de evolucao, a adocao da nova tecnologia se torna logica."
    peso: 0.88
    citacao: "Before WordPress, everything was pretty much built from scratch with code. Before code and after code was WordPress. After WordPress is ClickFunnels. ClickFunnels is 900% faster."
    aplicacao: "SaaS sales, technology pitches, chatbot sales, funnel sales"
    fonte: "[PCVP-0011] 11. SELL FUNNELS..txt"

  - id: "JH-MM-036"
    titulo: "Trust-Building Transaction as Gateway"
    descricao: "Um servico transacional de baixo risco e resultado rapido serve como porta de entrada para servicos maiores e recorrentes. O objetivo primario NAO e lucrar no servico inicial, mas sim construir confianca."
    peso: 0.90
    citacao: "It's something that we do in order to gain your trust. We offer all kinds of other things, but I don't even want to talk about that yet until we get you foundationally set up."
    aplicacao: "Agency sales, service bundling, client acquisition, upsell strategy"
    fonte: "[PCVP-0009] 9. GOOGLE LISTING..txt"


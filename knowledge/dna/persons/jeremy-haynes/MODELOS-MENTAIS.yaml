    descricao: "Convincing e para SEU beneficio. Persuading e para o beneficio DELES."
    peso: 0.95
    chunks: ["JH072_003"]
    fontes: ["BATCH-072"]
    pergunta_geradora: "Estou tentando convencer ou persuadir? A quem serve essa venda?"

      caracteristica: "Rotacao rapida, A/B testing intenso"
    harvester:
      uso: "Revenue previsivel, manutencao"
      caracteristica: "Evergreen assets, long-term optimization"

  - id: "JH-MM-010"
    titulo: "Andromeda Era"
    descricao: "Nova era de ads exige 50+ criativos/semana vs 3-4 do passado."
    peso: 0.90

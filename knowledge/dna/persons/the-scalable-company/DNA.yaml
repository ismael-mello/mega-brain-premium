    - id: MET-TSC-001
      title: ScalableOS Implementation Full Cycle
      steps:
      - passo: 1
        acao: Diagnose current state
        descricao: Avaliar maturidade atual do OS
        duracao: 1 semana
      - passo: 2
        acao: Map value engines
        descricao: Identificar Growth, Fulfillment, Innovation
        duracao: 2 semanas
      - passo: 3
        acao: Identify power stages
        descricao: Selecionar 2-3 stages criticos por engine
        duracao: 1 semana
      - passo: 4
        acao: Build scorecards
        descricao: Criar scorecards manuais para cada time
        duracao: 2 semanas
      - passo: 5
        acao: Document playbooks
        descricao: Documentar power stages como playbooks
        duracao: 2-4 semanas
      - passo: 6
        acao: Setup meeting rhythm
        descricao: Implementar QSP, MBR, Weekly, 1:1s
        duracao: 2 semanas
      - passo: 7
        acao: QSP kickoff meeting
        descricao: Primeira reuniao de planejamento trimestral
        duracao: 2 dias
      - passo: 8
        acao: Execute first quarter
        descricao: Rodar primeiro ciclo de 90 dias
        duracao: 12 semanas
      - passo: 9
        acao: Review and optimize
        descricao: Avaliar e melhorar sistema
        duracao: ongoing
      context: ''
      weight: 0.99
      domains:
      - operating-systems
      - implementation
      source_ids:
      - TSC-BATCH-085
      evidence: BUILD-INSTALL-OPTIMIZE full implementation cycle

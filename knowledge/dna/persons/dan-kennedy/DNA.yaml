  # L1 FILOSOFIAS (8)
  - id: FIL-DK-169
    text: "'Be not do' — coaching identity. You are a coach, not someone who does coaching. Identity drives behavior, not the reverse."
    source: "ACC-pdf-bootcamp-notes"
    tema: coaching-identity

  - id: FIL-DK-170
    text: "What you get paid for is REPUTATION — more than know-how, service, or results. Reputation is the asset. Everything else is secondary."
    source: "ACC-pdf-transcript"
    tema: compensation-philosophy

  - id: FIL-DK-171
    text: "Compensation based on value as defined by RECIPIENT, not you. What YOU think it's worth is irrelevant. What THEY perceive it's worth determines price."
    source: "ACC-pdf-transcript"
    tema: pricing-philosophy

  - id: FIL-DK-172
    text: "Give NOTHING for free — even $1M/yr clients lose respect without paying. Free devalues. Always charge something, even if token."
    source: "ACC-pdf-bootcamp-notes"
    tema: pricing-philosophy

  - id: FIL-DK-173
    text: "Conformity to industry norms GUARANTEES average results. Do what everyone does, get what everyone gets. Nonconformity is prerequisite to exceptional."
    source: "ACC-pdf-bootcamp-notes"
    tema: business-philosophy

  - id: FIL-DK-174
    text: "Made more people more money by raising prices than anything else. Price increases are the fastest, easiest path to profitability."
    source: "ACC-pdf-transcript"
    tema: pricing-philosophy

  - id: FIL-DK-175
    text: "Behavioral congruency — match behaviors, results follow automatically. If you act like someone who charges $50K, you'll charge $50K. Incongruent behavior caps income."
    source: "ACC-pdf-bootcamp-notes"
    tema: success-psychology

  - id: FIL-DK-176
    text: "Autonomy: what/when/where/whom you want, or cheerfully saying No. The ultimate measure of business success is freedom, not revenue."
    source: "ACC-pdf-bootcamp-notes"
    tema: business-philosophy

  # L2 MODELOS MENTAIS (8)
  - id: MM-DK-152
    text: "Time Allocation Model: 80yr life - sleep/taxes/timesuck = only 16.8 yrs discretionary. Treat time as the scarcest asset. Every hour has enormous opportunity cost."
    source: "ACC-pdf-bootcamp-notes"
    tema: time-management

  - id: MM-DK-153
    text: "10 Enemies of Autonomy: (1) my-biz-is-different, (2) peers, (3) past patterns, (4) industry norms, (5) fear, (6) indecision, (7) guilt, (8) obligation, (9) comfort, (10) identity lag."
    source: "ACC-pdf-bootcamp-notes"
    tema: autonomy

  - id: MM-DK-154
    text: "Work-Money Link Breaker: toll position + passive income + multiple streams + center-of-relationships + systems. Five mechanisms to decouple income from hours worked."
    source: "ACC-pdf-transcript"
    tema: business-model

  - id: MM-DK-155
    text: "Emotion Economy vs Feature Economy: Starbucks $8 cup = experience, not coffee. People pay for feelings, not features. Sell the emotion, price follows."
    source: "ACC-pdf-transcript"
    tema: pricing-psychology

  - id: MM-DK-156
    text: "What We Sell = confidence/certainty/control, NOT credentials/expertise. Clients buy the feeling of being handled. They buy certainty that their problem will be solved."
    source: "ACC-pdf-bootcamp-notes"
    tema: value-proposition

  - id: MM-DK-157
    text: "'Show Me the Law' — 90% of restrictions consultants follow are beliefs, not laws. Challenge every limitation. Most are self-imposed or industry-imposed, not legal."
    source: "ACC-pdf-bootcamp-notes"
    tema: mindset

  - id: MM-DK-158
    text: "Prepay Model: $18,600/yr chiro went from $10K/mo to $100K/mo with prepay. Advance payment transforms economics and client commitment simultaneously."
    source: "ACC-pdf-transcript"
    tema: business-model

  - id: MM-DK-159
    text: "4-Square-Block Trap → stretch to globe = 30% to 73% market share. Geographic/niche limitation is self-imposed. Expand the map, multiply the opportunity."
    source: "ACC-pdf-transcript"
    tema: market-expansion

  # L3 HEURISTICAS (15)
  - id: HEUR-DK-232
    text: "5-15-80 Rule: 5% buy everything you offer, 15% buy a lot, 80% buy nothing or minimal. Design offers for the 5% and 15%, don't chase the 80%."
    source: "ACC-pdf-bootcamp-notes"
    tema: client-economics

  - id: HEUR-DK-233
    text: "Only 4% check references — reputation is assumed not verified. Invest in perception management, not just results. Most clients never verify your claims."
    source: "ACC-pdf-transcript"
    tema: reputation

  - id: HEUR-DK-234
    text: "Never be prompt with a quote — timing = scarcity. Delayed response signals demand. Instant quotes signal desperation and availability."
    source: "ACC-pdf-bootcamp-notes"
    tema: fee-presentation

  - id: HEUR-DK-235
    text: "Higher caliber client = less important the guarantee. A-players don't need guarantees — they evaluate quality. Only B/C players demand safety nets."
    source: "ACC-pdf-transcript"
    tema: client-selection

  - id: HEUR-DK-236
    text: "20% buy premium version JUST because it is premium. They don't compare features — they buy the best available. Always have a premium tier."
    source: "ACC-pdf-bootcamp-notes"
    tema: pricing

  - id: HEUR-DK-237
    text: "Be asked 3x before answering about fee. Let them demonstrate commitment through persistence. Three asks = genuine interest, not tire-kicking."
    source: "ACC-pdf-transcript"
    tema: fee-presentation

  - id: HEUR-DK-238
    text: "Coaching group size rules: <=12 use boardroom format (intimate discussion), >12 use hot seat with stool format (performance-based). Format must match group size."
    source: "ACC-pdf-bootcamp-notes"
    tema: coaching-operations

  - id: HEUR-DK-239
    text: "Call order in group coaching: weak speakers between good ones, non-answerers called before breaks. Choreograph the energy flow of every group session."
    source: "ACC-pdf-bootcamp-notes"
    tema: coaching-delivery

  - id: HEUR-DK-240
    text: "Begin narrow, fuzzy edges — niche to broad market. Start hyper-specialized, then gradually expand. Never start broad and try to narrow."
    source: "ACC-pdf-transcript"
    tema: positioning

  - id: HEUR-DK-241
    text: "8 KPIs for coaching business: CPL (cost per lead), ACPL (acceptable CPL), CPS (cost per sale), ACPS (acceptable CPS), ATS (average transaction size), NCI (new customer intake), LCV (lifetime customer value), ICE (income per consulting engagement)."
    source: "ACC-pdf-bootcamp-notes"
    tema: business-metrics

  - id: HEUR-DK-242
    text: "28 Core Competencies benchmark for self-management. Score yourself across 28 dimensions. Identify gaps. Work on weakest links first."
    source: "ACC-pdf-bootcamp-notes"
    tema: self-development

  - id: HEUR-DK-243
    text: "Membership overlay economics: 200 members × $29.95/mo + $39.95 coupon booklets = $92K/mo. Layering membership on coaching creates predictable recurring revenue."
    source: "ACC-pdf-transcript"
    tema: business-model

  - id: HEUR-DK-244
    text: "4x fee increase in 12 months = 3x fee with ZERO client loss. Most consultants can triple prices without losing anyone. Fear of price increase is irrational."
    source: "ACC-pdf-transcript"
    tema: pricing

  - id: HEUR-DK-245
    text: "Cosmetic dentist: $35K average case via emotional positioning. Sell transformation not procedure. Emotional framing multiplies willingness to pay."
    source: "ACC-pdf-transcript"
    tema: positioning

  - id: HEUR-DK-246
    text: "48:1 ROI from extreme specialist positioning. Narrow niche + deep expertise + reputation = exponential return on positioning investment."
    source: "ACC-pdf-bootcamp-notes"
    tema: positioning

  # L4 FRAMEWORKS (10)
  - id: FW-DK-137
    text: "Member Retention 5 Feelings Framework: members stay when they feel (1) Gold Stars (recognition), (2) Acceptance (belonging), (3) Fraternity (community), (4) Womb (safety/comfort), (5) Futurism (progress/growth). Engineer all five."
    source: "ACC-pdf-bootcamp-notes"
    tema: retention

  - id: FW-DK-138
    text: "Dependency Building 5-Layer Framework: (1) Frequency of contact, (2) Multiple roles (coach + friend + advisor), (3) Emotional needs fulfilled, (4) Conduit to other relationships, (5) Pain of exit (what they'd lose). Build all five layers."
    source: "ACC-pdf-bootcamp-notes"
    tema: retention

  - id: FW-DK-139
    text: "Relationship Boundaries 13 Rules: (1) Restrict social interaction, (2) No dating clients/family/employees, (3) Pick up tabs strategically, (4) Control who approaches you, (5-13) Additional boundary protocols. Professional distance = premium positioning."
    source: "ACC-pdf-transcript"
    tema: professional-ethics

  - id: FW-DK-140
    text: "Fee Presentation 3 Mistakes + Prerequisites: Mistakes: (1) answering too soon, (2) downselling preemptively, (3) switching to salesman mode. Prerequisites: environment desensitization, reputation pre-framing, emotional commitment built."
    source: "ACC-pdf-transcript"
    tema: fee-presentation

  - id: FW-DK-141
    text: "Takeaway Selling Power Phrases (8 phrases): 'This may not be for you,' 'I'm not sure I can help,' 'We're selective about who we work with,' 'There's a waiting list,' 'I'd need to think about whether this is a fit,' + 3 variations. Reverse psychology in sales."
    source: "ACC-pdf-bootcamp-notes"
    tema: sales-strategy

  - id: FW-DK-142
    text: "Scarcity Offer Framework: every offer = history-making event. Components: (1) first-time-ever or last-time-ever framing, (2) limited quantity, (3) deadline, (4) waiting list reference, (5) social proof of demand. Nothing mediocre."
    source: "ACC-pdf-transcript"
    tema: offer-design

  - id: FW-DK-143
    text: "10 Big Lessons Framework: (1) majority screw up, (2) higher price = more implementation, (3) referrals are earned not asked, (4) systems beat talent, (5) niche beats broad, (6) speed of implementation matters, (7) environment shapes behavior, (8-10) additional lessons. Distilled from 30+ years."
    source: "ACC-pdf-bootcamp-notes"
    tema: coaching-wisdom

  - id: FW-DK-144
    text: "Integrity Framework 7 Don'ts: (1) Don't promise what you can't deliver, (2) Don't take clients you can't help, (3) Don't keep fees if no value delivered, (4) Don't badmouth competitors with lies, (5) Don't steal IP, (6) Don't exploit client vulnerability, (7) Don't confuse selling with deceiving."
    source: "ACC-pdf-bootcamp-notes"
    tema: professional-ethics

  - id: FW-DK-145
    text: "Money Mindset 4 Forces: (1) Decide exactly what you want financially, (2) Plant seeds daily (marketing, relationships, content), (3) Ask for the money (don't hint), (4) Act on opportunities immediately. All four forces compound."
    source: "ACC-pdf-transcript"
    tema: wealth-psychology

  - id: FW-DK-146
    text: "Appearance & Staging Framework ('Sinatra doesn't move pianos'): (1) Dress above your market, (2) Office/environment signals premium, (3) Materials are high-quality, (4) Never do logistics yourself, (5) Every touchpoint reinforces premium positioning."
    source: "ACC-pdf-bootcamp-notes"
    tema: positioning

  # L5 METODOLOGIAS (8)
  - id: MET-DK-095
    text: "Cold Client 4-Step Method: (1) Build hit list of 100 ideal targets, (2) Relentless presence for 90+ days (unusual items, not brochures), (3) Diagnostic first conversation (essay questions, listen), (4) Wow box delivery (bobbleheads, books with post-its, personalized items)."
    source: "ACC-pdf-bootcamp-notes"
    tema: prospecting

  - id: MET-DK-096
    text: "Testimonial Collection 7 Steps: (1) Identify best results, (2) Ask specific questions (not 'say something nice'), (3) Record video if possible, (4) Get signed release, (5) Use their language not yours, (6) Include specifics (numbers, timeframes), (7) Categorize by objection they overcome."
    source: "ACC-pdf-bootcamp-notes"
    tema: social-proof

  - id: MET-DK-097
    text: "Info Business Pipeline 3 Levels: Level 1 — free content for audience building (articles, podcast). Level 2 — low-ticket products for list monetization ($19-$97). Level 3 — high-ticket programs for profit ($997-$50K+). Each level feeds the next."
    source: "ACC-pdf-transcript"
    tema: business-model

  - id: MET-DK-098
    text: "Escaping Billable Hours 11 Methods: (1) Group coaching, (2) Membership programs, (3) Licensing IP, (4) Certification programs, (5) Books/courses, (6) Speaking fees, (7) Royalties, (8) Toll position access fees, (9) Event ticket sales, (10) Joint ventures, (11) Equity with sale triggers."
    source: "ACC-pdf-bootcamp-notes"
    tema: business-model

  - id: MET-DK-099
    text: "12 Ways to Promote Yourself: (1) Speaking, (2) Writing/publishing, (3) Media appearances, (4) Association leadership, (5) Teaching/adjunct, (6) Awards/recognition, (7) Joint ventures, (8) Charitable involvement, (9) Controversial positions, (10) Books, (11) Newsletters, (12) Strategic alliances."
    source: "ACC-pdf-bootcamp-notes"
    tema: self-promotion

  - id: MET-DK-100
    text: "Industry Survey Strategy: (1) Design survey for target industry, (2) Send to 100 decision makers, (3) 77/100 respond (proven response rate), (4) Compile results into report, (5) Share findings — positions you as industry authority, (6) Convert survey respondents into consulting relationships."
    source: "ACC-pdf-bootcamp-notes"
    tema: prospecting

  - id: MET-DK-101
    text: "Rent-A-Person-of-Influence Strategy: (1) Identify recognized authority (celebrity, industry leader), (2) Negotiate rental/appearance deal, (3) Use their name and presence at your event/offer, (4) Extract premium from attendees who want access, (5) Borrow credibility through proximity."
    source: "ACC-pdf-transcript"
    tema: positioning

  - id: MET-DK-102
    text: "Prepay Implementation Method: (1) Calculate annual service value ($18,600/yr chiro example), (2) Offer prepay at discount, (3) Collect upfront, (4) Deliver over time, (5) Result: $10K/mo → $100K/mo transformation. Prepay changes business economics fundamentally."
    source: "ACC-pdf-transcript"
    tema: business-model

# ═══════════════════════════════════════════════════════════════
# SOURCE: MAGNETIC MARKETING (MM) — DK-MM-01 (01-magnetic-marketing-system)
# Files: 7 (3 video transcriptions + 4 PDF transcriptions)
# ═══════════════════════════════════════════════════════════════

L1_FILOSOFIAS_MM:
  - id: FIL-DK-177
    text: "Magnetic marketing transforms you from unwelcome pest to trusted guest — there's no middle ground. If you change that status, you automatically change everything."
    source: "MM-01-mod1"
    tema: magnetic-marketing-core

  - id: FIL-DK-178
    text: "Until you have an affordable, efficient, dependable means of attracting a sufficient flow of qualified buyers, you cannot get rich and you may very well starve."
    source: "MM-01-mod1"
    tema: marketing-primacy

  - id: FIL-DK-179
    text: "You can have the most wonderful product or greatest service ever invented and still starve. You can be a spectacular salesperson and still starve. Product excellence is not enough."
    source: "MM-01-mod1"
    tema: marketing-primacy

  - id: FIL-DK-180
    text: "Too many people wind up owned by their business rather than owners of their businesses. Not realizing that marketing IS the business."
    source: "MM-01-mod1"
    tema: business-philosophy

  - id: FIL-DK-181
    text: "Image advertising was invented for companies with unlimited budgets. It doesn't work for small to medium-sized businesses. The only way to advertise is with direct response marketing."
    source: "MM-01-mod1"
    tema: direct-response

  - id: FIL-DK-182
    text: "Results rule period. Do not let anyone confuse, bamboozle or convince you that anything else is of any importance. Nobody's opinion counts — even yours."
    source: "MM-01-mod1"
    tema: results-orientation

  - id: FIL-DK-183
    text: "Marketing incest — when everyone in an industry only copies each other. It works just like real incest: in a short period of time, everybody gets dumber and dumber."
    source: "MM-01-mod1"
    tema: innovation

  - id: FIL-DK-184
    text: "All great advancements in businesses come from outside the box, not inside the box. Innovation comes from cross-industry transfer."
    source: "MM-01-mod1"
    tema: innovation

  - id: FIL-DK-185
    text: "If you want your marketing done by somebody who really knows what he's doing, you must own your marketing. (Ogilvy principle)"
    source: "MM-01-mod1"
    tema: marketing-ownership

  - id: FIL-DK-186
    text: "The only way anybody ever makes a decision to respond to anything is on an emotional level. Then we apply logic to make ourselves feel good about what we decided to do in the first place."
    source: "MM-01-mod3"
    tema: emotional-selling

  - id: FIL-DK-187
    text: "Save your money. Never do one-shot mail. What makes people think they can send one crummy golden rod flyer and get a stampede of response?"
    source: "MM-01-mod3"
    tema: direct-mail

  - id: FIL-DK-188
    text: "Much more often than not, the long letter works better than the short letter. Would you send a live salesperson with this instruction: whatever you do, don't say more than 200 words?"
    source: "MM-01-mod2"
    tema: copywriting

  - id: FIL-DK-189
    text: "The customer is an asset to be acquired by investment and to be taken care of and maintained. You have an opportunity to start at value A and build all the way to value B."
    source: "MM-01-mod3"
    tema: customer-value

  - id: FIL-DK-190
    text: "You can't be Amazoned without your permission. Their message is fast, cheap, choices — a pretty small territory. You need a different message of your own."
    source: "MM-01-mod1"
    tema: positioning

  - id: FIL-DK-191
    text: "On the internet especially, there's a popular idea that content is king. I would disagree. The sale is king."
    source: "MM-01-mod1"
    tema: sales-philosophy

  - id: FIL-DK-192
    text: "If you have break-even media, you should continue to use it over and over. You can't afford not to use it — it pays its own way and you're acquiring customers for free."
    source: "MM-01-mod2"
    tema: media-buying

  - id: FIL-DK-193
    text: "A lot of people balk at giving away valuable information, but that's a huge mistake. You give to get. If your LGM has no value, the prospect assumes your products have none either."
    source: "MM-01-mod2"
    tema: lead-generation

  - id: FIL-DK-194
    text: "If you don't have a good answer to 'What's new?', they go looking for it somewhere else. A bored customer goes elsewhere. They forget about you."
    source: "MM-01-mod3"
    tema: customer-retention

  - id: FIL-DK-195
    text: "Retention and repeat business is not an entitlement from excellent products and excellent service. It is also a result of excellent marketing."
    source: "MM-01-mod3"
    tema: customer-retention

  - id: FIL-DK-196
    text: "Price-Setting Self-Sovereignty: set price based on what YOU want, not competitors. Primary factor = how much money do you want. Competitive research is dangerous because intrinsic mindset = my price controlled by competitors."
    source: "MM-02-cd1"
    tema: pricing-strategy
  - id: FIL-DK-197
    text: "Zero Resistance = Underpriced: if you sell in true zero resistance environment, your prices are too low. Want ALMOST zero resistance. Some price pushback = healthy."
    source: "MM-02-cd1"
    tema: pricing-strategy
  - id: FIL-DK-198
    text: "Marketplace Self-Appraisal: marketplace takes you at your own appraisal. Decisions made in vacuum, one-on-one, based on what you say about yourself and what you ask for."
    source: "MM-02-cd1"
    tema: positioning
  - id: FIL-DK-199
    text: "World Revolves Around You: in your business, you should be most valuable person. Everyone else's first purpose = facilitate you doing what you do. Federal law over state law — your priorities over theirs."
    source: "MM-02-cd2"
    tema: leadership
  - id: FIL-DK-200
    text: "Stern But Loving Parent: most customers/patients come looking for the stern but loving parent (Kirby Landis). They want authority figure to take charge and tell them the rules."
    source: "MM-02-cd1"
    tema: sales-psychology
  - id: FIL-DK-201
    text: "When They Show Up Bill Them (Stuart Wild): stop doing anything for free unless specific strategy. There ain't no free lunch especially with me. $800/hr plus you pay the tab."
    source: "MM-02-cd1"
    tema: pricing-strategy
  - id: FIL-DK-202
    text: "Industry Norms = Normal Results: reason a thing is an industry norm = all normal people in industry do it. Normal = ordinary/average. Extraordinary results require breaking all rules."
    source: "MM-02-cd2"
    tema: contrarian-thinking
  - id: FIL-DK-203
    text: "Self-Appointment Works: marketplace cannot tell difference between self-appointed and credentialed. Public is totally outcome-oriented. Don't wait to be anointed by old dogs. Just jump up there (Ringer)."
    source: "MM-02-cd2"
    tema: positioning
  - id: FIL-DK-204
    text: "Immunity To Criticism: highly successful people become immune to criticism. Most important personal development you can do. Clinton example — bulletproof. George Bush 'I no longer give a shit.' Great power comes from this liberation."
    source: "MM-02-cd2"
    tema: mindset
  - id: FIL-DK-205
    text: "Testing Not Failing: don't think success/failure, think testing. In DR, we fail more often than succeed. 1 in 8 infomercials win. Challenge = determine what won't work as quick and cheap as possible."
    source: "MM-02-cd3"
    tema: testing-mindset
  - id: FIL-DK-206
    text: "Success Is Not A Straight Line: nobody gets anywhere in straight line. Tight zigzags vs loose zigzags — difference is clarity. Don't cause yourself pain by expecting straight path."
    source: "MM-02-cd3"
    tema: mindset
  - id: FIL-DK-207
    text: "Big Picture Optimist Detail Pessimist: smart entrepreneurs = big picture optimists + detail pessimists. Believe plane will get there (optimist) but assume it'll be late, food will be bad, baggage lost (pessimist). Believe in both Peale and Murphy's Law."
    source: "MM-02-cd5"
    tema: entrepreneurial-mindset
  - id: FIL-DK-208
    text: "Healthy Paranoia: just because you're paranoid doesn't mean they're not out to get you. Napoleon Hill's accurate thinking = dealing with reality positively without ignoring it."
    source: "MM-02-cd5"
    tema: business-protection
  - id: FIL-DK-209
    text: "Personal Satisfaction First: engineer enormous personal satisfaction into what you do. Nothing worse than success you don't like. Seinfeld walked away. Speaker said 'I'd rather be playing golf.' Top 10 things you don't want = clarity."
    source: "MM-02-cd2"
    tema: business-design
  - id: FIL-DK-210
    text: "Don't Abuse Customer Trust: when customers trust you, resist temptation to sell them crap. Undoes entire relationship. Their capacity to consume exceeds your capacity to provide — but quality must hold."
    source: "MM-02-cd6"
    tema: customer-trust
  - id: FIL-DK-211
    text: "Customers Are Power: person with customers has power, not person with product. In JVs, customer list owner deserves maximum money and gets it. Equity of business = the customer base."
    source: "MM-02-cd6"
    tema: business-value
  - id: FIL-DK-212
    text: "Product Superiority No Pre-Sale Advantage: best product = no marketplace advantage until after sale. They can only judge the story before buying. Still need best marketing. Books judged by covers."
    source: "MM-02-cd6"
    tema: marketing-reality

  - id: FIL-DK-213
    text: "Time Is The Only Non-Replaceable Asset: prospects, customers, money, physical assets — all replaceable and replenishable. The only thing you can't replenish is the minute we just used. Gone forever. Mindset must be protecting that as the most precious asset."
    source: "MM-03-cd1"
    tema: time-management
  - id: FIL-DK-214
    text: "Majority Is Always Wrong (Nightingale): if you have no successful role models, look at what the majority does and start by doing the opposite. Majority is always wrong, especially about money. 90% of 65-year-olds have less money than 90% of teenagers."
    source: "MM-03-cd1"
    tema: contrarian-thinking
  - id: FIL-DK-215
    text: "Radically Different Methods For Radically Different Results: normal time management built for cubicle workers who do 4 things a day. Entrepreneurs need completely different approach. Can't get extraordinary results with normal methods."
    source: "MM-03-cd1"
    tema: entrepreneurial-mindset
  - id: FIL-DK-216
    text: "Self-Imposed Discipline Over Self-Discipline: not teeth-gritting willpower (Maltz says that fails). Instead engineer commitments, deadlines, pre-scripted days so there IS no option. PT-109: 'Don't give me credit for heroism — the boat sank.'"
    source: "MM-03-cd1"
    tema: productivity
  - id: FIL-DK-217
    text: "Environment Shapes Productivity: can't do million dollar thinking in pauper environment. Psychological (triggers, photos, right 'place' per task type) + Practical (tools within reach). Different tasks warrant totally different environments."
    source: "MM-03-cd1"
    tema: productivity-environment
  - id: FIL-DK-218
    text: "Entrepreneurial Life Is Simultaneous Not Sequential: employees think sequentially. Entrepreneurs must build, market, staff, sell — all at the same time. Massive action = don't think sequentially, do it all. 'Which should I do first?' — all of them, they're all number one."
    source: "MM-03-cd2"
    tema: entrepreneurial-mindset
  - id: FIL-DK-219
    text: "Moral Authority Required For Time Demands: you must be living it before demanding it of others. Doctor showed up an hour late to his own time management class for staff — destroyed all credibility. Staff sitting there thinking 'bullshit.'"
    source: "MM-03-cd3"
    tema: leadership
  - id: FIL-DK-220
    text: "Recovery Time Is Essential: quiet time to think, regain perspective, recharge. Cell phones/email eliminated all natural recovery moments. Quantity of communication multiplied but quality suffered. Efficiency ≠ effectiveness (Drucker)."
    source: "MM-03-cd2"
    tema: productivity
  - id: FIL-DK-221
    text: "Positive Power Of Negative Preparation (Cramer): plan on your plan going wrong. Have Plan B and Plan C. Roy Disney as 'negative nabob' balanced Walt's optimism. Better to have parachute and not need it. Refusing to plan B just to fly positive thinking flag = stupid."
    source: "MM-03-cd1"
    tema: planning
  - id: FIL-DK-222
    text: "Word of mouth advertising is the most powerful, effective type of advertising — but it can't be bought by the page or minute, it must be created, stimulated and nurtured with truly creative techniques."
    source: "MM-04-cd1-1"
    tema: word-of-mouth
  - id: FIL-DK-223
    text: "Nothing you can ever say about you, no matter how well you say it, can have as much impact and credibility as something a disinterested third party says about you."
    source: "MM-04-cd1-1"
    tema: testimonials
  - id: FIL-DK-224
    text: "Little things mean a lot — one BB won't shatter a window, but solder 200 BBs together into a ball and that'll shatter the window. Don't look for one big magic marketing strategy, find lots of little things to improve."
    source: "MM-04-cd1-1"
    tema: incremental-improvement
  - id: FIL-DK-225
    text: "Stories sell, facts only tell — a true story about Bob Smith who doubled his business moves people more than the fact that 4,617 businesses purchased the program."
    source: "MM-04-cd1-2"
    tema: storytelling
  - id: FIL-DK-226
    text: "The postman is your bargain price sales force — no other media gives you the tremendous control over the sales process that direct mail does, for the delivery price of a postage stamp."
    source: "MM-04-cd1-3"
    tema: direct-mail
  - id: FIL-DK-227
    text: "The headline is the most important component part of any type of in-print advertising — it must work or nothing else matters. Next are subheads, then photo captions."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: FIL-DK-228
    text: "Real motivation is self-motivation — you cannot take control of someone else's thinking, motivate them, and keep them motivated purely through your external influence."
    source: "MM-04-cd2-2"
    tema: sales-management
  - id: FIL-DK-229
    text: "Excellence is a marketing strategy — invest as much time, effort and money in fostering quality in products and customer service as you do in advertising. That's where the real dividends come from."
    source: "MM-04-cd2-3"
    tema: excellence
  - id: FIL-DK-230
    text: "Speed matters — the elapsed time between impulse and implementation has a lot to do with the bottom line. Push, push and push some more to keep it to the shortest possible number of minutes."
    source: "MM-04-cd2-3"
    tema: speed-bias
  - id: FIL-DK-231
    text: "Work expands to fill the time available — that principle will kill you if you aren't careful. Positive pressure of tight deadlines and high expectations gets and keeps a business in high gear."
    source: "MM-04-cd2-3"
    tema: parkinson-law
  - id: FIL-DK-232
    text: "You should never try to teach a pig to sing — it only annoys the pig and you get covered with mud in the attempt. Some people are beyond turning around."
    source: "MM-04-cd2-2"
    tema: people-management
  - id: FIL-DK-233
    text: "Most businesses have unfulfilled potential to do more business more frequently with existing customers — this can be a tremendous source of increased profitability."
    source: "MM-04-cd2-1"
    tema: customer-monetization
  - id: FIL-DK-234
    text: "The customer who refers once can and will refer many more times if motivated to do so — once they've referred, work that gold mine."
    source: "MM-04-cd1-1"
    tema: referrals
  - id: FIL-DK-235
    text: "Confucius said, dig the well before you thirst — you can usually head off an oncoming slump with effective promotion and marketing strategy before it hits."
    source: "MM-04-cd2-1"
    tema: proactive-marketing
  - id: FIL-DK-236
    text: "Asking for the order is what separates the poorly paid professional visitor from the kingly compensated professional salesperson (Zig Ziglar). Same in print — tell the reader exactly what you want them to do."
    source: "MM-04-cd1-4"
    tema: closing
  - id: FIL-DK-237
    text: "Continual frequent rethinking of what your business is, should be, can be, and will be is a great success strategy. McDonald's began as hamburger stand, became commercial real estate empire."
    source: "MM-04-cd2-3"
    tema: business-redefinition

L2_MODELOS_MENTAIS_MM:
  - id: MM-DK-160
    text: "Pest-to-Guest Continuum: man banging on door = pest. But when your yard is on fire, that same man becomes the most welcomed guest ever. Change the context from stalking to solving, and you change everything."
    source: "MM-01-mod1"
    tema: magnetic-marketing-core

  - id: MM-DK-161
    text: "Market-Message-Media Triangle: you must get the right MESSAGE to the right MARKET via the right MEDIA. If you're off in any one, you waste money and likely have abject failure."
    source: "MM-01-mod2"
    tema: marketing-strategy

  - id: MM-DK-162
    text: "A-Pile vs B-Pile: most people sort mail over a wastebasket. A-pile = bills, letters from friends (gets opened). B-pile = everything else (gets trashed). We must be in the A-pile."
    source: "MM-01-mod2"
    tema: direct-mail

  - id: MM-DK-163
    text: "Sales Letter as Salesman-in-Envelope: think of your letter as a sales representative fortunate enough to get delivered for the price of a cup of coffee."
    source: "MM-01-mod2"
    tema: copywriting

  - id: MM-DK-164
    text: "Widget Bridge: a mundane business becomes a totally different business. A new business is invented WITHIN the business. That new business becomes the widget. (Stupak: hotel → widget-selling business)"
    source: "MM-01-mod1"
    tema: business-model

  - id: MM-DK-165
    text: "Collection Letter Linkage: first notice, second notice, third notice, 15 days apart. If this gets money from people who haven't got any, offering nothing — imagine what happens when you offer something great to people who HAVE money."
    source: "MM-01-mod3"
    tema: direct-mail

  - id: MM-DK-166
    text: "Three Self-Destructive Myths: (1) 'My business is different.' (2) 'My advertising has to fit industry norms.' (3) 'Tacky mail-order advertising doesn't work.' All three are wrong."
    source: "MM-01-mod1"
    tema: mindset

  - id: MM-DK-167
    text: "Random and Erratic Acts of Marketing: disconnected investments in attempted marketing. This is chaos. A system by definition is reliable, predictable and consistent."
    source: "MM-01-mod1"
    tema: systems

  - id: MM-DK-168
    text: "Cold Prospecting = Coal Mining: dirty, filthy, ugly, smelly, sweaty work best left to people who earn minimum wage with brawn, not maximum wage with brain."
    source: "MM-01-mod1"
    tema: lead-generation

  - id: MM-DK-169
    text: "Frontend vs Backend: Frontend = outreach to attract/acquire new leads and customers. Backend = developing, retaining customers, increasing frequency and repeat business."
    source: "MM-01-mod3"
    tema: business-model

  - id: MM-DK-170
    text: "Goodyear Blimp Model: image advertising = blimp over stadium (nobody responds). Target marketing = parking the blimp right over someone with threadbare tires."
    source: "MM-01-mod1"
    tema: targeting

  - id: MM-DK-171
    text: "Salmon Swimming Upstream (Gary Halbert): mail pieces are little salmon fighting upstream. We must give them power boats — personal look, real stamps, plain envelopes."
    source: "MM-01-mod2"
    tema: direct-mail

  - id: MM-DK-172
    text: "National Enquirer Headline Acid Test: take your headline out of context, run it as a classified ad with just 'Box 3, Grand Central Station, NY.' Would anybody respond? If not, headline fails."
    source: "MM-01-mod3"
    tema: copywriting

  - id: MM-DK-173
    text: "Emotional Payoff > Functional Benefit: new dentures functionally = eat better. Emotionally = never being embarrassed about smiling again. Sell the emotional payoff."
    source: "MM-01-mod3"
    tema: emotional-selling

  - id: MM-DK-174
    text: "Enlarged Business Card vs Miniaturized Sales Letter: most ads are enlarged business cards (worthless). Winning approach is a miniaturized sales letter with headlines, benefits, copy."
    source: "MM-01-mod2"
    tema: advertising

  - id: MM-DK-175
    text: "Straight Face Test: first qualification for high prices = keeping straight face when quoting fee. Practice in front of mirror. Body language gives you away if you don't believe your own price."
    source: "MM-02-cd1"
    tema: pricing-psychology
  - id: MM-DK-176
    text: "Pre-Pay Compliance Model: quote entire case upfront. Chiropractic prepay avg $7K in early 1980s. Compliance goes up dramatically — patients who prepay have much higher success rate vs $30/visit pay-as-you-go."
    source: "MM-02-cd1"
    tema: pricing-strategy
  - id: MM-DK-177
    text: "Vacuum Principle (Customer Firing): fire problem customers → vacuum fills with better ones. If not confident vacuum fills = you have marketing problem, not customer problem."
    source: "MM-02-cd2"
    tema: customer-management
  - id: MM-DK-178
    text: "80/20 Customer Problem Rule: 20% of customers give 80% of problems. Maybe 85/15 or 90/10. Same true with employees. Surgically remove problem ones as early as detected."
    source: "MM-02-cd2"
    tema: management
  - id: MM-DK-179
    text: "Wise Man Mountain Access: no long line to wise man at bottom of mountain. Appreciation, respect, compliance, and money are in direct proportion to how high the mountain is and how scarred they get climbing it."
    source: "MM-02-cd4"
    tema: positioning
  - id: MM-DK-180
    text: "Gross vs Net Confusion: lots of gross ≠ some net. Problems multiply when you multiply gross, not go away. Net is the only number that counts. Know net by segment, not just whole business."
    source: "MM-02-cd3"
    tema: financial-thinking
  - id: MM-DK-181
    text: "Compartmentalization (Close File Open File): like computer — close file, open next file. Coach resets between plays. Train yourself to shift instantly. Went from horse race finish line to conference call in 5 minutes, fully focused."
    source: "MM-02-cd4"
    tema: productivity
  - id: MM-DK-182
    text: "Core Competency Factor: don't give expert in one area credit for expertise in all areas. Sort what they know from experience vs what they cheerfully talk about without knowledge. 4 failed infomercials ≠ infomercial expert."
    source: "MM-02-cd5"
    tema: advisory
  - id: MM-DK-183
    text: "5-90-5 Theft Rule: 5% never steal. 5% always steal compulsively. 90% in between will steal given 3 conditions: believe undetected + perceived need + can rationalize. Only detection is controllable."
    source: "MM-02-cd5"
    tema: business-protection
  - id: MM-DK-184
    text: "Count The Cookies System: show them you're counting. Johnny: 24 cookies, you and I are only ones home, first thing I do when I return is count. Same principle for employees and vendors."
    source: "MM-02-cd5"
    tema: business-protection
  - id: MM-DK-185
    text: "Differentiation Hierarchy: 5 ways to escape commodity pricing: Product, Process, Personality, Service, Smarter Marketing. If no differentiation given = buyer decides by price only."
    source: "MM-02-cd6"
    tema: differentiation
  - id: MM-DK-186
    text: "Second Sale More Important Than First: after first purchase, focus on getting second quickly. After 4th purchase = customer for life. Dry cleaning proven. Job of first sentence = get them to read second."
    source: "MM-02-cd6"
    tema: customer-retention
  - id: MM-DK-187
    text: "Knockoff Defense Speed: if successful, you'll get knocked off — certainty. Only option = invent faster than they copy. Ray Kroc: we invent faster than they copy. Accept 3-month window."
    source: "MM-02-cd6"
    tema: competitive-strategy
  - id: MM-DK-188
    text: "Trade-Off Factor: everything has pluses and minuses, price tag. Know your non-negotiables. DK: no employees, ever. Jeff Paul: no tie, ever. Engineer business around what you refuse to tolerate."
    source: "MM-02-cd2"
    tema: business-design

  - id: MM-DK-189
    text: "Script vs Schedule: schedule = appointments for the day. Script = every minute of the day. Movie analogy — can't shoot a movie with an outline. Harold walking to chair = predetermined seconds. That's the difference."
    source: "MM-03-cd2"
    tema: time-management
  - id: MM-DK-190
    text: "Kissinger Principle: 'No more crisis this week — I'm fully booked.' If all time is pre-assigned, waste literally cannot occur. Supply that doesn't exist can't be wasted or abused."
    source: "MM-03-cd1"
    tema: time-management
  - id: MM-DK-191
    text: "Empty Picture Frame (Arnold Palmer): always have visible space for next win. Palmer embedded medallions in table, always routed hole for next one. Message: you ARE going to get the next one. Psychological trigger for subconscious."
    source: "MM-03-cd1"
    tema: goal-setting
  - id: MM-DK-192
    text: "Forced Appointment Setting: send mail ahead, route yourself, tell them 'expect me at 10, Joe at 11, Charlie at 12.' Result: 80% saw him vs 20% for average rep doing cold walk-ins. Sales manager asked him to take Fridays off — making everyone look bad."
    source: "MM-03-cd1"
    tema: sales-productivity
  - id: MM-DK-193
    text: "Predictive vs Historical Indicators: time targets predict money results. End-of-month sales review = always too late, that's historical. Current time use = predictive indicator. Met all time targets today = very predictive of bank balance at month end."
    source: "MM-03-cd3"
    tema: performance-measurement
  - id: MM-DK-194
    text: "Designated Days Principle: phone days where ALL calls clumped. Writing days where ALL you do is write. Office days for accumulated faxes/correspondence/bookkeeping. Each function group gets dedicated day. No frustration about 'not getting other stuff done.'"
    source: "MM-03-cd2"
    tema: time-management
  - id: MM-DK-195
    text: "12-Minute Call Protocol: start every call saying 'I've got 12 minutes.' Conditions everyone to be efficient. Coaching calls = 14-min slots back-to-back. At 14 minutes, hang up mid-sentence about impending Armageddon. They learn."
    source: "MM-03-cd2"
    tema: communication
  - id: MM-DK-196
    text: "Conversation Planner Per Person: one card/page per frequent contact. Cluster questions instead of 16 interruptions/day. Also serves as delegation/supervision tracker — if item not checked off, hold them accountable next call."
    source: "MM-03-cd1"
    tema: communication
  - id: MM-DK-197
    text: "Question-Free Communication: FedEx to assistant 2-3x/week. Goal = she doesn't need to ask 5 questions before dispensing. Forces thorough thinking. Post-it notes on everything. Discipline for both sides."
    source: "MM-03-cd2"
    tema: delegation
  - id: MM-DK-198
    text: "Baby Steps + One Thing Rule (Thalheimer/Sharper Image): break goal to daily to-do. Refuse to end ANY day without doing something toward the goal. Wrote 4 books last year, one hour a day. Nothing gets done in occasional big leaps."
    source: "MM-03-pdf"
    tema: goal-achievement
  - id: MM-DK-199
    text: "Disney Referral Model: find ways to do what you do so well and so uniquely that customers CANNOT RESIST telling lots of other people about you. Disney's #1 memorable factor = cleanliness, #2 = authenticity. Then Harry tells friends in Dubuque, and 4 more families bring money to the mouse."
    source: "MM-04-cd1-1"
    tema: word-of-mouth
  - id: MM-DK-200
    text: "BB Ball Thinking: individual improvements are like single BBs — one won't shatter a window. But solder 200 together and it will. Stop looking for one big magic strategy; accumulate lots of little improvements. Dentist found 700 things to change and 10x'd his practice."
    source: "MM-04-cd1-1"
    tema: incremental-improvement
  - id: MM-DK-201
    text: "Circle of Influence Model: average person has immediate circle of 52 people. Average satisfied customer tells only 3. Moving from 3→52 requires action: recognition, appreciation, gifts. Each customer could bring you 50 more."
    source: "MM-04-cd1-1"
    tema: referrals
  - id: MM-DK-202
    text: "Ducks To Water: how do ducks go to water? One behind the other. Referral customers are pre-conditioned to refer — they arrived via referral, so they're already in the referral mindset. Use existing customers as proof points."
    source: "MM-04-cd1-2"
    tema: referral-momentum
  - id: MM-DK-203
    text: "Geographic vs Category Target Marketing: use existing customers to target (A) same geographic area — other tenants in same complex, or (B) same customer type — other architect firms. One architect leads to another."
    source: "MM-04-cd1-2"
    tema: testimonial-marketing
  - id: MM-DK-204
    text: "Double Readership Path: design copy for two types — analytical (reads everything, wants maximum information) AND impulsive (skims headlines/subheads/captions, wants message quickly). Headline + subheads + captions + response device must tell complete story alone."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: MM-DK-205
    text: "80/20 Sales Organization: 80% of sales from 20% of reps, 80% of problems from 20% of reps. As long as it's not the same 20%, you're in good shape. Divert attention from mediocre to high performers for fastest results."
    source: "MM-04-cd2-2"
    tema: sales-management
  - id: MM-DK-206
    text: "80/20 Business Mix: 80% of profits from 20% of your business, 80% of problems from 20%. Analyze and redesign — cut the losing parts. Same 80/20 as in sales orgs but applied to products/divisions/customer types."
    source: "MM-04-cd2-3"
    tema: business-analysis
  - id: MM-DK-207
    text: "Product vs Marketing Breakthrough: every business has opportunity for one or both. Sharper Image chose marketing (opened retail stores). Nightingale-Conant chose product (tape albums from best-selling books). Which breakthrough does YOUR business need?"
    source: "MM-04-cd2-3"
    tema: business-growth
  - id: MM-DK-208
    text: "Railroad Thinking Trap: they mistakenly thought they were in the railroad industry instead of the transportation industry. Constantly redefine what business you're in. Avon = Avon Ladies → mail-order fashion → retail cosmetics → co-worker selling."
    source: "MM-04-cd2-3"
    tema: business-redefinition
  - id: MM-DK-209
    text: "Cleanliness As Marketing Model: Disney treats park cleanliness as MARKETING, not just maintenance. Think of the 'cleanliness equivalent' in your business — what routine operational excellence becomes your referral trigger?"
    source: "MM-04-cd1-1"
    tema: operational-excellence
  - id: MM-DK-210
    text: "McDonald's Redefinition Model: began as a hamburger stand. Today among other things, McDonald's is a huge commercial real estate company investing in building a property empire with franchisee leases as funding. What business are you REALLY in?"
    source: "MM-04-cd2-3"
    tema: business-redefinition

L3_HEURISTICAS_MM:
  - id: HEUR-DK-247
    text: "Giorgio 3-step response rate: 2-7% from 2,000 households. Restaurant booked 140 dinners. Thousands of businesses have replicated 2%, 5%, even 7% response."
    source: "MM-01-mod3"
    tema: direct-mail

  - id: HEUR-DK-248
    text: "3-step letter timing: Letter 1 → 15 days → Letter 2 → 10 days → Letter 3 (+ optional postcard). Total campaign span: ~25 days."
    source: "MM-01-mod3"
    tema: direct-mail

  - id: HEUR-DK-249
    text: "Market domination achievable in 45 days or less: for the price of 3 letters and a postcard, become the dominant presence in your category in your chosen target market."
    source: "MM-01-mod3"
    tema: market-domination

  - id: HEUR-DK-250
    text: "Auto parts store 3-letter campaign: $100 back for every $1 invested, running nonstop for 10+ years. Proof that good campaigns have extreme longevity."
    source: "MM-01-mod1"
    tema: roi

  - id: HEUR-DK-251
    text: "Direct mail test quantity: 200-300 units is sufficient for local business to test whether a campaign works."
    source: "MM-01-mod3"
    tema: testing

  - id: HEUR-DK-252
    text: "Never mail once: always send minimum 3-step sequence within total span of 3 weeks. Single-piece mail is throwing money away."
    source: "MM-01-mod2"
    tema: direct-mail

  - id: HEUR-DK-253
    text: "Stupak Widget: $396 buys 2 nights/3 days suite + champagne + unlimited drinks + $600 gambling money + show tickets. Result: 90-100% occupancy at worst hotel on strip."
    source: "MM-01-mod1"
    tema: widgets

  - id: HEUR-DK-254
    text: "Non-personal bulk mail loss cascade: lose 40% in postal delivery + 40% in mailroom + secretary filters more = only 10% of entire mailing reaches the target."
    source: "MM-01-mod2"
    tema: direct-mail

  - id: HEUR-DK-255
    text: "Real response rate math: '1% response' on bulk mail is actually 10% of the 10% that had a chance to work. The real response rate is much higher than the gross number suggests."
    source: "MM-01-mod2"
    tema: metrics

  - id: HEUR-DK-256
    text: "Contact past customers at least monthly with new widget offers. If not more often, they are hearing from you and getting a new widget offered."
    source: "MM-01-mod3"
    tema: customer-retention

  - id: HEUR-DK-257
    text: "64-page sales letter test: every time pages were added, response went up more than enough to justify the cost. No upper limit found."
    source: "MM-01-mod2"
    tema: copywriting

  - id: HEUR-DK-258
    text: "Chiropractic 3-step campaign: 2,000 names → 120 new introductions → 40 new patients. Each patient worth $1,000-$4,000. ROI: massive."
    source: "MM-01-mod2"
    tema: roi

  - id: HEUR-DK-259
    text: "Stable campaign longevity: financial advisor campaigns used 7-10x/year with nominal changes for 5+ years. Dentist campaigns locked down for almost 7 years."
    source: "MM-01-mod3"
    tema: campaign-longevity

  - id: HEUR-DK-260
    text: "Valpak expected ROI: break-even to 2:1 is typical. Some advertisers hit 5x, 10x, even 20x. Break-even = FREE customer acquisition."
    source: "MM-01-mod2"
    tema: roi

  - id: HEUR-DK-261
    text: "National direct mail campaigns profitable at 1/8 of 1% response rate. If profitable at that level, imagine what local targeted mail can achieve."
    source: "MM-01-mod2"
    tema: metrics

  - id: HEUR-DK-262
    text: "Double copy in Yellow Pages = more than double the response. Every test of increased copy length showed disproportionate response gains."
    source: "MM-01-mod2"
    tema: copywriting

  - id: HEUR-DK-263
    text: "Giorgio romance dinner price: $59.95 all-inclusive (5-course meal, strolling violinist, rose, chocolates, souvenir photo). Letter 2 escalation adds stretch limo."
    source: "MM-01-vault"
    tema: widgets

  - id: HEUR-DK-264
    text: "Drive target neighborhoods between 5-7 PM to assess market fit: observe lawns, cars, toys, windows, attire. If residents can't afford what you sell, pick different neighborhood."
    source: "MM-01-mod2"
    tema: targeting
  - id: HEUR-DK-265
    text: "Price Shock Direction: If prospects express surprise at how LOW your price is, you're going wrong direction. Want them shocked by how HIGH. Like racetrack: never bet enough on a winning horse."
    source: "MM-02-cd1"
    tema: pricing
  - id: HEUR-DK-266
    text: "Never Same-Day Callback: Never take inbound call from prospect or call back same day. Started as marketing strategy when broke. Today it's practical reality. Delay = positioning of success."
    source: "MM-02-cd1"
    tema: positioning
  - id: HEUR-DK-267
    text: "Problem Customer Revenue Trap: Client spending $100K/year but costing $300K in time/energy/staff = fire them. Less gross, more margin. Sales managers make same mistake with salespeople."
    source: "MM-02-cd2"
    tema: customer-management
  - id: HEUR-DK-268
    text: "Sacrifice Principle for Employees: Fire the worst problem employee → all others knew you should have done it sooner → they give you credit → productivity temporarily jumps → they realize you WILL fire someone."
    source: "MM-02-cd2"
    tema: management
  - id: HEUR-DK-269
    text: "Compliance Through Penalty: Show penalty for non-compliance publicly → everyone else complies better. Newsletter publisher canceled jerk subscribers publicly in next issue → all remaining subscribers became better."
    source: "MM-02-cd2"
    tema: customer-management
  - id: HEUR-DK-270
    text: "Urgency In Minutes Not Hours: Minutes matter. 'I left messages and they haven't called back' = did NOTHING. Correct response = be at UPS terminal at 11pm looking for boxes. Trump: 10 minutes to fix bathroom or you're fired."
    source: "MM-02-cd4"
    tema: urgency
  - id: HEUR-DK-271
    text: "Fortune 500 CEO Productivity: Average CEO gets less than 30 productive minutes per day. Calculate the dollar value of going from 30 to 33 minutes. Small shifts toward productivity give enormous payoffs."
    source: "MM-02-cd4"
    tema: time-management
  - id: HEUR-DK-272
    text: "Calculate Your Minute Worth: Do the math — what must your minutes be worth for desired income? Once you know, you get angry when people waste them. Anger drives you to fix the problem."
    source: "MM-02-cd4"
    tema: time-management
  - id: HEUR-DK-273
    text: "5am Writing Regimen: Write 1-2 hours every morning before any interruption. Decision of WHAT to write made night before. No pondering, no shuffling. Too many exceptions = no regimen anymore."
    source: "MM-02-cd4"
    tema: productivity
  - id: HEUR-DK-274
    text: "Only Talk To 8s 9s and 10s: Never be face-to-face or on phone with prospect below 8 on readiness-to-buy scale. If spending time with 2s/3s/4s = you don't have time management problem, you have marketing problem."
    source: "MM-02-cd4"
    tema: sales-qualification
  - id: HEUR-DK-275
    text: "Never Meet At Restaurant First: Make them come to your office, then go to restaurant together. When they're 30 min late, you're on phone making money, not reading magazine. Then let them wait in your lobby 10 min."
    source: "MM-02-cd4"
    tema: time-management
  - id: HEUR-DK-276
    text: "1-in-8 Winner Ratio: In infomercials, 1 winner per 8 shows = terrific industry record. If framed as success/failure, you'd quit after 7 flops. Frame as testing = just keep going."
    source: "MM-02-cd3"
    tema: testing-mindset
  - id: HEUR-DK-277
    text: "72 Things For 1 Each: 'I don't know one thing to get 72 new patients/month. But I know 72 things to get 1 new patient each. And I do all 72.' Diversity of lead generation methods beats magic bullet."
    source: "MM-02-cd6"
    tema: lead-generation
  - id: HEUR-DK-278
    text: "Break-Even Acquisition = Dance In Streets: Any method acquiring customers at break-even or better = keep doing it. Don't stop profitable method because another is MORE profitable. Do all 10 methods if all acceptable."
    source: "MM-02-cd6"
    tema: customer-acquisition
  - id: HEUR-DK-279
    text: "One Variable Testing Rule: Test one variable at a time against control. Change headline + price + photo = accomplished nothing because you don't know what worked. Requires enormous patience but payoff justifies it."
    source: "MM-02-cd6"
    tema: testing
  - id: HEUR-DK-280
    text: "Specialization Price Multiplier: Same product specialized = 3-5x higher price. Time management generic $69-99. For dentists $300. For orthodontists with multiple offices $500-700. Tighter specialization = higher perceived value."
    source: "MM-02-cd6"
    tema: specialization
  - id: HEUR-DK-281
    text: "Raise Prices — Everyone Waits Too Long: James Cameron (Titanic): just double movie ticket price. Movie is cheapest part of evening. Won't hurt attendance much or long. Same applies to most businesses."
    source: "MM-02-cd6"
    tema: pricing
  - id: HEUR-DK-282
    text: "4 Visits = Customer For Life: Dry cleaning proven — after 4 visits, car automatically finds its way there. Not vulnerable to competition or coupons. Strategy: buy first 4 visits at any cost."
    source: "MM-02-cd6"
    tema: customer-retention
  - id: HEUR-DK-283
    text: "Never Delegate Three Things: (1) Checkbook — lifelong friend diverted $11M through 23 ghost companies. (2) Marketing — highest payoff activity. (3) Legal — never accept 'don't worry, I have it under control.'"
    source: "MM-02-cd5"
    tema: business-protection
  - id: HEUR-DK-284
    text: "Empty Parking Lot Problem: Empty parking lot = people drive by. Park cars even without customers. Different cars, move them around. Rent from Hertz if needed. People prefer to deal with successful businesses."
    source: "MM-02-cd1"
    tema: positioning
  - id: HEUR-DK-285
    text: "Your Tardiness Not Our Emergency: Don't let others' perception of urgency stampede you. Train customers from prospect stage. Being instantly massively accessible = bad positioning. Positioning wins over service."
    source: "MM-02-cd1"
    tema: positioning
  - id: HEUR-DK-286
    text: "Vendor SOB Principle: Vendors respond fastest to person pressing them to wall. Be nice = moved to back of line. 10 o'clock meant 10, not 10:30. Next week 10 becomes noon, then noon becomes September."
    source: "MM-02-cd2"
    tema: vendor-management
  - id: HEUR-DK-287
    text: "Never Turn Off Marketing Machine: Every single day must do something keeping new blood flowing into pipeline. Even when busy servicing current clients. Confucius: dig the well before you thirst."
    source: "MM-02-cd6"
    tema: marketing-discipline
  - id: HEUR-DK-288
    text: "Red Rubber Stamp Test: Workers' compensation rubber stamp on plain envelope = 33% response increase. Only change. Dinky little things can make massive difference. Never know if you don't test."
    source: "MM-02-cd6"
    tema: testing

  - id: HEUR-DK-289
    text: "80/20 Time Rule + 95/5 Corollary: 80% of profits from 20% of clients and time. 95/5 = 5% of clients and 5% of time infinitely more valuable than other 95%. Slight re-adjustment in time investment can multiply income."
    source: "MM-03-pdf"
    tema: time-leverage
  - id: HEUR-DK-290
    text: "Direct Line Limit: only ~10 people in business life have your direct personal line. They know to use it only under extraordinary duress. Everyone else goes through the system."
    source: "MM-03-cd2"
    tema: accessibility
  - id: HEUR-DK-291
    text: "Pre-Determine Time Per Task: if 12 items on to-do list without time estimates = items left undone guaranteed. Assign minutes to each. Total must equal time block available. No unallocated minutes."
    source: "MM-03-cd1"
    tema: time-management
  - id: HEUR-DK-292
    text: "14-Minute Coaching Slots: phone appointments back-to-back with 1 minute gap. At 14 minutes, hang up regardless. After initial shock, members learn to prepare 3 things in priority order with time allocated to each."
    source: "MM-03-cd2"
    tema: coaching
  - id: HEUR-DK-293
    text: "A/B/C Inbound Sorting: assistant sorts all inbounds. A's = attended within 1 week of receipt (may be 2 weeks old). B's = 2 weeks. C's = random. Many C items self-resolve before attention — nearly throw half away."
    source: "MM-03-cd2"
    tema: communication
  - id: HEUR-DK-294
    text: "Plan Day Night Before: subconscious prepares while you sleep. Hit ground running. Assign minutes per task, total to time block. Also for psychological reason — subconscious does advance work, some of next day becomes deja vu."
    source: "MM-03-cd1"
    tema: planning
  - id: HEUR-DK-295
    text: "FedEx Communication Cadence: send work to assistant 2-3x/week via FedEx. Daily call usually under 30 min, ~3 days/week. Can go days without communicating with office. Everything waits and everything's okay."
    source: "MM-03-cd2"
    tema: communication
  - id: HEUR-DK-296
    text: "Build Up To Change Gradually: 5 min/day first 2 weeks → 10 min next 15 days → 15 min all February → 20 min March → 30 min by April. Not cold turkey. Tricky balance: desirable AND achievable."
    source: "MM-03-pdf"
    tema: habit-building
  - id: HEUR-DK-297
    text: "Measurement Automatically Improves Performance: universal principle. Measurement monitored by someone else further improves it. Any professional sports coach confirms. Entrepreneur must create self-measurement since no boss monitors."
    source: "MM-03-cd3"
    tema: performance-measurement
  - id: HEUR-DK-298
    text: "Worst Idea For Doubling Income = Double Your Work: brute force approach = rich corpse. Unimaginative. Soil analysis analogy: leverage the real asset scientifically, don't add more mules. Salespeople shouldn't just squeeze in more presentations — leverage time and skill."
    source: "MM-03-pdf"
    tema: income-leverage
  - id: HEUR-DK-299
    text: "Average satisfied customer tells only 3 people (American Management Association research). Moving from 3→52 (full circle of influence) requires definite action: immediate thank-you note/call + different gift each time."
    source: "MM-04-cd1-1"
    tema: referrals
  - id: HEUR-DK-300
    text: "Referral recognition failure = silent death. Customer who refers once and gets no recognition never says anything to you, but tells friends 'I sent that guy a customer and never got so much as a thank you.' Then never refers again."
    source: "MM-04-cd1-1"
    tema: referral-recognition
  - id: HEUR-DK-301
    text: "List selection has 30-50% impact on overall direct mail effectiveness. Extra money spent narrowing down the list to fit desired demographics is money well spent."
    source: "MM-04-cd1-3"
    tema: direct-mail
  - id: HEUR-DK-302
    text: "5 ingredients of the best offer: (1) Something new (2) Sale/discounted prices (3) Bonus/premium for purchasing (4) Gift for responding (5) Time limit for urgency. Best offers include ALL five."
    source: "MM-04-cd1-3"
    tema: offer-construction
  - id: HEUR-DK-303
    text: "Headline rules: (1) Promise benefit OR ask provocative question (or both). (2) Telegraph message in 12 words or less. (3) Stand alone — make complete statement by itself."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: HEUR-DK-304
    text: "Benchmark headline: 'Corn's Gone in 5 Days or Money Back' — 8 words delivering benefit (Corn's Gone) + timeframe (5 Days) + guarantee (Money Back). Running continuously since before DK was alive."
    source: "MM-04-cd1-4"
    tema: headline-examples
  - id: HEUR-DK-305
    text: "Direct mail repetition: mail to SAME list 3-5 times during 12-month period, not just once. Single mailings waste the list investment."
    source: "MM-04-cd1-3"
    tema: direct-mail
  - id: HEUR-DK-306
    text: "Solo piece (self-mailer, single sheet folded) = cheapest format. Multi-piece envelope (letter + brochure + response device + extra) = Publishers Clearinghouse format. More loose pieces = higher odds of catching reader interest."
    source: "MM-04-cd1-3"
    tema: direct-mail-formats
  - id: HEUR-DK-307
    text: "Discounting overused loses effectiveness. Furniture industry's 'this weekend only' worn out. Auto industry's sticker price now meaningless. ALWAYS tie discount to logical reason: overstock, anniversary, holiday, introductory."
    source: "MM-04-cd2-1"
    tema: pricing
  - id: HEUR-DK-308
    text: "Less than 10% of companies follow up on qualified leads with in-person or telephone contact. DK tested: inquired to 300+ companies via trade shows and reply cards — less than 30 ever followed up."
    source: "MM-04-cd2-2"
    tema: lead-followup
  - id: HEUR-DK-309
    text: "Have salespeople log time in 15-minute increments. Result = honest representation of how much time is actually used to sell. Even small improvement in productive time use = significant sales increases."
    source: "MM-04-cd2-2"
    tema: sales-productivity
  - id: HEUR-DK-310
    text: "Most managers spend way too much time on poor performers, too little with high performers. Coach top performers to do even better = fastest path to sales increase. Easier to elevate stars than convert mediocrity."
    source: "MM-04-cd2-2"
    tema: sales-management
  - id: HEUR-DK-311
    text: "More demographic factors in list selection = costlier list but more cost-effective per response. John's example: 1,000 targeted vs 10,000 blanket = same response at $2,500 less cost."
    source: "MM-04-cd1-3"
    tema: list-targeting
  - id: HEUR-DK-312
    text: "Dentist 10x'd practice in 24 months without increasing ad budget by even a dollar — identified 700 different things to change in office environment and patient communications. BB Ball in action."
    source: "MM-04-cd1-1"
    tema: word-of-mouth
  - id: HEUR-DK-313
    text: "Copy should be lean, not necessarily short. If a word or phrase does not advance the sales process, why is it there? Edit rough drafts after a day or two cooling off period."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: HEUR-DK-314
    text: "PS power: most direct mail pros agree many people skip to the PS first. Always have a PS. Make it powerful — great place for the bonus offer."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: HEUR-DK-315
    text: "Apples to oranges comparison: 'This cassette program costs only $79 — you might pay $300-500 for a seminar, and $79 is what you'd spend on a nice dinner.' Compare your price to more expensive alternatives AND trivial everyday expenses."
    source: "MM-04-cd1-4"
    tema: price-framing
  - id: HEUR-DK-316
    text: "Internal repetition: in a given direct mail piece, make the same several main points several different times, several different ways. Repetition reinforces the message."
    source: "MM-04-cd1-4"
    tema: copywriting

L4_FRAMEWORKS_MM:
  - id: FW-DK-147
    text: "6 Ironclad Rules of Magnetic Marketing: (1) Always an irresistible OFFER. (2) Reason to respond NOW (urgency). (3) CLEAR INSTRUCTIONS on how to respond. (4) TRACKING and measurement of everything. (5) FOLLOW-UP — never rely on single touch. (6) RESULTS RULE — nothing else matters."
    source: "MM-01-mod1"
    tema: magnetic-marketing-core

  - id: FW-DK-148
    text: "10 Questions to Discover/Create Your USP: (1) What's truly different? (2) How do you uniquely benefit your target? (3) Can you niche? (4) What void/opportunity gap can you fill? (5) Can you add personality? (6) Superior guarantee? (7) Exceptional speed? (8) What do people hate that you can fix? (9) Pricing advantage? (10) Special experience?"
    source: "MM-01-mod1"
    tema: positioning

  - id: FW-DK-149
    text: "5 Categories of Target Marketing: (1) Geographic (location/zip). (2) Demographic (income/behavior). (3) Geo-Demographic (1+2 combined). (4) Affinity (shared identity/memberships). (5) Past & Present Customers (the gold mine — most overlooked)."
    source: "MM-01-mod2"
    tema: targeting

  - id: FW-DK-150
    text: "Widget Bridge Concept — 3 Reasons for Widgets: (1) Attract new customers with promotional offer. (2) Sell more/frequently to existing customers with new widgets. (3) Move from vague services to specific THING to sell."
    source: "MM-01-mod1"
    tema: business-model

  - id: FW-DK-151
    text: "4 Jobs of an LGM (Lead Generation Magnet): (1) Generate/enhance response to advertising. (2) Reinforce prospect's unhappiness with current problems. (3) Establish expertise AND empathy. (4) Position so prospect is predisposed to accept your recommendations."
    source: "MM-01-mod2"
    tema: lead-generation

  - id: FW-DK-152
    text: "4 LGM Writing Rules: (1) Avoid me/we speak — be YOU-oriented. (2) Don't over-educate — tell WHAT to do, not HOW. (3) Don't forget the call to action. (4) Create powerful titles — model tabloid/magazine covers."
    source: "MM-01-mod2"
    tema: lead-generation

  - id: FW-DK-153
    text: "Giorgio 3-Step Letter Structure: Letter 1 = 'Confidential letter to husband from Giorgio, Romance Director' + photo + emotional hook. Letter 2 (+15 days) = '3 Coins in the Fountain' + 3 pennies glued + escalated offer. Letter 3 (+10 days) = 'Lonesome Whippoorwill' + copies of both previous letters. Optional: postcard 'Can This Marriage Be Saved?'"
    source: "MM-01-mod3"
    tema: direct-mail

  - id: FW-DK-154
    text: "A-Pile Personal Look Framework: plain envelope (no business name), individual addressing (no labels), real postage stamp (no bulk rate), personal-looking letter inside. Goal: bypass the B-pile wastebasket sort."
    source: "MM-01-mod2"
    tema: direct-mail

  - id: FW-DK-155
    text: "4 Core Media Tools for Small Business: (1) Squeeze page / landing page (simple, one offer). (2) 3-step direct mail letter sequence. (3) Coupon decks / Valpak. (4) Yellow Pages / search-intent media."
    source: "MM-01-mod2"
    tema: media

  - id: FW-DK-156
    text: "Endorsed Mailing / List Swap: upscale spa's customers = good prospects for cosmetic dentist and vice versa. Each markets to the other's list WITH endorsement from list owner. Gets geo-demographic list at zero cost."
    source: "MM-01-mod2"
    tema: partnerships

  - id: FW-DK-157
    text: "Headline Formula Arsenal: (1) 'They didn't think I could [X] but I did' (Caples piano). (2) 'Secrets of [X] Revealed' + number. (3) 'Do You Hate Your [X]?' (4) 'At least one [X] within walking distance will [bad thing]' (fortune telling)."
    source: "MM-01-mod3"
    tema: copywriting

  - id: FW-DK-158
    text: "Problem-Agitate-Solve (PAS): set up the existence of a problem your reader has, get them emotionally worked up about its effects, then whip out the answer that solves it instantly and easily."
    source: "MM-01-mod3"
    tema: copywriting

  - id: FW-DK-159
    text: "Magnetic Marketing 4 Components: (1) Training on foundational direct response principles. (2) Examples from multiple industries. (3) Copyright-free templates for campaigns. (4) Real business examples showing results."
    source: "MM-01-mod1"
    tema: magnetic-marketing-core
  - id: FW-DK-160
    text: "Brass Balls Pricing Framework: (1) Set price based on what YOU want. (2) Practice straight face when quoting. (3) When they show up, bill them. (4) Dictate don't negotiate. (5) Fire non-compliant customers. (6) Delay access to appear successful."
    source: "MM-02-cd1,cd2"
    tema: pricing-strategy
  - id: FW-DK-161
    text: "Customer Firing Framework: (1) Identify 80/20 problem customers. (2) Surgical removal as early as possible. (3) Have direct honest conversation — 'you're not getting results, don't want to take more money.' (4) Vacuum fills with better customers. (5) Public example improves compliance of remaining."
    source: "MM-02-cd2"
    tema: customer-management
  - id: FW-DK-162
    text: "Time Protection System: (1) Limit access — only talk to 8s/9s/10s. (2) Calculate minute worth. (3) Regiment time — 5am writing block. (4) Never meet at restaurant first — your office then go. (5) No same-day callbacks. (6) Compartmentalize — close file, open next file."
    source: "MM-02-cd4"
    tema: time-management
  - id: FW-DK-163
    text: "Independence Through Deal Flow: Secret to independence = enough deal flow. (1) Keep marketing machine on every single day. (2) Multiple sources — 72 things for 1 each. (3) Never rely on 1-2 methods. (4) Break-even acquisition = still dance in streets. (5) Never turn off when busy."
    source: "MM-02-cd4,cd6"
    tema: marketing-strategy
  - id: FW-DK-164
    text: "Specialization Repositioning: (1) Take generic product. (2) Specialize to niche. (3) Price bumps 3-5x — time mgmt $69 generic vs $300 for dentists vs $500+ for orthodontists with multiple offices. (4) 90% material is same. (5) Do 12+ niches for massive revenue."
    source: "MM-02-cd6"
    tema: specialization
  - id: FW-DK-165
    text: "10 Smart Market Questions: (1) What keeps them awake at night? (2) What are they scared of? (3) Who are they mad at? — selling against enemy is best strategy. (4) Top 3 daily frustrations? (5) Trends in business/life? (6) Secret desires? (7) Decision-making bias? (8) Own language/jargon? (9) Who else sells to them and how? (10) Who failed selling to them?"
    source: "MM-02-cd6"
    tema: market-research
  - id: FW-DK-166
    text: "Five Differentiation Strategies: (1) Product itself — rare. (2) Process — Book of Month Club changed delivery. (3) Personality — Peterman's first-person copy. (4) Service — FedEx changed logistics. (5) Smarter marketing — if none of above, outmarket them. If commodity with no differentiation = price decides."
    source: "MM-02-cd6"
    tema: differentiation
  - id: FW-DK-167
    text: "Income Increase Framework: (1) Raise fees/prices — almost everyone waits too long. (2) Increase avg transaction via upsells. (3) Increase frequency of purchase. (4) Stimulate referrals — cheapest customer acquisition. (5) Cut low-profit items and add high-profit ones."
    source: "MM-02-cd6"
    tema: revenue-growth
  - id: FW-DK-168
    text: "Slack Adjuster + Consistency Model: Build both into business — (A) Periodic big paydays: high price, high margin (eagle business: $1 art print sold for $1,000). (B) Consistency factor: continuity/subscription that chugs along predictably. Ideally business justified by big paydays alone."
    source: "MM-02-cd6"
    tema: business-model
  - id: FW-DK-169
    text: "Grand Opening Customer Lock-In (4-Visit): (1) Ridiculous low-price blitz — any garment 89 cents. (2) Second visit automatic: pick up clothes. (3) Great coupons for 3rd visit — almost as good as first offer. (4) Pick up couponed items = 4th visit. After 4 visits = customer locked for life."
    source: "MM-02-cd6"
    tema: customer-acquisition

  - id: FW-DK-170
    text: "Renegade Time Management System: (1) Decide how you'll do business and how people do business with you. (2) Value time as #1 non-replaceable asset. (3) Train everyone to your rules. (4) Script days not just schedule. (5) Eliminate interruptions — appointment with yourself = same as appointment with pope. (6) Designated days for designated functions."
    source: "MM-03-cd1"
    tema: time-management
  - id: FW-DK-171
    text: "Self-Imposed Discipline Framework: not willpower but engineered structure. (1) Make commitments to people. (2) Set deadlines for everything. (3) Pre-script every day so no option exists. (4) Create self-imposed accountability via targets. (5) Join mastermind for external accountability. Result: 'hitting snooze alarm 6 times doesn't exist as option.'"
    source: "MM-03-cd1"
    tema: productivity
  - id: FW-DK-172
    text: "Storyboard Planning (Disney Displayed Thinking): corkboard + index cards, one idea per card. Vertical columns by topic. Rearrange freely. See everything at once — subconscious works pictorially. Multiple people can contribute without meetings. Move cards from To Do → Doing → Done."
    source: "MM-03-cd1"
    tema: planning
  - id: FW-DK-173
    text: "Productivity Environment Design: Two components — (A) Psychological: photos, triggers, right 'place' for each task type. Disney Imagineers ride rides before designing rides. (B) Practical: tools within reach, dedicated zones, coffee warmer saves 3 trips/morning. Different tasks = different environments."
    source: "MM-03-cd1"
    tema: productivity-environment
  - id: FW-DK-174
    text: "Positive Power Of Negative Preparation Framework (Cramer): (1) List every possible obstacle. (2) Create Plan B for each. (3) Create Plan C for when Plan B fails. (4) Do this BEFORE starting. (5) Worst case of Plan B = you don't need it. Roy Disney balanced Walt's optimism. Parachute analogy."
    source: "MM-03-cd1"
    tema: planning
  - id: FW-DK-175
    text: "3 Stepping Stones to Direct Mail Success: (1) Right LIST — 30-50% of success. Select by demographics, compile own, rent from brokers (SRDS directory). (2) Matching OFFER — 5 ingredients matched to list interests. (3) PRESENTATION — format + copy + graphics. You can DIY all three."
    source: "MM-04-cd1-3"
    tema: direct-mail
  - id: FW-DK-176
    text: "7 Midas Touch Strategies to Stimulate Business: (1) Frequent buyer rewards (punch card, expiration). (2) Discounting (with logical reason). (3) Premiums (buy this, get this free — business product + personal gift). (4) Product/service packaging. (5) Prepay agreements (restaurant 25-dinner card). (6) Accept all credit cards. (7) Monthly newsletter (6 benefits)."
    source: "MM-04-cd2-1"
    tema: business-stimulation
  - id: FW-DK-177
    text: "Referral Stimulation System: (1) Do something remarkable (Disney cleanliness). (2) Stage events — customers bring friends (Christmas party, July BBQ, anniversary tent). (3) Ask directly for referrals. (4) Recognize and appreciate every referral (thank-you + gift). (5) Use Second Party Gift Certificates."
    source: "MM-04-cd1-1"
    tema: referrals
  - id: FW-DK-178
    text: "Testimonial Marketing System: (1) Collect photo evidence (Bill Glaesner — hundreds of customer photos on walls with dates showing repeat buyers). (2) Use geographic targeting (same complex). (3) Use category targeting (same industry). (4) Tell third-party stories, not just facts. (5) Collect testimonial letters."
    source: "MM-04-cd1-2"
    tema: testimonial-marketing
  - id: FW-DK-179
    text: "14 Copywriting Rules: (1) Features→benefits. (2) 'You' not 'we'. (3) Demonstrate credibility. (4) Dramatic license OK. (5) Stories sell, facts tell. (6) Long copy OK. (7) Double readership path. (8) Lean not short. (9) Short sentences/paragraphs. (10) Create urgency. (11) Apples to oranges. (12) Internal repetition. (13) PS power. (14) Study advertising constantly."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: FW-DK-180
    text: "Multi-Piece Mailing Package: (1) Cover letter. (2) Main brochure/flyer presenting offer. (3) Separate response device (coupon/order form). (4) Extra sales piece (testimonials page or bonus gift flyer). Theory: odds of catching interest increase proportionately with number of loose pieces."
    source: "MM-04-cd1-3"
    tema: direct-mail-formats
  - id: FW-DK-181
    text: "Sales Management Framework — 7 Quick Tips: (1) Cut poor performers fast. (2) Coach top performers for fastest results. (3) Provide environment/tools, not motivation. (4) Focus on accountability. (5) Time-use analysis (15-min increments). (6) Company-directed lead generation. (7) Demand lead follow-up reporting + random verification."
    source: "MM-04-cd2-2"
    tema: sales-management
  - id: FW-DK-182
    text: "Newsletter As Marketing Strategy — 6 Benefits: (1) Creates habit in customers. (2) Stays top-of-mind. (3) Passes useful info they appreciate. (4) Demonstrates expertise. (5) Stimulates word-of-mouth. (6) Advertises sales/offers/new products. Works for any business: beauty parlor, restaurant, office equipment company."
    source: "MM-04-cd2-1"
    tema: customer-retention
  - id: FW-DK-183
    text: "Business Breakthrough Framework: (1) Analyze 80/20 business mix — identify losing segments. (2) Look for product breakthrough (new product/line for existing customers). (3) Look for marketing breakthrough (new channel/method for existing products). (4) Redefine what business you're in. (5) Invest in excellence as competitive moat."
    source: "MM-04-cd2-3"
    tema: business-growth
  - id: FW-DK-184
    text: "Prepay Agreement Model: restaurant sells 25-dinner membership card for $249 (vs ~$300 individual). Customer saves ~$50, signs checks, guaranteed reservations. Owner sells 50 cards = $12,000 upfront operating capital. Applicable to any recurring service business."
    source: "MM-04-cd2-1"
    tema: prepay-revenue

L5_METODOLOGIAS_MM:
  - id: MET-DK-103
    text: "Giorgio 3-Step Campaign Execution: (1) Select geo-demographic list ~2,000 households. (2) Create widget (bundled offer, fixed price e.g. $59.95 romance dinner). (3) Assign character/persona (e.g. 'Giorgio, Romance Director'). (4) Mail Letter 1 with photo + emotional hook. (5) Wait 15 days, mail Letter 2 with physical attachment (3 pennies) + escalated offer. (6) Wait 10 days, mail Letter 3 with copies of both previous letters. (7) Optional postcard for non-responders. Expected: 2-7% response, market domination in 45 days."
    source: "MM-01-mod3"
    tema: direct-mail

  - id: MET-DK-104
    text: "Personal Ad Method for Lead Gen: (1) Describe exactly who you WANT to respond ('Attention: corporate exec with 10+ years experience, earning $100K+...'). (2) Describe who should NOT respond. (3) Offer LGM (free report). (4) Provide response mechanism. (5) Follow up with multi-step sequence."
    source: "MM-01-mod1"
    tema: lead-generation

  - id: MET-DK-105
    text: "Widget Creation Methodology: (1) Identify commodity business where everyone offers the same. (2) Invent a NEW business within the business. (3) Package services + goods + premiums + experiences into tangible widget with fixed price. (4) Price below perceived value of components. (5) Create urgency/scarcity. (6) Concentrate ALL marketing on selling the widget only. (7) Capture cash flow advantage from prepayment."
    source: "MM-01-mod1"
    tema: business-model

  - id: MET-DK-106
    text: "LGM Creation Process: (1) Pick topic of prime interest to preferred customer. (2) Title using tabloid headline formulas ('14 Ways to...'). (3) Include N useful tips. (4) Make ONE of N = your service. (5) Other N-1 = genuinely useful info (shows expertise). (6) Include call to action. (7) Offer via multiple response channels."
    source: "MM-01-mod2"
    tema: lead-generation

  - id: MET-DK-107
    text: "Complete Magnetic Marketing System Build: (1) Craft USP via 10-question framework. (2) Create widgets (packaged offers). (3) Build LGM. (4) Define target market (5 categories). (5) Create squeeze page. (6) Build 3-step letter sequence (Giorgio model). (7) Deploy via matched media. (8) Develop backend system (monthly contact, new widgets, retention)."
    source: "MM-01-mod1+2+3"
    tema: magnetic-marketing-core

  - id: MET-DK-108
    text: "Target Market Drive-Through Method: (1) Identify geographic zone. (2) Drive neighborhoods 5-7 PM. (3) Observe: lawns, cars, toys, behavior, attire. (4) Assess income level and buying propensity. (5) Match demographics to product requirements. (6) Select neighborhoods with right fit. (7) Only THEN invest in media."
    source: "MM-01-mod2"
    tema: targeting

  - id: MET-DK-109
    text: "Direct Mail Personal Look Execution: (1) Plain envelope, no logo. (2) Individual addressing, no labels. (3) Real postage stamp. (4) Personal-looking letter inside. (5) Big bold headline or provocative first sentence. (6) Tell complete story, no length restriction. (7) Clear call to action + urgency."
    source: "MM-01-mod2"
    tema: direct-mail

  - id: MET-DK-110
    text: "Emotional Payoff Discovery: (1) List all functionality benefits of product/service. (2) For each, find the EMOTIONAL payoff behind it. (3) Use the emotional payoff in headline/marketing, not the functional benefit. Example: dentures → not 'eat better' but 'never embarrassed about smiling again.'"
    source: "MM-01-mod3"
    tema: copywriting

  - id: MET-DK-111
    text: "Cross-Industry Innovation Transfer: (1) Consult with Industry A. (2) Notice unique effective methods. (3) Borrow them. (4) Teach to Industry B. (5) While in B, notice their methods. (6) Bring back to A. This is how DK built his consulting empire."
    source: "MM-01-mod1"
    tema: innovation
  - id: MET-DK-112
    text: "Free Strategy Exception Method: Stop giving free unless specific acquisition strategy. Example: Murray Rafelle deli fed everyone free for one month, never advertised again. Buying customers in lump cheaper than slow build over years with advertising."
    source: "MM-02-cd1"
    tema: pricing-strategy
  - id: MET-DK-113
    text: "Successful Person Positioning Method: (1) Never take same-day calls. (2) Delay callbacks — started when broke as strategy. (3) Full schedule appearance. (4) Make them wait. (5) Check empty appointment book before saying yes (Malz first patient story)."
    source: "MM-02-cd1,cd2"
    tema: positioning
  - id: MET-DK-114
    text: "Evaluation Immunity Method: (A) They're not qualified to evaluate you. (B) Only evaluation that matters: did they buy? In test, 27 of 30 negative evaluations still bought. Use big rubber stamp: JEALOUS. Never look at evaluation forms."
    source: "MM-02-cd2"
    tema: mindset
  - id: MET-DK-115
    text: "Trade-Off Clarity Method: (1) Write top 10 things you absolutely don't want in life. (2) Engineer business to match those constraints. (3) Put personal/lifestyle preferences ahead of profit. (4) Find ways to make money that are enjoyable. Robert Redford test: what won't you do for a million?"
    source: "MM-02-cd2"
    tema: business-design
  - id: MET-DK-116
    text: "Theft Prevention Count-Cookies Method: (1) Show them you're counting — transparency. (2) Show consequences — Johnny, 24 cookies, I'll count when I return. (3) Only controllable variable = detection. (4) Never delegate checkbook. (5) Regular random audits. 80% theft is internal, not shoplifting."
    source: "MM-02-cd5"
    tema: business-protection
  - id: MET-DK-117
    text: "Celebrity Linking Method: (1) Link real celebrities to products — $5-15K/year for regional unlimited use of photo, endorsement, autograph. (2) Make yourself celebrity in your market. (3) Write book, do interviews, publish articles. (4) Be visible at industry events. (5) Be seen with famous people."
    source: "MM-02-cd6"
    tema: marketing-strategy
  - id: MET-DK-118
    text: "Knockoff Defense Method: (1) Expect to be copied — certainty. (2) Don't waste energy being angry. (3) Invent faster than they copy (Ray Kroc principle). (4) Plan next campaigns while current runs. (5) Accept ~3-month window in most media before knockoffs appear."
    source: "MM-02-cd6"
    tema: competitive-strategy

  - id: MET-DK-119
    text: "Daily Scripting Method: (1) Night before, list every task for tomorrow. (2) Assign minutes to each. (3) Total must equal available time block. (4) Arrange in priority order. (5) Execute sequentially. (6) Assess against clock throughout day — like overhead slides with timestamps. (7) Adjust if ahead/behind. No unallocated minutes."
    source: "MM-03-cd1"
    tema: time-management
  - id: MET-DK-120
    text: "Communication Control System: (1) No cell phone, no email. (2) Fax-based inbound sorted by assistant A/B/C. (3) Weekly box of accumulated items. (4) Scheduled phone appointments with END times. (5) Conversation planner per person. (6) FedEx 2-3x/week for work exchange. (7) Max 10 people with direct line. (8) Unplug personal fax when traveling."
    source: "MM-03-cd2"
    tema: communication
  - id: MET-DK-121
    text: "Mastermind Accountability Method: (1) Join group of competitive peers. (2) Show-and-tell every ~3 months. (3) Shared testing = 12 people × 4 experiments = 48/month vs doing 48 alone. (4) Forces disconnection from daily business. (5) Group holds you accountable — nobody wants to come with nothing to show."
    source: "MM-03-cd3"
    tema: accountability
  - id: MET-DK-122
    text: "Second Party Gift Certificate Method: give loyal customer $10 gift certificate that is ONLY negotiable by someone else — customer addresses it to a friend and signs it over. Works for retail, restaurants, beauty parlors, service businesses, carpet cleaners. Follow up with recognition to the referring customer."
    source: "MM-04-cd1-1"
    tema: referrals
  - id: MET-DK-123
    text: "Photo Wall Testimonial Method (Bill Glaesner/Sanderson Ford): cover office walls top-to-bottom with instant snapshots of customers next to their new purchase, DATED. Show repeat customers across years (1960, 1965, 1970, 1980). Inevitable reactions: 'All these people can't be wrong' + 'They keep coming back.' Also used by Ira Hayes (fold-out sheets), W. Clement Stone (area business lists), and doctors (giant scrapbooks of healthy patients)."
    source: "MM-04-cd1-2"
    tema: testimonial-marketing
  - id: MET-DK-124
    text: "List-Offer Match Method: John's Sporting Goods example. Approach A: 10,000 blanket resident mail ($400 list + $500 print + $2,900 postage = $3,800). Approach B: 1,000 targeted skiing/hiking magazine subscribers ($200 list + $200 print + $290 postage = $690). Same response, $2,500 less. Do this 4x/year = $10,000 saved."
    source: "MM-04-cd1-3"
    tema: direct-mail
  - id: MET-DK-125
    text: "DIY Copywriting Development Method: (1) Study how-to books on advertising (self-taught since 1970s). (2) Collect and study persuasive direct mail you receive. (3) Identify common ingredients in pieces you find compelling. (4) Build clip art collection from books ($10-20 for hundreds of pieces) and magazines. (5) Write copy yourself, edit after 1-2 day cooling off period. Saves $3,000-5,000 per piece vs hiring a pro."
    source: "MM-04-cd1-4"
    tema: copywriting
  - id: MET-DK-126
    text: "Customer Event Referral Method: host annual party — closed to public, open to customers + any friends they bring. Examples: nightclub anniversary party with huge tents, free food, free entertainment. Chiropractor Christmas party with buffet and dance band. Doctor July BBQ in own backyard. Each format generates referrals through social proof in a fun environment."
    source: "MM-04-cd1-1"
    tema: referrals
  - id: MET-DK-127
    text: "Salesperson Time Audit Method: (1) Log time in 15-minute increments. (2) Reveal actual selling time vs admin/waste. (3) Identify small improvements possible. (4) Calculate sales increase potential from even modest gains. Most salespeople waste enormous amounts of time and are notoriously poor time managers."
    source: "MM-04-cd2-2"
    tema: sales-productivity
  - id: MET-DK-128
    text: "Lead Follow-Up Verification Method: (1) Develop company-managed lead generation (ads, mail, telemarketing, shows). (2) Distribute pre-qualified leads to reps. (3) Require reporting on results. (4) Randomly contact prospects DIRECTLY to verify rep actually made contact. If independent reps, SELL leads instead of giving them — skin in the game."
    source: "MM-04-cd2-2"
    tema: lead-management
  - id: MET-DK-129
    text: "Monthly Brainstorming Method: (1) Schedule once-a-month session with associates. (2) Use 7 Midas Touch strategies as idea-stimulant checklist. (3) Develop new marketing for coming month. (4) Schedule campaigns before seasonal slumps (dig well before you thirst). Based on Napoleon Hill's mastermind group concept from Think and Grow Rich."
    source: "MM-04-cd2-1"
    tema: proactive-marketing


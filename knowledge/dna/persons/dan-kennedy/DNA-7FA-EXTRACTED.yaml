# ==============================================================================
# L1 - FILOSOFIAS (FIL-DK-029 onwards)
# ==============================================================================

L1_FILOSOFIAS_NEW:

  - id: FIL-DK-029
    titulo: "Você Não Precisa de Permissão para Construir Autoridade"
    descricao: >
      Certificações, associações e títulos de autoridade são essencialmente inventados.
      Qualquer pessoa pode criar sua própria certificação, associação ou credencial.
      A única autoridade que importa é a percebida pelo mercado, não a concedida por terceiros.
    citacao: "Unless you're doing brain surgery or heart surgery, you don't need permission from anybody. It's all made up. All of it."
    fonte: "7FA-CD12-T11"
    camada: L1

  - id: FIL-DK-030
    titulo: "Superioridade Filosófica como Fundação do Alto Rendimento"
    descricao: >
      Pessoas de renda muito alta — como Carnegie — operam com uma crença profunda em sua
      superioridade sobre a maioria das pessoas. Essa superioridade não é arrogância vazia:
      é fundamentada em disciplina, estudo e ação superiores. Quem tem baixa renda nos EUA
      tem isso fundamentalmente por escolha, não por falta de capacidade.
    citacao: "Andrew Carnegie talked about believing himself superior to most men and thus deserving of all that came his way."
    fonte: "7FA-CD12-T03"
    camada: L1

  - id: FIL-DK-031
    titulo: "Filosofia Pessoal Clara como Navegação do Negócio"
    descricao: >
      Pessoas de alta renda têm uma filosofia pessoal bem definida e articulável — uma visão
      de mundo com cornerstones claros (10-12 partes). Essa filosofia é o framework dentro do
      qual se otimiza ou se restringe potencial e renda. Sem uma filosofia clara, decisões de
      negócio e dinheiro ficam inconsistentes.
    citacao: "I think it is very difficult to separate business money from a political philosophy — a complete view of how society ought to work."
    fonte: "7FA-CD12-T01"
    camada: L1

  - id: FIL-DK-032
    titulo: "Alinhamento Filosófico como Critério de Seleção em Vendas Complexas"
    descricao: >
      Em vendas de alto valor ou alto comprometimento, os compradores estão avaliando não apenas
      competência, mas alinhamento filosófico. Abaixo de certo nível de ticket, isso não importa.
      Acima dele, é fator decisivo. Face-to-face é o único formato que permite essa avaliação
      completa.
    citacao: "What people are really trying to figure out in complex buying is: are we in sync? Do we have shared values, shared philosophy?"
    fonte: "7FA-CD12-T02"
    camada: L1

  - id: FIL-DK-033
    titulo: "Desdém Compassivo pelos que Permanecem Estagnados"
    descricao: >
      Ter compaixão pelas pessoas não exclui ter desdém por suas escolhas de estagnação.
      Quem assiste sua vida desmoronar sem agir merece desdém, independente de compaixão.
      Respeito é ganho por mérito, não concedido por longevidade. A maioria das pessoas
      não mereceu respeito — merece cortesia.
    citacao: "Respect is earned, not granted by seniority. Courtesy is deserved purely by longevity, but that's it."
    fonte: "7FA-CD12-T07"
    camada: L1

  - id: FIL-DK-034
    titulo: "Fracasso é Escolha, Não Circunstância"
    descricao: >
      Em mercados com abundância de oportunidade como os EUA, baixa renda é resultado de
      escolha — incluindo escolha de não aprender, não agir, não persistir. A mesma janela
      de tempo usada para nada poderia ser usada para se tornar superior. O principal
      diferenciador não é talento, é escolha.
    citacao: "Anybody who has a low income, at least in America, has it fundamentally by choice."
    fonte: "7FA-CD12-T04"
    camada: L1

  - id: FIL-DK-035
    titulo: "Paralelismo como Filosofia de Execução"
    descricao: >
      Pessoas de alto rendimento não trabalham sequencialmente — trabalham em múltiplos
      projetos simultaneamente em estágios diferentes. Fazer uma coisa de cada vez é padrão
      de pessoa de 6 dígitos. Fazer várias coisas em paralelo (Patterson tem 6-7 livros,
      Oprah tem múltiplos lançamentos) é padrão de 7 dígitos.
    citacao: "Six-figure people do one thing, get it done, then go on to another. We don't. Working on six or seven books at the same time."
    fonte: "7FA-CD12-T08"
    camada: L1

  - id: FIL-DK-036
    titulo: "Aquisição de Negócios como Crescimento com Caneta"
    descricao: >
      Adquirir negócios existentes é uma das formas mais eficientes de crescimento — uma
      assinatura compra receita imediata, clientela estabelecida e marca construída. A maioria
      dos empreendedores não usa aquisição suficientemente, preferindo crescimento orgânico
      mais lento e caro.
    citacao: "A stroke of a pen and buying a million-seven in revenue. I'm a big fan of acquisition and I don't think we do it enough."
    fonte: "7FA-CD12-T12"
    camada: L1

  - id: FIL-DK-037
    titulo: "Otimização Antes de Inovação"
    descricao: >
      Antes de lançar algo novo, extrair o máximo do que já existe. A maioria dos negócios
      tem ouro não minerado em clientes perdidos, reativação, cross-selling, e melhoria de
      conversão. Jay Abraham: optimize first, then innovate.
    citacao: "Most businesses haven't milked what they've got. You need to optimize before you innovate."
    fonte: "7FA-CD8"
    camada: L1

  - id: FIL-DK-038
    titulo: "Obrigação Moral de Não Deixar o Prospecto Não Comprar"
    descricao: >
      Se você genuinamente acredita que seu produto/serviço beneficia o cliente, você tem
      obrigação moral de vendê-lo com todo esforço. Não vender — ou vender meio-a-meio — é
      uma falha ética. A Estratégia de Preeminência (Jay Abraham) começa aqui.
    citacao: "The Strategy of Preeminence: you have a moral obligation not to let the prospect not buy if what you have will benefit them."
    fonte: "7FA-CD8"
    camada: L1

  - id: FIL-DK-039
    titulo: "Mercado Saturado É Mito — 5% Compram Tudo"
    descricao: >
      Em qualquer nicho, apenas cerca de 5% dos participantes compram todos os produtos e
      programas disponíveis. Isso significa que entrar em um mercado "saturado" ainda deixa
      acesso a 95% que nunca compraram de você. Saturação é percepção, não realidade.
    citacao: "In any niche, 5% of the people buy everything. The market is never truly saturated."
    fonte: "7FA-CD7"
    camada: L1

  - id: FIL-DK-040
    titulo: "Tempo é o Único Recurso Não Renovável"
    descricao: >
      Ao contrário de dinheiro, clientes ou parcerias, tempo perdido não pode ser recuperado.
      A má gestão de tempo é o principal assassino de produtividade em negócios de 7 dígitos.
      Não ter hora de término é tão prejudicial quanto não ter hora de início.
    citacao: "Meetings must have end times, not just start times. Time pressure enables performance."
    fonte: "7FA-CD9"
    camada: L1

  - id: FIL-DK-041
    titulo: "Maestria Cria Atração, Não Convencimento"
    descricao: >
      Quem atinge maestria genuína numa área não precisa convencer ninguém — as melhores
      oportunidades e colaboradores vêm até eles. Maestria reconhecida (acknowledged mastery)
      é ativo que se auto-promove. Exemplo: Guthy-Ranker tem primeiro acesso a todos os deals
      porque demonstraram maestria em infomerciais.
    citacao: "Mastery creates a situation where you don't have to do any convincing. Best opportunities come to you."
    fonte: "7FA-CD10"
    camada: L1

  - id: FIL-DK-042
    titulo: "A Ferramenta Não é o Problema — A Cabeça é"
    descricao: >
      Quando clientes fracassam com ferramentas, sistemas ou treinamentos, raramente é o
      conteúdo que falhou. É a psicologia — falta de coragem, autoestima, crença. Você não
      pode vender isso diretamente, mas deve entregar. Sem ignição, nenhuma ferramenta funciona.
    citacao: "There ain't no ignition switch. There's a car, but there ain't no ignition switch — that's what they're missing."
    fonte: "7FA-CD12-T12"
    camada: L1

  - id: FIL-DK-043
    titulo: "Visibilidade Gera Crítica — Crítica Indica Impacto"
    descricao: >
      Pessoas que jamais recebem críticas provavelmente não estão fazendo nada significativo.
      Crítica é sinal de impacto. O volume de crítica é proporcional ao volume de influência.
      Imunidade à crítica não significa ausência dela — significa não ser governado por ela.
    citacao: "If you don't get mail like this sometimes, you ain't doing much."
    fonte: "7FA-CD11"
    camada: L1

# ==============================================================================
# L2 - MODELOS MENTAIS (MM-DK-028 onwards)
# ==============================================================================

L2_MODELOS_MENTAIS_NEW:

  - id: MM-DK-028
    titulo: "Termostato de Renda — Auto-Sabotagem Calibrada"
    descricao: >
      Cada pessoa tem um termostato interno de renda. Quando a renda começa a subir muito
      acima do set point, comportamentos de sabotagem inconsciente emergem para trazer de
      volta ao nível habitual. O termostato deve ser reprogramado explicitamente — não é
      automático. Exemplos: gastando excesso, sabotando negócios, recusando oportunidades.
    citacao: "People calibrate their behavior to stay near their set point. The thermostat concept applies to income."
    fonte: "7FA-CD11"
    camada: L2

  - id: MM-DK-029
    titulo: "Modelo das 3 Conversas em Vendas Face-a-Face"
    descricao: >
      Em qualquer reunião de vendas de alto valor, 3 conversas ocorrem simultaneamente:
      (1) Conversa sobre o deal — lógica e benefícios; (2) Conversa sobre confiança — "vai
      cumprir o que diz?"; (3) Conversa tácita — "quem é essa pessoa? Compartilhamos valores?"
      A terceira é a mais determinante mas a menos verbalizada.
    citacao: "There's one conversation about the deal, another about trust, and another not going on but really is: what is this person really about?"
    fonte: "7FA-CD12-T02"
    camada: L2

  - id: MM-DK-030
    titulo: "Curva Sino Ruinada pelos 80% que Não Agem"
    descricao: >
      Qualquer produto ou programa tem sua curva de resultados destruída pelos 80-90% de
      compradores que não implementam. A média de resultados se torna quase zero não porque
      o produto falha, mas porque a maioria não usa. Isso tem implicação legal (FTC), de
      marketing (depoimentos) e de negócio (suporte/coaching).
    citacao: "The problem is the 80-90% who don't do anything with what they bought. There couldn't possibly be any results."
    fonte: "7FA-CD12-T05"
    camada: L2

  - id: MM-DK-031
    titulo: "Modelo de Aquisição em 3 Formas (Jay Abraham)"
    descricao: >
      Todo negócio tem apenas 3 formas de crescer: (1) mais clientes; (2) ticket médio maior;
      (3) frequência de compra maior. Toda estratégia de crescimento se encaixa em uma dessas
      três. O que mais impacta o LTV é geralmente frequência, não aquisição.
    citacao: "There are only three ways to grow any business: more customers, higher average sale, buy more often."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-032
    titulo: "Modelo Host-Beneficiário — Encurtando pelo Relacionamento Alheio"
    descricao: >
      Em vez de construir audiência do zero, use o relacionamento já estabelecido de outro
      negócio com sua audiência. O host acessa valor para seus clientes, o beneficiário acessa
      clientes já aquecidos. Isso encurta o ciclo de vendas porque confiança já foi estabelecida.
    citacao: "JV/host-beneficiary: shortcut by using others' existing customer relationships. Trust has already been established."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-033
    titulo: "Modelo dos 9 Pontos de Alavancagem"
    descricao: >
      Jay Abraham identifica 9 pontos de alavancagem em qualquer negócio: clientes perdidos,
      leads não convertidos, upsell/cross-sell, joint ventures, mídia de inserção, newsletter,
      reativação, referências, e back-end. A maioria dos negócios explora apenas 1-2 desses pontos.
    citacao: "Nine leverage points in any business. Most exploit only one or two."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-034
    titulo: "Lente da Preeminência — Advisor vs Vendor"
    descricao: >
      A diferença entre vendedor e advisor de preeminência é a postura: o advisor age no melhor
      interesse do cliente mesmo quando isso significa não vender. Isso cria tal nível de confiança
      que o cliente para de comparar preços e para de precisar ser convencido.
    citacao: "The Strategy of Preeminence positions you as the most trusted advisor — acting in their best interest above all."
    fonte: "7FA-CD8"
    camada: L2

  - id: MM-DK-035
    titulo: "Modelo do Concorrente de Segunda Geração"
    descricao: >
      O verdadeiro concorrente não é quem você pode ver — é o próximo entrante que virá após
      você. O segundo player num mercado novo geralmente supera o primeiro porque aprende com
      seus erros e desvios sem pagar o custo do pioneirismo. Estratégia: criar barreiras antes
      que o segundo geração apareça.
    citacao: "The second-generation competitor phenomenon — they learn from your mistakes without paying for the pioneering."
    fonte: "7FA-CD7"
    camada: L2

  - id: MM-DK-036
    titulo: "Lente do Maior Problema Irritante (MPI)"
    descricao: >
      O posicionamento mais poderoso num mercado é identificar e resolver o maior problema
      que as pessoas mais odeiam e que ninguém ainda resolveu de forma satisfatória. Exemplo:
      Domino's não vendeu pizza — vendeu certeza de entrega. Funeral pre-need não vendeu serviço
      — vendeu eliminação do maior peso emocional.
    citacao: "Solving the 'biggest nagging problem' — Domino's: people just wanted to know when it was coming and if it'd be hot."
    fonte: "7FA-CD7"
    camada: L2

  - id: MM-DK-037
    titulo: "Modelo da Imersão no Mercado para Encontrar o Hook"
    descricao: >
      Os melhores hooks de marketing não vêm de copywriters em isolamento — vêm de imersão
      profunda no produto/mercado. Ogilvy passou 3 semanas com engenheiros da Rolls Royce
      antes de escrever uma linha. Walton visitava lojas da concorrência. A observação direta
      revela o que pesquisa não captura.
    citacao: "Ogilvy spent 3 weeks with Rolls Royce engineers to find the hook — 'the loudest noise in the new Rolls is the clock.'"
    fonte: "7FA-CD10"
    camada: L2

  - id: MM-DK-038
    titulo: "Lente da Transformação de Mão-de-Obra em Mídia"
    descricao: >
      Em períodos de crescimento, a mídia pode substituir a força de vendas humana (escala
      por mídia). Em recessão, o inverso ocorre — mão-de-obra volta a ser mais eficiente.
      Negócios que entendem quando alternar entre as duas estratégias sobrevivem a ciclos
      econômicos melhor do que os que ficam presos em uma delas.
    citacao: "Media replacing manual labor — and the reverse in recessions. Knowing when to switch is the strategic insight."
    fonte: "7FA-CD7"
    camada: L2

  - id: MM-DK-039
    titulo: "Modelo de Compartimentalização Cognitiva"
    descricao: >
      Alta produtividade requer a habilidade de "empacotar" mentalmente problemas não resolvidos
      e colocá-los em segundo plano enquanto se foca no que importa agora. Não é ignorar — é
      agendar. Treinamento dessa habilidade é separar o que pode ser resolvido agora do que não pode.
    citacao: "Compartmentalization — train yourself to box distractions. Not ignoring, but scheduling."
    fonte: "7FA-CD9"
    camada: L2

  - id: MM-DK-040
    titulo: "Modelo da Origem do Sucesso por Chance + Profundidade"
    descricao: >
      A maioria das influências transformadoras na vida de qualquer pessoa começou por acaso
      (encontrar o livro certo, o mentor certo). O diferenciador entre pessoas comuns e sérias
      é o que fazem depois: a pessoa séria mergulha mais fundo — busca a origem, os predecessores,
      vai upstream. A maioria para no primeiro nível.
    citacao: "Random chance opens the door for most people. The serious student then moves upstream — where did this come from? What preceded it?"
    fonte: "7FA-CD12-T09"
    camada: L2

  - id: MM-DK-041
    titulo: "Modelo de Venda Fria-para-Preparada com Delay Deliberado"
    descricao: >
      Em vendas de alto ticket para prospectos frios, inserir um delay deliberado antes do
      pitch aumenta significativamente conversão. O delay é usado para enviar um pacote de
      informações que pré-aquece, educa e cria expectativa. A conversão de "cold-to-prepared"
      pode dobrar em relação a "cold-to-pitch".
    citacao: "Cold-to-prepared sale strategy — deliberate delay plus info package doubles conversions vs. cold-to-pitch."
    fonte: "7FA-CD6"
    camada: L2

  - id: MM-DK-042
    titulo: "Lente da Gestão de Sala como Gestão de Performance"
    descricao: >
      Em apresentações de palco ou platform selling, a maioria dos vendedores falha porque
      perde o controle do tempo. O maior sabotador é falar demais sobre conteúdo e chegar
      ao pitch sem tempo suficiente. A gestão do tempo em sala é gestão de conversão.
    citacao: "Most people doing platform selling sabotage themselves by running out of time. Time management in the room is conversion management."
    fonte: "7FA-CD6"
    camada: L2

  - id: MM-DK-043
    titulo: "Modelo de Preço como Seleção de Cliente"
    descricao: >
      O preço que você cobra seleciona ativamente quem são seus clientes. Preço alto seleciona
      clientes com mais recursos, mais comprometidos e que dão menos trabalho. Preço baixo
      atrai volume mas também atrai o tipo de cliente que drena energia e que tem menor taxa
      de sucesso com seu produto.
    citacao: "Price selects your customers. High price selects committed, resourceful clients who are easier to work with."
    fonte: "7FA-CD1"
    camada: L2

# ==============================================================================
# L3 - HEURÍSTICAS (HEUR-DK-039 onwards)
# ==============================================================================

L3_HEURISTICAS_NEW:

  - id: HEUR-DK-039
    titulo: "5% de Qualquer Nicho Compra Tudo"
    descricao: >
      Em qualquer nicho de mercado, aproximadamente 5% dos participantes compram todos os
      produtos e programas disponíveis. Mercado "saturado" não existe — apenas 5% foram
      alcançados. Isso significa: nunca desistir de um nicho por ter "concorrência demais".
    valor: "5%"
    fonte: "7FA-CD7"
    camada: L3

  - id: HEUR-DK-040
    titulo: "Menos de 30 Dias de Uso de Suplementos — 99% Param"
    descricao: >
      99% das pessoas que compram suplementos nutricionais nunca terminam o primeiro frasco.
      O ponto de abandono médio é menos de 30 dias. Implicação de negócio: vender supply de
      6-18 meses upfront é mais rentável do que continuidade mensal porque o cliente vai
      cancelar de qualquer forma no mês 3-4.
    valor: "99% param antes de 30 dias"
    fonte: "7FA-CD12-T06"
    camada: L3

  - id: HEUR-DK-041
    titulo: "31 Dias = Top 1% em Qualquer Disciplina"
    descricao: >
      Qualquer pessoa que mantém uma disciplina por 31 dias consecutivos está no top 1% dos
      que tentaram essa disciplina. A superioridade não requer um limiar altíssimo — 99% das
      pessoas desistem antes disso. Implicação: comprometimento de médio prazo é suficiente
      para diferenciação.
    valor: "31 dias = top 1%"
    fonte: "7FA-CD12-T05"
    camada: L3

  - id: HEUR-DK-042
    titulo: "80% do Tempo em Psicologia, 20% em Ferramentas"
    descricao: >
      Em programas de coaching e treinamento de alto preço, 80% do tempo e energia deve ser
      dedicado a trabalho psicológico (coragem, crença, mentalidade) e apenas 20% a ferramentas
      e técnicas. Sem o componente psicológico, nenhuma ferramenta funciona.
    valor: "80% psicologia / 20% ferramentas"
    fonte: "7FA-CD12-T12"
    camada: L3

  - id: HEUR-DK-043
    titulo: "Preço Médio por Cabeça como Métrica Principal em Plataforma"
    descricao: >
      Em eventos e platform selling, a métrica mais importante não é taxa de fechamento mas
      dólares por cabeça (revenue por pessoa na sala). Isso permite otimizar o sistema completo
      — preço do bilhete, preço da oferta, segmentação da audiência — em vez de apenas a
      técnica de vendas.
    valor: "Dólares-por-cabeça > taxa de fechamento"
    fonte: "7FA-CD6"
    camada: L3

  - id: HEUR-DK-044
    titulo: "80% dos Ligantes para 0800 Não Compram por Má Gestão de Atendimento"
    descricao: >
      Em infomerciais, aproximadamente 80% das pessoas que ligam para o número de resposta
      direta não compram — não por falta de interesse, mas por má gestão da sala de atendimento
      telefônico. O gargalo de conversão está no telefone, não na oferta.
    valor: "80% dos ligantes perdem-se no telefone"
    fonte: "7FA-CD6"
    camada: L3

  - id: HEUR-DK-045
    titulo: "Reativação de Clientes Perdidos: ROI Mais Alto de Qualquer Canal"
    descricao: >
      Reativar clientes que já compraram mas pararam é consistentemente o canal de ROI mais
      alto disponível para qualquer negócio. Eles já confiam, já compraram, já superam a
      barreira inicial. O custo de reativação é uma fração do custo de aquisição de novo cliente.
    valor: "Reativação = ROI mais alto disponível"
    fonte: "7FA-CD8"
    camada: L3

  - id: HEUR-DK-046
    titulo: "Renovação Antecipada como Principal Alavanca de Newsletter"
    descricao: >
      O maior driver de LTV em negócios de newsletter/continuidade é a oferta de renovação
      antecipada — antes do vencimento, com desconto especial. Isso captura renovações de
      clientes que iriam cancelar e reduz churn efetivo sem mudar o produto.
    valor: "Early renewal = principal alavanca de LTV em newsletter"
    fonte: "7FA-CD8"
    camada: L3

  - id: HEUR-DK-047
    titulo: "Teste 3 Pessoas antes de Confiança em Parceria"
    descricao: >
      Antes de confiar em um parceiro de negócio ou colaborador, encontre 3 pessoas que
      fariam negócio com ele novamente. Não apenas "foi boa experiência" — mas "eu pagaria
      para trabalhar com ele de novo." Essa é a prova de confiança real.
    valor: "3 pessoas que voltariam = litmus test de parceria"
    fonte: "7FA-CD9"
    camada: L3

  - id: HEUR-DK-048
    titulo: "Regra das 3 Manhãs para Decisões Difíceis"
    descricao: >
      Quando preso numa situação ruim (parceiro, contrato, colaboração), se na terceira manhã
      consecutiva você acorda com o mesmo sentimento negativo, é hora de sair. Não espere
      a quarta. A clareza de três manhãs seguidas elimina oscilações emocionais de momento.
    valor: "3 manhãs consecutivas = decisão de saída"
    fonte: "7FA-CD9"
    camada: L3

  - id: HEUR-DK-049
    titulo: "Não Reabilite — Substitua"
    descricao: >
      Em nível de 7 dígitos, não há tempo ou ROI em tentar reabilitar um profissional

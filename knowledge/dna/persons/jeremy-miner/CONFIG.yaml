# Sintese narrativa
sintese_narrativa: |
  Jeremy Miner revolucionou vendas com NEPQ - Neuro Emotional Persuasion Questions.
  Ao inves de pitch e closing tradicional, NEPQ foca em DISCOVERY e SELF-PERSUASION.

  A filosofia central: "Perguntas sao a forma mais poderosa de persuasao conhecida
  pela humanidade. Nao tente persuadir - deixe que eles persuadam a si mesmos."

  Diferencial critico: Enquanto vendas tradicionais focam em CLOSING (1-2% do processo),
  NEPQ foca em Problem Finding (80-90% da venda). Se o discovery esta correto,
  o fechamento acontece sozinho atraves das 3 Commitment Questions.

  Tonalidade e central - 72% da comunicacao e nao-verbal. Tom, ritmo, pausas
  importam mais que palavras. 7 tonalidades diferentes para diferentes situacoes.

  Two Truths Psychology: Todo prospect tem duas verdades - a primeira (protegida)
  e a segunda (real). 99% contradizem a primeira resposta quando voce faz
  a pergunta certa no momento certo.


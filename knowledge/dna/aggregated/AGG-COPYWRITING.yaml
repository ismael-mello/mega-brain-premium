    peso_dominio: 0.95
    path: "/knowledge/dna/persons/dan-kennedy/"
    raiz: "/knowledge/sources/dan-kennedy/raw/copywriting-clinic/"
    contribuicao_principal: "Direct mail salesmanship, headline mastery, pain-pleasure sequence, hook discovery, pre-framing"
    elementos_relevantes: 234
    fontes_incluidas:
      - "The Copywriting Clinic (156 elementos — core copywriting)"
      - "7-Figure Academy (78 elementos — business copy, moral obligation, preeminência)"

  - fonte: "russell-brunson"
    peso_dominio: 0.85
    path: "/knowledge/dna/persons/russell-brunson/"
    raiz: "/knowledge/sources/russell-brunson/raw/"
    contribuicao_principal: "Hook-Story-Offer, Perfect Webinar copy, email sequences"
    elementos_relevantes: 200

  - fonte: "alex-hormozi"
    peso_dominio: 0.70
    path: "/knowledge/dna/persons/alex-hormozi/"
    raiz: "/knowledge/sources/alex-hormozi/raw/"
    contribuicao_principal: "Hooks = 80% da performance, offer language, content hooks"
    elementos_relevantes: 80

# ═══════════════════════════════════════════════════════════════════════════════
# FILOSOFIAS
# ═══════════════════════════════════════════════════════════════════════════════

filosofias:
  - id: "FIL-COPY-001"
    filosofia: "Copy é salesmanship in print — se não saberia vender pessoalmente, não vai saber vender por escrito"
    fonte: "dan-kennedy" | ref: "FIL-DK-001"
    peso: 0.95

  - id: "FIL-COPY-002"
    filosofia: "O headline é 70-80% da batalha — se não funcionar, nada mais importa"
    fonte: "dan-kennedy" | ref: "FIL-DK-003, HEUR-DK-001"
    peso: 0.95

  - id: "FIL-COPY-003"
    filosofia: "Pessoas são muito mais responsivas a escapar da dor do que ganhar prazer"
    fonte: "dan-kennedy" | ref: "FIL-DK-006, MM-DK-011"
    peso: 0.90

  - id: "FIL-COPY-004"
    filosofia: "Hook-Story-Offer — toda comunicação de marketing tem essa estrutura em sua base"
    fonte: "russell-brunson" | ref: "FW-RB-052"
    peso: 0.90

  - id: "FIL-COPY-005"
    filosofia: "Se eu só tivesse uma chance de fazer algo funcionar, usaria uma história"
    fonte: "dan-kennedy" | ref: "FIL-DK-022"
    peso: 0.90

  - id: "FIL-COPY-006"
    filosofia: "Hooks = 80% da performance — o restante é delivery"
    fonte: "alex-hormozi" | ref: "AH-ACQ18K-CMO002"
    peso: 0.85

  - id: "FIL-COPY-007"
    filosofia: "Copy longa funciona — a pessoa interessada lê cada palavra, mesmo 16 páginas"
    fonte: "dan-kennedy" | ref: "FIL-DK-017"
    peso: 0.85

  - id: "FIL-COPY-008"
    filosofia: "Criatividade pela criatividade é desperdício — deve avançar a venda"
    fonte: "dan-kennedy" | ref: "FIL-DK-020"
    peso: 0.85

  - id: "FIL-COPY-009"
    filosofia: "Obrigação moral de não deixar o prospecto não comprar — se acredita no produto, vender com 100% de esforço é ético"
    fonte: "dan-kennedy" | ref: "FIL-DK-038 (7FA-CD8)"
    peso: 0.90

# ═══════════════════════════════════════════════════════════════════════════════
# HEURÍSTICAS (com números)
# ═══════════════════════════════════════════════════════════════════════════════

heuristicas:
  - id: "HEUR-COPY-001"
    heuristica: "Headline = 70-80% da batalha em direct response"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-001"

  - id: "HEUR-COPY-002"
    heuristica: "Repetir o pitch principal 3-6x dentro da mesma peça"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-007"

  - id: "HEUR-COPY-003"
    heuristica: "Returns esperados em seminário: ~7% (5% imediato, 1% perto deadline, 1% atrasado)"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-004"

  - id: "HEUR-COPY-004"
    heuristica: "Garantia mínima 90 dias, idealmente 1 ano com requisito de uso"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-006"

  - id: "HEUR-COPY-005"
    heuristica: "Em B2B, maioria das vendas fecha entre 3º e 7º contato (RB: 81% após 5º)"
    tipo: numeric | fonte: "dan-kennedy + russell-brunson" | ref: "HEUR-DK-009, HEUR-RB-103"

  - id: "HEUR-COPY-006"
    heuristica: "$1 front-end = $16 de receita em follow-up"
    tipo: numeric | fonte: "russell-brunson" | ref: "HEUR-RB-001"

  - id: "HEUR-COPY-007"
    heuristica: "Mínimo 3 semanas de imersão no produto/mercado antes de escrever o hook"
    tipo: numeric | fonte: "dan-kennedy" | ref: "HEUR-DK-051 (7FA-CD10)"

  - id: "HEUR-COPY-008"
    heuristica: "Conversão cold-to-prepared pode dobrar vs cold-to-pitch direto (delay deliberado + pacote de pré-aquecimento)"
    tipo: numeric | fonte: "dan-kennedy" | ref: "MM-DK-041, MET-DK-029 (7FA-CD6)"

# ═══════════════════════════════════════════════════════════════════════════════
# FRAMEWORKS CORE
# ═══════════════════════════════════════════════════════════════════════════════

frameworks:
  - id: "FW-COPY-001"
    nome: "Pain-Pleasure Sales Sequence (DK)"
    passos: "1. Dor atual → 2. Medo de perder → 3. Alternativa prazerosa → 4. Oferta irresistível"
    fonte: "dan-kennedy" | ref: "FW-DK-004"
    peso: 0.95

  - id: "FW-COPY-002"
    nome: "Hook-Story-Offer (RB)"
    passos: "Hook (atenção) → Story (conexão + desejo) → Offer (ação)"
    fonte: "russell-brunson" | ref: "FW-RB-052"
    peso: 0.90

  - id: "FW-COPY-003"
    nome: "Objection Draining in Copy (DK)"
    passos: "Listar TODAS as razões para não comprar → responder cada uma → fechar"
    fonte: "dan-kennedy" | ref: "FW-DK-007, MET-DK-006"
    peso: 0.90

  - id: "FW-COPY-004"
    nome: "Urgency Construction (DK)"
    passos: "Deadline REAL + razão REAL. Recompensar early + penalizar procrastinadores"
    fonte: "dan-kennedy" | ref: "FW-DK-013"
    peso: 0.90

  - id: "FW-COPY-005"
    nome: "Customer Avatar Deep Dive (DK)"
    passos: "Lista exaustiva sobre avatar → Cristalizar em UMA pessoa → Escrever para ela"
    fonte: "dan-kennedy" | ref: "FW-DK-003, MET-DK-003"
    peso: 0.90

  - id: "FW-COPY-006"
    nome: "Headline Formula Bank (DK)"
    passos: "Build fill-in-the-blank de tablóides + Victor Schwab 100 headlines"
    fonte: "dan-kennedy" | ref: "FW-DK-001"
    peso: 0.85

  - id: "FW-COPY-007"
    nome: "Irresistible Offer Construction (DK)"
    passos: "Core + bonuses + guarantee (outcome-worded) + urgência real + penalty → Snowstorm Test"
    fonte: "dan-kennedy" | ref: "MET-DK-016"
    peso: 0.90

  - id: "FW-COPY-008"
    nome: "Copy Self-Audit 12-Point Checklist (DK)"
    passos: "Headline classified test? Rapport antes pitch? Story completa? Subheads independentes? Dor antes prazer? Involvement devices? Pitch 3+x? Objeções drenadas? Oferta irresistível? Summary? Snowstorm test?"
    fonte: "dan-kennedy" | ref: "MET-DK-028"
    peso: 0.90

  - id: "FW-COPY-009"
    nome: "Lead Gen Inversion (DK)"
    passos: "Warning ad → 16-page letter → decision-maker LIGA para você"
    fonte: "dan-kennedy" | ref: "FW-DK-016, MET-DK-004"
    peso: 0.85

  - id: "FW-COPY-010"
    nome: "Pre-Framing de Expectativas (DK 7FA)"
    passos: "1. Identificar resultado menos desejado possível → 2. Pre-calibrar expectativa na comunicação pré-venda → 3. Posicionar resultado médio como sucesso → 4. Criar deslumbramento quando supera o frame"
    fonte: "dan-kennedy" | ref: "FW-DK-048 (7FA-CD11)"
    peso: 0.85

  - id: "FW-COPY-011"
    nome: "Imersão no Mercado para Descoberta do Hook (DK 7FA)"
    passos: "1. 2-3 semanas com produto/usuários → 2. Entrevistar criadores sobre orgulho → 3. Observação sem filtros → 4. Listar detalhes surpreendentes → 5. 'O que nunca foi dito?' → 6. Headline com detalhe mais surpreendente"
    fonte: "dan-kennedy" | ref: "MM-DK-037, HEUR-DK-051, MET-DK-036 (7FA-CD10)"
    peso: 0.90

  - id: "FW-COPY-012"
    nome: "Venda Fria-para-Preparada com Delay Deliberado (DK 7FA)"
    passos: "1. Identificar prospecto frio → 2. Não fazer pitch — anunciar pacote de informações → 3. Enviar pacote de pré-aquecimento (cases, depoimentos, FAQ) → 4. Aguardar 5-7 dias → 5. Chamada com prospecto preparado"
    fonte: "dan-kennedy" | ref: "MM-DK-041, MET-DK-029 (7FA-CD6)"
    peso: 0.85

# ═══════════════════════════════════════════════════════════════════════════════
# TENSÕES ENTRE FONTES
# ═══════════════════════════════════════════════════════════════════════════════

tensoes:
  - id: "TENS-COPY-001"
    titulo: "Long copy vs Short copy"
    posicao_dk: "Copy longa sempre funciona — pessoa interessada lê tudo"
    posicao_digital: "Atenção curta, copy curta converte melhor"
    resolucao: "Cold traffic = mais copy. Warm/hot = pode encurtar. High-ticket: long copy ganha."

  - id: "TENS-COPY-002"
    titulo: "Fórmulas vs Criatividade"
    posicao_dk: "Usar fórmulas, criar banco de headlines"
    posicao_brand: "Criatividade diferencia, fórmulas comoditizam"
    resolucao: "Fórmulas para response, criatividade para brand. Never sacrifice response for cleverness."


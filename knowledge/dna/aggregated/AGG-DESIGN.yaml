# L2: MODELOS MENTAIS (18 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

modelos_mentais:
  - id: "MM-DS-001"
    nome: "Atomic Design (5-layer)"
    descricao: "Atoms → Molecules → Organisms → Templates → Pages. Hierarchy for composable UI."
    autor: "Brad Frost"
    dominio: "design-systems"

  - id: "MM-DS-002"
    nome: "Design Tokens as Subatomic Particles"
    descricao: "Tokens are the subatomic layer that brings atoms to life — 3-layer: global → alias → component"
    autor: "Brad Frost"
    dominio: "design-systems"

  - id: "MM-DS-003"
    nome: "Front-of-Front-End vs Back-of-Front-End"
    descricao: "Two distinct frontend disciplines with different skill sets"
    autor: "Brad Frost"
    dominio: "design-systems"

  - id: "MM-DS-004"
    nome: "Design That Scales (Evolution Model)"
    descricao: "Project → Product → Embedded Practice"
    autor: "Dan Mall"
    dominio: "design-systems"

  - id: "MM-DS-005"
    nome: "Hot Potato Process"
    descricao: "Rapid design-dev collaboration where ideas pass back and forth continuously"
    autor: "Dan Mall"
    dominio: "design-systems"

  - id: "MM-DS-006"
    nome: "Element Collage"
    descricao: "Design artifact for non-sequential exploration — explore ideas before committing to layouts"
    autor: "Dan Mall"
    dominio: "design-systems"

  - id: "MM-DS-007"
    nome: "Creative Direction Model"
    descricao: "Intersection of art direction (feel) and design (physical aspects)"
    autor: "Dan Mall"
    dominio: "design-systems"

  - id: "MM-DS-008"
    nome: "Three Lenses of DesignOps"
    descricao: "Workflow/Delivery + People/Staff + Practice/Craft — three dimensions of design operations"
    autor: "Dave Malouf"
    dominio: "design-ops"

  - id: "MM-DS-009"
    nome: "Four Laws of Design Program Management"
    descricao: "Fidelity, Collaboration, Cohesion, Reflection"
    autor: "Dave Malouf"
    dominio: "design-ops"

  - id: "MM-DS-010"
    nome: "Design Value Framework (4D)"
    descricao: "Form Giving + Clarity + Behavioral Fit + Exploration"
    autor: "Dave Malouf"
    dominio: "design-ops"

  - id: "MM-DS-011"
    nome: "Research → Personas → Journey Mapping → IA → Wireframes"
    descricao: "Sequential UX discovery model"
    dominio: "ux"

  - id: "MM-DS-012"
    nome: "Accessibility as Universal Design"
    descricao: "WCAG 2.1 AA is minimum baseline for all components"
    dominio: "ux"

  - id: "MM-DS-013"
    nome: "Token Architecture (3-layer)"
    descricao: "Global (raw values) → Alias (semantic mappings) → Component (specific implementations)"
    dominio: "design-systems"

  - id: "MM-DS-014"
    nome: "Composition Over Configuration"
    descricao: "Small flexible primitives compose into complex UIs"
    dominio: "design-systems"

  - id: "MM-DS-015"
    nome: "Brand-Aligned Visual Systems"
    descricao: "Consistent visual language across all assets"
    dominio: "design-systems"

  - id: "MM-DS-016"
    nome: "Design Maturity Model (5-level)"
    descricao: "Ad Hoc → Emerging → Defined → Managed → Optimized"
    autor: "Dave Malouf"
    dominio: "design-ops"

  - id: "MM-DS-017"
    nome: "AI Prompt Engineering for Visual"
    descricao: "Structured approach to generating visual concepts with AI tools"
    dominio: "design-systems"

  - id: "MM-DS-018"
    nome: "Pareto Component Principle"
    descricao: "20% of components cover 80% of the interface — focus there first"
    autor: "Dan Mall"
    dominio: "design-systems"

# ═══════════════════════════════════════════════════════════════════════════════
# L3: HEURÍSTICAS (45 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

heuristicas:
  # Brad Frost (6)
  - id: "HEUR-DS-001"
    texto: "Start early, start small — component thinking pays dividends even for MVPs"
    tipo: "qualitativa"
    autor: "Brad Frost"

  - id: "HEUR-DS-002"
    texto: "Pilot projects over big-bang launches — build from actual needs"
    tipo: "qualitativa"
    autor: "Brad Frost"

  - id: "HEUR-DS-003"
    texto: "Never over-design with hypothetical features"
    tipo: "qualitativa"
    autor: "Brad Frost"

  - id: "HEUR-DS-004"
    texto: "Avoid component-specific token explosion — use 3-layer model. One client had 5,000+ tokens."
    tipo: "quantitativa"
    autor: "Brad Frost"
    threshold: "max ~3 layers, avoid 5000+ tokens"

  - id: "HEUR-DS-005"
    texto: "Separate structural (components) from aesthetic (tokens) for multi-brand support"
    tipo: "qualitativa"
    autor: "Brad Frost"

  - id: "HEUR-DS-006"
    texto: "Design tokens: 3-layer model — global → alias → component. Never skip alias."
    tipo: "qualitativa"
    autor: "Brad Frost"

  # Dan Mall (7)
  - id: "HEUR-DS-007"
    texto: "Prioritize components requested by 3+ teams, not 1 team"
    tipo: "quantitativa"
    autor: "Dan Mall"
    threshold: "3+ teams requesting"

  - id: "HEUR-DS-008"
    texto: "Make systems people WANT to use, not systems people are forced to use"
    tipo: "qualitativa"
    autor: "Dan Mall"

  - id: "HEUR-DS-009"
    texto: "Pilot projects prove value before full rollout"
    tipo: "qualitativa"
    autor: "Dan Mall"

  - id: "HEUR-DS-010"
    texto: "Focus on embedding into how people already work (not seeking buy-in)"
    tipo: "qualitativa"
    autor: "Dan Mall"

  - id: "HEUR-DS-011"
    texto: "Don't start with the Button — that's playing the final boss first"
    tipo: "qualitativa"
    autor: "Dan Mall"

  - id: "HEUR-DS-012"
    texto: "Use Element Collage for early-stage design exploration (not full comps)"
    tipo: "qualitativa"
    autor: "Dan Mall"

  - id: "HEUR-DS-013"
    texto: "The 20% of components that cover 80% of the interface (Pareto)"
    tipo: "quantitativa"
    autor: "Dan Mall"
    threshold: "20% components = 80% coverage"

  # Dave Malouf (6)
  - id: "HEUR-DS-014"
    texto: "Different maturity stages require different leader types"
    tipo: "qualitativa"
    autor: "Dave Malouf"

  - id: "HEUR-DS-015"
    texto: "You can outsource program management but NEVER strategic direction"
    tipo: "qualitativa"
    autor: "Dave Malouf"

  - id: "HEUR-DS-016"
    texto: "Design maturity: 5-level scale — Ad Hoc → Emerging → Defined → Managed → Optimized"
    tipo: "quantitativa"
    autor: "Dave Malouf"
    threshold: "5 levels"

  - id: "HEUR-DS-017"
    texto: "Quick wins (1-2 weeks), Short-term (1-3 months), Long-term (3-12 months)"
    tipo: "quantitativa"
    autor: "Dave Malouf"
    threshold: "1-2wk / 1-3mo / 3-12mo"

  - id: "HEUR-DS-018"
    texto: "Assess maturity across all three lenses separately — a team can be Managed in Workflow but Ad Hoc in People"
    tipo: "qualitativa"
    autor: "Dave Malouf"

  - id: "HEUR-DS-019"
    texto: "Cross-reference gaps: people gaps often cause process gaps"
    tipo: "qualitativa"
    autor: "Dave Malouf"

  # Design System Architect (7)
  - id: "HEUR-DS-020"
    texto: "Tokens are defined FIRST before components (token-first architecture)"
    tipo: "qualitativa"

  - id: "HEUR-DS-021"
    texto: "Required props only = what the component can't function without"
    tipo: "qualitativa"

  - id: "HEUR-DS-022"
    texto: "Variants = explicit enum values, not arbitrary strings"
    tipo: "qualitativa"

  - id: "HEUR-DS-023"
    texto: "Composition slots > prop-based content injection"
    tipo: "qualitativa"

  - id: "HEUR-DS-024"
    texto: "One story file per component (Storybook pattern)"
    tipo: "qualitativa"

  - id: "HEUR-DS-025"
    texto: "Version semantically — breaking changes require major bumps"
    tipo: "qualitativa"

  - id: "HEUR-DS-026"
    texto: "Optional props = sensible defaults always"
    tipo: "qualitativa"

  # UX Designer (9)
  - id: "HEUR-DS-027"
    texto: "Card sorting → Tree testing → Site mapping (IA validation sequence)"
    tipo: "qualitativa"

  - id: "HEUR-DS-028"
    texto: "5+ representative users for usability testing (minimum sample size)"
    tipo: "quantitativa"
    threshold: "5+ users"

  - id: "HEUR-DS-029"
    texto: "Happy path + Error path + Edge cases — all three must be designed"
    tipo: "qualitativa"

  - id: "HEUR-DS-030"
    texto: "Color contrast: 4.5:1 for normal text, 3:1 for large text (18px+ bold or 24px+)"
    tipo: "quantitativa"
    threshold: "4.5:1 normal, 3:1 large"

  - id: "HEUR-DS-031"
    texto: "UI component contrast: 3:1 minimum against adjacent colors"
    tipo: "quantitativa"
    threshold: "3:1 minimum"

  - id: "HEUR-DS-032"
    texto: "Touch target minimum: 44x44px for mobile"
    tipo: "quantitativa"
    threshold: "44x44px"

  - id: "HEUR-DS-033"
    texto: "Low-fi first → Mid-fi → High-fi (progressive wireframing)"
    tipo: "qualitativa"

  - id: "HEUR-DS-034"
    texto: "Annotation on wireframes mandatory — interaction notes required"
    tipo: "qualitativa"

  - id: "HEUR-DS-035"
    texto: "WCAG 2.1 AA is minimum baseline, not ceiling"
    tipo: "qualitativa"

  # UI Engineer (7)
  - id: "HEUR-DS-036"
    texto: "Mobile-first, progressive enhancement (not graceful degradation)"
    tipo: "qualitativa"

  - id: "HEUR-DS-037"
    texto: "Animations under 300ms for interactions, up to 500ms for transitions"
    tipo: "quantitativa"
    threshold: "300ms interactions, 500ms transitions"

  - id: "HEUR-DS-038"
    texto: "Use CSS transforms + opacity for 60fps performance"
    tipo: "quantitativa"
    threshold: "60fps"

  - id: "HEUR-DS-039"
    texto: "Respect prefers-reduced-motion (accessibility requirement)"
    tipo: "qualitativa"

  - id: "HEUR-DS-040"
    texto: "Design tokens map to EVERY style property — no magic numbers"
    tipo: "qualitativa"

  - id: "HEUR-DS-041"
    texto: "Semantic HTML first — accessibility starts with structure"
    tipo: "qualitativa"

  - id: "HEUR-DS-042"
    texto: "Test across browsers, devices, screen readers, slow connections"
    tipo: "qualitativa"

  # Visual (3)
  - id: "HEUR-DS-043"
    texto: "Design for the smallest size the asset will appear (scale-first thinking)"
    tipo: "qualitativa"

  - id: "HEUR-DS-044"
    texto: "Every visual must serve a purpose — decorative is not a purpose"
    tipo: "qualitativa"

  - id: "HEUR-DS-045"
    texto: "AI prompts require precision in description for precision in output"
    tipo: "qualitativa"


    nome: "Audit Design & Maturity"
    autor: "Dave Malouf"
    total_steps: 15
    steps:
      - "Assess People & Culture lens (team structure, roles, career paths, collaboration, culture) — rate 1-5"
      - "Assess Workflow lens (process, research, handoff, QA, feedback, tooling) — rate 1-5"
      - "Assess Craft lens (design system, accessibility, visual consistency, UX quality, innovation, docs) — rate 1-5"
      - "Map current maturity scores across all three lenses"
      - "Identify lowest-scoring lens (primary bottleneck)"
      - "Identify specific gaps per lens"
      - "Cross-reference gaps (people → process?)"
      - "Benchmark against industry standards"
      - "Identify 3-5 highest-leverage improvements"
      - "Recommend: quick win (1-2wk), short-term (1-3mo), long-term (3-12mo)"
      - "Prioritize by impact and feasibility"
      - "Identify dependencies"
      - "Estimate resource requirements"
      - "Define success metrics for each improvement"
      - "Create phased roadmap (Phase 1: foundation, Phase 2: building, Phase 3: scaling)"


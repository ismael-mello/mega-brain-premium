# ═══════════════════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (67 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  create_design_system:
    nome: "Create Design System"
    autores: ["Brad Frost", "Dan Mall"]
    total_steps: 23
    steps:
      - "Conduct interface audit — screenshot every unique component"
      - "Categorize UI elements by type (colors, typography, spacing, icons, buttons, cards, layouts)"
      - "Identify inconsistencies — count variations of same component"
      - "Assess WCAG compliance of existing elements"
      - "Document component zoo — everything that exists today"
      - "Identify 20% of components covering 80% of interface (Pareto)"
      - "Define color tokens (global palette + semantic + component-level)"
      - "Define typography tokens (scale: xs-4xl + semantic levels)"
      - "Define spacing tokens (4px base unit, scale: 0-64)"
      - "Define border tokens (radius scale + widths + styles)"
      - "Define shadow tokens (elevation levels: sm, md, lg, xl)"
      - "Define animation tokens (duration, easing, properties)"
      - "Define breakpoint tokens (responsive grid points)"
      - "Build molecules (button group, input field, search bar, media object, nav item, card header)"
      - "Build organisms (navbar, form section, data table, card, modal, sidebar)"
      - "For each: define variants, states, props/API, accessibility, responsive behavior"
      - "Document getting started guide"
      - "Document design principles"
      - "Document token reference catalog"
      - "Document component catalog (purpose, examples, props, do's/don'ts, a11y, code)"
      - "Document pattern library (common compositions)"
      - "Document contribution guide"
      - "Document governance model (approval, versioning, deprecation)"

  design_ux_flow:
    nome: "Design UX Flow"
    total_steps: 29
    steps:
      - "Define research questions"
      - "Select methods: interviews, surveys, contextual inquiry, card sorting, competitive analysis, analytics"
      - "Execute research methods"
      - "Synthesize findings — identify patterns, themes, insights"
      - "Create insight statements (Users need X because Y, but currently Z)"
      - "Document in research repository"
      - "Create 2-3 primary personas (demographics, goals, pain points, behaviors, quote)"
      - "Map current journey (As-Is): stages → actions → thoughts → pain points → touchpoints"
      - "Map desired journey (To-Be): improved stages → new touchpoints → delight moments"
      - "Content inventory"
      - "Card sorting → analyze results"
      - "Create site map / app map"
      - "Define navigation model (primary, secondary, contextual)"
      - "Define naming conventions (user mental models, not jargon)"
      - "Design search and filtering"
      - "Validate IA with tree testing"
      - "Create low-fidelity sketches (3-5 alternatives per key screen)"
      - "Create mid-fidelity wireframes (grid, spacing, component placement)"
      - "Design error states, empty states, loading states"
      - "Design user flows (happy path + error path + edge cases)"
      - "Annotate wireframes"
      - "Document responsive considerations"
      - "Conduct usability testing (5+ users)"
      - "Measure task success rate"
      - "Measure time on task"
      - "Measure error rate"
      - "Measure satisfaction"
      - "Document findings and iterate"
      - "Handoff validated wireframes to visual design and dev"


tensoes:
  - topico: "Modelo de Receita"
    posicoes:
      - fonte: "alex-hormozi"
        posicao: "One-time high-ticket, evitar recurring para agências"
        argumento: "Recurring cria dependency e churn risk"
      - fonte: "jeremy-haynes"
        posicao: "Recurring mensal de $10k+"
        argumento: "Previsibilidade, LTV maior, Fair Pricing"
    resolucao: |
      CONTEXTO-DEPENDENTE:

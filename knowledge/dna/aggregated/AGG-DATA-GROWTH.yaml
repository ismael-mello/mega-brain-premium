  ellis: ["PMF", "40% test", "ICE score", "north star metric", "AARRR", "growth machine", "aha moment", "K-factor", "viral loop", "experiment velocity"]
  kao: ["spiky POV", "rigorous thinking", "CBC", "cohort-based", "active learning", "content pillars", "steel-man", "building in public"]

# ═══════════════════════════════════════════════════════════════════════════════
# METRICS CATALOG
# ═══════════════════════════════════════════════════════════════════════════════

metrics_catalog:
  acquisition:
    - metrica: "CAC (Customer Acquisition Cost)"
      formula: "Total acquisition spend / New customers"
      benchmark: "CAC < CLV/3"
      fonte: "fader/ellis"
    - metrica: "Viral K-Factor"
      formula: "Invites per user × Conversion rate"
      benchmark: "K>1 exponential, 0.3-0.7 excellent"
      fonte: "ellis"
    - metrica: "Channel efficiency"
      formula: "Revenue per channel / Cost per channel"
      fonte: "kaushik"

  activation:
    - metrica: "Aha Moment Rate"
      formula: "Users reaching aha moment / Total new users"
      benchmark: "Correlates with long-term retention"
      fonte: "ellis"
    - metrica: "Onboarding Completion"
      formula: "Users completing onboarding / Total new users"
      benchmark: ">80% within 30 days"
      fonte: "mehta"
    - metrica: "Time to Value"
      formula: "Time from signup to first value event"
      benchmark: "Minimize — ideally within first session"
      fonte: "ellis"

  retention:
    - metrica: "NRR (Net Revenue Retention)"
      formula: "(Starting MRR + Expansion - Contraction - Churn) / Starting MRR"
      benchmark: "<100% shrinking, 110-130% strong, >130% elite"
      fonte: "mehta"
    - metrica: "Customer Health Score"
      formula: "Product Usage (30-40%) + Support (15-20%) + Engagement (15-20%) + Outcomes (20-30%)"
      benchmark: "Green >70, Yellow 40-70, Red <40"
      fonte: "mehta"
    - metrica: "Churn Rate"
      formula: "Lost customers / Total customers (period)"
      benchmark: "Lagging — use health score for leading"
      fonte: "mehta"
    - metrica: "CBC Completion Rate"
      formula: "Students completing / Students enrolled"
      benchmark: "85%+ target (vs 3-10% self-paced)"
      fonte: "kao"

  revenue:
    - metrica: "CLV (Customer Lifetime Value)"
      formula: "BG/NBD projected or ARPU × Avg Lifetime"
      benchmark: "CLV > 3× CAC"
      fonte: "fader"
    - metrica: "Expansion Revenue"
      formula: "Upsell + Cross-sell from existing customers"
      benchmark: "Grows NRR above 100%"
      fonte: "mehta"
    - metrica: "Customer Equity"
      formula: "Sum of all customer CLVs"
      benchmark: "True company valuation"
      fonte: "fader"

  referral:
    - metrica: "Referral Rate"
      formula: "Customers who refer / Total customers"
      fonte: "ellis"
    - metrica: "Viral Cycle Time"
      formula: "Time from user signup to their referral's signup"
      benchmark: "Shorter = faster growth"
      fonte: "ellis"

  community:
    - metrica: "Activity Rate"
      formula: "Active members / Total members"
      benchmark: ">20% healthy, <20% crisis"
      fonte: "spinks"
    - metrica: "Response Rate"
      formula: "Posts with replies / Total posts"
      benchmark: ">50% healthy, <50% review needed"
      fonte: "spinks"
    - metrica: "Member-to-Member Ratio"
      formula: "Member interactions / Staff interactions"
      benchmark: "3:1 at maturity"
      fonte: "spinks"
    - metrica: "Engagement Depth"
      formula: "Actions per active member per month"
      fonte: "spinks"

  education:
    - metrica: "NPS (Net Promoter Score)"
      formula: "% Promoters - % Detractors"
      benchmark: "70+ for CBC"
      fonte: "kao"
    - metrica: "Active Learning Ratio"
      formula: "Active exercises / Total content"
      benchmark: "80/20 active/passive"
      fonte: "kao"
    - metrica: "Cohort Revenue"
      formula: "Students × Price per cohort"
      benchmark: "$500-5000+ per student"
      fonte: "kao"

  customer_value:
    - metrica: "Whale Curve Concentration"
      formula: "Revenue from top 20% / Total revenue"
      benchmark: "Top 20% = 150-300% of profits"
      fonte: "fader"
    - metrica: "CLV Tier Distribution"
      formula: "% of base in Platinum/Gold/Silver/Bronze"
      benchmark: "5/15/30/50%"
      fonte: "fader"

# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTIVE TENSIONS
# ═══════════════════════════════════════════════════════════════════════════════

productive_tensions:
  - tensao: "Acquisition volume vs Customer quality"
    polo_a: "Ellis — grow fast, optimize later"
    polo_b: "Fader — acquire right customers, not more customers"
    resolucao: "Validate PMF first (Ellis), then optimize for high-CLV segments (Fader)"

  - tensao: "Data-driven vs Speed of execution"
    polo_a: "Kaushik — measure everything, segment deeply"
    polo_b: "Ellis — speed over precision, ship fast"
    resolucao: "Ellis for experiments, Kaushik for strategic decisions and reporting"

  - tensao: "Scale vs Intimacy in education"
    polo_a: "Self-paced scales infinitely but 3-10% completion"
    polo_b: "CBC transforms deeply but caps at 20-50 per cohort"
    resolucao: "Kao — use CBC for premium transformation, self-paced for awareness/top-of-funnel"

  - tensao: "Community growth vs Community depth"
    polo_a: "Grow membership fast for network effects"
    polo_b: "Deepen engagement with existing members"
    resolucao: "Spinks — depth first, then growth; belonging precedes scale"

  - tensao: "Proactive CS investment vs Cost efficiency"
    polo_a: "Mehta — invest heavily in CS proactively"
    polo_b: "Budget constraints limit CS headcount"
    resolucao: "Mehta — focus CS investment on high-CLV segments (Fader whale curve); digital-touch for long tail"

  - tensao: "Vanity metrics vs Actionable insights"
    polo_a: "Reporting everything available (data puking)"
    polo_b: "Reporting only what drives decisions"
    resolucao: "Kaushik — kill vanity, max 15 KPIs, every metric must pass 'so what?' test"

  - tensao: "Generic content for reach vs Spiky content for authority"
    polo_a: "Broad content reaches more people"
    polo_b: "Spiky POV attracts fewer but more qualified"
    resolucao: "Kao — spiky always wins; generic is invisible in a crowded market"

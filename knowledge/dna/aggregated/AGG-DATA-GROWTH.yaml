# ═══════════════════════════════════════════════════════════════════════════════
# L5: METODOLOGIAS (18 elementos)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  # --- Kaushik ---
  - id: "DG-MET-001"
    nome: "DMMM Implementation"
    fonte: "kaushik"
    passos:
      - "Define: Business objectives (max 3)"
      - "Map: Goals for each objective"
      - "Select: KPIs for each goal (max 3 per goal)"
      - "Set: Targets for each KPI (quantitative)"
      - "Segment: Define key segments for analysis"
      - "Implement: Tag and track everything"
    resultado: "Plano de medição completo antes de gastar qualquer budget"
    peso: 0.70

  - id: "DG-MET-002"
    nome: "Kaushik Analysis Process"
    fonte: "kaushik"
    passos:
      - "What: Dados descritivos — o que aconteceu?"
      - "So What: Análise diagnóstica — por que importa?"
      - "Now What: Prescrição — o que fazer diferente?"
      - "Present: 3 ações concretas por relatório"
    resultado: "Todo relatório termina com ações, não com dados"
    peso: 0.70

  - id: "DG-MET-003"
    nome: "Dashboard Design Process"
    fonte: "kaushik"
    passos:
      - "Audit: Listar todas as métricas atuais"
      - "So What Test: Para cada métrica, perguntar 'e daí?'"
      - "Kill: Remover todas que falham no teste (>30% = queimar tudo)"
      - "Prioritize: Max 15 KPIs totais"
      - "Action: Cada métrica deve ter threshold + ação automática"
      - "Review: Revisitar mensalmente"
    resultado: "Dashboard acionável que impulsiona decisões"
    peso: 0.70

  # --- Fader ---
  - id: "DG-MET-004"
    nome: "Fader Customer Analysis Process"
    fonte: "fader"
    passos:
      - "Data Prep: Coletar histórico de transações (recency, frequency, monetary)"
      - "Model: Aplicar BG/NBD ou Pareto/NBD para probabilidade de vida"
      - "Score: Calcular CLV projetado por cliente"
      - "Segment: Criar tiers (Platinum/Gold/Silver/Bronze)"
      - "Whale Curve: Visualizar concentração de lucro"
      - "Strategy: Alinhar investimento por tier"
    resultado: "Segmentação baseada em valor com estratégia diferenciada por tier"
    peso: 0.70

  # --- Ellis ---
  - id: "DG-MET-005"
    nome: "Sean Ellis Growth Process"
    fonte: "ellis"
    passos:
      - "PMF Check: Rodar Sean Ellis Test (40% threshold)"
      - "North Star: Definir métrica única que captura valor entregue"
      - "Funnel Map: Mapear AARRR completo com métricas por estágio"
      - "Bottleneck: Identificar estágio com maior drop-off"
      - "Ideate: Gerar 10+ hipóteses para resolver bottleneck"
      - "ICE Score: Priorizar por Impact × Confidence × Ease"
      - "Test: Executar top 3 experimentos por semana"
      - "Analyze: Medir resultados e registrar aprendizados"
      - "Loop: Repetir — velocidade de aprendizado é o jogo"
    resultado: "Sistema contínuo de experimentação e crescimento"
    peso: 0.70

  - id: "DG-MET-006"
    nome: "Aha Moment Optimization"
    fonte: "ellis"
    passos:
      - "Cohort: Separar usuários retidos vs churned"
      - "Analyze: Quais ações os retidos fazem que churned não fazem?"
      - "Identify: A ação correlacionada com retenção = Aha Moment"
      - "Quantify: Definir threshold (ex: Slack = 2000 msgs, Facebook = 7 amigos em 10 dias)"
      - "Optimize: Redesenhar onboarding para guiar ao Aha Moment"
      - "Measure: Taxa de ativação como North Star do onboarding"
    resultado: "Onboarding otimizado que maximiza retenção"
    peso: 0.70

  - id: "DG-MET-007"
    nome: "Viral Loop Design"
    fonte: "ellis"
    passos:
      - "Trigger: Identificar momento natural de compartilhamento no produto"
      - "Mechanism: Definir mecânica (invite, referral, embed, content)"
      - "Incentive: Valor bilateral (quem convida + quem é convidado)"
      - "Friction: Minimizar passos entre trigger e ação"
      - "Measure: Calcular K-factor e viral cycle time"
      - "Optimize: Testar variações de trigger, copy, incentivo"
    resultado: "Mecânica viral embutida no produto com K-factor mensurável"
    peso: 0.70

  # --- Kao ---
  - id: "DG-MET-008"
    nome: "Spiky POV Development"
    fonte: "kao"
    passos:
      - "Brainstorm: Listar todas as suas opiniões sobre o tema"
      - "Filter: Quais são controversas ou contrárias ao consenso?"
      - "Steel-Man: Fortalecer o argumento contrário ao seu"
      - "Sharpen: Refinar até que a posição seja clara e polarizante"
      - "Test: Publicar e medir: gera reação forte (positiva E negativa)?"
      - "Expand: Derivar 50+ conteúdos a partir do POV central"
    resultado: "Ponto de vista diferenciado que atrai audiência qualificada"
    peso: 0.70

  - id: "DG-MET-009"
    nome: "CBC Design Process"
    fonte: "kao"
    passos:
      - "Outcome: Definir transformação específica que o aluno alcança"
      - "Curriculum: Organizar em módulos semanais (4-6 semanas ideal)"
      - "Active: 80% exercícios/projetos, 20% conteúdo passivo"
      - "Social: Grupos pequenos, peer review, accountability partners"
      - "Live: Sessões ao vivo com interação, não lectures gravadas"
      - "Deadline: Prazos rígidos que criam urgência e completion"
      - "Launch: Cohort de 20-50 alunos, 4-6x por ano"
    resultado: "Curso com 85%+ completion, NPS 70+, pricing premium"
    peso: 0.70

  - id: "DG-MET-010"
    nome: "Audience-to-Cohort Pipeline"
    fonte: "kao"
    passos:
      - "POV: Estabelecer Spiky POV como fundação"
      - "Content: Publicar consistentemente (3-5x/semana)"
      - "Capture: Email list como owned audience"
      - "Nurture: Newsletter/series que demonstra expertise"
      - "Launch: Abrir inscrições para CBC com waitlist"
      - "Convert: Audiência → alunos pagantes"
      - "Alumni: Ex-alunos como evangelistas e prova social"
    resultado: "Pipeline sustentável de audiência → alunos → evangelistas"
    peso: 0.70

  - id: "DG-MET-011"
    nome: "Content Cadence Design"
    fonte: "kao"
    passos:
      - "Pillars: Definir 3-5 pilares temáticos alinhados com Spiky POV"
      - "Platform: Escolher 1-2 plataformas primárias"
      - "Cadence: Definir frequência (3-5x/semana mínimo)"
      - "Format: Variar formatos (thread, essay, video, visual)"
      - "Repurpose: Um conteúdo longo → 5+ formatos curtos"
      - "Measure: Engajamento por pilar, não por post individual"
      - "Iterate: Dobrar no que funciona, abandonar o que não conecta"
    resultado: "Sistema de conteúdo sustentável e escalável"
    peso: 0.70

  # --- Mehta ---
  - id: "DG-MET-012"
    nome: "CS Operating Process"
    fonte: "mehta"
    passos:
      - "Segment: Classificar clientes por ARR/tier"
      - "Health Score: Implementar score multidimensional"
      - "Playbooks: Criar playbooks por score (Green/Yellow/Red)"
      - "Cadence: Definir touchpoints por segment"
      - "QBR: Revisar valor entregue trimestralmente (enterprise)"
      - "Escalation: Definir triggers automáticos de escalação"
      - "Expansion: Identificar e executar upsell/cross-sell"
    resultado: "Operação de CS proativa, escalável e focada em NRR"
    peso: 0.70

  - id: "DG-MET-013"
    nome: "Churn Prevention Playbook Design"
    fonte: "mehta"
    passos:
      - "Signals: Definir early warning indicators (usage decline >30%, no features 60d)"
      - "Score: Integrar signals no Health Score"
      - "Alert: Automatizar alertas por threshold (Yellow/Red)"
      - "Playbook: Ações específicas por signal type"
      - "Escalate: Quando CSM → Manager → Executive involvement"
      - "Save: Last-resort retention offers"
      - "Post-mortem: Analisar todo churn para prevenir recorrência"
    resultado: "Sistema proativo de prevenção de churn com playbooks acionáveis"
    peso: 0.70

  # --- Spinks ---
  - id: "DG-MET-014"
    nome: "SPACES Implementation"
    fonte: "spinks"
    passos:
      - "Audit: Qual tipo de valor (S/P/A/C/E/S) a comunidade pode gerar?"
      - "Prioritize: Escolher 2-3 tipos primários (não todos)"
      - "Design: Criar programas e atividades para cada tipo"
      - "Measure: Definir métricas por tipo de valor"
      - "Report: Conectar valor da comunidade com métricas de negócio"
      - "Evolve: Expandir para novos tipos conforme comunidade amadurece"
    resultado: "Comunidade com valor de negócio mensurável e diversificado"
    peso: 0.70

  - id: "DG-MET-015"
    nome: "Community Launch Process"
    fonte: "spinks"
    passos:
      - "Purpose: Definir propósito compartilhado (maior que o produto)"
      - "Founders: Recrutar 20+ founding members comprometidos por 3+ meses"
      - "Platform: Escolher plataforma adequada ao tipo de interação"
      - "Rituals: Criar rituais semanais (AMA, showcase, challenge)"
      - "Onboard: Processo de boas-vindas que conecta novos com existentes"
      - "Activate: Garantir primeira contribuição em 48 horas"
      - "Measure: Atividade, retenção, member-to-member ratio"
    resultado: "Comunidade lançada com massa crítica e rituais de engajamento"
    peso: 0.70

  - id: "DG-MET-016"
    nome: "Community Measurement Process"
    fonte: "spinks"
    passos:
      - "Health: Activity rate, retention, growth rate"
      - "Engagement: DAU/MAU, posts per member, response rate"
      - "Value: Support deflection, content generated, referrals"
      - "Business: Revenue influenced, retention lift, NPS delta"
      - "Dashboard: Consolidar em dashboard semanal"
      - "Review: Monthly review com stakeholders"
    resultado: "Medição completa que justifica investimento em comunidade"
    peso: 0.70

  # --- Cross-expert ---
  - id: "DG-MET-017"
    nome: "Retention Optimization Combined"
    fonte: "fader/mehta"
    passos:
      - "Analyze: Whale curve (Fader) — quem são os clientes mais valiosos?"
      - "Score: Health Score (Mehta) — quais valiosos estão em risco?"
      - "Prioritize: CLV × Risk = Priority score"
      - "Playbook: Ações específicas por quadrante (High-Value/At-Risk primeiro)"
      - "Prevent: Churn prevention para at-risk high-value"
      - "Expand: Growth plays para healthy high-value"
      - "Measure: NRR como indicador de sucesso"
    resultado: "Retenção otimizada combinando customer value com health monitoring"
    peso: 0.70

  - id: "DG-MET-018"
    nome: "Data Squad Quality Review"
    fonte: "datum"
    passos:
      - "Receive: Receber análise ou recomendação de qualquer especialista"
      - "Verify: Dados citados estão corretos e atualizados?"
      - "Context: Recomendação se aplica ao estágio do negócio?"
      - "Conflicts: Há contradição com outro especialista? Se sim, apresentar ambos"
      - "Confidence: Atribuir nível de confiança (high/medium/low)"
      - "Deliver: Entregar com caveats e próximos passos claros"
    resultado: "Output validado com nível de confiança e caveats explícitos"
    peso: 0.70


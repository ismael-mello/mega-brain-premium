# BENCHMARKS NUMÉRICOS
# ═══════════════════════════════════════════════════════════════════════════════

benchmarks:
  intensity:
    scale: "1-5 (1=mild annoyance, 5=existential)"
    movement_grade: ">= 3"
    resonance_levels: "Intellectual → Emotional → Somatic → Existential"

  timing:
    first_action: "<10 minutes"
    identity_adoption: "within 30 days"
    expansion_wave: "2-6 weeks"
    consolidation_wave: "4-8 weeks"
    belonging_reinforcement: "every 30 days"

  rates:
    active_member_baseline: "40%+"
    nps_healthy: ">50"
    message_fatigue: "after 3+ repetitions"
    aha_moments_for_adoption: 3
    emotional_vs_neutral_spread: "3x faster"

  structural:
    values_per_movement: "3-5"
    core_beliefs: "3-5"
    axioms: "1-2 maximum"
    rituals_minimum: "5+"
    belonging_levels: "exactly 5"
    metrics_per_level: "max 5"
    battle_cry_length: "<3 sentences"
    idea_simplicity: "<10 words"

  vitality_index:
    weights: "Tension(20%) + Identity(20%) + Growth(15%) + Engagement(15%) + Behavior(15%) + Systemic(15%)"
    community_health_weights: "Growth(15%) + Activation(20%) + Retention(25%) + Engagement(20%) + Sentiment(10%) + Advocacy(10%)"
    thresholds: "80-100=Thriving, 60-79=Healthy, 40-59=At Risk, 20-39=Critical, 0-19=Failing"

  manifesto:
    short: "500 words"
    standard: "1000 words"
    epic: "2000 words"


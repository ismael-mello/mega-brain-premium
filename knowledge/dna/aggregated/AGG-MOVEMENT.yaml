process_rules:
  - "NEVER skip Spark phase"
  - "NEVER proceed to Identity without validated spark"
  - "NEVER write manifesto before identity defined"
  - "NEVER launch growth without manifesto"
  - "NEVER measure impact without metrics framework"
  - "NEVER do 2 expansion waves consecutively"
  - "NEVER approve output with critical failures"
  - "NEVER name person/demographic as enemy"


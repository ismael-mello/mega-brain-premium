# L5: METODOLOGIAS (34 elementos — 7 task methodologies)
# ═══════════════════════════════════════════════════════════════════════════════

metodologias:
  build_movement:
    nome: "Build Movement (MOVEMENT-001)"
    total_phases: 5
    phases:
      - nome: "Phase 1: Spark"
        steps: ["Identify lived experience", "Map tension", "Uncover narrative", "Articulate spark", "Deliver spark-analysis.md"]
      - nome: "Phase 2: Identity"
        steps: ["Define beliefs", "Design markers", "Establish stack", "Create signals", "Define boundary", "Deliver identity-architecture.md"]
      - nome: "Phase 3: Ignition"
        steps: ["Draft manifesto", "Define origin story", "Create battle cry", "Design ritual", "Seed founding circle", "Deliver manifesto.md + ignition-plan.md"]
      - nome: "Phase 4: Growth"
        steps: ["Design flywheel", "Plan channels", "Create activation", "Build sustain", "Design multiply", "Deliver growth-strategy.md"]
      - nome: "Phase 5: Impact"
        steps: ["Define pyramid", "Set metrics", "Design dashboard", "Calculate vitality", "Set cadence", "Deliver impact-framework.md"]

  analyze_phenomenon:
    nome: "Analyze Phenomenon (MOVEMENT-002)"
    total_phases: 4
    phases:
      - nome: "Phase 1: Identify Lived Experience"
        steps: ["Name phenomenon", "Bracket assumptions (epoche)", "Collect first-person accounts", "Identify essential structures", "Map emotional landscape"]
      - nome: "Phase 2: Map Collective Tension"
        steps: ["Identify gap", "Name frustration", "Map systemic patterns", "Rate intensity (1-5)", "Assess scope"]
      - nome: "Phase 3: Find Shared Narrative"
        steps: ["Discover common story", "Identify villain/system", "Find hero archetype", "Locate turning point", "Extract narrative kernel"]
      - nome: "Phase 4: Articulate Aspiration"
        steps: ["Describe desired future", "Define transformation", "Quantify potential impact", "Write aspiration statement", "Rate movement potential"]

  create_identity:
    nome: "Create Identity (MOVEMENT-003)"
    total_phases: 4
    phases:
      - nome: "Phase 1: Define Belief System"
        steps: ["Extract values", "Translate to beliefs", "Identify central conviction", "Build hierarchy", "Test resonance"]
      - nome: "Phase 2: Design Tribal Markers"
        steps: ["Language markers", "Visual markers", "Behavioral markers", "Status markers", "Greeting rituals"]
      - nome: "Phase 3: Create Rituals"
        steps: ["Initiation ritual", "Daily ritual", "Gathering ritual", "Celebration ritual", "Storytelling ritual"]
      - nome: "Phase 4: Establish In-Group Signals"
        steps: ["Us-vs-them framing", "Recognition signals", "Inside references", "Loyalty markers", "Belonging gradient + boundaries"]

  write_manifesto:
    nome: "Write Manifesto (MOVEMENT-004)"
    total_phases: 5
    phases:
      - nome: "Phase 1: Declare Reality"
        steps: ["Undeniable truth", "Current state of world", "Named pain"]
      - nome: "Phase 2: State Beliefs"
        steps: ["We believe X", "Central → aspirational order", "Include heresy"]
      - nome: "Phase 3: Name Enemy"
        steps: ["Systemic force", "Why it persists", "Cost of inaction", "Show vulnerability"]
      - nome: "Phase 4: Envision Future"
        steps: ["Promised land (specific, sensory)", "Individual + collective impact"]
      - nome: "Phase 5: Call to Action"
        steps: ["Invitation to identity", "First step", "Commitment definition", "Battle cry"]

  measure_impact:
    nome: "Measure Impact (MOVEMENT-005)"
    total_phases: 4
    phases:
      - nome: "Phase 1: Define Impact Pyramid"
        steps: ["Define 5 levels", "Define success per level", "Assess current level", "Set target level", "Map dependencies"]
      - nome: "Phase 2: Set Metrics"
        steps: ["3-5 metrics per level", "Define collection methods", "Establish baselines", "Set targets"]
      - nome: "Phase 3: Community Health"
        steps: ["6 dimensions assessment", "Collection methods", "Define healthy ranges", "Create pulse templates"]
      - nome: "Phase 4: Vitality Index"
        steps: ["Calculate composite (6 components)", "Apply weights", "Set thresholds", "Define cadence", "Configure alert triggers"]

  diagnose_movement:
    nome: "Diagnose Movement Phase"
    total_steps: 4
    steps: ["Parse intent/keywords/phase/complexity", "Match routing (load catalog, score domains)", "Quick answer (2-4 sentences)", "Route to specialist with context"]

  review_output:
    nome: "Review Output Quality"
    total_steps: 4
    steps: ["Understand context (request, specialist, stage, deliverable)", "Apply quality checklist", "Score and decide (APPROVE/REVISE/REJECT)", "Output review report"]


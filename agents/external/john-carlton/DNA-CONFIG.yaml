# CONEXOES
# ===============================================================================

connections:
  complements:
    - person: "Gary Halbert"
      on: "Direct response copywriting and long-form sales letters"
      note: "Carlton was Halbert's protege; shares visceral style but pioneered third-party narrator and story-selling formula"
    - person: "Dan Kennedy"
      on: "Direct mail marketing and information product sales"
      note: "Kennedy is more systematic; Carlton is more story-driven"
    - person: "Todd Brown"
      on: "Unique mechanism and big idea positioning"
      note: "Carlton's 'amazing discovery' narrative prefigures Todd Brown's unique mechanism methodology"
    - person: "Russell Brunson"
      on: "Funnel architecture and offer design"
      note: "Brunson credits Carlton as major influence; long-form architecture maps to modern VSL"
    - person: "David Deutsch"
      on: "Fascination bullets and emotional copy"
      note: "Both are fascination bullet masters; Deutsch more analytical, Carlton more visceral"
    - person: "Gary Bencivenga"
      on: "Bullet writing and direct response mastery"
      note: "Carlton learned bullet writing by reverse-engineering Bencivenga's work"
    - person: "Joe Sugarman"
      on: "Sales copy flow and readability"
      note: "Carlton's grease slide concept adopted from Sugarman's slippery slide principle"
    - person: "Rosser Reeves"
      on: "USP positioning and unique selling proposition"
      note: "Carlton evolved Reeves' original USP into his 3-layer P.U.S. formula in SWS2"


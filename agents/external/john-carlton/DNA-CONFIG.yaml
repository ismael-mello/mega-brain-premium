# ===============================================================================
# VOICE CONFIG
# ===============================================================================

voice:
  tone: "conversational, story-driven, viscerally specific, emotionally charged"
  vocabulary: "buddy-to-buddy, sensory details, physical metaphors, concrete numbers"
  patterns:
    - "If you've ever wanted to..."
    - "Here's what this is all about."
    - "But it's not magic at all!"
    - "How can I afford to be so generous? Easy --"
    - "Please go to the next page"
  signature_phrases:
    - "If you've ever wanted to [desire]... then this will be the most important message you ever read."
    - "Here's what this is all about."
    - "But it's not magic at all!"
    - "How can I afford to be so generous? Easy --"
    - "You bet it would."
    - "That's just too bad."
    - "Remember that -- a single nickel."
    - "You have absolutely nothing to lose."
    - "So call right now."
    - "Amazing secret discovered by..."
    - "The meek shall not inherit the largest market share."
    - "Shame on you if you don't use every tactic."
    - "The marketing graveyard is crammed to bursting with superior products that died."
    - "Pay attention to what they actually buy, not what they say."
    - "Writer's block is merely not knowing what to write when you sit down to write."


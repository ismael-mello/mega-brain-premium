      es_highlights:
        - tema: "5 Levels of Market Awareness"
          descricao: "Unaware → Problem Aware → Solution Aware → Product Aware → Most Aware. CRO uses this to design funnel entry points — wrong awareness level = dead funnel."
          aplicacao: "CRO diagnoses where the market is before choosing ad creative, funnel type, or sales script — determines how much education vs. selling is needed"
          source: "Breakthrough Advertising"
        - tema: "5 Stages of Market Sophistication"
          descricao: "Stage 1 (first claim) → Stage 2 (enlarged claim) → Stage 3 (mechanism) → Stage 4 (elaborated mechanism) → Stage 5 (identification/community). Late-stage markets need niche identity or new mechanism."
          aplicacao: "CRO uses to determine whether to compete on offer, mechanism, identity, or create a new category — critical for positioning in saturated markets"
          source: "Breakthrough Advertising"
        - tema: "Permanent Forces vs Forces of Change"
          descricao: "Permanent forces (human desires that never change) vs. forces of change (trends, events, novelty). Great campaigns ride permanent forces and harness forces of change."
          aplicacao: "CRO uses to evaluate campaign longevity — short-term trend or permanent demand? Determines budget allocation and scaling confidence"
          source: "Breakthrough Advertising"

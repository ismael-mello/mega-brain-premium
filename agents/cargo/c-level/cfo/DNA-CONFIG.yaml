# FONTES DE DNA
# ═══════════════════════════════════════════════════════════════════════════════

dna_sources:

  agregado:
    - dominio: "vendas"
      path: "/knowledge/dna/AGGREGATED/AGG-VENDAS.yaml"
      peso: 0.80
      quando_usar: "Métricas de vendas, CAC, conversão, revenue"
      justificativa: "CFO precisa entender métricas de vendas para planning financeiro"

    - dominio: "offers"
      path: "/knowledge/dna/AGGREGATED/AGG-OFFERS.yaml"
      peso: 0.85
      quando_usar: "Unit economics de ofertas, pricing, margens"
      justificativa: "CFO precisa entender unit economics para decisões de pricing"

    # ─── AIOS Domain DNAs (added 2026-03-12) ───
    - dominio: "executive-leadership"
      path: "/knowledge/dna/AGGREGATED/AGG-EXECUTIVE-LEADERSHIP.yaml"
      peso: 0.70
      quando_usar: "Decisões C-level, governança, liderança executiva"
      justificativa: "CFO é C-level — frameworks de liderança executiva aplicáveis"
      added: "2026-03-12"
      source: "AIOS C-Level Squad"

    - dominio: "data-growth"
      path: "/knowledge/dna/AGGREGATED/AGG-DATA-GROWTH.yaml"
      peso: 0.65
      quando_usar: "Analytics financeiro, métricas de growth, dashboards"
      justificativa: "CFO precisa analytics e growth metrics para decisões baseadas em dados"
      added: "2026-03-12"
      source: "AIOS Data Squad"

  primario:
    - pessoa: "SAM-OVEN"
      path: "/knowledge/dna/persons/SAM-OVEN"
      dominios_usados: ["operations", "scaling"]
      peso: 0.85
      quando_usar: "Sistemas financeiros, eficiencia"

    - pessoa: "alex-hormozi"
      path: "/knowledge/dna/persons/alex-hormozi"
      dominios_usados: ["scaling", "offers", "money-models", "CFA", "upsells", "downsells", "continuity"]
      peso: 0.80
      quando_usar: "Unit economics, money models (Four-Prong), CFA framework (30-day GP>CAC), upsell/downsell economics"
      acq18k_highlights:
        - "FW-AH-ACQ-002: CFA — 30-day GP > CAC, fund new clients from existing"
        - "FW-AH-ACQ-001: Four-Prong Money Model — Attraction→Upsell→Downsell→Continuity"
        - "HEUR-AH-ACQ-002: 80% GP margin minimum for services"
        - "HEUR-AH-ACQ-001: LTGP:CAC > 3:1 minimum threshold"
        - "HEUR-AH-ACQ-035: Prepay discounts Q:10%, SA:15%, A:20-25%, 2Y:30%, LT:40%"
      added_acq18k: "2026-03-11"

    - pessoa: "cole-gordon"
      path: "/knowledge/dna/persons/cole-gordon"
      dominios_usados: ["compensation"]
      peso: 0.75
      quando_usar: "Estrutura de comissao"

    - pessoa: "capital-upgrade"
      path: "/knowledge/dna/persons/capital-upgrade"
      dominios_usados: ["gestao-financeira", "fluxo-de-caixa", "planejamento", "pricing", "custos"]
      peso: 0.85
      quando_usar: "Gestão financeira, fluxo de caixa, planejamento financeiro, análise de custos, pricing"
      justificativa: "Curso especializado em gestão financeira empresarial — fonte primária para CFO"
      added: "2026-03-11"
      source: "Capital Upgrade (Paulo Vito Porto / PWR Gestão)"

    - pessoa: "dan-kennedy"
      peso: 0.60
      path: "/knowledge/dna/persons/dan-kennedy/"
      raiz: "/knowledge/sources/dan-kennedy/raw/"
      dominios_relevantes:
        - "pricing-psychology"
        - "front-end-back-end-economics"
        - "preeminence-value-model"
      elementos_chave:
        - "MM-DK-043 (Modelo de Preço como Seleção de Cliente)"
        - "FW-DK-038 (Framework de Preeminência - dar generosamente no front-end)"
        - "HEUR-DK-060 (100% do front-end para mídia se back-end justifica)"
        - "MM-DK-031 (3 Formas de Crescer - LTV e frequência)"
        - "FW-DK-049 (Framework do Modelo de Franquia Evolutivo)"
        - "HEUR-DK-059 (Eliminar custos sem reduzir valor percebido)"
      justificativa: "DK 7FA+12BBS: pricing como seleção, LTV/front-end, permission-to-buy, adjacent revenue, risk reversal"
      adicionado_em: "2026-03-13"
      # 12BBS enrichment (2026-03-13 Phase 6)
      elementos_12bbs:
        - "FW-DK-054 (Permission to Buy: identify #1 objection → build guarantee → name memorably)"
        - "MET-DK-043 (No Fear Guarantee Method: identify economic fear → specific guarantee → remove risk language)"
        - "FW-DK-053 (Adjacent Product Expansion: Disney parks→timeshares→cooking schools; Blue Canyon→wine school)"
        - "MET-DK-041 (Adjacent Revenue Stream Launch: core asset → list experiences → premium packaging → sell to existing base)"
        - "MET-DK-044 (Experience Monetization: audit capabilities → adjacent experiences → low-cost access as funnel)"
      dominios_12bbs:
        - "permission-to-buy"
        - "risk-reversal"
        - "product-expansion"
        - "adjacent-revenue"

# ═══════════════════════════════════════════════════════════════════════════════
# MAPA DE CONFLITOS
# ═══════════════════════════════════════════════════════════════════════════════

conflitos:
  path: "/knowledge/dna/MAPS/MAP-CONFLITOS.yaml"

# ═══════════════════════════════════════════════════════════════════════════════
# REGRAS DE RESOLUCAO
# ═══════════════════════════════════════════════════════════════════════════════

resolucao_de_conflitos:
  regra_geral: |
    1. Consenso forte → usar sem ressalva
    2. Consenso parcial → usar com nota
    3. Conflito mapeado → aplicar regra
    4. Conflito nao mapeado → apresentar opcoes

  preferencias_contextuais:
    - contexto: "conservador/risco"
      priorizar: "SAM-OVEN"
      razao: "Foco em sustentabilidade"

    - contexto: "crescimento agressivo"
      priorizar: "alex-hormozi"
      razao: "Foco em velocidade"


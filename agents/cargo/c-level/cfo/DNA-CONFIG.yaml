        - "front-end-back-end-economics"
        - "preeminence-value-model"
        - "fee-structures"
        - "owner-compensation"
        - "specialization-premium"
      elementos_chave:
        - "MM-DK-043 (Modelo de Preço como Seleção de Cliente)"
        - "FW-DK-038 (Framework de Preeminência - dar generosamente no front-end)"
        - "HEUR-DK-060 (100% do front-end para mídia se back-end justifica)"
        - "MM-DK-031 (3 Formas de Crescer - LTV e frequência)"
        - "FW-DK-049 (Framework do Modelo de Franquia Evolutivo)"
        - "HEUR-DK-059 (Eliminar custos sem reduzir valor percebido)"
      justificativa: "DK 7FA+12BBS+MTBN: pricing como seleção, LTV/front-end, permission-to-buy, adjacent revenue, risk reversal, fee psychology, owner compensation"
      adicionado_em: "2026-03-13"
      # 12BBS enrichment (2026-03-13 Phase 6)
      elementos_12bbs:
        - "FW-DK-054 (Permission to Buy: identify #1 objection → build guarantee → name memorably)"
        - "MET-DK-043 (No Fear Guarantee Method: identify economic fear → specific guarantee → remove risk language)"
        - "FW-DK-053 (Adjacent Product Expansion: Disney parks→timeshares→cooking schools; Blue Canyon→wine school)"
        - "MET-DK-041 (Adjacent Revenue Stream Launch: core asset → list experiences → premium packaging → sell to existing base)"
        - "MET-DK-044 (Experience Monetization: audit capabilities → adjacent experiences → low-cost access as funnel)"
      dominios_12bbs:
        - "permission-to-buy"
        - "risk-reversal"
        - "product-expansion"
        - "adjacent-revenue"
      # MTBN enrichment (2026-03-15 Phase 7)
      elementos_mtbn:
        - "FIL-DK-160 (Quote-and-Shut-Up: after naming price, silence — who speaks first loses)"
        - "FIL-DK-157 (Fee + Performance: charge base fee + % of results to align incentives)"
        - "FIL-DK-158 (Equity Triggers: when to take equity vs cash — risk/reward calculus)"
        - "FIL-DK-265 (Owner Extracts Cash: business exists to generate owner wealth, not reinvest forever)"
        - "FIL-DK-266 (Net-Only Mindset: revenue vanity, profit sanity, net the only number that matters)"
        - "HEUR-DK-337 (Specialization 3-7x: specialists command 3-7x fees vs generalists)"
      dominios_mtbn:
        - "fee-negotiation"
        - "owner-compensation"
        - "profit-optimization"
        - "pricing-psychology-advanced"

    - pessoa: "jeremy-haynes"
      path: "/knowledge/external/dna/persons/jeremy-haynes"
      raiz: "/knowledge/external/sources/jeremy-haynes/raw/"
      dominios_usados:
        - "profit-first"
        - "auto-distribution"
        - "affluence-trap"
        - "expense-management"
        - "billing-strategy"
      peso: 0.75
      quando_usar: "Profit First distribution, auto-distribution of profits, affluence trap awareness, expense control, staggered billing strategy"
      justificativa: "JH DMM: Profit First methodology for agency finances, Auto-Distribution for systematic profit extraction, Affluence Trap for lifestyle creep awareness, 90-10 Expense Rule for cost control, Staggered Billing for cash flow optimization"
      added: "2026-03-22"
      source: "Jeremy Haynes - Digital Marketing Manuscript (DMM)"
      elementos_dmm:
        - "Profit First Distribution — allocate profit before expenses, not after"
        - "Auto-Distribution System — automated profit extraction on billing cycles"
        - "Affluence Trap — awareness framework for lifestyle creep as revenue grows"
        - "90-10 Expense Rule — 90% of expenses should be revenue-generating"
        - "Staggered Billing — billing strategy to smooth cash flow and reduce churn"
      dominios_dmm:
        - "profit-first"
        - "auto-distribution"
        - "affluence-trap"
        - "expense-management"
        - "billing-strategy"

